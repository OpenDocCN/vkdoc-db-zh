- fmt: '# 1. Starting with SQL


    If you’re new to database in general, and to SQL in particular, it can be a little
    daunting at first. In this chapter, we’ll have a taste of SQL by looking at how
    we fetch data from a simple table.

    In principle, you can choose to manage your data any way you want, and some people
    do just that in spreadsheets or even in word processors. For serious data, that’s
    not organized enough, so we rely on something more structured.

    There is no one way to organize data, and not all data can be organized in the
    same way. However, for much of the time, there is a popular way of organizing
    the data for which the SQL language has been developed. Software that manages
    a database is often referred to as Database Management System that’s quite a lot
    to say every time, so we’ll refer to it as `DBMS`.

    An SQL database is a collection of one or more `tables`. Each table is a collection
    of one type of data. Some of the tables in the sample database are


    *   Customers

    *   Paintings

    *   Artists


    We will have a closer look at the structure of the database later, but the important
    thing at this point is that the data is not mixed up. For example, the `customers`
    table has all of the information about customers, and nothing else.

    Each table contains `rows` and `columns`. A row is one instance of the data. For
    example, each row in the `customers` table represents one customer. A column has
    a detail of the row. For example, the `customers` table has separate columns for
    the customer’s email address, phone number, and so on.

    Of course, there’s more to a database than that, and Chapter 2 will focus on these
    ideas more thoroughly.

    In this chapter, we will explore the contents of one table, the `customers` table,
    using the `SELECT` statement, which is the basic command to fetch data. Along
    the way, you’ll see how the results can be filtered, recalculated, and sorted.

    Everything we cover here will be covered in more detail in later chapters, so
    you can take a fairly relaxed approach to what we’re doing in this chapter.

    If you run the following sample code, your results may not be exactly the same.
    This is because the sample data, which is randomized, may not be the same as the
    data used in the book. You may also find differences in the way `DBMS`s present
    unsorted data.


    ## Basic SELECT Statement


    To read data from a table, you use `SELECT`:

    ```sql

    SELECT * FROM customers;

    ```

    You’ll get a result similar to Table 1-1.

    Table 1-1

    *Results*

    | id | familyname | givenname | email |   | registered |

    | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | judy.free474@example.net | … | 2022-06-12 |

    | 186 | Gunn | Ray | ray.gunn186@example.net | … | 2021-11-15 |

    | 144 | King | Ray | ray.king144@example.net | … | 2021-10-18 |

    | 179 | Inkling | Ivan | ivan.inkling179@example.com | … | 2021-11-08 |

    | 475 | Blood | Drew | drew.blood475@example.net | … | 2022-06-13 |

    | 523 | Sights | Seymour | seymour.sights523@example.net | … | 2022-07-11 |

    | ~ 304 rows ~ |


    This is called a `SELECT` statement and will fetch all the rows from the `customers`
    table.

    Statements usually comprise two or more `clauses`. In this case, they are the
    `SELECT` clause and the `FROM` clause.

    Note


    *   `SELECT` doesn’t mean *display*, although the database client doesn’t know
    what else to do with the results. Other software might simply fetch the data to
    be further processed.

    *   The `*` doesn’t mean all *rows*. It is a shorthand for all *columns* of the
    table.

    *   Most of what we’ll be doing will involve a `SELECT` statement.


    ### Case Sensitivity


    The SQL language is case insensitive, meaning that you can type the statement
    in upper or lower case:


    *   It is traditional to use `UPPER CASE` for keywords (`SELECT` and `FROM`) to
    highlight them, but it’s not so important when you have color highlighting.

    *   It is also traditional that table and column names be entered in lower case,
    but most `DBMS`s don’t really care.


    ```sql

    select * from customers;

    ```

    This book will use `UPPER CASE` for keywords, but you don’t have to.


    ### Spacing


    Although a simple statement might easily fit on one line, you can add as many
    line breaks and extra spaces or tabs as you like:

    ```sql

    SELECT

    *

    FROM customers;

    ```

    The most important thing is to keep your code readable and to use spacing to help
    in managing the statement.

    As the book progresses, there will be more recommendations on layout. However,
    these are recommendations only, as SQL will work just as well with minimal spacing.


    ### Clause Ordering


    The original proposed name for SQL was `SEQUEL`, Structured *English* Query Language.
    The idea was that the syntax would resemble the English language.

    This has led to a syntax quirk. For example, if you say

    ```

    Get the Milk

    From the Refrigerator

    ```

    you *first* go to the refrigerator and *then* get the milk. That is, `From` is
    processed before `Get`.

    Similarly, in the `SELECT` statement, the `FROM` clause is processed *before*
    the `SELECT` clause.

    However, you cannot write the statement that way:


    *   You must write `SELECT … FROM … ;`.

    *   It means `FROM … SELECT … ;`.


    Later, you will see additional clauses and where they fit in.

    In this simple example, the fact of the clause order is not important. However,
    later, the clause order will explain why some more complex examples don’t work
    the way you would expect.


    ### The Semicolon (;)


    The SQL standard requires a semicolon `;` at the end of each statement. You can
    break up the statement over many lines, but the semicolon then marks the eventual
    end of the statement.


    *   Most `DBMS`s will allow you to ignore the semicolon if there is a single statement.
    However, you will at least need a semicolon between multiple statements.

    *   Microsoft SQL will also allow you to omit semicolons for multiple statements,
    unless you have them on one line, but even Microsoft doesn’t think that’s a good
    idea (see `https://docs.microsoft.com/en-us/sql/t-sql/language-elements/transact-sql-syntax-conventions-transact-sql#transact-sql-syntax-conventions-transact-sql`).


    We recommend that you *always* use semicolons, even for a single statement or
    for Microsoft SQL. This way, you make sure that your code is less prone to errors.


    ## Selecting Specific Columns


    The star character `*` is a shorthand for selecting all columns from the table.
    You can specify one or more columns instead:

    ```sql

    SELECT id, givenname, familyname

    FROM customers;

    ```

    This gives you Table 1-2.

    Table 1-2

    *Results*

    | id | givenname | familyname |

    | --- | --- | --- |

    | 474 | Judy | Free |

    | 186 | Ray | Gunn |

    | 144 | Ray | King |

    | 179 | Ivan | Inkling |

    | 475 | Drew | Blood |

    | 523 | Seymour | Sights |

    | ~ 304 rows ~ |


    This selects three columns; it still selects all rows.

    The column list is separated by commas:


    *   The columns do not have to be in the original order.

    *   You can skip any columns you like.

    *   Note that in this case the `givenname` and `familyname` order is reversed
    and that the email column is omitted.

    *   The space after the comma is optional: include it if you think it makes it
    more readable.

    *   The comma is a separator: *don’t* put a column after the last column, as SQL
    will expect another column.


    This is a common mistake:

    ```sql

    SELECT id, givenname, familyname, -- extra comma

    FROM customers;

    ```

    It’s a good idea to always specify the columns, even if it’s all of them.'
  raw: '# 1. Starting with SQL


    If you’re new to database in general, and to SQL in particular, it can be a little
    daunting at first. In this chapter, we’ll have a taste of SQL by looking at how
    we fetch data from a simple table.


    In principle, you can choose to manage your data any way you want, and some people
    do just that in spreadsheets or even in word processors. For serious data, that’s
    not organized enough, so we rely on something more structured.


    There is no one way to organize data, and not all data can be organized in the
    same way. However, for much of the time, there is a popular way of organizing
    the data for which the SQL language has been developed. Software that manages
    a database is often referred to as Database Management System that’s quite a lot
    to say every time, so we’ll refer to it as DBMS.


    An SQL database is a collection of one or more **tables**. Each table is a collection
    of one type of data. Some of the tables in the sample database are


    *   Customers


    *   Paintings


    *   Artists


    We will have a closer look at the structure of the database later, but the important
    thing at this point is that the data is not mixed up. For example, the `customers`
    table has all of the information about customers, and nothing else.


    Each table contains **rows** and **columns**. A row is one instance of the data.
    For example, each row in the `customers` table represents one customer. A column
    has a detail of the row. For example, the `customers` table has separate columns
    for the customer’s email address, phone number, and so on.


    Of course, there’s more to a database than that, and Chapter [2](#601766_1_En_2_Chapter.xhtml)
    will focus on these ideas more thoroughly.


    In this chapter, we will explore the contents of one table, the `customers` table,
    using the `SELECT` statement, which is the basic command to fetch data. Along
    the way, you’ll see how the results can be filtered, recalculated, and sorted.


    Everything we cover here will be covered in more detail in later chapters, so
    you can take a fairly relaxed approach to what we’re doing in this chapter.


    If you run the following sample code, your results may not be exactly the same.
    This is because the sample data, which is randomized, may not be the same as the
    data used in the book. You may also find differences in the way DBMSs present
    unsorted data.


    ## Basic SELECT Statement


    To read data from a table, you use `SELECT`:


    ```

    SELECT * FROM customers;

    ```


    You’ll get a result similar to Table [1-1](#601766_1_En_1_Chapter.xhtml#Tab1).


    Table 1-1


    *Results*


    | id | familyname | givenname | email |   | registered |

    | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | judy.free474@example.net | … | 2022-06-12 |

    | 186 | Gunn | Ray | ray.gunn186@example.net | … | 2021-11-15 |

    | 144 | King | Ray | ray.king144@example.net | … | 2021-10-18 |

    | 179 | Inkling | Ivan | ivan.inkling179@example.com | … | 2021-11-08 |

    | 475 | Blood | Drew | drew.blood475@example.net | … | 2022-06-13 |

    | 523 | Sights | Seymour | seymour.sights523@example.net | … | 2022-07-11 |

    | ~ 304 rows ~ |


    This is called a `SELECT` **statement** and will fetch all the rows from the `customers`
    table.


    Statements usually comprise two or more **clauses**. In this case, they are the
    `SELECT` clause and the `FROM` clause.


    Note


    *   `SELECT` doesn’t mean *display*, although the database client doesn’t know
    what else to do with the results. Other software might simply fetch the data to
    be further processed.


    *   The `*` doesn’t mean all *rows*. It is a shorthand for all *columns* of the
    table.


    *   Most of what we’ll be doing will involve a `SELECT` statement.


    ### Case Sensitivity


    The SQL language is case insensitive, meaning that you can type the statement
    in upper or lower case:


    *   It is traditional to use UPPER CASE for keywords (`SELECT` and `FROM`) to
    highlight them, but it’s not so important when you have color highlighting.


    *   It is also traditional that table and column names be entered in lower case,
    but most DBMSs don’t really care.


    ```

    select * from customers;

    ```


    This book will use UPPER CASE for keywords, but you don’t have to.


    ### Spacing


    Although a simple statement might easily fit on one line, you can add as many
    line breaks and extra spaces or tabs as you like:


    ```

    SELECT

    *

    FROM customers;

    ```


    The most important thing is to keep your code readable and to use spacing to help
    in managing the statement.


    As the book progresses, there will be more recommendations on layout. However,
    these are recommendations only, as SQL will work just as well with minimal spacing.


    ### Clause Ordering


    The original proposed name for SQL was SEQUEL, Structured *English* Query Language.
    The idea was that the syntax would resemble the English language.


    This has led to a syntax quirk. For example, if you say


    ```

    Get the Milk

    From the Refrigerator

    ```


    you *first* go to the refrigerator and *then* get the milk. That is, `From` is
    processed before `Get`.


    Similarly, in the `SELECT` statement, the `FROM` clause is processed *before*
    the `SELECT` clause.


    However, you cannot write the statement that way:


    *   You must write `SELECT … FROM … ;`.


    *   It means `FROM … SELECT … ;`.


    Later, you will see additional clauses and where they fit in.


    In this simple example, the fact of the clause order is not important. However,
    later, the clause order will explain why some more complex examples don’t work
    the way you would expect.


    ### The Semicolon (;)


    The SQL standard requires a semicolon `;` at the end of each statement. You can
    break up the statement over many lines, but the semicolon then marks the eventual
    end of the statement.


    *   Most DBMSs will allow you to ignore the semicolon if there is a single statement.
    However, you will at least need a semicolon between multiple statements.


    *   Microsoft SQL will also allow you to omit semicolons for multiple statements,
    unless you have them on one line, but even Microsoft doesn’t think that’s a good
    idea (see [`https://docs.microsoft.com/en-us/sql/t-sql/language-elements/transact-sql-syntax-conventions-transact-sql#transact-sql-syntax-conventions-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/language-elements/transact-sql-syntax-conventions-transact-sql%2523transact-sql-syntax-conventions-transact-sql)).


    We recommend that you *always* use semicolons, even for a single statement or
    for Microsoft SQL. This way, you make sure that your code is less prone to errors.


    ## Selecting Specific Columns


    The star character `*` is a shorthand for selecting all columns from the table.
    You can specify one or more columns instead:


    ```

    SELECT id, givenname, familyname

    FROM customers;

    ```


    This gives you Table [1-2](#601766_1_En_1_Chapter.xhtml#Tab2).


    Table 1-2


    *Results*


    | id | givenname | familyname |

    | --- | --- | --- |

    | 474 | Judy | Free |

    | 186 | Ray | Gunn |

    | 144 | Ray | King |

    | 179 | Ivan | Inkling |

    | 475 | Drew | Blood |

    | 523 | Seymour | Sights |

    | ~ 304 rows ~ |


    This selects three columns; it still selects all rows.


    The column list is separated by commas:


    *   The columns do not have to be in the original order.


    *   You can skip any columns you like.


    *   Note that in this case the `givenname` and `familyname` order is reversed
    and that the email column is omitted.


    *   The space after the comma is optional: include it if you think it makes it
    more readable.


    *   The comma is a separator: *don’t* put a column after the last column, as SQL
    will expect another column.


    This is a common mistake:


    ```

    SELECT id, givenname, familyname, -- extra comma

    FROM customers;

    ```


    It’s a good idea to always specify the columns, even if it’s all of them.'
  trans: '

    # 1. 从 SQL 开始


    如果你对数据库一般而言是新手，特别是对 SQL 不太熟悉，一开始可能会有点令人畏惧。在本章中，我们将通过查看如何从一个简单的表中获取数据来初步体验 SQL。


    原则上，你可以选择任何你想要的方式来管理你的数据，有些人确实只是在电子表格甚至文字处理器中这样做。但对于重要的、未组织的数据来说，这种方式不够充分，因此我们依赖于更结构化的东西。


    组织数据没有唯一的方式，也并非所有数据都能以相同方式组织。然而，大多数时候，有一种流行的数据组织方式，SQL 语言就是为此开发的。管理数据库的软件通常被称为数据库管理系统（Database
    Management System），每次都说这么长有点麻烦，所以我们将简称其为 `DBMS`。


    一个 SQL 数据库是一个或多个 `表` 的集合。每个表是一种类型数据的集合。示例数据库中的一些表有：


    *   客户

    *   绘画作品

    *   艺术家


    我们稍后会更仔细地查看数据库的结构，但目前重要的是数据没有混杂在一起。例如，`客户` 表包含了关于客户的所有信息，没有其他内容。


    每个表包含 `行` 和 `列`。一行是数据的一个实例。例如，`客户` 表中的每一行代表一个客户。一列是行的一个详细信息。例如，`客户` 表有单独的列用于客户的电子邮件地址、电话号码等。


    当然，数据库远不止这些，第 2 章将更深入地探讨这些概念。


    在本章中，我们将使用 `SELECT` 语句（这是获取数据的基本命令）来探索一个表——即 `客户` 表——的内容。在此过程中，你将看到结果如何被过滤、重新计算和排序。


    我们这里介绍的内容都将在后面的章节中更详细地讲解，所以对于本章的内容，你可以采取一种相对轻松的方式学习。


    如果你运行下面的示例代码，你的结果可能不完全相同。这是因为示例数据是随机生成的，可能与书中使用的数据不同。你可能还会发现不同的 `DBMS` 在呈现未排序数据的方式上存在差异。


    ## 基本 SELECT 语句


    要从表中读取数据，你使用 `SELECT`：

    ```sql

    SELECT * FROM customers;

    ```

    你将得到类似表 1-1 的结果。

    表 1-1

    *结果*

    | id | 姓氏 | 名字 | 电子邮件 |   | 注册日期 |

    | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | judy.free474@example.net | … | 2022-06-12 |

    | 186 | Gunn | Ray | ray.gunn186@example.net | … | 2021-11-15 |

    | 144 | King | Ray | ray.king144@example.net | … | 2021-10-18 |

    | 179 | Inkling | Ivan | ivan.inkling179@example.com | … | 2021-11-08 |

    | 475 | Blood | Drew | drew.blood475@example.net | … | 2022-06-13 |

    | 523 | Sights | Seymour | seymour.sights523@example.net | … | 2022-07-11 |

    | ~ 约 304 行 ~ |


    这被称为 `SELECT` 语句，它将从 `客户` 表中获取所有行。


    语句通常由两个或更多 `子句` 组成。在本例中，它们是 `SELECT` 子句和 `FROM` 子句。


    注意


    *   `SELECT` 并不意味着 *显示*，尽管数据库客户端不知道还能对结果做什么。其他软件可能只是获取数据以便进一步处理。

    *   `*` 并不意味着所有 *行*。它是表中所有 *列* 的简写。

    *   我们将要做的大部分工作都会涉及 `SELECT` 语句。


    ### 大小写敏感性


    SQL 语言对大小写不敏感，意味着你可以用大写或小写输入语句：


    *   传统上使用 `大写` 来突出显示关键字（`SELECT` 和 `FROM`），但当你有语法高亮时，这就不那么重要了。

    *   传统上表名和列名也使用小写输入，但大多数 `DBMS` 并不太在意这一点。


    ```sql

    select * from customers;

    ```

    本书将对关键字使用 `大写`，但你不必这样做。


    ### 空格


    虽然一个简单的语句很容易放在一行内，但你可以根据需要添加任意多的换行符和额外的空格或制表符：

    ```sql

    SELECT

    *

    FROM customers;

    ```

    最重要的是保持代码的可读性，并使用空格来帮助管理语句。


    随着本书的进展，会有更多关于布局的建议。然而，这些只是建议，因为 SQL 在最少空格的情况下也能正常工作。


    ### 子句顺序


    SQL 最初提议的名称是 `SEQUEL`，结构化*英语*查询语言。其想法是语法会类似于英语。


    这导致了一个语法上的怪癖。例如，如果你说：

    ```

    从冰箱里拿牛奶

    ```

    你*首先*去冰箱，*然后*拿牛奶。也就是说，`从` 在 `拿` 之前执行。


    同样，在 `SELECT` 语句中，`FROM` 子句在 `SELECT` 子句*之前*执行。


    然而，你不能那样写语句：


    *   你必须写成 `SELECT … FROM … ;`。

    *   它的意思是 `从 … 选择 …`。


    稍后，你将看到额外的子句以及它们应该放在哪里。


    在这个简单的例子中，子句顺序的事实并不重要。然而，稍后子句顺序将解释为什么一些更复杂的例子不能像你预期的那样工作。


    ### 分号 (;


    SQL 标准要求每条语句的末尾有一个分号 `;`。你可以将语句分成多行，但分号标记了语句的最终结束。


    *   大多数 `DBMS` 会允许你在只有单条语句时忽略分号。然而，在多条语句之间，你至少需要一个分号。

    *   Microsoft SQL 也允许你在多条语句时省略分号，除非它们在同一行，但即使是 Microsoft 也不认为这是一个好主意（参见 `https://docs.microsoft.com/en-us/sql/t-sql/language-elements/transact-sql-syntax-conventions-transact-sql#transact-sql-syntax-conventions-transact-sql`）。


    我们建议你*始终*使用分号，即使是单条语句或对于 Microsoft SQL。这样，你可以确保你的代码不易出错。


    ## 选择特定列


    星号字符 `*` 是选择表中所有列的简写。你可以指定一个或多个列来代替：

    ```sql

    SELECT id, givenname, familyname

    FROM customers;

    ```

    这会给你表 1-2。

    表 1-2

    *结果*

    | id | 名字 | 姓氏 |

    | --- | --- | --- |

    | 474 | Judy | Free |

    | 186 | Ray | Gunn |

    | 144 | Ray | King |

    | 179 | Ivan | Inkling |

    | 475 | Drew | Blood |

    | 523 | Seymour | Sights |

    | ~ 约 304 行 ~ |


    这选择了三列；它仍然选择了所有行。


    列列表由逗号分隔：


    *   列不必按原始顺序排列。

    *   你可以跳过任何你想要的列。

    *   注意，在本例中，`名字` 和 `姓氏` 的顺序被调换了，并且电子邮件列被省略了。

    *   逗号后面的空格是可选的：如果你认为它使代码更易读，就包含它。

    *   逗号是一个分隔符：*不要* 在最后一列之后再放一个逗号，因为 SQL 会期待另一列。


    这是一个常见的错误：

    ```sql

    SELECT id, givenname, familyname, -- 多余的逗号

    FROM customers;

    ```

    始终指定列名是一个好习惯，即使你要选择所有列。

    '
- fmt: '### Column Order


    The default column order, which you see with `SELECT *`, is defined when the table
    is created. You may not be able to change it, even if you have permission.


    In SQL, there is no correct column order, and there is no performance difference
    if you select in a different order. That is, there is no `preferred` column order,
    so you choose the order which best suits your needs, either for presentation or
    to feed into another application.


    ### Layout


    With a growing column list, it makes sense to lay the columns out more creatively:


    ```sql

    SELECT

    id,

    givenname, familyname

    FROM customers;

    ```


    As mentioned before, the actual spacing is insignificant, so the preceding example
    uses spacing to make the statement more readable.


    *   The column list is vertical rather than inline.

    *   The column list is indented from the `SELECT` command to show that they are
    part of the same clause.

    *   `givenname` and `familyname` are on the same line to show that conceptually
    they are related to each other.


    You will find layout easier to maintain if you remember to use the tab key.


    Also, as mentioned before, you can use any spacing you like; just make sure that
    the statement is as readable as possible.


    ### Using SELECT *


    It is considered bad practice to use `SELECT *` in real life, even if you really
    want all of the columns; always specify all of the columns. This is because


    *   You get no control over the column order of the results.

    *   A change in the underlying table structure might lead to different results
    next time.


    However, in this book, you will see `SELECT *` used very often:


    *   `SELECT *` is a good way of exploring a table.

    *   Many examples will focus on new clauses, so the actual columns selected are
    not relevant.


    Just remember that when using SQL in earnest, you should always list the actual
    column names.


    ### Calculated Columns


    The selected columns don’t have to be the original columns. They can be `derived`
    from one or more columns. Among other things, this means that the table never
    needs to keep variations on a value since it can always be recalculated when the
    time comes.


    For example:


    ```sql

    SELECT

    id, givenname, familyname,

    height,         --  height in centimetres

    height/2.54     --  height in inches

    FROM customers;

    ```


    Table [1-3](#601766_1_En_1_Chapter.xhtml#Tab3) shows the results.


    Table 1-3

    *Results*


    | 474 | Judy | Free |   |   |

    | --- | --- | --- | --- | --- |

    | 186 | Ray | Gunn | 163.8 | 64.488… |

    | 144 | Ray | King | 176.8 | 69.606… |

    | 179 | Ivan | Inkling | 170.3 | 67.047… |

    | 475 | Drew | Blood | 171.0 | 67.323… |

    | 523 | Seymour | Sights | 167.3 | 65.866… |

    | ~ 304 rows ~ |


    In the `customers` table, height is measured in centimeters. For those who prefer
    a legacy measurement, you can convert to inches by dividing by `2.54`.^([¹](#fn1))


    It would have been a mistake to design a table with both centimeters and inches.
    Tables should never have a column which is basically the same as another in disguise.
    As you see, you can always recalculate the other value.


    ### Aliases


    When experimenting with a `SELECT` statement, you can leave calculations as they
    are, but you will notice that the result will have a missing or dummy name.


    When taking your `SELECT` statement seriously, you will need to give calculated
    columns a distinct name:


    ```sql

    SELECT

    id, givenname, familyname,

    height as centimetres,

    height/2.54 as inches

    FROM customers;

    ```


    Now you have the results in Table [1-4](#601766_1_En_1_Chapter.xhtml#Tab4).


    Table 1-4

    *Results*


    | id | givenname | familyname | centimetres | inches |

    | --- | --- | --- | --- | --- |

    | 474 | Judy | Free | [NULL] | [NULL] |

    | 186 | Ray | Gunn | 163.8 | 64.488… |

    | 144 | Ray | King | 176.8 | 69.606… |

    | 179 | Ivan | Inkling | 170.3 | 67.047… |

    | 475 | Drew | Blood | 171.0 | 67.323… |

    | 523 | Seymour | Sights | 167.3 | 65.866… |

    | ~ 304 rows ~ |


    As you see, you can also alias uncalculated columns if you feel the need to make
    the point clearer.


    You will see more on calculated columns and aliases later.


    ### Comments


    In an elaborate script, it is useful to include comments about what is going on.
    A `comment` is any text which will be ignored by SQL, but is meant for humans
    to read.


    You’ve already seen a few comments in the previous examples. The standard comment
    is text following the `--` characters, until the end of the line:


    ```sql

    SELECT

    id, givenname, familyname,

    height/2.54 as inches   -- 1in = 2.54cm

    FROM customers;

    ```


    The preceding comment is to explain *why* we are dividing by `2.54`.


    Strictly speaking, the `--` must be followed by a `space`. However, most, but
    not all, DBMSs will allow a `tab` instead of a space, and some, but not all, DBMSs
    don’t require spacing character:


    ```sql

    -- This is a standard comment (space)

    --  This uses a tab, and will probably work, but not necessarily (tab)

    --This may also work

    ```


    You will find out soon enough which variations work for your DBMS. Usually, comments
    are highlighted in a different color.


    ### Block Comments


    `Most` DBMSs also support an unofficial block comment:


    ```sql

    /* block comment */

    ```


    This style is also known as the C-style comment because of its use in the C programming
    language.


    The block comment begins with the `/*` combination and ends with the reverse `*/`
    combination. It can span multiple lines or take up just part of a line.


    ```sql

    /*  This is an introductory SELECT statement

    The rest of the book will go into more detail */

    SELECT

    id,

    /* name: */ givenname, familyname

    FROM customers;

    ```


    Normally, you should avoid non-standard SQL features, since you never know what
    the future holds. However, this one is so widely supported that you can regard
    it as simply a missing feature supplied unofficially.


    ### Uses of Comments


    Since SQL completely ignores comment text, you can write anything you like, even
    if it amounts to gibberish. However, the following are common uses of comments:


    *   Explain something which is not obvious in code

    *   Act as section headers in complex scripts

    *   Temporarily disable some code


    Here is an example with different uses of comments:


    ```sql

    /*  SQL Sampler

    ================================================

    This is an introductory SELECT statement

    The rest of the book will go into more detail

    ================================================ */

    SELECT

    id,

    --  email,

    givenname, familyname,

    height/2.54 as inches   -- 2.54 cm = 1 inch

    FROM customers;

    ```


    In the preceding example, the `email` column is disabled, the `inches` column
    is explained, and the whole script is preceded by a header comment block. The
    actual query is also indented for good measure.


    Normally, if you want to disable code, you simply delete it. Using a comment instead
    is called commenting the code out. The reasons why you would comment code out
    include


    *   Testing or troubleshooting

    *   Leaving it there as an option, subject to further consultation

    *   Using it as an alternative to other code


    As regards explanatory code, *don’t* overcomment. Only explain what isn’t obvious.
    Saying too much is like the boy who cried wolf. As a rule, others will simply
    tune out.'
  raw: '### Column Order


    The default column order, which you see with `SELECT *`, is defined when the table
    is created. You may not be able to change it, even if you have permission.


    In SQL, there is no correct column order, and there is no performance difference
    if you select in a different order. That is, there is no *preferred* column order,
    so you choose the order which best suits your needs, either for presentation or
    to feed into another application.


    ### Layout


    With a growing column list, it makes sense to lay the columns out more creatively:


    ```

    SELECT

    id,

    givenname, familyname

    FROM customers;

    ```


    As mentioned before, the actual spacing is insignificant, so the preceding example
    uses spacing to make the statement more readable.


    *   The column list is vertical rather than inline.


    *   The column list is indented from the `SELECT` command to show that they are
    part of the same clause.


    *   `givenname` and `familyname` are on the same line to show that conceptually
    they are related to each other.


    You will find layout easier to maintain if you remember to use the tab key.


    Also, as mentioned before, you can use any spacing you like; just make sure that
    the statement is as readable as possible.


    ### Using SELECT *


    It is considered bad practice to use `SELECT *` in real life, even if you really
    want all of the columns; always specify all of the columns. This is because


    *   You get no control over the column order of the results.


    *   A change in the underlying table structure might lead to different results
    next time.


    However, in this book, you will see `SELECT *` used very often:


    *   `SELECT *` is a good way of exploring a table.


    *   Many examples will focus on new clauses, so the actual columns selected are
    not relevant.


    Just remember that when using SQL in earnest, you should always list the actual
    column names.


    ### Calculated Columns


    The selected columns don’t have to be the original columns. They can be *derived*
    from one or more columns. Among other things, this means that the table never
    needs to keep variations on a value since it can always be recalculated when the
    time comes.


    For example:


    ```

    SELECT

    id, givenname, familyname,

    height,         --  height in centimetres

    height/2.54     --  height in inches

    FROM customers;

    ```


    Table [1-3](#601766_1_En_1_Chapter.xhtml#Tab3) shows the results.


    Table 1-3


    *Results*


    | 474 | Judy | Free |   |   |

    | --- | --- | --- | --- | --- |

    | 186 | Ray | Gunn | 163.8 | 64.488… |

    | 144 | Ray | King | 176.8 | 69.606… |

    | 179 | Ivan | Inkling | 170.3 | 67.047… |

    | 475 | Drew | Blood | 171.0 | 67.323… |

    | 523 | Seymour | Sights | 167.3 | 65.866… |

    | ~ 304 rows ~ |


    In the `customers` table, height is measured in centimeters. For those who prefer
    a legacy measurement, you can convert to inches by dividing by 2.54.^([¹](#fn1))


    It would have been a mistake to design a table with both centimeters and inches.
    Tables should never have a column which is basically the same as another in disguise.
    As you see, you can always recalculate the other value.


    ### Aliases


    When experimenting with a `SELECT` statement, you can leave calculations as they
    are, but you will notice that the result will have a missing or dummy name.


    When taking your `SELECT` statement seriously, you will need to give calculated
    columns a distinct name:


    ```

    SELECT

    id, givenname, familyname,

    height as centimetres,

    height/2.54 as inches

    FROM customers;

    ```


    Now you have the results in Table [1-4](#601766_1_En_1_Chapter.xhtml#Tab4).


    Table 1-4


    *Results*


    | id | givenname | familyname | centimetres | inches |

    | --- | --- | --- | --- | --- |

    | 474 | Judy | Free | [NULL] | [NULL] |

    | 186 | Ray | Gunn | 163.8 | 64.488… |

    | 144 | Ray | King | 176.8 | 69.606… |

    | 179 | Ivan | Inkling | 170.3 | 67.047… |

    | 475 | Drew | Blood | 171.0 | 67.323… |

    | 523 | Seymour | Sights | 167.3 | 65.866… |

    | ~ 304 rows ~ |


    As you see, you can also alias uncalculated columns if you feel the need to make
    the point clearer.


    You will see more on calculated columns and aliases later.


    ## Comments


    In an elaborate script, it is useful to include comments about what is going on.
    A **comment** is any text which will be ignored by SQL, but is meant for humans
    to read.


    You’ve already seen a few comments in the previous examples. The standard comment
    is text following the `--` characters, until the end of the line:


    ```

    SELECT

    id, givenname, familyname,

    height/2.54 as inches   -- 1in = 2.54cm

    FROM customers;

    ```


    The preceding comment is to explain *why* we are dividing by 2.54.


    Strictly speaking, the `--` must be followed by a **space**. However, most, but
    not all, DBMSs will allow a **tab** instead of a space, and some, but not all,
    DBMSs don’t require spacing character:


    ```

    -- This is a standard comment (space)

    --  This uses a tab, and will probably work, but not necessarily (tab)

    --This may also work

    ```


    You will find out soon enough which variations work for your DBMS. Usually, comments
    are highlighted in a different color.


    ### Block Comments


    *Most* DBMSs also support an unofficial block comment:


    ```

    /* block comment */

    ```


    This style is also known as the C-style comment because of its use in the C programming
    language.


    The block comment begins with the `/*` combination and ends with the reverse `*/`
    combination. It can span multiple lines or take up just part of a line.


    ```

    /*  This is an introductory SELECT statement

    The rest of the book will go into more detail */

    SELECT

    id,

    /* name: */ givenname, familyname

    FROM customers;

    ```


    Normally, you should avoid non-standard SQL features, since you never know what
    the future holds. However, this one is so widely supported that you can regard
    it as simply a missing feature supplied unofficially.


    ### Uses of Comments


    Since SQL completely ignores comment text, you can write anything you like, even
    if it amounts to gibberish. However, the following are common uses of comments:


    *   Explain something which is not obvious in code


    *   Act as section headers in complex scripts


    *   Temporarily disable some code


    Here is an example with different uses of comments:


    ```

    /*  SQL Sampler

    ================================================

    This is an introductory SELECT statement

    The rest of the book will go into more detail

    ================================================ */

    SELECT

    id,

    --  email,

    givenname, familyname,

    height/2.54 as inches   -- 2.54 cm = 1 inch

    FROM customers;

    ```


    In the preceding example, the `email` column is disabled, the `inches` column
    is explained, and the whole script is preceded by a header comment block. The
    actual query is also indented for good measure.


    Normally, if you want to disable code, you simply delete it. Using a comment instead
    is called commenting the code out. The reasons why you would comment code out
    include


    *   Testing or troubleshooting


    *   Leaving it there as an option, subject to further consultation


    *   Using it as an alternative to other code


    As regards explanatory code, *don’t* overcomment. Only explain what isn’t obvious.
    Saying too much is like the boy who cried wolf. As a rule, others will simply
    tune out.'
  trans: '

    ### 列顺序


    默认的列顺序（即使用 `SELECT *` 时看到的顺序）是在表创建时定义的。即使你有权限，可能也无法更改它。


    在 SQL 中，没有所谓“正确”的列顺序，以不同顺序选取列也不会带来性能差异。也就是说，不存在`首选的`列顺序，因此你可以根据自己的需求（无论是为了展示还是为了输入到另一个应用）来选择最合适的顺序。


    ### 布局


    随着列列表的增长，更有创意地布局列是有意义的：


    ```sql

    SELECT

    id,

    givenname, familyname

    FROM customers;

    ```


    如前所述，实际的间距并不重要，因此前面的示例使用间距来使语句更具可读性。


    *   列列表是垂直的，而非内联的。

    *   列列表从 `SELECT` 命令缩进，以表明它们属于同一个子句。

    *   `givenname` 和 `familyname` 在同一行，以表明它们在概念上是相关的。


    如果你记得使用 Tab 键，你会发现布局更容易维护。


    同时，如前所述，你可以使用任何喜欢的间距；只需确保语句尽可能可读。


    ### 使用 SELECT *


    在实际使用中，即使你真的需要所有列，使用 `SELECT *` 也被认为是**不良实践**；务必明确指定所有列名。这是因为


    *   你无法控制结果的列顺序。

    *   基础表结构的更改可能导致下次查询结果不同。


    然而，在本书中，你会看到 `SELECT *` 被频繁使用：


    *   `SELECT *` 是探索表的好方法。

    *   许多示例将专注于新子句，因此实际选择的列无关紧要。


    只需记住，当认真使用 SQL 时，你应该始终列出实际的列名。


    ### 计算列


    选取的列不必是原始列。它们可以从一个或多个列`派生`出来。除此之外，这意味着表永远不需要保留一个值的变体，因为需要时总可以重新计算。


    例如：


    ```sql

    SELECT

    id, givenname, familyname,

    height,         --  高度，单位为厘米

    height/2.54     --  高度，单位为英寸

    FROM customers;

    ```


    表 1-3 显示了结果。


    表 1-3

    *结果*


    | 474 | Judy | Free |   |   |

    | --- | --- | --- | --- | --- |

    | 186 | Ray | Gunn | 163.8 | 64.488… |

    | 144 | Ray | King | 176.8 | 69.606… |

    | 179 | Ivan | Inkling | 170.3 | 67.047… |

    | 475 | Drew | Blood | 171.0 | 67.323… |

    | 523 | Seymour | Sights | 167.3 | 65.866… |

    | ~ 约 304 行 ~ |


    在 `customers` 表中，高度以厘米为单位测量。对于那些偏好传统度量单位的人，你可以通过除以 `2.54` 将其转换为英寸。^(¹)


    设计一个同时包含厘米和英寸的列将是一个错误。表绝不应该包含本质上与另一个列相同的、经过伪装的列。如你所见，你总是可以重新计算出另一个值。


    ### 别名


    在试验 `SELECT` 语句时，你可以让计算保持原样，但你会注意到结果列名会缺失或是个占位名。


    当认真编写 `SELECT` 语句时，你需要为计算列指定一个明确的名称：


    ```sql

    SELECT

    id, givenname, familyname,

    height as centimetres,

    height/2.54 as inches

    FROM customers;

    ```


    现在你得到了表 1-4 中的结果。


    表 1-4

    *结果*


    | id | givenname | familyname | centimetres | inches |

    | --- | --- | --- | --- | --- |

    | 474 | Judy | Free | [NULL] | [NULL] |

    | 186 | Ray | Gunn | 163.8 | 64.488… |

    | 144 | Ray | King | 176.8 | 69.606… |

    | 179 | Ivan | Inkling | 170.3 | 67.047… |

    | 475 | Drew | Blood | 171.0 | 67.323… |

    | 523 | Seymour | Sights | 167.3 | 65.866… |

    | ~ 约 304 行 ~ |


    如你所见，如果你觉得有必要让意图更清晰，你也可以为未计算的列设置别名。


    你将在后面看到更多关于计算列和别名的内容。


    ### 注释


    在复杂的脚本中，包含关于代码功能的注释是很有用的。`注释`是任何会被 SQL 忽略、但旨在供人类阅读的文本。


    你已经在前面的示例中看到了一些注释。标准的注释是位于 `--` 字符之后、直到行尾的文本：


    ```sql

    SELECT

    id, givenname, familyname,

    height/2.54 as inches   -- 1in = 2.54cm

    FROM customers;

    ```


    前面的注释用于解释*为什么*我们要除以 `2.54`。


    严格来说，`--` 后面必须跟一个`空格`。然而，大多数（但不是全部）DBMS 也允许使用 `制表符` 代替空格，并且有些（但不是全部）DBMS 甚至不要求空白字符：


    ```sql

    -- 这是一个标准注释（使用空格）

    --  这使用了制表符，可能有效，但不一定（使用制表符）

    --这也可能有效

    ```


    你很快就会发现哪些变体对你的 DBMS 有效。通常，注释会以不同的颜色高亮显示。


    ### 块注释


    `大多数` DBMS 也支持一种非官方的块注释：


    ```sql

    /* 块注释 */

    ```


    这种风格也被称为 C 风格注释，因为它在 C 编程语言中被使用。


    块注释以 `/*` 组合开始，以反向的 `*/` 组合结束。它可以跨越多行或仅占一行的一部分。


    ```sql

    /*  这是一个介绍性的 SELECT 语句

    本书的其余部分将进行更详细的介绍 */

    SELECT

    id,

    /* 名称: */ givenname, familyname

    FROM customers;

    ```


    通常，你应该避免使用非标准的 SQL 特性，因为你永远不知道未来会怎样。然而，这一特性被广泛支持，以至于你可以将其视为仅仅是非官方补充的一个缺失功能。


    ### 注释的用途


    由于 SQL 完全忽略注释文本，你可以随意书写，即使它是胡言乱语。然而，以下是注释的常见用途：


    *   解释代码中不显而易见的内容

    *   在复杂脚本中充当章节标题

    *   临时禁用部分代码


    以下是一个展示注释不同用途的示例：


    ```sql

    /*  SQL 示例器

    ================================================

    这是一个介绍性的 SELECT 语句

    本书的其余部分将进行更详细的介绍

    ================================================ */

    SELECT

    id,

    --  email,

    givenname, familyname,

    height/2.54 as inches   -- 2.54 厘米 = 1 英寸

    FROM customers;

    ```


    在前面的示例中，`email` 列被禁用，`inches` 列得到了解释，整个脚本前面有一个标题注释块。实际的查询也进行了缩进，以确保良好的可读性。


    通常，如果你想禁用代码，直接删除它即可。使用注释来代替删除被称为**注释掉代码**。你可能会注释掉代码的原因包括：


    *   测试或故障排除

    *   将其保留在那里作为一个选项，留待进一步商议

    *   将其用作其他代码的替代方案


    至于解释性代码，**不要**过度注释。只解释不显而易见的部分。说得太多就像喊“狼来了”的男孩。通常，其他人只会选择忽略。

    '
- fmt: '## Filtering Rows


    Often, you don’t want all rows of a table, but only some of them. The `WHERE`
    clause is used to decide which rows to select:


    ```sql

    SELECT

    id,

    givenname,familyname,

    height/2.54 AS inches

    FROM customers

    WHERE state=''NSW'';

    ```


    This time, you get what’s in Table [1-5](#601766_1_En_1_Chapter.xhtml#Tab5).


    Table 1-5

    *Results*


    | id | givenname | familyname | inches |

    | --- | --- | --- | --- |

    | 474 | Judy | Free | [NULL] |

    | 144 | Ray | King | 69.606… |

    | 341 | Val | Idate | 69.724… |

    | 351 | Dick | Tate | 66.063… |

    | 429 | Tom | Morrow | 61.772… |

    | 234 | Nat | Ering | 67.638… |

    | ~ 67 rows ~ |


    The expression `state=''NSW''` is called an **assertion** and is either `true`
    or `false`. The `WHERE` clause selects only those rows where the assertion is
    `true`.


    Note the single quotes `'' … ''` around the `NSW`. In SQL, text values are called
    **strings** and are enclosed in single quotes. Don’t use double quotes `" … "`
    because most DBMSs will interpret double quotes differently. Also, note that the
    string is in UPPER CASE, which matches the data in the `customers` table. In some
    DBMSs, you can also use lower case, but not in others.


    You will learn more about strings later in the book.


    ### Clause Ordering


    The `WHERE` clause is evaluated *after* `FROM`, but before `SELECT`:


    ```sql

    SELECT …

    FROM …

    --  SELECT processed here!

    WHERE … ;

    ```


    In English, this reads as


    1.  Start with the table.

    2.  Filter some rows.

    3.  Select some columns.


    Remember, however, that you must write the SQL in the preceding order.


    ### Placing the Semicolon


    When developing your code, it is easy to make the following mistake:


    ```sql

    SELECT *

    FROM customers;

    WHERE state=''NSW''   --  oops

    ```


    This is because you have correctly ended the previous version with a semicolon
    and simply added a new clause after it. While you are developing your code, it
    may be helpful to put the semicolon on a separate line:


    ```sql

    SELECT *

    FROM customers

    WHERE state=''NSW''

    ;

    ```


    This makes it easier to add the additional clauses as you go. You can always tidy
    up the semicolon when you have finished everything.


    ## Ordering the Results


    Mathematically speaking, a table is a **set** of rows. Among other things, this
    means that row order is insignificant.


    Some DBMSs will output the results in the same order they were added. Some DBMSs
    will output them in a seemingly random order, depending on how the data is managed
    internally.


    The SQL standard makes a point of *not* telling a DBMS how to do its job, and
    the only guarantee is that row order is *not* guaranteed, that is, unless you
    force the issue.


    The `ORDER BY` clause puts the results in a specified order:


    ```sql

    SELECT

    id,

    givenname, familyname,

    height/2.54 as inches

    FROM customers

    WHERE state=''NSW''

    ORDER BY familyname, givenname;

    ```


    The results will appear in Table [1-6](#601766_1_En_1_Chapter.xhtml#Tab6).


    Table 1-6

    *Results*


    | id | givenname | familyname | inches |

    | --- | --- | --- | --- |

    | 44 | Helen | Back | 67.913… |

    | 162 | Ginger | Beer | 70.039… |

    | 99 | Minnie | Bus | 65.315… |

    | 270 | Mary | Christmas | 65.118… |

    | 487 | Horace | Cope | 68.622… |

    | 419 | Barbie | Cue | 62.520… |

    | ~ 67 rows ~ |


    In this example, you order the results by `familyname` and, in the event of a
    tie, by the `givenname`.


    You can order by one or more columns, in ascending or descending order.


    Strictly speaking, the result is no longer a set, as a set is unordered. In some
    cases, you won’t be able to do any more processing once the `ORDER BY` clause
    is used.


    You will learn more about the `ORDER BY` clause later.


    ### Clause Order


    The `ORDER BY` is both written and evaluated last:


    ```sql

    SELECT …

    FROM …

    WHERE …

    --  SELECT processed here

    ORDER BY … ;

    ```


    In English, this reads as


    1.  Start with the table.

    2.  Filter some rows.

    3.  Select some columns.

    4.  Finally, sort the results.


    Remember, however, that you must still write the SQL in the preceding order.


    ## Distinct Rows


    Sometimes, you will need to interpret what somebody asks for. For example, if
    you want a list of email addresses, the following would do the job:


    ```sql

    SELECT email FROM customers;

    ```


    The results in Table [1-7](#601766_1_En_1_Chapter.xhtml#Tab7) are reasonable enough.


    Table 1-7

    *Results*


    | email |

    | --- |

    | judy.free474@example.net |

    | ray.gunn186@example.net |

    | ray.king144@example.net |

    | ivan.inkling179@example.com |

    | drew.blood475@example.net |

    | seymour.sights523@example.net |

    | ~ 304 rows ~ |


    On the other hand, if you want a list of states, the following is probably *not*
    what you want:


    ```sql

    SELECT state FROM customers;

    ```


    The results in Table [1-8](#601766_1_En_1_Chapter.xhtml#Tab8) are not so reasonable.


    Table 1-8

    *Results*


    | state |

    | --- |

    | NSW |

    | VIC |

    | NSW |

    | WA |

    | QLD |

    | VIC |

    | NSW |

    | NSW |

    | QLD |

    | TAS |

    | ~ 304 rows ~ |


    You will, of course, get a list of all of the `state` values (as well as a few
    `NULL`s which represent missing values). However, you probably *don’t* want the
    duplicates. If you want one of each, you will need to use `DISTINCT`:


    ```sql

    SELECT DISTINCT state FROM customers;   --  one of each

    ```


    The results in Table [1-9](#601766_1_En_1_Chapter.xhtml#Tab9) are probably more
    reasonable.


    Table 1-9

    *Results*


    | state |

    | --- |

    | WA |

    | [NULL] |

    | TAS |

    | VIC |

    | NSW |

    | NT |

    | QLD |

    | SA |

    | ~ 8 rows ~ |


    Using `DISTINCT` treats each value not as an individual value but as a group.
    You can say that you now have the `state` groups.


    Note that one of the groups is `NULL`, meaning that you also have some missing
    states.


    The `DISTINCT` operator acts only on what is in the `SELECT` clause. If you add
    the `town` column as well:


    ```sql

    SELECT DISTINCT state, town FROM customers; --  one of each

    ```


    You’ll get results like Table [1-10](#601766_1_En_1_Chapter.xhtml#Tab10).


    Table 1-10

    *Results*


    | state | town |

    | --- | --- |

    | SA | Windsor |

    | [NULL] | [NULL] |

    | VIC | Belmont |

    | SA | Alberton |

    | NSW | Hamilton |

    | WA | Wattle Grove |

    | VIC | Stirling |

    | VIC | Gordon |

    | TAS | Beaconsfield |

    | SA | Richmond |

    | ~ 79 rows ~ |


    Here, you will get distinct *combinations* of `state` and `town`. In the result
    set, it’s not the `state` which is distinct nor the `town`—it’s the combination.
    We can say that we now have `state`/`town` groups.


    Again, you will see the `NULL` as a separate group. In this set of data, there
    is no state without a town and vice versa, which is why there’s only one group
    with `NULL`s.


    ## Summary


    Here is a sample of the SQL we have been developing:


    ```sql

    /*  SQL Sampler

    ================================================

    This is an introductory SELECT statement

    The rest of the book will go into more detail

    ================================================ */

    SELECT

    id,

    --  email,

    givenname, familyname,

    height/2.54 as inches   -- 2.54 cm = 1 inch

    FROM customers

    WHERE state=''NSW''

    ORDER BY familyname,givenname;

    ```


    This illustrates the main parts of an SQL `SELECT` statement, as well as the use
    of comments and layout.


    The basic SELECT statement is


    ```sql

    SELECT columns

    FROM table;

    ```


    Note that `SELECT` is evaluated *after* `FROM`.


    ### Writing SQL


    SQL is a simple language which has a few rules and a few recommendations for readability.


    *   SQL is relaxed about using extra spacing. You should use as much spacing as
    required to make your SQL more readable.

    *   Each SQL statement ends with a semicolon (;).

    *   The SQL language is case insensitive, as are the column names. Table names
    may be case sensitive, depending on the operating system.


    Remember, some parts of the language are flexible, but there is still a strict
    syntax to be followed.'
  raw: '## Filtering Rows


    Often, you don’t want all rows of a table, but only some of them. The `WHERE`
    clause is used to decide which rows to select:


    ```

    SELECT

    id,

    givenname,familyname,

    height/2.54 AS inches

    FROM customers

    WHERE state=''NSW'';

    ```


    This time, you get what’s in Table [1-5](#601766_1_En_1_Chapter.xhtml#Tab5).


    Table 1-5


    *Results*


    | id | givenname | familyname | inches |

    | --- | --- | --- | --- |

    | 474 | Judy | Free | [NULL] |

    | 144 | Ray | King | 69.606… |

    | 341 | Val | Idate | 69.724… |

    | 351 | Dick | Tate | 66.063… |

    | 429 | Tom | Morrow | 61.772… |

    | 234 | Nat | Ering | 67.638… |

    | ~ 67 rows ~ |


    The expression `state=''NSW''` is called an **assertion** and is either `true`
    or `false`. The `WHERE` clause selects only those rows where the assertion is
    `true`.


    Note the single quotes `'' … ''` around the `NSW`. In SQL, text values are called
    **strings** and are enclosed in single quotes. Don’t use double quotes `" … "`
    because most DBMSs will interpret double quotes differently. Also, note that the
    string is in UPPER CASE, which matches the data in the customers table. In some
    DBMSs, you can also use lower case, but not in others.


    You will learn more about strings later in the book.


    ### Clause Ordering


    The `WHERE` clause is evaluated *after* `FROM`, but before `SELECT`:


    ```

    SELECT …

    FROM …

    --  SELECT processed here!

    WHERE … ;

    ```


    In English, this reads as


    1.  Start with the table.


    2.  Filter some rows.


    3.  Select some columns.


    Remember, however, that you must write the SQL in the preceding order.


    ### Placing the Semicolon


    When developing your code, it is easy to make the following mistake:


    ```

    SELECT *

    FROM customers;

    WHERE state=''NSW''   --  oops

    ```


    This is because you have correctly ended the previous version with a semicolon
    and simply added a new clause after it. While you are developing your code, it
    may be helpful to put the semicolon on a separate line:


    ```

    SELECT *

    FROM customers

    WHERE state=''NSW''

    ;

    ```


    This makes it easier to add the additional clauses as you go. You can always tidy
    up the semicolon when you have finished everything.


    ## Ordering the Results


    Mathematically speaking, a table is a **set** of rows. Among other things, this
    means that row order is insignificant.


    Some DBMSs will output the results in the same order they were added. Some DBMSs
    will output them in a seemingly random order, depending on how the data is managed
    internally.


    The SQL standard makes a point of *not* telling a DBMS how to do its job, and
    the only guarantee is that row order is *not* guaranteed, that is, unless you
    force the issue.


    The `ORDER BY` clause puts the results in a specified order:


    ```

    SELECT

    id,

    givenname, familyname,

    height/2.54 as inches

    FROM customers

    WHERE state=''NSW''

    ORDER BY familyname, givenname;

    ```


    The results will appear in Table [1-6](#601766_1_En_1_Chapter.xhtml#Tab6).


    Table 1-6


    *Results*


    | id | givenname | familyname | inches |

    | --- | --- | --- | --- |

    | 44 | Helen | Back | 67.913… |

    | 162 | Ginger | Beer | 70.039… |

    | 99 | Minnie | Bus | 65.315… |

    | 270 | Mary | Christmas | 65.118… |

    | 487 | Horace | Cope | 68.622… |

    | 419 | Barbie | Cue | 62.520… |

    | ~ 67 rows ~ |


    In this example, you order the results by `familyname` and, in the event of a
    tie, by the `givenname`.


    You can order by one or more columns, in ascending or descending order.


    Strictly speaking, the result is no longer a set, as a set is unordered. In some
    cases, you won’t be able to do any more processing once the `ORDER BY` clause
    is used.


    You will learn more about the `ORDER BY` clause later.


    ### Clause Order


    The `ORDER BY` is both written and evaluated last:


    ```

    SELECT …

    FROM …

    WHERE …

    --  SELECT processed here

    ORDER BY … ;

    ```


    In English, this reads as


    1.  Start with the table.


    2.  Filter some rows.


    3.  Select some columns.


    4.  Finally, sort the results.


    Remember, however, that you must still write the SQL in the preceding order.


    ## Distinct Rows


    Sometimes, you will need to interpret what somebody asks for. For example, if
    you want a list of email addresses, the following would do the job:


    ```

    SELECT email FROM customers;

    ```


    The results in Table [1-7](#601766_1_En_1_Chapter.xhtml#Tab7) are reasonable enough.


    Table 1-7


    *Results*


    | email |

    | --- |

    | judy.free474@example.net |

    | ray.gunn186@example.net |

    | ray.king144@example.net |

    | ivan.inkling179@example.com |

    | drew.blood475@example.net |

    | seymour.sights523@example.net |

    | ~ 304 rows ~ |


    On the other hand, if you want a list of states, the following is probably *not*
    what you want:


    ```

    SELECT state FROM customers;

    ```


    The results in Table [1-8](#601766_1_En_1_Chapter.xhtml#Tab8) are not so reasonable.


    Table 1-8


    *Results*


    | state |

    | --- |

    | NSW |

    | VIC |

    | NSW |

    | WA |

    | QLD |

    | VIC |

    | NSW |

    | NSW |

    | QLD |

    | TAS |

    | ~ 304 rows ~ |


    You will, of course, get a list of all of the state values (as well as a few `NULL`s
    which represent missing values). However, you probably *don’t* want the duplicates.
    If you want one of each, you will need to use `DISTINCT`:


    ```

    SELECT DISTINCT state FROM customers;   --  one of each

    ```


    The results in Table [1-9](#601766_1_En_1_Chapter.xhtml#Tab9) are probably more
    reasonable.


    Table 1-9


    *Results*


    | state |

    | --- |

    | WA |

    | [NULL] |

    | TAS |

    | VIC |

    | NSW |

    | NT |

    | QLD |

    | SA |

    | ~ 8 rows ~ |


    Using `DISTINCT` treats each value not as an individual value but as a group.
    You can say that you now have the state groups.


    Note that one of the groups is `NULL`, meaning that you also have some missing
    states.


    The `DISTINCT` operator acts only on what is in the `SELECT` clause. If you add
    the `town` column as well:


    ```

    SELECT DISTINCT state, town FROM customers; --  one of each

    ```


    You’ll get results like Table [1-10](#601766_1_En_1_Chapter.xhtml#Tab10).


    Table 1-10


    *Results*


    | state | town |

    | --- | --- |

    | SA | Windsor |

    | [NULL] | [NULL] |

    | VIC | Belmont |

    | SA | Alberton |

    | NSW | Hamilton |

    | WA | Wattle Grove |

    | VIC | Stirling |

    | VIC | Gordon |

    | TAS | Beaconsfield |

    | SA | Richmond |

    | ~ 79 rows ~ |


    Here, you will get distinct *combinations* of state and town. In the result set,
    it’s not the `state` which is distinct nor the `town`—it’s the combination. We
    can say that we now have state/town groups.


    Again, you will see the `NULL` as a separate group. In this set of data, there
    is no state without a town and vice versa, which is why there’s only one group
    with `NULL`s.


    ## Summary


    Here is a sample of the SQL we have been developing:


    ```

    /*  SQL Sampler

    ================================================

    This is an introductory SELECT statement

    The rest of the book will go into more detail

    ================================================ */

    SELECT

    id,

    --  email,

    givenname, familyname,

    height/2.54 as inches   -- 2.54 cm = 1 inch

    FROM customers

    WHERE state=''NSW''

    ORDER BY familyname,givenname;

    ```


    This illustrates the main parts of an SQL `SELECT` statement, as well as the use
    of comments and layout.


    The basic SELECT statement is


    ```

    SELECT columns

    FROM table;

    ```


    Note that `SELECT` is evaluated *after* `FROM`.


    ### Writing SQL


    SQL is a simple language which has a few rules and a few recommendations for readability.


    *   SQL is relaxed about using extra spacing. You should use as much spacing as
    required to make your SQL more readable.


    *   Each SQL statement ends with a semicolon (;).


    *   The SQL language is case insensitive, as are the column names. Table names
    may be case sensitive, depending on the operating system.


    Remember, some parts of the language are flexible, but there is still a strict
    syntax to be followed.'
  trans: '## 筛选行


    通常，你并不想要表中的所有行，而只需要其中的一部分。`WHERE` 子句用于决定选择哪些行：


    ```sql

    SELECT

    id,

    givenname,familyname,

    height/2.54 AS inches

    FROM customers

    WHERE state=''NSW'';

    ```


    这一次，你会得到表 1-5 中的内容。


    表 1-5

    *结果*


    | id | 名字 | 姓氏 | 英寸 |

    | --- | --- | --- | --- |

    | 474 | Judy | Free | [NULL] |

    | 144 | Ray | King | 69.606… |

    | 341 | Val | Idate | 69.724… |

    | 351 | Dick | Tate | 66.063… |

    | 429 | Tom | Morrow | 61.772… |

    | 234 | Nat | Ering | 67.638… |

    | ~ 67 行 ~ |


    表达式 `state=''NSW''` 称为一个**断言**，其结果要么是 `true`，要么是 `false`。`WHERE` 子句只选择那些断言为 `true`
    的行。


    注意 `NSW` 周围的单引号 `'' … ''`。在 SQL 中，文本值被称为**字符串**，并用单引号括起来。不要使用双引号 `" … "`，因为大多数数据库管理系统（DBMS）会以不同方式解释双引号。另外，请注意字符串是大写的，这与
    `customers` 表中的数据相匹配。在一些 DBMS 中，你也可以使用小写，但在另一些中则不行。


    你将在本书后面学到更多关于字符串的知识。


    ### 子句顺序


    `WHERE` 子句是在 `FROM` *之后*、`SELECT` *之前* 进行求值的：


    ```sql

    SELECT …

    FROM …

    --  SELECT 在此处处理！

    WHERE … ;

    ```


    用英语来说，这表示：


    1.  从表开始。

    2.  筛选一些行。

    3.  选择一些列。


    然而，请记住，你必须按照前面的顺序编写 SQL。


    ### 分号的放置


    在开发代码时，很容易犯以下错误：


    ```sql

    SELECT *

    FROM customers;

    WHERE state=''NSW''   --  哎呀

    ```


    这是因为你在前一个版本的结尾正确地使用了分号分隔，然后只是在其后添加了一个新的子句。在开发代码时，将分号放在单独一行可能会有所帮助：


    ```sql

    SELECT *

    FROM customers

    WHERE state=''NSW''

    ;

    ```


    这样在添加额外的子句时会更容易。当你完成所有操作后，你总是可以整理分号的位置。


    ## 对结果排序


    从数学上讲，表是行的一个**集合**。除其他外，这意味着行的顺序是无关紧要的。


    一些 DBMS 会按照数据添加的相同顺序输出结果。一些 DBMS 会以看似随机的顺序输出结果，这取决于数据在内部的管理方式。


    SQL 标准特意*不*告诉 DBMS 如何完成其工作，唯一的保证是行的顺序*不*被保证，也就是说，除非你强制指定。


    `ORDER BY` 子句将结果按指定的顺序排列：


    ```sql

    SELECT

    id,

    givenname, familyname,

    height/2.54 as inches

    FROM customers

    WHERE state=''NSW''

    ORDER BY familyname, givenname;

    ```


    结果将显示在表 1-6 中。


    表 1-6

    *结果*


    | id | 名字 | 姓氏 | 英寸 |

    | --- | --- | --- | --- |

    | 44 | Helen | Back | 67.913… |

    | 162 | Ginger | Beer | 70.039… |

    | 99 | Minnie | Bus | 65.315… |

    | 270 | Mary | Christmas | 65.118… |

    | 487 | Horace | Cope | 68.622… |

    | 419 | Barbie | Cue | 62.520… |

    | ~ 67 行 ~ |


    在这个例子中，你按 `familyname` 排序结果，并且在姓氏相同时，按 `givenname` 排序。


    你可以按一列或多列排序，可以是升序或降序。


    严格来说，结果不再是一个集合，因为集合是无序的。在某些情况下，一旦使用了 `ORDER BY` 子句，你可能就无法再进行任何进一步的处理。


    你将在后面学到更多关于 `ORDER BY` 子句的知识。


    ### 子句顺序


    `ORDER BY` 无论是书写还是求值都是最后的：


    ```sql

    SELECT …

    FROM …

    WHERE …

    --  SELECT 在此处处理

    ORDER BY … ;

    ```


    用英语来说，这表示：


    1.  从表开始。

    2.  筛选一些行。

    3.  选择一些列。

    4.  最后，对结果排序。


    然而，请记住，你仍然必须按照前面的顺序编写 SQL。


    ## 去除重复行


    有时，你需要理解某人的要求是什么。例如，如果你想要一个电子邮件地址列表，以下查询可以完成这项工作：


    ```sql

    SELECT email FROM customers;

    ```


    表 1-7 中的结果相当合理。


    表 1-7

    *结果*


    | email |

    | --- |

    | judy.free474@example.net |

    | ray.gunn186@example.net |

    | ray.king144@example.net |

    | ivan.inkling179@example.com |

    | drew.blood475@example.net |

    | seymour.sights523@example.net |

    | ~ 304 行 ~ |


    另一方面，如果你想要一个州（state）的列表，下面这个查询可能*不是*你想要的：


    ```sql

    SELECT state FROM customers;

    ```


    表 1-8 中的结果就不那么合理了。


    表 1-8

    *结果*


    | state |

    | --- |

    | NSW |

    | VIC |

    | NSW |

    | WA |

    | QLD |

    | VIC |

    | NSW |

    | NSW |

    | QLD |

    | TAS |

    | ~ 304 行 ~ |


    当然，你会得到一个包含所有 `state` 值的列表（以及一些代表缺失值的 `NULL`）。然而，你可能*不*想要重复项。如果你想要每个值只出现一次，你需要使用
    `DISTINCT`：


    ```sql

    SELECT DISTINCT state FROM customers;   --  每个值只取一次

    ```


    表 1-9 中的结果可能更合理。


    表 1-9

    *结果*


    | state |

    | --- |

    | WA |

    | [NULL] |

    | TAS |

    | VIC |

    | NSW |

    | NT |

    | QLD |

    | SA |

    | ~ 8 行 ~ |


    使用 `DISTINCT` 会将每个值视为一个组，而不是单个值。可以说你现在拥有了 `state` 的分组。


    注意其中一组是 `NULL`，这意味着你还有一些缺失的州。


    `DISTINCT` 操作符只作用于 `SELECT` 子句中的内容。如果你也添加 `town` 列：


    ```sql

    SELECT DISTINCT state, town FROM customers; --  每个组合只取一次

    ```


    你会得到类似表 1-10 的结果。


    表 1-10

    *结果*


    | state | town |

    | --- | --- |

    | SA | Windsor |

    | [NULL] | [NULL] |

    | VIC | Belmont |

    | SA | Alberton |

    | NSW | Hamilton |

    | WA | Wattle Grove |

    | VIC | Stirling |

    | VIC | Gordon |

    | TAS | Beaconsfield |

    | SA | Richmond |

    | ~ 79 行 ~ |


    在这里，你将获得 `state` 和 `town` 的不同*组合*。在结果集中，去重的不是 `state` 也不是 `town`——而是它们的组合。可以说我们现在拥有了
    `state`/`town` 的分组。


    同样，你会看到 `NULL` 作为一个单独的分组。在这组数据中，没有不带城镇的州，反之亦然，这就是为什么只有一个包含 `NULL` 的分组。


    ## 总结


    以下是我们一直在开发的 SQL 示例：


    ```sql

    /*  SQL 示例

    ================================================

    这是一个介绍性的 SELECT 语句

    本书的其余部分将更详细地介绍

    ================================================ */

    SELECT

    id,

    --  email,

    givenname, familyname,

    height/2.54 as inches   -- 2.54 cm = 1 英寸

    FROM customers

    WHERE state=''NSW''

    ORDER BY familyname,givenname;

    ```


    这说明了 SQL `SELECT` 语句的主要部分，以及注释和布局的使用。


    基本的 SELECT 语句是：


    ```sql

    SELECT columns

    FROM table;

    ```


    注意 `SELECT` 是在 `FROM` *之后* 进行求值的。


    ### 编写 SQL


    SQL 是一种简单的语言，有一些规则和一些关于可读性的建议。


    *   SQL 对使用额外空格的要求比较宽松。你应该使用足够的空格，以使你的 SQL 更具可读性。

    *   每个 SQL 语句以分号 (;) 结尾。

    *   SQL 语言对大小写不敏感，列名也是如此。表名可能对大小写敏感，这取决于操作系统。


    请记住，语言的某些部分是灵活的，但仍然必须遵循严格的语法。'
- fmt: '### Columns


    `SELECT`语句将从表中选择一列或多列数据。


    *   你可以按任意顺序选择列。

    *   `SELECT *`表达式用于选择*所有*列。

    *   列可以是计算得出的。

    *   计算列应使用别名命名；非计算列也可以使用别名。


    请记住，在编写良好的SQL语句中，你不应该使用`SELECT *`来选择列。然而，在本书中，我们将使用它来专注于新子句的介绍。


    ### Comments


    注释是提供给阅读者看的附加文本，会被SQL忽略。


    *   SQL有标准的单行注释：`-- etc`

    *   大多数DBMS还支持非标准的块注释：`/* … */`

    *   注释可用于解释某些内容或充当章节标题。它们也可以用于禁用部分代码，就像你在进行故障排除或测试时可能做的那样。


    请记住，要谨慎使用注释，仅在它们确实能告诉读者需要知道的信息时才使用。


    ### Filtering Data


    可以使用`WHERE`子句来过滤行。


    *   有时，过滤结果可能没有任何行；这并非错误。

    *   在过滤字符串时，值可能区分大小写，也可能不区分，这取决于DBMS和实际的数据库。


    `WHERE`子句可用于返回已知是唯一的单行，或行的一个子集。偶尔，你可能得到没有任何匹配条件的行。


    ### Row Order


    SQL表是无序的行集合。


    *   行的顺序是无关紧要的，并且可能出乎意料。

    *   你可以使用`ORDER BY`子句对结果进行排序。


    从技术上讲，一旦你使用了`ORDER BY`，结果就不再是一个真正的集合。通常，这无关紧要，但有些操作在`ORDER BY`之后无法执行。


    ### Clause Order


    到目前为止介绍的四个主要子句是按以下顺序编写的：


    ```sql

    SELECT columns

    FROM table

    WHERE conditions

    --  SELECT 在此处被求值

    ORDER BY columns

    ```


    `SELECT`子句是在`ORDER BY`子句之前最后被求值的。


    ## 即将介绍的内容


    以上是对SQL工作原理的简单示例。在接下来的章节中，你将看到关于各个子句的更多细节，以及如何处理多个表、如何计算和汇总数据，以及如何对数据进行简单的更改。


    然而在此之前，我们将先了解一下SQL数据库是如何构建的。


    # 2. Database


    在第[1]章中，你体验了使用SQL从数据库中提取数据。我们当时有点摸不着头脑，因为我们并未完全了解数据库中有什么。遗憾的是，在现实生活中情况常常如此，但在这里，我们将更仔细地审视数据库本身。


    在本章中，我们将探讨其内部机制。这将从两个方面进行：


    *   你将了解数据库设计的理论和实践：为什么它是这样的？

    *   你还将了解示例数据库本身的细节：这个数据库里具体有什么？


    理论部分不会太重。你将了解表，它是所有数据的基础结构，以及所谓规范表的规则：数据如何被组织得尽可能简单可靠。你还将了解我们如何处理多值情况。


    示例数据库遵循典型的设计，即使它是一个相当小的数据库。它将包含足够的内容以使其值得搜索和分析。更重要的是，它将包含我们需要探索的几乎所有内容。


    ## About the Sample Database


    对于示例数据库，我们将设想一个在线商店，销售著名艺术作品的印刷复制品。


    为了管理这个商店，我们至少需要以下表格：


    *   一个`customers`表，用于保存客户详细信息。

    *   一个`paintings`表，包含可用画作的一些详细信息。这*不是*库存表，因为画作是按需印刷的。

    *   画作的一个细节是艺术家。我们不会在`paintings`表中存储艺术家的详细信息。相反，有一个单独的表，并且画作通过引用与艺术家关联。

    *   一个`artists`表，在前面的`paintings`表中被引用。

    *   *两个*表来管理销售：一个`sales`表用于管理客户购买，一个`saleitems`表用于管理销售中的各个商品。


    图[2-1]将让你对数据库的结构有一个清晰的了解。


    ![图 2-1](images/601766_1_En_2_Chapter/601766_1_En_2_Fig1_HTML.jpg)

    图 2-1 示例数据库


    在本章中，我们将了解设计数据库时考虑的一些理念，并且我们也将更详细地查看用于练习的示例数据库。


    ### Database


    SQL数据库基于关系数据库理论。而关系数据库理论又基于一些重要的数学概念，包括集合和逻辑。


    关系数据库的一个重要原则是：


    *每个数据项都有一个唯一的位置。*


    这尤其意味着：


    *   数据永不重复。

    *   永远不会对*在哪里*放置或查找一个数据项产生任何歧义。


    理论上，SQL数据库是“纯”关系数据库的一个有限版本。因此，我们将更具体地称它们为SQL数据库。


    #### Database Terminology


    我们将尽量不纠结于术语，但有些术语对于澄清问题很重要。


    **数据库**是数据的集合。理论上，这些数据可以以任何你喜欢的方式管理，例如在文字处理文档、记录卡或木片上的凹口里。当然，这里我们谈论的是在计算机系统上管理数据。


    **DBMS**是管理数据的软件。当然，有许多可用的DBMS，本书涵盖了一些比较流行的。


    SQL，或结构化查询语言（官方上，它的发音就是按字母拼读），是与数据库通信的语言。有一个官方的ISO标准，但所有的DBMS都对这个标准有所变通。


    一些用户试图将其发音为**SeQueL**，这曾被提议为其正式名称。由于与其他软件存在命名冲突，最终它被称为**SQL**。如果你愿意，你也可以将其发音为**SQuaLl**、**SQueaL**、**SQueLch**或**SQuaLlid**。


    #### Data vs. Value


    你的名字是什么？我们将把你的名字称为一个**数据**项。而对这个问题的*回答*，则被称为其**值**。


    将数据视为一个占位符（例如表格上的一个框），而值则是占位符的内容。


    说数据永不重复意味着你的名字只有一个占位符：没有重复项。


    另一方面，*值*可以被复制。没有什么能阻止另一个人拥有和你一样的名字。然而，在其技术性的、非神秘的意义上，这将被视为一种**巧合**。


    更重要的是，更改你的名字的值并不会强制另一个人也要做同样的更改。值之间是相互独立的。


    ### Tables


    一个SQL数据库是**不同**表的集合。每个表描述一种数据类型，例如一个客户或一幅画。


    例如：


    ```sql

    SELECT * FROM customers;

    SELECT * FROM paintings;

    ```


    当你运行前面的代码时，你会发现客户表与画作无关，反之亦然。'
  raw: '### Columns


    The `SELECT` statement will select one or more columns of data from a table.


    *   You can select columns in any order.


    *   The `SELECT *` expression is used to select *all* columns.


    *   Columns may be calculated.


    *   Calculated columns should be named with an alias; noncalculated columns can
    also be aliased.


    Remember that in well-written SQL statements, you shouldn’t use `SELECT *` for
    your columns. However, in this book we’ll use it to focus on the new clauses.


    ### Comments


    A comment is additional text for the human reader which is ignored by SQL.


    *   SQL has a standard single-line comment: `-- etc`


    *   Most DBMSs also support the non-standard block comment: `/* … */`


    *   Comments can be used to explain something or to act as section headers. They
    can also be used to disable some code as you might when troubleshooting or testing.


    Remember to use comments sparingly, only when they actually tell the reader what
    they need to know.


    ### Filtering Data


    Rows can be filtered with a `WHERE` clause.


    *   Sometimes, the filter results in no rows at all; this is not an error.


    *   When filtering strings, the values may or may not be case sensitive, depending
    on the DBMS and the actual database.


    The `WHERE` clause can be used to return a single row, which is known to be unique,
    or a subset of rows. Occasionally, you’ll get nothing which matches the criterion.


    ### Row Order


    SQL tables are unordered collections of rows.


    *   Row order is insignificant and may be unexpected.


    *   You can sort the results using an `ORDER BY` clause.


    Technically, once you use `ORDER BY`, the result is not a true set. Often, that
    doesn’t matter, but some operations can’t be performed after `ORDER BY`.


    ### Clause Order


    The four main clauses so far are written in this order:


    ```

    SELECT columns

    FROM table

    WHERE conditions

    --  SELECT is evaluated here

    ORDER BY columns

    ```


    The `SELECT` clause is the last to be evaluated before the `ORDER BY` clause.


    ## Coming Up


    This has been a simple sampler of how SQL works. In the following chapters, you’ll
    see more details on the individual clauses as well as how to work with multiple
    tables, how to calculate and summarize data, and how to make simple changes to
    the data.


    Before that, however, we’ll have a look at how SQL databases are structured.


    Footnotes [1](#601766_1_En_1_Chapter.xhtml#Fn1_source)


    # 2. Database


    In Chapter [1](#601766_1_En_1_Chapter.xhtml), you had a taste of using SQL to
    extract data from a database. We were a little bit in the dark there, since we
    weren’t fully informed about what was in the database. Sadly, that’s often the
    case in real life, but here we’ll get a better look at the databases itself.


    In this chapter, we’ll look at what’s going on. This will be on two fronts:


    *   You’ll learn a little about the theory and practice of database design: Why
    is it the way it is?


    *   You’ll also learn about the details of the sample database itself: What specifically
    is in this database?


    The theory part won’t be too heavy. You’ll learn about tables, which are the basic
    structure of all data, and the rules of so-called normal tables: how data is structured
    to be as simple and reliable as possible. You’ll also look at how we manage working
    with multiple values.


    The sample database follows a typical design, even if it’s quite a small database.
    It will have enough to make it worth searching and analyzing. More to the point,
    it will have a bit of everything we need to explore.


    ## About the Sample Database


    For the sample database, we will imagine an online store selling printed copies
    of famous artworks.


    To manage the store, we will need (at least) the following tables:


    *   A table of `customers` which will hold the customer details.


    *   A table of `paintings` with some details of the paintings available. This
    is *not* a stock table, since the paintings will be printed on demand.


    *   One detail of the paintings is the artist. We do not store the artist’s details
    in the `paintings` table. Instead, there is a separate table, and the painting
    has a reference to the artist.


    *   A table of `artists`, referred to in the preceding `paintings` table.


    *   *Two* tables to manage the sales: a `sales` table to manage a customer purchase
    and a `saleitems` table to manage the individual items in a sale.


    Figure [2-1](#601766_1_En_2_Chapter.xhtml#Fig1) will give you a good idea of how
    the database is structured.


    ![](images/601766_1_En_2_Chapter/601766_1_En_2_Fig1_HTML.jpg)


    The relational database has tables for customers, paintings, artists, and sales,
    with columns for various attributes such as i d, email, title, price, description,
    etc. The tables are related to each other using foreign keys, such as artist i
    d in paintings table referencing i d in artists table and customer i d in sales
    table referencing i d in customers table.


    Figure 2-1


    The Sample Database


    In this chapter, we’ll have a look at some of the ideas that go into designing
    a database, and we will also get a closer look at the sample database for the
    exercises.


    ### Database


    SQL databases are based on the theory of Relational Database. In turn, this is
    based on some important mathematical concepts, including Sets and Logic.


    An important principle of Relational Database is this:


    *There is one unique place for each item of data.*


    In particular, this means


    *   Data is never repeated.


    *   There is never any ambiguity as to *where* to place or find an item of data.


    In theory, SQL databases are a limited version of “pure” Relational Databases.
    For this reason, we will refer to them more specifically as SQL databases.


    #### Database Terminology


    We’ll try not to get too pedantic on terminology, but some terms are important
    to make things clear.


    A **database** is a collection of data. In theory, this data can be managed any
    way you like, such as in word processing documents or record cards or on notches
    on pieces of wood. Here, of course, we’re talking about managing the data on a
    computer system.


    A **DBMS** is the software that manages the data. There are, of course, many DBMSs
    available, and this book accommodates some of the more popular ones.


    SQL, or Structured Query Language (officially, it is pronounced as it is spelled),
    is the language used to communicate with the database. There is an official ISO
    standard, but all DBMSs have variations on this standard.


    Some users try to pronounce it as **SeQueL**, which was earlier proposed as its
    official name. Due to a naming conflict with other software, in the end it was
    just called **SQL**. If you like, you can also pronounce it as **SQuaLl**, **SQueaL**,
    **SQueLch**, or **SQuaLlid**.


    #### Data vs. Value


    What is your given name? We will refer to your given name as an item of **data**.
    The *answer* to the question, however, will be referred to as its **value**.


    Think of data as a placeholder (such as a box on a form) and a value as the contents
    of the placeholder.


    To say that data is never repeated means that there is only one placeholder for
    your name: there are no duplicates.


    On the other hand, *values* may be duplicated. There is nothing stopping another
    person from having the same name as you. However, that would be regarded as a
    **coincidence** in its technical, nonmysterious sense.


    More importantly, changing the value of your name places no obligation on the
    other person to do the same. Values are independent of each other.


    ### Tables


    An SQL database is a collection of **distinct** tables. Each table describes a
    type of data, such as a customer or a painting.


    For example:


    ```

    SELECT * FROM customers;

    SELECT * FROM paintings;

    ```


    When you run the preceding code, you will find that the customer table has nothing
    to say about paintings, and vice versa.'
  trans: '### Columns


    `SELECT`语句将从表中选择一列或多列数据。


    *   你可以按任意顺序选择列。

    *   `SELECT *`表达式用于选择*所有*列。

    *   列可以是计算得出的。

    *   计算列应使用别名命名；非计算列也可以使用别名。


    请记住，在编写良好的 SQL 语句中，你不应该使用`SELECT *`来选择列。然而，在本书中，我们将使用它来专注于新子句的介绍。


    ### Comments


    注释是提供给阅读者看的附加文本，会被 SQL 忽略。


    *   SQL 有标准的单行注释：`-- etc`

    *   大多数 DBMS 还支持非标准的块注释：`/* … */`

    *   注释可用于解释某些内容或充当章节标题。它们也可以用于禁用部分代码，就像你在进行故障排除或测试时可能做的那样。


    请记住，要谨慎使用注释，仅在它们确实能告诉读者需要知道的信息时才使用。


    ### Filtering Data


    可以使用`WHERE`子句来过滤行。


    *   有时，过滤结果可能没有任何行；这并非错误。

    *   在过滤字符串时，值可能区分大小写，也可能不区分，这取决于 DBMS 和实际的数据库。


    `WHERE`子句可用于返回已知是唯一的单行，或行的一个子集。偶尔，你可能得到没有任何匹配条件的行。


    ### Row Order


    SQL 表是无序的行集合。


    *   行的顺序是无关紧要的，并且可能出乎意料。

    *   你可以使用`ORDER BY`子句对结果进行排序。


    从技术上讲，一旦你使用了`ORDER BY`，结果就不再是一个真正的集合。通常，这无关紧要，但有些操作在`ORDER BY`之后无法执行。


    ### Clause Order


    到目前为止介绍的四个主要子句是按以下顺序编写的：


    ```sql

    SELECT columns

    FROM table

    WHERE conditions

    --  SELECT 在此处被求值

    ORDER BY columns

    ```


    `SELECT`子句是在`ORDER BY`子句之前最后被求值的。


    ## 即将介绍的内容


    以上是对 SQL 工作原理的简单示例。在接下来的章节中，你将看到关于各个子句的更多细节，以及如何处理多个表、如何计算和汇总数据，以及如何对数据进行简单的更改。


    然而在此之前，我们将先了解一下 SQL 数据库是如何构建的。


    # 2. Database


    在第[1]章中，你体验了使用 SQL 从数据库中提取数据。我们当时有点摸不着头脑，因为我们并未完全了解数据库中有什么。遗憾的是，在现实生活中情况常常如此，但在这里，我们将更仔细地审视数据库本身。


    在本章中，我们将探讨其内部机制。这将从两个方面进行：


    *   你将了解数据库设计的理论和实践：为什么它是这样的？

    *   你还将了解示例数据库本身的细节：这个数据库里具体有什么？


    理论部分不会太重。你将了解表，它是所有数据的基础结构，以及所谓规范表的规则：数据如何被组织得尽可能简单可靠。你还将了解我们如何处理多值情况。


    示例数据库遵循典型的设计，即使它是一个相当小的数据库。它将包含足够的内容以使其值得搜索和分析。更重要的是，它将包含我们需要探索的几乎所有内容。


    ## About the Sample Database


    对于示例数据库，我们将设想一个在线商店，销售著名艺术作品的印刷复制品。


    为了管理这个商店，我们至少需要以下表格：


    *   一个`customers`表，用于保存客户详细信息。

    *   一个`paintings`表，包含可用画作的一些详细信息。这*不是*库存表，因为画作是按需印刷的。

    *   画作的一个细节是艺术家。我们不会在`paintings`表中存储艺术家的详细信息。相反，有一个单独的表，并且画作通过引用与艺术家关联。

    *   一个`artists`表，在前面的`paintings`表中被引用。

    *   *两个*表来管理销售：一个`sales`表用于管理客户购买，一个`saleitems`表用于管理销售中的各个商品。


    图[2-1]将让你对数据库的结构有一个清晰的了解。


    ![图 2-1](img/601766_1_En_2_Fig1_HTML.jpg)

    图 2-1 示例数据库


    在本章中，我们将了解设计数据库时考虑的一些理念，并且我们也将更详细地查看用于练习的示例数据库。


    ### Database


    SQL 数据库基于关系数据库理论。而关系数据库理论又基于一些重要的数学概念，包括集合和逻辑。


    关系数据库的一个重要原则是：


    *每个数据项都有一个唯一的位置。*


    这尤其意味着：


    *   数据永不重复。

    *   永远不会对*在哪里*放置或查找一个数据项产生任何歧义。


    理论上，SQL 数据库是“纯”关系数据库的一个有限版本。因此，我们将更具体地称它们为 SQL 数据库。


    #### Database Terminology


    我们将尽量不纠结于术语，但有些术语对于澄清问题很重要。


    **数据库**是数据的集合。理论上，这些数据可以以任何你喜欢的方式管理，例如在文字处理文档、记录卡或木片上的凹口里。当然，这里我们谈论的是在计算机系统上管理数据。


    **DBMS**是管理数据的软件。当然，有许多可用的 DBMS，本书涵盖了一些比较流行的。


    SQL，或结构化查询语言（官方上，它的发音就是按字母拼读），是与数据库通信的语言。有一个官方的 ISO 标准，但所有的 DBMS 都对这个标准有所变通。


    一些用户试图将其发音为**SeQueL**，这曾被提议为其正式名称。由于与其他软件存在命名冲突，最终它被称为**SQL**。如果你愿意，你也可以将其发音为**SQuaLl**、**SQueaL**、**SQueLch**或**SQuaLlid**。


    #### Data vs. Value


    你的名字是什么？我们将把你的名字称为一个**数据**项。而对这个问题的*回答*，则被称为其**值**。


    将数据视为一个占位符（例如表格上的一个框），而值则是占位符的内容。


    说数据永不重复意味着你的名字只有一个占位符：没有重复项。


    另一方面，*值*可以被复制。没有什么能阻止另一个人拥有和你一样的名字。然而，在其技术性的、非神秘的意义上，这将被视为一种**巧合**。


    更重要的是，更改你的名字的值并不会强制另一个人也要做同样的更改。值之间是相互独立的。


    ### Tables


    一个 SQL 数据库是**不同**表的集合。每个表描述一种数据类型，例如一个客户或一幅画。


    例如：


    ```sql

    SELECT * FROM customers;

    SELECT * FROM paintings;

    ```


    当你运行前面的代码时，你会发现客户表与画作无关，反之亦然。'
- fmt: "#### Table Terminology\n\nSQL uses the language of tables, and tables have\
    \ rows and columns.\n\n*   A `table` is a collection, such as a collection of\
    \ customers.\n*   A `row` is an instance or member of that collection, such as\
    \ one of the customers.\n*   A `column` is a detail of the members, such as the\
    \ date of birth of the customer.\n\nYou will sometimes see some other words used\
    \ to describe the data, but they are not the language of SQL. Table [2-1](#601766_1_En_2_Chapter.xhtml#Tab1)\
    \ shows some of the alternative terminology used for some of the concepts.\n\n\
    **Table 2-1** Alternative Names\n\n| | Relational Database | SQL | Other |\n|\
    \ --- | --- | --- | --- |\n| Collection | Relation | Table | File |\n| Instance\
    \ | Tuple | Row | Record |\n| Detail | Attribute | Column | Field |\n\nIn particular,\
    \ avoid using the terms `Record` and `Field` in the company of other SQL developers,\
    \ as they will tend to look down their noses at you. On the other hand, the word\
    \ `Field` in particular does sometimes appear in official documentation, so it’s\
    \ not quite so bad.\n\nIn this book, we will use the standard SQL terminology.\
    \ You will sometimes see the word `record` used in its original sense, that of\
    \ saving information.\n\n### Normalized Tables\n\nIn principle, you could organize\
    \ your data table any way you want, but if you want your data to be as maintainable\
    \ as possible, it needs to follow some rules.\n\nThe following rules are not there\
    \ just to make the game more interesting. The rules will result in tables where\
    \ data is in its simplest, most dependable form. Mathematicians refer to this\
    \ form as its `normal` form.\n\nOverall, the goal of normalization is to ensure\
    \ that every piece of data has exactly one place. There should be no repetitions\
    \ and no ambiguity.\n\nAs you’ll see, this often results in creating additional\
    \ tables, so the data you’re looking for may be spread all over the place. That\
    \ can be inconvenient. Later, when we look at joining tables, we’ll see how we\
    \ can manage this inconvenience.\n\nDatabase theory defines a number of levels\
    \ of normalization, but most of the principles are covered in the following text.\n\
    \nIn real life, you’ll find that database developers often relax some of these\
    \ principles to avoid spreading the data in too many places, making even the simplest\
    \ query a challenge. However, that always risks making the data less reliable.\n\
    \n#### Data Is Atomic\n\nIf you select\n\n```sql\nSELECT\n    id,\n    givenname,\
    \ familyname\nFROM customers;\n```\n\nyou will note that the given name and family\
    \ name are in separate columns. This makes it easier to sort the data and to search\
    \ for it.\n\nData should be in its smallest *practical* unit. If it is, we say\
    \ that the data is `atomic`, from a Greek word meaning that it can’t get any smaller.\n\
    \nNote the word “practical” earlier. You could try the same thing with the email\
    \ address:\n\n```sql\nSELECT\n    id,\n    email\nFROM customers;\n```\n\nYou\
    \ could possibly argue that the email address could be broken down further into\
    \ two parts: `user@host`. If you really want to, go ahead. However, most would\
    \ argue that this is getting carried away, since you will probably *never* use\
    \ the parts separately.\n\nOn the other hand, if you really need to group customers\
    \ by their email host, such as for filtering or sorting purposes, then the email\
    \ address should indeed be separated into two columns.\n\nDeciding whether data\
    \ should be further separated is one of the skills of the experienced database\
    \ developer.\n\n#### Columns Are Independent\n\nWhen you select multiple columns:\n\
    \n```sql\nSELECT\n    id,\n    givenname, familyname,\n    phone,\n    dob\nFROM\
    \ customers;\n```\n\none thing you will notice is that the value in one column\
    \ offers no clue to the value in another column. Knowing your date of birth, for\
    \ example, tells us nothing about your phone number. Further, changing your date\
    \ of birth doesn’t require a change in your phone number.^(2)\n\nThis is a key\
    \ factor to maintaining “clean” data. It means you can maintain a single item\
    \ of data without affecting anything else.\n\nNot all tables strictly follow this\
    \ rule. For example:\n\n```sql\nSELECT\n    id,\n    givenname, familyname,\n\
    \    street,\n    town, state, postcode\nFROM customers;\n```\n\nIf the customer\
    \ changes their address, you will probably have to update *four* items of data\
    \ (`street`, `town`, `state`, and `postcode`). On top of that, changing the postcode\
    \ may well dictate the state and town. Clearly, these three are not independent\
    \ of each other. Even the street is limited: the same street name may or may not\
    \ exist in the next town, but the street number may still be wrong.\n\n*This is\
    \ a weakness in the design of the sample `customers` table. The correct approach\
    \ would involve another table of locations, so that the `customers` table contains\
    \ a single reference to one of the locations.*\n\nSometimes, we can get away with\
    \ a loose design, but that won’t be forever. At some point in the future, a customer’s\
    \ address will have been partially updated, and your data will have lost some\
    \ reliability.\n\nFor now, we’ll stick to this loose design and hope for the best.\
    \ This is because getting a complete list of all possible addresses is too difficult.\n\
    \n#### Columns Are of a Single Type\n\nIf you examine a date column:\n\n```sql\n\
    SELECT\n    id, givenname, familyname,\n    dob\nFROM customers;\n```\n\nyou will\
    \ notice that all the values in the `dob` column are, of course, dates. By design,\
    \ the `dob` column will only accept dates, not numbers or strings or any other\
    \ type of data.\n\nIn SQL, each column is assigned a single type.^(3) The only\
    \ values you can enter must be compatible with that type.\n\nThere are a number\
    \ of advantages to this principle:\n\n*   Limiting the data type affords a little\
    \ validity checking; for example, a number or a string would be invalid for a\
    \ date of birth.\n*   When you need to process the data, such as calculating the\
    \ age from the date of birth, SQL doesn’t have to handle the sorts of errors you\
    \ get from inappropriate data, because there isn’t any.\n*   When sorting data,\
    \ the data type will affect the results. You will see more of this in Chapter\
    \ [4](#601766_1_En_4_Chapter.xhtml) on sorting.\n\nThere are a few disadvantages\
    \ too. For example, with dates:\n\n*   You can’t vary the level of detail, such\
    \ as recording just the year or including the time in a date column.\n*   You\
    \ can’t have text, such as “a long time ago” or “year of the aardvark,” in a date\
    \ column.\n\nIn Relational Theory, acceptable values for an item of data are referred\
    \ to as its `domain`. For example:\n\n```sql\nSELECT\n    id,\n    givenname,\
    \ familyname,\n    state\nFROM customers;\n```\n\nThe value of `state` is a string,\
    \ which in theory could be any string, but really should be limited to legitimate\
    \ state name abbreviations.\n\n#### Rows Are Unordered\n\nMore realistically,\
    \ row order is not significant.\n\nIf you simply select from the table:\n\n```sql\n\
    SELECT *\nFROM customers;\n```\n\nthere is no guarantee what order the rows will\
    \ be in. In database theory, that’s perfectly fine, since a collection is unordered.\n\
    \nThe SQL standard makes a point of *not* saying anything about row order. In\
    \ particular\n\n*   The data itself may be *stored* in any order the DBMS sees\
    \ fit.\n*   The data may be *returned* in any order the DBMS sees fit.\n\nWith\
    \ some DBMSs, the data may appear to be in a random order. With some, however,\
    \ it may be in `insertion order`: the order in which the data was added. However,\
    \ the actual order will depend on how the data has been processed as well as how\
    \ the data has changed.\n\nOf course, you can always impose your own order using\
    \ the `ORDER BY` clause."
  raw: '#### Table Terminology


    SQL uses the language of tables, and tables have rows and columns.


    *   A **table** is a *collection*, such as a collection of customers.


    *   A **row** is an instance or member of that collection, such as one of the
    customers.


    *   A **column** is a detail of the members, such as the date of birth of the
    customer.


    You will sometimes see some other words used to describe the data, but they are
    not the language of SQL. Table [2-1](#601766_1_En_2_Chapter.xhtml#Tab1) shows
    some of the alternative terminology used for some of the concepts.


    Table 2-1


    Alternative Names


    |   | Relational Database | SQL | Other |

    | --- | --- | --- | --- |

    | Collection | Relation | Table | File |

    | Instance | Tuple | Row | Record |

    | Detail | Attribute | Column | Field |


    In particular, avoid using the terms **Record** and **Field** in the company of
    other SQL developers, as they will tend to look down their noses at you. On the
    other hand, the word **Field** in particular does sometimes appear in official
    documentation, so it’s not quite so bad.


    In this book, we will use the standard SQL terminology. You will sometimes see
    the word **record** used in its original sense, that of saving information.


    ### Normalized Tables


    In principle, you could organize your data table any way you want, but if you
    want your data to be as maintainable as possible, it needs to follow some rules.


    The following rules are not there just to make the game more interesting. The
    rules will result in tables where data is in its simplest, most dependable form.
    Mathematicians refer to this form as its **normal** form.


    Overall, the goal of normalization is to ensure that every piece of data has exactly
    one place. There should be no repetitions and no ambiguity.


    As you’ll see, this often results in creating additional tables, so the data you’re
    looking for may be spread all over the place. That can be inconvenient. Later,
    when we look at joining tables, we’ll see how we can manage this inconvenience.


    Database theory defines a number of levels of normalization, but most of the principles
    are covered in the following text.


    In real life, you’ll find that database developers often relax some of these principles
    to avoid spreading the data in too many places, making even the simplest query
    a challenge. However, that always risks making the data less reliable.


    #### Data Is Atomic


    If you select


    ```

    SELECT

    id,

    givenname, familyname

    FROM customers;

    ```


    you will note that the given name and family name are in separate columns. This
    makes it easier to sort the data and to search for it.


    Data should be in its smallest *practical* unit. If it is, we say that the data
    is **atomic**, from a Greek word meaning that it can’t get any smaller.


    Note the word “practical” earlier. You could try the same thing with the email
    address:


    ```

    SELECT

    id,

    email

    FROM customers;

    ```


    You could possibly argue that the email address could be broken down further into
    two parts: `user@host`. If you really want to, go ahead. However, most would argue
    that this is getting carried away, since you will probably *never* use the parts
    separately.


    On the other hand, if you really need to group customers by their email host,
    such as for filtering or sorting purposes, then the email address should indeed
    be separated into two columns.


    Deciding whether data should be further separated is one of the skills of the
    experienced database developer.


    #### Columns Are Independent


    When you select multiple columns:


    ```

    SELECT

    id,

    givenname, familyname,

    phone,

    dob

    FROM customers;

    ```


    one thing you will notice is that the value in one column offers no clue to the
    value in another column. Knowing your date of birth, for example, tells us nothing
    about your phone number. Further, changing your date of birth doesn’t require
    a change in your phone number.^([²](#fn2))


    This is a key factor to maintaining “clean” data. It means you can maintain a
    single item of data without affecting anything else.


    Not all tables strictly follow this rule. For example:


    ```

    SELECT

    id,

    givenname, familyname,

    street,

    town, state, postcode

    FROM customers;

    ```


    If the customer changes their address, you will probably have to update *four*
    items of data (`street`, `town`, `state`, and `postcode`). On top of that, changing
    the postcode may well dictate the state and town. Clearly, these three are not
    independent of each other. Even the street is limited: the same street name may
    or may not exist in the next town, but the street number may still be wrong.


    *This is a weakness in the design of the sample* `customers` *table. The correct
    approach would involve another table of locations, so that the* `customers` *table
    contains a single reference to one of the locations.*


    Sometimes, we can get away with a loose design, but that won’t be forever. At
    some point in the future, a customer’s address will have been partially updated,
    and your data will have lost some reliability.


    For now, we’ll stick to this loose design and hope for the best. This is because
    getting a complete list of all possible addresses is too difficult.


    #### Columns Are of a Single Type


    If you examine a date column:


    ```

    SELECT

    id, givenname, familyname,

    dob

    FROM customers;

    ```


    you will notice that all the values in the `dob` column are, of course, dates.
    By design, the `dob` column will only accept dates, not numbers or strings or
    any other type of data.


    In SQL, each column is assigned a single type.^([³](#fn3)) The only values you
    can enter must be compatible with that type.


    There are a number of advantages to this principle:


    *   Limiting the data type affords a little validity checking; for example, a
    number or a string would be invalid for a date of birth.


    *   When you need to process the data, such as calculating the age from the date
    of birth, SQL doesn’t have to handle the sorts of errors you get from inappropriate
    data, because there isn’t any.


    *   When sorting data, the data type will affect the results. You will see more
    of this in Chapter [4](#601766_1_En_4_Chapter.xhtml) on sorting.


    There are a few disadvantages too. For example, with dates:


    *   You can’t vary the level of detail, such as recording just the year or including
    the time in a date column.


    *   You can’t have text, such as “a long time ago” or “year of the aardvark,”
    in a date column.


    In Relational Theory, acceptable values for an item of data are referred to as
    its **domain**. For example:


    ```

    SELECT

    id,

    givenname, familyname,

    state

    FROM customers;

    ```


    The value of `state` is a string, which in theory could be any string, but really
    should be limited to legitimate state name abbreviations.


    #### Rows Are Unordered


    More realistically, row order is not significant.


    If you simply select from the table:


    ```

    SELECT *

    FROM customers;

    ```


    there is no guarantee what order the rows will be in. In database theory, that’s
    perfectly fine, since a collection is unordered.


    The SQL standard makes a point of *not* saying anything about row order. In particular


    *   The data itself may be *stored* in any order the DBMS sees fit.


    *   The data may be *returned* in any order the DBMS sees fit.


    With some DBMSs, the data may appear to be in a random order. With some, however,
    it may be in **insertion order**: the order in which the data was added. However,
    the actual order will depend on how the data has been processed as well as how
    the data has changed.


    Of course, you can always impose your own order using the `ORDER BY` clause.'
  trans: "\n#### 表术语\n\nSQL 使用表的语言，而表由行和列组成。\n\n*   一个 `table`（表）是一个集合，例如客户的集合。\n\
    *   一个 `row`（行）是该集合的一个实例或成员，例如其中一位客户。\n*   一个 `column`（列）是成员的一个细节，例如客户的出生日期。\n\
    \n有时你可能会看到其他一些词语被用来描述数据，但它们并非 SQL 的术语。表 2-1 展示了用于某些概念的一些替代术语。\n\n**表 2-1** 替代名称\n\
    \n| | 关系数据库 | SQL | 其他 |\n| --- | --- | --- | --- |\n| 集合 | Relation（关系） | Table（表）\
    \ | File（文件） |\n| 实例 | Tuple（元组） | Row（行） | Record（记录） |\n| 细节 | Attribute（属性）\
    \ | Column（列） | Field（字段） |\n\n特别要注意的是，在其他 SQL 开发者面前，避免使用 `Record`（记录）和 `Field`（字段）这些术语，因为他们可能会对你嗤之以鼻。另一方面，特别是\
    \ `Field`（字段）这个词有时确实会出现在官方文档中，所以也不算太糟。\n\n在本书中，我们将使用标准的 SQL 术语。你有时可能会看到 `record`（记录）一词以其原始含义（即保存信息）被使用。\n\
    \n### 规范化表\n\n原则上，你可以以任何你想要的方式组织数据表，但如果你希望你的数据尽可能易于维护，它就需要遵循一些规则。\n\n以下规则不仅仅是为了增加趣味性。这些规则将使表中的数据处于最简单、最可靠的形式。数学家将这种形式称为其\
    \ `normal`（范式）形式。\n\n总的来说，规范化的目标是确保每一份数据都只有一个存放位置。不应有重复，也不应有歧义。\n\n正如你将看到的，这通常意味着要创建额外的表，因此你所需的数据可能分散在各处。这可能会带来不便。稍后，当我们学习连接表时，我们会了解如何管理这种不便。\n\
    \n数据库理论定义了多个规范化级别，但大部分原理将在下文中涵盖。\n\n在现实中，你会发现数据库开发者常常会放宽其中一些原则，以避免数据分散在太多地方，导致即使是最简单的查询也变得困难。然而，这样做总是有降低数据可靠性的风险。\n\
    \n#### 数据是原子的\n\n如果你执行以下查询\n\n```sql\nSELECT\n    id,\n    givenname, familyname\n\
    FROM customers;\n```\n\n你会注意到，given name（名）和 family name（姓）位于不同的列中。这使得排序和搜索数据变得更加容易。\n\
    \n数据应处于其最小的 *实际* 单位。如果做到了这一点，我们就说数据是 `atomic`（原子的），这个词源自一个希腊词汇，意指它不能再被拆分。\n\n\
    注意前面的“实际”一词。你可以对电子邮件地址尝试同样的做法：\n\n```sql\nSELECT\n    id,\n    email\nFROM customers;\n\
    ```\n\n你可能会争辩说电子邮件地址可以进一步分解为两部分：`user@host`（用户@主机）。如果你真想这么做，当然可以。然而，大多数人会认为这有点过分了，因为你可能*永远*不会单独使用这些部分。\n\
    \n另一方面，如果你确实需要按电子邮件主机对客户进行分组，例如用于过滤或排序目的，那么电子邮件地址确实应该被分成两列。\n\n决定数据是否应该进一步分离是经验丰富的数据库开发者的技能之一。\n\
    \n#### 列是独立的\n\n当你选择多个列时：\n\n```sql\nSELECT\n    id,\n    givenname, familyname,\n\
    \    phone,\n    dob\nFROM customers;\n```\n\n你会注意到的一件事是，一列中的值无法提供任何关于另一列中值的线索。例如，知道你的出生日期并不能告诉我们你的电话号码。此外，更改你的出生日期并不要求更改你的电话号码。²\n\
    \n这是维护“干净”数据的一个关键因素。这意味着你可以在不影响任何其他内容的情况下维护单个数据项。\n\n并非所有表都严格遵循此规则。例如：\n\n```sql\n\
    SELECT\n    id,\n    givenname, familyname,\n    street,\n    town, state, postcode\n\
    FROM customers;\n```\n\n如果客户更改了他们的地址，你可能需要更新*四*项数据（`street`、`town`、`state` 和 `postcode`）。除此之外，更改邮政编码很可能会决定州和城镇。显然，这三者并非彼此独立。即使是街道也是有限制的：相同的街道名称在下一个城镇可能存在也可能不存在，但街道号码可能仍然是错误的。\n\
    \n*这是示例 `customers` 表设计中的一个弱点。正确的做法会涉及另一个位置表，以便 `customers` 表包含对其中一个位置的单一引用。*\n\
    \n有时，我们可以勉强接受一个宽松的设计，但这不会是永久的。在未来某个时候，某个客户的地址可能会被部分更新，而你的数据将失去一些可靠性。\n\n目前，我们将坚持这种宽松的设计，并希望一切顺利。这是因为获取所有可能地址的完整列表太难了。\n\
    \n#### 列是单一类型的\n\n如果你检查一个日期列：\n\n```sql\nSELECT\n    id, givenname, familyname,\n\
    \    dob\nFROM customers;\n```\n\n你会注意到，`dob` 列中的所有值当然都是日期。根据设计，`dob` 列将只接受日期，而不接受数字、字符串或任何其他类型的数据。\n\
    \n在 SQL 中，每一列都被分配一个单一类型。³ 你唯一能输入的值必须与该类型兼容。\n\n这一原则有几个优点：\n\n*   限制数据类型提供了一点有效性检查；例如，数字或字符串对于出生日期来说是无效的。\n\
    *   当你需要处理数据时，例如根据出生日期计算年龄，SQL 无需处理因不适当数据而产生的错误，因为没有这样的数据。\n*   在对数据排序时，数据类型会影响结果。你将在第\
    \ 4 章关于排序的内容中看到更多相关信息。\n\n也有一些缺点。例如，对于日期：\n\n*   你无法改变详细程度，例如在日期列中只记录年份或包含时间。\n\
    *   你不能在日期列中拥有文本，例如“很久以前”或“土豚之年”。\n\n在关系理论中，数据项可接受的值被称为其 `domain`（域）。例如：\n\n```sql\n\
    SELECT\n    id,\n    givenname, familyname,\n    state\nFROM customers;\n```\n\
    \n`state` 的值是一个字符串，理论上可以是任何字符串，但实际上应该被限制为合法的州名缩写。\n\n#### 行是无序的\n\n更现实地说，行的顺序并不重要。\n\
    \n如果你简单地从表中选择：\n\n```sql\nSELECT *\nFROM customers;\n```\n\n无法保证行的顺序。在数据库理论中，这完全没问题，因为集合是无序的。\n\
    \nSQL 标准特别*不*对行顺序做任何说明。具体来说\n\n*   数据本身可以按照 DBMS 认为合适的任何顺序*存储*。\n*   数据可以按照 DBMS\
    \ 认为合适的任何顺序*返回*。\n\n对于某些 DBMS，数据可能看起来是随机顺序的。然而，对于另一些 DBMS，它可能是 `insertion order`（插入顺序）：数据被添加的顺序。不过，实际顺序将取决于数据的处理方式以及数据的更改情况。\n\
    \n当然，你总是可以使用 `ORDER BY` 子句来强制指定你自己的顺序。\n"
- fmt: '#### Rows Are Unique


    If you simply select from the table:


    ```sql

    SELECT *

    FROM artists;

    ```


    you will see that no artist appears twice. If your first experience with data
    management is through a spreadsheet program, you may well find accumulated multiple
    copies of artists, since cross-referencing is not a strong point with spreadsheets.


    In a well-managed database, each artist is recorded only once, and multiple paintings
    can then refer to a single artist.


    Of course, there will be errors; for example, an artist may have been registered
    twice. Remember the database doesn’t really know what’s happening, so there will
    need to be some human intervention to ensure that this doesn’t happen.


    SQL does offer some help to maintain uniqueness:


    *   Each table should define a `primary key` column, which is a unique identifier.
    In principle, even if all other details are the same, the primary key can distinguish
    between them.


    *   Some columns can have a `unique constraint` added, which will disallow accidental
    duplicates. For example, you could argue that a customer’s email address should
    never be repeated, so there is a unique constraint on that column.


    In Chapter [8](#601766_1_En_8_Chapter.xhtml) on working with tables, you’ll see
    that you can build a variety of additional requirements, known as constraints.
    For now, the primary key and uniqueness attributes are important.


    #### Rows Are Independent


    If you simply select from the table:


    ```sql

    SELECT *

    FROM artists;

    ```


    you will see that details for one artist have no bearing on details for another
    artist. What goes on in one row stays in that one row.


    That’s not to say that multiple artists can’t have some of the same details. For
    example, both Rembrandt and Van Gogh are listed with a `Dutch` nationality. However,
    if you were to decide that Van Gogh should be listed as, say, `French`, that will
    have no impact on Rembrandt’s nationality.


    This isn’t completely true of the `customers` table, however. If the postcode
    matching one town were to change, it probably means that other customers in the
    same town will need to be updated. That is why the location really should have
    been in a separate table.


    #### Column Names Are Unique


    This goes without saying. You can’t have two columns with the same name; otherwise,
    there is no way of reliably identifying the column.


    With a well-formed table, that shouldn’t be a problem, but there’s sometimes a
    little uncertainty as to how to handle multiple values. We’ll see later how multiple
    values are properly handled.


    #### Columns Are Unordered


    When you select from a table, of course you will get the result in some row order
    and some column order. However, as with row order, column order is not significant.
    Unlike row order, however, column order isn’t entirely unpredictable.


    For example:


    ```sql

    SELECT *

    FROM customers;

    ```


    If you use `SELECT *`, you will get the columns in the order defined either when
    the table was created or when the table structure was subsequently altered.


    ```sql

    SELECT id, givenname, familyname, dob, email

    FROM customers;

    ```


    If you specify columns, you will, of course, get the columns in the specified
    order.


    The point is that the database has no *preferred* column order, and you can select
    them in any order without affecting the significance of the results.


    SQL allows you to add additional columns after the original design. Sometimes,
    it is tricky or even impossible to add these columns at arbitrary locations, so
    you may find the newly placed columns at the end. That’s not always convenient,
    but at least it doesn’t matter.


    ### Multiple Values


    One of the principles of a well-formed table deals with multiple values. For example:


    *   How do you manage multiple phone numbers for customers?


    *   How would you manage books with multiple authors?


    Two mistakes which should be avoided are


    *   Putting multiple values in a single column, possibly separated with a comma
    or semicolon. There is no longer an unambiguous location for an item of data in
    that you can’t be sure which column it’s in. Further, you will invariably end
    up with some empty columns and possibly with not enough in some cases.


    *   Having multiple columns for the multiple values, such as `phone1`, `phone2`,
    etc. You saw earlier that data should be atomic. This would violate that principle
    and will make searching and sorting impractical. Later, you will want to group
    data together, and using multiple values like this will make that impossible.


    There may be a case where multiple columns might be used *if* there is a clear
    distinction between them. For example, for customers, you *might* record a mobile
    phone number, a landline number, and a fax (remember faxes?) number. They’re all
    phone numbers, but they’re different enough to be unambiguous.


    #### Using Related Tables


    In the sample database, we see this problem a few times:


    *   Sales can have multiple sale items.


    *   Artists can have multiple paintings.


    *   Customers can have multiple sales.


    In all cases, the solution is the same: another table. For example, to manage
    multiple sale items, there is an additional table, `saleitems`, for each sale
    item. The key to making it work is that all of these sale items have a reference
    to a `sale`.


    #### Example: Paintings and Artists


    As we mentioned earlier, we have the situation that one artist can have painted
    many paintings. To put it another way, many paintings are by the same artist.
    It’s really the same problem, looking at it from two different directions.


    The way you look at the problem will depend on the purpose of the database. For
    example, if you were managing the artist agency, then your main interest will
    be in the artist table, and the question would be how to manage multiple paintings
    per artist. It would be the same question as how to manage multiple items per
    sale, or multiple sales per customer.


    In this database, we are more interested in the paintings, so the question is
    how to manage multiple paintings by the same artist.


    In both cases, the solution is the same.


    If you look at both tables:


    ```sql

    SELECT * FROM paintings;

    SELECT * FROM artists;

    ```


    you will see the important `artistid` column in the `paintings` table. The `artistid`
    is a reference to an `id` in the `artists` table. This is called a `foreign key`
    because it refers to another table.


    Figure [2-2](#601766_1_En_2_Chapter.xhtml#Fig2) has a simplified version of this
    relationship.


    ![](images/601766_1_En_2_Chapter/601766_1_En_2_Fig2_HTML.jpg)


    2 tables, Paintings and Artists, with primary keys and foreign keys linking the
    two tables together. The Painting table includes 8 columns. The Artists table
    includes 5 columns.


    Figure 2-2 A Relationship Between Tables


    If you look at the arrows, you’ll notice they are pointing from the paintings
    to the artists, that is, from the foreign key to the primary key. You will also
    notice that many paintings point to a single artist. This relationship is commonly
    called a one-to-many relationship, that is, from one artist to many paintings.


    Regardless of whether you are more interested in the paintings or the artists,
    the actual relationship is *defined* in the `artist` table that is in the *many*
    table.


    #### Examples of Alternative Terminology


    Although most references would simply refer to a one-to-many relationship, it
    is often more convenient to use a more informal term, such as one of those in
    Table [2-2](#601766_1_En_2_Chapter.xhtml#Tab2).


    Table 2-2 The One-to-Many Relationship


    |   | One | Many |

    | --- | --- | --- |

    | Parent-Child | Parent | Children |

    | Container | Container | Contents |

    | Shopping | Cart | Items |


    Later, we will be looking at combining data from related tables.'
