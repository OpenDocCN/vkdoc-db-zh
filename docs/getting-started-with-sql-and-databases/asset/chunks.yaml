    Some DBMSs also supply a table value literal notation, which may be simpler:


    ```

    --  PostgreSQL, MySQL / MariaDB, SQLite

    WITH samples(test, testdate) AS (

    VALUES(''one'',''2020-01-29''),(''two'',''2020-02-28'')

    (''three'', ''2020-03-30'')

    )

    SELECT …

    FROM samples;

    ```


    Using a virtual table of samples this way makes it easier to test out some techniques
    without the need to create real tables.'
  trans: '### 结果比较


    在第 7 章关于聚合的内容中，我们曾提到两个查询会给出相同的结果：

    ```sql

    --  子查询

    SELECT

    customerid,

    (SELECT givenname||'' ''||familyname  --  MSSQL: 使用 `+`

    FROM customers

    WHERE customers.id = sales.customerid

    ) AS customer,

    count(*) AS number_of_sales,

    sum(total) AS total

    FROM sales

    GROUP BY customerid;

    --  连接

    SELECT

    c.id, c.givenname||'' ''||c.familyname AS customer,

    count(*) AS number_of_sales, sum(s.total) AS total

    FROM sales AS s JOIN customers AS c ON s.customerid=c.id

    GROUP BY c.id, c.givenname||'' ''||c.familyname;

    ```


    两者应该给出相同的结果：

    | 客户 ID | 客户 | 销售次数 | 总额 |

    | --- | --- | --- | --- |

    | 384 | Mickey Finn | 6 | 5445 |

    | 351 | Dick Tate | 12 | 7650 |

    | 184 | Dee Lighted | 11 | 5040 |

    | 116 | Tim Burr | 14 | 8470 |

    | 273 | Harry Leggs | 13 | 9070 |

    | 550 | Kate Ering | 1 | 805 |

    | ~ 约 256 行 ~ |


    我们省略了 `ORDER BY` 子句，因为我们只关注数据本身。


    我们如何能确保两个结果确实相同呢？如果只有几行数据，你可以直接比较，但如果数据量很大，就需要不同的方法。


    首先，请注意两个查询产生的行数相同。这是一个起点。另外，请注意列是相同的。


    之后，你可以使用集合操作来完成繁重的工作。实际上，你使用哪一种并不重要，但所有三种操作都能给你更强的保证感：

    ```sql

    --  子查询

    SELECT

    customerid,

    (SELECT givenname||'' ''||familyname  --  MSSQL: 使用 `+`

    FROM customers

    WHERE customers.id = sales.customerid

    ) AS customer,

    count(*) AS number_of_sales,

    sum(total) AS total

    FROM sales

    GROUP BY customerid

    UNION   --  或 `INTERSECT` 或 `EXCEPT` / `MINUS`

    SELECT

    c.id, c.givenname||'' ''||c.familyname AS customer,

    count(*) AS number_of_sales, sum(s.total) AS total

    FROM sales AS s JOIN customers AS c ON s.customerid=c.id

    GROUP BY c.id, c.givenname||'' ''||c.familyname;

    ```


    记得移除第一个查询后的分号。


    如果两者的结果确实相同，那么第二个结果集应该与第一个相同。测试结果将如下所示：


    *   `UNION`：由于 `UNION` 会移除重复项，你应该只得到第一个结果集。

    *   `INTERSECT`：这仅返回同时存在于两者的结果，应该是所有结果。

    *   `EXCEPT`/`MINUS`：这应该返回一个空集，因为你要移除第二个结果集中所有相同的结果。在这种情况下，你不必担心调换顺序，因为你已经知道它们具有相同的行数。


    任何一个测试都足以证明，但如果你不完全相信，尝试所有三种也并非难事。


    ### 虚拟表


    在第 5 章关于计算的内容中，我们提到可以对日期进行加法运算。日期问题众所周知地棘手，因为月份的长度各不相同，你可能想测试将天数加到不同月份时会发生什么。


    我们可以通过一个样本表来测试会发生什么。在这种情况下，我们将以 `UNION` 的形式生成一个虚拟表。


    首先，我们可以用一些样本值生成一个 `UNION`：

    ```sql

    --  PostgreSQL, MSSQL, MySQL / MariaDB

    SELECT ''one'' AS test,

    cast(''2020-01-29'' as date) AS testdate

    UNION

    SELECT ''two'', cast(''2020-02-28'' as date)

    UNION

    SELECT ''three'', cast(''2020-03-30'' as date);

    --  SQLite

    SELECT ''one'' AS test, ''2020-01-29'' AS testdate

    UNION

    SELECT ''two'', ''2020-02-28''

    UNION

    SELECT ''three'', ''2020-03-30'';

    --  Oracle

    SELECT ''one'' AS test,

    cast(''29 Jan 2020'' as date) AS testdate

    FROM dual

    UNION

    SELECT ''two'', cast(''28 Feb 2020'' as date)

    FROM dual

    UNION

    SELECT ''three'', cast(''30 Mar 2020'' as date)

    FROM dual;

    ```


    你会得到一个简单的三行表格：

    | test | testdate |

    | --- | --- |

    | one | 2020-01-29 |

    | three | 2020-03-30 |

    | two | 2020-02-28 |


    我们现在可以将其包装在一个 `CTE`（公共表表达式）中：

    ```sql

    WITH samples AS (

    SELECT …

    UNION

    SELECT …

    UNION

    SELECT …

    )

    ```

    并测试算术运算：

    ```sql

    --  PostgreSQL, MySQL / MariaDB, Oracle

    WITH samples AS (…)

    SELECT test, testdate, testdate+interval ''30'' day

    FROM samples;

    --  MSSQL

    WITH samples AS (…)

    SELECT test, testdate, dateadd(day,30,testdate)

    FROM samples;

    --  SQLite

    WITH samples AS (…)

    SELECT test, testdate,

    strftime(''%Y-%m-%d'',testdate,''+30 day'')

    FROM samples;

    ```


    现在我们有了样本及其计算值：

    | test | testdate | ?column? |

    | --- | --- | --- |

    | one | 2020-01-29 | 2020-02-28 00:00:00 |

    | three | 2020-03-30 | 2020-04-29 00:00:00 |

    | two | 2020-02-28 | 2020-03-29 00:00:00 |


    一些数据库管理系统还提供表值字面量表示法，这可能更简单：

    ```sql

    --  PostgreSQL, MySQL / MariaDB, SQLite

    WITH samples(test, testdate) AS (

    VALUES(''one'',''2020-01-29''),(''two'',''2020-02-28''),(''three'', ''2020-03-30'')

    )

    SELECT …

    FROM samples;

    ```


    使用这样的样本虚拟表，可以更轻松地测试一些技术，而无需创建真实的表。'
- fmt: '## Mixing Aggregates


    One thing you’ll notice with aggregates is that the result is pretty homogenous.
    For example:


    ```sql

    --  Town totals

    SELECT state, town, count(*) AS count

    FROM customers

    GROUP BY state, town

    ORDER BY state, town;

    ```


    This will give you totals for each individual town, but it won’t include other
    totals:


    | state | town | count |

    | --- | --- | --- |

    | NSW | Bald Hills | 6 |

    | NSW | Belmont | 4 |

    | NSW | Broadwater | 5 |

    | NSW | Buchanan | 3 |

    | NSW | Darlington | 1 |

    | NSW | Glenroy | 2 |

    | ~ 79 rows ~ |


    If you want the other totals, you will need


    ```sql

    --  State totals

    SELECT state, count(*) AS count

    FROM customers

    GROUP BY state

    ORDER BY state;

    --  Grand total

    SELECT count(*) FROM customers AS count;

    ```


    The two sets of results are as follows:


    | state | count |

    | --- | --- |

    | NSW | 67 |

    | NT | 3 |

    | QLD | 52 |

    | SA | 22 |

    | TAS | 26 |

    | VIC | 52 |

    | WA | 47 |

    | [null] | 35 |

    | `count` | 304 |


    If you want them in the same result set, you can combine them. For example, to
    combine the state and the grand totals, you can use


    ```sql

    SELECT state, count(*) AS count

    FROM customers

    GROUP BY state

    UNION

    SELECT ''total'', count(*)

    FROM customers;

    ```


    Note that the second `SELECT` has a dummy value of `total`. As expected, it sits
    in the `state` column.


    | state | count |

    | --- | --- |

    | [null] | 35 |

    | WA | 47 |

    | total | 304 |

    | QLD | 52 |

    | VIC | 52 |

    | TAS | 26 |

    | NT | 3 |

    | SA | 22 |

    | NSW | 67 |


    Depending on the DBMS, the order may or may not be to your liking. You can use
    the `ORDER BY` clause, but you run the risk of putting the `total` in the middle
    of the results, since that’s the way alphabetical order works. You can, however,
    force the issue by using a level number:


    ```sql

    SELECT 0 AS statelevel, state, count(*) AS count

    FROM customers GROUP BY state

    UNION

    SELECT 1, ''total'', count(*) FROM customers

    ORDER BY statelevel, state;

    ```


    This will now be sorted by level and order.


    | statelevel | state | count |

    | --- | --- | --- |

    | 0 | NSW | 67 |

    | 0 | NT | 3 |

    | 0 | QLD | 52 |

    | 0 | SA | 22 |

    | 0 | TAS | 26 |

    | 0 | VIC | 52 |

    | 0 | WA | 47 |

    | 0 |  | 35 |

    | 1 | total | 304 |


    You can do the same with the towns. Here, you’ll need two levels:


    ```sql

    SELECT

    0 AS statelevel, 0 as townlevel,

    state, town, count(*) AS count

    FROM customers GROUP BY state, town

    UNION

    SELECT

    0, 1,

    state, ''total'', count(*) AS count

    FROM customers

    GROUP BY state

    UNION

    SELECT

    1, 1,

    ''national'', ''total'', count(*)

    FROM customers

    --  Sort Results:

    ORDER BY statelevel, state, townlevel, town;

    ```


    In this case, we’re using a binary sort with the 0s and 1s:


    | statelevel | townlevel | state | town | count |

    | --- | --- | --- | --- | --- |

    | 0 | 0 | NSW | Bald Hills | 6 |

    | 0 | 0 | NSW | Belmont | 4 |

    | 0 | 0 | NSW | Broadwater | 5 |

    | 0 | 0 | NSW | Buchanan | 3 |

    | 0 | 0 | NSW | Darlington | 1 |

    | 0 | 0 | NSW | Glenroy | 2 |

    | ~ 88 rows ~ |


    Most DBMSs support a simpler version of this, called `ROLLUP`. The syntax varies:


    ```sql

    --  PostgreSQL, MSSQL, Oracle

    SELECT state, town, count(*) AS count

    FROM customers GROUP BY rollup(state, town)

    ORDER BY grouping(state),state, grouping(town), town;

    --  MSSQL, MySQL / MariaDB

    SELECT state, town, count(*) AS count

    FROM customers

    GROUP BY state, town WITH rollup;

    ```


    The second syntax is simpler, but less flexible.


    Note also that MariaDB doesn’t support the `grouping(…)` function in the `ORDER
    BY` clause, so you can’t control the order; however, it will probably result in
    the correct order anyway.


    ### Summary


    In SQL, tables are mathematical sets of rows. This means that they contain no
    duplicates and are unordered. It also means that you can combine tables and virtual
    tables with set operations.


    A table is not necessarily a stored table; any virtual table behaves the same
    way. With set operations, you use a virtual table which results from `SELECT`
    statements.


    There are three main set operations:


    *   `UNION` combines two or more tables and results in all of the rows, with any
    duplicates filtered out. If you want to keep the duplicates, you use the `UNION
    ALL` clause.


    *   `INTERSECT` returns only the rows which appear in all of the participating
    tables.


    *   `EXCEPT` (a.k.a. `MINUS` in Oracle) returns the rows in the first table which
    are `not` also present in the second.


    When applying a set operation, there are some rules regarding the columns in each
    `SELECT` statement:


    *   The columns must match in number and type.


    *   Only the names and aliases from first `SELECT` are used.


    *   Only the values are matched, which means that if your various `SELECTS` change
    the column order or select different columns, they will be matched if they are
    compatible.


    A `SELECT` can include any of the standard clauses, such as `WHERE` and `GROUP
    BY`, but not the `ORDER BY` clause. You can, however, sort the final results with
    an `ORDER BY` at the end.


    Set operations can also be used for special techniques, such as creating sample
    data, comparing result sets, and combining aggregates.'
