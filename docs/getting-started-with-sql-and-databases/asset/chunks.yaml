  raw: '## Summary


    Although your data should be saved in its simplest form, you can generate variations
    on that data using calculations.


    You can experiment with calculations and formulas using a `SELECT` clause without
    a table; in Oracle, you use a dummy table called `dual`.


    Although you normally calculate a value from existing values in a table, there
    are times when you might use a built-in value, such as the current date and time.
    You can also use a fixed value.


    ### Data Types


    In SQL, there are three main data types: numbers, strings, and dates. Each data
    type has its own methods and functions to calculate values:


    *   For numbers, you can do simple arithmetic and calculate with more complex
    functions. There are also functions which approximate numbers.


    *   For dates, you can calculate an age between dates or offset a date. You can
    also extract various parts of the date.


    *   For strings, you can concatenate them, change parts of the string, or extract
    parts of the string.


    *   For numbers and dates, you can generate a formatted string which gives you
    a possibly more friendly version.


    ### NULLs


    Whenever a calculation involves a `NULL`, it has a catastrophic effect on the
    result, and the result will be `NULL`.


    In some cases, you may be able to substitute a value using `coalesce()` which
    will replace `NULL` with a reasonable alternative. Of course, you will need to
    work out what you mean by “reasonable.”


    ### Aliases


    Every column should have a distinct name. When you calculate a value, you supply
    this name as an alias using `AS`. You can also do this with noncalculated columns
    to provide a more suitable name.


    Aliases and other names should be distinct. They should also follow standard column
    naming rules, such as not being the same as an SQL keyword and not having special
    characters.


    If, for any reason, a name or an alias needs to break the naming rules, you can
    always wrap the name in double quotes, or whatever the DBMS supplies as an alternative.


    ### Subqueries


    A column can also include a value derived from a subquery. This is especially
    useful if you want to include data from a separate related table.


    If the subquery involves a value from the main table, it is said to be correlated.
    Such subqueries can be costly, but are nonetheless a useful technique.


    ### The CASE Expression


    You can generate categories using `CASE … END`, which tests a value against possible
    matches and results in one out of a number of alternative values.


    ### Casting a Value


    You may be able to change the data type of a value, using `cast()`:


    *   You can change *within* a main type to a type with more or less detail.


    *   You can sometimes change *between* major types if the value sufficiently resembles
    the other type.


    Sometimes, casting is performed automatically, but sometimes you need to do it
    yourself.


    One case where you might need to cast from a string is when you need a date literal.
    Since both string and date literals use single quotes, SQL might misinterpret
    the date for a string.


    ### Views


    You can save a `SELECT` statement into the database by creating a view. A view
    allows you to save a complex statement as a virtual table, which you can use later
    in a simpler form.


    Views are a good way of building a collection of useful statements.


    ## Coming Up


    Most of the work so far has involved single tables. Whenever we need to include
    data from another table, we simply used a subquery, which queries the other table
    and returns a result.


    In the next chapter, we will look at generating a new virtual table by combining
    two or more tables in what we call a **join**.


    # 6. Joining Tables


    If you select the data from the `paintings` table:


    ```

    SELECT *

    FROM paintings;

    ```


    You will see the artist is represented by the `artistid`, not the name or any
    other detail. That is how it should be in good database design, but it’s not convenient.
    In the previous chapter, you got around this by including a subquery:


    ```

    SELECT

    title,

    (SELECT givenname||'' ''||familyname FROM artists

    WHERE artists.id=paintings.artistid) AS artist

    --  etc

    FROM paintings;

    ```


    Apart from being tedious, subqueries can also be costly in terms of extra processing,
    and they can be difficult to manage.


    It would have been easier if the artist’s name were to be included in the paintings
    table. However, as discussed earlier, that would result in poorly organized data.


    The solution, the best of both worlds, is to generate a temporary *virtual* table
    where the artists’ details are indeed included with the painting details. This
    is called a **join**.


    When you join two tables, you take a row from one table and attach it to the end
    of a row from another. Of course, you’ll need to make sure that the attached row
    somehow matches the other. Once you have done this, you can read from the result
    as a single table without the need for messing about with subqueries.


    In this chapter, we’ll learn how to join two or more tables to make extracting
    data from the combined tables easy and practical.


    We’ll begin by recreating the price list using a join instead of subqueries. As
    we do, we’ll see that there are different join types which control what happens
    if some of the rows don’t match.


    We’ll also look at joining more than two tables, joining a table to itself, and
    how to join tables which aren’t obviously related to each other.


    First, however, we’ll need to see what’s happening when you do a join.'
  trans: '

    # 摘要


    虽然你的数据应以其最简单的形式保存，但你可以通过计算来生成该数据的变体。


    你可以在没有表的情况下使用 `SELECT` 子句来试验计算和公式；在 Oracle 中，你需要使用一个名为 `dual` 的虚拟表。


    虽然你通常从表中的现有值计算某个值，但有时你可能会使用内置值，例如当前日期和时间。你也可以使用一个固定值。


    ## 数据类型


    在 SQL 中，主要有三种数据类型：数字、字符串和日期。每种数据类型都有其特定的方法和函数来计算值：


    *   对于数字，你可以进行简单的算术运算，也可以使用更复杂的函数进行计算。还有一些函数可以近似数字。

    *   对于日期，你可以计算日期之间的年龄或对日期进行偏移。你也可以提取日期的各个部分。

    *   对于字符串，你可以连接它们、更改字符串的部分内容或提取字符串的部分内容。

    *   对于数字和日期，你可以生成一个格式化的字符串，这可能会给你一个更友好的版本。


    ## 空值


    每当计算涉及到 `NULL` 时，它会对结果产生灾难性的影响，结果将是 `NULL`。


    在某些情况下，你可以使用 `coalesce()` 来替换一个值，它将用一个合理的替代值替换 `NULL`。当然，你需要确定什么对你而言是“合理的”。


    ## 别名


    每一列都应该有一个唯一的名称。当你计算一个值时，你需要使用 `AS` 提供这个名字作为别名。你也可以对非计算列执行此操作，以提供一个更合适的名称。


    别名和其他名称应该是唯一的。它们还应该遵循标准的列命名规则，例如不与 SQL 关键字相同，并且不包含特殊字符。


    如果出于任何原因，一个名称或别名需要打破命名规则，你可以将该名称用双引号括起来，或者使用 DBMS 提供的任何替代方案。


    ## 子查询


    一列也可以包含一个源自子查询的值。如果你想包含来自另一个相关表的数据，这尤其有用。


    如果子查询涉及到主表中的一个值，则称其为相关子查询。这种子查询可能成本高昂，但仍然是一种有用的技术。


    ## CASE 表达式


    你可以使用 `CASE … END` 来生成类别，它测试一个值与可能的匹配项，并从多个备选值中返回一个结果。


    ## 类型转换值


    你可以使用 `cast()` 来更改值的数据类型：


    *   你可以在主类型内更改为具有更多或更少细节的类型。

    *   如果值充分类似于另一种类型，有时你可以在主类型之间进行更改。


    有时，类型转换是自动执行的，但有时你需要自己动手。


    一个你可能需要从字符串进行类型转换的情况是当你需要一个日期字面量时。由于字符串和日期字面量都使用单引号，SQL 可能会将日期误认为是字符串。


    ## 视图


    你可以通过创建视图将 `SELECT` 语句保存到数据库中。视图允许你将复杂的语句保存为虚拟表，以便以后以更简单的形式使用。


    视图是构建有用语句集合的好方法。


    ## 后续内容


    到目前为止，大部分工作都涉及单表。每当我们需要包含来自另一个表的数据时，我们只是简单地使用一个子查询，该子查询查询另一个表并返回结果。


    在下一章中，我们将通过将两个或多个表组合在所谓的 `join` 中，来探讨如何生成一个新的虚拟表。


    # 6. 连接表


    如果你从 `paintings` 表中选择数据：


    ```

    SELECT *

    FROM paintings;

    ```


    你会看到艺术家是用 `artistid` 表示的，而不是姓名或其他任何细节。在良好的数据库设计中就应该如此，但这并不方便。在上一章中，你通过包含一个子查询来解决这个问题：


    ```

    SELECT

    title,

    (SELECT givenname||'' ''||familyname FROM artists

    WHERE artists.id=paintings.artistid) AS artist

    --  等等

    FROM paintings;

    ```


    除了繁琐之外，子查询在额外处理方面也可能成本高昂，并且可能难以管理。


    如果艺术家的姓名能包含在 paintings 表中会更容易。然而，正如之前所讨论的，那将导致数据组织不善。


    解决方案，即两全其美的方法，是生成一个临时的 `虚拟` 表，其中艺术家的详细信息确实与绘画的详细信息一起包含在内。这被称为 `join`。


    当你连接两个表时，你从一个表中取出一行并将其附加到另一个表的一行的末尾。当然，你需要确保附加的行以某种方式与另一行匹配。完成此操作后，你可以将结果作为单个表读取，而无需处理子查询。


    在本章中，我们将学习如何连接两个或更多表，以便从组合表中提取数据变得简单实用。


    我们将通过使用连接而不是子查询来重新创建价格列表开始。在此过程中，我们将看到存在不同类型的连接，用于控制当某些行不匹配时会发生什么。


    我们还将探讨连接两个以上的表、将表与其自身连接，以及如何连接那些没有明显关系的表。


    然而，首先，我们需要看看执行连接时会发生什么。

    '
- fmt: '## How a Join Works


    In order to understand joins, you will need to understand some basic concepts
    of how tables are related. Of course, SQL doesn’t really require you to understand
    what’s going on, but joins can get very tricky if you don’t.


    In Chapter [2](#601766_1_En_2_Chapter.xhtml), some of the central points in designing
    a database are as follows:


    *   A table contains data on a single type of object. So, for example, a `paintings`
    table has no `artists` details, and a `books` table has no `authors` details.

    *   Multiple rows should not have the same data. So, for example, two paintings
    by the same artist should not both have the artist’s name, and two books by the
    same author should not have the same author’s name.


    In reality, these aren’t different points, but two manifestations of the same
    principle: a table describes a single type of data. If you attempt to include
    unrelated data, you will end up repeating that data.


    The correct solution is to put related data into its own table and use a `foreign
    key` to link one table to the `primary key` in the other, as shown in Figure [6-1](#601766_1_En_6_Chapter.xhtml#Fig1).


    ![](images/601766_1_En_6_Chapter/601766_1_En_6_Fig1_HTML.jpg)


    The two tables depict information on paintings and artists, respectively. The
    tables for paintings and artists have 8 rows and 5 rows, respectively. The foreign
    keys of the paintings'' table are linked with the primary keys of the artists''
    table.


    Figure 6-1


    A Relationship Between Tables


    When the time comes, the next step will be to join the tables into a single virtual
    table. To join the two tables is to copy one row from one table to the end of
    the matching row in the other table as in Figure [6-2](#601766_1_En_6_Chapter.xhtml#Fig2).


    ![](images/601766_1_En_6_Chapter/601766_1_En_6_Fig2_HTML.jpg)


    A Table is formed by joining a table of paintings with a table of artists. The
    resultant table has 7 rows and 5 columns. The column headers are P K, paintings,
    F K, P K, and artists.


    Figure 6-2


    The Tables Joined


    You can then use the resulting virtual table to read data from both tables.


    You will probably have noticed a few important features of the join:


    *   There may be some missing rows from either table. Later, you will see how
    to include the missing rows.

    *   Some connected rows will be duplicated. If this were a real table, you would
    have all sorts of problems in managing data, but with a virtual table, this is
    perfectly all right and convenient.


    There is one other important feature you will see later in the SQL itself:


    *   It is not enough to specify which tables are to be joined; you also need to
    specify which column matches which. Although you would normally join a foreign
    key to a primary key, SQL allows for more complex joins.


    Once you have joined the tables, you can read from the result using a `SELECT`
    statement.


    To illustrate the process, we will use the following join:


    ```sql

    SELECT *

    FROM paintings JOIN artists ON paintings.artistid=artists.id;

    ```


    You’ll get something like this with all of the columns from both tables:


    | id | artistid | title | … | id | familyname | … |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1222 | 147 | Haymakers Resting | … | 147 | Pissarro | … |

    | 251 | 40 | Death in the Sickroom | … | 40 | Munch | … |

    | 2190 | 135 | Cache-cache (Hide-and-Seek) | … | 135 | Morisot | … |

    | 1560 | 293 | Indefinite Divisibility | … | 293 | Tanguy | … |

    | 172 | 156 | Girl with Racket and Shuttlecock | … | 156 | Chardin | … |

    | 2460 | 83 | The Procession to Calvary | … | 83 | Bruegel | … |

    | ~ 1228 rows ~ |


    The details will be explained as we go. For now, we will see a result set with
    data from the combined tables.


    The results from the previous query illustrate all of the preceding points. Note
    especially that some of the rows are missing. We’ll look at this later.


    ### Joining the Tables


    The basic join is achieved with the `JOIN ... ON` clause:


    ```sql

    SELECT *

    FROM paintings JOIN artists ON paintings.artistid=artists.id;

    ```


    You will notice some data which is repeated. For example, there are 57 paintings
    by Van Gogh. This means you get 57 copies of his name, nationality, and dates.


    If this were a real table, it would be a sign of very poor design. You have 57
    opportunities to make mistakes, and there are other discrepancies you risk introducing.
    This is why it is important to keep this sort of data in a separate table where
    it is entered only once and can be properly maintained.


    However, the join produces only a *virtual* table: the repeated data is convenient
    for reading and will never be stored anywhere.


    Note that the join can be written in different ways. Because the focus is on the
    paintings, it makes visual sense to write the `paintings` table first. However,
    you can write the two tables the other way round:


    ```sql

    SELECT *

    FROM artists JOIN paintings ON paintings.artistid=artists.id;

    ```


    This will give exactly the same results, except that the column order will be
    different.


    The same applies to the `ON` clause: it doesn’t matter which way round you write
    it, since the match will be the same.


    At this point, it doesn’t matter which table you write first. Later, however,
    you will need to *remember* when it comes to variations on the `JOIN` clause.


    ### Alternative Syntax


    The `JOIN` keyword was not in the original SQL standard. Instead, you would use
    this syntax:


    ```sql

    SELECT *

    FROM paintings,artists WHERE paintings.artistid=artists.id;

    ```


    That is, the `JOIN` is replaced with a comma, and the `ON` replaced by the `WHERE`.


    Technically, what was happening was that all the possible combinations of `paintings`
    and `artists` were generated (this is called a `Cross Join`), and only those where
    the artist matched the painting were filtered through. In reality, the DBMS never
    did this the long way.


    This is a very old syntax, and you will only see it used by diehards who haven’t
    got used to the newer syntax. On the inside, SQL will generate the same results
    using the same process as with the `JOIN` syntax.


    You should *always* use the newer syntax:


    *   The older syntax identifies you as one of the diehards.

    *   The newer syntax is more flexible, as you will see when examining join types.
    As you’ll see later, the preceding syntax is limited to what is called an `INNER
    JOIN`.

    *   The newer syntax makes using an additional `WHERE` clause filter easier.


    On the last point, suppose you want only the cheaper paintings. Using the `JOIN`
    clause, you could run


    ```sql

    SELECT *

    FROM paintings JOIN artists ON paintings.artistid=artists.id

    WHERE price<150;

    ```


    Here are the cheaper paintings:


    | id | artistid | title | price | … | id | familyname | … |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 1222 | 147 | Haymakers Resting | 125.00 | … | 147 | Pissarro | … |

    | 251 | 40 | Death in the Sickroom | 105.00 | … | 40 | Munch | … |

    | 1560 | 293 | Indefinite Divisibility | 125.00 | … | 293 | Tanguy | … |

    | 1836 | 273 | Male and Female | 105.00 | … | 273 | Pollock | … |

    | 575 | 18 | Corner of Quarry | 125.00 | … | 18 | Cézanne | … |

    | 1353 | 67 | Nini in the Garden | 105.00 | … | 67 | Renoir | … |

    | ~ 543 rows ~ |


    Using the older syntax, you would have to append the filter to the existing `WHERE`
    clause:


    ```sql

    SELECT *

    FROM paintings,artists

    WHERE paintings.artistid=artists.id

    AND price<150;

    ```


    Again, SQL will give the same results using the same process internally, but the
    newer syntax makes your own intentions clear.'
