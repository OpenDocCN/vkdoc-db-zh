  trans: '

    # WHERE 子句


    `WHERE` 子句用于将结果限制为符合特定条件的行。例如，如果你想将顾客列表限制为身高较矮的顾客，可以使用


    ```sql

    SELECT *

    FROM customers

    WHERE height<170;

    ```


    你应该会看到类似这样的结果：


    | id | 姓名 | 名字 | … | 身高 | … | 注册日期 |

    | --- | --- | --- | --- | --- | --- | --- |

    | 186 | Gunn | Ray | … | 163.8 | … | 2021-11-15 |

    | 523 | Sights | Seymour | … | 167.3 | … | 2022-07-11 |

    | 351 | Tate | Dick | … | 167.8 | … | 2022-03-13 |

    | 422 | Why | Wanda | … | 163.2 | … | 2022-05-05 |

    | 121 | Ting | Lil | … | 162.8 | … | 2021-10-06 |

    | 545 | Knife | Jack | … | 167.4 | … | 2022-07-24 |

    | ~ 116 行 ~ |


    `WHERE` 子句后面跟着一个**断言**——一个结果为真或假的测试。在这个例子中，测试是 `height<170`，只有满足这个条件为真的行才会被返回。


    对于像这样简单的比较，你会用到在学校里学到的经典运算符。后面会有一个它们的表格。


    你可以通过使用 `NOT` 运算符来反转断言：


    ```sql

    SELECT *

    FROM customers

    WHERE NOT height<170;

    ```


    这将只返回身高*不*小于 170 的行。


    | id | 姓名 | 名字 | … | 身高 | … | 注册日期 |

    | --- | --- | --- | --- | --- | --- | --- |

    | 144 | King | Ray | … | 176.8 | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | 170.3 | … | 2021-11-08 |

    | 475 | Blood | Drew | … | 171.0 | … | 2022-06-13 |

    | 341 | Idate | Val | … | 177.1 | … | 2022-03-03 |

    | 588 | Skies | Grace | … | 171.5 | … | 2022-08-13 |

    | 326 | Todeath | Boris | … | 186.3 | … | 2022-02-15 |

    | ~ 132 行 ~`


    在许多情况下，`NOT` 有另一种表达方式：


    ```sql

    SELECT *

    FROM customers

    WHERE height >= 170;    --  或 height>=170

    ```


    `>=` 周围的空格不是必需的；它们只是为了更清晰。


    类似地，你可以测试精确匹配：


    ```sql

    SELECT *

    FROM customers

    WHERE height=170;

    ```


    结果不会有很多：


    | id | 姓名 | 名字 | … | 身高 | … | 注册日期 |

    | --- | --- | --- | --- | --- | --- | --- |

    | 118 | Barrow | Will | … | 170.0 | … | 2021-10-04 |

    | 15 | Second | Millie | … | 170.0 | … | 2021-07-22 |


    或者你可以测试不匹配：


    ```sql

    SELECT *

    FROM customers

    WHERE height<>170;

    SELECT *

    FROM customers

    WHERE NOT height=170

    ```


    这将给出其他的行：


    | id | 姓名 | 名字 | … | 身高 | … | 注册日期 |

    | --- | --- | --- | --- | --- | --- | --- |

    | 186 | Gunn | Ray | … | 163.8 | … | 2021-11-15 |

    | 144 | King | Ray | … | 176.8 | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | 170.3 | … | 2021-11-08 |

    | 475 | Blood | Drew | … | 171.0 | … | 2022-06-13 |

    | 523 | Sights | Seymour | … | 167.3 | … | 2022-07-11 |

    | 341 | Idate | Val | … | 177.1 | … | 2022-03-03 |

    | ~ 246 行 ~`


    对于像前面例子这样简单的算术表达式，你不会经常看到 `NOT` 形式的用法。然而，对于其他一些表达式，它更自然。


    ## 与列无关的断言


    `WHERE` 子句中的断言根本不必涉及表中的任何列。例如，以下都是可接受的：


    ```sql

    SELECT *

    FROM customers

    WHERE 1=1;  --  所有行

    SELECT *

    FROM customers

    WHERE 1=0;  --  无行

    ```


    在第一个例子中，断言 `1=1` 对所有行显然为真，所以所有行都被返回。断言 `1=0` 从不成立，所以没有行被返回。


    这些查询显然是无意义的，你可能永远不需要运行它们。然而，会有其他一些情况，你可能想测试断言本身，而不是获取实际数据。


    ## 全部与无


    `WHERE` 子句的结果总是有效的，即使它不是你想要的结果。例如：


    ```sql

    SELECT * FROM customers WHERE id>0; --  所有行

    SELECT * FROM customers WHERE id<0; --  无行

    ```


    一个断言可能导致返回所有行。这可能是一个无意义的断言，但它并非没有意义：下次，情况可能会不同。


    一个断言可能导致根本没有行返回。同样，下次情况也可能不同。查询不存在的东西并不是错误；但如果你接着*假定*会有更多结果，那*可能*就是错误了。


    请注意，在这种情况下，`id` 必须为正数并没有技术上的原因。这只是一个非常普遍的惯例。


    ## 处理 NULL


    `WHERE` 子句返回断言为**真**的行。如果一个断言不为真，它*不一定*是**假**。另一种可能是它是未知的。


    如果你计算前面例子的结果数量，你会发现身高小于 170 的顾客数量，加上身高不小于 170 的顾客数量，小于顾客总数。这是因为*部分*顾客没有记录身高值。


    在 SQL 中，`NULL` 代表一个缺失的值。为了方便起见（也可能会造成困惑），它通常用单词 **NULL** 显示，通常带有不同的颜色或背景色。然而，实际上那里空无一物。


    值可能缺失的原因有很多：


    *   该信息不适用，例如当一个人尚未去世时的死亡日期。

    *   该信息不可用，例如未提供的出生日期；你不能说这个人还没出生。

    *   该信息被视为无关紧要，例如额外的送货说明。

    *   不是上述原因，但我们就是不在意，所以没有输入。


    不幸的是，SQL 不区分这些不同的原因，因此在解释如何处理缺失值时需要小心；从技术上讲，对于 `NULL`，你只能说数据缺失，尽管有时你可以从上下文中*推断*一些信息。


    例如，死亡日期的缺失*本身*并不意味着一个人还没有去世。你需要更多的数据来确定。


    有时，人们会提到“NULL 值”，但这在术语上是矛盾的。这很重要，因为 `NULL` *在涉及值比较时总是被跳过*。这就是为什么 `height<170`
    的行与 `NOT height<170` 的行组合起来并不等于总行数：两个断言都只测试值，从不测试 `NULL`。在本例中，我们将直接使用 `NULL` 作为名词；有些人更喜欢“NULL
    标记”这个表述。


    你可以尝试用以下方法查找 `NULL`：


    ```sql

    SELECT *

    FROM customers

    WHERE height=NULL;  --  不起作用

    ```


    但它不会起作用。更准确地说，它会执行，但你不会得到任何结果。这是因为相等比较 `=` 只比较两个*值*。


    这完全说得通。如果你不知道身高，那么你就无法说它与另一个值相比如何。如果两个身高都是 `NULL`，你不能说它们相等，因为你根本不知道它们是什么。


    你可以在下面这个简单的例子中看到 `NULL` 比较：


    ```sql

    SELECT *

    FROM customers

    WHERE NULL=NULL;

    ```


    不会有结果，因为比较 `NULL` 总是为假。


    ### 有意忽略 NULL


    如果 `NULL=NULL` 总是为假，为什么 SQL 还允许比较 `NULL` 呢？更现实的情况是，你可能会比较两个列，而这两个列都可能包含 `NULL`。例如：


    ```sql

    SELECT *

    FROM artists

    WHERE born=died;

    ```


    不应该有任何结果，但你可能会得到几行：


    | id | 姓名 | 名字 | 别名 | 出生年份 | 去世年份 | 国籍 |

    | --- | --- | --- | --- | --- | --- | --- |

    | 348 | Daumier | Honoré | daumier | 1879 | 1879 | French |

    | 370 | Vermeer | Johannes | vermeer | 1675 | 1675 | Dutch |

    | ~ 2 行 ~`


    没有哪个在出生年份去世的人成为著名艺术家，所以任何匹配都表明有错误。然而，只有当*两个*值都存在且相同时，匹配才有意义。


    在这里，你肯定希望为了比较而忽略 `NULL`。

    '
- fmt: '## Finding NULLs


    如何查找缺失值？SQL 提供了一个特殊的表达式 `IS NULL` 来查找 `NULL`：


    ```sql

    SELECT *

    FROM customers

    WHERE height IS NULL;       --  missing height

    ```


    这将返回所有身高缺失的记录：


    | id | familyname | givenname | … | height | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … |   | … | 2022-06-12 |

    | 377 | Money | Xavier | … |   | … | 2022-04-02 |

    | 321 | King | May | … |   | … | 2022-02-11 |

    | 46 | Ering | Hank | … |   | … | 2021-08-15 |

    | 350 | Bea | May | … |   | … | 2022-03-12 |

    | 500 | Mentary | Rudi | … |   | … | 2022-06-25 |

    | ~ 56 rows ~ |


    你也可以查找所有存在的身高值：


    ```sql

    SELECT *

    FROM customers

    WHERE height IS NOT NULL;   --  existing heights

    ```


    这将返回其余的记录：


    | id | familyname | givenname | email | … | registered |

    | --- | --- | --- | --- | --- | --- |

    | 186 | Gunn | Ray | ray.gunn186@example.net | … | 2021-11-15 |

    | 144 | King | Ray | ray.king144@example.net | … | 2021-10-18 |

    | 179 | Inkling | Ivan | ivan.inkling179@example.com | … | 2021-11-08 |

    | 475 | Blood | Drew | drew.blood475@example.net | … | 2022-06-13 |

    | 523 | Sights | Seymour | seymour.sights523@example.net | … | 2022-07-11 |

    | 341 | Idate | Val | val.idate341@example.com | … | 2022-03-03 |

    | ~ 248 rows ~ |


    在第一个例子中，`IS NULL` 用于筛选缺失值。在第二个例子中，`IS NOT NULL` 用于筛选存在的值。你会发现，第二个例子的结果数量与将 `height<170`
    和 `NOT height<170` 的结果相加是一样的。


    你可以通过合并这些查询的结果来验证：


    ```sql

    SELECT * FROM customers WHERE height<170

    UNION

    SELECT * FROM customers WHERE NOT height<170;

    ```


    `UNION` 子句将两个或多个 `SELECT` 语句的结果合并，只要列匹配即可。稍后你会看到更多关于 `UNION` 的内容。


    说到 `NOT`，SQL 也接受另一种表达式：


    ```sql

    SELECT *

    FROM customers

    WHERE NOT height IS NULL;

    ```


    这个表达式在英语中读起来不太自然，也许如果你的名字叫尤达大师，会觉得更自然些。不过，它确实有一个小优点，就是遵循了 `NOT` 在其他用法中的相同模式，即紧跟在
    `WHERE` 关键字之后。这样，你的筛选条件要么是 `WHERE`，要么是 `WHERE NOT`（没有“可能”）。


    ## Numbers


    在前面的例子中，`height` 是一个数字，所以比较很简单。数字遵循所谓的 **Goldilocks Trichotomy**：比较两个数字时，结果要么是太小，要么是太大，要么是正好。


    要比较两个数字，你可以使用表 3-1 中所示的比较操作符。


    表 3-1


    比较操作符


    | Operator | Meaning | Negation |

    | --- | --- | --- |

    | `a = b` | Equal Value | `NOT a = b` ; `a <> b` |

    | `a < b` | Less Than | `NOT a < b` ; `a >= b` |

    | `a > b` | Greater Than | `NOT a > b` ; `a <= b` |

    | `a <= b` | Less Than or Equal To(“Up to”) | `NOT a <= b` ; `a > b` |

    | `a >= b` | Greater Than or Equal To(“From”) | `NOT a >= b` ; `a < b` |


    注意 `NOT a < b` 与 `a > b` 不同，因为必须考虑相等的情况。


    正如你稍后将看到的，这些操作符也适用于非数字比较，但需要赋予更恰当的含义。


    ### Discrete vs. Continuous Values


    比较以下两个语句：


    ```sql

    SELECT *

    FROM artists

    WHERE born >= 1700;

    SELECT *

    FROM artists

    WHERE born > 1699;

    ```


    它们当然会给你相同的结果，因为 `1700` 紧接在 `1699` 之后。


    | id | familyname | givenname | aka | born | died | nationality |

    | --- | --- | --- | --- | --- | --- | --- |

    | 147 | Pissarro | Camille | pissarro | 1830 | 1903 | French |

    | 107 | Legros | Alphonse | legros | 1837 | 1911 | French |

    | 176 | Caillebotte | Gustave | caillebotte | 1848 | 1894 | French |

    | 133 | Constable | John | constable | 1776 | 1837 | English |

    | 158 | Shaw | Joshua | shaw | 1776 | 1860 | American |

    | 5 | Puvis de Chavannes | Pierre | puvis | 1824 | 1898 | French |

    | ~ 99 rows ~ |


    然而，这并不总是成立。试试这个：


    ```sql

    SELECT *

    FROM customers

    WHERE height >= 170;

    ```


    结果如下：


    | id | familyname | givenname | … | height | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 144 | King | Ray | … | 176.8 | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | 170.3 | … | 2021-11-08 |

    | 475 | Blood | Drew | … | 171.0 | … | 2022-06-13 |

    | 341 | Idate | Val | … | 177.1 | … | 2022-03-03 |

    | 588 | Skies | Grace | … | 171.5 | … | 2022-08-13 |

    | 326 | Todeath | Boris | … | 186.3 | … | 2022-02-15 |

    | ~ 132 rows ~ |


    与以下查询比较：


    ```sql

    SELECT *

    FROM customers

    WHERE height > 169;

    ```


    结果如下：


    | id | familyname | givenname | … | height | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 144 | King | Ray | … | 176.8 | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | 170.3 | … | 2021-11-08 |

    | 475 | Blood | Drew | … | 171.0 | … | 2022-06-13 |

    | 341 | Idate | Val | … | 177.1 | … | 2022-03-03 |

    | 588 | Skies | Grace | … | 171.5 | … | 2022-08-13 |

    | 326 | Todeath | Boris | … | 186.3 | … | 2022-02-15 |

    | ~ 145 rows ~ |


    这很可能会得到非常不同的结果，因为 `170cm` 并不紧接在 `169cm` 之后。与出生年份不同，以厘米为单位的身高可以涉及小数部分。


    我们说出生年份的值是 **离散的**：它们是整数值，但没有中间值。另一方面，身高的值是 **连续的**：存在中间值。^([⁴](#fn4))


    对于离散值，你可以在前面两个例子之间做出选择，因为一个离散值肯定在下一个之前。然而，对于连续值，你没有这种选择。


    有时，连续值可以被简化为离散值。例如，时间是连续的，但你可以将其简化为离散的日期。货币价值可能是连续的，但你可以通过忽略小数部分（例如，只考虑美元而不考虑美分）使其离散化。


    ## Strings


    最基本的字符串筛选是查找精确匹配：


    ```sql

    SELECT *

    FROM customers

    WHERE state=''VIC'';

    ```


    这给出了位于 VIC 的客户：


    | id | familyname | givenname | … | state | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 186 | Gunn | Ray | … | VIC | … | 2021-11-15 |

    | 523 | Sights | Seymour | … | VIC | … | 2022-07-11 |

    | 545 | Knife | Jack | … | VIC | … | 2022-07-24 |

    | 505 | Singers | Carol | … | VIC | … | 2022-06-29 |

    | 492 | Long | Miles | … | VIC | … | 2022-06-21 |

    | 374 | Sharalike | Sharon | … | VIC | … | 2022-03-29 |

    | ~ 52 rows ~ |


    要获取居住在其他地方的客户：


    ```sql

    SELECT *

    FROM customers

    WHERE state<>''VIC''; --  WHERE NOT state=''VIC''

    ```


    这应该会给你所有其他州的客户：


    | id | familyname | givenname | … | state | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | NSW | … | 2022-06-12 |

    | 144 | King | Ray | … | NSW | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | WA | … | 2021-11-08 |

    | 475 | Blood | Drew | … | QLD | … | 2022-06-13 |

    | 341 | Idate | Val | … | NSW | … | 2022-03-03 |

    | 351 | Tate | Dick | … | NSW | … | 2022-03-13 |

    | ~ 217 rows ~ |


    与所有筛选器一样，筛选不存在的值并不是错误：


    ```sql

    SELECT *

    FROM customers

    WHERE state=''XYZ'';

    ```


    但是，如果数据类型不匹配，这*可能*是错误：


    ```sql

    SELECT *

    FROM customers

    WHERE state=23;

    ```


    在某些数据库管理系统（如 PostgreSQL 和 Oracle）中，这将导致错误，因为你无法将字符串与数字匹配。要使比较生效，你需要将数字表示为字符串：`WHERE
    state=''23''`。在其他一些系统（如 SQLite、MySQL/MariaDB 和 MSSQL）中，为了比较目的，数字会被隐式转换为字符串。'
  raw: '### Finding NULLs


    How, then, do you find missing values? SQL has a special expression `IS NULL`
    to find `NULL`s:


    ```

    SELECT *

    FROM customers

    WHERE height IS NULL;       --  missing height

    ```


    This will give you all the missing heights:


    | id | familyname | givenname | … | height | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … |   | … | 2022-06-12 |

    | 377 | Money | Xavier | … |   | … | 2022-04-02 |

    | 321 | King | May | … |   | … | 2022-02-11 |

    | 46 | Ering | Hank | … |   | … | 2021-08-15 |

    | 350 | Bea | May | … |   | … | 2022-03-12 |

    | 500 | Mentary | Rudi | … |   | … | 2022-06-25 |

    | ~ 56 rows ~ |


    You can also find all the existing heights:


    ```

    SELECT *

    FROM customers

    WHERE height IS NOT NULL;   --  existing heights

    ```


    That will give you the rest of them:


    | id | familyname | givenname | email | … | registered |

    | --- | --- | --- | --- | --- | --- |

    | 186 | Gunn | Ray | ray.gunn186@example.net | … | 2021-11-15 |

    | 144 | King | Ray | ray.king144@example.net | … | 2021-10-18 |

    | 179 | Inkling | Ivan | ivan.inkling179@example.com | … | 2021-11-08 |

    | 475 | Blood | Drew | drew.blood475@example.net | … | 2022-06-13 |

    | 523 | Sights | Seymour | seymour.sights523@example.net | … | 2022-07-11 |

    | 341 | Idate | Val | val.idate341@example.com | … | 2022-03-03 |

    | ~ 248 rows ~ |


    In the first example, `IS NULL` selects for missing values. In the second, `IS
    NOT NULL` selects for values which exist. You will find that the number of results
    for the second example is the same as adding up the results for `height<170` and
    `NOT height<170`.


    You can verify that if you combine the results of those queries:


    ```

    SELECT * FROM customers WHERE height<170

    UNION

    SELECT * FROM customers WHERE NOT height<170;

    ```


    The `UNION` clause combines the results from two or more `SELECT` statements,
    as long as the columns match. You will see more on `UNION` later.


    Speaking of `NOT`, SQL will also accept an alternative expression:


    ```

    SELECT *

    FROM customers

    WHERE NOT height IS NULL;

    ```


    The expression reads less naturally in English, perhaps more naturally if your
    name is Yoda. However, it does have the minor benefit of following the same pattern
    as other uses of `NOT` in that it immediately follows the `WHERE` keyword. That
    way, your filter is either `WHERE` or `WHERE NOT` (there is no “maybe”).


    ## Numbers


    In the preceding example, the `height` is a number, so comparisons are simple.
    Numbers follow the so-called **Goldilocks Trichotomy**: when comparing numbers,
    the second is too low, too high, or just right.


    To compare two numbers, you can use the comparison operators shown in Table [3-1](#601766_1_En_3_Chapter.xhtml#Tab1).


    Table 3-1


    Comparison Operators


    | Operator | Meaning | Negation |

    | --- | --- | --- |

    | a = b | Equal Value | NOT a = b ; a <> b |

    | a < b | Less Than | NOT a < b ; a >= b |

    | a > b | Greater Than | NOT a > b ; a <= b |

    | a <= b | Less Than or Equal To(“Up to”) | NOT a <= b ; a > b |

    | a >= b | Greater Than or Equal To(“From”) | NOT a >= b ; a < b |


    Note that `NOT a < b` is *not* the same as `a > b`, as you have to allow for the
    equals case.


    As you will see later, these operators will also do for nonnumeric comparisons,
    but will need more appropriate meanings.


    ### Discrete vs. Continuous Values


    Compare the two statements:


    ```

    SELECT *

    FROM artists

    WHERE born >= 1700;

    SELECT *

    FROM artists

    WHERE born > 1699;

    ```


    They will, of course, give you the same results, since `1700` comes immediately
    after `1699`.


    | id | familyname | givenname | aka | born | died | nationality |

    | --- | --- | --- | --- | --- | --- | --- |

    | 147 | Pissarro | Camille | pissarro | 1830 | 1903 | French |

    | 107 | Legros | Alphonse | legros | 1837 | 1911 | French |

    | 176 | Caillebotte | Gustave | caillebotte | 1848 | 1894 | French |

    | 133 | Constable | John | constable | 1776 | 1837 | English |

    | 158 | Shaw | Joshua | shaw | 1776 | 1860 | American |

    | 5 | Puvis de Chavannes | Pierre | puvis | 1824 | 1898 | French |

    | ~ 99 rows ~ |


    However, that’s not always true. Try this:


    | id | familyname | givenname | … | height | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 144 | King | Ray | … | 176.8 | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | 170.3 | … | 2021-11-08 |

    | 475 | Blood | Drew | … | 171.0 | … | 2022-06-13 |

    | 341 | Idate | Val | … | 177.1 | … | 2022-03-03 |

    | 588 | Skies | Grace | … | 171.5 | … | 2022-08-13 |

    | 326 | Todeath | Boris | … | 186.3 | … | 2022-02-15 |

    | ~ 132 rows ~ |


    ```

    SELECT *

    FROM customers

    WHERE height >= 170;

    ```


    Compare that to


    | id | familyname | givenname | … | height | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 144 | King | Ray | … | 176.8 | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | 170.3 | … | 2021-11-08 |

    | 475 | Blood | Drew | … | 171.0 | … | 2022-06-13 |

    | 341 | Idate | Val | … | 177.1 | … | 2022-03-03 |

    | 588 | Skies | Grace | … | 171.5 | … | 2022-08-13 |

    | 326 | Todeath | Boris | … | 186.3 | … | 2022-02-15 |

    | ~ 145 rows ~ |


    ```

    SELECT *

    FROM artists

    WHERE height > 169;

    ```


    This will probably give a very different result, since `170cm` doesn’t immediately
    come after `169cm`. Unlike the year of birth, height in centimeters can involve
    fractional parts.


    We say that values for the year of birth are **discrete**: there are whole values,
    but no between values. On the other hand, values for the height are **continuous**:
    there are between values.^([⁴](#fn4))


    Whenever you have discrete values, you have a choice between the first two examples
    earlier, since one discrete value is definitely before the next. With continuous
    values, however, you don’t have this choice.


    Sometimes, continuous values can be simplified as discrete values. For example,
    time is continuous, but you can simplify it into discrete dates. Monetary value
    may be continuous, but you can make it discrete by ignoring fractional parts (e.g.,
    dollars without cents).


    ## Strings


    The most basic string filter is to look for exact matches:


    ```

    SELECT *

    FROM customers

    WHERE state=''VIC'';

    ```


    This gives customers in VIC:


    | id | familyname | givenname | … | state | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 186 | Gunn | Ray | … | VIC | … | 2021-11-15 |

    | 523 | Sights | Seymour | … | VIC | … | 2022-07-11 |

    | 545 | Knife | Jack | … | VIC | … | 2022-07-24 |

    | 505 | Singers | Carol | … | VIC | … | 2022-06-29 |

    | 492 | Long | Miles | … | VIC | … | 2022-06-21 |

    | 374 | Sharalike | Sharon | … | VIC | … | 2022-03-29 |

    | ~ 52 rows ~ |


    To get the customers living elsewhere:


    ```

    SELECT *

    FROM customers

    WHERE state''VIC''; --  WHERE NOT state=''VIC''

    ```


    This should give you customers in all the other states:


    | id | familyname | givenname | … | state | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | NSW | … | 2022-06-12 |

    | 144 | King | Ray | … | NSW | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | WA | … | 2021-11-08 |

    | 475 | Blood | Drew | … | QLD | … | 2022-06-13 |

    | 341 | Idate | Val | … | NSW | … | 2022-03-03 |

    | 351 | Tate | Dick | … | NSW | … | 2022-03-13 |

    | ~ 217 rows ~ |


    As with all filters, filtering for nonexistent values is not an error:


    ```

    SELECT *

    FROM customers

    WHERE state=''XYZ'';

    ```


    However, it *may* be an error if your data types don’t match:


    ```

    SELECT *

    FROM customers

    WHERE state=23;

    ```


    With some DBMSs, such as PostgreSQL and Oracle, this would result in an error,
    since you cannot match a string with a number. To make the comparison work, you
    would need to express the number as a string: `WHERE state="23"`. With some others,
    such as SQLite, MySQL/MariaDB, and MSSQL, the number is implicitly converted to
    a string for comparison purposes.'
  trans: '## 查找 NULL


    如何查找缺失值？SQL 提供了一个特殊的表达式 `IS NULL` 来查找 `NULL`：


    ```sql

    SELECT *

    FROM customers

    WHERE height IS NULL;       --  身高缺失

    ```


    这将返回所有身高缺失的记录：


    | id | familyname | givenname | … | height | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … |   | … | 2022-06-12 |

    | 377 | Money | Xavier | … |   | … | 2022-04-02 |

    | 321 | King | May | … |   | … | 2022-02-11 |

    | 46 | Ering | Hank | … |   | … | 2021-08-15 |

    | 350 | Bea | May | … |   | … | 2022-03-12 |

    | 500 | Mentary | Rudi | … |   | … | 2022-06-25 |

    | ~ 56 行 ~ |


    你也可以查找所有存在的身高值：


    ```sql

    SELECT *

    FROM customers

    WHERE height IS NOT NULL;   --  身高已存在

    ```


    这将返回其余的记录：


    | id | familyname | givenname | email | … | registered |

    | --- | --- | --- | --- | --- | --- |

    | 186 | Gunn | Ray | ray.gunn186@example.net | … | 2021-11-15 |

    | 144 | King | Ray | ray.king144@example.net | … | 2021-10-18 |

    | 179 | Inkling | Ivan | ivan.inkling179@example.com | … | 2021-11-08 |

    | 475 | Blood | Drew | drew.blood475@example.net | … | 2022-06-13 |

    | 523 | Sights | Seymour | seymour.sights523@example.net | … | 2022-07-11 |

    | 341 | Idate | Val | val.idate341@example.com | … | 2022-03-03 |

    | ~ 248 行 ~ |


    在第一个例子中，`IS NULL` 用于筛选缺失值。在第二个例子中，`IS NOT NULL` 用于筛选存在的值。你会发现，第二个例子的结果数量与将 `height<170`
    和 `NOT height<170` 的结果相加是一样的。


    你可以通过合并这些查询的结果来验证：


    ```sql

    SELECT * FROM customers WHERE height<170

    UNION

    SELECT * FROM customers WHERE NOT height<170;

    ```


    `UNION` 子句将两个或多个 `SELECT` 语句的结果合并，只要列匹配即可。稍后你会看到更多关于 `UNION` 的内容。


    说到 `NOT`，SQL 也接受另一种表达式：


    ```sql

    SELECT *

    FROM customers

    WHERE NOT height IS NULL;

    ```


    这个表达式在英语中读起来不太自然，也许如果你的名字叫尤达大师，会觉得更自然些。不过，它确实有一个小优点，就是遵循了 `NOT` 在其他用法中的相同模式，即紧跟在
    `WHERE` 关键字之后。这样，你的筛选条件要么是 `WHERE`，要么是 `WHERE NOT`（没有“可能”）。


    ## 数字


    在前面的例子中，`height` 是一个数字，所以比较很简单。数字遵循所谓的 **金发姑娘三分法**：比较两个数字时，结果要么是太小，要么是太大，要么是正好。


    要比较两个数字，你可以使用表 3-1 中所示的比较操作符。


    表 3-1


    比较操作符


    | 操作符 | 含义 | 否定形式 |

    | --- | --- | --- |

    | `a = b` | 值相等 | `NOT a = b` ; `a <> b` |

    | `a < b` | 小于 | `NOT a < b` ; `a >= b` |

    | `a > b` | 大于 | `NOT a > b` ; `a <= b` |

    | `a <= b` | 小于或等于（“不高于”） | `NOT a <= b` ; `a > b` |

    | `a >= b` | 大于或等于（“不低于”） | `NOT a >= b` ; `a < b` |


    注意 `NOT a < b` 与 `a > b` 不同，因为必须考虑相等的情况。


    正如你稍后将看到的，这些操作符也适用于非数字比较，但需要赋予更恰当的含义。


    ### 离散值 vs. 连续值


    比较以下两个语句：


    ```sql

    SELECT *

    FROM artists

    WHERE born >= 1700;

    SELECT *

    FROM artists

    WHERE born > 1699;

    ```


    它们当然会给你相同的结果，因为 `1700` 紧接在 `1699` 之后。


    | id | familyname | givenname | aka | born | died | nationality |

    | --- | --- | --- | --- | --- | --- | --- |

    | 147 | Pissarro | Camille | pissarro | 1830 | 1903 | French |

    | 107 | Legros | Alphonse | legros | 1837 | 1911 | French |

    | 176 | Caillebotte | Gustave | caillebotte | 1848 | 1894 | French |

    | 133 | Constable | John | constable | 1776 | 1837 | English |

    | 158 | Shaw | Joshua | shaw | 1776 | 1860 | American |

    | 5 | Puvis de Chavannes | Pierre | puvis | 1824 | 1898 | French |

    | ~ 99 行 ~ |


    然而，这并不总是成立。试试这个：


    ```sql

    SELECT *

    FROM customers

    WHERE height >= 170;

    ```


    结果如下：


    | id | familyname | givenname | … | height | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 144 | King | Ray | … | 176.8 | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | 170.3 | … | 2021-11-08 |

    | 475 | Blood | Drew | … | 171.0 | … | 2022-06-13 |

    | 341 | Idate | Val | … | 177.1 | … | 2022-03-03 |

    | 588 | Skies | Grace | … | 171.5 | … | 2022-08-13 |

    | 326 | Todeath | Boris | … | 186.3 | … | 2022-02-15 |

    | ~ 132 行 ~ |


    与以下查询比较：


    ```sql

    SELECT *

    FROM customers

    WHERE height > 169;

    ```


    结果如下：


    | id | familyname | givenname | … | height | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 144 | King | Ray | … | 176.8 | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | 170.3 | … | 2021-11-08 |

    | 475 | Blood | Drew | … | 171.0 | … | 2022-06-13 |

    | 341 | Idate | Val | … | 177.1 | … | 2022-03-03 |

    | 588 | Skies | Grace | … | 171.5 | … | 2022-08-13 |

    | 326 | Todeath | Boris | … | 186.3 | … | 2022-02-15 |

    | ~ 145 行 ~ |


    这很可能会得到非常不同的结果，因为 `170cm` 并不紧接在 `169cm` 之后。与出生年份不同，以厘米为单位的身高可以涉及小数部分。


    我们说出生年份的值是 **离散的**：它们是整数值，但没有中间值。另一方面，身高的值是 **连续的**：存在中间值。^(⁴)


    对于离散值，你可以在前面两个例子之间做出选择，因为一个离散值肯定在下一个之前。然而，对于连续值，你没有这种选择。


    有时，连续值可以被简化为离散值。例如，时间是连续的，但你可以将其简化为离散的日期。货币价值可能是连续的，但你可以通过忽略小数部分（例如，只考虑美元而不考虑美分）使其离散化。


    ## 字符串


    最基本的字符串筛选是查找精确匹配：


    ```sql

    SELECT *

    FROM customers

    WHERE state=''VIC'';

    ```


    这给出了位于 VIC 的客户：


    | id | familyname | givenname | … | state | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 186 | Gunn | Ray | … | VIC | … | 2021-11-15 |

    | 523 | Sights | Seymour | … | VIC | … | 2022-07-11 |

    | 545 | Knife | Jack | … | VIC | … | 2022-07-24 |

    | 505 | Singers | Carol | … | VIC | … | 2022-06-29 |

    | 492 | Long | Miles | … | VIC | … | 2022-06-21 |

    | 374 | Sharalike | Sharon | … | VIC | … | 2022-03-29 |

    | ~ 52 行 ~ |


    要获取居住在其他地方的客户：


    ```sql

    SELECT *

    FROM customers

    WHERE state<>''VIC''; --  WHERE NOT state=''VIC''

    ```


    这应该会给你所有其他州的客户：


    | id | familyname | givenname | … | state | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | NSW | … | 2022-06-12 |

    | 144 | King | Ray | … | NSW | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | WA | … | 2021-11-08 |

    | 475 | Blood | Drew | … | QLD | … | 2022-06-13 |

    | 341 | Idate | Val | … | NSW | … | 2022-03-03 |

    | 351 | Tate | Dick | … | NSW | … | 2022-03-13 |

    | ~ 217 行 ~ |


    与所有筛选器一样，筛选不存在的值并不是错误：


    ```sql

    SELECT *

    FROM customers

    WHERE state=''XYZ'';

    ```


    但是，如果数据类型不匹配，这*可能*是错误：


    ```sql

    SELECT *

    FROM customers

    WHERE state=23;

    ```


    在某些数据库管理系统（如 PostgreSQL 和 Oracle）中，这将导致错误，因为你无法将字符串与数字匹配。要使比较生效，你需要将数字表示为字符串：`WHERE
    state=''23''`。在其他一些系统（如 SQLite、MySQL/MariaDB 和 MSSQL）中，为了比较目的，数字会被隐式转换为字符串。'
- fmt: '### Quotes


    在 SQL 中，字符串使用*单引号*括起来。双引号具有完全不同的含义。


    对此有一些罕见的例外：


    *   Microsoft Access 允许你使用双引号作为单引号的替代；实际上，它似乎更偏好双引号，但你不应该这样做。

    *   MySQL/MariaDB 也允许你使用双引号，但这取决于其运行模式；在 ANSI 模式下，双引号不能用于字符串。


    无论如何，单引号总是适用的。


    如果你使用双引号而不是单引号会发生什么？


    ```sql

    SELECT *

    FROM customers

    WHERE state="VIC";      --  may be OK in MySQL/MariaDB

    ```


    对于大多数数据库管理系统，你会收到错误信息，指出列 `VIC` 未知。也就是说，双引号被解释为包围列名，而不是字符串。SQL 认为你试图将 `state`
    列与未知的 `VIC` 列进行匹配。


    有时这可能会导致混淆：


    ```sql

    SELECT * FROM customers WHERE familyname=''Town'';

    SELECT * FROM customers WHERE familyname="Town";

    ```


    前面的第一个示例查找 `familyname` 匹配 `Town` 的客户，而第二个示例则查找姓氏恰好与他们居住城镇名相同的客户。


    如果你不在 ANSI 模式下运行 MySQL/MariaDB，双引号将被解释为字符串，并且你会得到一个成功的结果。请参阅下面关于在 MySQL/MariaDB
    中运行 ANSI 模式的部分。


    你可以在任何列周围使用双引号：


    ```sql

    SELECT *

    FROM customers

    WHERE "state"=''VIC'';

    ```


    这里的双引号根本不会产生任何影响，因为 SQL 已经知道 `state` 是列名。


    关于计算列值的第 [5](#601766_1_En_5_Chapter.xhtml) 章有更多关于使用双引号的信息。


    ### More on MySQL/MariaDB Modes


    如果你使用 MySQL 或 MariaDB，我们建议你始终将会话设置为 ANSI 模式。你可以一开始就这样做：


    ```sql

    SET SESSION sql_mode = ''ANSI'';

    ```


    此语句只需要在会话开始时运行一次。就我们的目的而言，最重要的差异将体现在：


    *   双引号的使用

    *   字符串连接（拼接字符串），你稍后在处理计算时会看到。


    如果你不使用 ANSI 模式，你仍然可以完成大多数操作，但某些语法可能需要调整。


    本书将假定你已将会话设置为 ANSI 模式。


    ### More on Double and Single Quotes


    有一个名为 `badtable` 的表，其中可以看到各种有问题的名称：


    ```sql

    SELECT * FROM badtable;

    ```


    你将看到以下结果：


    | customer code | customer | order | 1st | 42 | last-date |

    | --- | --- | --- | --- | --- | --- |

    | 23 | Fred | 42 | 2020-01-01 | Life, … | 2020-01-31 |

    | 37 | Wilma | 54 | 2020-02-01 | I think …. | 2020-02-29 |


    到目前为止，一切正常。但是，如果你尝试单独选择这些列，你会得到各种错误：


    ```sql

    SELECT

    customer code,  --  customer AS code

    customer,

    order,          --  ORDER BY

    1st,            --  number 1 AS st

    42,             --  number 42

    last-date       --  last -  date

    FROM badtable;

    ```


    只有 `customer` 列是正确的。有些会导致错误，有些会被误解。


    引用这些有问题列名的唯一方法是使用双引号将其括起来：


    | code | customer | order | st | ?column? | last-date |

    | --- | --- | --- | --- | --- | --- |

    | Fred | Fred | 42 | 1 | 42 | 2020-01-31 |

    | Wilma | Wilma | 54 | 1 | 42 | 2020-02-29 |


    ```sql

    SELECT

    customer code,  --  customer AS code

    customer,

    "order",

    1st,            --  number 1 AS st

    42,             --  number 42

    "last-date"

    FROM badtable;

    ```


    两个被误解的列涉及别名。你稍后会看到更多关于别名的内容，但你会看到歧义是由于 `AS` 这个词是可选的这一事实造成的。


    另一个被误解的列是 `42` 被解释为一个值，这是合法的，而不是列名。为了完成这项工作，你也需要给这些名称加上引号：


    ```sql

    SELECT

    "customer code",

    customer,

    "order",

    "1st",

    "42",

    "last-date"

    FROM badtable

    ```


    关于列名有一些简单的规则，而我们似乎费了很大力气去违反它们：


    *   名称不应包含空格或其他特殊字符，如连字符。如果你需要分隔符，通常应使用下划线 (`_`)。

    *   名称不应以数字开头，并且当然不应 `be` 一个数字。

    *   名称应避免使用 SQL 关键字，如 `order`。某些数据库管理系统可能会让你感到惊讶。例如，PostgreSQL 将“name”视为关键字。


    在正常情况下，你的查询不应该需要双引号，因为一个好的 SQL 开发人员应该知道如何避免这些问题。然而，你不能总是为另一位开发人员所做的工作负责，所以有时你可能需要双引号。


    ### Case Sensitivity


    字符串的比较方式并不总是一样的。例如，`customers` 表中的所有州名都是大写的。如果你尝试匹配小写：


    ```sql

    SELECT *

    FROM customers

    WHERE state=''vic'';

    ```


    你的结果会有所不同。


    在 PostgreSQL、Oracle 和 SQLite 中，默认情况下，你不会得到任何匹配项。然而，对于 MySQL/MariaDB 和 MSSQL，你会像之前一样得到匹配项。


    字符串变体如何比较被称为**排序规则**。在其他语言中，可能存在许多变体，但在英语中，主要的变体是大写/小写。


    PostgreSQL、Oracle 和 SQLite 的默认排序规则是大小写敏感的；也就是说，大写和小写被视为不同。在 MySQL/MariaDB 和 MSSQL
    中，默认排序规则是大小写不敏感的。*但是，个别数据库可能已使用替代排序规则设置。*


    表 `sorting` 在其 `stringvalue` 列中使用了不一致的大小写，因此你可以尝试：


    ```sql

    SELECT *

    FROM sorting

    WHERE stringvalue=''APPLE'';

    ```


    同样，结果的数量将取决于排序规则。


    在任何情况下，你的表或数据库的排序规则可能不是默认的。如果你不确定排序规则，可以运行这个简单的查询：


    ```sql

    SELECT *

    FROM customers

    WHERE ''a''=''A'';

    ```


    如果你的排序规则是大小写敏感的，那么断言 `''a''=''A''` 为假，因此你将不会得到任何行。如果是大小写不敏感的，那么断言为真，因此你将得到所有行。


    如果你的排序规则是大小写敏感的，但你仍然希望进行大小写不敏感的匹配，则有两种解决方案。


    首先，你可以强制将数据转换为大写或小写，然后测试结果。例如：


    ```sql

    SELECT *

    FROM customers

    WHERE lower(state)=''vic'';

    ```


    这是一个稍微昂贵的解决方案，因为数据库管理系统需要在每一行上执行一个操作才能进行比较。


    第二个解决方案是要求数据库管理系统为查询使用替代排序规则。但是，这可能非常复杂。


    如果你的数据库排序规则是大小写敏感的，并且你发现需要进行许多大小写不敏感的搜索，你也许可以使用**索引**来减少工作量。数据库索引就像书中的索引，可以帮助数据库管理系统更快地查找内容。索引将在后面讨论。'
  raw: '### Quotes


    In SQL, strings are enclosed in *single* quotes. Double quotes have a completely
    different meaning.


    There are a few rare exceptions to this:


    *   Microsoft Access allows you to use double quotes as an alternative to single
    quotes; indeed, it appears to prefer them, but you shouldn’t.


    *   MySQL/MariaDB also allows you to use double quotes, but this depends on the
    mode it’s running in; in ANSI mode, double quotes cannot be used for strings.


    In any case, single quotes always do the job.


    What happens if you use double quotes instead of single quotes?


    ```

    SELECT *

    FROM customers

    WHERE state="VIC";      --  may be OK in MySQL/MariaDB

    ```


    With most DBMSs, you will get an error message to the effect that the column `VIC`
    is unknown. That is, the double quotes are interpreted as enclosing a column name,
    and not a string. SQL imagines that you are trying to match the `state` column
    with the unknown `VIC` column.


    There are times when this can lead to confusion:


    ```

    SELECT * FROM customers WHERE familyname=''Town'';

    SELECT * FROM customers WHERE familyname="Town";

    ```


    The preceding first example looks for customers whose `familyname` matches `Town`,
    while the second looks for customers whose family name happens to be the same
    as the town where they live.


    If you don’t run MySQL/MariaDB in ANSI mode, the double quotes will be interpreted
    as a string, and you will get a successful result. See the following section on
    running MySQL/MariaDB in ANSI mode.


    You can use double quotes around any column:


    ```

    SELECT *

    FROM customers

    WHERE "state"=''VIC'';

    ```


    The double quotes here will make no difference at all, since SQL already knows
    that `state` is a column name.


    Chapter [5](#601766_1_En_5_Chapter.xhtml) on Calculating Column Values has more
    information on using double quotes.


    ### More on MySQL/MariaDB Modes


    If you are using MySQL or MariaDB, we recommend you always set the session to
    ANSI mode. You can do this at the beginning:


    ```

    SET SESSION sql_mode = ''ANSI'';

    ```


    This statement only needs to be run only once at the beginning of the session.
    For our purposes, the most important differences will be in


    *   The use of double quotes


    *   String concatenation (joining strings), which you will see later when working
    with calculations.


    If you don’t use ANSI mode, you can still do most things, but some of the syntax
    may need to be adapted.


    This book will assume that you have set the session to ANSI mode.


    ### More on Double and Single Quotes


    There is a table called `badtable` in which you can see all sort of problematic
    names:


    ```

    SELECT * FROM badtable;

    ```


    You will see the following results:


    | customer code | customer | order | 1st | 42 | last-date |

    | --- | --- | --- | --- | --- | --- |

    | 23 | Fred | 42 | 2020-01-01 | Life, … | 2020-01-31 |

    | 37 | Wilma | 54 | 2020-02-01 | I think …. | 2020-02-29 |


    So far, so good. However, if you try to select the columns individually, you will
    get all sorts of errors:


    ```

    SELECT

    customer code,  --  customer AS code

    customer,

    order,          --  ORDER BY

    1st,            --  number 1 AS st

    42,             --  number 42

    last-date       --  last -  date

    FROM badtable;

    ```


    Only the `customer` column is correct. Some will lead to errors, and some will
    be misinterpreted.


    The only way to refer to the problematic column names is to double-quote them:


    | code | customer | order | st | ?column? | last-date |

    | --- | --- | --- | --- | --- | --- |

    | Fred | Fred | 42 | 1 | 42 | 2020-01-31 |

    | Wilma | Wilma | 54 | 1 | 42 | 2020-02-29 |


    ```

    SELECT

    customer code,  --  customer AS code

    customer,

    "order",

    1st,            --  number 1 AS st

    42,             --  number 42

    "last-date"

    FROM badtable;

    ```


    Two of the misinterpreted columns involve aliases. You will see more on aliases
    later, but you’ll see that the ambiguity is due to the fact that the word `AS`
    is optional.


    The other misinterpreted column is that the `42` is interpreted as a value, which
    is legitimate, rather than as a column name. To finish the job, you’ll need quotes
    around these names too:


    ```

    SELECT

    "customer code",

    customer,

    "order",

    "1st",

    "42",

    "last-date"

    FROM badtable

    ```


    There are a few simple rules regarding column names, which we appear to have taken
    a lot of effort to violate:


    *   Names shouldn’t include spaces or other special characters such as the hyphen.
    If you need a separator, you would typically use the underscore (`_`).


    *   Names shouldn’t start with a number and certainly shouldn’t `be` a number.


    *   Names should avoid SQL keywords such as `order`. Some DBMSs may catch you
    by surprise here. For example, PostgreSQL regards “name” as a keyword.


    Under normal circumstances, your queries shouldn’t need double quotes, because
    a good SQL developer should know how to avoid these problems. However, you can’t
    always be held accountable for what another developer has done, so you may need
    the double quotes some time.


    ### Case Sensitivity


    How strings compare isn’t always the same. For example, the `customers` table
    has all states in upper case. If you try to match lower case:


    ```

    SELECT *

    FROM customers

    WHERE state=''vic'';

    ```


    your results will vary.


    In PostgreSQL, Oracle, and SQLite, by default, you won’t get any matches. With
    MySQL/MariaDB and MSSQL, however, you will get your matches as before.


    How variations of strings compare is called the **collation**. In other languages,
    there can be many variations, but in English the main variation is upper/lower
    case.


    The default collation for PostgreSQL, Oracle, and SQLite is case sensitive; that
    is, upper case and lower case are treated as different. In MySQL/MariaDB and MSSQL,
    the default collation is case insensitive. *However, an individual database may
    have been set up with an alternative collation.*


    The table `sorting` uses inconsistent case in its `stringvalue` column, so you
    can try


    ```

    SELECT *

    FROM sorting

    WHERE stringvalue=''APPLE'';

    ```


    Again, the number of results will depend on the collation.


    In any case, the collation for your table or database may not be the default.
    If you’re not sure about your collation, you can run this trivial query:


    ```

    SELECT *

    FROM customers

    WHERE ''a''=''A'';

    ```


    If your collation is case sensitive, then the assertion `''a''=''A''` is false,
    so you will get no rows. If it is case insensitive, then assertion is true, so
    you will get all of the rows.


    If your collation is case sensitive, but you still want a case-insensitive match,
    there are two solutions.


    First, you can force convert the data to upper or lower case, and test the results.
    For example:


    ```

    SELECT *

    FROM customers

    WHERE lower(state)=''vic'';

    ```


    This is a slightly costly solution, since the DBMS will need to perform an operation
    on every row before it can make the comparison.


    The second solution is to ask the DBMS to use an alternative collation for the
    query. However, this can be very complicated.


    If your database collation is case sensitive, and you find that you need to make
    many case-insensitive searches, you might be able to use an **index** to reduce
    the workload. A database index is like an index in a book and can help the DBMS
    to find things more quickly. Indexes are discussed later.'
  trans: '

    ### 引号


    在 SQL 中，字符串使用*单引号*括起来。双引号具有完全不同的含义。


    对此有一些罕见的例外：


    *   Microsoft Access 允许你使用双引号作为单引号的替代；实际上，它似乎更偏好双引号，但你不应该这样做。

    *   MySQL/MariaDB 也允许你使用双引号，但这取决于其运行模式；在 ANSI 模式下，双引号不能用于字符串。


    无论如何，单引号总是适用的。


    如果你使用双引号而不是单引号会发生什么？


    ```sql

    SELECT *

    FROM customers

    WHERE state="VIC";      --  在 MySQL/MariaDB 中可能没问题

    ```


    对于大多数数据库管理系统，你会收到错误信息，指出列 `VIC` 未知。也就是说，双引号被解释为包围列名，而不是字符串。SQL 认为你试图将 `state`
    列与未知的 `VIC` 列进行匹配。


    有时这可能会导致混淆：


    ```sql

    SELECT * FROM customers WHERE familyname=''Town'';

    SELECT * FROM customers WHERE familyname="Town";

    ```


    前面的第一个示例查找 `familyname` 匹配 `Town` 的客户，而第二个示例则查找姓氏恰好与他们居住城镇名相同的客户。


    如果你不在 ANSI 模式下运行 MySQL/MariaDB，双引号将被解释为字符串，并且你会得到一个成功的结果。请参阅下面关于在 MySQL/MariaDB
    中运行 ANSI 模式的部分。


    你可以在任何列周围使用双引号：


    ```sql

    SELECT *

    FROM customers

    WHERE "state"=''VIC'';

    ```


    这里的双引号根本不会产生任何影响，因为 SQL 已经知道 `state` 是列名。


    关于计算列值的第 5 章有更多关于使用双引号的信息。


    ### 关于 MySQL/MariaDB 模式的更多信息


    如果你使用 MySQL 或 MariaDB，我们建议你始终将会话设置为 ANSI 模式。你可以一开始就这样做：


    ```sql

    SET SESSION sql_mode = ''ANSI'';

    ```


    此语句只需要在会话开始时运行一次。就我们的目的而言，最重要的差异将体现在：


    *   双引号的使用

    *   字符串连接（拼接字符串），你稍后在处理计算时会看到。


    如果你不使用 ANSI 模式，你仍然可以完成大多数操作，但某些语法可能需要调整。


    本书将假定你已将会话设置为 ANSI 模式。


    ### 关于双引号和单引号的更多内容


    有一个名为 `badtable` 的表，其中可以看到各种有问题的名称：


    ```sql

    SELECT * FROM badtable;

    ```


    你将看到以下结果：


    | customer code | customer | order | 1st | 42 | last-date |

    | --- | --- | --- | --- | --- | --- |

    | 23 | Fred | 42 | 2020-01-01 | Life, … | 2020-01-31 |

    | 37 | Wilma | 54 | 2020-02-01 | I think …. | 2020-02-29 |


    到目前为止，一切正常。但是，如果你尝试单独选择这些列，你会得到各种错误：


    ```sql

    SELECT

    customer code,  --  customer AS code

    customer,

    order,          --  ORDER BY

    1st,            --  number 1 AS st

    42,             --  number 42

    last-date       --  last -  date

    FROM badtable;

    ```


    只有 `customer` 列是正确的。有些会导致错误，有些会被误解。


    引用这些有问题列名的唯一方法是使用双引号将其括起来：


    | code | customer | order | st | ?column? | last-date |

    | --- | --- | --- | --- | --- | --- |

    | Fred | Fred | 42 | 1 | 42 | 2020-01-31 |

    | Wilma | Wilma | 54 | 1 | 42 | 2020-02-29 |


    ```sql

    SELECT

    customer code,  --  customer AS code

    customer,

    "order",

    1st,            --  number 1 AS st

    42,             --  number 42

    "last-date"

    FROM badtable;

    ```


    两个被误解的列涉及别名。你稍后会看到更多关于别名的内容，但你会看到歧义是由于 `AS` 这个词是可选的这一事实造成的。


    另一个被误解的列是 `42` 被解释为一个值，这是合法的，而不是列名。为了完成这项工作，你也需要给这些名称加上引号：


    ```sql

    SELECT

    "customer code",

    customer,

    "order",

    "1st",

    "42",

    "last-date"

    FROM badtable

    ```


    关于列名有一些简单的规则，而我们似乎费了很大力气去违反它们：


    *   名称不应包含空格或其他特殊字符，如连字符。如果你需要分隔符，通常应使用下划线 (`_`)。

    *   名称不应以数字开头，并且当然不应 `be` 一个数字。

    *   名称应避免使用 SQL 关键字，如 `order`。某些数据库管理系统可能会让你感到惊讶。例如，PostgreSQL 将“name”视为关键字。


    在正常情况下，你的查询不应该需要双引号，因为一个好的 SQL 开发人员应该知道如何避免这些问题。然而，你不能总是为另一位开发人员所做的工作负责，所以有时你可能需要双引号。


    ### 大小写敏感性


    字符串的比较方式并不总是一样的。例如，`customers` 表中的所有州名都是大写的。如果你尝试匹配小写：


    ```sql

    SELECT *

    FROM customers

    WHERE state=''vic'';

    ```


    你的结果会有所不同。


    在 PostgreSQL、Oracle 和 SQLite 中，默认情况下，你不会得到任何匹配项。然而，对于 MySQL/MariaDB 和 MSSQL，你会像之前一样得到匹配项。


    字符串变体如何比较被称为**排序规则**。在其他语言中，可能存在许多变体，但在英语中，主要的变体是大写/小写。


    PostgreSQL、Oracle 和 SQLite 的默认排序规则是大小写敏感的；也就是说，大写和小写被视为不同。在 MySQL/MariaDB 和 MSSQL
    中，默认排序规则是大小写不敏感的。*但是，个别数据库可能已使用替代排序规则设置。*


    表 `sorting` 在其 `stringvalue` 列中使用了不一致的大小写，因此你可以尝试：


    ```sql

    SELECT *

    FROM sorting

    WHERE stringvalue=''APPLE'';

    ```


    同样，结果的数量将取决于排序规则。


    在任何情况下，你的表或数据库的排序规则可能不是默认的。如果你不确定排序规则，可以运行这个简单的查询：


    ```sql

    SELECT *

    FROM customers

    WHERE ''a''=''A'';

    ```


    如果你的排序规则是大小写敏感的，那么断言 `''a''=''A''` 为假，因此你将不会得到任何行。如果是大小写不敏感的，那么断言为真，因此你将得到所有行。


    如果你的排序规则是大小写敏感的，但你仍然希望进行大小写不敏感的匹配，则有两种解决方案。


    首先，你可以强制将数据转换为大写或小写，然后测试结果。例如：


    ```sql

    SELECT *

    FROM customers

    WHERE lower(state)=''vic'';

    ```


    这是一个稍微昂贵的解决方案，因为数据库管理系统需要在每一行上执行一个操作才能进行比较。


    第二个解决方案是要求数据库管理系统为查询使用替代排序规则。但是，这可能非常复杂。


    如果你的数据库排序规则是大小写敏感的，并且你发现需要进行许多大小写不敏感的搜索，你也许可以使用**索引**来减少工作量。数据库索引就像书中的索引，可以帮助数据库管理系统更快地查找内容。索引将在后面讨论。

