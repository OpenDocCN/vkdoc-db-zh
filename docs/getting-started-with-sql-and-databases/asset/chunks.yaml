    there is no way of reliably identifying the column.


    With a well-formed table, that shouldn’t be a problem, but there’s sometimes a
    little uncertainty as to how to handle multiple values. We’ll see later how multiple
    values are properly handled.


    #### Columns Are Unordered


    When you select from a table, of course you will get the result in some row order
    and some column order. However, as with row order, column order is not significant.
    Unlike row order, however, column order isn’t entirely unpredictable.


    For example:


    ```

    SELECT *

    FROM customers;

    ```


    If you use `SELECT *`, you will get the columns in the order defined either when
    the table was created or when the table structure was subsequently altered.


    ```

    SELECT id, givenname, familyname, dob, email

    FROM customers;

    ```


    If you specify columns, you will, of course, get the columns in the specified
    order.


    The point is that the database has no *preferred* column order, and you can select
    them in any order without affecting the significance of the results.


    SQL allows you to add additional columns after the original design. Sometimes,
    it is tricky or even impossible to add these columns at arbitrary locations, so
    you may find the newly placed columns at the end. That’s not always convenient,
    but at least it doesn’t matter.


    ### Multiple Values


    One of the principles of a well-formed table deals with multiple values. For example:


    *   How do you manage multiple phone numbers for customers?


    *   How would you manage books with multiple authors?


    Two mistakes which should be avoided are


    *   Putting multiple values in a single column, possibly separated with a comma
    or semicolon


    *   There is no longer an unambiguous location for an item of data in that you
    can’t be sure which column it’s in. Further, you will invariably end up with some
    empty columns and possibly with not enough in some cases.


    *   Having multiple columns for the multiple values, such as `phone1`, `phone2`,
    etc.


    *   You saw earlier that data should be atomic. This would violate that principle
    and will make searching and sorting impractical. Later, you will want to group
    data together, and using multiple values like this will make that impossible.


    There may be a case where multiple columns might be used *if* there is a clear
    distinction between them. For example, for customers, you *might* record a mobile
    phone number, a landline number, and a fax (remember faxes?) number. They’re all
    phone numbers, but they’re different enough to be unambiguous.


    #### Using Related Tables


    In the sample database, we see this problem a few times:


    *   Sales can have multiple sale items.


    *   Artists can have multiple paintings.


    *   Customers can have multiple sales.


    In all cases, the solution is the same: another table. For example, to manage
    multiple sale items, there is an additional table, `saleitems`, for each sale
    item. The key to making it work is that all of these sale items have a reference
    to a `sale`.


    #### Example: Paintings and Artists


    As we mentioned earlier, we have the situation that one artist can have painted
    many paintings. To put it another way, many paintings are by the same artist.
    It’s really the same problem, looking at it from two different directions.


    The way you look at the problem will depend on the purpose of the database. For
    example, if you were managing the artist agency, then your main interest will
    be in the artist table, and the question would be how to manage multiple paintings
    per artist. It would be the same question as how to manage multiple items per
    sale, or multiple sales per customer.


    In this database, we are more interested in the paintings, so the question is
    how to manage multiple paintings by the same artist.


    In both cases, the solution is the same.


    If you look at both tables:


    ```

    SELECT * FROM paintings;

    SELECT * FROM artists;

    ```


    you will see the important `artistid` column in the `paintings` table. The `artistid`
    is a reference to an `id` in the `artists` table. This is called a **foreign key**
    because it refers to another table.


    Figure [2-2](#601766_1_En_2_Chapter.xhtml#Fig2) has a simplified version of this
    relationship.


    ![](images/601766_1_En_2_Chapter/601766_1_En_2_Fig2_HTML.jpg)


    2 tables, Paintings and Artists, with primary keys and foreign keys linking the
    two tables together. The Painting table includes 8 columns. The Artists table
    includes 5 columns.


    Figure 2-2


    A Relationship Between Tables


    If you look at the arrows, you’ll notice they are pointing from the paintings
    to the artists, that is, from the foreign key to the primary key. You will also
    notice that many paintings point to a single artist. This relationship is commonly
    called a one-to-many relationship, that is, from one artist to many paintings.


    Regardless of whether you are more interested in the paintings or the artists,
    the actual relationship is *defined* in the `artist` table that is in the *many*
    table.


    #### Examples of Alternative Terminology


    Although most references would simply refer to a one-to-many relationship, it
    is often more convenient to use a more informal term, such as one of those in
    Table [2-2](#601766_1_En_2_Chapter.xhtml#Tab2).


    Table 2-2


    The One-to-Many Relationship


    |   | One | Many |

    | --- | --- | --- |

    | Parent-Child | Parent | Children |

    | Container | Container | Contents |

    | Shopping | Cart | Items |


    Later, we will be looking at combining data from related tables.'
  trans: '#### 行是唯一的


    如果你只是从表中简单查询：


    ```sql

    SELECT *

    FROM artists;

    ```


    你会看到没有艺术家会出现两次。如果你初次接触数据管理是通过电子表格程序，你很可能会发现累积了多份艺术家副本，因为交叉引用并非电子表格的强项。


    在一个管理良好的数据库中，每位艺术家只被记录一次，然后多幅画作可以引用同一位艺术家。


    当然，错误总是难免的；例如，一位艺术家可能被注册了两次。请记住，数据库本身并不真正“知道”发生了什么，因此需要一些人为干预来确保这种情况不会发生。


    SQL 确实提供了一些帮助来维护唯一性：


    *   每个表都应定义一个 `主键` 列，作为唯一标识符。原则上，即使所有其他细节都相同，主键也能区分它们。


    *   一些列可以添加 `唯一约束`，这将禁止意外的重复。例如，你可能会认为客户的电子邮件地址永远不应重复，因此在该列上设置唯一约束。


    在关于表操作的第 8 章中，你将看到如何构建各种附加需求，即约束。目前，主键和唯一属性很重要。


    #### 行是独立的


    如果你只是从表中简单查询：


    ```sql

    SELECT *

    FROM artists;

    ```


    你会看到，一位艺术家的细节与另一位艺术家的细节无关。一行的数据变化只影响该行本身。


    这并不是说多位艺术家不能拥有一些相同的细节。例如，伦勃朗和梵高都被列为 `荷兰` 国籍。但是，如果你决定将梵高的国籍改为，比如 `法国`，这将对伦勃朗的国籍没有影响。


    然而，这对于 `customers` 表来说并不完全正确。如果一个城镇的邮政编码发生变化，可能意味着同一城镇的其他客户也需要更新。这就是为什么地点信息本应放在一个单独的表中。


    #### 列名是唯一的


    这不言自明。你不能有两个同名的列；否则，将无法可靠地标识该列。


    对于一个结构良好的表，这应该不是问题，但有时对于如何处理多个值会有一点不确定性。我们稍后会看到如何正确处理多个值。


    #### 列是无序的


    当你从一个表中查询时，你当然会以某种行顺序和列顺序获得结果。然而，与行顺序一样，列顺序并不重要。不过，与行顺序不同的是，列顺序并非完全不可预测。


    例如：


    ```sql

    SELECT *

    FROM customers;

    ```


    如果你使用 `SELECT *`，你将按照表创建时或后续修改表结构时定义的顺序获得列。


    ```sql

    SELECT id, givenname, familyname, dob, email

    FROM customers;

    ```


    如果你指定了列，你当然会按照指定的顺序获得列。


    关键在于，数据库没有*偏好*的列顺序，你可以按任何顺序选择它们，而不会影响结果的意义。


    SQL 允许你在原始设计之后添加额外的列。有时，在任意位置添加这些列很棘手甚至不可能，因此你可能会发现新添加的列位于末尾。这并不总是方便，但至少无关紧要。


    ### 多值处理


    一个结构良好的表的原则之一涉及多值处理。例如：


    *   如何管理客户的多个电话号码？

    *   如何管理多位作者的书籍？


    应避免的两种错误是：


    *   将多个值放在单个列中，可能用逗号或分号分隔。这样数据项就不再有明确的位置，因为你无法确定它在哪一列中。此外，你最终总会遇到一些空列，并且在某些情况下列数可能不够。


    *   为多个值设置多个列，例如 `phone1`、`phone2` 等。你之前已经看到数据应该是原子性的。这将违反该原则，并使搜索和排序变得不切实际。稍后，你可能需要将数据分组，而像这样使用多个值将使分组成为不可能。


    可能存在*如果*列之间有明确区分的情况，才使用多个列。例如，对于客户，你*可能*记录一个手机号码、一个固定电话号码和一个传真（还记得传真吗？）号码。它们都是电话号码，但彼此差异足够大，不会产生歧义。


    #### 使用关联表


    在示例数据库中，我们多次遇到这个问题：


    *   销售单可以包含多个销售项。

    *   艺术家可以创作多幅画作。

    *   客户可以有多笔销售。


    在所有情况下，解决方案都是一样的：使用另一个表。例如，为了管理多个销售项，有一个额外的 `saleitems` 表，用于记录每个销售项。使其运作的关键是，所有这些销售项都引用一个
    `sale`。


    #### 示例：画作与艺术家


    正如我们之前提到的，我们面临的情况是一位艺术家可以创作许多幅画作。换句话说，许多幅画作是同一位艺术家创作的。这实际上是同一个问题，只是从两个不同的方向来看待。


    你看待问题的方式取决于数据库的目的。例如，如果你在管理艺术家代理机构，那么你的主要兴趣点将在艺术家表上，问题将是如何管理每位艺术家的多幅画作。这将与如何管理每笔销售的多项物品，或每位客户的多笔销售是同一个问题。


    在这个数据库中，我们更感兴趣的是画作，因此问题是如何管理同一位艺术家的多幅画作。


    在这两种情况下，解决方案都是一样的。


    如果你查看这两个表：


    ```sql

    SELECT * FROM paintings;

    SELECT * FROM artists;

    ```


    你会看到 `paintings` 表中重要的 `artistid` 列。`artistid` 是对 `artists` 表中某个 `id` 的引用。这被称为
    `外键`，因为它引用了另一个表。


    图 2-2 展示了这种关系的简化版本。


    ![](img/601766_1_En_2_Fig2_HTML.jpg)


    两个表，画作表和艺术家表，包含主键和外键将两个表连接在一起。画作表包含 8 列。艺术家表包含 5 列。


    图 2-2 表之间的关系


    如果你看那些箭头，你会注意到它们是从画作指向艺术家，即从外键指向主键。你还会注意到许多幅画作指向一位艺术家。这种关系通常称为一对多关系，即从一位艺术家到多幅画作。


    无论你更关注画作还是艺术家，实际的关系是在“多”的那一方，即 `artist` 表中定义的。


    #### 替代术语示例


    虽然大多数参考资料会简单地称为一对多关系，但使用更非正式的术语往往更方便，例如表 2-2 中的那些。


    表 2-2 一对多关系


    |      | 一方       | 多方       |

    |------|------------|------------|

    | 父子   | 父         | 子         |

    | 容器   | 容器       | 内容物     |

    | 购物   | 购物车     | 商品项     |


    稍后，我们将探讨如何组合来自关联表的数据。'
- fmt: '#### A More Complex Relationship


    In the sample database, we have paintings and we have customers. We also need
    to manage the sales of paintings to customers.


    The relationship between customers and paintings is more complex than that between
    paintings and artists. Whereas a painting can only have one artist, customers
    can buy more than one painting, and multiple customers can buy the same painting.


    Obviously, multiple customers are not actually buying the *same* article, but
    simply copies. You can actually have multiple customers buying the same article
    *serially*, that is, one after another, as you might with antiques or properties.
    The same applies to loans: multiple borrowers can borrow the same article once
    it has been returned.


    To manage sales, you will need an additional table or two just for the sales.


    If the nature of the sale is simple enough, you can manage it with a single table.
    For example, if you are into real estate, you can have a table of properties and
    a single table to manage the sales, such as in Figure [2-3](#601766_1_En_2_Chapter.xhtml#Fig3).


    ![](images/601766_1_En_2_Chapter/601766_1_En_2_Fig3_HTML.jpg)


    The relational database contains three tables, `Customers`, `sales` and `Properties`,
    connected by primary and foreign keys, where the `Customers` table holds customer
    information, including `I D`, `email`, `family name`, `given name`, and the `Properties`
    table holds property details such as `I D`, `address`, `price`, `details`, along
    with `customer I D` and `sale date` to link the tables.


    Figure 2-3


    Property Sales


    Since you’re only selling one property at a time, you can manage the transaction
    in a simple `sales` table. This table records which customer bought which property,
    as well as other data related to the same, such as the date and the amount.


    If the customer were to actually buy two properties, they would be happy enough
    to transact that as two sales.


    You can use the same design for, say, car rentals, where most customers would
    rent one car at a time.


    In the case of smaller items, such as paintings, it’s quite possible that the
    customer will buy multiple items and possibly multiple copies. In this case, transacting
    multiple sales would be annoying, and you need a more subtle approach. Here, you
    will need *two* tables as in Figure [2-4](#601766_1_En_2_Chapter.xhtml#Fig4).


    ![](images/601766_1_En_2_Chapter/601766_1_En_2_Fig4_HTML.jpg)


    The relational database includes 4 tables for `customers`, `cart`, `products`,
    and `cart items`. The tables have columns for various attributes such as `customer
    I D`, `name`, `address`, `email`, `product details`, `quantity`, `price`, etc.


    Figure 2-4


    Shopping Cart


    You have probably had the experience of buying multiple items on the Internet.
    Typically, your purchases are in the form of a shopping cart with one or more
    cart items. This would be true even if you bought one copy of a single item.


    To manage the purchase in the database, you have a table of carts, each of which
    is related to a customer through a foreign key. The final details, such as `checkout
    date`, `total price`, and `payment` and `delivery methods`, would be in this table.


    Each product purchased would be stored in a second table of items. This table
    has two foreign keys. One relates to the shopping cart, which in turn is related
    to a customer. The other relates to the table of products. You can think of the
    shopping cart as a *container* of cart items.


    The same structure is used whenever you need to manage multiple items in a single
    transaction. This includes multiple library loan items or, in our sample database,
    multiple sale items.


    ### Summary


    A database is a collection of distinct tables. Each table is a collection of related
    data.


    In a properly designed table, there is exactly one correct place for every item
    of data.


    #### Terms


    Regarding the database itself


    *   A `database` is the entire collection of data.

    *   A `DBMS` or `Database Management System` is the software that manages the
    data.

    *   `SQL` or `Structured Query Language` is the language used to communicate with
    the database.


    As for items of data


    *   Think of data as a placeholder and a value as the contents of the placeholder.


    SQL uses the language of tables. With each table


    *   A `row` is an instance of the data in the table, such as a customer or a book.

    *   A `column` is a detail of the rows, such as the name.


    #### Normalized Tables


    SQL tables need to be organized so that it follows certain rules to make the data
    as simple and as reliable as possible.


    *   Data Is Atomic

    *   Columns Are Independent

    *   Columns Are of a Single Type

    *   Rows Are Unordered

    *   Rows Are Unique

    *   Rows Are Independent

    *   Column Names Are Unique

    *   Columns Are Unordered


    #### Multiple Values


    Database tables should not store multiple values in a single column. Managing
    multiple values requires an additional table with a reference back to the original
    table.


    ### Coming Up


    You now have an idea of how the sample database was designed and why it was designed
    that way. In real life, not all working databases are built to follow these principles
    completely, and some databases are very sloppy indeed. The point is, the further
    you stray from these principles, the harder it will be to work with the database.


    The next chapter will focus on a simple concept: how to select *some* rows from
    a table, that is, how to *filter* the table with the `WHERE` clause.


    Footnotes [1](#601766_1_En_2_Chapter.xhtml#Fn1_source) [2](#601766_1_En_2_Chapter.xhtml#Fn2_source)


    # 3. Filtering Data


    One of the main roles of a `DBMS` is to store data. The other main role is to
    retrieve it. To retrieve data, you use the `SELECT` statement. However, you often
    don’t want all the data, so you will want to filter the results.


    In this chapter, we’ll look at how you filter your requests with a `WHERE` clause.
    As we do, we’ll cover important topics such as


    *   How the `WHERE` clause works

    *   Working with missing values

    *   Working with different data types: numbers, strings, and dates

    *   Combining filters

    *   Working with “wildcards”


    If you have a million rows of data, you don’t normally want a million rows of
    results. Later, we’ll look at how we summarize a large amount of data. For now,
    we will look how to get *some* of the data.'
