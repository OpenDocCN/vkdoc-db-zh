- fmt: '# Sorting by Calculated Columns


    The `ORDER BY` clause is followed by one or more columns to be sorted. However,
    those columns don’t need to be the original table columns. You can sort by any
    calculated value. For example:


    ```sql

    SELECT id, givenname, familyname

    FROM artists

    ORDER BY died - born;

    ```


    This gives you a result, but the sort order is unclear:


    | id | givenname | familyname |

    | --- | --- | --- |

    | 348 | Honoré | Daumier |

    | 370 | Johannes | Vermeer |

    | 233 | Egon | Schiele |

    | 10 | Frédéric | Bazille |

    | 112 | Dirck van | Baburen |

    | 296 | William | Winstanley |

    | ~ 187 rows ~ |


    As usual, you probably want to list the calculation in the `SELECT` clause, so
    you can calculate it there and order by the result:


    ```sql

    SELECT id, givenname, familyname, died - born

    FROM artists

    ORDER BY died - born;

    ```


    The sort order is clearer now.


    | id | givenname | familyname | ?column? |

    | --- | --- | --- | --- |

    | 348 | Honoré | Daumier | 0 |

    | 370 | Johannes | Vermeer | 0 |

    | 233 | Egon | Schiele | 28 |

    | 10 | Frédéric | Bazille | 29 |

    | 112 | Dirck van | Baburen | 29 |

    | 296 | William | Winstanley | 31 |

    | ~ 187 rows ~ |


    Remember that if your DBMS sorts `NULL`s first, then you’ll see them before the
    actual values. Also, remember that we discovered a few artists whose `born` and
    `died` values were the same, which explains the zeroes.


    Of course, every calculated column should have an alias:


    ```sql

    SELECT id, givenname, familyname, died - born AS age

    FROM artists

    ORDER BY died - born;

    ```


    This makes the result clearer:


    | id | givenname | familyname | age |

    | --- | --- | --- | --- |

    | 348 | Honoré | Daumier | 0 |

    | 370 | Johannes | Vermeer | 0 |

    | 233 | Egon | Schiele | 28 |

    | 10 | Frédéric | Bazille | 29 |

    | 112 | Dirck van | Baburen | 29 |

    | 296 | William | Winstanley | 31 |

    | ~ 187 rows ~ |


    Since the `ORDER BY` clause is the only one processed after the `SELECT` clause,
    you can actually use the alias:


    ```sql

    SELECT id, givenname, familyname, died - born as age

    FROM artists

    ORDER BY age;

    ```


    The moral of which is that you can sort by a calculated column, but you will probably
    end up calculating it in the `SELECT` clause and sorting by the result.


    Note that you *can’t* do that with the `WHERE` clause:


    ```sql

    SELECT *, died-born AS age

    FROM artists

    WHERE died-born<50  --  not age<50 ∵ age not (yet) available

    --  SELECT

    ORDER BY age;

    ```


    We’ve included a commented `SELECT` clause to remind you about evaluation order:
    only the `ORDER BY` clause is evaluated after `SELECT`, so only this clause can
    use column aliases.


    You can do the same thing with a string function:


    ```sql

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle

    SELECT *, length(familyname) AS ln

    FROM customers

    ORDER BY ln;

    -- MSSQL

    SELECT *, len(familyname) AS ln

    FROM customers

    ORDER BY ln;

    ```


    This gives you the results in name length order:


    | id | givenname | familyname | … | ln |

    | --- | --- | --- | --- | --- |

    | 452 | Sue | Me | … | 2 |

    | 383 | Rose | Up | … | 2 |

    | 226 | Carrie | On | … | 2 |

    | 467 | Luke | Up | … | 2 |

    | 99 | Minnie | Bus | … | 3 |

    | 312 | Frank | Lee | … | 3 |

    | ~ 304 rows ~ |


    You will see more on calculations later in the book.


    # Limiting the Number of Results


    You have already seen how to limit the results to certain criteria, such as customers
    from a state or paintings which cost less than a certain amount. Here, we look
    at simply limiting the `number` of results.


    Originally, SQL didn’t have a standard way of doing this, presumably because nobody
    saw the need. Since then, the `OFFSET … FETCH …` clause has become available.
    However, this is only available for PostgreSQL, Microsoft SQL Server, and Oracle.
    There is an unofficial alternative for the other DBMSs in the next sections.


    For example, to limit the results to the first five:


    ```sql

    --  PostgreSQL, MSSQL, Oracle

    SELECT *

    FROM customers

    WHERE dob IS NOT NULL   --  exclude missing dobs

    ORDER BY dob OFFSET 0 ROWS FETCH FIRST 5 ROWS ONLY;

    ```


    The `WHERE dob IS NOT NULL` clause is added to filter out the missing dates of
    birth. Otherwise, you will only see `NULL` dates of birth for the first or last
    groups:


    | id | givenname | familyname | dob | … |

    | --- | --- | --- | --- | --- |

    | 344 | Rose | Boat | 1962-09-24 | … |

    | 545 | Jack | Knife | 1962-09-24 | … |

    | 416 | Pam | Pered | 1962-09-28 | … |

    | 440 | Percy | Monn | 1962-12-12 | … |

    | 261 | Vic | Tory | 1962-12-12 | … |

    | ~ 5 rows ~ |   |   |   |   |


    This very verbose `OFFSET … FETCH` clause has two important parts: the `OFFSET`
    part effectively means skipping the first so many rows, while the `FETCH FIRST`
    part is the maximum number of rows you want. If there aren’t so many rows, you
    will get as many as are available.


    Note the following:


    *   `OFFSET … FETCH …` is an extension of the `ORDER BY` clause.

    *   `FIRST` can be replaced by `NEXT`: It has exactly the same effect.

    *   `ROWS` can be written as `ROW`: It also has the same effect.


    Some further flexibility may be allowed by some DBMS.


    Also, note that `OFFSET … FETCH …` is somewhat overstrict in the number of results.
    For example, if you use `FETCH FIRST 5`, you will never get more, even if the
    next few rows have the same values.


    ## Paging


    One reason you might want to use this is to page results, such as viewing a catalog
    of 20 items per page:


    ```sql

    --  First Page

    SELECT * FROM paintings

    ORDER BY title OFFSET 0 ROWS FETCH FIRST 20 ROWS ONLY;

    --  Page 4 (skip 3 pages)

    SELECT * FROM paintings

    ORDER BY title OFFSET 3*20 ROWS FETCH FIRST 20 ROWS ONLY;

    SELECT * FROM paintings

    ORDER BY title OFFSET 60 ROWS FETCH FIRST 20 ROWS ONLY;

    --  Reverse Order: Last page first

    SELECT * FROM paintings

    ORDER BY title DESC

    OFFSET 0 ROWS FETCH FIRST 20 ROWS ONLY;

    ```


    As you see, you can also use `DESC` to reverse the order.


    ## Using LIMIT … OFFSET … (MySQL/MariaDB, SQLite, and PostgreSQL)


    MySQL/MariaDB and SQLite do not (yet) support the `OFFSET … FETCH …` clause. However,
    they do support a much simpler clause:


    ```sql

    SELECT *

    FROM customers

    WHERE dob IS NOT NULL

    ORDER BY dob LIMIT 5 OFFSET 0;

    ```


    This clause is also supported by PostgreSQL, so PostgreSQL has the benefit of
    flexibility and simplicity.


    ## Using TOP (MSSQL)


    Older versions of MSSQL do not support `LIMIT … OFFSET …` either, but you can
    use something like this:


    ```sql

    SELECT top 5 *

    FROM customers

    WHERE dob IS NOT NULL

    ORDER BY dob;

    ```


    This is simpler, but not as flexible as the `LIMIT … OFFSET …` because you can’t
    specify a starting point. To get the *last* rows, you need to reverse the sort
    order:


    ```sql

    SELECT top 5 *

    FROM customers

    WHERE dob IS NOT NULL

    ORDER BY dob DESC;

    ```


    MSSQL does not actually require the `ORDER BY` clause with the `TOP` clause, but
    the result would be meaningless without it, since otherwise you have no control
    over which rows are the first.


    # Fetching a Random Row


    If you want to fetch one or more rows at random, as you might if testing your
    application or sampling data, you can limit the results after a random sort. To
    get a random sort, you will need one of the randomization functions, which vary
    across DBMSs:


    ```sql

    --  PostgreSQL, SQLite

    SELECT * FROM customers

    ORDER BY random();

    --  MySQL / MariaDB

    SELECT * FROM customers

    ORDER BY rand();

    --  Oracle

    SELECT * FROM customers

    ORDER BY dbms_random.value;

    --  MSSQL

    SELECT * FROM customers

    ORDER BY newid();

    ```


    The idea is that the function generates a random value for each row, which is
    used to sort the data.


    MSSQL does have a `random()` function, but it’s not like the others: it only generates
    a random number once and uses it for the whole table.


    You can combine this with `OFFSET 0 FETCH …` (or `LIMIT … OFFSET 0` or `TOP`)
    to fetch a limited number of random rows.'
