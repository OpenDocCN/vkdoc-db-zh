  trans: '### 在 CTE 中使用结果


    如果你想更早地获取高额消费客户的更多详情，可以使用**公共表表达式**（Common Table Expression）的结果，然后与 `customers`
    表进行连接：


    ```sql

    WITH cte AS (

    SELECT customerid, sum(total) AS total

    FROM sales

    WHERE ordered>current_timestamp - INTERVAL ''1'' MONTH

    --  MSSQL:

    --  WHERE ordered>dateadd(month,-1,current_timestamp)

    --  SQLite:

    --  WHERE ordered>date(''now'',''-1 month'')

    --  Oracle:

    --  WHERE ordered>add_months(current_timestamp,-1)

    GROUP BY customerid

    HAVING sum(total)>2000

    )

    SELECT * FROM customers JOIN cte ON customers.id=cte.customerid

    ORDER BY customers.id;

    ```


    你现在得到了一个合并后的结果集：


    | id | email | familyname | givenname | … | total |

    | --- | --- | --- | --- | --- | --- |

    | 167 | lucy.fer167@example.net | Fer | Lucy | … | 2155 |

    | 179 | ivan.inkling179@example.com | Inkling | Ivan | … | 2105 |

    | 250 | rae.ning250@example.net | Ning | Rae | … | 5000 |

    | 379 | artie.chokes379@example.net | Chokes | Artie | … | 2010 |

    | 445 | ida.dunnit445@example.net | Dunnit | Ida | … | 2350 |

    | 455 | pierce.dears455@example.com | Dears | Pierce | … | 3890 |

    | ~ 共 6 行 ~ |


    请注意，你再次尝试在此处混合两种不同类型的数据。你需要一个汇总查询来查找近期的高额消费者，并且需要一个非汇总查询来查找客户详情。


    在之前的示例中，你以子查询的形式放置了汇总部分。而这里，它放在了 CTE 中，这实际上是一种子查询。


    还需注意，CTE 中省略了 `ORDER BY` 子句。在该上下文中它毫无用处，而且 MSSQL 在没有一些额外技巧的情况下不会允许它。


    ### 查找重复值


    `HAVING` 子句的一个简单应用是查找重复值。重复值不一定是个问题，因为它们可能只是巧合，但有时检查一下还是有用的。


    `HAVING` 子句只需要筛选出存在多于一个记录的分组，即 `count(*)>1`。


    例如，要查找重复的出生日期：


    ```sql

    SELECT dob

    FROM customers

    GROUP BY dob

    HAVING count(*)>1;

    ```


    你将获得一个重复项列表：


    | dob |

    | --- |

    | `NULL` |

    | 1963-01-20 |

    | 1996-12-09 |

    | 2002-01-29 |

    | 1990-06-21 |

    | 1980-06-02 |

    | ~ 共 15 行 ~ |


    你也会得到一些 `NULL`。SQL 对 `NULL` 的关系确实是矛盾的，而在这种情况下，它准备将它们视为一个分组。


    再次使用 CTE，你可以获取有关这些客户的更多详情：


    ```sql

    WITH cte AS (

    SELECT dob FROM customers

    GROUP BY dob HAVING count(*)>1

    )

    SELECT * FROM customers AS c JOIN cte ON c.dob=cte.dob

    ORDER BY c.dob;

    ```

    （记住 Oracle 不喜欢表别名使用 `AS`；后续示例同理。）


    | id | email | familyname | givenname | dob | … |

    | --- | --- | --- | --- | --- | --- |

    | 344 | rose.boat344@example.net | Boat | Rose | 1962-09-24 | … |

    | 545 | jack.knife545@example.com | Knife | Jack | 1962-09-24 | … |

    | 440 | percy.monn440@example.com | Monn | Percy | 1962-12-12 | … |

    | 261 | vic.tory261@example.net | Tory | Vic | 1962-12-12 | … |

    | 187 | mikey.fitz187@example.com | Fitz | Mikey | 1963-01-20 | … |

    | 28 | meg.aphone28@example.net | Aphone | Meg | 1963-01-20 | … |

    | ~ 共 28 行 ~ |


    在这里，CTE 中的任何 `NULL` 都会在内连接中被排除，因为没有客户的 id 为 `NULL`。


    你也可以对多个列执行此操作。例如，要查找重复的姓名，你需要同时检查 `familyname` 和 `givenname`：


    ```sql

    SELECT familyname, givenname

    FROM customers

    GROUP BY familyname, givenname

    HAVING count(*)>1;

    ```


    这将得到一个姓名列表：


    | familyname | givenname |

    | --- | --- |

    | Money | Owen |

    | O’Shea | Rick |

    | Gon | Tara |

    | Dover | Eileen |

    | Highwater | Camilla |

    | Knife | Jack |

    | ~ 共 11 行 ~ |


    要获取更多详情：


    ```sql

    WITH cte AS (

    SELECT familyname, givenname FROM customers

    GROUP BY familyname, givenname HAVING count(*)>1

    )

    SELECT *

    FROM customers AS c JOIN cte

    ON c.givenname=cte.givenname AND c.familyname=cte.familyname

    ORDER BY c.familyname, c.givenname;

    ```


    这将得到客户详情：


    | id | familyname | givenname | … |

    | --- | --- | --- | --- |

    | 455 | Dears | Pierce | … |

    | 317 | Dears | Pierce | … |

    | 145 | Dover | Eileen | … |

    | 197 | Dover | Eileen | … |

    | 287 | Gettit | Carmen | … |

    | 223 | Gettit | Carmen | … |

    | ~ 共 22 行 ~ |


    注意，这里的 `ON` 子句匹配了两列，而不是通常的一列。


    ### 在聚合上使用聚合


    之前，我们提到过查找最受欢迎的画作。这实际上比听起来更复杂。一方面，你不能使用像 `max(count())` 这样的表达式（它本可以让事情简单一点）：SQL
    不允许嵌套聚合函数。


    我们将从找出每幅画售出多少份开始。你可以在包含 `paintingid` 的 `saleitems` 表中找到这些信息。你只需要按 `paintingid`
    分组：


    ```sql

    SELECT paintingid, count(*) AS countrows

    FROM saleitems

    GROUP BY paintingid;

    ```


    你将得到一个画作 id 列表：


    | paintingid | countrows |

    | --- | --- |

    | 1798 | 8 |

    | 1489 | 4 |

    | 1269 | 5 |

    | 1989 | 3 |

    | 273 | 6 |

    | 1560 | 5 |

    | ~ 共 1136 行 ~ |


    这告诉我们每幅画被包含的次数。但是，请记住还有一个 `quantity` 列，其中包含售出的副本数量，我们可以将其加总。不幸的是，该列可能包含 `NULL`，因此必须使用
    `coalesce` 处理：


    ```sql

    SELECT paintingid, sum(coalesce(quantity,1)) AS quantity

    FROM saleitems

    GROUP BY paintingid;

    ```


    这给出了一个更正确的结果：


    | paintingid | quantity |

    | --- | --- |

    | 1798 | 13 |

    | 1489 | 7 |

    | 1269 | 5 |

    | 1989 | 5 |

    | 273 | 6 |

    | 1560 | 5 |

    | ~ 共 1136 行 ~ |


    这为我们提供了所需处理的数据，因此我们将其放入一个 CTE 中：


    ```sql

    WITH quantities AS (

    SELECT paintingid, sum(coalesce(quantity,1)) AS quantity

    FROM saleitems

    GROUP BY paintingid

    )

    SELECT paintingid, quantity

    FROM quantities

    GROUP BY paintingid, quantity;

    ```


    目前来看，最后这个查询是多余的，因为它给出的结果与我们没有使用 CTE 时相同。然而，第二次分组允许我们使用一个额外的聚合函数，而这个函数在其他情况下无法嵌套：


    ```sql

    WITH quantities AS (

    SELECT paintingid, sum(coalesce(quantity,1)) AS quantity

    FROM saleitems

    GROUP BY paintingid

    )

    SELECT paintingid, quantity

    FROM quantities

    GROUP BY paintingid, quantity

    HAVING quantity=(SELECT max(quantity) FROM quantities);

    ```


    我们现在得到了最终结果：


    | paintingid | quantity |

    | --- | --- |

    | 1246 | 23 |

    | 2138 | 23 |


    子查询绕过了缺少嵌套聚合函数的限制，因为它只是对一个先前计算出的值进行聚合。`HAVING` 子句筛选出总数量与最大值匹配的行。当然，可能不止一个。


    如果你想获取有关画作的更多详情，需要将结果与 paintings 表连接。为此，我们可以使用第二个 CTE：


    ```sql

    WITH

    quantities AS (

    SELECT paintingid,

    sum(coalesce(quantity,1)) AS quantity

    FROM saleitems

    GROUP BY paintingid

    ),

    favourites AS (

    SELECT paintingid, quantity

    FROM quantities

    GROUP BY paintingid, quantity

    HAVING quantity=(SELECT max(quantity) FROM quantities)

    )

    SELECT *

    FROM paintings JOIN favourites ON paintings.id=favourites.paintingid;

    ```


    我们现在有了合并的结果：


    | id | artistid | title | … | quantity |

    | --- | --- | --- | --- | --- |

    | 2138 | 256 | Cook in front of the Sto … | … | 23 |

    | 1246 | 85 | Two Studies of the Head … | … | 23 |


    这里，第二个 `SELECT` 语句被包装在了第二个 CTE 中。你可以像以前一样拥有多个 CTE，只要用逗号分隔它们即可。


    你会注意到第二个 CTE 查询了第一个 CTE。这样，你就可以从较小的组件构建出复杂的查询。你还会注意到布局稍有改变，以便于跟踪 CTE。


    最后，我们将第二个 CTE 与 `paintings` 表连接起来，以获取其余的详情。当然，你可以在选择列时更具选择性。'
- fmt: "# 8. Working with Tables\n\n## Summary\n\nInstead of just fetching simple\
    \ data from the database tables, you can generate various summaries using aggregate\
    \ queries. Aggregate queries use one or more aggregate functions and imply some\
    \ grouping of the data.\n\nAggregate queries effectively transform the data into\
    \ a secondary summary table. With grand total aggregates, you can only select\
    \ summaries. You cannot also select nonaggregated values.\n\nThe main aggregate\
    \ functions include\n\n*   `count()`, which counts the number of rows or values\
    \ in a column\n*   `min()` and `max()` which fetch the first or last of the values\
    \ in sort order\n\nFor numbers, you also have\n\n*   `sum()`, `avg()`, and `stddev()`\
    \ which perform the sum, average, and standard deviation on a column of numbers\n\
    \nWhen it comes to working with numbers, not all numbers are used in the same\
    \ way, so not all numbers should be summarized.\n\nFor strings, you also have\n\
    \n*   `string_agg()`, `group_concat()`, and `listagg()` which concatenate strings\
    \ in a column\n\nIn all cases, aggregate functions only work with values: they\
    \ all skip over `NULL`.\n\nYou can control which values in a column are included:\n\
    \n*   You can use `DISTINCT` to count only one instance of each value.\n*   You\
    \ can use `CASE … END` to work as a filter for certain values.\n\nWithout a `GROUP\
    \ BY` clause, or using `GROUP BY ()`, the aggregates are grand totals: you will\
    \ get one row of summaries.\n\nYou can also use `GROUP BY` to generate summaries\
    \ in multiple groups. Each group is distinct. When you do, you get summaries for\
    \ each group, as well as additional columns with the group values themselves.\n\
    \nAggregates are not limited to single tables:\n\n*   You can join multiple tables\
    \ and aggregate the result.\n*   You can join an aggregate to one or more other\
    \ tables.\n\nIn many cases, it makes sense to work with your aggregates in more\
    \ than one step. For that, it’s convenient to put your first step into a Common\
    \ Table Expression, which is a virtual table which can be used with the next step.\n\
    \nWhen grouping your data, sometimes you want to filter some of the groups. This\
    \ is done with a `HAVING` clause, which you add after the `GROUP BY` clause.\n\
    \n### Coming Up\n\nSo far, we have concentrated on extracting from an existing\
    \ database.\n\nChapter [2](#601766_1_En_2_Chapter.xhtml) gave you some insight\
    \ on some of the design principles in constructing a database. In the next chapter,\
    \ we’ll look at some other aspects of SQL:\n\n*   First, we’ll look at the code\
    \ which generated the actual sample database, to get a better idea of how the\
    \ tables are put together.\n*   Next, we’ll look at changing some of the data\
    \ using the Data Manipulation Language statements.\n\nThe next chapter is not\
    \ intended to make you an expert on constructing a database, but will put you\
    \ in a better position to understand what’s going on.\n\nAs for manipulating the\
    \ data, this is not the sort of thing you normally do by hand; however, it is\
    \ very important to have an idea how it’s done.\n\nFootnotes [1](#601766_1_En_7_Chapter.xhtml#Fn1_source)\
    \   [2](#601766_1_En_7_Chapter.xhtml#Fn2_source)   [3](#601766_1_En_7_Chapter.xhtml#Fn3_source)\n\
    \nFor the most part, we have used the `SELECT` statement for extracting data from\
    \ the database. The `SELECT` statement, with its various clauses, is often referred\
    \ to as the `DQL`—the **Data Query Language**.\n\nSQL does much more than allow\
    \ you to select data. Among other things, it allows you to manipulate the data.\n\
    \nThere are three main operations in SQL which manipulate data:\n\n*   `INSERT`\
    \ statements are how you add new data to a table.\n*   `UPDATE` statements allow\
    \ you to change existing data in a table.\n*   `DELETE` is used to delete one\
    \ or more rows from a table.\n\nCollectively, these statements are part of what\
    \ is called the `DML`—**Data Manipulation Language**.\n\nThere are also statements\
    \ which manipulate not the data but the actual database structures, such as tables\
    \ and views:\n\n*   `CREATE` is used to create a new table, view, or other objects\
    \ in the database.\n*   `DROP` is used to remove a `CREATE`d object. If this is\
    \ used on a table, then the data is also lost.\n*   `ALTER` will allow you to\
    \ make changes to an existing object.\n*   `TRUNCATE` can be used to reset a table.\
    \ That mostly means deleting all the rows and restarting an auto number if any.\n\
    \nCollectively, these statements are part of the `DDL`—**Data Definition Language**.\n\
    \nSo far, we’ve been taking the database tables more or less for granted. Chapter\
    \ [2](#601766_1_En_2_Chapter.xhtml) discussed some of the principles of how an\
    \ SQL database should work, but here we’ll look a little closer on how the database\
    \ was constructed.\n\nIn this chapter, we will look at\n\n*   How SQL tables are\
    \ constructed\n    This will include how a table is created and the names and\
    \ data types of columns. We’ll also look at how we ensure data integrity with\
    \ primary and foreign keys and other constraints which limit the data that can\
    \ be added to them. We’ll look at adding table indexes to improve the ability\
    \ to search through the table. Finally, we’ll look at how to make changes to a\
    \ table.\n*   How data is added or modified\n    Here, we’ll look at adding, updating,\
    \ and deleting rows in a table.\n\nBy the end of this, you’ll know a little more\
    \ about creating and managing a database, but this won’t qualify you to pass yourself\
    \ off as a database developer. As regards developing a database, there are many\
    \ decisions which need to be made which require more knowledge and experience.\n\
    \nHowever, you will be in a better position to understand what’s going on, and\
    \ you might be able to experiment with a few of your own small databases.\n\n\
    ## How Tables Are Created\n\nThe sample database you’ve been working on started\
    \ off as a script. For this discussion, we’ll work closely with this script to\
    \ see what’s happening.\n\nIf you didn’t install the database yourself, you can\
    \ download a copy of the script from [`https://sampledb.webcraft101.com`](https://sampledb.webcraft101.com/)\
    \ and choose for your own `DBMS`. The first part of the script, which creates\
    \ the tables, will be the same, but the second part, which adds the actual data,\
    \ will be different, as much of the data is randomized.\n\nBy now, you’ll also\
    \ be aware that every `DBMS` has its quirks, so some of the minor details which\
    \ follow will vary. Overall, however, the ideas are the same."
