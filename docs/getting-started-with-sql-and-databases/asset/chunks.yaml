  trans: '

    ## 使用自连接


    通常，你会期望在两个或多个表之间进行连接。当我们在下一章查看汇总数据时，会看到其中一个表可能是虚拟的汇总表。在这里，我们将查看如何将一个表与它自身进行连接。


    有一个 `employees` 表，其中包含对主管的引用，如图 6-3 所示。


    ![](img/601766_1_En_6_Fig3_HTML.jpg)


    该表显示了员工详细信息，包括 `id`、`supervisorid`、`givenname`、`familyname`、`email`、`phone` 和
    `tfn`。它为 `id` 和 `supervisorid` 分配了外键和主键约束，而 `phone` 和 `tfn` 被指定为唯一。


    图 6-3


    一个自引用表


    在设计这样的表时，在主管问题上存在两个常见错误：


    *   新手设计师可能会将主管详细信息与其他员工详细信息放在一起。这是一个糟糕的设计，原因与你不应该将画家详细信息与画作放在一起相同。

    *   新手设计师可能会为管理者创建一个额外的表。


    第二个错误更为微妙，但它仍然是个错误。首先，主管也是一名员工，因此他们的详细信息会在两个表中重复。这与画作和画家是不同事物的情况不同。其次，可能存在更高级别的监督，这将需要创建额外的主管表，使情况变得更糟。


    解决方案是注意到主管是另一名员工。我们需要的是一个引用同一表中另一名员工的外键。这正是我们在图中看到的引用。


    你可以通过以下方式查看 `employees` 表的内容：


    ```

    SELECT * FROM employees ORDER BY id;

    ```


    你将看到一个员工及其主管 ID 的列表。


    ```

    | id | supervisorid | givenname | familyname | … |

    | --- | --- | --- | --- | --- |

    | 1 | 21 | Marmaduke | Mayhem | … |

    | 2 | 16 | Clarisse | Cringinghut | … |

    | 3 | 12 | Joe | Kerr | … |

    | 4 | 29 | Beryl | Bubbles | … |

    | 5 | 30 | Norris | Toof | … |

    | 6 | 27 | Osric | Pureheart | … |

    | ~ 34 行 ~ |

    ```


    你会注意到 `supervisorid` 外键列。如果你想实际查看主管的姓名，你需要像之前在画作中获取画家姓名那样，沿着外键追踪下去。


    你可以使用子查询来完成此操作，就像之前的价格列表版本一样：


    ```

    --  这将不起作用：

    SELECT

    id, supervisorid, givenname, familyname,

    (

    SELECT givenname||'' ''||familyname FROM employees

    WHERE employees.supervisorid=employees.id

    ) as supervisor

    FROM employees

    ORDER BY id;

    ```


    如果你这样做，会遇到表名歧义的问题。解决方案是在子查询中使用别名来重命名表：


    ```

    | id | supervisorid | givenname | familyname | supervisor |

    | --- | --- | --- | --- | --- |

    | 1 | 21 | Marmaduke | Mayhem | Irving Klutzmeyer |

    | 2 | 16 | Clarisse | Cringinghut | Sylvester Underbar |

    | 3 | 12 | Joe | Kerr | Beryl Standover |

    | 4 | 29 | Beryl | Bubbles | Beryl Standover |

    | 5 | 30 | Norris | Toof | Mildred Codswallup |

    | 6 | 27 | Osric | Pureheart | Fred Nurke |

    | ~ 34 行 ~ |

    ```


    ```

    SELECT

    id, supervisorid, givenname, familyname,

    (

    SELECT givenname||'' ''||familyname

    FROM employees AS supervisors

    WHERE employees.supervisorid=supervisors.id

    ) as supervisor

    FROM employees

    ORDER BY id;

    ```


    这样可以工作，但一个更清晰的解决方案是连接表。技巧是使用不同的别名连接相同的表，如图 6-4 所示。


    ![](img/601766_1_En_6_Fig4_HTML.jpg)


    2 张表显示员工详细信息，包括 `ID`、`supervisorID`、名字、姓氏、电子邮件、电话号码和税号。这些表具有分配给 `ID` 和 `supervisorID`
    列的外键和主键约束，并且电话和 `TFN` 列被指定为唯一。


    图 6-4


    连接后的自引用表


    它应该类似于这样：


    ```

    --  这也不起作用：

    SELECT

    id, supervisorid, givenname, familyname,

    givenname||'' ''||familyname as supervisor

    FROM employees AS e JOIN employees AS s

    ON e.supervisorid=s.id

    ORDER BY id;

    ```


    然而，这仍然不行，因为现在你有多个同名列，你必须限定所有列：


    ```

    SELECT

    e.id, e.supervisorid, e.givenname, e.familyname,

    s.givenname||'' ''||s.familyname as supervisor

    FROM employees AS e JOIN employees AS s ON e.supervisorid=s.id

    ORDER BY e.id;

    ```


    现在唯一的问题是并非所有员工都有主管，因此他们的 `supervisor` 是 `NULL`。前面的 (`INNER`) 连接会忽略这些行，所以我们需要一个外连接：


    ```

    SELECT

    e.id, e.supervisorid, e.givenname, e.familyname,

    s.givenname||'' ''||s.familyname as supervisor

    FROM employees AS e LEFT JOIN employees AS s

    ON e.supervisorid=s.id

    ORDER BY e.id;

    ```


    这花了一些功夫来修复，但它仍然是比使用前面的子查询更清晰的解决方案。


    如果你使用的是 Microsoft SQL，请记住使用 `+` 进行拼接，或者将 MySQL/MariaDB 置于 `ANSI` 模式。否则，你总是可以使用
    `concat()` 函数进行拼接。


    ## 总结


    为了确保数据库的完整性，多个值被保存到单独的表中。当你需要来自多个相关表的数据时，可以使用 `JOIN` 子句将它们组合起来。


    连接的基本原理是子表的列由来自匹配父表的列进行补充。


    连接的结果是一个虚拟表；你可以根据需要添加 `WHERE` 和 `ORDER BY` 子句。


    ### 语法


    连接的基本语法是：


    ```

    SELECT columns

    FROM table JOIN table;

    ```


    有一种使用 `WHERE` 子句的旧语法，但对于大多数连接来说，它不那么有用。


    尽管表是成对连接的，但你可以连接任意数量的表以从任何相关表中获取结果。


    ### 表别名


    在连接表时，最好区分开列名。如果表有共同的列名，这一点尤其重要。


    *   你应该完全限定所有列名。

    *   使用表别名来简化名称会很有帮助。然后可以使用这些别名来限定列名。


    ### ON 子句


    `ON` 子句用于描述如何将一个表中的行与另一个表中的行进行匹配。


    标准的连接是从子表的外键连接到父表的主键。更复杂的连接也是可能的。


    ### 连接类型


    默认的连接类型是 `INNER JOIN`。当未指定连接类型时，会默认使用 `INNER`。


    *   `INNER JOIN` 仅返回那些存在父行的子行。具有 `NULL` 外键的行将被省略。

    *   `OUTER JOIN` 是 `INNER JOIN` 与不匹配行的组合。


    ### 后续内容


    到目前为止，我们一直在处理原始或计算的数据。接下来，我们将处理汇总数据。

    '
- fmt: '# 7. Aggregating Data


    Nobody wants to look at a million rows of data. What you really want is either


    *   *Some* of the data

    *   A *summary* of the data


    Getting *some* of the data is usually a matter of filtering using the `WHERE`
    clause, as you have seen earlier. *Summarizing* the data is a matter of running
    the data through one or more `aggregate` functions, which will summarize either
    the whole set of data or smaller groups of it.


    The simplest aggregate function is very intuitive:


    ```sql

    SELECT count(*)

    FROM customers;

    ```


    The `count(*)` function counts all the rows. There is, of course, much more than
    that. Among other things, you can choose what exactly you’re counting.


    In this chapter, you will look at some of the more common aggregate functions,
    such as `sum()` and `avg()` which summarize numbers or `max()` and `min()` which
    find the end points of any range.


    First, however, we’ll look at how aggregates work in SQL and what you can and
    can’t do with them. You’ll then look at aggregating different parts of the data.
    You will also see how aggregates can be used to filter your data.


    Aggregates can be applied to the whole of the data or in groups as in subtotals.
    We’ll see how to generate group summaries and how to filter your group summaries.


    We will also look at summarizing over multiple tables, as well as using virtual
    tables to produce more suitable summaries.


    ## Counting Data


    The preceding `count()` function is a special case: `count(*)` counts all the
    *rows* in a dataset. The dataset may also be filtered:


    ```sql

    SELECT count(*) AS countrows

    FROM customers

    WHERE height<160.5;

    ```


    in which case you will count the number of rows which match the criterion.


    | countrows |

    | --- |

    | 20 |


    Unlike the `SELECT *` expression, the star in this case means *all rows*, not
    *all columns*.


    ### Counting Values


    Apart from counting rows, you can count values in a column:


    ```sql

    SELECT

    count(*) as countrows,

    count(id) as ids,                   --  same

    count(email) as emails,             --  same again

    count(familyname) as familynames,   --  same again

    count(phone) as phones,

    count(state) as states

    FROM customers;

    ```


    This gives you the following summary:


    | rows | ids | emails | familynames | phones | states |

    | --- | --- | --- | --- | --- | --- |

    | 304 | 304 | 304 | 304 | 268 | 269 |


    Note the number of rows will be the same as the number of `id`s and the number
    of `email`s and `familyname`s. However, it is *not* the same for `phone`s and
    `state`s. When counting values, note


    *   Every row *must* have a primary key (here, it is `id`), so the number of values
    in the primary key column is the same as the number of rows.

    *   In this set of data, the email address and family name are required (in SQL,
    it is set to `NOT NULL`), so the number of values in the `email` column is also
    the same as the number of rows.

    *   Not all of the customers have a (recorded) phone number, so this number is
    less than the number of rows.

    *   The same goes for `state`s, but there will be a further complication of interpretation,
    which we’ll discuss later.


    With the exception of counting rows, `count(…)` means count the number of *values*
    in a column. Since `NULL` is not a value, `count()` skips over them and only counts
    what is there. This is why the count for `phone`s and `state`s, as well as for
    some others, is less than the number of rows.


    In fact, *all* aggregate functions skip over `NULL`s, as you will see.


    ## How Aggregates Work


    With the preceding examples, you will note that the results, as with all `SELECT`
    statements, come in a virtual table. This virtual table always has a single row.


    To understand the aggregate process, imagine that there are *two* tables: the
    original, possibly virtual, table and a summary table. The summary table is generated
    whenever SQL sees an aggregate query.


    You can make the summarizing process more explicit:


    ```sql

    SELECT

    count(*) as countrows,

    count(phone) as phones,

    count(dob) as dobs

    FROM customers

    GROUP BY ()     --  PostgreSQL, MSSQL, Oracle only

    --  SELECT

    ;

    ```


    The `GROUP BY ()` clause means that the original table (`customers`) is to be
    summarized. It doesn’t actually change anything, because it’s implied whenever
    SQL encounters aggregate functions, such as `count()`. In fact, some DBMSs won’t
    even allow you to add it; this is no great loss since the summary will occur anyway.


    Note the clause order. Again, `SELECT` is the last to be processed before `ORDER
    BY`, and it’s included as a comment to remind you.


    In this summary table, you will have access to any conceivable *summary*; so far,
    it’s only `count()`, but we’ll see more soon. What you *won’t* get is access to
    unsummarized data.


    For example, this one is doomed to failure:


    ```sql

    SELECT

    id, givenname, familyname,      --  etc, it doesn''t matter

    count(*) as countrows,

    count(phone) as phones,

    count(dob) as dobs

    FROM customers

    --  GROUP BY ()

    ;

    ```


    Even though `GROUP BY ()` is commented out, the table is being summarized, and
    the `id`, `givenname`, `familyname`, and other individual values are no longer
    accessible.footnote:[⁷]


    The moral to this is that you can’t select both summaries and unsummarized values
    in the same query.


    You will see more on the `GROUP BY` clause later, when it is used more seriously.'
  raw: '# 7. Aggregating Data


    Nobody wants to look at a million rows of data. What you really want is either


    *   *Some* of the data


    *   A *summary* of the data


    Getting *some* of the data is usually a matter of filtering using the `WHERE`
    clause, as you have seen earlier. *Summarizing* the data is a matter of running
    the data through one or more **aggregate** functions, which will summarize either
    the whole set of data or smaller groups of it.


    The simplest aggregate function is very intuitive:


    ```

    SELECT count(*)

    FROM customers;

    ```


    The `count(*)` function counts all the rows. There is, of course, much more than
    that. Among other things, you can choose what exactly you’re counting.


    In this chapter, you will look at some of the more common aggregate functions,
    such as `sum()` and `avg()` which summarize numbers or `max()` and `min()` which
    find the end points of any range.


    First, however, we’ll look at how aggregates work in SQL and what you can and
    can’t do with them. You’ll then look at aggregating different parts of the data.
    You will also see how aggregates can be used to filter your data.


    Aggregates can be applied to the whole of the data or in groups as in subtotals.
    We’ll see how to generate group summaries and how to filter your group summaries.


    We will also look at summarizing over multiple tables, as well as using virtual
    tables to produce more suitable summaries.


    ## Counting Data


    The preceding `count()` function is a special case: `count(*)` counts all the
    *rows* in a dataset. The dataset may also be filtered:


    ```

    SELECT count(*) AS countrows

    FROM customers

    WHERE height<160.5;

    ```


    in which case you will count the number of rows which match the criterion.


    | countrows |

    | --- |

    | 20 |


    Unlike the `SELECT *` expression, the star in this case means *all rows*, not
    *all columns*.


    ### Counting Values


    Apart from counting rows, you can count values in a column:


    ```

    SELECT

    count(*) as countrows,

    count(id) as ids,                   --  same

    count(email) as emails,             --  same again

    count(familyname) as familynames,   --  same again

    count(phone) as phones,

    count(state) as states

    FROM customers;

    ```


    This gives you the following summary:


    | rows | ids | emails | familynames | phones | states |

    | --- | --- | --- | --- | --- | --- |

    | 304 | 304 | 304 | 304 | 268 | 269 |


    Note the number of rows will be the same as the number of `id`s and the number
    of `email`s and `familyname`s. However, it is *not* the same for `phone`s and
    `state`s. When counting values, note


    *   Every row *must* have a primary key (here, it is `id`), so the number of values
    in the primary key column is the same as the number of rows.


    *   In this set of data, the email address and family name are required (in SQL,
    it is set to `NOT NULL`), so the number of values in the `email` column is also
    the same as the number of rows.


    *   Not all of the customers have a (recorded) phone number, so this number is
    less than the number of rows.


    *   The same goes for `state`s, but there will be a further complication of interpretation,
    which we’ll discuss later.


    With the exception of counting rows, `count(…)` means count the number of *values*
    in a column. Since `NULL` is not a value, `count()` skips over them and only counts
    what is there. This is why the count for `phone`s and `state`s, as well as for
    some others, is less than the number of rows.


    In fact, *all* aggregate functions skip over `NULL`s, as you will see.


    ## How Aggregates Work


    With the preceding examples, you will note that the results, as with all `SELECT`
    statements, come in a virtual table. This virtual table always has a single row.


    To understand the aggregate process, imagine that there are *two* tables: the
    original, possibly virtual, table and a summary table. The summary table is generated
    whenever SQL sees an aggregate query.


    You can make the summarizing process more explicit:


    ```

    SELECT

    count(*) as countrows,

    count(phone) as phones,

    count(dob) as dobs

    FROM customers

    GROUP BY ()     --  PostgreSQL, MSSQL, Oracle only

    --  SELECT

    ;

    ```


    The `GROUP BY ()` clause means that the original table (`customers`) is to be
    summarized. It doesn’t actually change anything, because it’s implied whenever
    SQL encounters aggregate functions, such as `count()`. In fact, some DBMSs won’t
    even allow you to add it; this is no great loss since the summary will occur anyway.


    Note the clause order. Again, `SELECT` is the last to be processed before `ORDER
    BY`, and it’s included as a comment to remind you.


    In this summary table, you will have access to any conceivable *summary*; so far,
    it’s only `count()`, but we’ll see more soon. What you *won’t* get is access to
    unsummarized data.


    For example, this one is doomed to failure:


    ```

    SELECT

    id, givenname, familyname,      --  etc, it doesn''t matter

    count(*) as countrows,

    count(phone) as phones,

    count(dob) as dobs

    FROM customers

    --  GROUP BY ()

    ;

    ```


    Even though `GROUP BY ()` is commented out, the table is being summarized, and
    the `id`, `givenname`, `familyname`, and other individual values are no longer
    accessible.^([⁷](#fn7))


    The moral to this is that you can’t select both summaries and unsummarized values
    in the same query.


    You will see more on the `GROUP BY` clause later, when it is used more seriously.'
  trans: '# 7. 聚合数据


    没人想看一百万行数据。你真正想要的是：


    *   *部分*数据

    *   数据的*摘要*


    获取*部分*数据通常是使用 `WHERE` 子句进行筛选的问题，正如你之前所见。而*汇总*数据则是通过一个或多个`聚合`函数来运行数据，这些函数会对整个数据集或更小的分组进行汇总。


    最简单的聚合函数非常直观：


    ```sql

    SELECT count(*)

    FROM customers;

    ```


    `count(*)` 函数统计所有行。当然，功能远不止于此。除此之外，你还可以选择具体统计什么。


    在本章中，你将了解一些更常见的聚合函数，例如用于汇总数字的 `sum()` 和 `avg()`，或用于查找任意范围端点的 `max()` 和 `min()`。


    不过，首先我们将看看聚合在 SQL 中如何工作，以及你能用它们做什么、不能做什么。然后，我们将探讨如何对数据的不同部分进行聚合。你还将看到聚合如何用于筛选数据。


    聚合可以应用于全部数据，也可以按分组应用（如小计）。我们将了解如何生成分组摘要以及如何筛选分组摘要。


    我们还将探讨如何跨多个表进行汇总，以及如何使用虚拟表来生成更合适的摘要。


    ## 数据计数


    前面的 `count()` 函数是一个特例：`count(*)` 统计数据集中的所有*行*。数据集也可以被筛选：


    ```sql

    SELECT count(*) AS countrows

    FROM customers

    WHERE height<160.5;

    ```


    在这种情况下，你将统计符合该条件的行数。


    | countrows |

    | --- |

    | 20 |


    与 `SELECT *` 表达式不同，这里的星号意味着*所有行*，而不是*所有列*。


    ### 统计值


    除了统计行数，你还可以统计某列中的值的数量：


    ```sql

    SELECT

    count(*) as countrows,

    count(id) as ids,                   -- 相同

    count(email) as emails,             -- 再次相同

    count(familyname) as familynames,   -- 再次相同

    count(phone) as phones,

    count(state) as states

    FROM customers;

    ```


    这将给你以下摘要：


    | rows | ids | emails | familynames | phones | states |

    | --- | --- | --- | --- | --- | --- |

    | 304 | 304 | 304 | 304 | 268 | 269 |


    请注意，行数将与 `id` 数、`email` 数和 `familyname` 数相同。然而，对于 `phone` 和 `state` 则*不*相同。在统计值时，请注意：


    *   每行*必须*有一个主键（此处是 `id`），所以主键列中的值数量与行数相同。

    *   在这组数据中，电子邮件地址和姓氏是必填的（在 SQL 中设置为 `NOT NULL`），所以 `email` 列中的值数量也与行数相同。

    *   并非所有客户都有（记录的）电话号码，所以这个数字小于行数。

    *   `state` 的情况类似，但在解释上会有进一步的复杂性，我们稍后会讨论。


    除了统计行数，`count(…)` 表示统计列中*值*的数量。由于 `NULL` 不是值，`count()` 会跳过它们，只统计存在的值。这就是为什么 `phone`
    和 `state` 以及其他一些列的计数小于行数。


    事实上，*所有*聚合函数都会跳过 `NULL`，你将会看到。


    ## 聚合如何工作


    根据前面的例子，你会注意到结果与所有 `SELECT` 语句一样，出现在一个虚拟表中。这个虚拟表始终只有一行。


    要理解聚合过程，想象有*两个*表：原始的（可能是虚拟的）表和一个摘要表。每当 SQL 看到聚合查询时，就会生成摘要表。


    你可以让汇总过程更加明确：


    ```sql

    SELECT

    count(*) as countrows,

    count(phone) as phones,

    count(dob) as dobs

    FROM customers

    GROUP BY ()     -- 仅限 PostgreSQL, MSSQL, Oracle

    --  SELECT

    ;

    ```


    `GROUP BY ()` 子句意味着原始表（`customers`）将被汇总。这实际上并没有改变什么，因为每当 SQL 遇到聚合函数（如 `count()`）时，它都隐含此意。事实上，一些数据库管理系统甚至不允许你添加它；这没什么大不了的，因为无论如何汇总都会发生。


    注意子句的顺序。`SELECT` 是在 `ORDER BY` 之前最后处理的，这里将其作为注释包含在内以提醒你。


    在这个摘要表中，你可以访问任何可想象的*摘要*；到目前为止只有 `count()`，但我们很快会看到更多。你*无法*访问未汇总的数据。


    例如，这个查询注定会失败：


    ```sql

    SELECT

    id, givenname, familyname,      -- 等等，这无关紧要

    count(*) as countrows,

    count(phone) as phones,

    count(dob) as dobs

    FROM customers

    --  GROUP BY ()

    ;

    ```


    即使 `GROUP BY ()` 被注释掉了，表也正在被汇总，`id`、`givenname`、`familyname` 和其他单个值不再可访问。脚注:[⁷]


    这里的道理是，你不能在同一个查询中既选择摘要又选择未汇总的值。


    稍后，当更严肃地使用 `GROUP BY` 子句时，你会看到更多相关内容。'
- fmt: '## Counting Selectively


    大多数画作都有`price`值。你可以用以下方式计数：


    ```sql

    SELECT count(price) FROM paintings;

    ```


    这会返回类似以下结果：


    | count |

    | --- |

    | 1137 |


    有时，你可能只想计数其中的一部分，例如较便宜或较贵的画作。


    你可以尝试：


    ```sql

    SELECT count(price)

    FROM paintings

    WHERE price<130;

    ```


    你现在得到了筛选后的汇总表：


    | count |

    | --- |

    | 345 |


    这样可以，但你无法同时包含其他汇总；你需要单独的查询。


    你想要的是类似这样的：


    ```sql

    SELECT count(price<130) --  doesn''t work as expected

    FROM paintings;

    ```


    但它要么不工作，要么得不到预期结果，具体取决于DBMS。


    现代SQL允许使用以下形式的聚合筛选器：


    ```sql

    --  PostgreSQL & SQLite only

    SELECT count(price) FILTER (WHERE price<130)

    FROM paintings;

    ```


    这会给出一个真正的筛选汇总：


    | count |

    | --- |

    | 345 |


    然而，它（目前）并未被广泛支持。


    或者，你可以利用`CASE … END`表达式。记住，你可以使用`CASE … END`来生成类别。例如：


    ```sql

    SELECT

    id, title, price,

    CASE

    WHEN price<130 THEN ''inexpensive''

    WHEN price<170 THEN ''reasonable''

    WHEN price>=170 THEN ''prestige''

    --  ELSE NULL

    END as pricegroup

    FROM paintings;

    ```


    结果如下：


    | id | title | price | pricegroup |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | 125 | inexpensive |

    | 251 | Death in the Sickroom | 105 | inexpensive |

    | 2190 | Cache-cache (Hide-and-Seek) | 185 | prestige |

    | 1560 | Indefinite Divisibility | 125 | inexpensive |

    | 172 | Girl with Racket and Shuttlecock | 195 | prestige |

    | 2460 | The Procession to Calvary | 165 | reasonable |

    | ~ 1273 rows ~ |


    特别地，你可以使用一个简单版本来仅高亮便宜的画作：


    ```sql

    SELECT

    id, title, price,

    CASE WHEN price<130 THEN ''cheap'' END AS status

    FROM paintings;

    ```


    这仅高亮便宜的画作：


    | id | title | price | status |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | 125 | cheap |

    | 251 | Death in the Sickroom | 105 | cheap |

    | 2190 | Cache-cache (Hide-and-Seek) | 185 |   |

    | 1560 | Indefinite Divisibility | 125 | cheap |

    | 172 | Girl with Racket and Shuttlecock | 195 |   |

    | 2460 | The Procession to Calvary | 165 |   |

    | ~ 1273 rows ~ |


    记住，默认值总是`NULL`，除非你包含一个`ELSE`子句来使其为其他值。


    `cheap`这个词并不重要。你也可以用`not so terribly expensive`。如果你只想计数它们，你甚至可以使用`orang utan`或`23`，因为计数不关心实际值是什么。传统上使用值`1`。


    现在，如果我们想计数便宜的画作，我们使用`CASE … END`表达式将值设置为`1`（或任何我们想要的任意值）并计数结果：


    ```sql

    SELECT

    count(CASE WHEN price<130 THEN 1 END) AS cheap

    FROM paintings;

    ```


    这应该适用于所有DBMS：


    | cheap |

    | --- |

    | 345 |


    记住，不匹配的将是`NULL`，而聚合函数总是跳过`NULL`，因此它们不会被计数。


    同时，你也可以包含更昂贵的画作：


    ```sql

    SELECT

    count(CASE WHEN price<130 THEN 1 END) AS cheap,

    count(CASE WHEN price>=130 AND price<170 THEN 1 END) AS reasonable,

    count(CASE WHEN price>=170 THEN 1 END) AS expensive

    FROM paintings;

    ```


    你现在得到了所有类别的汇总：


    | cheap | reasonable | expensive |

    | --- | --- | --- |

    | 345 | 489 | 359 |


    如果你只想要便宜的，原来的`WHERE price<130`子句就可以。然而，当你还需要其他汇总时，你需要筛选聚合，而不是筛选表。这就是这里发生的情况。


    类似地，你可以计数`spam`列中的结果。`spam`列表示客户是否同意接收通讯。在某些情况下，该列有`NULL`值，有些人会认为这意味着同意，而另一些人则认为相反。^([⁸](#fn8))


    `spam`列包含`true`或`false`值（如果DBMS支持），或者包含`1`或`0`（如果不支持）。`true`或`false`值在数学家乔治·布尔之后被称为**boolean**值。


    要计数不同的值，你可以使用：


    ```sql

    --  PostgreSQL, MySQL/MariaDB, SQLite

    SELECT

    count(*) AS total,

    count(spam) AS known,

    count(CASE spam WHEN true THEN 1 END) AS yes,

    count(CASE spam WHEN false THEN 1 END) AS no

    FROM customers;

    --  MSSQL, Oracle

    SELECT

    count(*) AS total,

    count(spam) AS known,

    count(CASE spam WHEN 1 THEN 1 END) AS yes,

    count(CASE spam WHEN 0 THEN 1 END) AS no

    FROM customers;

    ```


    你现在得到以下结果：


    | total | known | yes | no |

    | --- | --- | --- | --- |

    | 304 | 279 | 106 | 173 |


    `count(spam)`的结果表示有多少具有值，但不表示是真还是假。注意，`count(spam)`的值将是`yes`和`no`的总和。


    如果你特别想计数某列的`NULL`值，你可以这样做：


    ```sql

    SELECT count(*)-count(spam) AS nulls

    FROM customers;

    ```


    这会给出类似结果：


    | nulls |

    | --- |

    | 25 |


    即，总行数减去该列中的值，就得到了`NULL`的数量。


    或者，你可以通过使用`CASE … END`使`NULL`变成某个值，而其他所有值变成`NULL`来计数`NULL`：


    ```sql

    SELECT

    count(*) AS total,

    --  etc,

    count(CASE WHEN spam IS NULL THEN 1 END) AS unknown

    FROM customers;

    ```


    你会得到相同的结果：


    | total | unknown |

    | --- | --- |

    | 304 | 25 |


    这里，我们实际上是在反转`NULL`：如果是`NULL`，就使其为某个值；如果不是`NULL`，就使其为`NULL`。


    ## Distinct Values


    `customers`表中有多少个州？你可以尝试：


    ```sql

    SELECT count(state) AS states

    FROM customers;

    ```


    对于州的数量，该语句正确地指出了数据集中州值的数量：


    | states |

    | --- |

    | 269 |


    然而，如果你想回答“customers表中有多少个州？”这个问题，可能实际上意味着“有多少个*不同的*州……？”而没有明确说出来。如果这看起来很有可能，你可以使用`DISTINCT`关键字：


    ```sql

    --  List distinct states:

    SELECT DISTINCT state

    FROM customers;

    --  Count distinct states:

    SELECT

    count(state) AS addresses,

    count(DISTINCT state) AS states

    FROM customers;

    ```


    你现在得到以下结果：


    | addresses | states |

    | --- | --- |

    | 269 | 7 |


    这是许多例子中的一个，我们在英语中说的并不总是代码中我们想要的意思。


    正如你之前看到的，计数州值仍然有一些意义。鉴于每个地址都包含一个州，计数（非唯一的）州意味着计数记录的地址数量。'
  raw: '## Counting Selectively


    Most of the paintings have a `price` value. You can count how many with


    ```

    SELECT count(price) FROM paintings;

    ```


    This gives you something like


    | count |

    | --- |

    | 1137 |


    Sometimes, you might want to count only some of these, such as the cheaper paintings
    or the more expensive ones.


    You could try this:


    ```

    SELECT count(price)

    FROM paintings

    WHERE price<130;

    ```


    You now have a summary of the filtered table:


    | count |

    | --- |

    | 345 |


    This will work, but you can’t also include other summaries at the same time; you
    would need a separate query.


    What you want is something like this:


    ```

    SELECT count(price<130) --  doesn''t work as expected

    FROM paintings;

    ```


    but it either doesn’t work or doesn’t give the expected result, depending on the
    DBMS.


    Modern SQL allows an aggregate filter in the following form:


    ```

    --  PostgreSQL & SQLite only

    SELECT count(price) FILTER (WHERE price<130)

    FROM paintings;

    ```


    This will give a truly filtered summary:


    | count |

    | --- |

    | 345 |


    However, it is not (yet) widely supported.


    Alternatively, you can take advantage of the `CASE … END` expression. Remember,
    you can use `CASE … END` to generate categories. For example:


    ```

    SELECT

    id, title, price,

    CASE

    WHEN price170 THEN ''prestige''

    --  ELSE NULL

    END as pricegroup

    FROM paintings;

    ```


    The results look like this:


    | id | title | price | pricegroup |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | 125 | inexpensive |

    | 251 | Death in the Sickroom | 105 | inexpensive |

    | 2190 | Cache-cache (Hide-and-Seek) | 185 | prestige |

    | 1560 | Indefinite Divisibility | 125 | inexpensive |

    | 172 | Girl with Racket and Shuttlecock | 195 | prestige |

    | 2460 | The Procession to Calvary | 165 | reasonable |

    | ~ 1273 rows ~ |


    In particular, you can use a simple version just to highlight the cheap ones:


    ```

    SELECT

    id, title, price,

    CASE WHEN price<130 THEN ''cheap'' END AS status

    FROM paintings;

    ```


    This highlights only the cheap ones:


    | id | title | price | status |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | 125 | cheap |

    | 251 | Death in the Sickroom | 105 | cheap |

    | 2190 | Cache-cache (Hide-and-Seek) | 185 |   |

    | 1560 | Indefinite Divisibility | 125 | cheap |

    | 172 | Girl with Racket and Shuttlecock | 195 |   |

    | 2460 | The Procession to Calvary | 165 |   |

    | ~ 1273 rows ~ |


    Remember, the default is always `NULL` unless you include an `ELSE` clause to
    make it something else.


    The word `cheap` is unimportant. You could have used `not so terribly expensive`.
    If all you want to do is count them, you could even have used `orang utan` or
    `23`, since counting doesn’t care what the actual value is. It is traditional
    to use the value `1`.


    Now, if we want to count cheap paintings, we use the `CASE … END` expression to
    set the values at `1` (or whatever arbitrary value we want) and count the results:


    ```

    SELECT

    count(CASE WHEN price<130 THEN 1 END) AS cheap

    FROM paintings;

    ```


    This should work for all DBMSs:


    | cheap |

    | --- |

    | 345 |


    Remember that the ones that don’t match will have a `NULL`, and aggregate functions
    always skip `NULL`, so they won’t be counted.


    At the same time, you can also include the more expensive ones:


    ```

    SELECT

    count(CASE WHEN price=170 THEN 1 END) AS expensive

    FROM paintings;

    ```


    You now get summaries of all of the categories:


    | cheap | reasonable | expensive |

    | --- | --- | --- |

    | 345 | 489 | 359 |


    If you wanted only the cheap ones, the original `WHERE price<130` clause would
    have done. However, when you want other summaries as well, you’ll need to filter
    the aggregates, not the table. This is what’s happening here.


    Similarly, you can count the results in the `spam` column. The `spam` column represents
    whether or not the customer has agreed to a newsletter. In some cases, the column
    has a `NULL`, which some will assume implies consent, while others assume the
    opposite.^([⁸](#fn8))


    The `spam` column contains either a `true` or `false` value where the DBMS supports
    it, or a `1` or `0` where it doesn’t. A value of `true` or `false` is referred
    to as a **boolean** value after the mathematician George Boole.


    To count the different values, you can use


    ```

    --  PostgreSQL, MySQL/MariaDB, SQLite

    SELECT

    count(*) AS total,

    count(spam) AS known,

    count(CASE spam WHEN true THEN 1 END) AS yes,

    count(CASE spam WHEN false THEN 1 END) AS no

    FROM customers;

    --  MSSQL, Oracle

    SELECT

    count(*) AS total,

    count(spam) AS known,

    count(CASE spam WHEN 1 THEN 1 END) AS yes,

    count(CASE spam WHEN 0 THEN 1 END) AS no

    FROM customers;

    ```


    You now have the following:


    | total | known | yes | no |

    | --- | --- | --- | --- |

    | 304 | 279 | 106 | 173 |


    The result for `count(spam)` indicates how many have a *value*, but not whether
    it is true or false. Note that the value for `count(spam)` will be the total for
    `yes` and `no`.


    If you specifically want to count `NULL`s for a column, you could do something
    like this:


    ```

    SELECT count(*)-count(spam) AS nulls

    FROM customers;

    ```


    This gives something like


    | nulls |

    | --- |

    | 25 |


    That is, the total number of rows minus the values in the column gives the number
    of `NULL`s.


    Alternatively, you can count `NULL`s by using `CASE … END` to make `NULL` something,
    and everything else `NULL`:


    ```

    SELECT

    count(*) AS total,

    --  etc,

    count(CASE WHEN spam IS NULL THEN 1 END) AS unknown

    FROM customers;

    ```


    You’ll get the same result:


    | total | unknown |

    | --- | --- |

    | 304 | 25 |


    Here, we’re effectively reversing `NULL`s: if it’s `NULL`, make it something;
    if it’s not `NULL`, make it `NULL`.


    ## Distinct Values


    How many states are in the `customers` table? You could try this:


    ```

    SELECT count(state) AS states

    FROM customers;

    ```


    For the number of states, the statement correctly indicates the number of state
    values in the dataset:


    | states |

    | --- |

    | 269 |


    However, if you want to answer the question “How many states are there in the
    customers table,” it’s possible that it actually means “How many *different* states
    … ?” without actually saying so. If this seems likely, you can use the `DISTINCT`
    keyword:


    ```

    --  List distinct states:

    SELECT DISTINCT state

    FROM customers;

    --  Count distinct states:

    SELECT

    count(state) AS addresses,

    count(DISTINCT state) AS states

    FROM customers;

    ```


    You now have the following:


    | addresses | states |

    | --- | --- |

    | 269 | 7 |


    This is one of many examples where what we say in English isn’t always what we
    mean in code.


    As you have seen earlier, there is still some meaning in counting state values.
    Given that every address includes a state, counting (nondistinct) states implies
    counting the number of recorded addresses.'
