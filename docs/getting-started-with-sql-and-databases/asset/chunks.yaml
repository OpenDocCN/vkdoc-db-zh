    *To Sachiko. Thanks for your patience, forbearance, and trust.*


    ## Introduction


    In the distant past, data was managed by computers in all sorts of ways, and there
    was no one way to do this. There still isn’t, which isn’t a bad thing, because
    not all data can be handled the same way. There is, however, a large body of data
    which can be handled in a common way, and the early 1970s saw the development
    of a set of mathematical principles in the relational model.


    Starting in a lab at IBM, software was developed to handle relational data, and
    a language was developed to manage it. The language eventually became the Structured
    Query Language. In the early days, different vendors had their own idea of how
    the language should work, but this was eventually rolled into a standard. The
    standard has grown over the decades, which means that the language is also growing.


    Not all database vendors follow the standard to the same degree. Some standards
    were late in coming, and database vendors filled in some gaps with their imagination.
    Other standards are harder to implement than it looks, and some vendors are “still
    working on it.” And sometimes, the vendor just wants to do something differently.


    This book looks at using SQL for basic tasks. Mostly that means fetching data
    and possibly processing it. There are many database packages available, all with
    their own quirks, and all with their own variations of the SQL standard. This
    book covers a few of the most popular packages and makes a point of showing not
    only what the standard says but also how the individual packages do things.


    We’ll also look at how databases are designed, but not because we’ll be designing
    any. One of the big mysteries to any new SQL user is why do we do things this
    way or that, and why is the data the way it is. By understanding some design principles,
    you’ll be in a better position to know why.


    In this book, we make no assumptions about your prior knowledge, except that you
    have an idea what a table is. You have probably had some experience with spreadsheets
    as well.


    As to what you might do afterward, that depends. It might be your job to fetch
    data to feed it into some sort of analysis or reporting software. You might do
    all of your analysis in SQL directly, or you might write queries in a specialized
    database application. Or you might be a web developer looking to manage a blog
    or an ecommerce site.


    ## The Sample Data


    We’ll talk more about the sample data later in the book, but the book is based
    on a sample database. You can sit in an armchair and read the book as it is if
    you like, but you’ll probably want to work through the exercises.


    To work through the exercises, you’ll need the following:


    *   A database server and a suitable database client.

    *   Permissions to do anything you like on the database. If you’ve installed the
    software locally, you probably have all the permissions you need, but if you’re
    doing this on somebody else’s system, you need to check.

    *   The script which produces the sample database.


    You can get a fresh copy of the script from [`https://sample-db.net`](https://sample-db.net)
    and choose your options.


    If that’s too much like hard work, you can use the following links to download
    a script:


    *   PostgreSQL: [`https://sample-db.net/?dbmss[]=pgsql-10&db=prints&br=crlf&refresh&download`](https://sample-db.net/%253Fdbmss%255B%255D%253Dpgsql-10%2526db%253Dprints%2526br%253Dcrlf%2526refresh%2526download)

    *   SQLite: [`https://sample-db.net?dbmss[]=sqlite-script&db=prints&br=crlf&refresh&download`](https://sample-db.net/%253Fdbmss%255B%255D%253Dsqlite-script%2526db%253Dprints%2526br%253Dcrlf%2526refresh%2526download)

    *   MySQL/MariaDB: [`https://sample-db.net/?dbmss[]=mysql-ansi&db=prints&br=crlf&refresh&download`](https://sample-db.net/%253Fdbmss%255B%255D%253Dmysql-ansi%2526db%253Dprints%2526br%253Dcrlf%2526refresh%2526download)

    *   Microsoft SQL: [`https://sample-db.net/?dbmss[]=mssql-16&db=prints&br=crlf&refresh&download`](https://sample-db.net/%253Fdbmss%255B%255D%253Dmssql-16%2526db%253Dprints%2526br%253Dcrlf%2526refresh%2526download)

    *   Oracle: [`https://sample-db.net/?dbmss[]=oracle-12&db=prints&br=crlf&refresh&download`](https://sample-db.net/%253Fdbmss%255B%255D%253Doracle-12%2526db%253Dprints%2526br%253Dcrlf%2526refresh%2526download)


    These links are for current versions of the software. If you want older versions,
    visit the preceding site.


    ## Notes


    Throughout the book, you’ll come across a few terms and a few expectations:


    *   MySQL and MariaDB are essentially the same; MariaDB is an increasingly popular
    spin-off. With very few exceptions (as noted), the code is interchangeable.

    *   The book makes a great deal of using MySQL/MariaDB in so-called ANSI mode.
    This is easily done, as you’ll see in the book, and makes working with standard
    SQL much easier.

    *   The Microsoft product will sometimes be referred to as Microsoft SQL Server
    and sometimes as MSSQL for short. If you’re looking for T-SQL (Transact SQL),
    it’s also the same thing.


    ## Acknowledgments


    The sample data includes information about classical paintings and their artists.
    This information is an extract of the hard work that went into the WebMuseum ([`www.ibiblio.org/wm/`](http://www.ibiblio.org/wm/)).


