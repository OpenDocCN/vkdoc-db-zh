    tables, the product was a single result set. In this chapter, we’ll look at combining
    multiple result sets.'
  trans: '

    ### 前端软件


    你很少会直接使用`INSERT`、`UPDATE`或`DELETE`的另一个原因是，数据通常不是手动修改的。例如，示例数据库是为一个网络应用程序设计的，你通常会通过网页表单来进行所有的更改。在办公室环境中，使用类似的前端软件时，情况也是如此。


    然而，无论数据实际如何输入，它最终都会以如前所述的 DML 语句的形式进入数据库。


    例如，当你在网页表单上输入注册信息并提交时，数据会被网络服务器接收。接着，它会被服务器端脚本（通常用 PHP 等编程语言编写）处理，包装成 DML 语句，然后发送到数据库服务器进行进一步处理。


    获取数据，例如查看目录，过程基本相同，但大多是反向的。提交搜索条件后，网络服务器脚本会生成一个合适的`SELECT`语句，用它从数据库服务器获取数据，适当地格式化结果，然后将其发送回用户。


    另一方面，使用`SELECT`语句可以做的事情还有很多：


    *   你可以像本书中一直做的那样，获取即席查询结果。

    *   你可以获取数据，以便在统计或分析软件包中做进一步处理。


    当然，即使你不直接使用其他 DML 语句，理解其背后的原理也非常重要。


    ## 总结


    在本章中，我们探讨了如何创建数据库表以及如何在表中添加或更改数据。


    表使用`CREATE TABLE`语句创建。该语句包括：


    1.  列名

    2.  数据类型

    3.  其他表和列属性


    表设计之后可以更改，例如添加触发器或索引。更严重的更改，如添加或删除列，可以使用`ALTER TABLE`语句来实现。


    ### 数据类型


    数据主要有三种类型：


    1.  数字

    2.  字符串

    3.  日期


    上述类型有许多变体，这使得数据存储和处理更高效，并有助于验证数据值。


    还有一些其他类型，如布尔型或二进制数据，在典型的数据库中不太常见。


    ### 约束


    约束定义了哪些值被视为有效。标准约束包括：


    *   `NOT NULL`

    *   `UNIQUE`

    *   `DEFAULT`

    *   外键


    你可以使用通用的`CHECK`约束来构建自己的附加约束。在这里，你可以添加一个类似于`WHERE`子句的条件，来定义你特定的验证规则。


    ### 外键


    外键是对另一个表的引用，它也被视为一种约束，因为它将值限制为与另一个表中的值相匹配。


    外键在子表中定义。


    外键还会影响从父表中删除行的任何尝试。默认情况下，如果存在匹配的子行，则无法删除父行。但是，可以将其更改为将外键设置为`NULL`，或者将删除操作级联到所有子行。


    ### 索引


    由于表不是按任何特定顺序存储的，因此搜索可能非常耗时。可以为你例行搜索的任何列添加可选的索引，这使得搜索速度大大加快。


    ### 操作数据


    数据操作语言语句用于添加或更改数据。除了`SELECT`语句，还有：


    *   `INSERT`

    *   `UPDATE`

    *   `DELETE`


    与`SELECT`不同，这些语句有可能把数据库搞得一团糟，尤其是因为 SQL 没有撤销功能。


    # 9. 集合操作


    所有 SQL 数据库的背后都是关系数据库理论，这为数据库奠定了坚实的数学基础。其中很重要的一点是，数据库是基于数学上的`集合`。


    在数学中，集合是事物的汇集。你不需要担心所有的细节，但有两点很重要：


    *   集合中没有重复项。这是良好数据库设计确保没有重复记录的部分原因。

    *   集合是无序的。当然，你查看其内容时必然呈现某种顺序，但这个顺序本身并不重要。


    目前，所有这些内容中最重要的部分是：一个表就是一个行的集合，这意味着行不会重复，并且行的顺序不重要。


    到目前为止，我们所有的查询都只产生一个结果集。即使你连接了表，结果也是一个单一的结果集。在本章中，我们将探讨如何组合多个结果集。

    '
- fmt: '## Unions


    A union is the most basic combination of two or more sets. The result is another
    set containing all the members of the sets. The usual diagram for this is something
    like Figure [9-1](#601766_1_En_9_Chapter.xhtml#Fig1).


    ![](images/601766_1_En_9_Chapter/601766_1_En_9_Fig1_HTML.jpg)


    A figure represents the union of two sets.


    Figure 9-1


    The Union of Two Sets


    Sometimes, there are elements which are members of both sets, as you see in Figure
    [9-1](#601766_1_En_9_Chapter.xhtml#Fig1). We’ll discuss the overlap in a moment.


    In SQL, there are times when we need to combine rows from multiple tables or virtual
    table. This is not the same as joining two tables. When you join tables, you add
    `columns` to an existing table. Here, we’re talking about adding `rows`.


    Suppose you’re planning some sort of event and want to invite customers as well
    as employees. You can get their names easily enough:


    ```sql

    SELECT givenname, familyname FROM customers;

    SELECT givenname, familyname FROM employees;

    ```


    At this stage, you will have two sets of data. To combine them into one set of
    data, you use the `UNION` clause between the `SELECT` statements:


    | givenname | familyname |

    | --- | --- |

    | Matt | Black |

    | Ali | Gator |

    | Emmy | Grate |

    | Claire | de Lune |

    | Len | Till |

    | Jack | Potts |

    | ~ 322 rows ~ |


    ```sql

    SELECT givenname, familyname FROM customers

    UNION

    SELECT givenname, familyname FROM employees

    ;

    ```


    Note that the semicolon from the first statement has been removed. This is because
    a `UNION` is a single statement. The second semicolon has been moved further down
    to accommodate more changes.


    If you run the preceding statement, you may notice that the total number of rows
    is actually less than the number of customers and the number of employees combined.
    That’s because of a feature of the `UNION` operation.


    Since the result of a `UNION` is supposed to be a set, there should be no duplicates,
    so after the data is combined, duplicates are removed. Unfortunately, SQL has
    no way of knowing which names are the genuine duplicates, so it has only the resulting
    names to go on.


    In this case, there are three sources of duplicates:


    *   Duplicate names in the `customers` table


    *   Duplicate names in the `employees` table


    *   Names which appear in both the `customers` and `employees` tables


    Note that they are not *genuine* duplicates and are really different people, but
    they happen, by coincidence, to share their given and family names, so SQL sees
    them as the same.


    If you are satisfied that duplicate names are OK, then you can use the `UNION
    ALL` clause:


    | givenname | familyname |

    | --- | --- |

    | Judy | Free |

    | Ray | Gunn |

    | Ray | King |

    | Ivan | Inkling |

    | Drew | Blood |

    | Seymour | Sights |

    | ~ 338 rows ~ |


    ```sql

    SELECT givenname, familyname FROM customers

    UNION ALL   --  don''t remove duplicates

    SELECT givenname, familyname FROM employees

    ;

    ```


    The `UNION ALL` clause doesn’t remove duplicate values, so the total number of
    rows should be right.


    There’s an added benefit of using `UNION ALL`. Finding and removing duplicates
    actually takes extra work on the part of the DBMS, so, if it doesn’t have to remove
    them, there’s less work involved.


    Note that the definition of a duplicate depends entirely on the `SELECT` clause.
    If you had chosen some additional information, such as the `email`:


    | givenname | familyname | email |

    | --- | --- | --- |

    | Judy | Free | judy.free474@example.net |

    | Ray | Gunn | ray.gunn186@example.net |

    | Ray | King | ray.king144@example.net |

    | Ivan | Inkling | ivan.inkling179@example.com |

    | Drew | Blood | drew.blood475@example.net |

    | Seymour | Sights | seymour.sights523@example.net |

    | ~ 338 rows ~ |


    ```sql

    SELECT givenname, familyname, email FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ;

    ```


    Here, it’s likely that there won’t be any duplicates to worry about. That’s because
    the email address is supposed to be distinct.


    It’s still a good idea to use `UNION ALL`, since you don’t want to waste time
    looking for duplicates when there aren’t any.


    You can have as many `SELECT` statements as you like, all with `UNION` or `UNION
    ALL` statements in between:


    | givenname | familyname |

    | --- | --- |

    | Judy | Free |

    | Ray | Gunn |

    | Ray | King |

    | Ivan | Inkling |

    | Drew | Blood |

    | Seymour | Sights |

    | ~ 525 rows ~ |


    ```sql

    SELECT givenname, familyname FROM customers

    UNION ALL

    SELECT givenname, familyname FROM employees

    UNION ALL

    SELECT givenname, familyname FROM artists

    ;

    ```


    Different DBMSs may have a theoretical limit to the number of `SELECT` statements
    you can have, but it’s likely to be more than you’ll ever want.


    ### Selective Unions


    Each `SELECT` statement can be as complex as you like. For example, they can include
    joins and aggregates. They can also be Common Table Expressions. One thing you
    can’t do is use `ORDER BY`, which we’ll look at later.


    For example, suppose you want to include all of the employees, but only some of
    the customers:


    | givenname | familyname | email |

    | --- | --- | --- |

    | Ray | Gunn | ray.gunn186@example.net |

    | Seymour | Sights | seymour.sights523@example.net |

    | Jack | Knife | jack.knife545@example.com |

    | Carol | Singers | carol.singers505@example.net |

    | Miles | Long | miles.long492@example.com |

    | Sharon | Sharalike | sharon.sharalike374@example.com |

    | ~ 86 rows ~ |


    ```sql

    SELECT givenname, familyname, email FROM customers

    WHERE state=''VIC''

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ;

    ```


    You can even combine differently filtered results from the same table:


    | givenname | familyname | email |

    | --- | --- | --- |

    | Ray | Gunn | ray.gunn186@example.net |

    | Seymour | Sights | seymour.sights523@example.net |

    | Jack | Knife | jack.knife545@example.com |

    | Carol | Singers | carol.singers505@example.net |

    | Miles | Long | miles.long492@example.com |

    | Sharon | Sharalike | sharon.sharalike374@example.com |

    | ~ 148 rows ~ |


    ```sql

    SELECT givenname, familyname, email FROM customers

    WHERE state=''VIC''

    UNION ALL

    SELECT givenname, familyname, email FROM customers

    WHERE dob<''1980-01-01''

    ;

    ```


    but you probably shouldn’t. The preceding example is better expressed with an
    `OR` operator:


    ```sql

    SELECT givenname, familyname, email FROM customers

    WHERE state=''VIC'' OR dob<''1980-01-01''

    ;

    ```


    Not only is it better expressed, it is likely to be much more efficient. Generating
    two filtered result sets and combining them is much more work than filtering a
    single result set. To put it another way, you would only use `UNION` if there’s
    no other way to do it.'
  raw: '## Unions


    A union is the most basic combination of two or more sets. The result is another
    set containing all the members of the sets. The usual diagram for this is something
    like Figure [9-1](#601766_1_En_9_Chapter.xhtml#Fig1).


    ![](images/601766_1_En_9_Chapter/601766_1_En_9_Fig1_HTML.jpg)


    A figure represents the union of two sets.


    Figure 9-1


    The Union of Two Sets


    Sometimes, there are elements which are members of both sets, as you see in Figure
    [9-1](#601766_1_En_9_Chapter.xhtml#Fig1). We’ll discuss the overlap in a moment.


    In SQL, there are times when we need to combine rows from multiple tables or virtual
    table. This is not the same as joining two tables. When you join tables, you add
    *columns* to an existing table. Here, we’re talking about adding *rows*.


    Suppose you’re planning some sort of event and want to invite customers as well
    as employees. You can get their names easily enough:


    ```

    SELECT givenname, familyname FROM customers;

    SELECT givenname, familyname FROM employees;

    ```


    At this stage, you will have two sets of data. To combine them into one set of
    data, you use the `UNION` clause between the `SELECT` statements:


    | givenname | familyname |

    | --- | --- |

    | Matt | Black |

    | Ali | Gator |

    | Emmy | Grate |

    | Claire | de Lune |

    | Len | Till |

    | Jack | Potts |

    | ~ 322 rows ~ |


    ```

    SELECT givenname, familyname FROM customers

    UNION

    SELECT givenname, familyname FROM employees

    ;

    ```


    Note that the semicolon from the first statement has been removed. This is because
    a `UNION` is a single statement. The second semicolon has been moved further down
    to accommodate more changes.


    If you run the preceding statement, you may notice that the total number of rows
    is actually less than the number of customers and the number of employees combined.
    That’s because of a feature of the `UNION` operation.


    Since the result of a `UNION` is supposed to be a set, there should be no duplicates,
    so after the data is combined, duplicates are removed. Unfortunately, SQL has
    no way of knowing which names are the genuine duplicates, so it has only the resulting
    names to go on.


    In this case, there are three sources of duplicates:


    *   Duplicate names in the `customers` table


    *   Duplicate names in the `employees` table


    *   Names which appear in both the `customers` and `employees` tables


    Note that they are not *genuine* duplicates and are really different people, but
    they happen, by coincidence, to share their given and family names, so SQL sees
    them as the same.


    If you are satisfied that duplicate names are OK, then you can use the `UNION
    ALL` clause:


    | givenname | familyname |

    | --- | --- |

    | Judy | Free |

    | Ray | Gunn |

    | Ray | King |

    | Ivan | Inkling |

    | Drew | Blood |

    | Seymour | Sights |

    | ~ 338 rows ~ |


    ```

    SELECT givenname, familyname FROM customers

    UNION ALL   --  don''t remove duplicates

    SELECT givenname, familyname FROM employees

    ;

    ```


    The `UNION ALL` clause doesn’t remove duplicate values, so the total number of
    rows should be right.


    There’s an added benefit of using `UNION ALL`. Finding and removing duplicates
    actually takes extra work on the part of the DBMS, so, if it doesn’t have to remove
    them, there’s less work involved.


    Note that the definition of a duplicate depends entirely on the `SELECT` clause.
    If you had chosen some additional information, such as the `email`:


    | givenname | familyname | email |

    | --- | --- | --- |

    | Judy | Free | judy.free474@example.net |

    | Ray | Gunn | ray.gunn186@example.net |

    | Ray | King | ray.king144@example.net |

    | Ivan | Inkling | ivan.inkling179@example.com |

    | Drew | Blood | drew.blood475@example.net |

    | Seymour | Sights | seymour.sights523@example.net |

    | ~ 338 rows ~ |


    ```

    SELECT givenname, familyname, email FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ;

    ```


    Here, it’s likely that there won’t be any duplicates to worry about. That’s because
    the email address is supposed to be distinct.


    It’s still a good idea to use `UNION ALL`, since you don’t want to waste time
    looking for duplicates when there aren’t any.


    You can have as many `SELECT` statements as you like, all with `UNION` or `UNION
    ALL` statements in between:


    | givenname | familyname |

    | --- | --- |

    | Judy | Free |

    | Ray | Gunn |

    | Ray | King |

    | Ivan | Inkling |

    | Drew | Blood |

    | Seymour | Sights |

    | ~ 525 rows ~ |


    ```

    SELECT givenname, familyname FROM customers

    UNION ALL

    SELECT givenname, familyname FROM employees

    UNION ALL

    SELECT givenname, familyname FROM artists

    ;

    ```


    Different DBMSs may have a theoretical limit to the number of `SELECT` statements
    you can have, but it’s likely to be more than you’ll ever want.


    ### Selective Unions


    Each `SELECT` statement can be as complex as you like. For example, they can include
    joins and aggregates. They can also be Common Table Expressions. One thing you
    can’t do is use `ORDER BY`, which we’ll look at later.


    For example, suppose you want to include all of the employees, but only some of
    the customers:


    | givenname | familyname | email |

    | --- | --- | --- |

    | Ray | Gunn | ray.gunn186@example.net |

    | Seymour | Sights | seymour.sights523@example.net |

    | Jack | Knife | jack.knife545@example.com |

    | Carol | Singers | carol.singers505@example.net |

    | Miles | Long | miles.long492@example.com |

    | Sharon | Sharalike | sharon.sharalike374@example.com |

    | ~ 86 rows ~ |


    ```

    SELECT givenname, familyname, email FROM customers

    WHERE state=''VIC''

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ;

    ```


    You can even combine differently filtered results from the same table:


    | givenname | familyname | email |

    | --- | --- | --- |

    | Ray | Gunn | ray.gunn186@example.net |

    | Seymour | Sights | seymour.sights523@example.net |

    | Jack | Knife | jack.knife545@example.com |

    | Carol | Singers | carol.singers505@example.net |

    | Miles | Long | miles.long492@example.com |

    | Sharon | Sharalike | sharon.sharalike374@example.com |

    | ~ 148 rows ~ |


    ```

    SELECT givenname, familyname, email FROM customers

    WHERE state=''VIC''

    UNION ALL

    SELECT givenname, familyname, email FROM customers

    WHERE dob<''1980-01-01''

    ;

    ```


    but you probably shouldn’t. The preceding example is better expressed with an
    `OR` operator:


    ```

    SELECT givenname, familyname, email FROM customers

    WHERE state=''VIC'' OR dob<''1980-01-01''

    ;

    ```


    Not only is it better expressed, it is likely to be much more efficient. Generating
    two filtered result sets and combining them is much more work than filtering a
    single result set. To put it another way, you would only use `UNION` if there’s
    no other way to do it.'
  trans: '

    ## 并集


    并集是两个或多个集合最基本的组合方式。结果是一个包含所有集合成员的新集合。通常的图示类似于图 9-1。


    ![](img/601766_1_En_9_Fig1_HTML.jpg)


    图示表示两个集合的并集。


    图 9-1


    两个集合的并集


    有时，会有一些元素是两个集合的共同成员，正如你在图 9-1 中所见。我们稍后将讨论这种重叠部分。


    在 SQL 中，有时我们需要将来自多个表或虚拟表的行组合起来。这与连接两个表不同。当你连接表时，你是向现有表添加 `列`。而在这里，我们谈论的是添加 `行`。


    假设你正在策划某个活动，并希望同时邀请客户和员工。你可以很容易地获取他们的姓名：


    ```sql

    SELECT givenname, familyname FROM customers;

    SELECT givenname, familyname FROM employees;

    ```


    在这个阶段，你将得到两组数据。要将它们组合成一组数据，你可以在 `SELECT` 语句之间使用 `UNION` 子句：


    | givenname | familyname |

    | --- | --- |

    | Matt | Black |

    | Ali | Gator |

    | Emmy | Grate |

    | Claire | de Lune |

    | Len | Till |

    | Jack | Potts |

    | ~ 322 行 ~ |


    ```sql

    SELECT givenname, familyname FROM customers

    UNION

    SELECT givenname, familyname FROM employees

    ;

    ```


    请注意，第一个语句末尾的分号已被移除。这是因为 `UNION` 是一个单一语句。第二个分号已向下移动，以便容纳更多的更改。


    如果你运行前面的语句，可能会注意到总行数实际上少于客户数和员工数之和。这是因为 `UNION` 操作的一个特性。


    由于 `UNION` 的结果应该是一个集合，因此不应有重复项，所以在数据组合后，重复项会被移除。不幸的是，SQL 无法知道哪些姓名是真正的重复项，因此它只能根据结果姓名来判断。


    在这种情况下，有三种重复项的来源：


    *   `customers` 表中的重复姓名


    *   `employees` 表中的重复姓名


    *   同时出现在 `customers` 和 `employees` 表中的姓名


    请注意，它们并非 *真正的* 重复项，实际上是不同的人，只是碰巧巧合地共享了他们的名和姓，因此 SQL 将它们视为相同。


    如果你确定重复的姓名没问题，那么可以使用 `UNION ALL` 子句：


    | givenname | familyname |

    | --- | --- |

    | Judy | Free |

    | Ray | Gunn |

    | Ray | King |

    | Ivan | Inkling |

    | Drew | Blood |

    | Seymour | Sights |

    | ~ 338 行 ~ |


    ```sql

    SELECT givenname, familyname FROM customers

    UNION ALL   --  不移除重复项

    SELECT givenname, familyname FROM employees

    ;

    ```


    `UNION ALL` 子句不会移除重复值，因此总行数应该是正确的。


    使用 `UNION ALL` 还有一个额外的好处。查找和移除重复项实际上需要数据库管理系统（DBMS）执行额外的工作，因此，如果它不必移除它们，涉及的工作量就更少。


    请注意，重复项的定义完全取决于 `SELECT` 子句。如果你选择了额外的信息，比如 `email`：


    | givenname | familyname | email |

    | --- | --- | --- |

    | Judy | Free | judy.free474@example.net |

    | Ray | Gunn | ray.gunn186@example.net |

    | Ray | King | ray.king144@example.net |

    | Ivan | Inkling | ivan.inkling179@example.com |

    | Drew | Blood | drew.blood475@example.net |

    | Seymour | Sights | seymour.sights523@example.net |

    | ~ 338 行 ~ |


    ```sql

    SELECT givenname, familyname, email FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ;

    ```


    在这里，很可能根本不需要担心任何重复项。这是因为电子邮件地址应该是唯一的。


    使用 `UNION ALL` 仍然是一个好主意，因为当没有重复项时，你不想浪费时间去查找它们。


    你可以根据需要使用任意多个 `SELECT` 语句，全部用 `UNION` 或 `UNION ALL` 语句连接：


    | givenname | familyname |

    | --- | --- |

    | Judy | Free |

    | Ray | Gunn |

    | Ray | King |

    | Ivan | Inkling |

    | Drew | Blood |

    | Seymour | Sights |

    | ~ 525 行 ~ |


    ```sql

    SELECT givenname, familyname FROM customers

    UNION ALL

    SELECT givenname, familyname FROM employees

    UNION ALL

    SELECT givenname, familyname FROM artists

    ;

    ```


    不同的 DBMS 可能对你可以拥有的 `SELECT` 语句数量有理论上的限制，但这很可能比你想要的还要多。


    ### 选择性并集


    每个 `SELECT` 语句都可以按你希望的那样复杂。例如，它们可以包含连接和聚合。它们也可以是公用表表达式（Common Table Expressions）。有一件事你不能做，那就是使用
    `ORDER BY`，我们稍后会讲到。


    例如，假设你想包括所有员工，但只包括部分客户：


    | givenname | familyname | email |

    | --- | --- | --- |

    | Ray | Gunn | ray.gunn186@example.net |

    | Seymour | Sights | seymour.sights523@example.net |

    | Jack | Knife | jack.knife545@example.com |

    | Carol | Singers | carol.singers505@example.net |

    | Miles | Long | miles.long492@example.com |

    | Sharon | Sharalike | sharon.sharalike374@example.com |

    | ~ 86 行 ~ |


    ```sql

    SELECT givenname, familyname, email FROM customers

    WHERE state=''VIC''

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ;

    ```


    你甚至可以从同一张表中组合不同筛选条件的结果：


    | givenname | familyname | email |

    | --- | --- | --- |

    | Ray | Gunn | ray.gunn186@example.net |

    | Seymour | Sights | seymour.sights523@example.net |

    | Jack | Knife | jack.knife545@example.com |

    | Carol | Singers | carol.singers505@example.net |

    | Miles | Long | miles.long492@example.com |

    | Sharon | Sharalike | sharon.sharalike374@example.com |

    | ~ 148 行 ~ |


    ```sql

    SELECT givenname, familyname, email FROM customers

    WHERE state=''VIC''

    UNION ALL

    SELECT givenname, familyname, email FROM customers

    WHERE dob<''1980-01-01''

    ;

    ```


    但你可能不应该这样做。前面的例子用 `OR` 操作符表达会更好：


    ```sql

    SELECT givenname, familyname, email FROM customers

    WHERE state=''VIC'' OR dob<''1980-01-01''

    ;

    ```


    这不仅表达得更好，而且效率可能高得多。生成两个筛选结果集然后将它们组合起来，比筛选单个结果集要多做很多工作。换句话说，只有在没有其他方法可以实现时，你才会使用
    `UNION`。

    '
- fmt: '# SQL UNION 操作符的兼容性与使用注意事项


    ## SELECT 子句必须兼容


    SQL 实际上并不关心你组合的是什么，只要数据是兼容的即可。首先，每个 `SELECT` 语句必须有相同数量的列：


    ```sql

    --  This won''t work:

    SELECT givenname, familyname, email --  3 columns

    FROM customers

    UNION ALL

    SELECT givenname, familyname        --  2 columns

    FROM employees

    ;

    ```


    其次，每列的数据类型*应该*匹配：


    ```sql

    --  This shouldn''t work either:

    SELECT /* string: */ email, givenname, familyname

    FROM customers

    UNION ALL

    SELECT /* number: */ id, givenname, familyname

    FROM employees

    ;

    ```


    这在 PostgreSQL、Oracle 和 MSSQL 中将无法工作。这是因为 `email` 是字符串，而 `id` 是数字，你不能混合数据类型。


    然而，在 MariaDB/MySQL 中你可能蒙混过关，因为它会自动将数字转换为字符串；在 SQLite 中也行，因为它本来就不关心数据类型。


    如果你想正确地混合类型，应该自己进行类型转换：


    ```sql

    --  Using cast()

    SELECT email, givenname, familyname

    FROM customers

    UNION ALL

    SELECT cast(id as varchar(4)), givenname, familyname

    FROM employees

    ;

    ```


    当然，你是否真的想要下面这样的结果是另一个问题：


    | email | givenname | familyname |

    | --- | --- | --- |

    | may.bea350@example.com | May | Bea |

    | 16 | Sylvester | Underbar |

    | pearl.divers20@example.net | Pearl | Divers |

    | tom.morrow429@example.com | Tom | Morrow |

    | grace.skies588@example.com | Grace | Skies |

    | 8 | Seymour | Something |

    | ~ 94 rows ~ |


    真正的陷阱在于，`UNION` 对齐 `SELECT` 子句中的*值*时，完全不考虑它们的名称或含义。下面两个语句都会产生结果：


    ```sql

    --  Reversed Columns

    SELECT givenname, familyname FROM customers

    UNION ALL

    SELECT familyname, givenname FROM employees

    ;

    --  Mis-aligned Columns

    SELECT email, givenname, familyname FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ;

    ```


    但结果很可能毫无意义。不过，如果你确实需要对齐名称不同的列，这就很有用了：


    ```sql

    --  Mixed Column Names

    SELECT givenname, familyname FROM customers

    UNION ALL

    SELECT firstname, lastname FROM sorting

    ;

    ```


    在这种情况下，我们知道你是什么意思：


    | givenname | familyname |

    | --- | --- |

    | Judy | Free |

    | Ray | Gunn |

    | Ray | King |

    | Ivan | Inkling |

    | Drew | Blood |

    | Seymour | Sights |

    | ~ 312 rows ~ |


    当你尝试组合来自不同表的数据时，情况常常如此。


    ## 仅使用第一个 SELECT 语句的列名


    如果你运行了前面的几个例子，你会注意到所有的列名都只来自于*第一个* `SELECT` 语句。这使得在你开始切换 `SELECT` 列时，尤其令人困惑。


    你也可以在 `UNION` 中给列名起别名：


    ```sql

    SELECT givenname AS gn, familyname FROM customers

    UNION ALL

    SELECT givenname, familyname AS fn FROM employees;

    ```


    你将得到以下结果：


    | gn | familyname |

    | --- | --- |

    | Judy | Free |

    | Ray | Gunn |

    | Ray | King |

    | Ivan | Inkling |

    | Drew | Blood |

    | Seymour | Sights |

    | ~ 338 rows ~ |


    你会看到 `givenname` 列成功地被别名为 `gn`，但 `familyname` 列保持未别名状态。第二个及后续的 `SELECT` 语句中的名称会被忽略，即使你不厌其烦地为它们起了别名。这个故事的寓意是，你只应该在第一个
    `SELECT` 语句上费心：


    ```sql

    SELECT givenname AS gn, familyname AS fn FROM customers

    UNION ALL

    SELECT givenname, familyname FROM employees;

    ```


    当然，如果你觉得这样更清晰，你仍然可以为额外的 `SELECT` 子句起别名。


    ## 对结果排序


    如果你尝试以下语句：


    ```sql

    --  Doomed to failure

    SELECT givenname, familyname, email FROM customers

    ORDER BY familyname, givenname

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ORDER BY familyname, givenname

    ;

    ```


    它不会工作。`UNION` 只能发生在两个**集合**之间，而集合是无序的。无论如何，这都没有意义，因为在完成组合之前就对部分结果进行排序是没有意义的。


    这样写是可行的：


    ```sql

    --  This works

    SELECT givenname, familyname, email FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ORDER BY familyname, givenname

    ;

    ```


    但这容易被误解。就像第一个 `SELECT` 不能有 `ORDER BY` 子句一样，第二个也不能，原因相同。被排序的不是单个 `SELECT` 语句，而是
    `UNION` 的结果。因此，将 `ORDER BY` 子句分开写可能有助于阐明这一点：


    ```sql

    SELECT givenname, familyname, email FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ORDER BY familyname, givenname;

    ```


    现在它按预期工作：


    | givenname | familyname | email |

    | --- | --- | --- |

    | Aiden | Abet | aiden.abet260@example.net |

    | Alf | Abet | alf.abet323@example.com |

    | Ollie | Agenous | ollie.agenous563@example.com |

    | Corey | Ander | corey.ander54@example.com |

    | Ike | Andy | ike.andy549@example.com |

    | Adam | Ant | adam.ant263@example.net |

    | ~ 338 rows ~ |


    如果你不喜欢那个空行，你总可以用注释填充它：


    ```sql

    SELECT givenname, familyname, email FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    --  Sort Results:

    ORDER BY familyname, givenname;

    ```


    无论哪种方式，请记住 `ORDER BY` 子句是用于整个 `UNION` 的，而不仅仅是其中一个 `SELECT` 语句。'
  raw: '### SELECT Clauses Must Be Compatible


    SQL doesn’t actually care what you’re combining, as long as the data is compatible.
    To begin with, there must be the same number of columns in each `SELECT` statement:


    ```

    --  This won''t work:

    SELECT givenname, familyname, email --  3 columns

    FROM customers

    UNION ALL

    SELECT givenname, familyname        --  2 columns

    FROM employees

    ;

    ```


    Second, the data types of each column *should* match:


    ```

    --  This shouldn''t work either:

    SELECT /* string: */ email, givenname, familyname

    FROM customers

    UNION ALL

    SELECT /* number: */ id, givenname, familyname

    FROM employees

    ;

    ```


    This will not work in PostgreSQL, Oracle, and MSSQL. That’s because the `email`
    is a string, while the `id` is a number, and you can’t mix data types.


    However, you will get away with it in MariaDB/MySQL, which is prepared to automatically
    cast the number as a string, and in SQLite, which doesn’t care about data types
    anyway.


    If you want to mix types properly, you should cast the types yourself:


    ```

    --  Using cast()

    SELECT email, givenname, familyname

    FROM customers

    UNION ALL

    SELECT cast(id as varchar(4)), givenname, familyname

    FROM employees

    ;

    ```


    Whether you really want the following result is, of course, another question:


    | email | givenname | familyname |

    | --- | --- | --- |

    | may.bea350@example.com | May | Bea |

    | 16 | Sylvester | Underbar |

    | pearl.divers20@example.net | Pearl | Divers |

    | tom.morrow429@example.com | Tom | Morrow |

    | grace.skies588@example.com | Grace | Skies |

    | 8 | Seymour | Something |

    | ~ 94 rows ~ |


    Where there is a real trap is that `UNION` aligns the *values* in the `SELECT`
    clause without any regard for their names or meanings. Both of the following will
    produce results:


    ```

    --  Reversed Columns

    SELECT givenname, familyname FROM customers

    UNION ALL

    SELECT familyname, givenname FROM employees

    ;

    --  Mis-aligned Columns

    SELECT email, givenname, familyname FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ;

    ```


    but the results are probably meaningless. However, this is useful if you really
    need to align columns with disparate names:


    ```

    --  Mixed Column Names

    SELECT givenname, familyname FROM customers

    UNION ALL

    SELECT firstname, lastname FROM sorting

    ;

    ```


    In this case, we know what you mean:


    | givenname | familyname |

    | --- | --- |

    | Judy | Free |

    | Ray | Gunn |

    | Ray | King |

    | Ivan | Inkling |

    | Drew | Blood |

    | Seymour | Sights |

    | ~ 312 rows ~ |


    This is often the case when you’re trying to combine data from different tables.


    ### Only Column Names from the First SELECT Statement Are Used


    If you ran the last few examples, you will have noticed that the columns all get
    their name from the *first* `SELECT` statement only. This is what makes it particularly
    confusing if you start switching around the `SELECT` columns.


    You can also alias column names in a `UNION`:


    ```

    SELECT givenname AS gn, familyname FROM customers

    UNION ALL

    SELECT givenname, familyname AS fn FROM employees;

    ```


    You’ll get the following result:


    | gn | familyname |

    | --- | --- |

    | Judy | Free |

    | Ray | Gunn |

    | Ray | King |

    | Ivan | Inkling |

    | Drew | Blood |

    | Seymour | Sights |

    | ~ 338 rows ~ |


    You will see that the `givenname` column is successfully aliased to `gn`, but
    the `familyname` column stays unaliased. The names in the second and subsequent
    `SELECT` statement are ignored, even if you went to the trouble of aliasing them.
    The moral to the story is that you should only bother with the first `SELECT`
    statement:


    ```

    SELECT givenname AS gn, familyname AS fn FROM customers

    UNION ALL

    SELECT givenname, familyname FROM employees;

    ```


    Of course, you can still alias the additional `SELECT` clauses if you think it
    makes things clearer.


    ### Sorting Results


    If you try the following statement:


    ```

    --  Doomed to failure

    SELECT givenname, familyname, email FROM customers

    ORDER BY familyname, givenname

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ORDER BY familyname, givenname

    ;

    ```


    it won’t work. A `UNION` can only occur between two **sets**, and a set is unordered.
    It wouldn’t make sense anyway, since there’s no point in sorting part of your
    results before you’ve finished.


    This will work:


    ```

    --  This works

    SELECT givenname, familyname, email FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ORDER BY familyname, givenname

    ;

    ```


    but is open to misinterpretation. In the same way that the first `SELECT` can’t
    have an `ORDER BY` clause, neither can the second, for the same reason. What is
    being sorted is not the individual `SELECT` statement, but the result of the `UNION`.
    For this reason, it may be helpful to separate the `ORDER BY` clause to make this
    clear:


    ```

    SELECT givenname, familyname, email FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ORDER BY familyname, givenname;

    ```


    This now works as expected:


    | givenname | familyname | email |

    | --- | --- | --- |

    | Aiden | Abet | aiden.abet260@example.net |

    | Alf | Abet | alf.abet323@example.com |

    | Ollie | Agenous | ollie.agenous563@example.com |

    | Corey | Ander | corey.ander54@example.com |

    | Ike | Andy | ike.andy549@example.com |

    | Adam | Ant | adam.ant263@example.net |

    | ~ 338 rows ~ |


    If you don’t like the empty line, you can always fill it in with a comment:


    ```

    SELECT givenname, familyname, email FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    --  Sort Results:

    ORDER BY familyname, givenname;

    ```


    Either way, remember that the `ORDER BY` clause is for the whole union, not just
    one of the `SELECT` statements.'
  trans: '

    # SQL UNION 操作符的兼容性与使用注意事项


    ## SELECT 子句必须兼容


    SQL 实际上并不关心你组合的是什么，只要数据是兼容的即可。首先，每个 `SELECT` 语句必须有相同数量的列：


    ```sql

    --  这样不行：

    SELECT givenname, familyname, email --  3 列

    FROM customers

    UNION ALL

    SELECT givenname, familyname        --  2 列

    FROM employees

    ;

    ```


    其次，每列的数据类型*应该*匹配：


    ```sql

    --  这样也不应该行：

    SELECT /* 字符串： */ email, givenname, familyname

    FROM customers

    UNION ALL

    SELECT /* 数字： */ id, givenname, familyname

    FROM employees

    ;

    ```


    这在 PostgreSQL、Oracle 和 MSSQL 中将无法工作。这是因为 `email` 是字符串，而 `id` 是数字，你不能混合数据类型。


    然而，在 MariaDB/MySQL 中你可能蒙混过关，因为它会自动将数字转换为字符串；在 SQLite 中也行，因为它本来就不关心数据类型。


    如果你想正确地混合类型，应该自己进行类型转换：


    ```sql

    --  使用 cast()

    SELECT email, givenname, familyname

    FROM customers

    UNION ALL

    SELECT cast(id as varchar(4)), givenname, familyname

    FROM employees

    ;

    ```


    当然，你是否真的想要下面这样的结果是另一个问题：


    | email | givenname | familyname |

    | --- | --- | --- |

    | may.bea350@example.com | May | Bea |

    | 16 | Sylvester | Underbar |

    | pearl.divers20@example.net | Pearl | Divers |

    | tom.morrow429@example.com | Tom | Morrow |

    | grace.skies588@example.com | Grace | Skies |

    | 8 | Seymour | Something |

    | ~ 94 行 ~ |


    真正的陷阱在于，`UNION` 对齐 `SELECT` 子句中的*值*时，完全不考虑它们的名称或含义。下面两个语句都会产生结果：


    ```sql

    --  列顺序颠倒

    SELECT givenname, familyname FROM customers

    UNION ALL

    SELECT familyname, givenname FROM employees

    ;

    --  列未对齐

    SELECT email, givenname, familyname FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ;

    ```


    但结果很可能毫无意义。不过，如果你确实需要对齐名称不同的列，这就很有用了：


    ```sql

    --  混合列名

    SELECT givenname, familyname FROM customers

    UNION ALL

    SELECT firstname, lastname FROM sorting

    ;

    ```


    在这种情况下，我们知道你是什么意思：


    | givenname | familyname |

    | --- | --- |

    | Judy | Free |

    | Ray | Gunn |

    | Ray | King |

    | Ivan | Inkling |

    | Drew | Blood |

    | Seymour | Sights |

    | ~ 312 行 ~ |


    当你尝试组合来自不同表的数据时，情况常常如此。


    ## 仅使用第一个 SELECT 语句的列名


    如果你运行了前面的几个例子，你会注意到所有的列名都只来自于*第一个* `SELECT` 语句。这使得在你开始切换 `SELECT` 列时，尤其令人困惑。


    你也可以在 `UNION` 中给列名起别名：


    ```sql

    SELECT givenname AS gn, familyname FROM customers

    UNION ALL

    SELECT givenname, familyname AS fn FROM employees;

    ```


    你将得到以下结果：


    | gn | familyname |

    | --- | --- |

    | Judy | Free |

    | Ray | Gunn |

    | Ray | King |

    | Ivan | Inkling |

    | Drew | Blood |

    | Seymour | Sights |

    | ~ 338 行 ~ |


    你会看到 `givenname` 列成功地被别名为 `gn`，但 `familyname` 列保持未别名状态。第二个及后续的 `SELECT` 语句中的名称会被忽略，即使你不厌其烦地为它们起了别名。这个故事的寓意是，你只应该在第一个
    `SELECT` 语句上费心：


    ```sql

    SELECT givenname AS gn, familyname AS fn FROM customers

    UNION ALL

    SELECT givenname, familyname FROM employees;

    ```


    当然，如果你觉得这样更清晰，你仍然可以为额外的 `SELECT` 子句起别名。


    ## 对结果排序


    如果你尝试以下语句：


    ```sql

    --  注定失败

    SELECT givenname, familyname, email FROM customers

    ORDER BY familyname, givenname

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ORDER BY familyname, givenname

    ;

    ```


    它不会工作。`UNION` 只能发生在两个**集合**之间，而集合是无序的。无论如何，这都没有意义，因为在完成组合之前就对部分结果进行排序是没有意义的。


    这样写是可行的：


    ```sql

    --  这样可行

    SELECT givenname, familyname, email FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ORDER BY familyname, givenname

    ;

    ```


    但这容易被误解。就像第一个 `SELECT` 不能有 `ORDER BY` 子句一样，第二个也不能，原因相同。被排序的不是单个 `SELECT` 语句，而是
    `UNION` 的结果。因此，将 `ORDER BY` 子句分开写可能有助于阐明这一点：


    ```sql

    SELECT givenname, familyname, email FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    ORDER BY familyname, givenname;

    ```


    现在它按预期工作：


    | givenname | familyname | email |

    | --- | --- | --- |

    | Aiden | Abet | aiden.abet260@example.net |

    | Alf | Abet | alf.abet323@example.com |

    | Ollie | Agenous | ollie.agenous563@example.com |

    | Corey | Ander | corey.ander54@example.com |

    | Ike | Andy | ike.andy549@example.com |

    | Adam | Ant | adam.ant263@example.net |

    | ~ 338 行 ~ |


    如果你不喜欢那个空行，你总可以用注释填充它：


    ```sql

    SELECT givenname, familyname, email FROM customers

    UNION ALL

    SELECT givenname, familyname, email FROM employees

    --  排序结果：

    ORDER BY familyname, givenname;

    ```


    无论哪种方式，请记住 `ORDER BY` 子句是用于整个 `UNION` 的，而不仅仅是其中一个 `SELECT` 语句。

