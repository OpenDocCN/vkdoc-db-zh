  raw: '#### Regular Expressions (PostgreSQL, MySQL/MariaDB, Oracle)


    Regular Expressions give you more precise control over matching individual characters.


    For example, to find family names which start with the letters `A - K`, but are
    *not* followed by `h` or `y`, you would use the pattern `^[A-K][^hy]`:


    *   The first `^` starts at the beginning of the string.


    *   `[A-K]` matches any character in the *range* from `A` to `K` inclusive.


    *   `[^hy]` does *not* (`^`) match any of the characters `h`, `y`.


    Using Regular Expressions varies between DBMSs. To match the preceding pattern:


    ```

    --  PostgreSQL

    SELECT *

    FROM customers

    WHERE familyname ~ ''^[A-K][^hy].*'';

    --  MariaDB/MySQL

    SELECT *

    FROM customers

    WHERE familyname REGEXP ''^[A-K][^hy]'';

    --  Oracle

    SELECT *

    FROM customers

    WHERE REGEXP_LIKE(familyname,''[A-K][^hy].*'');

    ```


    The results look like this:


    | id | familyname | givenname | … | registered |

    | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | 2022-06-12 |

    | 186 | Gunn | Ray | … | 2021-11-15 |

    | 144 | King | Ray | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | 2021-11-08 |

    | 475 | Blood | Drew | … | 2022-06-13 |

    | 341 | Idate | Val | … | 2022-03-03 |

    | ~ 147 rows ~ |   |   |   |   |


    Regular Expressions can get very complex and are not for the fainthearted. You’ll
    also find that they are rarely needed in day-to-day SQL.


    #### Simpler Extensions (PostgreSQL, MSSQL)


    Microsoft SQL doesn’t natively support Regular Expressions, but it offers a simpler
    variation. Using the (square) **brackets** (`[ … ]`) wildcard with the `LIKE`
    keyword, it takes the following forms:


    *   `[abcde]`: Any one of the individual characters inside brackets


    *   `[a-e]`: Any one character in the **range** from the first to the last


    *   `[^abcde]`, `[^a-e]`: Any character which does *not* match what follows


    ```

    SELECT *

    FROM customers

    WHERE familyname LIKE ''[a-k][^hy]%'';

    ```


    Note that MSSQL is normally case insensitive, and using lower case will also match
    capital letters.


    PostgreSQL does support Regular Expressions, but it also offers a simpler variation
    using `SIMILAR TO`:


    ```

    SELECT *

    FROM customers

    WHERE familyname SIMILAR TO ''[A-K][^hy]%'';

    ```


    Note that PostgreSQL is normally case sensitive, so the first character is in
    upper case, while the second is in lower case. Of course, you can use the `lower()`
    function and just use lower case.


    ### A Simple Pattern Match Example


    When all is said and done, you will get most use out of the simple `%` wildcard.
    For example, if you want to find the paintings with the word `portrait` in the
    title:


    ```

    SELECT * FROM paintings

    WHERE title LIKE ''%portrait%'';

    --  WHERE lower(title) LIKE ''%portrait%'';

    ```


    These are the candidates:


    | id | artistid | title | year | price |

    | --- | --- | --- | --- | --- |

    | 2023 | 58 | Self-Portrait | 1925 |   |

    | 1989 |   | Portrait of Trabuc | 1889 | 160.00 |

    | 2178 | 102 | Portrait of Hieronymus Holzschuher | 1526 | 145.00 |

    | 2244 | 346 | Model with Unfinished Self-Portrait | 1977 | 135.00 |

    | 815 | 108 | Portrait of a Cardinal | 1600 | 155.00 |

    | 1491 | 333 | Portrait of Sarah Swaim Chase (The Artist’s Mother) | 1892 | 190.00
    |

    | ~ 100 rows ~ |


    If you want to match *self portrait*, you will need to allow for the fact that
    sometimes there’s a space and sometimes there’s a hyphen. You can do that with
    the `_` wildcard:


    ```

    SELECT * FROM paintings

    WHERE title LIKE ''%self_portrait%'';

    --  WHERE lower(title) LIKE ''%self_portrait%''

    ```


    This narrows down the results:


    | id | artistid | title | year | price |

    | --- | --- | --- | --- | --- |

    | 2023 | 58 | Self-Portrait | 1925 |   |

    | 2244 | 346 | Model with Unfinished Self-Portrait | 1977 | 135.00 |

    | 625 |   | Self-portrait |   | 160.00 |

    | 2133 | 102 | Self-Portrait at 26 | 1498 | 115.00 |

    | 1944 | 233 | Self Portrait with black Vase | 1911 | 105.00 |

    | 1054 |   | Self-Portrait | 1889 | 150.00 |

    | ~ 35 rows ~ |


    Note that if you’re really looking for portraits, this isn’t quite enough. Some
    of the most famous portraits, such as the *Mona Lisa* and the *Girl with a Pearl
    Earring*, will slip through the search.


    To really facilitate searching for categories of paintings, you would need to
    have additional columns, and possibly additional tables, to maintain the categories.


    ## Summary


    When you have a large number of rows, you can filter them using the `WHERE` clause.
    The `WHERE` clause is followed by one or more assertions which evaluate either
    to `true` or `false`, determining whether a particular row is to be included in
    the result set.


    The syntax for the `WHERE` clause is


    ```

    SELECT columns

    FROM table

    WHERE conditions;

    ```


    The conditions are one or more assertions, expressions which evaluate to `true`
    or `false`.


    Normally, the assertions are related to column data. However, any unrelated assertion
    will also work, though you will probably get either the whole table or nothing.


    ### NULL


    `NULL` represents a missing value, so testing it is tricky.


    *   `NULL`s will *always* fail a comparison, such as `=`.


    *   Testing for `NULL` requires the special expression `IS NULL` or `IS NOT NULL`.


    ### Numbers


    Number literals are represented bare: they do not have any form of quotes.


    *   Numbers are compared in number line order and can be filtered using the basic
    comparison operators.


    *   When filtering continuous values, you need to remember to use equality comparisons
    (`<=` or `>=`) to include in-between values.


    ### Strings


    String literals are in single quotes. Some DBMSs also allow double quotes, but
    double quotes are more correctly used for names rather than values.


    *   In some DBMSs and databases, upper and lower case may not match.


    *   Trailing spaces should be ignored, but aren’t always.


    *   Nesting single quotes requires two consecutive single quotes: `''Don''''t
    do that''`.


    ### Dates


    Date literals are also in single quotes.


    *   The preferred date format is ISO 8601 (`yyyy-mm-dd`).


    *   Most DBMSs allow alternative formats, but you should avoid the `??/??/yyyy`
    format.


    *   Dates are compared in historical order.


    ### Multiple Assertions


    You can combine multiple assertions with the logical `AND` and `OR` operators.
    If you combine them, `AND` takes precedence over `OR`.


    ### The IN Operator


    The `IN` operator will match from a list. It can also be used with a subquery
    which generates a single column of values.


    ### Wildcard Matches


    Strings can be compared more loosely using wildcard patterns and the `LIKE` operator.


    *   Wildcards include special pattern characters.


    *   Some DBMSs allow you to use `LIKE` with non-string data, implicitly converting
    them to strings for comparison.


    *   Some DBMSs supplement the standard wildcard characters with additional characters.


    *   Some DBMSs support Regular Expressions, which are more sophisticated than
    regular wildcard pattern matching.


    ## Coming Up


    The result sets so far have been unordered. From a data point of view, that’s
    fine, and SQL will regard two result sets as the same if their only difference
    is row order.


    Occasionally, however, you will want to specify the result order, which is what
    we’ll be doing in the next chapter.


    Footnotes [1](#601766_1_En_3_Chapter.xhtml#Fn1_source)   [2](#601766_1_En_3_Chapter.xhtml#Fn2_source)'
  trans: '#### 正则表达式（PostgreSQL、MySQL/MariaDB、Oracle）


    正则表达式让你能更精确地控制对单个字符的匹配。


    例如，要查找以字母 `A - K` 开头，但*不*以 `h` 或 `y` 结尾的姓氏，你会使用模式 `^[A-K][^hy]`：


    *   第一个 `^` 表示从字符串的开头开始匹配。

    *   `[A-K]` 匹配从 `A` 到 `K`（包含）这个`范围`内的任意字符。

    *   `[^hy]` 表示*不*（`^`）匹配字符 `h` 或 `y`。


    在不同数据库管理系统中使用正则表达式的方式有所不同。要匹配前面的模式：


    ```sql

    --  PostgreSQL

    SELECT *

    FROM customers

    WHERE familyname ~ ''^[A-K][^hy].*'';

    --  MariaDB/MySQL

    SELECT *

    FROM customers

    WHERE familyname REGEXP ''^[A-K][^hy]'';

    --  Oracle

    SELECT *

    FROM customers

    WHERE REGEXP_LIKE(familyname,''[A-K][^hy].*'');

    ```


    结果如下所示：


    | id | familyname | givenname | … | registered |

    | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | 2022-06-12 |

    | 186 | Gunn | Ray | … | 2021-11-15 |

    | 144 | King | Ray | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | 2021-11-08 |

    | 475 | Blood | Drew | … | 2022-06-13 |

    | 341 | Idate | Val | … | 2022-03-03 |

    | ~ 147 行 ~ |   |   |   |   |


    正则表达式可能变得非常复杂，不适合胆小的人尝试。你还会发现，在日常的 SQL 中很少需要用到它们。


    #### 更简单的扩展（PostgreSQL， MSSQL）


    Microsoft SQL 本身不支持正则表达式，但它提供了一个更简单的变体。使用（方）`括号`（`[ … ]`）通配符与 `LIKE` 关键字结合，有以下形式：


    *   `[abcde]`：括号内任意单个字符。

    *   `[a-e]`：从第一个到最后一个字符`范围`内的任意单个字符。

    *   `[^abcde]`, `[^a-e]`：任意*不*匹配后面所跟内容的字符。


    ```sql

    SELECT *

    FROM customers

    WHERE familyname LIKE ''[a-k][^hy]%'';

    ```


    请注意，MSSQL 通常不区分大小写，使用小写字母也会匹配大写字母。


    PostgreSQL 确实支持正则表达式，但它也提供了一个使用 `SIMILAR TO` 的更简单变体：


    ```sql

    SELECT *

    FROM customers

    WHERE familyname SIMILAR TO ''[A-K][^hy]%'';

    ```


    请注意，PostgreSQL 通常区分大小写，所以第一个字符是大写，而第二个字符是小写。当然，你可以使用 `lower()` 函数并全部使用小写。


    ### 一个简单的模式匹配示例


    归根结底，你会发现最常用的是简单的 `%` 通配符。例如，如果你想查找标题中包含 `portrait`（肖像）这个词的画作：


    ```sql

    SELECT * FROM paintings

    WHERE title LIKE ''%portrait%'';

    --  WHERE lower(title) LIKE ''%portrait%'';

    ```


    这些是符合条件的候选记录：


    | id | artistid | title | year | price |

    | --- | --- | --- | --- | --- |

    | 2023 | 58 | Self-Portrait | 1925 |   |

    | 1989 |   | Portrait of Trabuc | 1889 | 160.00 |

    | 2178 | 102 | Portrait of Hieronymus Holzschuher | 1526 | 145.00 |

    | 2244 | 346 | Model with Unfinished Self-Portrait | 1977 | 135.00 |

    | 815 | 108 | Portrait of a Cardinal | 1600 | 155.00 |

    | 1491 | 333 | Portrait of Sarah Swaim Chase (The Artist’s Mother) | 1892 | 190.00
    |

    | ~ 100 行 ~ |


    如果你想匹配 *self portrait*（自画像），你需要考虑到有时中间有空格，有时有连字符。你可以使用 `_` 通配符来实现这一点：


    ```sql

    SELECT * FROM paintings

    WHERE title LIKE ''%self_portrait%'';

    --  WHERE lower(title) LIKE ''%self_portrait%''

    ```


    这缩小了结果范围：


    | id | artistid | title | year | price |

    | --- | --- | --- | --- | --- |

    | 2023 | 58 | Self-Portrait | 1925 |   |

    | 2244 | 346 | Model with Unfinished Self-Portrait | 1977 | 135.00 |

    | 625 |   | Self-portrait |   | 160.00 |

    | 2133 | 102 | Self-Portrait at 26 | 1498 | 115.00 |

    | 1944 | 233 | Self Portrait with black Vase | 1911 | 105.00 |

    | 1054 |   | Self-Portrait | 1889 | 150.00 |

    | ~ 35 行 ~ |


    请注意，如果你真的在寻找肖像画，这还不够。一些最著名的肖像画，如 *蒙娜丽莎* 和 *戴珍珠耳环的少女*，会漏过这个搜索。


    为了真正方便地搜索画作类别，你需要有额外的列，甚至可能需要额外的表来维护类别。


    ## 总结


    当你有大量的行时，可以使用 `WHERE` 子句进行过滤。`WHERE` 子句后面跟一个或多个断言，这些断言的求值结果要么是 `true`（真）要么是 `false`（假），这决定了某一行是否包含在结果集中。


    `WHERE` 子句的语法是：


    ```sql

    SELECT columns

    FROM table

    WHERE conditions;

    ```


    条件是一个或多个断言，即求值结果为 `true` 或 `false` 的表达式。


    通常，断言与列数据相关。然而，任何不相关的断言也有效，尽管你可能会得到整张表或者什么也得不到。


    ### `NULL`


    `NULL` 代表一个缺失的值，因此测试它比较棘手。


    *   `NULL` *总是* 无法通过比较测试，例如 `=`。

    *   测试 `NULL` 需要使用特殊表达式 `IS NULL` 或 `IS NOT NULL`。


    ### 数字


    数字字面量以裸写方式表示：它们没有任何形式的引号。


    *   数字按照数轴顺序进行比较，可以使用基本的比较运算符进行过滤。

    *   过滤连续值时，需要记得使用相等比较（`<=` 或 `>=`）来包含中间值。


    ### 字符串


    字符串字面量用单引号括起来。一些数据库管理系统也允许使用双引号，但双引号更正确地应用于名称而非值。


    *   在一些数据库管理系统和数据库中，大小写可能不匹配。

    *   尾部空格应该被忽略，但并非总是如此。

    *   嵌套单引号需要两个连续的单引号：`''Don''''t do that''`。


    ### 日期


    日期字面量也用单引号括起来。


    *   首选日期格式是 ISO 8601 (`yyyy-mm-dd`)。

    *   大多数数据库管理系统允许替代格式，但你应该避免 `??/??/yyyy` 格式。

    *   日期按照历史顺序比较。


    ### 多个断言


    你可以使用逻辑 `AND` 和 `OR` 运算符组合多个断言。如果组合使用，`AND` 的优先级高于 `OR`。


    ### `IN` 运算符


    `IN` 运算符用于匹配一个列表中的值。它也可以与生成单个值列的子查询一起使用。


    ### 通配符匹配


    可以使用通配符模式和 `LIKE` 运算符进行更宽松的字符串比较。


    *   通配符包括特殊的模式字符。

    *   一些数据库管理系统允许你将 `LIKE` 用于非字符串数据，隐式地将它们转换为字符串进行比较。

    *   一些数据库管理系统用额外的字符补充了标准的通配符。

    *   一些数据库管理系统支持正则表达式，这比常规的通配符模式匹配更复杂。


    ## 即将介绍


    到目前为止，结果集都是无序的。从数据的角度来看，这没问题，SQL 会认为两个结果集如果仅仅是行序不同，那么它们就是相同的。


    然而，偶尔你会希望指定结果的顺序，这就是我们下一章要做的事情。


    脚注 1   2'
- fmt: '# 4. Ordering Results


    A Relational Database is based on a number of mathematical principles, including
    the notion that a table is a `set` of rows. Two important properties of mathematical
    sets are


    *   A set has no duplicates.

    *   A set is not ordered.


    We will discuss the question of duplicates later, but for now let’s have a look
    at row order.


    SQL does not specify how data is to be stored, as that is a matter for the DBMS
    software. Neither does it specify in what order data should be fetched.


    However, you do have the option to specify a row order using the `ORDER BY` clause.


    Note that once you specify a row order, the result is no longer technically a
    set. Often, this doesn’t matter, but there will be times when you won’t be able
    to use the result in more complex SQL statements.


    In this chapter, we will look at sorting the results of a `SELECT` statement.
    We’ll see how data is sorted depending on the data type. We’ll also look at sorting
    on one or more columns, controlling the direction of the sort order, and sorting
    on derived or calculated data.


    We’ll also look at using sorting to generate pages of results, fetching random
    data, and performing non-standard sort orders.


    ## Using the ORDER BY Clause


    You can order the result set by using `ORDER BY` at the end of the `SELECT` statement:


    ```sql

    SELECT *

    FROM customers

    ORDER BY id;

    ```


    The `ORDER BY` is followed by one or more columns to be sorted.


    | id | familyname | givenname | … |

    | --- | --- | --- | --- |

    | 2 | Wreath | Laurel | … |

    | 8 | Leaves | Russell | … |

    | 9 | Downe | Ida | … |

    | 10 | Fied | Terry | … |

    | 11 | Onair | Deb | … |

    | 15 | Second | Millie | … |

    | ~ 304 rows ~ |


    Note


    *   `ORDER BY` is the `last` main clause in the `SELECT` statement.

    *   `ORDER BY` is also evaluated last.


    Later, you will limit the number of results, using another clause which can be
    considered part of the `ORDER BY` clause.


    The `ORDER BY` clause is independent of the `SELECT` clause, so you don’t have
    to select the data you are sorting by:


    ```sql

    SELECT givenname, familyname

    FROM customers

    ORDER BY id;

    ```


    This gives the following, slightly mystifying results:


    | familyname | givenname |

    | --- | --- |

    | Wreath | Laurel |

    | Leaves | Russell |

    | Downe | Ida |

    | Fied | Terry |

    | Onair | Deb |

    | Second | Millie |

    | ~ 304 rows ~ |   |


    If a particular order is important for ordering, it is likely that you want to
    include it:


    ```sql

    SELECT

    id, --  include sorted column

    givenname, familyname

    FROM customers

    ORDER BY id;

    ```


    Later, you will see that the sort columns don’t need to be original columns: they
    can also be calculated values.


    ### Sort Direction


    By default, sort order is `ascending`, that is, increasing. You can make the point
    by including the `ASC` keyword:


    ```sql

    SELECT *

    FROM customers

    ORDER BY id ASC;                        --  ASC is redundant

    ```


    However, since the default direction is ascending anyway, the `ASC` keyword is
    redundant, and most SQL developers don’t bother with it.


    On the other hand, you can reverse the sort order by appending `DESC` (descending):


    ```sql

    SELECT *

    FROM customers

    ORDER BY id DESC;

    ```


    This gives the customers in the reverse sort order:


    | id | familyname | givenname | … |

    | --- | --- | --- | --- |

    | 595 | Time | Mark | … |

    | 594 | Mander | Sally | … |

    | 592 | Highwater | Camilla | … |

    | 589 | O’Shea | Rick | … |

    | 588 | Skies | Grace | … |

    | 583 | Knife | Jack | … |

    | ~ 304 rows ~ |   |   |   |


    You will see more on sort direction later.


    ## Missing Data (NULL)


    Some of your data may include `NULL`s in some columns. This represents a missing
    value.


    The SQL standard is vague about how `NULL`s should be treated by `ORDER BY`; the
    only requirement is that they should be grouped together, either at the beginning
    or at the end.


    ```sql

    SELECT *

    FROM customers

    ORDER BY height;

    ```


    Because there are many `NULL`s in the height column, you will see them bunched
    either at the beginning or the end of the data.


    | id | familyname | givenname | … | height | … |

    | --- | --- | --- | --- | --- | --- |

    | 517 | Open | Doris | … | 150.3 | … |

    | 42 | Worry | Donna | … | 150.3 | … |

    | 154 | Pan | Sam | … | 154.2 | … |

    | 551 | Rowe | Mike | … | 155.6 | … |

    | 216 | Driver | Laurie | … | 156.3 | … |

    | 330 | Fied | Clara | … | 156.6 | … |

    | ~ 304 rows ~ |


    Different DBMSs have different ideas on where to group the `NULL`s. For example:


    | DBMS | NULLS |

    | --- | --- |

    | SQLite | Low |

    | MSSQL | Low |

    | MySQL/MariaDB | Low |

    | PostgreSQL | High |

    | Oracle | High |


    PostgreSQL and Oracle group `NULL`s with the highest values, while MySQL/MariaDB,
    SQLite, and Microsoft SQL group them with the lowest values.


    If you reverse the sort direction:


    ```sql

    SELECT *

    FROM customers

    ORDER BY height DESC;

    ```


    you will see the `NULL`s at the other end:


    | id | familyname | givenname | … | height | … |

    | --- | --- | --- | --- | --- | --- |

    | 95 | Banks | Bonnie | … |   | … |

    | 377 | Money | Xavier | … |   | … |

    | 321 | King | May | … |   | … |

    | 46 | Ering | Hank | … |   | … |

    | 350 | Bea | May | … |   | … |

    | 500 | Mentary | Rudi | … |   | … |

    | ~ 304 rows ~ |


    With some DBMS, you can overrule their default placement using the `NULLS FIRST|LAST`
    clause:


    ```sql

    --  PostgreSQL, Oracle & SQLite:

    SELECT *

    FROM customers

    ORDER BY height NULLS FIRST;    --  or NULLS LAST

    ```


    This is available for PostgreSQL, Oracle, and SQLite.


    For the others, where this is not an option, you can fake the option with coalesce:


    ```sql

    --  Pseudo NULLS FIRST

    SELECT *

    FROM customers

    ORDER BY coalesce(height,0);

    --  Pseudo NULLS LAST

    SELECT *

    FROM customers

    ORDER BY coalesce(height,1000);

    ```


    The `coalesce()` function replaces `NULL` with an alternative value. If you use
    an exaggerated value, it will place them either at the beginning or at the end.
    You will see more on `coalesce()` later.'
