- fmt: '# SQL中的字符串与日期处理


    ## 尾部空格


    如果您在搜索字符串的**末尾**添加一个空格：


    ```sql

    SELECT *

    FROM customers

    WHERE state=''VIC ''; -- 末尾有额外空格

    ```


    根据数据库管理系统（DBMS）的不同，您**可能**会得到一些结果：


    *   MySQL/MariaDB 以及 MSSQL 会修剪尾部空格，因此您将获得所有匹配 `VIC` 的结果。

    *   PostgreSQL、SQLite 和 Oracle **不会**修剪空格，因此将没有匹配项。


    相反，如果您在开头添加额外的空格：


    ```sql

    SELECT *

    FROM customers

    WHERE state='' VIC''; -- 开头有额外空格

    ```


    您将得不到匹配项。


    尽管 SQL 通常只接受字符串的精确匹配，但 SQL 标准要求在比较较短的字符串与较长的字符串之前，用空格对较短的字符串进行右填充。因此，如果您尝试匹配末尾带有额外空格的字符串，数据也会被右填充，从而得到一个匹配项。这不适用于左填充或任何其他字符。


    在流行的 DBMS 中，只有 MySQL/MariaDB 和 MSSQL 似乎遵循此标准。


    ## 使用字符串函数过滤


    您已经看到，根据 DBMS 的不同，您可能需要在 `WHERE` 子句中使用 `lower()` 函数。


    您可以在 `WHERE` 子句中使用任何您喜欢的函数。例如，要选择较短的名字，您可以使用 `length()` 函数：


    ```sql

    -- PostgreSQL, MySQL/MariaDB, SQLite, Oracle

    SELECT *

    FROM customers

    WHERE length(familyname)<5;

    -- MSSQL

    SELECT *

    FROM customers

    WHERE len(familyname)<5;

    ```


    这将给出较短的姓名：


    | id | familyname | givenname | … | registered |

    | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | 2022-06-12 |

    | 186 | Gunn | Ray | … | 2021-11-15 |

    | 144 | King | Ray | … | 2021-10-18 |

    | 351 | Tate | Dick | … | 2022-03-13 |

    | 422 | Why | Wanda | … | 2022-05-05 |

    | 191 | Moss | Pete | … | 2021-11-19 |

    | ~ 135 rows ~ |   |   |   |   |


    也有用于提取字符串部分的字符串函数，但如果您是为了比较值而这样做，稍后使用通配符可能会获得更多收益。


    如果字符串的长度重要到需要过滤，那么它可能也重要到需要选择：


    | id | email | familyname | givenname |

    | --- | --- | --- | --- |

    | 474 | judy.free474@example.net | Free | Judy |

    | 186 | ray.gunn186@example.net | Gunn | Ray |

    | 144 | ray.king144@example.net | King | Ray |

    | 351 | dick.tate351@example.com | Tate | Dick |

    | 422 | wanda.why422@example.com | Why | Wanda |

    | 191 | pete.moss191@example.com | Moss | Pete |

    | ~ 135 rows ~ |


    ```sql

    -- PostgreSQL, MySQL/MariaDB, SQLite, Oracle

    SELECT *, length(familyname) AS size

    FROM customers

    WHERE length(familyname)<5;

    -- MSSQL

    SELECT *, len(familyname)<5 AS size

    FROM customers

    WHERE len(familyname)<5;

    ```


    请记住，`SELECT` 子句是在 `WHERE` 子句**之后**计算的，这意味着您不能在 `WHERE` 子句中使用计算出的别名：


    ```sql

    -- PostgreSQL, MySQL/MariaDB, SQLite, Oracle

    SELECT *, length(familyname) AS size

    FROM customers

    WHERE size<5;   -- 错误

    -- MSSQL

    SELECT *, len(familyname)<5 AS size

    FROM customers

    WHERE size<5;   -- 错误

    ```


    您将在后面的章节中看到更多关于计算和函数的内容。


    ## 处理引号与撇号


    您的字符串数据可能包含单引号，尤其是用作撇号时。例如，您的姓氏可能是 `O''Shea`，或者您的家乡可能是 `''s-Gravenhage`（海牙的正式名称）。


    如果您尝试在正常的单引号字符串中输入它们，将会遇到问题：


    ```sql

    -- 这是错误的：

    SELECT *

    FROM customers

    WHERE familyname = ''O''Shea''

    OR town=''''s-Gravenhage'';

    ```


    字符串中的单引号会提前结束字符串，从而导致语句的其余部分变得混乱。


    如果需要包含单引号，您需要输入单引号**两次**（这**不**等同于双引号）：


    ```sql

    -- 字符串内的 '''' 被解释为 ''

    -- '''' 不等同于 "

    SELECT *

    FROM customers

    WHERE familyname = ''O''''Shea'' OR town=''''''s-Gravenhage'';

    ```


    更好的做法是，您的数据应该使用印刷体撇号：


    ```sql

    -- 使用''印刷体''引号：

    SELECT *

    FROM customers

    WHERE familyname = ''O''Shay'' OR town=''''s-Gravenhage'';

    ```


    您可以通过以下方式输入印刷体撇号：


    *   在 Macintosh 上按 Shift+Option+]

    *   在 Windows 上按 Alt+0146


    当然，这只有在数据最初是以这种方式输入的情况下才有效，不幸的是，这种情况并不常见。


    ## 字符串的前后比较


    其他比较运算符也适用于字符串，但您应该从它们在字母顺序中的位置来考虑，如表 [3-2](#601766_1_En_3_Chapter.xhtml#Tab2)
    所示。


    表 3-2

    字符串比较运算符


    | 运算符 | 含义 |

    | --- | --- |

    | a < b | a 在 b **之前** |

    | a <= b | a **直到** b |

    | a > b | a 在 b **之后** |

    | a >= | a **自** b 起 |


    例如：


    | id | familyname | givenname | email | … | registered |

    | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | judy.free474@example.net | … | 2022-06-12 |

    | 186 | Gunn | Ray | ray.gunn186@example.net | … | 2021-11-15 |

    | 179 | Inkling | Ivan | ivan.inkling179@example.com | … | 2021-11-08 |

    | 475 | Blood | Drew | drew.blood475@example.net | … | 2022-06-13 |

    | 341 | Idate | Val | val.idate341@example.com | … | 2022-03-03 |

    | 234 | Ering | Nat | nat.ering234@example.net | … | 2021-12-15 |

    | ~ 137 rows ~ |


    ```sql

    -- K 之前的姓名

    SELECT *

    FROM customers

    WHERE familyname<''K'';

    ```


    您不会经常看到这种比较。稍后当我们查看通配符时，会看到一种更灵活的过滤这些字符串的方法。


    ## 日期


    日期看起来足够简单，但可能导致混淆和困难。首先，术语“日期”可能包含也可能不包含时间。


    广义上讲，时间是历史中的一个点，从过去的某个任意起点开始测量。为了方便，时间被分组为秒、分钟、小时和天。之后发生的事情就变得更复杂了。


    您可以使用如下语句找到具有特定出生日期的所有客户：


    ```sql

    SELECT *

    FROM customers

    WHERE dob=''1989-11-09'';

    ```


    这将给出与出生日期匹配的客户：


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 320 | Branch | Olive | … | 1989-11-09 | … | 2022-02-10 |

    | 568 | Peace | Warren | … | 1989-11-09 | … | 2022-08-08 |

    | ~ 2 rows ~ |


    您可能会找到两到三个匹配项。


    Oracle 默认使用不同的日期格式，可能无法自动解释前面的格式。您可能需要使用表达式 `date ''1989-11-09''`。


    如您所知，在 SQL 中，您用单引号将字符串括起来。您**也**用单引号将日期括起来。然而，日期**不是**字符串。^([⁵](#fn5))


    如果您在 Oracle 中尝试此操作，可能会发现 Oracle 不喜欢这种日期格式。默认情况下，Oracle 更喜欢 `09 NOV 89` 这样的默认格式。


    但是，您可以使用 `date` 前缀强制 Oracle 识别前面的格式：


    ```sql

    -- Oracle

    SELECT *

    FROM customers

    WHERE dob = date ''1989-11-09'';

    ```


    稍后您将看到日期字面量的其他一些变体。


    ### 日期不是字符串


    尽管日期字面量用单引号书写，但它们不是字符串。当您尝试添加额外的空格时，您可以立即看到这一点：


    ```sql

    SELECT *

    FROM customers

    WHERE dob='' 1989-11-09 '';

    ```


    字符串匹配在这里会失败，但日期仍然匹配。您也可以在下一节关于日期格式的内容中看到这一点。'
  raw: '### Trailing Spaces


    If you add a space to the *end* of a search string:


    ```

    SELECT *

    FROM customers

    WHERE state=''VIC ''; --  additional space at the end

    ```


    you *may* get some results, depending on the DBMS:


    *   MySQL/MariaDB as well as MSSQL will trim the trailing space, so you will get
    all the matches for `VIC`.


    *   PostgreSQL, SQLite, and Oracle will *not* trim the space, so there will be
    no matches.


    If, on the other hand, you put the extra space at the beginning:


    ```

    SELECT *

    FROM customers

    WHERE state='' VIC''; --  additional space at the beginning

    ```


    you would get no matches.


    Although SQL would normally only accept exact matches for strings, the SQL standard
    requires that shorter strings are right-padded with spaces before comparing with
    longer strings. So, if you are trying to match a string with extra spaces at the
    end, the data will also be right-padded, and you will get a match. This doesn’t
    apply to left padding or any other characters.


    Of the popular DBMSs, only MySQL/MariaDB and MSSQL appear to follow this standard.


    ### Filtering with String Functions


    You have already seen that, depending on the DBMS, you may need to use the `lower()`
    function in the `WHERE` clause.


    You can use any function you like in the `WHERE` clause. For example, to select
    for shorter family names, you could use the `length()` function:


    ```

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle

    SELECT *

    FROM customers

    WHERE length(familyname)<5;

    --  MSSQL

    SELECT *

    FROM customers

    WHERE len(familyname)<5;

    ```


    This will give you the shorter names:


    | id | familyname | givenname | … | registered |

    | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | 2022-06-12 |

    | 186 | Gunn | Ray | … | 2021-11-15 |

    | 144 | King | Ray | … | 2021-10-18 |

    | 351 | Tate | Dick | … | 2022-03-13 |

    | 422 | Why | Wanda | … | 2022-05-05 |

    | 191 | Moss | Pete | … | 2021-11-19 |

    | ~ 135 rows ~ |   |   |   |   |


    There are also string functions for extracting parts of a string, but if you are
    doing this to compare values, you will probably get more out of wildcards later.


    If the length of a string is important enough to filter, then it’s possibly also
    important enough to select:


    | id | email | familyname | givenname |

    | --- | --- | --- | --- |

    | 474 | judy.free474@example.net | Free | Judy |

    | 186 | ray.gunn186@example.net | Gunn | Ray |

    | 144 | ray.king144@example.net | King | Ray |

    | 351 | dick.tate351@example.com | Tate | Dick |

    | 422 | wanda.why422@example.com | Why | Wanda |

    | 191 | pete.moss191@example.com | Moss | Pete |

    | ~ 135 rows ~ |


    ```

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle

    SELECT *, length(familyname) AS size

    FROM customers

    WHERE length(familyname)<5;

    --  MSSQL

    SELECT *, len(familyname)<5 AS size

    FROM customers

    WHERE len(familyname)<5;

    ```


    Remember that the `SELECT` clause is evaluated *after* the `WHERE` clause, which
    means that you can’t use the calculated alias in the `WHERE` clause:


    ```

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle

    SELECT *, length(familyname) AS size

    FROM customers

    WHERE size<5;   --  Error

    --  MSSQL

    SELECT *, len(familyname)<5 AS size

    FROM customers

    WHERE size<5;   --  Error

    ```


    You’ll see more on calculations and functions in a later chapter.


    ### Handling Quotes and Apostrophes


    It is possible that your string data contain single quotes, especially when used
    as apostrophes. For example, your family name might be `O''Shea`, or your hometown
    may be `''s-Gravenhage` (the formal name of The Hague).


    If you try to enter them in a normal single-quoted string, you will run into problems:


    ```

    --  This is broken:

    SELECT *

    FROM customers

    WHERE familyname = ''O''Shea''

    OR town=''''s-Gravenhage'';

    ```


    The single quote in the string will prematurely end the string, which makes a
    mess of the rest of the statement.


    If you need to include single quotes, you need to enter the single quote *twice*
    (which is *not* the same as a double quote):


    ```

    --  '''' inside a string is interpreted as ''

    --  '''' is NOT the same as "

    SELECT *

    FROM customers

    WHERE familyname = ''O''''Shea'' OR town=''''''s-Gravenhage'';

    ```


    Better still, your data should use typographic apostrophes:


    ```

    --  Uses ''Typographic'' quotes:

    SELECT *

    FROM customers

    WHERE familyname = ''O''Shay'' OR town=''''s-Gravenhage'';

    ```


    You can enter the typographic apostrophe by entering


    *   Shift+Option+] on the Macintosh


    *   Alt+0146 on Windows


    Of course, that will only work if the data was originally entered that way, which,
    unfortunately, is not very often.


    ### Before and After Strings


    The other comparison operators also work with strings, but you should think of
    them in terms of their position in alphabetical order, as in Table [3-2](#601766_1_En_3_Chapter.xhtml#Tab2).


    Table 3-2


    String Comparison Operators


    | Operator | Meaning |

    | --- | --- |

    | a < b | a is **Before** b |

    | a <= b | a is **Up To** b |

    | a > b | a is **After** b |

    | a >= b | as is **From** b |


    For example:


    | id | familyname | givenname | email | … | registered |

    | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | judy.free474@example.net | … | 2022-06-12 |

    | 186 | Gunn | Ray | ray.gunn186@example.net | … | 2021-11-15 |

    | 179 | Inkling | Ivan | ivan.inkling179@example.com | … | 2021-11-08 |

    | 475 | Blood | Drew | drew.blood475@example.net | … | 2022-06-13 |

    | 341 | Idate | Val | val.idate341@example.com | … | 2022-03-03 |

    | 234 | Ering | Nat | nat.ering234@example.net | … | 2021-12-15 |

    | ~ 137 rows ~ |


    ```

    --  Names before K

    SELECT *

    FROM customers

    WHERE familyname<''K'';

    ```


    You won’t see this sort of comparison very often. When we look at wildcards later,
    we’ll see a more flexible way of filtering these strings.


    ## Dates


    Dates look simple enough, but can lead to confusion and difficulty. To begin with,
    the term “date” may or may not include time.


    Broadly speaking, time is a point in history, measured from some arbitrary beginning
    in the past. For convenience, time is grouped into seconds, minutes, hours, and
    days. What happens after that gets more complicated.


    You can find all the customers with a particular date of birth with a statement
    like this:


    ```

    SELECT *

    FROM customers

    WHERE dob=''1989-11-09'';

    ```


    This will give you customers who match the date of birth:


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 320 | Branch | Olive | … | 1989-11-09 | … | 2022-02-10 |

    | 568 | Peace | Warren | … | 1989-11-09 | … | 2022-08-08 |

    | ~ 2 rows ~ |


    You will probably find two or three matches.


    Oracle, by default, uses a different date format and may not automatically interpret
    the preceding format. You may need to use the expression `date ''1989-11-09''`
    instead.


    As you know, in SQL you enclose strings in single quotes. You *also* enclose dates
    in single quotes. However, a date is *not* a string.^([⁵](#fn5))


    If you’re trying this in Oracle, you may find that Oracle doesn’t like this date
    format. By default, Oracle prefers a default format like `09 NOV 89`.


    You can, however, force Oracle to recognize the preceding format using the `date`
    prefix:


    ```

    --  Oracle

    SELECT *

    FROM customers

    WHERE dob = date ''1989-11-09'';

    ```


    You’ll see some other variations on date literals later.


    ### Dates Are Not Strings


    Even though date literals are written in single quotes, they are not strings.
    You can see this instantly when you experiment with extra spaces:


    ```

    SELECT *

    FROM customers

    WHERE dob='' 1989-11-09 '';

    ```


    A string match would fail here, but the date still matches. You can also see this
    in the next section on date formats.'
