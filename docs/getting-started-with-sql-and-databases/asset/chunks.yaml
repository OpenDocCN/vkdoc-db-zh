  trans: '# 汇总字符串


    这里有一个最终的例子。在讨论连接（JOIN）时，我们研究了如何连接多个表来获取客户最喜爱的艺术家：


    ```sql

    SELECT DISTINCT

    c.id,

    c.givenname, c.familyname,

    s.id AS sid,

    a.givenname||'' ''||a.familyname AS artist

    FROM

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    JOIN artists AS a ON p.artistid=a.id

    ORDER BY c.familyname, c.givenname;

    ```


    （请记住，MSSQL 使用`+`进行连接，Oracle 不喜欢表别名使用`AS`，下面的例子也是如此。）


    | id | givenname | familyname | sid | artist |

    | --- | --- | --- | --- | --- |

    | 260 | Aiden | Abet | 818 | Auguste Rodin |

    | 260 | Aiden | Abet | 818 | Paul Cézanne |

    | 260 | Aiden | Abet | 818 | Rembrandt van Rijn |

    | 260 | Aiden | Abet | 902 | Pierre-Auguste Renoir |

    | 260 | Aiden | Abet | 902 | Rembrandt van Rijn |

    | 260 | Aiden | Abet | 1006 | Jean-Antoine Watteau |

    | ~ 5997 rows ~ |


    问题在于你仍然会得到一长串单独的客户/艺术家组合。如果能将所有艺术家合并成一个字符串，就不会那么令人不知所措了。


    不同的数据库管理系统（DBMS）对用于合并字符串的聚合函数有不同的名称（而且较旧版本的 MSSQL 根本没有这样的函数，只有一个*非常*复杂的解决方法）。


    | DBMS | 函数 |

    | --- | --- |

    | PostgreSQL | `string_agg(data, separator)` |

    | Oracle | `listagg(data, separator)` |

    | MySQL/MariaDB | `group_concat(data SEPARATOR separator)` |

    | SQLite | `group_concat(data, separator)` |

    | MSSQL | `string_agg(data, separator)` |


    现在，我们可以将前面的查询用作公共表表达式（CTE），并利用它为每个客户生成一个艺术家列表：


    ```sql

    WITH cte AS (

    SELECT DISTINCT

    c.id,

    c.givenname, c.familyname,

    s.id AS sid,

    a.givenname||'' ''||a.familyname AS artist

    FROM    --  Oracle: 省略表别名的 AS：

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    JOIN artists AS a ON p.artistid=a.id

    )

    --  PostgreSQL, MSSQL:

    SELECT

    id, givenname, familyname, string_agg(artist, '', '')

    --  Oracle:

    --  SELECT id, givenname, familyname, listagg(artist, '', '')

    --  MySQL / MariaDB:

    --  SELECT

    --      id, familyname, givenname,

    --      group_concat(artist SEPARATOR '', '')

    --  SQLite:

    --  SELECT

    --      id, givenname, familyname, group_concat(artist, '', '')

    FROM cte

    GROUP BY id, givenname, familyname

    ORDER BY familyname, givenname, id;

    ```


    这将给我们一个客户及其所有艺术家的列表：


    | id | givenname | familyname | truncate |

    | --- | --- | --- | --- |

    | 260 | Aiden | Abet | Piero della Francesca, Sandro Bottic … |

    | 323 | Alf | Abet | James Abbott McNeill Whistler, Jacop … |

    | 563 | Ollie | Agenous | Claude Monet, Kasimir Malevich, Henr … |

    | 54 | Corey | Ander | Juan Gris, Amedeo Modigliani, Berthe … |

    | 549 | Ike | Andy | Ando Hiroshige, Jackson Pollock, Rem … |

    | 263 | Adam | Ant | Kasimir Malevich, Joseph Mallord Wil … |

    | ~ 256 rows ~ |


    从结果中你可以看到，合并后的字符串可能会变得非常长。在实际应用中，如果你希望结果实用，就需要确保它不会变得太长。


    ## 使用 HAVING 过滤分组结果


    之前，你获取了每位客户的销售额和销售数量。然后你可能希望将结果限制在总额或数量较高的范围内。要做到这一点，你需要使用 `HAVING` 子句。


    例如，要仅显示消费金额更多的客户，你可以根据 `sum(total)` 值进行筛选：


    ```sql

    SELECT customerid, sum(total) AS total, count(*) AS countrows

    FROM sales

    GROUP BY customerid

    HAVING sum(total)>10000

    --  SELECT

    ORDER BY customerid;

    ```


    我们现在得到了一个过滤后的汇总结果：


    | customerid | total | countrows |

    | --- | --- | --- |

    | 2 | 14920 | 24 |

    | 9 | 10645 | 19 |

    | 11 | 16460 | 29 |

    | 19 | 16530 | 23 |

    | 20 | 12145 | 17 |

    | 24 | 16565 | 28 |

    | ~ 42 rows ~ |


    `HAVING` 子句的作用与 `WHERE` 子句类似，区别在于它过滤的是汇总结果，而不是原始表数据。^⁹ 注意，它位于 `GROUP BY` 子句之后，而
    `GROUP BY` 子句执行实际的汇总操作。


    此外，请注意 `HAVING` 子句仍在 `SELECT` 子句之前处理，因此如果你试图根据前面的计算列进行筛选，是无法实现的。这给出了如图 7-1 所示的子句顺序。


    ![](img/601766_1_En_7_Fig1_HTML.jpg)


    一张表格，展示了带有 GROUP BY 和 HAVING 函数的子句的书写顺序和处理顺序。


    图 7-1 带有 GROUP BY 和 HAVING 的子句顺序


    当然，如果需要，你也可以同时使用 `WHERE` 和 `HAVING` 子句，在汇总前后对数据进行筛选。


    例如，假设你对最近一个月内总销售额较大的客户感兴趣。为此，你将需要两个筛选条件：


    *   最近的销售：通过筛选 `sales.ordered` 减去一个月来实现。

    *   较大的总额：通过在汇总中筛选 `sum(total)` 来实现。


    这给出如下查询：


    ```sql

    --  PostgreSQL, MySQL/MariaDB

    SELECT customerid, sum(total) AS total

    FROM sales

    WHERE ordered>current_timestamp - INTERVAL ''1'' MONTH

    GROUP BY customerid

    HAVING sum(total)>2000

    --  SELECT

    ORDER BY customerid;

    ```


    这应该会得到类似以下的结果：


    | customerid | total |

    | --- | --- |

    | 167 | 2155 |

    | 179 | 2105 |

    | 250 | 5000 |

    | 379 | 2010 |

    | 445 | 2350 |

    | 455 | 3890 |


    请记住，其他 DBMS 使用不同的计算方式来减去一个月：


    ```sql

    --  MSSQL

    SELECT customerid, sum(total) AS total

    FROM sales

    WHERE ordered>dateadd(month,-1,current_timestamp)

    GROUP BY customerid

    HAVING sum(total)>2000

    --  SELECT

    ORDER BY customerid;

    --  SQLite

    SELECT customerid, sum(total) AS total

    FROM sales

    WHERE ordered>date(''now'',''-1 month'')

    GROUP BY customerid

    HAVING sum(total)>2000

    --  SELECT

    ORDER BY customerid;

    --  Oracle

    SELECT customerid, sum(total) AS total

    FROM sales

    WHERE ordered>add_months(current_timestamp,-1)

    GROUP BY customerid

    HAVING sum(total)>2000

    --  SELECT

    ORDER BY customerid;

    ```


    破坏前面例子简洁性的唯一因素是，`SELECT` 子句中的别名在 `HAVING` 子句中尚不可用，因此你不得不重写计算。然而，在内部，SQL 足够智能，不会实际重新计算这些值。


    如果你是很久以前安装的示例数据库，可能不会得到任何结果，因为日期已经过期了。示例脚本的最后有一条 `UPDATE` 语句。如果你运行它，它会将日期调整到更近的日期。'
- fmt: '### Using Results in a CTE


    If you want to get more details on the big-spending customers earlier, you can
    use the results in a Common Table Expression and then join with the `customers`
    table:


    ```sql

    WITH cte AS (

    SELECT customerid, sum(total) AS total

    FROM sales

    WHERE ordered>current_timestamp - INTERVAL ''1'' MONTH

    --  MSSQL:

    --  WHERE ordered>dateadd(month,-1,current_timestamp)

    --  SQLite:

    --  WHERE ordered>date(''now'',''-1 month'')

    --  Oracle:

    --  WHERE ordered>add_months(current_timestamp,-1)

    GROUP BY customerid

    HAVING sum(total)>2000

    )

    SELECT * FROM customers JOIN cte ON customers.id=cte.customerid

    ORDER BY customers.id;

    ```


    You now have a combined result:


    | id | email | familyname | givenname | … | total |

    | --- | --- | --- | --- | --- | --- |

    | 167 | lucy.fer167@example.net | Fer | Lucy | … | 2155 |

    | 179 | ivan.inkling179@example.com | Inkling | Ivan | … | 2105 |

    | 250 | rae.ning250@example.net | Ning | Rae | … | 5000 |

    | 379 | artie.chokes379@example.net | Chokes | Artie | … | 2010 |

    | 445 | ida.dunnit445@example.net | Dunnit | Ida | … | 2350 |

    | 455 | pierce.dears455@example.com | Dears | Pierce | … | 3890 |

    | ~ 6 rows ~ |


    Note that once again you’re trying to mix two different types of data here. You
    need a summary query to find the recent big spenders, and you need a nonsummary
    query to find the customer details.


    In previous examples, you put the summary in the form of a subquery. Here, it’s
    in a CTE, which is really a type of subquery.


    Note also that the CTE omits the `ORDER BY` clause. It’s useless in that context,
    and MSSQL won’t permit it without some extra trickery.


    ### Finding Duplicates


    One simple application of the `HAVING` clause is to find duplicate values. Duplicate
    values are not necessarily a problem, as they might just be a coincidence, but
    sometimes it’s useful to check anyway.


    The `HAVING` clause simply needs to filter groups where there’s more than one,
    that is, `count(*)>1`.


    For example, to find duplicate dates of birth:


    ```sql

    SELECT dob

    FROM customers

    GROUP BY dob

    HAVING count(*)>1;

    ```


    You’ll get a list of duplicates:


    | dob |

    | --- |

    | `NULL` |

    | 1963-01-20 |

    | 1996-12-09 |

    | 2002-01-29 |

    | 1990-06-21 |

    | 1980-06-02 |

    | ~ 15 rows ~ |


    You will also get some `NULL`s. SQL really has an ambivalent relationship with
    `NULL`s and, in this case, is prepared to regard them as a group.


    Again, using a CTE, you can get more details on the customers:


    ```sql

    WITH cte AS (

    SELECT dob FROM customers

    GROUP BY dob HAVING count(*)>1

    )

    SELECT * FROM customers AS c JOIN cte ON c.dob=cte.dob

    ORDER BY c.dob;

    ```


    (Remember Oracle doesn’t like table `AS`; the same for the following examples.)


    | id | email | familyname | givenname | dob | … |

    | --- | --- | --- | --- | --- | --- |

    | 344 | rose.boat344@example.net | Boat | Rose | 1962-09-24 | … |

    | 545 | jack.knife545@example.com | Knife | Jack | 1962-09-24 | … |

    | 440 | percy.monn440@example.com | Monn | Percy | 1962-12-12 | … |

    | 261 | vic.tory261@example.net | Tory | Vic | 1962-12-12 | … |

    | 187 | mikey.fitz187@example.com | Fitz | Mikey | 1963-01-20 | … |

    | 28 | meg.aphone28@example.net | Aphone | Meg | 1963-01-20 | … |

    | ~ 28 rows ~ |


    Here, any `NULL`s in the CTE get left out in the inner join, since no customer
    has a `NULL` id.


    You can also do this with multiple columns. For example, to find duplicate names,
    you need to check both the `familyname` and `givenname`:


    ```sql

    SELECT familyname, givenname

    FROM customers

    GROUP BY familyname, givenname

    HAVING count(*)>1;

    ```


    This gives you a list of names:


    | familyname | givenname |

    | --- | --- |

    | Money | Owen |

    | O’Shea | Rick |

    | Gon | Tara |

    | Dover | Eileen |

    | Highwater | Camilla |

    | Knife | Jack |

    | ~ 11 rows ~ |


    And to get more details:


    ```sql

    WITH cte AS (

    SELECT familyname, givenname FROM customers

    GROUP BY familyname, givenname HAVING count(*)>1

    )

    SELECT *

    FROM customers AS c JOIN cte

    ON c.givenname=cte.givenname AND c.familyname=cte.familyname

    ORDER BY c.familyname, c.givenname;

    ```


    This gives you the customer details:


    | id | familyname | givenname | … |

    | --- | --- | --- | --- |

    | 455 | Dears | Pierce | … |

    | 317 | Dears | Pierce | … |

    | 145 | Dover | Eileen | … |

    | 197 | Dover | Eileen | … |

    | 287 | Gettit | Carmen | … |

    | 223 | Gettit | Carmen | … |

    | ~ 22 rows ~ |


    Note that here the `ON` clause matches two columns, rather than the usual one.


    ### Using Aggregates on Aggregates


    Earlier, we mentioned finding the most popular paintings. That’s actually more
    complex than it sounds. For one thing, you can’t use an expression like `max(count())`,
    which might have made things a bit easier: SQL won’t allow nesting aggregate functions.


    We’ll start by finding how many copies of each painting we’ve sold. You’ll find
    the information in the `saleitems` table which includes the `paintingid`. All
    you need to do is group by `paintingid`:


    ```sql

    SELECT paintingid, count(*) AS countrows

    FROM saleitems

    GROUP BY paintingid;

    ```


    You’ll get a list of painting ids:


    | paintingid | countrows |

    | --- | --- |

    | 1798 | 8 |

    | 1489 | 4 |

    | 1269 | 5 |

    | 1989 | 3 |

    | 273 | 6 |

    | 1560 | 5 |

    | ~ 1136 rows ~ |


    That tells us how many times each painting was included. However, remember that
    there is a `quantity` column, which has the number of copies sold, which we can
    then add up. Unfortunately, that might contain a `NULL`, so it will have to be
    coalesced:


    ```sql

    SELECT paintingid, sum(coalesce(quantity,1)) AS quantity

    FROM saleitems

    GROUP BY paintingid;

    ```


    This gives us a more correct result:


    | paintingid | quantity |

    | --- | --- |

    | 1798 | 13 |

    | 1489 | 7 |

    | 1269 | 5 |

    | 1989 | 5 |

    | 273 | 6 |

    | 1560 | 5 |

    | ~ 1136 rows ~ |


    This gives us the data we need to work with, so we’ll put it into a CTE:


    ```sql

    WITH quantities AS (

    SELECT paintingid, sum(coalesce(quantity,1)) AS quantity

    FROM saleitems

    GROUP BY paintingid

    )

    SELECT paintingid, quantity

    FROM quantities

    GROUP BY paintingid, quantity;

    ```


    This last query is redundant for now, in that it gives us the same results as
    we had without the CTE. However, the second grouping allows us to use an additional
    aggregate function which we otherwise can’t nest:


    ```sql

    WITH quantities AS (

    SELECT paintingid, sum(coalesce(quantity,1)) AS quantity

    FROM saleitems

    GROUP BY paintingid

    )

    SELECT paintingid, quantity

    FROM quantities

    GROUP BY paintingid, quantity

    HAVING quantity=(SELECT max(quantity) FROM quantities);

    ```


    We now have a final result:


    | paintingid | quantity |

    | --- | --- |

    | 1246 | 23 |

    | 2138 | 23 |


    The subquery works around the lack of nested aggregate functions, since it simply
    aggregates a previous value. The `HAVING` clause filters for rows where the total
    quantity matches the maximum. There may, of course, be more than one.


    If you want to get more details on the painting, you’ll need to join the results
    with the paintings table. For that, we can use a second CTE:


    ```sql

    WITH

    quantities AS (

    SELECT paintingid,

    sum(coalesce(quantity,1)) AS quantity

    FROM saleitems

    GROUP BY paintingid

    ),

    favourites AS (

    SELECT paintingid, quantity

    FROM quantities

    GROUP BY paintingid, quantity

    HAVING quantity=(SELECT max(quantity) FROM quantities)

    )

    SELECT *

    FROM paintings JOIN favourites ON paintings.id=favourites.paintingid;

    ```


    We now have the combined results:


    | id | artistid | title | … | quantity |

    | --- | --- | --- | --- | --- |

    | 2138 | 256 | Cook in front of the Sto … | … | 23 |

    | 1246 | 85 | Two Studies of the Head … | … | 23 |


    Here, the second `SELECT` statement has been wrapped in a second CTE. You can
    have multiple CTEs as before, as long as you separate them with commas.


    You’ll notice that the second CTE queries the first CTE. This way, you can build
    up a complex query from smaller components. You’ll also notice that the layout
    has been changed slightly to make the CTEs easier to track.


    Finally, we joined the second CTE to the `paintings` table to get the rest of
    the details. Of course, you can be more selective in your selection of columns.'
