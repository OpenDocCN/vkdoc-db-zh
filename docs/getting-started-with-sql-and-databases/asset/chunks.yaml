- fmt: '## The CASE Expression


    SQL has an expression to generate categories out of values or, in some cases,
    out of other categories. This is the `CASE … END` expression.


    For example, if you want to categorize paintings into price groups, you can use


    ```sql

    SELECT

    id, title, price,   -- basic values

    CASE

    WHEN price<130 THEN ''cheap''

    END AS price_group

    FROM paintings;

    ```


    This gives you the pricing categories:


    | id | title | price | price_group |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | 125.00 | cheap |

    | 251 | Death in the Sickroom | 105.00 | cheap |

    | 2190 | Cache-cache (Hide-and-Seek) | 185.00 |   |

    | 1560 | Indefinite Divisibility | 125.00 | cheap |

    | 172 | Girl with Racket and Shuttlecock | 195.00 |   |

    | 2460 | The Procession to Calvary | 165.00 |   |

    | ~ 1273 rows ~ |


    The `WHEN` expression acts as a sort of `IF` operation: if the condition matches,
    then use this value.


    Note that if the condition doesn’t match, then the result is `NULL`. This is regardless
    of whether the price is something else or `NULL`.


    Of course, you’re not limited to one case:


    ```sql

    SELECT

    id, title, price,   -- basic values

    CASE

    WHEN price<130 THEN ''cheap''

    WHEN price<=170 THEN ''reasonable''

    END AS price_group

    FROM paintings;

    ```


    You now have two price categories:


    | id | title | price | price_group |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | 125.00 | cheap |

    | 251 | Death in the Sickroom | 105.00 | cheap |

    | 2190 | Cache-cache (Hide-and-Seek) | 185.00 |   |

    | 1560 | Indefinite Divisibility | 125.00 | cheap |

    | 172 | Girl with Racket and Shuttlecock | 195.00 |   |

    | 2460 | The Procession to Calvary | 165.00 | reasonable |

    | ~ 1273 rows ~ |


    The expression is evaluated from the beginning. Even though a price of, say, `120`
    is technically less than `170`, the fact that it matches the first condition is
    enough, and no further tests are made. We say the expression is **short-circuited**.


    For the more expensive paintings, note that it’s not correct to say that they’re
    the rest. That includes `NULL`s you want to exclude.


    Noting that `NULL` fails a comparison, you can use


    ```sql

    SELECT

    id, title, price,   -- basic values

    CASE

    WHEN price170 THEN ''luxury''

    END AS price_group

    FROM paintings;

    ```


    Everything now has a price category, except for the unpriced paintings.


    | id | title | price | price_group |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | 125.00 | cheap |

    | 251 | Death in the Sickroom | 105.00 | cheap |

    | 2190 | Cache-cache (Hide-and-Seek) | 185.00 | luxury |

    | 1560 | Indefinite Divisibility | 125.00 | cheap |

    | 172 | Girl with Racket and Shuttlecock | 195.00 | luxury |

    | 2460 | The Procession to Calvary | 165.00 | reasonable |

    | ~ 1273 rows ~ |


    Alternatively, you might use `WHEN price IS NOT NULL`.


    In all examples, prices which are not matched return a `NULL`. You can make this
    explicit if you want:


    ```sql

    SELECT

    id, title, price,   -- basic values

    CASE

    WHEN price170 THEN ''luxury''

    ELSE NULL   --  redundant ∵ this is the default

    END AS price_group

    FROM paintings;

    ```


    The `ELSE` case is really more useful if you want to finish with an alternative
    value:


    ```sql

    SELECT

    id, title, price,   -- basic values

    CASE

    WHEN price170 THEN ''luxury''

    ELSE ''-''

    END AS price_group

    FROM paintings;

    ```


    You can also use `CASE` when the values are already in categories, but you want
    to recode them. For example, the `spam` column is set to `True/False` or `1/0`.
    You can use `CASE` to make this clearer:


    ```sql

    SELECT

    id, email,

    CASE

    WHEN spam=1 THEN ''yes''

    WHEN spam=0 THEN ''no''

    ELSE '''' --  empty string

    END AS spam

    FROM customers;

    ```


    This is a more friendly version:


    | id | email | spam |

    | --- | --- | --- |

    | 474 | judy.free474@example.net | no |

    | 186 | ray.gunn186@example.net | yes |

    | 144 | ray.king144@example.net | no |

    | 179 | ivan.inkling179@example.com | yes |

    | 475 | drew.blood475@example.net | no |

    | 523 | seymour.sights523@example.net | yes |

    | ~ 304 rows ~ |


    Note that the values tested are discrete. For discrete cases, there is an alternative
    syntax:


    ```sql

    SELECT

    id, email,

    CASE spam

    WHEN 1 THEN ''yes''

    WHEN 0 THEN ''no''

    ELSE '''' --  empty string

    END AS spam

    FROM customers;

    ```


    This isn’t significantly shorter, but it makes the point clearer that you’re choosing
    from a discrete set of alternatives.


    ## Casting to Different Data Types


    There are times when it’s not the value but the data type itself which needs changing.
    This may be for a number of reasons, but will often be necessary when combining
    values of different types. Changing the type of data is called **casting**.


    Some DBMS will automatically cast data when the context is simple enough:


    ```sql

    --  Not MSSQL

    --  MySQL: SET SESSION sql_mode = ''ANSI'';

    SELECT id||'': ''||givenname||'' ''||familyname AS info

    FROM customers;

    ```


    Here is the combined information:


    | info |

    | 474: Judy Free |

    | 186: Ray Gunn |

    | 144: Ray King |

    | 179: Ivan Inkling |

    | 475: Drew Blood |

    | 523: Seymour Sights |

    | ~ 304 rows ~ |


    Although `id` is an integer, it will be automatically cast as a string to concatenate
    with other strings. This won’t work with Microsoft SQL, however, since the “+”
    operator will add two numbers and concatenate two strings, but doesn’t know how
    to mix them.


    You can also do this with dates:


    ```sql

    SELECT

    id||'': ''||givenname||'' ''||familyname||'' - ''||dob AS info

    FROM customers;

    ```


    You may, however, get disappointing results:


    | info |

    | 474: Judy Free - 1978-04-01 |

    | [NULL] |

    | 523: Seymour Sights - 1965-01-06 |

    | ~ 304 rows ~ |


    As you see, the situation gets complicated when there are `NULL`s to crash the
    calculation. We’ll solve that in the next section, as well as how to work with
    MSSQL.


    ### The cast( ) Function


    The `cast()` function is used to change the *type* of a value. In general, there
    are four ways the `cast()` function is used:


    *   You can cast to a *smaller* version of the same type.


    For example, you can cast from a float to an integer, or from a datetime to a
    date. When you do, you will, of course, lose the fine detail.


    *   You can cast to a *wider* version of the same type.


    For example, you can cast an integer to a float, or from a date to a datetime.
    If you do, the finer detail will be filled with zero or the equivalent.


    *   You can cast from any type to a string.


    The only thing which might go wrong is if you specify a string type which is too
    short, such as when you attempt to cast a date to `varchar(4)`.


    *   You can *sometimes* cast a string to a different type.


    If the string doesn’t fit the correct form, the classic response is to overreact
    by raising an error. Some DBMSs do offer a gentler fallback.


    We had a taste of `cast()` when trying to sort by a string which had the form
    of a number or a date.'
  raw: '## The CASE Expression


    SQL has an expression to generate categories out of values or, in some cases,
    out of other categories. This is the `CASE … END` expression.


    For example, if you want to categorize paintings into price groups, you can use


    ```

    SELECT

    id, title, price,   -- basic values

    CASE

    WHEN price<130 THEN ''cheap''

    END AS price_group

    FROM paintings;

    ```


    This gives you the pricing categories:


    | id | title | price | price_group |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | 125.00 | cheap |

    | 251 | Death in the Sickroom | 105.00 | cheap |

    | 2190 | Cache-cache (Hide-and-Seek) | 185.00 |   |

    | 1560 | Indefinite Divisibility | 125.00 | cheap |

    | 172 | Girl with Racket and Shuttlecock | 195.00 |   |

    | 2460 | The Procession to Calvary | 165.00 |   |

    | ~ 1273 rows ~ |


    The `WHEN` expression acts as a sort of `IF` operation: if the condition matches,
    then use this value.


    Note that if the condition doesn’t match, then the result is `NULL`. This is regardless
    of whether the price is something else or `NULL`.


    Of course, you’re not limited to one case:


    ```

    SELECT

    id, title, price,   -- basic values

    CASE

    WHEN price<130 THEN ''cheap''

    WHEN price<=170 THEN ''reasonable''

    END AS price_group

    FROM paintings;

    ```


    You now have two price categories:


    | id | title | price | price_group |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | 125.00 | cheap |

    | 251 | Death in the Sickroom | 105.00 | cheap |

    | 2190 | Cache-cache (Hide-and-Seek) | 185.00 |   |

    | 1560 | Indefinite Divisibility | 125.00 | cheap |

    | 172 | Girl with Racket and Shuttlecock | 195.00 |   |

    | 2460 | The Procession to Calvary | 165.00 | reasonable |

    | ~ 1273 rows ~ |


    The expression is evaluated from the beginning. Even though a price of, say, `120`
    is technically less than `170`, the fact that it matches the first condition is
    enough, and no further tests are made. We say the expression is **short-circuited**.


    For the more expensive paintings, note that it’s not correct to say that they’re
    the rest. That includes `NULL`s you want to exclude.


    Noting that `NULL` fails a comparison, you can use


    ```

    SELECT

    id, title, price,   -- basic values

    CASE

    WHEN price170 THEN ''luxury''

    END AS price_group

    FROM paintings;

    ```


    Everything now has a price category, except for the unpriced paintings.


    | id | title | price | price_group |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | 125.00 | cheap |

    | 251 | Death in the Sickroom | 105.00 | cheap |

    | 2190 | Cache-cache (Hide-and-Seek) | 185.00 | luxury |

    | 1560 | Indefinite Divisibility | 125.00 | cheap |

    | 172 | Girl with Racket and Shuttlecock | 195.00 | luxury |

    | 2460 | The Procession to Calvary | 165.00 | reasonable |

    | ~ 1273 rows ~ |


    Alternatively, you might use `WHEN price IS NOT NULL`.


    In all examples, prices which are not matched return a `NULL`. You can make this
    explicit if you want:


    ```

    SELECT

    id, title, price,   -- basic values

    CASE

    WHEN price170 THEN ''luxury''

    ELSE NULL   --  redundant ∵ this is the default

    END AS price_group

    FROM paintings;

    ```


    The `ELSE` case is really more useful if you want to finish with an alternative
    value:


    ```

    SELECT

    id, title, price,   -- basic values

    CASE

    WHEN price170 THEN ''luxury''

    ELSE ''-''

    END AS price_group

    FROM paintings;

    ```


    You can also use `CASE` when the values are already in categories, but you want
    to recode them. For example, the `spam` column is set to `True/False` or `1/0`.
    You can use `CASE` to make this clearer:


    ```

    SELECT

    id, email,

    CASE

    WHEN spam=1 THEN ''yes''

    WHEN spam=0 THEN ''no''

    ELSE '''' --  empty string

    END AS spam

    FROM customers;

    ```


    This is a more friendly version:


    | id | email | spam |

    | --- | --- | --- |

    | 474 | judy.free474@example.net | no |

    | 186 | ray.gunn186@example.net | yes |

    | 144 | ray.king144@example.net | no |

    | 179 | ivan.inkling179@example.com | yes |

    | 475 | drew.blood475@example.net | no |

    | 523 | seymour.sights523@example.net | yes |

    | ~ 304 rows ~ |


    Note that the values tested are discrete. For discrete cases, there is an alternative
    syntax:


    ```

    SELECT

    id, email,

    CASE spam

    WHEN 1 THEN ''yes''

    WHEN 0 THEN ''no''

    ELSE '''' --  empty string

    END AS spam

    FROM customers;

    ```


    This isn’t significantly shorter, but it makes the point clearer that you’re choosing
    from a discrete set of alternatives.


    ## Casting to Different Data Types


    There are times when it’s not the value but the data type itself which needs changing.
    This may be for a number of reasons, but will often be necessary when combining
    values of different types. Changing the type of data is called **casting**.


    Some DBMS will automatically cast data when the context is simple enough:


    ```

    --  Not MSSQL

    --  MySQL: SET SESSION sql_mode = ''ANSI'';

    SELECT id||'': ''||givenname||'' ''||familyname AS info

    FROM customers;

    ```


    Here is the combined information:


    | info |

    | 474: Judy Free |

    | 186: Ray Gunn |

    | 144: Ray King |

    | 179: Ivan Inkling |

    | 475: Drew Blood |

    | 523: Seymour Sights |

    | ~ 304 rows ~ |


    Although `id` is an integer, it will be automatically cast as a string to concatenate
    with other strings. This won’t work with Microsoft SQL, however, since the “+”
    operator will add two numbers and concatenate two strings, but doesn’t know how
    to mix them.


    You can also do this with dates:


    ```

    SELECT

    id||'': ''||givenname||'' ''||familyname||'' - ''||dob AS info

    FROM customers;

    ```


    You may, however, get disappointing results:


    | info |

    | 474: Judy Free - 1978-04-01 |

    | [NULL] |

    | 523: Seymour Sights - 1965-01-06 |

    | ~ 304 rows ~ |


    As you see, the situation gets complicated when there are `NULL`s to crash the
    calculation. We’ll solve that in the next section, as well as how to work with
    MSSQL.


    ### The cast( ) Function


    The `cast()` function is used to change the *type* of a value. In general, there
    are four ways the `cast()` function is used:


    *   You can cast to a *smaller* version of the same type.


    For example, you can cast from a float to an integer, or from a datetime to a
    date. When you do, you will, of course, lose the fine detail.


    *   You can cast to a *wider* version of the same type.


    For example, you can cast an integer to a float, or from a date to a datetime.
    If you do, the finer detail will be filled with zero or the equivalent.


    *   You can cast from any type to a string.


    The only thing which might go wrong is if you specify a string type which is too
    short, such as when you attempt to cast a date to `varchar(4)`.


    *   You can *sometimes* cast a string to a different type.


    If the string doesn’t fit the correct form, the classic response is to overreact
    by raising an error. Some DBMSs do offer a gentler fallback.


    We had a taste of `cast()` when trying to sort by a string which had the form
    of a number or a date.'
  trans: '## CASE 表达式


    SQL 提供了一种表达式，可根据值或在某些情况下根据其他类别来生成类别。这就是 `CASE … END` 表达式。


    例如，如果你想将绘画作品按价格分组，可以使用


    ```sql

    SELECT

    id, title, price,   -- 基本值

    CASE

    WHEN price<130 THEN ''便宜''

    END AS price_group

    FROM paintings;

    ```


    这将给出你的定价类别：


    | id | title | price | price_group |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | 125.00 | 便宜 |

    | 251 | Death in the Sickroom | 105.00 | 便宜 |

    | 2190 | Cache-cache (Hide-and-Seek) | 185.00 |   |

    | 1560 | Indefinite Divisibility | 125.00 | 便宜 |

    | 172 | Girl with Racket and Shuttlecock | 195.00 |   |

    | 2460 | The Procession to Calvary | 165.00 |   |

    | ~ 1273 行 ~ |


    `WHEN` 表达式充当一种 `IF` 操作：如果条件匹配，则使用此值。


    请注意，如果条件不匹配，则结果为 `NULL`。无论价格是其他值还是 `NULL`，都是如此。


    当然，你不仅限于一个条件：


    ```sql

    SELECT

    id, title, price,   -- 基本值

    CASE

    WHEN price<130 THEN ''便宜''

    WHEN price<=170 THEN ''合理''

    END AS price_group

    FROM paintings;

    ```


    你现在有两个价格类别：


    | id | title | price | price_group |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | 125.00 | 便宜 |

    | 251 | Death in the Sickroom | 105.00 | 便宜 |

    | 2190 | Cache-cache (Hide-and-Seek) | 185.00 |   |

    | 1560 | Indefinite Divisibility | 125.00 | 便宜 |

    | 172 | Girl with Racket and Shuttlecock | 195.00 |   |

    | 2460 | The Procession to Calvary | 165.00 | 合理 |

    | ~ 1273 行 ~ |


    表达式从开头开始计算。即使某个价格，例如 `120`，在技术上小于 `170`，但它匹配第一个条件就足够了，不会进行进一步的测试。我们说这个表达式是 **短路求值**
    的。


    对于更昂贵的绘画，注意说它们是“其余的”并不正确。因为这包含了你想要排除的 `NULL` 值。


    注意到 `NULL` 在比较中会失败，你可以使用


    ```sql

    SELECT

    id, title, price,   -- 基本值

    CASE

    WHEN price < 130 THEN ''便宜''

    WHEN price <= 170 THEN ''合理''

    WHEN price > 170 THEN ''奢华''

    END AS price_group

    FROM paintings;

    ```


    现在除了未定价的绘画外，所有作品都有了价格类别。


    | id | title | price | price_group |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | 125.00 | 便宜 |

    | 251 | Death in the Sickroom | 105.00 | 便宜 |

    | 2190 | Cache-cache (Hide-and-Seek) | 185.00 | 奢华 |

    | 1560 | Indefinite Divisibility | 125.00 | 便宜 |

    | 172 | Girl with Racket and Shuttlecock | 195.00 | 奢华 |

    | 2460 | The Procession to Calvary | 165.00 | 合理 |

    | ~ 1273 行 ~ |


    或者，你也可以使用 `WHEN price IS NOT NULL`。


    在所有示例中，未匹配的价格都会返回 `NULL`。如果需要，你可以显式指定：


    ```sql

    SELECT

    id, title, price,   -- 基本值

    CASE

    WHEN price < 130 THEN ''便宜''

    WHEN price <= 170 THEN ''合理''

    WHEN price > 170 THEN ''奢华''

    ELSE NULL   -- 冗余，因为这是默认值

    END AS price_group

    FROM paintings;

    ```


    `ELSE` 情况在你想要以一个替代值结束时更有用：


    ```sql

    SELECT

    id, title, price,   -- 基本值

    CASE

    WHEN price < 130 THEN ''便宜''

    WHEN price <= 170 THEN ''合理''

    WHEN price > 170 THEN ''奢华''

    ELSE ''-''

    END AS price_group

    FROM paintings;

    ```


    当值已经处于类别中，但你想重新编码时，也可以使用 `CASE`。例如，`spam` 列设置为 `True/False` 或 `1/0`。你可以使用 `CASE`
    使其更清晰：


    ```sql

    SELECT

    id, email,

    CASE

    WHEN spam=1 THEN ''是''

    WHEN spam=0 THEN ''否''

    ELSE '''' -- 空字符串

    END AS spam

    FROM customers;

    ```


    这是一个更友好的版本：


    | id | email | spam |

    | --- | --- | --- |

    | 474 | judy.free474@example.net | 否 |

    | 186 | ray.gunn186@example.net | 是 |

    | 144 | ray.king144@example.net | 否 |

    | 179 | ivan.inkling179@example.com | 是 |

    | 475 | drew.blood475@example.net | 否 |

    | 523 | seymour.sights523@example.net | 是 |

    | ~ 304 行 ~ |


    请注意，被测试的值是离散的。对于离散情况，有替代语法：


    ```sql

    SELECT

    id, email,

    CASE spam

    WHEN 1 THEN ''是''

    WHEN 0 THEN ''否''

    ELSE '''' -- 空字符串

    END AS spam

    FROM customers;

    ```


    这虽然没简短多少，但更清晰地表明你是在从一组离散的备选项中进行选择。


    ## 转换为不同的数据类型


    有时需要改变的不是值本身，而是数据类型。这可能有多种原因，但在组合不同类型的数据时通常很有必要。改变数据类型称为 **类型转换**。


    当上下文足够简单时，一些数据库管理系统会自动转换数据：


    ```sql

    -- 非 MSSQL

    -- MySQL: SET SESSION sql_mode = ''ANSI'';

    SELECT id||'': ''||givenname||'' ''||familyname AS info

    FROM customers;

    ```


    这是组合后的信息：


    | info |

    | 474: Judy Free |

    | 186: Ray Gunn |

    | 144: Ray King |

    | 179: Ivan Inkling |

    | 475: Drew Blood |

    | 523: Seymour Sights |

    | ~ 304 行 ~ |


    虽然 `id` 是整数，但它会被自动转换为字符串以与其他字符串连接。然而，这在 Microsoft SQL Server 中不起作用，因为“+”运算符会将两个数字相加或将两个字符串连接起来，但不知道如何混合它们。


    你也可以对日期执行此操作：


    ```sql

    SELECT

    id||'': ''||givenname||'' ''||familyname||'' - ''||dob AS info

    FROM customers;

    ```


    但是，你可能会得到令人失望的结果：


    | info |

    | 474: Judy Free - 1978-04-01 |

    | [NULL] |

    | 523: Seymour Sights - 1965-01-06 |

    | ~ 304 行 ~ |


    如你所见，当有 `NULL` 会破坏计算时，情况变得复杂。我们将在下一节中解决这个问题，以及如何与 Microsoft SQL Server 协同工作。


    ### cast( ) 函数


    `cast()` 函数用于更改值的 *类型*。总的来说，`cast()` 函数有四种使用方式：


    *   你可以转换为同一类型的 *较小* 版本。


    例如，可以从浮点数转换为整数，或从日期时间转换为日期。这样做时，你当然会丢失精细的细节。


    *   你可以转换为同一类型的 *更宽* 版本。


    例如，可以将整数转换为浮点数，或从日期转换为日期时间。如果这样做，更精细的细节将被零或等效值填充。


    *   你可以从任何类型转换为字符串。


    唯一可能出错的是你指定了太短的字符串类型，例如当你尝试将日期转换为 `varchar(4)` 时。


    *   你 *有时* 可以将字符串转换为不同的类型。


    如果字符串不符合正确的形式，经典的反应是过度反应，引发错误。一些数据库管理系统提供了更温和的回退方式。


    在尝试按具有数字或日期形式的字符串进行排序时，我们已经尝到了 `cast()` 的滋味。'
- fmt: '# Casting to a String


    For all DBMSs, you can forcibly cast a value to a string using the `cast()` function:


    ```sql

    --  Standard

    SELECT

    cast(id AS varchar(5))||'': ''||givenname||'' ''

    ||familyname||'' - ''||cast(dob as varchar(12))

    AS info

    FROM customers;

    --  MSSQL:

    SELECT

    cast(id AS varchar(5))+'': ''+givenname+'' ''

    +familyname+'' - ''+cast(dob as varchar(12))

    AS info

    FROM customers;

    ```


    The `cast()` function returns an equivalent value, in this case a string of up
    to 5 or 12 characters.


    You should see the same results as before, but now you have made the cast specific.
    You need to be a little careful with the `VARCHAR` type. As you see, you specify
    a maximum length. If it’s not enough, you will probably see the string truncated.
    If you’re not sure how much to allow, it’s always safe to overestimate.


    Here again, the `NULL`s have come back to haunt us. While the `id`, `givenname`,
    and `familyname` all have values, the `dob` may not. Oracle is the only one which
    politely returns an empty string, while all the others all implode with a `NULL`.


    Since a missing `dob` shouldn’t be a major issue, you can coalesce it (and its
    preceding hyphen) to an empty string:


    ```sql

    --  Standard

    SELECT

    cast(id AS varchar(5))||'': ''||givenname||'' ''||familyname

    ||coalesce('' - ''||cast(dob as varchar(12)),'''') AS info

    FROM customers;

    --  MSSQL:

    SELECT

    cast(id AS varchar(5))+'': ''+givenname+'' ''+familyname

    +coalesce('' - ''+cast(dob as varchar(12)),'''') AS info

    FROM customers;

    ```


    This is similar to what you did to the artist names before:


    | info |

    | --- |

    | 474: Judy Free - 1978-04-01 |

    | 186: Ray Gunn |

    | 144: Ray King |

    | 179: Ivan Inkling |

    | 475: Drew Blood - 1989-12-06 |

    | 523: Seymour Sights - 1965-01-06 |

    | ~ 304 rows ~ |


    While casting to strings can often be handled automatically, converting *from*
    strings can be a challenge. The following should succeed:


    ```sql

    SELECT cast(''20 Jul 1969'' as date) AS moon_landing;

    ```


    However, Oracle makes things difficult if you attempt to use a variation of the
    date format; the others should be OK.


    On the other hand, don’t expect this to work:


    ```sql

    SELECT cast(''tomorrow'' as date) AS birthday;

    ```


    There are some coding languages (such as PHP) which will actually interpret this
    type of string, but as for SQL, only PostgreSQL supports this. Don’t even try
    with any other type of string. You’ll probably get an error.


    ## Casting Date Literals


    One place where you may need to use `cast()` is when trying to specify a date
    literal. Because a date literal uses single quotes, the DBMS may get confused
    about whether it’s supposed to be a string.


    For example, if you use a date literal when the context is obvious, such as when
    comparing to a known date type, you don’t need to worry:


    ```sql

    SELECT * FROM customers WHERE dob<''1980-01-01'';

    ```


    Since `dob` is known to be a date type, the literal must also be a date.


    However, in many of the previous examples, we used a date literal without a known
    date type. There, we had to force the issue with `cast()`:


    ```sql

    SELECT cast(''20 Jul 1969'' as date) AS moon_landing;

    ```


    If you’re not sure about how a literal will be interpreted, it is always safe
    to cast it anyway.


    # Creating a View


    Some of your calculations may get complicated, and some of your queries certainly
    will. When you need to reuse a query, you may be able to save it as a **view**.


    A view is a saved query. The view is saved permanently in the database itself.
    For example, suppose you have a query which generates a simple price list, using
    some of the calculations in this chapter:


    ```sql

    SELECT

    id,

    (SELECT givenname||'' ''||familyname FROM artists WHERE

    artists.id=paintings.artistid) AS artist,

    title,

    price, price*0.1 AS tax, price*1.1 AS inc,

    CASE

    WHEN price170 THEN ''expensive''

    ELSE ''''

    END AS pricegroup,

    (SELECT nationality FROM artists

    WHERE artists.id=paintings.artistid) AS nationality

    FROM paintings;

    ```


    You have a result which would do as a price list.


    | id | artist | title | price | … | pricegroup | nationality |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1222 | … | … | 125 | … | cheap | French |

    | 251 | … | … | 105 | … | cheap | Norwegian |

    | 2190 | … | … | 185 | … | expensive | French |

    | 1560 | … | … | 125 | … | cheap | French |

    | 172 | … | … | 195 | … | expensive | French |

    | 2460 | … | … | 165 | … | reasonable | Flemish |

    | ~ 1273 rows |


    That’s something you won’t want to redo every time. Instead, you can save the
    query by creating a view:


    ```sql

    CREATE VIEW pricelist AS

    SELECT

    id,

    (SELECT givenname||'' ''||familyname FROM artists WHERE

    artists.id=paintings.artistid) AS artist,

    title,

    price, price*0.1 AS tax, price*1.1 AS inc,

    CASE

    WHEN price170 THEN ''expensive''

    ELSE ''''

    END AS pricegroup

    (SELECT nationality FROM artists

    WHERE artists.id=paintings.artistid) AS nationality

    FROM paintings;

    ```


    You can now use the `pricelist` view as if it were another table:


    ```sql

    SELECT * FROM pricelist;

    ```


    You can think of a view as a virtual table. The important thing is that it’s not
    a copy of the data; if you drop the view, you don’t lose anything but the view
    itself. The original data is still intact.


    You can name the view almost anything you like, but you can’t have two views with
    the same name, obviously. It’s less obvious that you can’t have a view with the
    same name as a table. That’s because SQL treats a view as another table.


    If you no longer need the view, you can use the `DROP VIEW` statement:


    ```sql

    DROP VIEW pricelist;

    ```


    To be safe, you might qualify the statement with `IF EXISTS`; otherwise, you might
    get an error if the view wasn’t there in the first place:


    ```sql

    --  Not Oracle or older MSSQL

    DROP VIEW IF EXISTS pricelist;

    ```


    Note that Oracle as well as older versions of MSSQL doesn’t support `IF EXISTS`.


    You don’t need to worry about dropping views just to save space, since they take
    up virtually no space.


    If you want to *change* a view, however, the simplest way is to drop it first
    and then create it again.


    Once you have an appreciation for views, you will find that they are a useful
    technique for building on your code. When you have put in the hard work to create
    your `SELECT` statement, you can just save it and reuse it whenever you like.


    The only downside is that `CREATE VIEW` requires additional database privileges,
    since you are making changes to the database itself. We recommend that you do
    whatever is needed to get these privileges—badger, bribe, blackmail, or whatever
    works.


    ## Using Views in Microsoft SQL


    For the most part, views work the same way as they do for any other DBMS. However,
    there are some significant quirks with Microsoft:


    *   A view cannot include an `ORDER BY` clause, unless you combine it with either
    an `OFFSET … FETCH …` clause or a `TOP` expression.

    *   The `CREATE VIEW` statement must be separated from the rest of the script.

    *   Older versions didn’t support `IF EXISTS`; you would have to use a more complex
    expression like `IF OBJECT_ID(''something'',''V'') IS NOT NULL DROP VIEW something`.


    Microsoft requires you to separate most `CREATE something` statements from the
    rest of the script, with the outstanding exception of `CREATE TABLE`. This can
    be done using a special keyword `GO`, for example:


    ```sql

    GO

    CREATE VIEW pricelist AS

    SELECT

    --  etc

    FROM paintings;

    GO

    ```


    `GO` is really an instruction to process the preceding code and to start a new
    batch.


    `GO` is not part of the SQL standard (no other DBMS requires it) and has quirky
    behaviors of its own. Generally, it should appear on a separate line, probably
    not indented, and shouldn’t have anything after the keyword.'
  raw: '### Casting to a String


    For all DBMSs, you can forcibly cast a value to a string using the `cast()` function:


    ```

    --  Standard

    SELECT

    cast(id AS varchar(5))||'': ''||givenname||'' ''

    ||familyname||'' - ''||cast(dob as varchar(12))

    AS info

    FROM customers;

    --  MSSQL:

    SELECT

    cast(id AS varchar(5))+'': ''+givenname+'' ''

    +familyname+'' - ''+cast(dob as varchar(12))

    AS info

    FROM customers;

    ```


    The `cast()` function returns an equivalent value, in this case a string of up
    to 5 or 12 characters.


    You should see the same results as before, but now you have made the cast specific.
    You need to be a little careful with the `VARCHAR` type. As you see, you specify
    a maximum length. If it’s not enough, you will probably see the string truncated.
    If you’re not sure how much to allow, it’s always safe to overestimate.


    Here again, the `NULL`s have come back to haunt us. While the `id`, `givenname`,
    and `familyname` all have values, the `dob` may not. Oracle is the only one which
    politely returns an empty string, while all the others all implode with a `NULL`.


    Since a missing `dob` shouldn’t be a major issue, you can coalesce it (and its
    preceding hyphen) to an empty string:


    ```

    --  Standard

    SELECT

    cast(id AS varchar(5))||'': ''||givenname||'' ''||familyname

    ||coalesce('' - ''||cast(dob as varchar(12)),'''') AS info

    FROM customers;

    --  MSSQL:

    SELECT

    cast(id AS varchar(5))+'': ''+givenname+'' ''+familyname

    +coalesce('' - ''+cast(dob as varchar(12)),'''') AS info

    FROM customers;

    ```


    This is similar to what you did to the artist names before:


    | info |

    | 474: Judy Free - 1978-04-01 |

    | 186: Ray Gunn |

    | 144: Ray King |

    | 179: Ivan Inkling |

    | 475: Drew Blood - 1989-12-06 |

    | 523: Seymour Sights - 1965-01-06 |

    | ~ 304 rows ~ |


    While casting to strings can often be handled automatically, converting *from*
    strings can be a challenge. The following should succeed:


    ```

    SELECT cast(''20 Jul 1969'' as date) AS moon_landing;

    ```


    However, Oracle makes things difficult if you attempt to use a variation of the
    date format; the others should be OK.


    On the other hand, don’t expect this to work:


    ```

    SELECT cast(''tomorrow'' as date) AS birthday;

    ```


    There are some coding languages (such as PHP) which will actually interpret this
    type of string, but as for SQL, only PostgreSQL supports this. Don’t even try
    with any other type of string. You’ll probably get an error.


    ### Casting Date Literals


    One place where you may need to use `cast()` is when trying to specify a date
    literal. Because a date literal uses single quotes, the DBMS may get confused
    about whether it’s supposed to be a string.


    For example, if you use a date literal when the context is obvious, such as when
    comparing to a known date type, you don’t need to worry:


    ```

    SELECT * FROM customers WHERE dob<''1980-01-01'';

    ```


    Since `dob` is known to be a date type, the literal must also be a date.


    However, in many of the previous examples, we used a date literal without a known
    date type. There, we had to force the issue with `cast()`:


    ```

    SELECT cast(''20 Jul 1969'' as date) AS moon_landing;

    ```


    If you’re not sure about how a literal will be interpreted, it is always safe
    to cast it anyway.


    ## Creating a View


    Some of your calculations may get complicated, and some of your queries certainly
    will. When you need to reuse a query, you may be able to save it as a **view**.


    A view is a saved query. The view is saved permanently in the database itself.
    For example, suppose you have a query which generates a simple price list, using
    some of the calculations in this chapter:


    ```

    SELECT

    id,

    (SELECT givenname||'' ''||familyname FROM artists WHERE

    artists.id=paintings.artistid) AS artist,

    title,

    price, price*0.1 AS tax, price*1.1 AS inc,

    CASE

    WHEN price170 THEN ''expensive''

    ELSE ''''

    END AS pricegroup,

    (SELECT nationality FROM artists

    WHERE artists.id=paintings.artistid) AS nationality

    FROM paintings;

    ```


    You have a result which would do as a price list.


    | id | artist | title | price | … | pricegroup | nationality |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1222 | … | … | 125 | … | cheap | French |

    | 251 | … | … | 105 | … | cheap | Norwegian |

    | 2190 | … | … | 185 | … | expensive | French |

    | 1560 | … | … | 125 | … | cheap | French |

    | 172 | … | … | 195 | … | expensive | French |

    | 2460 | … | … | 165 | … | reasonable | Flemish |

    |  ~ 1273 rows |


    That’s something you won’t want to redo every time. Instead, you can save the
    query by creating a view:


    ```

    CREATE VIEW pricelist AS

    SELECT

    id,

    (SELECT givenname||'' ''||familyname FROM artists WHERE

    artists.id=paintings.artistid) AS artist,

    title,

    price, price*0.1 AS tax, price*1.1 AS inc,

    CASE

    WHEN price170 THEN ''expensive''

    ELSE ''''

    END AS pricegroup

    (SELECT nationality FROM artists

    WHERE artists.id=paintings.artistid) AS nationality

    FROM paintings;

    ```


    You can now use the `pricelist` view as if it were another table:


    ```

    SELECT * FROM pricelist;

    ```


    You can think of a view as a virtual table. The important thing is that it’s not
    a copy of the data; if you drop the view, you don’t lose anything but the view
    itself. The original data is still intact.


    You can name the view almost anything you like, but you can’t have two views with
    the same name, obviously. It’s less obvious that you can’t have a view with the
    same name as a table. That’s because SQL treats a view as another table.


    If you no longer need the view, you can use the `DROP VIEW` statement:


    ```

    DROP VIEW pricelist;

    ```


    To be safe, you might qualify the statement with `IF EXISTS`; otherwise, you might
    get an error if the view wasn’t there in the first place:


    ```

    --  Not Oracle or older MSSQL

    DROP VIEW IF EXISTS pricelist;

    ```


    Note that Oracle as well as older versions of MSSQL doesn’t support `IF EXISTS`.


    You don’t need to worry about dropping views just to save space, since they take
    up virtually no space.


    If you want to *change* a view, however, the simplest way is to drop it first
    and then create it again.


    Once you have an appreciation for views, you will find that they are a useful
    technique for building on your code. When you have put in the hard work to create
    your `SELECT` statement, you can just save it and reuse it whenever you like.


    The only downside is that `CREATE VIEW` requires additional database privileges,
    since you are making changes to the database itself. We recommend that you do
    whatever is needed to get these privileges—badger, bribe, blackmail, or whatever
    works.


    ### Using Views in Microsoft SQL


    For the most part, views work the same way as they do for any other DBMS. However,
    there are some significant quirks with Microsoft:


    *   A view cannot include an `ORDER BY` clause, unless you combine it with either
    an `OFFSET … FETCH …` clause or a `TOP` expression.


    *   The `CREATE VIEW` statement must be separated from the rest of the script.


    *   Older versions didn’t support `IF EXISTS`; you would have to use a more complex
    expression like `IF OBJECT_ID(''something'',''V'') IS NOT NULL DROP VIEW something`.


    Microsoft requires you to separate most `CREATE something` statements from the
    rest of the script, with the outstanding exception of `CREATE TABLE`. This can
    be done using a special keyword `GO`, for example:


    ```

    GO

    CREATE VIEW pricelist AS

    SELECT

    --  etc

    FROM paintings;

    GO

    ```


    `GO` is really an instruction to process the preceding code and to start a new
    batch.


    `GO` is not part of the SQL standard (no other DBMS requires it) and has quirky
    behaviors of its own. Generally, it should appear on a separate line, probably
    not indented, and shouldn’t have anything after the keyword.'
  trans: '

    # 转换为字符串类型


    对于所有数据库管理系统，您都可以使用 `cast()` 函数强制将值转换为字符串：


    ```sql

    --  标准 SQL

    SELECT

    cast(id AS varchar(5))||'': ''||givenname||'' ''

    ||familyname||'' - ''||cast(dob as varchar(12))

    AS info

    FROM customers;

    --  MSSQL：

    SELECT

    cast(id AS varchar(5))+'': ''+givenname+'' ''

    +familyname+'' - ''+cast(dob as varchar(12))

    AS info

    FROM customers;

    ```


    `cast()` 函数返回一个等效值，在本例中是长度最多为 5 或 12 个字符的字符串。


    您应该看到与之前相同的结果，但现在转换操作是明确指定的。对于 `VARCHAR` 类型，您需要稍加注意。如您所见，您指定了一个最大长度。如果这个长度不够，您很可能会看到字符串被截断。如果您不确定应该分配多少长度，保守估计总是安全的。


    这里，`NULL` 值又回来困扰我们了。虽然 `id`、`givenname` 和 `familyname` 都有值，但 `dob` 可能没有。Oracle
    是唯一一个会礼貌地返回空字符串的数据库，而其他所有系统都会因为遇到 `NULL` 而“崩溃”。


    由于缺少 `dob` 值应该不是什么大问题，您可以将其（以及它前面的连字符）合并为一个空字符串：


    ```sql

    --  标准 SQL

    SELECT

    cast(id AS varchar(5))||'': ''||givenname||'' ''||familyname

    ||coalesce('' - ''||cast(dob as varchar(12)),'''') AS info

    FROM customers;

    --  MSSQL：

    SELECT

    cast(id AS varchar(5))+'': ''+givenname+'' ''+familyname

    +coalesce('' - ''+cast(dob as varchar(12)),'''') AS info

    FROM customers;

    ```


    这类似于您之前对艺术家姓名的处理：


    | info |

    | --- |

    | 474: Judy Free - 1978-04-01 |

    | 186: Ray Gunn |

    | 144: Ray King |

    | 179: Ivan Inkling |

    | 475: Drew Blood - 1989-12-06 |

    | 523: Seymour Sights - 1965-01-06 |

    | ~ 304 rows ~ |


    虽然转换为字符串类型通常可以自动处理，但*从*字符串类型转换则可能是个挑战。下面的语句应该能成功执行：


    ```sql

    SELECT cast(''20 Jul 1969'' as date) AS moon_landing;

    ```


    但是，如果您尝试使用不同的日期格式，Oracle 会让事情变得困难；其他数据库应该没问题。


    另一方面，别指望这个能工作：


    ```sql

    SELECT cast(''tomorrow'' as date) AS birthday;

    ```


    有些编程语言（如 PHP）实际上会解析这种字符串，但对于 SQL，只有 PostgreSQL 支持这种用法。甚至不要尝试使用其他类型的字符串。您很可能会得到一个错误。


    ## 转换日期字面量


    您可能需要使用 `cast()` 的一个地方是尝试指定日期字面量时。因为日期字面量使用单引号，数据库管理系统可能会混淆它到底应该被视为字符串。


    例如，当上下文很明显时，例如与已知日期类型进行比较时使用日期字面量，您无需担心：


    ```sql

    SELECT * FROM customers WHERE dob<''1980-01-01'';

    ```


    因为 `dob` 已知是日期类型，所以字面量也必须是一个日期。


    然而，在之前的许多例子中，我们在没有已知日期类型的情况下使用了日期字面量。在那里，我们必须使用 `cast()` 来强制处理：


    ```sql

    SELECT cast(''20 Jul 1969'' as date) AS moon_landing;

    ```


    如果您不确定一个字面量将如何被解释，无论如何都对其进行转换总是安全的。


    # 创建视图


    您的一些计算可能会变得复杂，而您的一些查询肯定也会如此。当您需要重用一个查询时，您可以将其保存为**视图**。


    视图是一个保存好的查询。视图本身被永久保存在数据库中。例如，假设您有一个查询，它使用本章中的一些计算来生成一个简单的价格列表：


    ```sql

    SELECT

    id,

    (SELECT givenname||'' ''||familyname FROM artists WHERE

    artists.id=paintings.artistid) AS artist,

    title,

    price, price*0.1 AS tax, price*1.1 AS inc,

    CASE

    WHEN price<170 THEN ''cheap''

    WHEN price>170 THEN ''expensive''

    ELSE ''''

    END AS pricegroup,

    (SELECT nationality FROM artists

    WHERE artists.id=paintings.artistid) AS nationality

    FROM paintings;

    ```


    您得到的结果可以作为一个价格列表使用。


    | id | artist | title | price | … | pricegroup | nationality |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1222 | … | … | 125 | … | cheap | French |

    | 251 | … | … | 105 | … | cheap | Norwegian |

    | 2190 | … | … | 185 | … | expensive | French |

    | 1560 | … | … | 125 | … | cheap | French |

    | 172 | … | … | 195 | … | expensive | French |

    | 2460 | … | … | 165 | … | reasonable | Flemish |

    | ~ 1273 rows |


    这是您不想每次使用都重新执行一遍的东西。相反，您可以通过创建视图来保存查询：


    ```sql

    CREATE VIEW pricelist AS

    SELECT

    id,

    (SELECT givenname||'' ''||familyname FROM artists WHERE

    artists.id=paintings.artistid) AS artist,

    title,

    price, price*0.1 AS tax, price*1.1 AS inc,

    CASE

    WHEN price<170 THEN ''cheap''

    WHEN price>170 THEN ''expensive''

    ELSE ''''

    END AS pricegroup,

    (SELECT nationality FROM artists

    WHERE artists.id=paintings.artistid) AS nationality

    FROM paintings;

    ```


    您现在可以像使用另一个表一样使用 `pricelist` 视图：


    ```sql

    SELECT * FROM pricelist;

    ```


    您可以将视图视为一个虚拟表。重要的是，它不是数据的副本；如果您删除视图，除了视图本身，您不会丢失任何东西。原始数据仍然完好无损。


    您可以为视图取几乎任何您喜欢的名称，但显然不能有两个同名的视图。不太明显的是，您也不能创建与表同名的视图。这是因为 SQL 将视图视为另一个表。


    如果您不再需要该视图，可以使用 `DROP VIEW` 语句：


    ```sql

    DROP VIEW pricelist;

    ```


    为了安全起见，您可以用 `IF EXISTS` 来限定该语句；否则，如果视图一开始不存在，您可能会得到一个错误：


    ```sql

    --  非 Oracle 或旧版 MSSQL

    DROP VIEW IF EXISTS pricelist;

    ```


    请注意，Oracle 以及旧版本的 MSSQL 不支持 `IF EXISTS`。


    您不必为了节省空间而删除视图，因为它们几乎不占用任何空间。


    然而，如果您想*修改*视图，最简单的方法是先删除它，然后再重新创建。


    一旦您理解了视图的价值，您就会发现它们是在已有代码基础上构建的一种有用技术。当您投入了大量工作来创建 `SELECT` 语句后，您可以保存它并在需要时随时重用。


    唯一的缺点是 `CREATE VIEW` 需要额外的数据库权限，因为您是在对数据库本身进行更改。我们建议您采取一切必要手段来获得这些权限——纠缠、贿赂、要挟，或者任何有效的方法。


    ## 在 Microsoft SQL Server 中使用视图


    在大多数情况下，视图的工作方式与其他数据库管理系统相同。然而，Microsoft 有一些显著的不同之处：


    *   视图不能包含 `ORDER BY` 子句，除非您将其与 `OFFSET … FETCH …` 子句或 `TOP` 表达式结合使用。

    *   `CREATE VIEW` 语句必须与脚本的其他部分分开。

    *   旧版本不支持 `IF EXISTS`；您必须使用更复杂的表达式，例如 `IF OBJECT_ID(''something'',''V'') IS NOT
    NULL DROP VIEW something`。


    Microsoft 要求您将大多数 `CREATE something` 语句与脚本的其他部分分开，唯一的例外是 `CREATE TABLE`。这可以使用一个特殊的关键字
    `GO` 来完成，例如：


    ```sql

    GO

    CREATE VIEW pricelist AS

    SELECT

    --  等等

    FROM paintings;

    GO

    ```


    `GO` 实际上是一个指令，用于处理前面的代码并开始一个新的批处理。


    `GO` 不是 SQL 标准的一部分（没有其他数据库管理系统需要它），并且它本身也有奇特的行为。通常，它应该单独占一行，可能不缩进，并且关键字后面不应有任何其他内容。

