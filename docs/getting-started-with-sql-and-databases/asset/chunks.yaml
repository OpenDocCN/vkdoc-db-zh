- fmt: '## Adding Rows to a Table


    Here, we will work with one of the tables, the `customers` table. We’ll add and
    change some data and make a few changes to the table itself.


    To begin with, we’ll add a new customer. To add rows, use the `INSERT` statement:


    ```

    INSERT INTO table(columns)

    VALUES (values);

    ```


    For example:


    ```

    INSERT INTO customers(givenname, familyname,

    email, registered)

    VALUES (''Norris'', ''Lurker'', ''norris.lurker@example.com'',

    current_timestamp);

    ```


    The `INSERT` statement can be used to add new values, as you see here, or to copy
    values from another table. It normally includes a list of columns, but you can
    leave out the list if you promise to fill in all of the columns in the correct
    order. It’s generally more reliable to include the list.


    When it comes to the column list, there are some obvious rules:


    *   All `NOT NULL` columns *must* be included, unless they have a default.

    *   The values must match the column in number (how many) and in respective types.

    *   SQL really doesn’t care if you get the actual values wrong, such as, say,
    reversing the `givenname` and `familyname`, as long as the values are compatible.


    All other columns will get a `NULL`, with some exceptions. If the column definition
    includes a `DEFAULT` (such as the `false` for the `spam` column), then that value
    will be used if you omit the column. That includes any `NOT NULL` column with
    a default. This means you can leave them out of the column list.


    If you wish to force the issue on a `DEFAULT` column, you can also include the
    `DEFAULT` keyword as a dummy value. This doesn’t work, however, in SQLite.


    Even so


    *   You can, of course, also include columns which are not `NOT NULL`. In this
    case, we didn’t.

    *   You can also include a column with a default value, giving it an alternative
    value.


    Technically, the primary key, `id`, should be `NOT NULL`, so in principle it should
    have been included in the column list. However, since, in this case, there is
    an autogenerated number, this acts as the default, so you can, and should, omit
    it. Where the primary key is not autogenerated, you would also be expected to
    include it.


    Now run the `INSERT` statement again, but change the email address:


    ```

    INSERT INTO customers(givenname, familyname,

    email, registered)

    VALUES (''Norris'', ''Lurker'', ''norris.lurker@example.net'',

    current_timestamp);

    ```


    That’s right: you have added the customer twice. You can see the results with


    ```

    SELECT * FROM customers ORDER BY id DESC;

    ```


    There’s nothing technically wrong with adding two customers with the same name,
    so this may not have been a mistake. At this point, SQL can’t help you decide
    whether you really have two customers with the same name or a duplicate, so you’ll
    have to work that out some other way; often, that means chasing them up personally.


    Note that even the email address doesn’t prove anything. Even though the email
    addresses differ (duplicate email addresses are disallowed), this wouldn’t be
    the first user with multiple email addresses.


    ## Deleting Rows from a Table


    Let’s assume that the second customer with the same name is indeed a duplicate,
    so you will have to delete it. For this, you use


    ```

    DELETE

    FROM table;

    ```


    However, you need to be very careful with this. Of itself, it will delete *all*
    rows, which may not be what you mean. If you only want to delete some of the rows,
    you will need to qualify it with a `WHERE` clause:


    ```

    DELETE

    FROM table

    WHERE …;

    ```


    Sometimes, you’re not sure whether you’re targeting the right rows, and you certainly
    don’t want to find out afterward. You can do a check by changing `DELETE` to `SELECT
    *`:


    ```

    SELECT *

    FROM table

    WHERE …;

    ```


    If you’re satisfied that that’s what you meant, you can go ahead. If you’re *still*
    not sure, you may be able to do a trial run. In some DBMSs, you can run the following
    statements *one at a time*:


    ```

    --  PostgreSQL, MSSQL, MySQL / MariaDB:

    BEGIN TRANSACTION;  --  MySQL / MariaDB: START TRANSACTION

    DELETE FROM minipaintings;

    SELECT * FROM minipaintings;

    ROLLBACK;

    SELECT * FROM minipaintings;

    ```


    A `transaction` is a group of statements which allows you to reverse any changes,
    using `ROLLBACK`. If you want to keep the changes, you use `COMMIT` instead. All
    of the DBMSs in this book support transactions,^([^(11)](#fn11)) but SQLite and
    Oracle don’t support running them one line at a time.


    Normally, a single statement would autocommit, which is why deleting (as well
    as updating, as you’ll see later) is so dangerous.


    Back to the `customers` table, first, check which rows you have just added:


    ```

    SELECT * FROM customers ORDER BY id desc;

    ```


    Using the last id (the first one in reverse order earlier):


    ```

    DELETE

    FROM customers

    WHERE id= … ;

    ```


    Now, when you check the table:


    ```

    SELECT * FROM customers;

    ```


    you should only see one new customer.


    Deleting a presumed duplicate isn’t always so straightforward. Sometimes, the
    two rows have different or even conflicting data, and you will need to decide
    what to keep and what to reject.


    When should you delete a row? The short answer is never. The longer answer is
    that data which should have been there should stay there. The obvious exceptions
    are data which was entered in error (such as this example) or test data.


    Another exception is if data has been entered speculatively, such as a sale which
    might not go ahead. You might then delete it if you decide you don’t want to keep
    it for historical purposes. If you really have data that you have finished with,
    then you should mark it as expired (such as with another column).


    ## Adding More Rows


    At this point, you can add more customers. With most DBMSs, you can add multiple
    rows with a single INSERT statement:


    ```

    --  Not Oracle:

    INSERT INTO customers(givenname, familyname,

    email, registered)

    VALUES

    (''Sylvia'',''Nurke'',

    ''sylvia.nurke@example.com'', current_date),

    (''Murgatroyd'',''Murdoch'',

    ''murgatroyd.murdoch@example.com'', current_timestamp)

    --  etc

    ;

    ```


    Oracle, however, won’t let you do that. There are various workarounds for Oracle,
    but the simplest way is the old-fashioned way of multiple `INSERT` statements:


    ```

    --  All DBMSs

    INSERT INTO customers(givenname, familyname,

    email, registered)

    VALUES (''Sylvia'',''Nurke'',

    ''sylvia.nurke@example.com'', current_timestamp);

    INSERT INTO customers(givenname, familyname,

    email, registered)

    VALUES (''Murgatroyd'',''Murdoch'',

    ''murgatroyd.murdoch@example.com'', current_timestamp);

    --  etc

    ;

    ```


    If you have a large number of rows, multiple individual `INSERT` statements tend
    to get very slow, so in Oracle it’s worth investigating the workarounds. The script
    for the sample database is full of them.


    Note that the value of `current_timestamp` is technically too fine-grained, as
    it also includes the time. Most, but not all, DBMSs have `current_date` which
    would fit better. However, the DBMS will also happily cast `current_timestamp`
    automatically to fit it in.


    When you now check the table:


    ```

    SELECT * FROM customers ORDER BY id DESC;

    ```


    You will notice a gap where the duplicate customer was. There are two principles
    working together here:


    1.  Primary keys should never be recycled. This way, you don’t inherit old data.

    2.  Auto-incremented columns don’t rewind, so they don’t end up reusing old values.


    It is possible to override these principles, such as when you are trying to repair
    data.'
