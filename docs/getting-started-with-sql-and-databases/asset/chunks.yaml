    ## 非字母顺序的字符串排序


    如前所述，字符串按字母顺序排序。问题在于，在现实世界中，大多数事物并非按字母顺序排列：一周中的日子、彩虹的颜色、元素周期表中的元素以及铁路线上的车站，都有其固有的顺序，按字母排序只会让人困扰。


    SQL 本身没有非字母顺序排序字符串的内在方法。有多种变通方法，包括使用一个单独的表来存储首选顺序的值。然而，你也可以通过创建一个包含按你首选顺序排列的值的字符串，并定位每个值在该字符串中的位置来实现相同的效果。


    例如，`sorting` 表有一列 `numbername`，它是以文本形式写出的数字。显然，按字母排序完全没用。要按值排序：


    *   创建一个按顺序包含值的字符串：`''One,Two,Three,Four,Five,Six,Seven,Eight,Nine''`

    *   使用一个函数来定位你的值在该字符串中的位置。


    该函数在不同数据库管理系统（DBMS）中会有所不同。以下是各种 DBMS 的 SQL 示例：


    ```sql

    --  MySQL/MariaDB, SQLite, Oracle:

    --  INSTR(''values'',value)

    SELECT *

    FROM sorting

    ORDER BY

    INSTR(''One,Two,Three,Four,Five,Six,Seven,Eight,Nine'',

    numbername);

    --  PostgreSQL:

    --  POSITION(value IN ''values'')

    SELECT *

    FROM sorting

    ORDER BY

    POSITION(numbername IN

    ''One,Two,Three,Four,Five,Six,Seven,Eight,Nine'');

    --  MSSQL:

    --  CHARINDEX(value, ''values'')

    SELECT *

    FROM sorting

    ORDER BY

    CHARINDEX(numbername,

    ''One,Two,Three,Four,Five,Six,Seven,Eight,Nine'');

    ```


    现在这将按正确的顺序排序：


    | id | numbername | … |

    | --- | --- | --- |

    | 7 | One | … |

    | 5 | Two | … |

    | 3 | Three | … |

    | 2 | Four | … |

    | 8 | Five | … |

    | 1 | Six | … |

    | 6 | Seven | … |

    | 4 | Eight | … |


    注意


    *   字符串中的逗号纯粹是为了可读性。你可以在值之间使用空格、连字符、管道符或任何其他字符。你也可以不加任何分隔符地连接值。

    *   在此示例中，值的大小写与字符串兼容。如果值的大小写混合，你可能需要使用 `lower` 函数，并准备一个小写形式的值字符串。


    ## 特殊字符串


    通常，按字母顺序排序是一种约定俗成的做法，但实际的排序顺序没有意义。例如，如果你按星期几、月份名称或数字名称排序，结果不会有任何实际的顺序。


    然而，有时你只能使用字符串，但仍需要更有意义地对列进行排序。前面你看到可以使用 `cast()` 来重新解释字符串，但这里有一些准备字符串本身的想法：


    *   数字字符串可以进行 `补零`。这意味着在数字开头添加零以将其填充到固定长度。例如，`''1234''`、`''0056''` 和 `''0789''`
    将被正确排序。

    *   日期字符串可以是 ISO 8601 格式，其组成部分从大到小排列。该格式的一个特点是，按字母排序将得到正确的顺序。


    如果你的字符串采用合适的自上而下的格式，那么结果确实会有意义。


    ## 总结


    除非你使用 `ORDER BY` 子句指定顺序，否则 SQL 不保证结果的顺序。这是设计使然，因为 SQL 关注的是数据集，而数据集没有隐含的顺序。


    请注意，对数据进行排序被高估了。排序最常见的原因是帮助查找某些内容，而 SQL 已经做到了这一点。特别是，字母顺序被高估了，因为按字母顺序相邻的项目在其他意义上很少相邻。


    然而，有时数据在排序后会显得更有条理，并且在你不得不浏览数据的显示版本而无法使用搜索工具时，排序可能会有所帮助。


    ### 使用 ORDER BY 排序


    对表进行排序使用 `ORDER BY` 子句：


    *   排序不会改变实际的表，只会改变当前查询结果的顺序。

    *   你可以使用原始列或计算值进行排序。

    *   你可以使用多个列进行排序，这将有效地对行进行分组；列的顺序是任意的，但会影响分组的效果。

    *   每个单独的排序列都可以通过 `DESC` 子句限定，该子句将反转顺序。还有 `ASC` 子句，它不改变任何东西，因为这是默认值。

    *   不同的 DBMS 对于放置已排序的 `NULL` 值有自己的处理方式，但它们都会被分组在开头或结尾。

    *   数据类型会影响排序顺序。

    *   一些 DBMS 会分别对大小写不同的值进行排序。


    ```sql

    SELECT columns

    FROM table

    ORDER BY …;

    ```


    ### 限制结果数量


    `SELECT` 语句也可以包含对行数的限制。这个功能非正式地存在了很长时间，但现在已成为一个官方功能。


    许多 DBMS 仍然提供它们专有的非正式限制子句。有些现在也提供官方版本。


    ### 排序字符串


    按字母排序大体上是没有意义的。然而，有一些技术可以按更有意义的顺序对字符串进行排序。


    ## 后续内容


    到目前为止，我们主要处理的是原始表数据。在下一章中，我们将更仔细地研究如何根据原始值重新计算值。


    脚注 1

    '
- fmt: "# 5. Calculating Column Values\n\nTo this point, you’ve been working mostly\
    \ with straightforward data values from the tables. However, you can also recalculate\
    \ values to give you a form that’s more suitable to a particular situation.\n\n\
    There are a number of interrelated principles involving the type of values you\
    \ keep in SQL table columns:\n\n*   Values should never be repeated.\n\n    This\
    \ includes variations of the same value, such as the height in centimeters and\
    \ the height in inches or the date of birth and the age.\n*   All columns should\
    \ be independent of each other.\n\n    In principle, it should be possible to\
    \ change the value in one column without affecting another, such as the date of\
    \ birth and the phone number.\n*   Values should be in their simplest possible\
    \ form.\n\n    This especially applies to formatting characters such as currency\
    \ symbols or spaces in phone numbers.\n\nIn other words, when you do need variations\
    \ on the values stored in your database, the solution is to store the simplest\
    \ value and to calculate the rest.\n\nSQL has some ability to calculate values.\
    \ When working with various DBMSs, you will soon note that\n\n*   This ability\
    \ is limited. SQL is not really a data processing tool, but it can do some simple\
    \ calculations.\n*   Standard SQL is even more limited, and various DBMSs have\
    \ supplemented this with their own extensions. The problem here is that no two\
    \ DBMSs have the same features.\n\nSometimes, the solution is to leave the data\
    \ in its simple form and let additional software do more complex data processing.\
    \ For example:\n\n*   You can extract basic data from a database and use a language\
    \ like PHP, which is used to generate web pages, to perform more complex calculations\
    \ and formatting.\n*   Accounting software will extract data from a database and\
    \ perform all of its specialized processing within the application.\n*   There\
    \ are specialized programs and languages, such as `R`, which will extract the\
    \ data from the database and perform sophisticated analysis on it.\n\nNevertheless,\
    \ it is useful to see what the DBMS can do for us before passing it off to additional\
    \ software.\n\nIn this chapter, we’ll have a look at some of the ways we can recalculate\
    \ values. We will look at basic calculations for numbers, strings, and dates,\
    \ along with specialized functions to process them harder. We’ll also look at\
    \ how `NULL`s affect calculations and at techniques for naming calculated results.\n\
    \nWe’ll also look at some special techniques, such as fetching results from other\
    \ tables in a subquery, categorizing values in a `CASE` expression, and reinterpreting\
    \ data types using the `case()` function.\n\nFinally, we will look at how to save\
    \ complex queries in the database in the form of a view.\n\n## Testing Calculations\n\
    \nMost DBMSs include a feature which is technically non-standard, but very useful\
    \ for testing a calculation:\n\n```\nSELECT 2+5 AS result; --  Not Oracle\n```\n\
    \nTechnically, the `SELECT` statement requires a `FROM` clause. However, in the\
    \ absence of one, most DBMSs will provide a dummy one-row table, but with no columns\
    \ of its own, as shown in the following result:\n\n| result |\n| --- |\n| 7 |\n\
    \nYou can even count the rows in this dummy table:\n\n```\nSELECT count(*) AS\
    \ count;    --  1 Row\n```\n\nOracle also provides this feature, but it uses a\
    \ dummy table called `dual`:\n\n```\n--  Oracle Only\nSELECT 2+5 FROM dual;\n\
    SELECT count(*) FROM dual;\n```\n\nWe won’t be writing `FROM dual` for most of\
    \ the examples, but if you’re using Oracle, remember to include it.\n\nOf course,\
    \ if you don’t include a table, you can’t expect any real data. You’re limited\
    \ to data literals and some built-in values such as the current time. If you really\
    \ want to include real data, you’ll need to use a subquery, which you’ll learn\
    \ about later.\n\nWe can use this feature whenever we want to test calculations\
    \ without involving real tables.\n\n## Emulating Variables\n\nSome of our examples\
    \ will use a set arbitrary value. In coding, when you want to set a temporary\
    \ value, you create a variable. For example, in JavaScript, you could set a variable\
    \ as follows:\n\n```\nvar a = 23;\n```\n\nSome DBMSs do have something similar,\
    \ but we’re going to take different approach using pure SQL. Suppose, for example,\
    \ that you want to set an arbitrary tax rate which you want to apply to a price\
    \ list. You can do it this way:\n\n```\nWITH vars AS (SELECT 0.1 AS taxrate)\n\
    SELECT\nid, title, price, price*taxrate AS tax\nFROM paintings, vars;\n```\n\n\
    This gives us a simple price list:\n\n| id | title | price | tax |\n| --- | ---\
    \ | --- | --- |\n| 1222 | Haymakers Resting | 125.00 | 12.500 |\n| 251 | Death\
    \ in the Sickroom | 105.00 | 10.500 |\n| 2190 | Cache-cache (Hide-and-Seek) |\
    \ 185.00 | 18.500 |\n| 1560 | Indefinite Divisibility | 125.00 | 12.500 |\n| 172\
    \ | Girl with Racket and Shuttlecock | 195.00 | 19.500 |\n| 2460 | The Procession\
    \ to Calvary | 165.00 | 16.500 |\n| ~ 1273 rows ~ |\n\n*   The `WITH` clause creates\
    \ a virtual table of (in this case) one row of one column.\n\n    The virtual\
    \ table is known as a Common Table Expression (CTE). You can call it anything\
    \ you like; here, it’s called `vars` which is a common abbreviation for “variables.”\n\
    *   The `FROM` clause combines the real `paintings` table with the virtual table,\
    \ effectively adding another column.\n\n    Technically, this is called a CROSS\
    \ JOIN which combines every row from the `vars` virtual table (one row) with every\
    \ row of the `paintings` table.\n\nIn this simple case, you could have just used\
    \ `price*0.1` in the calculation and dispensed with the extra code. However, in\
    \ more complex examples, using a CTE this way can make your code both easier to\
    \ manage and easier to read.\n\nYou will learn more about joining tables in Chapter\
    \ 6. You will also learn more about using CTEs in the chapters ahead.\n\n## Some\
    \ Basic Calculations\n\nIn general, you can think of the three basic data types\
    \ when calculating:\n\n*   Numbers are used to count or measure something or to\
    \ indicate some sort of order. Some things look like numbers, such as phone numbers,\
    \ but don’t actually do any of this, so they don’t qualify.\n*   Dates are used\
    \ to indicate when something happened. They may also include times and, in some\
    \ cases, time zones.\n*   For the most part, the rest are strings. Strings are\
    \ strings of characters, which may or may not make textual sense. SQL also refers\
    \ to strings as character data.\n\n### Basic Number Calculations\n\nFor numbers,\
    \ SQL supports the basic arithmetic operations. For example:\n\n```\nSELECT id,\
    \ title, price, price*0.1 AS tax\nFROM paintings;\n```\n\nNote that some of the\
    \ prices are `NULL`. Naturally, the calculated result is also `NULL`.\n\nThere\
    \ may be additional mathematical functions, depending on the DBMS.\n\n### Basic\
    \ String Calculations\n\nAs for strings, there is only one basic calculation:\n\
    \n| fullname |\n| Judy Free |\n| Ray Gunn |\n| Ray King |\n| Ivan Inkling |\n\
    | Drew Blood |\n| Seymour Sights |\n| ~ 304 rows ~ |\n\n```\n--  Standard\nSELECT\
    \ givenname || ' ' || familyname AS fullname\nFROM customers;\n--  MSSQL\nSELECT\
    \ givenname + ' ' + familyname AS fullname\nFROM customers;\n--  MySQL\nSELECT\
    \ concat(givenname,' ',familyname) AS fullname\nFROM customers;\n```\n\nThis operation\
    \ is called concatenation, and it joins strings together.\n\nNote that Microsoft\
    \ SQL Server uses the plus (`+`) operator, which will cause some confusion in\
    \ more complex examples.\n\nIf you try this in MySQL/MariaDB, it may not work.\
    \ In traditional mode, MySQL/MariaDB treats the `||` operator as a logical operator;\
    \ in ANSI mode, it should work.\n\nIf you are using MySQL/MariaDB, remember you\
    \ can switch to ANSI mode by using\n\n```\nSET SESSION sql_mode = 'ANSI';\nSELECT\
    \ givenname || ' ' || familyname AS fullname;\n```\n\nThe `concat()` function\
    \ is available for most DBMSs, but not for SQLite.\n\n### Basic Date Calculations\n\
    \nDates, on the other hand, are more complicated to work with. Even with basic\
    \ operations, you will need some extra work, which is discussed later."
  raw: "# 5. Calculating Column Values\n\nTo this point, you’ve been working mostly\
    \ with straightforward data values from the tables. However, you can also recalculate\
    \ values to give you a form that’s more suitable to a particular situation.\n\n\
    There are a number of interrelated principles involving the type of values you\
    \ keep in SQL table columns:\n\n*   Values should never be repeated.\n\n    This\
    \ includes variations of the same value, such as the height in centimeters and\
    \ the height in inches or the date of birth and the age.\n\n*   All columns should\
    \ be independent of each other.\n\n    In principle, it should be possible to\
    \ change the value in one column without affecting another, such as the date of\
    \ birth and the phone number.\n\n*   Values should be in their simplest possible\
    \ form.\n\n    This especially applies to formatting characters such as currency\
    \ symbols or spaces in phone numbers.\n\nIn other words, when you do need variations\
    \ on the values stored in your database, the solution is to store the simplest\
    \ value and to calculate the rest.\n\nSQL has *some* ability to calculate values.\
    \ When working with various DBMSs, you will soon note that\n\n*   This ability\
    \ is limited. SQL is not really a data processing tool, but it can do some simple\
    \ calculations.\n\n*   Standard SQL is even more limited, and various DBMSs have\
    \ supplemented this with their own extensions. The problem here is that no two\
    \ DBMSs have the same features.\n\nSometimes, the solution is to leave the data\
    \ in its simple form and let additional software do more complex data processing.\
    \ For example:\n\n*   You can extract basic data from a database and use a language\
    \ like PHP, which is used to generate web pages, to perform more complex calculations\
    \ and formatting.\n\n*   Accounting software will extract data from a database\
    \ and perform all of its specialized processing within the application.\n\n* \
    \  There are specialized programs and languages, such as **R**, which will extract\
    \ the data from the database and perform sophisticated analysis on it.\n\nNevertheless,\
    \ it is useful to see what the DBMS can do for us before passing it off to additional\
    \ software.\n\nIn this chapter, we’ll have a look at some of the ways we can recalculate\
    \ values. We will look at basic calculations for numbers, strings, and dates,\
    \ along with specialized functions to process them harder. We’ll also look at\
    \ how `NULL`s affect calculations and at techniques for naming calculated results.\n\
    \nWe’ll also look at some special techniques, such as fetching results from other\
    \ tables in a subquery, categorizing values in a `CASE` expression, and reinterpreting\
    \ data types using the `case()` function.\n\nFinally, we will look at how to save\
    \ complex queries in the database in the form of a view.\n\n## Testing Calculations\n\
    \nMost DBMSs include a feature which is technically non-standard, but very useful\
    \ for testing a calculation:\n\n```\nSELECT 2+5 AS result; --  Not Oracle\n```\n\
    \nTechnically, the `SELECT` statement requires a `FROM` clause. However, in the\
    \ absence of one, most DBMSs will provide a dummy one-row table, but with no columns\
    \ of its own, as shown in the following result:\n\n| result |\n| --- |\n| 7 |\n\
    \nYou can even count the rows in this dummy table:\n\n```\nSELECT count(*) AS\
    \ count;    --  1 Row\n```\n\nOracle also provides this feature, but it uses a\
    \ dummy table called `dual`:\n\n```\n--  Oracle Only\nSELECT 2+5 FROM dual;\n\
    SELECT count(*) FROM dual;\n```\n\nWe won’t be writing `FROM dual` for most of\
    \ the examples, but if you’re using Oracle, remember to include it.\n\nOf course,\
    \ if you don’t include a table, you can’t expect any real data. You’re limited\
    \ to data literals and some built-in values such as the current time. If you really\
    \ want to include real data, you’ll need to use a subquery, which you’ll learn\
    \ about later.\n\nWe can use this feature whenever we want to test calculations\
    \ without involving real tables.\n\n## Emulating Variables\n\nSome of our examples\
    \ will use a set arbitrary value. In coding, when you want to set a temporary\
    \ value, you create a **variable**. For example, in JavaScript, you could set\
    \ a variable as follows:\n\n```\nvar a = 23;\n```\n\nSome DBMSs do have something\
    \ similar, but we’re going to take different approach using pure SQL. Suppose,\
    \ for example, that you want to set an arbitrary tax rate which you want to apply\
    \ to a price list. You can do it this way:\n\n```\nWITH vars AS (SELECT 0.1 AS\
    \ taxrate)\nSELECT\nid, title, price, price*taxrate AS tax\nFROM paintings, vars;\n\
    ```\n\nThis gives us a simple price list:\n\n| id | title | price | tax |\n| ---\
    \ | --- | --- | --- |\n| 1222 | Haymakers Resting | 125.00 | 12.500 |\n| 251 |\
    \ Death in the Sickroom | 105.00 | 10.500 |\n| 2190 | Cache-cache (Hide-and-Seek)\
    \ | 185.00 | 18.500 |\n| 1560 | Indefinite Divisibility | 125.00 | 12.500 |\n\
    | 172 | Girl with Racket and Shuttlecock | 195.00 | 19.500 |\n| 2460 | The Procession\
    \ to Calvary | 165.00 | 16.500 |\n| ~ 1273 rows ~ |\n\n*   The `WITH` clause creates\
    \ a virtual table of (in this case) one row of one column.\n\n    The virtual\
    \ table is known as a **Common Table Expression** (CTE). You can call it anything\
    \ you like; here, it’s called `vars` which is a common abbreviation for “variables.”\n\
    \n*   The `FROM` clause combines the real `paintings` table with the virtual table,\
    \ effectively adding another column.\n\n    Technically, this is called a **CROSS\
    \ JOIN** which combines every row from the `vars` virtual table (one row) with\
    \ every row of the `paintings` table.\n\nIn this simple case, you could have just\
    \ used `price*0.1` in the calculation and dispensed with the extra code. However,\
    \ in more complex examples, using a CTE this way can make your code both easier\
    \ to manage and easier to read.\n\nYou will learn more about joining tables in\
    \ Chapter [6](#601766_1_En_6_Chapter.xhtml). You will also learn more about using\
    \ CTEs in the chapters ahead.\n\n## Some Basic Calculations\n\nIn general, you\
    \ can think of the three basic data types when calculating:\n\n*   Numbers are\
    \ used to count or measure something or to indicate some sort of order. Some things\
    \ look like numbers, such as phone numbers, but don’t actually do any of this,\
    \ so they don’t qualify.\n\n*   Dates are used to indicate when something happened.\
    \ They may also include times and, in some cases, time zones.\n\n*   For the most\
    \ part, the rest are strings. Strings are strings of characters, which may or\
    \ may not make textual sense. SQL also refers to strings as character data.\n\n\
    ### Basic Number Calculations\n\nFor numbers, SQL supports the basic arithmetic\
    \ operations. For example:\n\n```\nSELECT id, title, price, price*0.1 AS tax\n\
    FROM paintings;\n```\n\nNote that some of the prices are `NULL`. Naturally, the\
    \ calculated result is also `NULL`.\n\nThere may be additional mathematical functions,\
    \ depending on the DBMS.\n\n### Basic String Calculations\n\nAs for strings, there\
    \ is only one basic calculation:\n\n| fullname |\n| Judy Free |\n| Ray Gunn |\n\
    | Ray King |\n| Ivan Inkling |\n| Drew Blood |\n| Seymour Sights |\n| ~ 304 rows\
    \ ~ |\n\n```\n--  Standard\nSELECT givenname || ' ' || familyname AS fullname\n\
    FROM customers;\n--  MSSQL\nSELECT givenname + ' ' + familyname AS fullname\n\
    FROM customers;\n--  MySQL\nSELECT concat(givenname,' ',familyname) AS fullname\n\
    FROM customers;\n```\n\nThis operation is called **concatenation**, and it joins\
    \ strings together.\n\nNote that Microsoft SQL Server uses the plus (`+`) operator,\
    \ which will cause some confusion in more complex examples.\n\nIf you try this\
    \ in MySQL/MariaDB, it may not work. In traditional mode, MySQL/MariaDB treats\
    \ the `||` operator as a logical operator; in ANSI mode, it should work.\n\nIf\
    \ you are using MySQL/MariaDB, remember you can switch to ANSI mode by using\n\
    \n```\nSET SESSION sql_mode = 'ANSI';\nSELECT givenname || ' ' || familyname AS\
    \ fullname;\n```\n\nThe `concat()` function is available for most DBMSs, but not\
    \ for SQLite.\n\n### Basic Date Calculations\n\nDates, on the other hand, are\
    \ more complicated to work with. Even with basic operations, you will need some\
    \ extra work, which is discussed later."
  trans: "\n# 5. 计算列值\n\n到目前为止，你主要处理的是来自表中直接的数据值。然而，你也可以重新计算值，以获得更适合特定情况的形式。\n\n关于在\
    \ SQL 表列中存储的值的类型，有一些相互关联的原则：\n\n*   值不应重复。\n\n    这包括同一值的不同变体，例如以厘米和英寸为单位的身高，或者出生日期和年龄。\n\
    *   所有列应彼此独立。\n\n    原则上，更改一列的值不应影响另一列，例如出生日期和电话号码。\n*   值应采用其最简形式。\n\n    这尤其适用于格式化字符，例如货币符号或电话号码中的空格。\n\
    \n换句话说，当你确实需要基于存储在数据库中的值进行变体计算时，解决方案是存储最简单的值并计算其余部分。\n\nSQL 具有一定的计算能力。在使用各种 DBMS\
    \ 时，你很快会注意到：\n\n*   这种能力是有限的。SQL 并非真正的数据处理工具，但它可以进行一些简单的计算。\n*   标准 SQL 的局限性更大，而各种\
    \ DBMS 通过自己的扩展补充了这一点。这里的问题是，没有两个 DBMS 拥有完全相同的功能。\n\n有时，解决方案是让数据保持其简单形式，而让额外的软件进行更复杂的数据处理。例如：\n\
    \n*   你可以从数据库中提取基本数据，并使用像 PHP（一种用于生成网页的语言）这样的语言来执行更复杂的计算和格式化。\n*   会计软件将从数据库中提取数据，并在应用程序内执行其所有的专门处理。\n\
    *   存在专门的程序和语言，例如 `R`，它们会从数据库中提取数据并在其上进行复杂的分析。\n\n尽管如此，在将数据交给额外软件处理之前，先了解 DBMS\
    \ 能为我们做什么是很有用的。\n\n在本章中，我们将了解一些重新计算值的方法。我们将探讨数字、字符串和日期的基本计算，以及处理它们的专用函数。我们还将了解\
    \ `NULL` 如何影响计算，以及为计算结果命名的技术。\n\n我们还将了解一些特殊技术，例如在子查询中从其他表获取结果、在 `CASE` 表达式中对值进行分类，以及使用\
    \ `case()` 函数重新解释数据类型。\n\n最后，我们将了解如何以视图的形式在数据库中保存复杂的查询。\n\n## 测试计算\n\n大多数 DBMS\
    \ 包含一项功能，从技术上讲是非标准的，但对于测试计算非常有用：\n\n```\nSELECT 2+5 AS result; --  非 Oracle\n\
    ```\n\n从技术上讲，`SELECT` 语句需要一个 `FROM` 子句。然而，在缺少该子句时，大多数 DBMS 会提供一个虚拟的单行表，但该表本身没有列，结果如下所示：\n\
    \n| result |\n| --- |\n| 7 |\n\n你甚至可以计算这个虚拟表的行数：\n\n```\nSELECT count(*) AS count;\
    \    --  1 行\n```\n\nOracle 也提供此功能，但它使用一个名为 `dual` 的虚拟表：\n\n```\n--  仅 Oracle\n\
    SELECT 2+5 FROM dual;\nSELECT count(*) FROM dual;\n```\n\n对于大多数示例，我们不会写 `FROM\
    \ dual`，但如果你使用的是 Oracle，请记得加上它。\n\n当然，如果你没有包含表，就别指望能获取到任何真实数据。你仅限于使用数据字面量和一些内置值，例如当前时间。如果你真的想包含真实数据，你将需要使用稍后会学到的子查询。\n\
    \n只要我们想在不涉及真实表的情况下测试计算，就可以使用此功能。\n\n## 模拟变量\n\n我们的一些示例将使用一组任意值。在编码中，当你要设置临时值时，会创建一个变量。例如，在\
    \ JavaScript 中，你可以这样设置一个变量：\n\n```\nvar a = 23;\n```\n\n一些 DBMS 确实有类似的功能，但我们将采用使用纯\
    \ SQL 的不同方法。假设，例如，你想设置一个任意税率，并将其应用于价格表。你可以这样做：\n\n```\nWITH vars AS (SELECT 0.1\
    \ AS taxrate)\nSELECT\nid, title, price, price*taxrate AS tax\nFROM paintings,\
    \ vars;\n```\n\n这给我们提供了一个简单的价格列表：\n\n| id | title | price | tax |\n| --- | ---\
    \ | --- | --- |\n| 1222 | Haymakers Resting | 125.00 | 12.500 |\n| 251 | Death\
    \ in the Sickroom | 105.00 | 10.500 |\n| 2190 | Cache-cache (Hide-and-Seek) |\
    \ 185.00 | 18.500 |\n| 1560 | Indefinite Divisibility | 125.00 | 12.500 |\n| 172\
    \ | Girl with Racket and Shuttlecock | 195.00 | 19.500 |\n| 2460 | The Procession\
    \ to Calvary | 165.00 | 16.500 |\n| ~ 1273 行 ~ |\n\n*   `WITH` 子句创建了一个（在此例中）一行一列的虚拟表。\n\
    \n    这个虚拟表被称为公用表表达式（CTE）。你可以随意命名它；这里它被称为 `vars`，这是“变量”的常用缩写。\n*   `FROM` 子句将真实的\
    \ `paintings` 表与虚拟表结合起来，实际上是添加了另一列。\n\n    从技术上讲，这称为交叉连接（CROSS JOIN），它将 `vars`\
    \ 虚拟表的每一行（一行）与 `paintings` 表的每一行进行组合。\n\n在这个简单的例子中，你本可以在计算中直接使用 `price*0.1` 并省去额外的代码。然而，在更复杂的示例中，以这种方式使用\
    \ CTE 可以使你的代码更易于管理和阅读。\n\n你将在第 6 章学习更多关于连接表的内容。在接下来的章节中，你也将学习更多关于使用 CTE 的知识。\n\
    \n## 一些基本计算\n\n一般来说，在计算时可以考虑三种基本数据类型：\n\n*   数字用于计数或测量某物，或指示某种顺序。有些东西看起来像数字，例如电话号码，但实际上并不执行上述任何操作，因此它们不符合条件。\n\
    *   日期用于指示某事发生的时间。它们也可能包括时间，在某些情况下还包括时区。\n*   其余的基本都是字符串。字符串是一串字符，它们可能具有也可能不具有文本意义。SQL\
    \ 也将字符串称为字符数据。\n\n### 基本数字计算\n\n对于数字，SQL 支持基本的算术运算。例如：\n\n```\nSELECT id, title,\
    \ price, price*0.1 AS tax\nFROM paintings;\n```\n\n请注意，有些价格是 `NULL`。自然地，计算结果也是\
    \ `NULL`。\n\n根据 DBMS 的不同，可能还有其他数学函数。\n\n### 基本字符串计算\n\n至于字符串，只有一种基本计算：\n\n| fullname\
    \ |\n| Judy Free |\n| Ray Gunn |\n| Ray King |\n| Ivan Inkling |\n| Drew Blood\
    \ |\n| Seymour Sights |\n| ~ 304 行 ~ |\n\n```\n--  标准\nSELECT givenname || ' '\
    \ || familyname AS fullname\nFROM customers;\n--  MSSQL\nSELECT givenname + '\
    \ ' + familyname AS fullname\nFROM customers;\n--  MySQL\nSELECT concat(givenname,'\
    \ ',familyname) AS fullname\nFROM customers;\n```\n\n此操作称为串联（concatenation），它将字符串连接在一起。\n\
    \n请注意，Microsoft SQL Server 使用加号（`+`）运算符，这在更复杂的例子中会引起一些混淆。\n\n如果你在 MySQL/MariaDB\
    \ 中尝试此操作，它可能无法工作。在传统模式下，MySQL/MariaDB 将 `||` 运算符视为逻辑运算符；在 ANSI 模式下，它应该有效。\n\n\
    如果你使用的是 MySQL/MariaDB，请记住你可以通过以下方式切换到 ANSI 模式：\n\n```\nSET SESSION sql_mode =\
    \ 'ANSI';\nSELECT givenname || ' ' || familyname AS fullname;\n```\n\n`concat()`\
    \ 函数适用于大多数 DBMS，但 SQLite 不适用。\n\n### 基本日期计算\n\n另一方面，日期的处理要复杂得多。即使是基本操作，你也需要一些额外的工作，这将在后面讨论。\n"
- fmt: "## Working with NULL\n\n总是存在你需要与一些 `NULL` 值进行计算的风险。例如：\n\n| id | givenname\
    \ | familyname | inches |\n| --- | --- | --- | --- |\n| 474 | Judy | Free |  \
    \ |\n| 186 | Ray | Gunn | 64.48… |\n| 144 | Ray | King | 69.60… |\n| 179 | Ivan\
    \ | Inkling | 67.04… |\n| 475 | Drew | Blood | 67.32… |\n| 523 | Seymour | Sights\
    \ | 65.86… |\n| ~ 304 rows ~ |\n\n```sql\nSELECT\n  id, givenname, familyname,\n\
    \  height/2.54 as inches\nFROM customers;\n```\n\n许多行的 `height` 是 `NULL`。如你所见，它们的结果也是\
    \ `NULL`：如果你不知道一个值，那么无论你尝试对它做什么，你仍然不知道。这对于所有数据类型都是正确的。\n\n一个你可以做的事情是过滤掉这些行：\n\n\
    ```sql\nSELECT\n  id, givenname, familyname,\n  height/2.54 as inches\nFROM customers\n\
    WHERE height IS NOT NULL;\n```\n\n然而，有时你可以对缺失值进行猜测，或者至少用一个合理的替代值来填充。为了生成替代值，你可以使用\
    \ `coalesce(original, alternative)` 函数。\n\n例如，有一个包含许多电话号码的员工表：\n\n```sql\nSELECT\
    \ id, givenname, familyname, phone FROM employees;\n```\n\n这给出了名字和一些电话号码：\n\n\
    | id | givenname | familyname | phone |\n| --- | --- | --- | --- |\n| 26 | Mildred\
    \ | Thisenthat | 0491570159 |\n| 2 | Clarisse | Cringinghut | 0491571491 |\n|\
    \ 3 | Joe | Kerr |   |\n| 5 | Norris | Toof |   |\n| 20 | Jim | Pills |   |\n\
    | 17 | Harold | Prott |   |\n| ~ 34 rows ~ |\n\n有些电话号码缺失，但这并不一定意味着无法联系到这些人。对于这些缺失的电话号码，你可以用公司号码替代：\n\
    \n| id | givenname | familyname | phone |\n| --- | --- | --- | --- |\n| 26 | Mildred\
    \ | Thisenthat | 0491570159 |\n| 2 | Clarisse | Cringinghut | 0491571491 |\n|\
    \ 3 | Joe | Kerr | 1300975707 |\n| 5 | Norris | Toof | 1300975707 |\n| 20 | Jim\
    \ | Pills | 1300975707 |\n| 17 | Harold | Prott | 1300975707 |\n| ~ 34 rows ~\
    \ |\n\n```sql\nSELECT\n  id, givenname, familyname,\n  coalesce(phone,'1300975707')\
    \ AS phone\nFROM employees;\n```\n\n有时，情况可能更明显。例如，`saleitems` 表包含了每个商品的数量 (`quantity`)：\n\
    \n| id | saleid | paintingid | quantity | price |\n| --- | --- | --- | --- | ---\
    \ |\n| 1505 | 619 | 495 | 1 | 190.00 |\n| 3278 | 1324 | 806 | 1 | 145.00 |\n|\
    \ 5505 | 2203 | 1585 |   | 105.00 |\n| 806 | 329 | 1643 | 1 | 130.00 |\n| 5805\
    \ | 2321 | 1713 | 3 | 105.00 |\n| 1416 | 586 | 2147 | 3 | 160.00 |\n| 367 | 147\
    \ | 630 | 1 | 200.00 |\n| 497 | 202 | 2290 | 2 | 180.00 |\n| 188 | 78 | 2186 |\
    \   | 155.00 |\n| 964 | 395 | 701 | 1 | 190.00 |\n| ~ 6315 rows ~ |\n\n```sql\n\
    SELECT\n  id, saleid, paintingid, quantity, price\nFROM saleitems;\n```\n\n在这里，你会看到一些数量是\
    \ `NULL`。如果不知道数量，包含一个销售项目是没有意义的，但你可以合理地猜测，如果他们没有说明其他情况，那么数量应该是 `1`。你可以使用 `coalesce()`\
    \ 来实现这个猜测：\n\n```sql\nSELECT\n  id, saleid, paintingid,\n  coalesce(quantity,1)\
    \ AS quantity, price\nFROM saleitems;\n```\n\n我们现在为每个项目都有了一个可行的数量：\n\n| id | saleid\
    \ | paintingid | quantity | price |\n| --- | --- | --- | --- | --- |\n| 1505 |\
    \ 619 | 495 | 1 | 190.00 |\n| 3278 | 1324 | 806 | 1 | 145.00 |\n| 5505 | 2203\
    \ | 1585 | 1 | 105.00 |\n| 806 | 329 | 1643 | 1 | 130.00 |\n| 5805 | 2321 | 1713\
    \ | 3 | 105.00 |\n| 1416 | 586 | 2147 | 3 | 160.00 |\n| 367 | 147 | 630 | 1 |\
    \ 200.00 |\n| 497 | 202 | 2290 | 2 | 180.00 |\n| 188 | 78 | 2186 | 1 | 155.00\
    \ |\n| 964 | 395 | 701 | 1 | 190.00 |\n| ~ 6315 rows ~ |\n\n你也可以合理地认为，如果 `1` 是明显的值，那么它应该被内建为表的默认值。然而，你并不总能控制表应该如何设计。\n\
    \n有时，最好的替代是空，或者至少看起来像是空的东西。例如，在 `artists` 表中，有一些缺失的名字。如果你尝试连接它们，你的结果也会是 `NULL`：\n\
    \n```sql\nSELECT\n  id, givenname, familyname,\n  givenname||' '||familyname AS\
    \ fullname\n--  givenname+' '+familyname AS fullname    --  MSSQL\nFROM artists;\n\
    ```\n\n以下是一些缺失名字的结果：\n\n| id | givenname | familyname | fullname |\n| --- | ---\
    \ | --- | --- |\n| 215 |   | Cuyp |   |\n| 349 | Armand | Guillaumin | Armand\
    \ Guillaumin |\n| 345 | Paolo | Uccello | Paolo Uccello |\n| 341 | Auguste | Rodin\
    \ | Auguste Rodin |\n| 284 | Domenico | Ghirlandaio | Domenico Ghirlandaio |\n\
    | 2 | Charles | de La Fosse | Charles de La Fosse |\n| ~ 187 rows ~ |\n\n虽然从技术上讲，说如果你不知道名字，你就不知道全名是正确的，但更实用的说法是这无关紧要。在这种情况下，我们可以将缺失的名字以及其后的空格\
    \ `coalesce` 为空字符串 (`''`)：\n\n```sql\nSELECT\n  id, givenname, familyname,\n \
    \ coalesce(givenname||' ','') || familyname AS fullname\n--  coalesce(givenname+'\
    \ ','') + familyname AS fullname --  MSSQL\nFROM artists;\n```\n\n现在我们为每个人都有了一个名字：\n\
    \n| id | givenname | familyname | fullname |\n| --- | --- | --- | --- |\n| 215\
    \ |   | Cuyp | Cuyp |\n| 349 | Armand | Guillaumin | Armand Guillaumin |\n| 345\
    \ | Paolo | Uccello | Paolo Uccello |\n| 341 | Auguste | Rodin | Auguste Rodin\
    \ |\n| 284 | Domenico | Ghirlandaio | Domenico Ghirlandaio |\n| 2 | Charles |\
    \ de La Fosse | Charles de La Fosse |\n| ~ 187 rows ~ |\n\n记住以下关于 `coalesce()`\
    \ 的要点：\n\n*   仅当替代值是明显或无害的时候才使用 `coalesce()`。确定什么是明显或无害的取决于你。\n*   一旦你使用了 `coalesce()`，你就无法分辨结果是真实的还是猜测的。\n\
    \n`NULL` 的存在一直是数据库开发人员痛苦的根源。请记住，它代表一个缺失的值，你需要做的一件事就是找出它为什么缺失以及这是否重要。\n\n## Using\
    \ Aliases\n\n当你计算值时，你生成了另一列，但 SQL 不知道该怎么称呼它。如果你在控制台运行 `SELECT` 查询，你可能会看到一些虚拟名称，如“Unnamed\
    \ Column”，或者你用于计算的表达式。然而，那不是一个真正的名称，当你需要更严肃地对待这个语句时，它会因为缺乏一个合适的名称而失败。\n\n`SELECT`\
    \ 语句的结果是一个虚拟表，和真实表一样，每一列都必须有一个唯一的名称。为了给计算列一个名称，你使用 `AS` 关键字来创建一个**别名**：\n\n```sql\n\
    SELECT\n  id, givenname, familyname,\n  height/2.54 AS inches\nFROM customers;\n\
    ```\n\n这里，计算的别名是 `inches`。\n\n你可以为别名使用任何*有效*的名称，甚至是另一列的名称：\n\n```sql\nSELECT\n\
    \  id, givenname, familyname,\n  height/2.54 AS email    --  probably a bad idea\n\
    FROM customers;\n```\n\n然而，如果你开始做这种事情，你可能会让包括你自己在内的所有人感到困惑：\n\n| id | givenname\
    \ | familyname | email |\n| --- | --- | --- | --- |\n| 474 | Judy | Free |   |\n\
    | 186 | Ray | Gunn | 64.48… |\n| 144 | Ray | King | 69.60… |\n| 179 | Ivan | Inkling\
    \ | 67.04… |\n| 475 | Drew | Blood | 67.32… |\n| 523 | Seymour | Sights | 65.86…\
    \ |\n| ~ 304 rows ~ |\n\n你可以为任何你喜欢的列设置别名，即使它不是一个计算值：\n\n```sql\nSELECT\n  id,\n\
    \  givenname AS firstname, familyname AS lastname,\n  height/2.54 AS email   \
    \ --  still probably a bad idea\nFROM customers;\n```\n\n你可能为现有列设置别名的一个原因是，你认为原始的列名不适合你的目的：它们可能不够清晰，或者使用这些数据的软件期望不同的名称。"
  raw: '## Working with NULL


    There is always the risk that you will be attempting a calculation with some `NULL`s.
    For example:


    | id | givenname | familyname | inches |

    | --- | --- | --- | --- |

    | 474 | Judy | Free |   |

    | 186 | Ray | Gunn | 64.48… |

    | 144 | Ray | King | 69.60… |

    | 179 | Ivan | Inkling | 67.04… |

    | 475 | Drew | Blood | 67.32… |

    | 523 | Seymour | Sights | 65.86… |

    | ~ 304 rows ~ |


    ```

    SELECT

    id, givenname, familyname,

    height/2.54 as inches

    FROM customers;

    ```


    Many rows have `NULL` for the height. As you see, their result is also `NULL`:
    if you don’t know a value, then, regardless of what you try to do with it, you
    still don’t know. This is true for all types of data.


    One thing you can do is to filter out these rows:


    ```

    SELECT

    id, givenname, familyname,

    height/2.54 as inches

    FROM customers

    WHERE height IS NOT NULL;

    ```


    Sometimes, however, you can take a guess at the missing value or at least substitute
    a reasonable alternative. To generate the substitute, you can use the `coalesce(original,alternative)`
    function.


    For example, there is a table of employees which includes many phone numbers:


    ```

    SELECT id, givenname, familyname, phone FROM employees;

    ```


    This gives us the names and some phone numbers:


    | id | givenname | familyname | phone |

    | --- | --- | --- | --- |

    | 26 | Mildred | Thisenthat | 0491570159 |

    | 2 | Clarisse | Cringinghut | 0491571491 |

    | 3 | Joe | Kerr |   |

    | 5 | Norris | Toof |   |

    | 20 | Jim | Pills |   |

    | 17 | Harold | Prott |   |

    | ~ 34 rows ~ |


    Some of the phone numbers are missing, but that doesn’t necessarily mean that
    they can’t be contacted. For these missing phone numbers, you can substitute the
    company number:


    | id | givenname | familyname | phone |

    | --- | --- | --- | --- |

    | 26 | Mildred | Thisenthat | 0491570159 |

    | 2 | Clarisse | Cringinghut | 0491571491 |

    | 3 | Joe | Kerr | 1300975707 |

    | 5 | Norris | Toof | 1300975707 |

    | 20 | Jim | Pills | 1300975707 |

    | 17 | Harold | Prott | 1300975707 |

    | ~ 34 rows ~ |


    ```

    SELECT

    id, givenname, familyname,

    coalesce(phone,''1300975707'') AS phone

    FROM employees;

    ```


    Sometimes, it might be more obvious. For example, the `saleitems` table includes
    the number of copies (`quantity`) for each item:


    | id | saleid | paintingid | quantity | price |

    | --- | --- | --- | --- | --- |

    | 1505 | 619 | 495 | 1 | 190.00 |

    | 3278 | 1324 | 806 | 1 | 145.00 |

    | 5505 | 2203 | 1585 |   | 105.00 |

    | 806 | 329 | 1643 | 1 | 130.00 |

    | 5805 | 2321 | 1713 | 3 | 105.00 |

    | 1416 | 586 | 2147 | 3 | 160.00 |

    | 367 | 147 | 630 | 1 | 200.00 |

    | 497 | 202 | 2290 | 2 | 180.00 |

    | 188 | 78 | 2186 |   | 155.00 |

    | 964 | 395 | 701 | 1 | 190.00 |

    | ~ 6315 rows ~ |


    ```

    SELECT

    id, saleid, paintingid, quantity, price

    FROM saleitems;

    ```


    Here, you will see that some of the quantities are `NULL`. It would make no sense
    to include a sale item if you don’t know what the quantity is, but you can reasonably
    guess that if they don’t say otherwise, it should have been `1`. You can use `coalesce()`
    to implement that guess:


    ```

    SELECT

    id, saleid, paintingid,

    coalesce(quantity,1) AS quantity, price

    FROM saleitems;

    ```


    We now have a viable quantity for each item:


    | id | saleid | paintingid | quantity | price |

    | --- | --- | --- | --- | --- |

    | 1505 | 619 | 495 | 1 | 190.00 |

    | 3278 | 1324 | 806 | 1 | 145.00 |

    | 5505 | 2203 | 1585 | 1 | 105.00 |

    | 806 | 329 | 1643 | 1 | 130.00 |

    | 5805 | 2321 | 1713 | 3 | 105.00 |

    | 1416 | 586 | 2147 | 3 | 160.00 |

    | 367 | 147 | 630 | 1 | 200.00 |

    | 497 | 202 | 2290 | 2 | 180.00 |

    | 188 | 78 | 2186 | 1 | 155.00 |

    | 964 | 395 | 701 | 1 | 190.00 |

    | ~ 6315 rows ~ |


    You could also reasonably argue that if `1` is the obvious value, it should have
    been the default built into the table. However, you don’t always have control
    over how the table should have been designed.


    Sometimes, the best alternative is nothing, or at least something which looks
    like nothing. For example, in the `artists` table, there are some missing given
    names. If you try to concatenate them, your result would also be `NULL`:


    ```

    SELECT

    id, givenname, familyname,

    givenname||'' ''||familyname AS fullname

    --  givenname+'' ''+familyname AS fullname    --  MSSQL

    FROM artists;

    ```


    Here is the result with some missing names:


    | id | givenname | familyname | fullname |

    | --- | --- | --- | --- |

    | 215 |   | Cuyp |   |

    | 349 | Armand | Guillaumin | Armand Guillaumin |

    | 345 | Paolo | Uccello | Paolo Uccello |

    | 341 | Auguste | Rodin | Auguste Rodin |

    | 284 | Domenico | Ghirlandaio | Domenico Ghirlandaio |

    | 2 | Charles | de La Fosse | Charles de La Fosse |

    | ~ 187 rows ~ |


    While it’s technically correct to say that if you don’t know the given name, you
    don’t know the full name, it’s more helpful to say that it doesn’t matter. In
    this case, we can coalesce the missing given name, as well as the space which
    follows it, to an empty string (`''''`):


    ```

    SELECT

    id, givenname, familyname,

    coalesce(givenname||'' '','''') || familyname AS fullname

    --  coalesce(givenname+'' '','''') + familyname AS fullname --  MSSQL

    FROM artists;

    ```


    Now we have a name for everybody:


    | id | givenname | familyname | fullname |

    | --- | --- | --- | --- |

    | 215 |   | Cuyp | Cuyp |

    | 349 | Armand | Guillaumin | Armand Guillaumin |

    | 345 | Paolo | Uccello | Paolo Uccello |

    | 341 | Auguste | Rodin | Auguste Rodin |

    | 284 | Domenico | Ghirlandaio | Domenico Ghirlandaio |

    | 2 | Charles | de La Fosse | Charles de La Fosse |

    | ~ 187 rows ~ |


    Remember the following points about `coalesce()`:


    *   Only use `coalesce()` if the alternative value is obvious or harmless. It’s
    up to you to work out what is obvious or harmless.


    *   Once you use `coalesce()`, you cannot tell whether the result is genuine or
    guessed.


    The existence of `NULL` has always been a source of misery with database developers.
    Remember that it represents a missing value, and one thing you need to do is work
    out why it’s missing and whether it matters.


    ## Using Aliases


    When you calculate values, you generate another column, but SQL doesn’t know what
    to call it. If you run the `SELECT` query in the console, you will probably see
    some dummy name, such as “Unnamed Column,” or the expression that you used for
    the calculation. However, that’s not a real name, and when you need to take the
    statement more seriously, it will fail for lack of a proper name.


    The result of a `SELECT` statement is a virtual table, and, like real tables,
    each column must have a unique name. To give the calculated column a name, you
    use the `AS` keyword to create an **alias**:


    ```

    SELECT

    id, givenname, familyname,

    height/2.54 AS inches

    FROM customers;

    ```


    Here, the alias for the calculation is `inches`.


    You can use any *valid* name for an alias, even the name of another column:


    ```

    SELECT

    id, givenname, familyname,

    height/2.54 AS email    --  probably a bad idea

    FROM customers;

    ```


    However, you run the risk of confusing everybody else, including yourself, if
    you start doing that sort of thing:


    | id | givenname | familyname | email |

    | --- | --- | --- | --- |

    | 474 | Judy | Free |   |

    | 186 | Ray | Gunn | 64.48… |

    | 144 | Ray | King | 69.60… |

    | 179 | Ivan | Inkling | 67.04… |

    | 475 | Drew | Blood | 67.32… |

    | 523 | Seymour | Sights | 65.86… |

    | ~ 304 rows ~ |


    You can alias any column you like, even if it’s not a calculated value:


    ```

    SELECT

    id,

    givenname AS firstname, familyname AS lastname,

    height/2.54 AS email    --  still probably a bad idea

    FROM customers;

    ```


    One reason you might alias existing columns is that you consider the original
    column names unsuitable for your purpose: they may not be clear enough or the
    software that will be using the data is expecting different names.'
