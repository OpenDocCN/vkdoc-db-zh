    ```


    This will give you the ages:


    | id | givenname | familyname | dob | age |

    | --- | --- | --- | --- | --- |

    | 474 | Judy | Free | 1978-04-01 | 44 years 11 mons 2 days |

    | 186 | Ray | Gunn |   |   |

    | 144 | Ray | King |   |   |

    | 179 | Ivan | Inkling |   |   |

    | 475 | Drew | Blood | 1989-12-06 | 33 years 2 mons 28 days |

    | 523 | Seymour | Sights | 1965-01-06 | 58 years 1 mon 28 days |

    | ~ 304 rows ~ |


    However, the result will be something like `38 years 6 mons 7 days`, which is
    pretty good, if you really want that detail. The resulting expression is called
    an **interval**. Intervals are an important part of date calculations with PostgreSQL.


    Much of the time, however, you probably just need the number of years (or months
    or whatever), so the following calculations will probably do:


    ```

    --  PostgreSQL

    SELECT

    id, givenname, familyname, dob,

    age(dob) AS interval,

    extract(year from age(dob)) AS samething

    FROM customers;

    --  MariaDB/MySQL

    SELECT

    id, givenname, familyname, dob,

    timestampdiff(year,dob,current_timestamp) AS age

    FROM customers;

    --  MSSQL

    SELECT

    id, givenname, familyname, dob,

    datediff(year,dob,current_timestamp)

    AS age --  but not quite!

    FROM customers;

    --  Oracle

    SELECT

    id, givenname, familyname, dob,

    trunc(months_between(current_timestamp,dob)/12)

    AS age

    FROM customers;

    --  SQLite

    SELECT

    id, givenname, familyname, dob,

    cast(

    strftime(''%Y.%m%d'', ''now'')

    - strftime(''%Y.%m%d'', dob)

    as int) AS age

    FROM customers;

    ```


    You get something like this.


    | id | givenname | familyname | dob | years |

    | --- | --- | --- | --- | --- |

    | 474 | Judy | Free | 1978-04-01 | 44 |

    | 186 | Ray | Gunn |   |   |

    | 144 | Ray | King |   |   |

    | 179 | Ivan | Inkling |   |   |

    | 475 | Drew | Blood | 1989-12-06 | 33 |

    | 523 | Seymour | Sights | 1965-01-06 | 58 |

    | ~ 304 rows ~ |   |   |   |   |


    Note that only PostgreSQL has a built-in function to calculate the age. Oracle
    has the `months_between()` which nearly does the job; this number is divided by
    12, and the `trunc()` function removes the remainder.


    Of the preceding calculations, MSSQL has a simple function which is *too* simple.
    All it does is calculate the difference between the years, which is way out if
    the date of birth is at the end of the year but the asking date is at the beginning
    of the year. Getting a more correct result takes a lot more work.


    ### Extracting Parts of a Date


    Another technique with dates is to extract parts of the date, such as the day
    or the year. Here again, the different DBMSs vary widely.


    SQLite has a completely different way of working with parts of a date, which we
    won’t be discussing here.


    #### Date Extraction in PostgreSQL, MariaDB/MySQL, and Oracle


    The standard method of extracting part of a date is to use the `extract()` function.
    This function takes the form


    ```

    extract(part from datetime)

    ```


    You can see the `extract()` function in action:


    ```

    WITH moonshot AS (

    SELECT

    timestamp ''1969-07-20 20:17:40'' AS datetime

    --  FROM dual   --  (Oracle)

    )

    SELECT

    ---+---+---+---+---+---+---+---+---+---+---+---+---+---+

    datetime,

    EXTRACT(year FROM datetime) AS year,        --  1969

    EXTRACT(month FROM datetime) AS month,      --  7

    EXTRACT(day FROM datetime) AS day,          --  20

    --  not Oracle or MariaDB/MySQL:

    EXTRACT(dow FROM datetime) AS weekday,  --  0

    EXTRACT(hour FROM datetime) AS hour,        --  20

    EXTRACT(minute FROM datetime) AS minute,    --  17

    EXTRACT(second FROM datetime) AS second     --  40

    FROM moonshot;

    ```


    Note that Oracle and MariaDB/MySQL don’t have a direct way of extracting the day
    of the week, which can be a problem if, say, you want to use it for grouping.
    However, as you will see later, you can use a formatting function to get the day
    of the week, as well as the preceding values.


    PostgreSQL also includes a function called `date_part(''part'',datetime)` as an
    alternative to the preceding function.


    The date/time `1969-07-20 20:17:40` is when the first human foot trod on the moon.


    #### Date Extraction in Microsoft SQL


    Microsoft SQL has two main functions to extract part of a date:


    *   `datepart(part,datetime)` extracts the part of a date/time as a *number*.


    *   `datename(part,datetime)` extracts the part of a date/time as a *string*.
    For most parts, such as the year, it’s simply a string version of the `datepart`
    number. However, for the weekday and the month, it’s actually the human-friendly
    name.


    You can see these two functions in action:


    ```

    WITH moonshot AS (

    SELECT cast(''1969-07-20 20:17:40'' as datetime) AS datetime

    )

    SELECT

    datepart(year, datetime) AS year,       --  aka year()

    datename(year, datetime) AS yearstring,

    datepart(month, datetime) AS month,     --  aka month()

    datename(month, datetime) AS monthname,

    datepart(day, datetime) AS day,         --  aka day()

    datepart(weekday, datetime) AS weekday, --  Sunday=1

    datename(weekday, datetime) AS weekdayname,

    datepart(hour, datetime) AS hour,

    datepart(minute, datetime) AS minute,

    datepart(second, datetime) AS second

    FROM moonshot;

    ```


    Note


    *   `datename(date,year)` just gives a string version of `2013`.


    *   There are three short functions, `day()`, `month()`, and `year()`, which are
    synonyms of `datepart()`.


    #### Extracting a Date from a Datetime


    Something conspicuously missing is the ability to extract a date from a datetime.
    The most direct approach is to `cast` it:


    ```

    WITH moonshot AS (

    --  …

    )

    SELECT cast(thetime AS DATE) AS thedate --  1969-07-20 (Not Oracle)

    FROM moonshot;

    ```


    With Oracle, you’ll need a slightly different approach. Casting as a date won’t
    actually remove the time component. Instead, you should use `trunc(thetime)`;
    it won’t look the same, but it will work.


    You will need this technique later when we try to analyze data with dates and
    times.


    ### Formatting a Date


    Formatting a date is all about presenting it in a useful or friendly way. Generally,
    this involves generating a string, since a string is the only way you can control
    which characters result.


    As with numbers, a formatted date is no longer a date. That means if you need
    to do any further calculations or sorting, you may have problems.


    #### Date Formatting in PostgreSQL and Oracle


    For both PostgreSQL and Oracle, you can use the `to_char` function. Here are two
    useful formats:


    ```

    --  PostgreSQL

    WITH vars AS (

    SELECT timestamp ''1969-07-20 20:17:40'' AS moonshot

    )

    SELECT

    moonshot,

    to_char(moonshot,''FMDay, DDth FMMonth YYYY'') AS full,

    to_char(moonshot,''Dy DD Mon YYYY'') AS short

    FROM vars;

    --  Oracle

    WITH vars AS (

    SELECT timestamp ''1969-07-20 20:17:40'' AS moonshot

    FROM dual

    )

    SELECT

    moonshot,

    to_char(moonshot,''FMDay, ddth Month YYYY'')

    AS fulldate,

    to_char(moonshot,''Dy DD Mon YYYY'') AS shortdate

    FROM vars;

    ```


    This should give you the following:


    | moonshot | fulldate | shortdate |

    | --- | --- | --- |

    | 1969-07-20 20:17:40 | Sunday, 20th July 1969 | Sun 20 Jul 1969 |


    You’ll notice that there is a slight difference in the format codes between PostgreSQL
    and Oracle.


    You can learn more about the format codes at


    *   PostgreSQL: [`www.postgresql.org/docs/current/functions-formatting.html#FUNCTIONS-FORMATTING-DATETIME-TABLE`](http://www.postgresql.org/docs/current/functions-formatting.html%2523FUNCTIONS-FORMATTING-DATETIME-TABLE)


    *   Oracle: [`https://docs.oracle.com/en/database/oracle/oracle-database/21/sqlrf/Format-Models.html`](https://docs.oracle.com/en/database/oracle/oracle-database/21/sqlrf/Format-Models.html%255D)'
