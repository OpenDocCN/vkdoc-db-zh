- fmt: "### The IN Operator\n\n使用`OR`时，有一种特殊情况。你可能需要测试一个表达式是否精确匹配多个不同的值，例如：\n\n```\n\
    --  Change Precedence\nSELECT *\nFROM customers\nWHERE state='VIC' OR state='QLD'\
    \ OR state='WA'; --  etc\n```\n\n你将得到以下结果组：\n\n| id | familyname | givenname |\
    \ state |\n| --- | --- | --- | --- |\n| 186 | Gunn | Ray | VIC |\n| 179 | Inkling\
    \ | Ivan | WA |\n| 475 | Blood | Drew | QLD |\n| 523 | Sights | Seymour | VIC\
    \ |\n| 588 | Skies | Grace | QLD |\n| 191 | Moss | Pete | WA |\n| ~ 151 rows ~\
    \ |\n\n这里，表达式`state`被测试是否匹配多个值。你可以使用`IN`表达式重写这个测试：\n\n```\nSELECT *\nFROM customers\n\
    WHERE state IN ('VIC','QLD','WA');\n```\n\n使用这个表达式有两个要求：\n\n*   测试是针对单个列或类似表达式的。在此例中，它测试的是`state`列。\n\
    *   测试是针对一个离散的可能性列表的。在此例中，列表是一组州值。\n\n`IN`有两种形式。在这个例子中，你提供了一个括号括起来的硬编码选项列表。用英语说，可以是“where\
    \ state is in the following list:”，或者更自然地，“where state is one of:”。\n\n你的列表也可以包含不匹配的值或重复的值：\n\
    \n```\nSELECT *\nFROM customers\nWHERE state IN ('VIC','QLD','VIC','ETC');\n```\n\
    \n查找不存在的值总是可以的，但通常你不会重复一个值。不过，这种问题可能会间接发生，正如你将在后面看到的。\n\n使用`IN`可以方便地反转条件：\n\n\
    ```\n--  Change Precedence\nSELECT *\nFROM customers\nWHERE state NOT IN ('VIC','QLD','WA');\n\
    ```\n\n这将给出其他州的数据：\n\n| id | familyname | givenname | state |\n| --- | --- | ---\
    \ | --- |\n| 474 | Free | Judy | NSW |\n| 144 | King | Ray | NSW |\n| 341 | Idate\
    \ | Val | NSW |\n| 351 | Tate | Dick | NSW |\n| 422 | Why | Wanda | TAS |\n| 429\
    \ | Morrow | Tom | NSW |\n| ~ 118 rows ~ |   |   |   |\n\n在前面的例子中，列表是一组硬编码的可能值。你也可以将`IN`表达式与由子查询生成的列表一起使用。\n\
    \n### 派生列表\n\n`IN`子句还有第二种更复杂的形式。\n\n例如，假设你想根据单笔销售找到消费最高的客户。问题在于，销售总额在一个表（`sales`）中，而客户详细信息在另一个表（`customers`）中。幸运的是，`sales`表包含重要的`customerid`，它关联回`customers`表。\n\
    \n要得到结果：\n\n1.  从`sales`表中，获取`total`超过某个值的`customerid`。\n2.  从`customers`表中，获取`id`与第一步结果匹配的客户的数据。\n\
    \n对于第一步：\n\n```\nSELECT customerid FROM sales WHERE total>1200\n```\n\n我们得到一个客户id列表：\n\
    \n| **customerid** |\n| 2 |\n| 10 |\n| 19 |\n| 46 |\n| 24 |\n| 69 |\n| ~ 147 rows\
    \ ~ |\n\n（前面的表达式没有分号，因为它将被合并到下一步中）。\n\n对于第二步，使用`IN`表达式将客户与第一步中的多个值进行匹配：\n\n```\n\
    SELECT *\nFROM customers\nWHERE id IN(SELECT customerid FROM sales WHERE total>1200);\n\
    ```\n\n这给出了匹配的客户：\n\n| id | familyname | givenname | … | registered |\n| --- |\
    \ --- | --- | --- | --- |\n| 186 | Gunn | Ray | … | 2021-11-15 |\n| 144 | King\
    \ | Ray | … | 2021-10-18 |\n| 179 | Inkling | Ivan | … | 2021-11-08 |\n| 351 |\
    \ Tate | Dick | … | 2022-03-13 |\n| 191 | Moss | Pete | … | 2021-11-19 |\n| 305\
    \ | Net | Clara | … | 2022-01-26 |\n| ~ 106 rows ~ |   |   |   |   |\n\n`IN`子句中的`SELECT`语句被称为**子查询**。原则上，它先被求值，结果用于主查询。\n\
    \n如果你将`IN`与子查询一起使用，有另一种可能更直观的表达式：\n\n```\n--  PostgreSQL, MySQL/MariaDB, MSSQL,\
    \ Oracle (not SQLite)\nSELECT *\nFROM customers\nWHERE id = ANY(SELECT customerid\
    \ FROM sales\nWHERE total>1200);\n```\n\n类似地，你可以使用子查询来查找荷兰艺术家的所有画作：\n\n1.  找出`nationality`是Dutch的艺术家的`id`。\n\
    2.  找出`artistid`是前面那些`id`之一的画作：\n\n```\n    --  All SQLs\n    SELECT *\n    FROM\
    \ paintings\n    WHERE artistid IN (SELECT id FROM artists WHERE nationality='Dutch');\n\
    \    --  not SQLite\n    SELECT *\n    FROM paintings\n    WHERE artistid=ANY(SELECT\
    \ id FROM artists\n    WHERE nationality='Dutch');\n```\n\n这应该会给出荷兰艺术家的画作：\n\n\
    | id | artistid | title | year | price |\n| --- | --- | --- | --- | --- |\n| 81\
    \ | 198 | The Garden of Earthly Delights |   |   |\n| 1503 | 182 | Breakfast of\
    \ Crab | 1648 | 160.00 |\n| 2128 | 370 | The Geographer |   | 125.00 |\n| 264\
    \ | 370 | Girl with a Pearl Earring | 1666 | 140.00 |\n| 1446 | 266 | Entrance\
    \ to the Public Garden in Arles | 1888 | 115.00 |\n| 968 | 50 | Basket of Fruits\
    \ | 1622 | 140.00 |\n| ~ 172 rows ~ |\n\n请注意，荷兰人实际上并不自称“Dutch”；那是基于与德国人混淆的英语名称。在`artists`表中，一些艺术家被列为`Netherlandish`。你也应该将他们包括进来：\n\
    \n```\nSELECT *\nFROM paintings\nWHERE artistid IN (\n    SELECT id FROM artists\n\
    \    WHERE nationality='Dutch' OR nationality='Netherlandish'\n);\n```\n\n这扩大了结果组：\n\
    \n| id | artistid | title | year | price |\n| --- | --- | --- | --- | --- |\n\
    | 541 | 256 | Butcher’s Stall with the Flight into Egypt |   | 110.00 |\n| 81\
    \ | 198 | The Garden of Earthly Delights |   |   |\n| 1503 | 182 | Breakfast of\
    \ Crab | 1648 | 160.00 |\n| 2128 | 370 | The Geographer |   | 125.00 |\n| 264\
    \ | 370 | Girl with a Pearl Earring | 1666 | 140.00 |\n| 1446 | 266 | Entrance\
    \ to the Public Garden in Arles | 1888 | 115.00 |\n| ~ 186 rows ~ |\n\n或者使用另一个`IN`表达式：\n\
    \n```\nSELECT *\nFROM paintings\nWHERE artistid IN (\n    SELECT id FROM artists\
    \  WHERE nationality IN ('Dutch','Netherlandish')\n);\n```\n\n你将在本书中看到更多的子查询。在某些情况下，可能会有替代方法，可能更高效，来获得相同的结果，例如连接表。你将在后面学习连接表。\n\
    \n### 通配符匹配\n\n对于字符串，你可以使用`通配符`匹配来扩大搜索范围。例如：\n\n```\nSELECT *\nFROM customers\n\
    WHERE familyname LIKE 'Ring%';\n```\n\n这将选择姓氏以`Ring`开头的客户。\n\n| id | familyname\
    \ | givenname | … |\n| --- | --- | --- | --- |\n| 90 | Ringer | Belle | … |\n\
    | 309 | Ringing | Belle | … |\n| 165 | Ring | Wanda | … |\n| 164 | Ringing | Isabelle\
    \ | … |\n| ~ 4 rows ~ |\n\n字符串`Ring%`不再是一个简单的字符串：它现在是一个`模式`。\n\n通配符匹配有两个要求：\n\n\
    *   使用`LIKE`关键字来表示后面是一个模式。\n*   模式包含特殊字符。\n\n你可以不使用特殊模式字符而使用`LIKE`，但那样模式就只是一个精确匹配。例如：\n\
    \n```\n--  Using LIKE\nSELECT *\nFROM customers\nWHERE familyname LIKE 'Ring';\n\
    --  Same as simple match\nSELECT *\nFROM customers\nWHERE familyname='Ring';\n\
    ```\n\n没有多少客户完全匹配这个字符串：\n\n| id | familyname | givenname | … |\n| --- | --- |\
    \ --- | --- |\n| `165` | `Ring` | `Wanda` | `…` |\n\n另一方面，如果你不使用`LIKE`关键字，模式字符将被视为普通字符：\n\
    \n```\nSELECT *\nFROM customers\nWHERE familyname='Ring%';   --  nobody called\
    \ Ring%\n```\n\n记住，根据你的排序规则，其他字符可能是区分大小写的，也可能不是。"
  raw: "### The IN Operator\n\nUsing `OR`, there is a special case. You might test\
    \ a single expression for an exact match against different values, such as\n\n\
    ```\n--  Change Precedence\nSELECT *\nFROM customers\nWHERE state='VIC' OR state='QLD'\
    \ OR state='WA'; --  etc\n```\n\nYou’ll get the following group:\n\n| id | familyname\
    \ | givenname | state |\n| --- | --- | --- | --- |\n| 186 | Gunn | Ray | VIC |\n\
    | 179 | Inkling | Ivan | WA |\n| 475 | Blood | Drew | QLD |\n| 523 | Sights |\
    \ Seymour | VIC |\n| 588 | Skies | Grace | QLD |\n| 191 | Moss | Pete | WA |\n\
    | ~ 151 rows ~ |\n\nHere, the expression `state` is tested against various values.\
    \ You can rewrite the test using the `IN` expression:\n\n```\nSELECT *\nFROM customers\n\
    WHERE state IN ('VIC','QLD','WA');\n```\n\nThere are two requirements to using\
    \ this expression:\n\n*   The test is for a single column or similar expression.\
    \ In this case, it tests the `state` column.\n\n*   The test is against a discrete\
    \ list of possibilities. Here, the group is a list of state values.\n\nThe `IN`\
    \ takes two forms. In this example, you supply a parenthesized list of hard-coded\
    \ alternatives. In English, you could say “where state is in the following list:”\
    \ or, more naturally, “where state is one of:”.\n\nYour list can also include\
    \ unmatched values or duplicate values:\n\n```\nSELECT *\nFROM customers\nWHERE\
    \ state IN ('VIC','QLD','VIC','ETC');\n```\n\nIt’s always OK to look for values\
    \ that aren’t there, but you wouldn’t normally repeat a value. However, this is\
    \ the sort of thing which might happen indirectly, as you will see later.\n\n\
    Using `IN` makes it easy to reverse the condition:\n\n```\n--  Change Precedence\n\
    SELECT *\nFROM customers\nWHERE state NOT IN ('VIC','QLD','WA');\n```\n\nThis\
    \ gives us the other states:\n\n| id | familyname | givenname | state |\n| ---\
    \ | --- | --- | --- |\n| 474 | Free | Judy | NSW |\n| 144 | King | Ray | NSW |\n\
    | 341 | Idate | Val | NSW |\n| 351 | Tate | Dick | NSW |\n| 422 | Why | Wanda\
    \ | TAS |\n| 429 | Morrow | Tom | NSW |\n| ~ 118 rows ~ |   |   |   |\n\nIn the\
    \ preceding examples, the list is a hard-coded set of possible values. You can\
    \ also use the `IN` expression with a list generated from a subquery.\n\n### Derived\
    \ Lists\n\nThe `IN` clause also takes on a second form which is more sophisticated.\n\
    \nSuppose, for example, you want to find the biggest spenders, based on single\
    \ sales. The problem is that the sales totals are in one table (`sales`), while\
    \ the customer details are in another (`customers`). Fortunately, the `sales`\
    \ table includes the important `customerid`, which relates back to the `customers`\
    \ table.\n\nTo get the results:\n\n1.  From the `sales` table, get the `customerid`s\
    \ where the `total` exceeds some value.\n\n2.  From the `customers` table, get\
    \ the data for customers whose `id` matches the results of the first step.\n\n\
    For the first step:\n\n```\nSELECT customerid FROM sales WHERE total>1200\n```\n\
    \nWe get a list of customer ids:\n\n| **customerid** |\n| 2 |\n| 10 |\n| 19 |\n\
    | 46 |\n| 24 |\n| 69 |\n| ~ 147 rows ~ |\n\n(There is no semicolon in the preceding\
    \ expression, since it will be incorporated in the next step).\n\nFor the second\
    \ step, use the `IN` expression to match customers against the multiple values\
    \ in the first step:\n\n```\nSELECT *\nFROM customers\nWHERE id IN(SELECT customerid\
    \ FROM sales WHERE total>1200);\n```\n\nThis gives us the customers which match:\n\
    \n| id | familyname | givenname | … | registered |\n| --- | --- | --- | --- |\
    \ --- |\n| 186 | Gunn | Ray | … | 2021-11-15 |\n| 144 | King | Ray | … | 2021-10-18\
    \ |\n| 179 | Inkling | Ivan | … | 2021-11-08 |\n| 351 | Tate | Dick | … | 2022-03-13\
    \ |\n| 191 | Moss | Pete | … | 2021-11-19 |\n| 305 | Net | Clara | … | 2022-01-26\
    \ |\n| ~ 106 rows ~ |   |   |   |   |\n\nThe `SELECT` statement in the `IN` clause\
    \ is called a **subquery**. In principle, it is evaluated first, and the results\
    \ are used in the main query.\n\nIf you are using `IN` with a subquery, there\
    \ is an alternative expression which may be more intuitive:\n\n```\n--  PostgreSQL,\
    \ MySQL/MariaDB, MSSQL, Oracle (not SQLite)\nSELECT *\nFROM customers\nWHERE id\
    \ = ANY(SELECT customerid FROM sales\nWHERE total>1200);\n```\n\nSimilarly, you\
    \ can use a subquery to find all the paintings by Dutch artists:\n\n1.  Find the\
    \ `id`s of the artists whose `nationality` is Dutch.\n\n2.  Find the paintings\
    \ whose `artistid` is one of the previous `id`s:\n\n```\n    --  All SQLs\n  \
    \  SELECT *\n    FROM paintings\n    WHERE artistid IN (SELECT id FROM artists\
    \ WHERE nationality='Dutch');\n    --  not SQLite\n    SELECT *\n    FROM paintings\n\
    \    WHERE artistid=ANY(SELECT id FROM artists\n    WHERE nationality='Dutch');\n\
    \    ```\n\nThis should give us the paintings by Dutch artists:\n\n| id | artistid\
    \ | title | year | price |\n| --- | --- | --- | --- | --- |\n| 81 | 198 | The\
    \ Garden of Earthly Delights |   |   |\n| 1503 | 182 | Breakfast of Crab | 1648\
    \ | 160.00 |\n| 2128 | 370 | The Geographer |   | 125.00 |\n| 264 | 370 | Girl\
    \ with a Pearl Earring | 1666 | 140.00 |\n| 1446 | 266 | Entrance to the Public\
    \ Garden in Arles | 1888 | 115.00 |\n| 968 | 50 | Basket of Fruits | 1622 | 140.00\
    \ |\n| ~ 172 rows ~ |\n\nNote that the Dutch people don’t actually refer to themselves\
    \ as “Dutch”; that is an English name based on confusion with Germans. In the\
    \ `artists` table, some artists are listed as `Netherlandish`. You should include\
    \ them as well:\n\n```\nSELECT *\nFROM paintings\nWHERE artistid IN (\nSELECT\
    \ id FROM artists\nWHERE nationality='Dutch' OR nationality='Netherlandish'\n\
    );\n```\n\nThis broadens the group:\n\n| id | artistid | title | year | price\
    \ |\n| --- | --- | --- | --- | --- |\n| 541 | 256 | Butcher’s Stall with the Flight\
    \ into Egypt |   | 110.00 |\n| 81 | 198 | The Garden of Earthly Delights |   |\
    \   |\n| 1503 | 182 | Breakfast of Crab | 1648 | 160.00 |\n| 2128 | 370 | The\
    \ Geographer |   | 125.00 |\n| 264 | 370 | Girl with a Pearl Earring | 1666 |\
    \ 140.00 |\n| 1446 | 266 | Entrance to the Public Garden in Arles | 1888 | 115.00\
    \ |\n| ~ 186 rows ~ |\n\nOr using another `IN` expression:\n\n```\nSELECT *\n\
    FROM paintings\nWHERE artistid IN (\nSELECT id FROM artists  WHERE nationality\
    \ IN ('Dutch','Netherlandish')\n);\n```\n\nYou will see more subqueries throughout\
    \ the book. In some cases, there may be an alternative, possibly more efficient,\
    \ way to get the same results, such as joining tables. You will learn about joining\
    \ tables later.\n\n## Wildcard Matches\n\nFor strings, you can broaden your search\
    \ using **wildcard** matching. For example:\n\n```\nSELECT *\nFROM customers\n\
    WHERE familyname LIKE 'Ring%';\n```\n\nThis will select the customers whose family\
    \ name begins with `Ring`.\n\n| id | familyname | givenname | … |\n| --- | ---\
    \ | --- | --- |\n| 90 | Ringer | Belle | … |\n| 309 | Ringing | Belle | … |\n\
    | 165 | Ring | Wanda | … |\n| 164 | Ringing | Isabelle | … |\n| ~ 4 rows ~ |\n\
    \nThe string `Ring%` is no longer a simple string: it is now a **pattern**.\n\n\
    Wildcard matching has two requirements:\n\n*   The `LIKE` keyword is used to indicate\
    \ that what follows is a pattern.\n\n*   The pattern includes special characters.\n\
    \nYou can use `LIKE` without special pattern characters, but then the pattern\
    \ will simply be an exact match. For example:\n\n```\n--  Using LIKE\nSELECT *\n\
    FROM customers\nWHERE familyname LIKE 'Ring';\n--  Same as simple match\nSELECT\
    \ *\nFROM customers\nWHERE familyname='Ring';\n```\n\nNot many customers match\
    \ the string exactly:\n\n| id | familyname | givenname | … |\n| --- | --- | ---\
    \ | --- |\n| `165` | `Ring` | `Wanda` | `…` |\n\nOn the other hand, if you don’t\
    \ use the `LIKE` keyword, pattern character will be simply treated as other ordinary\
    \ characters:\n\n```\nSELECT *\nFROM customers\nWHERE familyname='Ring%';   --\
    \  nobody called Ring%\n```\n\nRemember, depending on your collation, the other\
    \ characters may or may not be case sensitive."
  trans: "### IN 操作符\n\n使用`OR`时，有一种特殊情况。你可能需要测试一个表达式是否精确匹配多个不同的值，例如：\n\n```\n--  Change\
    \ Precedence\nSELECT *\nFROM customers\nWHERE state='VIC' OR state='QLD' OR state='WA';\
    \ --  等等\n```\n\n你将得到以下结果组：\n\n| id | familyname | givenname | state |\n| ---\
    \ | --- | --- | --- |\n| 186 | Gunn | Ray | VIC |\n| 179 | Inkling | Ivan | WA\
    \ |\n| 475 | Blood | Drew | QLD |\n| 523 | Sights | Seymour | VIC |\n| 588 | Skies\
    \ | Grace | QLD |\n| 191 | Moss | Pete | WA |\n| ~ 151 rows ~ |\n\n这里，表达式`state`被测试是否匹配多个值。你可以使用`IN`表达式重写这个测试：\n\
    \n```\nSELECT *\nFROM customers\nWHERE state IN ('VIC','QLD','WA');\n```\n\n使用这个表达式有两个要求：\n\
    \n*   测试是针对单个列或类似表达式的。在此例中，它测试的是`state`列。\n*   测试是针对一个离散的可能性列表的。在此例中，列表是一组州值。\n\
    \n`IN`有两种形式。在这个例子中，你提供了一个括号括起来的硬编码选项列表。用英语说，可以是“where state is in the following\
    \ list:”，或者更自然地，“where state is one of:”。\n\n你的列表也可以包含不匹配的值或重复的值：\n\n```\nSELECT\
    \ *\nFROM customers\nWHERE state IN ('VIC','QLD','VIC','ETC');\n```\n\n查找不存在的值总是可以的，但通常你不会重复一个值。不过，这种问题可能会间接发生，正如你将在后面看到的。\n\
    \n使用`IN`可以方便地反转条件：\n\n```\n--  Change Precedence\nSELECT *\nFROM customers\nWHERE\
    \ state NOT IN ('VIC','QLD','WA');\n```\n\n这将给出其他州的数据：\n\n| id | familyname |\
    \ givenname | state |\n| --- | --- | --- | --- |\n| 474 | Free | Judy | NSW |\n\
    | 144 | King | Ray | NSW |\n| 341 | Idate | Val | NSW |\n| 351 | Tate | Dick |\
    \ NSW |\n| 422 | Why | Wanda | TAS |\n| 429 | Morrow | Tom | NSW |\n| ~ 118 rows\
    \ ~ |   |   |   |\n\n在前面的例子中，列表是一组硬编码的可能值。你也可以将`IN`表达式与由子查询生成的列表一起使用。\n\n### 派生列表\n\
    \n`IN`子句还有第二种更复杂的形式。\n\n例如，假设你想根据单笔销售找到消费最高的客户。问题在于，销售总额在一个表（`sales`）中，而客户详细信息在另一个表（`customers`）中。幸运的是，`sales`表包含重要的`customerid`，它关联回`customers`表。\n\
    \n要得到结果：\n\n1.  从`sales`表中，获取`total`超过某个值的`customerid`。\n2.  从`customers`表中，获取`id`与第一步结果匹配的客户的数据。\n\
    \n对于第一步：\n\n```\nSELECT customerid FROM sales WHERE total>1200\n```\n\n我们得到一个客户\
    \ id 列表：\n\n| **customerid** |\n| 2 |\n| 10 |\n| 19 |\n| 46 |\n| 24 |\n| 69 |\n\
    | ~ 147 rows ~ |\n\n（前面的表达式没有分号，因为它将被合并到下一步中）。\n\n对于第二步，使用`IN`表达式将客户与第一步中的多个值进行匹配：\n\
    \n```\nSELECT *\nFROM customers\nWHERE id IN(SELECT customerid FROM sales WHERE\
    \ total>1200);\n```\n\n这给出了匹配的客户：\n\n| id | familyname | givenname | … | registered\
    \ |\n| --- | --- | --- | --- | --- |\n| 186 | Gunn | Ray | … | 2021-11-15 |\n\
    | 144 | King | Ray | … | 2021-10-18 |\n| 179 | Inkling | Ivan | … | 2021-11-08\
    \ |\n| 351 | Tate | Dick | … | 2022-03-13 |\n| 191 | Moss | Pete | … | 2021-11-19\
    \ |\n| 305 | Net | Clara | … | 2022-01-26 |\n| ~ 106 rows ~ |   |   |   |   |\n\
    \n`IN`子句中的`SELECT`语句被称为**子查询**。原则上，它先被求值，结果用于主查询。\n\n如果你将`IN`与子查询一起使用，有另一种可能更直观的表达式：\n\
    \n```\n--  PostgreSQL, MySQL/MariaDB, MSSQL, Oracle (not SQLite)\nSELECT *\nFROM\
    \ customers\nWHERE id = ANY(SELECT customerid FROM sales\nWHERE total>1200);\n\
    ```\n\n类似地，你可以使用子查询来查找荷兰艺术家的所有画作：\n\n1.  找出`nationality`是 Dutch 的艺术家的`id`。\n2.\
    \  找出`artistid`是前面那些`id`之一的画作：\n\n```\n    --  All SQLs\n    SELECT *\n    FROM\
    \ paintings\n    WHERE artistid IN (SELECT id FROM artists WHERE nationality='Dutch');\n\
    \    --  not SQLite\n    SELECT *\n    FROM paintings\n    WHERE artistid=ANY(SELECT\
    \ id FROM artists\n    WHERE nationality='Dutch');\n```\n\n这应该会给出荷兰艺术家的画作：\n\n\
    | id | artistid | title | year | price |\n| --- | --- | --- | --- | --- |\n| 81\
    \ | 198 | The Garden of Earthly Delights |   |   |\n| 1503 | 182 | Breakfast of\
    \ Crab | 1648 | 160.00 |\n| 2128 | 370 | The Geographer |   | 125.00 |\n| 264\
    \ | 370 | Girl with a Pearl Earring | 1666 | 140.00 |\n| 1446 | 266 | Entrance\
    \ to the Public Garden in Arles | 1888 | 115.00 |\n| 968 | 50 | Basket of Fruits\
    \ | 1622 | 140.00 |\n| ~ 172 rows ~ |\n\n请注意，荷兰人实际上并不自称“Dutch”；那是基于与德国人混淆的英语名称。在`artists`表中，一些艺术家被列为`Netherlandish`。你也应该将他们包括进来：\n\
    \n```\nSELECT *\nFROM paintings\nWHERE artistid IN (\n    SELECT id FROM artists\n\
    \    WHERE nationality='Dutch' OR nationality='Netherlandish'\n);\n```\n\n这扩大了结果组：\n\
    \n| id | artistid | title | year | price |\n| --- | --- | --- | --- | --- |\n\
    | 541 | 256 | Butcher’s Stall with the Flight into Egypt |   | 110.00 |\n| 81\
    \ | 198 | The Garden of Earthly Delights |   |   |\n| 1503 | 182 | Breakfast of\
    \ Crab | 1648 | 160.00 |\n| 2128 | 370 | The Geographer |   | 125.00 |\n| 264\
    \ | 370 | Girl with a Pearl Earring | 1666 | 140.00 |\n| 1446 | 266 | Entrance\
    \ to the Public Garden in Arles | 1888 | 115.00 |\n| ~ 186 rows ~ |\n\n或者使用另一个`IN`表达式：\n\
    \n```\nSELECT *\nFROM paintings\nWHERE artistid IN (\n    SELECT id FROM artists\
    \  WHERE nationality IN ('Dutch','Netherlandish')\n);\n```\n\n你将在本书中看到更多的子查询。在某些情况下，可能会有替代方法，可能更高效，来获得相同的结果，例如连接表。你将在后面学习连接表。\n\
    \n### 通配符匹配\n\n对于字符串，你可以使用`通配符`匹配来扩大搜索范围。例如：\n\n```\nSELECT *\nFROM customers\n\
    WHERE familyname LIKE 'Ring%';\n```\n\n这将选择姓氏以`Ring`开头的客户。\n\n| id | familyname\
    \ | givenname | … |\n| --- | --- | --- | --- |\n| 90 | Ringer | Belle | … |\n\
    | 309 | Ringing | Belle | … |\n| 165 | Ring | Wanda | … |\n| 164 | Ringing | Isabelle\
    \ | … |\n| ~ 4 rows ~ |\n\n字符串`Ring%`不再是一个简单的字符串：它现在是一个`模式`。\n\n通配符匹配有两个要求：\n\n\
    *   使用`LIKE`关键字来表示后面是一个模式。\n*   模式包含特殊字符。\n\n你可以不使用特殊模式字符而使用`LIKE`，但那样模式就只是一个精确匹配。例如：\n\
    \n```\n--  Using LIKE\nSELECT *\nFROM customers\nWHERE familyname LIKE 'Ring';\n\
    --  Same as simple match\nSELECT *\nFROM customers\nWHERE familyname='Ring';\n\
    ```\n\n没有多少客户完全匹配这个字符串：\n\n| id | familyname | givenname | … |\n| --- | --- |\
    \ --- | --- |\n| `165` | `Ring` | `Wanda` | `…` |\n\n另一方面，如果你不使用`LIKE`关键字，模式字符将被视为普通字符：\n\
    \n```\nSELECT *\nFROM customers\nWHERE familyname='Ring%';   --  nobody called\
    \ Ring%\n```\n\n记住，根据你的排序规则，其他字符可能是区分大小写的，也可能不是。"
- fmt: '### 大小写敏感性与模式匹配


    请记住，某些数据库管理系统和数据库是区分大小写的，而另一些则不是。


    对于默认不区分大小写的 MySQL/MariaDB 和 Microsoft SQL Server，你无需担心，可以直接使用小写字母：

    ```sql

    --  MySQL/MariaDB 和 SQL Server

    SELECT *

    FROM customers

    WHERE familyname LIKE ''ring%'';  --  也适用于 ''Ring%''

    ```


    SQLite 默认也可能执行不区分大小写的匹配。


    对于其他数据库，你可以通过转换大小写（转换为大写或小写）来模拟不区分大小写的匹配：

    ```sql

    --  适用于所有 DBMS:

    SELECT *

    FROM customers

    WHERE lower(familyname) LIKE ''ring%'';   --  也适用于 ''Ring%''

    ```


    PostgreSQL 有 `ILIKE` 操作符，专门用于不区分大小写的匹配：

    ```sql

    --  PostgreSQL

    SELECT *

    FROM customers

    WHERE familyname ILIKE ''ring%''; --  也适用于 ''Ring%''

    ```


    在本章的剩余部分，我们将简单地使用 `LIKE` 并假定其进行不区分大小写的匹配。


    ### 模式字符


    标准 SQL 有两个主要的模式字符，如表 [3-4](#601766_1_En_3_Chapter.xhtml#Tab4) 所示。


    表 3-4 通配符字符


    | 字符 | 含义 | 文件通配符 (File Glob) |

    | --- | --- | --- |

    | `%` | **零个**或**多个**字符 | `*` |

    | `_` | 恰好**一个**字符 | `?` |


    “文件通配符”列显示了如果你在操作系统中尝试使用模式匹配来查找文件时会使用的字符；“glob”是模式匹配的极客术语。你不能在 SQL 中使用那些字符，这里只是作为比较。没人知道为什么
    SQL 不使用它们。


    注意，`%` 通配符匹配 **零个** 或更多字符。这意味着可能有也可能没有其他字符。例如：

    ```sql

    --  所有 DBMS

    SELECT *

    FROM customers

    WHERE lower(familyname) LIKE ''ring%'';

    --  不区分大小写的 DBMS：MSSQL, MySQL / MariaDB

    SELECT *

    FROM customers

    WHERE familyname LIKE ''ring%'';

    --  PostgreSQL

    SELECT *

    FROM customers

    WHERE familyname ILIKE ''ring%'';

    ```


    这将匹配任何姓氏以 `Ring` **开头**的人，即使后面没有其他字符。


    另一个通配符字符 `_` 匹配**恰好一个**字符。这种匹配可用于填字游戏。例如：

    ```sql

    SELECT *

    FROM customers

    WHERE familyname LIKE ''R__e'';   --  Rate, Rise, Rice, Rowe

    ```


    这会给你四字符的字符串，其中两个是模糊的：


    | id | familyname | givenname | … |

    | --- | --- | --- | --- |

    | 537 | Rise | Theo | … |

    | 359 | Rice | Jasmin | … |

    | 551 | Rowe | Mike | … |

    | 536 | Rate | Amelia | … |


    注意下划线 (`_`) 字符。由于历史原因，它比普通字符稍宽，所以相邻的下划线实际上会接触。这使得如果你连续使用超过两个下划线，数起来会有点困难。


    一些等宽字体，如 Source Code Pro，为此设计了稍窄的下划线。


    当你组合两个通配符时，就创建了“至少”的含义。例如：

    ```sql

    --  至少 4 个字符，以 S 开头：

    SELECT *

    FROM customers

    WHERE familyname LIKE ''S___%'';

    ```


    以下是一些使用 `%` 通配符的更多示例及其英文说明：

    ```sql

    --  以 Ring 开头

    SELECT *

    FROM customers

    WHERE familyname LIKE ''Ring%'';

    --  以 ring 结尾

    SELECT *

    FROM customers

    WHERE lower(familyname) LIKE ''%ring'';

    --  包含 ring

    SELECT *

    FROM customers

    WHERE lower(familyname) LIKE ''%ring%'';

    --  以 S 开头并以 e 结尾

    SELECT *

    FROM customers

    WHERE familyname LIKE ''S%e'';

    ```


    你会注意到，当匹配位置可以是任意位置时，我们使用了 `lower()` 函数以确保安全。对于不区分大小写的数据库，这不是必需的。


    使用 `_` 通配符：

    ```sql

    --  完全包含 s

    SELECT *

    FROM customers

    WHERE familyname LIKE ''%_s_%'';

    --  恰好 4 个字符

    SELECT *

    FROM customers

    WHERE familyname LIKE ''____'';

    --  恰好 4 个字符，以 R 开头

    SELECT *

    FROM customers

    WHERE familyname LIKE ''R___'';

    --  至少 4 个字符

    SELECT *

    FROM customers

    WHERE familyname LIKE ''____%'';

    --  至少 4 个字符，以 S 开头

    SELECT *

    FROM customers

    WHERE familyname LIKE ''S___%'';

    ```


    使用这两个通配符，你可以在字符串数据上执行相当灵活的搜索。然而，有时你还需要搜索其他类型的数据。


    ### 非字符串数据的通配符


    通常，通配符旨在用于 **字符串**。然而，如果数据可以转换为字符串，某些数据库管理系统对使用通配符的限制较少。


    例如，对数字使用通配符：

    ```sql

    --  MySQL/MariaDB, SQLite, MSSQL, Oracle - NOT PostgreSQL

    SELECT *

    FROM customers

    WHERE height LIKE ''17%'';

    ```


    这会给你身高在 170s 范围内的记录：


    | id | familyname | givenname | height |

    | --- | --- | --- | --- |

    | 144 | King | Ray | 176.8 |

    | 179 | Inkling | Ivan | 170.3 |

    | 475 | Blood | Drew | 171.0 |

    | 341 | Idate | Val | 177.1 |

    | 588 | Skies | Grace | 171.5 |

    | 191 | Moss | Pete | 172.3 |

    | ~ 114 行 ~ |


    在上述 DBMS 中，只有 PostgreSQL 对数据类型足够严格，会禁止这种比较并生成错误。


    你可能也会在日期上取得一些成功：


    | id | familyname | givenname | dob |

    | --- | --- | --- | --- |

    | 474 | Free | Judy | 1978-04-01 |

    | 475 | Blood | Drew | 1989-12-06 |

    | 523 | Sights | Seymour | 1965-01-06 |

    | 341 | Idate | Val | 1976-06-04 |

    | 351 | Tate | Dick | 1969-08-03 |

    | 588 | Skies | Grace | 1999-06-28 |

    | ~ 206 行 ~ |


    ```sql

    --  MySQL/MariaDB, SQLite*, MSSQL, Oracle* - NOT PostgreSQL

    SELECT *

    FROM customers

    WHERE dob LIKE ''19%'';

    ```


    在上述 DBMS 中，再次只有 PostgreSQL 禁止这种比较。然而，请注意：

    *   SQLite 没有真正的日期类型，并且本示例中的日期是作为字符串存储的。

    *   Oracle 的默认日期格式以日号开始，因此它将尝试匹配日号以 `19` 开头的日期。


    如果你想让这个功能在 PostgreSQL 中工作，你可以将值 **转换** 为字符串。从技术上讲，这本来就是你应该做的；只是某些 DBMS 会自动完成：

    ```sql

    SELECT *

    FROM customers

    WHERE cast(height AS VARCHAR(255)) LIKE ''17%'';

    SELECT *

    FROM customers

    WHERE cast(dob AS VARCHAR(255)) LIKE ''19%'';

    ```


    请注意：

    *   `VARCHAR` 是 SQL 中字符串的术语。

    *   `cast()` 将数据从一种类型更改为另一种类型。

    *   PostgreSQL 有一个更短的操作符 (`::`) 用于类型转换，但也会使用较长的版本。


    在后面的章节中，你会看到更多关于类型转换的内容。


    ### 通配符的扩展


    大多数情况下，这两个通配符就足够了。然而，一些 DBMS 提供了扩展，允许你微调匹配。


    许多 DBMS 提供 **正则表达式**，这是一种非常复杂的模式匹配语法。有些，如 MSSQL，只是扩展了 `LIKE` 子句可用的语法；这将在下一节中介绍。


    以下是一些实现。'
  raw: '### Case Sensitivity and Patterns


    Remember that some DBMSs and some databases are case sensitive and some are not.


    For MySQL/MariaDB and Microsoft SQL Server, which are, by default, case insensitive,
    you don’t need to worry, so you can just as readily use lower case:


    ```

    --  MySQL/MariaDB and SQL Server

    SELECT *

    FROM customers

    WHERE familyname LIKE ''ring%'';  --  also ''Ring%''

    ```


    SQLite may also perform a case-insensitive match by default.


    For the others, you can emulate case-insensitive matching by folding the case
    (converting to upper or lower case):


    ```

    --  All DBMSs:

    SELECT *

    FROM customers

    WHERE lower(familyname) LIKE ''ring%'';   --  also ''Ring%''

    ```


    PostgreSQL has the `ILIKE` operator which is for case-insensitive matches:


    ```

    --  PostgreSQL

    SELECT *

    FROM customers

    WHERE familyname ILIKE ''ring%''; --  also ''Ring%''

    ```


    For the rest of this chapter, we will simply use `LIKE` and presume a case-insensitive
    match.


    ### Pattern Characters


    Standard SQL has two main pattern characters shown in Table [3-4](#601766_1_En_3_Chapter.xhtml#Tab4).


    Table 3-4


    Wildcard Characters


    | Character | Meaning | File Glob |

    | --- | --- | --- |

    | `%` | **Zero** or **more** characters | `*` |

    | `_` | Exactly **one** character | `?` |


    The column “File Glob” shows the character you would use on your operating system
    if you were trying to use pattern matching when looking for files; “glob” is geek
    speak for pattern matching. You can’t use those characters in SQL, but it’s there
    for comparison. Nobody knows why SQL doesn’t use them.


    Note that the `%` wildcard matches *zero* or more characters. This means that
    there may or may not be additional characters. For example:


    ```

    --  All DBMSs

    SELECT *

    FROM customers

    WHERE lower(familyname) LIKE ''ring%'';

    --  Case Insensitive DBMSs: MSSQL, MySQL / MariaDB

    SELECT *

    FROM customers

    WHERE familyname LIKE ''ring%'';

    --  PostgreSQL

    SELECT *

    FROM customers

    WHERE familyname ILIKE ''ring%'';

    ```


    This will yield anybody whose family name *starts* with `Ring`, even if there’s
    no more after that.


    The other wildcard character `_` matches *exactly one* character. It’s the sort
    of match you might use for crosswords. For example:


    ```

    SELECT *

    FROM customers

    WHERE familyname LIKE ''R__e'';   --  Rate, Rise, Rice, Rowe

    ```


    This gives you four-character strings, two of which are wild:


    | id | familyname | givenname | … |

    | --- | --- | --- | --- |

    | 537 | Rise | Theo | … |

    | 359 | Rice | Jasmin | … |

    | 551 | Rowe | Mike | … |

    | 536 | Rate | Amelia | … |


    Watch out for the underscore (`_`) character. For historical reasons, it’s a little
    wider than ordinary characters, so adjacent underscores actually touch. That makes
    it a little difficult to count if you’ve got more than, say, two in a row.


    Some coding fonts, such as Source Code Pro, have a slightly narrower underscore
    for this reason.


    When you combine both wildcard characters, you create the sense of *at least*.
    For example:


    ```

    --  At least 4 characters, starting with S:

    SELECT *

    FROM customers

    WHERE familyname LIKE ''S___%'';

    ```


    Here are some more examples using the `%` wildcard, with their English translations:


    ```

    --  Begins with Ring

    SELECT *

    FROM customers

    WHERE familyname LIKE ''Ring%'';

    --  Ends with ring

    SELECT *

    FROM customers

    WHERE lower(familyname) LIKE ''%ring'';

    --  Contains ring

    SELECT *

    FROM customers

    WHERE lower(familyname) LIKE ''%ring%'';

    --  Begins with S and Ends with e

    SELECT *

    FROM customers

    WHERE familyname LIKE ''S%e'';

    ```


    You’ll note that where the position of the match could be anywhere, we used the
    `lower()` function to be safe. For case-insensitive databases, that’s not necessary.


    And using the `_` wildcard:


    ```

    --  Wholly Contains s

    SELECT *

    FROM customers

    WHERE familyname LIKE ''%_s_%'';

    --  Exactly 4 characters

    SELECT *

    FROM customers

    WHERE familyname LIKE ''____'';

    --  Exactly 4 characters, starting with R

    SELECT *

    FROM customers

    WHERE familyname LIKE ''R___'';

    --  At least 4 characters

    SELECT *

    FROM customers

    WHERE familyname LIKE ''____%'';

    --  At least 4 characters, starting with S

    SELECT *

    FROM customers

    WHERE familyname LIKE ''S___%'';

    ```


    Using these two wildcard characters, you can perform some rather flexible searches
    on string data. Sometimes, however, you also need to search other types of data.


    ### Wildcards with Non-strings


    Generally, wildcards are meant to be used with *strings*. However, some DBMSs
    are more relaxed with using wildcards if the data can be converted to a string.


    For example, using a wildcard with numbers:


    ```

    --  MySQL/MariaDB, SQLite, MSSQL, Oracle - NOT PostgreSQL

    SELECT *

    FROM customers

    WHERE height LIKE ''17%'';

    ```


    This gives you heights in the 170s:


    | id | familyname | givenname | height |

    | --- | --- | --- | --- |

    | 144 | King | Ray | 176.8 |

    | 179 | Inkling | Ivan | 170.3 |

    | 475 | Blood | Drew | 171.0 |

    | 341 | Idate | Val | 177.1 |

    | 588 | Skies | Grace | 171.5 |

    | 191 | Moss | Pete | 172.3 |

    | ~ 114 rows ~ |


    Of the preceding DBMSs, only PostgreSQL is strict enough about data types to disallow
    the comparison and will generate an error.


    You may also have some success with dates:


    | id | familyname | givenname | dob |

    | --- | --- | --- | --- |

    | 474 | Free | Judy | 1978-04-01 |

    | 475 | Blood | Drew | 1989-12-06 |

    | 523 | Sights | Seymour | 1965-01-06 |

    | 341 | Idate | Val | 1976-06-04 |

    | 351 | Tate | Dick | 1969-08-03 |

    | 588 | Skies | Grace | 1999-06-28 |

    | ~ 206 rows ~ |


    ```

    --  MySQL/MariaDB, SQLite*, MSSQL, Oracle* - NOT PostgreSQL

    SELECT *

    FROM customers

    WHERE dob LIKE ''19%'';

    ```


    Of the preceding DBMSs, again only PostgreSQL disallows the comparison. However,
    note


    *   SQLite doesn’t have a proper date type, and the date in this example is stored
    as string anyway.


    *   Oracle’s default date format starts with the day number, so it will attempt
    to match dates whose day number starts with `19`.


    If you want this to work with PostgreSQL, you can **cast** the values to strings.
    Technically, this is what you should be doing anyway; it’s just that some DBMSs
    do this automatically:


    ```

    SELECT *

    FROM customers

    WHERE cast(height AS VARCHAR(255)) LIKE ''17%'';

    SELECT *

    FROM customers

    WHERE cast(dob AS VARCHAR(255)) LIKE ''19%'';

    ```


    Note that


    *   `VARCHAR` is the SQL term for string.


    *   `cast()` changes the data from one type to another.


    *   PostgreSQL has a shorter operator (`::`) for casting, but will also use the
    longer version.


    You will see more of casting types in a later chapter.


    ### Extensions to Wildcards


    Most of the time, these two wildcards will do. However, some DBMSs offer extensions
    which allow you to fine-tune your match.


    Many DBMSs offer **Regular Expressions**, which is a very sophisticated pattern
    matching syntax. Some, such as MSSQL, simply extend the syntax available with
    the `LIKE` clause; this is covered in the next section.


    Here are some implementations.'
  trans: '

    ### 大小写敏感性与模式匹配


    请记住，某些数据库管理系统（DBMS）和数据库是区分大小写的，而另一些则不是。


    对于默认不区分大小写的 MySQL/MariaDB 和 Microsoft SQL Server，你无需担心，可以直接使用小写字母：

    ```sql

    --  MySQL/MariaDB 和 SQL Server

    SELECT *

    FROM customers

    WHERE familyname LIKE ''ring%'';  --  也适用于 ''Ring%''

    ```


    SQLite 默认也可能执行不区分大小写的匹配。


    对于其他数据库，你可以通过转换大小写（转换为大写或小写）来模拟不区分大小写的匹配：

    ```sql

    --  适用于所有 DBMS:

    SELECT *

    FROM customers

    WHERE lower(familyname) LIKE ''ring%'';   --  也适用于 ''Ring%''

    ```


    PostgreSQL 有 `ILIKE` 操作符，专门用于不区分大小写的匹配：

    ```sql

    --  PostgreSQL

    SELECT *

    FROM customers

    WHERE familyname ILIKE ''ring%''; --  也适用于 ''Ring%''

    ```


    在本章的剩余部分，我们将简单地使用 `LIKE` 并假定其进行不区分大小写的匹配。


    ### 模式字符


    标准 SQL 有两个主要的模式字符，如表 3-4 所示。


    表 3-4 通配符字符


    | 字符 | 含义 | 文件通配符 (File Glob) |

    | --- | --- | --- |

    | `%` | **零个**或**多个**字符 | `*` |

    | `_` | 恰好**一个**字符 | `?` |


    “文件通配符”列显示了如果你在操作系统中尝试使用模式匹配来查找文件时会使用的字符；“glob”是模式匹配的极客术语。你不能在 SQL 中使用那些字符，这里只是作为比较。没人知道为什么
    SQL 不使用它们。


    注意，`%` 通配符匹配 **零个** 或更多字符。这意味着可能有也可能没有其他字符。例如：

    ```sql

    --  所有 DBMS

    SELECT *

    FROM customers

    WHERE lower(familyname) LIKE ''ring%'';

    --  不区分大小写的 DBMS：MSSQL, MySQL / MariaDB

    SELECT *

    FROM customers

    WHERE familyname LIKE ''ring%'';

    --  PostgreSQL

    SELECT *

    FROM customers

    WHERE familyname ILIKE ''ring%'';

    ```


    这将匹配任何姓氏以 `Ring` **开头**的人，即使后面没有其他字符。


    另一个通配符字符 `_` 匹配**恰好一个**字符。这种匹配可用于填字游戏。例如：

    ```sql

    SELECT *

    FROM customers

    WHERE familyname LIKE ''R__e'';   --  Rate, Rise, Rice, Rowe

    ```


    这会给你四字符的字符串，其中两个是模糊的：


    | id | familyname | givenname | … |

    | --- | --- | --- | --- |

    | 537 | Rise | Theo | … |

    | 359 | Rice | Jasmin | … |

    | 551 | Rowe | Mike | … |

    | 536 | Rate | Amelia | … |


    注意下划线 (`_`) 字符。由于历史原因，它比普通字符稍宽，所以相邻的下划线实际上会接触。这使得如果你连续使用超过两个下划线，数起来会有点困难。


    一些等宽字体，如 Source Code Pro，为此设计了稍窄的下划线。


    当你组合两个通配符时，就创建了“至少”的含义。例如：

    ```sql

    --  至少 4 个字符，以 S 开头：

    SELECT *

    FROM customers

    WHERE familyname LIKE ''S___%'';

    ```


    以下是一些使用 `%` 通配符的更多示例及其英文说明：

    ```sql

    --  以 Ring 开头

    SELECT *

    FROM customers

    WHERE familyname LIKE ''Ring%'';

    --  以 ring 结尾

    SELECT *

    FROM customers

    WHERE lower(familyname) LIKE ''%ring'';

    --  包含 ring

    SELECT *

    FROM customers

    WHERE lower(familyname) LIKE ''%ring%'';

    --  以 S 开头并以 e 结尾

    SELECT *

    FROM customers

    WHERE familyname LIKE ''S%e'';

    ```


    你会注意到，当匹配位置可以是任意位置时，我们使用了 `lower()` 函数以确保安全。对于不区分大小写的数据库，这不是必需的。


    使用 `_` 通配符：

    ```sql

    --  完全包含 s

    SELECT *

    FROM customers

    WHERE familyname LIKE ''%_s_%'';

    --  恰好 4 个字符

    SELECT *

    FROM customers

    WHERE familyname LIKE ''____'';

    --  恰好 4 个字符，以 R 开头

    SELECT *

    FROM customers

    WHERE familyname LIKE ''R___'';

    --  至少 4 个字符

    SELECT *

    FROM customers

    WHERE familyname LIKE ''____%'';

    --  至少 4 个字符，以 S 开头

    SELECT *

    FROM customers

    WHERE familyname LIKE ''S___%'';

    ```


    使用这两个通配符，你可以在字符串数据上执行相当灵活的搜索。然而，有时你还需要搜索其他类型的数据。


    ### 非字符串数据的通配符


    通常，通配符旨在用于 **字符串**。然而，如果数据可以转换为字符串，某些数据库管理系统对使用通配符的限制较少。


    例如，对数字使用通配符：

    ```sql

    --  MySQL/MariaDB, SQLite, MSSQL, Oracle - NOT PostgreSQL

    SELECT *

    FROM customers

    WHERE height LIKE ''17%'';

    ```


    这会给你身高在 170s 范围内的记录：


    | id | familyname | givenname | height |

    | --- | --- | --- | --- |

    | 144 | King | Ray | 176.8 |

    | 179 | Inkling | Ivan | 170.3 |

    | 475 | Blood | Drew | 171.0 |

    | 341 | Idate | Val | 177.1 |

    | 588 | Skies | Grace | 171.5 |

    | 191 | Moss | Pete | 172.3 |

    | ~ 114 行 ~ |


    在上述 DBMS 中，只有 PostgreSQL 对数据类型足够严格，会禁止这种比较并生成错误。


    你可能也会在日期上取得一些成功：


    | id | familyname | givenname | dob |

    | --- | --- | --- | --- |

    | 474 | Free | Judy | 1978-04-01 |

    | 475 | Blood | Drew | 1989-12-06 |

    | 523 | Sights | Seymour | 1965-01-06 |

    | 341 | Idate | Val | 1976-06-04 |

    | 351 | Tate | Dick | 1969-08-03 |

    | 588 | Skies | Grace | 1999-06-28 |

    | ~ 206 行 ~ |


    ```sql

    --  MySQL/MariaDB, SQLite*, MSSQL, Oracle* - NOT PostgreSQL

    SELECT *

    FROM customers

    WHERE dob LIKE ''19%'';

    ```


    在上述 DBMS 中，再次只有 PostgreSQL 禁止这种比较。然而，请注意：

    *   SQLite 没有真正的日期类型，并且本示例中的日期是作为字符串存储的。

    *   Oracle 的默认日期格式以日号开始，因此它将尝试匹配日号以 `19` 开头的日期。


    如果你想让这个功能在 PostgreSQL 中工作，你可以将值 **转换** 为字符串。从技术上讲，这本来就是你应该做的；只是某些 DBMS 会自动完成：

    ```sql

    SELECT *

    FROM customers

    WHERE cast(height AS VARCHAR(255)) LIKE ''17%'';

    SELECT *

    FROM customers

    WHERE cast(dob AS VARCHAR(255)) LIKE ''19%'';

    ```


    请注意：

    *   `VARCHAR` 是 SQL 中字符串的术语。

    *   `cast()` 将数据从一种类型更改为另一种类型。

    *   PostgreSQL 有一个更短的操作符 (`::`) 用于类型转换，但也会使用较长的版本。


    在后面的章节中，你会看到更多关于类型转换的内容。


    ### 通配符的扩展


    大多数情况下，这两个通配符就足够了。然而，一些 DBMS 提供了扩展，允许你微调匹配。


    许多 DBMS 提供 **正则表达式**，这是一种非常复杂的模式匹配语法。有些，如 MSSQL，只是扩展了 `LIKE` 子句可用的语法；这将在下一节中介绍。


    以下是一些实现。

    '
- fmt: '#### Regular Expressions (PostgreSQL, MySQL/MariaDB, Oracle)


    Regular Expressions give you more precise control over matching individual characters.


    For example, to find family names which start with the letters `A - K`, but are
    *not* followed by `h` or `y`, you would use the pattern `^[A-K][^hy]`:


    *   The first `^` starts at the beginning of the string.

    *   `[A-K]` matches any character in the `range` from `A` to `K` inclusive.

    *   `[^hy]` does *not* (`^`) match any of the characters `h`, `y`.


    Using Regular Expressions varies between DBMSs. To match the preceding pattern:


    ```sql

    --  PostgreSQL

    SELECT *

    FROM customers

    WHERE familyname ~ ''^[A-K][^hy].*'';

    --  MariaDB/MySQL

    SELECT *

    FROM customers

    WHERE familyname REGEXP ''^[A-K][^hy]'';

    --  Oracle

    SELECT *

    FROM customers

    WHERE REGEXP_LIKE(familyname,''[A-K][^hy].*'');

    ```


    The results look like this:


    | id | familyname | givenname | … | registered |

    | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | 2022-06-12 |

    | 186 | Gunn | Ray | … | 2021-11-15 |

    | 144 | King | Ray | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | 2021-11-08 |

    | 475 | Blood | Drew | … | 2022-06-13 |

    | 341 | Idate | Val | … | 2022-03-03 |

    | ~ 147 rows ~ |   |   |   |   |


    Regular Expressions can get very complex and are not for the fainthearted. You’ll
    also find that they are rarely needed in day-to-day SQL.


    #### Simpler Extensions (PostgreSQL, MSSQL)


    Microsoft SQL doesn’t natively support Regular Expressions, but it offers a simpler
    variation. Using the (square) `brackets` (`[ … ]`) wildcard with the `LIKE` keyword,
    it takes the following forms:


    *   `[abcde]`: Any one of the individual characters inside brackets

    *   `[a-e]`: Any one character in the `range` from the first to the last

    *   `[^abcde]`, `[^a-e]`: Any character which does *not* match what follows


    ```sql

    SELECT *

    FROM customers

    WHERE familyname LIKE ''[a-k][^hy]%'';

    ```


    Note that MSSQL is normally case insensitive, and using lower case will also match
    capital letters.


    PostgreSQL does support Regular Expressions, but it also offers a simpler variation
    using `SIMILAR TO`:


    ```sql

    SELECT *

    FROM customers

    WHERE familyname SIMILAR TO ''[A-K][^hy]%'';

    ```


    Note that PostgreSQL is normally case sensitive, so the first character is in
    upper case, while the second is in lower case. Of course, you can use the `lower()`
    function and just use lower case.


    ### A Simple Pattern Match Example


    When all is said and done, you will get most use out of the simple `%` wildcard.
    For example, if you want to find the paintings with the word `portrait` in the
    title:


    ```sql

    SELECT * FROM paintings

    WHERE title LIKE ''%portrait%'';

    --  WHERE lower(title) LIKE ''%portrait%'';

    ```


    These are the candidates:


    | id | artistid | title | year | price |

    | --- | --- | --- | --- | --- |

    | 2023 | 58 | Self-Portrait | 1925 |   |

    | 1989 |   | Portrait of Trabuc | 1889 | 160.00 |

    | 2178 | 102 | Portrait of Hieronymus Holzschuher | 1526 | 145.00 |

    | 2244 | 346 | Model with Unfinished Self-Portrait | 1977 | 135.00 |

    | 815 | 108 | Portrait of a Cardinal | 1600 | 155.00 |

    | 1491 | 333 | Portrait of Sarah Swaim Chase (The Artist’s Mother) | 1892 | 190.00
    |

    | ~ 100 rows ~ |


    If you want to match *self portrait*, you will need to allow for the fact that
    sometimes there’s a space and sometimes there’s a hyphen. You can do that with
    the `_` wildcard:


    ```sql

    SELECT * FROM paintings

    WHERE title LIKE ''%self_portrait%'';

    --  WHERE lower(title) LIKE ''%self_portrait%''

    ```


    This narrows down the results:


    | id | artistid | title | year | price |

    | --- | --- | --- | --- | --- |

    | 2023 | 58 | Self-Portrait | 1925 |   |

    | 2244 | 346 | Model with Unfinished Self-Portrait | 1977 | 135.00 |

    | 625 |   | Self-portrait |   | 160.00 |

    | 2133 | 102 | Self-Portrait at 26 | 1498 | 115.00 |

    | 1944 | 233 | Self Portrait with black Vase | 1911 | 105.00 |

    | 1054 |   | Self-Portrait | 1889 | 150.00 |

    | ~ 35 rows ~ |


    Note that if you’re really looking for portraits, this isn’t quite enough. Some
    of the most famous portraits, such as the *Mona Lisa* and the *Girl with a Pearl
    Earring*, will slip through the search.


    To really facilitate searching for categories of paintings, you would need to
    have additional columns, and possibly additional tables, to maintain the categories.


    ## Summary


    When you have a large number of rows, you can filter them using the `WHERE` clause.
    The `WHERE` clause is followed by one or more assertions which evaluate either
    to `true` or `false`, determining whether a particular row is to be included in
    the result set.


    The syntax for the `WHERE` clause is


    ```sql

    SELECT columns

    FROM table

    WHERE conditions;

    ```


    The conditions are one or more assertions, expressions which evaluate to `true`
    or `false`.


    Normally, the assertions are related to column data. However, any unrelated assertion
    will also work, though you will probably get either the whole table or nothing.


    ### `NULL`


    `NULL` represents a missing value, so testing it is tricky.


    *   `NULL`s will *always* fail a comparison, such as `=`.

    *   Testing for `NULL` requires the special expression `IS NULL` or `IS NOT NULL`.


    ### Numbers


    Number literals are represented bare: they do not have any form of quotes.


    *   Numbers are compared in number line order and can be filtered using the basic
    comparison operators.

    *   When filtering continuous values, you need to remember to use equality comparisons
    (`<=` or `>=`) to include in-between values.


    ### Strings


    String literals are in single quotes. Some DBMSs also allow double quotes, but
    double quotes are more correctly used for names rather than values.


    *   In some DBMSs and databases, upper and lower case may not match.

    *   Trailing spaces should be ignored, but aren’t always.

    *   Nesting single quotes requires two consecutive single quotes: `''Don''''t
    do that''`.


    ### Dates


    Date literals are also in single quotes.


    *   The preferred date format is ISO 8601 (`yyyy-mm-dd`).

    *   Most DBMSs allow alternative formats, but you should avoid the `??/??/yyyy`
    format.

    *   Dates are compared in historical order.


    ### Multiple Assertions


    You can combine multiple assertions with the logical `AND` and `OR` operators.
    If you combine them, `AND` takes precedence over `OR`.


    ### The `IN` Operator


    The `IN` operator will match from a list. It can also be used with a subquery
    which generates a single column of values.


    ### Wildcard Matches


    Strings can be compared more loosely using wildcard patterns and the `LIKE` operator.


    *   Wildcards include special pattern characters.

    *   Some DBMSs allow you to use `LIKE` with non-string data, implicitly converting
    them to strings for comparison.

    *   Some DBMSs supplement the standard wildcard characters with additional characters.

    *   Some DBMSs support Regular Expressions, which are more sophisticated than
    regular wildcard pattern matching.


    ## Coming Up


    The result sets so far have been unordered. From a data point of view, that’s
    fine, and SQL will regard two result sets as the same if their only difference
    is row order.


    Occasionally, however, you will want to specify the result order, which is what
    we’ll be doing in the next chapter.


