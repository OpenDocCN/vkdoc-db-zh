- fmt: "## Data Types\n\nWhich comes first? January or February? If that looks like\
    \ a trick question, it is. The answer depends on whether we are talking about\
    \ dates or words.\n\nIn SQL, there are various types of data, but most of the\
    \ types are variations on three core types:\n\n*   `Numbers` measure or count\
    \ something.\n\n*   `Dates` mark a point in time.\n\n*   `Strings` are any miscellaneous\
    \ text—they are strings of characters; SQL also refers to this as `character`\
    \ data.\n\nThe following table, `sorting`, has examples of the different types:\n\
    \n```sql\nSELECT * FROM sorting;\n```\n\nIf you examine the SQL statements which\
    \ define the table, you will see the following broad data types:\n\n| column |\
    \ type |\n| --- | --- |\n| id | number |\n| numbervalue | number |\n| datevalue\
    \ | date |\n| stringvalue | string |\n| datestring | string |\n| numberstring\
    \ | string |\n| numbername, fullname, email, firstname, lastname | string |\n\n\
    Two columns, `datestring` and `numberstring`, have the date and numbers stored\
    \ as strings instead of the more suitable type.\n\nData types are important for\
    \ ensuring that the data is valid, but it is also important in determining sort\
    \ order:\n\n*   Numbers are, of course, sorted in `numeric` order; negative numbers\
    \ are lower than positive numbers.\n\n*   Dates are sorted in `historical` order,\
    \ with older dates before newer dates.\n\n    Note that in most DBMSs, the date\
    \ normally appears in `yyyy-mm-dd` format, more correctly known as `ISO 8601`\
    \ format; Oracle normally uses a different format. You can change the format using\
    \ various functions.\n\n*   Strings are sorted in `alphabetical` order.\n\n  \
    \  Note that some of the strings begin with upper case, while some start with\
    \ lower case. `Depending on your DBMS and collation, these may be sorted together\
    \ or separately.`\n\nThe fact that data type influences sort order is one reason\
    \ why it’s important to get the data type correct when designing a database. Sometimes,\
    \ it is tempting to cheat and store all the data as a string, which will accept\
    \ any type of value. However, that will make a mess of the sort order.\n\nFor\
    \ example:\n\n```sql\n--  sorted as number\nSELECT * FROM sorting ORDER BY numbervalue;\n\
    --  sorted as string\nSELECT * FROM sorting ORDER BY numberstring;\n```\n\nYou\
    \ will see that the string version is sorted strictly in alphabetical order, from\
    \ left to right, while the suitably typed version is sorted more appropriately.\n\
    \n| id | numberstring |\n| --- | --- |\n| 3 | 0 |\n| 8 | 1024 |\n| 5 | 16 |\n\
    | 2 | 32 |\n| 1 | -4 |\n| 4 | 4 |\n| 7 | -8 |\n| 6 | 8 |\n\nIf you have a column\
    \ full of strings which *are supposed to be* numbers, you can use the `cast` function:\n\
    \n```sql\n--  sorted as number\nSELECT * FROM sorting ORDER BY cast(numberstring\
    \ as int);\n```\n\nThe `cast` function changes the data type to another. Here,\
    \ the type is set to `INT`, which is short for `INTEGER`. Once the data has been\
    \ cast, it will sort accordingly.\n\nYou can do the same with dates:\n\n```sql\n\
    --  sorted as date\nSELECT * FROM sorting ORDER BY datevalue;\n--  sorted as string\n\
    SELECT * FROM sorting ORDER BY datestring;\n--  sorted as date\nSELECT * FROM\
    \ sorting ORDER BY cast(datestring as date);\n```\n\nUsing `cast()`, you’ll see\
    \ the results in proper date order:\n\n| id | dateString |\n| --- | --- |\n| 1\
    \ | 10 Dec 1815 |\n| 4 | 12 May 1820 |\n| 3 | 13 Sep 1819 |\n| 5 | 15 Sep 1890\
    \ |\n| 8 | 16 Dec 1775 |\n| 2 | 29 Sep 1794 |\n| 6 | 30 Jun 1917 |\n| 7 | 7 Nov\
    \ 1867 |\n\nYou will see more on `cast()` later.\n\nThe `cast()` function has\
    \ a tendency to overreact when faced with values which don’t look like numbers.\
    \ MySQL/MariaDB and SQLite will return `0`. SQL Server has a `try_cast()` function\
    \ which will return `NULL`. Oracle has an option to return some value on error.\
    \ PostgreSQL and SQL Server return fatal errors on the `cast()` function. PostgreSQL\
    \ has no friendly alternative, but it’s easy to write a function.\n\n### Case\
    \ Sensitivity and Collation\n\nIf you run the following:\n\n```sql\nSELECT * FROM\
    \ sorting ORDER BY stringvalue;\n```\n\nyour results may vary from DBMS to DBMS\
    \ and from database to database. For example:\n\n| id | stringvalue |\n| --- |\
    \ --- |\n| 1 | apple |\n| 6 | Apple |\n| 7 | banana |\n| 5 | Banana |\n| 3 | cherry\
    \ |\n| 2 | Cherry |\n| 4 | date |\n| 8 | Date |\n| ~ 8 rows ~ |\n\nOne thing which\
    \ can affect your results is whether the data is treated as case sensitive or\
    \ case insensitive, that is, whether or not upper and lower case are regarded\
    \ as same. How the DBMS regards upper and lower case, as well as accented variations\
    \ on letters, is called the `collation`.\n\nBroadly speaking, collation refers\
    \ to how variations on the same letter are treated. This includes whether these\
    \ variations are treated as the same character and, if not, which comes before\
    \ which.\n\nThe two main variations to be considered are\n\n*   Case: Upper and\
    \ lower case\n\n*   Accents: Accented variations such as `e`, `é`, `ê`, and `è`\
    \ in French\n\nHow the data is collated in your table is affected by\n\n*   The\
    \ default collation of the DBMS\n\n*   The assigned collection (if any) of a table\
    \ or column\n\n*   An optional `COLLATE` clause after the `ORDER BY` clause\n\n\
    The issue of case sensitivity is also important when filtering data, since it\
    \ affects whether strings match."
