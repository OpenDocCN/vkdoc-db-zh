  trans: "\n## 数字汇总\n\n在处理数字时，还有一些额外的聚合函数非常有用：\n\n```\nSELECT\ncount(height) as heights,\n\
    sum(height) AS total,\navg(height) AS average,\nsum(height)/count(height) AS computed_average\n\
    FROM customers;\n```\n\n这会给出一些统计结果：\n\n| heights | total | average | computed_average\
    \ |\n| --- | --- | --- | --- |\n| 248 | 42242.3 | 170.332 | 170.332 |\n\n`sum()`\
    \ 函数将列中的所有值相加，而 `avg()` 函数计算这些值的平均值。在上面的例子中，平均值也通过 `sum/count` 公式计算，你可以看到结果是一样的；原则上，`avg()`\
    \ 函数只是为了方便。\n\n请注意，前面提到的所有聚合函数都只使用实际值，并且，`NULL` 值总是会被跳过。对于 `sum()` 你可能不会看到任何差异，但需要特别注意的是，平均值仅根据值的数量计算，而不是行数。如果你曾愚蠢地为缺失的身高输入了\
    \ `0`，这些 `0` 会被包含在内，并大幅拉低平均值。\n\n你可以通过除以总行数或者将 `NULL` 值合并为 `0` 来看到这个错误导致的结果：\n\
    \n```\nSELECT\ncount(height) as heights,\nsum(height) AS total,\navg(height) AS\
    \ average,\nsum(height)/count(height) AS computed_average,\nsum(height)/count(*)\
    \ AS not_ca,\navg(coalesce(height,0)) AS not_ca_again\nFROM customers;\n```\n\n\
    现在我们会得到一些具有误导性的值：\n\n| heights | total | average | computed_average | not_ca |\
    \ not_ca_again |\n| --- | --- | --- | --- | --- | --- |\n| 248 | 42242.3 | 170.332\
    \ | 170.332 | 138.955 | 138.955 |\n\n在上面的查询中：\n\n*   表达式 `sum(height)/count(*)`\
    \ 用总身高除以行数，而不是身高值的数量，因此结果会低得多。\n*   表达式 `coalesce(height,0)` 将 `NULL` 值替换为 `0`；这些零会被加进去，本身没有影响，但同样，你除以的数又变多了。\n\
    \n如果你对统计感兴趣，还可以计算标准差：\n\n```\n--  非 SQLite 语法\nSELECT\ncount(height) as heights,\n\
    sum(height) AS total,\navg(height) AS average,\nstddev(height) AS sd    --  MSSQL\
    \ 语法: stdev(height)\nFROM customers;\n```\n\n现在我们有了更全面的统计数据。\n\n| heights | total\
    \ | average | sd |\n| --- | --- | --- | --- |\n| 248 | 42242.3 | 170.332 | 6.926\
    \ |\n\n请注意，如果你要聚合的数据不是数字，这些函数都将无法工作。\n\n### 错误示例\n\n有些事情，即使 SQL 允许，你也*绝不*应该用聚合函数去做。\n\
    \n下面这条语句是可以运行的：\n\n```\n--  不要这样做：\nSELECT\nsum(id) AS total_id,\nsum(year) AS\
    \ total_year,\nsum(price) AS total_price\nFROM paintings;\n```\n\n你会得到一个结果，但你可能会后悔：\n\
    \n| total_id | total_year | total_price |\n| --- | --- | --- |\n| 1619593 | 1906235\
    \ | 168995 |\n\nSQL 在处理数字方面有些天真。前面相加的三个列都是数字，SQL 会按照指令愉快地将它们相加。然而，有些数字绝不应该以这种方式处理。\n\
    \n首先，有些数字并不是真正作为数字来使用的。真正数字最重要的特性是它能*计数*。客户的 `height` 以厘米为单位计数，销售总额以美元计数。\n\n\
    `id` 是一个数字，但它不是用来计数的。相反，它用于*排序*，任何其他序列，比如字母表，都可能起到同样的作用。显然，将 `id` 相加没有意义，原因是你不应该对序列进行相加。\n\
    \n`year` 也被用作一个序列。它确实计算了公元（BC）以来的年数，但在这里并非如此使用，因此相加年份同样没有意义。\n\n`price` 则更为微妙。它确实用于计数美元的数量，但它实际上并不代表一个固定值。相反，它是*每份*的美元数量。实际上，它是一个平均值，你需要将它乘以份数，才能得到一个可以相加的固定值。\n\
    \n`price` 是一个名称可能产生误导的例子。也许为了更清晰地表达，它应该被命名为 `price_per_copy`。另一方面，`price` 是一个更简单的名称。关键在于，你经常会遇到需要你自行理解或变通处理的表或列名示例。\n\
    \n### 测量尺度\n\n统计学家有时会谈论数字的不同用途。从技术上讲，它们都是数字，但它们的用途会影响你能对它们做什么操作。\n\n以下类型通常被称为\
    \ `测量尺度`：\n\n*   名义尺度：名义数字仅用作代码，没有任何数字意义。例如：\n    *   电话“号码”只是代码，它们实际上并不测量任何东西。\n\
    \    *   你可能为一个类别分配一个数字，比如艺术品类型，但无论是数值还是排序顺序都没有意义。\n\n*   顺序尺度：顺序数字可以排序，但数值的实际大小没有意义。例如：\n\
    \    *   排名，其中位置很重要，但数值之间的距离不重要\n    *   量表，比如从好到坏的意见评级\n\n在示例数据库中用作主键的 `id`，将属于名义尺度或顺序尺度，这取决于你是否认为顺序有意义。\n\
    \n*   区间尺度：数字之间的差异有意义，但没有固定的零点。例如：\n    *   距离一个固定点的距离（该点是任意选定的）\n    *   事件发生的年份（该年份是从不存在的公元\
    \ 0 年开始任意测量的）\n    注意，*相加*这些数字没有意义，但你可以*相减*它们来得到一个区间。\n\n*   比率尺度：对于这类数字，有一个真正的零点，因此大小有意义。例如：\n\
    \    *   一次销售的总成本\n    *   一个人的身高\n\n只有最后一种类型的数字可以相加。\n"
- fmt: "## 聚合计算数据\n\n`saleitems` 表中包含一些值得汇总的数据：\n\n```sql\nSELECT * FROM saleitems;\n\
    ```\n\n以下是原始数据：\n\n| id | saleid | paintingid | quantity | price |\n| --- | ---\
    \ | --- | --- | --- |\n| 2621 | 1066 | 1065 | 3 | 100 |\n| 5169 | 2067 | 870 |\
    \ 1 | 155 |\n| 667 | 271 | 2061 | 1 | 165 |\n| 6905 | 2749 | 1796 | 3 | 115 |\n\
    | 886 | 361 | 1874 | 1 | 140 |\n| 6729 | 2681 | 1516 | 2 | 160 |\n| ~ 6315 rows\
    \ ~ |\n\n这包含了一个 `quantity` 列，表示每件商品的销售数量，以及一个 `price` 列，表示每件商品的 *单价*。\n\n你可以对这些列进行求和，但需要确保这种操作是有意义的：\n\
    \n*   `quantity` 列代表了实际售出的副本数量，因此将其相加是有意义的：它表示需要打印、包装或进行其他处理的印刷品总数。\n*   `price`\
    \ 列是单价，因此仅仅将其相加是 *没有* 意义的，原因在前面提到的错误示例中已经讨论过。\n*   然而，你可以将价格乘以数量，然后再将它们相加。\n\n\
    考虑到这一点，以下查询应该是有效的：\n\n```sql\nSELECT\nsum(quantity) AS total_copies,\nsum(quantity*price)\
    \ AS total_value\nFROM saleitems;\n```\n\n汇总结果如下：\n\n| total_copies | total_value\
    \ |\n| --- | --- |\n| 9722 | 1450390 |\n\n它应该有效，但这里有个问题。回想一下，有些数量是缺失的，因此你需要用 `coalesce()`\
    \ 函数将 `NULL` 值处理为假定的含义 `1`。在汇总时你也必须做同样的处理。否则，结果会偏低：\n\n```sql\nSELECT\nsum(coalesce(quantity,1))\
    \ AS total_copies,\nsum(coalesce(quantity,1)*price) AS total_value\nFROM saleitems;\n\
    ```\n\n这会给你一个更真实的结果：\n\n| total_copies | total_value |\n| --- | --- |\n| 10237\
    \ | 1527050 |\n\n顺便说一下，前面的 `total_value` 应该与你从下面查询得到的结果相同：\n\n```sql\nSELECT sum(total)\
    \ FROM sales;\n```\n\n你应该得到相同的总价值：\n\n| sum |\n| --- |\n| 1527050 |\n\n显然，`coalesce()`\
    \ 函数被用于计算销售总额。\n\n## 其他聚合函数\n\n到目前为止，你已经进行了计数，并且对于数字运行了一些统计函数。还有其他可用的函数，但这里我们将只关注两个：`max()`\
    \ 和 `min()` 函数。\n\n与 `count()` 函数一样，你可以在所有主要数据类型上使用 `max()` 和 `min()`。例如：\n\n\
    ```sql\nSELECT\nmin(height) as shortest, max(height) as tallest,\nmin(dob) as\
    \ oldest, max(dob) as youngest,\nmin(familyname) as first, max(familyname) as\
    \ last\nFROM customers;\n```\n\n你将得到这些极值：\n\n| shortest | tallest | oldest | youngest\
    \ | first | last |\n| --- | --- | --- | --- | --- | --- |\n| 150.3 | 186.3 | 1962-09-24\
    \ | 2002-08-05 | Abet | Yourbusiness |\n\n`max()` 和 `min()` 函数为你提供类似于 `ORDER BY`\
    \ 子句排序后处于两端的值，不过像往常一样，它们会忽略可能出现的 `NULL`。\n\n与排序类似，数据类型将影响哪些值位于开头或结尾。例如：\n\n```sql\n\
    SELECT\ncount(*) AS countrows,\nmax(numbervalue) AS most, min(numbervalue) AS\
    \ least,\nmax(datevalue) AS latest, min(datevalue) AS earliest,\nmax(stringvalue)\
    \ AS last, min(stringvalue) AS first\nFROM sorting;\n```\n\n值是否为字符串将影响结果：\n\n\
    | rows | most | least | latest | earliest | last | first |\n| --- | --- | ---\
    \ | --- | --- | --- | --- |\n| 8 | 1024 | -8 | 1917-06-30 | 1775-12-16 | Date\
    \ | apple |\n\n在得到最小值和最大值之后，你可能想问哪些行实际匹配这些值。例如，谁是最年长的客户，或者哪幅画作最受欢迎？\n\n## 使用聚合结果作为过滤器\n\
    \n你已经看到，不能将未汇总的数据与汇总的数据混合使用。但是，你可以在子查询中使用汇总结果来过滤未汇总的数据。这基本上是将查询分两步进行。\n\n例如，谁是最年长的客户？要得到答案：\n\
    \n1.  找到最小的出生日期：\n\n    ```sql\n    SELECT min(dob) FROM customers\n    ```\n\n\
    \    这将作为下一步的子查询。（注意这里还没有分号，因为我们还没有完成；你仍然可以单独运行这个查询。）\n\n2.  找到出生日期与该结果匹配的客户：\n\
    \n    ```sql\n    SELECT * FROM customers\n    WHERE dob=(SELECT min(dob) FROM\
    \ customers);\n    ```\n\n    这将给你类似这样的结果：\n\n    | id | email | … | dob | … |\n\
    \    | --- | --- | --- | --- | --- |\n    | 545 | jack.knife545@example.com |\
    \ … | 1962-09-24 | … |\n    | 344 | rose.boat344@example.net | … | 1962-09-24\
    \ | … |\n\n    你会注意到有不止一个匹配项。这就是为什么期望将未汇总的数据与汇总的数据混合使用是无意义的原因之一。\n\n你可以使用相同的技术来找到最年轻、最高或最矮的客户。\n\
    \n有时，你需要一个涉及关联表的查询。例如，假设你想找到单笔销售额最大的客户。\n\n首先，从 `sales` 表中获取 `customerid`：\n\n\
    ```sql\nSELECT customerid FROM sales WHERE total=(\nSELECT max(total) FROM sales\n\
    );\n```\n\n这里，我们使用 `max(total)` 并找到匹配的 `customerid`。当然，可能不止一个。\n\n接下来，我们从 `customers`\
    \ 表中找到匹配的客户：\n\n```sql\n--  Biggest Spender\nSELECT *\nFROM customers\nWHERE id\
    \ IN (\nSELECT customerid FROM sales WHERE total=(\nSELECT max(total) FROM sales\n\
    )\n);\n```\n\n你现在得到了客户详细信息：\n\n| id | email | familyname | givenname | … |\n|\
    \ --- | --- | --- | --- | --- |\n| 19 | millie.pede19@example.net | Pede | Millie\
    \ | … |\n\n对于这个例子，你本可以使用：\n\n```sql\nWHERE id=(SELECT …)\n```\n\n然而，这样做是有风险的，因为如果有多个客户的\
    \ `max(total)` 相同，可能会出现多个结果。在那种情况下，你会得到一个错误。\n\n你也可以使用其他统计函数作为过滤器。例如，如果你想找到身高低于平均值的客户：\n\
    \n```sql\nSELECT * FROM customers\nWHERE height<(SELECT avg(height) FROM customers);\n\
    ```\n\n你会得到较矮的客户：\n\n| id | email | familyname | … | height |\n| --- | --- | ---\
    \ | --- | --- |\n| 186 | ray.gunn186@example.net | Gunn | … | 163.8 |\n| 179 |\
    \ ivan.inkling179@example.com | Inkling | … | 170.3 |\n| 523 | seymour.sights523@example.net\
    \ | Sights | … | 167.3 |\n| 351 | dick.tate351@example.com | Tate | … | 167.8\
    \ |\n| 422 | wanda.why422@example.com | Why | … | 163.2 |\n| 121 | lil.ting121@example.com\
    \ | Ting | … | 162.8 |\n| ~ 128 rows ~ |\n\n如果你想要那些 *显著* 矮于平均的人，你也可以使用标准差：\n\n\
    ```sql\nSELECT * FROM customers\nWHERE height<(SELECT avg(height)-stddev(height)\
    \ FROM customers);\n--  MSSQL: Use stdev(height)\n```\n\n你现在会得到矮得多的客户：\n\n| id\
    \ | email | familyname | … | height |\n| --- | --- | --- | --- | --- |\n| 422\
    \ | wanda.why422@example.com | Why | … | 163.2 |\n| 121 | lil.ting121@example.com\
    \ | Ting | … | 162.8 |\n| 429 | tom.morrow429@example.com | Morrow | … | 156.9\
    \ |\n| 138 | al.fresco138@example.net | Fresco | … | 162.6 |\n| 468 | connie.fer468@example.com\
    \ | Fer | … | 161.3 |\n| 330 | clara.fied330@example.com | Fied | … | 156.6 |\n\
    | ~ 40 rows ~ |\n\n像往常一样，你不能在单个 `SELECT` 语句中混合使用聚合值和非聚合值。但是，你可以在子查询中使用聚合，并在非聚合查询中使用其结果。"
  raw: "## Aggregating Calculated Data\n\nThe `saleitems` table includes some data\
    \ which is worth summarizing:\n\n```\nSELECT * FROM saleitems;\n```\n\nHere is\
    \ the raw data:\n\n| id | saleid | paintingid | quantity | price |\n| --- | ---\
    \ | --- | --- | --- |\n| 2621 | 1066 | 1065 | 3 | 100 |\n| 5169 | 2067 | 870 |\
    \ 1 | 155 |\n| 667 | 271 | 2061 | 1 | 165 |\n| 6905 | 2749 | 1796 | 3 | 115 |\n\
    | 886 | 361 | 1874 | 1 | 140 |\n| 6729 | 2681 | 1516 | 2 | 160 |\n| ~ 6315 rows\
    \ ~ |\n\nThis includes a `quantity` column, which is the number of copies of each\
    \ item, and a `price` column which is the price *per copy* of each item.\n\nYou\
    \ can total these columns, but you need to be sure that it’s meaningful:\n\n*\
    \   The `quantity` column has the actual number of copies sold, so adding this\
    \ is meaningful: it is the number of prints which had to be printed, packaged,\
    \ or otherwise processed.\n\n*   The `price` column is the price per copy, so\
    \ just adding this is *not* meaningful, for the reasons discussed in the bad example\
    \ earlier.\n\n*   However, you *can* multiply the price by the number of copies\
    \ and then add them up.\n\nBearing this in mind, the following should work:\n\n\
    ```\nSELECT\nsum(quantity) AS total_copies,\nsum(quantity*price) AS total_value\n\
    FROM saleitems;\n```\n\nHere is the summary:\n\n| total_copies | total_value |\n\
    | --- | --- |\n| 9722 | 1450390 |\n\nIt should, but there’s a problem. Recall\
    \ that some of the quantities are missing, so you had to coalesce the `NULL`s\
    \ to `1` which is the presumed meaning. You’ll have to do the same with the summary.\
    \ Otherwise, you will fall short:\n\n```\nSELECT\nsum(coalesce(quantity,1)) AS\
    \ total_copies,\nsum(coalesce(quantity,1)*price) AS total_value\nFROM saleitems;\n\
    ```\n\nThis gives you a truer result:\n\n| total_copies | total_value |\n| ---\
    \ | --- |\n| 10237 | 1527050 |\n\nIncidentally, the preceding `total_value` should\
    \ be the same as the result you get from\n\n```\nSELECT sum(total) FROM sales;\n\
    ```\n\nYou should get the same result for the total value:\n\n| sum |\n| --- |\n\
    | 1527050 |\n\nObviously, the `coalesce()` function was used to calculate the\
    \ sales total.\n\n## Other Aggregate Functions\n\nSo far, you have counted things,\
    \ and, for numbers, you’ve run some statistical functions. There are other functions\
    \ available, but here we will concentrate on just two: the `max()` and `min()`\
    \ functions.\n\nLike the `count()` function, you can use `max()` and `min()` on\
    \ all main types of data. For example:\n\n```\nSELECT\nmin(height) as shortest,\
    \ max(height) as tallest,\nmin(dob) as oldest, max(dob) as youngest,\nmin(familyname)\
    \ as first, max(familyname) as last\nFROM customers;\n```\n\nYou’ll get these\
    \ end values:\n\n| shortest | tallest | oldest | youngest | first | last |\n|\
    \ --- | --- | --- | --- | --- | --- |\n| 150.3 | 186.3 | 1962-09-24 | 2002-08-05\
    \ | Abet | Yourbusiness |\n\nThe `max()` and `min()` functions give you what would\
    \ have been at the extreme ends of an `ORDER BY` clause, except that, as usual,\
    \ they omit any `NULL` which might turn up.\n\nAs with sorting, the data type\
    \ will affect which values will be at the beginning or end. For example:\n\n```\n\
    SELECT\ncount(*) AS countrows,\nmax(numbervalue) AS most, min(numbervalue) AS\
    \ least,\nmax(datevalue) AS latest, min(datevalue) AS earliest,\nmax(stringvalue)\
    \ AS last, min(stringvalue) AS first\nFROM sorting;\n```\n\nWhether the value\
    \ is a string or not will affect the results:\n\n| rows | most | least | latest\
    \ | earliest | last | first |\n| --- | --- | --- | --- | --- | --- | --- |\n|\
    \ 8 | 1024 | -8 | 1917-06-30 | 1775-12-16 | Date | apple |\n\nHaving got the minimum\
    \ and maximum values, you might want to ask which rows actually match these values.\
    \ For example, who is the oldest customer, or which is the most popular painting?\n\
    \n## Using Aggregates As Filters\n\nYou have already seen that you can’t mix unsummarized\
    \ data with summarized data. However, you can use summaries to filter unsummarized\
    \ data in a subquery. This is basically doing the query in two steps.\n\nFor example,\
    \ who is the oldest customer? To get the answer:\n\n1.  Find the minimum date\
    \ of birth:\n\n    ```\n    SELECT min(dob) FROM customers\n    ```\n\nThis will\
    \ be the subquery for the next step. (Notice there’s no semicolon yet, because\
    \ we haven’t finished; you can still run this individually.)\n\n1.  Find the customer(s)\
    \ whose date of birth matches the result:\n\n    ```\n    SELECT * FROM customers\n\
    \    WHERE dob=(SELECT min(dob) FROM customers);\n    ```\n\nThis will give you\
    \ something like this:\n\n| id | email | … | dob | … |\n| --- | --- | --- | ---\
    \ | --- |\n| 545 | jack.knife545@example.com | … | 1962-09-24 | … |\n| 344 | rose.boat344@example.net\
    \ | … | 1962-09-24 | … |\n\nYou will notice that there is more than one match.\
    \ That is one reason why it would be meaningless to expect to be able to mix unsummarized\
    \ data with summarized data.\n\nYou can use the same technique to find the youngest\
    \ customer or the tallest or shortest customers.\n\nSometimes, you need a query\
    \ which involves related tables. For example, suppose you want the customer with\
    \ the largest single sale.\n\nFirst, you get the `customerid` from the `sales`\
    \ table:\n\n```\nSELECT customerid FROM sales WHERE total=(\nSELECT max(total)\
    \ FROM sales\n);\n```\n\nHere, we use the `max(total)` and find the `customerid`\
    \ which matches. Of course, there may be more than one.\n\nNext, we find the matching\
    \ customers from the `customers` table:\n\n```\n--  Biggest Spender\nSELECT *\n\
    FROM customers\nWHERE id IN (\nSELECT customerid FROM sales WHERE total=(\nSELECT\
    \ max(total) FROM sales\n)\n);\n```\n\nYou now get the customer details:\n\n|\
    \ id | email | familyname | givenname | … |\n| --- | --- | --- | --- | --- |\n\
    | 19 | millie.pede19@example.net | Pede | Millie | … |\n\nFor this example, you\
    \ could have used\n\n```\nWHERE id=(SELECT …)\n```\n\nHowever, that’s risky because\
    \ there might have been multiple results if more than one customer tied for `max(total)`.\
    \ In that case, you would have got an error.\n\nYou can also use other statistical\
    \ functions as filters. For example, if you want to find customers whose height\
    \ is shorter than average:\n\n```\nSELECT * FROM customers\nWHERE height<(SELECT\
    \ avg(height) FROM customers);\n```\n\nYou get the shorter customers:\n\n| id\
    \ | email | familyname | … | height |\n| --- | --- | --- | --- | --- |\n| 186\
    \ | ray.gunn186@example.net | Gunn | … | 163.8 |\n| 179 | ivan.inkling179@example.com\
    \ | Inkling | … | 170.3 |\n| 523 | seymour.sights523@example.net | Sights | …\
    \ | 167.3 |\n| 351 | dick.tate351@example.com | Tate | … | 167.8 |\n| 422 | wanda.why422@example.com\
    \ | Why | … | 163.2 |\n| 121 | lil.ting121@example.com | Ting | … | 162.8 |\n\
    | ~ 128 rows ~ |\n\nIf you want those who are *significantly* shorter, you can\
    \ also use the standard deviation:\n\n```\nSELECT * FROM customers\nWHERE height<(SELECT\
    \ avg(height)-stddev(height) FROM customers);\n--  MSSQL: Use stdev(height)\n\
    ```\n\nYou now get the much shorter customers:\n\n| id | email | familyname |\
    \ … | height |\n| --- | --- | --- | --- | --- |\n| 422 | wanda.why422@example.com\
