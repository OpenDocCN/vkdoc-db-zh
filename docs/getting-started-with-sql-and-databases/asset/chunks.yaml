    # 9. Set Operations


    Behind all SQL databases is Relational Database theory, which gives databases
    a solid mathematical foundation. Among other things, databases are based on mathematical
    **sets**.


    In mathematics, a set is a collection of things. You don’t need to worry about
    all of the details, but two points are important:


    *   A set has no duplicates. This is part of why good database design ensues that
