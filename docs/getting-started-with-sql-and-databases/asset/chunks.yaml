  trans: '

    ## 更新行


    既然我们已经添加了更多客户，就可以开始补充一些缺失的细节了。比如，我们可以添加他们的电话号码。


    要更改现有行中的值，请使用 `UPDATE` 语句：


    ```sql

    UPDATE table

    SET column=value    --  column=value, column=value, 等等

    WHERE …

    ```


    同样，你可以选择设置多个值。


    例如，使用你新添加客户的某个 `id`：


    ```sql

    SELECT id FROM customers ORDER BY id DESC;

    ```


    你可以更新电话号码：


    ```sql

    UPDATE customers

    SET phone=''0370101234''

    WHERE id= … ;

    ```


    由于 `id` 是主键，因此是唯一的，这将把影响限制在一行数据上。


    `UPDATE` 语句可能非常危险。例如：


    ```sql

    --  别这样做！

    UPDATE customers

    SET phone=''0370101234'';

    ```


    这可能会毁了你的一天。没有 `WHERE` 子句，这将更改*所有*行的 `phone` 列。此时，电话号码无需是唯一的。


    现在可能是反思 SQL 没有撤销功能的好时机。有时，犯错后你可以重建数据，有时数据库管理员可以重建。如果不能，那谁也无能为力。


    你可以使用与 `DELETE` 语句相同的测试方法来测试你的 `UPDATE`。


    与 `INSERT` 语句不同，你无法为每一行设置不同的值，除非该值可以被计算出来。


    例如，你可以提高所有画作的价格：


    ```sql

    --  除非你真想运行，否则别执行这个：

    UPDATE paintings SET price=price*0.1;

    ```


    这里，运行一次可以将价格提高 10%。唯一的问题是，如果你（不小心）再次运行它，价格将提高到 21%，然后是 33.1%，接着是 46.41%，嗯，你知道这样下去的结果。


    电话号码的问题*可能*通过规定电话号码必须唯一来缓解。你可以使用 `CREATE UNIQUE INDEX` 语句修改现有表。例如：


    ```sql

    --  非 MSSQL:

    CREATE UNIQUE INDEX uq_customers_phone ON

    customers(phone);

    --  MSSQL:

    CREATE UNIQUE INDEX uq_customers_phone ON

    customers(phone)

    WHERE phone IS NOT NULL;

    ```


    Microsoft SQL 有个怪癖，会在检查唯一性时比较 `NULL` 值，因此你需要额外的子句来阻止它这样做。


    请注意，不强制唯一电话号码*可能*有充分的理由，例如来自同一组织的多个客户。这类决策单凭数据库开发者无法做出——需要真正理解数据库在现实生活中将如何被使用。


    ## 修改表结构


    一旦你有了一个表并开始填充数据，你可能会发现需要对表进行修改。此时删除并重建表为时已晚，但你可以使用 `ALTER` 语句在事后进行一些更改。


    典型的更改包括添加或删除列、添加索引或更改列的类型。本章讨论的几乎所有表属性，只要在此过程中不违反现有的完整性规则，都可以追溯添加到现有表中。例如：


    ```sql

    --  添加列

    ALTER TABLE customers

    ADD country VARCHAR(60);

    --  删除列

    ALTER TABLE customers

    DROP COLUMN town, state, postcode;

    --  添加外键

    ALTER TABLE customers

    ADD townid INT REFERENCES towns(id);

    --  添加检查约束

    ALTER TABLE saleitems

    ADD CHECK (quantity>0);

    --  删除约束

    ALTER TABLE customers

    DROP CONSTRAINT ck_customers_postcode;

    --  添加 NOT NULL 约束

    ALTER TABLE saleitems

    ALTER COLUMN quantity SET NOT NULL;

    --  添加默认值

    ALTER TABLE saleitems

    ALTER COLUMN quantity SET DEFAULT 1;

    ```


    这里，我们将添加另一列。


    虽然 `customers` 表包含地址，但不包含国家。如果你只想将销售限制在一个国家，这没问题；但如果你有更大的计划，你会想要添加国家：


    ```sql

    --  所有 DBMS

    ALTER TABLE customers

    ADD country varchar(48);

    --  MySQL / MariaDB

    ALTER TABLE customers

    ADD country varchar(48)

    AFTER postcode;

    ```


    新列将被放在最后。从美学上讲，它应该位于其他地址列之后。不幸的是，大多数 DBMS 不允许你指定新列出现的位置，除非使用一些风险稍高的技巧^(¹²)，所以我们只能接受它。正如你之前所见，MySQL/MariaDB
    允许你指定位置。


    现在，让我们假设你所有的客户都来自一个国家，但我们只对已有地址的客户做此假设。我们可以为这些客户设置国家，如下所示：


    ```sql

    UPDATE customers

    SET country=''Australia''     --  或其他国家

    WHERE state IS NOT NULL;

    ```


    与所有 DDL 语句一样，你在现实中修改表的能力可能受到限制。数据库管理员可能不希望任何人随意改动数据库。


    然而，对于示例数据库，我们假设你拥有完全控制权。


    ## 现实生活中的 DML


    虽然你可能会花很多时间使用 `SELECT` 语句，但不太可能花太多时间使用 `INSERT`、`UPDATE` 或 `DELETE`。


    `SELECT` 语句用于检索数据，除了安全和机密性问题外，它是一个相对无害的操作。一个简单的 `SELECT` 语句不会破坏任何东西。


    另一方面，用其他语句搞乱你的数据库则*非常*容易。一旦你开始添加不应存在的数据，或者将某些内容更改为错误的值，或者删除了本应保留的数据，你的数据库就变得不可靠，因此也就毫无用处。


    因此，数据库通常受到保护，以防止未经授权的篡改。


    ### 安全性


    所有常规的 DBMS 都包含某种安全性。从这个意义上说，SQLite 不算常规，因为它的客户端内置于其他软件中，你想要实现的任何安全性都取决于宿主软件。如果你在使用
    SQLite，可以忽略本节内容，或者礼貌地点点头，假装你感兴趣。


    当你连接到数据库时，通常需要登录。有时登录是自动的，但通常需要你输入用户名和密码。


    通常，安全性设置分为两层：


    *   **用户**是拥有自己用户名和密码的个体。


    *   **角色**是具有相似属性的用户集合。


    一个用户可以被分配到多个角色。


    通常，执行某项操作——任何操作——所需的权限被分配给一个角色。它们也可以分配给单个用户，但如果用户变动，这样维护起来会更困难。


    这些权限包括（正如他们所说，但不限于）


    *   可以使用 `SELECT` 语句读取哪些表


    *   可以使用其他 DML 语句修改哪些表


    *   是否可以更改表，或者是否可以创建或删除任何对象


    根据 DBMS 的不同，这些权限可以非常细粒度。通常，它们由数据库管理员（DBA）控制。通常有一个具有此角色的特殊用户，称为 **root**。可以有多个
    root 用户或 DBA。


    如果你安装自己的 DBMS 软件，那么你就是 DBA，你可以做任何你想做的事情。

    '
- fmt: '### Front-End Software


    The other reason that you won’t `INSERT`, `UPDATE`, or `DELETE` so much is that
    data is not normally modified manually. For example, the sample database is for
    a web application, and you would normally make all of the changes using web forms.
    This would also be the case in an office environment, with similar front-end software.


    However, regardless of how the data is actually entered, it will, at some point,
    find its way into a DML statement as described earlier.


    For example, when you enter your registration details on a web form and submit,
    the data will be received on the web server. In turn, it will be processed by
    a server-side script, often written in a programming language such as PHP, wrapped
    into DML statements, and then sent off to the database server for further processing.


    Fetching data, such as viewing a catalog, would be the same, mostly in reverse.
    After submitting your search criteria, the web server script would generate a
    suitable `SELECT` statement, use it to get the data from the database server,
    format the results appropriately, and then send it back to the user.


    On the other hand, there is much more you can do with a `SELECT` statement:


    *   You can fetch ad hoc results, as you have been doing throughout this book.

    *   You can fetch data for further processing in a statistical or analysis package.


    Of course, even if you don’t use the other DML statements directly, it’s very
    important to understand what’s going on.


    ## Summary


    In this chapter, we looked at how database tables are created and how to add or
    change data in the tables.


    Tables are created using the `CREATE TABLE` statement. This statement includes:


    1.  Column names

    2.  Data types

    3.  Other table and column properties


    A table design can be changed afterward, such as adding triggers or indexes. More
    serious changes, such as adding or dropping columns, can be effected using `ALTER
    TABLE` statements.


    ### Data Types


    There are three main types of data:


    1.  Numbers

    2.  Strings

    3.  Dates


    There are many variations of the preceding types which make data storage and processing
    more efficient and help to validate the data values.


    There are also additional types such as boolean or binary data, which you won’t
    see so much in a typical database.


    ### Constraints


    Constraints define what values are considered valid. Standard constraints include:


    *   `NOT NULL`

    *   `UNIQUE`

    *   `DEFAULT`

    *   Foreign keys


    You can construct your own additional constraints with the generic `CHECK` constraint.
    Here, you add a condition similar to a `WHERE` clause which defines your own particular
    validation rule.


    ### Foreign Keys


    A foreign key is a reference to another table and is also regarded as a constraint
    in that it limits values to those which match the other table.


    The foreign key is defined in the child table.


    A foreign key also affects any attempt to delete a row from the parent table.
    By default, the parent row cannot be deleted if there are matching child rows.
    However, this can be changed to either setting the foreign key to `NULL` or to
    cascading the delete to all of the children.


    ### Indexes


    Since tables are not stored in any particular order, they can be time-consuming
    to search. An optional index can be added for any column you routinely search,
    which makes searching much quicker.


    ### Manipulating Data


    Data Manipulation Language statements are used to add or change data. In addition
    to the `SELECT` statement, there are:


    *   `INSERT`

    *   `UPDATE`

    *   `DELETE`


    Unlike `SELECT`, these have the potential to make a mess of a database, especially
    since SQL doesn’t have an undo.


    # 9. Set Operations


    Behind all SQL databases is Relational Database theory, which gives databases
    a solid mathematical foundation. Among other things, databases are based on mathematical
    `sets`.


    In mathematics, a set is a collection of things. You don’t need to worry about
    all of the details, but two points are important:


    *   A set has no duplicates. This is part of why good database design ensues that
    there are no repetitions.

    *   A set is unordered. Of course, you can’t view the contents without its being
    in some sort of order, but the order is not significant.


    For now, the most important part of all of this is that a table is a set of rows,
    and that means that rows are not duplicated and that row order is not significant.


    So far, all of our queries have produced a single result set. Even when you joined
    tables, the product was a single result set. In this chapter, we’ll look at combining
    multiple result sets.'
