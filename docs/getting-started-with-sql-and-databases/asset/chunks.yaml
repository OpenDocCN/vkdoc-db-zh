  trans: '## 准备用于聚合的数据


    分组聚合仅当存在可按列分组的数据（即多行在某一列中具有完全相同的值）时才有效。有时，数据并不完全符合此要求，但您仍需对其进行聚合。


    例如，假设您要计算每日销售总额。如果您查看 `sales` 表：


    ```sql

    SELECT * FROM sales;

    ```


    原始数据如下：


    | id | customerid | total | ordered | shipped |

    | --- | --- | --- | --- | --- |

    | 52 | 52 | 940 | 2022-03-07 16:10:45.739071 | 2022-03-19 |

    | 54 | 37 | 1005 | 2022-03-08 00:23:39.53316 | 2022-03-22 |

    | 55 | 19 | 795 | 2022-03-08 06:23:28.387395 | 2022-03-19 |

    | 57 | 42 | 505 | 2022-03-09 00:02:29.974004 | 2022-03-14 |

    | 59 | 53 | 360 | 2022-03-09 06:26:24.808237 | 2022-03-17 |

    | 60 | 10 | 340 | 2022-03-09 15:01:05.592177 | 2022-03-23 |

    | ~ 2509 行 ~ |


    您会发现每笔销售都有一个 `ordered` 值，其类型为 `datetime`。两笔交易在同一时刻发生几乎是不可能的（即使不是完全不可能），因此您尝试对此进行分组将一无所获。


    但是，如果仅提取日期部分，您可以简化 `ordered` 列。最直接的方法是将数据转换为 `date` 类型，这将丢弃时间部分。对于汇总，您只需要日期和每笔销售的总额：


    ```sql

    SELECT cast(ordered as date) as ordered, total FROM sales;

    ```


    Oracle 的工作方式不太一样 —— 它不会移除时间部分，而这正是此操作的目的。


    相反，您应该使用 `trunc(date)`。


    简化后的数据如下：


    | ordered | total |

    | --- | --- |

    | 2022-03-07 | 940 |

    | 2022-03-08 | 1005 |

    | 2022-03-08 | 795 |

    | 2022-03-09 | 505 |

    | 2022-03-09 | 360 |

    | 2022-03-09 | 340 |

    | ~ 2509 行 ~ |


    对于 Oracle，您需要使用 `trunc(ordered)` 来实现相同的效果，尽管它会包含一个零时间。这里使用原名作为别名，因为它仍然起着标明销售下单时间的作用。


    您可以将前面的语句视为第一步；然后可以在汇总中使用简化后的数据：


    ```sql

    WITH data AS (-- Oracle: 使用 trunc(ordered)

    SELECT cast(ordered as date) as ordered, total FROM sales

    )

    SELECT ordered, sum(total) AS total

    FROM data

    GROUP BY ordered;

    ```


    现在您有了每日总额：


    | ordered | total |

    | --- | --- |

    | 2022-10-10 | 3630 |

    | 2022-07-14 | 5890 |

    | 2022-09-22 | 6730 |

    | 2022-05-19 | 1785 |

    | 2023-02-25 | 8495 |

    | 2022-05-23 | 6835 |

    | ~ 385 行 ~ |


    当然，结果可能无序，因此您可以在末尾添加


    ```sql

    ORDER BY ordered

    ```


    如果您有已排序的结果，可能会注意到日期中存在间隔。这没有问题：它仅表示那些日子没有已完成的销售。这种情况会发生。


    这是另一个公共表表达式。您可以使用表子查询来完成相同的操作：


    ```sql

    SELECT ordered, sum(total) AS total

    FROM (

    SELECT cast(ordered as date) as ordered, total FROM sales

    ) AS data

    GROUP BY ordered;

    ```


    这将实现相同的功能，但使用 CTE 会更容易处理：始终最好先准备数据，然后再使用它。CTE 也更灵活，如果需要，可以进行更复杂的编码。


    ### 在 CTE 中使用 CASE


    CTE 在复杂计算中非常方便。例如，我们已经看到如何在 `CASE … END` 表达式中生成价格分组：


    ```sql

    SELECT

    id, title,

    CASE

    WHEN price < 130 THEN ''便宜''

    WHEN price <= 170 THEN ''合理''

    WHEN price IS NOT NULL THEN ''昂贵''

    ELSE ''未定价''

    END AS price_category

    FROM paintings;

    ```


    这再次给出了我们的价格类别：


    | id | title | price_category |

    | --- | --- | --- |

    | 1222 | Haymakers Resting | 便宜 |

    | 251 | Death in the Sickroom | 便宜 |

    | 2190 | Cache-cache (Hide-and-Seek) | 昂贵 |

    | 1560 | Indefinite Divisibility | 便宜 |

    | 172 | Girl with Racket and Shuttlecock | 昂贵 |

    | 2460 | The Procession to Calvary | 合理 |

    | ~ 1273 行 ~ |


    如果您想在 `GROUP BY` 表达式中使用此结果，您必须完全重复该表达式。这很繁琐、不可读、不灵活且容易出错。


    相反，您可以使用 CTE 来汇总结果：


    ```sql

    WITH cte AS (

    SELECT

    id, title,  -- 您实际上不需要此列

    CASE

    WHEN price < 130 THEN ''便宜''

    WHEN price <= 170 THEN ''合理''

    WHEN price IS NOT NULL THEN ''昂贵''

    ELSE ''未定价''

    END AS price_category

    FROM paintings

    )

    SELECT price_category, count(*) AS countrows

    FROM cte

    GROUP BY price_category;

    ```


    现在您有了价格类别的汇总：


    | price_category | countrows |

    | --- | --- |

    | 合理 | 489 |

    | 便宜 | 345 |

    | 未定价 | 136 |

    | 昂贵 | 303 |


    如您所见，您实际上不需要 id 和 title，因为您只使用分组并进行计数。


    ### 在 CTE 中使用连接


    您还可以在 CTE 中使用连接，这简化了多表汇总。例如，如果您想获取各州的销售额，您将需要来自 `sales` 表的总额和来自 `customers` 表的州信息。


    要仅获取州和总额，我们可以使用


    ```sql

    SELECT c.state, s.total

    FROM customers AS c JOIN sales AS s ON c.id=s.customerid;

    ```


    简化后的结果如下：


    | state | total |

    | --- | --- |

    | QLD | 940 |

    | SA | 1005 |

    | WA | 795 |

    | VIC | 505 |

    | TAS | 360 |

    | NSW | 340 |

    | ~ 2509 行 ~ |   |


    将其用作 CTE，我们可以按州分组：


    ```sql

    WITH cte AS (

    SELECT c.state, s.total

    FROM customers AS c JOIN sales AS s ON c.id=s.customerid

    )

    SELECT state, sum(total) AS total

    FROM cte

    GROUP BY state;

    ```


    我们现在有了各州总额：


    | state | total |

    | --- | --- |

    | TAS | 156305 |

    | VIC | 272695 |

    | NSW | 374660 |

    | NT | 18855 |

    | QLD | 333575 |

    | SA | 115700 |

    | WA | 255260 |


    再次说明，CTE 的目的是在汇总数据之前对其进行准备。'
- fmt: '# Summarizing Strings


    Here’s one final example. When discussing joins, we looked at joining multiple
    tables to get the customer’s favorite artists:


    ```sql

    SELECT DISTINCT

    c.id,

    c.givenname, c.familyname,

    s.id AS sid,

    a.givenname||'' ''||a.familyname AS artist

    FROM

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    JOIN artists AS a ON p.artistid=a.id

    ORDER BY c.familyname, c.givenname;

    ```


    (Remember MSSQL uses `+` for concatenation, and Oracle doesn’t like table `AS`,
    the same with the following example.)


    | id | givenname | familyname | sid | artist |

    | --- | --- | --- | --- | --- |

    | 260 | Aiden | Abet | 818 | Auguste Rodin |

    | 260 | Aiden | Abet | 818 | Paul Cézanne |

    | 260 | Aiden | Abet | 818 | Rembrandt van Rijn |

    | 260 | Aiden | Abet | 902 | Pierre-Auguste Renoir |

    | 260 | Aiden | Abet | 902 | Rembrandt van Rijn |

    | 260 | Aiden | Abet | 1006 | Jean-Antoine Watteau |

    | ~ 5997 rows ~ |


    The problem was that you still get a long list of individual customer/artist combinations.
    It would be less overwhelming to combine all of the artists into a single string.


    Various DBMSs have different names for the aggregate function to combine strings
    (and older versions of MSSQL don’t have one at all, but do have a *very* complicated
    workaround).


    | DBMS | Function |

    | --- | --- |

    | PostgreSQL | `string_agg(data, separator)` |

    | Oracle | `listagg(data, separator)` |

    | MySQL/MariaDB | `group_concat(data SEPARATOR separator)` |

    | SQLite | `group_concat(data, separator)` |

    | MSSQL | `string_agg(data, separator)` |


    We can now use the preceding query a CTE and use this to produce a list of artists
    for each customer:


    ```sql

    WITH cte AS (

    SELECT DISTINCT

    c.id,

    c.givenname, c.familyname,

    s.id AS sid,

    a.givenname||'' ''||a.familyname AS artist

    FROM    --  Oracle: Omit AS for table aliases:

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    JOIN artists AS a ON p.artistid=a.id

    )

    --  PostgreSQL, MSSQL:

    SELECT

    id, givenname, familyname, string_agg(artist, '', '')

    --  Oracle:

    --  SELECT id, givenname, familyname, listagg(artist, '', '')

    --  MySQL / MariaDB:

    --  SELECT

    --      id, familyname, givenname,

    --      group_concat(artist SEPARATOR '', '')

    --  SQLite:

    --  SELECT

    --      id, givenname, familyname, group_concat(artist, '', '')

    FROM cte

    GROUP BY id, givenname, familyname

    ORDER BY familyname, givenname, id;

    ```


    This will give us a list of customers and all of the artists:


    | id | givenname | familyname | truncate |

    | --- | --- | --- | --- |

    | 260 | Aiden | Abet | Piero della Francesca, Sandro Bottic … |

    | 323 | Alf | Abet | James Abbott McNeill Whistler, Jacop … |

    | 563 | Ollie | Agenous | Claude Monet, Kasimir Malevich, Henr … |

    | 54 | Corey | Ander | Juan Gris, Amedeo Modigliani, Berthe … |

    | 549 | Ike | Andy | Ando Hiroshige, Jackson Pollock, Rem … |

    | 263 | Adam | Ant | Kasimir Malevich, Joseph Mallord Wil … |

    | ~ 256 rows ~ |


    As you see from the results, the combined string can get very long. In real life,
    you would want to be sure that it doesn’t get too long if you want your results
    to be practical.


    ## Filtering Grouped Results with HAVING


    Previously, you got the number and value of sales per customer. You might then
    want to limit the results to higher totals or higher numbers. To do that, you
    need to use the `HAVING` clause.


    For example, to show only the customers who have spent more money, you can filter
    on the `sum(total)` value:


    ```sql

    SELECT customerid, sum(total) AS total, count(*) AS countrows

    FROM sales

    GROUP BY customerid

    HAVING sum(total)>10000

    --  SELECT

    ORDER BY customerid;

    ```


    We now have a filtered summary:


    | customerid | total | countrows |

    | --- | --- | --- |

    | 2 | 14920 | 24 |

    | 9 | 10645 | 19 |

    | 11 | 16460 | 29 |

    | 19 | 16530 | 23 |

    | 20 | 12145 | 17 |

    | 24 | 16565 | 28 |

    | ~ 42 rows ~ |


    The `HAVING` clause does the same sort of thing as the `WHERE` clause, except
    that it filters the summary, not the original table data.^[⁹](#fn9) Note that
    it comes after the `GROUP BY` clause, which does the actual summarizing.


    Also, note that the `HAVING` clause is still processed before the `SELECT` clause,
    so if you’re tempted to filter by any of the preceding calculated columns, you’re
    out of luck. This gives us the clause order as in Figure [7-1](#601766_1_En_7_Chapter.xhtml#Fig1).


    ![](images/601766_1_En_7_Chapter/601766_1_En_7_Fig1_HTML.jpg)


    A table of written and processed uses clause order with GROUP BY and having functions.


    Figure 7-1 Clause Order with GROUP BY and Having


    Of course, you can also use both the `WHERE` and `HAVING` clauses if you need
    to filter the data before and after summarizing.


    For example, suppose you’re interested in the customers with larger total sales
    in the last month. For that, you will need two filters:


    *   Recent sales: You get that by filtering `sales.ordered` minus one month.

    *   Larger totals: You get that by filtering `sum(total)` in the summary.


    This gives us:


    ```sql

    --  PostgreSQL, MySQL/MariaDB

    SELECT customerid, sum(total) AS total

    FROM sales

    WHERE ordered>current_timestamp - INTERVAL ''1'' MONTH

    GROUP BY customerid

    HAVING sum(total)>2000

    --  SELECT

    ORDER BY customerid;

    ```


    This should give you something like the following:


    | customerid | total |

    | --- | --- |

    | 167 | 2155 |

    | 179 | 2105 |

    | 250 | 5000 |

    | 379 | 2010 |

    | 445 | 2350 |

    | 455 | 3890 |


    Remember other DBMSs have a different calculation to subtract one month:


    ```sql

    --  MSSQL

    SELECT customerid, sum(total) AS total

    FROM sales

    WHERE ordered>dateadd(month,-1,current_timestamp)

    GROUP BY customerid

    HAVING sum(total)>2000

    --  SELECT

    ORDER BY customerid;

    --  SQLite

    SELECT customerid, sum(total) AS total

    FROM sales

    WHERE ordered>date(''now'',''-1 month'')

    GROUP BY customerid

    HAVING sum(total)>2000

    --  SELECT

    ORDER BY customerid;

    --  Oracle

    SELECT customerid, sum(total) AS total

    FROM sales

    WHERE ordered>add_months(current_timestamp,-1)

    GROUP BY customerid

    HAVING sum(total)>2000

    --  SELECT

    ORDER BY customerid;

    ```


    The only thing that spoils the simplicity of the preceding example is the fact
    that the alias in the `SELECT` clause isn’t available yet in the `HAVING` clause,
    so you’re forced to rewrite the calculations. However, on the inside, SQL is smart
    enough not to actually recalculate the values.


    If you installed the sample database some time ago, you may not get any results,
    since the dates will have gone stale. At the very end of the sample script is
    an `UPDATE` statement. If you run it, it will adjust the dates to something more
    recent.'
