  trans: '

    ### INNER JOIN


    默认的连接类型是 `INNER JOIN`：


    | id | title | artistid | id | fullname |

    | --- | --- | --- | --- | --- |

    | 1 | 浴女 | 2 | 2 | 皮埃尔-奥古斯特·雷诺阿 |

    | 2 | 星夜 | 1 | 1 | 文森特·梵高 |

    | 3 | 暴风雪 | 3 | 3 | 约瑟夫·透纳 |

    | 4 | 舞者 | 2 | 2 | 皮埃尔-奥古斯特·雷诺阿 |

    | 5 | 月光 | 3 | 3 | 约瑟夫·透纳 |

    | 7 | 阿尔勒女人 | 1 | 1 | 文森特·梵高 |

    | 8 | 在露台上 | 2 | 2 | 皮埃尔-奥古斯特·雷诺阿 |


    ```sql

    SELECT *

    FROM minipaintings AS p

    INNER JOIN miniartists AS a ON p.artistid=a.id;

    ```


    这与之前示例的唯一区别是多了 `INNER` 这个词，你可以看到它并没有真正做任何特别的事情。既然是默认的，你完全可以省略它。


    请记住，使用 `INNER JOIN` 时，表名的顺序可以互换。你会得到相同的结果，但列的顺序可能会改变。


    ### LEFT OUTER JOIN 和 RIGHT OUTER JOIN


    `OUTER JOIN` 用于包含未匹配的行。它 *总是会包括* `INNER JOIN` 的结果。


    由于涉及两个表，你可以选择包含第一个表还是第二个表的未匹配行。如果你真的想包含两者的未匹配行，你会使用 `FULL OUTER JOIN`。


    然而，你可能更想包含来自 `minipaintings` 表的未匹配行，即 `minipaintings` 表中那些在 `miniartists` 表中没有匹配行的记录。用英文说，就是匿名画作。


    如前所述，表名的顺序可以互换。但是，当涉及到 `OUTER JOIN` 时，你需要记住哪个表是你先写的。


    如果你想包含 `minipaintings` 表的 `unmatched` 行，你需要将 `INNER JOIN` 改为相应的 `LEFT OUTER JOIN`
    或 `RIGHT OUTER JOIN`。


    如果你使用的是 SQLite，你会发现它不支持 `RIGHT JOIN`。他们建议你只需调换两个表的顺序，直到你能用 `LEFT JOIN` 得到想要的结果。


    你仍然可以参考后面的解释，但请忽略包含 `RIGHT JOIN` 的示例。


    将 `minipaintings` 表放在左边：


    ```sql

    SELECT *

    FROM minipaintings AS p LEFT OUTER JOIN miniartists AS a

    ON p.artistid=a.id;

    ```


    你会看到现在得到了内连接中缺失的匿名画作：


    | id | title | artistid | id | fullname |

    | --- | --- | --- | --- | --- |

    | 1 | 浴女 | 2 | 2 | 皮埃尔-奥古斯特·雷诺阿 |

    | 2 | 星夜 | 1 | 1 | 文森特·梵高 |

    | 3 | 暴风雪 | 3 | 3 | 约瑟夫·透纳 |

    | 4 | 舞者 | 2 | 2 | 皮埃尔-奥古斯特·雷诺阿 |

    | 5 | 月光 | 3 | 3 | 约瑟夫·透纳 |

    | 6 | 绿色葡萄园 |   |   |   |

    | 7 | 阿尔勒女人 | 1 | 1 | 文森特·梵高 |

    | 8 | 在露台上 | 2 | 2 | 皮埃尔-奥古斯特·雷诺阿 |


    将 `minipaintings` 表放在右边：


    ```sql

    SELECT *

    FROM miniartists AS a RIGHT OUTER JOIN minipaintings AS p

    ON a.id=p.artistid;

    ```


    也就是说，根据你想要包含未匹配行的表是在 `JOIN` 关键字的左边还是右边，来选择使用 `LEFT` 还是 `RIGHT`。`ON artists.id=paintings.artistid`
    子句的写法仍然可以互换。


    与 `INNER JOIN` 一样，`OUTER` 这个词也是可选的，所以你可以省略它：


    ```sql

    --  minipaintings 表在左边

    SELECT *

    FROM minipaintings AS p LEFT JOIN artists AS a

    ON p.artistid=a.id;

    --  paintings 表在右边

    SELECT *

    FROM miniartists AS a RIGHT JOIN minipaintings AS p

    ON paintings.artistid=artists.id;

    ```


    对于未匹配的行，相应的数据将填充为 `NULL`。


    ### “首选”的外连接


    在我们的示例中，我们使用 `OUTER JOIN` 来包含所有的画作，但不包含所有的艺术家。这部分是因为我们对画作更感兴趣，因为那是我们销售的商品。这也是由表之间的关系决定的。


    注意，`minipaintings` 表有一个指向 `miniartists` 的外键，但反之则不然。我们说这两个表之间存在 `一对多` 的关系。一个艺术家可以有多幅画作，或者，如果你愿意，也可以说多幅画作可以引用同一位艺术家。


    有时，我们说 `minipaintings` 表是 `子表`，而 `miniartists` 表是 `父表`。在 SQL 中，子表引用父表，但反之则不然。


    当你连接两个表时，你通常想要的是子表的外连接。然而，你也可以得到父表的外连接：


    ```sql

    --  minipaintings 表在左边

    SELECT *

    FROM minipaintings AS p RIGHT JOIN miniartists AS a

    ON p.artistid=a.id;

    --  minipaintings 表在右边

    SELECT *

    FROM artists AS a LEFT JOIN minipaintings AS p

    ON p.artistid=a.id;

    ```


    这将产生 `INNER JOIN` 的结果加上未匹配的艺术家。这并不常见，但在少数情况下可能有用。


    首先，在这个数据库中，你对画作更感兴趣，并将艺术家信息视为画作的额外细节。然而，如果你是艺术家的经纪人（在本例中可能为时已晚），你会对 `miniartists`
    表更感兴趣，那么你可能会对之前提到的父表外连接感兴趣。


    其次，你可以使用这种连接来查找未匹配的艺术家。例如：


    ```sql

    SELECT a.*

    FROM minipaintings AS p RIGHT JOIN miniartists AS a

    ON p.artistid=a.id

    WHERE p.id IS NULL;

    ```


    这会给你以下结果：


    | id | fullname |

    | --- | --- |

    | 5 | 列奥纳多·达·芬奇 |

    | 4 | 安藤广重 |


    在这里，你通过生成外连接并过滤掉已匹配的画作，来寻找没有对应画作的艺术家。这将给你一个与之前“未匹配艺术家”类似的结果。


    ### 关于 JOIN 的一些建议


    在编写连接时，你显然有一些选择。只要能工作，具体采用哪种方式并不重要。然而，一个好的开发人员总是会编写清晰且易于维护的代码。


    以下是一些建议。最终，无论你选择什么，都应该保持一致，不要频繁改变规则。


    #### （几乎）总是为表使用别名


    在极少数情况下，你可能会在不给表起别名的情况下编写连接，但一旦你开始选择特定的列，情况就会变得混乱。给表起别名总是一个好主意。


    #### 哪个表放在前面？


    显然，我们可以选择先写哪个表。你如何决定？


    首先，这无关紧要，所以即使你选择另一种顺序，也不会导致出错。然而，在实践中，你可能对一个表比另一个表更感兴趣。


    如果你是艺术家的经纪人，那么你会更倾向于列出艺术家及其画作。在这个示例中，我们销售的是画作，所以我们更倾向于列出画作及其艺术家。


    通常，把你更感兴趣的表放在左边。这意味着，当涉及到外连接时，你更有可能使用 `LEFT JOIN`。这也是我们在本书中主要采用的方式。


    请记住，SQLite 甚至不支持 `RIGHT JOIN`，并且他们建议你在必要时交换表的顺序以使用 `LEFT JOIN`。显然，没有人怀念 `RIGHT
    JOIN`。


    #### 决定是否使用 INNER 和 OUTER


    `INNER` 和 `OUTER` 都是可选的，所以原则上你可以随心所欲。然而，我们建议你选定一个规则并坚持下去。如果你有时使用这些关键字，有时又不使用，可能会引起混淆和误解。


    在本书中，我们省略了它们，但在现实中，这取决于你。

    '
- fmt: '# Finishing the Price List


    We’ve started on creating a price list using joined tables:


    ```sql

    SELECT

    p.id,

    p.title,

    a.givenname||'' ''||a.familyname AS artist,

    a.nationality,

    p.price, p.price*0.1 AS tax, p.price*1.1 AS total

    FROM paintings AS p JOIN artists AS a ON p.artistid=a.id;

    ```


    Compared to the previous version with the subquery, this has both less than we
    want and more than what we want.


    First, there’s the matter of the missing paintings. Remember that there are some
    paintings without an `artistid`, and the inner join earlier will miss them. A
    suitable outer join should fix that.


    Second, there are some paintings without a price. It’s not for us to decide *why*
    they’re without a price: perhaps they are new paintings which haven’t been priced
    yet or old paintings we don’t sell anymore. The point is that there’s no point
    in including them in a price list. For that, we can filter out the `NULL`s.


    What we can do now is drop the old version of the price list and replace it with
    the join version:


    ```sql

    DROP VIEW IF EXISTS pricelist;

    CREATE VIEW pricelist AS

    SELECT

    p.id,

    p.title,

    a.givenname||'' ''||a.familyname AS artist,

    a.nationality,

    p.price, p.price*0.1 AS tax, p.price*1.1 AS total

    FROM paintings AS p LEFT JOIN artists AS a ON p.artistid=a.id

    WHERE p.price IS NULL;

    ```


    For the various DBMSs, remember:


    *   Oracle doesn’t support `IF EXISTS`.

    *   Microsoft requires `GO` before and after the `CREATE VIEW` block.

    *   MySQL/MariaDB needs to be set to ANSI mode for the concatenation; otherwise,
    you’ll need to use the `concat()` function. Microsoft needs the `+` for concatenation.


    # Joining Many Tables


    The purpose of a join is to combine data from two or more tables. Sometimes, the
    additional data is from many other tables, and sometimes the data is from another
    table not directly related to the main table.


    For example, suppose you want a list of customers and the artists from whom they
    purchased paintings. You might be considering a promotion where customers get
    a discount on purchases for previously purchased artists.


    The statement would look something like this:


    ```sql

    SELECT

    c.id, c.givenname, c.familyname,

    a.id,

    a.givenname||'' ''||a.familyname AS artist

    FROM ... ;

    ```


    You know that you will be using a join which includes the `customers` and `artists`
    table and that you will alias these tables with suitable initials.


    The problem is that the two tables involved are not directly related to each other.


    As you see from the database diagram, the relationship between these tables is
    a long one, involving the `sales`, `saleitems`, and `paintings` tables. Intuitively,
    this makes sense: for each customer, you can check their sales and sale items,
    then check the paintings for each sale item, and finally get to the artist for
    each painting.


    To facilitate this, you will need to join all five tables, two at a time:


    ```

    customers ← sales ← saleitems → paintings → artists

    ```


    Note the direction of the arrows. They indicate where a foreign key is referencing
    a primary key. In more detail:


    ```

    customers.id

    ← customerid.sales.id

    ← saleid.saleitems.paintingid

    → id.paintings.artistid

    → id.artists

    ```


    Your real database may have many more tables. However, generally, the principle
    will be the same: you usually work with a relatively small number of tables for
    a particular query.


    ## Building a Larger JOIN


    The purpose of the join is to get data from the end tables. However, we can also
    get data from any of the tables in between.


    You can easily join five tables if you start on one end of the chain and keep
    on to the other end:


    ```sql

    SELECT

    *

    FROM

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    JOIN artists AS a ON p.artistid=a.id

    ;

    ```


    Remember to leave out the `AS` if you’re using Oracle.


    This will give you a very long list:


    | id | givenname | familyname | … | id | givenname | familyname | … |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 79 | Daisy | Chain | … | 20 | Frans | Hals | … |

    | 459 | Matt | Black | … | 314 | (Eugène-Henri-) Paul | Gauguin | … |

    | 28 | Meg | Aphone | … | 43 | Johan-Barthold | Jongkind | … |

    | 179 | Ivan | Inkling | … | 266 | Vincent | Van Gogh | … |

    | 94 | Stan | Dover | … | 344 | Edgar | Degas | … |

    | 373 | April | Showers | … | 3 | Diego | Velázquez | … |

    | ~ 6099 rows ~ |


    Note that all of the joins follow the foreign keys. The pattern is


    ```

    table

    JOIN table ON relationship

    JOIN table ON relationship

    JOIN table ON relationship

    JOIN table ON relationship

    ```


    Five tables, four joins between them.


    The layout is purely a matter of preference. In a simple two-table join, we put
    everything on one line. In a larger join, we separated the joins out to make them
    easier to follow.


    As usual, we use a simple initial as a table alias. In one case, `saleitems`,
    this wouldn’t work as its initial was already used, so `si` seemed suitable. As
    always, any distinct alias will do, but it makes sense to use an alias which is
    intuitive.


    Once you do this, you’ll find a large number of columns and a `huge` number of
    rows. Let’s deal with the columns first. You can simplify the `SELECT` clause
    to only include the columns you’re interested in:


    ```sql

    SELECT

    c.id,

    c.givenname, c.familyname,

    s.id,

    a.givenname||'' ''||a.familyname AS artist

    FROM

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    JOIN artists AS a ON p.artistid=a.id

    ;

    ```


    This gives a simplified result as follows:


    | id | givenname | familyname | id | artist |

    | --- | --- | --- | --- | --- |

    | 79 | Daisy | Chain | 1066 | Frans Hals |

    | 459 | Matt | Black | 2067 | (Eugène-Henri-) Paul Gauguin |

    | 28 | Meg | Aphone | 271 | Johan-Barthold Jongkind |

    | 179 | Ivan | Inkling | 2749 | Vincent Van Gogh |

    | 94 | Stan | Dover | 361 | Edgar Degas |

    | 373 | April | Showers | 2681 | Diego Velázquez |

    | ~ 6099 rows ~ |


    For convenience, the artist’s name is concatenated. Remember to use `+` in MSSQL.


    This query will work, but there is a minor technical problem with the `id`. If
    you have plans of taking the query seriously, such as in a view, you can’t have
    two columns with the same name. It’s not hard to give one of them an alias:


    ```sql

    SELECT

    c.id,

    c.givenname, c.familyname,

    s.id AS sid,

    a.givenname||'' ''||a.familyname AS artist

    FROM

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    JOIN artists AS a ON p.artistid=a.id

    ;

    ```


    You can alias the other columns if you like, but only the `id` is necessary.'
