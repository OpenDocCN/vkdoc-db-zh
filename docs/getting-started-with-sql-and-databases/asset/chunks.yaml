  trans: '

    # 完成价格列表


    我们已经开始使用连接表来创建价格列表：


    ```sql

    SELECT

    p.id,

    p.title,

    a.givenname||'' ''||a.familyname AS artist,

    a.nationality,

    p.price, p.price*0.1 AS tax, p.price*1.1 AS total

    FROM paintings AS p JOIN artists AS a ON p.artistid=a.id;

    ```


    与之前使用子查询的版本相比，这个版本既有我们想要的东西不足，又有我们不需要的东西过多。


    首先，是缺失画作的问题。记住，有些画作没有 `artistid`，而之前的内连接会遗漏它们。一个合适的外连接应该可以解决这个问题。


    其次，有些画作没有价格。我们无需决定*为什么*没有价格：也许它们是尚未定价的新画，或者是不再出售的旧画。关键是，把它们包含在价格列表中毫无意义。为此，我们可以过滤掉
    `NULL` 值。


    我们现在可以做的是删除旧版的价格列表，并用连接版本替换它：


    ```sql

    DROP VIEW IF EXISTS pricelist;

    CREATE VIEW pricelist AS

    SELECT

    p.id,

    p.title,

    a.givenname||'' ''||a.familyname AS artist,

    a.nationality,

    p.price, p.price*0.1 AS tax, p.price*1.1 AS total

    FROM paintings AS p LEFT JOIN artists AS a ON p.artistid=a.id

    WHERE p.price IS NULL;

    ```


    对于各种数据库管理系统（DBMS），请记住：


    *   Oracle 不支持 `IF EXISTS`。

    *   Microsoft 要求在 `CREATE VIEW` 语句块前后加上 `GO`。

    *   MySQL/MariaDB 需要设置为 ANSI 模式才能使用字符串连接；否则，你需要使用 `concat()` 函数。Microsoft 需要使用
    `+` 进行连接。


    # 连接多个表


    连接的目的是组合来自两个或更多表的数据。有时，附加数据来自许多其他表；有时，数据来自另一个不直接与主表相关的表。


    例如，假设你想要一个客户列表以及他们向哪些画家购买了画作。你可能正在考虑一个促销活动，对于客户以前购买过的画家的新作品，客户可以获得折扣。


    查询语句可能类似于这样：


    ```sql

    SELECT

    c.id, c.givenname, c.familyname,

    a.id,

    a.givenname||'' ''||a.familyname AS artist

    FROM ... ;

    ```


    你知道你将使用一个包含 `customers`（客户）和 `artists`（画家）表的连接，并且你会用合适的首字母缩写来为这些表设置别名。


    问题在于涉及的这两个表彼此并不直接相关。


    从数据库关系图中你可以看到，这些表之间的关系很长，涉及 `sales`（销售）、`saleitems`（销售项）和 `paintings`（画作）表。直观上看，这很有道理：对于每个客户，你可以查看他们的销售记录和销售项，然后查看每个销售项对应的画作，最后找到每幅画的画家。


    为了实现这一点，你需要连接所有五个表，每次连接两个：


    ```

    customers ← sales ← saleitems → paintings → artists

    ```


    注意箭头的方向。它们表示外键引用主键的方向。更详细地说：


    ```

    customers.id

    ← customerid.sales.id

    ← saleid.saleitems.paintingid

    → id.paintings.artistid

    → id.artists

    ```


    你的真实数据库可能有更多的表。但通常，原理是相同的：对于一个特定的查询，你通常只需处理相对较少数量的表。


    ## 构建更大的连接


    连接的目的是从末端表获取数据。然而，我们也可以从中间的任何表获取数据。


    如果你从链的一端开始，一直连接到另一端，连接五个表是很容易的：


    ```sql

    SELECT

    *

    FROM

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    JOIN artists AS a ON p.artistid=a.id

    ;

    ```


    如果你使用 Oracle，记得省略 `AS`。


    这将给你一个很长的列表：


    | id | givenname | familyname | … | id | givenname | familyname | … |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 79 | Daisy | Chain | … | 20 | Frans | Hals | … |

    | 459 | Matt | Black | … | 314 | (Eugène-Henri-) Paul | Gauguin | … |

    | 28 | Meg | Aphone | … | 43 | Johan-Barthold | Jongkind | … |

    | 179 | Ivan | Inkling | … | 266 | Vincent | Van Gogh | … |

    | 94 | Stan | Dover | … | 344 | Edgar | Degas | … |

    | 373 | April | Showers | … | 3 | Diego | Velázquez | … |

    | ~ 6099 行 ~ |


    请注意，所有的连接都遵循外键。模式是：


    ```

    table

    JOIN table ON relationship

    JOIN table ON relationship

    JOIN table ON relationship

    JOIN table ON relationship

    ```


    五个表，它们之间有四个连接。


    布局纯粹是个人喜好问题。在简单的两表连接中，我们将所有内容放在一行。在更大的连接中，我们将连接分开写，以便于阅读。


    通常，我们使用简单的首字母作为表别名。在一种情况下，`saleitems`（销售项）这样做不行，因为它的首字母已被使用，所以 `si` 看起来是合适的。一如既往，任何不同的别名都可以，但使用一个直观的别名是有意义的。


    一旦你这样做，你会发现大量的列和 `大量` 的行。我们先来处理列。你可以简化 `SELECT` 子句，只包含你感兴趣的列：


    ```sql

    SELECT

    c.id,

    c.givenname, c.familyname,

    s.id,

    a.givenname||'' ''||a.familyname AS artist

    FROM

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    JOIN artists AS a ON p.artistid=a.id

    ;

    ```


    这给出了一个简化的结果，如下所示：


    | id | givenname | familyname | id | artist |

    | --- | --- | --- | --- | --- |

    | 79 | Daisy | Chain | 1066 | Frans Hals |

    | 459 | Matt | Black | 2067 | (Eugène-Henri-) Paul Gauguin |

    | 28 | Meg | Aphone | 271 | Johan-Barthold Jongkind |

    | 179 | Ivan | Inkling | 2749 | Vincent Van Gogh |

    | 94 | Stan | Dover | 361 | Edgar Degas |

    | 373 | April | Showers | 2681 | Diego Velázquez |

    | ~ 6099 行 ~ |


    为方便起见，画家的姓名被连接在一起。记得在 MSSQL 中使用 `+`。


    这个查询可以工作，但有一个小的技术问题在于 `id`。如果你打算认真使用这个查询，例如在视图中，你不能有两个同名的列。给其中一个列起一个别名并不难：


    ```sql

    SELECT

    c.id,

    c.givenname, c.familyname,

    s.id AS sid,

    a.givenname||'' ''||a.familyname AS artist

    FROM

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    JOIN artists AS a ON p.artistid=a.id

    ;

    ```


    如果你愿意，也可以给其他列起别名，但只有 `id` 是必须的。

    '
- fmt: '## Simplifying the Result


    There’s a lot of data there, and it can be a little overwhelming. For one thing,
    there is likely to be some repetition.


    It’s quite conceivable that a particular customer/combination will occur multiple
    times. After all, if the artist really is a favorite of the customers, then you
    would expect multiple purchases.


    To see whether this might be the case, you can first sort the results by customer
    name:


    | id | givenname | familyname | sid | artist |

    | --- | --- | --- | --- | --- |

    | 260 | Aiden | Abet | 902 | Pierre-Auguste Renoir |

    | 260 | Aiden | Abet | 902 | Pierre-Auguste Renoir |

    | 260 | Aiden | Abet | 902 | Rembrandt van Rijn |

    | 260 | Aiden | Abet | 1006 | Kasimir Malevich |

    | 260 | Aiden | Abet | 1006 | Paul Cézanne |

    | 260 | Aiden | Abet | 818 | Rembrandt van Rijn |

    | ~ 6099 rows ~ |


    ```sql

    SELECT

    c.id,

    c.givenname, c.familyname,

    s.id AS sid,

    a.givenname||'' ''||a.familyname AS artist

    FROM

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    JOIN artists AS a ON p.artistid=a.id

    ORDER BY c.familyname, c.givenname

    ;

    ```


    If you look hard enough, you will see some duplicates. At this point, we’re not
    interested in how often this appears nor how much money was spent. We just want
    the names. For that, we can use `DISTINCT`:


    | id | givenname | familyname | sid | artist |

    | --- | --- | --- | --- | --- |

    | 260 | Aiden | Abet | 818 | Auguste Rodin |

    | 260 | Aiden | Abet | 818 | Paul Cézanne |

    | 260 | Aiden | Abet | 818 | Rembrandt van Rijn |

    | 260 | Aiden | Abet | 902 | Pierre-Auguste Renoir |

    | 260 | Aiden | Abet | 902 | Rembrandt van Rijn |

    | 260 | Aiden | Abet | 1006 | Jean-Antoine Watteau |

    | ~ 5997 rows ~ |


    ```sql

    SELECT DISTINCT

    c.id,

    c.givenname, c.familyname,

    s.id AS sid,

    a.givenname||'' ''||a.familyname AS artist

    FROM

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    JOIN artists AS a ON p.artistid=a.id

    ORDER BY c.familyname, c.givenname

    ;

    ```


    That will substantially reduce the number of results, though it’s still a large
    number.


    Remember that `DISTINCT` only operates on what’s in the `SELECT` clause; it doesn’t
    know (or care) about any other values. Say you were to forget about the customer’s
    `id`:


    ```sql

    SELECT DISTINCT

    --  c.id,

    c.givenname, c.familyname,

    s.id AS sid,

    a.givenname||'' ''||a.familyname AS artist

    FROM

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    JOIN artists AS a ON p.artistid=a.id

    ORDER BY c.familyname, c.givenname

    ;

    ```


    You’d get a slightly smaller dataset, but it would not be technically correct.
    There are some customers who have the same name as other customers, and it’s possible
    that two with the same name just happen to have bought something by the same artist.
    Without something unique to distinguish them, they would be combined.


    That’s still a lot of data. In the next chapter, we’ll see how we can produce
    a summary of large amounts of data like this.


    ## Revisiting Some Subqueries


    In Chapter [3](#601766_1_En_3_Chapter.xhtml), we used some subqueries to use data
    from one table as a filter for another. Here, we’ll look at using joined tables
    instead.


    For the first one, we found customers who had spent a large amount in individual
    sales:


    ```sql

    SELECT *

    FROM customers

    WHERE id IN(SELECT customerid FROM sales WHERE total>1200);

    ```


    You can get a similar result using a join:


    ```sql

    SELECT DISTINCT c.*

    FROM customers AS c JOIN sales AS s on c.id=s.customerid

    WHERE s.total>1200;

    ```


    This gives you the following:


    | id | givenname | familyname | … |

    | --- | --- | --- | --- |

    | 115 | Robin | Banks | … |

    | 163 | Artie | Choke | … |

    | 172 | Kenny | Doit | … |

    | 241 | Gail | Warning | … |

    | 26 | Orson | Buggy | … |

    | 29 | June | Hills | … |

    | ~ 106 rows ~ |


    Note


    *   We use `c.*` to get the same results as the first query, which only queries
    the `customers` table.

    *   To get *exactly* the same results, the second query uses `DISTINCT`, since
    the join might have produced duplicated rows.


    In fact, using the join, you can also get results from the `sales` table, such
    as the actual value of the sale. However, then you shouldn’t use `DISTINCT`, since
    we’re talking about different sales:


    ```sql

    SELECT c.*, s.total

    FROM customers AS c JOIN sales AS s on c.id=s.customerid

    WHERE s.total>1200;

    ```


    Here are the results with sales totals:


    | id | givenname1 | familyname | … | total |

    | --- | --- | --- | --- | --- |

    | 2 | Laurel | Wreath | … | 1380.00 |

    | 10 | Terry | Fied | … | 1230.00 |

    | 19 | Millie | Pede | … | 2005.00 |

    | 46 | Hank | Ering | … | 1555.00 |

    | 24 | Bart | Ender | … | 1830.00 |

    | 69 | Pat | Downe | … | 1315.00 |

    | ~ 147 rows ~ |


    You can do the same thing to get your Dutch paintings:


    ```sql

    SELECT *

    FROM paintings

    WHERE artistid IN (

    SELECT id FROM artists  WHERE nationality IN

    (''Dutch'',''Netherlandish'')

    );

    ```


    Using a join, you can use


    ```sql

    SELECT p.*

    FROM paintings AS p JOIN artists AS a on p.artistid=a.id

    WHERE a.nationality IN (''Dutch'',''Netherlandish'');

    ```


    Here are the Dutch (and Netherlandish) artists:


    | id | artistid | title | year | price |

    | --- | --- | --- | --- | --- |

    | 541 | 256 | Butcher’s Stall with the Flight … | | 110.00 |

    | 81 | 198 | The Garden of Earthly Delights | | |

    | 1503 | 182 | Breakfast of Crab | 1648 | 160.00 |

    | 2128 | 370 | The Geographer | | 125.00 |

    | 264 | 370 | Girl with a Pearl Earring | 1666 | 140.00 |

    | 1446 | 266 | Entrance to the Public Garden … | 1888 | 115.00 |

    | ~ 186 rows ~ |


    Again, we’ve limited the results to one table, but you can also include data from
    the other table.'
