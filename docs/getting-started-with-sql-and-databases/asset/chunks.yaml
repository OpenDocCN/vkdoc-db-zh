- fmt: '## Intersections


    The **intersection** of two sets is the elements which are members of both. Diagrammatically,
    it looks like Figure [9-2](#601766_1_En_9_Chapter.xhtml#Fig2).


    ![](images/601766_1_En_9_Chapter/601766_1_En_9_Fig2_HTML.jpg)


    A figure represents the intersection of two sets.


    Figure 9-2


    The Intersection of Two Sets


    It’s possible, of course, that two sets have nothing in common, in which case
    we say that they are **disjoint**.


    Suppose, for example, you’re wondering whether some of your `customers` also happen
    to be `employees`. You could ask them, of course, but let’s see how SQL can help.


    To find names that appear in both the `customers` and `employees` table, you could
    run this:


    ```

    SELECT givenname, familyname FROM customers

    INTERSECT

    SELECT givenname, familyname FROM employees;

    ```


    You’ll probably get a few:


    | givenname | familyname |

    | --- | --- |

    | Bonnie | Banks |

    | Joe | Kerr |

    | Russell | Leaves |


    Remember only the data in the `SELECT` clause is checked, so all you can be sure
    of is that the names appear in both tables. Of itself, it’s no guarantee that
    they are, in fact, the same person.


    Here’s a slightly more involved example. Suppose you want to find which paintings
    are popular all over the country. That will involve two ideas:


    *   First, you’ll need to get a set of paintings related to states. You have already
    done something similar when you got a set of customers and artists. This will
    be a join between multiple tables.


    *   Second, SQL doesn’t have a simple way of testing whether something is sometimes
    one thing and sometimes another. This is where the `INTERSECT` will help.


    To get a list of states and paintings, we can use the following join:


    ```

    SELECT p.id, c.state,p.title

    FROM

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    ;

    ```


    You’ll get quite a long list:


    | id | state | truncate |

    | --- | --- | --- |

    | 1065 | TAS | Pieter van den Broecke … |

    | 870 | NT | Nave, Nave Moe (Miraculous Source) … |

    | 2061 | QLD | The Church of Overschie … |

    | 1796 | WA | Wheat Field … |

    | 1874 | QLD | L’etoile [La danseuse sur la scene] … |

    | 1516 | WA | The Count-Duke of Olivares on Horseb … |

    | ~ 6315 rows ~ |


    Having got that result, we’ll wrap it in a CTE:


    ```

    WITH cte AS (

    SELECT p.id, c.state, p.title

    FROM

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    )

    --  more

    ;

    ```


    The next part’s tedious, but copy and paste is your friend here:


    ```

    WITH cte AS (

    SELECT p.id, c.state, p.title

    FROM

    customers AS c

    JOIN sales AS s ON c.id=s.customerid

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN paintings AS p ON si.paintingid=p.id

    )

    SELECT id, title FROM cte WHERE state=''NSW''

    INTERSECT

    SELECT id, title FROM cte WHERE state=''VIC''

    INTERSECT

    SELECT id, title FROM cte WHERE state=''QLD''

    ORDER BY title;

    ```


    As long as we select only the relevant columns, we’ll get something like this:


    | id | title |

    | --- | --- |

    | 2144 | A Domestic Affliction |

    | 1745 | Aeneas’ Flight from Troy |

    | 1426 | Aesop |

    | 2214 | Alexander and Porus |

    | 16 | Algerian Women in Their Apartments |

    | 964 | Allegory |

    | ~ 384 rows ~ |


    In this example, we’ve only listed the three larger states, all of which are likely
    to include the paintings. You need to be careful here. If you include the smaller
    states as well, that’s OK, but they will match fewer of the paintings, so the
    `INTERSECT` will return fewer results.


    Also, note the inclusion of the `id` column. Just as with `UNION`, only the columns
    in the `SELECT` clause are matched. If you don’t include the `id` column, then
    two different paintings with the same title would be matched, and you’d get a
    false impression.


    ## Differences


    One more operation is finding elements in one set which *don’t* belong in the
    other. This uses the `EXCEPT` operator. Oracle calls this `MINUS`, which is not
    technically standard, but makes the point very clear.


    The operation looks like Figure [9-3](#601766_1_En_9_Chapter.xhtml#Fig3).


    ![](images/601766_1_En_9_Chapter/601766_1_En_9_Fig3_HTML.jpg)


    A figure represents the difference of the two sets.


    Figure 9-3


    The Difference of Two Sets


    For example, if you’re looking for `employees` whose names don’t match `customers`,
    you can do this with


    ```

    SELECT givenname, familyname FROM employees

    EXCEPT      --  Standard

    --  MINUS   --  Oracle

    SELECT givenname, familyname FROM customers

    ORDER BY familyname, givenname;

    ```


    This gives you the following:


    | givenname | familyname |

    | --- | --- |

    | Gladys | Bowles |

    | Beryl | Bubbles |

    | Mildred | Codswallup |

    | Clarisse | Cringinghut |

    | Rubin | Croucher |

    | Nugent | Dirt |

    | ~ 29 rows ~ |


    Unlike `UNION` and `INTERSECT`, this operation is not symmetrical: you will get
    a different result if you reverse the `SELECT` statements:


    ```

    SELECT givenname, familyname FROM customers

    EXCEPT      --  Standard

    --  MINUS   --  Oracle

    SELECT givenname, familyname FROM employees

    ORDER BY familyname, givenname;

    ```


    This gives you a different result:


    | givenname | familyname |

    | --- | --- |

    | Aiden | Abet |

    | Alf | Abet |

    | Ollie | Agenous |

    | Corey | Ander |

    | Ike | Andy |

    | Adam | Ant |

    | ~ 290 rows ~ |


    Suppose, for example, you want to find the `customers` who haven’t bought anything.
    The most direct approach is to get all the customer `id`s and exclude those whose
    `customerid` appears in the `sales` table:


    ```

    SELECT id FROM customers

    EXCEPT  --  Oracle: MINUS

    SELECT customerid FROM sales;

    ```


    Here, you’ll get a list of customer ids:


    | id |

    | 394 |

    | 169 |

    | 309 |

    | 556 |

    | 493 |

    | 529 |

    | ~ 48 rows ~ |


    Of course, that’s all you get. Like all set operations, you can’t select extra
    columns if you don’t want them to interfere. If you want the rest of the customer
    details, you might prefer an outer join and filter for missing sales:


    ```

    SELECT c.id, c.givenname, c.familyname --  etc

    FROM customers AS c LEFT JOIN sales AS s

    ON s.customerid=c.id

    WHERE s.id IS NULL;

    ```


    This gives you something more informative:


    | id | givenname | familyname |

    | --- | --- | --- |

    | 209 | Gideon | Wine |

    | 101 | Lindsay | Doyle |

    | 330 | Clara | Fied |

    | 178 | Kurt | See |

    | 17 | Anne | Onymous |

    | 57 | Bess | Twishes |

    | ~ 48 rows ~ |


    The same technique can be used to look for `artists` whose paintings we don’t
    have:


    ```

    --  EXCEPT

    SELECT id FROM artists

    EXCEPT  --  Oracle: MINUS

    SELECT artistid FROM paintings;

    --  Using OUTER JOIN

    SELECT a.id, a.givenname, a.familyname  --  etc

    FROM paintings AS p RIGHT JOIN artists AS a

    ON p.artistid=a.id

    WHERE p.id IS NULL;

    ```


    As with all the set operators, `EXCEPT` is most useful when you only want the
    actual data which is different, such as the `id` earlier. If you want more details,
    you might be better off using an alternative.


    ## Some Tricks with Set Operations


    Generally, the most common use case of `UNION` is to combine data from multiple
    tables, as in our first example. In a well-designed database, you may not see
    much need for that.


    For example, you might have different tables for `customers` in different states,
    and you might then combine them with `UNION`. However, it would have been better
    to have all the customers in one table in the first place.


    Multiple tables aren’t always the result of bad design. For example, you might
    separate your sales into current sales and older sales, so that working with current
    sales is easier and faster. When you occasionally need to search through the lot,
    you can combine them.


    In this section, we’ll look at how a `UNION` can be used for a few special techniques.'
