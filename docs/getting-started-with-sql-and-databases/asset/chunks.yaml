- fmt: '### Comparing Results


    In Chapter [7](#601766_1_En_7_Chapter.xhtml) on aggregates, we commented that
    two queries would give the same results:

    ```sql

    --  Sub Query

    SELECT

    customerid,

    (SELECT givenname||'' ''||familyname  --  MSSQL: Use `+`

    FROM customers

    WHERE customers.id = sales.customerid

    ) AS customer,

    count(*) AS number_of_sales,

    sum(total) AS total

    FROM sales

    GROUP BY customerid;

    --  Join

    SELECT

    c.id, c.givenname||'' ''||c.familyname AS customer,

    count(*) AS number_of_sales, sum(s.total) AS total

    FROM sales AS s JOIN customers AS c ON s.customerid=c.id

    GROUP BY c.id, c.givenname||'' ''||c.familyname;

    ```


    Both should give the same:

    | customerid | customer | number_of_sales | total |

    | --- | --- | --- | --- |

    | 384 | Mickey Finn | 6 | 5445 |

    | 351 | Dick Tate | 12 | 7650 |

    | 184 | Dee Lighted | 11 | 5040 |

    | 116 | Tim Burr | 14 | 8470 |

    | 273 | Harry Leggs | 13 | 9070 |

    | 550 | Kate Ering | 1 | 805 |

    | ~ 256 rows ~ |


    We’ve left out the `ORDER BY` clauses, since we’re focusing on the data only.


    How can we be sure that the two results really are the same? If it’s only a handful
    of rows, you can just compare them, but if it’s a larger number, then you’ll need
    a different approach.


    First, note that the two queries produce the same `number` of rows. That’s a start.
    Also, note that the columns are the same.


    After that, you can use a set operation to do the hard work. Actually, it doesn’t
    matter which one you use, but all three can give you a stronger feeling of assurance:

    ```sql

    --  Sub Query

    SELECT

    customerid,

    (SELECT givenname||'' ''||familyname  --  MSSQL: Use `+`

    FROM customers

    WHERE customers.id = sales.customerid

    ) AS customer,

    count(*) AS number_of_sales,

    sum(total) AS total

    FROM sales

    GROUP BY customerid

    UNION   --  or `INTERSECT` or `EXCEPT` / `MINUS`

    SELECT

    c.id, c.givenname||'' ''||c.familyname AS customer,

    count(*) AS number_of_sales, sum(s.total) AS total

    FROM sales AS s JOIN customers AS c ON s.customerid=c.id

    GROUP BY c.id, c.givenname||'' ''||c.familyname;

    ```


    Remember to remove the semicolon after the first query.


    If both results really are the same, then the second result set should be the
    same as the first. The test results will be as follows:


    *   `UNION`: Since `UNION` removes the duplicates, you should get only the first
    result set.

    *   `INTERSECT`: This returns only the results which are in both, which should
    be all of them.

    *   `EXCEPT`/`MINUS`: This should return an empty set, since you are removing
    all of the results which are the same in the second set. In this case, you don’t
    have to worry about reversing the order, since you already know that they have
    the same number of rows.


    Any one test should do, but it’s not hard to try all three if you’re not wholly
    convinced.


    ### Virtual Tables


    In Chapter [5](#601766_1_En_5_Chapter.xhtml) on calculations, we noted that you
    can add to dates. Dates are notoriously awkward because months vary in length,
    and you might want to test what happens when you add a number of days to different
    months.


    We can test what happens if we have a table of samples. In this case, we’ll generate
    a virtual table in the form of a `UNION`.


    First, we can generate a `UNION` with some sample values:

    ```sql

    --  PostgreSQL, MSSQL, MySQL / MariaDB

    SELECT ''one'' AS test,

    cast(''2020-01-29'' as date) AS testdate

    UNION

    SELECT ''two'', cast(''2020-02-28'' as date)

    UNION

    SELECT ''three'', cast(''2020-03-30'' as date);

    --  SQLite

    SELECT ''one'' AS test, ''2020-01-29'' AS testdate

    UNION

    SELECT ''two'', ''2020-02-28''

    UNION

    SELECT ''three'', ''2020-03-30'';

    --  Oracle

    SELECT ''one'' AS test,

    cast(''29 Jan 2020'' as date) AS testdate

    FROM dual

    UNION

    SELECT ''two'', cast(''28 Feb 2020'' as date)

    FROM dual

    UNION

    SELECT ''three'', cast(''30 Mar 2020'' as date)

    FROM dual;

    ```


    You’ll get a simple three-row table:

    | test | testdate |

    | --- | --- |

    | one | 2020-01-29 |

    | three | 2020-03-30 |

    | two | 2020-02-28 |


    We can now wrap that in a `CTE`:

    ```sql

    WITH samples AS (

    SELECT …

    UNION

    SELECT …

    UNION

    SELECT …

    )

    ```

    and test the arithmetic:

    ```sql

    --  PostgreSQL, MySQL / MariaDB, Oracle

    WITH samples AS (…)

    SELECT test, testdate, testdate+interval ''30'' day

    FROM samples;

    --  MSSQL

    WITH samples AS (…)

    SELECT test, testdate, dateadd(day,30,testdate)

    FROM samples;

    --  SQLite

    WITH samples AS (…)

    SELECT test, testdate,

    strftime(''%Y-%m-%d'',testdate,''+30 day'')

    FROM samples;

    ```


    We now have the samples together with their calculated values:

    | test | testdate | ?column? |

    | --- | --- | --- |

    | one | 2020-01-29 | 2020-02-28 00:00:00 |

    | three | 2020-03-30 | 2020-04-29 00:00:00 |

    | two | 2020-02-28 | 2020-03-29 00:00:00 |


    Some DBMSs also supply a table value literal notation, which may be simpler:

    ```sql

    --  PostgreSQL, MySQL / MariaDB, SQLite

    WITH samples(test, testdate) AS (

    VALUES(''one'',''2020-01-29''),(''two'',''2020-02-28''),(''three'', ''2020-03-30'')

    )

    SELECT …

    FROM samples;

    ```


    Using a virtual table of samples this way makes it easier to test out some techniques
    without the need to create real tables.'
