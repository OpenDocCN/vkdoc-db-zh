    \   | Wed     |\n| 60  | 2022-03-09 15:01:05.592177   | Wed     |\n|  ~ 2509 行\
    \ |                              |         |\n\nSQLite 没有简单的方法来生成星期名称。无论如何，你总是可以按工作日数字进行分组。\n\
