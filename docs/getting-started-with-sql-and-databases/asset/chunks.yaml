- fmt: '## Using a Self-Join


    Generally, you would expect a join between two or more tables. When we have a
    look at summarizing data in the next chapter, we’ll see how one of those tables
    might be a virtual summary table. Here, we’ll look at joining a table to itself.


    There is an `employees` table which includes a reference to the supervisor as
    you can see in Figure [6-3](#601766_1_En_6_Chapter.xhtml#Fig3).


    ![](images/601766_1_En_6_Chapter/601766_1_En_6_Fig3_HTML.jpg)


    The table displays employee details, which include `id`, `supervisorid`, `givenname`,
    `familyname`, `email`, `phone`, and `tfn`. It has a foreign key and primary key
    assigned to `id` and `supervisorid`, while `phone` and `tfn` are assigned as unique.


    Figure 6-3


    A Self-Referencing Table


    In designing such a table, there are two common mistakes when it comes to the
    supervisor:


    *   The novice designer might include the supervisor details with the rest of
    the employee details. This is a poor design for the same reasons that you shouldn’t
    include artist details with the paintings.

    *   The novice designer might create an additional table for supervisors.


    The second error is more subtle, but is still an error. First, a supervisor is
    also an employee, so their details will be duplicated in two tables. This is unlike
    the paintings and artists which are different things. Second, there may be a higher
    level of supervision, which would entail creating additional supervisor tables,
    making everything worse.


    The solution is to note that the supervisor is another employee. What we need
    is a foreign key referencing another employee in the same table. This is the reference
    we see in the diagram.


    You can see the contents of the `employees` table with


    ```

    SELECT * FROM employees ORDER BY id;

    ```


    You’ll see a list of employees and their supervisor ids.


    ```

    | id | supervisorid | givenname | familyname | … |

    | --- | --- | --- | --- | --- |

    | 1 | 21 | Marmaduke | Mayhem | … |

    | 2 | 16 | Clarisse | Cringinghut | … |

    | 3 | 12 | Joe | Kerr | … |

    | 4 | 29 | Beryl | Bubbles | … |

    | 5 | 30 | Norris | Toof | … |

    | 6 | 27 | Osric | Pureheart | … |

    | ~ 34 rows ~ |

    ```


    You’ll notice the `supervisorid` foreign key column. If you want to actually see
    the supervisor’s name, you will need to follow the foreign key the same way you
    did to get the artist’s name with the paintings.


    You can do this with a subquery, as with the earlier version of the price list:


    ```

    --  This won''t work:

    SELECT

    id, supervisorid, givenname, familyname,

    (

    SELECT givenname||'' ''||familyname FROM employees

    WHERE employees.supervisorid=employees.id

    ) as supervisor

    FROM employees

    ORDER BY id;

    ```


    If you do, you’ll run into a problem of ambiguity with the tables. The solution
    is to rename the table in the subquery with an alias:


    ```

    | id | supervisorid | givenname | familyname | supervisor |

    | --- | --- | --- | --- | --- |

    | 1 | 21 | Marmaduke | Mayhem | Irving Klutzmeyer |

    | 2 | 16 | Clarisse | Cringinghut | Sylvester Underbar |

    | 3 | 12 | Joe | Kerr | Beryl Standover |

    | 4 | 29 | Beryl | Bubbles | Beryl Standover |

    | 5 | 30 | Norris | Toof | Mildred Codswallup |

    | 6 | 27 | Osric | Pureheart | Fred Nurke |

    | ~ 34 rows ~ |

    ```


    ```

    SELECT

    id, supervisorid, givenname, familyname,

    (

    SELECT givenname||'' ''||familyname

    FROM employees AS supervisors

    WHERE employees.supervisorid=supervisors.id

    ) as supervisor

    FROM employees

    ORDER BY id;

    ```


    This will work, but a much cleaner solution is to join the tables. The trick is
    to join the same tables with different aliases as you can see in Figure [6-4](#601766_1_En_6_Chapter.xhtml#Fig4).


    ![](images/601766_1_En_6_Chapter/601766_1_En_6_Fig4_HTML.jpg)


    2 tables display employee details, which include `ID`, `supervisorID`, given name,
    family name, email, phone number, and tax file number. The tables have a foreign
    key and primary key constraints assigned to the `ID` and `supervisorID` columns,
    and the phone and `TFN` columns are designated as unique.


    Figure 6-4


    The Self-Referenced Tables Joined


    It should be something like this:


    ```

    --  This won''t work either:

    SELECT

    id, supervisorid, givenname, familyname,

    givenname||'' ''||familyname as supervisor

    FROM employees AS e JOIN employees AS s

    ON e.supervisorid=s.id

    ORDER BY id;

    ```


    However, this won’t work either, because you now have multiple columns with the
    same name, all of which you will have to qualify:


    ```

    SELECT

    e.id, e.supervisorid, e.givenname, e.familyname,

    s.givenname||'' ''||s.familyname as supervisor

    FROM employees AS e JOIN employees AS s ON e.supervisorid=s.id

    ORDER BY e.id;

    ```


    The only problem now is that not all of the employees have supervisors, so their
    `supervisor` is `NULL`. The preceding (`INNER`) join will overlook these, so we’ll
    need an outer join:


    ```

    SELECT

    e.id, e.supervisorid, e.givenname, e.familyname,

    s.givenname||'' ''||s.familyname as supervisor

    FROM employees AS e LEFT JOIN employees AS s

    ON e.supervisorid=s.id

    ORDER BY e.id;

    ```


    This took some fixing, but it is still a cleaner solution than using the preceding
    subquery.


    Remember to use `+` for concatenation if you’re using Microsoft SQL or to put
    MySQL/MariaDB into `ANSI` mode. Otherwise, you can always concatenate with the
    `concat()` function.


    ## Summary


    To ensure the database’s integrity, multiple values are saved into separate tables.
    When you need data from multiple related tables, you can use the `JOIN` clause
    to combine them.


    The basic principle of a join is that the columns of the child table are supplemented
    by columns from the matching parent table.


    The result of a join is a virtual table; you can add your `WHERE` and `ORDER BY`
    clauses as you require.


    ### Syntax


    The basic syntax for a join is


    ```

    SELECT columns

    FROM table JOIN table;

    ```


    There is an older syntax using the `WHERE` clause, but it’s not as useful for
    most joins.


    Although tables are joined pairwise, you can join any number of tables to get
    results from any related tables.


    ### Table Aliases


    When joining tables, it is best to distinguish the columns. This is especially
    important if the tables have column names in common.


    *   You should fully qualify all column names.

    *   It is helpful to use table aliases to simplify the names. These aliases can
    then be used to qualify the columns.


    ### The ON Clause


    The `ON` clause is used to describe how rows from one table are matched to rows
    from the other.


    The standard join is from the child’s foreign key to the parent’s primary keys.
    More complex joins are possible.


    ### Join Types


    The default join type is the `INNER JOIN`. The `INNER` is presumed when no join
    type is specified.


    *   An `INNER JOIN` results only in child rows for which there is a parent. Rows
    with a `NULL` foreign key are omitted.

    *   An `OUTER JOIN` is an `INNER JOIN` combined with unmatched rows.


    ### Coming Up


    So far, we have worked with the original or calculated data. Next, we’ll be working
    with summarizing data.'
