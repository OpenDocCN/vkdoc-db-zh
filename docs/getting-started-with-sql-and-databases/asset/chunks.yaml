  trans: "\n## 聚合计算数据\n\n`saleitems` 表中包含一些值得汇总的数据：\n\n```sql\nSELECT * FROM saleitems;\n\
    ```\n\n以下是原始数据：\n\n| id | saleid | paintingid | quantity | price |\n| --- | ---\
    \ | --- | --- | --- |\n| 2621 | 1066 | 1065 | 3 | 100 |\n| 5169 | 2067 | 870 |\
    \ 1 | 155 |\n| 667 | 271 | 2061 | 1 | 165 |\n| 6905 | 2749 | 1796 | 3 | 115 |\n\
    | 886 | 361 | 1874 | 1 | 140 |\n| 6729 | 2681 | 1516 | 2 | 160 |\n| ~ 6315 rows\
    \ ~ |\n\n这包含了一个 `quantity` 列，表示每件商品的销售数量，以及一个 `price` 列，表示每件商品的 *单价*。\n\n你可以对这些列进行求和，但需要确保这种操作是有意义的：\n\
    \n*   `quantity` 列代表了实际售出的副本数量，因此将其相加是有意义的：它表示需要打印、包装或进行其他处理的印刷品总数。\n*   `price`\
    \ 列是单价，因此仅仅将其相加是 *没有* 意义的，原因在前面提到的错误示例中已经讨论过。\n*   然而，你可以将价格乘以数量，然后再将它们相加。\n\n\
    考虑到这一点，以下查询应该是有效的：\n\n```sql\nSELECT\nsum(quantity) AS total_copies,\nsum(quantity*price)\
    \ AS total_value\nFROM saleitems;\n```\n\n汇总结果如下：\n\n| total_copies | total_value\
    \ |\n| --- | --- |\n| 9722 | 1450390 |\n\n它应该有效，但这里有个问题。回想一下，有些数量是缺失的，因此你需要用 `coalesce()`\
    \ 函数将 `NULL` 值处理为假定的含义 `1`。在汇总时你也必须做同样的处理。否则，结果会偏低：\n\n```sql\nSELECT\nsum(coalesce(quantity,1))\
    \ AS total_copies,\nsum(coalesce(quantity,1)*price) AS total_value\nFROM saleitems;\n\
    ```\n\n这会给你一个更真实的结果：\n\n| total_copies | total_value |\n| --- | --- |\n| 10237\
    \ | 1527050 |\n\n顺便说一下，前面的 `total_value` 应该与你从下面查询得到的结果相同：\n\n```sql\nSELECT sum(total)\
    \ FROM sales;\n```\n\n你应该得到相同的总价值：\n\n| sum |\n| --- |\n| 1527050 |\n\n显然，`coalesce()`\
    \ 函数被用于计算销售总额。\n\n## 其他聚合函数\n\n到目前为止，你已经进行了计数，并且对于数字运行了一些统计函数。还有其他可用的函数，但这里我们将只关注两个：`max()`\
    \ 和 `min()` 函数。\n\n与 `count()` 函数一样，你可以在所有主要数据类型上使用 `max()` 和 `min()`。例如：\n\n\
    ```sql\nSELECT\nmin(height) as shortest, max(height) as tallest,\nmin(dob) as\
    \ oldest, max(dob) as youngest,\nmin(familyname) as first, max(familyname) as\
    \ last\nFROM customers;\n```\n\n你将得到这些极值：\n\n| shortest | tallest | oldest | youngest\
    \ | first | last |\n| --- | --- | --- | --- | --- | --- |\n| 150.3 | 186.3 | 1962-09-24\
    \ | 2002-08-05 | Abet | Yourbusiness |\n\n`max()` 和 `min()` 函数为你提供类似于 `ORDER BY`\
    \ 子句排序后处于两端的值，不过像往常一样，它们会忽略可能出现的 `NULL`。\n\n与排序类似，数据类型将影响哪些值位于开头或结尾。例如：\n\n```sql\n\
    SELECT\ncount(*) AS countrows,\nmax(numbervalue) AS most, min(numbervalue) AS\
    \ least,\nmax(datevalue) AS latest, min(datevalue) AS earliest,\nmax(stringvalue)\
    \ AS last, min(stringvalue) AS first\nFROM sorting;\n```\n\n值是否为字符串将影响结果：\n\n\
    | rows | most | least | latest | earliest | last | first |\n| --- | --- | ---\
    \ | --- | --- | --- | --- |\n| 8 | 1024 | -8 | 1917-06-30 | 1775-12-16 | Date\
    \ | apple |\n\n在得到最小值和最大值之后，你可能想问哪些行实际匹配这些值。例如，谁是最年长的客户，或者哪幅画作最受欢迎？\n\n## 使用聚合结果作为过滤器\n\
    \n你已经看到，不能将未汇总的数据与汇总的数据混合使用。但是，你可以在子查询中使用汇总结果来过滤未汇总的数据。这基本上是将查询分两步进行。\n\n例如，谁是最年长的客户？要得到答案：\n\
    \n1.  找到最小的出生日期：\n\n    ```sql\n    SELECT min(dob) FROM customers\n    ```\n\n\
    \    这将作为下一步的子查询。（注意这里还没有分号，因为我们还没有完成；你仍然可以单独运行这个查询。）\n\n2.  找到出生日期与该结果匹配的客户：\n\
    \n    ```sql\n    SELECT * FROM customers\n    WHERE dob=(SELECT min(dob) FROM\
    \ customers);\n    ```\n\n    这将给你类似这样的结果：\n\n    | id | email | … | dob | … |\n\
    \    | --- | --- | --- | --- | --- |\n    | 545 | jack.knife545@example.com |\
    \ … | 1962-09-24 | … |\n    | 344 | rose.boat344@example.net | … | 1962-09-24\
    \ | … |\n\n    你会注意到有不止一个匹配项。这就是为什么期望将未汇总的数据与汇总的数据混合使用是无意义的原因之一。\n\n你可以使用相同的技术来找到最年轻、最高或最矮的客户。\n\
    \n有时，你需要一个涉及关联表的查询。例如，假设你想找到单笔销售额最大的客户。\n\n首先，从 `sales` 表中获取 `customerid`：\n\n\
    ```sql\nSELECT customerid FROM sales WHERE total=(\nSELECT max(total) FROM sales\n\
    );\n```\n\n这里，我们使用 `max(total)` 并找到匹配的 `customerid`。当然，可能不止一个。\n\n接下来，我们从 `customers`\
    \ 表中找到匹配的客户：\n\n```sql\n--  Biggest Spender\nSELECT *\nFROM customers\nWHERE id\
    \ IN (\nSELECT customerid FROM sales WHERE total=(\nSELECT max(total) FROM sales\n\
    )\n);\n```\n\n你现在得到了客户详细信息：\n\n| id | email | familyname | givenname | … |\n|\
    \ --- | --- | --- | --- | --- |\n| 19 | millie.pede19@example.net | Pede | Millie\
    \ | … |\n\n对于这个例子，你本可以使用：\n\n```sql\nWHERE id=(SELECT …)\n```\n\n然而，这样做是有风险的，因为如果有多个客户的\
    \ `max(total)` 相同，可能会出现多个结果。在那种情况下，你会得到一个错误。\n\n你也可以使用其他统计函数作为过滤器。例如，如果你想找到身高低于平均值的客户：\n\
    \n```sql\nSELECT * FROM customers\nWHERE height<(SELECT avg(height) FROM customers);\n\
    ```\n\n你会得到较矮的客户：\n\n| id | email | familyname | … | height |\n| --- | --- | ---\
    \ | --- | --- |\n| 186 | ray.gunn186@example.net | Gunn | … | 163.8 |\n| 179 |\
    \ ivan.inkling179@example.com | Inkling | … | 170.3 |\n| 523 | seymour.sights523@example.net\
    \ | Sights | … | 167.3 |\n| 351 | dick.tate351@example.com | Tate | … | 167.8\
    \ |\n| 422 | wanda.why422@example.com | Why | … | 163.2 |\n| 121 | lil.ting121@example.com\
    \ | Ting | … | 162.8 |\n| ~ 128 rows ~ |\n\n如果你想要那些 *显著* 矮于平均的人，你也可以使用标准差：\n\n\
    ```sql\nSELECT * FROM customers\nWHERE height<(SELECT avg(height)-stddev(height)\
    \ FROM customers);\n--  MSSQL: Use stdev(height)\n```\n\n你现在会得到矮得多的客户：\n\n| id\
    \ | email | familyname | … | height |\n| --- | --- | --- | --- | --- |\n| 422\
    \ | wanda.why422@example.com | Why | … | 163.2 |\n| 121 | lil.ting121@example.com\
    \ | Ting | … | 162.8 |\n| 429 | tom.morrow429@example.com | Morrow | … | 156.9\
    \ |\n| 138 | al.fresco138@example.net | Fresco | … | 162.6 |\n| 468 | connie.fer468@example.com\
    \ | Fer | … | 161.3 |\n| 330 | clara.fied330@example.com | Fied | … | 156.6 |\n\
    | ~ 40 rows ~ |\n\n像往常一样，你不能在单个 `SELECT` 语句中混合使用聚合值和非聚合值。但是，你可以在子查询中使用聚合，并在非聚合查询中使用其结果。\n"
- fmt: '## Grouping


    As you have already seen, you can filter your results with the `WHERE` clause:


    ```sql

    SELECT count(*) AS countrows

    FROM customers

    WHERE state=''VIC'';

    ```


    You’ll get the following:


    | countrows |

    | --- |

    | 52 |


    If you want, you can do the same for another filter value:


    ```sql

    SELECT count(*) AS countrows FROM customers WHERE state=''VIC'';

    SELECT count(*) AS countrows FROM customers WHERE state=''NSW'';

    SELECT count(*) AS countrows FROM customers WHERE state=''QLD'';

    ```


    What you have done manually is run your `count()` function in multiple groups.


    You can combine the results into a single result set using the `UNION` operator:


    ```sql

    SELECT count(*) AS countrows FROM customers WHERE state=''VIC''

    UNION ALL

    SELECT count(*) AS countrows FROM customers WHERE state=''NSW''

    UNION ALL

    SELECT count(*) AS countrows FROM customers WHERE state=''QLD'';

    ```


    The `UNION ALL` clause can be used to combine results from multiple `SELECT` statements.
    Note that there is no semicolon between the statements as they’re all part of
    one statement. You’ll see more on the `UNION` clause later.


    The result is slightly less informative, because there is nothing to identify
    the different rows. You can hard-code a value to do that:


    ```sql

    SELECT ''vic'' AS state, count(*) AS countrows

    FROM customers WHERE state=''VIC''

    UNION ALL

    SELECT ''nsw'' AS state, count(*) AS countrows

    FROM customers WHERE state=''NSW''

    UNION ALL

    SELECT ''qld'' AS state, count(*) AS countrows

    FROM customers WHERE state=''QLD'';

    ```


    This is more readable:


    | state | countrows |

    | --- | --- |

    | vic | 52 |

    | nsw | 67 |

    | qld | 52 |


    Now you also have the state name. However, this is pretty tedious, and there must
    be a better way to do this, which, of course, there is.


    ### Using the GROUP BY Clause


    A better way to run your aggregate functions separately for different groups is
    to let SQL do the hard work with the `GROUP BY` clause:


    ```sql

    SELECT count(*) AS countrows

    FROM customers

    GROUP BY state;

    ```


    This is more convenient, but, as you see, not quite finished:


    | countrows |

    | --- |

    | 47 |

    | 35 |

    | 26 |

    | 52 |

    | 67 |

    | 3 |

    | 52 |

    | 22 |


    This time, you will get multiple rows: one for each distinct state. Or we think
    so. The problem is that last time you knew which one state you were filtering,
    but now you have multiple results and no way of identifying which is which.


    The `GROUP BY ()` clause used earlier is implied whenever you just use aggregate
    functions. It gives us `grand totals`: summaries for the whole (filtered) table,
    and only one row of those. It’s not supported by all DBMSs and `never` required.


    On the other hand, `GROUP BY something` is different. It generates `subtotals`:
    multiple rows of group summaries, together with the group names. It is supported
    by all DBMSs.


    If you want to identify the results, you will need to include the group name in
    the `SELECT` clause:


    ```sql

    SELECT state, count(*) AS countrows

    FROM customers

    GROUP BY state;

    ```


    This gives something like this:


    | state | countrows |

    | --- | --- |

    | WA | 47 |

    |   | 35 |

    | TAS | 26 |

    | VIC | 52 |

    | NSW | 67 |

    | NT | 3 |

    | QLD | 52 |

    | SA | 22 |


    You can also group by more than one column:


    ```sql

    SELECT state, town, count(*) AS countrows

    FROM customers

    GROUP BY state, town;

    ```


    You now have a further breakdown:


    | state | town | countrows |

    | --- | --- | --- |

    | SA | Windsor | 1 |

    |   |   | 35 |

    | VIC | Belmont | 2 |

    | SA | Alberton | 3 |

    | NSW | Hamilton | 5 |

    | WA | Wattle Grove | 4 |

    | ~ 79 rows ~ |   |   |


    Grouping by multiple columns creates groups within groups. In this case, your
    main groups are states, while your subgroups are towns.


    With some DBMSs, you may also see your results in some sort of order, while in
    others, notably PostgreSQL and Oracle, you won’t. In MySQL/MariaDB and SQLite,
    the results will be ordered by `state,town`, while in MSSQL the results will be
    ordered by `town` only.


    As always, never rely on the order of results unless you use the `ORDER BY` clause!
    SQL does not require `GROUP BY` to do any ordering, and any ordering you do see
    is probably a by-product of how the DBMS does its grouping internally. If you
    do something more complex, the order will probably change again.


    To finish the job, then, add an `ORDER BY` clause:


    ```sql

    SELECT state, town, count(*) AS countrows

    FROM customers

    GROUP BY state, town

    ORDER BY state, town;

    ```


    The result is more readable:


    | state | town | countrows |

    | --- | --- | --- |

    | NSW | Bald Hills | 6 |

    | NSW | Belmont | 4 |

    | NSW | Broadwater | 5 |

    | NSW | Buchanan | 3 |

    | NSW | Darlington | 1 |

    | NSW | Glenroy | 2 |

    | ~ 79 rows ~ |   |   |


    Remember that there are some `NULL`s, and, depending on the DBMS, you might see
    a `NULL` group either at the beginning or at the end.


    You might imagine that SQL would have worked out that you want it ordered that
    way, but that is asking SQL to start guessing your intentions, and `ORDER BY`
    takes too much work for something it hasn’t actually been asked to do.


    However, 9½ times out of 9.5, you will probably want it this way:


    *   Include the groups in the `SELECT` clause

    *   `ORDER BY` the same as `GROUP BY`, or something like that


    You don’t necessarily need to sort by exactly the same as the `GROUP BY`. In the
    section on redundant groups ahead, you’ll see how you might sort on something
    similar to the grouping. However, the principle stands.


    From SQL’s perspective, you can `GROUP BY` in either order:


    ```sql

    SELECT state, town, count(*) AS countrows

    FROM customers

    GROUP BY town, state

    ORDER BY state, town;

    ```


    You will get the same rows, and the `ORDER BY` clause will see to the ordering.


    That’s because the columns are supposed to be independent, and SQL certainly has
    no idea of any relationship between them. However, in this case, we understand
    that a state is a container of towns, so it makes logical sense to group the state
    before the town.


    Similarly with `ORDER BY`, we could order by anything we like. However, it makes
    most sense to order by the same columns as the grouping.


    There is one minor variation. When we write an address, we usually write it from
    small to large, so you can change the order in the `SELECT` clause:


    ```sql

    SELECT town, state, count(*) AS countrows

    FROM customers

    GROUP BY state, town

    ORDER BY state, town;

    ```


    This gives the same results with a different column order:


    | town | state | countrows |

    | --- | --- | --- |

    | Bald Hills | NSW | 6 |

    | Belmont | NSW | 4 |

    | Broadwater | NSW | 5 |

    | Buchanan | NSW | 3 |

    | Darlington | NSW | 1 |

    | Glenroy | NSW | 2 |

    | ~ 79 rows ~ |   |   |


    Remember that column order in the `SELECT` clause is insignificant.


    You can use the same technique to get the number and value of sales per customer:


    ```sql

    SELECT customerid, sum(total) as total, count(*) AS countrows

    FROM sales

    GROUP BY customerid

    ORDER BY customerid;

    ```


    You will get customer sales totals like this:


    | customerid | total | countrows |

    | --- | --- | --- |

    | 2 | 14920 | 24 |

    | 8 | 7885 | 16 |

    | 9 | 10645 | 19 |

    | 10 | 9010 | 19 |

    | 11 | 16460 | 29 |

    | 15 | 6005 | 13 |

    | ~ 256 rows ~ |   |   |


    In the grand total aggregates, you have a single row with only summaries. You
    can’t get nonaggregate values. In a group summary, you have an additional column
    for every group, as you see.


    In an aggregate query, you can only select summaries or groups. Nothing else.'
