- fmt: "# GROUP BY vs. DISTINCT\n\nWhen you first encountered the `DISTINCT` clause,\
    \ it was described as listing groups. You can see that you don’t actually use\
    \ any aggregate functions. For example:\n\n```sql\nSELECT state, town\nFROM customers\n\
    GROUP BY state, town\nORDER BY state, town;\n\nSELECT DISTINCT state, town --\
    \ same result\nFROM customers\nORDER BY state, town;\n```\n\nClearly, to get the\
    \ groups, using `DISTINCT` is simpler if you `don't` want any additional aggregates.\
    \ However, if you want additional aggregates, then use the `GROUP BY` clause.\
    \ There is never a reason to use both.\n\n## Grouping with Multiple Tables\n\n\
    Often, the data you want to summarize is to be found in more than one table. For\
    \ example, we can get the total sales by customer, which first of all requires\
    \ summarizing the sales table:\n\n```sql\nSELECT\n    customerid,\n    count(*)\
    \ AS number_of_sales,\n    sum(total) AS total\nFROM sales\nGROUP BY customerid\n\
    ORDER BY total, customerid;\n```\n\nThis gives you the sales data for customer\
    \ ids:\n\n| customerid | number_of_sales | total |\n| --- | --- | --- |\n| 440\
    \ | 1 | 115 |\n| 444 | 1 | 200 |\n| 461 | 1 | 240 |\n| 526 | 1 | 285 |\n| 567\
    \ | 1 | 310 |\n| 575 | 1 | 310 |\n| ~ 256 rows ~ | | |\n\nNote that the `total`\
    \ name has two meanings. In the `sales` table, it refers to the individual sales\
    \ totals. In the preceding query, it has been used as an alias for `sum(total)`,\
    \ which is in the same spirit. Since the `ORDER BY` is processed after `SELECT`,\
    \ it is the summed total which is being sorted. If you consider that a bit confusing\
    \ or misleading, you might use another name such as `customer_total`.\n\nThe preceding\
    \ query will give us the `customerid`, which is OK, but it would be better if\
    \ we had the customers’ names and other details.\n\nOne approach is to use a subquery\
    \ to get the customer’s name and use that in the aggregate:\n\n```sql\nSELECT\n\
    \    customerid,\n    (SELECT givenname||' '||familyname  -- MSSQL: Use +\n  \
    \   FROM customers\n     WHERE customers.id = sales.customerid\n    ) AS customer,\n\
    \    count(*) AS number_of_sales,\n    sum(total) AS total\nFROM sales\nGROUP\
    \ BY customerid\nORDER BY total, customerid;\n```\n\nYou now have more details:\n\
    \n| customerid | customer | number_of_sales | total |\n| --- | --- | --- | ---\
    \ |\n| 440 | Percy Monn | 1 | 115 |\n| 444 | Jo King | 1 | 200 |\n| 461 | Carol\
    \ Singer | 1 | 240 |\n| 526 | Cliff Face | 1 | 285 |\n| 567 | Perry Patetic |\
    \ 1 | 310 |\n| 575 | Gene Poole | 1 | 310 |\n| ~ 256 rows ~ | | | |\n\nYou would\
    \ expect that selecting columns that aren’t even in the same table, let alone\
    \ in the `GROUP BY` clause, would give you errors. However, remember that the\
    \ subquery is separate to the main aggregate query.\n\nYou can also use a join\
    \ to get the same result:\n\n```sql\nSELECT\n    c.id, c.givenname||' '||c.familyname\
    \ AS customer,\n    count(*) AS number_of_sales, sum(s.total) AS total\nFROM sales\
    \ AS s JOIN customers AS c ON s.customerid=c.id\nGROUP BY c.id, c.givenname||'\
    \ '||c.familyname\nORDER BY total, customerid;\n```\n\n(Remember MSSQL uses `+`\
    \ for concatenation, and Oracle doesn’t like table `AS`, the same with the following\
    \ example.)\n\nThis is a much cleaner version. However, the `GROUP BY` is a little\
    \ clumsy, since you can’t use the `customer` alias (remember that `SELECT` isn’t\
    \ processed until after). There is also the small risk of your attempting to group\
    \ by a slightly different calculation (which won’t work).\n\nIf you want, you\
    \ can wrap the join in a Common Table Expression, which will simplify the aggregate\
    \ query:\n\n```sql\nWITH cte AS (\n    SELECT\n        c.id, c.givenname||' '||c.familyname\
    \ AS customer,\n        s.total\n    FROM customers AS c JOIN sales AS s ON c.id=s.customerid\n\
    )\nSELECT\n    id, customer, count(*) AS number_of_sales,\n    sum(total) AS total\n\
    FROM cte\nGROUP BY id, customer\nORDER BY total, id;\n```\n\nThis will give the\
    \ same results. Overall, this is slightly longer than the previous version; however,\
    \ it does simplify the main aggregate query by preparing the data to be used in\
    \ the CTE.\n\n## Redundant Groups\n\nAs we noted before, an aggregate can only\
    \ select summaries or groups. This leads to a minor problem when you’re trying\
    \ to select something more informative than what you’re grouping. Sometimes, you\
    \ need to group more than you expected.\n\nHere is a trivial example:\n\n```sql\n\
    SELECT state, count(*) AS countrows\nFROM customers\nGROUP BY state, state;\n\
    ```\n\nYes, we’re grouping by `state` twice, and, yes, that’s a waste of time.\
    \ For each state, we want a subgrouping of states within the state, and, of course,\
    \ there’s only one.\n\nHowever, it’s not so silly if the groups are actually variations\
    \ of the same thing. For example, if you want to group sales by the day of the\
    \ week, you’ll want two versions of the day: one for display and one for sorting.\n\
    \nHere’s how that would work:\n\n```sql\n-- PostgreSQL, Oracle\nSELECT to_char(ordered,'FMDay')\
    \ AS dayname,\n    sum(total) AS total\nFROM sales\nGROUP BY to_char(ordered,'FMDay'),\
    \ to_char(ordered,'D')\nORDER BY to_char(ordered,'D');\n\n-- MySQL / MariaDB\n\
    SELECT date_format(ordered,'%W') AS dayname,\n    sum(total) AS total\nFROM sales\n\
    GROUP BY date_format(ordered,'%W'),\n    date_format(ordered,'%w')\nORDER BY date_format(ordered,'%w');\n\
    \n-- MSSQL\nSELECT datename(weekday,ordered) AS dayname,\n    sum(total) AS total\n\
    FROM sales\nGROUP BY datename(weekday,ordered),\n    datepart(weekday,ordered)\n\
    ORDER BY datepart(weekday,ordered);\n\n-- Not Available in SQLite\n```\n\nRemember,\
    \ SQL will only let you select or sort by what’s in the `GROUP BY` clause. Note\
    \ that the `GROUP BY` groups by the name of the day of the week, then the number\
    \ of the day of the week. Technically, that’s redundant, since there’s only one\
    \ day per day. However, having both in the `GROUP BY` enables you to select one\
    \ and sort by the other.\n\n| dayname | total |\n| --- | --- |\n| Sunday | 214285\
    \ |\n| Monday | 214950 |\n| Tuesday | 214090 |\n| Wednesday | 211050 |\n| Thursday\
    \ | 224720 |\n| Friday | 223640 |\n| Saturday | 224315 |\n\nIf you think that\
    \ looks like a legal loophole, well, you may be right.\n\nYou saw the same thing\
    \ in the previous section, where you grouped by the customer id, then the customer\
    \ name. Again, that’s redundant (there can only be one name per customer), but\
    \ it allows you to include both in the `SELECT` clause, even though only the `id`\
    \ is necessary for grouping.\n\nIf you feel guilty about unnecessary grouping,\
    \ you can use another workaround. Here is an alternative version of the sales\
    \ by customer query earlier:\n\n```sql\nWITH cte AS (\n    SELECT c.id, c.givenname||'\
    \ '||c.familyname AS customer,\n        s.total\n    FROM customers AS c JOIN\
    \ sales AS s ON c.id=s.customerid\n)\nSELECT id, min(customer), count(*) AS number_of_sales,\
    \ sum(total) AS total\nFROM cte\nGROUP BY id\nORDER BY total, id;\n```\n\nThis\
    \ time, we group only by the `id`, but use the `min()` function (or `max()` if\
    \ you like); since technically it’s a summary, you can use it safely."
  raw: '### GROUP BY vs. DISTINCT


    When you first encountered the `DISTINCT` clause, it was described as listing
    groups. You can see that most clearly if you don’t actually use any aggregate
    functions. For example:


    ```

    SELECT state, town

    FROM customers

    GROUP BY state, town

    ORDER BY state, town;

    SELECT DISTINCT state, town --  same result

    FROM customers

    ORDER BY state, town;

    ```


    Clearly, to get the groups, using `DISTINCT` is simpler if you *don’t* want any
    additional aggregates. However, if you want additional aggregates, then use the
    `GROUP BY` clause. There is never a reason to use both.


    ## Grouping with Multiple Tables


    Often, the data you want to summarize is to be found in more than one table. For
    example, we can get the total sales by customer, which first of all requires summarizing
    the sales table:


    ```

    SELECT

    customerid,

    count(*) AS number_of_sales,

    sum(total) AS total

    FROM sales

    GROUP BY customerid

    ORDER BY total, customerid;

    ```


    This gives you the sales data for customer ids:


    | customerid | number_of_sales | total |

    | --- | --- | --- |

    | 440 | 1 | 115 |

    | 444 | 1 | 200 |

    | 461 | 1 | 240 |

    | 526 | 1 | 285 |

    | 567 | 1 | 310 |

    | 575 | 1 | 310 |

    | ~ 256 rows ~ |


    Note that the `total` name has *two* meanings. In the `sales` table, it refers
    to the individual sales totals. In the preceding query, it has been used as an
    alias for `sum(total)`, which is in the same spirit. Since the `ORDER BY` is processed
    after `SELECT`, it is the summed total which is being sorted. If you consider
    that a bit confusing or misleading, you might use another name such as `customer_total`.


    The preceding query will give us the `customerid`, which is OK, but it would be
    better if we had the customers’ names and other details.


    One approach is to use a subquery to get the customer’s name and use that in the
    aggregate:


    ```

    SELECT

    customerid,

    (SELECT givenname||'' ''||familyname  --  MSSQL: Use +

    FROM customers

    WHERE customers.id = sales.customerid

    ) AS customer,

    count(*) AS number_of_sales,

    sum(total) AS total

    FROM sales

    GROUP BY customerid

    ORDER BY total, customerid;

    ```


    You now have more details:


    | customerid | customer | number_of_sales | total |

    | --- | --- | --- | --- |

    | 440 | Percy Monn | 1 | 115 |

    | 444 | Jo King | 1 | 200 |

    | 461 | Carol Singer | 1 | 240 |

    | 526 | Cliff Face | 1 | 285 |

    | 567 | Perry Patetic | 1 | 310 |

    | 575 | Gene Poole | 1 | 310 |

    | ~ 256 rows ~ |   |   |   |


    You would expect that selecting columns that aren’t even in the same table, let
    alone in the `GROUP BY` clause, would give you errors. However, remember that
    the subquery is separate to the main aggregate query.


    You can also use a join to get the same result:


    ```

    SELECT

    c.id, c.givenname||'' ''||c.familyname AS customer,

    count(*) AS number_of_sales, sum(s.total) AS total

    FROM sales AS s JOIN customers AS c ON s.customerid=c.id

    GROUP BY c.id, c.givenname||'' ''||c.familyname

    ORDER BY total, customerid;

    ```


    (Remember MSSQL uses `+` for concatenation, and Oracle doesn’t like table `AS`,
    the same with the following example.)


    This is a much cleaner version. However, the `GROUP BY` is a little clumsy, since
    you can’t use the `customer` alias (remember that `SELECT` isn’t processed until
    after). There is also the small risk of your attempting to group by a slightly
    different calculation (which won’t work).


    If you want, you can wrap the join in a Common Table Expression, which will simplify
    the aggregate query:


    ```

    WITH cte AS (

    SELECT

    c.id, c.givenname||'' ''||c.familyname AS customer,

    s.total

    FROM customers AS c JOIN sales AS s ON c.id=s.customerid

    )

    SELECT

    id, customer, count(*) AS number_of_sales,

    sum(total) AS total

    FROM cte

    GROUP BY id, customer

    ORDER BY total, id;

    ```


    This will give the same results. Overall, this is slightly longer than the previous
    version; however, it does simplify the main aggregate query by preparing the data
    to be used in the CTE.


    ## Redundant Groups


    As we noted before, an aggregate can only select summaries or groups. This leads
    to a minor problem when you’re trying to select something more informative than
    what you’re grouping. Sometimes, you need to group more than you expected.


    Here is a trivial example:


    ```

    SELECT state, count(*) AS countrows

    FROM customers

    GROUP BY state, state;

    ```


    Yes, we’re grouping by `state` twice, and, yes, that’s a waste of time. For each
    state, we want a subgrouping of states within the state, and, of course, there’s
    only one.


    However, it’s not so silly if the groups are actually variations of the same thing.
    For example, if you want to group sales by the day of the week, you’ll want two
    versions of the day: one for display and one for sorting.


    Here’s how that would work:


    ```

    --  PostgreSQL, Oracle

    SELECT to_char(ordered,''FMDay'') AS dayname,

    sum(total) AS total

    FROM sales

    GROUP BY to_char(ordered,''FMDay''), to_char(ordered,''D'')

    ORDER BY to_char(ordered,''D'');

    --  MySQL / MariaDB

    SELECT date_format(ordered,''%W'') AS dayname,

    sum(total) AS total

    FROM sales

    GROUP BY date_format(ordered,''%W''),

    date_format(ordered,''%w'')

    ORDER BY date_format(ordered,''%w'');

    --  MSSQL

    SELECT datename(weekday,ordered) AS dayname,

    sum(total) AS total

    FROM sales

    GROUP BY datename(weekday,ordered),

    datepart(weekday,ordered)

    ORDER BY datepart(weekday,ordered);

    --  Not Available in SQLite

    ```


    Remember, SQL will only let you select or sort by what’s in the `GROUP BY` clause.
    Note that the `GROUP BY` groups by the *name* of the day of the week, then the
    *number* of the day of the week. Technically, that’s redundant, since there’s
    only one day per day. However, having both in the `GROUP BY` enables you to select
    one and sort by the other.


    | dayname | total |

    | --- | --- |

    | Sunday | 214285 |

    | Monday | 214950 |

    | Tuesday | 214090 |

    | Wednesday | 211050 |

    | Thursday | 224720 |

    | Friday | 223640 |

    | Saturday | 224315 |


    If you think that looks like a legal loophole, well, you may be right.


    You saw the same thing in the previous section, where you grouped by the customer
    id, then the customer name. Again, that’s redundant (there can only be one name
    per customer), but it allows you to include both in the `SELECT` clause, even
    though only the `id` is necessary for grouping.


    If you feel guilty about unnecessary grouping, you can use another workaround.
    Here is an alternative version of the sales by customer query earlier:


    ```

    WITH cte AS (

    SELECT c.id, c.givenname||'' ''||c.familyname AS customer,

    s.total

    FROM customers AS c JOIN sales AS s ON c.id=s.customerid

    )

    SELECT id, min(customer), count(*) AS number_of_sales, sum(total) AS total

    FROM cte

    GROUP BY id

    ORDER BY total, id;

    ```


    This time, we group only by the `id`, but use the `min()` function (or `max()`
    if you like); since technically it’s a summary, you can use it safely.'
  trans: "\n# GROUP BY 与 DISTINCT\n\n当你初次接触 `DISTINCT` 子句时，它被描述为列出分组。你可以看到，实际上并未使用任何聚合函数。例如：\n\
    \n```sql\nSELECT state, town\nFROM customers\nGROUP BY state, town\nORDER BY state,\
    \ town;\n\nSELECT DISTINCT state, town -- 结果相同\nFROM customers\nORDER BY state,\
    \ town;\n```\n\n显然，要获得分组，如果你 `don't` 想要任何额外的聚合，使用 `DISTINCT` 更简单。但是，如果你想要额外的聚合，那么就使用\
    \ `GROUP BY` 子句。永远没有理由同时使用两者。\n\n## 多表分组\n\n通常，你想要汇总的数据分布在多个表中。例如，我们可以获取按客户统计的总销售额，这首先需要汇总销售表：\n\
    \n```sql\nSELECT\n    customerid,\n    count(*) AS number_of_sales,\n    sum(total)\
    \ AS total\nFROM sales\nGROUP BY customerid\nORDER BY total, customerid;\n```\n\
    \n这将给你客户 ID 的销售数据：\n\n| customerid | number_of_sales | total |\n| --- | --- |\
    \ --- |\n| 440 | 1 | 115 |\n| 444 | 1 | 200 |\n| 461 | 1 | 240 |\n| 526 | 1 |\
    \ 285 |\n| 567 | 1 | 310 |\n| 575 | 1 | 310 |\n| ~ 256 行 ~ | | |\n\n注意，`total`\
    \ 这个名字有双重含义。在 `sales` 表中，它指的是单笔销售总额。在上面的查询中，它被用作 `sum(total)` 的别名，其含义是一致的。由于 `ORDER\
    \ BY` 是在 `SELECT` 之后处理的，因此排序的是汇总后的总金额。如果你觉得这有点混乱或误导，你可以使用另一个名字，比如 `customer_total`。\n\
    \n前面的查询会给我们 `customerid`，这可以，但如果我们有客户姓名和其他详细信息会更好。\n\n一种方法是使用子查询来获取客户姓名，并将其用于聚合中：\n\
    \n```sql\nSELECT\n    customerid,\n    (SELECT givenname||' '||familyname  --\
    \ MSSQL: 使用 +\n     FROM customers\n     WHERE customers.id = sales.customerid\n\
    \    ) AS customer,\n    count(*) AS number_of_sales,\n    sum(total) AS total\n\
    FROM sales\nGROUP BY customerid\nORDER BY total, customerid;\n```\n\n现在你有了更多细节：\n\
    \n| customerid | customer | number_of_sales | total |\n| --- | --- | --- | ---\
    \ |\n| 440 | Percy Monn | 1 | 115 |\n| 444 | Jo King | 1 | 200 |\n| 461 | Carol\
    \ Singer | 1 | 240 |\n| 526 | Cliff Face | 1 | 285 |\n| 567 | Perry Patetic |\
    \ 1 | 310 |\n| 575 | Gene Poole | 1 | 310 |\n| ~ 256 行 ~ | | | |\n\n你可能会预期，选择甚至不在同一个表中的列，更不用说在\
    \ `GROUP BY` 子句中，会导致错误。但是，请记住子查询与主聚合查询是分开的。\n\n你也可以使用连接来获得相同的结果：\n\n```sql\nSELECT\n\
    \    c.id, c.givenname||' '||c.familyname AS customer,\n    count(*) AS number_of_sales,\
    \ sum(s.total) AS total\nFROM sales AS s JOIN customers AS c ON s.customerid=c.id\n\
    GROUP BY c.id, c.givenname||' '||c.familyname\nORDER BY total, customerid;\n```\n\
    \n（记住 MSSQL 使用 `+` 进行连接，而 Oracle 不喜欢表 `AS`，后面的示例也是如此。）\n\n这是一个更清晰的版本。然而，`GROUP\
    \ BY` 有点笨拙，因为你不能使用 `customer` 别名（记住 `SELECT` 在之后才处理）。也存在一个微小的风险，即你可能尝试按略有不同的计算进行分组（这不会成功）。\n\
    \n如果你愿意，可以将连接包装在通用表表达式中，这将简化聚合查询：\n\n```sql\nWITH cte AS (\n    SELECT\n     \
    \   c.id, c.givenname||' '||c.familyname AS customer,\n        s.total\n    FROM\
    \ customers AS c JOIN sales AS s ON c.id=s.customerid\n)\nSELECT\n    id, customer,\
    \ count(*) AS number_of_sales,\n    sum(total) AS total\nFROM cte\nGROUP BY id,\
    \ customer\nORDER BY total, id;\n```\n\n这将给出相同的结果。总的来说，这比之前的版本稍长；但是，它确实通过在 CTE\
    \ 中准备好数据来简化了主要的聚合查询。\n\n## 冗余分组\n\n正如我们之前提到的，聚合只能选择摘要或分组。当你试图选择比你分组依据更具信息性的内容时，这会导致一个小问题。有时，你需要进行比你预期更多的分组。\n\
    \n这是一个简单的例子：\n\n```sql\nSELECT state, count(*) AS countrows\nFROM customers\n\
    GROUP BY state, state;\n```\n\n是的，我们按 `state` 分组了两次，是的，这有点浪费时间。对于每个州，我们想要一个州内的子分组，当然，只有一个。\n\
    \n然而，如果分组实际上是同一事物的不同变体，那就没那么傻了。例如，如果你想按星期几对销售额进行分组，你会希望有两个版本的日期：一个用于显示，一个用于排序。\n\
    \n具体做法如下：\n\n```sql\n-- PostgreSQL, Oracle\nSELECT to_char(ordered,'FMDay') AS\
    \ dayname,\n    sum(total) AS total\nFROM sales\nGROUP BY to_char(ordered,'FMDay'),\
    \ to_char(ordered,'D')\nORDER BY to_char(ordered,'D');\n\n-- MySQL / MariaDB\n\
    SELECT date_format(ordered,'%W') AS dayname,\n    sum(total) AS total\nFROM sales\n\
    GROUP BY date_format(ordered,'%W'),\n    date_format(ordered,'%w')\nORDER BY date_format(ordered,'%w');\n\
    \n-- MSSQL\nSELECT datename(weekday,ordered) AS dayname,\n    sum(total) AS total\n\
    FROM sales\nGROUP BY datename(weekday,ordered),\n    datepart(weekday,ordered)\n\
    ORDER BY datepart(weekday,ordered);\n\n-- SQLite 不可用\n```\n\n记住，SQL 只允许你选择或排序\
    \ `GROUP BY` 子句中的内容。注意，`GROUP BY` 先按星期几的名称分组，然后按星期几的数字分组。从技术上讲，这是冗余的，因为每天只对应一个日期。但是，在\
    \ `GROUP BY` 中同时包含两者使你能够选择其一并按另一个排序。\n\n| dayname | total |\n| --- | --- |\n|\
    \ Sunday | 214285 |\n| Monday | 214950 |\n| Tuesday | 214090 |\n| Wednesday |\
    \ 211050 |\n| Thursday | 224720 |\n| Friday | 223640 |\n| Saturday | 224315 |\n\
    \n如果你觉得这看起来像一个法律漏洞，嗯，你可能是对的。\n\n你在上一节中看到了同样的情况，你按客户 ID 分组，然后按客户姓名分组。同样，这是冗余的（每个客户只能有一个姓名），但它允许你在\
    \ `SELECT` 子句中包含两者，尽管只有 `id` 是分组所必需的。\n\n如果你对不必要的分组感到内疚，你可以使用另一种解决方法。这是前面按客户统计销售查询的替代版本：\n\
    \n```sql\nWITH cte AS (\n    SELECT c.id, c.givenname||' '||c.familyname AS customer,\n\
    \        s.total\n    FROM customers AS c JOIN sales AS s ON c.id=s.customerid\n\
    )\nSELECT id, min(customer), count(*) AS number_of_sales, sum(total) AS total\n\
    FROM cte\nGROUP BY id\nORDER BY total, id;\n```\n\n这次，我们只按 `id` 分组，但使用 `min()`\
    \ 函数（或者如果你喜欢，也可以用 `max()`）；从技术上讲这是一个摘要，因此你可以安全地使用它。\n"
- fmt: '## Preparing Data for Aggregating


    Group aggregates only work when there is data to be grouped, which means that
    many rows have exactly the same value in a column. Sometimes, the data doesn’t
    quite fit, but you still need to aggregate it.


    For example, suppose you want to find daily sales totals. If you check the `sales`
    table:


    ```sql

    SELECT * FROM sales;

    ```


    Here is the raw data:


    | id | customerid | total | ordered | shipped |

    | --- | --- | --- | --- | --- |

    | 52 | 52 | 940 | 2022-03-07 16:10:45.739071 | 2022-03-19 |

    | 54 | 37 | 1005 | 2022-03-08 00:23:39.53316 | 2022-03-22 |

    | 55 | 19 | 795 | 2022-03-08 06:23:28.387395 | 2022-03-19 |

    | 57 | 42 | 505 | 2022-03-09 00:02:29.974004 | 2022-03-14 |

    | 59 | 53 | 360 | 2022-03-09 06:26:24.808237 | 2022-03-17 |

    | 60 | 10 | 340 | 2022-03-09 15:01:05.592177 | 2022-03-23 |

    | ~ 2509 rows ~ |


    You will find that every sale has an `ordered` value which is a `datetime` type.
    It is highly unlikely, if not impossible, that two sales were transacted at the
    same moment, so you won’t get anything out of attempting to group it.


    However, you can simplify the `ordered` column if you extract just the date. The
    most direct way of doing this is to cast the data as a `date` type, which will
    discard the time component. For the summary, you only need the date and the total
    for each sale:


    ```sql

    SELECT cast(ordered as date) as ordered, total FROM sales;

    ```


    Oracle doesn’t quite work the same way — it won’t remove the time which is the
    whole point of this operation.


    Instead you should use `trunc(date)`.


    Here is the simplified data:


    | ordered | total |

    | --- | --- |

    | 2022-03-07 | 940 |

    | 2022-03-08 | 1005 |

    | 2022-03-08 | 795 |

    | 2022-03-09 | 505 |

    | 2022-03-09 | 360 |

    | 2022-03-09 | 340 |

    | ~ 2509 rows ~ |


    For Oracle, you will need to use `trunc(ordered)` to get the same idea, though
    it will include a zero time. The original name is used as its alias, since it’s
    still doing the same job of stating when the sale was ordered.


    You can regard the preceding statement as a first step; you can then use the simplified
    data in a summary:


    ```sql

    WITH data AS (-- Oracle: Use trunc(ordered)

    SELECT cast(ordered as date) as ordered, total FROM sales

    )

    SELECT ordered, sum(total) AS total

    FROM data

    GROUP BY ordered;

    ```


    You now have the daily total:


    | ordered | total |

    | --- | --- |

    | 2022-10-10 | 3630 |

    | 2022-07-14 | 5890 |

    | 2022-09-22 | 6730 |

    | 2022-05-19 | 1785 |

    | 2023-02-25 | 8495 |

    | 2022-05-23 | 6835 |

    | ~ 385 rows ~ |


    The results may not be ordered, of course, so you can add


    ```sql

    ORDER BY ordered

    ```


    at the end.


    If you do have sorted results, you may notice that there are gaps in the dates.
    There’s nothing wrong with that: it just means that there were no completed sales
    on those days. It happens.


    This is another Common Table Expression. You can do the same thing using a table
    subquery:


    ```sql

    SELECT ordered, sum(total) AS total

    FROM (

    SELECT cast(ordered as date) as ordered, total FROM sales

    ) AS data

    GROUP BY ordered;

    ```


    This will do the same thing, but the CTE will be easier to work with: it’s always
    better to prepare your data first and then use it next. CTEs are also more flexible
    and allow more complex coding if you need it.


    ### Using CASE in a CTE


    One place where a CTE comes in very handy is in complex calculations. For example,
    we saw how to generate price groups in a `CASE … END` expression:


    ```sql

    SELECT

    id, title,

    CASE

    WHEN price < 130 THEN ''cheap''

    WHEN price <= 170 THEN ''reasonable''

    WHEN price IS NOT NULL THEN ''expensive''

    ELSE ''unpriced''

    END AS price_category

    FROM paintings;

    ```


    Again, this gives us the price categories:


    | id | title | price_category |

    | --- | --- | --- |

    | 1222 | Haymakers Resting | cheap |

    | 251 | Death in the Sickroom | cheap |

    | 2190 | Cache-cache (Hide-and-Seek) | expensive |

    | 1560 | Indefinite Divisibility | cheap |

    | 172 | Girl with Racket and Shuttlecock | expensive |

    | 2460 | The Procession to Calvary | reasonable |

    | ~ 1273 rows ~ |


    If you wanted to use this in a `GROUP BY` expression, you would have to repeat
    the expression exactly. This is tedious, unreadable, inflexible, and prone to
    error.


    Instead, you can use a CTE and summarize the results:


    ```sql

    WITH cte AS (

    SELECT

    id, title,  --  you don''t really need this

    CASE

    WHEN price < 130 THEN ''cheap''

    WHEN price <= 170 THEN ''reasonable''

    WHEN price IS NOT NULL THEN ''expensive''

    ELSE ''unpriced''

    END AS price_category

    FROM paintings

    )

    SELECT price_category, count(*) AS countrows

    FROM cte

    GROUP BY price_category;

    ```


    You now have the price category summaries:


    | price_category | countrows |

    | --- | --- |

    | reasonable | 489 |

    | cheap | 345 |

    | unpriced | 136 |

    | expensive | 303 |


    As you see, you don’t actually need the id and title since you’re only using the
    groups and counting.


    ### Using a Join in the CTE


    You can also use a join in the CTE, which simplifies summarizing with multiple
    tables. For example, if you want to get sales per state, you will need the totals
    from the `sales` table and the states from the `customers` table.


    To get just the state and the total, we can use


    ```sql

    SELECT c.state, s.total

    FROM customers AS c JOIN sales AS s ON c.id=s.customerid;

    ```


    The simplified results give us the following:


    | state | total |

    | --- | --- |

    | QLD | 940 |

    | SA | 1005 |

    | WA | 795 |

    | VIC | 505 |

    | TAS | 360 |

    | NSW | 340 |

    | ~ 2509 rows ~ |   |


    Using this as a CTE, we can group by the state:


    ```sql

    WITH cte AS (

    SELECT c.state, s.total

    FROM customers AS c JOIN sales AS s ON c.id=s.customerid

    )

    SELECT state, sum(total) AS total

    FROM cte

    GROUP BY state;

    ```


    We now have state totals:


    | state | total |

    | --- | --- |

    | TAS | 156305 |

    | VIC | 272695 |

    | NSW | 374660 |

    | NT | 18855 |

    | QLD | 333575 |

    | SA | 115700 |

    | WA | 255260 |


    Here again, the purpose of the CTE was to prepare the data before summarizing
    it.'
