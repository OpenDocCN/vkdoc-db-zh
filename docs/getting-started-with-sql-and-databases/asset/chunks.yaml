  trans: "\n# 8. 处理表格\n\n## 摘要\n\n除了从数据库表中简单获取数据外，你还可以使用聚合查询生成各种汇总。聚合查询使用一个或多个聚合函数，并隐含对数据的某种分组。\n\
    \n聚合查询有效地将数据转换为一个二级汇总表。对于总计汇总，你只能选择汇总值。你不能同时选择非聚合值。\n\n主要的聚合函数包括：\n\n*   `count()`，用于计算列中的行数或数值数量\n\
    *   `min()` 和 `max()`，用于按排序顺序获取列中的第一个或最后一个值\n\n对于数字，你还可以使用：\n\n*   `sum()`、`avg()`\
    \ 和 `stddev()`，用于对数字列执行求和、平均值和标准差计算\n\n在处理数字时，并非所有数字的用法都相同，因此并非所有数字都应该被汇总。\n\n\
    对于字符串，你还可以使用：\n\n*   `string_agg()`、`group_concat()` 和 `listagg()`，用于连接列中的字符串\n\
    \n在所有情况下，聚合函数只对值起作用：它们都会跳过 `NULL`。\n\n你可以控制列中哪些值被包含进来：\n\n*   你可以使用 `DISTINCT`\
    \ 来只计算每个值的单个实例。\n*   你可以使用 `CASE … END` 来作为特定值的过滤器。\n\n如果没有 `GROUP BY` 子句，或使用\
    \ `GROUP BY ()`，聚合结果就是总计：你将得到一行汇总值。\n\n你也可以使用 `GROUP BY` 来为多个分组生成汇总。每个分组是独立的。当你这样做时，你会得到每个分组的汇总，以及包含分组值本身的额外列。\n\
    \n聚合并不局限于单表：\n\n*   你可以连接多个表并聚合结果。\n*   你可以将一个聚合结果连接到一个或多个其他表。\n\n在许多情况下，分多个步骤处理聚合是有意义的。为此，将第一步放入通用表表达式（Common\
    \ Table Expression）是很方便的，这是一个虚拟表，可以与下一步一起使用。\n\n在对数据进行分组时，有时你希望过滤掉某些分组。这可以通过 `HAVING`\
    \ 子句完成，你将其添加在 `GROUP BY` 子句之后。\n\n### 后续内容\n\n到目前为止，我们一直专注于从现有数据库中提取数据。\n\n章节\
    \ 2 让你深入了解了构建数据库的一些设计原则。在下一章，我们将探讨 SQL 的其他一些方面：\n\n*   首先，我们将查看生成实际示例数据库的代码，以便更好地理解表是如何组合的。\n\
    *   接下来，我们将查看使用数据操作语言语句更改一些数据。\n\n下一章的目的不是让你成为构建数据库的专家，而是让你能更好地理解正在发生的事情。\n\n\
    至于操作数据，这不是你通常手动完成的事情；然而，了解其原理非常重要。\n\n脚注 1   2   3\n\n在大多数情况下，我们使用 `SELECT` 语句从数据库中提取数据。`SELECT`\
    \ 语句及其各种子句通常被称为 `DQL`——**数据查询语言**。\n\nSQL 的功能远不止让你选择数据。除其他功能外，它还允许你操作数据。\n\nSQL\
    \ 中有三种主要的操作数据语句：\n\n*   `INSERT` 语句是你向表中添加新数据的方式。\n*   `UPDATE` 语句允许你更改表中的现有数据。\n\
    *   `DELETE` 用于从表中删除一行或多行。\n\n总的来说，这些语句属于所谓的 `DML`——**数据操作语言**。\n\n还有一些语句操作的不是数据，而是实际的数据库结构，例如表和视图：\n\
    \n*   `CREATE` 用于在数据库中创建新表、视图或其他对象。\n*   `DROP` 用于移除一个 `CREATE` 的对象。如果用于表，则数据也会丢失。\n\
    *   `ALTER` 允许你对现有对象进行更改。\n*   `TRUNCATE` 可用于重置表。这主要意味着删除所有行，如果有自增列则重新开始计数。\n\n\
    总的来说，这些语句属于 `DDL`——**数据定义语言**。\n\n到目前为止，我们或多或少都认为数据库表是理所当然的。章节 2 讨论了 SQL 数据库应如何工作的一些原则，但在这里我们将更详细地看看数据库是如何构建的。\n\
    \n在本章中，我们将探讨：\n\n*   SQL 表是如何构建的\n    这将包括表是如何创建的，以及列的名称和数据类型。我们还将看看如何通过主键、外键和其他约束来确保数据完整性，这些约束限制了可以添加到表中的数据。我们将探讨添加表索引以提高搜索表的能力。最后，我们将看看如何对表进行更改。\n\
    *   数据是如何被添加或修改的\n    在这里，我们将查看在表中添加、更新和删除行。\n\n到此结束时，你将对创建和管理数据库有更多了解，但这还不足以让你冒充数据库开发人员。关于开发数据库，有许多决策需要更多的知识和经验。\n\
    \n然而，你将能更好地理解正在发生的事情，并且你或许可以尝试自己创建几个小型数据库。\n\n## 表是如何创建的\n\n你一直使用的示例数据库最初是一个脚本。为了本次讨论，我们将密切结合这个脚本来查看发生了什么。\n\
    \n如果你没有自己安装数据库，你可以从 [`https://sampledb.webcraft101.com`](https://sampledb.webcraft101.com/)\
    \ 下载一份脚本副本，并选择你自己的 `DBMS`。脚本的第一部分（创建表）将是相同的，但第二部分（添加实际数据）会不同，因为很多数据是随机的。\n\n到目前为止，你也应该意识到每个\
    \ `DBMS` 都有其怪癖，因此下面的一些细节会有所不同。但总体而言，思路是一样的。\n"
- fmt: '# Creating a Table


    A table is created with a `CREATE TABLE` statement. For example:


    ```sql

    CREATE TABLE customers (

    id int GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,

    email VARCHAR(60) NOT NULL UNIQUE,

    familyname VARCHAR(40) NOT NULL,

    givenname VARCHAR(40) NOT NULL,

    street VARCHAR(64),

    town VARCHAR(48),

    state VARCHAR(3) default ''VIC'',

    postcode CHAR(4)

    CHECK (postcode SIMILAR TO ''[0-9][0-9][0-9][0-9]''),

    dob date

    CHECK (dob < current_date - interval ''18 years''),

    phone char(10)

    CHECK (phone SIMILAR

    ''[01][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]''),

    spam boolean default false,

    height decimal(4,1),

    registered date NOT NULL

    );

    ```


    This statement is for the PostgreSQL DBMS, but it will be very similar for other
    DBMSs, as we’ll note as we go.


    The `CREATE TABLE` statement, as the name might suggest, creates a new table.
    It looks something like this:


    ```sql

    CREATE TABLE something (

    --  details

    );

    ```


    There are many `CREATE` statements in SQL, such as `CREATE VIEW`, but this one
    is slightly different in that the details are wrapped in parentheses.


    The preceding details generally define the columns in the table. They follow this
    pattern:


    ```

    name type [constraints etc …]

    ```


    Constraints are additional rules which *constrain* (limit) which values are valid
    for that column. There are sometimes some other properties which affect the behavior
    of the column.


    Constraints and other properties can be added in three ways:


    *   They may be added inline with the definition of the column.

    *   They can be added separately in the `CREATE TABLE` statement, typically at
    the end.

    *   They can be added after the table has been created.


    This is in increasing order of flexibility and in decreasing order of convenience.


    To remove a table, SQL gets a little pedantic. You might think that you can `delete`
    a table, but that won’t work: `DELETE` is reserved for rows within the table.
    Instead, you `DROP` the table:


    ```sql

    DROP TABLE something;

    DROP TABLE IF EXISTS something; --  not Oracle

    ```


    If you try to drop a table which doesn’t exist, you’ll get an error. The second
    form earlier overlooks this. Oracle doesn’t support `IF EXISTS`, so you need to
    be more careful there.


    You’ll have to be careful anyway, because dropping a table also drops the data,
    which is the sort of mistake you make once before you start looking for a new
    job. An expert may be able to recover the data, but don’t count on it.


    # Column Names


    We have discussed what makes a valid name earlier. Generally, they shouldn’t interfere
    with the SQL language and should avoid special characters such as spaces or hyphens,
    unless you want to pay for that with double quotes.


    Column names should also be distinct: obviously, you can’t have two columns with
    the same name.


    *There are no special names.* For example, calling something `id` doesn’t make
    it a primary key. It’s up to the developer to think of a suitable name. There
    are also no special positions. You can have your columns in any order that you
    like, but, again, it’s up to the developer to think of a suitable order.


    Many developers forget (or don’t care) about who will be using the database, so
    you will sometimes get very cryptic or confusing table and column names. Seriously,
    there’s no excuse for this. A good name should be easy to work with.


    # Data Type


    In SQL, there are three main data types and some variations between types. Here
    is a sample of some of them:


    | Numbers | Dates | Strings |

    | --- | --- | --- |

    | `integer`, `decimal()`, `float` | `date`, `datetime` | `char()`, `varchar()`
    |


    There may be other data types, such as **Boolean** (true/false value) or **BLOB**
    (binary data).


    There are also further variations. For example, you can decide whether an integer
    is a short one with a limited range or a longer one with a greater range. You
    can decide how long a string can be or how precise a decimal can be. Here are
    some used the sample database:


    | Type | Description |

    | --- | --- |

    | `INT` | a.k.a. `INTEGER`: A whole number, in this case ranging between -2,147,483,648
    to 2,147,483,647 |

    | `DECIMAL(4,1)` | a.k.a. `NUMERIC`: This is a decimal with a fixed number of
    decimal places. The notation may be confusing: it means up to four digits, *including*
    one fixed decimal place. There is also `FLOAT` which has variable precision |

    | `VARCHAR(60)` | A string which can stretch to a maximum of 60 characters long
    |

    | `CHAR(4)` | A string which is fixed at four characters. If you enter fewer than
    four characters, it will be padded with spaces, which is why trailing spaces should
    be ignored |

    | `BOOLEAN` | A value which is either `true` or `false`, named for George Boole,
    one of the pioneers of mathematical logic |

    | `DATE` | A date without the time |

    | `TIMESTAMP` | a.k.a. `DATETIME`: A date which includes the time down to a tiny
    part of a second |


    Note


    *   In principle, `VARCHAR` is more space efficient, while `CHAR` is more processing
    efficient (the DBMS doesn’t need to work out how long the string is because it
    already knows); in practice, modern DBMSs are pretty efficient anyway, so the
    distinction is not so important.

    *   Some DBMSs don’t support a boolean data type, so have to make do with an integer
    `1` or `0`. Some DBMSs also support a very short integer called `BIT`.

    *   Note that the postcode and phone number are strings, even though they are
    limited to digits. This is because they are not really numbers: there is no significance
    in their numeric value; one value isn’t truly greater or less than another, and
    even their order is insignificant.


    Choosing which type of data is partly a matter of the most correct type (the data
    of birth *must* be a date) and partly a matter of knowing what you might expect
    in real life (is 60 characters long enough for an email address?).'
