    two rows have different or even conflicting data, and you will need to decide
    what to keep and what to reject.


    When should you delete a row? The short answer is never. The longer answer is
    that data which should have been there should stay there. The obvious exceptions
    are data which was entered in error (such as this example) or test data.


    Another exception is if data has been entered speculatively, such as a sale which
    might not go ahead. You might then delete it if you decide you don’t want to keep
    it for historical purposes. If you really have data that you have finished with,
    then you should mark it as expired (such as with another column).


    ## Adding More Rows


    At this point, you can add more customers. With most DBMSs, you can add multiple
    rows with a single INSERT statement:


    ```

    --  Not Oracle:

    INSERT INTO customers(givenname, familyname,

    email, registered)

    VALUES

    (''Sylvia'',''Nurke'',

    ''sylvia.nurke@example.com'', current_date),

    (''Murgatroyd'',''Murdoch'',

    ''murgatroyd.murdoch@example.com'', current_timestamp)

    --  etc

    ;

    ```


    Oracle, however, won’t let you do that. There are various workarounds for Oracle,
    but the simplest way is the old-fashioned way of multiple `INSERT` statements:


    ```

    --  All DBMSs

    INSERT INTO customers(givenname, familyname,

    email, registered)

    VALUES (''Sylvia'',''Nurke'',

    ''sylvia.nurke@example.com'', current_timestamp);

    INSERT INTO customers(givenname, familyname,

    email, registered)

    VALUES (''Murgatroyd'',''Murdoch'',

    ''murgatroyd.murdoch@example.com'', current_timestamp);

    --  etc

    ;

    ```


    If you have a large number of rows, multiple individual `INSERT` statements tend
    to get very slow, so in Oracle it’s worth investigating the workarounds. The script
    for the sample database is full of them.


    Note that the value of `current_timestamp` is technically too fine-grained, as
    it also includes the time. Most, but not all, DBMSs have `current_date` which
    would fit better. However, the DBMS will also happily cast `current_timestamp`
    automatically to fit it in.


    When you now check the table:


    ```

    SELECT * FROM customers ORDER BY id DESC;

    ```


    You will notice a gap where the duplicate customer was. There are two principles
    working together here:


    1.  Primary keys should never be recycled. This way, you don’t inherit old data.


    2.  Auto-incremented columns don’t rewind, so they don’t end up reusing old values.


    It is possible to override these principles, such as when you are trying to repair
    data.'
  trans: '## 向表中添加行


    在这里，我们将操作其中一张表——`customers` 表。我们将添加和更改一些数据，并对表本身进行一些修改。


    首先，我们将添加一个新客户。要添加行，请使用 `INSERT` 语句：


    ```

    INSERT INTO table(columns)

    VALUES (values);

    ```


    例如：


    ```

    INSERT INTO customers(givenname, familyname,

    email, registered)

    VALUES (''Norris'', ''Lurker'', ''norris.lurker@example.com'',

    current_timestamp);

    ```


    `INSERT` 语句可用于添加新值（如此处所示），或从另一张表复制值。它通常包含一个列列表，但如果你承诺以正确的顺序填写所有列，则可以省略该列表。通常，包含列表更为可靠。


    关于列列表，有一些明显的规则：


    *   所有 `NOT NULL` 列*必须*被包含，除非它们有默认值。

    *   值必须在数量（多少）和各自类型上与列匹配。

    *   SQL 并不真的在乎你是否弄错了实际值，比如，假设，颠倒了 `givenname` 和 `familyname`，只要这些值是兼容的。


    所有其他列将获得 `NULL` 值，但有一些例外。如果列定义包含 `DEFAULT`（例如 `spam` 列的 `false`），那么当你省略该列时，将使用该默认值。这包括任何带有默认值的
    `NOT NULL` 列。这意味着你可以将它们排除在列列表之外。


    如果你想强制使用 `DEFAULT` 列，也可以包含 `DEFAULT` 关键字作为虚拟值。然而，这在 SQLite 中不起作用。


    即便如此：


    *   当然，你也可以包含非 `NOT NULL` 的列。在这个例子中，我们没有这样做。

    *   你也可以包含带有默认值的列，并为其指定一个替代值。


    从技术上讲，主键 `id` 应该是 `NOT NULL` 的，因此原则上它应该被包含在列列表中。然而，在这个例子中，由于它是一个自动生成的数字，这起到了默认值的作用，因此你可以并且应该省略它。如果主键不是自动生成的，你则需要包含它。


    现在再次运行 `INSERT` 语句，但更改电子邮件地址：


    ```

    INSERT INTO customers(givenname, familyname,

    email, registered)

    VALUES (''Norris'', ''Lurker'', ''norris.lurker@example.net'',

    current_timestamp);

    ```


    没错：你添加了同一个客户两次。你可以通过以下命令查看结果：


    ```

    SELECT * FROM customers ORDER BY id DESC;

    ```


    添加两个同名的客户在技术上并没有错，所以这可能不是错误。此时，SQL 无法帮助你决定你真的有两个同名的客户还是一个重复项，所以你必须通过其他方式来弄清楚；通常，这意味着亲自去追查他们。


    请注意，即使是电子邮件地址也不能证明什么。尽管电子邮件地址不同（不允许重复的电子邮件地址），但这不会是第一个拥有多个电子邮件地址的用户。


    ## 从表中删除行


    让我们假设第二个同名的客户确实是一个重复项，因此你需要删除它。为此，你使用：


    ```

    DELETE

    FROM table;

    ```


    然而，你需要非常小心这个操作。它本身会删除*所有*行，这可能不是你的本意。如果你只想删除部分行，需要用 `WHERE` 子句来限定它：


    ```

    DELETE

    FROM table

    WHERE …;

    ```


    有时，你不确定是否针对了正确的行，当然也不想事后才发现。你可以通过将 `DELETE` 改为 `SELECT *` 来进行检查：


    ```

    SELECT *

    FROM table

    WHERE …;

    ```


    如果你确信那就是你的意图，你可以继续执行。如果你*仍然*不确定，你或许可以进行试运行。在一些数据库管理系统中，你可以*一次运行一条*以下语句：


    ```

    --  PostgreSQL, MSSQL, MySQL / MariaDB:

    BEGIN TRANSACTION;  --  MySQL / MariaDB: START TRANSACTION

    DELETE FROM minipaintings;

    SELECT * FROM minipaintings;

    ROLLBACK;

    SELECT * FROM minipaintings;

    ```


    一个 `transaction`（事务）是一组允许你使用 `ROLLBACK`（回滚）撤销任何更改的语句。如果你想保留更改，则使用 `COMMIT`（提交）。本书中所有的数据库管理系统都支持事务^(¹¹)，但
    SQLite 和 Oracle 不支持一次运行一条语句。


    通常，单条语句会自动提交，这就是为什么删除（以及稍后将看到的更新）是如此危险的原因。


    回到 `customers` 表，首先，检查你刚刚添加了哪些行：


    ```

    SELECT * FROM customers ORDER BY id desc;

    ```


    使用最后一个 id（在之前的逆序排列中是第一个）：


    ```

    DELETE

    FROM customers

    WHERE id= … ;

    ```


    现在，当你检查表时：


    ```

    SELECT * FROM customers;

    ```


    你应该只看到一个新的客户。


    删除一个假定的重复项并非总是如此直接。有时，两行数据有不同的甚至冲突的数据，你需要决定保留什么、拒绝什么。


    你应该在什么时候删除一行？简短的答案是永远不要。更详细的答案是，本该存在的数据应该保留。明显的例外是错误输入的数据（如本例）或测试数据。


    另一个例外是，如果数据是试探性输入的，例如一笔可能无法成交的销售。如果你决定不想将其作为历史数据保留，之后可能会删除它。如果你真的有已经处理完毕的数据，那么你应该将其标记为过期（例如，使用另一个列）。


    ## 添加更多行


    此时，你可以添加更多客户。对于大多数数据库管理系统，你可以使用单个 INSERT 语句添加多行：


    ```

    --  Not Oracle:

    INSERT INTO customers(givenname, familyname,

    email, registered)

    VALUES

    (''Sylvia'',''Nurke'',

    ''sylvia.nurke@example.com'', current_date),

    (''Murgatroyd'',''Murdoch'',

    ''murgatroyd.murdoch@example.com'', current_timestamp)

    --  etc

    ;

    ```


    然而，Oracle 不允许你这样做。对于 Oracle，有各种解决方法，但最简单的方法是使用传统的多个 `INSERT` 语句：


    ```

    --  All DBMSs

    INSERT INTO customers(givenname, familyname,

    email, registered)

    VALUES (''Sylvia'',''Nurke'',

    ''sylvia.nurke@example.com'', current_timestamp);

    INSERT INTO customers(givenname, familyname,

    email, registered)

    VALUES (''Murgatroyd'',''Murdoch'',

    ''murgatroyd.murdoch@example.com'', current_timestamp);

    --  etc

    ;

    ```


    如果你有大量的行，多个单独的 `INSERT` 语句往往会变得非常慢，因此在 Oracle 中值得研究这些解决方法。示例数据库的脚本中充满了它们。


    注意，`current_timestamp` 的值从技术上讲粒度太细，因为它还包括了时间。大多数（但并非全部）数据库管理系统有 `current_date`，这可能更合适。然而，数据库管理系统也会很乐意自动将
    `current_timestamp` 转换以适应。


    当你现在检查表时：


    ```

    SELECT * FROM customers ORDER BY id DESC;

    ```


    你会注意到重复客户所在位置有一个间隙。这里有两个原则共同作用：


    1.  主键永远不应该被回收。这样，你就不会继承旧数据。

    2.  自增列不会回绕，因此它们不会重复使用旧值。


    可以覆盖这些原则，例如当你尝试修复数据时。'
- fmt: '## Updating Rows


    Now that we have added a few more customers, we can start to fill in a few missing
    details. Among other things, we might add their phone numbers.


    To change values in an existing row, use the `UPDATE` statement:


    ```sql

    UPDATE table

    SET column=value    --  column=value, column=value, etc

    WHERE …

    ```


    Optionally, you can set more than one value as before.


    For example, using the `id` of one of your newly added customers:


    ```sql

    SELECT id FROM customers ORDER BY id DESC;

    ```


    you can update the phone number:


    ```sql

    UPDATE customers

    SET phone=''0370101234''

    WHERE id= … ;

    ```


    Since the `id` is a primary key, and therefore unique, this will limit the damage
    to one row.


    The `UPDATE` statement can be very dangerous. For example:


    ```sql

    --  Don''t do this!

    UPDATE customers

    SET phone=''0370101234'';

    ```


    This could ruin your day. Without the `WHERE` clause, this would change the `phone`
    column for *all* rows. At this point, there is no requirement for the phone number
    to be unique.


    Now is probably a good time to reflect that SQL has no undo. Sometimes, you can
    reconstruct your data after you make a mistake, and sometimes the DB administrator
    can reconstruct it. If not, there’s nothing anyone can do.


    You may be able to test your `UPDATE` using the same methods discussed for the
    `DELETE` statement.


    Unlike the `INSERT` statement, you can’t set different values for each row, unless
    that value can be calculated.


    You can, for example, increase the prices of all of the paintings:


    ```sql

    --  Don''t run this unless you really want to:

    UPDATE paintings SET price=price*0.1;

    ```


    Here, you can raise the price by 10% if you run it once. The only trouble is that
    if you (accidentally) run it again, you’ll increase the price to 21%, then 33.1%,
    then 46.41%, and, well, you know where this is headed.


    The problem with the phone number *may* be alleviated if you decide that the phone
    number is supposed to be unique. You can modify an existing table using the `CREATE
    UNIQUE INDEX` statement. For example:


    ```sql

    --  Not MSSQL:

    CREATE UNIQUE INDEX uq_customers_phone ON

    customers(phone);

    --  MSSQL:

    CREATE UNIQUE INDEX uq_customers_phone ON

    customers(phone)

    WHERE phone IS NOT NULL;

    ```


    Microsoft SQL has a quirk which will compare `NULL`s when checking for uniqueness,
    so you need the extra clause to stop it from doing that.


    Note that there may be good reasons *not* to enforce unique phone numbers, such
    as multiple customers from the same organization. This is the sort of decision
    which a database developer alone can’t make—there needs to be a real understanding
    of how the database is to be used in real life.


    ## Altering the Table


    Once you have a table and started populating it, you may discover that you need
    to make changes to the table. It’s too late to drop the table and recreate it,
    but you can use the `ALTER` statement to make some changes after the event.


    Typical changes include adding or dropping columns, adding an index, or changing
    the type of column. Pretty well all of the table properties discussed in the chapter
    can be retrofitted onto an existing table, as long as it doesn’t violate existing
    integrity rules in the process. For example:


    ```sql

    --  Add Column

    ALTER TABLE customers

    ADD country VARCHAR(60);

    --  Drop Columns

    ALTER TABLE customers

    DROP COLUMN town, state, postcode;

    --  Add Foreign Key

    ALTER TABLE customers

    ADD townid INT REFERENCES towns(id);

    --  Add Check Constraint

    ALTER TABLE saleitems

    ADD CHECK (quantity>0);

    --  Drop Constraint

    ALTER TABLE customers

    DROP CONSTRAINT ck_customers_postcode;

    --  Add NOT NULL constraint

    ALTER TABLE saleitems

    ALTER COLUMN quantity SET NOT NULL;

    --  Add Default

    ALTER TABLE saleitems

    ALTER COLUMN quantity SET DEFAULT 1;

    ```


    Here, we will add another column.


    Although the `customers` table includes the address, it doesn’t include a country.
    This is fine if you want to limit sales to one country, but if you have bigger
    plans, you’ll want to add the country:


    ```sql

    --  All DBMSs

    ALTER TABLE customers

    ADD country varchar(48);

    --  MySQL / MariaDB

    ALTER TABLE customers

    ADD country varchar(48)

    AFTER postcode;

    ```


    The new column will be placed at the end. Aesthetically, it should go after the
    other address columns. Unfortunately, most DBMSs don’t allow you to specify where
    the new column appears without some slightly risky trickery,^([^(12)](#fn12))
    so we have to live with it. As you have seen earlier, MySQL/MariaDB does allow
    you to specify a position.


    For now, let’s assume that all of your customers come from one country, but we’ll
    only make that assumption for customers already with an address. We can set the
    country for these customers as follows:


    ```sql

    UPDATE customers

    SET country=''Australia''     --  or whatever

    WHERE state IS NOT NULL;

    ```


    As with all of the DDL statements, your ability to alter the table in real life
    may be limited. The database administrator probably doesn’t want just anybody
    to tinker with the database.


    For the sample database, however, we’ll assume that you have complete control.


    ## DML in Real Life


    While you may spend a lot of time using the `SELECT` statement, it’s unlikely
    that you’ll spend much time using `INSERT`, `UPDATE`, or `DELETE`.


    The `SELECT` statement is used to fetch data, and, other than questions of security
    and confidentiality, it’s a relatively harmless operation. You can’t break anything
    with a simple `SELECT` statement.


    On the other hand, it is *very* easy to make a mess of your database with the
    other statements. Once you start adding data that shouldn’t be there, or you change
    something to the wrong value, or you delete data which should have remained, your
    database is unreliable and, therefore, useless.


    For that reason, the database is normally secured against unauthorized tampering.


    ### Security


    All normal DBMSs include some sort of security. In this sense, SQLite is not normal,
    in that the client is built into some other software, and any security you want
    to implement is up to the host software. If you’re working with SQLite, you can
    ignore this section or politely nod your head and pretend you’re interested anyway.


    When you connect to a database, you would normally be expected to log in. Sometimes,
    logging in is automatic, but you often would be expected to enter a username and
    a password.


    Typically, security is set up in two layers:


    *   A **user** is an individual with their own username and password.


    *   A **role** is a collection of users with similar attributes.


    A user may be assigned to more than one role.


    Typically, permissions required to do something—anything at all—are assigned to
    a role. They may also be assigned to individual users, but that would be harder
    to maintain if users change.


    These permissions include (but are not limited to, as they say)


    *   Which tables can be read with a `SELECT` statement


    *   Which tables can be modified with the other DML statements


    *   Whether tables can be altered or anything can be created or dropped


    Depending on the DBMS, these permissions can be very fine-grained. Generally,
    they are under the control of the database administrator (DBA). There is often
    a special user with this role called **root**. There can be more than one root
    user or DBA.


    If you install your own DBMS software, then you will be the DBA, and you can do
    anything you like.'
