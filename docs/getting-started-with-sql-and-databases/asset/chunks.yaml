- fmt: '### Aliases Without AS


    SQL has what you might consider a major design flaw at this point: the word `AS`
    is optional, and any spacing will generate an alias:


    | id | firstname | lastname | email |

    | --- | --- | --- | --- |

    | 474 | Judy | Free |   |

    | 186 | Ray | Gunn | 64.48… |

    | 144 | Ray | King | 69.60… |

    | 179 | Ivan | Inkling | 67.04… |

    | 475 | Drew | Blood | 67.32… |

    | 523 | Seymour | Sights | 65.86… |

    | ~ 304 rows ~ |


    ```sql

    --  Not Recommended:

    SELECT

    id,

    givenname firstname, familyname lastname,

    height/2.54 email   --  seriously, probably a bad idea

    FROM customers;

    ```


    As you see from the first comment in the example, we don’t recommend this. Here
    are two mistakes which you are likely to make some time in your SQL career:


    ```sql

    --  Trailing Comma:

    SELECT

    id,

    givenname,

    familyname,

    FROM customers;

    ```


    The first mistake is when you get carried away and add an extra comma after the
    last column. SQL simply refuses to work with it, and you will get a `syntax error`:
    SQL cannot make sense of your statement.


    Here is another mistake you will make:


    ```sql

    --  Missing Comma:

    SELECT

    id

    givenname,

    familyname

    FROM customers;

    ```


    Technically, this isn’t an error:


    | givenname | familyname |

    | --- | --- |

    | 474 | Free |

    | 186 | Gunn |

    | 144 | King |

    | 179 | Inkling |

    | 475 | Blood |

    | 523 | Sights |

    | ~ 304 rows ~ |


    This time, the statement will work, but you will get the wrong result. SQL will
    interpret the `givenname` as an alias for `id`, because it follows after some
    spacing. This is called a `logical error`: it will work, but it’s not what you
    meant.


    This sort of error can be a very difficult one to identify, especially if you
    have a large number of columns with similar looking data.


    There is *no way* to prevent this sort of error, other than to be very careful.
    We recommend that you *always* use `AS` for aliases. That won’t avoid the error,
    but it might make missing columns stand out a little more.


    ### Awkward Aliases


    You can also wrap aliases in double quotes:


    ```sql

    SELECT

    id, givenname, familyname,

    height/2.54 AS "inches" --  quoted alias

    FROM customers;

    ```


    In this case, the double quotes are unnecessary, but certainly make it clear the
    `inches` is an alias.


    Here again, if you are using MariaDB/MySQL, you should put it in ANSI mode. Otherwise,
    the double quotes will be interpreted as a string.


    Why would SQL allow you to enclose a column name if you don’t need to? There are
    some situations where a column name might not be clear to SQL. For example, you
    may remember a table called `badtable`, full of bad column names:


    | customer code | customer | order | 1st | 42 | last-date |

    | --- | --- | --- | --- | --- | --- |

    | 23 | Fred | 42 | 2020-01-01 | Life, … | 2020-01-31 |

    | 37 | Wilma | 54 | 2020-02-01 | I think … | 2020-02-29 |


    ```sql

    SELECT * FROM badtable;

    ```


    Here are some things that can go wrong:


    First, a column name might be the same as an SQL keyword, for example, if a column
    is called `order`, which will be confused with `ORDER BY`:


    ```sql

    --  SQL Keyword

    SELECT order    --    Syntax Error

    FROM sales;

    ```


    A column name might be a number, or start with a number, which is normally invalid.
    For example:


    ```sql

    --  Numbers

    SELECT 1st, 42  --    Interpreted: 1 as st, 42

    FROM events;

    ```


    Here, you will get the *values* `1` and `42`, which is legitimate; however, the
    first will gain an alias, while the second is anonymous.


    The column might include spaces or other characters which will be misinterpreted.
    For example:


    ```sql

    --  Invalid Characters

    --  Interpreted: customer as code, last - date

    SELECT customer code, last-date

    FROM data;

    ```


    They are both misinterpreted. The second is made worse as it looks like a subtraction
    of two nonexistent columns.


    Generally, the double quotes are required if the column name is problematic. This
    is sometimes the result of sloppy design, in that a database developer should
    learn to avoid problematic names.


    Some DBMSs have alternatives for double quotes:


    *   MSSQL allows square brackets (`[ … ]`) as an alternative. Although they seem
    to prefer the square brackets, this creates another unnecessary incompatibility
    in your code, and you should use double quotes instead.

    *   MySQL/MariaDB allows so-called backticks (`` ` … ` ``) as an alternative.
    In ANSI mode, you should avoid these and use double quotes. However, in traditional
    mode, you have no alternative.


    Here, we will be using double quotes, and only if we need them.


    ## Calculating with Numbers


    One of the core data types in SQL is numbers. There are a number of variations
    of numbers:


    *   **Integer** numbers are whole numbers. Variations include the range of numbers
    as well as whether negative numbers are included.

    *   **Decimal**, a.k.a. **numeric**, numbers have a predefined number of decimal
    places. Historically, they have been called fixed point.

    *   **Floating-point**, a.k.a. **real**, numbers have varying decimal places.


    The reason there are so many variations is for storage and processing. You can
    decide how much storage you want to use for each value, depending on the precision
    and range. Integers are also simplest to process, followed by fixed point and
    then floating-point decimals. Floating point is also less precise.


    SQL provides some calculation abilities using **arithmetic operators** and **mathematical
    functions**:


    *   Arithmetic operators perform the basic arithmetic which you learned about
    early in school.

    *   Mathematical functions perform more complex operations, many of which you
    might have learned about later in school.


    The names of the different types are unfortunate: “decimal” and “numeric” are
    too generic, and mathematicians regard all of the preceding types as “real” numbers.
    We will often use the word “decimal” in its more relaxed meaning to include the
    non-integer types, and the word “numeric” will often be used in its standard meaning
    as anything related to numbers.


    ### Arithmetic Operators


    You have already seen a simple calculation in SQL:


    ```sql

    SELECT

    id, givenname, familyname,

    height/2.54 AS inches

    FROM customers;

    ```


    All DBMSs recognize the four basic arithmetic operators: `+`, `-`, `*`, and `/`.
    Note that when you combine these operations, SQL follows the usual rules:


    ```sql

    SELECT 1+2*3;   --  1+6 = 7         NOT 9

    SELECT 12/2*3;  --  6*3 = 18        NOT 2

    ```


    As you would have learned in school:


    *   Multiply or divide *before* you add or subtract. This is called operator precedence.

    *   Operators of the *same* precedence are performed left to right. This is called
    associativity.


    Of course, you can always include parentheses `( … )` to override the rules:


    ```sql

    SELECT (1+2)*3;     --  3*3 = 9     NOT 7

    SELECT 12/(2*3);    --  12/6 = 2    NOT 18

    ```


    You can also include more complex combinations of parentheses:


    ```sql

    SELECT 2 * (3 + 4) + 3 * (4 + 5)    --  2*7+3*9 = 14+27 = 41

    ```


    Here, the principle is that you process parentheses *before* the rest.'
