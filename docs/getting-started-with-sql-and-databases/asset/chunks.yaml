  trans: '# 创建表


    表是通过 `CREATE TABLE` 语句来创建的。例如：


    ```sql

    CREATE TABLE customers (

    id int GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,

    email VARCHAR(60) NOT NULL UNIQUE,

    familyname VARCHAR(40) NOT NULL,

    givenname VARCHAR(40) NOT NULL,

    street VARCHAR(64),

    town VARCHAR(48),

    state VARCHAR(3) default ''VIC'',

    postcode CHAR(4)

    CHECK (postcode SIMILAR TO ''[0-9][0-9][0-9][0-9]''),

    dob date

    CHECK (dob < current_date - interval ''18 years''),

    phone char(10)

    CHECK (phone SIMILAR

    ''[01][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]''),

    spam boolean default false,

    height decimal(4,1),

    registered date NOT NULL

    );

    ```


    此语句适用于 PostgreSQL 数据库管理系统，但对于其他数据库管理系统也非常相似，我们会在后文中说明。


    `CREATE TABLE` 语句，顾名思义，用于创建一个新表。它大致如下所示：


    ```sql

    CREATE TABLE something (

    --  详细信息

    );

    ```


    SQL 中有许多 `CREATE` 语句，例如 `CREATE VIEW`，但这个语句略有不同，因为其详细信息被包裹在括号内。


    前面的详细信息通常定义表中的列。它们遵循以下模式：


    ```

    名称 类型 [约束条件等 …]

    ```


    约束条件是附加的规则，用于*约束*（限制）哪些值对是该列有效的。有时还存在一些其他属性，它们会影响列的行为。


    约束条件和其他属性可以通过三种方式添加：


    *   它们可以与列的定义一起*内联*添加。

    *   它们可以在 `CREATE TABLE` 语句中单独添加，通常在末尾。

    *   它们可以在表创建之后添加。


    这是按灵活性递增和便捷性递减的顺序排列的。


    要删除一个表，SQL 有点讲究。你可能认为可以 `delete` 一个表，但这行不通：`DELETE` 是为表内的行保留的。相反，你应该 `DROP` 该表：


    ```sql

    DROP TABLE something;

    DROP TABLE IF EXISTS something; --  Oracle 不支持

    ```


    如果你尝试删除一个不存在的表，你会得到一个错误。前面的第二种形式忽略了这一点。Oracle 不支持 `IF EXISTS`，所以在那里你需要更加小心。


    无论如何你都必须小心，因为删除表也会删除数据，这种错误你犯一次就可能开始找新工作了。专家也许能恢复数据，但别指望它。


    # 列名


    我们之前讨论过什么构成有效的名称。通常，它们不应干扰 SQL 语言，并应避免使用空格或连字符等特殊字符，除非你想为此付出双引号的代价。


    列名也应该是唯一的：显然，你不能有两个同名的列。


    *没有特殊名称*。例如，将某物命名为 `id` 并不会使其成为主键。这取决于开发者来想出一个合适的名称。也没有特殊的位置。你可以按你喜欢的任何顺序排列你的列，但同样，这取决于开发者来想出一个合适的顺序。


    许多开发者忘记（或不在乎）谁将使用数据库，因此你有时会得到非常晦涩或令人困惑的表名和列名。说真的，这没有借口。一个好的名称应该易于使用。


    # 数据类型


    在 SQL 中，有三种主要数据类型以及类型之间的一些变体。以下是其中一些示例：


    | 数字 | 日期 | 字符串 |

    | --- | --- | --- |

    | `integer`, `decimal()`, `float` | `date`, `datetime` | `char()`, `varchar()`
    |


    可能还有其他数据类型，例如 **Boolean**（真/假值）或 **BLOB**（二进制数据）。


    还有进一步的变体。例如，你可以决定一个整数是范围有限的短整数，还是范围更大的长整数。你可以决定一个字符串的长度，或者一个小数的精度。以下是示例数据库中使用的一些类型：


    | 类型 | 描述 |

    | --- | --- |

    | `INT` | 又名 `INTEGER`：一个整数，在此情况下范围在 -2,147,483,648 到 2,147,483,647 之间 |

    | `DECIMAL(4,1)` | 又名 `NUMERIC`：这是一个具有固定小数位数的小数。其表示法可能令人困惑：它表示最多四位数字，*包括*一位固定小数位。还有具有可变精度的
    `FLOAT` |

    | `VARCHAR(60)` | 一个最多可延伸至 60 个字符长的字符串 |

    | `CHAR(4)` | 一个固定为四个字符的字符串。如果你输入少于四个字符，它将用空格填充，这就是为什么应忽略尾部空格 |

    | `BOOLEAN` | 一个值，要么是 `true` 要么是 `false`，以数学逻辑先驱之一乔治·布尔命名 |

    | `DATE` | 不含时间的日期 |

    | `TIMESTAMP` | 又名 `DATETIME`：一个包含时间（精确到秒的一小部分）的日期 |


    注意


    *   原则上，`VARCHAR` 更节省空间，而 `CHAR` 处理效率更高（DBMS 无需计算字符串长度，因为它已经知道）；实际上，现代 DBMS 无论如何都相当高效，因此这种区别不那么重要。

    *   一些 DBMS 不支持布尔数据类型，因此只能用整数 `1` 或 `0` 来凑合。一些 DBMS 还支持一种称为 `BIT` 的非常短的整数。

    *   注意邮政编码和电话号码是字符串，即使它们仅限于数字。这是因为它们并不是真正的数字：它们的数值没有意义；一个值并不真正大于或小于另一个值，甚至它们的顺序也无关紧要。


    选择哪种数据类型部分取决于最正确的类型（出生日期*必须*是日期），部分取决于了解你在现实生活中可能遇到的情况（60 个字符长对于电子邮件地址是否足够？）。'
- fmt: '### Primary Keys


    A primary key is the unique identifier for each row in the table. It doesn’t need
    to have a particular name, and it doesn’t have to be the first column. It’s just
    easier if you develop good patterns.


    In principle, any column with unique values, such as the customer’s email address,
    might have qualified as a primary key. A good primary key, however, has the following
    features:


    - Primary keys are guaranteed to be unique.

    - Primary keys are never `NULL`.

    - Primary keys are unlikely to change.


    It’s the last feature that makes the email address a little difficult. It’s possible
    for a customer to change their email address, and, while it’s possible for the
    database to cope, it does make it a little less reliable.


    This leads us to the next point. Generally, there are two types of primary key:


    - A natural primary key is one which represents real data. For example, the customer’s
    email address or a country’s unique two- or three-letter code.

    - A surrogate primary key has no intrinsic value—it is an arbitrary code which
    tells us nothing else about the data.


    Some natural primary keys, such as the country code, will never change, so they
    might make a good candidate. Many will change, so it’s common to rely on a separate
    surrogate key instead, which has no reason to change.


    Many database developers use all sorts of names for their primary keys, but they
    very often include a variation of `id`. In fact, `id` is often used as a loose
    synonym for the primary key.


    What really makes a primary key is adding `PRIMARY KEY` to the definition.


    There can only be one primary key in a table. However, a primary key can be compound:
    a combination of two columns instead of the usual one.


    Sometimes, the primary key is defined at the end of the `CREATE TABLE` statement:


    ```

    CREATE TABLE something (

    id INT,

    --  etc

    PRIMARY KEY (id)

    );

    ```


    There’s usually no need to define the primary key this way, but it is the only
    way to define a compound primary key.


    SQL allows you to define a new primary key after the table definition (as long
    as there isn’t one already). It also allows you to add the primary key to an existing
    column, as long as it hasn’t any `NULL`s and the existing values are unique.


    A primary key doesn’t have to be an integer. For example, it can be a carefully
    crafted string, as long as it’s guaranteed to be unique.


    If you’re feeling lazy, however, a primary key can be a simple automatic sequence
    number. Apparently, many database developers are feeling lazy, because many databases
    use an automatic sequence number for their primary key.


    The automatic sequence number wasn’t in the original SQL, so each DBMS went off
    and made up its own version. Here are some variations:


    | DBMS | Auto Sequence |

    | --- | --- |

    | PostgreSQL | `GENERATED BY DEFAULT AS IDENTITY` |

    | Oracle | `GENERATED BY DEFAULT AS IDENTITY` |

    | Microsoft SQL | `IDENTITY(1,1)` |

    | MySQL | `AUTO_INCREMENT` |

    | SQLite | `AUTOINCREMENT` |


    The SQL standard is `GENERATED BY DEFAULT AS IDENTITY`, as used by PostgreSQL
    and Oracle. Older versions of PostgreSQL used `SERIAL`, and older versions of
    Oracle didn’t have one at all and had to make do with triggers, which are a type
    of automation.


    ## Constraints


    As we mentioned, a constraint is any rule which limits what constitutes a valid
    value. Generally, if you attempt to enter a value which violates the constraint,
    the DBMS will raise an error and won’t let you.


    The DBMS doesn’t care whether the data is, in fact, correct, or even whether it
    makes sense. If you enter your place of birth in your `familyname`, good luck
    to you. All the DBMS cares about is whether the data is valid; that is, whether
    the data passes the constraints.


    The first constraint is the data type itself. If you define a column as a number,
    then you can’t put a string in it.


    Ignore the previous statement^([^(10)](#fn10)) and the next one for SQLite. It
    will allow any type of data in any column. When you define a column, you set an
    affinity, which is a preference, but it doesn’t force you.


    The data type also includes additional constraints such as the length of a string
    or the precision of a number.


    As well as the data type, you can get more control over the data with additional
    constraints. These constraints include:


    - `NOT NULL` which states that the column cannot be empty.

    - `UNIQUE` which will disallow duplicate values in the column.

    - `DEFAULT` which will automatically supply a value for a new row if a value wasn’t
    specified.

    - `CHECK` which is a custom rule.

    - In addition to the data type, you can get more control over the data which specifies
    that the value must match another table. This is called a foreign key.


    Here, we’ll look at these constraints in more detail.


    ### NOT NULL


    The second constraint you might encounter is `NOT NULL`. This means what it looks
    like: the data cannot be `NULL`; in other words, a value is required at all times.


    A column which may contain a value is sometimes said to be nullable.


    Having a nullable column doesn’t mean that you don’t actually need the value.
    For example, you can’t ship an order to a customer unless you know their address.
    Being nullable simply means that you can gather this information at a later date,
    and not necessarily immediately on adding the row.


    A column with a `NOT NULL` constraint looks something like this:


    ```

    familyname VARCHAR(24) NOT NULL

    ```


    The `NOT NULL` constraint, together with the others discussed here, can be combined
    with other constraints.


    ### UNIQUE


    There’s no reason two customers can’t have the same date of birth, but you wouldn’t
    expect them to have exactly the same email address. SQL neither knows nor cares
    about what any of this means, so you need to tell the DBMS about this yourself.


    Marking a column as `UNIQUE` causes the DBMS to ensure that a new email address
    cannot be the same as one for another customer. It doesn’t care who gets in first,
    the second one is out of luck.


    A unique column doesn’t necessarily have to have a value, unless it’s also `NOT
    NULL`. Only actual values will be compared for uniqueness, and `NULL`s are all
    ignored.


    Except for Microsoft. Microsoft has a quirk which will indeed match `NULL`s, and
    against all expectations will declare two `NULL`s to be the same, and therefore
    violate the unique constraint. Thankfully, there’s a workaround for this, but
    it does make adding a unique constraint on a nullable column just that little
    bit trickier.


    A column with a UNIQUE constraint looks something like this:


    ```

    title VARCHAR(24) CONSTRAINT uq_minipaintings_title UNIQUE

    ```


    or more simply:


    ```

    title VARCHAR(24) UNIQUE

    ```


    The first form allows you to give the unique constraint a name. Everything in
    a database, including constraints, has a distinct name. If you don’t care what
    the name is, you can use the second form and let the DBMS make one up; however,
    it may not be a pretty sight.


    The name of a constraint can be used, for example, if you ever need to remove
    it at some point in the future.


    ### DEFAULT


    Technically, this is regarded as a constraint, though you might be forgiven for
    wondering whether that’s right.


    Sometimes, you can assume a value unless contradicted. For example, you might
    assume that the number of copies of a painting should be `1`, unless another value
    is entered.


    If you want to implement a default, you can have:


    ```

    quantity NOT NULL DEFAULT 1

    ```


    These are two different constraints: the first `NOT NULL` disallows `NULL`, while
    the second `DEFAULT 1` will automatically fill in the value `1` if there isn’t
    another value.


    In the sample database, this wasn’t done, which is why some `NULL`s were allowed
    to appear, and you had to use `coalesce()` to force the value.


    Sometimes, the default is a simple convenience. Sometimes, it can be used as a
    safe fallback.'
  raw: '### Primary Keys


    A primary key is the unique identifier for each row in the table. It doesn’t need
    to have a particular name, and it doesn’t have to be the first column. It’s just
    easier if you develop good patterns.


    In principle, any column with unique values, such as the customer’s email address,
    might have qualified as a primary key. A good primary key, however, has the following
    features:


    *   Primary keys are guaranteed to be unique.


    *   Primary keys are never `NULL`.


    *   Primary keys are unlikely to change.


    It’s the last feature that makes the email address a little difficult. It’s possible
    for a customer to change their email address, and, while it’s possible for the
    database to cope, it does make it a little less reliable.


    This leads us to the next point. Generally, there are two types of primary key:


    *   A natural primary key is one which represents real data. For example, the
    customer’s email address or a country’s unique two- or three-letter code.


    *   A surrogate primary key has no intrinsic value—it is an arbitrary code which
    tells us nothing else about the data.


    Some natural primary keys, such as the country code, will never change, so they
    might make a good candidate. Many will change, so it’s common to rely on a separate
    surrogate key instead, which has no reason to change.


    Many database developers use all sorts of names for their primary keys, but they
    very often include a variation of `id`. In fact, `id` is often used as a loose
    synonym for the primary key.


    What really makes a primary key is adding `PRIMARY KEY` to the definition.


    There can only be one primary key in a table. However, a primary key can be compound:
    a combination of two columns instead of the usual one.


    Sometimes, the primary key is defined at the end of the `CREATE TABLE` statement:


    ```

    CREATE TABLE something (

    id INT,

    --  etc

    PRIMARY KEY (id)

    );

    ```


    There’s usually no need to define the primary key this way, but it is the only
    way to define a compound primary key.


    SQL allows you to define a new primary key after the table definition (as long
    as there isn’t one already). It also allows you to add the primary key to an existing
    column, as long as it hasn’t any `NULL`s and the existing values are unique.


    A primary key doesn’t have to be an integer. For example, it can be a carefully
    crafted string, as long as it’s guaranteed to be unique.


    If you’re feeling lazy, however, a primary key can be a simple automatic sequence
    number. Apparently, many database developers are feeling lazy, because many databases
    use an automatic sequence number for their primary key.


    The automatic sequence number wasn’t in the original SQL, so each DBMS went off
    and made up its own version. Here are some variations:


    | DBMS | Auto Sequence |

    | --- | --- |

    | PostgreSQL | `GENERATED BY DEFAULT AS IDENTITY` |

    | Oracle | `GENERATED BY DEFAULT AS IDENTITY` |

    | Microsoft SQL | `IDENTITY(1,1)` |

    | MySQL | `AUTO_INCREMENT` |

    | SQLite | `AUTOINCREMENT` |


    The SQL standard is `GENERATED BY DEFAULT AS IDENTITY`, as used by PostgreSQL
    and Oracle. Older versions of PostgreSQL used `SERIAL`, and older versions of
    Oracle didn’t have one at all and had to make do with triggers, which are a type
    of automation.


    ## Constraints


    As we mentioned, a constraint is any rule which limits what constitutes a valid
    value. Generally, if you attempt to enter a value which violates the constraint,
    the DBMS will raise an error and won’t let you.


    The DBMS doesn’t care whether the data is, in fact, correct, or even whether it
    makes sense. If you enter your place of birth in your `familyname`, good luck
    to you. All the DBMS cares about is whether the data is valid; that is, whether
    the data passes the constraints.


    The first constraint is the data type itself. If you define a column as a number,
    then you can’t put a string in it.


    Ignore the previous statement^([^(10)](#fn10)) and the next one for SQLite. It
    will allow any type of data in any column. When you define a column, you set an
    **affinity**, which is a preference, but it doesn’t force you.


    The data type also includes additional constraints such as the length of a string
    or the precision of a number.


    As well as the data type, you can get more control over the data with additional
    constraints. These constraints include


    *   `NOT NULL` which states that the column cannot be empty.


    *   `UNIQUE` which will disallow duplicate values in the column.


    *   `DEFAULT` which will automatically supply a value for a new row if a value
    wasn’t specified.


    *   `CHECK` which is a custom rule.


    *   In addition to the data type, you can get more control over the data which
    specifies that the value must match another table. This is called a **foreign
    key**.


    Here, we’ll look at these constraints in more detail.


    ### NOT NULL


    The second constraint you might encounter is `NOT NULL`. This means what it looks
    like: the data cannot be `NULL`; in other words, a value is required at all times.


    A column which may contain a value is sometimes said to be **nullable**.


    Having a nullable column doesn’t mean that you don’t actually need the value.
    For example, you can’t ship an order to a customer unless you know their address.
    Being nullable simply means that you can gather this information at a later date,
    and not necessarily immediately on adding the row.


    A column with a `NOT NULL` constraint looks something like this:


    ```

    familyname VARCHAR(24) NOT NULL

    ```


    The `NOT NULL` constraint, together with the others discussed here, can be combined
    with other constraints.


    ### UNIQUE


    There’s no reason two customers can’t have the same date of birth, but you wouldn’t
    expect them to have exactly the same email address. SQL neither knows nor cares
    about what any of this means, so you need to tell the DBMS about this yourself.


    Marking a column as `UNIQUE` causes the DBMS to ensure that a new email address
    cannot be the same as one for another customer. It doesn’t care who gets in first,
    the second one is out of luck.


    A unique column doesn’t necessarily have to have a value, unless it’s also `NOT
    NULL`. Only actual values will be compared for uniqueness, and `NULL`s are all
    ignored.


    Except for Microsoft. Microsoft has a quirk which will indeed match `NULL`s, and
    against all expectations will declare two `NULL`s to be the same, and therefore
    violate the unique constraint. Thankfully, there’s a workaround for this, but
    it does make adding a unique constraint on a nullable column just that little
    bit trickier.


    A column with a UNIQUE constraint looks something like this:


    ```

    title VARCHAR(24) CONSTRAINT uq_minipaintings_title UNIQUE

    ```


    or more simply:


    ```

    title VARCHAR(24) UNIQUE

    ```


    The first form allows you to give the unique constraint a name. Everything in
    a database, including constraints, has a distinct name. If you don’t care what
    the name is, you can use the second form and let the DBMS make one up; however,
    it may not be a pretty sight.


    The name of a constraint can be used, for example, if you ever need to remove
    it at some point in the future.


    ### DEFAULT


    Technically, this is regarded as a constraint, though you might be forgiven for
    wondering whether that’s right.


    Sometimes, you can assume a value unless contradicted. For example, you might
    assume that the number of copies of a painting should be `1`, unless another value
    is entered.


    If you want to implement a default, you can have


    ```

    quantity NOT NULL DEFAULT 1

    ```


    These are two different constraints: the first `NOT NULL` disallows `NULL`, while
    the second `DEFAULT 1` will automatically fill in the value `1` if there isn’t
    another value.


    In the sample database, this wasn’t done, which is why some `NULL`s were allowed
    to appear, and you had to use `coalesce()` to force the value.


    Sometimes, the default is a simple convenience. Sometimes, it can be used as a
    safe fallback.'
  trans: '


    ### 主键


    主键是表中每一行的唯一标识符。它不需要有特定的名称，也不一定是第一列。但如果你养成良好的设计习惯，处理起来会更容易。


    原则上，任何具有唯一值的列（例如客户的电子邮件地址）都有资格作为主键。然而，一个好的主键应具备以下特点：


    - 主键必须保证唯一。

    - 主键永远不能是 `NULL`。

    - 主键不太可能改变。


    正是最后一个特点让电子邮件地址变得有点棘手。客户有可能更改他们的电子邮件地址，虽然数据库可以处理这种情况，但这确实会降低其可靠性。


    这引出了下一点。通常，主键有两种类型：


    - 自然主键是代表真实数据的主键。例如，客户的电子邮件地址或一个国家的唯一两字母或三字母代码。

    - 代理主键没有内在价值——它是一个任意的代码，不提供关于数据的任何其他信息。


    有些自然主键，如国家代码，永远不会改变，因此可能是良好的候选。但许多自然主键会改变，因此通常依赖于一个单独的代理键，它没有理由改变。


    许多数据库开发人员为他们的主键使用各种名称，但它们通常都包含 `id` 的某种变体。实际上，`id` 经常被用作主键的宽松同义词。


    真正定义主键的是在定义中添加 `PRIMARY KEY`。


    一个表中只能有一个主键。然而，主键可以是复合的：由两列组合而成，而不是通常的一列。


    有时，主键在 `CREATE TABLE` 语句的末尾定义：


    ```

    CREATE TABLE something (

    id INT,

    --  等等

    PRIMARY KEY (id)

    );

    ```


    通常不需要以这种方式定义主键，但这是定义复合主键的唯一方式。


    SQL 允许你在表定义之后定义一个新的主键（只要还没有主键）。它还允许你向现有列添加主键，只要该列没有 `NULL` 值并且现有值是唯一的。


    主键不一定是整数。例如，它可以是一个精心构造的字符串，只要保证它是唯一的。


    然而，如果你觉得图省事，主键可以是一个简单的自动序列号。显然，许多数据库开发人员都喜欢省事，因为许多数据库使用自动序列号作为主键。


    自动序列号最初并不在标准 SQL 中，因此每个数据库管理系统（DBMS）都自行设计了各自的实现方式。以下是一些变体：


    | DBMS           | 自动序列实现方式                 |

    |----------------|----------------------------------|

    | PostgreSQL     | `GENERATED BY DEFAULT AS IDENTITY` |

    | Oracle         | `GENERATED BY DEFAULT AS IDENTITY` |

    | Microsoft SQL  | `IDENTITY(1,1)`                 |

    | MySQL          | `AUTO_INCREMENT`                |

    | SQLite         | `AUTOINCREMENT`                 |


    SQL 标准是 `GENERATED BY DEFAULT AS IDENTITY`，PostgreSQL 和 Oracle 使用的就是这个。旧版本的 PostgreSQL
    使用 `SERIAL`，而旧版本的 Oracle 则根本没有自动序列功能，只能凑合使用触发器（一种自动化机制）。


    ## 约束


    正如我们提到的，约束是任何限制有效值构成的规则。一般来说，如果你试图输入一个违反约束的值，DBMS 会引发错误并拒绝该操作。


    DBMS 并不关心数据在现实中是否正确，甚至是否合理。如果你在 `familyname`（姓氏）字段中输入你的出生地，那是你自己的事。DBMS 只关心数据是否有效；即，数据是否通过了约束检查。


    第一个约束是数据类型本身。如果你将列定义为数字，那么你就不能在其中放入字符串。


    对于 SQLite，请忽略上面这句话^(¹⁰)以及下面这句话。它允许在任何列中存放任何类型的数据。当你定义一列时，你设置的是一个“亲和性”，这是一种偏好，但它并不强制你遵守。


    数据类型还包括额外的约束，例如字符串的长度或数字的精度。


    除了数据类型之外，你还可以通过额外的约束来更好地控制数据。这些约束包括：


    - `NOT NULL`：声明该列不能为空。

    - `UNIQUE`：不允许列中出现重复值。

    - `DEFAULT`：如果未指定值，则自动为新行提供一个值。

    - `CHECK`：一条自定义规则。

    - 此外，除了数据类型，你还可以通过指定该值必须匹配另一个表中的值来获得更多控制。这被称为外键。


    在这里，我们将更详细地研究这些约束。


    ### NOT NULL


    你可能遇到的第二个约束是 `NOT NULL`。它的意思如其字面所示：数据不能是 `NULL`；换句话说，始终需要一个值。


    一个可能包含值的列有时被称为可为空的列。


    一个列可为空，并不意味着你实际上不需要这个值。例如，除非你知道客户的地址，否则无法向其发货。允许为空仅仅意味着你可以稍后收集这些信息，而不必在添加行时立即提供。


    带有 `NOT NULL` 约束的列看起来像这样：


    ```

    familyname VARCHAR(24) NOT NULL

    ```


    `NOT NULL` 约束可以与这里讨论的其他约束组合使用。


    ### UNIQUE


    没有理由两个客户不能有相同的出生日期，但你不希望他们有完全相同的电子邮件地址。SQL 既不知道也不关心这意味着什么，所以你需要自己告诉 DBMS。


    将一列标记为 `UNIQUE` 会使 DBMS 确保新的电子邮件地址不能与另一个客户的相同。它不关心谁先输入，后输入的那个会失败。


    唯一约束的列不一定必须有值，除非它同时是 `NOT NULL`。只有实际值才会被比较是否唯一，而 `NULL` 值都会被忽略。


    除了微软的产品。微软有一个怪癖，它确实会匹配 `NULL`，并且出人意料地会将两个 `NULL` 声明为相同，因此违反了唯一约束。值得庆幸的是，有一个解决方法，但这确实使得在可为空的列上添加唯一约束变得有点棘手。


    带有 UNIQUE 约束的列看起来像这样：


    ```

    title VARCHAR(24) CONSTRAINT uq_minipaintings_title UNIQUE

    ```


    或者更简单些：


    ```

    title VARCHAR(24) UNIQUE

    ```


    第一种形式允许你为唯一约束命名。数据库中的所有对象，包括约束，都有一个唯一的名称。如果你不关心名称是什么，可以使用第二种形式，让 DBMS 编造一个；不过，这个名字可能不太好看。


    约束的名称可以用于例如将来某个时候需要删除它的时候。


    ### DEFAULT


    严格来说，这被认为是一种约束，尽管你可能会怀疑这是否正确。


    有时，你可以假设一个值，除非有相反的值。例如，你可以假设一幅画的数量应该是 `1`，除非输入了另一个值。


    如果你想实现一个默认值，你可以这样写：


    ```

    quantity NOT NULL DEFAULT 1

    ```


    这是两个不同的约束：第一个 `NOT NULL` 禁止 `NULL`，而第二个 `DEFAULT 1` 将在没有其他值时自动填入值 `1`。


    在示例数据库中，没有这样做，这就是为什么允许出现一些 `NULL`，而你不得不使用 `coalesce()` 来强制赋值。


    有时，默认值只是为了方便。有时，它可以作为一个安全的后备选项。


    '
- fmt: '### CHECK


    前面的约束相当宽泛，涉及SQL数据的一些基本属性。有时，你需要一个可以被简单地视为特定于你环境的约束。这有时被称为业务规则。


    `CHECK`约束是一种通用的杂项约束，它允许你使用SQL能理解的任何内容。它的形式如下：


    ```

    CHECK (condition)

    ```


    前面的条件看起来完全像一个`WHERE`子句。本质上，它的意思是，如果你正在寻找匹配项（`WHERE …`），那么这一行就应该被包括在内。有了这个约束，所有值（当然`NULL`除外，它不是一个值）都应该匹配。


    例如：


    ```

    --  match 4 digits:

    CHECK (postcode SIMILAR TO [0-9][0-9][0-9][0-9])

    --  born date before (up to) died date:

    CHECK (born<=died)

    ```


    约束可以应用于单个列，如前面的第一个示例，但也可以应用于多个列，例如当你想比较它们时。


    ### Foreign Keys


    外键也是一种约束。在这种情况下，它要求一个表中的值必须匹配另一个表中的值。它的形式如下：


    ```

    column type REFERENCES table(column)

    ```


    每列都必须有一个数据类型，并且被引用的列必须具有完全相同的类型。你会注意到前面的形式实际上没有使用术语“foreign key”。这是简短形式，还有一个使用该术语的较长形式。


    请注意，外键是在引用其他表的表中定义的——从“子”表到“父”表——而不是相反。


    正如你从`paintings`表中看到的，外键列不一定需要有值。与所有约束一样，外键要求只适用于实际值，而不适用于`NULL`。


    如果你*也*要求一个值，你需要同时设置`NOT NULL`。你将在`sales`表中看到这一点，其中的`customerid`外键*必须*有一个有效值；以及在`saleitems`表中，`saleid`和`paintingid`列都必须有一个值；拥有一个不知道客户是谁的销售，或者一个不知道画作是什么的销售项目，都没有任何意义。另一方面，拥有一幅艺术家未知的画作是可以的。


    与所有约束一样，SQL不允许你包含无效数据。问题是，如果另一个表中的某一行被删除了，会发生什么？


    例如，如果你试图删除一个艺术家会发生什么？如果没有画作引用这个艺术家，那么我们可以继续。另一方面，如果有一些画作，那么删除将导致画作引用一个无效（不存在）的艺术家，这将违反约束。


    DBMS永远不会允许无效数据，因此有三种可能的处理方式：


    *   首先，它可以简单地禁止删除，直到你首先删除那些麻烦的画作。这是默认行为。

    *   其次，它可以允许删除，但随后自动将`painting.artistid`外键设置为`NULL`。

    *   第三，它可以允许删除，但随后自动删除那些违规的画作。这被称为`cascading`删除。


    第一种选项是默认的，如果你想要其他选项，则需要指定它们。设置`NULL`是一个相对无痛的选项，所以如果你想要的话，这里可以考虑。


    从另一个表中删除相关行是非常激烈的，并且可能是一个坏主意，尤其是在这种情况下，特别是因为画作也可能影响销售项目。


    然而，对于销售和销售项目的情况就不同了。在这里，你可能会决定删除一笔销售，例如当销售尚未完成（尚未付款）时。在这种情况下，同时删除相关的销售项目是有意义的。


    要启用级联删除，我们附加


    ```

    ON DELETE CASCADE

    ```


    当然，这又是另一个问题了，即你首先是否应该删除数据。


    ### Indexes


    通常，SQL标准不告诉DBMS如何完成其工作，并且，除其他外，它将内部存储和组织留给软件决定。


    其后果之一是，数据可能不会以任何特别有用的顺序存储；它可能以对软件来说最快、最有效的方式存储。这就是为什么除非你使用`ORDER BY`子句强制排序，否则你不能确定`SELECT`语句的结果将以什么顺序出现。


    这种安排的唯一缺点是，它使DBMS更难查找特定值，因为它可能在任何地方。


    例如，如果你按姓氏搜索客户，它可能在任何地方，DBMS可能很快找到它，也可能在几乎遍历完所有记录后才找到它。如果数据有序，查找会更快。


    另一方面，如果数据按姓氏排序，那么在按电子邮件地址查找客户时就没有帮助。


    解决方案是保留表本身，并维护一个单独的索引，这类似于书后的索引或图书馆目录。DBMS不是搜索原始表，而是搜索索引。索引将包含数据的有序副本，以及对表中行位置的引用。


    要创建索引，SQL是：


    ```

    CREATE INDEX name ON table(columns);

    ```


    每个索引都有一个名称，并定义在特定的表上，使用一个或多个列。


    在你的`SELECT`语句中，你不需要做任何不同的事情，所以你永远不需要担心它；如果存在索引并且DBMS认为值得使用，索引会被自动使用。如果表足够大，你应该会注意到搜索性能的提升。


    索引确实需要数据库中额外的一点存储空间，并且确实需要一点额外的维护来跟上表的更改。因此，你不会索引所有内容：只索引那些你认为会经常搜索的列。


    有两种类型的列你不需要索引。主键总是被索引，任何`UNIQUE`列也是如此。'
  raw: '### CHECK


    The preceding constraints are fairly broad and involve some basic properties of
    SQL data. Sometimes, you need a constraint which can be regarded simply as specific
    your environment. This is sometimes referred to as a business rule.


    The `CHECK` constraint is a general-purpose miscellaneous constraint which allows
    you to use anything which SQL understands. It takes this form:


    ```

    CHECK (condition)

    ```


    The preceding condition looks exactly like a `WHERE` clause. In essence, it means
    that if you were looking for a match (`WHERE …`), then this one should be included.
    With the constraint, all values (except `NULL`, of course, which isn’t a value)
    should match.


    For example:


    ```

    --  match 4 digits:

    CHECK (postcode SIMILAR TO [0-9][0-9][0-9][0-9])

    --  born date before (up to) died date:

    CHECK (born<=died)

    ```


    Constraints can apply to single columns as in the first example earlier, but also
    to multiple columns, such as when you want to compare them.


    ### Foreign Keys


    A foreign key is also a type of constraint. In this case, it requires that the
    value in one table must match a value in the other table. It takes this form:


    ```

    column type REFERENCES table(column)

    ```


    Each column must have a data type, and the referenced column must have exactly
    the same type. You will notice that the preceding form doesn’t actually use the
    term “foreign key.” This is the short form, and there is a longer form which does.


    Note that the foreign key is defined in the table which references the other—from
    the “child” table to the “parent” table—not the other way round.


    As you have seen from the `paintings` table, a foreign key column isn’t necessarily
    required to have a value. As with all constraints, the foreign key requirement
    only applies to actual values, not to `NULL`s.


    If you *also* require a value, you need to set `NOT NULL` as well. You’ll see
    this in the `sales` table, where the `customerid` foreign key *must* have a valid
    value, and the `saleitems` table, where both the `saleid` and `paintingid` columns
    must have a value; it wouldn’t make any sense to have a sale where you don’t know
    who the customer is, or a sale item where you don’t know what the painting is.
    On the other hand, it’s OK to have a painting with an unknown artist.


    As with all constraints, SQL won’t permit you to include invalid data. The question
    is, what happens if one of the rows in the other table is deleted?


    For example, what happens if you try to delete an artist? If there are no paintings
    referencing this artist, then we can go ahead. On the other hand, if there are
    some paintings, then the delete would result in the paintings’ referencing an
    invalid (nonexistent) artist, which would violate the constraint.


    The DBMS will never allow invalid data, so there are three possible ways of handling
    this:


    *   First, it could simply disallow the delete until you first delete the troublesome
    paintings. This is the default.


    *   Second, it could allow the delete, but then automatically set the `painting.artistid`
    foreign key to `NULL`.


    *   Third, it could allow the delete, but then automatically delete the offending
    paintings. This is called **cascading** the delete.


    The first option is the default, and the other options need to be specified if
    you want one of them. Setting `NULL` is a relatively painless option, so it’s
    a possibility here if you want it.


    Deleting related rows from the other table is pretty drastic, and probably a bad
    idea in this case, especially since the paintings may also affect the sale items.


    However, the situation is different for sales and sale items. Here, you might
    decide to delete a sale, such as when the sale hasn’t been completed (hasn’t been
    paid for). In this case, it would make sense to also delete the related sale items.


    To enable cascading the delete, we append


    ```

    ON DELETE CASCADE

    ```


    It’s another question, of course, whether you should be deleting the data in the
    first place.


    ### Indexes


    As a rule, the SQL standard doesn’t tell the DBMS how to do its job, and, among
    other things, it leaves internal storage and organization up to the software.


    One of the consequences is that data may not be stored in any particularly useful
    order; it’s probably stored in a way that’s fastest and most efficient for the
    software. That’s why you can’t be sure what order the results of a `SELECT` statement
    will come in unless you force it with an `ORDER BY` clause.


    The only downside to that arrangement is that it makes it a bit harder for the
    DBMS to look for a particular value, since it could be anywhere.


    For example, if you were searching for a customer by family name, it could have
    been anywhere, and the DBMS may find it soon, or it may find it when it’s nearly
    gone through all of them. It would be faster if the data were in order.


    On the other hand, if the data is in family name order, it wouldn’t help in looking
    for a customer by email address.


    The solution is to leave the table alone and maintain a separate index, which
    is similar to an index in the back of a book or to a library catalog. Instead
    of searching through the original table, the DBMS searches through the index.
    The index will have a copy of the data in order, as well as a reference to where
    the row is in the table.


    To create an index, the SQL is


    ```

    CREATE INDEX name ON table(columns);

    ```


    Each index has a name and is defined on a particular table, using one or more
    columns.


    In your `SELECT` statement, you don’t do anything different, so you need never
    worry about it; the index is used automatically if there is one and if the DBMS
    thinks it’s worth using. If the table is large enough, you should notice an improvement
    in searching.


    Indexes do require a little extra storage in the database and do require a little
    extra maintenance to keep up with changes to the table. For that reason, you don’t
    index everything: just the columns you think you’ll want to search often enough.


    There are two types of column you don’t bother indexing. The primary key is always
    indexed and so are any `UNIQUE` columns.'
  trans: '

    ### CHECK


    前面的约束相当宽泛，涉及 SQL 数据的一些基本属性。有时，你需要一个可以被简单地视为特定于你环境的约束。这有时被称为业务规则。


    `CHECK`约束是一种通用的杂项约束，它允许你使用 SQL 能理解的任何内容。它的形式如下：


    ```

    CHECK (condition)

    ```


    前面的条件看起来完全像一个`WHERE`子句。本质上，它的意思是，如果你正在寻找匹配项（`WHERE …`），那么这一行就应该被包括在内。有了这个约束，所有值（当然`NULL`除外，它不是一个值）都应该匹配。


    例如：


    ```

    -- 匹配 4 位数字：

    CHECK (postcode SIMILAR TO [0-9][0-9][0-9][0-9])

    -- 出生日期不晚于（最晚等于）死亡日期：

    CHECK (born<=died)

    ```


    约束可以应用于单个列，如前面的第一个示例，但也可以应用于多个列，例如当你想比较它们时。


    ### 外键


    外键也是一种约束。在这种情况下，它要求一个表中的值必须匹配另一个表中的值。它的形式如下：


    ```

    column type REFERENCES table(column)

    ```


    每列都必须有一个数据类型，并且被引用的列必须具有完全相同的类型。你会注意到前面的形式实际上没有使用术语“foreign key”。这是简短形式，还有一个使用该术语的较长形式。


    请注意，外键是在引用其他表的表中定义的——从“子”表到“父”表——而不是相反。


    正如你从`paintings`表中看到的，外键列不一定需要有值。与所有约束一样，外键要求只适用于实际值，而不适用于`NULL`。


    如果你*也*要求一个值，你需要同时设置`NOT NULL`。你将在`sales`表中看到这一点，其中的`customerid`外键*必须*有一个有效值；以及在`saleitems`表中，`saleid`和`paintingid`列都必须有一个值；拥有一个不知道客户是谁的销售，或者一个不知道画作是什么的销售项目，都没有任何意义。另一方面，拥有一幅艺术家未知的画作是可以的。


    与所有约束一样，SQL 不允许你包含无效数据。问题是，如果另一个表中的某一行被删除了，会发生什么？


    例如，如果你试图删除一个艺术家会发生什么？如果没有画作引用这个艺术家，那么我们可以继续。另一方面，如果有一些画作，那么删除将导致画作引用一个无效（不存在）的艺术家，这将违反约束。


    DBMS 永远不会允许无效数据，因此有三种可能的处理方式：


    *   首先，它可以简单地禁止删除，直到你首先删除那些麻烦的画作。这是默认行为。

    *   其次，它可以允许删除，但随后自动将`painting.artistid`外键设置为`NULL`。

    *   第三，它可以允许删除，但随后自动删除那些违规的画作。这被称为`cascading`删除。


    第一种选项是默认的，如果你想要其他选项，则需要指定它们。设置`NULL`是一个相对无痛的选项，所以如果你想要的话，这里可以考虑。


    从另一个表中删除相关行是非常激烈的，并且可能是一个坏主意，尤其是在这种情况下，特别是因为画作也可能影响销售项目。


    然而，对于销售和销售项目的情况就不同了。在这里，你可能会决定删除一笔销售，例如当销售尚未完成（尚未付款）时。在这种情况下，同时删除相关的销售项目是有意义的。


    要启用级联删除，我们附加


    ```

    ON DELETE CASCADE

    ```


    当然，这又是另一个问题了，即你首先是否应该删除数据。


    ### 索引


    通常，SQL 标准不告诉 DBMS 如何完成其工作，并且，除其他外，它将内部存储和组织留给软件决定。


    其后果之一是，数据可能不会以任何特别有用的顺序存储；它可能以对软件来说最快、最有效的方式存储。这就是为什么除非你使用`ORDER BY`子句强制排序，否则你不能确定`SELECT`语句的结果将以什么顺序出现。


    这种安排的唯一缺点是，它使 DBMS 更难查找特定值，因为它可能在任何地方。


    例如，如果你按姓氏搜索客户，它可能在任何地方，DBMS 可能很快找到它，也可能在几乎遍历完所有记录后才找到它。如果数据有序，查找会更快。


    另一方面，如果数据按姓氏排序，那么在按电子邮件地址查找客户时就没有帮助。


    解决方案是保留表本身，并维护一个单独的索引，这类似于书后的索引或图书馆目录。DBMS 不是搜索原始表，而是搜索索引。索引将包含数据的有序副本，以及对表中行位置的引用。


    要创建索引，SQL 是：


    ```

    CREATE INDEX name ON table(columns);

    ```


    每个索引都有一个名称，并定义在特定的表上，使用一个或多个列。


    在你的`SELECT`语句中，你不需要做任何不同的事情，所以你永远不需要担心它；如果存在索引并且 DBMS 认为值得使用，索引会被自动使用。如果表足够大，你应该会注意到搜索性能的提升。


    索引确实需要数据库中额外的一点存储空间，并且确实需要一点额外的维护来跟上表的更改。因此，你不会索引所有内容：只索引那些你认为会经常搜索的列。


    有两种类型的列你不需要索引。主键总是被索引，任何`UNIQUE`列也是如此。

