- fmt: "## Summarizing Numbers\n\nWhen it comes to numbers, there are additional aggregate\
    \ functions which are useful:\n\n```\nSELECT\ncount(height) as heights,\nsum(height)\
    \ AS total,\navg(height) AS average,\nsum(height)/count(height) AS computed_average\n\
    FROM customers;\n```\n\nThis gives some statistical results:\n\n| heights | total\
    \ | average | computed_average |\n| --- | --- | --- | --- |\n| 248 | 42242.3 |\
    \ 170.332 | 170.332 |\n\nThe `sum()` function adds all the values in the column,\
    \ and the `avg()` function calculates the average of the values. In the preceding\
    \ example, the average is also calculated using the `sum/count` formula, and you\
    \ see that it gives the same result; in principle, the `avg()` function is just\
    \ a convenience.\n\nNote that all of the preceding aggregate functions only use\
    \ actual values, and, as always, `NULL` is skipped. You won’t see any difference\
    \ with `sum()`, but it is very important to note that the average is only calculated\
    \ over the number of values, not the number of rows. If you had foolishly entered\
    \ `0` for missing heights, they would have been included and drastically reduced\
    \ the average.\n\nYou can see the results of this error either by dividing by\
    \ the total number of rows or by coalescing the `NULL`s to `0`:\n\n```\nSELECT\n\
    count(height) as heights,\nsum(height) AS total,\navg(height) AS average,\nsum(height)/count(height)\
    \ AS computed_average,\nsum(height)/count(*) AS not_ca,\navg(coalesce(height,0))\
    \ AS not_ca_again\nFROM customers;\n```\n\nWe now get some misleading values:\n\
    \n| heights | total | average | computed_average | not_ca | not_ca_again |\n|\
    \ --- | --- | --- | --- | --- | --- |\n| 248 | 42242.3 | 170.332 | 170.332 | 138.955\
    \ | 138.955 |\n\nIn the preceding query\n\n*   The expression `sum(height)/count(*)`\
    \ divides the total height by the number of rows, not the number of heights, so\
    \ the result will be much too low.\n*   The expression `coalesce(height,0)` substitutes\
    \ the `NULL`s with a `0`; these zeroes will be added, making no difference, but,\
    \ again, you will be dividing by too many.\n\nIf you are statistically minded,\
    \ you can also compute the standard deviation:\n\n```\n--  Not SQLite\nSELECT\n\
    count(height) as heights,\nsum(height) AS total,\navg(height) AS average,\nstddev(height)\
    \ AS sd    --  MSSQL: stdev(height)\nFROM customers;\n```\n\nNow we have some\
    \ more comprehensive statistics.\n\n| heights | total | average | sd |\n| ---\
    \ | --- | --- | --- |\n| 248 | 42242.3 | 170.332 | 6.926 |\n\nNote that none of\
    \ these functions works if the data you are aggregating is not numeric.\n\n###\
    \ Bad Examples\n\nThere are some things you should *never* do with aggregate functions,\
    \ even if SQL allows you.\n\nHere is a statement which will work:\n\n```\n-- \
    \ Don't do any of this:\nSELECT\nsum(id) AS total_id,\nsum(year) AS total_year,\n\
    sum(price) AS total_price\nFROM paintings;\n```\n\nYou will get a result, but\
    \ you’ll regret it:\n\n| total_id | total_year | total_price |\n| --- | --- |\
    \ --- |\n| 1619593 | 1906235 | 168995 |\n\nSQL is somewhat naive when it comes\
    \ to numbers. All three columns summed earlier are numbers, and SQL will happily\
    \ add them as instructed. However, some numbers should never be treated that way.\n\
    \nFirst, some numbers aren’t really used as numbers. The most important feature\
    \ of a true number is that it *counts* something. The customer `height` counts\
    \ centimeters, and the sales total counts dollars.\n\nThe `id` is a number, but\
    \ it’s not used for counting. Instead, it is used for *sequencing*, and any other\
    \ sequence, such as the alphabet, might have done. Clearly, adding `id`s is meaningless,\
    \ and the reason is that you shouldn’t add sequences.\n\nThe `year` is also used\
    \ as a sequence. It does count the number of years since BC, but here it is not\
    \ used that way, and again it is meaningless to add the years.\n\nThe `price`\
    \ is more subtle. It is indeed being used to count the number of dollars, but\
    \ it doesn’t actually represent a fixed value. Instead, it is the number of dollars\
    \ *per copy*. Effectively, it is an average, and you will need to multiply it\
    \ by the number of copies before you have a fixed value you can add.\n\nThe `price`\
    \ is an example where the name may be misleading. Perhaps it should have been\
    \ called `price_per_copy` to make the point clearer. On the other hand, `price`\
    \ is a simpler name. The point is, you will all too often encounter examples of\
    \ table or column names which you need to work around.\n\n### Scales of Measurement\n\
    \nStatisticians sometimes talk about different uses of numbers. They’re all numbers,\
    \ technically, but how they’re used will affect what you can do with them.\n\n\
    The following types are often referred to as `Scales of Measurement`:\n\n*   Nominal:\
    \ Nominal numbers are used simply as code, with no numeric significance at all.\
    \ For example:\n    *   Phone “numbers” are simply codes, but they don’t actually\
    \ measure anything.\n    *   You might assign a number to a category, such as\
    \ type of artwork, but there’s no significance in either the value or the sort\
    \ order.\n\n*   Ordinal: Ordinal numbers can be ordered, but there is no significance\
    \ in the actual magnitude. For example:\n    *   Ranking, where the position is\
    \ significant, but the distance between values is insignificant\n    *   Scales,\
    \ such as opinions which range from good to bad\n\nThe `id`, which is used in\
    \ the sample database for primary keys, would be in either the Nominal or Ordinal\
    \ category, depending on whether you regard the sequence as significant.\n\n*\
    \   Interval: The difference between numbers has meaning, but there is no fixed\
    \ zero. For example:\n    *   Distance from a fixed point (which is arbitrary)\n\
    \    *   The year of an event (which is arbitrarily measured from the nonexistent\
    \ year 0 AD)\n    Note that there is no meaning in *adding* these numbers, but\
    \ you can *subtract* them to get an interval between.\n\n*   Ratio: With these\
    \ numbers, there is a true zero, so magnitudes are significant. For example:\n\
    \    *   Total cost of a sale\n    *   Height of a person\n\nOnly the last type\
    \ of number can be added."
