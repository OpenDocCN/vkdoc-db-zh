- fmt: '# Date Formatting in MariaDB/MySQL


    For MariaDB/MySQL, there is the `date_format()` function:


    ```sql

    WITH vars AS (

    SELECT timestamp ''1969-07-20 20:17:40'' AS moonshot

    )

    SELECT

    moonshot,

    date_format(moonshot,''%W, %D %M %Y'') AS fulldate,

    date_format(moonshot,''%a %d %b %Y'') AS shortdate

    FROM vars;

    ```


    You can learn more about the format codes at


    *   MariaDB: [https://mariadb.com/kb/en/date_format/](https://mariadb.com/kb/en/date_format/)

    *   MySQL: [https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html](https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html)


    # Date Formatting in Microsoft SQL Server


    The `format()` function in Microsoft SQL can also be used for dates. For example:


    ```sql

    WITH vars AS (

    SELECT cast(''1969-07-20 20:17:40'' AS datetime)

    AS moonshot

    )

    SELECT

    format(moonshot,''dddd, d MMMM yyy'') AS fulldate,

    format(moonshot,''ddd d MMM yyy'') AS shortdate

    FROM vars;

    ```


    You can learn more about the various date format codes at


    [https://learn.microsoft.com/en-us/dotnet/standard/base-types/custom-date-and-time-format-strings](https://learn.microsoft.com/en-us/dotnet/standard/base-types/custom-date-and-time-format-strings)


    # Using a Formatted Date for Grouping by Month


    Sometimes, you need to take a fine-grained date/time and analyze it in larger
    groups. One *very* useful date format is something like `yyyy-mm`, which is a
    truncated form.


    For example:


    ```sql

    --  PostgreSQL, Oracle

    SELECT id, ordered, to_char(ordered,''YYYY-MM'') AS month

    FROM sales;

    --  MariaDB / MySQL

    SELECT id, ordered, date_format(ordered,''%Y-%m'') AS month

    FROM sales;

    --  MSSQL

    SELECT id, ordered, format(ordered,''yyyy-MM'') AS month

    FROM sales;

    --  SQLite

    SELECT id, ordered, strftime(''%Y-%m'',ordered) AS month

    FROM sales;

    ```


    The results look something like this:


    | id | ordered | month |

    | --- | --- | --- |

    | 52 | 2022-03-07 16:10:45.739071 | 2022-03 |

    | 54 | 2022-03-08 00:23:39.53316 | 2022-03 |

    | 55 | 2022-03-08 06:23:28.387395 | 2022-03 |

    | 57 | 2022-03-09 00:02:29.974004 | 2022-03 |

    | 59 | 2022-03-09 06:26:24.808237 | 2022-03 |

    | 60 | 2022-03-09 15:01:05.592177 | 2022-03 |

    |  ~ 2509 rows |


    A date string in this format will sort correctly since the results are the same
    length and start with the larger part.


    You’ll learn about grouping data later.


    # Using a Formatted Date for Grouping by Weekday


    You can also use the same technique for extracting the weekday name. For example:


    ```sql

    --  PostgreSQL, Oracle

    SELECT

    id, ordered,

    to_char(ordered,''Dy'') AS weekday    --    or ''Day''

    FROM sales;

    --  MariaDB / MySQL

    SELECT

    id, ordered,

    date_format(ordered,''%a'') AS weekday    --  or ''%W''

    FROM sales;

    --  MSSQL

    SELECT

    id, ordered,

    format(ordered,''ddd'') AS weekday        --  or ''dddd''

    FROM sales;

    ```


    This gives you the following:


    | id | ordered | weekday |

    | --- | --- | --- |

    | 52 | 2022-03-07 16:10:45.739071 | Mon |

    | 54 | 2022-03-08 00:23:39.53316 | Tue |

    | 55 | 2022-03-08 06:23:28.387395 | Tue |

    | 57 | 2022-03-09 00:02:29.974004 | Wed |

    | 59 | 2022-03-09 06:26:24.808237 | Wed |

    | 60 | 2022-03-09 15:01:05.592177 | Wed |

    |  ~ 2509 rows |


    SQLite doesn’t have a simple way to generate the day name. In any case, you can
    always group by the weekday number.


    Remember that if you need to sort by weekday, you’ll need the special nonalphabetical
    sorting technique mentioned in Chapter [4](#601766_1_En_4_Chapter.xhtml).


    # Strings


    A string is simply a series of characters. In SQL, it is normally described as
    `character` data, and you will see it defined as `CHAR` (fixed length) or `VARCHAR`
    (varying length).


    On the inside, each character is stored as a number. Exactly what this number
    is may vary. Historically, strings are stored using `ASCII`, which is a single-byte
    character code. For example, the letter `A` is stored as the number 65.


    Because `ASCII` is single byte, it is limited in character range. If you need
    characters outside the most basic range, you would need to vary it, such as using
    extra bits in the byte or switching to an alternative character set.


    Modern DBMSs can use `Unicode`, which can be used for all languages and special
    characters. For traditional `ASCII` characters, the code number is the same, but
    `Unicode` can use multibyte codes to extend the range, giving each character its
    own unique code without having to compete with others.


    Some DBMSs always use `Unicode`, while some use `ASCII` unless otherwise specified.
    The sample database uses `Unicode`, but that’s not really important for now. What
    follows will work the same way for either.


    There’s not much you can do with a string directly. One thing you can do is join
    it to another string:


    ```sql

    SELECT ''abc'' || ''def'';  --  Standard

    SELECT ''abc'' + ''def'';   --  MSSQL Only

    ```


    The technical term for this is concatenation.


    If you try this in MySQL/MariaDB, it may not work. In traditional mode, MySQL/MariaDB
    treats the `||` operator as a logical operator; in ANSI mode, it should work.
    If you are stuck in traditional mode, you will need a different approach.


    There is a common, though non-standard, function called `concat()`:


    ```sql

    SELECT concat(''abc'',''def''); --  Not SQLite

    ```


    The `concat()` function is not available with SQLite, but it is available with
    MySQL/MariaDB along with PostgreSQL, MSSQL, and Oracle. If you’re running MySQL/MariaDB
    in traditional mode, it’s the only way to concatenate strings.


    Of course, if you are using MySQL/MariaDB, you can always switch to ANSI mode.


    Apart from concatenation, SQL includes a collection of functions that work with
    strings. Broadly, they fall into two categories:


    *   Character functions: Functions which extract some part of the string or which
    change some of the characters in the string

    *   Formatting functions: Functions which convert from numbers and dates to formatted
    strings


    The problem is that different DBMSs have their own string functions, so you’ll
    see a lot of variation in what follows. This is not meant to be a dictionary of
    all of the available functions, but will give you a taste of what you can do with
    string functions in your DBMS.


    ## Character Functions


    Generally, SQL includes functions to perform the following operations:


    *   Length: Find the length of a string

    *   Replace: Replace part of a string with another string

    *   Find: Find a character or substring within a string

    *   Trim: Remove leading or trailing spaces

    *   Change case: Change between upper and lower case

    *   Substrings: Return part of the string


    Here is an overview of these operations.


    ### String Length


    The length of a string is the number of characters in the string. To find the
    length, you can use


    ```sql

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle

    SELECT length(''abcde'');

    --  MSSQL

    SELECT len(''abcde'');

    ```


    A length of 0 means that it’s an empty string.


    Note that the number of characters is not necessarily the number of bytes. If
    the strings are in `Unicode`, characters can take two or more bytes.


    ### Searching for a Substring


    To find where part of a string is, you can use the following:


    ```sql

    --  MySQL/MariaDB, SQLite, Oracle: INSTR(''values'',value)

    SELECT instr(''abcdefghijklmnop'',''m'');

    --  PostgreSQL: POSITION(value IN ''values'')

    SELECT position(''m'' in ''abcdefghijklmnop'')

    --  MSSQL: CHARINDEX(value, ''values'')

    SELECT charindex(''m'',''abcdefghijklmnop'');

    ```


    In all cases, if the substring can’t be found, the result will be `0`.


    Although the examples search for a single character, you can also search for a
    multicharacter substring, in which you will get the position of the substring.


    This is part of the technique we used to sort a string in nonalphabetical order.


    ### Replace


    You can use `replace` to replace substrings in a string:


    ```sql

    --  replace(original,search,replace)

    SELECT replace(''text with spaces'','' '',''-'')

    ```


    Note that whether the search substring matches upper and lower case depends on
    the database collation, as with the `WHERE` clause.'
  raw: '#### Date Formatting in MariaDB/MySQL


    For MariaDB/MySQL, there is the `date_format()` function:


    ```

    WITH vars AS (

    SELECT timestamp ''1969-07-20 20:17:40'' AS moonshot

    )

    SELECT

    moonshot,

    date_format(moonshot,''%W, %D %M %Y'') AS fulldate,

    date_format(moonshot,''%a %d %b %Y'') AS shortdate

    FROM vars;

    ```


    You can learn more about the format codes at


    *   MariaDB: [`https://mariadb.com/kb/en/date_format/`](https://mariadb.com/kb/en/date_format/)


    *   MySQL: [`https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html`](https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html)


    #### Date Formatting in Microsoft SQL Server


    The `format()` function in Microsoft SQL can also be used for dates. For example:


    ```

    WITH vars AS (

    SELECT cast(''1969-07-20 20:17:40'' AS datetime)

    AS moonshot

    )

    SELECT

    format(moonshot,''dddd, d MMMM yyy'') AS fulldate,

    format(moonshot,''ddd d MMM yyy'') AS shortdate

    FROM vars;

    ```


    You can learn more about the various date format codes at


    [`https://learn.microsoft.com/en-us/dotnet/standard/base-types/custom-date-and-time-format-strings`](https://learn.microsoft.com/en-us/dotnet/standard/base-types/custom-date-and-time-format-strings)


    #### Using a Formatted Date for Grouping by Month


    Sometimes, you need to take a fine-grained date/time and analyze it in larger
    groups. One *very* useful date format is something like `yyyy-mm`, which is a
    truncated form.


    For example:


    ```

    --  PostgreSQL, Oracle

    SELECT id, ordered, to_char(ordered,''YYYY-MM'') AS month

    FROM sales;

    --  MariaDB / MySQL

    SELECT id, ordered, date_format(ordered,''%Y-%m'') AS month

    FROM sales;

    --  MSSQL

    SELECT id, ordered, format(ordered,''yyyy-MM'') AS month

    FROM sales;

    --  SQLite

    SELECT id, ordered, strftime(''%Y-%m'',ordered) AS month

    FROM sales;

    ```


    The results look something like this:


    | id | ordered | month |

    | --- | --- | --- |

    | 52 | 2022-03-07 16:10:45.739071 | 2022-03 |

    | 54 | 2022-03-08 00:23:39.53316 | 2022-03 |

    | 55 | 2022-03-08 06:23:28.387395 | 2022-03 |

    | 57 | 2022-03-09 00:02:29.974004 | 2022-03 |

    | 59 | 2022-03-09 06:26:24.808237 | 2022-03 |

    | 60 | 2022-03-09 15:01:05.592177 | 2022-03 |

    |  ~ 2509 rows |


    A date string in this format will sort correctly since the results are the same
    length and start with the larger part.


    You’ll learn about grouping data later.


    #### Using a Formatted Date for Grouping by Weekday


    You can also use the same technique for extracting the weekday name. For example:


    ```

    --  PostgreSQL, Oracle

    SELECT

    id, ordered,

    to_char(ordered,''Dy'') AS weekday    --    or ''Day''

    FROM sales;

    --  MariaDB / MySQL

    SELECT

    id, ordered,

    date_format(ordered,''%a'') AS weekday    --  or ''%W''

    FROM sales;

    --  MSSQL

    SELECT

    id, ordered,

    format(ordered,''ddd'') AS weekday        --  or ''dddd''

    FROM sales;

    ```


    This gives you the following:


    | id | ordered | weekday |

    | --- | --- | --- |

    | 52 | 2022-03-07 16:10:45.739071 | Mon |

    | 54 | 2022-03-08 00:23:39.53316 | Tue |

    | 55 | 2022-03-08 06:23:28.387395 | Tue |

    | 57 | 2022-03-09 00:02:29.974004 | Wed |

    | 59 | 2022-03-09 06:26:24.808237 | Wed |

    | 60 | 2022-03-09 15:01:05.592177 | Wed |

    |  ~ 2509 rows |


    SQLite doesn’t have a simple way to generate the day name. In any case, you can
    always group by the weekday number.


    Remember that if you need to sort by weekday, you’ll need the special nonalphabetical
    sorting technique mentioned in Chapter [4](#601766_1_En_4_Chapter.xhtml).


    ## Strings


    A string is simply a series of characters. In SQL, it is normally described as
    **character** data, and you will see it defined as `CHAR` (fixed length) or `VARCHAR`
    (varying length).


    On the inside, each character is stored as a number. Exactly what this number
    is may vary. Historically, strings are stored using **ASCII**, which is a single-byte
    character code. For example, the letter `A` is stored as the number 65.


    Because ASCII is single byte, it is limited in character range. If you need characters
    outside the most basic range, you would need to vary it, such as using extra bits
    in the byte or switching to an alternative character set.


    Modern DBMSs can use **Unicode**, which can be used for all languages and special
    characters. For traditional ASCII characters, the code number is the same, but
    Unicode can use multibyte codes to extend the range, giving each character its
    own unique code without having to compete with others.


    Some DBMSs always use Unicode, while some use ASCII unless otherwise specified.
    The sample database uses Unicode, but that’s not really important for now. What
    follows will work the same way for either.


    There’s not much you can do with a string directly. One thing you can do is join
    it to another string:


    ```

    SELECT ''abc'' || ''def'';  --  Standard

    SELECT ''abc'' + ''def'';   --  MSSQL Only

    ```


    The technical term for this is concatenation.


    If you try this in MySQL/MariaDB, it may not work. In traditional mode, MySQL/MariaDB
    treats the `||` operator as a logical operator; in ANSI mode, it should work.
    If you are stuck in traditional mode, you will need a different approach.


    There is a common, though non-standard, function called `concat()`:


    ```

    SELECT concat(''abc'',''def''); --  Not SQLite

    ```


    The `concat()` function is not available with SQLite, but it is available with
    MySQL/MariaDB along with PostgreSQL, MSSQL, and Oracle. If you’re running MySQL/MariaDB
    in traditional mode, it’s the only way to concatenate strings.


    Of course, if you are using MySQL/MariaDB, you can always switch to ANSI mode.


    Apart from concatenation, SQL includes a collection of functions that work with
    strings. Broadly, they fall into two categories:


    *   Character functions: Functions which extract some part of the string or which
    change some of the characters in the string


    *   Formatting functions: Functions which convert from numbers and dates to formatted
    strings


    The problem is that different DBMSs have their own string functions, so you’ll
    see a lot of variation in what follows. This is not meant to be a dictionary of
    all of the available functions, but will give you a taste of what you can do with
    string functions in your DBMS.


    ### Character Functions


    Generally, SQL includes functions to perform the following operations:


    *   Length: Find the length of a string


    *   Replace: Replace part of a string with another string


    *   Find: Find a character or substring within a string


    *   Trim: Remove leading or trailing spaces


    *   Change case: Change between upper and lower case


    *   Substrings: Return part of the string


    Here is an overview of these operations.


    #### String Length


    The length of a string is the number of characters in the string. To find the
    length, you can use


    ```

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle

    SELECT length(''abcde'');

    --  MSSQL

    SELECT len(''abcde'');

    ```


    A length of 0 means that it’s an empty string.


    Note that the number of characters is not necessarily the number of bytes. If
    the strings are in Unicode, characters can take two or more bytes.


    #### Searching for a Substring


    To find where part of a string is, you can use the following:


    ```

    --  MySQL/MariaDB, SQLite, Oracle: INSTR(''values'',value)

    SELECT instr(''abcdefghijklmnop'',''m'');

    --  PostgreSQL: POSITION(value IN ''values'')

    SELECT position(''m'' in ''abcdefghijklmnop'')

    --  MSSQL: CHARINDEX(value, ''values'')

    SELECT charindex(''m'',''abcdefghijklmnop'');

    ```


    In all cases, if the substring can’t be found, the result will be `0`.


    Although the examples search for a single character, you can also search for a
    multicharacter substring, in which you will get the position of the substring.


    This is part of the technique we used to sort a string in nonalphabetical order.


    #### Replace


    You can use `replace` to replace substrings in a string:


    ```

    --  replace(original,search,replace)

    SELECT replace(''text with spaces'','' '',''-'')

    ```


    Note that whether the search substring matches upper and lower case depends on
    the database collation, as with the `WHERE` clause.'
