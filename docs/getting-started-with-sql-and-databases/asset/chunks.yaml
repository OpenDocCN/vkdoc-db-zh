  trans: '#### 更复杂的关系


    在示例数据库中，我们有画作，也有顾客。我们还需要管理画作销售给顾客的业务。


    顾客与画作之间的关系比画作与艺术家之间的关系更复杂。一幅画作只能有一位艺术家，而顾客可以购买多幅画作，并且多位顾客可以购买同一幅画作。


    显然，多位顾客实际上购买的并非**相同的**物品，而仅仅是复制品。实际上，你完全可能有多位顾客**串行地**购买同一件物品，即一个接一个地购买，就像古董或房产交易一样。借阅也是如此：一旦物品被归还，多位借阅者就可以借阅同一件物品。


    为了管理销售，你将需要额外的一两个专门用于销售的表。


    如果销售的性质足够简单，你可以用一张表来管理。例如，如果你从事房地产行业，你可以有一张房产表和一张用于管理销售的单一表，如图 2-3 所示。


    ![](img/601766_1_En_2_Fig3_HTML.jpg)


    该关系数据库包含三张表：`Customers`、`sales` 和 `Properties`，通过主键和外键连接。其中，`Customers` 表存储客户信息，包括
    `ID`、`email`、`family name`、`given name`；而 `Properties` 表存储房产详情，如 `ID`、`address`、`price`、`details`，以及用于关联表的
    `customer ID` 和 `sale date`。


    图 2-3


    房产销售


    由于你一次只销售一处房产，你可以在一个简单的 `sales` 表中管理交易。该表记录了哪位客户购买了哪处房产，以及相关的其他数据，如日期和金额。


    如果客户要实际购买两处房产，他们会很乐意将其作为两笔交易来处理。


    你可以将相同的设计用于，比如说，汽车租赁，其中大多数客户一次只租一辆车。


    对于较小的物品，如画作，顾客很可能一次购买多件物品，并可能购买多件复制品。在这种情况下，进行多次销售交易会很麻烦，你需要一个更巧妙的方法。这里，你将需要*两张*表，如图
    2-4 所示。


    ![](img/601766_1_En_2_Fig4_HTML.jpg)


    该关系数据库包含 4 张表：`customers`、`cart`、`products` 和 `cart items`。这些表包含诸如 `customer ID`、`name`、`address`、`email`、`product
    details`、`quantity`、`price` 等各种属性的列。


    图 2-4


    购物车


    你可能有过在互联网上购买多件物品的经历。通常，你的购买是以购物车的形式呈现，其中包含一个或多个购物车项目。即使你只购买了一件物品的一份副本，情况也是如此。


    为了在数据库中管理购买行为，你有一张购物车表，每张购物车通过一个外键与一位客户关联。最终的细节，如 `checkout date`、`total price`
    以及 `payment` 和 `delivery methods`，都将存储在此表中。


    购买的每件产品将存储在第二张项目表中。这张表有两个外键。一个与购物车关联，而购物车又与一位客户关联。另一个与产品表关联。你可以将购物车视为购物车项目的*容器*。


    每当需要在单次交易中管理多个项目时，都会使用相同的结构。这包括多个图书馆借阅项目，或者在我们的示例数据库中，多个销售项目。


    ### 总结


    数据库是不同表的集合。每张表是相关数据的集合。


    在设计良好的表中，每个数据项都有唯一正确的存放位置。


    #### 术语


    关于数据库本身


    *   `database`（数据库）是数据的完整集合。

    *   `DBMS` 或 `Database Management System`（数据库管理系统）是管理数据的软件。

    *   `SQL` 或 `Structured Query Language`（结构化查询语言）是用于与数据库通信的语言。


    关于数据项


    *   将数据视为占位符，而值（value）则是占位符的内容。


    SQL 使用表的语言。对于每张表


    *   `row`（行）是表中数据的一个实例，例如一个客户或一本书。

    *   `column`（列）是行的细节，例如名称。


    #### 规范化的表


    SQL 表需要组织得遵循某些规则，以使数据尽可能简单和可靠。


    *   数据是原子的

    *   列是独立的

    *   列是单一类型的

    *   行是无序的

    *   行是唯一的

    *   行是独立的

    *   列名是唯一的

    *   列是无序的


    #### 多值


    数据库表不应在单个列中存储多个值。管理多个值需要一张额外的表，并引用回原始表。


    ### 后续内容


    现在你对示例数据库的设计方式及其原因有了概念。在现实生活中，并非所有工作数据库都完全遵循这些原则构建，有些数据库确实非常随意。关键在于，你偏离这些原则越远，使用数据库的难度就越大。


    下一章将聚焦于一个简单的概念：如何从一张表中选择*某些*行，即如何用 `WHERE` 子句*过滤*表。


    脚注 1 2


    # 3. 数据过滤


    `DBMS` 的主要作用之一是存储数据。另一个主要作用是检索数据。要检索数据，你使用 `SELECT` 语句。然而，你通常不想要所有数据，因此你会希望过滤结果。


    在本章中，我们将探讨如何使用 `WHERE` 子句过滤你的请求。在此过程中，我们将涵盖重要主题，例如


    *   `WHERE` 子句如何工作

    *   处理缺失值

    *   处理不同的数据类型：数字、字符串和日期

    *   组合过滤器

    *   使用“通配符”


    如果你有百万行数据，你通常不希望得到百万行的结果。稍后，我们将研究如何汇总大量数据。现在，我们将看看如何获取*部分*数据。'
- fmt: '# The WHERE Clause


    The `WHERE` clause is used to limit the results to certain criteria. For example,
    if you want to limit customers to shorter customers, you can use


    ```sql

    SELECT *

    FROM customers

    WHERE height<170;

    ```


    You should see something like this:


    | id | familyname | givenname | … | height | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 186 | Gunn | Ray | … | 163.8 | … | 2021-11-15 |

    | 523 | Sights | Seymour | … | 167.3 | … | 2022-07-11 |

    | 351 | Tate | Dick | … | 167.8 | … | 2022-03-13 |

    | 422 | Why | Wanda | … | 163.2 | … | 2022-05-05 |

    | 121 | Ting | Lil | … | 162.8 | … | 2021-10-06 |

    | 545 | Knife | Jack | … | 167.4 | … | 2022-07-24 |

    | ~ 116 rows ~ |


    The `WHERE` clause is followed by an **assertion**—a test which is either true
    or false. In this case, the test is `height<170`, and only the rows where this
    is true are returned.


    For simple comparisons like this, you use the classic operators that you learned
    at school. There’s a table of them a little bit later.


    You can reverse the assertion by using the `NOT` operator:


    ```sql

    SELECT *

    FROM customers

    WHERE NOT height<170;

    ```


    This will return only those rows where the height is *not* less than 170.


    | id | familyname | givenname | … | height | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 144 | King | Ray | … | 176.8 | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | 170.3 | … | 2021-11-08 |

    | 475 | Blood | Drew | … | 171.0 | … | 2022-06-13 |

    | 341 | Idate | Val | … | 177.1 | … | 2022-03-03 |

    | 588 | Skies | Grace | … | 171.5 | … | 2022-08-13 |

    | 326 | Todeath | Boris | … | 186.3 | … | 2022-02-15 |

    | ~ 132 rows ~ |


    In many cases, the `NOT` has an alternative expression:


    ```sql

    SELECT *

    FROM customers

    WHERE height >= 170;    --  or height>=170

    ```


    The spaces around `>=` are not necessary; they are there to make it more obvious.


    Similarly, you can test for matches:


    ```sql

    SELECT *

    FROM customers

    WHERE height=170;

    ```


    There won’t be many:


    | id | familyname | givenname | … | height | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 118 | Barrow | Will | … | 170.0 | … | 2021-10-04 |

    | 15 | Second | Millie | … | 170.0 | … | 2021-07-22 |


    Or you can test for nonmatches:


    ```sql

    SELECT *

    FROM customers

    WHERE height170;

    SELECT *

    FROM customers

    WHERE NOT height=170

    ```


    This gives the others:


    | id | familyname | givenname | … | height | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 186 | Gunn | Ray | … | 163.8 | … | 2021-11-15 |

    | 144 | King | Ray | … | 176.8 | … | 2021-10-18 |

    | 179 | Inkling | Ivan | … | 170.3 | … | 2021-11-08 |

    | 475 | Blood | Drew | … | 171.0 | … | 2022-06-13 |

    | 523 | Sights | Seymour | … | 167.3 | … | 2022-07-11 |

    | 341 | Idate | Val | … | 177.1 | … | 2022-03-03 |

    | ~ 246 rows ~ |


    With simple arithmetic expressions like the preceding example, you won’t often
    see the `NOT` form used. However, with some other expressions, it is more natural.


    ## Unrelated Assertions


    The assertion in the `WHERE` clause doesn’t have to involve any columns in the
    table at all. For example, these are acceptable:


    ```sql

    SELECT *

    FROM customers

    WHERE 1=1;  --  all rows

    SELECT *

    FROM customers

    WHERE 1=0;  --  no rows

    ```


    In the first example, the assertion `1=1` is obviously true for all rows, so all
    rows are returned. The assertion `1=0` is never true, so no rows are returned.


    These queries are obviously trivial, and you will probably never need to run them.
    However, there will be some other cases where you might want to test the assertion
    itself, rather than get the actual data.


    ## All and Nothing


    The result of a `WHERE` clause is always valid, even if it’s not what you’re looking
    for. For example:


    ```sql

    SELECT * FROM customers WHERE id>0; --  All rows

    SELECT * FROM customers WHERE id<0; --  Nothing

    ```


    An assertion may result in all rows. That may be a trivial assertion, but it doesn’t
    make it meaningless: next time, it may be different.


    An assertion may result in no rows at all. Again, next time it may be different.
    It is not an error to ask for something which isn’t there; it *may* be an error
    if you then go on and presume more results.


    Note that in this case, there is no technical reason why the `id` must be positive.
    That’s just a very common convention.


    ## Dealing with NULL


    The `WHERE` clause returns rows where an assertion is **true**. If an assertion
    is not true, it’s *not* necessarily **false**. The other option is that it’s unknown.


    If you count the results from the preceding examples, you will find that the number
    of customers where height is less than 170, plus the number of customers where
    it isn’t, is less than the total number of customers. This is because *some* of
    the customers don’t have a height value recorded.


    In SQL, `NULL` represents a missing value. For your convenience, and possible
    confusion, it is usually displayed with the word **NULL**, often with a different
    color or background color. However, in reality there is nothing at all.


    There are a number of reasons why a value might be missing:


    *   The information is not applicable, such as a date of death when the person
    hasn’t died yet.

    *   The information is not available, such as a date of birth which was not supplied;
    you can’t argue that the person hasn’t been born.

    *   The information is regarded as irrelevant, such as additional delivery instructions.

    *   None of the preceding reasons, but we just don’t care, so it hasn’t been entered.


    Unfortunately, SQL doesn’t distinguish between the different reasons, so you will
    need to be careful when interpreting how to deal with missing values; technically,
    all you can say about `NULL` is that the data is missing, though sometimes you
    can *infer* something from the context.


    For example, a missing date of death doesn’t *of itself* mean that a person hasn’t
    died. You would need more data to be sure.


    Sometimes, people will refer to a “NULL value,” but this is a contradiction in
    terms. This is important, because `NULL` *is always skipped when values are involved*.
    That is why the rows where `height<170` combined with rows where `NOT height<170`
    do not give the total number of rows: both assertions only test for values, never
    for `NULL`s. In this case, we will simply use `NULL` as a noun; some prefer the
    expression “NULL marker.”


    You could try to find the `NULL`s with the following:


    ```sql

    SELECT *

    FROM customers

    WHERE height=NULL;  --  doesn''t work

    ```


    but it won’t work. More correctly, it will work, but you will get no results.
    This is because the equality comparison `=` compares two *values* only.


    This makes absolute sense. If you don’t know the height, then you can’t say how
    it compares with another. And if two heights are `NULL`, you can’t say they’re
    equal, because you simply don’t know what they are.


    You can see a `NULL` comparison in the following trivial example:


    ```sql

    SELECT *

    FROM customers

    WHERE NULL=NULL;

    ```


    There will be no results since comparing `NULL` is always false.


    ### Deliberately Ignoring NULLs


    Why would SQL even allow comparing `NULL`s when `NULL=NULL` is always false? More
    realistically, you might compare two columns, both of which might happen to contain
    `NULL`s. For example:


    ```sql

    SELECT *

    FROM artists

    WHERE born=died;

    ```


    There shouldn’t be any, but you may get a few:


    | id | familyname | givenname | aka | born | died | nationality |

    | --- | --- | --- | --- | --- | --- | --- |

    | 348 | Daumier | Honoré | daumier | 1879 | 1879 | French |

    | 370 | Vermeer | Johannes | vermeer | 1675 | 1675 | Dutch |

    | ~ 2 rows ~ |


    Nobody who dies in the year they were born ever became a famous artist so any
    matches would indicate an error. However, a match would only make sense when *both*
    values exist and are the same.


    Here, you definitely want to ignore `NULL`s for the comparison.'
