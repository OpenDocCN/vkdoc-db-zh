- '# 字符串


  字符串就是一系列字符。在 SQL 中，它通常被描述为 `字符` 数据，你会看到它被定义为 `CHAR`（固定长度）或 `VARCHAR`（可变长度）。


  在内部，每个字符都存储为一个数字。这个数字具体是什么可能会有所不同。历史上，字符串是使用 `ASCII` 存储的，这是一种单字节字符编码。例如，字母 `A` 被存储为数字
  65。


  因为 `ASCII` 是单字节的，它的字符范围有限。如果你需要最基本范围之外的字符，你需要改变它，例如使用字节中的额外位或切换到替代字符集。


  现代的数据库管理系统可以使用 `Unicode`，它适用于所有语言和特殊字符。对于传统的 `ASCII` 字符，代码编号是相同的，但 `Unicode` 可以使用多字节编码来扩展范围，为每个字符提供自己唯一的代码，而无需与他人竞争。


  一些数据库管理系统总是使用 `Unicode`，而一些使用 `ASCII` 除非另有指定。示例数据库使用 `Unicode`，但现在这并不重要。接下来的内容对两者都同样适用。


  你不能直接对字符串做太多操作。有一件事你可以做，那就是将它连接到另一个字符串：


  ```sql

  SELECT ''abc'' || ''def'';  --  标准

  SELECT ''abc'' + ''def'';   --  仅限 MSSQL

  ```


  这个技术术语叫做串联。


  如果你在 MySQL/MariaDB 中尝试这个，它可能不工作。在传统模式下，MySQL/MariaDB 将 `||` 运算符视为逻辑运算符；在 ANSI 模式下，它应该可以工作。如果你被困在传统模式下，你将需要不同的方法。


  有一个常见但非标准的函数叫做 `concat()`：


  ```sql

  SELECT concat(''abc'',''def''); --  SQLite 不支持

  ```


  `concat()` 函数在 SQLite 中不可用，但它在 MySQL/MariaDB 以及 PostgreSQL、MSSQL 和 Oracle 中可用。如果你在传统模式下运行
  MySQL/MariaDB，这是连接字符串的唯一方法。


  当然，如果你使用的是 MySQL/MariaDB，你总是可以切换到 ANSI 模式。


  除了串联之外，SQL 还包含一系列处理字符串的函数。大致上，它们分为两类：


  *   字符函数：提取字符串的某部分或更改字符串中某些字符的函数

  *   格式化函数：将数字和日期转换为格式化字符串的函数


  问题是不同的数据库管理系统有自己的字符串函数，所以你会在接下来的内容中看到很多变化。这里的目的不是提供所有可用函数的字典，而是让你了解一下在你的数据库管理系统中可以使用字符串函数做些什么。


  ## 字符函数


  通常，SQL 包含执行以下操作的函数：


  *   长度：查找字符串的长度

  *   替换：用另一个字符串替换部分字符串

  *   查找：在字符串中查找字符或子字符串

  *   修剪：删除前导或尾随空格

  *   更改大小写：在大写和小写之间切换

  *   子字符串：返回部分字符串


  以下是这些操作的概述。


  ### 字符串长度


  字符串的长度就是字符串中的字符数。要查找长度，你可以使用


  ```sql

  --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle

  SELECT length(''abcde'');

  --  MSSQL

  SELECT len(''abcde'');

  ```


  长度为 0 表示它是一个空字符串。


  请注意，字符数不一定等于字节数。如果字符串是 `Unicode`，字符可能占用两个或更多字节。


  ### 查找子字符串


  要查找部分字符串的位置，你可以使用以下方法：


  ```sql

  --  MySQL/MariaDB, SQLite, Oracle: INSTR(''值'',值)

  SELECT instr(''abcdefghijklmnop'',''m'');

  --  PostgreSQL: POSITION(值 IN ''值'')

  SELECT position(''m'' in ''abcdefghijklmnop'')

  --  MSSQL: CHARINDEX(值, ''值'')

  SELECT charindex(''m'',''abcdefghijklmnop'');

  ```


  在所有情况下，如果找不到子字符串，结果将是 `0`。


  尽管示例是搜索单个字符，但你也可以搜索多字符子字符串，在这种情况下，你会得到子字符串的位置。


  这是我们用来按非字母顺序排序字符串技术的一部分。


  ### 替换


  你可以使用 `replace` 来替换字符串中的子字符串：


  ```sql

  --  replace(原始文本,搜索文本,替换文本)

  SELECT replace(''text with spaces'','' '',''-'')

  ```


  请注意，搜索子字符串是否匹配大小写取决于数据库排序规则，就像 `WHERE` 子句一样。




  ### 更改大小写


  要在大小写之间切换，可以使用


  ```sql

  --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle, MSSQL

  SELECT lower(''mIxEd cAsE''), upper(''mIxEd cAsE'');

  ```


  对于 PostgreSQL 和 Oracle，你还可以将每个单词的首字母大写：


  ```sql

  --  PostgreSQL, Oracle

  SELECT initcap(''mIxEd cAsE'')

  ```


  其他数据库管理系统没有如此方便的功能。


  ### 修剪空格


  有时，字符串的开头或结尾会有一些多余的空格。要移除它们，你可以使用 `trim()` 从两端移除，或者使用 `ltrim()` 或 `rtrim()` 从字符串的开头或结尾移除：


  ```sql

  --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle, MSSQL

  SELECT rtrim(ltrim('' abcdefghijklmnop ''))

  --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle, MSSQL>=2017

  SELECT trim('' abcdefghijklmnop '');

  ```


  `trim()` 函数不会影响字符串内部的任何空格。


  ### 子串


  子串是字符串的一部分。提取子串最直接的方法是


  ```sql

  Substring

  --  PostgreSQL, MariaDB/MySQL, Oracle, SQLite

  SELECT substr(''abcdefghijklmnop'',3,5)

  --  MSSQL

  SELECT substring(''abcdefghijklmnop'',3,5)

  --  结果为: cdefg

  ```


  在这里，你指定了原始字符串、子串的**起始位置**和子串的**长度**。


  一些数据库管理系统提供了专门的函数来获取字符串的开头或结尾部分。在某些情况下，你可以使用负的起始位置来获取字符串的结尾部分：


  ```sql

  --  左侧

  --  PostgreSQL, MariaDB/MySQL, MSSQL

  SELECT left(''abcdefghijklmnop'',5);

  --  也可以使用 substr(string,1,n)

  --  右侧

  --  PostgreSQL, MariaDB/MySQL, MSSQL

  SELECT right(''abcdefghijklmnop'',4);

  --  MariaDB/MySQL, Oracle, SQLite

  substr(''abcdefghijklmnop'',-4)

  ```


  在大多数情况下，对于普通数据，你并不真正需要提取字符串的一部分。有时你会在数据已被合并，需要再次将其拆开的情况下看到提取操作。然而，如果数据库构建得当，这种情况不会很频繁。


  你可能还需要提取字符串的一部分作为格式化过程的一部分。例如，客户电话号码都存储为十位数字字符串，没有空格或其他格式字符。虽然将数据以其最纯粹的形式存储总是最好的，但这并不总是最具可读性的。


  你可以使用以下子串来生成 `00 0000 0000` 格式的电话号码：


  ```sql

  --  PostgreSQL, MariaDB/ MySQL

  SELECT

  id, givenname, familyname,

  left(phone,2)||'' ''||substr(phone,3,4)

  ||'' ''||right(phone,4) AS phone

  FROM customers;

  --  Oracle

  SELECT

  id, givenname, familyname,

  substr(phone,1,2)||'' ''||substr(phone,3,4)

  ||'' ''||substr(phone,-4) AS phone

  FROM customers;

  --  SQLite

  SELECT

  id, givenname, familyname,

  substr(phone,1,2)||'' ''||substr(phone,3,4)

  ||'' ''||substr(phone,-4) AS phone

  FROM customers;

  --  MSSQL

  SELECT

  id, givenname, familyname,

  left(phone,2)+'' ''+substring(phone,3,4)+'' ''+right(phone,4) AS phone

  FROM customers;

  ```


  这现在给出了更具可读性的电话号码。


  | id | 名字 | 姓氏 | 电话 |

  | --- | --- | --- | --- |

  | 474 | Judy | Free |   |

  | 186 | Ray | Gunn | 03 5550 5761 |

  | 144 | Ray | King | 02 7010 6710 |

  | 179 | Ivan | Inkling | 08 7010 1382 |

  | 475 | Drew | Blood | 07 5550 8581 |

  | 523 | Seymour | Sights | 03 7010 3920 |

  | ~ 约 304 行 ~ |


  你可能想知道为什么电话号码没有以这种方式存储。问题在于并非每个人都以相同的方式输入电话格式，因此你不确定存储的值是否与你查找的字符串匹配。通过完全移除所有格式，你就有了一个确定的形式，以后可以对其进行格式化。


  ## 子查询


  有时，你需要的数据在另一个表中。将这些数据获取到当前查询中的一种方法是使用**子查询**。你已经在关于数据过滤的第 3 章中见过子查询；在这里，你将把子查询用作计算列。


  如果你想在无表查询中包含来自某个表的数据，就可以使用子查询。例如：


  ```sql

  SELECT (SELECT title FROM paintings WHERE id=123);

  ```


  这将给你选定的标题：


  | 标题 |

  | The Harvest Wagon |


  正如你之前看到的，所有子查询都出现在括号内。当然，在前面的例子中，以这种方式使用子查询是没有意义的，但如果你将其与其他数据结合使用，它就更有意义了。


  更现实地说，如果你想要来自多个表的数据，可能会使用子查询。例如，假设你想在画作详情中包含艺术家的国籍：


  ```sql

  SELECT

  id,

  artistid,

  title, price,

  (SELECT nationality FROM artists

  WHERE artists.id=paintings.artistid)

  AS nationality

  FROM paintings;

  ```


  你现在有了艺术家的国籍：


  | id | 艺术家 id | 标题 | 价格 | 国籍 |

  | --- | --- | --- | --- | --- |

  | 1222 | 147 | Haymakers Resting | 125.00 | French |

  | 251 | 40 | Death in the Sickroom | 105.00 | Norwegian |

  | 2190 | 135 | Cache-cache (Hide-and-Seek) | 185.00 | French |

  | 1560 | 293 | Indefinite Divisibility | 125.00 | French |

  | 172 | 156 | Girl with Racket and Shuttlecock | 195.00 | French |

  | 2460 | 83 | The Procession to Calvary | 165.00 | Flemish |

  | ~ 约 1273 行 ~ |


  `WHERE` 子句中的表达式 `artists.id=paintings.artistid` 包含了表名。我们说这些列是**被限定的**。你可以不带表名编写
  `WHERE` 子句，但限定列名将有助于你理解和维护查询。


  这种类型的子查询被称为**关联**子查询：它包含对主查询的引用。除其他外，这意味着对于主查询的每一行都必须单独评估子查询，因此会涉及一些性能成本。一些子查询，例如第
  3 章中用于数据过滤的那些，是非关联的：它们独立于主查询，只评估一次，因此成本要低得多。


  至于艺术家的实际姓名，`SELECT` 子句中的子查询只能返回*一个*值。下面的写法是行不通的：


  ```sql

  SELECT

  id,

  (SELECT givenname, familyname FROM artists

  WHERE artists.id=paintings.artistid),

  title, price,

  (SELECT nationality FROM artists

  WHERE artists.id=paintings.artistid) AS nationality

  FROM paintings;

  ```


  但是，你可以从子查询返回一个*计算*值：


  ```sql

  --  标准

  SELECT

  id,

  (SELECT givenname||'' ''||familyname FROM artists

  WHERE artists.id=paintings.artistid) AS artist,

  title, price,

  (SELECT nationality FROM artists WHERE

  artists.id=paintings.artistid) AS nationality

  FROM paintings;

  --  MSSQL

  SELECT

  id,

  (SELECT givenname+'' ''+familyname FROM artists

  WHERE artists.id=paintings.artistid) AS artist,

  title, price,

  (SELECT nationality FROM artists WHERE

  artists.id=paintings.artistid) AS nationality

  FROM paintings;

  --  SQLite 之外

  SELECT

  id,

  (SELECT concat(givenname,'' '',familyname) FROM artists

  WHERE artists.id=paintings.artistid) AS artist,

  title, price,

  (SELECT nationality FROM artists WHERE

  artists.id=paintings.artistid) AS nationality

  FROM paintings;

  ```


  我们现在有了艺术家的姓名以及国籍：


  | id | 标题 | 艺术家 | … | 国籍 |

  | --- | --- | --- | --- | --- |

  | 1222 | Haymakers Resting | Camille Pissarro | … | French |

  | 251 | Death in the Sickroom | Edvard Munch | … | Norwegian |

  | 2190 | Cache-cache (Hide-and-Seek) | Berthe Morisot | … | French |

  | 1560 | Indefinite Divisibility | Yves Tanguy | … | French |

  | 172 | Girl with Racket and Shuttlecock | Jean-Baptiste-Siméon Chardin | … | French
  |

  | 2460 | The Procession to Calvary | Pieter the Elder Bruegel | … | Flemish |

  |  ~ 约 1273 行 |


  当从同一张子查询表中选择多个值时，你需要使用多个子查询。这对于性能来说可能开始变得非常昂贵，你可能最好使用表连接。你将在下一章中学习表连接。



  ## CASE 表达式


  SQL 提供了一种表达式，可根据值或在某些情况下根据其他类别来生成类别。这就是 `CASE … END` 表达式。


  例如，如果你想将绘画作品按价格分组，可以使用


  ```sql

  SELECT

  id, title, price,   -- 基本值

  CASE

  WHEN price<130 THEN ''便宜''

  END AS price_group

  FROM paintings;

  ```


  这将给出你的定价类别：


  | id | title | price | price_group |

  | --- | --- | --- | --- |

  | 1222 | Haymakers Resting | 125.00 | 便宜 |

  | 251 | Death in the Sickroom | 105.00 | 便宜 |

  | 2190 | Cache-cache (Hide-and-Seek) | 185.00 |   |

  | 1560 | Indefinite Divisibility | 125.00 | 便宜 |

  | 172 | Girl with Racket and Shuttlecock | 195.00 |   |

  | 2460 | The Procession to Calvary | 165.00 |   |

  | ~ 1273 行 ~ |


  `WHEN` 表达式充当一种 `IF` 操作：如果条件匹配，则使用此值。


  请注意，如果条件不匹配，则结果为 `NULL`。无论价格是其他值还是 `NULL`，都是如此。


  当然，你不仅限于一个条件：


  ```sql

  SELECT

  id, title, price,   -- 基本值

  CASE

  WHEN price<130 THEN ''便宜''

  WHEN price<=170 THEN ''合理''

  END AS price_group

  FROM paintings;

  ```


  你现在有两个价格类别：


  | id | title | price | price_group |

  | --- | --- | --- | --- |

  | 1222 | Haymakers Resting | 125.00 | 便宜 |

  | 251 | Death in the Sickroom | 105.00 | 便宜 |

  | 2190 | Cache-cache (Hide-and-Seek) | 185.00 |   |

  | 1560 | Indefinite Divisibility | 125.00 | 便宜 |

  | 172 | Girl with Racket and Shuttlecock | 195.00 |   |

  | 2460 | The Procession to Calvary | 165.00 | 合理 |

  | ~ 1273 行 ~ |


  表达式从开头开始计算。即使某个价格，例如 `120`，在技术上小于 `170`，但它匹配第一个条件就足够了，不会进行进一步的测试。我们说这个表达式是 **短路求值**
  的。


  对于更昂贵的绘画，注意说它们是“其余的”并不正确。因为这包含了你想要排除的 `NULL` 值。


  注意到 `NULL` 在比较中会失败，你可以使用


  ```sql

  SELECT

  id, title, price,   -- 基本值

  CASE

  WHEN price < 130 THEN ''便宜''

  WHEN price <= 170 THEN ''合理''

  WHEN price > 170 THEN ''奢华''

  END AS price_group

  FROM paintings;

  ```


  现在除了未定价的绘画外，所有作品都有了价格类别。


  | id | title | price | price_group |

  | --- | --- | --- | --- |

  | 1222 | Haymakers Resting | 125.00 | 便宜 |

  | 251 | Death in the Sickroom | 105.00 | 便宜 |

  | 2190 | Cache-cache (Hide-and-Seek) | 185.00 | 奢华 |

  | 1560 | Indefinite Divisibility | 125.00 | 便宜 |

  | 172 | Girl with Racket and Shuttlecock | 195.00 | 奢华 |

  | 2460 | The Procession to Calvary | 165.00 | 合理 |

  | ~ 1273 行 ~ |


  或者，你也可以使用 `WHEN price IS NOT NULL`。


  在所有示例中，未匹配的价格都会返回 `NULL`。如果需要，你可以显式指定：


  ```sql

  SELECT

  id, title, price,   -- 基本值

  CASE

  WHEN price < 130 THEN ''便宜''

  WHEN price <= 170 THEN ''合理''

  WHEN price > 170 THEN ''奢华''

  ELSE NULL   -- 冗余，因为这是默认值

  END AS price_group

  FROM paintings;

  ```


  `ELSE` 情况在你想要以一个替代值结束时更有用：


  ```sql

  SELECT

  id, title, price,   -- 基本值

  CASE

  WHEN price < 130 THEN ''便宜''

  WHEN price <= 170 THEN ''合理''

  WHEN price > 170 THEN ''奢华''

  ELSE ''-''

  END AS price_group

  FROM paintings;

  ```


  当值已经处于类别中，但你想重新编码时，也可以使用 `CASE`。例如，`spam` 列设置为 `True/False` 或 `1/0`。你可以使用 `CASE`
  使其更清晰：


  ```sql

  SELECT

  id, email,

  CASE

  WHEN spam=1 THEN ''是''

  WHEN spam=0 THEN ''否''

  ELSE '''' -- 空字符串

  END AS spam

  FROM customers;

  ```


  这是一个更友好的版本：


  | id | email | spam |

  | --- | --- | --- |

  | 474 | judy.free474@example.net | 否 |

  | 186 | ray.gunn186@example.net | 是 |

  | 144 | ray.king144@example.net | 否 |

  | 179 | ivan.inkling179@example.com | 是 |

  | 475 | drew.blood475@example.net | 否 |

  | 523 | seymour.sights523@example.net | 是 |

  | ~ 304 行 ~ |


  请注意，被测试的值是离散的。对于离散情况，有替代语法：


  ```sql

  SELECT

  id, email,

  CASE spam

  WHEN 1 THEN ''是''

  WHEN 0 THEN ''否''

  ELSE '''' -- 空字符串

  END AS spam

  FROM customers;

  ```


  这虽然没简短多少，但更清晰地表明你是在从一组离散的备选项中进行选择。


  ## 转换为不同的数据类型


  有时需要改变的不是值本身，而是数据类型。这可能有多种原因，但在组合不同类型的数据时通常很有必要。改变数据类型称为 **类型转换**。


  当上下文足够简单时，一些数据库管理系统会自动转换数据：


  ```sql

  -- 非 MSSQL

  -- MySQL: SET SESSION sql_mode = ''ANSI'';

  SELECT id||'': ''||givenname||'' ''||familyname AS info

  FROM customers;

  ```


  这是组合后的信息：


  | info |

  | 474: Judy Free |

  | 186: Ray Gunn |

  | 144: Ray King |

  | 179: Ivan Inkling |

  | 475: Drew Blood |

  | 523: Seymour Sights |

  | ~ 304 行 ~ |


  虽然 `id` 是整数，但它会被自动转换为字符串以与其他字符串连接。然而，这在 Microsoft SQL Server 中不起作用，因为“+”运算符会将两个数字相加或将两个字符串连接起来，但不知道如何混合它们。


  你也可以对日期执行此操作：


  ```sql

  SELECT

  id||'': ''||givenname||'' ''||familyname||'' - ''||dob AS info

  FROM customers;

  ```


  但是，你可能会得到令人失望的结果：


  | info |

  | 474: Judy Free - 1978-04-01 |

  | [NULL] |

  | 523: Seymour Sights - 1965-01-06 |

  | ~ 304 行 ~ |


  如你所见，当有 `NULL` 会破坏计算时，情况变得复杂。我们将在下一节中解决这个问题，以及如何与 Microsoft SQL Server 协同工作。


  ### cast( ) 函数


  `cast()` 函数用于更改值的 *类型*。总的来说，`cast()` 函数有四种使用方式：


  *   你可以转换为同一类型的 *较小* 版本。


  例如，可以从浮点数转换为整数，或从日期时间转换为日期。这样做时，你当然会丢失精细的细节。


  *   你可以转换为同一类型的 *更宽* 版本。


  例如，可以将整数转换为浮点数，或从日期转换为日期时间。如果这样做，更精细的细节将被零或等效值填充。


  *   你可以从任何类型转换为字符串。


  唯一可能出错的是你指定了太短的字符串类型，例如当你尝试将日期转换为 `varchar(4)` 时。


  *   你 *有时* 可以将字符串转换为不同的类型。


  如果字符串不符合正确的形式，经典的反应是过度反应，引发错误。一些数据库管理系统提供了更温和的回退方式。


  在尝试按具有数字或日期形式的字符串进行排序时，我们已经尝到了 `cast()` 的滋味。



  '
- '# 转换为字符串类型


  对于所有数据库管理系统，您都可以使用 `cast()` 函数强制将值转换为字符串：


  ```sql

  --  标准 SQL

  SELECT

  cast(id AS varchar(5))||'': ''||givenname||'' ''

  ||familyname||'' - ''||cast(dob as varchar(12))

  AS info

  FROM customers;

  --  MSSQL：

  SELECT

  cast(id AS varchar(5))+'': ''+givenname+'' ''

  +familyname+'' - ''+cast(dob as varchar(12))

  AS info

  FROM customers;

  ```


  `cast()` 函数返回一个等效值，在本例中是长度最多为 5 或 12 个字符的字符串。


  您应该看到与之前相同的结果，但现在转换操作是明确指定的。对于 `VARCHAR` 类型，您需要稍加注意。如您所见，您指定了一个最大长度。如果这个长度不够，您很可能会看到字符串被截断。如果您不确定应该分配多少长度，保守估计总是安全的。


  这里，`NULL` 值又回来困扰我们了。虽然 `id`、`givenname` 和 `familyname` 都有值，但 `dob` 可能没有。Oracle 是唯一一个会礼貌地返回空字符串的数据库，而其他所有系统都会因为遇到
  `NULL` 而“崩溃”。


  由于缺少 `dob` 值应该不是什么大问题，您可以将其（以及它前面的连字符）合并为一个空字符串：


  ```sql

  --  标准 SQL

  SELECT

  cast(id AS varchar(5))||'': ''||givenname||'' ''||familyname

  ||coalesce('' - ''||cast(dob as varchar(12)),'''') AS info

  FROM customers;

  --  MSSQL：

  SELECT

  cast(id AS varchar(5))+'': ''+givenname+'' ''+familyname

  +coalesce('' - ''+cast(dob as varchar(12)),'''') AS info

  FROM customers;

  ```


  这类似于您之前对艺术家姓名的处理：


  | info |

  | --- |

  | 474: Judy Free - 1978-04-01 |

  | 186: Ray Gunn |

  | 144: Ray King |

  | 179: Ivan Inkling |

  | 475: Drew Blood - 1989-12-06 |

  | 523: Seymour Sights - 1965-01-06 |

  | ~ 304 rows ~ |


  虽然转换为字符串类型通常可以自动处理，但*从*字符串类型转换则可能是个挑战。下面的语句应该能成功执行：


  ```sql

  SELECT cast(''20 Jul 1969'' as date) AS moon_landing;

  ```


  但是，如果您尝试使用不同的日期格式，Oracle 会让事情变得困难；其他数据库应该没问题。


  另一方面，别指望这个能工作：


  ```sql

  SELECT cast(''tomorrow'' as date) AS birthday;

  ```


  有些编程语言（如 PHP）实际上会解析这种字符串，但对于 SQL，只有 PostgreSQL 支持这种用法。甚至不要尝试使用其他类型的字符串。您很可能会得到一个错误。


  ## 转换日期字面量


  您可能需要使用 `cast()` 的一个地方是尝试指定日期字面量时。因为日期字面量使用单引号，数据库管理系统可能会混淆它到底应该被视为字符串。


  例如，当上下文很明显时，例如与已知日期类型进行比较时使用日期字面量，您无需担心：


  ```sql

  SELECT * FROM customers WHERE dob<''1980-01-01'';

  ```


  因为 `dob` 已知是日期类型，所以字面量也必须是一个日期。


  然而，在之前的许多例子中，我们在没有已知日期类型的情况下使用了日期字面量。在那里，我们必须使用 `cast()` 来强制处理：


  ```sql

  SELECT cast(''20 Jul 1969'' as date) AS moon_landing;

  ```


  如果您不确定一个字面量将如何被解释，无论如何都对其进行转换总是安全的。


  '
- '# 创建视图


  您的一些计算可能会变得复杂，而您的一些查询肯定也会如此。当您需要重用一个查询时，您可以将其保存为**视图**。


  视图是一个保存好的查询。视图本身被永久保存在数据库中。例如，假设您有一个查询，它使用本章中的一些计算来生成一个简单的价格列表：


  ```sql

  SELECT

  id,

  (SELECT givenname||'' ''||familyname FROM artists WHERE

  artists.id=paintings.artistid) AS artist,

  title,

  price, price*0.1 AS tax, price*1.1 AS inc,

  CASE

  WHEN price<170 THEN ''cheap''

  WHEN price>170 THEN ''expensive''

  ELSE ''''

  END AS pricegroup,

  (SELECT nationality FROM artists

  WHERE artists.id=paintings.artistid) AS nationality

  FROM paintings;

  ```


  您得到的结果可以作为一个价格列表使用。


  | id | artist | title | price | … | pricegroup | nationality |

  | --- | --- | --- | --- | --- | --- | --- |

  | 1222 | … | … | 125 | … | cheap | French |

  | 251 | … | … | 105 | … | cheap | Norwegian |

  | 2190 | … | … | 185 | … | expensive | French |

  | 1560 | … | … | 125 | … | cheap | French |

  | 172 | … | … | 195 | … | expensive | French |

  | 2460 | … | … | 165 | … | reasonable | Flemish |

  | ~ 1273 rows |


  这是您不想每次使用都重新执行一遍的东西。相反，您可以通过创建视图来保存查询：


  ```sql

  CREATE VIEW pricelist AS

  SELECT

  id,

  (SELECT givenname||'' ''||familyname FROM artists WHERE

  artists.id=paintings.artistid) AS artist,

  title,

  price, price*0.1 AS tax, price*1.1 AS inc,

  CASE

  WHEN price<170 THEN ''cheap''

  WHEN price>170 THEN ''expensive''

  ELSE ''''

  END AS pricegroup,

  (SELECT nationality FROM artists

  WHERE artists.id=paintings.artistid) AS nationality

  FROM paintings;

  ```


  您现在可以像使用另一个表一样使用 `pricelist` 视图：


  ```sql

  SELECT * FROM pricelist;

  ```


  您可以将视图视为一个虚拟表。重要的是，它不是数据的副本；如果您删除视图，除了视图本身，您不会丢失任何东西。原始数据仍然完好无损。


  您可以为视图取几乎任何您喜欢的名称，但显然不能有两个同名的视图。不太明显的是，您也不能创建与表同名的视图。这是因为 SQL 将视图视为另一个表。


  如果您不再需要该视图，可以使用 `DROP VIEW` 语句：


  ```sql

  DROP VIEW pricelist;

  ```


  为了安全起见，您可以用 `IF EXISTS` 来限定该语句；否则，如果视图一开始不存在，您可能会得到一个错误：


  ```sql

  --  非 Oracle 或旧版 MSSQL

  DROP VIEW IF EXISTS pricelist;

  ```


  请注意，Oracle 以及旧版本的 MSSQL 不支持 `IF EXISTS`。


  您不必为了节省空间而删除视图，因为它们几乎不占用任何空间。


  然而，如果您想*修改*视图，最简单的方法是先删除它，然后再重新创建。


  一旦您理解了视图的价值，您就会发现它们是在已有代码基础上构建的一种有用技术。当您投入了大量工作来创建 `SELECT` 语句后，您可以保存它并在需要时随时重用。


  唯一的缺点是 `CREATE VIEW` 需要额外的数据库权限，因为您是在对数据库本身进行更改。我们建议您采取一切必要手段来获得这些权限——纠缠、贿赂、要挟，或者任何有效的方法。


  ## 在 Microsoft SQL Server 中使用视图


  在大多数情况下，视图的工作方式与其他数据库管理系统相同。然而，Microsoft 有一些显著的不同之处：


  *   视图不能包含 `ORDER BY` 子句，除非您将其与 `OFFSET … FETCH …` 子句或 `TOP` 表达式结合使用。

  *   `CREATE VIEW` 语句必须与脚本的其他部分分开。

  *   旧版本不支持 `IF EXISTS`；您必须使用更复杂的表达式，例如 `IF OBJECT_ID(''something'',''V'') IS NOT
  NULL DROP VIEW something`。


  Microsoft 要求您将大多数 `CREATE something` 语句与脚本的其他部分分开，唯一的例外是 `CREATE TABLE`。这可以使用一个特殊的关键字
  `GO` 来完成，例如：


  ```sql

  GO

  CREATE VIEW pricelist AS

  SELECT

  --  等等

  FROM paintings;

  GO

  ```


  `GO` 实际上是一个指令，用于处理前面的代码并开始一个新的批处理。


  `GO` 不是 SQL 标准的一部分（没有其他数据库管理系统需要它），并且它本身也有奇特的行为。通常，它应该单独占一行，可能不缩进，并且关键字后面不应有任何其他内容。




  ## 摘要


  虽然你的数据应以其最简单的形式保存，但你可以通过计算来生成该数据的变体。


  你可以在没有表的情况下使用 `SELECT` 子句来试验计算和公式；在 Oracle 中，你需要使用一个名为 `dual` 的虚拟表。


  虽然你通常从表中的现有值计算某个值，但有时你可能会使用内置值，例如当前日期和时间。你也可以使用一个固定值。


  ### 数据类型


  在 SQL 中，主要有三种数据类型：数字、字符串和日期。每种数据类型都有其特定的方法和函数来计算值：


  *   对于数字，你可以进行简单的算术运算，也可以使用更复杂的函数进行计算。还有一些函数可以近似数字。

  *   对于日期，你可以计算日期之间的年龄或对日期进行偏移。你也可以提取日期的各个部分。

  *   对于字符串，你可以连接它们、更改字符串的部分内容或提取字符串的部分内容。

  *   对于数字和日期，你可以生成一个格式化的字符串，这可能会给你一个更友好的版本。


  ## 空值


  每当计算涉及到 `NULL` 时，它会对结果产生灾难性的影响，结果将是 `NULL`。


  在某些情况下，你可以使用 `coalesce()` 来替换一个值，它将用一个合理的替代值替换 `NULL`。当然，你需要确定什么对你而言是“合理的”。


  ## 别名


  每一列都应该有一个唯一的名称。当你计算一个值时，你需要使用 `AS` 提供这个名字作为别名。你也可以对非计算列执行此操作，以提供一个更合适的名称。


  别名和其他名称应该是唯一的。它们还应该遵循标准的列命名规则，例如不与 SQL 关键字相同，并且不包含特殊字符。


  如果出于任何原因，一个名称或别名需要打破命名规则，你可以将该名称用双引号括起来，或者使用 DBMS 提供的任何替代方案。


  ## 子查询


  一列也可以包含一个源自子查询的值。如果你想包含来自另一个相关表的数据，这尤其有用。


  如果子查询涉及到主表中的一个值，则称其为相关子查询。这种子查询可能成本高昂，但仍然是一种有用的技术。


  ## CASE 表达式


  你可以使用 `CASE … END` 来生成类别，它测试一个值与可能的匹配项，并从多个备选值中返回一个结果。


  ## 类型转换值


  你可以使用 `cast()` 来更改值的数据类型：


  *   你可以在主类型内更改为具有更多或更少细节的类型。

  *   如果值充分类似于另一种类型，有时你可以在主类型之间进行更改。


  有时，类型转换是自动执行的，但有时你需要自己动手。


  一个你可能需要从字符串进行类型转换的情况是当你需要一个日期字面量时。由于字符串和日期字面量都使用单引号，SQL 可能会将日期误认为是字符串。


  ## 视图


  你可以通过创建视图将 `SELECT` 语句保存到数据库中。视图允许你将复杂的语句保存为虚拟表，以便以后以更简单的形式使用。


  视图是构建有用语句集合的好方法。


  ### 后续内容


  到目前为止，大部分工作都涉及单表。每当我们需要包含来自另一个表的数据时，我们只是简单地使用一个子查询，该子查询查询另一个表并返回结果。


  在下一章中，我们将通过将两个或多个表组合在所谓的 `join` 中，来探讨如何生成一个新的虚拟表。


  '
- '# 6. 连接表


  如果你从 `paintings` 表中选择数据：


  ```

  SELECT *

  FROM paintings;

  ```


  你会看到艺术家是用 `artistid` 表示的，而不是姓名或其他任何细节。在良好的数据库设计中就应该如此，但这并不方便。在上一章中，你通过包含一个子查询来解决这个问题：


  ```

  SELECT

  title,

  (SELECT givenname||'' ''||familyname FROM artists

  WHERE artists.id=paintings.artistid) AS artist

  --  等等

  FROM paintings;

  ```


  除了繁琐之外，子查询在额外处理方面也可能成本高昂，并且可能难以管理。


  如果艺术家的姓名能包含在 paintings 表中会更容易。然而，正如之前所讨论的，那将导致数据组织不善。


  解决方案，即两全其美的方法，是生成一个临时的 `虚拟` 表，其中艺术家的详细信息确实与绘画的详细信息一起包含在内。这被称为 `join`。


  当你连接两个表时，你从一个表中取出一行并将其附加到另一个表的一行的末尾。当然，你需要确保附加的行以某种方式与另一行匹配。完成此操作后，你可以将结果作为单个表读取，而无需处理子查询。


  在本章中，我们将学习如何连接两个或更多表，以便从组合表中提取数据变得简单实用。


  我们将通过使用连接而不是子查询来重新创建价格列表开始。在此过程中，我们将看到存在不同类型的连接，用于控制当某些行不匹配时会发生什么。


  我们还将探讨连接两个以上的表、将表与其自身连接，以及如何连接那些没有明显关系的表。


  然而，首先，我们需要看看执行连接时会发生什么。



  ## 连接如何工作


  要理解连接，你需要先理解关于表如何关联的一些基本概念。当然，SQL 并非真的要求你理解其内部机制，但如果你不了解，连接操作可能会变得非常棘手。


  在第 2 章中，设计数据库的一些核心要点如下：


  *   一张表包含单一类型对象的数据。因此，例如，`paintings` 表中不应有 `artists` 的详情，而 `books` 表中也不应有 `authors`
  的详情。

  *   多行数据不应相同。因此，例如，同一位画家的两幅画作不应都包含画家的姓名，同一作者的两本书也不应有相同的作者姓名。


  实际上，这两点并非独立，而是同一原则的两种表现形式：一张表描述单一类型的数据。如果你试图包含不相关的数据，最终会导致数据重复。


  正确的解决方案是将相关数据放入其自己的表中，并使用一个 `外键` 将一张表链接到另一张表的 `主键`，如图 6-1 所示。


  ![](img/601766_1_En_6_Fig1_HTML.jpg)


  这两张表分别描绘了画作和艺术家的信息。画作表和艺术家表分别有 8 行和 5 行。画作表的外键与艺术家表的主键相关联。


  图 6-1


  表之间的关系


  当时机到来，下一步就是将这些表连接成一个单一的虚拟表。连接两张表，就是将一张表中的一行复制到另一张表中匹配行的末尾，如图 6-2 所示。


  ![](img/601766_1_En_6_Fig2_HTML.jpg)


  通过连接画作表和艺术家表形成一个表。结果表有 7 行 5 列。列标题是 P K、paintings、F K、P K 和 artists。


  图 6-2


  连接后的表


  然后，你可以使用生成的虚拟表从两张表中读取数据。


  你可能会注意到连接的一些重要特性：


  *   任一张表中都可能缺失某些行。稍后，你将看到如何包含这些缺失的行。

  *   一些关联的行会被复制。如果这是一张真实的表，你会在数据管理上遇到各种问题，但对于虚拟表来说，这完全没问题且很方便。


  还有一个重要特性，你稍后会在 SQL 本身中看到：


  *   仅仅指定要连接的表是不够的；你还需要指定哪一列与哪一列匹配。虽然通常你会将外键连接到主键，但 SQL 允许更复杂的连接。


  一旦连接了表，你就可以使用 `SELECT` 语句从结果中读取数据。


  为了说明这个过程，我们将使用以下连接：


  ```sql

  SELECT *

  FROM paintings JOIN artists ON paintings.artistid=artists.id;

  ```


  你会得到类似这样的结果，包含两张表的所有列：


  | id | artistid | title | … | id | familyname | … |

  | --- | --- | --- | --- | --- | --- | --- |

  | 1222 | 147 | Haymakers Resting | … | 147 | Pissarro | … |

  | 251 | 40 | Death in the Sickroom | … | 40 | Munch | … |

  | 2190 | 135 | Cache-cache (Hide-and-Seek) | … | 135 | Morisot | … |

  | 1560 | 293 | Indefinite Divisibility | … | 293 | Tanguy | … |

  | 172 | 156 | Girl with Racket and Shuttlecock | … | 156 | Chardin | … |

  | 2460 | 83 | The Procession to Calvary | … | 83 | Bruegel | … |

  | ~ 1228 行 ~ |


  具体细节将在后续讲解。现在，我们先看一个包含合并表数据的结果集。


  之前的查询结果阐明了上述所有要点。尤其要注意，一些行缺失了。我们稍后会探讨这个问题。


  ### 连接表


  基本的连接是通过 `JOIN ... ON` 子句实现的：


  ```sql

  SELECT *

  FROM paintings JOIN artists ON paintings.artistid=artists.id;

  ```


  你会注意到一些重复的数据。例如，梵高有 57 幅画作。这意味着你会得到 57 份他的姓名、国籍和日期信息的副本。


  如果这是一张真实表，这将是非常糟糕的设计标志。你有 57 次可能犯错的机会，还可能引入其他差异。这就是为什么将此类数据保存在单独的表中非常重要，在那里数据只输入一次并可以得到妥善维护。


  然而，连接产生的只是一张*虚拟*表：重复的数据便于阅读，且永远不会被存储在任何地方。


  请注意，连接可以用不同的方式书写。因为重点是画作，所以先写 `paintings` 表在视觉上更合理。不过，你也可以以相反的顺序写这两张表：


  ```sql

  SELECT *

  FROM artists JOIN paintings ON paintings.artistid=artists.id;

  ```


  这将产生完全相同的结果，只是列的顺序会不同。


  这同样适用于 `ON` 子句：以哪种顺序书写并不重要，因为匹配结果是一样的。


  目前，你先写哪张表无关紧要。不过，稍后当涉及到 `JOIN` 子句的变体时，你将需要*记住*顺序。


  ### 替代语法


  `JOIN` 关键字并非最初 SQL 标准的一部分。相反，你会使用这种语法：


  ```sql

  SELECT *

  FROM paintings,artists WHERE paintings.artistid=artists.id;

  ```


  也就是说，`JOIN` 被逗号代替，`ON` 被 `WHERE` 代替。


  从技术上讲，发生的是生成了 `paintings` 和 `artists` 所有可能的组合（这称为 `交叉连接`），然后只筛选出画家与画作匹配的那些行。实际上，数据库管理系统从未以这种低效的方式执行。


  这是一种非常古老的语法，你只会看到那些尚未适应新语法的顽固派使用它。在内部，SQL 会使用与 `JOIN` 语法相同的过程生成相同的结果。


  你*应该总是*使用更新的语法：


  *   旧语法会将你标识为顽固派之一。

  *   新语法更灵活，在考察连接类型时你会看到这一点。正如你稍后将看到的，前面的语法仅限于所谓的 `内连接`。

  *   新语法使得使用额外的 `WHERE` 子句筛选器更容易。


  关于最后一点，假设你只想要较便宜的画作。使用 `JOIN` 子句，你可以运行


  ```sql

  SELECT *

  FROM paintings JOIN artists ON paintings.artistid=artists.id

  WHERE price<150;

  ```


  以下是较便宜的画作：


  | id | artistid | title | price | … | id | familyname | … |

  | --- | --- | --- | --- | --- | --- | --- | --- |

  | 1222 | 147 | Haymakers Resting | 125.00 | … | 147 | Pissarro | … |

  | 251 | 40 | Death in the Sickroom | 105.00 | … | 40 | Munch | … |

  | 1560 | 293 | Indefinite Divisibility | 125.00 | … | 293 | Tanguy | … |

  | 1836 | 273 | Male and Female | 105.00 | … | 273 | Pollock | … |

  | 575 | 18 | Corner of Quarry | 125.00 | … | 18 | Cézanne | … |

  | 1353 | 67 | Nini in the Garden | 105.00 | … | 67 | Renoir | … |

  | ~ 543 行 ~ |


  使用旧语法，你必须将筛选条件附加到现有的 `WHERE` 子句上：


  ```sql

  SELECT *

  FROM paintings,artists

  WHERE paintings.artistid=artists.id

  AND price<150;

  ```


  同样，SQL 在内部会使用相同的过程给出相同的结果，但新语法使你的意图更加清晰。


  '
- '# SQL 查询：结果选择与连接类型


  ## 选择结果


  你总是可以使用`SELECT *`来查看情况：


  ```sql

  SELECT *

  FROM paintings JOIN artists ON paintings.artistid=artists.id;

  ```


  但是，你可能希望更有选择性地包含列。例如，你可能会选择画作的`id`、`title`，以及艺术家的`givenname`和`familyname`：


  ```sql

  --  这样不行：

  SELECT

  id,

  title,

  givenname, familyname

  FROM paintings JOIN artists

  ON paintings.artistid=artists.id;

  ```


  但它还不能工作。


  你得到的错误信息将指向一个`ambiguous`（模糊的）列。在单个表中，不能有两个同名的列，但当你连接两个不同的表时，总是存在这种可能性。


  解决方案是包含表名作为前缀：


  ```sql

  SELECT

  paintings.id,

  title,

  givenname, familyname

  FROM paintings JOIN artists ON paintings.artistid=artists.id;

  ```


  这样现在就能工作了，因为你已经`qualified`（限定）了那个麻烦的名称；也就是说，你指明了是哪一个。


  | id | title | givenname | familyname |

  | --- | --- | --- | --- |

  | 1222 | Haymakers Resting | Camille | Pissarro |

  | 251 | Death in the Sickroom | Edvard | Munch |

  | 2190 | Cache-cache (Hide-and-Seek) | Berthe | Morisot |

  | 1560 | Indefinite Divisibility | Yves | Tanguy |

  | 172 | Girl with Racket and Shuttlecock | Jean-Baptiste-Siméon | Chardin |

  | 2460 | The Procession to Calvary | Pieter the Elder | Bruegel |

  | ~ 1228 rows ~ |


  表示法`table.column`被称为限定名，可以看作是列的全名。


  注意，在结果集中，列名仍然是更简单的非限定名。


  虽然，如你所见，只有模糊的名称才需要限定，但你可以限定其余的列：


  ```sql

  SELECT

  paintings.id,

  paintings.title,

  artists.givenname, artists.familyname

  FROM paintings JOIN artists ON paintings.artistid=artists.id;

  ```


  你将得到完全相同的结果。


  事实上，建议你限定所有的列。这是因为：

  *   你可以很容易地看出哪个表拥有原始数据。

  *   更复杂的连接将更容易管理。

  *   如果有人决定在另一个表中添加一个同名的列，你无论如何都需要限定它。


  从这里开始，我们将限定所有名称。


  ### 表别名


  如果你打算完全限定每个列名，它很快就会变得非常繁琐。它也使得语句更难阅读，因为你需要费力地浏览多个冗余的表名。你可以通过使用表`alias`（别名）来简化语句，它是表的临时昵称。这类似于计算列值时使用的列别名。


  要使用表别名：

  *   使用`AS`关键字为表起别名。

  *   使用别名*代替*原始名称。


  请注意，在 Oracle 中，你将不得不在*不使用*`AS`关键字的情况下为表起别名。


  例如：


  ```sql

  --  非 Oracle 数据库

  SELECT

  p.id,

  p.title,

  a.givenname, a.familyname

  FROM paintings AS p JOIN artists AS a ON p.artistid=a.id;

  --  Oracle 数据库，以及其他数据库：

  SELECT

  p.id,

  p.title,

  a.givenname, a.familyname

  FROM paintings p JOIN artists a ON p.artistid=a.id;

  ```


  如果你不使用 Oracle，我们建议你总是使用`AS`来使你的代码更具可读性并减少错误；对于 Oracle，你没有这个选项。


  使用表别名有很多原因，但在本例中，纯粹是为了方便。将表名简化为一个字母更容易输入，也*更*容易扫描。


  记住`FROM`在`SELECT`之前被求值，要注意一旦设置了表别名，你就必须在语句的其余部分使用它：你不能将原始名称与别名混合使用。


  ## 开发价格列表


  我们在使用计算时已经开始构建价格列表。使用连接，我们可以轻松地开发一个：


  ```sql

  SELECT

  p.id,

  p.title,

  a.givenname||'' ''||a.familyname AS artist,

  a.nationality,

  p.price, p.price*0.1 AS tax, p.price*1.1 AS total

  FROM paintings AS p JOIN artists AS a ON p.artistid=a.id;

  ```


  你应该得到相同的结果：


  | id | title | artist | price | tax | inc | nationality |

  | --- | --- | --- | --- | --- | --- | --- |

  | 1222 | Haymakers Restin … | Camille Pissarro … | 125.00 | 12.500 | 137.500 | French
  |

  | 251 | Death in the Sic … | Edvard Munch … | 105.00 | 10.500 | 115.500 | Norwegian
  |

  | 2190 | Cache-cache (Hid … | Berthe Morisot … | 185.00 | 18.500 | 203.500 | French
  |

  | 1560 | Indefinite Divis … | Yves Tanguy … | 125.00 | 12.500 | 137.500 | French
  |

  | 172 | Girl with Racket … | Jean-Baptiste-Si … | 195.00 | 19.500 | 214.500 | French
  |

  | 2460 | The Procession t … | Pieter the Elder … | 165.00 | 16.500 | 181.500 | Flemish
  |

  | ~ 1228 rows ~ |


  当然，除了有一些行仍然缺失。


  你也可以添加`p.year`或其他列，无需额外工作，因为它们在连接中总是存在的。


  ### 连接类型


  到目前为止，我们忽略了有些行缺失的事实。


  原因很简单。一些画作没有匹配的艺术家，一些艺术家没有匹配的画作。


  要找到未匹配的（匿名）画作，你可以找到`artistid`为`NULL`的记录：


  ```sql

  SELECT *

  FROM paintings

  WHERE artistid IS NULL;

  ```


  这会给你匿名画作：


  | id | title | artistid | … |

  | --- | --- | --- | --- |

  | 1989 | Portrait of Trabuc |   | … |

  | 1179 | The Green Vineyard |   | … |

  | 1774 | The vase with 12 sunflowers |   | … |

  | 625 | Self-portrait |   | … |

  | 908 | Village Street and Stairs with Figures |   | … |

  | 2220 | Noon: Rest from Work (After Millet) |   | … |

  | ~ 45 rows ~ |


  找到未匹配的艺术家则有点棘手，因为匹配只在`paintings`表中定义：

  *   找到那些在`paintings`表中*确实*存在的`artistid`。

  *   找到其`id`不在上述列表中的艺术家。


  ```sql

  SELECT * FROM artists

  WHERE id NOT IN (

  SELECT artistid FROM paintings WHERE artistid IS NOT NULL

  );

  ```


  这会给你一个我们尚未包含的艺术家列表：


  | id | givenname | familyname | … |

  | --- | --- | --- | --- |

  | 37 | Francisco | de Zurbarán | … |

  | 127 | Pietro | Cavallini | … |

  | 38 | Altichiero | Da Verona | … |

  | 164 | Alonso | Cano | … |

  | 23 | Paul | Klee | … |

  | 338 | Gentile | da Fabriano | … |

  | ~ 19 rows ~ |


  当你连接两个表时，默认情况下，只包含一个表中与另一个表中有匹配行的那些行。在我们的例子中，由于一些画作有`NULL artistid`，SQL 无法在`artists`表中为它们找到匹配项。未匹配的画作被排除在外。这被称为`INNER
  JOIN`（内连接），是默认的连接方式。


  这并不总是你想要的，所以 SQL 提供了多种连接类型：

  *   `INNER JOIN`（内连接）只返回匹配的行。这是默认的。

  *   `OUTER JOIN`（外连接）类型返回匹配的行以及一些未匹配的行。有三种不同的`OUTER JOIN`类型。

  *   `CROSS JOIN`（交叉连接）返回子行和父行的所有可能组合。你很少单独想要`CROSS JOIN`，但它有时用于特殊情况。


  在这里，我们将探讨各种类型的连接。为了使它更容易，我们将在`artists`和`paintings`表的微型版本上运行示例，称为`miniartists`和`minipaintings`。这些是你在图
  6-1 中看到的表。



  ### INNER JOIN


  默认的连接类型是 `INNER JOIN`：


  | id | title | artistid | id | fullname |

  | --- | --- | --- | --- | --- |

  | 1 | 浴女 | 2 | 2 | 皮埃尔-奥古斯特·雷诺阿 |

  | 2 | 星夜 | 1 | 1 | 文森特·梵高 |

  | 3 | 暴风雪 | 3 | 3 | 约瑟夫·透纳 |

  | 4 | 舞者 | 2 | 2 | 皮埃尔-奥古斯特·雷诺阿 |

  | 5 | 月光 | 3 | 3 | 约瑟夫·透纳 |

  | 7 | 阿尔勒女人 | 1 | 1 | 文森特·梵高 |

  | 8 | 在露台上 | 2 | 2 | 皮埃尔-奥古斯特·雷诺阿 |


  ```sql

  SELECT *

  FROM minipaintings AS p

  INNER JOIN miniartists AS a ON p.artistid=a.id;

  ```


  这与之前示例的唯一区别是多了 `INNER` 这个词，你可以看到它并没有真正做任何特别的事情。既然是默认的，你完全可以省略它。


  请记住，使用 `INNER JOIN` 时，表名的顺序可以互换。你会得到相同的结果，但列的顺序可能会改变。


  ### LEFT OUTER JOIN 和 RIGHT OUTER JOIN


  `OUTER JOIN` 用于包含未匹配的行。它 *总是会包括* `INNER JOIN` 的结果。


  由于涉及两个表，你可以选择包含第一个表还是第二个表的未匹配行。如果你真的想包含两者的未匹配行，你会使用 `FULL OUTER JOIN`。


  然而，你可能更想包含来自 `minipaintings` 表的未匹配行，即 `minipaintings` 表中那些在 `miniartists` 表中没有匹配行的记录。用英文说，就是匿名画作。


  如前所述，表名的顺序可以互换。但是，当涉及到 `OUTER JOIN` 时，你需要记住哪个表是你先写的。


  如果你想包含 `minipaintings` 表的 `unmatched` 行，你需要将 `INNER JOIN` 改为相应的 `LEFT OUTER JOIN`
  或 `RIGHT OUTER JOIN`。


  如果你使用的是 SQLite，你会发现它不支持 `RIGHT JOIN`。他们建议你只需调换两个表的顺序，直到你能用 `LEFT JOIN` 得到想要的结果。


  你仍然可以参考后面的解释，但请忽略包含 `RIGHT JOIN` 的示例。


  将 `minipaintings` 表放在左边：


  ```sql

  SELECT *

  FROM minipaintings AS p LEFT OUTER JOIN miniartists AS a

  ON p.artistid=a.id;

  ```


  你会看到现在得到了内连接中缺失的匿名画作：


  | id | title | artistid | id | fullname |

  | --- | --- | --- | --- | --- |

  | 1 | 浴女 | 2 | 2 | 皮埃尔-奥古斯特·雷诺阿 |

  | 2 | 星夜 | 1 | 1 | 文森特·梵高 |

  | 3 | 暴风雪 | 3 | 3 | 约瑟夫·透纳 |

  | 4 | 舞者 | 2 | 2 | 皮埃尔-奥古斯特·雷诺阿 |

  | 5 | 月光 | 3 | 3 | 约瑟夫·透纳 |

  | 6 | 绿色葡萄园 |   |   |   |

  | 7 | 阿尔勒女人 | 1 | 1 | 文森特·梵高 |

  | 8 | 在露台上 | 2 | 2 | 皮埃尔-奥古斯特·雷诺阿 |


  将 `minipaintings` 表放在右边：


  ```sql

  SELECT *

  FROM miniartists AS a RIGHT OUTER JOIN minipaintings AS p

  ON a.id=p.artistid;

  ```


  也就是说，根据你想要包含未匹配行的表是在 `JOIN` 关键字的左边还是右边，来选择使用 `LEFT` 还是 `RIGHT`。`ON artists.id=paintings.artistid`
  子句的写法仍然可以互换。


  与 `INNER JOIN` 一样，`OUTER` 这个词也是可选的，所以你可以省略它：


  ```sql

  --  minipaintings 表在左边

  SELECT *

  FROM minipaintings AS p LEFT JOIN artists AS a

  ON p.artistid=a.id;

  --  paintings 表在右边

  SELECT *

  FROM miniartists AS a RIGHT JOIN minipaintings AS p

  ON paintings.artistid=artists.id;

  ```


  对于未匹配的行，相应的数据将填充为 `NULL`。


  ### “首选”的外连接


  在我们的示例中，我们使用 `OUTER JOIN` 来包含所有的画作，但不包含所有的艺术家。这部分是因为我们对画作更感兴趣，因为那是我们销售的商品。这也是由表之间的关系决定的。


  注意，`minipaintings` 表有一个指向 `miniartists` 的外键，但反之则不然。我们说这两个表之间存在 `一对多` 的关系。一个艺术家可以有多幅画作，或者，如果你愿意，也可以说多幅画作可以引用同一位艺术家。


  有时，我们说 `minipaintings` 表是 `子表`，而 `miniartists` 表是 `父表`。在 SQL 中，子表引用父表，但反之则不然。


  当你连接两个表时，你通常想要的是子表的外连接。然而，你也可以得到父表的外连接：


  ```sql

  --  minipaintings 表在左边

  SELECT *

  FROM minipaintings AS p RIGHT JOIN miniartists AS a

  ON p.artistid=a.id;

  --  minipaintings 表在右边

  SELECT *

  FROM artists AS a LEFT JOIN minipaintings AS p

  ON p.artistid=a.id;

  ```


  这将产生 `INNER JOIN` 的结果加上未匹配的艺术家。这并不常见，但在少数情况下可能有用。


  首先，在这个数据库中，你对画作更感兴趣，并将艺术家信息视为画作的额外细节。然而，如果你是艺术家的经纪人（在本例中可能为时已晚），你会对 `miniartists`
  表更感兴趣，那么你可能会对之前提到的父表外连接感兴趣。


  其次，你可以使用这种连接来查找未匹配的艺术家。例如：


  ```sql

  SELECT a.*

  FROM minipaintings AS p RIGHT JOIN miniartists AS a

  ON p.artistid=a.id

  WHERE p.id IS NULL;

  ```


  这会给你以下结果：


  | id | fullname |

  | --- | --- |

  | 5 | 列奥纳多·达·芬奇 |

  | 4 | 安藤广重 |


  在这里，你通过生成外连接并过滤掉已匹配的画作，来寻找没有对应画作的艺术家。这将给你一个与之前“未匹配艺术家”类似的结果。


  ### 关于 JOIN 的一些建议


  在编写连接时，你显然有一些选择。只要能工作，具体采用哪种方式并不重要。然而，一个好的开发人员总是会编写清晰且易于维护的代码。


  以下是一些建议。最终，无论你选择什么，都应该保持一致，不要频繁改变规则。


  #### （几乎）总是为表使用别名


  在极少数情况下，你可能会在不给表起别名的情况下编写连接，但一旦你开始选择特定的列，情况就会变得混乱。给表起别名总是一个好主意。


  #### 哪个表放在前面？


  显然，我们可以选择先写哪个表。你如何决定？


  首先，这无关紧要，所以即使你选择另一种顺序，也不会导致出错。然而，在实践中，你可能对一个表比另一个表更感兴趣。


  如果你是艺术家的经纪人，那么你会更倾向于列出艺术家及其画作。在这个示例中，我们销售的是画作，所以我们更倾向于列出画作及其艺术家。


  通常，把你更感兴趣的表放在左边。这意味着，当涉及到外连接时，你更有可能使用 `LEFT JOIN`。这也是我们在本书中主要采用的方式。


  请记住，SQLite 甚至不支持 `RIGHT JOIN`，并且他们建议你在必要时交换表的顺序以使用 `LEFT JOIN`。显然，没有人怀念 `RIGHT JOIN`。


  #### 决定是否使用 INNER 和 OUTER


  `INNER` 和 `OUTER` 都是可选的，所以原则上你可以随心所欲。然而，我们建议你选定一个规则并坚持下去。如果你有时使用这些关键字，有时又不使用，可能会引起混淆和误解。


  在本书中，我们省略了它们，但在现实中，这取决于你。




  '
- '# 完成价格列表


  我们已经开始使用连接表来创建价格列表：


  ```sql

  SELECT

  p.id,

  p.title,

  a.givenname||'' ''||a.familyname AS artist,

  a.nationality,

  p.price, p.price*0.1 AS tax, p.price*1.1 AS total

  FROM paintings AS p JOIN artists AS a ON p.artistid=a.id;

  ```


  与之前使用子查询的版本相比，这个版本既有我们想要的东西不足，又有我们不需要的东西过多。


  首先，是缺失画作的问题。记住，有些画作没有 `artistid`，而之前的内连接会遗漏它们。一个合适的外连接应该可以解决这个问题。


  其次，有些画作没有价格。我们无需决定*为什么*没有价格：也许它们是尚未定价的新画，或者是不再出售的旧画。关键是，把它们包含在价格列表中毫无意义。为此，我们可以过滤掉
  `NULL` 值。


  我们现在可以做的是删除旧版的价格列表，并用连接版本替换它：


  ```sql

  DROP VIEW IF EXISTS pricelist;

  CREATE VIEW pricelist AS

  SELECT

  p.id,

  p.title,

  a.givenname||'' ''||a.familyname AS artist,

  a.nationality,

  p.price, p.price*0.1 AS tax, p.price*1.1 AS total

  FROM paintings AS p LEFT JOIN artists AS a ON p.artistid=a.id

  WHERE p.price IS NULL;

  ```


  对于各种数据库管理系统（DBMS），请记住：


  *   Oracle 不支持 `IF EXISTS`。

  *   Microsoft 要求在 `CREATE VIEW` 语句块前后加上 `GO`。

  *   MySQL/MariaDB 需要设置为 ANSI 模式才能使用字符串连接；否则，你需要使用 `concat()` 函数。Microsoft 需要使用 `+`
  进行连接。


  '
- '# 连接多个表


  连接的目的是组合来自两个或更多表的数据。有时，附加数据来自许多其他表；有时，数据来自另一个不直接与主表相关的表。


  例如，假设你想要一个客户列表以及他们向哪些画家购买了画作。你可能正在考虑一个促销活动，对于客户以前购买过的画家的新作品，客户可以获得折扣。


  查询语句可能类似于这样：


  ```sql

  SELECT

  c.id, c.givenname, c.familyname,

  a.id,

  a.givenname||'' ''||a.familyname AS artist

  FROM ... ;

  ```


  你知道你将使用一个包含 `customers`（客户）和 `artists`（画家）表的连接，并且你会用合适的首字母缩写来为这些表设置别名。


  问题在于涉及的这两个表彼此并不直接相关。


  从数据库关系图中你可以看到，这些表之间的关系很长，涉及 `sales`（销售）、`saleitems`（销售项）和 `paintings`（画作）表。直观上看，这很有道理：对于每个客户，你可以查看他们的销售记录和销售项，然后查看每个销售项对应的画作，最后找到每幅画的画家。


  为了实现这一点，你需要连接所有五个表，每次连接两个：


  ```

  customers ← sales ← saleitems → paintings → artists

  ```


  注意箭头的方向。它们表示外键引用主键的方向。更详细地说：


  ```

  customers.id

  ← customerid.sales.id

  ← saleid.saleitems.paintingid

  → id.paintings.artistid

  → id.artists

  ```


  你的真实数据库可能有更多的表。但通常，原理是相同的：对于一个特定的查询，你通常只需处理相对较少数量的表。


  ## 构建更大的连接


  连接的目的是从末端表获取数据。然而，我们也可以从中间的任何表获取数据。


  如果你从链的一端开始，一直连接到另一端，连接五个表是很容易的：


  ```sql

  SELECT

  *

  FROM

  customers AS c

  JOIN sales AS s ON c.id=s.customerid

  JOIN saleitems AS si ON s.id=si.saleid

  JOIN paintings AS p ON si.paintingid=p.id

  JOIN artists AS a ON p.artistid=a.id

  ;

  ```


  如果你使用 Oracle，记得省略 `AS`。


  这将给你一个很长的列表：


  | id | givenname | familyname | … | id | givenname | familyname | … |

  | --- | --- | --- | --- | --- | --- | --- | --- |

  | 79 | Daisy | Chain | … | 20 | Frans | Hals | … |

  | 459 | Matt | Black | … | 314 | (Eugène-Henri-) Paul | Gauguin | … |

  | 28 | Meg | Aphone | … | 43 | Johan-Barthold | Jongkind | … |

  | 179 | Ivan | Inkling | … | 266 | Vincent | Van Gogh | … |

  | 94 | Stan | Dover | … | 344 | Edgar | Degas | … |

  | 373 | April | Showers | … | 3 | Diego | Velázquez | … |

  | ~ 6099 行 ~ |


  请注意，所有的连接都遵循外键。模式是：


  ```

  table

  JOIN table ON relationship

  JOIN table ON relationship

  JOIN table ON relationship

  JOIN table ON relationship

  ```


  五个表，它们之间有四个连接。


  布局纯粹是个人喜好问题。在简单的两表连接中，我们将所有内容放在一行。在更大的连接中，我们将连接分开写，以便于阅读。


  通常，我们使用简单的首字母作为表别名。在一种情况下，`saleitems`（销售项）这样做不行，因为它的首字母已被使用，所以 `si` 看起来是合适的。一如既往，任何不同的别名都可以，但使用一个直观的别名是有意义的。


  一旦你这样做，你会发现大量的列和 `大量` 的行。我们先来处理列。你可以简化 `SELECT` 子句，只包含你感兴趣的列：


  ```sql

  SELECT

  c.id,

  c.givenname, c.familyname,

  s.id,

  a.givenname||'' ''||a.familyname AS artist

  FROM

  customers AS c

  JOIN sales AS s ON c.id=s.customerid

  JOIN saleitems AS si ON s.id=si.saleid

  JOIN paintings AS p ON si.paintingid=p.id

  JOIN artists AS a ON p.artistid=a.id

  ;

  ```


  这给出了一个简化的结果，如下所示：


  | id | givenname | familyname | id | artist |

  | --- | --- | --- | --- | --- |

  | 79 | Daisy | Chain | 1066 | Frans Hals |

  | 459 | Matt | Black | 2067 | (Eugène-Henri-) Paul Gauguin |

  | 28 | Meg | Aphone | 271 | Johan-Barthold Jongkind |

  | 179 | Ivan | Inkling | 2749 | Vincent Van Gogh |

  | 94 | Stan | Dover | 361 | Edgar Degas |

  | 373 | April | Showers | 2681 | Diego Velázquez |

  | ~ 6099 行 ~ |


  为方便起见，画家的姓名被连接在一起。记得在 MSSQL 中使用 `+`。


  这个查询可以工作，但有一个小的技术问题在于 `id`。如果你打算认真使用这个查询，例如在视图中，你不能有两个同名的列。给其中一个列起一个别名并不难：


  ```sql

  SELECT

  c.id,

  c.givenname, c.familyname,

  s.id AS sid,

  a.givenname||'' ''||a.familyname AS artist

  FROM

  customers AS c

  JOIN sales AS s ON c.id=s.customerid

  JOIN saleitems AS si ON s.id=si.saleid

  JOIN paintings AS p ON si.paintingid=p.id

  JOIN artists AS a ON p.artistid=a.id

  ;

  ```


  如果你愿意，也可以给其他列起别名，但只有 `id` 是必须的。




  ## 简化结果


  那里有大量数据，可能会让人有点不知所措。首先，数据中可能存在一些重复。


  完全可以想象，某个特定的客户/组合会出现多次。毕竟，如果某位艺术家真的是客户的最爱，那么你预计会有多个购买记录。


  要查看是否属于这种情况，你可以先按客户姓名对结果排序：


  | id | givenname | familyname | sid | artist |

  | --- | --- | --- | --- | --- |

  | 260 | Aiden | Abet | 902 | Pierre-Auguste Renoir |

  | 260 | Aiden | Abet | 902 | Pierre-Auguste Renoir |

  | 260 | Aiden | Abet | 902 | Rembrandt van Rijn |

  | 260 | Aiden | Abet | 1006 | Kasimir Malevich |

  | 260 | Aiden | Abet | 1006 | Paul Cézanne |

  | 260 | Aiden | Abet | 818 | Rembrandt van Rijn |

  | ~ 6099 行 ~ |


  ```sql

  SELECT

  c.id,

  c.givenname, c.familyname,

  s.id AS sid,

  a.givenname||'' ''||a.familyname AS artist

  FROM

  customers AS c

  JOIN sales AS s ON c.id=s.customerid

  JOIN saleitems AS si ON s.id=si.saleid

  JOIN paintings AS p ON si.paintingid=p.id

  JOIN artists AS a ON p.artistid=a.id

  ORDER BY c.familyname, c.givenname

  ;

  ```


  如果你仔细观察，会发现一些重复项。目前，我们对重复出现的频率或花费了多少钱并不感兴趣。我们只想要名字。为此，我们可以使用 `DISTINCT`：


  | id | givenname | familyname | sid | artist |

  | --- | --- | --- | --- | --- |

  | 260 | Aiden | Abet | 818 | Auguste Rodin |

  | 260 | Aiden | Abet | 818 | Paul Cézanne |

  | 260 | Aiden | Abet | 818 | Rembrandt van Rijn |

  | 260 | Aiden | Abet | 902 | Pierre-Auguste Renoir |

  | 260 | Aiden | Abet | 902 | Rembrandt van Rijn |

  | 260 | Aiden | Abet | 1006 | Jean-Antoine Watteau |

  | ~ 5997 行 ~ |


  ```sql

  SELECT DISTINCT

  c.id,

  c.givenname, c.familyname,

  s.id AS sid,

  a.givenname||'' ''||a.familyname AS artist

  FROM

  customers AS c

  JOIN sales AS s ON c.id=s.customerid

  JOIN saleitems AS si ON s.id=si.saleid

  JOIN paintings AS p ON si.paintingid=p.id

  JOIN artists AS a ON p.artistid=a.id

  ORDER BY c.familyname, c.givenname

  ;

  ```


  这将大大减少结果数量，尽管它仍然是一个很大的数字。


  请记住，`DISTINCT` 只作用于 `SELECT` 子句中的内容；它不知道（也不在乎）其他值。假设你忘了客户的 `id`：


  ```sql

  SELECT DISTINCT

  --  c.id,

  c.givenname, c.familyname,

  s.id AS sid,

  a.givenname||'' ''||a.familyname AS artist

  FROM

  customers AS c

  JOIN sales AS s ON c.id=s.customerid

  JOIN saleitems AS si ON s.id=si.saleid

  JOIN paintings AS p ON si.paintingid=p.id

  JOIN artists AS a ON p.artistid=a.id

  ORDER BY c.familyname, c.givenname

  ;

  ```


  你会得到一个稍小的数据集，但从技术上讲这是不正确的。有些客户与其他客户同名，而且两个同名的客户可能恰好购买了同一位艺术家的作品。如果没有独特的东西来区分他们，他们就会被合并。


  这仍然是大量的数据。在下一章中，我们将看到如何对这样的大量数据生成摘要。


  ## 重新审视一些子查询


  在第 3 章中，我们使用了一些子查询，将一个表中的数据用作另一个表的过滤器。在这里，我们将研究使用连接表来替代。


  对于第一个例子，我们找到了在单次销售中花费金额较大的客户：


  ```sql

  SELECT *

  FROM customers

  WHERE id IN(SELECT customerid FROM sales WHERE total>1200);

  ```


  你可以使用连接得到类似的结果：


  ```sql

  SELECT DISTINCT c.*

  FROM customers AS c JOIN sales AS s on c.id=s.customerid

  WHERE s.total>1200;

