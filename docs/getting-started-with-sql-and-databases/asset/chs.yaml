  \n聚合可以应用于全部数据，也可以按分组应用（如小计）。我们将了解如何生成分组摘要以及如何筛选分组摘要。\n\n我们还将探讨如何跨多个表进行汇总，以及如何使用虚拟表来生成更合适的摘要。\n\
  \n## 数据计数\n\n前面的 `count()` 函数是一个特例：`count(*)` 统计数据集中的所有*行*。数据集也可以被筛选：\n\n```sql\n\
