- "# 5. 计算列值\n\n到目前为止，你主要处理的是来自表中直接的数据值。然而，你也可以重新计算值，以获得更适合特定情况的形式。\n\n关于在 SQL 表列中存储的值的类型，有一些相互关联的原则：\n\
  \n*   值不应重复。\n\n    这包括同一值的不同变体，例如以厘米和英寸为单位的身高，或者出生日期和年龄。\n*   所有列应彼此独立。\n\n   \
  \ 原则上，更改一列的值不应影响另一列，例如出生日期和电话号码。\n*   值应采用其最简形式。\n\n    这尤其适用于格式化字符，例如货币符号或电话号码中的空格。\n\
  \n换句话说，当你确实需要基于存储在数据库中的值进行变体计算时，解决方案是存储最简单的值并计算其余部分。\n\nSQL 具有一定的计算能力。在使用各种 DBMS\
  \ 时，你很快会注意到：\n\n*   这种能力是有限的。SQL 并非真正的数据处理工具，但它可以进行一些简单的计算。\n*   标准 SQL 的局限性更大，而各种\
  \ DBMS 通过自己的扩展补充了这一点。这里的问题是，没有两个 DBMS 拥有完全相同的功能。\n\n有时，解决方案是让数据保持其简单形式，而让额外的软件进行更复杂的数据处理。例如：\n\
  \n*   你可以从数据库中提取基本数据，并使用像 PHP（一种用于生成网页的语言）这样的语言来执行更复杂的计算和格式化。\n*   会计软件将从数据库中提取数据，并在应用程序内执行其所有的专门处理。\n\
  *   存在专门的程序和语言，例如 `R`，它们会从数据库中提取数据并在其上进行复杂的分析。\n\n尽管如此，在将数据交给额外软件处理之前，先了解 DBMS 能为我们做什么是很有用的。\n\
  \n在本章中，我们将了解一些重新计算值的方法。我们将探讨数字、字符串和日期的基本计算，以及处理它们的专用函数。我们还将了解 `NULL` 如何影响计算，以及为计算结果命名的技术。\n\
  \n我们还将了解一些特殊技术，例如在子查询中从其他表获取结果、在 `CASE` 表达式中对值进行分类，以及使用 `case()` 函数重新解释数据类型。\n\n\
  最后，我们将了解如何以视图的形式在数据库中保存复杂的查询。\n\n## 测试计算\n\n大多数 DBMS 包含一项功能，从技术上讲是非标准的，但对于测试计算非常有用：\n\
  \n```\nSELECT 2+5 AS result; --  非 Oracle\n```\n\n从技术上讲，`SELECT` 语句需要一个 `FROM` 子句。然而，在缺少该子句时，大多数\
  \ DBMS 会提供一个虚拟的单行表，但该表本身没有列，结果如下所示：\n\n| result |\n| --- |\n| 7 |\n\n你甚至可以计算这个虚拟表的行数：\n\
  \n```\nSELECT count(*) AS count;    --  1 行\n```\n\nOracle 也提供此功能，但它使用一个名为 `dual`\
  \ 的虚拟表：\n\n```\n--  仅 Oracle\nSELECT 2+5 FROM dual;\nSELECT count(*) FROM dual;\n\
  ```\n\n对于大多数示例，我们不会写 `FROM dual`，但如果你使用的是 Oracle，请记得加上它。\n\n当然，如果你没有包含表，就别指望能获取到任何真实数据。你仅限于使用数据字面量和一些内置值，例如当前时间。如果你真的想包含真实数据，你将需要使用稍后会学到的子查询。\n\
  \n只要我们想在不涉及真实表的情况下测试计算，就可以使用此功能。\n\n## 模拟变量\n\n我们的一些示例将使用一组任意值。在编码中，当你要设置临时值时，会创建一个变量。例如，在\
  \ JavaScript 中，你可以这样设置一个变量：\n\n```\nvar a = 23;\n```\n\n一些 DBMS 确实有类似的功能，但我们将采用使用纯\
  \ SQL 的不同方法。假设，例如，你想设置一个任意税率，并将其应用于价格表。你可以这样做：\n\n```\nWITH vars AS (SELECT 0.1\
  \ AS taxrate)\nSELECT\nid, title, price, price*taxrate AS tax\nFROM paintings, vars;\n\
  ```\n\n这给我们提供了一个简单的价格列表：\n\n| id | title | price | tax |\n| --- | --- | --- | ---\
  \ |\n| 1222 | Haymakers Resting | 125.00 | 12.500 |\n| 251 | Death in the Sickroom\
  \ | 105.00 | 10.500 |\n| 2190 | Cache-cache (Hide-and-Seek) | 185.00 | 18.500 |\n\
  | 1560 | Indefinite Divisibility | 125.00 | 12.500 |\n| 172 | Girl with Racket and\
  \ Shuttlecock | 195.00 | 19.500 |\n| 2460 | The Procession to Calvary | 165.00 |\
  \ 16.500 |\n| ~ 1273 行 ~ |\n\n*   `WITH` 子句创建了一个（在此例中）一行一列的虚拟表。\n\n    这个虚拟表被称为公用表表达式（CTE）。你可以随意命名它；这里它被称为\
  \ `vars`，这是“变量”的常用缩写。\n*   `FROM` 子句将真实的 `paintings` 表与虚拟表结合起来，实际上是添加了另一列。\n\n \
  \   从技术上讲，这称为交叉连接（CROSS JOIN），它将 `vars` 虚拟表的每一行（一行）与 `paintings` 表的每一行进行组合。\n\n\
  在这个简单的例子中，你本可以在计算中直接使用 `price*0.1` 并省去额外的代码。然而，在更复杂的示例中，以这种方式使用 CTE 可以使你的代码更易于管理和阅读。\n\
  \n你将在第 6 章学习更多关于连接表的内容。在接下来的章节中，你也将学习更多关于使用 CTE 的知识。\n\n## 一些基本计算\n\n一般来说，在计算时可以考虑三种基本数据类型：\n\
  \n*   数字用于计数或测量某物，或指示某种顺序。有些东西看起来像数字，例如电话号码，但实际上并不执行上述任何操作，因此它们不符合条件。\n*   日期用于指示某事发生的时间。它们也可能包括时间，在某些情况下还包括时区。\n\
  *   其余的基本都是字符串。字符串是一串字符，它们可能具有也可能不具有文本意义。SQL 也将字符串称为字符数据。\n\n### 基本数字计算\n\n对于数字，SQL\
  \ 支持基本的算术运算。例如：\n\n```\nSELECT id, title, price, price*0.1 AS tax\nFROM paintings;\n\
  ```\n\n请注意，有些价格是 `NULL`。自然地，计算结果也是 `NULL`。\n\n根据 DBMS 的不同，可能还有其他数学函数。\n\n### 基本字符串计算\n\
  \n至于字符串，只有一种基本计算：\n\n| fullname |\n| Judy Free |\n| Ray Gunn |\n| Ray King |\n|\
  \ Ivan Inkling |\n| Drew Blood |\n| Seymour Sights |\n| ~ 304 行 ~ |\n\n```\n-- \
  \ 标准\nSELECT givenname || ' ' || familyname AS fullname\nFROM customers;\n--  MSSQL\n\
  SELECT givenname + ' ' + familyname AS fullname\nFROM customers;\n--  MySQL\nSELECT\
  \ concat(givenname,' ',familyname) AS fullname\nFROM customers;\n```\n\n此操作称为串联（concatenation），它将字符串连接在一起。\n\
  \n请注意，Microsoft SQL Server 使用加号（`+`）运算符，这在更复杂的例子中会引起一些混淆。\n\n如果你在 MySQL/MariaDB\
  \ 中尝试此操作，它可能无法工作。在传统模式下，MySQL/MariaDB 将 `||` 运算符视为逻辑运算符；在 ANSI 模式下，它应该有效。\n\n如果你使用的是\
  \ MySQL/MariaDB，请记住你可以通过以下方式切换到 ANSI 模式：\n\n```\nSET SESSION sql_mode = 'ANSI';\n\
  SELECT givenname || ' ' || familyname AS fullname;\n```\n\n`concat()` 函数适用于大多数 DBMS，但\
  \ SQLite 不适用。\n\n### 基本日期计算\n\n另一方面，日期的处理要复杂得多。即使是基本操作，你也需要一些额外的工作，这将在后面讨论。\n\n\n\
  ## 处理空值\n\n总是存在你需要与一些 `NULL` 值进行计算的风险。例如：\n\n| id | givenname | familyname | inches\
  \ |\n| --- | --- | --- | --- |\n| 474 | Judy | Free |   |\n| 186 | Ray | Gunn |\
  \ 64.48… |\n| 144 | Ray | King | 69.60… |\n| 179 | Ivan | Inkling | 67.04… |\n|\
  \ 475 | Drew | Blood | 67.32… |\n| 523 | Seymour | Sights | 65.86… |\n| ~ 304 行\
  \ ~ |\n\n```sql\nSELECT\n  id, givenname, familyname,\n  height/2.54 as inches\n\
  FROM customers;\n```\n\n许多行的 `height` 是 `NULL`。如你所见，它们的结果也是 `NULL`：如果你不知道一个值，那么无论你尝试对它做什么，你仍然不知道。这对于所有数据类型都是正确的。\n\
  \n一个你可以做的事情是过滤掉这些行：\n\n```sql\nSELECT\n  id, givenname, familyname,\n  height/2.54\
  \ as inches\nFROM customers\nWHERE height IS NOT NULL;\n```\n\n然而，有时你可以对缺失值进行猜测，或者至少用一个合理的替代值来填充。为了生成替代值，你可以使用\
  \ `coalesce(original, alternative)` 函数。\n\n例如，有一个包含许多电话号码的员工表：\n\n```sql\nSELECT\
  \ id, givenname, familyname, phone FROM employees;\n```\n\n这给出了名字和一些电话号码：\n\n| id\
  \ | givenname | familyname | phone |\n| --- | --- | --- | --- |\n| 26 | Mildred\
  \ | Thisenthat | 0491570159 |\n| 2 | Clarisse | Cringinghut | 0491571491 |\n| 3\
  \ | Joe | Kerr |   |\n| 5 | Norris | Toof |   |\n| 20 | Jim | Pills |   |\n| 17\
  \ | Harold | Prott |   |\n| ~ 34 行 ~ |\n\n有些电话号码缺失，但这并不一定意味着无法联系到这些人。对于这些缺失的电话号码，你可以用公司号码替代：\n\
  \n| id | givenname | familyname | phone |\n| --- | --- | --- | --- |\n| 26 | Mildred\
  \ | Thisenthat | 0491570159 |\n| 2 | Clarisse | Cringinghut | 0491571491 |\n| 3\
  \ | Joe | Kerr | 1300975707 |\n| 5 | Norris | Toof | 1300975707 |\n| 20 | Jim |\
  \ Pills | 1300975707 |\n| 17 | Harold | Prott | 1300975707 |\n| ~ 34 行 ~ |\n\n```sql\n\
  SELECT\n  id, givenname, familyname,\n  coalesce(phone,'1300975707') AS phone\n\
  FROM employees;\n```\n\n有时，情况可能更明显。例如，`saleitems` 表包含了每个商品的数量 (`quantity`)：\n\n\
  | id | saleid | paintingid | quantity | price |\n| --- | --- | --- | --- | --- |\n\
  | 1505 | 619 | 495 | 1 | 190.00 |\n| 3278 | 1324 | 806 | 1 | 145.00 |\n| 5505 |\
  \ 2203 | 1585 |   | 105.00 |\n| 806 | 329 | 1643 | 1 | 130.00 |\n| 5805 | 2321 |\
  \ 1713 | 3 | 105.00 |\n| 1416 | 586 | 2147 | 3 | 160.00 |\n| 367 | 147 | 630 | 1\
  \ | 200.00 |\n| 497 | 202 | 2290 | 2 | 180.00 |\n| 188 | 78 | 2186 |   | 155.00\
  \ |\n| 964 | 395 | 701 | 1 | 190.00 |\n| ~ 6315 行 ~ |\n\n```sql\nSELECT\n  id, saleid,\
  \ paintingid, quantity, price\nFROM saleitems;\n```\n\n在这里，你会看到一些数量是 `NULL`。如果不知道数量，包含一个销售项目是没有意义的，但你可以合理地猜测，如果他们没有说明其他情况，那么数量应该是\
  \ `1`。你可以使用 `coalesce()` 来实现这个猜测：\n\n```sql\nSELECT\n  id, saleid, paintingid,\n\
  \  coalesce(quantity,1) AS quantity, price\nFROM saleitems;\n```\n\n我们现在为每个项目都有了一个可行的数量：\n\
  \n| id | saleid | paintingid | quantity | price |\n| --- | --- | --- | --- | ---\
  \ |\n| 1505 | 619 | 495 | 1 | 190.00 |\n| 3278 | 1324 | 806 | 1 | 145.00 |\n| 5505\
  \ | 2203 | 1585 | 1 | 105.00 |\n| 806 | 329 | 1643 | 1 | 130.00 |\n| 5805 | 2321\
  \ | 1713 | 3 | 105.00 |\n| 1416 | 586 | 2147 | 3 | 160.00 |\n| 367 | 147 | 630 |\
  \ 1 | 200.00 |\n| 497 | 202 | 2290 | 2 | 180.00 |\n| 188 | 78 | 2186 | 1 | 155.00\
  \ |\n| 964 | 395 | 701 | 1 | 190.00 |\n| ~ 6315 行 ~ |\n\n你也可以合理地认为，如果 `1` 是明显的值，那么它应该被内建为表的默认值。然而，你并不总能控制表应该如何设计。\n\
  \n有时，最好的替代是空，或者至少看起来像是空的东西。例如，在 `artists` 表中，有一些缺失的名字。如果你尝试连接它们，你的结果也会是 `NULL`：\n\
  \n```sql\nSELECT\n  id, givenname, familyname,\n  givenname||' '||familyname AS\
  \ fullname\n--  givenname+' '+familyname AS fullname    --  MSSQL\nFROM artists;\n\
  ```\n\n以下是一些缺失名字的结果：\n\n| id | givenname | familyname | fullname |\n| --- | ---\
  \ | --- | --- |\n| 215 |   | Cuyp |   |\n| 349 | Armand | Guillaumin | Armand Guillaumin\
  \ |\n| 345 | Paolo | Uccello | Paolo Uccello |\n| 341 | Auguste | Rodin | Auguste\
  \ Rodin |\n| 284 | Domenico | Ghirlandaio | Domenico Ghirlandaio |\n| 2 | Charles\
  \ | de La Fosse | Charles de La Fosse |\n| ~ 187 行 ~ |\n\n虽然从技术上讲，说如果你不知道名字，你就不知道全名是正确的，但更实用的说法是这无关紧要。在这种情况下，我们可以将缺失的名字以及其后的空格\
  \ `coalesce` 为空字符串 (`''`)：\n\n```sql\nSELECT\n  id, givenname, familyname,\n  coalesce(givenname||'\
  \ ','') || familyname AS fullname\n--  coalesce(givenname+' ','') + familyname AS\
  \ fullname --  MSSQL\nFROM artists;\n```\n\n现在我们为每个人都有了一个名字：\n\n| id | givenname\
  \ | familyname | fullname |\n| --- | --- | --- | --- |\n| 215 |   | Cuyp | Cuyp\
  \ |\n| 349 | Armand | Guillaumin | Armand Guillaumin |\n| 345 | Paolo | Uccello\
  \ | Paolo Uccello |\n| 341 | Auguste | Rodin | Auguste Rodin |\n| 284 | Domenico\
  \ | Ghirlandaio | Domenico Ghirlandaio |\n| 2 | Charles | de La Fosse | Charles\
  \ de La Fosse |\n| ~ 187 行 ~ |\n\n记住以下关于 `coalesce()` 的要点：\n\n*   仅当替代值是明显或无害的时候才使用\
  \ `coalesce()`。确定什么是明显或无害的取决于你。\n*   一旦你使用了 `coalesce()`，你就无法分辨结果是真实的还是猜测的。\n\n\
  `NULL` 的存在一直是数据库开发人员痛苦的根源。请记住，它代表一个缺失的值，你需要做的一件事就是找出它为什么缺失以及这是否重要。\n\n## 使用别名\n\n\
  当你计算值时，你生成了另一列，但 SQL 不知道该怎么称呼它。如果你在控制台运行 `SELECT` 查询，你可能会看到一些虚拟名称，如“Unnamed Column”，或者你用于计算的表达式。然而，那不是一个真正的名称，当你需要更严肃地对待这个语句时，它会因为缺乏一个合适的名称而失败。\n\
  \n`SELECT` 语句的结果是一个虚拟表，和真实表一样，每一列都必须有一个唯一的名称。为了给计算列一个名称，你使用 `AS` 关键字来创建一个**别名**：\n\
  \n```sql\nSELECT\n  id, givenname, familyname,\n  height/2.54 AS inches\nFROM customers;\n\
  ```\n\n这里，计算的别名是 `inches`。\n\n你可以为别名使用任何*有效*的名称，甚至是另一列的名称：\n\n```sql\nSELECT\n \
  \ id, givenname, familyname,\n  height/2.54 AS email    --  probably a bad idea\n\
  FROM customers;\n```\n\n然而，如果你开始做这种事情，你可能会让包括你自己在内的所有人感到困惑：\n\n| id | givenname\
  \ | familyname | email |\n| --- | --- | --- | --- |\n| 474 | Judy | Free |   |\n\
  | 186 | Ray | Gunn | 64.48… |\n| 144 | Ray | King | 69.60… |\n| 179 | Ivan | Inkling\
  \ | 67.04… |\n| 475 | Drew | Blood | 67.32… |\n| 523 | Seymour | Sights | 65.86…\
  \ |\n| ~ 304 行 ~ |\n\n你可以为任何你喜欢的列设置别名，即使它不是一个计算值：\n\n```sql\nSELECT\n  id,\n  givenname\
  \ AS firstname, familyname AS lastname,\n  height/2.54 AS email    --  still probably\
  \ a bad idea\nFROM customers;\n```\n\n你可能为现有列设置别名的一个原因是，你认为原始的列名不适合你的目的：它们可能不够清晰，或者使用这些数据的软件期望不同的名称。\n\
  \n\n### 不使用 AS 的别名\n\n此时的 SQL 有一个你可能认为的主要设计缺陷：`AS` 关键字是可选的，并且任何空格都会生成一个别名：\n\n|\
  \ id | firstname | lastname | email |\n| --- | --- | --- | --- |\n| 474 | Judy |\
  \ Free |   |\n| 186 | Ray | Gunn | 64.48… |\n| 144 | Ray | King | 69.60… |\n| 179\
  \ | Ivan | Inkling | 67.04… |\n| 475 | Drew | Blood | 67.32… |\n| 523 | Seymour\
  \ | Sights | 65.86… |\n| ~ 304 行 ~ |\n\n```sql\n--  不推荐：\nSELECT\nid,\ngivenname\
  \ firstname, familyname lastname,\nheight/2.54 email   --  说真的，这很可能是个坏主意\nFROM customers;\n\
  ```\n\n正如示例中第一个注释所示，我们不推荐这种做法。这里有两个你在 SQL 职业生涯中迟早可能会犯的错误：\n\n```sql\n--  尾随逗号：\n\
  SELECT\nid,\ngivenname,\nfamilyname,\nFROM customers;\n```\n\n第一个错误是当你得意忘形时，在最后一列之后添加了一个多余的逗号。SQL\
  \ 会直接拒绝执行，你会得到一个 `语法错误`：SQL 无法理解你的语句。\n\n这是你将会犯的另一个错误：\n\n```sql\n--  缺失逗号：\nSELECT\n\
  id\ngivenname,\nfamilyname\nFROM customers;\n```\n\n从技术上讲，这不是一个错误：\n\n| givenname\
  \ | familyname |\n| --- | --- |\n| 474 | Free |\n| 186 | Gunn |\n| 144 | King |\n\
  | 179 | Inkling |\n| 475 | Blood |\n| 523 | Sights |\n| ~ 304 行 ~ |\n\n这一次，语句会执行，但你会得到错误的结果。SQL\
  \ 会将 `givenname` 解释为 `id` 的别名，因为它紧跟在空格之后。这被称为 `逻辑错误`：它能运行，但并非你的本意。\n\n这类错误可能非常难以识别，尤其是当你有大量外观相似的数据列时。\n\
  \n除了非常小心之外，*没有办法* 防止这类错误。我们建议你*始终*使用 `AS` 来定义别名。这虽然不能避免错误，但可能会让缺失的逗号更显眼一些。\n\n###\
  \ 拗口的别名\n\n你也可以用双引号将别名括起来：\n\n```sql\nSELECT\nid, givenname, familyname,\nheight/2.54\
  \ AS \"inches\" --  加引号的别名\nFROM customers;\n```\n\n在这种情况下，双引号是不必要的，但无疑能明确表示 `inches`\
  \ 是一个别名。\n\n同样，如果你使用的是 MariaDB/MySQL，你应该将其置于 ANSI 模式。否则，双引号将被解释为字符串。\n\n如果不需要，SQL\
  \ 为什么允许你用引号括住列名呢？在某些情况下，列名对 SQL 来说可能不清晰。例如，你可能记得有一个名为 `badtable` 的表，里面全是糟糕的列名：\n\
  \n| customer code | customer | order | 1st | 42 | last-date |\n| --- | --- | ---\
  \ | --- | --- | --- |\n| 23 | Fred | 42 | 2020-01-01 | Life, … | 2020-01-31 |\n\
  | 37 | Wilma | 54 | 2020-02-01 | I think … | 2020-02-29 |\n\n```sql\nSELECT * FROM\
  \ badtable;\n```\n\n以下是一些可能出现的问题：\n\n首先，列名可能与 SQL 关键字相同，例如，如果一列名为 `order`，它将与 `ORDER\
  \ BY` 混淆：\n\n```sql\n--  SQL 关键字\nSELECT order    --    语法错误\nFROM sales;\n```\n\
  \n列名可能是一个数字，或以数字开头，这通常是无效的。例如：\n\n```sql\n--  数字\nSELECT 1st, 42  --    解释为：1 作为\
  \ st，42\nFROM events;\n```\n\n这里，你会得到 *值* `1` 和 `42`，这是合法的；然而，第一个会获得一个别名，而第二个则是匿名的。\n\
  \n列名可能包含空格或其他会被误解的字符。例如：\n\n```sql\n--  无效字符\n--  解释为：customer 作为 code，last - date\n\
  SELECT customer code, last-date\nFROM data;\n```\n\n它们都被误解了。第二个情况更糟，因为它看起来像是对两个不存在的列进行减法运算。\n\
  \n通常，如果列名有问题，就需要使用双引号。这有时是草率设计的结果，数据库开发者应该学会避免有问题的名称。\n\n一些数据库管理系统有双引号的替代方案：\n\n\
  *   MSSQL 允许方括号（`[ … ]`）作为替代。尽管他们似乎更喜欢方括号，但这在你的代码中造成了另一个不必要的不兼容性，你应该使用双引号。\n*  \
  \ MySQL/MariaDB 允许所谓的反引号（`` ` … ` ``）作为替代。在 ANSI 模式下，你应该避免使用它们，而使用双引号。然而，在传统模式下，你没有其他选择。\n\
  \n在这里，我们将使用双引号，并且仅在需要时才使用。\n\n## 数字计算\n\nSQL 的核心数据类型之一是数字。数字有多种变体：\n\n*   **整数**\
  \ 数是整数。变体包括数字范围以及是否包含负数。\n*   **小数**，也称为 **数值**，有预定义的小数位数。历史上，它们被称为定点数。\n*   **浮点数**，也称为\
  \ **实数**，具有可变的小数位数。\n\n存在如此多变体的原因是为了存储和处理。你可以根据精度和范围决定为每个值使用多少存储空间。整数也是最易于处理的，其次是定点数，然后是浮点小数。浮点数的精度也较低。\n\
  \nSQL 提供了使用 **算术运算符** 和 **数学函数** 进行计算的能力：\n\n*   算术运算符执行你在学校早期学到的基本算术。\n*   数学函数执行更复杂的操作，其中许多可能是你在学校后期学到的。\n\
  \n不同类型名称的命名很不幸：“decimal” 和 “numeric” 过于笼统，数学家认为前面提到的所有类型都是 “实数”。我们经常会在更宽松的意义上使用\
  \ “decimal” 一词来包括非整数类型，而 “numeric” 一词通常会在其标准意义上被使用，指代任何与数字相关的事物。\n\n### 算术运算符\n\n\
  你已经见过 SQL 中的一个简单计算：\n\n```sql\nSELECT\nid, givenname, familyname,\nheight/2.54 AS\
  \ inches\nFROM customers;\n```\n\n所有数据库管理系统都识别四种基本算术运算符：`+`、`-`、`*` 和 `/`。请注意，当你组合这些操作时，SQL\
  \ 遵循通常的规则：\n\n```sql\nSELECT 1+2*3;   --  1+6 = 7         而不是 9\nSELECT 12/2*3;\
  \  --  6*3 = 18        而不是 2\n```\n\n正如你在学校学到的：\n\n*   在加法或减法*之前*进行乘法或除法。这称为运算符优先级。\n\
  *   *相同*优先级的运算符从左到右执行。这称为结合性。\n\n当然，你可以随时使用括号 `( … )` 来覆盖这些规则：\n\n```sql\nSELECT\
  \ (1+2)*3;     --  3*3 = 9     而不是 7\nSELECT 12/(2*3);    --  12/6 = 2    而不是 18\n\
  ```\n\n你也可以包含更复杂的括号组合：\n\n```sql\nSELECT 2 * (3 + 4) + 3 * (4 + 5)    --  2*7+3*9\
  \ = 14+27 = 41\n```\n\n这里的原理是，在处理其他部分*之前*先处理括号。\n\n\n### 整数\n\n从数学上讲，整数是完整的数字，可以是正数、负数或零。你可以将任意两个整数相加、相减或相乘，都会得到另一个整数。问题在于当你尝试将两个整数相除时：有时结果*不是*另一个整数。在行业中，我们说整数在除法运算下不是**封闭**的。\n\
  \n在普通计算器上，它只有一个功能，所有数字都被视为小数；整数是末尾带`.0`的小数。在数据库上，其主要功能是存储和管理数据，小数处理起来更复杂，且与更容易处理的整数相区别。\n\
  \n这一点的实际影响体现在你运行以下语句时：\n\n```sql\nSELECT 200/7;\n```\n\n你可能得不到预期的结果。\n\nSQLite、PostgreSQL\
  \ 和 MSSQL 会给你一个 `28` 的结果，这是截短的：`28*7 = 196`。将此计算视为纯整数运算，任何余数，无论多大，都会被忽略。而 MySQL/MariaDB\
  \ 和 Oracle 则会返回一个小数结果 `28.57…`。\n\n如果你从表中提取真实数据，情况也是如此：\n\n```sql\nSELECT\nid, quantity,\
  \ quantity/3 AS third\nFROM saleitems;\n```\n\n在 `saleitems` 表中，`quantity` 绝对是一个整数，前述的三个数据库管理系统（DBMS）会截断结果，而其他的则会返回小数。\n\
  \n| id | quantity | third |\n| --- | --- | --- |\n| 2621 | 3 | 1 |\n| 5169 | 1 |\
  \ 0 |\n| 667 | 1 | 0 |\n| 6905 | 3 | 1 |\n| 886 | 1 | 0 |\n| 6729 | 2 | 0 |\n| ~\
  \ 共 6315 行 ~ |\n\n如果你在末尾添加一个 `.0`，可以强制其他数据库管理系统将数字视为小数：\n\n```sql\nSELECT 200/7\
  \ AS plain, 200.0/7 as decimalised;\n```\n\n只要至少有一个数是小数形式，具体哪个数被小数化并不重要。\n\n如果你只使用列数据进行计算，将无法在末尾添加\
  \ `.0`。相反，你需要使用 `cast()` 函数将类型从整数更改为小数。例如：\n\n```sql\nSELECT cast(200 as float)/cast(7\
  \ as float);\n```\n\n`float` 数据类型是浮点小数（它可以有任意多的小数位）。\n\n你也可以反过来，将小数转换为整数：\n\n```sql\n\
  SELECT cast(6.5 as int);\n```\n\n请注意，结果因数据库管理系统而异：\n\n*   对于 PostgreSQL、MySQL/MariaDB\
  \ 和 Oracle，整数将使用经典的 4/5 规则（即四舍五入）进行舍入；这里的结果将是 7。\n*   对于 MSSQL 和 SQLite，小数部分将被丢弃，无论它有多大。这称为截断小数。\n\
  \n如果你确实想截断小数，一些数据库管理系统有一个专门的 `floor()` 函数来完成这项工作。\n\n稍后你将看到更多关于 `cast()` 的内容。\n\n\
  ### 余数\n\n如果你正在处理整数除法，有时可能只想要余数。许多数据库管理系统使用 `%` 运算符来实现这一点：\n\n```sql\nSELECT 200/7,\
  \ 200.0/7, 200%7;   --  非 Oracle\n```\n\n这*通常*被称为**取模**（\"mod\"）运算符，尽管严格来说它并不是真正的数学取模运算。区别在于如何处理负数。它实际上是一个**取余**运算符。\n\
  \n如果你在 Oracle 中尝试这个，会因为不支持 `%` 而收到错误。相反，你应该使用 `mod()` 函数：\n\n```sql\n--  Oracle\n\
  SELECT 200/7, 200.0/7, mod(200,7) FROM dual;\n```\n\n同样，这严格来说不是取模运算，而是取余运算。Oracle\
  \ 确实有一个 `remainder()` 函数，但它既不返回真正的模数，也不返回真正的余数。\n\n为什么取余运算有用？有许多值是周期性的，例如星期几或一年中的月份。要计算\
  \ 200 天后是星期几，你可以取其 `200%7 = 4` 的余数，并将其加到今天。月份也一样：取余数 `200%12 = 8`，并将其加到当前月份。\n\n\
  ### 额外的小数位\n\n当除以 7 时，你会遇到小数的一个基本问题：任何除数（除了 2 或 5）都会导致无限循环小数。根据数据库管理系统，你最终可能会得到几位甚至很多位小数，但这（a）从不精确，并且（b）可能无论如何都超出了你的需要。\n\
  \n从数学上讲，数字 `3`、`3.0` 和 `3.00` 是相同的。然而，当这些数字用于分析时，例如在科学和统计中，小数位数被用来暗示精度：`3.0` 精确到最接近的十分位（`0.1`），但不保证百分位或更进一步的精度。六位小数暗示结果精确到百万分之一。\n\
  \n你可以在 `height` 计算中看到这一点：\n\n```sql\nSELECT\nid, givenname, familyname,\nheight/2.54\
  \ as inches\nFROM customers;\n```\n\n由于算术运算，结果有*许多*位小数，但没有人会声称该测量值精确到十分之一英寸以上。\n\
  \n通常的解决方案是将小数四舍五入到几位小数：\n\n```sql\nSELECT\nid, givenname, familyname,\nround(height/2.54,2)\
  \ as inches\nFROM customers;\n```\n\n这给出了更现实的结果：\n\n| id | givenname | familyname\
  \ | inches |\n| --- | --- | --- | --- |\n| 474 | Judy | Free |   |\n| 186 | Ray\
  \ | Gunn | 64.49 |\n| 144 | Ray | King | 69.61 |\n| 179 | Ivan | Inkling | 67.05\
  \ |\n| 475 | Drew | Blood | 67.32 |\n| 523 | Seymour | Sights | 65.87 |\n| ~ 共 304\
  \ 行 ~ |\n\n`round()` 函数将第一个数四舍五入到指定的位数。如果后续数字是 5 或更大，它会正确调整最后一位：即所谓的 \"`4/5`\" 规则（四舍五入）。\n\
  \n一些数据库管理系统，如 SQL Server，可能仍然会显示额外的小数位，即使它们都是零。\n\n接下来你将看到更多关于此函数和其他函数的内容。\n\n###\
  \ 数学函数\n\n数学函数对数字执行更复杂的操作。SQL 标准对这些函数几乎没有规定，因此你会发现它们的可用性、行为甚至名称在不同数据库管理系统之间可能有所不同。\n\
  \n以下是一些数学函数的示例：\n\n```sql\n--  PostgreSQL, MariaDB/MySQL, MSSQL\nSELECT\npi() AS\
  \ pi,\nsin(radians(45)) AS sin45,  --  三角函数使用弧度\nsqrt(2) AS root2,           --\
  \  √2\nlog10(3) AS log3,\nln(10) AS ln10,             --  自然对数\npower(4,3) AS four_cubed\
  \    --  4³\n;\n\n--  Oracle\nSELECT\nacos(-1) AS pi,                 --  不同\nsin(45*acos(-1)/180)\
  \ AS sin45,  --  不同\nsqrt(2) AS root2,\nlog(10,3) AS log3,              --  不同\n\
  ln(10) AS ln10,\npower(4,3) AS four_cubed\nFROM dual;\n```\n\n如前面的代码所示，Oracle 有一组稍有不同的函数，而\
  \ SQLite 则完全没有这些函数。\n\n另外，请注意三角函数不使用角度：那太简单了。相反，它们使用弧度，这涉及到 π 的值（大约 3.142…）。Oracle\
  \ 通过没有 `pi()` 或 `radians()` 函数使这一点复杂化，因此这是使用 `acos()` 函数来模拟的。\n\n\n"
- '# 近似函数


  还有一些函数可以给出一个十进制数的*近似*值。下面是一些示例：


  ```sql

  SELECT

  --  非 MariaDB/MySQL 或 Oracle

  200/7 AS integer_result,

  --  所有 DBMS

  200/7.0 AS decimal_result,

  --  Oracle: ceil(200/7.0)

  --  SQLite: round(200/7.0 + 0.5)

  ceiling(200/7.0) AS ceiling,

  --  SQLite: round(200/7.0 - 0.5)

  floor(200/7.0) AS floor,

  --  非 MSSQL

  round(200/7.0,0) AS rounded_integer,

  --  所有 DBMS

  round(200/7.0,2) AS rounded_decimal

  --  FROM DUAL   -- Oracle

  ;

  ```


  同样，不同的 DBMS 之间存在差异。前两个计算用于比较，以查看原始小数值的样子。请注意，表达式 `200/7` 可能会给出一个截断的整数，具体取决于 DBMS。


  `round()` 函数将小数四舍五入到指定的位数。如果指定位数为 `0`，则四舍五入到最接近的整数。在大多数 DBMS 中，可以省略 `0`。


  `ceiling()` 函数总是将小数*向上*舍入到下一个整数，无论小数部分有多小；而 `floor()` 函数总是将小数*向下*舍入到整数，无论小数部分有多大。这些函数在
  SQLite 中不可用，但很容易模拟。


  '
- '# 格式化函数


  格式化函数改变值的*外观*。与近似函数和其他数学函数不同，格式化函数的结果不是另一个数字，而是一个字符串；这是改变数字显示方式的唯一途径。


  同样，不同的 DBMS 有截然不同的函数。


  例如，以下是一些将数字格式化为带货币符号和千位分隔符的货币格式的方法。在这个例子中，我们为美元和可能的欧元进行格式化：


  ```sql

  --  PostgreSQL, Oracle

  --  当前区域设置

  SELECT to_char(total,''FML999G999G999D00'')

  FROM sales;

  --  手动区域设置

  SELECT to_char(total,''FM$999,999,999.00'')

  FROM sales;

  --  MariaDB/MySQL

  SET SESSION sql_mode = ''ANSI'';

  --  当前区域设置

  SELECT ''$''||format(total,2)

  FROM sales;

  --  手动区域设置

  SELECT ''€''||format(total,2,''de_DE'')

  FROM sales;

  --  MSSQL

  --  当前区域设置

  SELECT format(total,''c'')

  FROM sales;

  --  特定区域设置

  SELECT format(total,''c'',''nl-NL''))

  FROM sales;

  --  手动

  SELECT format(total,''€###,###,###.00'',''de-de'')

  FROM sales;

  --  SQLite

  SELECT printf(''$%,d.%02d'',total,round(total*100)%100)

  FROM sales;

  ```


  在所有情况下，我们都试图使用本地货币或特定替代方案来格式化数字。有时，这意味着需要自己添加货币符号。


  注意


  -   PostgreSQL 和 Oracle 都有一个灵活的 `to_char()` 函数，也可用于格式化日期。

  -   MariaDB/MySQL 使用 `format()` 函数，该函数添加千位分隔符和小数位；你还可以让它针对不同的区域设置进行调整。

  -   MSSQL 有自己的 `format()` 函数，其格式代码更直观；它也能适应区域设置，并可用于格式化日期。

  -   SQLite 只有一个通用的 `printf()` 函数，程序员可能更熟悉；SQLite 假定你将在宿主应用程序（如 PHP 或嵌入 SQLite 的任何地方）中格式化数据。


  请注意，如果你确实对一个数字使用了格式化函数，*它就不再是数字了*！如果你只是看看它，那没关系。但是，如果你计划进行进一步的计算，或者对结果进行排序，那么格式化的数字很可能会适得其反。


  归根结底，在 SQL 中你可能不会做太多格式化。SQL 的主要目的是*获取*数据并为下一步做准备。格式化通常是最后一步，并且经常在其他软件中完成。


  '
- '# 日期计算


  日期计算在不同的 DBMS 之间差异是出了名的大。除此之外，日期还可能包含时间部分；通常这被称为“日期时间”或“时间戳”。在这里，我们简单地称其为“日期”。


  对于大多数操作，DBMS 倾向于依赖函数。


  通常，你想对日期做的三件事是：


  -   简单计算：计算日期之间的差异，并将日期偏移一定量。

  -   提取日期的部分，如月份或年份。

  -   格式化日期。


  以下是你可以对日期执行的主要计算的概述。


  SQLite 处理日期的方法完全不同。这部分是因为它实际上不支持日期。因此，接下来的大部分讨论中都不会涉及 SQLite。附录 3（补充说明）包含一些关于在 SQLite
  中处理日期的信息。


  ## 简单计算


  一个你需要获取的重要值是当前日期和时间。在大多数 DBMS 中，你可以使用 `current_timestamp`：


  ```sql

  SELECT current_timestamp;   --  Oracle: FROM dual;

  ```


  一些 DBMS 还有各种函数来获取相同的结果，例如 MariaDB 的 `now()` 或 MSSQL 的 `getdate()`。但是，它们给出的结果相同。SQLite
  没有直接的版本，因为它不原生支持日期；不过，需要时，字符串 `''now''` 可以完成这项工作。


  从这里开始，情况变得复杂。以下是一些添加 4 个月的例子：


  ```sql

  --  PostgreSQL

  SELECT

  date ''2015-10-31'' + interval ''4 months'',

  current_timestamp + interval ''4 months'',

  current_timestamp + interval ''4'' month  --  相同

  ;

  --  MariaDB/MySQL

  SELECT

  date_add(''2015-10-31'',interval 4 month),

  date_add(current_timestamp,interval 4 month),

  current_timestamp + interval ''4'' month  --  相同

  ;

  --  MSSQL

  SELECT

  dateadd(month,4,''2015-10-31''),

  dateadd(month,4,current_timestamp)

  ;

  --  Oracle

  SELECT

  add_months(''31 Oct 2015'',4),

  current_timestamp + interval ''4'' month,

  add_months(current_timestamp,4) --  同样有效

  FROM dual;

  --  SQLite

  SELECT

  strftime(''%Y-%m-%d'',''2015-10-31'',''+4 month''),

  strftime(''%Y-%m-%d'',''now'',''+4 month'')

  ;

  ```


  根据运行代码的时间，你会得到类似这样的结果：


  | 指定日期 | 当前时间戳 |

  | --- | --- |

  | 2016-02-29 00:00:00 | 2023-07-28 13:15:29.066381+10 |


  这里重要的是，前面所有的例子都足够智能，可以处理不同长度的月份；添加 4 个月可能意味着从 120 天到 123 天不等，但前面的计算会为此进行调整。但是，如果结果超出了当月最后一天，除了
  SQLite，其他都会限制在当月最后一天；SQLite 会进入下一个月。




  ### 年龄计算


  一个重要的计算是找出两个日期之间的差值，例如计算年龄。这里的问题在于，真实结果通常不是整年（或整月，或你所测量的单位）。例如，PostgreSQL 提供了 `age()`
  函数：


  ```sql

  --  PostgreSQL

  SELECT id, givenname, familyname, dob, age(dob)

  FROM customers;

  ```


  这将给出年龄：


  | id | givenname | familyname | dob | age |

  | --- | --- | --- | --- | --- |

  | 474 | Judy | Free | 1978-04-01 | 44 years 11 mons 2 days |

  | 186 | Ray | Gunn |   |   |

  | 144 | Ray | King |   |   |

  | 179 | Ivan | Inkling |   |   |

  | 475 | Drew | Blood | 1989-12-06 | 33 years 2 mons 28 days |

  | 523 | Seymour | Sights | 1965-01-06 | 58 years 1 mon 28 days |

  | ~ 304 rows ~ |


  然而，结果类似于 `38 years 6 mons 7 days`，如果你真的需要那样的细节，这已经相当不错了。得到的表达式被称为 `interval`（时间间隔）。时间间隔是
  PostgreSQL 中日期计算的重要组成部分。


  但大多数时候，你可能只需要年数（或月数等），因此以下计算可能更合适：


  ```sql

  --  PostgreSQL

  SELECT

  id, givenname, familyname, dob,

  age(dob) AS interval,

  extract(year from age(dob)) AS samething

  FROM customers;


  --  MariaDB/MySQL

  SELECT

  id, givenname, familyname, dob,

  timestampdiff(year,dob,current_timestamp) AS age

  FROM customers;


  --  MSSQL

  SELECT

  id, givenname, familyname, dob,

  datediff(year,dob,current_timestamp)

  AS age --  但不完全准确！

  FROM customers;


  --  Oracle

  SELECT

  id, givenname, familyname, dob,

  trunc(months_between(current_timestamp,dob)/12)

  AS age

  FROM customers;


  --  SQLite

  SELECT

  id, givenname, familyname, dob,

  cast(

  strftime(''%Y.%m%d'', ''now'')

  - strftime(''%Y.%m%d'', dob)

  as int) AS age

  FROM customers;

  ```


  你会得到类似这样的结果。


  | id | givenname | familyname | dob | years |

  | --- | --- | --- | --- | --- |

  | 474 | Judy | Free | 1978-04-01 | 44 |

  | 186 | Ray | Gunn |   |   |

  | 144 | Ray | King |   |   |

  | 179 | Ivan | Inkling |   |   |

  | 475 | Drew | Blood | 1989-12-06 | 33 |

  | 523 | Seymour | Sights | 1965-01-06 | 58 |

  | ~ 304 rows ~ |   |   |   |   |


  请注意，只有 PostgreSQL 有内置函数来计算年龄。Oracle 有 `months_between()` 函数，几乎能完成这项工作；这个数字除以 12，然后
  `trunc()` 函数会去掉余数。


  在上述计算中，MSSQL 有一个简单的函数，但过于简单。它只是计算年份之间的差异，如果出生日期在年末而查询日期在年初，结果就会偏差很大。要得到更正确的结果需要更多的工作。


  ### 提取日期的部分内容


  日期的另一项技术是提取其组成部分，例如日或年。这里再次体现，不同的 DBMS 差异很大。


  SQLite 处理日期部分的方式完全不同，此处不予讨论。


  #### 在 PostgreSQL、MariaDB/MySQL 和 Oracle 中提取日期


  提取日期部分的标准方法是使用 `extract()` 函数。该函数的形式为


  ```

  extract(part from datetime)

  ```


  你可以看到 `extract()` 函数的实际应用：


  ```sql

  WITH moonshot AS (

  SELECT

  timestamp ''1969-07-20 20:17:40'' AS datetime

  --  FROM dual   --  (Oracle)

  )

  SELECT

  datetime,

  EXTRACT(year FROM datetime) AS year,        --  1969

  EXTRACT(month FROM datetime) AS month,      --  7

  EXTRACT(day FROM datetime) AS day,          --  20

  --  非 Oracle 或 MariaDB/MySQL:

  EXTRACT(dow FROM datetime) AS weekday,  --  0

  EXTRACT(hour FROM datetime) AS hour,        --  20

  EXTRACT(minute FROM datetime) AS minute,    --  17

  EXTRACT(second FROM datetime) AS second     --  40

  FROM moonshot;

  ```


  请注意，Oracle 和 MariaDB/MySQL 没有直接提取星期几的方法，如果你希望将其用于分组，这可能是个问题。然而，正如你将在后面看到的，你可以使用格式化函数来获取星期几以及前面的值。


  PostgreSQL 还提供了一个名为 `date_part(''part'',datetime)` 的函数，作为上述函数的替代。


  日期/时间 `1969-07-20 20:17:40` 是人类首次踏上月球的时间。


  #### 在 Microsoft SQL 中提取日期


  Microsoft SQL 有两个主要函数来提取日期的部分：


  *   `datepart(part,datetime)` 以数字形式提取日期/时间的组成部分。

  *   `datename(part,datetime)` 以字符串形式提取日期/时间的组成部分。对于大多数组成部分，如年份，它只是 `datepart` 数字的字符串版本。然而，对于星期几和月份，它实际上是人类可读的名称。


  你可以看到这两个函数的实际应用：


  ```sql

  WITH moonshot AS (

  SELECT cast(''1969-07-20 20:17:40'' as datetime) AS datetime

  )

  SELECT

  datepart(year, datetime) AS year,       --  又名 year()

  datename(year, datetime) AS yearstring,

  datepart(month, datetime) AS month,     --  又名 month()

  datename(month, datetime) AS monthname,

  datepart(day, datetime) AS day,         --  又名 day()

  datepart(weekday, datetime) AS weekday, --  Sunday=1

  datename(weekday, datetime) AS weekdayname,

  datepart(hour, datetime) AS hour,

  datepart(minute, datetime) AS minute,

  datepart(second, datetime) AS second

  FROM moonshot;

  ```


  注意


  *   `datename(date,year)` 只给出 `2013` 的字符串版本。

  *   有三个简短函数 `day()`、`month()` 和 `year()`，它们是 `datepart()` 的同义词。


  #### 从日期时间中提取日期


  一个明显缺失的功能是从日期时间中提取日期。最直接的方法是进行 `cast`（类型转换）：


  ```sql

  WITH moonshot AS (

  --  …

  )

  SELECT cast(thetime AS DATE) AS thedate --  1969-07-20 (非 Oracle)

  FROM moonshot;

  ```


  对于 Oracle，你需要一个稍微不同的方法。转换为日期类型实际上不会移除时间部分。相反，你应该使用 `trunc(thetime)`；它看起来不完全一样，但能起作用。


  在我们后面尝试分析包含日期和时间的数据时，你将需要这种技术。


  ### 格式化日期


  格式化日期就是以一种有用或友好的方式呈现它。通常，这涉及生成一个字符串，因为字符串是唯一能控制输出哪些字符的方式。


  与数字类似，格式化的日期不再是日期。这意味着如果你需要做任何进一步的计算或排序，可能会遇到问题。


  #### 在 PostgreSQL 和 Oracle 中格式化日期


  对于 PostgreSQL 和 Oracle，你都可以使用 `to_char` 函数。这里有两个有用的格式：


  ```sql

  --  PostgreSQL

  WITH vars AS (

  SELECT timestamp ''1969-07-20 20:17:40'' AS moonshot

  )

  SELECT

  moonshot,

  to_char(moonshot,''FMDay, DDth FMMonth YYYY'') AS full,

  to_char(moonshot,''Dy DD Mon YYYY'') AS short

  FROM vars;


  --  Oracle

  WITH vars AS (

  SELECT timestamp ''1969-07-20 20:17:40'' AS moonshot

  FROM dual

  )

  SELECT

  moonshot,

  to_char(moonshot,''FMDay, ddth Month YYYY'')

  AS fulldate,

  to_char(moonshot,''Dy DD Mon YYYY'') AS shortdate

  FROM vars;

  ```


  这应该给你以下结果：


  | moonshot | fulldate | shortdate |

  | --- | --- | --- |

  | 1969-07-20 20:17:40 | Sunday, 20th July 1969 | Sun 20 Jul 1969 |


  你会注意到 PostgreSQL 和 Oracle 之间的格式代码略有不同。


  你可以在以下链接了解更多关于格式代码的信息：


  *   PostgreSQL: [`www.postgresql.org/docs/current/functions-formatting.html#FUNCTIONS-FORMATTING-DATETIME-TABLE`](http://www.postgresql.org/docs/current/functions-formatting.html%23FUNCTIONS-FORMATTING-DATETIME-TABLE)

  *   Oracle: [`https://docs.oracle.com/en/database/oracle/oracle-database/21/sqlrf/Format-Models.html`](https://docs.oracle.com/en/database/oracle/oracle-database/21/sqlrf/Format-Models.html%5D)




  '
- '# MariaDB/MySQL 中的日期格式化


  对于 MariaDB/MySQL，有 `date_format()` 函数：


  ```sql

  WITH vars AS (

  SELECT timestamp ''1969-07-20 20:17:40'' AS moonshot

  )

  SELECT

  moonshot,

  date_format(moonshot,''%W, %D %M %Y'') AS fulldate,

  date_format(moonshot,''%a %d %b %Y'') AS shortdate

  FROM vars;

  ```


  你可以通过以下链接了解更多关于格式代码的信息：


  *   MariaDB： [`mariadb.com/kb/en/date_format/`](https://mariadb.com/kb/en/date_format/)

  *   MySQL： [`dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html`](https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html)


  '
- '# Microsoft SQL Server 中的日期格式化


  Microsoft SQL 中的 `format()` 函数也可用于日期。例如：


  ```sql

  WITH vars AS (

  SELECT cast(''1969-07-20 20:17:40'' AS datetime)

  AS moonshot

  )

  SELECT

  format(moonshot,''dddd, d MMMM yyy'') AS fulldate,

  format(moonshot,''ddd d MMM yyy'') AS shortdate

  FROM vars;

  ```


  你可以通过以下链接了解更多关于各种日期格式代码的信息：


  [`learn.microsoft.com/en-us/dotnet/standard/base-types/custom-date-and-time-format-strings`](https://learn.microsoft.com/en-us/dotnet/standard/base-types/custom-date-and-time-format-strings)


  '
- '# 使用格式化的日期按月分组


  有时，你需要获取一个细粒度的日期/时间，并按更大的组进行分析。一个*非常*有用的日期格式是类似 `yyyy-mm` 这样的截断形式。


  例如：


  ```sql

  --  PostgreSQL, Oracle

  SELECT id, ordered, to_char(ordered,''YYYY-MM'') AS month

  FROM sales;

  --  MariaDB / MySQL

  SELECT id, ordered, date_format(ordered,''%Y-%m'') AS month

  FROM sales;

  --  MSSQL

  SELECT id, ordered, format(ordered,''yyyy-MM'') AS month

  FROM sales;

  --  SQLite

  SELECT id, ordered, strftime(''%Y-%m'',ordered) AS month

  FROM sales;

  ```


  结果看起来像这样：


  | id  | 订购时间                     | month   |

  | --- | ---------------------------- | ------- |

  | 52  | 2022-03-07 16:10:45.739071   | 2022-03 |

  | 54  | 2022-03-08 00:23:39.53316    | 2022-03 |

  | 55  | 2022-03-08 06:23:28.387395   | 2022-03 |

  | 57  | 2022-03-09 00:02:29.974004   | 2022-03 |

  | 59  | 2022-03-09 06:26:24.808237   | 2022-03 |

  | 60  | 2022-03-09 15:01:05.592177   | 2022-03 |

  |  ~ 2509 行 |                              |         |


  这种格式的日期字符串将能够正确排序，因为结果长度相同且以较大的部分开头。


  你将在后面学习如何对数据进行分组。


  '
