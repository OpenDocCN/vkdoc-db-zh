  *   为了获得*完全*相同的结果，第二个查询使用了 `DISTINCT`，因为连接可能产生重复的行。


  实际上，使用连接，你还可以获取 `sales` 表中的结果，例如销售的实际金额。但是，这时你不应该使用 `DISTINCT`，因为我们谈论的是不同的销售记录：


