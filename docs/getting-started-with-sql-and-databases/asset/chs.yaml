  \ Blood | Drew | … | 1989-12-06 | … | 2022-06-13 |\n| 492 | Long | Miles | … | 1989-11-18\
  \ | … | 2022-06-21 |\n| 468 | Fer | Connie | … | 1985-09-22 | … | 2022-06-09 |\n\
  | 86 | Byrd | Dicky | … | 1980-06-02 | … | 2021-09-09 |\n| 75 | Tone | Barry | …\
  \ | 1989-07-18 | … | 2021-09-01 |\n| 306 | Noir | Bette | … | 1987-08-27 | … | 2022-01-28\
  \ |\n| ~ 59 行 ~`\n\n如果你想获取其他时间段的：\n\n```sql\n--  出生在其他时间\nSELECT *\nFROM customers\n\
  WHERE dob NOT BETWEEN '1980-01-01' AND '1989-12-31';\n```\n\n你会得到：\n\n| id | familyname\
  \ | givenname | … | dob | … | registered |\n| --- | --- | --- | --- | --- | ---\
  \ | --- |\n| 474 | Free | Judy | … | 1978-04-01 | … | 2022-06-12 |\n| 523 | Sights\
  \ | Seymour | … | 1965-01-06 | … | 2022-07-11 |\n| 341 | Idate | Val | … | 1976-06-04\
  \ | … | 2022-03-03 |\n| 351 | Tate | Dick | … | 1969-08-03 | … | 2022-03-13 |\n\
  | 588 | Skies | Grace | … | 1999-06-28 | … | 2022-08-13 |\n| 422 | Why | Wanda |\
  \ … | 1999-07-15 | … | 2022-05-05 |\n| ~ 176 行 ~ |\n\n注意 `BETWEEN` 是包含性的：范围的起始和结束日期也匹配。\n\
  \n还要注意，在所有情况下，`NULL` 出生日期都会被省略。\n\n### 使用日期计算进行过滤\n\n与字符串类似，你可以使用日期计算来过滤结果。例如，要查找年龄超过\
  \ 40 岁的客户（其出生日期在 40 年前之前）：\n\n```sql\n--  PostgreSQL, Oracle, MySQL/MariaDB\nSELECT\
  \ * FROM customers\nWHERE dob<current_timestamp -   INTERVAL '40' YEAR;\n--  MSSQL\n\
  SELECT * FROM customers\nWHERE dob<dateadd(year,-40,current_timestamp);\n--  SQLite\n\
  SELECT * FROM customers\nWHERE dob<date('now','-40 year');\n```\n\n这会给出年龄超过 40 岁的客户：\n\
  \n| id | familyname | givenname | … | dob | … | registered |\n| --- | --- | ---\
  \ | --- | --- | --- | --- |\n| 474 | Free | Judy | … | 1978-04-01 | … | 2022-06-12\
  \ |\n| 523 | Sights | Seymour | … | 1965-01-06 | … | 2022-07-11 |\n| 341 | Idate\
  \ | Val | … | 1976-06-04 | … | 2022-03-03 |\n| 351 | Tate | Dick | … | 1969-08-03\
  \ | … | 2022-03-13 |\n| 121 | Ting | Lil | … | 1964-09-17 | … | 2021-10-06 |\n|\
  \ 545 | Knife | Jack | … | 1962-09-24 | … | 2022-07-24 |\n| ~ 111 行 ~`\n\n稍后你会了解更多关于日期计算的内容。\n\
  \n## 多重断言\n\n之前的 `BETWEEN` 操作也可以写成：\n\n```sql\n--  出生在 1980 年代\nSELECT *\nFROM customers\n\
  WHERE dob>='1980-01-01' AND dob<='1989-12-31';\n```\n\n现在有两个断言：`dob >= '1980-01-01'`\
  \ 和 `dob <= '1989-12-31'`，两者都必须为真。\n\n这将给出相同的结果，并且很可能在内部，SQL 执行了相同的操作。有时，SQL 会理解你的意思并找到自己的执行方式。\n\
  \n\n### AND 与 OR\n\n`AND` 操作符通常被称为逻辑操作符，并遵循数学逻辑的规则。\n\n使用 `AND` 操作符，你还可以实现 `BETWEEN`\
  \ 的变体：\n\n```sql\n--  包含性范围（与 BETWEEN 相同）\nSELECT *\nFROM artists\nWHERE born>=1700\
  \ AND born<=1799;\n```\n\n所有这些查询应该给出相同的结果：\n\n| id | 姓氏 | 名字 | 别名 | 出生年份 | 去世年份\
  \ | 国籍 |\n| --- | --- | --- | --- | --- | --- | --- |\n| 133 | Constable | John\
  \ | constable | 1776 | 1837 | English |\n| 158 | Shaw | Joshua | shaw | 1776 | 1860\
  \ | American |\n| 78 | Turner | Joseph Mallord William | turner | 1775 | 1851 |\
  \ English |\n| 298 | Hiroshige | Ando | hiroshige | 1797 | 1858 | Japanese |\n|\
  \ 356 | Gros | Antoine-Jean | gros | 1771 | 1835 | French |\n| 208 | Feke | Robert\
  \ | feke | 1705 | 1752 | American |\n| ~ 25 行 ~ |\n\n注意，由于出生年份是离散值，你可以选择如何表达范围。\n\
  \n`AND` 操作符可以用来组合两个以上的断言。例如：\n\n```sql\nSELECT *\nFROM customers\nWHERE state='VIC'\
  \ AND height>170 AND dob<'1980-01-01';\n```\n\n这会得到一个非常有限的组：\n\n| id | 姓氏 | 名字 |\
  \ 州 | 身高 | 出生日期 |\n| --- | --- | --- | --- | --- | --- |\n| 505 | Singers | Carol\
  \ | VIC | 170.1 | 1969-07-24 |\n| 406 | Shoes | Jim | VIC | 173.5 | 1970-12-10 |\n\
  | 59 | Field | Lily | VIC | 172.1 | 1972-01-17 |\n| 537 | Rise | Theo | VIC | 176.9\
  \ | 1977-10-27 |\n| 300 | Bee | Bill | VIC | 171.3 | 1975-12-21 |\n| 380 | Downe\
  \ | Bob | VIC | 178.1 | 1976-02-24 |\n| ~ 8 行 ~ |\n\n在这种情况下，*所有*断言都必须为真。请注意，这里的三个断言彼此独立，不像前面测试同一个值的例子。\n\
  \n你也可以用 `OR` 操作符组合断言：\n\n```sql\nSELECT *\nFROM customers\nWHERE state='VIC' OR\
  \ state='QLD';\n```\n\n这里，我们得到了来自这两个合并州的客户：\n\n| id | 姓氏 | 名字 | 州 |\n| --- | ---\
  \ | --- | --- |\n| 186 | Gunn | Ray | VIC |\n| 475 | Blood | Drew | QLD |\n| 523\
  \ | Sights | Seymour | VIC |\n| 588 | Skies | Grace | QLD |\n| 305 | Net | Clara\
  \ | QLD |\n| 121 | Ting | Lil | QLD |\n| ~ 104 行 ~ |\n\n`OR` 操作符要求*至少*有一个断言为真。\n\
  \n与英语不同，`OR` 有效地组合了集合。在英语中，你*可能*说客户来自 `VIC` *和* `QLD`，但我们通常理解为不是同时来自两地。在逻辑中，我们需要说\
  \ `OR`。\n\n同样，与英语不同，逻辑 `OR` 总是**包含性**的：一个或多个断言必须为真。`OR` 操作失败的唯一情况是所有断言都为假。在英语中，“or”有时是**排他性**的（如“茶或咖啡”）；在逻辑中，情况并非如此。\n\
  \n当两个断言独立时，你会更清楚地看到这一点。例如：\n\n```sql\n--  所有条件都必须为真：\nSELECT *\nFROM customers\n\
  WHERE state='QLD' AND dob<'1980-01-01';\n```\n\n这会得到一个有限的组：\n\n| id | 姓氏 | 名字 |\
  \ 州 | 出生日期 |\n| --- | --- | --- | --- | --- |\n| 121 | Ting | Lil | QLD | 1964-09-17\
  \ |\n| 377 | Money | Xavier | QLD | 1969-07-14 |\n| 266 | Blind | Rob | QLD | 1965-12-23\
  \ |\n| 524 | Syrup | Mabel | QLD | 1978-03-09 |\n| 28 | Aphone | Meg | QLD | 1963-01-20\
  \ |\n| 201 | Soar | Dinah | QLD | 1971-06-09 |\n| ~ 16 行 ~ |\n\n将 `AND` 改为 `OR`：\n\
  \n```sql\n--  任一（或全部）条件必须为真：\nSELECT *\nFROM customers\nWHERE state='QLD' OR dob<'1980-01-01';\n\
  ```\n\n这会得到一个更混合的组：\n\n| id | 姓氏 | 名字 | 州 | 出生日期 |\n| --- | --- | --- | --- | ---\
  \ |\n| 474 | Free | Judy | NSW | 1978-04-01 |\n| 475 | Blood | Drew | QLD | 1989-12-06\
  \ |\n| 523 | Sights | Seymour | VIC | 1965-01-06 |\n| 341 | Idate | Val | NSW |\
  \ 1976-06-04 |\n| 351 | Tate | Dick | NSW | 1969-08-03 |\n| 588 | Skies | Grace\
  \ | QLD | 1999-06-28 |\n| ~ 132 行 ~ |\n\n注意\n*   `OR` 比 `AND` 更宽松。\n*   `OR` 包含了\
  \ `AND` 的所有结果。\n\n你可以将 `AND` 视为更多的过滤，将 `OR` 视为组合结果。如果你熟悉数学集合，`AND` 是多个集合的**交集**（共同部分），而\
  \ `OR` 是多个集合的**并集**（全部组合）。\n\n如果将 `AND` 与 `OR` 混合，事情会变得有点复杂：\n\n```sql\n--  操作符优先级\n\
  SELECT *\nFROM customers\nWHERE state='QLD' OR state='VIC' AND dob<'1980-01-01';\n\
  ```\n\n结果可能不符合你的预期，无论你预期什么：\n\n| id | 姓氏 | 名字 | 州 | 出生日期 |\n| --- | --- | --- |\
  \ --- | --- |\n| 475 | Blood | Drew | QLD | 1989-12-06 |\n| 523 | Sights | Seymour\
  \ | VIC | 1965-01-06 |\n| 588 | Skies | Grace | QLD | 1999-06-28 |\n| 305 | Net\
  \ | Clara | QLD |   |\n| 121 | Ting | Lil | QLD | 1964-09-17 |\n| 545 | Knife |\
  \ Jack | VIC | 1962-09-24 |\n| ~ 70 行 ~ |\n\n在算术表达式 `1 + 2 * 3` 中，你知道乘法在加法之前执行。也就是说，乘法优先于加法。\n\
  \n类似地，在逻辑表达式 `AssertionA OR AssertionB AND AssertionC` 中，`AND` 优先于 `OR`。这意味着前一条语句的结果等同于\n\
  \n```sql\n--  等同于：state='QLD' OR state='VIC' AND dob<'1980-01-01'\nSELECT *\nFROM\
  \ customers\nWHERE state='QLD' OR (state='VIC' AND dob<'1980-01-01');\n```\n\n用英语说，意思是组合*一个州的全部*和*另一个州的年长者*。\n\
  \n如果你本意是让出生日期断言同时应用于两个州，你需要使用括号来改变优先级：\n\n```sql\n--  改变优先级\nSELECT *\nFROM customers\n\
  WHERE (state='QLD' OR state='VIC') AND dob<'1980-01-01';\n```\n\n现在你将得到来自这两个州的年长客户。\n\
  \n| id | 姓氏 | 名字 | 电子邮箱 | … | 注册日期 |\n| --- | --- | --- | --- | --- | --- |\n| 523\
  \ | Sights | Seymour | seymour.sights523@example.net | … | 2022-07-11 |\n| 121 |\
  \ Ting | Lil | lil.ting121@example.com | … | 2021-10-06 |\n| 545 | Knife | Jack\
  \ | jack.knife545@example.com | … | 2022-07-24 |\n| 505 | Singers | Carol | carol.singers505@example.net\
  \ | … | 2022-06-29 |\n| 377 | Money | Xavier | xavier.money377@example.net | … |\
  \ 2022-04-02 |\n| 266 | Blind | Rob | rob.blind266@example.net | … | 2022-01-01\
  \ |\n| ~ 34 行 ~ |\n\n一些开发者倾向于无论是否需要，总是包含括号，以使观点更清晰。无论哪种方式，请记住 SQL 有明确定义的解释混合逻辑操作符的方式。\n\
  \n\n### IN 操作符\n\n使用`OR`时，有一种特殊情况。你可能需要测试一个表达式是否精确匹配多个不同的值，例如：\n\n```\n--  Change\
  \ Precedence\nSELECT *\nFROM customers\nWHERE state='VIC' OR state='QLD' OR state='WA';\
  \ --  等等\n```\n\n你将得到以下结果组：\n\n| id | familyname | givenname | state |\n| --- |\
  \ --- | --- | --- |\n| 186 | Gunn | Ray | VIC |\n| 179 | Inkling | Ivan | WA |\n\
  | 475 | Blood | Drew | QLD |\n| 523 | Sights | Seymour | VIC |\n| 588 | Skies |\
  \ Grace | QLD |\n| 191 | Moss | Pete | WA |\n| ~ 151 rows ~ |\n\n这里，表达式`state`被测试是否匹配多个值。你可以使用`IN`表达式重写这个测试：\n\
  \n```\nSELECT *\nFROM customers\nWHERE state IN ('VIC','QLD','WA');\n```\n\n使用这个表达式有两个要求：\n\
  \n*   测试是针对单个列或类似表达式的。在此例中，它测试的是`state`列。\n*   测试是针对一个离散的可能性列表的。在此例中，列表是一组州值。\n\n\
  `IN`有两种形式。在这个例子中，你提供了一个括号括起来的硬编码选项列表。用英语说，可以是“where state is in the following list:”，或者更自然地，“where\
  \ state is one of:”。\n\n你的列表也可以包含不匹配的值或重复的值：\n\n```\nSELECT *\nFROM customers\n\
  WHERE state IN ('VIC','QLD','VIC','ETC');\n```\n\n查找不存在的值总是可以的，但通常你不会重复一个值。不过，这种问题可能会间接发生，正如你将在后面看到的。\n\
  \n使用`IN`可以方便地反转条件：\n\n```\n--  Change Precedence\nSELECT *\nFROM customers\nWHERE\
  \ state NOT IN ('VIC','QLD','WA');\n```\n\n这将给出其他州的数据：\n\n| id | familyname | givenname\
  \ | state |\n| --- | --- | --- | --- |\n| 474 | Free | Judy | NSW |\n| 144 | King\
  \ | Ray | NSW |\n| 341 | Idate | Val | NSW |\n| 351 | Tate | Dick | NSW |\n| 422\
  \ | Why | Wanda | TAS |\n| 429 | Morrow | Tom | NSW |\n| ~ 118 rows ~ |   |   |\
  \   |\n\n在前面的例子中，列表是一组硬编码的可能值。你也可以将`IN`表达式与由子查询生成的列表一起使用。\n\n### 派生列表\n\n`IN`子句还有第二种更复杂的形式。\n\
  \n例如，假设你想根据单笔销售找到消费最高的客户。问题在于，销售总额在一个表（`sales`）中，而客户详细信息在另一个表（`customers`）中。幸运的是，`sales`表包含重要的`customerid`，它关联回`customers`表。\n\
  \n要得到结果：\n\n1.  从`sales`表中，获取`total`超过某个值的`customerid`。\n2.  从`customers`表中，获取`id`与第一步结果匹配的客户的数据。\n\
  \n对于第一步：\n\n```\nSELECT customerid FROM sales WHERE total>1200\n```\n\n我们得到一个客户\
  \ id 列表：\n\n| **customerid** |\n| 2 |\n| 10 |\n| 19 |\n| 46 |\n| 24 |\n| 69 |\n\
  | ~ 147 rows ~ |\n\n（前面的表达式没有分号，因为它将被合并到下一步中）。\n\n对于第二步，使用`IN`表达式将客户与第一步中的多个值进行匹配：\n\
  \n```\nSELECT *\nFROM customers\nWHERE id IN(SELECT customerid FROM sales WHERE\
  \ total>1200);\n```\n\n这给出了匹配的客户：\n\n| id | familyname | givenname | … | registered\
  \ |\n| --- | --- | --- | --- | --- |\n| 186 | Gunn | Ray | … | 2021-11-15 |\n| 144\
  \ | King | Ray | … | 2021-10-18 |\n| 179 | Inkling | Ivan | … | 2021-11-08 |\n|\
  \ 351 | Tate | Dick | … | 2022-03-13 |\n| 191 | Moss | Pete | … | 2021-11-19 |\n\
  | 305 | Net | Clara | … | 2022-01-26 |\n| ~ 106 rows ~ |   |   |   |   |\n\n`IN`子句中的`SELECT`语句被称为**子查询**。原则上，它先被求值，结果用于主查询。\n\
  \n如果你将`IN`与子查询一起使用，有另一种可能更直观的表达式：\n\n```\n--  PostgreSQL, MySQL/MariaDB, MSSQL,\
  \ Oracle (not SQLite)\nSELECT *\nFROM customers\nWHERE id = ANY(SELECT customerid\
  \ FROM sales\nWHERE total>1200);\n```\n\n类似地，你可以使用子查询来查找荷兰艺术家的所有画作：\n\n1.  找出`nationality`是\
  \ Dutch 的艺术家的`id`。\n2.  找出`artistid`是前面那些`id`之一的画作：\n\n```\n    --  All SQLs\n \
  \   SELECT *\n    FROM paintings\n    WHERE artistid IN (SELECT id FROM artists\
  \ WHERE nationality='Dutch');\n    --  not SQLite\n    SELECT *\n    FROM paintings\n\
  \    WHERE artistid=ANY(SELECT id FROM artists\n    WHERE nationality='Dutch');\n\
  ```\n\n这应该会给出荷兰艺术家的画作：\n\n| id | artistid | title | year | price |\n| --- | ---\
  \ | --- | --- | --- |\n| 81 | 198 | The Garden of Earthly Delights |   |   |\n|\
  \ 1503 | 182 | Breakfast of Crab | 1648 | 160.00 |\n| 2128 | 370 | The Geographer\
  \ |   | 125.00 |\n| 264 | 370 | Girl with a Pearl Earring | 1666 | 140.00 |\n| 1446\
  \ | 266 | Entrance to the Public Garden in Arles | 1888 | 115.00 |\n| 968 | 50 |\
  \ Basket of Fruits | 1622 | 140.00 |\n| ~ 172 rows ~ |\n\n请注意，荷兰人实际上并不自称“Dutch”；那是基于与德国人混淆的英语名称。在`artists`表中，一些艺术家被列为`Netherlandish`。你也应该将他们包括进来：\n\
  \n```\nSELECT *\nFROM paintings\nWHERE artistid IN (\n    SELECT id FROM artists\n\
  \    WHERE nationality='Dutch' OR nationality='Netherlandish'\n);\n```\n\n这扩大了结果组：\n\
  \n| id | artistid | title | year | price |\n| --- | --- | --- | --- | --- |\n| 541\
  \ | 256 | Butcher’s Stall with the Flight into Egypt |   | 110.00 |\n| 81 | 198\
  \ | The Garden of Earthly Delights |   |   |\n| 1503 | 182 | Breakfast of Crab |\
  \ 1648 | 160.00 |\n| 2128 | 370 | The Geographer |   | 125.00 |\n| 264 | 370 | Girl\
  \ with a Pearl Earring | 1666 | 140.00 |\n| 1446 | 266 | Entrance to the Public\
  \ Garden in Arles | 1888 | 115.00 |\n| ~ 186 rows ~ |\n\n或者使用另一个`IN`表达式：\n\n```\n\
  SELECT *\nFROM paintings\nWHERE artistid IN (\n    SELECT id FROM artists  WHERE\
  \ nationality IN ('Dutch','Netherlandish')\n);\n```\n\n你将在本书中看到更多的子查询。在某些情况下，可能会有替代方法，可能更高效，来获得相同的结果，例如连接表。你将在后面学习连接表。\n\
  \n### 通配符匹配\n\n对于字符串，你可以使用`通配符`匹配来扩大搜索范围。例如：\n\n```\nSELECT *\nFROM customers\n\
  WHERE familyname LIKE 'Ring%';\n```\n\n这将选择姓氏以`Ring`开头的客户。\n\n| id | familyname\
  \ | givenname | … |\n| --- | --- | --- | --- |\n| 90 | Ringer | Belle | … |\n| 309\
  \ | Ringing | Belle | … |\n| 165 | Ring | Wanda | … |\n| 164 | Ringing | Isabelle\
  \ | … |\n| ~ 4 rows ~ |\n\n字符串`Ring%`不再是一个简单的字符串：它现在是一个`模式`。\n\n通配符匹配有两个要求：\n\n\
  *   使用`LIKE`关键字来表示后面是一个模式。\n*   模式包含特殊字符。\n\n你可以不使用特殊模式字符而使用`LIKE`，但那样模式就只是一个精确匹配。例如：\n\
  \n```\n--  Using LIKE\nSELECT *\nFROM customers\nWHERE familyname LIKE 'Ring';\n\
  --  Same as simple match\nSELECT *\nFROM customers\nWHERE familyname='Ring';\n```\n\
  \n没有多少客户完全匹配这个字符串：\n\n| id | familyname | givenname | … |\n| --- | --- | --- | ---\
  \ |\n| `165` | `Ring` | `Wanda` | `…` |\n\n另一方面，如果你不使用`LIKE`关键字，模式字符将被视为普通字符：\n\n\
  ```\nSELECT *\nFROM customers\nWHERE familyname='Ring%';   --  nobody called Ring%\n\
  ```\n\n记住，根据你的排序规则，其他字符可能是区分大小写的，也可能不是。\n\n\n### 大小写敏感性与模式匹配\n\n请记住，某些数据库管理系统（DBMS）和数据库是区分大小写的，而另一些则不是。\n\
  \n对于默认不区分大小写的 MySQL/MariaDB 和 Microsoft SQL Server，你无需担心，可以直接使用小写字母：\n```sql\n--\
  \  MySQL/MariaDB 和 SQL Server\nSELECT *\nFROM customers\nWHERE familyname LIKE 'ring%';\
  \  --  也适用于 'Ring%'\n```\n\nSQLite 默认也可能执行不区分大小写的匹配。\n\n对于其他数据库，你可以通过转换大小写（转换为大写或小写）来模拟不区分大小写的匹配：\n\
  ```sql\n--  适用于所有 DBMS:\nSELECT *\nFROM customers\nWHERE lower(familyname) LIKE\
  \ 'ring%';   --  也适用于 'Ring%'\n```\n\nPostgreSQL 有 `ILIKE` 操作符，专门用于不区分大小写的匹配：\n\
  ```sql\n--  PostgreSQL\nSELECT *\nFROM customers\nWHERE familyname ILIKE 'ring%';\
  \ --  也适用于 'Ring%'\n```\n\n在本章的剩余部分，我们将简单地使用 `LIKE` 并假定其进行不区分大小写的匹配。\n\n### 模式字符\n\
  \n标准 SQL 有两个主要的模式字符，如表 3-4 所示。\n\n表 3-4 通配符字符\n\n| 字符 | 含义 | 文件通配符 (File Glob) |\n\
  | --- | --- | --- |\n| `%` | **零个**或**多个**字符 | `*` |\n| `_` | 恰好**一个**字符 | `?` |\n\
  \n“文件通配符”列显示了如果你在操作系统中尝试使用模式匹配来查找文件时会使用的字符；“glob”是模式匹配的极客术语。你不能在 SQL 中使用那些字符，这里只是作为比较。没人知道为什么\
  \ SQL 不使用它们。\n\n注意，`%` 通配符匹配 **零个** 或更多字符。这意味着可能有也可能没有其他字符。例如：\n```sql\n--  所有 DBMS\n\
  SELECT *\nFROM customers\nWHERE lower(familyname) LIKE 'ring%';\n--  不区分大小写的 DBMS：MSSQL,\
  \ MySQL / MariaDB\nSELECT *\nFROM customers\nWHERE familyname LIKE 'ring%';\n--\
  \  PostgreSQL\nSELECT *\nFROM customers\nWHERE familyname ILIKE 'ring%';\n```\n\n\
  这将匹配任何姓氏以 `Ring` **开头**的人，即使后面没有其他字符。\n\n另一个通配符字符 `_` 匹配**恰好一个**字符。这种匹配可用于填字游戏。例如：\n\
  ```sql\nSELECT *\nFROM customers\nWHERE familyname LIKE 'R__e';   --  Rate, Rise,\
  \ Rice, Rowe\n```\n\n这会给你四字符的字符串，其中两个是模糊的：\n\n| id | familyname | givenname | …\
  \ |\n| --- | --- | --- | --- |\n| 537 | Rise | Theo | … |\n| 359 | Rice | Jasmin\
  \ | … |\n| 551 | Rowe | Mike | … |\n| 536 | Rate | Amelia | … |\n\n注意下划线 (`_`) 字符。由于历史原因，它比普通字符稍宽，所以相邻的下划线实际上会接触。这使得如果你连续使用超过两个下划线，数起来会有点困难。\n\
  \n一些等宽字体，如 Source Code Pro，为此设计了稍窄的下划线。\n\n当你组合两个通配符时，就创建了“至少”的含义。例如：\n```sql\n\
  --  至少 4 个字符，以 S 开头：\nSELECT *\nFROM customers\nWHERE familyname LIKE 'S___%';\n\
  ```\n\n以下是一些使用 `%` 通配符的更多示例及其英文说明：\n```sql\n--  以 Ring 开头\nSELECT *\nFROM customers\n\
  WHERE familyname LIKE 'Ring%';\n--  以 ring 结尾\nSELECT *\nFROM customers\nWHERE lower(familyname)\
  \ LIKE '%ring';\n--  包含 ring\nSELECT *\nFROM customers\nWHERE lower(familyname)\
  \ LIKE '%ring%';\n--  以 S 开头并以 e 结尾\nSELECT *\nFROM customers\nWHERE familyname\
  \ LIKE 'S%e';\n```\n\n你会注意到，当匹配位置可以是任意位置时，我们使用了 `lower()` 函数以确保安全。对于不区分大小写的数据库，这不是必需的。\n\
  \n使用 `_` 通配符：\n```sql\n--  完全包含 s\nSELECT *\nFROM customers\nWHERE familyname LIKE\
  \ '%_s_%';\n--  恰好 4 个字符\nSELECT *\nFROM customers\nWHERE familyname LIKE '____';\n\
  --  恰好 4 个字符，以 R 开头\nSELECT *\nFROM customers\nWHERE familyname LIKE 'R___';\n--\
  \  至少 4 个字符\nSELECT *\nFROM customers\nWHERE familyname LIKE '____%';\n--  至少 4\
  \ 个字符，以 S 开头\nSELECT *\nFROM customers\nWHERE familyname LIKE 'S___%';\n```\n\n\
  使用这两个通配符，你可以在字符串数据上执行相当灵活的搜索。然而，有时你还需要搜索其他类型的数据。\n\n### 非字符串数据的通配符\n\n通常，通配符旨在用于\
  \ **字符串**。然而，如果数据可以转换为字符串，某些数据库管理系统对使用通配符的限制较少。\n\n例如，对数字使用通配符：\n```sql\n--  MySQL/MariaDB,\
  \ SQLite, MSSQL, Oracle - NOT PostgreSQL\nSELECT *\nFROM customers\nWHERE height\
  \ LIKE '17%';\n```\n\n这会给你身高在 170s 范围内的记录：\n\n| id | familyname | givenname | height\
  \ |\n| --- | --- | --- | --- |\n| 144 | King | Ray | 176.8 |\n| 179 | Inkling |\
  \ Ivan | 170.3 |\n| 475 | Blood | Drew | 171.0 |\n| 341 | Idate | Val | 177.1 |\n\
  | 588 | Skies | Grace | 171.5 |\n| 191 | Moss | Pete | 172.3 |\n| ~ 114 行 ~ |\n\n\
  在上述 DBMS 中，只有 PostgreSQL 对数据类型足够严格，会禁止这种比较并生成错误。\n\n你可能也会在日期上取得一些成功：\n\n| id | familyname\
  \ | givenname | dob |\n| --- | --- | --- | --- |\n| 474 | Free | Judy | 1978-04-01\
  \ |\n| 475 | Blood | Drew | 1989-12-06 |\n| 523 | Sights | Seymour | 1965-01-06\
  \ |\n| 341 | Idate | Val | 1976-06-04 |\n| 351 | Tate | Dick | 1969-08-03 |\n| 588\
  \ | Skies | Grace | 1999-06-28 |\n| ~ 206 行 ~ |\n\n```sql\n--  MySQL/MariaDB, SQLite*,\
  \ MSSQL, Oracle* - NOT PostgreSQL\nSELECT *\nFROM customers\nWHERE dob LIKE '19%';\n\
  ```\n\n在上述 DBMS 中，再次只有 PostgreSQL 禁止这种比较。然而，请注意：\n*   SQLite 没有真正的日期类型，并且本示例中的日期是作为字符串存储的。\n\
  *   Oracle 的默认日期格式以日号开始，因此它将尝试匹配日号以 `19` 开头的日期。\n\n如果你想让这个功能在 PostgreSQL 中工作，你可以将值\
  \ **转换** 为字符串。从技术上讲，这本来就是你应该做的；只是某些 DBMS 会自动完成：\n```sql\nSELECT *\nFROM customers\n\
  WHERE cast(height AS VARCHAR(255)) LIKE '17%';\nSELECT *\nFROM customers\nWHERE\
  \ cast(dob AS VARCHAR(255)) LIKE '19%';\n```\n\n请注意：\n*   `VARCHAR` 是 SQL 中字符串的术语。\n\
  *   `cast()` 将数据从一种类型更改为另一种类型。\n*   PostgreSQL 有一个更短的操作符 (`::`) 用于类型转换，但也会使用较长的版本。\n\
  \n在后面的章节中，你会看到更多关于类型转换的内容。\n\n### 通配符的扩展\n\n大多数情况下，这两个通配符就足够了。然而，一些 DBMS 提供了扩展，允许你微调匹配。\n\
  \n许多 DBMS 提供 **正则表达式**，这是一种非常复杂的模式匹配语法。有些，如 MSSQL，只是扩展了 `LIKE` 子句可用的语法；这将在下一节中介绍。\n\
  \n以下是一些实现。\n\n\n#### 正则表达式（PostgreSQL、MySQL/MariaDB、Oracle）\n\n正则表达式让你能更精确地控制对单个字符的匹配。\n\
  \n例如，要查找以字母 `A - K` 开头，但*不*以 `h` 或 `y` 结尾的姓氏，你会使用模式 `^[A-K][^hy]`：\n\n*   第一个 `^`\
  \ 表示从字符串的开头开始匹配。\n*   `[A-K]` 匹配从 `A` 到 `K`（包含）这个`范围`内的任意字符。\n*   `[^hy]` 表示*不*（`^`）匹配字符\
  \ `h` 或 `y`。\n\n在不同数据库管理系统中使用正则表达式的方式有所不同。要匹配前面的模式：\n\n```sql\n--  PostgreSQL\n\
  SELECT *\nFROM customers\nWHERE familyname ~ '^[A-K][^hy].*';\n--  MariaDB/MySQL\n\
  SELECT *\nFROM customers\nWHERE familyname REGEXP '^[A-K][^hy]';\n--  Oracle\nSELECT\
  \ *\nFROM customers\nWHERE REGEXP_LIKE(familyname,'[A-K][^hy].*');\n```\n\n结果如下所示：\n\
  \n| id | familyname | givenname | … | registered |\n| --- | --- | --- | --- | ---\
  \ |\n| 474 | Free | Judy | … | 2022-06-12 |\n| 186 | Gunn | Ray | … | 2021-11-15\
  \ |\n| 144 | King | Ray | … | 2021-10-18 |\n| 179 | Inkling | Ivan | … | 2021-11-08\
  \ |\n| 475 | Blood | Drew | … | 2022-06-13 |\n| 341 | Idate | Val | … | 2022-03-03\
  \ |\n| ~ 147 行 ~ |   |   |   |   |\n\n正则表达式可能变得非常复杂，不适合胆小的人尝试。你还会发现，在日常的 SQL 中很少需要用到它们。\n\
  \n#### 更简单的扩展（PostgreSQL， MSSQL）\n\nMicrosoft SQL 本身不支持正则表达式，但它提供了一个更简单的变体。使用（方）`括号`（`[\
  \ … ]`）通配符与 `LIKE` 关键字结合，有以下形式：\n\n*   `[abcde]`：括号内任意单个字符。\n*   `[a-e]`：从第一个到最后一个字符`范围`内的任意单个字符。\n\
  *   `[^abcde]`, `[^a-e]`：任意*不*匹配后面所跟内容的字符。\n\n```sql\nSELECT *\nFROM customers\n\
  WHERE familyname LIKE '[a-k][^hy]%';\n```\n\n请注意，MSSQL 通常不区分大小写，使用小写字母也会匹配大写字母。\n\
  \nPostgreSQL 确实支持正则表达式，但它也提供了一个使用 `SIMILAR TO` 的更简单变体：\n\n```sql\nSELECT *\nFROM\
  \ customers\nWHERE familyname SIMILAR TO '[A-K][^hy]%';\n```\n\n请注意，PostgreSQL 通常区分大小写，所以第一个字符是大写，而第二个字符是小写。当然，你可以使用\
  \ `lower()` 函数并全部使用小写。\n\n### 一个简单的模式匹配示例\n\n归根结底，你会发现最常用的是简单的 `%` 通配符。例如，如果你想查找标题中包含\
  \ `portrait`（肖像）这个词的画作：\n\n```sql\nSELECT * FROM paintings\nWHERE title LIKE '%portrait%';\n\
  --  WHERE lower(title) LIKE '%portrait%';\n```\n\n这些是符合条件的候选记录：\n\n| id | artistid\
  \ | title | year | price |\n| --- | --- | --- | --- | --- |\n| 2023 | 58 | Self-Portrait\
  \ | 1925 |   |\n| 1989 |   | Portrait of Trabuc | 1889 | 160.00 |\n| 2178 | 102\
  \ | Portrait of Hieronymus Holzschuher | 1526 | 145.00 |\n| 2244 | 346 | Model with\
  \ Unfinished Self-Portrait | 1977 | 135.00 |\n| 815 | 108 | Portrait of a Cardinal\
  \ | 1600 | 155.00 |\n| 1491 | 333 | Portrait of Sarah Swaim Chase (The Artist’s\
  \ Mother) | 1892 | 190.00 |\n| ~ 100 行 ~ |\n\n如果你想匹配 *self portrait*（自画像），你需要考虑到有时中间有空格，有时有连字符。你可以使用\
  \ `_` 通配符来实现这一点：\n\n```sql\nSELECT * FROM paintings\nWHERE title LIKE '%self_portrait%';\n\
  --  WHERE lower(title) LIKE '%self_portrait%'\n```\n\n这缩小了结果范围：\n\n| id | artistid\
  \ | title | year | price |\n| --- | --- | --- | --- | --- |\n| 2023 | 58 | Self-Portrait\
  \ | 1925 |   |\n| 2244 | 346 | Model with Unfinished Self-Portrait | 1977 | 135.00\
  \ |\n| 625 |   | Self-portrait |   | 160.00 |\n| 2133 | 102 | Self-Portrait at 26\
  \ | 1498 | 115.00 |\n| 1944 | 233 | Self Portrait with black Vase | 1911 | 105.00\
  \ |\n| 1054 |   | Self-Portrait | 1889 | 150.00 |\n| ~ 35 行 ~ |\n\n请注意，如果你真的在寻找肖像画，这还不够。一些最著名的肖像画，如\
  \ *蒙娜丽莎* 和 *戴珍珠耳环的少女*，会漏过这个搜索。\n\n为了真正方便地搜索画作类别，你需要有额外的列，甚至可能需要额外的表来维护类别。\n\n##\
  \ 总结\n\n当你有大量的行时，可以使用 `WHERE` 子句进行过滤。`WHERE` 子句后面跟一个或多个断言，这些断言的求值结果要么是 `true`（真）要么是\
  \ `false`（假），这决定了某一行是否包含在结果集中。\n\n`WHERE` 子句的语法是：\n\n```sql\nSELECT columns\nFROM\
  \ table\nWHERE conditions;\n```\n\n条件是一个或多个断言，即求值结果为 `true` 或 `false` 的表达式。\n\n\
  通常，断言与列数据相关。然而，任何不相关的断言也有效，尽管你可能会得到整张表或者什么也得不到。\n\n### `NULL`\n\n`NULL` 代表一个缺失的值，因此测试它比较棘手。\n\
  \n*   `NULL` *总是* 无法通过比较测试，例如 `=`。\n*   测试 `NULL` 需要使用特殊表达式 `IS NULL` 或 `IS NOT\
  \ NULL`。\n\n### 数字\n\n数字字面量以裸写方式表示：它们没有任何形式的引号。\n\n*   数字按照数轴顺序进行比较，可以使用基本的比较运算符进行过滤。\n\
  *   过滤连续值时，需要记得使用相等比较（`<=` 或 `>=`）来包含中间值。\n\n"
- '# 字符串


  字符串字面量用单引号括起来。一些数据库管理系统也允许使用双引号，但双引号更正确地应用于名称而非值。


  *   在一些数据库管理系统和数据库中，大小写可能不匹配。

  *   尾部空格应该被忽略，但并非总是如此。

  *   嵌套单引号需要两个连续的单引号：`''Don''''t do that''`。


  ### 日期


  日期字面量也用单引号括起来。


  *   首选日期格式是 ISO 8601 (`yyyy-mm-dd`)。

  *   大多数数据库管理系统允许替代格式，但你应该避免 `??/??/yyyy` 格式。

  *   日期按照历史顺序比较。


  ### 多个断言


  你可以使用逻辑 `AND` 和 `OR` 运算符组合多个断言。如果组合使用，`AND` 的优先级高于 `OR`。


  ### `IN` 运算符


  `IN` 运算符用于匹配一个列表中的值。它也可以与生成单个值列的子查询一起使用。


  ### 通配符匹配


  可以使用通配符模式和 `LIKE` 运算符进行更宽松的字符串比较。


  *   通配符包括特殊的模式字符。

  *   一些数据库管理系统允许你将 `LIKE` 用于非字符串数据，隐式地将它们转换为字符串进行比较。

  *   一些数据库管理系统用额外的字符补充了标准的通配符。

  *   一些数据库管理系统支持正则表达式，这比常规的通配符模式匹配更复杂。


  ## 即将介绍


  到目前为止，结果集都是无序的。从数据的角度来看，这没问题，SQL 会认为两个结果集如果仅仅是行序不同，那么它们就是相同的。


  然而，偶尔你会希望指定结果的顺序，这就是我们下一章要做的事情。


