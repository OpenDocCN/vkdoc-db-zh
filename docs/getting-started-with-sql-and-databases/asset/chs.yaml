- '# 1. 从 SQL 开始


  如果你对数据库一般而言是新手，特别是对 SQL 不太熟悉，一开始可能会有点令人畏惧。在本章中，我们将通过查看如何从一个简单的表中获取数据来初步体验 SQL。


  原则上，你可以选择任何你想要的方式来管理你的数据，有些人确实只是在电子表格甚至文字处理器中这样做。但对于重要的、未组织的数据来说，这种方式不够充分，因此我们依赖于更结构化的东西。


  组织数据没有唯一的方式，也并非所有数据都能以相同方式组织。然而，大多数时候，有一种流行的数据组织方式，SQL 语言就是为此开发的。管理数据库的软件通常被称为数据库管理系统（Database
  Management System），每次都说这么长有点麻烦，所以我们将简称其为 `DBMS`。


  一个 SQL 数据库是一个或多个 `表` 的集合。每个表是一种类型数据的集合。示例数据库中的一些表有：


  *   客户

  *   绘画作品

  *   艺术家


  我们稍后会更仔细地查看数据库的结构，但目前重要的是数据没有混杂在一起。例如，`客户` 表包含了关于客户的所有信息，没有其他内容。


  每个表包含 `行` 和 `列`。一行是数据的一个实例。例如，`客户` 表中的每一行代表一个客户。一列是行的一个详细信息。例如，`客户` 表有单独的列用于客户的电子邮件地址、电话号码等。


  当然，数据库远不止这些，第 2 章将更深入地探讨这些概念。


  在本章中，我们将使用 `SELECT` 语句（这是获取数据的基本命令）来探索一个表——即 `客户` 表——的内容。在此过程中，你将看到结果如何被过滤、重新计算和排序。


  我们这里介绍的内容都将在后面的章节中更详细地讲解，所以对于本章的内容，你可以采取一种相对轻松的方式学习。


  如果你运行下面的示例代码，你的结果可能不完全相同。这是因为示例数据是随机生成的，可能与书中使用的数据不同。你可能还会发现不同的 `DBMS` 在呈现未排序数据的方式上存在差异。


  ## 基本 SELECT 语句


  要从表中读取数据，你使用 `SELECT`：

  ```sql

  SELECT * FROM customers;

  ```

  你将得到类似表 1-1 的结果。

  表 1-1

  *结果*

  | id | 姓氏 | 名字 | 电子邮件 |   | 注册日期 |

  | --- | --- | --- | --- | --- | --- |

  | 474 | Free | Judy | judy.free474@example.net | … | 2022-06-12 |

  | 186 | Gunn | Ray | ray.gunn186@example.net | … | 2021-11-15 |

  | 144 | King | Ray | ray.king144@example.net | … | 2021-10-18 |

  | 179 | Inkling | Ivan | ivan.inkling179@example.com | … | 2021-11-08 |

  | 475 | Blood | Drew | drew.blood475@example.net | … | 2022-06-13 |

  | 523 | Sights | Seymour | seymour.sights523@example.net | … | 2022-07-11 |

  | ~ 约 304 行 ~ |


  这被称为 `SELECT` 语句，它将从 `客户` 表中获取所有行。


  语句通常由两个或更多 `子句` 组成。在本例中，它们是 `SELECT` 子句和 `FROM` 子句。


  注意


  *   `SELECT` 并不意味着 *显示*，尽管数据库客户端不知道还能对结果做什么。其他软件可能只是获取数据以便进一步处理。

  *   `*` 并不意味着所有 *行*。它是表中所有 *列* 的简写。

  *   我们将要做的大部分工作都会涉及 `SELECT` 语句。


  #### 大小写敏感性


  SQL 语言对大小写不敏感，意味着你可以用大写或小写输入语句：


  *   传统上使用 `大写` 来突出显示关键字（`SELECT` 和 `FROM`），但当你有语法高亮时，这就不那么重要了。

  *   传统上表名和列名也使用小写输入，但大多数 `DBMS` 并不太在意这一点。


  ```sql

  select * from customers;

  ```

  本书将对关键字使用 `大写`，但你不必这样做。


  ### 空格


  虽然一个简单的语句很容易放在一行内，但你可以根据需要添加任意多的换行符和额外的空格或制表符：

  ```sql

  SELECT

  *

  FROM customers;

  ```

  最重要的是保持代码的可读性，并使用空格来帮助管理语句。


  随着本书的进展，会有更多关于布局的建议。然而，这些只是建议，因为 SQL 在最少空格的情况下也能正常工作。


  ### 子句顺序


  SQL 最初提议的名称是 `SEQUEL`，结构化*英语*查询语言。其想法是语法会类似于英语。


  这导致了一个语法上的怪癖。例如，如果你说：

  ```

  从冰箱里拿牛奶

  ```

  你*首先*去冰箱，*然后*拿牛奶。也就是说，`从` 在 `拿` 之前执行。


  同样，在 `SELECT` 语句中，`FROM` 子句在 `SELECT` 子句*之前*执行。


  然而，你不能那样写语句：


  *   你必须写成 `SELECT … FROM … ;`。

  *   它的意思是 `从 … 选择 …`。


  稍后，你将看到额外的子句以及它们应该放在哪里。


  在这个简单的例子中，子句顺序的事实并不重要。然而，稍后子句顺序将解释为什么一些更复杂的例子不能像你预期的那样工作。


  ### 分号 (;


  SQL 标准要求每条语句的末尾有一个分号 `;`。你可以将语句分成多行，但分号标记了语句的最终结束。


  *   大多数 `DBMS` 会允许你在只有单条语句时忽略分号。然而，在多条语句之间，你至少需要一个分号。

  *   Microsoft SQL 也允许你在多条语句时省略分号，除非它们在同一行，但即使是 Microsoft 也不认为这是一个好主意（参见 `https://docs.microsoft.com/en-us/sql/t-sql/language-elements/transact-sql-syntax-conventions-transact-sql#transact-sql-syntax-conventions-transact-sql`）。


  我们建议你*始终*使用分号，即使是单条语句或对于 Microsoft SQL。这样，你可以确保你的代码不易出错。


  ## 选择特定列


  星号字符 `*` 是选择表中所有列的简写。你可以指定一个或多个列来代替：

  ```sql

  SELECT id, givenname, familyname

  FROM customers;

  ```

  这会给你表 1-2。

  表 1-2

  *结果*

  | id | 名字 | 姓氏 |

  | --- | --- | --- |

  | 474 | Judy | Free |

  | 186 | Ray | Gunn |

  | 144 | Ray | King |

  | 179 | Ivan | Inkling |

  | 475 | Drew | Blood |

  | 523 | Seymour | Sights |

  | ~ 约 304 行 ~ |


  这选择了三列；它仍然选择了所有行。


  列列表由逗号分隔：


  *   列不必按原始顺序排列。

  *   你可以跳过任何你想要的列。

  *   注意，在本例中，`名字` 和 `姓氏` 的顺序被调换了，并且电子邮件列被省略了。

  *   逗号后面的空格是可选的：如果你认为它使代码更易读，就包含它。

  *   逗号是一个分隔符：*不要* 在最后一列之后再放一个逗号，因为 SQL 会期待另一列。


  这是一个常见的错误：

  ```sql

  SELECT id, givenname, familyname, -- 多余的逗号

  FROM customers;

  ```

  始终指定列名是一个好习惯，即使你要选择所有列。




  ### 列顺序


  默认的列顺序（即使用 `SELECT *` 时看到的顺序）是在表创建时定义的。即使你有权限，可能也无法更改它。


  在 SQL 中，没有所谓“正确”的列顺序，以不同顺序选取列也不会带来性能差异。也就是说，不存在`首选的`列顺序，因此你可以根据自己的需求（无论是为了展示还是为了输入到另一个应用）来选择最合适的顺序。


  ### 布局


  随着列列表的增长，更有创意地布局列是有意义的：


  ```sql

  SELECT

  id,

  givenname, familyname

  FROM customers;

  ```


  如前所述，实际的间距并不重要，因此前面的示例使用间距来使语句更具可读性。


  *   列列表是垂直的，而非内联的。

  *   列列表从 `SELECT` 命令缩进，以表明它们属于同一个子句。

  *   `givenname` 和 `familyname` 在同一行，以表明它们在概念上是相关的。


  如果你记得使用 Tab 键，你会发现布局更容易维护。


  同时，如前所述，你可以使用任何喜欢的间距；只需确保语句尽可能可读。


  ### 使用 SELECT *


  在实际使用中，即使你真的需要所有列，使用 `SELECT *` 也被认为是**不良实践**；务必明确指定所有列名。这是因为


  *   你无法控制结果的列顺序。

  *   基础表结构的更改可能导致下次查询结果不同。


  然而，在本书中，你会看到 `SELECT *` 被频繁使用：


  *   `SELECT *` 是探索表的好方法。

  *   许多示例将专注于新子句，因此实际选择的列无关紧要。


  只需记住，当认真使用 SQL 时，你应该始终列出实际的列名。


  ### 计算列


  选取的列不必是原始列。它们可以从一个或多个列`派生`出来。除此之外，这意味着表永远不需要保留一个值的变体，因为需要时总可以重新计算。


  例如：


  ```sql

  SELECT

  id, givenname, familyname,

  height,         --  高度，单位为厘米

  height/2.54     --  高度，单位为英寸

  FROM customers;

  ```


  表 1-3 显示了结果。


  表 1-3

  *结果*


  | 474 | Judy | Free |   |   |

  | --- | --- | --- | --- | --- |

  | 186 | Ray | Gunn | 163.8 | 64.488… |

  | 144 | Ray | King | 176.8 | 69.606… |

  | 179 | Ivan | Inkling | 170.3 | 67.047… |

  | 475 | Drew | Blood | 171.0 | 67.323… |

  | 523 | Seymour | Sights | 167.3 | 65.866… |

  | ~ 约 304 行 ~ |


  在 `customers` 表中，高度以厘米为单位测量。对于那些偏好传统度量单位的人，你可以通过除以 `2.54` 将其转换为英寸。^(¹)


  设计一个同时包含厘米和英寸的列将是一个错误。表绝不应该包含本质上与另一个列相同的、经过伪装的列。如你所见，你总是可以重新计算出另一个值。


  ## 别名


  在试验 `SELECT` 语句时，你可以让计算保持原样，但你会注意到结果列名会缺失或是个占位名。


  当认真编写 `SELECT` 语句时，你需要为计算列指定一个明确的名称：


  ```sql

  SELECT

  id, givenname, familyname,

  height as centimetres,

  height/2.54 as inches

  FROM customers;

  ```


  现在你得到了表 1-4 中的结果。


  表 1-4

  *结果*


  | id | givenname | familyname | centimetres | inches |

  | --- | --- | --- | --- | --- |

  | 474 | Judy | Free | [NULL] | [NULL] |

  | 186 | Ray | Gunn | 163.8 | 64.488… |

  | 144 | Ray | King | 176.8 | 69.606… |

  | 179 | Ivan | Inkling | 170.3 | 67.047… |

  | 475 | Drew | Blood | 171.0 | 67.323… |

  | 523 | Seymour | Sights | 167.3 | 65.866… |

  | ~ 约 304 行 ~ |


  如你所见，如果你觉得有必要让意图更清晰，你也可以为未计算的列设置别名。


  你将在后面看到更多关于计算列和别名的内容。


  ### 注释


  在复杂的脚本中，包含关于代码功能的注释是很有用的。`注释`是任何会被 SQL 忽略、但旨在供人类阅读的文本。


  你已经在前面的示例中看到了一些注释。标准的注释是位于 `--` 字符之后、直到行尾的文本：


  ```sql

  SELECT

  id, givenname, familyname,

  height/2.54 as inches   -- 1in = 2.54cm

  FROM customers;

  ```


  前面的注释用于解释*为什么*我们要除以 `2.54`。


  严格来说，`--` 后面必须跟一个`空格`。然而，大多数（但不是全部）DBMS 也允许使用 `制表符` 代替空格，并且有些（但不是全部）DBMS 甚至不要求空白字符：


  ```sql

  -- 这是一个标准注释（使用空格）

  --  这使用了制表符，可能有效，但不一定（使用制表符）

  --这也可能有效

  ```


  你很快就会发现哪些变体对你的 DBMS 有效。通常，注释会以不同的颜色高亮显示。


  ### 块注释


  `大多数` DBMS 也支持一种非官方的块注释：


  ```sql

  /* 块注释 */

  ```


  这种风格也被称为 C 风格注释，因为它在 C 编程语言中被使用。


  块注释以 `/*` 组合开始，以反向的 `*/` 组合结束。它可以跨越多行或仅占一行的一部分。


  ```sql

  /*  这是一个介绍性的 SELECT 语句

  本书的其余部分将进行更详细的介绍 */

  SELECT

  id,

  /* 名称: */ givenname, familyname

  FROM customers;

  ```


  通常，你应该避免使用非标准的 SQL 特性，因为你永远不知道未来会怎样。然而，这一特性被广泛支持，以至于你可以将其视为仅仅是非官方补充的一个缺失功能。


  ### 注释的用途


  由于 SQL 完全忽略注释文本，你可以随意书写，即使它是胡言乱语。然而，以下是注释的常见用途：


  *   解释代码中不显而易见的内容

  *   在复杂脚本中充当章节标题

  *   临时禁用部分代码


  以下是一个展示注释不同用途的示例：


  ```sql

  /*  SQL 示例器

  ================================================

  这是一个介绍性的 SELECT 语句

  本书的其余部分将进行更详细的介绍

  ================================================ */

  SELECT

  id,

  --  email,

  givenname, familyname,

  height/2.54 as inches   -- 2.54 厘米 = 1 英寸

  FROM customers;

  ```


  在前面的示例中，`email` 列被禁用，`inches` 列得到了解释，整个脚本前面有一个标题注释块。实际的查询也进行了缩进，以确保良好的可读性。


  通常，如果你想禁用代码，直接删除它即可。使用注释来代替删除被称为**注释掉代码**。你可能会注释掉代码的原因包括：


  *   测试或故障排除

  *   将其保留在那里作为一个选项，留待进一步商议

  *   将其用作其他代码的替代方案


  至于解释性代码，**不要**过度注释。只解释不显而易见的部分。说得太多就像喊“狼来了”的男孩。通常，其他人只会选择忽略。



  ## 筛选行


  通常，你并不想要表中的所有行，而只需要其中的一部分。`WHERE` 子句用于决定选择哪些行：


  ```sql

  SELECT

  id,

  givenname,familyname,

  height/2.54 AS inches

  FROM customers

  WHERE state=''NSW'';

  ```


  这一次，你会得到表 1-5 中的内容。


  表 1-5

  *结果*


  | id | 名字 | 姓氏 | 英寸 |

  | --- | --- | --- | --- |

  | 474 | Judy | Free | [NULL] |

  | 144 | Ray | King | 69.606… |

  | 341 | Val | Idate | 69.724… |

  | 351 | Dick | Tate | 66.063… |

  | 429 | Tom | Morrow | 61.772… |

  | 234 | Nat | Ering | 67.638… |

  | ~ 67 行 ~ |


  表达式 `state=''NSW''` 称为一个**断言**，其结果要么是 `true`，要么是 `false`。`WHERE` 子句只选择那些断言为 `true`
  的行。


  注意 `NSW` 周围的单引号 `'' … ''`。在 SQL 中，文本值被称为**字符串**，并用单引号括起来。不要使用双引号 `" … "`，因为大多数数据库管理系统（DBMS）会以不同方式解释双引号。另外，请注意字符串是大写的，这与
  `customers` 表中的数据相匹配。在一些 DBMS 中，你也可以使用小写，但在另一些中则不行。


  你将在本书后面学到更多关于字符串的知识。


  ### 子句顺序


  `WHERE` 子句是在 `FROM` *之后*、`SELECT` *之前* 进行求值的：


  ```sql

  SELECT …

  FROM …

  --  SELECT 在此处处理！

  WHERE … ;

  ```


  用英语来说，这表示：


  1.  从表开始。

  2.  筛选一些行。

  3.  选择一些列。


  然而，请记住，你必须按照前面的顺序编写 SQL。


  ### 分号的放置


  在开发代码时，很容易犯以下错误：


  ```sql

  SELECT *

  FROM customers;

  WHERE state=''NSW''   --  哎呀

  ```


  这是因为你在前一个版本的结尾正确地使用了分号分隔，然后只是在其后添加了一个新的子句。在开发代码时，将分号放在单独一行可能会有所帮助：


  ```sql

  SELECT *

  FROM customers

  WHERE state=''NSW''

  ;

  ```


  这样在添加额外的子句时会更容易。当你完成所有操作后，你总是可以整理分号的位置。


  ## 对结果排序


  从数学上讲，表是行的一个**集合**。除其他外，这意味着行的顺序是无关紧要的。


  一些 DBMS 会按照数据添加的相同顺序输出结果。一些 DBMS 会以看似随机的顺序输出结果，这取决于数据在内部的管理方式。


  SQL 标准特意*不*告诉 DBMS 如何完成其工作，唯一的保证是行的顺序*不*被保证，也就是说，除非你强制指定。


  `ORDER BY` 子句将结果按指定的顺序排列：


  ```sql

  SELECT

  id,

  givenname, familyname,

  height/2.54 as inches

  FROM customers

  WHERE state=''NSW''

  ORDER BY familyname, givenname;

  ```


  结果将显示在表 1-6 中。


  表 1-6

  *结果*


  | id | 名字 | 姓氏 | 英寸 |

  | --- | --- | --- | --- |

  | 44 | Helen | Back | 67.913… |

  | 162 | Ginger | Beer | 70.039… |

  | 99 | Minnie | Bus | 65.315… |

  | 270 | Mary | Christmas | 65.118… |

  | 487 | Horace | Cope | 68.622… |

  | 419 | Barbie | Cue | 62.520… |

  | ~ 67 行 ~ |


  在这个例子中，你按 `familyname` 排序结果，并且在姓氏相同时，按 `givenname` 排序。


  你可以按一列或多列排序，可以是升序或降序。


  严格来说，结果不再是一个集合，因为集合是无序的。在某些情况下，一旦使用了 `ORDER BY` 子句，你可能就无法再进行任何进一步的处理。


  你将在后面学到更多关于 `ORDER BY` 子句的知识。


  ### 子句顺序


  `ORDER BY` 无论是书写还是求值都是最后的：


  ```sql

  SELECT …

  FROM …

  WHERE …

  --  SELECT 在此处处理

  ORDER BY … ;

  ```


  用英语来说，这表示：


  1.  从表开始。

  2.  筛选一些行。

  3.  选择一些列。

  4.  最后，对结果排序。


  然而，请记住，你仍然必须按照前面的顺序编写 SQL。


  ## 去除重复行


  有时，你需要理解某人的要求是什么。例如，如果你想要一个电子邮件地址列表，以下查询可以完成这项工作：


  ```sql

  SELECT email FROM customers;

  ```


  表 1-7 中的结果相当合理。


  表 1-7

  *结果*


  | email |

  | --- |

  | judy.free474@example.net |

  | ray.gunn186@example.net |

  | ray.king144@example.net |

  | ivan.inkling179@example.com |

  | drew.blood475@example.net |

  | seymour.sights523@example.net |

  | ~ 304 行 ~ |


  另一方面，如果你想要一个州（state）的列表，下面这个查询可能*不是*你想要的：


  ```sql

  SELECT state FROM customers;

  ```


  表 1-8 中的结果就不那么合理了。


  表 1-8

  *结果*


  | state |

  | --- |

  | NSW |

  | VIC |

  | NSW |

  | WA |

  | QLD |

  | VIC |

  | NSW |

  | NSW |

  | QLD |

  | TAS |

  | ~ 304 行 ~ |


  当然，你会得到一个包含所有 `state` 值的列表（以及一些代表缺失值的 `NULL`）。然而，你可能*不*想要重复项。如果你想要每个值只出现一次，你需要使用
  `DISTINCT`：


  ```sql

  SELECT DISTINCT state FROM customers;   --  每个值只取一次

  ```


  表 1-9 中的结果可能更合理。


  表 1-9

  *结果*


  | state |

  | --- |

  | WA |

  | [NULL] |

  | TAS |

  | VIC |

  | NSW |

  | NT |

  | QLD |

  | SA |

  | ~ 8 行 ~ |


  使用 `DISTINCT` 会将每个值视为一个组，而不是单个值。可以说你现在拥有了 `state` 的分组。


  注意其中一组是 `NULL`，这意味着你还有一些缺失的州。


  `DISTINCT` 操作符只作用于 `SELECT` 子句中的内容。如果你也添加 `town` 列：


  ```sql

  SELECT DISTINCT state, town FROM customers; --  每个组合只取一次

  ```


  你会得到类似表 1-10 的结果。


  表 1-10

  *结果*


  | state | town |

  | --- | --- |

  | SA | Windsor |

  | [NULL] | [NULL] |

  | VIC | Belmont |

  | SA | Alberton |

  | NSW | Hamilton |

  | WA | Wattle Grove |

  | VIC | Stirling |

  | VIC | Gordon |

  | TAS | Beaconsfield |

  | SA | Richmond |

  | ~ 79 行 ~ |


  在这里，你将获得 `state` 和 `town` 的不同*组合*。在结果集中，去重的不是 `state` 也不是 `town`——而是它们的组合。可以说我们现在拥有了
  `state`/`town` 的分组。


  同样，你会看到 `NULL` 作为一个单独的分组。在这组数据中，没有不带城镇的州，反之亦然，这就是为什么只有一个包含 `NULL` 的分组。


  ## 总结


  以下是我们一直在开发的 SQL 示例：


  ```sql

  /*  SQL 示例

  ================================================

  这是一个介绍性的 SELECT 语句

  本书的其余部分将更详细地介绍

  ================================================ */

  SELECT

  id,

  --  email,

  givenname, familyname,

  height/2.54 as inches   -- 2.54 cm = 1 英寸

  FROM customers

  WHERE state=''NSW''

  ORDER BY familyname,givenname;

  ```


  这说明了 SQL `SELECT` 语句的主要部分，以及注释和布局的使用。


  基本的 SELECT 语句是：


  ```sql

  SELECT columns

  FROM table;

  ```


  注意 `SELECT` 是在 `FROM` *之后* 进行求值的。


  ### 编写 SQL


  SQL 是一种简单的语言，有一些规则和一些关于可读性的建议。


  *   SQL 对使用额外空格的要求比较宽松。你应该使用足够的空格，以使你的 SQL 更具可读性。

  *   每个 SQL 语句以分号 (;) 结尾。

  *   SQL 语言对大小写不敏感，列名也是如此。表名可能对大小写敏感，这取决于操作系统。


  请记住，语言的某些部分是灵活的，但仍然必须遵循严格的语法。


  ### Columns


  `SELECT`语句将从表中选择一列或多列数据。


  *   你可以按任意顺序选择列。

  *   `SELECT *`表达式用于选择*所有*列。

  *   列可以是计算得出的。

  *   计算列应使用别名命名；非计算列也可以使用别名。


  请记住，在编写良好的 SQL 语句中，你不应该使用`SELECT *`来选择列。然而，在本书中，我们将使用它来专注于新子句的介绍。


  ### Comments


  注释是提供给阅读者看的附加文本，会被 SQL 忽略。


  *   SQL 有标准的单行注释：`-- etc`

  *   大多数 DBMS 还支持非标准的块注释：`/* … */`

  *   注释可用于解释某些内容或充当章节标题。它们也可以用于禁用部分代码，就像你在进行故障排除或测试时可能做的那样。


  请记住，要谨慎使用注释，仅在它们确实能告诉读者需要知道的信息时才使用。


  ### Filtering Data


  可以使用`WHERE`子句来过滤行。


  *   有时，过滤结果可能没有任何行；这并非错误。

  *   在过滤字符串时，值可能区分大小写，也可能不区分，这取决于 DBMS 和实际的数据库。


  `WHERE`子句可用于返回已知是唯一的单行，或行的一个子集。偶尔，你可能得到没有任何匹配条件的行。


  ### Row Order


  SQL 表是无序的行集合。


  *   行的顺序是无关紧要的，并且可能出乎意料。

  *   你可以使用`ORDER BY`子句对结果进行排序。


  从技术上讲，一旦你使用了`ORDER BY`，结果就不再是一个真正的集合。通常，这无关紧要，但有些操作在`ORDER BY`之后无法执行。


  ### Clause Order


  到目前为止介绍的四个主要子句是按以下顺序编写的：


  ```sql

  SELECT columns

  FROM table

  WHERE conditions

  --  SELECT 在此处被求值

  ORDER BY columns

  ```


  `SELECT`子句是在`ORDER BY`子句之前最后被求值的。


  ## 即将介绍的内容


  以上是对 SQL 工作原理的简单示例。在接下来的章节中，你将看到关于各个子句的更多细节，以及如何处理多个表、如何计算和汇总数据，以及如何对数据进行简单的更改。


  然而在此之前，我们将先了解一下 SQL 数据库是如何构建的。


  '
- "# 2. Database\n\n在第[1]章中，你体验了使用 SQL 从数据库中提取数据。我们当时有点摸不着头脑，因为我们并未完全了解数据库中有什么。遗憾的是，在现实生活中情况常常如此，但在这里，我们将更仔细地审视数据库本身。\n\
  \n在本章中，我们将探讨其内部机制。这将从两个方面进行：\n\n*   你将了解数据库设计的理论和实践：为什么它是这样的？\n*   你还将了解示例数据库本身的细节：这个数据库里具体有什么？\n\
  \n理论部分不会太重。你将了解表，它是所有数据的基础结构，以及所谓规范表的规则：数据如何被组织得尽可能简单可靠。你还将了解我们如何处理多值情况。\n\n示例数据库遵循典型的设计，即使它是一个相当小的数据库。它将包含足够的内容以使其值得搜索和分析。更重要的是，它将包含我们需要探索的几乎所有内容。\n\
  \n## About the Sample Database\n\n对于示例数据库，我们将设想一个在线商店，销售著名艺术作品的印刷复制品。\n\n为了管理这个商店，我们至少需要以下表格：\n\
  \n*   一个`customers`表，用于保存客户详细信息。\n*   一个`paintings`表，包含可用画作的一些详细信息。这*不是*库存表，因为画作是按需印刷的。\n\
  *   画作的一个细节是艺术家。我们不会在`paintings`表中存储艺术家的详细信息。相反，有一个单独的表，并且画作通过引用与艺术家关联。\n*   一个`artists`表，在前面的`paintings`表中被引用。\n\
  *   *两个*表来管理销售：一个`sales`表用于管理客户购买，一个`saleitems`表用于管理销售中的各个商品。\n\n图[2-1]将让你对数据库的结构有一个清晰的了解。\n\
  \n![图 2-1](img/601766_1_En_2_Fig1_HTML.jpg)\n图 2-1 示例数据库\n\n在本章中，我们将了解设计数据库时考虑的一些理念，并且我们也将更详细地查看用于练习的示例数据库。\n\
  \n### Database\n\nSQL 数据库基于关系数据库理论。而关系数据库理论又基于一些重要的数学概念，包括集合和逻辑。\n\n关系数据库的一个重要原则是：\n\
  \n*每个数据项都有一个唯一的位置。*\n\n这尤其意味着：\n\n*   数据永不重复。\n*   永远不会对*在哪里*放置或查找一个数据项产生任何歧义。\n\
  \n理论上，SQL 数据库是“纯”关系数据库的一个有限版本。因此，我们将更具体地称它们为 SQL 数据库。\n\n#### Database Terminology\n\
  \n我们将尽量不纠结于术语，但有些术语对于澄清问题很重要。\n\n**数据库**是数据的集合。理论上，这些数据可以以任何你喜欢的方式管理，例如在文字处理文档、记录卡或木片上的凹口里。当然，这里我们谈论的是在计算机系统上管理数据。\n\
  \n**DBMS**是管理数据的软件。当然，有许多可用的 DBMS，本书涵盖了一些比较流行的。\n\nSQL，或结构化查询语言（官方上，它的发音就是按字母拼读），是与数据库通信的语言。有一个官方的\
  \ ISO 标准，但所有的 DBMS 都对这个标准有所变通。\n\n一些用户试图将其发音为**SeQueL**，这曾被提议为其正式名称。由于与其他软件存在命名冲突，最终它被称为**SQL**。如果你愿意，你也可以将其发音为**SQuaLl**、**SQueaL**、**SQueLch**或**SQuaLlid**。\n\
  \n#### Data vs. Value\n\n你的名字是什么？我们将把你的名字称为一个**数据**项。而对这个问题的*回答*，则被称为其**值**。\n\n\
  将数据视为一个占位符（例如表格上的一个框），而值则是占位符的内容。\n\n说数据永不重复意味着你的名字只有一个占位符：没有重复项。\n\n另一方面，*值*可以被复制。没有什么能阻止另一个人拥有和你一样的名字。然而，在其技术性的、非神秘的意义上，这将被视为一种**巧合**。\n\
  \n更重要的是，更改你的名字的值并不会强制另一个人也要做同样的更改。值之间是相互独立的。\n\n### Tables\n\n一个 SQL 数据库是**不同**表的集合。每个表描述一种数据类型，例如一个客户或一幅画。\n\
  \n例如：\n\n```sql\nSELECT * FROM customers;\nSELECT * FROM paintings;\n```\n\n当你运行前面的代码时，你会发现客户表与画作无关，反之亦然。\n\
  \n\n#### 表术语\n\nSQL 使用表的语言，而表由行和列组成。\n\n*   一个 `table`（表）是一个集合，例如客户的集合。\n*   一个\
  \ `row`（行）是该集合的一个实例或成员，例如其中一位客户。\n*   一个 `column`（列）是成员的一个细节，例如客户的出生日期。\n\n有时你可能会看到其他一些词语被用来描述数据，但它们并非\
  \ SQL 的术语。表 2-1 展示了用于某些概念的一些替代术语。\n\n**表 2-1** 替代名称\n\n| | 关系数据库 | SQL | 其他 |\n\
  | --- | --- | --- | --- |\n| 集合 | Relation（关系） | Table（表） | File（文件） |\n| 实例 | Tuple（元组）\
  \ | Row（行） | Record（记录） |\n| 细节 | Attribute（属性） | Column（列） | Field（字段） |\n\n特别要注意的是，在其他\
  \ SQL 开发者面前，避免使用 `Record`（记录）和 `Field`（字段）这些术语，因为他们可能会对你嗤之以鼻。另一方面，特别是 `Field`（字段）这个词有时确实会出现在官方文档中，所以也不算太糟。\n\
  \n在本书中，我们将使用标准的 SQL 术语。你有时可能会看到 `record`（记录）一词以其原始含义（即保存信息）被使用。\n\n### 规范化表\n\n\
  原则上，你可以以任何你想要的方式组织数据表，但如果你希望你的数据尽可能易于维护，它就需要遵循一些规则。\n\n以下规则不仅仅是为了增加趣味性。这些规则将使表中的数据处于最简单、最可靠的形式。数学家将这种形式称为其\
  \ `normal`（范式）形式。\n\n总的来说，规范化的目标是确保每一份数据都只有一个存放位置。不应有重复，也不应有歧义。\n\n正如你将看到的，这通常意味着要创建额外的表，因此你所需的数据可能分散在各处。这可能会带来不便。稍后，当我们学习连接表时，我们会了解如何管理这种不便。\n\
  \n数据库理论定义了多个规范化级别，但大部分原理将在下文中涵盖。\n\n在现实中，你会发现数据库开发者常常会放宽其中一些原则，以避免数据分散在太多地方，导致即使是最简单的查询也变得困难。然而，这样做总是有降低数据可靠性的风险。\n\
  \n#### 数据是原子的\n\n如果你执行以下查询\n\n```sql\nSELECT\n    id,\n    givenname, familyname\n\
  FROM customers;\n```\n\n你会注意到，given name（名）和 family name（姓）位于不同的列中。这使得排序和搜索数据变得更加容易。\n\
  \n数据应处于其最小的 *实际* 单位。如果做到了这一点，我们就说数据是 `atomic`（原子的），这个词源自一个希腊词汇，意指它不能再被拆分。\n\n注意前面的“实际”一词。你可以对电子邮件地址尝试同样的做法：\n\
  \n```sql\nSELECT\n    id,\n    email\nFROM customers;\n```\n\n你可能会争辩说电子邮件地址可以进一步分解为两部分：`user@host`（用户@主机）。如果你真想这么做，当然可以。然而，大多数人会认为这有点过分了，因为你可能*永远*不会单独使用这些部分。\n\
  \n另一方面，如果你确实需要按电子邮件主机对客户进行分组，例如用于过滤或排序目的，那么电子邮件地址确实应该被分成两列。\n\n决定数据是否应该进一步分离是经验丰富的数据库开发者的技能之一。\n\
  \n#### 列是独立的\n\n当你选择多个列时：\n\n```sql\nSELECT\n    id,\n    givenname, familyname,\n\
  \    phone,\n    dob\nFROM customers;\n```\n\n你会注意到的一件事是，一列中的值无法提供任何关于另一列中值的线索。例如，知道你的出生日期并不能告诉我们你的电话号码。此外，更改你的出生日期并不要求更改你的电话号码。²\n\
  \n这是维护“干净”数据的一个关键因素。这意味着你可以在不影响任何其他内容的情况下维护单个数据项。\n\n并非所有表都严格遵循此规则。例如：\n\n```sql\n\
  SELECT\n    id,\n    givenname, familyname,\n    street,\n    town, state, postcode\n\
  FROM customers;\n```\n\n如果客户更改了他们的地址，你可能需要更新*四*项数据（`street`、`town`、`state` 和 `postcode`）。除此之外，更改邮政编码很可能会决定州和城镇。显然，这三者并非彼此独立。即使是街道也是有限制的：相同的街道名称在下一个城镇可能存在也可能不存在，但街道号码可能仍然是错误的。\n\
  \n*这是示例 `customers` 表设计中的一个弱点。正确的做法会涉及另一个位置表，以便 `customers` 表包含对其中一个位置的单一引用。*\n\n\
  有时，我们可以勉强接受一个宽松的设计，但这不会是永久的。在未来某个时候，某个客户的地址可能会被部分更新，而你的数据将失去一些可靠性。\n\n目前，我们将坚持这种宽松的设计，并希望一切顺利。这是因为获取所有可能地址的完整列表太难了。\n\
  \n#### 列是单一类型的\n\n如果你检查一个日期列：\n\n```sql\nSELECT\n    id, givenname, familyname,\n\
  \    dob\nFROM customers;\n```\n\n你会注意到，`dob` 列中的所有值当然都是日期。根据设计，`dob` 列将只接受日期，而不接受数字、字符串或任何其他类型的数据。\n\
  \n在 SQL 中，每一列都被分配一个单一类型。³ 你唯一能输入的值必须与该类型兼容。\n\n这一原则有几个优点：\n\n*   限制数据类型提供了一点有效性检查；例如，数字或字符串对于出生日期来说是无效的。\n\
  *   当你需要处理数据时，例如根据出生日期计算年龄，SQL 无需处理因不适当数据而产生的错误，因为没有这样的数据。\n*   在对数据排序时，数据类型会影响结果。你将在第\
  \ 4 章关于排序的内容中看到更多相关信息。\n\n也有一些缺点。例如，对于日期：\n\n*   你无法改变详细程度，例如在日期列中只记录年份或包含时间。\n\
  *   你不能在日期列中拥有文本，例如“很久以前”或“土豚之年”。\n\n在关系理论中，数据项可接受的值被称为其 `domain`（域）。例如：\n\n```sql\n\
  SELECT\n    id,\n    givenname, familyname,\n    state\nFROM customers;\n```\n\n\
  `state` 的值是一个字符串，理论上可以是任何字符串，但实际上应该被限制为合法的州名缩写。\n\n#### 行是无序的\n\n更现实地说，行的顺序并不重要。\n\
  \n如果你简单地从表中选择：\n\n```sql\nSELECT *\nFROM customers;\n```\n\n无法保证行的顺序。在数据库理论中，这完全没问题，因为集合是无序的。\n\
  \nSQL 标准特别*不*对行顺序做任何说明。具体来说\n\n*   数据本身可以按照 DBMS 认为合适的任何顺序*存储*。\n*   数据可以按照 DBMS\
  \ 认为合适的任何顺序*返回*。\n\n对于某些 DBMS，数据可能看起来是随机顺序的。然而，对于另一些 DBMS，它可能是 `insertion order`（插入顺序）：数据被添加的顺序。不过，实际顺序将取决于数据的处理方式以及数据的更改情况。\n\
  \n当然，你总是可以使用 `ORDER BY` 子句来强制指定你自己的顺序。\n\n\n#### 行是唯一的\n\n如果你只是从表中简单查询：\n\n```sql\n\
  SELECT *\nFROM artists;\n```\n\n你会看到没有艺术家会出现两次。如果你初次接触数据管理是通过电子表格程序，你很可能会发现累积了多份艺术家副本，因为交叉引用并非电子表格的强项。\n\
  \n在一个管理良好的数据库中，每位艺术家只被记录一次，然后多幅画作可以引用同一位艺术家。\n\n当然，错误总是难免的；例如，一位艺术家可能被注册了两次。请记住，数据库本身并不真正“知道”发生了什么，因此需要一些人为干预来确保这种情况不会发生。\n\
  \nSQL 确实提供了一些帮助来维护唯一性：\n\n*   每个表都应定义一个 `主键` 列，作为唯一标识符。原则上，即使所有其他细节都相同，主键也能区分它们。\n\
  \n*   一些列可以添加 `唯一约束`，这将禁止意外的重复。例如，你可能会认为客户的电子邮件地址永远不应重复，因此在该列上设置唯一约束。\n\n在关于表操作的第\
  \ 8 章中，你将看到如何构建各种附加需求，即约束。目前，主键和唯一属性很重要。\n\n#### 行是独立的\n\n如果你只是从表中简单查询：\n\n```sql\n\
  SELECT *\nFROM artists;\n```\n\n你会看到，一位艺术家的细节与另一位艺术家的细节无关。一行的数据变化只影响该行本身。\n\n这并不是说多位艺术家不能拥有一些相同的细节。例如，伦勃朗和梵高都被列为\
  \ `荷兰` 国籍。但是，如果你决定将梵高的国籍改为，比如 `法国`，这将对伦勃朗的国籍没有影响。\n\n然而，这对于 `customers` 表来说并不完全正确。如果一个城镇的邮政编码发生变化，可能意味着同一城镇的其他客户也需要更新。这就是为什么地点信息本应放在一个单独的表中。\n\
  \n#### 列名是唯一的\n\n这不言自明。你不能有两个同名的列；否则，将无法可靠地标识该列。\n\n对于一个结构良好的表，这应该不是问题，但有时对于如何处理多个值会有一点不确定性。我们稍后会看到如何正确处理多个值。\n\
  \n#### 列是无序的\n\n当你从一个表中查询时，你当然会以某种行顺序和列顺序获得结果。然而，与行顺序一样，列顺序并不重要。不过，与行顺序不同的是，列顺序并非完全不可预测。\n\
  \n例如：\n\n```sql\nSELECT *\nFROM customers;\n```\n\n如果你使用 `SELECT *`，你将按照表创建时或后续修改表结构时定义的顺序获得列。\n\
  \n```sql\nSELECT id, givenname, familyname, dob, email\nFROM customers;\n```\n\n\
  如果你指定了列，你当然会按照指定的顺序获得列。\n\n关键在于，数据库没有*偏好*的列顺序，你可以按任何顺序选择它们，而不会影响结果的意义。\n\nSQL 允许你在原始设计之后添加额外的列。有时，在任意位置添加这些列很棘手甚至不可能，因此你可能会发现新添加的列位于末尾。这并不总是方便，但至少无关紧要。\n\
  \n### 多值处理\n\n一个结构良好的表的原则之一涉及多值处理。例如：\n\n*   如何管理客户的多个电话号码？\n*   如何管理多位作者的书籍？\n\n\
  应避免的两种错误是：\n\n*   将多个值放在单个列中，可能用逗号或分号分隔。这样数据项就不再有明确的位置，因为你无法确定它在哪一列中。此外，你最终总会遇到一些空列，并且在某些情况下列数可能不够。\n\
  \n*   为多个值设置多个列，例如 `phone1`、`phone2` 等。你之前已经看到数据应该是原子性的。这将违反该原则，并使搜索和排序变得不切实际。稍后，你可能需要将数据分组，而像这样使用多个值将使分组成为不可能。\n\
  \n可能存在*如果*列之间有明确区分的情况，才使用多个列。例如，对于客户，你*可能*记录一个手机号码、一个固定电话号码和一个传真（还记得传真吗？）号码。它们都是电话号码，但彼此差异足够大，不会产生歧义。\n\
  \n#### 使用关联表\n\n在示例数据库中，我们多次遇到这个问题：\n\n*   销售单可以包含多个销售项。\n*   艺术家可以创作多幅画作。\n*  \
  \ 客户可以有多笔销售。\n\n在所有情况下，解决方案都是一样的：使用另一个表。例如，为了管理多个销售项，有一个额外的 `saleitems` 表，用于记录每个销售项。使其运作的关键是，所有这些销售项都引用一个\
  \ `sale`。\n\n#### 示例：画作与艺术家\n\n正如我们之前提到的，我们面临的情况是一位艺术家可以创作许多幅画作。换句话说，许多幅画作是同一位艺术家创作的。这实际上是同一个问题，只是从两个不同的方向来看待。\n\
  \n你看待问题的方式取决于数据库的目的。例如，如果你在管理艺术家代理机构，那么你的主要兴趣点将在艺术家表上，问题将是如何管理每位艺术家的多幅画作。这将与如何管理每笔销售的多项物品，或每位客户的多笔销售是同一个问题。\n\
  \n在这个数据库中，我们更感兴趣的是画作，因此问题是如何管理同一位艺术家的多幅画作。\n\n在这两种情况下，解决方案都是一样的。\n\n如果你查看这两个表：\n\
  \n```sql\nSELECT * FROM paintings;\nSELECT * FROM artists;\n```\n\n你会看到 `paintings`\
  \ 表中重要的 `artistid` 列。`artistid` 是对 `artists` 表中某个 `id` 的引用。这被称为 `外键`，因为它引用了另一个表。\n\
  \n图 2-2 展示了这种关系的简化版本。\n\n![](img/601766_1_En_2_Fig2_HTML.jpg)\n\n两个表，画作表和艺术家表，包含主键和外键将两个表连接在一起。画作表包含\
  \ 8 列。艺术家表包含 5 列。\n\n图 2-2 表之间的关系\n\n如果你看那些箭头，你会注意到它们是从画作指向艺术家，即从外键指向主键。你还会注意到许多幅画作指向一位艺术家。这种关系通常称为一对多关系，即从一位艺术家到多幅画作。\n\
  \n无论你更关注画作还是艺术家，实际的关系是在“多”的那一方，即 `artist` 表中定义的。\n\n#### 替代术语示例\n\n虽然大多数参考资料会简单地称为一对多关系，但使用更非正式的术语往往更方便，例如表\
  \ 2-2 中的那些。\n\n表 2-2 一对多关系\n\n|      | 一方       | 多方       |\n|------|------------|------------|\n\
  | 父子   | 父         | 子         |\n| 容器   | 容器       | 内容物     |\n| 购物   | 购物车  \
  \   | 商品项     |\n\n稍后，我们将探讨如何组合来自关联表的数据。\n\n#### 更复杂的关系\n\n在示例数据库中，我们有画作，也有顾客。我们还需要管理画作销售给顾客的业务。\n\
  \n顾客与画作之间的关系比画作与艺术家之间的关系更复杂。一幅画作只能有一位艺术家，而顾客可以购买多幅画作，并且多位顾客可以购买同一幅画作。\n\n显然，多位顾客实际上购买的并非**相同的**物品，而仅仅是复制品。实际上，你完全可能有多位顾客**串行地**购买同一件物品，即一个接一个地购买，就像古董或房产交易一样。借阅也是如此：一旦物品被归还，多位借阅者就可以借阅同一件物品。\n\
  \n为了管理销售，你将需要额外的一两个专门用于销售的表。\n\n如果销售的性质足够简单，你可以用一张表来管理。例如，如果你从事房地产行业，你可以有一张房产表和一张用于管理销售的单一表，如图\
  \ 2-3 所示。\n\n![](img/601766_1_En_2_Fig3_HTML.jpg)\n\n该关系数据库包含三张表：`Customers`、`sales`\
  \ 和 `Properties`，通过主键和外键连接。其中，`Customers` 表存储客户信息，包括 `ID`、`email`、`family name`、`given\
  \ name`；而 `Properties` 表存储房产详情，如 `ID`、`address`、`price`、`details`，以及用于关联表的 `customer\
  \ ID` 和 `sale date`。\n\n图 2-3\n\n房产销售\n\n由于你一次只销售一处房产，你可以在一个简单的 `sales` 表中管理交易。该表记录了哪位客户购买了哪处房产，以及相关的其他数据，如日期和金额。\n\
  \n如果客户要实际购买两处房产，他们会很乐意将其作为两笔交易来处理。\n\n你可以将相同的设计用于，比如说，汽车租赁，其中大多数客户一次只租一辆车。\n\n对于较小的物品，如画作，顾客很可能一次购买多件物品，并可能购买多件复制品。在这种情况下，进行多次销售交易会很麻烦，你需要一个更巧妙的方法。这里，你将需要*两张*表，如图\
  \ 2-4 所示。\n\n![](img/601766_1_En_2_Fig4_HTML.jpg)\n\n该关系数据库包含 4 张表：`customers`、`cart`、`products`\
  \ 和 `cart items`。这些表包含诸如 `customer ID`、`name`、`address`、`email`、`product details`、`quantity`、`price`\
  \ 等各种属性的列。\n\n图 2-4\n\n购物车\n\n你可能有过在互联网上购买多件物品的经历。通常，你的购买是以购物车的形式呈现，其中包含一个或多个购物车项目。即使你只购买了一件物品的一份副本，情况也是如此。\n\
  \n为了在数据库中管理购买行为，你有一张购物车表，每张购物车通过一个外键与一位客户关联。最终的细节，如 `checkout date`、`total price`\
  \ 以及 `payment` 和 `delivery methods`，都将存储在此表中。\n\n购买的每件产品将存储在第二张项目表中。这张表有两个外键。一个与购物车关联，而购物车又与一位客户关联。另一个与产品表关联。你可以将购物车视为购物车项目的*容器*。\n\
  \n每当需要在单次交易中管理多个项目时，都会使用相同的结构。这包括多个图书馆借阅项目，或者在我们的示例数据库中，多个销售项目。\n\n## 总结\n\n数据库是不同表的集合。每张表是相关数据的集合。\n\
  \n在设计良好的表中，每个数据项都有唯一正确的存放位置。\n\n#### 术语\n\n关于数据库本身\n\n*   `database`（数据库）是数据的完整集合。\n\
  *   `DBMS` 或 `Database Management System`（数据库管理系统）是管理数据的软件。\n*   `SQL` 或 `Structured\
  \ Query Language`（结构化查询语言）是用于与数据库通信的语言。\n\n关于数据项\n\n*   将数据视为占位符，而值（value）则是占位符的内容。\n\
  \nSQL 使用表的语言。对于每张表\n\n*   `row`（行）是表中数据的一个实例，例如一个客户或一本书。\n*   `column`（列）是行的细节，例如名称。\n\
  \n#### 规范化的表\n\nSQL 表需要组织得遵循某些规则，以使数据尽可能简单和可靠。\n\n*   数据是原子的\n*   列是独立的\n*   列是单一类型的\n\
  *   行是无序的\n*   行是唯一的\n*   行是独立的\n*   列名是唯一的\n*   列是无序的\n\n#### 多值\n\n数据库表不应在单个列中存储多个值。管理多个值需要一张额外的表，并引用回原始表。\n\
  \n### 后续内容\n\n现在你对示例数据库的设计方式及其原因有了概念。在现实生活中，并非所有工作数据库都完全遵循这些原则构建，有些数据库确实非常随意。关键在于，你偏离这些原则越远，使用数据库的难度就越大。\n\
  \n下一章将聚焦于一个简单的概念：如何从一张表中选择*某些*行，即如何用 `WHERE` 子句*过滤*表。\n\n脚注 1 2\n\n"
- '# 3. 数据过滤


  `DBMS` 的主要作用之一是存储数据。另一个主要作用是检索数据。要检索数据，你使用 `SELECT` 语句。然而，你通常不想要所有数据，因此你会希望过滤结果。


  在本章中，我们将探讨如何使用 `WHERE` 子句过滤你的请求。在此过程中，我们将涵盖重要主题，例如


  *   `WHERE` 子句如何工作

  *   处理缺失值

  *   处理不同的数据类型：数字、字符串和日期

  *   组合过滤器

  *   使用“通配符”


  如果你有百万行数据，你通常不希望得到百万行的结果。稍后，我们将研究如何汇总大量数据。现在，我们将看看如何获取*部分*数据。



  ## WHERE 子句


  `WHERE` 子句用于将结果限制为符合特定条件的行。例如，如果你想将顾客列表限制为身高较矮的顾客，可以使用


  ```sql

  SELECT *

  FROM customers

  WHERE height<170;

  ```


  你应该会看到类似这样的结果：


  | id | 姓名 | 名字 | … | 身高 | … | 注册日期 |

  | --- | --- | --- | --- | --- | --- | --- |

  | 186 | Gunn | Ray | … | 163.8 | … | 2021-11-15 |

  | 523 | Sights | Seymour | … | 167.3 | … | 2022-07-11 |

  | 351 | Tate | Dick | … | 167.8 | … | 2022-03-13 |

  | 422 | Why | Wanda | … | 163.2 | … | 2022-05-05 |

  | 121 | Ting | Lil | … | 162.8 | … | 2021-10-06 |

  | 545 | Knife | Jack | … | 167.4 | … | 2022-07-24 |

  | ~ 116 行 ~ |


  `WHERE` 子句后面跟着一个**断言**——一个结果为真或假的测试。在这个例子中，测试是 `height<170`，只有满足这个条件为真的行才会被返回。


  对于像这样简单的比较，你会用到在学校里学到的经典运算符。后面会有一个它们的表格。


  你可以通过使用 `NOT` 运算符来反转断言：


  ```sql

  SELECT *

  FROM customers

  WHERE NOT height<170;

  ```


  这将只返回身高*不*小于 170 的行。


  | id | 姓名 | 名字 | … | 身高 | … | 注册日期 |

  | --- | --- | --- | --- | --- | --- | --- |

  | 144 | King | Ray | … | 176.8 | … | 2021-10-18 |

  | 179 | Inkling | Ivan | … | 170.3 | … | 2021-11-08 |

  | 475 | Blood | Drew | … | 171.0 | … | 2022-06-13 |

  | 341 | Idate | Val | … | 177.1 | … | 2022-03-03 |

  | 588 | Skies | Grace | … | 171.5 | … | 2022-08-13 |

  | 326 | Todeath | Boris | … | 186.3 | … | 2022-02-15 |

  | ~ 132 行 ~`


  在许多情况下，`NOT` 有另一种表达方式：


  ```sql

  SELECT *

  FROM customers

  WHERE height >= 170;    --  或 height>=170

  ```


  `>=` 周围的空格不是必需的；它们只是为了更清晰。


  类似地，你可以测试精确匹配：


  ```sql

  SELECT *

  FROM customers

  WHERE height=170;

  ```


  结果不会有很多：


  | id | 姓名 | 名字 | … | 身高 | … | 注册日期 |

  | --- | --- | --- | --- | --- | --- | --- |

  | 118 | Barrow | Will | … | 170.0 | … | 2021-10-04 |

  | 15 | Second | Millie | … | 170.0 | … | 2021-07-22 |


  或者你可以测试不匹配：


  ```sql

  SELECT *

  FROM customers

  WHERE height<>170;

  SELECT *

  FROM customers

  WHERE NOT height=170

  ```


  这将给出其他的行：


  | id | 姓名 | 名字 | … | 身高 | … | 注册日期 |

  | --- | --- | --- | --- | --- | --- | --- |

  | 186 | Gunn | Ray | … | 163.8 | … | 2021-11-15 |

  | 144 | King | Ray | … | 176.8 | … | 2021-10-18 |

  | 179 | Inkling | Ivan | … | 170.3 | … | 2021-11-08 |

  | 475 | Blood | Drew | … | 171.0 | … | 2022-06-13 |

  | 523 | Sights | Seymour | … | 167.3 | … | 2022-07-11 |

  | 341 | Idate | Val | … | 177.1 | … | 2022-03-03 |

  | ~ 246 行 ~`


  对于像前面例子这样简单的算术表达式，你不会经常看到 `NOT` 形式的用法。然而，对于其他一些表达式，它更自然。


  ### 与列无关的断言


  `WHERE` 子句中的断言根本不必涉及表中的任何列。例如，以下都是可接受的：


  ```sql

  SELECT *

  FROM customers

  WHERE 1=1;  --  所有行

  SELECT *

  FROM customers

  WHERE 1=0;  --  无行

  ```


  在第一个例子中，断言 `1=1` 对所有行显然为真，所以所有行都被返回。断言 `1=0` 从不成立，所以没有行被返回。


  这些查询显然是无意义的，你可能永远不需要运行它们。然而，会有其他一些情况，你可能想测试断言本身，而不是获取实际数据。


  ### 全部与无


  `WHERE` 子句的结果总是有效的，即使它不是你想要的结果。例如：


  ```sql

  SELECT * FROM customers WHERE id>0; --  所有行

  SELECT * FROM customers WHERE id<0; --  无行

  ```


  一个断言可能导致返回所有行。这可能是一个无意义的断言，但它并非没有意义：下次，情况可能会不同。


  一个断言可能导致根本没有行返回。同样，下次情况也可能不同。查询不存在的东西并不是错误；但如果你接着*假定*会有更多结果，那*可能*就是错误了。


  请注意，在这种情况下，`id` 必须为正数并没有技术上的原因。这只是一个非常普遍的惯例。


  ### 处理 NULL


  `WHERE` 子句返回断言为**真**的行。如果一个断言不为真，它*不一定*是**假**。另一种可能是它是未知的。


  如果你计算前面例子的结果数量，你会发现身高小于 170 的顾客数量，加上身高不小于 170 的顾客数量，小于顾客总数。这是因为*部分*顾客没有记录身高值。


  在 SQL 中，`NULL` 代表一个缺失的值。为了方便起见（也可能会造成困惑），它通常用单词 **NULL** 显示，通常带有不同的颜色或背景色。然而，实际上那里空无一物。


  值可能缺失的原因有很多：


  *   该信息不适用，例如当一个人尚未去世时的死亡日期。

  *   该信息不可用，例如未提供的出生日期；你不能说这个人还没出生。

  *   该信息被视为无关紧要，例如额外的送货说明。

  *   不是上述原因，但我们就是不在意，所以没有输入。


  不幸的是，SQL 不区分这些不同的原因，因此在解释如何处理缺失值时需要小心；从技术上讲，对于 `NULL`，你只能说数据缺失，尽管有时你可以从上下文中*推断*一些信息。


  例如，死亡日期的缺失*本身*并不意味着一个人还没有去世。你需要更多的数据来确定。


  有时，人们会提到“NULL 值”，但这在术语上是矛盾的。这很重要，因为 `NULL` *在涉及值比较时总是被跳过*。这就是为什么 `height<170` 的行与
  `NOT height<170` 的行组合起来并不等于总行数：两个断言都只测试值，从不测试 `NULL`。在本例中，我们将直接使用 `NULL` 作为名词；有些人更喜欢“NULL
  标记”这个表述。


  你可以尝试用以下方法查找 `NULL`：


  ```sql

  SELECT *

  FROM customers

  WHERE height=NULL;  --  不起作用

  ```


  但它不会起作用。更准确地说，它会执行，但你不会得到任何结果。这是因为相等比较 `=` 只比较两个*值*。


  这完全说得通。如果你不知道身高，那么你就无法说它与另一个值相比如何。如果两个身高都是 `NULL`，你不能说它们相等，因为你根本不知道它们是什么。


  你可以在下面这个简单的例子中看到 `NULL` 比较：


  ```sql

  SELECT *

  FROM customers

  WHERE NULL=NULL;

  ```


  不会有结果，因为比较 `NULL` 总是为假。


  #### 有意忽略 NULL


  如果 `NULL=NULL` 总是为假，为什么 SQL 还允许比较 `NULL` 呢？更现实的情况是，你可能会比较两个列，而这两个列都可能包含 `NULL`。例如：


  ```sql

  SELECT *

  FROM artists

  WHERE born=died;

  ```


  不应该有任何结果，但你可能会得到几行：


  | id | 姓名 | 名字 | 别名 | 出生年份 | 去世年份 | 国籍 |

  | --- | --- | --- | --- | --- | --- | --- |

  | 348 | Daumier | Honoré | daumier | 1879 | 1879 | French |

  | 370 | Vermeer | Johannes | vermeer | 1675 | 1675 | Dutch |

  | ~ 2 行 ~`


  没有哪个在出生年份去世的人成为著名艺术家，所以任何匹配都表明有错误。然而，只有当*两个*值都存在且相同时，匹配才有意义。


  在这里，你肯定希望为了比较而忽略 `NULL`。



  ### 查找 NULL


  如何查找缺失值？SQL 提供了一个特殊的表达式 `IS NULL` 来查找 `NULL`：


  ```sql

  SELECT *

  FROM customers

  WHERE height IS NULL;       --  身高缺失

  ```


  这将返回所有身高缺失的记录：


  | id | familyname | givenname | … | height | … | registered |

  | --- | --- | --- | --- | --- | --- | --- |

  | 474 | Free | Judy | … |   | … | 2022-06-12 |

  | 377 | Money | Xavier | … |   | … | 2022-04-02 |

  | 321 | King | May | … |   | … | 2022-02-11 |

  | 46 | Ering | Hank | … |   | … | 2021-08-15 |

  | 350 | Bea | May | … |   | … | 2022-03-12 |

  | 500 | Mentary | Rudi | … |   | … | 2022-06-25 |

  | ~ 56 行 ~ |


  你也可以查找所有存在的身高值：


  ```sql

  SELECT *

  FROM customers

  WHERE height IS NOT NULL;   --  身高已存在

  ```


  这将返回其余的记录：


  | id | familyname | givenname | email | … | registered |

  | --- | --- | --- | --- | --- | --- |

  | 186 | Gunn | Ray | ray.gunn186@example.net | … | 2021-11-15 |

  | 144 | King | Ray | ray.king144@example.net | … | 2021-10-18 |

  | 179 | Inkling | Ivan | ivan.inkling179@example.com | … | 2021-11-08 |

  | 475 | Blood | Drew | drew.blood475@example.net | … | 2022-06-13 |

  | 523 | Sights | Seymour | seymour.sights523@example.net | … | 2022-07-11 |

  | 341 | Idate | Val | val.idate341@example.com | … | 2022-03-03 |

  | ~ 248 行 ~ |


  在第一个例子中，`IS NULL` 用于筛选缺失值。在第二个例子中，`IS NOT NULL` 用于筛选存在的值。你会发现，第二个例子的结果数量与将 `height<170`
  和 `NOT height<170` 的结果相加是一样的。


  你可以通过合并这些查询的结果来验证：


  ```sql

  SELECT * FROM customers WHERE height<170

  UNION

  SELECT * FROM customers WHERE NOT height<170;

  ```


  `UNION` 子句将两个或多个 `SELECT` 语句的结果合并，只要列匹配即可。稍后你会看到更多关于 `UNION` 的内容。


  说到 `NOT`，SQL 也接受另一种表达式：


  ```sql

  SELECT *

  FROM customers

  WHERE NOT height IS NULL;

  ```


  这个表达式在英语中读起来不太自然，也许如果你的名字叫尤达大师，会觉得更自然些。不过，它确实有一个小优点，就是遵循了 `NOT` 在其他用法中的相同模式，即紧跟在
  `WHERE` 关键字之后。这样，你的筛选条件要么是 `WHERE`，要么是 `WHERE NOT`（没有“可能”）。


  ### 数字


  在前面的例子中，`height` 是一个数字，所以比较很简单。数字遵循所谓的 **金发姑娘三分法**：比较两个数字时，结果要么是太小，要么是太大，要么是正好。


  要比较两个数字，你可以使用表 3-1 中所示的比较操作符。


  表 3-1


  比较操作符


  | 操作符 | 含义 | 否定形式 |

  | --- | --- | --- |

  | `a = b` | 值相等 | `NOT a = b` ; `a <> b` |

  | `a < b` | 小于 | `NOT a < b` ; `a >= b` |

  | `a > b` | 大于 | `NOT a > b` ; `a <= b` |

  | `a <= b` | 小于或等于（“不高于”） | `NOT a <= b` ; `a > b` |

  | `a >= b` | 大于或等于（“不低于”） | `NOT a >= b` ; `a < b` |


  注意 `NOT a < b` 与 `a > b` 不同，因为必须考虑相等的情况。


  正如你稍后将看到的，这些操作符也适用于非数字比较，但需要赋予更恰当的含义。


  #### 离散值 vs. 连续值


  比较以下两个语句：


  ```sql

  SELECT *

  FROM artists

  WHERE born >= 1700;

  SELECT *

  FROM artists

  WHERE born > 1699;

  ```


  它们当然会给你相同的结果，因为 `1700` 紧接在 `1699` 之后。


  | id | familyname | givenname | aka | born | died | nationality |

  | --- | --- | --- | --- | --- | --- | --- |

  | 147 | Pissarro | Camille | pissarro | 1830 | 1903 | French |

  | 107 | Legros | Alphonse | legros | 1837 | 1911 | French |

  | 176 | Caillebotte | Gustave | caillebotte | 1848 | 1894 | French |

  | 133 | Constable | John | constable | 1776 | 1837 | English |

  | 158 | Shaw | Joshua | shaw | 1776 | 1860 | American |

  | 5 | Puvis de Chavannes | Pierre | puvis | 1824 | 1898 | French |

  | ~ 99 行 ~ |


  然而，这并不总是成立。试试这个：


  ```sql

  SELECT *

  FROM customers

  WHERE height >= 170;

  ```


  结果如下：


  | id | familyname | givenname | … | height | … | registered |

  | --- | --- | --- | --- | --- | --- | --- |

  | 144 | King | Ray | … | 176.8 | … | 2021-10-18 |

  | 179 | Inkling | Ivan | … | 170.3 | … | 2021-11-08 |

  | 475 | Blood | Drew | … | 171.0 | … | 2022-06-13 |

  | 341 | Idate | Val | … | 177.1 | … | 2022-03-03 |

  | 588 | Skies | Grace | … | 171.5 | … | 2022-08-13 |

  | 326 | Todeath | Boris | … | 186.3 | … | 2022-02-15 |

  | ~ 132 行 ~ |


  与以下查询比较：


  ```sql

  SELECT *

  FROM customers

  WHERE height > 169;

  ```


  结果如下：


  | id | familyname | givenname | … | height | … | registered |

  | --- | --- | --- | --- | --- | --- | --- |

  | 144 | King | Ray | … | 176.8 | … | 2021-10-18 |

  | 179 | Inkling | Ivan | … | 170.3 | … | 2021-11-08 |

  | 475 | Blood | Drew | … | 171.0 | … | 2022-06-13 |

  | 341 | Idate | Val | … | 177.1 | … | 2022-03-03 |

  | 588 | Skies | Grace | … | 171.5 | … | 2022-08-13 |

  | 326 | Todeath | Boris | … | 186.3 | … | 2022-02-15 |

  | ~ 145 行 ~ |


  这很可能会得到非常不同的结果，因为 `170cm` 并不紧接在 `169cm` 之后。与出生年份不同，以厘米为单位的身高可以涉及小数部分。


  我们说出生年份的值是 **离散的**：它们是整数值，但没有中间值。另一方面，身高的值是 **连续的**：存在中间值。^(⁴)


  对于离散值，你可以在前面两个例子之间做出选择，因为一个离散值肯定在下一个之前。然而，对于连续值，你没有这种选择。


  有时，连续值可以被简化为离散值。例如，时间是连续的，但你可以将其简化为离散的日期。货币价值可能是连续的，但你可以通过忽略小数部分（例如，只考虑美元而不考虑美分）使其离散化。


  '
- '# 字符串


  最基本的字符串筛选是查找精确匹配：


  ```sql

  SELECT *

  FROM customers

  WHERE state=''VIC'';

  ```


  这给出了位于 VIC 的客户：


  | id | familyname | givenname | … | state | … | registered |

  | --- | --- | --- | --- | --- | --- | --- |

  | 186 | Gunn | Ray | … | VIC | … | 2021-11-15 |

  | 523 | Sights | Seymour | … | VIC | … | 2022-07-11 |

  | 545 | Knife | Jack | … | VIC | … | 2022-07-24 |

  | 505 | Singers | Carol | … | VIC | … | 2022-06-29 |

  | 492 | Long | Miles | … | VIC | … | 2022-06-21 |

  | 374 | Sharalike | Sharon | … | VIC | … | 2022-03-29 |

  | ~ 52 行 ~ |


  要获取居住在其他地方的客户：


  ```sql

  SELECT *

  FROM customers

  WHERE state<>''VIC''; --  WHERE NOT state=''VIC''

  ```


  这应该会给你所有其他州的客户：


  | id | familyname | givenname | … | state | … | registered |

  | --- | --- | --- | --- | --- | --- | --- |

  | 474 | Free | Judy | … | NSW | … | 2022-06-12 |

  | 144 | King | Ray | … | NSW | … | 2021-10-18 |

  | 179 | Inkling | Ivan | … | WA | … | 2021-11-08 |

  | 475 | Blood | Drew | … | QLD | … | 2022-06-13 |

  | 341 | Idate | Val | … | NSW | … | 2022-03-03 |

  | 351 | Tate | Dick | … | NSW | … | 2022-03-13 |

  | ~ 217 行 ~ |


  与所有筛选器一样，筛选不存在的值并不是错误：


  ```sql

  SELECT *

  FROM customers

  WHERE state=''XYZ'';

  ```


  但是，如果数据类型不匹配，这*可能*是错误：


  ```sql

  SELECT *

  FROM customers

  WHERE state=23;

  ```


  在某些数据库管理系统（如 PostgreSQL 和 Oracle）中，这将导致错误，因为你无法将字符串与数字匹配。要使比较生效，你需要将数字表示为字符串：`WHERE
  state=''23''`。在其他一些系统（如 SQLite、MySQL/MariaDB 和 MSSQL）中，为了比较目的，数字会被隐式转换为字符串。



  #### 引号


  在 SQL 中，字符串使用*单引号*括起来。双引号具有完全不同的含义。


  对此有一些罕见的例外：


  *   Microsoft Access 允许你使用双引号作为单引号的替代；实际上，它似乎更偏好双引号，但你不应该这样做。

  *   MySQL/MariaDB 也允许你使用双引号，但这取决于其运行模式；在 ANSI 模式下，双引号不能用于字符串。


  无论如何，单引号总是适用的。


  如果你使用双引号而不是单引号会发生什么？


  ```sql

  SELECT *

  FROM customers

  WHERE state="VIC";      --  在 MySQL/MariaDB 中可能没问题

  ```


  对于大多数数据库管理系统，你会收到错误信息，指出列 `VIC` 未知。也就是说，双引号被解释为包围列名，而不是字符串。SQL 认为你试图将 `state` 列与未知的
  `VIC` 列进行匹配。


  有时这可能会导致混淆：


  ```sql

  SELECT * FROM customers WHERE familyname=''Town'';

  SELECT * FROM customers WHERE familyname="Town";

  ```


  前面的第一个示例查找 `familyname` 匹配 `Town` 的客户，而第二个示例则查找姓氏恰好与他们居住城镇名相同的客户。


  如果你不在 ANSI 模式下运行 MySQL/MariaDB，双引号将被解释为字符串，并且你会得到一个成功的结果。请参阅下面关于在 MySQL/MariaDB
  中运行 ANSI 模式的部分。


  你可以在任何列周围使用双引号：


  ```sql

  SELECT *

  FROM customers

  WHERE "state"=''VIC'';

  ```


  这里的双引号根本不会产生任何影响，因为 SQL 已经知道 `state` 是列名。


  关于计算列值的第 5 章有更多关于使用双引号的信息。


  #### 关于 MySQL/MariaDB 模式的更多信息


  如果你使用 MySQL 或 MariaDB，我们建议你始终将会话设置为 ANSI 模式。你可以一开始就这样做：


  ```sql

  SET SESSION sql_mode = ''ANSI'';

  ```


  此语句只需要在会话开始时运行一次。就我们的目的而言，最重要的差异将体现在：


  *   双引号的使用

  *   字符串连接（拼接字符串），你稍后在处理计算时会看到。


  如果你不使用 ANSI 模式，你仍然可以完成大多数操作，但某些语法可能需要调整。


  本书将假定你已将会话设置为 ANSI 模式。


  #### 关于双引号和单引号的更多内容


  有一个名为 `badtable` 的表，其中可以看到各种有问题的名称：


  ```sql

  SELECT * FROM badtable;

  ```


  你将看到以下结果：


  | customer code | customer | order | 1st | 42 | last-date |

  | --- | --- | --- | --- | --- | --- |

  | 23 | Fred | 42 | 2020-01-01 | Life, … | 2020-01-31 |

  | 37 | Wilma | 54 | 2020-02-01 | I think …. | 2020-02-29 |


  到目前为止，一切正常。但是，如果你尝试单独选择这些列，你会得到各种错误：


  ```sql

  SELECT

  customer code,  --  customer AS code

  customer,

  order,          --  ORDER BY

  1st,            --  number 1 AS st

  42,             --  number 42

  last-date       --  last -  date

  FROM badtable;

  ```


  只有 `customer` 列是正确的。有些会导致错误，有些会被误解。


  引用这些有问题列名的唯一方法是使用双引号将其括起来：


  | code | customer | order | st | ?column? | last-date |

  | --- | --- | --- | --- | --- | --- |

  | Fred | Fred | 42 | 1 | 42 | 2020-01-31 |

  | Wilma | Wilma | 54 | 1 | 42 | 2020-02-29 |


  ```sql

  SELECT

  customer code,  --  customer AS code

  customer,

  "order",

  1st,            --  number 1 AS st

  42,             --  number 42

  "last-date"

  FROM badtable;

  ```


  两个被误解的列涉及别名。你稍后会看到更多关于别名的内容，但你会看到歧义是由于 `AS` 这个词是可选的这一事实造成的。


  另一个被误解的列是 `42` 被解释为一个值，这是合法的，而不是列名。为了完成这项工作，你也需要给这些名称加上引号：


  ```sql

  SELECT

  "customer code",

  customer,

  "order",

  "1st",

  "42",

  "last-date"

  FROM badtable

  ```


  关于列名有一些简单的规则，而我们似乎费了很大力气去违反它们：


  *   名称不应包含空格或其他特殊字符，如连字符。如果你需要分隔符，通常应使用下划线 (`_`)。

  *   名称不应以数字开头，并且当然不应 `be` 一个数字。

  *   名称应避免使用 SQL 关键字，如 `order`。某些数据库管理系统可能会让你感到惊讶。例如，PostgreSQL 将“name”视为关键字。


  在正常情况下，你的查询不应该需要双引号，因为一个好的 SQL 开发人员应该知道如何避免这些问题。然而，你不能总是为另一位开发人员所做的工作负责，所以有时你可能需要双引号。


  #### 大小写敏感性


  字符串的比较方式并不总是一样的。例如，`customers` 表中的所有州名都是大写的。如果你尝试匹配小写：


  ```sql

  SELECT *

  FROM customers

  WHERE state=''vic'';

  ```


  你的结果会有所不同。


  在 PostgreSQL、Oracle 和 SQLite 中，默认情况下，你不会得到任何匹配项。然而，对于 MySQL/MariaDB 和 MSSQL，你会像之前一样得到匹配项。


  字符串变体如何比较被称为**排序规则**。在其他语言中，可能存在许多变体，但在英语中，主要的变体是大写/小写。


  PostgreSQL、Oracle 和 SQLite 的默认排序规则是大小写敏感的；也就是说，大写和小写被视为不同。在 MySQL/MariaDB 和 MSSQL
  中，默认排序规则是大小写不敏感的。*但是，个别数据库可能已使用替代排序规则设置。*


  表 `sorting` 在其 `stringvalue` 列中使用了不一致的大小写，因此你可以尝试：


  ```sql

  SELECT *

  FROM sorting

  WHERE stringvalue=''APPLE'';

  ```


  同样，结果的数量将取决于排序规则。


  在任何情况下，你的表或数据库的排序规则可能不是默认的。如果你不确定排序规则，可以运行这个简单的查询：


  ```sql

  SELECT *

  FROM customers

  WHERE ''a''=''A'';

  ```


  如果你的排序规则是大小写敏感的，那么断言 `''a''=''A''` 为假，因此你将不会得到任何行。如果是大小写不敏感的，那么断言为真，因此你将得到所有行。


  如果你的排序规则是大小写敏感的，但你仍然希望进行大小写不敏感的匹配，则有两种解决方案。


  首先，你可以强制将数据转换为大写或小写，然后测试结果。例如：


  ```sql

  SELECT *

  FROM customers

  WHERE lower(state)=''vic'';

  ```


  这是一个稍微昂贵的解决方案，因为数据库管理系统需要在每一行上执行一个操作才能进行比较。


  第二个解决方案是要求数据库管理系统为查询使用替代排序规则。但是，这可能非常复杂。


  如果你的数据库排序规则是大小写敏感的，并且你发现需要进行许多大小写不敏感的搜索，你也许可以使用**索引**来减少工作量。数据库索引就像书中的索引，可以帮助数据库管理系统更快地查找内容。索引将在后面讨论。




