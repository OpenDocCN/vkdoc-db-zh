  *   接下来，我们将查看使用数据操作语言语句更改一些数据。\n\n下一章的目的不是让你成为构建数据库的专家，而是让你能更好地理解正在发生的事情。\n\n至于操作数据，这不是你通常手动完成的事情；然而，了解其原理非常重要。\n\
  \n脚注 1   2   3\n\n在大多数情况下，我们使用 `SELECT` 语句从数据库中提取数据。`SELECT` 语句及其各种子句通常被称为 `DQL`——**数据查询语言**。\n\
  \nSQL 的功能远不止让你选择数据。除其他功能外，它还允许你操作数据。\n\nSQL 中有三种主要的操作数据语句：\n\n*   `INSERT` 语句是你向表中添加新数据的方式。\n\
  *   `UPDATE` 语句允许你更改表中的现有数据。\n*   `DELETE` 用于从表中删除一行或多行。\n\n总的来说，这些语句属于所谓的 `DML`——**数据操作语言**。\n\
  \n还有一些语句操作的不是数据，而是实际的数据库结构，例如表和视图：\n\n*   `CREATE` 用于在数据库中创建新表、视图或其他对象。\n*   `DROP`\
