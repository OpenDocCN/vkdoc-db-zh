- '# 创建表


  表是通过 `CREATE TABLE` 语句来创建的。例如：


  ```sql

  CREATE TABLE customers (

  id int GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,

  email VARCHAR(60) NOT NULL UNIQUE,

  familyname VARCHAR(40) NOT NULL,

  givenname VARCHAR(40) NOT NULL,

  street VARCHAR(64),

  town VARCHAR(48),

  state VARCHAR(3) default ''VIC'',

  postcode CHAR(4)

  CHECK (postcode SIMILAR TO ''[0-9][0-9][0-9][0-9]''),

  dob date

  CHECK (dob < current_date - interval ''18 years''),

  phone char(10)

  CHECK (phone SIMILAR

  ''[01][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]''),

  spam boolean default false,

  height decimal(4,1),

  registered date NOT NULL

  );

  ```


  此语句适用于 PostgreSQL 数据库管理系统，但对于其他数据库管理系统也非常相似，我们会在后文中说明。


  `CREATE TABLE` 语句，顾名思义，用于创建一个新表。它大致如下所示：


  ```sql

  CREATE TABLE something (

  --  详细信息

  );

  ```


  SQL 中有许多 `CREATE` 语句，例如 `CREATE VIEW`，但这个语句略有不同，因为其详细信息被包裹在括号内。


  前面的详细信息通常定义表中的列。它们遵循以下模式：


  ```

  名称 类型 [约束条件等 …]

  ```


  约束条件是附加的规则，用于*约束*（限制）哪些值对是该列有效的。有时还存在一些其他属性，它们会影响列的行为。


  约束条件和其他属性可以通过三种方式添加：


  *   它们可以与列的定义一起*内联*添加。

  *   它们可以在 `CREATE TABLE` 语句中单独添加，通常在末尾。

  *   它们可以在表创建之后添加。


  这是按灵活性递增和便捷性递减的顺序排列的。


  要删除一个表，SQL 有点讲究。你可能认为可以 `delete` 一个表，但这行不通：`DELETE` 是为表内的行保留的。相反，你应该 `DROP` 该表：


  ```sql

  DROP TABLE something;

  DROP TABLE IF EXISTS something; --  Oracle 不支持

  ```


  如果你尝试删除一个不存在的表，你会得到一个错误。前面的第二种形式忽略了这一点。Oracle 不支持 `IF EXISTS`，所以在那里你需要更加小心。


  无论如何你都必须小心，因为删除表也会删除数据，这种错误你犯一次就可能开始找新工作了。专家也许能恢复数据，但别指望它。


  '
- '# 列名


  我们之前讨论过什么构成有效的名称。通常，它们不应干扰 SQL 语言，并应避免使用空格或连字符等特殊字符，除非你想为此付出双引号的代价。


  列名也应该是唯一的：显然，你不能有两个同名的列。


  *没有特殊名称*。例如，将某物命名为 `id` 并不会使其成为主键。这取决于开发者来想出一个合适的名称。也没有特殊的位置。你可以按你喜欢的任何顺序排列你的列，但同样，这取决于开发者来想出一个合适的顺序。


  许多开发者忘记（或不在乎）谁将使用数据库，因此你有时会得到非常晦涩或令人困惑的表名和列名。说真的，这没有借口。一个好的名称应该易于使用。


  ### 数据类型


  在 SQL 中，有三种主要数据类型以及类型之间的一些变体。以下是其中一些示例：


  | 数字 | 日期 | 字符串 |

  | --- | --- | --- |

  | `integer`, `decimal()`, `float` | `date`, `datetime` | `char()`, `varchar()` |


  可能还有其他数据类型，例如 **Boolean**（真/假值）或 **BLOB**（二进制数据）。


  还有进一步的变体。例如，你可以决定一个整数是范围有限的短整数，还是范围更大的长整数。你可以决定一个字符串的长度，或者一个小数的精度。以下是示例数据库中使用的一些类型：


  | 类型 | 描述 |

  | --- | --- |

  | `INT` | 又名 `INTEGER`：一个整数，在此情况下范围在 -2,147,483,648 到 2,147,483,647 之间 |

  | `DECIMAL(4,1)` | 又名 `NUMERIC`：这是一个具有固定小数位数的小数。其表示法可能令人困惑：它表示最多四位数字，*包括*一位固定小数位。还有具有可变精度的
  `FLOAT` |

  | `VARCHAR(60)` | 一个最多可延伸至 60 个字符长的字符串 |

  | `CHAR(4)` | 一个固定为四个字符的字符串。如果你输入少于四个字符，它将用空格填充，这就是为什么应忽略尾部空格 |

  | `BOOLEAN` | 一个值，要么是 `true` 要么是 `false`，以数学逻辑先驱之一乔治·布尔命名 |

  | `DATE` | 不含时间的日期 |

  | `TIMESTAMP` | 又名 `DATETIME`：一个包含时间（精确到秒的一小部分）的日期 |


  注意


  *   原则上，`VARCHAR` 更节省空间，而 `CHAR` 处理效率更高（DBMS 无需计算字符串长度，因为它已经知道）；实际上，现代 DBMS 无论如何都相当高效，因此这种区别不那么重要。

  *   一些 DBMS 不支持布尔数据类型，因此只能用整数 `1` 或 `0` 来凑合。一些 DBMS 还支持一种称为 `BIT` 的非常短的整数。

  *   注意邮政编码和电话号码是字符串，即使它们仅限于数字。这是因为它们并不是真正的数字：它们的数值没有意义；一个值并不真正大于或小于另一个值，甚至它们的顺序也无关紧要。


  选择哪种数据类型部分取决于最正确的类型（出生日期*必须*是日期），部分取决于了解你在现实生活中可能遇到的情况（60 个字符长对于电子邮件地址是否足够？）。




  ### 主键


  主键是表中每一行的唯一标识符。它不需要有特定的名称，也不一定是第一列。但如果你养成良好的设计习惯，处理起来会更容易。


  原则上，任何具有唯一值的列（例如客户的电子邮件地址）都有资格作为主键。然而，一个好的主键应具备以下特点：


  - 主键必须保证唯一。

  - 主键永远不能是 `NULL`。

  - 主键不太可能改变。


  正是最后一个特点让电子邮件地址变得有点棘手。客户有可能更改他们的电子邮件地址，虽然数据库可以处理这种情况，但这确实会降低其可靠性。


  这引出了下一点。通常，主键有两种类型：


  - 自然主键是代表真实数据的主键。例如，客户的电子邮件地址或一个国家的唯一两字母或三字母代码。

  - 代理主键没有内在价值——它是一个任意的代码，不提供关于数据的任何其他信息。


  有些自然主键，如国家代码，永远不会改变，因此可能是良好的候选。但许多自然主键会改变，因此通常依赖于一个单独的代理键，它没有理由改变。


  许多数据库开发人员为他们的主键使用各种名称，但它们通常都包含 `id` 的某种变体。实际上，`id` 经常被用作主键的宽松同义词。


  真正定义主键的是在定义中添加 `PRIMARY KEY`。


  一个表中只能有一个主键。然而，主键可以是复合的：由两列组合而成，而不是通常的一列。


  有时，主键在 `CREATE TABLE` 语句的末尾定义：


  ```

  CREATE TABLE something (

  id INT,

  --  等等

  PRIMARY KEY (id)

  );

  ```


  通常不需要以这种方式定义主键，但这是定义复合主键的唯一方式。


  SQL 允许你在表定义之后定义一个新的主键（只要还没有主键）。它还允许你向现有列添加主键，只要该列没有 `NULL` 值并且现有值是唯一的。


  主键不一定是整数。例如，它可以是一个精心构造的字符串，只要保证它是唯一的。


  然而，如果你觉得图省事，主键可以是一个简单的自动序列号。显然，许多数据库开发人员都喜欢省事，因为许多数据库使用自动序列号作为主键。


  自动序列号最初并不在标准 SQL 中，因此每个数据库管理系统（DBMS）都自行设计了各自的实现方式。以下是一些变体：


  | DBMS           | 自动序列实现方式                 |

  |----------------|----------------------------------|

  | PostgreSQL     | `GENERATED BY DEFAULT AS IDENTITY` |

  | Oracle         | `GENERATED BY DEFAULT AS IDENTITY` |

  | Microsoft SQL  | `IDENTITY(1,1)`                 |

  | MySQL          | `AUTO_INCREMENT`                |

  | SQLite         | `AUTOINCREMENT`                 |


  SQL 标准是 `GENERATED BY DEFAULT AS IDENTITY`，PostgreSQL 和 Oracle 使用的就是这个。旧版本的 PostgreSQL
  使用 `SERIAL`，而旧版本的 Oracle 则根本没有自动序列功能，只能凑合使用触发器（一种自动化机制）。


  ### 约束


  正如我们提到的，约束是任何限制有效值构成的规则。一般来说，如果你试图输入一个违反约束的值，DBMS 会引发错误并拒绝该操作。


  DBMS 并不关心数据在现实中是否正确，甚至是否合理。如果你在 `familyname`（姓氏）字段中输入你的出生地，那是你自己的事。DBMS 只关心数据是否有效；即，数据是否通过了约束检查。


  第一个约束是数据类型本身。如果你将列定义为数字，那么你就不能在其中放入字符串。


  对于 SQLite，请忽略上面这句话^(¹⁰)以及下面这句话。它允许在任何列中存放任何类型的数据。当你定义一列时，你设置的是一个“亲和性”，这是一种偏好，但它并不强制你遵守。


  数据类型还包括额外的约束，例如字符串的长度或数字的精度。


  除了数据类型之外，你还可以通过额外的约束来更好地控制数据。这些约束包括：


  - `NOT NULL`：声明该列不能为空。

  - `UNIQUE`：不允许列中出现重复值。

  - `DEFAULT`：如果未指定值，则自动为新行提供一个值。

  - `CHECK`：一条自定义规则。

  - 此外，除了数据类型，你还可以通过指定该值必须匹配另一个表中的值来获得更多控制。这被称为外键。


  在这里，我们将更详细地研究这些约束。


  ### NOT NULL


  你可能遇到的第二个约束是 `NOT NULL`。它的意思如其字面所示：数据不能是 `NULL`；换句话说，始终需要一个值。


  一个可能包含值的列有时被称为可为空的列。


  一个列可为空，并不意味着你实际上不需要这个值。例如，除非你知道客户的地址，否则无法向其发货。允许为空仅仅意味着你可以稍后收集这些信息，而不必在添加行时立即提供。


  带有 `NOT NULL` 约束的列看起来像这样：


  ```

  familyname VARCHAR(24) NOT NULL

  ```


  `NOT NULL` 约束可以与这里讨论的其他约束组合使用。


  ### UNIQUE


  没有理由两个客户不能有相同的出生日期，但你不希望他们有完全相同的电子邮件地址。SQL 既不知道也不关心这意味着什么，所以你需要自己告诉 DBMS。


  将一列标记为 `UNIQUE` 会使 DBMS 确保新的电子邮件地址不能与另一个客户的相同。它不关心谁先输入，后输入的那个会失败。


  唯一约束的列不一定必须有值，除非它同时是 `NOT NULL`。只有实际值才会被比较是否唯一，而 `NULL` 值都会被忽略。


  除了微软的产品。微软有一个怪癖，它确实会匹配 `NULL`，并且出人意料地会将两个 `NULL` 声明为相同，因此违反了唯一约束。值得庆幸的是，有一个解决方法，但这确实使得在可为空的列上添加唯一约束变得有点棘手。


  带有 UNIQUE 约束的列看起来像这样：


  ```

  title VARCHAR(24) CONSTRAINT uq_minipaintings_title UNIQUE

  ```


  或者更简单些：


  ```

  title VARCHAR(24) UNIQUE

  ```


  第一种形式允许你为唯一约束命名。数据库中的所有对象，包括约束，都有一个唯一的名称。如果你不关心名称是什么，可以使用第二种形式，让 DBMS 编造一个；不过，这个名字可能不太好看。


  约束的名称可以用于例如将来某个时候需要删除它的时候。


  ### DEFAULT


  严格来说，这被认为是一种约束，尽管你可能会怀疑这是否正确。


  有时，你可以假设一个值，除非有相反的值。例如，你可以假设一幅画的数量应该是 `1`，除非输入了另一个值。


  如果你想实现一个默认值，你可以这样写：


  ```

  quantity NOT NULL DEFAULT 1

  ```


  这是两个不同的约束：第一个 `NOT NULL` 禁止 `NULL`，而第二个 `DEFAULT 1` 将在没有其他值时自动填入值 `1`。


  在示例数据库中，没有这样做，这就是为什么允许出现一些 `NULL`，而你不得不使用 `coalesce()` 来强制赋值。


  有时，默认值只是为了方便。有时，它可以作为一个安全的后备选项。





  ### CHECK


  前面的约束相当宽泛，涉及 SQL 数据的一些基本属性。有时，你需要一个可以被简单地视为特定于你环境的约束。这有时被称为业务规则。


  `CHECK`约束是一种通用的杂项约束，它允许你使用 SQL 能理解的任何内容。它的形式如下：


  ```

  CHECK (condition)

  ```


  前面的条件看起来完全像一个`WHERE`子句。本质上，它的意思是，如果你正在寻找匹配项（`WHERE …`），那么这一行就应该被包括在内。有了这个约束，所有值（当然`NULL`除外，它不是一个值）都应该匹配。


  例如：


  ```

  -- 匹配 4 位数字：

  CHECK (postcode SIMILAR TO [0-9][0-9][0-9][0-9])

  -- 出生日期不晚于（最晚等于）死亡日期：

  CHECK (born<=died)

  ```


  约束可以应用于单个列，如前面的第一个示例，但也可以应用于多个列，例如当你想比较它们时。


  ### 外键


  外键也是一种约束。在这种情况下，它要求一个表中的值必须匹配另一个表中的值。它的形式如下：


  ```

  column type REFERENCES table(column)

  ```


  每列都必须有一个数据类型，并且被引用的列必须具有完全相同的类型。你会注意到前面的形式实际上没有使用术语“foreign key”。这是简短形式，还有一个使用该术语的较长形式。


  请注意，外键是在引用其他表的表中定义的——从“子”表到“父”表——而不是相反。


  正如你从`paintings`表中看到的，外键列不一定需要有值。与所有约束一样，外键要求只适用于实际值，而不适用于`NULL`。


  如果你*也*要求一个值，你需要同时设置`NOT NULL`。你将在`sales`表中看到这一点，其中的`customerid`外键*必须*有一个有效值；以及在`saleitems`表中，`saleid`和`paintingid`列都必须有一个值；拥有一个不知道客户是谁的销售，或者一个不知道画作是什么的销售项目，都没有任何意义。另一方面，拥有一幅艺术家未知的画作是可以的。


  与所有约束一样，SQL 不允许你包含无效数据。问题是，如果另一个表中的某一行被删除了，会发生什么？


  例如，如果你试图删除一个艺术家会发生什么？如果没有画作引用这个艺术家，那么我们可以继续。另一方面，如果有一些画作，那么删除将导致画作引用一个无效（不存在）的艺术家，这将违反约束。


  DBMS 永远不会允许无效数据，因此有三种可能的处理方式：


  *   首先，它可以简单地禁止删除，直到你首先删除那些麻烦的画作。这是默认行为。

  *   其次，它可以允许删除，但随后自动将`painting.artistid`外键设置为`NULL`。

  *   第三，它可以允许删除，但随后自动删除那些违规的画作。这被称为`cascading`删除。


  第一种选项是默认的，如果你想要其他选项，则需要指定它们。设置`NULL`是一个相对无痛的选项，所以如果你想要的话，这里可以考虑。


  从另一个表中删除相关行是非常激烈的，并且可能是一个坏主意，尤其是在这种情况下，特别是因为画作也可能影响销售项目。


  然而，对于销售和销售项目的情况就不同了。在这里，你可能会决定删除一笔销售，例如当销售尚未完成（尚未付款）时。在这种情况下，同时删除相关的销售项目是有意义的。


  要启用级联删除，我们附加


  ```

  ON DELETE CASCADE

  ```


  当然，这又是另一个问题了，即你首先是否应该删除数据。


  '
- '# 索引


  通常，SQL 标准不告诉 DBMS 如何完成其工作，并且，除其他外，它将内部存储和组织留给软件决定。


  其后果之一是，数据可能不会以任何特别有用的顺序存储；它可能以对软件来说最快、最有效的方式存储。这就是为什么除非你使用`ORDER BY`子句强制排序，否则你不能确定`SELECT`语句的结果将以什么顺序出现。


  这种安排的唯一缺点是，它使 DBMS 更难查找特定值，因为它可能在任何地方。


  例如，如果你按姓氏搜索客户，它可能在任何地方，DBMS 可能很快找到它，也可能在几乎遍历完所有记录后才找到它。如果数据有序，查找会更快。


  另一方面，如果数据按姓氏排序，那么在按电子邮件地址查找客户时就没有帮助。


  解决方案是保留表本身，并维护一个单独的索引，这类似于书后的索引或图书馆目录。DBMS 不是搜索原始表，而是搜索索引。索引将包含数据的有序副本，以及对表中行位置的引用。


  要创建索引，SQL 是：


  ```

  CREATE INDEX name ON table(columns);

  ```


  每个索引都有一个名称，并定义在特定的表上，使用一个或多个列。


  在你的`SELECT`语句中，你不需要做任何不同的事情，所以你永远不需要担心它；如果存在索引并且 DBMS 认为值得使用，索引会被自动使用。如果表足够大，你应该会注意到搜索性能的提升。


  索引确实需要数据库中额外的一点存储空间，并且确实需要一点额外的维护来跟上表的更改。因此，你不会索引所有内容：只索引那些你认为会经常搜索的列。


  有两种类型的列你不需要索引。主键总是被索引，任何`UNIQUE`列也是如此。



  ## 向表中添加行


  在这里，我们将操作其中一张表——`customers` 表。我们将添加和更改一些数据，并对表本身进行一些修改。


  首先，我们将添加一个新客户。要添加行，请使用 `INSERT` 语句：


  ```

  INSERT INTO table(columns)

  VALUES (values);

  ```


  例如：


  ```

  INSERT INTO customers(givenname, familyname,

  email, registered)

  VALUES (''Norris'', ''Lurker'', ''norris.lurker@example.com'',

  current_timestamp);

  ```


  `INSERT` 语句可用于添加新值（如此处所示），或从另一张表复制值。它通常包含一个列列表，但如果你承诺以正确的顺序填写所有列，则可以省略该列表。通常，包含列表更为可靠。


  关于列列表，有一些明显的规则：


  *   所有 `NOT NULL` 列*必须*被包含，除非它们有默认值。

  *   值必须在数量（多少）和各自类型上与列匹配。

  *   SQL 并不真的在乎你是否弄错了实际值，比如，假设，颠倒了 `givenname` 和 `familyname`，只要这些值是兼容的。


  所有其他列将获得 `NULL` 值，但有一些例外。如果列定义包含 `DEFAULT`（例如 `spam` 列的 `false`），那么当你省略该列时，将使用该默认值。这包括任何带有默认值的
  `NOT NULL` 列。这意味着你可以将它们排除在列列表之外。


  如果你想强制使用 `DEFAULT` 列，也可以包含 `DEFAULT` 关键字作为虚拟值。然而，这在 SQLite 中不起作用。


  即便如此：


  *   当然，你也可以包含非 `NOT NULL` 的列。在这个例子中，我们没有这样做。

  *   你也可以包含带有默认值的列，并为其指定一个替代值。


  从技术上讲，主键 `id` 应该是 `NOT NULL` 的，因此原则上它应该被包含在列列表中。然而，在这个例子中，由于它是一个自动生成的数字，这起到了默认值的作用，因此你可以并且应该省略它。如果主键不是自动生成的，你则需要包含它。


  现在再次运行 `INSERT` 语句，但更改电子邮件地址：


  ```

  INSERT INTO customers(givenname, familyname,

  email, registered)

  VALUES (''Norris'', ''Lurker'', ''norris.lurker@example.net'',

  current_timestamp);

  ```


  没错：你添加了同一个客户两次。你可以通过以下命令查看结果：


  ```

  SELECT * FROM customers ORDER BY id DESC;

  ```


  添加两个同名的客户在技术上并没有错，所以这可能不是错误。此时，SQL 无法帮助你决定你真的有两个同名的客户还是一个重复项，所以你必须通过其他方式来弄清楚；通常，这意味着亲自去追查他们。


  请注意，即使是电子邮件地址也不能证明什么。尽管电子邮件地址不同（不允许重复的电子邮件地址），但这不会是第一个拥有多个电子邮件地址的用户。


  ## 从表中删除行


  让我们假设第二个同名的客户确实是一个重复项，因此你需要删除它。为此，你使用：


  ```

  DELETE

  FROM table;

  ```


  然而，你需要非常小心这个操作。它本身会删除*所有*行，这可能不是你的本意。如果你只想删除部分行，需要用 `WHERE` 子句来限定它：


  ```

  DELETE

  FROM table

  WHERE …;

  ```


  有时，你不确定是否针对了正确的行，当然也不想事后才发现。你可以通过将 `DELETE` 改为 `SELECT *` 来进行检查：


  ```

  SELECT *

  FROM table

  WHERE …;

  ```


  如果你确信那就是你的意图，你可以继续执行。如果你*仍然*不确定，你或许可以进行试运行。在一些数据库管理系统中，你可以*一次运行一条*以下语句：


  ```

  --  PostgreSQL, MSSQL, MySQL / MariaDB:

  BEGIN TRANSACTION;  --  MySQL / MariaDB: START TRANSACTION

  DELETE FROM minipaintings;

  SELECT * FROM minipaintings;

  ROLLBACK;

  SELECT * FROM minipaintings;

  ```


  一个 `transaction`（事务）是一组允许你使用 `ROLLBACK`（回滚）撤销任何更改的语句。如果你想保留更改，则使用 `COMMIT`（提交）。本书中所有的数据库管理系统都支持事务^(¹¹)，但
  SQLite 和 Oracle 不支持一次运行一条语句。


  通常，单条语句会自动提交，这就是为什么删除（以及稍后将看到的更新）是如此危险的原因。


  回到 `customers` 表，首先，检查你刚刚添加了哪些行：


  ```

  SELECT * FROM customers ORDER BY id desc;

  ```


  使用最后一个 id（在之前的逆序排列中是第一个）：


  ```

  DELETE

  FROM customers

  WHERE id= … ;

  ```


  现在，当你检查表时：


  ```

  SELECT * FROM customers;

  ```


  你应该只看到一个新的客户。


  删除一个假定的重复项并非总是如此直接。有时，两行数据有不同的甚至冲突的数据，你需要决定保留什么、拒绝什么。


  你应该在什么时候删除一行？简短的答案是永远不要。更详细的答案是，本该存在的数据应该保留。明显的例外是错误输入的数据（如本例）或测试数据。


  另一个例外是，如果数据是试探性输入的，例如一笔可能无法成交的销售。如果你决定不想将其作为历史数据保留，之后可能会删除它。如果你真的有已经处理完毕的数据，那么你应该将其标记为过期（例如，使用另一个列）。


  ## 添加更多行


  此时，你可以添加更多客户。对于大多数数据库管理系统，你可以使用单个 INSERT 语句添加多行：


  ```

  --  Not Oracle:

  INSERT INTO customers(givenname, familyname,

  email, registered)

  VALUES

  (''Sylvia'',''Nurke'',

  ''sylvia.nurke@example.com'', current_date),

  (''Murgatroyd'',''Murdoch'',

  ''murgatroyd.murdoch@example.com'', current_timestamp)

  --  etc

  ;

  ```


  然而，Oracle 不允许你这样做。对于 Oracle，有各种解决方法，但最简单的方法是使用传统的多个 `INSERT` 语句：


  ```

  --  All DBMSs

  INSERT INTO customers(givenname, familyname,

  email, registered)

  VALUES (''Sylvia'',''Nurke'',

  ''sylvia.nurke@example.com'', current_timestamp);

  INSERT INTO customers(givenname, familyname,

  email, registered)

  VALUES (''Murgatroyd'',''Murdoch'',

  ''murgatroyd.murdoch@example.com'', current_timestamp);

  --  etc

  ;

  ```


  如果你有大量的行，多个单独的 `INSERT` 语句往往会变得非常慢，因此在 Oracle 中值得研究这些解决方法。示例数据库的脚本中充满了它们。


  注意，`current_timestamp` 的值从技术上讲粒度太细，因为它还包括了时间。大多数（但并非全部）数据库管理系统有 `current_date`，这可能更合适。然而，数据库管理系统也会很乐意自动将
  `current_timestamp` 转换以适应。


  当你现在检查表时：


  ```

  SELECT * FROM customers ORDER BY id DESC;

  ```


  你会注意到重复客户所在位置有一个间隙。这里有两个原则共同作用：


  1.  主键永远不应该被回收。这样，你就不会继承旧数据。

  2.  自增列不会回绕，因此它们不会重复使用旧值。


  可以覆盖这些原则，例如当你尝试修复数据时。



  ## 更新行


  既然我们已经添加了更多客户，就可以开始补充一些缺失的细节了。比如，我们可以添加他们的电话号码。


  要更改现有行中的值，请使用 `UPDATE` 语句：


  ```sql

  UPDATE table

  SET column=value    --  column=value, column=value, 等等

  WHERE …

  ```


  同样，你可以选择设置多个值。


  例如，使用你新添加客户的某个 `id`：


  ```sql

  SELECT id FROM customers ORDER BY id DESC;

  ```


  你可以更新电话号码：


  ```sql

  UPDATE customers

  SET phone=''0370101234''

  WHERE id= … ;

  ```


  由于 `id` 是主键，因此是唯一的，这将把影响限制在一行数据上。


  `UPDATE` 语句可能非常危险。例如：


  ```sql

  --  别这样做！

  UPDATE customers

  SET phone=''0370101234'';

  ```


  这可能会毁了你的一天。没有 `WHERE` 子句，这将更改*所有*行的 `phone` 列。此时，电话号码无需是唯一的。


  现在可能是反思 SQL 没有撤销功能的好时机。有时，犯错后你可以重建数据，有时数据库管理员可以重建。如果不能，那谁也无能为力。


  你可以使用与 `DELETE` 语句相同的测试方法来测试你的 `UPDATE`。


  与 `INSERT` 语句不同，你无法为每一行设置不同的值，除非该值可以被计算出来。


  例如，你可以提高所有画作的价格：


  ```sql

  --  除非你真想运行，否则别执行这个：

  UPDATE paintings SET price=price*0.1;

  ```


  这里，运行一次可以将价格提高 10%。唯一的问题是，如果你（不小心）再次运行它，价格将提高到 21%，然后是 33.1%，接着是 46.41%，嗯，你知道这样下去的结果。


  电话号码的问题*可能*通过规定电话号码必须唯一来缓解。你可以使用 `CREATE UNIQUE INDEX` 语句修改现有表。例如：


  ```sql

  --  非 MSSQL:

  CREATE UNIQUE INDEX uq_customers_phone ON

  customers(phone);

  --  MSSQL:

  CREATE UNIQUE INDEX uq_customers_phone ON

  customers(phone)

  WHERE phone IS NOT NULL;

  ```


  Microsoft SQL 有个怪癖，会在检查唯一性时比较 `NULL` 值，因此你需要额外的子句来阻止它这样做。


  请注意，不强制唯一电话号码*可能*有充分的理由，例如来自同一组织的多个客户。这类决策单凭数据库开发者无法做出——需要真正理解数据库在现实生活中将如何被使用。


  ## 修改表结构


  一旦你有了一个表并开始填充数据，你可能会发现需要对表进行修改。此时删除并重建表为时已晚，但你可以使用 `ALTER` 语句在事后进行一些更改。


  典型的更改包括添加或删除列、添加索引或更改列的类型。本章讨论的几乎所有表属性，只要在此过程中不违反现有的完整性规则，都可以追溯添加到现有表中。例如：


  ```sql

  --  添加列

  ALTER TABLE customers

  ADD country VARCHAR(60);

  --  删除列

  ALTER TABLE customers

  DROP COLUMN town, state, postcode;

  --  添加外键

  ALTER TABLE customers

  ADD townid INT REFERENCES towns(id);

  --  添加检查约束

  ALTER TABLE saleitems

  ADD CHECK (quantity>0);

  --  删除约束

  ALTER TABLE customers

  DROP CONSTRAINT ck_customers_postcode;

  --  添加 NOT NULL 约束

  ALTER TABLE saleitems

  ALTER COLUMN quantity SET NOT NULL;

  --  添加默认值

  ALTER TABLE saleitems

  ALTER COLUMN quantity SET DEFAULT 1;

  ```


  这里，我们将添加另一列。


  虽然 `customers` 表包含地址，但不包含国家。如果你只想将销售限制在一个国家，这没问题；但如果你有更大的计划，你会想要添加国家：


  ```sql

  --  所有 DBMS

  ALTER TABLE customers

  ADD country varchar(48);

  --  MySQL / MariaDB

  ALTER TABLE customers

  ADD country varchar(48)

  AFTER postcode;

  ```


  新列将被放在最后。从美学上讲，它应该位于其他地址列之后。不幸的是，大多数 DBMS 不允许你指定新列出现的位置，除非使用一些风险稍高的技巧^(¹²)，所以我们只能接受它。正如你之前所见，MySQL/MariaDB
  允许你指定位置。


  现在，让我们假设你所有的客户都来自一个国家，但我们只对已有地址的客户做此假设。我们可以为这些客户设置国家，如下所示：


  ```sql

  UPDATE customers

  SET country=''Australia''     --  或其他国家

  WHERE state IS NOT NULL;

  ```


  与所有 DDL 语句一样，你在现实中修改表的能力可能受到限制。数据库管理员可能不希望任何人随意改动数据库。


  然而，对于示例数据库，我们假设你拥有完全控制权。


  ## 现实生活中的 DML


  虽然你可能会花很多时间使用 `SELECT` 语句，但不太可能花太多时间使用 `INSERT`、`UPDATE` 或 `DELETE`。


  `SELECT` 语句用于检索数据，除了安全和机密性问题外，它是一个相对无害的操作。一个简单的 `SELECT` 语句不会破坏任何东西。


  另一方面，用其他语句搞乱你的数据库则*非常*容易。一旦你开始添加不应存在的数据，或者将某些内容更改为错误的值，或者删除了本应保留的数据，你的数据库就变得不可靠，因此也就毫无用处。


  因此，数据库通常受到保护，以防止未经授权的篡改。


  ### 安全性


  所有常规的 DBMS 都包含某种安全性。从这个意义上说，SQLite 不算常规，因为它的客户端内置于其他软件中，你想要实现的任何安全性都取决于宿主软件。如果你在使用
  SQLite，可以忽略本节内容，或者礼貌地点点头，假装你感兴趣。


  当你连接到数据库时，通常需要登录。有时登录是自动的，但通常需要你输入用户名和密码。


  通常，安全性设置分为两层：


  *   **用户**是拥有自己用户名和密码的个体。


  *   **角色**是具有相似属性的用户集合。


  一个用户可以被分配到多个角色。


  通常，执行某项操作——任何操作——所需的权限被分配给一个角色。它们也可以分配给单个用户，但如果用户变动，这样维护起来会更困难。


  这些权限包括（正如他们所说，但不限于）


  *   可以使用 `SELECT` 语句读取哪些表


  *   可以使用其他 DML 语句修改哪些表


  *   是否可以更改表，或者是否可以创建或删除任何对象


  根据 DBMS 的不同，这些权限可以非常细粒度。通常，它们由数据库管理员（DBA）控制。通常有一个具有此角色的特殊用户，称为 **root**。可以有多个 root
  用户或 DBA。


  如果你安装自己的 DBMS 软件，那么你就是 DBA，你可以做任何你想做的事情。




  ### 前端软件


  你很少会直接使用`INSERT`、`UPDATE`或`DELETE`的另一个原因是，数据通常不是手动修改的。例如，示例数据库是为一个网络应用程序设计的，你通常会通过网页表单来进行所有的更改。在办公室环境中，使用类似的前端软件时，情况也是如此。


  然而，无论数据实际如何输入，它最终都会以如前所述的 DML 语句的形式进入数据库。


  例如，当你在网页表单上输入注册信息并提交时，数据会被网络服务器接收。接着，它会被服务器端脚本（通常用 PHP 等编程语言编写）处理，包装成 DML 语句，然后发送到数据库服务器进行进一步处理。


  获取数据，例如查看目录，过程基本相同，但大多是反向的。提交搜索条件后，网络服务器脚本会生成一个合适的`SELECT`语句，用它从数据库服务器获取数据，适当地格式化结果，然后将其发送回用户。


  另一方面，使用`SELECT`语句可以做的事情还有很多：


  *   你可以像本书中一直做的那样，获取即席查询结果。

  *   你可以获取数据，以便在统计或分析软件包中做进一步处理。


  当然，即使你不直接使用其他 DML 语句，理解其背后的原理也非常重要。


  ## 总结


  在本章中，我们探讨了如何创建数据库表以及如何在表中添加或更改数据。


  表使用`CREATE TABLE`语句创建。该语句包括：


  1.  列名

  2.  数据类型

  3.  其他表和列属性


  表设计之后可以更改，例如添加触发器或索引。更严重的更改，如添加或删除列，可以使用`ALTER TABLE`语句来实现。


  ### 数据类型


  数据主要有三种类型：


  1.  数字

  2.  字符串

  3.  日期


  上述类型有许多变体，这使得数据存储和处理更高效，并有助于验证数据值。


  还有一些其他类型，如布尔型或二进制数据，在典型的数据库中不太常见。


  ### 约束


  约束定义了哪些值被视为有效。标准约束包括：


  *   `NOT NULL`

  *   `UNIQUE`

  *   `DEFAULT`

  *   外键


  你可以使用通用的`CHECK`约束来构建自己的附加约束。在这里，你可以添加一个类似于`WHERE`子句的条件，来定义你特定的验证规则。


  ### 外键


  外键是对另一个表的引用，它也被视为一种约束，因为它将值限制为与另一个表中的值相匹配。


  外键在子表中定义。


  外键还会影响从父表中删除行的任何尝试。默认情况下，如果存在匹配的子行，则无法删除父行。但是，可以将其更改为将外键设置为`NULL`，或者将删除操作级联到所有子行。


  '
- '# 索引


  由于表不是按任何特定顺序存储的，因此搜索可能非常耗时。可以为你例行搜索的任何列添加可选的索引，这使得搜索速度大大加快。


  ### 操作数据


  数据操作语言语句用于添加或更改数据。除了`SELECT`语句，还有：


  *   `INSERT`

  *   `UPDATE`

  *   `DELETE`


  与`SELECT`不同，这些语句有可能把数据库搞得一团糟，尤其是因为 SQL 没有撤销功能。


  '
- '# 9. 集合操作


  所有 SQL 数据库的背后都是关系数据库理论，这为数据库奠定了坚实的数学基础。其中很重要的一点是，数据库是基于数学上的`集合`。


  在数学中，集合是事物的汇集。你不需要担心所有的细节，但有两点很重要：


  *   集合中没有重复项。这是良好数据库设计确保没有重复记录的部分原因。

  *   集合是无序的。当然，你查看其内容时必然呈现某种顺序，但这个顺序本身并不重要。


  目前，所有这些内容中最重要的部分是：一个表就是一个行的集合，这意味着行不会重复，并且行的顺序不重要。


  到目前为止，我们所有的查询都只产生一个结果集。即使你连接了表，结果也是一个单一的结果集。在本章中，我们将探讨如何组合多个结果集。




  ## 并集


  并集是两个或多个集合最基本的组合方式。结果是一个包含所有集合成员的新集合。通常的图示类似于图 9-1。


  ![](img/601766_1_En_9_Fig1_HTML.jpg)


  图示表示两个集合的并集。


  图 9-1


  两个集合的并集


  有时，会有一些元素是两个集合的共同成员，正如你在图 9-1 中所见。我们稍后将讨论这种重叠部分。


  在 SQL 中，有时我们需要将来自多个表或虚拟表的行组合起来。这与连接两个表不同。当你连接表时，你是向现有表添加 `列`。而在这里，我们谈论的是添加 `行`。


  假设你正在策划某个活动，并希望同时邀请客户和员工。你可以很容易地获取他们的姓名：


  ```sql

  SELECT givenname, familyname FROM customers;

  SELECT givenname, familyname FROM employees;

  ```


  在这个阶段，你将得到两组数据。要将它们组合成一组数据，你可以在 `SELECT` 语句之间使用 `UNION` 子句：


  | givenname | familyname |

  | --- | --- |

  | Matt | Black |

  | Ali | Gator |

  | Emmy | Grate |

  | Claire | de Lune |

  | Len | Till |

  | Jack | Potts |

  | ~ 322 行 ~ |


  ```sql

  SELECT givenname, familyname FROM customers

  UNION

  SELECT givenname, familyname FROM employees

  ;

  ```


  请注意，第一个语句末尾的分号已被移除。这是因为 `UNION` 是一个单一语句。第二个分号已向下移动，以便容纳更多的更改。


  如果你运行前面的语句，可能会注意到总行数实际上少于客户数和员工数之和。这是因为 `UNION` 操作的一个特性。


  由于 `UNION` 的结果应该是一个集合，因此不应有重复项，所以在数据组合后，重复项会被移除。不幸的是，SQL 无法知道哪些姓名是真正的重复项，因此它只能根据结果姓名来判断。


  在这种情况下，有三种重复项的来源：


  *   `customers` 表中的重复姓名


  *   `employees` 表中的重复姓名


  *   同时出现在 `customers` 和 `employees` 表中的姓名


  请注意，它们并非 *真正的* 重复项，实际上是不同的人，只是碰巧巧合地共享了他们的名和姓，因此 SQL 将它们视为相同。


  如果你确定重复的姓名没问题，那么可以使用 `UNION ALL` 子句：


  | givenname | familyname |

  | --- | --- |

  | Judy | Free |

  | Ray | Gunn |

  | Ray | King |

  | Ivan | Inkling |

  | Drew | Blood |

  | Seymour | Sights |

  | ~ 338 行 ~ |


  ```sql

  SELECT givenname, familyname FROM customers

  UNION ALL   --  不移除重复项

  SELECT givenname, familyname FROM employees

  ;

  ```


  `UNION ALL` 子句不会移除重复值，因此总行数应该是正确的。


  使用 `UNION ALL` 还有一个额外的好处。查找和移除重复项实际上需要数据库管理系统（DBMS）执行额外的工作，因此，如果它不必移除它们，涉及的工作量就更少。


  请注意，重复项的定义完全取决于 `SELECT` 子句。如果你选择了额外的信息，比如 `email`：


  | givenname | familyname | email |

  | --- | --- | --- |

  | Judy | Free | judy.free474@example.net |

  | Ray | Gunn | ray.gunn186@example.net |

  | Ray | King | ray.king144@example.net |

  | Ivan | Inkling | ivan.inkling179@example.com |

  | Drew | Blood | drew.blood475@example.net |

  | Seymour | Sights | seymour.sights523@example.net |

  | ~ 338 行 ~ |


  ```sql

  SELECT givenname, familyname, email FROM customers

  UNION ALL

  SELECT givenname, familyname, email FROM employees

  ;

  ```


  在这里，很可能根本不需要担心任何重复项。这是因为电子邮件地址应该是唯一的。


  使用 `UNION ALL` 仍然是一个好主意，因为当没有重复项时，你不想浪费时间去查找它们。


  你可以根据需要使用任意多个 `SELECT` 语句，全部用 `UNION` 或 `UNION ALL` 语句连接：


  | givenname | familyname |

  | --- | --- |

  | Judy | Free |

  | Ray | Gunn |

  | Ray | King |

  | Ivan | Inkling |

  | Drew | Blood |

  | Seymour | Sights |

  | ~ 525 行 ~ |


  ```sql

  SELECT givenname, familyname FROM customers

  UNION ALL

  SELECT givenname, familyname FROM employees

  UNION ALL

  SELECT givenname, familyname FROM artists

  ;

  ```


  不同的 DBMS 可能对你可以拥有的 `SELECT` 语句数量有理论上的限制，但这很可能比你想要的还要多。


  ### 选择性并集


  每个 `SELECT` 语句都可以按你希望的那样复杂。例如，它们可以包含连接和聚合。它们也可以是公用表表达式（Common Table Expressions）。有一件事你不能做，那就是使用
  `ORDER BY`，我们稍后会讲到。


  例如，假设你想包括所有员工，但只包括部分客户：


  | givenname | familyname | email |

  | --- | --- | --- |

  | Ray | Gunn | ray.gunn186@example.net |

  | Seymour | Sights | seymour.sights523@example.net |

  | Jack | Knife | jack.knife545@example.com |

  | Carol | Singers | carol.singers505@example.net |

  | Miles | Long | miles.long492@example.com |

  | Sharon | Sharalike | sharon.sharalike374@example.com |

  | ~ 86 行 ~ |


  ```sql

  SELECT givenname, familyname, email FROM customers

  WHERE state=''VIC''

  UNION ALL

  SELECT givenname, familyname, email FROM employees

  ;

  ```


  你甚至可以从同一张表中组合不同筛选条件的结果：


  | givenname | familyname | email |

  | --- | --- | --- |

  | Ray | Gunn | ray.gunn186@example.net |

  | Seymour | Sights | seymour.sights523@example.net |

  | Jack | Knife | jack.knife545@example.com |

  | Carol | Singers | carol.singers505@example.net |

  | Miles | Long | miles.long492@example.com |

  | Sharon | Sharalike | sharon.sharalike374@example.com |

  | ~ 148 行 ~ |


  ```sql

  SELECT givenname, familyname, email FROM customers

  WHERE state=''VIC''

  UNION ALL

  SELECT givenname, familyname, email FROM customers

  WHERE dob<''1980-01-01''

  ;

  ```


  但你可能不应该这样做。前面的例子用 `OR` 操作符表达会更好：


  ```sql

  SELECT givenname, familyname, email FROM customers

  WHERE state=''VIC'' OR dob<''1980-01-01''

  ;

  ```


  这不仅表达得更好，而且效率可能高得多。生成两个筛选结果集然后将它们组合起来，比筛选单个结果集要多做很多工作。换句话说，只有在没有其他方法可以实现时，你才会使用
  `UNION`。




  '
- '# SQL UNION 操作符的兼容性与使用注意事项


  ## SELECT 子句必须兼容


  SQL 实际上并不关心你组合的是什么，只要数据是兼容的即可。首先，每个 `SELECT` 语句必须有相同数量的列：


  ```sql

  --  这样不行：

  SELECT givenname, familyname, email --  3 列

  FROM customers

  UNION ALL

  SELECT givenname, familyname        --  2 列

  FROM employees

  ;

  ```


  其次，每列的数据类型*应该*匹配：


  ```sql

  --  这样也不应该行：

  SELECT /* 字符串： */ email, givenname, familyname

  FROM customers

  UNION ALL

  SELECT /* 数字： */ id, givenname, familyname

  FROM employees

  ;

  ```


  这在 PostgreSQL、Oracle 和 MSSQL 中将无法工作。这是因为 `email` 是字符串，而 `id` 是数字，你不能混合数据类型。


  然而，在 MariaDB/MySQL 中你可能蒙混过关，因为它会自动将数字转换为字符串；在 SQLite 中也行，因为它本来就不关心数据类型。


  如果你想正确地混合类型，应该自己进行类型转换：


  ```sql

  --  使用 cast()

  SELECT email, givenname, familyname

  FROM customers

  UNION ALL

  SELECT cast(id as varchar(4)), givenname, familyname

  FROM employees

  ;

  ```


  当然，你是否真的想要下面这样的结果是另一个问题：


  | email | givenname | familyname |

  | --- | --- | --- |

  | may.bea350@example.com | May | Bea |

  | 16 | Sylvester | Underbar |

  | pearl.divers20@example.net | Pearl | Divers |

  | tom.morrow429@example.com | Tom | Morrow |

  | grace.skies588@example.com | Grace | Skies |

  | 8 | Seymour | Something |

  | ~ 94 行 ~ |


  真正的陷阱在于，`UNION` 对齐 `SELECT` 子句中的*值*时，完全不考虑它们的名称或含义。下面两个语句都会产生结果：


  ```sql

  --  列顺序颠倒

  SELECT givenname, familyname FROM customers

  UNION ALL

  SELECT familyname, givenname FROM employees

  ;

  --  列未对齐

  SELECT email, givenname, familyname FROM customers

  UNION ALL

  SELECT givenname, familyname, email FROM employees

  ;

  ```


  但结果很可能毫无意义。不过，如果你确实需要对齐名称不同的列，这就很有用了：


  ```sql

  --  混合列名

  SELECT givenname, familyname FROM customers

  UNION ALL

  SELECT firstname, lastname FROM sorting

  ;

  ```


  在这种情况下，我们知道你是什么意思：


  | givenname | familyname |

  | --- | --- |

  | Judy | Free |

  | Ray | Gunn |

  | Ray | King |

  | Ivan | Inkling |

  | Drew | Blood |

  | Seymour | Sights |

  | ~ 312 行 ~ |


  当你尝试组合来自不同表的数据时，情况常常如此。


  ## 仅使用第一个 SELECT 语句的列名


  如果你运行了前面的几个例子，你会注意到所有的列名都只来自于*第一个* `SELECT` 语句。这使得在你开始切换 `SELECT` 列时，尤其令人困惑。


  你也可以在 `UNION` 中给列名起别名：


  ```sql

  SELECT givenname AS gn, familyname FROM customers

  UNION ALL

  SELECT givenname, familyname AS fn FROM employees;

  ```


  你将得到以下结果：


  | gn | familyname |

  | --- | --- |

  | Judy | Free |

  | Ray | Gunn |

  | Ray | King |

  | Ivan | Inkling |

  | Drew | Blood |

  | Seymour | Sights |

  | ~ 338 行 ~ |


  你会看到 `givenname` 列成功地被别名为 `gn`，但 `familyname` 列保持未别名状态。第二个及后续的 `SELECT` 语句中的名称会被忽略，即使你不厌其烦地为它们起了别名。这个故事的寓意是，你只应该在第一个
  `SELECT` 语句上费心：


  ```sql

  SELECT givenname AS gn, familyname AS fn FROM customers

  UNION ALL

  SELECT givenname, familyname FROM employees;

  ```


  当然，如果你觉得这样更清晰，你仍然可以为额外的 `SELECT` 子句起别名。


  ## 对结果排序


  如果你尝试以下语句：


  ```sql

  --  注定失败

  SELECT givenname, familyname, email FROM customers

  ORDER BY familyname, givenname

  UNION ALL

  SELECT givenname, familyname, email FROM employees

  ORDER BY familyname, givenname

  ;

  ```


  它不会工作。`UNION` 只能发生在两个**集合**之间，而集合是无序的。无论如何，这都没有意义，因为在完成组合之前就对部分结果进行排序是没有意义的。


  这样写是可行的：


  ```sql

  --  这样可行

  SELECT givenname, familyname, email FROM customers

  UNION ALL

  SELECT givenname, familyname, email FROM employees

  ORDER BY familyname, givenname

  ;

  ```


  但这容易被误解。就像第一个 `SELECT` 不能有 `ORDER BY` 子句一样，第二个也不能，原因相同。被排序的不是单个 `SELECT` 语句，而是 `UNION`
  的结果。因此，将 `ORDER BY` 子句分开写可能有助于阐明这一点：


  ```sql

  SELECT givenname, familyname, email FROM customers

  UNION ALL

  SELECT givenname, familyname, email FROM employees

  ORDER BY familyname, givenname;

  ```


  现在它按预期工作：


  | givenname | familyname | email |

  | --- | --- | --- |

  | Aiden | Abet | aiden.abet260@example.net |

  | Alf | Abet | alf.abet323@example.com |

  | Ollie | Agenous | ollie.agenous563@example.com |

  | Corey | Ander | corey.ander54@example.com |

  | Ike | Andy | ike.andy549@example.com |

  | Adam | Ant | adam.ant263@example.net |

  | ~ 338 行 ~ |


  如果你不喜欢那个空行，你总可以用注释填充它：


  ```sql

  SELECT givenname, familyname, email FROM customers

  UNION ALL

  SELECT givenname, familyname, email FROM employees

  --  排序结果：

  ORDER BY familyname, givenname;

  ```


  无论哪种方式，请记住 `ORDER BY` 子句是用于整个 `UNION` 的，而不仅仅是其中一个 `SELECT` 语句。




  ## 交集


  两个集合的**交集**是指同时属于这两个集合的元素。图示化来看，如图 9-2 所示。


  ![](img/601766_1_En_9_Fig2_HTML.jpg)


  一幅表示两个集合交集的图。


  图 9-2


  两个集合的交集


  当然，也有可能两个集合毫无共同之处，在这种情况下，我们称它们为**不相交**。


  例如，假设你想知道你的某些`客户`是否碰巧也是`员工`。你当然可以直接问他们，但让我们看看 SQL 如何提供帮助。


  要找出同时出现在`客户`表和`员工`表中的名字，你可以运行以下查询：


  ```

  SELECT givenname, familyname FROM customers

  INTERSECT

  SELECT givenname, familyname FROM employees;

  ```


  你可能会得到几条结果：


  | givenname | familyname |

  | --- | --- |

  | Bonnie | Banks |

  | Joe | Kerr |

  | Russell | Leaves |


  请记住，只有`SELECT`子句中的数据会被检查，所以你能确定的只是这些名字在两个表中都出现。这本身并不能保证他们是同一个人。


  这里有一个稍微复杂点的例子。假设你想找出在全国各地都受欢迎的画作。这将涉及两个思路：


  *   首先，你需要获取与各州相关的画作集合。你在获取客户和艺术家集合时已经做过类似的事情。这将涉及多个表的连接。


  *   其次，SQL 没有简单的方法来测试某个东西是否有时是这个有时是那个。这正是`INTERSECT`可以提供帮助的地方。


  要获取州和画作的列表，我们可以使用以下连接查询：


  ```

  SELECT p.id, c.state,p.title

  FROM

  customers AS c

  JOIN sales AS s ON c.id=s.customerid

  JOIN saleitems AS si ON s.id=si.saleid

  JOIN paintings AS p ON si.paintingid=p.id

  ;

  ```


  你会得到一个相当长的列表：


  | id | state | truncate |

  | --- | --- | --- |

  | 1065 | TAS | Pieter van den Broecke … |

  | 870 | NT | Nave, Nave Moe (Miraculous Source) … |

  | 2061 | QLD | The Church of Overschie … |

  | 1796 | WA | Wheat Field … |

  | 1874 | QLD | L’etoile [La danseuse sur la scene] … |

  | 1516 | WA | The Count-Duke of Olivares on Horseb … |

  | ~ 6315 rows ~ |


  得到这个结果后，我们将其包装在一个公共表表达式中：


  ```

  WITH cte AS (

  SELECT p.id, c.state, p.title

  FROM

  customers AS c

  JOIN sales AS s ON c.id=s.customerid

  JOIN saleitems AS si ON s.id=si.saleid

  JOIN paintings AS p ON si.paintingid=p.id

  )

  --  more

  ;

  ```


  接下来的部分有些繁琐，但复制粘贴是你的好帮手：


  ```

  WITH cte AS (

  SELECT p.id, c.state, p.title

  FROM

  customers AS c

  JOIN sales AS s ON c.id=s.customerid

  JOIN saleitems AS si ON s.id=si.saleid

  JOIN paintings AS p ON si.paintingid=p.id

  )

  SELECT id, title FROM cte WHERE state=''NSW''

  INTERSECT

  SELECT id, title FROM cte WHERE state=''VIC''

  INTERSECT

  SELECT id, title FROM cte WHERE state=''QLD''

  ORDER BY title;

  ```


  只要我们只选择相关的列，就会得到类似这样的结果：


  | id | title |

  | --- | --- |

  | 2144 | A Domestic Affliction |

  | 1745 | Aeneas’ Flight from Troy |

  | 1426 | Aesop |

  | 2214 | Alexander and Porus |

  | 16 | Algerian Women in Their Apartments |

  | 964 | Allegory |

  | ~ 384 rows ~ |


  在这个例子中，我们只列出了三个较大的州，这些州很可能包含这些画作。这里需要小心。如果你也包括较小的州，那也没问题，但它们匹配到的画作会更少，因此`INTERSECT`返回的结果也会更少。


  另外，注意包含了`id`列。就像`UNION`一样，只有`SELECT`子句中的列会被匹配。如果你不包含`id`列，那么两个标题相同但不同的画作就会被匹配，从而导致错误的印象。


  ## 差集


  还有一种操作是找出在一个集合中但*不*在另一个集合中的元素。这使用`EXCEPT`操作符。Oracle 将其称为`MINUS`，这在技术上不是标准语法，但含义非常清晰。


  该操作如图 9-3 所示。


  ![](img/601766_1_En_9_Fig3_HTML.jpg)


  一幅表示两个集合差集的图。


  图 9-3


  两个集合的差集


  例如，如果你想查找名字与`客户`不匹配的`员工`，你可以这样做：


  ```

  SELECT givenname, familyname FROM employees

  EXCEPT      --  标准 SQL

  --  MINUS   --  Oracle 语法

  SELECT givenname, familyname FROM customers

  ORDER BY familyname, givenname;

  ```


  这会给你以下结果：


  | givenname | familyname |

  | --- | --- |

  | Gladys | Bowles |

  | Beryl | Bubbles |

  | Mildred | Codswallup |

  | Clarisse | Cringinghut |

  | Rubin | Croucher |

  | Nugent | Dirt |

  | ~ 29 rows ~ |


  与`UNION`和`INTERSECT`不同，这个操作不是对称的：如果你交换两个`SELECT`语句的顺序，你会得到不同的结果：


  ```

  SELECT givenname, familyname FROM customers

  EXCEPT      --  标准 SQL

  --  MINUS   --  Oracle 语法

  SELECT givenname, familyname FROM employees

  ORDER BY familyname, givenname;

  ```


  这会给你一个不同的结果：


  | givenname | familyname |

  | --- | --- |

  | Aiden | Abet |

  | Alf | Abet |

  | Ollie | Agenous |

  | Corey | Ander |

  | Ike | Andy |

  | Adam | Ant |

  | ~ 290 rows ~ |


  假设，例如，你想找出从未购买过任何东西的`客户`。最直接的方法是获取所有客户的`id`，并排除那些`customerid`出现在`sales`表中的客户：


  ```

  SELECT id FROM customers

  EXCEPT  --  Oracle 使用: MINUS

  SELECT customerid FROM sales;

  ```


  在这里，你会得到一个客户 id 列表：


  | id |

  | 394 |

  | 169 |

  | 309 |

  | 556 |

  | 493 |

  | 529 |

  | ~ 48 rows ~`


  当然，你得到的只有这个。像所有的集合操作一样，如果你不希望额外的列干扰，就不能选择它们。如果你想要客户的其他详细信息，你可能更倾向于使用外连接并筛选缺失的销售记录：


  ```

  SELECT c.id, c.givenname, c.familyname --  等等

  FROM customers AS c LEFT JOIN sales AS s

  ON s.customerid=c.id

  WHERE s.id IS NULL;

  ```


  这会给你更多有用的信息：


  | id | givenname | familyname |

  | --- | --- | --- |

  | 209 | Gideon | Wine |

  | 101 | Lindsay | Doyle |

  | 330 | Clara | Fied |

  | 178 | Kurt | See |

  | 17 | Anne | Onymous |

  | 57 | Bess | Twishes |

  | ~ 48 rows ~`


  同样的技术可以用来查找那些作品我们没有的`艺术家`：


  ```

  --  使用 EXCEPT

  SELECT id FROM artists

  EXCEPT  --  Oracle 使用: MINUS

  SELECT artistid FROM paintings;

  --  使用 OUTER JOIN

  SELECT a.id, a.givenname, a.familyname  --  等等

  FROM paintings AS p RIGHT JOIN artists AS a

  ON p.artistid=a.id

  WHERE p.id IS NULL;

  ```


  与所有的集合操作符一样，`EXCEPT`在你只想获取实际有差异的数据（比如之前的`id`）时最有用。如果你想要更多细节，使用替代方法可能更好。


  ## 集合操作的一些技巧


  通常，`UNION`最常见的用例是合并来自多个表的数据，如我们的第一个例子所示。在设计良好的数据库中，你可能不太需要这样做。


  例如，你可能为不同州的`客户`设置了不同的表，然后使用`UNION`合并它们。然而，一开始就把所有客户放在一个表中会更好。


  多表并不总是设计不佳的结果。例如，你可能将销售记录分为当前销售和历史销售，这样处理当前销售更容易、更快。当你偶尔需要搜索全部记录时，你可以将它们合并。


  在本节中，我们将探讨如何使用`UNION`实现一些特殊技巧。



  ### 结果比较


  在第 7 章关于聚合的内容中，我们曾提到两个查询会给出相同的结果：

  ```sql

  --  子查询

  SELECT

  customerid,

  (SELECT givenname||'' ''||familyname  --  MSSQL: 使用 `+`

  FROM customers

  WHERE customers.id = sales.customerid

  ) AS customer,

  count(*) AS number_of_sales,

  sum(total) AS total

  FROM sales

  GROUP BY customerid;

  --  连接

  SELECT

  c.id, c.givenname||'' ''||c.familyname AS customer,

  count(*) AS number_of_sales, sum(s.total) AS total

  FROM sales AS s JOIN customers AS c ON s.customerid=c.id

  GROUP BY c.id, c.givenname||'' ''||c.familyname;

  ```


  两者应该给出相同的结果：

  | 客户 ID | 客户 | 销售次数 | 总额 |

  | --- | --- | --- | --- |

  | 384 | Mickey Finn | 6 | 5445 |

  | 351 | Dick Tate | 12 | 7650 |

  | 184 | Dee Lighted | 11 | 5040 |

  | 116 | Tim Burr | 14 | 8470 |

  | 273 | Harry Leggs | 13 | 9070 |

  | 550 | Kate Ering | 1 | 805 |

  | ~ 约 256 行 ~ |


  我们省略了 `ORDER BY` 子句，因为我们只关注数据本身。


  我们如何能确保两个结果确实相同呢？如果只有几行数据，你可以直接比较，但如果数据量很大，就需要不同的方法。


  首先，请注意两个查询产生的行数相同。这是一个起点。另外，请注意列是相同的。


  之后，你可以使用集合操作来完成繁重的工作。实际上，你使用哪一种并不重要，但所有三种操作都能给你更强的保证感：

  ```sql

  --  子查询

  SELECT

  customerid,

  (SELECT givenname||'' ''||familyname  --  MSSQL: 使用 `+`

  FROM customers

  WHERE customers.id = sales.customerid

  ) AS customer,

  count(*) AS number_of_sales,

  sum(total) AS total

  FROM sales

  GROUP BY customerid

  UNION   --  或 `INTERSECT` 或 `EXCEPT` / `MINUS`

  SELECT

  c.id, c.givenname||'' ''||c.familyname AS customer,

  count(*) AS number_of_sales, sum(s.total) AS total

  FROM sales AS s JOIN customers AS c ON s.customerid=c.id

  GROUP BY c.id, c.givenname||'' ''||c.familyname;

  ```


  记得移除第一个查询后的分号。


  如果两者的结果确实相同，那么第二个结果集应该与第一个相同。测试结果将如下所示：


  *   `UNION`：由于 `UNION` 会移除重复项，你应该只得到第一个结果集。

  *   `INTERSECT`：这仅返回同时存在于两者的结果，应该是所有结果。

  *   `EXCEPT`/`MINUS`：这应该返回一个空集，因为你要移除第二个结果集中所有相同的结果。在这种情况下，你不必担心调换顺序，因为你已经知道它们具有相同的行数。


  任何一个测试都足以证明，但如果你不完全相信，尝试所有三种也并非难事。


  ### 虚拟表


  在第 5 章关于计算的内容中，我们提到可以对日期进行加法运算。日期问题众所周知地棘手，因为月份的长度各不相同，你可能想测试将天数加到不同月份时会发生什么。


  我们可以通过一个样本表来测试会发生什么。在这种情况下，我们将以 `UNION` 的形式生成一个虚拟表。


  首先，我们可以用一些样本值生成一个 `UNION`：

  ```sql

  --  PostgreSQL, MSSQL, MySQL / MariaDB

  SELECT ''one'' AS test,

  cast(''2020-01-29'' as date) AS testdate

  UNION

  SELECT ''two'', cast(''2020-02-28'' as date)

  UNION

  SELECT ''three'', cast(''2020-03-30'' as date);

  --  SQLite

  SELECT ''one'' AS test, ''2020-01-29'' AS testdate

  UNION

  SELECT ''two'', ''2020-02-28''

  UNION

  SELECT ''three'', ''2020-03-30'';

  --  Oracle

  SELECT ''one'' AS test,

  cast(''29 Jan 2020'' as date) AS testdate

  FROM dual

  UNION

  SELECT ''two'', cast(''28 Feb 2020'' as date)

  FROM dual

  UNION

  SELECT ''three'', cast(''30 Mar 2020'' as date)

  FROM dual;

  ```


  你会得到一个简单的三行表格：

  | test | testdate |

  | --- | --- |

  | one | 2020-01-29 |

  | three | 2020-03-30 |

  | two | 2020-02-28 |


  我们现在可以将其包装在一个 `CTE`（公共表表达式）中：

  ```sql

  WITH samples AS (

  SELECT …

  UNION

  SELECT …

  UNION

  SELECT …

  )

  ```

  并测试算术运算：

  ```sql

  --  PostgreSQL, MySQL / MariaDB, Oracle

  WITH samples AS (…)

  SELECT test, testdate, testdate+interval ''30'' day

  FROM samples;

  --  MSSQL

  WITH samples AS (…)

  SELECT test, testdate, dateadd(day,30,testdate)

  FROM samples;

  --  SQLite

  WITH samples AS (…)

  SELECT test, testdate,

  strftime(''%Y-%m-%d'',testdate,''+30 day'')

  FROM samples;

  ```


  现在我们有了样本及其计算值：

  | test | testdate | ?column? |

  | --- | --- | --- |

  | one | 2020-01-29 | 2020-02-28 00:00:00 |

  | three | 2020-03-30 | 2020-04-29 00:00:00 |

  | two | 2020-02-28 | 2020-03-29 00:00:00 |


  一些数据库管理系统还提供表值字面量表示法，这可能更简单：

  ```sql

  --  PostgreSQL, MySQL / MariaDB, SQLite

  WITH samples(test, testdate) AS (

  VALUES(''one'',''2020-01-29''),(''two'',''2020-02-28''),(''three'', ''2020-03-30'')

  )

  SELECT …

  FROM samples;

  ```


  使用这样的样本虚拟表，可以更轻松地测试一些技术，而无需创建真实的表。



  ## 混合聚合


  使用聚合时你会注意到，结果往往比较单一。例如：


  ```sql

  --  城镇总数

  SELECT state, town, count(*) AS count

  FROM customers

  GROUP BY state, town

  ORDER BY state, town;

  ```


  这将给出每个单独城镇的总数，但不会包含其他总计：


  | state | town | count |

  | --- | --- | --- |

  | NSW | Bald Hills | 6 |

  | NSW | Belmont | 4 |

  | NSW | Broadwater | 5 |

  | NSW | Buchanan | 3 |

  | NSW | Darlington | 1 |

  | NSW | Glenroy | 2 |

  | ~ 约 79 行 ~ |


  如果你想要其他总计，你需要


  ```sql

  --  州总计

  SELECT state, count(*) AS count

  FROM customers

  GROUP BY state

  ORDER BY state;

  --  总计

  SELECT count(*) FROM customers AS count;

  ```


  两组结果如下：


  | state | count |

  | --- | --- |

  | NSW | 67 |

  | NT | 3 |

  | QLD | 52 |

  | SA | 22 |

  | TAS | 26 |

  | VIC | 52 |

  | WA | 47 |

  | [null] | 35 |

  | `count` | 304 |


  如果你想将它们放在同一个结果集中，可以进行合并。例如，要合并州总计和总体总计，你可以使用


  ```sql

  SELECT state, count(*) AS count

  FROM customers

  GROUP BY state

  UNION

  SELECT ''total'', count(*)

  FROM customers;

  ```


  请注意，第二个 `SELECT` 有一个 `total` 的虚拟值。正如预期的那样，它位于 `state` 列中。


  | state | count |

  | --- | --- |

  | [null] | 35 |

  | WA | 47 |

  | total | 304 |

  | QLD | 52 |

  | VIC | 52 |

  | TAS | 26 |

  | NT | 3 |

  | SA | 22 |

  | NSW | 67 |


  根据不同的数据库管理系统，排序可能符合也可能不符合你的喜好。你可以使用 `ORDER BY` 子句，但你有可能会将 `total` 放到结果中间，因为字母顺序就是这样工作的。不过，你可以通过使用一个级别编号来强制处理这个问题：


  ```sql

  SELECT 0 AS statelevel, state, count(*) AS count

  FROM customers GROUP BY state

  UNION

  SELECT 1, ''total'', count(*) FROM customers

  ORDER BY statelevel, state;

  ```


  现在将按级别和顺序排序。


  | statelevel | state | count |

  | --- | --- | --- |

  | 0 | NSW | 67 |

  | 0 | NT | 3 |

  | 0 | QLD | 52 |

  | 0 | SA | 22 |

  | 0 | TAS | 26 |

  | 0 | VIC | 52 |

  | 0 | WA | 47 |

  | 0 |  | 35 |

  | 1 | total | 304 |


  你也可以对城镇进行同样的操作。这里，你需要两个级别：


  ```sql

  SELECT

  0 AS statelevel, 0 as townlevel,

  state, town, count(*) AS count

  FROM customers GROUP BY state, town

  UNION

  SELECT

  0, 1,

  state, ''total'', count(*) AS count

  FROM customers

  GROUP BY state

  UNION

  SELECT

  1, 1,

  ''national'', ''total'', count(*)

  FROM customers

  --  对结果排序：

  ORDER BY statelevel, state, townlevel, town;

  ```


  在这个例子中，我们使用 0 和 1 进行二进制排序：


  | statelevel | townlevel | state | town | count |

  | --- | --- | --- | --- | --- |

  | 0 | 0 | NSW | Bald Hills | 6 |

  | 0 | 0 | NSW | Belmont | 4 |

  | 0 | 0 | NSW | Broadwater | 5 |

  | 0 | 0 | NSW | Buchanan | 3 |

  | 0 | 0 | NSW | Darlington | 1 |

  | 0 | 0 | NSW | Glenroy | 2 |

  | ~ 约 88 行 ~ |


  大多数数据库管理系统都支持一个更简单的版本，称为 `ROLLUP`。语法各不相同：


  ```sql

  --  PostgreSQL, MSSQL, Oracle

  SELECT state, town, count(*) AS count

  FROM customers GROUP BY rollup(state, town)

  ORDER BY grouping(state),state, grouping(town), town;

  --  MSSQL, MySQL / MariaDB

  SELECT state, town, count(*) AS count

  FROM customers

  GROUP BY state, town WITH rollup;

  ```


  第二种语法更简单，但灵活性较差。


  另请注意，MariaDB 不支持 `ORDER BY` 子句中的 `grouping(…)` 函数，因此你无法控制顺序；不过，它很可能还是会得到正确的顺序。


  ## 总结


  在 SQL 中，表是行的数学集合。这意味着它们不包含重复项且是无序的。这也意味着你可以使用集合操作来组合表和虚拟表。


  一个表不一定是一个存储表；任何虚拟表的行为方式都相同。使用集合操作时，你使用的是由 `SELECT` 语句产生的虚拟表。


  主要有三种集合操作：


  *   `UNION` 组合两个或多个表，结果包含所有行，任何重复项都会被过滤掉。如果你想保留重复项，请使用 `UNION ALL` 子句。


  *   `INTERSECT` 仅返回出现在所有参与表中的行。


  *   `EXCEPT`（在 Oracle 中又名 `MINUS`）返回第一个表中存在但第二个表中 `不存在` 的行。


  应用集合操作时，关于每个 `SELECT` 语句中的列有一些规则：


  *   列的数量和类型必须匹配。


  *   只使用第一个 `SELECT` 的名称和别名。


  *   只匹配值，这意味着如果你的各个 `SELECT` 改变了列顺序或选择了不同的列，只要它们是兼容的，它们就会被匹配。


  一个 `SELECT` 可以包含任何标准子句，例如 `WHERE` 和 `GROUP BY`，但不能包含 `ORDER BY` 子句。不过，你可以在最后使用 `ORDER
  BY` 对最终结果进行排序。


  集合操作也可用于特殊技术，例如创建示例数据、比较结果集和合并聚合。




