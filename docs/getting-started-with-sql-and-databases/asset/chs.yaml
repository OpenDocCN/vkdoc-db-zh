- "# 4. 对结果进行排序\n\n关系数据库基于一系列数学原理，其中包括表是一行的 `集合` 这一概念。数学集合有两个重要特性：\n\n*   集合没有重复项。\n\
  *   集合是无序的。\n\n我们稍后会讨论重复项的问题，但现在先看看行的顺序。\n\nSQL 不规定数据如何存储，那是 DBMS 软件的事情。它也不规定数据应以何种顺序被获取。\n\
  \n不过，你确实可以选择使用 `ORDER BY` 子句来指定行的顺序。\n\n请注意，一旦你指定了行顺序，严格来说结果就不再是集合了。通常这无关紧要，但有时你会无法在更复杂的\
  \ SQL 语句中使用这个结果。\n\n在本章中，我们将探讨如何对 `SELECT` 语句的结果进行排序。我们将了解数据如何根据数据类型进行排序，还将学习如何对一个或多个列进行排序、控制排序方向，以及如何对派生或计算出的数据进行排序。\n\
  \n我们还会探讨使用排序来生成分页结果、获取随机数据以及执行非标准的排序顺序。\n\n## 使用 ORDER BY 子句\n\n你可以在 `SELECT` 语句末尾使用\
  \ `ORDER BY` 来对结果集进行排序：\n\n```sql\nSELECT *\nFROM customers\nORDER BY id;\n```\n\
  \n`ORDER BY` 后面跟的是一个或多个要排序的列。\n\n| id | familyname | givenname | … |\n| --- | ---\
  \ | --- | --- |\n| 2 | Wreath | Laurel | … |\n| 8 | Leaves | Russell | … |\n| 9\
  \ | Downe | Ida | … |\n| 10 | Fied | Terry | … |\n| 11 | Onair | Deb | … |\n| 15\
  \ | Second | Millie | … |\n| ~ 304 行 ~ |\n\n注意\n\n*   `ORDER BY` 是 `SELECT` 语句中\
  \ `最后一个` 主要子句。\n*   `ORDER BY` 也最后被求值。\n\n稍后，你将使用另一个子句来限制结果数量，该子句可被视为 `ORDER BY`\
  \ 子句的一部分。\n\n`ORDER BY` 子句独立于 `SELECT` 子句，所以你不必选择你要用来排序的数据：\n\n```sql\nSELECT givenname,\
  \ familyname\nFROM customers\nORDER BY id;\n```\n\n这会给出以下结果，有点令人费解：\n\n| familyname\
  \ | givenname |\n| --- | --- |\n| Wreath | Laurel |\n| Leaves | Russell |\n| Downe\
  \ | Ida |\n| Fied | Terry |\n| Onair | Deb |\n| Second | Millie |\n| ~ 304 行 ~ |\
  \   |\n\n如果特定的顺序对于排序很重要，你很可能希望把它包含进来：\n\n```sql\nSELECT\nid, --  包含排序列\ngivenname,\
  \ familyname\nFROM customers\nORDER BY id;\n```\n\n稍后你会看到，排序列不一定是原始列：它们也可以是计算出的值。\n\
  \n### 排序方向\n\n默认情况下，排序顺序是 `升序`，即递增。你可以通过包含 `ASC` 关键字来明确这一点：\n\n```sql\nSELECT *\n\
  FROM customers\nORDER BY id ASC;                        --  ASC 是冗余的\n```\n\n然而，既然默认方向就是升序，`ASC`\
  \ 关键字就是冗余的，大多数 SQL 开发人员不会使用它。\n\n另一方面，你可以通过附加 `DESC`（降序）来反转排序顺序：\n\n```sql\nSELECT\
  \ *\nFROM customers\nORDER BY id DESC;\n```\n\n这会以相反的顺序给出客户：\n\n| id | familyname\
  \ | givenname | … |\n| --- | --- | --- | --- |\n| 595 | Time | Mark | … |\n| 594\
  \ | Mander | Sally | … |\n| 592 | Highwater | Camilla | … |\n| 589 | O’Shea | Rick\
  \ | … |\n| 588 | Skies | Grace | … |\n| 583 | Knife | Jack | … |\n| ~ 304 行 ~ |\
  \   |   |   |\n\n我们稍后会看到更多关于排序方向的内容。\n\n## 缺失数据 (NULL)\n\n你的一些数据可能在某些列中包含 `NULL`。这代表一个缺失值。\n\
  \nSQL 标准对于 `ORDER BY` 应该如何处理 `NULL` 的规定很模糊；唯一的要求是它们应该被分组在一起，要么在开头，要么在末尾。\n\n```sql\n\
  SELECT *\nFROM customers\nORDER BY height;\n```\n\n因为身高列中有许多 `NULL`，你会看到它们要么集中在数据的开头，要么在末尾。\n\
  \n| id | familyname | givenname | … | height | … |\n| --- | --- | --- | --- | ---\
  \ | --- |\n| 517 | Open | Doris | … | 150.3 | … |\n| 42 | Worry | Donna | … | 150.3\
  \ | … |\n| 154 | Pan | Sam | … | 154.2 | … |\n| 551 | Rowe | Mike | … | 155.6 |\
  \ … |\n| 216 | Driver | Laurie | … | 156.3 | … |\n| 330 | Fied | Clara | … | 156.6\
  \ | … |\n| ~ 304 行 ~ |\n\n不同的 DBMS 对将 `NULL` 分组放在哪里有不同的做法。例如：\n\n| DBMS | NULL 的位置\
  \ |\n| --- | --- |\n| SQLite | 低位 |\n| MSSQL | 低位 |\n| MySQL/MariaDB | 低位 |\n| PostgreSQL\
  \ | 高位 |\n| Oracle | 高位 |\n\nPostgreSQL 和 Oracle 将 `NULL` 与最高值分组，而 MySQL/MariaDB、SQLite\
  \ 和 Microsoft SQL 将它们与最低值分组。\n\n如果你反转排序方向：\n\n```sql\nSELECT *\nFROM customers\n\
  ORDER BY height DESC;\n```\n\n你会看到 `NULL` 出现在另一端：\n\n| id | familyname | givenname\
  \ | … | height | … |\n| --- | --- | --- | --- | --- | --- |\n| 95 | Banks | Bonnie\
  \ | … |   | … |\n| 377 | Money | Xavier | … |   | … |\n| 321 | King | May | … |\
  \   | … |\n| 46 | Ering | Hank | … |   | … |\n| 350 | Bea | May | … |   | … |\n\
  | 500 | Mentary | Rudi | … |   | … |\n| ~ 304 行 ~ |\n\n对于某些 DBMS，你可以使用 `NULLS FIRST|LAST`\
  \ 子句覆盖它们的默认放置位置：\n\n```sql\n--  PostgreSQL, Oracle & SQLite:\nSELECT *\nFROM customers\n\
  ORDER BY height NULLS FIRST;    --  或 NULLS LAST\n```\n\n这对于 PostgreSQL、Oracle 和\
  \ SQLite 是可用的。\n\n对于其他不支持此选项的 DBMS，你可以使用 coalesce 来模拟这个选项：\n\n```sql\n--  模拟 NULLS\
  \ FIRST\nSELECT *\nFROM customers\nORDER BY coalesce(height,0);\n--  模拟 NULLS LAST\n\
  SELECT *\nFROM customers\nORDER BY coalesce(height,1000);\n```\n\n`coalesce()` 函数用一个替代值替换\
  \ `NULL`。如果你使用一个夸张的值，它就会将 `NULL` 值放在开头或结尾。稍后你会看到更多关于 `coalesce()` 的内容。\n\n\n\n\n\
  ### 数据类型\n\n哪个排在前面？一月还是二月？如果这看起来像个脑筋急转弯，那它确实就是。答案取决于我们谈论的是日期还是单词。\n\n在 SQL 中，数据有多种类型，但大多数类型都是基于以下三种核心类型的变体：\n\
  \n*   `数字`（Numbers）用于测量或计数。\n*   `日期`（Dates）标记某个时间点。\n*   `字符串`（Strings）是任何杂项文本——它们是字符序列；SQL\
  \ 也将此称为 `字符型`（`character`）数据。\n\n下表 `sorting` 包含不同类型数据的示例：\n\n```sql\nSELECT * FROM\
  \ sorting;\n```\n\n如果你检查定义该表的 SQL 语句，你会看到以下主要数据类型：\n\n| 列名 | 类型 |\n| --- | --- |\n\
  | id | number |\n| numbervalue | number |\n| datevalue | date |\n| stringvalue |\
  \ string |\n| datestring | string |\n| numberstring | string |\n| numbername, fullname,\
  \ email, firstname, lastname | string |\n\n其中两列，`datestring` 和 `numberstring`，将日期和数字存储为字符串，而非更合适的类型。\n\
  \n数据类型对于确保数据有效性很重要，同时它也决定了排序顺序：\n\n*   数字当然是按 `数字` 顺序排序；负数小于正数。\n*   日期按 `历史` 顺序排序，较早的日期在较新的日期之前。\n\
  \n    请注意，在大多数 DBMS 中，日期通常以 `yyyy-mm-dd` 格式出现，更准确地称为 `ISO 8601` 格式；Oracle 通常使用不同的格式。你可以使用各种函数来更改格式。\n\
  *   字符串按 `字母` 顺序排序。\n\n    请注意，有些字符串以大写字母开头，有些以小写字母开头。`根据你的 DBMS 和排序规则（collation），它们可能被一起排序或分开排序。`\n\
  \n数据类型影响排序顺序这一事实，是在设计数据库时确保数据类型正确的原因之一。有时，人们会倾向于取巧，将所有数据存储为字符串，因为字符串可以接受任何类型的值。然而，这会导致排序顺序混乱。\n\
  \n例如：\n\n```sql\n--  按数字排序\nSELECT * FROM sorting ORDER BY numbervalue;\n--  按字符串排序\n\
  SELECT * FROM sorting ORDER BY numberstring;\n```\n\n你会看到，字符串版本严格按照字母顺序从左到右排序，而使用了合适数据类型的版本则排序更合理。\n\
  \n| id | numberstring |\n| --- | --- |\n| 3 | 0 |\n| 8 | 1024 |\n| 5 | 16 |\n| 2\
  \ | 32 |\n| 1 | -4 |\n| 4 | 4 |\n| 7 | -8 |\n| 6 | 8 |\n\n如果你有一个列，里面全是*本应是*数字的字符串，你可以使用\
  \ `cast` 函数：\n\n```sql\n--  按数字排序\nSELECT * FROM sorting ORDER BY cast(numberstring\
  \ as int);\n```\n\n`cast` 函数将数据类型转换为另一种类型。这里，类型被设置为 `INT`，这是 `INTEGER`（整数）的缩写。数据一旦被转换，就会相应排序。\n\
  \n对日期你也可以做同样的操作：\n\n```sql\n--  按日期排序\nSELECT * FROM sorting ORDER BY datevalue;\n\
  --  按字符串排序\nSELECT * FROM sorting ORDER BY datestring;\n--  按日期排序\nSELECT * FROM\
  \ sorting ORDER BY cast(datestring as date);\n```\n\n使用 `cast()`，你会看到结果按正确的日期顺序排列：\n\
  \n| id | dateString |\n| --- | --- |\n| 1 | 10 Dec 1815 |\n| 4 | 12 May 1820 |\n\
  | 3 | 13 Sep 1819 |\n| 5 | 15 Sep 1890 |\n| 8 | 16 Dec 1775 |\n| 2 | 29 Sep 1794\
  \ |\n| 6 | 30 Jun 1917 |\n| 7 | 7 Nov 1867 |\n\n稍后你会了解更多关于 `cast()` 的内容。\n\n`cast()`\
  \ 函数在面对看起来不像数字的值时往往反应过度。MySQL/MariaDB 和 SQLite 会返回 `0`。SQL Server 有一个 `try_cast()`\
  \ 函数，会返回 `NULL`。Oracle 有一个选项可以在错误时返回某个值。PostgreSQL 和 SQL Server 在使用 `cast()` 函数时会返回致命错误。PostgreSQL\
  \ 没有友好的替代方案，但编写一个函数很容易。\n\n### 大小写敏感性与排序规则\n\n如果你运行以下查询：\n\n```sql\nSELECT * FROM\
  \ sorting ORDER BY stringvalue;\n```\n\n你的结果可能因 DBMS 和数据库的不同而不同。例如：\n\n| id | stringvalue\
  \ |\n| --- | --- |\n| 1 | apple |\n| 6 | Apple |\n| 7 | banana |\n| 5 | Banana |\n\
  | 3 | cherry |\n| 2 | Cherry |\n| 4 | date |\n| 8 | Date |\n| ~ 8 行 ~ |\n\n可能影响你结果的一个因素是数据是否被视为大小写敏感，也就是说，大写和小写字母是否被视为相同。DBMS\
  \ 如何看待大小写字母以及带变音符号的字母，称为 `排序规则`（`collation`）。\n\n广义上讲，排序规则指的是如何处理同一字母的不同变体。这包括这些变体是否被视为同一字符，如果不是，哪个排在前面。\n\
  \n需要考虑的两种主要变体是：\n\n*   大小写：大写和小写\n*   变音符号：带变音符号的变体，例如法语中的 `e`, `é`, `ê`, `è`\n\n\
  你表中数据的排序方式受以下因素影响：\n\n*   DBMS 的默认排序规则\n*   表或列指定的排序规则（如果有的话）\n*   `ORDER BY` 子句后可选的\
  \ `COLLATE` 子句\n\n大小写敏感性问题在过滤数据时也很重要，因为它影响字符串是否匹配。\n\n\n\n\n## 多列排序\n\n如果你试图按一个复合列（包含多个值的列）进行排序，会遇到一些问题：\n\
  \n```sql\nSELECT id, firstname, lastname, fullname\nFROM sorting\nORDER BY fullname;\n\
  ```\n\n你会得到一个结果，但很可能不是你想要的：\n\n| id | firstname | lastname | fullname |\n| --- |\
  \ --- | --- | --- |\n| 1 | Ada | Lovelace | Ada Lovelace |\n| 5 | Agatha | Christie\
  \ | Agatha Christie |\n| 3 | Clara | Schumann | Clara Schumann |\n| 4 | Florence\
  \ | Nightingale | Florence Nightingale |\n| 8 | Jane | Austen | Jane Austen |\n\
  | 6 | Lena | Horne | Lena Horne |\n| 7 | Marie | Curie | Marie Curie |\n| 2 | Rose\
  \ | de Freycinet | Rose de Freycinet |\n\n组合数据时存在诸多问题之一就是，如果不付出额外努力在需要时将其拆分，你就无法对其进行正确排序。\n\
  \n要正确排序数据，你需要将姓名拆分成独立的部分：\n\n| id | firstname | lastname | fullname |\n| --- | ---\
  \ | --- | --- |\n| 8 | Jane | Austen | Jane Austen |\n| 5 | Agatha | Christie |\
  \ Agatha Christie |\n| 7 | Marie | Curie | Marie Curie |\n| 2 | Rose | de Freycinet\
  \ | Rose de Freycinet |\n| 6 | Lena | Horne | Lena Horne |\n| 1 | Ada | Lovelace\
  \ | Ada Lovelace |\n| 4 | Florence | Nightingale | Florence Nightingale |\n| 3 |\
  \ Clara | Schumann | Clara Schumann |\n\n```sql\nSELECT id, firstname, lastname,\
  \ fullname\nFROM sorting\nORDER BY lastname, firstname;\n```\n\n回到真实数据，你可以对 `paintings`\
  \ 表中的详细信息执行相同操作，其中的列应该是彼此独立的：\n\n```sql\nSELECT *\nFROM paintings\nORDER BY price,\
  \ title;\n```\n\n这个结果就更有意义了：\n\n| id | artistid | title | year | price |\n| ---\
  \ | --- | --- | --- | --- |\n| 681 | 163 | Amerika (Baseball) | 1983 | 100.00 |\n\
  | 1928 | 237 | Arrangement in Yellow and Grey: Effie Deans |   | 100.00 |\n| 1820\
  \ | 188 | Bacchus | 1638 | 100.00 |\n| 2367 | 188 | Battle of the Amazons | 1618\
  \ | 100.00 |\n| 2039 | 18 | Bords d’une rivière (Riverbanks) | 1904 | 100.00 |\n\
  | 1269 | 67 | Bouquet of Spring Flowers (Spring Bouquet) | 1866 | 100.00 |\n| ~\
  \ 1273 rows ~ |\n\n通常，数据首先按第一列（`price`）排序；然后，如果有两条或多条数据的值相同，则会进一步按下一列（`title`）排序。下一列有时被称为*决胜列*。\n\
  \n如果下一列中也存在重复值怎么办？有两种可能：\n\n*   如果有更多 `ORDER BY` 列，则数据会进一步排序。\n*   如果没有更多 `ORDER\
  \ BY` 列，*则无法保证顺序*。\n\n除了你在 `ORDER BY` 子句中指定的内容外，SQL 不对排序顺序做任何承诺。如果你想保证一个确定的排序顺序，你需要在\
  \ `ORDER BY` 列表的末尾加上一个保证不重复的列：\n\n```sql\nSELECT *\nFROM paintings\nORDER BY price,\
  \ title, id;\n```\n\n这里，`id` 是最后的手段；作为主键，它不能重复，因此它的顺序是有保证的。在某些情况下，你也可以使用一个非主键列，比如\
  \ `customers` 表中的 `email`，因为在该特定表中，它也被要求是唯一的。\n\n### 列的相互独立性\n\n在前面的例子中，两个主要的列 `price`\
  \ 和 `title` 是彼此独立的。\n\n从技术上讲，没有理由不能反向对它们进行排序：\n\n```sql\nSELECT *\nFROM paintings\n\
  ORDER BY title, price;\n```\n\n总的来说，这个选择是个偏好问题。更准确地说，选择取决于谁想知道这些信息。例如，收藏家可能更喜欢看按标题排序的列表，而销售经理可能更喜欢按价格排序。\n\
  \n有时，各列是相关的^(^(⁶))。例如：\n\n| id | givenname | familyname | town | state |\n| ---\
  \ | --- | --- | --- | --- |\n| 234 | Nat | Ering | Bald Hills | NSW |\n| 592 | Camilla\
  \ | Highwater | Bald Hills | NSW |\n| 342 | Hugh | Morris | Bald Hills | NSW |\n\
  | 91 | Cat | Nip | Bald Hills | NSW |\n| 308 | Noah | Vale | Bald Hills | NSW |\n\
  | 10 | Terry | Fied | Bald Hills | NSW |\n| ~ 304 rows ~ |\n\n```sql\nSELECT *\n\
  FROM customers\nORDER BY state, town;\n```\n\n在这种情况下，`state` 几乎总是会首先排序，因为它被视为城镇的集合：你通常先排大组，再排小组。同样，你也可以反向排序，但大多数人不会期望那样。\n\
  \n前面的讨论有一个例外。历史上，我们按姓氏在前的方式对人名排序：\n\n```sql\nSELECT *\nFROM customers\nORDER BY\
  \ familyname, givenname;\n```\n\n这在技术上没有特殊原因，因为姓氏不一定是一种分组。\n\n### 多列排序方向\n\n如果你按多列排序，请注意每一列都有自己的排序方向。例如：\n\
  \n```sql\nSELECT *\nFROM paintings\nORDER BY price, title DESC;\n```\n\n结果可能有点令人困惑：\n\
  \n| id | artistid | title | year | price |\n| --- | --- | --- | --- | --- |\n| 2121\
  \ | 252 | Winter Scene on a Canal |   | 100.00 |\n| 1938 | 135 | Un village (Le\
  \ village de Maurecourt) |   | 100.00 |\n| 787 | 235 | Untitled (The Hotel Eden)\
  \ | 1945 | 100.00 |\n| 1960 | 235 | Untitled (Paul and Virginia) | 1948 | 100.00\
  \ |\n| 1262 | 334 | The Young Beggar |   | 100.00 |\n| 173 | 355 | The Toreador\
  \ | 1873 | 100.00 |\n| ~ 1273 rows ~ |\n\n这反转了标题的顺序，但主顺序，价格，仍然是升序。如果你包含默认的 `ASC`，会更明显：\n\
  \n```sql\nSELECT *\nFROM paintings\nORDER BY price ASC, title DESC;\n```\n\n然而，没人会这样写，它可能会给人一种\
  \ `ASC` 关键字确实做了不同事情的错误印象。最好习惯默认行为。\n\n如果你真的想完全反转数据，你需要对两列都使用 `DESC`：\n\n```sql\n\
  SELECT *\nFROM paintings\nORDER BY price DESC, title DESC;\n```\n\n现在这给了你期望的顺序。\n\
  \n| id | artistid | title | year | price |\n| --- | --- | --- | --- | --- |\n| 379\
  \ | 111 | Woman with a Yellow Bodice | 1899 |   |\n| 209 | 192 | Woman with a Mandolin\
  \ | 1760 |   |\n| 461 | 39 | Woman with a Basket |   |   |\n| 1438 | 252 | Winter\
  \ landscape with a frozen river and figures | 1620 |   |\n| 1281 | 266 | Village\
  \ Street in Auvers | 1890 |   |\n| 2454 | 266 | Vegetable Gardens in Montmartre\
  \ | 1887 |   |\n| ~ 1273 rows ~ |\n\n请注意，在此示例中，`NULL` 值被排在最后。\n\n记住，每一列都有自己独立的排序方向。\n\
  \n\n\n"
- '# 按计算列排序


  `ORDER BY`子句后跟一个或多个要排序的列。然而，这些列不一定是原始表列。你可以按任何计算值排序。例如：


  ```sql

  SELECT id, givenname, familyname

  FROM artists

  ORDER BY died - born;

  ```


  这会给出一个结果，但排序顺序不明确：


  | id | givenname | familyname |

  | --- | --- | --- |

  | 348 | Honoré | Daumier |

  | 370 | Johannes | Vermeer |

  | 233 | Egon | Schiele |

  | 10 | Frédéric | Bazille |

  | 112 | Dirck van | Baburen |

  | 296 | William | Winstanley |

  | ~ 187 行 ~ |


  通常，你可能希望在`SELECT`子句中列出计算项，这样你可以在那里计算它并按结果排序：


  ```sql

  SELECT id, givenname, familyname, died - born

  FROM artists

  ORDER BY died - born;

  ```


  现在排序顺序更清晰了。


  | id | givenname | familyname | ?column? |

  | --- | --- | --- | --- |

  | 348 | Honoré | Daumier | 0 |

  | 370 | Johannes | Vermeer | 0 |

  | 233 | Egon | Schiele | 28 |

  | 10 | Frédéric | Bazille | 29 |

  | 112 | Dirck van | Baburen | 29 |

  | 296 | William | Winstanley | 31 |

  | ~ 187 行 ~ |


  请记住，如果你的数据库管理系统(DBMS)将`NULL`排在前面，那么你会在实际值之前看到它们。另外，请记住我们发现了一些`born`和`died`值相同的艺术家，这解释了零值的来源。


  当然，每个计算列都应该有一个别名：


  ```sql

  SELECT id, givenname, familyname, died - born AS age

  FROM artists

  ORDER BY died - born;

  ```


  这使结果更清晰：


  | id | givenname | familyname | age |

  | --- | --- | --- | --- |

  | 348 | Honoré | Daumier | 0 |

  | 370 | Johannes | Vermeer | 0 |

  | 233 | Egon | Schiele | 28 |

  | 10 | Frédéric | Bazille | 29 |

  | 112 | Dirck van | Baburen | 29 |

  | 296 | William | Winstanley | 31 |

  | ~ 187 行 ~ |


  由于`ORDER BY`子句是唯一在`SELECT`子句之后处理的子句，你实际上可以使用别名：


  ```sql

  SELECT id, givenname, familyname, died - born as age

  FROM artists

  ORDER BY age;

  ```


  其寓意在于，你可以按计算列排序，但你可能最终会在`SELECT`子句中计算它，然后按结果排序。


  请注意，你*不能*在`WHERE`子句中这样做：


  ```sql

  SELECT *, died-born AS age

  FROM artists

  WHERE died-born<50  --  不是 age<50 ∵ age（尚）不可用

  --  SELECT

  ORDER BY age;

  ```


  我们包含了一个注释掉的`SELECT`子句来提醒你关于求值顺序：只有`ORDER BY`子句在`SELECT`之后求值，所以只有这个子句可以使用列别名。


  你也可以对字符串函数做同样的事情：


  ```sql

  --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle

  SELECT *, length(familyname) AS ln

  FROM customers

  ORDER BY ln;

  -- MSSQL

  SELECT *, len(familyname) AS ln

  FROM customers

  ORDER BY ln;

  ```


  这会给你按名字长度排序的结果：


  | id | givenname | familyname | … | ln |

  | --- | --- | --- | --- | --- |

  | 452 | Sue | Me | … | 2 |

  | 383 | Rose | Up | … | 2 |

  | 226 | Carrie | On | … | 2 |

  | 467 | Luke | Up | … | 2 |

  | 99 | Minnie | Bus | … | 3 |

  | 312 | Frank | Lee | … | 3 |

  | ~ 304 行 ~ |


  你将在本书后面看到更多关于计算的内容。


  ### 限制结果数量


  你已经看到了如何将结果限制为某些条件，例如某个州的客户或价格低于某个金额的画作。这里，我们看看简单地限制结果的`数量`。


  最初，SQL 没有执行此操作的标准方式，大概是因为没有人看到这个需求。自那时起，`OFFSET … FETCH …`子句变得可用。然而，这仅适用于 PostgreSQL、Microsoft
  SQL Server 和 Oracle。对于其他 DBMS，下一节中介绍了一种非官方的替代方法。


  例如，将结果限制为前五个：


  ```sql

  --  PostgreSQL, MSSQL, Oracle

  SELECT *

  FROM customers

  WHERE dob IS NOT NULL   --  排除缺失的出生日期

  ORDER BY dob OFFSET 0 ROWS FETCH FIRST 5 ROWS ONLY;

  ```


  添加`WHERE dob IS NOT NULL`子句是为了过滤掉缺失的出生日期。否则，你将只会在第一个或最后一个组中看到`NULL`出生日期：


  | id | givenname | familyname | dob | … |

  | --- | --- | --- | --- | --- |

  | 344 | Rose | Boat | 1962-09-24 | … |

  | 545 | Jack | Knife | 1962-09-24 | … |

  | 416 | Pam | Pered | 1962-09-28 | … |

  | 440 | Percy | Monn | 1962-12-12 | … |

  | 261 | Vic | Tory | 1962-12-12 | … |

  | ~ 5 行 ~ |   |   |   |   |


  这个非常冗长的`OFFSET … FETCH`子句有两个重要部分：`OFFSET`部分实际上意味着跳过前若干行，而`FETCH FIRST`部分是你想要的最大行数。如果没有那么多行，你将获得尽可能多的可用行。


  请注意以下几点：


  *   `OFFSET … FETCH …`是`ORDER BY`子句的扩展。

  *   `FIRST`可以替换为`NEXT`：效果完全相同。

  *   `ROWS`可以写成`ROW`：效果也相同。


  某些 DBMS 可能允许更多的灵活性。


  另外，请注意`OFFSET … FETCH …`在结果数量上有些过于严格。例如，如果你使用`FETCH FIRST 5`，即使接下来的几行具有相同的值，你也永远不会得到超过
  5 个。


  ## 分页


  你可能想使用此功能的一个原因是分页结果，例如查看每页 20 个项目的目录：


  ```sql

  --  第一页

  SELECT * FROM paintings

  ORDER BY title OFFSET 0 ROWS FETCH FIRST 20 ROWS ONLY;

  --  第 4 页（跳过 3 页）

  SELECT * FROM paintings

  ORDER BY title OFFSET 3*20 ROWS FETCH FIRST 20 ROWS ONLY;

  SELECT * FROM paintings

  ORDER BY title OFFSET 60 ROWS FETCH FIRST 20 ROWS ONLY;

  --  倒序：最后一页优先

  SELECT * FROM paintings

  ORDER BY title DESC

  OFFSET 0 ROWS FETCH FIRST 20 ROWS ONLY;

  ```


  如你所见，你也可以使用`DESC`来反转顺序。


  ### 使用 LIMIT … OFFSET … (MySQL/MariaDB, SQLite, 和 PostgreSQL)


  MySQL/MariaDB 和 SQLite 目前不支持`OFFSET … FETCH …`子句。但是，它们支持一个简单得多的子句：


  ```sql

  SELECT *

  FROM customers

  WHERE dob IS NOT NULL

  ORDER BY dob LIMIT 5 OFFSET 0;

  ```


  PostgreSQL 也支持此子句，因此 PostgreSQL 兼具灵活性和简单性的优势。


  ### 使用 TOP (MSSQL)


  旧版本的 MSSQL 也不支持`LIMIT … OFFSET …`，但你可以使用类似这样的方法：


  ```sql

  SELECT top 5 *

  FROM customers

  WHERE dob IS NOT NULL

  ORDER BY dob;

  ```


  这更简单，但不如`LIMIT … OFFSET …`灵活，因为你无法指定起点。要获取*最后的*行，你需要反转排序顺序：


  ```sql

  SELECT top 5 *

  FROM customers

  WHERE dob IS NOT NULL

  ORDER BY dob DESC;

  ```


  MSSQL 实际上并不强制要求`TOP`子句与`ORDER BY`子句一起使用，但如果没有它，结果将毫无意义，因为否则你无法控制哪些行排在前面。


