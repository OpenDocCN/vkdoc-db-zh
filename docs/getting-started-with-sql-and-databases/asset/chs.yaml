- '# 注意事项


  在整本书中，你会遇到几个术语和几个需要了解的要点：


  *   MySQL 和 MariaDB 本质上是相同的；MariaDB 是一个日益流行的**分支产品**。除了极少数例外情况（书中会注明），代码是**通用**的。

  *   本书大量使用了所谓的 ANSI 模式下的 MySQL/MariaDB。正如你在书中将看到的，这很容易做到，并且使处理标准 SQL 变得容易得多。

  *   微软产品有时被称为 Microsoft SQL Server，有时简称为 MSSQL。如果你在寻找 T-SQL（事务处理 SQL），它也是指同一个东西。


