  \n聚合查询有效地将数据转换为一个二级汇总表。对于总计汇总，你只能选择汇总值。你不能同时选择非聚合值。\n\n主要的聚合函数包括：\n\n*   `count()`，用于计算列中的行数或数值数量\n\
  *   `min()` 和 `max()`，用于按排序顺序获取列中的第一个或最后一个值\n\n对于数字，你还可以使用：\n\n*   `sum()`、`avg()`\
  \ 和 `stddev()`，用于对数字列执行求和、平均值和标准差计算\n\n在处理数字时，并非所有数字的用法都相同，因此并非所有数字都应该被汇总。\n\n对于字符串，你还可以使用：\n\
  \n*   `string_agg()`、`group_concat()` 和 `listagg()`，用于连接列中的字符串\n\n在所有情况下，聚合函数只对值起作用：它们都会跳过\
  \ `NULL`。\n\n你可以控制列中哪些值被包含进来：\n\n*   你可以使用 `DISTINCT` 来只计算每个值的单个实例。\n*   你可以使用 `CASE\
  \ … END` 来作为特定值的过滤器。\n\n如果没有 `GROUP BY` 子句，或使用 `GROUP BY ()`，聚合结果就是总计：你将得到一行汇总值。\n\
  \n你也可以使用 `GROUP BY` 来为多个分组生成汇总。每个分组是独立的。当你这样做时，你会得到每个分组的汇总，以及包含分组值本身的额外列。\n\n聚合并不局限于单表：\n\
