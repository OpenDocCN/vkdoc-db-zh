  \n`spam`列包含`true`或`false`值（如果数据库管理系统支持），或者包含`1`或`0`（如果不支持）。`true`或`false`值在数学家乔治·布尔之后被称为**布尔**值。\n\
  \n要计数不同的值，你可以使用：\n\n```sql\n--  PostgreSQL, MySQL/MariaDB, SQLite\nSELECT\ncount(*)\
  \ AS total,\ncount(spam) AS known,\ncount(CASE spam WHEN true THEN 1 END) AS yes,\n\
  count(CASE spam WHEN false THEN 1 END) AS no\nFROM customers;\n--  MSSQL, Oracle\n\
  SELECT\ncount(*) AS total,\ncount(spam) AS known,\ncount(CASE spam WHEN 1 THEN 1\
  \ END) AS yes,\ncount(CASE spam WHEN 0 THEN 1 END) AS no\nFROM customers;\n```\n\
  \n你现在得到以下结果：\n\n| total | known | yes | no |\n| --- | --- | --- | --- |\n| 304 |\
  \ 279 | 106 | 173 |\n\n`count(spam)`的结果表示有多少行具有值，但不表示是真还是假。注意，`count(spam)`的值将是`yes`和`no`的总和。\n\
  \n如果你特别想计数某列的`NULL`值，你可以这样做：\n\n```sql\nSELECT count(*)-count(spam) AS nulls\nFROM\
  \ customers;\n```\n\n这会给出类似结果：\n\n| nulls |\n| --- |\n| 25 |\n\n即，总行数减去该列中的非空值数量，就得到了`NULL`的数量。\n\
  \n或者，你可以通过使用`CASE … END`使`NULL`变成某个值，而其他所有值变成`NULL`来计数`NULL`：\n\n```sql\nSELECT\n\
  count(*) AS total,\n--  等等,\ncount(CASE WHEN spam IS NULL THEN 1 END) AS unknown\n\
  FROM customers;\n```\n\n你会得到相同的结果：\n\n| total | unknown |\n| --- | --- |\n| 304\
  \ | 25 |\n\n这里，我们实际上是在反转`NULL`：如果是`NULL`，就使其为某个值；如果不是`NULL`，就使其为`NULL`。\n\n## 不同值\n\
  \n`customers`表中有多少个州？你可以尝试：\n\n```sql\nSELECT count(state) AS states\nFROM customers;\n\
  ```\n\n对于州的数量，该语句正确地指出了数据集中州值的数量：\n\n| states |\n| --- |\n| 269 |\n\n然而，如果你想回答“customers\
  \ 表中有多少个州？”这个问题，它可能实际上意味着“有多少个*不同的*州……？”而没有明确说出来。如果这看起来很有可能，你可以使用`DISTINCT`关键字：\n\
  \n```sql\n--  列出不同的州：\nSELECT DISTINCT state\nFROM customers;\n--  计数不同的州：\nSELECT\n\
  count(state) AS addresses,\ncount(DISTINCT state) AS states\nFROM customers;\n```\n\
  \n你现在得到以下结果：\n\n| addresses | states |\n| --- | --- |\n| 269 | 7 |\n\n这是许多例子中的一个，我们在英语中说的并不总是代码中我们想要的意思。\n\
  \n正如你之前看到的，计数州值仍然有一些意义。鉴于每个地址都包含一个州，计数（非唯一的）州意味着计数记录的地址数量。\n\n\n\n## 数字汇总\n\n在处理数字时，还有一些额外的聚合函数非常有用：\n\
  \n```\nSELECT\ncount(height) as heights,\nsum(height) AS total,\navg(height) AS\
  \ average,\nsum(height)/count(height) AS computed_average\nFROM customers;\n```\n\
  \n这会给出一些统计结果：\n\n| heights | total | average | computed_average |\n| --- | --- |\
  \ --- | --- |\n| 248 | 42242.3 | 170.332 | 170.332 |\n\n`sum()` 函数将列中的所有值相加，而 `avg()`\
  \ 函数计算这些值的平均值。在上面的例子中，平均值也通过 `sum/count` 公式计算，你可以看到结果是一样的；原则上，`avg()` 函数只是为了方便。\n\
  \n请注意，前面提到的所有聚合函数都只使用实际值，并且，`NULL` 值总是会被跳过。对于 `sum()` 你可能不会看到任何差异，但需要特别注意的是，平均值仅根据值的数量计算，而不是行数。如果你曾愚蠢地为缺失的身高输入了\
  \ `0`，这些 `0` 会被包含在内，并大幅拉低平均值。\n\n你可以通过除以总行数或者将 `NULL` 值合并为 `0` 来看到这个错误导致的结果：\n\n\
  ```\nSELECT\ncount(height) as heights,\nsum(height) AS total,\navg(height) AS average,\n\
  sum(height)/count(height) AS computed_average,\nsum(height)/count(*) AS not_ca,\n\
  avg(coalesce(height,0)) AS not_ca_again\nFROM customers;\n```\n\n现在我们会得到一些具有误导性的值：\n\
  \n| heights | total | average | computed_average | not_ca | not_ca_again |\n| ---\
  \ | --- | --- | --- | --- | --- |\n| 248 | 42242.3 | 170.332 | 170.332 | 138.955\
  \ | 138.955 |\n\n在上面的查询中：\n\n*   表达式 `sum(height)/count(*)` 用总身高除以行数，而不是身高值的数量，因此结果会低得多。\n\
  *   表达式 `coalesce(height,0)` 将 `NULL` 值替换为 `0`；这些零会被加进去，本身没有影响，但同样，你除以的数又变多了。\n\n\
  如果你对统计感兴趣，还可以计算标准差：\n\n```\n--  非 SQLite 语法\nSELECT\ncount(height) as heights,\n\
  sum(height) AS total,\navg(height) AS average,\nstddev(height) AS sd    --  MSSQL\
  \ 语法: stdev(height)\nFROM customers;\n```\n\n现在我们有了更全面的统计数据。\n\n| heights | total\
  \ | average | sd |\n| --- | --- | --- | --- |\n| 248 | 42242.3 | 170.332 | 6.926\
  \ |\n\n请注意，如果你要聚合的数据不是数字，这些函数都将无法工作。\n\n### 错误示例\n\n有些事情，即使 SQL 允许，你也*绝不*应该用聚合函数去做。\n\
  \n下面这条语句是可以运行的：\n\n```\n--  不要这样做：\nSELECT\nsum(id) AS total_id,\nsum(year) AS total_year,\n\
  sum(price) AS total_price\nFROM paintings;\n```\n\n你会得到一个结果，但你可能会后悔：\n\n| total_id\
  \ | total_year | total_price |\n| --- | --- | --- |\n| 1619593 | 1906235 | 168995\
  \ |\n\nSQL 在处理数字方面有些天真。前面相加的三个列都是数字，SQL 会按照指令愉快地将它们相加。然而，有些数字绝不应该以这种方式处理。\n\n首先，有些数字并不是真正作为数字来使用的。真正数字最重要的特性是它能*计数*。客户的\
  \ `height` 以厘米为单位计数，销售总额以美元计数。\n\n`id` 是一个数字，但它不是用来计数的。相反，它用于*排序*，任何其他序列，比如字母表，都可能起到同样的作用。显然，将\
  \ `id` 相加没有意义，原因是你不应该对序列进行相加。\n\n`year` 也被用作一个序列。它确实计算了公元（BC）以来的年数，但在这里并非如此使用，因此相加年份同样没有意义。\n\
  \n`price` 则更为微妙。它确实用于计数美元的数量，但它实际上并不代表一个固定值。相反，它是*每份*的美元数量。实际上，它是一个平均值，你需要将它乘以份数，才能得到一个可以相加的固定值。\n\
  \n`price` 是一个名称可能产生误导的例子。也许为了更清晰地表达，它应该被命名为 `price_per_copy`。另一方面，`price` 是一个更简单的名称。关键在于，你经常会遇到需要你自行理解或变通处理的表或列名示例。\n\
  \n### 测量尺度\n\n统计学家有时会谈论数字的不同用途。从技术上讲，它们都是数字，但它们的用途会影响你能对它们做什么操作。\n\n以下类型通常被称为 `测量尺度`：\n\
  \n*   名义尺度：名义数字仅用作代码，没有任何数字意义。例如：\n    *   电话“号码”只是代码，它们实际上并不测量任何东西。\n    *   你可能为一个类别分配一个数字，比如艺术品类型，但无论是数值还是排序顺序都没有意义。\n\
  \n*   顺序尺度：顺序数字可以排序，但数值的实际大小没有意义。例如：\n    *   排名，其中位置很重要，但数值之间的距离不重要\n    *   量表，比如从好到坏的意见评级\n\
  \n在示例数据库中用作主键的 `id`，将属于名义尺度或顺序尺度，这取决于你是否认为顺序有意义。\n\n*   区间尺度：数字之间的差异有意义，但没有固定的零点。例如：\n\
  \    *   距离一个固定点的距离（该点是任意选定的）\n    *   事件发生的年份（该年份是从不存在的公元 0 年开始任意测量的）\n    注意，*相加*这些数字没有意义，但你可以*相减*它们来得到一个区间。\n\
  \n*   比率尺度：对于这类数字，有一个真正的零点，因此大小有意义。例如：\n    *   一次销售的总成本\n    *   一个人的身高\n\n只有最后一种类型的数字可以相加。\n\
  \n\n\n## 聚合计算数据\n\n`saleitems` 表中包含一些值得汇总的数据：\n\n```sql\nSELECT * FROM saleitems;\n\
  ```\n\n以下是原始数据：\n\n| id | saleid | paintingid | quantity | price |\n| --- | ---\
  \ | --- | --- | --- |\n| 2621 | 1066 | 1065 | 3 | 100 |\n| 5169 | 2067 | 870 | 1\
  \ | 155 |\n| 667 | 271 | 2061 | 1 | 165 |\n| 6905 | 2749 | 1796 | 3 | 115 |\n| 886\
  \ | 361 | 1874 | 1 | 140 |\n| 6729 | 2681 | 1516 | 2 | 160 |\n| ~ 6315 rows ~ |\n\
  \n这包含了一个 `quantity` 列，表示每件商品的销售数量，以及一个 `price` 列，表示每件商品的 *单价*。\n\n你可以对这些列进行求和，但需要确保这种操作是有意义的：\n\
  \n*   `quantity` 列代表了实际售出的副本数量，因此将其相加是有意义的：它表示需要打印、包装或进行其他处理的印刷品总数。\n*   `price`\
  \ 列是单价，因此仅仅将其相加是 *没有* 意义的，原因在前面提到的错误示例中已经讨论过。\n*   然而，你可以将价格乘以数量，然后再将它们相加。\n\n考虑到这一点，以下查询应该是有效的：\n\
  \n```sql\nSELECT\nsum(quantity) AS total_copies,\nsum(quantity*price) AS total_value\n\
  FROM saleitems;\n```\n\n汇总结果如下：\n\n| total_copies | total_value |\n| --- | --- |\n\
  | 9722 | 1450390 |\n\n它应该有效，但这里有个问题。回想一下，有些数量是缺失的，因此你需要用 `coalesce()` 函数将 `NULL`\
  \ 值处理为假定的含义 `1`。在汇总时你也必须做同样的处理。否则，结果会偏低：\n\n```sql\nSELECT\nsum(coalesce(quantity,1))\
  \ AS total_copies,\nsum(coalesce(quantity,1)*price) AS total_value\nFROM saleitems;\n\
  ```\n\n这会给你一个更真实的结果：\n\n| total_copies | total_value |\n| --- | --- |\n| 10237 |\
  \ 1527050 |\n\n顺便说一下，前面的 `total_value` 应该与你从下面查询得到的结果相同：\n\n```sql\nSELECT sum(total)\
  \ FROM sales;\n```\n\n你应该得到相同的总价值：\n\n| sum |\n| --- |\n| 1527050 |\n\n显然，`coalesce()`\
  \ 函数被用于计算销售总额。\n\n## 其他聚合函数\n\n到目前为止，你已经进行了计数，并且对于数字运行了一些统计函数。还有其他可用的函数，但这里我们将只关注两个：`max()`\
  \ 和 `min()` 函数。\n\n与 `count()` 函数一样，你可以在所有主要数据类型上使用 `max()` 和 `min()`。例如：\n\n```sql\n\
  SELECT\nmin(height) as shortest, max(height) as tallest,\nmin(dob) as oldest, max(dob)\
  \ as youngest,\nmin(familyname) as first, max(familyname) as last\nFROM customers;\n\
  ```\n\n你将得到这些极值：\n\n| shortest | tallest | oldest | youngest | first | last |\n\
  | --- | --- | --- | --- | --- | --- |\n| 150.3 | 186.3 | 1962-09-24 | 2002-08-05\
  \ | Abet | Yourbusiness |\n\n`max()` 和 `min()` 函数为你提供类似于 `ORDER BY` 子句排序后处于两端的值，不过像往常一样，它们会忽略可能出现的\
  \ `NULL`。\n\n与排序类似，数据类型将影响哪些值位于开头或结尾。例如：\n\n```sql\nSELECT\ncount(*) AS countrows,\n\
  max(numbervalue) AS most, min(numbervalue) AS least,\nmax(datevalue) AS latest,\
  \ min(datevalue) AS earliest,\nmax(stringvalue) AS last, min(stringvalue) AS first\n\
  FROM sorting;\n```\n\n值是否为字符串将影响结果：\n\n| rows | most | least | latest | earliest\
  \ | last | first |\n| --- | --- | --- | --- | --- | --- | --- |\n| 8 | 1024 | -8\
  \ | 1917-06-30 | 1775-12-16 | Date | apple |\n\n在得到最小值和最大值之后，你可能想问哪些行实际匹配这些值。例如，谁是最年长的客户，或者哪幅画作最受欢迎？\n\
  \n## 使用聚合结果作为过滤器\n\n你已经看到，不能将未汇总的数据与汇总的数据混合使用。但是，你可以在子查询中使用汇总结果来过滤未汇总的数据。这基本上是将查询分两步进行。\n\
  \n例如，谁是最年长的客户？要得到答案：\n\n1.  找到最小的出生日期：\n\n    ```sql\n    SELECT min(dob) FROM customers\n\
  \    ```\n\n    这将作为下一步的子查询。（注意这里还没有分号，因为我们还没有完成；你仍然可以单独运行这个查询。）\n\n2.  找到出生日期与该结果匹配的客户：\n\
  \n    ```sql\n    SELECT * FROM customers\n    WHERE dob=(SELECT min(dob) FROM customers);\n\
  \    ```\n\n    这将给你类似这样的结果：\n\n    | id | email | … | dob | … |\n    | --- | ---\
  \ | --- | --- | --- |\n    | 545 | jack.knife545@example.com | … | 1962-09-24 |\
  \ … |\n    | 344 | rose.boat344@example.net | … | 1962-09-24 | … |\n\n    你会注意到有不止一个匹配项。这就是为什么期望将未汇总的数据与汇总的数据混合使用是无意义的原因之一。\n\
  \n你可以使用相同的技术来找到最年轻、最高或最矮的客户。\n\n有时，你需要一个涉及关联表的查询。例如，假设你想找到单笔销售额最大的客户。\n\n首先，从 `sales`\
  \ 表中获取 `customerid`：\n\n```sql\nSELECT customerid FROM sales WHERE total=(\nSELECT\
  \ max(total) FROM sales\n);\n```\n\n这里，我们使用 `max(total)` 并找到匹配的 `customerid`。当然，可能不止一个。\n\
  \n接下来，我们从 `customers` 表中找到匹配的客户：\n\n```sql\n--  Biggest Spender\nSELECT *\nFROM\
  \ customers\nWHERE id IN (\nSELECT customerid FROM sales WHERE total=(\nSELECT max(total)\
  \ FROM sales\n)\n);\n```\n\n你现在得到了客户详细信息：\n\n| id | email | familyname | givenname\
  \ | … |\n| --- | --- | --- | --- | --- |\n| 19 | millie.pede19@example.net | Pede\
  \ | Millie | … |\n\n对于这个例子，你本可以使用：\n\n```sql\nWHERE id=(SELECT …)\n```\n\n然而，这样做是有风险的，因为如果有多个客户的\
  \ `max(total)` 相同，可能会出现多个结果。在那种情况下，你会得到一个错误。\n\n你也可以使用其他统计函数作为过滤器。例如，如果你想找到身高低于平均值的客户：\n\
  \n```sql\nSELECT * FROM customers\nWHERE height<(SELECT avg(height) FROM customers);\n\
  ```\n\n你会得到较矮的客户：\n\n| id | email | familyname | … | height |\n| --- | --- | ---\
  \ | --- | --- |\n| 186 | ray.gunn186@example.net | Gunn | … | 163.8 |\n| 179 | ivan.inkling179@example.com\
  \ | Inkling | … | 170.3 |\n| 523 | seymour.sights523@example.net | Sights | … |\
  \ 167.3 |\n| 351 | dick.tate351@example.com | Tate | … | 167.8 |\n| 422 | wanda.why422@example.com\
  \ | Why | … | 163.2 |\n| 121 | lil.ting121@example.com | Ting | … | 162.8 |\n| ~\
  \ 128 rows ~ |\n\n如果你想要那些 *显著* 矮于平均的人，你也可以使用标准差：\n\n```sql\nSELECT * FROM customers\n\
  WHERE height<(SELECT avg(height)-stddev(height) FROM customers);\n--  MSSQL: Use\
  \ stdev(height)\n```\n\n你现在会得到矮得多的客户：\n\n| id | email | familyname | … | height\
  \ |\n| --- | --- | --- | --- | --- |\n| 422 | wanda.why422@example.com | Why | …\
  \ | 163.2 |\n| 121 | lil.ting121@example.com | Ting | … | 162.8 |\n| 429 | tom.morrow429@example.com\
  \ | Morrow | … | 156.9 |\n| 138 | al.fresco138@example.net | Fresco | … | 162.6\
  \ |\n| 468 | connie.fer468@example.com | Fer | … | 161.3 |\n| 330 | clara.fied330@example.com\
  \ | Fied | … | 156.6 |\n| ~ 40 rows ~ |\n\n像往常一样，你不能在单个 `SELECT` 语句中混合使用聚合值和非聚合值。但是，你可以在子查询中使用聚合，并在非聚合查询中使用其结果。\n\
  \n\n\n## 分组\n\n正如你已经看到的，你可以使用 `WHERE` 子句来过滤结果：\n\n```sql\nSELECT count(*) AS countrows\n\
  FROM customers\nWHERE state='VIC';\n```\n\n你将得到以下结果：\n\n| countrows |\n| --- |\n\
  | 52 |\n\n如果需要，你可以对另一个过滤值执行相同的操作：\n\n```sql\nSELECT count(*) AS countrows FROM customers\
  \ WHERE state='VIC';\nSELECT count(*) AS countrows FROM customers WHERE state='NSW';\n\
  SELECT count(*) AS countrows FROM customers WHERE state='QLD';\n```\n\n你刚才手动完成的操作，实际上是在多个组中运行了\
  \ `count()` 函数。\n\n你可以使用 `UNION` 操作符将结果合并为一个结果集：\n\n```sql\nSELECT count(*) AS countrows\
  \ FROM customers WHERE state='VIC'\nUNION ALL\nSELECT count(*) AS countrows FROM\
  \ customers WHERE state='NSW'\nUNION ALL\nSELECT count(*) AS countrows FROM customers\
  \ WHERE state='QLD';\n```\n\n`UNION ALL` 子句可用于合并多个 `SELECT` 语句的结果。请注意，语句之间没有分号，因为它们都属于同一个语句。稍后你会看到更多关于\
  \ `UNION` 子句的内容。\n\n这个结果的信息量稍微少了一些，因为没有任何标识来区分不同的行。你可以硬编码一个值来做到这一点：\n\n```sql\n\
  SELECT 'vic' AS state, count(*) AS countrows\nFROM customers WHERE state='VIC'\n\
  UNION ALL\nSELECT 'nsw' AS state, count(*) AS countrows\nFROM customers WHERE state='NSW'\n\
  UNION ALL\nSELECT 'qld' AS state, count(*) AS countrows\nFROM customers WHERE state='QLD';\n\
  ```\n\n这样可读性更高：\n\n| state | countrows |\n| --- | --- |\n| vic | 52 |\n| nsw | 67\
  \ |\n| qld | 52 |\n\n现在你也有了州名。然而，这相当繁琐，一定有更好的方法来做到这一点，当然，确实有。\n\n### 使用 GROUP BY\
  \ 子句\n\n为不同组分别运行聚合函数的更好方法是让 SQL 通过 `GROUP BY` 子句来完成这项繁重的工作：\n\n```sql\nSELECT count(*)\
  \ AS countrows\nFROM customers\nGROUP BY state;\n```\n\n这更方便，但正如你所见，还不完全正确：\n\n\
  | countrows |\n| --- |\n| 47 |\n| 35 |\n| 26 |\n| 52 |\n| 67 |\n| 3 |\n| 52 |\n\
  | 22 |\n\n这次，你将得到多行结果：每个不同的州对应一行。或者我们这样认为。问题是，上次你知道自己正在过滤哪一个州，但现在你有多个结果，却无法识别哪个是哪个。\n\
  \n当你只使用聚合函数时，实际上隐含使用了之前提到的 `GROUP BY ()` 子句。它为我们提供 `总计`：整个（过滤后）表的汇总，并且只有一行。并非所有的数据库管理系统都支持它，而且它`从不`是必需的。\n\
  \n另一方面，`GROUP BY something` 则不同。它生成 `小计`：多行分组汇总以及组名。它受到所有数据库管理系统的支持。\n\n如果你想要识别结果，就需要在\
  \ `SELECT` 子句中包含组名：\n\n```sql\nSELECT state, count(*) AS countrows\nFROM customers\n\
  GROUP BY state;\n```\n\n这会得到类似这样的结果：\n\n| state | countrows |\n| --- | --- |\n|\
  \ WA | 47 |\n|   | 35 |\n| TAS | 26 |\n| VIC | 52 |\n| NSW | 67 |\n| NT | 3 |\n\
  | QLD | 52 |\n| SA | 22 |\n\n你也可以按多个列进行分组：\n\n```sql\nSELECT state, town, count(*)\
  \ AS countrows\nFROM customers\nGROUP BY state, town;\n```\n\n你现在得到了更细粒度的分组：\n\n\
  | state | town | countrows |\n| --- | --- | --- |\n| SA | Windsor | 1 |\n|   | \
  \  | 35 |\n| VIC | Belmont | 2 |\n| SA | Alberton | 3 |\n| NSW | Hamilton | 5 |\n\
  | WA | Wattle Grove | 4 |\n| ~ 79 行 ~ |   |   |\n\n按多个列分组会在组内创建子组。在这个例子中，你的主要分组是州，而子分组是城镇。\n\
  \n对于某些数据库管理系统，你可能会看到结果按某种顺序排列，而在其他系统中，尤其是 PostgreSQL 和 Oracle，则不会。在 MySQL/MariaDB\
  \ 和 SQLite 中，结果将按 `state,town` 排序，而在 MSSQL 中，结果只会按 `town` 排序。\n\n一如既往，除非你使用 `ORDER\
  \ BY` 子句，否则永远不要依赖结果的顺序！SQL 并不要求 `GROUP BY` 进行任何排序，你看到的任何排序可能是数据库管理系统内部如何进行分组的副产品。如果你执行更复杂的操作，顺序很可能又会改变。\n\
  \n因此，要完成这项工作，请添加一个 `ORDER BY` 子句：\n\n```sql\nSELECT state, town, count(*) AS countrows\n\
  FROM customers\nGROUP BY state, town\nORDER BY state, town;\n```\n\n结果可读性更强：\n\n\
  | state | town | countrows |\n| --- | --- | --- |\n| NSW | Bald Hills | 6 |\n| NSW\
  \ | Belmont | 4 |\n| NSW | Broadwater | 5 |\n| NSW | Buchanan | 3 |\n| NSW | Darlington\
  \ | 1 |\n| NSW | Glenroy | 2 |\n| ~ 79 行 ~ |   |   |\n\n请记住，结果中可能有一些 `NULL` 值，并且根据数据库管理系统的不同，你可能会在开头或结尾看到一个\
  \ `NULL` 组。\n\n你可能认为 SQL 应该能推断出你希望按这种方式排序，但这要求 SQL 开始猜测你的意图，而 `ORDER BY` 对于并非它实际被要求做的事情来说，工作量太大了。\n\
  \n然而，在绝大多数情况下（9.5 次中的 9.5 次），你可能都会希望这样做：\n\n*   在 `SELECT` 子句中包含分组列\n*   `ORDER\
  \ BY` 的列与 `GROUP BY` 相同，或类似\n\n你不一定需要完全按照 `GROUP BY` 的列来排序。在后面关于冗余分组的部分，你会看到如何按与分组类似的东西进行排序。不过，这个原则是成立的。\n\
  \n从 SQL 的角度来看，你可以按任意顺序进行 `GROUP BY`：\n\n```sql\nSELECT state, town, count(*) AS\
  \ countrows\nFROM customers\nGROUP BY town, state\nORDER BY state, town;\n```\n\n\
  你会得到相同的行，并且 `ORDER BY` 子句会负责排序。\n\n这是因为这些列本应是独立的，SQL 当然不知道它们之间的任何关系。然而，在这种情况下，我们理解一个州是包含多个城镇的容器，因此先按州分组再按城镇分组在逻辑上更合理。\n\
  \n对于 `ORDER BY` 同样如此，我们可以按任何我们喜欢的列排序。然而，按与分组相同的列排序是最合理的。\n\n有一个细微的变化。当我们写一个地址时，通常从小到大写，所以你可以更改\
  \ `SELECT` 子句中的列顺序：\n\n```sql\nSELECT town, state, count(*) AS countrows\nFROM customers\n\
  GROUP BY state, town\nORDER BY state, town;\n```\n\n这会得到相同的结果，但列的顺序不同：\n\n| town\
  \ | state | countrows |\n| --- | --- | --- |\n| Bald Hills | NSW | 6 |\n| Belmont\
  \ | NSW | 4 |\n| Broadwater | NSW | 5 |\n| Buchanan | NSW | 3 |\n| Darlington |\
  \ NSW | 1 |\n| Glenroy | NSW | 2 |\n| ~ 79 行 ~ |   |   |\n\n请记住，`SELECT` 子句中的列顺序无关紧要。\n\
  \n你可以使用相同的技术来获取每个客户的销售数量和总金额：\n\n```sql\nSELECT customerid, sum(total) as total,\
  \ count(*) AS countrows\nFROM sales\nGROUP BY customerid\nORDER BY customerid;\n\
  ```\n\n你将得到类似这样的客户销售总额：\n\n| customerid | total | countrows |\n| --- | --- | ---\
  \ |\n| 2 | 14920 | 24 |\n| 8 | 7885 | 16 |\n| 9 | 10645 | 19 |\n| 10 | 9010 | 19\
  \ |\n| 11 | 16460 | 29 |\n| 15 | 6005 | 13 |\n| ~ 256 行 ~ |   |   |\n\n在总计聚合中，你只有一行汇总信息。你无法获得非聚合值。在组汇总中，你会为每个分组额外获得一列，正如你所看到的那样。\n\
  \n在聚合查询中，你只能选择汇总值或分组值。不能选择其他任何内容。\n\n\n\n"
- "# GROUP BY 与 DISTINCT\n\n当你初次接触 `DISTINCT` 子句时，它被描述为列出分组。你可以看到，实际上并未使用任何聚合函数。例如：\n\
  \n```sql\nSELECT state, town\nFROM customers\nGROUP BY state, town\nORDER BY state,\
  \ town;\n\nSELECT DISTINCT state, town -- 结果相同\nFROM customers\nORDER BY state,\
  \ town;\n```\n\n显然，要获得分组，如果你 `don't` 想要任何额外的聚合，使用 `DISTINCT` 更简单。但是，如果你想要额外的聚合，那么就使用\
  \ `GROUP BY` 子句。永远没有理由同时使用两者。\n\n## 多表分组\n\n通常，你想要汇总的数据分布在多个表中。例如，我们可以获取按客户统计的总销售额，这首先需要汇总销售表：\n\
  \n```sql\nSELECT\n    customerid,\n    count(*) AS number_of_sales,\n    sum(total)\
  \ AS total\nFROM sales\nGROUP BY customerid\nORDER BY total, customerid;\n```\n\n\
  这将给你客户 ID 的销售数据：\n\n| customerid | number_of_sales | total |\n| --- | --- | ---\
  \ |\n| 440 | 1 | 115 |\n| 444 | 1 | 200 |\n| 461 | 1 | 240 |\n| 526 | 1 | 285 |\n\
  | 567 | 1 | 310 |\n| 575 | 1 | 310 |\n| ~ 256 行 ~ | | |\n\n注意，`total` 这个名字有双重含义。在\
  \ `sales` 表中，它指的是单笔销售总额。在上面的查询中，它被用作 `sum(total)` 的别名，其含义是一致的。由于 `ORDER BY` 是在 `SELECT`\
  \ 之后处理的，因此排序的是汇总后的总金额。如果你觉得这有点混乱或误导，你可以使用另一个名字，比如 `customer_total`。\n\n前面的查询会给我们\
  \ `customerid`，这可以，但如果我们有客户姓名和其他详细信息会更好。\n\n一种方法是使用子查询来获取客户姓名，并将其用于聚合中：\n\n```sql\n\
  SELECT\n    customerid,\n    (SELECT givenname||' '||familyname  -- MSSQL: 使用 +\n\
  \     FROM customers\n     WHERE customers.id = sales.customerid\n    ) AS customer,\n\
  \    count(*) AS number_of_sales,\n    sum(total) AS total\nFROM sales\nGROUP BY\
  \ customerid\nORDER BY total, customerid;\n```\n\n现在你有了更多细节：\n\n| customerid | customer\
  \ | number_of_sales | total |\n| --- | --- | --- | --- |\n| 440 | Percy Monn | 1\
  \ | 115 |\n| 444 | Jo King | 1 | 200 |\n| 461 | Carol Singer | 1 | 240 |\n| 526\
  \ | Cliff Face | 1 | 285 |\n| 567 | Perry Patetic | 1 | 310 |\n| 575 | Gene Poole\
  \ | 1 | 310 |\n| ~ 256 行 ~ | | | |\n\n你可能会预期，选择甚至不在同一个表中的列，更不用说在 `GROUP BY` 子句中，会导致错误。但是，请记住子查询与主聚合查询是分开的。\n\
  \n你也可以使用连接来获得相同的结果：\n\n```sql\nSELECT\n    c.id, c.givenname||' '||c.familyname\
  \ AS customer,\n    count(*) AS number_of_sales, sum(s.total) AS total\nFROM sales\
  \ AS s JOIN customers AS c ON s.customerid=c.id\nGROUP BY c.id, c.givenname||' '||c.familyname\n\
  ORDER BY total, customerid;\n```\n\n（记住 MSSQL 使用 `+` 进行连接，而 Oracle 不喜欢表 `AS`，后面的示例也是如此。）\n\
  \n这是一个更清晰的版本。然而，`GROUP BY` 有点笨拙，因为你不能使用 `customer` 别名（记住 `SELECT` 在之后才处理）。也存在一个微小的风险，即你可能尝试按略有不同的计算进行分组（这不会成功）。\n\
  \n如果你愿意，可以将连接包装在通用表表达式中，这将简化聚合查询：\n\n```sql\nWITH cte AS (\n    SELECT\n       \
  \ c.id, c.givenname||' '||c.familyname AS customer,\n        s.total\n    FROM customers\
  \ AS c JOIN sales AS s ON c.id=s.customerid\n)\nSELECT\n    id, customer, count(*)\
  \ AS number_of_sales,\n    sum(total) AS total\nFROM cte\nGROUP BY id, customer\n\
  ORDER BY total, id;\n```\n\n这将给出相同的结果。总的来说，这比之前的版本稍长；但是，它确实通过在 CTE 中准备好数据来简化了主要的聚合查询。\n\
  \n## 冗余分组\n\n正如我们之前提到的，聚合只能选择摘要或分组。当你试图选择比你分组依据更具信息性的内容时，这会导致一个小问题。有时，你需要进行比你预期更多的分组。\n\
  \n这是一个简单的例子：\n\n```sql\nSELECT state, count(*) AS countrows\nFROM customers\nGROUP\
  \ BY state, state;\n```\n\n是的，我们按 `state` 分组了两次，是的，这有点浪费时间。对于每个州，我们想要一个州内的子分组，当然，只有一个。\n\
  \n然而，如果分组实际上是同一事物的不同变体，那就没那么傻了。例如，如果你想按星期几对销售额进行分组，你会希望有两个版本的日期：一个用于显示，一个用于排序。\n\
  \n具体做法如下：\n\n```sql\n-- PostgreSQL, Oracle\nSELECT to_char(ordered,'FMDay') AS dayname,\n\
  \    sum(total) AS total\nFROM sales\nGROUP BY to_char(ordered,'FMDay'), to_char(ordered,'D')\n\
  ORDER BY to_char(ordered,'D');\n\n-- MySQL / MariaDB\nSELECT date_format(ordered,'%W')\
  \ AS dayname,\n    sum(total) AS total\nFROM sales\nGROUP BY date_format(ordered,'%W'),\n\
  \    date_format(ordered,'%w')\nORDER BY date_format(ordered,'%w');\n\n-- MSSQL\n\
  SELECT datename(weekday,ordered) AS dayname,\n    sum(total) AS total\nFROM sales\n\
  GROUP BY datename(weekday,ordered),\n    datepart(weekday,ordered)\nORDER BY datepart(weekday,ordered);\n\
  \n-- SQLite 不可用\n```\n\n记住，SQL 只允许你选择或排序 `GROUP BY` 子句中的内容。注意，`GROUP BY` 先按星期几的名称分组，然后按星期几的数字分组。从技术上讲，这是冗余的，因为每天只对应一个日期。但是，在\
  \ `GROUP BY` 中同时包含两者使你能够选择其一并按另一个排序。\n\n| dayname | total |\n| --- | --- |\n| Sunday\
  \ | 214285 |\n| Monday | 214950 |\n| Tuesday | 214090 |\n| Wednesday | 211050 |\n\
  | Thursday | 224720 |\n| Friday | 223640 |\n| Saturday | 224315 |\n\n如果你觉得这看起来像一个法律漏洞，嗯，你可能是对的。\n\
  \n你在上一节中看到了同样的情况，你按客户 ID 分组，然后按客户姓名分组。同样，这是冗余的（每个客户只能有一个姓名），但它允许你在 `SELECT` 子句中包含两者，尽管只有\
  \ `id` 是分组所必需的。\n\n如果你对不必要的分组感到内疚，你可以使用另一种解决方法。这是前面按客户统计销售查询的替代版本：\n\n```sql\nWITH\
  \ cte AS (\n    SELECT c.id, c.givenname||' '||c.familyname AS customer,\n     \
  \   s.total\n    FROM customers AS c JOIN sales AS s ON c.id=s.customerid\n)\nSELECT\
  \ id, min(customer), count(*) AS number_of_sales, sum(total) AS total\nFROM cte\n\
  GROUP BY id\nORDER BY total, id;\n```\n\n这次，我们只按 `id` 分组，但使用 `min()` 函数（或者如果你喜欢，也可以用\
  \ `max()`）；从技术上讲这是一个摘要，因此你可以安全地使用它。\n\n\n## 准备用于聚合的数据\n\n分组聚合仅当存在可按列分组的数据（即多行在某一列中具有完全相同的值）时才有效。有时，数据并不完全符合此要求，但您仍需对其进行聚合。\n\
  \n例如，假设您要计算每日销售总额。如果您查看 `sales` 表：\n\n```sql\nSELECT * FROM sales;\n```\n\n原始数据如下：\n\
  \n| id | customerid | total | ordered | shipped |\n| --- | --- | --- | --- | ---\
  \ |\n| 52 | 52 | 940 | 2022-03-07 16:10:45.739071 | 2022-03-19 |\n| 54 | 37 | 1005\
  \ | 2022-03-08 00:23:39.53316 | 2022-03-22 |\n| 55 | 19 | 795 | 2022-03-08 06:23:28.387395\
  \ | 2022-03-19 |\n| 57 | 42 | 505 | 2022-03-09 00:02:29.974004 | 2022-03-14 |\n\
  | 59 | 53 | 360 | 2022-03-09 06:26:24.808237 | 2022-03-17 |\n| 60 | 10 | 340 | 2022-03-09\
  \ 15:01:05.592177 | 2022-03-23 |\n| ~ 2509 行 ~ |\n\n您会发现每笔销售都有一个 `ordered` 值，其类型为\
  \ `datetime`。两笔交易在同一时刻发生几乎是不可能的（即使不是完全不可能），因此您尝试对此进行分组将一无所获。\n\n但是，如果仅提取日期部分，您可以简化\
  \ `ordered` 列。最直接的方法是将数据转换为 `date` 类型，这将丢弃时间部分。对于汇总，您只需要日期和每笔销售的总额：\n\n```sql\n\
  SELECT cast(ordered as date) as ordered, total FROM sales;\n```\n\nOracle 的工作方式不太一样\
  \ —— 它不会移除时间部分，而这正是此操作的目的。\n\n相反，您应该使用 `trunc(date)`。\n\n简化后的数据如下：\n\n| ordered\
  \ | total |\n| --- | --- |\n| 2022-03-07 | 940 |\n| 2022-03-08 | 1005 |\n| 2022-03-08\
  \ | 795 |\n| 2022-03-09 | 505 |\n| 2022-03-09 | 360 |\n| 2022-03-09 | 340 |\n| ~\
  \ 2509 行 ~ |\n\n对于 Oracle，您需要使用 `trunc(ordered)` 来实现相同的效果，尽管它会包含一个零时间。这里使用原名作为别名，因为它仍然起着标明销售下单时间的作用。\n\
  \n您可以将前面的语句视为第一步；然后可以在汇总中使用简化后的数据：\n\n```sql\nWITH data AS (-- Oracle: 使用 trunc(ordered)\n\
  SELECT cast(ordered as date) as ordered, total FROM sales\n)\nSELECT ordered, sum(total)\
  \ AS total\nFROM data\nGROUP BY ordered;\n```\n\n现在您有了每日总额：\n\n| ordered | total\
  \ |\n| --- | --- |\n| 2022-10-10 | 3630 |\n| 2022-07-14 | 5890 |\n| 2022-09-22 |\
  \ 6730 |\n| 2022-05-19 | 1785 |\n| 2023-02-25 | 8495 |\n| 2022-05-23 | 6835 |\n\
  | ~ 385 行 ~ |\n\n当然，结果可能无序，因此您可以在末尾添加\n\n```sql\nORDER BY ordered\n```\n\n如果您有已排序的结果，可能会注意到日期中存在间隔。这没有问题：它仅表示那些日子没有已完成的销售。这种情况会发生。\n\
  \n这是另一个公共表表达式。您可以使用表子查询来完成相同的操作：\n\n```sql\nSELECT ordered, sum(total) AS total\n\
  FROM (\nSELECT cast(ordered as date) as ordered, total FROM sales\n) AS data\nGROUP\
  \ BY ordered;\n```\n\n这将实现相同的功能，但使用 CTE 会更容易处理：始终最好先准备数据，然后再使用它。CTE 也更灵活，如果需要，可以进行更复杂的编码。\n\
  \n### 在 CTE 中使用 CASE\n\nCTE 在复杂计算中非常方便。例如，我们已经看到如何在 `CASE … END` 表达式中生成价格分组：\n\n\
  ```sql\nSELECT\nid, title,\nCASE\nWHEN price < 130 THEN '便宜'\nWHEN price <= 170\
  \ THEN '合理'\nWHEN price IS NOT NULL THEN '昂贵'\nELSE '未定价'\nEND AS price_category\n\
  FROM paintings;\n```\n\n这再次给出了我们的价格类别：\n\n| id | title | price_category |\n| ---\
  \ | --- | --- |\n| 1222 | Haymakers Resting | 便宜 |\n| 251 | Death in the Sickroom\
  \ | 便宜 |\n| 2190 | Cache-cache (Hide-and-Seek) | 昂贵 |\n| 1560 | Indefinite Divisibility\
  \ | 便宜 |\n| 172 | Girl with Racket and Shuttlecock | 昂贵 |\n| 2460 | The Procession\
  \ to Calvary | 合理 |\n| ~ 1273 行 ~ |\n\n如果您想在 `GROUP BY` 表达式中使用此结果，您必须完全重复该表达式。这很繁琐、不可读、不灵活且容易出错。\n\
  \n相反，您可以使用 CTE 来汇总结果：\n\n```sql\nWITH cte AS (\nSELECT\nid, title,  -- 您实际上不需要此列\n\
  CASE\nWHEN price < 130 THEN '便宜'\nWHEN price <= 170 THEN '合理'\nWHEN price IS NOT\
  \ NULL THEN '昂贵'\nELSE '未定价'\nEND AS price_category\nFROM paintings\n)\nSELECT price_category,\
  \ count(*) AS countrows\nFROM cte\nGROUP BY price_category;\n```\n\n现在您有了价格类别的汇总：\n\
  \n| price_category | countrows |\n| --- | --- |\n| 合理 | 489 |\n| 便宜 | 345 |\n| 未定价\
  \ | 136 |\n| 昂贵 | 303 |\n\n如您所见，您实际上不需要 id 和 title，因为您只使用分组并进行计数。\n\n### 在 CTE 中使用连接\n\
  \n您还可以在 CTE 中使用连接，这简化了多表汇总。例如，如果您想获取各州的销售额，您将需要来自 `sales` 表的总额和来自 `customers` 表的州信息。\n\
  \n要仅获取州和总额，我们可以使用\n\n```sql\nSELECT c.state, s.total\nFROM customers AS c JOIN sales\
  \ AS s ON c.id=s.customerid;\n```\n\n简化后的结果如下：\n\n| state | total |\n| --- | ---\
  \ |\n| QLD | 940 |\n| SA | 1005 |\n| WA | 795 |\n| VIC | 505 |\n| TAS | 360 |\n\
  | NSW | 340 |\n| ~ 2509 行 ~ |   |\n\n将其用作 CTE，我们可以按州分组：\n\n```sql\nWITH cte AS (\n\
  SELECT c.state, s.total\nFROM customers AS c JOIN sales AS s ON c.id=s.customerid\n\
  )\nSELECT state, sum(total) AS total\nFROM cte\nGROUP BY state;\n```\n\n我们现在有了各州总额：\n\
  \n| state | total |\n| --- | --- |\n| TAS | 156305 |\n| VIC | 272695 |\n| NSW |\
  \ 374660 |\n| NT | 18855 |\n| QLD | 333575 |\n| SA | 115700 |\n| WA | 255260 |\n\
  \n再次说明，CTE 的目的是在汇总数据之前对其进行准备。\n\n"
- '# 汇总字符串


  这里有一个最终的例子。在讨论连接（JOIN）时，我们研究了如何连接多个表来获取客户最喜爱的艺术家：


  ```sql

  SELECT DISTINCT

  c.id,

  c.givenname, c.familyname,

  s.id AS sid,

  a.givenname||'' ''||a.familyname AS artist

  FROM

  customers AS c

  JOIN sales AS s ON c.id=s.customerid

  JOIN saleitems AS si ON s.id=si.saleid

  JOIN paintings AS p ON si.paintingid=p.id

  JOIN artists AS a ON p.artistid=a.id

  ORDER BY c.familyname, c.givenname;

  ```


  （请记住，MSSQL 使用`+`进行连接，Oracle 不喜欢表别名使用`AS`，下面的例子也是如此。）


  | id | givenname | familyname | sid | artist |

  | --- | --- | --- | --- | --- |

  | 260 | Aiden | Abet | 818 | Auguste Rodin |

  | 260 | Aiden | Abet | 818 | Paul Cézanne |

  | 260 | Aiden | Abet | 818 | Rembrandt van Rijn |

  | 260 | Aiden | Abet | 902 | Pierre-Auguste Renoir |

  | 260 | Aiden | Abet | 902 | Rembrandt van Rijn |

  | 260 | Aiden | Abet | 1006 | Jean-Antoine Watteau |

  | ~ 5997 rows ~ |


  问题在于你仍然会得到一长串单独的客户/艺术家组合。如果能将所有艺术家合并成一个字符串，就不会那么令人不知所措了。


  不同的数据库管理系统（DBMS）对用于合并字符串的聚合函数有不同的名称（而且较旧版本的 MSSQL 根本没有这样的函数，只有一个*非常*复杂的解决方法）。


  | DBMS | 函数 |

  | --- | --- |

  | PostgreSQL | `string_agg(data, separator)` |

  | Oracle | `listagg(data, separator)` |

  | MySQL/MariaDB | `group_concat(data SEPARATOR separator)` |

  | SQLite | `group_concat(data, separator)` |

  | MSSQL | `string_agg(data, separator)` |


  现在，我们可以将前面的查询用作公共表表达式（CTE），并利用它为每个客户生成一个艺术家列表：


  ```sql

  WITH cte AS (

  SELECT DISTINCT

  c.id,

  c.givenname, c.familyname,

  s.id AS sid,

  a.givenname||'' ''||a.familyname AS artist

  FROM    --  Oracle: 省略表别名的 AS：

  customers AS c

  JOIN sales AS s ON c.id=s.customerid

  JOIN saleitems AS si ON s.id=si.saleid

  JOIN paintings AS p ON si.paintingid=p.id

  JOIN artists AS a ON p.artistid=a.id

  )

  --  PostgreSQL, MSSQL:

  SELECT

  id, givenname, familyname, string_agg(artist, '', '')

  --  Oracle:

  --  SELECT id, givenname, familyname, listagg(artist, '', '')

  --  MySQL / MariaDB:

  --  SELECT

  --      id, familyname, givenname,

  --      group_concat(artist SEPARATOR '', '')

  --  SQLite:

  --  SELECT

  --      id, givenname, familyname, group_concat(artist, '', '')

  FROM cte

  GROUP BY id, givenname, familyname

  ORDER BY familyname, givenname, id;

  ```


  这将给我们一个客户及其所有艺术家的列表：


  | id | givenname | familyname | truncate |

  | --- | --- | --- | --- |

  | 260 | Aiden | Abet | Piero della Francesca, Sandro Bottic … |

  | 323 | Alf | Abet | James Abbott McNeill Whistler, Jacop … |

  | 563 | Ollie | Agenous | Claude Monet, Kasimir Malevich, Henr … |

  | 54 | Corey | Ander | Juan Gris, Amedeo Modigliani, Berthe … |

  | 549 | Ike | Andy | Ando Hiroshige, Jackson Pollock, Rem … |

  | 263 | Adam | Ant | Kasimir Malevich, Joseph Mallord Wil … |

  | ~ 256 rows ~ |


  从结果中你可以看到，合并后的字符串可能会变得非常长。在实际应用中，如果你希望结果实用，就需要确保它不会变得太长。


  ## 使用 HAVING 过滤分组结果


  之前，你获取了每位客户的销售额和销售数量。然后你可能希望将结果限制在总额或数量较高的范围内。要做到这一点，你需要使用 `HAVING` 子句。


  例如，要仅显示消费金额更多的客户，你可以根据 `sum(total)` 值进行筛选：


  ```sql

  SELECT customerid, sum(total) AS total, count(*) AS countrows

  FROM sales

  GROUP BY customerid

  HAVING sum(total)>10000

  --  SELECT

  ORDER BY customerid;

  ```


  我们现在得到了一个过滤后的汇总结果：


  | customerid | total | countrows |

  | --- | --- | --- |

  | 2 | 14920 | 24 |

  | 9 | 10645 | 19 |

  | 11 | 16460 | 29 |

  | 19 | 16530 | 23 |

  | 20 | 12145 | 17 |

  | 24 | 16565 | 28 |

  | ~ 42 rows ~ |


  `HAVING` 子句的作用与 `WHERE` 子句类似，区别在于它过滤的是汇总结果，而不是原始表数据。^⁹ 注意，它位于 `GROUP BY` 子句之后，而
  `GROUP BY` 子句执行实际的汇总操作。


  此外，请注意 `HAVING` 子句仍在 `SELECT` 子句之前处理，因此如果你试图根据前面的计算列进行筛选，是无法实现的。这给出了如图 7-1 所示的子句顺序。


  ![](img/601766_1_En_7_Fig1_HTML.jpg)


  一张表格，展示了带有 GROUP BY 和 HAVING 函数的子句的书写顺序和处理顺序。


  图 7-1 带有 GROUP BY 和 HAVING 的子句顺序


  当然，如果需要，你也可以同时使用 `WHERE` 和 `HAVING` 子句，在汇总前后对数据进行筛选。


  例如，假设你对最近一个月内总销售额较大的客户感兴趣。为此，你将需要两个筛选条件：


  *   最近的销售：通过筛选 `sales.ordered` 减去一个月来实现。

  *   较大的总额：通过在汇总中筛选 `sum(total)` 来实现。


  这给出如下查询：


  ```sql

  --  PostgreSQL, MySQL/MariaDB

  SELECT customerid, sum(total) AS total

  FROM sales

  WHERE ordered>current_timestamp - INTERVAL ''1'' MONTH

  GROUP BY customerid

  HAVING sum(total)>2000

  --  SELECT

  ORDER BY customerid;

  ```


  这应该会得到类似以下的结果：


  | customerid | total |

  | --- | --- |

  | 167 | 2155 |

  | 179 | 2105 |

  | 250 | 5000 |

  | 379 | 2010 |

  | 445 | 2350 |

  | 455 | 3890 |


  请记住，其他 DBMS 使用不同的计算方式来减去一个月：


  ```sql

  --  MSSQL

  SELECT customerid, sum(total) AS total

  FROM sales

  WHERE ordered>dateadd(month,-1,current_timestamp)

  GROUP BY customerid

  HAVING sum(total)>2000

  --  SELECT

  ORDER BY customerid;

  --  SQLite

  SELECT customerid, sum(total) AS total

  FROM sales

  WHERE ordered>date(''now'',''-1 month'')

  GROUP BY customerid

  HAVING sum(total)>2000

  --  SELECT

  ORDER BY customerid;

  --  Oracle

  SELECT customerid, sum(total) AS total

  FROM sales

  WHERE ordered>add_months(current_timestamp,-1)

  GROUP BY customerid

  HAVING sum(total)>2000

  --  SELECT

  ORDER BY customerid;

  ```


  破坏前面例子简洁性的唯一因素是，`SELECT` 子句中的别名在 `HAVING` 子句中尚不可用，因此你不得不重写计算。然而，在内部，SQL 足够智能，不会实际重新计算这些值。


  如果你是很久以前安装的示例数据库，可能不会得到任何结果，因为日期已经过期了。示例脚本的最后有一条 `UPDATE` 语句。如果你运行它，它会将日期调整到更近的日期。


  ### 在 CTE 中使用结果


  如果你想更早地获取高额消费客户的更多详情，可以使用**公共表表达式**（Common Table Expression）的结果，然后与 `customers`
  表进行连接：


  ```sql

  WITH cte AS (

  SELECT customerid, sum(total) AS total

  FROM sales

  WHERE ordered>current_timestamp - INTERVAL ''1'' MONTH

  --  MSSQL:

  --  WHERE ordered>dateadd(month,-1,current_timestamp)

  --  SQLite:

  --  WHERE ordered>date(''now'',''-1 month'')

  --  Oracle:

  --  WHERE ordered>add_months(current_timestamp,-1)

  GROUP BY customerid

  HAVING sum(total)>2000

  )

  SELECT * FROM customers JOIN cte ON customers.id=cte.customerid

  ORDER BY customers.id;

  ```


  你现在得到了一个合并后的结果集：


  | id | email | familyname | givenname | … | total |

  | --- | --- | --- | --- | --- | --- |

  | 167 | lucy.fer167@example.net | Fer | Lucy | … | 2155 |

  | 179 | ivan.inkling179@example.com | Inkling | Ivan | … | 2105 |

  | 250 | rae.ning250@example.net | Ning | Rae | … | 5000 |

  | 379 | artie.chokes379@example.net | Chokes | Artie | … | 2010 |

  | 445 | ida.dunnit445@example.net | Dunnit | Ida | … | 2350 |

  | 455 | pierce.dears455@example.com | Dears | Pierce | … | 3890 |

  | ~ 共 6 行 ~ |


  请注意，你再次尝试在此处混合两种不同类型的数据。你需要一个汇总查询来查找近期的高额消费者，并且需要一个非汇总查询来查找客户详情。


  在之前的示例中，你以子查询的形式放置了汇总部分。而这里，它放在了 CTE 中，这实际上是一种子查询。


  还需注意，CTE 中省略了 `ORDER BY` 子句。在该上下文中它毫无用处，而且 MSSQL 在没有一些额外技巧的情况下不会允许它。


  ### 查找重复值


  `HAVING` 子句的一个简单应用是查找重复值。重复值不一定是个问题，因为它们可能只是巧合，但有时检查一下还是有用的。


  `HAVING` 子句只需要筛选出存在多于一个记录的分组，即 `count(*)>1`。


  例如，要查找重复的出生日期：


  ```sql

  SELECT dob

  FROM customers

  GROUP BY dob

  HAVING count(*)>1;

  ```


  你将获得一个重复项列表：


  | dob |

  | --- |

  | `NULL` |

  | 1963-01-20 |

  | 1996-12-09 |

  | 2002-01-29 |

  | 1990-06-21 |

  | 1980-06-02 |

  | ~ 共 15 行 ~ |


  你也会得到一些 `NULL`。SQL 对 `NULL` 的关系确实是矛盾的，而在这种情况下，它准备将它们视为一个分组。


  再次使用 CTE，你可以获取有关这些客户的更多详情：


  ```sql

  WITH cte AS (

  SELECT dob FROM customers

  GROUP BY dob HAVING count(*)>1

  )

  SELECT * FROM customers AS c JOIN cte ON c.dob=cte.dob

  ORDER BY c.dob;

  ```

  （记住 Oracle 不喜欢表别名使用 `AS`；后续示例同理。）


  | id | email | familyname | givenname | dob | … |

  | --- | --- | --- | --- | --- | --- |

  | 344 | rose.boat344@example.net | Boat | Rose | 1962-09-24 | … |

  | 545 | jack.knife545@example.com | Knife | Jack | 1962-09-24 | … |

  | 440 | percy.monn440@example.com | Monn | Percy | 1962-12-12 | … |

  | 261 | vic.tory261@example.net | Tory | Vic | 1962-12-12 | … |

  | 187 | mikey.fitz187@example.com | Fitz | Mikey | 1963-01-20 | … |

  | 28 | meg.aphone28@example.net | Aphone | Meg | 1963-01-20 | … |

  | ~ 共 28 行 ~ |


  在这里，CTE 中的任何 `NULL` 都会在内连接中被排除，因为没有客户的 id 为 `NULL`。


  你也可以对多个列执行此操作。例如，要查找重复的姓名，你需要同时检查 `familyname` 和 `givenname`：


  ```sql

  SELECT familyname, givenname

  FROM customers

  GROUP BY familyname, givenname

  HAVING count(*)>1;

  ```


  这将得到一个姓名列表：


  | familyname | givenname |

  | --- | --- |

  | Money | Owen |

  | O’Shea | Rick |

  | Gon | Tara |

  | Dover | Eileen |

  | Highwater | Camilla |

  | Knife | Jack |

  | ~ 共 11 行 ~ |


  要获取更多详情：


  ```sql

  WITH cte AS (

  SELECT familyname, givenname FROM customers

  GROUP BY familyname, givenname HAVING count(*)>1

  )

  SELECT *

  FROM customers AS c JOIN cte

  ON c.givenname=cte.givenname AND c.familyname=cte.familyname

  ORDER BY c.familyname, c.givenname;

  ```


  这将得到客户详情：


  | id | familyname | givenname | … |

  | --- | --- | --- | --- |

  | 455 | Dears | Pierce | … |

  | 317 | Dears | Pierce | … |

  | 145 | Dover | Eileen | … |

  | 197 | Dover | Eileen | … |

  | 287 | Gettit | Carmen | … |

  | 223 | Gettit | Carmen | … |

  | ~ 共 22 行 ~ |


  注意，这里的 `ON` 子句匹配了两列，而不是通常的一列。


  ### 在聚合上使用聚合


  之前，我们提到过查找最受欢迎的画作。这实际上比听起来更复杂。一方面，你不能使用像 `max(count())` 这样的表达式（它本可以让事情简单一点）：SQL
  不允许嵌套聚合函数。


  我们将从找出每幅画售出多少份开始。你可以在包含 `paintingid` 的 `saleitems` 表中找到这些信息。你只需要按 `paintingid` 分组：


  ```sql

  SELECT paintingid, count(*) AS countrows

  FROM saleitems

  GROUP BY paintingid;

  ```


  你将得到一个画作 id 列表：


  | paintingid | countrows |

  | --- | --- |

  | 1798 | 8 |

  | 1489 | 4 |

  | 1269 | 5 |

  | 1989 | 3 |

  | 273 | 6 |

  | 1560 | 5 |

  | ~ 共 1136 行 ~ |


  这告诉我们每幅画被包含的次数。但是，请记住还有一个 `quantity` 列，其中包含售出的副本数量，我们可以将其加总。不幸的是，该列可能包含 `NULL`，因此必须使用
  `coalesce` 处理：


  ```sql

  SELECT paintingid, sum(coalesce(quantity,1)) AS quantity

  FROM saleitems

  GROUP BY paintingid;

  ```


  这给出了一个更正确的结果：


  | paintingid | quantity |

  | --- | --- |

  | 1798 | 13 |

  | 1489 | 7 |

  | 1269 | 5 |

  | 1989 | 5 |

  | 273 | 6 |

  | 1560 | 5 |

  | ~ 共 1136 行 ~ |


  这为我们提供了所需处理的数据，因此我们将其放入一个 CTE 中：


  ```sql

  WITH quantities AS (

  SELECT paintingid, sum(coalesce(quantity,1)) AS quantity

  FROM saleitems

  GROUP BY paintingid

  )

  SELECT paintingid, quantity

  FROM quantities

  GROUP BY paintingid, quantity;

  ```


  目前来看，最后这个查询是多余的，因为它给出的结果与我们没有使用 CTE 时相同。然而，第二次分组允许我们使用一个额外的聚合函数，而这个函数在其他情况下无法嵌套：


  ```sql

  WITH quantities AS (

  SELECT paintingid, sum(coalesce(quantity,1)) AS quantity

  FROM saleitems

  GROUP BY paintingid

  )

  SELECT paintingid, quantity

  FROM quantities

  GROUP BY paintingid, quantity

  HAVING quantity=(SELECT max(quantity) FROM quantities);

  ```


  我们现在得到了最终结果：


  | paintingid | quantity |

  | --- | --- |

  | 1246 | 23 |

  | 2138 | 23 |


  子查询绕过了缺少嵌套聚合函数的限制，因为它只是对一个先前计算出的值进行聚合。`HAVING` 子句筛选出总数量与最大值匹配的行。当然，可能不止一个。


  如果你想获取有关画作的更多详情，需要将结果与 paintings 表连接。为此，我们可以使用第二个 CTE：


  ```sql

  WITH

  quantities AS (

  SELECT paintingid,

  sum(coalesce(quantity,1)) AS quantity

  FROM saleitems

  GROUP BY paintingid

  ),

  favourites AS (

  SELECT paintingid, quantity

  FROM quantities

  GROUP BY paintingid, quantity

  HAVING quantity=(SELECT max(quantity) FROM quantities)

  )

  SELECT *

  FROM paintings JOIN favourites ON paintings.id=favourites.paintingid;

  ```


  我们现在有了合并的结果：


  | id | artistid | title | … | quantity |

  | --- | --- | --- | --- | --- |

  | 2138 | 256 | Cook in front of the Sto … | … | 23 |

  | 1246 | 85 | Two Studies of the Head … | … | 23 |


  这里，第二个 `SELECT` 语句被包装在了第二个 CTE 中。你可以像以前一样拥有多个 CTE，只要用逗号分隔它们即可。


  你会注意到第二个 CTE 查询了第一个 CTE。这样，你就可以从较小的组件构建出复杂的查询。你还会注意到布局稍有改变，以便于跟踪 CTE。


  最后，我们将第二个 CTE 与 `paintings` 表连接起来，以获取其余的详情。当然，你可以在选择列时更具选择性。



