  \   -- 错误\n-- MSSQL\nSELECT *, len(familyname)<5 AS size\nFROM customers\nWHERE\
  \ size<5;   -- 错误\n```\n\n您将在后面的章节中看到更多关于计算和函数的内容。\n\n## 处理引号与撇号\n\n您的字符串数据可能包含单引号，尤其是用作撇号时。例如，您的姓氏可能是\
  \ `O'Shea`，或者您的家乡可能是 `'s-Gravenhage`（海牙的正式名称）。\n\n如果您尝试在正常的单引号字符串中输入它们，将会遇到问题：\n\
  \n```sql\n-- 这是错误的：\nSELECT *\nFROM customers\nWHERE familyname = 'O'Shea'\nOR town=''s-Gravenhage';\n\
  ```\n\n字符串中的单引号会提前结束字符串，从而导致语句的其余部分变得混乱。\n\n如果需要包含单引号，您需要输入单引号**两次**（这**不**等同于双引号）：\n\
  \n```sql\n-- 字符串内的 '' 被解释为 '\n-- '' 不等同于 \"\nSELECT *\nFROM customers\nWHERE familyname\
  \ = 'O''Shea' OR town='''s-Gravenhage';\n```\n\n更好的做法是，您的数据应该使用印刷体撇号：\n\n```sql\n\
  -- 使用'印刷体'引号：\nSELECT *\nFROM customers\nWHERE familyname = 'O’Shea' OR town='’s-Gravenhage';\n\
