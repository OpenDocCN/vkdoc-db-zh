- "# 1. 引言\n\n并发与锁是数据库领域最复杂的主题之一。一个通常执行快速且无问题的查询，当条件“恰到好处”时，可能会突然耗时更长或因错误而失败，此时锁或争用就成为了问题。你可能会问自己，既然锁会引发这些问题，为何还需要它们？本章及接下来的\
  \ 11 章将尝试解释这个问题，并探讨如何最好地应对它们。本书的最后六章通过六个案例研究，将相关信息置于现实场景中进行分析，并说明如何避免或减轻问题。\n\n\
  在本章中，你将首先了解为何锁如此重要，尽管它们可能引发问题。接着将解释锁与事务之间的关系。本章其余部分介绍了本书中如何使用示例，以及贯穿全书示例所使用的 `world`、`sakila`\
  \ 和 `employees` 数据库。\n\n## 为何需要锁？\n\n一个无需数据库锁的世界看似完美。然而，其代价将高到只有极少数用例能使用该数据库，而对于\
  \ MySQL 这样的通用数据库，避免锁是不可能的。如果没有锁，就无法实现任何并发。想象一下，如果数据库只允许一个连接访问（你可能会争辩说这本身就算一种锁，因此系统并非无锁）——这对于大多数应用来说并不实用。\n\
  \n注意\n\n在 MySQL 中，通常所说的锁实际上是一个锁请求，它可以处于已授予或等待状态。\n\n当有多个连接并发执行查询时，你需要某种方式来确保这些连接不会相互干扰。这就是锁的作用所在。你可以将锁类比于道路交通中的信号灯（图\
  \ 1-1），它们调节对资源的访问以避免事故。在道路交叉口，必须确保两辆车不会同时穿过彼此的路径而发生碰撞。\n\n![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig1_HTML.jpg](img/502546_1_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1\n\n数据库中的锁类似于交通信号灯\n\n在数据库中，必须确保两个查询对数据的访问不会冲突。正如控制交叉口访问有不同级别——让行、停车标志和交通信号灯——数据库中也有不同类型的锁。\n\
  \n## 锁级别\n\nMySQL 中的锁有多种类型，在不同层级上起作用，从用户级锁到记录锁。最高级别是用户级锁，可以保护应用程序中的整个代码路径以及数据库内的任何对象。中间层有操作数据库对象的锁，包括保护表元数据的元数据锁，以及保护表中所有数据的表锁。用户级锁和表级锁的共同点是它们都在数据库的\
  \ SQL 层实现。高级别锁将在第 6 章讨论。\n\n最低级别是由存储引擎实现的锁。这些锁本质上取决于你使用的存储引擎。由于 InnoDB 是迄今为止 MySQL\
  \ 中最常用的存储引擎（也是默认引擎），本书涵盖了 InnoDB 特有的锁。InnoDB 包括记录锁（这是最容易理解的），以及更复杂的概念，如间隙锁、临键锁、谓词锁和插入意向锁。此外，还有互斥体和信号量（这也发生在\
  \ SQL 层面）。InnoDB 特有的锁以及互斥体/信号量将在第 7 章中介绍。\n\n## 锁与事务\n\n初看之下，将锁和事务这两个主题合并在一本关于并发的书中可能显得奇怪。然而，正如你将在本书的多个示例中看到的，它们密切相关。有些锁在整个事务期间一直持有，因此理解事务如何工作以及如何监控它们非常重要。\n\
  \n事务隔离级别的概念在处理锁时也扮演着重要角色。隔离级别既影响获取哪些锁，也影响锁持有的时间长度。\n\n第 3 章和第 4 章介绍如何监控事务，第 11 章和第\
  \ 12 章则涵盖事务的工作原理、其影响以及事务隔离级别。\n\n## 示例\n\n全书穿插了示例，用以阐明正在讨论的主题或设置可进行调查的情景。除第 17 章和第\
  \ 18 章外，重现测试所需的所有语句均已列出。通常，示例需要多个连接，因此当连接选择很重要时，查询提示符会设置为指示应使用哪个连接执行查询。例如，`连接 1>`\
  \ 表示该查询应由你的第一个连接执行。\n\n本书中的所有示例均在 MySQL Shell 中执行。为简洁起见，示例中的提示符为 `mysql>`，除非连接很重要或语言模式不是\
  \ SQL。这些示例同样适用于旧的 `mysql` 命令行客户端。\n\n提示\n\n如果你对 MySQL Shell 不熟悉，它是一个第二代 MySQL 命令行客户端，支持\
  \ SQL、Python 和 JavaScript。它还附带多个内置实用程序，包括用于管理 MySQL InnoDB 集群和传统复制拓扑的工具。有关 MySQL\
  \ Shell 的介绍，请参阅用户指南 [`https://dev.mysql.com/doc/mysql-shell/en/`](https://dev.mysql.com/doc/mysql-shell/en/)\
