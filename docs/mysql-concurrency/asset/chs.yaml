  Query OK, 0 rows affected (0.0003 sec)\nConnection 1> START TRANSACTION;\nQuery\
  \ OK, 0 rows affected (0.0002 sec)\nConnection 1> UPDATE world.city\nSET Population\
  \ = 5000000\nWHERE Name = 'Sydney'\nAND CountryCode = 'AUS';\nQuery OK, 1 row affected\
  \ (0.0014 sec)\nRows matched: 1  Changed: 1  Warnings: 0\n-- 连接 2\nConnection 2>\
  \ SELECT index_name, lock_type,\nlock_mode, COUNT(*)\nFROM performance_schema.data_locks\n\
  WHERE object_schema = 'world'\nAND object_name = 'city'\nAND thread_id = 1153\n\
  GROUP BY index_name, lock_type, lock_mode;\n+-------------+-----------+---------------+----------+\n\
  | index_name  | lock_type | lock_mode     | COUNT(*) |\n+-------------+-----------+---------------+----------+\n\
  | NULL        | TABLE     | IX            |        1 |\n| CountryCode | RECORD \
  \   | X,REC_NOT_GAP |        1 |\n| PRIMARY     | RECORD    | X,REC_NOT_GAP |  \
