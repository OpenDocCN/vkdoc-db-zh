  \ MySQL 版本而异，例如在 Linux 上，8.0.21 版本的行号为 201）。如果你查看 MySQL 8.0.21 的源代码，文件位于`storage/innobase/btr/btr0sea.cc`，那么第\
  \ 202 行附近的代码是：\n\n```\n186 /** Creates and initializes the adaptive search system\
  \ at a database start.\n187 @param[in]      hash_size       hash table size. */\n\
