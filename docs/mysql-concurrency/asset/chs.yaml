  \n```\n```\n\n\n\n## MySQL 死锁分析案例\n\n死锁发生在服务器时间 2020 年 8 月 7 日 20:08:55。你可以利用此信息来判断这是否与用户报告的死锁为同一事件。\n\
  \n### 事务分析\n\n有趣的部分在于两个事务的信息。可以看到，事务 1 正在更新`Code = 'AUS'`的国家人口：\n\n```sql\nUPDATE\
  \ world.country SET Population = Population * 1.10 WHERE Code = 'AUS'\n```\n\n事务\
  \ 2 则试图插入一个新城市：\n\n```sql\nINSERT INTO world.city VALUES (4080, 'Darwin', 'AUS',\
  \ 'Northern Territory', 146000)\n```\n\n这是一个涉及多张表的死锁案例。虽然两个查询操作不同的表，但这本身并不能证明有更多查询参与，因为外键可以触发一个查询锁定两张表。然而在此案例中，`Code`列是`country`表的主键，且涉及的唯一外键是从`city`表的`CountryCode`列指向`country`表`Code`列的外键（使用`world`示例数据库展示这一点留给读者作为练习）。因此，两个查询自身发生死锁的可能性不大。\n\
  \n> **注意**\n>\n> 在 MySQL 8.0.17 及更早版本中，死锁信息包含的锁相关信息较少。如果你仍在使用更早的版本，升级将使调查死锁更容易。\n\
  \n### 锁等待分析\n\n接下来要观察的是正在等待哪些锁。事务 1 正在等待`country`表主键上的排他锁：\n\n```\nRECORD LOCKS\
  \ space id 1924 page no 5 n bits 120 index PRIMARY of table `world`.`country` trx\
  \ id 537544 lock_mode X locks rec but not gap waiting\n```\n\n主键的值可以在随后的信息中找到。这些信息可能看起来有些令人不知所措，因为`InnoDB`包含了与该记录相关的所有信息。由于这是一条主键记录，整行数据都被包含在内。这对于理解行中的数据非常有用，特别是当主键本身不携带这些信息时，但初次看到可能会感到困惑。`country`表的主键是表的第一列，因此锁请求所请求的主键值就包含在记录信息的第一行：\n\
  \n```\n0: len 3; hex 415553; asc AUS;;\n```\n\n`InnoDB`以十六进制表示法包含该值，但也尝试将其解码为字符串，因此这里可以清楚地看到值为“AUS”，这并不令人惊讶，因为它也出现在查询的`WHERE`子句中。情况并非总是如此明显，因此你应该始终从锁输出中确认该值。你还可以从信息中看到该列在索引中按升序排序。\n\
  \n事务 2 正在等待`city`表`CountryCode`索引上的插入意向锁：\n\n```\nRECORD LOCKS space id 1923 page\
  \ no 14 n bits 1272 index CountryCode of table `world`.`city` trx id 537545 lock_mode\
  \ X locks gap before rec insert intention waiting\n```\n\n你可以看到锁请求涉及记录前的间隙。这种情况下锁信息更简单，因为`CountryCode`索引只有两列——`CountryCode`列和主键（`ID`列），因为`CountryCode`索引是一个非唯一的二级索引。该索引实际上是(`CountryCode`,\
  \ `ID`)，记录前的间隙值如下：\n\n```\n0: len 3; hex 415554; asc AUT;;\n1: len 4; hex 800005f3;\
  \ asc     ;;\n```\n\n这显示`CountryCode`的值为“AUT”，考虑到在字母升序排序中它是继“AUS”之后的下一个值，这并不令人惊讶。`ID`列的十六进制值为\
  \ 0x5f3，即十进制的 1523。如果你查询`CountryCode = AUT`的城市并按`CountryCode`索引排序，可以看到`ID = 1523`是找到的第一个城市：\n\
  \n```sql\n-- 调查 #3\nConnection 3> SELECT *\nFROM world.city\nWHERE CountryCode =\
  \ 'AUT'\nORDER BY CountryCode, ID\nLIMIT 1;\n+------+------+-------------+----------+------------+\n\
  | ID   | Name | CountryCode | District | Population |\n+------+------+-------------+----------+------------+\n\
  | 1523 | Wien | AUT         | Wien     |    1608144 |\n+------+------+-------------+----------+------------+\n\
  1 row in set (0.2673 sec)\n```\n\n到目前为止，一切顺利。由于事务正在等待这些锁，自然可以推断出另一个事务持有该锁。在 8.0.18\
  \ 及更高版本中，`InnoDB`包含了两个事务持有的所有锁的完整列表；在早期版本中，`InnoDB`只为其中一个事务明确包含此信息，因此你需要确定这些事务还执行了哪些其他查询。\n\
  \n### 调查方法\n\n根据现有信息，你可以做一些有根据的猜测。例如，`INSERT`语句被`CountryCode`索引上的间隙锁阻塞了。一个可能获取该间隙锁的查询示例是使用条件`CountryCode\
  \ = 'AUS'`的查询。死锁信息还包含有关拥有这两个事务的连接信息，这可能会有所帮助：\n\n```\nMySQL thread id 762, OS thread\
  \ handle 10344, query id 3282590 localhost ::1 root updating\nMySQL thread id 763,\
  \ OS thread handle 37872, query id 3282591 localhost ::1 root update\n```\n\n你可以看到两个连接都是使用`root@localhost`账户建立的。如果你确保为每个应用程序和角色使用不同的用户，该账户可能有助于缩小执行事务的人员范围。\n\
  \n如果连接仍然存在，你还可以使用`Performance Schema`中的`events_statements_history`表来查找该连接执行的最新查询。根据连接是否用于更多查询，这些查询可能并非涉及死锁的查询，但可能仍然提供关于该连接用途的线索。如果连接已不存在，你原则上可以在`events_statements_history_long`表中查找这些查询，但你需要将“MySQL\
  \ thread id”（连接 ID）映射到`Performance Schema`线程 ID，而目前没有简单的方法可以做到这一点。此外，`events_statements_history_long`消费者默认不启用。\n\
  \n在此特定案例中，两个连接仍然存在，且回滚事务后未执行任何其他操作。清单[16-3]展示了如何查找涉及事务的查询。请注意，在真实案例中，查询可能返回比此处显示的更多的行，因为无法对`event_id`添加过滤器。\n\
  \n### 结论\n\n通过分析死锁日志中的事务操作、锁等待信息和连接详情，可以有效地诊断出死锁的根因，即事务间对`country`表主键和`city`表二级索引上间隙锁的循环等待。\n\
  \n\n## MySQL 死锁调查分析\n\n### 调查过程\n\n我们来看两个具体的调查案例。\n\n#### 调查案例 #4\n\n连接 ID 3 的查询结果如下：\n\
  \n```sql\nSELECT sql_text, nesting_event_id,\nnesting_event_type, mysql_errno,\n\
  IFNULL(error_name, '') AS error,\nmessage_text\nFROM performance_schema.events_statements_history\n\
  LEFT OUTER JOIN performance_schema.events_errors_summary_global_by_error\nON error_number\
  \ = mysql_errno\nWHERE thread_id = PS_THREAD_ID(762)\nAND event_id > 6\nORDER BY\
  \ event_id\\G\n```\n```\n*************************** 1. row ***************************\n\
  sql_text: start transaction\nnesting_event_id: NULL\nnesting_event_type: NULL\n\
  mysql_errno: 0\nerror:\nmessage_text: NULL\n*************************** 2. row ***************************\n\
  sql_text: UPDATE world.city SET Population = Population * 1.10 WHERE CountryCode\
  \ = 'AUS'\nnesting_event_id: 8\nnesting_event_type: TRANSACTION\nmysql_errno: 0\n\
  error:\nmessage_text: Rows matched: 14  Changed: 14  Warnings: 0\n***************************\
  \ 3. row ***************************\nsql_text: UPDATE world.country SET Population\
  \ = Population * 1.10 WHERE Code = 'AUS'\nnesting_event_id: 8\nnesting_event_type:\
  \ TRANSACTION\nmysql_errno: 0\nerror:\nmessage_text: Rows matched: 1  Changed: 1\
  \  Warnings: 0\n*************************** 4. row ***************************\n\
  sql_text: rollback\nnesting_event_id: 8\nnesting_event_type: TRANSACTION\nmysql_errno:\
  \ 0\nerror:\nmessage_text: NULL\n4 rows in set (0.0016 sec)\n```\n\n#### 调查案例 #5\n\
  \n连接 ID 3 的另一个查询结果如下：\n\n```sql\nSELECT sql_text, nesting_event_id,\nnesting_event_type,\
  \ mysql_errno,\nIFNULL(error_name, '') AS error,\nmessage_text\nFROM performance_schema.events_statements_history\n\
  LEFT OUTER JOIN performance_schema.events_errors_summary_global_by_error\nON error_number\
  \ = mysql_errno\nWHERE thread_id = PS_THREAD_ID(763)\nAND event_id > 6\nORDER BY\
  \ event_id\\G\n```\n```\n*************************** 1. row ***************************\n\
  sql_text: start transaction\nnesting_event_id: NULL\nnesting_event_type: NULL\n\
  mysql_errno: 0\nerror:\nmessage_text: NULL\n*************************** 2. row ***************************\n\
  sql_text: UPDATE world.country SET Population = Population + 146000 WHERE Code =\
  \ 'AUS'\nnesting_event_id: 8\nnesting_event_type: TRANSACTION\nmysql_errno: 0\n\
  error:\nmessage_text: Rows matched: 1  Changed: 1  Warnings: 0\n***************************\
  \ 3. row ***************************\nsql_text: INSERT INTO world.city VALUES (4080,\
  \ 'Darwin', 'AUS', 'Northern Territory', 146000)\nnesting_event_id: 8\nnesting_event_type:\
  \ TRANSACTION\nmysql_errno: 1213\nerror: ER_LOCK_DEADLOCK\nmessage_text: Deadlock\
  \ found when trying to get lock; try restarting transaction\n***************************\
  \ 4. row ***************************\nsql_text: SHOW WARNINGS\nnesting_event_id:\
  \ NULL\nnesting_event_type: NULL\nmysql_errno: 0\nerror:\nmessage_text: NULL\n***************************\
  \ 5. row ***************************\nsql_text: rollback\nnesting_event_id: NULL\n\
  nesting_event_type: NULL\nmysql_errno: 0\nerror:\nmessage_text: NULL\n5 rows in\
  \ set (0.0010 sec)\n```\n\n**图 16-3** 查找涉及死锁的查询\n\n请注意，对于连接 ID 763（第二个事务），包含了 MySQL\
  \ 错误编号，并且在第三行中该编号被设置为 1213 – 一个死锁错误。当遇到错误时，MySQL Shell 会自动执行一个 `SHOW WARNINGS` 语句，这就是第\
  \ 4 行的语句。另请注意，对于事务 2 的 `ROLLBACK`，其嵌套事件是 `NULL`，而对于事务 1 的 `ROLLBACK` 则不是。这是因为死锁触发了整个事务的回滚（因此事务\
  \ 2 的 `ROLLBACK` 没有做任何事情）。\n\n死锁是由事务 1 首先更新 `city` 表的人口，然后更新 `country` 表的人口所触发的。事务\
  \ 2 首先更新 `country` 表的人口，然后尝试向 `city` 表插入一个新城市。这是两个工作流以不同顺序更新记录从而容易发生死锁的典型例子。\n\n\
  总结一下调查过程，它包括两个步骤：\n1.  分析来自 InnoDB 的死锁信息，以确定死锁中涉及的锁，并获取有关连接的尽可能多的信息。\n2.  使用其他来源（例如\
  \ `Performance Schema`）来获取有关事务中查询的更多信息。通常需要分析应用程序以获取查询列表。\n\n既然你知道了是什么触发了死锁，那么解决这个问题需要做什么呢？\n\
  \n### 解决方案\n\n死锁是最容易解决的锁情况，因为 InnoDB 会自动选择一个事务作为受害者并回滚它。在之前讨论的死锁中，事务 2 被选为受害者，这可以从死锁输出中看出：\n\
  ```\n*** WE ROLL BACK TRANSACTION (2)\n```\n这意味着对于事务 1，无需做任何事情。在事务 2 被回滚后，事务 1 可以继续并完成其工作。\n\
  \n对于事务 2，InnoDB 已经回滚了整个事务，所以你需要做的就是重试该事务。记住要重新执行所有查询，而不是依赖第一次尝试时返回的值；否则，你可能会使用过时的值。\n\
  \n> **提示**：始终准备好处理死锁和锁等待超时。对于死锁或在锁等待超时后事务被回滚的情况，重试整个事务。对于只有查询被回滚的锁等待超时，重试查询，可能需要添加延迟。\n\
  \n如果死锁发生得相对较少，你实际上不需要做更多事情。死锁是生活中的常态，因此遇到几个死锁不要惊慌。如果死锁造成重大影响，你需要着手进行更改以防止一些死锁。\n\
  \n### 预防措施\n\n减少死锁与通常减少记录锁争用非常相似，另外一点是，在整个应用程序中以相同顺序获取锁非常重要。建议再次阅读关于减少锁问题的第 9 章：\n\
  *   通过将大事务拆分为几个较小的事务并添加索引以减少持有的锁数量，来减少每个事务完成的工作量。\n*   考虑使用 `READ COMMITTED` 事务隔离级别（如果它适用于你的应用程序），以减少锁的数量和持有时间。\n\
  *   确保事务仅保持打开尽可能短的时间。\n*   以相同顺序访问记录，必要时执行 `SELECT ... FOR UPDATE` 或 `SELECT ...\
  \ FOR SHARE` 查询以抢先获取锁。\n\n减少死锁的主要点是：减少锁的数量及其持有时间，并以相同顺序获取它们。\n\n### 案例总结\n\n在本案例中，通过模拟以下工作负载来产生死锁：先更新一个国家所有城市的人口，然后更新该国家的人口。与此同时，另一个连接向同一个国家添加一个新城市，但先更新该国家的人口，然后再插入新城市。这是一个经典的例子，说明了使用相同表但以相反顺序操作的两种不同工作流为何会导致死锁。\n\
  \n调查死锁主要使用了 InnoDB 监视器输出的 `LATEST DETECTED DEADLOCK` 部分。由此可以看出涉及哪些连接、它们执行的最后一条语句、它们持有的锁以及它们正在等待的锁。此外，还使用了包含语句历史的\
  \ Performance Schema 表来查找事务中涉及的确切语句；然而，通常情况下，您没有这样的便利条件，必须通过分析应用程序来确定涉及的语句。\n\n\
  发生死锁的好消息是，它会通过回滚其中一个事务来自动解决，以便另一个事务能够继续。然后您必须重试被回滚的事务。如果您遇到过多死锁，关键点在于减少锁的数量和持续时间，并确保对于不同的任务以相同的顺序获取锁。\n\
  \n在下一章中，您将研究一个由外键导致锁争用的案例。\n\n# 17. 案例研究：外键\n\n更难调查的锁争用情况之一发生在涉及外键时，因为您可能会针对不同表的内容查询相同的锁。本案例研究探讨了一个因外键而导致元数据和\
  \ InnoDB 记录锁同时发生的例子。由于其症状和原因与第 14 章讨论元数据锁的案例以及第 15 章讨论 InnoDB 记录锁的案例相同，因此在本讨论中将跳过这些内容。\n\
  \n## 环境设置\n\n本案例研究比之前的更复杂，没有简单的方法可以自行重现。但是，MySQL Shell 的 `concurrency_book` 模块中的\
  \ `清单` `17-1` 工作负载将允许您重现该争用情况。该工作负载由五个连接组成：\n\n*   两个连接以某种方式更新 `sakila.customer`\
  \ 表，使得始终有一个事务在进行中，并且该事务对表持有元数据和记录锁。在 `COMMIT` 之前有一个 `sleep`，以确保持续时间足够长以避免竞态条件。`sleep`\
  \ 的持续时间可以在工作负载执行期间配置。\n\n*   一个连接对 `sakila.inventory` 表执行 `ALTER TABLE`。此连接使用 `lock_wait_timeout\
  \ = 1`。\n\n*   一个连接更新 `sakila.film_category` 表。\n\n*   一个连接更新 `sakila.category`\
  \ 表。此连接使用 `innodb_lock_wait_timeout = 1`。\n\n当您执行该工作负载时，输入密码后，系统会要求您输入测试的运行时间以及两个更新\
  \ `sakila.customer` 表的连接在提交事务前应 `sleep` 的时间。该 `sleep` 时间指定为一个因子，该因子将乘以 0.1 秒。\n\n\
  注意\n\n该测试不是确定性的，这意味着即使重现相同的问题，您也应该预期会看到不同的数据。\n\n测试开始后，将显示各种监控输出，以便您调查问题。\n\n清单\
