  \ `LATEST DETECTED DEADLOCK` 小节，其中包含有关最新死锁所涉及的事务和锁的详细信息及其发生时间。如果自上次重启 MySQL 以来未发生死锁，则此小节将被省略。第\
  \ 16 章包含一个调查死锁的示例。\n\n#### 注意\nInnoDB 监视器输出中的死锁部分仅包含涉及 InnoDB 记录锁的死锁信息。对于涉及非 InnoDB\
  \ 锁（如用户级锁）的死锁，没有等效信息。\n\n## 事务\n\n在输出稍靠下的位置，有一个 `TRANSACTIONS` 小节，其中列出了 InnoDB 事务。请注意，不持有任何锁的事务（例如，纯\
  \ `SELECT` 查询）不包含在内。在示例中，有一个对 `world.city` 表持有的意向排他锁，以及对主键等于 3805（记录锁信息中第一个字段的 `80000edd`\
  \ 表示值 `0xedd` 的行，其十进制表示为 3805）和 130（`80000082`）的行持有的排他锁。\n\n#### 提示\n如今，InnoDB 监视器输出中的锁信息最好从\
  \ `performance_schema.data_locks` 和 `performance_schema.data_lock_waits` 表中获取。然而，死锁信息仍然非常有用。\n\
  \n您可以通过启用 `innodb_status_output` 选项，请求每 15 秒将监视器输出转储到 stderr。请注意，输出量相当大，因此如果您启用了它，请做好错误日志快速增长的准备。InnoDB\
  \ 监视器输出也很容易隐藏有关更严重问题的消息。当某些条件适用时（例如，当 InnoDB 在缓冲池中难以找到空闲块或存在长时间的信号量等待时），InnoDB 也会自动将监视器输出到错误日志。\n\
  \n如果您想确保记录所有死锁，可以启用 `innodb_print_all_deadlocks` 选项。这会导致每次发生死锁时，将类似 InnoDB 监视器输出中的死锁信息打印到错误日志中。如果您需要调查死锁，这可能很有用，但建议仅在需要时启用它，以避免错误日志变得非常大并可能隐藏其他问题。\n\
  \n#### 注意\n如果您启用 InnoDB 监视器的定期输出或所有死锁的信息，请务必小心。该信息很容易隐藏记录到错误日志中的重要消息。\n\nInnoDB\
  \ 监视器输出的顶部包含有关信号量等待的信息，这是最后一个要讨论的监控类别。\n\n\n## InnoDB 互斥量与信号量\n\nInnoDB 使用互斥对象（更广为人知的名称是互斥量）^(¹)\
  \ 和信号量来守护代码路径，例如，在更新缓冲池时避免竞争条件。MySQL 中有三种可用于监控互斥量的资源，其中两种我们已经见过。最通用的工具是 `Performance\
  \ Schema` 中的同步等待；但是，它们默认未启用，并且启用后可能引发性能问题。本节将重点介绍另外两种特定于 InnoDB 的资源。\n\n#### 注意\n\
  \n在 InnoDB 监控中，互斥量和信号量之间没有明确的区分。\n\n如前一节所见，InnoDB 监控输出包含一个信号量部分，该部分显示了一些通用统计信息以及当前正在等待的信号量。清单\
  \ 2-9 展示了一个包含持续等待的信号量部分的示例。（按需生成信号量等待并非易事，因此未包含重现步骤。有关可能引发信号量等待的工作负载示例，请参见第 18 章。）\n\
  \n```\nSEMAPHORES\n\nOS WAIT ARRAY INFO: reservation count 831\n--Thread 28544 has\
  \ waited at buf0buf.cc line 4637 for 0 seconds the semaphore:\nMutex at 000001F1AD24D5E8,\
  \ Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock var 1\n--Thread 10676 has\
  \ waited at buf0flu.cc line 1639 for 1 seconds the semaphore:\nMutex at 000001F1AD24D5E8,\
  \ Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock var 1\n--Thread 10900 has\
  \ waited at buf0lru.cc line 1051 for 0 seconds the semaphore:\nMutex at 000001F1AD24D5E8,\
  \ Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock var 1\n--Thread 28128 has\
  \ waited at buf0buf.cc line 2797 for 1 seconds the semaphore:\nMutex at 000001F1AD24D5E8,\
  \ Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock var 1\n--Thread 33584 has\
  \ waited at buf0buf.cc line 2945 for 0 seconds the semaphore:\nMutex at 000001F1AD24D5E8,\
  \ Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock var 1\nOS WAIT ARRAY INFO:\
  \ signal count 207\nRW-shared spins 51, rounds 86, OS waits 35\nRW-excl spins 39,\
  \ rounds 993, OS waits 35\nRW-sx spins 30, rounds 862, OS waits 25\nSpin rounds\
  \ per wait: 1.69 RW-shared, 25.46 RW-excl, 28.73 RW-sx\n清单 2-9\nInnoDB 监控器的信号量部分\n\
  ```\n\n在这个例子中，第一个等待发生在 `buf0buf.cc` 第 4637 行，这指的是请求互斥量的源代码文件名和行号。行号取决于您使用的版本号，编译器/平台甚至可能导致行号变化一位。`buf0buf.cc`\
  \ 文件在 MySQL 8.0.21 中第 4637 行附近包含以下代码（每行前缀为行号）：\n\n```\n4577 /** 为读取到缓冲池 buf_pool\
  \ 初始化一个页面。如果页面是\n4578 (1) 已经在 buf_pool 中，或者\n4579 (2) 我们指定了只读取插入缓冲页面而该页面不是插入缓冲页面，或者\n\
  4580 (3) 该表空间已被删除或正在删除，\n4581 则此函数不执行任何操作。\n4582 将 io_fix 标志设置为 BUF_IO_READ 并在缓冲帧上设置一个非递归的独占锁。\n\
  4583 io 处理器必须负责清除该标志并在稍后释放锁。\n4584 @param[out]     err                     DB_SUCCESS\
  \ 或 DB_TABLESPACE_DELETED\n4585 @param[in]      mode                    BUF_READ_IBUF_PAGES_ONLY,\
  \ ...\n4586 @param[in]      page_id                 页面 id\n4587 @param[in]     \
  \ page_size               页面大小\n4588 @param[in]      unzip                   TRUE=请求未压缩的页面\n\
  4589 @return 指向块的指针或 NULL */\n4591 buf_page_t *buf_page_init_for_read(dberr_t *err,\
  \ ulint mode,\n4592                                    const page_id_t &page_id,\n\
  4593                                    const page_size_t &page_size, ibool unzip)\
  \ {\n...\n4637   mutex_enter(&buf_pool->LRU_list_mutex);\n...\n```\n\n该函数正尝试将一个页面读入缓冲池，并在第\
  \ 4637 行请求了缓冲池 LRU 列表上的互斥量。这个互斥量创建于 `buf0buf.cc:1228`（从信号量部分也可以看到）。所有等待的都是同一个互斥量，只是发生在源代码的不同部分。这意味着在维护\
  \ InnoDB 缓冲池的最近最少使用列表时存在竞争。（在此例中，等待是通过设置 `innodb_buffer_pool_size = 5M` 并在近 2 GiB\
  \ 大的表上执行并发查询产生的。）\n\n因此，在调查信号量等待时，通常需要参考源代码。尽管如此，文件名是一个很好的线索，可以提示竞争发生在代码的哪个部分，例如，`buf0buf.cc`\
  \ 与缓冲池相关，而 `buf0flu.cc` 与缓冲池刷新算法相关。\n\n信号量部分对于查看当前正在发生的等待很有用，但对于随时间进行的监控则用处不大。这时，InnoDB\
  \ 互斥量监控器是一个更好的选择。您可以使用 `SHOW ENGINE INNODB MUTEX` 语句访问互斥量监控器：\n\n```\nmysql> SHOW\
  \ ENGINE INNODB MUTEX;\n+--------+------------------------------+------------+\n\
  | Type   | Name                         | Status     |\n+--------+------------------------------+------------+\n\
  | InnoDB | rwlock: dict0dict.cc:2455    | waits=748  |\n| InnoDB | rwlock: dict0dict.cc:2455\
  \    | waits=171  |\n| InnoDB | rwlock: fil0fil.cc:3206      | waits=38   |\n| InnoDB\
  \ | rwlock: sync0sharded_rw.h:72 | waits=1    |\n| InnoDB | rwlock: sync0sharded_rw.h:72\
  \ | waits=1    |\n| InnoDB | rwlock: sync0sharded_rw.h:72 | waits=1    |\n| InnoDB\
  \ | sum rwlock: buf0buf.cc:778   | waits=2436 |\n+--------+------------------------------+------------+\n\
  7 rows in set (0.0111 sec)\n```\n\n文件名和行号指的是互斥量创建的位置。互斥量监控器并非 MySQL 中最用户友好的工具，因为每个互斥量可能出现多次，并且如果不解析输出则无法汇总等待次数。然而，它是默认启用的，因此您可以随时使用它。\n\
  \n#### 注意\n\n`SHOW ENGINE INNODB MUTEX` 仅包含至少经历过一次操作系统等待的互斥量和读写锁信号量。\n\n互斥量信息的收集是通过\
  \ `latch` InnoDB 指标（该指标是隐藏的，因此您无法看到当前值）来启用和禁用的。通常没有理由禁用 `latch` 指标。\n\n\n\n# 3.\
  \ 监控 InnoDB 事务\n\n## 摘要\n\n本章介绍了可用于监控和调查锁的资源。首先探讨了 Performance Schema 表。其中有专用的表可用于查询当前的元数据和数据锁请求，包含有关锁目标对象、是共享锁还是排他锁以及锁请求是否已被授予等信息。在最底层，还有一些可用于调查同步等待的表；但这些表默认未启用，且开销较大。在粒度尺度的另一端，语句表和错误摘要表可用于调查哪些语句遇到错误以及错误发生的频率。\n\
  \n其次，`sys` 模式也可能很有用，特别是用于调查锁等待问题。其中的 `innodb_lock_waits` 视图提供有关正在进行的 InnoDB 数据锁等待的信息，而\
  \ `schema_table_lock_waits` 视图则提供有关正在进行的表元数据锁等待的信息。\n\n第三，在最高层级，状态计数器和 InnoDB 指标提供了实例活动的概览，包括锁的使用和获取锁失败的情况。如果你想要获取更多关于\
  \ InnoDB 锁的信息，那么锁监视器提供了与 Performance Schema 中数据锁表类似的信息，但格式不太便于直接使用；而 InnoDB 监视器包含了最近一次发生的死锁的详细信息。InnoDB\
  \ 监视器还包含有关信号量等待的信息，最后，InnoDB 互斥量监视器提供了关于互斥量等待的统计信息。\n\n另一种获取锁使用情况信息的有用方法是查看事务信息。这将在下一章中讨论。\n\
  \n脚注 1\n\n## 信息模式 INNODB_TRX\n\n信息模式中的 `INNODB_TRX` 视图是关于 InnoDB 事务最专用的信息来源。它包含诸如事务开始时间、已修改的行数以及持有的锁数等信息。`INNODB_TRX`\
  \ 视图也被 `sys.innodb_lock_waits` 视图用于提供有关涉及锁等待问题的事务的一些信息。表 3-1 总结了该表中的列。\n\n### 表\
  \ 3-1\n\n`information_schema.INNODB_TRX` 视图中的列\n\n| 列/数据类型 | 描述 |\n| --- | --- |\n\
  | `trx_id``varchar(18)` | 事务 ID。在引用事务或与 InnoDB 监视器输出进行比较时，此 ID 可能有用。否则，此 ID 应被视为纯内部使用，不应赋予任何意义。该\
  \ ID 仅分配给已修改数据或锁定行的事务；仅执行只读 `SELECT` 语句的事务将有一个虚拟 ID（如 421124985258256），如果该事务开始修改或锁定记录，此\
  \ ID 将会改变。 |\n| `trx_state``varchar(13)` | 事务的状态。可能是 `RUNNING`（运行中）、`LOCK WAIT`（锁等待）、`ROLLING\
  \ BACK`（回滚中）和 `COMMITTING`（提交中）之一。 |\n| `trx_started``datetime` | 事务启动的时间（使用系统时区）。\
  \ |\n| `trx_requested_lock_id``varchar(105)` | 当 `trx_state` 为 `LOCK WAIT` 时，此列显示事务正在等待的锁的\
  \ ID。 |\n| `trx_wait_started``datetime` | 当 `trx_state` 为 `LOCK WAIT` 时，此列显示锁等待开始的时间（使用系统时区）。\
  \ |\n| `trx_weight``bigint unsigned` | 衡量事务在已修改行数和已持有锁数方面完成工作量的一个指标。这是在发生死锁时用于确定哪个事务将被回滚的权重。权重越高，表示完成的工作越多。\
  \ |\n| `trx_mysql_thread_id``bigint unsigned` | 执行该事务的连接的 ID（与 Performance Schema\
  \ `threads` 表中的 `PROCESSLIST_ID` 列相同）。 |\n| `trx_query``varchar(1024)` | 事务当前正在执行的查询。如果事务处于空闲状态，则该查询为\
  \ `NULL`。 |\n| `trx_operation_state``varchar(64)` | 事务当前执行的操作。即使正在执行查询，此列也可能为 `NULL`。\
  \ |\n| `trx_tables_in_use``bigint unsigned` | 事务已使用的表的数量。 |\n| `trx_tables_locked``bigint\
  \ unsigned` | 事务在其中持有行锁的表的数量。 |\n| `trx_lock_structs``bigint unsigned` | 事务创建的锁结构的数量。\
  \ |\n| `trx_lock_memory_bytes``bigint unsigned` | 事务持有的锁所使用的内存字节数。 |\n| `trx_rows_locked``bigint\
  \ unsigned` | 事务持有的记录锁的数量。虽然称为行锁，但也包括索引锁。 |\n| `trx_rows_modified``bigint unsigned`\
  \ | 事务修改的行数。 |\n| `trx_concurrency_tickets``bigint unsigned` | 当 `innodb_thread_concurrency`\
  \ 不为 0 时，事务会被分配 `innodb_concurrency_tickets` 张票，它可以在必须允许其他事务执行工作之前使用这些票。一张票对应于访问一行。此列显示剩余多少张票。\
  \ |\n| `trx_isolation_level``varchar(16)` | 用于该事务的事务隔离级别。 |\n| `trx_unique_checks``int`\
  \ | 该连接的 `unique_checks` 变量是否启用。 |\n| `trx_foreign_key_checks``int` | 该连接的 `foreign_key_checks`\
  \ 变量是否启用。 |\n| `trx_last_foreign_key_error``varchar(256)` | 该事务遇到的最后一个（如果有）外键错误的错误消息。\
  \ |\n| `trx_adaptive_hash_latched``int` | 事务是否锁定了自适应哈希索引的一部分。总共有 `innodb_adaptive_hash_index_parts`\
  \ 个部分。此列实际上是一个布尔值。 |\n| `trx_adaptive_hash_timeout``bigint unsigned` | 是否在多次查询间保持对自适应哈希索引的锁。如果自适应哈希索引只有一个部分且没有争用，则超时计数器递减，当超时达到\
  \ 0 时锁被释放。当存在争用或有多个部分时，锁总是在每次查询后释放，此时超时值为 0。 |\n| `trx_is_read_only``int` | 事务是否为只读事务。事务可以是只读的，无论是显式声明，还是对于启用了\
  \ `autocommit` 的单语句事务，并且 InnoDB 能够检测到该查询只会读取数据。 |\n| `trx_autocommit_non_locking``int`\
  \ | 当事务是单语句非锁定 `SELECT` 且 `autocommit` 选项启用时，此列设置为 1。当此列和 `trx_is_read_only` 均为\
  \ 1 时，InnoDB 可以优化该事务以减少开销。 |\n| `trx_schedule_weight``bigint unsigned` | 由冲突感知事务调度（CATS）算法（参见第\
  \ 8 章）分配给事务的权重。该值仅对处于 `LOCK WAIT` 状态的事务有意义。此列在 8.0.20 版本中添加。 |\n\n\n\n从 `INNODB_TRX`\
  \ 视图获取的信息，可用于判断哪些事务产生了最大的影响。清单 3-1 展示了一个启动两个可供研究的事务示例。\n\n```\n-- Connection   Processlist\
  \ ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
  --          1               53         163          6\n--          2           \
  \    54         164          6\n-- Connection 1\nConnection 1> START TRANSACTION;\n\
  Query OK, 0 rows affected (0.0002 sec)\nConnection 1> UPDATE world.city SET Population\
  \ = Population + MOD(ID, 2) + SLEEP(0.01);\n-- Connection 2\nConnection 2> SET SESSION\
  \ autocommit = ON;\nQuery OK, 0 rows affected (0.0004 sec)\nConnection 2> SELECT\
  \ COUNT(*) FROM world.city WHERE ID > SLEEP(0.01);\n```\n\n**清单 3-1** 事务示例\n\n这些事务将运行\
  \ 40-50 秒。在它们执行期间，您可以像清单 3-2 中所示那样查询 `INNODB_TRX` 视图（具体数据取决于您测试中的 id 以及查询 `INNODB_TRX`\
  \ 视图的时间）。\n\n```\n-- Investigation #1\n-- Connection 3\nConnection 3> SELECT *\n\
  \    -> FROM information_schema.INNODB_TRX\n    -> WHERE trx_mysql_thread_id IN\
  \ (53, 54)\\G\n*************************** 1. row ***************************\n\
  \                     trx_id: 296813\n                  trx_state: RUNNING\n   \
  \             trx_started: 2020-06-27 17:46:10\n        trx_requested_lock_id: NULL\n\
  \            trx_wait_started: NULL\n                  trx_weight: 1023\n      \
  \ trx_mysql_thread_id: 53\n             trx_query: UPDATE world.city SET Population\
  \ = Population + MOD(ID, 2) + SLEEP(0.01)\n   trx_operation_state: NULL\n      \
  \   trx_tables_in_use: 1\n         trx_tables_locked: 1\n          trx_lock_structs:\
  \ 14\n     trx_lock_memory_bytes: 1136\n           trx_rows_locked: 2031\n     \
  \    trx_rows_modified: 1009\n   trx_concurrency_tickets: 0\n       trx_isolation_level:\
  \ REPEATABLE READ\n         trx_unique_checks: 1\n        trx_foreign_key_checks:\
  \ 1\ntrx_last_foreign_key_error: NULL\n    trx_adaptive_hash_latched: 0\n    trx_adaptive_hash_timeout:\
  \ 0\n              trx_is_read_only: 0\ntrx_autocommit_non_locking: 0\n       trx_schedule_weight:\
  \ NULL\n*************************** 2. row ***************************\n       \
  \              trx_id: 283598406543136\n                  trx_state: RUNNING\n \
  \               trx_started: 2020-06-27 17:46:10\n        trx_requested_lock_id:\
  \ NULL\n            trx_wait_started: NULL\n                  trx_weight: 0\n  \
  \     trx_mysql_thread_id: 54\n             trx_query: SELECT COUNT(*) FROM world.city\
  \ WHERE ID > SLEEP(0.01)\n   trx_operation_state: NULL\n         trx_tables_in_use:\
  \ 1\n         trx_tables_locked: 0\n          trx_lock_structs: 0\n     trx_lock_memory_bytes:\
  \ 1136\n           trx_rows_locked: 0\n         trx_rows_modified: 0\n   trx_concurrency_tickets:\
  \ 0\n       trx_isolation_level: REPEATABLE READ\n         trx_unique_checks: 1\n\
  \        trx_foreign_key_checks: 1\ntrx_last_foreign_key_error: NULL\n    trx_adaptive_hash_latched:\
  \ 0\n    trx_adaptive_hash_timeout: 0\n              trx_is_read_only: 1\ntrx_autocommit_non_locking:\
  \ 1\n       trx_schedule_weight: NULL\n2 rows in set (0.0008 sec)\n```\n\n**清单 3-2**\
  \ `INNODB_TRX` 视图输出示例\n\n第一行展示了一个修改数据的事务示例。在检索信息时，已修改了 1009 行，并且有大约两倍数量的记录锁。您还可以看到该事务仍在主动执行查询（一个\
  \ `UPDATE` 语句）。\n\n第二行是一个在启用 `autocommit` 的情况下执行的 `SELECT` 语句示例。由于启用了自动提交，事务中只能有一条语句（显式的\
  \ `START TRANSACTION` 会禁用自动提交）。`trx_query` 列显示它是一个不带任何锁子句的 `SELECT COUNT(*)` 查询，因此它是一个只读语句。这意味着\
  \ InnoDB 可以跳过一些操作，例如为事务准备持有的锁和撤销信息，从而降低了事务的开销。`trx_autocommit_non_locking` 列被设置为\
  \ 1 以反映这一点。\n\n您应该关注哪些事务取决于系统上预期的工作负载。如果您有 OLAP 工作负载，预计会有运行时间相对较长的 `SELECT` 查询。对于纯\
  \ OLTP 工作负载，任何运行超过一秒且修改超过少数几行的事务都可能是问题的迹象。例如，要查找运行时间超过 10 秒的事务，您可以使用以下查询：\n\n```\n\
  SELECT *\nFROM information_schema.INNODB_TRX\nWHERE trx_started < NOW() - INTERVAL\
  \ 10 SECOND;\n```\n\n您可以选择性地连接 Performance Schema 中的其他表，例如 `threads` 和 `events_statements_current`。清单\
  \ 3-3 展示了一个这样的例子。\n\n```\n-- Investigation #3\nConnection 3> SELECT thd.thread_id,\
  \ thd.processlist_id,\n    -> trx.trx_id, stmt.event_id, trx.trx_started,\n    ->\
  \ TO_SECONDS(NOW()) -\n    -> TO_SECONDS(trx.trx_started\n    -> ) AS age_seconds,\n\
  \    -> trx.trx_rows_locked, trx.trx_rows_modified,\n    -> FORMAT_PICO_TIME(stmt.timer_wait)\
  \ AS latency,\n    -> stmt.rows_examined, stmt.rows_affected,\n    -> sys.format_statement(SQL_TEXT)\
  \ as statement\n    -> FROM information_schema.INNODB_TRX trx\n    -> INNER JOIN\
  \ performance_schema.threads thd\n    -> ON thd.processlist_id = trx.trx_mysql_thread_id\n\
  \    -> INNER JOIN performance_schema.events_statements_current stmt\n    -> USING\
  \ (thread_id)\n    -> WHERE trx_started < NOW() - INTERVAL 10 SECOND\n    -> LIMIT\
  \ 1\\G\n*************************** 1. row ***************************\n       thread_id:\
  \ 213\n  processlist_id: 53\n          trx_id: 296813\n       event_id: 7\n    trx_started:\
  \ 2020-06-27 17:46:10\n    age_seconds: 62\ntrx_rows_locked: 2031\ntrx_rows_modified:\
  \ 1009\n         latency: 1.01 s\nrows_examined: 1010\n rows_affected: 1009\n  \
  \    statement: UPDATE world.city SET Population = Population + MOD(ID, 2) + SLEEP(0.01)\n\
  1 row in set (0.0021 sec)\n```\n\n**清单 3-3** 查询旧事务的详细信息\n\n您可以连接到相关表并选择对您的调查有用的列。\n\
  \n与 `INNODB_TRX` 视图相关的是 InnoDB monitor 中的事务列表。\n\n\n\n## InnoDB 监控器\n\nInnoDB 监控器犹如\
  \ InnoDB 信息的“瑞士军刀”，其中也包含事务相关信息。InnoDB 监控器输出中的 `TRANSACTIONS` 部分专用于展示事务信息。此信息不仅包含事务列表，还包括历史列表长度。清单\
  \ 3-4 展示了 InnoDB 监控器的一个摘录，其中包含了事务部分的示例，该示例截取自紧接在之前 `INNODB_TRX` 视图输出之后。\n\n```\n\
  -- Investigation #4\nConnection 3> SHOW ENGINE INNODB STATUS\\G\n***************************\
  \ 1. row ***************************\nType: InnoDB\nName:\nStatus:\n=====================================\n\
  2020-06-27 17:46:36 0x5784 INNODB MONITOR OUTPUT\n=====================================\n\
  Per second averages calculated from the last 20 seconds\n...\n\nTRANSACTIONS\n\n\
  Trx id counter 296814\nPurge done for trx's n:o < 296813 undo n:o < 0 state: running\
  \ but idle\nHistory list length 1\nLIST OF TRANSACTIONS FOR EACH SESSION:\n---TRANSACTION\
  \ 283598406541472, not started\n0 lock struct(s), heap size 1136, 0 row lock(s)\n\
  ---TRANSACTION 283598406540640, not started\n0 lock struct(s), heap size 1136, 0\
  \ row lock(s)\n---TRANSACTION 283598406539808, not started\n0 lock struct(s), heap\
  \ size 1136, 0 row lock(s)\n---TRANSACTION 283598406538976, not started\n0 lock\
  \ struct(s), heap size 1136, 0 row lock(s)\n---TRANSACTION 296813, ACTIVE 26 sec\
  \ fetching rows\nmysql tables in use 1, locked 1\n15 lock struct(s), heap size 1136,\
  \ 2333 row lock(s), undo log entries 1160\nMySQL thread id 53, OS thread handle\
  \ 23748, query id 56574 localhost ::1 root User sleep\nUPDATE world.city SET Population\
  \ = Population + MOD(ID, 2) + SLEEP(0.01)\n...\n```\n清单 3-4\n来自 InnoDB 监控器的事务信息\n\
  \n`TRANSACTIONS` 部分的顶部显示了当前的事务 ID 计数器值，随后是关于哪些撤销日志（undo logs）已被清除的信息。它显示事务 ID 小于\
  \ 296813 的撤销日志已被清除。此清除操作越滞后，该部分第三行的历史列表长度值就越大。从 InnoDB 监控器输出中读取历史列表长度是获取历史列表长度的传统方法。在下一节中，将展示当用于监控目的时，如何以更好的方式获取该值。\n\
  \n该部分的其余内容是一个事务列表。请注意，虽然输出生成时包含与在 `INNODB_TRX` 中发现的相同的两个活动事务，但事务列表只包含一个活动事务（即执行\
  \ `UPDATE` 语句的那个事务）。在 MySQL 5.7 及更高版本中，只读、非锁定事务不包含在 InnoDB 监控器的事务列表中。因此，如果你需要包含所有活动事务，最好使用\
  \ `INNODB_TRX` 视图。\n\n如前所述，有另一种方法可以获取历史列表长度。为此你需要使用 InnoDB 指标（metrics）。\n\n## `INNODB_METRICS`\
  \ 与 `sys.metrics`\n\nInnoDB 监控器报告对于数据库管理员了解 InnoDB 内部概况很有用，但对于监控而言，它不如其他方式方便，因为它需要进行解析才能提取出监控可用的数据。本章前面你已经看到如何从\
  \ `information_schema.INNODB_TRX` 视图获取事务信息，但像历史列表长度这样的指标又该如何获取呢？\n\nInnoDB 指标系统包含多个显示在\
  \ `information_schema.INNODB_METRICS` 视图中的事务信息指标。这些指标都位于 `transaction` 子系统中。清单 3-5\
  \ 展示了事务指标的列表、它们是否默认启用，以及解释该指标测量内容的简要注释。\n\n```\n-- Connection   Processlist ID \
  \  Thread ID   Event ID\n-- --------------------------------------------------\n\
  --          1               56         166          6\n-- Connection 1\nConnection\
  \ 1> SELECT NAME, COUNT, STATUS, COMMENT\nFROM information_schema.INNODB_METRICS\n\
  WHERE SUBSYSTEM = 'transaction'\\G\n*************************** 1. row ***************************\n\
  NAME: trx_rw_commits\nCOUNT: 0\nSTATUS: disabled\nCOMMENT: Number of read-write\
  \ transactions  committed\n*************************** 2. row ***************************\n\
  NAME: trx_ro_commits\nCOUNT: 0\nSTATUS: disabled\nCOMMENT: Number of read-only transactions\
  \ committed\n*************************** 3. row ***************************\nNAME:\
  \ trx_nl_ro_commits\nCOUNT: 0\nSTATUS: disabled\nCOMMENT: Number of non-locking\
  \ auto-commit read-only transactions committed\n*************************** 4. row\
  \ ***************************\nNAME: trx_commits_insert_update\nCOUNT: 0\nSTATUS:\
  \ disabled\nCOMMENT: Number of transactions committed with inserts and updates\n\
  *************************** 5. row ***************************\nNAME: trx_rollbacks\n\
  COUNT: 0\nSTATUS: disabled\nCOMMENT: Number of transactions rolled back\n***************************\
  \ 6. row ***************************\nNAME: trx_rollbacks_savepoint\nCOUNT: 0\n\
  STATUS: disabled\nCOMMENT: Number of transactions rolled back to savepoint\n***************************\
  \ 7. row ***************************\nNAME: trx_rollback_active\nCOUNT: 0\nSTATUS:\
  \ disabled\nCOMMENT: Number of resurrected active transactions rolled back\n***************************\
  \ 8. row ***************************\nNAME: trx_active_transactions\nCOUNT: 0\n\
  STATUS: disabled\nCOMMENT: Number of active transactions\n***************************\
  \ 9. row ***************************\nNAME: trx_on_log_no_waits\nCOUNT: 0\nSTATUS:\
  \ disabled\nCOMMENT: Waits for redo during transaction commits\n***************************\
  \ 10. row ***************************\nNAME: trx_on_log_waits\nCOUNT: 0\nSTATUS:\
  \ disabled\nCOMMENT: Waits for redo during transaction commits\n***************************\
  \ 11. row ***************************\nNAME: trx_on_log_wait_loops\nCOUNT: 0\nSTATUS:\
  \ disabled\nCOMMENT: Waits for redo during transaction commits\n***************************\
  \ 12. row ***************************\nNAME: trx_rseg_history_len\nCOUNT: 9\nSTATUS:\
  \ enabled\nCOMMENT: Length of the TRX_RSEG_HISTORY list\n***************************\
  \ 13. row ***************************\nNAME: trx_undo_slots_used\nCOUNT: 0\nSTATUS:\
  \ disabled\nCOMMENT: Number of undo slots used\n*************************** 14.\
  \ row ***************************\nNAME: trx_undo_slots_cached\nCOUNT: 0\nSTATUS:\
  \ disabled\nCOMMENT: Number of undo slots cached\n*************************** 15.\
  \ row ***************************\nNAME: trx_rseg_current_size\nCOUNT: 0\nSTATUS:\
  \ disabled\nCOMMENT: Current rollback segment size in pages\n15 rows in set (0.0012\
  \ sec)\n```\n清单 3-5\n与事务相关的 InnoDB 指标\n\n\n### InnoDB 事务监控指标\n\n其中最重要的指标是 `trx_rseg_history_len`，即历史列表长度。这也是默认启用的唯一指标。与提交和回滚相关的指标可用于确定你有多少读写、只读和非锁定只读事务，以及它们的提交和回滚频率。频繁的回滚表明存在问题。如果你怀疑重做日志是瓶颈，可以使用\
  \ `trx_on_log_%` 系列指标来衡量在事务提交期间有多少事务在等待重做日志。\n\n> **提示**：你可以使用 `innodb_monitor_enable`\
  \ 选项启用 InnoDB 指标，并使用 `innodb_monitor_disable` 禁用它们。这可以动态完成。\n\n另一种方便查询 InnoDB 指标的方法是使用\
  \ `sys.metrics` 视图，该视图也包含了全局状态变量。列表 [3-6] 展示了使用 `sys.metrics` 视图获取当前值及指标是否启用的示例。\n\
  \n```sql\n-- Connection   Processlist ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
  --          1               52         125          6\n-- Connection 1\nConnection\
  \ 1> SELECT Variable_name AS Name,\n    Variable_value AS Value,\n    Enabled\n\
  \    FROM sys.metrics\n    WHERE Type = 'InnoDB Metrics - transaction';\n+---------------------------+-------+---------+\n\
  | Name                      | Value | Enabled |\n+---------------------------+-------+---------+\n\
  | trx_active_transactions   | 0     | NO      |\n| trx_commits_insert_update | 0\
  \     | NO      |\n| trx_nl_ro_commits         | 0     | NO      |\n| trx_on_log_no_waits\
  \       | 0     | NO      |\n| trx_on_log_wait_loops     | 0     | NO      |\n|\
  \ trx_on_log_waits          | 0     | NO      |\n| trx_ro_commits            | 0\
  \     | NO      |\n| trx_rollback_active       | 0     | NO      |\n| trx_rollbacks\
  \             | 0     | NO      |\n| trx_rollbacks_savepoint   | 0     | NO    \
  \  |\n| trx_rseg_current_size     | 0     | NO      |\n| trx_rseg_history_len  \
  \    | 16    | YES     |\n| trx_rw_commits            | 0     | NO      |\n| trx_undo_slots_cached\
  \     | 0     | NO      |\n| trx_undo_slots_used       | 0     | NO      |\n+---------------------------+-------+---------+\n\
  15 rows in set (0.0089 sec)\n```\n*列表 3-6 使用 sys.metrics 视图获取事务指标*\n\n这显示历史列表长度为\
  \ 16，这是一个很好的低值，因此来自撤销日志的开销几乎为零。其余的指标均被禁用。\n\n### 总结\n\n本章介绍了如何获取有关 InnoDB 事务的信息。详细信息的主要来源是信息模式中的\
  \ `INNODB_TRX` 视图，它包含诸如事务启动时间、锁定和修改的行数等详细信息。你可以选择性地连接性能模式表以获取有关事务的更多信息。\n\n你也可以使用\
  \ InnoDB 监视器获取有关锁定事务的信息；然而，通常更推荐使用 `INNODB_TRX` 视图。如果你在寻找更高级别的聚合统计信息，可以使用 `information_schema.INNODB_METRICS`\
  \ 视图或 `sys.metrics` 视图。最常用的指标是 `trx_rseg_history_len`，它显示了历史列表长度。\n\n至此，关于事务信息的讨论都是针对所有事务或单个事务的聚合统计。如果你想深入了解一个事务具体完成了哪些工作，则需要使用性能模式，这将在下一章中讨论。\n\
  \n# 4. 性能模式中的事务\n\n性能模式在 MySQL 5.7 及更高版本中支持事务监控，并且在 MySQL 8 中默认启用。除了与 XA 事务和保存点相关的事务详情外，性能模式中可用的许多信息都可以从信息模式的\
  \ `INNODB_TRX` 视图中获得。然而，性能模式的事务事件有一个优势，即你可以将它们与其他事件类型（例如语句）结合，以获取有关事务所做工作的信息。这是本章的主要重点。此外，性能模式提供了包含聚合统计信息的汇总表。\n\
  \n\n## `事务事件及其语句`\n\n在性能模式中，用于调查事务的主要表是事务事件表。有三张表用于记录当前或最近的事务：`events_transactions_current`、`events_transactions_history`\
  \ 和 `events_transactions_history_long`。它们的列如表 4-1 所概括。\n\n### 表 4-1：非汇总事务事件表的列\n\
  \n| 列/数据类型 | 描述 |\n| --- | --- |\n| `THREAD_ID bigint unsigned` | 执行事务的连接的性能模式线程\
  \ ID。 |\n| `EVENT_ID bigint unsigned` | 事件的 ID。您可以使用事件 ID 对线程的事件进行排序，或作为外键与线程 ID\
  \ 一起在事件表之间关联。 |\n| `END_EVENT_ID bigint unsigned` | 事务完成时的事件 ID。如果事件 ID 为 `NULL`，则事务仍在进行中。\
  \ |\n| `EVENT_NAME varchar(128)` | 事务事件名称。目前此列的值始终为 `transaction`。 |\n| `STATE enum`\
  \ | 事务的状态。可能的值有 `ACTIVE`、`COMMITTED` 和 `ROLLED BACK`。 |\n| `TRX_ID bigint unsigned`\
  \ | 目前未使用，将始终为 `NULL`。 |\n| `GTID varchar(64)` | 事务的 GTID。当 GTID 是自动确定的（通常情况）时，返回\
  \ `AUTOMATIC`。这与执行事务的连接的 `gtid_next` 变量相同。 |\n| `XID_FORMAT_ID int` | 对于 XA 事务，格式\
  \ ID。 |\n| `XID_GTRID varchar(130)` | 对于 XA 事务，gtrid 值。 |\n| `XID_BQUAL varchar(130)`\
  \ | 对于 XA 事务，bqual 值。 |\n| `XA_STATE varchar(64)` | 对于 XA 事务，事务的状态。可以是 `ACTIVE`、`IDLE`、`PREPARED`、`ROLLED\
  \ BACK` 或 `COMMITTED`。 |\n| `SOURCE varchar(64)` | 记录事件的源代码文件和行号。 |\n| `TIMER_START\
  \ bigint unsigned` | 事件开始时的计时，单位为皮秒。 |\n| `TIMER_END bigint unsigned` | 事件完成时的计时，单位为皮秒。如果事务尚未完成，该值对应于当前时间。\
  \ |\n| `TIMER_WAIT bigint unsigned` | 执行事件所花费的总时间，单位为皮秒。如果事件尚未完成，该值对应于事务已活跃的时间。\
  \ |\n| `ACCESS_MODE enum` | 事务是只读模式（`READ ONLY`）还是读写模式（`READ WRITE`）。 |\n| `ISOLATION_LEVEL\
  \ varchar(64)` | 事务的隔离级别。 |\n| `AUTOCOMMIT enum` | 事务是否基于 `autocommit` 选项自动提交，以及是否已启动显式事务。可能的值是\
  \ `NO` 和 `YES`。 |\n| `NUMBER_OF_SAVEPOINTS bigint unsigned` | 事务中创建的保存点数量。 |\n|\
  \ `NUMBER_OF_ROLLBACK_TO_SAVEPOINT bigint unsigned` | 事务回滚到保存点的次数。 |\n| `NUMBER_OF_RELEASE_SAVEPOINT\
  \ bigint unsigned` | 事务释放保存点的次数。 |\n| `OBJECT_INSTANCE_BEGIN bigint unsigned` |\
  \ 此字段目前未使用，始终设置为 `NULL`。 |\n| `NESTING_EVENT_ID bigint unsigned` | 触发该事务的事件的 ID。\
  \ |\n| `NESTING_EVENT_TYPE enum` | 触发该事务的事件的类型。 |\n\n## 使用事务事件表\n\n如果您在使用 XA 事务，当您需要恢复事务时，事务事件表非常有用，因为格式\
  \ ID、gtrid 和 bqual 值可以直接从这些表中获得，这与 `XA RECOVER` 语句不同，后者需要解析输出。同样地，如果您使用保存点，您可以获取关于保存点使用情况的统计信息。除此之外，其中的信息与\
  \ `information_schema.INNODB_TRX` 视图中可用的信息非常相似。\n\n关于使用 `events_transactions_current`\
  \ 表的示例，您可以如清单 4-1 所示启动两个事务。\n\n```\n-- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1               57         140          6\n--          2           \
  \    58         141          6\n-- 连接 1\nConnection 1> START TRANSACTION;\nQuery\
  \ OK, 0 rows affected (0.0004 sec)\nConnection 1> UPDATE world.city SET Population\
  \ = 5200000 WHERE ID = 130;\nConnection 1> UPDATE world.city SET Population = 4900000\
  \ WHERE ID = 131;\nConnection 1> UPDATE world.city SET Population = 2400000 WHERE\
  \ ID = 132;\nConnection 1> UPDATE world.city SET Population = 2000000 WHERE ID =\
  \ 133;\n-- 连接 2\nConnection 2> XA START 'abc', 'def', 1;\nConnection 2> UPDATE world.city\
  \ SET Population = 900000 WHERE ID = 3805;\n清单 4-1\n示例事务\n```\n\n第一个事务是更新多个城市人口的普通事务，第二个事务是一个\
  \ XA 事务。清单 4-2 展示了 `events_transactions_current` 表列出当前活动事务的示例输出。\n\n```\n-- 调查 #1\n\
  -- 连接 3\nConnection 3> SELECT *\nFROM performance_schema.events_transactions_current\n\
  WHERE state = 'ACTIVE'\\G\n*************************** 1\\. row ***************************\n\
  THREAD_ID: 140\nEVENT_ID: 8\nEND_EVENT_ID: NULL\nEVENT_NAME: transaction\nSTATE:\
  \ ACTIVE\nTRX_ID: NULL\nGTID: AUTOMATIC\nXID_FORMAT_ID: NULL\nXID_GTRID: NULL\n\
  XID_BQUAL: NULL\nXA_STATE: NULL\nSOURCE: transaction.cc:209\nTIMER_START: 72081362554600000\n\
  TIMER_END: 72161455792800000\nTIMER_WAIT: 80093238200000\nACCESS_MODE: READ WRITE\n\
  ISOLATION_LEVEL: REPEATABLE READ\nAUTOCOMMIT: NO\nNUMBER_OF_SAVEPOINTS: 0\nNUMBER_OF_ROLLBACK_TO_SAVEPOINT:\
  \ 0\nNUMBER_OF_RELEASE_SAVEPOINT: 0\nOBJECT_INSTANCE_BEGIN: NULL\nNESTING_EVENT_ID:\
  \ 7\nNESTING_EVENT_TYPE: STATEMENT\n*************************** 2\\. row ***************************\n\
  THREAD_ID: 141\nEVENT_ID: 8\nEND_EVENT_ID: NULL\nEVENT_NAME: transaction\nSTATE:\
  \ ACTIVE\nTRX_ID: NULL\nGTID: AUTOMATIC\nXID_FORMAT_ID: 1\nXID_GTRID: abc\nXID_BQUAL:\
  \ def\nXA_STATE: ACTIVE\nSOURCE: transaction.cc:209\nTIMER_START: 72081766957700000\n\
  TIMER_END: 72161455799300000\nTIMER_WAIT: 79688841600000\nACCESS_MODE: READ WRITE\n\
  ISOLATION_LEVEL: REPEATABLE READ\nAUTOCOMMIT: NO\nNUMBER_OF_SAVEPOINTS: 0\nNUMBER_OF_ROLLBACK_TO_SAVEPOINT:\
  \ 0\nNUMBER_OF_RELEASE_SAVEPOINT: 0\nOBJECT_INSTANCE_BEGIN: NULL\nNESTING_EVENT_ID:\
  \ 7\nNESTING_EVENT_TYPE: STATEMENT\n2 rows in set (0.0007 sec)\n清单 4-2\n使用 events_transactions_current\
  \ 表\n```\n\n第 1 行中的事务是一个常规事务，而第 2 行中的事务是一个 XA 事务。两个事务都是由一个语句启动的，这可以从嵌套事件类型看出。如果您想找到触发事务的语句，可以使用该信息来查询\
  \ `events_statements_history` 表，如下所示：\n\n```\n-- 调查 #2\nConnection 3> SELECT sql_text\n\
  FROM performance_schema.events_statements_history\nWHERE thread_id = 140\nAND event_id\
  \ = 7\\G\n*************************** 1\\. row ***************************\nsql_text:\
  \ start transaction\n1 row in set (0.0434 sec)\n```\n\n这表明由 `thread_id = 140` 执行的事务是使用\
  \ `START TRANSACTION` 语句启动的。由于 `events_statements_history` 表仅包含该连接的最后十条语句，无法保证启动事务的语句仍然在历史表中。如果您正在查看单语句事务，或者在\
  \ `autocommit` 禁用时查看第一条语句（当它仍在执行时），您将需要改为查询 `events_statements_current` 表。\n\n事务和语句之间的关系也反向成立。\n\
  \n\n\n### 使用 Performance Schema 监控和分析事务\n\n给定一个事务事件 ID 和线程 ID，您可以使用语句事件历史和当前表查询该事务最后执行的十条语句。清单\
  \ 4-3 展示了一个 `thread_id = 140` 且事务 `EVENT_ID = 8` 的示例（来自清单 4-2 的第 1 行），其中包含了启动事务的语句以及后续的所有语句。\n\
  \n```sql\n-- 调查 #4\nConnection 3> SET @thread_id = 140,\n@event_id = 8,\n@nesting_event_id\
  \ = 7;\nQuery OK, 0 rows affected (0.0007 sec)\n-- 调查 #6\nConnection 3> SELECT event_id,\
  \ sql_text,\nFORMAT_PICO_TIME(timer_wait) AS latency,\nIF(end_event_id IS NULL,\
  \ 'YES', 'NO') AS current\nFROM ((SELECT event_id, end_event_id,\ntimer_wait,\n\
  sql_text, nesting_event_id,\nnesting_event_type\nFROM performance_schema.events_statements_current\n\
  WHERE thread_id = @thread_id\n) UNION (\nSELECT event_id, end_event_id,\ntimer_wait,\n\
  sql_text, nesting_event_id,\nnesting_event_type\nFROM performance_schema.events_statements_history\n\
  WHERE thread_id = @thread_id\n)\n) events\nWHERE (nesting_event_type = 'TRANSACTION'\n\
  AND nesting_event_id = @event_id)\nOR event_id = @nesting_event_id\nORDER BY event_id\
  \ DESC\\G\n*************************** 1. row ***************************\nevent_id:\
  \ 12\nsql_text: UPDATE world.city SET Population = 2000000 WHERE ID = 133\nlatency:\
  \ 384.00 us\ncurrent: NO\n*************************** 2. row ***************************\n\
  event_id: 11\nsql_text: UPDATE world.city SET Population = 2400000 WHERE ID = 132\n\
  latency: 316.20 us\ncurrent: NO\n*************************** 3. row ***************************\n\
  event_id: 10\nsql_text: UPDATE world.city SET Population = 4900000 WHERE ID = 131\n\
  latency: 299.30 us\ncurrent: NO\n*************************** 4. row ***************************\n\
  event_id: 9\nsql_text: UPDATE world.city SET Population = 5200000 WHERE ID = 130\n\
  latency: 176.95 ms\ncurrent: NO\n*************************** 5. row ***************************\n\
  event_id: 7\nsql_text: start transaction\nlatency: 223.20 us\ncurrent: NO\n5 rows\
  \ in set (0.0016 sec)\n清单 4-3\n查找事务中最后执行的十条语句\n```\n\n子查询（派生表）从 `events_statements_current`\
  \ 和 `events_statements_history` 表中查找该线程的所有语句事件。因为可能有一条针对该事务的正在进行的语句，所以必须包含当前事件。语句被过滤为要么是事务的子语句，要么是事务的嵌套事件（`event_id\
  \ = 7`）。这将包括从启动事务的语句开始的所有语句。如果有一条正在进行的语句，则最多会包含 11 条语句，否则最多包含十条。\n\n`end_event_id`\
  \ 用于确定语句是否正在执行中，并且语句按照 `event_id` 倒序排列，因此最近的语句在第 1 行，最旧的（`START TRANSACTION` 语句）在第\
  \ 5 行。\n\n此类查询不仅可用于调查仍在执行查询的事务。当您遇到一个空闲事务并想了解该事务在被遗弃之前做了什么时，它也非常有用。另一个查找活动事务的相关方法是使用\
  \ `sys.session` 视图，该视图利用 `events_transactions_current` 表来包含每个连接的事务状态信息。清单 4-4 展示了一个查询活动事务的示例，其中排除了执行查询的连接对应的行。\n\
  \n```sql\n-- 调查 #7\nConnection 3> SELECT *\nFROM sys.session\nWHERE trx_state =\
  \ 'ACTIVE'\nAND conn_id != CONNECTION_ID()\\G\n*************************** 1. row\
  \ ***************************\nthd_id: 140\nconn_id: 57\nuser: mysqlx/worker\ndb:\
  \ NULL\ncommand: Sleep\nstate: NULL\ntime: 449\ncurrent_statement: UPDATE world.city\
  \ SET Population = 2000000 WHERE ID = 133\nstatement_latency: NULL\nprogress: NULL\n\
  lock_latency: 111.00 us\nrows_examined: 1\nrows_sent: 0\nrows_affected: 1\ntmp_tables:\
  \ 0\ntmp_disk_tables: 0\nfull_scan: NO\nlast_statement: UPDATE world.city SET Population\
  \ = 2000000 WHERE ID = 133\nlast_statement_latency: 384.00 us\ncurrent_memory: 228.31\
  \ KiB\nlast_wait: NULL\nlast_wait_latency: NULL\nsource: NULL\ntrx_latency: 7.48\
  \ min\ntrx_state: ACTIVE\ntrx_autocommit: NO\npid: 30936\nprogram_name: mysqlsh\n\
  *************************** 2. row ***************************\nthd_id: 141\nconn_id:\
  \ 58\nuser: mysqlx/worker\ndb: NULL\ncommand: Sleep\nstate: NULL\ntime: 449\ncurrent_statement:\
  \ UPDATE world.city SET Population = 900000 WHERE ID = 3805\nstatement_latency:\
  \ NULL\nprogress: NULL\nlock_latency: 387.00 us\nrows_examined: 1\nrows_sent: 0\n\
  rows_affected: 1\ntmp_tables: 0\ntmp_disk_tables: 0\nfull_scan: NO\nlast_statement:\
  \ UPDATE world.city SET Population = 900000 WHERE ID = 3805\nlast_statement_latency:\
  \ 49.39 ms\ncurrent_memory: 70.14 KiB\nlast_wait: NULL\nlast_wait_latency: NULL\n\
  source: NULL\ntrx_latency: 7.48 min\ntrx_state: ACTIVE\ntrx_autocommit: NO\npid:\
  \ 30936\nprogram_name: mysqlsh\n2 rows in set (0.0422 sec)\n清单 4-4\n使用 sys.session\
  \ 查找活动事务\n```\n\n这表明第一行中的事务已活跃超过 7 分钟，并且距离上次查询执行已有 449 秒（7.5 分钟）（您的值会不同）。`last_statement`\
  \ 可用于确定连接最后执行的查询。这是一个被遗弃事务的示例，它会阻止 InnoDB 清除其 undo 日志。被遗弃事务最常见的原因是数据库管理员交互式启动了一个事务后分心了，或者\
  \ `autocommit` 被禁用但没有意识到事务已经启动。\n\n#### 注意\n\n如果您禁用了 `autocommit`，请务必在工作结束时提交或回滚。一些连接器默认禁用\
  \ `autocommit`，因此请注意您的应用程序可能未使用服务器默认设置。\n\n您可以回滚事务以避免更改任何数据（如果您使用 MySQL Shell 脚本来重现此示例，在提示输入下一个调查的答案时直接按回车键即可自动回滚）。对于第一个（普通）事务：\n\
  \n```sql\n-- Connection 1\nConnection 1> ROLLBACK;\nQuery OK, 0 rows affected (0.0303\
  \ sec)\n```\n\n对于 XA 事务：\n\n```sql\n-- Connection 2\nConnection 2> XA END 'abc',\
  \ 'def', 1;\nQuery OK, 0 rows affected (0.0002 sec)\nConnection 2> XA ROLLBACK 'abc',\
  \ 'def', 1;\nQuery OK, 0 rows affected (0.0308 sec)\n```\n\nPerformance Schema 表用于分析事务的另一种方法是利用汇总表来获取聚合数据。\n\
  \n\n## `事务摘要表`\n\n与语句摘要表可用于获取已执行语句的报告类似，事务摘要表可用于分析事务的使用情况。虽然它们不如语句摘要表那么有用，但确实能提供关于哪些连接和账户以不同方式使用事务的洞察。\n\
  \n有五个事务摘要表，按全局、账户、主机、线程或用户对数据进行分组。所有摘要表也按事件名称分组，但由于目前只有一个事务事件（`transaction`），这是一个无操作。这些表是：\n\
  \n*   `events_transactions_summary_global_by_event_name`：所有事务的聚合。此表中只有一行。\n*   `events_transactions_summary_by_account_by_event_name`：按用户名和主机名分组的事务。\n\
  *   `events_transactions_summary_by_host_by_event_name`：按账户的主机名分组的事务。\n*   `events_transactions_summary_by_thread_by_event_name`：按线程分组的事务。仅包含当前存在的线程。\n\
  *   `events_transactions_summary_by_user_by_event_name`：按账户的用户名部分分组的事件。\n\n每个表都包含事务统计数据所分组依据的列，以及三组列：总计、读写事务和只读事务。对于这三组列中的每一组，都有事务总数以及总计、最小、平均和最大延迟。清单\
  \ 4-5 展示了来自 `events_transactions_summary_global_by_event_name` 表的数据示例。\n\n```\n\
  -- Connection   Processlist ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
  --          1               60         143          6\n-- Connection 1\nConnection\
  \ 1> SELECT *\nFROM performance_schema.events_transactions_summary_global_by_event_name\\\
  G\n*************************** 1\\. row ***************************\nEVENT_NAME:\
  \ transaction\nCOUNT_STAR: 40485\nSUM_TIMER_WAIT: 90259064465300000\nMIN_TIMER_WAIT:\
  \ 4800000\nAVG_TIMER_WAIT: 2229444500000\nMAX_TIMER_WAIT: 62122342944500000\nCOUNT_READ_WRITE:\
  \ 40483\nSUM_TIMER_READ_WRITE: 90230783742700000\nMIN_TIMER_READ_WRITE: 4800000\n\
  AVG_TIMER_READ_WRITE: 2228856100000\nMAX_TIMER_READ_WRITE: 62122342944500000\nCOUNT_READ_ONLY:\
  \ 2\nSUM_TIMER_READ_ONLY: 28280722600000\nMIN_TIMER_READ_ONLY: 9561820600000\nAVG_TIMER_READ_ONLY:\
  \ 14140361300000\nMAX_TIMER_READ_ONLY: 18718902000000\n1 row in set (0.0007 sec)\n\
  Listing 4-5\nThe events_transactions_summary_global_by_event_name table\n```\n\n\
  当您查看输出时，事务的数量之多，尤其是读写事务的数量之多，可能会让您感到惊讶。请记住，当查询 InnoDB 表时，即使您没有显式指定，一切也都是一个事务。因此，即使是查询单行的简单\
  \ `SELECT` 语句也算作一个事务。关于读写事务和只读事务之间的分布，Performance Schema 仅在您显式将其启动为只读时才认为事务是只读的。\n\
  \n```\nSTART TRANSACTION READ ONLY;\n```\n\n当 InnoDB 确定一个自动提交的单语句事务可以被视为只读事务时，这在\
  \ Performance Schema 中仍然计入读写统计。\n\n## `总结`\n\n本章介绍了 Performance Schema 中与事务相关的表，并展示了如何与其他表进行连接。首先讨论了三个每个事务事件一行的表：`events_transactions_current`、`events_transactions_history`\
  \ 和 `events_transactions_history_long`，然后使用它们连接到语句事件表，以获取事务中最近执行的语句。最后介绍了事务摘要表。\n\
  \n您现在已经了解了监控锁和事务的最重要资源，是时候深入了解锁的细节了。首先，您将学习锁访问级别。\n\n# 5. 锁访问级别\n\n在介绍锁的第一章中，没有提及锁的工作原理。通过只允许一次一个查询访问，无论将要完成何种工作，都可以在数据库中实现锁定。然而，这将非常低效。\n\
  \n沿用交通信号灯的类比，另一种方法是基于将要完成的工作来授予访问权限。交通信号灯不仅一次允许一辆车进入十字路口，而是允许所有朝同一方向行驶的车辆进入。同样，在数据库中，您需要区分共享（读）和独占（写）访问。访问级别正如其名称所示。共享锁允许其他连接也获取共享锁。这是最宽松的锁访问级别。独占锁只允许该一个连接获取锁。共享锁也称为读锁，独占锁也称为写锁。\n\
  \n> 注意\n> 锁访问级别有时也称为锁类型，但由于这可能与锁粒度（也常称为类型）混淆，此处使用术语锁访问级别。\n\nMySQL 还有一个称为意向锁的概念，用于指定事务的意向。意向锁可以是共享的或独占的。\n\
  \n本章的其余部分将更详细地介绍共享锁和独占锁以及意向锁。\n\n\n## 共享锁\n\n当一个线程需要保护某个资源但并不打算修改它时，可以使用共享锁来防止其他线程修改该资源，同时仍然允许它们访问同一资源。这是最常用的访问级别。\n\
  \n每当有语句从表中选取数据时，MySQL 会对查询涉及的表加共享锁。对于数据锁，其工作机制则不同，因为 InnoDB 在读取行时通常不会获取共享锁。这种情况仅在显式请求共享锁时、处于\
  \ `SERIALIZABLE` 事务隔离级别时，或工作流有要求时（例如涉及外键）才会发生。\n\n你可以通过添加 `FOR SHARE` 或其同义词 `LOCK\
  \ IN SHARE MODE` 来显式请求对查询访问的行加共享锁，如代码清单 5-1 所示。\n\n```\n-- 连接   进程列表 ID   线程 ID\
  \   事件 ID\n-- --------------------------------------------------\n--          1\
  \               36          80          6\n-- 连接 1\nConnection 1> START TRANSACTION;\n\
  Query OK, 0 rows affected (0.0003 sec)\nConnection 1> SELECT * FROM world.city WHERE\
  \ ID = 130 FOR SHARE;\n+-----+--------+-------------+-----------------+------------+\n\
  | ID  | Name   | CountryCode | District        | Population |\n+-----+--------+-------------+-----------------+------------+\n\
  | 130 | Sydney | AUS         | New South Wales |    3276207 |\n+-----+--------+-------------+-----------------+------------+\n\
  1 row in set (0.0047 sec)\nConnection 1> SELECT object_type, object_schema, object_name,\n\
  lock_type, lock_duration, lock_status\nFROM performance_schema.metadata_locks\n\
  WHERE OWNER_THREAD_ID = PS_CURRENT_THREAD_ID()\nAND OBJECT_SCHEMA  'performance_schema'\\\
  G\n*************************** 1\\. row ***************************\nobject_type:\
  \ TABLE\nobject_schema: world\nobject_name: city\nlock_type: SHARED_READ\nlock_duration:\
  \ TRANSACTION\nlock_status: GRANTED\n1 row in set (0.0005 sec)\nConnection 1> SELECT\
  \ engine, object_schema, object_name,\nlock_type, lock_mode, lock_status\nFROM performance_schema.data_locks\n\
  WHERE THREAD_ID = PS_CURRENT_THREAD_ID()\\G\n*************************** 1\\. row\
  \ ***************************\nengine: INNODB\nobject_schema: world\nobject_name:\
  \ city\nlock_type: TABLE\nlock_mode: IS\nlock_status: GRANTED\n***************************\
  \ 2\\. row ***************************\nengine: INNODB\nobject_schema: world\nobject_name:\
  \ city\nlock_type: RECORD\nlock_mode: S,REC_NOT_GAP\nlock_status: GRANTED\n2 rows\
  \ in set (0.0005 sec)\nmysql> ROLLBACK;\nQuery OK, 0 rows affected (0.0004 sec)\n\
  代码清单 5-1\n获取共享锁的示例\n```\n\n在查询 `metadata_locks` 表时，Performance Schema 表自身的锁会被排除，因为它们是用于调查查询本身，而非之前的查询。此处，`world.city`\
  \ 表以及主键（`ID` 列）等于 130 的记录上都加了共享锁。它们是共享锁这一点，可以从 `metadata_locks` 表中 `lock_type` 列的值为\
  \ `SHARED_READ`，以及 `data_locks` 表第二行 `lock_mode` 列中的 `S` 看出来。`data_locks` 表第一行的\
  \ `IS` 值表示这是一个共享意向锁，稍后将更详细地讨论。\n\n虽然共享锁确实允许其他也使用共享锁的查询继续执行，但它们会阻止获取排他锁的尝试。\n\n##\
  \ 排他锁\n\n排他锁是共享锁的对应物。它们确保在锁持有期间，只有被授予排他锁的线程才能访问资源。由于排他锁用于确保一次只有一个线程修改资源，因此它们也被称为写锁。\n\
  \n排他锁主要通过数据定义语言（DDL）语句（如 `ALTER TABLE`）以及在使用数据操作语言（DML）语句（如 `UPDATE` 和 `DELETE`）修改数据时获取。获取排他锁以及锁表中数据的示例可以在代码清单\
  \ 5-2 中找到。\n\n```\n-- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1               38          84          6\n-- 连接 1\nConnection 1> START\
  \ TRANSACTION;\nQuery OK, 0 rows affected (0.0003 sec)\nConnection 1> UPDATE world.city\n\
  SET Population = Population + 1\nWHERE ID = 130;\nQuery OK, 1 row affected (0.0028\
  \ sec)\nRows matched: 1  Changed: 1  Warnings: 0\nConnection 1> SELECT object_type,\
  \ object_schema, object_name,\nlock_type, lock_duration, lock_status\nFROM performance_schema.metadata_locks\n\
  WHERE OWNER_THREAD_ID = PS_CURRENT_THREAD_ID()\nAND OBJECT_SCHEMA  'performance_schema'\\\
  G\n*************************** 1\\. row ***************************\nobject_type:\
  \ TABLE\nobject_schema: world\nobject_name: city\nlock_type: SHARED_WRITE\nlock_duration:\
  \ TRANSACTION\nlock_status: GRANTED\n*************************** 2\\. row ***************************\n\
  object_type: TABLE\nobject_schema: world\nobject_name: country\nlock_type: SHARED_READ\n\
  lock_duration: TRANSACTION\nlock_status: GRANTED\n2 rows in set (0.0008 sec)\nConnection\
  \ 1> SELECT engine, object_schema, object_name,\nlock_type, lock_mode, lock_status\n\
  FROM performance_schema.data_locks\nWHERE THREAD_ID = PS_CURRENT_THREAD_ID()\\G\n\
  *************************** 1\\. row ***************************\nengine: INNODB\n\
  object_schema: world\nobject_name: city\nlock_type: TABLE\nlock_mode: IX\nlock_status:\
  \ GRANTED\n*************************** 2\\. row ***************************\nengine:\
  \ INNODB\nobject_schema: world\nobject_name: city\nlock_type: RECORD\nlock_mode:\
  \ X,REC_NOT_GAP\nlock_status: GRANTED\n2 rows in set (0.0005 sec)\nmysql> ROLLBACK;\n\
  Query OK, 0 rows affected (0.3218 sec)\n代码清单 5-2\n获取排他锁的示例\n```\n\n该示例的大部分内容与获取共享锁的示例相似，但也有一些令人意外之处。首先看\
  \ `data_locks` 表，它显示了表上有一个排他插入意向（`IX`）锁，以及一个排他（`X`）记录锁。这符合预期。\n\n情况在 `metadata_locks`\
  \ 表中变得更加复杂，现在有两个表锁：`city` 表上的 `SHARED_WRITE` 锁和 `country` 表上的 `SHARED_READ` 锁。一个锁如何能同时是共享的又是写锁？为什么修改了\
  \ `city` 表，其锁却是共享的？为什么 `country` 表上会有一个锁？\n\n`SHARED_WRITE` 锁表示数据被锁定用于更新，但元数据锁本身是共享的。原因在于表的元数据并未被修改，因此允许其他并发共享访问表元数据是安全的。请记住，`metadata_locks`\
  \ 表不关心在单个记录上持有的锁，因此从元数据的角度看，对 `city` 表的访问是共享的。\n\n`country` 表上的元数据锁来源于 `city` 表到\
  \ `country` 表的外键。该共享锁防止在事务仍在进行时对 `country` 的元数据进行修改，例如删除外键所涉及的列。第 10 章将更详细地讨论外键对锁定的影响。\n\
  \n## 意向锁\n\n在本章目前的两个例子中，都出现了意向锁。它们是什么？这是一种信号，表明 InnoDB 事务的意图，可以是共享的或排他的。起初这可能看起来是一种不必要的复杂设计，但意向锁允许\
  \ InnoDB 按顺序解析锁请求，而不会阻塞兼容的操作。细节超出了本次讨论的范围。重要的是你要知道意向锁的存在，这样当你看到它们时，就知道它们从何而来。\n\n\
  意向锁从更功能性的角度将在第 6 章介绍，而一个相关的概念——插入意向锁，则将与 InnoDB 锁一起在第 7 章中介绍。\n\n\n## 锁兼容性\n\n锁兼容性矩阵定义了两个锁请求是否会相互冲突。意向锁的引入使得这个问题比简单的“共享锁彼此兼容，排他锁与其他任何锁都不兼容”要复杂一些。\n\
  \n两种意向锁总是彼此兼容的。这意味着即使一个事务持有了意向排他锁，它也不会阻止另一个事务获取意向锁。然而，它会阻止另一个事务将其意向锁升级为完整的锁。表 5-1\
  \ 显示了锁类型之间的兼容性。共享锁用 `S` 表示，排他锁用 `X` 表示。意向锁带有 `I` 前缀，因此 `IS` 是意向共享锁，`IX` 是意向排他锁。\n\
  \n表 5-1: InnoDB 锁兼容性\n\n|   | 排他锁 (`X`) | 意向排他锁 (`IX`) | 共享锁 (`S`) | 意向共享锁 (`IS`)\
  \ |\n| --- | --- | --- | --- | --- |\n| **排他锁 (`X`)** | ✘ | ✘ | ✘ | ✘ |\n| **意向排他锁\
  \ (`IX`)** | ✘ | ✔ | ✘ | ✔ |\n| **共享锁 (`S`)** | ✘ | ✘ | ✔ | ✔ |\n| **意向共享锁 (`IS`)**\
  \ | ✘ | ✔ | ✔ | ✔ |\n\n在表中，勾号 ✔ 表示两个锁是兼容的，而叉号 ✘ 表示两个锁会相互冲突。意向锁唯一的冲突对象是排他锁和共享锁。排他锁与所有其他锁（包括两种意向锁类型）都冲突。共享锁仅与排他锁和意向排他锁冲突。\n\
  \n这听起来相当简单；然而，这只适用于两种相同类型的锁。当开始在 InnoDB 层面包含不同的锁时，情况就变得更复杂了，这将在第 8 章讨论锁争用时进行探讨。\n\
  \n这一切都是由 MySQL 和 InnoDB 自动处理的；但是，在调查锁问题时，你需要理解这些规则。\n\n## 本章小结\n\n本章讨论了 MySQL 锁的访问级别。锁可以是共享锁、排他锁、意向共享锁或意向排他锁。\n\
  \n共享锁用于对资源的读访问，并允许多个线程并发访问同一资源。另一方面，排他锁一次只允许单个线程访问资源，这使得更新资源变得安全。意向锁是 InnoDB 的一个概念，它允许\
  \ InnoDB 以更少的阻塞请求来解析锁请求。所有意向锁彼此兼容，即使是意向排他锁，但意向排他锁会阻塞共享锁。\n\n在本章以及前几章中，你还遇到了锁如何保护不同资源（如表和记录）的示例。在下一章中，我们将学习更多关于高级锁访问类型的知识，例如表锁和元数据锁。\n\
  \n# 6. 高级锁类型\n\n在上一章中，你学习了共享和排他访问级别。原则上，你可以构建一个只由一种锁类型组成的锁定系统，这种锁可以是共享的或排他的。但这将意味着它必须在实例级工作，因此在允许数据的并发读写访问方面表现会非常差。在本章和下一章中，你将学习根据它们所保护的资源的不同，存在多种锁类型。虽然这确实使锁定变得更加复杂，但它也允许更细粒度的锁，从而支持更高的并发性。\n\
  \n本章讨论 MySQL 中的高级锁，从用户级锁开始，遍历在 MySQL 层面（即存储引擎之上）处理的各种锁类型。其中包括刷新锁、元数据锁、显式和隐式表锁（这是一个例外，由\
  \ InnoDB 处理）、备份锁和日志锁。\n\n### 用户级锁\n\n用户级锁是一种显式锁类型，应用程序可以使用它来保护工作流等。它们不常用，但对于一些需要序列化访问的复杂任务可能很有用。所有用户锁都是排他锁，通过一个最长可达\
  \ 64 个字符的名称来获取。\n\n你可以使用一组函数来操作用户级锁：\n\n*   `GET_LOCK(name, timeout)`: 通过指定锁的名称来获取锁。第二个参数是\
  \ `timeout`，单位为秒；如果在指定时间内未获取到锁，函数返回 `0`。如果成功获取锁，返回值为 `1`。如果 `timeout` 为负数，函数将无限期等待锁变为可用。\n\
  *   `IS_FREE_LOCK(name)`: 检查指定的锁是否可用。如果锁可用，函数返回 `1`；如果不可用，返回 `0`。\n*   `IS_USED_LOCK(name)`:\
  \ 这是 `IS_FREE_LOCK()` 函数的反向操作。如果锁正在使用中（不可用），函数返回持有该锁的连接 ID；如果未使用（可用），返回 `NULL`。\n\
  *   `RELEASE_ALL_LOCKS()`: 释放连接持有的所有用户级锁。返回值是释放的锁的数量。\n*   `RELEASE_LOCK(name)`:\
  \ 释放提供的 `name` 的锁。如果锁被释放，返回值为 `1`；如果锁存在但不属于该连接，返回 `0`；如果锁不存在，返回 `NULL`。\n\n可以通过多次调用\
  \ `GET_LOCK()` 来获取多个锁。如果这样做，请小心确保所有用户都以相同的顺序获取锁，否则可能会发生死锁。如果发生死锁，将返回 `ER_USER_LOCK_DEADLOCK`\
  \ 错误（错误代码 3058）。清单 6-1 显示了一个这样的例子。\n\n```\n-- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              322         617          6\n--          2           \
  \   323         618          6\n-- 连接 1\nConnection 1> SELECT GET_LOCK('my_lock_1',\
  \ -1);\n+---------------------------+\n| GET_LOCK('my_lock_1', -1) |\n+---------------------------+\n\
  |                         1 |\n+---------------------------+\n1 row in set (0.0003\
  \ sec)\n-- 连接 2\nConnection 2> SELECT GET_LOCK('my_lock_2', -1);\n+---------------------------+\n\
  | GET_LOCK('my_lock_2', -1) |\n+---------------------------+\n|                \
  \         1 |\n+---------------------------+\n1 row in set (0.0003 sec)\nConnection\
  \ 2> SELECT GET_LOCK('my_lock_1', -1);\n-- 连接 1\nConnection 1> SELECT GET_LOCK('my_lock_2',\
  \ -1);\nERROR: 3058: Deadlock found when trying to get user-level lock; try rolling\
  \ back transaction/releasing locks and restarting lock acquisition.\n清单 6-1: 用户级锁的死锁\n\
  ```\n\n当连接 2 尝试获取 `my_lock_1` 锁时，该语句将阻塞，直到连接 1 尝试获取 `my_lock_2` 锁，从而触发死锁。如果你获取了多个锁，应该准备好处理死锁。请注意，对于用户级锁，死锁不会触发事务回滚。\n\
  \n已授予和待处理的用户级锁可以在 `performance_schema.metadata_locks` 表中找到，其中 `OBJECT_TYPE` 列设置为\
  \ `USER LEVEL LOCK`，如清单 6-2 所示。列出的锁假设系统状态与清单 6-1 中的死锁触发时相同。请注意，像 `OBJECT_INSTANCE_BEGIN`\
  \ 这样的值对你来说会有所不同，你必须将 `WHERE` 子句中的 `owner_thread_id` 改为匹配你清单 6-1 中的值。\n\n```\nSELECT\
  \ * FROM performance_schema.metadata_locks\nWHERE OBJECT_TYPE = 'USER LEVEL LOCK';\n\
  ```\n\n**清单 6-2:** 查询用户级锁\n\n\n### 用户级锁\n\n```sql\n-- 调查 #1\n-- 连接 3\nConnection\
  \ 3> SELECT *\nFROM performance_schema.metadata_locks\nWHERE object_type = 'USER\
  \ LEVEL LOCK'\nAND owner_thread_id IN (617, 618)\\G\n***************************\
  \ 1\\. row ***************************\nOBJECT_TYPE: USER LEVEL LOCK\nOBJECT_SCHEMA:\
  \ NULL\nOBJECT_NAME: my_lock_1\nCOLUMN_NAME: NULL\nOBJECT_INSTANCE_BEGIN: 2124404669104\n\
  LOCK_TYPE: EXCLUSIVE\nLOCK_DURATION: EXPLICIT\nLOCK_STATUS: GRANTED\nSOURCE: item_func.cc:5067\n\
  OWNER_THREAD_ID: 617\nOWNER_EVENT_ID: 8\n*************************** 2\\. row ***************************\n\
  OBJECT_TYPE: USER LEVEL LOCK\nOBJECT_SCHEMA: NULL\nOBJECT_NAME: my_lock_2\nCOLUMN_NAME:\
  \ NULL\nOBJECT_INSTANCE_BEGIN: 2124463901664\nLOCK_TYPE: EXCLUSIVE\nLOCK_DURATION:\
  \ EXPLICIT\nLOCK_STATUS: GRANTED\nSOURCE: item_func.cc:5067\nOWNER_THREAD_ID: 618\n\
  OWNER_EVENT_ID: 8\n*************************** 3\\. row ***************************\n\
  OBJECT_TYPE: USER LEVEL LOCK\nOBJECT_SCHEMA: NULL\nOBJECT_NAME: my_lock_1\nCOLUMN_NAME:\
  \ NULL\nOBJECT_INSTANCE_BEGIN: 2124463901088\nLOCK_TYPE: EXCLUSIVE\nLOCK_DURATION:\
  \ EXPLICIT\nLOCK_STATUS: PENDING\nSOURCE: item_func.cc:5067\nOWNER_THREAD_ID: 618\n\
  OWNER_EVENT_ID: 9\n3 rows in set (0.0015 sec)\n列表 6-2\n列出用户级锁\n```\n\n用户级锁的 `OBJECT_TYPE`\
  \ 是 `USER LEVEL LOCK`，锁持续时间是 `EXPLICIT`，因为需要用户或应用程序来释放锁。在第 1 行，性能模式线程 ID 为 `617`\
  \ 的连接已被授予 `my_lock_1` 锁，而在第 3 行，线程 ID `618` 正在等待（pending）该锁被授予。线程 ID `618` 也有一个已授予的锁，如第\
  \ 2 行所示。完成调查后，请记住释放锁，例如，先在连接 1 中执行 `SELECT RELEASE_ALL_LOCKS()`，然后在连接 2 中执行（当使用\
  \ MySQL Shell 的 `concurrency_book` 模块退出工作负载时，这会自动发生）。\n\n## 刷新锁\n\n下一类锁涉及非数据的表级锁。首先讨论的是刷新锁。\n\
  \n大多数参与过备份操作的人应该对刷新锁都很熟悉。当你使用 `FLUSH TABLES` 语句时就会获取它，其持续时间与语句执行时间相同，除非你添加了 `WITH\
  \ READ LOCK`，这种情况下会持有共享（读）锁，直到该锁被显式释放。在 `ANALYZE TABLE` 语句结束时也会触发一个隐式的表刷新。刷新锁是一种表级锁。使用\
  \ `FLUSH TABLES WITH READ LOCK` 获取的读锁将在后面关于显式表锁的部分讨论。\n\n刷新锁引发锁问题的一个常见原因是长时间运行的查询。只要有查询打开着某个表，`FLUSH\
  \ TABLES` 语句就无法刷新该表。这意味着，如果你在有一个使用一个或多个待刷新表的长时间运行查询正在执行时，又执行了 `FLUSH TABLES` 语句，那么该\
  \ `FLUSH TABLES` 语句将阻塞所有其他需要这些表中任何表的语句，直到锁情况得到解决。\n\n刷新锁受 `lock_wait_timeout` 设置的约束。如果获取锁的时间超过\
  \ `lock_wait_timeout` 秒，MySQL 将放弃该锁。如果 `FLUSH TABLES` 语句被杀死，同样适用。然而，由于 MySQL 的内部机制，一个更低级别的锁（称为表定义缓存（TDC）版本锁）有时在长时间运行的查询完成前无法释放。这意味着，确保锁问题得到解决的唯一方法是杀死长时间运行的查询，但请注意，如果该查询更改了许多行，回滚查询可能需要很长时间。\n\
  \n当围绕刷新锁发生锁争用时，`FLUSH TABLES` 语句和随后启动的查询都会将状态设置为“等待表刷新”。列表 6-3 显示了一个涉及三个查询的此类示例。如果你自己重现此场景（而不是使用\
  \ MySQL Shell `concurrency_book` 模块），则可以更改连接 1 中 `SLEEP()` 的参数，以便为自己留出更多时间完成该示例。\n\
  \n```sql\n-- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              375         691          6\n--          2           \
  \   376         692          6\n--          3              377         693     \
  \     6\n--          4              378         694          6\n-- 连接 1\nConnection\
  \ 1> SELECT city.*, SLEEP(3) FROM world.city WHERE ID = 130;\n-- 连接 2\nConnection\
  \ 2> FLUSH TABLES world.city;\n-- 连接 3\nConnection 3> SELECT * FROM world.city WHERE\
  \ ID = 201;\n-- 连接 4\n-- 查询 sys.session 以查看涉及锁情况的三个线程\nConnection 4> SELECT thd_id,\
  \ conn_id, state,\ncurrent_statement\nFROM sys.session\nWHERE current_statement\
  \ IS NOT NULL\nAND thd_id IN (691, 692, 693)\nORDER BY thd_id\\G\n***************************\
  \ 1\\. row ***************************\nthd_id: 691\nconn_id: 375\nstate: User sleep\n\
  current_statement: SELECT city.*, SLEEP(3) FROM world.city WHERE ID = 130\n***************************\
  \ 2\\. row ***************************\nthd_id: 692\nconn_id: 376\nstate: Waiting\
  \ for table flush\ncurrent_statement: FLUSH TABLES world.city\n***************************\
  \ 3\\. row ***************************\nthd_id: 693\nconn_id: 377\nstate: Waiting\
  \ for table flush\ncurrent_statement: SELECT * FROM world.city WHERE ID = 201\n\
  3 rows in set (0.0586 sec)\n列表 6-3\n等待刷新锁的示例\n```\n\n该示例使用了 `sys.session` 视图；也可以使用\
  \ `performance_schema.threads` 和 `SHOW PROCESSLIST` 获得类似结果。为了减少输出，使其仅包含与刷新锁讨论相关的查询，`WHERE`\
  \ 子句被设置为仅包含前三个连接的线程 ID。\n\n`conn_id = 375` 的连接正在执行一个使用 `world.city` 表的慢查询（使用了 `SLEEP(3)`\
  \ 来确保有足够的时间执行其他连接的语句）。同时，`conn_id = 376` 执行了针对 `world.city` 表的 `FLUSH TABLES` 语句。由于第一个查询仍然持有该表的打开状态（查询完成后才会释放），`FLUSH\
  \ TABLES` 语句最终会等待表刷新锁。最后，`conn_id = 377` 试图查询该表，因此必须等待 `FLUSH TABLES` 语句。\n\n另一种非数据表锁是元数据锁。\n\
  \n\n## 元数据锁\n\n元数据锁是 MySQL 中较新的锁类型之一。它们在 MySQL 5.5 中被引入，其目的是保护模式，使其在查询或事务依赖于模式保持不变时不被更改。元数据锁在表级别工作，但应将其视为与表锁独立的一种锁类型，因为它们并不保护表中的数据。\n\
  \n`SELECT` 语句和 `DML` 查询会获取共享元数据锁，而 `DDL` 语句则会获取排他锁。连接在首次使用表时获取该表的元数据锁，并一直保持该锁直到事务结束。在持有元数据锁期间，不允许其他连接更改该表的模式定义。然而，其他执行\
  \ `SELECT` 语句和 `DML` 语句的连接不受限制。通常，关于元数据锁最常见的陷阱是长时间运行的事务（可能处于空闲状态），这会阻止 `DDL` 语句开始执行。\n\
  \n如果遇到元数据锁冲突，您将在进程列表中看到查询状态设置为 \"Waiting for table metadata lock\"。包括设置查询在内的示例如清单\
  \ 6-4 所示。\n\n```\n-- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              428         768          6\n--          2           \
  \   429         769          6\n-- 连接 1\nConnection 1> START TRANSACTION;\nQuery\
  \ OK, 0 rows affected (0.0003 sec)\nConnection 1> SELECT * FROM world.city WHERE\
  \ ID = 130\\G\n*************************** 1. row ***************************\n\
  ID: 130\nName: Sydney\nCountryCode: AUS\nDistrict: New South Wales\nPopulation:\
  \ 3276207\n1 row in set (0.0006 sec)\n-- 连接 2\nConnection 2> OPTIMIZE TABLE world.city;\n\
  清单 6-4\n等待表元数据锁的示例\n```\n\n`连接 2` 被阻塞，处于此情况时，您可以查询 `sys.session` 或类似视图，如清单 6-5 所示。\n\
  \n```\n-- 调查 #1\n-- 连接 3\nConnection 3> SELECT thd_id, conn_id, state,\ncurrent_statement,\
  \ statement_latency,\nlast_statement, trx_state\nFROM sys.session\nWHERE conn_id\
  \ IN (428, 429)\nORDER BY conn_id\\G\n*************************** 1. row ***************************\n\
  thd_id: 768\nconn_id: 428\nstate: NULL\ncurrent_statement: SELECT * FROM world.city\
  \ WHERE ID = 130\nstatement_latency: NULL\nlast_statement: SELECT * FROM world.city\
  \ WHERE ID = 130\ntrx_state: ACTIVE\n*************************** 2. row ***************************\n\
  thd_id: 769\nconn_id: 429\nstate: Waiting for table metadata lock\ncurrent_statement:\
  \ OPTIMIZE TABLE world.city\nstatement_latency: 26.62 s\nlast_statement: NULL\n\
  trx_state: COMMITTED\n2 rows in set (0.0607 sec)\n清单 6-5\n涉及元数据锁的连接的 sys.session\
  \ 信息\n```\n\n在此示例中，`conn_id = 428` 的连接有一个正在进行的事务，并且在上一条语句中查询了 `world.city` 表（本例中当前语句与之相同，因为它在下一条语句执行前不会被清除）。在事务仍处于活动状态时，`conn_id\
  \ = 429` 执行了一个 `OPTIMIZE TABLE` 语句，该语句现在正在等待元数据锁。（是的，`OPTIMIZE TABLE` 不会更改模式定义，但作为\
  \ `DDL` 语句，它仍然受元数据锁影响。）由于 MySQL 没有事务性 `DDL` 语句，`conn_id = 429` 的事务状态显示为已提交。\n\n\
  当是当前语句或最后一条语句导致元数据锁时，处理起来很方便。在更一般的情况下，您可以使用 `performance_schema.metadata_locks`\
  \ 表，将 `OBJECT_TYPE` 列设置为 `TABLE`，来查找已授予和等待中的元数据锁。清单 6-6 展示了使用与前面示例相同的设置，已授予和等待中的元数据锁的示例。第\
  \ 14 章将更详细地介绍如何调查元数据锁。\n\n```\n-- 调查 #2\nConnection 3> SELECT object_type, object_schema,\
  \ object_name,\nlock_type, lock_duration, lock_status,\nowner_thread_id\nFROM performance_schema.metadata_locks\n\
  WHERE owner_thread_id IN (768, 769)\nAND object_type = 'TABLE'\\G\n***************************\
  \ 1. row ***************************\nobject_type: TABLE\nobject_schema: world\n\
  object_name: city\nlock_type: SHARED_READ\nlock_duration: TRANSACTION\nlock_status:\
  \ GRANTED\nowner_thread_id: 768\n*************************** 2. row ***************************\n\
  object_type: TABLE\nobject_schema: world\nobject_name: city\nlock_type: SHARED_NO_READ_WRITE\n\
  lock_duration: TRANSACTION\nlock_status: PENDING\nowner_thread_id: 769\n2 rows in\
  \ set (0.0010 sec)\n清单 6-6\n元数据锁示例\n```\n\n在此示例中，线程 ID 768（与 `sys.session` 输出中的\
  \ `conn_id = 428` 相同）由于正在进行的事务，拥有对 `world.city` 表的共享读锁，而线程 ID 769 正在等待锁，因为它正尝试在该表上执行\
  \ `DDL` 语句。\n\n操作完成后，请确保在 `连接 1` 中回滚或提交事务，以便 `OPTIMIZE TABLE` 能够完成：\n\n```\n-- 连接\
  \ 1\nConnection 1> ROLLBACK;\nQuery OK, 0 rows affected (0.0004 sec)\n```\n\n元数据锁的一个特例是使用\
  \ `LOCK TABLES` 语句显式获取的锁。\n\n\n## 显式表锁\n\n显式表锁通过 `LOCK TABLES` 和 `FLUSH TABLES WITH\
  \ READ LOCK` 语句获取。使用 `LOCK TABLES` 语句，可以获取共享锁或排他锁；`FLUSH TABLES WITH READ LOCK`\
  \ 总是获取共享锁。这些锁会一直保持，直到使用 `UNLOCK TABLES` 语句显式释放。当执行 `FLUSH TABLES WITH READ LOCK`\
  \ 且未列出任何表时，将获取全局读锁（即影响所有表）。虽然这些锁也用于保护数据，但在 MySQL 中它们被视为元数据锁。\n\n除了与备份相关的 `FLUSH\
  \ TABLES WITH READ LOCK` 外，显式表锁在 InnoDB 中并不常用，因为 InnoDB 复杂的锁定功能在大多数情况下比自行处理锁更为优越。但是，如果你确实需要锁定整个表，显式锁可能很有用，因为\
  \ MySQL 检查它们的开销非常低。\n\n清单 6-7 展示了一个连接对 `world.country` 和 `world.countrylanguage`\
  \ 表获取显式读锁，并对 `world.city` 表获取写锁的示例。\n\n```\n-- 连接   进程列表 ID   线程 ID   事件 ID\n--\
  \ --------------------------------------------------\n--          1            \
  \  432         772          6\n-- 连接 1\nConnection 1> LOCK TABLES world.country\
  \ READ,\nworld.countrylanguage READ,\nworld.city WRITE;\nQuery OK, 0 rows affected\
  \ (0.0029 sec)\n清单 6-7\n使用显式表锁\n```\n\n当你获取显式锁时，只允许使用你已锁定的表，并且必须符合所请求的锁类型。这意味着，如果你获取了读锁并尝试写入表（`ER_TABLE_NOT_LOCKED_FOR_WRITE`），或者尝试使用一个你未锁定的表（`ER_TABLE_NOT_LOCKED`），就会出错。例如（清单\
  \ 6-7 的续例）：\n\n```\nConnection 1> UPDATE world.country\nSET Population = Population\
  \ + 1\nWHERE Code = 'AUS';\nERROR: 1099: Table 'country' was locked with a READ\
  \ lock and can't be updated\nConnection 1> SELECT *\nFROM sakila.film\nWHERE film_id\
  \ = 1;\nERROR: 1100: Table 'film' was not locked with LOCK TABLES\n```\n\n由于显式锁被视为元数据锁，其在\
  \ `performance_schema.metadata_locks` 表中的症状和信息与隐式元数据锁相同，你也可以使用 `UNLOCK TABLES` 语句来解锁表：\n\
  \n```\nConnection 1> UNLOCK TABLES;\nQuery OK, 0 rows affected (0.0006 sec)\n```\n\
  \n另一种表级锁，但由隐式处理的，简称为表锁。\n\n## 隐式表锁\n\nMySQL 在查询表时会获取隐式表锁。对于 InnoDB 表，除了刷新锁、元数据锁和显式锁之外，表锁作用不大，因为\
  \ InnoDB 使用记录锁来允许并发访问表，只要事务不修改相同的行（粗略地说——如下一章所示——实际情况比这更复杂）。\n\n然而，InnoDB 确实在表级别使用意向锁的概念。由于在调查锁问题时很可能会遇到它们，因此值得熟悉一下。正如在讨论锁访问级别时提到的，意向锁用于标记事务的意图。\n\
  \n对于事务获取的锁，首先会获取一个意向锁，然后根据需要可能升级。这与不会改变的显式 `LOCK TABLES` 不同。要获取共享锁，事务首先获取意向共享锁，然后获取共享锁。类似地，对于排他锁，首先获取意向排他锁。意向锁的一些示例如下：\n\
  \n*   `SELECT ... FOR SHARE` 语句对查询的表获取意向共享锁。`SELECT ... LOCK IN SHARE MODE` 语法是同义词。\n\
  *   `SELECT ... FOR UPDATE` 语句对查询的表获取意向排他锁。\n*   DML 语句（不包括 `SELECT`）对修改的表获取意向排他锁。如果修改了外键列，则会在父表上获取意向共享锁。\n\
  \n表级锁可以在 `performance_schema.data_locks` 表中找到，其中 `LOCK_TYPE` 列设置为 `TABLE`。清单 6-8\
  \ 展示了一个意向共享锁的示例。\n\n```\n-- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              446         796          6\n--          2           \
  \   447         797          6\n-- 连接 1\nConnection 1> START TRANSACTION;\nQuery\
  \ OK, 0 rows affected (0.0003 sec)\nConnection 1> SELECT *\nFROM world.city\nWHERE\
  \ ID = 130\nFOR SHARE\\G\n*************************** 1\\. row ***************************\n\
  ID: 130\nName: Sydney\nCountryCode: AUS\nDistrict: New South Wales\nPopulation:\
  \ 3276207\n1 row in set (0.0010 sec)\n-- 连接 2\nConnection 2> SELECT engine, thread_id,\
  \ object_schema,\nobject_name, lock_type, lock_mode,\nlock_status, lock_data\nFROM\
  \ performance_schema.data_locks\nWHERE lock_type = 'TABLE'\nAND thread_id = 796\\\
  G\n*************************** 1\\. row ***************************\nengine: INNODB\n\
  thread_id: 796\nobject_schema: world\nobject_name: city\nlock_type: TABLE\nlock_mode:\
  \ IS\nlock_status: GRANTED\nlock_data: NULL\n1 row in set (0.0011 sec)\n-- 连接 1\n\
  Connection 1> ROLLBACK;\nQuery OK, 0 rows affected (0.0004 sec)\n清单 6-8\nInnoDB\
  \ 意向共享锁示例\n```\n\n这显示了在 `world.city` 表上的意向共享锁。注意 `engine` 设置为 `INNODB`，且 `lock_data`\
  \ 为 `NULL`。\n\n\n\n## 备份锁\n\n备份锁是一种实例级锁；也就是说，它影响整个系统。这是 MySQL 8 中引入的一种新锁。备份锁可以防止那些可能使备份不一致的语句，同时仍然允许其他语句与备份并发执行。目前，备份锁的主要用户是\
  \ MySQL 企业备份工具，它将备份锁与日志锁结合使用，以避免对 InnoDB 表执行 `FLUSH TABLES WITH READ LOCK`。被阻止的语句包括：\n\
  \n*   创建、重命名或删除文件的语句。这些包括 `CREATE TABLE`、`CREATE TABLESPACE`、`RENAME TABLE` 和 `DROP\
  \ TABLE` 语句。\n\n*   账户管理语句，如 `CREATE USER`、`ALTER USER`、`DROP USER` 和 `GRANT`。\n\
  \n*   不会将其更改记录到重做日志中的 DDL 语句。例如，这包括添加索引。\n\n备份锁通过 `LOCK INSTANCE FOR BACKUP` 语句创建，并通过\
  \ `UNLOCK INSTANCE` 语句释放。执行 `LOCK INSTANCE FOR BACKUP` 需要 `BACKUP_ADMIN` 权限。一个获取备份锁并再次释放它的例子是：\n\
  \n```\nmysql> LOCK INSTANCE FOR BACKUP;\nQuery OK, 0 rows affected (0.0002 sec)\n\
  mysql> UNLOCK INSTANCE;\nQuery OK, 0 rows affected (0.0003 sec)\n```\n\n注意\n\n在撰写本文时，当使用\
  \ X 协议时（通过 `mysqlx_port` 指定的端口或 `mysqlx_socket` 指定的套接字连接），不允许获取和释放备份锁。尝试这样做会返回一个\
  \ `ER_PLUGGABLE_PROTOCOL_NOT_SUPPORTED` 错误：`ERROR: 3130: Command not supported by\
  \ pluggable protocols`。\n\n此外，与备份锁冲突的语句也会获取备份锁。由于 DDL 语句有时由几个步骤组成（例如，在新文件中重建表然后重命名文件），备份锁可能会在步骤之间释放，以避免不必要地长时间阻塞\
  \ `LOCK INSTANCE FOR BACKUP`。\n\n可以在 `performance_schema.metadata_locks` 表中找到备份锁，其\
  \ `OBJECT_TYPE` 列设置为 `BACKUP LOCK`。列表 6-9 展示了一个查询等待由 `LOCK INSTANCE FOR BACKUP`\
  \ 持有的备份锁的示例。\n\n```\n-- 连接   处理列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              484         851          1\n--          2           \
  \   485         852          1\n--          3              486         853     \
  \     1\n-- 连接 1\nConnection 1> LOCK INSTANCE FOR BACKUP;\nQuery OK, 0 rows affected\
  \ (0.0004 sec)\n-- 连接 2\nConnection 2> OPTIMIZE TABLE world.city;\n-- 连接 3\nConnection\
  \ 3> SELECT object_type, object_schema, object_name,\nlock_type, lock_duration,\
  \ lock_status,\nowner_thread_id\nFROM performance_schema.metadata_locks\nWHERE object_type\
  \ = 'BACKUP LOCK'\nAND owner_thread_id IN (851, 852)\\G\n***************************\
  \ 1. row ***************************\nobject_type: BACKUP LOCK\nobject_schema: NULL\n\
  object_name: NULL\nlock_type: SHARED\nlock_duration: EXPLICIT\nlock_status: GRANTED\n\
  owner_thread_id: 851\n*************************** 2. row ***************************\n\
  object_type: BACKUP LOCK\nobject_schema: NULL\nobject_name: NULL\nlock_type: INTENTION_EXCLUSIVE\n\
  lock_duration: TRANSACTION\nlock_status: PENDING\nowner_thread_id: 852\n2 rows in\
  \ set (0.0007 sec)\n-- 连接 1\nConnection 1> UNLOCK INSTANCE;\nQuery OK, 0 rows affected\
  \ (0.0003 sec)\n列表 6-9\n备份锁冲突示例\n```\n\n在这个例子中，线程 ID 为 851 的连接拥有备份锁，而线程 ID 为 852\
  \ 的连接正在等待它。请注意，`LOCK INSTANCE FOR BACKUP` 持有共享锁，而 DDL 语句请求的是意向排他锁。\n\n与备份锁相关的是日志锁，它也是为了减少备份期间的锁定而引入的。\n\
  \n## 日志锁\n\n当创建备份时，通常希望包含有关备份所一致的日志位置和 GTID 集的信息。在 MySQL 5.7 及更早版本中，获取此信息时需要全局读锁。在\
  \ MySQL 8 中，引入了日志锁，允许你读取诸如已执行的全局事务标识符（GTID）、二进制日志位置以及 InnoDB 的日志序列号（LSN）等信息，而无需获取全局读锁。\n\
  \n日志锁防止对日志相关信息进行更改的操作。实际上，这意味着提交、`FLUSH LOGS` 和类似操作。日志锁在查询 `performance_schema.log_status`\
  \ 表时隐式获取。访问该表需要 `BACKUP_ADMIN` 权限。列表 6-10 展示了 `log_status` 表的示例输出。\n\n```\n-- 连接\
  \   处理列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              490         857          6\n-- 连接 1\nConnection 1 > SELECT\
  \ *\nFROM performance_schema.log_status\\G\n*************************** 1. row ***************************\n\
  SERVER_UUID: fcbb7afc-bdde-11ea-b95f-ace2d35785be\nLOCAL: {\"gtid_executed\": \"\
  d2549c41-86ca-11ea-9dc7-ace2d35785be:1-351\", \"binary_log_file\": \"binlog.000002\"\
  , \"binary_log_position\": 39348}\nREPLICATION: {\"channels\": [{\"channel_name\"\
  : \"\", \"relay_log_file\": \"relay-bin.000002\", \"relay_log_position\": 39588}]}\n\
  STORAGE_ENGINES: {\"InnoDB\": {\"LSN\": 2073604726, \"LSN_checkpoint\": 2073604726}}\n\
  1 row in set (0.0012 sec)\n列表 6-10\nlog_status 表的示例输出\n```\n\n可用的信息取决于实例的配置，而具体值则取决于使用情况。\n\
  \n至此，关于 MySQL 中主要高级锁类型的介绍就结束了。\n\n### 总结\n\n本章讨论了高级锁类型。这些锁主要独立于所使用的存储引擎，包括从用户级和实例级锁到表和元数据锁的一系列锁。\n\
  \n用户级锁可用于保护应用程序中的工作流，是最通用的锁类型。刷新锁在表被刷新时遇到，由于底层的表定义缓存（TDC）版本锁，可能导致难以诊断的问题。元数据锁保护模式对象的元数据，例如表的列定义。\n\
  \n既有显式的表锁，也有隐式的表锁，在处理 InnoDB 表时，隐式锁最为常见。隐式锁还包括意向锁。\n\n在实例级，有两种锁类型是为备份而开发的。备份锁防止会使备份不一致的更改，例如对用户和权限以及某些模式更改的更改。日志锁是在查询\
  \ `performance_schema.log_status` 时隐式获取的锁，以确保能够以一致的方式、使用最少的锁定来获取日志相关的状态值。\n\n除了高级锁之外，InnoDB\
  \ 还有自己的一套在记录级工作的锁，这将在下一章讨论。\n\n脚注 1\n\n\n\n# 7. InnoDB 锁机制\n\n前一章研究的锁，除了 InnoDB\
  \ 意向锁外，都是 MySQL 通用的。InnoDB 拥有自己精密的锁系统，以实现高度并发的数据访问。在线事务处理（OLTP）工作负载的基准测试表明，根据工作负载的不同，InnoDB\
  \ 能够良好地处理超过 100 个并发查询。^³ 这不仅与记录级锁有关，还涉及底层信号量，而后者是一个持续改进的领域，这也是新版本 MySQL 比旧版本能更好处理并发的主要原因。\n\
  \n#### 提示\n\n与旧版本相比，新版本的 MySQL 支持更高程度的并发查询执行。最迟在 `8.0.21` 中，锁系统互斥锁被分片，以减少高并发系统上的争用。\n\
  \n本章将首先讨论 InnoDB 记录锁和临键锁，然后是间隙锁和谓词锁。涵盖的数据级锁中最后一种是自增锁，它在高并发插入时保持良好性能方面也很重要。本章的最后一个主题是信号量。\n\
  \n## 记录锁与临键锁\n\n记录锁通常被称为行锁；然而，它不仅仅是行上的锁，还包括索引锁和间隙锁。与之相关的是临键锁。临键锁是记录锁和记录前间隙上的间隙锁的组合。临键锁实际上是\
  \ InnoDB 中的默认锁类型，因此在锁输出中，你只会看到 `S`（共享）和 `X`（排他）模式。\n\n当谈论 InnoDB 锁时，通常指的就是记录锁和临键锁。它们是细粒度锁，旨在仅锁定最少的数据量，同时确保数据完整性。\n\
  \n记录锁或临键锁可以是共享的或排他的，并且仅影响事务访问的行和索引。排他锁的持续时间通常与事务一致，但也有例外，例如在 `INSERT INTO ... ON\
  \ DUPLICATE KEY` 和 `REPLACE` 语句中用于唯一性检查的 delete-marked 记录。对于共享锁，其持续时间可能取决于事务隔离级别，这将在第\
  \ 9 章和第 12 章讨论。\n\n可以使用 `performance_schema.data_locks` 表来查找记录锁和临键锁。清单 7-1 展示了使用二级索引\
  \ `CountryCode` 更新 `world.city` 表中的行时所产生的锁的示例。\n\n```\n-- 连接   进程列表 ID   线程 ID \
  \  事件 ID\n-- --------------------------------------------------\n--          1 \
  \             544         919          6\n--          2              545       \
  \  920          6\n-- 连接 1\nConnection 1> START TRANSACTION;\nQuery OK, 0 rows affected\
  \ (0.0002 sec)\nConnection 1> UPDATE world.city\nSET Population = Population + 1\n\
  WHERE CountryCode = 'LUX';\nQuery OK, 1 row affected (0.0008 sec)\nRows matched:\
  \ 1  Changed: 1  Warnings: 0\n-- 连接 2\nConnection 2> SELECT thread_id, event_id,\n\
  object_schema, object_name, index_name,\nlock_type, lock_mode, lock_status, lock_data\n\
  FROM performance_schema.data_locks\nWHERE thread_id = 919\\G\n***************************\
  \ 1\\. row ***************************\nthread_id: 919\nevent_id: 10\nobject_schema:\
  \ world\nobject_name: city\nindex_name: NULL\nlock_type: TABLE\nlock_mode: IX\n\
  lock_status: GRANTED\nlock_data: NULL\n*************************** 2\\. row ***************************\n\
  thread_id: 919\nevent_id: 10\nobject_schema: world\nobject_name: city\nindex_name:\
  \ CountryCode\nlock_type: RECORD\nlock_mode: X\nlock_status: GRANTED\nlock_data:\
  \ 'LUX', 2452\n*************************** 3\\. row ***************************\n\
  thread_id: 919\nevent_id: 10\nobject_schema: world\nobject_name: city\nindex_name:\
  \ PRIMARY\nlock_type: RECORD\nlock_mode: X,REC_NOT_GAP\nlock_status: GRANTED\nlock_data:\
  \ 2452\n*************************** 4\\. row ***************************\nthread_id:\
  \ 919\nevent_id: 10\nobject_schema: world\nobject_name: city\nindex_name: CountryCode\n\
  lock_type: RECORD\nlock_mode: X,GAP\nlock_status: GRANTED\nlock_data: 'LVA', 2434\n\
  4 rows in set (0.0014 sec)\n-- 连接 1\nConnection 1> ROLLBACK;\nQuery OK, 0 rows affected\
  \ (0.1702 sec)\n```\n清单 7-1 InnoDB 记录锁示例\n\n第一行是已经讨论过的意向排他表锁。第二行是 `CountryCode`\
  \ 索引上的临键锁，锁定值为（`'LUX'`, `2452`），其中 `'LUX'` 是 `WHERE` 子句中使用的国家代码，`2452` 是添加到非唯一二级索引中的主键\
  \ id。ID 为 `2452` 的城市是唯一匹配 `WHERE` 子句的城市，主键记录（行本身）显示在输出的第三行。锁模式是 `X,REC_NOT_GAP`，这意味着它是记录上的排他锁，而不是间隙锁。\n\
  \n什么是间隙？输出的第四行展示了一个例子。间隙锁非常重要，以至于对间隙锁的讨论被单独分出来。\n\n## 间隙锁\n\n间隙锁保护两条记录之间的空间。这可以通过聚簇索引或在二级索引中发生在行中。在索引页的第一条记录之前和页的最后一条记录之后，有称为\
  \ *infimum 记录* 和 *supremum 记录* 的伪记录。间隙锁通常是导致最多困惑的锁类型。通过研究锁问题来积累经验是熟悉它们的最佳途径。\n\n\
  考虑前一个例子中的查询：\n\n```\nUPDATE world.city\nSET Population = Population + 1\nWHERE CountryCode\
  \ = 'LUX';\n```\n\n这个查询会更改所有 `CountryCode = 'LUX'` 的城市的人口。如果在更新和事务提交之间插入了一个新城市会发生什么？如果\
  \ `UPDATE` 和 `INSERT` 语句按照它们执行的相同顺序提交，那么一切正常。然而，如果你以相反的顺序提交更改，那么结果就会不一致，因为人们会期望插入的行也已被更新。\n\
  \n这就是间隙锁发挥作用的地方。它保护新记录（包括从不同位置移动过来的记录）将被插入的空间，因此在持有该间隙锁的事务完成之前，这个空间不会被改变。如果你查看清单\
  \ 7-1 示例输出的第四行，可以看到一个间隙锁的例子：\n\n```\n*************************** 4\\. row ***************************\n\
  thread_id: 919\nevent_id: 10\nobject_schema: world\nobject_name: city\nindex_name:\
  \ CountryCode\nlock_type: RECORD\nlock_mode: X,GAP\nlock_status: GRANTED\nlock_data:\
  \ 'LVA', 2434\n4 rows in set (0.0014 sec)\n```\n\n这是在 `CountryCode` 索引上，针对值（`'LVA'`,\
  \ `2434`）的一个排他间隙锁。由于查询请求更新所有 `CountryCode` 设置为 `'LUX'` 的行，该间隙锁确保没有新行可以插入到 `'LUX'`\
  \ 国家代码下。国家代码 `'LVA'` 是 `CountryCode` 索引中的下一个值，因此 `'LUX'` 和 `'LVA'` 之间的间隙被一个排他锁保护起来。另一方面，仍然可以插入\
  \ `CountryCode = 'LVA'` 的新城市。在某些地方，这被称为“记录前的间隙”，这使得理解间隙锁的工作原理更容易。\n\n间隙锁的一个特点是，即使两个都是排他的，间隙锁也不会与另一个间隙锁冲突。间隙锁的目的不是防止访问间隙，而只是防止在间隙中插入数据。当讨论插入意向锁时，你将看到间隙锁如何阻塞插入操作。\n\
  \n当你使用 `READ COMMITTED` 事务隔离级别时，相比 `REPEATABLE READ` 或 `SERIALIZABLE`，所采用的间隙锁程度要低得多。\n\
  \n与间隙锁相关的是谓词锁。\n\n\n\n## 谓词锁与页锁\n\n谓词锁类似于间隙锁，但它应用于空间索引。在空间索引中，无法确定绝对的顺序，因此间隙锁没有意义。在\
  \ `REPEATABLE READ`（可重复读）和 `SERIALIZABLE`（可串行化）事务隔离级别下，对于空间索引，InnoDB 不使用间隙锁，而是在查询所使用的最小边界矩形（MBR）或整个页上创建一个谓词锁。这将通过防止对最小边界矩形或页内的数据进行更改，来实现一致性读取。\n\
  \n当查询 `performance_schema.data_locks` 表时，谓词锁将显示为 `PREDICATE` 或 `PRDT_PAGE`，后者表示页锁。\n\
  \n作为一个谓词锁的例子，考虑 `sakila` 数据库中的 `address` 表。该表有一个 `location` 列，其数据类型为 `geometry`（几何），空间参考系统标识符（SRID）设置为\
  \ 0。（在 MySQL 8 中，需要 SRID 才能创建空间索引。）`location` 列上的索引名为 `idx_location`。下面的代码清单展示了更新其中一个地址时如何获取谓词锁。\n\
  \n```sql\n-- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              562         954          6\n--          2           \
  \   563         955          6\n-- 连接 1\nConnection 1> START TRANSACTION;\nQuery\
  \ OK, 0 rows affected (0.0002 sec)\nConnection 1> UPDATE sakila.address\nSET address\
  \ = '42 Concurrency Boulevard',\ndistrict = 'Punjab',\ncity_id = 208,\npostal_code\
  \ = 40509,\nlocation = ST_GeomFromText('POINT(75.91 31.53)', 0)\nWHERE address_id\
  \ = 372;\nQuery OK, 1 row affected (0.0008 sec)\nRows matched: 1  Changed: 1  Warnings:\
  \ 0\n-- 连接 2\nConnection 2> SELECT engine_lock_id, thread_id, event_id,\nobject_schema,\
  \ object_name, index_name,\nlock_type, lock_mode, lock_status, lock_data\nFROM performance_schema.data_locks\n\
  WHERE thread_id = 954\nAND index_name = 'idx_location'\\G\n***************************\
  \ 1. row ***************************\nengine_lock_id: 2123429833312:1074:12:0:2123393008216\n\
  thread_id: 954\nevent_id: 10\nobject_schema: sakila\nobject_name: address\nindex_name:\
  \ idx_location\nlock_type: RECORD\nlock_mode: S,PRDT_PAGE\nlock_status: GRANTED\n\
  lock_data: infimum pseudo-record\n*************************** 2. row ***************************\n\
  engine_lock_id: 2123429833312:1074:13:0:2123393008560\nthread_id: 954\nevent_id:\
  \ 10\nobject_schema: sakila\nobject_name: address\nindex_name: idx_location\nlock_type:\
  \ RECORD\nlock_mode: S,PRDT_PAGE\nlock_status: GRANTED\nlock_data: infimum pseudo-record\n\
  2 rows in set (0.0006 sec)\n-- 连接 1\nConnection 1> ROLLBACK;\nQuery OK, 0 rows affected\
  \ (0.0435 sec)\n```\n**清单 7-2** 谓词/页锁示例\n\n这个更新操作的关键部分在于 `location` 列被更改了。从 `data_locks`\
  \ 表的输出可以看到，获取了一个谓词页锁。\n\n最后一种你应该了解的与记录相关的锁类型是插入意向锁。\n\n## 插入意向锁\n\n请记住，对于表级锁，InnoDB\
  \ 有意向锁来表明事务将以共享或独占方式使用表。类似地，InnoDB 在记录级别也有插入意向锁。正如其名所示，InnoDB 在 `INSERT` 语句中使用这些锁来向其他事务发出意向信号。因此，该锁是针对一条尚不存在的记录（因此它是一种间隙锁），而不是针对现有记录。使用插入意向锁可以帮助提高插入操作的并发性能。\n\
  \n在锁输出中，你不太可能看到插入意向锁，除非一个 `INSERT` 语句正在等待获取锁。你可以通过在一个事务中创建一个间隙锁来阻止 `INSERT` 语句完成，从而强制产生这种情况。以下示例在连接\
  \ 1 中创建一个间隙锁，然后在连接 2 中尝试插入一行，该插入与间隙锁冲突。最后，在第三个连接中检索锁信息。\n\n```sql\n-- 连接   进程列表\
  \ ID   线程 ID   事件 ID\n-- --------------------------------------------------\n--\
  \          1              577         972          6\n--          2            \
  \  578         973          6\n--          3              579         974      \
  \    6\n-- 连接 1\nConnection 1> START TRANSACTION;\nQuery OK, 0 rows affected (0.0003\
  \ sec)\nConnection 1> SELECT *\nFROM world.city\nWHERE ID > 4079\nFOR UPDATE\\G\n\
  0 rows in set (0.0007 sec)\n-- 连接 2\nConnection 2> START TRANSACTION;\nQuery OK,\
  \ 0 rows affected (0.0002 sec)\nConnection 2> INSERT INTO world.city\nVALUES (4080,\
  \ 'Darwin', 'AUS',\n'Northern Territory', 146000);\n-- 连接 3\nConnection 3> SELECT\
  \ thread_id, event_id,\nobject_schema, object_name, index_name,\nlock_type, lock_mode,\
  \ lock_status, lock_data\nFROM performance_schema.data_locks\nWHERE thread_id IN\
  \ (972, 973)\nAND object_name = 'city'\nAND index_name = 'PRIMARY'\\G\n***************************\
  \ 1. row ***************************\nthread_id: 972\nevent_id: 10\nobject_schema:\
  \ world\nobject_name: city\nindex_name: PRIMARY\nlock_type: RECORD\nlock_mode: X\n\
  lock_status: GRANTED\nlock_data: supremum pseudo-record\n***************************\
  \ 2. row ***************************\nthread_id: 973\nevent_id: 10\nobject_schema:\
  \ world\nobject_name: city\nindex_name: PRIMARY\nlock_type: RECORD\nlock_mode: X,INSERT_INTENTION\n\
  lock_status: WAITING\nlock_data: supremum pseudo-record\n2 rows in set (0.0007 sec)\n\
  -- 连接 1\nConnection 1> ROLLBACK;\nQuery OK, 0 rows affected (0.0003 sec)\n-- 连接\
  \ 2\nConnection 2> ROLLBACK;\nQuery OK, 0 rows affected (0.3035 sec)\n```\n**清单\
  \ 7-3** 插入意向锁示例\n\n请注意，对于 `RECORD` 锁，其锁模式包含了 `INSERT_INTENTION`——即插入意向锁。在本例中，锁定的数据是\
  \ supremum 伪记录，但根据情况，也可能是一个主键值。如果你还记得临键锁的讨论，那么 `X` 表示一个临键锁，但这是一个特例，因为锁是加在 supremum\
  \ 伪记录上的，而锁定它是不可能的，所以实际上这只是一个在 supremum 伪记录之前的间隙上的间隙锁。\n\n插入数据时，你需要了解的另一种锁是自增锁。\n\
  \n\n## 自增锁\n\n当向具有自增计数器的表中插入数据时，有必要保护该计数器，以保证两个事务能获得唯一值。如果使用基于语句的日志记录写入二进制日志，则会有更多限制，因为当语句被重放时，除第一行外的所有行的自增值都会被重新创建。\n\
  \nInnoDB 支持三种锁模式，因此你可以根据需要调整锁定程度。你通过 `innodb_autoinc_lock_mode` 选项选择锁模式，该选项接受值 0、1\
  \ 和 2，其中 2 是 MySQL 8 中的默认值。更改此值需要重启 MySQL。这些值的含义总结在表 7-1 中。\n\n表 7-1\n`innodb_autoinc_lock_mode`\
  \ 选项支持的值\n\n| 值 | 模式 | 描述 |\n| --- | --- | --- |\n| 0 | 传统 | MySQL 5.0 及更早版本的锁定行为。锁一直保持到语句结束，因此值以可重复且连续的顺序分配。\
  \ |\n| 1 | 连续 | 对于在查询开始时已知行数的 `INSERT` 语句，在轻量级互斥锁下分配所需数量的自增值，从而避免自增锁。对于行数未知的语句，则会获取自增锁并保持到语句结束。这是\
  \ MySQL 5.7 及更早版本的默认值。 |\n| 2 | 交错 | 从不获取自增锁，并发插入的自增值可能是交错的。仅当禁用二进制日志或 `binlog_format`\
  \ 设置为 `ROW` 时，此模式才是安全的。它是 MySQL 8 中的默认值。 |\n\n`innodb_autoinc_lock_mode` 的值越高，锁定越少。为此付出的代价是自增值序列中的间隙数量增加，并且对于\
  \ `innodb_autoinc_lock_mode = 2` 存在值交错的可能性。除非你不能使用基于行的二进制日志或有特殊的连续自增值需求，否则建议使用值\
  \ 2。\n\n以上结束了对数据级锁的讨论，但在讨论 MySQL 并发性时，还有一个重要主题未涉及：互斥量和读写锁信号量。\n\n## 互斥量与读写锁信号量\n\
  \n在 MySQL 源代码中，需要保护代码路径。例如，保护修改缓冲池内容的代码，以避免两个线程同时修改缓冲池内容，从而可能导致冲突的更改。在某种程度上，你可以将互斥量与用户级锁进行比较，只不过前者用于\
  \ MySQL 代码路径，而后者用于使用 MySQL 的应用程序代码路径。\n\n注意\nInnoDB 在术语上有些互通地使用 mutex 和 semaphore。例如，InnoDB\
  \ 监视器中的 `SEMAPHORES` 部分也包括互斥量等待的信息，而 `SHOW ENGINE INNODB MUTEX` 包括信号量信息。\n\n不仅 InnoDB\
  \ 在 MySQL 中使用同步对象；例如，表打开缓存也由一个互斥量保护。然而，在大多数情况下，当你遇到同步对象争用问题时，通常与 InnoDB 相关，因为高并发操作的压力通常在这里最大，并且对于\
  \ InnoDB 有现成的监控工具可用于调查争用。因此，这里只讨论 InnoDB。\n\n互斥量和信号量比数据锁更难研究，因为不可能在锁生效时暂停代码执行并直接研究它们。（嗯，可以，但这需要使用像\
  \ `gdb` 这样的调试器并使用断点。）即使启用了 Performance Schema 中的同步等待，你也通常会发现不足，因为会有非常多的等待，以至于即使是默认有\
  \ 10000 行的长历史表，也会很快被单个连接耗尽，如清单 7-4 所示。\n\n\n### 清单 7-4：同步等待示例\n\n```\n-- 连接   进程列表\
  \ ID   线程 ID   事件 ID\n-- --------------------------------------------------\n--\
  \          1              638        1057          6\n--          2            \
  \  639        1058          6\n-- 连接 1\nConnection 1> UPDATE performance_schema.setup_instruments\n\
  SET ENABLED = 'YES',\nTIMED = 'YES'\nWHERE NAME LIKE 'wait/synch/%';\nQuery OK,\
  \ 323 rows affected (0.0230 sec)\nRows matched: 323  Changed: 323  Warnings: 0\n\
  Connection 1> UPDATE performance_schema.setup_consumers\nSET ENABLED = 'YES'\nWHERE\
  \ NAME IN ('events_waits_current', 'events_waits_history_long');\nQuery OK, 2 rows\
  \ affected (0.0004 sec)\nRows matched: 2  Changed: 2  Warnings: 0\n-- 连接 2\nConnection\
  \ 2> UPDATE world.city\nSET Population = Population + 1\nWHERE CountryCode = 'USA';\n\
  Query OK, 274 rows affected (0.1522 sec)\nRows matched: 274  Changed: 274  Warnings:\
  \ 0\n-- 连接 1\nConnection 1> SELECT REPLACE(event_name, 'wait/synch/', '') AS event,\
  \ COUNT(*)\nFROM performance_schema.events_waits_history_long\nWHERE thread_id =\
  \ 1058\nAND event_name LIKE 'wait/synch/%'\nGROUP BY event_name\nWITH ROLLUP\nORDER\
  \ BY COUNT(*);\n+----------------------------------------------+----------+\n| event\
  \                                        | COUNT(*) |\n+----------------------------------------------+----------+\n\
  | mutex/sql/MYSQL_BIN_LOG::LOCK_done           |        1 |\n| mutex/innodb/purge_sys_pq_mutex\
  \              |        1 |\n| mutex/sql/MYSQL_BIN_LOG::LOCK_sync           |  \
  \      1 |\n| mutex/sql/MYSQL_BIN_LOG::LOCK_log            |        1 |\n| mutex/mysqlx/vio_shutdown\
  \                    |        1 |\n| mutex/sql/LOCK_plugin                     \
  \   |        1 |\n| mutex/sql/LOCK_slave_trans_dep_tracker       |        1 |\n\
  | mutex/sql/MYSQL_BIN_LOG::LOCK_binlog_end_pos |        1 |\n| mutex/sql/MYSQL_BIN_LOG::LOCK_commit\
  \         |        1 |\n| mutex/sql/MYSQL_BIN_LOG::LOCK_xids           |       \
  \ 1 |\n| sxlock/innodb/rsegs_lock                     |        1 |\n| sxlock/innodb/undo_spaces_lock\
  \               |        1 |\n| mutex/sql/MYSQL_BIN_LOG::LOCK_sync_queue     | \
  \       2 |\n| mutex/innodb/lock_sys_table_mutex            |        2 |\n| mutex/sql/MYSQL_BIN_LOG::LOCK_flush_queue\
  \    |        2 |\n| mutex/sql/Gtid_state                         |        2 |\n\
  | mutex/sql/LOCK_table_cache                   |        2 |\n| mutex/sql/MYSQL_BIN_LOG::LOCK_commit_queue\
  \   |        2 |\n| mutex/sql/THD::LOCK_thd_query                |        2 |\n\
  | mutex/innodb/undo_space_rseg_mutex           |        3 |\n| mutex/sql/THD::LOCK_thd_data\
  \                 |        3 |\n| rwlock/sql/gtid_commit_rollback              |\
  \        3 |\n| mutex/mysys/THR_LOCK_open                    |        4 |\n| mutex/sql/THD::LOCK_query_plan\
  \               |        4 |\n| mutex/innodb/flush_list_mutex                | \
  \       5 |\n| sxlock/innodb/index_tree_rw_lock             |        5 |\n| mutex/innodb/trx_undo_mutex\
  \                  |      274 |\n| mutex/innodb/trx_sys_mutex                  \
  \ |      279 |\n| sxlock/innodb/hash_table_locks               |      288 |\n| sxlock/innodb/btr_search_latch\
  \               |      550 |\n| sxlock/innodb/lock_sys_global_rw_lock        | \
  \     551 |\n| sxlock/innodb/log_sn_lock                    |      551 |\n| mutex/innodb/lock_sys_page_mutex\
  \             |      554 |\n| mutex/innodb/trx_mutex                       |   \
  \   850 |\n| NULL                                         |     3950 |\n+----------------------------------------------+----------+\n\
  35 rows in set (0.0173 sec)\nConnection 1> UPDATE performance_schema.setup_instruments\n\
  SET ENABLED = 'NO',\nTIMED = 'NO'\nWHERE NAME LIKE 'wait/synch/%';\nQuery OK, 323\
  \ rows affected (0.0096 sec)\nRows matched: 323  Changed: 323  Warnings: 0\nConnection\
  \ 1> UPDATE performance_schema.setup_consumers\nSET ENABLED = 'NO'\nWHERE NAME IN\
  \ ('events_waits_current', 'events_waits_history_long');\nQuery OK, 2 rows affected\
  \ (0.0004 sec)\nRows matched: 2  Changed: 2  Warnings: 0\n```\n\n在这个简单的例子中，几乎有 4000\
  \ 个（查询 `events_waits_history_long` 结果底部的 `NULL` 行）同步对象被请求。等待的确切列表及其数量会因执行情况、系统状态（例如数据是否已在缓冲池中）和配置的不同而变化。如果有足够多的其他活动，这个数字也可能低得多，因为一些等待可能已被更新的事件从\
  \ `events_waits_history_long` 表中推出。更复杂的是，后台线程也会产生等待事件，因此即使系统没有连接，也会创建等待事件。\n\n虽然设置演示单个同步对象使用的测试案例很困难，但好消息是，作为最终用户，您大多只需要关注争用，而\
  \ `SHOW ENGINE INNODB STATUS` 和 `SHOW ENGINE INNODB MUTEX` 语句将为您提供关于 InnoDB 互斥量和信号量争用的信息。\n\
  \n通常，您需要研究源代码来理解等待的原因；然而，仅考虑文件名通常可以很好地指示发生争用的功能区域。表 7-2 展示了如何将互斥量和信号量信息提供的文件名映射到功能区域的一些示例。源代码路径是相对于\
  \ `storage/innobase` 的，该目录包含了 InnoDB 存储引擎的实现。\n\n#### 表 7-2：互斥量和信号量文件名及其功能区域\n\n\
  | 文件名 | 源代码路径 | 功能区域 |\n| --- | --- | --- |\n| `btr0sea.cc` | `btr/btr0sea.cc` |\
  \ 自适应哈希索引。 |\n| `buf0buf.cc` | `buf/buf0buf.cc` | 缓冲池。 |\n| `buf0flu.cc` | `buf/buf0flu.cc`\
  \ | 缓冲池刷盘算法。 |\n| `dict0dict.cc` | `dict/dict0dict.cc` | InnoDB 数据字典。 |\n| `sync0sharded_rw.h`\
  \ | `include/sync0sharded_rw.h` | 线程的分片读写锁。 |\n| `hash0hash.cc` | `ha/hash0hash.cc`\
  \ | 用于保护哈希表。 |\n| `fil0fil.cc` | `fil/fil0fil.cc` | 表空间内存缓存。 |\n\n除了在头文件中实现的互斥量和信号量，通常，您可以通过使用文件名中\
  \ `0` 之前的名称（例如，`btr0sea.cc` 中的 `btr`）作为目录名，然后是文件名本身，来定位到源代码文件。如果您在编辑器中打开该文件，在许可证和版权头之后，您会看到一个简短的注释，描述该文件的用途，例如，来自\
  \ `storage/innobase/btr/btr0sea.cc`：\n\n```\n/** @file btr/btr0sea.cc\nThe index\
  \ tree adaptive search\nCreated 2/17/1996 Heikki Tuuri\n*************************************************************************/\n\
  ```\n\n因此，`btr0sea.cc` 文件实现了索引树的自适应搜索，自适应哈希索引是其一部分（并且争用最常发生在这里）。\n\n## 为什么是 Innobase？Innodb\
  \ 简史\n\n您可能感到困惑，为什么 InnoDB 源代码的路径是 `storage/innobase/`，使用的是 “innobase” 而不是 “innodb”。要理解这一点，您需要深入了解\
  \ InnoDB 的历史——这被证明是非常有趣的。\n\nInnobase 是由 Heikki Tuuri（是的，与文件 `storage/innobase/btr/btr0sea.cc`\
  \ 注释中列出的是同一个人）于 1995 年创立的一家公司，同年 MySQL 初始发布，但当时两者没有任何关系。Innobase 用于开发 InnoDB，当时它意味着是一个独立的产品。直到后来\
  \ MySQL 增加了对第三方存储引擎的支持，Heikki 才将 InnoDB 作为开源发布，并将其与 MySQL 集成。\n\n\n\n2005 年，Oracle\
  \ 收购了 Innobase 公司，从而也获得了 InnoDB。这导致了一个有趣的情况：MySQL 主要的事务存储引擎（另一个较少使用的引擎是 Berkley\
  \ DB，简称 BDB，它也被 Oracle 收购了）由一家竞争对手维护着。这也是为 MySQL 6 开发 Falcon 存储引擎的动因之一。然而，在该工作完成之前，Sun\
  \ Microsystems 收购了 MySQL，随后 Oracle 又收购了 Sun Microsystems。因此，到了 2010 年，MySQL 和 InnoDB\
  \ 终于归属同一家公司，如今 InnoDB 和 MySQL 由 Oracle 内部的同一个部门进行开发。这也意味着 Falcon 存储引擎被废弃，从未以正式发布（GA）状态发布过。\n\
  \n虽然 Innobase 这家公司早已不复存在，但其名称仍在 MySQL 源代码中延续，既出现在 InnoDB 源代码的路径中，也作为源代码内的名称存在。\n\
  \n### 总结\n\n本章涵盖了 InnoDB 的数据级锁以及互斥量和读写锁信号量。这些锁对于支持并发访问 InnoDB 数据都至关重要，而这也是 InnoDB\
  \ 的优势之一。\n\n首先，讨论了记录锁和临键锁。通常讨论 InnoDB 记录锁时指的就是这些。临键锁是 InnoDB 中的默认锁，它保护记录以及记录前的间隙。其次，讨论了间隙锁的概念。提到间隙锁，指的是保护两个记录之间的空间而不保护记录本身。第三，涵盖了与空间索引一起使用的谓词锁和页锁的相关概念。\n\
  \n第四和第五是两种你遇到频率不如前三种的锁类型。插入意向锁，顾名思义，在插入数据时使用，而自增锁用于确保自增值被正确分配。\n\n第六，也是最后一点，主要讨论了\
  \ InnoDB 中的互斥量和读写锁信号量。这些是最复杂的锁，需要更多地研究源代码来处理。\n\n至此，对 MySQL 和 InnoDB 中可用锁的概述就结束了。下一章将转而讨论当无法获取锁时会发生什么。\n\
  \n脚注 1\n\n# 8. 处理锁冲突\n\n锁的整个理念在于限制对对象或记录的访问，以避免冲突操作并发访问对象或记录，从而确保安全。这意味着，有时锁可能无法被授予。在那种情况下会发生什么？这取决于请求的锁和具体情况。元数据（包括显式请求的表锁）和\
  \ InnoDB 锁操作有超时机制，并且对于某些锁情况，存在显式的死锁检测。\n\n重要的是要理解，在使用数据库时，获取锁失败是生活中的一部分。原则上，你可以使用非常粗粒度的锁来避免除超时外的锁获取失败——MyISAM\
  \ 存储引擎就是这样做的，但代价是写并发性能非常差。然而，在实践中，为了允许高并发的写工作负载，更推荐使用细粒度的锁，这也引入了死锁的可能性。\n\n结论是，你应当始终让你的应用准备好重试获取锁或优雅地失败。无论这是显式锁还是隐式锁，这一点都适用。\n\
  \n> **提示**\n>\n> 始终准备好处理获取锁失败的情况。获取锁失败并非灾难性错误，通常不应被视为程序缺陷。话虽如此，正如第 9 章“减少锁问题”所讨论的，在开发应用程序时，值得牢记一些减少锁竞争的技术。\n\
  \n本章剩余部分将讨论当多个事务请求同一个数据锁时，InnoDB 如何决定优先授予哪个事务锁请求、InnoDB 数据锁的兼容性、以及表级超时、记录级超时、InnoDB\
  \ 死锁和 InnoDB 互斥量与信号量等待的具体细节。\n\n## 感知竞争的事务调度（CATS）\n\n当多个请求竞争同一个锁时，一个重要的决定是以何种顺序授予锁。最简单的解决方案，也是数据库中最常用的，是维护一个队列并按照先进先出（FIFO）原则处理请求。这也是\
  \ MySQL 5.7 及更早版本中授予锁的方式；然而在 MySQL 8 中，实现了一种新的调度算法。\n\n新实现基于密歇根大学 Barzan Mozafari\
  \ 教授团队开发的**感知竞争的事务调度（CATS）**算法，并由 Sunny Bains 与 Mozafari 教授的团队（特别是 Jiamin Huang）合作在\
  \ MySQL 中实现。\n\n> **提示**\n>\n> 如果你想了解更多关于 CATS 算法的信息，那么[`https://mysqlserverteam.com/contention-aware-transaction-scheduling-arriving-in-innodb-to-boost-performance/`](https://mysqlserverteam.com/contention-aware-transaction-scheduling-arriving-in-innodb-to-boost-performance/)是一个很好的起点，评论中还链接了两篇研究论文——主要论文是[`http://web.eecs.umich.edu/~mozafari/php/data/uploads/pvldb_2018_sched.pdf`](http://web.eecs.umich.edu/%7Emozafari/php/data/uploads/pvldb_2018_sched.pdf)。另一个来源是参考手册中的[`https://dev.mysql.com/doc/refman/en/innodb-transaction-scheduling.html`](https://dev.mysql.com/doc/refman/en/innodb-transaction-scheduling.html)。\n\
  \nCATS 算法的工作原理是，已经持有很多锁的事务对于推动其完成最为重要，因此应尽快释放它们的锁，从而使所有事务受益。这种方法的一个潜在缺点是，如果持续有持有大量锁的事务在等待某个特定锁，它们可能会导致持有少量锁的事务永远无法获得该锁（即饥饿）。为了防止这种情况，该算法设有防止饥饿的保障措施。保障措施的工作原理是在当前锁请求队列末尾添加一个屏障，所有位于该屏障之前的请求都会在后续到达的请求被考虑之前处理。\n\
  \nCATS 算法的主要优势体现在高并发工作负载下，并且在 MySQL 8.0.20 之前，它仅在 InnoDB 检测到严重锁竞争时才会被使用。该算法在 8.0.20\
  \ 中得到了改进以提升可伸缩性，同时在`information_schema.INNODB_TRX`表中添加了`trx_schedule_weight`列，从而可以查询处于`LOCK\
  \ WAIT`状态的事务根据 CATS 算法计算出的当前权重。与此同时，CATS 算法改为始终使用，而 FIFO 算法已被弃用。\n\n\n\n## InnoDB\
  \ 数据锁兼容性\n\n回顾讨论锁访问级别兼容性时，规则相对简单。然而，判断两个 InnoDB 数据锁是否彼此兼容则非常复杂。这种情况变得尤为有趣，因为这种关系并非对称——即在某锁存在的情况下可能允许另一锁，反之则不然。例如，插入意向锁必须等待间隙锁，但间隙锁不必等待插入意向锁。另一个例子（缺乏传递性的情况）是：间隙加记录锁必须等待纯记录锁，插入意向锁必须等待间隙加记录锁，但插入意向锁却无需等待纯记录锁。\n\
  \n这对您意味着什么？这意味着当您调查锁争用问题时，需要意识到锁的顺序至关重要，因此在重现问题时，所有锁必须以相同的顺序获取。\n\n关于 InnoDB 处理锁争用的算法原理以及可能导致锁无法授予的原因就讨论到这里。锁无法被授予时会发生什么，将是接下来要讨论的主题。\n\
  \n## 元数据和备份锁等待超时\n\n当您请求刷新、元数据或备份锁时，获取锁的尝试将在 `lock_wait_timeout` 秒后超时。默认超时时间为 31,536,000\
  \ 秒（365 天）。您可以在全局和会话范围内动态设置 `lock_wait_timeout` 选项，这允许您根据特定进程的需求调整超时时间。\n\n发生超时时，语句将失败并返回\
  \ `ER_LOCK_WAIT_TIMEOUT`（错误号 1205）错误，如清单 8-1 所示。\n\n```\n-- 连接   进程列表 ID   线程 ID\
  \   事件 ID\n-- --------------------------------------------------\n--          1\
  \              647        1075          6\n--          2              648      \
  \  1076          6\n-- 连接 1\nConnection 1> LOCK TABLES world.city WRITE;\nQuery\
  \ OK, 0 rows affected (0.0015 sec)\n-- 连接 2\nConnection 2> SET SESSION lock_wait_timeout\
  \ = 5;\nQuery OK, 0 rows affected (0.0003 sec)\nConnection 2> LOCK TABLES world.city\
  \ WRITE;\nERROR: 1205: Lock wait timeout exceeded; try restarting transaction\n\
  -- 连接 1\nConnection 1> UNLOCK TABLES;\nQuery OK, 0 rows affected (0.0003 sec)\n\
  清单 8-1\n表锁请求的锁等待超时\n```\n\n会话级的 `lock_wait_timeout` 值被设置为 5 秒，以缩短连接 2 在尝试获取 `world.city`\
  \ 表的写锁时可能被阻塞的时间。等待 5 秒后，返回错误，错误号为 1205。\n\n`lock_wait_timeout` 选项的推荐设置取决于应用程序的要求。使用较小的值可以防止锁请求长时间阻塞其他查询，这通常是有利的。这通常要求您实现对锁请求失败的处理，例如通过重试语句。另一方面，较大的值则有助于避免重试语句的需要。\n\
  \n对于 `FLUSH TABLES` 语句，还要记住它与较低级别的表定义缓存（TDC）版本锁交互，这意味着放弃该语句可能不允许后续查询继续进行。在这种情况下，将\
  \ `lock_wait_timeout` 设置为较高的值可能更好，这样锁关系会更清晰。\n\n## InnoDB 锁等待超时\n\n当查询在 InnoDB 中请求记录级锁时，它会受到超时限制，类似于刷新、元数据和备份锁的超时。由于记录级锁争用比表级锁争用更常见，且记录级锁增加了死锁的可能性，默认超时设置为\
  \ 50 秒。可以使用 `innodb_lock_wait_timeout` 选项进行设置，该选项可在全局和会话范围内设置。\n\n当发生超时时，查询将失败并返回\
  \ `ER_LOCK_WAIT_TIMEOUT` 错误（错误号 1205），与表级锁超时类似。清单 8-2 展示了一个发生 InnoDB 锁等待超时的示例。\n\
  \n```\n-- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              656        1087          6\n--          2           \
  \   657        1088          6\n-- 连接 1\nConnection 1> START TRANSACTION;\nQuery\
  \ OK, 0 rows affected (0.0002 sec)\nConnection 1> UPDATE world.city\nSET Population\
  \ = Population + 1\nWHERE ID = 130;\nQuery OK, 1 row affected (0.0006 sec)\nRows\
  \ matched: 1  Changed: 1  Warnings: 0\n-- 连接 2\nConnection 2> SET SESSION innodb_lock_wait_timeout\
  \ = 3;\nQuery OK, 0 rows affected (0.2621 sec)\nConnection 2> UPDATE world.city\n\
  SET Population = Population + 1\nWHERE ID = 130;\nERROR: 1205: Lock wait timeout\
  \ exceeded; try restarting transaction\n-- 连接 1\nConnection 1> ROLLBACK;\nQuery\
  \ OK, 0 rows affected (0.0751 sec)\n清单 8-2\nInnoDB 锁等待超时示例\n```\n\n在此示例中，连接 2 的锁等待超时被设置为\
  \ 3 秒，因此无需等待通常的 50 秒来发生超时。\n\n当超时发生时，`innodb_rollback_on_timeout` 选项定义了事务已完成工作中有多少将被回滚。当\
  \ `innodb_rollback_on_timeout` 禁用时（默认值），仅触发超时的语句被回滚。当该选项启用时，整个事务将被回滚。`innodb_rollback_on_timeout`\
  \ 选项只能在全局级别配置，并且需要重启才能更改值。\n\n**注意**\n\n处理锁等待超时非常重要，否则可能使事务留下未释放的锁。如果发生这种情况，其他事务可能无法获取它们所需的锁。因此，您需要确保要么重试事务的剩余部分，要么显式回滚事务，要么启用\
  \ `innodb_rollback_on_timeout` 以便在锁等待超时时自动回滚事务。\n\n通常建议保持 InnoDB 记录级锁的超时时间较短。通常最好将默认的\
  \ 50 秒降低。查询被允许等待锁的时间越长，其他锁请求受到影响的潜在可能性就越大，这可能导致其他查询也停滞。这也会使死锁更有可能发生。如果您禁用了死锁检测（接下来讨论），您应该为\
  \ `innodb_lock_wait_timeout` 设置一个非常小的值，例如 1 或 2 秒，因为您将使用超时来检测死锁。在没有死锁检测的情况下，也建议启用\
  \ `innodb_rollback_on_timeout` 选项。\n\n\n\n## 死锁\n\n死锁听起来是一个很吓人的概念，但你不应该被这个名字吓退。就像锁等待超时一样，死锁是高并发数据库世界中的客观现实。它的真正含义是锁请求之间存在循环关系，如图\
  \ 8-1 中的交通僵局所示。解决这种僵局的唯一方法是强制其中一个请求放弃。从这个意义上说，死锁与锁等待超时并无不同。实际上，你可以禁用死锁检测，在这种情况下，其中一个锁最终会以锁等待超时告终。\n\
  \n![../images/502546_1_En_8_Chapter/502546_1_En_8_Fig1_HTML.jpg](img/502546_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1: 交通僵局\n\n那么，如果死锁并非真正需要，为什么还会存在呢？由于死锁发生在锁请求之间存在循环关系时，InnoDB 有可能在循环形成时立即将其检测出来。这使得\
  \ InnoDB 能够立即告知用户发生了死锁，而无需等待锁等待超时发生。被告知发生了死锁也是很有用的，因为它常常为改进应用程序中的数据访问提供了机会。因此，你应该将死锁视为朋友而非敌人。图\
  \ 8-2 展示了一个导致死锁的两个事务查询表的例子。\n\n![../images/502546_1_En_8_Chapter/502546_1_En_8_Fig2_HTML.png](img/502546_1_En_8_Fig2_HTML.png)\n\
  \n图 8-2: 两个事务导致死锁的示例\n\n在这个例子中，事务 1 首先更新 `ID = 130` 的行，然后更新 `ID = 3805` 的行。在此期间，事务\
  \ 2 首先更新 `ID = 3805` 的行，然后更新 `ID = 130` 的行。这意味着当事务 1 尝试更新 `ID = 3805` 时，事务 2 已经对该行持有了锁。事务\
  \ 2 也无法继续，因为它无法获取 `ID = 130` 上的锁，该锁已被事务 1 持有。这是一个经典的简单死锁例子。循环锁关系也如图 8-3 所示。\n\n\
  ![../images/502546_1_En_8_Chapter/502546_1_En_8_Fig3_HTML.png](img/502546_1_En_8_Fig3_HTML.png)\n\
  \n图 8-3: 导致死锁的锁循环关系\n\n在此图中，可以清楚地看到事务 1 和 2 各自持有哪些锁，以及请求了哪些锁，并且如果不进行干预，冲突将永远无法解决。这使其符合死锁的定义。\n\
  \n在现实世界中，死锁通常更为复杂。这里讨论的例子只涉及了主键记录锁。通常，还会涉及二级索引键、间隙锁以及可能的其他锁类型。涉及的事务也可能超过两个。然而，其原理是相同的。\n\
  \n**注意**：即使每个事务只有一个查询，也可能发生死锁。如果一个查询按升序读取记录，而另一个按降序读取，就有可能发生死锁。\n\n当死锁发生时，InnoDB\
  \ 选择“已完成工作最少”的事务作为牺牲品。这类似于某些高可用性解决方案（如 MySQL NDB 集群）中使用的“Shoot The Other Node In\
  \ The Head”（STONITH）方法，只不过这里被“爆头”的是一个事务。你可以查看 `information_schema.INNODB_TRX` 视图中的\
  \ `trx_weight` 列，了解 InnoDB 使用的权重（完成的工作越多，权重越高）。在实践中，这意味着持有锁最少的事务将被回滚。当这种情况发生时，被选为牺牲品的事务中的查询会失败，并返回错误\
  \ `ER_LOCK_DEADLOCK`（错误代码 1213），然后该事务被回滚以尽可能多地释放锁。清单 8-3 展示了一个发生死锁的例子。\n\n```\n\
  -- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              659        1093          6\n--          2           \
  \   660        1094          6\n-- 连接 1\nConnection 1> START TRANSACTION;\nQuery\
  \ OK, 0 rows affected (0.0002 sec)\nConnection 1> UPDATE world.city\nSET Population\
  \ = Population + 1\nWHERE ID = 130;\nQuery OK, 1 row affected (0.0098 sec)\nRows\
  \ matched: 1  Changed: 1  Warnings: 0\n-- 连接 2\nConnection 2> START TRANSACTION;\n\
  Query OK, 0 rows affected (0.0003 sec)\nConnection 2> UPDATE world.city\nSET Population\
  \ = Population + 1\nWHERE ID = 3805;\nQuery OK, 1 row affected (0.0009 sec)\nRows\
  \ matched: 1  Changed: 1  Warnings: 0\nConnection 2> UPDATE world.city\nSET Population\
  \ = Population + 1\nWHERE ID = 130;\n-- 连接 1\nConnection 1> UPDATE world.city\n\
  SET Population = Population + 1\nWHERE ID = 3805;\nERROR: 1213: Deadlock found when\
  \ trying to get lock; try restarting transaction\n-- 连接 2\nQuery OK, 1 row affected\
  \ (0.1019 sec)\nRows matched: 1  Changed: 1  Warnings: 0\n-- 连接 1\nConnection 1>\
  \ ROLLBACK;\nQuery OK, 0 rows affected (0.0002 sec)\n-- 连接 2\nConnection 2> ROLLBACK;\n\
  Query OK, 0 rows affected (0.0293 sec)\n清单 8-3: 死锁示例\n```\n\n死锁甚至可能比这个例子更简单（不过这种情况很少见，除非你显式地使用锁定\
  \ `SELECT` 语句或使用 `SERIALIZABLE` 事务隔离级别）。清单 8-4 展示了一个仅使用单行发生的死锁。\n\n```\n-- 连接  \
  \ 进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              663        1097          6\n--          2           \
  \   664        1098          6\n-- 连接 1\nConnection 1> START TRANSACTION;\nQuery\
  \ OK, 0 rows affected (0.0004 sec)\nConnection 1> SELECT * FROM world.city WHERE\
  \ ID = 130 FOR SHARE;\n+-----+--------+-------------+-----------------+------------+\n\
  | ID  | Name   | CountryCode | District        | Population |\n+-----+--------+-------------+-----------------+------------+\n\
  | 130 | Sydney | AUS         | New South Wales |    3276207 |\n+-----+--------+-------------+-----------------+------------+\n\
  1 row in set (0.0005 sec)\n-- 连接 2\nConnection 2> START TRANSACTION;\nQuery OK,\
  \ 0 rows affected (0.0002 sec)\nConnection 2> UPDATE world.city\nSET Population\
  \ = Population + 1\nWHERE ID = 130;\n-- 连接 1\nConnection 1> UPDATE world.city\n\
  SET Population = Population + 1\nWHERE ID = 130;\nQuery OK, 1 row affected (0.0447\
  \ sec)\nRows matched: 1  Changed: 1  Warnings: 0\n-- 连接 2\nERROR: 1213: Deadlock\
  \ found when trying to get lock; try restarting transaction\n-- 连接 1\nConnection\
  \ 1> ROLLBACK;\nQuery OK, 0 rows affected (0.0280 sec)\n-- 连接 2\nConnection 2> ROLLBACK;\n\
  Query OK, 0 rows affected (0.0003 sec)\n清单 8-4: 单行死锁\n```\n\n\n### InnoDB 锁冲突处理与互斥锁等待\n\
  \n在这种情况下，连接 2 成为了死锁的受害者，尽管它从未被授予记录锁。这种死锁的发生是因为 InnoDB 目前不允许连接 1 中将共享锁升级为独占锁的请求跳过连接\
  \ 2 的锁请求。这在技术上是有可能实现的，但由于此类场景相对罕见，尚未实现。也就是说，如果使用了外键，一条 DML 语句可能会在涉及外键关系的另一张表上获取共享锁（另见第\
  \ 10 章），因此如果同一事务中的后续语句试图升级该共享锁，那么就可能看到与此示例中相同类型的死锁。\n\n在大多数情况下，自动死锁检测对于避免查询不必要地长时间停滞非常有用。然而，死锁检测并非没有代价。对于查询并发性非常高的\
  \ MySQL 实例，寻找死锁的开销可能变得显著，此时最好禁用死锁检测，这可以通过将 `innodb_deadlock_detect` 选项设置为 `OFF`\
  \ 来完成。需要说明的是，在 MySQL 8.0.18 及更高版本中，死锁检测已移至专用的后台线程，从而提升了性能。\n\n如果确实要禁用死锁检测，建议将 `innodb_lock_wait_timeout`\
  \ 设置为一个非常低的值，例如 1 秒，以便快速检测锁争用。此外，启用 `innodb_rollback_on_timeout` 选项以确保锁被释放。\n\n\
  最后一种锁冲突处理发生在 InnoDB 互斥锁和信号量等待时。\n\n## InnoDB 互斥锁和信号量等待\n\n当 InnoDB 请求一个互斥锁或读写锁信号量而无法立即获得时，它将不得不等待。由于等待发生在比数据锁更低的层次，InnoDB\
  \ 在等待时将采用两种方法之一。它可以进入一个循环并轮询锁是否变得可用，或者它可以挂起线程并使其可用于其他任务。\n\n轮询可以更快地获得锁，但它会使 CPU\
  \ 线程保持忙碌，并且轮询可能导致其他线程的 CPU 缓存失效。有三个配置选项可用于控制此行为：\n\n*   `innodb_spin_wait_delay`：在轮询时，InnoDB\
  \ 会计算一个介于零和 `innodb_spin_wait_delay` 之间的随机数。该数乘以 `innodb_spin_wait_pause_multiplier`\
  \ 来确定轮询循环中发生的 `PAUSE` 指令数量。随机数量的 `PAUSE` 事件用于减少缓存失效的影响。较小的值——甚至 0——在具有单一共享快速 CPU\
  \ 缓存的系统上可能有帮助。较大的值可以减少缓存失效的影响，特别是在多 CPU 系统上。\n\n*   `innodb_spin_wait_pause_multiplier`：与自旋等待延迟一起使用的乘数。此选项是\
  \ MySQL 8.0.16 新增的，旨在适应 Skylake 处理器一代引入的 `PAUSE` 指令持续时间的变化。更改此值的主要用途是在那些 `PAUSE`\
  \ 指令持续时间与 Skylake 之前一代的 x86/x86-64 不同的架构上使用 MySQL。在早期版本中，乘数是硬编码为 50 的，这也是 `innodb_spin_wait_pause_multiplier`\
  \ 的默认值。\n\n*   `innodb_sync_spin_loops`：在挂起线程之前要执行的自旋循环次数。该值越低，CPU 线程就能越快地用于其他任务，代价是更多的上下文切换。当超过自旋循环次数时，操作系统的读写锁等待计数器会增加。该值越高，锁就能越快地被获取，代价是更高的\
  \ CPU 使用率。默认值为 30。\n\n你很少需要调整这些设置；然而，在极少数情况下，它们可以在一定程度上改善性能。也就是说，如果你没有使用最新的 MySQL\
  \ 版本，通过升级而不是调整这些选项，可能在减少互斥锁/信号量争用方面获益更多。在所有情况下，如果你决定更改这些设置，请确保在与你的生产系统相同的架构和硬件配置上，并使用能很好代表生产工作负载的工作负载进行彻底的性能测试。\n\
  \n如果一个 InnoDB 互斥锁或读写锁信号量等待无法立即获得，InnoDB 也会在内部记录它。通过 `SHOW ENGINE INNODB MUTEX` 暴露的相关计数器会增加（尽管只显示至少有一次操作系统等待的互斥锁和读写锁），并且如果在等待正在进行时生成\
  \ InnoDB 监视器报告，它将被包含在报告的 `SEMAPHORES` 等待部分中。如果等待持续超过 240 秒且未检测到进展，InnoDB 将自动启用 InnoDB\
  \ 监视器并将输出写入错误日志，以便你调查问题。如果再过 600 秒仍未检测到进展，则 InnoDB 将作为预防措施关闭 MySQL，因为它假定发生了无法解决的情况。在这种情况下，你会看到一条解释关闭原因的错误，例如（是的，打印的时间有些误导，因为它是自“长信号量等待”条件在\
  \ 240 秒触发以来的时间）：\n\n```\n2020-07-05T09:30:24.151782Z 0 [ERROR] [MY-012872] [InnoDB]\
  \ Semaphore wait has lasted > 600 seconds. We intentionally crash the server because\
  \ it appears to be hung.\n```\n\n通过崩溃服务器，InnoDB 确保如果内部遇到 InnoDB 错误，情况会得到解决，但代价是\
  \ MySQL 必须重启并经历崩溃恢复。因此，这被认为是最后的手段，并且目前超时是不可配置的。\n\n注意\n\n执行 `CHECK TABLE` 时，超时阈值会增加到\
  \ 7200 秒（2 小时）。\n\n这样的关闭通常由以下两个原因之一引起：\n\n*   存在阻止 InnoDB 进展的硬件或操作系统问题。\n*   InnoDB\
  \ 中存在错误，例如，未检测到缓慢操作的进展，或者在获取互斥锁或信号量时发生了死锁。\n\n如果你遇到这样的关闭，请从错误日志中的 InnoDB 监视器输出验证等待发生的位置。在某些情况下，你可以使用线程\
  \ ID 来确定是哪个查询导致了等待。你还应该检查系统日志以验证硬件的健康状况以及操作系统层面是否有任何问题迹象。\n\n### 总结\n\n本章概述了当锁无法立即获得时会发生什么。首先描述了争用感知事务调度（CATS）算法。该算法在\
  \ MySQL 8 中使用，以允许已持有许多锁的事务更快地获得其锁请求，从而它们的锁也能更快地被释放。\n\n其次，讨论了 InnoDB 数据锁的兼容性是一个非常复杂的问题，这意味着在尝试重现问题时必须考虑锁的顺序。\n\
  \n本章的其余部分介绍了元数据、备份和 InnoDB 锁等待超时、死锁，以及 InnoDB 互斥锁和读写锁信号量等待。锁等待和死锁在高度并发的系统中自然会发生，其本身不应成为警报的原因。主要问题在于它们变得频繁时。默认的锁等待超时也可能过长，因此减少它们并处理超时可能是一个选择。\n\
  \n现在你已经了解了锁的工作原理以及锁请求可能失败的原因，你需要考虑如何减少锁的影响，这是下一章的主题。\n\n\n# 9. 减少锁定问题\n\n请记住，MySQL\
  \ 和 InnoDB 中的锁定是一种提供并发访问的手段。总体而言，InnoDB 的细粒度锁定机制支持高并发的工作负载。然而，如果存在过多的锁定，会导致并发性降低和查询堆积，在最坏的情况下，可能致使应用程序完全停滞，带来糟糕的用户体验。\n\
  \n因此，在编写应用程序以及为其数据和访问模式设计表结构时，考虑锁定因素至关重要。减少锁定的策略包括：添加索引、更改事务隔离级别、调整配置以及采用预防性锁定。本章将逐一介绍这些策略。\n\
  \n**提示**\n\n不要过度沉迷于锁定优化。如果只是偶尔遇到锁等待超时和死锁，通常更好的做法是重试查询或事务，而非花费精力去规避该问题。“过于频繁”的标准取决于您的工作负载，但对于许多应用程序而言，每小时几次的重试不会构成问题。\n\
  \n## 事务大小与存续时间\n\n减少锁定问题的一个重要策略是保持事务简短，并避免不必要的延迟导致事务长时间保持开启状态。锁定问题最常见的原因之一是修改大量行的事务，或是存续时间超出必要的事务。\n\
  \n事务的大小是指事务所执行的工作量，特别是其获取的锁的数量，但事务执行所需的时间同样重要。正如本讨论中其他部分将涉及的，您可以通过索引和事务隔离级别部分地减轻影响。然而，着眼于整体结果也很重要。如果您需要修改许多行，应自问是否可以将工作拆分为更小的批次，或者是否必须在同一个事务中完成所有操作。也可以将某些准备工作分离出来，在主事务之外完成。\n\
  \n事务的持续时间同样重要。一个常见的问题是连接使用了 `autocommit = 0`。这会在每次执行查询（包括 `SELECT`）时，如果没有活动事务，就会启动一个新事务，并且该事务直到执行了显式的\
  \ `COMMIT` 或 `ROLLBACK`、执行了 `DDL` 语句，或者连接关闭时才会结束。某些连接器默认禁用 `autocommit`，因此您可能在不自知的情况下使用了此模式，从而可能错误地让事务开启数小时。\n\
  \n**提示**\n\n除非有特定理由，否则请启用 `autocommit` 选项。当启用自动提交时，InnoDB 还能针对许多 `SELECT` 查询检测出其为只读事务，从而降低查询开销。\n\
  \n另一个陷阱是在事务活动期间，在应用程序中启动事务并执行缓慢操作。这可能是发送回用户的数据、交互式提示或文件 I/O。请确保在 MySQL 中没有活动事务开启时执行此类缓慢操作。\n\
  \n## 索引\n\n索引减少了访问特定行所需执行的工作量。因此，索引是减少锁定的绝佳工具，因为只有在执行查询时访问到的记录才会被锁定。\n\n考虑一个简单示例，您在\
  \ `world.city` 表中查询名为 Sydney 的城市：\n\n```\nSTART TRANSACTION;\nSELECT *\nFROM world.city\n\
  WHERE Name = 'Sydney'\nFOR SHARE;\n```\n\n`FOR SHARE` 选项用于强制查询对读取的记录获取共享锁。默认情况下，`Name`\
  \ 列上没有索引，因此查询将执行全表扫描来查找结果中所需的行。没有索引时，会产生 4103 个记录锁（其中 24 个锁位于主键的 supremum 伪记录上），如代码清单\
  \ 9-1 所示。\n\n```\n-- Connection   Processlist ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
  --          1              697        1143          6\n--          2           \
  \   698        1144          6\n-- Connection 1\nConnection 1> START TRANSACTION;\n\
  Query OK, 0 rows affected (0.0002 sec)\nConnection 1> SELECT ID, Name, CountryCode,\
  \ District\n    FROM world.city\n    WHERE Name = 'Sydney'\n    FOR SHARE;\n+-----+--------+-------------+-----------------+\n\
  | ID  | Name   | CountryCode | District        |\n+-----+--------+-------------+-----------------+\n\
  | 130 | Sydney | AUS         | New South Wales |\n+-----+--------+-------------+-----------------+\n\
  1 row in set (0.0034 sec)\n-- Connection 2\nConnection 2> SELECT index_name, lock_type,\n\
  \                  lock_mode, COUNT(*)\n              FROM performance_schema.data_locks\n\
  \              WHERE object_schema = 'world'\n                AND object_name =\
  \ 'city'\n                AND thread_id = 1143\n              GROUP BY index_name,\
  \ lock_type, lock_mode;\n+------------+-----------+-----------+----------+\n| index_name\
  \ | lock_type | lock_mode | COUNT(*) |\n+------------+-----------+-----------+----------+\n\
  | NULL       | TABLE     | IS        |        1 |\n| PRIMARY    | RECORD    | S\
  \         |     4103 |\n+------------+-----------+-----------+----------+\n2 rows\
  \ in set (0.0323 sec)\n-- Connection 1\nConnection 1> ROLLBACK;\nQuery OK, 0 rows\
  \ affected (0.0005 sec)\n代码清单 9-1\nName 列上无索引时的记录锁\n```\n\n如果您在 `Name` 列上添加索引，锁的总数将减少到三个记录锁，如代码清单\
  \ 9-2 所示。\n\n```\n-- Connection   Processlist ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
  --          1              699        1145          6\n--          2           \
  \   700        1146          6\n-- Connection 1\nConnection 1> ALTER TABLE world.city\n\
  \              ADD INDEX (Name);\nQuery OK, 0 rows affected (1.5063 sec)\nRecords:\
  \ 0  Duplicates: 0  Warnings: 0\nConnection 1> START TRANSACTION;\nQuery OK, 0 rows\
  \ affected (0.0003 sec)\nConnection 1> SELECT ID, Name, CountryCode, District\n\
  \    FROM world.city\n    WHERE Name = 'Sydney'\n    FOR SHARE;\n+-----+--------+-------------+-----------------+\n\
  | ID  | Name   | CountryCode | District        |\n+-----+--------+-------------+-----------------+\n\
  | 130 | Sydney | AUS         | New South Wales |\n+-----+--------+-------------+-----------------+\n\
  1 row in set (0.0004 sec)\n-- Connection 2\nConnection 2> SELECT index_name, lock_type,\n\
  \                  lock_mode, COUNT(*)\n              FROM performance_schema.data_locks\n\
  \              WHERE object_schema = 'world'\n                AND object_name =\
  \ 'city'\n                AND thread_id = 1145\n              GROUP BY index_name,\
  \ lock_type, lock_mode;\n+------------+-----------+---------------+----------+\n\
  | index_name | lock_type | lock_mode     | COUNT(*) |\n+------------+-----------+---------------+----------+\n\
  | NULL       | TABLE     | IS            |        1 |\n| Name       | RECORD   \
  \ | S             |        1 |\n| PRIMARY    | RECORD    | S,REC_NOT_GAP |     \
  \   1 |\n| Name       | RECORD    | S,GAP         |        1 |\n+------------+-----------+---------------+----------+\n\
  4 rows in set (0.0011 sec)\n-- Connection 1\nConnection 1> ROLLBACK;\nQuery OK,\
  \ 0 rows affected (0.0004 sec)\nConnection 1> ALTER TABLE world.city\n         \
  \     DROP INDEX Name;\nQuery OK, 0 rows affected (0.3288 sec)\nRecords: 0  Duplicates:\
  \ 0  Warnings: 0\n代码清单 9-2\nName 列上有索引时的记录锁\n```\n\n另一方面，更多的索引提供了更多访问相同行的方式，这可能会增加\
  \ **死锁** 的数量。\n\n\n\n## 记录访问顺序\n\n确保尽可能为不同的事务以相同的顺序访问记录。在第 8 章讨论的死锁示例中，导致死锁的原因是两个事务以相反的顺序访问行。如果它们以相同的顺序访问行，就不会发生死锁。这也适用于访问不同表中的记录。\n\
  \n确保相同的访问顺序绝非易事。不同的访问顺序甚至可能在您执行连接时发生，优化器为两个查询决定使用不同的连接顺序。如果不同的连接顺序导致过多的锁问题，您可以考虑使用优化器提示来告诉优化器更改连接顺序^(⁴)，但在这种情况下，您当然也应该考虑查询性能。\n\
  \n## 事务隔离级别\n\nInnoDB 支持多种事务隔离级别。不同的隔离级别有不同的锁需求：特别是 `REPEATABLE READ` 和 `SERIALIZABLE`\
  \ 比 `READ COMMITTED` 需要更多的锁。\n\n`READ COMMITTED` 事务隔离级别可以在两个方面帮助解决锁定问题。采用的间隙锁要少得多，并且在\
  \ DML 语句期间访问但未修改的行，其锁会在语句完成后再次释放。对于 `REPEATABLE READ` 和 `SERIALIZABLE`，锁只在事务结束时释放。\n\
  \n注意\n\n通常认为 `READ COMMITTED` 事务隔离级别不采用间隙锁。这是一个误解，并不正确。虽然采用的间隙锁少得多，但仍然需要一些。例如，这包括\
  \ InnoDB 检查外键和唯一键约束时，以及发生页面拆分时。\n\n考虑一个示例，其中使用 `CountryCode` 列将查询限制到一个国家，来更改名为 Sydney\
  \ 的城市的人口。可以使用以下查询完成：\n\n```sql\nSTART TRANSACTION;\nUPDATE world.city\nSET Population\
  \ = 5000000\nWHERE Name = 'Sydney'\nAND CountryCode = 'AUS';\n```\n\n`Name` 列上没有索引，但\
  \ `CountryCode` 列上有索引。因此，更新需要扫描部分 `CountryCode` 索引。清单 9-3 展示了在 `REPEATABLE READ`\
  \ 事务隔离级别下执行查询的示例。\n\n```sql\n-- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              701        1149          6\n--          2           \
  \   702        1150          6\n-- 连接 1\nConnection 1> SET SESSION transaction_isolation\
  \ = 'REPEATABLE-READ';\nQuery OK, 0 rows affected (0.2697 sec)\nConnection 1> START\
  \ TRANSACTION;\nQuery OK, 0 rows affected (0.0007 sec)\nConnection 1> UPDATE world.city\n\
  SET Population = 5000000\nWHERE Name = 'Sydney'\nAND CountryCode = 'AUS';\nQuery\
