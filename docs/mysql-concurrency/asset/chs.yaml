  \ 1\ntrx_foreign_key_checks: 1\ntrx_last_foreign_key_error: NULL\ntrx_adaptive_hash_latched:\
  \ 0\ntrx_adaptive_hash_timeout: 0\ntrx_is_read_only: 0\ntrx_autocommit_non_locking:\
