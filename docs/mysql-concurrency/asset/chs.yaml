  mysqlsh\\`\n2.  `%MYSQLSH_HOME%\\shared\\mysqlsh\\`\n3.  `<mysqlsh 二进制文件路径>\\`\n\
  4.  `%APPDATA%\\MySQL\\mysqlsh\\`\n\n在 Linux 和 Unix 上：\n\n1.  `/etc/mysql/mysqlsh/`\n\
  2.  `$MYSQLSH_HOME/shared/mysqlsh/`\n3.  `<mysqlsh 二进制文件路径>/`\n4.  `$HOME/.mysqlsh/`\n\
  \n这四个路径总是会被搜索，如果文件在多个位置被找到，每个文件都将被执行。这意味着，如果文件影响了相同的变量，则最后找到的文件具有优先权。如果你要进行个人更改，最佳位置是第四个路径。第\
  \ 4 步中的路径可以通过 `MYSQLSH_USER_CONFIG_HOME` 环境变量来覆盖。\n\n你需要确保 `mysqlshrc.py` 文件将包含该模块的目录添加到\
  \ Python 搜索路径中，并且可以选择性地添加一条 `import` 语句，以便在启动 MySQL Shell 时使该模块可用。一个 `mysqlshrc.py`\
  \ 文件的例子是：\n\n```\nimport sys\nsys.path.append('C:\\\\Book\\\\mysql-concurrency')\n\
  import concurrency_book.generate\n```\n\n双反斜杠适用于 Windows；在 Linux 和 Unix 上，你不需要转义分隔路径元素的斜杠。如果你没有在\
  \ `mysqlshrc.py` 文件中包含 `import` 语句，则需要在使用该模块之前在 MySQL Shell 中执行它。\n\n### 获取信息\n\n\
  该模块包含两个返回有关如何使用模块信息的方法。一个是 `help()` 方法，它提供有关如何使用模块的信息：\n\n```\nmysql-py> concurrency_book.generate.help()\n\
  ```\n\n还有 `show()` 方法，它列出了 `run()` 方法可以执行的工作负载以及 `load()` 方法可以加载的模式：\n\n```\nmysql-py>\
  \ concurrency_book.generate.show()\n```\n\n工作负载的名称与书中的代码清单相对应，例如，名为 \"Listing 6-1\"\
  \ 的工作负载实现了清单 6-1 中的示例。\n\n在你开始执行工作负载之前，你需要加载一些测试数据，该模块也可以为你完成这项工作。\n\n\n\n### 加载测试数据\n\
  \n`concurrency_book.generate` 模块支持将 `employees`、`sakila` 和 `world` 示例数据库加载到你的 MySQL\
  \ 实例中。对于 `employees` 数据库，你可以选择带有分区的版本。`world` 数据库对本书最为重要，其次是 `sakila` 数据库。`employees`\
  \ 数据库仅在第 18 章的案例研究中使用。本章稍后将更详细地描述这三种模式。\n\n注意：如果模式已存在，它将作为加载任务的一部分被删除。这实际上意味着 `load()`\
  \ 会重置模式。\n\n你使用 `load()` 方法加载模式，该方法可选地接受你想要加载的模式的名称。如果未提供模式名称，系统将提示你输入。清单 1-1 展示了加载\
  \ `world` 模式的示例。\n\n```\nmysql-py> concurrency_book.generate.load()\nAvailable Schema\
  \ load jobs:\n===========================\n# Name                   Description\n\
  \n1 employees              The employee database\n2 employees partitioned  The employee\
  \ database with partitions\n3 sakila                 The sakila database\n4 world\
  \                  The world database\nChoose Schema load job (# or name - empty\
  \ to exit): 4\n2020-07-20 21:27:15.221340  0 [INFO] Downloading https://downloads.mysql.com/docs/world.sql.zip\
  \ to C:\\Users\\myuser\\AppData\\Roaming\\mysql_concurrency_book\\sample_data\\\
  world.sql.zip\n2020-07-20 21:27:18.159554  0 [INFO] Processing statements in world.sql\n\
  2020-07-20 21:27:27.045219  0 [INFO] Load of the world schema completed\nAvailable\
  \ Schema load jobs:\n===========================\n# Name                   Description\n\
  \n1 employees              The employee database\n2 employees partitioned  The employee\
  \ database with partitions\n3 sakila                 The sakila database\n4 world\
  \                  The world database\nChoose Schema load job (# or name - empty\
  \ to exit):\n清单 1-1\n加载 world 模式\n```\n\n`load()` 方法会下载包含模式定义的文件，如果该文件尚不存在。下载的文件在\
  \ Microsoft Windows 上存储在 `%APPDATA\\mysql_concurrency_book\\sample_data\\`，在其他平台上存储在\
  \ `${HOME}/.mysql_concurrency_book/sample_data/`。如果你想重新下载文件，请从该目录中删除它。\n\n提示：由于\
  \ MySQL Shell 的 Python 环境仅提供相对低级的网络例程，如果你的连接速度慢或不稳定，下载员工数据库可能会失败。一个选择是——除了手动安装模式外——下载\
  \ [`https://github.com/datacharmer/test_db/archive/master.zip`](https://github.com/datacharmer/test_db/archive/master.zip)\
  \ 并将其保存到 `sample_data` 目录中。之后，`load()` 方法将使用它，而不会再次尝试下载。\n\n如果你只想加载单个模式，可以将名称作为参数指定给\
  \ `load()`。这在通过命令行直接调用 MySQL Shell 时以命令形式启动模式加载时尤其有用，例如：\n\n```\nshell> mysqlsh\
  \ --user=myuser --py -e \"concurrency_book.generate.load('world')\"\n```\n\n当你加载完所有需要的模式后，可以回复空答案以退出。现在你已准备好执行工作负载。\n\
  \n注意：如果加载过程因文件问题而崩溃，例如提示文件不是 ZIP 文件，则表明文件已损坏或不完整。在这种情况下，请删除文件以便重新下载，或尝试使用浏览器手动下载文件。\n\
  \n### 执行工作负载\n\n你使用 `run()` 方法执行工作负载。如果指定了已知工作负载的名称，该工作负载将立即执行。否则，将列出可用的工作负载，并提示你选择。在这种情况下，你可以通过编号（例如，清单\
  \ 6-1 对应 15）或名称来指定工作负载。使用名称时，`Listing` 和清单编号之间的空格数量无关紧要，只要至少有一个空格即可。当你通过提示选择工作负载时，可以在前一个工作负载完成后选择另一个。\n\
  \n工作负载完成后，对于其中几个工作负载，系统会提供一个可以进行的调查建议列表。例如，可能是查询示例中使用的连接持有的锁。这些调查旨在提供启发，鼓励你使用自己的查询探索工作负载。部分调查也在示例讨论中使用。清单\
  \ 1-2 展示了使用提示执行工作负载的示例。\n\n```\nmysql-py> concurrency_book.generate.run()\nAvailable\
  \ workloads:\n====================\n# Name                   Description\n\n1 Listing\
  \  2-1           Example use of the metadata_locks table\n2 Listing  2-2       \
  \    Example of using the table_handles table\n3 Listing  2-3           Using the\
  \ data_locks table\n...\n14 Listing  5-2           Example of obtaining exclusive\
  \ locks\n15 Listing  6-1           A deadlock for user-level locks\n...\nChoose\
  \ workload (# or name - empty to exit): 15\nPassword for connections: ********\n\
  2020-07-20 20:50:41.666488  0 [INFO] Starting the workload Listing 6-1\n****************************************************\n\
  *                                                  *\n*   Listing 6-1. A deadlock\
  \ for user-level locks   *\n*                                                  *\n\
  ****************************************************\n-- Connection   Processlist\
  \ ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
  --          1              105         249          6\n--          2           \
  \   106         250          6\n-- Connection 1\nConnection 1> SELECT GET_LOCK('my_lock_1',\
  \ -1);\n+---------------------------+\n| GET_LOCK('my_lock_1', -1) |\n+---------------------------+\n\
  |                         1 |\n+---------------------------+\n1 row in set (0.0003\
  \ sec)\n-- Connection 2\nConnection 2> SELECT GET_LOCK('my_lock_2', -1);\n+---------------------------+\n\
  | GET_LOCK('my_lock_2', -1) |\n+---------------------------+\n|                \
  \         1 |\n+---------------------------+\n1 row in set (0.0003 sec)\nConnection\
  \ 2> SELECT GET_LOCK('my_lock_1', -1);\n-- Connection 1\nConnection 1> SELECT GET_LOCK('my_lock_2',\
  \ -1);\nERROR: 3058: Deadlock found when trying to get user-level lock; try rolling\
  \ back transaction/releasing locks and restarting lock acquisition.\nAvailable investigations:\n\
  =========================\n# Query\n\n\n\n## MySQL Shell 工作负载演示\n\n选择一个工作负载后，系统将提示您输入密码。此密码对应您正在使用的\
  \ MySQL 账户。其他连接选项取自 MySQL Shell 中的 `session.uri` 属性，但出于安全原因，密码不会被存储。如果在一次 `run()`\
  \ 调用中执行多个工作负载，系统只会提示您输入一次密码。\n\n在工作负载执行开始时，会有一个概览，展示进程列表 ID（来自 `SHOW PROCESSLIST`）、（Performance\
  \ Schema）线程 ID 以及每个工作负载连接在工作负载开始前的最后一个事件 ID：\n\n```\n-- Connection   Processlist\
  \ ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
  --          1              105         249          6\n--          2           \
  \   106         250          6\n```\n\n您可以使用这些 ID 来执行自己的调查查询，并可以利用此概览来识别那些已在 `concurrency_book.generate.run()`\
  \ 中实现为工作负载的列表。\n\n在此示例执行结束时，有三个查询可供您执行，以调查该示例所演示的问题。您可以通过指定查询编号（一次一个）来执行其中的一个或多个。在本书的代码列表中，调查结果之前会有一条注释，说明执行的是哪个调查，例如：\n\
  \n```\n-- Investigation #2\n```\n\n每个工作负载的调查数量从零到十几个不等。本书中的列表并不总是包含所有调查的结果，因为有些被留作灵感启发和对该问题的进一步检查。\n\
  \n完成调查后，提交一个空答案以退出工作负载。如果不想执行更多工作负载，再次提交一个空答案以退出 `run()` 方法。\n\n如果只想执行单个工作负载，可以将名称作为参数指定给\
  \ `run()`。这在直接在命令行上调用 MySQL Shell 时作为命令执行工作负载时尤其有用，例如：\n\n```\nshell> mysqlsh --user=myuser\
  \ --py -e \"concurrency_book.generate.run('Listing 6-1')\"\n```\n\n本章的剩余部分描述了本书示例中使用的三个模式。\n\
  \n## 测试数据：The world 模式\n\n`world` 示例数据库是最常用的简单测试数据库之一。它由包含几百到几千行的三个表组成。这使得它成为一个小型数据集，即使在小的测试实例上也可以轻松使用。\n\
  \n### 模式\n\n该数据库包含 `city`、`country` 和 `countrylanguage` 表。表之间的关系如图 1-3 所示。\n\n![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig3_HTML.jpg](img/502546_1_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3\n`world` 数据库\n\n`country` 表包含 239 个国家的信息，并作为 `city` 和 `countrylanguage`\
  \ 表中来自外键的父表。数据库中总共有 4079 个城市和 984 个国家与语言的组合。\n\n\n### 安装\n\n你可以从 [`https://dev.mysql.com/doc/index-other.html`](https://dev.mysql.com/doc/index-other.html)\
  \ 下载一个包含表定义和数据的文件。Oracle 在该页面的“示例数据库”部分提供了多个示例数据库的访问，如图 1-4 所示。\n\n![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig4_HTML.jpg](img/502546_1_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4\n\n包含指向示例数据库链接的表格\n\n下载的文件是一个单独的文件，名为 `world.sql.gz` 或 `world.sql.zip`，具体取决于你选择的是\
  \ Gzip 还是 ZIP 链接。无论哪种情况，下载的压缩包都包含一个单独的文件 `world.sql`。数据的安装很简单，只需要执行该脚本即可。\n\n你可以从\
  \ MySQL Shell 或 `mysql` 命令行客户端 source（导入） `world.sql`。在 MySQL Shell 中，你可以使用 `\\\
  source` 命令来加载数据：\n\n```\nMySQL [localhost ssl] SQL> \\source world.sql\n```\n\n\
  如果你使用传统的 `mysql` 命令行客户端，则请改用 `SOURCE` 命令：\n\n```\nmysql> SOURCE world.sql\n```\n\
  \n在任何一种情况下，如果 `world.sql` 文件不在你启动 MySQL Shell 或 `mysql` 的目录中，请添加该文件的路径。\n\n如果你更喜欢使用图形用户界面（GUI），那么你也可以使用\
  \ MySQL Workbench 来加载 `world` 数据库。在连接到你想要加载 `world` 模式的 MySQL 实例后，你点击菜单中的“文件”，然后选择“运行\
  \ SQL 脚本”，如图 1-5 所示。\n\n![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig5_HTML.jpg](img/502546_1_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5\n\n从 MySQL Workbench 运行 SQL 脚本\n\n这将打开一个文件浏览器，你可以在其中浏览文件。导航到你保存了解压缩的 `world.sql`\
  \ 文件的目录并选择它。结果是如图 1-6 所示的对话框，你可以在其中查看脚本的前部分内容，并可选择设置默认模式名称和字符集。\n\n![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig6_HTML.jpg](img/502546_1_En_1_Fig6_HTML.jpg)\n\
  \n图 1-6\n\n用于检查脚本的 MySQL Workbench 对话框\n\n对于 `world` 模式，模式名称和字符集都已包含在脚本中，因此无需（且设置也没有效果）设置这些选项。点击“运行”以执行脚本。一个对话框会显示\
  \ MySQL 执行脚本时的进度信息。操作完成后，关闭该对话框。你也可以通过点击如图 1-7 所示的两个追逐的箭头来刷新侧边栏中的模式列表。\n\n![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig7_HTML.jpg](img/502546_1_En_1_Fig7_HTML.jpg)\n\
  \n图 1-7\n\n点击两个箭头来刷新模式列表\n\n虽然 `world` 模式因其简单性和小尺寸而非常适合许多测试，但这也限制了它的实用性，有时需要更复杂一些的数据库。\n\
  \n## 测试数据：sakila 模式\n\n`sakila` 数据库是一个真实的数据库，它包含一个电影租赁业务的模式，其中有电影、库存、商店、员工和客户的信息。它添加了全文索引、空间索引、视图和存储程序，以提供一个使用\
  \ MySQL 功能的更完整的示例。数据库规模仍然非常适中，使其适用于小型实例。\n\n### 模式\n\n`sakila` 数据库由 16 张表、七个视图、三个存储过程、三个存储函数和六个触发器组成。这些表可以分为三组：客户数据、业务数据和库存数据。为简洁起见，图表中并未包含所有列，且大多数索引也未显示。图\
  \ 1-8 展示了表、视图和存储例程的完整概览。\n\n![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig8_HTML.jpg](img/502546_1_En_1_Fig8_HTML.jpg)\n\
  \n图 1-8\n\n`sakila` 数据库概览\n\n包含客户相关数据（以及员工和商店的地址）的表位于左上角区域。左下角区域包含与业务相关的数据，右上角区域包含有关电影和库存的信息。右下角用于视图和存储例程。\n\
  \n**提示**\n\n你可以通过在 MySQL Workbench 中打开安装包中包含的 `sakila.mwb` 文件来查看整个图表（尽管格式不同）。这也是一个很好的例子，展示了如何在\
  \ MySQL Workbench 中使用增强实体关系图（EER）来记录你的模式。\n\n由于对象数量相对较多，在讨论模式时，它们将被分为五组（每个表组、视图和存储例程）。第一组是客户相关数据，其表如图\
  \ 1-9 所示。\n\n![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig9_HTML.jpg](img/502546_1_En_1_Fig9_HTML.jpg)\n\
  \n图 1-9\n\n`sakila` 数据库中包含客户数据的表\n\n有四张表包含与客户相关的数据。客户表是主表，地址信息存储在地址、城市和国家表中。\n\n\
  客户组和业务组之间存在外键关系，即客户表有一个指向业务组中商店表的外键。此外，从业务组的表到地址和客户表还有四个外键。业务组如图 1-10 所示。\n\n![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig10_HTML.jpg](img/502546_1_En_1_Fig10_HTML.jpg)\n\
  \n图 1-10\n\n`sakila` 数据库中包含业务数据的表\n\n业务表包含有关商店、员工、租赁和付款的信息。商店和员工表之间存在双向的外键关系：员工属于一个商店，而商店的经理是员工的一部分。租赁和付款由一名员工处理，因此间接链接到商店，而付款是针对一次租赁的。\n\
  \n业务表组是与其他组关系最多的组。员工和商店表有指向地址表的外键，租赁和付款表引用客户表。最后，租赁表有一个指向库存组中库存表的外键。库存组的图表如图 1-11\
  \ 所示。\n\n![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig11_HTML.jpg](img/502546_1_En_1_Fig11_HTML.jpg)\n\
  \n图 1-11\n\n`sakila` 数据库中包含库存数据的表\n\n库存组中的主表是电影表，它包含有关商店提供的电影的元数据。此外，还有 `film_text`\
  \ 表，其中包含带有全文索引的标题和描述。\n\n电影表与类别和演员表之间存在多对多关系。最后，库存表有一个指向业务组中商店表的外键。\n\n以上涵盖了 `sakila`\
  \ 数据库中的所有表，但也存在一些视图，如图 1-12 所示。\n\n![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig12_HTML.jpg](img/502546_1_En_1_Fig12_HTML.jpg)\n\
  \n图 1-12\n\n\n### `sakila` 数据库中的视图\n\n这些视图可以像报表一样使用，并可分为两类。`film_list`、`nicer_but_slower_film_list`\
  \ 和 `actor_info` 视图与数据库中存储的影片相关。第二类则包含与商店相关的信息，对应的视图有 `sales_by_store`、`sales_by_film_category`、`staff_list`\
  \ 和 `customer_list`。\n\n为了完善该数据库，还包含如图 1-13 所示的存储函数和存储过程。\n\n![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig13_HTML.jpg](img/502546_1_En_1_Fig13_HTML.jpg)\n\
  \n图 1-13：`sakila` 数据库中的存储例程\n\n`film_in_stock()` 和 `film_not_in_stock()` 过程根据影片是否有库存，返回包含给定影片和商店的库存\
  \ ID 的结果集。找到的库存条目总数将作为输出参数返回。`rewards_report()` 过程根据上个月的最低消费额生成报告。\n\n`get_customer_balance()`\
  \ 函数返回给定日期某个客户的余额。剩下的两个函数用于检查库存 ID 的状态：`inventory_held_by_customer()` 返回当前租用该物品的客户\
  \ ID（如果没有客户租用则返回 `NULL`）；而如果你想检查某个给定的库存 ID 是否有货，可以使用 `inventory_in_stock()` 函数。\n\
  \n### 安装\n\n你可以从 [`https://dev.mysql.com/doc/index-other.html`](https://dev.mysql.com/doc/index-other.html)\
  \ 下载包含安装脚本的文件来安装 `sakila` 模式，就像安装 `world` 数据库一样。\n\n下载的文件解压后会得到一个目录，内含三个文件：其中两个用于创建模式和数据，最后一个文件包含\
  \ MySQL Workbench 使用的 ETL 图表。\n\n**注意：** `sakila` 数据库也随 `employees` 数据库的下载包提供；然而，本节以及本书后续的示例使用的是从\
  \ MySQL 主页下载的 `sakila` 数据库副本。\n\n这些文件是：\n\n*   **sakila-data.sql：** 用于填充表的 `INSERT`\
  \ 语句以及触发器定义。\n*   **sakila-schema.sql：** 模式定义语句。\n*   **sakila.mwb：** MySQL Workbench\
  \ ETL 图表。这类似于图 1-7 所示，详细信息见图 1-8 至 1-12。\n\n安装 `sakila` 数据库时，首先需要 `source` `sakila-schema.sql`\
  \ 文件，然后 `source` `sakila-data.sql` 文件。例如，下面使用的是 MySQL Shell：\n\n```\nMySQL [localhost+\
  \ ssl] SQL> \\source sakila-schema.sql\nMySQL [localhost+ ssl] SQL> \\source sakila-data.sql\n\
  ```\n\n如果文件不在当前目录，请添加文件的路径。\n\n## 测试数据：`employees` 模式\n\n`employees` 数据库（在 MySQL\
  \ 文档下载页面上称为员工数据；GitHub 仓库名为 `test_db`）最初由 Fusheng Wang 和 Carlo Zaniolo 创建，是从 MySQL\
  \ 主页链接的测试数据集中最大的一个。它提供了使用非分区表或对其中两个最大表进行分区的选项。数据文件的总大小对于非分区版本约为 180 MiB，对于分区版本约为\
  \ 440 MiB。\n\n### 模式\n\n`employees` 数据库由六个表和两个视图组成。你可以选择再安装两个视图、五个存储函数和两个存储过程。这些表如图\
  \ 1-14 所示。\n\n![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig14_HTML.jpg](img/502546_1_En_1_Fig14_HTML.jpg)\n\
  \n图 1-14：`employees` 数据库中的表、视图和例程\n\n按照今天的标准，它仍然是一个相对较小的数据库，但它足够大，以至于你可以开始看到底层的争用现象，正因如此，它是在第\
  \ 18 章中用于引发信号量等待的模式。\n\n### 安装\n\n你可以下载包含安装所需文件的 ZIP 文件，或者克隆位于 [`https://github.com/datacharmer/test_db`](https://github.com/datacharmer/test_db)\
  \ 的 GitHub 仓库。在撰写本文时，只有一个名为 master 的分支。如果你下载了 ZIP 文件，它将解压到一个名为 `test_db-master`\
  \ 的目录中。\n\n有几个文件。与在 MySQL 8 中安装 `employees` 数据库相关的两个文件是 `employees.sql` 和 `employees_partitioned.sql`。区别在于\
  \ `salaries` 和 `titles` 表是否进行了分区。本书使用的是未分区模式。（还有一个 `employees_partitioned_5.1.sql`，适用于\
  \ MySQL 5.1，因为 `employees_partitioned.sql` 中使用的分区方案在 5.1 版本中不支持。）\n\n通过使用 `SOURCE`\
  \ 命令 `source` `.dump` 文件来加载数据，该命令仅在 MySQL Shell 8.0.19（由于一个错误，实际是 8.0.20）及更高版本中支持。转到包含源文件的目录，根据你是否想使用分区，选择\
  \ `employees.sql` 或 `employees_partitioned.sql` 文件，例如：\n\n```\nmysql> \\source employees.sql\n\
  ```\n\n导入需要一些时间，完成时会显示所用时长：\n\n```\n+---------------------+\n| data_load_time_diff\
  \ |\n+---------------------+\n| 00:02:50            |\n+---------------------+\n\
  1 row in set (0.0085 sec)\n```\n\n可选地，你可以通过 `source` `objects.sql` 文件来加载一些额外的视图和存储例程：\n\
  \n```\nmysql> \\source objects.sql\n```\n\n当你使用 `concurrency_book.generate.load()`\
  \ 方法加载 `employees` 模式时，`objects.sql` 文件总是会被包含在内。\n\n现在，你已准备好深入探索 MySQL 并发的世界。\n\n\
  ### 总结\n\n本章开启了理解 MySQL 并发的旅程，其中锁和事务是重要主题。首先讨论了为什么需要锁以及锁存在的不同级别。然后阐述了事务必须包含在讨论中，因为某些锁会持续到事务结束，并且事务隔离级别会影响锁的持续时间以及锁的数量。\n\
  \n本章的其余部分讨论了本书中如何使用示例，并介绍了重现测试用例所需的三组测试数据。为了更轻松地加载数据和执行测试用例，还介绍了用于 MySQL Shell 的\
  \ `concurrency_book.generate` 模块。\n\n下一章将讨论如何监控锁。\n\n# 2. 监控锁与互斥量\n\n监控对于了解系统中瓶颈发生的位置至关重要。你需要使用监控来确定争用的来源，并验证你所做的更改是否减少了争用。\n\
  \n本章及接下来的两章概述了性能模式（Performance Schema）中的锁与互斥量（mutex）监控、InnoDB 事务监控以及通用事务监控。本书的其余部分展示了如何使用这些监控资源来识别和调查争用的示例。特别是第\
  \ 13 至 18 章，在讨论案例研究时广泛使用了监控。\n\n在本章中，你将学习如何监控锁和互斥量。主要的资源是性能模式，将首先介绍它。接下来，讨论 `sys`\
  \ 模式中的现成报告。本章的后半部分涵盖状态指标、InnoDB 锁监控和 InnoDB 互斥量监控。\n\n**注意：** 如果你还不清楚各种锁和互斥量是什么，请不要担心。你将在后面通过使用本章讨论的监控源的示例中学习这些内容。\n\
  \n\n\n## 性能模式\n\n性能模式包含了除死锁外大部分可用的锁信息来源。你不仅可以直接使用性能模式中的锁信息，它还被用于 `sys` 模式中的两个与锁相关的视图。此外，你可以使用性能模式来调查底层同步对象，例如互斥锁。下面将首先展示如何调查元数据和表锁。\n\
  \n### 元数据与表锁\n\n元数据锁是高级别锁中最通用的一种，其支持范围广泛的锁，从全局读锁到像访问控制列表（ACL）这样的低级别锁。这些锁通过 `metadata_locks`\
  \ 表进行监控，该表包含了关于用户级锁、元数据锁等的信息。要记录信息，必须启用 `wait/lock/metadata/sql/mdl` 性能模式工具（在 MySQL\
  \ 8 中默认启用）。稍后会有一个示例说明如何启用工具。\n\n`metadata_locks` 表包含 11 列，总结在表 2-1 中。\n\n表 2-1：`performance_schema.metadata_locks`\
  \ 表\n\n| 列名 | 描述 |\n| --- | --- |\n| `OBJECT_TYPE` | 已持有锁的种类，例如全局读锁的 `GLOBAL`，表和视图的\
  \ `TABLE`。附录 A 包含了可能值的完整列表。 |\n| `OBJECT_SCHEMA` | 被锁定对象所属的模式。 |\n| `OBJECT_NAME`\
  \ | 被锁定对象的名称。 |\n| `COLUMN_NAME` | 对于列级锁，是被锁定列的列名。 |\n| `OBJECT_INSTANCE_BEGIN`\
  \ | 对象的内存地址。 |\n| `LOCK_TYPE` | 锁的访问级别，例如共享、排他或意向。附录 A 包含了可能值的完整列表。 |\n| `LOCK_DURATION`\
  \ | 锁的持有时间。支持的值有 `STATEMENT`、`TRANSACTION` 和 `EXPLICIT`。 |\n| `LOCK_STATUS` | 锁的状态。除了已授予和待处理状态外，还可以显示锁请求超时、成为牺牲品等。\
  \ |\n| `SOURCE` | 请求锁的源代码位置。 |\n| `OWNER_THREAD_ID` | 请求锁的线程的性能模式线程 ID。 |\n| `OWNER_EVENT_ID`\
  \ | 请求锁的事件的事件 ID。 |\n\n该表的主键是 `OBJECT_INSTANCE_BEGIN` 列。\n\n清单 2-1 展示了一个获取表元数据锁并在\
  \ `metadata_locks` 表中查询它的示例。对你来说，某些细节可能会有所不同。\n\n```\n-- 连接   进程列表 ID   线程 ID  \
  \ 事件 ID\n-- --------------------------------------------------\n--          1  \
  \             19          59          6\n-- 连接 1\nmysql> START TRANSACTION;\nQuery\
  \ OK, 0 rows affected (0.0003 sec)\nmysql> SELECT * FROM world.city WHERE ID = 130;\n\
  +-----+--------+-------------+-----------------+------------+\n| ID  | Name   |\
  \ CountryCode | District        | Population |\n+-----+--------+-------------+-----------------+------------+\n\
  | 130 | Sydney | AUS         | New South Wales |    3276207 |\n+-----+--------+-------------+-----------------+------------+\n\
  1 row in set (0.0005 sec)\nmysql> SELECT *\nFROM performance_schema.metadata_locks\n\
  WHERE OBJECT_TYPE = 'TABLE'\nAND OBJECT_SCHEMA = 'world'\nAND OBJECT_NAME = 'city'\n\
  AND OWNER_THREAD_ID = PS_CURRENT_THREAD_ID()\\G\n*************************** 1\\\
  . row ***************************\nOBJECT_TYPE: TABLE\nOBJECT_SCHEMA: world\nOBJECT_NAME:\
  \ city\nCOLUMN_NAME: NULL\nOBJECT_INSTANCE_BEGIN: 2639965404080\nLOCK_TYPE: SHARED_READ\n\
  LOCK_DURATION: TRANSACTION\nLOCK_STATUS: GRANTED\nSOURCE: sql_parse.cc:6162\nOWNER_THREAD_ID:\
  \ 59\nOWNER_EVENT_ID: 10\n1 row in set (0.0006 sec)\nmysql> ROLLBACK;\nQuery OK,\
  \ 0 rows affected (0.0006 sec)\n清单 2-1\nmetadata_locks 表使用示例\n```\n\n在这里你可以看到，这是在\
  \ `world.city` 表上的表级锁。它是一个共享读锁，因此其他连接可以并发地获取相同的锁。\n\n如果你想查明为什么一个连接在等待其锁请求被授予，你需要查询\
  \ `metadata_locks` 表，查找 `OBJECT_TYPE`、`OBJECT_SCHEMA` 和 `OBJECT_NAME` 与待处理锁相同且 `LOCK_STATUS`\
  \ 为 `GRANTED` 的行。也就是说，要找出所有待处理锁的情况以及是什么阻塞了它们，你需要一个对表进行自连接的查询：\n\n```\nSELECT OBJECT_TYPE,\
  \ OBJECT_SCHEMA, OBJECT_NAME,\nw.OWNER_THREAD_ID AS WAITING_THREAD_ID,\nb.OWNER_THREAD_ID\
  \ AS BLOCKING_THREAD_ID\nFROM performance_schema.metadata_locks w\nINNER JOIN performance_schema.metadata_locks\
  \ b\nUSING (OBJECT_TYPE, OBJECT_SCHEMA, OBJECT_NAME)\nWHERE w.LOCK_STATUS = 'PENDING'\n\
  AND b.LOCK_STATUS = 'GRANTED';\n```\n\n你可以选择性地连接其他性能模式表，例如 `events_statements_current`，以获取有关参与锁等待的连接的更多信息。或者，正如稍后将讨论的，对于表元数据锁，你可以使用\
  \ `sys.schema_table_lock_waits` 视图。\n\n一个较少使用的表是 `table_handles`，它保存了关于已打开表句柄的信息，包括当前锁定的表锁。必须启用\
  \ `wait/lock/table/sql/handler` 性能模式工具才能记录数据（这是默认设置）。可用的信息与 `metadata_locks` 表类似，清单\
  \ 2-2 展示了一个在 `world.city` 表上显式读锁的示例。对你来说，某些细节可能会有所不同。\n\n```\n-- 连接   进程列表 ID  \
  \ 线程 ID   事件 ID\n-- --------------------------------------------------\n--     \
  \     1               21          61          6\n-- 连接 1\nmysql> LOCK TABLE world.city\
  \ READ;\nQuery OK, 0 rows affected (0.0004 sec)\nmysql> SELECT *\nFROM performance_schema.table_handles\n\
  WHERE OBJECT_SCHEMA = 'world'\nAND OBJECT_NAME = 'city'\nAND OWNER_THREAD_ID = PS_CURRENT_THREAD_ID()\\\
  G\n*************************** 1\\. row ***************************\nOBJECT_TYPE:\
  \ TABLE\nOBJECT_SCHEMA: world\nOBJECT_NAME: city\nOBJECT_INSTANCE_BEGIN: 2639971828776\n\
  OWNER_THREAD_ID: 61\nOWNER_EVENT_ID: 8\nINTERNAL_LOCK: NULL\nEXTERNAL_LOCK: READ\
  \ EXTERNAL\n1 row in set (0.0013 sec)\nmysql> UNLOCK TABLES;\nQuery OK, 0 rows affected\
  \ (0.0004 sec)\n清单 2-2\n使用 table_handles 表的示例\n```\n\n`INTERNAL_LOCK` 列包含 SQL 级别的锁信息，例如非\
  \ InnoDB 表上的显式表锁，而 `EXTERNAL_LOCK` 则包含存储引擎级别的锁信息，包括所有表的显式表锁。\n\n与 `metadata_locks`\
  \ 表不同，你不能使用 `table_handles` 表来调查锁争用（但 `metadata_locks` 表也包含像本例中的显式表锁，因此你可以使用它）。\n\
  \n`metadata_locks` 和 `table_handles` 表涉及最高级别的锁。在锁粒度阶梯上的下一级是数据锁，它们有自己的表。\n\n\n\n\
  ### 数据锁\n\n#### 数据锁概述\n\n数据锁位于元数据锁和同步对象之间的中等层级。数据锁的特殊之处在于其类型多样，例如记录锁、间隙锁、插入意向锁等，它们之间以复杂的方式相互作用，如第\
  \ 7 章所述。这使得用于监控数据锁的表特别有用。\n\n数据锁信息被拆分为两张表：\n\n*   `data_locks`：此表包含 InnoDB 层级的表锁和记录锁的详细信息，显示当前所有已持有或等待中的锁。\n\
  *   `data_lock_waits`：与 `data_locks` 表类似，它显示与 InnoDB 相关的锁，但仅包括那些等待授予的锁，并提供了关于哪个线程阻塞了请求的信息。\n\
  \n您经常需要结合使用这两张表来查找有关锁等待的信息。\n\nMySQL 8 改变了锁监控表的工作方式。在 MySQL 5.7 及更早版本中，信息存储在信息模式（Information\
  \ Schema）的两个 InnoDB 特定视图 `INNODB_LOCKS` 和 `INNODB_LOCK_WAITS` 中。主要区别在于，Performance\
  \ Schema 表的设计是存储引擎无关的，并且始终提供所有锁的信息；而在 MySQL 5.7 及更早版本中，只暴露涉及锁等待的锁信息。所有锁始终可供调查，这使得\
  \ MySQL 8 的这些表对于学习锁机制更加有用。\n\n#### `data_locks` 表\n\n`data_locks` 表是包含每个锁详细信息的主表。该表有\
  \ 15 列，如表 2-2 所述。\n\n**表 2-2 `performance_schema.data_locks` 表**\n\n| 列名 | 描述 |\n\
  | --- | --- |\n| `ENGINE` | 数据的存储引擎。对于 MySQL Server，这始终是 InnoDB。 |\n| `ENGINE_LOCK_ID`\
  \ | 存储引擎使用的锁的内部 ID。不应依赖此 ID 具有特定格式。 |\n| `ENGINE_TRANSACTION_ID` | 存储引擎特定的事务 ID。对于\
  \ InnoDB，您可以使用此 ID 与`information_schema.INNODB_TRX`视图中的`trx_id`列进行连接。不应依赖此 ID 具有特定格式，且此\
  \ ID 在事务期间可能会发生变化。 |\n| `THREAD_ID` | 发出锁请求的线程在 Performance Schema 中的线程 ID。 |\n\
  | `EVENT_ID` | 发出锁请求的事件在 Performance Schema 中的事件 ID。您可以使用此 ID 与多个`events_%`表进行连接，以查找有关触发锁请求的更多信息。\
  \ |\n| `OBJECT_SCHEMA` | 锁请求对象的所属模式。 |\n| `OBJECT_NAME` | 锁请求对象的名称。 |\n| `PARTITION_NAME`\
  \ | 对于涉及分区的锁，分区的名称。 |\n| `SUBPARTITION_NAME` | 对于涉及子分区的锁，子分区的名称。 |\n| `INDEX_NAME`\
  \ | 对于涉及索引的锁，索引的名称。由于在 InnoDB 中一切都是索引，因此对于 InnoDB 表上的记录级锁，索引名称始终被设置。如果行被锁定，该值将为`PRIMARY`或`GEN_CLUST_INDEX`，具体取决于您是否有显式主键，或者表是否使用了隐藏的聚簇索引。\
  \ |\n| `OBJECT_INSTANCE_BEGIN` | 锁请求的内存地址。 |\n| `LOCK_TYPE` | 锁请求的级别。对于 InnoDB，可能的值是`TABLE`和`RECORD`。\
  \ |\n| `LOCK_MODE` | 使用的锁定模式。这包括是共享锁还是排他锁，以及锁的更精细细节，例如`REC_NOT_GAP`表示记录锁但非间隙锁。 |\n\
  | `LOCK_STATUS` | 锁是否处于等待中（`WAITING`）或已被授予（`GRANTED`）。 |\n| `LOCK_DATA` | 有关被锁定数据的信息。例如，可以是锁定索引记录的索引值。\
  \ |\n\n该表的主键是(`ENGINE_LOCK_ID`, `ENGINE`)。\n\n获取两个锁并查询`data_locks`表的示例如代码清单 2-3\
  \ 所示。诸如 ID 和内存地址之类的信息在您的环境中会有所不同。\n\n```sql\n-- 连接   Processlist ID   Thread ID\
  \   Event ID\n-- --------------------------------------------------\n--        \
  \  1               23          64          6\n-- 连接 1\nmysql> START TRANSACTION;\n\
  Query OK, 0 rows affected (0.0003 sec)\nmysql> SELECT *\nFROM world.city\nWHERE\
  \ ID = 130\nFOR SHARE;\n+-----+--------+-------------+-----------------+------------+\n\
  | ID  | Name   | CountryCode | District        | Population |\n+-----+--------+-------------+-----------------+------------+\n\
  | 130 | Sydney | AUS         | New South Wales |    3276207 |\n+-----+--------+-------------+-----------------+------------+\n\
  1 row in set (0.0068 sec)\nmysql> SELECT *\nFROM performance_schema.data_locks\n\
  WHERE THREAD_ID = PS_CURRENT_THREAD_ID()\\G\n*************************** 1. row\
  \ ***************************\nENGINE: INNODB\nENGINE_LOCK_ID: 2639727636640:3165:2639690712184\n\
  ENGINE_TRANSACTION_ID: 284114704347296\nTHREAD_ID: 64\nEVENT_ID: 10\nOBJECT_SCHEMA:\
  \ world\nOBJECT_NAME: city\nPARTITION_NAME: NULL\nSUBPARTITION_NAME: NULL\nINDEX_NAME:\
  \ NULL\nOBJECT_INSTANCE_BEGIN: 2639690712184\nLOCK_TYPE: TABLE\nLOCK_MODE: IS\n\
  LOCK_STATUS: GRANTED\nLOCK_DATA: NULL\n*************************** 2. row ***************************\n\
  ENGINE: INNODB\nENGINE_LOCK_ID: 2639727636640:1926:6:131:2639690709400\nENGINE_TRANSACTION_ID:\
  \ 284114704347296\nTHREAD_ID: 64\nEVENT_ID: 10\nOBJECT_SCHEMA: world\nOBJECT_NAME:\
  \ city\nPARTITION_NAME: NULL\nSUBPARTITION_NAME: NULL\nINDEX_NAME: PRIMARY\nOBJECT_INSTANCE_BEGIN:\
  \ 2639690709400\nLOCK_TYPE: RECORD\nLOCK_MODE: S,REC_NOT_GAP\nLOCK_STATUS: GRANTED\n\
  LOCK_DATA: 130\n2 rows in set (0.0018 sec)\nmysql> ROLLBACK;\nQuery OK, 0 rows affected\
  \ (0.0007 sec)\n```\n**代码清单 2-3 使用 `data_locks` 表**\n\n在此示例中，查询在`world.city`表上获取了一个插入意向（`IS`）锁，并在主键值\
  \ 130 上获取了一个共享（`S`）记录锁，但非间隙锁（`REC_NOT_GAP`）。\n\n#### `data_lock_waits` 表\n\n`data_lock_waits`\
  \ 表更简单，因为它只包含当前锁争用情况的基本信息，如表 2-3 所示。\n\n**表 2-3 `performance_schema.data_lock_waits`\
  \ 表**\n\n| 列名 | 描述 |\n| --- | --- |\n| `ENGINE` | 发生锁争用的存储引擎。 |\n| `REQUESTING_ENGINE_LOCK_ID`\
  \ | 等待中的锁的`ENGINE_LOCK_ID`。 |\n| `REQUESTING_ENGINE_TRANSACTION_ID` | 等待中的锁的`ENGINE_TRANSACTION_ID`。\
  \ |\n| `REQUESTING_THREAD_ID` | 等待中的锁的`THREAD_ID`。 |\n| `REQUESTING_EVENT_ID` |\
  \ 等待中的锁的`EVENT_ID`。 |\n| `REQUESTING_OBJECT_INSTANCE_BEGIN` | 等待中的锁的`OBJECT_INSTANCE_BEGIN`。\
  \ |\n| `BLOCKING_ENGINE_LOCK_ID` | 阻塞锁的`ENGINE_LOCK_ID`。 |\n| `BLOCKING_ENGINE_TRANSACTION_ID`\
  \ | 阻塞锁的`ENGINE_TRANSACTION_ID`。 |\n| `BLOCKING_THREAD_ID` | 阻塞锁的`THREAD_ID`。 |\n\
  | `BLOCKING_EVENT_ID` | 阻塞锁的`EVENT_ID`。 |\n| `BLOCKING_OBJECT_INSTANCE_BEGIN` |\
  \ 阻塞锁的`OBJECT_INSTANCE_BEGIN`。 |\n\n该表没有主键。其主要目的是提供一种简单的方法来确定涉及锁争用的等待和阻塞锁请求。然后，您可以使用`REQUESTING_ENGINE_TRANSACTION_ID`和`BLOCKING_ENGINE_TRANSACTION_ID`列与`data_locks`表以及其他表进行连接，以获取更多信息。`sys.innodb_lock_waits`视图就是一个很好的例子。\n\
  \n到目前为止，讨论的 Performance Schema 表都是针对由执行语句直接导致的锁。在高并发情况下，监控更底层的同步等待也很重要。\n\n\n\n\
  ### 同步等待\n\n#### 挑战与概述\n\n同步等待是最难监控的，原因有几个。它们发生得非常频繁，通常持续时间很短，并且监控它们会产生较高的开销。默认情况下，同步等待的检测\
  \ instrumentation 也是未启用的。\n\n#### 类别划分\n\n同步等待分为五类：\n\n*   **cond：** 用于线程间信号传递的条件变量。\n\
  *   **mutex：** 保护代码部分或其他资源的互斥点。\n*   **prlock：** 优先级读写锁。\n*   **rwlock：** 用于限制对特定变量并发访问的读写锁，例如，用于更改\
  \ `gtid_mode` 系统变量。\n*   **sxlock：** 共享独占读写锁。目前仅 InnoDB 使用，例如，用于提高 B 树搜索的可扩展性。\n\
  \n#### 监控配置\n\n同步等待的检测名称以 `wait/synch/` 开头，后接类别名称、等待所属的区域（如 `sql` 或 `innodb`）以及等待的名称。例如，保护\
  \ InnoDB 双写缓冲区的互斥锁的名称是 `wait/synch/mutex/innodb/dblwr_mutex`。\n\n您可以通过在 `performance_schema.setup_instruments`\
  \ 表中为要监控的检测项设置 `ENABLED` 列，以及可选地设置 `TIMED` 列来启用同步等待的检测。此外，您还需要在 `performance_schema.setup_consumers`\
  \ 中启用 `events_waits_current`，以及可选地启用 `events_waits_history` 和/或 `events_waits_history_long`。例如，要监控\
  \ InnoDB 双写缓冲区上的互斥锁：\n\n```sql\nmysql> UPDATE performance_schema.setup_instruments\n\
  SET ENABLED = 'YES',\nTIMED = 'YES'\nWHERE NAME = 'wait/synch/mutex/innodb/dblwr_mutex';\n\
  Query OK, 1 row affected (0.0011 sec)\nRows matched: 1  Changed: 1  Warnings: 0\n\
  mysql> UPDATE performance_schema.setup_consumers\nSET ENABLED = 'YES'\nWHERE NAME\
  \ = 'events_waits_current';\nQuery OK, 1 row affected (0.0005 sec)\nRows matched:\
  \ 1  Changed: 1  Warnings: 0\n```\n\n通常，最好在配置文件中启用同步检测项的监控，以确保从 MySQL 启动之初它们就被正确设置：\n\
  \n```ini\n[mysqld]\nperformance_schema_instrument = wait/synch/mutex/innodb/dblwr_mutex=ON\n\
  performance_schema_consumer_events_waits_current = ON\n```\n\n然后重启 MySQL。\n\n> **注意**\n\
  >\n> 在生产系统上启用同步等待检测及相应的消费者时要非常小心。这样做可能会导致开销过高，从而实际上造成服务中断。启用的检测项越多，开销就越高，监控干扰测量结果的可能性也越大，从而导致结论错误。\n\
  \n#### 监控表的使用\n\n现在您可以使用 `events_waits_%` 表中的任意一个来监控等待：\n\n*   **events_waits_current：**\
  \ 每个现有线程当前正在进行或最后完成的等待事件。这需要启用 `events_waits_current` 消费者。\n*   **events_waits_history：**\
  \ 每个现有线程最后十个（由 `performance_schema_events_waits_history_size` 选项决定）等待事件。这需要在 `events_waits_current`\
  \ 消费者之外，额外启用 `events_waits_history` 消费者。\n*   **events_waits_history_long：** 全局最后\
  \ 10,000 个（由 `performance_schema_events_waits_history_long_size` 选项决定）事件，包括已不存在的线程的事件。这需要在\
  \ `events_waits_current` 消费者之外，额外启用 `events_waits_history_long` 消费者。\n*   **events_waits_summary_by_account_by_event_name：**\
  \ 按账户（在 Performance Schema 中也称为 actor）的用户名和主机名分组的等待事件。\n*   **events_waits_summary_by_host_by_event_name：**\
  \ 按触发事件的账户主机名和事件名称分组的等待事件。\n*   **events_waits_summary_by_instance：** 按事件名称以及对象的内存地址（`OBJECT_INSTANCE_BEGIN`）分组的等待事件。这对于具有多个实例的事件很有用，可监控等待是否在各实例间均匀分布。例如表缓存互斥锁（`wait/synch/mutex/sql/LOCK_table_cache`）每个表缓存实例（`table_open_cache_instances`）都有一个对象。\n\
  *   **events_waits_summary_by_thread_by_event_name：** 当前存在的线程的等待事件，按线程 ID 和事件名称分组。\n\
  *   **events_waits_summary_by_user_by_event_name：** 按触发事件的账户用户名和事件名称分组的等待事件。\n*\
  \   **events_waits_summary_global_by_event_name：** 按事件名称分组的等待事件。此表可用于概览在特定类型事件上花费的等待时间。\n\
  \n鉴于同步等待通常持续时间极短且出现频繁，汇总表通常是使用 Performance Schema 调查等待最有用的工具。话虽如此，由于相关的等待检测项默认未启用，并且监控它们时开销相对较高，通常对于\
  \ InnoDB 互斥锁和信号量，会使用 InnoDB 监视器中的信号量部分或本章后面描述的 `SHOW ENGINE INNODB MUTEX` 语句。例外情况是当您想要调查特定的争用问题时。\n\
  \n使用 Performance Schema 进行锁分析的另一种有用方法是查询语句遇到的错误。\n\n\n### 语句和错误表\n\nPerformance\
  \ Schema 包含多个可用于调查所遇错误的表。由于获取锁失败（无论是由于超时还是死锁）会触发错误，因此您可以查询与锁相关的错误，以确定哪些语句、账户等受锁争用的影响最大。\n\
  \n在单个语句级别，您可以使用 `events_statements_current`、`events_statements_history` 和 `events_statements_history_long`\
  \ 表来查看是否发生了任何错误或特定错误。前两个表默认启用，而 `events_statements_history_long` 表需要您启用 `events_statements_history_long`\
  \ 消费者。代码清单 2-4 展示了一个锁等待超时的示例以及它如何显示在 `events_statements_history` 表中。\n\n```\n--\
  \ 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1               63         179          6\n--          2           \
  \    64         180          6\n-- 连接 1\nConnection 1> START TRANSACTION;\nQuery\
  \ OK, 0 rows affected (0.0003 sec)\nConnection 1> UPDATE world.city\nSET Population\
  \ = Population + 1\nWHERE ID = 130;\nQuery OK, 1 row affected (0.0011 sec)\nRows\
  \ matched: 1  Changed: 1  Warnings: 0\n-- 连接 2\nConnection 2> SET SESSION innodb_lock_wait_timeout\
  \ = 1;\nQuery OK, 0 rows affected (0.0003 sec)\nConnection 2> START TRANSACTION;\n\
  Query OK, 0 rows affected (0.0002 sec)\nConnection 2> UPDATE world.city\nSET Population\
  \ = Population + 1\nWHERE ID = 130;\nERROR: 1205: Lock wait timeout exceeded; try\
  \ restarting transaction\nConnection 2> SELECT thread_id, event_id,\nFORMAT_PICO_TIME(lock_time)\
  \ AS lock_time,\nsys.format_statement(SQL_TEXT) AS statement,\ndigest, mysql_errno,\n\
  returned_sqlstate, message_text, errors\nFROM performance_schema.events_statements_history\n\
  WHERE thread_id = PS_CURRENT_THREAD_ID()\nAND mysql_errno > 0\\G\n***************************\
  \ 1\\. row ***************************\nthread_id: 180\nevent_id: 10\nlock_time:\
  \ 271.00 us\nstatement: UPDATE world.city    SET Popul ... Population + 1  WHERE\
  \ ID = 130\ndigest: 3e9795ad6fc0f4e3a4b4e99f33fbab2dc7b40d0761a8adbc60abfab02326108d\n\
  mysql_errno: 1205\nreturned_sqlstate: HY000\nmessage_text: Lock wait timeout exceeded;\
  \ try restarting transaction\nerrors: 1\n1 row in set (0.0016 sec)\n-- 连接 1\nConnection\
  \ 1> ROLLBACK;\nQuery OK, 0 rows affected (0.0472 sec)\n-- 连接 2\nConnection 2> ROLLBACK;\n\
  Query OK, 0 rows affected (0.0003 sec)\n代码清单 2-4\n语句表中锁错误的示例\n```\n\n这个示例中有几点值得注意。首先是锁时间仅为\
  \ 271 微秒，尽管实际上在锁等待超时发生前等待了整整一秒钟。也就是说，在 InnoDB 内部等待记录锁并不会增加 Performance Schema 报告的锁时间，因此您不能用它来调查记录级锁争用。\n\
  \n其次是 `mysql_errno`、`returned_sqlstate` 和 `message_text` 包含了与返回给客户端相同的错误信息，这使得它非常适合进行查询，正如本例中所做的那样。第三，`errors`\
  \ 列包含了遇到的错误数量的计数。虽然计数本身并未说明错误的性质，但它很有用，因为与包含错误具体信息的列不同，错误计数器也存在于语句摘要表中，因此您可以使用它来查找遇到任何类型错误的语句。\n\
  \n**提示**\n\n在应用程序中记录遇到的错误会很有用。然后，例如，您可以使用像 Splunk 这样的服务分析应用程序日志，生成报告显示遇到了哪些错误以及它们何时成为问题。\n\
  \n在此上下文中，一组特别值得关注的摘要表是汇总错误的表。这样的表有五个，分别按账户、主机、线程、用户和全局进行分组：\n\n```\nmysql> SHOW\
  \ TABLES FROM performance_schema LIKE '%error%';\n+-------------------------------------------+\n\
  | Tables_in_performance_schema (%error%)    |\n+-------------------------------------------+\n\
  | events_errors_summary_by_account_by_error |\n| events_errors_summary_by_host_by_error\
  \    |\n| events_errors_summary_by_thread_by_error  |\n| events_errors_summary_by_user_by_error\
  \    |\n| events_errors_summary_global_by_error     |\n+-------------------------------------------+\n\
  5 rows in set (0.0012 sec)\n```\n\n例如，要检索锁等待超时和死锁的统计数据：\n\n```\nmysql> SELECT *\n\
  FROM performance_schema.events_errors_summary_global_by_error\nWHERE error_name\
  \ IN ('ER_LOCK_WAIT_TIMEOUT',\n'ER_LOCK_DEADLOCK')\\G\n***************************\
  \ 1\\. row ***************************\nERROR_NUMBER: 1205\nERROR_NAME: ER_LOCK_WAIT_TIMEOUT\n\
  SQL_STATE: HY000\nSUM_ERROR_RAISED: 4\nSUM_ERROR_HANDLED: 0\nFIRST_SEEN: 2020-06-28\
  \ 11:33:10\nLAST_SEEN: 2020-06-28 11:49:30\n*************************** 2\\. row\
  \ ***************************\nERROR_NUMBER: 1213\nERROR_NAME: ER_LOCK_DEADLOCK\n\
  SQL_STATE: 40001\nSUM_ERROR_RAISED: 3\nSUM_ERROR_HANDLED: 0\nFIRST_SEEN: 2020-06-27\
  \ 12:06:38\nLAST_SEEN: 2020-06-27 12:54:27\n2 rows in set (0.0048 sec)\n```\n\n\
  虽然这不能帮助您识别哪些语句遇到了错误，但它可以帮助您监控遇到错误的频率，从而确定锁错误是否变得更加频繁。\n\n**提示**\n\n`events_errors_summary_global_by_error`\
  \ 表从 MySQL 启动之时起，就填充了所有已知的错误，即使该错误尚未遇到。因此，您可以随时安全地查询特定错误，包括使用该表根据名称查找错误编号。\n\nPerformance\
  \ Schema 表中的数据是原始数据，无论是单个事件还是聚合数据。通常，当您调查锁问题或监控锁问题时，更重要的是确定是否存在任何锁等待，或者获取一个报告，显示等待事件中花费时间最多的部分。为此，您需要使用\
  \ `sys` 模式。\n\n## sys 模式\n\n`sys` 模式可以被视为一系列视图的集合，这些视图作为 Performance Schema 和 Information\
  \ Schema 的报告，以及各种实用函数和过程。对于本次讨论，重点放在两个视图上，它们获取 Performance Schema 表中的信息，并返回因为另一个锁而导致某个锁无法授予的锁对。因此，它们展示了锁等待存在问题的地方。这两个视图是\
  \ `innodb_lock_waits` 和 `schema_table_lock_waits`。\n\n`innodb_lock_waits` 视图使用 Performance\
  \ Schema 中的 `data_locks` 和 `data_lock_waits` 视图，返回所有 InnoDB 记录锁的锁等待情况。它显示诸如连接试图获取什么锁、涉及哪些连接和查询等信息。该视图也以\
  \ `x$innodb_lock_waits` 的形式存在，如果您需要未格式化的信息。\n\n`schema_table_lock_waits` 视图以类似的方式工作，但它使用\
  \ `metadata_locks` 表返回与模式对象相关的锁等待。该信息也可以在 `x$schema_table_lock_waits` 视图中以未格式化的形式获取。\n\
  \n**提示**\n\n还存在多个视图，其名称前加了 `x$`。该视图包含与不带 `x$` 的名称的视图相同的信息，只是所有数据都未格式化。这使得数据更适合处理信息的脚本和程序。\n\
  \n第 13 至 17 章包含了使用这两个视图调查锁问题的示例。\n\n为了获得争用情况的高级视图，您也可以使用状态计数器和 InnoDB 指标。\n\n##\
  \ 状态计数器与 InnoDB 指标\n\n有几个状态计数器和 InnoDB 指标可以提供与锁相关的信息。这些指标主要在全局（实例）级别使用，可用于检测锁问题的整体增长情况。\n\
  \n### 查询数据\n\n状态计数器和 InnoDB 指标有两个来源。全局状态计数器可以在 `performance_schema.global_status`\
  \ 表中找到，或者使用 `SHOW GLOBAL STATUS` 语句查询。InnoDB 指标则位于 `information_schema.INNODB_METRICS`\
  \ 视图中。\n\nInnoDB 指标与全局状态变量类似，可以提供关于 InnoDB 状态的一些有价值信息。`NAME` 列可用于按名称查询指标。在撰写本文时，共有\
  \ 313 个可见指标，其中 74 个默认启用。还有一个隐藏指标，即 `latch` 指标，用于控制是否收集互斥锁等待统计信息。指标按子系统（`SUBSYSTEM`\
  \ 列）分组，每个指标在 `COMMENT` 列中都有其测量内容的描述，指标类型（计数器、数值等）可在 `TYPE` 列中查看。\n\n监控所有这些指标的一个好方法是使用\
  \ `sys.metrics` 视图。清单 2-5 展示了一个检索指标的示例。\n\n```sql\n-- 连接   进程列表 ID   线程 ID   事件\
  \ ID\n-- --------------------------------------------------\n--          1     \
  \          27          69          6\n-- 连接 1\nmysql> SELECT Variable_name,\nVariable_value\
  \ AS Value,\nEnabled\nFROM sys.metrics\nWHERE Variable_name LIKE 'innodb_row_lock%'\n\
  OR Variable_name LIKE 'Table_locks%'\nOR Variable_name LIKE 'innodb_rwlock_%'\n\
  OR Type = 'InnoDB Metrics - lock';\n+-------------------------------+--------+---------+\n\
  | 变量名                        | 值     | 已启用  |\n+-------------------------------+--------+---------+\n\
  | innodb_row_lock_current_waits | 0      | YES     |\n| innodb_row_lock_time   \
  \       | 2163   | YES     |\n| innodb_row_lock_time_avg      | 721    | YES   \
  \  |\n| innodb_row_lock_time_max      | 2000   | YES     |\n| innodb_row_lock_waits\
  \         | 3      | YES     |\n| table_locks_immediate         | 330    | YES \
  \    |\n| table_locks_waited            | 0      | YES     |\n| lock_deadlock_false_positives\
  \ | 0      | YES     |\n| lock_deadlock_rounds          | 37214  | YES     |\n|\
  \ lock_deadlocks                | 1      | YES     |\n| lock_rec_grant_attempts\
  \       | 1      | YES     |\n| lock_rec_lock_created         | 0      | NO    \
  \  |\n| lock_rec_lock_removed         | 0      | NO      |\n| lock_rec_lock_requests\
  \        | 0      | NO      |\n| lock_rec_lock_waits           | 0      | NO   \
  \   |\n| lock_rec_locks                | 0      | NO      |\n| lock_rec_release_attempts\
  \     | 24317  | YES     |\n| lock_row_lock_current_waits   | 0      | YES     |\n\
  | lock_schedule_refreshes       | 37214  | YES     |\n| lock_table_lock_created\
  \       | 0      | NO      |\n| lock_table_lock_removed       | 0      | NO    \
  \  |\n| lock_table_lock_waits         | 0      | NO      |\n| lock_table_locks \
  \             | 0      | NO      |\n| lock_threads_waiting          | 0      | YES\
  \     |\n| lock_timeouts                 | 1      | YES     |\n| innodb_rwlock_s_os_waits\
  \      | 12248  | YES     |\n| innodb_rwlock_s_spin_rounds   | 19299  | YES    \
  \ |\n| innodb_rwlock_s_spin_waits    | 6811   | YES     |\n| innodb_rwlock_sx_os_waits\
  \     | 171    | YES     |\n| innodb_rwlock_sx_spin_rounds  | 5239   | YES     |\n\
  | innodb_rwlock_sx_spin_waits   | 182    | YES     |\n| innodb_rwlock_x_os_waits\
  \      | 26283  | YES     |\n| innodb_rwlock_x_spin_rounds   | 774745 | YES    \
  \ |\n| innodb_rwlock_x_spin_waits    | 12666  | YES     |\n+-------------------------------+--------+---------+\n\
  34 行于集 (0.0174 sec)\n```\n\n清单 2-5 锁指标\n\n其中，`innodb_row_lock_%`、`lock_deadlocks`\
  \ 和 `lock_timeouts` 指标最值得关注。行锁指标显示了当前有多少锁正在等待，以及等待获取 InnoDB 记录锁所花费的时间（以毫秒计）的统计数据。`lock_deadlocks`\
  \ 和 `lock_timeouts` 指标则分别显示了已遇到的死锁和锁等待超时的次数。\n\n如果你遇到 InnoDB 互斥锁或信号量争用，那么 `innodb_rwlock_%`\
  \ 指标对于监控等待发生的频率以及等待所花费的轮数非常有用。\n\n如你所见，并非所有指标都默认启用（这些全是 InnoDB 指标），因此让我们探讨一下如何启用和禁用来自\
  \ `INNODB_METRICS` 视图的指标。\n\n### 配置 InnoDB 指标\n\n可以配置 InnoDB 指标，以便选择启用哪些指标，并且可以重置统计数据。您可以使用全局系统变量来启用、禁用和重置指标：\n\
  \n*   `innodb_monitor_disable`：禁用一个或多个指标。\n*   `innodb_monitor_enable`：启用一个或多个指标。\n\
  *   `innodb_monitor_reset`：重置一个或多个指标的计数器。\n*   `innodb_monitor_reset_all`：重置所有统计数据，包括一个或多个指标的计数器、最小值和最大值。\n\
  \n可以根据需要开启和关闭指标，其当前状态可在 `INNODB_METRICS` 视图的 `STATUS` 列中找到。您需要将指标名称或以 `module_`\
  \ 为前缀的子系统名称指定为 `innodb_monitor_enable` 或 `innodb_monitor_disable` 变量的值，并且可以使用 `%`\
  \ 作为通配符。值 `all` 作为一个特殊值，会影响所有指标。\n\n**注意**\n当您指定一个模块时，只有当没有与该模块匹配的指标时，它才会按预期工作。不能指定模块的例子包括\
  \ `module_cpu`、`module_page_track` 和 `module_dblwr`。\n\n列表 2-6 展示了一个启用并使用所有匹配 `icp%`\
  \ 的指标（恰好是 `icp`（索引条件下推）子系统中的指标）的示例。查询指标后，再次使用子系统作为参数将其禁用。`COUNT` 的值取决于查询时的工作负载。\n\
  \n```sql\n-- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1               32          74          6\n-- 连接 1\nmysql> SET GLOBAL\
  \ innodb_monitor_enable = 'icp%';\nQuery OK, 0 rows affected (0.0003 sec)\nmysql>\
  \ SELECT NAME, SUBSYSTEM, COUNT, MIN_COUNT,\nMAX_COUNT, AVG_COUNT,\nSTATUS, COMMENT\n\
  FROM information_schema.INNODB_METRICS\nWHERE SUBSYSTEM = 'icp'\\G\n***************************\
  \ 1. row ***************************\nNAME: icp_attempts\nSUBSYSTEM: icp\nCOUNT:\
  \ 0\nMIN_COUNT: NULL\nMAX_COUNT: NULL\nAVG_COUNT: 0\nSTATUS: enabled\nCOMMENT: 索引下推条件检查的尝试次数\n\
  *************************** 2. row ***************************\nNAME: icp_no_match\n\
  SUBSYSTEM: icp\nCOUNT: 0\nMIN_COUNT: NULL\nMAX_COUNT: NULL\nAVG_COUNT: 0\nSTATUS:\
  \ enabled\nCOMMENT: 索引下推条件不匹配\n*************************** 3. row ***************************\n\
  NAME: icp_out_of_range\nSUBSYSTEM: icp\nCOUNT: 0\nMIN_COUNT: NULL\nMAX_COUNT: NULL\n\
  AVG_COUNT: 0\nSTATUS: enabled\nCOMMENT: 索引下推条件超出范围\n***************************\
  \ 4. row ***************************\nNAME: icp_match\nSUBSYSTEM: icp\nCOUNT: 0\n\
  MIN_COUNT: NULL\nMAX_COUNT: NULL\nAVG_COUNT: 0\nSTATUS: enabled\nCOMMENT: 索引下推条件匹配\n\
  4 rows in set (0.0011 sec)\nmysql> SET GLOBAL innodb_monitor_disable = 'module_icp';\n\
  Query OK, 0 rows affected (0.0004 sec)\n```\n列表 2-6 使用 INNODB_METRICS 视图\n\n首先，使用\
  \ `innodb_monitor_enable` 变量启用指标；然后检索其值。除了显示的值之外，还有一组带有 `_RESET` 后缀的列，当您设置 `innodb_monitor_reset`（仅重置计数器）或\
  \ `innodb_monitor_reset_all` 系统变量时，这些列会被重置。最后，指标再次被禁用。\n\n**注意**\n不同指标的开销不同，因此建议您在生产环境启用指标前，先使用您的工作负载进行测试。\n\
  \n### InnoDB 锁监控器和死锁日志记录\n\n长期以来，InnoDB 都有其自己的锁监控器，锁信息会在 InnoDB 监控器输出中返回。默认情况下，InnoDB\
  \ 监控器包含有关最新死锁以及涉及锁等待的锁的信息。通过启用 `innodb_status_output_locks` 选项（默认禁用），将列出所有锁；这类似于您在\
  \ Performance Schema 的 `data_locks` 表中看到的内容。\n\n为了演示死锁和事务信息，您可以按照列表 2-7 中的步骤创建一个死锁。\n\
