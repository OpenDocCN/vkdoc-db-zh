  \ (0.0035 sec)\n-- 连接 1\nConnection 1> ROLLBACK;\nQuery OK, 0 rows affected (0.0780\
  \ sec)\nConnection 1> SET SESSION transaction_isolation = @@global.transaction_isolation;\n\
  Query OK, 0 rows affected (0.0003 sec)\n清单 9-4\n在 READ-COMMITTED 事务隔离级别下持有的锁\n```\n\
  \n这里，记录锁减少到 `CountryCode` 索引和主键上各一个锁。没有间隙锁。\n\n并非所有工作负载都可以使用 `READ COMMITTED` 事务隔离级别。如果您必须使\
  \ `SELECT` 语句在同一事务中多次执行时返回相同的结果，或者使不同的查询对应于同一时间点，则必须使用 `REPEATABLE READ` 或 `SERIALIZABLE`。然而，在许多情况下，降低隔离级别是一个选项，并且您可以为不同的事务选择不同的隔离级别。如果您正在将应用程序从\
  \ Oracle DB 迁移，那么您已经在使用 `READ COMMITTED`，也可以在 MySQL 中使用它。\n\n## 配置\n\n直接影响锁定的配置选项并不多，但熟悉那些存在的选项是有益的，特别是因为有些选项会影响互斥锁和信号量争用的级别。本节介绍将资源拆分为多个分区、禁用\
  \ InnoDB 自适应哈希索引以及限制写锁的数量。\n\n\n\n### 资源分区\n\n互斥锁和信号量争用源于多个线程并发使用同一资源。一个简单但有效的减少争用的方法是将单一资源拆分成多个部分，这正是\
  \ InnoDB 缓冲池、InnoDB 自适应哈希索引和表缓存所采用的方式。表 9-1 展示了控制资源拆分为多少个实例的配置选项。\n\n**表 9-1** 控制资源实例数量的配置选项\n\
  \n| 选项 | 默认值 | 描述 |\n| --- | --- | --- |\n| `innodb_adaptive_hash_index_parts` |\
  \ 8 | 自适应哈希索引的分区数量。分区基于索引进行。 |\n| `innodb_buffer_pool_instances` | 1 或 8 | 缓冲池被拆分成的部分数量。如果缓冲池总大小小于\
  \ 1 GiB，则默认为 1，否则为 8（32 位 Windows 系统除外）。 |\n| `table_open_cache_instances` | 16\
  \ | 表缓存的部分数量。 |\n\n**注意** 对于以上三个选项，更改其值需要重启 MySQL。\n\n对于 InnoDB 缓冲池，默认实例数量取决于平台和缓冲池大小。如果总大小小于\
  \ 1 GiB，默认值为 1，否则为 8。对于 32 位 Windows 系统，大小低于 1.3 GiB 时默认为 1；否则，每个实例大小将被设为 128 MiB。最大实例数量为\
  \ 64。\n\n**注意** 您可能也听说过 `metadata_locks_hash_instances` 选项。此选项在 MySQL 5.7 中已被弃用，并在\
  \ MySQL 8.0.13 中移除。原因是元数据锁的实现发生了变化，使得该选项不再必要。\n\n如果资源的多个分区有助于减少争用，那么增加分区数量看似不假思索的选择。然而，事情并非如此简单，因为更多的分区也会引入开销。因此，需要在开销增加与资源锁争用减少之间取得平衡。在一个极端情况下——数据库从未执行超过单个并发查询——通常为每个资源仅使用一个分区更好。之所以说“通常”，是因为对于大型表缓存，多个分区在需要将表从缓存中淘汰时，有助于提高最近最少使用（LRU）算法的效率。\n\
  \n一般来说，分区数量不应超过 CPU 核心数量。话虽如此，默认值是一个很好的起点，最终，您需要根据您的系统和工作负载组合进行测试，以验证最佳设置。对于自适应哈希索引，您甚至可能需要完全禁用它。\n\
  \n### 禁用 InnoDB 自适应哈希索引\n\n自适应哈希索引功能在 InnoDB 内部自动工作。如果 InnoDB 检测到您频繁使用二级索引，并且自适应哈希索引已启用，它将动态为最常用的值构建哈希索引。该哈希索引完全存储在缓冲池中，因此在重启\
  \ MySQL 时不会持久化。如果 InnoDB 检测到内存可以更好地用于将更多页面加载到缓冲池，它会丢弃部分哈希索引。这就是所谓的“自适应”索引的含义：InnoDB\
  \ 会尝试调整它，使其对您的查询达到最优。\n\n理论上，自适应哈希索引是一个双赢的局面。您无需考虑需要为哪些列添加哈希索引即可获得其优势，且内存使用全部自动处理。然而，启用它会带来开销，并非所有工作负载都能从中受益。事实上，对于某些工作负载，开销可能变得非常大，以至于导致严重的性能问题，在这些情况下，更改哈希分区数量也无济于事。\n\
  \n工作数据集中无法放入缓冲池的部分越大、二级索引的变更越频繁、以及二级索引用于过滤的频率越低，您就越可能从禁用自适应哈希索引中受益。自适应哈希索引成为问题的案例，通常表现为\
  \ `btr0sea.cc` 文件中互斥锁和读写锁信号量的等待次数高企，该文件是实现自适应哈希索引搜索的地方。\n\n如果您遇到自适应哈希索引成为瓶颈的情况，可以使用\
  \ `innodb_adaptive_hash_index` 选项启用或禁用该功能。请注意，虽然您可以动态启用和禁用此功能，但禁用自适应哈希索引会从缓冲池中驱逐所有哈希索引，并且重新启用索引后需要一段预热期。因此，在复制环境中，值得先在单个副本上禁用自适应哈希索引，并监控您的应用程序是否从中受益，然后再在系统范围内禁用。如果您需要在读写副本上重新启用自适应哈希索引，考虑故障转移到另一个仍启用此功能的副本，这样在重新启用的副本经历预热期时，应用程序受到的影响较小。\n\
  \n**提示** 如果您想禁用自适应哈希索引，请先在单个副本上操作，这样如果之后需要重新启用该功能，可以避免所有副本都经历预热期。\n\n最后一个将要讨论的配置选项允许您降低元数据写锁的优先级。\n\
  \n### 降低元数据写锁的优先级\n\n默认情况下，如果一个表有两个元数据锁请求，一个是读请求，另一个是写请求，那么写请求会被赋予优先级。这通常没问题，因为写入比读取更具侵入性，因此在大多数情况下，最好给予写入优先权，以便它们能尽快完成。\n\
  \n然而，在涉及外键的情况下，这种方法可能会出现问题。当您对具有外键的表执行 DDL 时，该语句会请求对父表获取共享元数据锁。如果您有持续持有父表写锁的事务，即使从未使用子表，子表上的\
  \ DDL 语句也永远无法进行。因此，您需要某种方式让 MySQL 停止，并允许读元数据锁请求先行。\n\n您可以通过 `max_write_lock_count`\
  \ 选项来实现，该选项接受一个介于 1 和系统支持的最大整数值之间的数值。默认值是支持的最大值。每次授予 `max_write_lock_count` 个锁后，MySQL\
  \ 将赋予一些读锁优先权。这有助于确保读锁请求不会被饿死。\n\n更改 `max_write_lock_count` 的值时需要小心，因为值设得太低可能导致持有写锁（记住它们是排他锁）的事务完成时间过长。在写事务未完成期间，它们持有的锁会阻止其他事务进行。由于您可以动态更改\
  \ `max_write_lock_count`，请密切监控系统，并准备好如果副作用比问题本身更严重时，撤销更改。\n\n### 抢占式锁定\n\n最后将讨论的策略是抢占式锁定。如果您有一个执行多个查询的复杂事务，在某些情况下，执行\
  \ `SELECT ... FOR UPDATE` 或 `SELECT ... FOR SHARE` 查询以获取您知道在事务后期需要的记录上的锁，可能是有利的。另一个有用的场景是确保不同任务以相同的顺序访问行。\n\
  \n抢占式锁定在减少死锁频率方面特别有效。一个缺点是您最终会持有锁更长时间。总体而言，抢占式锁定是一种应谨慎使用的策略，但在合适的场景下使用，它可以有效地防止死锁。\n\
  \n\n## 概要\n\n本章探讨了减少锁影响的策略，策略范围从减少锁的数量及持有时间，到调整配置以降低锁的影响。\n\n最重要的是，你不应该持有超过必要的锁，也不应持有它们超过所需的时间。缩小事务规模及缩短完成事务所需的时间是减少锁争用最有力的两种方法。此外，通过恰当地选择索引，可以减少给定语句所需的锁数量。同样，事务隔离级别会影响锁的数量和持续时间，其中\
  \ `READ COMMITTED` 事务隔离级别是减少锁影响的常见选择。\n\n关于死锁，重要的是在整个应用程序中尽可能以相同的顺序访问记录。确保这一点的一个选择是抢占式锁，但应谨慎使用，因为它会增加锁的持有时间。\n\
  \n最后，调整配置以减少锁的影响。如果缓冲池、自适应哈希索引或表打开缓存上存在互斥锁争用，可以对资源进行分区，或者对于自适应哈希索引，可以完全禁用该功能。对于因外键而请求元数据读锁的\
  \ DDL 语句，限制在授予读锁优先级之前将授予的写锁数量也可能有用。\n\n本章简要提及了索引和外键对锁的影响。下一章将更详细地探讨这些主题。\n\n脚注 1\n\
  \n# 10. 索引与外键\n\n在上一章中，你了解了索引和外键如何影响锁定。这个话题值得进一步深入探讨，因为理解其效果非常重要。\n\n本章第一部分研究主索引、二级索引、升序索引、降序索引和唯一索引如何影响锁定。第二部分涵盖外键，以及它们如何影响\
  \ DML 和 DDL 语句的锁定。\n\n## 索引\n\n简而言之，索引提供了访问给定记录的快捷方式，从而减少了需要检查的记录数量。这对锁的数量有积极影响，因为只有被访问的行才会被锁定。这正如你在上一章所见，当为\
  \ `world.city` 表的 `Name` 列添加索引以支持按 `Name` 列过滤的查询时。当你连接表时，索引变得尤为重要，因为如果没有索引，访问的行数是连接表中行数的乘积。\n\
  \n注意\n\n你可能会认为，随着 MySQL 8 中对哈希连接的支持，索引变得不那么重要了。虽然这对于不加锁的语句在某种程度上是正确的，但对于加锁的语句则远非如此，因为过度的锁定可能导致锁等待和死锁。如第\
  \ 11 章所讨论，锁也会消耗缓冲池中的内存，因此更多的锁意味着用于缓存数据的内存更少。同样，减少访问的行数也能减少缓冲池中页面的周转率，从而提高缓冲池命中率。\n\
  \n本节首先讨论主索引与二级索引的使用，然后是升序索引与降序索引，最后是唯一索引。\n\n### 主索引 vs. 二级索引\n\n访问行最有效的方式是通过其主键，因为这确保了只有受语句影响的行才会被访问。例如，考虑清单\
  \ 10-1，它在 `world.city` 表的 `Name` 列上添加了一个二级索引，并更新了城市名为悉尼（Sydney）的人口。\n\n```\n-- 连接\
  \   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              713        1171          6\n--          2           \
  \   714        1172          6\n-- 连接 1\n连接 1> ALTER TABLE world.city\nADD INDEX\
  \ (Name);\nQuery OK, 0 rows affected (1.3916 sec)\nRecords: 0  Duplicates: 0  Warnings:\
  \ 0\n连接 1> START TRANSACTION;\nQuery OK, 0 rows affected (0.0002 sec)\n连接 1> UPDATE\
  \ world.city\nSET Population = 5000000\nWHERE Name = 'Sydney';\nQuery OK, 1 row\
  \ affected (0.0007 sec)\nRows matched: 1  Changed: 1  Warnings: 0\n-- 连接 2\n连接 2>\
  \ SELECT index_name, lock_type,\nlock_mode, lock_data\nFROM performance_schema.data_locks\n\
  WHERE object_schema = 'world'\nAND object_name = 'city'\nAND thread_id = 1171\\\
  G\n*************************** 1. row ***************************\nindex_name: NULL\n\
  lock_type: TABLE\nlock_mode: IX\nlock_data: NULL\n*************************** 2.\
  \ row ***************************\nindex_name: Name\nlock_type: RECORD\nlock_mode:\
  \ X\nlock_data: 'Sydney                             ', 130\n***************************\
  \ 3. row ***************************\nindex_name: PRIMARY\nlock_type: RECORD\nlock_mode:\
  \ X,REC_NOT_GAP\nlock_data: 130\n*************************** 4. row ***************************\n\
  index_name: Name\nlock_type: RECORD\nlock_mode: X,GAP\nlock_data: 'Syktyvkar   \
  \                       ', 3660\n4 rows in set (0.0006 sec)\n-- 连接 1\n连接 1> ROLLBACK;\n\
  Query OK, 0 rows affected (0.0625 sec)\n连接 1> ALTER TABLE world.city\nDROP INDEX\
  \ Name;\nQuery OK, 0 rows affected (0.4090 sec)\nRecords: 0  Duplicates: 0  Warnings:\
  \ 0)\n```\n清单 10-1\n通过非唯一二级索引更新行\n\n尽管更新只影响一行，但在 `Name` 索引上存在三个排他行级锁（一个记录锁和一个间隙锁），以及在主键上的行记录锁。\n\
  \n另一方面，如果你执行相同的更新，但使用主键访问该行，则只需要主键上的记录锁，如清单 10-2 所示。\n\n```\n-- 连接   进程列表 ID   线程\
  \ ID   事件 ID\n-- --------------------------------------------------\n--        \
  \  1              719        1180          6\n--          2              720   \
  \     1181          6\n-- 连接 1\n连接 1> ALTER TABLE world.city\nADD INDEX (Name);\n\
  Query OK, 0 rows affected (1.1499 sec)\nRecords: 0  Duplicates: 0  Warnings: 0\n\
  连接 1> SELECT ID\nFROM world.city\nWHERE Name = 'Sydney';\n+-----+\n| ID  |\n+-----+\n\
  | 130 |\n+-----+\n1 row in set (0.0004 sec)\n连接 1> START TRANSACTION;\nQuery OK,\
  \ 0 rows affected (0.0002 sec)\n连接 1> UPDATE world.city\nSET Population = 5000000\n\
  WHERE ID = 130;\nQuery OK, 1 row affected (0.0027 sec)\nRows matched: 1  Changed:\
  \ 1  Warnings: 0\n-- 连接 2\n连接 2> SELECT index_name, lock_type,\nlock_mode, lock_data\n\
  FROM performance_schema.data_locks\nWHERE object_schema = 'world'\nAND object_name\
  \ = 'city'\nAND thread_id = 1180\\G\n*************************** 1. row ***************************\n\
  index_name: NULL\nlock_type: TABLE\nlock_mode: IX\nlock_data: NULL\n***************************\
  \ 2. row ***************************\nindex_name: PRIMARY\nlock_type: RECORD\nlock_mode:\
  \ X,REC_NOT_GAP\nlock_data: 130\n2 rows in set (0.0007 sec)\n-- 连接 1\n连接 1> ROLLBACK;\n\
  Query OK, 0 rows affected (0.0410 sec)\n连接 1> ALTER TABLE world.city\nDROP INDEX\
  \ Name;\nQuery OK, 0 rows affected (0.3257 sec)\nRecords: 0  Duplicates: 0  Warnings:\
  \ 0\n```\n清单 10-2\n通过主索引更新行\n\n\n在这种情况下，主键（`ID` 列）的值首先在更新行的事务之外获取，然后该主键值被用于 `UPDATE`\
  \ 语句的 `WHERE` 子句中。结果是，唯一持有的记录级锁是针对值为 130 的主键的排他锁。\n\n#### 注意\n在事务外部确定主键确实开启了在获取主键值和执行更新之间数据可能发生变化的可能性。因此，您应仅将此作为示例参考。\n\
  \n除非需要更改表中的所有行，否则应力求使用索引来访问行。即使是全表更新，如果不要求更改是原子性应用的，那么对于大表而言，通过主键范围定义的小批次来应用更改是有利的。\n\
  \n#### 提示\n如果您按函数进行过滤，减少检查行数的一个好方法是添加一个函数索引（在 MySQL 8.0.13 及更高版本中可用）。或者，在 MySQL\
  \ 5.7 及更高版本中，您可以添加一个带有索引的生成列。\n\n不过，索引和锁定涉及的内容比访问的行数更多。接下来将介绍的降序索引以及后续的唯一索引也能减少锁定的数量。\n\
  \n### 升序索引与降序索引\nMySQL 8 支持降序索引，这可以提高按降序访问行时的性能。您可以使用升序索引来按降序访问行，因此在这种情况下，降序索引的主要好处在于页面内不再需要前后跳跃。这是否意味着在锁定方面，选择索引的排序没有好处呢？\n\
  \n当您使用与索引记录存储顺序相反的顺序时，您将付出一个小代价，因为您需要在搜索开始时锁定间隙。清单 10-3 展示了使用升序索引，将人口最多的三个城市（现有人口在\
  \ 100 万到 200 万之间）的人口增加 10% 时持有的锁。\n\n```sql\n-- 连接   进程列表 ID   线程 ID   事件 ID\n--\
  \ --------------------------------------------------\n--          1            \
  \  836        1363          6\n-- 连接 1\nConnection 1> ALTER TABLE world.city\nADD\
  \ INDEX (Population);\nQuery OK, 0 rows affected (1.1838 sec)\nRecords: 0  Duplicates:\
  \ 0  Warnings: 0\nConnection 1> START TRANSACTION;\nQuery OK, 0 rows affected (0.0005\
  \ sec)\nConnection 1> UPDATE world.city\nSET Population = Population * 1.10\nWHERE\
  \ Population BETWEEN 1000000 AND 2000000\nORDER BY Population DESC\nLIMIT 3;\nQuery\
  \ OK, 3 rows affected (0.0014 sec)\nRows matched: 3  Changed: 3  Warnings: 0\n--\
  \ 调查 #1\n-- 连接 2\nConnection 2> SELECT index_name, lock_type,\nlock_mode, lock_data\n\
  FROM performance_schema.data_locks\nWHERE object_schema = 'world'\nAND object_name\
  \ = 'city'\nAND lock_type = 'RECORD'\nAND thread_id = 1363\nORDER BY index_name,\
  \ lock_data DESC;\n+------------+-----------+---------------+---------------+\n\
  | index_name | lock_type | lock_mode     | lock_data     |\n+------------+-----------+---------------+---------------+\n\
  | Population | RECORD    | X,GAP         | 2016131, 3018 |\n| Population | RECORD\
  \    | X             | 1987996, 936  |\n| Population | RECORD    | X           \
  \  | 1977246, 2824 |\n| Population | RECORD    | X             | 1975294, 3539 |\n\
  | PRIMARY    | RECORD    | X,REC_NOT_GAP | 936           |\n| PRIMARY    | RECORD\
  \    | X,REC_NOT_GAP | 3539          |\n| PRIMARY    | RECORD    | X,REC_NOT_GAP\
  \ | 2824          |\n+------------+-----------+---------------+---------------+\n\
  7 rows in set (0.0008 sec)\n清单 10-3\n使用升序索引按降序更新行\n```\n\n正如预期，主键和 `Population`\
  \ 索引上各有三个锁，每个更新行一个锁。这已经是尽可能优化的了。使用升序索引在锁方面的代价在于，还存在一个针对人口为 2016131、主键设为 3018 的索引记录的间隙锁。\n\
  \n#### 提示\nInnoDB 总是将主键附加到非唯一二级索引的末尾，因此从索引记录定位到行非常容易。这样做的原因是 InnoDB 根据聚簇索引组织行，并且存在显式主键时，该主键用于聚簇索引。\n\
  \n关于此示例中的锁，还有两点需要注意。首先，如果您从索引末尾（人口最高的城市）开始更新，您会看到在 `supremum` 伪记录上有一个记录锁，而不是在区间的高端有一个间隙锁。这是因为\
  \ `supremum` 伪记录不是真实记录，因此在它上面的记录锁实际上只是锁定它之前的间隙。其次，涉及的具体锁类型取决于 `WHERE` 子句，因此如果您更改或移除\
  \ `WHERE` 子句，可能会在二级索引上看到额外的间隙锁。在使用降序索引的相同示例中，这些额外的间隙锁也会存在。\n\n如果您使用降序索引，锁的列表是相同的，除了间隙锁。清单\
  \ 10-4 展示了此示例。\n\n```sql\n-- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              843        1374          6\n-- 连接 1\nConnection 1> ALTER\
  \ TABLE world.city\nADD INDEX (Population DESC);\nQuery OK, 0 rows affected (0.8885\
  \ sec)\nRecords: 0  Duplicates: 0  Warnings: 0\nConnection 1> START TRANSACTION;\n\
  Query OK, 0 rows affected (0.0006 sec)\nConnection 1> UPDATE world.city\nSET Population\
  \ = Population * 1.10\nWHERE Population BETWEEN 1000000 AND 2000000\nORDER BY Population\
  \ DESC\nLIMIT 3;\nQuery OK, 3 rows affected (0.0021 sec)\nRows matched: 3  Changed:\
  \ 3  Warnings: 0\n-- 调查 #1\n-- 连接 2\nConnection 2> SELECT index_name, lock_type,\n\
  lock_mode, lock_data\nFROM performance_schema.data_locks\nWHERE object_schema =\
  \ 'world'\nAND object_name = 'city'\nAND lock_type = 'RECORD'\nAND thread_id = 1374\n\
  ORDER BY index_name, lock_data DESC;\n+------------+-----------+---------------+---------------+\n\
  | index_name | lock_type | lock_mode     | lock_data     |\n+------------+-----------+---------------+---------------+\n\
  | Population | RECORD    | X             | 1987996, 936  |\n| Population | RECORD\
  \    | X             | 1977246, 2824 |\n| Population | RECORD    | X           \
  \  | 1975294, 3539 |\n| PRIMARY    | RECORD    | X,REC_NOT_GAP | 936           |\n\
  | PRIMARY    | RECORD    | X,REC_NOT_GAP | 3539          |\n| PRIMARY    | RECORD\
  \    | X,REC_NOT_GAP | 2824          |\n+------------+-----------+---------------+---------------+\n\
  6 rows in set (0.0008 sec)\n清单 10-4\n使用降序索引按降序更新行\n```\n\n结论是，对于数据的降序访问，降序索引的主要好处在于数据访问更具顺序性所带来的性能提升，而不是减少锁定。然而，话虽如此，如果您在更新或删除数据时有很多降序范围扫描，您也将受益于更少的间隙锁。\n\
  \n另一种能减少锁定的索引类型是唯一索引。\n\n\n\n### 唯一索引\n\n唯一索引与等效的非唯一索引相比，其主要目的是增加约束：每个值只允许出现一次。因此，表面上看，唯一索引似乎与之前已讨论的锁机制关系不大。然而，`InnoDB`\
  \ 可以利用这一点，即对于给定的等值条件，最多只有一条记录（值为`NULL`时除外）可以存在，并用它来减少所需的锁数量。\n\n例如，考虑两个表 `_tmp_city1`\
  \ 和 `_tmp_city2`，它们包含来自 `world.city` 表的相同行子集。`_tmp_city1` 表在 `Name` 列上有一个非唯一索引，而\
  \ `_tmp_city2` 表在该列上有一个唯一索引。然后使用 `Name` 列上的条件更新单行。清单 10-5 展示了此操作。\n\n```\n-- 连接\
  \   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              736        1209          6\n--          2           \
  \   737        1210          6\n-- 连接 1\nConnection 1> DROP TABLE IF EXISTS world._tmp_city1;\n\
  Query OK, 0 rows affected (0.0643 sec)\nNote (code 1051): Unknown table 'world._tmp_city1'\n\
  Connection 1> CREATE TABLE world._tmp_city1\nSELECT *\nFROM world.city\nWHERE CountryCode\
  \ = 'AUS';\nQuery OK, 14 rows affected (1.3112 sec)\nRecords: 14  Duplicates: 0\
  \  Warnings: 0\nConnection 1> ALTER TABLE world._tmp_city1\nADD PRIMARY KEY (ID),\n\
  ADD INDEX (Name);\nQuery OK, 0 rows affected (2.5572 sec)\nRecords: 0  Duplicates:\
  \ 0  Warnings: 0\nConnection 1> START TRANSACTION;\nQuery OK, 0 rows affected (0.0002\
  \ sec)\nConnection 1> UPDATE world._tmp_city1\nSET Population = 5000000\nWHERE Name\
  \ = 'Sydney';\nQuery OK, 1 row affected (0.0007 sec)\nRows matched: 1  Changed:\
  \ 1  Warnings: 0\n-- 连接 2\nConnection 2> DROP TABLE IF EXISTS world._tmp_city2;\n\
  Query OK, 0 rows affected (0.1361 sec)\nNote (code 1051): Unknown table 'world._tmp_city2'\n\
  Connection 2> CREATE TABLE world._tmp_city2\nSELECT *\nFROM world.city\nWHERE CountryCode\
  \ = 'AUS';\nQuery OK, 14 rows affected (0.8276 sec)\nRecords: 14  Duplicates: 0\
  \  Warnings: 0\nConnection 2> ALTER TABLE world._tmp_city2\nADD PRIMARY KEY (ID),\n\
  ADD UNIQUE INDEX (Name);\nQuery OK, 0 rows affected (2.4895 sec)\nRecords: 0  Duplicates:\
  \ 0  Warnings: 0\nConnection 2> START TRANSACTION;\nQuery OK, 0 rows affected (0.0003\
  \ sec)\nConnection 2> UPDATE world._tmp_city2\nSET Population = 5000000\nWHERE Name\
  \ = 'Sydney';\nQuery OK, 1 row affected (0.0005 sec)\nRows matched: 1  Changed:\
  \ 1  Warnings: 0\n清单 10-5\n非唯一与唯一二级索引之间的区别\n```\n\n当事务仍在进行时，您可以检查每个连接持有的锁。对于连接 1，记录锁如清单\
  \ 10-6 所示，这是清单 10-5 执行的工作负载的调查编号 1。\n\n```\n-- 调查编号 1\n-- 连接 3\nConnection 3> SELECT\
  \ index_name, lock_mode, lock_data\n            FROM performance_schema.data_locks\n\
  \            WHERE object_schema = 'world'\n            AND lock_type = 'RECORD'\n\
  \            AND thread_id = 1209\\G\n*************************** 1\\. row ***************************\n\
  index_name: Name\nlock_mode: X\nlock_data: 'Sydney                             ',\
  \ 130\n*************************** 2\\. row ***************************\nindex_name:\
  \ PRIMARY\nlock_mode: X,REC_NOT_GAP\nlock_data: 130\n***************************\
  \ 3\\. row ***************************\nindex_name: Name\nlock_mode: X,GAP\nlock_data:\
  \ 'Townsville                         ', 142\n3 rows in set (0.0094 sec)\n清单 10-6\n\
  连接 1 的记录锁（调查编号 1）\n```\n\n这与根据先前示例的经验所预期的情况一致，即在主键上有一个记录锁，在索引上有一个记录锁和间隙锁。对于连接 2，只存在这些锁中的两个，如清单\
  \ 10-7 所示，这是来自清单 10-5 的调查编号 2。\n\n```\n-- 调查编号 2\nConnection 3> SELECT index_name,\
  \ lock_mode, lock_data\n            FROM performance_schema.data_locks\n       \
  \     WHERE object_schema = 'world'\n            AND lock_type = 'RECORD'\n    \
  \        AND thread_id = 1210\\G\n*************************** 1\\. row ***************************\n\
  index_name: Name\nlock_mode: X,REC_NOT_GAP\nlock_data: 'Sydney                 \
  \            ', 130\n*************************** 2\\. row ***************************\n\
  index_name: PRIMARY\nlock_mode: X,REC_NOT_GAP\nlock_data: 130\n2 rows in set (0.0006\
  \ sec)\n清单 10-7\n连接 2 的记录锁（调查编号 2）\n```\n\n这里只需要在二级索引和主键上的两个记录锁。\n\n**提示**\n\n关于\
  \ `InnoDB` 中各种语句在有和没有唯一索引时所采取锁的完整列表，请参见 [`https://dev.mysql.com/doc/refman/en/innodb-locks-set.html`](https://dev.mysql.com/doc/refman/en/innodb-locks-set.html)。\n\
  \n最后，回滚并删除测试表：\n\n```\n-- 连接 1\nConnection 1> ROLLBACK;\nQuery OK, 0 rows affected\
  \ (0.0714 sec)\nConnection 1> DROP TABLE world._tmp_city1;\nQuery OK, 0 rows affected\
  \ (0.7642 sec)\n-- 连接 2\nConnection 2> ROLLBACK;\nQuery OK, 0 rows affected (0.1038\
  \ sec)\nConnection 2> DROP TABLE world._tmp_city2;\nQuery OK, 0 rows affected (1.4438\
  \ sec)\n```\n\n与可用于减少锁的唯一键不同，外键会增加锁，这将在下一部分讨论。\n\n## 外键\n\n外键是确保数据库中表之间数据一致性的强大工具。然而，它们有一个缺点：为了提供这种安全性，需要在父表和子表上添加额外的锁。\n\
  \n所需的额外锁取决于外键关系中更改的是父表还是子表，以及更改了哪些列。对于元数据锁，在大多数情况下，会在涉及外键关系的表上获取共享锁。一个例外是向外键关系的父表中插入数据；在这种情况下，不会在子表上获取共享元数据锁。\n\
  \n在 `InnoDB` 级别，如果修改了包含在外键中的列，则会为关系另一端表中外键列新值对应的行设置共享记录级锁，并为该表设置意向共享锁。无论外键是否被违反，都会发生这种情况。如果没有更改外键列，即使该列用于过滤，`InnoDB`\
  \ 也不会采取任何额外的锁。\n\n为了理解这如何影响您，值得考虑几个例子。它们都使用了 `sakila.inventory` 表，该表有两个指向 `film`\
  \ 和 `store` 表的外键。同时，它也是 `film_rental` 表的外键的父表。如图 10-1 所示。\n\n![../images/502546_1_En_10_Chapter/502546_1_En_10_Fig1_HTML.jpg](img/502546_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1\n`sakila.inventory` 表及其外键关系\n\n图中仅包含了参与主键和外键的列。首先将讨论更新 `inventory` 表中一行的示例，然后是一个\
  \ `DDL` 语句。\n\n\n\n## DML 语句\n\n以外键对 DML 语句引起锁为例，考虑一个将影片从一个商店移动到另一个商店的 `UPDATE`\
  \ 语句。该更新通过主键进行，示例如清单 10-8 所示。\n\n```\n-- Connection   Processlist ID   Thread ID\
  \   Event ID\n-- --------------------------------------------------\n--        \
  \  1              814        1329          6\n-- Connection 1\nConnection 1> START\
  \ TRANSACTION;\nQuery OK, 0 rows affected (0.0002 sec)\nConnection 1> UPDATE sakila.inventory\n\
  SET store_id = 1\nWHERE inventory_id = 4090;\nQuery OK, 1 row affected (0.0008 sec)\n\
  Rows matched: 1  Changed: 1  Warnings: 0\nListing 10-8\nUpdating a row in a table\
  \ with foreign keys relationships\n```\n\n由于外键，这个简单的单表单行更新会在 `sakila` 数据库的大量表上获取多个锁。清单\
  \ 10-9 显示了该语句引起的 InnoDB 锁（这是调查编号 1）。\n\n```\n-- Investigation #1\n-- Connection\
  \ 2\nConnection 2> SELECT object_schema, object_name, lock_type,\nindex_name, lock_mode,\
  \ lock_data\nFROM performance_schema.data_locks\nWHERE thread_id = 1329\\G\n***************************\
  \ 1. row ***************************\nobject_schema: sakila\nobject_name: inventory\n\
  lock_type: TABLE\nindex_name: NULL\nlock_mode: IX\nlock_data: NULL\n***************************\
  \ 2. row ***************************\nobject_schema: sakila\nobject_name: inventory\n\
  lock_type: RECORD\nindex_name: PRIMARY\nlock_mode: X,REC_NOT_GAP\nlock_data: 4090\n\
  *************************** 3. row ***************************\nobject_schema: sakila\n\
  object_name: store\nlock_type: TABLE\nindex_name: NULL\nlock_mode: IS\nlock_data:\
  \ NULL\n*************************** 4. row ***************************\nobject_schema:\
  \ sakila\nobject_name: store\nlock_type: RECORD\nindex_name: PRIMARY\nlock_mode:\
  \ S,REC_NOT_GAP\nlock_data: 1\n4 rows in set (0.0102 sec)\nListing 10-9\nThe InnoDB\
  \ data locks caused by the UPDATE statement\n```\n\n在这种情况下，InnoDB 对 `store` 表获取意向共享锁，并对主键为\
  \ 1 的记录获取共享锁。由于 `UPDATE` 语句不改变 `film_id` 列的值，因此 `film` 表上没有锁。\n\n对于元数据锁，情况更为复杂，这可以从清单\
  \ 10-10（调查编号 2）中看出。\n\n```\n-- Investigation #2\nConnection 2> SELECT object_type,\
  \ object_schema, object_name,\ncolumn_name, lock_type, lock_duration\nFROM performance_schema.metadata_locks\n\
  WHERE owner_thread_id = 1329\nORDER BY object_type, object_schema, object_name,\n\
  column_name, lock_type\\G\n*************************** 1. row ***************************\n\
  object_type: SCHEMA\nobject_schema: sakila\nobject_name: NULL\ncolumn_name: NULL\n\
  lock_type: INTENTION_EXCLUSIVE\nlock_duration: TRANSACTION\n***************************\
  \ 2. row ***************************\nobject_type: TABLE\nobject_schema: sakila\n\
  object_name: customer\ncolumn_name: NULL\nlock_type: SHARED_READ\nlock_duration:\
  \ TRANSACTION\n*************************** 3. row ***************************\n\
  object_type: TABLE\nobject_schema: sakila\nobject_name: film\ncolumn_name: NULL\n\
  lock_type: SHARED_READ\nlock_duration: TRANSACTION\n***************************\
  \ 4. row ***************************\nobject_type: TABLE\nobject_schema: sakila\n\
  object_name: inventory\ncolumn_name: NULL\nlock_type: SHARED_WRITE\nlock_duration:\
  \ TRANSACTION\n*************************** 5. row ***************************\n\
  object_type: TABLE\nobject_schema: sakila\nobject_name: payment\ncolumn_name: NULL\n\
  lock_type: SHARED_WRITE\nlock_duration: TRANSACTION\n***************************\
  \ 6. row ***************************\nobject_type: TABLE\nobject_schema: sakila\n\
  object_name: rental\ncolumn_name: NULL\nlock_type: SHARED_WRITE\nlock_duration:\
  \ TRANSACTION\n*************************** 7. row ***************************\n\
  object_type: TABLE\nobject_schema: sakila\nobject_name: staff\ncolumn_name: NULL\n\
  lock_type: SHARED_READ\nlock_duration: TRANSACTION\n***************************\
  \ 8. row ***************************\nobject_type: TABLE\nobject_schema: sakila\n\
  object_name: store\ncolumn_name: NULL\nlock_type: SHARED_READ\nlock_duration: TRANSACTION\n\
  8 rows in set (0.0007 sec)\nListing 10-10\nThe metadata locks caused by the UPDATE\
  \ statement\n```\n\n你并不总是能看到 `sakila` 模式上的 `INTENTION_EXCLUSIVE` 锁，因此你的结果可能只包含七个表级元数据锁。\n\
  \n这表明 `film` 和 `store` 表上存在 `SHARED_READ` 锁，`rental` 表上存在 `SHARED_WRITE` 锁，这与之前的讨论预期一致。然而，这里还有几个额外的元数据锁。额外的锁是因为\
  \ `rental` 表到 `inventory` 的外键设置了 `ON UPDATE CASCADE`。这使得元数据锁也级联到 `rental` 表的外键关系上。这个例子的经验教训是，使用外键时，特别是级联关系时，需要注意元数据锁的数量会迅速增加。\n\
  \n最后，回滚事务：\n\n```\n-- Connection 1\nConnection 1> ROLLBACK;\nQuery OK, 0 rows affected\
  \ (0.1104 sec)\n```\n\n## DDL 语句\n\n当你对外键表执行 DDL 语句时，会为被修改表的每个父表和子表获取一个 `SHARED_UPGRADABLE`\
  \ 元数据锁。示例如清单 10-11 所示。\n\n```\n-- Connection   Processlist ID   Thread ID   Event\
  \ ID\n-- --------------------------------------------------\n--          1     \
  \         820        1340          6\n--          2              821        1341\
  \          6\n-- Connection 1\nConnection 1> OPTIMIZE TABLE sakila.inventory;\n\
  -- Connection 2\nConnection 2> SELECT object_name, lock_type, lock_duration\nFROM\
  \ performance_schema.metadata_locks\nWHERE owner_thread_id = 1340\nAND object_type\
  \ = 'TABLE';\n+---------------+-------------------+---------------+\n| object_name\
  \   | lock_type         | lock_duration |\n+---------------+-------------------+---------------+\n\
  | inventory     | SHARED_NO_WRITE   | TRANSACTION   |\n| film          | SHARED_UPGRADABLE\
  \ | STATEMENT     |\n| rental        | SHARED_UPGRADABLE | STATEMENT     |\n| store\
  \         | SHARED_UPGRADABLE | STATEMENT     |\n| #sql-8490_334 | EXCLUSIVE   \
  \      | STATEMENT     |\n+---------------+-------------------+---------------+\n\
  5 rows in set (0.0014 sec)\nListing 10-11\nPerforming DDL on a table with foreign\
  \ key relations\n```\n\n在这种情况下，`rental` 表上的级联外键不会导致进一步的元数据锁，因为没有需要级联的更新。`#sql-8490_334`\
  \ 表是 `OPTIMIZE TABLE` 语句的构建表，其名称取决于 `mysqld` 进程的 ID 和执行该语句的连接的进程列表 ID。\n\n结论是，虽然外键对于确保数据一致性非常重要，但在高并发工作负载中，由于额外的锁（以及约束验证所花费的时间），它们可能成为瓶颈。然而，不要默认就摒弃外键，否则可能会危及数据的完整性。外键也有助于记录表之间的关系；本章前面的图就是\
  \ MySQL Workbench 基于外键自动生成的。\n\n**注意**\n\n不要因为额外的锁而摒弃外键，它们对于确保数据一致性是必要的。如果它们对于你的工作负载变得过于昂贵，你将需要在应用程序中确保数据一致性，这绝非易事。如果没有足够好的数据完整性约束，最终可能会向用户返回无效数据。\n\
  \n\n\n\n### 总结\n\n本章深入探讨了索引和外键对锁的影响。索引有助于减少锁，而外键则会增加锁。\n\n您使用的索引选择性越高，访问的行数就越少，这意味着锁也越少。因此，主键访问是最优的，其次是唯一索引。使用与您访问行的顺序相同的索引存储顺序进行访问也有帮助。\n\
  \n对于外键，它们确实需要额外的锁来维护数据完整性。`InnoDB`在修改包含在外键中的列时，会在外键的另一端行上添加一个共享锁，并为该表设置一个意向共享锁。此外，在大多数情况下，还会对外键关系中涉及的表获取一个共享的元数据锁。对于级联外键，元数据锁也会级联。\n\
  \n以上讨论主要围绕锁展开。然而，事情还有另一面：事务。事务不仅在并发性的直接上下文中相关，在锁的方面也相关。下一章将从事务的概述开始。\n\n# 11. 事务\n\
  \n事务是语句的“大哥”。它们将多个更改组合在一起，无论这些更改是在单个语句还是多个语句中，因此它们可以作为一个单元被应用或放弃。大多数情况下，事务不过是一个事后才想到的东西，只有在需要一起应用多个语句时才被考虑。这是一种看待事务的糟糕方式。它们对于确保数据完整性非常重要，如果使用不当，可能会导致严重的性能问题。\n\
  \n本章首先讨论什么是事务以及 `ACID` 概念，然后通过回顾事务对锁和性能的影响，从性能角度讨论为什么需要认真对待事务。最后，讨论了组提交特性如何提高高并发系统的性能。\n\
  \n## 事务与 `ACID`\n\n从最简单的角度来看，事务是一个包含一个或多个语句的容器。然而，这是一种过于简单的观点，因为事务本身也具有属性。最重要的是，它是实现\
  \ *原子性、一致性、隔离性和持久性* (`ACID`) 的主要工具。本节将详细探讨这四个属性。\n\n### 原子性\n\n原子性的概念意味着事务中的所有更改要么全部提交，要么全部回滚。这就是“容器”概念发挥作用的地方，所有语句都被视为一个工作单元——换句话说，事务是原子的。\n\
  \n原子性重要性的一个经典例子是两个银行账户之间的金融交易。一笔金额从付款人账户中扣除，并插入到收款人账户中。没有原子性，你可能会遇到钱被扣除了但从未存入的情况，导致其中一方蒙受损失。事务是原子的，这保证了如果钱被扣除，收款人也一定会收到账户上的钱。\n\
  \n### 一致性\n\n数据库满足一致性属性意味着存在检查机制，确保如果一个事务成功提交，那么数据就是一致的。一致性在很大程度上由业务逻辑定义。一个例子是，你不能为一个不存在的实体创建银行账户。在数据库内部，约束（包括外键）的职责就是确保数据一致性。通过使用事务，由于其原子性行为，即使约束在第二步或后续步骤中失败，整个事务也可以被撤销（回滚），数据库将保持其原始的一致状态。\n\
  \n在某些数据库中，约束检查可以推迟到事务提交时进行。以你不能为不存在的实体创建银行账户为例，延迟约束允许你先创建账户，然后在**同一个事务内**再注册拥有该账户的实体。延迟约束主要用于处理循环关系，例如添加一个必须拥有默认组成员的组，但由于成员必须属于一个组，因此有必要在添加组及其初始成员时暂时放松约束。\n\
  \n> **注意**\n>\n> 延迟约束的使用是一个有争议的话题，可以认为它违反了关系数据库理论的原则。例如，C.J. Date 认为约束必须在语句边界得到满足；参见\
  \ [`https://www.brcommunity.com/articles.php?id=b065b`](https://www.brcommunity.com/articles.php?id=b065b)。\n\
  \n`InnoDB` 不支持延迟约束，但支持通过显式禁用 `foreign_key_checks` 变量来禁用外键检查，该变量可以在全局和会话作用域中更改。\n\
  \n> **提示**\n>\n> 在执行批量加载且已确保数据一致时，禁用外键检查可能很有用。\n\n对于 `InnoDB`，唯一键约束检查不能禁用，因为 `unique_checks`\
  \ 选项仅表示不需要检查；`InnoDB` 在某些情况下仍会进行检查。（顺便提一下，`NDBCluster` 确实会将一些约束检查推迟到提交时。）\n\n###\
  \ 隔离性\n\n隔离属性是连接事务和锁的关键。两个事务是隔离的，意味着它们不会相互干扰对方对数据的视图。隔离是在数据内容层面；两个并发事务在性能和锁方面仍然可能相互干扰。`MySQL`\
  \ 与大多数数据库系统一样，使用锁来实现隔离，而 `InnoDB` 有事务隔离级别的概念来定义隔离的含义。事务隔离级别将在下一章中更详细地讨论。\n\n###\
  \ 持久性\n\n数据是持久的意味着数据更改不会丢失。在 `MySQL` 中，这仅适用于已提交的数据，或者对于 `XA` 事务，适用于处于准备阶段的事务。`InnoDB`\
  \ 通过重做日志和二进制日志（如果启用，这是 `MySQL 8` 的默认设置）在本地实现持久性，并使用内部 `XA` 事务来确保两个日志之间的一致性。\n\n\
  > **注意**\n>\n> `XA` 事务是一项支持分布式事务的功能，例如，跨越两个系统，或者在 `MySQL` 内部情况下，使对 `InnoDB` 和二进制日志的更改一起提交或回滚。它的工作原理是有一个事务管理器和一个或多个资源管理器（例如，数据库）。有关\
  \ `MySQL` 和 `XA` 事务的更多信息，请参见 [`https://dev.mysql.com/doc/refman/en/xa.html`](https://dev.mysql.com/doc/refman/en/xa.html)。\n\
  \n仅当 `innodb_flush_log_at_trx_commit` 和 `sync_binlog` 都设置为 `1`（默认值）时，提交才被保证是持久的。为了确保在本地系统崩溃时的持久性，您还必须确保二进制日志事件已复制到至少一个副本。`MySQL\
  \ Group Replication` 或 `MySQL InnoDB Cluster` 是实现此目标的最佳方式。\n\n> **提示**\n>\n> 复制超出了本书的范围。有关\
  \ `MySQL Group Replication` 和 `InnoDB Cluster` 的介绍，请参见 Charles Bell 所著的 *Introducing\
  \ InnoDB Cluster* (Apress) ([`https://www.apress.com/gp/book/9781484238844`](https://www.apress.com/gp/book/9781484238844))。\n\
  \n\n\n## 事务的影响\n\n如果您将事务视为用于分组查询的容器，它可能看起来是一个无害的概念。然而，重要的是要理解，由于事务为查询组提供了**原子性**，事务活动的时间越长，与之相关的查询所持有的资源时间就越长；事务中完成的工作越多，所需的资源也就越多。哪些资源会被查询使用并一直保持到事务提交？主要是锁和\
  \ undo 日志。\n\n> **提示**\n>\n> InnoDB 支持只读事务，其开销低于读写事务。对于自动提交的单语句事务，InnoDB 会尝试自动判断该语句是否为只读。对于多语句事务，您可以在启动时明确指定其为只读事务：`START\
  \ TRANSACTION READ ONLY;`\n\n### 锁\n\n查询执行时会获取锁。当使用默认的事务隔离级别——`REPEATABLE READ`——时，所有锁都会一直保持到事务提交或回滚。当使用\
  \ `READ COMMITTED` 事务隔离级别时，可能会释放一些锁，但至少涉及已更改记录的锁会被保留。锁本身是一种资源，而存储锁信息也需要内存。对于正常的工作负载，您可能不觉得这是个问题，但大型事务最终可能会消耗大量内存，导致事务因\
  \ `ER_LOCK_TABLE_FULL` 错误而失败：\n\n```\nERROR: 1206: The total number of locks exceeds\
  \ the lock table size\n```\n\n从错误日志中记录的警告消息（稍后详述）可以看出，锁所需的内存是从缓冲池中获取的。因此，您持有的锁越多，保持的时间越长，可用于缓存数据和索引的内存就越少。\n\
  \n> **注意**\n>\n> 因为耗尽了锁内存而导致事务中止是一个**四重打击**。首先，要更新足够多的行以触发该错误，需要花费相当长的时间，而这些工作被浪费了。其次，由于所需更改的数量，回滚事务可能需要非常长的时间。第三，在锁内存被占用期间，InnoDB\
  \ 实际上处于只读模式（某些小型事务可能仍可执行），并且锁内存直到回滚完成后才会释放。第四，缓冲池中几乎没有剩余空间来缓存数据和索引。\n\n在该错误发生之前，错误日志中会先记录一条警告，指出超过\
  \ 67% 的缓冲池被用于锁或自适应哈希索引：\n\n```\n2020-06-08T10:47:11.415127Z 10 [Warning] [MY-011958]\
  \ [InnoDB] Over 67 percent of the buffer pool is occupied by lock heaps or the adaptive\
  \ hash index! Check that your transactions do not set too many row locks. Your buffer\
  \ pool size is 7 MB. Maybe you should make the buffer pool bigger? Starting the\
  \ InnoDB Monitor to print diagnostics, including lock heap and hash index size.\n\
  ```\n\n警告之后会定期重复输出 InnoDB 监视器的信息，以便您确定哪些事务是罪魁祸首。\n\n在事务方面，一种常被忽视的锁类型是元数据锁。当一条语句查询某个表时，会获取一个共享的元数据锁，该锁会一直保持到事务结束。当表上存在元数据锁时，任何连接都无法对该表执行任何\
  \ DDL 语句——包括 `OPTIMIZE TABLE`。如果 DDL 语句被长时间运行的事务阻塞，它反过来又会阻塞所有使用该表的新查询。第 14 章将展示一个调查此类问题的示例。\n\
  \n锁在事务活动期间被持有。然而，事务即使完成之后，也可能通过 undo 日志继续产生影响。\n\n### Undo 日志\n\n在事务期间进行的修改也必须存储起来，因为如果您选择回滚事务，就需要这些数据。这很容易理解。更令人惊讶的是，即使是一个未做任何修改的事务，也可能使其他事务的\
  \ undo 信息持续存在。当事务需要一个读视图（一致性快照）时，就会发生这种情况，在使用 `REPEATABLE READ` 事务隔离级别时，事务的整个持续期间都会如此。读视图意味着，无论其他事务是否更改了数据，该事务都将返回事务启动时对应的行数据。为了能够实现这一点，有必要在事务生命周期内保留那些被修改行的旧值。带有读视图的长时间运行事务是最终产生巨大\
  \ undo 日志的最常见原因，在 MySQL 5.7 及更早版本中，这可能导致 ibdata1 文件变得非常大。（在 MySQL 8 中，undo 日志始终存储在可截断的独立\
  \ undo 表空间中。）\n\n> **提示**\n>\n> `READ COMMITTED` 事务隔离级别产生大型 undo 日志的可能性要小得多，因为读视图仅在语句执行期间维护。\n\
  \nundo 日志的活动部分大小以 **历史列表长度** 来衡量。历史列表长度是指已提交但其 undo 日志尚未被清除的事务数量。这意味着您不能使用历史列表长度来衡量行更改的总量。它确实告诉您的是，在执行查询时必须考虑的、由待处理更改组成的链表中，有多少旧行单元（每个事务一个单元）。这个链表越长，查找每一行的正确版本就越昂贵。最终，如果您有一个很大的历史列表，它会严重降低所有查询的性能。\n\
  \n> **注意**\n>\n> 历史列表长度问题是使用 `mysqlpump` 和 `mysqldump` 等逻辑备份工具、通过单个事务创建大型数据库一致性备份时面临的最大问题之一。如果备份期间有许多事务提交，备份操作会导致历史列表长度变得非常大。\n\
  \n什么构成大的历史列表长度？没有硬性规定——只是越小越好。通常，当列表长度达到数千到百万个事务时，性能问题开始显现，但它何时成为瓶颈取决于 undo 日志中已提交的事务以及历史列表长度较大时的工作负载。\n\
  \n当最旧的部分不再需要时，InnoDB 会在后台自动清除历史列表。有两个选项可以控制清除操作，另外还有两个选项可以影响当无法执行清除时会发生的情况。这些选项是：\n\
  \n*   `innodb_purge_batch_size`：每批清除的 undo 日志页数。批次在清除线程之间分配。此选项不建议在生产系统上更改。默认值为\
  \ 300，有效值范围为 1 到 5000。\n*   `innodb_purge_threads`：用于并行执行的清除线程数。如果数据更改跨越多个表，较高的并行度可能有用。另一方面，如果所有更改都集中在少数几个表上，则较低的值更可取。更改清除线程数需要重启\
  \ MySQL。默认值为 4，有效值范围为 1 到 32。\n*   `innodb_max_purge_lag`：当历史列表长度超过 `innodb_max_purge_lag`\
  \ 的值时，会对更改数据的操作增加延迟，以降低历史列表的增长速度，代价是语句延迟增加。默认值为 0，表示永远不会添加延迟。有效值范围为 0–4294967295。\n\
  \n## InnoDB 配置与优化\n\n*   `innodb_max_purge_lag_delay`：当历史列表长度大于 `innodb_max_purge_lag`\
  \ 时，可添加到 DML 查询的最大延迟。\n\n通常无需更改这些设置；然而，在特殊情况下，这可能很有用。如果清理线程无法跟上，您可以尝试根据被修改的表的数量来更改清理线程的数量；被修改的表越多，使用更多的清理线程就越有益。当您更改清理线程的数量时，重要的是在更改前从基线开始监控效果，以便观察更改是否带来改善。\n\
  \n最大清理延迟选项可用于减慢修改数据的 DML 语句。当写入仅限于特定连接且延迟不会导致创建额外的写入线程以维持相同吞吐量时，这主要很有用。\n\n## 组提交\n\
  \n请记住，为了使 InnoDB 的 **ACID** 中的 **D**（持久性）为真，您需要将 `innodb_flush_log_at_trx_commit`\
  \ 和 `sync_binlog` 设置保持在其默认值 1，以便事务所做的更改在提交时同步到磁盘。虽然这对于确保在崩溃情况下不会丢失已确认提交的更改非常有用，但确实会带来性能成本，因为磁盘的刷新性能常常会成为瓶颈。\n\
  \n组提交特性通过稍微延迟提交并在此延迟期间将所有提交分组（因此得名）并同时将它们刷新到磁盘来减少这种性能影响。本质上，组提交牺牲了一点延迟以换取更高的吞吐量。在数据更改并发度高的系统中，当使用\
  \ `sync_binlog = 1` 时，组提交可以显著提高性能。\n\n组提交特性由两个配置选项控制：\n\n*   `binlog_group_commit_sync_delay`：等待更多事务提交的延迟时间（毫秒）。允许值为\
  \ 0–1000000，默认为 0。值越大，将一起提交的事务就越多，因此 `fsync()` 调用就越少。\n\n*   `binlog_group_commit_sync_no_delay_count`：在完成组提交之前，组提交队列中允许的最大事务数。如果此选项设置为大于\
  \ 0 的值，则提交可能比 `binlog_group_commit_sync_delay` 设置的频率更频繁。值为 0 表示可以排队的提交数量无限制。允许值为\
  \ 0–1000000，默认为 0。\n\n如果您可以接受提交事务时的小延迟，建议增加 `binlog_group_commit_sync_delay` 以降低刷新频率。原则上，值越大，吞吐量越大，但您当然应该考虑您的工作负载可接受的最大提交延迟增加量。您可以使用\
  \ `binlog_group_commit_sync_no_delay_count` 来避免每次组提交中的事务数量变得过大。\n\n如果您启用了复制，那么增加\
  \ `binlog_group_commit_sync_delay` 也可以对副本产生积极的性能影响，因为一起提交的事务越多，用于并行复制的 `LOGICAL_CLOCK`\
  \ 算法（`slave_parallel_type` 选项）就越有效。（如果您设置了 `binlog_transaction_dependency_tracking\
  \ = WRITESET`，效果会较小，因为事务可以跨组提交进行并行化。）您必须在复制源端设置 `binlog_group_commit_sync_delay`\
  \ 才能提高副本上的并行复制性能。\n\n### 总结\n\n事务是数据库中的一个重要概念。它们有助于确保您可以将多个行的更改作为一个单元应用，并且您可以选择是应用更改还是回滚它们。\n\
  \n本章首先讨论了事务和 **ACID** 概念是什么。**ACID** 代表原子性、一致性、隔离性和持久性，事务直接参与确保前三个属性，并部分确保持久性。隔离性在并发上下文中很有趣，因为它确保您可以安全地并发执行多个事务。在\
  \ MySQL 中，隔离是通过锁实现的。\n\n下一节讨论了了解事务使用方式的重要性。虽然事务本身可以被视为更改的容器，但锁会一直持有直到事务提交或回滚，并且它们可能阻止撤销日志被清理。即使查询不是在导致大量锁或大量撤销日志的事务中执行的，锁和大型撤销日志也会影响查询性能。锁使用内存，这些内存取自缓冲池，因此用于缓存数据和索引的可用内存更少。以历史列表长度衡量的大量撤销日志意味着当\
  \ InnoDB 执行语句时必须考虑更多的行版本。\n\n最后，讨论了组提交的概念。当每次提交都将更改刷新到磁盘时，组提交特性可用于通过一次完成多个提交来减少\
  \ `fsync()` 调用的次数。组提交的一个副作用是它可以提高用于并行复制的 `LOGICAL_CLOCK` 算法的性能。\n\n本章多次提到了事务隔离级别的概念。下一章将更详细地介绍四种支持的事务隔离级别如何工作以及每个级别如何影响锁。\n\
  \n# 12. 事务隔离级别\n\n在上一章中，您了解到隔离是事务的一个重要属性。事实证明，回答两个事务是否隔离并不简单，因为答案取决于所需的隔离程度。隔离程度是通过事务隔离级别定义的。\n\
  \nInnoDB 支持 SQL:1992 标准^(⁵) 定义的四种事务隔离级别，它们按隔离程度降序排列为：`SERIALIZABLE`、`REPEATABLE\
  \ READ`、`READ COMMITTED` 和 `READ UNCOMMITTED`。可重复读事务隔离级别是默认级别。本章将介绍每种隔离级别，讨论它们的工作原理及其对锁的影响。\n\
  \n为了比较在不同事务隔离级别下更新行时采取的锁，将使用一个更新斯洛伐克布拉迪斯拉发地区城市的示例。`world.city` 表中有三个斯洛伐克城市：\n\n\
  ```sql\nmysql> SELECT ID, Name, District\nFROM world.city\nWHERE CountryCode = 'SVK';\n\
  +------+------------+--------------------+\n| ID   | Name       | District     \
  \      |\n+------+------------+--------------------+\n| 3209 | Bratislava | Bratislava\
  \         |\n| 3210 | Košice     | Východné Slovensko |\n| 3211 | Prešov     | Východné\
  \ Slovensko |\n+------+------------+--------------------+\n3 rows in set (0.0032\
  \ sec)\n```\n\n`UPDATE` 语句可以使用 `CountryCode` 上的索引来将搜索范围缩小到三个城市，然后使用 `District` 上的非索引过滤器来找到匹配该地区的一个城市。这将有助于揭示\
  \ `SERIALIZABLE`、`REPEATABLE READ` 和 `READ COMMITTED` 事务隔离级别的不同锁数量。对于 `SERIALIZABLE`\
  \ 和 `REPEATABLE READ`，还将使用 `SELECT` 语句进行额外测试。\n\n每个示例之后，您需要回滚事务以将数据库恢复到其原始状态：\n\n\
  ```sql\n-- 连接 1\n连接 1> ROLLBACK;\nQuery OK, 0 rows affected (0.3022 sec)\n```\n\n\
  说完这些，您就可以开始探索这四种事务隔离级别了。\n\n\n## 可序列化\n\n### 锁机制概述\n`SERIALIZABLE` 隔离级别是最严格的。除了启用\
  \ `autocommit` 且未显式启动事务的 `SELECT` 语句外，所有语句都会加锁。对于 `SELECT` 语句，这等同于添加了 `FOR SHARE`。这确保了事务的所有方面都是可重复的，但也意味着它是加锁最多的事务隔离级别。清单\
  \ 12-1 展示了 `SELECT` 语句所获取锁的示例。\n\n#### SELECT 语句示例\n```sql\n-- Connection   Processlist\
  \ ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
  --          1              967        1560          6\n--          2           \
  \   968        1561          6\n-- Connection 1\nConnection 1> SET transaction_isolation\
  \ = 'SERIALIZABLE';\nQuery OK, 0 rows affected (0.0007 sec)\nConnection 1> START\
  \ TRANSACTION;\nQuery OK, 0 rows affected (0.0003 sec)\nConnection 1> SELECT ID,\
  \ Name, Population\nFROM world.city\nWHERE CountryCode = 'SVK'\nAND District = 'Bratislava';\n\
  +------+------------+------------+\n| ID   | Name       | Population |\n+------+------------+------------+\n\
  | 3209 | Bratislava |     448292 |\n+------+------------+------------+\n1 row in\
  \ set (0.0006 sec)\n-- Connection 2\nConnection 2> SELECT index_name, lock_type,\n\
  lock_mode, lock_data\nFROM performance_schema.data_locks\nWHERE object_schema =\
  \ 'world'\nAND object_name = 'city'\nAND lock_type = 'RECORD'\nAND thread_id = 1560\n\
  ORDER BY index_name, lock_data DESC;\n+-------------+-----------+---------------+-------------+\n\
  | index_name  | lock_type | lock_mode     | lock_data   |\n+-------------+-----------+---------------+-------------+\n\
  | CountryCode | RECORD    | S,GAP         | 'SVN', 3212 |\n| CountryCode | RECORD\
  \    | S             | 'SVK', 3211 |\n| CountryCode | RECORD    | S            \
  \ | 'SVK', 3210 |\n| CountryCode | RECORD    | S             | 'SVK', 3209 |\n|\
  \ PRIMARY     | RECORD    | S,REC_NOT_GAP | 3211        |\n| PRIMARY     | RECORD\
  \    | S,REC_NOT_GAP | 3210        |\n| PRIMARY     | RECORD    | S,REC_NOT_GAP\
  \ | 3209        |\n+-------------+-----------+---------------+-------------+\n7\
  \ rows in set (0.0009 sec)\n-- Connection 1\nConnection 1> ROLLBACK;\nQuery OK,\
  \ 0 rows affected (0.0003 sec)\nListing 12-1\n在可序列化事务隔离级别下的读锁\n```\n\n该查询使用了二级索引，最终锁定了所有被读取记录的`CountryCode`索引和主键。此外，在最后一个斯洛伐克索引记录之后还存在一个间隙锁。所有的锁都是共享锁。\n\
  \n#### UPDATE 语句示例\n清单 12-2 展示了更新部分检查行的 `UPDATE` 语句的情况。\n\n```sql\n-- Connection\
  \   Processlist ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
  --          1              971        1567          6\n--          2           \
  \   972        1568          6\n-- Connection 1\nConnection 1> SET SESSION TRANSACTION\
  \ ISOLATION LEVEL SERIALIZABLE;\nQuery OK, 0 rows affected (0.0004 sec)\nConnection\
  \ 1> START TRANSACTION;\nQuery OK, 0 rows affected (0.0002 sec)\nConnection 1> UPDATE\
  \ world.city\nSET Population = Population * 1.10\nWHERE CountryCode = 'SVK'\nAND\
  \ District = 'Bratislava';\nQuery OK, 1 row affected (0.0006 sec)\nRows matched:\
  \ 1  Changed: 1  Warnings: 0\n-- Connection 2\nConnection 2> SELECT index_name,\
  \ lock_type,\nlock_mode, lock_data\nFROM performance_schema.data_locks\nWHERE object_schema\
  \ = 'world'\nAND object_name = 'city'\nAND lock_type = 'RECORD'\nAND thread_id =\
  \ 1567\nORDER BY index_name, lock_data DESC;\n+-------------+-----------+---------------+-------------+\n\
  | index_name  | lock_type | lock_mode     | lock_data   |\n+-------------+-----------+---------------+-------------+\n\
  | CountryCode | RECORD    | X,GAP         | 'SVN', 3212 |\n| CountryCode | RECORD\
  \    | X             | 'SVK', 3211 |\n| CountryCode | RECORD    | X            \
  \ | 'SVK', 3210 |\n| CountryCode | RECORD    | X             | 'SVK', 3209 |\n|\
  \ PRIMARY     | RECORD    | X,REC_NOT_GAP | 3211        |\n| PRIMARY     | RECORD\
  \    | X,REC_NOT_GAP | 3210        |\n| PRIMARY     | RECORD    | X,REC_NOT_GAP\
  \ | 3209        |\n+-------------+-----------+---------------+-------------+\n7\
  \ rows in set (0.0007 sec)\n-- Connection 1\nConnection 1> ROLLBACK;\nQuery OK,\
  \ 0 rows affected (0.0576 sec)\nListing 12-2\n在可序列化事务隔离级别下的锁\n```\n\n该语句仅更新了一个城市（`ID\
  \ = 3209`），但持有了所有三个斯洛伐克城市在主键和 `CountryCode` 索引上的锁，以及最后一个索引记录之后的间隙锁。\n\n### SET TRANSACTION\
  \ 语句\n请注意，此处使用 `SET TRANSACTION` 语句来设置事务隔离级别，而不是设置 `transaction_isolation` 变量。这两种方法可以互换，但\
  \ `SET SESION TRANSACTION` 还支持设置事务是只读还是读写。如果使用不带 `GLOBAL` 或 `SESSION` 作用域的 `SET\
  \ TRANSACTION` 语句，则它仅应用于下一个事务。\n\n### 使用场景与总结\n这种事务隔离级别不常用，但在调查锁问题或使用 XA 事务时可能很有用。除了\
  \ `SELECT` 语句会加锁这一点，该隔离级别与接下来讨论的 `REPEATABLE READ` 相同。\n\n\n\n## 可重复读\n\n`REPEATABLE\
  \ READ`隔离级别是`InnoDB`中的默认级别。顾名思义，它保证如果你重复执行一条读取语句，则会返回相同的结果。这也被称为一致性读，是通过称为快照的读视图来实现的。快照在事务内执行第一条语句时建立，或者如果使用`WITH\
  \ CONSISTENT SNAPSHOT`修饰符执行`START TRANSACTION`，则在事务开始时建立。\n\n一致性快照的一个重要副作用是，可以在仍然重复读取相同数据的同时进行非锁定读取。这扩展到包括所有`InnoDB`表，因此对不同表执行多个语句返回的数据对应于同一个时间点。具有其一致性快照的`REPEATABLE\
  \ READ`事务隔离级别，也允许使用`mysqlpump`和`mysqldump`等工具创建在线一致的逻辑备份。\n\n虽然`REPEATABLE READ`具有一些良好的隔离属性，并且不像`SERIALIZABLE`那样具有侵入性，但仍然存在相当程度的锁操作。清单\
  \ 12-3 展示了在斯洛伐克布拉迪斯拉发地区选择城市的示例的重复。\n\n```\n-- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              973        1571          6\n--          2           \
  \   974        1572          6\n-- 连接 1\nConnection 1> SET transaction_isolation\
  \ = 'REPEATABLE-READ';\nQuery OK, 0 rows affected (0.0004 sec)\nConnection 1> START\
  \ TRANSACTION;\nQuery OK, 0 rows affected (0.0003 sec)\nConnection 1> SELECT ID,\
  \ Name, Population\nFROM world.city\nWHERE CountryCode = 'SVK'\nAND District = 'Bratislava';\n\
  +------+------------+------------+\n| ID   | Name       | Population |\n+------+------------+------------+\n\
  | 3209 | Bratislava |     448292 |\n+------+------------+------------+\n1 row in\
  \ set (0.0006 sec)\n-- 连接 2\nConnection 2> SELECT index_name, lock_type,\nlock_mode,\
  \ lock_data\nFROM performance_schema.data_locks\nWHERE object_schema = 'world'\n\
  AND object_name = 'city'\nAND lock_type = 'RECORD'\nAND thread_id = 1571\nORDER\
  \ BY index_name, lock_data DESC;\n0 rows in set (0.0006 sec)\n-- 连接 1\nConnection\
  \ 1> ROLLBACK;\nQuery OK, 0 rows affected (0.0004 sec)\n清单 12-3\n在可重复读事务隔离级别下的读锁\n\
  ```\n\n在这种情况下，没有持任何锁，这是`SERIALIZABLE`和`REPEATABLE READ`事务隔离级别之间的重要区别。清单 12-4 展示了`UPDATE`语句的情况。\n\
  \n```\n-- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              975        1574          6\n--          2           \
  \   976        1575          6\n-- 连接 1\nConnection 1> SET transaction_isolation\
  \ = 'REPEATABLE-READ';\nQuery OK, 0 rows affected (0.0004 sec)\nConnection 1> START\
  \ TRANSACTION;\nQuery OK, 0 rows affected (0.0002 sec)\nConnection 1> UPDATE world.city\n\
  SET Population = Population * 1.10\nWHERE CountryCode = 'SVK'\nAND District = 'Bratislava';\n\
  Query OK, 1 row affected (0.0007 sec)\nRows matched: 1  Changed: 1  Warnings: 0\n\
  -- 连接 2\nConnection 2> SELECT index_name, lock_type,\nlock_mode, lock_data\nFROM\
  \ performance_schema.data_locks\nWHERE object_schema = 'world'\nAND object_name\
  \ = 'city'\nAND lock_type = 'RECORD'\nAND thread_id = 1574\nORDER BY index_name,\
  \ lock_data DESC;\n+-------------+-----------+---------------+-------------+\n|\
  \ index_name  | lock_type | lock_mode     | lock_data   |\n+-------------+-----------+---------------+-------------+\n\
  | CountryCode | RECORD    | X,GAP         | 'SVN', 3212 |\n| CountryCode | RECORD\
  \    | X             | 'SVK', 3211 |\n| CountryCode | RECORD    | X            \
  \ | 'SVK', 3210 |\n| CountryCode | RECORD    | X             | 'SVK', 3209 |\n|\
  \ PRIMARY     | RECORD    | X,REC_NOT_GAP | 3211        |\n| PRIMARY     | RECORD\
  \    | X,REC_NOT_GAP | 3210        |\n| PRIMARY     | RECORD    | X,REC_NOT_GAP\
  \ | 3209        |\n+-------------+-----------+---------------+-------------+\n7\
  \ rows in set (0.0010 sec)\n-- 连接 1\nConnection 1> ROLLBACK;\nQuery OK, 0 rows affected\
  \ (0.3036 sec)\n清单 12-4\n在可重复读事务隔离级别下的锁\n```\n\n这些锁与`SERIALIZABLE`中持有的七个锁相同。\n\n\
  关于一致性快照，你需要意识到的一个重要注意事项是它们只适用于读取。这意味着如果你从一个表中读取，然后另一个事务提交了更改，使得某些行匹配第一个事务中使用的过滤器，那么第一个事务将能够修改这些行，并且之后，它们将被包含在快照中。清单\
  \ 12-5 展示了这方面的示例。如果你想查看持有的锁，有两种可用的调查方法可以探索。\n\n\n### 数据库事务隔离级别示例与说明\n\n以下代码块展示了在`REPEATABLE\
  \ READ`隔离级别下，一致读与 DML 操作混合时的行为：\n\n```\n-- Connection   Processlist ID   Thread\
  \ ID   Event ID\n-- --------------------------------------------------\n--     \
  \     1              977        1578          6\n--          2              978\
  \        1579          6\n-- Connection 1\nConnection 1> SET transaction_isolation\
  \ = 'REPEATABLE-READ';\nQuery OK, 0 rows affected (0.0005 sec)\nConnection 1> START\
  \ TRANSACTION;\nQuery OK, 0 rows affected (0.0004 sec)\nConnection 1> SELECT ID,\
  \ Name, Population\nFROM world.city\nWHERE CountryCOde = 'BHS';\n+-----+--------+------------+\n\
  | ID  | Name   | Population |\n+-----+--------+------------+\n| 148 | Nassau | \
  \    172000 |\n+-----+--------+------------+\n1 row in set (0.0014 sec)\n-- Connection\
  \ 2\nConnection 2> START TRANSACTION;\nQuery OK, 0 rows affected (0.0004 sec)\n\
  Connection 2> INSERT INTO world.city\nVALUES (4080, 'Freeport', 'BHS',\n'Grand Bahama',\
  \ 50000);\nQuery OK, 1 row affected (0.0022 sec)\nConnection 2> COMMIT;\nQuery OK,\
  \ 0 rows affected (0.0983 sec)\n-- Connection 1\nConnection 1> SELECT ID, Name,\
  \ Population\nFROM world.city\nWHERE CountryCOde = 'BHS';\n+-----+--------+------------+\n\
  | ID  | Name   | Population |\n+-----+--------+------------+\n| 148 | Nassau | \
  \    172000 |\n+-----+--------+------------+\n1 row in set (0.0006 sec)\nConnection\
  \ 1> UPDATE world.city\nSET Population = Population * 1.10\nWHERE CountryCOde =\
  \ 'BHS';\nQuery OK, 2 rows affected (0.0012 sec)\nRows matched: 2  Changed: 2  Warnings:\
  \ 0\nConnection 1> SELECT ID, Name, Population\nFROM world.city\nWHERE CountryCOde\
  \ = 'BHS';\n+------+----------+------------+\n| ID   | Name     | Population |\n\
  +------+----------+------------+\n|  148 | Nassau   |     189200 |\n| 4080 | Freeport\
  \ |      55000 |\n+------+----------+------------+\n2 rows in set (0.0006 sec)\n\
  Listing 12-5\nConsistent reads mixed with DML\n```\n\n当连接 1 第一次查询巴哈马的所有城市（`CountryCode\
  \ = 'BHS'`）时，只返回了拿骚这座城市。随后，连接 2 插入了自由港市的一行数据并提交了其事务。当连接 1 重复执行其`SELECT`语句时，返回的仍然只有拿骚。到目前为止一切正常。这正是“一致读”特性所预期的行为。然而，当连接\
  \ 1 将巴哈马所有城市的人口增加 10%后，更新了两行数据，随后的一次`SELECT`操作揭示了自由港市现在也出现在连接 1 的读视图中。\n\n这种行为并非一个缺陷！它之所以发生，是因为在`REPEATABLE\
  \ READ`事务隔离级别下，读操作是非锁定的。若想避免此行为，你或者需要在连接 1 中使用`FOR SHARE`子句显式请求一个共享锁，或者需要将事务隔离级别更改为`SERIALIZABLE`。\n\
  \n一致读所付出的代价是需要持有相对大量的锁，并且 InnoDB 必须维护数据的多个版本。回顾一下关于 undo 日志的讨论：只要还存在一个在给定事务之前启动的读视图，该事务的\
  \ undo 日志就必须被保留，而跟踪相同行的不同版本是昂贵的。\n\n如果不需要一致读，那么`READ COMMITTED`事务隔离级别是一个不错的选择。\n\
  \n## 读已提交\n\n如果你习惯使用其他关系型数据库系统，如 Oracle DB 或 PostgreSQL，那么你很可能一直在使用`READ COMMITTED`事务隔离级别。MySQL\
  \ 中的`NDBCluster`存储引擎也使用`READ COMMITTED`。这个隔离级别很受欢迎，因为它为许多工作负载提供了足够强的隔离性，并且相比`REPEATABLE\
  \ READ`和`SERIALIZABLE`隔离级别，其锁定开销有所减少。\n\n`REPEATABLE READ`与`READ COMMITTED`的主要区别在于：\n\
  \n*   `READ COMMITTED`不支持一致读（尽管单条语句仍然返回一致的结果）。由于读视图的生命周期仅与语句的生命周期相同，InnoDB 可以更快地清除旧的\
  \ undo 日志。这个优势对于长时间运行的事务最为显著。\n\n*   DML 语句在检查但未修改的记录上所获取的锁，会在`WHERE`子句求值完成后立即释放。\n\
  \n*   `READ COMMITTED`只会在检查外键和唯一键约束时，以及在处理页分裂（page split）时才获取间隙锁（gap lock）。当 InnoDB\
  \ 页接近填满，并且需要将一条记录插入到页的中间，或者一条现有记录增长导致页内不再有空间时，就会发生页分裂。\n\n*   对于使用非索引列解析的`WHERE`子句，*半一致读*特性允许事务使用某行数据最后提交的值来匹配过滤条件，即使该行已被锁定。\n\
  \n由于缺少间隙锁，所谓的幻行（phantom rows）就可能出现。幻行发生在同一条语句在同一个事务内执行两次，但即使是像`SELECT ... FOR SHARE`这样的锁定语句，也会返回不同的行时。\n\
  \n### 难以捉摸的间隙锁\n\nMySQL 历史上一次更棘手的 bug 搜寻发生在 MySQL 5.7 和正式发布前的 MySQL 8 中。在复制设置中使用\
  \ XA 事务时，副本上会随机出现锁等待超时和死锁，且这些阻塞完全是由复制流量本身引起的。源库上没有任何锁问题，这怎么可能呢？\n\n该问题由多个部分组成。首先，在\
  \ MySQL 5.7 及更高版本中，XA 事务在准备（prepared）阶段被写入二进制日志，而它们提交的顺序可能与准备的顺序不同，这意味着即使在单线程复制中，副本上也可能有多个写入事务同时打开。\n\
  \n其次，该问题主要通过强制实施基于行的复制（row-based replication）并始终使用`READ COMMITTED`事务隔离级别得到了解决。然而，非常令人费解的是，偶尔——看似随机地——副本上仍然会出现锁冲突。最终发现，罪魁祸首是页分裂引起的间隙锁。页分裂在源库和副本上发生的时间点并不相同，因此最终导致了副本上额外的锁。该问题最终在\
  \ 5.7.22 和 8.0.4 版本中得到解决，解决方案是在 XA 事务到达准备阶段时，由复制线程释放所获取的间隙锁。\n\n如果你在`READ COMMITTED`事务隔离级别下尝试这个重复执行的`UPDATE`语句示例，你会看到它比之前（`REPEATABLE\
  \ READ`下）获取的锁更少。这如清单 12-6 所示。\n\n\n## 读已提交 (Read Committed)\n\n```\n-- 连接   进程列表\
  \ ID   线程 ID   事件 ID\n-- --------------------------------------------------\n--\
  \          1              980        1582          6\n--          2            \
  \  981        1583          6\n-- 连接 1\nConnection 1> SET transaction_isolation\
  \ = 'READ-COMMITTED';\nQuery OK, 0 rows affected (0.0002 sec)\nConnection 1> START\
  \ TRANSACTION;\nQuery OK, 0 rows affected (0.0002 sec)\nConnection 1> UPDATE world.city\n\
  SET Population = Population * 1.10\nWHERE CountryCode = 'SVK'\nAND District = 'Bratislava';\n\
  Query OK, 1 row affected (0.0007 sec)\nRows matched: 1  Changed: 1  Warnings: 0\n\
  -- 连接 2\nConnection 2> SELECT index_name, lock_type,\nlock_mode, lock_data\nFROM\
  \ performance_schema.data_locks\nWHERE object_schema = 'world'\nAND object_name\
  \ = 'city'\nAND lock_type = 'RECORD'\nAND thread_id = 1582\nORDER BY index_name,\
  \ lock_data DESC;\n+-------------+-----------+---------------+-------------+\n|\
  \ index_name  | lock_type | lock_mode     | lock_data   |\n+-------------+-----------+---------------+-------------+\n\
  | CountryCode | RECORD    | X,REC_NOT_GAP | 'SVK', 3209 |\n| PRIMARY     | RECORD\
  \    | X,REC_NOT_GAP | 3209        |\n+-------------+-----------+---------------+-------------+\n\
  2 rows in set (0.0008 sec)\n-- 连接 1\nConnection 1> ROLLBACK;\nQuery OK, 0 rows affected\
  \ (0.0754 sec)\n清单 12-6\n在 READ COMMITTED 事务隔离级别下的锁定\n```\n\n`SERIALIZABLE` 和 `REPEATABLE\
  \ READ` 隔离级别持有七个记录和间隙锁，而 `READ COMMITTED` 只在一个 `CountryCode` 索引和一个主键上持有锁——尽管在输出时，其他被检查的索引和行记录上的锁已经被释放。这大大减少了锁等待和死锁的可能性。\n\
  \n`READ COMMITTED` 隔离级别一个较少被提及的特性是半一致读 (semi-consistent reads)，它允许一条语句使用列的最后提交值与其\
  \ `WHERE` 子句进行比较。如果确定该行不会受此语句影响，即使另一个事务持有锁，也不会发生锁冲突。如果该行将被更新，则会重新评估条件，并使用锁来防止冲突的更改。清单\
  \ 12-7 展示了此特性的一个示例。如果你想查看持有的锁，有两种可用的调查方法。\n\n```\n-- 连接   进程列表 ID   线程 ID   事件 ID\n\
  -- --------------------------------------------------\n--          1           \
  \   986        1592          6\n--          2              987        1593     \
  \     6\n-- 连接 1\nConnection 1> SET transaction_isolation = 'READ-COMMITTED';\n\
  Query OK, 0 rows affected (0.0004 sec)\nConnection 1> START TRANSACTION;\nQuery\
  \ OK, 0 rows affected (0.0004 sec)\nConnection 1> UPDATE world.city\nSET Population\
  \ = Population * 1.10\nWHERE Name = 'San Jose'\nAND District = 'Southern Tagalog';\n\
  Query OK, 1 row affected (0.0106 sec)\nRows matched: 1  Changed: 1  Warnings: 0\n\
  -- 连接 2\nConnection 2> SET transaction_isolation = 'READ-COMMITTED';\nQuery OK,\
  \ 0 rows affected (0.0004 sec)\nConnection 2> START TRANSACTION;\nQuery OK, 0 rows\
  \ affected (0.0065 sec)\nConnection 2> UPDATE world.city\nSET Population = Population\
  \ * 1.10\nWHERE Name = 'San Jose'\nAND District = 'Central Luzon';\nQuery OK, 1\
  \ row affected (0.0060 sec)\nRows matched: 1  Changed: 1  Warnings: 0\n清单 12-7\n\
  READ COMMITTED 半一致读\n```\n\n两个事务都更新名为 San Jose 的城市，但位于不同的区（District）。`Name` 和 `District`\
  \ 列都没有被索引。即使第二个事务确实检查了 `Name = 'San Jose' AND District = 'Southern Tagalog'` 这一行，也不会发生锁冲突，因为基于区的事务确定它不会更新该行。但是，如果为\
  \ `Name` 列添加了索引，那么就会发生锁冲突，因此该特性目前对大表的价值有限。\n\n从这个讨论中，你可能会认为 `READ COMMITTED` 的性能总是比\
  \ `REPEATABLE READ` 好。这是最符合逻辑的结论，然而，事情往往比这更复杂。需要注意的是，要启动一个读视图 (read view)，需要 `trx_sys`\
  \ 互斥锁（即 `wait/synch/mutex/innodb/trx_sys_mutex` Performance Schema 工具），而由于 `READ\
  \ COMMITTED` 为每条语句启动一个新的读视图，它最终获取 `trx_sys` 互斥锁的频率会远高于 `REPEATABLE READ`。最终，如果你有大量快速的事务和语句，在\
  \ `READ COMMITTED` 下可能会因为互斥锁上的活动过多而成为严重的瓶颈，这时使用 `REPEATABLE READ` 会更好。对于运行时间较长的事务和语句，平衡则会向\
  \ `READ COMMITTED` 倾斜。\n\n> **提示:**\n> 如果你对展示 `trx_sys` 互斥锁如何影响性能的基准测试感兴趣，请参阅 [`http://dimitrik.free.fr/blog/archives/2015/02/mysql-performance-impact-of-innodb-transaction-isolation-modes-in-mysql-57.html`](http://dimitrik.free.fr/blog/archives/2015/02/mysql-performance-impact-of-innodb-transaction-isolation-modes-in-mysql-57.html)。\n\
  \n## 读未提交 (Read Uncommitted)\n\n最后一个事务隔离级别是 `READ UNCOMMITTED`。顾名思义，使用此隔离级别的事务被允许读取尚未提交的数据；这也被称为\
  \ *脏读*。这听起来可能非常危险，在大多数情况下，这绝对是不可取的。然而，在少数特殊情况下，它可能很有用。除了脏读之外，其行为与 `READ COMMITTED`\
  \ 相同。`READ UNCOMMITTED` 相对于 `READ COMMITTED` 的主要优点是，InnoDB 为了满足查询，永远不需要保留超过一个版本的数据。\n\
  \n`READ UNCOMMITTED` 主要用于只需要近似值的情况、批量插入以及你想要窥探另一个事务所做更改的调查场景。只需要近似值的一个例子是计算索引统计信息，InnoDB\
  \ 为此使用了 `READ UNCOMMITTED`。对于批量插入，MySQL Shell 的并行表数据导入功能（JavaScript 中的 `util.importTable()`\
  \ 或 Python 中的 `util.import_table()`）会在批量加载期间切换到 `READ UNCOMMITTED`。\n\n### 总结\n\n\
  本章探讨了 InnoDB 支持的四种事务隔离级别。最严格的隔离级别是 `SERIALIZABLE`，它对所有语句都加锁，除了自动提交的单语句 `SELECT`\
  \ 事务。`REPEATABLE READ` 隔离级别支持非锁定读，但保持了对一致性读的支持。需要注意的是，如果一个事务更新了在读视图建立之后提交的行，那么更新后的行会被添加到视图中。\n\
  \n下一级是 `READ COMMITTED`，它放弃了始终包含所有已提交行的一致性读。它确实会导致幻行，但另一方面，`READ COMMITTED` 需要的锁更少，持有时间更短，从而大大减少了锁冲突的可能性。最后一个隔离级别是\
  \ `READ UNCOMMITTED`，其行为类似于 `READ COMMITTED`，但允许脏读，即读取尚未提交的更改。\n\n这就结束了本书的理论部分。接下来的章节将介绍六个案例研究，第一个分析涉及刷新锁\
  \ (flush locks) 的问题。\n\n脚注 1\n\n\n\n# 13. 案例研究：刷新锁\n\n锁问题是导致性能问题的常见原因之一，其影响可能非常严重。在最糟糕的情况下，查询可能失败，连接会堆积，导致无法建立新连接。因此，了解如何调查锁问题并修复问题至关重要。\n\
  \n本章及后续章节将讨论六类锁问题：\n\n-   刷新锁\n-   元数据和模式锁\n-   记录级锁（包括间隙锁）\n-   死锁\n-   外键\n- \
  \  信号量\n\n除了外键案例研究，每种锁类型都使用不同的技术来确定锁争用的原因。阅读示例时，请记住可以使用类似的技术来调查不完全符合示例的锁问题。对于前四个案例研究（第\
  \ 13-16 章），讨论分为六个部分：\n\n-   **症状：** 这些能让你识别遇到的锁问题类型。\n-   **原因：** 遇到此类锁问题的根本原因。这与本书前面（特别是第\
  \ 6 章和第 7 章）关于锁的总体讨论有关。\n-   **设置：** 这包括如果你想自己尝试复现该锁问题所需的步骤。由于锁争用需要多个连接，提示符（例如 `Connection\
  \ 1>`）用于指示哪个连接应用于哪个语句。如果你想在没有任何额外信息的情况下进行调查（就像在真实案例中那样），可以跳过此部分，在完成调查后再回头查看。\n-\
  \   **调查：** 调查的详细过程。这借鉴了第 2-4 章关于监控的讨论。\n-   **解决方案：** 如何解决当前的锁问题，以最小化其造成的停机时间。\n\
  -   **预防：** 讨论如何减少遇到此问题的机会。这与第 9 章中关于减少锁问题的讨论密切相关。\n\n最后两个关于外键和信号量的案例研究遵循类似的模式。\n\
  \n闲话少说，首先讨论的锁类别是刷新锁，这是最难调查的锁问题之一。\n\n## 症状\n\n刷新锁问题的主要症状是数据库完全停止，所有使用部分或全部表的新查询最终都在等待刷新锁。需要注意的迹象包括：\n\
  \n-   新查询的查询状态为“Waiting for table flush”。这可能发生在所有新查询上，或者仅发生在访问特定表的查询上。\n-   创建的连接越来越多。\n\
  -   最终，由于 MySQL 连接数用尽，新连接失败。新连接收到的错误是 `ER_CON_COUNT_ERROR`：`ERROR 1040 (HY000):\
  \ Too many connections`。（在 8.0.19 或更早版本中使用 X 协议时，错误是 `MySQL Error 5011: Could not\
  \ open session`。）\n-   至少有一个查询的运行时间超过了最早请求刷新锁的时间。\n-   进程列表中可能存在 `FLUSH TABLES`\
  \ 语句，但情况并非总是如此。\n-   当 `FLUSH TABLES` 语句等待 `lock_wait_timeout` 超时后，会发生 `ER_LOCK_WAIT_TIMEOUT`\
  \ 错误：`ERROR: 1205: Lock wait timeout exceeded; try restarting transaction`。由于 `lock_wait_timeout`\
  \ 的默认值是 365 天，这种情况只有在超时时间被缩短时才可能发生。\n-   如果使用设置了默认数据库的 `mysql` 命令行客户端连接，在你看到提示符之前，连接可能看起来像是挂起了。如果你在连接打开时更改默认数据库，也可能发生同样的情况。\n\
  \    **提示** `mysql` 命令行客户端阻塞的问题不会发生，如果你使用 `-A` 选项启动客户端，该选项会禁用收集自动完成信息。更好的解决方案是使用\
  \ MySQL Shell，它以不因刷新锁而阻塞的方式获取自动完成信息。\n\n如果你看到这些症状，就该了解导致锁问题的原因了。\n\n## 原因\n\n当一个连接请求刷新表时，它要求关闭对该表的所有引用，这意味着没有活动查询可以使用该表。因此，当刷新请求到达时，它必须等待所有正在使用待刷新表的查询完成。请注意，除非你明确指定要刷新哪些表，否则只需要查询完成，而不是整个事务完成。显然，刷新所有表的情况（例如，由于\
  \ `FLUSH TABLES WITH READ LOCK`）是最严重的，因为它意味着在 `FLUSH TABLES` 语句能够继续执行之前，所有活动查询都必须完成。\n\
  \n当等待刷新锁成为问题时，意味着有一个或多个查询阻止了 `FLUSH TABLES` 语句获取刷新锁。由于 `FLUSH TABLES` 语句需要排他锁，它反过来又会阻止后续查询获取它们所需的共享锁。\n\
  \n此问题通常与备份相关，因为备份过程需要刷新所有表并获取读锁以创建一致的备份。\n\n一种特殊情况可能发生在 `FLUSH TABLES` 语句已超时或被杀死，但后续查询未继续执行时。当这种情况发生时，是因为低级别的表定义缓存版本锁未被释放。这种情况可能会引起混淆，因为后续查询为何仍在等待表刷新并不明显。当\
  \ `ANALYZE TABLE` 语句触发对被分析表或表的隐式刷新时，也会发生类似的情况。\n\n## 设置\n\n将要调查的锁情况涉及三个连接（不包括用于调查的连接）。第一个连接执行一个慢查询，第二个连接以读锁刷新所有表，最后一个连接执行一个快速查询。语句如代码清单\
  \ 13-1 所示。\n\n```\n-- Connection   Processlist ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
  --          1              668        1106          6\n--          2           \
  \   669        1107          6\n--          3              670        1108     \
  \     6\n-- Connection 1\nConnection 1> SELECT city.*, SLEEP(3600) FROM world.city\
  \ WHERE ID = 130;\n-- Connection 2\nConnection 2> FLUSH TABLES WITH READ LOCK;\n\
  -- Connection 3\nConnection 3> SELECT * FROM world.city WHERE ID = 3805;\n```\n\
  **清单 13-1** 触发刷新锁争用\n\n第一个查询中使用 `SLEEP(3600)` 意味着你有一个小时（3600 秒）的时间来执行另外两个查询并进行调查。如果你想停止锁情况，可以终止该查询：\n\
  \n```\n-- Investigation #6\n-- Connection 4\nConnection 4> KILL 668;\nQuery OK,\
  \ 0 rows affected (0.0004 sec)\n```\n\n现在，你已经准备好开始调查了。\n\n\n\n### 问题调查\n\n## 从 `sys.session`\
  \ 视图进行调查\n\n调查 flush locks 需要查看实例上正在运行的查询列表。与其他锁争用不同，没有 Performance Schema 表或 InnoDB\
  \ 监控报告可用于直接查询阻塞的查询。\n\n列表 [13-2] 展示了使用 `sys.session` 视图输出的示例。使用其他获取查询列表的方法也会产生类似结果。线程和连接\
  \ ID 以及语句延迟会有所不同。\n\n```\n-- 调查 #1\n-- 连接 4\nConnection 4> SELECT thd_id, conn_id,\
  \ state,\ncurrent_statement,\nstatement_latency\nFROM sys.session\nWHERE command\
  \ = 'Query'\\G\n*************************** 1. row ***************************\n\
  thd_id: 1106\nconn_id: 668\nstate: User sleep\ncurrent_statement: SELECT city.*,\
  \ SLEEP(3600) FROM world.city WHERE ID = 130\nstatement_latency: 1.48 min\n***************************\
  \ 2. row ***************************\nthd_id: 1107\nconn_id: 669\nstate: Waiting\
  \ for table flush\ncurrent_statement: FLUSH TABLES WITH READ LOCK\nstatement_latency:\
  \ 1.44 min\n*************************** 3. row ***************************\nthd_id:\
  \ 1108\nconn_id: 670\nstate: Waiting for table flush\ncurrent_statement: SELECT\
  \ * FROM world.city WHERE ID = 3805\nstatement_latency: 1.41 min\n***************************\
  \ 4. row ***************************\nthd_id: 1105\nconn_id: 667\nstate: NULL\n\
  current_statement: SELECT thd_id, conn_id, state, ... on     WHERE command = 'Query'\n\
  statement_latency: 40.63 ms\n4 rows in set (0.0419 sec)\nListing 13-2\n使用 sys.session\
  \ 调查 flush lock 争用\n```\n\n输出中有四个查询。`sys.session` 和 `sys.processlist` 视图默认按执行时间降序排列查询。这使得调查诸如\
  \ flush lock 周围的争用等问题变得容易，因为查询时间是寻找原因时首要考虑的因素。\n\n你首先寻找 `FLUSH TABLES` 语句（没有 `FLUSH\
  \ TABLES` 语句的情况将在稍后讨论）。在这个例子中，是 `thd_id = 1107`（第二行）。注意 `FLUSH` 语句的状态是 \"Waiting\
  \ for table flush\"。然后你寻找运行时间更长的查询。在这个例子中，只有一个查询：即 `thd_id = 1106` 的那个。这就是阻止 `FLUSH\
  \ TABLES WITH READ LOCK` 完成的查询。一般来说，可能有多个查询。\n\n剩下的两个查询分别是被 `FLUSH TABLES WITH READ\
  \ LOCK` 阻塞的查询和用于获取输出的查询。前三个查询一起构成了一个典型的例子：一个长时间运行的查询阻塞了 `FLUSH TABLES` 语句，而该语句又阻塞了其他查询。\n\
  \n## 从 MySQL Workbench 进行调查\n\n你也可以从 MySQL Workbench 获取进程列表，在某些情况下也可以从你的监控解决方案获取（MySQL\
  \ Enterprise Monitor 是一个例子）。在 MySQL Workbench 中，你可以通过选择导航器中的 Administration 选项卡来使用\
  \ *Client Connections* 报告，如图 [13-1] 所示。\n\n![../images/502546_1_En_13_Chapter/502546_1_En_13_Fig1_HTML.jpg](img/502546_1_En_13_Fig1_HTML.jpg)\n\
  \n**图 13-1** 导航到客户端连接报告\n\n通过选择 *Management* 部分中的 *Client Connections* 来打开报告。\n\n\
  该报告从 `performance_schema.threads` 表获取进程信息，并通过 `LEFT JOIN` 连接 `performance_schema.session_connect_attrs`\
  \ 表以获取程序名称。你可以选择是否过滤后台线程以及空闲连接，并且 MySQL Workbench 允许你在不重新执行生成报告的语句的情况下更改排序。你还可以选择刷新报告。图\
  \ [13-2] 展示了此案例研究的一个示例。\n\n![../images/502546_1_En_13_Chapter/502546_1_En_13_Fig2_HTML.jpg](img/502546_1_En_13_Fig2_HTML.jpg)\n\
  \n**图 13-2** 在 MySQL Workbench 中显示客户端连接\n\n你无法选择要包含哪些列，为了使文本可读，截图中仅包含报告的一部分。*Id*\
  \ 列对应于 `sys.session` 输出中的 `conn_id`，而 *Thread*（靠近中间）对应于 `thd_id`。完整截图包含在本书的 GitHub\
  \ 仓库中，文件名为 `figure_13_2_workbench_flush_lock.png`。\n\n像 MySQL Workbench 和 MySQL\
  \ Enterprise Monitor 中的报告这样的优势是，它们使用现有连接来创建报告。在锁问题导致所有连接都被使用的情况下，能够使用监控解决方案获取查询列表可能是无价的。\n\
  \n## 无 `FLUSH TABLES` 语句的争用\n\n如前所述，`FLUSH TABLES` 语句可能并不总是出现在查询列表中。仍然有查询在等待刷新表的原因是低级别的\
  \ TDC 版本锁。调查的原理保持不变，但这可能会让人困惑。列表 [13-3] 展示了一个使用相同设置但在调查前终止执行刷新语句的连接的示例（如果你在执行 `FLUSH\
  \ TABLES WITH READ LOCK` 时是交互式的，可以在 MySQL Shell 中使用 Ctrl+C）。\n\n```\n-- 调查 #7\n\
  Connection 4> KILL 669;\nQuery OK, 0 rows affected (0.0004 sec)\n-- 调查 #1\nConnection\
  \ 4> SELECT thd_id, conn_id, state,\ncurrent_statement,\nstatement_latency\nFROM\
  \ sys.session\nWHERE command = 'Query'\\G\n*************************** 1. row ***************************\n\
  thd_id: 1106\nconn_id: 668\nstate: User sleep\ncurrent_statement: SELECT city.*,\
  \ SLEEP(3600) FROM world.city WHERE ID = 130\nstatement_latency: 3.88 min\n***************************\
  \ 2. row ***************************\nthd_id: 1108\nconn_id: 670\nstate: Waiting\
  \ for table flush\ncurrent_statement: SELECT * FROM world.city WHERE ID = 3805\n\
  statement_latency: 3.81 min\n*************************** 3. row ***************************\n\
  thd_id: 1105\nconn_id: 667\nstate: NULL\ncurrent_statement: SELECT thd_id, conn_id,\
  \ state, ... on     WHERE command = 'Query'\nstatement_latency: 39.53 ms\n3 rows\
  \ in set (0.0406 sec)\nListing 13-3\n无 FLUSH TABLES 语句的 flush lock 争用\n```\n\n这种情况与之前相同，只是\
  \ `FLUSH TABLES` 语句消失了。在这种情况下，找到等待时间最长的、状态为 \"Waiting for table flush\" 的查询。运行时间比该查询等待时间更长的查询就是阻止\
  \ TDC 版本锁被释放的查询。在这个例子中，这意味着 `thd_id = 668` 是阻塞查询。\n\n一旦你识别出问题和涉及的主要查询，你需要决定如何处理该问题。\n\
  \n\n### 解决方案\n\n解决问题有两个层面。首先，你需要解决查询无法执行的紧急问题。其次，你需要着手避免未来再次发生此问题。本小节将讨论紧急解决方案，下一小节将探讨如何降低问题发生的概率。\n\
  \n要解决紧急问题，你可以选择等待查询完成，或者开始终止查询。如果能在刷写锁争用期间将应用程序重定向到另一个实例，你或许可以通过让长时间运行的查询自行完成来使情况自行解决。如果正在运行或等待的查询中包含数据更改查询，那么在这种情况下，你需要考虑所有查询完成后系统是否会处于一致状态。一种可能的选择是在另一个实例上执行读查询，以只读模式继续运行。\n\
  \n提示\n\n如果长时间运行的查询是缺少连接子句的异常查询，它可能需要非常长的时间才能完成。本书作者曾经历过一个运行了数月的查询。在决定是否等待时，你需要尝试估算查询所需时间。一个好的选择是使用\
  \ `EXPLAIN FOR CONNECTION <processlist id>` 命令来检查长时间运行查询的查询计划。\n\n如果你决定终止查询，可以尝试终止\
  \ `FLUSH TABLES` 语句。如果这奏效，那是最简单的解决方案。然而，如前所述，这并不总是有帮助，在这种情况下，唯一的解决方法是终止那些阻止 `FLUSH\
  \ TABLES` 语句完成的查询。如果长时间运行的查询看起来像是失控的查询，并且执行它们的应用程序/客户端已不再等待它们，你可能希望直接终止它们，而无需先尝试终止\
  \ `FLUSH TABLES` 语句。\n\n在考虑终止查询时，一个重要的考虑因素是已经更改了多少数据。对于纯 `SELECT` 查询（不涉及存储例程），更改的数据量总是零，从已完成工作的角度来看，终止它是安全的。然而，对于\
  \ `INSERT`、`UPDATE`、`DELETE` 及类似的查询，如果查询被终止，已更改的数据必须回滚。回滚更改通常比最初执行更改花费的时间更长，因此如果有大量更改，请准备好等待很长时间进行回滚。你可以使用\
  \ `information_schema.INNODB_TRX` 视图，通过查看 `trx_rows_modified` 列来估算已完成的工作量。如果需要回滚的工作量很大，通常最好让查询完成。\n\
  \n注意\n\n当 DML 语句被终止时，它已完成的工作必须回滚。回滚通常比创建更改花费的时间更长，有时会长很多。如果你考虑终止长时间运行的 DML 语句，需要将这一点考虑在内。\n\
  \n当然，最优的情况是你完全防止问题发生。\n\n### 预防措施\n\n刷写锁争用之所以发生，是因为长时间运行的查询和 `FLUSH TABLES` 语句的组合。因此，要防止此问题，你需要研究可以采取哪些措施来避免这两种情况同时出现。\n\
  \n查找、分析和处理长时间运行的查询超出了本书的范围。然而，一个特别值得关注的选择是设置查询超时，这对于 `SELECT` 语句是支持的，可以通过 `max_execution_time`\
  \ 系统变量和 `MAX_EXECUTION_TIME(N)` 优化器提示来实现，这是防止查询失控的好方法。一些连接器也支持查询超时。\n\n提示\n\n要避免长时间运行的\
  \ `SELECT` 查询，你可以配置 `max_execution_time` 选项或设置 `MAX_EXECUTION_TIME(N)` 优化器提示。这将使\
  \ `SELECT` 语句在指定时间段后超时，并有助于防止出现像刷写锁等待这样的问题。\n\n有些长时间运行的查询是无法预防的。它可能是一个报表任务、构建缓存表或其他必须访问大量数据的任务。在这种情况下，你能做的最好的事情就是尝试避免它们在需要刷新表的同时运行。一种选择是将长时间运行的查询安排在不需要刷新表的时间运行。另一种选择是让长时间运行的查询在与需要刷新表的任务不同的实例上运行。\n\
  \n一个需要刷新表的常见任务是进行备份。在 MySQL 8 中，你可以通过使用备份和日志锁来避免此问题。例如，MySQL Enterprise Backup (MEB)\
  \ 在 8.0.16 及更高版本中会这样做，因此 InnoDB 表永远不会被刷新。或者，你可以在使用率低的时段执行备份，这样发生冲突的可能性较低，甚至可以在系统处于只读模式时进行备份，从而完全避免\
  \ `FLUSH TABLES WITH READ LOCK`。\n\n### 总结\n\n本章研究了一种情况，即长时间运行的查询阻止了 `FLUSH TABLES\
  \ WITH READ LOCK` 语句获取刷写锁，这进而又阻止了之后启动的查询执行。像这样的情况是最难调查的情况之一，因为无法从 Performance Schema\
  \ 的锁表中获得帮助。相反，你需要查看进程列表，寻找比 `FLUSH TABLES` 语句更早的查询，或者（如果该语句不存在）则寻找等待刷写锁时间最长的连接。\n\
  \n在大多数情况下，你可以选择等待长时间运行的查询完成或终止它以解决问题。是否终止查询取决于查询的目的以及事务已做的更改数量。为了防止此问题，你可以尝试将任务分开，使长时间运行的查询和\
  \ `FLUSH TABLE` 语句不同时执行，或者让它们在不同的 MySQL 实例上执行。对于 `SELECT` 语句，你还可以使用 `max_execution_time`\
  \ 选项或 `MAX_EXECUTION_TIME(N)` 优化器开关来自动终止长时间运行的查询。\n\n另一种经常引起混淆的锁类型是元数据锁。下一章将讨论一个涉及元数据锁的案例研究。\n\
  \n# 14. 案例研究：元数据锁与模式锁\n\n在 MySQL 5.7 及更早版本中，元数据锁常常是困惑的来源。问题在于不清楚谁持有元数据锁。在 MySQL\
  \ 5.7 中，元数据锁的检测被添加到 Performance Schema 中，而在 MySQL 8.0 中，默认启用该检测。启用检测后，可以轻松确定是谁阻止了尝试获取锁的连接。本章通过一个涉及元数据锁的情况示例进行讲解。首先讨论其症状。\n\
  \n\n## 症状\n\n元数据锁争用的症状与刷新锁争用的症状相似。在典型情况下，会出现一个长时间运行的查询或事务、一个等待元数据锁的 DDL 语句，并且可能有查询堆积。需要注意的症状如下：\n\
  \n*   一个 DDL 语句（可能还有其他查询）卡在“等待表元数据锁”状态。\n*   查询可能会堆积。所有等待的查询都使用了同一个表。（如果有多个表的 DDL\
  \ 语句在等待元数据锁，则可能有多组查询在等待。）\n*   当 DDL 语句等待了 `lock_wait_timeout` 时间后，会发生 `ER_LOCK_WAIT_TIMEOUT`\
  \ 错误：`ERROR: 1205: Lock wait timeout exceeded; try restarting transaction`。由于 `lock_wait_timeout`\
  \ 的默认值是 365 天，因此只有在超时时间被缩短时才可能发生此错误。\n*   存在一个长时间运行的查询或长时间运行的事务。在后一种情况下，事务可能处于空闲状态，或者正在执行一个不使用\
  \ DDL 语句所操作表的查询。\n\n使情况可能变得复杂的是最后一点：可能没有任何明显的长时间运行查询是导致锁问题的候选者。那么，元数据锁争用的原因是什么？\n\
  \n## 原因\n\n请记住，元数据锁的存在是为了保护模式定义（同时也与显式锁一起使用）。只要事务处于活动状态，模式保护就会存在，因此当事务查询一个表时，元数据锁将一直持续到事务结束。因此，您可能看不到任何长时间运行的查询。实际上，持有元数据锁的事务可能根本没有执行任何操作。\n\
  \n简而言之，元数据锁的存在是因为一个或多个连接可能依赖于给定表的模式不发生变化，或者它们已经使用 `LOCK TABLES` 或 `FLUSH TABLES\
  \ WITH READ LOCK` 语句显式锁定了该表。\n\n## 设置\n\n本次元数据锁的调查示例使用了与前一章示例中类似的三个连接。第一个连接处于一个事务的中间，第二个连接尝试为该事务正在使用的表添加索引，第三个连接尝试对同一个表执行查询。查询如代码清单\
  \ 14-1 所示。\n\n```\n-- 连接   进程列表 ID   线程 ID   事件 ID\n-- --------------------------------------------------\n\
  --          1              713        1181          6\n--          2           \
  \   714        1182          6\n--          3              715        1183     \
  \     6\n-- 连接 1\nConnection 1> START TRANSACTION;\nQuery OK, 0 rows affected (0.0003\
  \ sec)\nConnection 1> SELECT * FROM world.city WHERE ID = 3805\\G\n***************************\
  \ 1. row ***************************\nID: 3805\nName: San Francisco\nCountryCode:\
  \ USA\nDistrict: California\nPopulation: 776733\n1 row in set (0.0007 sec)\nConnection\
  \ 1> SELECT Code, Name FROM world.country WHERE Code = 'USA'\\G\n***************************\
  \ 1. row ***************************\nCode: USA\nName: United States\n1 row in set\
  \ (0.0005 sec)\n-- 连接 2\nConnection 2> ALTER TABLE world.city ADD INDEX (Name);\n\
  -- 连接 3\nConnection 3> SELECT * FROM world.city WHERE ID = 130;\n代码清单 14-1\n触发元数据锁争用\n\
  ```\n\n此时，您可以开始进行调查。这种情况不会自行解决（除非您的 `lock_wait_timeout` 值很低，或者您愿意等待一年），所以您有充足的时间。当您想解除阻塞时，可以开始终止连接\
  \ 2 中的 `ALTER TABLE` 语句，以避免修改 world.city 表。然后提交或回滚连接 1 中的事务。\n\n## 调查\n\n如果您启用了\
  \ `wait/lock/metadata/sql/mdl` Performance Schema 仪器（MySQL 8 的默认设置），调查元数据锁问题就非常简单。您可以使用\
  \ Performance Schema 中的 `metadata_locks` 表来列出已授予和等待中的锁。但是，获取锁情况摘要的一个更简单方法是使用 sys\
  \ 模式中的 `schema_table_lock_waits` 视图。\n\n例如，考虑代码清单 14-2 中可以看到的元数据锁等待问题，其中涉及三个连接。`WHERE`\
  \ 子句被选择为仅包含本次调查感兴趣的行。\n\n```\n-- 调查 #1\n-- 连接 4\nConnection 4> SELECT thd_id, conn_id,\
  \ state,\ncurrent_statement,\nstatement_latency\nFROM sys.session\nWHERE command\
  \ = 'Query' OR trx_state = 'ACTIVE'\\G\n*************************** 1. row ***************************\n\
  thd_id: 1181\nconn_id: 713\nstate: NULL\ncurrent_statement: SELECT Code, Name FROM\
  \ world.country WHERE Code = 'USA'\nstatement_latency: NULL\n***************************\
  \ 2. row ***************************\nthd_id: 1182\nconn_id: 714\nstate: Waiting\
  \ for table metadata lock\ncurrent_statement: ALTER TABLE world.city ADD INDEX (Name)\n\
  statement_latency: 26.68 s\n*************************** 3. row ***************************\n\
  thd_id: 1183\nconn_id: 715\nstate: Waiting for table metadata lock\ncurrent_statement:\
  \ SELECT * FROM world.city WHERE ID = 130\nstatement_latency: 24.68 s\n***************************\
  \ 4. row ***************************\nthd_id: 1180\nconn_id: 712\nstate: NULL\n\
  current_statement: SET @sys.statement_truncate_le ... ('statement_truncate_len',\
  \ 64)\nstatement_latency: 50.42 ms\n4 rows in set (0.0530 sec)\n代码清单 14-2\n一个元数据锁等待问题\n\
  ```\n\n有两个连接正在等待元数据锁（在 `world.city` 表上）。列表中包含了第三个连接（`conn_id = 713`），该连接处于空闲状态，可以从\
  \ `statement_latency` 为 `NULL` 看出（在 8.0.18 之前和 8.0.21 之后的一些版本中，您可能还会看到当前语句也是 `NULL`）。在这个案例中，查询列表被限制为那些有活动查询或活动事务的连接，但通常您会从完整的进程列表开始。然而，为了便于关注重要部分，输出经过了筛选。\n\
  \n一旦您知道存在元数据锁问题，就可以使用 `sys.schema_table_lock_waits` 视图来获取有关锁争用的信息。代码清单 14-3 显示了对应于刚才讨论的进程列表的输出示例。\n\
  \n\n以下是调查三\n```sql\nSELECT *\nFROM sys.schema_table_lock_waits\\G\n```\n```\n***************************\
  \ 1. row ***************************\n            object_schema: world\n       \
  \       object_name: city\n        waiting_thread_id: 1182\n             waiting_pid:\
  \ 714\n         waiting_account: root@localhost\n      waiting_lock_type: EXCLUSIVE\n\
  \ waiting_lock_duration: TRANSACTION\n        waiting_query: ALTER TABLE world.city\
  \ ADD INDEX (Name)\n    waiting_query_secs: 128\nwaiting_query_rows_affected: 0\n\
  waiting_query_rows_examined: 0\n        blocking_thread_id: 1181\n             blocking_pid:\
  \ 713\n         blocking_account: root@localhost\n      blocking_lock_type: SHARED_READ\n\
  \ blocking_lock_duration: TRANSACTION\nsql_kill_blocking_query: KILL QUERY 713\n\
  sql_kill_blocking_connection: KILL 713\n*************************** 2. row ***************************\n\
  \            object_schema: world\n              object_name: city\n        waiting_thread_id:\
  \ 1183\n             waiting_pid: 715\n         waiting_account: root@localhost\n\
  \      waiting_lock_type: SHARED_READ\n waiting_lock_duration: TRANSACTION\n   \
  \     waiting_query: SELECT * FROM world.city WHERE ID = 130\n    waiting_query_secs:\
  \ 126\nwaiting_query_rows_affected: 0\nwaiting_query_rows_examined: 0\n        blocking_thread_id:\
  \ 1181\n             blocking_pid: 713\n         blocking_account: root@localhost\n\
  \      blocking_lock_type: SHARED_READ\n blocking_lock_duration: TRANSACTION\nsql_kill_blocking_query:\
  \ KILL QUERY 713\nsql_kill_blocking_connection: KILL 713\n***************************\
  \ 3. row ***************************\n            object_schema: world\n       \
  \       object_name: city\n        waiting_thread_id: 1182\n             waiting_pid:\
  \ 714\n         waiting_account: root@localhost\n      waiting_lock_type: EXCLUSIVE\n\
  \ waiting_lock_duration: TRANSACTION\n        waiting_query: ALTER TABLE world.city\
  \ ADD INDEX (Name)\n    waiting_query_secs: 128\nwaiting_query_rows_affected: 0\n\
  waiting_query_rows_examined: 0\n        blocking_thread_id: 1182\n             blocking_pid:\
  \ 714\n         blocking_account: root@localhost\n      blocking_lock_type: SHARED_UPGRADABLE\n\
  \ blocking_lock_duration: TRANSACTION\nsql_kill_blocking_query: KILL QUERY 714\n\
  sql_kill_blocking_connection: KILL 714\n*************************** 4. row ***************************\n\
  \            object_schema: world\n              object_name: city\n        waiting_thread_id:\
  \ 1183\n             waiting_pid: 715\n         waiting_account: root@localhost\n\
  \      waiting_lock_type: SHARED_READ\n waiting_lock_duration: TRANSACTION\n   \
  \     waiting_query: SELECT * FROM world.city WHERE ID = 130\n    waiting_query_secs:\
  \ 126\nwaiting_query_rows_affected: 0\nwaiting_query_rows_examined: 0\n        blocking_thread_id:\
  \ 1182\n             blocking_pid: 714\n         blocking_account: root@localhost\n\
  \      blocking_lock_type: SHARED_UPGRADABLE\n blocking_lock_duration: TRANSACTION\n\
  sql_kill_blocking_query: KILL QUERY 714\nsql_kill_blocking_connection: KILL 714\n\
  4 rows in set (0.0041 sec)\n```\n清单 14-3\n查找元数据锁争用\n\n输出显示有四个查询在等待和阻塞的情况。这可能令人惊讶，但这种情况的发生是因为涉及多个锁，并且形成了一个等待链。每一行都是一对等待和阻塞的连接。输出中使用“pid”表示进程列表\
  \ ID，这与之前输出中使用的连接 ID 相同。信息包括锁的对象、等待连接的详细信息、阻塞连接的详细信息，以及两个可用于终止阻塞查询或连接的查询。\n\n第三行显示进程列表\
  \ ID 714 在等待它自身。这听起来像死锁，但实际上不是。原因是`ALTER TABLE`语句首先获取了一个可升级的共享锁，然后尝试获取排他锁，而后者正在等待。因为没有明确的信息显示是哪个现有锁在实际阻塞新锁，所以这条信息最终被包含在内。\n\
  \n第四行显示`SELECT`语句正在等待进程列表 ID 714，也就是那个`ALTER TABLE`语句。这就是连接开始堆积的原因，因为 DDL 语句需要一个排他锁，因此它会阻塞对共享锁的请求。\n\
  \n第一行和第二行揭示了锁争用的根本问题。进程列表 ID 713 阻塞了其他两个连接，这表明它是阻塞 DDL 语句的主要元凶。因此，当你在调查此类问题时，寻找一个正在等待元数据排他锁且被另一个连接阻塞的连接。如果输出中有大量行，你也可以查找导致最多阻塞的连接，并以此作为起点。清单\
  \ 14-4 展示了一个如何执行此操作的示例。\n\n```sql\n-- Investigation #4\nSELECT *\nFROM sys.schema_table_lock_waits\n\
  WHERE waiting_lock_type = 'EXCLUSIVE'\n  AND waiting_pid <> blocking_pid\\G\n```\n\
  ```\n*************************** 1. row ***************************\n          \
  \  object_schema: world\n              object_name: city\n        waiting_thread_id:\
  \ 1182\n             waiting_pid: 714\n         waiting_account: root@localhost\n\
  \      waiting_lock_type: EXCLUSIVE\n waiting_lock_duration: TRANSACTION\n     \
  \   waiting_query: ALTER TABLE world.city ADD INDEX (Name)\n    waiting_query_secs:\
  \ 678\nwaiting_query_rows_affected: 0\nwaiting_query_rows_examined: 0\n        blocking_thread_id:\
  \ 1181\n             blocking_pid: 713\n         blocking_account: root@localhost\n\
  \      blocking_lock_type: SHARED_READ\n blocking_lock_duration: TRANSACTION\nsql_kill_blocking_query:\
  \ KILL QUERY 713\nsql_kill_blocking_connection: KILL 713\n1 row in set (0.0025 sec)\n\
  ```\n```sql\n-- Investigation #5\nSELECT blocking_pid, COUNT(*)\nFROM sys.schema_table_lock_waits\n\
  WHERE waiting_pid <> blocking_pid\nGROUP BY blocking_pid\nORDER BY COUNT(*) DESC;\n\
  ```\n```\n+--------------+----------+\n| blocking_pid | COUNT(*) |\n+--------------+----------+\n\
  |          713 |        2 |\n|          714 |        1 |\n+--------------+----------+\n\
  2 rows in set (0.0023 sec)\n```\n清单 14-4\n查找导致元数据锁阻塞的连接\n\n第一个查询查找正在等待元数据排他锁且阻塞进程列表\
  \ ID 不是其本身的锁等待情况。在这个案例中，它立即给出了主要的阻塞争用点。第二个查询确定了每个进程列表 ID 触发的阻塞查询数量。实际情况可能不像此示例中这么简单，但使用如上所示的查询将有助于缩小锁争用的范围。\n\
  \n一旦确定了锁争用的源头，你需要确定该事务在做什么。在这个案例中，锁争用的根源是进程列表 ID 为 713 的连接。回到进程列表输出，你可以看到在此案例中它处于空闲状态：\n\
  \n```sql\nSELECT thd_id, conn_id, state, current_statement, statement_latency\n\
  FROM sys.session\nWHERE conn_id = 713;\n```\n```\n*************************** 1.\
  \ row ***************************\n            thd_id: 1181\n           conn_id:\
  \ 713\n             state: NULL\ncurrent_statement: SELECT Code, Name FROM world.country\
  \ WHERE Code = 'USA'\n  statement_latency: NULL\n```\n\n这个连接做了什么来获取元数据锁？当前没有涉及`world.city`表的语句这一事实表明该连接有一个活动的事务是打开的。在这个案例中，该事务是空闲的（如`statement_latency\
  \ = NULL`所示），但也可能之前有一个与`world.city`表上的元数据锁无关的查询正在执行。无论哪种情况，你都需要确定在当前状态之前该事务在做什么。为此，你可以使用\
  \ Performance Schema 和 Information Schema。清单 14-5 展示了一个调查事务状态和近期历史的示例。\n\n### 清单\
  \ 14-5 排查事务\n\n```sql\n-- 调查 #6\nConnection 4> SELECT *\nFROM information_schema.INNODB_TRX\n\
  WHERE trx_mysql_thread_id = 713\\G\n*************************** 1\\. row ***************************\n\
  trx_id: 284186648310752\ntrx_state: RUNNING\ntrx_started: 2020-08-06 19:57:33\n\
