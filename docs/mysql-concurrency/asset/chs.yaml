  \ 4> SELECT *\nFROM performance_schema.events_transactions_current\nWHERE thread_id\
  \ = 1181\\G\n*************************** 1\\. row ***************************\n\
  THREAD_ID: 1181\nEVENT_ID: 8\nEND_EVENT_ID: NULL\nEVENT_NAME: transaction\nSTATE:\
  \ ACTIVE\nTRX_ID: NULL\nGTID: AUTOMATIC\nXID_FORMAT_ID: NULL\nXID_GTRID: NULL\n\
  XID_BQUAL: NULL\nXA_STATE: NULL\nSOURCE: transaction.cc:209\nTIMER_START: 456761974401600000\n\
  TIMER_END: 457816781775400000\nTIMER_WAIT: 1054807373800000\nACCESS_MODE: READ WRITE\n\
  ISOLATION_LEVEL: REPEATABLE READ\nAUTOCOMMIT: NO\nNUMBER_OF_SAVEPOINTS: 0\nNUMBER_OF_ROLLBACK_TO_SAVEPOINT:\
  \ 0\nNUMBER_OF_RELEASE_SAVEPOINT: 0\nOBJECT_INSTANCE_BEGIN: NULL\nNESTING_EVENT_ID:\
  \ 7\nNESTING_EVENT_TYPE: STATEMENT\n1 row in set (0.0010 sec)\n-- 调查 #8\nConnection\
  \ 4> SELECT event_id, current_schema, sql_text\nFROM performance_schema.events_statements_history\n\
  WHERE thread_id = 1181\nAND nesting_event_id = 8\nAND nesting_event_type = 'TRANSACTION'\\\
  G\n*************************** 1\\. row ***************************\nevent_id: 9\n\
  current_schema: NULL\nsql_text: SELECT * FROM world.city WHERE ID = 3805\n***************************\
  \ 2\\. row ***************************\nevent_id: 10\ncurrent_schema: NULL\nsql_text:\
  \ SELECT Code, Name FROM world.country WHERE Code = 'USA'\n2 rows in set (0.0010\
  \ sec)\n-- 调查 #9\nConnection 4> SELECT attr_name, attr_value\nFROM performance_schema.session_connect_attrs\n\
  WHERE processlist_id = 713\nORDER BY attr_name;\n+-----------------+-----------------+\n\
  | attr_name       | attr_value      |\n+-----------------+-----------------+\n|\
  \ _client_license | GPL             |\n| _client_name    | libmysqlxclient |\n|\
  \ _client_version | 8.0.21          |\n| _os             | Win64           |\n|\
  \ _pid            | 27832           |\n| _platform       | x86_64          |\n|\
  \ _thread         | 31396           |\n| program_name    | mysqlsh         |\n+-----------------+-----------------+\n\
  8 rows in set (0.0007 sec)\n```\n\n第一个查询使用了`INFORMATION_SCHEMA`中的`INNODB_TRX`视图。它显示了事务何时开始等信息，因此你可以确定它已活动了多长时间。`trx_rows_modified`列也很有用，可以在决定回滚事务时了解该事务更改了多少数据。请注意，InnoDB\
  \ 所称的`MYSQL`线程 ID（`trx_mysql_thread_id`列）实际上是连接 ID。\n\n第二个查询使用了`PERFORMANCE_SCHEMA`中的`events_transactions_current`表来获取更多事务信息。你可以使用`timer_wait`列来确定事务的时长。该值以皮秒为单位，因此使用`FORMAT_PICO_TIME()`函数更容易理解该值的含义：\n\
  \n```sql\nmysql> SELECT FORMAT_PICO_TIME(1054807373800000) AS Age;\n+-----------+\n\
  | Age       |\n+-----------+\n| 17.58 min |\n+-----------+\n1 row in set (0.0006\
  \ sec)\n```\n\n如果你使用的是 MySQL 8.0.15 或更早版本，请改用 `sys.format_time()` 函数。\n\n第三个查询使用了\
  \ `events_statements_history` 表来查找在事务中执行的先前查询。`nesting_event_id` 列被设置为 `events_transactions_current`\
  \ 表输出中的 `event_id` 的值，`nesting_event_type` 列被设置为匹配 `TRANSACTION`。这确保只返回作为进行中事务子事件的事件。结果按语句的\
  \ `event_id` 排序，以获取按执行顺序排列的语句。默认情况下，`events_statements_history` 表最多包含连接的最近十个查询。\n\
  \n在此示例中，调查结果显示该事务已执行两个查询：一个从 `world.city` 表中选择，另一个从 `world.country` 表中选择。正是其中的第一个查询导致了元数据锁争用。\n\
  \n第四个查询使用了 `session_connect_attrs` 表来查找连接提交的属性。并非所有客户端和连接器都提交属性，或者它们可能被禁用，因此此信息并不总是可用。当属性可用时，它们可用于找出违规事务的执行位置。在此示例中，你可以看到连接来自\
  \ `mysqlsh`。\n\n当你完成问题调查后，可以为进程列表 ID 为 713 的连接回滚事务。这将导致 `ALTER TABLE` 执行，因此如果你希望模式恢复到此示例之前的状态，还应再次删除\
  \ `Name` 索引：\n\n```sql\n-- Connection 1\nConnection 1> ROLLBACK;\nQuery OK, 0 rows\
  \ affected (0.0006 sec)\n-- Connection 2\nQuery OK, 0 rows affected (35 min 34.2938\
  \ sec)\nRecords: 0  Duplicates: 0  Warnings: 0\n-- Connection 3\n+-----+--------+-------------+-----------------+------------+\n\
  | ID  | Name   | CountryCode | District        | Population |\n+-----+--------+-------------+-----------------+------------+\n\
  | 130 | Sydney | AUS         | New South Wales |    3276207 |\n+-----+--------+-------------+-----------------+------------+\n\
  1 row in set (35 min 31.1277 sec)\n-- Connection 2\nConnection 2> ALTER TABLE world.city\
  \ DROP INDEX Name;\nQuery OK, 0 rows affected (0.1890 sec)\nRecords: 0  Duplicates:\
  \ 0  Warnings: 0\n```\n\n### 解决方案\n\n对于元数据锁争用，你基本上有两种选择来解决问题：使阻塞事务完成或终止 DDL 语句。要完成阻塞事务，你需要提交或回滚它。如果你终止连接，它会触发事务回滚，因此你需要考虑有多少工作需要回滚。为了提交事务，你必须找到该连接的执行位置并以这种方式提交。你无法提交属于不同连接的事务。\n\
  \n终止 DDL 语句将允许其他查询继续执行，但如果锁是由已放弃但仍处于活动状态的事务持有的，它并不能长期解决问题。对于存在持有元数据锁的已放弃事务的情况，终止\
  \ DDL 语句和持有已放弃事务的连接可能是一个选择。这样，你可以避免 DDL 语句在事务回滚期间继续阻塞后续查询。然后，当回滚完成后，你可以重试 DDL 语句。\n\
  \n\n# 15. 案例研究：记录级锁\n\n### 预防措施\n\n避免元数据锁争用的关键在于，避免在需要执行涉及事务所用表的 DDL 语句时，同时存在长时间运行的事务。例如，你可以在已知没有长时间运行事务的时间点执行\
  \ DDL 语句。你也可以将 `lock_wait_timeout` 选项设置为一个较低的值，这会使得 DDL 语句在 `lock_wait_timeout`\
  \ 秒后放弃等待。虽然这并不能避免锁问题，但它通过防止 DDL 语句阻塞其他查询的执行来缓解该问题。然后，你可以在没有应用大面积停滞的压力下去查找根本原因。\n\
  \n你也可以致力于缩短事务的活跃时长。一种选择是将大型事务拆分为几个较小的事务，前提是不要求所有操作作为一个原子单元执行。你还应确保事务不会因在事务活跃期间执行交互式操作、文件\
  \ I/O、向终端用户传输数据等而不必要地长时间保持打开状态。\n\n长时间运行事务的一个常见原因是应用程序或客户端根本不提交或回滚事务。在禁用 `autocommit`\
  \ 选项时，这种情况尤其容易发生。当 `autocommit` 被禁用时，任何查询——即使是一个简单的只读 `SELECT` 语句——在当前没有活跃事务时，都会启动一个新事务。这意味着一个看似无害的查询可能会启动一个事务，如果开发者没有意识到\
  \ `autocommit` 已被禁用，那么他们可能不会想到显式地结束该事务。MySQL Server 中 `autocommit` 设置默认是启用的，但一些连接器默认禁用它。\n\
  \n### 总结\n\n在本章中，你研究了一种情况：一个被放弃的事务导致 `ALTER TABLE` 语句被阻塞，并随后阻止了同一张表上的其他查询执行。确定争用原因的关键是\
  \ `sys.schema_table_lock_waits` 视图，该视图基于 `performance_schema.metadata_locks` 表。由于等待和阻塞的锁请求对的数量可能迅速增加，你可能需要对行进行过滤，例如查找等待独占锁的请求，或者你可以聚合信息以找到阻塞最多请求的连接。\n\
  \n解决方案是提交或回滚事务，或者终止等待独占元数据锁的 DDL 语句。你也可以选择同时终止事务和 DDL 语句，如果事务需要回滚大量更改，这可能很有用。防止查询堆积的一个好方法是使用较低的\
  \ `lock_wait_timeout` 值，并在遇到锁等待超时时重试 DDL 语句。\n\n在下一章中，你将分析一个 InnoDB 记录锁请求超时的情况。\n\
  \n### 记录级锁\n\n记录锁争用是最常遇到的，但通常也是侵入性最小的，因为默认的锁等待超时仅为 50 秒，因此不存在查询大量堆积的相同潜在风险。话虽如此，正如将要展示的，存在记录锁导致\
  \ MySQL 陷入停滞的情况。本章将探讨一般性地调查 InnoDB 记录锁问题，以及更详细地调查锁等待超时问题。关于死锁的具体研究将推迟到下一章。\n\n##\
  \ 症状\n\nInnoDB 记录锁争用的症状通常非常微妙且不易识别。在严重情况下，你会收到一个锁等待超时或死锁错误，但在许多情况下，可能没有直接症状。相反，症状表现为查询比正常情况慢。这可能从慢几分之一秒到慢几秒不等。\n\
  \n对于存在锁等待超时的情况，你将看到一个 `ER_LOCK_WAIT_TIMEOUT` 错误，如下例所示：\n\n```\nERROR: 1205: Lock\
  \ wait timeout exceeded; try restarting transaction\n```\n\n当查询因锁争用而比没有争用时更慢时，最有可能发现问题的方式是通过监控，可以使用类似于\
  \ MySQL Enterprise Monitor 中查询分析器的工具，或者使用 `sys.innodb_lock_waits` 视图检测锁争用。图 15-1\
  \ 展示了查询分析器中的一个查询示例。在讨论调查记录锁争用时，将使用 `sys` 模式视图。该图也可以在本书的 GitHub 仓库中以完整尺寸作为 `figure_15_1_quan.png`\
  \ 获取。\n\n![../images/502546_1_En_15_Chapter/502546_1_En_15_Fig1_HTML.jpg](img/502546_1_En_15_Fig1_HTML.jpg)\n\
  \n*图 15-1：在查询分析器中检测到的锁争用示例*\n\n在图中，请注意查询的延迟图在周期末尾增加，然后突然再次下降。规范化查询的右侧还有一个红色图标——该图标表示查询已返回错误。在本例中，错误是锁等待超时，但这无法从图中看出。规范化查询左侧的环形图也显示了一个红色区域，表明该查询的查询响应时间指数^(⁶)有时被认为较差。顶部的大图显示了一个小幅下降，表明实例中存在足够的问题，导致实例性能普遍下降。\n\
  \n还有几个实例级指标可以显示实例上发生的锁情况。这些对于监控一段时间内的一般锁争用非常有用。清单 15-1 展示了使用 `sys.metrics` 视图可用的指标。\n\
  \n```\nmysql> SELECT Variable_name,\nVariable_value AS Value,\nEnabled\nFROM sys.metrics\n\
  WHERE Variable_name LIKE 'innodb_row_lock%'\nOR Type = 'InnoDB Metrics - lock';\n\
  +-------------------------------+--------+---------+\n| Variable_name          \
  \       | Value  | Enabled |\n+-------------------------------+--------+---------+\n\
  | innodb_row_lock_current_waits | 0      | YES     |\n| innodb_row_lock_time   \
  \       | 480628 | YES     |\n| innodb_row_lock_time_avg      | 1219   | YES   \
  \  |\n| innodb_row_lock_time_max      | 51066  | YES     |\n| innodb_row_lock_waits\
  \         | 394    | YES     |\n| lock_deadlock_false_positives | 0      | YES \
  \    |\n| lock_deadlock_rounds          | 193790 | YES     |\n| lock_deadlocks \
  \               | 0      | YES     |\n| lock_rec_grant_attempts       | 218    |\
  \ YES     |\n| lock_rec_lock_created         | 0      | NO      |\n| lock_rec_lock_removed\
  \         | 0      | NO      |\n| lock_rec_lock_requests        | 0      | NO  \
  \    |\n| lock_rec_lock_waits           | 0      | NO      |\n| lock_rec_locks \
  \               | 0      | NO      |\n| lock_rec_release_attempts     | 7522   |\
  \ YES     |\n| lock_row_lock_current_waits   | 0      | YES     |\n| lock_schedule_refreshes\
  \       | 193790 | YES     |\n| lock_table_lock_created       | 0      | NO    \
  \  |\n| lock_table_lock_removed       | 0      | NO      |\n| lock_table_lock_waits\
  \         | 0      | NO      |\n| lock_table_locks              | 0      | NO  \
  \    |\n| lock_threads_waiting          | 0      | YES     |\n| lock_timeouts  \
  \               | 193    | YES     |\n+-------------------------------+--------+---------+\n\
  23 rows in set (0.0089 sec)\n```\n*清单 15-1：InnoDB 锁指标*\n\n\n\n## 监控与指标\n\n就本次讨论而言，`innodb_row_lock_%`\
  \ 和 `lock_timeouts` 指标是最值得关注的。这三个时间变量均以毫秒为单位。可以看到发生了 193 次锁等待超时，这本身不一定值得担忧（至少需要考虑这些超时是在多长时间内发生的）。你还可以看到有\
  \ 394 次锁无法立即授予的情况（`innodb_row_lock_waits`），并且存在等待时间超过 51 秒的情况（`innodb_row_lock_time_max`）。当锁竞争的总体水平增加时，你也会看到这些指标上升。\n\
  \n比手动监控指标更好的方法是，确保你的监控解决方案能够记录这些指标，并能以时间序列图的形式绘制它们随时间的变化。图 15-2 展示了与图 15-1 中发现的同一起事件相关的指标绘图示例。\n\
  \n![../images/502546_1_En_15_Chapter/502546_1_En_15_Fig2_HTML.jpg](img/502546_1_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2：InnoDB 行锁指标的时间序列图\n\n图表显示了锁的总体增加趋势。锁等待次数有两个锁等待增加然后又下降的时期。行锁时间图显示出类似的模式。这是间歇性锁问题的典型迹象。\n\
  \n## 原因\n\nInnoDB 在行数据、索引记录、间隙和插入意图锁上使用共享锁和排他锁。当两个事务试图以冲突的方式访问数据时，一个查询将不得不等待，直到所需的锁变为可用。简而言之，两个请求共享锁的请求可以同时被授予，但一旦存在排他锁，其他连接就无法在同一条记录上获取锁。\n\
  \n由于最可能导致锁竞争的是排他锁，因此通常是改变数据的 DML 查询导致了 InnoDB 记录锁竞争。另一个来源是 `SELECT` 语句通过添加 `FOR\
  \ SHARE`（或 `LOCK IN SHARE MODE`）或 `FOR UPDATE` 子句进行抢占式锁定。\n\n## 设置\n\n此示例只需要两个连接来设置正在调查的场景，第一个连接有一个正在进行的事务，第二个连接试图更新第一个连接持有锁的一行。由于等待\
  \ InnoDB 锁的默认超时时间是 50 秒，你可以选择为将被阻塞的第二个连接增加此超时，以便有更多时间进行调查。设置如代码清单 15-2 所示。\n\n```\n\
  -- Connection   Processlist ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
  --          1              738        1219          6\n--          2           \
  \   739        1220          6\n-- Connection 1\nConnection 1> START TRANSACTION;\n\
  Query OK, 0 rows affected (0.0002 sec)\nConnection 1> UPDATE world.city\nSET Population\
  \ = 5000000\nWHERE ID = 130;\nQuery OK, 1 row affected (0.0248 sec)\nRows matched:\
  \ 1  Changed: 1  Warnings: 0\n-- Connection 2\nConnection 2> SET SESSION innodb_lock_wait_timeout\
  \ = 3600;\nQuery OK, 0 rows affected (0.0004 sec)\nConnection 2> START TRANSACTION;\n\
  Query OK, 0 rows affected (0.0002 sec)\nConnection 2> UPDATE world.city SET Population\
  \ = Population * 1.10 WHERE CountryCode = 'AUS';\n```\n\n代码清单 15-2：触发 InnoDB 记录锁竞争\n\
  \n在此示例中，连接 2 的锁等待超时被设置为 3600 秒，以便你有长达一小时的时间来调查问题。连接 2 的 `START TRANSACTION` 不是必需的，但它允许你在完成调查后回滚两个事务，以避免对数据进行更改。\n\
  \n## 调查\n\n记录锁的调查与元数据锁的调查非常相似。你可以查询 Performance Schema 中的 `data_locks` 和 `data_lock_waits`\
  \ 表，它们分别显示原始的锁数据和挂起的锁。还有一个 `sys.innodb_lock_waits` 视图，它查询这两个表以找到被一个锁阻塞的另一个锁的配对。\n\
  \n> **注意**\n> `data_locks` 和 `data_lock_waits` 表在 MySQL 8 中是新增的。在 MySQL 5.7 及更早版本中，Information\
  \ Schema 中有两个类似的表，名为 `INNODB_LOCKS` 和 `INNODB_LOCK_WAITS`。使用 `innodb_lock_waits`\
  \ 视图的一个优点是，它在不同 MySQL 版本中工作方式相同（但在 MySQL 8 中包含一些额外信息）。\n\n在大多数情况下，使用 `innodb_lock_waits`\
  \ 视图开始调查是最简单的，仅在需要时才深入探究 Performance Schema 表。代码清单 15-3 展示了一个锁等待情况下的 `innodb_lock_waits`\
  \ 输出示例。\n\n```\n-- Investigation #1\n-- Connection 3\nConnection 3> SELECT * FROM\
  \ sys.innodb_lock_waits\\G\n*************************** 1\\. row ***************************\n\
  wait_started: 2020-08-07 18:04:56\nwait_age: 00:00:16\nwait_age_secs: 16\nlocked_table:\
  \ `world`.`city`\nlocked_table_schema: world\nlocked_table_name: city\nlocked_table_partition:\
  \ NULL\nlocked_table_subpartition: NULL\nlocked_index: PRIMARY\nlocked_type: RECORD\n\
  waiting_trx_id: 537516\nwaiting_trx_started: 2020-08-07 18:04:56\nwaiting_trx_age:\
  \ 00:00:16\nwaiting_trx_rows_locked: 2\nwaiting_trx_rows_modified: 0\nwaiting_pid:\
  \ 739\nwaiting_query: UPDATE world.city SET Populati ... 1.10 WHERE CountryCode\
  \ = 'AUS'\nwaiting_lock_id: 2711671601760:1923:7:44:2711634704240\nwaiting_lock_mode:\
  \ X,REC_NOT_GAP\nblocking_trx_id: 537515\nblocking_pid: 738\nblocking_query: NULL\n\
  blocking_lock_id: 2711671600928:1923:7:44:2711634698920\nblocking_lock_mode: X,REC_NOT_GAP\n\
  blocking_trx_started: 2020-08-07 18:04:56\nblocking_trx_age: 00:00:16\nblocking_trx_rows_locked:\
  \ 1\nblocking_trx_rows_modified: 1\nsql_kill_blocking_query: KILL QUERY 738\nsql_kill_blocking_connection:\
  \ KILL 738\n1 row in set (0.0805 sec)\n```\n\n代码清单 15-3：从 innodb_lock_waits 视图检索锁信息\n\
  \n输出中的列可以根据列名的前缀分为五个部分。这些组是：\n\n*   **wait_:** 这些列显示关于锁等待时间的通用信息。\n*   **locked_:**\
  \ 这些列显示被锁定的对象范围（从模式到索引）以及锁的类型。\n*   **waiting_:** 这些列显示等待锁授予的事务的详细信息，包括查询和请求的锁模式。\n\
  *   **blocking_:** 这些列显示阻塞锁请求的事务的详细信息。注意在示例中，`blocking_query` 为 `NULL`。这意味着生成输出时该事务处于空闲状态。即使列出了阻塞查询，该查询也可能与存在竞争的锁无关——除了该查询是由持有锁的同一事务执行的。\n\
  *   **sql_kill_:** 这两列提供了可用于终止阻塞查询或连接的 `KILL` 查询。\n\n> **注意**\n> `blocking_query`\
  \ 列是阻塞事务当前正在执行的查询（如果有）。这并不意味着该查询本身必然导致了锁请求被阻塞。\n\n`blocking_query` 列为 `NULL` 的情况很常见。这意味着阻塞事务当前没有执行查询。这可能是因为它处于两个查询之间。如果这段时间较长，则表明应用程序正在做本应在事务之外完成的工作。更常见的情况是，事务没有执行查询是因为它被遗忘了，无论是在交互式会话中操作人员忘记结束事务，还是应用程序流程未能确保事务被提交或回滚。\n\
  \n\n\n### 解决方案\n\n解决方案取决于锁等待的严重程度。如果只是少数查询出现短暂的锁等待，那么让受影响的查询等待锁变得可用，通常是完全可以接受的。请记住，锁的存在是为了确保数据的完整性，因此锁本身并非天生的问题。只有当锁对性能造成显著影响，或导致查询失败到无法重试的程度时，锁才会成为问题。\n\
  \n如果锁等待情况持续较长时间——特别是当阻塞事务已被放弃时——您可以考虑终止该阻塞事务。一如既往，您需要考虑到，如果阻塞事务已经执行了大量工作，其回滚操作可能会耗费大量时间。\n\
  \n对于因锁等待超时错误而失败的查询，应用程序应重试它们。请记住，默认情况下，锁等待超时只会回滚超时发生时正在执行的查询。事务的其余部分将保持查询之前的状态。未能处理超时可能会留下一个未完成的事务，其自身持有的锁可能引发进一步的锁问题。是仅回滚查询还是回滚整个事务，由\
  \ `innodb_rollback_on_timeout` 选项控制。\n\n**注意**\n\n处理锁等待超时非常重要，否则可能会导致事务的锁无法释放。如果发生这种情况，其他事务可能无法获取它们所需的锁。\n\
  \n### 预防措施\n\n防止严重的记录级锁争用，很大程度上遵循第 9 章“减少锁定问题”中讨论的指导原则。概括之前的讨论，减少锁等待争用的方法主要包括：减小事务的规模和持续时间，使用索引以减少访问的记录数，以及可能将事务隔离级别切换为\
  \ `READ COMMITTED` 以便更早释放锁并减少间隙锁的数量。\n\n## 本章小结\n\n本章通过一个案例研究讨论了 InnoDB 记录锁。其症状是，一个预期快速的查询花了很长时间才完成。确定哪些连接涉及锁争用的关键在于使用\
  \ `sys.innodb_lock_waits` 视图，它直接显示了等待和阻塞连接的信息。如需更多详细信息，您可以深入研究 Performance Schema\
  \ 中的 `data_locks` 和 `data_lock_waits` 表。\n\n解决方案取决于锁等待的严重程度。如果锁等待短暂且不频繁，您或许可以忽略它们，让等待的查询等待锁请求变为可用。如果锁等待是由运行时间过长的查询或被遗忘的事务引起的，您可能需要终止有问题的查询或连接，但需要考虑到回滚更改所付出的努力。为防止将来出现此类问题，请努力减小事务的规模和持续时间，审查索引，并考虑使用\
  \ `READ COMMITTED` 事务隔离级别。\n\n在下一个案例研究中，将探讨一个相关问题：两个事务形成了循环锁等待图——更广为人知的名称是死锁。\n\n\
  脚注 1\n\n# 16. 案例研究：死锁\n\n引起数据库管理员最担忧的锁问题之一是死锁。这部分是因为它的名称，部分是因为它与其他讨论的锁问题不同，总是会导致错误。然而，与其他锁问题相比，死锁本身并没有什么特别令人担忧的。相反，它们导致错误意味着您能更早地知道问题所在，并且锁问题会自行解决。\n\
  \n本章将设置一个死锁场景，并完成调查，从 InnoDB 监视器输出中的死锁信息反向推导，以确定涉及死锁的事务。\n\n## 症状\n\n症状很直接。死锁的受害者会收到一个错误，并且\
  \ `lock_deadlocks` InnoDB 指标会递增。InnoDB 选择作为受害者的事务将收到 `ER_LOCK_DEADLOCK` 错误：\n\n\
  ```\nERROR: 1213: Deadlock found when trying to get lock; try restarting transaction\n\
  ```\n\n`lock_deadlocks` 指标对于跟踪死锁发生的频率非常有用。跟踪 `lock_deadlocks` 值的一个便捷方法是使用 `sys.metrics`\
  \ 视图：\n\n```\nmysql> SELECT *\nFROM sys.metrics\nWHERE Variable_name = 'lock_deadlocks'\\\
  G\n*************************** 1. row ***************************\nVariable_name:\
  \ lock_deadlocks\nVariable_value: 2\nType: InnoDB Metrics - lock\nEnabled: YES\n\
  1 row in set (0.0096 sec)\n```\n\n或者，您可以使用 Performance Schema 中的 `events_errors_summary_global_by_error`\
  \ 表，并查询 `ER_LOCK_DEADLOCK` 错误：\n\n```\nmysql> SELECT *\nFROM performance_schema.events_errors_summary_global_by_error\n\
  WHERE error_name = 'ER_LOCK_DEADLOCK'\\G\n*************************** 1. row ***************************\n\
  ERROR_NUMBER: 1213\nERROR_NAME: ER_LOCK_DEADLOCK\nSQL_STATE: 40001\nSUM_ERROR_RAISED:\
  \ 5\nSUM_ERROR_HANDLED: 0\nFIRST_SEEN: 2020-08-01 13:09:29\nLAST_SEEN: 2020-08-07\
  \ 18:28:20\n1 row in set (0.0083 sec)\n```\n\n但请注意，这包括了所有返回错误 1213 的死锁情况，而不考虑锁类型，而\
  \ `lock_deadlocks` 指标仅包含 InnoDB 死锁。\n\n您还可以检查 InnoDB 监视器输出中的 `LATEST DETECTED DEADLOCK`\
  \ 部分，例如通过执行 `SHOW ENGINE INNODB STATUS`。这将显示上次死锁发生的时间，因此您可以借此判断死锁发生的频率。如果您启用了 `innodb_print_all_deadlocks`\
  \ 选项，错误日志中将会有许多死锁信息的输出。InnoDB 监视器输出中关于死锁的细节将在讨论死锁原因和设置之后的“调查”部分中介绍。\n\n## 原因\n\n\
  死锁是由于两个或多个事务以不同的顺序获取锁而引起的。每个事务最终都持有了另一个事务所需的锁。这个锁可能是一个记录锁、间隙锁、谓词锁或插入意向锁。图 16-1 展示了一个触发死锁的循环依赖示例。\n\
  \n![../images/502546_1_En_16_Chapter/502546_1_En_16_Fig1_HTML.png](img/502546_1_En_16_Fig1_HTML.png)\n\
  \n**图 16-1**\n\n触发死锁的循环锁依赖\n\n图中所示的死锁是由于在表的主键上存在两个记录锁造成的。这是可能发生的最简单的死锁之一。正如在调查死锁时所展示的，循环依赖可能比这更复杂。\n\
  \n\n## 设置\n\n此示例使用两个连接，与上一章的示例类似，但这次双方在连接 1 最终因连接 2 回滚其更改并报错而阻塞之前都进行了更改。连接 1 将澳大利亚及其城市的人口更新增加\
  \ 10%，而连接 2 将澳大利亚的人口更新为达尔文市的人口并添加该城市。语句如清单 16-1 所示。\n\n```\n-- 连接   进程列表 ID   线程\
  \ ID   事件 ID\n-- --------------------------------------------------\n--        \
  \  1              762        1258          6\n--          2              763   \
  \     1259          6\n-- 连接 1\nConnection 1> START TRANSACTION;\nQuery OK, 0 rows\
  \ affected (0.0005 sec)\nConnection 1> UPDATE world.city SET Population = Population\
  \ * 1.10 WHERE CountryCode = 'AUS';\nQuery OK, 14 rows affected (0.0016 sec)\nRows\
  \ matched: 14  Changed: 14  Warnings: 0\n-- 连接 2\nConnection 2> START TRANSACTION;\n\
  Query OK, 0 rows affected (0.0005 sec)\nConnection 2> UPDATE world.country SET Population\
  \ = Population + 146000 WHERE Code = 'AUS';\nQuery OK, 1 row affected (0.2683 sec)\n\
  Rows matched: 1  Changed: 1  Warnings: 0\n-- 连接 1\nConnection 1> UPDATE world.country\
  \ SET Population = Population * 1.10 WHERE Code = 'AUS';\n-- 连接 2\nConnection 2>\
  \ INSERT INTO world.city VALUES (4080, 'Darwin', 'AUS', 'Northern Territory', 146000);\n\
  ERROR: 1213: Deadlock found when trying to get lock; try restarting transaction\n\
  -- 连接 1\nQuery OK, 1 row affected (0.1021 sec)\nRows matched: 1  Changed: 1  Warnings:\
  \ 0\n-- 连接 2\nConnection 2> ROLLBACK;\nQuery OK, 0 rows affected (0.0003 sec)\n\
  -- 连接 1\nConnection 1> ROLLBACK;\nQuery OK, 0 rows affected (0.0545 sec)\n清单 16-1\n\
  触发一个 InnoDB 死锁\n```\n\n关键在于，两个事务以相反的顺序更新了 `city` 和 `country` 表。设置的完成是通过显式回滚两个事务来确保表不留下任何更改。\n\
  \n## 调查分析\n\n分析死锁的主要工具是 InnoDB 监视器输出中包含最近检测到的死锁信息的部分。如果你启用了 `innodb_print_all_deadlocks`\
  \ 选项（默认为 `OFF`），你也可能从错误日志中获得死锁信息；然而，信息是相同的，因此不会改变分析。\n\n死锁信息包含四个部分，描述了死锁及其结果。这些部分是：\n\
  \n*   死锁发生的时间。\n*   涉及死锁的第一个事务的信息。\n*   涉及死锁的第二个事务的信息。\n*   哪个事务被回滚。当启用了 `innodb_print_all_deadlocks`\
  \ 时，错误日志中不包含此信息。\n\n两个事务的编号是任意的，主要目的是能够引用其中一个事务。包含事务信息的两个部分是最重要的。它们包括事务活跃了多长时间、关于事务大小的统计信息（以持有的锁和\
  \ undo 日志条目等衡量）、正在等待锁而阻塞的查询，以及与死锁相关的锁信息。\n\n锁信息不像使用 `data_locks` 和 `data_lock_waits`\
  \ 表以及 `sys.innodb_lock_waits` 视图时那样容易解释。然而，一旦你尝试进行几次分析，它也并不太难。\n\n**提示**\n在测试系统上故意制造一些死锁，并研究产生的死锁信息。然后通过信息逐步分析以确定死锁发生的原因。由于你知道查询内容，解读锁数据会更容易。\n\
