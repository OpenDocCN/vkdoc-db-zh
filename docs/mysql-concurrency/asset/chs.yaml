  \ 201 和 202 行属于同一语句，因此 Microsoft Windows 和 Linux 之间的行号差异取决于选择了该语句的第一行还是最后一行作为读写锁的创建位置。）\n\
  \n你也可以使用互斥锁监控器来获取哪些锁最频繁经历等待的统计数据。此测试末尾的互斥锁监控器输出示例如下：\n\n```\nmysql> SHOW ENGINE\
  \ INNODB MUTEX;\n+--------+----------------------------+-------------+\n| Type \
  \  | Name                       | Status      |\n+--------+----------------------------+-------------+\n\
  | InnoDB | rwlock: fil0fil.cc:3206    | waits=11    |\n| InnoDB | rwlock: dict0dict.cc:1035\
  \  | waits=12    |\n| InnoDB | rwlock: btr0sea.cc:202     | waits=7730  |\n| InnoDB\
  \ | rwlock: btr0sea.cc:202     | waits=934   |\n| InnoDB | rwlock: btr0sea.cc:202\
  \     | waits=5445  |\n| InnoDB | rwlock: btr0sea.cc:202     | waits=889   |\n|\
  \ InnoDB | rwlock: btr0sea.cc:202     | waits=9076  |\n| InnoDB | rwlock: btr0sea.cc:202\
  \     | waits=13608 |\n| InnoDB | rwlock: btr0sea.cc:202     | waits=1050  |\n|\
  \ InnoDB | rwlock: hash0hash.cc:171   | waits=4     |\n| InnoDB | sum rwlock: buf0buf.cc:778\
  \ | waits=86    |\n+--------+----------------------------+-------------+\n11 rows\
  \ in set (0.0008 sec)\n```\n\n如果你定期创建互斥锁监控器报告，就可以按文件和行号对等待次数进行求和和分组，然后监控不同时段等待发生位置的差异。（本书作者目前不知道有哪个现成的监控解决方案能做到这一点。）对于此示例，测试本身计算了每个文件和行号的等待次数，主要显示的是`btr0sea.cc`第\
  \ 202 行的等待（请记住，行号取决于具体的发布版本和编译器/平台）：\n\n```\n-- 测试期间的总互斥锁和读写信号量等待：\n+----------------+-------+\n\
  | 文件:行号      | 等待数 |\n+----------------+-------+\n| btr0sea.cc:202 | 13368 |\n+----------------+-------+\n\
  ```\n\n你可能看到的另一个最有可能的文件和行号是`hash0hash:171`（对于 Windows 上的 8.0.21 版本，或 Linux 上 8.0.21\
  \ 版本的第 170 行），这与 InnoDB 的哈希表实现相关。这表明 InnoDB 监控器输出中的信号量等待全部针对`btr0sea.cc`第 202 行并非巧合。\n\
  \n\n\n### 确定工作负载\n\n调查的最后一步是确定导致争用的工作负载。这也是最困难的任务。最佳情况是你拥有一个监控解决方案，能够收集已执行查询的信息并为其聚合统计数据。通过这种监控，你可以直接看到执行了哪些查询，这有助于你确定争用的原因。如果你无法获取争用发生期间执行的查询的监控数据，你可以尝试使用\
  \ `sys.session` 或包含语句信息的 Performance Schema 表（`threads`、`events_statements_current`、`events_statements_history`\
  \ 和 `events_statements_history_long`）来监控查询。另一个选择是使用 `sys` 模式中的 `statement_performance_analyzer()`\
  \ 存储过程，它会对 `events_statements_summary_by_digest` 表拍摄两个快照，计算差异，并返回一个或多个报告，显示两个快照之间执行的查询信息。\n\
  \n> **提示**\n>\n> `sys` 模式中的 `statement_performance_analyzer()` 过程可用于生成一个“简陋的查询分析器”，用以查看两个快照之间执行的查询。有关文档和示例，请参见\
  \ [`https://dev.mysql.com/doc/refman/en/sys-statement-performance-analyzer.html`](https://dev.mysql.com/doc/refman/en/sys-statement-performance-analyzer.html)。\n\
  \n这听起来容易，但在实践中并非如此简单。即使有良好的监控，要确定哪些查询是问题所在也可能近乎不可能。在真实的生产系统中，你可能面临每秒超过 100,000 次的查询峰值，以及每分钟超过\
  \ 10,000 个唯一的查询摘要。试图从这些查询中找出导致争用的组合，会让大海捞针都显得轻而易举。\n\n如果你幸运的话，你或许可以根据发生争用的互斥量和信号量来猜测你要寻找的查询类型。在本例中，争用发生在自适应哈希索引上，该索引专用于二级索引。因此，你知道感兴趣的查询必定使用了二级索引，并且一个查询执行的索引查找和索引修改操作越多，它成为问题一部分的可能性就越大。在这种情况下，只读查询使用了两个二级索引，这可以从如清单\
  \ 18-3 所示的查询计划中看出。\n\n```\nEXPLAIN\nSELECT dept_name, MIN(salary) min_salary,\n\
  AVG(salary) AS avg_salary, MAX(salary) AS max_salary\nFROM employees.departments\n\
  INNER JOIN employees.dept_emp USING (dept_no)\nINNER JOIN employees.salaries USING\
  \ (emp_no)\nWHERE dept_emp.to_date = '9999-01-01'\nAND salaries.to_date = '9999-01-01'\n\
  GROUP BY dept_no\nORDER BY dept_name\n*************************** 1\\. row ***************************\n\
  id: 1\nselect_type: SIMPLE\ntable: departments\npartitions: NULL\ntype: index\n\
  possible_keys: PRIMARY,dept_name\nkey: PRIMARY\nkey_len: 16\nref: NULL\nrows: 9\n\
  filtered: 100\nExtra: Using temporary; Using filesort\n***************************\
  \ 2\\. row ***************************\nid: 1\nselect_type: SIMPLE\ntable: dept_emp\n\
  partitions: NULL\ntype: ref\npossible_keys: PRIMARY,dept_no,idx_concurrency_book_0\n\
  key: idx_concurrency_book_0\nkey_len: 19\nref: employees.departments.dept_no,const\n\
  rows: 9\nfiltered: 100\nExtra: Using index\n*************************** 3\\. row\
  \ ***************************\nid: 1\nselect_type: SIMPLE\ntable: salaries\npartitions:\
  \ NULL\ntype: ref\npossible_keys: PRIMARY,idx_concurrency_book_2\nkey: idx_concurrency_book_2\n\
  key_len: 7\nref: employees.dept_emp.emp_no,const\nrows: 1\nfiltered: 100\nExtra:\
  \ Using index\n3 rows in set, 1 warning (0.0009 sec)\n```\n\n**清单 18-3**\n测试中只读查询的查询计划\n\
  \n对 `dept_emp` 和 `salaries` 表的连接都是通过二级索引执行的，分别是 `idx_concurrency_book_0` 和 `idx_concurrency_book_2`\
  \ 索引。同样，读写连接执行的查询也使用了二级索引；验证这一点留给读者作为练习。\n\n调查完成后，你需要决定如何处理该争用。\n\n## 解决方案与预防措施\n\
  \n与之前的案例研究不同，通常没有直接的方法来解决和预防此问题。相反，你需要测试和验证对系统进行各种可能更改的效果。因此，解决方案和预防措施两部分合并讨论。\n\
  \n*   完全禁用自适应哈希索引\n\n*   增加分区数量\n\n*   增加线程挂起前的自旋轮数\n\n*   将工作负载拆分到不同的副本\n\n这些选项将在本节剩余部分进行讨论。\n\
  \n\n\n### 禁用自适应哈希索引\n\n解决自适应哈希索引争用最直接的方法是禁用该功能。在执行此操作前，您需要评估报告的争用是否真的构成了性能问题。请记住，互斥锁和信号量等待本身并非问题的征兆；实际上，它们是\
  \ MySQL 的自然组成部分。当请求无法立即完成时，自旋等待计数器就会增加。如果查询仅等待几个自旋回合后请求就完成了，那不一定是个问题。您可以查看的一个指标是每次等待的平均自旋回合数，并以此来估算等待时间。如图\
  \ 18-3 所示。\n\n![../images/502546_1_En_18_Chapter/502546_1_En_18_Fig3_HTML.jpg](img/502546_1_En_18_Fig3_HTML.jpg)\n\
  \n图 18-3\n\n共享锁和独占锁的平均每次等待自旋回合数\n\n该图显示，对于独占锁，每次等待平均花费 80 到 100 个回合。这很重要，因为每次轮询之间存在延迟（由\
  \ `innodb_spin_wait_delay` 和 `innodb_spin_wait_pause_multiplier` 选项控制）。此外，默认情况下，在\
  \ 30 个回合后（`innodb_sync_spin_loops` 选项），InnoDB 会挂起线程，使其可用于其他目的，这使得再次唤醒查询的成本更高。对于共享锁，平均值小于五个，因此更容易管理。\n\
  \n您还应该考虑自适应哈希索引可用于查找行并节省 B 树搜索的频率。哈希索引查找与 B 树搜索相比速度很快，因此自适应哈希索引能满足的搜索越多，其开销就越合理。InnoDB\
  \ 有两个指标跟踪哈希索引的使用频率以及必须访问 B 树的频率。此外，还有六个与自适应哈希索引相关的其他指标，但这些默认是禁用的（数值来自此测试之前完成的工作，因此可能有所不同）：\n\
  \n```\nmysql> SELECT variable_name, variable_value AS value, enabled\nFROM sys.metrics\n\
  WHERE type = 'InnoDB Metrics - adaptive_hash_index'\nORDER BY variable_name;\n+------------------------------------------+----------+---------+\n\
  | variable_name                            | value    | enabled |\n+------------------------------------------+----------+---------+\n\
  | adaptive_hash_pages_added                | 0        | NO      |\n| adaptive_hash_pages_removed\
  \              | 0        | NO      |\n| adaptive_hash_rows_added              \
  \   | 0        | NO      |\n| adaptive_hash_rows_deleted_no_hash_entry | 0     \
  \   | NO      |\n| adaptive_hash_rows_removed               | 0        | NO    \
  \  |\n| adaptive_hash_rows_updated               | 0        | NO      |\n| adaptive_hash_searches\
  \                   | 51488882 | YES     |\n| adaptive_hash_searches_btree     \
  \        | 10904682 | YES     |\n+------------------------------------------+----------+---------+\n\
  8 rows in set (0.0097 sec)\n```\n\n这表明超过 5100 万次搜索（`adaptive_hash_searches`）由哈希索引满足，少于\
  \ 1100 万次搜索需要使用 B 树。这给出了一个命中率：\n\n![$$ Hit\\ Rate=100\\%\\ast \\frac{adaptive\\\
  _ hash\\_ searches}{adaptive\\_ hash\\_ searches+ adaptive\\_ hash\\_ searches\\\
  _ btree} $$](img/502546_1_En_18_Chapter_TeX_IEq1.png)\n\n82.5% 的命中率可能看起来不错，但根据工作负载的不同，这对于自适应哈希索引来说可能偏低。请记住，哈希索引也会在缓冲池中占用内存。如果禁用自适应哈希索引，该内存可用于缓存\
  \ B 树索引。您还需要考虑指标覆盖的时间范围以及哈希索引的有效性是否存在波动。对于后者，监控软件中的图表是查看一段时间内数据的好方法。图 18-4 显示了一个基于此测试期间收集指标的示例。\n\
  \n![../images/502546_1_En_18_Chapter/502546_1_En_18_Fig4_HTML.jpg](img/502546_1_En_18_Fig4_HTML.jpg)\n\
  \n图 18-4\n\n测试期间的自适应哈希索引搜索指标\n\n在这里，您可以看到最初自适应哈希索引是有效的，大多数搜索都是通过哈希索引完成的。然而，测试进行到\
  \ 6 秒时，`adaptive_hash_searches` 指标开始急剧下降，在 9 秒之后直到测试接近结束，它都没有超过每秒 250 次匹配。您还可以看到，这段时间内两者的总和远低于开始时，这可能是由于争用导致整体查询性能受到影响。不过，您需要使用其他来源来确认情况是否如此；这留作练习。\n\
  \n或者，您可以直接绘制命中率图，如图 18-5 所示。\n\n![../images/502546_1_En_18_Chapter/502546_1_En_18_Fig5_HTML.jpg](img/502546_1_En_18_Fig5_HTML.jpg)\n\
  \n图 18-5\n\n测试期间的自适应哈希索引命中率\n\n这清楚地表明，最初自适应哈希索引相当有效，但随后变得无用。基于此，似乎值得禁用自适应哈希索引，您可以通过将\
  \ `innodb_adaptive_hash_index` 设置为 `OFF` 或 `0` 来实现，例如：\n\n```\nSET GLOBAL innodb_adaptive_hash_index\
  \ = OFF;\nQuery OK, 0 rows affected (0.1182 sec)\n```\n\n虽然您可以动态测试禁用哈希索引，但请注意，一旦禁用，缓冲池中的哈希索引就会被清除，因此如果您稍后重新启用该功能，则需要重建哈希。对于大型实例，自适应哈希索引可能使用\
  \ 25 GiB 或更多内存，因此重建需要一段时间。因此，在生产系统中禁用自适应哈希索引时，您可能希望保留一个启用了该功能的副本备用，以便在禁用 `innodb_adaptive_hash_index`\
  \ 导致性能下降时可以故障转移到该副本。\n\n> **提示：**\n> 最终，对于信号量争用问题，您需要使用基准测试或在类生产环境中进行测试，或者通过拥有不同设置的副本，来验证您的更改效果。虽然可以像本次讨论中那样对效果进行一些估计，但涉及组件之间的交互是复杂的，在您进行测量之前无法确定整体影响。\n\
  \n虽然禁用自适应哈希索引是一个直接的解决方案，但您还可以考虑其他可能允许您继续至少部分使用自适应哈希索引的更改。\n\n\n\n### 增加哈希索引的分区数量\n\
  \n如果争用是由太多连接命中同一个哈希分区导致的，那么一个可选方案是增加自适应哈希索引被拆分成的分区数量。这可以通过 `innodb_adaptive_hash_index_parts`\
  \ 选项来完成。没有直接的方法来确定增加哈希索引分区数量是否会有所帮助，不过你可以查看 InnoDB 监视器输出中的 `INSERT BUFFER AND ADAPTIVE\
  \ HASH INDEX` 部分，了解每个分区中缓冲区的数量和大小，例如：\n\n```sql\nmysql> SHOW ENGINE INNODB STATUS\\\
  G\n...\n\nINSERT BUFFER AND ADAPTIVE HASH INDEX\n\nIbuf: size 1, free list len 13,\
  \ seg size 15, 0 merges\nmerged operations:\ninsert 0, delete mark 0, delete 0\n\
  discarded operations:\ninsert 0, delete mark 0, delete 0\nHash table size 34679,\
  \ node heap has 1 buffer(s)\nHash table size 34679, node heap has 3880 buffer(s)\n\
  Hash table size 34679, node heap has 1 buffer(s)\nHash table size 34679, node heap\
  \ has 1 buffer(s)\nHash table size 34679, node heap has 1 buffer(s)\nHash table\
  \ size 34679, node heap has 1 buffer(s)\nHash table size 34679, node heap has 1\
  \ buffer(s)\nHash table size 34679, node heap has 1 buffer(s)\n0.00 hash searches/s,\
  \ 0.00 non-hash searches/s\n...\n```\n\n此输出来自测试的结尾部分，你可以看到实际上主要只使用了其中一个分区（对你而言，使用的分区可能不同）。因此，在这种情况下，增加更多的哈希索引分区可能并无帮助。在更真实的生产环境中，如果存在许多索引，你更可能从增加分区中受益。\n\
  \n### 其他解决方案\n\n本节前面曾讨论过，许多自旋等待转化为操作系统等待是一个问题。特别是如果你没有用完所有的 CPU，你可以考虑增加 `innodb_sync_spin_loops`\
  \ 选项的值，以允许 InnoDB 持续轮询直到读写锁变为可用。这可以减少上下文切换的次数和总等待时间。\n\n最后，你可以考虑将查询划分为受益于自适应哈希索引的和不受益的，并将每组查询导向不同的副本。这样，你可以在启用了自适应哈希索引功能的副本上执行受益的查询，在禁用了该功能的副本上执行不受益的查询。显然，这主要适用于只读任务的解决方案。\n\
  \n### 总结\n\n本案例研究分析了一个自适应哈希索引上的信号量争用案例。其症状包括：`innodb_rwlock_%` InnoDB 指标报告的等待次数增加，以及由于太多查询需要对相同锁进行冲突访问而导致的\
  \ InnoDB 监视器 `SEMAPHORES` 部分输出异常。\n\n与之前大多数案例研究相比，本案例的设置更为复杂，使用 MySQL Shell 的 `concurrency_book`\
  \ 模块最容易复现。本章的工作负载会提示测试的各种设置，因此你可以尝试并为你的系统调整测试。\n\n调查从使用 `innodb_rwlock_%` 指标开始，以确定争用何时成为一个问题。你可以查看原始指标以及每次自旋等待的自旋轮数。然后，使用\
  \ InnoDB 监视器和互斥锁监视器来确定争用发生的位置，在本例中，是在自适应哈希索引上。最后，讨论了你可能如何确定导致争用的具体工作负载。\n\n在处理互斥锁和信号量争用时，解决方案通常不是简单和确定性的。对于自适应哈希索引，最直接的选项是禁用它，但在这样做之前，你需要考虑该功能的整体有效性，包括命中率。另一种方法是将哈希索引拆分成更多分区；但是，这仅在争用影响到你现有的多个分区时才有效。其他解决方案包括增加允许的自旋循环次数以减少\
  \ InnoDB 暂停轮询的频率，以及使用具有不同配置的多个只读副本。\n\n至此，我们结束了对 MySQL 并发世界的探索之旅，重点关注了锁和事务。请记住，熟能生巧，对于本书讨论的主题尤其如此。本书的剩余部分包含两个附录：附录\
