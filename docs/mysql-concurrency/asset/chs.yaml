  \ `sleep` 因子。对于本次讨论，默认值即可，但建议您尝试其他设置进行自己的测试。特别是，将 `sleep` 因子降低到 8 或更低会使 `ALTER TABLE`\
  \ 开始成功执行，并且您将看到 `ER_LOCK_DEADLOCK` 计数器增加；这是一个元数据死锁。\n\n注意\n\n由于 MySQL Shell 中的并发工作负载并非完全线程安全，偶尔可能需要重试测试。\n\
  \n\n首先，会打印一些初始监控信息。测试结束时会执行相同的监控，因此你可以获取有关发生的错误数量以及其他指标的信息。测试结束时的监控信息还包括 CSV 格式的信息，你可以将其复制到电子表格中，例如用于创建图表。此外，输出还包含关于元数据锁和锁等待以及遇到锁等待超时的语句的信息。\n\
  \n## 讨论分析\n\n调查通常将经历几个步骤。首先，将涵盖应用程序记录的错误和监控信息。其次，讨论锁相关指标。第三，探讨元数据锁，最后讨论 InnoDB 锁竞争。\n\
  \n### 错误与高层监控\n\n你首先可能注意到的是应用程序正在经历错误；在本例中是锁等待超时。在真实案例中，你可能不会像本案例研究这样直接获得错误信息。如果你不处理这些错误，可能会看到应用程序报错甚至崩溃。始终处理错误并最好记录错误非常重要，这样你可以跟踪应用程序遇到的问题，并且可以使用\
  \ Splunk^(⁷) 等日志分析器来分析错误的频率。本案例研究中的错误示例包括：\n\n```sql\nmysql> UPDATE sakila.category\
  \ SET name = IF(name = 'Travel', 'Exploring', 'Travel') WHERE category_id = 16;\n\
  ERROR: 1205: Lock wait timeout exceeded; try restarting transaction\nmysql> ALTER\
  \ TABLE sakila.inventory FORCE;\nERROR: 1205: Lock wait timeout exceeded; try restarting\
  \ transaction\n```\n\n你也可以查看监控，其中应包含关于 InnoDB 锁等待的信息，类似于图 17-1 所示，即测试期间测量的 InnoDB\
  \ 锁等待次数、InnoDB 锁等待超时次数以及以毫秒为单位的 InnoDB 锁定时间。\n\n![../images/502546_1_En_17_Chapter/502546_1_En_17_Fig1_HTML.jpg](img/502546_1_En_17_Fig1_HTML.jpg)\n\
  *图 17-1：InnoDB 锁等待指标*\n\n“当前等待次数”是直接测量值，而“锁超时次数”和“锁时间”是与上一次测量相比的差值。“当前等待次数”和“锁超时次数”使用左侧\
  \ y 轴并以柱状图表示，而“锁时间”则使用右侧 y 轴以折线图显示。x 轴是测试进行的时间。从图中可以看出锁问题是间歇性发生的，你可以用它来确定问题发生的时间。如果你的监控解决方案允许查看在给定时间间隔内运行的查询，你可以用它来调查导致锁等待的工作负载。支持此功能的监控解决方案示例包括\
  \ MySQL Enterprise Monitor（也称为 MEM）^(⁸)、Solarwinds Database Performance Monitor\
  \ (DPM，原名 VividCortex)^(⁹) 和 Percona Monitoring and Management (PMM)。^(¹⁰)\n\n###\
  \ 锁指标\n\n锁指标的监控使得发现锁竞争加剧的时段变得容易，值得对这些指标进行更多讨论。对于 InnoDB，如上所示监控锁等待是直接的，但不幸的是，没有指标可以轻松地为元数据锁提供同类信息。你可以使用来自\
  \ Performance Schema 的错误统计信息来跟踪锁等待超时和死锁的数量：\n\n```sql\nmysql> SELECT error_number,\
  \ error_name, sum_error_raised\nFROM performance_schema.events_errors_summary_global_by_error\n\
  WHERE error_name IN ('ER_LOCK_WAIT_TIMEOUT', 'ER_LOCK_DEADLOCK');\n+--------------+----------------------+------------------+\n\
  | error_number | error_name           | sum_error_raised |\n+--------------+----------------------+------------------+\n\
  |         1205 | ER_LOCK_WAIT_TIMEOUT |              310 |\n|         1213 | ER_LOCK_DEADLOCK\
  \     |               12 |\n+--------------+----------------------+------------------+\n\
  ...\nmysql> SELECT error_number, error_name, sum_error_raised\nFROM performance_schema.events_errors_summary_global_by_error\n\
  WHERE error_name IN ('ER_LOCK_WAIT_TIMEOUT', 'ER_LOCK_DEADLOCK');\n+--------------+----------------------+------------------+\n\
  | error_number | error_name           | sum_error_raised |\n+--------------+----------------------+------------------+\n\
  |         1205 | ER_LOCK_WAIT_TIMEOUT |              317 |\n|         1213 | ER_LOCK_DEADLOCK\
  \     |               12 |\n+--------------+----------------------+------------------+\n\
  ```\n\n这表明在此测试期间，发生了 7 次锁等待超时，没有死锁。此信息的问题在于，它无法告诉你是元数据锁、InnoDB 锁还是其他某种锁类型遇到了锁等待超时或死锁。也就是说，由于\
  \ InnoDB 有自己的锁等待超时和死锁统计信息，你可以通过减去这两个统计信息来推导出非 InnoDB 锁的数量。测试的 InnoDB 锁统计信息如清单 17-2\
  \ 所示。\n\n```sql\nmysql> SELECT Variable_name, Variable_value\nFROM sys.metrics\n\
  WHERE Variable_name IN (\n'innodb_row_lock_current_waits',\n'lock_row_lock_current_waits',\n\
  'innodb_row_lock_time',\n'innodb_row_lock_waits',\n'lock_deadlocks',\n'lock_timeouts'\n\
  );\n+-------------------------------+----------------+\n| Variable_name        \
  \         | Variable_value |\n+-------------------------------+----------------+\n\
  | innodb_row_lock_current_waits | 0              |\n| innodb_row_lock_time     \
  \     | 409555         |\n| innodb_row_lock_waits         | 384            |\n|\
  \ lock_deadlocks                | 0              |\n| lock_row_lock_current_waits\
  \   | 0              |\n| lock_timeouts                 | 188            |\n+-------------------------------+----------------+\n\
  ...\nmysql> SELECT Variable_name, Variable_value\nFROM sys.metrics\nWHERE Variable_name\
  \ IN (\n'innodb_row_lock_current_waits',\n'lock_row_lock_current_waits',\n'innodb_row_lock_time',\n\
  'innodb_row_lock_waits',\n'lock_deadlocks',\n'lock_timeouts'\n)\n+-------------------------------+----------------+\n\
  | Variable_name                 | Variable_value |\n+-------------------------------+----------------+\n\
  | innodb_row_lock_current_waits | 1              |\n| innodb_row_lock_time     \
  \     | 417383         |\n| innodb_row_lock_waits         | 392            |\n|\
  \ lock_deadlocks                | 0              |\n| lock_row_lock_current_waits\
  \   | 1              |\n| lock_timeouts                 | 192            |\n+-------------------------------+----------------+\n\
  ```\n*清单 17-2：测试的 InnoDB 锁统计信息*\n\n这里你可以看到总共发生了 4 次 InnoDB 锁等待超时（`lock_timeouts`\
  \ 状态计数器），占总共 7 次 `ER_LOCK_WAIT_TIMEOUT` 错误，因此你可以得出结论，有 3 次非 InnoDB 锁等待超时。在本案例研究中，这些全部是元数据锁等待超时。\n\
  \n### 元数据锁竞争\n\n在实践中，最好能在锁竞争进行时捕获它，如前面的案例研究所示。在本示例的输出中，有来自 `performance_schema.metadata_locks`\
  \ 表以及 `sys` 模式视图 `schema_table_lock_waits` 和 `innodb_lock_waits` 的输出。`metadata_locks`\
  \ 表突显了元数据锁的扩散程度，如清单 17-3 所示。\n\n\n\n两个待处理锁（第 16 行和第 23 行）分别对应`customer`表的`ALTER\
  \ TABLE`语句和其中一个`UPDATE`语句。\n\n在此输出被收集的时间点，仅五个线程就产生了 26 个已授予或待处理的元数据锁。所有语句都只查询单个表（严格来说，`ALTER\
  \ TABLE`语句涉及第二个表——本例中名为`#sql-35e8_1d2`的表，但这是用于重建`inventory`表的临时表名）。按表名对锁进行分组，可以看到\
  \ 11 个表（包括临时表）存在元数据锁（数字可能与前文输出不完全一致，因为并非同一时刻采集）：\n\n```sql\nmysql> SELECT object_name,\
  \ COUNT(*)\nFROM performance_schema.metadata_locks\nWHERE object_type = 'TABLE'\n\
  AND object_schema = 'sakila'\nGROUP BY object_name\nORDER BY object_name;\n+---------------+----------+\n\
  | object_name   | COUNT(*) |\n+---------------+----------+\n| #sql-35e8_1d2 |  \
  \      1 |\n| address       |        2 |\n| category      |        2 |\n| customer\
  \      |        2 |\n| film          |        3 |\n| film_category |        2 |\n\
  | inventory     |        4 |\n| payment       |        2 |\n| rental        |  \
  \      3 |\n| staff         |        2 |\n| store         |        3 |\n+---------------+----------+\n\
  ```\n\n所有这些表受到影响的原因是`sakila`模式大量使用了外键。图 17-2 展示了各表及其外键关系。图中仅包含属于表主键或外键组成部分的列。\n\n\
  ![测试环境中各表之间的关系](img/502546_1_En_17_Fig2_HTML.jpg)\n\n要查找导致`ALTER TABLE`锁等待超时的语句，最简单的方法是使用第\
  \ 14 章讨论的`sys.schema_table_lock_waits`视图。具体步骤留给读者作为练习。产生冲突的语句是对`customer`表的更新操作和对`inventory`表的`ALTER\
  \ TABLE`操作。\n\n\n### InnoDB 锁竞争\n\n当你考虑到上一节中表之间的外键关系时，很容易草率地得出结论：对 `category` 表执行\
  \ `UPDATE` 语句时发生的锁等待超时，也是由于对 `inventory` 表执行 `ALTER TABLE` 所引发的元数据锁级联所致。然而，在得出此类结论之前，你必须谨慎并研究事实——而在本例中，该结论是错误的。\n\
  \n如果你查看 `metadata_locks` 表的信息，可以看到所有待处理的锁都不是针对 `category` 表的：\n\n```\n***************************\
  \ 16\\. row ***************************\nobject_name: inventory\nlock_type: SHARED_READ\n\
  lock_status: PENDING\nowner_thread_id: 795\nowner_event_id: 10\n...\n***************************\
  \ 23\\. row ***************************\nobject_name: inventory\nlock_type: EXCLUSIVE\n\
  lock_status: PENDING\nowner_thread_id: 796\nowner_event_id: 9\n```\n\n这是此处的关键信息。虽然了解\
  \ schema 很重要，但你应该从查看锁等待信息开始，然后运用 schema 知识来理解锁发生的原因，而不是试图根据 schema 知识猜测可能存在哪些锁。\n\
  \n先前讨论的监控确实显示存在 InnoDB 锁等待超时，并且列表 17-4 中的 `sys.innodb_lock_waits` 输出显示了哪些是冲突的锁和语句。\n\
  \n```\nmysql> SELECT * FROM sys.innodb_lock_waits\\G\n***************************\
  \ 1\\. row ***************************\nwait_started: 2020-08-02 14:17:13\nwait_age:\
  \ 00:00:02\nwait_age_secs: 2\nlocked_table: `sakila`.`category`\nlocked_table_schema:\
  \ sakila\nlocked_table_name: category\nlocked_table_partition: None\nlocked_table_subpartition:\
  \ None\nlocked_index: PRIMARY\nlocked_type: RECORD\nwaiting_trx_id: 535860\nwaiting_trx_started:\
  \ 2020-08-02 14:17:13\nwaiting_trx_age: 00:00:02\nwaiting_trx_rows_locked: 1\nwaiting_trx_rows_modified:\
  \ 0\nwaiting_pid: 463\nwaiting_query: UPDATE sakila.category SET name = IF(name\
  \ = 'Travel', 'Exploring', 'Travel') WHERE category_id = 16\nwaiting_lock_id: 2711671600928:1795:4:282:2711634698920\n\
  waiting_lock_mode: X,REC_NOT_GAP\nblocking_trx_id: 535859\nblocking_pid: 462\nblocking_query:\
  \ None\nblocking_lock_id: 2711671600096:1795:4:282:2711634694976\nblocking_lock_mode:\
  \ S,REC_NOT_GAP\nblocking_trx_started: 2020-08-02 14:17:13\nblocking_trx_age: 00:00:02\n\
  blocking_trx_rows_locked: 5\nblocking_trx_rows_modified: 2\nsql_kill_blocking_query:\
  \ KILL QUERY 462\nsql_kill_blocking_connection: KILL 462\n1 row in set (0.0017 sec)\n\
  列表 17-4\n测试期间的 InnoDB 锁等待\n```\n\n锁竞争发生在 `category` 表的主键上，进程列表 ID 462 是阻塞连接。该连接在输出时处于空闲状态，因此你需要使用\
  \ Performance Schema 语句历史表、监控解决方案中的查询分析、研究应用程序或结合它们来确定该事务执行了哪些查询。在本例中，是对 `film_category`\
  \ 表的更新（为可读性进行了格式化）：\n\n```\nUPDATE sakila.film_category\nSET category_id = IF(category_id\
  \ = 7, 16, 7)\nWHERE film_id = 64;\n```\n\n这之所以会导致对 `category` 表加锁，是因为在 `film_category`\
  \ 和 `category` 表的 `category_id` 列之间存在外键。因此，当进程列表 ID 为 463 的连接尝试更新与连接 462 已更新的行具有相同\
  \ ID 的 `category` 表中的行时，它将被阻塞，直到 462 提交或回滚。\n\n## 解决方案与预防措施\n\n第 14 和 15 章讨论的解决方案和预防措施在涉及外键的情况下同样适用。这意味着避免问题的最有效方法是首先避免长时间运行的事务，而作为一种快速解除元数据锁等待阻塞的方法，你可以终止请求独占锁的\
  \ DDL 语句。\n\n> 注意：与 InnoDB 记录锁相比，外键对元数据锁的影响更大，因为后者仅影响涉及外键列的情况。\n\n当存在外键时，将 `lock_wait_timeout`\
  \ 设置为较低的值特别有用，可以避免大量跨多个表的元数据锁请求被长时间请求或持有，同时等待所有请求被授予。这可以与降低 `max_write_lock_count`\
  \ 的值结合使用，以避免在繁忙的表上因外键而请求的共享元数据锁请求被延迟。（降低 `max_write_lock_count` 不会改变本案例研究的情况。）\n\
  \n如果你因外键导致锁竞争而遇到严重问题，一种可能是将保持数据一致性的责任转移到应用程序中。然而，你应该意识到，这移除了在 MySQL 层面保持数据一致性（ACID\
  \ 中的 C）的保障，因此不推荐这样做。尽管如此，在某些情况下，这可能是避免高并发系统中过度锁定的唯一方法。\n\n> 谨慎：虽然在应用程序中处理外键关系有助于减少数据库中的锁定，但请注意，这也削弱了一致性保证。\n\
  \n此外，还存在一些并非外键特有的通用解决方案：\n\n*   如果锁持有时间过长（例如，由于事务被放弃），请考虑终止阻塞事务，但要记住考虑必须回滚的更改数量。\n\
  *   记住处理因锁等待超时而失败的事务查询，这样事务就不会带着在失败语句之前获取的锁一直存在。\n*   考虑你能采取哪些措施来减少事务的持续时间和大小。\n\
  *   使用索引以减少访问的记录数。\n*   如果适用于你的应用程序，请考虑使用 `READ COMMITTED` 事务隔离级别。\n\n### 总结\n\n\
  本章通过一个由外键引起的并发元数据锁和 InnoDB 锁竞争的案例研究进行了讲解。主要的讨论点是锁如何扩散到查询所使用的表之外。元数据锁尤其如此，而对于 InnoDB\
  \ 记录锁的影响较小，因为仅当涉及用于外键的列时才会获取额外的锁。\n\n调查锁问题的原理与不涉及外键时相同；然而，由于涉及的锁数量更多，因此更为困难；在示例中，`performance_schema.metadata_locks`\
  \ 返回了 26 个锁请求。因此，使用 `sys` 模式视图来帮助进行分析特别有用。\n\n除了通常减少锁问题的方法外，对于元数据锁，你可以考虑将较低的 `lock_wait_timeout`\
  \ 与相对较低的 `max_write_lock_count` 值结合使用。另一个对元数据和 InnoDB 锁都有帮助的选择是将保证外键一致性的责任留给应用程序；但是，如果你这样做，请务必非常小心，因为它无法提供像\
  \ MySQL 处理时那样强大的保证。\n\n还有一个案例研究，涵盖了 InnoDB 中存在信号量等待的情况，这将在下一章中讨论。\n\n脚注 1   2  \
  \ 3   4\n\n# 18. 案例研究：信号量\n\n互斥锁和信号量争用是你可能遇到的最难以捉摸的争用类型之一，因为在极端情况之外，你不会直接注意到任何问题。相反，争用往往表现为整体延迟增加和吞吐量降低，难以准确定位。然后，你可能突然之间跨越了一个负载阈值，争用导致你的服务器完全停止运行。\n\
  \n本章通过一个调查自适应哈希索引读写信号量争用的案例研究进行说明。不过，请务必注意，信号量争用根据发生争用的互斥锁或信号量而有所不同，解决它所需的调查方法也是如此。在严重性较高的案例中，你可能还会发现同时存在多个信号量等待的争用。\n\
  \n## 症状\n\n注意到 InnoDB 互斥锁或信号量存在争用的两种最常见方式是通过 InnoDB 监视器和 `innodb_rwlock_%` InnoDB\
  \ 指标。\n\n在 InnoDB 监视器输出中，你将在输出顶部的 `SEMAPHORES` 部分看到持续的等待，例如：\n\n```\nSEMAPHORES\n\
  OS WAIT ARRAY INFO: reservation count 77606\n--Thread 19304 has waited at btr0sea.ic\
  \ line 122 for 0 seconds the semaphore:\nS-lock on RW-latch at 00000215E6DC12F8\
  \ created in file btr0sea.cc line 202\na writer (thread id 11100) has reserved it\
  \ in mode exclusive\nnumber of readers 0, waiters flag 1, lock_word: 0\nLast time\
  \ read locked in file btr0sea.ic line 122\nLast time write locked in file G:\\ade\\\
  build\\sb_0-39697839-1592332179.68\\mysql-8.0.21\\storage\\innobase\\btr\\btr0sea.cc\
  \ line 1197\n--Thread 26128 has waited at btr0sea.ic line 92 for 0 seconds the semaphore:\n\
  X-lock on RW-latch at 00000215E6DC12F8 created in file btr0sea.cc line 202\na writer\
  \ (thread id 11100) has reserved it in mode exclusive\nnumber of readers 0, waiters\
  \ flag 1, lock_word: 0\nLast time read locked in file btr0sea.ic line 122\nLast\
  \ time write locked in file G:\\ade\\build\\sb_0-39697839-1592332179.68\\mysql-8.0.21\\\
  storage\\innobase\\btr\\btr0sea.cc line 1197\nOS WAIT ARRAY INFO: signal count 93040\n\
  RW-shared spins 18200, rounds 38449, OS waits 20044\nRW-excl spins 22345, rounds\
  \ 1121445, OS waits 38469\nRW-sx spins 3684, rounds 100410, OS waits 2886\nSpin\
  \ rounds per wait: 2.11 RW-shared, 50.19 RW-excl, 27.26 RW-sx\n```\n\n等待次数越多，等待时间越长，问题就越严重。\n\
  \n你可能还会在监控中注意到，高负载时读写锁等待次数很高，并且可能出现峰值。在一个真实世界的例子中，自适应哈希索引存在严重争用，长时间内每秒有数万次操作系统等待。\n\
  \n## 原因\n\n问题在于，对共享资源（例如访问自适应哈希索引）的请求到达速度超过了处理速度。这些资源在源代码内部使用互斥锁和读写锁进行保护。争用表明，要么你已达到所用\
  \ MySQL 版本针对你的工作负载的并发限制，要么你需要将资源拆分成更多部分或采取类似措施。\n\n## 环境设置\n\n随意重现信号量争用可能很困难。系统上可用的\
  \ CPU 越多，就越有可能生成经历信号量等待的工作负载。\n\n本章讨论的输出是使用`清单` `8-1`的工作负载在配备八个 CPU、缓冲池大小设置为默认 128\
  \ MiB 的笔记本电脑上生成的。如果你尝试重现该案例，可能需要试验连接数。脚本会提示你输入这些值，默认为 1 个读写线程，其余每个 CPU 使用一个连接用于只读连接。\n\
  \n**注意**\nMySQL Shell 的会话对象即使每个线程拥有自己的会话，也并非完全线程安全。因此，可能需要尝试测试几次。这个问题在 Microsoft\
  \ Windows 上使用多个读写连接时尤其明显。\n\n你也可以尝试更改缓冲池的大小。另一个选择是减少提交事务时的刷新，这对于磁盘刷新性能较差的情况特别有帮助：\n\
  \n```\nSET GLOBAL innodb_flush_log_at_trx_commit = 0,\nGLOBAL sync_binlog = 0;\n\
  ```\n\n**警告**\n在测试系统上减少刷新是可以的，但不应在生产系统上这样做，因为在发生崩溃时可能会丢失已提交的事务。\n\n运行更长时间也可以增加至少看到一次争用的机会。\n\
  \n该测试还允许你请求在测试前重启 MySQL，并且你可以选择是否删除测试创建的索引。重启 MySQL 可以让你看到从冷的 InnoDB 缓冲池启动时的差异（尽管工作负载确实会自行预热缓冲池）。\n\
  \n**注意**\n仅当你已在监督进程下启动 MySQL 时，从测试重启 MySQL 才有效。例如，在 Microsoft Windows 上作为服务启动 MySQL、使用\
  \ `mysqld_safe` 或在 Linux 上通过 `systemd` 启动时就会发生这种情况。\n\n如果你想多次运行测试，告诉测试不要删除其索引可能是有利的，因为这允许测试在下次执行时跳过创建步骤。\n\
