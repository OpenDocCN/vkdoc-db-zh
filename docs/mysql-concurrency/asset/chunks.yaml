    **图 16-3** 查找涉及死锁的查询


    请注意，对于连接 ID 763（第二个事务），包含了 MySQL 错误编号，并且在第三行中该编号被设置为 1213 – 一个死锁错误。当遇到错误时，MySQL
    Shell 会自动执行一个 `SHOW WARNINGS` 语句，这就是第 4 行的语句。另请注意，对于事务 2 的 `ROLLBACK`，其嵌套事件是 `NULL`，而对于事务
    1 的 `ROLLBACK` 则不是。这是因为死锁触发了整个事务的回滚（因此事务 2 的 `ROLLBACK` 没有做任何事情）。


    死锁是由事务 1 首先更新 `city` 表的人口，然后更新 `country` 表的人口所触发的。事务 2 首先更新 `country` 表的人口，然后尝试向
    `city` 表插入一个新城市。这是两个工作流以不同顺序更新记录从而容易发生死锁的典型例子。


    总结一下调查过程，它包括两个步骤：

    1.  分析来自 InnoDB 的死锁信息，以确定死锁中涉及的锁，并获取有关连接的尽可能多的信息。

    2.  使用其他来源（例如 `Performance Schema`）来获取有关事务中查询的更多信息。通常需要分析应用程序以获取查询列表。


    既然你知道了是什么触发了死锁，那么解决这个问题需要做什么呢？


    ## 解决方案


    死锁是最容易解决的锁情况，因为 InnoDB 会自动选择一个事务作为受害者并回滚它。在之前讨论的死锁中，事务 2 被选为受害者，这可以从死锁输出中看出：

    ```

    *** WE ROLL BACK TRANSACTION (2)

    ```

    这意味着对于事务 1，无需做任何事情。在事务 2 被回滚后，事务 1 可以继续并完成其工作。


    对于事务 2，InnoDB 已经回滚了整个事务，所以你需要做的就是重试该事务。记住要重新执行所有查询，而不是依赖第一次尝试时返回的值；否则，你可能会使用过时的值。


    > **提示**：始终准备好处理死锁和锁等待超时。对于死锁或在锁等待超时后事务被回滚的情况，重试整个事务。对于只有查询被回滚的锁等待超时，重试查询，可能需要添加延迟。


    如果死锁发生得相对较少，你实际上不需要做更多事情。死锁是生活中的常态，因此遇到几个死锁不要惊慌。如果死锁造成重大影响，你需要着手进行更改以防止一些死锁。


    ## 预防措施


    减少死锁与通常减少记录锁争用非常相似，另外一点是，在整个应用程序中以相同顺序获取锁非常重要。建议再次阅读关于减少锁问题的第 9 章：

    *   通过将大事务拆分为几个较小的事务并添加索引以减少持有的锁数量，来减少每个事务完成的工作量。

    *   考虑使用 `READ COMMITTED` 事务隔离级别（如果它适用于你的应用程序），以减少锁的数量和持有时间。

    *   确保事务仅保持打开尽可能短的时间。

    *   以相同顺序访问记录，必要时执行 `SELECT ... FOR UPDATE` 或 `SELECT ... FOR SHARE` 查询以抢先获取锁。


    减少死锁的主要点是：减少锁的数量及其持有时间，并以相同顺序获取它们。'
- fmt: '## Summary


    In this case study, a deadlock was generated by simulating a workload updating
    the population of all cities in a country followed by updating the population
    of the country. Simultaneously, another connection added a new city to the same
    country but first updated the country’s population and then inserted the new city.
    This is a classic example of why deadlocks occur with two different workflows
    using the same tables but in opposite order.


    The deadlock was investigated primarily using the `LATEST DETECTED DEADLOCK` section
    of the InnoDB monitor output. From this it could be seen which connections were
    involved, the last statement they executed, the locks they held, and the locks
    they were waiting for. Additionally, the Performance Schema tables with the statement
    history were used to find the exact statements involved in the transaction; however,
    often, you do not have that luxury and will have to analyze the application to
    determine the statements involved.


    The good news when a deadlock occurs is that it automatically resolves itself
    by rolling back one of the transactions so the other can continue. You will then
    have to retry the victim transaction. If you have too many deadlocks, the key
    points are to reduce the number of locks and the duration of them and to ensure
    you take the locks in the same order for different tasks.


    In the next chapter, you will study a case where foreign keys cause lock contention.


    ## 17. Case Study: Foreign Keys


    One of the more difficult lock contention cases to investigate happens when foreign
    keys are involved as you can have queries on different table content for the same
    locks. This case study investigates an example where both metadata and InnoDB
    record locks occur due to foreign keys. As the symptoms and the cause are the
    same as for the case study discussing metadata locks in Chapter [14](#502546_1_En_14_Chapter.xhtml)
    and the case study of the InnoDB record locks in Chapter [15](#502546_1_En_15_Chapter.xhtml),
    these are skipped in this discussion.


    ### The Setup


    This case study is more complex than the previous ones, and there is not a simple
    way to reproduce it on your own. However, the `Listing` [`17-1`](#502546_1_En_17_Chapter.xhtml#PC1)
    workload in the `concurrency_book` module for MySQL Shell will allow you to reproduce
    the contention. The workload consists of five connections:


    *   Two connections that update the `sakila.customer` table in such a way that
    there is always a transaction ongoing with a metadata and record lock on the table.
    There is a sleep before the `COMMIT` to ensure the duration is long enough to
    avoid race conditions. The duration of the sleep can be configured during the
    execution of the workload.


    *   One connection that executes `ALTER TABLE` on the `sakila.inventory` table.
    This uses `lock_wait_timeout = 1`.


    *   One connection that updates the `sakila.film_category` table.


    *   One connection that updates the `sakila.category` table. This uses `innodb_lock_wait_timeout
    = 1`.


    When you execute the workload, after entering the password, you will be asked
    to enter the runtime of the test and how long the two connections updating the
    `sakila.customer` table should sleep for committing their transactions. The sleep
    is specified as a factor that is multiplied with 0.1 second.


    Note


    The test is not deterministic in the sense that you should expect to see different
    data even when reproducing the same issue.


    Once the test has started, various monitoring outputs will be displayed so you
    can investigate the issue.


    Listing [17-1](#502546_1_En_17_Chapter.xhtml#PC1) shows part of the output of
    an example execution of the workload (the exact number of locks encountered and
    values of the various metrics will differ from execution to execution). The complete
    output is available in `listing_17-1.txt` in this book’s GitHub repository. Several
    parts of the output will also be used in the discussion in the remainder of the
    chapter.


    ```

