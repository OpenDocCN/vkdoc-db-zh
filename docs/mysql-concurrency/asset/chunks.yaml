- fmt: 'In 2005, Oracle acquired Innobase and thus InnoDB which made for an interesting
    situation with MySQL’s main transactional storage engine (another much less used
    engine was Berkley DB, BDB, which also was acquired by Oracle) being maintained
    by a competitor. This was one reason for the effort to develop the Falcon storage
    engine for MySQL 6. However, before that work was completed, Sun Microsystems
    acquired MySQL, and Oracle in turn acquired Sun Microsystems, so in 2010, MySQL
    and InnoDB were finally part of the same company, and today InnoDB and MySQL are
    developed by the same unit within Oracle. This also meant that the Falcon storage
    engine was abandoned and never released with a general availability (GA) status.


    While Innobase as a company has disappeared a long time ago, its name still lives
    on in the MySQL source code both in the path to the InnoDB source code and as
    names within the source code.


    ## Summary


    In this chapter the InnoDB data-level locks as well as mutexes and rw-lock semaphores
    have been covered. These locks are all important to support concurrent access
    to the InnoDB data which is one of InnoDB’s strengths.


    First, the record locks and next-key locks were discussed. These are usually what
    are meant when discussing InnoDB record locks. The next-key locks are the default
    locks in InnoDB and protect the record as well as the gab before the record. Second,
    the concept of gap locks was discussed. When mentioning gap locks, it refers to
    protecting the space between two records without protecting the record itself.
    Third, the related concepts of predicate and page locks that are used with spatial
    indexed were covered.


    Fourth and fifth were two lock types that you will not encounter to the same degree
    as the first three lock types. The insert intention locks are as the name suggest
    used in connection with inserting data, and the auto-increment lock is used to
    ensure that auto-increment values are assigned correctly.


    Sixth and last was a discussion of mutexes and rw-lock semaphores primarily in
    InnoDB. These are the most complex locks to work with and to a larger degree require
    studying the source code.


    That concludes the overview of the locks available in MySQL and InnoDB. The next
    chapter moves on to the discussion of what happens when a lock cannot be obtained.


    Footnotes [1](#502546_1_En_7_Chapter.xhtml#Fn1_source)


    # 8. Working with Lock Conflicts


    The whole idea of locks is to restrict access to objects or records to avoid conflicting
    operations to concurrently access the object or records in a safe way. That means
    that, sometimes, a lock cannot be granted. What happens in that case? It depends
    on the locks requested and the circumstances. Metadata (including explicitly requested
    table locks) and InnoDB locks operate with a timeout, and for some lock cases
    explicit deadlock detection exist.


    It is important to understand that failures to obtain locks are a fact of life
    when working with databases. In principle you can use very coarse-grained locks
    and avoid failed locks except for timeouts – this is what the MyISAM storage engine
    does with very poor write concurrency as a result. However, in practice, to allow
    for high concurrency of write workloads, fine-grained locks are preferred which
    also introduce the possibility of deadlocks.


    The conclusion is that you should always make your application prepared to retry
    getting a lock or fail gracefully. This applies whether it is an explicit or implicit
    lock.


    > **Tip**

    >

    > Always be prepared to handle failures to obtain locks. Failing to get a lock
    is not a catastrophic error and should not normally be considered a bug. That
    said, as discussed in Chapter [9](#502546_1_En_9_Chapter.xhtml), “Reducing Locking
    Issues,” there are techniques to reduce lock contention that are worth having
    in mind when developing an application.


    The rest of this chapter will discuss how InnoDB chooses which transaction should
    first be granted a lock request when there are multiple requests for the same
    data lock, the compatibility of InnoDB data locks, as well as the specifics of
    table-level timeouts, record-level timeouts, InnoDB deadlocks, and InnoDB mutex
    and semaphore waits.


    ## Contention-Aware Transaction Scheduling (CATS)


    An important decision when there are multiple requests for the same lock is to
    decide in which order locks should be granted. The simplest solution, and the
    most commonly used in databases, is to maintain a queue and serve the requests
    on a first-in-first-out (FIFO) principle. This is also how locks were granted
    in MySQL 5.7 and earlier; however in MySQL 8, a new scheduling algorithm was implemented.


    The new implementation is based on the contention-aware transaction scheduling
    (CATS) algorithm developed by Professor Barzan Mozafari’s team at the University
    of Michigan and implemented in MySQL by Sunny Bains in collaboration with Professor
    Mozafari’s team, particularly Jiamin Huang.


    > **Tip**

    >

    > If you want to learn more about the CATS algorithm, then [`https://mysqlserverteam.com/contention-aware-transaction-scheduling-arriving-in-innodb-to-boost-performance/`](https://mysqlserverteam.com/contention-aware-transaction-scheduling-arriving-in-innodb-to-boost-performance/)
    is a good starting point, and there are links to two of the research papers in
    the comments – the main paper being [`http://web.eecs.umich.edu/~mozafari/php/data/uploads/pvldb_2018_sched.pdf`](http://web.eecs.umich.edu/%7Emozafari/php/data/uploads/pvldb_2018_sched.pdf).
    Another source is [`https://dev.mysql.com/doc/refman/en/innodb-transaction-scheduling.html`](https://dev.mysql.com/doc/refman/en/innodb-transaction-scheduling.html)
    in the reference manual.


    The CATS algorithm works on the principle that transactions that already hold
    a large number of locks are most important to drive to completion, so their locks
    can be released as quickly as possible to the benefit of all transactions. One
    potential downside of this approach is that if there continuously are transactions
    with many existing locks waiting for a given lock, then they can potentially starve
    transactions with few locks from ever getting the lock. To prevent that, the algorithm
    has safeguards to prevent starvation. The safeguard works by adding a barrier
    at the end of the current queue of lock requests, and all requests that are ahead
    of the barrier are handled before later arriving requests will be considered.


    The primary benefit of the CATS algorithm is under high concurrency workloads,
    and until MySQL 8.0.20, it was only used when InnoDB detected heavy lock contention.
    The algorithm was improved in 8.0.20 to improve the scalability, and the `trx_schedule_weight`
    column was added to `information_schema.INNODB_TRX`, so it is possible to query
    the current weight a transaction in the `LOCK WAIT` state has according to the
    CATS algorithm. At the same time, it was changed so the CATS algorithm is always
    used, and the FIFO algorithm has been retired.'
