  trans: '

    2005 年，Oracle 收购了 Innobase 公司，从而也获得了 InnoDB。这导致了一个有趣的情况：MySQL 主要的事务存储引擎（另一个较少使用的引擎是
    Berkley DB，简称 BDB，它也被 Oracle 收购了）由一家竞争对手维护着。这也是为 MySQL 6 开发 Falcon 存储引擎的动因之一。然而，在该工作完成之前，Sun
    Microsystems 收购了 MySQL，随后 Oracle 又收购了 Sun Microsystems。因此，到了 2010 年，MySQL 和 InnoDB
    终于归属同一家公司，如今 InnoDB 和 MySQL 由 Oracle 内部的同一个部门进行开发。这也意味着 Falcon 存储引擎被废弃，从未以正式发布（GA）状态发布过。


    虽然 Innobase 这家公司早已不复存在，但其名称仍在 MySQL 源代码中延续，既出现在 InnoDB 源代码的路径中，也作为源代码内的名称存在。


    ## 总结


    本章涵盖了 InnoDB 的数据级锁以及互斥量和读写锁信号量。这些锁对于支持并发访问 InnoDB 数据都至关重要，而这也是 InnoDB 的优势之一。


    首先，讨论了记录锁和临键锁。通常讨论 InnoDB 记录锁时指的就是这些。临键锁是 InnoDB 中的默认锁，它保护记录以及记录前的间隙。其次，讨论了间隙锁的概念。提到间隙锁，指的是保护两个记录之间的空间而不保护记录本身。第三，涵盖了与空间索引一起使用的谓词锁和页锁的相关概念。


    第四和第五是两种你遇到频率不如前三种的锁类型。插入意向锁，顾名思义，在插入数据时使用，而自增锁用于确保自增值被正确分配。


    第六，也是最后一点，主要讨论了 InnoDB 中的互斥量和读写锁信号量。这些是最复杂的锁，需要更多地研究源代码来处理。


    至此，对 MySQL 和 InnoDB 中可用锁的概述就结束了。下一章将转而讨论当无法获取锁时会发生什么。


    脚注 1


    # 8. 处理锁冲突


    锁的整个理念在于限制对对象或记录的访问，以避免冲突操作并发访问对象或记录，从而确保安全。这意味着，有时锁可能无法被授予。在那种情况下会发生什么？这取决于请求的锁和具体情况。元数据（包括显式请求的表锁）和
    InnoDB 锁操作有超时机制，并且对于某些锁情况，存在显式的死锁检测。


    重要的是要理解，在使用数据库时，获取锁失败是生活中的一部分。原则上，你可以使用非常粗粒度的锁来避免除超时外的锁获取失败——MyISAM 存储引擎就是这样做的，但代价是写并发性能非常差。然而，在实践中，为了允许高并发的写工作负载，更推荐使用细粒度的锁，这也引入了死锁的可能性。


    结论是，你应当始终让你的应用准备好重试获取锁或优雅地失败。无论这是显式锁还是隐式锁，这一点都适用。


    > **提示**

    >

    > 始终准备好处理获取锁失败的情况。获取锁失败并非灾难性错误，通常不应被视为程序缺陷。话虽如此，正如第 9 章“减少锁问题”所讨论的，在开发应用程序时，值得牢记一些减少锁竞争的技术。


    本章剩余部分将讨论当多个事务请求同一个数据锁时，InnoDB 如何决定优先授予哪个事务锁请求、InnoDB 数据锁的兼容性、以及表级超时、记录级超时、InnoDB
    死锁和 InnoDB 互斥量与信号量等待的具体细节。


    ## 感知竞争的事务调度（CATS）


    当多个请求竞争同一个锁时，一个重要的决定是以何种顺序授予锁。最简单的解决方案，也是数据库中最常用的，是维护一个队列并按照先进先出（FIFO）原则处理请求。这也是
    MySQL 5.7 及更早版本中授予锁的方式；然而在 MySQL 8 中，实现了一种新的调度算法。


    新实现基于密歇根大学 Barzan Mozafari 教授团队开发的**感知竞争的事务调度（CATS）**算法，并由 Sunny Bains 与 Mozafari
    教授的团队（特别是 Jiamin Huang）合作在 MySQL 中实现。


    > **提示**

    >

    > 如果你想了解更多关于 CATS 算法的信息，那么[`https://mysqlserverteam.com/contention-aware-transaction-scheduling-arriving-in-innodb-to-boost-performance/`](https://mysqlserverteam.com/contention-aware-transaction-scheduling-arriving-in-innodb-to-boost-performance/)是一个很好的起点，评论中还链接了两篇研究论文——主要论文是[`http://web.eecs.umich.edu/~mozafari/php/data/uploads/pvldb_2018_sched.pdf`](http://web.eecs.umich.edu/%7Emozafari/php/data/uploads/pvldb_2018_sched.pdf)。另一个来源是参考手册中的[`https://dev.mysql.com/doc/refman/en/innodb-transaction-scheduling.html`](https://dev.mysql.com/doc/refman/en/innodb-transaction-scheduling.html)。


    CATS 算法的工作原理是，已经持有很多锁的事务对于推动其完成最为重要，因此应尽快释放它们的锁，从而使所有事务受益。这种方法的一个潜在缺点是，如果持续有持有大量锁的事务在等待某个特定锁，它们可能会导致持有少量锁的事务永远无法获得该锁（即饥饿）。为了防止这种情况，该算法设有防止饥饿的保障措施。保障措施的工作原理是在当前锁请求队列末尾添加一个屏障，所有位于该屏障之前的请求都会在后续到达的请求被考虑之前处理。


    CATS 算法的主要优势体现在高并发工作负载下，并且在 MySQL 8.0.20 之前，它仅在 InnoDB 检测到严重锁竞争时才会被使用。该算法在 8.0.20
    中得到了改进以提升可伸缩性，同时在`information_schema.INNODB_TRX`表中添加了`trx_schedule_weight`列，从而可以查询处于`LOCK
    WAIT`状态的事务根据 CATS 算法计算出的当前权重。与此同时，CATS 算法改为始终使用，而 FIFO 算法已被弃用。

    '
- fmt: '## InnoDB Data Lock Compatibility


    Remember when discussing lock access level compatibility, the rules were relatively
    simple. However, whether two InnoDB data locks are compatible with each other
    is very complex to determine. It becomes particularly interesting as the relationship
    is not symmetric, that is, a lock may be allowed in the presence of another lock,
    but not vice versa. For example, an insert intention lock must wait for a gap
    lock, but a gap lock does not have to wait for an insert intention lock. Another
    example (of lack of transitivity) is that a gap plus record lock must wait for
    a record-only lock, and an insert intention lock must wait for a gap plus record
    lock, but an insert intention lock does not need to wait for a record-only lock.


    What does that mean to you? It means that when you investigate lock contention
    issues, you need to be aware that the lock order is significant, so when reproducing
    the issue, all locks must be obtained in the same order.


    Enough about the theory behind InnoDB algorithm for handling lock contention and
    what may cause a lock not to be granted. What happens when a lock cannot be granted
    is the next topic to be discussed.


    ## Metadata and Backup Lock Wait Timeouts


    When you request a flush, metadata, or backup lock, the attempt to get the lock
    will time out after `lock_wait_timeout` seconds. The default timeout is 31,536,000
    seconds (365 days). You can set the `lock_wait_timeout` option dynamically and
    both at the global and session scopes, which allows you to adjust the timeout
    to the specific needs for a given process.


    When a timeout occurs, the statement fails with an `ER_LOCK_WAIT_TIMEOUT` (error
    number 1205) error as shown in Listing 8-1.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              647        1075          6

    --          2              648        1076          6

    -- Connection 1

    Connection 1> LOCK TABLES world.city WRITE;

    Query OK, 0 rows affected (0.0015 sec)

    -- Connection 2

    Connection 2> SET SESSION lock_wait_timeout = 5;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 2> LOCK TABLES world.city WRITE;

    ERROR: 1205: Lock wait timeout exceeded; try restarting transaction

    -- Connection 1

    Connection 1> UNLOCK TABLES;

    Query OK, 0 rows affected (0.0003 sec)

    Listing 8-1

    Lock wait timeout for table lock request

    ```


    The session value of `lock_wait_timeout` is set to 5 seconds to reduce how long
    a time Connection 2 will block for when it attempts to get the write lock on the
    `world.city` table. After waiting for 5 seconds, the error is returned with the
    error number set to 1205.


    The recommended setting for the `lock_wait_timeout` option depends on the requirements
    of the application. It can be an advantage to use a small value to prevent the
    lock request to block other queries for a long time. This will typically require
    you to implement handling of a lock request failure, for example, by retrying
    the statement. A large value can on the other hand be useful to avoid having to
    retry the statement.


    For the `FLUSH TABLES` statement , also remember that it interacts with the lower-level
    table definition cache (TDC) version lock which may mean that abandoning the statement
    does not allow subsequent queries to progress. In that case, it can be better
    to have a high value for `lock_wait_timeout` to make it clearer what the lock
    relationship is.


    ## InnoDB Lock Wait Timeouts


    When a query requests a record-level lock in InnoDB, it is subject to a timeout
    similarly to the timeout for flush, metadata, and backup locks. Since record-level
    lock contention is more common than table-level lock contention, and record-level
    locks increase the potential for deadlocks, the timeout defaults to 50 seconds.
    It can be set using the `innodb_lock_wait_timeout` option which can be set both
    for the global and session scopes.


    When a timeout occurs, the query fails with the `ER_LOCK_WAIT_TIMEOUT` error (error
    number 1205) just like for a table-level lock timeout. Listing 8-2 shows an example
    where an InnoDB lock wait timeout occurs.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              656        1087          6

    --          2              657        1088          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    Query OK, 1 row affected (0.0006 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SET SESSION innodb_lock_wait_timeout = 3;

    Query OK, 0 rows affected (0.2621 sec)

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    ERROR: 1205: Lock wait timeout exceeded; try restarting transaction

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0751 sec)

    Listing 8-2

    Example of an InnoDB lock wait timeout

    ```


    In this example, the lock wait timeout for Connection 2 is set to 3 seconds, so
    it is not necessary to wait the usual 50 seconds for the timeout to occur.


    When the timeout occurs, the `innodb_rollback_on_timeout` option defines how much
    of the work done by the transaction is rolled back. When `innodb_rollback_on_timeout`
    is disabled (the default), only the statement that triggered the timeout is rolled
    back. When the option is enabled, the whole transaction is rolled back. The `innodb_rollback_on_timeout`
    option can only be configured at the global level, and it requires a restart to
    change the value.


    **Caution**


    It is very important that a lock wait timeout is handled as otherwise it may leave
    the transaction with locks that are not released. If that happens, other transactions
    may not be able to acquire the locks they require. So, you need ensure that you
    either retry the remaining part of the transaction, explicitly roll back the transaction,
    or enable `innodb_rollback_on_timeout` to automatically roll back the transaction
    on a lock wait timeout.


    It is in general recommended to keep the timeout for InnoDB record-level locks
    low. Often it is best to lower the value from the default 50 seconds. The longer
    a query is allowed to wait for a lock, the larger the potential for other lock
    requests to be affected which can lead to other queries stalling as well. It also
    makes deadlocks more likely to occur. If you disable deadlock detection (discussed
    next), you should use a very small value for `innodb_lock_wait_timeout` such as
    1 or 2 seconds as you will be using the timeout to detect deadlocks. Without deadlock
    detection, it is also recommended to enable the `innodb_rollback_on_timeout` option
    .'
  raw: '## InnoDB Data Lock Compatibility


    Remember when discussing lock access level compatibility, the rules were relatively
    simple. However, whether two InnoDB data locks are compatible with each other
    is very complex to determine. It becomes particularly interesting as the relationship
    is not symmetric, that is, a lock may be allowed in the presence of another lock,
    but not vice versa. For example, an insert intention lock must wait for a gap
    lock, but a gap lock does not have to wait for an insert intention lock. Another
    example (of lack of transitivity) is that a gap plus record lock must wait for
    a record-only lock, and an insert intention lock must wait for a gap plus record
    lock, but an insert intention lock does not need to wait for a record-only lock.


    What does that mean to you? It means that when you investigate lock contention
    issues, you need to be aware that the lock order is significant, so when reproducing
    the issue, all locks must be obtained in the same order.


    Enough about the theory behind InnoDB algorithm for handling lock contention and
    what may cause a lock not to be granted. What happens when a lock cannot be granted
    is the next topic to be discussed.


    ## Metadata and Backup Lock Wait Timeouts


    When you request a flush, metadata, or backup lock, the attempt to get the lock
    will time out after `lock_wait_timeout` seconds. The default timeout is 31,536,000
    seconds (365 days). You can set the `lock_wait_timeout` option dynamically and
    both at the global and session scopes, which allows you to adjust the timeout
    to the specific needs for a given process.


    When a timeout occurs, the statement fails with an `ER_LOCK_WAIT_TIMEOUT` (error
    number 1205) error as shown in Listing [8-1](#502546_1_En_8_Chapter.xhtml#PC1).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              647        1075          6

    --          2              648        1076          6

    -- Connection 1

    Connection 1> LOCK TABLES world.city WRITE;

    Query OK, 0 rows affected (0.0015 sec)

    -- Connection 2

    Connection 2> SET SESSION lock_wait_timeout = 5;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 2> LOCK TABLES world.city WRITE;

    ERROR: 1205: Lock wait timeout exceeded; try restarting transaction

    -- Connection 1

    Connection 1> UNLOCK TABLES;

    Query OK, 0 rows affected (0.0003 sec)

    Listing 8-1

    Lock wait timeout for table lock request

    ```


