    \ `DDL` 语句。"
  raw: '### Unique Indexes


    The primary purpose of a unique index compared to an equivalent non-unique index
    is to add the constraint that each value is only allowed once. So, at the surface,
    unique indexes seem to have little relevance for the discussion of locks beyond
    what has already been mentioned. However, InnoDB can take advantage of knowing
    that at most one record (except where the value is `NULL`) can exist for a given
    equity condition and use this to reduce the amount of locking required.


    As an example, consider two tables, `_tmp_city1` and `_tmp_city2`, containing
    the same subset of rows from the `world.city` table. The `_tmp_city1` table has
    a non-unique index on the `Name` column, whereas the `_tmp_city2` table has a
    unique index on the column. Then a single row is updated using a condition on
    the `Name` column. Listing [10-5](#502546_1_En_10_Chapter.xhtml#PC5) shows this.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              736        1209          6

    --          2              737        1210          6

    -- Connection 1

    Connection 1> DROP TABLE IF EXISTS world._tmp_city1;

    Query OK, 0 rows affected (0.0643 sec)

    Note (code 1051): Unknown table ''world._tmp_city1''

    Connection 1> CREATE TABLE world._tmp_city1

    SELECT *

    FROM world.city

    WHERE CountryCode = ''AUS'';

    Query OK, 14 rows affected (1.3112 sec)

    Records: 14  Duplicates: 0  Warnings: 0

    Connection 1> ALTER TABLE world._tmp_city1

    ADD PRIMARY KEY (ID),

    ADD INDEX (Name);

    Query OK, 0 rows affected (2.5572 sec)

    Records: 0  Duplicates: 0  Warnings: 0

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world._tmp_city1

    SET Population = 5000000

    WHERE Name = ''Sydney'';

    Query OK, 1 row affected (0.0007 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> DROP TABLE IF EXISTS world._tmp_city2;

    Query OK, 0 rows affected (0.1361 sec)

    Note (code 1051): Unknown table ''world._tmp_city2''

    Connection 2> CREATE TABLE world._tmp_city2

    SELECT *

    FROM world.city

    WHERE CountryCode = ''AUS'';

    Query OK, 14 rows affected (0.8276 sec)

    Records: 14  Duplicates: 0  Warnings: 0

    Connection 2> ALTER TABLE world._tmp_city2

    ADD PRIMARY KEY (ID),

    ADD UNIQUE INDEX (Name);

    Query OK, 0 rows affected (2.4895 sec)

    Records: 0  Duplicates: 0  Warnings: 0

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 2> UPDATE world._tmp_city2

    SET Population = 5000000

    WHERE Name = ''Sydney'';

    Query OK, 1 row affected (0.0005 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    Listing 10-5

    The difference between non-unique and unique secondary indexes

    ```


    While the transactions are still ongoing, you can check the locks held by each
    connection. For Connection 1, the record locks are shown in Listing [10-6](#502546_1_En_10_Chapter.xhtml#PC6)
    which is investigation number 1 for the workload executed in Listing [10-5](#502546_1_En_10_Chapter.xhtml#PC5).


    ```

    -- Investigation #1

    -- Connection 3

    Connection 3> SELECT index_name, lock_mode, lock_data

    b            FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND lock_type = ''RECORD''

    AND thread_id = 1209\G

    *************************** 1\. row ***************************

    index_name: Name

    lock_mode: X

    lock_data: ''Sydney                             '', 130

    *************************** 2\. row ***************************

    index_name: PRIMARY

    lock_mode: X,REC_NOT_GAP

    lock_data: 130

    *************************** 3\. row ***************************

    index_name: Name

    lock_mode: X,GAP

    lock_data: ''Townsville                         '', 142

    3 rows in set (0.0094 sec)

    Listing 10-6

    The record locks for Connection 1 (investigation number 1)

    ```


    This is what is expected based on the experience of the previous examples, a record
    lock on the primary key as well as a record and gap lock on the index. For Connection
    2, only two of these locks exist as the output in Listing [10-7](#502546_1_En_10_Chapter.xhtml#PC7)
    of investigation number 2 from Listing [10-5](#502546_1_En_10_Chapter.xhtml#PC5)
    shows.


    ```

    -- Investigation #2

    Connection 3> SELECT index_name, lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND lock_type = ''RECORD''

    AND thread_id = 1210\G

    *************************** 1\. row ***************************

    index_name: Name

    lock_mode: X,REC_NOT_GAP

    lock_data: ''Sydney                             '', 130

    *************************** 2\. row ***************************

    index_name: PRIMARY

    lock_mode: X,REC_NOT_GAP

    lock_data: 130

    2 rows in set (0.0006 sec)

    Listing 10-7

    The record locks for Connection 2 (investigation number 2)

    ```


    Here only the two record locks on the secondary index and primary key are needed
    .


    Tip


    For a comprehensive list of the locks taken by various statements with and without
    unique indexes in InnoDB, see [`https://dev.mysql.com/doc/refman/en/innodb-locks-set.html`](https://dev.mysql.com/doc/refman/en/innodb-locks-set.html).


    Finally, roll back and drop the test tables:


    ```

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0714 sec)

    Connection 1> DROP TABLE world._tmp_city1;

    Query OK, 0 rows affected (0.7642 sec)

    -- Connection 2

    Connection 2> ROLLBACK;

    Query OK, 0 rows affected (0.1038 sec)

    Connection 2> DROP TABLE world._tmp_city2;

    Query OK, 0 rows affected (1.4438 sec)

    ```


    Unlike unique keys that can be used to reduce locking, foreign keys will add locks
    as it is discussed next .


    ## Foreign Keys


    Foreign keys are a powerful tool to ensure data consistency between tables in
    a database. However, they have a drawback as to provide this safety, additional
    locks on the parent and child tables are required.


    The additional locks required depends on whether it is the parent or child table
    of the foreign key relationship that is changed and which columns are changed.
    For metadata locks, a shared lock is in most cases taken on the tables involved
    in the foreign key relationship. An exception is when inserting into the parent
    table of a foreign key relationship; in which case, a shared metadata lock is
    not taken on the child table.


    At the InnoDB level, if a column included in a foreign key is modified, a shared
    record-level lock is set on the table at the other end of the relationship for
    the row with the new value of the foreign key column, and an intention shared
    lock is set for the table. This happens whether the foreign key is violated or
    not. If no foreign key columns are changed, InnoDB does not take any extra locks
    even if the column is used for filtering.


    To understand how this affects you, it is worth considering a couple of examples.
    They both use the `sakila.inventory` table which has two foreign keys to the `film`
    and `store` tables. At the same time, it is the parent table for a foreign key
    from the `film_rental` table. This is shown in Figure [10-1](#502546_1_En_10_Chapter.xhtml#Fig1).


    ![../images/502546_1_En_10_Chapter/502546_1_En_10_Fig1_HTML.jpg](images/502546_1_En_10_Chapter/502546_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    The `sakila.inventory` table and its foreign key relationships


    In the figure only the columns involved in the primary keys and foreign keys are
    included. First an example of updating a row in the inventory table will be discussed
    and then a DDL statement.'
