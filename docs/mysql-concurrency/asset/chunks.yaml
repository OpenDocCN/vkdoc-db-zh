    ### InnoDB Lock Monitor and Deadlock Logging


    InnoDB has for a long time had its own lock monitor with the lock information
    returned in the InnoDB monitor output. By default, the InnoDB monitor includes
    information about the latest deadlock as well as locks involved in lock waits.
    By enabling the `innodb_status_output_locks` option (disabled by default), all
    locks will be listed; this is similar to what you have in the Performance Schema
    `data_locks` table.


    To demonstrate the deadlock and transaction information, you can create a deadlock
    using the steps in Listing [2-7](#502546_1_En_2_Chapter.xhtml#PC12).


