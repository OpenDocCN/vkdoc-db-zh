- fmt: '# Summary


    This chapter has taken a deep dive into the effects of indexes and foreign keys
    on locking. Indexes can help reduce locking, while foreign keys add locking.


    The more selective an index you use, the fewer rows are accessed which translates
    into less locking. Thus, primary key access is the most optimal followed by unique
    indexes. Accessing using an index that is stored in the same order as you access
    the rows also helps.


    For foreign keys, they do require additional locks to maintain data integrity.
    `InnoDB` adds a shared lock on the rows in the other end of the foreign key when
    modifying columns included in the foreign key, and an intention shared lock is
    set for the table. Additionally, a shared metadata lock is taken in most cases
    on the tables involved in the foreign key relationship. For cascading foreign
    keys, the metadata locks also cascade.


    That concludes the discussion with the primary focus being on locks. There is
    another side to the coin though, transactions. Transactions are relevant both
    in the direct context of concurrency and with respect to locks. The next chapter
    starts out looking at transactions in general.


    # 11. Transactions


    Transactions are the big brother of statements. They group multiple changes together
    whether in a single statement or several statements, so they are applied or abandoned
    as a single unit. Mostly transactions are not much more than an afterthought and
    just considered when it is necessary to apply several statements together. That
    is a bad way to consider transactions. They are very important to ensure data
    integrity, and when used wrong, they can cause severe performance issues.


    This chapter starts out discussing what transactions and the `ACID` concept are
    and then moves on to discussing why you need to take transactions seriously from
    a performance point of view by reviewing the impacts of transactions on locks
    and performance. Finally, it is discussed how the group commit feature can improve
    the performance of high concurrency systems.


    ## Transactions and `ACID`


    At the simplest point of view, a transaction is a container that includes one
    or more statements. However, that is a too simplistic view as a transaction also
    has properties of its own. Most importantly, it is the main tool to accomplishing
    *atomicity, consistency, isolation, and durability* (`ACID`). This section takes
    a closer look at each of these four properties.


    ### Atomicity


    The concept of atomicity means that all changes in a transaction are either committed
    or rolled back. This is where the idea of a container comes into play, so that
    all statements are treated as a unit of work – or in other words, a transaction
    is atomic.


    The classic example of why atomicity is important is a financial transaction between
    two bank accounts. An amount is withdrawn from the payer’s account and inserted
    into the receiver’s account. Without atomicity, you can end up with the money
    withdrawn but never inserted leaving one of the two parties out of pocket. That
    a transaction is atomic guarantees that if the money is withdrawn, the receiver
    also receives the money on their account.


    ### Consistency


    That the database fulfills the consistency property means that there are checks
    in place to ensure that if a transaction commits successfully, then the data is
    consistent. What consistency means is largely defined by the business logic. An
    example is that you cannot create a bank account for a nonexisting entity. Inside
    the database, it is the job of the constraints, including foreign keys, to ensure
    data consistency. By using a transaction, due to its atomic behavior, even if
    a constraint fails in the second or later step, then the whole transaction can
    be reverted (rolled back) and the database is left in its original and consistent
    state.


    In some databases, the constraint checks can be deferred until the time the transaction
    is committed. If you consider the example where you are not allowed to have a
    bank account for a nonexisting entity, deferred constraints allows you to first
    create the account and then later - but within the same transaction - register
    the entity owning the account. Deferred constraints are primarily useful in connection
    with circular relations such as adding a group that must have a default group
    member, but since the member must belong to a group, it is necessary to temporarily
    relax the constraints while adding the group and its initial members.


    > **Note**

    >

    > The use of deferred constraints is a debated topic, and it can be argued that
    it violates the principles of relational database theory. For example, C.J. Date
    argues that constraints must be satisfied at statement boundaries; see [`https://www.brcommunity.com/articles.php?id=b065b`](https://www.brcommunity.com/articles.php?id=b065b).


    `InnoDB` does not support deferred constraints but does support disabling foreign
    key checks by explicitly disabling the `foreign_key_checks` variable which can
    be changed both at the global and session scope.


    > **Tip**

    >

    > Disabling the foreign key checks can be useful when performing bulk load where
    you already have ensured that the data is consistent.


    Unique key constraint checks cannot be disabled for `InnoDB` as the `unique_checks`
    option only dictates that a check is not required; `InnoDB` will still do it in
    some cases. (As an aside, the `NDBCluster` does defer some constraint checks till
    the time of commit.)


    ### Isolation


    The isolation property is what links transactions and locking. That two transactions
    are isolated means that they do not interfere with each other’s view of the data.
    The isolation is at the data content level; two concurrent transactions may still
    interfere with each other in terms of performance and locking. `MySQL`, as most
    database systems, implements isolation using locks, and `InnoDB` has the concept
    of transaction isolation levels to define what isolation means. The transaction
    isolation levels are discussed in more detail in the next chapter.


    ### Durability


    That the data is durable means that data changes are not lost. In `MySQL` this
    only applies to committed data or for `XA` transactions for transactions in the
    prepared stage. `InnoDB` implements durability at the local level through the
    redo log and the binary log (if enabled which is the default in `MySQL 8`) with
    an internal `XA` transaction being used to ensure consistency between the two
    logs.


    > **Note**

    >

    > `XA` transactions is a feature that allows distributed transactions, for example,
    spanning two systems or in case of the `MySQL` internals to make changes to `InnoDB`
    and the binary log commit or roll back together. It works by having a transaction
    manager and one or more resource managers (e.g., a database). For more information
    about `MySQL` and `XA` transactions, see [`https://dev.mysql.com/doc/refman/en/xa.html`](https://dev.mysql.com/doc/refman/en/xa.html).


    The commits are only guaranteed to be durable if both `innodb_flush_log_at_trx_commit`
    and `sync_binlog` are set to `1` (the default). To ensure durability if the local
    system crashes, you must also ensure that the binary log events have replicated
    to at least one replica. `MySQL Group Replication` or `MySQL InnoDB Cluster` is
    the best way to achieve this.


    > **Tip**

    >

    > Replication is beyond the scope of this book. For an introduction to `MySQL
    Group Replication` and `InnoDB Cluster`, see, for example, *Introducing InnoDB
    Cluster* by Charles Bell (Apress) ([`https://www.apress.com/gp/book/9781484238844`](https://www.apress.com/gp/book/9781484238844)).'
  raw: '## Summary


    This chapter has taken a deep dive into the effects of indexes and foreign keys
    on locking. Indexes can help reduce locking, while foreign keys add locking.


    The more selective an index you use, the fewer rows are accessed which translates
    into less locking. Thus, primary key access is the most optimal followed by unique
    indexes. Accessing using an index that is stored in the same order as you access
    the rows also helps.


    For foreign keys, they do require additional locks to maintain data integrity.
    InnoDB adds a shared lock on the rows in the other end of the foreign key when
    modifying columns included in the foreign key, and an intention shared lock is
    set for the table. Additionally, a shared metadata lock is taken in most cases
    on the tables involved in the foreign key relationship. For cascading foreign
    keys, the metadata locks also cascade.


    That concludes the discussion with the primary focus being on locks. There is
    another side to the coin though, transactions. Transactions are relevant both
    in the direct context of concurrency and with respect to locks. The next chapter
    starts out looking at transactions in general.


    # 11. Transactions


    Transactions are the big brother of statements. They group multiple changes together
    whether in a single statement or several statements, so they are applied or abandoned
    as a single unit. Mostly transactions are not much more than an afterthought and
    just considered when it is necessary to apply several statements together. That
    is a bad way to consider transactions. They are very important to ensure data
    integrity, and when used wrong, they can cause severe performance issues.


    This chapter starts out discussing what transactions and the ACID concept are
    and then moves on to discussing why you need to take transactions seriously from
    a performance point of view by reviewing the impacts of transactions on locks
    and performance. Finally, it is discussed how the group commit feature can improve
    the performance of high concurrency systems.


    ## Transactions and ACID


    At the simplest point of view, a transaction is a container that includes one
    or more statements. However, that is a too simplistic view as a transaction also
    has properties of its own. Most importantly, it is the main tool to accomplishing
    *atomicity, consistency, isolation, and durability* (*ACID*) . This section takes
    a closer look at each of these four properties.


    ### Atomicity


    The concept of atomicity means that all changes in a transaction are either committed
    or rolled back. This is where the idea of a container comes into play, so that
    all statements are treated as a unit of work – or in other words, a transaction
    is atomic.


    The classic example of why atomicity is important is a financial transaction between
    two bank accounts. An amount is withdrawn from the payer’s account and inserted
    into the receiver’s account. Without atomicity, you can end up with the money
    withdrawn but never inserted leaving one of the two parties out of pocket. That
    a transaction is atomic guarantees that if the money is withdrawn, the receiver
    also receives the money on their account.


    ### Consistency


    That the database fulfills the consistency property means that there are checks
    in place to ensure that if a transaction commits successfully, then the data is
    consistent. What consistency means is largely defined by the business logic. An
    example is that you cannot create a bank account for a nonexisting entity. Inside
    the database, it is the job of the constraints, including foreign keys, to ensure
    data consistency. By using a transaction, due to its atomic behavior, even if
    a constraint fails in the second or later step, then the whole transaction can
    be reverted (rolled back) and the database is left in its original and consistent
    state.


    In some databases, the constraint checks can be deferred until the time the transaction
    is committed. If you consider the example where you are not allowed to have a
    bank account for a nonexisting entity, deferred constraints allows you to first
    create the account and then later - but within the same transaction - register
    the entity owning the account. Deferred constraints are primarily useful in connection
    with circular relations such as adding a group that must have a default group
    member, but since the member must belong to a group, it is necessary to temporarily
    relax the constraints while adding the group and its initial members.


    Note


    The use of deferred constraints is a debated topic, and it can be argued that
    it violates the principles of relational database theory. For example, C.J. Date
    argues that constraints must be satisfied at statement boundaries; see [`https://www.brcommunity.com/articles.php?id=b065b`](https://www.brcommunity.com/articles.php%253Fid%253Db065b).


    InnoDB does not support deferred constraints but does support disabling foreign
    key checks by explicitly disabling the `foreign_key_checks` variable which can
    be changed both at the global and session scope.


    Tip


    Disabling the foreign key checks can be useful when performing bulk load where
    you already have ensured that the data is consistent.


    Unique key constraint checks cannot be disabled for InnoDB as the `unique_checks`
    option only dictates that a check is not required; InnoDB will still do it in
    some cases. (As an aside, the `NDBCluster` does defer some constraint checks till
    the time of commit.)


    ### Isolation


    The isolation property is what links transactions and locking. That two transactions
    are isolated means that they do not interfere with each other’s view of the data.
    The isolation is at the data content level; two concurrent transactions may still
    interfere with each other in terms of performance and locking. MySQL, as most
    database systems, implements isolation using locks, and InnoDB has the concept
    of transaction isolation levels to define what isolation means. The transaction
    isolation levels are discussed in more detail in the next chapter.


    ### Durability


    That the data is durable means that data changes are not lost. In MySQL this only
    applies to committed data or for XA transactions for transactions in the prepared
    stage. InnoDB implements durability at the local level through the redo log and
    the binary log (if enabled which is the default in MySQL 8) with an internal XA
    transaction being used to ensure consistency between the two logs.


    Note


    XA transactions is a feature that allows distributed transactions, for example,
    spanning two systems or in case of the MySQL internals to make changes to InnoDB
    and the binary log commit or roll back together. It works by having a transaction
    manager and one or more resource managers (e.g., a database). For more information
    about MySQL and XA transactions, see [`https://dev.mysql.com/doc/refman/en/xa.html`](https://dev.mysql.com/doc/refman/en/xa.html).


    The commits are only guaranteed to be durable if both `innodb_flush_log_at_trx_commit`
    and `sync_binlog` are set to 1 (the default). To ensure durability if the local
    system crashes, you must also ensure that the binary log events have replicated
    to at least one replica. MySQL Group Replication or MySQL InnoDB Cluster is the
    best way to achieve this.


    Tip


    Replication is beyond the scope of this book. For an introduction to MySQL Group
    Replication and InnoDB Cluster, see, for example, *Introducing InnoDB Cluster*
    by Charles Bell (Apress) ([`https://www.apress.com/gp/book/9781484238844`](https://www.apress.com/gp/book/9781484238844)).'
  trans: '


    # 总结


    本章深入探讨了索引和外键对锁的影响。索引有助于减少锁，而外键则会增加锁。


    您使用的索引选择性越高，访问的行数就越少，这意味着锁也越少。因此，主键访问是最优的，其次是唯一索引。使用与您访问行的顺序相同的索引存储顺序进行访问也有帮助。


    对于外键，它们确实需要额外的锁来维护数据完整性。`InnoDB`在修改包含在外键中的列时，会在外键的另一端行上添加一个共享锁，并为该表设置一个意向共享锁。此外，在大多数情况下，还会对外键关系中涉及的表获取一个共享的元数据锁。对于级联外键，元数据锁也会级联。


    以上讨论主要围绕锁展开。然而，事情还有另一面：事务。事务不仅在并发性的直接上下文中相关，在锁的方面也相关。下一章将从事务的概述开始。


    # 11. 事务


    事务是语句的“大哥”。它们将多个更改组合在一起，无论这些更改是在单个语句还是多个语句中，因此它们可以作为一个单元被应用或放弃。大多数情况下，事务不过是一个事后才想到的东西，只有在需要一起应用多个语句时才被考虑。这是一种看待事务的糟糕方式。它们对于确保数据完整性非常重要，如果使用不当，可能会导致严重的性能问题。


    本章首先讨论什么是事务以及 `ACID` 概念，然后通过回顾事务对锁和性能的影响，从性能角度讨论为什么需要认真对待事务。最后，讨论了组提交特性如何提高高并发系统的性能。


    ## 事务与 `ACID`


    从最简单的角度来看，事务是一个包含一个或多个语句的容器。然而，这是一种过于简单的观点，因为事务本身也具有属性。最重要的是，它是实现 *原子性、一致性、隔离性和持久性*
    (`ACID`) 的主要工具。本节将详细探讨这四个属性。


    ### 原子性


    原子性的概念意味着事务中的所有更改要么全部提交，要么全部回滚。这就是“容器”概念发挥作用的地方，所有语句都被视为一个工作单元——换句话说，事务是原子的。


    原子性重要性的一个经典例子是两个银行账户之间的金融交易。一笔金额从付款人账户中扣除，并插入到收款人账户中。没有原子性，你可能会遇到钱被扣除了但从未存入的情况，导致其中一方蒙受损失。事务是原子的，这保证了如果钱被扣除，收款人也一定会收到账户上的钱。


    ### 一致性


    数据库满足一致性属性意味着存在检查机制，确保如果一个事务成功提交，那么数据就是一致的。一致性在很大程度上由业务逻辑定义。一个例子是，你不能为一个不存在的实体创建银行账户。在数据库内部，约束（包括外键）的职责就是确保数据一致性。通过使用事务，由于其原子性行为，即使约束在第二步或后续步骤中失败，整个事务也可以被撤销（回滚），数据库将保持其原始的一致状态。


    在某些数据库中，约束检查可以推迟到事务提交时进行。以你不能为不存在的实体创建银行账户为例，延迟约束允许你先创建账户，然后在**同一个事务内**再注册拥有该账户的实体。延迟约束主要用于处理循环关系，例如添加一个必须拥有默认组成员的组，但由于成员必须属于一个组，因此有必要在添加组及其初始成员时暂时放松约束。


    > **注意**

    >

    > 延迟约束的使用是一个有争议的话题，可以认为它违反了关系数据库理论的原则。例如，C.J. Date 认为约束必须在语句边界得到满足；参见 [`https://www.brcommunity.com/articles.php?id=b065b`](https://www.brcommunity.com/articles.php?id=b065b)。


    `InnoDB` 不支持延迟约束，但支持通过显式禁用 `foreign_key_checks` 变量来禁用外键检查，该变量可以在全局和会话作用域中更改。


    > **提示**

    >

    > 在执行批量加载且已确保数据一致时，禁用外键检查可能很有用。


    对于 `InnoDB`，唯一键约束检查不能禁用，因为 `unique_checks` 选项仅表示不需要检查；`InnoDB` 在某些情况下仍会进行检查。（顺便提一下，`NDBCluster`
    确实会将一些约束检查推迟到提交时。）


    ### 隔离性


    隔离属性是连接事务和锁的关键。两个事务是隔离的，意味着它们不会相互干扰对方对数据的视图。隔离是在数据内容层面；两个并发事务在性能和锁方面仍然可能相互干扰。`MySQL`
    与大多数数据库系统一样，使用锁来实现隔离，而 `InnoDB` 有事务隔离级别的概念来定义隔离的含义。事务隔离级别将在下一章中更详细地讨论。


    ### 持久性


    数据是持久的意味着数据更改不会丢失。在 `MySQL` 中，这仅适用于已提交的数据，或者对于 `XA` 事务，适用于处于准备阶段的事务。`InnoDB` 通过重做日志和二进制日志（如果启用，这是
    `MySQL 8` 的默认设置）在本地实现持久性，并使用内部 `XA` 事务来确保两个日志之间的一致性。


    > **注意**

    >

    > `XA` 事务是一项支持分布式事务的功能，例如，跨越两个系统，或者在 `MySQL` 内部情况下，使对 `InnoDB` 和二进制日志的更改一起提交或回滚。它的工作原理是有一个事务管理器和一个或多个资源管理器（例如，数据库）。有关
    `MySQL` 和 `XA` 事务的更多信息，请参见 [`https://dev.mysql.com/doc/refman/en/xa.html`](https://dev.mysql.com/doc/refman/en/xa.html)。


    仅当 `innodb_flush_log_at_trx_commit` 和 `sync_binlog` 都设置为 `1`（默认值）时，提交才被保证是持久的。为了确保在本地系统崩溃时的持久性，您还必须确保二进制日志事件已复制到至少一个副本。`MySQL
    Group Replication` 或 `MySQL InnoDB Cluster` 是实现此目标的最佳方式。


    > **提示**

    >

    > 复制超出了本书的范围。有关 `MySQL Group Replication` 和 `InnoDB Cluster` 的介绍，请参见 Charles Bell
    所著的 *Introducing InnoDB Cluster* (Apress) ([`https://www.apress.com/gp/book/9781484238844`](https://www.apress.com/gp/book/9781484238844))。


    '
- fmt: '## Impact of Transactions


    Transactions may seem as an innocent concept if you think of them as containers
    used to group queries. However, it is important to understand that since transactions
    provide atomicity for groups of queries, the longer a transaction is active, the
    longer resources associated with the queries are held, and the more work done
    in a transaction, the more resources are required. What resources are used by
    queries that remain in use until the transaction has been committed? The main
    two are locks and undo logs.


    Tip


    InnoDB supports read-only transactions which have a lower overhead than read-write
    transactions. For auto-committing single-statement transactions, InnoDB will try
    to determine if the statement is read-only automatically. For multi-statement
    transactions, you can specify explicitly that it is a read-only transaction, when
    you start it: `START TRANSACTION READ ONLY;`


    ### Locks


    When the query executes, it takes locks, and when you use the default transaction
    isolation level – `REPEATABLE READ` – all locks are kept until the transaction
    is committed or rolled back. When you use the `READ COMMITTED` transaction isolation
    level, some locks may be released, but at least those involving the changed records
    are kept. Locks themselves are a resource, but it also requires memory to store
    the information about the locks. You may not think much of this for a normal workload,
    but huge transactions can end up using so much memory that the transaction fails
    with the `ER_LOCK_TABLE_FULL` error:


    ```

    ERROR: 1206: The total number of locks exceeds the lock table size

    ```


    As it can be seen from the warning message logged to the error log (more shortly),
    the memory required for the locks is taken from the buffer pool. Thus, the more
    locks you hold and the longer they are held, the less memory is available for
    caching data and indexes.


    Caution


    Having a transaction aborted because it has used all the lock memory is a quadruple
    whammy. First, it would have taken a while to update enough rows to use enough
    lock memory to trigger the error. That work has been wasted. Second, because of
    the number of changes required, it is likely going to take a very long time to
    roll back the transaction. Third, while the lock memory is used, InnoDB is effectively
    in read-only mode (some small transactions may be possible), and the lock memory
    is not released until the rollback has completed. Fourth, there is very little
    space left in the buffer pool to cache data and indexes.


    The error is preceded by a warning in the error log saying that more than 67%
    of the buffer pool is used for locks or the adaptive hash index:


    ```

    2020-06-08T10:47:11.415127Z 10 [Warning] [MY-011958] [InnoDB] Over 67 percent
    of the buffer pool is occupied by lock heaps or the adaptive hash index! Check
    that your transactions do not set too many row locks. Your buffer pool size is
    7 MB. Maybe you should make the buffer pool bigger? Starting the InnoDB Monitor
    to print diagnostics, including lock heap and hash index size.

    ```


    The warning is followed by regular repeating outputs of the InnoDB monitor, so
    you can determine which transactions are the culprits.


    One lock type that is often neglected when it comes to transactions is the metadata
    lock. When a statement queries a table, a shared metadata lock is taken, and that
    metadata lock is held until the end of the transaction. While there is a metadata
    lock on a table, no connections can execute any DDL statements – including `OPTIMIZE
    TABLE` – against the table. If a DDL statement is blocked by a long-running transaction,
    it will in turn block all new queries from using that table. Chapter [14](#502546_1_En_14_Chapter.xhtml)
    will show an example of investigating such an issue.


    The locks are held while the transaction is active. The transaction can however
    still have an impact even after it has completed through the undo logs.


    ### Undo Logs


    The changes that have been made during the transaction must also be stored as
    they are required, if you choose to roll back the transaction. This is easy to
    understand. More surprising is that even a transaction that has made no changes
    also can make undo information from other transactions stay around. This happens
    when the transaction requires a read view (a consistent snapshot), which is the
    case for the duration of the transaction when using the `REPEATABLE READ` transaction
    isolation level. The read view means that the transaction will return the row
    data that corresponds to the time when the transaction was started no matter whether
    other transactions change the data. In order to be able to deliver that, it is
    necessary to keep the old values of the rows that change during the lifetime of
    the transaction. Long-running transactions with a read view are the most common
    reason for ending up with huge undo logs, which in MySQL 5.7 and earlier could
    mean the ibdata1 file ended up being large. (In MySQL 8, the undo logs are always
    stored in separate undo tablespaces that can be truncated.)


    Tip


    The `READ COMMITTED` transaction isolation level is much less prone to large undo
    logs as the read views are only maintained for the duration of a statement.


    The size of the active part of the undo log is measured in the history list length.
    The history list length is the number of transactions committed where the undo
    log has not yet been purged. This means that you cannot use the history list length
    to get a measure of the total amount of row changes. What it does tell you is
    how many units of old rows (one unit per transaction) there is in the linked list
    of changes that must be taken into consideration when you execute a query. The
    longer this linked list is, the more expensive it becomes to find the correct
    version of each row. In the end, if you have a large history list, it can severely
    impact the performance of all queries.


    Note


    The issue with the history list length is one of the biggest issues creating backups
    of large databases using logical backup tools such as `mysqlpump` and `mysqldump`
    using a single transaction to get a consistent backup. The backup can cause the
    history list length to become very large if there are many transactions committed
    during the backup.


    What constitutes a large history list length? There are no firm rules about that
    – just that the smaller, the better. Typically, performance issues start to show
    up when the list is some thousand to a million transactions long, but the point
    where it becomes a bottleneck depends on the transactions committed in the undo
    logs and the workload while the history list length is large.


    InnoDB automatically purges the history list in the background when the oldest
    parts are no longer needed. There are two options to control the purge as well
    as two to influence what happens, when the purge cannot be done. The options are


    *   `innodb_purge_batch_size`: The number of undo log pages that are purged per
    batch. The batch is divided among the purge threads. This option is not intended
    to be changed on production systems. The default is 300 with valid values between
    1 and 5000.

    *   `innodb_purge_threads`: The number of purge threads to use in parallel. A
    higher parallelism can be useful if the data changes span many tables. On the
    other hand, if all changes are concentrated on few tables, a low value is preferred.
    Changing the number of purge threads requires a restart of MySQL. The default
    is 4 with valid values between 1 and 32.

    *   `innodb_max_purge_lag`: When the history list length is longer than the value
    of `innodb_max_purge_lag`, a delay is added to operations changing data to reduce
    the rate the history list is growing at the expense of higher statement latencies.
    The default value is 0 which means that a delay will never be added. Valid values
    are 0–4294967295.'
