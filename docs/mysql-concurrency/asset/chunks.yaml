  trans: '

    ## 显式表锁


    显式表锁通过 `LOCK TABLES` 和 `FLUSH TABLES WITH READ LOCK` 语句获取。使用 `LOCK TABLES` 语句，可以获取共享锁或排他锁；`FLUSH
    TABLES WITH READ LOCK` 总是获取共享锁。这些锁会一直保持，直到使用 `UNLOCK TABLES` 语句显式释放。当执行 `FLUSH
    TABLES WITH READ LOCK` 且未列出任何表时，将获取全局读锁（即影响所有表）。虽然这些锁也用于保护数据，但在 MySQL 中它们被视为元数据锁。


    除了与备份相关的 `FLUSH TABLES WITH READ LOCK` 外，显式表锁在 InnoDB 中并不常用，因为 InnoDB 复杂的锁定功能在大多数情况下比自行处理锁更为优越。但是，如果你确实需要锁定整个表，显式锁可能很有用，因为
    MySQL 检查它们的开销非常低。


    清单 6-7 展示了一个连接对 `world.country` 和 `world.countrylanguage` 表获取显式读锁，并对 `world.city`
    表获取写锁的示例。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              432         772          6

    -- 连接 1

    Connection 1> LOCK TABLES world.country READ,

    world.countrylanguage READ,

    world.city WRITE;

    Query OK, 0 rows affected (0.0029 sec)

    清单 6-7

    使用显式表锁

    ```


    当你获取显式锁时，只允许使用你已锁定的表，并且必须符合所请求的锁类型。这意味着，如果你获取了读锁并尝试写入表（`ER_TABLE_NOT_LOCKED_FOR_WRITE`），或者尝试使用一个你未锁定的表（`ER_TABLE_NOT_LOCKED`），就会出错。例如（清单
    6-7 的续例）：


    ```

    Connection 1> UPDATE world.country

    SET Population = Population + 1

    WHERE Code = ''AUS'';

    ERROR: 1099: Table ''country'' was locked with a READ lock and can''t be updated

    Connection 1> SELECT *

    FROM sakila.film

    WHERE film_id = 1;

    ERROR: 1100: Table ''film'' was not locked with LOCK TABLES

    ```


    由于显式锁被视为元数据锁，其在 `performance_schema.metadata_locks` 表中的症状和信息与隐式元数据锁相同，你也可以使用 `UNLOCK
    TABLES` 语句来解锁表：


    ```

    Connection 1> UNLOCK TABLES;

    Query OK, 0 rows affected (0.0006 sec)

    ```


    另一种表级锁，但由隐式处理的，简称为表锁。


    ## 隐式表锁


    MySQL 在查询表时会获取隐式表锁。对于 InnoDB 表，除了刷新锁、元数据锁和显式锁之外，表锁作用不大，因为 InnoDB 使用记录锁来允许并发访问表，只要事务不修改相同的行（粗略地说——如下一章所示——实际情况比这更复杂）。


    然而，InnoDB 确实在表级别使用意向锁的概念。由于在调查锁问题时很可能会遇到它们，因此值得熟悉一下。正如在讨论锁访问级别时提到的，意向锁用于标记事务的意图。


    对于事务获取的锁，首先会获取一个意向锁，然后根据需要可能升级。这与不会改变的显式 `LOCK TABLES` 不同。要获取共享锁，事务首先获取意向共享锁，然后获取共享锁。类似地，对于排他锁，首先获取意向排他锁。意向锁的一些示例如下：


    *   `SELECT ... FOR SHARE` 语句对查询的表获取意向共享锁。`SELECT ... LOCK IN SHARE MODE` 语法是同义词。

    *   `SELECT ... FOR UPDATE` 语句对查询的表获取意向排他锁。

    *   DML 语句（不包括 `SELECT`）对修改的表获取意向排他锁。如果修改了外键列，则会在父表上获取意向共享锁。


    表级锁可以在 `performance_schema.data_locks` 表中找到，其中 `LOCK_TYPE` 列设置为 `TABLE`。清单 6-8
    展示了一个意向共享锁的示例。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              446         796          6

    --          2              447         797          6

    -- 连接 1

