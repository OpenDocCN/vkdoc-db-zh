    \ the default value for `lock_wait_timeout` is 365 days, this is only likely to\
    \ occur if the timeout has been reduced.\n\n*   If you connect with the `mysql`\
    \ command-line client with a default schema set, the connection may seem to hang\
    \ before you get to the prompt. The same can happen if you change the default\
    \ schema with a connection open.\n\n    **Tip** The issue that the `mysql` command-line\
    \ client is blocking does not occur if you start the client with the `-A` option\
    \ which disables collecting the autocompletion information. A better solution\
    \ is to use MySQL Shell that fetches the autocompletion information in a way that\
    \ does not block due to the flush lock.\n\nIf you see these symptoms, it is time\
    \ to understand what is causing the lock issue.\n\n## The Cause\n\nWhen a connection\
    \ requests a table to be flushed, it requires all references to the table to be\
    \ closed which means no active queries can be using the table. So, when a flush\
    \ request arrives, it must wait for all queries using the tables that are to be\
    \ flushed to finish. Note that unless you explicitly specify which tables to flush,\
    \ it is just the query and not the entire transaction that must finish. Obviously,\
    \ the case where all tables are flushed, for example, due to `FLUSH TABLES WITH\
    \ READ LOCK`, is the most severe as it means all active queries must finish before\
    \ the flush statement can proceed.\n\nWhen the wait for the flush lock becomes\
    \ a problem, it means that there are one or more queries preventing the `FLUSH\
    \ TABLES` statement from obtaining the flush lock. Since the `FLUSH TABLES` statement\
    \ requires an exclusive lock, it in turn stops subsequent queries from acquiring\
    \ the shared lock they need.\n\nThis issue is often seen in connection with backups\
    \ where the backup process needs to flush all tables and get a read lock in order\
    \ to create a consistent backup.\n\nA special case can occur when the `FLUSH TABLES`\
    \ statement has timed out or has been killed, but the subsequent queries are not\
    \ proceeding. When that happens, it is because the low-level table definition\
    \ cache (TDC) version lock is not released. This is a case that can cause confusion\
    \ as it is not obvious why the subsequent queries are still waiting for the table\
    \ flush. A similar case happens when an `ANALYZE TABLE` statement triggers an\
    \ implicit flush of the table or tables that were analyzed.\n\n## The Setup\n\n\
    The lock situation that will be investigated involves three connections (not including\
    \ the connection used for the investigation). The first connection executes a\
    \ slow query, the second flushes all tables with a read lock, and the last connection\
    \ executes a quick query. The statements are shown in Listing [13-1](#502546_1_En_13_Chapter.xhtml#PC1).\n\
    \n```\n-- Connection   Processlist ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
    --          1              668        1106          6\n--          2         \
    \     669        1107          6\n--          3              670        1108 \
    \         6\n-- Connection 1\nConnection 1> SELECT city.*, SLEEP(3600) FROM world.city\
    \ WHERE ID = 130;\n-- Connection 2\nConnection 2> FLUSH TABLES WITH READ LOCK;\n\
    -- Connection 3\nConnection 3> SELECT * FROM world.city WHERE ID = 3805;\nListing\
    \ 13-1\nTriggering flush lock contention\n```\n\nThe use of `SLEEP(3600)` in the\
    \ first query means you have an hour (3600 seconds) to execute the two other queries\
    \ and perform the investigation. If you want to stop the lock situation, you can\
    \ kill the query:\n\n```\n-- Investigation #6\n-- Connection 4\nConnection 4>\
    \ KILL 668;\nQuery OK, 0 rows affected (0.0004 sec)\n```\n\nYou are now ready\
    \ to start the investigation."
  trans: "\n# 13. 案例研究：刷新锁\n\n锁问题是导致性能问题的常见原因之一，其影响可能非常严重。在最糟糕的情况下，查询可能失败，连接会堆积，导致无法建立新连接。因此，了解如何调查锁问题并修复问题至关重要。\n\
    \n本章及后续章节将讨论六类锁问题：\n\n-   刷新锁\n-   元数据和模式锁\n-   记录级锁（包括间隙锁）\n-   死锁\n-   外键\n\
    -   信号量\n\n除了外键案例研究，每种锁类型都使用不同的技术来确定锁争用的原因。阅读示例时，请记住可以使用类似的技术来调查不完全符合示例的锁问题。对于前四个案例研究（第\
    \ 13-16 章），讨论分为六个部分：\n\n-   **症状：** 这些能让你识别遇到的锁问题类型。\n-   **原因：** 遇到此类锁问题的根本原因。这与本书前面（特别是第\
    \ 6 章和第 7 章）关于锁的总体讨论有关。\n-   **设置：** 这包括如果你想自己尝试复现该锁问题所需的步骤。由于锁争用需要多个连接，提示符（例如\
    \ `Connection 1>`）用于指示哪个连接应用于哪个语句。如果你想在没有任何额外信息的情况下进行调查（就像在真实案例中那样），可以跳过此部分，在完成调查后再回头查看。\n\
    -   **调查：** 调查的详细过程。这借鉴了第 2-4 章关于监控的讨论。\n-   **解决方案：** 如何解决当前的锁问题，以最小化其造成的停机时间。\n\
    -   **预防：** 讨论如何减少遇到此问题的机会。这与第 9 章中关于减少锁问题的讨论密切相关。\n\n最后两个关于外键和信号量的案例研究遵循类似的模式。\n\
    \n闲话少说，首先讨论的锁类别是刷新锁，这是最难调查的锁问题之一。\n\n## 症状\n\n刷新锁问题的主要症状是数据库完全停止，所有使用部分或全部表的新查询最终都在等待刷新锁。需要注意的迹象包括：\n\
    \n-   新查询的查询状态为“Waiting for table flush”。这可能发生在所有新查询上，或者仅发生在访问特定表的查询上。\n-   创建的连接越来越多。\n\
    -   最终，由于 MySQL 连接数用尽，新连接失败。新连接收到的错误是 `ER_CON_COUNT_ERROR`：`ERROR 1040 (HY000):\
    \ Too many connections`。（在 8.0.19 或更早版本中使用 X 协议时，错误是 `MySQL Error 5011: Could\
    \ not open session`。）\n-   至少有一个查询的运行时间超过了最早请求刷新锁的时间。\n-   进程列表中可能存在 `FLUSH TABLES`\
    \ 语句，但情况并非总是如此。\n-   当 `FLUSH TABLES` 语句等待 `lock_wait_timeout` 超时后，会发生 `ER_LOCK_WAIT_TIMEOUT`\
    \ 错误：`ERROR: 1205: Lock wait timeout exceeded; try restarting transaction`。由于\
    \ `lock_wait_timeout` 的默认值是 365 天，这种情况只有在超时时间被缩短时才可能发生。\n-   如果使用设置了默认数据库的 `mysql`\
    \ 命令行客户端连接，在你看到提示符之前，连接可能看起来像是挂起了。如果你在连接打开时更改默认数据库，也可能发生同样的情况。\n    **提示** `mysql`\
    \ 命令行客户端阻塞的问题不会发生，如果你使用 `-A` 选项启动客户端，该选项会禁用收集自动完成信息。更好的解决方案是使用 MySQL Shell，它以不因刷新锁而阻塞的方式获取自动完成信息。\n\
    \n如果你看到这些症状，就该了解导致锁问题的原因了。\n\n## 原因\n\n当一个连接请求刷新表时，它要求关闭对该表的所有引用，这意味着没有活动查询可以使用该表。因此，当刷新请求到达时，它必须等待所有正在使用待刷新表的查询完成。请注意，除非你明确指定要刷新哪些表，否则只需要查询完成，而不是整个事务完成。显然，刷新所有表的情况（例如，由于\
    \ `FLUSH TABLES WITH READ LOCK`）是最严重的，因为它意味着在 `FLUSH TABLES` 语句能够继续执行之前，所有活动查询都必须完成。\n\
    \n当等待刷新锁成为问题时，意味着有一个或多个查询阻止了 `FLUSH TABLES` 语句获取刷新锁。由于 `FLUSH TABLES` 语句需要排他锁，它反过来又会阻止后续查询获取它们所需的共享锁。\n\
    \n此问题通常与备份相关，因为备份过程需要刷新所有表并获取读锁以创建一致的备份。\n\n一种特殊情况可能发生在 `FLUSH TABLES` 语句已超时或被杀死，但后续查询未继续执行时。当这种情况发生时，是因为低级别的表定义缓存版本锁未被释放。这种情况可能会引起混淆，因为后续查询为何仍在等待表刷新并不明显。当\
    \ `ANALYZE TABLE` 语句触发对被分析表或表的隐式刷新时，也会发生类似的情况。\n\n## 设置\n\n将要调查的锁情况涉及三个连接（不包括用于调查的连接）。第一个连接执行一个慢查询，第二个连接以读锁刷新所有表，最后一个连接执行一个快速查询。语句如代码清单\
    \ 13-1 所示。\n\n```\n-- Connection   Processlist ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
    --          1              668        1106          6\n--          2         \
    \     669        1107          6\n--          3              670        1108 \
    \         6\n-- Connection 1\nConnection 1> SELECT city.*, SLEEP(3600) FROM world.city\
    \ WHERE ID = 130;\n-- Connection 2\nConnection 2> FLUSH TABLES WITH READ LOCK;\n\
    -- Connection 3\nConnection 3> SELECT * FROM world.city WHERE ID = 3805;\n```\n\
    **清单 13-1** 触发刷新锁争用\n\n第一个查询中使用 `SLEEP(3600)` 意味着你有一个小时（3600 秒）的时间来执行另外两个查询并进行调查。如果你想停止锁情况，可以终止该查询：\n\
    \n```\n-- Investigation #6\n-- Connection 4\nConnection 4> KILL 668;\nQuery OK,\
    \ 0 rows affected (0.0004 sec)\n```\n\n现在，你已经准备好开始调查了。\n"
- fmt: '# The Investigation


    ## 从 `sys.session` 视图调查


    调查 flush locks 需要查看实例上正在运行的查询列表。与其他锁争用不同，没有 Performance Schema 表或 InnoDB 监控报告可用于直接查询阻塞的查询。


    列表 [13-2] 展示了使用 `sys.session` 视图输出的示例。使用其他获取查询列表的方法也会产生类似结果。线程和连接 ID 以及语句延迟会有所不同。


    ```

    -- Investigation #1

    -- Connection 4

    Connection 4> SELECT thd_id, conn_id, state,

    current_statement,

    statement_latency

    FROM sys.session

    WHERE command = ''Query''\G

    *************************** 1. row ***************************

    thd_id: 1106

    conn_id: 668

    state: User sleep

    current_statement: SELECT city.*, SLEEP(3600) FROM world.city WHERE ID = 130

    statement_latency: 1.48 min

    *************************** 2. row ***************************

    thd_id: 1107

    conn_id: 669

    state: Waiting for table flush

    current_statement: FLUSH TABLES WITH READ LOCK

    statement_latency: 1.44 min

    *************************** 3. row ***************************

    thd_id: 1108

    conn_id: 670

    state: Waiting for table flush

    current_statement: SELECT * FROM world.city WHERE ID = 3805

    statement_latency: 1.41 min

    *************************** 4. row ***************************

    thd_id: 1105

    conn_id: 667

    state: NULL

    current_statement: SELECT thd_id, conn_id, state, ... on     WHERE command = ''Query''

    statement_latency: 40.63 ms

    4 rows in set (0.0419 sec)

    Listing 13-2

    Investigating flush lock contention using sys.session

    ```


    输出中有四个查询。`sys.session` 和 `sys.processlist` 视图默认按执行时间降序排列查询。这使得调查诸如 flush lock
    周围的争用等问题变得容易，因为查询时间是寻找原因时首要考虑的因素。


    你首先寻找 `FLUSH TABLES` 语句（没有 `FLUSH TABLES` 语句的情况将在稍后讨论）。在这个例子中，是 `thd_id = 1107`（第二行）。注意
    `FLUSH` 语句的状态是 "Waiting for table flush"。然后你寻找运行时间更长的查询。在这个例子中，只有一个查询：即 `thd_id
    = 1106` 的那个。这就是阻止 `FLUSH TABLES WITH READ LOCK` 完成的查询。一般来说，可能有多个查询。


    剩下的两个查询分别是被 `FLUSH TABLES WITH READ LOCK` 阻塞的查询和用于获取输出的查询。前三个查询一起构成了一个典型的例子：一个长时间运行的查询阻塞了
    `FLUSH TABLES` 语句，而该语句又阻塞了其他查询。


    ## 从 MySQL Workbench 调查


    你也可以从 MySQL Workbench 获取进程列表，在某些情况下也可以从你的监控解决方案获取（MySQL Enterprise Monitor 是一个例子）。在
    MySQL Workbench 中，你可以通过选择导航器中的 Administration 选项卡来使用 *Client Connections* 报告，如图
    [13-1] 所示。


    ![../images/502546_1_En_13_Chapter/502546_1_En_13_Fig1_HTML.jpg](images/502546_1_En_13_Chapter/502546_1_En_13_Fig1_HTML.jpg)


    **图 13-1** 导航到客户端连接报告


    通过选择 *Management* 部分中的 *Client Connections* 来打开报告。


    该报告从 `performance_schema.threads` 表获取进程信息，并通过 `LEFT JOIN` 连接 `performance_schema.session_connect_attrs`
    表以获取程序名称。你可以选择是否过滤后台线程以及空闲连接，并且 MySQL Workbench 允许你在不重新执行生成报告的语句的情况下更改排序。你还可以选择刷新报告。图
    [13-2] 展示了此案例研究的一个示例。


    ![../images/502546_1_En_13_Chapter/502546_1_En_13_Fig2_HTML.jpg](images/502546_1_En_13_Chapter/502546_1_En_13_Fig2_HTML.jpg)


    **图 13-2** 在 MySQL Workbench 中显示客户端连接


    你无法选择要包含哪些列，为了使文本可读，截图中仅包含报告的一部分。*Id* 列对应于 `sys.session` 输出中的 `conn_id`，而 *Thread*（靠近中间）对应于
    `thd_id`。完整截图包含在本书的 GitHub 仓库中，文件名为 `figure_13_2_workbench_flush_lock.png`。


    像 MySQL Workbench 和 MySQL Enterprise Monitor 中的报告这样的优势是，它们使用现有连接来创建报告。在锁问题导致所有连接都被使用的情况下，能够使用监控解决方案获取查询列表可能是无价的。


    ## 无 `FLUSH TABLES` 语句的争用


    如前所述，`FLUSH TABLES` 语句可能并不总是出现在查询列表中。仍然有查询在等待刷新表的原因是低级别的 TDC 版本锁。调查的原理保持不变，但这可能会让人困惑。列表
    [13-3] 展示了一个使用相同设置但在调查前终止执行刷新语句的连接的示例（如果你在执行 `FLUSH TABLES WITH READ LOCK` 时是交互式的，可以在
    MySQL Shell 中使用 Ctrl+C）。


    ```

    -- Investigation #7

    Connection 4> KILL 669;

    Query OK, 0 rows affected (0.0004 sec)

    -- Investigation #1

    Connection 4> SELECT thd_id, conn_id, state,

    current_statement,

    statement_latency

    FROM sys.session

    WHERE command = ''Query''\G

    *************************** 1. row ***************************

    thd_id: 1106

    conn_id: 668

    state: User sleep

    current_statement: SELECT city.*, SLEEP(3600) FROM world.city WHERE ID = 130

    statement_latency: 3.88 min

    *************************** 2. row ***************************

    thd_id: 1108

    conn_id: 670

    state: Waiting for table flush

    current_statement: SELECT * FROM world.city WHERE ID = 3805

    statement_latency: 3.81 min

    *************************** 3. row ***************************

    thd_id: 1105

    conn_id: 667

    state: NULL

    current_statement: SELECT thd_id, conn_id, state, ... on     WHERE command = ''Query''

    statement_latency: 39.53 ms

    3 rows in set (0.0406 sec)

    Listing 13-3

    Flush lock contention without a FLUSH TABLES statement

    ```


    这种情况与之前相同，只是 `FLUSH TABLES` 语句消失了。在这种情况下，找到等待时间最长的、状态为 "Waiting for table flush"
    的查询。运行时间比该查询等待时间更长的查询就是阻止 TDC 版本锁被释放的查询。在这个例子中，这意味着 `thd_id = 668` 是阻塞查询。


    一旦你识别出问题和涉及的主要查询，你需要决定如何处理该问题。'
  raw: '## The Investigation


    The investigation of flush locks requires you to look at the list of queries running
    on the instance. Unlike other lock contentions, there are no Performance Schema
    tables or InnoDB monitor report that can be used to query for the blocking query
    directly.


    Listing [13-2](#502546_1_En_13_Chapter.xhtml#PC3) shows an example of the output
    using the `sys.session` view. Similar results will be produced using the alternative
    ways to get a list of queries. The thread and connection ids as well as the statement
    latencies will vary.


    ```

    -- Investigation #1

    -- Connection 4

    Connection 4> SELECT thd_id, conn_id, state,

    current_statement,

    statement_latency

    FROM sys.session

    WHERE command = ''Query''\G

    *************************** 1\. row ***************************

    thd_id: 1106

    conn_id: 668

    state: User sleep

    current_statement: SELECT city.*, SLEEP(3600) FROM world.city WHERE ID = 130

    statement_latency: 1.48 min

    *************************** 2\. row ***************************

    thd_id: 1107

    conn_id: 669

    state: Waiting for table flush

    current_statement: FLUSH TABLES WITH READ LOCK

    statement_latency: 1.44 min

    *************************** 3\. row ***************************

    thd_id: 1108

    conn_id: 670

    state: Waiting for table flush

    current_statement: SELECT * FROM world.city WHERE ID = 3805

    statement_latency: 1.41 min

    *************************** 4\. row ***************************

    thd_id: 1105

    conn_id: 667

    state: NULL

    current_statement: SELECT thd_id, conn_id, state, ... on     WHERE command = ''Query''

    statement_latency: 40.63 ms

    4 rows in set (0.0419 sec)

    Listing 13-2

    Investigating flush lock contention using sys.session

    ```


    There are four queries in the output. The `sys.session` and `sys.processlist`
    views by default sort the queries according to the execution time in descending
    order. This makes it easy to investigate issues like contention around the flush
    lock where the query time is the primary thing to consider when looking for the
    cause.


    You start out looking for the `FLUSH TABLES` statement (the case where there is
    no `FLUSH TABLES` statement will be discussed shortly). In this case, that is
    `thd_id = 1107` (the second row). Notice that the state of the `FLUSH` statement
    is “Waiting for table flush.” You then look for queries that have been running
    for a longer time. In this case, there is only one query: the one with `thd_id
    = 1106`. This is the query that blocks the `FLUSH TABLES WITH READ LOCK` from
    completing. In general, there may be more than one query.


    The two remaining queries are a query being blocked by the `FLUSH TABLES WITH
    READ LOCK` and the query to obtain the output. Together, the three first queries
    form a typical example of a long-running query blocking a `FLUSH TABLES` statement
    which in turn blocks other queries.


    You can also get the process list from MySQL Workbench and in some cases also
    from your monitoring solution (MySQL Enterprise Monitor is an example). In MySQL
    Workbench, you can use the *Client Connections* report by choosing the Administration
    tab in the navigator as shown in Figure [13-1](#502546_1_En_13_Chapter.xhtml#Fig1).


    ![../images/502546_1_En_13_Chapter/502546_1_En_13_Fig1_HTML.jpg](images/502546_1_En_13_Chapter/502546_1_En_13_Fig1_HTML.jpg)


    Figure 13-1


    Navigating to the Client Connection report


    You open the report by selecting *Client Connections* in the *Management* section.


    The report fetches the process information from the `performance_schema.threads`
    table with a `LEFT JOIN` on the `performance_schema.session_connect_attrs` table
    to get the program name. You can choose whether to filter out background threads
    as well as sleeping connections, and MySQL Workbench allows you to change the
    ordering without re-executing the statement that generates the report. Optionally,
    you can also refresh the report. An example for this case study is shown in Figure
    [13-2](#502546_1_En_13_Chapter.xhtml#Fig2).


    ![../images/502546_1_En_13_Chapter/502546_1_En_13_Fig2_HTML.jpg](images/502546_1_En_13_Chapter/502546_1_En_13_Fig2_HTML.jpg)


    Figure 13-2


    Showing the client connections in MySQL Workbench


    You cannot choose which columns to include, and to make the text readable, only
    part of the report is included in the screenshot. The *Id* column corresponds
    to `conn_id` in the `sys.session` output, and *Thread* (near the middle) corresponds
    to `thd_id`. The full screenshot is included in this book’s GitHub repository
    as `figure_13_2_workbench_flush_lock.png`.


    An advantage of reports like the ones in MySQL Workbench and MySQL Enterprise
    Monitor is that they use existing connections to create the report. In cases where
    the lock issue causes all connections to be used, then it can be invaluable to
    be able to get the list of queries using a monitoring solution.


    As mentioned, the `FLUSH TABLES` statement may not always be present in the list
    of queries. The reason there still are queries waiting for flush tables is the
    low-level TDC version lock. The principles of the investigation remain the same,
    but it can seem confusing. Listing [13-3](#502546_1_En_13_Chapter.xhtml#PC4) shows
    such an example using the same setup but killing the connection executing the
    flush statement before the investigation (Ctrl+C can be used in MySQL Shell in
    the connection executing `FLUSH TABLES WITH READ LOCK` if you are executing it
    interactively).


    ```

    -- Investigation #7

    Connection 4> KILL 669;

    Query OK, 0 rows affected (0.0004 sec)

    -- Investigation #1

    Connection 4> SELECT thd_id, conn_id, state,

    current_statement,

    statement_latency

    FROM sys.session

    WHERE command = ''Query''\G

    *************************** 1\. row ***************************

    thd_id: 1106

    conn_id: 668

    state: User sleep

    current_statement: SELECT city.*, SLEEP(3600) FROM world.city WHERE ID = 130

    statement_latency: 3.88 min

    *************************** 2\. row ***************************

    thd_id: 1108

    conn_id: 670

    state: Waiting for table flush

    current_statement: SELECT * FROM world.city WHERE ID = 3805

    statement_latency: 3.81 min

    *************************** 3\. row ***************************

    thd_id: 1105

    conn_id: 667

    state: NULL

    current_statement: SELECT thd_id, conn_id, state, ... on     WHERE command = ''Query''

    statement_latency: 39.53 ms

    3 rows in set (0.0406 sec)

    Listing 13-3

    Flush lock contention without a FLUSH TABLES statement

    ```


    This situation is identical to the previous except the `FLUSH TABLES` statement
    is gone. In this case, find the query that has been waiting the longest with the
    state “Waiting for table flush.” Queries that have been running longer than this
    query has been waiting are the ones preventing the TDC version lock from being
    released. In this case, that means `thd_id = 668` is the blocking query.


    Once you have identified the issue and the principal queries involved, you need
    to decide what to do about the issue.'
  trans: '

    # 问题调查


    ## 从 `sys.session` 视图进行调查


    调查 flush locks 需要查看实例上正在运行的查询列表。与其他锁争用不同，没有 Performance Schema 表或 InnoDB 监控报告可用于直接查询阻塞的查询。


    列表 [13-2] 展示了使用 `sys.session` 视图输出的示例。使用其他获取查询列表的方法也会产生类似结果。线程和连接 ID 以及语句延迟会有所不同。


    ```

    -- 调查 #1

    -- 连接 4

    Connection 4> SELECT thd_id, conn_id, state,

    current_statement,

    statement_latency

    FROM sys.session

    WHERE command = ''Query''\G

    *************************** 1. row ***************************

    thd_id: 1106

    conn_id: 668

    state: User sleep

    current_statement: SELECT city.*, SLEEP(3600) FROM world.city WHERE ID = 130

    statement_latency: 1.48 min

    *************************** 2. row ***************************

    thd_id: 1107

    conn_id: 669

    state: Waiting for table flush

    current_statement: FLUSH TABLES WITH READ LOCK

    statement_latency: 1.44 min

    *************************** 3. row ***************************

    thd_id: 1108

    conn_id: 670

    state: Waiting for table flush

    current_statement: SELECT * FROM world.city WHERE ID = 3805

    statement_latency: 1.41 min

    *************************** 4. row ***************************

    thd_id: 1105

    conn_id: 667

    state: NULL

    current_statement: SELECT thd_id, conn_id, state, ... on     WHERE command = ''Query''

    statement_latency: 40.63 ms

    4 rows in set (0.0419 sec)

    Listing 13-2

    使用 sys.session 调查 flush lock 争用

    ```


    输出中有四个查询。`sys.session` 和 `sys.processlist` 视图默认按执行时间降序排列查询。这使得调查诸如 flush lock
    周围的争用等问题变得容易，因为查询时间是寻找原因时首要考虑的因素。


    你首先寻找 `FLUSH TABLES` 语句（没有 `FLUSH TABLES` 语句的情况将在稍后讨论）。在这个例子中，是 `thd_id = 1107`（第二行）。注意
    `FLUSH` 语句的状态是 "Waiting for table flush"。然后你寻找运行时间更长的查询。在这个例子中，只有一个查询：即 `thd_id
    = 1106` 的那个。这就是阻止 `FLUSH TABLES WITH READ LOCK` 完成的查询。一般来说，可能有多个查询。


    剩下的两个查询分别是被 `FLUSH TABLES WITH READ LOCK` 阻塞的查询和用于获取输出的查询。前三个查询一起构成了一个典型的例子：一个长时间运行的查询阻塞了
    `FLUSH TABLES` 语句，而该语句又阻塞了其他查询。


    ## 从 MySQL Workbench 进行调查


    你也可以从 MySQL Workbench 获取进程列表，在某些情况下也可以从你的监控解决方案获取（MySQL Enterprise Monitor 是一个例子）。在
    MySQL Workbench 中，你可以通过选择导航器中的 Administration 选项卡来使用 *Client Connections* 报告，如图
    [13-1] 所示。


    ![../images/502546_1_En_13_Chapter/502546_1_En_13_Fig1_HTML.jpg](img/502546_1_En_13_Fig1_HTML.jpg)


    **图 13-1** 导航到客户端连接报告


    通过选择 *Management* 部分中的 *Client Connections* 来打开报告。


    该报告从 `performance_schema.threads` 表获取进程信息，并通过 `LEFT JOIN` 连接 `performance_schema.session_connect_attrs`
    表以获取程序名称。你可以选择是否过滤后台线程以及空闲连接，并且 MySQL Workbench 允许你在不重新执行生成报告的语句的情况下更改排序。你还可以选择刷新报告。图
    [13-2] 展示了此案例研究的一个示例。


    ![../images/502546_1_En_13_Chapter/502546_1_En_13_Fig2_HTML.jpg](img/502546_1_En_13_Fig2_HTML.jpg)


    **图 13-2** 在 MySQL Workbench 中显示客户端连接


    你无法选择要包含哪些列，为了使文本可读，截图中仅包含报告的一部分。*Id* 列对应于 `sys.session` 输出中的 `conn_id`，而 *Thread*（靠近中间）对应于
    `thd_id`。完整截图包含在本书的 GitHub 仓库中，文件名为 `figure_13_2_workbench_flush_lock.png`。


    像 MySQL Workbench 和 MySQL Enterprise Monitor 中的报告这样的优势是，它们使用现有连接来创建报告。在锁问题导致所有连接都被使用的情况下，能够使用监控解决方案获取查询列表可能是无价的。


    ## 无 `FLUSH TABLES` 语句的争用


    如前所述，`FLUSH TABLES` 语句可能并不总是出现在查询列表中。仍然有查询在等待刷新表的原因是低级别的 TDC 版本锁。调查的原理保持不变，但这可能会让人困惑。列表
    [13-3] 展示了一个使用相同设置但在调查前终止执行刷新语句的连接的示例（如果你在执行 `FLUSH TABLES WITH READ LOCK` 时是交互式的，可以在
    MySQL Shell 中使用 Ctrl+C）。


    ```

    -- 调查 #7

    Connection 4> KILL 669;

    Query OK, 0 rows affected (0.0004 sec)

    -- 调查 #1

    Connection 4> SELECT thd_id, conn_id, state,

    current_statement,

    statement_latency

    FROM sys.session

    WHERE command = ''Query''\G

    *************************** 1. row ***************************

    thd_id: 1106

    conn_id: 668

    state: User sleep

    current_statement: SELECT city.*, SLEEP(3600) FROM world.city WHERE ID = 130

    statement_latency: 3.88 min

    *************************** 2. row ***************************

    thd_id: 1108

    conn_id: 670

    state: Waiting for table flush

    current_statement: SELECT * FROM world.city WHERE ID = 3805

    statement_latency: 3.81 min

    *************************** 3. row ***************************

    thd_id: 1105

    conn_id: 667

    state: NULL

    current_statement: SELECT thd_id, conn_id, state, ... on     WHERE command = ''Query''

    statement_latency: 39.53 ms

    3 rows in set (0.0406 sec)

    Listing 13-3

    无 FLUSH TABLES 语句的 flush lock 争用

    ```


    这种情况与之前相同，只是 `FLUSH TABLES` 语句消失了。在这种情况下，找到等待时间最长的、状态为 "Waiting for table flush"
    的查询。运行时间比该查询等待时间更长的查询就是阻止 TDC 版本锁被释放的查询。在这个例子中，这意味着 `thd_id = 668` 是阻塞查询。


    一旦你识别出问题和涉及的主要查询，你需要决定如何处理该问题。

    '
- fmt: '## The Solution


    There are two levels of solving the issue. First of all, you need to resolve the
    immediate problem of queries not executing. Second, you need to work at avoiding
    the issue in the future. This subsection will discuss the immediate solution,
    and the next will consider how to reduce the chance of the issue occurring.


    To resolve the immediate issue, you have the option of waiting for the queries
    to complete or starting to kill queries. If you can redirect the application to
    use another instance while the flush lock contention is ongoing, you may be able
    to let the situation resolve itself by letting the long-running queries complete.
    If there are data changing queries among those running or waiting, you do in that
    case need to consider whether it will leave the system in a consistent state after
    all queries have completed. One option may be to continue in read-only mode with
    the read queries executing on a different instance.


    Tip


    If the long-running query is a rogue query with missing join clauses, it can take
    a very long time to complete. The author of this book has experienced a query
    that ran for months. When deciding whether to wait, you want to try to estimate
    how long the query will take. A good option is to use the `EXPLAIN FOR CONNECTION
    <processlist id>` command to examine the query plan of the long-running query.


    If you decide to kill queries, you can try to kill the `FLUSH TABLES` statement.
    If that works, it is the simplest solution. However, as discussed, that will not
    always help, and in that case, the only solution is to kill the queries that were
    preventing the `FLUSH TABLES` statement from completing. If the long-running queries
    look like runaway queries and the application/client that executed them anyway
    is not waiting for them any longer, you may want to kill them without trying to
    kill the `FLUSH TABLES` statement first.


    One important consideration when looking to kill a query is how much data has
    been changed. For a pure `SELECT` query (not involving stored routines), that
    is always nothing, and from the perspective of work done, it is safe to kill it.
    For `INSERT`, `UPDATE`, `DELETE`, and similar queries, however, the changed data
    must be rolled back if the query is killed. It will usually take longer to roll
    back changes than making them in the first place, so be prepared to wait a long
    time for the rollback if there are many changes. You can use the `information_schema.INNODB_TRX`
    view to estimate the amount of work done by looking at the `trx_rows_modified`
    column. If there is a lot of work to roll back, it is usually better to let the
    query complete.


    Caution


    When a DML statement is killed, the work it has done must be rolled back. The
    rollback will usually take longer than creating the change, sometimes much longer.
    You need to factor that in, if you consider killing a long-running DML statement.


    Of course, optimally you prevent the issue from happening at all.


    ## The Prevention


    The flush lock contention happens because of the combination of a long-running
    query and a `FLUSH TABLES` statement. So, to prevent the issue, you need to look
    at what you can do to avoid these two conditions to be present at the same time.


    Finding, analyzing, and handling long-running queries are beyond the scope of
    this book. However, one option of particular interest is to set a timeout for
    the query which is supported for `SELECT` statements using the `max_execution_time`
    system variable and the `MAX_EXECUTION_TIME(N)` optimizer hint and is a great
    way to protect against runaway queries. Some connectors also have support for
    timing out queries.


    Tip


    To avoid long-running `SELECT` queries, you can configure the `max_execution_time`
    option or set the `MAX_EXECUTION_TIME(N)` optimizer hint. This will make the `SELECT`
    statement time out after the specified period and help prevent issues like flush
    lock waits.


    Some long-running queries cannot be prevented. It may be a reporting job, building
    a cache table, or another task that must access a lot of data. In that case, the
    best you can do is to try to avoid them running, while it is also necessary to
    flush the tables. One option is to schedule the long-running queries to run at
    different times than when it is necessary to flush tables. Another option is to
    have the long-running queries run on a different instance than the jobs that require
    flushing tables.


    A common task that requires flushing the tables is taking a backup. In MySQL 8,
    you can avoid that issue by using the backup and log locks. For example, MySQL
    Enterprise Backup (MEB) does this in version 8.0.16 and later, so InnoDB tables
    are never flushed. Alternatively, you can perform the backup at a period with
    low usage, so the potential for conflicts is lower, or you can even do the backup
    while the system is in read-only mode and avoid the `FLUSH TABLES WITH READ LOCK`
    altogether.


    ## Summary


    This chapter has studied a situation where a long-running query prevented a `FLUSH
    TABLES WITH READ LOCK` statement from acquiring the flush lock which subsequently
    prevented queries started later to execute. A situation like this is among the
    hardest to investigate as there is no help to get from the lock tables in the
    Performance Schema. Instead you need to look at the process list and look for
    queries that are older than the `FLUSH TABLES` statement or, if that is not present,
    the connection that has waited for a flush lock the longest.


    In most cases, you have the option of waiting for the long-running query to complete
    or to kill it in order to resolve the issue. Whether killing the query is acceptable
    depends on the purpose of the query and how many changes have been made by the
    transaction. To prevent the issue, you can try to separate tasks so long-running
    queries and `FLUSH TABLE` statements are not executing at the same time or they
    are executing on different MySQL instances. For `SELECT` statements, you can also
    use the `max_execution_time` option or the `MAX_EXECUTION_TIME(N)` optimizer switch
    to automatically kill long-running queries.


    Another lock type that often causes confusion is the metadata lock. A case study
    involving metadata locks will be discussed in the next chapter.


    # 14. Case Study: Metadata and Schema Locks


    In MySQL 5.7 and earlier, metadata locks were often a source of confusion. The
    problem is that it is not obvious who holds the metadata lock. In MySQL 5.7, instrumentation
    of the metadata locks was added to the Performance Schema, and in MySQL 8.0, it
    is enabled by default. With the instrumentation enabled, it becomes easy to determine
    who is blocking the connection trying to obtain the lock. This chapter goes through
    an example of a situation with metadata locks and examines it. First the symptoms
    are discussed.'
