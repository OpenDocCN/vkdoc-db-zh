  trans: '

    ## 症状


    元数据锁争用的症状与刷新锁争用的症状相似。在典型情况下，会出现一个长时间运行的查询或事务、一个等待元数据锁的 DDL 语句，并且可能有查询堆积。需要注意的症状如下：


    *   一个 DDL 语句（可能还有其他查询）卡在“等待表元数据锁”状态。

    *   查询可能会堆积。所有等待的查询都使用了同一个表。（如果有多个表的 DDL 语句在等待元数据锁，则可能有多组查询在等待。）

    *   当 DDL 语句等待了 `lock_wait_timeout` 时间后，会发生 `ER_LOCK_WAIT_TIMEOUT` 错误：`ERROR:
    1205: Lock wait timeout exceeded; try restarting transaction`。由于 `lock_wait_timeout`
    的默认值是 365 天，因此只有在超时时间被缩短时才可能发生此错误。

    *   存在一个长时间运行的查询或长时间运行的事务。在后一种情况下，事务可能处于空闲状态，或者正在执行一个不使用 DDL 语句所操作表的查询。


    使情况可能变得复杂的是最后一点：可能没有任何明显的长时间运行查询是导致锁问题的候选者。那么，元数据锁争用的原因是什么？


    ## 原因


    请记住，元数据锁的存在是为了保护模式定义（同时也与显式锁一起使用）。只要事务处于活动状态，模式保护就会存在，因此当事务查询一个表时，元数据锁将一直持续到事务结束。因此，您可能看不到任何长时间运行的查询。实际上，持有元数据锁的事务可能根本没有执行任何操作。


    简而言之，元数据锁的存在是因为一个或多个连接可能依赖于给定表的模式不发生变化，或者它们已经使用 `LOCK TABLES` 或 `FLUSH TABLES
    WITH READ LOCK` 语句显式锁定了该表。


    ## 设置


    本次元数据锁的调查示例使用了与前一章示例中类似的三个连接。第一个连接处于一个事务的中间，第二个连接尝试为该事务正在使用的表添加索引，第三个连接尝试对同一个表执行查询。查询如代码清单
    14-1 所示。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              713        1181          6

    --          2              714        1182          6

    --          3              715        1183          6

    -- 连接 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT * FROM world.city WHERE ID = 3805\G

    *************************** 1. row ***************************

    ID: 3805

    Name: San Francisco

    CountryCode: USA

    District: California

    Population: 776733

    1 row in set (0.0007 sec)

    Connection 1> SELECT Code, Name FROM world.country WHERE Code = ''USA''\G

    *************************** 1. row ***************************

    Code: USA

    Name: United States

    1 row in set (0.0005 sec)

    -- 连接 2

    Connection 2> ALTER TABLE world.city ADD INDEX (Name);

    -- 连接 3

    Connection 3> SELECT * FROM world.city WHERE ID = 130;

    代码清单 14-1

    触发元数据锁争用

    ```


    此时，您可以开始进行调查。这种情况不会自行解决（除非您的 `lock_wait_timeout` 值很低，或者您愿意等待一年），所以您有充足的时间。当您想解除阻塞时，可以开始终止连接
    2 中的 `ALTER TABLE` 语句，以避免修改 world.city 表。然后提交或回滚连接 1 中的事务。


    ## 调查


    如果您启用了 `wait/lock/metadata/sql/mdl` Performance Schema 仪器（MySQL 8 的默认设置），调查元数据锁问题就非常简单。您可以使用
    Performance Schema 中的 `metadata_locks` 表来列出已授予和等待中的锁。但是，获取锁情况摘要的一个更简单方法是使用 sys
    模式中的 `schema_table_lock_waits` 视图。


    例如，考虑代码清单 14-2 中可以看到的元数据锁等待问题，其中涉及三个连接。`WHERE` 子句被选择为仅包含本次调查感兴趣的行。


    ```

    -- 调查 #1

    -- 连接 4

    Connection 4> SELECT thd_id, conn_id, state,

    current_statement,

    statement_latency

    FROM sys.session

    WHERE command = ''Query'' OR trx_state = ''ACTIVE''\G

    *************************** 1. row ***************************

    thd_id: 1181

    conn_id: 713

    state: NULL

    current_statement: SELECT Code, Name FROM world.country WHERE Code = ''USA''

    statement_latency: NULL

    *************************** 2. row ***************************

    thd_id: 1182

    conn_id: 714

    state: Waiting for table metadata lock

    current_statement: ALTER TABLE world.city ADD INDEX (Name)

    statement_latency: 26.68 s

    *************************** 3. row ***************************

    thd_id: 1183

    conn_id: 715

    state: Waiting for table metadata lock

    current_statement: SELECT * FROM world.city WHERE ID = 130

    statement_latency: 24.68 s

    *************************** 4. row ***************************

    thd_id: 1180

    conn_id: 712

    state: NULL

    current_statement: SET @sys.statement_truncate_le ... (''statement_truncate_len'',
    64)

    statement_latency: 50.42 ms

    4 rows in set (0.0530 sec)

    代码清单 14-2

    一个元数据锁等待问题

    ```


    有两个连接正在等待元数据锁（在 `world.city` 表上）。列表中包含了第三个连接（`conn_id = 713`），该连接处于空闲状态，可以从 `statement_latency`
    为 `NULL` 看出（在 8.0.18 之前和 8.0.21 之后的一些版本中，您可能还会看到当前语句也是 `NULL`）。在这个案例中，查询列表被限制为那些有活动查询或活动事务的连接，但通常您会从完整的进程列表开始。然而，为了便于关注重要部分，输出经过了筛选。


    一旦您知道存在元数据锁问题，就可以使用 `sys.schema_table_lock_waits` 视图来获取有关锁争用的信息。代码清单 14-3 显示了对应于刚才讨论的进程列表的输出示例。

    '
- fmt: "-- Investigation #3\n```sql\nSELECT *\nFROM sys.schema_table_lock_waits\\\
    G\n```\n```\n*************************** 1. row ***************************\n\
    \            object_schema: world\n              object_name: city\n        waiting_thread_id:\
    \ 1182\n             waiting_pid: 714\n         waiting_account: root@localhost\n\
    \      waiting_lock_type: EXCLUSIVE\n waiting_lock_duration: TRANSACTION\n   \
    \     waiting_query: ALTER TABLE world.city ADD INDEX (Name)\n    waiting_query_secs:\
    \ 128\nwaiting_query_rows_affected: 0\nwaiting_query_rows_examined: 0\n      \
    \  blocking_thread_id: 1181\n             blocking_pid: 713\n         blocking_account:\
    \ root@localhost\n      blocking_lock_type: SHARED_READ\n blocking_lock_duration:\
    \ TRANSACTION\nsql_kill_blocking_query: KILL QUERY 713\nsql_kill_blocking_connection:\
    \ KILL 713\n*************************** 2. row ***************************\n \
    \           object_schema: world\n              object_name: city\n        waiting_thread_id:\
    \ 1183\n             waiting_pid: 715\n         waiting_account: root@localhost\n\
    \      waiting_lock_type: SHARED_READ\n waiting_lock_duration: TRANSACTION\n \
    \       waiting_query: SELECT * FROM world.city WHERE ID = 130\n    waiting_query_secs:\
    \ 126\nwaiting_query_rows_affected: 0\nwaiting_query_rows_examined: 0\n      \
    \  blocking_thread_id: 1181\n             blocking_pid: 713\n         blocking_account:\
    \ root@localhost\n      blocking_lock_type: SHARED_READ\n blocking_lock_duration:\
    \ TRANSACTION\nsql_kill_blocking_query: KILL QUERY 713\nsql_kill_blocking_connection:\
    \ KILL 713\n*************************** 3. row ***************************\n \
    \           object_schema: world\n              object_name: city\n        waiting_thread_id:\
    \ 1182\n             waiting_pid: 714\n         waiting_account: root@localhost\n\
    \      waiting_lock_type: EXCLUSIVE\n waiting_lock_duration: TRANSACTION\n   \
    \     waiting_query: ALTER TABLE world.city ADD INDEX (Name)\n    waiting_query_secs:\
    \ 128\nwaiting_query_rows_affected: 0\nwaiting_query_rows_examined: 0\n      \
    \  blocking_thread_id: 1182\n             blocking_pid: 714\n         blocking_account:\
    \ root@localhost\n      blocking_lock_type: SHARED_UPGRADABLE\n blocking_lock_duration:\
    \ TRANSACTION\nsql_kill_blocking_query: KILL QUERY 714\nsql_kill_blocking_connection:\
    \ KILL 714\n*************************** 4. row ***************************\n \
    \           object_schema: world\n              object_name: city\n        waiting_thread_id:\
    \ 1183\n             waiting_pid: 715\n         waiting_account: root@localhost\n\
    \      waiting_lock_type: SHARED_READ\n waiting_lock_duration: TRANSACTION\n \
    \       waiting_query: SELECT * FROM world.city WHERE ID = 130\n    waiting_query_secs:\
    \ 126\nwaiting_query_rows_affected: 0\nwaiting_query_rows_examined: 0\n      \
    \  blocking_thread_id: 1182\n             blocking_pid: 714\n         blocking_account:\
    \ root@localhost\n      blocking_lock_type: SHARED_UPGRADABLE\n blocking_lock_duration:\
    \ TRANSACTION\nsql_kill_blocking_query: KILL QUERY 714\nsql_kill_blocking_connection:\
    \ KILL 714\n4 rows in set (0.0041 sec)\n```\nListing 14-3\nFinding metadata lock\
    \ contention\n\nThe output shows that there are four cases of queries waiting\
    \ and blocking. This may be surprising, but it happens because there are several\
    \ locks involved and there is a chain of waits. Each row is a pair of a waiting\
    \ and blocking connection. The output uses \"pid\" for the process list id which\
    \ is the same as the connection id used in earlier outputs. The information includes\
    \ what the lock is on, details about the waiting connection, details about the\
    \ blocking connection, and two queries that can be used to kill the blocking query\
    \ or connection.\n\nThe third row shows process list id 714 waiting on itself.\
    \ That sounds like a deadlock, but it is not. The reason is that the `ALTER TABLE`\
    \ first took a shared lock that can be upgraded and then tried to get the exclusive\
    \ lock which is waiting. Because there is no explicit information on which existing\
    \ lock is actually blocking the new lock, this information ends up being included.\n\
    \nThe fourth row shows that the `SELECT` statement is waiting for process list\
    \ id 714 which is the `ALTER TABLE`. This is the reason that connections can start\
    \ to pile up as the DDL statement requires an exclusive lock, so it will block\
    \ requests for shared locks.\n\nThe first and second rows are where the underlying\
    \ issue for the lock contention is revealed. Process list id 713 is blocking for\
