    mysql> SET GLOBAL innodb_monitor_disable = ''module_icp'';

    Query OK, 0 rows affected (0.0004 sec)

    ```

    列表 2-6 使用 INNODB_METRICS 视图


    首先，使用 `innodb_monitor_enable` 变量启用指标；然后检索其值。除了显示的值之外，还有一组带有 `_RESET` 后缀的列，当您设置
    `innodb_monitor_reset`（仅重置计数器）或 `innodb_monitor_reset_all` 系统变量时，这些列会被重置。最后，指标再次被禁用。


    **注意**

    不同指标的开销不同，因此建议您在生产环境启用指标前，先使用您的工作负载进行测试。


    ### InnoDB 锁监控器和死锁日志记录


    长期以来，InnoDB 都有其自己的锁监控器，锁信息会在 InnoDB 监控器输出中返回。默认情况下，InnoDB 监控器包含有关最新死锁以及涉及锁等待的锁的信息。通过启用
    `innodb_status_output_locks` 选项（默认禁用），将列出所有锁；这类似于您在 Performance Schema 的 `data_locks`
    表中看到的内容。


    为了演示死锁和事务信息，您可以按照列表 2-7 中的步骤创建一个死锁。


    ```sql

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1               19          66          6

    --          2               20          67          6

    -- 连接 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    Query OK, 1 row affected (0.0008 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- 连接 2

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 3805;

    Query OK, 1 row affected (0.0008 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    -- 连接 1

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 3805;

    2020-06-27 12:54:26.833760  1 [ERROR] mysqlsh.DBError ...

    ERROR: 1213: Deadlock found when trying to get lock; try restarting transaction

    -- 连接 2

    Query OK, 1 row affected (0.1013 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    ```

