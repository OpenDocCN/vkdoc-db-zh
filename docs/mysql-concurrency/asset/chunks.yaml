    This shows that the transaction in the first row has been active for more than
    7 minutes and it is 449 seconds (7.5 minutes) since the last query was executed
    (your values will differ). The `last_statement` can be used to determine the last
    query executed by the connection. This is an example of an abandoned transaction
    which prevents InnoDB from purging its undo logs. The most common causes of abandoned
    transactions are a database administrator starting a transaction interactively
    and getting distracted or that `autocommit` is disabled and it is not realized
    a transaction was started.


    Caution


    If you disable `autocommit`, be careful always to commit or roll back at the end
    of the work. Some connectors disable `autocommit` by default, so be aware that
    your application may not be using the server default.


    You can roll the transactions back to avoid changing any data (if you use the
    MySQL Shell script to reproduce the example, this is done automatically when hitting
    enter without an answer for the next investigation). For the first (normal) transaction


    ```

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0303 sec)

    ```


    And for the XA transaction:


    ```

    -- Connection 2

    Connection 2> XA END ''abc'', ''def'', 1;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> XA ROLLBACK ''abc'', ''def'', 1;

    Query OK, 0 rows affected (0.0308 sec)

    ```


    Another way the Performance Schema tables are useful for analyzing transactions
    is to use the summary tables to obtain aggregate data.'
  trans: '

    # 使用 Performance Schema 监控和分析事务


    给定一个事务事件 ID 和线程 ID，您可以使用语句事件历史和当前表查询该事务最后执行的十条语句。清单 4-3 展示了一个 `thread_id = 140`
    且事务 `EVENT_ID = 8` 的示例（来自清单 4-2 的第 1 行），其中包含了启动事务的语句以及后续的所有语句。


    ```sql

    -- 调查 #4

    Connection 3> SET @thread_id = 140,

    @event_id = 8,

    @nesting_event_id = 7;

    Query OK, 0 rows affected (0.0007 sec)

    -- 调查 #6

    Connection 3> SELECT event_id, sql_text,

    FORMAT_PICO_TIME(timer_wait) AS latency,

    IF(end_event_id IS NULL, ''YES'', ''NO'') AS current

    FROM ((SELECT event_id, end_event_id,

    timer_wait,

    sql_text, nesting_event_id,

    nesting_event_type

    FROM performance_schema.events_statements_current

    WHERE thread_id = @thread_id

    ) UNION (

    SELECT event_id, end_event_id,

    timer_wait,

    sql_text, nesting_event_id,

    nesting_event_type

    FROM performance_schema.events_statements_history

    WHERE thread_id = @thread_id

    )

    ) events

    WHERE (nesting_event_type = ''TRANSACTION''

    AND nesting_event_id = @event_id)

    OR event_id = @nesting_event_id

    ORDER BY event_id DESC\G

    *************************** 1. row ***************************

    event_id: 12

    sql_text: UPDATE world.city SET Population = 2000000 WHERE ID = 133

    latency: 384.00 us

    current: NO

    *************************** 2. row ***************************

    event_id: 11

    sql_text: UPDATE world.city SET Population = 2400000 WHERE ID = 132

    latency: 316.20 us

    current: NO

    *************************** 3. row ***************************

    event_id: 10

    sql_text: UPDATE world.city SET Population = 4900000 WHERE ID = 131

    latency: 299.30 us

    current: NO

    *************************** 4. row ***************************

    event_id: 9

    sql_text: UPDATE world.city SET Population = 5200000 WHERE ID = 130

    latency: 176.95 ms

    current: NO

    *************************** 5. row ***************************

    event_id: 7

    sql_text: start transaction

    latency: 223.20 us

    current: NO

    5 rows in set (0.0016 sec)

    清单 4-3

    查找事务中最后执行的十条语句

    ```


    子查询（派生表）从 `events_statements_current` 和 `events_statements_history` 表中查找该线程的所有语句事件。因为可能有一条针对该事务的正在进行的语句，所以必须包含当前事件。语句被过滤为要么是事务的子语句，要么是事务的嵌套事件（`event_id
    = 7`）。这将包括从启动事务的语句开始的所有语句。如果有一条正在进行的语句，则最多会包含 11 条语句，否则最多包含十条。


    `end_event_id` 用于确定语句是否正在执行中，并且语句按照 `event_id` 倒序排列，因此最近的语句在第 1 行，最旧的（`START TRANSACTION`
    语句）在第 5 行。


    此类查询不仅可用于调查仍在执行查询的事务。当您遇到一个空闲事务并想了解该事务在被遗弃之前做了什么时，它也非常有用。另一个查找活动事务的相关方法是使用 `sys.session`
    视图，该视图利用 `events_transactions_current` 表来包含每个连接的事务状态信息。清单 4-4 展示了一个查询活动事务的示例，其中排除了执行查询的连接对应的行。


    ```sql

    -- 调查 #7

    Connection 3> SELECT *

    FROM sys.session

    WHERE trx_state = ''ACTIVE''

    AND conn_id != CONNECTION_ID()\G

    *************************** 1. row ***************************

    thd_id: 140

    conn_id: 57

    user: mysqlx/worker

    db: NULL

    command: Sleep

    state: NULL

    time: 449

    current_statement: UPDATE world.city SET Population = 2000000 WHERE ID = 133

    statement_latency: NULL

    progress: NULL

    lock_latency: 111.00 us

    rows_examined: 1

    rows_sent: 0

    rows_affected: 1

    tmp_tables: 0

    tmp_disk_tables: 0

    full_scan: NO

    last_statement: UPDATE world.city SET Population = 2000000 WHERE ID = 133

    last_statement_latency: 384.00 us

    current_memory: 228.31 KiB

    last_wait: NULL

    last_wait_latency: NULL

    source: NULL

    trx_latency: 7.48 min

    trx_state: ACTIVE

    trx_autocommit: NO

    pid: 30936

    program_name: mysqlsh

    *************************** 2. row ***************************

    thd_id: 141

    conn_id: 58

    user: mysqlx/worker

    db: NULL

    command: Sleep

    state: NULL

    time: 449

    current_statement: UPDATE world.city SET Population = 900000 WHERE ID = 3805

    statement_latency: NULL

    progress: NULL

    lock_latency: 387.00 us

    rows_examined: 1

    rows_sent: 0

    rows_affected: 1

    tmp_tables: 0

    tmp_disk_tables: 0

    full_scan: NO

    last_statement: UPDATE world.city SET Population = 900000 WHERE ID = 3805

    last_statement_latency: 49.39 ms

    current_memory: 70.14 KiB

