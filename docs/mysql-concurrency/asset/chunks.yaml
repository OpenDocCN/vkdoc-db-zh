    Listing 16-3

    Finding the queries involved in the deadlock

    ```


    Notice that for connection id 763 (the second of the transactions), the MySQL
    error number is included, and the third row has it set to 1213 – a deadlock. MySQL
    Shell automatically executes a `SHOW WARNINGS` statement when an error is encountered
    which is the statement in row 4. Notice also that the nesting event is `NULL`
    for the `ROLLBACK` for transaction 2, but not for the `ROLLBACK` of transaction
    1\. That is because the deadlock triggered the whole transaction to be rolled
    back (so the `ROLLBACK` for transaction 2 did not do anything).


    The deadlock was triggered by transaction 1 first updating the population of the
    `city` table and then of the `country` table. Transaction 2 first updated the
    population of the `country` table and then tried to insert a new city into the
    `city` table. This is a typical example of two workflows updating records in different
    orders and thus being prone to deadlocks.


    Summarizing the investigation, it consists of two steps:


    1.  Analyze the deadlock information from InnoDB to determine the locks involved
    in the deadlock, and get as much information as possible about the connections.


    2.  Use other sources such as the Performance Schema to find more information
    about the queries in the transactions. Often it is necessary to analyze the application
    to get the list of queries.


    Now that you know what triggered the deadlock, what is required to solve the issue?


    ## The Solution


    Deadlocks are the easiest lock situation to resolve as InnoDB automatically chooses
    one of the transactions as the victim and rolls it back. In the deadlock examined
    in the previous discussion, transaction 2 was chosen as the victim which can be
    seen from the deadlock output:


    ```

    *** WE ROLL BACK TRANSACTION (2)

    ```


    This means that for transaction 1, there is nothing to do. After transaction 2
    has been rolled back, transaction 1 can continue and complete its work.


    For transaction 2, InnoDB has rolled back the whole transaction, so all you need
    to do is to retry the transaction. Remember to execute all queries again instead
    of relying on values returned during the first attempt; otherwise, you may be
    using outdated values.


    Tip


    Always be prepared to handle deadlocks and lock wait timeouts. For deadlocks or
    when the transaction has been rolled back after a lock wait timeout, retry the
    entire transaction. For lock wait timeouts where only the query has been rolled
    back, retry the query possibly adding a delay.


    If deadlocks occur relatively rarely, you do not really need to do anything more.
    Deadlocks are a fact of life, so do not be alarmed by encountering a few of them.
    If deadlocks cause a significant impact, you need to look at making changes to
    prevent some of the deadlocks.


    ## The Prevention


    Reducing deadlocks is very similar to reducing record lock contention in general
    with the addition that acquiring the locks in the same order throughout the application
    is very important. It is recommended to read Chapter [9](#502546_1_En_9_Chapter.xhtml)
    about reducing locking issues again:


    *   Reduce the work done by each transaction by splitting large transactions into
    several smaller ones and adding indexes to reduce the number of locks taken.


    *   Consider the `READ COMMITTED` transaction isolation level if it is suitable
    for your application to reduce the number of locks and how long they are held.


    *   Make sure transactions are only held open for as short time as possible.


    *   Access records in the same order, if necessary by executing `SELECT ... FOR
    UPDATE` or `SELECT ... FOR SHARE` queries to take the locks preemptively.


    The main points to reduce deadlocks are to reduce the number of locks and how
    long they are held and to take them in the same order.'
  trans: '# MySQL 死锁调查分析


    ## 调查过程


    我们来看两个具体的调查案例。


    ### 调查案例 #4


    连接 ID 3 的查询结果如下：


    ```sql

