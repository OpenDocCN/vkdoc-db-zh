    注意：如果加载过程因文件问题而崩溃，例如提示文件不是 ZIP 文件，则表明文件已损坏或不完整。在这种情况下，请删除文件以便重新下载，或尝试使用浏览器手动下载文件。


    ### 执行工作负载


    你使用 `run()` 方法执行工作负载。如果指定了已知工作负载的名称，该工作负载将立即执行。否则，将列出可用的工作负载，并提示你选择。在这种情况下，你可以通过编号（例如，清单
    6-1 对应 15）或名称来指定工作负载。使用名称时，`Listing` 和清单编号之间的空格数量无关紧要，只要至少有一个空格即可。当你通过提示选择工作负载时，可以在前一个工作负载完成后选择另一个。


    工作负载完成后，对于其中几个工作负载，系统会提供一个可以进行的调查建议列表。例如，可能是查询示例中使用的连接持有的锁。这些调查旨在提供启发，鼓励你使用自己的查询探索工作负载。部分调查也在示例讨论中使用。清单
    1-2 展示了使用提示执行工作负载的示例。


