- fmt: '# 数据库事务隔离级别示例与说明


    以下代码块展示了在`REPEATABLE READ`隔离级别下，一致读与DML操作混合时的行为：


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              977        1578          6

    --          2              978        1579          6

    -- Connection 1

    Connection 1> SET transaction_isolation = ''REPEATABLE-READ'';

    Query OK, 0 rows affected (0.0005 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> SELECT ID, Name, Population

    FROM world.city

    WHERE CountryCOde = ''BHS'';

    +-----+--------+------------+

    | ID  | Name   | Population |

    +-----+--------+------------+

    | 148 | Nassau |     172000 |

    +-----+--------+------------+

    1 row in set (0.0014 sec)

    -- Connection 2

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 2> INSERT INTO world.city

    VALUES (4080, ''Freeport'', ''BHS'',

    ''Grand Bahama'', 50000);

    Query OK, 1 row affected (0.0022 sec)

    Connection 2> COMMIT;

    Query OK, 0 rows affected (0.0983 sec)

    -- Connection 1

    Connection 1> SELECT ID, Name, Population

    FROM world.city

    WHERE CountryCOde = ''BHS'';

    +-----+--------+------------+

    | ID  | Name   | Population |

    +-----+--------+------------+

    | 148 | Nassau |     172000 |

    +-----+--------+------------+

    1 row in set (0.0006 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE CountryCOde = ''BHS'';

    Query OK, 2 rows affected (0.0012 sec)

    Rows matched: 2  Changed: 2  Warnings: 0

    Connection 1> SELECT ID, Name, Population

    FROM world.city

    WHERE CountryCOde = ''BHS'';

    +------+----------+------------+

    | ID   | Name     | Population |

    +------+----------+------------+

    |  148 | Nassau   |     189200 |

    | 4080 | Freeport |      55000 |

    +------+----------+------------+

    2 rows in set (0.0006 sec)

    Listing 12-5

    Consistent reads mixed with DML

    ```


    当连接1第一次查询巴哈马的所有城市（`CountryCode = ''BHS''`）时，只返回了拿骚这座城市。随后，连接2插入了自由港市的一行数据并提交了其事务。当连接1重复执行其`SELECT`语句时，返回的仍然只有拿骚。到目前为止一切正常。这正是“一致读”特性所预期的行为。然而，当连接1将巴哈马所有城市的人口增加10%后，更新了两行数据，随后的一次`SELECT`操作揭示了自由港市现在也出现在连接1的读视图中。


    这种行为并非一个缺陷！它之所以发生，是因为在`REPEATABLE READ`事务隔离级别下，读操作是非锁定的。若想避免此行为，你或者需要在连接1中使用`FOR
    SHARE`子句显式请求一个共享锁，或者需要将事务隔离级别更改为`SERIALIZABLE`。


    一致读所付出的代价是需要持有相对大量的锁，并且InnoDB必须维护数据的多个版本。回顾一下关于undo日志的讨论：只要还存在一个在给定事务之前启动的读视图，该事务的undo日志就必须被保留，而跟踪相同行的不同版本是昂贵的。


    如果不需要一致读，那么`READ COMMITTED`事务隔离级别是一个不错的选择。


    ## Read Committed


    如果你习惯使用其他关系型数据库系统，如Oracle DB或PostgreSQL，那么你很可能一直在使用`READ COMMITTED`事务隔离级别。MySQL中的`NDBCluster`存储引擎也使用`READ
    COMMITTED`。这个隔离级别很受欢迎，因为它为许多工作负载提供了足够强的隔离性，并且相比`REPEATABLE READ`和`SERIALIZABLE`隔离级别，其锁定开销有所减少。


    `REPEATABLE READ`与`READ COMMITTED`的主要区别在于：


    *   `READ COMMITTED`不支持一致读（尽管单条语句仍然返回一致的结果）。由于读视图的生命周期仅与语句的生命周期相同，InnoDB可以更快地清除旧的undo日志。这个优势对于长时间运行的事务最为显著。


    *   DML语句在检查但未修改的记录上所获取的锁，会在`WHERE`子句求值完成后立即释放。


    *   `READ COMMITTED`只会在检查外键和唯一键约束时，以及在处理页分裂（page split）时才获取间隙锁（gap lock）。当InnoDB页接近填满，并且需要将一条记录插入到页的中间，或者一条现有记录增长导致页内不再有空间时，就会发生页分裂。


    *   对于使用非索引列解析的`WHERE`子句，*半一致读*（semi-consistent）特性允许事务使用某行数据最后提交的值来匹配过滤条件，即使该行已被锁定。


    由于缺少间隙锁，所谓的幻行（phantom rows）就可能出现。幻行发生在同一条语句在同一个事务内执行两次，但即使是像`SELECT ... FOR SHARE`这样的锁定语句，也会返回不同的行时。


    ### 难以捉摸的间隙锁


    MySQL历史上一次更棘手的bug搜寻发生在MySQL 5.7和正式发布前的MySQL 8中。在复制设置中使用XA事务时，副本上会随机出现锁等待超时和死锁，且这些阻塞完全是由复制流量本身引起的。源库上没有任何锁问题，这怎么可能呢？


    该问题由多个部分组成。首先，在MySQL 5.7及更高版本中，XA事务在准备（prepared）阶段被写入二进制日志，而它们提交的顺序可能与准备的顺序不同，这意味着即使在单线程复制中，副本上也可能有多个写入事务同时打开。


    其次，该问题主要通过强制实施基于行的复制（row-based replication）并始终使用`READ COMMITTED`事务隔离级别得到了解决。然而，非常令人费解的是，偶尔——看似随机地——副本上仍然会出现锁冲突。最终发现，罪魁祸首是页分裂引起的间隙锁。页分裂在源库和副本上发生的时间点并不相同，因此最终导致了副本上额外的锁。该问题最终在5.7.22和8.0.4版本中得到解决，解决方案是在XA事务到达准备阶段时，由复制线程释放所获取的间隙锁。


    如果你在`READ COMMITTED`事务隔离级别下尝试这个重复执行的`UPDATE`语句示例，你会看到它比之前（`REPEATABLE READ`下）获取的锁更少。这如清单12-6所示。'
