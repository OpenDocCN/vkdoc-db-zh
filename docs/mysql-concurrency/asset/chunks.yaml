    (see Chapter [8](#502546_1_En_8_Chapter.xhtml)). The value only has a meaning
    for transactions in the `LOCK WAIT` state. This column was added in 8.0.20. |'
  trans: '

    # 3. 监控 InnoDB 事务


    ## 摘要


    本章介绍了可用于监控和调查锁的资源。首先探讨了 Performance Schema 表。其中有专用的表可用于查询当前的元数据和数据锁请求，包含有关锁目标对象、是共享锁还是排他锁以及锁请求是否已被授予等信息。在最底层，还有一些可用于调查同步等待的表；但这些表默认未启用，且开销较大。在粒度尺度的另一端，语句表和错误摘要表可用于调查哪些语句遇到错误以及错误发生的频率。


    其次，`sys` 模式也可能很有用，特别是用于调查锁等待问题。其中的 `innodb_lock_waits` 视图提供有关正在进行的 InnoDB 数据锁等待的信息，而
    `schema_table_lock_waits` 视图则提供有关正在进行的表元数据锁等待的信息。


    第三，在最高层级，状态计数器和 InnoDB 指标提供了实例活动的概览，包括锁的使用和获取锁失败的情况。如果你想要获取更多关于 InnoDB 锁的信息，那么锁监视器提供了与
    Performance Schema 中数据锁表类似的信息，但格式不太便于直接使用；而 InnoDB 监视器包含了最近一次发生的死锁的详细信息。InnoDB
    监视器还包含有关信号量等待的信息，最后，InnoDB 互斥量监视器提供了关于互斥量等待的统计信息。


    另一种获取锁使用情况信息的有用方法是查看事务信息。这将在下一章中讨论。


    脚注 1


    ## 信息模式 INNODB_TRX


    信息模式中的 `INNODB_TRX` 视图是关于 InnoDB 事务最专用的信息来源。它包含诸如事务开始时间、已修改的行数以及持有的锁数等信息。`INNODB_TRX`
    视图也被 `sys.innodb_lock_waits` 视图用于提供有关涉及锁等待问题的事务的一些信息。表 3-1 总结了该表中的列。


    ### 表 3-1


    `information_schema.INNODB_TRX` 视图中的列


    | 列/数据类型 | 描述 |

    | --- | --- |

    | `trx_id``varchar(18)` | 事务 ID。在引用事务或与 InnoDB 监视器输出进行比较时，此 ID 可能有用。否则，此 ID 应被视为纯内部使用，不应赋予任何意义。该
    ID 仅分配给已修改数据或锁定行的事务；仅执行只读 `SELECT` 语句的事务将有一个虚拟 ID（如 421124985258256），如果该事务开始修改或锁定记录，此
    ID 将会改变。 |

    | `trx_state``varchar(13)` | 事务的状态。可能是 `RUNNING`（运行中）、`LOCK WAIT`（锁等待）、`ROLLING
    BACK`（回滚中）和 `COMMITTING`（提交中）之一。 |

    | `trx_started``datetime` | 事务启动的时间（使用系统时区）。 |

    | `trx_requested_lock_id``varchar(105)` | 当 `trx_state` 为 `LOCK WAIT` 时，此列显示事务正在等待的锁的
    ID。 |

    | `trx_wait_started``datetime` | 当 `trx_state` 为 `LOCK WAIT` 时，此列显示锁等待开始的时间（使用系统时区）。
    |

    | `trx_weight``bigint unsigned` | 衡量事务在已修改行数和已持有锁数方面完成工作量的一个指标。这是在发生死锁时用于确定哪个事务将被回滚的权重。权重越高，表示完成的工作越多。
    |

    | `trx_mysql_thread_id``bigint unsigned` | 执行该事务的连接的 ID（与 Performance Schema `threads`
    表中的 `PROCESSLIST_ID` 列相同）。 |

    | `trx_query``varchar(1024)` | 事务当前正在执行的查询。如果事务处于空闲状态，则该查询为 `NULL`。 |

    | `trx_operation_state``varchar(64)` | 事务当前执行的操作。即使正在执行查询，此列也可能为 `NULL`。 |

    | `trx_tables_in_use``bigint unsigned` | 事务已使用的表的数量。 |

    | `trx_tables_locked``bigint unsigned` | 事务在其中持有行锁的表的数量。 |

    | `trx_lock_structs``bigint unsigned` | 事务创建的锁结构的数量。 |

    | `trx_lock_memory_bytes``bigint unsigned` | 事务持有的锁所使用的内存字节数。 |

    | `trx_rows_locked``bigint unsigned` | 事务持有的记录锁的数量。虽然称为行锁，但也包括索引锁。 |

    | `trx_rows_modified``bigint unsigned` | 事务修改的行数。 |

    | `trx_concurrency_tickets``bigint unsigned` | 当 `innodb_thread_concurrency` 不为
    0 时，事务会被分配 `innodb_concurrency_tickets` 张票，它可以在必须允许其他事务执行工作之前使用这些票。一张票对应于访问一行。此列显示剩余多少张票。
    |

    | `trx_isolation_level``varchar(16)` | 用于该事务的事务隔离级别。 |

    | `trx_unique_checks``int` | 该连接的 `unique_checks` 变量是否启用。 |

    | `trx_foreign_key_checks``int` | 该连接的 `foreign_key_checks` 变量是否启用。 |

    | `trx_last_foreign_key_error``varchar(256)` | 该事务遇到的最后一个（如果有）外键错误的错误消息。 |

    | `trx_adaptive_hash_latched``int` | 事务是否锁定了自适应哈希索引的一部分。总共有 `innodb_adaptive_hash_index_parts`
    个部分。此列实际上是一个布尔值。 |

    | `trx_adaptive_hash_timeout``bigint unsigned` | 是否在多次查询间保持对自适应哈希索引的锁。如果自适应哈希索引只有一个部分且没有争用，则超时计数器递减，当超时达到
    0 时锁被释放。当存在争用或有多个部分时，锁总是在每次查询后释放，此时超时值为 0。 |

    | `trx_is_read_only``int` | 事务是否为只读事务。事务可以是只读的，无论是显式声明，还是对于启用了 `autocommit` 的单语句事务，并且
    InnoDB 能够检测到该查询只会读取数据。 |

    | `trx_autocommit_non_locking``int` | 当事务是单语句非锁定 `SELECT` 且 `autocommit` 选项启用时，此列设置为
    1。当此列和 `trx_is_read_only` 均为 1 时，InnoDB 可以优化该事务以减少开销。 |

    | `trx_schedule_weight``bigint unsigned` | 由冲突感知事务调度（CATS）算法（参见第 8 章）分配给事务的权重。该值仅对处于
    `LOCK WAIT` 状态的事务有意义。此列在 8.0.20 版本中添加。 |

    '
- fmt: "从 `INNODB_TRX` 视图获得的信息，可以用来判断哪些事务产生了最大的影响。[清单 3-1](#502546_1_En_3_Chapter.xhtml#PC1)\
    \ 展示了一个启动两个可供研究的事务示例。\n\n```\n-- Connection   Processlist ID   Thread ID   Event\
    \ ID\n-- --------------------------------------------------\n--          1   \
    \            53         163          6\n--          2               54       \
    \  164          6\n-- Connection 1\nConnection 1> START TRANSACTION;\nQuery OK,\
    \ 0 rows affected (0.0002 sec)\nConnection 1> UPDATE world.city SET Population\
    \ = Population + MOD(ID, 2) + SLEEP(0.01);\n-- Connection 2\nConnection 2> SET\
    \ SESSION autocommit = ON;\nQuery OK, 0 rows affected (0.0004 sec)\nConnection\
    \ 2> SELECT COUNT(*) FROM world.city WHERE ID > SLEEP(0.01);\n```\n\n**清单 3-1**\
    \ 示例事务\n\n这些事务将运行 40-50 秒。在它们执行期间，您可以像[清单 3-2](#502546_1_En_3_Chapter.xhtml#PC2)\
    \ 中所示那样查询 `INNODB_TRX` 视图（具体数据取决于您测试中的 id 以及查询 `INNODB_TRX` 视图的时间）。\n\n```\n--\
    \ Investigation #1\n-- Connection 3\nConnection 3> SELECT *\n    -> FROM information_schema.INNODB_TRX\n\
    \    -> WHERE trx_mysql_thread_id IN (53, 54)\\G\n***************************\
