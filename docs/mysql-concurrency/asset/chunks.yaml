    ## 解决方案


    对于元数据锁争用，你基本上有两种选择来解决问题：使阻塞事务完成或终止 DDL 语句。要完成阻塞事务，你需要提交或回滚它。如果你终止连接，它会触发事务回滚，因此你需要考虑有多少工作需要回滚。为了提交事务，你必须找到该连接的执行位置并以这种方式提交。你无法提交属于不同连接的事务。


