    2 rows in set (0.0422 sec)

    清单 4-4

    使用 sys.session 查找活动事务

    ```


    这表明第一行中的事务已活跃超过 7 分钟，并且距离上次查询执行已有 449 秒（7.5 分钟）（您的值会不同）。`last_statement` 可用于确定连接最后执行的查询。这是一个被遗弃事务的示例，它会阻止
    InnoDB 清除其 undo 日志。被遗弃事务最常见的原因是数据库管理员交互式启动了一个事务后分心了，或者 `autocommit` 被禁用但没有意识到事务已经启动。


    ## 注意


    如果您禁用了 `autocommit`，请务必在工作结束时提交或回滚。一些连接器默认禁用 `autocommit`，因此请注意您的应用程序可能未使用服务器默认设置。


    您可以回滚事务以避免更改任何数据（如果您使用 MySQL Shell 脚本来重现此示例，在提示输入下一个调查的答案时直接按回车键即可自动回滚）。对于第一个（普通）事务：


    ```sql

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0303 sec)

    ```


    对于 XA 事务：


    ```sql

    -- Connection 2

    Connection 2> XA END ''abc'', ''def'', 1;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> XA ROLLBACK ''abc'', ''def'', 1;

    Query OK, 0 rows affected (0.0308 sec)

    ```


    Performance Schema 表用于分析事务的另一种方法是利用汇总表来获取聚合数据。

    '
- fmt: '## `Transaction Summary Tables`


    与语句摘要表可用于获取已执行语句的报告类似，事务摘要表可用于分析事务的使用情况。虽然它们不如语句摘要表那么有用，但确实能提供关于哪些连接和账户以不同方式使用事务的洞察。


    有五个事务摘要表，按全局、账户、主机、线程或用户对数据进行分组。所有摘要表也按事件名称分组，但由于目前只有一个事务事件（`transaction`），这是一个无操作。这些表是：


    *   `events_transactions_summary_global_by_event_name`：所有事务的聚合。此表中只有一行。

    *   `events_transactions_summary_by_account_by_event_name`：按用户名和主机名分组的事务。

    *   `events_transactions_summary_by_host_by_event_name`：按账户的主机名分组的事务。

    *   `events_transactions_summary_by_thread_by_event_name`：按线程分组的事务。仅包含当前存在的线程。

    *   `events_transactions_summary_by_user_by_event_name`：按账户的用户名部分分组的事件。


    每个表都包含事务统计数据所分组依据的列，以及三组列：总计、读写事务和只读事务。对于这三组列中的每一组，都有事务总数以及总计、最小、平均和最大延迟。清单 [4-5](#502546_1_En_4_Chapter.xhtml#PC8)
    展示了来自 `events_transactions_summary_global_by_event_name` 表的数据示例。


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               60         143          6

    -- Connection 1

    Connection 1> SELECT *

    FROM performance_schema.events_transactions_summary_global_by_event_name\G

    *************************** 1\. row ***************************

    EVENT_NAME: transaction

    COUNT_STAR: 40485

    SUM_TIMER_WAIT: 90259064465300000

    MIN_TIMER_WAIT: 4800000

    AVG_TIMER_WAIT: 2229444500000

    MAX_TIMER_WAIT: 62122342944500000

    COUNT_READ_WRITE: 40483

    SUM_TIMER_READ_WRITE: 90230783742700000

    MIN_TIMER_READ_WRITE: 4800000

    AVG_TIMER_READ_WRITE: 2228856100000

    MAX_TIMER_READ_WRITE: 62122342944500000

    COUNT_READ_ONLY: 2

    SUM_TIMER_READ_ONLY: 28280722600000

    MIN_TIMER_READ_ONLY: 9561820600000

    AVG_TIMER_READ_ONLY: 14140361300000

    MAX_TIMER_READ_ONLY: 18718902000000

    1 row in set (0.0007 sec)

    Listing 4-5

    The events_transactions_summary_global_by_event_name table

    ```


    当您研究输出时，事务的数量之多，尤其是读写事务的数量之多，可能会让您感到惊讶。请记住，当查询 InnoDB 表时，即使您没有显式指定，一切也都是一个事务。因此，即使是查询单行的简单
    `SELECT` 语句也算作一个事务。关于读写事务和只读事务之间的分布，Performance Schema 仅在您显式将其启动为只读时才认为事务是只读的。


    ```

    START TRANSACTION READ ONLY;

    ```


    当 InnoDB 确定一个自动提交的单语句事务可以被视为只读事务时，这在 Performance Schema 中仍然计入读写统计。


    ## `Summary`


    本章介绍了 Performance Schema 中与事务相关的表，并展示了如何与其他表进行连接。首先讨论了三个每个事务事件一行的表：`events_transactions_current`、`events_transactions_history`
    和 `events_transactions_history_long`，然后使用它们连接到语句事件表，以获取事务中最近执行的语句。最后介绍了事务摘要表。


    您现在已经了解了监控锁和事务的最重要资源，是时候深入了解锁的细节了。首先，您将学习锁访问级别。


    # 5. 锁访问级别


    在介绍锁的第一章中，没有提及锁的工作原理。通过只允许一次一个查询访问，无论将要完成何种工作，都可以在数据库中实现锁定。然而，这将非常低效。


    沿用交通信号灯的类比，另一种方法是基于将要完成的工作来授予访问权限。交通信号灯不仅一次允许一辆车进入十字路口，而是允许所有朝同一方向行驶的车辆进入。同样，在数据库中，您需要区分共享（读）和独占（写）访问。访问级别正如其名称所示。共享锁允许其他连接也获取共享锁。这是最宽松的锁访问级别。独占锁只允许该一个连接获取锁。共享锁也称为读锁，独占锁也称为写锁。


    > 注意

    > 锁访问级别有时也称为锁类型，但由于这可能与锁粒度（也常称为类型）混淆，此处使用术语锁访问级别。


    MySQL 还有一个称为意向锁的概念，用于指定事务的意向。意向锁可以是共享的或独占的。


    本章的其余部分将更详细地介绍共享锁和独占锁以及意向锁。'
  raw: '## `Transaction Summary Tables`


    In the same way as there are statement summary tables that can be used to get
    reports of the statements that are executed, there are transaction summary tables
    that can be used to analyze the use of transactions. While they are not quite
    as useful as their statement counterparts, they do offer insight into which connections
    and accounts that use transactions in different ways.


    There are five transaction summary tables grouping the data globally or by account,
    host, thread, or user. All of the summaries also group by the event name, but
    as currently there is only one transaction event (`transaction`), it is a nil
    operation. The tables are


    *   **events_transactions_summary_global_by_event_name:** All transactions aggregated.
    There is only a single row in this table.


    *   **events_transactions_summary_by_account_by_event_name:** The transactions
    grouped by username and hostname.


    *   **events_transactions_summary_by_host_by_event_name:** The transactions grouped
    by hostname of the account.


    *   **events_transactions_summary_by_thread_by_event_name:** The transactions
    grouped by thread. Only currently existing threads are included.


    *   **events_transactions_summary_by_user_by_event_name:** The events grouped
    by the username part of the account.


    Each table includes the columns that the transaction statistics are grouped by
    and three groups of columns: total, for read-write transactions, and for read-only
    transactions. For each of these three groups of columns, there is the total number
    of transactions as well as the total, minimum, average, and maximum latencies.
    Listing [4-5](#502546_1_En_4_Chapter.xhtml#PC8) shows an example of the data from
    the `events_transactions_summary_global_by_event_name` table.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               60         143          6

    -- Connection 1

    Connection 1> SELECT *

    FROM performance_schema.events_transactions_summary_global_by_event_name\G

    *************************** 1\. row ***************************

    EVENT_NAME: transaction

    COUNT_STAR: 40485

    SUM_TIMER_WAIT: 90259064465300000

    MIN_TIMER_WAIT: 4800000

    AVG_TIMER_WAIT: 2229444500000

    MAX_TIMER_WAIT: 62122342944500000

    COUNT_READ_WRITE: 40483

    SUM_TIMER_READ_WRITE: 90230783742700000

    MIN_TIMER_READ_WRITE: 4800000

    AVG_TIMER_READ_WRITE: 2228856100000

    MAX_TIMER_READ_WRITE: 62122342944500000

    COUNT_READ_ONLY: 2

    SUM_TIMER_READ_ONLY: 28280722600000

    MIN_TIMER_READ_ONLY: 9561820600000

    AVG_TIMER_READ_ONLY: 14140361300000

    MAX_TIMER_READ_ONLY: 18718902000000

    1 row in set (0.0007 sec)

    Listing 4-5

    The events_transactions_summary_global_by_event_name table

    ```


    It may surprise you when you study the output how many transactions there are,
    particularly read-write transactions. Remember that when querying an InnoDB table,
    everything is a transaction even if you have not explicitly specified one. So
    even a simple `SELECT` statement querying a single row counts as a transaction.
    Regarding the distribution between read-write and read-only transactions, then
    the Performance Schema only considers a transaction read-only if you explicitly
    started it as such


    ```

    START TRANSACTION READ ONLY;

    ```


    When InnoDB determines that an autocommitting single-statement transaction can
    be treated as a read-only transaction, that is still counting toward the read-write
    statistics in the Performance Schema.


    ## `Summary`


    In this chapter, the transaction-related tables in the Performance Schema have
    been introduced, and it has been shown how you can join to other tables. First
    the three tables with one row per transaction event, `events_transactions_current`,
    `events_transactions_history`, and `events_transactions_history_long`, were discussed,
    and then they were used to join on the statement event tables to obtain the most
    recent statements executed in a transaction. Finally, the transaction summary
    tables were covered.


    You have now covered the most important resources for monitoring locks and transactions,
    and it is time to go into detail about locks. First, you will learn about the
    lock access levels.


    # 5. Lock Access Levels


    In the first chapter where locks were introduced, there was no mention of how
    locks work. It would be possible to implement locking in the database by just
    allowing one query access at a time irrespective of what kind of work will be
    done. However, this would be woefully inefficient.


    Keeping to the analogy of a traffic light, another approach is grant access based
    on what work will be done. A traffic light grants access to the intersection not
    just to one car at a time but to all driving in the same direction. Similarly,
    in a database, you distinguish between shared (read) and exclusive (write) access.
    The access levels do what their names suggest. A shared lock allows other connections
    to also get a shared lock. This is the most permissive lock access level. An exclusive
    lock only allows that one connection to get the lock. A shared lock is also known
    as a read lock, and an exclusive lock is also known as a write lock.


    Note


    The lock access level is also sometimes called the lock type, but since that can
    be confused with the lock granularity, which is also sometimes called a type,
    the term lock access level is used here.


    MySQL also has a concept called intention locks which specify the intention of
    a transaction. An intention lock can be either shared or exclusive.


    The rest of this chapter goes into more detail about shared and exclusive locks
    as well as intention locks.'
