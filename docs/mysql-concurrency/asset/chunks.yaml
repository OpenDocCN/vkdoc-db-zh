    本书所分享的知识并非凭空产生。感谢 Charles Bell 始终如一的细致审阅，以及他富有建设性的反馈和改进建议。Jakub Lopuszanski 在
    InnoDB 锁相关细节上提供了帮助。同时，我也要感谢多年来所有的同事们，他们通过指导、教学、提出好问题以及日常讨论，共同参与了我学习 MySQL 工作原理的旅程。特别感谢
    Edwin Desouza 和 Frédéric Descamps（更广为人知的名字是 Lefred）给予的协助。


    最后但同样重要的是，感谢我的妻子 Ann-Margrete 在我撰写本书过程中的耐心与支持。没有你，这本书的完成将无从谈起。


    关于作者 关于技术审阅者


    # 1. 引言


    并发与锁是数据库领域最复杂的主题之一。一个通常执行快速且无问题的查询，当条件“恰到好处”时，可能会突然耗时更长或因错误而失败，此时锁或争用就成为了问题。你可能会问自己，既然锁会引发这些问题，为何还需要它们？本章及接下来的
    11 章将尝试解释这个问题，并探讨如何最好地应对它们。本书的最后六章通过六个案例研究，将相关信息置于现实场景中进行分析，并说明如何避免或减轻问题。


    在本章中，你将首先了解为何锁如此重要，尽管它们可能引发问题。接着将解释锁与事务之间的关系。本章其余部分介绍了本书中如何使用示例，以及贯穿全书示例所使用的 `world`、`sakila`
    和 `employees` 数据库。


    ## 为何需要锁？


    一个无需数据库锁的世界看似完美。然而，其代价将高到只有极少数用例能使用该数据库，而对于 MySQL 这样的通用数据库，避免锁是不可能的。如果没有锁，就无法实现任何并发。想象一下，如果数据库只允许一个连接访问（你可能会争辩说这本身就算一种锁，因此系统并非无锁）——这对于大多数应用来说并不实用。


    注意


    在 MySQL 中，通常所说的锁实际上是一个锁请求，它可以处于已授予或等待状态。


    当有多个连接并发执行查询时，你需要某种方式来确保这些连接不会相互干扰。这就是锁的作用所在。你可以将锁类比于道路交通中的信号灯（图 1-1），它们调节对资源的访问以避免事故。在道路交叉口，必须确保两辆车不会同时穿过彼此的路径而发生碰撞。


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig1_HTML.jpg](img/502546_1_En_1_Fig1_HTML.jpg)


    图 1-1


    数据库中的锁类似于交通信号灯


    在数据库中，必须确保两个查询对数据的访问不会冲突。正如控制交叉口访问有不同级别——让行、停车标志和交通信号灯——数据库中也有不同类型的锁。


    ## 锁级别


    MySQL 中的锁有多种类型，在不同层级上起作用，从用户级锁到记录锁。最高级别是用户级锁，可以保护应用程序中的整个代码路径以及数据库内的任何对象。中间层有操作数据库对象的锁，包括保护表元数据的元数据锁，以及保护表中所有数据的表锁。用户级锁和表级锁的共同点是它们都在数据库的
    SQL 层实现。高级别锁将在第 6 章讨论。


    最低级别是由存储引擎实现的锁。这些锁本质上取决于你使用的存储引擎。由于 InnoDB 是迄今为止 MySQL 中最常用的存储引擎（也是默认引擎），本书涵盖了
    InnoDB 特有的锁。InnoDB 包括记录锁（这是最容易理解的），以及更复杂的概念，如间隙锁、临键锁、谓词锁和插入意向锁。此外，还有互斥体和信号量（这也发生在
    SQL 层面）。InnoDB 特有的锁以及互斥体/信号量将在第 7 章中介绍。


    ## 锁与事务


    初看之下，将锁和事务这两个主题合并在一本关于并发的书中可能显得奇怪。然而，正如你将在本书的多个示例中看到的，它们密切相关。有些锁在整个事务期间一直持有，因此理解事务如何工作以及如何监控它们非常重要。


    事务隔离级别的概念在处理锁时也扮演着重要角色。隔离级别既影响获取哪些锁，也影响锁持有的时间长度。


    第 3 章和第 4 章介绍如何监控事务，第 11 章和第 12 章则涵盖事务的工作原理、其影响以及事务隔离级别。


    ## 示例


    全书穿插了示例，用以阐明正在讨论的主题或设置可进行调查的情景。除第 17 章和第 18 章外，重现测试所需的所有语句均已列出。通常，示例需要多个连接，因此当连接选择很重要时，查询提示符会设置为指示应使用哪个连接执行查询。例如，`连接
    1>` 表示该查询应由你的第一个连接执行。


    本书中的所有示例均在 MySQL Shell 中执行。为简洁起见，示例中的提示符为 `mysql>`，除非连接很重要或语言模式不是 SQL。这些示例同样适用于旧的
    `mysql` 命令行客户端。


    提示


    如果你对 MySQL Shell 不熟悉，它是一个第二代 MySQL 命令行客户端，支持 SQL、Python 和 JavaScript。它还附带多个内置实用程序，包括用于管理
    MySQL InnoDB 集群和传统复制拓扑的工具。有关 MySQL Shell 的介绍，请参阅用户指南 [`https://dev.mysql.com/doc/mysql-shell/en/`](https://dev.mysql.com/doc/mysql-shell/en/)
    或 Charles Bell 所著的 *Introducing MySQL Shell* (Apress) 一书 ([`www.apress.com/gp/book/9781484250822`](http://www.apress.com/gp/book/9781484250822))。


    此外，本书附带一个 Python 模块——`concurrency_book.generate`——可以导入到 MySQL Shell 中，用于重现除最简单示例外的所有示例。本节的其余部分描述了如何使用这个
    MySQL Shell 模块。此处内容摘录自附录 B，该附录包含该模块的更详细参考，包括如何实现你自己的示例。


    注意


    本质上，示例中的某些数据在每次执行时会有所不同。特别是 ID、内存地址等类似信息。因此，当你尝试重现示例时，不要期望所有细节都得到完全相同的结果。

    '
- fmt: '### Prerequisites for the `concurrency_book.generate` Module


    The most important requirement to use the MySQL Shell module provided with this
    book is that you are using MySQL Shell 8.0.20 or later. This is a strict requirement
    as the module primarily uses the `shell.open_session()` method to create the connections
    needed for the test cases. This method was only introduced in release 8.0.20.
    The advantage of `shell.open_session()` over the `mysql.get_classic_session()`
    and `mysqlx.get_session()` is that `open_session()` works transparently with both
    the classic MySQL protocol and the new X protocol.


    If you for some reason are stuck with an older version of MySQL Shell, you can
    update the test cases to include the `protocol` setting (see `Defining Workloads`
    in Appendix B) to explicitly specify which protocol to use.


    It is also required that a connection already exists from MySQL Shell to MySQL
    Server as the module uses the URI of that connection when creating the additional
    connections required for the example.


    The examples have been tested with MySQL Server 8.0.21; however, most of the examples
    will work with older releases and some even with MySQL 5.7. That said, it is recommended
    to use MySQL Server 8.0.21 or later.


    ### Installing the `concurrency_book.generate` Module


    To use the module, you need to download the files in the `concurrency_book` directory
    from this book’s GitHub repository (the link can be found on the book’s home page
    at [`www.apress.com/gp/book/9781484266519`](http://www.apress.com/gp/book/9781484266519)).
    The easiest is to clone the repository or to download the ZIP file with all the
    files using the menu shown in Figure 1-2.


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig2_HTML.jpg](images/502546_1_En_1_Chapter/502546_1_En_1_Fig2_HTML.jpg)


    Figure 1-2: The GitHub menu for cloning or downloading the repository


    Click on the clipboard icon to copy the URL used to clone the repository using
    the Git software of your system or use the *Download ZIP* link to download a ZIP
    file of the repository. You are free to choose any path as the location of the
    files as long as the structure below the `concurrency_book` directory is kept.
    For this discussion, it is assumed you have cloned the repository or unzipped
    the file to `C:\Book\mysql-concurrency`, so the `generate.py` file is in the directory
    `C:\Book\mysql-concurrency\concurrency_book\`.


    To be able to import the module in MySQL Shell, open or create the `mysqlshrc.py`
    file. MySQL Shell searches in four places for the file. On Microsoft Windows,
    the paths are in the order they are searched:


    1.  `%PROGRAMDATA%\MySQL\mysqlsh\`

    2.  `%MYSQLSH_HOME%\shared\mysqlsh\`

    3.  `<mysqlsh binary path>\`

    4.  `%APPDATA%\MySQL\mysqlsh\`


    On Linux and Unix:


    1.  `/etc/mysql/mysqlsh/`

    2.  `$MYSQLSH_HOME/shared/mysqlsh/`

    3.  `<mysqlsh binary path>/`

    4.  `$HOME/.mysqlsh/`


    All four paths are always searched, and if the file is found in multiple locations,
    each file will be executed. This means that the last found file takes precedence
    if the files affect the same variables. If you make changes meant for you personally,
    the best place to make the changes is in the fourth location. The path in step
    4 can be overridden with the `MYSQLSH_USER_CONFIG_HOME` environment variable.


    You need to ensure the `mysqlshrc.py` file adds the directory with the module
    to the Python search path, and optionally you can add an `import` statement to
    make the module available when you start MySQL Shell. An example of the `mysqlshrc.py`
    file is


    ```

    import sys

    sys.path.append(''C:\\Book\\mysql-concurrency'')

    import concurrency_book.generate

    ```


    The double backslashes are for Windows; on Linux and Unix, you do not need to
    escape the slashes that separate the path elements. If you do not include the
    `import` in the `mysqlshrc.py` file, you will need to execute it in MySQL Shell
    before you can use the module.


    ### Getting Information


    The module includes two methods that return information on how to use the module.
    One is the `help()` method which provides information on how to use the module:


    ```

    mysql-py> concurrency_book.generate.help()

    ```


    There is also the `show()` method which lists the workloads that the `run()` method
    can execute and the schemas that the `load()` method can load:


    ```

    mysql-py> concurrency_book.generate.show()

    ```


    The workloads are named after the code listings in the book, for example, the
    workload named "Listing 6-1" implements the example in Listing 6-1.


    Before you can start executing the workloads, you need to load some test data
    which the module can do for you as well.'
