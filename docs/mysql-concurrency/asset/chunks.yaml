    Query OK, 1 row affected (0.0022 sec)

    Connection 2> COMMIT;

    Query OK, 0 rows affected (0.0983 sec)

    -- Connection 1

    Connection 1> SELECT ID, Name, Population

    FROM world.city

    WHERE CountryCOde = ''BHS'';

    +-----+--------+------------+

    | ID  | Name   | Population |

    +-----+--------+------------+

    | 148 | Nassau |     172000 |

    +-----+--------+------------+

    1 row in set (0.0006 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE CountryCOde = ''BHS'';

    Query OK, 2 rows affected (0.0012 sec)

    Rows matched: 2  Changed: 2  Warnings: 0

    Connection 1> SELECT ID, Name, Population

    FROM world.city

    WHERE CountryCOde = ''BHS'';

    +------+----------+------------+

    | ID   | Name     | Population |

    +------+----------+------------+

    |  148 | Nassau   |     189200 |

    | 4080 | Freeport |      55000 |

    +------+----------+------------+

    2 rows in set (0.0006 sec)

    Listing 12-5

    Consistent reads mixed with DML

    ```


    When Connection 1 queries all cities in the Bahamas (`CountryCode = ''BHS''`)
    the first time, only the city of Nassau is returned. Then Connection 2 inserts
    a row for the city of Freeport and commits its transaction. When Connection 1
    repeats its `SELECT` statement, it is still only Nassau that is returned. So far
    so good. This is what is expected of the consistent read feature. However, when
    Connection 1 increases the population of all cities in Bahamas with 10%, then
    two rows are updated, and a subsequent `SELECT` reveals that Freeport is now part
    of Connection 1’s read view.


    This behavior is not a bug! It happens because reads are non-locking in the `REPEATABLE
    READ` transaction isolation level. If you want to avoid this behavior, you either
    need to explicitly request a shared lock in Connection 1 using the `FOR SHARE`
    clause or you need to change to the `SERIALIZABLE` transaction isolation level.


    The price to pay for consistent reads is a relatively large number of locks and
    that InnoDB must maintain several versions of the data. Remember from the discussion
    of undo logs that as long as there is still a read view that was started before
    a given transaction, then the undo log for the transaction must be kept, and that
    it is expensive to track of the versions of the same rows.


    If you do not need consistent reads, the `READ COMMITTED` transaction isolation
    level is a good choice .


    ## Read Committed


    If you are used to other relational database systems such as Oracle DB or PostgreSQL,
    then you have probably been using the `READ COMMITTED` transaction isolation level
    . The `NDBCluster` storage engine in MySQL also uses `READ COMMITTED`. This isolation
    level is popular as it for many workloads provides strong enough isolation and
    it has reduced locking compared to the `REPEATABLE READ` and `SERIALIZABLE` isolation
    levels.


    The main differences from `REPEATABLE READ` to `READ COMMITTED` are


    *   `READ COMMITTED` does not support consistent reads (though single statements
    still return consistent results). Because the lifetime of the read view is only
    that of the statement, InnoDB can faster purge old undo logs. This advantage is
    most significant for long-running transactions.


    *   The locks taken by DML statements on records that are examined but not modified
    are released as soon as the `WHERE` clause has been evaluated.


    *   `READ COMMITTED` will only take gap locks in connection with checking foreign
    keys and unique key constraints as well as in connection with page splits. A page
    split occurs when an InnoDB page is close to full and a record will have to be
    inserted in the middle of the page or an existing record grows, so there is no
    longer room in the page.


    *   For `WHERE` clauses resolved using a non-indexed column, the *semi-consistent*
    read feature allows transactions to use the last committed values of a row to
    match the filter even if the row is locked.


    The lack of gap locks means that so-called phantom rows can occur. Phantom rows
    happen when the same statement is executed twice within the same transaction and
    it returns different rows even for locking statements such as `SELECT ... FOR
    SHARE`.


    The Illusive Gap Lock


    One of the more difficult hunts for a MySQL bug occurred in MySQL 5.7 and pre-GA
    MySQL 8\. When using XA transactions in a replication setup, there were random
    occurring lock wait timeouts and deadlocks on the replicas caused solely by the
    replication traffic. How could that be when there were not any lock issues on
    the replication source?


    The issue consisted of various parts. First, in MySQL 5.7 and later, XA transactions
    are written to the binary log when they are prepared, and they may not commit
    in the same order as they are prepared, which meant that even in single-threaded
    replication, the replica could have multiple write transactions open at the same
    time.


    Second, the issue was mostly resolved by enforcing row-based replication and always
    using the `READ COMMITTED` transaction isolation level. However, very puzzling,
    occasionally – seemingly at random – there would still be lock conflicts on the
    replicas. In the end it turned out to be gap locks caused by page splits that
    were the culprit. Page splits do not occur at the same time on the source and
    replica, so that there could end up being additional locks on the replica. The
    issue was eventually solved in the 5.7.22 and 8.0.4 releases by releasing the
    gap locks taken by the replication threads when the XA transactions reach the
    prepare stage.


    If you try the recurring `UPDATE` statement example in the `READ COMMITTED` transaction
    isolation level , you will see how it takes fewer locks than before. This is shown
    in Listing [12-6](#502546_1_En_12_Chapter.xhtml#PC8).'
