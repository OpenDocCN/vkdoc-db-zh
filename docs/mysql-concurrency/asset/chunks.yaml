    \n最后，回滚并删除测试表：\n\n```\n-- Connection 1\nConnection 1> ROLLBACK;\nQuery OK, 0 rows\
    \ affected (0.0714 sec)\nConnection 1> DROP TABLE world._tmp_city1;\nQuery OK,\
