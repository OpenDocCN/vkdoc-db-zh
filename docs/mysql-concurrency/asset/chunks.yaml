- fmt: '## The Performance Schema


    The Performance Schema contains the source of most of the lock information available
    except for deadlocks. Not only can you use the lock information in the Performance
    Schema directly; it is also used for two lock-related views in the `sys` schema.
    Additionally, you can use the Performance Schema to investigate the low-level
    synchronization objects such as mutexes. First, it will be shown how metadata
    and table locks can be investigated.


    ### Metadata and Table Locks


    Metadata locks are the most generic of the higher-level locks, and there is support
    for a wide range of locks ranging from the global read lock to low-level locks
    like for the access control list (ACL). The locks are monitored using the `metadata_locks`
    table which contains information about user-level locks, metadata locks, and similar.
    To record information, the `wait/lock/metadata/sql/mdl` Performance Schema instrument
    must be enabled (it is enabled by default in MySQL 8). There is an example later
    showing how you can enable instruments.


    The `metadata_locks` table contains 11 columns which are summarized in Table 2-1.


    Table 2-1: The `performance_schema.metadata_locks` table


    | Column Name | Description |

    | --- | --- |

    | `OBJECT_TYPE` | The kind of lock that is held such as `GLOBAL` for the global
    read lock and `TABLE` for tables and views. Appendix A includes a complete list
    of possible values. |

    | `OBJECT_SCHEMA` | The schema the object that is locked belongs to. |

    | `OBJECT_NAME` | The name of the locked object. |

    | `COLUMN_NAME` | For column level locks, the column name of the locked column.
    |

    | `OBJECT_INSTANCE_BEGIN` | The memory address of the object. |

    | `LOCK_TYPE` | The lock access level such as shared, exclusive, or intention.
    Appendix A includes a complete list of possible values. |

    | `LOCK_DURATION` | How long the lock is held for. Supported values are `STATEMENT`,
    `TRANSACTION`, and `EXPLICIT`. |

    | `LOCK_STATUS` | The status of the lock. In addition to a granted and pending
    status, it can also show that the lock request timed out, was a victim, etc. |

    | `SOURCE` | The place in the source code where the lock was requested. |

    | `OWNER_THREAD_ID` | The Performance Schema thread id of the thread that requested
    the lock. |

    | `OWNER_EVENT_ID` | The event id of the event requesting the lock. |


    The primary key of the table is the `OBJECT_INSTANCE_BEGIN` column.


    Listing 2-1 shows an example of obtaining a table metadata lock and querying it
    in the `metadata_locks` table. Some of the details will be different for you.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               19          59          6

    -- Connection 1

    mysql> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    mysql> SELECT * FROM world.city WHERE ID = 130;

    +-----+--------+-------------+-----------------+------------+

    | ID  | Name   | CountryCode | District        | Population |

    +-----+--------+-------------+-----------------+------------+

    | 130 | Sydney | AUS         | New South Wales |    3276207 |

    +-----+--------+-------------+-----------------+------------+

    1 row in set (0.0005 sec)

    mysql> SELECT *

    FROM performance_schema.metadata_locks

    WHERE OBJECT_TYPE = ''TABLE''

    AND OBJECT_SCHEMA = ''world''

    AND OBJECT_NAME = ''city''

    AND OWNER_THREAD_ID = PS_CURRENT_THREAD_ID()\G

    *************************** 1\. row ***************************

    OBJECT_TYPE: TABLE

    OBJECT_SCHEMA: world

    OBJECT_NAME: city

    COLUMN_NAME: NULL

    OBJECT_INSTANCE_BEGIN: 2639965404080

    LOCK_TYPE: SHARED_READ

    LOCK_DURATION: TRANSACTION

    LOCK_STATUS: GRANTED

    SOURCE: sql_parse.cc:6162

    OWNER_THREAD_ID: 59

    OWNER_EVENT_ID: 10

    1 row in set (0.0006 sec)

    mysql> ROLLBACK;

    Query OK, 0 rows affected (0.0006 sec)

    Listing 2-1

    Example use of the metadata_locks table

    ```


    Here you can see that it is a table level lock on the `world.city` table. It is
    a shared read lock, so other connections can obtain the same lock concurrently.


    If you want to find out why a connection is waiting for its lock request to be
    granted, you need to query the `metadata_locks` table for a row where the `OBJECT_TYPE`,
    `OBJECT_SCHEMA`, and `OBJECT_NAME` are the same as for the pending lock and the
    `LOCK_STATUS` is `GRANTED`. That is, to find all cases of pending locks and what
    is blocking them, you need a query that self-joins the table:


    ```

    SELECT OBJECT_TYPE, OBJECT_SCHEMA, OBJECT_NAME,

    w.OWNER_THREAD_ID AS WAITING_THREAD_ID,

    b.OWNER_THREAD_ID AS BLOCKING_THREAD_ID

    FROM performance_schema.metadata_locks w

    INNER JOIN performance_schema.metadata_locks b

    USING (OBJECT_TYPE, OBJECT_SCHEMA, OBJECT_NAME)

    WHERE w.LOCK_STATUS = ''PENDING''

    AND b.LOCK_STATUS = ''GRANTED'';

    ```


    You can optionally join on other Performance Schema tables such as `events_statements_current`
    to get more information about the connections involved in the lock wait. Alternatively,
    as it will be discussed later, for table metadata locks, you can use the `sys.schema_table_lock_waits`
    view.


    A less frequently used table is `table_handles` which holds information about
    the open table handles including which table locks are currently locked. The `wait/lock/table/sql/handler`
    Performance Schema instrument must be enabled for data to be recorded (this is
    the default). The information available is similar to that of the `metadata_locks`
    table, and Listing 2-2 shows an example of an explicit read lock on the `world.city`
    table. Some of the details will be different for you.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               21          61          6

    -- Connection 1

    mysql> LOCK TABLE world.city READ;

    Query OK, 0 rows affected (0.0004 sec)

    mysql> SELECT *

    FROM performance_schema.table_handles

    WHERE OBJECT_SCHEMA = ''world''

    AND OBJECT_NAME = ''city''

    AND OWNER_THREAD_ID = PS_CURRENT_THREAD_ID()\G

    *************************** 1\. row ***************************

    OBJECT_TYPE: TABLE

    OBJECT_SCHEMA: world

    OBJECT_NAME: city

    OBJECT_INSTANCE_BEGIN: 2639971828776

    OWNER_THREAD_ID: 61

    OWNER_EVENT_ID: 8

    INTERNAL_LOCK: NULL

    EXTERNAL_LOCK: READ EXTERNAL

    1 row in set (0.0013 sec)

    mysql> UNLOCK TABLES;

    Query OK, 0 rows affected (0.0004 sec)

    Listing 2-2

    Example of using the table_handles table

    ```


    The `INTERNAL_LOCK` column contains lock information at the SQL level such as
    explicit table locks on non-InnoDB tables, while the `EXTERNAL_LOCK` contains
    lock information at the storage engine level including explicit table locks for
    all tables.


    Unlike the `metadata_locks` table, you cannot use the `table_handles` table to
    investigate lock contentions (but the `metadata_locks` table also includes explicit
    table locks like in this example, so you can use that).


    The `metadata_locks` and `table_handles` tables concern the highest-level locks.
    The next step on the lock granularity latter is data locks which have their own
    tables.'
  raw: '## The Performance Schema


    The Performance Schema contains the source of most of the lock information available
    except for deadlocks. Not only can you use the lock information in the Performance
    Schema directly; it is also used for two lock-related views in the `sys` schema.
    Additionally, you can use the Performance Schema to investigate the low-level
    synchronization objects such as mutexes. First, it will be shown how metadata
    and table locks can be investigated.


    ### Metadata and Table Locks


    Metadata locks are the most generic of the higher-level locks, and there is support
    for a wide range of locks ranging from the global read lock to low-level locks
    like for the access control list (ACL). The locks are monitored using the `metadata_locks`
    table which contains information about user-level locks, metadata locks, and similar.
    To record information, the `wait/lock/metadata/sql/mdl` Performance Schema instrument
    must be enabled (it is enabled by default in MySQL 8). There is an example later
    showing how you can enable instruments.


    The `metadata_locks` table contains 11 columns which are summarized in Table [2-1](#502546_1_En_2_Chapter.xhtml#Tab1).


    Table 2-1


    The  `performance_schema.metadata_locks` table


    | Column Name | Description |

    | --- | --- |

    | `OBJECT_TYPE` | The kind of lock that is held such as `GLOBAL` for the global
    read lock and `TABLE` for tables and views.Appendix A includes a complete list
    of possible values. |

    | `OBJECT_SCHEMA` | The schema the object that is locked belongs to. |

    | `OBJECT_NAME` | The name of the locked object. |

    | `COLUMN_NAME` | For column level locks, the column name of the locked column.
    |

    | `OBJECT_INSTANCE_BEGIN` | The memory address of the object. |

    | `LOCK_TYPE` | The lock access level such as shared, exclusive, or intention.
    Appendix A includes a complete list of possible values. |

    | `LOCK_DURATION` | How long the lock is held for. Supported values are `STATEMENT`,
    `TRANSACTION`, and `EXPLICIT`. |

    | `LOCK_STATUS` | The status of the lock. In addition to a granted and pending
    status, it can also show that the lock request timed out, was a victim, etc. |

    | `SOURCE` | The place in the source code where the lock was requested. |

    | `OWNER_THREAD_ID` | The Performance Schema thread id of the thread that requested
    the lock. |

    | `OWNER_EVENT_ID` | The event id of the event requesting the lock. |


    The primary key of the table is the `OBJECT_INSTANCE_BEGIN` column.


    Listing [2-1](#502546_1_En_2_Chapter.xhtml#PC1) shows an example of obtaining
    a table metadata lock and querying it in the `metadata_locks` table. Some of the
    details will be different for you.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               19          59          6

    -- Connection 1

    mysql> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    mysql> SELECT * FROM world.city WHERE ID = 130;

    +-----+--------+-------------+-----------------+------------+

    | ID  | Name   | CountryCode | District        | Population |

    +-----+--------+-------------+-----------------+------------+

    | 130 | Sydney | AUS         | New South Wales |    3276207 |

    +-----+--------+-------------+-----------------+------------+

    1 row in set (0.0005 sec)

    mysql> SELECT *

    FROM performance_schema.metadata_locks

    WHERE OBJECT_TYPE = ''TABLE''

    AND OBJECT_SCHEMA = ''world''

    AND OBJECT_NAME = ''city''

    AND OWNER_THREAD_ID = PS_CURRENT_THREAD_ID()\G

    *************************** 1\. row ***************************

    OBJECT_TYPE: TABLE

    OBJECT_SCHEMA: world

    OBJECT_NAME: city

    COLUMN_NAME: NULL

    OBJECT_INSTANCE_BEGIN: 2639965404080

    LOCK_TYPE: SHARED_READ

    LOCK_DURATION: TRANSACTION

    LOCK_STATUS: GRANTED

    SOURCE: sql_parse.cc:6162

    OWNER_THREAD_ID: 59

    OWNER_EVENT_ID: 10

    1 row in set (0.0006 sec)

    mysql> ROLLBACK;

    Query OK, 0 rows affected (0.0006 sec)

    Listing 2-1

    Example use of the metadata_locks table

    ```


    Here you can see that it is a table level lock on the `world.city` table. It is
    a shared read lock, so other connections can obtain the same lock concurrently.


    If you want to find out why a connection is waiting for its lock request to be
    granted, you need to query the `metadata_locks` table for a row where the `OBJECT_TYPE`,
    `OBJECT_SCHEMA`, and `OBJECT_NAME` are the same as for the pending lock and the
    `LOCK_STATUS` is `GRANTED`. That is, to find all cases of pending locks and what
    is blocking them, you need a query that self-joins the table:


    ```

    SELECT OBJECT_TYPE, OBJECT_SCHEMA, OBJECT_NAME,

    w.OWNER_THREAD_ID AS WAITING_THREAD_ID,

    b.OWNER_THREAD_ID AS BLOCKING_THREAD_ID

    FROM performance_schema.metadata_locks w

    INNER JOIN performance_schema.metadata_locks b

    USING (OBJECT_TYPE, OBJECT_SCHEMA, OBJECT_NAME)

    WHERE w.LOCK_STATUS = ''PENDING''

    AND b.LOCK_STATUS = ''GRANTED'';

    ```


    You can optionally join on other Performance Schema tables such as `events_statements_current`
    to get more information about the connections involved in the lock wait. Alternatively,
    as it will be discussed later, for table metadata locks, you can use the `sys.schema_table_lock_waits`
    view.


    A less frequently used table is `table_handles` which holds information about
    the open table handles including which table locks are currently locked. The `wait/lock/table/sql/handler`
    Performance Schema instrument must be enabled for data to be recorded (this is
    the default). The information available is similar to that of the `metadata_locks`
    table , and Listing [2-2](#502546_1_En_2_Chapter.xhtml#PC3) shows an example of
    an explicit read lock on the `world.city` table. Some of the details will be different
    for you.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               21          61          6

    -- Connection 1

    mysql> LOCK TABLE world.city READ;

    Query OK, 0 rows affected (0.0004 sec)

    mysql> SELECT *

    FROM performance_schema.table_handles

    WHERE OBJECT_SCHEMA = ''world''

    AND OBJECT_NAME = ''city''

    AND OWNER_THREAD_ID = PS_CURRENT_THREAD_ID()\G

    *************************** 1\. row ***************************

    OBJECT_TYPE: TABLE

    OBJECT_SCHEMA: world

    OBJECT_NAME: city

    OBJECT_INSTANCE_BEGIN: 2639971828776

    OWNER_THREAD_ID: 61

    OWNER_EVENT_ID: 8

    INTERNAL_LOCK: NULL

    EXTERNAL_LOCK: READ EXTERNAL

    1 row in set (0.0013 sec)

    mysql> UNLOCK TABLES;

    Query OK, 0 rows affected (0.0004 sec)

    Listing 2-2

    Example of using the table_handles table

    ```


    The `INTERNAL_LOCK` column contains lock information at the SQL level such as
    explicit table locks on non-InnoDB tables, while the `EXTERNAL_LOCK` contains
    lock information at the storage engine level including explicit table locks for
    all tables.


    Unlike the `metadata_locks` table , you cannot use the `table_handles` table to
    investigate lock contentions (but the `metadata_locks` table also includes explicit
    table locks like in this example, so you can use that).


    The `metadata_locks` and `table_handles` tables concern the highest-level locks.
    The next step on the lock granularity latter is data locks which have their own
    tables.'
  trans: '

    ## 性能模式


    性能模式包含了除死锁外大部分可用的锁信息来源。你不仅可以直接使用性能模式中的锁信息，它还被用于 `sys` 模式中的两个与锁相关的视图。此外，你可以使用性能模式来调查底层同步对象，例如互斥锁。下面将首先展示如何调查元数据和表锁。


    ### 元数据与表锁


    元数据锁是高级别锁中最通用的一种，其支持范围广泛的锁，从全局读锁到像访问控制列表（ACL）这样的低级别锁。这些锁通过 `metadata_locks` 表进行监控，该表包含了关于用户级锁、元数据锁等的信息。要记录信息，必须启用
    `wait/lock/metadata/sql/mdl` 性能模式工具（在 MySQL 8 中默认启用）。稍后会有一个示例说明如何启用工具。


    `metadata_locks` 表包含 11 列，总结在表 2-1 中。


    表 2-1：`performance_schema.metadata_locks` 表


    | 列名 | 描述 |

    | --- | --- |

    | `OBJECT_TYPE` | 已持有锁的种类，例如全局读锁的 `GLOBAL`，表和视图的 `TABLE`。附录 A 包含了可能值的完整列表。 |

    | `OBJECT_SCHEMA` | 被锁定对象所属的模式。 |

    | `OBJECT_NAME` | 被锁定对象的名称。 |

    | `COLUMN_NAME` | 对于列级锁，是被锁定列的列名。 |

    | `OBJECT_INSTANCE_BEGIN` | 对象的内存地址。 |

    | `LOCK_TYPE` | 锁的访问级别，例如共享、排他或意向。附录 A 包含了可能值的完整列表。 |

    | `LOCK_DURATION` | 锁的持有时间。支持的值有 `STATEMENT`、`TRANSACTION` 和 `EXPLICIT`。 |

    | `LOCK_STATUS` | 锁的状态。除了已授予和待处理状态外，还可以显示锁请求超时、成为牺牲品等。 |

    | `SOURCE` | 请求锁的源代码位置。 |

    | `OWNER_THREAD_ID` | 请求锁的线程的性能模式线程 ID。 |

    | `OWNER_EVENT_ID` | 请求锁的事件的事件 ID。 |


    该表的主键是 `OBJECT_INSTANCE_BEGIN` 列。


    清单 2-1 展示了一个获取表元数据锁并在 `metadata_locks` 表中查询它的示例。对你来说，某些细节可能会有所不同。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1               19          59          6

    -- 连接 1

    mysql> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    mysql> SELECT * FROM world.city WHERE ID = 130;

    +-----+--------+-------------+-----------------+------------+

    | ID  | Name   | CountryCode | District        | Population |

    +-----+--------+-------------+-----------------+------------+

    | 130 | Sydney | AUS         | New South Wales |    3276207 |

    +-----+--------+-------------+-----------------+------------+

    1 row in set (0.0005 sec)

    mysql> SELECT *

    FROM performance_schema.metadata_locks

    WHERE OBJECT_TYPE = ''TABLE''

    AND OBJECT_SCHEMA = ''world''

    AND OBJECT_NAME = ''city''

    AND OWNER_THREAD_ID = PS_CURRENT_THREAD_ID()\G

    *************************** 1\. row ***************************

    OBJECT_TYPE: TABLE

    OBJECT_SCHEMA: world

    OBJECT_NAME: city

    COLUMN_NAME: NULL

    OBJECT_INSTANCE_BEGIN: 2639965404080

    LOCK_TYPE: SHARED_READ

    LOCK_DURATION: TRANSACTION

    LOCK_STATUS: GRANTED

    SOURCE: sql_parse.cc:6162

    OWNER_THREAD_ID: 59

    OWNER_EVENT_ID: 10

    1 row in set (0.0006 sec)

    mysql> ROLLBACK;

    Query OK, 0 rows affected (0.0006 sec)

    清单 2-1

    metadata_locks 表使用示例

    ```


    在这里你可以看到，这是在 `world.city` 表上的表级锁。它是一个共享读锁，因此其他连接可以并发地获取相同的锁。


    如果你想查明为什么一个连接在等待其锁请求被授予，你需要查询 `metadata_locks` 表，查找 `OBJECT_TYPE`、`OBJECT_SCHEMA`
    和 `OBJECT_NAME` 与待处理锁相同且 `LOCK_STATUS` 为 `GRANTED` 的行。也就是说，要找出所有待处理锁的情况以及是什么阻塞了它们，你需要一个对表进行自连接的查询：


    ```

    SELECT OBJECT_TYPE, OBJECT_SCHEMA, OBJECT_NAME,

    w.OWNER_THREAD_ID AS WAITING_THREAD_ID,

    b.OWNER_THREAD_ID AS BLOCKING_THREAD_ID

    FROM performance_schema.metadata_locks w

    INNER JOIN performance_schema.metadata_locks b

    USING (OBJECT_TYPE, OBJECT_SCHEMA, OBJECT_NAME)

    WHERE w.LOCK_STATUS = ''PENDING''

    AND b.LOCK_STATUS = ''GRANTED'';

    ```


    你可以选择性地连接其他性能模式表，例如 `events_statements_current`，以获取有关参与锁等待的连接的更多信息。或者，正如稍后将讨论的，对于表元数据锁，你可以使用
    `sys.schema_table_lock_waits` 视图。


    一个较少使用的表是 `table_handles`，它保存了关于已打开表句柄的信息，包括当前锁定的表锁。必须启用 `wait/lock/table/sql/handler`
    性能模式工具才能记录数据（这是默认设置）。可用的信息与 `metadata_locks` 表类似，清单 2-2 展示了一个在 `world.city` 表上显式读锁的示例。对你来说，某些细节可能会有所不同。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1               21          61          6

    -- 连接 1

    mysql> LOCK TABLE world.city READ;

    Query OK, 0 rows affected (0.0004 sec)

    mysql> SELECT *

    FROM performance_schema.table_handles

    WHERE OBJECT_SCHEMA = ''world''

    AND OBJECT_NAME = ''city''

    AND OWNER_THREAD_ID = PS_CURRENT_THREAD_ID()\G

    *************************** 1\. row ***************************

    OBJECT_TYPE: TABLE

    OBJECT_SCHEMA: world

    OBJECT_NAME: city

    OBJECT_INSTANCE_BEGIN: 2639971828776

    OWNER_THREAD_ID: 61

    OWNER_EVENT_ID: 8

    INTERNAL_LOCK: NULL

    EXTERNAL_LOCK: READ EXTERNAL

    1 row in set (0.0013 sec)

    mysql> UNLOCK TABLES;

    Query OK, 0 rows affected (0.0004 sec)

    清单 2-2

    使用 table_handles 表的示例

    ```


    `INTERNAL_LOCK` 列包含 SQL 级别的锁信息，例如非 InnoDB 表上的显式表锁，而 `EXTERNAL_LOCK` 则包含存储引擎级别的锁信息，包括所有表的显式表锁。


    与 `metadata_locks` 表不同，你不能使用 `table_handles` 表来调查锁争用（但 `metadata_locks` 表也包含像本例中的显式表锁，因此你可以使用它）。


    `metadata_locks` 和 `table_handles` 表涉及最高级别的锁。在锁粒度阶梯上的下一级是数据锁，它们有自己的表。

    '
- fmt: '### Data Locks


    #### 数据锁概述


    数据锁位于元数据锁和同步对象之间的中等层级。数据锁的特殊之处在于其类型多样，例如记录锁、间隙锁、插入意向锁等，它们之间以复杂的方式相互作用，如第7章所述。这使得用于监控数据锁的表特别有用。


    数据锁信息被拆分为两张表：


    *   `data_locks`：此表包含InnoDB层级的表锁和记录锁的详细信息，显示当前所有已持有或等待中的锁。

    *   `data_lock_waits`：与 `data_locks` 表类似，它显示与InnoDB相关的锁，但仅包括那些等待授予的锁，并提供了关于哪个线程阻塞了请求的信息。


    您经常需要结合使用这两张表来查找有关锁等待的信息。


    MySQL 8 改变了锁监控表的工作方式。在MySQL 5.7及更早版本中，信息存储在信息模式（Information Schema）的两个InnoDB特定视图
    `INNODB_LOCKS` 和 `INNODB_LOCK_WAITS` 中。主要区别在于，Performance Schema表的设计是存储引擎无关的，并且始终提供所有锁的信息；而在MySQL
    5.7及更早版本中，只暴露涉及锁等待的锁信息。所有锁始终可供调查，这使得MySQL 8的这些表对于学习锁机制更加有用。


    #### `data_locks` 表


    `data_locks` 表是包含每个锁详细信息的主表。该表有15列，如表2-2所述。


    **表 2-2 `performance_schema.data_locks` 表**


    | 列名 | 描述 |

    | --- | --- |

    | `ENGINE` | 数据的存储引擎。对于MySQL Server，这始终是InnoDB。 |

    | `ENGINE_LOCK_ID` | 存储引擎使用的锁的内部ID。不应依赖此ID具有特定格式。 |

    | `ENGINE_TRANSACTION_ID` | 存储引擎特定的事务ID。对于InnoDB，您可以使用此ID与`information_schema.INNODB_TRX`视图中的`trx_id`列进行连接。不应依赖此ID具有特定格式，且此ID在事务期间可能会发生变化。
    |

    | `THREAD_ID` | 发出锁请求的线程在Performance Schema中的线程ID。 |

    | `EVENT_ID` | 发出锁请求的事件在Performance Schema中的事件ID。您可以使用此ID与多个`events_%`表进行连接，以查找有关触发锁请求的更多信息。
    |

    | `OBJECT_SCHEMA` | 锁请求对象的所属模式。 |

    | `OBJECT_NAME` | 锁请求对象的名称。 |

    | `PARTITION_NAME` | 对于涉及分区的锁，分区的名称。 |

    | `SUBPARTITION_NAME` | 对于涉及子分区的锁，子分区的名称。 |

    | `INDEX_NAME` | 对于涉及索引的锁，索引的名称。由于在InnoDB中一切都是索引，因此对于InnoDB表上的记录级锁，索引名称始终被设置。如果行被锁定，该值将为`PRIMARY`或`GEN_CLUST_INDEX`，具体取决于您是否有显式主键，或者表是否使用了隐藏的聚簇索引。
    |

    | `OBJECT_INSTANCE_BEGIN` | 锁请求的内存地址。 |

    | `LOCK_TYPE` | 锁请求的级别。对于InnoDB，可能的值是`TABLE`和`RECORD`。 |

    | `LOCK_MODE` | 使用的锁定模式。这包括是共享锁还是排他锁，以及锁的更精细细节，例如`REC_NOT_GAP`表示记录锁但非间隙锁。 |

    | `LOCK_STATUS` | 锁是否处于等待中（`WAITING`）或已被授予（`GRANTED`）。 |

    | `LOCK_DATA` | 有关被锁定数据的信息。例如，可以是锁定索引记录的索引值。 |


    该表的主键是(`ENGINE_LOCK_ID`, `ENGINE`)。


    获取两个锁并查询`data_locks`表的示例如代码清单2-3所示。诸如ID和内存地址之类的信息在您的环境中会有所不同。


    ```sql

    -- 连接   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               23          64          6

    -- 连接 1

    mysql> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    mysql> SELECT *

    FROM world.city

    WHERE ID = 130

    FOR SHARE;

    +-----+--------+-------------+-----------------+------------+

    | ID  | Name   | CountryCode | District        | Population |

    +-----+--------+-------------+-----------------+------------+

    | 130 | Sydney | AUS         | New South Wales |    3276207 |

    +-----+--------+-------------+-----------------+------------+

    1 row in set (0.0068 sec)

    mysql> SELECT *

    FROM performance_schema.data_locks

    WHERE THREAD_ID = PS_CURRENT_THREAD_ID()\G

    *************************** 1. row ***************************

    ENGINE: INNODB

    ENGINE_LOCK_ID: 2639727636640:3165:2639690712184

    ENGINE_TRANSACTION_ID: 284114704347296

    THREAD_ID: 64

    EVENT_ID: 10

    OBJECT_SCHEMA: world

    OBJECT_NAME: city

    PARTITION_NAME: NULL

    SUBPARTITION_NAME: NULL

    INDEX_NAME: NULL

    OBJECT_INSTANCE_BEGIN: 2639690712184

    LOCK_TYPE: TABLE

    LOCK_MODE: IS

    LOCK_STATUS: GRANTED

    LOCK_DATA: NULL

    *************************** 2. row ***************************

    ENGINE: INNODB

    ENGINE_LOCK_ID: 2639727636640:1926:6:131:2639690709400

    ENGINE_TRANSACTION_ID: 284114704347296

    THREAD_ID: 64

    EVENT_ID: 10

    OBJECT_SCHEMA: world

    OBJECT_NAME: city

    PARTITION_NAME: NULL

    SUBPARTITION_NAME: NULL

    INDEX_NAME: PRIMARY

    OBJECT_INSTANCE_BEGIN: 2639690709400

    LOCK_TYPE: RECORD

    LOCK_MODE: S,REC_NOT_GAP

    LOCK_STATUS: GRANTED

    LOCK_DATA: 130

    2 rows in set (0.0018 sec)

    mysql> ROLLBACK;

    Query OK, 0 rows affected (0.0007 sec)

    ```

    **代码清单 2-3 使用 `data_locks` 表**


    在此示例中，查询在`world.city`表上获取了一个插入意向（`IS`）锁，并在主键值130上获取了一个共享（`S`）记录锁，但非间隙锁（`REC_NOT_GAP`）。


    #### `data_lock_waits` 表


    `data_lock_waits` 表更简单，因为它只包含当前锁争用情况的基本信息，如表2-3所示。


    **表 2-3 `performance_schema.data_lock_waits` 表**


    | 列名 | 描述 |

    | --- | --- |

    | `ENGINE` | 发生锁争用的存储引擎。 |

    | `REQUESTING_ENGINE_LOCK_ID` | 等待中的锁的`ENGINE_LOCK_ID`。 |

    | `REQUESTING_ENGINE_TRANSACTION_ID` | 等待中的锁的`ENGINE_TRANSACTION_ID`。 |

    | `REQUESTING_THREAD_ID` | 等待中的锁的`THREAD_ID`。 |

    | `REQUESTING_EVENT_ID` | 等待中的锁的`EVENT_ID`。 |

    | `REQUESTING_OBJECT_INSTANCE_BEGIN` | 等待中的锁的`OBJECT_INSTANCE_BEGIN`。 |

    | `BLOCKING_ENGINE_LOCK_ID` | 阻塞锁的`ENGINE_LOCK_ID`。 |

    | `BLOCKING_ENGINE_TRANSACTION_ID` | 阻塞锁的`ENGINE_TRANSACTION_ID`。 |

    | `BLOCKING_THREAD_ID` | 阻塞锁的`THREAD_ID`。 |

    | `BLOCKING_EVENT_ID` | 阻塞锁的`EVENT_ID`。 |

    | `BLOCKING_OBJECT_INSTANCE_BEGIN` | 阻塞锁的`OBJECT_INSTANCE_BEGIN`。 |


    该表没有主键。其主要目的是提供一种简单的方法来确定涉及锁争用的等待和阻塞锁请求。然后，您可以使用`REQUESTING_ENGINE_TRANSACTION_ID`和`BLOCKING_ENGINE_TRANSACTION_ID`列与`data_locks`表以及其他表进行连接，以获取更多信息。`sys.innodb_lock_waits`视图就是一个很好的例子。


    到目前为止，讨论的Performance Schema表都是针对由执行语句直接导致的锁。在高并发情况下，监控更底层的同步等待也很重要。'
  raw: '### Data Locks


    Data locks are at the medium level between the metadata locks and the synchronization
    objects. What makes data locks special is that you have a large variety of lock
    types such as record locks, gap locks, insert intention locks, etc. that interact
    in complex ways as described in Chapter [7](#502546_1_En_7_Chapter.xhtml). This
    makes the monitoring tables for data locks particularly useful.


    The data lock information is split into two tables:


    *   **data_locks:** This table contains details of table and records locks at
    the InnoDB level. It shows all locks currently held or are pending.


    *   **data_lock_waits** **:** Like the `data_locks` table , it shows locks related
    to InnoDB, but only those waiting to be granted with information on which thread
    is blocking the request.


    You will often use these in combination to find information about lock waits.


    MySQL 8 has seen a change in the way that the lock monitoring tables work. In
    MySQL 5.7 and earlier, the information was available in two InnoDB-specific views
    in the Information Schema, `INNODB_LOCKS` and `INNODB_LOCK_WAITS` . The major
    differences are that the Performance Schema tables are created to be storage engine
    agnostic and information about all locks are always made available, whereas in
    MySQL 5.7 and earlier, only information about locks involved in lock waits were
    exposed. That all locks are always available for investigation makes the MySQL
    8 tables much more useful to learn about locks.


    The `data_locks` table is the main table with detailed information about each
    lock. The table has 15 columns as described in Table [2-2](#502546_1_En_2_Chapter.xhtml#Tab2).


    Table 2-2


    The  `performance_schema.data_locks` table


    | Column Name | Description |

    | --- | --- |

    | `ENGINE` | The storage engine for the data. For MySQL Server, this will always
    be InnoDB. |

    | `ENGINE_LOCK_ID` | The internal id of the lock as used by the storage engine.
    You should not rely on the id having a particular format. |

    | `ENGINE_TRANSACTION_ID` | The transaction id specific to the storage engine.
    For InnoDB, you can use this id to join on the `trx_id` column in the `information_schema.INNODB_TRX`
    view. You should not rely on the id having a particular format, and the id may
    change in the duration of a transaction. |

    | `THREAD_ID` | The Performance Schema thread id of the thread that made the lock
    request. |

    | `EVENT_ID` | The Performance Schema event id of the event that made the lock
    request. You can use this id to join with several of the `events_%` tables to
    find more information on what triggered the lock request. |

    | `OBJECT_SCHEMA` | The schema the object that is subject of the lock request
    is in. |

    | `OBJECT_NAME` | The name of the object that is subject of the lock request.
    |

    | `PARTITION_NAME` | For locks involving partitions, the name of the partition.
    |

    | `SUBPARTITION_NAME` | For locks involving subpartitions, the name of the subpartition.
    |

    | `INDEX_NAME` | For locks involving indexes, the name of the index. Since everything
    is an index for InnoDB, the index name is always set for record level locks on
    InnoDB tables. If the row is locked, the value will be `PRIMARY` or `GEN_CLUST_INDEX`
    depending on whether you have an explicit primary key or the table used a hidden
    clustered index. |

    | `OBJECT_INSTANCE_BEGIN` | The memory address of the lock request. |

    | `LOCK_TYPE` | The level of the lock request. For InnoDB, the possible values
    are `TABLE` and `RECORD`. |

    | `LOCK_MODE` | The locking mode used. This includes whether it is a shared or
    exclusive lock and the finer details of the lock, for example, `REC_NOT_GAP` for
    a record lock but no gap lock. |

    | `LOCK_STATUS` | Whether the lock is pending (`WAITING`) or has been granted
    (`GRANTED`). |

    | `LOCK_DATA` | Information about the data that is locked. This can, for example,
    be the index value of the locked index record. |


    The primary key of the table is (`ENGINE_LOCK_ID`, `ENGINE`).


    An example of acquiring two locks and querying the `data_locks` table is shown
    in Listing [2-3](#502546_1_En_2_Chapter.xhtml#PC4). Information such as the ids
    and the memory address will differ for you.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               23          64          6

    -- Connection 1

    mysql> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    mysql> SELECT *

    FROM world.city

    WHERE ID = 130

    FOR SHARE;

    +-----+--------+-------------+-----------------+------------+

    | ID  | Name   | CountryCode | District        | Population |

    +-----+--------+-------------+-----------------+------------+

    | 130 | Sydney | AUS         | New South Wales |    3276207 |

    +-----+--------+-------------+-----------------+------------+

    1 row in set (0.0068 sec)

    mysql> SELECT *

    FROM performance_schema.data_locks

    WHERE THREAD_ID = PS_CURRENT_THREAD_ID()\G

    *************************** 1\. row ***************************

    ENGINE: INNODB

    ENGINE_LOCK_ID: 2639727636640:3165:2639690712184

    ENGINE_TRANSACTION_ID: 284114704347296

    THREAD_ID: 64

    EVENT_ID: 10

    OBJECT_SCHEMA: world

    OBJECT_NAME: city

    PARTITION_NAME: NULL

    SUBPARTITION_NAME: NULL

    INDEX_NAME: NULL

    OBJECT_INSTANCE_BEGIN: 2639690712184

    LOCK_TYPE: TABLE

    LOCK_MODE: IS

    LOCK_STATUS: GRANTED

    LOCK_DATA: NULL

    *************************** 2\. row ***************************

    ENGINE: INNODB

    ENGINE_LOCK_ID: 2639727636640:1926:6:131:2639690709400

    ENGINE_TRANSACTION_ID: 284114704347296

    THREAD_ID: 64

    EVENT_ID: 10

    OBJECT_SCHEMA: world

    OBJECT_NAME: city

    PARTITION_NAME: NULL

    SUBPARTITION_NAME: NULL

    INDEX_NAME: PRIMARY

    OBJECT_INSTANCE_BEGIN: 2639690709400

    LOCK_TYPE: RECORD

    LOCK_MODE: S,REC_NOT_GAP

    LOCK_STATUS: GRANTED

    LOCK_DATA: 130

    2 rows in set (0.0018 sec)

    mysql> ROLLBACK;

    Query OK, 0 rows affected (0.0007 sec)

    Listing 2-3

    Using the data_locks table

    ```


    In this example, the query obtains an insert intention (`IS`) lock on the `world.city`
    table and a shared (`S`) record, but not gap, lock (`REC NOT_GAP`) on the primary
    key with the value 130.


    The `data_lock_waits` table is simpler as it just includes the basic information
    about current cases of lock contention as shown in Table [2-3](#502546_1_En_2_Chapter.xhtml#Tab3).


    Table 2-3


    The `performance_schema.data_lock_waits` table


    | Column Name | Description |

    | --- | --- |

    | `ENGINE` | The storage engine where the lock contention occurs. |

    | `REQUESTING_ENGINE_LOCK_ID` | The `ENGINE_LOCK_ID` for the pending lock. |

    | `REQUESTING_ENGINE_TRANSACTION_ID` | The `ENGINE_TRANSACTION_ID` for the pending
    lock. |

    | `REQUESTING_THREAD_ID` | The `THREAD_ID` for the pending lock. |

    | `REQUESTING_EVENT_ID` | The `EVENT_ID` for the pending lock. |

    | `REQUESTING_OBJECT_INSTANCE_BEGIN` | The `OBJECT_INSTANCE_BEGIN` for the pending
    lock. |

    | `BLOCKING_ENGINE_LOCK_ID` | The `ENGINE_LOCK_ID` for the blocking lock. |

    | `BLOCKING_ENGINE_TRANSACTION_ID` | The `ENGINE_TRANSACTION_ID` for the blocking
    lock. |

    | `BLOCKING_THREAD_ID` | The `THREAD_ID` for the blocking lock. |

    | `BLOCKING_EVENT_ID` | The `EVENT_ID` for the blocking lock. |

    | `BLOCKING_OBJECT_INSTANCE_BEGIN` | The `OBJECT_INSTANCE_BEGIN` for the blocking
    lock. |


    The table does not have a primary key. The primary purpose of the table is to
    provide a simple way to determine the pending and blocking lock requests involved
    in lock contention. You can then join on the `data_locks` table using the `REQUESTING_ENGINE_TRANSACTION_ID`
    and `BLOCKING_ENGINE_TRANSACTION_ID` columns as well as to other tables to obtain
    more information. A good example of this is the `sys.innodb_lock_waits` view.


    This far, the Performance Schema tables that have been discussed have been for
    locks that are directly a result of the statements that are executed. There are
    also lower-level synchronization waits that are important to monitor in high-concurrency
    situations.'
  trans: '

    ### 数据锁


    #### 数据锁概述


    数据锁位于元数据锁和同步对象之间的中等层级。数据锁的特殊之处在于其类型多样，例如记录锁、间隙锁、插入意向锁等，它们之间以复杂的方式相互作用，如第 7 章所述。这使得用于监控数据锁的表特别有用。


    数据锁信息被拆分为两张表：


    *   `data_locks`：此表包含 InnoDB 层级的表锁和记录锁的详细信息，显示当前所有已持有或等待中的锁。

    *   `data_lock_waits`：与 `data_locks` 表类似，它显示与 InnoDB 相关的锁，但仅包括那些等待授予的锁，并提供了关于哪个线程阻塞了请求的信息。


    您经常需要结合使用这两张表来查找有关锁等待的信息。


    MySQL 8 改变了锁监控表的工作方式。在 MySQL 5.7 及更早版本中，信息存储在信息模式（Information Schema）的两个 InnoDB
    特定视图 `INNODB_LOCKS` 和 `INNODB_LOCK_WAITS` 中。主要区别在于，Performance Schema 表的设计是存储引擎无关的，并且始终提供所有锁的信息；而在
    MySQL 5.7 及更早版本中，只暴露涉及锁等待的锁信息。所有锁始终可供调查，这使得 MySQL 8 的这些表对于学习锁机制更加有用。


    #### `data_locks` 表


    `data_locks` 表是包含每个锁详细信息的主表。该表有 15 列，如表 2-2 所述。


    **表 2-2 `performance_schema.data_locks` 表**


    | 列名 | 描述 |

    | --- | --- |

    | `ENGINE` | 数据的存储引擎。对于 MySQL Server，这始终是 InnoDB。 |

    | `ENGINE_LOCK_ID` | 存储引擎使用的锁的内部 ID。不应依赖此 ID 具有特定格式。 |

    | `ENGINE_TRANSACTION_ID` | 存储引擎特定的事务 ID。对于 InnoDB，您可以使用此 ID 与`information_schema.INNODB_TRX`视图中的`trx_id`列进行连接。不应依赖此
    ID 具有特定格式，且此 ID 在事务期间可能会发生变化。 |

    | `THREAD_ID` | 发出锁请求的线程在 Performance Schema 中的线程 ID。 |

    | `EVENT_ID` | 发出锁请求的事件在 Performance Schema 中的事件 ID。您可以使用此 ID 与多个`events_%`表进行连接，以查找有关触发锁请求的更多信息。
    |

    | `OBJECT_SCHEMA` | 锁请求对象的所属模式。 |

    | `OBJECT_NAME` | 锁请求对象的名称。 |

    | `PARTITION_NAME` | 对于涉及分区的锁，分区的名称。 |

    | `SUBPARTITION_NAME` | 对于涉及子分区的锁，子分区的名称。 |

    | `INDEX_NAME` | 对于涉及索引的锁，索引的名称。由于在 InnoDB 中一切都是索引，因此对于 InnoDB 表上的记录级锁，索引名称始终被设置。如果行被锁定，该值将为`PRIMARY`或`GEN_CLUST_INDEX`，具体取决于您是否有显式主键，或者表是否使用了隐藏的聚簇索引。
    |

    | `OBJECT_INSTANCE_BEGIN` | 锁请求的内存地址。 |

    | `LOCK_TYPE` | 锁请求的级别。对于 InnoDB，可能的值是`TABLE`和`RECORD`。 |

    | `LOCK_MODE` | 使用的锁定模式。这包括是共享锁还是排他锁，以及锁的更精细细节，例如`REC_NOT_GAP`表示记录锁但非间隙锁。 |

    | `LOCK_STATUS` | 锁是否处于等待中（`WAITING`）或已被授予（`GRANTED`）。 |

    | `LOCK_DATA` | 有关被锁定数据的信息。例如，可以是锁定索引记录的索引值。 |


    该表的主键是(`ENGINE_LOCK_ID`, `ENGINE`)。


    获取两个锁并查询`data_locks`表的示例如代码清单 2-3 所示。诸如 ID 和内存地址之类的信息在您的环境中会有所不同。


    ```sql

    -- 连接   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               23          64          6

    -- 连接 1

    mysql> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    mysql> SELECT *

    FROM world.city

    WHERE ID = 130

    FOR SHARE;

    +-----+--------+-------------+-----------------+------------+

    | ID  | Name   | CountryCode | District        | Population |

    +-----+--------+-------------+-----------------+------------+

    | 130 | Sydney | AUS         | New South Wales |    3276207 |

    +-----+--------+-------------+-----------------+------------+

    1 row in set (0.0068 sec)

    mysql> SELECT *

    FROM performance_schema.data_locks

    WHERE THREAD_ID = PS_CURRENT_THREAD_ID()\G

    *************************** 1. row ***************************

    ENGINE: INNODB

    ENGINE_LOCK_ID: 2639727636640:3165:2639690712184

    ENGINE_TRANSACTION_ID: 284114704347296

    THREAD_ID: 64

    EVENT_ID: 10

    OBJECT_SCHEMA: world

    OBJECT_NAME: city

    PARTITION_NAME: NULL

    SUBPARTITION_NAME: NULL

    INDEX_NAME: NULL

    OBJECT_INSTANCE_BEGIN: 2639690712184

    LOCK_TYPE: TABLE

    LOCK_MODE: IS

    LOCK_STATUS: GRANTED

    LOCK_DATA: NULL

    *************************** 2. row ***************************

    ENGINE: INNODB

    ENGINE_LOCK_ID: 2639727636640:1926:6:131:2639690709400

    ENGINE_TRANSACTION_ID: 284114704347296

    THREAD_ID: 64

    EVENT_ID: 10

    OBJECT_SCHEMA: world

    OBJECT_NAME: city

    PARTITION_NAME: NULL

    SUBPARTITION_NAME: NULL

    INDEX_NAME: PRIMARY

    OBJECT_INSTANCE_BEGIN: 2639690709400

    LOCK_TYPE: RECORD

    LOCK_MODE: S,REC_NOT_GAP

    LOCK_STATUS: GRANTED

    LOCK_DATA: 130

    2 rows in set (0.0018 sec)

    mysql> ROLLBACK;

    Query OK, 0 rows affected (0.0007 sec)

    ```

    **代码清单 2-3 使用 `data_locks` 表**


    在此示例中，查询在`world.city`表上获取了一个插入意向（`IS`）锁，并在主键值 130 上获取了一个共享（`S`）记录锁，但非间隙锁（`REC_NOT_GAP`）。


    #### `data_lock_waits` 表


    `data_lock_waits` 表更简单，因为它只包含当前锁争用情况的基本信息，如表 2-3 所示。


    **表 2-3 `performance_schema.data_lock_waits` 表**


    | 列名 | 描述 |

    | --- | --- |

    | `ENGINE` | 发生锁争用的存储引擎。 |

    | `REQUESTING_ENGINE_LOCK_ID` | 等待中的锁的`ENGINE_LOCK_ID`。 |

    | `REQUESTING_ENGINE_TRANSACTION_ID` | 等待中的锁的`ENGINE_TRANSACTION_ID`。 |

    | `REQUESTING_THREAD_ID` | 等待中的锁的`THREAD_ID`。 |

    | `REQUESTING_EVENT_ID` | 等待中的锁的`EVENT_ID`。 |

    | `REQUESTING_OBJECT_INSTANCE_BEGIN` | 等待中的锁的`OBJECT_INSTANCE_BEGIN`。 |

    | `BLOCKING_ENGINE_LOCK_ID` | 阻塞锁的`ENGINE_LOCK_ID`。 |

    | `BLOCKING_ENGINE_TRANSACTION_ID` | 阻塞锁的`ENGINE_TRANSACTION_ID`。 |

    | `BLOCKING_THREAD_ID` | 阻塞锁的`THREAD_ID`。 |

    | `BLOCKING_EVENT_ID` | 阻塞锁的`EVENT_ID`。 |

    | `BLOCKING_OBJECT_INSTANCE_BEGIN` | 阻塞锁的`OBJECT_INSTANCE_BEGIN`。 |


    该表没有主键。其主要目的是提供一种简单的方法来确定涉及锁争用的等待和阻塞锁请求。然后，您可以使用`REQUESTING_ENGINE_TRANSACTION_ID`和`BLOCKING_ENGINE_TRANSACTION_ID`列与`data_locks`表以及其他表进行连接，以获取更多信息。`sys.innodb_lock_waits`视图就是一个很好的例子。


    到目前为止，讨论的 Performance Schema 表都是针对由执行语句直接导致的锁。在高并发情况下，监控更底层的同步等待也很重要。

    '
- fmt: '### Synchronization Waits


    #### 挑战与概述


    The synchronization waits are the most difficult to monitor for several reasons.
    They occur very frequently, usually at a very short duration, and monitoring them
    has a high overhead. Instrumentation of the synchronization waits is also not
    enabled by default.


    #### 类别划分


    The synchronization waits are split into five categories:


    *   **cond:** Conditions used in thread to thread signals.

    *   **mutex:** A mutual exclusion point that protects code parts or other resources.

    *   **prlock:** A priority read/write lock.

    *   **rwlock:** A read/write lock used to limit concurrent access to specific
    variables, for example, for changing the `gtid_mode` system variable.

    *   **sxlock:** A shared-exclusive read/write lock. This is currently only used
    by InnoDB, for example, to improve the scalability of the B-tree searches.


    #### 监控配置


    The instrument names for the synchronization waits start with `wait/synch/` followed
    by the name of the category, the area the wait belongs to (such as `sql` or `innodb`),
    and the name of the wait. For example, the mutex guarding the InnoDB double write
    buffer has the name `wait/synch/mutex/innodb/dblwr_mutex`.


    You enable the instrumentation of the synchronization waits by setting the `ENABLED`
    and optionally the `TIMED` columns in the `performance_schema.setup_instruments`
    table for the instruments you want to monitor. Additionally, you will need to
    enable `events_waits_current` and optionally `events_waits_history` and/or `events_waits_history_long`
    in `performance_schema.setup_consumers`. For example, to monitor the mutex on
    the InnoDB double write buffer:


    ```sql

    mysql> UPDATE performance_schema.setup_instruments

    SET ENABLED = ''YES'',

    TIMED = ''YES''

    WHERE NAME = ''wait/synch/mutex/innodb/dblwr_mutex'';

    Query OK, 1 row affected (0.0011 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    mysql> UPDATE performance_schema.setup_consumers

    SET ENABLED = ''YES''

    WHERE NAME = ''events_waits_current'';

    Query OK, 1 row affected (0.0005 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    ```


    In general, it is better to enable monitoring of synchronization instruments in
    the configuration file to ensure they are properly set up from the time MySQL
    starts up:


    ```ini

    [mysqld]

    performance_schema_instrument = wait/synch/mutex/innodb/dblwr_mutex=ON

    performance_schema_consumer_events_waits_current = ON

    ```


    Then restart MySQL.


    > **Caution**

    >

    > Be very careful in enabling instrumentation of the synchronization waits and
    the corresponding consumers on production systems. Doing so can cause a high enough
    overhead that you will effectively have an outage. The more that are enabled,
    the higher overhead and the more likely the monitoring interferes with the measurements,
    so the conclusions are wrong.


    #### 监控表的使用


    You can now monitor the waits using one of the `events_waits_%` tables:


    *   **events_waits_current:** The current ongoing or last completed wait events
    for each existing thread. This requires the `events_waits_current` consumer to
    be enabled.

    *   **events_waits_history:** The last ten (the `performance_schema_events_waits_history_size`
    option) wait events for each existing thread. This requires the `events_waits_history`
    consumer to be enabled in addition to the `events_waits_current` consumer.

    *   **events_waits_history_long:** The last 10,000 (the `performance_schema_events_waits_history_long_size`
    option) events globally, including for threads that no longer exist. This requires
    the `events_waits_history_long` consumer to be enabled in addition to the `events_waits_current`
    consumer.

    *   **events_waits_summary_by_account_by_event_name:** The wait events grouped
    by the username and hostname of the accounts (also called actors in the Performance
    Schema).

    *   **events_waits_summary_by_host_by_event_name:** The wait events grouped by
    the hostname of the account triggering the event and event name.

    *   **events_waits_summary_by_instance:** The wait events grouped by the event
    name as well as the memory address (`OBJECT_INSTANCE_BEGIN`) of the object. This
    is useful for events with more than one instance to monitor whether the waits
    are evenly distributed among the instances. An example is the table cache mutex
    (`wait/synch/mutex/sql/LOCK_table_cache`) which has one object per table cache
    instance (`table_open_cache_instances`).

    *   **events_waits_summary_by_thread_by_event_name:** The wait events for currently
    existing threads grouped by the thread id and event name.

    *   **events_waits_summary_by_user_by_event_name:** The wait events grouped by
    the username of the account triggering the event and event name.

    *   **events_waits_summary_global_by_event_name:** The wait events grouped by
    the event names. This table is useful to get an overview of how much time is spent
    waiting for a given type of event.


    Given how short lived a synchronization wait normally is and how frequently they
    are encountered, the summary tables are usually the most useful for investigating
    waits using the Performance Schema. That said, since the relevant wait instruments
    are not enabled by default and they have relatively high overhead when monitoring
    them, usually the semaphore section of the InnoDB monitor or the `SHOW ENGINE
    INNODB MUTEX` statement as described later in this chapter is used for InnoDB
    mutexes and semaphores. The exception is when you want to investigate a specific
    contention issue.


    Another useful way to use the Performance Schema for lock analysis is to query
    for the errors that statements are encountering.'
