    3805）和 130（`80000082`）的行持有的排他锁。


    ### 提示

    如今，InnoDB 监视器输出中的锁信息最好从 `performance_schema.data_locks` 和 `performance_schema.data_lock_waits`
    表中获取。然而，死锁信息仍然非常有用。


    您可以通过启用 `innodb_status_output` 选项，请求每 15 秒将监视器输出转储到 stderr。请注意，输出量相当大，因此如果您启用了它，请做好错误日志快速增长的准备。InnoDB
    监视器输出也很容易隐藏有关更严重问题的消息。当某些条件适用时（例如，当 InnoDB 在缓冲池中难以找到空闲块或存在长时间的信号量等待时），InnoDB 也会自动将监视器输出到错误日志。


    如果您想确保记录所有死锁，可以启用 `innodb_print_all_deadlocks` 选项。这会导致每次发生死锁时，将类似 InnoDB 监视器输出中的死锁信息打印到错误日志中。如果您需要调查死锁，这可能很有用，但建议仅在需要时启用它，以避免错误日志变得非常大并可能隐藏其他问题。


    ### 注意

    如果您启用 InnoDB 监视器的定期输出或所有死锁的信息，请务必小心。该信息很容易隐藏记录到错误日志中的重要消息。


    InnoDB 监视器输出的顶部包含有关信号量等待的信息，这是最后一个要讨论的监控类别。'
- fmt: '## InnoDB Mutexes and Semaphores


    InnoDB uses mutual exclusion objects (better known as mutexes)^([¹](#fn1)) and
    semaphores to guard code paths, for example, to avoid race conditions when updating
    the buffer pool. There are three resources available for monitoring mutexes in
    MySQL of which two have already been encountered. The most generic tool is the
    synchronization waits in the `Performance Schema`; however, they are not enabled
    by default and can cause performance problems to have enabled. This section focuses
    on the two other resources that are specific to InnoDB.


    ### Note


    In InnoDB monitoring there is no clear distinction between mutexes and semaphores.


    As seen in the previous section, the InnoDB monitor output contains a semaphores
    section which shows some general statistics as well as currently waiting semaphores.
    Listing [2-9](#502546_1_En_2_Chapter.xhtml#PC14) shows an example of the semaphores
    section with ongoing waits. (It is not trivial to generate semaphore waits on
    demand, so reproduction steps have not been included. See Chapter [18](#502546_1_En_18_Chapter.xhtml)
    for an example of a workload that is likely to cause semaphore waits.)


    ```

    SEMAPHORES


    OS WAIT ARRAY INFO: reservation count 831

    --Thread 28544 has waited at buf0buf.cc line 4637 for 0 seconds the semaphore:

    Mutex at 000001F1AD24D5E8, Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock
    var 1

    --Thread 10676 has waited at buf0flu.cc line 1639 for 1 seconds the semaphore:

    Mutex at 000001F1AD24D5E8, Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock
    var 1

    --Thread 10900 has waited at buf0lru.cc line 1051 for 0 seconds the semaphore:

    Mutex at 000001F1AD24D5E8, Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock
    var 1

    --Thread 28128 has waited at buf0buf.cc line 2797 for 1 seconds the semaphore:

    Mutex at 000001F1AD24D5E8, Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock
    var 1

    --Thread 33584 has waited at buf0buf.cc line 2945 for 0 seconds the semaphore:

    Mutex at 000001F1AD24D5E8, Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock
    var 1

    OS WAIT ARRAY INFO: signal count 207

    RW-shared spins 51, rounds 86, OS waits 35

    RW-excl spins 39, rounds 993, OS waits 35

    RW-sx spins 30, rounds 862, OS waits 25

    Spin rounds per wait: 1.69 RW-shared, 25.46 RW-excl, 28.73 RW-sx

    Listing 2-9

    The InnoDB monitor semaphores section

    ```


    In this case the first wait is in `buf0buf.cc` line 4637 which refers to the source
    code file name and line number where the mutex is requested. The line number depends
    on the release number you are using, and the compiler/platform can even make line
    number change by one. The `buf0buf.cc` refers to which contains the following
    code in MySQL 8.0.21 around line 4637 (the line number is prefixed each line):


    ```

    4577 /** Inits a page for read to the buffer buf_pool. If the page is

    4578 (1) already in buf_pool, or

    4579 (2) if we specify to read only ibuf pages and the page is not an ibuf page,
    or

    4580 (3) if the space is deleted or being deleted,

    4581 then this function does nothing.

    4582 Sets the io_fix flag to BUF_IO_READ and sets a non-recursive exclusive lock

    4583 on the buffer frame. The io-handler must take care that the flag is cleared

    4584 and the lock released later.

    4585 @param[out]     err                     DB_SUCCESS or DB_TABLESPACE_DELETED

    4586 @param[in]      mode                    BUF_READ_IBUF_PAGES_ONLY, ...

    4587 @param[in]      page_id                 page id

    4588 @param[in]      page_size               page size

    4589 @param[in]      unzip                   TRUE=request uncompressed page

    4590 @return pointer to the block or NULL */

    4591 buf_page_t *buf_page_init_for_read(dberr_t *err, ulint mode,

    4592                                    const page_id_t &page_id,

    4593                                    const page_size_t &page_size, ibool unzip)
    {

    ...

    4637   mutex_enter(&buf_pool->LRU_list_mutex);

    ...

    ```


    The function is trying to read a page into the buffer pool and in line 4637 requests
    the mutex on the LRU list of the buffer pool. This mutex was created in `buf0buf.cc:1228`
    (also seen from the semaphores section). It is the same mutex that all the waits
    are for, but in different parts of the source. So, this means that there is contention
    maintaining the least recently used list of the InnoDB buffer pool. (The waits
    in this case were created by having `innodb_buffer_pool_size = 5M` while executing
    concurrent queries on an almost 2 GiB large table.)


    Thus, it is in general necessary to reference the source code when investigating
    semaphore waits. That said, the file name is a good hint in what part of the code
    the contention is, for example, `buf0buf.cc` is related to the buffer pool, and
    `buf0flu.cc` is related to the buffer pool flushing algorithm.


    The semaphores section is useful to see the waits that are ongoing, but it is
    of little use when monitoring over time. For that the InnoDB mutex monitor is
    a better option. You access the mutex monitor using the `SHOW ENGINE INNODB MUTEX`
    statement:


    ```

    mysql> SHOW ENGINE INNODB MUTEX;

    +--------+------------------------------+------------+

    | Type   | Name                         | Status     |

    +--------+------------------------------+------------+

    | InnoDB | rwlock: dict0dict.cc:2455    | waits=748  |

    | InnoDB | rwlock: dict0dict.cc:2455    | waits=171  |

    | InnoDB | rwlock: fil0fil.cc:3206      | waits=38   |

    | InnoDB | rwlock: sync0sharded_rw.h:72 | waits=1    |

    | InnoDB | rwlock: sync0sharded_rw.h:72 | waits=1    |

    | InnoDB | rwlock: sync0sharded_rw.h:72 | waits=1    |

    | InnoDB | sum rwlock: buf0buf.cc:778   | waits=2436 |

    +--------+------------------------------+------------+

    7 rows in set (0.0111 sec)

    ```


    The file name and line number refers to where the mutex is created. The mutex
    monitor is not the most user-friendly tool in MySQL as each mutex may be present
    multiple times and the waits cannot be summed without parsing the output. However,
    it is enabled by default, so you can use it at any time.


    ### Note


    `SHOW ENGINE INNODB MUTEX` only includes mutexes and rw-lock semaphores that has
    had at least one OS wait.


    The collection of mutex information is enabled and disabled using the `latch`
    InnoDB metric (which is hidden, so you cannot see the current value). There is
    usually no reason to disable the `latch` metric.'
