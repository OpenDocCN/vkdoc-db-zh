- fmt: '## The Solution


    The solution depends on the extent of the lock waits. If it is a few queries having
    short lock waits, it may very well be acceptable to just let the affected queries
    wait for the lock to become available. Remember locks are there to ensure the
    integrity of the data, so locks are not inherently a problem. Locks are only a
    problem when they cause a significant impact on the performance or cause queries
    to fail to an extent where it is not feasible to retry them.


    If the lock situation lasts for an extended period – particularly if the blocking
    transaction has been abandoned – you can consider killing the blocking transaction.
    As always you need to consider that the rollback may take a significant amount
    of time if the blocking transaction has performed a large amount of work.


    For queries that fail because of a lock wait timeout error, the application should
    retry them. Remember that by default a lock wait timeout only rolls back the query
    that was executing when the timeout occurred. The rest of the transaction is left
    as it were before the query. A failure to handle the timeout may thus leave an
    unfinished transaction with its own locks that can cause further lock issues.
    Whether just the query or the whole transaction will be rolled back is controlled
    by the `innodb_rollback_on_timeout` option.


    Caution


    It is very important that a lock wait timeout is handled as otherwise it may leave
    the transaction with locks that are not released. If that happens, other transactions
    may not be able to acquire the locks they require.


    ## The Prevention


    Preventing significant record-level lock contention largely follows the guidelines
    that were discussed in Chapter [9](#502546_1_En_9_Chapter.xhtml), “Reduce Locking
    Issues.” To recapitulate the discussion, the way to reduce lock wait contention
    is largely about reducing the size and duration of transactions, using indexes
    to reduce the number of records accessed, and possibly switching the transaction
    isolation level to `READ COMMITTED` to release locks earlier and reduce the number
    of gap locks.


    ## Summary


    In this chapter a case study with InnoDB record locks has been discussed. The
    symptoms were that a query that was expected to be quick took a long time to complete.
    The key to determine which connections are involved in the lock contention is
    to use the `sys.innodb_lock_waits` view which directly shows information for the
    waiting and blocking connections. For more details you can dive into the `data_locks`
    and `data_lock_waits` tables in the Performance Schema.


    The solution depends on the extent of the lock waits. If they are short and infrequent,
    you may be able to ignore them and just let the waiting queries wait for the lock
    request to become available. If the lock waits are caused by excessively long-running
    queries or forgotten transactions, you may need to kill the offending query or
    connection but taking the effort to roll back the changes into account. To prevent
    the issues in the future, work to reduce the size and duration of your transactions,
    review the indexes, and consider the `READ COMMITTED` transaction isolation level.


    In the next case study, a related issue where two transactions have a circular
    lock wait graph – better known as a deadlock – will be examined.


    Footnotes [1](#502546_1_En_15_Chapter.xhtml#Fn1_source)


    # 16. Case Study: Deadlocks


    One of the lock issues causing the most concerns for database administrators is
    deadlocks. This is partly because of the name and partly because they unlike the
    other lock issues discussed always cause an error. However, there is as such nothing
    especially worrying about deadlocks compared to other locking issues. On the contrary,
    that they cause an error means that you know about them sooner and the lock issue
    resolves itself.


    This chapter sets up a deadlock scenario and completes an investigation to work
    backward from the deadlock information in the InnoDB monitor output to determine
    the transactions involved in the deadlock.


    ## The Symptoms


    The symptoms are straightforward. The victim of a deadlock receives an error and
    the `lock_deadlocks` InnoDB metric increments. The error that will be returned
    to the transaction that InnoDB chooses as the victim is `ER_LOCK_DEADLOCK`:


    ```

    ERROR: 1213: Deadlock found when trying to get lock; try restarting transaction

    ```


    The `lock_deadlocks` metric is very useful to keep an eye on how often deadlocks
    occur. A convenient way to track the value of `lock_deadlocks` is to use the `sys.metrics`
    view:


    ```

    mysql> SELECT *

    FROM sys.metrics

    WHERE Variable_name = ''lock_deadlocks''\G

    *************************** 1\. row ***************************

    Variable_name: lock_deadlocks

    Variable_value: 2

    Type: InnoDB Metrics - lock

    Enabled: YES

    1 row in set (0.0096 sec)

    ```


    Alternatively, you can use the `events_errors_summary_global_by_error` table in
    the Performance Schema and query for the `ER_LOCK_DEADLOCK` error:


    ```

    mysql> SELECT *

    FROM performance_schema.events_errors_summary_global_by_error

    WHERE error_name = ''ER_LOCK_DEADLOCK''\G

    *************************** 1\. row ***************************

    ERROR_NUMBER: 1213

    ERROR_NAME: ER_LOCK_DEADLOCK

    SQL_STATE: 40001

    SUM_ERROR_RAISED: 5

    SUM_ERROR_HANDLED: 0

    FIRST_SEEN: 2020-08-01 13:09:29

    LAST_SEEN: 2020-08-07 18:28:20

    1 row in set (0.0083 sec)

    ```


    Do however be aware that this includes all cases of a deadlock returning error
    1213 irrespective of the lock type, whereas the `lock_deadlocks` metric only includes
    InnoDB deadlocks.


    You can also check the `LATEST DETECTED DEADLOCK` section in the output of the
    InnoDB monitor, for example, by executing `SHOW ENGINE INNODB STATUS`. This will
    show when the last deadlock last occurred, and thus you can use that to judge
    how frequently deadlocks occur. If you have the `innodb_print_all_deadlocks` option
    enabled, the error lock will have many outputs of deadlock information. The details
    of the InnoDB monitor output for deadlocks will be covered in the section “The
    Investigation” after the cause of deadlocks and the setup have been discussed.


    ## The Cause


    Deadlocks are caused by locks being obtained in different orders for two or more
    transactions. Each transaction ends up holding a lock that the other transaction
    needs. This lock may be a record lock, gap lock, predicate lock, or insert intention
    lock. Figure [16-1](#502546_1_En_16_Chapter.xhtml#Fig1) shows an example of a
    circular dependency that triggers a deadlock.


    ![../images/502546_1_En_16_Chapter/502546_1_En_16_Fig1_HTML.png](images/502546_1_En_16_Chapter/502546_1_En_16_Fig1_HTML.png)


    Figure 16-1


    A circular lock dependency triggering a deadlock


    The deadlock shown in the figure is due to two record locks on the primary keys
    of a table. That is one of the simplest deadlocks that can occur. As shown when
    investigating a deadlock, the circle can be more complex than this.'
