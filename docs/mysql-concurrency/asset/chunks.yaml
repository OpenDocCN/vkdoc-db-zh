    \ matched: 1  Changed: 1  Warnings: 0\nListing 10-5\n非唯一与唯一二级索引之间的区别\n```\n\n\
    当事务仍在进行时，您可以检查每个连接持有的锁。对于连接 1，记录锁如清单 [10-6](#502546_1_En_10_Chapter.xhtml#PC6)\
    \ 所示，这是清单 [10-5](#502546_1_En_10_Chapter.xhtml#PC5) 执行的工作负载的调查编号 1。\n\n```\n--\
