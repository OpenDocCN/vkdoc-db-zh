- fmt: '# 18. Case Study: Semaphores


    Mutex and semaphore contention is one of the most elusive kinds of contention
    you can come across as except for extreme situations, you will not directly notice
    any issues. Instead, the contention tends to materialize as an overall added latency
    and throughput reduction that can be hard to put your finger on. Then out of the
    blue, you may have crossed a load threshold, and the contention causes your server
    to come to a grinding halt.


    This chapter goes through a case study of investigating contention on the adaptive
    hash index rw-semaphore. However, do be aware that semaphore contention differs
    depending on the mutex or semaphore where the contention occurs, and so does the
    investigation required to solve it. In high-severity cases, you may also find
    that you have contention on multiple semaphore waits at the same time.


    ## The Symptoms


    The two most common ways to notice that there is contention on an InnoDB mutex
    or semaphore are through the InnoDB monitor and the `innodb_rwlock_%` InnoDB metrics.


    In the InnoDB monitor output, you will see ongoing waits in the `SEMAPHORES` section
    near the top of the output, for example:


    ```

    SEMAPHORES

    OS WAIT ARRAY INFO: reservation count 77606

    --Thread 19304 has waited at btr0sea.ic line 122 for 0 seconds the semaphore:

    S-lock on RW-latch at 00000215E6DC12F8 created in file btr0sea.cc line 202

    a writer (thread id 11100) has reserved it in mode exclusive

    number of readers 0, waiters flag 1, lock_word: 0

    Last time read locked in file btr0sea.ic line 122

    Last time write locked in file G:\ade\build\sb_0-39697839-1592332179.68\mysql-8.0.21\storage\innobase\btr\btr0sea.cc
    line 1197

    --Thread 26128 has waited at btr0sea.ic line 92 for 0 seconds the semaphore:

    X-lock on RW-latch at 00000215E6DC12F8 created in file btr0sea.cc line 202

    a writer (thread id 11100) has reserved it in mode exclusive

    number of readers 0, waiters flag 1, lock_word: 0

    Last time read locked in file btr0sea.ic line 122

    Last time write locked in file G:\ade\build\sb_0-39697839-1592332179.68\mysql-8.0.21\storage\innobase\btr\btr0sea.cc
    line 1197

    OS WAIT ARRAY INFO: signal count 93040

    RW-shared spins 18200, rounds 38449, OS waits 20044

    RW-excl spins 22345, rounds 1121445, OS waits 38469

    RW-sx spins 3684, rounds 100410, OS waits 2886

    Spin rounds per wait: 2.11 RW-shared, 50.19 RW-excl, 27.26 RW-sx

    ```


    The more waits and the longer they have been waiting, the more severe the issue
    is.


    You may also notice in your monitoring that the number of rw-lock waits is high
    and possibly spiky at the time of high load. In one real-world example where there
    was severe contention on the adaptive hash index, there were tens of thousands
    of OS waits per second for extended periods of time.


    ## The Cause


    The issue is that requests for a shared resource, such as access to the adaptive
    hash index, arrive faster than they can be handled. These resources are protected
    inside the source code using mutexes and rw-locks. Contention indicates that either
    you have hit the concurrency limit of the MySQL version you are using for your
    workload or that your need to split the resource into more parts or similar.


    ## The Setup


    Reproducing semaphore contention at will can be difficult to do at will. The more
    CPUs you have available on your system, the more likely it is that you generate
    a workload that experiences semaphore waits.


    The outputs for the discussion in this chapter have been generated with the `Listing`
    `8-1` workload on a laptop with eight CPUs and the buffer pool set to the default
    size of 128 MiB. If you try to reproduce the case, then you may need to experiment
    with the number of connections. The script prompts you for these defaulting to
    1 read-write thread and using one connection per remaining CPU for read-only connections.


    **Note**

    MySQL Shell’s session objects are not entirely thread safe even with each thread
    having its own session. For this reason, it can be necessary to attempt the test
    a couple of times. The issue is particularly seen on Microsoft Windows with multiple
    read-write connections.


    You can also try to change the size of the buffer pool. An option is also to reduce
    the flushing when committing transactions which particularly can help if your
    disk has poor flush performance:


    ```

    SET GLOBAL innodb_flush_log_at_trx_commit = 0,

    GLOBAL sync_binlog = 0;

    ```


    **Caution**

    Reducing flushing is fine on a test system, but you should not do that on a production
    system as you may end up losing committed transactions in case of a crash.


    Running for a longer time can also increase the chance of seeing contention at
    least once.


    The test also allows you to request MySQL to be restarted before the test, and
    you can choose whether to delete the indexes that the test creates. Restarting
    MySQL allows you to see the difference of starting out with a cold InnoDB buffer
    pool (though the workload does do its own warmup of the buffer pool).


    **Note**

    Restarting MySQL from the test only works if you have started MySQL under a supervisor
    process. This, for example, happens when you start MySQL as a service on Microsoft
    Windows, using `mysqld_safe`, or through `systemd` on Linux.


    If you want to run the test several times, it can be an advantage to tell the
    test not to delete its indexes as that allows the test to skip the creation on
    the next execution.


    An example of executing the test case is shown in Listing `18-1`. The full output
    of the execution is included in the file `listing_18-1.txt` that is available
    from this book’s GitHub repository.


    ```

    Specify the number of read-write connections (0-31) [1]:

    Specify the number of read-only connections (1-31) [7]:

    Specify the number of seconds to run for (1-3600) [10]:

    Restart MySQL before executing the test? (Y|Yes|N|No) [No]:

    Delete the test specific indexes after executing the test? (Y|Yes|N|No) [Yes]:

    2020-07-25 15:56:33.928772  0 [INFO] Adding 1 index to the dept_emp table

    2020-07-25 15:56:43.238872  0 [INFO] Adding 1 index to the employees table

    2020-07-25 15:56:54.202735  0 [INFO] Adding 1 index to the salaries table

    2020-07-25 15:57:47.050114  0 [INFO] Warming up the InnoDB buffer pool.

    2020-07-25 15:58:04.543354  0 [INFO] Waiting 2 seconds to let the monitoring collect
    some information before starting the test.

    2020-07-25 15:58:06.544765  0 [INFO] Starting the work connections.

    2020-07-25 15:58:07.556126  0 [INFO] Completed  10%

    …

    -- Total mutex and rw-semaphore waits during test:

    +----------------+-------+

    | File:Line      | Waits |

    +----------------+-------+

    | btr0sea.cc:202 | 13368 |

    +----------------+-------+

    -- Total execution time: 25.685603 seconds

    2020-07-25 15:58:34.374196  0 [INFO] Dropping indexes on the dept_emp table.

    2020-07-25 15:58:35.651209  0 [INFO] Dropping indexes on the employees table.

    2020-07-25 15:58:36.344171  0 [INFO] Dropping indexes on the salaries table.

    Listing 18-1

    Semaphore waits

    ```


    Notice that at the start of the example, there are five prompts for information
    on how to run the test.'
