  trans: '

    当测试重现该问题时，你将看到 InnoDB 监视器输出中 `SEMAPHORES` 部分的一个或多个输出，并且在最后，会生成一些诊断数据。此数据包括：


    *   测试期间每秒收集的读写锁指标。此数据以 CSV 格式打印，因此你可以将其复制到电子表格中并绘图。

    *   测试期间每秒收集的自适应哈希索引指标。这也以 CSV 格式打印。

    *   InnoDB 缓冲池中的总页面数以及页面变为“young”或“not made young”的速率。

    *   测试结束时的 `INSERT BUFFER AND ADAPTIVE HASH INDEX` 部分内容。

    *   测试期间的总互斥锁和读写信号量等待次数。


    只读工作负载由 `employees` 数据库中三个表的联接查询组成，其中包括大量的二级索引查找：


    ```sql

    SELECT dept_name, MIN(salary) min_salary,

    AVG(salary) AS avg_salary, MAX(salary) AS max_salary

    FROM employees.departments

    INNER JOIN employees.dept_emp USING (dept_no)

    INNER JOIN employees.salaries USING (emp_no)

    WHERE dept_emp.to_date = ''9999-01-01''

    AND salaries.to_date = ''9999-01-01''

    GROUP BY dept_no

    ORDER BY dept_name;

    ```


    读写工作负载从 `employees.employees` 表中随机选择一个姓氏，并为所有拥有该姓氏的员工加薪。使用占位符表示的步骤如下：


    ```sql

    SELECT last_name

    FROM employees.employees

    WHERE emp_no = ?;

    SELECT emp_no, salary, from_date + INTERVAL 1 DAY

    FROM employees.employees

    INNER JOIN employees.salaries USING (emp_no)

    WHERE employees.last_name = ?

    AND to_date = ''9999-01-01'';

    # 对于前一个查询中找到的每个员工，

    # 执行插入和更新操作：

    INSERT INTO employees.salaries

    VALUES (?, ?, ?, ''9999-01-01'');

    UPDATE employees.salaries

    SET to_date = ?

    WHERE emp_no = ? AND to_date = ''9999-01-01'';

    ```


    这意味着 `employees` 数据库中的数据被修改了。你无需在每次测试之间重新加载数据，但如果你希望得到原始数据返回，可能需要在完成测试后重置数据。


    已向表中添加了三个索引以确保存在必要的二级索引来引发争用（请记住，自适应哈希索引仅用于二级索引）：


    ```sql

    ALTER TABLE employees.dept_emp

    ADD INDEX idx_concurrency_book_0 (dept_no, to_date);

    ALTER TABLE employees.employees

    ADD INDEX idx_concurrency_book_1 (last_name, first_name);

    ALTER TABLE employees.salaries

    ADD INDEX idx_concurrency_book_2 (emp_no, to_date, salary);

    ```


    除非你要求保留，否则这些索引将在测试结束时再次被删除。


    最后，为了避免测试期间读入缓冲池的页面被过早淘汰，`innodb_old_blocks_time` 在测试持续时间内被设置为 0：


    ```sql

    SET GLOBAL innodb_old_blocks_time = 0;

    ```


    这有助于使缓冲池承受比正常情况下更高的压力，从而更有可能重现争用问题。该变量在测试结束时会被重置回 1000（默认值）。


    **注意**

    测试将持续比你指定的运行时间更长，因为运行时间仅在每个查询循环开始时检查。因此，一个循环中所有待处理的查询都将完成。


    现在，导致问题的工作负载已经建立，是时候开始调查了。


    ## 调查


    当你遇到信号量争用时，第一个求助点通常是你的监控系统，在那里你可以获得争用的概览。虽然你可以自己查询指标，但信号量等待往往会发生波动，你很可能会遇到没有争用的时段，只在最繁忙的时期或执行特定工作负载时才看到问题。以图表形式查看指标更容易确定争用何时发生。


    本节讨论如何监控 `innodb_rwlock_%` 指标、InnoDB 监视器的 `SEMAPHORES` 部分、InnoDB 互斥锁监视器以及确定工作负载。


    ### InnoDB 读写锁指标


    一种选择是从查看 `information_schema.INNODB_METRICS` 或 `sys.metrics` 中的 `innodb_rwlock_%`
    指标开始你的调查。指标分为三组：共享锁、共享排他锁和排他锁。每组有三个指标：自旋等待次数、自旋轮数和操作系统等待次数。测试结束时的 CSV 输出包含了共享锁和排他锁组的指标。（本次调查不关注共享排他锁。）图
    18-1 显示了共享读写锁指标的示例，横轴为测试进行时间。


    ![`../images/502546_1_En_18_Chapter/502546_1_En_18_Fig1_HTML.jpg`](img/502546_1_En_18_Fig1_HTML.jpg)


    `图 18-1`

    共享读写锁的等待次数和自旋轮数


    这里，自旋等待次数在测试期间几乎恒定，但自旋轮数（图中顶部的线）在测试开始约 7 秒时大幅增加。这也导致操作系统等待次数增加。操作系统等待次数激增意味着自旋等待的自旋轮数超过了
    `innodb_sync_spin_loops`（默认值为 30）。


    排他读写锁的情况类似，只是自旋轮数要高得多，如图 18-2 所示。


    ![`../images/502546_1_En_18_Chapter/502546_1_En_18_Fig2_HTML.jpg`](img/502546_1_En_18_Fig2_HTML.jpg)


    `图 18-2`

    排他读写锁的等待次数和自旋轮数


    尽管由于自旋轮数远大于自旋和操作系统等待次数而难以看清，但它们确实遵循与共享读写锁相同的模式，并且等待的绝对次数大约是共享锁的两倍。值得担忧的等待次数取决于你的工作负载，通常并发查询越多，等待次数就越多。你应特别留意操作系统等待次数，因为当等待持续时间长到足以挂起线程时，这些次数会增加。

    '
- fmt: '# InnoDB Monitor and Mutex Monitor


    When you have established when the contention occurs, you need to determine which
    rw-lock the contention is for (there may be more than one rw-lock). There are
    two main tools to determine where the contention occurs of which the first is
    the InnoDB monitor. Unless you have enabled it so it automatically outputs to
    the error log or the contention is so bad that the semaphore waits exceed 240
    seconds, then you need to catch your system in the act of experiencing contention.
    Listing [18-2](#502546_1_En_18_Chapter.xhtml#PC8) shows an example of the `SEMAPHORES`
