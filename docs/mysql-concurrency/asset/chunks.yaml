    The output shows that there are four cases of queries waiting and blocking. This
    may be surprising, but it happens because there are several locks involved and
    there is a chain of waits. Each row is a pair of a waiting and blocking connection.
    The output uses “pid” for the process list id which is the same as the connection
    id used in earlier outputs. The information includes what the lock is on, details
    about the waiting connection, details about the blocking connection, and two queries
    that can be used to kill the blocking query or connection.


    The third row shows process list id 714 waiting on itself. That sounds like a
    deadlock, but it is not. The reason is that the `ALTER TABLE` first took a shared
    lock that can be upgraded and then tried to get the exclusive lock which is waiting.
    Because there is no explicit information on which existing lock is actually blocking
    the new lock, this information ends up being included.


    The fourth row shows that the `SELECT` statement is waiting for process list id
    714 which is the `ALTER TABLE`. This is the reason that connections can start
    to pile up as the DDL statement requires an exclusive lock, so it will block requests
    for shared locks.


    The first and second rows are where the underlying issue for the lock contention
    is revealed. Process list id 713 is blocking for both of the other connections
    which shows that this is the main culprit that is blocking the DDL statement.
    So, when you are investigating an issue like this, look for a connection waiting
    for an exclusive metadata lock that is blocked by another connection. If there
    is a large number of rows in the output, you can also look for the connection
    causing the most blocks and use that as a starting point. Listing [14-4](#502546_1_En_14_Chapter.xhtml#PC4)
    shows an example of how you can do this.


    ```

    -- Investigation #4

    Connection 4> SELECT *

    FROM sys.schema_table_lock_waits

    WHERE waiting_lock_type = ''EXCLUSIVE''

    AND waiting_pid  blocking_pid\G

    *************************** 1\. row ***************************

    object_schema: world

    object_name: city

    waiting_thread_id: 1182

    waiting_pid: 714

    waiting_account: root@localhost

    waiting_lock_type: EXCLUSIVE

    waiting_lock_duration: TRANSACTION

    waiting_query: ALTER TABLE world.city ADD INDEX (Name)

    waiting_query_secs: 678

    waiting_query_rows_affected: 0

    waiting_query_rows_examined: 0

    blocking_thread_id: 1181

    blocking_pid: 713

    blocking_account: root@localhost

    blocking_lock_type: SHARED_READ

    blocking_lock_duration: TRANSACTION

    sql_kill_blocking_query: KILL QUERY 713

    sql_kill_blocking_connection: KILL 713

    1 row in set (0.0025 sec)

    -- Investigation #5

    Connection 4> SELECT blocking_pid, COUNT(*)

    FROM sys.schema_table_lock_waits

    WHERE waiting_pid  blocking_pid

    GROUP BY blocking_pid

    ORDER BY COUNT(*) DESC;

    +--------------+----------+

    | blocking_pid | COUNT(*) |

    +--------------+----------+

    |          713 |        2 |

    |          714 |        1 |

    +--------------+----------+

    2 rows in set (0.0023 sec)

    Listing 14-4

    Looking for the connection causing the metadata lock block

    ```


    The first query looks for a wait for an exclusive metadata lock where the blocking
    process list id is not itself. In this case, that immediately gives the main block
    contention. The second query determines the number of blocking queries triggered
    by each process list id. It may not be as simple as shown in this example, but
    using queries as shown here will help narrow down where the lock contention is.


    Once you have determined where the lock contention originates, you need to determine
    what the transaction is doing. In this case, the root of the lock contention is
    the connection with process list id 713\. Going back to the process list output,
    you can see that it is not doing anything in this case:


    ```

    *************************** 1\. row ***************************

    thd_id: 1181

    conn_id: 713

    state: NULL

    current_statement: SELECT Code, Name FROM world.country WHERE Code = ''USA''

    statement_latency: NULL

    ```


    What did this connection do to take the metadata lock? The fact that there is
    no current statement that involves the `world.city` table suggests the connection
    has an active transaction open. In this case, the transaction is idle (as seen
    by `statement_latency = NULL`), but it could also be that there was a query executing
    that is unrelated to the metadata lock on the `world.city` table. In either case,
    you need to determine what the transaction was doing prior to the current state.
    You can use the Performance Schema and Information Schema for this. Listing [14-5](#502546_1_En_14_Chapter.xhtml#PC6)
    shows an example of investigating the status and recent history of a transaction.'
