    the `performance_schema.metadata_locks` table. Some Information Schema resources
    are also included, and there is a list of sections in the output from the InnoDB
    monitor.


    *   **Appendix B, “MySQL Shell Script Reproducing Lock Scenarios”:** This appendix
    is the reference for the Python module included with the book. This includes a
    discussion of how to install and use the module as well as how the code is organized
    in case you want to extend it with your own workloads.


    Acknowledgments


    I would first of all like to say thank you to all of those from the Apress team
    that have made this book possible. In particular, I would like to shout out Jonathan
    Gennick who came up with the idea, Jill Balzano who coordinated the work, Laura
    Berendson for her work behind the scenes, and Creapzylene Roma for catching my
    linguistic slipups.'
  trans: '

    ## 书籍结构


    我尽量使每一章都相对独立，目的是让你能将本书作为参考书使用。这种选择的缺点是，信息会不时有所重复。这在案例研究中尤为明显，其中重复了前面章节讨论过的部分内容。这是一个有意的选择，希望能帮助你减少翻找所需信息时的翻页次数。


    本书分为 18 章和两个附录。第 1 章提供概述，第 2 至 4 章涵盖锁和事务的监控，第 5 至 10 章讨论锁，第 11 至 12 章包含关于事务的信息，最后，第
    13 至 18 章通过六个案例研究进行讲解。附录则提供了关于监控锁和事务的参考资料，以及本书附带的 MySQL Shell 模块的参考资料。


    ### `第[1]章`，“概述”

    这章概述性章节涵盖了一些高级概念，并介绍了用于重现本书示例和测试数据的 MySQL Shell 模块。


    ### `第[2]章`，“监控锁”

    本章介绍如何使用 Performance Schema、`sys`模式、状态计数器和 InnoDB 指标来监控锁。还包括如何使用 InnoDB 锁监视器、InnoDB
    监视器中的死锁信息，以及如何获取有关互斥量和信号量争用的信息。


    ### `第[3]章`，“监控 InnoDB 事务”

    本章主要展示如何使用`information_schema.INNODB_TRX`视图来调查 InnoDB 事务。也涵盖了 InnoDB 监视器中的事务列表以及与事务相关的
    InnoDB 指标。


    ### `第[4]章`，“Performance Schema 中的事务”

    本章承接上一章，讲解 Performance Schema 中的事务信息，以及如何查找属于一个事务的语句。


    ### `第[5]章`，“锁访问级别”

    本章介绍了共享锁、排他锁和意向锁，并展示了这些锁彼此之间的兼容性。


    ### `第[6]章`，“高级锁类型”

    本章涵盖在比记录更高层级上工作的锁。这些主要是处理存储引擎作用域之外的锁，包括用户级锁、元数据锁、刷新锁和表级锁。还包含了 MySQL 8 新增的备份锁和日志锁。


    ### `第[7]章`，“InnoDB 锁”

    本章介绍 InnoDB 使用的记录级锁。包括普通记录锁、间隙锁、临键锁、插入意向锁、自增锁，以及互斥量和读写锁信号量。


    ### `第[8]章`，“处理锁冲突”

    本章解释当锁冲突发生时的情况，从讨论内部用于锁优先级的争用感知事务调度（CATS）开始，到锁兼容性、锁等待超时和死锁。


    ### `第[9]章`，“减少锁问题”

    本章介绍如何减少系统中的锁争用及其影响。方法包括减小事务大小和年龄、使用索引、并发任务按相同顺序访问记录、更改事务隔离级别等。


    ### `第[10]章`，“索引与外键”

    本章详细探讨索引和外键对锁定的影响。唯一索引是否比非唯一索引需要更少的锁？外键是否会导致更多的锁？答案是肯定的，本章解释了原因并给出了差异示例。


    ### `第[11]章`，“事务”

    本章讨论事务是什么，以及它们如何帮助处理并发工作负载。还涵盖了事务的影响，以及组提交功能如何帮助减少持久化已提交事务的影响。


    ### `第[12]章`，“事务隔离级别”

    本章介绍了 InnoDB 支持的四种事务隔离级别，并讨论了每种级别对锁定和数据一致性的影响。


    ### `第[13]章`，“案例研究：刷新锁”

    本章设置数据库以产生刷新锁争用，然后分析问题，提供解决方案，并讨论如何预防该问题。


    ### `第[14]章`，“案例研究：元数据锁与模式锁”

    本章通过研究一个涉及元数据锁的情况，探讨了另一个常见的锁问题。


    ### `第[15]章`，“案例研究：记录级锁”

    本章对 InnoDB 记录级锁进行调查，并讨论如何解决该锁问题以及减少遇到它们的机会。


    ### `第[16]章`，“案例研究：死锁”

    本章对一个死锁进行调查，详细分析了从 InnoDB 监视器输出中获取的死锁信息。


    ### `第[17]章`，“案例研究：外键”

    本章涵盖了一个由外键引起的高级锁场景，涉及元数据锁和 InnoDB 记录锁。


    ### `第[18]章`，“案例研究：信号量”

    本章设置了一个触发信号量争用的测试案例，并对该问题进行了调查。


    ### 附录 A，“参考资料”

    本附录提供了查找本书讨论主题相关信息的资源概述。资源主要包括 Performance Schema 中的表和`sys`模式中的视图，包括`performance_schema.metadata_locks`表中`OBJECT_TYPE`和`LOCK_TYPE`列的可能值。还包括一些
    Information Schema 资源，并列出了 InnoDB 监视器输出中的各个部分。


    ### 附录 B，“重现锁场景的 MySQL Shell 脚本”

    本附录是随书提供的 Python 模块的参考。包括如何安装和使用该模块的讨论，以及如果你想用自己的工作负载扩展它，代码的组织方式。


    ## 致谢

    首先，我要感谢 Apress 团队所有让本书成为可能的人。特别要感谢提出这个想法的乔纳森·詹尼克（Jonathan Gennick），协调工作的吉尔·巴尔扎诺（Jill
    Balzano），在幕后工作的劳拉·贝伦森（Laura Berendson），以及纠正我语言错误的克瑞普泽琳·罗马（Creapzylene Roma）。

