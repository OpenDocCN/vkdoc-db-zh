- fmt: '# `Transaction Events and Their Statements`


    The main tables for investigating transactions in the Performance Schema are the
    transaction event tables. There are three tables for recording current or recent
    transactions: `events_transactions_current`, `events_transactions_history`, and
    `events_transactions_history_long`. They have the columns as summarized in Table
    [4-1](#502546_1_En_4_Chapter.xhtml#Tab1).


    ## Table 4-1: The columns of the non-summary transaction event tables


    | Column/Data Type | Description |

    | --- | --- |

    | `THREAD_ID bigint unsigned` | The Performance Schema thread id of the connection
    executing the transaction. |

    | `EVENT_ID bigint unsigned` | The event id for the event. You can use the event
    id to order the events for a thread or as a foreign key together with the thread
    id between event tables. |

    | `END_EVENT_ID bigint unsigned` | The event id when the transaction completed.
    If the event id is `NULL`, the transaction is still ongoing. |

    | `EVENT_NAME varchar(128)` | The transaction event name. Currently this column
    always has the value `transaction`. |

    | `STATE enum` | The state of the transaction. Possible values are `ACTIVE`, `COMMITTED`,
    and `ROLLED BACK`. |

    | `TRX_ID bigint unsigned` | This is currently unused and will always be `NULL`.
    |

    | `GTID varchar(64)` | The GTID for the transaction. When the GTID is automatically
    determined (the usual), `AUTOMATIC` is returned. This is the same as the `gtid_next`
    variable for the connection executing the transaction. |

    | `XID_FORMAT_ID int` | For XA transactions, the format id. |

    | `XID_GTRID varchar(130)` | For XA transactions, the gtrid value. |

    | `XID_BQUAL varchar(130)` | For XA transactions, the bqual value. |

    | `XA_STATE varchar(64)` | For a XA transaction, the state of the transaction.
    This can be `ACTIVE`, `IDLE`, `PREPARED`, `ROLLED BACK`, or `COMMITTED`. |

    | `SOURCE varchar(64)` | The source code file and line number where the event
    was recorded. |

    | `TIMER_START bigint unsigned` | The time in picoseconds when the event started.
    |

    | `TIMER_END bigint unsigned` | The time in picoseconds when the event completed.
    If the transaction has not completed yet, the value corresponds to the current
    time. |

    | `TIMER_WAIT bigint unsigned` | The total time in picoseconds it took to execute
    the event. If the event has not completed yet, the value corresponds to how long
    the transaction has been active. |

    | `ACCESS_MODE enum` | Whether the transaction is in read-only (`READ ONLY`) or
    in read-write (`READ WRITE`) mode. |

    | `ISOLATION_LEVEL varchar(64)` | The transaction isolation level for the transaction.
    |

    | `AUTOCOMMIT enum` | Whether the transaction is autocommitting based on the `autocommit`
    option and whether an explicit transaction has been started. Possible values are
    `NO` and `YES`. |

    | `NUMBER_OF_SAVEPOINTS bigint unsigned` | The number of savepoints created in
    the transaction. |

    | `NUMBER_OF_ROLLBACK_TO_SAVEPOINT bigint unsigned` | The number of times the
    transaction has rolled back to a savepoint. |

    | `NUMBER_OF_RELEASE_SAVEPOINT bigint unsigned` | The number of times the transaction
    has released a savepoint. |

    | `OBJECT_INSTANCE_BEGIN bigint unsigned` | This field is currently unused and
    always set to `NULL`. |

    | `NESTING_EVENT_ID bigint unsigned` | The event id of the event that triggered
    the transaction. |

    | `NESTING_EVENT_TYPE enum` | The event type of the event that triggered the transaction.
    |


    ## Using Transaction Event Tables


    If you are working with XA transactions, the transaction event tables are great
    when you need to recover a transaction as the format id, gtrid, and bqual values
    are directly available from the tables, unlike for the `XA RECOVER` statement
    where you have to parse the output. In the same way, if you work with savepoints,
    you can get statistics on the savepoint usage. Otherwise, the information is very
    similar to what is available in the `information_schema.INNODB_TRX` view.


    For an example of using the `events_transactions_current` table, you can start
    two transactions as shown in Listing [4-1](#502546_1_En_4_Chapter.xhtml#PC1).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               57         140          6

    --          2               58         141          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> UPDATE world.city SET Population = 5200000 WHERE ID = 130;

    Connection 1> UPDATE world.city SET Population = 4900000 WHERE ID = 131;

    Connection 1> UPDATE world.city SET Population = 2400000 WHERE ID = 132;

    Connection 1> UPDATE world.city SET Population = 2000000 WHERE ID = 133;

    -- Connection 2

    Connection 2> XA START ''abc'', ''def'', 1;

    Connection 2> UPDATE world.city SET Population = 900000 WHERE ID = 3805;

    Listing 4-1

    Example transactions

    ```


    The first transaction is a normal transaction that updates the population of several
    cities, and the second transaction is an XA transaction. Listing [4-2](#502546_1_En_4_Chapter.xhtml#PC2)
    shows an example output of the `events_transactions_current` table listing the
    currently active transactions.


    ```

    -- Investigation #1

    -- Connection 3

    Connection 3> SELECT *

    FROM performance_schema.events_transactions_current

    WHERE state = ''ACTIVE''\G

    *************************** 1\. row ***************************

    THREAD_ID: 140

    EVENT_ID: 8

    END_EVENT_ID: NULL

    EVENT_NAME: transaction

    STATE: ACTIVE

    TRX_ID: NULL

    GTID: AUTOMATIC

    XID_FORMAT_ID: NULL

    XID_GTRID: NULL

    XID_BQUAL: NULL

    XA_STATE: NULL

    SOURCE: transaction.cc:209

    TIMER_START: 72081362554600000

    TIMER_END: 72161455792800000

    TIMER_WAIT: 80093238200000

    ACCESS_MODE: READ WRITE

    ISOLATION_LEVEL: REPEATABLE READ

    AUTOCOMMIT: NO

    NUMBER_OF_SAVEPOINTS: 0

    NUMBER_OF_ROLLBACK_TO_SAVEPOINT: 0

    NUMBER_OF_RELEASE_SAVEPOINT: 0

    OBJECT_INSTANCE_BEGIN: NULL

    NESTING_EVENT_ID: 7

    NESTING_EVENT_TYPE: STATEMENT

    *************************** 2\. row ***************************

    THREAD_ID: 141

    EVENT_ID: 8

    END_EVENT_ID: NULL

    EVENT_NAME: transaction

    STATE: ACTIVE

    TRX_ID: NULL

    GTID: AUTOMATIC

    XID_FORMAT_ID: 1

    XID_GTRID: abc

    XID_BQUAL: def

    XA_STATE: ACTIVE

    SOURCE: transaction.cc:209

    TIMER_START: 72081766957700000

    TIMER_END: 72161455799300000

    TIMER_WAIT: 79688841600000

    ACCESS_MODE: READ WRITE

    ISOLATION_LEVEL: REPEATABLE READ

    AUTOCOMMIT: NO

    NUMBER_OF_SAVEPOINTS: 0

    NUMBER_OF_ROLLBACK_TO_SAVEPOINT: 0

    NUMBER_OF_RELEASE_SAVEPOINT: 0

    OBJECT_INSTANCE_BEGIN: NULL

    NESTING_EVENT_ID: 7

    NESTING_EVENT_TYPE: STATEMENT

    2 rows in set (0.0007 sec)

    Listing 4-2

    Using the events_transactions_current table

    ```


    The transaction in row 1 is a regular transaction, whereas the transaction in
    row 2 is an XA transaction. Both transactions were started by a statement which
    can be seen from the nesting event type. If you want to find the statement that
    triggered the transaction, you can use that to query the `events_statements_history`
    table like


    ```

    -- Investigation #2

    Connection 3> SELECT sql_text

    FROM performance_schema.events_statements_history

    WHERE thread_id = 140

    AND event_id = 7\G

    *************************** 1\. row ***************************

    sql_text: start transaction

    1 row in set (0.0434 sec)

    ```


    This shows that the transaction executed by `thread_id = 140` was started using
    a `START TRANSACTION` statement. Since the `events_statements_history` table only
    includes the last ten statements for the connection, it is not guaranteed that
    the statement that started the transaction is still in the history table. If you
    are looking at a single-statement transaction or the first statement (while it
    is still executing) when `autocommit` is disabled, you will need to query the
    `events_statements_current` table instead.


    The relationship between transactions and statements also goes the other way.'
