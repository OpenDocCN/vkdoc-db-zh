- fmt: '## Book Structure


    I have attempted to keep each chapter relatively self-contained with the aim that
    you can use the book as a reference book. The drawback of this choice is that
    there is some duplication of information from time to time. This is particularly
    evident in the case studies that repeat some of the information discussed in earlier
    chapters. This was a deliberate choice, and I hope it helps you to reduce the
    amount of page flipping to find the information you need.


    The book is divided into 18 chapters and two appendixes. Chapter [1](#502546_1_En_1_Chapter.xhtml)
    provides an introduction, Chapters [2](#502546_1_En_2_Chapter.xhtml)–[4](#502546_1_En_4_Chapter.xhtml)
    cover monitoring of locks and transactions, Chapters [5](#502546_1_En_5_Chapter.xhtml)–[10](#502546_1_En_10_Chapter.xhtml)
    discuss locks, Chapters [11](#502546_1_En_11_Chapter.xhtml)–[12](#502546_1_En_12_Chapter.xhtml)
    contain information about transactions, and finally Chapters [13](#502546_1_En_13_Chapter.xhtml)–[18](#502546_1_En_18_Chapter.xhtml)
    go through six case studies. The appendixes contain references for monitoring
    locks and transactions and for the MySQL Shell module provided with the book.


    ### `Chapter [1]`, “Introduction”

    This introductory chapter covers some high-level concepts as well as introduces
    the MySQL Shell module for reproducing the example and the test data used in this
    book.


    ### `Chapter [2]`, “Monitoring Locks”

    This chapter covers how you can monitor locks using the Performance Schema, the
    `sys` schema, status counters, and InnoDB metrics. There is also information on
    how to use the InnoDB lock monitor and the deadlock information in the InnoDB
    monitor and how to obtain information about mutex and semaphore contention.


    ### `Chapter [3]`, “Monitoring InnoDB Transactions”

    This chapter primarily shows how you can use the `information_schema.INNODB_TRX`
    view to investigate InnoDB transaction. The transaction list in the InnoDB monitor
    and transaction-related InnoDB metrics are also covered.


    ### `Chapter [4]`, “Transactions in the Performance Schema”

    This chapter continues where the previous stopped by going through the transaction
    information in the Performance Schema and how you can find the statements for
    a transaction.


    ### `Chapter [5]`, “Lock Access Levels”

    This chapter goes through shared, exclusive, and intention locks as well as shows
    which of these are compatible with each other.


    ### `Chapter [6]`, “High-Level Lock Types”

    This chapter covers the locks that work at a higher level than records. These
    are mainly locks handled outside the scope of the storage engines and include
    user-level locks, metadata locks, flush locks, and table-level locks. The new
    MySQL 8 backup and log locks are also included.


    ### `Chapter [7]`, “InnoDB Locks”

    This chapter goes to the record locks used by InnoDB. These include plain record
    locks, gab locks, predicate locks, insert intention locks, auto-increment locks,
    as well as mutexes and rw-lock semaphores.


    ### `Chapter [8]`, “Working with Lock Conflicts”

    This chapter explains what happens when lock conflicts occur from a discussion
    of the contention-aware transaction scheduling (CATS) used internally to prioritize
    locks and a discussion of lock compatibility to lock wait timeouts and deadlocks.


    ### `Chapter [9]`, “Reduce Locking Issues”

    This chapter covers how you can reduce lock contention and the effects of the
    contention in your system. Methods include reducing the transaction size and age,
    using indexes, accessing records in the same order for concurrent tasks, changing
    the transaction isolation level, and more.


    ### `Chapter [10]`, “Indexes and Foreign Keys”

    This chapter considers the effect of indexes and foreign keys on locking in detail.
    Do unique indexes require less locks than non-unique indexes? Do foreign keys
    cause more locks? The answer is yes, and this chapter explains why that is the
    case and gives examples of the differences.


    ### `Chapter [11]`, “Transactions”

    This chapter discusses what transactions are and how they help handle concurrent
    workloads. The chapter also covers the impact of transactions and how the group
    commit feature helps reduce the impact of persisting committed transactions.


    ### `Chapter [12]`, “Transaction Isolation Levels”

    This chapter goes through the four transaction isolation levels supported by InnoDB
    with a discussion on how each level affects locking and data consistency.


    ### `Chapter [13]`, “Case Study: Flush Locks”

    This chapter sets the database up, so there is flush lock contention, and then
    goes through analyzing the issue and providing a solution and discusses how to
    prevent the issue.


    ### `Chapter [14]`, “Case Study: Metadata and Schema Locks”

    This chapter takes on another common lock issue by studying a situation with metadata
    locks.


    ### `Chapter [15]`, “Case Study: Record-Level Locks”

    This chapter performs an investigation into InnoDB record-level locks and discusses
    how to resolve the lock issue and reduce the chance of encountering them.


    ### `Chapter [16]`, “Case Study: Deadlocks”

    This chapter goes through an investigation of a deadlock with details of analyzing
    the deadlock information from the InnoDB monitor output.


    ### `Chapter [17]`, “Case Study: Foreign Keys”

    This chapter covers an advanced lock scenario caused by foreign keys, involving
    both metadata and InnoDB record locks.


    ### `Chapter [18]`, “Case Study: Semaphores”

    This chapter sets up a test case triggering semaphore contention and performs
    an investigation of the issue.


    ### Appendix A, “References”

    This appendix provides an overview of the resources for finding information related
    to the topics discussed in this book. The resources primarily consist of tables
    in the Performance Schema and views in the `sys` schema including the possible
    values of the `OBJECT_TYPE` and `LOCK_TYPE` columns of the `performance_schema.metadata_locks`
    table. Some Information Schema resources are also included, and there is a list
    of sections in the output from the InnoDB monitor.


    ### Appendix B, “MySQL Shell Script Reproducing Lock Scenarios”

    This appendix is the reference for the Python module included with the book. This
    includes a discussion of how to install and use the module as well as how the
    code is organized in case you want to extend it with your own workloads.


    ## Acknowledgments

    I would first of all like to say thank you to all of those from the Apress team
    that have made this book possible. In particular, I would like to shout out Jonathan
    Gennick who came up with the idea, Jill Balzano who coordinated the work, Laura
    Berendson for her work behind the scenes, and Creapzylene Roma for catching my
    linguistic slipups.'
