  raw: '## The Setup


    This example uses two connections as the example in the previous chapter, but
    this time both make changes before Connection 1 ends up blocking until Connection
    2 rolls back its changes with an error. Connection 1 updates the population of
    Australia and its cities with 10%, whereas Connection 2 updates the Australian
    population with that of the city of Darwin and adds the city. The statements are
    shown in Listing [16-1](#502546_1_En_16_Chapter.xhtml#PC4).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              762        1258          6

    --          2              763        1259          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0005 sec)

    Connection 1> UPDATE world.city SET Population = Population * 1.10 WHERE CountryCode
    = ''AUS'';

    Query OK, 14 rows affected (0.0016 sec)

    Rows matched: 14  Changed: 14  Warnings: 0

    -- Connection 2

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0005 sec)

    Connection 2> UPDATE world.country SET Population = Population + 146000 WHERE
    Code = ''AUS'';

    Query OK, 1 row affected (0.2683 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 1

    Connection 1> UPDATE world.country SET Population = Population * 1.10 WHERE Code
    = ''AUS'';

    -- Connection 2

    Connection 2> INSERT INTO world.city VALUES (4080, ''Darwin'', ''AUS'', ''Northern
    Territory'', 146000);

    ERROR: 1213: Deadlock found when trying to get lock; try restarting transaction

    -- Connection 1

    Query OK, 1 row affected (0.1021 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> ROLLBACK;

    Query OK, 0 rows affected (0.0003 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0545 sec)

    Listing 16-1

    Triggering an InnoDB deadlock

    ```


    The key is that the two transactions update both the `city` and `country` tables
    but in opposite order. The setup completes by explicitly rolling back both transactions
    to ensure the tables are left without changes.


    ## The Investigation


    The main tool to analyze deadlocks is the section with information about the latest
    detected deadlock in the InnoDB monitor output. If you have the `innodb_print_all_deadlocks`
    option enabled (`OFF` by default), you may also have the deadlock information
    from the error log; however, the information is the same, so it does not change
    the analysis.


    The deadlock information contains four parts describing the deadlock and the result.
    The parts are


    *   When the deadlock occurred.


    *   Information for the first of the transactions involved in the deadlock.


    *   Information for the second of the transactions involved in the deadlock.


    *   Which of the transactions that was rolled back. This information is not included
    in the error log when `innodb_print_all_deadlocks` is enabled.


    The numbering of the two transactions is arbitrary, and the main purpose is to
    be able to refer to one transaction or the other. The two parts with transaction
    information are the most important ones. They include how long the transaction
    was active, some statistics about the size of the transactions in terms of locks
    taken and undo log entries and similar, the query that was blocking waiting for
    a lock, and information about the locks involved in the deadlock.


    The lock information is not as easy to interpret as when you use the `data_locks`
    and `data_lock_waits` tables and the `sys.innodb_lock_waits` view. However, it
    is not too difficult once you have tried to perform the analysis a few times.


    Tip


    Create some deadlocks on purpose in a test system, and study the resulting deadlock
    information. Then work your way through the information to determine why the deadlock
    occurred. Since you know the queries, it is easier to interpret the lock data.


    For this deadlock investigation, consider the deadlock section from the InnoDB
    monitor that is shown in Listing [16-2](#502546_1_En_16_Chapter.xhtml#PC5). The
    listing is rather long and the lines wide, so the information is also available
    in this book’s GitHub repository as `listing_16_2_deadlock.txt`, so you can open
    the output in a text editor of your choice.


    ```

    -- Investigation #1

    -- Connection 3

    Connection 3> SHOW ENGINE INNODB STATUS\G

    *************************** 1\. row ***************************

    ...


    LATEST DETECTED DEADLOCK'
