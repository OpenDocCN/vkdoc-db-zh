- fmt: 'In this case, the value of the primary key (the `ID` column) is first obtained
    outside the transaction that updates the row, and then the primary key value is
    used in the `WHERE` clause of the `UPDATE` statement. The result is that the only
    record level lock held is an exclusive lock on the primary key with a value of
    130.


    #### Caution

    Determining the primary key outside the transaction does open for the possibility
    of the data changing between obtaining the primary key value and performing the
    update. So, you should take this as an example only.


    Except when you need to change all rows in a table, you should aim at using an
    index to access the rows. Even for full table updates, if it is not a requirement
    for the changes to be applied atomically, then for large tables it is an advantage
    to apply the changes in relatively small batches defined by ranges on the primary
    key.


    #### Tip

    If you filter by functions, a great way to reduce the number of rows examined
    is to add a functional index (available in MySQL 8.0.13 and later). Alternatively,
    in MySQL 5.7 and later, you can add a generated column with an index.


    There is more to indexes and locking though than the number of rows accessed.
    Both descending indexes as you will read about next and unique indexes that follow
    can also reduce the amount of locks.


    ### Ascending vs. Descending Indexes

    MySQL 8 has support for descending indexes which can improve the performance when
    accessing rows in descending order. You can use an ascending index to access rows
    in descending order, so the main benefit from a descending index in such a case
    is that there is no jumping forth and back in the page. Does that mean there is
    no benefit of choosing the order of your index when it comes to locking?


    When you use an index in the opposite order of how it stores the index records,
    you will pay a small price as you will need to lock the gap at the beginning of
    the search. Listing [10-3](#502546_1_En_10_Chapter.xhtml#PC3) shows the locks
    held when using an ascending index when increasing the population with 10% of
    the three most populous cities with an existing population between one and two
    million.


    ```sql

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              836        1363          6

    -- Connection 1

    Connection 1> ALTER TABLE world.city

    ADD INDEX (Population);

    Query OK, 0 rows affected (1.1838 sec)

    Records: 0  Duplicates: 0  Warnings: 0

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0005 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE Population BETWEEN 1000000 AND 2000000

    ORDER BY Population DESC

    LIMIT 3;

    Query OK, 3 rows affected (0.0014 sec)

    Rows matched: 3  Changed: 3  Warnings: 0

    -- Investigation #1

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1363

    ORDER BY index_name, lock_data DESC;

    +------------+-----------+---------------+---------------+

    | index_name | lock_type | lock_mode     | lock_data     |

    +------------+-----------+---------------+---------------+

    | Population | RECORD    | X,GAP         | 2016131, 3018 |

    | Population | RECORD    | X             | 1987996, 936  |

    | Population | RECORD    | X             | 1977246, 2824 |

    | Population | RECORD    | X             | 1975294, 3539 |

    | PRIMARY    | RECORD    | X,REC_NOT_GAP | 936           |

    | PRIMARY    | RECORD    | X,REC_NOT_GAP | 3539          |

    | PRIMARY    | RECORD    | X,REC_NOT_GAP | 2824          |

    +------------+-----------+---------------+---------------+

    7 rows in set (0.0008 sec)

    Listing 10-3

    Updating rows in descending order by ascending index

    ```


    There are, as expected, three locks on the primary key and the `Population` index
    with one lock per updated row. This is as optimal as it can be. The price in terms
    of locks of using an ascending index is that there is also a gap lock on the index
    record with a population of 2016131 and the primary key set to 3018.


    #### Tip

    InnoDB always appends the primary key to the end of non-unique secondary indexes,
    so it is easy to go to the row from the index record. The reason for this is that
    InnoDB organizes the rows according to the clustered index and when there is an
    explicit primary key that is used for the clustered index.


    There are two more things to note about the locks in this example. First, if you
    update from the end of the index (the cities with the highest population), then
    you will see a record lock on the `supremum` pseudo-record rather than a gap lock
    and the high population end of the interval. This is because the `supremum` pseudo-record
    is not a real record, so a record lock on it is effectively just a lock on the
    gap before it. Second, the exact lock types involved depends on the `WHERE` clause,
    so if you change or remove the `WHERE` clause, you may see additional gap locks
    on the secondary index. These additional gap locks will also be present in the
    same example using a descending index.


    If you use a descending index, the list of locks is the same except for the gap
    lock. Listing [10-4](#502546_1_En_10_Chapter.xhtml#PC4) shows an example of this.


    ```sql

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              843        1374          6

    -- Connection 1

    Connection 1> ALTER TABLE world.city

    ADD INDEX (Population DESC);

    Query OK, 0 rows affected (0.8885 sec)

    Records: 0  Duplicates: 0  Warnings: 0

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0006 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE Population BETWEEN 1000000 AND 2000000

    ORDER BY Population DESC

    LIMIT 3;

    Query OK, 3 rows affected (0.0021 sec)

    Rows matched: 3  Changed: 3  Warnings: 0

    -- Investigation #1

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1374

    ORDER BY index_name, lock_data DESC;

    +------------+-----------+---------------+---------------+

    | index_name | lock_type | lock_mode     | lock_data     |

    +------------+-----------+---------------+---------------+

    | Population | RECORD    | X             | 1987996, 936  |

    | Population | RECORD    | X             | 1977246, 2824 |

    | Population | RECORD    | X             | 1975294, 3539 |

    | PRIMARY    | RECORD    | X,REC_NOT_GAP | 936           |

    | PRIMARY    | RECORD    | X,REC_NOT_GAP | 3539          |

    | PRIMARY    | RECORD    | X,REC_NOT_GAP | 2824          |

    +------------+-----------+---------------+---------------+

    6 rows in set (0.0008 sec)

    Listing 10-4

    Updating rows in descending order by descending index

    ```


    The conclusion is that the main benefit from descending indexes for descending
    access to the data is the performance gain for a more sequential data access rather
    than from reduced locking. However, that said, if you have many descending range
    scans when updating or deleting data, you will also benefit from fewer gap locks.


    Another index type that will reduce locking is unique indexes.'
