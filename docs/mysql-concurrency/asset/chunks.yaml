  trans: '

    ### `concurrency_book.generate` 模块的先决条件


    使用本书提供的 MySQL Shell 模块的最重要要求是你正在使用 MySQL Shell 8.0.20 或更高版本。这是一个严格的要求，因为该模块主要使用
    `shell.open_session()` 方法来为测试用例创建所需的连接。此方法仅在 8.0.20 版本中引入。`shell.open_session()`
    相对于 `mysql.get_classic_session()` 和 `mysqlx.get_session()` 的优势在于，`open_session()`
    能够透明地同时支持传统的 MySQL 协议和新的 X 协议。


    如果你因某种原因只能使用旧版本的 MySQL Shell，可以更新测试用例，添加 `protocol` 设置（参见附录 B 中的 `定义工作负载`）来明确指定要使用的协议。


    还需要确保 MySQL Shell 到 MySQL 服务器已经存在一个连接，因为该模块在创建示例所需的额外连接时会使用该连接的 URI。


    这些示例已在 MySQL Server 8.0.21 上测试过；但是，大多数示例在更早的版本上也能运行，有些甚至可以在 MySQL 5.7 上运行。尽管如此，还是建议使用
    MySQL Server 8.0.21 或更高版本。


    ### 安装 `concurrency_book.generate` 模块


    要使用该模块，你需要从本书的 GitHub 仓库下载 `concurrency_book` 目录中的文件（链接可以在本书主页 [`www.apress.com/gp/book/9781484266519`](http://www.apress.com/gp/book/9781484266519)
    上找到）。最简单的方法是克隆仓库，或者使用图 1-2 所示的菜单下载包含所有文件的 ZIP 文件。


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig2_HTML.jpg](img/502546_1_En_1_Fig2_HTML.jpg)


    图 1-2：用于克隆或下载仓库的 GitHub 菜单


    点击剪贴板图标可复制用于通过系统的 Git 软件克隆仓库的 URL，或者使用 *Download ZIP* 链接下载仓库的 ZIP 文件。只要保持 `concurrency_book`
    目录下的结构，你可以自由选择任何路径作为文件存放位置。为方便讨论，我们假设你已将仓库克隆或文件解压到 `C:\Book\mysql-concurrency`，因此
    `generate.py` 文件位于 `C:\Book\mysql-concurrency\concurrency_book\` 目录中。


    为了能在 MySQL Shell 中导入该模块，你需要打开或创建 `mysqlshrc.py` 文件。MySQL Shell 会在四个位置搜索该文件。在 Microsoft
    Windows 上，搜索路径的顺序如下：


    1.  `%PROGRAMDATA%\MySQL\mysqlsh\`

    2.  `%MYSQLSH_HOME%\shared\mysqlsh\`

    3.  `<mysqlsh 二进制文件路径>\`

    4.  `%APPDATA%\MySQL\mysqlsh\`


    在 Linux 和 Unix 上：


    1.  `/etc/mysql/mysqlsh/`

    2.  `$MYSQLSH_HOME/shared/mysqlsh/`

    3.  `<mysqlsh 二进制文件路径>/`

    4.  `$HOME/.mysqlsh/`


    这四个路径总是会被搜索，如果文件在多个位置被找到，每个文件都将被执行。这意味着，如果文件影响了相同的变量，则最后找到的文件具有优先权。如果你要进行个人更改，最佳位置是第四个路径。第
    4 步中的路径可以通过 `MYSQLSH_USER_CONFIG_HOME` 环境变量来覆盖。


    你需要确保 `mysqlshrc.py` 文件将包含该模块的目录添加到 Python 搜索路径中，并且可以选择性地添加一条 `import` 语句，以便在启动
    MySQL Shell 时使该模块可用。一个 `mysqlshrc.py` 文件的例子是：


    ```

    import sys

    sys.path.append(''C:\\Book\\mysql-concurrency'')

    import concurrency_book.generate

    ```


    双反斜杠适用于 Windows；在 Linux 和 Unix 上，你不需要转义分隔路径元素的斜杠。如果你没有在 `mysqlshrc.py` 文件中包含 `import`
    语句，则需要在使用该模块之前在 MySQL Shell 中执行它。


    ### 获取信息


    该模块包含两个返回有关如何使用模块信息的方法。一个是 `help()` 方法，它提供有关如何使用模块的信息：


    ```

    mysql-py> concurrency_book.generate.help()

    ```


    还有 `show()` 方法，它列出了 `run()` 方法可以执行的工作负载以及 `load()` 方法可以加载的模式：


    ```

    mysql-py> concurrency_book.generate.show()

    ```


    工作负载的名称与书中的代码清单相对应，例如，名为 "Listing 6-1" 的工作负载实现了清单 6-1 中的示例。


    在你开始执行工作负载之前，你需要加载一些测试数据，该模块也可以为你完成这项工作。

    '
- fmt: '### Loading Test Data


    The `concurrency_book.generate` module supports loading the `employees`, `sakila`,
    and `world` example databases into your MySQL instance. For the `employees` database,
    you can optionally choose a version with partitions. The `world` database is the
    most important for this book followed by the `sakila` database. The `employees`
    database is only used for the case study in Chapter [18](#502546_1_En_18_Chapter.xhtml).
    Each of the three schemas is described in more detail later in this chapter.


    Note: If the schema exists, it will be dropped as part of the load job. This effectively
    means that `load()` resets the schema.


    You load a schema with the `load()` method which optionally takes the name of
    the schema you want to load. If you do not provide a schema name, then you will
    be prompted. Listing [1-1](#502546_1_En_1_Chapter.xhtml#PC4) shows an example
    of loading the `world` schema.


    ```

    mysql-py> concurrency_book.generate.load()

    Available Schema load jobs:

    ===========================

    # Name                   Description


    1 employees              The employee database

    2 employees partitioned  The employee database with partitions

    3 sakila                 The sakila database

    4 world                  The world database

    Choose Schema load job (# or name - empty to exit): 4

    2020-07-20 21:27:15.221340  0 [INFO] Downloading https://downloads.mysql.com/docs/world.sql.zip
    to C:\Users\myuser\AppData\Roaming\mysql_concurrency_book\sample_data\world.sql.zip

    2020-07-20 21:27:18.159554  0 [INFO] Processing statements in world.sql

    2020-07-20 21:27:27.045219  0 [INFO] Load of the world schema completed

    Available Schema load jobs:

    ===========================

    # Name                   Description


    1 employees              The employee database

    2 employees partitioned  The employee database with partitions

    3 sakila                 The sakila database

    4 world                  The world database

    Choose Schema load job (# or name - empty to exit):

    Listing 1-1

    Loading the world schema

    ```


    The `load()` method downloads the file with the schema definition, if it does
    not already have it. The downloaded file is stored in `%APPDATA\mysql_concurrency_book\sample_data\`
    on Microsoft Windows and in `${HOME}/.mysql_concurrency_book/sample_data/` on
    other platforms. If you want the file re-downloaded, delete it from that directory.


    Tip: As only relatively low-level network routines are available in MySQL Shell’s
    Python, downloading the employees database may fail if you have a slow or unstable
    connection. One option – other than installing the schema manually – is to download
    [`https://github.com/datacharmer/test_db/archive/master.zip`](https://github.com/datacharmer/test_db/archive/master.zip)
    and save it in the `sample_data` directory. After that, the `load()` method will
    pick it up and not attempt to download it again.


    If you only want to load a single schema, you can specify the name as an argument
    to `load()`. This can be particularly useful when initiating a schema load as
    a command given directly on the command line when invoking MySQL Shell, for example


    ```

    shell> mysqlsh --user=myuser --py -e "concurrency_book.generate.load(''world'')"

    ```


    When you are done loading the schemas you need, you can reply with an empty answer
    to exit. You are now ready to execute the workloads.


    Note: If the load process crashes complaining about the file, for example, that
    it is not a ZIP file, then it suggests the file is corrupted or incomplete. In
    that case, delete the file, so it is re-downloaded, or try to download the file
    manually using your browser.


    ### Executing a Workload


    You execute a workload with the `run()` method. If you specify the name of the
    known workload, then that workload will be executed immediately. Otherwise, the
    available workloads are listed, and you are prompted for the workload. You can
    in this case specify the workload either by the number (e.g., 15 for Listing [6-1](#502546_1_En_6_Chapter.xhtml#PC1))
    or by the name. When using the name, the number of spaces between `Listing` and
    the listing number does not matter as long as there is at least one space. When
    you choose the workload using the prompt, you can choose another workload once
    the previous has completed.


    After the workload has completed, for several of the workloads, you will be given
    a list of suggestions for investigations you can do. This can, for example, be
    to query the locks held by the connections used in the example. The investigations
    are meant as inspiration, and you are encouraged to explore the workload using
    your own queries. Some of the investigations are also used in the discussion of
    the example. Listing [1-2](#502546_1_En_1_Chapter.xhtml#PC6) shows an example
    of executing a workload using the prompt.


    ```

    mysql-py> concurrency_book.generate.run()

    Available workloads:

    ====================

    # Name                   Description


    1 Listing  2-1           Example use of the metadata_locks table

    2 Listing  2-2           Example of using the table_handles table

    3 Listing  2-3           Using the data_locks table

    ...

    14 Listing  5-2           Example of obtaining exclusive locks

    15 Listing  6-1           A deadlock for user-level locks

    ...

    Choose workload (# or name - empty to exit): 15

    Password for connections: ********

    2020-07-20 20:50:41.666488  0 [INFO] Starting the workload Listing 6-1

    ****************************************************

    *                                                  *

    *   Listing 6-1. A deadlock for user-level locks   *

    *                                                  *

    ****************************************************

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              105         249          6

    --          2              106         250          6

    -- Connection 1

    Connection 1> SELECT GET_LOCK(''my_lock_1'', -1);

    +---------------------------+

    | GET_LOCK(''my_lock_1'', -1) |

    +---------------------------+

    |                         1 |

    +---------------------------+

    1 row in set (0.0003 sec)

    -- Connection 2

    Connection 2> SELECT GET_LOCK(''my_lock_2'', -1);

    +---------------------------+

    | GET_LOCK(''my_lock_2'', -1) |

    +---------------------------+

    |                         1 |

    +---------------------------+

    1 row in set (0.0003 sec)

    Connection 2> SELECT GET_LOCK(''my_lock_1'', -1);

    -- Connection 1

    Connection 1> SELECT GET_LOCK(''my_lock_2'', -1);

    ERROR: 3058: Deadlock found when trying to get user-level lock; try rolling back
    transaction/releasing locks and restarting lock acquisition.

    Available investigations:

    =========================

    # Query

    ```'
  raw: '### Loading Test Data


    The `concurrency_book.generate` module supports loading the `employees`, `sakila`,
    and `world` example databases into your MySQL instance. For the `employees` database
    , you can optionally choose a version with partitions. The `world` database is
    the most important for this book followed by the `sakila` database. The `employees`
    database is only used for the case study in Chapter [18](#502546_1_En_18_Chapter.xhtml).
    Each of the three schemas is described in more detail later in this chapter.


    Note


    If the schema exists, it will be dropped as part of the load job. This effectively
    means that `load()` resets the schema.


    You load a schema with the `load()` method which optionally takes the name of
    the schema you want to load. If you do not provide a schema name, then you will
    be prompted. Listing [1-1](#502546_1_En_1_Chapter.xhtml#PC4) shows an example
    of loading the `world` schema.


    ```

    mysql-py> concurrency_book.generate.load()

    Available Schema load jobs:

    ===========================

    # Name                   Description


    1 employees              The employee database

    2 employees partitioned  The employee database with partitions

    3 sakila                 The sakila database

    4 world                  The world database

    Choose Schema load job (# or name - empty to exit): 4

    2020-07-20 21:27:15.221340  0 [INFO] Downloading https://downloads.mysql.com/docs/world.sql.zip
    to C:\Users\myuser\AppData\Roaming\mysql_concurrency_book\sample_data\world.sql.zip

    2020-07-20 21:27:18.159554  0 [INFO] Processing statements in world.sql

    2020-07-20 21:27:27.045219  0 [INFO] Load of the world schema completed

    Available Schema load jobs:

    ===========================

    # Name                   Description


    1 employees              The employee database

    2 employees partitioned  The employee database with partitions

    3 sakila                 The sakila database

    4 world                  The world database

    Choose Schema load job (# or name - empty to exit):

    Listing 1-1

    Loading the world schema

    ```


    The `load()` method downloads the file with the schema definition, if it does
    not already have it. The downloaded file is stored in `%APPDATA\mysql_concurrency_book\sample_data\`
    on Microsoft Windows and in `${HOME}/.mysql_concurrency_book/sample_data/` on
    other platforms. If you want the file re-downloaded, delete it from that directory.


    Tip


    As only relatively low-level network routines are available in MySQL Shell’s Python,
    downloading the employees database may fail if you have a slow or unstable connection.
    One option – other than installing the schema manually – is to download [`https://github.com/datacharmer/test_db/archive/master.zip`](https://github.com/datacharmer/test_db/archive/master.zip)
    and save it in the `sample_data` directory. After that, the `load()` method will
    pick it up and not attempt to download it again.


    If you only want to load a single schema, you can specify the name as an argument
    to `load()`. This can be particularly useful when initiating a schema load as
    a command given directly on the command line when invoking MySQL Shell, for example


    ```

    shell> mysqlsh --user=myuser --py -e "concurrency_book.generate.load(''world'')"

    ```


    When you are done loading the schemas you need, you can reply with an empty answer
    to exit. You are now ready to execute the workloads.


    Note


    If the load process crashes complaining about the file, for example, that it is
    not a ZIP file, then it suggests the file is corrupted or incomplete. In that
    case, delete the file, so it is re-downloaded, or try to download the file manually
    using your browser.


    ### Executing a Workload


    You execute a workload with the `run()` method . If you specify the name of the
    known workload, then that workload will be executed immediately. Otherwise, the
    available workloads are listed, and you are prompted for the workload. You can
    in this case specify the workload either by the number (e.g., 15 for Listing [6-1](#502546_1_En_6_Chapter.xhtml#PC1))
    or by the name. When using the name, the number of spaces between `Listing` and
    the listing number does not matter as long as there is at least one space. When
    you choose the workload using the prompt, you can choose another workload once
    the previous has completed.


    After the workload has completed, for several of the workloads, you will be given
    a list of suggestions for investigations you can do. This can, for example, be
    to query the locks held by the connections used in the example. The investigations
    are meant as inspiration, and you are encouraged to explore the workload using
    your own queries. Some of the investigations are also used in the discussion of
    the example. Listing [1-2](#502546_1_En_1_Chapter.xhtml#PC6) shows an example
    of executing a workload using the prompt.


    ```

    mysql-py> concurrency_book.generate.run()

    Available workloads:

    ====================

    # Name                   Description


    1 Listing  2-1           Example use of the metadata_locks table

    2 Listing  2-2           Example of using the table_handles table

    3 Listing  2-3           Using the data_locks table

    ...

    14 Listing  5-2           Example of obtaining exclusive locks

    15 Listing  6-1           A deadlock for user-level locks

    ...

    Choose workload (# or name - empty to exit): 15

    Password for connections: ********

    2020-07-20 20:50:41.666488  0 [INFO] Starting the workload Listing 6-1

    ****************************************************

    *                                                  *

    *   Listing 6-1\. A deadlock for user-level locks   *

    *                                                  *

    ****************************************************

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              105         249          6

    --          2              106         250          6

    -- Connection 1

    Connection 1> SELECT GET_LOCK(''my_lock_1'', -1);

    +---------------------------+

    | GET_LOCK(''my_lock_1'', -1) |

    +---------------------------+

    |                         1 |

    +---------------------------+

    1 row in set (0.0003 sec)

    -- Connection 2

    Connection 2> SELECT GET_LOCK(''my_lock_2'', -1);

    +---------------------------+

    | GET_LOCK(''my_lock_2'', -1) |

    +---------------------------+

    |                         1 |

    +---------------------------+

    1 row in set (0.0003 sec)

    Connection 2> SELECT GET_LOCK(''my_lock_1'', -1);

    -- Connection 1

    Connection 1> SELECT GET_LOCK(''my_lock_2'', -1);

    ERROR: 3058: Deadlock found when trying to get user-level lock; try rolling back
    transaction/releasing locks and restarting lock acquisition.

    Available investigations:

    =========================

