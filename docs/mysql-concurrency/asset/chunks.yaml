  trans: '

    ### 确定工作负载


    调查的最后一步是确定导致争用的工作负载。这也是最困难的任务。最佳情况是你拥有一个监控解决方案，能够收集已执行查询的信息并为其聚合统计数据。通过这种监控，你可以直接看到执行了哪些查询，这有助于你确定争用的原因。如果你无法获取争用发生期间执行的查询的监控数据，你可以尝试使用
    `sys.session` 或包含语句信息的 Performance Schema 表（`threads`、`events_statements_current`、`events_statements_history`
    和 `events_statements_history_long`）来监控查询。另一个选择是使用 `sys` 模式中的 `statement_performance_analyzer()`
    存储过程，它会对 `events_statements_summary_by_digest` 表拍摄两个快照，计算差异，并返回一个或多个报告，显示两个快照之间执行的查询信息。


    > **提示**

    >

    > `sys` 模式中的 `statement_performance_analyzer()` 过程可用于生成一个“简陋的查询分析器”，用以查看两个快照之间执行的查询。有关文档和示例，请参见
    [`https://dev.mysql.com/doc/refman/en/sys-statement-performance-analyzer.html`](https://dev.mysql.com/doc/refman/en/sys-statement-performance-analyzer.html)。


    这听起来容易，但在实践中并非如此简单。即使有良好的监控，要确定哪些查询是问题所在也可能近乎不可能。在真实的生产系统中，你可能面临每秒超过 100,000 次的查询峰值，以及每分钟超过
    10,000 个唯一的查询摘要。试图从这些查询中找出导致争用的组合，会让大海捞针都显得轻而易举。


    如果你幸运的话，你或许可以根据发生争用的互斥量和信号量来猜测你要寻找的查询类型。在本例中，争用发生在自适应哈希索引上，该索引专用于二级索引。因此，你知道感兴趣的查询必定使用了二级索引，并且一个查询执行的索引查找和索引修改操作越多，它成为问题一部分的可能性就越大。在这种情况下，只读查询使用了两个二级索引，这可以从如清单
    18-3 所示的查询计划中看出。


    ```

    EXPLAIN

    SELECT dept_name, MIN(salary) min_salary,

    AVG(salary) AS avg_salary, MAX(salary) AS max_salary

    FROM employees.departments

    INNER JOIN employees.dept_emp USING (dept_no)

    INNER JOIN employees.salaries USING (emp_no)

    WHERE dept_emp.to_date = ''9999-01-01''

    AND salaries.to_date = ''9999-01-01''

    GROUP BY dept_no

    ORDER BY dept_name

    *************************** 1\. row ***************************

    id: 1

    select_type: SIMPLE

    table: departments

    partitions: NULL

    type: index

    possible_keys: PRIMARY,dept_name

    key: PRIMARY

    key_len: 16

    ref: NULL

    rows: 9

    filtered: 100

    Extra: Using temporary; Using filesort

    *************************** 2\. row ***************************

    id: 1

    select_type: SIMPLE

    table: dept_emp

    partitions: NULL

    type: ref

    possible_keys: PRIMARY,dept_no,idx_concurrency_book_0

    key: idx_concurrency_book_0

    key_len: 19

    ref: employees.departments.dept_no,const

    rows: 9

    filtered: 100

    Extra: Using index

    *************************** 3\. row ***************************

    id: 1

    select_type: SIMPLE

    table: salaries

    partitions: NULL

    type: ref

    possible_keys: PRIMARY,idx_concurrency_book_2

    key: idx_concurrency_book_2

    key_len: 7

    ref: employees.dept_emp.emp_no,const

    rows: 1

    filtered: 100

    Extra: Using index

    3 rows in set, 1 warning (0.0009 sec)

    ```


    **清单 18-3**

    测试中只读查询的查询计划


    对 `dept_emp` 和 `salaries` 表的连接都是通过二级索引执行的，分别是 `idx_concurrency_book_0` 和 `idx_concurrency_book_2`
    索引。同样，读写连接执行的查询也使用了二级索引；验证这一点留给读者作为练习。


    调查完成后，你需要决定如何处理该争用。


    ## 解决方案与预防措施


    与之前的案例研究不同，通常没有直接的方法来解决和预防此问题。相反，你需要测试和验证对系统进行各种可能更改的效果。因此，解决方案和预防措施两部分合并讨论。


    *   完全禁用自适应哈希索引


    *   增加分区数量


    *   增加线程挂起前的自旋轮数


    *   将工作负载拆分到不同的副本


    这些选项将在本节剩余部分进行讨论。

    '
- fmt: '### Disabling the Adaptive Hash Index


    对于自适应哈希索引的争用，最直接的解决方案是禁用该功能。在执行此操作之前，您需要考虑报告的争用是否真的是性能问题。请记住，互斥量和信号量等待本身并不是问题的迹象；事实上，它们是
    MySQL 的自然组成部分。当请求无法立即完成时，自旋等待计数器就会递增。如果查询仅等待几个自旋回合后请求就完成了，那不一定是个问题。您可以查看的一个指标是每次等待的平均自旋回合数，并用此来估计等待时间。如图
    18-3 所示。


    ![../images/502546_1_En_18_Chapter/502546_1_En_18_Fig3_HTML.jpg](images/502546_1_En_18_Chapter/502546_1_En_18_Fig3_HTML.jpg)


    Figure 18-3


    共享和独占 rw-lock 的平均每次等待自旋回合数


    该图显示，对于独占锁，平均每次等待花费 80 到 100 个回合等待。这很重要，因为每次轮询之间都存在延迟（`innodb_spin_wait_delay`
    和 `innodb_spin_wait_pause_multiplier` 选项）。此外，默认情况下，在 30 个回合后（`innodb_sync_spin_loops`
    选项），InnoDB 会挂起线程，使其可用于其他目的，这使得再次唤醒查询的成本更高。对于共享锁，平均值小于五个，因此更易于管理。


    您还应该考虑自适应哈希索引可用于查找行并节省 B 树搜索的频率。哈希索引查找与 B 树搜索相比速度很快，因此自适应哈希索引能够满足的搜索越多，其开销就越合理。InnoDB
    有两个指标跟踪哈希索引的使用频率以及必须访问 B 树的频率。此外，还有六个与自适应哈希索引相关的其他指标，但这些默认是禁用的（数值包括此测试之前完成的工作，因此会有所不同）：


    ```

    mysql> SELECT variable_name, variable_value AS value, enabled

    FROM sys.metrics

    WHERE type = ''InnoDB Metrics - adaptive_hash_index''

    ORDER BY variable_name;

    +------------------------------------------+----------+---------+

    | variable_name                            | value    | enabled |

    +------------------------------------------+----------+---------+

    | adaptive_hash_pages_added                | 0        | NO      |

    | adaptive_hash_pages_removed              | 0        | NO      |

    | adaptive_hash_rows_added                 | 0        | NO      |

    | adaptive_hash_rows_deleted_no_hash_entry | 0        | NO      |

    | adaptive_hash_rows_removed               | 0        | NO      |

    | adaptive_hash_rows_updated               | 0        | NO      |

    | adaptive_hash_searches                   | 51488882 | YES     |

    | adaptive_hash_searches_btree             | 10904682 | YES     |

    +------------------------------------------+----------+---------+

    8 rows in set (0.0097 sec)

    ```


    这表明超过 5100 万次搜索（`adaptive_hash_searches`）由哈希索引满足，少于 1100 万次搜索需要使用 B 树。这给出了一个命中率


    ![$$ Hit\ Rate=100\%\ast \frac{adaptive\_ hash\_ searches}{adaptive\_ hash\_ searches+
    adaptive\_ hash\_ searches\_ btree} $$](images/502546_1_En_18_Chapter/502546_1_En_18_Chapter_TeX_IEq1.png)


    82.5% 的命中率可能看起来不错，但根据工作负载的不同，这对于自适应哈希索引来说可能偏低。请记住，哈希索引也会在缓冲池中占用内存。如果禁用自适应哈希索引，该内存可用于缓存
    B 树索引。您还需要考虑指标覆盖的时间范围以及哈希索引的有用性是否存在波动。对于后者，监控软件中的图表是查看一段时间内数据的好方法。图 18-4 显示了一个基于此测试期间收集的指标的示例。


    ![../images/502546_1_En_18_Chapter/502546_1_En_18_Fig4_HTML.jpg](images/502546_1_En_18_Chapter/502546_1_En_18_Fig4_HTML.jpg)


    Figure 18-4


    测试期间的自适应哈希索引搜索指标


    在这里，您可以看到最初，自适应哈希索引是有效的，大多数搜索都是使用哈希索引完成的。然而，测试进行到 6 秒时，`adaptive_hash_searches`
    指标开始急剧下降，在 9 秒标记之后直到测试接近结束，它都没有超过每秒 250 次匹配。您还可以看到，这段时间内两者的总和远低于开始时，这可能是由于争用导致整体查询性能受到影响。不过，您需要使用其他来源来确认情况是否如此；这留作练习。


    或者，您可以直接绘制命中率图，如图 18-5 所示。


    ![../images/502546_1_En_18_Chapter/502546_1_En_18_Fig5_HTML.jpg](images/502546_1_En_18_Chapter/502546_1_En_18_Fig5_HTML.jpg)


    Figure 18-5


    测试期间的自适应哈希索引命中率


    这清楚地表明，最初自适应哈希索引相当有效，但随后变得无用。基于此，似乎值得禁用自适应哈希索引，您可以通过将 `innodb_adaptive_hash_index`
    设置为 `OFF` 或 `0` 来实现，例如


    ```

    SET GLOBAL innodb_adaptive_hash_index = OFF;

    Query OK, 0 rows affected (0.1182 sec)

    ```


    虽然您可以动态测试禁用哈希索引，但请注意，一旦您这样做，缓冲池中的哈希索引就会被清除，因此如果您稍后重新启用该功能，则需要重建哈希。对于大型实例，自适应哈希索引可能使用
    25 GiB 或更多内存，因此重建需要一段时间。因此，在生产系统中禁用自适应哈希索引时，您可能希望保留一个启用了该功能的副本准备好，以便在禁用 `innodb_adaptive_hash_index`
    导致性能下降时可以故障转移到该副本。


    > **提示：**

    > 最终，对于信号量争用问题，您需要使用基准测试或在类生产环境中进行测试，或者通过拥有不同设置的副本，来验证您的更改效果。虽然可以像本次讨论中那样对效果进行一些估计，但涉及部分之间的交互是复杂的，在您进行测量之前无法确定整体影响。


    虽然禁用自适应哈希索引是一个直接的解决方案，但您还可以考虑其他可能允许您继续至少部分使用自适应哈希索引的更改。'
  raw: '### Disabling the Adaptive Hash Index


    For contention on the adaptive hash index , the most straightforward solution
    is to disable the feature. Before you do so, you need to consider whether the
    reported contention is really a performance issue. Remember, mutex and semaphore
    waits are not by themselves a sign of problems; in fact, they are a natural part
    of MySQL. The spin waits counter increments as soon as a request cannot be fulfilled
    immediately. If the query only waits a few spin rounds before the request is fulfilled,
    it is not necessarily an issue. One thing you can look at is the average number
    of spin rounds per wait and use that to estimate how long the waits are. This
    is illustrated in Figure [18-3](#502546_1_En_18_Chapter.xhtml#Fig3).


    ![../images/502546_1_En_18_Chapter/502546_1_En_18_Fig3_HTML.jpg](images/502546_1_En_18_Chapter/502546_1_En_18_Fig3_HTML.jpg)


    Figure 18-3


    The average spin rounds per wait for shared and exclusive rw-locks


    The figure shows that for exclusive locks, on average, each wait spends 80 to
    100 rounds waiting. That is significant as there is a delay between each poll
    (the `innodb_spin_wait_delay` and `innodb_spin_wait_pause_multiplier` options).
    Additionally, by default, after 30 rounds (the `innodb_sync_spin_loops` option),
    InnoDB suspends the thread to make it become available for other purposes which
    makes waking up the query again more expensive. For shared locks, the average
    is less than five and thus more manageable.


    You should also consider how often the adaptive hash index can be used to find
    the rows and save a B-tree search. Hash index lookups are fast compared with B-tree
    searches, so the more searches that can be fulfilled by the adaptive hash index,
    the more overhead it justifies. InnoDB has two metrics that track how frequently
    the hash index is used and how frequently the B-tree must be accessed. Additionally,
    there are six other metrics related to the adaptive hash index, but these are
    disabled by default (the values include work done before this test, so they will
    vary):


    ```

    mysql> SELECT variable_name, variable_value AS value, enabled

    FROM sys.metrics

    WHERE type = ''InnoDB Metrics - adaptive_hash_index''

    ORDER BY variable_name;

    +------------------------------------------+----------+---------+

    | variable_name                            | value    | enabled |

    +------------------------------------------+----------+---------+

    | adaptive_hash_pages_added                | 0        | NO      |

    | adaptive_hash_pages_removed              | 0        | NO      |

    | adaptive_hash_rows_added                 | 0        | NO      |

    | adaptive_hash_rows_deleted_no_hash_entry | 0        | NO      |

    | adaptive_hash_rows_removed               | 0        | NO      |

    | adaptive_hash_rows_updated               | 0        | NO      |

    | adaptive_hash_searches                   | 51488882 | YES     |

    | adaptive_hash_searches_btree             | 10904682 | YES     |

    +------------------------------------------+----------+---------+

    8 rows in set (0.0097 sec)

    ```


    This shows that more than 51 million searches (`adaptive_hash_searches`) have
    been fulfilled by the hash index and less than 11 million searches required using
    the B-tree. That gives a hit rate of


    ![$$ Hit\ Rate=100\%\ast \frac{adaptive\_ hash\_ searches}{adaptive\_ hash\_ searches+
    adaptive\_ hash\_ searches\_ btree} $$](images/502546_1_En_18_Chapter/502546_1_En_18_Chapter_TeX_IEq1.png)


    A hit rate of 82.5% may seem good, but it is likely (depending on the workload)
    on the low side for the adaptive hash index to be beneficial. Remember that the
    hash index also takes up memory in the buffer pool. If you disable the adaptive
    hash index, that memory can be used for caching B-tree indexes instead. You also
    need to take into consideration how long the metrics cover and whether there are
    fluctuations in the usefulness of the hash index. For the latter, a graph in your
    monitoring software is a good way to look at the data over time. Figure [18-4](#502546_1_En_18_Chapter.xhtml#Fig4)
    shows an example based on the metrics collected during this test.


    ![../images/502546_1_En_18_Chapter/502546_1_En_18_Fig4_HTML.jpg](images/502546_1_En_18_Chapter/502546_1_En_18_Fig4_HTML.jpg)


    Figure 18-4


    The adaptive hash index search metrics during the test


    Here you can see that initially, the adaptive hash index is effective with the
    majority of searches being fulfilled using the hash index. However, 6 seconds
    into the test, the `adaptive_hash_searches` metric starts to plummet, and after
    the 9-second mark and until near the end of the test, it does not get above 250
    matches per second. You can also see that the sum of the two is much lower during
    that period than in the start which may be due to contention causing the overall
    query performance to suffer. However, you will need to confirm whether that is
    the case using other sources; this is left as an exercise.


    Alternative, you can plot the hit rate directly as it is shown in Figure [18-5](#502546_1_En_18_Chapter.xhtml#Fig5).


    ![../images/502546_1_En_18_Chapter/502546_1_En_18_Fig5_HTML.jpg](images/502546_1_En_18_Chapter/502546_1_En_18_Fig5_HTML.jpg)


    Figure 18-5


    The adaptive hash index hit rate during the test


    This clearly shows that initially, the adaptive hash index is quite effective
    but then becomes useless. Based on this, it seems likely that it is worth disabling
    the adaptive hash index which you can do by setting `innodb_adaptive_hash_index`
    to `OFF` or `0`, for example


    ```

    SET GLOBAL innodb_adaptive_hash_index = OFF;

    Query OK, 0 rows affected (0.1182 sec)

    ```


    While you can test disabling the hash index dynamically, do be aware that as soon
    as you do so, the hash index in the buffer pool is purged, so if you later re-enable
    the feature, you will need for the hashes to be rebuilt. For large instances,
    the adaptive hash index may use 25 GiB or more memory, so it will take a while
    to rebuild. Thus, when you disable the adaptive hash index in a production system,
    you may want to keep a replica ready with it enabled, so you can fail over to
    the replica should the disablement of `innodb_adaptive_hash_index` turn out to
    cause a performance regression .


    Tip


    Ultimately, for semaphore contention issues, you will need to verify the effect
    of your changes using benchmarks or testing in a production-like environment or
    by having replicas with different settings. While some estimates of the effect
    can be made like in this discussion, the interactions between the involved parts
    are complex, and you cannot be sure of the overall effect before you measure it.


    While disabling the adaptive hash index is a straightforward solution, there are
    other changes you can consider that may allow you to continue using the adaptive
    hash index at least partially.'
  trans: '

    ### 禁用自适应哈希索引


    解决自适应哈希索引争用最直接的方法是禁用该功能。在执行此操作前，您需要评估报告的争用是否真的构成了性能问题。请记住，互斥锁和信号量等待本身并非问题的征兆；实际上，它们是
    MySQL 的自然组成部分。当请求无法立即完成时，自旋等待计数器就会增加。如果查询仅等待几个自旋回合后请求就完成了，那不一定是个问题。您可以查看的一个指标是每次等待的平均自旋回合数，并以此来估算等待时间。如图
    18-3 所示。


    ![../images/502546_1_En_18_Chapter/502546_1_En_18_Fig3_HTML.jpg](img/502546_1_En_18_Fig3_HTML.jpg)


    图 18-3


    共享锁和独占锁的平均每次等待自旋回合数


    该图显示，对于独占锁，每次等待平均花费 80 到 100 个回合。这很重要，因为每次轮询之间存在延迟（由 `innodb_spin_wait_delay`
    和 `innodb_spin_wait_pause_multiplier` 选项控制）。此外，默认情况下，在 30 个回合后（`innodb_sync_spin_loops`
    选项），InnoDB 会挂起线程，使其可用于其他目的，这使得再次唤醒查询的成本更高。对于共享锁，平均值小于五个，因此更容易管理。


    您还应该考虑自适应哈希索引可用于查找行并节省 B 树搜索的频率。哈希索引查找与 B 树搜索相比速度很快，因此自适应哈希索引能满足的搜索越多，其开销就越合理。InnoDB
    有两个指标跟踪哈希索引的使用频率以及必须访问 B 树的频率。此外，还有六个与自适应哈希索引相关的其他指标，但这些默认是禁用的（数值来自此测试之前完成的工作，因此可能有所不同）：


    ```

    mysql> SELECT variable_name, variable_value AS value, enabled

    FROM sys.metrics

    WHERE type = ''InnoDB Metrics - adaptive_hash_index''

    ORDER BY variable_name;

    +------------------------------------------+----------+---------+

    | variable_name                            | value    | enabled |

    +------------------------------------------+----------+---------+

    | adaptive_hash_pages_added                | 0        | NO      |

    | adaptive_hash_pages_removed              | 0        | NO      |

    | adaptive_hash_rows_added                 | 0        | NO      |

    | adaptive_hash_rows_deleted_no_hash_entry | 0        | NO      |

    | adaptive_hash_rows_removed               | 0        | NO      |

    | adaptive_hash_rows_updated               | 0        | NO      |

    | adaptive_hash_searches                   | 51488882 | YES     |

    | adaptive_hash_searches_btree             | 10904682 | YES     |

    +------------------------------------------+----------+---------+

    8 rows in set (0.0097 sec)

    ```


    这表明超过 5100 万次搜索（`adaptive_hash_searches`）由哈希索引满足，少于 1100 万次搜索需要使用 B 树。这给出了一个命中率：


    ![$$ Hit\ Rate=100\%\ast \frac{adaptive\_ hash\_ searches}{adaptive\_ hash\_ searches+
    adaptive\_ hash\_ searches\_ btree} $$](img/502546_1_En_18_Chapter_TeX_IEq1.png)


    82.5% 的命中率可能看起来不错，但根据工作负载的不同，这对于自适应哈希索引来说可能偏低。请记住，哈希索引也会在缓冲池中占用内存。如果禁用自适应哈希索引，该内存可用于缓存
    B 树索引。您还需要考虑指标覆盖的时间范围以及哈希索引的有效性是否存在波动。对于后者，监控软件中的图表是查看一段时间内数据的好方法。图 18-4 显示了一个基于此测试期间收集指标的示例。


    ![../images/502546_1_En_18_Chapter/502546_1_En_18_Fig4_HTML.jpg](img/502546_1_En_18_Fig4_HTML.jpg)


    图 18-4


    测试期间的自适应哈希索引搜索指标


    在这里，您可以看到最初自适应哈希索引是有效的，大多数搜索都是通过哈希索引完成的。然而，测试进行到 6 秒时，`adaptive_hash_searches`
    指标开始急剧下降，在 9 秒之后直到测试接近结束，它都没有超过每秒 250 次匹配。您还可以看到，这段时间内两者的总和远低于开始时，这可能是由于争用导致整体查询性能受到影响。不过，您需要使用其他来源来确认情况是否如此；这留作练习。


    或者，您可以直接绘制命中率图，如图 18-5 所示。


    ![../images/502546_1_En_18_Chapter/502546_1_En_18_Fig5_HTML.jpg](img/502546_1_En_18_Fig5_HTML.jpg)


    图 18-5


    测试期间的自适应哈希索引命中率


    这清楚地表明，最初自适应哈希索引相当有效，但随后变得无用。基于此，似乎值得禁用自适应哈希索引，您可以通过将 `innodb_adaptive_hash_index`
    设置为 `OFF` 或 `0` 来实现，例如：


    ```

    SET GLOBAL innodb_adaptive_hash_index = OFF;

    Query OK, 0 rows affected (0.1182 sec)

    ```


    虽然您可以动态测试禁用哈希索引，但请注意，一旦禁用，缓冲池中的哈希索引就会被清除，因此如果您稍后重新启用该功能，则需要重建哈希。对于大型实例，自适应哈希索引可能使用
    25 GiB 或更多内存，因此重建需要一段时间。因此，在生产系统中禁用自适应哈希索引时，您可能希望保留一个启用了该功能的副本备用，以便在禁用 `innodb_adaptive_hash_index`
    导致性能下降时可以故障转移到该副本。


    > **提示：**

    > 最终，对于信号量争用问题，您需要使用基准测试或在类生产环境中进行测试，或者通过拥有不同设置的副本，来验证您的更改效果。虽然可以像本次讨论中那样对效果进行一些估计，但涉及组件之间的交互是复杂的，在您进行测量之前无法确定整体影响。


    虽然禁用自适应哈希索引是一个直接的解决方案，但您还可以考虑其他可能允许您继续至少部分使用自适应哈希索引的更改。

    '
- fmt: '### Increase the Number of Hash Index Parts


    If the contention is caused by too many connections hitting the same hash partition,
    then an option is to increase the number of parts the adaptive hash index is split
    into. This is done with the `innodb_adaptive_hash_index_parts` option. There is
    no direct way to determine whether increasing the number of hash index parts will
    help, though you can take a look at `INSERT BUFFER AND ADAPTIVE HASH INDEX` section
    in the InnoDB monitor output and see the size and number of buffers in each part,
    for example:


    ```sql

    mysql> SHOW ENGINE INNODB STATUS\G

    ...


    INSERT BUFFER AND ADAPTIVE HASH INDEX


    Ibuf: size 1, free list len 13, seg size 15, 0 merges

    merged operations:

    insert 0, delete mark 0, delete 0

    discarded operations:

    insert 0, delete mark 0, delete 0

    Hash table size 34679, node heap has 1 buffer(s)

    Hash table size 34679, node heap has 3880 buffer(s)

    Hash table size 34679, node heap has 1 buffer(s)

    Hash table size 34679, node heap has 1 buffer(s)

    Hash table size 34679, node heap has 1 buffer(s)

    Hash table size 34679, node heap has 1 buffer(s)

    Hash table size 34679, node heap has 1 buffer(s)

    Hash table size 34679, node heap has 1 buffer(s)

    0.00 hash searches/s, 0.00 non-hash searches/s

    ...

    ```


    This output is from the end of the test, and you can see that it is mostly one
    of the parts that is in use (which part may differ for you). So, in this case,
    it likely does not help to add more hash index parts. In a more realistic production
    usage with many indexes, you are more likely to benefit from more parts.


    ### Other Solutions


    It was discussed earlier in this section that it was a problem so many of the
    spin waits were converted into OS waits. Particularly if you do not use all of
    your CPUs, you can consider increasing the value of the `innodb_sync_spin_loops`
    option to allow InnoDB to keep polling for the rw-lock to become available. This
    can reduce the number of context switches and the overall wait time.


    Finally, you can consider dividing your queries into those that benefit from the
    adaptive hash index and those that do not and direct each group of queries to
    separate replicas. That way, you can execute the queries that benefit from the
    adaptive hash index on a replica where the feature is enabled and those that do
    not benefit on a replica with it disabled. This obviously is mostly a solution
    for read-only tasks.


    ### Summary


    This case study has investigated an example of semaphore contention on the adaptive
    hash index. The symptoms include an elevated number of waits reported by the `innodb_rwlock_%`
    InnoDB metrics and the `SEMAPHORES` section of the InnoDB monitor caused by too
    many queries requiring conflicting access to the same latches.


    The setup for this case study is more involved compared to most of the previous
    case studies and is easiest reproduced using the `concurrency_book` module for
    MySQL Shell. The workload for this chapter prompts for various settings for the
    test, so you can try and adapt the test for your system.


    The investigation started out using the `innodb_rwlock_%` metrics to determine
    when the contention is a problem. You can both look at the raw metrics and the
    spin rounds per spin wait. Then the InnoDB monitor and mutex monitor were used
    to determine where the contention is, in this case, on the adaptive hash index.
    Finally, it was discussed how you may be able to determine the workload causing
    the contention.


    The solution is in general not simple and deterministic when working with mutex
    and semaphore contention. For the adaptive hash index, the most straightforward
    option is to disable it, but before you do that, you need to consider the overall
    effectiveness of the feature including the hit rate. An alternative is to split
    the hash index into more parts; however, that only works if the contention affects
    several of your existing partitions. Other solutions include increasing the number
    of spin loops allowed to reduce how often InnoDB suspends the polling and to use
    multiple read replicas with different configurations.


    That concludes the journey through the world of MySQL concurrency with focus on
    locks and transactions. Remember that practice makes perfect, and this is particularly
    true with the topics discussed in this book. The remainder of the book consists
    of two appendixes of which Appendix A contains various references for Performance
    Schema tables, the InnoDB monitor, and more. Appendix B is a reference for the
    `concurrency_book` module for MySQL Shell.


    Good luck with your continued MySQL concurrency performance journey.'
