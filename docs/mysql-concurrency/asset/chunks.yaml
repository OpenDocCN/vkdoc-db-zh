    ## 测试数据：sakila 模式


    `sakila` 数据库是一个真实的数据库，它包含一个电影租赁业务的模式，其中有电影、库存、商店、员工和客户的信息。它添加了全文索引、空间索引、视图和存储程序，以提供一个使用
    MySQL 功能的更完整的示例。数据库规模仍然非常适中，使其适用于小型实例。


    ### 模式


    `sakila` 数据库由 16 张表、七个视图、三个存储过程、三个存储函数和六个触发器组成。这些表可以分为三组：客户数据、业务数据和库存数据。为简洁起见，图表中并未包含所有列，且大多数索引也未显示。图
    1-8 展示了表、视图和存储例程的完整概览。


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig8_HTML.jpg](img/502546_1_En_1_Fig8_HTML.jpg)


    图 1-8


    `sakila` 数据库概览


    包含客户相关数据（以及员工和商店的地址）的表位于左上角区域。左下角区域包含与业务相关的数据，右上角区域包含有关电影和库存的信息。右下角用于视图和存储例程。


    **提示**


    你可以通过在 MySQL Workbench 中打开安装包中包含的 `sakila.mwb` 文件来查看整个图表（尽管格式不同）。这也是一个很好的例子，展示了如何在
    MySQL Workbench 中使用增强实体关系图（EER）来记录你的模式。


    由于对象数量相对较多，在讨论模式时，它们将被分为五组（每个表组、视图和存储例程）。第一组是客户相关数据，其表如图 1-9 所示。


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig9_HTML.jpg](img/502546_1_En_1_Fig9_HTML.jpg)


    图 1-9


    `sakila` 数据库中包含客户数据的表


    有四张表包含与客户相关的数据。客户表是主表，地址信息存储在地址、城市和国家表中。


    客户组和业务组之间存在外键关系，即客户表有一个指向业务组中商店表的外键。此外，从业务组的表到地址和客户表还有四个外键。业务组如图 1-10 所示。


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig10_HTML.jpg](img/502546_1_En_1_Fig10_HTML.jpg)


    图 1-10


    `sakila` 数据库中包含业务数据的表


    业务表包含有关商店、员工、租赁和付款的信息。商店和员工表之间存在双向的外键关系：员工属于一个商店，而商店的经理是员工的一部分。租赁和付款由一名员工处理，因此间接链接到商店，而付款是针对一次租赁的。


    业务表组是与其他组关系最多的组。员工和商店表有指向地址表的外键，租赁和付款表引用客户表。最后，租赁表有一个指向库存组中库存表的外键。库存组的图表如图 1-11
    所示。


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig11_HTML.jpg](img/502546_1_En_1_Fig11_HTML.jpg)


    图 1-11


    `sakila` 数据库中包含库存数据的表


    库存组中的主表是电影表，它包含有关商店提供的电影的元数据。此外，还有 `film_text` 表，其中包含带有全文索引的标题和描述。


    电影表与类别和演员表之间存在多对多关系。最后，库存表有一个指向业务组中商店表的外键。


    以上涵盖了 `sakila` 数据库中的所有表，但也存在一些视图，如图 1-12 所示。


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig12_HTML.jpg](img/502546_1_En_1_Fig12_HTML.jpg)


    图 1-12'
- fmt: '# The Views in the `sakila` Database


    The views can be used like reports and can be divided into two categories. The
    `film_list`, `nicer_but_slower_film_list`, and `actor_info` views are related
    to the films stored in the database. The second category contains information
    related to the stores in the `sales_by_store`, `sales_by_film_category`, `staff_list`,
    and `customer_list` views.


    To complete the database, there are also the stored functions and procedures shown
    in Figure [1-13](#502546_1_En_1_Chapter.xhtml#Fig13).


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig13_HTML.jpg](images/502546_1_En_1_Chapter/502546_1_En_1_Fig13_HTML.jpg)


    Figure 1-13: The stored routines in the `sakila` database


    The `film_in_stock()` and `film_not_in_stock()` procedures return a result set
    consisting of the inventory ids for a given film and store based on whether the
    film is in stock or not. The total number of inventory entries found is returned
    as an out parameter. The `rewards_report()` procedure generates a report based
    on minimum spends for the last month.


    The `get_customer_balance()` function returns the balance for a given customer
    on a given date. The two remaining functions check the status of an inventory
    id with `inventory_held_by_customer()` returning customer id of the customer currently
    renting that item (and `NULL` if no customer is renting it), and if you want to
    check whether a given inventory id is in stock, you can use the `inventory_in_stock()`
    function.


    ## Installation


    You can download a file with the installation scripts to install the `sakila`
    schema from [`https://dev.mysql.com/doc/index-other.html`](https://dev.mysql.com/doc/index-other.html)
    like for the `world` database.


    The downloaded file expands into a directory with three files of which two create
    the schema and data and the last file contains the ETL diagram in the format used
    by MySQL Workbench.


    **Note:** The `sakila` database is also available with the download of the `employees`
    database; however, this section and the examples later in the book use the copy
    of the `sakila` database that is downloaded from MySQL’s homepage.


    The files are:


    *   **sakila-data.sql:** The `INSERT` statements needed to populate the tables
    as well as the trigger definitions.

    *   **sakila-schema.sql:** The schema definition statements.

    *   **sakila.mwb:** The MySQL Workbench ETL diagram. This is similar to that shown
    in Figure [1-7](#502546_1_En_1_Chapter.xhtml#Fig7) with details in Figures [1-8](#502546_1_En_1_Chapter.xhtml#Fig8)
    to [1-12](#502546_1_En_1_Chapter.xhtml#Fig12).


    You install the `sakila` database by first sourcing the `sakila-schema.sql` file
    and then the `sakila-data.sql` file. For example, the following is using MySQL
    Shell:


    ```

    MySQL [localhost+ ssl] SQL> \source sakila-schema.sql

    MySQL [localhost+ ssl] SQL> \source sakila-data.sql

    ```


    Add the path to the files if they are not located in the current directory.


    # Test Data: The `employees` Schema


    The `employees` database (called employee data on the MySQL documentation download
    page; the name of the GitHub repository is `test_db`) was originally created by
    Fusheng Wang and Carlo Zaniolo and is the largest of the test data sets linked
    from MySQL’s homepage. It comes with a choice of using nonpartitioned tables or
    partitioning two of the largest tables. The total size of the data files is around
    180 MiB for the nonpartitioned version and 440 MiB for the partitioned version.


    ## Schema


    The `employees` database consists of six tables and two views. You can optionally
    install two more views, five stored functions, and two stored procedures. The
    tables are shown in Figure [1-14](#502546_1_En_1_Chapter.xhtml#Fig14).


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig14_HTML.jpg](images/502546_1_En_1_Chapter/502546_1_En_1_Fig14_HTML.jpg)


    Figure 1-14: The tables, views, and routines in the `employees` database


    By today’s standards, it is still a relatively small amount of data in the database,
    but it is big enough that you can start to see lower-level contention, and for
    this reason, it is the schema used to cause semaphore waits in Chapter [18](#502546_1_En_18_Chapter.xhtml).


    ## Installation


    You can download a ZIP file with the files required for the installation, or you
    can clone the GitHub repository at [`https://github.com/datacharmer/test_db`](https://github.com/datacharmer/test_db).
    At the time of writing, there is only a single branch named master. If you have
    downloaded the ZIP file, it will unzip into a directory named `test_db-master`.


    There are several files. The two relevant for installing the `employees` database
    in MySQL 8 are `employees.sql` and `employees_partitioned.sql`. The difference
    is whether the `salaries` and `titles` tables are partitioned. This book uses
    the unpartitioned schema. (There is also `employees_partitioned_5.1.sql` which
    is meant for MySQL 5.1 where the partitioning scheme used in `employees_partitioned.sql`
    is not supported.)


    The data is loaded by sourcing the `.dump` files using the `SOURCE` command which
    is only supported in MySQL Shell in 8.0.19 (in practice 8.0.20 due to a bug) and
    later. Go to the directory with the source files, and choose the `employees.sql`
    or `employees_partitioned.sql` file, depending on whether you want to use partitioning
    or not, for example:


    ```

    mysql> \source employees.sql

    ```


    The import takes a little time and completes by showing how long it took:


    ```

    +---------------------+

    | data_load_time_diff |

    +---------------------+

    | 00:02:50            |

    +---------------------+

    1 row in set (0.0085 sec)

    ```


    Optionally, you can load some extra views and stored routines by sourcing the
    `objects.sql` file:


    ```

    mysql> \source objects.sql

    ```


    When you load the `employees` schema using the `concurrency_book.generate.load()`
    method, the `objects.sql` file is always included.


    You are now ready to dive into the world of MySQL concurrency.


    # Summary


    This chapter started the journey to understand MySQL concurrency of which locks
    and transactions are important topics. First it was discussed why locks are needed
    and at what levels they exist. Then it was covered that transactions must be included
    in the discussion as some locks are held for the duration of the transaction and
    the transaction isolation level influences the duration of the locks as well as
    the number of locks.


    The rest of the chapter discussed how the examples are used in this book and introduced
    the three sets of test data that is required to reproduce the test cases. To make
    it easier to load the data and execute the test cases, the `concurrency_book.generate`
    module for MySQL Shell was also introduced.


    In the next chapter, it will be discussed how you can monitor locks.


    # 2. Monitoring Locks and Mutexes


    Monitoring is essential to understanding where bottlenecks occur in your system.
    You need to use monitoring both to determine sources of contention and to verify
    that the changes you make reduce the contention.


    This and the two following two chapters provide an overview of lock and mutex
    monitoring, InnoDB transaction monitoring, and general transaction monitoring
    in the Performance Schema. The remainder of the books shows examples of how you
    can use these monitoring resources to identify and investigate contention. Particularly
    Chapters [13](#502546_1_En_13_Chapter.xhtml)–[18](#502546_1_En_18_Chapter.xhtml)
    use monitoring extensively during the discussion of the case studies.


    In this chapter, you will learn how you can monitor locks and mutexes. The primary
    resource is the Performance Schema which is covered first. Next, the ready-made
    reports in the `sys` schema are discussed. The second half of the chapter covers
    the status metrics, InnoDB lock monitoring, and InnoDB mutex monitoring.


    **Note:** Do not worry if you do not know what the various locks and mutexes are
    yet. You will learn this later with examples of using the monitoring sources discussed
    in this chapter.'
