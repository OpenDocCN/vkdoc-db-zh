  trans: '## 解决方案


    解决问题有两个层面。首先，你需要解决查询无法执行的紧急问题。其次，你需要着手避免未来再次发生此问题。本小节将讨论紧急解决方案，下一小节将探讨如何降低问题发生的概率。


    要解决紧急问题，你可以选择等待查询完成，或者开始终止查询。如果能在刷写锁争用期间将应用程序重定向到另一个实例，你或许可以通过让长时间运行的查询自行完成来使情况自行解决。如果正在运行或等待的查询中包含数据更改查询，那么在这种情况下，你需要考虑所有查询完成后系统是否会处于一致状态。一种可能的选择是在另一个实例上执行读查询，以只读模式继续运行。


    提示


    如果长时间运行的查询是缺少连接子句的异常查询，它可能需要非常长的时间才能完成。本书作者曾经历过一个运行了数月的查询。在决定是否等待时，你需要尝试估算查询所需时间。一个好的选择是使用
    `EXPLAIN FOR CONNECTION <processlist id>` 命令来检查长时间运行查询的查询计划。


    如果你决定终止查询，可以尝试终止 `FLUSH TABLES` 语句。如果这奏效，那是最简单的解决方案。然而，如前所述，这并不总是有帮助，在这种情况下，唯一的解决方法是终止那些阻止
    `FLUSH TABLES` 语句完成的查询。如果长时间运行的查询看起来像是失控的查询，并且执行它们的应用程序/客户端已不再等待它们，你可能希望直接终止它们，而无需先尝试终止
    `FLUSH TABLES` 语句。


    在考虑终止查询时，一个重要的考虑因素是已经更改了多少数据。对于纯 `SELECT` 查询（不涉及存储例程），更改的数据量总是零，从已完成工作的角度来看，终止它是安全的。然而，对于
    `INSERT`、`UPDATE`、`DELETE` 及类似的查询，如果查询被终止，已更改的数据必须回滚。回滚更改通常比最初执行更改花费的时间更长，因此如果有大量更改，请准备好等待很长时间进行回滚。你可以使用
    `information_schema.INNODB_TRX` 视图，通过查看 `trx_rows_modified` 列来估算已完成的工作量。如果需要回滚的工作量很大，通常最好让查询完成。


    注意


    当 DML 语句被终止时，它已完成的工作必须回滚。回滚通常比创建更改花费的时间更长，有时会长很多。如果你考虑终止长时间运行的 DML 语句，需要将这一点考虑在内。


    当然，最优的情况是你完全防止问题发生。


    ## 预防措施


    刷写锁争用之所以发生，是因为长时间运行的查询和 `FLUSH TABLES` 语句的组合。因此，要防止此问题，你需要研究可以采取哪些措施来避免这两种情况同时出现。


    查找、分析和处理长时间运行的查询超出了本书的范围。然而，一个特别值得关注的选择是设置查询超时，这对于 `SELECT` 语句是支持的，可以通过 `max_execution_time`
    系统变量和 `MAX_EXECUTION_TIME(N)` 优化器提示来实现，这是防止查询失控的好方法。一些连接器也支持查询超时。


    提示


    要避免长时间运行的 `SELECT` 查询，你可以配置 `max_execution_time` 选项或设置 `MAX_EXECUTION_TIME(N)`
    优化器提示。这将使 `SELECT` 语句在指定时间段后超时，并有助于防止出现像刷写锁等待这样的问题。


    有些长时间运行的查询是无法预防的。它可能是一个报表任务、构建缓存表或其他必须访问大量数据的任务。在这种情况下，你能做的最好的事情就是尝试避免它们在需要刷新表的同时运行。一种选择是将长时间运行的查询安排在不需要刷新表的时间运行。另一种选择是让长时间运行的查询在与需要刷新表的任务不同的实例上运行。


    一个需要刷新表的常见任务是进行备份。在 MySQL 8 中，你可以通过使用备份和日志锁来避免此问题。例如，MySQL Enterprise Backup (MEB)
    在 8.0.16 及更高版本中会这样做，因此 InnoDB 表永远不会被刷新。或者，你可以在使用率低的时段执行备份，这样发生冲突的可能性较低，甚至可以在系统处于只读模式时进行备份，从而完全避免
    `FLUSH TABLES WITH READ LOCK`。


    ## 总结


    本章研究了一种情况，即长时间运行的查询阻止了 `FLUSH TABLES WITH READ LOCK` 语句获取刷写锁，这进而又阻止了之后启动的查询执行。像这样的情况是最难调查的情况之一，因为无法从
    Performance Schema 的锁表中获得帮助。相反，你需要查看进程列表，寻找比 `FLUSH TABLES` 语句更早的查询，或者（如果该语句不存在）则寻找等待刷写锁时间最长的连接。


    在大多数情况下，你可以选择等待长时间运行的查询完成或终止它以解决问题。是否终止查询取决于查询的目的以及事务已做的更改数量。为了防止此问题，你可以尝试将任务分开，使长时间运行的查询和
    `FLUSH TABLE` 语句不同时执行，或者让它们在不同的 MySQL 实例上执行。对于 `SELECT` 语句，你还可以使用 `max_execution_time`
    选项或 `MAX_EXECUTION_TIME(N)` 优化器开关来自动终止长时间运行的查询。


    另一种经常引起混淆的锁类型是元数据锁。下一章将讨论一个涉及元数据锁的案例研究。


    # 14. 案例研究：元数据锁与模式锁


    在 MySQL 5.7 及更早版本中，元数据锁常常是困惑的来源。问题在于不清楚谁持有元数据锁。在 MySQL 5.7 中，元数据锁的检测被添加到 Performance
    Schema 中，而在 MySQL 8.0 中，默认启用该检测。启用检测后，可以轻松确定是谁阻止了尝试获取锁的连接。本章通过一个涉及元数据锁的情况示例进行讲解。首先讨论其症状。'
- fmt: '## The Symptoms


    The symptoms of metadata lock contention are similar to those of flush lock contention.
    In a typical situation, there will be a long-running query or transaction, a DDL
    statement waiting for the metadata lock, and possibly queries pilling up. The
    symptoms to look out for are as follows:


    *   A DDL statement and possibly other queries are stuck in the state “Waiting
    for table metadata lock.”

    *   Queries may be pilling up. The queries that are waiting all use the same table.
    (There may potentially be more than one group of queries waiting if there are
    DDL statements for multiple tables waiting for the metadata lock.)

    *   When the DDL statement has waited for `lock_wait_timeout`, an `ER_LOCK_WAIT_TIMEOUT`
    error occurs: `ERROR: 1205: Lock wait timeout exceeded; try restarting transaction`.
    Since the default value for `lock_wait_timeout` is 365 days, this is only likely
    to occur if the timeout has been reduced.

    *   There is a long-running query or a long-running transaction. In the latter
    case, the transaction may be idle or executing a query that does not use the table
    that the DDL statement acts on.


    What makes the situation potentially confusing is the last point: there may not
    be any long-running queries that are the clear candidates for causing the lock
    issue. So, what is the cause of the metadata lock contention?


    ## The Cause


    Remember that the metadata locks exist to protect the schema definition (as well
    as being used with explicit locks). The schema protection will exist for as long
    as a transaction is active, so when a transaction queries a table, the metadata
    lock will last until the end of the transaction. Therefore, you may not see any
    long-running queries. In fact, the transaction holding the metadata lock may not
    be doing anything at all.


    In short, the metadata lock exists as one or more connections may rely on the
    schema for a given table not changing, or they have explicitly locked the table
    either using the `LOCK TABLES` or `FLUSH TABLES WITH READ LOCK` statement.


    ## The Setup


    The example investigation of metadata locks uses three connections like in the
    example in the previous chapter. The first connection is in the middle of a transaction,
    the second connection tries to add an index to the table used by the transaction,
    and the third connection attempts to execute a query against the same table. The
    queries are shown in Listing 14-1.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              713        1181          6

    --          2              714        1182          6

    --          3              715        1183          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT * FROM world.city WHERE ID = 3805\G

    *************************** 1. row ***************************

    ID: 3805

    Name: San Francisco

    CountryCode: USA

    District: California

    Population: 776733

    1 row in set (0.0007 sec)

    Connection 1> SELECT Code, Name FROM world.country WHERE Code = ''USA''\G

    *************************** 1. row ***************************

    Code: USA

    Name: United States

    1 row in set (0.0005 sec)

    -- Connection 2

    Connection 2> ALTER TABLE world.city ADD INDEX (Name);

    -- Connection 3

    Connection 3> SELECT * FROM world.city WHERE ID = 130;

    Listing 14-1

    Triggering metadata lock contention

    ```


    At this point, you can start the investigation. The situation will not resolve
    itself (unless you have a low value for `lock_wait_timeout` or you are prepared
    to wait a year), so you have all the time you want. When you want to resolve the
    block, you can start terminating the `ALTER TABLE` statement in Connection 2 to
    avoid modifying the world. city table. Then commit or roll back the transaction
    in Connection 1.


    ## The Investigation


    If you have the `wait/lock/metadata/sql/mdl` Performance Schema instrument enabled
    (the default in MySQL 8), it is straightforward to investigate metadata lock issues.
    You can use the `metadata_locks` table in the Performance Schema to list the granted
    and pending locks. However, a simpler way to get a summary of the lock situation
    is to use the `schema_table_lock_waits` view in the sys schema.


    As an example, consider the metadata lock wait issue that can be seen in Listing
    14-2 where three connections are involved. The `WHERE` clause has been chosen
    to just include the rows of interest for this investigation.


    ```

    -- Investigation #1

    -- Connection 4

    Connection 4> SELECT thd_id, conn_id, state,

    current_statement,

    statement_latency

    FROM sys.session

    WHERE command = ''Query'' OR trx_state = ''ACTIVE''\G

    *************************** 1. row ***************************

    thd_id: 1181

    conn_id: 713

    state: NULL

    current_statement: SELECT Code, Name FROM world.country WHERE Code = ''USA''

    statement_latency: NULL

    *************************** 2. row ***************************

    thd_id: 1182

    conn_id: 714

    state: Waiting for table metadata lock

    current_statement: ALTER TABLE world.city ADD INDEX (Name)

    statement_latency: 26.68 s

    *************************** 3. row ***************************

    thd_id: 1183

    conn_id: 715

    state: Waiting for table metadata lock

    current_statement: SELECT * FROM world.city WHERE ID = 130

    statement_latency: 24.68 s

    *************************** 4. row ***************************

    thd_id: 1180

    conn_id: 712

    state: NULL

    current_statement: SET @sys.statement_truncate_le ... (''statement_truncate_len'',
    64)

    statement_latency: 50.42 ms

    4 rows in set (0.0530 sec)

    Listing 14-2

    A metadata lock wait issue

    ```


    Two connections are waiting for a metadata lock (on the `world.city` table). There
    is a third connection included (`conn_id = 713`) which is idle and can be seen
    from the `NULL` for the statement latency (in some versions earlier than 8.0.18
    and after 8.0.21, you may also see that the current statement is `NULL`). In this
    case, the list of queries is limited to those with an active query or an active
    transaction, but usually you will start out with a full process list. However,
    to make it easy to focus on the important parts, the output is filtered.


    Once you know there is a metadata lock issue, you can use the `sys.schema_table_lock_waits`
    view to get information about the lock contention. Listing 14-3 shows an example
    of the output corresponding to the just discussed process list.'
