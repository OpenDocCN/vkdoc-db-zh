    # 3. Monitoring InnoDB Transactions


    In the previous chapter, you learned how to find information about locks at a
    relatively low level. It is also important to include information at a higher
    level as locks have a duration up to the completion of the transaction. (Exceptions
    are user locks and explicit table locks which can last for longer.) In MySQL Server,
    transactions mean InnoDB, and this chapter focuses on monitoring InnoDB transactions.


