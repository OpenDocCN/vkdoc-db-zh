    table for the instruments you want to monitor. Additionally, you will need to
    enable `events_waits_current` and optionally `events_waits_history` and/or `events_waits_history_long`
    in `performance_schema.setup_consumers`. For example, to monitor the mutex on
    the InnoDB double write buffer


    ```

    mysql> UPDATE performance_schema.setup_instruments

    SET ENABLED = ''YES'',

    TIMED = ''YES''

    WHERE NAME = ''wait/synch/mutex/innodb/dblwr_mutex'';

    Query OK, 1 row affected (0.0011 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    mysql> UPDATE performance_schema.setup_consumers

    SET ENABLED = ''YES''

    WHERE NAME = ''events_waits_current'';

    Query OK, 1 row affected (0.0005 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    ```


    In general, it is better to enable monitoring of synchronization instruments in
    the configuration file to ensure they are properly set up from the time MySQL
    starts up:


    ```

    [mysqld]

    performance_schema_instrument = wait/synch/mutex/innodb/dblwr_mutex=ON

    performance_schema_consumer_events_waits_current = ON

    ```


    Then restart MySQL.


    Caution


    Be very careful in enabling instrumentation of the synchronization waits and the
    corresponding consumers on production systems. Doing so can cause a high enough
    overhead that you will effectively have an outage. The more that are enabled,
    the higher overhead and the more likely the monitoring interferes with the measurements,
    so the conclusions are wrong.


    You can now monitor the waits using one of the `events_waits_%` tables :


    *   **events_waits_current:** The current ongoing or last completed wait events
    for each existing thread. This requires the `events_waits_current` consumer to
    be enabled.


    *   **events_waits_history:** The last ten (the `performance_schema_events_waits_history_size`
    option) wait events for each existing thread. This requires the `events_waits_history`
    consumer to be enabled in addition to the `events_waits_current` consumer.


    *   **events_waits_history_long:** The last 10,000 (the `performance_schema_events_waits_history_long_size`
    option) events globally, including for threads that no longer exist. This requires
    the `events_waits_history_long` consumer to be enabled in addition to the `events_waits_current`
    consumer.


    *   **events_waits_summary_by_account_by_event_name:** The wait events grouped
    by the username and hostname of the accounts (also called actors in the Performance
    Schema).


    *   **events_waits_summary_by_host_by_event_name:** The wait events grouped by
    the hostname of the account triggering the event and event name.


    *   **events_waits_summary_by_instance:** The wait events grouped by the event
    name as well as the memory address (`OBJECT_INSTANCE_BEGIN`) of the object. This
    is useful for events with more than one instance to monitor whether the waits
    are evenly distributed among the instances. An example is the table cache mutex
    (`wait/synch/mutex/sql/LOCK_table_cache`) which has one object per table cache
    instance (`table_open_cache_instances`).


    *   **events_waits_summary_by_thread_by_event_name:** The wait events for currently
    existing threads grouped by the thread id and event name.


    *   **events_waits_summary_by_user_by_event_name:** The wait events grouped by
    the username of the account triggering the event and event name.


    *   **events_waits_summary_global_by_event_name:** The wait events grouped by
    the event names. This table is useful to get an overview of how much time is spent
    waiting for a given type of event.


    Given how short lived a synchronization wait normally is and how frequently they
    are encountered, the summary tables are usually the most useful for investigating
    waits using the Performance Schema. That said, since the relevant wait instruments
    are not enabled by default and they have relatively high overhead when monitoring
    them, usually the semaphore section of the InnoDB monitor or the `SHOW ENGINE
    INNODB MUTEX` statement as described later in this chapter is used for InnoDB
    mutexes and semaphores. The exception is when you want to investigate a specific
    contention issue.


    Another useful way to use the Performance Schema for lock analysis is to query
    for the errors that statements are encountering.'
  trans: '

    ### 同步等待


    #### 挑战与概述


    同步等待是最难监控的，原因有几个。它们发生得非常频繁，通常持续时间很短，并且监控它们会产生较高的开销。默认情况下，同步等待的检测 instrumentation
    也是未启用的。


    #### 类别划分


    同步等待分为五类：


    *   **cond：** 用于线程间信号传递的条件变量。

    *   **mutex：** 保护代码部分或其他资源的互斥点。

    *   **prlock：** 优先级读写锁。

    *   **rwlock：** 用于限制对特定变量并发访问的读写锁，例如，用于更改 `gtid_mode` 系统变量。

    *   **sxlock：** 共享独占读写锁。目前仅 InnoDB 使用，例如，用于提高 B 树搜索的可扩展性。


    #### 监控配置


    同步等待的检测名称以 `wait/synch/` 开头，后接类别名称、等待所属的区域（如 `sql` 或 `innodb`）以及等待的名称。例如，保护 InnoDB
    双写缓冲区的互斥锁的名称是 `wait/synch/mutex/innodb/dblwr_mutex`。


    您可以通过在 `performance_schema.setup_instruments` 表中为要监控的检测项设置 `ENABLED` 列，以及可选地设置
    `TIMED` 列来启用同步等待的检测。此外，您还需要在 `performance_schema.setup_consumers` 中启用 `events_waits_current`，以及可选地启用
    `events_waits_history` 和/或 `events_waits_history_long`。例如，要监控 InnoDB 双写缓冲区上的互斥锁：


    ```sql

    mysql> UPDATE performance_schema.setup_instruments

    SET ENABLED = ''YES'',

    TIMED = ''YES''

    WHERE NAME = ''wait/synch/mutex/innodb/dblwr_mutex'';

    Query OK, 1 row affected (0.0011 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    mysql> UPDATE performance_schema.setup_consumers

    SET ENABLED = ''YES''

    WHERE NAME = ''events_waits_current'';

    Query OK, 1 row affected (0.0005 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    ```


    通常，最好在配置文件中启用同步检测项的监控，以确保从 MySQL 启动之初它们就被正确设置：


    ```ini

    [mysqld]

    performance_schema_instrument = wait/synch/mutex/innodb/dblwr_mutex=ON

    performance_schema_consumer_events_waits_current = ON

    ```


    然后重启 MySQL。


    > **注意**

    >

    > 在生产系统上启用同步等待检测及相应的消费者时要非常小心。这样做可能会导致开销过高，从而实际上造成服务中断。启用的检测项越多，开销就越高，监控干扰测量结果的可能性也越大，从而导致结论错误。


    #### 监控表的使用


    现在您可以使用 `events_waits_%` 表中的任意一个来监控等待：


    *   **events_waits_current：** 每个现有线程当前正在进行或最后完成的等待事件。这需要启用 `events_waits_current`
    消费者。

    *   **events_waits_history：** 每个现有线程最后十个（由 `performance_schema_events_waits_history_size`
    选项决定）等待事件。这需要在 `events_waits_current` 消费者之外，额外启用 `events_waits_history` 消费者。

    *   **events_waits_history_long：** 全局最后 10,000 个（由 `performance_schema_events_waits_history_long_size`
    选项决定）事件，包括已不存在的线程的事件。这需要在 `events_waits_current` 消费者之外，额外启用 `events_waits_history_long`
    消费者。

    *   **events_waits_summary_by_account_by_event_name：** 按账户（在 Performance Schema
    中也称为 actor）的用户名和主机名分组的等待事件。

    *   **events_waits_summary_by_host_by_event_name：** 按触发事件的账户主机名和事件名称分组的等待事件。

    *   **events_waits_summary_by_instance：** 按事件名称以及对象的内存地址（`OBJECT_INSTANCE_BEGIN`）分组的等待事件。这对于具有多个实例的事件很有用，可监控等待是否在各实例间均匀分布。例如表缓存互斥锁（`wait/synch/mutex/sql/LOCK_table_cache`）每个表缓存实例（`table_open_cache_instances`）都有一个对象。

    *   **events_waits_summary_by_thread_by_event_name：** 当前存在的线程的等待事件，按线程 ID 和事件名称分组。

    *   **events_waits_summary_by_user_by_event_name：** 按触发事件的账户用户名和事件名称分组的等待事件。

    *   **events_waits_summary_global_by_event_name：** 按事件名称分组的等待事件。此表可用于概览在特定类型事件上花费的等待时间。


    鉴于同步等待通常持续时间极短且出现频繁，汇总表通常是使用 Performance Schema 调查等待最有用的工具。话虽如此，由于相关的等待检测项默认未启用，并且监控它们时开销相对较高，通常对于
    InnoDB 互斥锁和信号量，会使用 InnoDB 监视器中的信号量部分或本章后面描述的 `SHOW ENGINE INNODB MUTEX` 语句。例外情况是当您想要调查特定的争用问题时。


    使用 Performance Schema 进行锁分析的另一种有用方法是查询语句遇到的错误。

    '
- fmt: '### Statement and Error Tables


    Performance Schema includes several tables that can be used to investigate the
    errors that are encountered. Since a failure to obtain a lock either due to a
    timeout or a deadlock triggers an error, you can query for lock-related errors
    to determine which statements, accounts, and so on that are most affected by lock
    contention.


    At the individual statement level, you can use the `events_statements_current`,
    `events_statements_history`, and `events_statements_history_long` to see whether
    any error or a specific error has occurred. The first two of the tables are enabled
    by default, whereas the `events_statements_history_long` table requires that you
    enable the `events_statements_history_long` consumer. Listing 2-4 shows an example
    of a lock wait timeout and how it shows up in the `events_statements_history`
    table.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               63         179          6

    --          2               64         180          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    Query OK, 1 row affected (0.0011 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SET SESSION innodb_lock_wait_timeout = 1;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    ERROR: 1205: Lock wait timeout exceeded; try restarting transaction

    Connection 2> SELECT thread_id, event_id,

    FORMAT_PICO_TIME(lock_time) AS lock_time,

    sys.format_statement(SQL_TEXT) AS statement,

    digest, mysql_errno,

    returned_sqlstate, message_text, errors

    FROM performance_schema.events_statements_history

    WHERE thread_id = PS_CURRENT_THREAD_ID()

    AND mysql_errno > 0\G

    *************************** 1\. row ***************************

    thread_id: 180

    event_id: 10

    lock_time: 271.00 us

    statement: UPDATE world.city    SET Popul ... Population + 1  WHERE ID = 130

    digest: 3e9795ad6fc0f4e3a4b4e99f33fbab2dc7b40d0761a8adbc60abfab02326108d

    mysql_errno: 1205

    returned_sqlstate: HY000

    message_text: Lock wait timeout exceeded; try restarting transaction

    errors: 1

    1 row in set (0.0016 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0472 sec)

    -- Connection 2

    Connection 2> ROLLBACK;

    Query OK, 0 rows affected (0.0003 sec)

    Listing 2-4

    Example of a lock error in the statement tables

    ```


    There are a few things worth noting from the example. The first thing is that
    the lock time is only 271 microseconds despite that it took a full second before
    the lock wait timeout occurred. That is, waiting for a record lock inside InnoDB
    is not adding to the lock time reported by the Performance Schema, so you cannot
    use that to investigate record level lock contention.


    The second thing is that the `mysql_errno`, `returned_sqlstate`, and `message_text`
    include the same error information as it returned to the client which makes it
    useful for querying as it is also done in this case. Third, the `errors` column
    contains a count of the number of errors encountered. While the count doesn’t
    say anything about the nature of the error, it is useful as unlike the columns
    with the specifics of the error, the error counter is also present in the statement
    summary tables, so you can use it to find which statements encounter an error
    of any kind.


    Tip


    It can be useful to log encountered errors in the application. You can then, for
    example, analyze the application logs with a service like Splunk to generate reports
    showing which errors are encountered and when they are a problem.


    A group of summary tables of special interest in this context consists of the
    tables that summarize errors. There are five such tables grouped by the account,
    host, thread, user, and global, respectively:


    ```

    mysql> SHOW TABLES FROM performance_schema LIKE ''%error%'';

    +-------------------------------------------+

    | Tables_in_performance_schema (%error%)    |

    +-------------------------------------------+

    | events_errors_summary_by_account_by_error |

    | events_errors_summary_by_host_by_error    |

    | events_errors_summary_by_thread_by_error  |

    | events_errors_summary_by_user_by_error    |

    | events_errors_summary_global_by_error     |

    +-------------------------------------------+

    5 rows in set (0.0012 sec)

    ```


    For example, to retrieve the statistics for lock wait timeouts and deadlocks


    ```

    mysql> SELECT *

    FROM performance_schema.events_errors_summary_global_by_error

    WHERE error_name IN (''ER_LOCK_WAIT_TIMEOUT'',

    ''ER_LOCK_DEADLOCK'')\G

    *************************** 1\. row ***************************

    ERROR_NUMBER: 1205

    ERROR_NAME: ER_LOCK_WAIT_TIMEOUT

    SQL_STATE: HY000

    SUM_ERROR_RAISED: 4

    SUM_ERROR_HANDLED: 0

    FIRST_SEEN: 2020-06-28 11:33:10

    LAST_SEEN: 2020-06-28 11:49:30

    *************************** 2\. row ***************************

    ERROR_NUMBER: 1213

    ERROR_NAME: ER_LOCK_DEADLOCK

    SQL_STATE: 40001

    SUM_ERROR_RAISED: 3

    SUM_ERROR_HANDLED: 0

    FIRST_SEEN: 2020-06-27 12:06:38

    LAST_SEEN: 2020-06-27 12:54:27

    2 rows in set (0.0048 sec)

    ```


    While this does not help you identify which statements encounter the errors, it
    can help you monitor the frequency you encounter the errors and, in that way,
    determine whether lock errors become more frequent.


    Tip


    The `events_errors_summary_global_by_error` is populated with all known errors
    from the time MySQL is started even if the error has not yet been encountered.
    So, you can safely query for specific errors at all time including using the table
    to look up the error number from the name.


    The data in the Performance Schema tables is the raw data, either as individual
    events or aggregated. Often when you investigate lock issues or monitor for lock
    issues, it is more interesting to determine if there are any lock waits or to
    obtain a report of the wait events where most time is spent. For that information,
    you need to use the `sys` schema.


    ## The sys Schema


    The `sys` schema can be considered a collection of views that serve as reports
    on the Performance Schema and Information Schema as well as various utility functions
    and procedures. For this discussion the focus is on the two views that take the
    information in the Performance Schema tables and return the lock pairs where one
    lock cannot be granted because of the other lock. Thus, they show where there
    are problems with lock waits. The two views are `innodb_lock_waits` and `schema_table_lock_waits`.


    The `innodb_lock_waits` view uses the `data_locks` and `data_lock_waits` view
    in the Performance Schema to return all cases of lock waits for InnoDB record
    locks. It shows information such as what lock the connection is trying to obtain
    and which connections and queries are involved. The view also exists as `x$innodb_lock_waits`,
    if you need the information without formatting.


    The `schema_table_lock_waits` view works in a similar way but uses the `metadata_locks`
    table to return lock waits related to schema objects. The information is also
    available unformatted in the `x$schema_table_lock_waits` view.


    Tip


    Several views also exist where `x$` is prepended to the view name. This view contains
    the same information as the view without `x$` in the name except all the data
    is unformatted. This makes the data more suitable for scripts and programs that
    process the information.


    Chapters 13–17 include examples of using both views to investigate lock issues.


    For a high-level view of the contention, you can also use the status counters
    and InnoDB metrics.'
