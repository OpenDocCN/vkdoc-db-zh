    `load()` 方法会下载包含模式定义的文件，如果该文件尚不存在。下载的文件在 Microsoft Windows 上存储在 `%APPDATA\mysql_concurrency_book\sample_data\`，在其他平台上存储在
    `${HOME}/.mysql_concurrency_book/sample_data/`。如果你想重新下载文件，请从该目录中删除它。


    提示：由于 MySQL Shell 的 Python 环境仅提供相对低级的网络例程，如果你的连接速度慢或不稳定，下载员工数据库可能会失败。一个选择是——除了手动安装模式外——下载
    [`https://github.com/datacharmer/test_db/archive/master.zip`](https://github.com/datacharmer/test_db/archive/master.zip)
    并将其保存到 `sample_data` 目录中。之后，`load()` 方法将使用它，而不会再次尝试下载。


    如果你只想加载单个模式，可以将名称作为参数指定给 `load()`。这在通过命令行直接调用 MySQL Shell 时以命令形式启动模式加载时尤其有用，例如：


