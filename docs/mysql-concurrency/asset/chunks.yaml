  trans: '

    ### 增加哈希索引的分区数量


    如果争用是由太多连接命中同一个哈希分区导致的，那么一个可选方案是增加自适应哈希索引被拆分成的分区数量。这可以通过 `innodb_adaptive_hash_index_parts`
    选项来完成。没有直接的方法来确定增加哈希索引分区数量是否会有所帮助，不过你可以查看 InnoDB 监视器输出中的 `INSERT BUFFER AND ADAPTIVE
    HASH INDEX` 部分，了解每个分区中缓冲区的数量和大小，例如：


    ```sql

    mysql> SHOW ENGINE INNODB STATUS\G

    ...


    INSERT BUFFER AND ADAPTIVE HASH INDEX


    Ibuf: size 1, free list len 13, seg size 15, 0 merges

    merged operations:

    insert 0, delete mark 0, delete 0

    discarded operations:

    insert 0, delete mark 0, delete 0

    Hash table size 34679, node heap has 1 buffer(s)

    Hash table size 34679, node heap has 3880 buffer(s)

    Hash table size 34679, node heap has 1 buffer(s)

    Hash table size 34679, node heap has 1 buffer(s)

    Hash table size 34679, node heap has 1 buffer(s)

    Hash table size 34679, node heap has 1 buffer(s)

    Hash table size 34679, node heap has 1 buffer(s)

    Hash table size 34679, node heap has 1 buffer(s)

    0.00 hash searches/s, 0.00 non-hash searches/s

    ...

    ```


    此输出来自测试的结尾部分，你可以看到实际上主要只使用了其中一个分区（对你而言，使用的分区可能不同）。因此，在这种情况下，增加更多的哈希索引分区可能并无帮助。在更真实的生产环境中，如果存在许多索引，你更可能从增加分区中受益。


    ### 其他解决方案


    本节前面曾讨论过，许多自旋等待转化为操作系统等待是一个问题。特别是如果你没有用完所有的 CPU，你可以考虑增加 `innodb_sync_spin_loops`
    选项的值，以允许 InnoDB 持续轮询直到读写锁变为可用。这可以减少上下文切换的次数和总等待时间。


    最后，你可以考虑将查询划分为受益于自适应哈希索引的和不受益的，并将每组查询导向不同的副本。这样，你可以在启用了自适应哈希索引功能的副本上执行受益的查询，在禁用了该功能的副本上执行不受益的查询。显然，这主要适用于只读任务的解决方案。


    ### 总结


    本案例研究分析了一个自适应哈希索引上的信号量争用案例。其症状包括：`innodb_rwlock_%` InnoDB 指标报告的等待次数增加，以及由于太多查询需要对相同锁进行冲突访问而导致的
    InnoDB 监视器 `SEMAPHORES` 部分输出异常。


    与之前大多数案例研究相比，本案例的设置更为复杂，使用 MySQL Shell 的 `concurrency_book` 模块最容易复现。本章的工作负载会提示测试的各种设置，因此你可以尝试并为你的系统调整测试。


    调查从使用 `innodb_rwlock_%` 指标开始，以确定争用何时成为一个问题。你可以查看原始指标以及每次自旋等待的自旋轮数。然后，使用 InnoDB
    监视器和互斥锁监视器来确定争用发生的位置，在本例中，是在自适应哈希索引上。最后，讨论了你可能如何确定导致争用的具体工作负载。


    在处理互斥锁和信号量争用时，解决方案通常不是简单和确定性的。对于自适应哈希索引，最直接的选项是禁用它，但在这样做之前，你需要考虑该功能的整体有效性，包括命中率。另一种方法是将哈希索引拆分成更多分区；但是，这仅在争用影响到你现有的多个分区时才有效。其他解决方案包括增加允许的自旋循环次数以减少
    InnoDB 暂停轮询的频率，以及使用具有不同配置的多个只读副本。


    至此，我们结束了对 MySQL 并发世界的探索之旅，重点关注了锁和事务。请记住，熟能生巧，对于本书讨论的主题尤其如此。本书的剩余部分包含两个附录：附录 A
    包含了 Performance Schema 表、InnoDB 监视器等的各种参考。附录 B 是 MySQL Shell 的 `concurrency_book`
    模块参考。


    祝你继续在 MySQL 并发性能优化的道路上取得成功。

