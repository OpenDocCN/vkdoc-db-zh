    The SEMAPHORES section of the InnoDB monitor

    ```


    In this example, all the waits are on the semaphore created in line 202 in `btr0sea.cc`
    (the line number may differ depending on the platform and MySQL release, e.g.,
    on Linux, the line will be 201 for 8.0.21). If you look at the source code for
    MySQL 8.0.21 in the file `storage/innobase/btr/btr0sea.cc`, then the code around
    line 202 is


    ```

    186 /** Creates and initializes the adaptive search system at a database start.

    187 @param[in]      hash_size       hash table size. */

    188 void btr_search_sys_create(ulint hash_size) {

    189   /* Search System is divided into n parts.

    190   Each part controls access to distinct set of hash buckets from

    191   hash table through its own latch. */


    193   /* Step-1: Allocate latches (1 per part). */

    194   btr_search_latches = reinterpret_cast(

    195       ut_malloc(sizeof(rw_lock_t *) * btr_ahi_parts, mem_key_ahi));


    197   for (ulint i = 0; i (

    199         ut_malloc(sizeof(rw_lock_t), mem_key_ahi));


    201     rw_lock_create(btr_search_latch_key, btr_search_latches[i],

    202                    SYNC_SEARCH_SYS);

    203   }

    ...

    ```


    This is the code for the adaptive hash index, so this proves that the adaptive
    hash index is where the contention is. (It also shows that lines 201 and 202 are
    for the same statement, so the difference in the line numbers between Microsoft
    Windows and Linux is whether the first or last line of the statement is chosen
    as the creation of the rw-lock.)


    You can also use the mutex monitor to get statistics of which locks are the ones
    most frequently experiencing waits. An example of the output of the mutex monitor
    from the end of this test is


    ```

    mysql> SHOW ENGINE INNODB MUTEX;

    +--------+----------------------------+-------------+

    | Type   | Name                       | Status      |

    +--------+----------------------------+-------------+

    | InnoDB | rwlock: fil0fil.cc:3206    | waits=11    |

    | InnoDB | rwlock: dict0dict.cc:1035  | waits=12    |

    | InnoDB | rwlock: btr0sea.cc:202     | waits=7730  |

    | InnoDB | rwlock: btr0sea.cc:202     | waits=934   |

    | InnoDB | rwlock: btr0sea.cc:202     | waits=5445  |

    | InnoDB | rwlock: btr0sea.cc:202     | waits=889   |

    | InnoDB | rwlock: btr0sea.cc:202     | waits=9076  |

    | InnoDB | rwlock: btr0sea.cc:202     | waits=13608 |

    | InnoDB | rwlock: btr0sea.cc:202     | waits=1050  |

    | InnoDB | rwlock: hash0hash.cc:171   | waits=4     |

    | InnoDB | sum rwlock: buf0buf.cc:778 | waits=86    |

    +--------+----------------------------+-------------+

    11 rows in set (0.0008 sec)

    ```


    If you create the mutex monitor report with regular intervals, you can sum the
    waits and group by file and line number and then monitor the difference where
    the waits occur at which time. (The author of this book is not aware of any monitoring
    solution that does this out of the box.) For this example, the test itself calculates
    the number of waits for each file and line number which will primarily show waits
    for `btr0sea.cc` line 202 (remember the line number depends in the exact release
    and compiler/platform):


    ```

    -- Total mutex and rw-semaphore waits during test:

    +----------------+-------+

    | File:Line      | Waits |

    +----------------+-------+

    | btr0sea.cc:202 | 13368 |

    +----------------+-------+

    ```


    The most likely other file and line you will see is `hash0hash:171` (for 8.0.21
    on Windows or line 170 on Linux for 8.0.21) which is related to InnoDB’s implementation
    of hash tables. It shows that it was not a coincidence that the semaphore waits
    in the InnoDB monitor output were all for `btr0sea.cc` line 202.'
