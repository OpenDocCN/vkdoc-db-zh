  trans: '### 配置 InnoDB 指标


    可以配置 InnoDB 指标，以便选择启用哪些指标，并且可以重置统计数据。您可以使用全局系统变量来启用、禁用和重置指标：


    *   `innodb_monitor_disable`：禁用一个或多个指标。

    *   `innodb_monitor_enable`：启用一个或多个指标。

    *   `innodb_monitor_reset`：重置一个或多个指标的计数器。

    *   `innodb_monitor_reset_all`：重置所有统计数据，包括一个或多个指标的计数器、最小值和最大值。


    可以根据需要开启和关闭指标，其当前状态可在 `INNODB_METRICS` 视图的 `STATUS` 列中找到。您需要将指标名称或以 `module_`
    为前缀的子系统名称指定为 `innodb_monitor_enable` 或 `innodb_monitor_disable` 变量的值，并且可以使用 `%`
    作为通配符。值 `all` 作为一个特殊值，会影响所有指标。


    **注意**

    当您指定一个模块时，只有当没有与该模块匹配的指标时，它才会按预期工作。不能指定模块的例子包括 `module_cpu`、`module_page_track`
    和 `module_dblwr`。


    列表 2-6 展示了一个启用并使用所有匹配 `icp%` 的指标（恰好是 `icp`（索引条件下推）子系统中的指标）的示例。查询指标后，再次使用子系统作为参数将其禁用。`COUNT`
    的值取决于查询时的工作负载。


    ```sql

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1               32          74          6

    -- 连接 1

    mysql> SET GLOBAL innodb_monitor_enable = ''icp%'';

    Query OK, 0 rows affected (0.0003 sec)

    mysql> SELECT NAME, SUBSYSTEM, COUNT, MIN_COUNT,

    MAX_COUNT, AVG_COUNT,

    STATUS, COMMENT

    FROM information_schema.INNODB_METRICS

    WHERE SUBSYSTEM = ''icp''\G

    *************************** 1. row ***************************

    NAME: icp_attempts

    SUBSYSTEM: icp

    COUNT: 0

    MIN_COUNT: NULL

    MAX_COUNT: NULL

    AVG_COUNT: 0

    STATUS: enabled

    COMMENT: 索引下推条件检查的尝试次数

    *************************** 2. row ***************************

    NAME: icp_no_match

    SUBSYSTEM: icp

    COUNT: 0

    MIN_COUNT: NULL

    MAX_COUNT: NULL

    AVG_COUNT: 0

    STATUS: enabled

    COMMENT: 索引下推条件不匹配

    *************************** 3. row ***************************

    NAME: icp_out_of_range

    SUBSYSTEM: icp

    COUNT: 0

