    For an example of using the `events_transactions_current` table , you can start
    two transactions as shown in Listing [4-1](#502546_1_En_4_Chapter.xhtml#PC1).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               57         140          6

    --          2               58         141          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> UPDATE world.city SET Population = 5200000 WHERE ID = 130;

    Connection 1> UPDATE world.city SET Population = 4900000 WHERE ID = 131;

    Connection 1> UPDATE world.city SET Population = 2400000 WHERE ID = 132;

    Connection 1> UPDATE world.city SET Population = 2000000 WHERE ID = 133;

    -- Connection 2

    Connection 2> XA START ''abc'', ''def'', 1;

    Connection 2> UPDATE world.city SET Population = 900000 WHERE ID = 3805;

    Listing 4-1

    Example transactions

    ```


    The first transaction is a normal transaction that updates the population of several
    cities, and the second transaction is an XA transaction. Listing [4-2](#502546_1_En_4_Chapter.xhtml#PC2)
    shows an example output of the `events_transactions_current` table listing the
    currently active transactions.


    ```

    -- Investigation #1

    -- Connection 3

    Connection 3> SELECT *

    FROM performance_schema.events_transactions_current

    WHERE state = ''ACTIVE''\G

    *************************** 1\. row ***************************

    THREAD_ID: 140

    EVENT_ID: 8

    END_EVENT_ID: NULL

    EVENT_NAME: transaction

    STATE: ACTIVE

    TRX_ID: NULL

    GTID: AUTOMATIC

    XID_FORMAT_ID: NULL

    XID_GTRID: NULL

    XID_BQUAL: NULL

    XA_STATE: NULL

    SOURCE: transaction.cc:209

    TIMER_START: 72081362554600000

    TIMER_END: 72161455792800000

    TIMER_WAIT: 80093238200000

    ACCESS_MODE: READ WRITE

    ISOLATION_LEVEL: REPEATABLE READ

    AUTOCOMMIT: NO

    NUMBER_OF_SAVEPOINTS: 0

    NUMBER_OF_ROLLBACK_TO_SAVEPOINT: 0

    NUMBER_OF_RELEASE_SAVEPOINT: 0

    OBJECT_INSTANCE_BEGIN: NULL

    NESTING_EVENT_ID: 7

    NESTING_EVENT_TYPE: STATEMENT

    *************************** 2\. row ***************************

    THREAD_ID: 141

    EVENT_ID: 8

    END_EVENT_ID: NULL

    EVENT_NAME: transaction

    STATE: ACTIVE

    TRX_ID: NULL

    GTID: AUTOMATIC

    XID_FORMAT_ID: 1

    XID_GTRID: abc

    XID_BQUAL: def

    XA_STATE: ACTIVE

    SOURCE: transaction.cc:209

    TIMER_START: 72081766957700000

    TIMER_END: 72161455799300000

    TIMER_WAIT: 79688841600000

    ACCESS_MODE: READ WRITE

    ISOLATION_LEVEL: REPEATABLE READ

    AUTOCOMMIT: NO

    NUMBER_OF_SAVEPOINTS: 0

    NUMBER_OF_ROLLBACK_TO_SAVEPOINT: 0

    NUMBER_OF_RELEASE_SAVEPOINT: 0

    OBJECT_INSTANCE_BEGIN: NULL

    NESTING_EVENT_ID: 7

    NESTING_EVENT_TYPE: STATEMENT

    2 rows in set (0.0007 sec)

    Listing 4-2

    Using the events_transactions_current table

    ```


    The transaction in row 1 is a regular transaction, whereas the transaction in
    row 2 is an XA transaction. Both transactions were started by a statement which
    can be seen from the nesting event type. If you want to find the statement that
    triggered the transaction, you can use that to query the `events_statements_history`
    table like


    ```

    -- Investigation #2

    Connection 3> SELECT sql_text

    FROM performance_schema.events_statements_history

    WHERE thread_id = 140

    AND event_id = 7\G

    *************************** 1\. row ***************************

    sql_text: start transaction

    1 row in set (0.0434 sec)

    ```


    This shows that the transaction executed by `thread_id = 140` was started using
    a `START TRANSACTION` statement . Since the `events_statements_history` table
    only includes the last ten statements for the connection, it is not guaranteed
    that the statement that started the transaction is still in the history table.
    If you are looking at a single-statement transaction or the first statement (while
    it is still executing) when `autocommit` is disabled, you will need to query the
    `events_statements_current` table instead.


    The relationship between transactions and statements also goes the other way.'
  trans: '

    # `事务事件及其语句`


    在性能模式中，用于调查事务的主要表是事务事件表。有三张表用于记录当前或最近的事务：`events_transactions_current`、`events_transactions_history`
    和 `events_transactions_history_long`。它们的列如表 4-1 所概括。


    ## 表 4-1：非汇总事务事件表的列


    | 列/数据类型 | 描述 |

    | --- | --- |

    | `THREAD_ID bigint unsigned` | 执行事务的连接的性能模式线程 ID。 |

    | `EVENT_ID bigint unsigned` | 事件的 ID。您可以使用事件 ID 对线程的事件进行排序，或作为外键与线程 ID 一起在事件表之间关联。
    |

    | `END_EVENT_ID bigint unsigned` | 事务完成时的事件 ID。如果事件 ID 为 `NULL`，则事务仍在进行中。 |

    | `EVENT_NAME varchar(128)` | 事务事件名称。目前此列的值始终为 `transaction`。 |

    | `STATE enum` | 事务的状态。可能的值有 `ACTIVE`、`COMMITTED` 和 `ROLLED BACK`。 |

    | `TRX_ID bigint unsigned` | 目前未使用，将始终为 `NULL`。 |

    | `GTID varchar(64)` | 事务的 GTID。当 GTID 是自动确定的（通常情况）时，返回 `AUTOMATIC`。这与执行事务的连接的
    `gtid_next` 变量相同。 |

    | `XID_FORMAT_ID int` | 对于 XA 事务，格式 ID。 |

    | `XID_GTRID varchar(130)` | 对于 XA 事务，gtrid 值。 |

    | `XID_BQUAL varchar(130)` | 对于 XA 事务，bqual 值。 |

    | `XA_STATE varchar(64)` | 对于 XA 事务，事务的状态。可以是 `ACTIVE`、`IDLE`、`PREPARED`、`ROLLED
    BACK` 或 `COMMITTED`。 |

    | `SOURCE varchar(64)` | 记录事件的源代码文件和行号。 |

    | `TIMER_START bigint unsigned` | 事件开始时的计时，单位为皮秒。 |

    | `TIMER_END bigint unsigned` | 事件完成时的计时，单位为皮秒。如果事务尚未完成，该值对应于当前时间。 |

    | `TIMER_WAIT bigint unsigned` | 执行事件所花费的总时间，单位为皮秒。如果事件尚未完成，该值对应于事务已活跃的时间。 |

    | `ACCESS_MODE enum` | 事务是只读模式（`READ ONLY`）还是读写模式（`READ WRITE`）。 |

    | `ISOLATION_LEVEL varchar(64)` | 事务的隔离级别。 |

    | `AUTOCOMMIT enum` | 事务是否基于 `autocommit` 选项自动提交，以及是否已启动显式事务。可能的值是 `NO` 和 `YES`。
    |

    | `NUMBER_OF_SAVEPOINTS bigint unsigned` | 事务中创建的保存点数量。 |

    | `NUMBER_OF_ROLLBACK_TO_SAVEPOINT bigint unsigned` | 事务回滚到保存点的次数。 |

    | `NUMBER_OF_RELEASE_SAVEPOINT bigint unsigned` | 事务释放保存点的次数。 |

    | `OBJECT_INSTANCE_BEGIN bigint unsigned` | 此字段目前未使用，始终设置为 `NULL`。 |

    | `NESTING_EVENT_ID bigint unsigned` | 触发该事务的事件的 ID。 |

    | `NESTING_EVENT_TYPE enum` | 触发该事务的事件的类型。 |


    ## 使用事务事件表


    如果您在使用 XA 事务，当您需要恢复事务时，事务事件表非常有用，因为格式 ID、gtrid 和 bqual 值可以直接从这些表中获得，这与 `XA RECOVER`
    语句不同，后者需要解析输出。同样地，如果您使用保存点，您可以获取关于保存点使用情况的统计信息。除此之外，其中的信息与 `information_schema.INNODB_TRX`
    视图中可用的信息非常相似。


    关于使用 `events_transactions_current` 表的示例，您可以如清单 4-1 所示启动两个事务。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1               57         140          6

    --          2               58         141          6

    -- 连接 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> UPDATE world.city SET Population = 5200000 WHERE ID = 130;

    Connection 1> UPDATE world.city SET Population = 4900000 WHERE ID = 131;

    Connection 1> UPDATE world.city SET Population = 2400000 WHERE ID = 132;

    Connection 1> UPDATE world.city SET Population = 2000000 WHERE ID = 133;

    -- 连接 2

    Connection 2> XA START ''abc'', ''def'', 1;

    Connection 2> UPDATE world.city SET Population = 900000 WHERE ID = 3805;

    清单 4-1

    示例事务

    ```


    第一个事务是更新多个城市人口的普通事务，第二个事务是一个 XA 事务。清单 4-2 展示了 `events_transactions_current` 表列出当前活动事务的示例输出。


    ```

    -- 调查 #1

    -- 连接 3

    Connection 3> SELECT *

    FROM performance_schema.events_transactions_current

    WHERE state = ''ACTIVE''\G

    *************************** 1\. row ***************************

    THREAD_ID: 140

    EVENT_ID: 8

    END_EVENT_ID: NULL

    EVENT_NAME: transaction

    STATE: ACTIVE

    TRX_ID: NULL

    GTID: AUTOMATIC

    XID_FORMAT_ID: NULL

    XID_GTRID: NULL

    XID_BQUAL: NULL

    XA_STATE: NULL

    SOURCE: transaction.cc:209

    TIMER_START: 72081362554600000

    TIMER_END: 72161455792800000

    TIMER_WAIT: 80093238200000

    ACCESS_MODE: READ WRITE

    ISOLATION_LEVEL: REPEATABLE READ

    AUTOCOMMIT: NO

    NUMBER_OF_SAVEPOINTS: 0

    NUMBER_OF_ROLLBACK_TO_SAVEPOINT: 0

    NUMBER_OF_RELEASE_SAVEPOINT: 0

    OBJECT_INSTANCE_BEGIN: NULL

    NESTING_EVENT_ID: 7

    NESTING_EVENT_TYPE: STATEMENT

    *************************** 2\. row ***************************

    THREAD_ID: 141

    EVENT_ID: 8

    END_EVENT_ID: NULL

    EVENT_NAME: transaction

    STATE: ACTIVE

    TRX_ID: NULL

    GTID: AUTOMATIC

    XID_FORMAT_ID: 1

    XID_GTRID: abc

    XID_BQUAL: def

    XA_STATE: ACTIVE

    SOURCE: transaction.cc:209

    TIMER_START: 72081766957700000

    TIMER_END: 72161455799300000

    TIMER_WAIT: 79688841600000

    ACCESS_MODE: READ WRITE

    ISOLATION_LEVEL: REPEATABLE READ

    AUTOCOMMIT: NO

    NUMBER_OF_SAVEPOINTS: 0

    NUMBER_OF_ROLLBACK_TO_SAVEPOINT: 0

    NUMBER_OF_RELEASE_SAVEPOINT: 0

    OBJECT_INSTANCE_BEGIN: NULL

    NESTING_EVENT_ID: 7

    NESTING_EVENT_TYPE: STATEMENT

    2 rows in set (0.0007 sec)

    清单 4-2

    使用 events_transactions_current 表

    ```


    第 1 行中的事务是一个常规事务，而第 2 行中的事务是一个 XA 事务。两个事务都是由一个语句启动的，这可以从嵌套事件类型看出。如果您想找到触发事务的语句，可以使用该信息来查询
    `events_statements_history` 表，如下所示：


    ```

    -- 调查 #2

    Connection 3> SELECT sql_text

    FROM performance_schema.events_statements_history

    WHERE thread_id = 140

    AND event_id = 7\G

    *************************** 1\. row ***************************

    sql_text: start transaction

    1 row in set (0.0434 sec)

    ```


    这表明由 `thread_id = 140` 执行的事务是使用 `START TRANSACTION` 语句启动的。由于 `events_statements_history`
    表仅包含该连接的最后十条语句，无法保证启动事务的语句仍然在历史表中。如果您正在查看单语句事务，或者在 `autocommit` 禁用时查看第一条语句（当它仍在执行时），您将需要改为查询
    `events_statements_current` 表。


    事务和语句之间的关系也反向成立。

    '
- fmt: '# 使用 Performance Schema 监控和分析事务


    给定一个事务事件 ID 和线程 ID，您可以使用语句事件历史和当前表查询该事务最后执行的十条语句。清单 [4-3](#502546_1_En_4_Chapter.xhtml#PC4)
    展示了一个 `thread_id = 140` 且事务 `EVENT_ID = 8` 的示例（来自清单 [4-2](#502546_1_En_4_Chapter.xhtml#PC2)
    的第 1 行），其中包含了启动事务的语句以及后续的所有语句。


    ```sql

    -- Investigation #4

    Connection 3> SET @thread_id = 140,

    @event_id = 8,

    @nesting_event_id = 7;

    Query OK, 0 rows affected (0.0007 sec)

    -- Investigation #6

    Connection 3> SELECT event_id, sql_text,

    FORMAT_PICO_TIME(timer_wait) AS latency,

    IF(end_event_id IS NULL, ''YES'', ''NO'') AS current

    FROM ((SELECT event_id, end_event_id,

    timer_wait,

    sql_text, nesting_event_id,

    nesting_event_type

    FROM performance_schema.events_statements_current

    WHERE thread_id = @thread_id

    ) UNION (

    SELECT event_id, end_event_id,

    timer_wait,

    sql_text, nesting_event_id,

    nesting_event_type

    FROM performance_schema.events_statements_history

    WHERE thread_id = @thread_id

    )

    ) events

    WHERE (nesting_event_type = ''TRANSACTION''

    AND nesting_event_id = @event_id)

    OR event_id = @nesting_event_id

    ORDER BY event_id DESC\G

    *************************** 1. row ***************************

    event_id: 12

    sql_text: UPDATE world.city SET Population = 2000000 WHERE ID = 133

    latency: 384.00 us

    current: NO

    *************************** 2. row ***************************

    event_id: 11

    sql_text: UPDATE world.city SET Population = 2400000 WHERE ID = 132

    latency: 316.20 us

    current: NO

    *************************** 3. row ***************************

    event_id: 10

    sql_text: UPDATE world.city SET Population = 4900000 WHERE ID = 131

    latency: 299.30 us

    current: NO

    *************************** 4. row ***************************

    event_id: 9

    sql_text: UPDATE world.city SET Population = 5200000 WHERE ID = 130

    latency: 176.95 ms

    current: NO

    *************************** 5. row ***************************

    event_id: 7

    sql_text: start transaction

    latency: 223.20 us

    current: NO

    5 rows in set (0.0016 sec)

    Listing 4-3

    Finding the last ten statements executed in a transaction

    ```


    子查询（派生表）从 `events_statements_current` 和 `events_statements_history` 表中查找该线程的所有语句事件。因为可能有一条针对该事务的正在进行的语句，所以必须包含当前事件。语句被过滤为要么是事务的子语句，要么是事务的嵌套事件（`event_id
    = 7`）。这将包括从启动事务的语句开始的所有语句。如果有一条正在进行的语句，则最多会包含 11 条语句，否则最多包含十条。


    `end_event_id` 用于确定语句是否正在执行中，并且语句按照 `event_id` 倒序排列，因此最近的语句在第 1 行，最旧的（`START TRANSACTION`
    语句）在第 5 行。


    此类查询不仅可用于调查仍在执行查询的事务。当您遇到一个空闲事务并想了解该事务在被遗弃之前做了什么时，它也非常有用。另一个查找活动事务的相关方法是使用 `sys.session`
    视图，该视图利用 `events_transactions_current` 表来包含每个连接的事务状态信息。清单 [4-4](#502546_1_En_4_Chapter.xhtml#PC5)
    展示了一个查询活动事务的示例，其中排除了执行查询的连接对应的行。


    ```sql

    -- Investigation #7

    Connection 3> SELECT *

    FROM sys.session

    WHERE trx_state = ''ACTIVE''

    AND conn_id != CONNECTION_ID()\G

    *************************** 1. row ***************************

    thd_id: 140

    conn_id: 57

    user: mysqlx/worker

    db: NULL

    command: Sleep

    state: NULL

    time: 449

    current_statement: UPDATE world.city SET Population = 2000000 WHERE ID = 133

    statement_latency: NULL

    progress: NULL

    lock_latency: 111.00 us

    rows_examined: 1

    rows_sent: 0

    rows_affected: 1

    tmp_tables: 0

    tmp_disk_tables: 0

    full_scan: NO

    last_statement: UPDATE world.city SET Population = 2000000 WHERE ID = 133

    last_statement_latency: 384.00 us

    current_memory: 228.31 KiB

    last_wait: NULL

    last_wait_latency: NULL

    source: NULL

    trx_latency: 7.48 min

    trx_state: ACTIVE

    trx_autocommit: NO

    pid: 30936

    program_name: mysqlsh

    *************************** 2. row ***************************

    thd_id: 141

    conn_id: 58

    user: mysqlx/worker

    db: NULL

    command: Sleep

    state: NULL

    time: 449

    current_statement: UPDATE world.city SET Population = 900000 WHERE ID = 3805

    statement_latency: NULL

    progress: NULL

    lock_latency: 387.00 us

    rows_examined: 1

    rows_sent: 0

    rows_affected: 1

    tmp_tables: 0

    tmp_disk_tables: 0

    full_scan: NO

    last_statement: UPDATE world.city SET Population = 900000 WHERE ID = 3805

    last_statement_latency: 49.39 ms

    current_memory: 70.14 KiB

    last_wait: NULL

    last_wait_latency: NULL

    source: NULL

    trx_latency: 7.48 min

    trx_state: ACTIVE

    trx_autocommit: NO

    pid: 30936

    program_name: mysqlsh

    2 rows in set (0.0422 sec)

    Listing 4-4

    Finding active transactions with sys.session

    ```


    这表明第一行中的事务已活跃超过 7 分钟，并且距离上次查询执行已有 449 秒（7.5 分钟）（您的值会不同）。`last_statement` 可用于确定连接最后执行的查询。这是一个被遗弃事务的示例，它会阻止
    InnoDB 清除其 undo 日志。被遗弃事务最常见的原因是数据库管理员交互式启动了一个事务后分心了，或者 `autocommit` 被禁用但没有意识到事务已经启动。


    ## 注意


    如果您禁用了 `autocommit`，请务必在工作结束时提交或回滚。一些连接器默认禁用 `autocommit`，因此请注意您的应用程序可能未使用服务器默认设置。


    您可以回滚事务以避免更改任何数据（如果您使用 MySQL Shell 脚本来重现此示例，在提示输入下一个调查的答案时直接按回车键即可自动回滚）。对于第一个（普通）事务：


    ```sql

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0303 sec)

    ```


    对于 XA 事务：


    ```sql

    -- Connection 2

    Connection 2> XA END ''abc'', ''def'', 1;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> XA ROLLBACK ''abc'', ''def'', 1;

    Query OK, 0 rows affected (0.0308 sec)

    ```


    Performance Schema 表用于分析事务的另一种方法是利用汇总表来获取聚合数据。'
  raw: 'Given a transaction event id and the thread id, you can query the last ten
    statements executed for that transaction using the statement event history and
    current tables. Listing [4-3](#502546_1_En_4_Chapter.xhtml#PC4) shows an example
    for `thread_id = 140` and transaction `EVENT_ID = 8` (from row 1 of Listing [4-2](#502546_1_En_4_Chapter.xhtml#PC2))
    where both the statement starting the transaction and subsequent statements are
    included.


    ```

    -- Investigation #4

    Connection 3> SET @thread_id = 140,

    @event_id = 8,

    @nesting_event_id = 7;

    Query OK, 0 rows affected (0.0007 sec)

    -- Investigation #6

    Connection 3> SELECT event_id, sql_text,

    FORMAT_PICO_TIME(timer_wait) AS latency,

    IF(end_event_id IS NULL, ''YES'', ''NO'') AS current

    FROM ((SELECT event_id, end_event_id,

    timer_wait,

    sql_text, nesting_event_id,

    nesting_event_type

    FROM performance_schema.events_statements_current

    WHERE thread_id = @thread_id

    ) UNION (

    SELECT event_id, end_event_id,

    timer_wait,

    sql_text, nesting_event_id,

    nesting_event_type

    FROM performance_schema.events_statements_history

    WHERE thread_id = @thread_id

    )

    ) events

    WHERE (nesting_event_type = ''TRANSACTION''

    AND nesting_event_id = @event_id)

    OR event_id = @nesting_event_id

    ORDER BY event_id DESC\G

    *************************** 1\. row ***************************

    event_id: 12

    sql_text: UPDATE world.city SET Population = 2000000 WHERE ID = 133

    latency: 384.00 us

    current: NO

    *************************** 2\. row ***************************

    event_id: 11

    sql_text: UPDATE world.city SET Population = 2400000 WHERE ID = 132

    latency: 316.20 us

    current: NO

    *************************** 3\. row ***************************

    event_id: 10

    sql_text: UPDATE world.city SET Population = 4900000 WHERE ID = 131

    latency: 299.30 us

    current: NO

    *************************** 4\. row ***************************

    event_id: 9

    sql_text: UPDATE world.city SET Population = 5200000 WHERE ID = 130

    latency: 176.95 ms

    current: NO

    *************************** 5\. row ***************************

    event_id: 7

    sql_text: start transaction

    latency: 223.20 us

    current: NO

    5 rows in set (0.0016 sec)

    Listing 4-3

    Finding the last ten statements executed in a transaction

    ```


    The subquery (a derived table) finds all statement events for the thread from
    the `events_statements_current` and `events_statements_history` tables . It is
    necessary to include the current events as there may be an ongoing statement for
    the transaction. The statements are filtered by either being a child of the transaction
    or the nesting event for the transaction (`event_id = 7`). This will include all
    statements beginning with the one starting the transactions. There will be up
    to 11 statements if there is an ongoing statement and otherwise up to ten.


    The `end_event_id` is used to determine whether the statement is currently executing,
    and the statements are ordered in reverse using the `event_id`, so the most recent
    statement is in row 1 and the oldest (the `START TRANSACTION` statement) in row
    5.


    This type of query is not only useful to investigate transactions still executing
    queries. It can also be very useful when you encounter an idle transaction and
    you want to know what the transaction did before it was left abandoned. Another
    related way to look for active transactions is to use the `sys.session` view which
    uses the `events_transactions_current` table to include information about the
    transactional state for each connection. Listing [4-4](#502546_1_En_4_Chapter.xhtml#PC5)
    shows an example of querying for active transactions excluding the row for the
    connection executing the query.


    ```

    -- Investigation #7

    Connection 3> SELECT *

    FROM sys.session

    WHERE trx_state = ''ACTIVE''

    AND conn_id  CONNECTION_ID()\G

    *************************** 1\. row ***************************

    thd_id: 140

    conn_id: 57

    user: mysqlx/worker

    db: NULL

    command: Sleep

    state: NULL

    time: 449

    current_statement: UPDATE world.city SET Population = 2000000 WHERE ID = 133

    statement_latency: NULL

    progress: NULL

    lock_latency: 111.00 us

    rows_examined: 1

    rows_sent: 0

    rows_affected: 1

    tmp_tables: 0

    tmp_disk_tables: 0

    full_scan: NO

    last_statement: UPDATE world.city SET Population = 2000000 WHERE ID = 133

    last_statement_latency: 384.00 us

    current_memory: 228.31 KiB

    last_wait: NULL

    last_wait_latency: NULL

    source: NULL

    trx_latency: 7.48 min

    trx_state: ACTIVE

    trx_autocommit: NO

    pid: 30936

    program_name: mysqlsh

