    *************************** 1\. row ***************************

    Variable_name: lock_deadlocks

    Variable_value: 2

    Type: InnoDB Metrics - lock

    Enabled: YES

    1 row in set (0.0096 sec)

    ```


    Alternatively, you can use the `events_errors_summary_global_by_error` table in
    the Performance Schema and query for the `ER_LOCK_DEADLOCK` error:


    ```

    mysql> SELECT *

    FROM performance_schema.events_errors_summary_global_by_error

    WHERE error_name = ''ER_LOCK_DEADLOCK''\G

    *************************** 1\. row ***************************

    ERROR_NUMBER: 1213

    ERROR_NAME: ER_LOCK_DEADLOCK

    SQL_STATE: 40001

    SUM_ERROR_RAISED: 5

    SUM_ERROR_HANDLED: 0

    FIRST_SEEN: 2020-08-01 13:09:29

    LAST_SEEN: 2020-08-07 18:28:20

    1 row in set (0.0083 sec)

    ```


    Do however be aware that this includes all cases of a deadlock returning error
    1213 irrespective of the lock type, whereas the `lock_deadlocks` metric only includes
    InnoDB deadlocks.


    You can also check the `LATEST DETECTED DEADLOCK` section in the output of the
    InnoDB monitor, for example, by executing `SHOW ENGINE INNODB STATUS`. This will
    show when the last deadlock last occurred, and thus you can use that to judge
    how frequently deadlocks occur. If you have the `innodb_print_all_deadlocks` option
    enabled, the error lock will have many outputs of deadlock information. The details
    of the InnoDB monitor output for deadlocks will be covered in the section “The
    Investigation” after the cause of deadlocks and the setup have been discussed.


    ## The Cause


    Deadlocks are caused by locks being obtained in different orders for two or more
    transactions. Each transaction ends up holding a lock that the other transaction
    needs. This lock may be a record lock, gap lock, predicate lock, or insert intention
    lock. Figure [16-1](#502546_1_En_16_Chapter.xhtml#Fig1) shows an example of a
    circular dependency that triggers a deadlock.


    ![../images/502546_1_En_16_Chapter/502546_1_En_16_Fig1_HTML.png](images/502546_1_En_16_Chapter/502546_1_En_16_Fig1_HTML.png)


    Figure 16-1


    A circular lock dependency triggering a deadlock


    The deadlock shown in the figure is due to two record locks on the primary keys
    of a table. That is one of the simplest deadlocks that can occur. As shown when
    investigating a deadlock, the circle can be more complex than this.'
  trans: '

    ## 解决方案


    解决方案取决于锁等待的严重程度。如果只是少数查询出现短暂的锁等待，那么让受影响的查询等待锁变得可用，通常是完全可以接受的。请记住，锁的存在是为了确保数据的完整性，因此锁本身并非天生的问题。只有当锁对性能造成显著影响，或导致查询失败到无法重试的程度时，锁才会成为问题。


    如果锁等待情况持续较长时间——特别是当阻塞事务已被放弃时——您可以考虑终止该阻塞事务。一如既往，您需要考虑到，如果阻塞事务已经执行了大量工作，其回滚操作可能会耗费大量时间。


    对于因锁等待超时错误而失败的查询，应用程序应重试它们。请记住，默认情况下，锁等待超时只会回滚超时发生时正在执行的查询。事务的其余部分将保持查询之前的状态。未能处理超时可能会留下一个未完成的事务，其自身持有的锁可能引发进一步的锁问题。是仅回滚查询还是回滚整个事务，由
    `innodb_rollback_on_timeout` 选项控制。


    **注意**


    处理锁等待超时非常重要，否则可能会导致事务的锁无法释放。如果发生这种情况，其他事务可能无法获取它们所需的锁。


    ## 预防措施


    防止严重的记录级锁争用，很大程度上遵循第 9 章“减少锁定问题”中讨论的指导原则。概括之前的讨论，减少锁等待争用的方法主要包括：减小事务的规模和持续时间，使用索引以减少访问的记录数，以及可能将事务隔离级别切换为
    `READ COMMITTED` 以便更早释放锁并减少间隙锁的数量。


    ## 本章小结


    本章通过一个案例研究讨论了 InnoDB 记录锁。其症状是，一个预期快速的查询花了很长时间才完成。确定哪些连接涉及锁争用的关键在于使用 `sys.innodb_lock_waits`
    视图，它直接显示了等待和阻塞连接的信息。如需更多详细信息，您可以深入研究 Performance Schema 中的 `data_locks` 和 `data_lock_waits`
    表。


    解决方案取决于锁等待的严重程度。如果锁等待短暂且不频繁，您或许可以忽略它们，让等待的查询等待锁请求变为可用。如果锁等待是由运行时间过长的查询或被遗忘的事务引起的，您可能需要终止有问题的查询或连接，但需要考虑到回滚更改所付出的努力。为防止将来出现此类问题，请努力减小事务的规模和持续时间，审查索引，并考虑使用
    `READ COMMITTED` 事务隔离级别。


    在下一个案例研究中，将探讨一个相关问题：两个事务形成了循环锁等待图——更广为人知的名称是死锁。


    脚注 1


    # 16. 案例研究：死锁


    引起数据库管理员最担忧的锁问题之一是死锁。这部分是因为它的名称，部分是因为它与其他讨论的锁问题不同，总是会导致错误。然而，与其他锁问题相比，死锁本身并没有什么特别令人担忧的。相反，它们导致错误意味着您能更早地知道问题所在，并且锁问题会自行解决。


    本章将设置一个死锁场景，并完成调查，从 InnoDB 监视器输出中的死锁信息反向推导，以确定涉及死锁的事务。


    ## 症状


    症状很直接。死锁的受害者会收到一个错误，并且 `lock_deadlocks` InnoDB 指标会递增。InnoDB 选择作为受害者的事务将收到 `ER_LOCK_DEADLOCK`
    错误：


    ```

    ERROR: 1213: Deadlock found when trying to get lock; try restarting transaction

    ```


    `lock_deadlocks` 指标对于跟踪死锁发生的频率非常有用。跟踪 `lock_deadlocks` 值的一个便捷方法是使用 `sys.metrics`
    视图：


    ```

    mysql> SELECT *

    FROM sys.metrics

    WHERE Variable_name = ''lock_deadlocks''\G

    *************************** 1. row ***************************

    Variable_name: lock_deadlocks

    Variable_value: 2

    Type: InnoDB Metrics - lock

    Enabled: YES

    1 row in set (0.0096 sec)

    ```


    或者，您可以使用 Performance Schema 中的 `events_errors_summary_global_by_error` 表，并查询 `ER_LOCK_DEADLOCK`
    错误：


    ```

    mysql> SELECT *

    FROM performance_schema.events_errors_summary_global_by_error

    WHERE error_name = ''ER_LOCK_DEADLOCK''\G

    *************************** 1. row ***************************

    ERROR_NUMBER: 1213

    ERROR_NAME: ER_LOCK_DEADLOCK

    SQL_STATE: 40001

    SUM_ERROR_RAISED: 5

    SUM_ERROR_HANDLED: 0

    FIRST_SEEN: 2020-08-01 13:09:29

    LAST_SEEN: 2020-08-07 18:28:20

    1 row in set (0.0083 sec)

    ```


    但请注意，这包括了所有返回错误 1213 的死锁情况，而不考虑锁类型，而 `lock_deadlocks` 指标仅包含 InnoDB 死锁。


    您还可以检查 InnoDB 监视器输出中的 `LATEST DETECTED DEADLOCK` 部分，例如通过执行 `SHOW ENGINE INNODB
    STATUS`。这将显示上次死锁发生的时间，因此您可以借此判断死锁发生的频率。如果您启用了 `innodb_print_all_deadlocks` 选项，错误日志中将会有许多死锁信息的输出。InnoDB
    监视器输出中关于死锁的细节将在讨论死锁原因和设置之后的“调查”部分中介绍。


    ## 原因


    死锁是由于两个或多个事务以不同的顺序获取锁而引起的。每个事务最终都持有了另一个事务所需的锁。这个锁可能是一个记录锁、间隙锁、谓词锁或插入意向锁。图 16-1
    展示了一个触发死锁的循环依赖示例。


    ![../images/502546_1_En_16_Chapter/502546_1_En_16_Fig1_HTML.png](img/502546_1_En_16_Fig1_HTML.png)


    **图 16-1**


    触发死锁的循环锁依赖


    图中所示的死锁是由于在表的主键上存在两个记录锁造成的。这是可能发生的最简单的死锁之一。正如在调查死锁时所展示的，循环依赖可能比这更复杂。

