    您现在已经了解了监控锁和事务的最重要资源，是时候深入了解锁的细节了。首先，您将学习锁访问级别。


    # 5. 锁访问级别


    在介绍锁的第一章中，没有提及锁的工作原理。通过只允许一次一个查询访问，无论将要完成何种工作，都可以在数据库中实现锁定。然而，这将非常低效。


    沿用交通信号灯的类比，另一种方法是基于将要完成的工作来授予访问权限。交通信号灯不仅一次允许一辆车进入十字路口，而是允许所有朝同一方向行驶的车辆进入。同样，在数据库中，您需要区分共享（读）和独占（写）访问。访问级别正如其名称所示。共享锁允许其他连接也获取共享锁。这是最宽松的锁访问级别。独占锁只允许该一个连接获取锁。共享锁也称为读锁，独占锁也称为写锁。


    > 注意

    > 锁访问级别有时也称为锁类型，但由于这可能与锁粒度（也常称为类型）混淆，此处使用术语锁访问级别。


    MySQL 还有一个称为意向锁的概念，用于指定事务的意向。意向锁可以是共享的或独占的。


    本章的其余部分将更详细地介绍共享锁和独占锁以及意向锁。'
- fmt: '## Shared Locks


    When a thread needs to protect a resource, but it is not going to change the resource,
    it can use a shared lock to prevent other threads from changing the resource while
    still allowing them to access the same resource. This is the most commonly used
    access level.


    Whenever a statement selects from a table, MySQL will take a shared lock on the
    tables involved in the query. For the data locks, it works differently as InnoDB
    does not in general acquire a shared lock when reading a row. That only happens
    when a shared lock is explicitly requested, in the `SERIALIZABLE` transaction
    isolation level, or it is required by the workflow such as when foreign keys are
    involved.


    You can explicitly request a shared lock on the rows accessed by a query by adding
    the `FOR SHARE` or its synonym `LOCK IN SHARE MODE` as shown in Listing [5-1](#502546_1_En_5_Chapter.xhtml#PC1).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               36          80          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT * FROM world.city WHERE ID = 130 FOR SHARE;

    +-----+--------+-------------+-----------------+------------+

    | ID  | Name   | CountryCode | District        | Population |

    +-----+--------+-------------+-----------------+------------+

    | 130 | Sydney | AUS         | New South Wales |    3276207 |

    +-----+--------+-------------+-----------------+------------+

    1 row in set (0.0047 sec)

    Connection 1> SELECT object_type, object_schema, object_name,

    lock_type, lock_duration, lock_status

    FROM performance_schema.metadata_locks

    WHERE OWNER_THREAD_ID = PS_CURRENT_THREAD_ID()

    AND OBJECT_SCHEMA  ''performance_schema''\G

    *************************** 1\. row ***************************

    object_type: TABLE

    object_schema: world

    object_name: city

    lock_type: SHARED_READ

    lock_duration: TRANSACTION

    lock_status: GRANTED

    1 row in set (0.0005 sec)

    Connection 1> SELECT engine, object_schema, object_name,

    lock_type, lock_mode, lock_status

    FROM performance_schema.data_locks

    WHERE THREAD_ID = PS_CURRENT_THREAD_ID()\G

    *************************** 1\. row ***************************

    engine: INNODB

    object_schema: world

    object_name: city

    lock_type: TABLE

    lock_mode: IS

    lock_status: GRANTED

    *************************** 2\. row ***************************

    engine: INNODB

    object_schema: world

    object_name: city

    lock_type: RECORD

    lock_mode: S,REC_NOT_GAP

    lock_status: GRANTED

    2 rows in set (0.0005 sec)

    mysql> ROLLBACK;

    Query OK, 0 rows affected (0.0004 sec)

    Listing 5-1

    Example of obtaining a shared lock

    ```


    When querying the `metadata_locks` table , locks on the Performance Schema tables
    are excluded as they are for the investigation query itself rather than for the
    previous query. Here a shared lock is taken on `world.city` table as well as the
    record with the primary key (the `ID` column) equals to 130. That they are shared
    locks can be seen from the `lock_type` column in the `metadata_locks` table which
    has a value of `SHARED_READ` and from the `S` in the `lock_mode` column of `data_locks`
    in the second row. The value of `IS` for the first row from `data_locks` means
    it is a shared intention lock which will be discussed in more detail shortly.


    While shared locks do allow other queries also using shared locks to proceed,
    they do block attempts to get an exclusive lock.


    ## Exclusive Locks


    Exclusive locks are the counterpart to shared lock. They ensure that only the
    thread granted the exclusive lock can access the resource for the duration of
    the lock. As exclusive locks are used to ensure only one thread is modifying a
    resource at a time, they are also known as write locks.


    Exclusive locks are mostly obtained by data definition language (DDL) statements
    such as `ALTER TABLE` and when modifying data using data modification language
    (DML) statements such as `UPDATE` and `DELETE`. As example of obtaining an exclusive
    lock and the data in the lock tables can be found in Listing [5-2](#502546_1_En_5_Chapter.xhtml#PC2).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               38          84          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    Query OK, 1 row affected (0.0028 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    Connection 1> SELECT object_type, object_schema, object_name,

    lock_type, lock_duration, lock_status

    FROM performance_schema.metadata_locks

    WHERE OWNER_THREAD_ID = PS_CURRENT_THREAD_ID()

    AND OBJECT_SCHEMA  ''performance_schema''\G

    *************************** 1\. row ***************************

    object_type: TABLE

    object_schema: world

    object_name: city

    lock_type: SHARED_WRITE

    lock_duration: TRANSACTION

    lock_status: GRANTED

    *************************** 2\. row ***************************

    object_type: TABLE

    object_schema: world

    object_name: country

    lock_type: SHARED_READ

    lock_duration: TRANSACTION

    lock_status: GRANTED

    2 rows in set (0.0008 sec)

    Connection 1> SELECT engine, object_schema, object_name,

    lock_type, lock_mode, lock_status

    FROM performance_schema.data_locks

    WHERE THREAD_ID = PS_CURRENT_THREAD_ID()\G

    *************************** 1\. row ***************************

    engine: INNODB

    object_schema: world

    object_name: city

    lock_type: TABLE

    lock_mode: IX

    lock_status: GRANTED

    *************************** 2\. row ***************************

    engine: INNODB

    object_schema: world

    object_name: city

    lock_type: RECORD

    lock_mode: X,REC_NOT_GAP

    lock_status: GRANTED

    2 rows in set (0.0005 sec)

    mysql> ROLLBACK;

    Query OK, 0 rows affected (0.3218 sec)

    Listing 5-2

    Example of obtaining exclusive locks

    ```


    Most of the example reflects the example of obtaining shared locks, but there
    are also some surprises. To start with the `data_locks` table, it shows an exclusive
    insert intention (`IX`) lock on the table and an exclusive (`X`) record lock.
    This is as expected.


    It becomes more complicated with the `metadata_locks` table where there are now
    two table locks, a `SHARED_WRITE` lock on the `city` table and a `SHARED_READ`
    lock on the `country` table. How can a lock both be shared and write at the same
    time, why is the lock on the `city` table shared when it was modified, and why
    is there a lock on the `country` table?


    A `SHARED_WRITE` lock tells that the data is locked for updates but that the metadata
    lock itself is a shared lock. The reason for this is that the metadata for the
    table is not modified, so it is safe to allow other concurrent shared access to
    the table metadata. Remember that the `metadata_locks` table does not care about
    the locks held on individual records, so from a metadata perspective, the access
    to the `city` table is shared.


    The metadata lock on the `country` table comes from the foreign key on the `city`
    table to the `country` table. The shared lock prevents modifications to the `country`
    metadata, such as dropping the column involved in the foreign key, while the transaction
    is still ongoing. Chapter 10 will go into more detail about the effect of foreign
    keys on locking.


    ## Intention Locks


    In the two examples this far in this chapter, there have been intention locks
    . What are those? It is a lock that signals the intention of an InnoDB transaction
    and can be either shared or exclusive. It can at first seem an unnecessary complication,
    but the intention locks allow InnoDB to resolve the lock requests in order without
    blocking compatible operations. The details are beyond the scope of this discussion.
    The important thing is that you know that the intention locks exist, so when you
    see them you know where they come from.


    Intention locks from a more functional perspective are covered in Chapter 6, and
    a related concept, insert intention locks are covered with the InnoDB locks in
    Chapter 7.'
