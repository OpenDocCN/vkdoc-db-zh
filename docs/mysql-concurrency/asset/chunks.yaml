    STATUS: disabled

    COMMENT: Waits for redo during transaction commits

    *************************** 11. row ***************************

    NAME: trx_on_log_wait_loops

    COUNT: 0

    STATUS: disabled

    COMMENT: Waits for redo during transaction commits

    *************************** 12. row ***************************

    NAME: trx_rseg_history_len

    COUNT: 9

    STATUS: enabled

    COMMENT: Length of the TRX_RSEG_HISTORY list

    *************************** 13. row ***************************

    NAME: trx_undo_slots_used

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of undo slots used

    *************************** 14. row ***************************

    NAME: trx_undo_slots_cached

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of undo slots cached

    *************************** 15. row ***************************

    NAME: trx_rseg_current_size

    COUNT: 0

    STATUS: disabled

    COMMENT: Current rollback segment size in pages

    15 rows in set (0.0012 sec)

    ```

    清单 3-5

    与事务相关的 InnoDB 指标

    '
- fmt: "# InnoDB 事务监控指标\n\n其中最重要的指标是 `trx_rseg_history_len`，即历史列表长度。这也是默认启用的唯一指标。与提交和回滚相关的指标可用于确定你有多少读写、只读和非锁定只读事务，以及它们的提交和回滚频率。频繁的回滚表明存在问题。如果你怀疑重做日志是瓶颈，可以使用\
    \ `trx_on_log_%` 系列指标来衡量在事务提交期间有多少事务在等待重做日志。\n\n> **提示**：你可以使用 `innodb_monitor_enable`\
    \ 选项启用 InnoDB 指标，并使用 `innodb_monitor_disable` 禁用它们。这可以动态完成。\n\n另一种方便查询 InnoDB\
    \ 指标的方法是使用 `sys.metrics` 视图，该视图也包含了全局状态变量。列表 [3-6] 展示了使用 `sys.metrics` 视图获取当前值及指标是否启用的示例。\n\
    \n```sql\n-- Connection   Processlist ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
    --          1               52         125          6\n-- Connection 1\nConnection\
    \ 1> SELECT Variable_name AS Name,\n    Variable_value AS Value,\n    Enabled\n\
    \    FROM sys.metrics\n    WHERE Type = 'InnoDB Metrics - transaction';\n+---------------------------+-------+---------+\n\
    | Name                      | Value | Enabled |\n+---------------------------+-------+---------+\n\
    | trx_active_transactions   | 0     | NO      |\n| trx_commits_insert_update |\
    \ 0     | NO      |\n| trx_nl_ro_commits         | 0     | NO      |\n| trx_on_log_no_waits\
    \       | 0     | NO      |\n| trx_on_log_wait_loops     | 0     | NO      |\n\
    | trx_on_log_waits          | 0     | NO      |\n| trx_ro_commits            |\
    \ 0     | NO      |\n| trx_rollback_active       | 0     | NO      |\n| trx_rollbacks\
    \             | 0     | NO      |\n| trx_rollbacks_savepoint   | 0     | NO  \
    \    |\n| trx_rseg_current_size     | 0     | NO      |\n| trx_rseg_history_len\
    \      | 16    | YES     |\n| trx_rw_commits            | 0     | NO      |\n\
    | trx_undo_slots_cached     | 0     | NO      |\n| trx_undo_slots_used       |\
    \ 0     | NO      |\n+---------------------------+-------+---------+\n15 rows\
    \ in set (0.0089 sec)\n```\n*列表 3-6 使用 sys.metrics 视图获取事务指标*\n\n这显示历史列表长度为 16，这是一个很好的低值，因此来自撤销日志的开销几乎为零。其余的指标均被禁用。\n\
    \n## 总结\n\n本章介绍了如何获取有关 InnoDB 事务的信息。详细信息的主要来源是信息模式中的 `INNODB_TRX` 视图，它包含诸如事务启动时间、锁定和修改的行数等详细信息。你可以选择性地连接性能模式表以获取有关事务的更多信息。\n\
    \n你也可以使用 InnoDB 监视器获取有关锁定事务的信息；然而，通常更推荐使用 `INNODB_TRX` 视图。如果你在寻找更高级别的聚合统计信息，可以使用\
    \ `information_schema.INNODB_METRICS` 视图或 `sys.metrics` 视图。最常用的指标是 `trx_rseg_history_len`，它显示了历史列表长度。\n\
    \n至此，关于事务信息的讨论都是针对所有事务或单个事务的聚合统计。如果你想深入了解一个事务具体完成了哪些工作，则需要使用性能模式，这将在下一章中讨论。\n\n\
    # 4. 性能模式中的事务\n\n性能模式在 MySQL 5.7 及更高版本中支持事务监控，并且在 MySQL 8 中默认启用。除了与 XA 事务和保存点相关的事务详情外，性能模式中可用的许多信息都可以从信息模式的\
    \ `INNODB_TRX` 视图中获得。然而，性能模式的事务事件有一个优势，即你可以将它们与其他事件类型（例如语句）结合，以获取有关事务所做工作的信息。这是本章的主要重点。此外，性能模式提供了包含聚合统计信息的汇总表。"
  raw: 'The most important of these metrics is `trx_rseg_history_len` which is the
    history list length. This is also the only metric that is enabled by default.
    The metrics related to commits and rollbacks can be used to determine how many
    read-write, read-only, and non-locking read-only transactions you have and how
    often they are committed and rolled back. Many rollbacks suggest there is a problem.
    If you suspect the redo log is a bottleneck, the `trx_on_log_%` metrics can be
    used to get a measure of how much transactions are waiting for the redo log during
    transaction commits.


    Tip


    You enable InnoDB metrics with the `innodb_monitor_enable` option and disable
    them with `innodb_monitor_disable`. This can be done dynamically.


    An alternative and convenient way to query the InnoDB metrics is to use the `sys.metrics`
    view which also includes the global status variables. Listing [3-6](#502546_1_En_3_Chapter.xhtml#PC7)
    shows an example of using the `sys.metrics` view to obtain the current values
    and whether the metric is enabled.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               52         125          6

    -- Connection 1

    Connection 1> SELECT Variable_name AS Name,

    Variable_value AS Value,

    Enabled

    FROM sys.metrics

    WHERE Type = ''InnoDB Metrics - transaction'';

    +---------------------------+-------+---------+

    | Name                      | Value | Enabled |

    +---------------------------+-------+---------+

    | trx_active_transactions   | 0     | NO      |

    | trx_commits_insert_update | 0     | NO      |

    | trx_nl_ro_commits         | 0     | NO      |

    | trx_on_log_no_waits       | 0     | NO      |

    | trx_on_log_wait_loops     | 0     | NO      |

    | trx_on_log_waits          | 0     | NO      |

    | trx_ro_commits            | 0     | NO      |

    | trx_rollback_active       | 0     | NO      |

    | trx_rollbacks             | 0     | NO      |

    | trx_rollbacks_savepoint   | 0     | NO      |

    | trx_rseg_current_size     | 0     | NO      |

    | trx_rseg_history_len      | 16    | YES     |

    | trx_rw_commits            | 0     | NO      |

    | trx_undo_slots_cached     | 0     | NO      |

    | trx_undo_slots_used       | 0     | NO      |

    +---------------------------+-------+---------+

    15 rows in set (0.0089 sec)

    Listing 3-6

    Using the sys.metrics view to get the transaction metrics

    ```


    This shows that the history list length is 16 which is a good low value, so there
    is next to none overhead from the undo logs. The rest of the metrics are disabled.


    ## Summary


    This chapter has covered how you can obtain information about InnoDB transactions.
    The primary source of detailed information is the `INNODB_TRX` view in the Information
    Schema which includes details such as when the transaction was started, the number
    of locked and modified rows, etc. You can optionally join on the Performance Schema
    tables to get more information about the transaction.


    You can also use the InnoDB monitor to get information about locking transactions;
    however, in general, it is preferred to use the `INNODB_TRX` view. If you are
    looking for higher-level aggregate statistics, you can use the `information_schema.INNODB_METRICS`
    view or alternatively the `sys.metrics` view. The most commonly used metric is
    `trx_rseg_history_len` which shows the history list length.


    Thus far, the discussion of transaction information has been about aggregate statistics
    either for all transactions or individual transactions. If you want to go deeper
    into what work a transaction has done, you need to use the Performance Schema
    as discussed in the next chapter.


    # 4. Transactions in the Performance Schema


    The Performance Schema supports transaction monitoring in MySQL 5.7 and later,
    and it is enabled by default in MySQL 8\. There are not many transaction details
    other than related to XA transactions and savepoints available in the Performance
    Schema that cannot be obtained from the `INNODB_TRX` view in the Information Schema.
    However, the Performance Schema transaction events have the advantage that you
    can combine them with other event types such as statements to get information
    about the work done by a transaction. This is the main focus of this chapter.
    Additionally, the Performance Schema offers summary tables with aggregate statistics.'
