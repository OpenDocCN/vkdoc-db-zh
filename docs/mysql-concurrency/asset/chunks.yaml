    \                trx_state: RUNNING\n                trx_started: 2020-06-27 17:46:10\n\
    \        trx_requested_lock_id: NULL\n            trx_wait_started: NULL\n   \
    \               trx_weight: 1023\n       trx_mysql_thread_id: 53\n           \
    \  trx_query: UPDATE world.city SET Population = Population + MOD(ID, 2) + SLEEP(0.01)\n\
    \   trx_operation_state: NULL\n         trx_tables_in_use: 1\n         trx_tables_locked:\
    \ 1\n          trx_lock_structs: 14\n     trx_lock_memory_bytes: 1136\n      \
    \     trx_rows_locked: 2031\n         trx_rows_modified: 1009\n   trx_concurrency_tickets:\
    \ 0\n       trx_isolation_level: REPEATABLE READ\n         trx_unique_checks:\
    \ 1\n        trx_foreign_key_checks: 1\ntrx_last_foreign_key_error: NULL\n   \
    \ trx_adaptive_hash_latched: 0\n    trx_adaptive_hash_timeout: 0\n           \
    \   trx_is_read_only: 0\ntrx_autocommit_non_locking: 0\n       trx_schedule_weight:\
    \ NULL\n*************************** 2. row ***************************\n     \
    \                trx_id: 283598406543136\n                  trx_state: RUNNING\n\
    \                trx_started: 2020-06-27 17:46:10\n        trx_requested_lock_id:\
    \ NULL\n            trx_wait_started: NULL\n                  trx_weight: 0\n\
    \       trx_mysql_thread_id: 54\n             trx_query: SELECT COUNT(*) FROM\
    \ world.city WHERE ID > SLEEP(0.01)\n   trx_operation_state: NULL\n         trx_tables_in_use:\
    \ 1\n         trx_tables_locked: 0\n          trx_lock_structs: 0\n     trx_lock_memory_bytes:\
    \ 1136\n           trx_rows_locked: 0\n         trx_rows_modified: 0\n   trx_concurrency_tickets:\
    \ 0\n       trx_isolation_level: REPEATABLE READ\n         trx_unique_checks:\
    \ 1\n        trx_foreign_key_checks: 1\ntrx_last_foreign_key_error: NULL\n   \
    \ trx_adaptive_hash_latched: 0\n    trx_adaptive_hash_timeout: 0\n           \
    \   trx_is_read_only: 1\ntrx_autocommit_non_locking: 1\n       trx_schedule_weight:\
    \ NULL\n2 rows in set (0.0008 sec)\n```\n\n**清单 3-2** `INNODB_TRX` 视图输出示例\n\n\
    第一行展示了一个修改数据的事务示例。在检索信息时，已修改了 1009 行，并且有大约两倍数量的记录锁。您还可以看到该事务仍在主动执行查询（一个 `UPDATE`\
    \ 语句）。\n\n第二行是一个在启用 `autocommit` 的情况下执行的 `SELECT` 语句示例。由于启用了自动提交，事务中只能有一条语句（显式的\
    \ `START TRANSACTION` 会禁用自动提交）。`trx_query` 列显示它是一个不带任何锁子句的 `SELECT COUNT(*)` 查询，因此它是一个只读语句。这意味着\
    \ InnoDB 可以跳过一些操作，例如为事务准备持有的锁和撤销信息，从而降低了事务的开销。`trx_autocommit_non_locking` 列被设置为\
    \ 1 以反映这一点。\n\n您应该关注哪些事务取决于系统上预期的工作负载。如果您有 OLAP 工作负载，预计会有运行时间相对较长的 `SELECT` 查询。对于纯\
    \ OLTP 工作负载，任何运行超过一秒且修改超过少数几行的事务都可能是问题的迹象。例如，要查找运行时间超过 10 秒的事务，您可以使用以下查询：\n\n\
    ```\nSELECT *\nFROM information_schema.INNODB_TRX\nWHERE trx_started < NOW() -\
    \ INTERVAL 10 SECOND;\n```\n\n您可以选择性地连接 Performance Schema 中的其他表，例如 `threads`\
    \ 和 `events_statements_current`。[清单 3-3](#502546_1_En_3_Chapter.xhtml#PC4) 展示了一个这样的例子。\n\
    \n```\n-- Investigation #3\nConnection 3> SELECT thd.thread_id, thd.processlist_id,\n\
    \    -> trx.trx_id, stmt.event_id, trx.trx_started,\n    -> TO_SECONDS(NOW())\
    \ -\n    -> TO_SECONDS(trx.trx_started\n    -> ) AS age_seconds,\n    -> trx.trx_rows_locked,\
    \ trx.trx_rows_modified,\n    -> FORMAT_PICO_TIME(stmt.timer_wait) AS latency,\n\
    \    -> stmt.rows_examined, stmt.rows_affected,\n    -> sys.format_statement(SQL_TEXT)\
    \ as statement\n    -> FROM information_schema.INNODB_TRX trx\n    -> INNER JOIN\
    \ performance_schema.threads thd\n    -> ON thd.processlist_id = trx.trx_mysql_thread_id\n\
    \    -> INNER JOIN performance_schema.events_statements_current stmt\n    -> USING\
    \ (thread_id)\n    -> WHERE trx_started < NOW() - INTERVAL 10 SECOND\n    -> LIMIT\
    \ 1\\G\n*************************** 1. row ***************************\n     \
    \  thread_id: 213\n  processlist_id: 53\n          trx_id: 296813\n       event_id:\
    \ 7\n    trx_started: 2020-06-27 17:46:10\n    age_seconds: 62\ntrx_rows_locked:\
    \ 2031\ntrx_rows_modified: 1009\n         latency: 1.01 s\nrows_examined: 1010\n\
    \ rows_affected: 1009\n      statement: UPDATE world.city SET Population = Population\
    \ + MOD(ID, 2) + SLEEP(0.01)\n1 row in set (0.0021 sec)\n```\n\n**清单 3-3** 查询旧事务的详细信息\n\
    \n您可以连接到相关表并选择对您的调查有用的列。\n\n与 `INNODB_TRX` 视图相关的是 InnoDB monitor 中的事务列表。"
  raw: 'The information available from the `INNODB_TRX` view makes it possible to
    determine which transactions have the greatest impact. Listing [3-1](#502546_1_En_3_Chapter.xhtml#PC1)
    shows an example of starting two transactions that can be investigated.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               53         163          6

    --          2               54         164          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city SET Population = Population + MOD(ID, 2) + SLEEP(0.01);

    -- Connection 2

    Connection 2> SET SESSION autocommit = ON;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 2> SELECT COUNT(*) FROM world.city WHERE ID > SLEEP(0.01);

    Listing 3-1

    Example transactions

    ```


    The transactions will run for 40–50 seconds. While they are executing, you can
    query the `INNODB_TRX` view like it is shown in Listing [3-2](#502546_1_En_3_Chapter.xhtml#PC2)
    (the exact data depends on the ids in your test and when you query the `INNODB_TRX`
    view).


    ```

    -- Investigation #1

    -- Connection 3

    Connection 3> SELECT *

    FROM information_schema.INNODB_TRX

    WHERE trx_mysql_thread_id IN (53, 54)\G

    *************************** 1\. row ***************************

    trx_id: 296813

    trx_state: RUNNING

    trx_started: 2020-06-27 17:46:10

    trx_requested_lock_id: NULL

    trx_wait_started: NULL

    trx_weight: 1023

    trx_mysql_thread_id: 53

    trx_query: UPDATE world.city SET Population = Population + MOD(ID, 2) + SLEEP(0.01)

    trx_operation_state: NULL

    trx_tables_in_use: 1

    trx_tables_locked: 1

    trx_lock_structs: 14

    trx_lock_memory_bytes: 1136

    trx_rows_locked: 2031

    trx_rows_modified: 1009

    trx_concurrency_tickets: 0

    trx_isolation_level: REPEATABLE READ

    trx_unique_checks: 1

    trx_foreign_key_checks: 1

    trx_last_foreign_key_error: NULL

    trx_adaptive_hash_latched: 0

    trx_adaptive_hash_timeout: 0

    trx_is_read_only: 0

    trx_autocommit_non_locking: 0

    trx_schedule_weight: NULL

    *************************** 2\. row ***************************

    trx_id: 283598406543136

    trx_state: RUNNING

    trx_started: 2020-06-27 17:46:10

    trx_requested_lock_id: NULL

    trx_wait_started: NULL

    trx_weight: 0

    trx_mysql_thread_id: 54

    trx_query: SELECT COUNT(*) FROM world.city WHERE ID > SLEEP(0.01)

    trx_operation_state: NULL

    trx_tables_in_use: 1

    trx_tables_locked: 0

    trx_lock_structs: 0

    trx_lock_memory_bytes: 1136

    trx_rows_locked: 0

    trx_rows_modified: 0

    trx_concurrency_tickets: 0

    trx_isolation_level: REPEATABLE READ

    trx_unique_checks: 1

    trx_foreign_key_checks: 1

    trx_last_foreign_key_error: NULL

    trx_adaptive_hash_latched: 0

    trx_adaptive_hash_timeout: 0

    trx_is_read_only: 1

    trx_autocommit_non_locking: 1

    trx_schedule_weight: NULL

    2 rows in set (0.0008 sec)

    Listing 3-2

    Example output of the INNODB_TRX view

    ```


    The first row shows an example of a transaction that modifies data. At the time
    the information is retrieved, 1009 rows have been modified, and there are around
    twice as many record locks. You can also see that the transaction is still actively
    executing a query (an `UPDATE` statement).


    The second row is an example of a `SELECT` statement executed with `autocommit`
    enabled. Since autocommitting is enabled, there can only be one statement in the
    transaction (an explicit `START TRANSACTION` disables autocommitting). The `trx_query`
    column shows it is a `SELECT COUNT(*)` query without any lock clauses, so it is
    a read-only statement. This means that InnoDB can skip some things such as preparing
    to hold lock and undo information for the transaction which reduces the overhead
    of the transaction. The `trx_autocommit_non_locking` column is set to 1 to reflect
    that.


    Which transactions you should be worried about depends on the expected workload
    on your system. If you have an OLAP workload, it is expected that there will be
    relatively long-running `SELECT` queries. For a pure OLTP workload, any transaction
    running for more than a second and modifying more than a handful of rows may be
    a sign of problems. For example, to find transactions that are older than 10 seconds,
    you can use the following query:


    ```

    SELECT *

    FROM information_schema.INNODB_TRX

    WHERE trx_started < NOW() - INTERVAL 10 SECOND;

    ```


    You can optionally join on other tables such as `threads` and `events_statements_current`
    in the Performance Schema. An example of this is shown in Listing [3-3](#502546_1_En_3_Chapter.xhtml#PC4).


    ```

    -- Investigation #3

    Connection 3> SELECT thd.thread_id, thd.processlist_id,

    trx.trx_id, stmt.event_id, trx.trx_started,

    TO_SECONDS(NOW()) -

    TO_SECONDS(trx.trx_started

    ) AS age_seconds,

    trx.trx_rows_locked, trx.trx_rows_modified,

    FORMAT_PICO_TIME(stmt.timer_wait) AS latency,

    stmt.rows_examined, stmt.rows_affected,

    sys.format_statement(SQL_TEXT) as statement

    FROM information_schema.INNODB_TRX trx

    INNER JOIN performance_schema.threads thd

    ON thd.processlist_id = trx.trx_mysql_thread_id

    INNER JOIN performance_schema.events_statements_current stmt

    USING (thread_id)

    WHERE trx_started  SLEEP(0.01)

    2 rows in set (0.0021 sec)

    Listing 3-3

    Querying details of old transactions

    ```


    You can join to the tables and choose the columns of relevance for your investigation.


    Related to the `INNODB_TRX` view is the transaction list in the InnoDB monitor.'
