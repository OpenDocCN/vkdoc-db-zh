    \ 0\n       trx_schedule_weight: NULL\n*************************** 2. row ***************************\n\
    \                     trx_id: 283598406543136\n                  trx_state: RUNNING\n\
    \                trx_started: 2020-06-27 17:46:10\n        trx_requested_lock_id:\
    \ NULL\n            trx_wait_started: NULL\n                  trx_weight: 0\n\
    \       trx_mysql_thread_id: 54\n             trx_query: SELECT COUNT(*) FROM\
    \ world.city WHERE ID > SLEEP(0.01)\n   trx_operation_state: NULL\n         trx_tables_in_use:\
    \ 1\n         trx_tables_locked: 0\n          trx_lock_structs: 0\n     trx_lock_memory_bytes:\
    \ 1136\n           trx_rows_locked: 0\n         trx_rows_modified: 0\n   trx_concurrency_tickets:\
    \ 0\n       trx_isolation_level: REPEATABLE READ\n         trx_unique_checks:\
    \ 1\n        trx_foreign_key_checks: 1\ntrx_last_foreign_key_error: NULL\n   \
    \ trx_adaptive_hash_latched: 0\n    trx_adaptive_hash_timeout: 0\n           \
    \   trx_is_read_only: 1\ntrx_autocommit_non_locking: 1\n       trx_schedule_weight:\
    \ NULL\n2 rows in set (0.0008 sec)\n```\n\n**清单 3-2** `INNODB_TRX` 视图输出示例\n\n\
    第一行展示了一个修改数据的事务示例。在检索信息时，已修改了 1009 行，并且有大约两倍数量的记录锁。您还可以看到该事务仍在主动执行查询（一个 `UPDATE`\
    \ 语句）。\n\n第二行是一个在启用 `autocommit` 的情况下执行的 `SELECT` 语句示例。由于启用了自动提交，事务中只能有一条语句（显式的\
    \ `START TRANSACTION` 会禁用自动提交）。`trx_query` 列显示它是一个不带任何锁子句的 `SELECT COUNT(*)` 查询，因此它是一个只读语句。这意味着\
    \ InnoDB 可以跳过一些操作，例如为事务准备持有的锁和撤销信息，从而降低了事务的开销。`trx_autocommit_non_locking` 列被设置为\
    \ 1 以反映这一点。\n\n您应该关注哪些事务取决于系统上预期的工作负载。如果您有 OLAP 工作负载，预计会有运行时间相对较长的 `SELECT` 查询。对于纯\
    \ OLTP 工作负载，任何运行超过一秒且修改超过少数几行的事务都可能是问题的迹象。例如，要查找运行时间超过 10 秒的事务，您可以使用以下查询：\n\n\
    ```\nSELECT *\nFROM information_schema.INNODB_TRX\nWHERE trx_started < NOW() -\
    \ INTERVAL 10 SECOND;\n```\n\n您可以选择性地连接 Performance Schema 中的其他表，例如 `threads`\
    \ 和 `events_statements_current`。清单 3-3 展示了一个这样的例子。\n\n```\n-- Investigation #3\n\
    Connection 3> SELECT thd.thread_id, thd.processlist_id,\n    -> trx.trx_id, stmt.event_id,\
    \ trx.trx_started,\n    -> TO_SECONDS(NOW()) -\n    -> TO_SECONDS(trx.trx_started\n\
    \    -> ) AS age_seconds,\n    -> trx.trx_rows_locked, trx.trx_rows_modified,\n\
    \    -> FORMAT_PICO_TIME(stmt.timer_wait) AS latency,\n    -> stmt.rows_examined,\
    \ stmt.rows_affected,\n    -> sys.format_statement(SQL_TEXT) as statement\n  \
    \  -> FROM information_schema.INNODB_TRX trx\n    -> INNER JOIN performance_schema.threads\
    \ thd\n    -> ON thd.processlist_id = trx.trx_mysql_thread_id\n    -> INNER JOIN\
    \ performance_schema.events_statements_current stmt\n    -> USING (thread_id)\n\
    \    -> WHERE trx_started < NOW() - INTERVAL 10 SECOND\n    -> LIMIT 1\\G\n***************************\
    \ 1. row ***************************\n       thread_id: 213\n  processlist_id:\
    \ 53\n          trx_id: 296813\n       event_id: 7\n    trx_started: 2020-06-27\
    \ 17:46:10\n    age_seconds: 62\ntrx_rows_locked: 2031\ntrx_rows_modified: 1009\n\
    \         latency: 1.01 s\nrows_examined: 1010\n rows_affected: 1009\n      statement:\
    \ UPDATE world.city SET Population = Population + MOD(ID, 2) + SLEEP(0.01)\n1\
    \ row in set (0.0021 sec)\n```\n\n**清单 3-3** 查询旧事务的详细信息\n\n您可以连接到相关表并选择对您的调查有用的列。\n\
    \n与 `INNODB_TRX` 视图相关的是 InnoDB monitor 中的事务列表。\n"
- fmt: '## InnoDB Monitor


    The InnoDB monitor is a kind of Swiss army knife of InnoDB information and also
    includes information about transactions. The `TRANSACTIONS` section in the output
    from the InnoDB monitor is dedicated to transactional information. This information
    does include not only a list of transactions but also the history list length.
    Listing [3-4](#502546_1_En_3_Chapter.xhtml#PC5) shows an excerpt of the InnoDB
    monitor with the example of the transaction section taken just after the previous
    output from the `INNODB_TRX` view .


    ```

    -- Investigation #4

    Connection 3> SHOW ENGINE INNODB STATUS\G

    *************************** 1. row ***************************

    Type: InnoDB

    Name:

    Status:

    =====================================

    2020-06-27 17:46:36 0x5784 INNODB MONITOR OUTPUT

    =====================================

    Per second averages calculated from the last 20 seconds

    ...


    TRANSACTIONS


    Trx id counter 296814

    Purge done for trx''s n:o < 296813 undo n:o < 0 state: running but idle

    History list length 1

    LIST OF TRANSACTIONS FOR EACH SESSION:

    ---TRANSACTION 283598406541472, not started

    0 lock struct(s), heap size 1136, 0 row lock(s)

    ---TRANSACTION 283598406540640, not started

    0 lock struct(s), heap size 1136, 0 row lock(s)

    ---TRANSACTION 283598406539808, not started

    0 lock struct(s), heap size 1136, 0 row lock(s)

    ---TRANSACTION 283598406538976, not started

    0 lock struct(s), heap size 1136, 0 row lock(s)

    ---TRANSACTION 296813, ACTIVE 26 sec fetching rows

    mysql tables in use 1, locked 1

    15 lock struct(s), heap size 1136, 2333 row lock(s), undo log entries 1160

    MySQL thread id 53, OS thread handle 23748, query id 56574 localhost ::1 root
    User sleep

    UPDATE world.city SET Population = Population + MOD(ID, 2) + SLEEP(0.01)

    ...

    ```

    Listing 3-4

    Transaction information from the InnoDB monitor


    The top of the `TRANSACTIONS` section shows the current value of the transaction
    id counter followed by information of what has been purged from the undo logs.
    It shows that the undo logs for transaction ids less than 296813 have been purged.
    The further this purge is behind, the larger the history list length (in the third
    line of the section) is. Reading the history list length from the InnoDB monitor
    output is the traditional way to get the length of the history list. In the next
    section, it will be shown how to get the value in a better way when used for monitoring
    purposes.


    The rest of the section is a list of transactions. Notice that while the output
    is generated with the same two active transactions as were found in `INNODB_TRX`,
    the transaction list only includes one active transaction (the one for the `UPDATE`
    statement). In MySQL 5.7 and later, read-only non-locking transactions are not
    included in the InnoDB monitor transaction list. For this reason, it is better
    to use the `INNODB_TRX` view , if you need to include all active transactions.


    As mentioned, there is an alternative way to get the history list length. You
    need to use the InnoDB metrics for this.


    ## `INNODB_METRICS` and `sys.metrics`


    The InnoDB monitor report is useful for a database administrator to get an overview
    of what is going on in InnoDB, but for monitoring it is not as useful as it requires
    parsing to get out the data in a way monitoring can use it. You saw earlier in
    the chapter how the information about the transactions can be obtained from the
    `information_schema.INNODB_TRX` view , but how about metrics such as the history
    list length?


    The InnoDB metric system includes several metrics that show information about
    the transactions in the `information_schema.INNODB_METRICS` view. These metrics
    are all located in the `transaction` subsystem. Listing [3-5](#502546_1_En_3_Chapter.xhtml#PC6)
    shows a list of the transaction metrics, whether they are enabled by default,
    and a brief comment explaining what the metric measures.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               56         166          6

    -- Connection 1

    Connection 1> SELECT NAME, COUNT, STATUS, COMMENT

    FROM information_schema.INNODB_METRICS

    WHERE SUBSYSTEM = ''transaction''\G

    *************************** 1. row ***************************

    NAME: trx_rw_commits

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of read-write transactions  committed

    *************************** 2. row ***************************

    NAME: trx_ro_commits

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of read-only transactions committed

    *************************** 3. row ***************************

    NAME: trx_nl_ro_commits

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of non-locking auto-commit read-only transactions committed

    *************************** 4. row ***************************

    NAME: trx_commits_insert_update

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of transactions committed with inserts and updates

    *************************** 5. row ***************************

    NAME: trx_rollbacks

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of transactions rolled back

    *************************** 6. row ***************************

    NAME: trx_rollbacks_savepoint

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of transactions rolled back to savepoint

    *************************** 7. row ***************************

    NAME: trx_rollback_active

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of resurrected active transactions rolled back

    *************************** 8. row ***************************

    NAME: trx_active_transactions

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of active transactions

    *************************** 9. row ***************************

    NAME: trx_on_log_no_waits

    COUNT: 0

    STATUS: disabled

    COMMENT: Waits for redo during transaction commits

    *************************** 10. row ***************************

    NAME: trx_on_log_waits

    COUNT: 0

    STATUS: disabled

    COMMENT: Waits for redo during transaction commits

    *************************** 11. row ***************************

    NAME: trx_on_log_wait_loops

    COUNT: 0

    STATUS: disabled

    COMMENT: Waits for redo during transaction commits

    *************************** 12. row ***************************

    NAME: trx_rseg_history_len

    COUNT: 9

    STATUS: enabled

    COMMENT: Length of the TRX_RSEG_HISTORY list

    *************************** 13. row ***************************

    NAME: trx_undo_slots_used

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of undo slots used

    *************************** 14. row ***************************

    NAME: trx_undo_slots_cached

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of undo slots cached

    *************************** 15. row ***************************

    NAME: trx_rseg_current_size

    COUNT: 0

    STATUS: disabled

    COMMENT: Current rollback segment size in pages

    15 rows in set (0.0012 sec)

    ```

    Listing 3-5

    InnoDB metrics related to transactions'
