    # `sakila` 数据库中的视图


    这些视图可以像报表一样使用，并可分为两类。`film_list`、`nicer_but_slower_film_list` 和 `actor_info` 视图与数据库中存储的影片相关。第二类则包含与商店相关的信息，对应的视图有
    `sales_by_store`、`sales_by_film_category`、`staff_list` 和 `customer_list`。


    为了完善该数据库，还包含如图 1-13 所示的存储函数和存储过程。


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig13_HTML.jpg](img/502546_1_En_1_Fig13_HTML.jpg)


    图 1-13：`sakila` 数据库中的存储例程


    `film_in_stock()` 和 `film_not_in_stock()` 过程根据影片是否有库存，返回包含给定影片和商店的库存 ID 的结果集。找到的库存条目总数将作为输出参数返回。`rewards_report()`
    过程根据上个月的最低消费额生成报告。


    `get_customer_balance()` 函数返回给定日期某个客户的余额。剩下的两个函数用于检查库存 ID 的状态：`inventory_held_by_customer()`
    返回当前租用该物品的客户 ID（如果没有客户租用则返回 `NULL`）；而如果你想检查某个给定的库存 ID 是否有货，可以使用 `inventory_in_stock()`
    函数。


    ## 安装


    你可以从 [`https://dev.mysql.com/doc/index-other.html`](https://dev.mysql.com/doc/index-other.html)
    下载包含安装脚本的文件来安装 `sakila` 模式，就像安装 `world` 数据库一样。


    下载的文件解压后会得到一个目录，内含三个文件：其中两个用于创建模式和数据，最后一个文件包含 MySQL Workbench 使用的 ETL 图表。


    **注意：** `sakila` 数据库也随 `employees` 数据库的下载包提供；然而，本节以及本书后续的示例使用的是从 MySQL 主页下载的 `sakila`
    数据库副本。


    这些文件是：


    *   **sakila-data.sql：** 用于填充表的 `INSERT` 语句以及触发器定义。

    *   **sakila-schema.sql：** 模式定义语句。

    *   **sakila.mwb：** MySQL Workbench ETL 图表。这类似于图 1-7 所示，详细信息见图 1-8 至 1-12。


    安装 `sakila` 数据库时，首先需要 `source` `sakila-schema.sql` 文件，然后 `source` `sakila-data.sql`
    文件。例如，下面使用的是 MySQL Shell：


    ```

    MySQL [localhost+ ssl] SQL> \source sakila-schema.sql

    MySQL [localhost+ ssl] SQL> \source sakila-data.sql

    ```


    如果文件不在当前目录，请添加文件的路径。


    # 测试数据：`employees` 模式


    `employees` 数据库（在 MySQL 文档下载页面上称为员工数据；GitHub 仓库名为 `test_db`）最初由 Fusheng Wang 和
    Carlo Zaniolo 创建，是从 MySQL 主页链接的测试数据集中最大的一个。它提供了使用非分区表或对其中两个最大表进行分区的选项。数据文件的总大小对于非分区版本约为
    180 MiB，对于分区版本约为 440 MiB。


    ## 模式


    `employees` 数据库由六个表和两个视图组成。你可以选择再安装两个视图、五个存储函数和两个存储过程。这些表如图 1-14 所示。


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig14_HTML.jpg](img/502546_1_En_1_Fig14_HTML.jpg)


    图 1-14：`employees` 数据库中的表、视图和例程


    按照今天的标准，它仍然是一个相对较小的数据库，但它足够大，以至于你可以开始看到底层的争用现象，正因如此，它是在第 18 章中用于引发信号量等待的模式。


    ## 安装


    你可以下载包含安装所需文件的 ZIP 文件，或者克隆位于 [`https://github.com/datacharmer/test_db`](https://github.com/datacharmer/test_db)
    的 GitHub 仓库。在撰写本文时，只有一个名为 master 的分支。如果你下载了 ZIP 文件，它将解压到一个名为 `test_db-master`
    的目录中。


    有几个文件。与在 MySQL 8 中安装 `employees` 数据库相关的两个文件是 `employees.sql` 和 `employees_partitioned.sql`。区别在于
    `salaries` 和 `titles` 表是否进行了分区。本书使用的是未分区模式。（还有一个 `employees_partitioned_5.1.sql`，适用于
    MySQL 5.1，因为 `employees_partitioned.sql` 中使用的分区方案在 5.1 版本中不支持。）


    通过使用 `SOURCE` 命令 `source` `.dump` 文件来加载数据，该命令仅在 MySQL Shell 8.0.19（由于一个错误，实际是
    8.0.20）及更高版本中支持。转到包含源文件的目录，根据你是否想使用分区，选择 `employees.sql` 或 `employees_partitioned.sql`
    文件，例如：


    ```

    mysql> \source employees.sql

    ```


    导入需要一些时间，完成时会显示所用时长：


    ```

    +---------------------+

    | data_load_time_diff |

    +---------------------+

    | 00:02:50            |

    +---------------------+

    1 row in set (0.0085 sec)

    ```


    可选地，你可以通过 `source` `objects.sql` 文件来加载一些额外的视图和存储例程：


    ```

    mysql> \source objects.sql

    ```


    当你使用 `concurrency_book.generate.load()` 方法加载 `employees` 模式时，`objects.sql` 文件总是会被包含在内。


    现在，你已准备好深入探索 MySQL 并发的世界。


    # 总结


    本章开启了理解 MySQL 并发的旅程，其中锁和事务是重要主题。首先讨论了为什么需要锁以及锁存在的不同级别。然后阐述了事务必须包含在讨论中，因为某些锁会持续到事务结束，并且事务隔离级别会影响锁的持续时间以及锁的数量。


    本章的其余部分讨论了本书中如何使用示例，并介绍了重现测试用例所需的三组测试数据。为了更轻松地加载数据和执行测试用例，还介绍了用于 MySQL Shell 的
    `concurrency_book.generate` 模块。


    下一章将讨论如何监控锁。


    # 2. 监控锁与互斥量


    监控对于了解系统中瓶颈发生的位置至关重要。你需要使用监控来确定争用的来源，并验证你所做的更改是否减少了争用。


    本章及接下来的两章概述了性能模式（Performance Schema）中的锁与互斥量（mutex）监控、InnoDB 事务监控以及通用事务监控。本书的其余部分展示了如何使用这些监控资源来识别和调查争用的示例。特别是第
    13 至 18 章，在讨论案例研究时广泛使用了监控。


    在本章中，你将学习如何监控锁和互斥量。主要的资源是性能模式，将首先介绍它。接下来，讨论 `sys` 模式中的现成报告。本章的后半部分涵盖状态指标、InnoDB
    锁监控和 InnoDB 互斥量监控。


    **注意：** 如果你还不清楚各种锁和互斥量是什么，请不要担心。你将在后面通过使用本章讨论的监控源的示例中学习这些内容。

