    ## The Discussion


    The investigation will usually go through several steps. First, the errors logged
    by the application and the monitoring will be covered. Second, the lock metrics
    are discussed. Third, the metadata locks are covered, and finally the InnoDB lock
    contention is discussed.


    ### Errors and High-Level Monitoring


    The first thing you are likely to notice is that the application is experiencing
    errors; in this case they are lock wait timeouts. In a real-world case, you may
    not get the errors as directly as in this case study. If you do not handle the
    errors, you may see the application error out or even crash. It is important always
    to handle the errors and preferably log the errors, so you can keep track of the
    issues the application experiences, and log analyzers such as Splunk^([⁷](#fn7))
    can be used to analyze the frequency of the errors. Examples of the errors from
    this case study include


    ```sql

    mysql> UPDATE sakila.category SET name = IF(name = ''Travel'', ''Exploring'',
    ''Travel'') WHERE category_id = 16;

    ERROR: 1205: Lock wait timeout exceeded; try restarting transaction

    mysql> ALTER TABLE sakila.inventory FORCE;

    ERROR: 1205: Lock wait timeout exceeded; try restarting transaction

    ```


    You can also look at your monitoring which should include information about InnoDB
    lock waits similar to what is shown in Figure 17-1, that is, the number of InnoDB
    lock waits, the number of InnoDB lock wait timeouts, and the InnoDB lock time
    in milliseconds measured during the test.


    ![../images/502546_1_En_17_Chapter/502546_1_En_17_Fig1_HTML.jpg](images/502546_1_En_17_Chapter/502546_1_En_17_Fig1_HTML.jpg)

    *Figure 17-1: InnoDB lock wait metrics*


    The current waits are the direct measurements, whereas the lock timeouts and lock
    time are the difference compared to the previous measurement. The current waits
    and lock timeouts use the y-axis on the left and are represented by bars, whereas
    the lock time is shown in a line graph using the y-axis on the right. The x-axis
    is the time into the test. From the graphs you can see the locking issue is intermittent,
    and you can use it to determine when the issue happens. If you have a monitoring
    solution that allows you to see which queries are running during a given interval,
    you can use that to investigate the workload causing the lock waits. Examples
    of monitoring solutions that support this are MySQL Enterprise Monitor (also known
    as MEM)^([⁸](#fn8)), Solarwinds Database Performance Monitor (DPM, formerly VividCortex)^([⁹](#fn9)),
    and Percona Monitoring and Management (PMM).^([^(10)](#fn10))


    ### Lock Metrics


    The monitoring of the lock metrics makes it easy to spot periods with increased
    lock contention, and it is worth discussing the metrics some more. For InnoDB,
    it is straightforward to monitor the lock waits as just shown, but unfortunately,
    there are no metrics that can easily give the same kind of information for metadata
    locks. You can use the error statistics from the Performance Schema to track the
    number of lock wait timeouts and deadlocks:


    ```sql

    mysql> SELECT error_number, error_name, sum_error_raised

    FROM performance_schema.events_errors_summary_global_by_error

    WHERE error_name IN (''ER_LOCK_WAIT_TIMEOUT'', ''ER_LOCK_DEADLOCK'');

    +--------------+----------------------+------------------+

    | error_number | error_name           | sum_error_raised |

    +--------------+----------------------+------------------+

    |         1205 | ER_LOCK_WAIT_TIMEOUT |              310 |

    |         1213 | ER_LOCK_DEADLOCK     |               12 |

    +--------------+----------------------+------------------+

    ...

    mysql> SELECT error_number, error_name, sum_error_raised

    FROM performance_schema.events_errors_summary_global_by_error

    WHERE error_name IN (''ER_LOCK_WAIT_TIMEOUT'', ''ER_LOCK_DEADLOCK'');

    +--------------+----------------------+------------------+

    | error_number | error_name           | sum_error_raised |

    +--------------+----------------------+------------------+

    |         1205 | ER_LOCK_WAIT_TIMEOUT |              317 |

    |         1213 | ER_LOCK_DEADLOCK     |               12 |

    +--------------+----------------------+------------------+

    ```


    This shows that during this test, there were seven lock wait timeouts and no deadlocks.
    The problem with this information is that it does not tell you whether it is metadata
    locks, InnoDB locks , or some third lock type that experienced a lock wait timeout
    or deadlock. That said, since InnoDB has its own lock wait timeout and deadlock
    statistics, you can derive the numbers for non-InnoDB locks by subtracting the
    two statistics. The InnoDB lock statistics for the test are shown in Listing 17-2.


    ```sql

    mysql> SELECT Variable_name, Variable_value

    FROM sys.metrics

    WHERE Variable_name IN (

    ''innodb_row_lock_current_waits'',

    ''lock_row_lock_current_waits'',

    ''innodb_row_lock_time'',

    ''innodb_row_lock_waits'',

    ''lock_deadlocks'',

    ''lock_timeouts''

    );

    +-------------------------------+----------------+

    | Variable_name                 | Variable_value |

    +-------------------------------+----------------+

    | innodb_row_lock_current_waits | 0              |

    | innodb_row_lock_time          | 409555         |

    | innodb_row_lock_waits         | 384            |

    | lock_deadlocks                | 0              |

    | lock_row_lock_current_waits   | 0              |

    | lock_timeouts                 | 188            |

    +-------------------------------+----------------+

    ...

    mysql> SELECT Variable_name, Variable_value

    FROM sys.metrics

    WHERE Variable_name IN (

    ''innodb_row_lock_current_waits'',

    ''lock_row_lock_current_waits'',

    ''innodb_row_lock_time'',

    ''innodb_row_lock_waits'',

    ''lock_deadlocks'',

    ''lock_timeouts''

    )

    +-------------------------------+----------------+

    | Variable_name                 | Variable_value |

    +-------------------------------+----------------+

    | innodb_row_lock_current_waits | 1              |

    | innodb_row_lock_time          | 417383         |

    | innodb_row_lock_waits         | 392            |

    | lock_deadlocks                | 0              |

    | lock_row_lock_current_waits   | 1              |

    | lock_timeouts                 | 192            |

    +-------------------------------+----------------+

    ```

    *Listing 17-2: The InnoDB lock statistics for the test*


    Here you can see there were a total of four InnoDB lock wait timeouts (the `lock_timeouts`
    status counter) out of the total seven `ER_LOCK_WAIT_TIMEOUT` errors, so you can
    conclude there were three non-InnoDB lock wait timeouts. In this case study, these
    are all metadata lock wait timeouts.


    ### Metadata Lock Contention


    In practice it is best if you can catch the lock contention while it is ongoing
    as shown in the earlier case studies. In the output of this example, there are
    outputs from the `performance_schema.metadata_locks` table as well as the `schema_table_lock_waits`
    and `innodb_lock_waits` `sys` schema views. The `metadata_locks` table highlights
    the extent of the spread of metadata locks as it can be seen from Listing 17-3.'
