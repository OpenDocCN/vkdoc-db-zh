  trans: '

    ## InnoDB 监控器


    InnoDB 监控器犹如 InnoDB 信息的“瑞士军刀”，其中也包含事务相关信息。InnoDB 监控器输出中的 `TRANSACTIONS` 部分专用于展示事务信息。此信息不仅包含事务列表，还包括历史列表长度。清单
    3-4 展示了 InnoDB 监控器的一个摘录，其中包含了事务部分的示例，该示例截取自紧接在之前 `INNODB_TRX` 视图输出之后。


    ```

    -- Investigation #4

    Connection 3> SHOW ENGINE INNODB STATUS\G

    *************************** 1. row ***************************

    Type: InnoDB

    Name:

    Status:

    =====================================

    2020-06-27 17:46:36 0x5784 INNODB MONITOR OUTPUT

    =====================================

    Per second averages calculated from the last 20 seconds

    ...


    TRANSACTIONS


    Trx id counter 296814

    Purge done for trx''s n:o < 296813 undo n:o < 0 state: running but idle

    History list length 1

    LIST OF TRANSACTIONS FOR EACH SESSION:

    ---TRANSACTION 283598406541472, not started

    0 lock struct(s), heap size 1136, 0 row lock(s)

    ---TRANSACTION 283598406540640, not started

    0 lock struct(s), heap size 1136, 0 row lock(s)

    ---TRANSACTION 283598406539808, not started

    0 lock struct(s), heap size 1136, 0 row lock(s)

    ---TRANSACTION 283598406538976, not started

    0 lock struct(s), heap size 1136, 0 row lock(s)

    ---TRANSACTION 296813, ACTIVE 26 sec fetching rows

    mysql tables in use 1, locked 1

    15 lock struct(s), heap size 1136, 2333 row lock(s), undo log entries 1160

    MySQL thread id 53, OS thread handle 23748, query id 56574 localhost ::1 root
    User sleep

    UPDATE world.city SET Population = Population + MOD(ID, 2) + SLEEP(0.01)

    ...

    ```

    清单 3-4

    来自 InnoDB 监控器的事务信息


    `TRANSACTIONS` 部分的顶部显示了当前的事务 ID 计数器值，随后是关于哪些撤销日志（undo logs）已被清除的信息。它显示事务 ID 小于
    296813 的撤销日志已被清除。此清除操作越滞后，该部分第三行的历史列表长度值就越大。从 InnoDB 监控器输出中读取历史列表长度是获取历史列表长度的传统方法。在下一节中，将展示当用于监控目的时，如何以更好的方式获取该值。


    该部分的其余内容是一个事务列表。请注意，虽然输出生成时包含与在 `INNODB_TRX` 中发现的相同的两个活动事务，但事务列表只包含一个活动事务（即执行
    `UPDATE` 语句的那个事务）。在 MySQL 5.7 及更高版本中，只读、非锁定事务不包含在 InnoDB 监控器的事务列表中。因此，如果你需要包含所有活动事务，最好使用
    `INNODB_TRX` 视图。


    如前所述，有另一种方法可以获取历史列表长度。为此你需要使用 InnoDB 指标（metrics）。


    ## `INNODB_METRICS` 与 `sys.metrics`


    InnoDB 监控器报告对于数据库管理员了解 InnoDB 内部概况很有用，但对于监控而言，它不如其他方式方便，因为它需要进行解析才能提取出监控可用的数据。本章前面你已经看到如何从
    `information_schema.INNODB_TRX` 视图获取事务信息，但像历史列表长度这样的指标又该如何获取呢？


    InnoDB 指标系统包含多个显示在 `information_schema.INNODB_METRICS` 视图中的事务信息指标。这些指标都位于 `transaction`
    子系统中。清单 3-5 展示了事务指标的列表、它们是否默认启用，以及解释该指标测量内容的简要注释。


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               56         166          6

    -- Connection 1

    Connection 1> SELECT NAME, COUNT, STATUS, COMMENT

    FROM information_schema.INNODB_METRICS

    WHERE SUBSYSTEM = ''transaction''\G

    *************************** 1. row ***************************

    NAME: trx_rw_commits

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of read-write transactions  committed

    *************************** 2. row ***************************

    NAME: trx_ro_commits

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of read-only transactions committed

    *************************** 3. row ***************************

    NAME: trx_nl_ro_commits

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of non-locking auto-commit read-only transactions committed

    *************************** 4. row ***************************

    NAME: trx_commits_insert_update

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of transactions committed with inserts and updates

    *************************** 5. row ***************************

    NAME: trx_rollbacks

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of transactions rolled back

    *************************** 6. row ***************************

    NAME: trx_rollbacks_savepoint

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of transactions rolled back to savepoint

    *************************** 7. row ***************************

    NAME: trx_rollback_active

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of resurrected active transactions rolled back

    *************************** 8. row ***************************

    NAME: trx_active_transactions

    COUNT: 0

    STATUS: disabled

    COMMENT: Number of active transactions

    *************************** 9. row ***************************

    NAME: trx_on_log_no_waits

    COUNT: 0

