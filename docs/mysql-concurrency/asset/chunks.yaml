- fmt: 'The knowledge shared in this book has not materialized out of nothing. Thanks
    to Charles Bell for providing – as always – a thorough review with constructive
    feedback and suggestions for improvements. Jakub Lopuszanski has been helpful
    with details on InnoDB locking. I would also like to thank all my colleagues over
    the years as they have all been part of my journey learning how MySQL works through
    mentorship, teaching me, asking me good questions, and general discussions. A
    special thank you to Edwin Desouza and Frédéric Descamps (better known as Lefred)
    for their assistance.


    Last but not least, thanks to my wife Ann-Margrete for her patience and support
    while I wrote this book. Without you, it would not have been possible to write
    this book.


    About the Author About the Technical Reviewer


    # 1. Introduction


    Concurrency and locking are some of the most complex topics when it comes to databases.
    A query that usually executes fast and without problems may suddenly take much
    longer or fail with an error when the conditions are “just right,” so locking
    or contention becomes a problem. You may ask yourself why locks are around when
    they can cause such problems. This and the next 11 chapters will try to explain
    that as well as how you best deal with them. The last six chapters of the book
    go through six case studies putting the information together in realistic scenarios
    together with analysis and how to avoid or reduce the issue.


    In this chapter, you will first learn why locks are important despite the problems
    they can cause. Then the relationship with transactions will be explained. The
    rest of the chapter introduces how examples are used in this book as well as the
    `world`, `sakila`, and `employees` databases which are used throughout this book
    for the examples.


    ## Why Are Locks Needed?


    It can seem like a perfect world where locking in databases is not needed. The
    price will however be so high that only few use cases can use that database, and
    it is impossible to avoid locks for a general-purpose database such as MySQL.
    If you do not have locking, you cannot have any concurrency. Imagine that only
    one connection is ever allowed to the database (you can argue that it itself is
    a lock and thus the system is not lock-free anyway) – that is not very useful
    for most applications.


    Note


    Often what is called a lock in MySQL is really a lock request which can be in
    a granted or pending state.


    When you have several connections executing queries concurrently, you need some
    way to ensure that the connections do not step on each other’s toes. That is where
    locks enter the picture. You can think of locks in the same way as traffic signals
    in road traffic (Figure [1-1](#502546_1_En_1_Chapter.xhtml#Fig1)) that regulate
    access to the resources to avoid accidents. In a road intersection, it is necessary
    to ensure that two cars do not cross each other’s path and collide.


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig1_HTML.jpg](images/502546_1_En_1_Chapter/502546_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Locks in databases are similar to traffic lights


    In a database, it is necessary to ensure two queries’ access to the data does
    not conflict. As there are different levels of controlling the access to an intersection
    – yielding, stop signs, and traffic lights – there are different lock types in
    a database.


    ## Lock Levels


    Locks in MySQL come in several flavors acting at different levels in MySQL ranging
    from user-level locks to record locks. At the highest level are the user-level
    locks which can protect whole code paths in the application and any object inside
    the database. In the middle there are locks that operate on the database objects.
    These include metadata locks that protect the metadata of the tables as well as
    table locks that protect all data in the table. Common for the user-level and
    table-level locks is that they are implemented at the SQL layer of the database.
    The high-level locks are discussed in Chapter [6](#502546_1_En_6_Chapter.xhtml).


    At the lowest level are the locks implemented by the storage engines. By nature,
    these locks depend on the storage engine you use. As InnoDB is by far the most
    used storage engine in MySQL (and the default), this book covers the InnoDB-specific
    locks. InnoDB includes locks on the records, which are the easiest to understand,
    as well as more difficult concepts such as gap locks, next key locks, predicate
    locks, and insert intention locks. Additionally, there are mutexes and semaphores
    (this also happens at the level of the SQL layer). The InnoDB-specific locks and
    mutexes/semaphores are covered in Chapter [7](#502546_1_En_7_Chapter.xhtml).


    ## Locks and Transactions


    It can seem odd at first to combine the topics of locks and transactions into
    one book about concurrency. However, they are strongly related as you will see
    several examples of in this book. Some locks are held for the duration of a transaction,
    so it is important to understand how transactions work and how to monitor them.


    The concept of transaction isolation level also plays an important role when working
    with locks. The isolation level influences both which locks are taken and how
    long a time they are held.


    Chapters [3](#502546_1_En_3_Chapter.xhtml) and [4](#502546_1_En_4_Chapter.xhtml)
    cover how you can monitor transactions, and Chapters [11](#502546_1_En_11_Chapter.xhtml)
    and [12](#502546_1_En_12_Chapter.xhtml) cover how transactions work, their impact,
    and the transaction isolation levels.


    ## Examples


    Throughout the book there are examples that help illustrate the topic being discussed
    or set up a situation that you can investigate. Except for Chapters [17](#502546_1_En_17_Chapter.xhtml)
    and [18](#502546_1_En_18_Chapter.xhtml), all statements required to reproduce
    the test are listed. In general, you will need more than one connection for the
    examples, so the prompts for the queries have been set to indicate which connection
    to use for which queries when that is important. For example, `Connection 1>`
    means that the query should be executed by the first of your connections.


    All the examples in this book have been executed in MySQL Shell. For brevity the
    prompt in the examples is `mysql>` except when the connection is important or
    when the language mode is not SQL. The examples will however also work from the
    old `mysql` command-line client.


    Tip


    If you are unfamiliar with MySQL Shell, then it is a second-generation MySQL command-line
    client with support for both SQL, Python, and JavaScript. It also comes with several
    built-in utilities including tools for managing MySQL InnoDB Cluster and traditional
    replication topologies. For an introduction to MySQL Shell, see the user guide
    at [`https://dev.mysql.com/doc/mysql-shell/en/`](https://dev.mysql.com/doc/mysql-shell/en/)
    or the book *Introducing MySQL Shell* (Apress) by Charles Bell ([`www.apress.com/gp/book/9781484250822`](http://www.apress.com/gp/book/9781484250822)).


    Additionally, this book comes with a Python module – `concurrency_book.generate`
    – that can be imported into MySQL Shell and used to reproduce all but the simplest
    examples. The rest of this section describes how to use the MySQL Shell module.
    The content here is an excerpt of Appendix B which contains a longer reference
    for the module including how to implement your own examples.


    Note


    By nature, some of the data in the examples will be different for each execution.
    This is particularly the case for ids and memory addresses and similar. So, do
    not expect to get identical results for all details when you try to reproduce
    the examples.'
