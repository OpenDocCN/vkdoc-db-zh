    is not released until the rollback has completed. Fourth, there is very little
    space left in the buffer pool to cache data and indexes.


    The error is preceded by a warning in the error log saying that more than 67%
    of the buffer pool is used for locks or the adaptive hash index:


    ```

    2020-06-08T10:47:11.415127Z 10 [Warning] [MY-011958] [InnoDB] Over 67 percent
    of the buffer pool is occupied by lock heaps or the adaptive hash index! Check
    that your transactions do not set too many row locks. Your buffer pool size is
    7 MB. Maybe you should make the buffer pool bigger? Starting the InnoDB Monitor
    to print diagnostics, including lock heap and hash index sizes.

    ```


    The warning is followed by regular repeating outputs of the InnoDB monitor, so
    you can determine which transactions are the culprits.


    One lock type that is often neglected when it comes to transactions is the metadata
    lock. When a statement queries a table, a shared metadata lock is taken, and that
    metadata lock is held until the end of the transaction. While there is a metadata
    lock on a table, no connections can execute any DDL statements – including `OPTIMIZE
    TABLE` – against the table. If a DDL statement is blocked by a long-running transaction,
    it will in turn block all new queries from using that table. Chapter [14](#502546_1_En_14_Chapter.xhtml)
    will show an example of investigating such an issue.


    The locks are held while the transaction is active. The transaction can however
    still have an impact even after it has completed through the undo logs.


    ### Undo Logs


    The changes that have been made during the transaction must also be stored as
    they are required, if you choose to roll back the transaction. This is easy to
    understand. More surprising is that even a transaction that has made no changes
    also can make undo information from other transactions stay around. This happens
    when the transaction requires a read view (a consistent snapshot), which is the
    case for the duration of the transaction when using the `REPEATABLE READ` transaction
    isolation level. The read view means that the transaction will return the row
    data that corresponds to the time when the transaction was started no matter whether
    other transactions change the data. In order to be able to deliver that, it is
    necessary to keep the old values of the rows that change during the lifetime of
    the transaction. Long-running transactions with a read view are the most common
    reason for ending up with huge undo logs, which in MySQL 5.7 and earlier could
    mean the ibdata1 file ended up being large. (In MySQL 8, the undo logs are always
    stored in separate undo tablespaces that can be truncated.)


    Tip


    The `READ COMMITTED` transaction isolation level is much less prone to large undo
    logs as the read views are only maintained for the duration of a statement.


    The size of the active part of the undo log is measured in the history list length.
    The history list length is the number of transactions committed where the undo
    log has not yet been purged. This means that you cannot use the history list length
    to get a measure of the total amount of row changes. What it does tell you is
    how many units of old rows (one unit per transaction) there is in the linked list
    of changes that must be taken into consideration when you execute a query. The
    longer this linked list is, the more expensive it becomes to find the correct
    version of each row. In the end, if you have a large history list, it can severely
    impact the performance of all queries .


    Note


    The issue with the history list length is one of the biggest issues creating backups
    of large databases using logical backup tools such as `mysqlpump` and `mysqldump`
    using a single transaction to get a consistent backup. The backup can cause the
    history list length to become very large if there are many transactions committed
    during the backup.


    What constitutes a large history list length? There are no firm rules about that –
    just that the smaller, the better. Typically, performance issues start to show
    up when the list is some thousand to a million transactions long, but the point
    where it becomes a bottleneck depends on the transactions committed in the undo
    logs and the workload while the history list length is large.


    InnoDB automatically purges the history list in the background when the oldest
    parts are no longer needed. There are two options to control the purge as well
    as two to influence what happens, when the purge cannot be done. The options are


    *   **innodb_purge_batch_size:** The number of undo log pages that are purged
    per batch. The batch is divided among the purge threads. This option is not intended
    to be changed on production systems. The default is 300 with valid values between
    1 and 5000.


    *   **innodb_purge_threads:** The number of purge threads to use in parallel.
    A higher parallelism can be useful if the data changes span many tables. On the
    other hand, if all changes are concentrated on few tables, a low value is preferred.
    Changing the number of purge threads requires a restart of MySQL. The default
    is 4 with valid values between 1 and 32.


    *   **innodb_max_purge_lag:** When the history list length is longer than the
    value of `innodb_max_purge_lag`, a delay is added to operations changing data
    to reduce the rate the history list is growing at the expense of higher statement
    latencies. The default value is 0 which means that a delay will never be added.
    Valid values are 0–4294967295.'
  trans: '## 事务的影响


    如果您将事务视为用于分组查询的容器，它可能看起来是一个无害的概念。然而，重要的是要理解，由于事务为查询组提供了**原子性**，事务活动的时间越长，与之相关的查询所持有的资源时间就越长；事务中完成的工作越多，所需的资源也就越多。哪些资源会被查询使用并一直保持到事务提交？主要是锁和
    undo 日志。


    > **提示**

    >

    > InnoDB 支持只读事务，其开销低于读写事务。对于自动提交的单语句事务，InnoDB 会尝试自动判断该语句是否为只读。对于多语句事务，您可以在启动时明确指定其为只读事务：`START
    TRANSACTION READ ONLY;`


    ### 锁


    查询执行时会获取锁。当使用默认的事务隔离级别——`REPEATABLE READ`——时，所有锁都会一直保持到事务提交或回滚。当使用 `READ COMMITTED`
    事务隔离级别时，可能会释放一些锁，但至少涉及已更改记录的锁会被保留。锁本身是一种资源，而存储锁信息也需要内存。对于正常的工作负载，您可能不觉得这是个问题，但大型事务最终可能会消耗大量内存，导致事务因
    `ER_LOCK_TABLE_FULL` 错误而失败：


    ```

    ERROR: 1206: The total number of locks exceeds the lock table size

    ```


    从错误日志中记录的警告消息（稍后详述）可以看出，锁所需的内存是从缓冲池中获取的。因此，您持有的锁越多，保持的时间越长，可用于缓存数据和索引的内存就越少。


    > **注意**

    >

    > 因为耗尽了锁内存而导致事务中止是一个**四重打击**。首先，要更新足够多的行以触发该错误，需要花费相当长的时间，而这些工作被浪费了。其次，由于所需更改的数量，回滚事务可能需要非常长的时间。第三，在锁内存被占用期间，InnoDB
    实际上处于只读模式（某些小型事务可能仍可执行），并且锁内存直到回滚完成后才会释放。第四，缓冲池中几乎没有剩余空间来缓存数据和索引。


    在该错误发生之前，错误日志中会先记录一条警告，指出超过 67% 的缓冲池被用于锁或自适应哈希索引：


    ```

    2020-06-08T10:47:11.415127Z 10 [Warning] [MY-011958] [InnoDB] Over 67 percent
    of the buffer pool is occupied by lock heaps or the adaptive hash index! Check
    that your transactions do not set too many row locks. Your buffer pool size is
    7 MB. Maybe you should make the buffer pool bigger? Starting the InnoDB Monitor
    to print diagnostics, including lock heap and hash index size.

    ```


    警告之后会定期重复输出 InnoDB 监视器的信息，以便您确定哪些事务是罪魁祸首。


    在事务方面，一种常被忽视的锁类型是元数据锁。当一条语句查询某个表时，会获取一个共享的元数据锁，该锁会一直保持到事务结束。当表上存在元数据锁时，任何连接都无法对该表执行任何
    DDL 语句——包括 `OPTIMIZE TABLE`。如果 DDL 语句被长时间运行的事务阻塞，它反过来又会阻塞所有使用该表的新查询。第 14 章将展示一个调查此类问题的示例。


    锁在事务活动期间被持有。然而，事务即使完成之后，也可能通过 undo 日志继续产生影响。


    ### Undo 日志


    在事务期间进行的修改也必须存储起来，因为如果您选择回滚事务，就需要这些数据。这很容易理解。更令人惊讶的是，即使是一个未做任何修改的事务，也可能使其他事务的
    undo 信息持续存在。当事务需要一个读视图（一致性快照）时，就会发生这种情况，在使用 `REPEATABLE READ` 事务隔离级别时，事务的整个持续期间都会如此。读视图意味着，无论其他事务是否更改了数据，该事务都将返回事务启动时对应的行数据。为了能够实现这一点，有必要在事务生命周期内保留那些被修改行的旧值。带有读视图的长时间运行事务是最终产生巨大
    undo 日志的最常见原因，在 MySQL 5.7 及更早版本中，这可能导致 ibdata1 文件变得非常大。（在 MySQL 8 中，undo 日志始终存储在可截断的独立
    undo 表空间中。）


    > **提示**

    >

    > `READ COMMITTED` 事务隔离级别产生大型 undo 日志的可能性要小得多，因为读视图仅在语句执行期间维护。


    undo 日志的活动部分大小以 **历史列表长度** 来衡量。历史列表长度是指已提交但其 undo 日志尚未被清除的事务数量。这意味着您不能使用历史列表长度来衡量行更改的总量。它确实告诉您的是，在执行查询时必须考虑的、由待处理更改组成的链表中，有多少旧行单元（每个事务一个单元）。这个链表越长，查找每一行的正确版本就越昂贵。最终，如果您有一个很大的历史列表，它会严重降低所有查询的性能。


    > **注意**

    >

    > 历史列表长度问题是使用 `mysqlpump` 和 `mysqldump` 等逻辑备份工具、通过单个事务创建大型数据库一致性备份时面临的最大问题之一。如果备份期间有许多事务提交，备份操作会导致历史列表长度变得非常大。


    什么构成大的历史列表长度？没有硬性规定——只是越小越好。通常，当列表长度达到数千到百万个事务时，性能问题开始显现，但它何时成为瓶颈取决于 undo 日志中已提交的事务以及历史列表长度较大时的工作负载。


    当最旧的部分不再需要时，InnoDB 会在后台自动清除历史列表。有两个选项可以控制清除操作，另外还有两个选项可以影响当无法执行清除时会发生的情况。这些选项是：


    *   `innodb_purge_batch_size`：每批清除的 undo 日志页数。批次在清除线程之间分配。此选项不建议在生产系统上更改。默认值为
    300，有效值范围为 1 到 5000。

    *   `innodb_purge_threads`：用于并行执行的清除线程数。如果数据更改跨越多个表，较高的并行度可能有用。另一方面，如果所有更改都集中在少数几个表上，则较低的值更可取。更改清除线程数需要重启
    MySQL。默认值为 4，有效值范围为 1 到 32。

    *   `innodb_max_purge_lag`：当历史列表长度超过 `innodb_max_purge_lag` 的值时，会对更改数据的操作增加延迟，以降低历史列表的增长速度，代价是语句延迟增加。默认值为
    0，表示永远不会添加延迟。有效值范围为 0–4294967295。'
- fmt: '# InnoDB 配置与优化


    *   `innodb_max_purge_lag_delay`：当历史列表长度大于 `innodb_max_purge_lag` 时，可添加到 DML 查询的最大延迟。


    通常无需更改这些设置；然而，在特殊情况下，这可能很有用。如果清理线程无法跟上，您可以尝试根据被修改的表的数量来更改清理线程的数量；被修改的表越多，使用更多的清理线程就越有益。当您更改清理线程的数量时，重要的是在更改前从基线开始监控效果，以便观察更改是否带来改善。


    最大清理延迟选项可用于减慢修改数据的 DML 语句。当写入仅限于特定连接且延迟不会导致创建额外的写入线程以维持相同吞吐量时，这主要很有用。


    ## Group Commit


    请记住，为了使 InnoDB 的 ACID 中的 D（持久性）为真，您需要将 `innodb_flush_log_at_trx_commit` 和 `sync_binlog`
    设置保持在其默认值 1，以便事务所做的更改在提交时同步到磁盘。虽然这对于确保在崩溃情况下不会丢失已确认提交的更改非常有用，但确实会带来性能成本，因为磁盘的刷新性能常常会成为瓶颈。


    组提交特性通过稍微延迟提交并在此延迟期间将所有提交分组（因此得名）并同时将它们刷新到磁盘来减少这种性能影响。本质上，组提交牺牲了一点延迟以换取更高的吞吐量。在数据更改并发度高的系统中，当使用
    `sync_binlog = 1` 时，组提交可以显著提高性能。


    组提交特性由两个配置选项控制：


    *   `binlog_group_commit_sync_delay`：等待更多事务提交的延迟时间（毫秒）。允许值为 0–1000000，默认为 0。值越大，将一起提交的事务就越多，因此
    `fsync()` 调用就越少。


    *   `binlog_group_commit_sync_no_delay_count`：在完成组提交之前，组提交队列中允许的最大事务数。如果此选项设置为大于
    0 的值，则提交可能比 `binlog_group_commit_sync_delay` 设置的频率更频繁。值为 0 表示可以排队的提交数量无限制。允许值为
    0–1000000，默认为 0。


    如果您可以接受提交事务时的小延迟，建议增加 `binlog_group_commit_sync_delay` 以降低刷新频率。原则上，值越大，吞吐量越大，但您当然应该考虑您的工作负载可接受的最大提交延迟增加量。您可以使用
    `binlog_group_commit_sync_no_delay_count` 来避免每次组提交中的事务数量变得过大。


    如果您启用了复制，那么增加 `binlog_group_commit_sync_delay` 也可以对副本产生积极的性能影响，因为一起提交的事务越多，用于并行复制的
    `LOGICAL_CLOCK` 算法（`slave_parallel_type` 选项）就越有效。（如果您设置了 `binlog_transaction_dependency_tracking
    = WRITESET`，效果会较小，因为事务可以跨组提交进行并行化。）您必须在复制源端设置 `binlog_group_commit_sync_delay`
    才能提高副本上的并行复制性能。


    ## Summary


    事务是数据库中的一个重要概念。它们有助于确保您可以将多个行的更改作为一个单元应用，并且您可以选择是应用更改还是回滚它们。


    本章首先讨论了事务和 ACID 概念是什么。ACID 代表原子性、一致性、隔离性和持久性，事务直接参与确保前三个属性，并部分确保持久性。隔离性在并发上下文中很有趣，因为它确保您可以安全地并发执行多个事务。在
    MySQL 中，隔离是通过锁实现的。


    下一节讨论了了解事务使用方式的重要性。虽然事务本身可以被视为更改的容器，但锁会一直持有直到事务提交或回滚，并且它们可能阻止撤销日志被清理。即使查询不是在导致大量锁或大量撤销日志的事务中执行的，锁和大型撤销日志也会影响查询性能。锁使用内存，这些内存取自缓冲池，因此用于缓存数据和索引的可用内存更少。以历史列表长度衡量的大量撤销日志意味着当
    InnoDB 执行语句时必须考虑更多的行版本。


    最后，讨论了组提交的概念。当每次提交都将更改刷新到磁盘时，组提交特性可用于通过一次完成多个提交来减少 `fsync()` 调用的次数。组提交的一个副作用是它可以提高用于并行复制的
    `LOGICAL_CLOCK` 算法的性能。


    本章多次提到了事务隔离级别的概念。下一章将更详细地介绍四种支持的事务隔离级别如何工作以及每个级别如何影响锁。


    # 12. 事务隔离级别


    在上一章中，您了解到隔离是事务的一个重要属性。事实证明，回答两个事务是否隔离并不简单，因为答案取决于所需的隔离程度。隔离程度是通过事务隔离级别定义的。


    InnoDB 支持 SQL:1992 标准^([⁵](#fn5)) 定义的四种事务隔离级别，它们按隔离程度降序排列为：`SERIALIZABLE`、`REPEATABLE
    READ`、`READ COMMITTED` 和 `READ UNCOMMITTED`。可重复读事务隔离级别是默认级别。本章将介绍每种隔离级别，讨论它们的工作原理及其对锁的影响。


    为了比较在不同事务隔离级别下更新行时采取的锁，将使用一个更新斯洛伐克布拉迪斯拉发地区城市的示例。`world.city` 表中有三个斯洛伐克城市：


    ```sql

    mysql> SELECT ID, Name, District

    FROM world.city

    WHERE CountryCode = ''SVK'';

    +------+------------+--------------------+

    | ID   | Name       | District           |

    +------+------------+--------------------+

    | 3209 | Bratislava | Bratislava         |

    | 3210 | Košice     | Východné Slovensko |

    | 3211 | Prešov     | Východné Slovensko |

    +------+------------+--------------------+

    3 rows in set (0.0032 sec)

    ```


    `UPDATE` 语句可以使用 `CountryCode` 上的索引来将搜索范围缩小到三个城市，然后使用 `District` 上的非索引过滤器来找到匹配该地区的一个城市。这将有助于揭示
    `SERIALIZABLE`、`REPEATABLE READ` 和 `READ COMMITTED` 事务隔离级别的不同锁数量。对于 `SERIALIZABLE`
    和 `REPEATABLE READ`，还将使用 `SELECT` 语句进行额外测试。


    每个示例之后，您需要回滚事务以将数据库恢复到其原始状态：


    ```sql

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.3022 sec)

    ```


    说完这些，您就可以开始探索这四种事务隔离级别了。'
  raw: '*   **innodb_max_purge_lag_delay:** The maximum delay that can be added to
    DML queries when the history list length is larger than `innodb_max_purge_lag`.


    It is usually not necessary to change any of these settings; however, in special
    circumstances , it can be useful. If the purge threads cannot keep up, you can
    try to change the number of purge threads based on the number of tables that get
    modified; the more tables that are modified, the more purge threads are useful.
    When you change the number of purge threads, it is important to monitor the effect
    starting with a baseline before the change, so you can see whether the change
    makes an improvement.


    The maximum purge lag options can be used to slow down DML statements modifying
    data. It is mostly useful when writes are limited to specific connections and
    delays do not cause additional write threads to be created in order to maintain
    the same throughput.


    ## Group Commit


    Remember that for the D in ACID (durability) to be true for InnoDB, you need to
    keep the `innodb_flush_log_at_trx_commit` and `sync_binlog` settings at their
    default value of 1 so the changes made by a transaction are synced to disk as
    part of the commit. While this is great to ensure you do not lose changes that
    have been confirmed to be committed in case of a crash, it does come at a cost
    performance wise as often the flush performance of disks can become the bottleneck.


    The group commit feature exists to reduce this performance impact by slightly
    delaying the commits and group all the commits (thus the name) occurring during
    the delay and flush them to disk at the same time. Essentially, the group commit
    sacrifices a little latency for a higher throughput. In systems with a high concurrency
    of data changes, the group commit can greatly improve the performance when `sync_binlog
    = 1` is used.


    The group commit feature is controlled using two configuration options:


    *   **binlog_group_commit_sync_delay:** The delay in milliseconds for waiting
    for more transactions to commit. Allowed values are 0–1000000 with 0 being the
    default. The larger the value, the more transactions will be committed together
    and thus the fewer `fsync()` calls.


    *   **binlog_group_commit_sync_no_delay_count:** The maximum number of transactions
    to allow in the group commit queue before completing the group commit. If this
    option is set to a value larger than 0, the commits may occur more often than
    set by `binlog_group_commit_sync_delay`. A value of 0 means an unlimited number
    of commits may be queued. Allowed values are 0–1000000 with 0 being the default.


    If you can accept a small delay when committing your transactions, it is recommended
    to increase `binlog_group_commit_sync_delay` to reduce the flush rate. In principle,
    the larger the value, the larger the throughput, but you should of course take
    into consideration the maximum acceptable increase in commit latency for your
    workload. You can use the `binlog_group_commit_sync_no_delay_count` to avoid the
    number of transactions becoming too large in each group commit.


    If you have replication enabled, then increasing `binlog_group_commit_sync_delay`
    can also have a positive performance effect on the replicas as the more transactions
    that are committed together, the more effective the `LOGICAL_CLOCK` algorithm
    for parallel replication (the `slave_parallel_type` option) becomes. (If you have
    `binlog_transaction_dependency_tracking = WRITESET`, the effect is less as transactions
    can be parallelized across group commits.) You must set the `binlog_group_commit_sync_delay`
    on the replication source to improve the parallel replication performance on the
    replicas .


    ## Summary


    Transactions are an important concept in databases. They help ensure that you
    can apply changes to several rows as a unit and that you can choose whether to
    apply the changes or roll them back.


    This chapter started out discussing what transactions and the ACID concept are.
    ACID stands for atomicity, consistency, isolation, and durability, and transactions
    are directly involved in ensuring the first three of these properties and partly
    for durability. Isolation is in the context of concurrency interesting as it is
    what ensures that you can safely execute multiple transactions concurrently. In
    MySQL, isolation is implemented through locking.


    The next section discussed why it is important to be aware of how transactions
    are being used. While they as such can be considered a container for changes,
    locks are held until the transaction is committed or rolled back, and they can
    block the undo logs from being purged. Both locks and large undo logs can affect
    the performance of queries even if they are not executed in one of the transactions
    causing the high number of locks or large number of undo logs. Locks use memory,
    which is taken from the buffer pool, so there is less memory available for caching
    data and indexes. A large amount of undo logs as measured by the history list
    length means that more row versions must be considered when InnoDB executes statements.


    Finally, the concept of group commits was discussed. When flushing changes to
    disk at each commit, the group commit feature can be used to reduce the number
    of `fsync()` calls by completing several commits together. A nice side effect
    of group replication is that it can improve the performance of the `LOGICAL_CLOCK`
    algorithm for parallel replication.


    The concept of transaction isolation levels was mentioned a few times in this
    chapter. The next chapter goes into more detail how the four supported transaction
    isolation levels work and how each level affects locking.


    # 12. Transaction Isolation Levels


    In the previous chapter, you learned that isolation is an important property of
    transactions. As it turns out, it is not so straightforward to answer whether
    two transactions are isolated as the answer depends on what degree of isolation
    is required. The degree of isolation is defined through the transaction isolation
    levels.


    InnoDB supports the four transaction isolation levels defined by the SQL:1992
    standard^([⁵](#fn5)), and they are in descending degree of isolation: `SERIALIZABLE`,
    `REPEATABLE READ`, `READ COMMITTED`, and `READ UNCOMMITTED`. The repeatable read
    transaction isolation level is the default. This chapter goes through each of
    these isolation levels and discusses how they work and their impact on locking.


    To compare the locks taken when updating rows in the different transaction isolation
    levels, an example of updating the cities in the district Bratislava in Slovakia
    will be used. There are three cities in the `world.city` table for Slovakia:


    ```

    mysql> SELECT ID, Name, District

    FROM world.city

    WHERE CountryCode = ''SVK'';

    +------+------------+--------------------+

    | ID   | Name       | District           |

    +------+------------+--------------------+

    | 3209 | Bratislava | Bratislava         |

    | 3210 | Košice     | Východné Slovensko |

    | 3211 | Prešov     | Východné Slovensko |

    +------+------------+--------------------+

    3 rows in set (0.0032 sec)

    ```


    The `UPDATE` statement can use the index on `CountryCode` to narrow down the search
    to the three cities and then use a non-indexed filter on `District` to find the
    one city matching the district. This will help expose the different amounts of
    locks for the `SERIALIZABLE`, `REPEATABLE READ`, and `READ COMMITTED` transaction
    isolation levels. For `SERIALIZABLE` and `REPEATBLE READ`, additionally, a test
    using a `SELECT` statement will be used.


    After each of the examples, you need to roll back the transaction to return the
    database to its original state:


    ```

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.3022 sec)

    ```


    With that said, you are ready to explore the four transaction isolation levels.'
  trans: '# InnoDB 配置与优化


    *   `innodb_max_purge_lag_delay`：当历史列表长度大于 `innodb_max_purge_lag` 时，可添加到 DML 查询的最大延迟。


    通常无需更改这些设置；然而，在特殊情况下，这可能很有用。如果清理线程无法跟上，您可以尝试根据被修改的表的数量来更改清理线程的数量；被修改的表越多，使用更多的清理线程就越有益。当您更改清理线程的数量时，重要的是在更改前从基线开始监控效果，以便观察更改是否带来改善。


    最大清理延迟选项可用于减慢修改数据的 DML 语句。当写入仅限于特定连接且延迟不会导致创建额外的写入线程以维持相同吞吐量时，这主要很有用。


    ## 组提交


    请记住，为了使 InnoDB 的 **ACID** 中的 **D**（持久性）为真，您需要将 `innodb_flush_log_at_trx_commit`
    和 `sync_binlog` 设置保持在其默认值 1，以便事务所做的更改在提交时同步到磁盘。虽然这对于确保在崩溃情况下不会丢失已确认提交的更改非常有用，但确实会带来性能成本，因为磁盘的刷新性能常常会成为瓶颈。


    组提交特性通过稍微延迟提交并在此延迟期间将所有提交分组（因此得名）并同时将它们刷新到磁盘来减少这种性能影响。本质上，组提交牺牲了一点延迟以换取更高的吞吐量。在数据更改并发度高的系统中，当使用
    `sync_binlog = 1` 时，组提交可以显著提高性能。


    组提交特性由两个配置选项控制：


    *   `binlog_group_commit_sync_delay`：等待更多事务提交的延迟时间（毫秒）。允许值为 0–1000000，默认为 0。值越大，将一起提交的事务就越多，因此
    `fsync()` 调用就越少。


    *   `binlog_group_commit_sync_no_delay_count`：在完成组提交之前，组提交队列中允许的最大事务数。如果此选项设置为大于
    0 的值，则提交可能比 `binlog_group_commit_sync_delay` 设置的频率更频繁。值为 0 表示可以排队的提交数量无限制。允许值为
    0–1000000，默认为 0。


    如果您可以接受提交事务时的小延迟，建议增加 `binlog_group_commit_sync_delay` 以降低刷新频率。原则上，值越大，吞吐量越大，但您当然应该考虑您的工作负载可接受的最大提交延迟增加量。您可以使用
    `binlog_group_commit_sync_no_delay_count` 来避免每次组提交中的事务数量变得过大。


    如果您启用了复制，那么增加 `binlog_group_commit_sync_delay` 也可以对副本产生积极的性能影响，因为一起提交的事务越多，用于并行复制的
    `LOGICAL_CLOCK` 算法（`slave_parallel_type` 选项）就越有效。（如果您设置了 `binlog_transaction_dependency_tracking
    = WRITESET`，效果会较小，因为事务可以跨组提交进行并行化。）您必须在复制源端设置 `binlog_group_commit_sync_delay`
    才能提高副本上的并行复制性能。


    ## 总结


    事务是数据库中的一个重要概念。它们有助于确保您可以将多个行的更改作为一个单元应用，并且您可以选择是应用更改还是回滚它们。


    本章首先讨论了事务和 **ACID** 概念是什么。**ACID** 代表原子性、一致性、隔离性和持久性，事务直接参与确保前三个属性，并部分确保持久性。隔离性在并发上下文中很有趣，因为它确保您可以安全地并发执行多个事务。在
    MySQL 中，隔离是通过锁实现的。


    下一节讨论了了解事务使用方式的重要性。虽然事务本身可以被视为更改的容器，但锁会一直持有直到事务提交或回滚，并且它们可能阻止撤销日志被清理。即使查询不是在导致大量锁或大量撤销日志的事务中执行的，锁和大型撤销日志也会影响查询性能。锁使用内存，这些内存取自缓冲池，因此用于缓存数据和索引的可用内存更少。以历史列表长度衡量的大量撤销日志意味着当
    InnoDB 执行语句时必须考虑更多的行版本。


    最后，讨论了组提交的概念。当每次提交都将更改刷新到磁盘时，组提交特性可用于通过一次完成多个提交来减少 `fsync()` 调用的次数。组提交的一个副作用是它可以提高用于并行复制的
    `LOGICAL_CLOCK` 算法的性能。


    本章多次提到了事务隔离级别的概念。下一章将更详细地介绍四种支持的事务隔离级别如何工作以及每个级别如何影响锁。


    # 12. 事务隔离级别


    在上一章中，您了解到隔离是事务的一个重要属性。事实证明，回答两个事务是否隔离并不简单，因为答案取决于所需的隔离程度。隔离程度是通过事务隔离级别定义的。


    InnoDB 支持 SQL:1992 标准^(⁵) 定义的四种事务隔离级别，它们按隔离程度降序排列为：`SERIALIZABLE`、`REPEATABLE
    READ`、`READ COMMITTED` 和 `READ UNCOMMITTED`。可重复读事务隔离级别是默认级别。本章将介绍每种隔离级别，讨论它们的工作原理及其对锁的影响。


    为了比较在不同事务隔离级别下更新行时采取的锁，将使用一个更新斯洛伐克布拉迪斯拉发地区城市的示例。`world.city` 表中有三个斯洛伐克城市：


    ```sql

    mysql> SELECT ID, Name, District

    FROM world.city

    WHERE CountryCode = ''SVK'';

    +------+------------+--------------------+

    | ID   | Name       | District           |

    +------+------------+--------------------+

    | 3209 | Bratislava | Bratislava         |

    | 3210 | Košice     | Východné Slovensko |

    | 3211 | Prešov     | Východné Slovensko |

    +------+------------+--------------------+

    3 rows in set (0.0032 sec)

    ```


    `UPDATE` 语句可以使用 `CountryCode` 上的索引来将搜索范围缩小到三个城市，然后使用 `District` 上的非索引过滤器来找到匹配该地区的一个城市。这将有助于揭示
    `SERIALIZABLE`、`REPEATABLE READ` 和 `READ COMMITTED` 事务隔离级别的不同锁数量。对于 `SERIALIZABLE`
    和 `REPEATABLE READ`，还将使用 `SELECT` 语句进行额外测试。


    每个示例之后，您需要回滚事务以将数据库恢复到其原始状态：


    ```sql

    -- 连接 1

    连接 1> ROLLBACK;

    Query OK, 0 rows affected (0.3022 sec)

    ```


    说完这些，您就可以开始探索这四种事务隔离级别了。'
- fmt: '## Serializable


    ### 锁机制概述

    `SERIALIZABLE` 隔离级别是最严格的。除了启用 `autocommit` 且未显式启动事务的 `SELECT` 语句外，所有语句都会加锁。对于
    `SELECT` 语句，这等同于添加了 `FOR SHARE`。这确保了事务的所有方面都是可重复的，但也意味着它是加锁最多的事务隔离级别。清单 [12-1](#502546_1_En_12_Chapter.xhtml#PC3)
    展示了 `SELECT` 语句所获取锁的示例。


    #### SELECT 语句示例

    ```sql

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              967        1560          6

    --          2              968        1561          6

    -- Connection 1

    Connection 1> SET transaction_isolation = ''SERIALIZABLE'';

    Query OK, 0 rows affected (0.0007 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT ID, Name, Population

    FROM world.city

    WHERE CountryCode = ''SVK''

    AND District = ''Bratislava'';

    +------+------------+------------+

    | ID   | Name       | Population |

    +------+------------+------------+

    | 3209 | Bratislava |     448292 |

    +------+------------+------------+

    1 row in set (0.0006 sec)

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1560

    ORDER BY index_name, lock_data DESC;

    +-------------+-----------+---------------+-------------+

    | index_name  | lock_type | lock_mode     | lock_data   |

    +-------------+-----------+---------------+-------------+

    | CountryCode | RECORD    | S,GAP         | ''SVN'', 3212 |

    | CountryCode | RECORD    | S             | ''SVK'', 3211 |

    | CountryCode | RECORD    | S             | ''SVK'', 3210 |

    | CountryCode | RECORD    | S             | ''SVK'', 3209 |

    | PRIMARY     | RECORD    | S,REC_NOT_GAP | 3211        |

    | PRIMARY     | RECORD    | S,REC_NOT_GAP | 3210        |

    | PRIMARY     | RECORD    | S,REC_NOT_GAP | 3209        |

    +-------------+-----------+---------------+-------------+

    7 rows in set (0.0009 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0003 sec)

    Listing 12-1

    Read locking in the SERIALIZABLE transaction isolation level

    ```


    该查询使用了二级索引，最终锁定了所有被读取记录的`CountryCode`索引和主键。此外，在最后一个斯洛伐克索引记录之后还存在一个间隙锁。所有的锁都是共享锁。


    #### UPDATE 语句示例

    清单 [12-2](#502546_1_En_12_Chapter.xhtml#PC4) 展示了更新部分检查行的 `UPDATE` 语句的情况。


    ```sql

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              971        1567          6

    --          2              972        1568          6

    -- Connection 1

    Connection 1> SET SESSION TRANSACTION ISOLATION LEVEL SERIALIZABLE;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE CountryCode = ''SVK''

    AND District = ''Bratislava'';

    Query OK, 1 row affected (0.0006 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1567

    ORDER BY index_name, lock_data DESC;

    +-------------+-----------+---------------+-------------+

    | index_name  | lock_type | lock_mode     | lock_data   |

    +-------------+-----------+---------------+-------------+

    | CountryCode | RECORD    | X,GAP         | ''SVN'', 3212 |

    | CountryCode | RECORD    | X             | ''SVK'', 3211 |

    | CountryCode | RECORD    | X             | ''SVK'', 3210 |

    | CountryCode | RECORD    | X             | ''SVK'', 3209 |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3211        |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3210        |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3209        |

    +-------------+-----------+---------------+-------------+

    7 rows in set (0.0007 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0576 sec)

    Listing 12-2

    Locking in the SERIALIZABLE transaction isolation level

    ```


    该语句仅更新了一个城市（`ID = 3209`），但持有了所有三个斯洛伐克城市在主键和 `CountryCode` 索引上的锁，以及最后一个索引记录之后的间隙锁。


    ### SET TRANSACTION 语句

    请注意，此处使用 `SET TRANSACTION` 语句来设置事务隔离级别，而不是设置 `transaction_isolation` 变量。这两种方法可以互换，但
    `SET SESION TRANSACTION` 还支持设置事务是只读还是读写。如果使用不带 `GLOBAL` 或 `SESSION` 作用域的 `SET
    TRANSACTION` 语句，则它仅应用于下一个事务。


    ### 使用场景与总结

    这种事务隔离级别不常用，但在调查锁问题或使用 XA 事务时可能很有用。除了 `SELECT` 语句会加锁这一点，该隔离级别与接下来讨论的 `REPEATABLE
    READ` 相同。'
  raw: '## Serializable


    The `SERIALIZABLE` isolation level is the strictest available. Except for `SELECT`
    statements with `autocommit` enabled (and no explicit transaction has been started),
    all statements take locks. For `SELECT` statements that is equivalent to adding
    `FOR SHARE`. This ensures that all aspects of the transaction is repeatable but
    also means that it is the transaction isolation level that takes most locks. Listing
    [12-1](#502546_1_En_12_Chapter.xhtml#PC3) shows an example of the locks taken
    by a `SELECT` statement.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              967        1560          6

    --          2              968        1561          6

    -- Connection 1

    Connection 1> SET transaction_isolation = ''SERIALIZABLE'';

    Query OK, 0 rows affected (0.0007 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT ID, Name, Population

    FROM world.city

    WHERE CountryCode = ''SVK''

    AND District = ''Bratislava'';

    +------+------------+------------+

    | ID   | Name       | Population |

    +------+------------+------------+

    | 3209 | Bratislava |     448292 |

    +------+------------+------------+

    1 row in set (0.0006 sec)

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1560

    ORDER BY index_name, lock_data DESC;

    +-------------+-----------+---------------+-------------+

    | index_name  | lock_type | lock_mode     | lock_data   |

    +-------------+-----------+---------------+-------------+

    | CountryCode | RECORD    | S,GAP         | ''SVN'', 3212 |

    | CountryCode | RECORD    | S             | ''SVK'', 3211 |

    | CountryCode | RECORD    | S             | ''SVK'', 3210 |

    | CountryCode | RECORD    | S             | ''SVK'', 3209 |

    | PRIMARY     | RECORD    | S,REC_NOT_GAP | 3211        |

    | PRIMARY     | RECORD    | S,REC_NOT_GAP | 3210        |

    | PRIMARY     | RECORD    | S,REC_NOT_GAP | 3209        |

    +-------------+-----------+---------------+-------------+

    7 rows in set (0.0009 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0003 sec)

    Listing 12-1

    Read locking in the SERIALIZABLE transaction isolation level

    ```


    The query uses a secondary index and ends up locking the primary key and `CountryCode`
    records of all records that are read. Additionally, there is a gap lock after
    the last index record for Slovakia. All the locks are shared locks.


    Listing [12-2](#502546_1_En_12_Chapter.xhtml#PC4) instead considers an `UPDATE`
    statement that updates a subset of the rows that are examined.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              971        1567          6

    --          2              972        1568          6

    -- Connection 1

    Connection 1> SET SESSION TRANSACTION ISOLATION LEVEL SERIALIZABLE;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE CountryCode = ''SVK''

    AND District = ''Bratislava'';

    Query OK, 1 row affected (0.0006 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1567

    ORDER BY index_name, lock_data DESC;

    +-------------+-----------+---------------+-------------+

    | index_name  | lock_type | lock_mode     | lock_data   |

    +-------------+-----------+---------------+-------------+

    | CountryCode | RECORD    | X,GAP         | ''SVN'', 3212 |

    | CountryCode | RECORD    | X             | ''SVK'', 3211 |

    | CountryCode | RECORD    | X             | ''SVK'', 3210 |

    | CountryCode | RECORD    | X             | ''SVK'', 3209 |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3211        |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3210        |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3209        |

    +-------------+-----------+---------------+-------------+

    7 rows in set (0.0007 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0576 sec)

    Listing 12-2

    Locking in the SERIALIZABLE transaction isolation level

    ```


    The statement updates a single city (with `ID = 3209`) but holds locks on all
    three Slovakian cities both on the primary key and the `CountryCode` index as
    well as a gap lock after the last index record.


    Notice also how the `SET TRANSACTION` statement is used here to set the transaction
    isolation level instead of setting the `transaction_isolation` variable. The two
    methods are interchangeable though `SET SESION TRANSACTION` also supports setting
    whether it is a read-only or read-write transaction. If you use the `SET TRANSACTION`
    statement without neither the `GLOBAL` nor `SESSION` scope, then it only applies
    to the next transaction.


    This transaction isolation level is not used very often, but it can be useful
    when investigating locking problems or when working with XA transactions. Other
    than `SELECT` statements taking locks, the isolation level is the same as `REPEATABLE
    READ` which is discussed next .'
  trans: '

    ## 可序列化


    ### 锁机制概述

    `SERIALIZABLE` 隔离级别是最严格的。除了启用 `autocommit` 且未显式启动事务的 `SELECT` 语句外，所有语句都会加锁。对于
    `SELECT` 语句，这等同于添加了 `FOR SHARE`。这确保了事务的所有方面都是可重复的，但也意味着它是加锁最多的事务隔离级别。清单 12-1 展示了
    `SELECT` 语句所获取锁的示例。


    #### SELECT 语句示例

    ```sql

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              967        1560          6

    --          2              968        1561          6

    -- Connection 1

    Connection 1> SET transaction_isolation = ''SERIALIZABLE'';

    Query OK, 0 rows affected (0.0007 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT ID, Name, Population

    FROM world.city

    WHERE CountryCode = ''SVK''

    AND District = ''Bratislava'';

    +------+------------+------------+

    | ID   | Name       | Population |

    +------+------------+------------+

    | 3209 | Bratislava |     448292 |

    +------+------------+------------+

    1 row in set (0.0006 sec)

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1560

    ORDER BY index_name, lock_data DESC;

    +-------------+-----------+---------------+-------------+

    | index_name  | lock_type | lock_mode     | lock_data   |

    +-------------+-----------+---------------+-------------+

    | CountryCode | RECORD    | S,GAP         | ''SVN'', 3212 |

    | CountryCode | RECORD    | S             | ''SVK'', 3211 |

    | CountryCode | RECORD    | S             | ''SVK'', 3210 |

    | CountryCode | RECORD    | S             | ''SVK'', 3209 |

    | PRIMARY     | RECORD    | S,REC_NOT_GAP | 3211        |

    | PRIMARY     | RECORD    | S,REC_NOT_GAP | 3210        |

    | PRIMARY     | RECORD    | S,REC_NOT_GAP | 3209        |

    +-------------+-----------+---------------+-------------+

    7 rows in set (0.0009 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0003 sec)

    Listing 12-1

    在可序列化事务隔离级别下的读锁

    ```


    该查询使用了二级索引，最终锁定了所有被读取记录的`CountryCode`索引和主键。此外，在最后一个斯洛伐克索引记录之后还存在一个间隙锁。所有的锁都是共享锁。


    #### UPDATE 语句示例

    清单 12-2 展示了更新部分检查行的 `UPDATE` 语句的情况。


    ```sql

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              971        1567          6

    --          2              972        1568          6

    -- Connection 1

    Connection 1> SET SESSION TRANSACTION ISOLATION LEVEL SERIALIZABLE;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE CountryCode = ''SVK''

    AND District = ''Bratislava'';

    Query OK, 1 row affected (0.0006 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1567

    ORDER BY index_name, lock_data DESC;

    +-------------+-----------+---------------+-------------+

    | index_name  | lock_type | lock_mode     | lock_data   |

    +-------------+-----------+---------------+-------------+

    | CountryCode | RECORD    | X,GAP         | ''SVN'', 3212 |

    | CountryCode | RECORD    | X             | ''SVK'', 3211 |

    | CountryCode | RECORD    | X             | ''SVK'', 3210 |

    | CountryCode | RECORD    | X             | ''SVK'', 3209 |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3211        |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3210        |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3209        |

    +-------------+-----------+---------------+-------------+

    7 rows in set (0.0007 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0576 sec)

    Listing 12-2

    在可序列化事务隔离级别下的锁

    ```


    该语句仅更新了一个城市（`ID = 3209`），但持有了所有三个斯洛伐克城市在主键和 `CountryCode` 索引上的锁，以及最后一个索引记录之后的间隙锁。


    ### SET TRANSACTION 语句

    请注意，此处使用 `SET TRANSACTION` 语句来设置事务隔离级别，而不是设置 `transaction_isolation` 变量。这两种方法可以互换，但
    `SET SESION TRANSACTION` 还支持设置事务是只读还是读写。如果使用不带 `GLOBAL` 或 `SESSION` 作用域的 `SET
    TRANSACTION` 语句，则它仅应用于下一个事务。


    ### 使用场景与总结

    这种事务隔离级别不常用，但在调查锁问题或使用 XA 事务时可能很有用。除了 `SELECT` 语句会加锁这一点，该隔离级别与接下来讨论的 `REPEATABLE
    READ` 相同。

