  trans: '

    ### 资源分区


    互斥锁和信号量争用源于多个线程并发使用同一资源。一个简单但有效的减少争用的方法是将单一资源拆分成多个部分，这正是 InnoDB 缓冲池、InnoDB 自适应哈希索引和表缓存所采用的方式。表
    9-1 展示了控制资源拆分为多少个实例的配置选项。


    **表 9-1** 控制资源实例数量的配置选项


    | 选项 | 默认值 | 描述 |

    | --- | --- | --- |

    | `innodb_adaptive_hash_index_parts` | 8 | 自适应哈希索引的分区数量。分区基于索引进行。 |

    | `innodb_buffer_pool_instances` | 1 或 8 | 缓冲池被拆分成的部分数量。如果缓冲池总大小小于 1 GiB，则默认为
    1，否则为 8（32 位 Windows 系统除外）。 |

    | `table_open_cache_instances` | 16 | 表缓存的部分数量。 |


    **注意** 对于以上三个选项，更改其值需要重启 MySQL。


    对于 InnoDB 缓冲池，默认实例数量取决于平台和缓冲池大小。如果总大小小于 1 GiB，默认值为 1，否则为 8。对于 32 位 Windows 系统，大小低于
    1.3 GiB 时默认为 1；否则，每个实例大小将被设为 128 MiB。最大实例数量为 64。


    **注意** 您可能也听说过 `metadata_locks_hash_instances` 选项。此选项在 MySQL 5.7 中已被弃用，并在 MySQL
    8.0.13 中移除。原因是元数据锁的实现发生了变化，使得该选项不再必要。


    如果资源的多个分区有助于减少争用，那么增加分区数量看似不假思索的选择。然而，事情并非如此简单，因为更多的分区也会引入开销。因此，需要在开销增加与资源锁争用减少之间取得平衡。在一个极端情况下——数据库从未执行超过单个并发查询——通常为每个资源仅使用一个分区更好。之所以说“通常”，是因为对于大型表缓存，多个分区在需要将表从缓存中淘汰时，有助于提高最近最少使用（LRU）算法的效率。


    一般来说，分区数量不应超过 CPU 核心数量。话虽如此，默认值是一个很好的起点，最终，您需要根据您的系统和工作负载组合进行测试，以验证最佳设置。对于自适应哈希索引，您甚至可能需要完全禁用它。


    ### 禁用 InnoDB 自适应哈希索引


    自适应哈希索引功能在 InnoDB 内部自动工作。如果 InnoDB 检测到您频繁使用二级索引，并且自适应哈希索引已启用，它将动态为最常用的值构建哈希索引。该哈希索引完全存储在缓冲池中，因此在重启
    MySQL 时不会持久化。如果 InnoDB 检测到内存可以更好地用于将更多页面加载到缓冲池，它会丢弃部分哈希索引。这就是所谓的“自适应”索引的含义：InnoDB
    会尝试调整它，使其对您的查询达到最优。


    理论上，自适应哈希索引是一个双赢的局面。您无需考虑需要为哪些列添加哈希索引即可获得其优势，且内存使用全部自动处理。然而，启用它会带来开销，并非所有工作负载都能从中受益。事实上，对于某些工作负载，开销可能变得非常大，以至于导致严重的性能问题，在这些情况下，更改哈希分区数量也无济于事。


    工作数据集中无法放入缓冲池的部分越大、二级索引的变更越频繁、以及二级索引用于过滤的频率越低，您就越可能从禁用自适应哈希索引中受益。自适应哈希索引成为问题的案例，通常表现为
    `btr0sea.cc` 文件中互斥锁和读写锁信号量的等待次数高企，该文件是实现自适应哈希索引搜索的地方。


    如果您遇到自适应哈希索引成为瓶颈的情况，可以使用 `innodb_adaptive_hash_index` 选项启用或禁用该功能。请注意，虽然您可以动态启用和禁用此功能，但禁用自适应哈希索引会从缓冲池中驱逐所有哈希索引，并且重新启用索引后需要一段预热期。因此，在复制环境中，值得先在单个副本上禁用自适应哈希索引，并监控您的应用程序是否从中受益，然后再在系统范围内禁用。如果您需要在读写副本上重新启用自适应哈希索引，考虑故障转移到另一个仍启用此功能的副本，这样在重新启用的副本经历预热期时，应用程序受到的影响较小。


    **提示** 如果您想禁用自适应哈希索引，请先在单个副本上操作，这样如果之后需要重新启用该功能，可以避免所有副本都经历预热期。


    最后一个将要讨论的配置选项允许您降低元数据写锁的优先级。


    ### 降低元数据写锁的优先级


    默认情况下，如果一个表有两个元数据锁请求，一个是读请求，另一个是写请求，那么写请求会被赋予优先级。这通常没问题，因为写入比读取更具侵入性，因此在大多数情况下，最好给予写入优先权，以便它们能尽快完成。


    然而，在涉及外键的情况下，这种方法可能会出现问题。当您对具有外键的表执行 DDL 时，该语句会请求对父表获取共享元数据锁。如果您有持续持有父表写锁的事务，即使从未使用子表，子表上的
    DDL 语句也永远无法进行。因此，您需要某种方式让 MySQL 停止，并允许读元数据锁请求先行。


    您可以通过 `max_write_lock_count` 选项来实现，该选项接受一个介于 1 和系统支持的最大整数值之间的数值。默认值是支持的最大值。每次授予
    `max_write_lock_count` 个锁后，MySQL 将赋予一些读锁优先权。这有助于确保读锁请求不会被饿死。


    更改 `max_write_lock_count` 的值时需要小心，因为值设得太低可能导致持有写锁（记住它们是排他锁）的事务完成时间过长。在写事务未完成期间，它们持有的锁会阻止其他事务进行。由于您可以动态更改
    `max_write_lock_count`，请密切监控系统，并准备好如果副作用比问题本身更严重时，撤销更改。


    ### 抢占式锁定


    最后将讨论的策略是抢占式锁定。如果您有一个执行多个查询的复杂事务，在某些情况下，执行 `SELECT ... FOR UPDATE` 或 `SELECT ...
    FOR SHARE` 查询以获取您知道在事务后期需要的记录上的锁，可能是有利的。另一个有用的场景是确保不同任务以相同的顺序访问行。


    抢占式锁定在减少死锁频率方面特别有效。一个缺点是您最终会持有锁更长时间。总体而言，抢占式锁定是一种应谨慎使用的策略，但在合适的场景下使用，它可以有效地防止死锁。

    '
- fmt: '## Summary


    This chapter has looked into strategies to reduce the impact of locks with the
    strategies ranging from reducing the number of locks and for how long they are
    held to change the configuration to reduce the impact of locking.


    Most importantly, you should not hold more locks than necessary and not hold them
    for longer than required. Reducing the size of your transactions and the time
    it takes to complete the transaction are two of the most powerful ways to reduce
    lock contention. Furthermore, by choosing indexes appropriately, you can reduce
    the number of locks required by a given statement. Similarly, the transaction
    isolation level impacts the number of locks and duration of them with the `READ
    COMMITTED` transaction isolation level being a common choice to reduce the lock
    impact.


    With respect to deadlocks, then it is important to access records in the same
    order as much as possible throughout your application. One option to ensure this
    is preemptive locking, though that should be used sparingly as it increases the
    duration the locks are held.


    Finally, change the configuration to reduce the impact of locks. If you have mutex
    contention on the buffer pool, adaptive hash index, or the table open cache, you
    can partition the resource, or for the adaptive hash index, you can disable the
    feature altogether. For DDL statements requesting metadata read locks due to foreign
    keys, it can also be useful to limit the number of write locks that will be granted
    before a read lock is given priority.


    This chapter has touched on the impact of indexes and foreign keys on locking.
    The next chapter will go into more detail on those topics.


    Footnotes [1](#502546_1_En_9_Chapter.xhtml#Fn1_source)


    # 10. Indexes and Foreign Keys


    In the previous chapter, you learned how indexes and foreign keys can influence
    locking. This is a topic that is worth diving further into as it is important
    to understand the effects.


    The first part of this chapter investigates how primary, secondary, ascending,
    descending, and unique indexes affect locking. The second part covers foreign
    keys and how they affect locking for DML and DDL statements.


    ## Indexes


    In short indexes provide a shortcut to access a given record, so that the number
    of records examined is reduced. This has a positive effect on the number of locks
    as only rows accessed are subject to locking. This was what you saw in the previous
    chapter when an index was added to the `Name` column of the `world.city` table
    for a query that filtered on the `Name` column. Indexes become particularly important
    when you join tables as without indexes, the number of accessed rows is the product
    of the number of rows in the joined tables.


    Note


    You may consider indexes less important with the support for hash joins in MySQL
    8. While this is to some degree true for non-locking statement, it is much less
    the case for statements taking locks as excessive locking can cause lock waits
    and deadlocks. As discussed in Chapter [11](#502546_1_En_11_Chapter.xhtml), locks
    also consume memory in the buffer pool, so more locks mean less memory for caching
    data. Similarly, reducing the number of rows accessed also reduces the turnover
    of pages in the buffer pool which improves buffer pool hit rate.


    This section first discusses the use of primary versus secondary indexes, then
    ascending versus descending indexes, and finally unique indexes.


    ### Primary vs. Secondary Indexes


    The most effective way to access a row is by its primary key as that ensures just
    the rows that are affected by the statement are accessed. As an example, consider
    Listing [10-1](#502546_1_En_10_Chapter.xhtml#PC1) which adds a secondary index
    on the `Name` column of `world.city` and updates the population of the city names
    Sydney.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              713        1171          6

    --          2              714        1172          6

    -- Connection 1

    Connection 1> ALTER TABLE world.city

    ADD INDEX (Name);

    Query OK, 0 rows affected (1.3916 sec)

    Records: 0  Duplicates: 0  Warnings: 0

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = 5000000

    WHERE Name = ''Sydney'';

    Query OK, 1 row affected (0.0007 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND thread_id = 1171\G

    *************************** 1. row ***************************

    index_name: NULL

    lock_type: TABLE

    lock_mode: IX

    lock_data: NULL

    *************************** 2. row ***************************

    index_name: Name

    lock_type: RECORD

    lock_mode: X

    lock_data: ''Sydney                             '', 130

    *************************** 3. row ***************************

    index_name: PRIMARY

    lock_type: RECORD

    lock_mode: X,REC_NOT_GAP

    lock_data: 130

    *************************** 4. row ***************************

    index_name: Name

    lock_type: RECORD

    lock_mode: X,GAP

    lock_data: ''Syktyvkar                          '', 3660

    4 rows in set (0.0006 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0625 sec)

    Connection 1> ALTER TABLE world.city

    DROP INDEX Name;

    Query OK, 0 rows affected (0.4090 sec)

    Records: 0  Duplicates: 0  Warnings: 0)

    ```

    Listing 10-1

    Updating row by non-unique secondary index


    Despite that the update only affects one row, there are three exclusive record
    level locks with a record as well as gap lock on the `Name` index and lock on
    the row record using the primary key.


    If you on the other hand perform the same update but access the row using the
    primary key, only the record lock on the primary key will be required as shown
    in Listing [10-2](#502546_1_En_10_Chapter.xhtml#PC2).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              719        1180          6

    --          2              720        1181          6

    -- Connection 1

    Connection 1> ALTER TABLE world.city

    ADD INDEX (Name);

    Query OK, 0 rows affected (1.1499 sec)

    Records: 0  Duplicates: 0  Warnings: 0

    Connection 1> SELECT ID

    FROM world.city

    WHERE Name = ''Sydney'';

    +-----+

    | ID  |

    +-----+

    | 130 |

    +-----+

    1 row in set (0.0004 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = 5000000

    WHERE ID = 130;

    Query OK, 1 row affected (0.0027 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND thread_id = 1180\G

    *************************** 1. row ***************************

    index_name: NULL

    lock_type: TABLE

    lock_mode: IX

    lock_data: NULL

    *************************** 2. row ***************************

    index_name: PRIMARY

    lock_type: RECORD

    lock_mode: X,REC_NOT_GAP

    lock_data: 130

    2 rows in set (0.0007 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0410 sec)

    Connection 1> ALTER TABLE world.city

    DROP INDEX Name;

    Query OK, 0 rows affected (0.3257 sec)

    Records: 0  Duplicates: 0  Warnings: 0

    ```

    Listing 10-2

    Updating row by the primary index'
