- fmt: '# InnoDB Lock Contention


    When you consider the foreign key relationships between the tables in the previous
    section, it is easy to jump to the conclusion that the lock wait timeout for the
    `UPDATE` statement on the `category` table is also due to metadata locks cascading
    from the `ALTER TABLE` on the `inventory` table. However, you must be careful
    and study the facts before making such conclusions – and in this case, the conclusion
    is wrong.


    If you look at the information from the `metadata_locks` table, you can see none
    of the pending locks are for the `category` table:


    ```

    *************************** 16\. row ***************************

    object_name: inventory

    lock_type: SHARED_READ

    lock_status: PENDING

    owner_thread_id: 795

    owner_event_id: 10

    ...

    *************************** 23\. row ***************************

    object_name: inventory

    lock_type: EXCLUSIVE

    lock_status: PENDING

    owner_thread_id: 796

    owner_event_id: 9

    ```


    This is the key message here. While knowledge of the schema is important, you
    should start out looking at the lock wait information and then use the schema
    knowledge to understand why the locks occur rather than try to guess at what locks
    may exist based on the schema knowledge.


    The monitoring discussed earlier did show that there were InnoDB lock wait timeouts,
    and the `sys.innodb_lock_waits` output in Listing [17-4](#502546_1_En_17_Chapter.xhtml#PC8)
    shows which are the conflicting locks and statements.


    ```

    mysql> SELECT * FROM sys.innodb_lock_waits\G

    *************************** 1\. row ***************************

    wait_started: 2020-08-02 14:17:13

    wait_age: 00:00:02

    wait_age_secs: 2

    locked_table: `sakila`.`category`

    locked_table_schema: sakila

    locked_table_name: category

    locked_table_partition: None

    locked_table_subpartition: None

    locked_index: PRIMARY

    locked_type: RECORD

    waiting_trx_id: 535860

    waiting_trx_started: 2020-08-02 14:17:13

    waiting_trx_age: 00:00:02

    waiting_trx_rows_locked: 1

    waiting_trx_rows_modified: 0

    waiting_pid: 463

    waiting_query: UPDATE sakila.category SET name = IF(name = ''Travel'', ''Exploring'',
    ''Travel'') WHERE category_id = 16

    waiting_lock_id: 2711671600928:1795:4:282:2711634698920

    waiting_lock_mode: X,REC_NOT_GAP

    blocking_trx_id: 535859

    blocking_pid: 462

    blocking_query: None

    blocking_lock_id: 2711671600096:1795:4:282:2711634694976

    blocking_lock_mode: S,REC_NOT_GAP

    blocking_trx_started: 2020-08-02 14:17:13

    blocking_trx_age: 00:00:02

    blocking_trx_rows_locked: 5

    blocking_trx_rows_modified: 2

    sql_kill_blocking_query: KILL QUERY 462

    sql_kill_blocking_connection: KILL 462

    1 row in set (0.0017 sec)

    Listing 17-4

    The InnoDB lock waits during the test

    ```


    The lock contention is on the primary key of the `category` table with process
    list id 462 being the blocking connection. This connection is idle at the time
    of the output, so you need to use the Performance Schema statement history tables
    or the query analysis in your monitoring solution or study the application or
    a combination of them to determine which queries were executed by the transaction.
    In this case, it is the update of the `film_category` table (formatted for readability):


    ```

    UPDATE sakila.film_category

    SET category_id = IF(category_id = 7, 16, 7)

    WHERE film_id = 64;

    ```


    The reason this causes a lock on the `category` table is that there is a foreign
    key between the `category_id` column in the `film_category` and `category` tables,
    so when the connection with process list id 463 tries to update the row in the
    `category` table with the same id as connection 462 has updated, it will block
    until 462 is committed or rolled back.


    ## The Solution and Prevention


    The solutions and preventions discussed in Chapters [14](#502546_1_En_14_Chapter.xhtml)
    and [15](#502546_1_En_15_Chapter.xhtml) also apply in the case where foreign keys
    are involved. This means that the most effective way to avoid the issues in the
    first place is to avoid long-running transactions, and as a quick way to unblock
    metadata lock waits, you can kill the DDL statement requesting exclusive locks.


    Note: Foreign keys are a bigger issue with metadata locks than for InnoDB record
    locks as the latter only affect cases where the columns used in foreign keys are
    involved.


    When foreign keys are present, it can be particularly useful to keep a low value
    for `lock_wait_timeout` to avoid a large number of metadata lock requests across
    many tables to be requested or held for extended periods while waiting for all
    the requests to be granted. This can potentially be combined with reducing the
    value of `max_write_lock_count` to avoid stalling requests for shared metadata
    locks requested through foreign keys on busy tables. (Reducing `max_write_lock_count`
    will not change this case study.)


    If you have severe problems with lock contention due to foreign keys, one possibility
    is to move the responsibility of keeping the data consistent into the application.
    You should however be aware this does remove the insurance at the MySQL level
    to keep the data consistent (the C in ACID), so it is not recommended. That said,
    in some cases, it may be the only way to avoid excessive locking in high concurrency
    systems.


    Caution: While handling foreign key relations in the application can help reduce
    locking in the database, be careful as it also weakens the consistency guarantees.


    Additionally, some general solutions exist that are not special to foreign keys:


    *   If the locks are held for too long, for example, because of an abandoned transaction,
    consider killing the blocking transaction, but remember to take into account the
    number of changes that will have to be rolled back.

    *   Remember to handle a transaction that has a query failing with a lock wait
    timeout, so the transaction does not stay around with the locks taken before the
    statement that failed.

    *   Consider what you can do to reduce the duration and size of your transactions.

    *   Use indexes to reduce the number of records accessed.

    *   Consider the `READ COMMITTED` transaction isolation level, if it is suitable
    for your application.


    ## Summary


    This chapter went through a case study with simultaneous metadata lock and InnoDB
    lock contention caused by foreign keys. The main discussion point was how the
    locks spread to other tables than the ones used by the queries. This is particularly
    the case for metadata locks, whereas the effect is less for InnoDB record locks
    as extra locks are only taken when columns used for the foreign keys are involved.


    The principles of investigating the lock issues are the same as when foreign keys
    are not involved; however, it is more difficult due to the number of locks involved;
    for the metadata locks in the example, there were 26 lock requests returned by
    `performance_schema.metadata_locks`. It is thus particularly useful to use the
    `sys` schema views to help with the analysis.


    In addition to the usual methods to reduce lock issues, for metadata locks, you
    can consider combining a low `lock_wait_timeout` with a relatively low value of
    `max_write_lock_count`. Another option that can help for both metadata and InnoDB
    locks is to leave the responsibility of guaranteeing the consistency of the foreign
    keys to the application; however, be very careful if you do that as it will not
    provide as strong a guarantee as when MySQL handles it.


    There remains one case study left which covers a case where there are semaphore
    waits in InnoDB as it will be discussed in the next chapter.


