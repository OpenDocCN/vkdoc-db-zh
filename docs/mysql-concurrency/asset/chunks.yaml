    ## 前言


    在使用数据库时，锁和事务是最困难且最常被误解的主题之一。本书旨在提升您对这两个概念的理解：它们如何工作、如何调查它们，以及如何优化您的工作负载以使其与它们协同工作得最好。实现这一目标的方法是结合讨论监控、锁与事务理论以及一系列案例研究。


    `MySQL` 以其对存储引擎的支持而闻名。然而，本书仅涵盖 `InnoDB` 存储引擎，并且只考虑 `MySQL 8`。尽管如此，大部分讨论也适用于旧版本的
    `MySQL`，并且通常会说明某个功能是 `MySQL 8` 中的新特性，或者 `MySQL 8` 的行为与旧版本不同。


    ### 目标读者


    本书是为有 `MySQL` 使用经验的开发人员和数据库管理员编写的，他们希望扩展关于 `MySQL` 并发领域内锁和事务如何工作的知识。


    ### 示例与本书的 GitHub 仓库


    我尝试添加了尽可能多的示例和示例输出。其中一些示例相当简短，有些则相当长。无论哪种情况，我希望您能够跟上并复现所演示的效果或结果。同时，请务必记住，本质上常常涉及随机性，示例的确切结果可能取决于示例执行前表和数据的使用方式。换句话说，即使您操作完全正确，也可能得到不同的结果。这尤其适用于与锁
    ID、内存地址、互斥量/信号量、时间等相关的信息。


    较长或输出过长或过宽的示例已添加到本书的 GitHub 仓库中。这包括一些在页面格式允许的图像尺寸下可能难以看清的图表。


    **注意**

    仓库链接可以从本书主页 [`www.apress.com/gp/book/9781484266519`](http://www.apress.com/gp/book/9781484266519)
    找到。也可以直接在 [`www.github.com/Apress/mysql-concurrency`](http://www.github.com/Apress/mysql-concurrency)
    找到。


    为了更轻松地复现示例，并提供可用于检查测试所演示问题的示例查询，一个用 `Python` 编写、供 `MySQL Shell` 使用的模块也包含在本书的 GitHub
    仓库中。基本的安装和使用说明见第 1 章，完整文档见附录 B。


    GitHub 仓库也将是本书勘误表的所在地。我将使用勘误表不仅传达书中的错误，而且在 `MySQL 8` 中的错误修复和新功能导致书内容发生变化时提供更新。如有必要，我还将更新仓库中的示例以反映新版本中的行为。基于这些原因，我建议您关注该仓库。

