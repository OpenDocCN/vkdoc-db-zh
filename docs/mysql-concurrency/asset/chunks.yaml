  trans: '

    ## 共享锁


    当一个线程需要保护某个资源但并不打算修改它时，可以使用共享锁来防止其他线程修改该资源，同时仍然允许它们访问同一资源。这是最常用的访问级别。


    每当有语句从表中选取数据时，MySQL 会对查询涉及的表加共享锁。对于数据锁，其工作机制则不同，因为 InnoDB 在读取行时通常不会获取共享锁。这种情况仅在显式请求共享锁时、处于
    `SERIALIZABLE` 事务隔离级别时，或工作流有要求时（例如涉及外键）才会发生。


    你可以通过添加 `FOR SHARE` 或其同义词 `LOCK IN SHARE MODE` 来显式请求对查询访问的行加共享锁，如代码清单 5-1 所示。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1               36          80          6

    -- 连接 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT * FROM world.city WHERE ID = 130 FOR SHARE;

    +-----+--------+-------------+-----------------+------------+

    | ID  | Name   | CountryCode | District        | Population |

    +-----+--------+-------------+-----------------+------------+

    | 130 | Sydney | AUS         | New South Wales |    3276207 |

    +-----+--------+-------------+-----------------+------------+

    1 row in set (0.0047 sec)

    Connection 1> SELECT object_type, object_schema, object_name,

    lock_type, lock_duration, lock_status

    FROM performance_schema.metadata_locks

    WHERE OWNER_THREAD_ID = PS_CURRENT_THREAD_ID()

    AND OBJECT_SCHEMA  ''performance_schema''\G

    *************************** 1\. row ***************************

    object_type: TABLE

    object_schema: world

    object_name: city

    lock_type: SHARED_READ

    lock_duration: TRANSACTION

    lock_status: GRANTED

    1 row in set (0.0005 sec)

    Connection 1> SELECT engine, object_schema, object_name,

    lock_type, lock_mode, lock_status

    FROM performance_schema.data_locks

    WHERE THREAD_ID = PS_CURRENT_THREAD_ID()\G

    *************************** 1\. row ***************************

    engine: INNODB

    object_schema: world

    object_name: city

    lock_type: TABLE

    lock_mode: IS

    lock_status: GRANTED

    *************************** 2\. row ***************************

    engine: INNODB

    object_schema: world

    object_name: city

    lock_type: RECORD

    lock_mode: S,REC_NOT_GAP

    lock_status: GRANTED

    2 rows in set (0.0005 sec)

    mysql> ROLLBACK;

    Query OK, 0 rows affected (0.0004 sec)

    代码清单 5-1

    获取共享锁的示例

    ```


    在查询 `metadata_locks` 表时，Performance Schema 表自身的锁会被排除，因为它们是用于调查查询本身，而非之前的查询。此处，`world.city`
    表以及主键（`ID` 列）等于 130 的记录上都加了共享锁。它们是共享锁这一点，可以从 `metadata_locks` 表中 `lock_type` 列的值为
    `SHARED_READ`，以及 `data_locks` 表第二行 `lock_mode` 列中的 `S` 看出来。`data_locks` 表第一行的
    `IS` 值表示这是一个共享意向锁，稍后将更详细地讨论。


    虽然共享锁确实允许其他也使用共享锁的查询继续执行，但它们会阻止获取排他锁的尝试。


    ## 排他锁


    排他锁是共享锁的对应物。它们确保在锁持有期间，只有被授予排他锁的线程才能访问资源。由于排他锁用于确保一次只有一个线程修改资源，因此它们也被称为写锁。


    排他锁主要通过数据定义语言（DDL）语句（如 `ALTER TABLE`）以及在使用数据操作语言（DML）语句（如 `UPDATE` 和 `DELETE`）修改数据时获取。获取排他锁以及锁表中数据的示例可以在代码清单
    5-2 中找到。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1               38          84          6

    -- 连接 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    Query OK, 1 row affected (0.0028 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    Connection 1> SELECT object_type, object_schema, object_name,

    lock_type, lock_duration, lock_status

    FROM performance_schema.metadata_locks

    WHERE OWNER_THREAD_ID = PS_CURRENT_THREAD_ID()

    AND OBJECT_SCHEMA  ''performance_schema''\G

    *************************** 1\. row ***************************

    object_type: TABLE

    object_schema: world

    object_name: city

    lock_type: SHARED_WRITE

    lock_duration: TRANSACTION

    lock_status: GRANTED

    *************************** 2\. row ***************************

    object_type: TABLE

    object_schema: world

    object_name: country

    lock_type: SHARED_READ

    lock_duration: TRANSACTION

    lock_status: GRANTED

    2 rows in set (0.0008 sec)

    Connection 1> SELECT engine, object_schema, object_name,

    lock_type, lock_mode, lock_status

    FROM performance_schema.data_locks

    WHERE THREAD_ID = PS_CURRENT_THREAD_ID()\G

    *************************** 1\. row ***************************

    engine: INNODB

    object_schema: world

    object_name: city

    lock_type: TABLE

    lock_mode: IX

    lock_status: GRANTED

    *************************** 2\. row ***************************

    engine: INNODB

    object_schema: world

    object_name: city

    lock_type: RECORD

    lock_mode: X,REC_NOT_GAP

    lock_status: GRANTED

    2 rows in set (0.0005 sec)

    mysql> ROLLBACK;

    Query OK, 0 rows affected (0.3218 sec)

    代码清单 5-2

    获取排他锁的示例

    ```


    该示例的大部分内容与获取共享锁的示例相似，但也有一些令人意外之处。首先看 `data_locks` 表，它显示了表上有一个排他插入意向（`IX`）锁，以及一个排他（`X`）记录锁。这符合预期。


    情况在 `metadata_locks` 表中变得更加复杂，现在有两个表锁：`city` 表上的 `SHARED_WRITE` 锁和 `country` 表上的
    `SHARED_READ` 锁。一个锁如何能同时是共享的又是写锁？为什么修改了 `city` 表，其锁却是共享的？为什么 `country` 表上会有一个锁？


    `SHARED_WRITE` 锁表示数据被锁定用于更新，但元数据锁本身是共享的。原因在于表的元数据并未被修改，因此允许其他并发共享访问表元数据是安全的。请记住，`metadata_locks`
    表不关心在单个记录上持有的锁，因此从元数据的角度看，对 `city` 表的访问是共享的。


    `country` 表上的元数据锁来源于 `city` 表到 `country` 表的外键。该共享锁防止在事务仍在进行时对 `country` 的元数据进行修改，例如删除外键所涉及的列。第
    10 章将更详细地讨论外键对锁定的影响。


    ## 意向锁


    在本章目前的两个例子中，都出现了意向锁。它们是什么？这是一种信号，表明 InnoDB 事务的意图，可以是共享的或排他的。起初这可能看起来是一种不必要的复杂设计，但意向锁允许
    InnoDB 按顺序解析锁请求，而不会阻塞兼容的操作。细节超出了本次讨论的范围。重要的是你要知道意向锁的存在，这样当你看到它们时，就知道它们从何而来。


    意向锁从更功能性的角度将在第 6 章介绍，而一个相关的概念——插入意向锁，则将与 InnoDB 锁一起在第 7 章中介绍。

    '
- fmt: '## Lock Compatibility


    The lock compatibility matrix defines whether two lock requests conflict with
    each other. The introduction of intention locks makes this a little more complex
    than saying that shared locks are compatible with each other and exclusive locks
    are not compatible with any other locks.


    Two intention locks are always compatible with each other. This means that even
    if a transaction has an intention exclusive lock, it will not prevent another
    transaction to take an intention lock. It will however stop the other transaction
    from upgrading its intention lock to a full lock. Table [5-1](#502546_1_En_5_Chapter.xhtml#Tab1)
    shows the compatibility between the lock types. Shared locks are denoted `S` and
    exclusive locks `X`. Intention locks are prefixed `I`, so `IS` is an intention
    shared lock and `IX` is an intention exclusive lock.


    Table 5-1: InnoDB lock compatibility


    |   | Exclusive (`X`) | Intention Exclusive (`IX`) | Shared (`S`) | Intention
    Shared (`IS`) |

    | --- | --- | --- | --- | --- |

    | **Exclusive (`X`)** | ✘ | ✘ | ✘ | ✘ |

    | **Intention Exclusive (`IX`)** | ✘ | ✔ | ✘ | ✔ |

    | **Shared (`S`)** | ✘ | ✘ | ✔ | ✔ |

    | **Intention Shared (`IS`)** | ✘ | ✔ | ✔ | ✔ |


    In the table, a checkmark indicates that the two locks are compatible, whereas
    a cross mark indicates the two locks are conflicting with each other. The only
    conflicts of intention locks are with the exclusive and shared locks. An exclusive
    lock conflicts with all other locks including both intention lock types. A shared
    lock conflicts only with an exclusive lock and an intention exclusive lock.


    This does sound fairly simple; however, this only applies to two of the same kind
    of locks. When you start to include different locks at the InnoDB level, it becomes
    more complex as will be discussed in Chapter 8 when lock contention is discussed.


    This is all handled automatically by MySQL and InnoDB; however, you need to understand
    these rules when investigating lock issues.


    ## Summary


    This chapter has discussed the MySQL lock access levels. A lock can either be
    a shared lock, an exclusive lock, an intention shared lock, or an intention exclusive
    lock.


    A shared lock is for read access to a resource and allows multiple threads to
    access the same resource concurrently. An exclusive lock on the other hand only
    allows a single thread to access the resource at a time which makes it safe to
    update the resource. Intention locks are an InnoDB concept that allows InnoDB
    to resolve lock requests with less blocked requests as a result. All intention
    locks are compatible with each other, even intention exclusive locks, but intention
    exclusive locks block shared locks.


    In this as well as the previous chapters, you have also encountered examples of
    how locks guard different resources such as tables and records. In the next chapter,
    it is time to learn more about the high-level lock access types such as table
    and metadata locks.


    # 6. High-Level Lock Types


    In the previous chapter, you learned about the shared and exclusive access levels.
    In principle, you can make a locking system that does not consist of anything
    but one type of lock that can either be shared or exclusive. It would however
    mean that it would have to work at the instance level and thus be very poorly
    at allowing concurrent read-write access to the data. In this and the next chapter,
    you will learn how there are many kinds of locks depending on the resource they
    protect. While this does make locking much more complex, it does also allow for
    a much fine grainer locks that leads to support for a higher concurrency.


    This chapter discusses the high-level locks in MySQL starting with the user-level
    locks and going through the various types of locks that are handled at the MySQL
    level (i.e., above the storage engine). Included are flush locks, metadata locks,
    explicit and implicit table locks (which are an exception as they are handled
    by InnoDB), backup locks, and log locks.


    ## User-Level Locks


    User-level locks are an explicit lock type the application can use to protect,
    for example, a workflow. They are not often used, but they can be useful for some
    complex tasks where you want to serialize access. All user locks are exclusive
    locks and are obtained using a name which can be up to 64 characters long.


    You manipulate user-level locks with a set of functions:


    *   `GET_LOCK(name, timeout)`: Obtains a lock by specifying the name of the lock.
    The second argument is a `timeout` in seconds; if the lock is not obtained within
    that time, the function returns `0`. If the lock is obtained, the return value
    is `1`. If the `timeout` is negative, the function will wait indefinitely for
    the lock to become available.

    *   `IS_FREE_LOCK(name)`: Checks whether the named lock is available or not. The
    function returns `1` if the lock is available and `0` if it is not available.

    *   `IS_USED_LOCK(name)`: This is the opposite of the `IS_FREE_LOCK()` function.
    The function returns the connection id of the connection holding the lock if the
    lock is in use (not available) and `NULL` if it is not in use (available).

    *   `RELEASE_ALL_LOCKS()`: Releases all user-level locks held by the connection.
    The return value is the number of locks released.

    *   `RELEASE_LOCK(name)`: Releases the lock with the provided `name`. The return
    value is `1` if the lock is released, `0` if the lock exists but is not owned
    by the connection, or `NULL` if the lock does not exist.


    It is possible to obtain multiple locks by invoking `GET_LOCK()` multiple times.
    If you do that, be careful to ensure locks are obtained in the same order by all
    users as otherwise a deadlock can occur. If a deadlock occurs, an `ER_USER_LOCK_DEADLOCK`
    error (error code 3058) is returned. An example of this is shown in Listing [6-1](#502546_1_En_6_Chapter.xhtml#PC1).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              322         617          6

    --          2              323         618          6

    -- Connection 1

    Connection 1> SELECT GET_LOCK(''my_lock_1'', -1);

    +---------------------------+

    | GET_LOCK(''my_lock_1'', -1) |

    +---------------------------+

    |                         1 |

    +---------------------------+

    1 row in set (0.0003 sec)

    -- Connection 2

    Connection 2> SELECT GET_LOCK(''my_lock_2'', -1);

    +---------------------------+

    | GET_LOCK(''my_lock_2'', -1) |

    +---------------------------+

    |                         1 |

    +---------------------------+

    1 row in set (0.0003 sec)

    Connection 2> SELECT GET_LOCK(''my_lock_1'', -1);

    -- Connection 1

    Connection 1> SELECT GET_LOCK(''my_lock_2'', -1);

    ERROR: 3058: Deadlock found when trying to get user-level lock; try rolling back
    transaction/releasing locks and restarting lock acquisition.

    Listing 6-1: A deadlock for user-level locks

    ```


    When Connection 2 attempts to get the `my_lock_1` lock, the statement will block
    until Connection 1 attempts to get the `my_lock_2` lock triggering the deadlock.
    If you obtain multiple locks, you should be prepared to handle deadlocks. Note
    that for user-level locks, a deadlock does not trigger a rollback of the transaction.


    The granted and pending user-level locks can be found in the `performance_schema.metadata_locks`
    table with the `OBJECT_TYPE` column set to `USER LEVEL LOCK` as shown in Listing
    [6-2](#502546_1_En_6_Chapter.xhtml#PC2). The locks listed assume you left the
    system as it was at the time the deadlock in Listing [6-1](#502546_1_En_6_Chapter.xhtml#PC1)
    was triggered. Note that some values such as `OBJECT_INSTANCE_BEGIN` will be different
    for you and you will have to change the ids for `owner_thread_id` in the `WHERE`
    clause to match yours from Listing [6-1](#502546_1_En_6_Chapter.xhtml#PC1).


    ```

    SELECT * FROM performance_schema.metadata_locks

    WHERE OBJECT_TYPE = ''USER LEVEL LOCK'';

    ```


    **Listing 6-2:** Querying for user-level locks'
