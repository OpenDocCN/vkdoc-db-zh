    SHARE`子句显式请求一个共享锁，或者需要将事务隔离级别更改为`SERIALIZABLE`。


    一致读所付出的代价是需要持有相对大量的锁，并且 InnoDB 必须维护数据的多个版本。回顾一下关于 undo 日志的讨论：只要还存在一个在给定事务之前启动的读视图，该事务的
    undo 日志就必须被保留，而跟踪相同行的不同版本是昂贵的。


    如果不需要一致读，那么`READ COMMITTED`事务隔离级别是一个不错的选择。


    ## 读已提交


    如果你习惯使用其他关系型数据库系统，如 Oracle DB 或 PostgreSQL，那么你很可能一直在使用`READ COMMITTED`事务隔离级别。MySQL
    中的`NDBCluster`存储引擎也使用`READ COMMITTED`。这个隔离级别很受欢迎，因为它为许多工作负载提供了足够强的隔离性，并且相比`REPEATABLE
    READ`和`SERIALIZABLE`隔离级别，其锁定开销有所减少。


    `REPEATABLE READ`与`READ COMMITTED`的主要区别在于：


    *   `READ COMMITTED`不支持一致读（尽管单条语句仍然返回一致的结果）。由于读视图的生命周期仅与语句的生命周期相同，InnoDB 可以更快地清除旧的
    undo 日志。这个优势对于长时间运行的事务最为显著。


    *   DML 语句在检查但未修改的记录上所获取的锁，会在`WHERE`子句求值完成后立即释放。


    *   `READ COMMITTED`只会在检查外键和唯一键约束时，以及在处理页分裂（page split）时才获取间隙锁（gap lock）。当 InnoDB
