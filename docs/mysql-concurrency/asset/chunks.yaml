- fmt: '# Repeatable Read


    `REPETABLE READ`隔离级别是`InnoDB`中的默认级别。顾名思义，它保证如果你重复执行一条读取语句，则会返回相同的结果。这也被称为一致性读，是通过称为快照的读视图来实现的。快照在事务内执行第一条语句时建立，或者如果使用`WITH
    CONSISTENT SNAPSHOT`修饰符执行`START TRANSACTION`，则在事务开始时建立。


    一致性快照的一个重要副作用是，可以在仍然重复读取相同数据的同时进行非锁定读取。这扩展到包括所有`InnoDB`表，因此对不同表执行多个语句返回的数据对应于同一个时间点。具有其一致性快照的`REPEATABLE
    READ`事务隔离级别，也允许使用`mysqlpump`和`mysqldump`等工具创建在线一致的逻辑备份。


    虽然`REPEATABLE READ`具有一些良好的隔离属性，并且不像`SERIALIZABLE`那样具有侵入性，但仍然存在相当程度的锁操作。清单 [12-3](#502546_1_En_12_Chapter.xhtml#PC5)
    展示了在斯洛伐克布拉迪斯拉发地区选择城市的示例的重复。


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              973        1571          6

    --          2              974        1572          6

    -- Connection 1

    Connection 1> SET transaction_isolation = ''REPEATABLE-READ'';

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT ID, Name, Population

    FROM world.city

    WHERE CountryCode = ''SVK''

    AND District = ''Bratislava'';

    +------+------------+------------+

    | ID   | Name       | Population |

    +------+------------+------------+

    | 3209 | Bratislava |     448292 |

    +------+------------+------------+

    1 row in set (0.0006 sec)

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1571

    ORDER BY index_name, lock_data DESC;

    0 rows in set (0.0006 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0004 sec)

    Listing 12-3

    Read locking in the REPEATABLE READ transaction isolation level

    ```


    在这种情况下，没有持任何锁，这是`SERIALIZABLE`和`REPEATABLE READ`事务隔离级别之间的重要区别。清单 [12-4](#502546_1_En_12_Chapter.xhtml#PC6)
    展示了`UPDATE`语句的情况。


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              975        1574          6

    --          2              976        1575          6

    -- Connection 1

    Connection 1> SET transaction_isolation = ''REPEATABLE-READ'';

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE CountryCode = ''SVK''

    AND District = ''Bratislava'';

    Query OK, 1 row affected (0.0007 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1574

    ORDER BY index_name, lock_data DESC;

    +-------------+-----------+---------------+-------------+

    | index_name  | lock_type | lock_mode     | lock_data   |

    +-------------+-----------+---------------+-------------+

    | CountryCode | RECORD    | X,GAP         | ''SVN'', 3212 |

    | CountryCode | RECORD    | X             | ''SVK'', 3211 |

    | CountryCode | RECORD    | X             | ''SVK'', 3210 |

    | CountryCode | RECORD    | X             | ''SVK'', 3209 |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3211        |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3210        |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3209        |

    +-------------+-----------+---------------+-------------+

    7 rows in set (0.0010 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.3036 sec)

    Listing 12-4

    Locking in the REPEATABLE READ transaction isolation level

    ```


    这些锁与`SERIALIZABLE`中持有的七个锁相同。


    关于一致性快照，你需要意识到的一个重要注意事项是它们只适用于读取。这意味着如果你从一个表中读取，然后另一个事务提交了更改，使得某些行匹配第一个事务中使用的过滤器，那么第一个事务将能够修改这些行，并且之后，它们将被包含在快照中。清单
    [12-5](#502546_1_En_12_Chapter.xhtml#PC7) 展示了这方面的示例。如果你想查看持有的锁，有两种可用的调查方法可以探索。'
  raw: '## Repeatable Read


    The `REPETABLE READ` isolation level is the default in InnoDB. As the name suggests,
    it ensures that if you repeat a read statement, then the same result is returned.
    This is also known as a consistent read, and it is implemented through read views
    called snapshots. The snapshot is established when the first statement is executed
    within the transaction, or if the `WITH CONSISTENT SNAPSHOT` modifier is given
    with `START TRANSACTION`, then at the start of the transaction.


    An important side effect of the consistent snapshots is that it is possible to
    have non-locking reads while still retrieving the same data repeatably. This extends
    to include all InnoDB tables, so executing multiple statements against different
    tables return data that corresponds to the same point in time. The `REPEATABLE
    READ` transaction isolation level with its consistent snapshots is also what allows
    for online consistent logical backups created with tools like `mysqlpump` and
    `mysqldump`.


    While `REPEATABLE READ` has some nice isolation properties without being as intrusive
    as `SERIALIZABLE`, there is still a significant level of locking going on. Listing [12-3](#502546_1_En_12_Chapter.xhtml#PC5)
    shows a repeat of the example of selecting the cities in the district of Bratislava
    in Slovakia.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              973        1571          6

    --          2              974        1572          6

    -- Connection 1

    Connection 1> SET transaction_isolation = ''REPEATABLE-READ'';

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT ID, Name, Population

    FROM world.city

    WHERE CountryCode = ''SVK''

    AND District = ''Bratislava'';

    +------+------------+------------+

    | ID   | Name       | Population |

    +------+------------+------------+

    | 3209 | Bratislava |     448292 |

    +------+------------+------------+

    1 row in set (0.0006 sec)

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1571

    ORDER BY index_name, lock_data DESC;

    0 rows in set (0.0006 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0004 sec)

    Listing 12-3

    Read locking in the REPEATABLE READ transaction isolation level

    ```


    In this case , no locks are held which is the important difference between the
    `SERIALIZABLE` and `REPEATABLE READ` transaction isolation levels. Listing [12-4](#502546_1_En_12_Chapter.xhtml#PC6)
    shows how it looks for the `UPDATE` statement .


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              975        1574          6

    --          2              976        1575          6

    -- Connection 1

    Connection 1> SET transaction_isolation = ''REPEATABLE-READ'';

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE CountryCode = ''SVK''

    AND District = ''Bratislava'';

    Query OK, 1 row affected (0.0007 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1574

    ORDER BY index_name, lock_data DESC;

    +-------------+-----------+---------------+-------------+

    | index_name  | lock_type | lock_mode     | lock_data   |

    +-------------+-----------+---------------+-------------+

    | CountryCode | RECORD    | X,GAP         | ''SVN'', 3212 |

    | CountryCode | RECORD    | X             | ''SVK'', 3211 |

    | CountryCode | RECORD    | X             | ''SVK'', 3210 |

    | CountryCode | RECORD    | X             | ''SVK'', 3209 |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3211        |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3210        |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3209        |

    +-------------+-----------+---------------+-------------+

    7 rows in set (0.0010 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.3036 sec)

    Listing 12-4

    Locking in the REPEATABLE READ transaction isolation level

    ```


    These are the same seven locks as were held in `SERIALIZABLE`.


    One important caveat of consistent snapshots that you need to be aware of is that
    they only apply for reads. This means that if you read from a table, then another
    transaction commits changes to rows so they match the filter used in the first
    transaction, then the first transaction will be able to modify these rows, and
    afterward, they will be included in snapshot. Listing [12-5](#502546_1_En_12_Chapter.xhtml#PC7)
    shows an example of this. There are two investigations available that you can
    explore if you want to take a look at the locks held.'
