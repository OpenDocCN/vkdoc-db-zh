  trans: '# InnoDB 锁竞争


    当你考虑到上一节中表之间的外键关系时，很容易草率地得出结论：对 `category` 表执行 `UPDATE` 语句时发生的锁等待超时，也是由于对 `inventory`
    表执行 `ALTER TABLE` 所引发的元数据锁级联所致。然而，在得出此类结论之前，你必须谨慎并研究事实——而在本例中，该结论是错误的。


    如果你查看 `metadata_locks` 表的信息，可以看到所有待处理的锁都不是针对 `category` 表的：


    ```

    *************************** 16\. row ***************************

    object_name: inventory

    lock_type: SHARED_READ

    lock_status: PENDING

    owner_thread_id: 795

    owner_event_id: 10

    ...

    *************************** 23\. row ***************************

    object_name: inventory

    lock_type: EXCLUSIVE

    lock_status: PENDING

    owner_thread_id: 796

    owner_event_id: 9

    ```


    这是此处的关键信息。虽然了解 schema 很重要，但你应该从查看锁等待信息开始，然后运用 schema 知识来理解锁发生的原因，而不是试图根据 schema
    知识猜测可能存在哪些锁。


    先前讨论的监控确实显示存在 InnoDB 锁等待超时，并且列表 17-4 中的 `sys.innodb_lock_waits` 输出显示了哪些是冲突的锁和语句。


    ```

    mysql> SELECT * FROM sys.innodb_lock_waits\G

    *************************** 1\. row ***************************

    wait_started: 2020-08-02 14:17:13

    wait_age: 00:00:02

    wait_age_secs: 2

    locked_table: `sakila`.`category`

    locked_table_schema: sakila

    locked_table_name: category

    locked_table_partition: None

    locked_table_subpartition: None

    locked_index: PRIMARY

    locked_type: RECORD

    waiting_trx_id: 535860

    waiting_trx_started: 2020-08-02 14:17:13

    waiting_trx_age: 00:00:02

    waiting_trx_rows_locked: 1

    waiting_trx_rows_modified: 0

    waiting_pid: 463

    waiting_query: UPDATE sakila.category SET name = IF(name = ''Travel'', ''Exploring'',
    ''Travel'') WHERE category_id = 16

    waiting_lock_id: 2711671600928:1795:4:282:2711634698920

    waiting_lock_mode: X,REC_NOT_GAP

    blocking_trx_id: 535859

    blocking_pid: 462

    blocking_query: None

    blocking_lock_id: 2711671600096:1795:4:282:2711634694976

    blocking_lock_mode: S,REC_NOT_GAP

    blocking_trx_started: 2020-08-02 14:17:13

    blocking_trx_age: 00:00:02

    blocking_trx_rows_locked: 5

    blocking_trx_rows_modified: 2

    sql_kill_blocking_query: KILL QUERY 462

    sql_kill_blocking_connection: KILL 462

    1 row in set (0.0017 sec)

    列表 17-4

    测试期间的 InnoDB 锁等待

    ```


    锁竞争发生在 `category` 表的主键上，进程列表 ID 462 是阻塞连接。该连接在输出时处于空闲状态，因此你需要使用 Performance Schema
    语句历史表、监控解决方案中的查询分析、研究应用程序或结合它们来确定该事务执行了哪些查询。在本例中，是对 `film_category` 表的更新（为可读性进行了格式化）：


    ```

    UPDATE sakila.film_category

    SET category_id = IF(category_id = 7, 16, 7)

    WHERE film_id = 64;

    ```


    这之所以会导致对 `category` 表加锁，是因为在 `film_category` 和 `category` 表的 `category_id` 列之间存在外键。因此，当进程列表
    ID 为 463 的连接尝试更新与连接 462 已更新的行具有相同 ID 的 `category` 表中的行时，它将被阻塞，直到 462 提交或回滚。


    ## 解决方案与预防措施


    第 14 和 15 章讨论的解决方案和预防措施在涉及外键的情况下同样适用。这意味着避免问题的最有效方法是首先避免长时间运行的事务，而作为一种快速解除元数据锁等待阻塞的方法，你可以终止请求独占锁的
    DDL 语句。


    > 注意：与 InnoDB 记录锁相比，外键对元数据锁的影响更大，因为后者仅影响涉及外键列的情况。


    当存在外键时，将 `lock_wait_timeout` 设置为较低的值特别有用，可以避免大量跨多个表的元数据锁请求被长时间请求或持有，同时等待所有请求被授予。这可以与降低
    `max_write_lock_count` 的值结合使用，以避免在繁忙的表上因外键而请求的共享元数据锁请求被延迟。（降低 `max_write_lock_count`
    不会改变本案例研究的情况。）


    如果你因外键导致锁竞争而遇到严重问题，一种可能是将保持数据一致性的责任转移到应用程序中。然而，你应该意识到，这移除了在 MySQL 层面保持数据一致性（ACID
    中的 C）的保障，因此不推荐这样做。尽管如此，在某些情况下，这可能是避免高并发系统中过度锁定的唯一方法。


    > 谨慎：虽然在应用程序中处理外键关系有助于减少数据库中的锁定，但请注意，这也削弱了一致性保证。


    此外，还存在一些并非外键特有的通用解决方案：


    *   如果锁持有时间过长（例如，由于事务被放弃），请考虑终止阻塞事务，但要记住考虑必须回滚的更改数量。

    *   记住处理因锁等待超时而失败的事务查询，这样事务就不会带着在失败语句之前获取的锁一直存在。

    *   考虑你能采取哪些措施来减少事务的持续时间和大小。

    *   使用索引以减少访问的记录数。

    *   如果适用于你的应用程序，请考虑使用 `READ COMMITTED` 事务隔离级别。


    ## 总结


    本章通过一个由外键引起的并发元数据锁和 InnoDB 锁竞争的案例研究进行了讲解。主要的讨论点是锁如何扩散到查询所使用的表之外。元数据锁尤其如此，而对于 InnoDB
    记录锁的影响较小，因为仅当涉及用于外键的列时才会获取额外的锁。


    调查锁问题的原理与不涉及外键时相同；然而，由于涉及的锁数量更多，因此更为困难；在示例中，`performance_schema.metadata_locks`
    返回了 26 个锁请求。因此，使用 `sys` 模式视图来帮助进行分析特别有用。


    除了通常减少锁问题的方法外，对于元数据锁，你可以考虑将较低的 `lock_wait_timeout` 与相对较低的 `max_write_lock_count`
    值结合使用。另一个对元数据和 InnoDB 锁都有帮助的选择是将保证外键一致性的责任留给应用程序；但是，如果你这样做，请务必非常小心，因为它无法提供像 MySQL
    处理时那样强大的保证。


    还有一个案例研究，涵盖了 InnoDB 中存在信号量等待的情况，这将在下一章中讨论。


