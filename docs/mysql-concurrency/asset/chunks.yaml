    在这个简单的例子中，几乎有 4000 个（查询 `events_waits_history_long` 结果底部的 `NULL` 行）同步对象被请求。等待的确切列表及其数量会因执行情况、系统状态（例如数据是否已在缓冲池中）和配置的不同而变化。如果有足够多的其他活动，这个数字也可能低得多，因为一些等待可能已被更新的事件从
    `events_waits_history_long` 表中推出。更复杂的是，后台线程也会产生等待事件，因此即使系统没有连接，也会创建等待事件。


    虽然设置演示单个同步对象使用的测试案例很困难，但好消息是，作为最终用户，您大多只需要关注争用，而 `SHOW ENGINE INNODB STATUS` 和
    `SHOW ENGINE INNODB MUTEX` 语句将为您提供关于 InnoDB 互斥量和信号量争用的信息。


    通常，您需要研究源代码来理解等待的原因；然而，仅考虑文件名通常可以很好地指示发生争用的功能区域。表 [7-2](#502546_1_En_7_Chapter.xhtml#Tab2)
    展示了如何将互斥量和信号量信息提供的文件名映射到功能区域的一些示例。源代码路径是相对于 `storage/innobase` 的，该目录包含了 InnoDB
    存储引擎的实现。


    ### Table 7-2: Mutex and Semaphore File Names and Their Functional Area


    | File Name | Source Code Path | Functional Area |

    | --- | --- | --- |

    | `btr0sea.cc` | `btr/btr0sea.cc` | The adaptive hash index. |

    | `buf0buf.cc` | `buf/buf0buf.cc` | The buffer pool. |

    | `buf0flu.cc` | `buf/buf0flu.cc` | The buffer pool flushing algorithm. |

    | `dict0dict.cc` | `dict/dict0dict.cc` | The InnoDB data dictionary. |

    | `sync0sharded_rw.h` | `include/sync0sharded_rw.h` | The sharded read-write lock
    for threads. |

    | `hash0hash.cc` | `ha/hash0hash.cc` | For protecting hash tables. |

    | `fil0fil.cc` | `fil/fil0fil.cc` | The tablespace memory cache. |


    除了在头文件中实现的互斥量和信号量，通常，您可以通过使用文件名中 `0` 之前的名称（例如，`btr0sea.cc` 中的 `btr`）作为目录名，然后是文件名本身，来定位到源代码文件。如果您在编辑器中打开该文件，在许可证和版权头之后，您会看到一个简短的注释，描述该文件的用途，例如，来自
    `storage/innobase/btr/btr0sea.cc`：


    ```

    /** @file btr/btr0sea.cc

    The index tree adaptive search

    Created 2/17/1996 Heikki Tuuri

    *************************************************************************/

    ```


    因此，`btr0sea.cc` 文件实现了索引树的自适应搜索，自适应哈希索引是其一部分（并且争用最常发生在这里）。


    ## WHY INNOBASE? A BRIEF HISTORY OF INNODB


    您可能感到困惑，为什么 InnoDB 源代码的路径是 `storage/innobase/`，使用的是 “innobase” 而不是 “innodb”。要理解这一点，您需要深入了解
    InnoDB 的历史——这被证明是非常有趣的。


    Innobase 是由 Heikki Tuuri（是的，与文件 `storage/innobase/btr/btr0sea.cc` 注释中列出的是同一个人）于
    1995 年创立的一家公司，同年 MySQL 初始发布，但当时两者没有任何关系。Innobase 用于开发 InnoDB，当时它意味着是一个独立的产品。直到后来
    MySQL 增加了对第三方存储引擎的支持，Heikki 才将 InnoDB 作为开源发布，并将其与 MySQL 集成。'
