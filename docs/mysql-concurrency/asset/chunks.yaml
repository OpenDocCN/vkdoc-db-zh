    The `OBJECT_TYPE` for user-level locks is `USER LEVEL LOCK`, and the lock duration
    is `EXPLICIT` as it is up to the user or application to release the lock again.
    In row 1, the connection with Performance Schema thread id `617` has been granted
    the `my_lock_1` lock, and in row 3 thread id `618` is waiting (pending) for it
    to be granted. Thread id `618` also has a granted lock which is included in row
    2. Once you are done with the investigation, remember to release the locks, for
    example, executing `SELECT RELEASE_ALL_LOCKS()` first in connection 1 and then
    in connection 2 (this happens automatically when exiting the workload using the
    MySQL Shell `concurrency_book` module).


    ## Flush Locks


    The next level of locks involves non-data table-level locks. The first of these
    that will be discussed is the flush lock.


    A flush lock will be familiar to most who have been involved in taking backups.
    It is taken when you use the `FLUSH TABLES` statement and last for the duration
    of the statement unless you add `WITH READ LOCK` in which case a shared (read)
    lock is held until the lock is explicitly released. An implicit table flush is
    also triggered at the end of the `ANALYZE TABLE` statement. The flush lock is
    a table-level lock. The read lock taken with `FLUSH TABLES WITH READ LOCK` is
    discussed later under explicit table locks.


    A common cause of lock issues for the flush lock is long-running queries. A `FLUSH
    TABLES` statement cannot flush a table as long as there is a query that has the
    table open. This means that if you execute a `FLUSH TABLES` statement while there
    is a long-running query using one or more of the tables being flushed, then the
    `FLUSH TABLES` statement will block all other statements needing any of those
    tables until the lock situation has been resolved.


    Flush locks are subject to the `lock_wait_timeout` setting. If it takes more than
    `lock_wait_timeout` seconds to obtain the lock, MySQL will abandon the lock. The
    same applies if the `FLUSH TABLES` statement is killed. However, due to the internals
    of MySQL, a lower-level lock called the table definition cache (TDC) version lock
    cannot always be released until the long-running query completes. That means that
    the only way to be sure the lock problem is resolved is to kill the long-running
    query, but be aware that if the query has changed many rows, it may take a long
    time to roll back the query.


    When there is lock contention around the flush lock, both the `FLUSH TABLES` statement
    and the queries started subsequently will have the state set to “Waiting for table
    flush.” Listing 6-3 shows an example of this involving three queries. If you are
    reproducing the scenario yourself (as opposed to using the MySQL Shell `concurrency_book`
    module), then you can change the argument to `SLEEP()` in connection 1 to give
    yourself more time to complete the example.


    ```sql

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              375         691          6

    --          2              376         692          6

    --          3              377         693          6

    --          4              378         694          6

    -- Connection 1

    Connection 1> SELECT city.*, SLEEP(3) FROM world.city WHERE ID = 130;

    -- Connection 2

    Connection 2> FLUSH TABLES world.city;

    -- Connection 3

    Connection 3> SELECT * FROM world.city WHERE ID = 201;

    -- Connection 4

    -- Query sys.session for the three threads involved in the lock situation

    Connection 4> SELECT thd_id, conn_id, state,

    current_statement

    FROM sys.session

    WHERE current_statement IS NOT NULL

    AND thd_id IN (691, 692, 693)

    ORDER BY thd_id\G

    *************************** 1\. row ***************************

    thd_id: 691

    conn_id: 375

    state: User sleep

    current_statement: SELECT city.*, SLEEP(3) FROM world.city WHERE ID = 130

    *************************** 2\. row ***************************

    thd_id: 692

    conn_id: 376

    state: Waiting for table flush

    current_statement: FLUSH TABLES world.city

    *************************** 3\. row ***************************

    thd_id: 693

    conn_id: 377

    state: Waiting for table flush

    current_statement: SELECT * FROM world.city WHERE ID = 201

    3 rows in set (0.0586 sec)

    Listing 6-3

    Example of waiting for a flush lock

    ```


    The example uses the `sys.session` view ; similar results can be obtained using
    `performance_schema.threads` and `SHOW PROCESSLIST`. In order to reduce the output
    to only include the queries of relevance for the flush lock discussion, the `WHERE`
    clause is set to only include the threads ids of the first three connections.


    The connection with `conn_id = 375` is executing a slow query that uses the `world.city`
    table (a `SLEEP(3)` was used to ensure it took enough time to execute the statements
    for the other connections). In the meantime, `conn_id = 376` executed a `FLUSH
    TABLES` statement for the `world.city` table. Because the first query still has
    the table open (it is released once the query completes), the `FLUSH TABLES` statement
    ends up waiting for the table flush lock. Finally, `conn_id = 377` attempts to
    query the table and thus must wait for the `FLUSH TABLES` statement.


    Another non-data table lock is a metadata lock.'
