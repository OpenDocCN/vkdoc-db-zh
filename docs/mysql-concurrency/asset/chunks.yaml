    There are a few things to notice from this example. After choosing the workload,
    you are asked for a password. This is the password for the MySQL account that
    you are using. The other connection options are taken from the `session.uri` property
    in MySQL Shell, but for security reasons, the password is not stored. If you execute
    multiple workloads in one invocation of `run()`, you will only be prompted for
    the password once.


    At the start of the execution of the workload, there is an overview of the process
    list ids (as from `SHOW PROCESSLIST`), the (Performance Schema) thread ids, and
    the last event ids before the start of the workload for each connection used for
    the workload:


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              105         249          6

    --          2              106         250          6

    ```


    You can use these ids to execute your own investigative queries, and you can use
    the overview to identify listings that have been implemented as a workload in
    `concurrency_book.generate.run()` .


    At the end of executing the workload, this example has three queries you can execute
    to investigate the issue the example demonstrates. You can execute one or more
    of these by specifying the number of the query (one query at a time). In the code
    listings in this book, the output of an investigation is preceded with a comment
    showing which of the investigations has been executed, for example


    ```

    -- Investigation #2

    ```


    The number of investigations per workload varies from none to more than ten. The
    listings in the book do not always include the result of all of the investigations
    as some are left as inspiration and further examination of the issue.


    Once you are done with the investigation, submit an empty answer to exit from
    the workload. If you do not want to execute more workloads, submit an empty answer
    again to exit the `run()` method .


    If you only want to execute a single workload, you can specify the name as an
    argument to `run()`. This can be particularly useful when executing a workload
    as a command given directly on the command line when invoking MySQL Shell, for
    example


    ```

    shell> mysqlsh --user=myuser --py -e "concurrency_book.generate.run(''Listing
    6-1'')"

    ```


    The remainder of this chapter describes the three schemas used for the examples
    in this book.


    ## Test Data: The world Schema


    The `world` sample database is one of the most commonly used databases for simple
    tests. It consists of three tables with a few hundred to a few thousand rows.
    This makes it a small data set which means it can easily be used even on small
    test instances.


    ### Schema


    The database consists of the `city`, `country`, and `countrylanguage` tables.
    The relationship between the tables is shown in Figure [1-3](#502546_1_En_1_Chapter.xhtml#Fig3).


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig3_HTML.jpg](images/502546_1_En_1_Chapter/502546_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    The `world` database


    The `country` table includes information about 239 countries and serves as the
    parent table in foreign keys from the `city` and `countrylanguage` tables. There
    is a total of 4079 cities in the database and 984 combinations of country and
    language.'
