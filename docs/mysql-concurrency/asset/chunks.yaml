- fmt: '### Installation


    You can download a file with the table definitions and data from [`https://dev.mysql.com/doc/index-other.html`](https://dev.mysql.com/doc/index-other.html).
    Oracle provides access to several example databases from that page in the section
    Example Databases as shown in Figure 1-4.


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig4_HTML.jpg](images/502546_1_En_1_Chapter/502546_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    The table with links to the example databases


    The downloaded file consists of a single file named `world.sql.gz` or `world.sql.zip`
    depending on whether you chose the Gzip or ZIP link. In either case, the downloaded
    archive contains a single file `world.sql`. The installation of the data is straightforward
    as all that is required is to execute the script.


    You can source the `world.sql` from either MySQL Shell or the `mysql` command-line
    client. From MySQL Shell you use the `\source` command to load the data:


    ```

    MySQL [localhost ssl] SQL> \source world.sql

    ```


    If you use the legacy `mysql` command-line client, use the `SOURCE` command instead:


    ```

    mysql> SOURCE world.sql

    ```


    In either case, add the path to the `world.sql` file if it is not located in the
    directory where you started MySQL Shell or `mysql`.


    If you prefer to use a GUI, then you can also load the `world` database using
    MySQL Workbench. While connected to the MySQL instance you want to load the `world`
    schema into, you click on File in the menu followed by Run SQL Script as shown
    in Figure 1-5.


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig5_HTML.jpg](images/502546_1_En_1_Chapter/502546_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Running an SQL script from MySQL Workbench


    This opens a file explorer where you can browse for the file. Navigate to the
    directory where you have saved the uncompressed `world.sql` file and choose it.
    The result is the dialog shown in Figure 1-6 where you can review the first part
    of the script and optionally set the default schema name and character set.


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig6_HTML.jpg](images/502546_1_En_1_Chapter/502546_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    The dialog in MySQL Workbench for reviewing the script


    In the case of the `world` schema, both the schema name and character set are
    included in the script, so there is no need to (and no effect of) setting those
    settings. Click on Run to execute the script. A dialog shows the progress information
    while MySQL executes the script. When the operation has completed, close the dialog.
    Optionally, you can refresh the list of schemas in the sidebar by clicking on
    the two arrows chasing each other as shown in Figure 1-7.


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig7_HTML.jpg](images/502546_1_En_1_Chapter/502546_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Refresh the list of schemas by clicking on the two arrows


    While the `world` schema is great for much testing because of its simplicity and
    small size, that also limits its usefulness, and sometimes a bit more complex
    database is required.


    ## Test Data: The sakila Schema


    The `sakila` database is a realistic database that contains a schema for a film
    rental business with information about the films, inventory, stores, staff, and
    customers. It adds a full text index, a spatial index, views, and stored programs
    to provide a more complete example of using MySQL features. The database size
    is still very moderate, making it suitable for small instances.


    ### Schema


    The `sakila` database consists of 16 tables, seven views, three stored procedures,
    three stored functions, and six triggers. The tables can be split into three groups,
    customer data, business, and inventory. For brevity, not all columns are included
    in the diagrams, and most indexes are not shown. Figure 1-8 shows a complete overview
    of the tables, views, and stored routines.


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig8_HTML.jpg](images/502546_1_En_1_Chapter/502546_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Overview of the `sakila` database


    The tables with customer-related data (plus addresses for staff and stores) are
    in the area in the top-left corner. The area in the lower left includes data related
    to the business, and the area in the top right contains information about the
    films and inventory. The lower right is used for the views and stored routines.


    Tip


    You can view the entire diagram (though formatted differently) by opening the
    `sakila.mwb` file included with the installation in MySQL Workbench. This is also
    a good example of how you can use enhanced entity-relationship (EER) diagrams
    in MySQL Workbench to document your schema.


    As there is a relatively large number of objects, they will be split into five
    groups (each of the table groups, views, and stored routines) when discussing
    the schema. The first group is the customer-related data with the tables shown
    in Figure 1-9.


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig9_HTML.jpg](images/502546_1_En_1_Chapter/502546_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    The tables with customer data in the `sakila` database


    There are four tables with data related to the customers. The customer table is
    the main table, and the address information is stored in the address, city, and
    country tables.


    There are foreign keys between the customer and business groups with a foreign
    key from the customer table to the store table in the business group. There are
    also four foreign keys from tables in the business group to the address and customer
    tables. The business group is shown in Figure 1-10.


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig10_HTML.jpg](images/502546_1_En_1_Chapter/502546_1_En_1_Fig10_HTML.jpg)


    Figure 1-10


    The tables with business data in the `sakila` database


    The business tables contain information about the stores, staff, rentals, and
    payments. The store and staff tables have foreign keys in both directions with
    staff belonging to a store and a store having a manager that is part of the staff.
    Rentals and payments are handled by a staff member and thus indirectly linked
    to a store, and payments are for a rental.


    The business group of tables is the one with the most relations to other groups.
    The staff and store tables have foreign keys to the address table, and the rental
    and payment tables reference the customer. Finally, the rental table has a foreign
    key to the inventory table which is in the inventory group. The diagram for the
    inventory group is shown in Figure 1-11.


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig11_HTML.jpg](images/502546_1_En_1_Chapter/502546_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    The tables with inventory data in the `sakila` database


    The main table in the inventory group is the film table which contains the metadata
    about the films the stores offer. Additionally, there is the `film_text` table
    with the title and description with a full text index.


    There is a many-to-many relationship between the film and the category and actor
    tables. Finally, there is a foreign key from the inventory table to the store
    table in the business group.


    That covers all the tables in the `sakila` database, but there are also some views
    as shown in Figure 1-12.


    ![../images/502546_1_En_1_Chapter/502546_1_En_1_Fig12_HTML.jpg](images/502546_1_En_1_Chapter/502546_1_En_1_Fig12_HTML.jpg)


    Figure 1-12'
