    SOURCE: item_func.cc:5067

    OWNER_THREAD_ID: 618

    OWNER_EVENT_ID: 9

    3 rows in set (0.0015 sec)

    列表 6-2

    列出用户级锁

    ```


    用户级锁的 `OBJECT_TYPE` 是 `USER LEVEL LOCK`，锁持续时间是 `EXPLICIT`，因为需要用户或应用程序来释放锁。在第 1
    行，性能模式线程 ID 为 `617` 的连接已被授予 `my_lock_1` 锁，而在第 3 行，线程 ID `618` 正在等待（pending）该锁被授予。线程
    ID `618` 也有一个已授予的锁，如第 2 行所示。完成调查后，请记住释放锁，例如，先在连接 1 中执行 `SELECT RELEASE_ALL_LOCKS()`，然后在连接
    2 中执行（当使用 MySQL Shell 的 `concurrency_book` 模块退出工作负载时，这会自动发生）。


    ## 刷新锁


    下一类锁涉及非数据的表级锁。首先讨论的是刷新锁。


    大多数参与过备份操作的人应该对刷新锁都很熟悉。当你使用 `FLUSH TABLES` 语句时就会获取它，其持续时间与语句执行时间相同，除非你添加了 `WITH
    READ LOCK`，这种情况下会持有共享（读）锁，直到该锁被显式释放。在 `ANALYZE TABLE` 语句结束时也会触发一个隐式的表刷新。刷新锁是一种表级锁。使用
    `FLUSH TABLES WITH READ LOCK` 获取的读锁将在后面关于显式表锁的部分讨论。


    刷新锁引发锁问题的一个常见原因是长时间运行的查询。只要有查询打开着某个表，`FLUSH TABLES` 语句就无法刷新该表。这意味着，如果你在有一个使用一个或多个待刷新表的长时间运行查询正在执行时，又执行了
    `FLUSH TABLES` 语句，那么该 `FLUSH TABLES` 语句将阻塞所有其他需要这些表中任何表的语句，直到锁情况得到解决。


    刷新锁受 `lock_wait_timeout` 设置的约束。如果获取锁的时间超过 `lock_wait_timeout` 秒，MySQL 将放弃该锁。如果
    `FLUSH TABLES` 语句被杀死，同样适用。然而，由于 MySQL 的内部机制，一个更低级别的锁（称为表定义缓存（TDC）版本锁）有时在长时间运行的查询完成前无法释放。这意味着，确保锁问题得到解决的唯一方法是杀死长时间运行的查询，但请注意，如果该查询更改了许多行，回滚查询可能需要很长时间。


    当围绕刷新锁发生锁争用时，`FLUSH TABLES` 语句和随后启动的查询都会将状态设置为“等待表刷新”。列表 6-3 显示了一个涉及三个查询的此类示例。如果你自己重现此场景（而不是使用
    MySQL Shell `concurrency_book` 模块），则可以更改连接 1 中 `SLEEP()` 的参数，以便为自己留出更多时间完成该示例。


    ```sql

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              375         691          6

    --          2              376         692          6

    --          3              377         693          6

    --          4              378         694          6

    -- 连接 1

    Connection 1> SELECT city.*, SLEEP(3) FROM world.city WHERE ID = 130;

    -- 连接 2

    Connection 2> FLUSH TABLES world.city;

    -- 连接 3

    Connection 3> SELECT * FROM world.city WHERE ID = 201;

    -- 连接 4

    -- 查询 sys.session 以查看涉及锁情况的三个线程

    Connection 4> SELECT thd_id, conn_id, state,

    current_statement

    FROM sys.session

    WHERE current_statement IS NOT NULL

    AND thd_id IN (691, 692, 693)

    ORDER BY thd_id\G

    *************************** 1\. row ***************************

    thd_id: 691

    conn_id: 375

    state: User sleep

    current_statement: SELECT city.*, SLEEP(3) FROM world.city WHERE ID = 130

    *************************** 2\. row ***************************

    thd_id: 692

    conn_id: 376

    state: Waiting for table flush

    current_statement: FLUSH TABLES world.city

    *************************** 3\. row ***************************

    thd_id: 693

    conn_id: 377

    state: Waiting for table flush

    current_statement: SELECT * FROM world.city WHERE ID = 201

    3 rows in set (0.0586 sec)

    列表 6-3

    等待刷新锁的示例

    ```


    该示例使用了 `sys.session` 视图；也可以使用 `performance_schema.threads` 和 `SHOW PROCESSLIST`
    获得类似结果。为了减少输出，使其仅包含与刷新锁讨论相关的查询，`WHERE` 子句被设置为仅包含前三个连接的线程 ID。


    `conn_id = 375` 的连接正在执行一个使用 `world.city` 表的慢查询（使用了 `SLEEP(3)` 来确保有足够的时间执行其他连接的语句）。同时，`conn_id
    = 376` 执行了针对 `world.city` 表的 `FLUSH TABLES` 语句。由于第一个查询仍然持有该表的打开状态（查询完成后才会释放），`FLUSH
    TABLES` 语句最终会等待表刷新锁。最后，`conn_id = 377` 试图查询该表，因此必须等待 `FLUSH TABLES` 语句。


    另一种非数据表锁是元数据锁。

