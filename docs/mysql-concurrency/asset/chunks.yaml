  trans: '## 概要


    本章探讨了减少锁影响的策略，策略范围从减少锁的数量及持有时间，到调整配置以降低锁的影响。


    最重要的是，你不应该持有超过必要的锁，也不应持有它们超过所需的时间。缩小事务规模及缩短完成事务所需的时间是减少锁争用最有力的两种方法。此外，通过恰当地选择索引，可以减少给定语句所需的锁数量。同样，事务隔离级别会影响锁的数量和持续时间，其中
    `READ COMMITTED` 事务隔离级别是减少锁影响的常见选择。


    关于死锁，重要的是在整个应用程序中尽可能以相同的顺序访问记录。确保这一点的一个选择是抢占式锁，但应谨慎使用，因为它会增加锁的持有时间。


    最后，调整配置以减少锁的影响。如果缓冲池、自适应哈希索引或表打开缓存上存在互斥锁争用，可以对资源进行分区，或者对于自适应哈希索引，可以完全禁用该功能。对于因外键而请求元数据读锁的
    DDL 语句，限制在授予读锁优先级之前将授予的写锁数量也可能有用。


    本章简要提及了索引和外键对锁的影响。下一章将更详细地探讨这些主题。


    脚注 1


    # 10. 索引与外键


    在上一章中，你了解了索引和外键如何影响锁定。这个话题值得进一步深入探讨，因为理解其效果非常重要。


    本章第一部分研究主索引、二级索引、升序索引、降序索引和唯一索引如何影响锁定。第二部分涵盖外键，以及它们如何影响 DML 和 DDL 语句的锁定。


    ## 索引


    简而言之，索引提供了访问给定记录的快捷方式，从而减少了需要检查的记录数量。这对锁的数量有积极影响，因为只有被访问的行才会被锁定。这正如你在上一章所见，当为
    `world.city` 表的 `Name` 列添加索引以支持按 `Name` 列过滤的查询时。当你连接表时，索引变得尤为重要，因为如果没有索引，访问的行数是连接表中行数的乘积。


    注意


    你可能会认为，随着 MySQL 8 中对哈希连接的支持，索引变得不那么重要了。虽然这对于不加锁的语句在某种程度上是正确的，但对于加锁的语句则远非如此，因为过度的锁定可能导致锁等待和死锁。如第
    11 章所讨论，锁也会消耗缓冲池中的内存，因此更多的锁意味着用于缓存数据的内存更少。同样，减少访问的行数也能减少缓冲池中页面的周转率，从而提高缓冲池命中率。


    本节首先讨论主索引与二级索引的使用，然后是升序索引与降序索引，最后是唯一索引。


    ### 主索引 vs. 二级索引


    访问行最有效的方式是通过其主键，因为这确保了只有受语句影响的行才会被访问。例如，考虑清单 10-1，它在 `world.city` 表的 `Name` 列上添加了一个二级索引，并更新了城市名为悉尼（Sydney）的人口。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              713        1171          6

    --          2              714        1172          6

    -- 连接 1

    连接 1> ALTER TABLE world.city

    ADD INDEX (Name);

    Query OK, 0 rows affected (1.3916 sec)

    Records: 0  Duplicates: 0  Warnings: 0

    连接 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    连接 1> UPDATE world.city

    SET Population = 5000000

    WHERE Name = ''Sydney'';

    Query OK, 1 row affected (0.0007 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- 连接 2

    连接 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND thread_id = 1171\G

    *************************** 1. row ***************************

    index_name: NULL

    lock_type: TABLE

    lock_mode: IX

    lock_data: NULL

    *************************** 2. row ***************************

    index_name: Name

    lock_type: RECORD

    lock_mode: X

    lock_data: ''Sydney                             '', 130

    *************************** 3. row ***************************

    index_name: PRIMARY

    lock_type: RECORD

    lock_mode: X,REC_NOT_GAP

    lock_data: 130

    *************************** 4. row ***************************

    index_name: Name

    lock_type: RECORD

    lock_mode: X,GAP

    lock_data: ''Syktyvkar                          '', 3660

    4 rows in set (0.0006 sec)

    -- 连接 1

    连接 1> ROLLBACK;

    Query OK, 0 rows affected (0.0625 sec)

    连接 1> ALTER TABLE world.city

    DROP INDEX Name;

    Query OK, 0 rows affected (0.4090 sec)

    Records: 0  Duplicates: 0  Warnings: 0)

    ```

    清单 10-1

    通过非唯一二级索引更新行


    尽管更新只影响一行，但在 `Name` 索引上存在三个排他行级锁（一个记录锁和一个间隙锁），以及在主键上的行记录锁。


    另一方面，如果你执行相同的更新，但使用主键访问该行，则只需要主键上的记录锁，如清单 10-2 所示。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              719        1180          6

    --          2              720        1181          6

    -- 连接 1

    连接 1> ALTER TABLE world.city

    ADD INDEX (Name);

