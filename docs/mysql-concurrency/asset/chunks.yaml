  trans: '

    在这种情况下，主键（`ID` 列）的值首先在更新行的事务之外获取，然后该主键值被用于 `UPDATE` 语句的 `WHERE` 子句中。结果是，唯一持有的记录级锁是针对值为
    130 的主键的排他锁。


    #### 注意

    在事务外部确定主键确实开启了在获取主键值和执行更新之间数据可能发生变化的可能性。因此，您应仅将此作为示例参考。


    除非需要更改表中的所有行，否则应力求使用索引来访问行。即使是全表更新，如果不要求更改是原子性应用的，那么对于大表而言，通过主键范围定义的小批次来应用更改是有利的。


    #### 提示

    如果您按函数进行过滤，减少检查行数的一个好方法是添加一个函数索引（在 MySQL 8.0.13 及更高版本中可用）。或者，在 MySQL 5.7 及更高版本中，您可以添加一个带有索引的生成列。


    不过，索引和锁定涉及的内容比访问的行数更多。接下来将介绍的降序索引以及后续的唯一索引也能减少锁定的数量。


    ### 升序索引与降序索引

    MySQL 8 支持降序索引，这可以提高按降序访问行时的性能。您可以使用升序索引来按降序访问行，因此在这种情况下，降序索引的主要好处在于页面内不再需要前后跳跃。这是否意味着在锁定方面，选择索引的排序没有好处呢？


    当您使用与索引记录存储顺序相反的顺序时，您将付出一个小代价，因为您需要在搜索开始时锁定间隙。清单 10-3 展示了使用升序索引，将人口最多的三个城市（现有人口在
    100 万到 200 万之间）的人口增加 10% 时持有的锁。


    ```sql

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              836        1363          6

    -- 连接 1

    Connection 1> ALTER TABLE world.city

    ADD INDEX (Population);

    Query OK, 0 rows affected (1.1838 sec)

    Records: 0  Duplicates: 0  Warnings: 0

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0005 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE Population BETWEEN 1000000 AND 2000000

    ORDER BY Population DESC

    LIMIT 3;

    Query OK, 3 rows affected (0.0014 sec)

    Rows matched: 3  Changed: 3  Warnings: 0

    -- 调查 #1

    -- 连接 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1363

    ORDER BY index_name, lock_data DESC;

    +------------+-----------+---------------+---------------+

    | index_name | lock_type | lock_mode     | lock_data     |

    +------------+-----------+---------------+---------------+

    | Population | RECORD    | X,GAP         | 2016131, 3018 |

    | Population | RECORD    | X             | 1987996, 936  |

    | Population | RECORD    | X             | 1977246, 2824 |

    | Population | RECORD    | X             | 1975294, 3539 |

    | PRIMARY    | RECORD    | X,REC_NOT_GAP | 936           |

    | PRIMARY    | RECORD    | X,REC_NOT_GAP | 3539          |

    | PRIMARY    | RECORD    | X,REC_NOT_GAP | 2824          |

    +------------+-----------+---------------+---------------+

    7 rows in set (0.0008 sec)

    清单 10-3

    使用升序索引按降序更新行

    ```


    正如预期，主键和 `Population` 索引上各有三个锁，每个更新行一个锁。这已经是尽可能优化的了。使用升序索引在锁方面的代价在于，还存在一个针对人口为
    2016131、主键设为 3018 的索引记录的间隙锁。


    #### 提示

    InnoDB 总是将主键附加到非唯一二级索引的末尾，因此从索引记录定位到行非常容易。这样做的原因是 InnoDB 根据聚簇索引组织行，并且存在显式主键时，该主键用于聚簇索引。


    关于此示例中的锁，还有两点需要注意。首先，如果您从索引末尾（人口最高的城市）开始更新，您会看到在 `supremum` 伪记录上有一个记录锁，而不是在区间的高端有一个间隙锁。这是因为
    `supremum` 伪记录不是真实记录，因此在它上面的记录锁实际上只是锁定它之前的间隙。其次，涉及的具体锁类型取决于 `WHERE` 子句，因此如果您更改或移除
    `WHERE` 子句，可能会在二级索引上看到额外的间隙锁。在使用降序索引的相同示例中，这些额外的间隙锁也会存在。


    如果您使用降序索引，锁的列表是相同的，除了间隙锁。清单 10-4 展示了此示例。


    ```sql

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              843        1374          6

    -- 连接 1

    Connection 1> ALTER TABLE world.city

    ADD INDEX (Population DESC);

    Query OK, 0 rows affected (0.8885 sec)

    Records: 0  Duplicates: 0  Warnings: 0

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0006 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE Population BETWEEN 1000000 AND 2000000

    ORDER BY Population DESC

    LIMIT 3;

    Query OK, 3 rows affected (0.0021 sec)

    Rows matched: 3  Changed: 3  Warnings: 0

    -- 调查 #1

    -- 连接 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1374

    ORDER BY index_name, lock_data DESC;

    +------------+-----------+---------------+---------------+

    | index_name | lock_type | lock_mode     | lock_data     |

    +------------+-----------+---------------+---------------+

    | Population | RECORD    | X             | 1987996, 936  |

    | Population | RECORD    | X             | 1977246, 2824 |

    | Population | RECORD    | X             | 1975294, 3539 |

    | PRIMARY    | RECORD    | X,REC_NOT_GAP | 936           |

    | PRIMARY    | RECORD    | X,REC_NOT_GAP | 3539          |

    | PRIMARY    | RECORD    | X,REC_NOT_GAP | 2824          |

    +------------+-----------+---------------+---------------+

    6 rows in set (0.0008 sec)

    清单 10-4

    使用降序索引按降序更新行

    ```


    结论是，对于数据的降序访问，降序索引的主要好处在于数据访问更具顺序性所带来的性能提升，而不是减少锁定。然而，话虽如此，如果您在更新或删除数据时有很多降序范围扫描，您也将受益于更少的间隙锁。


    另一种能减少锁定的索引类型是唯一索引。

    '
- fmt: "### Unique Indexes\n\n唯一索引与等效非唯一索引相比，其主要目的是增加约束：每个值只允许出现一次。因此，表面上看，唯一索引似乎与之前已讨论的锁机制关系不大。然而，`InnoDB`\
    \ 可以利用这一点，即对于给定的等值条件，最多只有一条记录（值为`NULL`时除外）可以存在，并用它来减少所需的锁数量。\n\n例如，考虑两个表 `_tmp_city1`\
    \ 和 `_tmp_city2`，它们包含来自 `world.city` 表的相同行子集。`_tmp_city1` 表在 `Name` 列上有一个非唯一索引，而\
    \ `_tmp_city2` 表在该列上有一个唯一索引。然后使用 `Name` 列上的条件更新单行。清单 [10-5](#502546_1_En_10_Chapter.xhtml#PC5)\
    \ 展示了此操作。\n\n```\n-- Connection   Processlist ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
    --          1              736        1209          6\n--          2         \
    \     737        1210          6\n-- Connection 1\nConnection 1> DROP TABLE IF\
    \ EXISTS world._tmp_city1;\nQuery OK, 0 rows affected (0.0643 sec)\nNote (code\
    \ 1051): Unknown table 'world._tmp_city1'\nConnection 1> CREATE TABLE world._tmp_city1\n\
    SELECT *\nFROM world.city\nWHERE CountryCode = 'AUS';\nQuery OK, 14 rows affected\
    \ (1.3112 sec)\nRecords: 14  Duplicates: 0  Warnings: 0\nConnection 1> ALTER TABLE\
    \ world._tmp_city1\nADD PRIMARY KEY (ID),\nADD INDEX (Name);\nQuery OK, 0 rows\
    \ affected (2.5572 sec)\nRecords: 0  Duplicates: 0  Warnings: 0\nConnection 1>\
    \ START TRANSACTION;\nQuery OK, 0 rows affected (0.0002 sec)\nConnection 1> UPDATE\
    \ world._tmp_city1\nSET Population = 5000000\nWHERE Name = 'Sydney';\nQuery OK,\
    \ 1 row affected (0.0007 sec)\nRows matched: 1  Changed: 1  Warnings: 0\n-- Connection\
    \ 2\nConnection 2> DROP TABLE IF EXISTS world._tmp_city2;\nQuery OK, 0 rows affected\
    \ (0.1361 sec)\nNote (code 1051): Unknown table 'world._tmp_city2'\nConnection\
