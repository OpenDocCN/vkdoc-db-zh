    ### 难以捉摸的间隙锁


    MySQL 历史上一次更棘手的 bug 搜寻发生在 MySQL 5.7 和正式发布前的 MySQL 8 中。在复制设置中使用 XA 事务时，副本上会随机出现锁等待超时和死锁，且这些阻塞完全是由复制流量本身引起的。源库上没有任何锁问题，这怎么可能呢？


