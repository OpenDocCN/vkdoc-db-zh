  trans: '### 语句和错误表


    Performance Schema 包含多个可用于调查所遇错误的表。由于获取锁失败（无论是由于超时还是死锁）会触发错误，因此您可以查询与锁相关的错误，以确定哪些语句、账户等受锁争用的影响最大。


    在单个语句级别，您可以使用 `events_statements_current`、`events_statements_history` 和 `events_statements_history_long`
    表来查看是否发生了任何错误或特定错误。前两个表默认启用，而 `events_statements_history_long` 表需要您启用 `events_statements_history_long`
    消费者。代码清单 2-4 展示了一个锁等待超时的示例以及它如何显示在 `events_statements_history` 表中。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1               63         179          6

    --          2               64         180          6

    -- 连接 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    Query OK, 1 row affected (0.0011 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- 连接 2

    Connection 2> SET SESSION innodb_lock_wait_timeout = 1;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    ERROR: 1205: Lock wait timeout exceeded; try restarting transaction

    Connection 2> SELECT thread_id, event_id,

    FORMAT_PICO_TIME(lock_time) AS lock_time,

    sys.format_statement(SQL_TEXT) AS statement,

    digest, mysql_errno,

    returned_sqlstate, message_text, errors

    FROM performance_schema.events_statements_history

    WHERE thread_id = PS_CURRENT_THREAD_ID()

    AND mysql_errno > 0\G

    *************************** 1\. row ***************************

    thread_id: 180

    event_id: 10

    lock_time: 271.00 us

    statement: UPDATE world.city    SET Popul ... Population + 1  WHERE ID = 130

    digest: 3e9795ad6fc0f4e3a4b4e99f33fbab2dc7b40d0761a8adbc60abfab02326108d

    mysql_errno: 1205

    returned_sqlstate: HY000

    message_text: Lock wait timeout exceeded; try restarting transaction

    errors: 1

    1 row in set (0.0016 sec)

    -- 连接 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0472 sec)

    -- 连接 2

    Connection 2> ROLLBACK;

    Query OK, 0 rows affected (0.0003 sec)

    代码清单 2-4

    语句表中锁错误的示例

    ```


    这个示例中有几点值得注意。首先是锁时间仅为 271 微秒，尽管实际上在锁等待超时发生前等待了整整一秒钟。也就是说，在 InnoDB 内部等待记录锁并不会增加
    Performance Schema 报告的锁时间，因此您不能用它来调查记录级锁争用。


    其次是 `mysql_errno`、`returned_sqlstate` 和 `message_text` 包含了与返回给客户端相同的错误信息，这使得它非常适合进行查询，正如本例中所做的那样。第三，`errors`
    列包含了遇到的错误数量的计数。虽然计数本身并未说明错误的性质，但它很有用，因为与包含错误具体信息的列不同，错误计数器也存在于语句摘要表中，因此您可以使用它来查找遇到任何类型错误的语句。


    **提示**


    在应用程序中记录遇到的错误会很有用。然后，例如，您可以使用像 Splunk 这样的服务分析应用程序日志，生成报告显示遇到了哪些错误以及它们何时成为问题。


    在此上下文中，一组特别值得关注的摘要表是汇总错误的表。这样的表有五个，分别按账户、主机、线程、用户和全局进行分组：


    ```

    mysql> SHOW TABLES FROM performance_schema LIKE ''%error%'';

    +-------------------------------------------+

    | Tables_in_performance_schema (%error%)    |

    +-------------------------------------------+

    | events_errors_summary_by_account_by_error |

    | events_errors_summary_by_host_by_error    |

    | events_errors_summary_by_thread_by_error  |

    | events_errors_summary_by_user_by_error    |

    | events_errors_summary_global_by_error     |

    +-------------------------------------------+

    5 rows in set (0.0012 sec)

    ```


    例如，要检索锁等待超时和死锁的统计数据：


    ```

    mysql> SELECT *

    FROM performance_schema.events_errors_summary_global_by_error

    WHERE error_name IN (''ER_LOCK_WAIT_TIMEOUT'',

    ''ER_LOCK_DEADLOCK'')\G

    *************************** 1\. row ***************************

    ERROR_NUMBER: 1205

    ERROR_NAME: ER_LOCK_WAIT_TIMEOUT

    SQL_STATE: HY000

    SUM_ERROR_RAISED: 4

    SUM_ERROR_HANDLED: 0

    FIRST_SEEN: 2020-06-28 11:33:10

    LAST_SEEN: 2020-06-28 11:49:30

    *************************** 2\. row ***************************

    ERROR_NUMBER: 1213

    ERROR_NAME: ER_LOCK_DEADLOCK

    SQL_STATE: 40001

    SUM_ERROR_RAISED: 3

    SUM_ERROR_HANDLED: 0

    FIRST_SEEN: 2020-06-27 12:06:38

    LAST_SEEN: 2020-06-27 12:54:27

    2 rows in set (0.0048 sec)

    ```


    虽然这不能帮助您识别哪些语句遇到了错误，但它可以帮助您监控遇到错误的频率，从而确定锁错误是否变得更加频繁。


    **提示**


    `events_errors_summary_global_by_error` 表从 MySQL 启动之时起，就填充了所有已知的错误，即使该错误尚未遇到。因此，您可以随时安全地查询特定错误，包括使用该表根据名称查找错误编号。


    Performance Schema 表中的数据是原始数据，无论是单个事件还是聚合数据。通常，当您调查锁问题或监控锁问题时，更重要的是确定是否存在任何锁等待，或者获取一个报告，显示等待事件中花费时间最多的部分。为此，您需要使用
    `sys` 模式。


    ## sys 模式


    `sys` 模式可以被视为一系列视图的集合，这些视图作为 Performance Schema 和 Information Schema 的报告，以及各种实用函数和过程。对于本次讨论，重点放在两个视图上，它们获取
    Performance Schema 表中的信息，并返回因为另一个锁而导致某个锁无法授予的锁对。因此，它们展示了锁等待存在问题的地方。这两个视图是 `innodb_lock_waits`
    和 `schema_table_lock_waits`。


    `innodb_lock_waits` 视图使用 Performance Schema 中的 `data_locks` 和 `data_lock_waits`
    视图，返回所有 InnoDB 记录锁的锁等待情况。它显示诸如连接试图获取什么锁、涉及哪些连接和查询等信息。该视图也以 `x$innodb_lock_waits`
    的形式存在，如果您需要未格式化的信息。


    `schema_table_lock_waits` 视图以类似的方式工作，但它使用 `metadata_locks` 表返回与模式对象相关的锁等待。该信息也可以在
    `x$schema_table_lock_waits` 视图中以未格式化的形式获取。


    **提示**


    还存在多个视图，其名称前加了 `x$`。该视图包含与不带 `x$` 的名称的视图相同的信息，只是所有数据都未格式化。这使得数据更适合处理信息的脚本和程序。


    第 13 至 17 章包含了使用这两个视图调查锁问题的示例。


    为了获得争用情况的高级视图，您也可以使用状态计数器和 InnoDB 指标。'
- fmt: '## Status Counters and InnoDB Metrics


    There are several status counters and InnoDB metrics that provide information
    about locking. These are mostly used at the global (instance) level and can be
    useful to detect an overall increase in lock issues.


    ### Querying the Data


    There are two sources for status counters and InnoDB metrics. The global status
    counters can be found in the `performance_schema.global_status` table or with
    the `SHOW GLOBAL STATUS` statement. The InnoDB metrics are found in the `information_schema.INNODB_METRICS`
    view.


    The InnoDB metrics are similar to the global status variables and can provide
    some valuable information on status of InnoDB. The `NAME` column can be used to
    query the metric by name. At the time of writing, there are 313 visible metrics
    of which 74 are enabled by default. There is also one hidden metric which is the
    `latch` metric that controls whether mutex wait statistics are collected. The
    metrics are grouped into subsystems (the `SUBSYSTEM` column), and for each metric
    there is a description of what the metric measures in the `COMMENT` column, and
    the type of metric (counter, value, etc.) can be seen in the `TYPE` column.


    A great way to monitor all of these metrics together is to use the `sys.metrics`
    view. Listing [2-5](#502546_1_En_2_Chapter.xhtml#PC10) shows an example of retrieving
    the metrics.


    ```sql

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               27          69          6

    -- Connection 1

    mysql> SELECT Variable_name,

    Variable_value AS Value,

    Enabled

    FROM sys.metrics

    WHERE Variable_name LIKE ''innodb_row_lock%''

    OR Variable_name LIKE ''Table_locks%''

    OR Variable_name LIKE ''innodb_rwlock_%''

    OR Type = ''InnoDB Metrics - lock'';

    +-------------------------------+--------+---------+

    | Variable_name                 | Value  | Enabled |

    +-------------------------------+--------+---------+

    | innodb_row_lock_current_waits | 0      | YES     |

    | innodb_row_lock_time          | 2163   | YES     |

    | innodb_row_lock_time_avg      | 721    | YES     |

    | innodb_row_lock_time_max      | 2000   | YES     |

    | innodb_row_lock_waits         | 3      | YES     |

    | table_locks_immediate         | 330    | YES     |

    | table_locks_waited            | 0      | YES     |

    | lock_deadlock_false_positives | 0      | YES     |

    | lock_deadlock_rounds          | 37214  | YES     |

    | lock_deadlocks                | 1      | YES     |

    | lock_rec_grant_attempts       | 1      | YES     |

    | lock_rec_lock_created         | 0      | NO      |

    | lock_rec_lock_removed         | 0      | NO      |

    | lock_rec_lock_requests        | 0      | NO      |

    | lock_rec_lock_waits           | 0      | NO      |

    | lock_rec_locks                | 0      | NO      |

    | lock_rec_release_attempts     | 24317  | YES     |

    | lock_row_lock_current_waits   | 0      | YES     |

    | lock_schedule_refreshes       | 37214  | YES     |

    | lock_table_lock_created       | 0      | NO      |

    | lock_table_lock_removed       | 0      | NO      |

    | lock_table_lock_waits         | 0      | NO      |

    | lock_table_locks              | 0      | NO      |

    | lock_threads_waiting          | 0      | YES     |

    | lock_timeouts                 | 1      | YES     |

    | innodb_rwlock_s_os_waits      | 12248  | YES     |

    | innodb_rwlock_s_spin_rounds   | 19299  | YES     |

    | innodb_rwlock_s_spin_waits    | 6811   | YES     |

    | innodb_rwlock_sx_os_waits     | 171    | YES     |

    | innodb_rwlock_sx_spin_rounds  | 5239   | YES     |

    | innodb_rwlock_sx_spin_waits   | 182    | YES     |

    | innodb_rwlock_x_os_waits      | 26283  | YES     |

    | innodb_rwlock_x_spin_rounds   | 774745 | YES     |

    | innodb_rwlock_x_spin_waits    | 12666  | YES     |

    +-------------------------------+--------+---------+

    34 rows in set (0.0174 sec)

    ```


    Listing 2-5 Lock metrics


    The `innodb_row_lock_%` , `lock_deadlocks` , and `lock_timeouts` metrics are the
    most interesting. The row lock metrics show how many locks are currently waiting
    and statistics for the amount of time in milliseconds spent on waiting to acquire
    InnoDB record locks. The `lock_deadlocks` and `lock_timeouts` metrics show the
    number of deadlocks and lock wait timeouts that have been encountered, respectively.


    If you encounter InnoDB mutex or semaphore contention, then the `innodb_rwlock_%`
    metrics are useful to monitor the rate the waits happen and how many rounds that
    are spent waiting.


    As you can see, not all of the metrics are enabled by default (these are all InnoDB
    metrics), so let’s investigate how it is possible to enable and disable the metrics
    that come from the `INNODB_METRICS` view.'
