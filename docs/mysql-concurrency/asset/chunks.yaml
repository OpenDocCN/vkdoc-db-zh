- fmt: '# MySQL死锁分析案例


    死锁发生于服务器时间的2020年8月7日20:08:55。你可以利用此信息来判断这是否与用户报告的死锁为同一事件。


    ## 事务分析


    有趣的部分在于两个事务的信息。可以看到，事务1正在更新`Code = ''AUS''`的国家人口：


    ```sql

    UPDATE world.country SET Population = Population * 1.10 WHERE Code = ''AUS''

    ```


    事务2则试图插入一个新城市：


    ```sql

    INSERT INTO world.city VALUES (4080, ''Darwin'', ''AUS'', ''Northern Territory'',
    146000)

    ```


    这是一个涉及多张表的死锁案例。虽然两个查询操作不同的表，但这本身并不能证明有更多查询参与，因为外键可以触发一个查询锁定两张表。然而在此案例中，`Code`列是`country`表的主键，且涉及的唯一外键是从`city`表的`CountryCode`列指向`country`表`Code`列的外键（使用`world`示例数据库展示这一点留给读者作为练习）。因此，两个查询自身发生死锁的可能性不大。


    > **注意**

    >

    > 在MySQL 8.0.17及更早版本中，死锁信息包含的锁相关信息较少。如果你仍在使用更早的版本，升级将使调查死锁更容易。


    ## 锁等待分析


    接下来要观察的是正在等待哪些锁。事务1正在等待`country`表主键上的排他锁：


    ```

    RECORD LOCKS space id 1924 page no 5 n bits 120 index PRIMARY of table `world`.`country`
    trx id 537544 lock_mode X locks rec but not gap waiting

    ```


    主键的值可以在随后的信息中找到。这些信息可能看起来有些令人不知所措，因为`InnoDB`包含了与该记录相关的所有信息。由于这是一条主键记录，整行数据都被包含在内。这对于理解行中的数据非常有用，特别是当主键本身不携带这些信息时，但初次看到可能会感到困惑。`country`表的主键是表的第一列，因此锁请求所请求的主键值就包含在记录信息的第一行：


    ```

    0: len 3; hex 415553; asc AUS;;

    ```


    `InnoDB`以十六进制表示法包含该值，但也尝试将其解码为字符串，因此这里可以清楚地看到值为“AUS”，这并不令人惊讶，因为它也出现在查询的`WHERE`子句中。情况并非总是如此明显，因此你应该始终从锁输出中确认该值。你还可以从信息中看到该列在索引中按升序排序。


    事务2正在等待`city`表`CountryCode`索引上的插入意向锁：


    ```

    RECORD LOCKS space id 1923 page no 14 n bits 1272 index CountryCode of table `world`.`city`
    trx id 537545 lock_mode X locks gap before rec insert intention waiting

    ```


    你可以看到锁请求涉及记录前的间隙。这种情况下锁信息更简单，因为`CountryCode`索引只有两列——`CountryCode`列和主键（`ID`列），因为`CountryCode`索引是一个非唯一的二级索引。该索引实际上是(`CountryCode`,
    `ID`)，记录前的间隙值如下：


    ```

    0: len 3; hex 415554; asc AUT;;

    1: len 4; hex 800005f3; asc     ;;

    ```


    这显示`CountryCode`的值为“AAUT”，考虑到在字母升序排序中它是继“AUS”之后的下一个值，这并不令人惊讶。`ID`列的十六进制值为0x5f3，即十进制的1523。如果你查询`CountryCode
    = AUT`的城市并按`CountryCode`索引排序，可以看到`ID = 1523`是找到的第一个城市：


    ```sql

    -- Investigation #3

    Connection 3> SELECT *

    FROM world.city

    WHERE CountryCode = ''AUT''

    ORDER BY CountryCode, ID

    LIMIT 1;

    +------+------+-------------+----------+------------+

    | ID   | Name | CountryCode | District | Population |

    +------+------+-------------+----------+------------+

    | 1523 | Wien | AUT         | Wien     |    1608144 |

    +------+------+-------------+----------+------------+

    1 row in set (0.2673 sec)

    ```


    到目前为止，一切顺利。由于事务正在等待这些锁，自然可以推断出另一个事务持有该锁。在8.0.18及更高版本中，`InnoDB`包含了两个事务持有的所有锁的完整列表；在早期版本中，`InnoDB`只为其中一个事务明确包含此信息，因此你需要确定这些事务还执行了哪些其他查询。


    ## 调查方法


    根据现有信息，你可以做一些有根据的猜测。例如，`INSERT`语句被`CountryCode`索引上的间隙锁阻塞了。一个可能获取该间隙锁的查询示例是使用条件`CountryCode
    = ''AUS''`的查询。死锁信息还包含有关拥有这两个事务的连接信息，这可能会有所帮助：


    ```

    MySQL thread id 762, OS thread handle 10344, query id 3282590 localhost ::1 root
    updating

    MySQL thread id 763, OS thread handle 37872, query id 3282591 localhost ::1 root
    update

    ```


    你可以看到两个连接都是使用`root@localhost`账户建立的。如果你确保为每个应用程序和角色使用不同的用户，该账户可能有助于缩小执行事务的人员范围。


    如果连接仍然存在，你还可以使用`Performance Schema`中的`events_statements_history`表来查找该连接执行的最新查询。根据连接是否用于更多查询，这些查询可能并非涉及死锁的查询，但可能仍然提供关于该连接用途的线索。如果连接已不存在，你原则上可以在`events_statements_history_long`表中查找这些查询，但你需要将“MySQL
    thread id”（连接ID）映射到`Performance Schema`线程ID，而目前没有简单的方法可以做到这一点。此外，`events_statements_history_long`消费者默认不启用。


    在此特定案例中，两个连接仍然存在，且回滚事务后未执行任何其他操作。清单[16-3]展示了如何查找涉及事务的查询。请注意，在真实案例中，查询可能返回比此处显示的更多的行，因为无法对`event_id`添加过滤器。


    ## 结论


    通过分析死锁日志中的事务操作、锁等待信息和连接详情，可以有效地诊断出死锁的根因，即事务间对`country`表主键和`city`表二级索引上间隙锁的循环等待。'
  raw: 'The deadlock occurred on August 7, 2020, at 20:08:55 in the server time zone.
    You can use this information to see if the information is for the same deadlock
    as the deadlock reported by a user.


    The interesting part is the information for the two transactions. You can see
    that transaction 1 was updating the population of the country with `Code = ''AUS''`:


    ```

    UPDATE world.country SET Population = Population * 1.10 WHERE Code = ''AUS''

    ```


    Transaction 2 was attempting to insert a new city:


    ```

    INSERT INTO world.city VALUES (4080, ''Darwin'', ''AUS'', ''Northern Territory'',
    146000)

    ```


    This is a case where the deadlock involved multiple tables. While the two queries
    work on different tables, it cannot on its own prove that there are more queries
    involved as a foreign key can trigger one query to take locks on two tables. In
    this case though, the `Code` column is the primary key of the `country` table,
    and the only foreign key involved is from the `CountryCode` column on the `city`
    table to the `Code` column of the `country` table (showing this is left as an
    exercise for the reader using the `world` sample database). So it is not likely
    that two queries deadlock on their own.


    Note


    In MySQL 8.0.17 and earlier, the deadlock information contained less information
    about the locks involved. If you are still using an earlier release, upgrading
    will make it easier to investigate deadlocks.


    The next thing to observe is what locks are being waited on. Transaction 1 waits
    for an exclusive lock on the primary key of the `country` table:


    ```

    RECORD LOCKS space id 1924 page no 5 n bits 120 index PRIMARY of table `world`.`country`
    trx id 537544 lock_mode X locks rec but not gap waiting

    ```


    The value of the primary key can be found in the information that follows this
    information. It can seem a little overwhelming as InnoDB includes all the information
    related to the record. Since it is a primary key record, the whole row is included.
    This is useful to understand what data is in the row, particularly if the primary
    key does not carry that information on its own, but it can be confusing when you
    see it the first time. The primary key of the `country` table is the first column
    of the table, so it is the first line of the record information that contains
    the value of the primary key the lock is requesting:


    ```

    0: len 3; hex 415553; asc AUS;;

    ```


    InnoDB includes the value in hexadecimal notation, but also tries to decode it
    as a string, so here it is clear that the value is “AUS”, which is not surprising
    since that is also in the `WHERE` clause of the query. It is not always that obvious,
    so you should always confirm the value from the lock output. You can also see
    from the information that the column is sorted in ascending order in the index.


    Transaction 2 waits for an insert intention lock on the `CountryCode` index of
    the `city` table:


    ```

    RECORD LOCKS space id 1923 page no 14 n bits 1272 index CountryCode of table `world`.`city`
    trx id 537545 lock_mode X locks gap before rec insert intention waiting

    ```


    You can see the lock request involves a gap before record. The lock information
    is simpler in this case as there are only two columns in the `CountryCode` index –
    the `CountryCode` column and the primary key (`ID` column) since the `CountryCode`
    index is a nonunique secondary index. The index is effectively (`CountryCode`,
    `ID`), and the values for the gap before record are as follows:


    ```

    0: len 3; hex 415554; asc AUT;;

    1: len 4; hex 800005f3; asc     ;;

    ```


    This shows that the value of the `CountryCode` is “AUT” which is not all that
    surprising given it is the next value after “AUS” when sorting in alphabetical
    ascending order. The value for the `ID` column is the hex value 0x5f3 which in
    decimal is 1523\. If you query for cities with `CountryCode = AUT` and sort them
    in order of the `CountryCode` index, you can see that `ID = 1523` is the first
    city found:


    ```

    -- Investigation #3

    Connection 3> SELECT *

    FROM world.city

    WHERE CountryCode = ''AUT''

    ORDER BY CountryCode, ID

    LIMIT 1;

    +------+------+-------------+----------+------------+

    | ID   | Name | CountryCode | District | Population |

    +------+------+-------------+----------+------------+

    | 1523 | Wien | AUT         | Wien     |    1608144 |

    +------+------+-------------+----------+------------+

    1 row in set (0.2673 sec)

    ```


    So far, so good. Since the transactions are waiting for these locks, it can of
    course be inferred that the other transaction holds the lock. In version 8.0.18
    and later, InnoDB includes the full list of locks held by both transactions; in
    earlier versions, InnoDB only includes this explicitly for one of the transactions,
    so you need to determine what other queries the transactions have executed.


    From the information available, you can make some educated guesses. For example,
    the `INSERT` statement is blocked by a gap lock on the `CountryCode` index. An
    example of a query that would take that gap lock is a query using the condition
    `CountryCode = ''AUS''`. The deadlock information also includes information about
    the two connections owning the transactions which may help you:


    ```

    MySQL thread id 762, OS thread handle 10344, query id 3282590 localhost ::1 root
    updating

    MySQL thread id 763, OS thread handle 37872, query id 3282591 localhost ::1 root
    update

    ```


    You can see both connections were made using the `root@localhost` account. If
    you ensure to have different users for each application and role, the account
    may help you to narrow down who executed the transactions.


    If the connections still exist, you can also use the `events_statements_history`
    table in the Performance Schema to find the latest queries executed by the connection.
    This may not be those involved in the deadlock, depending on whether the connection
    has been used for more queries, but may nevertheless provide a clue to what the
    connection is used for. If the connections no longer exist, you may in principle
    be able to find the queries in the `events_statements_history_long` table, but
    you will need to map the “MySQL thread id” (the connection ID) to the Performance
    Schema thread ID which there is no trivial way to do. Also, the `events_statements_history_long`
    consumer is not enabled by default.


    In this particular case, both connections are still present, and they have not
    done anything other than rolling back the transactions. Listing [16-3](#502546_1_En_16_Chapter.xhtml#PC14)
    shows how you can find the queries involved in the transactions. Be aware that
    in real-world cases, the queries may return more rows than shown here as it is
    not possible to add a filter on the `event_id`.'
