  trans: '## 锁兼容性


    锁兼容性矩阵定义了两个锁请求是否会相互冲突。意向锁的引入使得这个问题比简单的“共享锁彼此兼容，排他锁与其他任何锁都不兼容”要复杂一些。


    两种意向锁总是彼此兼容的。这意味着即使一个事务持有了意向排他锁，它也不会阻止另一个事务获取意向锁。然而，它会阻止另一个事务将其意向锁升级为完整的锁。表 5-1
    显示了锁类型之间的兼容性。共享锁用 `S` 表示，排他锁用 `X` 表示。意向锁带有 `I` 前缀，因此 `IS` 是意向共享锁，`IX` 是意向排他锁。


    表 5-1: InnoDB 锁兼容性


    |   | 排他锁 (`X`) | 意向排他锁 (`IX`) | 共享锁 (`S`) | 意向共享锁 (`IS`) |

    | --- | --- | --- | --- | --- |

    | **排他锁 (`X`)** | ✘ | ✘ | ✘ | ✘ |

    | **意向排他锁 (`IX`)** | ✘ | ✔ | ✘ | ✔ |

    | **共享锁 (`S`)** | ✘ | ✘ | ✔ | ✔ |

    | **意向共享锁 (`IS`)** | ✘ | ✔ | ✔ | ✔ |


    在表中，勾号 ✔ 表示两个锁是兼容的，而叉号 ✘ 表示两个锁会相互冲突。意向锁唯一的冲突对象是排他锁和共享锁。排他锁与所有其他锁（包括两种意向锁类型）都冲突。共享锁仅与排他锁和意向排他锁冲突。


    这听起来相当简单；然而，这只适用于两种相同类型的锁。当开始在 InnoDB 层面包含不同的锁时，情况就变得更复杂了，这将在第 8 章讨论锁争用时进行探讨。


    这一切都是由 MySQL 和 InnoDB 自动处理的；但是，在调查锁问题时，你需要理解这些规则。


    ## 本章小结


    本章讨论了 MySQL 锁的访问级别。锁可以是共享锁、排他锁、意向共享锁或意向排他锁。


    共享锁用于对资源的读访问，并允许多个线程并发访问同一资源。另一方面，排他锁一次只允许单个线程访问资源，这使得更新资源变得安全。意向锁是 InnoDB 的一个概念，它允许
    InnoDB 以更少的阻塞请求来解析锁请求。所有意向锁彼此兼容，即使是意向排他锁，但意向排他锁会阻塞共享锁。


    在本章以及前几章中，你还遇到了锁如何保护不同资源（如表和记录）的示例。在下一章中，我们将学习更多关于高级锁访问类型的知识，例如表锁和元数据锁。


    # 6. 高级锁类型


    在上一章中，你学习了共享和排他访问级别。原则上，你可以构建一个只由一种锁类型组成的锁定系统，这种锁可以是共享的或排他的。但这将意味着它必须在实例级工作，因此在允许数据的并发读写访问方面表现会非常差。在本章和下一章中，你将学习根据它们所保护的资源的不同，存在多种锁类型。虽然这确实使锁定变得更加复杂，但它也允许更细粒度的锁，从而支持更高的并发性。


    本章讨论 MySQL 中的高级锁，从用户级锁开始，遍历在 MySQL 层面（即存储引擎之上）处理的各种锁类型。其中包括刷新锁、元数据锁、显式和隐式表锁（这是一个例外，由
    InnoDB 处理）、备份锁和日志锁。


    ## 用户级锁


    用户级锁是一种显式锁类型，应用程序可以使用它来保护工作流等。它们不常用，但对于一些需要序列化访问的复杂任务可能很有用。所有用户锁都是排他锁，通过一个最长可达
    64 个字符的名称来获取。


    你可以使用一组函数来操作用户级锁：


    *   `GET_LOCK(name, timeout)`: 通过指定锁的名称来获取锁。第二个参数是 `timeout`，单位为秒；如果在指定时间内未获取到锁，函数返回
    `0`。如果成功获取锁，返回值为 `1`。如果 `timeout` 为负数，函数将无限期等待锁变为可用。

    *   `IS_FREE_LOCK(name)`: 检查指定的锁是否可用。如果锁可用，函数返回 `1`；如果不可用，返回 `0`。

    *   `IS_USED_LOCK(name)`: 这是 `IS_FREE_LOCK()` 函数的反向操作。如果锁正在使用中（不可用），函数返回持有该锁的连接
    ID；如果未使用（可用），返回 `NULL`。

    *   `RELEASE_ALL_LOCKS()`: 释放连接持有的所有用户级锁。返回值是释放的锁的数量。

    *   `RELEASE_LOCK(name)`: 释放提供的 `name` 的锁。如果锁被释放，返回值为 `1`；如果锁存在但不属于该连接，返回 `0`；如果锁不存在，返回
    `NULL`。


    可以通过多次调用 `GET_LOCK()` 来获取多个锁。如果这样做，请小心确保所有用户都以相同的顺序获取锁，否则可能会发生死锁。如果发生死锁，将返回 `ER_USER_LOCK_DEADLOCK`
    错误（错误代码 3058）。清单 6-1 显示了一个这样的例子。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              322         617          6

    --          2              323         618          6

    -- 连接 1

    Connection 1> SELECT GET_LOCK(''my_lock_1'', -1);

    +---------------------------+

    | GET_LOCK(''my_lock_1'', -1) |

    +---------------------------+

    |                         1 |

    +---------------------------+

    1 row in set (0.0003 sec)

    -- 连接 2

    Connection 2> SELECT GET_LOCK(''my_lock_2'', -1);

    +---------------------------+

    | GET_LOCK(''my_lock_2'', -1) |

    +---------------------------+

    |                         1 |

    +---------------------------+

    1 row in set (0.0003 sec)

    Connection 2> SELECT GET_LOCK(''my_lock_1'', -1);

    -- 连接 1

    Connection 1> SELECT GET_LOCK(''my_lock_2'', -1);

    ERROR: 3058: Deadlock found when trying to get user-level lock; try rolling back
    transaction/releasing locks and restarting lock acquisition.

    清单 6-1: 用户级锁的死锁

    ```


    当连接 2 尝试获取 `my_lock_1` 锁时，该语句将阻塞，直到连接 1 尝试获取 `my_lock_2` 锁，从而触发死锁。如果你获取了多个锁，应该准备好处理死锁。请注意，对于用户级锁，死锁不会触发事务回滚。


    已授予和待处理的用户级锁可以在 `performance_schema.metadata_locks` 表中找到，其中 `OBJECT_TYPE` 列设置为
    `USER LEVEL LOCK`，如清单 6-2 所示。列出的锁假设系统状态与清单 6-1 中的死锁触发时相同。请注意，像 `OBJECT_INSTANCE_BEGIN`
    这样的值对你来说会有所不同，你必须将 `WHERE` 子句中的 `owner_thread_id` 改为匹配你清单 6-1 中的值。


    ```

    SELECT * FROM performance_schema.metadata_locks

    WHERE OBJECT_TYPE = ''USER LEVEL LOCK'';

    ```


    **清单 6-2:** 查询用户级锁'
