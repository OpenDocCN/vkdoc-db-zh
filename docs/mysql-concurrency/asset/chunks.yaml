    Appendix A includes an overview of the sections that the report consists of.


    Near the top is the section `LATEST DETECTED DEADLOCK` which includes details
    of the transactions and locks involved in the latest deadlock and when it occurred.
    If no deadlocks have occurred since the last restart of MySQL, this section is
    omitted. Chapter [16](#502546_1_En_16_Chapter.xhtml) includes an example of investigating
    deadlocks.


    ### Note

    The deadlock section in the InnoDB monitor output only includes information for
    deadlocks involving InnoDB record locks. For deadlocks involving non-InnoDB locks
    such as user-level locks, there is no equivalent information.


    ## TRANSACTIONS


    A little further down the output, there is the section `TRANSACTIONS` which lists
    the InnoDB transactions. Do note that transactions that are not holding any locks
    (e.g., pure `SELECT` queries) are not included. In the example, there is an intention
    exclusive lock held on the `world.city` table and exclusive locks on the rows
    with the primary key equal to 3805 (the `80000edd` in the record lock information
    for the first field means the row with the value `0xedd`, which is the same as
    3805 in decimal notation) and 130 (`80000082`).


    ### Tip

    Nowadays, the lock information in the InnoDB monitor output is better obtained
    from the `performance_schema.data_locks` and `performance_schema.data_lock_waits`
    tables. The deadlock information is however still very useful.


    You can request the monitor output to be dumped every 15 seconds to stderr by
    enabling the `innodb_status_output` option. Do note that the output is quite large,
    so be prepared for your error log to grow quickly if you enable it. The InnoDB
    monitor output can also easily end up hiding messages about more serious issues.
    InnoDB also enables outputting the monitor output to the error log automatically
    when certain conditions apply such as when InnoDB has difficulties finding free
    blocks in the buffer pool or there are long semaphore waits.


    If you want to ensure you record all deadlocks, you can enable the `innodb_print_all_deadlocks`
    option. This causes deadlock information like that in the InnoDB monitor output
    to be printed to the error log every time a deadlock occurs. This can be useful
    if you need to investigate deadlocks, but it is recommended only to enable it
    on demand to avoid the error log to become very large and potentially hide other
    problems.


    ### Caution

    Be careful if you enable regular outputs of the InnoDB monitor or information
    about all deadlocks. The information may easily hide important messages logged
    to the error log.


    The top of the InnoDB monitor output includes information about semaphore waits
    which is the last monitoring category to discuss.'
