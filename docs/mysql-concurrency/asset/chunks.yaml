    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              980        1582          6

    --          2              981        1583          6

    -- Connection 1

    Connection 1> SET transaction_isolation = ''READ-COMMITTED'';

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE CountryCode = ''SVK''

    AND District = ''Bratislava'';

    Query OK, 1 row affected (0.0007 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1582

    ORDER BY index_name, lock_data DESC;

    +-------------+-----------+---------------+-------------+

    | index_name  | lock_type | lock_mode     | lock_data   |

    +-------------+-----------+---------------+-------------+

    | CountryCode | RECORD    | X,REC_NOT_GAP | ''SVK'', 3209 |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3209        |

    +-------------+-----------+---------------+-------------+

    2 rows in set (0.0008 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0754 sec)

    Listing 12-6

    Locking in the READ COMMITTED transaction isolation level

    ```


    Whereas the `SERIALIZABLE` and `REPEATABLE READ` isolation levels held seven record
    and gap locks, `READ COMMITTED` only holds one on the `CountryCode` index and
    one on the primary key – though for a while, locks were held on the other index
    and row records that were examined, but they have at the time of the output been
    released again. This greatly reduces the potential for lock waits and deadlocks.


    A less known feature of the `READ COMMITTED` isolation level is semi-consistent
    reads which allow a statement to use the last committed value of a column to compare
    against its `WHERE` clause. If it is determined the row will not be affected by
    the statement, no lock conflict occurs even if another transaction holds a lock.
    If the row will be updated, the condition is re-evaluated, and a lock prevents
    conflicting changes. Listing [12-7](#502546_1_En_12_Chapter.xhtml#PC9) shows an
    example of this. There are two investigations available that you can explore if
    you want to take a look at the locks held.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              986        1592          6

    --          2              987        1593          6

    -- Connection 1

    Connection 1> SET transaction_isolation = ''READ-COMMITTED'';

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE Name = ''San Jose''

    AND District = ''Southern Tagalog'';

    Query OK, 1 row affected (0.0106 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SET transaction_isolation = ''READ-COMMITTED'';

    Query OK, 0 rows affected (0.0004 sec)

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0065 sec)

    Connection 2> UPDATE world.city

    SET Population = Population * 1.10

    WHERE Name = ''San Jose''

    AND District = ''Central Luzon'';

    Query OK, 1 row affected (0.0060 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    Listing 12-7

    READ COMMITTED Semi-consistent reads

    ```


    Both transactions update cities named San Jose, but in different districts. Neither
    the `Name` nor the `District` column is indexed. Even though the second transaction
    does examine the row with `Name = ''San Jose'' AND District = ''Southern Tagalog''`,
    there is no lock conflict as the transaction based on the district determines
    it will not update the row. However, if an index is added to the `Name` column,
    then there will be a lock conflict, so the feature is currently of limited value
    for large tables.


    You may from this discussion get the impression that `READ COMMITTED` always performs
    better than `REPEATABLE READ`. This is the most logical conclusion, however as
    it often is, things are more complex than as such. The caveat is that in order
    to start a read view, the `trx_sys` mutex (the `wait/synch/mutex/innodb/trx_sys_mutex`
    Performance Schema instrument) is required, and since `READ COMMITTED` starts
    a new read view for each statement, it will end up obtaining the `trx_sys` mutex
    much more frequently than `REPEATABLE READ`. In the end, if you have a lot of
    quick transactions and statements, you can in `READ COMMITTED` end up with so
    much activity on the mutex that it becomes a severe bottleneck and you are better
    off using `REPEATABLE READ`. For longer-running transactions and statements, the
    balance shifts toward `READ COMMITTED`.


    Tip:


    If you are interested in seeing some benchmark showing how the `trx_sys` mutex
    impacts the performance, see [`http://dimitrik.free.fr/blog/archives/2015/02/mysql-performance-impact-of-innodb-transaction-isolation-modes-in-mysql-57.html`](http://dimitrik.free.fr/blog/archives/2015/02/mysql-performance-impact-of-innodb-transaction-isolation-modes-in-mysql-57.html).


    ## Read Uncommitted


    The last transaction isolation level is `READ UNCOMMITTED`. As the name suggests,
    a transaction using this isolation level is allowed to read data that has not
    yet been committed; this is also called a *dirty read*. This may sound very dangerous,
    and in most cases, it is an absolute no-go. However, in a few special cases, it
    can be useful. Other than the dirty reads, the behavior is the same as for `READ
    COMMITTED`. The main advantage of `READ UNCOMMITTED` over `READ COMMITTED` is
    that InnoDB never needs to keep more than one version of the data to fulfill the
    query.


    The main uses of `READ UNCOMMITTED` are for cases where only approximate values
    are needed, for bulk inserts, and for investigations where you want to take a
    peek at what changes have been made by another transaction. An example of only
    requiring approximate values is the calculation of index statistics for which
    InnoDB uses `READ UNCOMMITTED`. For bulk inserts, then MySQL Shell’s parallel
    table data import feature (`util.importTable()` in JavaScript or `util.import_table()`
    in Python) switches to `READ UNCOMMITTED` during the bulk load.


    ## Summary


    This chapter has examined the four transaction isolation levels that InnoDB supports.
    The strictest isolation level is `SERIALIZABLE` which takes locks for all statements
    except auto-committing single-statement `SELECT` transactions. The `REPEATABLE
    READ` isolation level supports non-locking reads but keeps support for consistent
    reads. One gotcha is that if a transaction updates a row that was committed after
    the read view was established, then the updated row is added to the view.


    The next level is `READ COMMITTED` which abandons consistent reads and always
    includes all committed rows. It does open up for phantom rows, but on the other
    hand, `READ COMMITTED` needs fewer locks and holds them for shorter and in that
    way greatly reduces the potential for lock conflicts. The final isolation level
    is `READ UNCOMMITTED` which behaves like `READ COMMITTED` but allows for dirty
    reads, that is, reading changes that have not yet been committed.


    That concludes the theory part of the book. The remaining chapters go through
    six case studies with the first analyzing an issue involving flush locks.


    Footnotes [1](#502546_1_En_12_Chapter.xhtml#Fn1_source)'
