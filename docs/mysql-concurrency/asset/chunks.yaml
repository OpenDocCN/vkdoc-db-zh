    The first query uses the `INNODB_TRX` view in the Information Schema. It, for
    example, shows when the transaction was started, so you can determine how long
    it has been active. The `trx_rows_modified` column is also useful to know how
    much data has been changed by the transaction in case it is decided to roll back
    the transaction. Note that what InnoDB calls the MySQL thread id (the `trx_mysql_thread_id`
    column) is actually the connection id.


    The second query uses the `events_transactions_current` table from the Performance
    Schema to get more transaction information. You can use the `timer_wait` column
    to determine the age of the transaction. The value is in picoseconds, so it can
    be easier to understand what the value is by using the `FORMAT_PICO_TIME()` function
    :


    ```

    mysql> SELECT FORMAT_PICO_TIME(1054807373800000) AS Age;

    +-----------+

    | Age       |

    +-----------+

    | 17.58 min |

    +-----------+

    1 row in set (0.0006 sec)

    ```


    If you are using MySQL 8.0.15 or earlier, use the `sys.format_time()` function
    instead.


    The third query uses the `events_statements_history` table to find the previous
    queries executed in the transaction. The `nesting_event_id` column is set to the
    value of the `event_id` from the output of the `events_transactions_current` table,
    and the `nesting_event_type` column is set to match a transaction. This ensures
    that only events that are children of the ongoing transaction are returned. The
    result is ordered by the `event_id` (of the statement) to get the statements in
    the order they were executed. By default, the `events_statements_history` table
    will include at most the ten latest queries for the connection.


    In this example, the investigation shows that the transaction has executed two
    queries: one selecting from the `world.city` table and one selecting from the
    `world.country` table. It is the first of these queries causing the metadata lock
    contention.


    The fourth query uses the `session_connect_attrs` table to find the attributes
    submitted by the connection. Not all clients and connectors submit attributes,
    or they may be disabled, so this information is not always available. When the
    attributes are available, they can be useful to find out where the offending transaction
    is executed from. In this example, you can see the connection is from MySQL Shell
    (`mysqlsh`).


    When you are done investigating the issue, you can roll back the transaction for
    process list id 713\. This will cause the `ALTER TABLE` to execute, so you should
    also drop the `Name` index again if you want to leave the schema as it was before
    this example:


    ```

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0006 sec)

    -- Connection 2

    Query OK, 0 rows affected (35 min 34.2938 sec)

    Records: 0  Duplicates: 0  Warnings: 0

    -- Connection 3

    +-----+--------+-------------+-----------------+------------+

    | ID  | Name   | CountryCode | District        | Population |

    +-----+--------+-------------+-----------------+------------+

    | 130 | Sydney | AUS         | New South Wales |    3276207 |

    +-----+--------+-------------+-----------------+------------+

    1 row in set (35 min 31.1277 sec)

    -- Connection 2

    Connection 2> ALTER TABLE world.city DROP INDEX Name;

    Query OK, 0 rows affected (0.1890 sec)

    Records: 0  Duplicates: 0  Warnings: 0

    ```


    ## The Solution


    For a metadata lock contention, you essentially have two options to resolve the
    issue: make the blocking transaction complete or kill the DDL statement. To complete
    the blocking transaction, you will need to either commit it or roll it back. If
    you kill the connection, it triggers a rollback of the transaction, so you need
    to take into consideration how much work will need to be rolled back. In order
    to commit the transaction, you must find where the connection is executed and
    commit it that way. You cannot commit a transaction owned by a different connection.


    Killing the DDL statement will allow the other queries to proceed, but it does
    not solve the issue in the long term if the lock is held by an abandoned but still
    active transaction. For cases where there is an abandoned transaction holding
    the metadata lock, it can however be an option to kill both the DDL statement
    and the connection with the abandoned transaction. That way, you avoid the DDL
    statement to continue blocking subsequent queries while the transaction rolls
    back. Then when the rollback has completed, you can retry the DDL statement.'
