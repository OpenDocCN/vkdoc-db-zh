    # 15. 案例研究：记录级锁


    ## 预防措施


    避免元数据锁争用的关键在于，避免在需要执行涉及事务所用表的 DDL 语句时，同时存在长时间运行的事务。例如，你可以在已知没有长时间运行事务的时间点执行 DDL
    语句。你也可以将 `lock_wait_timeout` 选项设置为一个较低的值，这会使得 DDL 语句在 `lock_wait_timeout` 秒后放弃等待。虽然这并不能避免锁问题，但它通过防止
    DDL 语句阻塞其他查询的执行来缓解该问题。然后，你可以在没有应用大面积停滞的压力下去查找根本原因。


    你也可以致力于缩短事务的活跃时长。一种选择是将大型事务拆分为几个较小的事务，前提是不要求所有操作作为一个原子单元执行。你还应确保事务不会因在事务活跃期间执行交互式操作、文件
    I/O、向终端用户传输数据等而不必要地长时间保持打开状态。


    长时间运行事务的一个常见原因是应用程序或客户端根本不提交或回滚事务。在禁用 `autocommit` 选项时，这种情况尤其容易发生。当 `autocommit`
    被禁用时，任何查询——即使是一个简单的只读 `SELECT` 语句——在当前没有活跃事务时，都会启动一个新事务。这意味着一个看似无害的查询可能会启动一个事务，如果开发者没有意识到
    `autocommit` 已被禁用，那么他们可能不会想到显式地结束该事务。MySQL Server 中 `autocommit` 设置默认是启用的，但一些连接器默认禁用它。


    ## 总结


    在本章中，你研究了一种情况：一个被放弃的事务导致 `ALTER TABLE` 语句被阻塞，并随后阻止了同一张表上的其他查询执行。确定争用原因的关键是 `sys.schema_table_lock_waits`
    视图，该视图基于 `performance_schema.metadata_locks` 表。由于等待和阻塞的锁请求对的数量可能迅速增加，你可能需要对行进行过滤，例如查找等待独占锁的请求，或者你可以聚合信息以找到阻塞最多请求的连接。


    解决方案是提交或回滚事务，或者终止等待独占元数据锁的 DDL 语句。你也可以选择同时终止事务和 DDL 语句，如果事务需要回滚大量更改，这可能很有用。防止查询堆积的一个好方法是使用较低的
    `lock_wait_timeout` 值，并在遇到锁等待超时时重试 DDL 语句。


    在下一章中，你将分析一个 InnoDB 记录锁请求超时的情况。


    ## 记录级锁


    记录锁争用是最常遇到的，但通常也是侵入性最小的，因为默认的锁等待超时仅为 50 秒，因此不存在查询大量堆积的相同潜在风险。话虽如此，正如将要展示的，存在记录锁导致
    MySQL 陷入停滞的情况。本章将探讨一般性地调查 InnoDB 记录锁问题，以及更详细地调查锁等待超时问题。关于死锁的具体研究将推迟到下一章。


    ### 症状


    InnoDB 记录锁争用的症状通常非常微妙且不易识别。在严重情况下，你会收到一个锁等待超时或死锁错误，但在许多情况下，可能没有直接症状。相反，症状表现为查询比正常情况慢。这可能从慢几分之一秒到慢几秒不等。


    对于存在锁等待超时的情况，你将看到一个 `ER_LOCK_WAIT_TIMEOUT` 错误，如下例所示：


    ```

    ERROR: 1205: Lock wait timeout exceeded; try restarting transaction

    ```


    当查询因锁争用而比没有争用时更慢时，最有可能发现问题的方式是通过监控，可以使用类似于 MySQL Enterprise Monitor 中查询分析器的工具，或者使用
    `sys.innodb_lock_waits` 视图检测锁争用。图 15-1 展示了查询分析器中的一个查询示例。在讨论调查记录锁争用时，将使用 `sys`
    模式视图。该图也可以在本书的 GitHub 仓库中以完整尺寸作为 `figure_15_1_quan.png` 获取。


    ![../images/502546_1_En_15_Chapter/502546_1_En_15_Fig1_HTML.jpg](img/502546_1_En_15_Fig1_HTML.jpg)


    *图 15-1：在查询分析器中检测到的锁争用示例*


    在图中，请注意查询的延迟图在周期末尾增加，然后突然再次下降。规范化查询的右侧还有一个红色图标——该图标表示查询已返回错误。在本例中，错误是锁等待超时，但这无法从图中看出。规范化查询左侧的环形图也显示了一个红色区域，表明该查询的查询响应时间指数^(⁶)有时被认为较差。顶部的大图显示了一个小幅下降，表明实例中存在足够的问题，导致实例性能普遍下降。


    还有几个实例级指标可以显示实例上发生的锁情况。这些对于监控一段时间内的一般锁争用非常有用。清单 15-1 展示了使用 `sys.metrics` 视图可用的指标。


    ```

    mysql> SELECT Variable_name,

    Variable_value AS Value,

    Enabled

    FROM sys.metrics

    WHERE Variable_name LIKE ''innodb_row_lock%''

    OR Type = ''InnoDB Metrics - lock'';

    +-------------------------------+--------+---------+

    | Variable_name                 | Value  | Enabled |

    +-------------------------------+--------+---------+

    | innodb_row_lock_current_waits | 0      | YES     |

    | innodb_row_lock_time          | 480628 | YES     |

    | innodb_row_lock_time_avg      | 1219   | YES     |

    | innodb_row_lock_time_max      | 51066  | YES     |

    | innodb_row_lock_waits         | 394    | YES     |

    | lock_deadlock_false_positives | 0      | YES     |

    | lock_deadlock_rounds          | 193790 | YES     |

    | lock_deadlocks                | 0      | YES     |

    | lock_rec_grant_attempts       | 218    | YES     |

    | lock_rec_lock_created         | 0      | NO      |

    | lock_rec_lock_removed         | 0      | NO      |

    | lock_rec_lock_requests        | 0      | NO      |

    | lock_rec_lock_waits           | 0      | NO      |

    | lock_rec_locks                | 0      | NO      |

    | lock_rec_release_attempts     | 7522   | YES     |

    | lock_row_lock_current_waits   | 0      | YES     |

    | lock_schedule_refreshes       | 193790 | YES     |

    | lock_table_lock_created       | 0      | NO      |

    | lock_table_lock_removed       | 0      | NO      |

    | lock_table_lock_waits         | 0      | NO      |

    | lock_table_locks              | 0      | NO      |

    | lock_threads_waiting          | 0      | YES     |

    | lock_timeouts                 | 193    | YES     |

    +-------------------------------+--------+---------+

    23 rows in set (0.0089 sec)

    ```

    *清单 15-1：InnoDB 锁指标*

