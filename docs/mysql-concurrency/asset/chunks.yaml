- fmt: '## Read Committed


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              980        1582          6

    --          2              981        1583          6

    -- Connection 1

    Connection 1> SET transaction_isolation = ''READ-COMMITTED'';

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE CountryCode = ''SVK''

    AND District = ''Bratislava'';

    Query OK, 1 row affected (0.0007 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND lock_type = ''RECORD''

    AND thread_id = 1582

    ORDER BY index_name, lock_data DESC;

    +-------------+-----------+---------------+-------------+

    | index_name  | lock_type | lock_mode     | lock_data   |

    +-------------+-----------+---------------+-------------+

    | CountryCode | RECORD    | X,REC_NOT_GAP | ''SVK'', 3209 |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP | 3209        |

    +-------------+-----------+---------------+-------------+

    2 rows in set (0.0008 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0754 sec)

    Listing 12-6

    Locking in the READ COMMITTED transaction isolation level

    ```


    `SERIALIZABLE` 和 `REPEATABLE READ` 隔离级别持有七个记录和间隙锁，而 `READ COMMITTED` 只在一个 `CountryCode`
    索引和一个主键上持有锁——尽管在输出时，其他被检查的索引和行记录上的锁已经被释放。这大大减少了锁等待和死锁的可能性。


    `READ COMMITTED` 隔离级别一个较少被提及的特性是 semi-consistent reads，它允许一条语句使用列的最后提交值与其 `WHERE`
    子句进行比较。如果确定该行不会受此语句影响，即使另一个事务持有锁，也不会发生锁冲突。如果该行将被更新，则会重新评估条件，并使用锁来防止冲突的更改。Listing
    [12-7](#502546_1_En_12_Chapter.xhtml#PC9) 展示了此特性的一个示例。如果你想查看持有的锁，有两种可用的调查方法。


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              986        1592          6

    --          2              987        1593          6

    -- Connection 1

    Connection 1> SET transaction_isolation = ''READ-COMMITTED'';

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> UPDATE world.city

    SET Population = Population * 1.10

    WHERE Name = ''San Jose''

    AND District = ''Southern Tagalog'';

    Query OK, 1 row affected (0.0106 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SET transaction_isolation = ''READ-COMMITTED'';

    Query OK, 0 rows affected (0.0004 sec)

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0065 sec)

    Connection 2> UPDATE world.city

    SET Population = Population * 1.10

    WHERE Name = ''San Jose''

    AND District = ''Central Luzon'';

    Query OK, 1 row affected (0.0060 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    Listing 12-7

    READ COMMITTED Semi-consistent reads

    ```


    两个事务都更新名为 San Jose 的城市，但位于不同的区（District）。`Name` 和 `District` 列都没有被索引。即使第二个事务确实检查了
    `Name = ''San Jose'' AND District = ''Southern Tagalog''` 这一行，也不会发生锁冲突，因为基于区的事务确定它不会更新该行。但是，如果为
    `Name` 列添加了索引，那么就会发生锁冲突，因此该特性目前对大表的价值有限。


    从这个讨论中，你可能会认为 `READ COMMITTED` 的性能总是比 `REPEATABLE READ` 好。这是最符合逻辑的结论，然而，事情往往比这更复杂。需要注意的是，要启动一个读视图（read
    view），需要 `trx_sys` 互斥锁（即 `wait/synch/mutex/innodb/trx_sys_mutex` Performance Schema
    工具），而由于 `READ COMMITTED` 为每条语句启动一个新的读视图，它最终获取 `trx_sys` 互斥锁的频率会远高于 `REPEATABLE
    READ`。最终，如果你有大量快速的事务和语句，在 `READ COMMITTED` 下可能会因为互斥锁上的活动过多而成为严重的瓶颈，这时使用 `REPEATABLE
    READ` 会更好。对于运行时间较长的事务和语句，平衡则会向 `READ COMMITTED` 倾斜。


    > **Tip:**

    > 如果你对展示 `trx_sys` 互斥锁如何影响性能的基准测试感兴趣，请参阅 [`http://dimitrik.free.fr/blog/archives/2015/02/mysql-performance-impact-of-innodb-transaction-isolation-modes-in-mysql-57.html`](http://dimitrik.free.fr/blog/archives/2015/02/mysql-performance-impact-of-innodb-transaction-isolation-modes-in-mysql-57.html)。


    ## Read Uncommitted


    最后一个事务隔离级别是 `READ UNCOMMITTED`。顾名思义，使用此隔离级别的事务被允许读取尚未提交的数据；这也被称为 *脏读*。这听起来可能非常危险，在大多数情况下，这绝对是不可取的。然而，在少数特殊情况下，它可能很有用。除了脏读之外，其行为与
    `READ COMMITTED` 相同。`READ UNCOMMITTED` 相对于 `READ COMMITTED` 的主要优点是，InnoDB 为了满足查询，永远不需要保留超过一个版本的数据。


    `READ UNCOMMITTED` 主要用于只需要近似值的情况、批量插入以及你想要窥探另一个事务所做更改的调查场景。只需要近似值的一个例子是计算索引统计信息，InnoDB
    为此使用了 `READ UNCOMMITTED`。对于批量插入，MySQL Shell 的并行表数据导入功能（JavaScript 中的 `util.importTable()`
    或 Python 中的 `util.import_table()`）会在批量加载期间切换到 `READ UNCOMMITTED`。


    ## Summary


    本章探讨了 InnoDB 支持的四种事务隔离级别。最严格的隔离级别是 `SERIALIZABLE`，它对所有语句都加锁，除了自动提交的单语句 `SELECT`
    事务。`REPEATABLE READ` 隔离级别支持非锁定读，但保持了对一致性读的支持。需要注意的是，如果一个事务更新了在读视图建立之后提交的行，那么更新后的行会被添加到视图中。


    下一级是 `READ COMMITTED`，它放弃了始终包含所有已提交行的一致性读。它确实会导致幻行，但另一方面，`READ COMMITTED` 需要的锁更少，持有时间更短，从而大大减少了锁冲突的可能性。最后一个隔离级别是
    `READ UNCOMMITTED`，其行为类似于 `READ COMMITTED`，但允许脏读，即读取尚未提交的更改。


    这就结束了本书的理论部分。接下来的章节将介绍六个案例研究，第一个分析涉及刷新锁（flush locks）的问题。


