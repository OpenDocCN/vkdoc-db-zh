    on the release number you are using, and the compiler/platform can even make line
    number change by one. The `buf0buf.cc` refers to which contains the following
    code in MySQL 8.0.21 around line 4637 (the line number is prefixed each line):


    ```

    4577 /** Inits a page for read to the buffer buf_pool. If the page is

    4578 (1) already in buf_pool, or

    4579 (2) if we specify to read only ibuf pages and the page is not an ibuf page,
    or

    4580 (3) if the space is deleted or being deleted,

    4581 then this function does nothing.

    4582 Sets the io_fix flag to BUF_IO_READ and sets a non-recursive exclusive lock

    4583 on the buffer frame. The io-handler must take care that the flag is cleared

    4584 and the lock released later.

    4585 @param[out]     err                     DB_SUCCESS or DB_TABLESPACE_DELETED

    4586 @param[in]      mode                    BUF_READ_IBUF_PAGES_ONLY, ...

    4587 @param[in]      page_id                 page id

    4588 @param[in]      page_size               page size

    4589 @param[in]      unzip                   TRUE=request uncompressed page

    4590 @return pointer to the block or NULL */

    4591 buf_page_t *buf_page_init_for_read(dberr_t *err, ulint mode,

    4592                                    const page_id_t &page_id,

    4593                                    const page_size_t &page_size, ibool unzip)
    {

    ...

    4637   mutex_enter(&buf_pool->LRU_list_mutex);

    ...

    ```


    The function is trying to read a page into the buffer pool and in line 4637 requests
    the mutex on the LRU list of the buffer pool. This mutex was created in `buf0buf.cc:1228`
    (also seen from the semaphores section). It is the same mutex that all the waits
    are for, but in different parts of the source. So, this means that there is contention
    maintaining the least recently used list of the InnoDB buffer pool. (The waits
    in this case were created by having `innodb_buffer_pool_size = 5M` while executing
    concurrent queries on an almost 2 GiB large table.)


    Thus, it is in general necessary to reference the source code when investigating
    semaphore waits. That said, the file name is a good hint in what part of the code
    the contention is, for example, `buf0buf.cc` is related to the buffer pool, and
    `buf0flu.cc` is related to the buffer pool flushing algorithm.


    The semaphores section is useful to see the waits that are ongoing, but it is
    of little use when monitoring over time. For that the InnoDB mutex monitor is
    a better option. You access the mutex monitor using the `SHOW ENGINE INNODB MUTEX`
    statement:


    ```

    mysql> SHOW ENGINE INNODB MUTEX;

    +--------+------------------------------+------------+

    | Type   | Name                         | Status     |

    +--------+------------------------------+------------+

    | InnoDB | rwlock: dict0dict.cc:2455    | waits=748  |

    | InnoDB | rwlock: dict0dict.cc:2455    | waits=171  |

    | InnoDB | rwlock: fil0fil.cc:3206      | waits=38   |

    | InnoDB | rwlock: sync0sharded_rw.h:72 | waits=1    |

    | InnoDB | rwlock: sync0sharded_rw.h:72 | waits=1    |

    | InnoDB | rwlock: sync0sharded_rw.h:72 | waits=1    |

    | InnoDB | sum rwlock: buf0buf.cc:778   | waits=2436 |

    +--------+------------------------------+------------+

    7 rows in set (0.0111 sec)

    ```


    The file name and line number refers to where the mutex is created. The mutex
    monitor is not the most user-friendly tool in MySQL as each mutex may be present
    multiple times and the waits cannot be summed without parsing the output. However,
    it is enabled by default, so you can use it at any time.


    Note


    `SHOW ENGINE INNODB MUTEX` only includes mutexes and rw-lock semaphores that has
    had at least one OS wait.


    The collection of mutex information is enabled and disabled using the `latch`
    InnoDB metric (which is hidden, so you cannot see the current value). There is
    usually no reason to disable the `latch` metric.'
  trans: '

    ## InnoDB 互斥量与信号量


    InnoDB 使用互斥对象（更广为人知的名称是互斥量）^(¹) 和信号量来守护代码路径，例如，在更新缓冲池时避免竞争条件。MySQL 中有三种可用于监控互斥量的资源，其中两种我们已经见过。最通用的工具是
    `Performance Schema` 中的同步等待；但是，它们默认未启用，并且启用后可能引发性能问题。本节将重点介绍另外两种特定于 InnoDB 的资源。


    ### 注意


    在 InnoDB 监控中，互斥量和信号量之间没有明确的区分。


    如前一节所见，InnoDB 监控输出包含一个信号量部分，该部分显示了一些通用统计信息以及当前正在等待的信号量。清单 2-9 展示了一个包含持续等待的信号量部分的示例。（按需生成信号量等待并非易事，因此未包含重现步骤。有关可能引发信号量等待的工作负载示例，请参见第
    18 章。）


    ```

    SEMAPHORES


    OS WAIT ARRAY INFO: reservation count 831

    --Thread 28544 has waited at buf0buf.cc line 4637 for 0 seconds the semaphore:

    Mutex at 000001F1AD24D5E8, Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock
    var 1

    --Thread 10676 has waited at buf0flu.cc line 1639 for 1 seconds the semaphore:

    Mutex at 000001F1AD24D5E8, Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock
    var 1

    --Thread 10900 has waited at buf0lru.cc line 1051 for 0 seconds the semaphore:

    Mutex at 000001F1AD24D5E8, Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock
    var 1

    --Thread 28128 has waited at buf0buf.cc line 2797 for 1 seconds the semaphore:

    Mutex at 000001F1AD24D5E8, Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock
    var 1

    --Thread 33584 has waited at buf0buf.cc line 2945 for 0 seconds the semaphore:

    Mutex at 000001F1AD24D5E8, Mutex BUF_POOL_LRU_LIST created buf0buf.cc:1228, lock
    var 1

    OS WAIT ARRAY INFO: signal count 207

    RW-shared spins 51, rounds 86, OS waits 35

    RW-excl spins 39, rounds 993, OS waits 35

    RW-sx spins 30, rounds 862, OS waits 25

    Spin rounds per wait: 1.69 RW-shared, 25.46 RW-excl, 28.73 RW-sx

    清单 2-9

    InnoDB 监控器的信号量部分

    ```


    在这个例子中，第一个等待发生在 `buf0buf.cc` 第 4637 行，这指的是请求互斥量的源代码文件名和行号。行号取决于您使用的版本号，编译器/平台甚至可能导致行号变化一位。`buf0buf.cc`
    文件在 MySQL 8.0.21 中第 4637 行附近包含以下代码（每行前缀为行号）：


    ```

    4577 /** 为读取到缓冲池 buf_pool 初始化一个页面。如果页面是

    4578 (1) 已经在 buf_pool 中，或者

    4579 (2) 我们指定了只读取插入缓冲页面而该页面不是插入缓冲页面，或者

    4580 (3) 该表空间已被删除或正在删除，

    4581 则此函数不执行任何操作。

    4582 将 io_fix 标志设置为 BUF_IO_READ 并在缓冲帧上设置一个非递归的独占锁。

    4583 io 处理器必须负责清除该标志并在稍后释放锁。

    4584 @param[out]     err                     DB_SUCCESS 或 DB_TABLESPACE_DELETED

    4585 @param[in]      mode                    BUF_READ_IBUF_PAGES_ONLY, ...

    4586 @param[in]      page_id                 页面 id

    4587 @param[in]      page_size               页面大小

    4588 @param[in]      unzip                   TRUE=请求未压缩的页面

    4589 @return 指向块的指针或 NULL */

    4591 buf_page_t *buf_page_init_for_read(dberr_t *err, ulint mode,

    4592                                    const page_id_t &page_id,

    4593                                    const page_size_t &page_size, ibool unzip)
    {

    ...

    4637   mutex_enter(&buf_pool->LRU_list_mutex);

    ...

    ```


    该函数正尝试将一个页面读入缓冲池，并在第 4637 行请求了缓冲池 LRU 列表上的互斥量。这个互斥量创建于 `buf0buf.cc:1228`（从信号量部分也可以看到）。所有等待的都是同一个互斥量，只是发生在源代码的不同部分。这意味着在维护
    InnoDB 缓冲池的最近最少使用列表时存在竞争。（在此例中，等待是通过设置 `innodb_buffer_pool_size = 5M` 并在近 2 GiB
    大的表上执行并发查询产生的。）


    因此，在调查信号量等待时，通常需要参考源代码。尽管如此，文件名是一个很好的线索，可以提示竞争发生在代码的哪个部分，例如，`buf0buf.cc` 与缓冲池相关，而
    `buf0flu.cc` 与缓冲池刷新算法相关。


    信号量部分对于查看当前正在发生的等待很有用，但对于随时间进行的监控则用处不大。这时，InnoDB 互斥量监控器是一个更好的选择。您可以使用 `SHOW ENGINE
    INNODB MUTEX` 语句访问互斥量监控器：


    ```

    mysql> SHOW ENGINE INNODB MUTEX;

    +--------+------------------------------+------------+

    | Type   | Name                         | Status     |

    +--------+------------------------------+------------+

    | InnoDB | rwlock: dict0dict.cc:2455    | waits=748  |

    | InnoDB | rwlock: dict0dict.cc:2455    | waits=171  |

    | InnoDB | rwlock: fil0fil.cc:3206      | waits=38   |

    | InnoDB | rwlock: sync0sharded_rw.h:72 | waits=1    |

    | InnoDB | rwlock: sync0sharded_rw.h:72 | waits=1    |

    | InnoDB | rwlock: sync0sharded_rw.h:72 | waits=1    |

    | InnoDB | sum rwlock: buf0buf.cc:778   | waits=2436 |

    +--------+------------------------------+------------+

    7 rows in set (0.0111 sec)

    ```


    文件名和行号指的是互斥量创建的位置。互斥量监控器并非 MySQL 中最用户友好的工具，因为每个互斥量可能出现多次，并且如果不解析输出则无法汇总等待次数。然而，它是默认启用的，因此您可以随时使用它。


    ### 注意


    `SHOW ENGINE INNODB MUTEX` 仅包含至少经历过一次操作系统等待的互斥量和读写锁信号量。


    互斥量信息的收集是通过 `latch` InnoDB 指标（该指标是隐藏的，因此您无法看到当前值）来启用和禁用的。通常没有理由禁用 `latch` 指标。

    '
- fmt: '# 3. Monitoring InnoDB Transactions


    ## Summary


    In this chapter the resources available for monitoring and investigating locks
    have been introduced. First the Performance Schema tables were considered. There
    are dedicated tables for querying the current metadata and data lock requests
    with information about the object that is the target of the lock, whether it is
    a shared or exclusive lock and whether the lock request has been granted. At the
    lowest level, there are also tables that allow you to investigate synchronization
    waits; however, these are not enabled by default and have a significant overhead.
    At the opposite end of the granularity scale, the statement tables and error summary
    tables can be used to investigate which statements encounter errors and the frequency
    of errors.


    Second, the `sys` schema can also be useful particularly to investigate lock waits
    issues with the `innodb_lock_waits` view providing information about ongoing InnoDB
    data lock waits and `schema_table_lock_waits` about ongoing table metadata lock
    waits.


    Third, at the highest level, the status counters and InnoDB metrics give an overview
    of the activity on the instance including the use of locks and failure to obtain
    locks. If you want more information about InnoDB locks, then the lock monitor
    provides similar information to the data lock tables in the Performance Schema,
    but in a less readily usable format, and the InnoDB monitor includes details of
    the latest occurred deadlock. The InnoDB monitor also includes information about
    semaphore waits, and finally the InnoDB mutex monitor provides statistics about
    mutex waits.


    Another useful way to get information about the lock usage is to look at the transaction
    information. This will be considered in the next chapter.


    Footnotes [1](#502546_1_En_2_Chapter.xhtml#Fn1_source)


    ## Information Schema INNODB_TRX


    The `INNODB_TRX` view in the Information Schema is the most dedicated source of
    information about InnoDB transactions. It includes information such as when the
    transaction started, how many rows have been modified, and how many locks are
    held. The `INNODB_TRX` view is also used by the `sys.innodb_lock_waits` view to
    provide some information about the transactions involved in lock wait issues.
    Table [3-1](#502546_1_En_3_Chapter.xhtml#Tab1) summarizes the columns in the table.


    ### Table 3-1


    The columns in the `information_schema.INNODB_TRX` view


    | Column/Data Type | Description |

    | --- | --- |

    | `trx_id``varchar(18)` | The transaction id. This can be useful when referring
    to the transaction or comparing with the output of the InnoDB monitor. Otherwise,
    the id should be treated purely internal and not be given any significance. The
    id is only assigned to transactions that have modified data or locked rows; a
    transaction that only has executed read-only `SELECT` statements will have a dummy
    id like 421124985258256 which will change if the transaction starts to modify
    or lock records. |

    | `trx_state``varchar(13)` | The state of the transaction. This can be one of
    `RUNNING`, `LOCK WAIT`, `ROLLING BACK`, and `COMMITTING`. |

    | `trx_started``datetime` | When the transaction was started using the system
    time zone. |

    | `trx_requested_lock_id``varchar(105)` | When the `trx_state` is `LOCK WAIT`,
    this column shows the id of the lock that the transaction is waiting for. |

    | `trx_wait_started``datetime` | When the `trx_state` is `LOCK WAIT`, this column
    shows when the lock wait started using the system time zone. |

    | `trx_weight``bigint unsigned` | A measure of how much work has been done by
    the transaction in terms of rows modified and locks held. This is the weight that
    is used to determine which transaction is rolled back in case of a deadlock. The
    higher the weight, the more work has been done. |

    | `trx_mysql_thread_id``bigint unsigned` | The connection id (the same as the
    `PROCESSLIST_ID` column in the Performance Schema `threads` table) of the connection
    executing the transaction. |

    | `trx_query``varchar(1024)` | The query currently executed by the transaction.
    If the transaction is idle, the query is `NULL`. |

    | `trx_operation_state``varchar(64)` | The current operation performed by the
    transaction. This may be `NULL` even when a query is executing. |

    | `trx_tables_in_use``bigint unsigned` | The number of tables the transaction
    has used. |

    | `trx_tables_locked``bigint unsigned` | The number of tables the transaction
    holds row locks in. |

    | `trx_lock_structs``bigint unsigned` | The number of lock structures created
    by the transaction. |

    | `trx_lock_memory_bytes``bigint unsigned` | The amount of memory in bytes used
    by the locks held by the transaction. |

    | `trx_rows_locked``bigint unsigned` | The number of record locks held by the
    transaction. While called row locks, it also includes index locks. |

    | `trx_rows_modified``bigint unsigned` | The number of rows modified by the transaction.
    |

    | `trx_concurrency_tickets``bigint unsigned` | When `innodb_thread_concurrency`
    is not 0, a transaction is assigned `innodb_concurrency_tickets` tickets that
    it can use before it must allow another transaction to perform work. One ticket
    corresponds to accessing one row. This column shows how many tickets are left.
    |

    | `trx_isolation_level``varchar(16)` | The transaction isolation level used for
    the transaction. |

    | `trx_unique_checks``int` | Whether the `unique_checks` variable is enabled for
    the connection. |

    | `trx_foreign_key_checks``int` | Whether the `foreign_key_checks` variable is
    enabled for the connection. |

    | `trx_last_foreign_key_error``varchar(256)` | The error message of the last (if
    any) foreign key error encountered by the transaction. |

    | `trx_adaptive_hash_latched``int` | Whether the transaction has locked a part
    of the adaptive hash index. There is a total of `innodb_adaptive_hash_index_parts`
    parts. This column is effectively a Boolean value. |

    | `trx_adaptive_hash_timeout``bigint unsigned` | Whether to keep the lock on the
    adaptive hash index across multiple queries. If there is only one part for the
    adaptive hash index and there is no contention, then the timeout counts down,
    and the lock is released when the timeout reaches 0. When there is contention
    or there are multiple parts, the lock is always released after each query, and
    the timeout value is 0. |

    | `trx_is_read_only``int` | Whether the transaction is a read-only transaction.
    A transaction can be read-only either by declaring it explicitly or for single-statement
    transactions with `autocommit` enabled where InnoDB can detect that the query
    will only read data. |

    | `trx_autocommit_non_locking``int` | When the transaction is a single-statement
    non-locking `SELECT` and the `autocommit` option is enabled, this column is set
    to 1. When both this column and `trx_is_read_only` are 1, InnoDB can optimize
    the transaction to reduce the overhead. |

    | `trx_schedule_weight``bigint unsigned` | The transaction weight that is assigned
    to the transaction by the Contention-Aware Transaction Scheduling (CATS) algorithm
    (see Chapter [8](#502546_1_En_8_Chapter.xhtml)). The value only has a meaning
    for transactions in the `LOCK WAIT` state. This column was added in 8.0.20. |'
