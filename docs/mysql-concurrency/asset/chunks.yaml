- fmt: '# 15. Case Study: Record-Level Locks


    ## The Prevention


    The key to avoiding metadata lock contention is to avoid long-running transactions
    at the same time as you need to execute DDL statements for the tables used by
    the transaction. You can, for example, execute DDL statements at times when you
    know there are no long-running transactions. You can also set the `lock_wait_timeout`
    option to a low value which makes the DDL statement abandon after `lock_wait_timeout`
    seconds. While that does not avoid the lock problem, it mitigates the issue by
    avoiding the DDL statement stopping other queries from executing. You can then
    find the root cause without the stress of having a large part of the application
    not working.


    You can also aim at reducing how long transactions are active. One option is to
    split a large transaction into several smaller transactions, if it is not required
    that all operations are performed as an atomic unit. You should also make sure
    that the transaction is not kept open for unnecessarily long time by making sure
    you are not doing interactive work, file I/O, transferring data to the end user,
    and so on while the transaction is active.


    One common cause of long-running transactions is that the application or client
    does not commit or roll back the transaction at all. This is particularly likely
    to happen with the `autocommit` option disabled. When `autocommit` is disabled,
    any query – even a plain read-only `SELECT` statement – will start a new transaction
    when there is not already an active transaction. This means that an innocent-looking
    query may start a transaction, and if the developer is not aware that `autocommit`
    is disabled, then the developer may not think about explicitly ending the transaction.
    The `autocommit` setting is enabled by default in MySQL Server, but some connectors
    disable it by default.


    ## Summary


    In this chapter you investigated a situation where an abandoned transaction caused
    an `ALTER TABLE` statement to block and subsequently prevent other queries on
    the same table to execute. The key to determining the cause of the contention
    is the `sys.schema_table_lock_waits` view which is based on the `performance_schema.metadata_locks`
    table. As the number of pairs of waiting and blocking lock requests quickly can
    add up, you may want to filter the rows looking, for example, for a waiting request
    for an exclusive lock, or you can aggregate the information to find the connection
    blocking the most requests.


    The solution is to commit or roll back the transaction or kill the DDL statement
    waiting for the exclusive metadata lock. Optionally you can also kill both the
    transaction and the DDL statement which can be useful if the transaction has to
    roll back many changes. A good way to prevent pileups of queries is to use a low
    value for `lock_wait_timeout` and retry the DDL statement if you experience lock
    wait timeouts.


    In the next chapter, you will analyze a situation with InnoDB record lock requests
    timing out.


    ## Record-Level Locks


    Record lock contention is the most frequently encountered, but usually also the
    least intrusive as the default lock wait timeout is just 50 seconds, so there
    is not the same potential for queries pilling up. That said, there are cases –
    as will be shown – where record locks can cause MySQL to come to a grinding halt.
    This chapter will look into investigating InnoDB record lock issues in general
    and in more detail lock wait timeout issues. Investigating the specifics of deadlocks
    is deferred until the next chapter.


    ### The Symptoms


    The symptoms of InnoDB record lock contention are often very subtle and not easily
    recognizable. In severe cases, you will get a lock wait timeout or a deadlock
    error, but in many cases, there may be no direct symptoms. Rather the symptom
    is that queries are slower than normal. This may range from being a fraction of
    a second slower to being many seconds slower.


    For cases where there is a lock wait timeout, you will see an `ER_LOCK_WAIT_TIMEOUT`
    error like the one in the following example:


    ```

    ERROR: 1205: Lock wait timeout exceeded; try restarting transaction

    ```


    When the queries are slower than they would be without lock contention, the most
    likely way to detect the issue is through monitoring, either using something similar
    to the Query Analyzer in MySQL Enterprise Monitor or detecting lock contention
    using the `sys.innodb_lock_waits` view. Figure 15-1 shows an example of a query
    in the Query Analyzer. The `sys` schema view will be used when discussing the
    investigation of record lock contention. The figure is also available in full
    size in this book’s GitHub repository as `figure_15_1_quan.png`.


    ![../images/502546_1_En_15_Chapter/502546_1_En_15_Fig1_HTML.jpg](images/502546_1_En_15_Chapter/502546_1_En_15_Fig1_HTML.jpg)


    *Figure 15-1: Example of a lock contention detected in the Query Analyzer*


    In the figure, notice how the latency graph for the query increases toward the
    end of the period and then suddenly drops again. There is also a red icon to the
    right of the normalized query – that icon means the query has returned errors.
    In this case the error is a lock wait timeout, but that cannot be seen from the
    figure. The donut-shaped chart to the left of the normalized query also shows
    a red area indicating the Query Response Time index^([⁶](#fn6)) for the query
    at times is considered poor. The large graph at the top shows a small dip showing
    there were enough issues in the instance to cause a general degradation of the
    performance of the instance.


    There are also several instance-level metrics that show how much locking is occurring
    for the instance. These can be very useful to monitor the general lock contention
    over time. Listing 15-1 shows the available metrics using the `sys.metrics` view.


    ```

    mysql> SELECT Variable_name,

    Variable_value AS Value,

    Enabled

    FROM sys.metrics

    WHERE Variable_name LIKE ''innodb_row_lock%''

    OR Type = ''InnoDB Metrics - lock'';

    +-------------------------------+--------+---------+

    | Variable_name                 | Value  | Enabled |

    +-------------------------------+--------+---------+

    | innodb_row_lock_current_waits | 0      | YES     |

    | innodb_row_lock_time          | 480628 | YES     |

    | innodb_row_lock_time_avg      | 1219   | YES     |

    | innodb_row_lock_time_max      | 51066  | YES     |

    | innodb_row_lock_waits         | 394    | YES     |

    | lock_deadlock_false_positives | 0      | YES     |

    | lock_deadlock_rounds          | 193790 | YES     |

    | lock_deadlocks                | 0      | YES     |

    | lock_rec_grant_attempts       | 218    | YES     |

    | lock_rec_lock_created         | 0      | NO      |

    | lock_rec_lock_removed         | 0      | NO      |

    | lock_rec_lock_requests        | 0      | NO      |

    | lock_rec_lock_waits           | 0      | NO      |

    | lock_rec_locks                | 0      | NO      |

    | lock_rec_release_attempts     | 7522   | YES     |

    | lock_row_lock_current_waits   | 0      | YES     |

    | lock_schedule_refreshes       | 193790 | YES     |

    | lock_table_lock_created       | 0      | NO      |

    | lock_table_lock_removed       | 0      | NO      |

    | lock_table_lock_waits         | 0      | NO      |

    | lock_table_locks              | 0      | NO      |

    | lock_threads_waiting          | 0      | YES     |

    | lock_timeouts                 | 193    | YES     |

    +-------------------------------+--------+---------+

