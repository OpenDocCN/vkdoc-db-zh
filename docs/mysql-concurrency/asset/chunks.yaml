    在工作负载执行开始时，会有一个进程列表ID（来自 `SHOW PROCESSLIST`）、（Performance Schema）线程ID以及每个工作负载连接在工作负载开始前最后一个事件ID的概览：


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              105         249          6

