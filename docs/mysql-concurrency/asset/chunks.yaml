- fmt: '## DML Statement


    作为外键对DML语句引起锁的示例，考虑一个将影片从一个商店移动到另一个商店的`UPDATE`语句。该更新通过主键进行，示例如清单[10-8](#502546_1_En_10_Chapter.xhtml#PC9)所示。


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              814        1329          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE sakila.inventory

    SET store_id = 1

    WHERE inventory_id = 4090;

    Query OK, 1 row affected (0.0008 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    Listing 10-8

    Updating a row in a table with foreign keys relationships

    ```


    由于外键，这个简单的单表单行更新会在`sakila`数据库的大量表上获取多个锁。清单[10-9](#502546_1_En_10_Chapter.xhtml#PC10)显示了该语句引起的InnoDB锁（这是调查编号1）。


    ```

    -- Investigation #1

    -- Connection 2

    Connection 2> SELECT object_schema, object_name, lock_type,

    index_name, lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE thread_id = 1329\G

    *************************** 1. row ***************************

    object_schema: sakila

    object_name: inventory

    lock_type: TABLE

    index_name: NULL

    lock_mode: IX

    lock_data: NULL

    *************************** 2. row ***************************

    object_schema: sakila

    object_name: inventory

    lock_type: RECORD

    index_name: PRIMARY

    lock_mode: X,REC_NOT_GAP

    lock_data: 4090

    *************************** 3. row ***************************

    object_schema: sakila

    object_name: store

    lock_type: TABLE

    index_name: NULL

    lock_mode: IS

    lock_data: NULL

    *************************** 4. row ***************************

    object_schema: sakila

    object_name: store

    lock_type: RECORD

    index_name: PRIMARY

    lock_mode: S,REC_NOT_GAP

    lock_data: 1

    4 rows in set (0.0102 sec)

    Listing 10-9

    The InnoDB data locks caused by the UPDATE statement

    ```


    在这种情况下，InnoDB对`store`表获取意向共享锁，并对主键为1的记录获取共享锁。由于`UPDATE`语句不改变`film_id`列的值，因此`film`表上没有锁。


    对于元数据锁，情况更为复杂，这可以从清单[10-10](#502546_1_En_10_Chapter.xhtml#PC11)（调查编号2）中看出。


    ```

    -- Investigation #2

    Connection 2> SELECT object_type, object_schema, object_name,

    column_name, lock_type, lock_duration

    FROM performance_schema.metadata_locks

    WHERE owner_thread_id = 1329

    ORDER BY object_type, object_schema, object_name,

    column_name, lock_type\G

    *************************** 1. row ***************************

    object_type: SCHEMA

    object_schema: sakila

    object_name: NULL

    column_name: NULL

    lock_type: INTENTION_EXCLUSIVE

    lock_duration: TRANSACTION

    *************************** 2. row ***************************

    object_type: TABLE

    object_schema: sakila

    object_name: customer

    column_name: NULL

    lock_type: SHARED_READ

    lock_duration: TRANSACTION

    *************************** 3. row ***************************

    object_type: TABLE

    object_schema: sakila

    object_name: film

    column_name: NULL

    lock_type: SHARED_READ

    lock_duration: TRANSACTION

    *************************** 4. row ***************************

    object_type: TABLE

    object_schema: sakila

    object_name: inventory

    column_name: NULL

    lock_type: SHARED_WRITE

    lock_duration: TRANSACTION

    *************************** 5. row ***************************

    object_type: TABLE

    object_schema: sakila

    object_name: payment

    column_name: NULL

    lock_type: SHARED_WRITE

    lock_duration: TRANSACTION

    *************************** 6. row ***************************

    object_type: TABLE

    object_schema: sakila

    object_name: rental

    column_name: NULL

    lock_type: SHARED_WRITE

    lock_duration: TRANSACTION

    *************************** 7. row ***************************

    object_type: TABLE

    object_schema: sakila

    object_name: staff

    column_name: NULL

    lock_type: SHARED_READ

    lock_duration: TRANSACTION

    *************************** 8. row ***************************

    object_type: TABLE

    object_schema: sakila

    object_name: store

    column_name: NULL

    lock_type: SHARED_READ

    lock_duration: TRANSACTION

    8 rows in set (0.0007 sec)

    Listing 10-10

    The metadata locks caused by the UPDATE statement

    ```


    你并不总是能看到`sakila`模式上的`INTENTION_EXCLUSIVE`锁，因此你的结果可能只包含七个表级元数据锁。


    这表明`film`和`store`表上存在`SHARED_READ`锁，`rental`表上存在`SHARED_WRITE`锁，这与之前的讨论预期一致。然而，这里还有几个额外的元数据锁。额外的锁是因为`rental`表到`inventory`的外键设置了`ON
    UPDATE CASCADE`。这使得元数据锁也级联到`rental`表的外键关系上。这个例子的经验教训是，使用外键时，特别是级联关系时，需要注意元数据锁的数量会迅速增加。


    最后，回滚事务：


    ```

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.1104 sec)

    ```


    ## DDL Statement


    当你对外键表执行DDL语句时，会为被修改表的每个父表和子表获取一个`SHARED_UPGRADABLE`元数据锁。示例如清单[10-11](#502546_1_En_10_Chapter.xhtml#PC13)所示。


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              820        1340          6

    --          2              821        1341          6

    -- Connection 1

    Connection 1> OPTIMIZE TABLE sakila.inventory;

    -- Connection 2

    Connection 2> SELECT object_name, lock_type, lock_duration

    FROM performance_schema.metadata_locks

    WHERE owner_thread_id = 1340

    AND object_type = ''TABLE'';

    +---------------+-------------------+---------------+

    | object_name   | lock_type         | lock_duration |

    +---------------+-------------------+---------------+

    | inventory     | SHARED_NO_WRITE   | TRANSACTION   |

    | film          | SHARED_UPGRADABLE | STATEMENT     |

    | rental        | SHARED_UPGRADABLE | STATEMENT     |

    | store         | SHARED_UPGRADABLE | STATEMENT     |

    | #sql-8490_334 | EXCLUSIVE         | STATEMENT     |

    +---------------+-------------------+---------------+

    5 rows in set (0.0014 sec)

    Listing 10-11

    Performing DDL on a table with foreign key relations

    ```


    在这种情况下，`rental`表上的级联外键不会导致进一步的元数据锁，因为没有需要级联的更新。`#sql-8490_334`表是`OPTIMIZE TABLE`语句的构建表，其名称取决于`mysqld`进程的ID和执行该语句的连接的进程列表ID。


    结论是，虽然外键对于确保数据一致性非常重要，但在高并发工作负载中，由于额外的锁（以及约束验证所花费的时间），它们可能成为瓶颈。然而，不要默认就摒弃外键，否则可能会危及数据的完整性。外键也有助于记录表之间的关系；本章前面的图就是MySQL
    Workbench基于外键自动生成的。


    **注意**


    不要因为额外的锁而摒弃外键，它们对于确保数据一致性是必要的。如果它们对于你的工作负载变得过于昂贵，你将需要在应用程序中确保数据一致性，这绝非易事。如果没有足够好的数据完整性约束，最终可能会向用户返回无效数据。'
  raw: '### DML Statement


    As an example of the locks caused by foreign keys for DML statements, consider
    an `UPDATE` statement moving a film from one store to the other. The update is
    by the primary key with an example of this shown in Listing [10-8](#502546_1_En_10_Chapter.xhtml#PC9).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              814        1329          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE sakila.inventory

    SET store_id = 1

    WHERE inventory_id = 4090;

    Query OK, 1 row affected (0.0008 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    Listing 10-8

    Updating a row in a table with foreign keys relationships

    ```


    Because of the foreign keys, this simple single table and row update takes a number
    of locks across a large number of tables in the `sakila` database. Listing [10-9](#502546_1_En_10_Chapter.xhtml#PC10)
    shows the InnoDB locks caused by the statement (this is investigation number 1).


    ```

    -- Investigation #1

    -- Connection 2

    Connection 2> SELECT object_schema, object_name, lock_type,

    index_name, lock_mode, lock_data

    FROM performance_schema.data_locks

    WHERE thread_id = 1329\G

    *************************** 1\. row ***************************

    object_schema: sakila

    object_name: inventory

    lock_type: TABLE

    index_name: NULL

    lock_mode: IX

    lock_data: NULL

    *************************** 2\. row ***************************

    object_schema: sakila

    object_name: inventory

    lock_type: RECORD

    index_name: PRIMARY

    lock_mode: X,REC_NOT_GAP

    lock_data: 4090

    *************************** 3\. row ***************************

    object_schema: sakila

    object_name: store

    lock_type: TABLE

    index_name: NULL

    lock_mode: IS

    lock_data: NULL

    *************************** 4\. row ***************************

    object_schema: sakila

    object_name: store

    lock_type: RECORD

    index_name: PRIMARY

    lock_mode: S,REC_NOT_GAP

    lock_data: 1

    4 rows in set (0.0102 sec)

    Listing 10-9

    The InnoDB data locks caused by the UPDATE statement

    ```


    In this case, InnoDB takes an intention shared lock on the `store` tables as well
    as a shared lock on the record with the primary keys set 1\. There are no locks
    on the `film` table as the `UPDATE` statement does not change the value of the
    `film_id` column.


    For the metadata locks, it is more complicated as can be seen from Listing [10-10](#502546_1_En_10_Chapter.xhtml#PC11)
    (investigation number 2).


    ```

    -- Investigation #2

    Connection 2> SELECT object_type, object_schema, object_name,

    column_name, lock_type, lock_duration

    FROM performance_schema.metadata_locks

    WHERE owner_thread_id = 1329

    ORDER BY object_type, object_schema, object_name,

    column_name, lock_type\G

    *************************** 1\. row ***************************

    object_type: SCHEMA

    object_schema: sakila

    object_name: NULL

    column_name: NULL

    lock_type: INTENTION_EXCLUSIVE

    lock_duration: TRANSACTION

    *************************** 2\. row ***************************

    object_type: TABLE

    object_schema: sakila

    object_name: customer

    column_name: NULL

    lock_type: SHARED_READ

    lock_duration: TRANSACTION

    *************************** 3\. row ***************************

    object_type: TABLE

    object_schema: sakila

    object_name: film

    column_name: NULL

    lock_type: SHARED_READ

    lock_duration: TRANSACTION

    *************************** 4\. row ***************************

    object_type: TABLE

    object_schema: sakila

    object_name: inventory

    column_name: NULL

    lock_type: SHARED_WRITE

    lock_duration: TRANSACTION

    *************************** 5\. row ***************************

    object_type: TABLE

    object_schema: sakila

    object_name: payment

    column_name: NULL

    lock_type: SHARED_WRITE

    lock_duration: TRANSACTION

    *************************** 6\. row ***************************

    object_type: TABLE

    object_schema: sakila

    object_name: rental

    column_name: NULL

    lock_type: SHARED_WRITE

    lock_duration: TRANSACTION

    *************************** 7\. row ***************************

    object_type: TABLE

    object_schema: sakila

    object_name: staff

    column_name: NULL

    lock_type: SHARED_READ

    lock_duration: TRANSACTION

    *************************** 8\. row ***************************

    object_type: TABLE

    object_schema: sakila

    object_name: store

    column_name: NULL

    lock_type: SHARED_READ

    lock_duration: TRANSACTION

    8 rows in set (0.0007 sec)

    Listing 10-10

    The metadata locks caused by the UPDATE statement

    ```


    You will not always see the `INTENTION_EXCLUSIVE` lock on the `sakila` schema,
    so your result may only include the seven table level metadata locks.


    This shows that there is a `SHARED_READ` lock on the `film` and `store` tables,
    and a `SHARED_WRITE` on the `rental` table which is expected from the discussion
    this far. However, there are several more metadata locks. The extra locks are
    because the `rental` table’s foreign key to inventory is `ON UPDATE CASCADE`.
    That makes the metadata locks cascade as well to the foreign key relations for
    the `rental` table. The lesson of the example is that with foreign keys, particularly
    cascading relations, you need to be aware that the number of metadata locks quickly
    increases.


    Finally, roll back the transaction:


    ```

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.1104 sec)

    ```


    ### DDL Statement


    When you execute DDL statements against a table with a foreign key, then a `SHARED_UPGRADABLE`
    metadata lock is taken for each of the parent and child tables of the modified
    table. An example of this is shown in Listing [10-11](#502546_1_En_10_Chapter.xhtml#PC13).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              820        1340          6

    --          2              821        1341          6

    -- Connection 1

    Connection 1> OPTIMIZE TABLE sakila.inventory;

    -- Connection 2

    Connection 2> SELECT object_name, lock_type, lock_duration

    FROM performance_schema.metadata_locks

    WHERE owner_thread_id = 1340

    AND object_type = ''TABLE'';

    +---------------+-------------------+---------------+

    | object_name   | lock_type         | lock_duration |

    +---------------+-------------------+---------------+

    | inventory     | SHARED_NO_WRITE   | TRANSACTION   |

    | film          | SHARED_UPGRADABLE | STATEMENT     |

    | rental        | SHARED_UPGRADABLE | STATEMENT     |

    | store         | SHARED_UPGRADABLE | STATEMENT     |

    | #sql-8490_334 | EXCLUSIVE         | STATEMENT     |

    +---------------+-------------------+---------------+

    5 rows in set (0.0014 sec)

    Listing 10-11

    Performing DDL on a table with foreign key relations

    ```


    In this case the cascading foreign key on the `rental` table does not cause further
    metadata locks as there is no update to cascade. The `#sql-8490_334` table is
    the build table for the `OPTIMIZE TABLE` statement , and the name depends on the
    id of the `mysqld` process and the process list id of the connection executing
    the statement.


    The conclusion is that while foreign keys are very important to ensure data consistency,
    in high concurrency workloads, they can become a bottleneck due to the additional
    locking (and time spend on constraint validation). However, do not by default
    dismiss foreign keys as you will risk the integrity of your data, and they are
    also useful for documenting the relationship between tables; the figure earlier
    in this chapter was automatically generated by MySQL Workbench based on the foreign
    keys.


    Caution


    Do not dismiss foreign keys because of the additional locking as they are necessary
    to ensure data consistency. If they become prohibitively expensive for your workload,
    you will need to ensure the data consistency in your application which is far
    from a trivial task. If you do not have good enough data integrity constraints,
    then you may end up returning invalid data to the users.'
