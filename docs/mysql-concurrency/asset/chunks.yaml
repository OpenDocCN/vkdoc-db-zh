  trans: '## 案例总结


    在本案例中，通过模拟以下工作负载来产生死锁：先更新一个国家所有城市的人口，然后更新该国家的人口。与此同时，另一个连接向同一个国家添加一个新城市，但先更新该国家的人口，然后再插入新城市。这是一个经典的例子，说明了使用相同表但以相反顺序操作的两种不同工作流为何会导致死锁。


    调查死锁主要使用了 InnoDB 监视器输出的 `LATEST DETECTED DEADLOCK` 部分。由此可以看出涉及哪些连接、它们执行的最后一条语句、它们持有的锁以及它们正在等待的锁。此外，还使用了包含语句历史的
    Performance Schema 表来查找事务中涉及的确切语句；然而，通常情况下，您没有这样的便利条件，必须通过分析应用程序来确定涉及的语句。


    发生死锁的好消息是，它会通过回滚其中一个事务来自动解决，以便另一个事务能够继续。然后您必须重试被回滚的事务。如果您遇到过多死锁，关键点在于减少锁的数量和持续时间，并确保对于不同的任务以相同的顺序获取锁。


    在下一章中，您将研究一个由外键导致锁争用的案例。


    ## 17. 案例研究：外键


    更难调查的锁争用情况之一发生在涉及外键时，因为您可能会针对不同表的内容查询相同的锁。本案例研究探讨了一个因外键而导致元数据和 InnoDB 记录锁同时发生的例子。由于其症状和原因与第
    14 章讨论元数据锁的案例以及第 15 章讨论 InnoDB 记录锁的案例相同，因此在本讨论中将跳过这些内容。


    ### 环境设置


    本案例研究比之前的更复杂，没有简单的方法可以自行重现。但是，MySQL Shell 的 `concurrency_book` 模块中的 `清单` `17-1`
    工作负载将允许您重现该争用情况。该工作负载由五个连接组成：


    *   两个连接以某种方式更新 `sakila.customer` 表，使得始终有一个事务在进行中，并且该事务对表持有元数据和记录锁。在 `COMMIT`
    之前有一个 `sleep`，以确保持续时间足够长以避免竞态条件。`sleep` 的持续时间可以在工作负载执行期间配置。


    *   一个连接对 `sakila.inventory` 表执行 `ALTER TABLE`。此连接使用 `lock_wait_timeout = 1`。


    *   一个连接更新 `sakila.film_category` 表。


    *   一个连接更新 `sakila.category` 表。此连接使用 `innodb_lock_wait_timeout = 1`。


