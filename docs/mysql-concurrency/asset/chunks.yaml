    sql_text: start transaction

    nesting_event_id: NULL

    nesting_event_type: NULL

    mysql_errno: 0

    error:

    message_text: NULL

    *************************** 2. row ***************************

    sql_text: UPDATE world.city SET Population = Population * 1.10 WHERE CountryCode
    = ''AUS''

    nesting_event_id: 8

    nesting_event_type: TRANSACTION

    mysql_errno: 0

    error:

    message_text: Rows matched: 14  Changed: 14  Warnings: 0

    *************************** 3. row ***************************

    sql_text: UPDATE world.country SET Population = Population * 1.10 WHERE Code =
    ''AUS''

    nesting_event_id: 8

    nesting_event_type: TRANSACTION

    mysql_errno: 0

    error:

    message_text: Rows matched: 1  Changed: 1  Warnings: 0

    *************************** 4. row ***************************

    sql_text: rollback

    nesting_event_id: 8

    nesting_event_type: TRANSACTION

    mysql_errno: 0

    error:

    message_text: NULL

    4 rows in set (0.0016 sec)

    ```


    ### 调查案例 #5


    连接 ID 3 的另一个查询结果如下：


    ```sql

    SELECT sql_text, nesting_event_id,

    nesting_event_type, mysql_errno,

    IFNULL(error_name, '''') AS error,

    message_text

    FROM performance_schema.events_statements_history

    LEFT OUTER JOIN performance_schema.events_errors_summary_global_by_error

    ON error_number = mysql_errno

    WHERE thread_id = PS_THREAD_ID(763)

    AND event_id > 6

    ORDER BY event_id\G

    ```

    ```

    *************************** 1. row ***************************

    sql_text: start transaction

    nesting_event_id: NULL

    nesting_event_type: NULL

    mysql_errno: 0

    error:

    message_text: NULL

    *************************** 2. row ***************************

    sql_text: UPDATE world.country SET Population = Population + 146000 WHERE Code
    = ''AUS''

    nesting_event_id: 8

    nesting_event_type: TRANSACTION

    mysql_errno: 0

    error:

    message_text: Rows matched: 1  Changed: 1  Warnings: 0

    *************************** 3. row ***************************

    sql_text: INSERT INTO world.city VALUES (4080, ''Darwin'', ''AUS'', ''Northern
    Territory'', 146000)

    nesting_event_id: 8

    nesting_event_type: TRANSACTION

    mysql_errno: 1213

    error: ER_LOCK_DEADLOCK

    message_text: Deadlock found when trying to get lock; try restarting transaction

    *************************** 4. row ***************************

    sql_text: SHOW WARNINGS

    nesting_event_id: NULL

    nesting_event_type: NULL

    mysql_errno: 0

    error:

    message_text: NULL

    *************************** 5. row ***************************

    sql_text: rollback

    nesting_event_id: NULL

    nesting_event_type: NULL

    mysql_errno: 0

    error:

    message_text: NULL

    5 rows in set (0.0010 sec)

    ```


    **图 16-3** 查找涉及死锁的查询


    请注意，对于连接 ID 763（第二个事务），包含了 MySQL 错误编号，并且在第三行中该编号被设置为 1213 – 一个死锁错误。当遇到错误时，MySQL
    Shell 会自动执行一个 `SHOW WARNINGS` 语句，这就是第 4 行的语句。另请注意，对于事务 2 的 `ROLLBACK`，其嵌套事件是 `NULL`，而对于事务
    1 的 `ROLLBACK` 则不是。这是因为死锁触发了整个事务的回滚（因此事务 2 的 `ROLLBACK` 没有做任何事情）。


    死锁是由事务 1 首先更新 `city` 表的人口，然后更新 `country` 表的人口所触发的。事务 2 首先更新 `country` 表的人口，然后尝试向
    `city` 表插入一个新城市。这是两个工作流以不同顺序更新记录从而容易发生死锁的典型例子。


    总结一下调查过程，它包括两个步骤：

    1.  分析来自 InnoDB 的死锁信息，以确定死锁中涉及的锁，并获取有关连接的尽可能多的信息。

    2.  使用其他来源（例如 `Performance Schema`）来获取有关事务中查询的更多信息。通常需要分析应用程序以获取查询列表。


    既然你知道了是什么触发了死锁，那么解决这个问题需要做什么呢？


    ## 解决方案


    死锁是最容易解决的锁情况，因为 InnoDB 会自动选择一个事务作为受害者并回滚它。在之前讨论的死锁中，事务 2 被选为受害者，这可以从死锁输出中看出：

    ```

    *** WE ROLL BACK TRANSACTION (2)

    ```

    这意味着对于事务 1，无需做任何事情。在事务 2 被回滚后，事务 1 可以继续并完成其工作。


    对于事务 2，InnoDB 已经回滚了整个事务，所以你需要做的就是重试该事务。记住要重新执行所有查询，而不是依赖第一次尝试时返回的值；否则，你可能会使用过时的值。


    > **提示**：始终准备好处理死锁和锁等待超时。对于死锁或在锁等待超时后事务被回滚的情况，重试整个事务。对于只有查询被回滚的锁等待超时，重试查询，可能需要添加延迟。


    如果死锁发生得相对较少，你实际上不需要做更多事情。死锁是生活中的常态，因此遇到几个死锁不要惊慌。如果死锁造成重大影响，你需要着手进行更改以防止一些死锁。


    ## 预防措施


    减少死锁与通常减少记录锁争用非常相似，另外一点是，在整个应用程序中以相同顺序获取锁非常重要。建议再次阅读关于减少锁问题的第 9 章：

    *   通过将大事务拆分为几个较小的事务并添加索引以减少持有的锁数量，来减少每个事务完成的工作量。

    *   考虑使用 `READ COMMITTED` 事务隔离级别（如果它适用于你的应用程序），以减少锁的数量和持有时间。

    *   确保事务仅保持打开尽可能短的时间。

    *   以相同顺序访问记录，必要时执行 `SELECT ... FOR UPDATE` 或 `SELECT ... FOR SHARE` 查询以抢先获取锁。


    减少死锁的主要点是：减少锁的数量及其持有时间，并以相同顺序获取它们。'
