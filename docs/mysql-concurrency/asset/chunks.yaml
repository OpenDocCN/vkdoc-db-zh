    In this simple example, almost 4000 (the `NULL` row at the bottom of the result
    of querying `events_waits_history_long`) synchronization objects were requested.
    The exact list of waits and the number of them will vary from execution to execution
    and system to system depending on the state of the system (like whether the data
    is already in the buffer pool) and the configuration. If there is enough other
    activity, the number may also be much lower as some of the waits may have been
    pushed out of the `events_waits_history_long` table by newer events. To complicate
    matters, background threads also generate wait events, so even if the system has
    no connections, wait events are created.


    While it is hard to set up test cases that demonstrate the use of individual synchronization
    objects, the good news is that you as an end user mostly need to worry about contention,
    and the `SHOW ENGINE INNODB STATUS` and `SHOW ENGINE INNODB MUTEX` statements
    will provide you information about the contention of InnoDB mutexes and semaphores.


    In general, you will need to study the source code to understand what the wait
    is for; however, alone considering the file can often provide a good indication
    of the functional area where the contention happens. Table [7-2](#502546_1_En_7_Chapter.xhtml#Tab2)
    shows a few examples of how to map the file name provided by the mutex and semaphore
    information to the functional area. The source code path is relative to `storage/innobase`
    which contains the implementation of the InnoDB storage engine.


    Table 7-2


    Mutex and semaphore file names and their functional area


    | File Name | Source Code Path | Functional Area |

    | --- | --- | --- |

    | `btr0sea.cc` | `btr/btr0sea.cc` | The adaptive hash index. |

    | `buf0buf.cc` | `buf/buf0buf.cc` | The buffer pool. |

    | `buf0flu.cc` | `buf/buf0flu.cc` | The buffer pool flushing algorithm. |

    | `dict0dict.cc` | `dict/dict0dict.cc` | The InnoDB data dictionary. |

    | `sync0sharded_rw.h` | `include/sync0sharded_rw.h` | The sharded read-write lock
    for threads. |

    | `hash0hash.cc` | `ha/hash0hash.cc` | For protecting hash tables. |

    | `fil0fil.cc` | `fil/fil0fil.cc` | The tablespace memory cache. |


    Other than for mutexes and semaphores implemented in header files, in general,
    you get to the source code file by using the name before the 0 in the file name
    (e.g., `btr` in `btr0sea.cc`) as the name of the directory and then the file name
    itself. If you open the file in an editor, then just after the license and copyright
    header, you will see a brief comment describing what the file is for, for example,
    from `storage/innobase/btr/btr0sea.cc`:


    ```

    /** @file btr/btr0sea.cc

    The index tree adaptive search

    Created 2/17/1996 Heikki Tuuri

    *************************************************************************/

    ```


    So, the `btr0sea.cc` file implements the adaptive search on the index tree of
    which the adaptive hash index is part of (and where the contention most commonly
    occurs).


    WHY INNOBASE? A BRIEF HISTORY OF INNODB


    It may have puzzled you why the path to the InnoDB source code is `storage/innobase/`
    using “innobase” rather than “innodb.” To understand that, you need to dive into
    the history of InnoDB – which turns out to be quite interesting.


    Innobase was a company founded by Heikki Tuuri (yep, the same that is listed in
    the comment for the file `storage/innobase/btr/btr0sea.cc`) in 1995, the same
    year as the initial release of MySQL, but at that time the two had nothing to
    do with each other. Innobase was used to develop InnoDB which at the time meant
    to be an independent product. It was not until later when MySQL added support
    for third-party storage engines that Heikki released InnoDB as open source and
    it was integrated with MySQL.'
