- fmt: '# InnoDB 锁冲突处理与互斥锁等待


    在这种情况下，连接 2 成为死锁的受害者，尽管它从未被授予记录锁。这种死锁的发生是因为 InnoDB 目前不允许连接 1 中将共享锁升级为独占锁的请求跳过连接
    2 的锁请求。这在技术上是有可能实现的，但由于此类场景相对罕见，尚未实现。也就是说，如果使用了外键，一条 DML 语句可能会在涉及外键关系的另一张表上获取共享锁（另见第
    10 章），因此如果同一事务中的后续语句试图升级该共享锁，那么就可能看到与此示例中相同类型的死锁。


    在大多数情况下，自动死锁检测对于避免查询不必要地长时间停滞非常有用。然而，死锁检测并非没有代价。对于查询并发性非常高的 MySQL 实例，寻找死锁的开销可能变得显著，此时最好禁用死锁检测，这可以通过将
    `innodb_deadlock_detect` 选项设置为 `OFF` 来完成。需要说明的是，在 MySQL 8.0.18 及更高版本中，死锁检测已移至专用的后台线程，从而提升了性能。


    如果确实要禁用死锁检测，建议将 `innodb_lock_wait_timeout` 设置为一个非常低的值，例如 1 秒，以便快速检测锁争用。此外，启用 `innodb_rollback_on_timeout`
    选项以确保锁被释放。


    最后一种锁冲突处理发生在 InnoDB 互斥锁和信号量等待时。


    ## InnoDB 互斥锁和信号量等待


    当 InnoDB 请求一个互斥锁或读写锁信号量而无法立即获得时，它将不得不等待。由于等待发生在比数据锁更低的层次，InnoDB 在等待时将采用两种方法之一。它可以进入一个循环并轮询锁是否变得可用，或者它可以挂起线程并使其可用于其他任务。


    轮询可以更快地获得锁，但它会使 CPU 线程保持忙碌，并且轮询可能导致其他线程的 CPU 缓存失效。有三个配置选项可用于控制此行为：


    *   `innodb_spin_wait_delay`：在轮询时，InnoDB 会计算一个介于零和 `innodb_spin_wait_delay` 之间的随机数。该数乘以
    `innodb_spin_wait_pause_multiplier` 来确定轮询循环中发生的 `PAUSE` 指令数量。随机数量的 `PAUSE` 事件用于减少缓存失效的影响。较小的值——甚至
    0——在具有单一共享快速 CPU 缓存的系统上可能有帮助。较大的值可以减少缓存失效的影响，特别是在多 CPU 系统上。


    *   `innodb_spin_wait_pause_multiplier`：与自旋等待延迟一起使用的乘数。此选项是 MySQL 8.0.16 新增的，旨在适应
    Skylake 处理器一代引入的 `PAUSE` 指令持续时间的变化。更改此值的主要用途是在那些 `PAUSE` 指令持续时间与 Skylake 之前一代的
    x86/x86-64 不同的架构上使用 MySQL。在早期版本中，乘数是硬编码为 50 的，这也是 `innodb_spin_wait_pause_multiplier`
    的默认值。


    *   `innodb_sync_spin_loops`：在挂起线程之前要执行的自旋循环次数。该值越低，CPU 线程就能越快地用于其他任务，代价是更多的上下文切换。当超过自旋循环次数时，操作系统的读写锁等待计数器会增加。该值越高，锁就能越快地被获取，代价是更高的
    CPU 使用率。默认值为 30。


    你很少需要调整这些设置；然而，在极少数情况下，它们可以在一定程度上改善性能。也就是说，如果你没有使用最新的 MySQL 版本，通过升级而不是调整这些选项，可能在减少互斥锁/信号量争用方面获益更多。在所有情况下，如果你决定更改这些设置，请确保在与你的生产系统相同的架构和硬件配置上，并使用能很好代表生产工作负载的工作负载进行彻底的性能测试。


    如果一个 InnoDB 互斥锁或读写锁信号量等待无法立即获得，InnoDB 也会在内部记录它。通过 `SHOW ENGINE INNODB MUTEX` 暴露的相关计数器会增加（尽管只显示至少有一次操作系统等待的互斥锁和读写锁），并且如果在等待正在进行时生成
    InnoDB 监视器报告，它将被包含在报告的 `SEMAPHORES` 等待部分中。如果等待持续超过 240 秒且未检测到进展，InnoDB 将自动启用 InnoDB
    监视器并将输出写入错误日志，以便你调查问题。如果再过 600 秒仍未检测到进展，则 InnoDB 将作为预防措施关闭 MySQL，因为它假定发生了无法解决的情况。在这种情况下，你会看到一条解释关闭原因的错误，例如（是的，打印的时间有些误导，因为它是自“长信号量等待”条件在
    240 秒触发以来的时间）：


    ```

    2020-07-05T09:30:24.151782Z 0 [ERROR] [MY-012872] [InnoDB] Semaphore wait has
    lasted > 600 seconds. We intentionally crash the server because it appears to
    be hung.

    ```


    通过崩溃服务器，InnoDB 确保如果内部遇到 InnoDB 错误，情况会得到解决，但代价是 MySQL 必须重启并经历崩溃恢复。因此，这被认为是最后的手段，并且目前超时是不可配置的。


    注意


    执行 `CHECK TABLE` 时，超时阈值会增加到 7200 秒（2 小时）。


    这样的关闭通常由以下两个原因之一引起：


    *   存在阻止 InnoDB 进展的硬件或操作系统问题。

    *   InnoDB 中存在错误，例如，未检测到缓慢操作的进展，或者在获取互斥锁或信号量时发生了死锁。


    如果你遇到这样的关闭，请从错误日志中的 InnoDB 监视器输出验证等待发生的位置。在某些情况下，你可以使用线程 ID 来确定是哪个查询导致了等待。你还应该检查系统日志以验证硬件的健康状况以及操作系统层面是否有任何问题迹象。


    ## 总结


    本章概述了当锁无法立即获得时会发生什么。首先描述了争用感知事务调度（CATS）算法。该算法在 MySQL 8 中使用，以允许已持有许多锁的事务更快地获得其锁请求，从而它们的锁也能更快地被释放。


    其次，讨论了 InnoDB 数据锁的兼容性是一个非常复杂的问题，这意味着在尝试重现问题时必须考虑锁的顺序。


    本章的其余部分介绍了元数据、备份和 InnoDB 锁等待超时、死锁，以及 InnoDB 互斥锁和读写锁信号量等待。锁等待和死锁在高度并发的系统中自然会发生，其本身不应成为警报的原因。主要问题在于它们变得频繁时。默认的锁等待超时也可能过长，因此减少它们并处理超时可能是一个选择。


    现在你已经了解了锁的工作原理以及锁请求可能失败的原因，你需要考虑如何减少锁的影响，这是下一章的主题。'
  raw: 'In this case, Connection 2 becomes a victim of a deadlock without having ever
    being granted a record lock. This deadlock happens because InnoDB currently does
    not allow the request to upgrade the shared lock to an exclusive lock in Connection
    1 to jump ahead of Connection 2’s lock request. It is something that can potentially
    be implemented, but because these scenarios are relatively rare, it has not been
    done yet. That said, if you have foreign keys, a DML statement may take a shared
    lock on the other table in the foreign key relationship (see also Chapter [10](#502546_1_En_10_Chapter.xhtml)),
    so if a subsequent statement in the same transaction tried to upgrade that shared
    lock, then you can see the same kind of deadlocks as in this example.


    In most cases, the automatic deadlock detection is great to avoid queries stalling
    for longer than necessary. Deadlock detection is not for free though. For MySQL
    instances with a very high query concurrency, the cost of looking for deadlocks
    can become significant, and you are better off disabling the deadlock detection
    which is done by setting the `innodb_deadlock_detect` option to `OFF`. That said,
    in MySQL 8.0.18 and later, the deadlock detection has been moved to a dedicated
    background thread which improves the performance.


    If you do disable deadlock detection, it is recommended to set `innodb_lock_wait_timeout`
    to a very low value such as 1 second to quickly detect lock contention. Additionally,
    enable the `innodb_rollback_on_timeout` option to ensure the locks are released.


    The last kind of lock conflict handling occurs with InnoDB mutexes and semaphores.


    ## InnoDB Mutex and Semaphore Waits


    When InnoDB requests a mutex or rw-lock semaphore and it cannot be immediately
    obtained, it will have to wait. Because the waits happen at a lower level than
    data locks, InnoDB will resort to one of two approaches while waiting. It can
    enter a loop and poll for the lock to become available, or it can suspend the
    thread and make it available for other tasks.


    Polling allows the lock to be obtained more quickly but it keeps the CPU thread
    busy, and polling can cause CPU cache invalidation for other threads. There are
    three configuration options that can be used to control the behavior:


    *   **innodb_spin_wait_delay** **:** When polling, InnoDB will calculate a random
    number between zero and `innodb_spin_wait_delay`. This is multiplied with `innodb_spin_wait_pause_multiplier`
    to determine the number of `PAUSE` instructions that occur in the poll loop. The
    random number of `PAUSE` events is used to reduce the impact of cache invalidation.
    Smaller values – or even 0 – can potentially help on systems with a single shared
    fast CPU cache. Larger values can reduce the impact of cache invalidation particularly
    on multi-CPU systems.


    *   **innodb_spin_wait_pause_multiplier** **:** The multiplier used with the spin
    wait delay. This option is new from MySQL 8.0.16 and was introduced to accommodate
    for the change in the duration of the `PAUSE` instructions introduced with the
    Skylake generation of processors. The primary use of changing the value is using
    MySQL on architectures that have a different duration of the `PAUSE` instructions
    than x86/x86-64 before the Skylake generation. In earlier releases, the multiplier
    is hardcoded to 50 which is also the default value for `innodb_spin_wait_pause_multiplier`.


    *   **innodb_sync_spin_loops** **:** The number of spin loops to perform before
    suspending the thread. The lower the value, the quicker the CPU thread is made
    available for other tasks at the expense of more context switches. When the spin
    loops are exceeded, the OS waits counter for the rw-lock increments. The higher
    the value, the quicker the lock can be obtained at the cost of higher CPU usage.
    The default is 30.


    You will rarely have to adjust these settings; however, in rare cases, they can
    improve performance to some degree. That said, if you are not using the latest
    MySQL version, you may benefit in terms of reducing mutex/semaphore contention
    more from upgrading than tuning these options. In all cases, if you decide to
    change these settings, make sure you test the performance thoroughly on the same
    architecture and hardware configuration as your production system and with a workload
    that is a very good representation of your production workload.


    If an InnoDB mutex or rw-lock semaphore wait cannot be obtained immediately, InnoDB
    will also register this internally. The relevant counter exposed through `SHOW
    ENGINE INNODB MUTEX` will increment (though only mutexes and rw-locks with at
    least one OS wait are displayed), and if you generate the InnoDB monitor report
    while the wait is ongoing, it will be included in the `SEMAPHORES` wait section
    of the rapport. If a wait continues without progress being detected for more than
    240 seconds, InnoDB will automatically enable the InnoDB monitor and write the
    output to the error log, so you can investigate the issue. If no progress is detected
    for another 600 seconds, then InnoDB will shut down MySQL as a preventive measure
    as it assumes an unresolvable situation has occurred. In that case, you will see
    an error explaining the reason for the shutdown, for example (yes, the duration
    printed is somewhat misleading as it is the time since the “long semaphore wait”
    condition triggered at 240 seconds)


    ```

    2020-07-05T09:30:24.151782Z 0 [ERROR] [MY-012872] [InnoDB] Semaphore wait has
    lasted > 600 seconds. We intentionally crash the server because it appears to
    be hung.

    ```


    By crashing the server, InnoDB ensures that if a bug internally in InnoDB has
    been encountered, the situation is resolved, but at the cost that MySQL will have
    to restart and go through a crash recovery. For this reason, it is considered
    a last resort, and at present, the timeout is not configurable.


    Note


    When executing `CHECK TABLE`, the timeout threshold is increased to 7200 seconds
    (2 hours).


    A shutdown like this typically happens for one of two reasons:


    *   There is a hardware or operating system issue that prevents InnoDB progressing.


    *   There is a bug in InnoDB, for example, that progress for a slow operation
    is not detected or a deadlock has occurred for the acquisition of a mutex or semaphore.


    If you encounter a shutdown like this, verify from the InnoDB monitor outputs
    in the error log where the wait occurred. In some cases, you can use the thread
    ids to determine which query is causing the wait. You should also check your system
    logs to verify the health of your hardware and whether there are any indications
    of problems at the operating system level.


    ## Summary


    This chapter has provided an overview of what happens when a lock cannot immediately
    be obtained. First, the contention-aware transaction scheduling (CATS) algorithm
    was described. That is used in MySQL 8 to allow transactions that already hold
    many locks to have their lock requests granted quicker, so their locks also can
    be more quickly released again.


    Second, it was discussed how the compatibility of InnoDB data locks is a very
    a complex issue which means that the lock order must be taken into account when
    trying to reproduce issues.


    The rest of the chapter went through metadata, backup, and InnoDB lock wait timeouts,
    deadlocks, and InnoDB mutex and rw-lock semaphore waits. Lock waits and deadlocks
    are naturally occurring in high concurrency systems and should not on their own
    be a cause for alarm. The main issue is when they become frequent. The default
    lock wait timeouts may also be too long, so reducing them and handling the timeout
    can be an option.


    Now that you have an understanding of how locks work and how lock requests can
    fail, you need to consider how you can reduce the impact of locking which is the
    topic of the next chapter.'
  trans: '# InnoDB 锁冲突处理与互斥锁等待


    在这种情况下，连接 2 成为了死锁的受害者，尽管它从未被授予记录锁。这种死锁的发生是因为 InnoDB 目前不允许连接 1 中将共享锁升级为独占锁的请求跳过连接
    2 的锁请求。这在技术上是有可能实现的，但由于此类场景相对罕见，尚未实现。也就是说，如果使用了外键，一条 DML 语句可能会在涉及外键关系的另一张表上获取共享锁（另见第
    10 章），因此如果同一事务中的后续语句试图升级该共享锁，那么就可能看到与此示例中相同类型的死锁。


    在大多数情况下，自动死锁检测对于避免查询不必要地长时间停滞非常有用。然而，死锁检测并非没有代价。对于查询并发性非常高的 MySQL 实例，寻找死锁的开销可能变得显著，此时最好禁用死锁检测，这可以通过将
    `innodb_deadlock_detect` 选项设置为 `OFF` 来完成。需要说明的是，在 MySQL 8.0.18 及更高版本中，死锁检测已移至专用的后台线程，从而提升了性能。


    如果确实要禁用死锁检测，建议将 `innodb_lock_wait_timeout` 设置为一个非常低的值，例如 1 秒，以便快速检测锁争用。此外，启用 `innodb_rollback_on_timeout`
    选项以确保锁被释放。


    最后一种锁冲突处理发生在 InnoDB 互斥锁和信号量等待时。


    ## InnoDB 互斥锁和信号量等待


    当 InnoDB 请求一个互斥锁或读写锁信号量而无法立即获得时，它将不得不等待。由于等待发生在比数据锁更低的层次，InnoDB 在等待时将采用两种方法之一。它可以进入一个循环并轮询锁是否变得可用，或者它可以挂起线程并使其可用于其他任务。


    轮询可以更快地获得锁，但它会使 CPU 线程保持忙碌，并且轮询可能导致其他线程的 CPU 缓存失效。有三个配置选项可用于控制此行为：


    *   `innodb_spin_wait_delay`：在轮询时，InnoDB 会计算一个介于零和 `innodb_spin_wait_delay` 之间的随机数。该数乘以
    `innodb_spin_wait_pause_multiplier` 来确定轮询循环中发生的 `PAUSE` 指令数量。随机数量的 `PAUSE` 事件用于减少缓存失效的影响。较小的值——甚至
    0——在具有单一共享快速 CPU 缓存的系统上可能有帮助。较大的值可以减少缓存失效的影响，特别是在多 CPU 系统上。


    *   `innodb_spin_wait_pause_multiplier`：与自旋等待延迟一起使用的乘数。此选项是 MySQL 8.0.16 新增的，旨在适应
    Skylake 处理器一代引入的 `PAUSE` 指令持续时间的变化。更改此值的主要用途是在那些 `PAUSE` 指令持续时间与 Skylake 之前一代的
    x86/x86-64 不同的架构上使用 MySQL。在早期版本中，乘数是硬编码为 50 的，这也是 `innodb_spin_wait_pause_multiplier`
    的默认值。


    *   `innodb_sync_spin_loops`：在挂起线程之前要执行的自旋循环次数。该值越低，CPU 线程就能越快地用于其他任务，代价是更多的上下文切换。当超过自旋循环次数时，操作系统的读写锁等待计数器会增加。该值越高，锁就能越快地被获取，代价是更高的
    CPU 使用率。默认值为 30。


    你很少需要调整这些设置；然而，在极少数情况下，它们可以在一定程度上改善性能。也就是说，如果你没有使用最新的 MySQL 版本，通过升级而不是调整这些选项，可能在减少互斥锁/信号量争用方面获益更多。在所有情况下，如果你决定更改这些设置，请确保在与你的生产系统相同的架构和硬件配置上，并使用能很好代表生产工作负载的工作负载进行彻底的性能测试。


    如果一个 InnoDB 互斥锁或读写锁信号量等待无法立即获得，InnoDB 也会在内部记录它。通过 `SHOW ENGINE INNODB MUTEX` 暴露的相关计数器会增加（尽管只显示至少有一次操作系统等待的互斥锁和读写锁），并且如果在等待正在进行时生成
    InnoDB 监视器报告，它将被包含在报告的 `SEMAPHORES` 等待部分中。如果等待持续超过 240 秒且未检测到进展，InnoDB 将自动启用 InnoDB
    监视器并将输出写入错误日志，以便你调查问题。如果再过 600 秒仍未检测到进展，则 InnoDB 将作为预防措施关闭 MySQL，因为它假定发生了无法解决的情况。在这种情况下，你会看到一条解释关闭原因的错误，例如（是的，打印的时间有些误导，因为它是自“长信号量等待”条件在
    240 秒触发以来的时间）：


    ```

    2020-07-05T09:30:24.151782Z 0 [ERROR] [MY-012872] [InnoDB] Semaphore wait has
    lasted > 600 seconds. We intentionally crash the server because it appears to
    be hung.

    ```


    通过崩溃服务器，InnoDB 确保如果内部遇到 InnoDB 错误，情况会得到解决，但代价是 MySQL 必须重启并经历崩溃恢复。因此，这被认为是最后的手段，并且目前超时是不可配置的。


    注意


    执行 `CHECK TABLE` 时，超时阈值会增加到 7200 秒（2 小时）。


    这样的关闭通常由以下两个原因之一引起：


    *   存在阻止 InnoDB 进展的硬件或操作系统问题。

    *   InnoDB 中存在错误，例如，未检测到缓慢操作的进展，或者在获取互斥锁或信号量时发生了死锁。


    如果你遇到这样的关闭，请从错误日志中的 InnoDB 监视器输出验证等待发生的位置。在某些情况下，你可以使用线程 ID 来确定是哪个查询导致了等待。你还应该检查系统日志以验证硬件的健康状况以及操作系统层面是否有任何问题迹象。


    ## 总结


    本章概述了当锁无法立即获得时会发生什么。首先描述了争用感知事务调度（CATS）算法。该算法在 MySQL 8 中使用，以允许已持有许多锁的事务更快地获得其锁请求，从而它们的锁也能更快地被释放。


    其次，讨论了 InnoDB 数据锁的兼容性是一个非常复杂的问题，这意味着在尝试重现问题时必须考虑锁的顺序。


    本章的其余部分介绍了元数据、备份和 InnoDB 锁等待超时、死锁，以及 InnoDB 互斥锁和读写锁信号量等待。锁等待和死锁在高度并发的系统中自然会发生，其本身不应成为警报的原因。主要问题在于它们变得频繁时。默认的锁等待超时也可能过长，因此减少它们并处理超时可能是一个选择。


    现在你已经了解了锁的工作原理以及锁请求可能失败的原因，你需要考虑如何减少锁的影响，这是下一章的主题。'
- fmt: "# 9. Reducing Locking Issues\n\nRemember that the locking in MySQL and InnoDB\
    \ is a means to provide concurrent access, and in general the fine-grained locking\
    \ of InnoDB allows for a highly concurrent workload. Yet, if you have excessive\
    \ locking, it will cause reduced concurrency and query pileups, and in the worst\
    \ case, it can cause an application to come to a grinding halt and cause a poor\
    \ user experience.\n\nThus, it is important to have locks in mind when you write\
    \ an application and design the schema for its data and access. The strategies\
    \ to reduce locking include adding indexes, changing the transaction isolation\
    \ level, changing the configuration, and preemptive locking. This chapter covers\
    \ each of these strategies.\n\nTip\n\nDo not be carried away in optimizing locks.\
    \ If you only occasionally encounter lock wait timeouts and deadlocks, it is usually\
    \ better to retry the query or transaction rather than spend time avoiding the\
    \ issue. How frequent is too frequent depends on your workload, but several retries\
    \ every hour will not be an issue for many applications.\n\n## Transaction Size\
    \ and Age\n\nAn important strategy to reduce lock issues is to keep your transactions\
    \ small and to avoid delays that keep the transactions open for longer than necessary.\
    \ Among the most common causes of lock issues are transactions that modify a large\
    \ number of rows or that are active for longer than necessary.\n\nThe size of\
    \ the transaction is the amount of work the transaction does, particularly the\
    \ number of locks it takes, but the time the transaction takes to execute is also\
    \ important. As some of the other topics in this discussion will address, you\
    \ can partly reduce the impact through indexes and the transaction isolation level.\
    \ However, it is also important to have the overall result in mind. If you need\
    \ to modify many rows, ask yourself if you can split the work into smaller batches\
    \ or whether it is required that everything is done in the same transaction. It\
    \ may also be possible to split out some preparation work and do it outside the\
    \ main transaction.\n\nThe duration of the transaction is also important. One\
    \ common problem is connections using `autocommit = 0`. This starts a new transaction\
    \ every time a query (including `SELECT`) is executed without an active transaction,\
    \ and the transaction is not completed until an explicit `COMMIT` or `ROLLBACK`\
    \ is executed, a `DDL` statement is executed, or the connection is closed. Some\
    \ connectors disable `autocommit` by default, so you may be using this mode without\
    \ realizing it which can leave transactions open for hours by mistake.\n\nTip\n\
    \nEnable the `autocommit` option unless you have a specific reason to disable\
    \ it. When you have autocommitting enabled, InnoDB can also for many `SELECT`\
    \ queries detect it is a read-only transaction and reduce the overhead of the\
    \ query.\n\nAnother pitfall is to start a transaction and perform slow operations\
    \ in the application while the transaction is active. This can be data that is\
    \ sent back to the user, interactive prompts, or file I/O. Make sure that you\
    \ do these kinds of slow operations when you do not have an active transaction\
    \ open in MySQL.\n\n## Indexes\n\nIndexes reduce the amount of work performed\
    \ to access a given row. That way indexes are a great tool to reduce locking as\
    \ only records accessed while executing the query will be locked.\n\nConsider\
    \ a simple example where you query cities with the name Sydney in the `world.city`\
    \ table:\n\n```\nSTART TRANSACTION;\nSELECT *\nFROM world.city\nWHERE Name = 'Sydney'\n\
    FOR SHARE;\n```\n\nThe `FOR SHARE` option is used to force the query to take a\
    \ shared lock on the records read. By default, there is no index on the `Name`\
    \ column, so the query will perform a full table scan to find the rows needed\
    \ in the result. Without an index, there are 4103 record locks (24 of the locks\
    \ are on the supremum pseudo-record of the primary key) as shown in Listing 9-1.\n\
    \n```\n-- Connection   Processlist ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
    --          1              697        1143          6\n--          2         \
    \     698        1144          6\n-- Connection 1\nConnection 1> START TRANSACTION;\n\
    Query OK, 0 rows affected (0.0002 sec)\nConnection 1> SELECT ID, Name, CountryCode,\
    \ District\n    FROM world.city\n    WHERE Name = 'Sydney'\n    FOR SHARE;\n+-----+--------+-------------+-----------------+\n\
    | ID  | Name   | CountryCode | District        |\n+-----+--------+-------------+-----------------+\n\
    | 130 | Sydney | AUS         | New South Wales |\n+-----+--------+-------------+-----------------+\n\
    1 row in set (0.0034 sec)\n-- Connection 2\nConnection 2> SELECT index_name, lock_type,\n\
    \                  lock_mode, COUNT(*)\n              FROM performance_schema.data_locks\n\
    \              WHERE object_schema = 'world'\n                AND object_name\
    \ = 'city'\n                AND thread_id = 1143\n              GROUP BY index_name,\
    \ lock_type, lock_mode;\n+------------+-----------+-----------+----------+\n|\
    \ index_name | lock_type | lock_mode | COUNT(*) |\n+------------+-----------+-----------+----------+\n\
    | NULL       | TABLE     | IS        |        1 |\n| PRIMARY    | RECORD    |\
    \ S         |     4103 |\n+------------+-----------+-----------+----------+\n\
    2 rows in set (0.0323 sec)\n-- Connection 1\nConnection 1> ROLLBACK;\nQuery OK,\
    \ 0 rows affected (0.0005 sec)\nListing 9-1\nRecord locks without an index on\
    \ the Name column\n```\n\nIf you add an index on the `Name` column, the lock count\
    \ decreases to a total of three record locks as shown in Listing 9-2.\n\n```\n\
    -- Connection   Processlist ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
    --          1              699        1145          6\n--          2         \
    \     700        1146          6\n-- Connection 1\nConnection 1> ALTER TABLE world.city\n\
    \              ADD INDEX (Name);\nQuery OK, 0 rows affected (1.5063 sec)\nRecords:\
    \ 0  Duplicates: 0  Warnings: 0\nConnection 1> START TRANSACTION;\nQuery OK, 0\
    \ rows affected (0.0003 sec)\nConnection 1> SELECT ID, Name, CountryCode, District\n\
    \    FROM world.city\n    WHERE Name = 'Sydney'\n    FOR SHARE;\n+-----+--------+-------------+-----------------+\n\
    | ID  | Name   | CountryCode | District        |\n+-----+--------+-------------+-----------------+\n\
    | 130 | Sydney | AUS         | New South Wales |\n+-----+--------+-------------+-----------------+\n\
    1 row in set (0.0004 sec)\n-- Connection 2\nConnection 2> SELECT index_name, lock_type,\n\
    \                  lock_mode, COUNT(*)\n              FROM performance_schema.data_locks\n\
    \              WHERE object_schema = 'world'\n                AND object_name\
    \ = 'city'\n                AND thread_id = 1145\n              GROUP BY index_name,\
    \ lock_type, lock_mode;\n+------------+-----------+---------------+----------+\n\
    | index_name | lock_type | lock_mode     | COUNT(*) |\n+------------+-----------+---------------+----------+\n\
    | NULL       | TABLE     | IS            |        1 |\n| Name       | RECORD \
    \   | S             |        1 |\n| PRIMARY    | RECORD    | S,REC_NOT_GAP | \
    \       1 |\n| Name       | RECORD    | S,GAP         |        1 |\n+------------+-----------+---------------+----------+\n\
    4 rows in set (0.0011 sec)\n-- Connection 1\nConnection 1> ROLLBACK;\nQuery OK,\
    \ 0 rows affected (0.0004 sec)\nConnection 1> ALTER TABLE world.city\n       \
    \       DROP INDEX Name;\nQuery OK, 0 rows affected (0.3288 sec)\nRecords: 0 \
    \ Duplicates: 0  Warnings: 0\nListing 9-2\nRecord locks with an index on the Name\
    \ column\n```\n\nOn the flip side, more indexes provide more ways to access the\
    \ same rows which potentially can increase the number of `deadlocks`."
  raw: '# 9. Reducing Locking Issues


    Remember that the locking in MySQL and InnoDB is a means to provide concurrent
    access, and in general the fine-grained locking of InnoDB allows for a highly
    concurrent workload. Yet, if you have excessive locking, it will cause reduced
    concurrency and query pileups, and in the worst case, it can cause an application
    to come to a grinding halt and cause a poor user experience.


    Thus, it is important to have locks in mind when you write an application and
    design the schema for its data and access. The strategies to reduce locking include
    adding indexes, changing the transaction isolation level, changing the configuration,
    and preemptive locking. This chapter covers each of these strategies.


    Tip


    Do not be carried away in optimizing locks. If you only occasionally encounter
    lock wait timeouts and deadlocks, it is usually better to retry the query or transaction
    rather than spend time avoiding the issue. How frequent is too frequent depends
    on your workload, but several retries every hour will not be an issue for many
    applications.


    ## Transaction Size and Age


    An important strategy to reduce lock issues is to keep your transactions small
    and to avoid delays that keep the transactions open for longer than necessary.
    Among the most common causes of lock issues are transactions that modify a large
    number of rows or that are active for longer than necessary.


    The size of the transaction is the amount of work the transaction does, particularly
    the number of locks it takes, but the time the transaction takes to execute is
    also important. As some of the other topics in this discussion will address, you
    can partly reduce the impact through indexes and the transaction isolation level.
    However, it is also important to have the overall result in mind. If you need
    to modify many rows, ask yourself if you can split the work into smaller batches
    or whether it is required that everything is done in the same transaction. It
    may also be possible to split out some preparation work and do it outside the
    main transaction.


    The duration of the transaction is also important. One common problem is connections
    using `autocommit = 0`. This starts a new transaction every time a query (including
    `SELECT`) is executed without an active transaction, and the transaction is not
    completed until an explicit `COMMIT` or `ROLLBACK` is executed, a DDL statement
    is executed, or the connection is closed. Some connectors disable autocommit by
    default, so you may be using this mode without realizing it which can leave transactions
    open for hours by mistake.


    Tip


    Enable the `autocommit` option unless you have a specific reason to disable it.
    When you have autocommitting enabled, InnoDB can also for many `SELECT` queries
    detect it is a read-only transaction and reduce the overhead of the query.


    Another pitfall is to start a transaction and perform slow operations in the application
    while the transaction is active. This can be data that is sent back to the user,
    interactive prompts, or file I/O. Make sure that you do these kinds of slow operations
    when you do not have an active transaction open in MySQL.


    ## Indexes


    Indexes reduce the amount of work performed to access a given row. That way indexes
    are a great tool to reduce locking as only records accessed while executing the
    query will be locked.


    Consider a simple example where you query cities with the name Sydney in the `world.city`
    table:


    ```

    START TRANSACTION;

    SELECT *

    FROM world.city

    WHERE Name = ''Sydney''

    FOR SHARE;

    ```


    The `FOR SHARE` option is used to force the query to take a shared lock on the
    records read. By default, there is no index on the `Name` column, so the query
    will perform a full table scan to find the rows needed in the result. Without
    an index, there are 4103 record locks (24 of the locks are on the supremum pseudo-record
    of the primary key) as shown in Listing [9-1](#502546_1_En_9_Chapter.xhtml#PC2).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              697        1143          6

    --          2              698        1144          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> SELECT ID, Name, CountryCode, District

    FROM world.city

    WHERE Name = ''Sydney''

    FOR SHARE;

    +-----+--------+-------------+-----------------+

    | ID  | Name   | CountryCode | District        |

    +-----+--------+-------------+-----------------+

    | 130 | Sydney | AUS         | New South Wales |

    +-----+--------+-------------+-----------------+

    1 row in set (0.0034 sec)

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, COUNT(*)

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND thread_id = 1143

    GROUP BY index_name, lock_type, lock_mode;

    +------------+-----------+-----------+----------+

    | index_name | lock_type | lock_mode | COUNT(*) |

    +------------+-----------+-----------+----------+

    | NULL       | TABLE     | IS        |        1 |

    | PRIMARY    | RECORD    | S         |     4103 |

    +------------+-----------+-----------+----------+

    2 rows in set (0.0323 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0005 sec)

    Listing 9-1

    Record locks without an index on the Name column

    ```


    If you add an index on the `Name` column, the lock count decreases to a total
    of three record locks as shown in Listing [9-2](#502546_1_En_9_Chapter.xhtml#PC3).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              699        1145          6

    --          2              700        1146          6

    -- Connection 1

    Connection 1> ALTER TABLE world.city

    ADD INDEX (Name);

    Query OK, 0 rows affected (1.5063 sec)

    Records: 0  Duplicates: 0  Warnings: 0

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT ID, Name, CountryCode, District

    FROM world.city

    WHERE Name = ''Sydney''

    FOR SHARE;

    +-----+--------+-------------+-----------------+

    | ID  | Name   | CountryCode | District        |

    +-----+--------+-------------+-----------------+

    | 130 | Sydney | AUS         | New South Wales |

    +-----+--------+-------------+-----------------+

    1 row in set (0.0004 sec)

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, COUNT(*)

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND thread_id = 1145

    GROUP BY index_name, lock_type, lock_mode;

    +------------+-----------+---------------+----------+

    | index_name | lock_type | lock_mode     | COUNT(*) |

    +------------+-----------+---------------+----------+

    | NULL       | TABLE     | IS            |        1 |

    | Name       | RECORD    | S             |        1 |

    | PRIMARY    | RECORD    | S,REC_NOT_GAP |        1 |

    | Name       | RECORD    | S,GAP         |        1 |

    +------------+-----------+---------------+----------+

    4 rows in set (0.0011 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> ALTER TABLE world.city

    DROP INDEX Name;

    Query OK, 0 rows affected (0.3288 sec)

    Records: 0  Duplicates: 0  Warnings: 0

    Listing 9-2

    Record locks with an index on the Name column

    ```


    On the flip side, more indexes provide more ways to access the same rows which
    potentially can increase the number of deadlocks .'
  trans: "\n# 9. 减少锁定问题\n\n请记住，MySQL 和 InnoDB 中的锁定是一种提供并发访问的手段。总体而言，InnoDB 的细粒度锁定机制支持高并发的工作负载。然而，如果存在过多的锁定，会导致并发性降低和查询堆积，在最坏的情况下，可能致使应用程序完全停滞，带来糟糕的用户体验。\n\
    \n因此，在编写应用程序以及为其数据和访问模式设计表结构时，考虑锁定因素至关重要。减少锁定的策略包括：添加索引、更改事务隔离级别、调整配置以及采用预防性锁定。本章将逐一介绍这些策略。\n\
    \n**提示**\n\n不要过度沉迷于锁定优化。如果只是偶尔遇到锁等待超时和死锁，通常更好的做法是重试查询或事务，而非花费精力去规避该问题。“过于频繁”的标准取决于您的工作负载，但对于许多应用程序而言，每小时几次的重试不会构成问题。\n\
    \n## 事务大小与存续时间\n\n减少锁定问题的一个重要策略是保持事务简短，并避免不必要的延迟导致事务长时间保持开启状态。锁定问题最常见的原因之一是修改大量行的事务，或是存续时间超出必要的事务。\n\
    \n事务的大小是指事务所执行的工作量，特别是其获取的锁的数量，但事务执行所需的时间同样重要。正如本讨论中其他部分将涉及的，您可以通过索引和事务隔离级别部分地减轻影响。然而，着眼于整体结果也很重要。如果您需要修改许多行，应自问是否可以将工作拆分为更小的批次，或者是否必须在同一个事务中完成所有操作。也可以将某些准备工作分离出来，在主事务之外完成。\n\
    \n事务的持续时间同样重要。一个常见的问题是连接使用了 `autocommit = 0`。这会在每次执行查询（包括 `SELECT`）时，如果没有活动事务，就会启动一个新事务，并且该事务直到执行了显式的\
    \ `COMMIT` 或 `ROLLBACK`、执行了 `DDL` 语句，或者连接关闭时才会结束。某些连接器默认禁用 `autocommit`，因此您可能在不自知的情况下使用了此模式，从而可能错误地让事务开启数小时。\n\
    \n**提示**\n\n除非有特定理由，否则请启用 `autocommit` 选项。当启用自动提交时，InnoDB 还能针对许多 `SELECT` 查询检测出其为只读事务，从而降低查询开销。\n\
    \n另一个陷阱是在事务活动期间，在应用程序中启动事务并执行缓慢操作。这可能是发送回用户的数据、交互式提示或文件 I/O。请确保在 MySQL 中没有活动事务开启时执行此类缓慢操作。\n\
    \n## 索引\n\n索引减少了访问特定行所需执行的工作量。因此，索引是减少锁定的绝佳工具，因为只有在执行查询时访问到的记录才会被锁定。\n\n考虑一个简单示例，您在\
    \ `world.city` 表中查询名为 Sydney 的城市：\n\n```\nSTART TRANSACTION;\nSELECT *\nFROM world.city\n\
    WHERE Name = 'Sydney'\nFOR SHARE;\n```\n\n`FOR SHARE` 选项用于强制查询对读取的记录获取共享锁。默认情况下，`Name`\
    \ 列上没有索引，因此查询将执行全表扫描来查找结果中所需的行。没有索引时，会产生 4103 个记录锁（其中 24 个锁位于主键的 supremum 伪记录上），如代码清单\
    \ 9-1 所示。\n\n```\n-- Connection   Processlist ID   Thread ID   Event ID\n-- --------------------------------------------------\n\
    --          1              697        1143          6\n--          2         \
    \     698        1144          6\n-- Connection 1\nConnection 1> START TRANSACTION;\n\
    Query OK, 0 rows affected (0.0002 sec)\nConnection 1> SELECT ID, Name, CountryCode,\
    \ District\n    FROM world.city\n    WHERE Name = 'Sydney'\n    FOR SHARE;\n+-----+--------+-------------+-----------------+\n\
    | ID  | Name   | CountryCode | District        |\n+-----+--------+-------------+-----------------+\n\
    | 130 | Sydney | AUS         | New South Wales |\n+-----+--------+-------------+-----------------+\n\
    1 row in set (0.0034 sec)\n-- Connection 2\nConnection 2> SELECT index_name, lock_type,\n\
    \                  lock_mode, COUNT(*)\n              FROM performance_schema.data_locks\n\
    \              WHERE object_schema = 'world'\n                AND object_name\
    \ = 'city'\n                AND thread_id = 1143\n              GROUP BY index_name,\
    \ lock_type, lock_mode;\n+------------+-----------+-----------+----------+\n|\
    \ index_name | lock_type | lock_mode | COUNT(*) |\n+------------+-----------+-----------+----------+\n\
    | NULL       | TABLE     | IS        |        1 |\n| PRIMARY    | RECORD    |\
    \ S         |     4103 |\n+------------+-----------+-----------+----------+\n\
    2 rows in set (0.0323 sec)\n-- Connection 1\nConnection 1> ROLLBACK;\nQuery OK,\
    \ 0 rows affected (0.0005 sec)\n代码清单 9-1\nName 列上无索引时的记录锁\n```\n\n如果您在 `Name`\
    \ 列上添加索引，锁的总数将减少到三个记录锁，如代码清单 9-2 所示。\n\n```\n-- Connection   Processlist ID  \
    \ Thread ID   Event ID\n-- --------------------------------------------------\n\
    --          1              699        1145          6\n--          2         \
    \     700        1146          6\n-- Connection 1\nConnection 1> ALTER TABLE world.city\n\
    \              ADD INDEX (Name);\nQuery OK, 0 rows affected (1.5063 sec)\nRecords:\
    \ 0  Duplicates: 0  Warnings: 0\nConnection 1> START TRANSACTION;\nQuery OK, 0\
    \ rows affected (0.0003 sec)\nConnection 1> SELECT ID, Name, CountryCode, District\n\
    \    FROM world.city\n    WHERE Name = 'Sydney'\n    FOR SHARE;\n+-----+--------+-------------+-----------------+\n\
    | ID  | Name   | CountryCode | District        |\n+-----+--------+-------------+-----------------+\n\
    | 130 | Sydney | AUS         | New South Wales |\n+-----+--------+-------------+-----------------+\n\
    1 row in set (0.0004 sec)\n-- Connection 2\nConnection 2> SELECT index_name, lock_type,\n\
    \                  lock_mode, COUNT(*)\n              FROM performance_schema.data_locks\n\
    \              WHERE object_schema = 'world'\n                AND object_name\
    \ = 'city'\n                AND thread_id = 1145\n              GROUP BY index_name,\
    \ lock_type, lock_mode;\n+------------+-----------+---------------+----------+\n\
    | index_name | lock_type | lock_mode     | COUNT(*) |\n+------------+-----------+---------------+----------+\n\
    | NULL       | TABLE     | IS            |        1 |\n| Name       | RECORD \
    \   | S             |        1 |\n| PRIMARY    | RECORD    | S,REC_NOT_GAP | \
    \       1 |\n| Name       | RECORD    | S,GAP         |        1 |\n+------------+-----------+---------------+----------+\n\
    4 rows in set (0.0011 sec)\n-- Connection 1\nConnection 1> ROLLBACK;\nQuery OK,\
    \ 0 rows affected (0.0004 sec)\nConnection 1> ALTER TABLE world.city\n       \
    \       DROP INDEX Name;\nQuery OK, 0 rows affected (0.3288 sec)\nRecords: 0 \
    \ Duplicates: 0  Warnings: 0\n代码清单 9-2\nName 列上有索引时的记录锁\n```\n\n另一方面，更多的索引提供了更多访问相同行的方式，这可能会增加\
    \ **死锁** 的数量。\n"
- fmt: '## 记录访问顺序


    确保尽可能为不同的事务以相同的顺序访问记录。在第[8](#502546_1_En_8_Chapter.xhtml)章讨论的死锁示例中，导致死锁的原因是两个事务以相反的顺序访问行。如果它们以相同的顺序访问行，就不会发生死锁。这也适用于访问不同表中的记录。


    确保相同的访问顺序绝非易事。不同的访问顺序甚至可能在您执行连接时发生，优化器为两个查询决定使用不同的连接顺序。如果不同的连接顺序导致过多的锁问题，您可以考虑使用优化器提示来告诉优化器更改连接顺序^([⁴](#fn4))，但在这种情况下，您当然也应该考虑查询性能。


    ## 事务隔离级别


    InnoDB 支持多种事务隔离级别。不同的隔离级别有不同的锁需求：特别是 `REPEATABLE READ` 和 `SERIALIZABLE` 比 `READ
    COMMITTED` 需要更多的锁。


    `READ COMMITTED` 事务隔离级别可以在两个方面帮助解决锁定问题。采用的间隙锁要少得多，并且在 DML 语句期间访问但未修改的行，其锁会在语句完成后再次释放。对于
    `REPEATABLE READ` 和 `SERIALIZABLE`，锁只在事务结束时释放。


    注意


    通常认为 `READ COMMITTED` 事务隔离级别不采用间隙锁。这是一个误解，并不正确。虽然采用的间隙锁少得多，但仍然需要一些。例如，这包括 InnoDB
    检查外键和唯一键约束时，以及发生页面拆分时。


    考虑一个示例，其中使用 `CountryCode` 列将查询限制到一个国家，来更改名为 Sydney 的城市的人口。可以使用以下查询完成：


    ```sql

    START TRANSACTION;

    UPDATE world.city

    SET Population = 5000000

    WHERE Name = ''Sydney''

    AND CountryCode = ''AUS'';

    ```


    `Name` 列上没有索引，但 `CountryCode` 列上有索引。因此，更新需要扫描部分 `CountryCode` 索引。清单 [9-3](#502546_1_En_9_Chapter.xhtml#PC5)
    展示了在 `REPEATABLE READ` 事务隔离级别下执行查询的示例。


    ```sql

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              701        1149          6

    --          2              702        1150          6

    -- Connection 1

    Connection 1> SET SESSION transaction_isolation = ''REPEATABLE-READ'';

    Query OK, 0 rows affected (0.2697 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0007 sec)

    Connection 1> UPDATE world.city

    SET Population = 5000000

    WHERE Name = ''Sydney''

    AND CountryCode = ''AUS'';

    Query OK, 1 row affected (0.0024 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, COUNT(*)

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND thread_id = 1149

    GROUP BY index_name, lock_type, lock_mode;

    +-------------+-----------+---------------+----------+

    | index_name  | lock_type | lock_mode     | COUNT(*) |

    +-------------+-----------+---------------+----------+

    | NULL        | TABLE     | IX            |        1 |

    | CountryCode | RECORD    | X             |       14 |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP |       14 |

    | CountryCode | RECORD    | X,GAP         |        1 |

    +-------------+-----------+---------------+----------+

    4 rows in set (0.0102 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0730 sec)

    Connection 1> SET SESSION transaction_isolation = @@global.transaction_isolation;

    Query OK, 0 rows affected (0.0004 sec)

    Listing 9-3

    在 REPEATABLE READ 事务隔离级别下持有的锁

    ```


    在 `CountryCode` 索引和主键上分别采用了 14 个记录锁，在 `CountryCode` 索引上采用了一个间隙锁。将其与清单 [9-4](#502546_1_En_9_Chapter.xhtml#PC6)
    中在 `READ COMMITTED` 事务隔离级别下执行查询后持有的锁进行比较。


    ```sql

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              703        1153          6

    --          2              704        1154          6

    -- Connection 1

    Connection 1> SET SESSION transaction_isolation = ''READ-COMMITTED'';

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = 5000000

    WHERE Name = ''Sydney''

    AND CountryCode = ''AUS'';

    Query OK, 1 row affected (0.0014 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, COUNT(*)

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND thread_id = 1153

    GROUP BY index_name, lock_type, lock_mode;

    +-------------+-----------+---------------+----------+

    | index_name  | lock_type | lock_mode     | COUNT(*) |

    +-------------+-----------+---------------+----------+

    | NULL        | TABLE     | IX            |        1 |

    | CountryCode | RECORD    | X,REC_NOT_GAP |        1 |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP |        1 |

    +-------------+-----------+---------------+----------+

    3 rows in set (0.0035 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0780 sec)

    Connection 1> SET SESSION transaction_isolation = @@global.transaction_isolation;

    Query OK, 0 rows affected (0.0003 sec)

    Listing 9-4

    在 READ-COMMITTED 事务隔离级别下持有的锁

    ```


    这里，记录锁减少到 `CountryCode` 索引和主键上各一个锁。没有间隙锁。


    并非所有工作负载都可以使用 `READ COMMITTED` 事务隔离级别。如果您必须使 `SELECT` 语句在同一事务中多次执行时返回相同的结果，或者使不同的查询对应于同一时间点，则必须使用
    `REPEATABLE READ` 或 `SERIALIZABLE`。然而，在许多情况下，降低隔离级别是一个选项，并且您可以为不同的事务选择不同的隔离级别。如果您正在将应用程序从
    Oracle DB 迁移，那么您已经在使用 `READ COMMITTED`，也可以在 MySQL 中使用它。


    ## 配置


    直接影响锁定的配置选项并不多，但熟悉那些存在的选项是有益的，特别是因为有些选项会影响互斥锁和信号量争用的级别。本节介绍将资源拆分为多个分区、禁用 InnoDB
    自适应哈希索引以及限制写锁的数量。'
  raw: '## Record Access order


    Ensure that you to as large degree as possible access the records in the same
    order for different transactions. In the deadlock example discussed in Chapter
    [8](#502546_1_En_8_Chapter.xhtml), what led to the deadlock was that the two transactions
    accessed the rows in opposite order. If they had accessed the rows in the same
    order, there would have been no deadlock. This also applies when you access records
    in different tables.


    Ensuring the same access order is by no means a trivial task. Different access
    orders may even happen when you perform joins and the optimizer decides on different
    join orders for two queries. If different join orders lead to excessive lock issues,
    you can consider using optimizer hints to tell the optimizer to change the join
    order^([⁴](#fn4)), but you should of course also have the query performance in
    mind in such cases.


    ## Transaction Isolation Levels


    InnoDB supports several transaction isolation levels . Different isolation levels
    have different lock requirements: particularly `REPEATABLE READ` and `SERIALIZABLE`
    require more locks than `READ COMMITTED`.


    The `READ COMMITTED` transaction isolation level can help on locking issues in
    two ways. Far less gap locks are taken, and rows that are accessed during a DML
    statement but not modified have their locks released again after the statement
    has completed. For `REPEATABLE READ` and `SERIALIZABLE`, locks are only released
    at the end of the transaction.


    Note


    It is often said that the `READ COMMITTED` transaction isolation level does not
    take gap locks. That is a myth and not correct. While far fewer gap locks are
    taken, there are still some that are required. This, for example, includes when
    InnoDB with checking foreign keys and unique key constraints as well as when a
    page split occurs.


    Consider an example where the population of the city named Sydney is changed using
    the `CountryCode` column to limit the query to one country. This can be done with
    the following query:


    ```

    START TRANSACTION;

    UPDATE world.city

    SET Population = 5000000

    WHERE Name = ''Sydney''

    AND CountryCode = ''AUS'';

    ```


    There is no index on the `Name` column, but there is one on `CountryCode`. So,
    the update requires a scan of part of the `CountryCode` index. Listing [9-3](#502546_1_En_9_Chapter.xhtml#PC5)
    shows an example of executing the query in the `REPEATABLE READ` transaction isolation
    level.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              701        1149          6

    --          2              702        1150          6

    -- Connection 1

    Connection 1> SET SESSION transaction_isolation = ''REPEATABLE-READ'';

    Query OK, 0 rows affected (0.2697 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0007 sec)

    Connection 1> UPDATE world.city

    SET Population = 5000000

    WHERE Name = ''Sydney''

    AND CountryCode = ''AUS'';

    Query OK, 1 row affected (0.0024 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, COUNT(*)

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND thread_id = 1149

    GROUP BY index_name, lock_type, lock_mode;

    +-------------+-----------+---------------+----------+

    | index_name  | lock_type | lock_mode     | COUNT(*) |

    +-------------+-----------+---------------+----------+

    | NULL        | TABLE     | IX            |        1 |

    | CountryCode | RECORD    | X             |       14 |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP |       14 |

    | CountryCode | RECORD    | X,GAP         |        1 |

    +-------------+-----------+---------------+----------+

    4 rows in set (0.0102 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0730 sec)

    Connection 1> SET SESSION transaction_isolation = @@global.transaction_isolation;

    Query OK, 0 rows affected (0.0004 sec)

    Listing 9-3

    The locks held in the REPEATABLE READ transaction isolation level

    ```


    Fourteen record locks are taken on each of the `CountryCode` index and the primary
    key, and one gap lock is taken on the `CountryCode` index. Compare this to the
    locks held after executing the query in the `READ COMMITTED` transaction isolation
    level as shown in Listing [9-4](#502546_1_En_9_Chapter.xhtml#PC6).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              703        1153          6

    --          2              704        1154          6

    -- Connection 1

    Connection 1> SET SESSION transaction_isolation = ''READ-COMMITTED'';

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = 5000000

    WHERE Name = ''Sydney''

    AND CountryCode = ''AUS'';

    Query OK, 1 row affected (0.0014 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, COUNT(*)

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND thread_id = 1153

    GROUP BY index_name, lock_type, lock_mode;

    +-------------+-----------+---------------+----------+

    | index_name  | lock_type | lock_mode     | COUNT(*) |

    +-------------+-----------+---------------+----------+

    | NULL        | TABLE     | IX            |        1 |

    | CountryCode | RECORD    | X,REC_NOT_GAP |        1 |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP |        1 |

    +-------------+-----------+---------------+----------+

    3 rows in set (0.0035 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0780 sec)

    Connection 1> SET SESSION transaction_isolation = @@global.transaction_isolation;

    Query OK, 0 rows affected (0.0003 sec)

    Listing 9-4

    The locks held in the READ-COMMITTED transaction isolation level

    ```


    Here the record locks are reduced to one lock on each of the `CountryCode` index
    and primary key. There are no gap locks.


    It is not all workloads that can use the `READ COMMITTED` transaction isolation
    level. If you must have `SELECT` statements return the same result when executed
    multiple times in the same transaction or have different queries correspond to
    the same point in time, you must use `REPEATABLE READ` or `SERIALIZABLE`. However,
    in many cases, it is an option to reduce the isolation level, and you can choose
    different isolation levels for different transactions. If you are migrating an
    application from Oracle DB, you are already using `READ COMMITTED`, and you can
    also use it in MySQL.


    ## Configuration


    There are not many configuration options that directly affect locking, but it
    is good to be familiar with those that do exist particularly as some can affect
    the level of mutex and semaphore contention. This section covers splitting resources
    into multiple partitions, disabling the InnoDB adaptive hash index, and limiting
    the number of write locks.'
  trans: '

    ## 记录访问顺序


    确保尽可能为不同的事务以相同的顺序访问记录。在第 8 章讨论的死锁示例中，导致死锁的原因是两个事务以相反的顺序访问行。如果它们以相同的顺序访问行，就不会发生死锁。这也适用于访问不同表中的记录。


    确保相同的访问顺序绝非易事。不同的访问顺序甚至可能在您执行连接时发生，优化器为两个查询决定使用不同的连接顺序。如果不同的连接顺序导致过多的锁问题，您可以考虑使用优化器提示来告诉优化器更改连接顺序^(⁴)，但在这种情况下，您当然也应该考虑查询性能。


    ## 事务隔离级别


    InnoDB 支持多种事务隔离级别。不同的隔离级别有不同的锁需求：特别是 `REPEATABLE READ` 和 `SERIALIZABLE` 比 `READ
    COMMITTED` 需要更多的锁。


    `READ COMMITTED` 事务隔离级别可以在两个方面帮助解决锁定问题。采用的间隙锁要少得多，并且在 DML 语句期间访问但未修改的行，其锁会在语句完成后再次释放。对于
    `REPEATABLE READ` 和 `SERIALIZABLE`，锁只在事务结束时释放。


    注意


    通常认为 `READ COMMITTED` 事务隔离级别不采用间隙锁。这是一个误解，并不正确。虽然采用的间隙锁少得多，但仍然需要一些。例如，这包括 InnoDB
    检查外键和唯一键约束时，以及发生页面拆分时。


    考虑一个示例，其中使用 `CountryCode` 列将查询限制到一个国家，来更改名为 Sydney 的城市的人口。可以使用以下查询完成：


    ```sql

    START TRANSACTION;

    UPDATE world.city

    SET Population = 5000000

    WHERE Name = ''Sydney''

    AND CountryCode = ''AUS'';

    ```


    `Name` 列上没有索引，但 `CountryCode` 列上有索引。因此，更新需要扫描部分 `CountryCode` 索引。清单 9-3 展示了在 `REPEATABLE
    READ` 事务隔离级别下执行查询的示例。


    ```sql

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              701        1149          6

    --          2              702        1150          6

    -- 连接 1

    Connection 1> SET SESSION transaction_isolation = ''REPEATABLE-READ'';

    Query OK, 0 rows affected (0.2697 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0007 sec)

    Connection 1> UPDATE world.city

    SET Population = 5000000

    WHERE Name = ''Sydney''

    AND CountryCode = ''AUS'';

    Query OK, 1 row affected (0.0024 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- 连接 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, COUNT(*)

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND thread_id = 1149

    GROUP BY index_name, lock_type, lock_mode;

    +-------------+-----------+---------------+----------+

    | index_name  | lock_type | lock_mode     | COUNT(*) |

    +-------------+-----------+---------------+----------+

    | NULL        | TABLE     | IX            |        1 |

    | CountryCode | RECORD    | X             |       14 |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP |       14 |

    | CountryCode | RECORD    | X,GAP         |        1 |

    +-------------+-----------+---------------+----------+

    4 rows in set (0.0102 sec)

    -- 连接 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0730 sec)

    Connection 1> SET SESSION transaction_isolation = @@global.transaction_isolation;

    Query OK, 0 rows affected (0.0004 sec)

    清单 9-3

    在 REPEATABLE READ 事务隔离级别下持有的锁

    ```


    在 `CountryCode` 索引和主键上分别采用了 14 个记录锁，在 `CountryCode` 索引上采用了一个间隙锁。将其与清单 9-4 中在 `READ
    COMMITTED` 事务隔离级别下执行查询后持有的锁进行比较。


    ```sql

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              703        1153          6

    --          2              704        1154          6

    -- 连接 1

    Connection 1> SET SESSION transaction_isolation = ''READ-COMMITTED'';

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = 5000000

    WHERE Name = ''Sydney''

    AND CountryCode = ''AUS'';

    Query OK, 1 row affected (0.0014 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- 连接 2

    Connection 2> SELECT index_name, lock_type,

    lock_mode, COUNT(*)

    FROM performance_schema.data_locks

    WHERE object_schema = ''world''

    AND object_name = ''city''

    AND thread_id = 1153

    GROUP BY index_name, lock_type, lock_mode;

    +-------------+-----------+---------------+----------+

    | index_name  | lock_type | lock_mode     | COUNT(*) |

    +-------------+-----------+---------------+----------+

    | NULL        | TABLE     | IX            |        1 |

    | CountryCode | RECORD    | X,REC_NOT_GAP |        1 |

    | PRIMARY     | RECORD    | X,REC_NOT_GAP |        1 |

    +-------------+-----------+---------------+----------+

    3 rows in set (0.0035 sec)

    -- 连接 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0780 sec)

    Connection 1> SET SESSION transaction_isolation = @@global.transaction_isolation;

    Query OK, 0 rows affected (0.0003 sec)

    清单 9-4

    在 READ-COMMITTED 事务隔离级别下持有的锁

    ```


    这里，记录锁减少到 `CountryCode` 索引和主键上各一个锁。没有间隙锁。


    并非所有工作负载都可以使用 `READ COMMITTED` 事务隔离级别。如果您必须使 `SELECT` 语句在同一事务中多次执行时返回相同的结果，或者使不同的查询对应于同一时间点，则必须使用
    `REPEATABLE READ` 或 `SERIALIZABLE`。然而，在许多情况下，降低隔离级别是一个选项，并且您可以为不同的事务选择不同的隔离级别。如果您正在将应用程序从
    Oracle DB 迁移，那么您已经在使用 `READ COMMITTED`，也可以在 MySQL 中使用它。


    ## 配置


    直接影响锁定的配置选项并不多，但熟悉那些存在的选项是有益的，特别是因为有些选项会影响互斥锁和信号量争用的级别。本节介绍将资源拆分为多个分区、禁用 InnoDB
    自适应哈希索引以及限制写锁的数量。

    '
- fmt: '### Resource Partitioning


    Mutex and semaphore contention arises from many threads using the same resource
    concurrently. A simple but powerful way to reduce the contention is to split a
    single resource into multiple parts which is exactly what has been done for the
    InnoDB buffer pool, the InnoDB adaptive hash index, and the table open cache.
    Table [9-1](#502546_1_En_9_Chapter.xhtml#Tab1) shows the configuration options
    that control how many instances a resource is split into.


    **Table 9-1** Configuration options controlling number of instances for resources


    | Option | Default Value | Description |

    | --- | --- | --- |

    | `innodb_adaptive_hash_index_parts` | 8 | The number of partitions for the adaptive
    hash index. The partitioning is over the indexes. |

    | `innodb_buffer_pool_instances` | 1 or 8 | How many parts the buffer pool is
    split into. The default is 1 if the total size of the buffer pool is less than
    1 GiB, otherwise 8 unless on a 32-bit Windows system. |

    | `table_open_cache_instances` | 16 | The number of parts for the table open cache.
    |


    **Note** For all three options, they require a restart of MySQL to change the
    value.


    For the InnoDB buffer pool, the default number of instances depends on the platform
    and the size of the buffer pool. The default is 1 if the total size is less than
    1 GiB and otherwise 8. For 32-bit Windows, the default is 1 below 1.3 GiB; otherwise,
    each instance is made to be 128 MiB. The maximum number of instances is 64.


    **Note** You may also have heard of the `metadata_locks_hash_instances` option.
    This was deprecated in MySQL 5.7 and removed in MySQL 8.0.13. The reason for this
    was a change to the implementation of metadata locks rendering the option unnecessary.


    If multiple partitions of a resource help reduce the contention, it may seem like
    a no brainer to increase the number of partitions. However, it is more complex
    than this as more partitions also introduce an overhead, so it is a matter of
    balancing this overhead over the reduced contention on the resource latches. In
    the extreme of a database that never executes more than a single concurrent query,
    you are usually better off with just one partition of each resource. "Usually"
    because for large table open caches, multiple partitions help making the least
    recently used (LRU) algorithm more efficient when it is necessary to evict a table
    from the cache.


    In general, you should not have the number of partitions larger than the number
    of CPU cores. That said, the default values are a good starting point, and, in
    the end, you will need to test with your combination of system and workload to
    verify the optimal settings. In case of the adaptive hash index, you may even
    need to disable it altogether.


    ### Disabling the InnoDB Adaptive Hash Index


    The adaptive hash index feature works automatically within InnoDB. If InnoDB detects
    that you are using a secondary index frequently and adaptive hash indexes are
    enabled, it will build a hash index on the fly of the most frequently used values.
    The hash index is exclusively stored in the buffer pool and thus is not persisted
    when you restart MySQL. If InnoDB detects that the memory can be used better for
    loading more pages into the buffer pool, it will discard part of the hash index.
    This is what is meant when it is said that it is an adaptive index: InnoDB will
    try to adapt it to be optimal for your queries.


    In theory, the adaptive hash index is a win-win situation. You get the advantages
    of having a hash index without the need to consider which columns you need to
    add it for, and the memory usage is all automatically handled. However, there
    is an overhead of having it enabled, and not all workloads benefit from it. In
    fact, for some workloads, the overhead can become so large that there are severe
    performance issues, and in those cases, it does not help to change the number
    of hash partitions.


    The larger the part of the working data set that does not fit into the buffer
    pool, the more changes you have to the secondary indexes, and the less the secondary
    indexes are used for filtering, the more likely you will benefit from disabling
    the adaptive hash index. Cases where the adaptive hash index is a problem typically
    manifest themselves through a high number of waits on mutexes and rw-lock semaphores
    in the `btr0sea.cc` file which is where the adaptive hash index search is implemented.


    If you experience that the adaptive hash index becomes a bottleneck, you can enable
    or disable the feature using the `innodb_adaptive_hash_index` option. Do be aware
    that while you can enable and disable the feature dynamically, disabling the adaptive
    hash index evicts all hash indexes from the buffer pool, and a warmup period is
    required upon re-enabling the index. For this reason, in replication setups, it
    is worth disabling the adaptive hash index in one replica first, and monitor whether
    your application benefits from the change before disabling it system-wide. If
    you need to re-enable the adaptive hash index on the read-write replica, consider
    failing over to another replica where the feature is still enabled, so the application
    is less affected while the re-enabled replica goes through its warmup period.


    **Tip** If you want to disable the adaptive hash index, do it first on a single
    replica, so you avoid having all replicas going through a warmup period if you
    need to re-enable the feature.


    The last configuration option that will be discussed allows you to reduce the
    priority of metadata write locks.


    ### Reducing Priority of Metadata Write Locks


    By default, if there are two metadata lock requests for a table and one is a read
    request and the other a write request, then the write request is given priority.
    This is usually fine as writes are more intrusive than reads, so in most cases,
    it is best to give them priority, so they can complete as quickly as possible.


    However, in case of foreign keys, you may run into problems with this approach.
    When you perform DDL against a table with a foreign key, the statement requests
    a shared metadata lock on the parent table. If you have continued transactions
    holding write locks against the parent table, the DDL statement on the child table
    will never be able to proceed even if the child table is never used. So, you need
    some way to make MySQL stop up and allow the read metadata lock request to move
    ahead.


    You can do that with the `max_write_lock_count` option which takes a value between
    1 and the maximum supported integer for your system. The default is the maximum
    supported value. Every time `max_write_lock_count` locks have been granted, MySQL
    will give priority to some read locks. This helps ensuring that read lock requests
    are not starved.


    You need to be careful in changing the value of `max_write_lock_count` as a too
    low value can cause transactions with write locks – remember they are exclusive
    locks – to take too long to complete. While the write transactions are outstanding,
    their locks can prevent other transactions to proceed. As you can change `max_write_lock_count`
    dynamically, keep a close eye with the system, and be prepared to revert the change,
    if it causes side effects that are worse than the cure.


    ### Preemptive Locking


    The last strategy that will be discussed is preemptive locking. If you have a
    complex transaction executing several queries, it can in some cases be an advantage
    to execute a `SELECT ... FOR UPDATE` or `SELECT ... FOR SHARE` query to take locks
    on the records you know you will need later in the transaction. Another case where
    it can be useful is to ensure you access the rows in the same order for different
    tasks.


    Preemptive locking is particularly effective to reduce the frequency of deadlocks.
    One drawback is that you will end up holding the locks for longer. Overall, preemptive
    locking is a strategy that should be used sparingly, but when used for the right
    cases, it can be powerful to prevent deadlocks.'
