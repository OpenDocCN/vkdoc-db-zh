- fmt: "# 13. Case Study: Flush Locks\n\nLock issues are one of the common causes\
    \ of performance issues, and the impact can be severe. In the worst cases, queries\
    \ can fail, and connections pile up so no new connections can be made. Therefore,\
    \ it is important to know how to investigate lock issues and remediate the problems.\n\
    \nThis and the following chapters will discuss six categories of lock issues:\n\
    \n- Flush locks\n- Metadata and schema locks\n- Record-level locks including gap\
    \ locks\n- Deadlocks\n- Foreign keys\n- Semaphores\n\nApart from the foreign keys\
    \ case study, each category of locks uses different techniques to determine the\
    \ cause of the lock contention. When you read the examples, you should have in\
    \ mind that similar techniques can be used to investigate lock issues that do\
    \ not 100% match the example. For the first four case studies (Chapters 13–16),\
    \ the discussion has been split into six parts:\n\n- **The symptoms:** These enable\
    \ you to identify the kind of lock issue encountered.\n- **The cause:** The underlying\
    \ reason you encounter this kind of lock issues. This is related to the general\
    \ discussion of the locks earlier in the book, particularly Chapters 6 and 7.\n\
    - **The setup:** This includes the steps to set up the lock issue if you want\
    \ to try it yourself. As lock contention requires multiple connections, the prompt,\
    \ for example, `Connection 1>`, is used to tell which connection should be used\
    \ for which statements. If you want to follow the investigation with no more information\
    \ than you would have in a real-world case, you can skip this section and go back\
    \ and review it after getting through the investigation.\n- **The investigation:**\
    \ The details of the investigation. This draws on the discussion about monitoring\
    \ in Chapter 2–4.\n- **The solution:** How you resolve the immediate lock problem,\
    \ so you minimize the outage caused by it.\n- **The prevention:** A discussion\
    \ of how to reduce the chance of encountering the issue. This is closely related\
    \ to the discussion about reducing locking issues in Chapter 9.\n\nThe last two\
    \ case studies for foreign keys and semaphores follow a similar pattern.\n\nEnough\
    \ talk, the first lock category that will be discussed is flush locks which is\
    \ one of the most difficult lock issues to investigate.\n\n## The Symptoms\n\n\
    The main symptom of a flush lock issue is that the database comes to a grinding\
    \ halt where all new queries using some or all tables end up waiting for the flush\
    \ lock. The telltale signs to look for include the following:\n\n- The query state\
    \ of new queries is “Waiting for table flush.” This may occur for all new queries\
    \ or only for queries accessing specific tables.\n- More and more connections\
    \ are created.\n- Eventually, new connections fail as MySQL is out of connection.\
    \ The error received for new connections is `ER_CON_COUNT_ERROR`: `ERROR 1040\
    \ (HY000): Too many connections`. (When using the X protocol in 8.0.19 or earlier,\
    \ the error is `MySQL Error 5011: Could not open session`.)\n- There is at least\
    \ one query that has been running later than the oldest request for a flush lock.\n\
    - There may be a `FLUSH TABLES` statement in the process list, but this is not\
    \ always the case.\n- When the `FLUSH TABLES` statement has waited for `lock_wait_timeout`,\
    \ an `ER_LOCK_WAIT_TIMEOUT` error occurs: `ERROR: 1205: Lock wait timeout exceeded;\
    \ try restarting transaction`. Since the default value for `lock_wait_timeout`\
    \ is 365 days, this is only likely to occur if the timeout has been reduced.\n\
    - If you connect with the `mysql` command-line client with a default schema set,\
    \ the connection may seem to hang before you get to the prompt. The same can happen\
    \ if you change the default schema with a connection open.\n    **Tip** The issue\
    \ that the `mysql` command-line client is blocking does not occur if you start\
    \ the client with the `-A` option which disables collecting the autocompletion\
    \ information. A better solution is to use MySQL Shell that fetches the autocompletion\
    \ information in a way that does not block due to the flush lock.\n\nIf you see\
    \ these symptoms, it is time to understand what is causing the lock issue.\n\n\
    ## The Cause\n\nWhen a connection requests a table to be flushed, it requires\
    \ all references to the table to be closed which means no active queries can be\
    \ using the table. So, when a flush request arrives, it must wait for all queries\
    \ using the tables that are to be flushed to finish. Note that unless you explicitly\
    \ specify which tables to flush, it is just the query and not the entire transaction\
    \ that must finish. Obviously, the case where all tables are flushed, for example,\
    \ due to `FLUSH TABLES WITH READ LOCK`, is the most severe as it means all active\
    \ queries must finish before the flush statement can proceed.\n\nWhen the wait\
    \ for the flush lock becomes a problem, it means that there are one or more queries\
    \ preventing the `FLUSH TABLES` statement from obtaining the flush lock. Since\
    \ the `FLUSH TABLES` statement requires an exclusive lock, it in turn stops subsequent\
    \ queries from acquiring the shared lock they need.\n\nThis issue is often seen\
    \ in connection with backups where the backup process needs to flush all tables\
    \ and get a read lock in order to create a consistent backup.\n\nA special case\
    \ can occur when the `FLUSH TABLES` statement has timed out or has been killed,\
    \ but the subsequent queries are not proceeding. When that happens, it is because\
    \ the low-level table definition cache (TDC) version lock is not released. This\
    \ is a case that can cause confusion as it is not obvious why the subsequent queries\
    \ are still waiting for the table flush. A similar case happens when an `ANALYZE\
    \ TABLE` statement triggers an implicit flush of the table or tables that were\
    \ analyzed.\n\n## The Setup\n\nThe lock situation that will be investigated involves\
    \ three connections (not including the connection used for the investigation).\
    \ The first connection executes a slow query, the second flushes all tables with\
    \ a read lock, and the last connection executes a quick query. The statements\
    \ are shown in Listing 13-1.\n\n```\n-- Connection   Processlist ID   Thread ID\
    \   Event ID\n-- --------------------------------------------------\n--      \
    \    1              668        1106          6\n--          2              669\
    \        1107          6\n--          3              670        1108         \
    \ 6\n-- Connection 1\nConnection 1> SELECT city.*, SLEEP(3600) FROM world.city\
    \ WHERE ID = 130;\n-- Connection 2\nConnection 2> FLUSH TABLES WITH READ LOCK;\n\
    -- Connection 3\nConnection 3> SELECT * FROM world.city WHERE ID = 3805;\n```\n\
    **Listing 13-1** Triggering flush lock contention\n\nThe use of `SLEEP(3600)`\
    \ in the first query means you have an hour (3600 seconds) to execute the two\
    \ other queries and perform the investigation. If you want to stop the lock situation,\
    \ you can kill the query:\n\n```\n-- Investigation #6\n-- Connection 4\nConnection\
    \ 4> KILL 668;\nQuery OK, 0 rows affected (0.0004 sec)\n```\n\nYou are now ready\
    \ to start the investigation."
