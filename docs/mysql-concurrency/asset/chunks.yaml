- fmt: '## 监控与指标


    对于本次讨论，`innodb_row_lock_%` 和 `lock_timeouts` 指标是最值得关注的。三个时间变量均以毫秒为单位。可以看到发生了 193
    次锁等待超时，这本身不一定值得担忧（至少需要考虑这些超时是在多长时间内发生的）。你还可以看到有 394 次锁无法立即授予的情况（`innodb_row_lock_waits`），并且存在等待时间超过
    51 秒的情况（`innodb_row_lock_time_max`）。当锁竞争的总体水平增加时，你也会看到这些指标上升。


    比手动监控指标更好的方法是，确保你的监控解决方案能够记录这些指标，并能以时间序列图的形式绘制它们随时间的变化。图 [15-2](#502546_1_En_15_Chapter.xhtml#Fig2)
    展示了与图 [15-1](#502546_1_En_15_Chapter.xhtml#Fig1) 中发现的同一起事件相关的指标绘图示例。


    ![../images/502546_1_En_15_Chapter/502546_1_En_15_Fig2_HTML.jpg](images/502546_1_En_15_Chapter/502546_1_En_15_Fig2_HTML.jpg)


    图 15-2：InnoDB 行锁指标的时间序列图


    图表显示了锁的总体增加趋势。锁等待次数有两个锁等待增加然后又下降的时期。行锁时间图显示出类似的模式。这是间歇性锁问题的典型迹象。


    ## 原因


    InnoDB 在行数据、索引记录、间隙和插入意图锁上使用共享锁和排他锁。当两个事务试图以冲突的方式访问数据时，一个查询将不得不等待，直到所需的锁变为可用。简而言之，两个请求共享锁的请求可以同时被授予，但一旦存在排他锁，其他连接就无法在同一条记录上获取锁。


    由于最可能导致锁竞争的是排他锁，因此通常是改变数据的 DML 查询导致了 InnoDB 记录锁竞争。另一个来源是 `SELECT` 语句通过添加 `FOR
    SHARE`（或 `LOCK IN SHARE MODE`）或 `FOR UPDATE` 子句进行抢占式锁定。


    ## 设置


    此示例只需要两个连接来设置正在调查的场景，第一个连接有一个正在进行的事务，第二个连接试图更新第一个连接持有锁的一行。由于等待 InnoDB 锁的默认超时时间是
    50 秒，你可以选择为将被阻塞的第二个连接增加此超时，以便有更多时间进行调查。设置如代码清单 [15-2](#502546_1_En_15_Chapter.xhtml#PC3)
    所示。


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              738        1219          6

    --          2              739        1220          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = 5000000

    WHERE ID = 130;

    Query OK, 1 row affected (0.0248 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SET SESSION innodb_lock_wait_timeout = 3600;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> UPDATE world.city SET Population = Population * 1.10 WHERE CountryCode
    = ''AUS'';

    ```


    代码清单 15-2：触发 InnoDB 记录锁竞争


    在此示例中，连接 2 的锁等待超时被设置为 3600 秒，以便你有长达一小时的时间来调查问题。连接 2 的 `START TRANSACTION` 不是必需的，但它允许你在完成调查后回滚两个事务，以避免对数据进行更改。


    ## 调查


    记录锁的调查与元数据锁的调查非常相似。你可以查询 Performance Schema 中的 `data_locks` 和 `data_lock_waits`
    表，它们分别显示原始的锁数据和挂起的锁。还有一个 `sys.innodb_lock_waits` 视图，它查询这两个表以找到被一个锁阻塞的另一个锁的配对。


    > **注意**

    > `data_locks` 和 `data_lock_waits` 表在 MySQL 8 中是新增的。在 MySQL 5.7 及更早版本中，Information
    Schema 中有两个类似的表，名为 `INNODB_LOCKS` 和 `INNODB_LOCK_WAITS`。使用 `innodb_lock_waits`
    视图的一个优点是，它在不同 MySQL 版本中工作方式相同（但在 MySQL 8 中包含一些额外信息）。


    在大多数情况下，使用 `innodb_lock_waits` 视图开始调查是最简单的，仅在需要时才深入探究 Performance Schema 表。代码清单
    [15-3](#502546_1_En_15_Chapter.xhtml#PC4) 展示了一个锁等待情况下的 `innodb_lock_waits` 输出示例。


    ```

    -- Investigation #1

    -- Connection 3

    Connection 3> SELECT * FROM sys.innodb_lock_waits\G

    *************************** 1\. row ***************************

    wait_started: 2020-08-07 18:04:56

    wait_age: 00:00:16

    wait_age_secs: 16

    locked_table: `world`.`city`

    locked_table_schema: world

    locked_table_name: city

    locked_table_partition: NULL

    locked_table_subpartition: NULL

    locked_index: PRIMARY

    locked_type: RECORD

    waiting_trx_id: 537516

    waiting_trx_started: 2020-08-07 18:04:56

    waiting_trx_age: 00:00:16

    waiting_trx_rows_locked: 2

    waiting_trx_rows_modified: 0

    waiting_pid: 739

    waiting_query: UPDATE world.city SET Populati ... 1.10 WHERE CountryCode = ''AUS''

    waiting_lock_id: 2711671601760:1923:7:44:2711634704240

    waiting_lock_mode: X,REC_NOT_GAP

    blocking_trx_id: 537515

    blocking_pid: 738

    blocking_query: NULL

    blocking_lock_id: 2711671600928:1923:7:44:2711634698920

    blocking_lock_mode: X,REC_NOT_GAP

    blocking_trx_started: 2020-08-07 18:04:56

    blocking_trx_age: 00:00:16

    blocking_trx_rows_locked: 1

    blocking_trx_rows_modified: 1

    sql_kill_blocking_query: KILL QUERY 738

    sql_kill_blocking_connection: KILL 738

    1 row in set (0.0805 sec)

    ```


    代码清单 15-3：从 innodb_lock_waits 视图检索锁信息


    输出中的列可以根据列名的前缀分为五个部分。这些组是：


    *   **wait_:** 这些列显示关于锁等待时间的通用信息。

    *   **locked_:** 这些列显示被锁定的对象范围（从模式到索引）以及锁的类型。

    *   **waiting_:** 这些列显示等待锁授予的事务的详细信息，包括查询和请求的锁模式。

    *   **blocking_:** 这些列显示阻塞锁请求的事务的详细信息。注意在示例中，`blocking_query` 为 `NULL`。这意味着生成输出时该事务处于空闲状态。即使列出了阻塞查询，该查询也可能与存在竞争的锁无关——除了该查询是由持有锁的同一事务执行的。

    *   **sql_kill_:** 这两列提供了可用于终止阻塞查询或连接的 `KILL` 查询。


    > **注意**

    > `blocking_query` 列是阻塞事务当前正在执行的查询（如果有）。这并不意味着该查询本身必然导致了锁请求被阻塞。


    `blocking_query` 列为 `NULL` 的情况很常见。这意味着阻塞事务当前没有执行查询。这可能是因为它处于两个查询之间。如果这段时间较长，则表明应用程序正在做本应在事务之外完成的工作。更常见的情况是，事务没有执行查询是因为它被遗忘了，无论是在交互式会话中操作人员忘记结束事务，还是应用程序流程未能确保事务被提交或回滚。'
  raw: 'For this discussion, the `innodb_row_lock_%` and `lock_timeouts` metrics are
    the most interesting. The three time variables are in milliseconds. It can be
    seen there have been 193 lock wait timeouts which on its own is not necessarily
    a cause for concern (at least you need to consider over how long those timeouts
    occurred). You can also see there have been 394 cases when a lock could not be
    granted immediately (`innodb_row_lock_waits`) and there have been waits up to
    more than 51 seconds (`innodb_row_lock_time_max`). When the general level of lock
    contention increases, you will see these metrics increase as well.


    Even better than monitoring the metrics manually, ensure your monitoring solution
    record the metrics and can plot them over time in timeseries graphs. Figure [15-2](#502546_1_En_15_Chapter.xhtml#Fig2)
    shows an example of the metrics plotted for the same incident that was found in
    Figure [15-1](#502546_1_En_15_Chapter.xhtml#Fig1).


    ![../images/502546_1_En_15_Chapter/502546_1_En_15_Fig2_HTML.jpg](images/502546_1_En_15_Chapter/502546_1_En_15_Fig2_HTML.jpg)


    Figure 15-2


    Timeseries graphs for InnoDB row lock metrics


    The graphs show a general increase in locking. The number of lock waits has two
    periods with increased lock waits and then drops off again. The row lock time
    graph shows a similar pattern. This is a typical sign of intermittent lock issues.


    ## The Cause


    InnoDB works with shared and exclusive locks on the row data, index records, gaps,
    and insert intention locks. When there are two transactions that attempt to access
    the data in conflicting ways, one query will have to wait until the required lock
    becomes available. In short, two requests for a shared lock can be granted at
    the same time, but once there is an exclusive lock, no connections can acquire
    a lock on the same record.


    As it is exclusive locks that are the most likely to cause lock contention, it
    is usually DML queries that change data that are the cause of InnoDB record lock
    contention. Another source is `SELECT` statements doing preemptive locking by
    adding the `FOR SHARE` (or `LOCK IN SHARE MODE`) or `FOR UPDATE` clause.


    ## The Setup


    This example requires just two connections to set up the scenario that is being
    investigated with the first connection having an ongoing transaction and the second
    trying to update a row that the first connection holds a lock for. Since the default
    timeout waiting for InnoDB locks is 50 seconds, you can optionally choose to increase
    this timeout for the second connection that will block to give you more time to
    perform the investigation. The setup is shown in Listing [15-2](#502546_1_En_15_Chapter.xhtml#PC3).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              738        1219          6

    --          2              739        1220          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = 5000000

    WHERE ID = 130;

    Query OK, 1 row affected (0.0248 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SET SESSION innodb_lock_wait_timeout = 3600;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> UPDATE world.city SET Population = Population * 1.10 WHERE CountryCode
    = ''AUS'';

    Listing 15-2

    Triggering InnoDB record lock contention

    ```


    In this example, the lock wait timeout for Connection 2 is set to 3600 seconds
    to give you an hour to investigate the issue. The `START TRANSACTION` for Connection
    2 is not required but allows you to roll both transactions back when you are done
    to avoid making changes to the data.


    ## The Investigation


    The investigation of record locks is very similar to investigating metadata locks.
    You can query the `data_locks` and `data_lock_waits` tables in the Performance
    Schema which will show the raw lock data and pending locks, respectively. There
    is also the `sys.innodb_lock_waits` view which queries the two tables to find
    pairs of locks with one being blocked by the other.


    Note


    The `data_locks` and `data_lock_waits` tables are new in MySQL 8\. In MySQL 5.7
    and earlier, there were two similar tables in the Information Schema named `INNODB_LOCKS`
    and `INNODB_LOCK_WAITS`. An advantage of using the `innodb_lock_waits` view is
    that it works the same (but with some extra information in MySQL 8) across the
    MySQL versions.


    In most cases, it is easiest to start the investigation using the `innodb_lock_waits`
    view and only dive into the Performance Schema tables as needed. Listing [15-3](#502546_1_En_15_Chapter.xhtml#PC4)
    shows an example of the output from `innodb_lock_waits` for a lock wait situation.


    ```

    -- Investigation #1

    -- Connection 3

    Connection 3> SELECT * FROM sys.innodb_lock_waits\G

    *************************** 1\. row ***************************

    wait_started: 2020-08-07 18:04:56

    wait_age: 00:00:16

    wait_age_secs: 16

    locked_table: `world`.`city`

    locked_table_schema: world

    locked_table_name: city

    locked_table_partition: NULL

    locked_table_subpartition: NULL

    locked_index: PRIMARY

    locked_type: RECORD

    waiting_trx_id: 537516

    waiting_trx_started: 2020-08-07 18:04:56

    waiting_trx_age: 00:00:16

    waiting_trx_rows_locked: 2

    waiting_trx_rows_modified: 0

    waiting_pid: 739

    waiting_query: UPDATE world.city SET Populati ... 1.10 WHERE CountryCode = ''AUS''

    waiting_lock_id: 2711671601760:1923:7:44:2711634704240

    waiting_lock_mode: X,REC_NOT_GAP

    blocking_trx_id: 537515

    blocking_pid: 738

    blocking_query: NULL

    blocking_lock_id: 2711671600928:1923:7:44:2711634698920

    blocking_lock_mode: X,REC_NOT_GAP

    blocking_trx_started: 2020-08-07 18:04:56

    blocking_trx_age: 00:00:16

    blocking_trx_rows_locked: 1

    blocking_trx_rows_modified: 1

    sql_kill_blocking_query: KILL QUERY 738

    sql_kill_blocking_connection: KILL 738

    1 row in set (0.0805 sec)

    Listing 15-3

    Retrieving lock information from the innodb_lock_waits view

    ```


    The columns in the output can be divided into five sections based on the prefix
    of the column name. The groups are


    *   **wait_:** These columns show some general information around the age of the
    lock wait.


    *   **locked_:** These columns show what is locked ranging from the schema to
    the index as well as the lock type.


    *   **waiting_:** These columns show details of the transaction that is waiting
    for the lock to be granted including the query and the lock mode requested.


    *   **blocking_:** These columns show details of the transaction that is blocking
    the lock request. Note that in the example, the blocking query is `NULL`. This
    means the transaction is idle at the time the output was generated. Even when
    there is a blocking query listed, the query may not have anything to do with the
    lock that there is contention for – other than the query is executed by the same
    transaction that holds the lock.


    *   **sql_kill_:** These two columns provide the `KILL` queries that can be used
    to kill the blocking query or connection.


    Note


    The column `blocking_query` is the query currently executed (if any) for the blocking
    transaction. It does not mean that the query itself is necessarily causing the
    lock request to block.


    The case where the `blocking_query` column is `NULL` is a common situation. It
    means that the blocking transaction is currently not executing a query. This may
    be because it is between two queries. If this period is an extended period, it
    suggests the application is doing work that ideally should be done outside the
    transaction. More commonly, the transaction is not executing a query because it
    has been forgotten about, either in an interactive session where the human has
    forgotten to end the transaction or an application flow that does not ensure transactions
    are committed or rolled back.'
  trans: '

    ## 监控与指标


    就本次讨论而言，`innodb_row_lock_%` 和 `lock_timeouts` 指标是最值得关注的。这三个时间变量均以毫秒为单位。可以看到发生了
    193 次锁等待超时，这本身不一定值得担忧（至少需要考虑这些超时是在多长时间内发生的）。你还可以看到有 394 次锁无法立即授予的情况（`innodb_row_lock_waits`），并且存在等待时间超过
    51 秒的情况（`innodb_row_lock_time_max`）。当锁竞争的总体水平增加时，你也会看到这些指标上升。


    比手动监控指标更好的方法是，确保你的监控解决方案能够记录这些指标，并能以时间序列图的形式绘制它们随时间的变化。图 15-2 展示了与图 15-1 中发现的同一起事件相关的指标绘图示例。


    ![../images/502546_1_En_15_Chapter/502546_1_En_15_Fig2_HTML.jpg](img/502546_1_En_15_Fig2_HTML.jpg)


    图 15-2：InnoDB 行锁指标的时间序列图


    图表显示了锁的总体增加趋势。锁等待次数有两个锁等待增加然后又下降的时期。行锁时间图显示出类似的模式。这是间歇性锁问题的典型迹象。


    ## 原因


    InnoDB 在行数据、索引记录、间隙和插入意图锁上使用共享锁和排他锁。当两个事务试图以冲突的方式访问数据时，一个查询将不得不等待，直到所需的锁变为可用。简而言之，两个请求共享锁的请求可以同时被授予，但一旦存在排他锁，其他连接就无法在同一条记录上获取锁。


    由于最可能导致锁竞争的是排他锁，因此通常是改变数据的 DML 查询导致了 InnoDB 记录锁竞争。另一个来源是 `SELECT` 语句通过添加 `FOR
    SHARE`（或 `LOCK IN SHARE MODE`）或 `FOR UPDATE` 子句进行抢占式锁定。


    ## 设置


    此示例只需要两个连接来设置正在调查的场景，第一个连接有一个正在进行的事务，第二个连接试图更新第一个连接持有锁的一行。由于等待 InnoDB 锁的默认超时时间是
    50 秒，你可以选择为将被阻塞的第二个连接增加此超时，以便有更多时间进行调查。设置如代码清单 15-2 所示。


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              738        1219          6

    --          2              739        1220          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = 5000000

    WHERE ID = 130;

    Query OK, 1 row affected (0.0248 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SET SESSION innodb_lock_wait_timeout = 3600;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> UPDATE world.city SET Population = Population * 1.10 WHERE CountryCode
    = ''AUS'';

    ```


    代码清单 15-2：触发 InnoDB 记录锁竞争


    在此示例中，连接 2 的锁等待超时被设置为 3600 秒，以便你有长达一小时的时间来调查问题。连接 2 的 `START TRANSACTION` 不是必需的，但它允许你在完成调查后回滚两个事务，以避免对数据进行更改。


    ## 调查


    记录锁的调查与元数据锁的调查非常相似。你可以查询 Performance Schema 中的 `data_locks` 和 `data_lock_waits`
    表，它们分别显示原始的锁数据和挂起的锁。还有一个 `sys.innodb_lock_waits` 视图，它查询这两个表以找到被一个锁阻塞的另一个锁的配对。


    > **注意**

    > `data_locks` 和 `data_lock_waits` 表在 MySQL 8 中是新增的。在 MySQL 5.7 及更早版本中，Information
    Schema 中有两个类似的表，名为 `INNODB_LOCKS` 和 `INNODB_LOCK_WAITS`。使用 `innodb_lock_waits`
    视图的一个优点是，它在不同 MySQL 版本中工作方式相同（但在 MySQL 8 中包含一些额外信息）。


    在大多数情况下，使用 `innodb_lock_waits` 视图开始调查是最简单的，仅在需要时才深入探究 Performance Schema 表。代码清单
    15-3 展示了一个锁等待情况下的 `innodb_lock_waits` 输出示例。


    ```

    -- Investigation #1

    -- Connection 3

    Connection 3> SELECT * FROM sys.innodb_lock_waits\G

    *************************** 1\. row ***************************

    wait_started: 2020-08-07 18:04:56

    wait_age: 00:00:16

    wait_age_secs: 16

    locked_table: `world`.`city`

    locked_table_schema: world

    locked_table_name: city

    locked_table_partition: NULL

    locked_table_subpartition: NULL

    locked_index: PRIMARY

    locked_type: RECORD

    waiting_trx_id: 537516

    waiting_trx_started: 2020-08-07 18:04:56

    waiting_trx_age: 00:00:16

    waiting_trx_rows_locked: 2

    waiting_trx_rows_modified: 0

    waiting_pid: 739

    waiting_query: UPDATE world.city SET Populati ... 1.10 WHERE CountryCode = ''AUS''

    waiting_lock_id: 2711671601760:1923:7:44:2711634704240

    waiting_lock_mode: X,REC_NOT_GAP

    blocking_trx_id: 537515

    blocking_pid: 738

    blocking_query: NULL

    blocking_lock_id: 2711671600928:1923:7:44:2711634698920

    blocking_lock_mode: X,REC_NOT_GAP

    blocking_trx_started: 2020-08-07 18:04:56

    blocking_trx_age: 00:00:16

    blocking_trx_rows_locked: 1

    blocking_trx_rows_modified: 1

    sql_kill_blocking_query: KILL QUERY 738

    sql_kill_blocking_connection: KILL 738

    1 row in set (0.0805 sec)

    ```


    代码清单 15-3：从 innodb_lock_waits 视图检索锁信息


    输出中的列可以根据列名的前缀分为五个部分。这些组是：


    *   **wait_:** 这些列显示关于锁等待时间的通用信息。

    *   **locked_:** 这些列显示被锁定的对象范围（从模式到索引）以及锁的类型。

    *   **waiting_:** 这些列显示等待锁授予的事务的详细信息，包括查询和请求的锁模式。

    *   **blocking_:** 这些列显示阻塞锁请求的事务的详细信息。注意在示例中，`blocking_query` 为 `NULL`。这意味着生成输出时该事务处于空闲状态。即使列出了阻塞查询，该查询也可能与存在竞争的锁无关——除了该查询是由持有锁的同一事务执行的。

    *   **sql_kill_:** 这两列提供了可用于终止阻塞查询或连接的 `KILL` 查询。


    > **注意**

    > `blocking_query` 列是阻塞事务当前正在执行的查询（如果有）。这并不意味着该查询本身必然导致了锁请求被阻塞。


    `blocking_query` 列为 `NULL` 的情况很常见。这意味着阻塞事务当前没有执行查询。这可能是因为它处于两个查询之间。如果这段时间较长，则表明应用程序正在做本应在事务之外完成的工作。更常见的情况是，事务没有执行查询是因为它被遗忘了，无论是在交互式会话中操作人员忘记结束事务，还是应用程序流程未能确保事务被提交或回滚。

