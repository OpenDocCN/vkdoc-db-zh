    首先，会打印一些初始监控信息。测试结束时会执行相同的监控，因此你可以获取有关发生的错误数量以及其他指标的信息。测试结束时的监控信息还包括 CSV 格式的信息，你可以将其复制到电子表格中，例如用于创建图表。此外，输出还包含关于元数据锁和锁等待以及遇到锁等待超时的语句的信息。


    ## 讨论分析


    调查通常将经历几个步骤。首先，将涵盖应用程序记录的错误和监控信息。其次，讨论锁相关指标。第三，探讨元数据锁，最后讨论 InnoDB 锁竞争。


    ### 错误与高层监控


    你首先可能注意到的是应用程序正在经历错误；在本例中是锁等待超时。在真实案例中，你可能不会像本案例研究这样直接获得错误信息。如果你不处理这些错误，可能会看到应用程序报错甚至崩溃。始终处理错误并最好记录错误非常重要，这样你可以跟踪应用程序遇到的问题，并且可以使用
    Splunk^(⁷) 等日志分析器来分析错误的频率。本案例研究中的错误示例包括：


    ```sql

    mysql> UPDATE sakila.category SET name = IF(name = ''Travel'', ''Exploring'',
    ''Travel'') WHERE category_id = 16;

    ERROR: 1205: Lock wait timeout exceeded; try restarting transaction

    mysql> ALTER TABLE sakila.inventory FORCE;

    ERROR: 1205: Lock wait timeout exceeded; try restarting transaction

    ```


    你也可以查看监控，其中应包含关于 InnoDB 锁等待的信息，类似于图 17-1 所示，即测试期间测量的 InnoDB 锁等待次数、InnoDB 锁等待超时次数以及以毫秒为单位的
    InnoDB 锁定时间。


    ![../images/502546_1_En_17_Chapter/502546_1_En_17_Fig1_HTML.jpg](img/502546_1_En_17_Fig1_HTML.jpg)

    *图 17-1：InnoDB 锁等待指标*


    “当前等待次数”是直接测量值，而“锁超时次数”和“锁时间”是与上一次测量相比的差值。“当前等待次数”和“锁超时次数”使用左侧 y 轴并以柱状图表示，而“锁时间”则使用右侧
    y 轴以折线图显示。x 轴是测试进行的时间。从图中可以看出锁问题是间歇性发生的，你可以用它来确定问题发生的时间。如果你的监控解决方案允许查看在给定时间间隔内运行的查询，你可以用它来调查导致锁等待的工作负载。支持此功能的监控解决方案示例包括
    MySQL Enterprise Monitor（也称为 MEM）^(⁸)、Solarwinds Database Performance Monitor
    (DPM，原名 VividCortex)^(⁹) 和 Percona Monitoring and Management (PMM)。^(¹⁰)


    ### 锁指标


    锁指标的监控使得发现锁竞争加剧的时段变得容易，值得对这些指标进行更多讨论。对于 InnoDB，如上所示监控锁等待是直接的，但不幸的是，没有指标可以轻松地为元数据锁提供同类信息。你可以使用来自
    Performance Schema 的错误统计信息来跟踪锁等待超时和死锁的数量：


    ```sql

    mysql> SELECT error_number, error_name, sum_error_raised

    FROM performance_schema.events_errors_summary_global_by_error

    WHERE error_name IN (''ER_LOCK_WAIT_TIMEOUT'', ''ER_LOCK_DEADLOCK'');

    +--------------+----------------------+------------------+

    | error_number | error_name           | sum_error_raised |

    +--------------+----------------------+------------------+

    |         1205 | ER_LOCK_WAIT_TIMEOUT |              310 |

    |         1213 | ER_LOCK_DEADLOCK     |               12 |

    +--------------+----------------------+------------------+

    ...

    mysql> SELECT error_number, error_name, sum_error_raised

    FROM performance_schema.events_errors_summary_global_by_error

    WHERE error_name IN (''ER_LOCK_WAIT_TIMEOUT'', ''ER_LOCK_DEADLOCK'');

    +--------------+----------------------+------------------+

    | error_number | error_name           | sum_error_raised |

    +--------------+----------------------+------------------+

    |         1205 | ER_LOCK_WAIT_TIMEOUT |              317 |

    |         1213 | ER_LOCK_DEADLOCK     |               12 |

    +--------------+----------------------+------------------+

    ```


    这表明在此测试期间，发生了 7 次锁等待超时，没有死锁。此信息的问题在于，它无法告诉你是元数据锁、InnoDB 锁还是其他某种锁类型遇到了锁等待超时或死锁。也就是说，由于
    InnoDB 有自己的锁等待超时和死锁统计信息，你可以通过减去这两个统计信息来推导出非 InnoDB 锁的数量。测试的 InnoDB 锁统计信息如清单 17-2
    所示。


    ```sql

    mysql> SELECT Variable_name, Variable_value

    FROM sys.metrics

    WHERE Variable_name IN (

    ''innodb_row_lock_current_waits'',

    ''lock_row_lock_current_waits'',

    ''innodb_row_lock_time'',

    ''innodb_row_lock_waits'',

    ''lock_deadlocks'',

    ''lock_timeouts''

    );

    +-------------------------------+----------------+

    | Variable_name                 | Variable_value |

    +-------------------------------+----------------+

    | innodb_row_lock_current_waits | 0              |

    | innodb_row_lock_time          | 409555         |

    | innodb_row_lock_waits         | 384            |

    | lock_deadlocks                | 0              |

    | lock_row_lock_current_waits   | 0              |

    | lock_timeouts                 | 188            |

    +-------------------------------+----------------+

    ...

    mysql> SELECT Variable_name, Variable_value

    FROM sys.metrics

    WHERE Variable_name IN (

    ''innodb_row_lock_current_waits'',

    ''lock_row_lock_current_waits'',

    ''innodb_row_lock_time'',

    ''innodb_row_lock_waits'',

    ''lock_deadlocks'',

    ''lock_timeouts''

    )

    +-------------------------------+----------------+

    | Variable_name                 | Variable_value |

    +-------------------------------+----------------+

    | innodb_row_lock_current_waits | 1              |

    | innodb_row_lock_time          | 417383         |

    | innodb_row_lock_waits         | 392            |

    | lock_deadlocks                | 0              |

    | lock_row_lock_current_waits   | 1              |

    | lock_timeouts                 | 192            |

    +-------------------------------+----------------+

    ```

    *清单 17-2：测试的 InnoDB 锁统计信息*


    这里你可以看到总共发生了 4 次 InnoDB 锁等待超时（`lock_timeouts` 状态计数器），占总共 7 次 `ER_LOCK_WAIT_TIMEOUT`
    错误，因此你可以得出结论，有 3 次非 InnoDB 锁等待超时。在本案例研究中，这些全部是元数据锁等待超时。


