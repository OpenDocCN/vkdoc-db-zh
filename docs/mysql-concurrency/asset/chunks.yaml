    清单 18-2

    InnoDB 监控器的 SEMAPHORES 部分

    ```


    在此示例中，所有等待都发生在`btr0sea.cc`第 202 行创建的信号量上（行号可能因平台和 MySQL 版本而异，例如在 Linux 上，8.0.21
    版本的行号为 201）。如果你查看 MySQL 8.0.21 的源代码，文件位于`storage/innobase/btr/btr0sea.cc`，那么第
    202 行附近的代码是：


    ```

    186 /** Creates and initializes the adaptive search system at a database start.

    187 @param[in]      hash_size       hash table size. */

    188 void btr_search_sys_create(ulint hash_size) {

    189   /* Search System is divided into n parts.

    190   Each part controls access to distinct set of hash buckets from

    191   hash table through its own latch. */


    193   /* Step-1: Allocate latches (1 per part). */

    194   btr_search_latches = reinterpret_cast(

    195       ut_malloc(sizeof(rw_lock_t *) * btr_ahi_parts, mem_key_ahi));


    197   for (ulint i = 0; i (

    199         ut_malloc(sizeof(rw_lock_t), mem_key_ahi));


    201     rw_lock_create(btr_search_latch_key, btr_search_latches[i],

    202                    SYNC_SEARCH_SYS);

    203   }

    ...

    ```


    这是自适应哈希索引的代码，因此证明了争用正发生在自适应哈希索引处。（这也显示第 201 和 202 行属于同一语句，因此 Microsoft Windows
    和 Linux 之间的行号差异取决于选择了该语句的第一行还是最后一行作为读写锁的创建位置。）


    你也可以使用互斥锁监控器来获取哪些锁最频繁经历等待的统计数据。此测试末尾的互斥锁监控器输出示例如下：


    ```

    mysql> SHOW ENGINE INNODB MUTEX;

    +--------+----------------------------+-------------+

    | Type   | Name                       | Status      |

    +--------+----------------------------+-------------+

    | InnoDB | rwlock: fil0fil.cc:3206    | waits=11    |

    | InnoDB | rwlock: dict0dict.cc:1035  | waits=12    |

    | InnoDB | rwlock: btr0sea.cc:202     | waits=7730  |

    | InnoDB | rwlock: btr0sea.cc:202     | waits=934   |

    | InnoDB | rwlock: btr0sea.cc:202     | waits=5445  |

    | InnoDB | rwlock: btr0sea.cc:202     | waits=889   |

    | InnoDB | rwlock: btr0sea.cc:202     | waits=9076  |

    | InnoDB | rwlock: btr0sea.cc:202     | waits=13608 |

    | InnoDB | rwlock: btr0sea.cc:202     | waits=1050  |

    | InnoDB | rwlock: hash0hash.cc:171   | waits=4     |

    | InnoDB | sum rwlock: buf0buf.cc:778 | waits=86    |

    +--------+----------------------------+-------------+

    11 rows in set (0.0008 sec)

    ```


    如果你定期创建互斥锁监控器报告，就可以按文件和行号对等待次数进行求和和分组，然后监控不同时段等待发生位置的差异。（本书作者目前不知道有哪个现成的监控解决方案能做到这一点。）对于此示例，测试本身计算了每个文件和行号的等待次数，主要显示的是`btr0sea.cc`第
    202 行的等待（请记住，行号取决于具体的发布版本和编译器/平台）：


    ```

    -- 测试期间的总互斥锁和读写信号量等待：

    +----------------+-------+

    | 文件:行号      | 等待数 |

    +----------------+-------+

    | btr0sea.cc:202 | 13368 |

    +----------------+-------+

    ```


    你可能看到的另一个最有可能的文件和行号是`hash0hash:171`（对于 Windows 上的 8.0.21 版本，或 Linux 上 8.0.21 版本的第
    170 行），这与 InnoDB 的哈希表实现相关。这表明 InnoDB 监控器输出中的信号量等待全部针对`btr0sea.cc`第 202 行并非巧合。

    '
- fmt: '### Determining the Workload


    The final step of the investigation is to determine the workload causing the contention.
    This is also the most difficult task. The best is if you have a monitoring solution
    that collects information about the queries that are executed and aggregates statistics
    for them. With such monitoring, you can directly see what queries are executed
    which can help you determine what causes the contention. If you do not have access
    monitoring data for the queries executed during the time of contention, you can
    try to monitor the queries using `sys.session` or the Performance Schema tables
    with statement information (`threads`, `events_statements_current`, `events_statements_history`,
    and `events_statements_history_long`). An option is also to use the `statement_performance_analyzer()`
    procedure in the `sys` schema which takes two snapshots of the `events_statements_summary_by_digest`
    table and calculates the difference and returns one or more reports showing information
    about the queries executed between the two snapshots.


    > **Tip**

    >

    > The `statement_performance_analyzer()` procedure in the `sys` schema can be
    used to generate a “poor man’s query analyzer” with the queries executed between
    two snapshots. See [`https://dev.mysql.com/doc/refman/en/sys-statement-performance-analyzer.html`](https://dev.mysql.com/doc/refman/en/sys-statement-performance-analyzer.html)
    for the documentation and an example.


    This sounds easy, but in practice, it is not so simple. Even with good monitoring,
    it may be near impossible to determine which queries are the problem. In a real-world
    production system, you may have peaks at more than 100000 queries per second and
    more than 10000 unique query digests each minute. Trying to find the combinations
    of queries causing the contention among those makes finding a needle in a haystack
    seem easy.


    If you are lucky, you may be able to guess what kind of queries you are looking
    for based on the contented mutexes and semaphores. In this case, the contention
    is on the adaptive hash index which is exclusively used for secondary indexes.
    So, you know that the queries of interest must be using secondary indexes, and
    the larger the number of index lookups and index modifications a query performs,
    the more likely it is to be part of the issue. In this case, the read-only query
    uses two secondary indexes as it can be seen from the query plan as shown in Listing
    [18-3](#502546_1_En_18_Chapter.xhtml#PC12).


    ```

    EXPLAIN

    SELECT dept_name, MIN(salary) min_salary,

    AVG(salary) AS avg_salary, MAX(salary) AS max_salary

    FROM employees.departments

    INNER JOIN employees.dept_emp USING (dept_no)

    INNER JOIN employees.salaries USING (emp_no)

    WHERE dept_emp.to_date = ''9999-01-01''

    AND salaries.to_date = ''9999-01-01''

    GROUP BY dept_no

    ORDER BY dept_name

    *************************** 1\. row ***************************

    id: 1

    select_type: SIMPLE

    table: departments

    partitions: NULL

    type: index

    possible_keys: PRIMARY,dept_name

    key: PRIMARY

    key_len: 16

    ref: NULL

    rows: 9

    filtered: 100

    Extra: Using temporary; Using filesort

    *************************** 2\. row ***************************

    id: 1

    select_type: SIMPLE

    table: dept_emp

    partitions: NULL

    type: ref

    possible_keys: PRIMARY,dept_no,idx_concurrency_book_0

    key: idx_concurrency_book_0

    key_len: 19

    ref: employees.departments.dept_no,const

    rows: 9

    filtered: 100

    Extra: Using index

    *************************** 3\. row ***************************

    id: 1

    select_type: SIMPLE

    table: salaries

    partitions: NULL

    type: ref

    possible_keys: PRIMARY,idx_concurrency_book_2

    key: idx_concurrency_book_2

    key_len: 7

    ref: employees.dept_emp.emp_no,const

    rows: 1

    filtered: 100

    Extra: Using index

    3 rows in set, 1 warning (0.0009 sec)

    ```


    **Listing 18-3**

    The query plan for the read-only query in the test


    The joins on the `dept_emp` and `salaries` tables are both performed using a secondary
    index, the `idx_concurrency_book_0` and `idx_concurrency_book_2` indexes, respectively.
    Likewise, the queries executed by the read-write connection use secondary indexes;
    it is left as an exercise for the reader to verify that.


    With the investigation completed, you need to decide how to handle the contention.


    ## The Solution and Prevention


    Unlike the previous case studies, there is in general no straightforward way to
    solve and prevent the issue. Instead, you will need to test and verify the effect
    of various possible changes to your system. For this reason, the solution and
    prevention sections are combined.


    *   Disabling the adaptive hash index altogether


    *   Increasing the number of partitions


    *   Increasing the number of spin rounds before suspending the thread


    *   Splitting the workload to different replicas


    These options will be discussed in the remainder of this section.'
