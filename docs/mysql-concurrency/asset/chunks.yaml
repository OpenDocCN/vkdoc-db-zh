  trans: '

    ## 备份锁


    备份锁是一种实例级锁；也就是说，它影响整个系统。这是 MySQL 8 中引入的一种新锁。备份锁可以防止那些可能使备份不一致的语句，同时仍然允许其他语句与备份并发执行。目前，备份锁的主要用户是
    MySQL 企业备份工具，它将备份锁与日志锁结合使用，以避免对 InnoDB 表执行 `FLUSH TABLES WITH READ LOCK`。被阻止的语句包括：


    *   创建、重命名或删除文件的语句。这些包括 `CREATE TABLE`、`CREATE TABLESPACE`、`RENAME TABLE` 和 `DROP
    TABLE` 语句。


    *   账户管理语句，如 `CREATE USER`、`ALTER USER`、`DROP USER` 和 `GRANT`。


    *   不会将其更改记录到重做日志中的 DDL 语句。例如，这包括添加索引。


    备份锁通过 `LOCK INSTANCE FOR BACKUP` 语句创建，并通过 `UNLOCK INSTANCE` 语句释放。执行 `LOCK INSTANCE
    FOR BACKUP` 需要 `BACKUP_ADMIN` 权限。一个获取备份锁并再次释放它的例子是：


    ```

    mysql> LOCK INSTANCE FOR BACKUP;

    Query OK, 0 rows affected (0.0002 sec)

    mysql> UNLOCK INSTANCE;

    Query OK, 0 rows affected (0.0003 sec)

    ```


    注意


    在撰写本文时，当使用 X 协议时（通过 `mysqlx_port` 指定的端口或 `mysqlx_socket` 指定的套接字连接），不允许获取和释放备份锁。尝试这样做会返回一个
    `ER_PLUGGABLE_PROTOCOL_NOT_SUPPORTED` 错误：`ERROR: 3130: Command not supported by
    pluggable protocols`。


    此外，与备份锁冲突的语句也会获取备份锁。由于 DDL 语句有时由几个步骤组成（例如，在新文件中重建表然后重命名文件），备份锁可能会在步骤之间释放，以避免不必要地长时间阻塞
    `LOCK INSTANCE FOR BACKUP`。


    可以在 `performance_schema.metadata_locks` 表中找到备份锁，其 `OBJECT_TYPE` 列设置为 `BACKUP LOCK`。列表
    6-9 展示了一个查询等待由 `LOCK INSTANCE FOR BACKUP` 持有的备份锁的示例。


    ```

    -- 连接   处理列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              484         851          1

    --          2              485         852          1

    --          3              486         853          1

    -- 连接 1

    Connection 1> LOCK INSTANCE FOR BACKUP;

    Query OK, 0 rows affected (0.0004 sec)

    -- 连接 2

    Connection 2> OPTIMIZE TABLE world.city;

    -- 连接 3

    Connection 3> SELECT object_type, object_schema, object_name,

    lock_type, lock_duration, lock_status,

    owner_thread_id

    FROM performance_schema.metadata_locks

    WHERE object_type = ''BACKUP LOCK''

    AND owner_thread_id IN (851, 852)\G

    *************************** 1. row ***************************

    object_type: BACKUP LOCK

    object_schema: NULL

    object_name: NULL

    lock_type: SHARED

    lock_duration: EXPLICIT

    lock_status: GRANTED

    owner_thread_id: 851

    *************************** 2. row ***************************

    object_type: BACKUP LOCK

    object_schema: NULL

    object_name: NULL

    lock_type: INTENTION_EXCLUSIVE

    lock_duration: TRANSACTION

    lock_status: PENDING

    owner_thread_id: 852

    2 rows in set (0.0007 sec)

    -- 连接 1

    Connection 1> UNLOCK INSTANCE;

    Query OK, 0 rows affected (0.0003 sec)

    列表 6-9

    备份锁冲突示例

    ```


    在这个例子中，线程 ID 为 851 的连接拥有备份锁，而线程 ID 为 852 的连接正在等待它。请注意，`LOCK INSTANCE FOR BACKUP`
    持有共享锁，而 DDL 语句请求的是意向排他锁。


    与备份锁相关的是日志锁，它也是为了减少备份期间的锁定而引入的。


    ## 日志锁


    当创建备份时，通常希望包含有关备份所一致的日志位置和 GTID 集的信息。在 MySQL 5.7 及更早版本中，获取此信息时需要全局读锁。在 MySQL 8
    中，引入了日志锁，允许你读取诸如已执行的全局事务标识符（GTID）、二进制日志位置以及 InnoDB 的日志序列号（LSN）等信息，而无需获取全局读锁。


    日志锁防止对日志相关信息进行更改的操作。实际上，这意味着提交、`FLUSH LOGS` 和类似操作。日志锁在查询 `performance_schema.log_status`
    表时隐式获取。访问该表需要 `BACKUP_ADMIN` 权限。列表 6-10 展示了 `log_status` 表的示例输出。


    ```

    -- 连接   处理列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              490         857          6

    -- 连接 1

    Connection 1 > SELECT *

    FROM performance_schema.log_status\G

    *************************** 1. row ***************************

    SERVER_UUID: fcbb7afc-bdde-11ea-b95f-ace2d35785be

    LOCAL: {"gtid_executed": "d2549c41-86ca-11ea-9dc7-ace2d35785be:1-351", "binary_log_file":
    "binlog.000002", "binary_log_position": 39348}

    REPLICATION: {"channels": [{"channel_name": "", "relay_log_file": "relay-bin.000002",
    "relay_log_position": 39588}]}

    STORAGE_ENGINES: {"InnoDB": {"LSN": 2073604726, "LSN_checkpoint": 2073604726}}

    1 row in set (0.0012 sec)

    列表 6-10

    log_status 表的示例输出

    ```


    可用的信息取决于实例的配置，而具体值则取决于使用情况。


    至此，关于 MySQL 中主要高级锁类型的介绍就结束了。


    ## 总结


    本章讨论了高级锁类型。这些锁主要独立于所使用的存储引擎，包括从用户级和实例级锁到表和元数据锁的一系列锁。


    用户级锁可用于保护应用程序中的工作流，是最通用的锁类型。刷新锁在表被刷新时遇到，由于底层的表定义缓存（TDC）版本锁，可能导致难以诊断的问题。元数据锁保护模式对象的元数据，例如表的列定义。


    既有显式的表锁，也有隐式的表锁，在处理 InnoDB 表时，隐式锁最为常见。隐式锁还包括意向锁。


    在实例级，有两种锁类型是为备份而开发的。备份锁防止会使备份不一致的更改，例如对用户和权限以及某些模式更改的更改。日志锁是在查询 `performance_schema.log_status`
    时隐式获取的锁，以确保能够以一致的方式、使用最少的锁定来获取日志相关的状态值。


    除了高级锁之外，InnoDB 还有自己的一套在记录级工作的锁，这将在下一章讨论。


    脚注 1

