    -- Connection 2

    Connection 2> OPTIMIZE TABLE world.city;

    Listing 6-4

    Example of waiting for table metadata lock

    ```


    Connection 2 blocks, and while you are in this situation, you can query `sys.session`
    or similar as shown in Listing [6-5](#502546_1_En_6_Chapter.xhtml#PC5).


    ```

    -- Investigation #1

    -- Connection 3

    Connection 3> SELECT thd_id, conn_id, state,

    current_statement, statement_latency,

    last_statement, trx_state

    FROM sys.session

    WHERE conn_id IN (428, 429)

    ORDER BY conn_id\G

    *************************** 1\. row ***************************

    thd_id: 768

    conn_id: 428

    state: NULL

    current_statement: SELECT * FROM world.city WHERE ID = 130

    statement_latency: NULL

    last_statement: SELECT * FROM world.city WHERE ID = 130

    trx_state: ACTIVE

    *************************** 2\. row ***************************

    thd_id: 769

    conn_id: 429

    state: Waiting for table metadata lock

    current_statement: OPTIMIZE TABLE world.city

    statement_latency: 26.62 s

    last_statement: NULL

    trx_state: COMMITTED

    2 rows in set (0.0607 sec)

    Listing 6-5

    sys.session for the connections involved in the metadata lock

    ```


    In this example, the connection with `conn_id = 428` has an ongoing transaction
    and in the previous statement queried the `world.city` table (the current statement
    in this case is the same as it is not cleared until the next statement is executed).
    While the transaction is still active, `conn_id = 429` has executed an `OPTIMIZE
    TABLE` statement which is now waiting for the metadata lock. (Yes, `OPTIMIZE TABLE`
    does not change the schema definition, but as a DDL statement, it is still affected
    by the metadata lock.) Since MySQL does not have transactional DDL statements,
    the transaction state for `conn_id = 429` shows up as committed.


    It is convenient when it is the current or last statement that is the cause of
    the metadata lock. In more general cases, you can use the `performance_schema.metadata_locks`
    table with the `OBJECT_TYPE` column set to `TABLE` to find granted and pending
    metadata locks. Listing [6-6](#502546_1_En_6_Chapter.xhtml#PC6) shows an example
    of granted and pending metadata locks using the same setup as in the previous
    example. Chapter [14](#502546_1_En_14_Chapter.xhtml) goes into more detail about
    investigating metadata locks.


    ```

    -- Investigation #2

    Connection 3> SELECT object_type, object_schema, object_name,

    lock_type, lock_duration, lock_status,

    owner_thread_id

    FROM performance_schema.metadata_locks

    WHERE owner_thread_id IN (768, 769)

    AND object_type = ''TABLE''\G

    *************************** 1\. row ***************************

    object_type: TABLE

    object_schema: world

    object_name: city

    lock_type: SHARED_READ

    lock_duration: TRANSACTION

    lock_status: GRANTED

    owner_thread_id: 768

    *************************** 2\. row ***************************

    object_type: TABLE

    object_schema: world

    object_name: city

    lock_type: SHARED_NO_READ_WRITE

    lock_duration: TRANSACTION

    lock_status: PENDING

    owner_thread_id: 769

    2 rows in set (0.0010 sec)

    Listing 6-6

    Example of metadata locks

    ```


    In the example, thread id 768 (the same as `conn_id = 428` from the `sys.session`
    output) owns a shared read lock on the `world.city` table due to an ongoing transaction,
    and thread id 769 is waiting for a lock as it is trying to execute a DDL statement
    on the table.


    When you are done, make sure you roll back or commit the transaction in Connection
    1, so the `OPTIMIZE TABLE` can complete:


    ```

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0004 sec)

    ```


    A special case of metadata locks are locks taken explicitly with the `LOCK TABLES`
    statement.'
  trans: '## 元数据锁


    元数据锁是 MySQL 中较新的锁类型之一。它们在 MySQL 5.5 中被引入，其目的是保护模式，使其在查询或事务依赖于模式保持不变时不被更改。元数据锁在表级别工作，但应将其视为与表锁独立的一种锁类型，因为它们并不保护表中的数据。


    `SELECT` 语句和 `DML` 查询会获取共享元数据锁，而 `DDL` 语句则会获取排他锁。连接在首次使用表时获取该表的元数据锁，并一直保持该锁直到事务结束。在持有元数据锁期间，不允许其他连接更改该表的模式定义。然而，其他执行
    `SELECT` 语句和 `DML` 语句的连接不受限制。通常，关于元数据锁最常见的陷阱是长时间运行的事务（可能处于空闲状态），这会阻止 `DDL` 语句开始执行。


    如果遇到元数据锁冲突，您将在进程列表中看到查询状态设置为 "Waiting for table metadata lock"。包括设置查询在内的示例如清单
    6-4 所示。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              428         768          6

    --          2              429         769          6

    -- 连接 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT * FROM world.city WHERE ID = 130\G

    *************************** 1. row ***************************

    ID: 130

    Name: Sydney

    CountryCode: AUS

    District: New South Wales

    Population: 3276207

    1 row in set (0.0006 sec)

    -- 连接 2

    Connection 2> OPTIMIZE TABLE world.city;

    清单 6-4

    等待表元数据锁的示例

    ```


    `连接 2` 被阻塞，处于此情况时，您可以查询 `sys.session` 或类似视图，如清单 6-5 所示。


    ```

    -- 调查 #1

    -- 连接 3

    Connection 3> SELECT thd_id, conn_id, state,

    current_statement, statement_latency,

    last_statement, trx_state

    FROM sys.session

    WHERE conn_id IN (428, 429)

    ORDER BY conn_id\G

    *************************** 1. row ***************************

    thd_id: 768

    conn_id: 428

    state: NULL

    current_statement: SELECT * FROM world.city WHERE ID = 130

    statement_latency: NULL

    last_statement: SELECT * FROM world.city WHERE ID = 130

    trx_state: ACTIVE

    *************************** 2. row ***************************

    thd_id: 769

    conn_id: 429

    state: Waiting for table metadata lock

    current_statement: OPTIMIZE TABLE world.city

    statement_latency: 26.62 s

    last_statement: NULL

    trx_state: COMMITTED

    2 rows in set (0.0607 sec)

    清单 6-5

    涉及元数据锁的连接的 sys.session 信息

    ```


    在此示例中，`conn_id = 428` 的连接有一个正在进行的事务，并且在上一条语句中查询了 `world.city` 表（本例中当前语句与之相同，因为它在下一条语句执行前不会被清除）。在事务仍处于活动状态时，`conn_id
    = 429` 执行了一个 `OPTIMIZE TABLE` 语句，该语句现在正在等待元数据锁。（是的，`OPTIMIZE TABLE` 不会更改模式定义，但作为
    `DDL` 语句，它仍然受元数据锁影响。）由于 MySQL 没有事务性 `DDL` 语句，`conn_id = 429` 的事务状态显示为已提交。


    当是当前语句或最后一条语句导致元数据锁时，处理起来很方便。在更一般的情况下，您可以使用 `performance_schema.metadata_locks`
    表，将 `OBJECT_TYPE` 列设置为 `TABLE`，来查找已授予和等待中的元数据锁。清单 6-6 展示了使用与前面示例相同的设置，已授予和等待中的元数据锁的示例。第
    14 章将更详细地介绍如何调查元数据锁。


    ```

    -- 调查 #2

    Connection 3> SELECT object_type, object_schema, object_name,

    lock_type, lock_duration, lock_status,

    owner_thread_id

    FROM performance_schema.metadata_locks

    WHERE owner_thread_id IN (768, 769)

    AND object_type = ''TABLE''\G

    *************************** 1. row ***************************

    object_type: TABLE

    object_schema: world

    object_name: city

    lock_type: SHARED_READ

    lock_duration: TRANSACTION

    lock_status: GRANTED

    owner_thread_id: 768

    *************************** 2. row ***************************

    object_type: TABLE

    object_schema: world

    object_name: city

    lock_type: SHARED_NO_READ_WRITE

    lock_duration: TRANSACTION

    lock_status: PENDING

    owner_thread_id: 769

    2 rows in set (0.0010 sec)

    清单 6-6

    元数据锁示例

    ```


    在此示例中，线程 ID 768（与 `sys.session` 输出中的 `conn_id = 428` 相同）由于正在进行的事务，拥有对 `world.city`
    表的共享读锁，而线程 ID 769 正在等待锁，因为它正尝试在该表上执行 `DDL` 语句。


    操作完成后，请确保在 `连接 1` 中回滚或提交事务，以便 `OPTIMIZE TABLE` 能够完成：


    ```

    -- 连接 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0004 sec)

    ```


    元数据锁的一个特例是使用 `LOCK TABLES` 语句显式获取的锁。'
- fmt: '## Explicit Table Locks


    Explicit table locks are taken with the `LOCK TABLES` and the `FLUSH TABLES WITH
    READ LOCK` statements. With the `LOCK TABLES` statement, it is possible to take
    shared or exclusive locks; `FLUSH TABLES WITH READ LOCK` always takes a shared
    lock. The tables are locked, until they are explicitly released with the `UNLOCK
    TABLES` statement. When `FLUSH TABLES WITH READ LOCK` is executed without listing
    any tables, the global read lock (i.e., affecting all tables) is taken. While
    these locks also protect the data, they are considered as metadata locks in MySQL.


    Explicit table locks, other than `FLUSH TABLES WITH READ LOCK` in connection with
    backups, are not often used with InnoDB as InnoDB’s sophisticated lock features
    are in most cases superior to handling locks yourself. However, if you really
    need to lock the entire tables, explicit locks can be useful as they are very
    cheap for MySQL to check.


    An example of a connection taking an explicit read lock on the `world.country`
    and `world.countrylanguage` tables and a write lock on the `world.city` table
    is shown in Listing [6-7](#502546_1_En_6_Chapter.xhtml#PC8).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              432         772          6

    -- Connection 1

    Connection 1> LOCK TABLES world.country READ,

    world.countrylanguage READ,

    world.city WRITE;

    Query OK, 0 rows affected (0.0029 sec)

    Listing 6-7

    Using explicit table locks

    ```


    When you take explicit locks, you are only allowed to use the tables you have
    locked and in accordance with the requested locks. This means you will get an
    error if you take a read lock and attempt to write to the table (`ER_TABLE_NOT_LOCKED_FOR_WRITE`)
    or if you try to use a table you did not take a lock for (`ER_TABLE_NOT_LOCKED`),
    for example (continuation of Listing [6-7](#502546_1_En_6_Chapter.xhtml#PC8))


    ```

    Connection 1> UPDATE world.country

    SET Population = Population + 1

    WHERE Code = ''AUS'';

    ERROR: 1099: Table ''country'' was locked with a READ lock and can''t be updated

    Connection 1> SELECT *

    FROM sakila.film

    WHERE film_id = 1;

    ERROR: 1100: Table ''film'' was not locked with LOCK TABLES

    ```


    Since explicit locks are considered metadata locks, the symptoms and information
    in the `performance_schema.metadata_locks` table are the same as for implicit
    metadata locks, and you also unlock the tables using the `UNLOCK TABLES` statement:


    ```

    Connection 1> UNLOCK TABLES;

    Query OK, 0 rows affected (0.0006 sec)

    ```


    Another table-level lock but handled implicitly is plainly called a table lock.


    ## Implicit Table Locks


    MySQL takes implicit table locks when a table is queried. Table locks do not play
    a large role for InnoDB tables except for flush, metadata, and explicit locks
    as InnoDB uses record locks to allow concurrent access to a table as long as the
    transactions do not modify the same rows (roughly speaking – as the next chapter
    shows – there is more to it than that).


    InnoDB does however work with the concept of intention locks at the table level.
    Since you are likely to encounter those when investigating lock issues, it is
    worth familiarizing yourself with them. As mentioned in the discussion of lock
    access levels, intention locks mark what the intention of the transaction is.


    For locks taken by transactions, first, an intention lock is taken, and then it
    may if needed be upgraded. This is unlike an explicit `LOCK TABLES` that does
    not change. To get a shared lock, the transaction first takes an intention shared
    lock and then the shared lock. Similarly, for an exclusive lock, an intention
    exclusive lock is first taken. Some examples of intention locks are as follows:


    *   A `SELECT ... FOR SHARE` statement takes an intention shared lock on the tables
    queried. The `SELECT ... LOCK IN SHARE MODE` syntax is a synonym.

    *   A `SELECT ... FOR UPDATE` statement takes an intention exclusive lock on the
    tables queried.

    *   A DML statement (not including `SELECT`) takes an intention exclusive lock
    on the modified tables. If a foreign key column is modified, an intention shared
    lock is taken on the parent table.


    The table-level locks can be found in the `performance_schema.data_locks` table
    with the `LOCK_TYPE` column set to `TABLE`. Listing [6-8](#502546_1_En_6_Chapter.xhtml#PC11)
    shows an example of an intention shared lock.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              446         796          6

    --          2              447         797          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT *

    FROM world.city

    WHERE ID = 130

    FOR SHARE\G

    *************************** 1\. row ***************************

    ID: 130

    Name: Sydney

    CountryCode: AUS

    District: New South Wales

    Population: 3276207

    1 row in set (0.0010 sec)

    -- Connection 2

    Connection 2> SELECT engine, thread_id, object_schema,

    object_name, lock_type, lock_mode,

    lock_status, lock_data

    FROM performance_schema.data_locks

    WHERE lock_type = ''TABLE''

    AND thread_id = 796\G

    *************************** 1\. row ***************************

    engine: INNODB

    thread_id: 796

    object_schema: world

    object_name: city

    lock_type: TABLE

    lock_mode: IS

    lock_status: GRANTED

    lock_data: NULL

    1 row in set (0.0011 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0004 sec)

    Listing 6-8

    Example of an InnoDB intention shared lock

    ```


    This shows an intention shared lock on the `world.city` table. Notice that the
    `engine` is set to `INNODB` and that `lock_data` is `NULL`.'
