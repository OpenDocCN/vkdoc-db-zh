  trans: '

    ## InnoDB 数据锁兼容性


    回顾讨论锁访问级别兼容性时，规则相对简单。然而，判断两个 InnoDB 数据锁是否彼此兼容则非常复杂。这种情况变得尤为有趣，因为这种关系并非对称——即在某锁存在的情况下可能允许另一锁，反之则不然。例如，插入意向锁必须等待间隙锁，但间隙锁不必等待插入意向锁。另一个例子（缺乏传递性的情况）是：间隙加记录锁必须等待纯记录锁，插入意向锁必须等待间隙加记录锁，但插入意向锁却无需等待纯记录锁。


    这对您意味着什么？这意味着当您调查锁争用问题时，需要意识到锁的顺序至关重要，因此在重现问题时，所有锁必须以相同的顺序获取。


    关于 InnoDB 处理锁争用的算法原理以及可能导致锁无法授予的原因就讨论到这里。锁无法被授予时会发生什么，将是接下来要讨论的主题。


    ## 元数据和备份锁等待超时


    当您请求刷新、元数据或备份锁时，获取锁的尝试将在 `lock_wait_timeout` 秒后超时。默认超时时间为 31,536,000 秒（365 天）。您可以在全局和会话范围内动态设置
    `lock_wait_timeout` 选项，这允许您根据特定进程的需求调整超时时间。


    发生超时时，语句将失败并返回 `ER_LOCK_WAIT_TIMEOUT`（错误号 1205）错误，如清单 8-1 所示。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              647        1075          6

    --          2              648        1076          6

    -- 连接 1

    Connection 1> LOCK TABLES world.city WRITE;

    Query OK, 0 rows affected (0.0015 sec)

    -- 连接 2

    Connection 2> SET SESSION lock_wait_timeout = 5;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 2> LOCK TABLES world.city WRITE;

    ERROR: 1205: Lock wait timeout exceeded; try restarting transaction

    -- 连接 1

    Connection 1> UNLOCK TABLES;

    Query OK, 0 rows affected (0.0003 sec)

    清单 8-1

    表锁请求的锁等待超时

    ```


    会话级的 `lock_wait_timeout` 值被设置为 5 秒，以缩短连接 2 在尝试获取 `world.city` 表的写锁时可能被阻塞的时间。等待
    5 秒后，返回错误，错误号为 1205。


    `lock_wait_timeout` 选项的推荐设置取决于应用程序的要求。使用较小的值可以防止锁请求长时间阻塞其他查询，这通常是有利的。这通常要求您实现对锁请求失败的处理，例如通过重试语句。另一方面，较大的值则有助于避免重试语句的需要。


    对于 `FLUSH TABLES` 语句，还要记住它与较低级别的表定义缓存（TDC）版本锁交互，这意味着放弃该语句可能不允许后续查询继续进行。在这种情况下，将
    `lock_wait_timeout` 设置为较高的值可能更好，这样锁关系会更清晰。


    ## InnoDB 锁等待超时


    当查询在 InnoDB 中请求记录级锁时，它会受到超时限制，类似于刷新、元数据和备份锁的超时。由于记录级锁争用比表级锁争用更常见，且记录级锁增加了死锁的可能性，默认超时设置为
    50 秒。可以使用 `innodb_lock_wait_timeout` 选项进行设置，该选项可在全局和会话范围内设置。


    当发生超时时，查询将失败并返回 `ER_LOCK_WAIT_TIMEOUT` 错误（错误号 1205），与表级锁超时类似。清单 8-2 展示了一个发生 InnoDB
    锁等待超时的示例。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              656        1087          6

    --          2              657        1088          6

    -- 连接 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    Query OK, 1 row affected (0.0006 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- 连接 2

    Connection 2> SET SESSION innodb_lock_wait_timeout = 3;

    Query OK, 0 rows affected (0.2621 sec)

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    ERROR: 1205: Lock wait timeout exceeded; try restarting transaction

    -- 连接 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0751 sec)

    清单 8-2

    InnoDB 锁等待超时示例

    ```


    在此示例中，连接 2 的锁等待超时被设置为 3 秒，因此无需等待通常的 50 秒来发生超时。


    当超时发生时，`innodb_rollback_on_timeout` 选项定义了事务已完成工作中有多少将被回滚。当 `innodb_rollback_on_timeout`
    禁用时（默认值），仅触发超时的语句被回滚。当该选项启用时，整个事务将被回滚。`innodb_rollback_on_timeout` 选项只能在全局级别配置，并且需要重启才能更改值。


    **注意**


    处理锁等待超时非常重要，否则可能使事务留下未释放的锁。如果发生这种情况，其他事务可能无法获取它们所需的锁。因此，您需要确保要么重试事务的剩余部分，要么显式回滚事务，要么启用
    `innodb_rollback_on_timeout` 以便在锁等待超时时自动回滚事务。


    通常建议保持 InnoDB 记录级锁的超时时间较短。通常最好将默认的 50 秒降低。查询被允许等待锁的时间越长，其他锁请求受到影响的潜在可能性就越大，这可能导致其他查询也停滞。这也会使死锁更有可能发生。如果您禁用了死锁检测（接下来讨论），您应该为
    `innodb_lock_wait_timeout` 设置一个非常小的值，例如 1 或 2 秒，因为您将使用超时来检测死锁。在没有死锁检测的情况下，也建议启用
    `innodb_rollback_on_timeout` 选项。

    '
- fmt: '## Deadlocks


    Deadlocks sound like a very scary concept, but you should not let the name deter
    you. Just like lock wait timeout, deadlocks are a fact of life in the world of
    high-concurrency databases. What it really means is that there is a circular relationship
    between the lock requests as illustrated by a traffic gridlock in Figure [8-1](#502546_1_En_8_Chapter.xhtml#Fig1).
    The only way to resolve the gridlock is to force one of the requests to abandon.
    In that sense, a deadlock is no different from a lock wait timeout. In fact, you
    can disable deadlock detection in which case, one of the locks will end up with
    a lock wait timeout instead.


    ![../images/502546_1_En_8_Chapter/502546_1_En_8_Fig1_HTML.jpg](images/502546_1_En_8_Chapter/502546_1_En_8_Fig1_HTML.jpg)


    Figure 8-1: A traffic gridlock


    So why are there deadlocks at all if they are not really needed? Since deadlocks
    occur when there is a circular relationship between the lock requests, it is possible
    for InnoDB to detect them as soon as the circle is completed. This allows InnoDB
    to tell the user immediately that a deadlock has occurred without having to wait
    for the lock wait timeout to happen. It is also useful to be told that a deadlock
    has occurred as it often provides opportunities to improve data access in the
    application. You should thus consider deadlocks a friend rather than a foe. Figure
    [8-2](#502546_1_En_8_Chapter.xhtml#Fig2) shows an example of two transactions
    querying a table which causes a deadlock.


    ![../images/502546_1_En_8_Chapter/502546_1_En_8_Fig2_HTML.png](images/502546_1_En_8_Chapter/502546_1_En_8_Fig2_HTML.png)


    Figure 8-2: Example of two transactions causing a deadlock


    In the example, transaction 1 first updates the row with `ID = 130` and then the
    row with `ID = 3805`. In between, transaction 2 updates first the row with `ID
    = 3805` and then the row with `ID = 130`. This means that by the time transaction
    1 tries to update `ID = 3805`, transaction 2 already has a lock on the row. Transaction
    2 can also not proceed as it cannot get a lock on `ID = 130` because transaction
    1 already holds that. This is a classic example of a simple deadlock. The circular
    lock relationship is also shown in Figure [8-3](#502546_1_En_8_Chapter.xhtml#Fig3).


    ![../images/502546_1_En_8_Chapter/502546_1_En_8_Fig3_HTML.png](images/502546_1_En_8_Chapter/502546_1_En_8_Fig3_HTML.png)


    Figure 8-3: The circular relationship of the locks causing the deadlock


    In this figure, it is clear which lock is held by transactions 1 and 2 and which
    locks are requested and how the conflict can never be resolved without intervention.
    That makes it qualify as a deadlock.


    In the real world, deadlocks are often more complicated. In the example that has
    been discussed here, only primary key record locks have been involved. In general,
    often secondary keys, gap locks, and possible other lock types are also involved.
    There may also be more than two transactions involved. The principle, however,
    remains the same.


    **Note**: A deadlock may even occur with as little as one query for each of two
    transactions. If one query reads the records in ascending order and the other
    on descending order, it is possible to get a deadlock.


    When a deadlock occurs, InnoDB chooses the transaction that has “done the least
    work” to become a victim. This is similar to the “Shoot The Other Node In The
    Head” (STONITH) approach used in some high availability solutions such as MySQL
    NDB Cluster except here it is a transaction that is being “shot in the head.”
    You can check the `trx_weight` column in the `information_schema.INNODB_TRX` view
    to see the weight used by InnoDB (the more work done, the higher weight). In practice
    this means that the transaction that holds the fewest locks will be rolled back.
    When this occurs, the query in the transaction that is chosen as the victim fails
    with the error `ER_LOCK_DEADLOCK` returned (error code 1213), and the transaction
    is rolled back to release as many locks as possible. An example of a deadlock
    occurring is shown in Listing [8-3](#502546_1_En_8_Chapter.xhtml#PC3).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              659        1093          6

    --          2              660        1094          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    Query OK, 1 row affected (0.0098 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 3805;

    Query OK, 1 row affected (0.0009 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    -- Connection 1

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 3805;

    ERROR: 1213: Deadlock found when trying to get lock; try restarting transaction

    -- Connection 2

    Query OK, 1 row affected (0.1019 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0002 sec)

    -- Connection 2

    Connection 2> ROLLBACK;

    Query OK, 0 rows affected (0.0293 sec)

    Listing 8-3: Example of a deadlock

    ```


    A deadlock can be even simpler than in this example (though it is rare unless
    you use locking `SELECT` statements either explicitly or using the `SERIALIZABLE`
    transaction isolation level). Listing [8-4](#502546_1_En_8_Chapter.xhtml#PC4)
    shows a deadlock that occurs using just a single row.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              663        1097          6

    --          2              664        1098          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> SELECT * FROM world.city WHERE ID = 130 FOR SHARE;

    +-----+--------+-------------+-----------------+------------+

    | ID  | Name   | CountryCode | District        | Population |

    +-----+--------+-------------+-----------------+------------+

    | 130 | Sydney | AUS         | New South Wales |    3276207 |

    +-----+--------+-------------+-----------------+------------+

    1 row in set (0.0005 sec)

    -- Connection 2

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    -- Connection 1

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    Query OK, 1 row affected (0.0447 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    ERROR: 1213: Deadlock found when trying to get lock; try restarting transaction

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0280 sec)

    -- Connection 2

    Connection 2> ROLLBACK;

    Query OK, 0 rows affected (0.0003 sec)

    Listing 8-4: A single row deadlock

    ```'
  raw: '## Deadlocks


    Deadlocks sound like a very scary concept, but you should not let the name deter
    you. Just like lock wait timeout, deadlocks are a fact of life in the world of
    high-concurrency databases. What it really means is that there is a circular relationship
    between the lock requests as illustrated by a traffic gridlock in Figure [8-1](#502546_1_En_8_Chapter.xhtml#Fig1).
    The only way to resolve the gridlock is to force one of the requests to abandon.
    In that sense, a deadlock is no different from a lock wait timeout. In fact, you
    can disable deadlock detection in which case, one of the locks will end up with
    a lock wait timeout instead.


    ![../images/502546_1_En_8_Chapter/502546_1_En_8_Fig1_HTML.jpg](images/502546_1_En_8_Chapter/502546_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    A traffic gridlock


    So why are there deadlocks at all if they are not really needed? Since deadlocks
    occur when there is a circular relationship between the lock requests, it is possible
    for InnoDB to detect them as soon as the circle is completed. This allows InnoDB
    to tell the user immediately that a deadlock has occurred without having to wait
    for the lock wait timeout to happen. It is also useful to be told that a deadlock
    has occurred as it often provides opportunities to improve data access in the
    application. You should thus consider deadlocks a friend rather than a foe. Figure
    [8-2](#502546_1_En_8_Chapter.xhtml#Fig2) shows an example of two transactions
    querying a table which causes a deadlock.


    ![../images/502546_1_En_8_Chapter/502546_1_En_8_Fig2_HTML.png](images/502546_1_En_8_Chapter/502546_1_En_8_Fig2_HTML.png)


    Figure 8-2


    Example of two transactions causing a deadlock


    In the example, transaction 1 first updates the row with `ID = 130` and then the
    row with `ID = 3805`. In between, transaction 2 updates first the row with `ID
    = 3805` and then the row with `ID = 130`. This means that by the time transaction
    1 tries to update `ID = 3805`, transaction 2 already has a lock on the row. Transaction
    2 can also not proceed as it cannot get a lock on `ID = 130` because transaction
    1 already holds that. This is a classic example of a simple deadlock. The circular
    lock relationship is also shown in Figure [8-3](#502546_1_En_8_Chapter.xhtml#Fig3).


    ![../images/502546_1_En_8_Chapter/502546_1_En_8_Fig3_HTML.png](images/502546_1_En_8_Chapter/502546_1_En_8_Fig3_HTML.png)


    Figure 8-3


    The circular relationship of the locks causing the deadlock


    In this figure, it is clear which lock is held by transactions 1 and 2 and which
    locks are requested and how the conflict can never be resolved without intervention.
    That makes it qualify as a deadlock.


    In the real world, deadlocks are often more complicated. In the example that has
    been discussed here, only primary key record locks have been involved. In general,
    often secondary keys, gap locks, and possible other lock types are also involved.
    There may also be more than two transactions involved. The principle, however,
    remains the same.


    Note


    A deadlock may even occur with as little as one query for each of two transactions.
    If one query reads the records in ascending order and the other on descending
    order, it is possible to get a deadlock.


    When a deadlock occurs, InnoDB chooses the transaction that has “done the least
    work” to become a victim. This is similar to the “Shoot The Other Node In The
    Head” (STONITH) approach used in some high availability solutions such as MySQL
    NDB Cluster except here it is a transaction that is being “shot in the head.”
    You can check the `trx_weight` column in the `information_schema.INNODB_TRX` view
    to see the weight used by InnoDB (the more work done, the higher weight). In practice
    this means that the transaction that holds the fewest locks will be rolled back.
    When this occurs, the query in the transaction that is chosen as the victim fails
    with the error `ER_LOCK_DEADLOCK` returned (error code 1213), and the transaction
    is rolled back to release as many locks as possible. An example of a deadlock
    occurring is shown in Listing [8-3](#502546_1_En_8_Chapter.xhtml#PC3).


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              659        1093          6

    --          2              660        1094          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    Query OK, 1 row affected (0.0098 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 3805;

    Query OK, 1 row affected (0.0009 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    -- Connection 1

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 3805;

    ERROR: 1213: Deadlock found when trying to get lock; try restarting transaction

    -- Connection 2

    Query OK, 1 row affected (0.1019 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0002 sec)

    -- Connection 2

    Connection 2> ROLLBACK;

    Query OK, 0 rows affected (0.0293 sec)

    Listing 8-3

    Example of a deadlock

    ```


    A deadlock can be even simpler than in this example (though it is rare unless
    you use locking `SELECT` statements either explicitly or using the `SERIALIZABLE`
    transaction isolation level). Listing [8-4](#502546_1_En_8_Chapter.xhtml#PC4)
    shows a deadlock that occurs using just a single row.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              663        1097          6

    --          2              664        1098          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> SELECT * FROM world.city WHERE ID = 130 FOR SHARE;

    +-----+--------+-------------+-----------------+------------+

    | ID  | Name   | CountryCode | District        | Population |

    +-----+--------+-------------+-----------------+------------+

    | 130 | Sydney | AUS         | New South Wales |    3276207 |

    +-----+--------+-------------+-----------------+------------+

    1 row in set (0.0005 sec)

    -- Connection 2

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    -- Connection 1

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    Query OK, 1 row affected (0.0447 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    ERROR: 1213: Deadlock found when trying to get lock; try restarting transaction

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0280 sec)

    -- Connection 2

    Connection 2> ROLLBACK;

    Query OK, 0 rows affected (0.0003 sec)

    Listing 8-4

    A single row deadlock

    ```'
  trans: '

    ## 死锁


    死锁听起来是一个很吓人的概念，但你不应该被这个名字吓退。就像锁等待超时一样，死锁是高并发数据库世界中的客观现实。它的真正含义是锁请求之间存在循环关系，如图
    8-1 中的交通僵局所示。解决这种僵局的唯一方法是强制其中一个请求放弃。从这个意义上说，死锁与锁等待超时并无不同。实际上，你可以禁用死锁检测，在这种情况下，其中一个锁最终会以锁等待超时告终。


    ![../images/502546_1_En_8_Chapter/502546_1_En_8_Fig1_HTML.jpg](img/502546_1_En_8_Fig1_HTML.jpg)


    图 8-1: 交通僵局


    那么，如果死锁并非真正需要，为什么还会存在呢？由于死锁发生在锁请求之间存在循环关系时，InnoDB 有可能在循环形成时立即将其检测出来。这使得 InnoDB
    能够立即告知用户发生了死锁，而无需等待锁等待超时发生。被告知发生了死锁也是很有用的，因为它常常为改进应用程序中的数据访问提供了机会。因此，你应该将死锁视为朋友而非敌人。图
    8-2 展示了一个导致死锁的两个事务查询表的例子。


    ![../images/502546_1_En_8_Chapter/502546_1_En_8_Fig2_HTML.png](img/502546_1_En_8_Fig2_HTML.png)


    图 8-2: 两个事务导致死锁的示例


    在这个例子中，事务 1 首先更新 `ID = 130` 的行，然后更新 `ID = 3805` 的行。在此期间，事务 2 首先更新 `ID = 3805`
    的行，然后更新 `ID = 130` 的行。这意味着当事务 1 尝试更新 `ID = 3805` 时，事务 2 已经对该行持有了锁。事务 2 也无法继续，因为它无法获取
    `ID = 130` 上的锁，该锁已被事务 1 持有。这是一个经典的简单死锁例子。循环锁关系也如图 8-3 所示。


    ![../images/502546_1_En_8_Chapter/502546_1_En_8_Fig3_HTML.png](img/502546_1_En_8_Fig3_HTML.png)


    图 8-3: 导致死锁的锁循环关系


    在此图中，可以清楚地看到事务 1 和 2 各自持有哪些锁，以及请求了哪些锁，并且如果不进行干预，冲突将永远无法解决。这使其符合死锁的定义。


    在现实世界中，死锁通常更为复杂。这里讨论的例子只涉及了主键记录锁。通常，还会涉及二级索引键、间隙锁以及可能的其他锁类型。涉及的事务也可能超过两个。然而，其原理是相同的。


    **注意**：即使每个事务只有一个查询，也可能发生死锁。如果一个查询按升序读取记录，而另一个按降序读取，就有可能发生死锁。


    当死锁发生时，InnoDB 选择“已完成工作最少”的事务作为牺牲品。这类似于某些高可用性解决方案（如 MySQL NDB 集群）中使用的“Shoot The
    Other Node In The Head”（STONITH）方法，只不过这里被“爆头”的是一个事务。你可以查看 `information_schema.INNODB_TRX`
    视图中的 `trx_weight` 列，了解 InnoDB 使用的权重（完成的工作越多，权重越高）。在实践中，这意味着持有锁最少的事务将被回滚。当这种情况发生时，被选为牺牲品的事务中的查询会失败，并返回错误
    `ER_LOCK_DEADLOCK`（错误代码 1213），然后该事务被回滚以尽可能多地释放锁。清单 8-3 展示了一个发生死锁的例子。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              659        1093          6

    --          2              660        1094          6

    -- 连接 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    Query OK, 1 row affected (0.0098 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- 连接 2

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 3805;

    Query OK, 1 row affected (0.0009 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    -- 连接 1

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 3805;

    ERROR: 1213: Deadlock found when trying to get lock; try restarting transaction

    -- 连接 2

    Query OK, 1 row affected (0.1019 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- 连接 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0002 sec)

    -- 连接 2

    Connection 2> ROLLBACK;

    Query OK, 0 rows affected (0.0293 sec)

    清单 8-3: 死锁示例

    ```


    死锁甚至可能比这个例子更简单（不过这种情况很少见，除非你显式地使用锁定 `SELECT` 语句或使用 `SERIALIZABLE` 事务隔离级别）。清单 8-4
    展示了一个仅使用单行发生的死锁。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              663        1097          6

    --          2              664        1098          6

    -- 连接 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0004 sec)

    Connection 1> SELECT * FROM world.city WHERE ID = 130 FOR SHARE;

    +-----+--------+-------------+-----------------+------------+

    | ID  | Name   | CountryCode | District        | Population |

    +-----+--------+-------------+-----------------+------------+

    | 130 | Sydney | AUS         | New South Wales |    3276207 |

    +-----+--------+-------------+-----------------+------------+

    1 row in set (0.0005 sec)

    -- 连接 2

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    -- 连接 1

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE ID = 130;

    Query OK, 1 row affected (0.0447 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- 连接 2

    ERROR: 1213: Deadlock found when trying to get lock; try restarting transaction

    -- 连接 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0280 sec)

    -- 连接 2

    Connection 2> ROLLBACK;

    Query OK, 0 rows affected (0.0003 sec)

    清单 8-4: 单行死锁

    ```

