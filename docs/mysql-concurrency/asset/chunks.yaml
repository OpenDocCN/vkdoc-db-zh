  trans: '## 状态计数器与 InnoDB 指标


    有几个状态计数器和 InnoDB 指标可以提供与锁相关的信息。这些指标主要在全局（实例）级别使用，可用于检测锁问题的整体增长情况。


    ### 查询数据


    状态计数器和 InnoDB 指标有两个来源。全局状态计数器可以在 `performance_schema.global_status` 表中找到，或者使用
    `SHOW GLOBAL STATUS` 语句查询。InnoDB 指标则位于 `information_schema.INNODB_METRICS` 视图中。


    InnoDB 指标与全局状态变量类似，可以提供关于 InnoDB 状态的一些有价值信息。`NAME` 列可用于按名称查询指标。在撰写本文时，共有 313 个可见指标，其中
    74 个默认启用。还有一个隐藏指标，即 `latch` 指标，用于控制是否收集互斥锁等待统计信息。指标按子系统（`SUBSYSTEM` 列）分组，每个指标在
    `COMMENT` 列中都有其测量内容的描述，指标类型（计数器、数值等）可在 `TYPE` 列中查看。


    监控所有这些指标的一个好方法是使用 `sys.metrics` 视图。清单 2-5 展示了一个检索指标的示例。


    ```sql

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1               27          69          6

    -- 连接 1

    mysql> SELECT Variable_name,

    Variable_value AS Value,

    Enabled

    FROM sys.metrics

    WHERE Variable_name LIKE ''innodb_row_lock%''

    OR Variable_name LIKE ''Table_locks%''

    OR Variable_name LIKE ''innodb_rwlock_%''

    OR Type = ''InnoDB Metrics - lock'';

    +-------------------------------+--------+---------+

    | 变量名                        | 值     | 已启用  |

    +-------------------------------+--------+---------+

    | innodb_row_lock_current_waits | 0      | YES     |

    | innodb_row_lock_time          | 2163   | YES     |

    | innodb_row_lock_time_avg      | 721    | YES     |

    | innodb_row_lock_time_max      | 2000   | YES     |

    | innodb_row_lock_waits         | 3      | YES     |

    | table_locks_immediate         | 330    | YES     |

    | table_locks_waited            | 0      | YES     |

    | lock_deadlock_false_positives | 0      | YES     |

    | lock_deadlock_rounds          | 37214  | YES     |

    | lock_deadlocks                | 1      | YES     |

    | lock_rec_grant_attempts       | 1      | YES     |

    | lock_rec_lock_created         | 0      | NO      |

    | lock_rec_lock_removed         | 0      | NO      |

    | lock_rec_lock_requests        | 0      | NO      |

    | lock_rec_lock_waits           | 0      | NO      |

    | lock_rec_locks                | 0      | NO      |

    | lock_rec_release_attempts     | 24317  | YES     |

    | lock_row_lock_current_waits   | 0      | YES     |

    | lock_schedule_refreshes       | 37214  | YES     |

    | lock_table_lock_created       | 0      | NO      |

    | lock_table_lock_removed       | 0      | NO      |

    | lock_table_lock_waits         | 0      | NO      |

    | lock_table_locks              | 0      | NO      |

    | lock_threads_waiting          | 0      | YES     |

    | lock_timeouts                 | 1      | YES     |

    | innodb_rwlock_s_os_waits      | 12248  | YES     |

    | innodb_rwlock_s_spin_rounds   | 19299  | YES     |

    | innodb_rwlock_s_spin_waits    | 6811   | YES     |

    | innodb_rwlock_sx_os_waits     | 171    | YES     |

    | innodb_rwlock_sx_spin_rounds  | 5239   | YES     |

    | innodb_rwlock_sx_spin_waits   | 182    | YES     |

    | innodb_rwlock_x_os_waits      | 26283  | YES     |

    | innodb_rwlock_x_spin_rounds   | 774745 | YES     |

    | innodb_rwlock_x_spin_waits    | 12666  | YES     |

    +-------------------------------+--------+---------+

    34 行于集 (0.0174 sec)

    ```


    清单 2-5 锁指标


    其中，`innodb_row_lock_%`、`lock_deadlocks` 和 `lock_timeouts` 指标最值得关注。行锁指标显示了当前有多少锁正在等待，以及等待获取
    InnoDB 记录锁所花费的时间（以毫秒计）的统计数据。`lock_deadlocks` 和 `lock_timeouts` 指标则分别显示了已遇到的死锁和锁等待超时的次数。


    如果你遇到 InnoDB 互斥锁或信号量争用，那么 `innodb_rwlock_%` 指标对于监控等待发生的频率以及等待所花费的轮数非常有用。


    如你所见，并非所有指标都默认启用（这些全是 InnoDB 指标），因此让我们探讨一下如何启用和禁用来自 `INNODB_METRICS` 视图的指标。'
- fmt: '### Configuring the InnoDB Metrics


    The InnoDB metrics can be configured, so you can choose which are enabled, and
    you can reset the statistics. You enable, disable, and reset the metrics using
    global system variables:


    *   `innodb_monitor_disable`: Disable one or more metrics.

    *   `innodb_monitor_enable`: Enable one or more metrics.

    *   `innodb_monitor_reset`: Reset the counter for one or more metrics.

    *   `innodb_monitor_reset_all`: Reset all statistics including the counter, minimum,
    and maximum values for one or more metrics.


    The metrics can be turned on and off as needed with the current status found in
    the `STATUS` column of the `INNODB_METRICS` view. You specify the name of the
    metric or the name of the subsystem prepended with `module_` as the value to the
    `innodb_monitor_enable` or `innodb_monitor_disable` variable, and you can use
    `%` as a wild card. The value `all` works as a special value to affect all metrics.


    **Note**

    When you specify a module, it will only work as expected if there is no metric
    matching the module. Examples where you cannot specify the module are `module_cpu`,
    `module_page_track`, and `module_dblwr`.


    Listing [2-6](#502546_1_En_2_Chapter.xhtml#PC11) shows an example of enabling
    and using all the metrics matching `icp%` (which happens to be the metrics in
    the `icp` – index condition pushdown – subsystem). After querying the metrics,
    they are disabled again using the subsystem as the argument. The values of `COUNT`
    depend on the workload you have at the time of the query.


    ```sql

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1               32          74          6

    -- Connection 1

    mysql> SET GLOBAL innodb_monitor_enable = ''icp%'';

