  trans: '# 18. 案例研究：信号量


    互斥锁和信号量争用是你可能遇到的最难以捉摸的争用类型之一，因为在极端情况之外，你不会直接注意到任何问题。相反，争用往往表现为整体延迟增加和吞吐量降低，难以准确定位。然后，你可能突然之间跨越了一个负载阈值，争用导致你的服务器完全停止运行。


    本章通过一个调查自适应哈希索引读写信号量争用的案例研究进行说明。不过，请务必注意，信号量争用根据发生争用的互斥锁或信号量而有所不同，解决它所需的调查方法也是如此。在严重性较高的案例中，你可能还会发现同时存在多个信号量等待的争用。


    ## 症状


    注意到 InnoDB 互斥锁或信号量存在争用的两种最常见方式是通过 InnoDB 监视器和 `innodb_rwlock_%` InnoDB 指标。


    在 InnoDB 监视器输出中，你将在输出顶部的 `SEMAPHORES` 部分看到持续的等待，例如：


    ```

    SEMAPHORES

    OS WAIT ARRAY INFO: reservation count 77606

    --Thread 19304 has waited at btr0sea.ic line 122 for 0 seconds the semaphore:

    S-lock on RW-latch at 00000215E6DC12F8 created in file btr0sea.cc line 202

    a writer (thread id 11100) has reserved it in mode exclusive

    number of readers 0, waiters flag 1, lock_word: 0

    Last time read locked in file btr0sea.ic line 122

    Last time write locked in file G:\ade\build\sb_0-39697839-1592332179.68\mysql-8.0.21\storage\innobase\btr\btr0sea.cc
    line 1197

    --Thread 26128 has waited at btr0sea.ic line 92 for 0 seconds the semaphore:

    X-lock on RW-latch at 00000215E6DC12F8 created in file btr0sea.cc line 202

    a writer (thread id 11100) has reserved it in mode exclusive

    number of readers 0, waiters flag 1, lock_word: 0

    Last time read locked in file btr0sea.ic line 122

    Last time write locked in file G:\ade\build\sb_0-39697839-1592332179.68\mysql-8.0.21\storage\innobase\btr\btr0sea.cc
    line 1197

    OS WAIT ARRAY INFO: signal count 93040

    RW-shared spins 18200, rounds 38449, OS waits 20044

    RW-excl spins 22345, rounds 1121445, OS waits 38469

    RW-sx spins 3684, rounds 100410, OS waits 2886

    Spin rounds per wait: 2.11 RW-shared, 50.19 RW-excl, 27.26 RW-sx

    ```


    等待次数越多，等待时间越长，问题就越严重。


    你可能还会在监控中注意到，高负载时读写锁等待次数很高，并且可能出现峰值。在一个真实世界的例子中，自适应哈希索引存在严重争用，长时间内每秒有数万次操作系统等待。


    ## 原因


    问题在于，对共享资源（例如访问自适应哈希索引）的请求到达速度超过了处理速度。这些资源在源代码内部使用互斥锁和读写锁进行保护。争用表明，要么你已达到所用 MySQL
    版本针对你的工作负载的并发限制，要么你需要将资源拆分成更多部分或采取类似措施。


    ## 环境设置


    随意重现信号量争用可能很困难。系统上可用的 CPU 越多，就越有可能生成经历信号量等待的工作负载。


    本章讨论的输出是使用`清单` `8-1`的工作负载在配备八个 CPU、缓冲池大小设置为默认 128 MiB 的笔记本电脑上生成的。如果你尝试重现该案例，可能需要试验连接数。脚本会提示你输入这些值，默认为
    1 个读写线程，其余每个 CPU 使用一个连接用于只读连接。


    **注意**

    MySQL Shell 的会话对象即使每个线程拥有自己的会话，也并非完全线程安全。因此，可能需要尝试测试几次。这个问题在 Microsoft Windows
    上使用多个读写连接时尤其明显。


    你也可以尝试更改缓冲池的大小。另一个选择是减少提交事务时的刷新，这对于磁盘刷新性能较差的情况特别有帮助：


    ```

    SET GLOBAL innodb_flush_log_at_trx_commit = 0,

    GLOBAL sync_binlog = 0;

    ```


    **警告**

    在测试系统上减少刷新是可以的，但不应在生产系统上这样做，因为在发生崩溃时可能会丢失已提交的事务。


    运行更长时间也可以增加至少看到一次争用的机会。


    该测试还允许你请求在测试前重启 MySQL，并且你可以选择是否删除测试创建的索引。重启 MySQL 可以让你看到从冷的 InnoDB 缓冲池启动时的差异（尽管工作负载确实会自行预热缓冲池）。


    **注意**

    仅当你已在监督进程下启动 MySQL 时，从测试重启 MySQL 才有效。例如，在 Microsoft Windows 上作为服务启动 MySQL、使用 `mysqld_safe`
    或在 Linux 上通过 `systemd` 启动时就会发生这种情况。


    如果你想多次运行测试，告诉测试不要删除其索引可能是有利的，因为这允许测试在下次执行时跳过创建步骤。


    执行测试用例的示例如清单 `18-1` 所示。执行的完整输出包含在文件 `listing_18-1.txt` 中，可从本书的 GitHub 仓库获取。


    ```

    Specify the number of read-write connections (0-31) [1]:

    Specify the number of read-only connections (1-31) [7]:

    Specify the number of seconds to run for (1-3600) [10]:

    Restart MySQL before executing the test? (Y|Yes|N|No) [No]:

    Delete the test specific indexes after executing the test? (Y|Yes|N|No) [Yes]:

    2020-07-25 15:56:33.928772  0 [INFO] Adding 1 index to the dept_emp table

    2020-07-25 15:56:43.238872  0 [INFO] Adding 1 index to the employees table

    2020-07-25 15:56:54.202735  0 [INFO] Adding 1 index to the salaries table

    2020-07-25 15:57:47.050114  0 [INFO] Warming up the InnoDB buffer pool.

    2020-07-25 15:58:04.543354  0 [INFO] Waiting 2 seconds to let the monitoring collect
    some information before starting the test.

    2020-07-25 15:58:06.544765  0 [INFO] Starting the work connections.

    2020-07-25 15:58:07.556126  0 [INFO] Completed  10%

    …

    -- Total mutex and rw-semaphore waits during test:

    +----------------+-------+

    | File:Line      | Waits |

    +----------------+-------+

    | btr0sea.cc:202 | 13368 |

    +----------------+-------+

    -- Total execution time: 25.685603 seconds

    2020-07-25 15:58:34.374196  0 [INFO] Dropping indexes on the dept_emp table.

    2020-07-25 15:58:35.651209  0 [INFO] Dropping indexes on the employees table.

    2020-07-25 15:58:36.344171  0 [INFO] Dropping indexes on the salaries table.

    Listing 18-1

    信号量等待

    ```


    请注意，在示例开始时，有五个关于如何运行测试的信息提示。'
- fmt: 'When the test reproduces the issue, you will see one or more outputs of the
    `SEMAPHORES` section from the InnoDB monitor output, and at the end, some diagnostics
    data is generated. This data includes:


    *   RW-lock metrics collected every second during the test. This is printed in
    CSV format, so you can copy it into a spreadsheet and plot it.

    *   Adaptive hash index metrics collected every second during the test. This is
    also printed in CSV format.

    *   The total number of pages as well as the rate made young or not made young
    in the InnoDB buffer pool.

    *   The `INSERT BUFFER AND ADAPTIVE HASH INDEX` section as it looks at the end
    of the test.

    *   The total mutex and rw-semaphore waits during test.


    The read-only workload consists of a join between three tables in the `employees`
    database which includes a large number of secondary index lookups:


    ```sql

    SELECT dept_name, MIN(salary) min_salary,

    AVG(salary) AS avg_salary, MAX(salary) AS max_salary

    FROM employees.departments

    INNER JOIN employees.dept_emp USING (dept_no)

    INNER JOIN employees.salaries USING (emp_no)

    WHERE dept_emp.to_date = ''9999-01-01''

    AND salaries.to_date = ''9999-01-01''

    GROUP BY dept_no

    ORDER BY dept_name;

    ```


    The read-write workload chooses a random last name from the `employees.employees`
    table and gives all employees with that surname a pay rise. With placeholders,
    the steps are:


    ```sql

    SELECT last_name

    FROM employees.employees

    WHERE emp_no = ?;

    SELECT emp_no, salary, from_date + INTERVAL 1 DAY

    FROM employees.employees

    INNER JOIN employees.salaries USING (emp_no)

    WHERE employees.last_name = ?

    AND to_date = ''9999-01-01'';

    # For each employee found in the previous query,

    # execute the insert and update:

    INSERT INTO employees.salaries

    VALUES (?, ?, ?, ''9999-01-01'');

    UPDATE employees.salaries

    SET to_date = ?

    WHERE emp_no = ? AND to_date = ''9999-01-01'';

    ```


    This means that the data in the `employees` database is modified. You do not need
    to reload the data between each test, but you may want to reset it when you are
    done testing if you want to have the original data returned.


    Three indexes have been added to the tables to ensure the necessary secondary
    indexes are present to cause the contention (remember the adaptive hash index
    is only used for secondary indexes):


    ```sql

    ALTER TABLE employees.dept_emp

    ADD INDEX idx_concurrency_book_0 (dept_no, to_date);

    ALTER TABLE employees.employees

    ADD INDEX idx_concurrency_book_1 (last_name, first_name);

    ALTER TABLE employees.salaries

    ADD INDEX idx_concurrency_book_2 (emp_no, to_date, salary);

    ```


    The indexes are dropped again at the end of the test unless you request to keep
    them.


    Finally, to avoid premature eviction of the pages read into the buffer pool during
    the test, the `innodb_old_blocks_time` is set to 0 for the duration of the test:


    ```sql

    SET GLOBAL innodb_old_blocks_time = 0;

    ```


    This helps putting the buffer pool under higher pressure than it otherwise would
    be which makes it more likely to reproduce the contention. The variable is set
    back to 1000 (the default value) at the end of the test.


    **Note**

    The test will take longer than the runtime you specify as the runtime is only
    checked at the start of each loop of queries. So, all pending queries in a loop
    will complete.


    Now that the workload causing the issue has been established, it is time to start
    the investigation.


    ## The Investigation


    When you encounter semaphore contention, the first port of call is usually your
    monitoring system where you can get an overview of the contention. While you can
    query the metrics yourself, the semaphore waits tend to fluctuate, and you may
    well have periods with no contention and only see the issue during the busiest
    periods or when specific workloads are executed. Viewing the metrics in a graph
    makes it much easier to determine when the contention occurs.


    This section discusses how you can monitor the `innodb_rwlock_%` metrics, the
    `SEMAPHORES` section of the InnoDB monitor, the InnoDB mutex monitor, and determining
    the workload.


    ### The InnoDB RW-Lock Metrics


    One option is to start your investigation by looking at the `innodb_rwlock_%`
    metrics from `information_schema.INNODB_METRICS` or `sys.metrics`. There are three
    groups of metrics: for shared, for shared-exclusive, and for exclusive rw-locks.
    Each group has three metrics: number of spin waits, number of spin rounds, and
    number of operating system waits. The CSV output at the end of the test includes
    the metrics for the shared and exclusive groups. (The shared-exclusive rw-locks
    are not of interest in this investigation.) Figure [18-1](#502546_1_En_18_Chapter.xhtml#Fig1)
    shows an example of the metrics for the shared rw-locks plotted with the time
    into the test on the x-axis.


    ![`../images/502546_1_En_18_Chapter/502546_1_En_18_Fig1_HTML.jpg`](images/502546_1_En_18_Chapter/502546_1_En_18_Fig1_HTML.jpg)


    `Figure 18-1`

    The number of waits and spin rounds for shared rw-locks


    Here the number of spin waits is almost constant during the test, but the number
    of spin rounds (the top line in the graph) greatly increases around 7 seconds
    into the test. This also causes the number of OS waits to increase. That the OS
    waits jump up means that the spin rounds for a spin wait exceed `innodb_sync_spin_loops`
    (defaults to 30).


    The picture for the exclusive rw-locks is similar except that the number of spin
    rounds is much higher as shown in Figure [18-2](#502546_1_En_18_Chapter.xhtml#Fig2).


    ![`../images/502546_1_En_18_Chapter/502546_1_En_18_Fig2_HTML.jpg`](images/502546_1_En_18_Chapter/502546_1_En_18_Fig2_HTML.jpg)


    `Figure 18-2`

    The number of waits and spin rounds for exclusive rw-locks


    While it is hard to see because the number of spin rounds dwarfs the spin and
    OS waits, they do follow the same pattern as for the shared rw-locks, and the
    absolute numbers for the waits are around twice that of the shared locks. The
    number of waits that is cause of concern depends on your workload, and the more
    concurrent queries you have, the larger the number of waits there is in general.
    You should particularly keep an eye on the OS waits as those increase when the
    waits happen for so long that the thread is suspended.'
