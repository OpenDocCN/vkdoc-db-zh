- fmt: '## Backup Locks


    The backup lock is an instance-level lock; that is, it affects the system as a
    whole. It is a new lock introduced in MySQL 8. The backup lock prevents statements
    that can make a backup inconsistent while still allowing other statements to be
    executed concurrently with the backup. Currently the primary user of the backup
    lock is MySQL Enterprise Backup which uses it together with the log lock to avoid
    executing `FLUSH TABLES WITH READ LOCK` for InnoDB tables. The statements that
    are blocked include


    *   Statements that create, rename, or remove files. These include `CREATE TABLE`,
    `CREATE TABLESPACE`, `RENAME TABLE`, and `DROP TABLE` statements.


    *   Account management statements such as `CREATE USER`, `ALTER USER`, `DROP USER`,
    and `GRANT`.


    *   DDL statements that do not log their changes to the redo log. These, for example,
    include adding an index.


    A backup lock is created with the `LOCK INSTANCE FOR BACKUP` statement, and the
    lock is released with the `UNLOCK INSTANCE` statement. It requires the `BACKUP_ADMIN`
    privileges to execute `LOCK INSTANCE FOR BACKUP`. An example of obtaining the
    backup lock and releasing it again is


    ```

    mysql> LOCK INSTANCE FOR BACKUP;

    Query OK, 0 rows affected (0.0002 sec)

    mysql> UNLOCK INSTANCE;

    Query OK, 0 rows affected (0.0003 sec)

    ```


    Note


    At the time of writing, taking a backup lock and releasing it is not allowed when
    using the X Protocol (connecting through the port specified with `mysqlx_port`
    or the socket specified with `mysqlx_socket`). Attempting to do so returns an
    `ER_PLUGGABLE_PROTOCOL_COMMAND_NOT_SUPPORTED` error: `ERROR: 3130: Command not
    supported by pluggable protocols`.


    Additionally, statements that conflict with the backup lock also take the backup
    lock. Since DDL statements sometimes consist of several steps, for example, rebuilding
    a table in a new file and renaming the file, the backup lock can be released between
    the steps to avoid blocking `LOCK INSTANCE FOR BACKUP` for longer than necessary.


    Backup locks can be found in the `performance_schema.metadata_locks` table with
    the `OBJECT_TYPE` column set to `BACKUP LOCK`. Listing 6-9 shows an example of
    a query waiting for a backup lock held by `LOCK INSTANCE FOR BACKUP`.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              484         851          1

    --          2              485         852          1

    --          3              486         853          1

    -- Connection 1

    Connection 1> LOCK INSTANCE FOR BACKUP;

    Query OK, 0 rows affected (0.0004 sec)

    -- Connection 2

    Connection 2> OPTIMIZE TABLE world.city;

    -- Connection 3

    Connection 3> SELECT object_type, object_schema, object_name,

    lock_type, lock_duration, lock_status,

    owner_thread_id

    FROM performance_schema.metadata_locks

    WHERE object_type = ''BACKUP LOCK''

    AND owner_thread_id IN (851, 852)\G

    *************************** 1. row ***************************

    object_type: BACKUP LOCK

    object_schema: NULL

    object_name: NULL

    lock_type: SHARED

    lock_duration: EXPLICIT

    lock_status: GRANTED

    owner_thread_id: 851

    *************************** 2. row ***************************

    object_type: BACKUP LOCK

    object_schema: NULL

    object_name: NULL

    lock_type: INTENTION_EXCLUSIVE

    lock_duration: TRANSACTION

    lock_status: PENDING

    owner_thread_id: 852

    2 rows in set (0.0007 sec)

    -- Connection 1

    Connection 1> UNLOCK INSTANCE;

    Query OK, 0 rows affected (0.0003 sec)

    Listing 6-9

    Example of a conflict for the backup lock

    ```


    In the example, the connection with thread id 851 owns the backup lock, whereas
    the connection with thread id 852 is waiting for it. Notice that `LOCK INSTANCE
    FOR BACKUP` holds a shared lock, whereas the DDL statement requests an intention
    exclusive lock.


    Related to the backup lock is the log lock which has also been introduced to reduce
    locking during backups.


    ## Log Locks


    When you create a backup, you typically want to include information about the
    log positions and GTID set the backup is consistent with. In MySQL 5.7 and earlier,
    you needed the global read lock while obtaining this information. In MySQL 8,
    the log lock was introduced to allow you to read information such as the executed
    global transaction identifiers (GTIDs), the binary log position, and the log sequence
    number (LSN) for InnoDB without taking a global read lock.


    The log lock prevents operations that make changes to log-related information.
    In practice this means commits, `FLUSH LOGS`, and similar. The log lock is taken
    implicitly by querying the `performance_schema.log_status` table. It requires
    the `BACKUP_ADMIN` privilege to access the table. Listing 6-10 shows an example
    output of the `log_status` table.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              490         857          6

    -- Connection 1

    Connection 1 > SELECT *

    FROM performance_schema.log_status\G

    *************************** 1. row ***************************

    SERVER_UUID: fcbb7afc-bdde-11ea-b95f-ace2d35785be

    LOCAL: {"gtid_executed": "d2549c41-86ca-11ea-9dc7-ace2d35785be:1-351", "binary_log_file":
    "binlog.000002", "binary_log_position": 39348}

    REPLICATION: {"channels": [{"channel_name": "", "relay_log_file": "relay-bin.000002",
    "relay_log_position": 39588}]}

    STORAGE_ENGINES: {"InnoDB": {"LSN": 2073604726, "LSN_checkpoint": 2073604726}}

    1 row in set (0.0012 sec)

    Listing 6-10

    Example output of the log_status table

    ```


    The information available depends on the configuration of the instance, and the
    values depend on the usage.


    That concludes the review of the main high-lock types in MySQL.


    ## Summary


    In this chapter the high-level lock types have been discussed. These are mostly
    independent of the storage engine used and include a range of locks from user-level
    and instance-level locks to table and metadata locks.


    The user-level locks can be used to protect workflows in the application and are
    the most generic lock type. The flush locks are experienced when tables are flushed
    and can cause hard to diagnose issues due to the low-level table definition cache
    (TDC) version lock. The metadata locks protect the metadata of schema objects
    such as the column definitions for a table.


    There are both explicit table locks and implicit table locks of which the implicit
    locks are the most common when working with InnoDB tables. The implicit locks
    also include the intention locks.


    At the instance level, there are two lock types that were developed with backups
    in mind. The backup locks protect against changes that will make a backup inconsistent
    such as changes to users and privileges and certain schema changes. The log lock
    is an implicit lock taken when querying the `performance_schema.log_status` to
    ensure log-related status values can be obtained in a consistent way with minimal
    locking.


    In addition to the high-level locks, InnoDB has its own set of locks working at
    the record level that will be discussed in the next chapter.


