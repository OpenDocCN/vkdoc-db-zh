    Query OK, 0 rows affected (1.4438 sec)\n```\n\n与可用于减少锁的唯一键不同，外键会增加锁，这将在下一部分讨论。\n\
    \n## Foreign Keys\n\n外键是确保数据库中表之间数据一致性的强大工具。然而，它们有一个缺点：为了提供这种安全性，需要在父表和子表上添加额外的锁。\n\
    \n所需的额外锁取决于外键关系中更改的是父表还是子表，以及更改了哪些列。对于元数据锁，在大多数情况下，会在涉及外键关系的表上获取共享锁。一个例外是向外键关系的父表中插入数据；在这种情况下，不会在子表上获取共享元数据锁。\n\
    \n在 `InnoDB` 级别，如果修改了包含在外键中的列，则会为关系另一端表中外键列新值对应的行设置共享记录级锁，并为该表设置意向共享锁。无论外键是否被违反，都会发生这种情况。如果没有更改外键列，即使该列用于过滤，`InnoDB`\
    \ 也不会采取任何额外的锁。\n\n为了理解这如何影响您，值得考虑几个例子。它们都使用了 `sakila.inventory` 表，该表有两个指向 `film`\
    \ 和 `store` 表的外键。同时，它也是 `film_rental` 表的外键的父表。如图 [10-1](#502546_1_En_10_Chapter.xhtml#Fig1)\
    \ 所示。\n\n![../images/502546_1_En_10_Chapter/502546_1_En_10_Fig1_HTML.jpg](images/502546_1_En_10_Chapter/502546_1_En_10_Fig1_HTML.jpg)\n\
