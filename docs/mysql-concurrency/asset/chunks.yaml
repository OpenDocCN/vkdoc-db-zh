    often the most important resource when it comes to investigating ongoing transactions.
    Another source of information about transactions is the InnoDB monitor which you
    also encountered in the previous chapter. Finally, the metrics in the `INNODB_METRICS`
    and the `sys.metrics` views are discussed.


