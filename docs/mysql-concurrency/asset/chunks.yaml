    ## Introduction


    When working with databases, locks and transactions are some of the most difficult
    and misunderstood topics. This book aims at improving your understanding of these
    two concepts, how they work, how you can investigate them, and how you can improve
    your workload, so it works the best with them. This is achieved through a combination
    of discussing monitoring, the lock and transaction theory, and a series of case
    studies.


    `MySQL` is famous for its support for storage engines. However, this book exclusively
    covers the `InnoDB` storage engine, and only `MySQL 8` is considered. That said,
    most of the discussion also applies to older versions of `MySQL`, and in general,
    it is mentioned when a feature is new in `MySQL 8` or that `MySQL 8` has a different
    behavior compared to older versions.


    ### Book Audience


    The book has been written for developers and database administrators who have
    experience working with `MySQL` and want to expand their knowledge of how locks
    and transactions work in the realm of `MySQL` concurrency.


    ### Examples and the Book’s GitHub Repository


    I have tried to add as many examples and outputs from examples as possible. Some
    of the examples are quite short, some are quite long. In either case, I hope you
    are able to follow them and reproduce the effect or result demonstrated. At the
    same time, please do bear in mind that by nature there is often randomness involved,
    and the exact outcome of the examples may depend on how the tables and data have
    been used prior to the example. In other words, you may get different results
    even if you did everything right. This particularly applies to numbers that relate
    to lock ids, memory locations, mutexes/semaphores, timings, and the like.


    Examples that are long or produce outputs that are either long or wide have been
    added to this book’s GitHub repository. This includes some of the figures that
    may be hard to read with the image size that the page format allows.


    **Note**

    The link to the repository can be found from the book’s home page at [`www.apress.com/gp/book/9781484266519`](http://www.apress.com/gp/book/9781484266519).
    It can also be found directly at [`www.github.com/Apress/mysql-concurrency`](http://www.github.com/Apress/mysql-concurrency).


    To make it easier to reproduce the examples and to provide example queries that
    can be used to examine the issue the test demonstrates, a module written in `Python`
    for use in `MySQL Shell` is also included in the book’s GitHub repository. The
    basic installation and usage instructions are covered in Chapter [1](#502546_1_En_1_Chapter.xhtml)
    and the full documentation in Appendix B.


    The GitHub repository will also be the home of the errata for the book once that
    is created. I will use the errata not only to communicate errors in the book but
    also to provide updates when bug fixes and new features in `MySQL 8` cause changes
    to book content. If necessary, I will also update the examples in the repository
    to reflect the behavior in the newer releases. For these reasons, I recommend
    that you keep an eye on the repository.'
