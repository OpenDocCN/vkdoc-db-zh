- fmt: '# 7. InnoDB Locks


    The locks studied in the previous chapter were all, apart from the InnoDB intention
    locks, general for MySQL. InnoDB has its own sophisticated locking system that
    allows for a highly concurrent access to the data. In online transaction processing
    (OLTP) workloads, benchmarks show that depending on the workload, InnoDB handles
    up to over 100 concurrent queries well.^[³](#fn3) This is not only related to
    the record-level locks but also low-level semaphores, and the latter is an area
    of ongoing improvement which is the main reason that newer versions of MySQL handle
    concurrency better than old versions.


    ### Tip


    Newer versions of MySQL support higher degrees of concurrent query execution than
    older versions. Latest in `8.0.21`, the lock system mutex was sharded to reduce
    contention on high-concurrency systems.


    In this chapter, first, the InnoDB record locks and next-key locks will be discussed
    followed by gap locks and predicate locks. The last of the data-level locks that
    are covered is auto-increment locks which are also important to maintain a good
    performance at high concurrency inserts. The final topic of the chapter is semaphores.


    ## Record Locks and Next-Key Locks


    Record locks are often called row locks; however, it is more than just locks on
    rows as it also includes index and gap locks. Related are next-key locks. A next-key
    lock is the combination of a record lock and a gap lock on the gap before the
    record. A next-key lock is actually the default lock type in InnoDB, and thus
    you will just see it as `S` (shared) and `X` (exclusive) in the lock outputs.


    Record and next-key locks are typically the locks that are meant when talking
    about InnoDB locks. They are fine-grained locks that aim at just locking the least
    amount of data while still ensuring the data integrity.


    A record or next-key lock can be shared or exclusive and affect just the rows
    and indexes accessed by the transaction. The duration of exclusive locks is usually
    the transaction with exceptions, for example, delete-marked records used for uniqueness
    checks in `INSERT INTO ... ON DUPLICATE KEY` and `REPLACE` statements. For shared
    locks, the duration can depend on the transaction isolation level as discussed
    in Chapters 9 and 12.


    Record and next-key locks can be found using the `performance_schema.data_locks`
    table. Listing 7-1 shows an example of the locks from updating rows in the `world.city`
    table using the secondary index `CountryCode`.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              544         919          6

    --          2              545         920          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE CountryCode = ''LUX'';

    Query OK, 1 row affected (0.0008 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT thread_id, event_id,

    object_schema, object_name, index_name,

    lock_type, lock_mode, lock_status, lock_data

    FROM performance_schema.data_locks

    WHERE thread_id = 919\G

    *************************** 1\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: NULL

    lock_type: TABLE

    lock_mode: IX

    lock_status: GRANTED

    lock_data: NULL

    *************************** 2\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: CountryCode

    lock_type: RECORD

    lock_mode: X

    lock_status: GRANTED

    lock_data: ''LUX'', 2452

    *************************** 3\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: PRIMARY

    lock_type: RECORD

    lock_mode: X,REC_NOT_GAP

    lock_status: GRANTED

    lock_data: 2452

    *************************** 4\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: CountryCode

    lock_type: RECORD

    lock_mode: X,GAP

    lock_status: GRANTED

    lock_data: ''LVA'', 2434

    4 rows in set (0.0014 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.1702 sec)

    ```

    Listing 7-1 Example of InnoDB record locks


    The first row is the intention exclusive table lock that has already been discussed.
    The second row is a next-key lock on the `CountryCode` index for the value (`''LUX''`,
    `2452`) where `''LUX''` is the country code used in the `WHERE` clause and `2452`
    is the primary key id added to the nonunique secondary index. The city with `ID
    = 2452` is the only city matching the `WHERE` clause, and the primary key record
    (the row itself) is shown in the third row of the output. The lock mode is `X,REC_NOT_GAP`
    which means it is an exclusive lock on the record but not on the gap.


    What is a gap? An example is shown in the fourth row of the output. Gap locks
    are so important that the discussion of the gap lock is split out into its own.


    ## Gap Locks


    A gap lock protects the space between two records. This can be in the row through
    the clustered index or in a secondary index. Before the first record in an index
    page and after the last in the page, there are pseudo-records called the *infimum
    record* and *supremum record*, respectively. Gap locks are often the lock type
    causing the most confusion. Experience from studying lock issues is the best way
    to become familiar with them.


    Consider the query from the previous example:


    ```

    UPDATE world.city

    SET Population = Population + 1

    WHERE CountryCode = ''LUX'';

    ```


    This query changes the population of all cities with `CountryCode = ''LUX''`.
    What happens if a new city is inserted between the update and the commit of the
    transaction? If the `UPDATE` and `INSERT` statements commit in the same order
    they are executed, all is as such fine. However, if you commit the changes in
    the opposite order, then the result is inconsistent as it would be expected the
    inserted row would also have been updated.


    This is where the gap lock comes into play. It guards the space where new records
    (including records moved from a different position) would be inserted, so it is
    not changed until the transaction holding the gap lock is completed. If you look
    at the fourth row in the output from the example in Listing 7-1, you can see an
    example of a gap lock:


    ```

    *************************** 4\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: CountryCode

    lock_type: RECORD

    lock_mode: X,GAP

    lock_status: GRANTED

    lock_data: ''LVA'', 2434

    4 rows in set (0.0014 sec)

    ```


    This is an exclusive gap lock on the `CountryCode` index for the value (`''LVA''`,
    `2434`). Since the query requested to update all rows with the `CountryCode` set
    to `''LUX''`, the gap lock ensures that no new rows are inserted for the `''LUX''`
    country code. The country code `''LVA''` is the next value in the `CountryCode`
    index, so the gap between `''LUX''` and `''LVA''` is protected with an exclusive
    lock. On the other hand, it is still possible to insert new cities with `CountryCode
    = ''LVA''`. In some places, this is referred to as a “gap before record” which
    makes it easier to understand how the gap lock works.


    One peculiarity of gap locks is that gap locks do not conflict with another gap
    lock even if both are exclusive. The purpose of gap locks is not to prevent access
    to the gap but exclusively to prevent inserting data into the gap. When discussing
    insert intention locks, you will see how a gap lock blocks the insert.


    Gap locks are taken to a much less degree when you use the `READ COMMITTED` transaction
    isolation level rather than `REPEATABLE READ` or `SERIALIZABLE`.


    Related to gap locks are predicate locks.'
  raw: '# 7. InnoDB Locks


    The locks studied in the previous chapter were all, apart from the InnoDB intention
    locks, general for MySQL. InnoDB has its own sophisticated locking system that
    allows for a highly concurrent access to the data. In online transaction processing
    (OLTP) workloads, benchmarks show that depending on the workload, InnoDB handles
    up to over 100 concurrent queries well.^([³](#fn3)) This is not only related to
    the record-level locks but also low-level semaphores, and the latter is an area
    of ongoing improvement which is the main reason that newer versions of MySQL handle
    concurrency better than old versions.


    Tip


    Newer versions of MySQL support higher degrees of concurrent query execution than
    older versions. Latest in 8.0.21, the lock system mutex was sharded to reduce
    contention on high-concurrency systems.


    In this chapter, first, the InnoDB record locks and next-key locks will be discussed
    followed by gap locks and predicate locks. The last of the data-level locks that
    are covered is auto-increment locks which are also important to maintain a good
    performance at high concurrency inserts. The final topic of the chapter is semaphores.


    ## Record Locks and Next-Key Locks


    Record locks are often called row locks; however, it is more than just locks on
    rows as it also includes index and gap locks. Related are next-key locks. A next-key
    lock is the combination of a record lock and a gap lock on the gap before the
    record. A next-key lock is actually the default lock type in InnoDB, and thus
    you will just see it as S (shared) and X (exclusive) in the lock outputs.


    Record and next-key locks are typically the locks that are meant when talking
    about InnoDB locks. They are fine-grained locks that aim at just locking the least
    amount of data while still ensuring the data integrity.


    A record or next-key lock can be shared or exclusive and affect just the rows
    and indexes accessed by the transaction. The duration of exclusive locks is usually
    the transaction with exceptions, for example, delete-marked records used for uniqueness
    checks in `INSERT INTO ... ON DUPLICATE KEY` and `REPLACE` statements. For shared
    locks, the duration can depend on the transaction isolation level as discussed
    in Chapters [9](#502546_1_En_9_Chapter.xhtml) and [12](#502546_1_En_12_Chapter.xhtml).


    Record and next-key locks can be found using the `performance_schema.data_locks`
    table. Listing [7-1](#502546_1_En_7_Chapter.xhtml#PC1) shows an example of the
    locks from updating rows in the `world.city` table using the secondary index `CountryCode`.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              544         919          6

    --          2              545         920          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE CountryCode = ''LUX'';

    Query OK, 1 row affected (0.0008 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT thread_id, event_id,

    object_schema, object_name, index_name,

    lock_type, lock_mode, lock_status, lock_data

    FROM performance_schema.data_locks

    WHERE thread_id = 919\G

    *************************** 1\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: NULL

    lock_type: TABLE

    lock_mode: IX

    lock_status: GRANTED

    lock_data: NULL

    *************************** 2\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: CountryCode

    lock_type: RECORD

    lock_mode: X

    lock_status: GRANTED

    lock_data: ''LUX'', 2452

    *************************** 3\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: PRIMARY

    lock_type: RECORD

    lock_mode: X,REC_NOT_GAP

    lock_status: GRANTED

    lock_data: 2452

    *************************** 4\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: CountryCode

    lock_type: RECORD

    lock_mode: X,GAP

    lock_status: GRANTED

    lock_data: ''LVA'', 2434

    4 rows in set (0.0014 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.1702 sec)

    Listing 7-1

    Example of InnoDB record locks

    ```


    The first row is the intention exclusive table lock that has already been discussed.
    The second row is a next-key lock on the `CountryCode` index for the value (‘LUX’,
    2452) where ‘LUX’ is the country code used in the `WHERE` clause and 2452 is the
    primary key id added to the nonunique secondary index. The city with `ID = 2452`
    is the only city matching the `WHERE` clause, and the primary key record (the
    row itself) is shown in the third row of the output. The lock mode is `X,REC_NOT_GAP`
    which means it is an exclusive lock on the record but not on the gap.


    What is a gap? An example is shown in the fourth row of the output. Gap locks
    are so important that the discussion of the gap lock is split out into its own.


    ## Gap Locks


    A gap lock protects the space between two records. This can be in the row through
    the clustered index or in a secondary index. Before the first record in an index
    page and after the last in the page, there are pseudo-records called the *infimum
    record* and *supremum record* , respectively. Gap locks are often the lock type
    causing the most confusion. Experience from studying lock issues is the best way
    to become familiar with them.


    Consider the query from the previous example:


    ```

    UPDATE world.city

    SET Population = Population + 1

    WHERE CountryCode = ''LUX'';

    ```


    This query changes the population of all cities with `CountryCode = ''LUX''`.
    What happens if a new city is inserted between the update and the commit of the
    transaction? If the `UPDATE` and `INSERT` statements commit in the same order
    they are executed, all is as such fine. However, if you commit the changes in
    the opposite order, then the result is inconsistent as it would be expected the
    inserted row would also have been updated.


    This is where the gap lock comes into play. It guards the space where new records
    (including records moved from a different position) would be inserted, so it is
    not changed until the transaction holding the gap lock is completed. If you look
    at the fourth row in the output from the example in Listing [7-1](#502546_1_En_7_Chapter.xhtml#PC1),
    you can see an example of a gap lock:


    ```

    *************************** 4\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: CountryCode

    lock_type: RECORD

    lock_mode: X,GAP

    lock_status: GRANTED

    lock_data: ''LVA'', 2434

    4 rows in set (0.0014 sec)

    ```


    This is an exclusive gap lock on the `CountryCode` index for the value (‘LVA’,
    2434). Since the query requested to update all rows with the `CountryCode` set
    to “LUX,” the gap lock ensures that no new rows are inserted for the “LUX” country
    code. The country code “LVA” is the next value in the `CountryCode` index, so
    the gap between “LUX” and “LVA” is protected with an exclusive lock. On the other
    hand, it is still possible to insert new cities with `CountryCode = ''LVA''`.
    In some places, this is referred to as a “gap before record” which makes it easier
    to understand how the gap lock works.


    One peculiarity of gap locks is that gap locks do not conflict with another gap
    lock even if both are exclusive. The purpose of gap locks is not to prevent access
    to the gap but exclusively to prevent inserting data into the gap. When discussing
    insert intention locks, you will see how a gap lock blocks the insert.


    Gap locks are taken to a much less degree when you use the `READ COMMITTED` transaction
    isolation level rather than `REPEATABLE READ` or `SERIALIZABLE`.


    Related to gap locks are predicate locks.'
  trans: '

    # 7. InnoDB 锁机制


    前一章研究的锁，除了 InnoDB 意向锁外，都是 MySQL 通用的。InnoDB 拥有自己精密的锁系统，以实现高度并发的数据访问。在线事务处理（OLTP）工作负载的基准测试表明，根据工作负载的不同，InnoDB
    能够良好地处理超过 100 个并发查询。^³ 这不仅与记录级锁有关，还涉及底层信号量，而后者是一个持续改进的领域，这也是新版本 MySQL 比旧版本能更好处理并发的主要原因。


    ### 提示


    与旧版本相比，新版本的 MySQL 支持更高程度的并发查询执行。最迟在 `8.0.21` 中，锁系统互斥锁被分片，以减少高并发系统上的争用。


    本章将首先讨论 InnoDB 记录锁和临键锁，然后是间隙锁和谓词锁。涵盖的数据级锁中最后一种是自增锁，它在高并发插入时保持良好性能方面也很重要。本章的最后一个主题是信号量。


    ## 记录锁与临键锁


    记录锁通常被称为行锁；然而，它不仅仅是行上的锁，还包括索引锁和间隙锁。与之相关的是临键锁。临键锁是记录锁和记录前间隙上的间隙锁的组合。临键锁实际上是 InnoDB
    中的默认锁类型，因此在锁输出中，你只会看到 `S`（共享）和 `X`（排他）模式。


    当谈论 InnoDB 锁时，通常指的就是记录锁和临键锁。它们是细粒度锁，旨在仅锁定最少的数据量，同时确保数据完整性。


    记录锁或临键锁可以是共享的或排他的，并且仅影响事务访问的行和索引。排他锁的持续时间通常与事务一致，但也有例外，例如在 `INSERT INTO ... ON
    DUPLICATE KEY` 和 `REPLACE` 语句中用于唯一性检查的 delete-marked 记录。对于共享锁，其持续时间可能取决于事务隔离级别，这将在第
    9 章和第 12 章讨论。


    可以使用 `performance_schema.data_locks` 表来查找记录锁和临键锁。清单 7-1 展示了使用二级索引 `CountryCode`
    更新 `world.city` 表中的行时所产生的锁的示例。


    ```

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              544         919          6

    --          2              545         920          6

    -- 连接 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE world.city

    SET Population = Population + 1

    WHERE CountryCode = ''LUX'';

    Query OK, 1 row affected (0.0008 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- 连接 2

    Connection 2> SELECT thread_id, event_id,

    object_schema, object_name, index_name,

    lock_type, lock_mode, lock_status, lock_data

    FROM performance_schema.data_locks

    WHERE thread_id = 919\G

    *************************** 1\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: NULL

    lock_type: TABLE

    lock_mode: IX

    lock_status: GRANTED

    lock_data: NULL

    *************************** 2\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: CountryCode

    lock_type: RECORD

    lock_mode: X

    lock_status: GRANTED

    lock_data: ''LUX'', 2452

    *************************** 3\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: PRIMARY

    lock_type: RECORD

    lock_mode: X,REC_NOT_GAP

    lock_status: GRANTED

    lock_data: 2452

    *************************** 4\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: CountryCode

    lock_type: RECORD

    lock_mode: X,GAP

    lock_status: GRANTED

    lock_data: ''LVA'', 2434

    4 rows in set (0.0014 sec)

    -- 连接 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.1702 sec)

    ```

    清单 7-1 InnoDB 记录锁示例


    第一行是已经讨论过的意向排他表锁。第二行是 `CountryCode` 索引上的临键锁，锁定值为（`''LUX''`, `2452`），其中 `''LUX''`
    是 `WHERE` 子句中使用的国家代码，`2452` 是添加到非唯一二级索引中的主键 id。ID 为 `2452` 的城市是唯一匹配 `WHERE` 子句的城市，主键记录（行本身）显示在输出的第三行。锁模式是
    `X,REC_NOT_GAP`，这意味着它是记录上的排他锁，而不是间隙锁。


    什么是间隙？输出的第四行展示了一个例子。间隙锁非常重要，以至于对间隙锁的讨论被单独分出来。


    ## 间隙锁


    间隙锁保护两条记录之间的空间。这可以通过聚簇索引或在二级索引中发生在行中。在索引页的第一条记录之前和页的最后一条记录之后，有称为 *infimum 记录*
    和 *supremum 记录* 的伪记录。间隙锁通常是导致最多困惑的锁类型。通过研究锁问题来积累经验是熟悉它们的最佳途径。


    考虑前一个例子中的查询：


    ```

    UPDATE world.city

    SET Population = Population + 1

    WHERE CountryCode = ''LUX'';

    ```


    这个查询会更改所有 `CountryCode = ''LUX''` 的城市的人口。如果在更新和事务提交之间插入了一个新城市会发生什么？如果 `UPDATE`
    和 `INSERT` 语句按照它们执行的相同顺序提交，那么一切正常。然而，如果你以相反的顺序提交更改，那么结果就会不一致，因为人们会期望插入的行也已被更新。


    这就是间隙锁发挥作用的地方。它保护新记录（包括从不同位置移动过来的记录）将被插入的空间，因此在持有该间隙锁的事务完成之前，这个空间不会被改变。如果你查看清单
    7-1 示例输出的第四行，可以看到一个间隙锁的例子：


    ```

    *************************** 4\. row ***************************

    thread_id: 919

    event_id: 10

    object_schema: world

    object_name: city

    index_name: CountryCode

    lock_type: RECORD

    lock_mode: X,GAP

    lock_status: GRANTED

    lock_data: ''LVA'', 2434

    4 rows in set (0.0014 sec)

    ```


    这是在 `CountryCode` 索引上，针对值（`''LVA''`, `2434`）的一个排他间隙锁。由于查询请求更新所有 `CountryCode`
    设置为 `''LUX''` 的行，该间隙锁确保没有新行可以插入到 `''LUX''` 国家代码下。国家代码 `''LVA''` 是 `CountryCode`
    索引中的下一个值，因此 `''LUX''` 和 `''LVA''` 之间的间隙被一个排他锁保护起来。另一方面，仍然可以插入 `CountryCode = ''LVA''`
    的新城市。在某些地方，这被称为“记录前的间隙”，这使得理解间隙锁的工作原理更容易。


    间隙锁的一个特点是，即使两个都是排他的，间隙锁也不会与另一个间隙锁冲突。间隙锁的目的不是防止访问间隙，而只是防止在间隙中插入数据。当讨论插入意向锁时，你将看到间隙锁如何阻塞插入操作。


    当你使用 `READ COMMITTED` 事务隔离级别时，相比 `REPEATABLE READ` 或 `SERIALIZABLE`，所采用的间隙锁程度要低得多。


    与间隙锁相关的是谓词锁。

    '
- fmt: '## Predicate and Page Locks


    A predicate lock is similar to a gap lock but applies to spatial indexes where
    an absolute ordering cannot be made and thus a gap lock does not make sense. Instead
    of a gap lock, for spatial indexes in the `REPEATABLE READ` and `SERIALIZABLE`
    transaction isolation levels, InnoDB creates a predicate lock on the minimum bounding
    rectangle (MBR) used for the query or for entire pages. This will allow consistent
    reads by preventing changes to the data within the minimum bounding rectangle
    or pages.


    When querying the `performance_schema.data_locks` table, predicate locks will
    have either `PREDICATE` or `PRDT_PAGE` with the latter being a page lock.


    As an example of predicate locks, consider the `address` table in the `sakila`
    database. This has the column `location` which is of the geometry data type with
    the Spatial Reference System Identifier (SRID) set to 0. (An SRID is required
    in MySQL 8 to have a spatial index.) The index on the `location` column is named
    `idx_location`. The following listing shows how a predicate lock is taken when
    updating one of the addresses.


    ```sql

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              562         954          6

    --          2              563         955          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE sakila.address

    SET address = ''42 Concurrency Boulevard'',

    district = ''Punjab'',

    city_id = 208,

    postal_code = 40509,

    location = ST_GeomFromText(''POINT(75.91 31.53)'', 0)

    WHERE address_id = 372;

    Query OK, 1 row affected (0.0008 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT engine_lock_id, thread_id, event_id,

    object_schema, object_name, index_name,

    lock_type, lock_mode, lock_status, lock_data

    FROM performance_schema.data_locks

    WHERE thread_id = 954

    AND index_name = ''idx_location''\G

    *************************** 1. row ***************************

    engine_lock_id: 2123429833312:1074:12:0:2123393008216

    thread_id: 954

    event_id: 10

    object_schema: sakila

    object_name: address

    index_name: idx_location

    lock_type: RECORD

    lock_mode: S,PRDT_PAGE

    lock_status: GRANTED

    lock_data: infimum pseudo-record

    *************************** 2. row ***************************

    engine_lock_id: 2123429833312:1074:13:0:2123393008560

    thread_id: 954

    event_id: 10

    object_schema: sakila

    object_name: address

    index_name: idx_location

    lock_type: RECORD

    lock_mode: S,PRDT_PAGE

    lock_status: GRANTED

    lock_data: infimum pseudo-record

    2 rows in set (0.0006 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0435 sec)

    ```

    **Listing 7-2** Example of predicate/page locks


    The important part of the update is that the `location` column is changed. In
    the output from the `data_locks` table, it can be seen a predicate page lock was
    taken.


    One final lock type related to records that you should know is insert intention
    locks.


    ## Insert Intention Locks


    Remember that for table locks, InnoDB has intention locks for whether the transaction
    will use the table in a shared or exclusive manner. Similarly, InnoDB has insert
    intention locks at the record level. InnoDB uses these locks – as the name suggests
    – with `INSERT` statements to signal the intention to other transactions. As such,
    the lock is on a yet to be created record (so it is a gap lock) rather than on
    an existing record. The use of insert intention locks can help increase the concurrency
    that inserts can be performed at.


    You are not very likely to see insert intention locks in lock outputs unless an
    `INSERT` statement is waiting for a lock to be granted. You can force a situation
    where this happens by creating a gap lock in another transaction that will prevent
    the `INSERT` statement from completing. The following example creates a gap lock
    in Connection 1 and then in Connection 2 attempts to insert a row which conflicts
    with the gap lock. Finally, in a third connection, the lock information is retrieved.


    ```sql

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              577         972          6

    --          2              578         973          6

    --          3              579         974          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT *

    FROM world.city

    WHERE ID > 4079

    FOR UPDATE\G

    0 rows in set (0.0007 sec)

    -- Connection 2

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> INSERT INTO world.city

    VALUES (4080, ''Darwin'', ''AUS'',

    ''Northern Territory'', 146000);

    -- Connection 3

    Connection 3> SELECT thread_id, event_id,

    object_schema, object_name, index_name,

    lock_type, lock_mode, lock_status, lock_data

    FROM performance_schema.data_locks

    WHERE thread_id IN (972, 973)

    AND object_name = ''city''

    AND index_name = ''PRIMARY''\G

    *************************** 1. row ***************************

    thread_id: 972

    event_id: 10

    object_schema: world

    object_name: city

    index_name: PRIMARY

    lock_type: RECORD

    lock_mode: X

    lock_status: GRANTED

    lock_data: supremum pseudo-record

    *************************** 2. row ***************************

    thread_id: 973

    event_id: 10

    object_schema: world

    object_name: city

    index_name: PRIMARY

    lock_type: RECORD

    lock_mode: X,INSERT_INTENTION

    lock_status: WAITING

    lock_data: supremum pseudo-record

    2 rows in set (0.0007 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0003 sec)

    -- Connection 2

    Connection 2> ROLLBACK;

    Query OK, 0 rows affected (0.3035 sec)

    ```

    **Listing 7-3** Example of an insert intention lock


    Notice that for the `RECORD` lock, the lock mode includes `INSERT_INTENTION` –
    the insert intention lock. In this case, the data locked is the supremum pseudo-record,
    but that can also be the value of the primary key depending on the situation.
    If you recall the next-key lock discussion, then `X` means a next-key lock, but
    this is a special case as the lock is on the supremum pseudo-record, and it is
    not possible to lock that, so effectively it is just a gap lock on the gap before
    the supremum pseudo-record.


    Another lock that you need to be aware of when inserting data is the auto-increment
    lock.'
  raw: '## Predicate and Page Locks


    A predicate lock is similar to a gap lock but applies to spatial indexes where
    an absolute ordering cannot be made and thus a gap lock does not make sense. Instead
    of a gap lock, for spatial indexes in the `REPEATABLE READ` and `SERIALIZABLE`
    transaction isolation levels, InnoDB creates a predicate lock on the minimum bounding
    rectangle (MBR) used for the query or for entire pages. This will allow consistent
    reads by preventing changes to the data within the minimum bounding rectangle
    or pages.


    When querying the `performance_schema.data_locks` table, predicate locks will
    have either `PREDICATE` or `PRDT_PAGE` with the latter being a page lock.


    As an example of predicate locks, consider the `address` table in the `sakila`
    database. This has the column `location` which is of the geometry data type with
    the Spatial Reference System Identifier (SRID) set to 0\. (An SRID is required
    in MySQL 8 to have a spatial index.) The index on the `location` column is named
    `idx_location`. Listing [7-2](#502546_1_En_7_Chapter.xhtml#PC4) shows how a predicate
    lock is taken when updating one of the addresses.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              562         954          6

    --          2              563         955          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE sakila.address

    SET address = ''42 Concurrency Boulevard'',

    district = ''Punjab'',

    city_id = 208,

    postal_code = 40509,

    location = ST_GeomFromText(''POINT(75.91 31.53)'', 0)

    WHERE address_id = 372;

    Query OK, 1 row affected (0.0008 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- Connection 2

    Connection 2> SELECT engine_lock_id, thread_id, event_id,

    object_schema, object_name, index_name,

    lock_type, lock_mode, lock_status, lock_data

    FROM performance_schema.data_locks

    WHERE thread_id = 954

    AND index_name = ''idx_location''\G

    *************************** 1\. row ***************************

    engine_lock_id: 2123429833312:1074:12:0:2123393008216

    thread_id: 954

    event_id: 10

    object_schema: sakila

    object_name: address

    index_name: idx_location

    lock_type: RECORD

    lock_mode: S,PRDT_PAGE

    lock_status: GRANTED

    lock_data: infimum pseudo-record

    *************************** 2\. row ***************************

    engine_lock_id: 2123429833312:1074:13:0:2123393008560

    thread_id: 954

    event_id: 10

    object_schema: sakila

    object_name: address

    index_name: idx_location

    lock_type: RECORD

    lock_mode: S,PRDT_PAGE

    lock_status: GRANTED

    lock_data: infimum pseudo-record

    2 rows in set (0.0006 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0435 sec)

    Listing 7-2

    Example of predicate/page locks

    ```


    The important part of the update is that the `location` column is changed. In
    the output from the `data_locks` table, it can be seen a predicate page lock was
    taken.


    One final lock type related to records that you should know is insert intention
    locks.


    ## Insert Intention Locks


    Remember that for table locks, InnoDB has intention locks for whether the transaction
    will use the table in a shared or exclusive manner. Similarly, InnoDB has insert
    intention locks at the record level. InnoDB uses these locks – as the name suggests –
    with `INSERT` statements to signal the intention to other transactions. As such,
    the lock is on a yet to be created record (so it is a gap lock) rather than on
    an existing record. The use of insert intention locks can help increase the concurrency
    that inserts can be performed at.


    You are not very likely to see insert intention locks in lock outputs unless an
    `INSERT` statement is waiting for a lock to be granted. You can force a situation
    where this happens by creating a gap lock in another transaction that will prevent
    the `INSERT` statement from completing. The example in Listing [7-3](#502546_1_En_7_Chapter.xhtml#PC5)
    creates a gap lock in Connection 1 and then in Connection 2 attempts to insert
    a row which conflicts with the gap lock. Finally, in a third connection, the lock
    information is retrieved.


    ```

    -- Connection   Processlist ID   Thread ID   Event ID

    -- --------------------------------------------------

    --          1              577         972          6

    --          2              578         973          6

    --          3              579         974          6

    -- Connection 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT *

    FROM world.city

    WHERE ID > 4079

    FOR UPDATE\G

    0 rows in set (0.0007 sec)

    -- Connection 2

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> INSERT INTO world.city

    VALUES (4080, ''Darwin'', ''AUS'',

    ''Northern Territory'', 146000);

    -- Connection 3

    Connection 3> SELECT thread_id, event_id,

    object_schema, object_name, index_name,

    lock_type, lock_mode, lock_status, lock_data

    FROM performance_schema.data_locks

    WHERE thread_id IN (972, 973)

    AND object_name = ''city''

    AND index_name = ''PRIMARY''\G

    *************************** 1\. row ***************************

    thread_id: 972

    event_id: 10

    object_schema: world

    object_name: city

    index_name: PRIMARY

    lock_type: RECORD

    lock_mode: X

    lock_status: GRANTED

    lock_data: supremum pseudo-record

    *************************** 2\. row ***************************

    thread_id: 973

    event_id: 10

    object_schema: world

    object_name: city

    index_name: PRIMARY

    lock_type: RECORD

    lock_mode: X,INSERT_INTENTION

    lock_status: WAITING

    lock_data: supremum pseudo-record

    2 rows in set (0.0007 sec)

    -- Connection 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0003 sec)

    -- Connection 2

    Connection 2> ROLLBACK;

    Query OK, 0 rows affected (0.3035 sec)

    Listing 7-3

    Example of an insert intention lock

    ```


    Notice that for the `RECORD` lock, the lock mode includes `INSERT_INTENTION` –
    the insert intention lock. In this case, the data locked is the supremum pseudo-record,
    but that can also be the value of the primary key depending on the situation.
    If you recall the next-key lock discussion, then X means a next-key lock, but
    this is a special case as the lock is on the supremum pseudo-record, and it is
    not possible to lock that, so effectively it is just a gap lock on the gap before
    the supremum pseudo-record.


    Another lock that you need to be aware of when inserting data is the auto-increment
    lock.'
  trans: '

    ## 谓词锁与页锁


    谓词锁类似于间隙锁，但它应用于空间索引。在空间索引中，无法确定绝对的顺序，因此间隙锁没有意义。在 `REPEATABLE READ`（可重复读）和 `SERIALIZABLE`（可串行化）事务隔离级别下，对于空间索引，InnoDB
    不使用间隙锁，而是在查询所使用的最小边界矩形（MBR）或整个页上创建一个谓词锁。这将通过防止对最小边界矩形或页内的数据进行更改，来实现一致性读取。


    当查询 `performance_schema.data_locks` 表时，谓词锁将显示为 `PREDICATE` 或 `PRDT_PAGE`，后者表示页锁。


    作为一个谓词锁的例子，考虑 `sakila` 数据库中的 `address` 表。该表有一个 `location` 列，其数据类型为 `geometry`（几何），空间参考系统标识符（SRID）设置为
    0。（在 MySQL 8 中，需要 SRID 才能创建空间索引。）`location` 列上的索引名为 `idx_location`。下面的代码清单展示了更新其中一个地址时如何获取谓词锁。


    ```sql

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              562         954          6

    --          2              563         955          6

    -- 连接 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 1> UPDATE sakila.address

    SET address = ''42 Concurrency Boulevard'',

    district = ''Punjab'',

    city_id = 208,

    postal_code = 40509,

    location = ST_GeomFromText(''POINT(75.91 31.53)'', 0)

    WHERE address_id = 372;

    Query OK, 1 row affected (0.0008 sec)

    Rows matched: 1  Changed: 1  Warnings: 0

    -- 连接 2

    Connection 2> SELECT engine_lock_id, thread_id, event_id,

    object_schema, object_name, index_name,

    lock_type, lock_mode, lock_status, lock_data

    FROM performance_schema.data_locks

    WHERE thread_id = 954

    AND index_name = ''idx_location''\G

    *************************** 1. row ***************************

    engine_lock_id: 2123429833312:1074:12:0:2123393008216

    thread_id: 954

    event_id: 10

    object_schema: sakila

    object_name: address

    index_name: idx_location

    lock_type: RECORD

    lock_mode: S,PRDT_PAGE

    lock_status: GRANTED

    lock_data: infimum pseudo-record

    *************************** 2. row ***************************

    engine_lock_id: 2123429833312:1074:13:0:2123393008560

    thread_id: 954

    event_id: 10

    object_schema: sakila

    object_name: address

    index_name: idx_location

    lock_type: RECORD

    lock_mode: S,PRDT_PAGE

    lock_status: GRANTED

    lock_data: infimum pseudo-record

    2 rows in set (0.0006 sec)

    -- 连接 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0435 sec)

    ```

    **清单 7-2** 谓词/页锁示例


    这个更新操作的关键部分在于 `location` 列被更改了。从 `data_locks` 表的输出可以看到，获取了一个谓词页锁。


    最后一种你应该了解的与记录相关的锁类型是插入意向锁。


    ## 插入意向锁


    请记住，对于表级锁，InnoDB 有意向锁来表明事务将以共享或独占方式使用表。类似地，InnoDB 在记录级别也有插入意向锁。正如其名所示，InnoDB 在
    `INSERT` 语句中使用这些锁来向其他事务发出意向信号。因此，该锁是针对一条尚不存在的记录（因此它是一种间隙锁），而不是针对现有记录。使用插入意向锁可以帮助提高插入操作的并发性能。


    在锁输出中，你不太可能看到插入意向锁，除非一个 `INSERT` 语句正在等待获取锁。你可以通过在一个事务中创建一个间隙锁来阻止 `INSERT` 语句完成，从而强制产生这种情况。以下示例在连接
    1 中创建一个间隙锁，然后在连接 2 中尝试插入一行，该插入与间隙锁冲突。最后，在第三个连接中检索锁信息。


    ```sql

    -- 连接   进程列表 ID   线程 ID   事件 ID

    -- --------------------------------------------------

    --          1              577         972          6

    --          2              578         973          6

    --          3              579         974          6

    -- 连接 1

    Connection 1> START TRANSACTION;

    Query OK, 0 rows affected (0.0003 sec)

    Connection 1> SELECT *

    FROM world.city

    WHERE ID > 4079

    FOR UPDATE\G

    0 rows in set (0.0007 sec)

    -- 连接 2

    Connection 2> START TRANSACTION;

    Query OK, 0 rows affected (0.0002 sec)

    Connection 2> INSERT INTO world.city

    VALUES (4080, ''Darwin'', ''AUS'',

    ''Northern Territory'', 146000);

    -- 连接 3

    Connection 3> SELECT thread_id, event_id,

    object_schema, object_name, index_name,

    lock_type, lock_mode, lock_status, lock_data

    FROM performance_schema.data_locks

    WHERE thread_id IN (972, 973)

    AND object_name = ''city''

    AND index_name = ''PRIMARY''\G

    *************************** 1. row ***************************

    thread_id: 972

    event_id: 10

    object_schema: world

    object_name: city

    index_name: PRIMARY

    lock_type: RECORD

    lock_mode: X

    lock_status: GRANTED

    lock_data: supremum pseudo-record

    *************************** 2. row ***************************

    thread_id: 973

    event_id: 10

    object_schema: world

    object_name: city

    index_name: PRIMARY

    lock_type: RECORD

    lock_mode: X,INSERT_INTENTION

    lock_status: WAITING

    lock_data: supremum pseudo-record

    2 rows in set (0.0007 sec)

    -- 连接 1

    Connection 1> ROLLBACK;

    Query OK, 0 rows affected (0.0003 sec)

    -- 连接 2

    Connection 2> ROLLBACK;

    Query OK, 0 rows affected (0.3035 sec)

    ```

    **清单 7-3** 插入意向锁示例


    请注意，对于 `RECORD` 锁，其锁模式包含了 `INSERT_INTENTION`——即插入意向锁。在本例中，锁定的数据是 supremum 伪记录，但根据情况，也可能是一个主键值。如果你还记得临键锁的讨论，那么
    `X` 表示一个临键锁，但这是一个特例，因为锁是加在 supremum 伪记录上的，而锁定它是不可能的，所以实际上这只是一个在 supremum 伪记录之前的间隙上的间隙锁。


    插入数据时，你需要了解的另一种锁是自增锁。

    '
- fmt: '## Auto-Increment Locks


    当向具有自增计数器的表中插入数据时，有必要保护该计数器，以保证两个事务能获得唯一值。如果使用基于语句的日志记录写入二进制日志，则会有更多限制，因为当语句被重放时，除第一行外的所有行的自增值都会被重新创建。


    InnoDB 支持三种锁模式，因此你可以根据需要调整锁定程度。你通过 `innodb_autoinc_lock_mode` 选项选择锁模式，该选项接受值 0、1
    和 2，其中 2 是 MySQL 8 中的默认值。更改此值需要重启 MySQL。这些值的含义总结在表 7-1 中。


    表 7-1


    `innodb_autoinc_lock_mode` 选项支持的值


    | 值 | 模式 | 描述 |

    | --- | --- | --- |

    | 0 | 传统 | MySQL 5.0 及更早版本的锁定行为。锁一直保持到语句结束，因此值以可重复且连续的顺序分配。 |

    | 1 | 连续 | 对于在查询开始时已知行数的 `INSERT` 语句，在轻量级互斥锁下分配所需数量的自增值，从而避免自增锁。对于行数未知的语句，则会获取自增锁并保持到语句结束。这是
    MySQL 5.7 及更早版本的默认值。 |

    | 2 | 交错 | 从不获取自增锁，并发插入的自增值可能是交错的。仅当禁用二进制日志或 `binlog_format` 设置为 `ROW` 时，此模式才是安全的。它是
    MySQL 8 中的默认值。 |


    `innodb_autoinc_lock_mode` 的值越高，锁定越少。为此付出的代价是自增值序列中的间隙数量增加，并且对于 `innodb_autoinc_lock_mode
    = 2` 存在值交错的可能性。除非你不能使用基于行的二进制日志或有特殊的连续自增值需求，否则建议使用值 2。


    以上结束了对数据级锁的讨论，但在讨论 MySQL 并发性时，还有一个重要主题未涉及：互斥量和读写锁信号量。


    ## Mutexes and RW-Lock Semaphores


    在 MySQL 源代码中，需要保护代码路径。例如，保护修改缓冲池内容的代码，以避免两个线程同时修改缓冲池内容，从而可能导致冲突的更改。在某种程度上，你可以将互斥量与用户级锁进行比较，只不过前者用于
    MySQL 代码路径，而后者用于使用 MySQL 的应用程序代码路径。


    注意


    InnoDB 在术语上 somewhat interchangeable 地使用 mutex 和 semaphore。例如，InnoDB 监视器中的 `SEMAPHORES`
    部分也包括互斥量等待的信息，而 `SHOW ENGINE INNODB MUTEX` 包括信号量信息。


    不仅 InnoDB 在 MySQL 中使用同步对象；例如，表打开缓存也由一个互斥量保护。然而，在大多数情况下，当你遇到同步对象争用问题时，通常与 InnoDB
    相关，因为高并发操作的压力通常在这里最大，并且对于 InnoDB 有现成的监控工具可用于调查争用。因此，这里只讨论 InnoDB。


    互斥量和信号量比数据锁更难研究，因为不可能在锁生效时暂停代码执行并直接研究它们。（嗯，可以，但这需要使用像 `gdb` 这样的调试器并使用断点。）即使启用了
    Performance Schema 中的同步等待，你也通常会发现不足，因为会有非常多的等待，以至于即使是默认有 10000 行的长历史表，也会很快被单个连接耗尽，如清单
    7-4 所示。'
  raw: '## Auto-Increment Locks


    When you insert data into a table that has an auto-increment counter, it is necessary
    to protect the counter so two transactions are guaranteed to get unique values.
    If you use statement-based logging to the binary log, there are further restrictions
    as the auto-increment value is recreated for all rows except the first when the
    statement is replayed.


    InnoDB supports three lock modes, so you can adjust the amount of locking according
    to your needs. You choose the lock mode with the `innodb_autoinc_lock_mode` option
    which takes the values 0, 1, and 2 with 2 being the default in MySQL 8\. It requires
    a restart of MySQL to change the value. The meaning of the values is summarized
    in Table [7-1](#502546_1_En_7_Chapter.xhtml#Tab1).


    Table 7-1


    Supported values for the `innodb_autoinc_lock_mode` option


    | Value | Mode | Description |

    | --- | --- | --- |

    | 0 | Traditional | The locking behavior of MySQL 5.0 and earlier. The lock is
    held until the end of the statement, so values are assigned in repeatable and
    consecutive order. |

    | 1 | Consecutive | For the `INSERT` statement where the number of rows is known
    at the start of the query, the required number of auto-increment values is assigned
    under a lightweight mutex, and the auto-increment lock is avoided. For statements
    where the number of rows is not known, the auto-increment lock is taken and held
    to the end of the statement. This was the default in MySQL 5.7 and earlier. |

    | 2 | Interleaved | The auto-increment lock is never taken, and the auto-increment
    values for concurrent inserts may be interleaved. This mode is only safe when
    binary logging is disabled or `binlog_format` is set to `ROW`. It is the default
    value in MySQL 8. |


    The higher the value of `innodb_autoinc_lock_mode`, the less locking. The price
    to pay for that is increased number of gaps in the sequence of auto-increment
    values and for `innodb_autoinc_lock_mode = 2` the possibility of interleaved values.
    Unless you cannot use row-based binary logging or have special needs for consecutive
    auto-increment values, it is recommended to use the value of 2.


    That concludes the discussion of data-level locks, but when discussing MySQL concurrency,
    there is one important topic left: mutexes and rw-lock semaphores.


    ## Mutexes and RW-Lock Semaphores


    Inside the MySQL source code, it is necessary to protect code paths. An example
    is to protect the code that modifies the content of the buffer pool to avoid two
    threads modifying the buffer pool content at the same time and thus potentially
    causing conflicting changes. In some way, you can compare mutexes to the user-level
    locks, except the former is for the MySQL code paths and the latter for the application
    code paths using MySQL.


    Note


    InnoDB uses the terms mutex and semaphore somewhat interchangeably. For example,
    the `SEMAPHORES` section in the InnoDB monitor also includes information of mutex
    waits and `SHOW ENGINE INNODB MUTEX` includes semaphores.


    It is not only InnoDB that uses synchronization objects in MySQL; for example,
    the table open cache is also guarded by a mutex. However, in most cases, when
    you encounter problems with contention on the synchronization objects, it is related
    to InnoDB as that is where the pressure of high concurrency operations is usually
    the largest, and for InnoDB there are readily available monitoring tools for investigating
    the contention. For this reason, only the InnoDB will be discussed here.


    The mutexes and semaphores are much more difficult to study than the data locks
    as it is not possible to pause the code execution while the locks are in place
    and study them directly. (Well it is, but that requires using a debugger such
    as `gdb` and the use of breakpoints.) Even with the synchronization waits enabled
    in the Performance Schema, you will usually fall short as there will be some many
    waits that even the long history table with a default of 10000 rows will quickly
    get exhausted even by a single connection as it can be seen from Listing [7-4](#502546_1_En_7_Chapter.xhtml#PC6).'
  trans: '## 自增锁


    当向具有自增计数器的表中插入数据时，有必要保护该计数器，以保证两个事务能获得唯一值。如果使用基于语句的日志记录写入二进制日志，则会有更多限制，因为当语句被重放时，除第一行外的所有行的自增值都会被重新创建。


    InnoDB 支持三种锁模式，因此你可以根据需要调整锁定程度。你通过 `innodb_autoinc_lock_mode` 选项选择锁模式，该选项接受值 0、1
    和 2，其中 2 是 MySQL 8 中的默认值。更改此值需要重启 MySQL。这些值的含义总结在表 7-1 中。


    表 7-1

    `innodb_autoinc_lock_mode` 选项支持的值


    | 值 | 模式 | 描述 |

    | --- | --- | --- |

    | 0 | 传统 | MySQL 5.0 及更早版本的锁定行为。锁一直保持到语句结束，因此值以可重复且连续的顺序分配。 |

    | 1 | 连续 | 对于在查询开始时已知行数的 `INSERT` 语句，在轻量级互斥锁下分配所需数量的自增值，从而避免自增锁。对于行数未知的语句，则会获取自增锁并保持到语句结束。这是
    MySQL 5.7 及更早版本的默认值。 |

    | 2 | 交错 | 从不获取自增锁，并发插入的自增值可能是交错的。仅当禁用二进制日志或 `binlog_format` 设置为 `ROW` 时，此模式才是安全的。它是
    MySQL 8 中的默认值。 |


    `innodb_autoinc_lock_mode` 的值越高，锁定越少。为此付出的代价是自增值序列中的间隙数量增加，并且对于 `innodb_autoinc_lock_mode
    = 2` 存在值交错的可能性。除非你不能使用基于行的二进制日志或有特殊的连续自增值需求，否则建议使用值 2。


    以上结束了对数据级锁的讨论，但在讨论 MySQL 并发性时，还有一个重要主题未涉及：互斥量和读写锁信号量。


    ## 互斥量与读写锁信号量


    在 MySQL 源代码中，需要保护代码路径。例如，保护修改缓冲池内容的代码，以避免两个线程同时修改缓冲池内容，从而可能导致冲突的更改。在某种程度上，你可以将互斥量与用户级锁进行比较，只不过前者用于
    MySQL 代码路径，而后者用于使用 MySQL 的应用程序代码路径。


    注意

    InnoDB 在术语上有些互通地使用 mutex 和 semaphore。例如，InnoDB 监视器中的 `SEMAPHORES` 部分也包括互斥量等待的信息，而
    `SHOW ENGINE INNODB MUTEX` 包括信号量信息。


    不仅 InnoDB 在 MySQL 中使用同步对象；例如，表打开缓存也由一个互斥量保护。然而，在大多数情况下，当你遇到同步对象争用问题时，通常与 InnoDB
    相关，因为高并发操作的压力通常在这里最大，并且对于 InnoDB 有现成的监控工具可用于调查争用。因此，这里只讨论 InnoDB。


    互斥量和信号量比数据锁更难研究，因为不可能在锁生效时暂停代码执行并直接研究它们。（嗯，可以，但这需要使用像 `gdb` 这样的调试器并使用断点。）即使启用了
    Performance Schema 中的同步等待，你也通常会发现不足，因为会有非常多的等待，以至于即使是默认有 10000 行的长历史表，也会很快被单个连接耗尽，如清单
    7-4 所示。'
