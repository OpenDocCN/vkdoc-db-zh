- '# 7. Report Builder 安装与数据准备


  既然我们已经安装了 `SQL Server Reporting Services`，接下来需要弄清楚如何根据软件需求文档中客户的要求创建并交付报表。创建报表的最佳方式很可能是使用
  `Report Builder`，这是微软提供的一个免费下载工具。而交付报表的最佳方式，显然就是使用 `SQL Server Reporting Services`
  的内置功能，正如我们在第 6 章中配置的那样。


  请记住，如果客户只需要扁平文件报表（即仅包含数据的文件，如 `CSV` 或 `XML` 格式），我们完全可以通过从 `SQL Server` 直接导出数据来实现，丝毫不需要
  `SQL Server Reporting Services` 的参与。但本练习的真正目的是展示 `R` 与 `SQL Server` 集成后的强大功能；因此，我们将使用
  `Report Builder`，把第 5 章中创建的图表整合到一份外观精美的报表中。之后，我们可以处理诸如格式调整之类的细节，但最重要的部分是确保报表能够首先成功构建。


  ### 下载 Report Builder


  本章开始，我们需要下载 `Report Builder`。下载链接在 [`https://www.microsoft.com/en-us/download/details.aspx?id=52674`](https://www.microsoft.com/en-us/download/details.aspx?id=52674)，但这个链接可能会有变化。记住，`Google`
  是你的好帮手。


  **提示**：你也可以从第 6 章末尾看到的 `SQL Server Reporting Services` Web 门户中下载 `Report Builder`，只需点击右上角的下箭头即可。


