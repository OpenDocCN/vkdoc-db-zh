  \ Microsoft R Open 安装\n\n点击 **Next**。您应该会被带到图 2-16 所示的屏幕。此屏幕提供了一些关于即将进行的安装的详细信息。阅读给出的信息，勾选\
  \ **I Acknowledge** 复选框，然后在准备好时点击 **Next**。\n\n![A421548_1_En_2_Fig16_HTML.jpg](img/A421548_1_En_2_Fig16_HTML.jpg)\n\
