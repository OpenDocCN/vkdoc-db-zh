  图 2-22. 安装完成\n\n点击图 2-22 中所示的 **Finish** 按钮，以完成安装。此时不需要重新启动。您已具备在 Visual Studio\
  \ 中启动和运行 R 所需的一切。\n\n### Visual Studio 环境\n\n现在我们已经按照 Microsoft 的说明安装了所有内容，让我们看看我们新的开发环境，看看有什么新的、改变的或不同的。对于那些以前使用过\
  \ Visual Studio 的人（可能你们中的大多数人），你们会看到熟悉的 Visual Studio 环境。对于那些以前没有使用过 Visual Studio\
  \ 的人，我邀请你们花一点时间在各个菜单部分中浏览一下，看看您对用户界面的熟悉程度。再次说明，如果您有一个熟悉的 IDE 更愿意用来编写 R 代码，请务必使用那个。我将引导您快速了解一下\
  \ Visual Studio 2015 中与新的 R 功能特别相关的菜单。\n\n请继续启动 Visual Studio。您可能会看到提示您连接到开发者服务的屏幕。如果看到这个，请继续按\
  \ **Maybe Later**。这些都是预期的。您最终会看到图 2-23 所示的主 IDE 屏幕。查看菜单栏中位于菜单工具栏中心稍右侧的 **R Tools**\
  \ 菜单。\n\n![A421548_1_En_2_Fig23_HTML.jpg](img/A421548_1_En_2_Fig23_HTML.jpg)\n图\
  \ 2-23. `R` 已作为 Visual Studio 的一部分安装\n\n**R Tools** 菜单是现在 Visual Studio 中所有 R 功能的所在。打开此菜单会显示图\
  \ 2-24 中的选项。\n\n![A421548_1_En_2_Fig24_HTML.jpg](img/A421548_1_En_2_Fig24_HTML.jpg)\n\
  图 2-24. `R` Tools 菜单选项\n\n让我们看看这些菜单选项。以下小节简要描述了每个菜单选项为您做了什么以及该菜单选项允许您控制什么。\n\n####\
  \ 会话\n\n**Session** 选项允许您进行 `R` 会话。以下是可用选项：\n\n*   Interrupt R\n*   Attach Debugger\n\
  *   Reset\n*   Load Workspace…\n*   Save Workspace As…\n\n#### 绘图\n\n**Plots** 选项允许您定义希望如何显示结果。以下是您的可用选项：\n\
  \n*   Previous Plot\n*   Next Plot\n*   Save as Image\n*   Save as PDF\n*   Copy\
  \ as Bitmap\n*   Copy as Metafile\n*   Remove Plot\n*   Clear All Plots\n\n显然，您可以看到这是一个巨大的帮助。能够将这些图导出为提到的各种类型，已经比其他一些仅生成\
  \ Flash 或 Silverlight 的系统具有了相当大的优势。\n\n#### 数据\n\n**Data** 选项允许您定义希望如何使用已存在的数据。以下是您的可用选项：\n\
  \n*   Import Dataset into R Session from Web URL…\n*   Import Dataset into R Session\
  \ from Text File…\n*   Delete All Variables\n\n我想知道未来我们是否会获得连接到不同数据库和/或安装的选项……如果\
  \ Microsoft 决定走那条路，这将是一个有趣的发展。我认为，提供更多的数据源供使用只会增强产品的可用性。\n\n#### 工作目录\n\n**Working\
  \ Directory** 选项允许您更改工作目录。您的工作目录与 `R` 的安装位置不同。工作目录意味着这是您保存正在处理的文件的地方。\n\n*   Set\
  \ Working Directory to Source File Location\n*   Set Working Directory to Project\
  \ Location\n*   Select Working Directory…\n\n## Windows\n\n“Windows”菜单可让你打开新窗口，以监控\
  \ R 脚本的运行情况。以下是可用选项：\n*   `源代码编辑器`\n*   `R 交互窗口`\n*   `帮助`\n*   `历史记录`\n*   `文件`\n\
  *   `图形`\n*   `包`\n*   `变量资源管理器`\n\n这些选项显然取代了通常用于类视图或堆栈跟踪的常规视图。由于 R 是一门完全不同的语言，因此采用不同的方式来查看数据和开发任务也就顺理成章了。\n\
  \n### 安装 Microsoft R Client…\n\n当你想要从 Microsoft 下载并安装 R 客户端时，请选择 `安装 Microsoft R\
  \ Client` 选项。我们目前不想执行此操作，因此请不要理会它。我稍后会解释 Microsoft R 产品的各个不同组件。\n\n### 将 R 更改为 Microsoft\
  \ R Client\n\n当你拥有一个本地安装的 R，并希望将其转换为 Microsoft R Client 的一个实例时，请选择 `将 R 更改为 Microsoft\
  \ R Client`。这意味着你已经安装了 Microsoft R Open，因为这是运行 R Client 的先决条件。在当前示例中，我们同样不想更改 R\
  \ 客户端。这意味着我们正在连接到远程数据库实例，但事实并非如此。我们是本地连接。\n\n### Microsoft R 产品…\n\n`Microsoft R\
  \ 产品`菜单选项本质上是一个 URL 快捷方式。选择此选项会将你的网页浏览器导航至 [`www.microsoft.com/en-us/cloud-platform/r-server`](https://www.microsoft.com/en-us/cloud-platform/r-server)，你可以在该页面查看\
  \ Microsoft 的 R Server 产品选项。\n\n### RTVS 文档和示例\n\n`RTVS 文档和示例`选项会带你访问专门针对 Visual\
  \ Studio 的 R 工具（RTVS）的文档和示例。提供两个子选项：\n*   `文档`：此选项会带你访问一个网站（[`microsoft.github.io/RTVS-docs`](http://microsoft.github.io/RTVS-docs)），该网站详细介绍了该工具的文档。\n\
  *   `示例`：此选项会带你访问一个网站（[`microsoft.github.io/RTVS-docs/samples.html`](http://microsoft.github.io/RTVS-docs/samples.html)），你可以在其中查看大量可用的\
  \ R 脚本示例。我们稍后会回到这一部分。\n\n### R 文档\n\n`R 文档`菜单项提供了对 R 语言本身文档的便捷访问。这里有四个选项：\n*   `R\
  \ 语言入门`：点击此选项会带你访问 [`cran.r-project.org/doc/manuals/r-release/R-intro.html`](https://cran.r-project.org/doc/manuals/r-release/R-intro.html)。我认为这是个有趣的补充。Microsoft\
  \ 将完整的 R 文档集直接链接到了 Visual Studio 中。你只需点击链接——即可访问。\n*   `任务视图`：此链接指向 [`cran.r-project.org/web/views/`](https://cran.r-project.org/web/views/)，它展示了一系列可下载和安装的任务视图。在此上下文中，任务视图是为共同目的而协同工作的一组库。这里有很多，所以有机会时可以去探索一下。\n\
  *   `数据导入/导出`：此链接指向 [`cran.r-project.org/doc/manuals/r-release/R-data.html`](https://cran.r-project.org/doc/manuals/r-release/R-data.html)，这是另一个文档集。读起来很轻松，没什么大不了的。\n\
  *   `编写 R 扩展`：最后，此链接指向 [`cran.r-project.org/doc/manuals/r-release/R-exts.html`](https://cran.r-project.org/doc/manuals/r-release/R-exts.html)，这又是一个内容广泛的文档集。\n\
  \n通过这些菜单选项可以获得大量关于 R 的信息。当你对语言有疑问时，请随时利用这些可用资源。我强烈建议至少简要通读一下这些文档，以便熟悉 R 在语法上是如何工作的。这将使本章后面的部分更容易理解。\n\
  \n### 反馈\n\n选择`反馈`菜单选项来评价产品。以下是可用选项：\n*   `在 GitHub 上报告问题`\n*   `通过电子邮件发送笑脸`\n*\
  \   `通过电子邮件发送皱眉`\n\n你选择发送的任何反馈最终都会被转交给 Microsoft。\n\n### 检查更新\n\n选择`检查更新`来检查并下载\
  \ R Tools for Visual Studio 的更新。\n\n### 调查/新闻\n\n选择`调查/新闻`选项将导航至 [`rtvs.azurewebsites.net/news/`](http://rtvs.azurewebsites.net/news/)，Microsoft\
  \ 在此发布有关 R 的新闻。其中还有`调查`选项，目前仍是“实验性功能”。\n\n### 编辑器选项\n\n选择`编辑器选项`可进入自定义界面选项。这与常规菜单中的\
  \ `工具` -> `选项`操作相同，只是此菜单默认将选项限定在 R 上下文菜单内。这里有各种选项，包括 `IntelliSense`（智能感知）的运作方式、格式化设置以及常规功能，如行号和自动换行功能。\n\
  \n#### 选项\n\n此选项让你可以自定义环境选项。这与`编辑器选项`菜单不同，因为`编辑器选项`菜单仅处理编辑器上下文中可用的选项。而`选项`菜单让你处理\
  \ R 的实际环境选项，例如调试、`CRAN 镜像`位置、常规帮助设置以及 R 安装位置。\n\n##### 数据科学设置\n\n选择此选项将打开一个模态对话框窗口，如图\
  \ 2-25 所示。你可以选择为所谓的“数据科学家”重新配置 Visual Studio。你将获得一个窗口布局和一些 Microsoft 认为对在 R 中进行数据分析的人员有用的键盘快捷键。\n\
  \n![A421548_1_En_2_Fig25_HTML.jpg](img/A421548_1_En_2_Fig25_HTML.jpg)\n\n图 2-25.\n\
  \n重置选项\n\n继续并点击是。可能会打开另一个屏幕，如图 2-26 所示。\n\n![A421548_1_En_2_Fig26_HTML.jpg](img/A421548_1_En_2_Fig26_HTML.jpg)\n\
  \n图 2-26.\n\n重置键盘选项\n\n如果你希望在使用 RTVS 时重置键盘快捷键，请点击是；否则，点击否。\n\n我们现在可以看到更新后的界面。请查看图\
  \ 2-27 了解这些变化。\n\n![A421548_1_En_2_Fig27_HTML.jpg](img/A421548_1_En_2_Fig27_HTML.jpg)\n\
  \n图 2-27.\n\n更新后的界面\n\n你可以看到我的界面布局使得 `R Interactive` 是左下角的主窗口。在右侧，顶部是 `Variable\
  \ Explorer` 和 `Solution Explorer`。`R Plot`、`R Help` 和 `R History` 都整齐地排列在底部。这证明了\
  \ R 已正确安装并正常工作。\n\n让我们简要讨论一下 Microsoft 在其 R 产品线中提供了什么。\n\n*   `Microsoft R Server`：一个企业级平台，运行于\
  \ Hadoop、Teradata DB 甚至 Linux 之上，以提供与数据的强大交互。使用 `ScaleR` 技术进行并行化。\n*   `Microsoft\
  \ R Client`：一个免费的数据科学工具，与 `Microsoft R Open` 协同工作。`R Client` 使用远程数据并在本地处理操作。使用 `ScaleR`\
  \ 技术进行并行化。\n*   `Microsoft R Open`：Microsoft 的 R “版本”，简称 `MRO`，在各方面与 R 代码完全兼容。不过，它不引用专有的\
  \ `ScaleR` 技术。\n*   `SQL Server R Services`：将 R 原生集成到 SQL Server 的数据库引擎中。不过，`ScaleR`\
  \ 仅在企业版中可用。\n\n此外，`R Server` 是一个服务器级分析平台，而 `R Client` 是一个客户端工具。`MRO` 提供了从客户端访问 R\
  \ 的接口。因此，例如，在一个典型的数据分析环境中，会有一个 `R Server` 运行 `SQL Server R Services`、`Hadoop`、`Teradata\
  \ DB` 或 `Linux` 的实例，并有一个或多个 `R Client` 连接运行 `MRO` 来与 `R Server` 或 `SQL Server R\
  \ Services` 实例中的数据进行交互。客户端可以使用 `ScaleR` 函数消耗其本地工作站上的资源，或者在 `R Server` 上使用 `SQL Server\
  \ R Services` 或其他分析工具（`Hadoop`、`Teradata DB`）在 Windows 或 Linux 服务器上进行计算。\n\n对于本书中的示例，`R\
  \ Server` 实例是我们的 `SQL Server R Services` 数据库实例，而 `R Client` 是我们安装的带有 `MRO` 的 `RTVS`。\n\
  \n### 探索示例\n\n让我们回到 RTVS 文档和示例菜单项中的示例链接。该链接是 [`http://microsoft.github.io/RTVS-docs/samples.html`](http://microsoft.github.io/RTVS-docs/samples.html)。在该页面上，有一个\
  \ `.zip` 文件的下载，其中包含我们将用来熟悉新 R 环境的示例。将该 `.zip` 文件解压缩到你可以访问的位置，然后导航到 `RTVS-docs-master/examples`\
  \ 并双击 `README.MD`。这将在 RTVS 中打开此文档。图 2-28 显示了打开后的文档。\n\n![A421548_1_En_2_Fig28_HTML.jpg](img/A421548_1_En_2_Fig28_HTML.jpg)\n\
  \n图 2-28.\n\n自述文件\n\n在我们尝试进行任何开发活动之前，我们需要对 R 语言本身稍微熟悉一下，所以让我们逐步了解《R 初探》中给出的一些示例。在本书后面介绍的教程中，我们会更多地涉及\
  \ `R Server` 方面，因为我们将直接与 `SQL Server R Services` 交互以创建包含嵌入式信息的报告。\n\n关于 R 的信息在互联网上非常多，所以如果你已经了解它，那么你可以把这当作复习课程。如果不知道，也别担心。我不打算深入探讨\
  \ R 的完整历史，也不会让这成为涵盖 R 所有功能的综合指南。相反，我强调基础——然后我们可以继续深入。我认为这足以引起兴趣，并让我们专注于将 R 用于严肃数据分析的实用性。\n\
  \n### R 初探\n\n导航至 `RTVS-docs-master\\examples\\A first look at R` 目录，并双击该目录下的 `README.MD`\
  \ 文件。图 2-29 显示了此时你应该看到的内容。\n\n![A421548_1_En_2_Fig29_HTML.jpg](img/A421548_1_En_2_Fig29_HTML.jpg)\n\
  \n图 2-29. R 初探的 README 文件\n\n该文档告诉我们，我们可以通过运行微软在之前下载的 `.zip` 文件中提供的 R 脚本来\"体验 R\"\
  。导航回 `RTVS-docs-master\\examples\\A first look at R` 目录，并双击 `1-Getting_Started_with_R.R`。该脚本会在\
  \ RTVS 中打开，如图 2-30 所示。\n\n![A421548_1_En_2_Fig30_HTML.jpg](img/A421548_1_En_2_Fig30_HTML.jpg)\n\
  \n图 2-30. R 入门脚本\n\n此时，我们要做的就是逐步执行这个 R 脚本并运行其中的部分内容，以了解 R 的语法结构及其与其他语言的可能对比。我们几乎是一行一行地过一遍这个\
  \ R 入门脚本，以便能真正理解这个介绍想要传达的内容。\n\n值得通读前 75 行的注释，因为这为你作为新的 R 用户奠定了基础，或者如果你是资深 R 用户，也能刷新记忆。无论如何，这里总有一些东西适合你，所以请务必仔细阅读，特别是\"\
  R 资源\"和\"R 博客\"部分。\"帮助\"部分也总是很好的，所以也不要跳过它。\n\n第 76 行是第一个可执行的 R 脚本。那一行非常简单，就是 `installed.packages()`。这一行让我们可以看到已安装了哪些包；所以高亮选中第\
  \ 76 行并按 `Ctrl+Enter` 来执行它。请注意，你的 R 交互窗口（应该仍然打开着）开始加载大量信息，如图 2-31 所示。\n\n![A421548_1_En_2_Fig31_HTML.jpg](img/A421548_1_En_2_Fig31_HTML.jpg)\n\
  \n图 2-31. R 交互窗口\n\n你可以在 R 交互窗口中向上滚动以查看具体发生了什么，但目前这纯粹是信息性的。浏览这些生成的内容可能会有用，例如，可以确保你安装了最新版本的包，但就一般使用而言，知道它存在是好的。\n\
  \n注意，现在 R 历史记录窗口中也有了一个值。这非常方便，以防我们以后需要重新执行某行代码。你只需要高亮选中想要重新执行的代码，然后按 `Enter`。这会把代码从\
  \ R 历史记录窗口移动到 R 交互窗口。从这里，按 `Ctrl+Enter` 即可正常执行该行代码。\n\n高亮选中第 79 行，内容是 `search()`，并执行它。这将列出当前\
  \ R 会话中已加载的包。接下来，我们使用 `library()` 函数附加一个包，这是 R 将特定包的功能提供给当前会话的方式。\n\n跳到第 85 行，内容是\
  \ `library(foreign)`。这意味着我们在当前会话中包含 `foreign` 库的功能。高亮选中第 85 行并按 `Ctrl+Enter` 来执行它。一旦你看到\
  \ R 交互窗口底部的插入符（caret）变回大于号 (`>`)，你就知道代码已经执行完毕。图 2-32 显示了此时你应该看到的内容。\n\n![A421548_1_En_2_Fig32_HTML.jpg](img/A421548_1_En_2_Fig32_HTML.jpg)\n\
