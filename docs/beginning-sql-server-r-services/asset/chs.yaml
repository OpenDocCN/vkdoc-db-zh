  图 5-5. 准备工作！\n\n现在我们的数据已正确加载，并且我们有了一个干净的工作界面，我们可以继续下一节了。\n\n#### 准备数据集\n\n到底如何准备数据集？它不是已经准备好了吗？嗯，是也不是：是的，因为数据本身已经是结构良好且有意义的，所以现在我们可以看到它真正想表达什么；不，因为它尚未准备好供\
  \ R 分析，因为它还是原始数据。我们需要先对数据做一些辅助处理，为分析做好准备。\n\n要让数据准备好进行分析，请在你的`Script1.R`窗口中输入以下代码：\n\
  ```\ninstall.packages(\"data.table\")\nlibrary(data.table)\nWeather_Sample <- data.table(Weather_Sample)\n\
  setkey(Weather_Sample, AirportID)\n```\n图 5-6 显示了在输入我刚刚给出的代码后，你的 Visual Studio 窗口应有的样子。\n\
  ![A421548_1_En_5_Fig6_HTML.jpg](img/A421548_1_En_5_Fig6_HTML.jpg)\n图 5-6. 准备工作\n\
  \n现在，让我们来回顾一下这段代码实际在做什么。\n\n*   `install.packages(\"data.table\")`：这段代码只是安装`data.table`包。\n\
  *   `library(data.table)`：这段代码使`data.table`包在当前 R 会话中可用。\n*   `Weather_Sample <-\
  \ data.table(Weather_Sample)`：这段代码将一个名为`Weather_Sample`的空对象设置为`Weather_Sample`数据集的`data.table`表示形式。\n\
  *   `setkey(Weather_Sample, AirportID)`：这段代码允许按特定列进行分组。\n\n现在我们理解了这里发生的事情，我们看到实际上没有提供分析的代码。你的这个概括是正确的，因为我们还没有真正开始分析，我们只是开始为分析准备数据集。这是重要的第一步，因为它有点像是我们下一步工作的基础，即创建作为软件需求文档一部分需要生成的报告。\n\
  \n执行我在图 5-6 中提供的代码行，显示`chron`包也随`data.table`一起被下载了。需要指出的是，任何请求下载的包的依赖包也总是会被一并下载。这消除了因包依赖关系而导致错误的可能性。如果你还没有执行那些代码行，请现在执行。\n\
  \n\n\n#### 按机场 ID 的平均风速（表格版）\n\n我们即将处理的第一份报告是按机场 ID 的平均风速。该报告利用可用数据，计算每个机场的平均风速，然后在图表中显示这些数值。我们需要关注的列名为\
  \ `WindSpeed` 和 `AirportID`。我们知道，必须实例化一个对象来保存绘图数据，并且需要将数据作为 `data.frame` 返回给该对象，以便它能被正确地解读为图表。我们可以开始编写代码，如下所示：\n\
  \n```\navg_windspeed_by_ID <- as.data.frame(Weather_Sample)\n```\n\n**提示**\n\n在\
  \ `data.frame` 声明前使用 `as` 关键字，表示我们希望强制将引用的数据集作为数据框返回。\n\n这段代码尚未完全实现我们的需求，因为我们还没有计算\
  \ `WindSpeed` 列的 `mean()`（均值）。为此，我们需要更新代码如下：\n\n```\navg_windspeed_by_ID <- as.data.frame(Weather_Sample[,\
  \ mean(WindSpeed)])\n```\n\n这段代码看起来更接近我们需要的了，但它还不完整。如果数据中存在空行怎么办？这肯定会影响我们的输出，所以让我们通过更新代码来移除这些值：\n\
  \n```\navg_windspeed_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm\
  \ = TRUE)])\n```\n\n现在我们可以看到，`na.rm = TRUE` 会移除数据集中的“缺失”值。\n\n最后，我们在末尾添加一个排序列。请记住，这与我们之前调用的\
  \ `setkey()` 函数不同，因为 `setkey()` 函数是对数据进行分组。要按某一列对数据进行排序，请将代码更新为如下形式：\n\n```\navg_windspeed_by_ID\
  \ <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm = TRUE), by = AirportID])\n\
  ```\n\n现在，高亮显示我们刚写完的命令，然后按 `Ctrl+Enter`。之后，键入 `avg_windspeed_by_ID`，高亮显示你刚写的内容，再按\
  \ `Ctrl+Enter` 来执行它。此时，你应该在 R 交互窗口中看到以下输出：\n\n```\n> avg_windspeed_by_ID\nAirportID\
  \        V1\n1      10140  7.594268\n2      10299  6.708183\n3      10397  6.554401\n\
  4      10423  5-991983\n5      10529  5-377292\n6      10693  4.686593\n7      10713\
  \  6.993095\n8      10721  8.713368\n9      10800  4.193095\n10     10821  5-095719\n\
  ```\n\n注意，我向上滚动到了返回数据的顶部，以显示 66 行中的前 10 条结果。以下是生成此结果的完整脚本：\n\n```\ninstall.packages(\"\
  data.table\")\nlibrary(data.table)\nWeather_Sample <- data.table(Weather_Sample)\n\
  setkey(Weather_Sample, AirportID)\navg_windspeed_by_ID <- as.data.frame(Weather_Sample[,\
  \ mean(WindSpeed, na.rm = TRUE), by = AirportID])\navg_windspeed_by_ID\n```\n\n\
  将你的脚本保存为 `avgWindspeedByAirportID.tabular.R`。这是我们即将生成的报告的第一部分。\n\n#### 按机场 ID 的平均风速（图表版）\n\
  \n接下来，打开一个新的 R 脚本窗口。在那个新窗口中，你需要输入以下代码：\n\n```\nlibrary(data.table)\nWeather_Sample\
  \ <- data.table(Weather_Sample)\nchart_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed,\
  \ na.rm = TRUE), by = AirportID])\nlibrary(ggplot2)\nggplot(chart_by_ID, aes(x =\
  \ AirportID, y = V1)) + geom_point(stat = \"identity\") + geom_smooth(method = \"\
  lm\", formula = y ∼ splines::bs(x, 3)) + scale_x_continuous(name = \"Airport ID\"\
  ) + scale_y_continuous(name = \"Average Wind Speed\") +\ngeom_text(aes(label = AirportID),\
  \ size = 3, vjust = 1.0) +\ngeom_text(aes(label = round(V1, digits = 2)), size =\
  \ 3, vjust = 2.0)\n```\n\n在我们继续之前，先来看一下这段代码。\n\n- `Weather_Sample <- data.table(Weather_Sample)`：我们使用\
  \ `Weather_Sample` 作为对象变量名，然后用数据集 `Weather_Sample`（如引用所示）中包含的数据的 `data.table` 表示形式来填充该对象。换句话说，有一个对数据的引用，用于创建分析。\n\
  - `chart_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm = TRUE),\
  \ by = AirportID])`：首先，像之前一样，我们将变量名设为 `chart_by_ID`。然后，我们将这个变量设置为数据集中 `WindSpeed`\
  \ 列的均值（`na.rm=TRUE` 表示移除 N/A 值）按 `AirportID` 分组后的数据框等价物。这合理吗？理解这个语句的结构至关重要，这样你才能回头基于这些数据创建自定义报告。如果你还没明白，请继续看下去，直到理解为止。\n\
  - `library(ggplot2)`：这个命令使新安装的 `ggplot2` 包对该项目可用。\n- `ggplot(chart_by_ID, aes(x\
  \ = AirportID, y = V1)) + geom_point(stat = \"identity\") + geom_smooth(method =\
  \ \"lm\", formula = y ∼ splines::bs(x, 3)) + scale_x_continuous(name = \"Airport\
  \ ID\") + scale_y_continuous(name = \"Wind Speed\") + geom_text(aes(label = AirportID),\
  \ size = 3, vjust = 1.0) + geom_text(aes(label = round(V1, digits = 2)), size =\
  \ 3, vjust = 2.0)`：这是一个很长的命令。这是一个控制图表外观和渲染的巨大命令。这个语句的各个部分是：\n    - `ggplot(`：这是绘图函数。\n\
  \    - `chart_by_ID,`：将 Weather_Sample 的 data.frame 输入到这个变量中。\n    - `aes(x = AirportID,\
  \ y = V1)) +`：`aes` 是 ggplot2 的美学定义。它表示 x 轴（水平）显示 AirportID，y 轴（垂直）显示 V1，在这里指的是平均风速。\n\
  \    - `geom_point(stat = \"identity\") +`：`geom_point()` 函数让你定义如何定义图上的点。在这里，我们希望它们显示为恒等（identity）。\n\
  \    - `geom_smooth(method = \"lm\", formula = y ∼ splines::bs(x, 3)) +`：这让我们可以向图表添加一个条件均值（平滑线）。\n\
  \    - `scale_x_continuous(name = \"Airport ID\") +`：这让我们可以连续缩放 x 轴。\n    - `scale_y_continuous(name\
  \ = \"Wind Speed\") +`：这让我们可以连续缩放 y 轴。\n    - `geom_text(aes(label = AirportID),\
  \ size = 3 , vjust = 1.0) +`：这让我们可以标注并偏移 x 轴标签。\n    - `geom_text(aes(label = round(V1,\
  \ digits = 2)), size = 3 , vjust = 1.0)`：这让我们可以标注并偏移 y 轴标签。\n\n请注意，有些行的末尾有一个加号。这算作一个连续的字符；换句话说，该语句在下一行继续，而不是一个单独的语句。\n\
  \n一旦你全部输入完毕，按 `Ctrl+A` 全选，然后按 `Ctrl+Enter` 运行。然后你会看到如图 5-7 所示的内容。\n\n![A421548_1_En_5_Fig7_HTML.jpg](img/A421548_1_En_5_Fig7_HTML.jpg)\n\
  图 5-7. 绘制的信息\n\n因此，我们在 x 轴上放置了机场 ID，在 y 轴上放置了平均风速。将该脚本保存为 `avgWindspeedByAirportID.plot.R`。\n\
  \n到目前为止非常棒！这完成了第一份报告的基础部分，所以让我们继续处理第二份。\n\n### 报告 2：按机场 ID 的平均温度（°F）\n\n我们的下一个任务是报告按机场\
  \ ID 的平均温度。所涉及的代码与“按机场 ID 的平均风速”报告非常相似，所以你应该能轻松跟上。\n\n我们将分两步处理我们的任务。首先计算平均温度值。然后在图中绘制它们。这与我们创建第一份报告的方式完全相同。\n\
  \n\n\n#### 按机场 ID 计算平均温度（表格形式）\n\n请注意，数据仍然已加载并可供我们使用，因此我们可以跳过数据加载的步骤，直接开始计算平均温度。以下是实现此操作的代码：\n\
  \n```\ninstall.packages(\"data.table\")\nlibrary(data.table)\nWeather_Sample <-\
  \ data.table(Weather_Sample)\nsetkey(Weather_Sample, AirportID)\navg_temperature_by_ID\
  \ <- as.data.frame(Weather_Sample[, mean(DryBulbFarenheit, na.rm = TRUE), by = AirportID])\n\
  avg_temperature_by_ID\n```\n\n输入上述代码，按下 `Ctrl+A` 全选，然后按下 `Ctrl+Enter` 执行。此时，你的 R\
  \ 交互窗口应显示以下信息：\n\n```\nAirportID       V1\n1      10140 62.76688\n2      10299 45-91877\n\
  3      10397 68.61980\n4      10423 74.13576\n5      10529 58.44648\n6      10693\
  \ 65-93558\n7      10713 57.59134\n8      10721 60.77466\n9      10800 71.38043\n\
  10     10821 62.85850\n```\n\n以上是你应看到的前 10 行数据。\n如果向下滚动，你会看到全部 66 行数据都已返回。现在将此脚本保存为\
  \ `avgTemperatureByAirportID.tabular.R`。\n\n#### 按机场 ID 计算平均温度（绘图形式）\n\n我们已有所需的数据，现在将其绘制成图表吧。此绘图的代码基于之前的绘图代码，我们先来看一下那段代码：\n\
  \n```\nWeather_Sample <- data.table(Weather_Sample)\nchart_by_ID <- as.data.frame(Weather_Sample[,\
  \ mean(DryBulbFarenheit, na.rm = TRUE), by = AirportID])\ninstall.packages(\"ggplot2\"\
  )\nlibrary(ggplot2)\nggplot(chart_by_ID, aes(x = AirportID, y = V1)) + geom_point(stat\
  \ = \"identity\") + geom_smooth(method = \"lm\", formula = y ∼ splines::bs(x, 3))\
  \ + scale_x_continuous(name = \"Airport ID\") + scale_y_continuous(name = \"Average\
  \ Temperature\") +\ngeom_text(aes(label = AirportID), size = 3, vjust = 1.0) +\n\
  geom_text(aes(label = round(V1, digits = 2)), size = 3, vjust = 2.0)\n```\n\n这段代码看起来应该很眼熟。我只将\
  \ `chart_by_ID` 部分中的 `WindSpeed` 文本改为了 `DryBulbFarenheit`，并将 `scale_y_continuous`\
  \ 的名称从 `Average Wind Speed` 改为了 `Average Temperature`。\n将此代码输入到 RTVS 后，按下 `Ctrl+A`\
  \ 全选，然后按下 `Ctrl+Enter` 执行。图 5-8 展示了此时你应该看到的内容。\n\n![A421548_1_En_5_Fig8_HTML.jpg](img/A421548_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8. 绘制的数据\n\n太好了！这向我们展示了数据——甚至还附带了一条移动平均线，以增加可读性。\n将此脚本保存为 `avgTemperatureByAirportID.plot.R`。以下是你应该已保存的四个文件：\n\
  *   `avgTemperatureByAirportID.plot.R`\n*   `avgTemperatureByAirportID.tabular.R`\n\
  *   `avgWindspeedByAirportID.plot.R`\n*   `avgWindspeedByAirportID.tabular.R`\n\n\
  ### 本章小结\n\n让我们快速回顾一下本章内容。我们实际上做了很多工作。你应该对自己和日益增长的 R 知识感到相当满意。我们完成的工作如下：\n*   学习了\
  \ R 中绘图的基础知识\n*   将外部数据源 (`Weather_Sample.csv`) 加载到 Visual Studio 中\n*   根据软件需求文档，基于此数据编写了自定义的\
  \ R 脚本\n*   基于此数据生成了表格数据和图表\n\n下一章将介绍这些报表交付的 Reporting Services 方面。\n\n"
