  \ `Windows 身份验证模式`，将我自己添加为 `Windows 身份验证模式` 下的管理员。图 1-13 显示了已选择这些选项的状态。\n\n![A421548_1_En_1_Fig13_HTML.jpg](img/A421548_1_En_1_Fig13_HTML.jpg)\n\
