  \ `E:\\SQL Server\\Data`。这个位置在“Log directory”字段中被镜像，因此我将其改为 `E:\\SQL Server\\Logs`。这个选项卡的设置就到此为止。\n\
  \n### FILESTREAM\n\n直接保留“FILESTREAM”选项卡不变。本书中我们不会使用 FILESTREAM。\n\n当你填好所有其他“Database\
  \ Engine Configuration”选项卡后，单击“Next”。\n\n### Reporting Services 配置\n\n现在我们来配置 Reporting\
  \ Services。我们将在第 7 章及后续章节中进一步配置 Reporting Services。我们现在使用默认选中的“Install and configure”选项来安装它。图\
