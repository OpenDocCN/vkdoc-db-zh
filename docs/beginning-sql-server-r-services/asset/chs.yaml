- "# 第一部分\n## 安装与设置\n\n### 1. SQL Server 2016 的安装与设置\n\nSQL Server 2016 的一大更新是将 R\
  \ 语言添加为数据库引擎的组成部分。R 语言始于 1993 年，由奥克兰大学的 Robert Gentleman 和 Ross Ihaka 开发，是一种数据分析语言。它最初是作为一种能在统计分析方面与\
  \ S 语言抗衡的语言，并逐渐发展成为在统计计算、数据分析和机器学习领域全球最流行的语言之一。\n\n随着商业世界向商业智能和数据分析的重大转变，将 R 作为\
  \ SQL Server 的组成部分是微软一项明智的商业举措。微软不仅将这一新功能引入了一个已被广泛接受的平台，而且保持了该语言核心的完整性，使得现有的 R 统计人员可以轻松迁移到\
  \ SQL Server 平台，以增强他们的统计计算方法。最终，这提升了微软在商业智能领域的知名度，并有望使 SQL Server 在日常数据分析操作中获得更广泛的接受。\n\
  \n2016 年，微软收购了 Revolution Analytics，该公司围绕 R 语言构建，并提供了 R 的开源（Revolution R Open）和商业（Revolution\
  \ R Enterprise）开发平台。现在，微软的重点是将 R 重度集成到现有产品中，显而易见的首选是 SQL Server，最终将是 Azure。这是一个令人兴奋的版本，因为它为\
  \ Azure 托管服务提供了机会，可以基于在 Azure 站点或数据库中完成的 R 计算来提供内容。\n\n由于 R 已作为 SQL Server 2016\
  \ 安装的一部分被添加，我们只需在安装过程中选择该选项进行添加，然后完成一些小的配置任务即可。\n\n为了确保 R 能够运行，有些事项我们需要检查和安装，但我会在具体操作时展示所有步骤。现在，请先下载\
  \ SQL Server 2016，然后按照我的指导进行安装。需要注意的是，根据服务包或微软是否决定更改安装界面，您的安装屏幕可能与我的略有不同，但我认为内容的要点是相同的。\n\
  \n### 规划\n\n不过，首先要做的是规划。下载 SQL Server 2016 后，您需要规划基本设置，例如您将使用的账户以及默认文件位置的设置。如果您读过我上一本书，您会知道我对于\
  \ SQL Server 文件系统的组织有一套非常特定的方式。在本书中，我创建了一个单独的逻辑磁盘 (`E:\\`)，并采用以下文件夹结构：\n\n*   `E:\\\
  SQL Server`\n    *   `Backups`\n    *   `Data`\n    *   `Logs`\n\n因此，一个主文件夹 `SQL\
  \ Server`，然后在该文件夹内创建三个子文件夹，用于存放所需的不同部分。可能还会有其他文件夹，例如 `DTSX` 或 `Output`，您可以用于其他用途，但通常情况下，主文件夹内的这三个子文件夹就很好用。\n\
  \n**注意**\n\n在安装过程中，SQL Server 还会希望将文件放在其他位置；这没问题，因为这是 SQL Server 对系统文件进行分类以保持一切井然有序的方式。我们将在前面指定的文件夹中控制我们的数据、日志和备份文件。\n\
  \n至于您应该使用哪个账户来运行 SQL Server 2016 的功能，这应该是显而易见的。它需要像常规数据库安装一样运行，因此需要分配它通常应有的账户。明确地说，分配您当前正在运行的任何版本\
  \ SQL Server 所使用的相同账户。大多数情况下，这需要是一个管理员账户才能安装程序。\n\n这里有个快速的附注：如果您还没有阅读 SQL Server\
  \ 2016 的硬件和软件要求，您可能需要先查阅一下。另外，附录 A 涵盖了在现有 SQL Server 2014 服务器上安装 SQL Server 2016\
  \ 的内容。如果您正在运行 SQL Server 2014 并想在同一台服务器上尝试 SQL Server 2016，那么请参阅附录 A 获取指导。（但在任何情况下，您都不应使用生产服务器来跟随本书进行操作）。\n\
  \n### 开始安装\n\n我们开始吧！双击下载文件夹中的 `setup.exe` 文件。您应该会看到如图 1-1 所示的内容。\n\n![A421548_1_En_1_Fig1_HTML.jpg](img/A421548_1_En_1_Fig1_HTML.jpg)\n\
  \n**图 1-1.** SQL Server 2016 初始安装屏幕\n\n如果您看到要求对系统进行更改的屏幕，请直接点击 **是**。\n\n图 1-1 显示了您开始安装时应该看到的第一个屏幕。如果您曾经安装过\
  \ SQL Server，这个屏幕应该看起来很熟悉。点击左侧的 **安装** 链接。您应该会看到如图 1-2 所示的内容。\n\n![A421548_1_En_1_Fig2_HTML.jpg](img/A421548_1_En_1_Fig2_HTML.jpg)\n\
  \n**图 1-2.** SQL Server 2016 安装选项\n\n到达这里后，点击顶部的链接，标题为 **新建 SQL Server 独立安装或向现有安装添加功能**。\n\
  \n请注意，最底部的选项是新增的。它写着 **新建 R 服务器（独立）安装**。如果您只想将 R 服务器安装为服务器（即独立的、自包含的数据分析服务器）或客户端（从远程\
  \ SQL Server R 服务安装操作数据），您应选择此选项。请注意，您还需要 SQL Server 2016 服务正在运行，因此此选项用于向现有的 SQL\
  \ Server 2016 安装添加 R 服务。\n\n### 产品密钥\n\n下一步是输入您的 **产品密钥**。图 1-3 显示了从前一节图 1-2 继续后您看到的屏幕。在这里，您可以指定希望运行免费版本，或者您可以输入产品密钥以运行许可版本。\n\
  \n![A421548_1_En_1_Fig3_HTML.jpg](img/A421548_1_En_1_Fig3_HTML.jpg)\n\n**图 1-3.**\
  \ 产品密钥屏幕\n\nSQL Server 2016 可以安装为以下三种免费版本之一：\n\n*   **评估版**：具备全部功能；基本上是 SQL Server\
  \ 2016 的企业版，但有效期仅为 180 天。\n*   **开发版**：具备全部功能，但不能用于生产数据库工作。\n*   **速达版**：SQL Server\
  \ 2016 最小、最基本的安装；不会过期，可用于生产用途。\n\n如果您想选择评估版以外的选项，请直接选择。但请理解选择该选项的含义；例如，速达版不支持 R，因此我不会选择此选项。对于您这里的需求，评估版是完美的，因为您肯定能在\
  \ 180 天内决定是否希望将这项新功能永久包含在您的 SQL Server 安装中。\n\n当您选择了最合适的版本后，点击 **下一步** 继续。\n\n###\
  \ 许可条款\n\n下一个屏幕，如图 1-4 所示，只是要求您接受许可条款。\n\n![A421548_1_En_1_Fig4_HTML.jpg](img/A421548_1_En_1_Fig4_HTML.jpg)\n\
  \n**图 1-4.** 许可条款\n\n老实说，我从未完整阅读过这个许可条款。我不能说我认识有谁读完过。显然，只需勾选 **我接受许可条款** 复选框，然后点击\
  \ **下一步** 继续。\n\n\n### 安装规则\n\n此屏幕显示 SQL Server 在执行初步检查以确保全新安装过程中会发生的情况。如果出现任何错误或警告，您应该着手进行修正，以便尽可能顺利地进行安装。\n\
  \n我的屏幕闪烁了几次，最终停留在如图 1-5 所示的屏幕。\n\n![A421548_1_En_1_Fig5_HTML.jpg](img/A421548_1_En_1_Fig5_HTML.jpg)\n\
  图 1-5. 安装规则\n\n值得注意的是，在此步骤中可能会下载并安装 `SQL Server 2016` 的更新，因此，如果出现包含此信息的提示，请直接安装它。\n\
  \n因此，除了我的防火墙规则外，一切看起来都很好。由于我的笔记本电脑没有来自网络的连接，所以这应该没问题，因此我将单击 `下一步` 继续。\n\n### 功能选择\n\
  \n现在我们进入选择实际安装内容的部分。图 1-6 显示了我们一直期待的屏幕。\n\n![A421548_1_En_1_Fig6_HTML.jpg](img/A421548_1_En_1_Fig6_HTML.jpg)\n\
  图 1-6. 功能选择\n\n此时，我们需要选择测试数据库实例中 `R` 功能所需的最基本组件。在本书中，我们将熟悉 `R`，并使用 `R Tools for\
  \ Visual Studio` 创建图表，然后在 `SSMS` 中复制这些结果，最终通过 `Reporting Services` 在报表中呈现这些结果。因此，我们只安装\
  \ `R Services (In-Database)` 和 `Reporting Services – Native`。这为我们提供了深入了解 `R` 及其能为我们做什么所需的一切。这也意味着我们无需安装完整的\
  \ `SQL Server 2016`。图 1-7 显示了此时您应该选择的选项。\n\n![A421548_1_En_1_Fig7_HTML.jpg](img/A421548_1_En_1_Fig7_HTML.jpg)\n\
