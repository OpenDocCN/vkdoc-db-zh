  ## 6. 配置 SQL Server Reporting Services


  回想一下，在第 1 章中，我们在初始 SQL Server 安装过程中安装了 Reporting Services。安装 Reporting Services
  时，我们选择了“安装并配置”选项。现在，我们需要配置已安装的 Reporting Services 实例。请记住，在 SQL Server 安装时选择“安装并配置”选项时，Reporting
  Services 就已经安装、配置好（并且可以运行）了。本章的目的是让你熟悉 Reporting Services 配置管理器中可用的选项，以便如果你需要在自己的安装中更改某个设置，你将拥有如何做出所需更改以及从何处寻找解决方案的知识和信心。

  首先，我们将运行 Reporting Services 配置管理器并连接到新安装的实例，然后我们将了解一些可用的配置选项。


  ### 连接到实例


  转到 Windows“开始”菜单。Reporting Services 配置管理器应显示在“最近添加”框中。如果不在那里，请打开 Windows“开始”菜单，单击“所有应用”，然后向下滚动到
  Microsoft SQL Server 2016。它应该在该文件夹内。如果还是没有，只需开始键入 Reporting Services，它就会弹出。单击它继续。然后你将看到图
  6-1 所示的内容。


  ![A421548_1_En_6_Fig1_HTML.jpg](img/A421548_1_En_6_Fig1_HTML.jpg)


  图 6-1. Reporting Services 配置连接


  单击此处的“连接”按钮以连接到你的实例。然后你将看到图 6-2 所示的主页配置页面。


  ![A421548_1_En_6_Fig2_HTML.jpg](img/A421548_1_En_6_Fig2_HTML.jpg)


  图 6-2. 报表服务器状态


  这个主页配置页面（这是我个人的称呼）告诉你有关 Reporting Services 实例的一般信息。最重要的是，请注意服务已启动。否则我们将无法继续。

  在继续之前，让我们快速浏览一下这个界面。我将在以下小节中介绍各个区域，然后我们将返回去更新字段，以便我们的报表服务器能够成功启动和运行。


  ### 服务帐户


  “服务帐户”区域中的设置实际上可以保持默认值不变。如果你更改了图 6-3 所示的“使用内置帐户”选项，默认设置是“虚拟服务帐户”。这是在安装 Reporting
  Services 时创建的一个帐户，用于连接到报表服务器。你也可以选择“本地系统”、“本地服务”或“网络服务”。我建议不要这样做，因为这些帐户具有运行报表服务器所不需要的提升权限。


