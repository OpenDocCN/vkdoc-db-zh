  回到图 2-12 所示的安装屏幕，点击“Close”。Visual Studio 的 R 工具现在已成功安装。\n\n\n### 下载 Microsoft R\
  \ Open\n\n完成安装的最后一步是安装 Microsoft R Open。请返回到 Microsoft 提供并显示在图 2-1 中的网页，点击 **Download\
  \ Microsoft R Open** 链接。此时，会打开另一个网页；其 URL 是 [`https://mran.revolutionanalytics.com/download/`](https://mran.revolutionanalytics.com/download/)。图\
  \ 2-14 显示了此时您应该看到的 Microsoft R Open 下载页面。\n\n![A421548_1_En_2_Fig14_HTML.jpg](img/A421548_1_En_2_Fig14_HTML.jpg)\n\
  图 2-14. 打开的网页\n\n请注意，Microsoft R Open 的下载仅适用于 64 位平台。Microsoft R Open 可用于 64 位版本的\
  \ Windows (7 SP1, 8.1, 10, Server 2008 R2 SP1, 和 Server 2012)、Ubuntu (14.04 和 15.04)、Red\
  \ Hat Enterprise Linux (7.1 和 6.5) 以及 SUSE Linux Enterprise Server 11。\n\n请继续点击适合您操作系统的链接；下载应该会开始。在撰写本文时，Windows\
  \ 安装文件的名称是 `microsoft-r-open-3.3.1.msi`，大小为 131MB。可执行文件下载需要一点时间，所以在等待时可以去喝点什么。\n\
  \nMicrosoft R Open 下载完成了吗？很好。那么我们现在就安装它吧。双击您刚刚下载的可执行文件。图 2-15 显示了您此时应该看到的界面。\n\n\
