  #### 依赖项


  **“依赖项”** 部分没有可配置的区域，因此我们将保持此区域不变。



  #### 缓存


  “缓存”部分允许您选择是否要缓存您的报表。图 9-20 显示了“缓存”部分的初始界面。


  ![A421548_1_En_9_Fig20_HTML.jpg](img/A421548_1_En_9_Fig20_HTML.jpg)


  图 9-20. 缓存界面


  我个人会选择 `始终使用最新数据运行此报表` 选项，以防报表未按顺序运行或在正常计划运行时间之外运行（对于订阅而言）。在某些情况下，`缓存此报表的副本并在可用时使用它们`
  选项可能是更好的选择；例如，如果这严格来说是一个基于订阅的服务器，并且没有允许用户随意运行报表的应急方案，那么生成一次报表，然后服务器在收到请求时提供缓存的报表副本是合理的。最后一个选项
  `始终针对预生成的快照运行此报表`，意味着报表是从一个特定时间点生成的，该时间点称为快照，这将在下一节中讨论。


  #### 历史快照


  此部分允许您生成报表的快照。这使得前面讨论的选项在此上下文中可用。点击图 9-21 中所示的 `新建历史快照` 按钮，会基于当前日期和时间的数据创建报表的快照。


  ![A421548_1_En_9_Fig21_HTML.jpg](img/A421548_1_En_9_Fig21_HTML.jpg)


  图 9-21. 历史快照


  回顾“缓存”部分，如果您在生成快照后选择 `始终针对预生成的快照运行此报表` 选项，那么随后生成的任何报表都将基于此快照运行。


  注意：如果您在此处创建了快照，请继续删除它，除非您计划将来使用它。


  #### 安全性


  “安全性”部分允许您自定义用户和角色。`组或用户` 信息来自 Windows 子系统。`角色` 基于 SQL Server Reporting Services。


  ![A421548_1_En_9_Fig22_HTML.jpg](img/A421548_1_En_9_Fig22_HTML.jpg)


  图 9-22. 安全性选项


  请注意，我们同样不需要在此处更改任何内容。


  ### 保存报表


  除了订阅之外，还有另一种方法可以在 Reporting Services 中保存已生成的报表。为此，只需在主屏幕上点击报表的名称来运行报表，如图 9-23 所示。


  ![A421548_1_En_9_Fig23_HTML.jpg](img/A421548_1_En_9_Fig23_HTML.jpg)


  图 9-23. 主屏幕


  这将打开我们之前见过的报表。图 9-24 显示了“保存”对话框，通过点击报表工具栏中的磁盘图标调出。


  ![A421548_1_En_9_Fig24_HTML.jpg](img/A421548_1_En_9_Fig24_HTML.jpg)


  图 9-24. 保存选项


  因此，再次说明，我们拥有与之前配置电子邮件设置时相同的呈现选项。此时，您可以将报表保存为任何您希望的格式。


  至此，我们就完成了。


  ### 总结


  恭喜！我们已完成了这段数据科学入门之旅。请理解，就 R 所能实现的功能而言，这仅仅是冰山一角。这本书远非您在 R 环境中工作所需了解的全部知识；恰恰相反，本书旨在将您引入
  R 与 SQL Server 融合的当下世界，如果您尚未开始，希望您能继续您的探索之旅。我鼓励您继续前进，并通过更广泛的社区参与，让未来版本的 SQL Server
  R Services 变得更好。


  下次再见，非常感谢您花时间阅读本书。希望您阅读本书的乐趣与我撰写本书的乐趣一样多！


