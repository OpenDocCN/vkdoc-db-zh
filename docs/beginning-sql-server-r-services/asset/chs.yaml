  \n最终，安装完成，我们停留在如图 1-30 所示的屏幕上。\n\n![A421548_1_En_1_Fig30_HTML.jpg](img/A421548_1_En_1_Fig30_HTML.jpg)\n\
  \n图 1-30. 需要重启\n\n接下来，打开 SQL Server Management Studio 并连接到您新安装的实例。按下您的 Windows 键并输入\
  \ `ssms` 以显示 `Microsoft SQL Server Management Studio` 桌面应用。继续点击该应用以启动应用程序。\n\n提示\n\
  \n如果您没有以本地 `Administrator` 帐户登录，您可能需要右键单击“开始”菜单中出现的桌面应用图标，然后选择 `以管理员身份运行`。\n\n图\
  \ 1-31 显示了此更新版本中 SSMS 的初始界面外观。\n\n![A421548_1_En_1_Fig31_HTML.jpg](img/A421548_1_En_1_Fig31_HTML.jpg)\n\
  \n图 1-31. SQL Server Management Studio\n\n这需要加载界面，然后，最终，我们会看到 SSMS 登录屏幕。图 1-32 显示了此版本与先前版本\
  \ SSMS 的显著不同之处。\n\n![A421548_1_En_1_Fig32_HTML.jpg](img/A421548_1_En_1_Fig32_HTML.jpg)\n\
  \n图 1-32. 连接到服务器\n\n回想一下，我将新的 SQL Server 2016 实例命名为 `SQL2016RS`，所以这就是我将要连接的实例。`Server\
  \ name` 字段的格式是 `SERVER\\INSTANCE`，这就是我格式化我的连接的方式。您也可以从那里下拉菜单并导航到您可能已安装的另一个实例。只要您能到达那里，您觉得更舒适的方式都可以。点击\
  \ `Connect` 登录到您的实例。\n\n您现在应该看到的对象资源管理器初始屏幕类似于图 1-33。\n\n![A421548_1_En_1_Fig33_HTML.jpg](img/A421548_1_En_1_Fig33_HTML.jpg)\n\
  \n图 1-33. SQL Server Management Studio\n\n请注意命名实例和显示的 SQL Server 版本。您可能需要展开界面才能看到版本号，但除非\
  \ Microsoft 从界面中移除它，否则它就会在那里。我的版本是 `13.0.1601-5`，这是撰写本文时的最新稳定版本。一如既往，您可能拥有不同版本的\
  \ SQL Server 2016。这没关系，因为 Microsoft 尚未弃用任何可能影响本书结果的主要功能。这也意味着我们已成功连接到我们的新实例，并准备开始。\n\
  \n在我们深入其他内容之前，让我们在 SSMS 中打开行号显示。这是我的一个痛点。转到 `Tools` → `Options`，展开 `Text Editor`，然后点击\
  \ `All Languages`。图 1-34 显示了此设置的位置。\n\n![A421548_1_En_1_Fig34_HTML.jpg](img/A421548_1_En_1_Fig34_HTML.jpg)\n\
  \n图 1-34. 行号\n\n只需勾选该框并点击 `OK`——您就设置好了。\n\nMicrosoft 发布了一个后配置过程，我们将首先运行它。这个步骤未来可能会被移除并添加到安装中，但目前，请按照以下步骤完成安装。\n\
  \n在 SQL Server Management Studio 中打开一个 `New Query` 窗口，并键入以下命令：\n\n```\nexec sp_configure\
  \ 'external scripts enabled', 1\nReconfigure with override\n```\n\n这是在 SSMS 中执行此代码的结果：\n\
  \n```\nConfiguration option 'external scripts enabled' changed from 0 to 1\\. Run\
  \ the RECONFIGURE statement to install.\n```\n\n注意\n\n作为查询的一部分，我们已经运行了 `RECONFIGURE`\
  \ 语句。\n\n请注意，我们是在对 `master` 数据库执行，并且查询已成功执行。这意味着 R 脚本现在在 SQL Server 中已启用。这个脚本至关重要，因为没有它，我们就无法在数据库引擎内执行\
  \ R 代码。原因是 `sp_execute_external_script` 存储过程默认是禁用的；必须手动启用它。\n\n接下来，我们需要验证 R 是否确实在运行。为此，Microsoft\
  \ 说需要重启 SQL Server 实例并运行以下脚本。首先重启实例，然后打开一个 `New Query` 窗口并键入以下内容：\n\n```\nexec sp_execute_external_script\n\
  @language =N'R',\n@script=N'OutputDataSet<-InputDataSet',\n@input_data_1 =N'select\
  \ 1 as hello'\nwith result sets (([hello] int not null));\ngo\n```\n\n按 `F5` 执行脚本。预期的结果如图\
  \ 1-35 所示。\n\n![A421548_1_En_1_Fig35_HTML.jpg](img/A421548_1_En_1_Fig35_HTML.jpg)\n\
  \n图 1-35. R 已安装并正确通信\n\n太好了！这个简单脚本的成功执行表明 R 运行良好，并与 SQL Server 实例正常通信。从图 1-35 中的结果我们可以看到，我们定义了一个非常简单的查询\
  \ `select 1 as hello`，我们将其作为名为 `[hello]` 的列返回，数据类型为 `int`，且 `not null`。\n\n\n对于那些尚未记全每一个系统存储过程的人来说，你可能不会认出\
  \ `sp_execute_external_script` 是一个为执行外部脚本而引入的**全新**存储过程。可以通过以下参数调用此存储过程：\n\n*  \
  \ `@language`\n    *   所支持的语言名称。目前仅支持 R。\n*   `@script`\n    *   要执行的脚本（你可以将整个脚本输入到存储过程中，或将其作为变量引用）。\n\
  *   `@input_data_1`\n    *   这里填写用于从数据库收集数据的 SQL 查询。\n*   `@input_data_1_name`\n\
  \    *   作为 `@input_data_1` 查询结果集的数据框。此属性可选。\n*   `@output_data_1_name`\n    * \
  \  在 `@script` 中持有输出数据的数据框变量。此属性可选。\n\n信不信由你，微软说我们接下来只需要再做几件事，所以让我们先把它们搞定。\n\n对于\
  \ Windows 用户，按下 Windows 键 + R，输入 `lusrmgr.msc`，然后按回车。你应该会看到你的“本地用户和组”，如图 1-36 所示。\n\
  \n![A421548_1_En_1_Fig36_HTML.jpg](img/A421548_1_En_1_Fig36_HTML.jpg)\n\n图 1-36.\
  \ 本地用户和组（用户）\n\n看到了吗？安装过程中创建了二十个新的用户账户，每个账户都是专门为与 R Services 交互而创建的。这 20 个账户被添加到一个名为\
  \ `SQLRUserGroup<instance_name>` 的新组中，其中 `<instance_name>` 是你的实例名称。所以以我为例，我的组名为\
  \ `SQLRUserGroupSQL2016RS`。如果你遵循了这个命名约定，你的也会是同样的名称。\n\n点击屏幕左侧的“组”选项。你应该会看到图 1-37\
  \ 所示的内容。\n\n![A421548_1_En_1_Fig37_HTML.jpg](img/A421548_1_En_1_Fig37_HTML.jpg)\n\
  \n图 1-37. 本地用户和组（组）\n\n双击 `SQLRUserGroupSQL2016RS` 链接。你应该会看到图 1-38 所示的内容。\n\n![A421548_1_En_1_Fig38_HTML.jpg](img/A421548_1_En_1_Fig38_HTML.jpg)\n\
  \n图 1-38. SQLRUserGroupSQL2016RS 详情\n\n按照这种方式配置，我们就可以在这台服务器上正常工作了。我们不需要定义其他任何内容或添加其他用户账户，因为我们已经验证了\
  \ R 在数据库中运行正确。微软有一些相当好的文章，介绍如何配置数据库实例以接受来自外部开发者的 R 脚本，这本质上涉及将 `SQLRUserGroupSQL2016RS`\
  \ 组作为新登录名添加到 SQL Server 中。这样，当用户连接到数据库实例运行 R 脚本时，会使用那 20 个新用户账户中的一个，通过 Launchpad\
  \ 服务代表该用户执行脚本。微软将此称为**隐式身份验证**，因为该组中的用户随后将能够远程访问 SQL Server R Services。\n\n### 小结\n\
  \n让我们简要回顾一下本章涵盖的内容。\n\n*   安装了完整的 SQL Server 2016 实例\n*   安装了 SQL Server Management\
  \ Tools\n*   安装后配置了 R\n*   通过运行前面指定的脚本，验证了 R 已正确安装\n\n这是相当重要的第一章。我们涵盖了很多内容，所以如果有任何不清楚的地方，现在正是回头再试一次的好时机。\n\
  \n接下来，我们将安装 Visual Studio 的 R 工具，我们将用它来编写 R 代码。第一部分显然是必要的，以便在服务器级别安装 R 功能和数据库实例。现在，我们将重点转向使用开发工具设置客户端。\n\
  \n## 2. Visual Studio R 工具的设置与安装\n\n既然我们已经正确安装了 SQL Server 2016，我们需要某种 IDE 来开发我们的代码。微软通过在\
  \ Visual Studio 中引入一个全新的 R GUI，使 Visual Studio 2016 变得更好。它被简单地命名为 Visual Studio\
  \ 的 R 工具。\n\n如果你愿意，你也可以使用其他的 R GUI。你完全不受限制或被迫使用 Visual Studio 的 R 工具。如果你目前有喜欢的 IDE，那么请务必继续使用那个。\n\
  \n### SQL Server Data Tools\n\n在我们开始之前，快速说明一点。本书**不会**使用 SQL Server Data Tools。相反，我们将使用\
  \ Visual Studio 的 R 工工具。这一点从章节标题应该很明显。原因很简单，但我花了一点时间才弄明白。让我们看看两者的区别。\n\n*   SQL\
  \ Server Data Tools\n    *   为 Analysis Services、Reporting Services 或 Integration\
  \ Services 开发解决方案。允许连接数据库开发；即“实时”编辑数据库。\n*   Visual Studio 的 R 工具\n    *   专为当前的微软用户设计，希望他们在学习\
  \ R 的同时停留在熟悉的界面中。它不与 SQL Server 中的 R 实例交互，因此需要单独安装一个名为 Microsoft R Open 的组件才能执行任何\
  \ R 代码。\n\n本书使用 Visual Studio 的 R 工具 (RTVS) 而不是 SQL Server Data Tools (SSDT) 的主要原因是，RTVS\
  \ 可用于开发 R 代码，而 SSDT 不能。SSDT 可以连接到数据库实例并对数据库运行查询，但它不是 R 的 IDE。或者，RTVS 是 R 的 IDE，但在本书的范围内，我们不直接连接到数据库实例。\n\
  \n这应该能帮助你快速理解。对我来说，主要区别在于 SSDT 运行一个内部进程，而 RTVS 运行一个外部进程。你可能会发现两者之间的其他差异，如果发现了，很好。不过，正如我所说，我们在本书中使用\
  \ RTVS。\n\n\n\n## Visual Studio\n\n除了安装 Visual Studio 本身，你还需要下载 Visual Studio 的\
  \ R 扩展。这样，RTVS 才能有一个 R 版本来执行代码。为了方便地完成此操作并将所有说明集中在一个地方，微软提供了一个解释 **Visual Studio\
  \ 的 R 工具**（RTVS）的网站。网址是 [`https://beta.visualstudio.com/vs/rtvs/`](https://beta.visualstudio.com/vs/rtvs/)\
  \ 。该网站的一部分如图 2-1 所示。\n\n![A421548_1_En_2_Fig1_HTML.jpg](img/A421548_1_En_2_Fig1_HTML.jpg)\n\
  图 2-1. Visual Studio 的 R 工具 网站\n\n正如我提到的，第一步是获取 Visual Studio。点击图 2-1 中显示的“Free\
  \ Visual Studio”链接。它是右上角的白色方框。随后会打开另一个页面，如图 2-2 所示，页面左侧有一个 Visual Studio Community\
  \ 的下载链接。\n\n![A421548_1_En_2_Fig2_HTML.jpg](img/A421548_1_En_2_Fig2_HTML.jpg)\n\
