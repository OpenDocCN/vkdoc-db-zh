- "# 软件需求文档\n\n### 项目\n\nSQL Server R Services 入门\n\n### 作者\n\nBradley Beard，首席开发工程师，We\
  \ R Pros, LLC\n\n### 接受方\n\nR. Customer，首席信息官，PleaseGiveUs-R-AnalysisData.com\n\n\
  ### 问题\n\nPleaseGiveUs-R-AnalysisData.com（“客户”）向 We R Pros, LLC（“供应商”）提出了一个独特的请求。\n\
  \n客户拥有有限数量的天气相关数据，但客户没有分析这些数据的方法。客户希望供应商能够建议哪些产品和服务可以从这些数据集的分析中提炼出来。\n\n本质上，客户并不确切知道自己想要什么，但知道自己想要点什么，并且依赖供应商的专业知识和经验为客户提供一个或一套解决方案。这些数据相当宝贵，其中无疑隐藏着不少“璞玉”。\n\
  \n### 解决方案\n\n在初步检查客户的数据后，收集到以下信息：\n\n*   数据文件是 1 个 Microsoft Excel 文件。\n*   文件大小约为\
  \ 5.5MB。\n*   文件长度正好是 113,333 行（减去一行标题行）。\n*   文件包含以下标题行：\n    *   `Year`\n    *\
  \   `AdjustedMonth`\n    *   `AdjustedDay`\n    *   `AirportID`\n    *   `AdjustedHour`\n\
  \    *   `Timezone`\n    *   `Visibility`\n    *   `DryBulbFarenheit`\n    *   `DryBulbCelsius`\n\
  \    *   `DewPointFarenheit`\n    *   `DewPointCelsius`\n    *   `RelativeHumidity`\n\
  \    *   `WindSpeed`\n    *   `Altimeter`\n\n根据这些列，确定将创建以下报告：\n\n*   每个 `AirportID`\
  \ 的平均风速\n*   每个 `AirportID` 的平均温度（°F）\n\n需要注意的是，可以生成更多报告，但客户特别要求创建这些报告。\n\n### 语言/平台\n\
  \n本解决方案将使用 SQL Server 2016 收集和存储数据，使用 R 分析数据，并使用 SQL Server Reporting Services 提供基于数据的报告。\n\
  \n### 交付媒介\n\n报告的交付媒介将按客户要求确定；报告可以图像格式、Excel 格式或 PDF 格式交付。具体格式可以在日后确定，因为通过 SQL Server\
  \ Reporting Services 的交付方式允许以多种格式导出报告。\n\n\n"
- '# R 绘图与表格代码（适用于 Visual Studio 的 R 工具）


  首先，关于本附录的几点说明：


  *   本附录提供了第 5 章中示例的完整代码，但你仍然需要从 `Weather_Sample.csv` 文件将数据导入 RTVS，才能实际运行。

  *   你可能不需要运行 `install.packages()` 引用，但它们已列出以备不时之需。如果已经安装过相应的包，则无需再次安装。


  ### 按机场 ID 的平均温度（绘图）


  此代码以图形格式给出按机场 ID 的平均温度。请注意，`mean()` 函数包含了 `DryBulbFarenheit` 属性，表明关键字段是温度而非风速。另外，`ggplot2`
  的引用表明这是绘图代码，而非表格代码。


  ```r

  install.packages("data.table")

  library(data.table)

  Weather_Sample <- data.table(Weather_Sample)

  chart_by_ID <- as.data.frame(Weather_Sample[, mean(DryBulbFarenheit, na.rm = TRUE),
  by = AirportID])

  install.packages("ggplot2")

  library(ggplot2)

  ggplot(chart_by_ID, aes(x = AirportID, y = V1)) + geom_point(stat = "identity")
  + geom_smooth(method = "lm", formula = y ∼ splines::bs(x, 3)) + scale_x_continuous(name
  = "Airport ID") + scale_y_continuous(name = "Average Temperature") +

  geom_text(aes(label = AirportID), size = 3, vjust = 1.0) +

  geom_text(aes(label = round(V1, digits = 2)), size = 3, vjust = 2.0)

  ```


  ### 按机场 ID 的平均温度（表格）


  此代码以表格格式给出按机场 ID 的平均温度。请注意，`mean()` 函数包含了 `DryBulbFarenheit` 属性，表明关键字段是温度而非风速。另外，没有
  `ggplot2` 的引用表明这是表格代码，而非绘图代码。


  ```r

  install.packages("data.table")

  library(data.table)

  Weather_Sample <- data.table(Weather_Sample)

  setkey(Weather_Sample, AirportID)

  avg_temperature_by_ID <- as.data.frame(Weather_Sample[, mean(DryBulbFarenheit, na.rm
  = TRUE), by = AirportID])

  avg_temperature_by_ID

  ```


  ### 按机场 ID 的平均风速（绘图）


  此代码以图形格式给出按机场 ID 的平均风速。请注意，`mean()` 函数包含了 `WindSpeed` 属性，表明关键字段是风速而非温度。另外，`ggplot2`
  的引用表明这是绘图代码，而非表格代码。


  ```r

  install.packages("data.table")

  library(data.table)

  Weather_Sample <- data.table(Weather_Sample)

  chart_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm = TRUE), by
  = AirportID])

  install.packages("ggplot2")

  library(ggplot2)

  ggplot(chart_by_ID, aes(x = AirportID, y = V1)) + geom_point(stat = "identity")
  + geom_smooth(method = "lm", formula = y ∼ splines::bs(x, 3)) + scale_x_continuous(name
  = "Airport ID") + scale_y_continuous(name = "Average Wind Speed") +

  geom_text(aes(label = AirportID), size = 3, vjust = 1.0) +

  geom_text(aes(label = round(V1, digits = 2)), size = 3, vjust = 2.0)

  ```


  ### 按机场 ID 的平均风速（表格）


  此代码以表格格式给出按机场 ID 的平均风速。请注意，`mean()` 函数包含了 `WindSpeed` 属性，表明关键字段是风速而非温度。另外，没有 `ggplot2`
  的引用表明这是表格代码，而非绘图代码。


  ```r

  install.packages("data.table")

  library(data.table)

  Weather_Sample <- data.table(Weather_Sample)

  setkey(Weather_Sample, AirportID)

  # OBJECT NAME          DATA FRAME    DATASET NAME          DATA COLUMN REMOVE N/A    GROUP
  BY COLUMN

