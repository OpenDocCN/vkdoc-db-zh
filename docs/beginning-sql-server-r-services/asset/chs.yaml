  图 1-8. 实例配置\n\n### 实例配置\n\n由于这是一个新的安装，并且之前没有安装过 `SQL Server` 版本，因此 `默认实例` 选项可用。我们当然可以毫无问题地使用此选项，但我通常更喜欢为我的实例命名。这由您决定，但请理解，在本书的剩余部分，我将使用\
  \ `命名实例` 而不是 `默认实例`。\n\n此时，我们需要定义我们的新实例。如果您查看 `已安装的实例` 部分，会发现那里什么都没有。我们选择 `命名实例`\
  \ 选项，并将其称为 `SQL2016RS`，代表 `SQL Server 2016 R Services`。`实例 ID` 字段也应更新为 `SQL2016RS`。完成此操作后，您将看到如图\
  \ 1-9 所示的内容。\n\n![A421548_1_En_1_Fig9_HTML.jpg](img/A421548_1_En_1_Fig9_HTML.jpg)\n\
  图 1-9. 更新后的实例配置屏幕\n\n请注意此屏幕上列出的 `命名实例` 字段、`实例 ID` 字段、`SQL Server` 目录位置和 `Reporting\
  \ Services` 目录位置。这些字段都需要引用 `SQL2016RS`。一旦您确认一切都符合预期，请单击 `下一步` 继续。\n\n当您准备好时，单击 `下一步`\
  \ 继续。\n\n#### 服务器配置\n\n下一个屏幕是我们定义服务的服务器帐户和启动类型的地方。此屏幕如图 1-10 所示。\n\n![A421548_1_En_1_Fig10_HTML.jpg](img/A421548_1_En_1_Fig10_HTML.jpg)\n\
  图 1-10. 服务器配置\n\n这里真正需要注意的唯一服务是 `SQL Server Launchpad` 服务。此服务负责在数据库引擎内执行 `R`，因此如果\
  \ `R` 的行为不如预期，请首先检查此服务。\n\n`SQL Browser` 服务在本地服务的上下文中运行，因此没有创建新的服务帐户。换句话说，我们不需要担心那个服务。\n\
  \n这些服务帐户是默认的，但如果您有自己的服务帐户，随时可以更改为您的服务帐户。如果您没有自己的服务帐户，可以保留这些建议的服务帐户。我知道许多服务器管理员坚持对服务采用最小权限原则，如果您的特定环境是这种情况，那么您需要从服务器管理员处获取服务名称和登录信息才能继续。另一种方法是复制这些服务名称，并将它们包含在您提供给系统管理员的关于安装期间创建的帐户的摘要中，以便系统管理员可以根据需要审核该用户的权限。这里需要重要注意的是，我指的是与“系统管理员”分开的个人或实体，该管理员不是数据库管理员，而是\
  \ `Windows` 级别的管理员。换句话说，是负责操作系统级别、比应用层高一级的人。\n\n我们在这里只想稍作更改；具体来说，将 `SQL Server Agent`\
  \ 服务的 `启动类型` 设置为 `自动`。这是我们需要做的唯一更改。图 1-11 显示了此时您应该看到的内容。\n\n![A421548_1_En_1_Fig11_HTML.jpg](img/A421548_1_En_1_Fig11_HTML.jpg)\n\
  图 1-11. 更新后的服务器配置\n\n请注意，我们无法设置这些帐户中任何一个的密码。这与我见过的每个 `SQL Server` 安装都是一样的。如果您将 `帐户名`\
  \ 框从默认值更改为自定义服务帐户名，那么 `密码` 框将变为活动状态并接受输入。否则，密码由 `SQL Server` 和 `Windows` 控制。\n\n\
  还请注意，在默认服务列表下方有一个新的 `向 SQL Server 数据库引擎服务授予执行卷维护任务权限` 复选框。对于我们在本书中所做的事情，无需选中此复选框。在将来的安装中，或者对于生产环境，启用此选项可能是个好主意。\n\
  \n此时，我们所有的服务都已正确配置。请注意，我们不会打扰 `排序规则` 选项卡。默认情况下，该选项卡中应指定 `SQL_Latin1_General_CP1_CI_AS`。就是这样。请继续并单击\
  \ `下一步` 继续。\n\n### 数据库引擎配置\n\n下一个屏幕是 `数据库引擎配置`，如图 1-12 所示。在这里，您可以在四个不同的选项卡中设置引擎的选项，如下文各小节所述。\n\
  \n![A421548_1_En_1_Fig12_HTML.jpg](img/A421548_1_En_1_Fig12_HTML.jpg)\n图 1-12. 数据库引擎配置\n\
