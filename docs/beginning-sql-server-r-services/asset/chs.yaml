  \ Reporting Services（因为你当初没有随数据库引擎一起安装），你将只有“Install only”选项可用。原因是，在添加数据库引擎实例后，必须使用\
  \ Reporting Services Configuration Manager 来配置 Reporting Services。\n\n确保在顶部选择了“Install\
  \ and configure”选项，然后在 Reporting Services 配置屏幕上单击“Next”以继续。\n\n### 同意安装 Microsoft\
  \ R Open\n\n如前所述，将 R 集成到 SQL Server 中是一个重大变化。在 SQL Server 2016 的预发布版本中，必须单独安装组件才能使\
  \ R 正确运行。Microsoft 在各个版本中逐步更新了安装过程，直到最终版本，其中包含了 R 组件的完整下载和安装。请注意，SQL Server 2016\
  \ 中使用的 R 版本被称为 `Microsoft R Open`，它是“Microsoft 在 GNU General Public License v2 下提供的增强版\
  \ R 发行版。” R 语言本身的版权仍属于 R Foundation for Statistical Computing。Microsoft 在图 1-19\
  \ 中非常谨慎地明确说明了这一点。我认为这很重要，因为 Microsoft 为 SQL Server 提供了一个全新的软件包；因此，我们必须同意安装 `Microsoft\
  \ R Open`，并因此接受 Microsoft 发布的任何补丁或更新。\n\n![A421548_1_En_1_Fig19_HTML.jpg](img/A421548_1_En_1_Fig19_HTML.jpg)\n\
  \n图 1-19.\n同意安装 Microsoft R Open\n\n单击“Accept”按钮。“Next”按钮将变为可用。继续并单击“Next”以继续。\n\
  \n### 准备安装\n\n图 1-20 显示了你现在应该看到的“Ready to Install”屏幕。仔细阅读，如果你打算完成本书中的练习，请确保你的设置与之匹配。\n\
  \n![A421548_1_En_1_Fig20_HTML.jpg](img/A421548_1_En_1_Fig20_HTML.jpg)\n\n图 1-20.\n\
  准备安装\n\n当你准备好后，单击“Install”。在加载和安装所需内容时，你的屏幕会闪烁几次。\n\n### 安装进度\n\n图 1-21 显示了安装运行时你应该看到的内容。进度条显示了总体进度，因此你可以判断进度和剩余时间。耐心等待。看看进度条。或者去喝杯咖啡。\n\
  \n![A421548_1_En_1_Fig21_HTML.jpg](img/A421548_1_En_1_Fig21_HTML.jpg)\n\n图 1-21.\n\
  安装进度\n\n### 安装完成\n\n安装需要一点时间，但最终会完成并显示图 1-22 所示的屏幕。我的安装大约花了 10 分钟完成。向下滚动查看是否所有组件都已正确安装，然后单击“Close”。\n\
  \n![A421548_1_En_1_Fig22_HTML.jpg](img/A421548_1_En_1_Fig22_HTML.jpg)\n\n图 1-22.\n\
  安装完成\n\n让我们花点时间规划一下本章接下来还要做什么。我们已经进展了不少，但在停下来休息之前，我们还有一点工作要做。\n\n*   我们目前完成的工作\n\
  \    *   安装了测试新的 R 功能所需的 SQL Server 2016 组件\n*   我们接下来将要做的工作\n    *   验证所有 SQL Server\
  \ 2016 服务是否已正确启动\n    *   安装 SQL Server Management Tools\n\n第二个要点可能会让你有点困惑。为什么我们需要安装\
  \ SQL Server Management Tools？因为，出于某种奇怪的原因（我确信 Microsoft 能给出理由），SQL Server Management\
  \ Studio 并不作为 SQL Server 安装的一部分提供。我在以前的任何安装中从未见过这种情况，因此我可以假设这是 SQL Server 的新常态。\n\
  \n### 服务验证\n\n让我们去确认一下需要启动的服务是否都已正确启动。按 Windows 键然后输入 `services` 来启动“服务”窗口。你应该会看到“服务”桌面应用作为选项出现，如图\
  \ 1-23 所示。继续并单击“服务”应用以继续。或者，你也可以按 Windows 键，输入 `services.msc`，然后按 Enter。这样可以直接打开“服务”窗口，无需搜索。\n\
  \n![A421548_1_En_1_Fig23_HTML.jpg](img/A421548_1_En_1_Fig23_HTML.jpg)\n\n图 1-23.\n\
  服务位置\n\n应用程序正常启动，因此向下滚动到 SQL 服务。默认情况下它们应按“名称”排序，所以要跳转到某个字母，只需输入它。这比滚动要快得多。图 1-24\
  \ 向你显示了相关的 SQL Server 服务及其当前状态。\n\n![A421548_1_En_1_Fig24_HTML.jpg](img/A421548_1_En_1_Fig24_HTML.jpg)\n\
  \n图 1-24.\n服务\n\n在我看来一切正常。你觉得呢？所有服务都按预期运行，并且都设置为“自动”启动类型。\n\n恭喜！你已成功安装了 SQL Server\
  \ 2016，并通过确认所有服务都按预期启动，验证了一切正常。\n\n\n\n### SQL Server 管理工具\n\n接下来，我们需要安装 SQL Server\
  \ 管理工具。此安装任务是 SQL Server 安装中心的一部分，它应该仍在您的桌面上打开。图 1-25 显示了当前 SQL Server 安装中心屏幕的状态。\n\
  \n![A421548_1_En_1_Fig25_HTML.jpg](img/A421548_1_En_1_Fig25_HTML.jpg)\n\n图 1-25.\
  \ SQL Server 安装中心\n\n请注意，由于已安装 SQL Server 2016，`SQL Server Management Tools` 的链接已经高亮显示。这正是我们现在想要点击的地方。图\
  \ 1-26 显示了此操作的结果。\n\n![A421548_1_En_1_Fig26_HTML.jpg](img/A421548_1_En_1_Fig26_HTML.jpg)\n\
  \n图 1-26. 下载 SQL Server Management Studio\n\n当我们点击 SQL Server 安装中心上的 `Install SQL\
  \ Server Management Tools` 链接时，Microsoft.com 上会打开一个网页，我们可以从中下载 SSMS。现在，请点击那个名为 `Download\
  \ SQL Server Management Studio` 的蓝色链接。在撰写本文时，下载大小为 806MB。\n\n在下载的同时，让我们规划一下接下来要做的事情。本质上，我们需要通过验证\
  \ R 是否正确安装并与数据库引擎正常通信来“完成” SQL Server 的安装。\n\n您几乎忘了这是一本关于 R 的书，对吗？我知道，这一章长得离谱，但我们确实需要让所有组件都运行起来，才能展示\
  \ R 在当前环境下能做什么。\n\n最终，下载完成。在您的浏览器中，您应该会看到一个类似于图 1-27 所示的按钮。\n\n![A421548_1_En_1_Fig27_HTML.jpg](img/A421548_1_En_1_Fig27_HTML.jpg)\n\
  \n图 1-27. 下载完成\n\n点击此按钮开始安装，或者转到您的“下载”文件夹并双击名为 `SSMS-Setup-ENU.exe` 的文件以开始安装 SQL\
  \ Server Management Studio。图 1-28 显示了初始安装屏幕。\n\n![A421548_1_En_1_Fig28_HTML.jpg](img/A421548_1_En_1_Fig28_HTML.jpg)\n\
  \n图 1-28. SSMS 安装提示\n\n考虑到在您撰写本文和您下载 SQL Server 管理工具之间，Microsoft 可能会发布更新的版本，您最终的\
  \ `Release` 号可能与我的不同。\n\n嗯，这确实是一个新的安装界面。我以为这会更接近 Visual Studio，但并非如此。指示就在那里；点击 `Install`\
  \ 开始。图 1-29 显示了点击 `Install` 后的界面。\n\n![A421548_1_En_1_Fig29_HTML.jpg](img/A421548_1_En_1_Fig29_HTML.jpg)\n\
  \n图 1-29. 初始安装界面\n\n它会在这里加载包大约一分钟，所以就让它做自己的事情并安装所需的内容。第一个安装的主要包是 `.NET Framework\
