- '# 在 SQL Server 2014 安装中安装 SQL Server 2016 实例


  这些说明与第 1 章中的说明非常相似，但我们不是在一台服务器上单独安装 SQL Server 2016 实例，而是在现有的 SQL Server 2014 安装之上安装一个
  SQL Server 2016 实例。


  我们也不会像第 1 章那样安装所有组件。相反，我们只安装 `R Services`、SQL Server 2016 数据库引擎和 SQL Server 2016
  Reporting Services。我们需要 Reporting Services 以便后续为我们提供 R 内容。


  如果您选择在 SQL Server 2014 之上安装 SQL Server 2016，请理解这会带来一些影响，例如依赖旧版本的 Analysis Services
  或 Integration Services。如果您可以接受这一点，那么这就是创建此附录的原因。


  ### 开始


  让我们开始安装。双击下载文件夹中的 `setup.exe` 文件。您应该会看到图 A-1。


  ![A421548_1_En_10_Fig1_HTML.jpg](img/A421548_1_En_10_Fig1_HTML.jpg)


  图 A-1. SQL Server 2016 初始安装屏幕


  如果看到要求对系统进行更改的屏幕，请点击“是”。


  图 A-1 显示了您启动安装后应该看到的第一个屏幕。这个屏幕对您来说应该相当熟悉。点击左侧的 `安装` 链接，查看图 A-2 所示的内容。


  ![A421548_1_En_10_Fig2_HTML.jpg](img/A421548_1_En_10_Fig2_HTML.jpg)


  图 A-2. SQL Server 2016 安装选项


  到达此处后，点击顶部的 `新建 SQL Server 独立安装或向现有安装添加功能` 链接。


  请注意，最底部的选项是新的。它写着 `新建 R 服务器（独立）安装`。如果您只想将 R Server 安装为服务器（独立的、自包含的数据分析服务器）或客户端（操作来自远程
  SQL Server R Services 安装的数据），则应选择此选项。请注意，您还需要 SQL Server 2016 服务正在运行，因此这相当于向现有的
  SQL Server 2016 安装添加 R 服务。换句话说，它不能添加到以前版本的 SQL Server。


  ### 产品密钥


  现在是输入产品密钥或选择安装产品的免费版本的时候了。换句话说，如果您碰巧拥有许可的 SQL Server 副本，您会获得一个 25 个字符的许可密钥，因此您可以在此处输入。否则，您始终可以选择免费版本。本书的目的是用于评估，因此请从下拉菜单中选择
  `Evaluation`。图 A-3 显示了在独立安装过程中从图 A-2 继续后您看到的屏幕。


  ![A421548_1_En_10_Fig3_HTML.jpg](img/A421548_1_En_10_Fig3_HTML.jpg)


  图 A-3. 产品密钥屏幕


  SQL Server 2016 可以安装在以下三种免费版本之一：


  - `Evaluation`：全套功能，基本上是 SQL Server 2016 的企业版，但有效期仅为 180 天。

  - `Developer`：全套功能，但不能用于生产数据库工作。

  - `Express`：最小的、最基本的 SQL Server 2016 安装，不会过期，可用于生产用途。


  如果您想选择 `Evaluation` 以外的选项，请直接选择。只需理解选择该选项的影响。对于我们所需的功能，`Evaluation` 版本是完美的，因为我们肯定会在
  180 天内决定是否要将此新功能永久包含在我们的 SQL Server 安装中。


  选择您最习惯的版本后，点击 `下一步` 继续。



  ### 许可条款


  下一个屏幕，如图 A-4 所示，将要求你接受许可条款。


  ![A421548_1_En_10_Fig4_HTML.jpg](img/A421548_1_En_10_Fig4_HTML.jpg)


  图 A-4.


  许可条款


  说实话，我从未完整阅读过这份许可条款，我敢说我认识的人里也没有谁读过。显然，只需勾选“我接受许可条款”复选框，然后单击“下一步”继续。


  ### 安装规则


  我的屏幕闪烁了几次，最终停留在如图 A-5 所示的屏幕上。


  ![A421548_1_En_10_Fig5_HTML.jpg](img/A421548_1_En_10_Fig5_HTML.jpg)


  图 A-5.


  安装规则


  值得注意的是，此步骤可能会下载并安装 SQL Server 2016 的更新；因此，如果出现相关提示信息，请直接安装它。


  除了我的 .NET 应用程序安全设置和防火墙规则外，其他一切看起来都很好。这应该没问题，所以我将单击“下一步”继续。


  ### 功能选择


  现在进入正题。图 A-6 显示了我们一直在等待的屏幕。


  ![A421548_1_En_10_Fig6_HTML.jpg](img/A421548_1_En_10_Fig6_HTML.jpg)


  图 A-6.


  功能选择


  此时，我们可以直接按“全选”就完事了。但如果你仔细查看选项，就会明白它们的含义。我们肯定要选择 `R Services (In-Database)`；否则，你就可以停止阅读本文了。选择该项后，我们会看到
  `Database Engine Services` 也被自动选中。我们还需要选择 `Reporting Services – Native`，我们将在第 7
  章中使用它。然而，除了这三项，我们不想选择其他任何内容。图 A-7 显示了此时你应该看到的选定项。


  ![A421548_1_En_10_Fig7_HTML.jpg](img/A421548_1_En_10_Fig7_HTML.jpg)


  图 A-7.


  选定选项后的功能选择


  请注意底部显示的默认实例根目录和共享功能目录都指向我的 E 盘。那是我存放 SQL Server 相关内容以便于检索的位置。


  在此处单击“下一步”继续。


  ### 实例配置


  系统会思考一小会儿，但最终，你会看到如图 A-8 所示的“实例配置”屏幕。


  ![A421548_1_En_10_Fig8_HTML.jpg](img/A421548_1_En_10_Fig8_HTML.jpg)


