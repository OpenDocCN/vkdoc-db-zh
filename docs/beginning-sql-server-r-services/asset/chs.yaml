  Reporting Services 配置


  这里是我们配置 Reporting Services 的地方。我们将在第 7 章及之后进一步配置它，所以我们现在就使用默认选中的 `安装并配置` 选项来安装它。


  顺便提一下；如果以后你想添加 Reporting Services，因为你安装数据库引擎时没有安装它，你将只有 `仅安装` 选项可用。这是因为必须使用 `Reporting
  Services 配置管理器` 才能将 Reporting Services 添加到现有的数据库引擎实例中。理想情况下，你应该遵循 **最小安装原则**，这个概念指出，安装新软件时，只应安装需要的部分，忽略不需要的部分。特别是在这种情况下，这非常合理，也正是我们现在不安装整个
  SQL Server 2016 的原因。在其他某些情况下，安装功能齐全的豪华版软件是完全合理的，但请记住，并非总是如此。


  在 Reporting Services 配置屏幕，确保选中了 `安装并配置` 选项，然后点击 `下一步` 继续。


  ### 同意安装 Microsoft R Open


