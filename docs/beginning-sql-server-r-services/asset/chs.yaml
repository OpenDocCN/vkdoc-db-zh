- '# 4. 使用 RTVS 构建 R 模型


  我们在第 3 章结束时，在 RTVS 中加载了一个解决方案，然后测试了我们是否能在 R 环境中成功工作。在本章中，我们实际在 R 中构建模型，然后在一系列图表中显示该模型中包含的信息。图表逐渐变得更高级，直到我们达到数据可视化的最终高潮。


  我们还介绍了生成模型的大部分代码语法。我们通过逐行深入研究 Microsoft 在 `.zip` 文件中提供的文件来实现这一点。这样，我们可以看到发生的事情，并希望不仅理解发生了什么，而且理解为什么发生。


  ### 探索示例


  让我们回到 R Tools for Visual Studio (RTVS) 中 R Tools 菜单下的 RTVS 文档和示例链接。该链接是 [`http://microsoft.github.io/RTVS-docs/samples.html`](http://microsoft.github.io/RTVS-docs/samples.html)。在该页面上，有一个包含示例的
  `.zip` 文件下载，我们将用它来熟悉新的 R 环境。将该 `.zip` 文件解压缩到你可以访问的位置，导航到 `RTVS-docs-master/examples`，然后双击
  README.MD。这将在 RTVS 中打开自述文档。图 4-1 显示了打开后的此文档。


  ![A421548_1_En_4_Fig1_HTML.jpg](img/A421548_1_En_4_Fig1_HTML.jpg)


  图 4-1 自述文件


  在尝试进行任何开发活动之前，我们需要对 R 作为一门语言有点熟悉，因此让我们逐步了解《R 初探》中给出的一些示例。在本书后面介绍的教程中，我们将更多地处理 R
  Server 方面，因为我们直接与 SQL Server R Services 接口以创建包含嵌入信息的报告。


  互联网上关于 R 的信息非常多，所以如果你已经了解它，那么可以将其视为复习课程。如果不了解，也不用担心。我不会深入探讨 R 的完整历史，也不会使这成为 R 所有功能的综合指南。相反，我将重点介绍基础——然后我们可以在此基础上继续。我认为这足以激发我们所谓的兴趣，并让我们的思维敏锐于将
  R 用于严肃数据分析的实用性。


  导航到 `RTVS-docs-master\examples\A first look at R` 并双击该目录中的 README.MD 文件。图 4-2 显示了此时你应该看到的内容。


  ![A421548_1_En_4_Fig2_HTML.jpg](img/A421548_1_En_4_Fig2_HTML.jpg)


  图 4-2 《R 初探》自述文件


  该文档告诉我们，通过运行 Microsoft 在我们之前下载的 `.zip` 文件中提供的 R 脚本，我们可以“试驾 R”。导航回 `RTVS-docs-master\examples\A
  first look at R` 目录并双击 1-Getting_Started_with_R.R。然后脚本将在 RTVS 中打开，如图 4-3 所示。


  ![A421548_1_En_4_Fig3_HTML.jpg](img/A421548_1_En_4_Fig3_HTML.jpg)


  图 4-3 “R 入门”脚本


  此时，我们要做的就是逐步查看 R 脚本并执行部分内容，以了解 R 在语法上是如何布局的，以及它与其他语言的比较。我们将几乎逐行浏览“R 入门”脚本，以便我们真正理解这个介绍的内容。


  值得阅读前 75 行的注释，因为这为你作为新的 R 用户奠定了基础，或者如果你是旧版 R 用户，可以刷新你的记忆。无论哪种方式，这里都有适合每个人的内容，所以请确保你彻底阅读，特别是
  R 资源和 R 博客部分。帮助部分总是很好，所以也不要跳过它。


  第 76 行是第一个可执行的 R 脚本。那一行非常简单：`installed.packages()`。这一行让我们看到已安装了哪些包；因此高亮显示第 76 行并按
  Ctrl+Enter 执行它。请注意，你的 R 交互窗口（应该仍然打开）开始加载大量信息，如图 4-4 所示。


  ![A421548_1_En_4_Fig4_HTML.jpg](img/A421548_1_En_4_Fig4_HTML.jpg)


  图 4-4 R 交互窗口


  你可以在 R 交互窗口中向上滚动以准确查看发生了什么，但就目前而言，它纯粹是信息性的。例如，浏览这些生成的内容以确保你拥有已安装包的最新版本可能很有用，但对于一般用途来说，知道它在那里是好的。


  注意



  ### 在 Visual Studio 的 R 工具中执行代码与管理包


  R History 窗口中现在也有一个值了。这非常方便，以防我们将来需要重新执行某行代码。你只需高亮选中想要重新执行的代码，然后按 Enter。这会将代码从 R
  History 窗口移动到 R Interactive 窗口。接着，按 `Ctrl+Enter` 就可以像往常一样执行该行代码。


  高亮选中第 79 行，该行内容是 `search()`，并执行它。这会列出当前 R 会话中已加载的包。接下来，我们使用 `library()` 函数附加一个包，这是
  R 为会话提供特定包功能的方式。


  跳到第 85 行，该行内容是 `library(foreign)`。这意味着我们将在当前会话中包含 `foreign` 库的功能。高亮选中第 85 行并按 `Ctrl+Enter`
  执行它。一旦你看到 R Interactive 窗口底部的插入符号重新变回大于号（`>`），你就知道代码已经执行完毕。图 4-5 展示了此时你应该看到的内容。


  ![A421548_1_En_4_Fig5_HTML.jpg](img/A421548_1_En_4_Fig5_HTML.jpg)


  **图 4-5. 第 85 行执行**


  这不在我们正在使用的 R 脚本中，但如果你现在返回并再次执行第 79 行，你应该会看到如图 4-6 所示的内容。


  ![A421548_1_En_4_Fig6_HTML.jpg](img/A421548_1_En_4_Fig6_HTML.jpg)


  **图 4-6. 第 79 行执行，显示 foreign 库**


  注意 R Interactive 是如何显示这些列出项目的吗？它是以每组四个的方式完成的，起始 n 索引号显示为最左边的列，后面跟着四个包。下一行以 n+4 索引开始，然后列出另外四个包，依此类推。现在看看，第一次执行
  `search()` 显示了 12 个包，但现在我们可以在新返回的 `search()` 命令中看到返回了 13 个包。我们可以看到 `foreign` 包的添加是造成这个差异的原因，所以这证明了该包已成功添加到我们当前的
  R 会话中。


  当包被添加到 R 镜像时，它们总是包含一个帮助部分。你可以通过高亮选中第 88 行并按 `Ctrl+Enter` 来参考这个帮助部分。这会在 RTVS 的顶部框架中以另一个页面打开帮助文档。图
  4-7 展示了这个结果。


  ![A421548_1_En_4_Fig7_HTML.jpg](img/A421548_1_En_4_Fig7_HTML.jpg)


  **图 4-7. foreign 库的帮助文档**


  你可以关闭该文档。接下来，跳到第 90 行。我们将要安装 `ggplot2`，它可能是 R 可用的最流行、最强大的图表包。高亮选中第 92 到 94 行并按 `Ctrl+Enter`
  执行。图 4-8 展示了这个结果。


  ![A421548_1_En_4_Fig8_HTML.jpg](img/A421548_1_En_4_Fig8_HTML.jpg)


  **图 4-8. 加载 ggplot2 包**


