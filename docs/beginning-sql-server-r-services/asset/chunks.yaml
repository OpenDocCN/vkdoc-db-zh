    ![A421548_1_En_2_Fig15_HTML.jpg](img/A421548_1_En_2_Fig15_HTML.jpg)

    图 2-15. 开始 Microsoft R Open 安装


    点击 **Next**。您应该会被带到图 2-16 所示的屏幕。此屏幕提供了一些关于即将进行的安装的详细信息。阅读给出的信息，勾选 **I Acknowledge**
    复选框，然后在准备好时点击 **Next**。


    ![A421548_1_En_2_Fig16_HTML.jpg](img/A421548_1_En_2_Fig16_HTML.jpg)

    图 2-16. 信息


    下一个屏幕，如图 2-17 所示，显示了 **Install Math Kernel Library (Intel© `MKL`)** 安装选项。


    ![A421548_1_En_2_Fig17_HTML.jpg](img/A421548_1_En_2_Fig17_HTML.jpg)

    图 2-17. Install Math Kernel Library (Intel© `MKL`) 选项


    是否安装完全由您决定，因为它不是必需的安装部分，但建议您安装。默认选中的原因是，添加数学内核库允许您的 R 代码使用所有可用资源来生成结果，这意味着完成速度会快得多（取决于您机器的速度和可用资源）。我也建议保留选中此选项。准备好继续时点击
    **Next**。


    接下来，我们必须接受正在安装的 `MKL` 的许可条款。这如图 2-18 所示。


    ![A421548_1_En_2_Fig18_HTML.jpg](img/A421548_1_En_2_Fig18_HTML.jpg)

    图 2-18. 接受 `MKL` 许可条款


    此时，请确保点击 **I accept** 复选框，然后点击 **Next** 继续。


    接下来，图 2-19 中的屏幕显示了目标位置信息。点击 **Next** 接受目标文件夹。


    ![A421548_1_En_2_Fig19_HTML.jpg](img/A421548_1_En_2_Fig19_HTML.jpg)

    图 2-19. 选择目标位置


    在这里点击 **Next**。接下来的屏幕，如图 2-20 所示，让我们开始安装；准备好时点击 **Install**。


    ![A421548_1_En_2_Fig20_HTML.jpg](img/A421548_1_En_2_Fig20_HTML.jpg)

    图 2-20. 准备安装


    图 2-21 显示了安装正在进行。谢天谢地，这不需要很长时间。


    ![A421548_1_En_2_Fig21_HTML.jpg](img/A421548_1_En_2_Fig21_HTML.jpg)

    图 2-21. 安装中


    最后，我们完成了 Microsoft R Open 的安装。图 2-22 显示了此时安装过程中您应该看到的最终屏幕。


    ![A421548_1_En_2_Fig22_HTML.jpg](img/A421548_1_En_2_Fig22_HTML.jpg)

    图 2-22. 安装完成


    点击图 2-22 中所示的 **Finish** 按钮，以完成安装。此时不需要重新启动。您已具备在 Visual Studio 中启动和运行 R 所需的一切。


    ## Visual Studio 环境


    现在我们已经按照 Microsoft 的说明安装了所有内容，让我们看看我们新的开发环境，看看有什么新的、改变的或不同的。对于那些以前使用过 Visual Studio
    的人（可能你们中的大多数人），你们会看到熟悉的 Visual Studio 环境。对于那些以前没有使用过 Visual Studio 的人，我邀请你们花一点时间在各个菜单部分中浏览一下，看看您对用户界面的熟悉程度。再次说明，如果您有一个熟悉的
    IDE 更愿意用来编写 R 代码，请务必使用那个。我将引导您快速了解一下 Visual Studio 2015 中与新的 R 功能特别相关的菜单。


    请继续启动 Visual Studio。您可能会看到提示您连接到开发者服务的屏幕。如果看到这个，请继续按 **Maybe Later**。这些都是预期的。您最终会看到图
    2-23 所示的主 IDE 屏幕。查看菜单栏中位于菜单工具栏中心稍右侧的 **R Tools** 菜单。


    ![A421548_1_En_2_Fig23_HTML.jpg](img/A421548_1_En_2_Fig23_HTML.jpg)

    图 2-23. `R` 已作为 Visual Studio 的一部分安装


    **R Tools** 菜单是现在 Visual Studio 中所有 R 功能的所在。打开此菜单会显示图 2-24 中的选项。


    ![A421548_1_En_2_Fig24_HTML.jpg](img/A421548_1_En_2_Fig24_HTML.jpg)

    图 2-24. `R` Tools 菜单选项


    让我们看看这些菜单选项。以下小节简要描述了每个菜单选项为您做了什么以及该菜单选项允许您控制什么。


    ### 会话


    **Session** 选项允许您进行 `R` 会话。以下是可用选项：


    *   Interrupt R

    *   Attach Debugger

    *   Reset

    *   Load Workspace…

    *   Save Workspace As…


    ### 绘图


    **Plots** 选项允许您定义希望如何显示结果。以下是您的可用选项：


    *   Previous Plot

    *   Next Plot

    *   Save as Image

    *   Save as PDF

    *   Copy as Bitmap

    *   Copy as Metafile

    *   Remove Plot

    *   Clear All Plots


    显然，您可以看到这是一个巨大的帮助。能够将这些图导出为提到的各种类型，已经比其他一些仅生成 Flash 或 Silverlight 的系统具有了相当大的优势。


    ### 数据


    **Data** 选项允许您定义希望如何使用已存在的数据。以下是您的可用选项：


    *   Import Dataset into R Session from Web URL…

    *   Import Dataset into R Session from Text File…

    *   Delete All Variables


    我想知道未来我们是否会获得连接到不同数据库和/或安装的选项……如果 Microsoft 决定走那条路，这将是一个有趣的发展。我认为，提供更多的数据源供使用只会增强产品的可用性。


    ### 工作目录


    **Working Directory** 选项允许您更改工作目录。您的工作目录与 `R` 的安装位置不同。工作目录意味着这是您保存正在处理的文件的地方。


    *   Set Working Directory to Source File Location

    *   Set Working Directory to Project Location

    *   Select Working Directory…'
- fmt: '## Windows


    The Windows menu lets you open new windows to monitor what is going on with your
    R scripts. The following are the available options:

    *   `Source Editor`

    *   `R Interactive`

    *   `Help`

    *   `History`

    *   `Files`

    *   `Plots`

    *   `Packages`

    *   `Variable Explorer`


    These options replace the regular views that you may have for class view or stack
    traces, apparently. Since R is a totally different beast, it stands to reason
    that there are different ways of viewing the data and the development tasks.


    ## Install Microsoft R Client…


    You select the `Install Microsoft R Client` option when you want to install the
    R client as a download from Microsoft. We don’t want to do this, so just leave
    this alone. I explain the different components to Microsoft’s R products shortly.


    ## Change R to Microsoft R Client


    You select `Change R to Microsoft R Client` when you have a local installation
    of R that you want to convert to an instance of Microsoft R Client. The implication
    is that Microsoft R Open is installed, since that is a prerequisite to running
    R Client. In the instance, we also don’t want to change to an R client. This implies
    that we are connecting to a remote database instance, which we are not. We are
    connecting locally.


    ## Microsoft R Products…


    The `Microsoft R Products` menu option is essentially a shortcut to a URL. Selecting
    the option takes your web browser to [https://www.microsoft.com/en-us/cloud-platform/r-server](https://www.microsoft.com/en-us/cloud-platform/r-server)
    , where you can view Microsoft’s product options for R Server.


    ## RTVS Documentation and Samples


    The `RTVS Documentation and Samples` option takes you to documentation and samples
    relating specifically to R Tools for Visual Studio. Two sub options are available:

    *   `Documentation`: This option takes you to a web site ( [http://microsoft.github.io/RTVS-docs](http://microsoft.github.io/RTVS-docs)
    ) that goes through the documentation for the tool.

    *   `Samples`: This option takes you to a web site ( [http://microsoft.github.io/RTVS-docs/samples.html](http://microsoft.github.io/RTVS-docs/samples.html)
    ) that lets you see a rather large sample of R scripts available. We will come
    back to this section in a little while.


    ## R Documentation


    The `R Documentation` menu item provides easy access to documentation on the R
    language itself. There are four options available here:

    *   `Intro to R`: Clicking this option takes you to [https://cran.r-project.org/doc/manuals/r-release/R-intro.html](https://cran.r-project.org/doc/manuals/r-release/R-intro.html)
    . I thought this was an interesting addition. Microsoft linked the entire R documentation
    set right into Visual Studio. All you have to do is click the link—and you’re
    there.

    *   `Task Views`: This link goes to [https://cran.r-project.org/web/views/](https://cran.r-project.org/web/views/)
    , which shows a list of task views that can be downloaded and installed. A task
    view, in this context, is a group of libraries that work together for a common
    purpose. There are a lot of them here, so go explore them when you get a chance.

    *   `Data Import/Export`: This link goes to [https://cran.r-project.org/doc/manuals/r-release/R-data.html](https://cran.r-project.org/doc/manuals/r-release/R-data.html)
    , which is another documentation set. Light reading, no big deal.

    *   `Writing R Extensions`: Finally, this link goes to [https://cran.r-project.org/doc/manuals/r-release/R-exts.html](https://cran.r-project.org/doc/manuals/r-release/R-exts.html)
    , which is yet another extensive documentation set.


    There is a lot of information available on R from these menu options. Take advantage
    of what’s available anytime you have questions about the language. I highly recommend
    reading through the documentation, at least briefly, so you can get familiar with
    how R works syntactically. That makes the later part of this chapter much easier
    to work with.


    ## Feedback


    Select the `Feedback` menu option to rate the product. The following are the available
    options:

    *   `Report issue on GitHub`

    *   `Send Smile via E-mail`

    *   `Send Frown via E-mail`


    Any feedback that you choose to send gets routed eventually to Microsoft.


    ## Check for Updates


    Select `Check for Updates` to check for and download updates to R Tools for Visual
    Studio.


    ## Survey/News


    Choose the `Survey/News` option to be taken to [http://rtvs.azurewebsites.net/news/](http://rtvs.azurewebsites.net/news/)
    , where Microsoft posts news about R. There is also the `Survey` option, which
    at this time is “experimental.”


    ## Editor Options


    Choose `Editor Options` to get into customizing the interface options. This is
    the same action as `Tools ä Options` in the regular menu, except this menu confines
    the options by default to the R context menu. There are various options, including
    how `IntelliSense` operates, formatting, and the general sort, such as line numbers
    and word-wrap features.


    ## Options


    This option lets you customize the environment options. This is different than
    the `Editor Options` menu because the `Editor Options` menu only dealt with the
    options available from the Editor context. The `Options` menu lets you deal with
    the actual environment options for R, such as debugging, `CRAN mirror` location,
    general help settings, and the R installation location.'
