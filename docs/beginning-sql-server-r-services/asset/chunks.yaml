  raw: 'First off, note that this is on two different lines, but it is actually one
    long command. The presence of the plus sign indicates a line continuation character,
    outside of usage inside a function or argument.


    Let’s take a look at the syntax of this command before we move on.


    *   ggplot: Defines the function to be executed.

    *   diamondSample: References the `diamondSample` object as the active dataset.

    *   aes: Defines the aesthetic qualities of the chart; in this example, the x
    axis is the `carat` set and the y axis is the `price` set.

    *   geom_point: Customizes the points once they are charted .


