  trans: '

    ## 报告 1：按机场 ID 计算平均风速


    在第一部分中，我们将计算每个机场的平均风速。这可以通过为每个`AirportID`累加所有风速值，然后除以记录数来简单实现。R 通过一个名为`data.table`的核心功能为我们提供了快速实现方法。什么是`data.table`？这是一个免费提供的
    R 包，拥有许多非常酷的方式来对大量数值数据进行切片和分块处理。如果你想轻松计算`mean`（平均值）、`sum`（总和）或几乎任何 R 内置函数，都需要`data.table`包。


    打开适用于 Visual Studio 的 R 工具（RTVS）。你应该会看到如图 5-1 所示的界面。请注意，我们正在使用一个全新的 RTVS 实例，而不是使用之前章节的旧界面。

    ![A421548_1_En_5_Fig1_HTML.jpg](img/A421548_1_En_5_Fig1_HTML.jpg)

    图 5-1. Visual Studio 的 R 工具


    我们之所以在全新环境中工作，是因为我们正在导入数据集并处理这些数据。我不希望有任何机会使用错误的数据并可能导致不正确的结果。


    ### 导入数据集


    作为数据科学家，我们要做的第一件事就是收集数据。当你有一个文件位置或 URL 可以获取数据时，这听起来很容易。当你没有现成的数据，必须自己定义时，要确定数据就困难得多了。幸运的是，这次的情况并非如此，因为我们有一套完整的数据可以导入。


    首先，请确保你已经解压了从第 4 章下载的文件`RTVS-docs-master`。在这个`.zip`文件中，导航到`RTVS-docs-master\examples\MRS_and_Machine_Learning\Datasets`目录。在这个目录中有一个名为`Weather_Sample.csv`的文件。这个文件是本例的数据源，所以你可以把它留在原地，或者复制到你电脑上另一个更容易记住的位置。


    现在，RTVS 已启动并运行，我们依次点击 R Tools ➤ Data ➤ Import Dataset into R Session from Text
    File... 来将数据导入我们的环境。点击“Import Dataset into R Session from Text File”菜单选项后，会出现一个界面，提示你导航到要导入的文件。我们将使用`Weather_Sample.csv`，所以请导航到你保存该文件的位置，然后单击“打开”按钮。


    你应该会看到如图 5-2 所示的内容。

    ![A421548_1_En_5_Fig2_HTML.jpg](img/A421548_1_En_5_Fig2_HTML.jpg)

    图 5-2. 初始数据视图


    相当令人印象深刻！我们可以看到导入了前 19 行数据，这可能是为了让我们对数据类型和长度有一个良好的样本量。


    请注意，你可以点击右上角“Input File”和“Data Frame”之间，查看原始数据与格式化数据的对比。


    查看完毕后，点击“确定”。然后你会看到如图 5-3 所示的内容。

    ![A421548_1_En_5_Fig3_HTML.jpg](img/A421548_1_En_5_Fig3_HTML.jpg)

    图 5-3. 变量资源管理器


    请注意，R 交互窗口也生成了以下代码：

    ```

    `Weather_Sample` <- read.csv(file="C:/Users/Bradley Beard/AppData/Local/Temp/Weather_Sample.csv.utf8",
    header=TRUE, row.names=NULL, encoding="UTF-8", sep=",", dec=".", quote="\"", comment.char="")

    ```

    这很有趣，因为它从 R 的角度向我们展示了数据是如何导入到当前工作项目中的。


    ### 打开脚本窗格


    现在我们已经加载了数据集，可以打开一个 Visual Studio 窗格来执行 R 脚本，以准备和分析我们的数据。关闭图 5-3 左上角窗格中显示的“起始页”。然后通过按`Ctrl+N`，点击左侧窗格中的“R”，并选择“R
    Script”来打开一个新的 R 脚本，如图 5-4 所示。

    ![A421548_1_En_5_Fig4_HTML.jpg](img/A421548_1_En_5_Fig4_HTML.jpg)

    图 5-4. 新建 R 脚本


    点击“打开”按钮以打开一个空白的脚本窗口。你现在应该有一个类似于图 5-5 所示的界面。

    ![A421548_1_En_5_Fig5_HTML.jpg](img/A421548_1_En_5_Fig5_HTML.jpg)

    图 5-5. 准备工作！


    现在我们的数据已正确加载，并且我们有了一个干净的工作界面，我们可以继续下一节了。


    ### 准备数据集


    到底如何准备数据集？它不是已经准备好了吗？嗯，是也不是：是的，因为数据本身已经是结构良好且有意义的，所以现在我们可以看到它真正想表达什么；不，因为它尚未准备好供
    R 分析，因为它还是原始数据。我们需要先对数据做一些辅助处理，为分析做好准备。


    要让数据准备好进行分析，请在你的`Script1.R`窗口中输入以下代码：

    ```

    install.packages("data.table")

    library(data.table)

    Weather_Sample <- data.table(Weather_Sample)

    setkey(Weather_Sample, AirportID)

    ```

    图 5-6 显示了在输入我刚刚给出的代码后，你的 Visual Studio 窗口应有的样子。

    ![A421548_1_En_5_Fig6_HTML.jpg](img/A421548_1_En_5_Fig6_HTML.jpg)

    图 5-6. 准备工作


    现在，让我们来回顾一下这段代码实际在做什么。


    *   `install.packages("data.table")`：这段代码只是安装`data.table`包。

    *   `library(data.table)`：这段代码使`data.table`包在当前 R 会话中可用。

    *   `Weather_Sample <- data.table(Weather_Sample)`：这段代码将一个名为`Weather_Sample`的空对象设置为`Weather_Sample`数据集的`data.table`表示形式。

    *   `setkey(Weather_Sample, AirportID)`：这段代码允许按特定列进行分组。


    现在我们理解了这里发生的事情，我们看到实际上没有提供分析的代码。你的这个概括是正确的，因为我们还没有真正开始分析，我们只是开始为分析准备数据集。这是重要的第一步，因为它有点像是我们下一步工作的基础，即创建作为软件需求文档一部分需要生成的报告。


    执行我在图 5-6 中提供的代码行，显示`chron`包也随`data.table`一起被下载了。需要指出的是，任何请求下载的包的依赖包也总是会被一并下载。这消除了因包依赖关系而导致错误的可能性。如果你还没有执行那些代码行，请现在执行。

    '
- fmt: "### Average Wind Speed by Airport ID (Tabular)\n\nThe first report that we\
    \ are going to work on is Average Wind Speed by Airport ID. This report takes\
    \ the data available and calculates the average wind speed per airport, and then\
    \ displays the values in a chart. The columns we need to concern ourselves with\
    \ are named `WindSpeed` and `AirportID`. We know that we have to have an object\
    \ instantiated to hold the plot data and we know that we need to return the data\
    \ to the object as a `data.frame` so that it can be interpreted into a chart correctly.\
    \ We can start writing our code as follows:\n\n```\navg_windspeed_by_ID <- as.data.frame(Weather_Sample)\n\
    ```\n\n**Tip**\n\nUsing the `as` keyword in front of the `data.frame` declaration\
    \ indicates that we want to force the referenced dataset to be returned as a data\
    \ frame.\n\nThat code doesn’t quite do what we need yet, because we haven’t yet\
    \ figured out the `mean()` of the `WindSpeed` column yet. To do this, we need\
    \ to update our code as follows:\n\n```\navg_windspeed_by_ID <- as.data.frame(Weather_Sample[,\
    \ mean(WindSpeed)])\n```\n\nThat code looks closer to what we need, but it’s not\
    \ complete yet. What if there are blank rows in the data? This will surely affect\
    \ our output, so let’s get rid of those values by updating our code to the following:\n\
    \n```\navg_windspeed_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm\
    \ = TRUE)])\n```\n\nWe can now see that `na.rm = TRUE` will remove the “missing”\
    \ values in a dataset.\n\nFinally, we add a sorting column on the end. Keep in\
    \ mind that this is different than the `setkey()` function we called earlier,\
    \ because the `setkey()` function grouped the data. To sort the data by a column,\
    \ update your code to the following:\n\n```\navg_windspeed_by_ID <- as.data.frame(Weather_Sample[,\
    \ mean(WindSpeed, na.rm = TRUE), by = AirportID])\n```\n\nNow, highlight the command\
    \ we just finished writing and press `Ctrl+Enter`. After that, type `avg_windspeed_by_ID`,\
    \ highlight what you just wrote, and press `Ctrl+Enter` to execute it. You should\
    \ see the following output in the R Interactive window at this time:\n\n```\n\
    > avg_windspeed_by_ID\nAirportID        V1\n1      10140  7.594268\n2      10299\
    \  6.708183\n3      10397  6.554401\n4      10423  5-991983\n5      10529  5-377292\n\
    6      10693  4.686593\n7      10713  6.993095\n8      10721  8.713368\n9    \
    \  10800  4.193095\n10     10821  5-095719\n```\n\nNote that I scrolled up to\
    \ the top of the returned data in order to show the top 10 results returned out\
    \ of 66 rows. The following is the entire script to generate this result:\n\n\
    ```\ninstall.packages(\"data.table\")\nlibrary(data.table)\nWeather_Sample <-\
    \ data.table(Weather_Sample)\nsetkey(Weather_Sample, AirportID)\navg_windspeed_by_ID\
    \ <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm = TRUE), by = AirportID])\n\
    avg_windspeed_by_ID\n```\n\nSave your script as `avgWindspeedByAirportID.tabular.R`.\
    \ This is the first part of the report that we are going to generate.\n\n### Average\
    \ Wind Speed by Airport ID (Plot)\n\nNext, open a new R script window. In that\
    \ new window, you want to type in the following code:\n\n```\nlibrary(data.table)\n\
    Weather_Sample <- data.table(Weather_Sample)\nchart_by_ID <- as.data.frame(Weather_Sample[,\
    \ mean(WindSpeed, na.rm = TRUE), by = AirportID])\nlibrary(ggplot2)\nggplot(chart_by_ID,\
    \ aes(x = AirportID, y = V1)) + geom_point(stat = \"identity\") + geom_smooth(method\
    \ = \"lm\", formula = y ∼ splines::bs(x, 3)) + scale_x_continuous(name = \"Airport\
    \ ID\") + scale_y_continuous(name = \"Average Wind Speed\") +\ngeom_text(aes(label\
    \ = AirportID), size = 3, vjust = 1.0) +\ngeom_text(aes(label = round(V1, digits\
    \ = 2)), size = 3, vjust = 2.0)\n```\n\nLet’s take a look at this code before\
    \ we move on.\n\n- `Weather_Sample <- data.table(Weather_Sample)`: We are using\
    \ `Weather_Sample` as our object variable name, and then populating that object\
    \ with the `data.table` representation of the data contained in the dataset `Weather_Sample`\
    \ (which is shown by reference). There is a reference to the data, in other words,\
    \ to create the analysis.\n- `chart_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed,\
    \ na.rm = TRUE), by = AirportID])`: First, we’re setting the variable name as\
    \ before to `chart_by_ID`. Then, we’re setting this variable equal to the data\
    \ frame equivalent of the mean of the `WindSpeed` column in the dataset (`na.rm=TRUE`\
    \ means to remove the N/A values) grouped by the `AirportID`. Does this make sense?\
    \ It is imperative that you understand how this statement is structured, so that\
    \ you can go back in and create custom reports from this data on your own. If\
    \ you haven’t gotten it yet, keep looking at it until it makes sense.\n- `library(ggplot2)`:\
    \ This command makes the newly installed `ggplot2` package available to this project.\n\
    - `ggplot(chart_by_ID, aes(x = AirportID, y = V1)) + geom_point(stat = \"identity\"\
    ) + geom_smooth(method = \"lm\", formula = y ∼ splines::bs(x, 3)) + scale_x_continuous(name\
    \ = \"Airport ID\") + scale_y_continuous(name = \"Wind Speed\") + geom_text(aes(label\
    \ = AirportID), size = 3, vjust = 1.0) + geom_text(aes(label = round(V1, digits\
    \ = 2)), size = 3, vjust = 2.0)`: This is a big one. This is just one huge command\
    \ that controls how the chart looks and renders. The individual parts of this\
    \ statement are:\n    - `ggplot(`: This is the plotting function.\n    - `chart_by_ID,`:\
    \ Feeds the data.frame of Weather_Sample into this variable\n    - `aes(x = AirportID,\
    \ y = V1)) +`: `aes` is the aesthetic definition for ggplot2. It is saying that\
    \ the x axis (horizontal) shows AirportID and that the y axis (vertical) shows\
    \ V1, which is going to the average wind speed, in this instance.\n    - `geom_point(stat\
    \ = \"identity\") +`: The `geom_point()` function lets you define how you want\
    \ the points on the plot defined. In this case, we want them shown as an identity.\n\
    \    - `geom_smooth(method = \"lm\", formula = y ∼ splines::bs(x, 3)) +`: This\
    \ lets us add a conditional average to the plot.\n    - `scale_x_continuous(name\
    \ = \"Airport ID\") +`: This lets us continuously scale the x axis.\n    - `scale_y_continuous(name\
    \ = \"Wind Speed\") +`: This lets us continuously scale the y axis.\n    - `geom_text(aes(label\
    \ = AirportID), size = 3 , vjust = 1.0) +`: This lets us label and offset the\
    \ x-axis label.\n    - `geom_text(aes(label = round(V1, digits = 2)), size = 3\
    \ , vjust = 1.0)`: This lets us label and offset the y-axis label.\n\nNote that\
    \ there is a plus sign at the end of some of the lines. This counts as a continuous\
    \ character; in other words, the statement continues on the next line, which is\
    \ not a separate statement.\n\nOnce you’ve got that all typed in, press `Ctrl+A`\
    \ to select all, and then `Ctrl+Enter` to run it. You then see what is shown in\
    \ Figure [5-7](#A421548_1_En_5_Chapter.html#Fig7).\n\n![A421548_1_En_5_Fig7_HTML.jpg](A421548_1_En_5_Fig7_HTML.jpg)\n\
    Figure 5-7. Plotted information\n\nSo we’ve got Airport ID on the x axis and Average\
    \ Wind Speed on the y axis. Save that script as `avgWindspeedByAirportID.plot.R`.\n\
    \nVery nice so far! That finishes up the basics of the first report, so let’s\
    \ move on to the second one.\n\n## Report 2: Average Temperature by Airport ID\
    \ (°F)\n\nOur next task is to report the average temperature by airport ID. The\
    \ code involved is very similar to that for the Average Wind Speed by Airport\
    \ ID report, so you shouldn’t have any trouble in following along.\n\nWe’ll approach\
    \ our task in two steps. First we’ll compute the average temperature values. Then\
    \ we’ll plot them in the graph. This is exactly how we created the first report\
    \ as well."
  raw: '### Average Wind Speed by Airport ID (Tabular)


    The first report that we are going to work on is Average Wind Speed by Airport
    ID. This report takes the data available and calculates the average wind speed
    per airport, and then displays the values in a chart. The columns we need to concern
    ourselves with are named `WindSpeed` and `AirportID`. We know that we have to
    have an object instantiated to hold the plot data and we know that we need to
    return the data to the object as a `data.frame` so that it can be interpreted
    into a chart correctly. We can start writing our code as follows:


    ```

    avg_windspeed_by_ID <- as.data.frame(Weather_Sample)

    ```


    Tip


    Using the `as` keyword in front of the `data.frame` declaration indicates that
    we want to force the referenced dataset to be returned as a data frame.


    That code doesn’t quite do what we need yet, because we haven’t yet figured out
    the `mean()` of the `WindSpeed` column yet. To do this, we need to update our
    code as follows:


    ```

    avg_windspeed_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed)])

    ```


    That code looks closer to what we need, but it’s not complete yet. What if there
    are blank rows in the data? This will surely affect our output, so let’s get rid
    of those values by updating our code to the following:


    ```

    avg_windspeed_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm =
    TRUE)])

    ```


    We can now see that `na.rm = TRUE` will remove the “missing” values in a dataset.


    Finally, we add a sorting column on the end. Keep in mind that this is different
    than the `setkey()` function we called earlier, because the `setkey()` function
    grouped the data. To sort the data by a column, update your code to the following:


    ```

    avg_windspeed_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm =
    TRUE), by = AirportID])

    ```


    Now, highlight the command we just finished writing and press Ctrl+Enter. After
    that, type avg_windspeed_by_ID, highlight what you just wrote, and press Ctrl+Enter
    to execute it. You should see the following output in the R Interactive window
    at this time:


    ```

    > avg_windspeed_by_ID

    AirportID        V1

    1      10140  7.594268

    2      10299  6.708183

    3      10397  6.554401

    4      10423  5-991983

    5      10529  5-377292

    6      10693  4.686593

    7      10713  6.993095

    8      10721  8.713368

    9      10800  4.193095

    10     10821  5-095719

    ```


    Note that I scrolled up to the top of the returned data in order to show the top
    10 results returned out of 66 rows. The following is the entire script to generate
    this result:


    ```

    install.packages("data.table")

    library(data.table)

    Weather_Sample <- data.table(Weather_Sample)

    setkey(Weather_Sample, AirportID)

    avg_windspeed_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm =
    TRUE), by = AirportID])

    avg_windspeed_by_ID

    ```


    Save your script as `avgWindspeedByAirportID.tabular.R`. This is the first part
    of the report that we are going to generate.


    ### Average Wind Speed by Airport ID (Plot)


    Next, open a new R script window. In that new window, you want to type in the
    following code:


    ```

    library(data.table)

    Weather_Sample <- data.table(Weather_Sample)

    chart_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm = TRUE), by
    = AirportID])

    library(ggplot2)

    ggplot(chart_by_ID, aes(x = AirportID, y = V1)) + geom_point(stat = "identity")
    + geom_smooth(method = "lm", formula = y ∼ splines::bs(x, 3)) + scale_x_continuous(name
    = "Airport ID") + scale_y_continuous(name = "Average Wind Speed") +

    geom_text(aes(label = AirportID), size = 3, vjust = 1.0) +

    geom_text(aes(label = round(V1, digits = 2)), size = 3, vjust = 2.0)

    ```


    Let’s take a look at this code before we move on.


    *   `Weather_Sample <- data.table(Weather_Sample)`: We are using `Weather_Sample`
    as our object variable name, and then populating that object with the `data.table`
    representation of the data contained in the dataset `Weather_Sample` (which is
    shown by reference). There is a reference to the data, in other words, to create
    the analysis.

    *   `chart_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm = TRUE),
    by = AirportID])`: First, we’re setting the variable name as before to `chart_by_ID`.
    Then, we’re setting this variable equal to the data frame equivalent of the mean
    of the `WindSpeed` column in the dataset (`na.rm=TRUE` means to remove the N/A
    values) grouped by the `AirportID`. Does this make sense? It is imperative that
    you understand how this statement is structured, so that you can go back in and
    create custom reports from this data on your own. If you haven’t gotten it yet,
    keep looking at it until it makes sense.

    *   `library(ggplot2)`: This command makes the newly installed `ggplot2` package
    available to this project.

    *   `ggplot(chart_by_ID, aes(x = AirportID, y = V1)) + geom_point(stat = "identity")
    + geom_smooth(method = "lm", formula = y ∼ splines::bs(x, 3)) + scale_x_continuous(name
    = "Airport ID") + scale_y_continuous(name = "Wind Speed") + geom_text(aes(label
    = AirportID), size = 3, vjust = 1.0) + geom_text(aes(label = round(V1, digits
    = 2)), size = 3, vjust = 2.0)`: This is a big one. This is just one huge command
    that controls how the chart looks and renders. The individual parts of this statement
    are:

    *   `ggplot(`: This is the plotting function.

    *   `chart_by_ID,`: Feeds the data.frame of Weather_Sample into this variable

    *   `aes(x = AirportID, y = V1)) +`: `aes` is the aesthetic definition for ggplot2\.
    It is saying that the x axis (horizontal) shows AirportID and that the y axis
    (vertical) shows V1, which is going to the average wind speed, in this instance.

    *   `geom_point(stat = "identity") +`: The `geom_point()` function lets you define
    how you want the points on the plot defined. In this case, we want them shown
    as an identity.

    *   `geom_smooth(method = "lm", formula = y ∼ splines::bs(x, 3)) +`: This lets
    us add a conditional average to the plot.

    *   `scale_x_continuous(name = "Airport ID") +`: This lets us continuously scale
    the x axis.

    *   `scale_y_continuous(name = "Wind Speed") +`: This lets us continuously scale
    the y axis.

    *   `geom_text(aes(label = AirportID), size = 3 , vjust = 1.0) +`: This lets us
    label and offset the x-axis label.

    *   `geom_text(aes(label = round(V1, digits = 2)), size = 3 , vjust = 1.0)`: This
    lets us label and offset the y-axis label.


    Note that there is a plus sign at the end of some of the lines. This counts as
    a continuous character; in other words, the statement continues on the next line,
    which is not a separate statement.


    Once you’ve got that all typed in, press Ctrl+A to select all, and then Ctrl+Enter
    to run it. You then see what is shown in Figure [5-7](#A421548_1_En_5_Chapter.html#Fig7).


    ![A421548_1_En_5_Fig7_HTML.jpg](A421548_1_En_5_Fig7_HTML.jpg)


    Figure 5-7.


    Plotted information


    So we’ve got Airport ID on the x axis and Average Wind Speed on the y axis. Save
    that script as `avgWindspeedByAirportID.plot.R`.


    Very nice so far! That finishes up the basics of the first report, so let’s move
    on to the second one.


    ## Report 2: Average Temperature by Airport ID (°F)


    Our next task is to report the average temperature by airport ID. The code involved
    is very similar to that for the Average Wind Speed by Airport ID report, so you
    shouldn’t have any trouble in following along.


    We’ll approach our task in two steps. First we’ll compute the average temperature
    values. Then we’ll plot them in the graph. This is exactly how we created the
    first report as well.'
  trans: "\n### 按机场 ID 的平均风速（表格版）\n\n我们即将处理的第一份报告是按机场 ID 的平均风速。该报告利用可用数据，计算每个机场的平均风速，然后在图表中显示这些数值。我们需要关注的列名为\
    \ `WindSpeed` 和 `AirportID`。我们知道，必须实例化一个对象来保存绘图数据，并且需要将数据作为 `data.frame` 返回给该对象，以便它能被正确地解读为图表。我们可以开始编写代码，如下所示：\n\
    \n```\navg_windspeed_by_ID <- as.data.frame(Weather_Sample)\n```\n\n**提示**\n\n\
    在 `data.frame` 声明前使用 `as` 关键字，表示我们希望强制将引用的数据集作为数据框返回。\n\n这段代码尚未完全实现我们的需求，因为我们还没有计算\
    \ `WindSpeed` 列的 `mean()`（均值）。为此，我们需要更新代码如下：\n\n```\navg_windspeed_by_ID <- as.data.frame(Weather_Sample[,\
    \ mean(WindSpeed)])\n```\n\n这段代码看起来更接近我们需要的了，但它还不完整。如果数据中存在空行怎么办？这肯定会影响我们的输出，所以让我们通过更新代码来移除这些值：\n\
    \n```\navg_windspeed_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm\
    \ = TRUE)])\n```\n\n现在我们可以看到，`na.rm = TRUE` 会移除数据集中的“缺失”值。\n\n最后，我们在末尾添加一个排序列。请记住，这与我们之前调用的\
    \ `setkey()` 函数不同，因为 `setkey()` 函数是对数据进行分组。要按某一列对数据进行排序，请将代码更新为如下形式：\n\n```\n\
    avg_windspeed_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm =\
    \ TRUE), by = AirportID])\n```\n\n现在，高亮显示我们刚写完的命令，然后按 `Ctrl+Enter`。之后，键入 `avg_windspeed_by_ID`，高亮显示你刚写的内容，再按\
    \ `Ctrl+Enter` 来执行它。此时，你应该在 R 交互窗口中看到以下输出：\n\n```\n> avg_windspeed_by_ID\nAirportID\
    \        V1\n1      10140  7.594268\n2      10299  6.708183\n3      10397  6.554401\n\
    4      10423  5-991983\n5      10529  5-377292\n6      10693  4.686593\n7    \
    \  10713  6.993095\n8      10721  8.713368\n9      10800  4.193095\n10     10821\
    \  5-095719\n```\n\n注意，我向上滚动到了返回数据的顶部，以显示 66 行中的前 10 条结果。以下是生成此结果的完整脚本：\n\n```\n\
    install.packages(\"data.table\")\nlibrary(data.table)\nWeather_Sample <- data.table(Weather_Sample)\n\
    setkey(Weather_Sample, AirportID)\navg_windspeed_by_ID <- as.data.frame(Weather_Sample[,\
    \ mean(WindSpeed, na.rm = TRUE), by = AirportID])\navg_windspeed_by_ID\n```\n\n\
    将你的脚本保存为 `avgWindspeedByAirportID.tabular.R`。这是我们即将生成的报告的第一部分。\n\n### 按机场 ID 的平均风速（图表版）\n\
    \n接下来，打开一个新的 R 脚本窗口。在那个新窗口中，你需要输入以下代码：\n\n```\nlibrary(data.table)\nWeather_Sample\
    \ <- data.table(Weather_Sample)\nchart_by_ID <- as.data.frame(Weather_Sample[,\
    \ mean(WindSpeed, na.rm = TRUE), by = AirportID])\nlibrary(ggplot2)\nggplot(chart_by_ID,\
    \ aes(x = AirportID, y = V1)) + geom_point(stat = \"identity\") + geom_smooth(method\
    \ = \"lm\", formula = y ∼ splines::bs(x, 3)) + scale_x_continuous(name = \"Airport\
    \ ID\") + scale_y_continuous(name = \"Average Wind Speed\") +\ngeom_text(aes(label\
    \ = AirportID), size = 3, vjust = 1.0) +\ngeom_text(aes(label = round(V1, digits\
    \ = 2)), size = 3, vjust = 2.0)\n```\n\n在我们继续之前，先来看一下这段代码。\n\n- `Weather_Sample\
    \ <- data.table(Weather_Sample)`：我们使用 `Weather_Sample` 作为对象变量名，然后用数据集 `Weather_Sample`（如引用所示）中包含的数据的\
    \ `data.table` 表示形式来填充该对象。换句话说，有一个对数据的引用，用于创建分析。\n- `chart_by_ID <- as.data.frame(Weather_Sample[,\
    \ mean(WindSpeed, na.rm = TRUE), by = AirportID])`：首先，像之前一样，我们将变量名设为 `chart_by_ID`。然后，我们将这个变量设置为数据集中\
    \ `WindSpeed` 列的均值（`na.rm=TRUE` 表示移除 N/A 值）按 `AirportID` 分组后的数据框等价物。这合理吗？理解这个语句的结构至关重要，这样你才能回头基于这些数据创建自定义报告。如果你还没明白，请继续看下去，直到理解为止。\n\
    - `library(ggplot2)`：这个命令使新安装的 `ggplot2` 包对该项目可用。\n- `ggplot(chart_by_ID, aes(x\
    \ = AirportID, y = V1)) + geom_point(stat = \"identity\") + geom_smooth(method\
    \ = \"lm\", formula = y ∼ splines::bs(x, 3)) + scale_x_continuous(name = \"Airport\
    \ ID\") + scale_y_continuous(name = \"Wind Speed\") + geom_text(aes(label = AirportID),\
    \ size = 3, vjust = 1.0) + geom_text(aes(label = round(V1, digits = 2)), size\
    \ = 3, vjust = 2.0)`：这是一个很长的命令。这是一个控制图表外观和渲染的巨大命令。这个语句的各个部分是：\n    - `ggplot(`：这是绘图函数。\n\
    \    - `chart_by_ID,`：将 Weather_Sample 的 data.frame 输入到这个变量中。\n    - `aes(x =\
    \ AirportID, y = V1)) +`：`aes` 是 ggplot2 的美学定义。它表示 x 轴（水平）显示 AirportID，y 轴（垂直）显示\
    \ V1，在这里指的是平均风速。\n    - `geom_point(stat = \"identity\") +`：`geom_point()` 函数让你定义如何定义图上的点。在这里，我们希望它们显示为恒等（identity）。\n\
    \    - `geom_smooth(method = \"lm\", formula = y ∼ splines::bs(x, 3)) +`：这让我们可以向图表添加一个条件均值（平滑线）。\n\
    \    - `scale_x_continuous(name = \"Airport ID\") +`：这让我们可以连续缩放 x 轴。\n    - `scale_y_continuous(name\
    \ = \"Wind Speed\") +`：这让我们可以连续缩放 y 轴。\n    - `geom_text(aes(label = AirportID),\
    \ size = 3 , vjust = 1.0) +`：这让我们可以标注并偏移 x 轴标签。\n    - `geom_text(aes(label =\
    \ round(V1, digits = 2)), size = 3 , vjust = 1.0)`：这让我们可以标注并偏移 y 轴标签。\n\n请注意，有些行的末尾有一个加号。这算作一个连续的字符；换句话说，该语句在下一行继续，而不是一个单独的语句。\n\
    \n一旦你全部输入完毕，按 `Ctrl+A` 全选，然后按 `Ctrl+Enter` 运行。然后你会看到如图 5-7 所示的内容。\n\n![A421548_1_En_5_Fig7_HTML.jpg](img/A421548_1_En_5_Fig7_HTML.jpg)\n\
    图 5-7. 绘制的信息\n\n因此，我们在 x 轴上放置了机场 ID，在 y 轴上放置了平均风速。将该脚本保存为 `avgWindspeedByAirportID.plot.R`。\n\
    \n到目前为止非常棒！这完成了第一份报告的基础部分，所以让我们继续处理第二份。\n\n## 报告 2：按机场 ID 的平均温度（°F）\n\n我们的下一个任务是报告按机场\
    \ ID 的平均温度。所涉及的代码与“按机场 ID 的平均风速”报告非常相似，所以你应该能轻松跟上。\n\n我们将分两步处理我们的任务。首先计算平均温度值。然后在图中绘制它们。这与我们创建第一份报告的方式完全相同。\n"
- fmt: '### Average Temperature by Airport ID (Tabular)


    Notice that the data is still loaded and available to us, so we can skip the step
    of loading the data and get right into computing our average temperatures. Following
    is the code to do that:


    ```

    install.packages("data.table")

    library(data.table)

    Weather_Sample <- data.table(Weather_Sample)

    setkey(Weather_Sample, AirportID)

    avg_temperature_by_ID <- as.data.frame(Weather_Sample[, mean(DryBulbFarenheit,
    na.rm = TRUE), by = AirportID])

    avg_temperature_by_ID

    ```


    Type that in, press `Ctrl+A` to select all, and then press `Ctrl+Enter` to execute
    it. At this point, your R Interactive window should show the following information:


    ```

    AirportID       V1

    1      10140 62.76688

    2      10299 45-91877

    3      10397 68.61980

    4      10423 74.13576

    5      10529 58.44648

    6      10693 65-93558

    7      10713 57.59134

    8      10721 60.77466

    9      10800 71.38043

    10     10821 62.85850

    ```


    That’s the first 10 rows of what you should see.

    If you scroll down, you see that all 66 rows have been returned. Now save the
    script as `avgTemperatureByAirportID.tabular.R`.


    ### Average Temperature by Airport ID (Plot)


    We have the data that we need, so let’s plot it onto a chart now. The code for
    this plot is based on the previous plot, so let’s look at that code now:


    ```

    Weather_Sample <- data.table(Weather_Sample)

    chart_by_ID <- as.data.frame(Weather_Sample[, mean(DryBulbFarenheit, na.rm = TRUE),
    by = AirportID])

    install.packages("ggplot2")

    library(ggplot2)

    ggplot(chart_by_ID, aes(x = AirportID, y = V1)) + geom_point(stat = "identity")
    + geom_smooth(method = "lm", formula = y ∼ splines::bs(x, 3)) + scale_x_continuous(name
    = "Airport ID") + scale_y_continuous(name = "Average Temperature") +

    geom_text(aes(label = AirportID), size = 3, vjust = 1.0) +

    geom_text(aes(label = round(V1, digits = 2)), size = 3, vjust = 2.0)

    ```


    This code should look very familiar. I only changed the `WindSpeed` text in the
    `chart_by_ID` section to `DryBulbFarenheit`, and the `scale_y_continuous` name
    to `Average Temperature` instead of `Average Wind Speed`.

    Once you get this code typed into RTVS, press `Ctrl+A` to select all, and then
    press `Ctrl+Enter` to execute the code. Figure 5-8 shows what you should see at
    this point.


    ![A421548_1_En_5_Fig8_HTML.jpg](A421548_1_En_5_Fig8_HTML.jpg)


    Figure 5-8. Plotted data


    Excellent! That shows us our data—and even a moving average line thrown in for
    good measure.

    Save that script as `avgTemperatureByAirportID.plot.R`. The following are the
    four files that you should have saved:

    *   `avgTemperatureByAirportID.plot.R`

    *   `avgTemperatureByAirportID.tabular.R`

    *   `avgWindspeedByAirportID.plot.R`

    *   `avgWindspeedByAirportID.tabular.R`


