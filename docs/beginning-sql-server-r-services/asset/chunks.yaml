    \n图 2-52.\n\n`head(predicted_values)`\n\n接下来是重头戏。第 220 至 224 行包含`ggplot`命令，它为我们绘制出所有内容。到目前为止，我们已经用`actual`和`predicted`列设置了`data.frame`对象。现在我们看到了这些数据可视化后的样子。此命令的\
