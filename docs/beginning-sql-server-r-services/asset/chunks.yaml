- fmt: '## Setup New Database and Tables


    So now that we are all set up and ready to go, let’s do a bit of refresher work.


    Recall back in Chapter [5](#A421548_1_En_5_Chapter.html) that we created a couple
    of reports that were to be delivered to the customer. These reports were based
    on the `Weather_Sample.csv` data. Later on, we will import this data into SQL
    Server and then manipulate it. First, let’s take a cursory look at the data though.


    Let’s set up some of the database infrastructure before we go any further. We
    need to set up a new database and then create one table to act as the data source
    for the data.


    In `SSMS`, right-click `Databases` and choose the `New Database` option. A screen
    appears, which allows for the creation of a new database. The initial tab, shown
    in the left pane of the `New Database` screen shown in Figure [7-14](#A421548_1_En_7_Chapter.html#Fig14),
    is named `General`. Make the changes shown in this screen.


    ![A421548_1_En_7_Fig14_HTML.jpg](A421548_1_En_7_Fig14_HTML.jpg)


    Figure 7-14. New Database creation


    Click the `OK` button when you are finished. The new database named `SQL2016RS`
    is created.


    Next, open a new `Query` window, change the active database to `SQL2016RS`, and
    then type the following:


    ```sql

    CREATE TABLE [dbo].[chartBinary] (

    [uid] int identity(1,1) PRIMARY KEY,

    [title] varchar(100) NULL,

    [binData] varbinary(max) NULL

    )

    ```


    Press `F5` to execute that code—and voilà! There’s our table. Figure [7-15](#A421548_1_En_7_Chapter.html#Fig15)
    shows this table.


    ![A421548_1_En_7_Fig15_HTML.jpg](A421548_1_En_7_Fig15_HTML.jpg)


    Figure 7-15. chartBinary table


    Now we’ve got a table to store the binary data and a title for the chart. Next,
    we need to generate the actual binary data. I realize that there are ways to pull
    this binary data directly into Reporting Services, but I think that it is important
    to understand how the data works with the `Report Server` to take the generated
    binary data and create a chart. You will certainly learn more about the chart
    creation process this way, as opposed to learning the point-and-click method some
    may prefer.


    Recall back in Chapter [5](#A421548_1_En_5_Chapter.html) how we were able to import
    the `Weather_Sample.csv` file into the interface and then generate the charts.
    This is the code to do that:


    ```r

    Weather_Sample <- read.csv(file="C:/Users/Bradley Beard/AppData/Local/Temp/Weather_Sample.csv.utf8",
    header=TRUE, row.names=NULL, encoding="UTF-8", sep=",", dec=".", quote="\"", comment.char="")

    ```


    Instead of pointing to the `Temp` directory, I am copying the `Weather_Sample.csv`
    file from the `.zip` file that we downloaded earlier and put that right in the
    root of `C:`, strictly to make it a shorter file location. This is the updated
    code:


    ```r

    Weather_Sample <- read.csv(file="C:\\Weather_Sample.csv", header=TRUE, row.names=NULL,

    encoding="UTF-8", sep=",", dec=".", quote="\"", comment.char="")

    ```


    Note that I changed the single backslash to a double backslash in order to escape
    the `\W` command. `R` throws an error when there is an escaped character, so ensure
    that you have converted any single backslashes to double backslashes.


    So, I assume that we will be able to pop that into the stored procedure and have
    that data available. Is that a correct assumption? As it turns out... yes!


    Consider the following code.


    ```sql

    exec sp_execute_external_script

    @language =N''R'',

    @script=N''Weather_Sample <- read.csv(file="C:\\Weather_Sample.csv",

    header=TRUE, row.names=NULL, encoding="UTF-8", sep=",", dec=".", quote="\"", comment.char="");

    print(unique(Weather_Sample$AirportID) );''

    ```


    Breaking it apart, we can see that the `@script` attribute contains a declaration
    of `Weather_Sample` to be the result of a `read()` operation of the `CSV` located
    at `C:\Weather_Sample.csv`, with the `header` information, without `row.names`,
    encoded to `UTF-8`, comma separated, with decimal points if needed, with escaped
    quotes and comments. We are then simply printing the unique values in the `AirportID`
    column of the `Weather_Sample` dataset. Type that into `SSMS`. Figure [7-16](#A421548_1_En_7_Chapter.html#Fig16)
    shows what happens once the code is executed.


    ![A421548_1_En_7_Fig16_HTML.jpg](A421548_1_En_7_Fig16_HTML.jpg)


    Figure 7-16. Script execution


    Those are the unique `Airport` `ID`s in the data. We can do this with any other
    column you would like as well. How about `AdjustedDay`? Just change the last bit
    to `AdjustedDay` from `AirportID`. Your code should look like the following.


    ```sql

    exec sp_execute_external_script

    @language =N''R'',

    @script=N''Weather_Sample <- read.csv(file="C:\\Weather_Sample.csv",

    header=TRUE, row.names=NULL, encoding="UTF-8", sep=",", dec=".", quote="\"", comment.char="");

    print(unique(Weather_Sample$AdjustedDay));''

    ```


    Run that in `SSMS`. You should see what’s shown in Figure [7-17](#A421548_1_En_7_Chapter.html#Fig17).


    ![A421548_1_En_7_Fig17_HTML.jpg](A421548_1_En_7_Fig17_HTML.jpg)


    Figure 7-17. AdjustedDay script


    So essentially, this shows us that we could use the existing data in `CSV` format
    as part of a local report. Recall that I mentioned earlier that we are going to
    add this data to `SQL Server`; so let’s do that now.'
