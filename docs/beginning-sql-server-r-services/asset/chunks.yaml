    Figure 8-8.


    Data Source Properties


    Update that screen to what is shown in Figure [8-9](#A421548_1_En_8_Chapter.html#Fig9).


    ![A421548_1_En_8_Fig9_HTML.jpg](A421548_1_En_8_Fig9_HTML.jpg)


    Figure 8-9.


    Updated values


    We need to configure that connection string, so click the Build… button; you should
    see what is shown in Figure [8-10](#A421548_1_En_8_Chapter.html#Fig10).


    ![A421548_1_En_8_Fig10_HTML.jpg](A421548_1_En_8_Fig10_HTML.jpg)


    Figure 8-10.


    Connection Properties


    Update that screen to what is shown in Figure [8-11](#A421548_1_En_8_Chapter.html#Fig11).


    ![A421548_1_En_8_Fig11_HTML.jpg](A421548_1_En_8_Fig11_HTML.jpg)


    Figure 8-11.


    Updated values


    Obviously, you want to keep in mind that your settings are probably different
    than mine.


    Once you get here, you can click the Test Connection button to verify that you’re
    talking to the database. Figure [8-12](#A421548_1_En_8_Chapter.html#Fig12) shows
    the result of clicking this button.


    ![A421548_1_En_8_Fig12_HTML.jpg](A421548_1_En_8_Fig12_HTML.jpg)


