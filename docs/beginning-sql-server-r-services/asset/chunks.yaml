    ## Encryption Keys


    Figure [6-10](#A421548_1_En_6_Chapter.html#Fig10) shows that this area allows
    you to backup, restore, change, or delete encryption keys.


    ![A421548_1_En_6_Fig10_HTML.jpg](A421548_1_En_6_Fig10_HTML.jpg)


    Figure 6-10. Encryption Keys


    I highly recommend backing up your encryption keys immediately. Without these
    keys, you cannot decrypt any encrypted database. It is of vital importance that
    the keys be backed up regularly and stored securely.


    ## Subscription Settings


    Figure [6-11](#A421548_1_En_6_Chapter.html#Fig11) shows that this area allows
    you to configure an account that is used by remote users to access your available
    file share subscriptions. Note that a file share subscription is necessary when
    e-mail delivery is not allowed.


    ![A421548_1_En_6_Fig11_HTML.jpg](A421548_1_En_6_Fig11_HTML.jpg)


    Figure 6-11. Subscription Settings


    Since this deployment is strictly for testing, we can leave this area alone.


    ## Scale-out Deployment


    Figure [6-12](#A421548_1_En_6_Chapter.html#Fig12) shows that this area allows
    you to view information about a scale-out deployment. A scale-out deployment is
    essentially a load-balancing model, which increases scalability in a server cluster.
    As more users of the Reporting Services instance consume resources, the load can
    be shared to another server that shares the same encrypted data as the original
    server. At this time, the `scale-out deployment` option is only available in Enterprise
    edition for production instances.


    ![A421548_1_En_6_Fig12_HTML.jpg](A421548_1_En_6_Fig12_HTML.jpg)


    Figure 6-12. Scale-out Deployment


    ## Power BI Integration


    Figure [6-13](#A421548_1_En_6_Chapter.html#Fig13) shows that this area allows
    you to set up integration with Power BI with a single click. Unfortunately, Power
    BI is beyond the scope of this book, so leave these settings at their defaults.


    ![A421548_1_En_6_Fig13_HTML.jpg](A421548_1_En_6_Fig13_HTML.jpg)


    Figure 6-13. Power BI Integration


    First of all, how cool is it that Power BI can integrate right into Reporting
    Services—and with a single click?


    Now, go back to the Web Portal URL page and click the hyperlink shown on the page.
    The location of this hyperlink is shown in Figure [6-14](#A421548_1_En_6_Chapter.html#Fig14).


    ![A421548_1_En_6_Fig14_HTML.jpg](A421548_1_En_6_Fig14_HTML.jpg)


    Figure 6-14. Hyperlink location


    When you click the hyperlink, you should see what is shown in Figure [6-15](#A421548_1_En_6_Chapter.html#Fig15).


    ![A421548_1_En_6_Fig15_HTML.jpg](A421548_1_En_6_Fig15_HTML.jpg)


    Figure 6-15. Initial reports interface


    If you see anything except this screen, then something went wrong with your installation
    or configuration of SQL Server Reporting Services. Sometimes, depending on the
    operating system and the browser settings that you currently have in place, you
    might get an error screen. In this instance, you may need to run your browser
    instance as a local administrator (if you’re running on a local computer). It’s
    doubtful that you need to uninstall everything, so that’s the good news. In the
    event of an error at this point, it is recommended to take a look at the `Reporting
    Services error log`.


    ## Summary


    This is a good time to stop and take a breather for a second. We’ve actually done
    quite a bit in these past few pages, so let’s recap.


    *   Verified that Reporting Services installed correctly

    *   Configured our new installation of Reporting Services

    *   Verified that the web portal is working as advertised


    Note that there is no content yet in the web portal. This is to be expected, as
    it is a brand-new installation and we haven’t begun writing reports yet.


    In the next chapter, we install and configure Report Builder, which we use to
    create the reports that consume the R data for use in our reports. Configure an
    account to be used by subscriptions to access file shares. Use an account with
    as minimum permissions as possible and an account that is different from the account
    used for the Reporting Services service account.'
