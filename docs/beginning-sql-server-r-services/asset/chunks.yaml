    这对我来说更容易阅读和理解。在图 4-19 所示的蓝色栏正上方，列被定义为名称、值、类和类型。在那里浏览一会儿，熟悉它的样子。这是一个非常酷的功能，允许在真正分析数据之前对其进行自省。


    接下来转到第 118 行。这一行写着 `head(diamonds)`，它简单地指示 R 输出数据集中的前六行数据。相反，第 121 行写着 `tail(diamonds)`，正如你可能猜到的，输出数据集中的最后六行数据。这两次执行的结果如图
    4-20 所示。


    ![A421548_1_En_4_Fig20_HTML.jpg](img/A421548_1_En_4_Fig20_HTML.jpg)


    图 4-20.

    `head()` 和 `tail()` 演示


    下一个是第 127 行，写着 `dim(diamonds)`。`dim()` 函数允许我们查看作为参数传递的对象的维度，这里就是 `diamonds`。执行这一行只是显示了我们之前通过检查变量资源管理器已经收集到的信息：返回了一个数据集，包含
    10 个变量的 53940 个对象。


    接下来，我们进入 R 中的绘图部分。在 R 中用于绘图有三个主要的包：`base`、`lattice` 和 `ggplot2`。这也体现在第 136 行。


    第 133 行和 134 行如下所示：


    ```

    diamondSample <- diamonds[sample(nrow(diamonds), 5000) ,]

    dim(diamondSample)

    ```


    在继续之前，让我们分解一下这个语法。


    *   `diamondSample`：声明一个对象用于存储命令的结果。

    *   `<-`：赋值运算符，声明右边命令的结果将被赋给左边的对象。

    *   `diamonds`：引用 `diamonds` 数据集。

    *   `[sample(nrow(diamonds), 5000), ]`：从 `diamonds` 数据集中随机抽取 5000 个数据点。

    *   `dim(diamondSample)`：显示 `diamondSample` 对象的维度。


    正如预期的那样，`dim(diamondSample)` 命令的结果是输出 `[1] 5000   10`，这意味着返回了一个数据集，包含 10 个变量的
    5000 个对象。


    接下来，我们转到第 140 行，内容是：`theme_set(theme_gray(base_size = 18))`。这意味着我们将字体大小设置为 18pt
    并使用灰色主题。高亮显示并执行该行，然后跳到第 143 和 144 行。那些行显示以下代码：


    ```

    ggplot(diamondSample, aes(x = carat, y = price)) +

    geom_point(colour = "blue")

    ```


    首先，请注意这是在两行上，但它实际上是一个长命令。加号的存在表示一个续行符，这是在函数或参数内部使用之外的情况。


    在我们继续之前，让我们看一下这个命令的语法。


    *   `ggplot`：定义要执行的函数。

    *   `diamondSample`：引用 `diamondSample` 对象作为活动数据集。

    *   `aes`：定义图表的美学品质；在这个例子中，x 轴是 `carat` 集，y 轴是 `price` 集。

    *   `geom_point`：在点被绘制后对其进行自定义。


    所以这意味着我们将生成一个图表。高亮显示这两行并按 Ctrl+Enter 执行它们。图 4-21 显示了此操作的结果。


    ![A421548_1_En_4_Fig21_HTML.jpg](img/A421548_1_En_4_Fig21_HTML.jpg)


    图 4-21.

    我们的第一个图表！


    注意到 R 绘图窗口在这里获得了焦点吗？这非常方便。还要注意 x 轴是 `carat`，y 轴是 `price`，正如我们在 `aes()` 命令中定义的那样。


    接下来转到第 147 到 149 行。你会看到有一个非常轻微的添加：`scale_x_log10()`。这为我们提供了 x 轴上一个很好的对数刻度（这也在第
    146 行中说明），所以现在继续高亮显示并执行第 146 到 149 行。图 4-22 显示了你现在应该看到的内容。


    ![A421548_1_En_4_Fig22_HTML.jpg](img/A421548_1_En_4_Fig22_HTML.jpg)


    图 4-22.

    添加对数刻度


    现在开始更有意义了。接下来，添加了另一行，让我们在 y 轴上添加另一个对数刻度。这是在第 152 到 155 行；所以高亮显示这些行并按 Ctrl+Enter
    执行它们。图 4-23 显示了你现在应该看到的内容。


    ![A421548_1_En_4_Fig23_HTML.jpg](img/A421548_1_En_4_Fig23_HTML.jpg)


    图 4-23.

    在 x 和 y 轴上应用对数刻度


    我认为，现在这个图表更好了。'
- fmt: '## Linear Regression in R


    Next, we look at linear regression in R within the confines of the loaded dataset.
    Linear regression is basically the way that statisticians define the relationship
    between a scalar variable and one or many explanatory variables. Simple linear
    regression is when there is only one explanatory variable, which is essentially
    what we are dealing with in this example.


    In R, we must first build a model of the data before we can access that model.
    To do that, take a look at line 163, which says `model <- lm(log(price) ∼ log(carat)
    , data = diamondSample)`. Again, let’s look at the syntax of this before we move
    on.


    - `model`: Defines the object that inherits what is defined in the command.

    - `<-`: An assignment operator that declares that the result of the command(s)
    on the right are to be assigned to the object on the left.

    - `lm`: Defines a linear model.

    - `log(price)`: A logarithmic scale of the `price` data (also the scalar variable).

    - `∼`: Separates the scalar variable and the explanatory variable(s). Scalar variables
    are shown to the left of this symbol and explanatory variables are shown to the
    right.

    - `log(carat)`: A logarithmic scale of the `carat` data (also the explanatory
    variable).

    - `, data = diamondSample`: Defines the data object to be used (`diamondSample`,
    in this case).


    Highlight line 163 and execute it. Notice that there is no discernible action
    taken in the IDE, so let’s check the Variable Explorer again. There is now another
    data object in there referenced as `model`. Figure [4-24](#A421548_1_En_4_Chapter.html#Fig24)
    shows what you should be looking at now.


    ![A421548_1_En_4_Fig24_HTML.jpg](A421548_1_En_4_Fig24_HTML.jpg)

    Figure 4-24. `model` dataset


    Line 166 simply says `summary(model)`. Go ahead and execute that line. A lot of
    information is shown in the R Interactive window now. Take a look at Figure [4-25](#A421548_1_En_4_Chapter.html#Fig25).


    ![A421548_1_En_4_Fig25_HTML.jpg](A421548_1_En_4_Fig25_HTML.jpg)

    Figure 4-25. `summary(model)` information


    Take a look at what is returned by this action. You have a lot of really useful
    information returned about the model here, so understand that this is a great
    place to get meaningful statistical information about a model.


    Head on down to lines 170 through 172, which show the following code:


    ```

    coef(model)

    coef(model)[1]

    exp(coef(model)[1])

    ```


    Line 169 says that we extract the model coefficients. Let’s highlight those lines
    and execute them now. Figure [4-26](#A421548_1_En_4_Chapter.html#Fig26) shows
    what you should see in your R Interactive window now.


    ![A421548_1_En_4_Fig26_HTML.jpg](A421548_1_En_4_Fig26_HTML.jpg)

    Figure 4-26. `model` coefficients


    Now that we’ve got that, let’s take a look at the next bit of code on lines 175
    through 179. This code is defined as follows:


    ```

    ggplot(diamondSample, aes(x = carat, y = price)) +

    geom_point(colour = "blue") +

    geom_smooth(method = "lm", colour = "red", size = 2) +

    scale_x_log10() +

    scale_y_log10()

    ```


    We’ve already stepped through the syntax of this command, but I see that there
    is a line that says `geom_smooth(method = "lm", colour = "red", size = 2) +` that
    we didn’t define before. The addition of this line of code adds a thin red trend
    line to the chart. Highlight these lines and execute them now. Figure [4-27](#A421548_1_En_4_Chapter.html#Fig27)
    shows what you should see as a result.


    ![A421548_1_En_4_Fig27_HTML.jpg](A421548_1_En_4_Fig27_HTML.jpg)

    Figure 4-27. Charted result


    That is one meaningful chart! The charts are getting progressively better and
    more interesting, as you can see.


    ## Regression Diagnostics


    Next, go down and take a look at lines 190 through 192. They are defined as follows:


    ```

    par(mfrow = c(2, 2))

    plot(model, col = "blue")

    par(mfrow = c(1, 1))

    ```


    So in this example, we set the plot layout to generate a 2×2 grid of charts, show
    the plotted information within the model dataset, and then reset the plot layout
    back to a 1×1 grid again. Let’s take a further look at the syntax of these statements.


    - `par`: This function combines multiple different charts into a single chart
    as specified by the `mfrow()` argument.

    - `mfrow = c(2, 2)`: This argument passes in the values for (`rows` × `columns`),
    which determine how the grid is laid out on the stage.

    - `plot(model, col = "blue")`: This function determines what is to be plotted
    (`model`) and the color (`col`) of the plotted data points.


    Feel free to play around with this or any other function a bit, just to get a
    feel for what the syntax does and how the subtle changes you make to the functions
    affect the generated output. I typically find this to be a great way to learn
    about the functions, so maybe you will like this method as well. For example,
    change the `col` value to blue or green, and see what happens to your charts.
    Change the `c()` value to `c(3, 3)` instead of `c(2, 2)`. Notice how the charts
    are realigned.


    **Tip**

    If you ever get stuck with an error that says `Error in plot.new(): figure margins
    too large`, run the commands `dev.off()` and `par(mar=c(1,1,1,1))` to clear the
    error. They may need to be run multiple times to reset the graphics component.
    Huge thanks to Stack Overflow ([`http://stackoverflow.com`](http://stackoverflow.com/))
    for this tip!


    Highlight lines 190 through 192 and execute them. Figure [4-28](#A421548_1_En_4_Chapter.html#Fig28)
    shows what you should now see.


    ![A421548_1_En_4_Fig28_HTML.jpg](A421548_1_En_4_Fig28_HTML.jpg)

    Figure 4-28. Multiple chart results


    That looks fantastic. Notice how most of the data points lay fairly close the
    red line? That indicates that this dataset is pretty reliable and does not contain
    an overwhelming number of outliers.'
