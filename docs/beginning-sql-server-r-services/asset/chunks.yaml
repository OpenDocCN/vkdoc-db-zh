    Logarithmic scale on x and y axes


    The chart is even better now, I think.


    Next, we look at linear regression in R within the confines of the loaded dataset.
    Linear regression is basically the way that statisticians define the relationship
    between a scalar variable and one or many explanatory variables. Simple linear
    regression is when there is only one explanatory variable, which is essentially
    what we will be dealing with in this example.


    In R, we must first build a model of the data before we can access that model.
    To do that, take a look at line 163, which says `model <- lm(log(price) ∼ log(carat)
    , data = diamondSample)`. Again, let’s look at the syntax of this before we move
    on.


    *   model: Defines the object that inherits what is defined in the command.

    *   <- : An assignment operator that declares that the result of the command(s)
    on the right are to be assigned to the object on the left.

    *   lm: Defines a linear model.

    *   log(price): A logarithmic scale of the `price` data (also the scalar variable).

    *   ∼ : Separates the scalar variable and the explanatory variable(s). Scalar
    variables are shown to the left of this symbol and explanatory variables are shown
    to the right.

    *   log(carat): A logarithmic scale of the `carat` data (also the explanatory
    variable).

    *   ,data = diamondSample: Defines the data object to be used (`diamondSample`,
    in this case).


    Highlight line 163 and execute it. Notice that there is no discernible action
    taken in the IDE; so let’s check the Variable Explorer again. There is now another
    data object in there referenced as `model`. Figure [2-45](#A421548_1_En_2_Chapter.html#Fig45)
    shows what you should be looking at now.


    ![A421548_1_En_2_Fig45_HTML.jpg](A421548_1_En_2_Fig45_HTML.jpg)


    Figure 2-45.


    model dataset


    Line 166 simply says `summary(model)`. Go ahead and execute that line. A lot of
    information is shown in the R Interactive window now. Take a look at Figure [2-46](#A421548_1_En_2_Chapter.html#Fig46).


    ![A421548_1_En_2_Fig46_HTML.jpg](A421548_1_En_2_Fig46_HTML.jpg)


    Figure 2-46.


    summary(model) information'
