- fmt: '### A First Look at R


    Navigate to `RTVS-docs-master\examples\A first look at R` and double-click the
    `README.MD` file in that directory. Figure [2-29](#A421548_1_En_2_Chapter.html#Fig29)
    shows what you should see at this point.


    ![A421548_1_En_2_Fig29_HTML.jpg](A421548_1_En_2_Fig29_HTML.jpg)


    Figure 2-29. A first look at R README


    That document tells us that we get to “take R for a test drive” by running R scripts
    provided by Microsoft in the `.zip` file that we downloaded earlier. Navigate
    back to the `RTVS-docs-master\examples\A first look at R` directory and double-click
    `1-Getting_Started_with_R.R`. The script is opened in RTVS, as shown in Figure
    [2-30](#A421548_1_En_2_Chapter.html#Fig30).


    ![A421548_1_En_2_Fig30_HTML.jpg](A421548_1_En_2_Fig30_HTML.jpg)


    Figure 2-30. Getting Started with R script


    At this point, all that we are going to do is step into this R script and execute
    some portions to get an idea of how R is laid out syntactically and how it might
    compare to other languages. We pretty much go line by line through the Getting
    Started with R script so that we can really understand what this introduction
    is getting across.


    It is worthwhile to read through the first 75 lines of comments, as this sets
    up your basis as a new R user, or refreshes your memory if you’re a legacy R user.
    Either way, there is something for everyone here, so be sure you read it thoroughly,
    particularly the R Resources and R Blogs sections. The Help section is always
    good, so don’t skip over that one either.


    Line 76 is the first executable R script. That line is very simply `installed.packages()`.
    This simple line lets us see what packages are already installed; so highlight
    line 76 and press `Ctrl+Enter` to execute it. Note that your R Interactive window
    (which should still be up) starts loading up a lot of information, as shown in
    Figure [2-31](#A421548_1_En_2_Chapter.html#Fig31).


    ![A421548_1_En_2_Fig31_HTML.jpg](A421548_1_En_2_Fig31_HTML.jpg)


    Figure 2-31. R Interactive window


    You can scroll up in the R Interactive window to see exactly what happened, but
    it’s strictly informational, at this point. It can be useful to peruse this generated
    content to ensure that you have the latest version of an installed package, for
    example, but for general use, it’s good to know that it’s there.


    Note there is now a value in the R History window as well. This is very handy
    in case we ever need to re-execute a line of code. All you need to do is highlight
    the code you want to re-execute and press `Enter`. This moves the code from the
    R History window to the R Interactive window. From here, press `Ctrl+Enter` to
    execute the line of code as normal.


    Highlight line 79, which reads `search()`, and execute it. This gives us a listing
    of the currently loaded packages for this R session. Next, we attach a package
    using the `library()` function, which is how R makes functionality particular
    to a specific package available to the session.


    Skip down to line 85, which reads `library(foreign)`. This means that we include
    the `foreign` library functionality in the current session. Highlight line 85
    and press `Ctrl+Enter` to execute it. As soon as you see the caret at the bottom
    of the R Interactive window turn back to the greater than sign (`>`), then you
    know that the code has completed executing. Figure [2-32](#A421548_1_En_2_Chapter.html#Fig32)
    shows what you should see at this point.


    ![A421548_1_En_2_Fig32_HTML.jpg](A421548_1_En_2_Fig32_HTML.jpg)


    Figure 2-32. Line 85 execution


    This isn’t in the R script we are working with, but if you go back now and execute
    line 79 again, you should see what is shown in Figure [2-33](#A421548_1_En_2_Chapter.html#Fig33).


    ![A421548_1_En_2_Fig33_HTML.jpg](A421548_1_En_2_Fig33_HTML.jpg)


    Figure 2-33. Line 79 execution showing foreign library


    Note how R Interactive shows the listed items? It is done in groups of four, with
    the starting n-index number being shown as the leftmost column, followed by four
    packages. The next line begins with the n+4 index, and then lists another four
    packages, and so on. Now see how the first execution of `search()` showed 12 packages,
    but we can now see 13 packages returned in the newly returned `search()` command.
    We can see the addition of the `foreign` package as the reason for this, so that
    is our proof that the package was successfully added to our current R session.


    When packages are added to the R mirrors, they always include a Help section.
    You can reference this Help section by highlighting line 88 and pressing `Ctrl+Enter`.
    This opens the help documentation as another page within the top frame in RTVS.
    Figure [2-34](#A421548_1_En_2_Chapter.html#Fig34) shows this result.


    ![A421548_1_En_2_Fig34_HTML.jpg](A421548_1_En_2_Fig34_HTML.jpg)


    Figure 2-34. Help documentation for foreign library


    You can close that documentation. Next, skip down to line 90. We are going to
    install `ggplot2`, which is probably the most popular and robust charting package
    available for R. Highlight line 92 through 94 and press `Ctrl+Enter` to execute.
    Figure [2-35](#A421548_1_En_2_Chapter.html#Fig35) shows the result of this.


    ![A421548_1_En_2_Fig35_HTML.jpg](A421548_1_En_2_Fig35_HTML.jpg)


    Figure 2-35. Loading ggplot2 package


    Now that `ggplot2` is loaded, we need to run the `library()` function in order
    to load it into the current R session. This is shown in line 97; highlight this
    line and execute it, and then execute line 98 as well. Line 98 says `search()`
    shows the currently loaded packages. Notice that `ggplot2` is now added to the
    list of currently installed packages for this session.


    Next, we look at a simple regression example, as shown in the script. First, I
    need to point out that the `ggplot2` package comes preloaded with quite a few
    sets of data that is to be used to test the functionality of the package. This
    data is accessed as shown on line 105, using the syntax `data(package = "ggplot2")$results`.
    This syntax says that we want to run the `data()` function against the `ggplot2`
    package and return the subset of the output referenced as `results` to the screen,
    as shown in Figure [2-36](#A421548_1_En_2_Chapter.html#Fig36).


    ![A421548_1_En_2_Fig36_HTML.jpg](A421548_1_En_2_Fig36_HTML.jpg)


    Figure 2-36. ggplot2 results


    Consequently, we could also execute the command `data(package = "ggplot2")` to
    see a listing of the datasets included in the package. Figure [2-37](#A421548_1_En_2_Chapter.html#Fig37)
    shows this result.


    ![A421548_1_En_2_Fig37_HTML.jpg](A421548_1_En_2_Fig37_HTML.jpg)


    Figure 2-37. ggplot2 Datasets


    Go ahead and close that window, but keep your R script open. We’ve got the executed
    result of `data(package = "ggplot2")$results` shown in the R Interactive window,
    so skip down to line 109 next. This line says `data(diamonds, package = "ggplot2")`.
    The syntax of this says that we want to run the `data()` command against the `diamonds`
    dataset in the `ggplot2` package. Highlight that line and press `Ctrl+Enter` to
    execute it. There isn’t any huge change or anything here; all that happened was
    that the `diamonds` dataset was just made available for analysis. The way you
    know that it was just loaded is to check your Variable Explorer window. Figure
    [2-38](#A421548_1_En_2_Chapter.html#Fig38) shows what the Variable Explorer window
    should look like at this point.


    ![A421548_1_En_2_Fig38_HTML.jpg](A421548_1_En_2_Fig38_HTML.jpg)


    Figure 2-38. diamonds dataset loaded'
