  trans: "\n### 第一阶段：需求收集\n\n此阶段包括软件和硬件定义两部分。这也许是整个流程中最关键的阶段，因为如果此处有误或不完整，将影响其后的所有阶段。因此，我们需要百分之百确保我们的定义是完整的，并获得所有相关方和利益相关者的同意。此阶段需要开发团队创建一套文档，由开发团队交付给客户，并由客户签字并注明日期。至此，该文档集便被视为项目的官方范围。\n\
    \n在这个需求收集阶段需要做些什么？以下是需要完成的事项清单。\n\n*   开发团队需要编写一份 `软件需求文档`。\n    *   需要清晰定义一个问题或议题。\n\
    \        *   尽可能从客户那里获取尽可能多的细节，包括这个问题如何影响他们的日常工作，或者增加某个功能后他们的工作能变得多么高效。\n    *\
    \   需要对所述问题提出一个大致的解决方案。\n        *   这意味着暂时不需要深入细节。如果可能，提供多种不同的解决方案，以便客户了解他们不同的选择。\n\
    *   需要确定软件语言和技术。\n    *   提供用于开发接口或应用程序的语言和技术的详细信息。\n*   需要确定交付媒介。\n    *   即它将以何种形式交付；通常是基于\
    \ Web 的，或是桌面应用程序。\n*   开发团队需要编写一份结构化的 `软件设计文档`。\n    *   此文档提供呈现给客户的接口的详细信息。需要向客户指出，该接口很可能会随着时间推移发生细微变化，这取决于当前的\
    \ Web 或桌面趋势以及所用语言中可用的选项。此文档的大部分内容将由模拟屏幕截图和报告场景组成。\n*   开发团队需要编写一份结构化的 `数据库需求文档`。\n\
    \    *   此文档提供关于将创建的数据库表和脚本的详细信息，这些内容将呈现接口，并最终向客户呈现整个解决方案。请注意，此文档同时涵盖了数据库的设计和需求。这样做的原因是，客户在很大程度上并不关心数据库的琐碎细节，如数据类型或字段长度。虽然这些信息当然可以在另一份文档中提供给客户，但或许最好将这些信息保持在相对疏远的位置，以免（从客户的角度）用无意义的信息使他们不知所措。这份文档的整体目的是什么？比你最初意识到的要重要得多。例如，此文档可用于为将来与不同远程数据库的交互提供数据库映射。因此，务必将其作为最后创建的文档，以防数据库发生某些变更而文档未能反映这一变化。\n\
    \n这份清单代表了我认为作为正式请求的一部分需要交付的最低限度的文档。可能还有更多，但这已经是一个良好的开端。\n\n一旦此阶段完成并生成了文档集，就需要正式的验收和签字。必须向客户清楚地说明，在文档签署且开发开始后，不允许进行任何形式的更改。如果确实需要进行更改，你有两个选择。你可以开始一个螺旋式开发过程，或者实施一个\
    \ `软件变更请求系统`。我强烈推荐使用 `软件变更请求系统`。两者有何区别？\n\n### 螺旋式开发过程\n\n螺旋式开发是一种特别糟糕的开发形式，发生在项目中实际允许并鼓励范围蔓延时。太可怕了！你能看出允许过多范围蔓延的后果吗？没错；项目永远不会真正完成。项目会持续停留在定义和开发阶段，永远无法进展到完成。\n\
    \n对于我们这些按项目收费的人来说，鼓励范围蔓延是完全不可接受的。可以这样想：如果你估计一个项目需要 10 小时，并且你为这个项目收费 500 美元，那么你每小时赚\
    \ 50 美元。然而，并不能保证你能在 10 小时内完成。假设它花了你 20 小时；那么你现在的时薪是 25 美元。更糟的是，它花了你 100 小时。哇！你每小时只赚\
    \ 5 美元。\n\n显然，这不是你想要的工作方式。相反，你只应交付双方同意的内容，任何变更都被视为 `超出` 预估和已支付范围，并受制于新的协议。根据我的经验，我可以告诉你，当对期望完成的工作有非常清晰的定义时，这会让每个人都感到满意。\n\
    \n螺旋式开发过程的另一个危险，就像我说的：项目永远不会真正完成。它只是无休止地持续下去，因为客户得到了超出他们所支付的东西，而开发者往往过于胆怯，不敢指出某些事情实际上超出了项目约定的范围。这对你适用吗？你愿意获得这样的名声吗？——花时间走完所有正确管理技巧的流程，却在项目中途向客户未经证实的变更请求让步？我想你不会。我想我们都希望获得这样的声誉：一个有能力的开发者，有诚信去指出客户可能或明显偏离合同、或期望偏离合同的行为。在这种情况下，合同中需要有一个明确定义的补救条款，专门处理强制执行原始合同及其范围所需的具体步骤。\n\
    \n### 软件变更请求过程\n\n我推荐在项目及其范围发生变更时使用正式的变更请求。原因很简单：项目保持结构化！初始项目完成并被标记为 `v1.0`，对吧？之后你进行的任何更改，对于小的变更可以是\
    \ `v1.1`，对于重大变更可能是 `v2.0`。`软件变更请求过程` 包含一个工作流中需要遵循的不同步骤，以促成一个完整的变更请求。这不是客户发一封 `电子邮件`；而是一个完整的过程，在工作流的每一步都需要签字确认。\n\
    \n#### 请求提交\n\n在此步骤中，任何用户都可以请求对软件进行更改。不过，请求需要完整且有条理，不能只是像“我想把一块石头涂成蓝色”这样模糊的陈述。请求提交通常是一个相当复杂的步骤，用户被迫提供大量与请求相关的信息。确保不仅要收集客户信息，还要收集需要完成的具体任务。\n\
    \n#### 管理员批准\n\n管理员随后会收到一个变更已被请求的通知。此时，管理员可以接受或拒绝该变更。也存在管理员可能联系请求者以获取更多信息，然后拒绝该请求，以便发起人可以详细阐述原始请求的情况。这非常常见，因为十有八九，普通用户不理解正确满足其请求所需的复杂需求。\n"
- fmt: "# Software Development Workflow\n\n## Design\nOnce you have an accepted request,\
    \ the first step is to design the solution. Sometimes, literally drawing out the\
    \ solution is best. It gives you a good idea of what to expect for layout and\
    \ the space necessary to fulfill the solution. The customer expects to see something\
    \ like screen mockups in `Photoshop` or something similar, more than likely in\
    \ a `PDF`. This isn’t always a requirement, but if the user wants to be kept aware\
    \ of the progress of the request, then it is a good idea. Either way, whether\
    \ the customer is involved or not, it’s always worth taking a few minutes to sketch\
    \ out a quick picture and perhaps a short pseudo code example of what is going\
    \ on.\n\n## Code\nNext is the fun part: writing the code. This could be in whatever\
    \ language is necessary to get the job done, and whatever is used to deliver solutions\
    \ in your application. In some cases, you have multiple languages. In web development,\
    \ this is very common. I often use a pretty steady mixture of `HTML`, `ColdFusion`,\
    \ `CSS`, and `jQuery` in my day-to-day application building. Some days are heavier\
    \ in certain languages than others, but that’s just about the gist of what I do.\
    \ This is the second-longest activity in the process though; the longest is …\
    \ the documentation.\n\n## Document\nEasily the most overlooked part of development\
    \ is the documentation of the changes made. Make sure that this step is followed\
    \ religiously! This is different from the inline documentation that all good developers\
    \ do regularly. Those are fantastic too, don’t get me wrong. This documentation,\
    \ specifically, is for the user. It consists of two documents, but they really\
    \ only see one of them. One of the documents needs to define the request and the\
    \ steps taken to implement the request. The reason for this is so that the change\
    \ can be essentially rewound, if necessary. The second document is the test script\
    \ for the user to test the change. This needs to be fairly simple and straightforward;\
    \ something along the lines of “Click the OK button.” It needs to be spelled out\
    \ exactly what is expected to happen when an action occurs, and what the failure\
    \ condition is as well.\n\n## Unit Test\nThis means testing the solution by itself,\
    \ in a modular setting. Does it do what is required by itself, or is interaction\
    \ with another unit or module necessary? It should be as tightly contained as\
    \ possible, in other words. If it requires other things to run, you maybe want\
    \ to reconsider this particular technique. Is it possible that it can be rewritten\
    \ to be cleaner and more modular using native code? These are questions that must\
    \ be answered objectively in this phase.\n\n## Regression Test\nThis is where\
    \ you test the solution as part of an over-arching solution that encompasses the\
    \ entire application. In other words, how does this solution work with the current\
    \ application? Does it “mesh” or is it inconsistent and in need of further work?\
    \ Most times, it seamlessly integrates, but other times—not so much. For this\
    \ reason, it is best to look at the change as part of the application as a whole,\
    \ instead of as the modular way in the unit test. Consider the success and failure\
    \ paths of the change (if there are separate paths). Do they make sense, considering\
    \ the paths of the rest of the system? How well does it do what it is billed to\
    \ do?\n\n## Acceptance Test\nThis is after the solution has passed all the other\
    \ tests and documentation is complete. This is the only step that the requesting\
    \ user should see. Everything else should be a black box to that user, lest you\
    \ fall into the spiral development trap. Don’t do it! This step is very simply\
    \ a single line stating that the customer agrees to the change and it was delivered\
    \ as expected. A signature and the current date is all that is needed to complete\
    \ this step.\n\n## Installation\nAfter the solution has been accepted by the customer,\
    \ it needs to be installed. This is sort of obvious, but still a necessary part\
    \ of the process. This needs to be documented as well, although much more leniently.\
    \ Make sure you take a backup of the database immediately before the installation.\
    \ I recommend a server image if you’re running a virtual instance, or a system\
    \ image with backup if you’re on a regular server. The reason for this should\
    \ be clear; to recover quickly in case everything goes pear-shaped. Once everything\
    \ loads correctly, delete any backups to retain space on your system.\n\n## Archiving\n\
    Finally, after installation, the solution needs to be archived. This entails two\
    \ things: first, the solution should be zipped with all documentation and added\
    \ to a source repository of some kind. I’ll leave it to you to decide which to\
    \ use. Second, the physical record of the request on the web site or bulletin\
    \ board should be removed and added to an archived or completed section for later\
    \ review, if necessary.\n\nPlease note that the preceding workflow is not all\
    \ encompassing, but rather is intended to get you started with understanding exactly\
    \ what a software change request workflow looks like.\n\nSo now you understand\
    \ what scope creep and spiral development mean and how they are both detrimental\
    \ to a project. You also understand the software change process and how it is\
    \ beneficial to just about any system. What’s next? Let’s continue to define the\
    \ separate phases of the project definition, and then discuss some more factors\
    \ contributing to the success and sometimes to the failure of the project.\n\n\
    ## Phase II: Initial Interface Design\nThis phase allows the developer to create\
    \ an initial user interface, if applicable. Sometimes, projects don’t have an\
    \ interface, because they happen “under the covers.” If that’s the case with your\
    \ project, just skip to the next phase. If that’s not the case, and you have to\
    \ create an interface, then this is the place for you.\n\nInitial interface design\
    \ is fairly self-explanatory: you want to create an initial interface based on\
    \ the requirements documents and by using any other information gathered from\
    \ the customer. Note that this does not involve going back to the customer for\
    \ ideas or suggestions. Basically, they had their chance to suggest implementation\
    \ changes before, and it is simply too late to implement them now, without falling\
    \ into the dreaded spiral development cycle. Remember how you got the customer\
    \ to sign off on the scope of the project? Just like they aren’t allowed to come\
    \ to you, you technically shouldn’t go back to them. If you discover an authentic\
    \ issue with the way that the interface needs to be implemented, or an issue that\
    \ is preventing you from completing the job, then you obviously want to interact\
    \ with the customer. The point to this is “training the customer” to understand\
    \ that you work strictly from the requirements document and nothing more. That\
    \ way, when you deliver what was requested, you know that it is technically and\
    \ functionally 100% correct, according to the requirements document.\n\nWe have\
    \ already gathered our requirements, which I lay out in the example download for\
    \ this book. The download contains our requirements documents and initial dataset.\
    \ Make sure that you have these following two documents, or you will have a really\
    \ hard time following along; they are available from this book’s catalog page\
    \ on the publisher’s web site:\n\n* ```\n  Software Requirements Document.docx\n\
    \  ```\n\n* `Weather_Sample.csv`\n\nFor reference, the `Weather_Sample.csv` file\
    \ is the same document provided in the download available from Microsoft that\
    \ we downloaded earlier. We use the same example in this book by permission.\n\
    \nWith that in mind, let’s take a look at the reports that we have agreed to provide\
    \ and plan out a solution."
