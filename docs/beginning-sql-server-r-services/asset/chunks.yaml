  raw: '### Why R?


    Good question. Why R? The answer is actually quite simple… I think because Microsoft
    wants to expand their reach into the data science field with SQL Server, so it
    makes sense that they would want the best product out there for data analysis,
    which is arguably R. Microsoft’s Business Intelligence offerings are already extremely
    sharp, so if they could find a way to …


    *   Acquire a data analysis product already in heavy usage

    *   Incorporate that product into their existing database platform

    *   Offer a GUI which integrates seamlessly into Visual Studio

    *   Make it all available for free


    … then the (data analysis) world would be their oyster! To my knowledge, there
    isn’t any other database system that will allow for such complete interaction
    with R. There are plenty of instances where data is prepared in a database and
    then imported to R, but this is a totally different level of interaction.


    SQL Server 2016 actually runs an instance of the R engine as native to the database
    engine. Fascinating! For those of you that have worked with SQL Server when they
    radically changed to SQL Server 2005, you remember the shock of Integration Services
    and “what happened to my DTS scripts??” This is on that same sort of level; for
    those intrigued by data analysis or business intelligence, the implications of
    the addition of R are guaranteed to be long-reaching and will most certainly result
    in some amazing advancements in data science. I, for one, can’t wait to be a part
    of that.


    Also, just to get this out of the way…


    ```

    The MIT License (MIT)

    Copyright (c) 2016 Microsoft

    Permission is hereby granted, free of charge, to any person obtaining a copy of
    this software and associated documentation files (the "Software"), to deal in
    the Software without restriction, including without limitation the rights to use,
    copy, modify, merge, publish, distribute, sublicense, and/or sell copies of the
    Software, and to permit persons to whom the Software is furnished to do so, subject
    to the following conditions:

    The above copyright notice and this permission notice shall be included in all
    copies or substantial portions of the Software.

    THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR

    IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS
    FOR A

    PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE

    AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER

    LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,

    OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE
    SOFTWARE.

    ```


    In other words, thank you, Microsoft, for letting me use a whole lot of your stuff!
    I really appreciate it.


    If you read my first book, Practical Maintenance Plans in SQL Server (Apress,
    2016), then you are already familiar with my writing style. I tend to try and
    keep the mood a bit light and sometimes quirky, without sacrificing technical
    content. At times, I might divert down a rabbit hole, but I always have a point
    at the end. Most of the time, it might take me a while to get there, but I do
    eventually get there in the end.


    Right now—before we get into installing and setting up our environment—is a great
    time for you to take a few minutes to get familiar with R and what it can do.


    Once you’ve done that, let’s begin our journey as data scientists!


    Acknowledgments


    Another big thanks to both Jonathan Gennick and Jill Balzano for guiding me through
    the process of getting this book published. You guys are awesome.


    To my first mentor once again, John Wysocki, who is currently enjoying semi-retirement
    in some lavish resort somewhere: I can’t thank you enough for stoking the fire
    of creativity in me.


    To my newest mentor, Suzy Moore, who is hands down the smartest person I know:
    I can’t wait to learn more from you.


    To the one and only Chester Flake: Thank you for your guidance on certifications.
    Anyone needing any sort of certification training needs to go to [`www.certificationcamps.com`](http://www.certificationcamps.com)
    and sign up today. You won’t be sorry.


    To my brother Brian, niece Holly, sister-in-law Andie, and Drew, Austin, and Sam:
    Mom said no fireworks past 10:00 PM!


    To my parents Richard and Carolyn, my in-laws Steve and Carey, my out-laws Al
    and Val, other brothers Joe, Rick, Zimmer, and Dave, and other sisters Morgan,
    Erika, Jennifer, Kim, and Michelle, and everyone else I forgot.... Well, you know
    me . . . .


    And finally, to my wife, Jessica, and kids—Josh, Kaylee, Matthew, and Emma, who
    had to deal with me leaving for hours on end while writing this book: Thank you
    so much.


    Oh, yeah…. I can’t forget my best fraaaaaaaand Courtney. She’s such a little cutie
    patootie!!


