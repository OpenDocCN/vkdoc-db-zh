  raw: 'There is now a value in the R History window as well. This is very handy in
    case we ever need to re-execute a line of code. All you need to do is highlight
    the code you want to re-execute and press Enter. This moves the code from the
    R History window to the R Interactive window. From here, press Ctrl+Enter to execute
    the line of code as normal.


    Highlight line 79, which reads `search()` and execute it. This gives us a listing
    of the currently loaded packages for this R session. Next, we attach a package
    using the `library()` function, which is how R makes functionality particular
    to a specific package available to the session.


    Skip down to line 85, which reads `library(foreign)`. This means that we will
    include the `foreign` library functionality in the current session. Highlight
    line 85 and press Ctrl+Enter to execute it. As soon as you see the caret at the
    bottom of the R Interactive window turn back to the greater than sign (>), then
    you know that the code has completed executing. Figure [4-5](#A421548_1_En_4_Chapter.html#Fig5)
    shows what you should see at this point.


    ![A421548_1_En_4_Fig5_HTML.jpg](A421548_1_En_4_Fig5_HTML.jpg)


    Figure 4-5.


    Line 85 execution


    This isn’t in the R script we are working with, but if you go back now and execute
    line 79 again, you should see what is shown in Figure [4-6](#A421548_1_En_4_Chapter.html#Fig6).


    ![A421548_1_En_4_Fig6_HTML.jpg](A421548_1_En_4_Fig6_HTML.jpg)


    Figure 4-6.


    Line 79 execution showing foreign library


    Note how R Interactive shows these listed items? It is done in groups of four,
    with the starting n-index number being shown as the leftmost column, followed
    by four packages. The next line begins with the n+4 index, and then lists another
    four packages, and so on. Now see how the first execution of `search()` showed
    12 packages, but we can now see 13 packages returned in the newly returned `search()`
    command. We can see the addition of the `foreign` package as the reason for this,
    so that is our proof that the package was successfully added to our current R
    session .


    When packages are added to the R mirrors, they always include a Help section.
    You can reference this Help section by highlighting line 88 and pressing Ctrl+Enter.
    This opens the help documentation as another page within the top frame in RTVS.
    Figure [4-7](#A421548_1_En_4_Chapter.html#Fig7) shows this result.


    ![A421548_1_En_4_Fig7_HTML.jpg](A421548_1_En_4_Fig7_HTML.jpg)


    Figure 4-7.


    Help documentation for foreign library


    You can close that documentation. Next, skip down to line 90\. We are going to
    install `ggplot2`, which is probably the most popular and robust charting package
    available for R. Highlight line 92 through 94 and press Ctrl+Enter to execute.
    Figure [4-8](#A421548_1_En_4_Chapter.html#Fig8) shows the result of this.


    ![A421548_1_En_4_Fig8_HTML.jpg](A421548_1_En_4_Fig8_HTML.jpg)


    Figure 4-8.


    Loading ggplot2 package


    Now that `ggplot2` is loaded, we need to run the `library()` function in order
    to load it into the current R session. This is shown in line 97; highlight this
    line and execute it, and then execute line 98 as well. Line 98 says `search()`,
    which if you recall, shows the currently loaded packages. Notice that `ggplot2`
    is now added to the list of currently installed packages for this session.


    ## R Package Manager


    The installation of R Tools for Visual Studio includes an R Package Manager. If
    you navigate to R Tools ➤ Windows and choose Packages, shown in Figure [4-9](#A421548_1_En_4_Chapter.html#Fig9),
    a page opens, showing you a lot of really cool information about the installed
    R packages, as shown in Figure [4-10](#A421548_1_En_4_Chapter.html#Fig10).


    ![A421548_1_En_4_Fig10_HTML.jpg](A421548_1_En_4_Fig10_HTML.jpg)


    Figure 4-10.


    R Package Manager


    ![A421548_1_En_4_Fig9_HTML.jpg](A421548_1_En_4_Fig9_HTML.jpg)


    Figure 4-9.


    Location of Packages selection


    The addition of a package manager is very useful, because otherwise, users would
    be forced to manually manage packages through the command line. While some users
    may be more comfortable with this approach, it is sort of defeating the purpose
    of rapid application development. With this feature, a user can now view their
    installed packages and alternatively choose to update them from this interface
    instead of using `installed.packages()`.


    Feel free to explore around in this area a bit. For example, the top-left corner
    contains three options:


    *   Available: This menu option shows all of the packages available from the current
    CRAN mirror you are currently pointing to. Packages can be downloaded and installed
    by clicking the Install button located on the right of the interface.

    *   Installed: This option shows all the packages currently installed on your
    system. If an update is available to an installed package, a blue icon appears
    in the left pane and an Update button appears in the right pane.

    *   Loaded: This option shows all the packages currently loaded in your project.


    To expound on this information, the Available menu option is shown in Figure [4-11](#A421548_1_En_4_Chapter.html#Fig11).


    ![A421548_1_En_4_Fig11_HTML.jpg](A421548_1_En_4_Fig11_HTML.jpg)


    Figure 4-11.


    Available menu option


    Notice the Install button on the right. Clicking this button installs the currently
    selected package into your R installation.


    The Installed menu option appears as shown in Figure [4-12](#A421548_1_En_4_Chapter.html#Fig12).
    Note that I scrolled to the bottom of the left pane in order to show the updatable
    packages.


    ![A421548_1_En_4_Fig12_HTML.jpg](A421548_1_En_4_Fig12_HTML.jpg)


    Figure 4-12.


    Installed menu option


    Notice that `RUnit` and `survival` both need to be updated. Clicking the RUnit
    package name in the left pane changes the interface to what is shown in Figure
    [4-13](#A421548_1_En_4_Chapter.html#Fig13).


    ![A421548_1_En_4_Fig13_HTML.jpg](A421548_1_En_4_Fig13_HTML.jpg)


    Figure 4-13.


    RUnit needs updating


    Notice that the Update button now appears in the right pane.


    Finally, the Loaded menu option appears, as shown in Figure [4-14](#A421548_1_En_4_Chapter.html#Fig14).


    ![A421548_1_En_4_Fig14_HTML.jpg](A421548_1_En_4_Fig14_HTML.jpg)


    Figure 4-14.


    Loaded menu option


    There isn’t much you can do with this area except see what is already loaded.
    Go ahead and close the R Package Manager window. Let’s continue on.'
