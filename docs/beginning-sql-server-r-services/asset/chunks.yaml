- fmt: 'So there is our `diamonds` dataset, loaded and ready to go. Go down to line
    112 next, which says `ls()`. That line by itself, without any arguments, only
    returns the datasets or functions defined by the user in the current session.
    Running this simple line of code in this instance only results in the output of
    a single word: `diamonds`. The reason for this is that this is the only dataset
    loaded for this session. If you were to execute this line inside of a function
    with no arguments, you would be able to see the local variables for that particular
    function. As you can tell, this can be a useful debugging tool.


    Now go down and execute line 115, which says `str(diamonds)`. This command allows
    us to examine the structure of the dataset passed in as an argument. Figure [2-39](#A421548_1_En_2_Chapter.html#Fig39)
    shows the structure displayed in RTVS.


    ![A421548_1_En_2_Fig39_HTML.jpg](A421548_1_En_2_Fig39_HTML.jpg)


    Figure 2-39.


    `str(diamonds)` output


    Briefly look at the returned data there; you can see that there is a lot of information
    but it appears to be truncated. Have no fear; take a look at your Variable Explorer
    again. You see that there is a very slight change: there is now an indicator next
    to `diamonds`, as opposed to just a table graphic. Click this indicator; you should
    see what is shown in Figure [2-40](#A421548_1_En_2_Chapter.html#Fig40).


    ![A421548_1_En_2_Fig40_HTML.jpg](A421548_1_En_2_Fig40_HTML.jpg)


    Figure 2-40.


    `diamonds` detail information


    This is much easier for me to read and decipher. Across the top, just above the
    blue bar shown in Figure [2-40](#A421548_1_En_2_Chapter.html#Fig40), the columns
    are defined as `Name`, `Value`, `Class`, and `Type`. Go ahead and browse around
    in there for a minute and get familiar with how it looks. This is a very cool
    feature that allows the introspection of data before it is really analyzed.


    Go to line 118 next. This line says `head(diamonds)`, which simply instructs R
    to output the first six rows of data in the dataset. Conversely, line 121 says
    `tail(diamonds)`, which, as you’ve probably guessed, outputs the last six rows
    of data in the dataset. The results of these two executions are shown in Figure
    [2-41](#A421548_1_En_2_Chapter.html#Fig41).


    ![A421548_1_En_2_Fig41_HTML.jpg](A421548_1_En_2_Fig41_HTML.jpg)


    Figure 2-41.


    `head()` and `tail()` demonstrated


    Line 127 is next, which says `dim(diamonds)`. The `dim()` function allows us to
    see the dimension of the object passed as an argument, which would be `diamonds`
    in this case. Executing this line simply shows what we have already gathered by
    examining the Variable Explorer earlier: there is one dataset returned with 53940
    objects of 10 variables .


    Next, we move on to plotting in R. There are three main packages used for charting
    in R: `base`, `lattice`, and `ggplot2`. This is also referenced on line 136.


    Lines 133 and 134 say the following:


    ```

    diamondSample <- diamonds[sample(nrow(diamonds), 5000),]

    dim(diamondSample)

    ```


    Let’s break the syntax of this apart before anything else.


    *   `diamondSample`: Declares an object for storage of the results of the command.

    *   `<-` : An assignment operator that declares that the result of the command(s)
    on the right are to be assigned to the object on the left.

    *   `diamonds`: References the `diamonds` dataset.

    *   `[sample(nrow(diamonds), 5000),]`: draw a random sample of 5000 data points
    from the `diamonds` dataset

    *   `dim(diamondSample)`: show the dimension of the `diamondSample` object


    As expected, the result of the `dim(diamondSample)` command was the output `[1]
    5000   10`, which means that one dataset and 5000 objects in 10 variables were
    returned.


    Next, we go to line 140, which reads: `theme_set(theme_gray(base_size = 18))`.
    This means that we set the font size to 18pt and use the gray theme. Go ahead
    and highlight and execute that line, then skip down to lines 143 and 144\. Those
    lines show the following code:


    ```

    ggplot(diamondSample, aes(x = carat, y = price)) +

    geom_point(colour = "blue")

    ```'
