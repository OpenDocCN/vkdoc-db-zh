    that is the case for your particular environment, then you need to get the service
    name and login information from the server administrator in order to proceed.
    Another way you can go about this is to copy these service names and include them
    in a summary to your system administrator regarding the accounts that were created
    during installation, so that the system administrator can audit the permissions
    for this user as needed. It is important to note here that I am referring to a
    separate individual or entity for “system administrator” that is not a database
    administrator, but rather the Windows-level administrator. The person in charge
    of the operating system level, one step up from the Application layer, in other
    words.


    We only want to change a little bit here; specifically, set the SQL Server Agent
    service Startup Type to Automatic. That is the only change we need to make. Figure
    [1-11](#A421548_1_En_1_Chapter.html#Fig11) shows what you should see at this point.


    ![A421548_1_En_1_Fig11_HTML.jpg](A421548_1_En_1_Fig11_HTML.jpg)


    Figure 1-11.


    Server Configuration updated


    Notice that we cannot set the password for any of these accounts. This is the
    same as it has been for every installation of SQL Server that I have ever seen.
    If you were to change the Account Name box from the default to a custom service
    account name, then the Password box would become active and accept input. Otherwise,
    the password is controlled by SQL Server and Windows.


    Notice also that there is a new Grant Perform Volume Maintenance Task privilege
    to SQL Server Database Engine Service check box underneath the default services
    listed. For what we’re doing in this book, it’s not necessary to check this box.
    In future installations, or for production environments, it would probably be
    a good idea to enable this.


    At this point, all of our services are configured correctly. Notice that we aren’t
    going to bother with the Collation tab. This should have SQL_Latin1_General_CP1_CI_AS
    specified in the tab by default. That’s it. Go ahead and click Next to move on.


    ### Database Engine Configuration


    The next screen is Database Engine Configuration, shown in Figure [1-12](#A421548_1_En_1_Chapter.html#Fig12).
    Here you set options for the engine in four different tabs, as specified in the
    subsections to follow.


    ![A421548_1_En_1_Fig12_HTML.jpg](A421548_1_En_1_Fig12_HTML.jpg)


    Figure 1-12.


    Database Engine Configuration


    #### Server Configuration


    This tab lets you specify the authentication mode and the administrators for this
    instance of the database engine. Because this is just for testing and evaluation,
    I am going to add myself in Windows Authentication Mode as the administrator by
    clicking the Add Current User button at the bottom of the screen and selecting
    Windows Authentication Mode. Figure [1-13](#A421548_1_En_1_Chapter.html#Fig13)
    shows these options selected.


    ![A421548_1_En_1_Fig13_HTML.jpg](A421548_1_En_1_Fig13_HTML.jpg)


    Figure 1-13.


    Server Configuration tab with options'
  trans: '### 安装规则


    此屏幕显示 SQL Server 在执行初步检查以确保全新安装过程中会发生的情况。如果出现任何错误或警告，您应该着手进行修正，以便尽可能顺利地进行安装。


    我的屏幕闪烁了几次，最终停留在如图 1-5 所示的屏幕。


    ![A421548_1_En_1_Fig5_HTML.jpg](img/A421548_1_En_1_Fig5_HTML.jpg)

    图 1-5. 安装规则


    值得注意的是，在此步骤中可能会下载并安装 `SQL Server 2016` 的更新，因此，如果出现包含此信息的提示，请直接安装它。


    因此，除了我的防火墙规则外，一切看起来都很好。由于我的笔记本电脑没有来自网络的连接，所以这应该没问题，因此我将单击 `下一步` 继续。


    ### 功能选择


    现在我们进入选择实际安装内容的部分。图 1-6 显示了我们一直期待的屏幕。


    ![A421548_1_En_1_Fig6_HTML.jpg](img/A421548_1_En_1_Fig6_HTML.jpg)

    图 1-6. 功能选择


    此时，我们需要选择测试数据库实例中 `R` 功能所需的最基本组件。在本书中，我们将熟悉 `R`，并使用 `R Tools for Visual Studio`
    创建图表，然后在 `SSMS` 中复制这些结果，最终通过 `Reporting Services` 在报表中呈现这些结果。因此，我们只安装 `R Services
    (In-Database)` 和 `Reporting Services – Native`。这为我们提供了深入了解 `R` 及其能为我们做什么所需的一切。这也意味着我们无需安装完整的
    `SQL Server 2016`。图 1-7 显示了此时您应该选择的选项。


    ![A421548_1_En_1_Fig7_HTML.jpg](img/A421548_1_En_1_Fig7_HTML.jpg)

    图 1-7. 已选选项


    在此处单击 `下一步` 继续。系统会花一点时间思考要做什么，但最终您会看到如图 1-8 所示的 `实例配置` 屏幕。


    ![A421548_1_En_1_Fig8_HTML.jpg](img/A421548_1_En_1_Fig8_HTML.jpg)

    图 1-8. 实例配置


    ### 实例配置


    由于这是一个新的安装，并且之前没有安装过 `SQL Server` 版本，因此 `默认实例` 选项可用。我们当然可以毫无问题地使用此选项，但我通常更喜欢为我的实例命名。这由您决定，但请理解，在本书的剩余部分，我将使用
    `命名实例` 而不是 `默认实例`。


    此时，我们需要定义我们的新实例。如果您查看 `已安装的实例` 部分，会发现那里什么都没有。我们选择 `命名实例` 选项，并将其称为 `SQL2016RS`，代表
    `SQL Server 2016 R Services`。`实例 ID` 字段也应更新为 `SQL2016RS`。完成此操作后，您将看到如图 1-9 所示的内容。


    ![A421548_1_En_1_Fig9_HTML.jpg](img/A421548_1_En_1_Fig9_HTML.jpg)

    图 1-9. 更新后的实例配置屏幕


    请注意此屏幕上列出的 `命名实例` 字段、`实例 ID` 字段、`SQL Server` 目录位置和 `Reporting Services` 目录位置。这些字段都需要引用
    `SQL2016RS`。一旦您确认一切都符合预期，请单击 `下一步` 继续。


    当您准备好时，单击 `下一步` 继续。


    ### 服务器配置


    下一个屏幕是我们定义服务的服务器帐户和启动类型的地方。此屏幕如图 1-10 所示。


    ![A421548_1_En_1_Fig10_HTML.jpg](img/A421548_1_En_1_Fig10_HTML.jpg)

    图 1-10. 服务器配置


    这里真正需要注意的唯一服务是 `SQL Server Launchpad` 服务。此服务负责在数据库引擎内执行 `R`，因此如果 `R` 的行为不如预期，请首先检查此服务。


    `SQL Browser` 服务在本地服务的上下文中运行，因此没有创建新的服务帐户。换句话说，我们不需要担心那个服务。


    这些服务帐户是默认的，但如果您有自己的服务帐户，随时可以更改为您的服务帐户。如果您没有自己的服务帐户，可以保留这些建议的服务帐户。我知道许多服务器管理员坚持对服务采用最小权限原则，如果您的特定环境是这种情况，那么您需要从服务器管理员处获取服务名称和登录信息才能继续。另一种方法是复制这些服务名称，并将它们包含在您提供给系统管理员的关于安装期间创建的帐户的摘要中，以便系统管理员可以根据需要审核该用户的权限。这里需要重要注意的是，我指的是与“系统管理员”分开的个人或实体，该管理员不是数据库管理员，而是
    `Windows` 级别的管理员。换句话说，是负责操作系统级别、比应用层高一级的人。


    我们在这里只想稍作更改；具体来说，将 `SQL Server Agent` 服务的 `启动类型` 设置为 `自动`。这是我们需要做的唯一更改。图 1-11
    显示了此时您应该看到的内容。


    ![A421548_1_En_1_Fig11_HTML.jpg](img/A421548_1_En_1_Fig11_HTML.jpg)

    图 1-11. 更新后的服务器配置


    请注意，我们无法设置这些帐户中任何一个的密码。这与我见过的每个 `SQL Server` 安装都是一样的。如果您将 `帐户名` 框从默认值更改为自定义服务帐户名，那么
    `密码` 框将变为活动状态并接受输入。否则，密码由 `SQL Server` 和 `Windows` 控制。


    还请注意，在默认服务列表下方有一个新的 `向 SQL Server 数据库引擎服务授予执行卷维护任务权限` 复选框。对于我们在本书中所做的事情，无需选中此复选框。在将来的安装中，或者对于生产环境，启用此选项可能是个好主意。


    此时，我们所有的服务都已正确配置。请注意，我们不会打扰 `排序规则` 选项卡。默认情况下，该选项卡中应指定 `SQL_Latin1_General_CP1_CI_AS`。就是这样。请继续并单击
    `下一步` 继续。


    ### 数据库引擎配置


    下一个屏幕是 `数据库引擎配置`，如图 1-12 所示。在这里，您可以在四个不同的选项卡中设置引擎的选项，如下文各小节所述。


    ![A421548_1_En_1_Fig12_HTML.jpg](img/A421548_1_En_1_Fig12_HTML.jpg)

    图 1-12. 数据库引擎配置


    #### 服务器配置


    此选项卡允许您指定此数据库引擎实例的身份验证模式和管理员。由于这只是用于测试和评估，我将通过单击屏幕底部的 `添加当前用户` 按钮并选择 `Windows
    身份验证模式`，将我自己添加为 `Windows 身份验证模式` 下的管理员。图 1-13 显示了已选择这些选项的状态。


    ![A421548_1_En_1_Fig13_HTML.jpg](img/A421548_1_En_1_Fig13_HTML.jpg)

    图 1-13. 带选项的服务器配置选项卡'
- fmt: "## Data Directories\n\n你还记得我的文件系统是如何设置的吗？“Data Directories”部分描述了我指定的文件结构中这些数据目录的位置。图\
    \ [1-14](#A421548_1_En_1_Chapter.html#Fig14) 显示了这个屏幕最初的样子。图 [1-15](#A421548_1_En_1_Chapter.html#Fig15)\
    \ 显示了我选择的选项。你可以根据喜好设置这些，但我个人的偏好是不把我想要的文件放在默认的复杂文件夹结构中。\n\n![A421548_1_En_1_Fig15_HTML.jpg](A421548_1_En_1_Fig15_HTML.jpg)\n\
    \n图 1-15.\n更新后的 Data Directories 选项卡\n\n![A421548_1_En_1_Fig14_HTML.jpg](A421548_1_En_1_Fig14_HTML.jpg)\n\
    \n图 1-14.\n初始的 Data Directories 选项卡\n\n## TempDB\n\n通常，我会保留 TempDB 选项不变。但在这个例子中，我设置了选项来镜像我已经启用的文件系统。图\
    \ [1-16](#A421548_1_En_1_Chapter.html#Fig16) 显示了默认设置，图 [1-17](#A421548_1_En_1_Chapter.html#Fig17)\
    \ 显示了更新后的设置。\n\n![A421548_1_En_1_Fig17_HTML.jpg](A421548_1_En_1_Fig17_HTML.jpg)\n\
    \n图 1-17.\nTempDB 更新后的设置\n\n![A421548_1_En_1_Fig16_HTML.jpg](A421548_1_En_1_Fig16_HTML.jpg)\n\
    \n图 1-16.\nTempDB 默认设置\n\n我所做的改动很小。我首先在“Data directories”字段中高亮显示现有选项，然后单击“Remove”按钮。接着我单击“Add”按钮，并添加了\
    \ `E:\\SQL Server\\Data`。这个位置在“Log directory”字段中被镜像，因此我将其改为 `E:\\SQL Server\\\
    Logs`。这个选项卡的设置就到此为止。\n\n## FILESTREAM\n\n直接保留“FILESTREAM”选项卡不变。本书中我们不会使用 FILESTREAM。\n\
    \n当你填好所有其他“Database Engine Configuration”选项卡后，单击“Next”。\n\n## Reporting Services\
    \ Configuration\n\n现在我们来配置 Reporting Services。我们将在第 [7](#A421548_1_En_7_Chapter.html)\
    \ 章及后续章节中进一步配置 Reporting Services。我们现在使用默认选中的“Install and configure”选项来安装它。图 [1-18](#A421548_1_En_1_Chapter.html#Fig18)\
    \ 显示了该选项。\n\n![A421548_1_En_1_Fig18_HTML.jpg](A421548_1_En_1_Fig18_HTML.jpg)\n\
    \n图 1-18.\nReporting Services 配置\n\n另请注意，当你为 SharePoint 集成模式安装 Reporting Services\
    \ 时，“Install only”选项是选中的。你可以保留该选项不变，因为反正也没有其他选择。\n\n顺便提一下 Reporting Services 的配置；如果你之后进入并希望安装\
    \ Reporting Services（因为你当初没有随数据库引擎一起安装），你将只有“Install only”选项可用。原因是，在添加数据库引擎实例后，必须使用\
    \ Reporting Services Configuration Manager 来配置 Reporting Services。\n\n确保在顶部选择了“Install\
    \ and configure”选项，然后在 Reporting Services 配置屏幕上单击“Next”以继续。\n\n## 同意安装 Microsoft\
    \ R Open\n\n如前所述，将 R 集成到 SQL Server 中是一个重大变化。在 SQL Server 2016 的预发布版本中，必须单独安装组件才能使\
    \ R 正确运行。Microsoft 在各个版本中逐步更新了安装过程，直到最终版本，其中包含了 R 组件的完整下载和安装。请注意，SQL Server 2016\
    \ 中使用的 R 版本被称为 `Microsoft R Open`，它是“Microsoft 在 GNU General Public License v2\
    \ 下提供的增强版 R 发行版。” R 语言本身的版权仍属于 R Foundation for Statistical Computing。Microsoft\
    \ 在图 1-19 中非常谨慎地明确说明了这一点。我认为这很重要，因为 Microsoft 为 SQL Server 提供了一个全新的软件包；因此，我们必须同意安装\
    \ `Microsoft R Open`，并因此接受 Microsoft 发布的任何补丁或更新。\n\n![A421548_1_En_1_Fig19_HTML.jpg](A421548_1_En_1_Fig19_HTML.jpg)\n\
    \n图 1-19.\n同意安装 Microsoft R Open\n\n单击“Accept”按钮。“Next”按钮将变为可用。继续并单击“Next”以继续。\n\
    \n## 准备安装\n\n图 [1-20](#A421548_1_En_1_Chapter.html#Fig20) 显示了你现在应该看到的“Ready to\
    \ Install”屏幕。仔细阅读，如果你打算完成本书中的练习，请确保你的设置与之匹配。\n\n![A421548_1_En_1_Fig20_HTML.jpg](A421548_1_En_1_Fig20_HTML.jpg)\n\
    \n图 1-20.\n准备安装\n\n当你准备好后，单击“Install”。在加载和安装所需内容时，你的屏幕会闪烁几次。\n\n## 安装进度\n\n图 [1-21](#A421548_1_En_1_Chapter.html#Fig21)\
    \ 显示了安装运行时你应该看到的内容。进度条显示了总体进度，因此你可以判断进度和剩余时间。耐心等待。看看进度条。或者去喝杯咖啡。\n\n![A421548_1_En_1_Fig21_HTML.jpg](A421548_1_En_1_Fig21_HTML.jpg)\n\
    \n图 1-21.\n安装进度\n\n## 安装完成\n\n安装需要一点时间，但最终会完成并显示图 [1-22](#A421548_1_En_1_Chapter.html#Fig22)\
    \ 所示的屏幕。我的安装大约花了 10 分钟完成。向下滚动查看是否所有组件都已正确安装，然后单击“Close”。\n\n![A421548_1_En_1_Fig22_HTML.jpg](A421548_1_En_1_Fig22_HTML.jpg)\n\
    \n图 1-22.\n安装完成\n\n让我们花点时间规划一下本章接下来还要做什么。我们已经进展了不少，但在停下来休息之前，我们还有一点工作要做。\n\n*\
    \   我们目前完成的工作\n    *   安装了测试新的 R 功能所需的 SQL Server 2016 组件\n*   我们接下来将要做的工作\n \
    \   *   验证所有 SQL Server 2016 服务是否已正确启动\n    *   安装 SQL Server Management Tools\n\
    \n第二个要点可能会让你有点困惑。为什么我们需要安装 SQL Server Management Tools？因为，出于某种奇怪的原因（我确信 Microsoft\
    \ 能给出理由），SQL Server Management Studio 并不作为 SQL Server 安装的一部分提供。我在以前的任何安装中从未见过这种情况，因此我可以假设这是\
    \ SQL Server 的新常态。\n\n## 服务验证\n\n让我们去确认一下需要启动的服务是否都已正确启动。按 Windows 键然后输入 `services`\
    \ 来启动“服务”窗口。你应该会看到“服务”桌面应用作为选项出现，如图 [1-23](#A421548_1_En_1_Chapter.html#Fig23)\
    \ 所示。继续并单击“服务”应用以继续。或者，你也可以按 Windows 键，输入 `services.msc`，然后按 Enter。这样可以直接打开“服务”窗口，无需搜索。\n\
    \n![A421548_1_En_1_Fig23_HTML.jpg](A421548_1_En_1_Fig23_HTML.jpg)\n\n图 1-23.\n\
    服务位置\n\n应用程序正常启动，因此向下滚动到 SQL 服务。默认情况下它们应按“名称”排序，所以要跳转到某个字母，只需输入它。这比滚动要快得多。图 [1-24](#A421548_1_En_1_Chapter.html#Fig24)\
    \ 向你显示了相关的 SQL Server 服务及其当前状态。\n\n![A421548_1_En_1_Fig24_HTML.jpg](A421548_1_En_1_Fig24_HTML.jpg)\n\
    \n图 1-24.\n服务\n\n在我看来一切正常。你觉得呢？所有服务都按预期运行，并且都设置为“自动”启动类型。\n\n恭喜！你已成功安装了 SQL Server\
    \ 2016，并通过确认所有服务都按预期启动，验证了一切正常。"
  raw: "#### Data Directories\n\nDo you recall how I had my file system set up? The\
    \ Data Directories section describes the locations of those data directories within\
    \ the file structure I specified. Figure [1-14](#A421548_1_En_1_Chapter.html#Fig14)\
    \ shows what this screen looks like initially. Figure [1-15](#A421548_1_En_1_Chapter.html#Fig15)\
    \ shows my selected options. You can leave these however you like, but my personal\
    \ preference is to not put the files I want in the default labyrinth of folders.\n\
    \n![A421548_1_En_1_Fig15_HTML.jpg](A421548_1_En_1_Fig15_HTML.jpg)\n\nFigure 1-15.\n\
    \nUpdated Data Directories tab\n\n![A421548_1_En_1_Fig14_HTML.jpg](A421548_1_En_1_Fig14_HTML.jpg)\n\
    \nFigure 1-14.\n\nInitial Data Directories tab\n\n#### TempDB\n\nUsually, I leave\
    \ this TempDB option alone. However, in this case, I set the options to mirror\
    \ the file system that I have enabled. Figure [1-16](#A421548_1_En_1_Chapter.html#Fig16)\
    \ shows the default settings and Figure [1-17](#A421548_1_En_1_Chapter.html#Fig17)\
    \ shows the updated settings.\n\n![A421548_1_En_1_Fig17_HTML.jpg](A421548_1_En_1_Fig17_HTML.jpg)\n\
    \nFigure 1-17.\n\nTempDB updated settings\n\n![A421548_1_En_1_Fig16_HTML.jpg](A421548_1_En_1_Fig16_HTML.jpg)\n\
    \nFigure 1-16.\n\nTempDB default settings\n\nThe changes I made were slight. I\
    \ first highlighted the existing option in the Data directories field and then\
    \ clicked the Remove button. Then I clicked the Add button and added E:\\SQL Server\\\
    Data instead. This location was mirrored in the Log directory field, so I changed\
    \ it to E:\\SQL Server\\Logs instead. That’s it for this tab.\n\n#### FILESTREAM\n\
    \nJust leave the FILESTREAM tab alone. We won’t be using FILESTREAM for this book.\n\
    \nOnce you’ve got all the other Database Engine Configuration tabs filled in,\
    \ click Next.\n\n### Reporting Services Configuration\n\nNow we get to configure\
    \ Reporting Services. We configure Reporting Services further in Chapter [7](#A421548_1_En_7_Chapter.html)\
    \ and onward. We install it now using the Install and configure option, which\
    \ is selected by default. Figure [1-18](#A421548_1_En_1_Chapter.html#Fig18) shows\
    \ that option.\n\n![A421548_1_En_1_Fig18_HTML.jpg](A421548_1_En_1_Fig18_HTML.jpg)\n\
    \nFigure 1-18.\n\nReporting Services Configuration\n\nAlso note that the Install\
    \ only option is selected for when you are installing Reporting Services SharePoint\
    \ Integrated Mode. You can leave the option as it is, since there isn’t another\
    \ choice anyway.\n\nOne quick thing while we’re talking about the configuration\
    \ of Reporting Services; if you go in later and want to install Reporting Services\
    \ because you didn’t install it with the database engine, you only have the Install\
    \ only option available to you. The reason for this is because Reporting Services\
    \ Configuration Manager must be used to configure Reporting Services after a database\
    \ engine instance has been added.\n\nEnsure that the Install and configure option\
    \ is selected on the top, and then click Next on the Reporting Services Configuration\
    \ screen to move on.\n\n### Consent to install Microsoft R Open\n\nThe addition\
    \ of R into SQL Server is a major change, as I noted before. In the pre-release\
    \ editions of SQL Server 2016, it was mandatory to install the components separately\
    \ in order for R to run correctly. Microsoft updated the installation process\
    \ gradually through the editions until the final version, which included the full\
    \ download and installation of the R components. Note that the version of R used\
    \ in SQL Server 2016 is called out as Microsoft R Open, which is “an enhanced\
    \ distribution of R made available by Microsoft under the GNU General Public License\
    \ v2.” R, the language, remains the copyright of the R Foundation for Statistical\
    \ Computing. Microsoft is careful to spell that out exactly in the figure shown\
    \ in 1-19\\. This is important, I believe, because Microsoft is making an entirely\
    \ new software package available to SQL Server; for this reason, we must consent\
    \ to installing Microsoft R Open and therefore accept any patches or updates issued\
    \ by Microsoft.\n\n![A421548_1_En_1_Fig19_HTML.jpg](A421548_1_En_1_Fig19_HTML.jpg)\n\
    \nFigure 1-19.\n\nConsent to install Microsoft R Open\n\nClick the Accept button.\
    \ The Next button becomes enabled. Go ahead and click Next to move on.\n\n###\
    \ Ready to Install\n\nFigure [1-20](#A421548_1_En_1_Chapter.html#Fig20) shows\
    \ the Ready to Install screen that you should now see. Read it over and ensure\
    \ that you match these settings if you’re going to do the exercises in this book.\n\
    \n![A421548_1_En_1_Fig20_HTML.jpg](A421548_1_En_1_Fig20_HTML.jpg)\n\nFigure 1-20.\n\
    \nReady to install\n\nOnce you are ready, click Install. Your screen will flash\
    \ a few times while it is loading and installing what it needs.\n\n### Installation\
    \ Progress\n\nFigure [1-21](#A421548_1_En_1_Chapter.html#Fig21) shows what you\
    \ should see while your installation is running. The progress bar shows overall\
    \ progress, so you can gauge how far along you are and how much time is remaining.\
    \ Wait patiently. Watch the progress bar. Or go for coffee.\n\n![A421548_1_En_1_Fig21_HTML.jpg](A421548_1_En_1_Fig21_HTML.jpg)\n\
    \nFigure 1-21.\n\nInstallation Progress\n\n### Install Complete\n\nThe install\
    \ takes a little while, but eventually finishes with the screen shown in Figure\
    \ [1-22](#A421548_1_En_1_Chapter.html#Fig22). My installation took about 10 minutes\
    \ to complete. Scroll down to see if everything installed correctly, and then\
    \ click Close.\n\n![A421548_1_En_1_Fig22_HTML.jpg](A421548_1_En_1_Fig22_HTML.jpg)\n\
    \nFigure 1-22.\n\nComplete\n\nLet’s take a second to plan out what else we want\
    \ to do in this chapter. We are already pretty far along so far, but we have a\
    \ bit more before we can stop and rest.\n\n*   What we’ve done so far\n    * \
    \  Installed the SQL Server 2016 components that we need to test the new R functionality\n\
    *   What we will do next\n    *   Verify the SQL Server 2016 services all started\
    \ correctly\n    *   Install SQL Server Management Tools\n\nThat second bullet\
    \ there might throw you off a bit. Why do we need to install SQL Server Management\
    \ Tools? Because, for some strange reason that I’m sure Microsoft can justify,\
    \ SQL Server Management Studio does not ship as part of the installation for SQL\
    \ Server. I have never seen this before in any previous installation, so I can\
    \ assume that this is the new norm for SQL Server.\n\n## Services Verification\n\
    \nLet’s go make sure that the services that needed to start all started correctly.\
    \ Start your Services window by pressing your Windows key and then typing services.\
    \ You should see the Services desktop app appear as an option, as shown in Figure\
    \ [1-23](#A421548_1_En_1_Chapter.html#Fig23). Go ahead and click the Services\
    \ app to continue. Alternatively, you could also press your Windows key, type\
    \ services.msc, and press Enter. This opens the Services window without having\
    \ to search for it.\n\n![A421548_1_En_1_Fig23_HTML.jpg](A421548_1_En_1_Fig23_HTML.jpg)\n\
    \nFigure 1-23.\n\nServices location\n\nThe application starts as normal, so scroll\
    \ down to the SQL services. They should be sorted by Name by default, so to jump\
    \ to a letter, just type it. You will get there a lot faster than by scrolling.\
    \ Figure [1-24](#A421548_1_En_1_Chapter.html#Fig24) shows you the relevant SQL\
    \ Server services and their current status.\n\n![A421548_1_En_1_Fig24_HTML.jpg](A421548_1_En_1_Fig24_HTML.jpg)\n\
    \nFigure 1-24.\n\nServices\n\nEverything looks good to me. What do you think?\
    \ All are running as expected and all are set to an Automatic startup type.\n\n\
    Congratulations! You have successfully installed SQL Server 2016 and verified\
    \ that everything is copacetic by confirming that the services all started as\
    \ expected."
  trans: "\n\n## 数据目录\n\n你还记得我的文件系统是如何设置的吗？“数据目录”部分描述了我指定的文件结构中这些数据目录的位置。图 1-14 显示了这个屏幕最初的样子。图\
    \ 1-15 显示了我选择的选项。你可以根据喜好设置这些，但我个人的偏好是不把我想要的文件放在默认的复杂文件夹结构中。\n\n![A421548_1_En_1_Fig15_HTML.jpg](img/A421548_1_En_1_Fig15_HTML.jpg)\n\
    \n图 1-15.\n更新后的 数据目录 选项卡\n\n![A421548_1_En_1_Fig14_HTML.jpg](img/A421548_1_En_1_Fig14_HTML.jpg)\n\
    \n图 1-14.\n初始的 数据目录 选项卡\n\n## TempDB\n\n通常，我会保留 TempDB 选项不变。但在这个例子中，我设置了选项来镜像我已经启用的文件系统。图\
    \ 1-16 显示了默认设置，图 1-17 显示了更新后的设置。\n\n![A421548_1_En_1_Fig17_HTML.jpg](img/A421548_1_En_1_Fig17_HTML.jpg)\n\
    \n图 1-17.\nTempDB 更新后的设置\n\n![A421548_1_En_1_Fig16_HTML.jpg](img/A421548_1_En_1_Fig16_HTML.jpg)\n\
    \n图 1-16.\nTempDB 默认设置\n\n我所做的改动很小。我首先在“Data directories”字段中高亮显示现有选项，然后单击“Remove”按钮。接着我单击“Add”按钮，并添加了\
    \ `E:\\SQL Server\\Data`。这个位置在“Log directory”字段中被镜像，因此我将其改为 `E:\\SQL Server\\\
    Logs`。这个选项卡的设置就到此为止。\n\n## FILESTREAM\n\n直接保留“FILESTREAM”选项卡不变。本书中我们不会使用 FILESTREAM。\n\
    \n当你填好所有其他“Database Engine Configuration”选项卡后，单击“Next”。\n\n## Reporting Services\
    \ 配置\n\n现在我们来配置 Reporting Services。我们将在第 7 章及后续章节中进一步配置 Reporting Services。我们现在使用默认选中的“Install\
    \ and configure”选项来安装它。图 1-18 显示了该选项。\n\n![A421548_1_En_1_Fig18_HTML.jpg](img/A421548_1_En_1_Fig18_HTML.jpg)\n\
    \n图 1-18.\nReporting Services 配置\n\n另请注意，当你为 SharePoint 集成模式安装 Reporting Services\
    \ 时，“Install only”选项是选中的。你可以保留该选项不变，因为反正也没有其他选择。\n\n顺便提一下 Reporting Services 的配置；如果你之后进入并希望安装\
    \ Reporting Services（因为你当初没有随数据库引擎一起安装），你将只有“Install only”选项可用。原因是，在添加数据库引擎实例后，必须使用\
    \ Reporting Services Configuration Manager 来配置 Reporting Services。\n\n确保在顶部选择了“Install\
    \ and configure”选项，然后在 Reporting Services 配置屏幕上单击“Next”以继续。\n\n## 同意安装 Microsoft\
    \ R Open\n\n如前所述，将 R 集成到 SQL Server 中是一个重大变化。在 SQL Server 2016 的预发布版本中，必须单独安装组件才能使\
    \ R 正确运行。Microsoft 在各个版本中逐步更新了安装过程，直到最终版本，其中包含了 R 组件的完整下载和安装。请注意，SQL Server 2016\
    \ 中使用的 R 版本被称为 `Microsoft R Open`，它是“Microsoft 在 GNU General Public License v2\
    \ 下提供的增强版 R 发行版。” R 语言本身的版权仍属于 R Foundation for Statistical Computing。Microsoft\
    \ 在图 1-19 中非常谨慎地明确说明了这一点。我认为这很重要，因为 Microsoft 为 SQL Server 提供了一个全新的软件包；因此，我们必须同意安装\
    \ `Microsoft R Open`，并因此接受 Microsoft 发布的任何补丁或更新。\n\n![A421548_1_En_1_Fig19_HTML.jpg](img/A421548_1_En_1_Fig19_HTML.jpg)\n\
    \n图 1-19.\n同意安装 Microsoft R Open\n\n单击“Accept”按钮。“Next”按钮将变为可用。继续并单击“Next”以继续。\n\
    \n## 准备安装\n\n图 1-20 显示了你现在应该看到的“Ready to Install”屏幕。仔细阅读，如果你打算完成本书中的练习，请确保你的设置与之匹配。\n\
    \n![A421548_1_En_1_Fig20_HTML.jpg](img/A421548_1_En_1_Fig20_HTML.jpg)\n\n图 1-20.\n\
    准备安装\n\n当你准备好后，单击“Install”。在加载和安装所需内容时，你的屏幕会闪烁几次。\n\n## 安装进度\n\n图 1-21 显示了安装运行时你应该看到的内容。进度条显示了总体进度，因此你可以判断进度和剩余时间。耐心等待。看看进度条。或者去喝杯咖啡。\n\
    \n![A421548_1_En_1_Fig21_HTML.jpg](img/A421548_1_En_1_Fig21_HTML.jpg)\n\n图 1-21.\n\
    安装进度\n\n## 安装完成\n\n安装需要一点时间，但最终会完成并显示图 1-22 所示的屏幕。我的安装大约花了 10 分钟完成。向下滚动查看是否所有组件都已正确安装，然后单击“Close”。\n\
    \n![A421548_1_En_1_Fig22_HTML.jpg](img/A421548_1_En_1_Fig22_HTML.jpg)\n\n图 1-22.\n\
    安装完成\n\n让我们花点时间规划一下本章接下来还要做什么。我们已经进展了不少，但在停下来休息之前，我们还有一点工作要做。\n\n*   我们目前完成的工作\n\
    \    *   安装了测试新的 R 功能所需的 SQL Server 2016 组件\n*   我们接下来将要做的工作\n    *   验证所有 SQL\
    \ Server 2016 服务是否已正确启动\n    *   安装 SQL Server Management Tools\n\n第二个要点可能会让你有点困惑。为什么我们需要安装\
    \ SQL Server Management Tools？因为，出于某种奇怪的原因（我确信 Microsoft 能给出理由），SQL Server Management\
    \ Studio 并不作为 SQL Server 安装的一部分提供。我在以前的任何安装中从未见过这种情况，因此我可以假设这是 SQL Server 的新常态。\n\
    \n## 服务验证\n\n让我们去确认一下需要启动的服务是否都已正确启动。按 Windows 键然后输入 `services` 来启动“服务”窗口。你应该会看到“服务”桌面应用作为选项出现，如图\
    \ 1-23 所示。继续并单击“服务”应用以继续。或者，你也可以按 Windows 键，输入 `services.msc`，然后按 Enter。这样可以直接打开“服务”窗口，无需搜索。\n\
    \n![A421548_1_En_1_Fig23_HTML.jpg](img/A421548_1_En_1_Fig23_HTML.jpg)\n\n图 1-23.\n\
    服务位置\n\n应用程序正常启动，因此向下滚动到 SQL 服务。默认情况下它们应按“名称”排序，所以要跳转到某个字母，只需输入它。这比滚动要快得多。图 1-24\
    \ 向你显示了相关的 SQL Server 服务及其当前状态。\n\n![A421548_1_En_1_Fig24_HTML.jpg](img/A421548_1_En_1_Fig24_HTML.jpg)\n\
    \n图 1-24.\n服务\n\n在我看来一切正常。你觉得呢？所有服务都按预期运行，并且都设置为“自动”启动类型。\n\n恭喜！你已成功安装了 SQL Server\
    \ 2016，并通过确认所有服务都按预期启动，验证了一切正常。\n\n"
- fmt: '## SQL Server Management Tools


    接下来，我们需要安装 SQL Server Management Tools。此安装任务是 SQL Server Installation Center 的一部分，它应该仍在您的桌面上打开。图
    1-25 显示了当前 SQL Server Installation Center 屏幕的状态。


    ![A421548_1_En_1_Fig25_HTML.jpg](A421548_1_En_1_Fig25_HTML.jpg)


    图 1-25. SQL Server Installation Center


    请注意，由于已安装 SQL Server 2016，`SQL Server Management Tools` 的链接已经高亮显示。这正是我们现在想要点击的地方。图
    1-26 显示了此操作的结果。


    ![A421548_1_En_1_Fig26_HTML.jpg](A421548_1_En_1_Fig26_HTML.jpg)


    图 1-26. 下载 SQL Server Management Studio


    当我们点击 SQL Server Installation Center 上的 `Install SQL Server Management Tools`
    链接时，Microsoft.com 上会打开一个网页，我们可以从中下载 SSMS。现在，请点击那个名为 `Download SQL Server Management
    Studio` 的蓝色链接。在撰写本文时，下载大小为 806MB。


    在下载的同时，让我们规划一下接下来要做的事情。本质上，我们需要通过验证 R 是否正确安装并与数据库引擎正常通信来“完成” SQL Server 的安装。


    您几乎忘了这是一本关于 R 的书，对吗？我知道，这一章长得离谱，但我们确实需要让所有组件都运行起来，才能展示 R 在当前环境下能做什么。


    最终，下载完成。在您的浏览器中，您应该会看到一个类似于图 1-27 所示的按钮。


    ![A421548_1_En_1_Fig27_HTML.jpg](A421548_1_En_1_Fig27_HTML.jpg)


    图 1-27. 下载完成


    点击此按钮开始安装，或者转到您的“下载”文件夹并双击名为 `SSMS-Setup-ENU.exe` 的文件以开始安装 SQL Server Management
    Studio。图 1-28 显示了初始安装屏幕。


    ![A421548_1_En_1_Fig28_HTML.jpg](A421548_1_En_1_Fig28_HTML.jpg)


    图 1-28. SSMS 安装提示


    考虑到在您撰写本文和您下载 SQL Server Management Tools 之间，Microsoft 可能会发布更新的版本，您最终的 `Release`
    号可能与我的不同。


    嗯，这确实是一个新的安装界面。我以为这会更接近 Visual Studio，但并非如此。指示就在那里；点击 `Install` 开始。图 1-29 显示了点击
    `Install` 后的界面。


    ![A421548_1_En_1_Fig29_HTML.jpg](A421548_1_En_1_Fig29_HTML.jpg)


    图 1-29. 初始安装界面


    它会在这里加载包大约一分钟，所以就让它做自己的事情并安装所需的内容。第一个安装的主要包是 `.NET Framework 4.6.1`。然后它会继续安装其他包，比如
    `Visual Studio 2015 Shell`。一旦我们开始查看用于开发 R 项目的不同 IDE，这将变得很重要。


    最终，安装完成，我们停留在如图 1-30 所示的屏幕上。


    ![A421548_1_En_1_Fig30_HTML.jpg](A421548_1_En_1_Fig30_HTML.jpg)


    图 1-30. 需要重启


    接下来，打开 SQL Server Management Studio 并连接到您新安装的实例。按下您的 Windows 键并输入 `ssms` 以显示 `Microsoft
    SQL Server Management Studio` 桌面应用。继续点击该应用以启动应用程序。


    提示


    如果您没有以本地 `Administrator` 帐户登录，您可能需要右键单击“开始”菜单中出现的桌面应用图标，然后选择 `以管理员身份运行`。


    图 1-31 显示了此更新版本中 SSMS 的初始界面外观。


    ![A421548_1_En_1_Fig31_HTML.jpg](A421548_1_En_1_Fig31_HTML.jpg)


    图 1-31. SQL Server Management Studio


    这需要加载界面，然后，最终，我们会看到 SSMS 登录屏幕。图 1-32 显示了此版本与先前版本 SSMS 的显著不同之处。


    ![A421548_1_En_1_Fig32_HTML.jpg](A421548_1_En_1_Fig32_HTML.jpg)


    图 1-32. 连接到服务器


    回想一下，我将新的 SQL Server 2016 实例命名为 `SQL2016RS`，所以这就是我将要连接的实例。`Server name` 字段的格式是
    `SERVER\INSTANCE`，这就是我格式化我的连接的方式。您也可以从那里下拉菜单并导航到您可能已安装的另一个实例。只要您能到达那里，您觉得更舒适的方式都可以。点击
    `Connect` 登录到您的实例。


    您现在应该看到的对象资源管理器初始屏幕类似于图 1-33。


    ![A421548_1_En_1_Fig33_HTML.jpg](A421548_1_En_1_Fig33_HTML.jpg)


    图 1-33. SQL Server Management Studio


    请注意命名实例和显示的 SQL Server 版本。您可能需要展开界面才能看到版本号，但除非 Microsoft 从界面中移除它，否则它就会在那里。我的版本是
    `13.0.1601-5`，这是撰写本文时的最新稳定版本。一如既往，您可能拥有不同版本的 SQL Server 2016。这没关系，因为 Microsoft
    尚未弃用任何可能影响本书结果的主要功能。这也意味着我们已成功连接到我们的新实例，并准备开始。


    在我们深入其他内容之前，让我们在 SSMS 中打开行号显示。这是我的一个痛点。转到 `Tools` → `Options`，展开 `Text Editor`，然后点击
    `All Languages`。图 1-34 显示了此设置的位置。


    ![A421548_1_En_1_Fig34_HTML.jpg](A421548_1_En_1_Fig34_HTML.jpg)


    图 1-34. 行号


    只需勾选该框并点击 `OK`——您就设置好了。


    Microsoft 发布了一个后配置过程，我们将首先运行它。这个步骤未来可能会被移除并添加到安装中，但目前，请按照以下步骤完成安装。


    在 SQL Server Management Studio 中打开一个 `New Query` 窗口，并键入以下命令：


    ```

    exec sp_configure ''external scripts enabled'', 1

    Reconfigure with override

    ```


    这是在 SSMS 中执行此代码的结果：


    ```

    Configuration option ''external scripts enabled'' changed from 0 to 1\. Run the
    RECONFIGURE statement to install.

    ```


    注意


    作为查询的一部分，我们已经运行了 `RECONFIGURE` 语句。


    请注意，我们是在对 `master` 数据库执行，并且查询已成功执行。这意味着 R 脚本现在在 SQL Server 中已启用。这个脚本至关重要，因为没有它，我们就无法在数据库引擎内执行
    R 代码。原因是 `sp_execute_external_script` 存储过程默认是禁用的；必须手动启用它。


    接下来，我们需要验证 R 是否确实在运行。为此，Microsoft 说需要重启 SQL Server 实例并运行以下脚本。首先重启实例，然后打开一个 `New
    Query` 窗口并键入以下内容：


    ```

    exec sp_execute_external_script

    @language =N''R'',

    @script=N''OutputDataSet<-InputDataSet'',

    @input_data_1 =N''select 1 as hello''

    with result sets (([hello] int not null));

    go

    ```


    按 `F5` 执行脚本。预期的结果如图 1-35 所示。


    ![A421548_1_En_1_Fig35_HTML.jpg](A421548_1_En_1_Fig35_HTML.jpg)


    图 1-35. R 已安装并正确通信


    太好了！这个简单脚本的成功执行表明 R 运行良好，并与 SQL Server 实例正常通信。从图 1-43 中的结果我们可以看到，我们定义了一个非常简单的查询
    `select 1 as hello`，我们将其作为名为 `[hello]` 的列返回，数据类型为 `int`，且 `not null`。'
  raw: '## SQL Server Management Tools


    Next, we need to install the SQL Server Management Tools. This installation task
    is part of the SQL Server Installation Center that should still be open on your
    desktop. Figure [1-25](#A421548_1_En_1_Chapter.html#Fig25) shows the current state
    of the SQL Server Installation Center screen.


    ![A421548_1_En_1_Fig25_HTML.jpg](A421548_1_En_1_Fig25_HTML.jpg)


    Figure 1-25.


    SQL Server Installation Center


    Notice that the link for SQL Server Management Tools has become highlighted since
    SQL Server 2016 was installed. That’s where we want to click now. Figure [1-26](#A421548_1_En_1_Chapter.html#Fig26)
    shows the results of this action.


    ![A421548_1_En_1_Fig26_HTML.jpg](A421548_1_En_1_Fig26_HTML.jpg)


    Figure 1-26.


    Download SQL Server Management Studio


    When we clicked the Install SQL Server Management Tools link on the SQL Server
    Installation Center, a web page opened on Microsoft.com, where we can download
    SSMS. Go ahead and click that blue link titled Download SQL Server Management
    Studio now. The download was 806MB at the time of this writing.


    While that is downloading, let’s plan out what we want to do next. Essentially,
    we need to “finish” the installation of SQL Server by verifying that R is correctly
    installed and communicating normally with the database engine.


    You almost forgot this was a book about R, didn’t you? I know, this chapter has
    been a ridiculously long one, but we really did need to get all of the pieces
    up and running in order to show what R can do in the current context.


    Eventually, the download completes. In your browser you should a button similar
    to what’s shown Figure [1-27](#A421548_1_En_1_Chapter.html#Fig27).


    ![A421548_1_En_1_Fig27_HTML.jpg](A421548_1_En_1_Fig27_HTML.jpg)


    Figure 1-27.


    Download complete


    Click this button to begin the install, or go to your Downloads folder and double-click
    the file named SSMS-Setup-ENU.exe to begin the installation of SQL Server Management
    Studio. Figure [1-28](#A421548_1_En_1_Chapter.html#Fig28) shows the initial installation
    screen.


    ![A421548_1_En_1_Fig28_HTML.jpg](A421548_1_En_1_Fig28_HTML.jpg)


    Figure 1-28.


    SSMS installation Tip


    You might end up with a different Release number than mine, considering that Microsoft
    may release a newer version in the time between when this was written and when
    you downloaded SQL Server Management Tools.


    Well, that’s certainly a new installation interface. I would think this was closer
    to Visual Studio, but it’s not. The instructions are right there for us; click
    Install to begin. Figure [1-29](#A421548_1_En_1_Chapter.html#Fig29) shows the
    interface after clicking Install.


    ![A421548_1_En_1_Fig29_HTML.jpg](A421548_1_En_1_Fig29_HTML.jpg)


    Figure 1-29.


    Initial installation interface


    It sits here for a minute or so loading packages, so just let it do its thing
    and install what it needs. The first major package that gets installed is .NET
    Framework 4.6.1\. It then progresses to other packages, like Visual Studio 2015
    Shell. This will be important later on, once we start looking at the different
    IDEs for developing R projects.


    Eventually, the installation completes and we settle on the screen shown in Figure
    [1-30](#A421548_1_En_1_Chapter.html#Fig30).


    ![A421548_1_En_1_Fig30_HTML.jpg](A421548_1_En_1_Fig30_HTML.jpg)


    Figure 1-30.


    Restart required


    Next, open SQL Server Management Studio and connect to your newly installed instance.
    Press your Windows key and type ssms to show the Microsoft SQL Server Management
    Studio desktop app. Go ahead and click the app to start the application.


    Tip


    If you aren’t logged in as the local Administrator account, you may need to right-click
    the desktop app icon that appears in the Start menu and choose Run as administrator
    instead.


    Figure [1-31](#A421548_1_En_1_Chapter.html#Fig31) shows how the initial interface
    for SSMS looks in this updated version.


    ![A421548_1_En_1_Fig31_HTML.jpg](A421548_1_En_1_Fig31_HTML.jpg)


    Figure 1-31.


    SQL Server Management Studio


    That needs to load the interface and then, finally, we get to the SSMS login screen.
    Figure [1-32](#A421548_1_En_1_Chapter.html#Fig32) shows how different this looks
    from previous versions of SSMS.


    ![A421548_1_En_1_Fig32_HTML.jpg](A421548_1_En_1_Fig32_HTML.jpg)


    Figure 1-32.


    Connect to Server


    Recall that I named the new SQL Server 2016 instance SQL2016RS, so that’s the
    instance I am going to connect to. The format for the Server name field is SERVER\INSTANCE,
    so that’s how I have formatted my connection. You can also pull down the menu
    and navigate to another instance you may have installed from there. However you
    are more comfortable is fine, as long as you get there. Click Connect to log in
    to your instance.


    The Object Explorer initial screen you should see now resembles Figure [1-33](#A421548_1_En_1_Chapter.html#Fig33).


    ![A421548_1_En_1_Fig33_HTML.jpg](A421548_1_En_1_Fig33_HTML.jpg)


    Figure 1-33.


    SQL Server Management Studio


    Pay attention to the named instance and the SQL Server version shown. You may
    need to expand the interface to see the version number, but it will be there unless
    Microsoft takes it away from the interface. My version is 13.0.1601-5, which is
    the latest stable release at the time of this writing. As always, you may have
    a different version of SQL Server 2016\. That’s fine, considering that Microsoft
    hasn’t deprecated anything major, which would affect the outcome of this book.
    This also means that we have successfully connected to our new instance and we
    are ready to get going.


    Before we get into anything else, let’s turn on the line numbers in SSMS. It’s
    a pet peeve of mine. Go to Tools ä Options, expand Text Editor, and click All
    Languages. Figure [1-34](#A421548_1_En_1_Chapter.html#Fig34) shows the location
    of this setting.


    ![A421548_1_En_1_Fig34_HTML.jpg](A421548_1_En_1_Fig34_HTML.jpg)


    Figure 1-34.


    Line numbers


    Just check that box and click OK—and you’re good to go.


    Microsoft has put out a post-configuration procedure, which we are going to run
    first. This may possibly be removed and added to the installation in the future,
    but for now, follow along to complete installation.


    Open a New Query window in SQL Server Management Studio and type the following
    command:


    ```

    exec sp_configure ''external scripts enabled'', 1

    Reconfigure with override

    ```


    This is the result of executing this code in SSMS:


    ```

    Configuration option ''external scripts enabled'' changed from 0 to 1\. Run the
    RECONFIGURE statement to install.

    ```


    Note


    We already ran the RECONFIGURE statement as part of the query.


    Notice that we are executing against the master database and that the query has
    executed successfully. This means that R scripting is now enabled in SQL Server.
    This script is essential because, without it, we cannot execute R code within
    the database engine. The reason for this is because the `sp_execute_external_script`
    stored procedure is disabled by default; it must be enabled manually.


    Next, we need to verify that R is indeed running. To do this, Microsoft says to
    restart the SQL Server instance and run the following script. Restart the instance
    first, and then open a New Query window and type the following:


    ```

    exec sp_execute_external_script

    @language =N''R'',

    @script=N''OutputDataSet<-InputDataSet'',

    @input_data_1 =N''select 1 as hello''

    with result sets (([hello] int not null));

    go

    ```


    Press F5 to execute the script. The anticipated results are shown in Figure [1-35](#A421548_1_En_1_Chapter.html#Fig35).


    ![A421548_1_En_1_Fig35_HTML.jpg](A421548_1_En_1_Fig35_HTML.jpg)


    Figure 1-35.


    R installed and communicating correctly


    Excellent! The successful execution of this simple script shows us that R is alive
    and well, and communicating normally with the SQL Server instance. We can see
    from the results in Figure 1-43 that we had a very simple query defined as `select
    1 as hello`, which we return as a column named `[hello]` using a data type of,
    which is `not null`.'
  trans: '## SQL Server 管理工具


    接下来，我们需要安装 SQL Server 管理工具。此安装任务是 SQL Server 安装中心的一部分，它应该仍在您的桌面上打开。图 1-25 显示了当前
    SQL Server 安装中心屏幕的状态。


    ![A421548_1_En_1_Fig25_HTML.jpg](img/A421548_1_En_1_Fig25_HTML.jpg)


    图 1-25. SQL Server 安装中心


    请注意，由于已安装 SQL Server 2016，`SQL Server Management Tools` 的链接已经高亮显示。这正是我们现在想要点击的地方。图
    1-26 显示了此操作的结果。


    ![A421548_1_En_1_Fig26_HTML.jpg](img/A421548_1_En_1_Fig26_HTML.jpg)


    图 1-26. 下载 SQL Server Management Studio


    当我们点击 SQL Server 安装中心上的 `Install SQL Server Management Tools` 链接时，Microsoft.com
    上会打开一个网页，我们可以从中下载 SSMS。现在，请点击那个名为 `Download SQL Server Management Studio` 的蓝色链接。在撰写本文时，下载大小为
    806MB。


    在下载的同时，让我们规划一下接下来要做的事情。本质上，我们需要通过验证 R 是否正确安装并与数据库引擎正常通信来“完成” SQL Server 的安装。


    您几乎忘了这是一本关于 R 的书，对吗？我知道，这一章长得离谱，但我们确实需要让所有组件都运行起来，才能展示 R 在当前环境下能做什么。


    最终，下载完成。在您的浏览器中，您应该会看到一个类似于图 1-27 所示的按钮。


    ![A421548_1_En_1_Fig27_HTML.jpg](img/A421548_1_En_1_Fig27_HTML.jpg)


    图 1-27. 下载完成


    点击此按钮开始安装，或者转到您的“下载”文件夹并双击名为 `SSMS-Setup-ENU.exe` 的文件以开始安装 SQL Server Management
    Studio。图 1-28 显示了初始安装屏幕。


    ![A421548_1_En_1_Fig28_HTML.jpg](img/A421548_1_En_1_Fig28_HTML.jpg)


    图 1-28. SSMS 安装提示


    考虑到在您撰写本文和您下载 SQL Server 管理工具之间，Microsoft 可能会发布更新的版本，您最终的 `Release` 号可能与我的不同。


    嗯，这确实是一个新的安装界面。我以为这会更接近 Visual Studio，但并非如此。指示就在那里；点击 `Install` 开始。图 1-29 显示了点击
    `Install` 后的界面。


    ![A421548_1_En_1_Fig29_HTML.jpg](img/A421548_1_En_1_Fig29_HTML.jpg)


    图 1-29. 初始安装界面


    它会在这里加载包大约一分钟，所以就让它做自己的事情并安装所需的内容。第一个安装的主要包是 `.NET Framework 4.6.1`。然后它会继续安装其他包，比如
    `Visual Studio 2015 Shell`。一旦我们开始查看用于开发 R 项目的不同 IDE，这将变得很重要。


    最终，安装完成，我们停留在如图 1-30 所示的屏幕上。


    ![A421548_1_En_1_Fig30_HTML.jpg](img/A421548_1_En_1_Fig30_HTML.jpg)


    图 1-30. 需要重启


    接下来，打开 SQL Server Management Studio 并连接到您新安装的实例。按下您的 Windows 键并输入 `ssms` 以显示 `Microsoft
    SQL Server Management Studio` 桌面应用。继续点击该应用以启动应用程序。


    提示


    如果您没有以本地 `Administrator` 帐户登录，您可能需要右键单击“开始”菜单中出现的桌面应用图标，然后选择 `以管理员身份运行`。


    图 1-31 显示了此更新版本中 SSMS 的初始界面外观。


    ![A421548_1_En_1_Fig31_HTML.jpg](img/A421548_1_En_1_Fig31_HTML.jpg)


    图 1-31. SQL Server Management Studio


    这需要加载界面，然后，最终，我们会看到 SSMS 登录屏幕。图 1-32 显示了此版本与先前版本 SSMS 的显著不同之处。


    ![A421548_1_En_1_Fig32_HTML.jpg](img/A421548_1_En_1_Fig32_HTML.jpg)


    图 1-32. 连接到服务器


    回想一下，我将新的 SQL Server 2016 实例命名为 `SQL2016RS`，所以这就是我将要连接的实例。`Server name` 字段的格式是
    `SERVER\INSTANCE`，这就是我格式化我的连接的方式。您也可以从那里下拉菜单并导航到您可能已安装的另一个实例。只要您能到达那里，您觉得更舒适的方式都可以。点击
    `Connect` 登录到您的实例。


    您现在应该看到的对象资源管理器初始屏幕类似于图 1-33。


    ![A421548_1_En_1_Fig33_HTML.jpg](img/A421548_1_En_1_Fig33_HTML.jpg)


    图 1-33. SQL Server Management Studio


    请注意命名实例和显示的 SQL Server 版本。您可能需要展开界面才能看到版本号，但除非 Microsoft 从界面中移除它，否则它就会在那里。我的版本是
    `13.0.1601-5`，这是撰写本文时的最新稳定版本。一如既往，您可能拥有不同版本的 SQL Server 2016。这没关系，因为 Microsoft
    尚未弃用任何可能影响本书结果的主要功能。这也意味着我们已成功连接到我们的新实例，并准备开始。


    在我们深入其他内容之前，让我们在 SSMS 中打开行号显示。这是我的一个痛点。转到 `Tools` → `Options`，展开 `Text Editor`，然后点击
    `All Languages`。图 1-34 显示了此设置的位置。


    ![A421548_1_En_1_Fig34_HTML.jpg](img/A421548_1_En_1_Fig34_HTML.jpg)


    图 1-34. 行号


    只需勾选该框并点击 `OK`——您就设置好了。


    Microsoft 发布了一个后配置过程，我们将首先运行它。这个步骤未来可能会被移除并添加到安装中，但目前，请按照以下步骤完成安装。


    在 SQL Server Management Studio 中打开一个 `New Query` 窗口，并键入以下命令：


    ```

    exec sp_configure ''external scripts enabled'', 1

    Reconfigure with override

    ```


    这是在 SSMS 中执行此代码的结果：


    ```

    Configuration option ''external scripts enabled'' changed from 0 to 1\. Run the
    RECONFIGURE statement to install.

    ```


    注意


    作为查询的一部分，我们已经运行了 `RECONFIGURE` 语句。


    请注意，我们是在对 `master` 数据库执行，并且查询已成功执行。这意味着 R 脚本现在在 SQL Server 中已启用。这个脚本至关重要，因为没有它，我们就无法在数据库引擎内执行
    R 代码。原因是 `sp_execute_external_script` 存储过程默认是禁用的；必须手动启用它。


    接下来，我们需要验证 R 是否确实在运行。为此，Microsoft 说需要重启 SQL Server 实例并运行以下脚本。首先重启实例，然后打开一个 `New
    Query` 窗口并键入以下内容：


    ```

    exec sp_execute_external_script

    @language =N''R'',

    @script=N''OutputDataSet<-InputDataSet'',

    @input_data_1 =N''select 1 as hello''

    with result sets (([hello] int not null));

    go

    ```


    按 `F5` 执行脚本。预期的结果如图 1-35 所示。


    ![A421548_1_En_1_Fig35_HTML.jpg](img/A421548_1_En_1_Fig35_HTML.jpg)


    图 1-35. R 已安装并正确通信


    太好了！这个简单脚本的成功执行表明 R 运行良好，并与 SQL Server 实例正常通信。从图 1-35 中的结果我们可以看到，我们定义了一个非常简单的查询
    `select 1 as hello`，我们将其作为名为 `[hello]` 的列返回，数据类型为 `int`，且 `not null`。'
- fmt: "For those that haven’t yet memorized every single system stored procedure,\
    \ you won’t recognize that `sp_execute_external_script` is a brand-new stored\
    \ procedure introduced to execute external scripts. This stored procedure can\
    \ be invoked with:\n\n*   `@language`\n    *   The name of the supported language.\
    \ Currently, only R is supported.\n*   `@script`\n    *   The script that is executed\
    \ (you can either type it all in to the stored procedure or reference it as a\
    \ variable).\n*   `@input_data_1`\n    *   The SQL query you’re using to gather\
    \ data from the database goes here.\n*   `@input_data_1_name`\n    *   The data\
    \ frame that acts as the result set of the `@input_data_1` query. This attribute\
    \ is optional.\n*   `@output_data_1_name`\n    *   The data frame variable in\
    \ `@script` that holds the output data. This attribute is optional.\n\nBelieve\
    \ it or not, there are just a few more things that Microsoft says we need to do,\
    \ so let’s get that out of the way next.\n\nFor the Windows users out there, press\
    \ Windows key + R, type `lusrmgr.msc`, and then hit Enter. You should see your\
    \ Local Users and Groups, as shown in Figure 1-36.\n\n![A421548_1_En_1_Fig36_HTML.jpg](A421548_1_En_1_Fig36_HTML.jpg)\n\
    \nFigure 1-36. Local Users and Groups (Users)\n\nDo you see that? Twenty new user\
    \ accounts were created during installation and each of them are specifically\
    \ created to interact with R Services. These 20 accounts are added to a new Group\
    \ called `SQLRUserGroup<instance_name>`, where `<instance_name>` is the name of\
    \ your instance. So in my case, my group is named `SQLRUserGroupSQL2016RS`. If\
    \ you followed this naming convention, yours will be named that as well.\n\nClick\
    \ the Groups option on the left of your screen. You should see what’s shown in\
    \ Figure 1-37.\n\n![A421548_1_En_1_Fig37_HTML.jpg](A421548_1_En_1_Fig37_HTML.jpg)\n\
    \nFigure 1-37. Local Users and Groups (Groups)\n\nDouble-click the `SQLRUserGroupSQL2016RS`\
    \ link. You should see what is shown in Figure 1-38.\n\n![A421548_1_En_1_Fig38_HTML.jpg](A421548_1_En_1_Fig38_HTML.jpg)\n\
    \nFigure 1-38. SQLRUserGroupSQL2016RS detail\n\nThe way that this is configured,\
    \ we can work just fine from this server. We don’t need to define anything else\
    \ or add any other user accounts, since we have already verified that R is working\
    \ correctly in the database. Microsoft has some pretty good articles about how\
    \ to configure the database instance to accept R scripts from external developers,\
    \ which essentially entails adding the `SQLRUserGroupSQL2016RS` group as a new\
    \ login in SQL Server. That way, when a user connects to the database instance\
    \ to run R scripts, one of those 20 new user accounts is used to execute the script\
    \ through the Launchpad service on behalf of the user. Microsoft has dubbed this\
    \ implied authentication, since a user in the group would then be able to access\
    \ SQL Server R Services remotely.\n\n### Summary\n\nLet’s briefly review what\
    \ we covered in this chapter.\n\n*   Installed a full SQL Server 2016 instance\n\
    *   Installed SQL Server Management Tools\n*   Configured R after installation\n\
    *   Verified that R is installed correctly by running the script specified earlier\n\
    \nThis was a pretty important first chapter. We covered a lot of ground, so if\
    \ anything was unclear, now is a great time to go back through and try it again.\n\
    \nNext, we install R Tools for Visual Studio, which we will use to write our R\
    \ code. This first part was obviously necessary to get the R functionality and\
    \ the database instance installed at the server level. We now shift our focus\
    \ to getting the client side set up with our development tools.\n\n## 2. Setup\
    \ and Installation of R Tools for Visual Studio\n\nNow that we’ve got SQL Server\
    \ 2016 installed correctly, we need to have some sort of IDE to develop our code\
    \ in. Microsoft has made Visual Studio 2016 even better by introducing a brand-new\
    \ R GUI as part of Visual Studio. This is simply named R Tools for Visual Studio.\n\
    \nThere are other R GUIs that you can use, if you would like. You are not constrained\
    \ or forced to use R Tools for Visual Studio at all. If you currently have a favorite\
    \ IDE, then by all means, continue to use that one.\n\n### SQL Server Data Tools\n\
    \nOne quick thing before we get started. We will not be using SQL Server Data\
    \ Tools for this book. Instead, we will use R Tools for Visual Studio. That much\
    \ should be obvious by the chapter title. The reason is pretty simple, but it\
    \ took me a minute to figure it out. Let’s look at the difference between the\
    \ two.\n\n*   SQL Server Data Tools\n    *   Develops solutions for Analysis Services,\
    \ Reporting Services, or Integration Services. Allows for connected database development;\
    \ that is, the “live” editing of databases.\n*   R Tools for Visual Studio\n \
    \   *   Specifically designed as an R GUI for current Microsoft users who want\
    \ to stay with a familiar interface while learning about R. Does not interact\
    \ with the R instance in SQL Server, so needs to have a separate installation\
    \ called Microsoft R Open in order to execute any R code.\n\nThe main reason that\
    \ we are using R Tools for Visual Studio (RTVS) and not SQL Server Data Tools\
    \ (SSDT) for this book is because RTVS can be used to develop R code, and SSDT\
    \ cannot. SSDT can connect to the database instance and run queries against the\
    \ database, but it is not an IDE for R. Alternatively, RTVS is an IDE for R, but\
    \ in the constraints of this book, we are not connecting to the database instance\
    \ directly.\n\nThat should help you figure that out quickly. The main difference\
    \ to me is that SSDT runs an internal process, while RTVS runs an external process.\
    \ You may find other differences between the two, so if you do, good work. As\
    \ I said, though, we use RTVS in this book."
