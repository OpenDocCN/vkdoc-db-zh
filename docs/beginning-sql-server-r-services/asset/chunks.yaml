  trans: '

    # 加载 R 解决方案


    回想一下，在第 2 章中，我们曾从 [`https://microsoft.github.io/RTVS-docs/samples.html`](https://microsoft.github.io/RTVS-docs/samples.html)
    下载了一个 `.zip` 文件。它包含了我们最终将要构建的内容所需的一切。请将该 `.zip` 文件解压缩到一个您容易访问的位置，因为我们马上就要加载其中的解决方案。


    启动 Visual Studio，然后转到 文件 -> 打开 -> 项目/解决方案…。导航到您保存并解压 `.zip` 文件的位置。沿着文件夹路径找到 `RTVS-docs-master/examples/Examples.sln`。选中它并点击
    打开，如图 3-1 所示。


    ![A421548_1_En_3_Fig1_HTML.jpg](img/A421548_1_En_3_Fig1_HTML.jpg)


    图 3-1. 打开项目


    项目需要一点时间打开，然后会将解决方案文件加载到 Visual Studio 中。


    请注意您的解决方案资源管理器窗口（如果未显示，请按 `Ctrl+Alt+L` 使其出现），其中有一组文件，如图 3-2 所示。


