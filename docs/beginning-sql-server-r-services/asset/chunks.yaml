    所以，再次说明，有两种方法可以完成同一件事，并且我们已经验证了数据是正确的。


    现在跳到第 202 行。这行代码是 `model <- lm(log(price) ∼ log(carat) + ., data = diamondSample)`，它与我们之前构建的模型密切相关，但这次我们声明了
    `log(price) ∼ log(carat) + .`，这意味着我们希望用数据集中所有其他列对 `price` 列的对数进行建模。换句话说，这是真正的多元线性回归，而不是简单线性回归。


    高亮第 202 行并执行它。请注意，Variable Explorer 现在显示 `List of 13`，而之前显示的是 `List of 12`，这意味着我们已将
    `model` 添加到列表中，它现在在数据集中可用。图 [4-34](#A421548_1_En_4_Chapter.html#Fig34) 显示了此更新后的值。如果你愿意，可以随时双击
    `model` 查看其中包含的数据。


    ![A421548_1_En_4_Fig34_HTML.jpg](A421548_1_En_4_Fig34_HTML.jpg)

    图 4-34. `model` 值增加


    第 204 行显示了模型的摘要；因此高亮这一行并执行它。图 [4-35](#A421548_1_En_4_Chapter.html#Fig35) 显示了此操作的结果。


    ![A421548_1_En_4_Fig35_HTML.jpg](A421548_1_En_4_Fig35_HTML.jpg)

    图 4-35. `summary(model)` 信息


    这很重要（一个糟糕的双关语），因为 R 平方值是 98%，这意味着 98% 的数据与回归拟合紧密。不错！


    第 211 到 214 行展示了我们如何创建一个数据框（`data.frame`），这是 R 在其模型中组织数据的方式。这些行定义如下：


    ```r

    predicted_values <- data.frame(

    actual = diamonds$price,

    predicted = exp(predict(model, diamonds))

    )

    ```


    所以，让我们逐步分析，以了解这里的语法在做什么。


    *   `predicted_values`: 保存命令结果的对象。

    *   `data.frame`: R 处理结构化数据的方式；类似于表。

    *   `actual = diamonds$price`: 将名为 `actual` 的列变量设置为 `diamonds` 数据集中 `price` 值所表示的值。

    *   `predicted = exp(predict(model, diamonds))`: 将名为 `predicted` 的列变量设置为 `diamonds`
    数据集中 `model` 线性模型预测值的指数值。


    执行第 211 到 214 行。你会看到再次没有任何反应，这是预料之中的。再次查看你的 Variable Explorer。你会看到现在有另一个名为 `predicted_values`
    的数据集可用，这是我们刚刚添加的。图 [4-36](#A421548_1_En_4_Chapter.html#Fig36) 显示了你现在应该看到的内容。


    ![A421548_1_En_4_Fig36_HTML.jpg](A421548_1_En_4_Fig36_HTML.jpg)

    图 4-36. `predicted_values` 数据集


    接下来是第 217 行，内容是 `head(predicted_values)`。我们之前见过这个，请回想一下 `head()` 命令允许我们查看数据的前六行。执行它。你应该看到如图
    [4-37](#A421548_1_En_4_Chapter.html#Fig37) 所示的内容。


    ![A421548_1_En_4_Fig37_HTML.jpg](A421548_1_En_4_Fig37_HTML.jpg)

    图 4-37. `head(predicted_values)`


    接下来是重头戏。第 220 到 224 行包含 `ggplot` 命令，为我们绘制所有这些数据。到目前为止，我们已经用 `actual` 和 `predicted`
    列布置好了 `data.frame` 对象。现在我们看到这些数据可视化后的样子。此命令的 R 代码定义如下：


    ```r

    ggplot(predicted_values, aes(x = actual, y = predicted)) +

    geom_point(colour = "blue", alpha = 0.01) +

    geom_smooth(colour = "red") +

    coord_equal(ylim = c(0, 20000)) +

    ggtitle("Linear model of diamonds data")

    ```


    我相当确定我们可以读懂并理解这个语法在说什么，但基本上，我们是对 `predicted_values` 数据集运行 `ggplot` 命令。我们使用美学值，将
    x 轴设置为 `actual` 数据，y 轴设置为 `predicted` 数据。数据点是蓝色的，具有不同的 alpha（透明度），具体取决于数据值，配有一条红色趋势线，y
    限制为 20000（强制比例），并带有一个标题。


    图 [4-38](#A421548_1_En_4_Chapter.html#Fig38) 显示了你执行第 220 到 224 行后应该看到的内容。


    ![A421548_1_En_4_Fig38_HTML.jpg](A421548_1_En_4_Fig38_HTML.jpg)

    图 4-38. `predicted_values` 的 `ggplot` 图


