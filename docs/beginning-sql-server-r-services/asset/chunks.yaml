  trans: '# 9. 在报表服务器中查看报表


    我们已经在报表生成器中构建了所需的报表，现在可以通过报表服务器的 Web 门户来查看它们。本章后面会介绍报表服务器的其他方面，现在先来看看我们的报表。


    ## 查看报表


    回顾第 6 章，我们设置报表服务器时，将 URL 指定为`http://bradlaptop:80/Reports_SQL2016RS`。将你的 Web 门户地址输入浏览器并点击回车。你应该会看到与图
    9-1 所示类似的内容。


    ![A421548_1_En_9_Fig1_HTML.jpg](img/A421548_1_En_9_Fig1_HTML.jpg)

    图 9-1. Web 门户


    点击左侧的 AverageWSbyID 报表，会显示你在图 9-2 中看到的内容。


    ![A421548_1_En_9_Fig2_HTML.jpg](img/A421548_1_En_9_Fig2_HTML.jpg)

    图 9-2. 生成的报表


    在主页上点击 AvgTempByID 链接时，也会发生同样的事情。图 9-3 显示了这一点。


    ![A421548_1_En_9_Fig3_HTML.jpg](img/A421548_1_En_9_Fig3_HTML.jpg)

    图 9-3. 生成的报表


    所以，你得到了……一个使用二进制数据从原始 R 代码生成图像的完整报表。


    ## 管理报表


    与之前的版本一样，此版本的报表服务器也提供了通过其界面管理报表的功能。在报表服务器中管理报表要求用户是管理员（我们应该是），并属于内容管理器组。报表服务器中提供以下安全角色：


    *   **浏览器**：此角色可以查看指定文件夹中的文件夹和报表，并且可以订阅报表。但此角色不能创建报表。这将是常规的只读用户角色。

    *   **内容管理器**：此角色管理报表服务器中的内容。这是报表服务器的管理员账户，可以在报表服务器的权限范围内执行任何操作。

    *   **我的报表**：此角色可以发布报表，并管理他们被特别指派访问的用户文件夹。这将是常规的读/写“高级用户”账户类型。

    *   **发布者**：此角色只能将报表和链接报表发布到报表服务器。这将是只写用户角色。

    *   **报表生成器**：此角色可以管理和查看报表定义及属性。此角色保留给需要配置报表但不需要成为完全管理员（即内容管理器角色）的特定用户。


    请记住，内容管理器角色可以完成此实例中我们需要做的任何事情，因此最小权限原则在这里确实被忽视了。


    点击省略号，如图 9-4 所示。从弹出菜单中选择“管理”选项。


    ![A421548_1_En_9_Fig4_HTML.jpg](img/A421548_1_En_9_Fig4_HTML.jpg)

    图 9-4. 管理菜单


    会出现一个页面，如图 9-5 所示，它允许你编辑报表的部分属性。


    ![A421548_1_En_9_Fig5_HTML.jpg](img/A421548_1_En_9_Fig5_HTML.jpg)

    图 9-5. 属性


    ## 报表正文属性


    回想一下，我们创建的图像是 800×600，所以让我们更新报表的样式。右键单击灰色区域，从菜单中选择“报表属性…”。图 8-28 显示了此操作。


    ![A421548_1_En_8_Fig28_HTML.jpg](img/A421548_1_En_8_Fig28_HTML.jpg)

    图 8-28. 报表属性位置


    这将打开图 8-29 所示的界面。


    ![A421548_1_En_8_Fig29_HTML.jpg](img/A421548_1_En_8_Fig29_HTML.jpg)

    图 8-29. 报表属性


    我们需要做的就是将“方向”值更改为“横向”，然后点击“确定”。我们需要检查页面大小以调整图像。稍作尝试会发现，我们希望舞台尺寸大约为 9×5（只需点击并拖动到该大小），图
    8-30 显示了其应有的样子。


    ![A421548_1_En_8_Fig30_HTML.jpg](img/A421548_1_En_8_Fig30_HTML.jpg)

    图 8-30. 舞台大小调整


    我将页脚设为蓝色背景配白色文字，但你可以根据自己的喜好进行样式设计，让这份报表成为你自己的作品。


    ## 运行报表


    继续点击左上角的“运行”按钮。准备好迎接一个大惊喜。图 8-31 显示了发生此事后你应该看到的内容。


    ![A421548_1_En_8_Fig31_HTML.jpg](img/A421548_1_En_8_Fig31_HTML.jpg)

    图 8-31. 完成的报表


    不错！现在点击菜单栏中的“打印布局”按钮。图 8-32 显示了这个结果。


    ![A421548_1_En_8_Fig32_HTML.jpg](img/A421548_1_En_8_Fig32_HTML.jpg)

    图 8-32. 打印布局视图


    它就在那里，整齐地布局在一页上，我们的渲染时间显示在蓝色页脚中。


    点击左上角的“设计”按钮，然后按 Ctrl+S 保存报表。默认位置和值如图 8-33 所示。


    ![A421548_1_En_8_Fig33_HTML.jpg](img/A421548_1_En_8_Fig33_HTML.jpg)

    图 8-33. 默认报表位置


    我们可以看到默认位置在我们的报表服务器上，这很完美。将文件的“名称”更新为 AverageWSbyID.rdl，如图 8-34 所示。


    ![A421548_1_En_8_Fig34_HTML.jpg](img/A421548_1_En_8_Fig34_HTML.jpg)

    图 8-34. 更新后的名称信息


    点击此处的“保存”按钮以保存报表。


    此报表现已保存到报表服务器。我们处理完另一份报表后，就会查看它。


    ## 报表 2：按机场 ID 的平均温度


    看看创建第二份报表是多么容易。我希望你开始看到这项技术带给你的灵活性！


    按 Ctrl+N 打开一份新报表（请务必保存旧的）。你会立即看到一份空白报表，就像之前一样。你也可以转到“文件”菜单并选择“新建…”来选择不同的类型。


    我们需要基本上遵循与之前完全相同的说明，只是这次，在创建数据集时，我们需要将`WHERE`子句更改为显示 UID 等于 2 而不是 1 的地方。我将把进行此更改作为练习留给你自己完成。这是一个微不足道的更改。


    完成设置后，你的屏幕应与图 8-35 类似。


    ![A421548_1_En_8_Fig35_HTML.jpg](img/A421548_1_En_8_Fig35_HTML.jpg)

    图 8-35. 平均温度报表布局


    而你的报表应该与图 8-36 所示非常相似。


    ![A421548_1_En_8_Fig36_HTML.jpg](img/A421548_1_En_8_Fig36_HTML.jpg)

    图 8-36. 第二份报表


    干得漂亮！务必将该报表保存为`AvgTempByID.rdl`。


    ## 小结


    我希望你从本章中学到了很多。我鼓励你通过尽可能多地学习 R 和商业智能知识，继续你作为数据科学家的旅程。这保证在未来是一个非常有“钱”途的领域，我非常激动能成为其中的一员。


    如果本章的任何部分没有弄明白，正如我在前面章节中所说，请务必回头重新做一遍示例。


    第 9 章将向你展示如何从报表服务器访问这些报表。这将是一个有趣的章节，不仅因为它是最后一章，而且因为它是我们本书工作的结晶。'
- fmt: '### Properties


    注意我们现在位于左侧的“属性”部分。顶部有以下几个选项：“在报表生成器中编辑”、“下载”、“替换”、“移动”、“删除”和“创建链接报表”。除了“创建链接报表”之外，其他选项的含义都很直观。“创建链接报表”选项允许你创建一个报表，该报表保留现有报表的布局和数据源信息，但仍允许编辑报表的其他参数，例如订阅和报表参数。可以将其理解为一种模板创建器。你本质上是为一个报表创建了一个模板，然后从该报表的基本框架（数据源和报表布局）创建一个全新的报表，但随后你可以用完全不同的报表信息填充这个框架的主体。


    在此页面上，我们可以在图 [9-5](#A421548_1_En_9_Chapter.html#Fig5) 所示的“描述”框中为报表添加描述。如果向下滚动，你会看到另一个标题为“高级”的区域。此区域允许你更改报表超时时间，但由于这是一个动态生成的报表，我将保持原样。可能存在网络流量导致我的报表无法快速生成的情况。我不希望仅仅因为这个原因导致报表失败。


    ### Data Sources


    左侧菜单显示的下一节是“数据源”。此部分允许我们更新或更改现有的数据源。这里的关键词是“现有”。我们无法在报表服务器中创建新的数据源；它们必须首先在报表生成器中创建。


    图 [9-6](#A421548_1_En_9_Chapter.html#Fig6) 显示了此屏幕的顶部部分，其中包含我们之前在报表生成器中指定的数据源信息。请注意，我们在这里有更改任何内容的选项，因为我们处于“内容管理器”角色。


    ![A421548_1_En_9_Fig6_HTML.jpg](A421548_1_En_9_Fig6_HTML.jpg)


    图 9-6.

    数据源信息


    此屏幕的底部部分如图 [9-7](#A421548_1_En_9_Chapter.html#Fig7) 所示。此部分允许我们定义或编辑连接到数据源所需的凭据。显然，这个“凭据”部分已经按设置工作了，否则我们将无法在此报表服务器界面中看到我们创建的报表。图
    [9-7](#A421548_1_En_9_Chapter.html#Fig7) 显示了我们这里的选项。


    ![A421548_1_En_9_Fig7_HTML.jpg](A421548_1_En_9_Fig7_HTML.jpg)


    图 9-7.

    凭据信息


    请注意，我们可以从四种不同的登录类型中选择。


    > 注意

    > 此选项可能会根据你的具体安装和个别要求而有所不同。


    在“凭据”屏幕上，我们需要滚动到底部并单击“测试连接”按钮。图 [9-8](#A421548_1_En_9_Chapter.html#Fig8) 显示了此时你应该看到的内容。


    ![A421548_1_En_9_Fig8_HTML.jpg](A421548_1_En_9_Fig8_HTML.jpg)


    图 9-8.

    测试连接不成功


    此外，一条错误消息出现在“测试连接”按钮旁边，如图 [9-9](#A421548_1_En_9_Chapter.html#Fig9) 所示。


    ![A421548_1_En_9_Fig9_HTML.jpg](A421548_1_En_9_Fig9_HTML.jpg)


    图 9-9.

    错误消息


    接下来，我们需要单击“使用以下凭据”单选按钮，并将界面更新为如图 [9-10](#A421548_1_En_9_Chapter.html#Fig10) 所示。你的信息很可能与图中所示的信息不同。


    ![A421548_1_En_9_Fig10_HTML.jpg](A421548_1_En_9_Fig10_HTML.jpg)


    图 9-10.

    更新后的凭据信息


    请注意，屏幕上显示的复选框未被选中；这对于在下一节中创建订阅至关重要。更新信息后，单击屏幕底部的“测试连接”按钮。图 [9-11](#A421548_1_En_9_Chapter.html#Fig11)
    显示了此操作的结果。


    ![A421548_1_En_9_Fig11_HTML.jpg](A421548_1_En_9_Fig11_HTML.jpg)


    图 9-11.

    连接成功


    最后我们需要做的是单击“保存”按钮，这会更新报表。


    > 注意

    > 此时，你可能需要再次运行报表，并确保它仍能正确呈现。


    一旦连接信息被保存，它会立即对订阅了该报表的用户可用。


    ### Subscriptions


    单击左侧菜单中的“订阅”链接。将打开一个界面，如图 [9-12](#A421548_1_En_9_Chapter.html#Fig12) 所示；它可用于创建报表订阅。


    ![A421548_1_En_9_Fig12_HTML.jpg](A421548_1_En_9_Fig12_HTML.jpg)


    图 9-12.

    订阅


    请注意，有一个标有“新建订阅”的按钮，文本左侧带有一个加号。请单击“新建订阅”按钮。你应该看到如图 [9-13](#A421548_1_En_9_Chapter.html#Fig13)
    所示的内容。


    ![A421548_1_En_9_Fig13_HTML.jpg](A421548_1_En_9_Fig13_HTML.jpg)


    图 9-13.

    新建订阅


    首先，我们希望将“描述”字段更新为“风速报告”。接下来，我们将编辑计划，但保持订阅类型不变。单击蓝色的“编辑计划”链接可以更改当前计划。图 [9-14](#A421548_1_En_9_Chapter.html#Fig14)
    显示了单击“编辑计划”选项时的初始界面。


    ![A421548_1_En_9_Fig14_HTML.jpg](A421548_1_En_9_Fig14_HTML.jpg)


    图 9-14.

    编辑计划（顶部）


    请注意，这是“编辑计划”界面的顶部部分。单击“一次”单选按钮，然后输入一个距离你当前时间仅几分钟的时间。


    此界面的底部部分如图 [9-15](#A421548_1_En_9_Chapter.html#Fig15) 所示。在此区域中，我们只需要单击“应用”按钮。


    ![A421548_1_En_9_Fig15_HTML.jpg](A421548_1_En_9_Fig15_HTML.jpg)


    图 9-15.

    编辑计划（底部）


    此时，订阅界面更新以显示新的计划信息。图 [9-16](#A421548_1_En_9_Chapter.html#Fig16) 显示了此更新后的计划信息，以及我们需要更新的下一部分。


    ![A421548_1_En_9_Fig16_HTML.jpg](A421548_1_En_9_Fig16_HTML.jpg)


    图 9-16.

    目标和电子邮件选项


    我们希望将目标保留为“电子邮件”，并更新其余信息，如图 [9-17](#A421548_1_En_9_Chapter.html#Fig17) 所示。


    ![A421548_1_En_9_Fig17_HTML.jpg](A421548_1_En_9_Fig17_HTML.jpg)


    图 9-17.

    更新后的目标和电子邮件选项


    请注意，我在“收件人:”字段中输入了我的实际电子邮件地址，并将“呈现格式”更改为 PDF。


    > 注意

    > 当前可用的呈现格式包括 Word、Excel、PowerPoint、PDF、TIFF、MHTML、CSV、XML 和数据提要。


    接下来，只需在“注释”字段中添加一些文本，如图 [9-18](#A421548_1_En_9_Chapter.html#Fig18) 所示。


    ![A421548_1_En_9_Fig18_HTML.jpg](A421548_1_En_9_Fig18_HTML.jpg)


    图 9-18.

    添加的注释信息


    单击“创建订阅”按钮，我们就完成了此区域的操作。等待几分钟。你应该会在收件箱中看到一封电子邮件。打开它会显示与图 [9-19](#A421548_1_En_9_Chapter.html#Fig19)
    所示类似的内容。


    ![A421548_1_En_9_Fig19_HTML.jpg](A421548_1_En_9_Fig19_HTML.jpg)


    图 9-19.

    收到的电子邮件


    你已成功为此报表创建了电子邮件订阅。


