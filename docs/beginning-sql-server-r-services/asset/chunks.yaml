    此选项卡允许你指定此数据库引擎实例的身份验证模式和管理员。由于这只是用于测试和评估，我将通过选择“Windows 身份验证模式”并单击屏幕底部的“添加当前用户”按钮，将我自己添加为管理员。图
    A-13 显示了选定这些选项后的界面。


    ![A421548_1_En_10_Fig13_HTML.jpg](img/A421548_1_En_10_Fig13_HTML.jpg)


    图 A-13.


