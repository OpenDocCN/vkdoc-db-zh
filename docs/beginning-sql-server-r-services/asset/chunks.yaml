  trans: '## Windows


    “Windows”菜单可让你打开新窗口，以监控 R 脚本的运行情况。以下是可用选项：

    *   `源代码编辑器`

    *   `R 交互窗口`

    *   `帮助`

    *   `历史记录`

    *   `文件`

    *   `图形`

    *   `包`

    *   `变量资源管理器`


    这些选项显然取代了通常用于类视图或堆栈跟踪的常规视图。由于 R 是一门完全不同的语言，因此采用不同的方式来查看数据和开发任务也就顺理成章了。


    ## 安装 Microsoft R Client…


    当你想要从 Microsoft 下载并安装 R 客户端时，请选择 `安装 Microsoft R Client` 选项。我们目前不想执行此操作，因此请不要理会它。我稍后会解释
    Microsoft R 产品的各个不同组件。


    ## 将 R 更改为 Microsoft R Client


    当你拥有一个本地安装的 R，并希望将其转换为 Microsoft R Client 的一个实例时，请选择 `将 R 更改为 Microsoft R Client`。这意味着你已经安装了
    Microsoft R Open，因为这是运行 R Client 的先决条件。在当前示例中，我们同样不想更改 R 客户端。这意味着我们正在连接到远程数据库实例，但事实并非如此。我们是本地连接。


    ## Microsoft R 产品…


    `Microsoft R 产品`菜单选项本质上是一个 URL 快捷方式。选择此选项会将你的网页浏览器导航至 [`www.microsoft.com/en-us/cloud-platform/r-server`](https://www.microsoft.com/en-us/cloud-platform/r-server)，你可以在该页面查看
    Microsoft 的 R Server 产品选项。


    ## RTVS 文档和示例


    `RTVS 文档和示例`选项会带你访问专门针对 Visual Studio 的 R 工具（RTVS）的文档和示例。提供两个子选项：

    *   `文档`：此选项会带你访问一个网站（[`microsoft.github.io/RTVS-docs`](http://microsoft.github.io/RTVS-docs)），该网站详细介绍了该工具的文档。

    *   `示例`：此选项会带你访问一个网站（[`microsoft.github.io/RTVS-docs/samples.html`](http://microsoft.github.io/RTVS-docs/samples.html)），你可以在其中查看大量可用的
    R 脚本示例。我们稍后会回到这一部分。


    ## R 文档


    `R 文档`菜单项提供了对 R 语言本身文档的便捷访问。这里有四个选项：

    *   `R 语言入门`：点击此选项会带你访问 [`cran.r-project.org/doc/manuals/r-release/R-intro.html`](https://cran.r-project.org/doc/manuals/r-release/R-intro.html)。我认为这是个有趣的补充。Microsoft
    将完整的 R 文档集直接链接到了 Visual Studio 中。你只需点击链接——即可访问。

    *   `任务视图`：此链接指向 [`cran.r-project.org/web/views/`](https://cran.r-project.org/web/views/)，它展示了一系列可下载和安装的任务视图。在此上下文中，任务视图是为共同目的而协同工作的一组库。这里有很多，所以有机会时可以去探索一下。

    *   `数据导入/导出`：此链接指向 [`cran.r-project.org/doc/manuals/r-release/R-data.html`](https://cran.r-project.org/doc/manuals/r-release/R-data.html)，这是另一个文档集。读起来很轻松，没什么大不了的。

    *   `编写 R 扩展`：最后，此链接指向 [`cran.r-project.org/doc/manuals/r-release/R-exts.html`](https://cran.r-project.org/doc/manuals/r-release/R-exts.html)，这又是一个内容广泛的文档集。


    通过这些菜单选项可以获得大量关于 R 的信息。当你对语言有疑问时，请随时利用这些可用资源。我强烈建议至少简要通读一下这些文档，以便熟悉 R 在语法上是如何工作的。这将使本章后面的部分更容易理解。


    ## 反馈


    选择`反馈`菜单选项来评价产品。以下是可用选项：

    *   `在 GitHub 上报告问题`

    *   `通过电子邮件发送笑脸`

    *   `通过电子邮件发送皱眉`


    你选择发送的任何反馈最终都会被转交给 Microsoft。


    ## 检查更新


    选择`检查更新`来检查并下载 R Tools for Visual Studio 的更新。


    ## 调查/新闻


    选择`调查/新闻`选项将导航至 [`rtvs.azurewebsites.net/news/`](http://rtvs.azurewebsites.net/news/)，Microsoft
    在此发布有关 R 的新闻。其中还有`调查`选项，目前仍是“实验性功能”。


    ## 编辑器选项


    选择`编辑器选项`可进入自定义界面选项。这与常规菜单中的 `工具` -> `选项`操作相同，只是此菜单默认将选项限定在 R 上下文菜单内。这里有各种选项，包括
    `IntelliSense`（智能感知）的运作方式、格式化设置以及常规功能，如行号和自动换行功能。


    ## 选项


    此选项让你可以自定义环境选项。这与`编辑器选项`菜单不同，因为`编辑器选项`菜单仅处理编辑器上下文中可用的选项。而`选项`菜单让你处理 R 的实际环境选项，例如调试、`CRAN
    镜像`位置、常规帮助设置以及 R 安装位置。'
- fmt: '### Data Science Settings


    选择此选项将打开一个模态对话框窗口，如图 [2-25](#A421548_1_En_2_Chapter.html#Fig25) 所示。你可以选择为所谓的“数据科学家”重新配置
    Visual Studio。你将获得一个窗口布局和一些 Microsoft 认为对在 R 中进行数据分析的人员有用的键盘快捷键。


    ![A421548_1_En_2_Fig25_HTML.jpg](A421548_1_En_2_Fig25_HTML.jpg)


    图 2-25.


    重置选项


    继续并点击是。可能会打开另一个屏幕，如图 [2-26](#A421548_1_En_2_Chapter.html#Fig26) 所示。


    ![A421548_1_En_2_Fig26_HTML.jpg](A421548_1_En_2_Fig26_HTML.jpg)


    图 2-26.


    重置键盘选项


    如果你希望在使用 RTVS 时重置键盘快捷键，请点击是；否则，点击否。


    我们现在可以看到更新后的界面。请查看图 [2-27](#A421548_1_En_2_Chapter.html#Fig27) 了解这些变化。


    ![A421548_1_En_2_Fig27_HTML.jpg](A421548_1_En_2_Fig27_HTML.jpg)


    图 2-27.


    更新后的界面


    你可以看到我的界面布局使得 `R Interactive` 是左下角的主窗口。在右侧，顶部是 `Variable Explorer` 和 `Solution
    Explorer`。`R Plot`、`R Help` 和 `R History` 都整齐地排列在底部。这证明了 R 已正确安装并正常工作。


    让我们简要讨论一下 Microsoft 在其 R 产品线中提供了什么。


    *   `Microsoft R Server`：一个企业级平台，运行于 Hadoop、Teradata DB 甚至 Linux 之上，以提供与数据的强大交互。使用
    `ScaleR` 技术进行并行化。

    *   `Microsoft R Client`：一个免费的数据科学工具，与 `Microsoft R Open` 协同工作。`R Client` 使用远程数据并在本地处理操作。使用
    `ScaleR` 技术进行并行化。

    *   `Microsoft R Open`：Microsoft 的 R “版本”，简称 `MRO`，在各方面与 R 代码完全兼容。不过，它不引用专有的 `ScaleR`
    技术。

    *   `SQL Server R Services`：将 R 原生集成到 SQL Server 的数据库引擎中。不过，`ScaleR` 仅在企业版中可用。


    此外，`R Server` 是一个服务器级分析平台，而 `R Client` 是一个客户端工具。`MRO` 提供了从客户端访问 R 的接口。因此，例如，在一个典型的数据分析环境中，会有一个
    `R Server` 运行 `SQL Server R Services`、`Hadoop`、`Teradata DB` 或 `Linux` 的实例，并有一个或多个
    `R Client` 连接运行 `MRO` 来与 `R Server` 或 `SQL Server R Services` 实例中的数据进行交互。客户端可以使用
    `ScaleR` 函数消耗其本地工作站上的资源，或者在 `R Server` 上使用 `SQL Server R Services` 或其他分析工具（`Hadoop`、`Teradata
    DB`）在 Windows 或 Linux 服务器上进行计算。


    对于本书中的示例，`R Server` 实例是我们的 `SQL Server R Services` 数据库实例，而 `R Client` 是我们安装的带有
    `MRO` 的 `RTVS`。


    ## 探索示例


    让我们回到 RTVS 文档和示例菜单项中的示例链接。该链接是 [`http://microsoft.github.io/RTVS-docs/samples.html`](http://microsoft.github.io/RTVS-docs/samples.html)。在该页面上，有一个
    `.zip` 文件的下载，其中包含我们将用来熟悉新 R 环境的示例。将该 `.zip` 文件解压缩到你可以访问的位置，然后导航到 `RTVS-docs-master/examples`
    并双击 `README.MD`。这将在 RTVS 中打开此文档。图 [2-28](#A421548_1_En_2_Chapter.html#Fig28) 显示了打开后的文档。


