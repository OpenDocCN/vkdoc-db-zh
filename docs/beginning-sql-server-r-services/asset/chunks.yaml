  trans: '

    ## R 中的线性回归


    接下来，我们将在已加载的数据集范围内探讨 R 中的线性回归。线性回归本质上是统计学家用来定义一个标量变量与一个或多个解释变量之间关系的方法。简单线性回归是指只有一个解释变量的情况，这基本上就是我们在这个示例中要处理的情形。


    在 R 中，我们必须先为数据构建一个模型，然后才能使用该模型。为此，请查看第 163 行代码：`model <- lm(log(price) ∼ log(carat)
    , data = diamondSample)`。再次强调，在我们继续之前，先来看看这句语法。


    -   `model`：定义继承该命令所定义内容的对象。

    -   `<-`：一个赋值运算符，声明右侧命令的结果将被赋值给左侧的对象。

    -   `lm`：定义一个线性模型。

    -   `log(price)`：`price`数据的对数尺度（也是标量变量）。

    -   `∼`：分隔标量变量和解释变量。标量变量显示在此符号的左侧，解释变量显示在右侧。

    -   `log(carat)`：`carat`数据的对数尺度（也是解释变量）。

    -   `, data = diamondSample`：定义要使用的数据对象（此处为`diamondSample`）。


    高亮第 163 行并执行它。请注意，IDE 中没有显示明显的操作，所以让我们再次检查变量资源管理器。现在里面又多了一个引用为`model`的数据对象。图 4-24
    展示了你现在应该看到的样子。


    ![A421548_1_En_4_Fig24_HTML.jpg](img/A421548_1_En_4_Fig24_HTML.jpg)

    图 4-24. `model`数据集


    第 166 行简单地写着`summary(model)`。请执行该行。现在 R 交互窗口中显示了很多信息。看一下图 4-25。


    ![A421548_1_En_4_Fig25_HTML.jpg](img/A421548_1_En_4_Fig25_HTML.jpg)

    图 4-25. `summary(model)`信息


    看看这个操作返回了什么。这里返回了很多关于模型的非常有用的信息，所以请理解，这是获取模型有意义的统计信息的绝佳位置。


    继续看第 170 到 172 行，它们展示了以下代码：


    ```

    coef(model)

    coef(model)[1]

    exp(coef(model)[1])

    ```


    第 169 行说我们提取模型系数。现在让我们高亮这些行并执行它们。图 4-26 展示了你现在在 R 交互窗口中应该看到的内容。


    ![A421548_1_En_4_Fig26_HTML.jpg](img/A421548_1_En_4_Fig26_HTML.jpg)

    图 4-26. `model`系数


    现在我们得到了系数，让我们看看第 175 到 179 行的下一段代码。这段代码定义如下：


    ```

    ggplot(diamondSample, aes(x = carat, y = price)) +

    geom_point(colour = "blue") +

    geom_smooth(method = "lm", colour = "red", size = 2) +

    scale_x_log10() +

    scale_y_log10()

    ```


    我们已经逐步讲解过这个命令的语法，但我看到有一行写着`geom_smooth(method = "lm", colour = "red", size = 2)
    +`，这是我们之前没有定义的。添加这行代码会给图表添加一条细的红色趋势线。现在高亮这些行并执行它们。图 4-27 展示了你应该看到的结果。


    ![A421548_1_En_4_Fig27_HTML.jpg](img/A421548_1_En_4_Fig27_HTML.jpg)

    图 4-27. 图表结果


    这是一张很有意义的图表！正如你所见，图表正变得越来越好，也越来越有趣。


    ## 回归诊断


    接下来，往下看第 190 到 192 行。它们定义如下：


    ```

    par(mfrow = c(2, 2))

    plot(model, col = "blue")

    par(mfrow = c(1, 1))

    ```


    因此，在这个例子中，我们将绘图布局设置为生成一个 2×2 的图表网格，在模型数据集内显示绘制的信息，然后将绘图布局重置回 1×1 的网格。让我们进一步看看这些语句的语法。


    -   `par`：此函数根据`mfrow()`参数指定的方式，将多个不同的图表组合成一个图表。

    -   `mfrow = c(2, 2)`：此参数传入（行数 × 列数）的值，决定了网格在舞台上的布局方式。

    -   `plot(model, col = "blue")`：此函数决定了要绘制什么（`model`）以及绘制数据点的颜色（`col`）。


    你可以随意尝试这个或其他任何函数，感受一下语法的作用，以及你对函数所做的细微更改如何影响生成的输出。我通常发现这是学习函数的好方法，所以也许你也会喜欢这个方法。例如，将`col`的值改为蓝色或绿色，看看你的图表发生了什么变化。将`c()`的值改为`c(3,
    3)`而不是`c(2, 2)`。注意图表是如何重新排列的。


    **提示**

    如果你遇到一个错误提示 `Error in plot.new(): figure margins too large`，请运行命令 `dev.off()`
    和 `par(mar=c(1,1,1,1))` 来清除错误。可能需要运行多次以重置图形组件。非常感谢 Stack Overflow ([`http://stackoverflow.com`](http://stackoverflow.com/))
    提供的提示！


    高亮第 190 到 192 行并执行它们。图 4-28 展示了你现在应该看到的内容。


    ![A421548_1_En_4_Fig28_HTML.jpg](img/A421548_1_En_4_Fig28_HTML.jpg)

    图 4-28. 多图表结果


    看起来棒极了。注意到大多数数据点都相当接近红线了吗？这表明这个数据集相当可靠，并且没有包含大量离群值。

    '
- fmt: '## The Model Object


    第 198 行让我们查看 `model` 对象的结构。高亮并执行这一行。你会看到 R 交互窗口中出现一连串活动。图 [4-29](#A421548_1_En_4_Chapter.html#Fig29)
    显示了这些返回的数据。这是预料之中的，所以请回到 R 交互窗口，看看数据是如何返回的。


    ![A421548_1_En_4_Fig29_HTML.jpg](A421548_1_En_4_Fig29_HTML.jpg)

    图 4-29. 返回的对象数据


    请注意，返回的数据实际上相当难以理解，现在可能不太有意义。幸运的是，这只是我们查看 `model` 对象的一种方式。看看你的 Variable Explorer
    窗口并展开 `model` 条目。图 [4-30](#A421548_1_En_4_Chapter.html#Fig30) 显示了你现在应该看到的内容。


    ![A421548_1_En_4_Fig30_HTML.jpg](A421548_1_En_4_Fig30_HTML.jpg)

    图 4-30. `model` 条目


