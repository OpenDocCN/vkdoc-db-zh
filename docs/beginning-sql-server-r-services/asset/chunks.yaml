- fmt: "# 分析模型结果与创建图表\n\n查看此操作返回的结果。这里返回了大量关于模型的非常有用的信息，因此请理解，这是获取模型有意义统计信息的一个绝佳位置。\n\
    \n转到第170至172行，这些行显示以下代码：\n\n```r\ncoef(model)\ncoef(model)[1]\nexp(coef(model)[1])\n\
    ```\n\n第169行说明我们要提取模型系数。所以，现在让我们高亮显示这些行并执行它们。图[2-47](#A421548_1_En_2_Chapter.html#Fig47)显示了您现在在R交互窗口中应该看到的内容。\n\
    \n![A421548_1_En_2_Fig47_HTML.jpg](A421548_1_En_2_Fig47_HTML.jpg)\n\n图 2-47.\n\
    \n模型系数\n\n现在我们得到了系数，让我们看看第175至179行的下一段代码。这段代码定义如下：\n\n```r\nggplot(diamondSample,\
    \ aes(x = carat, y = price)) +\n  geom_point(colour = \"blue\") +\n  geom_smooth(method\
    \ = \"lm\", colour = \"red\", size = 2) +\n  scale_x_log10() +\n  scale_y_log10()\n\
    ```\n\n我们已经逐步讲解过这条命令的语法，但我看到有一行`geom_smooth(method = \"lm\", colour = \"red\"\
    , size = 2) +`是我们之前没有定义过的。添加这行代码会在图表中增加一条细的红色趋势线。现在高亮显示这些行并执行它们。图[2-48](#A421548_1_En_2_Chapter.html#Fig48)显示了您作为结果应该看到的内容。\n\
    \n![A421548_1_En_2_Fig48_HTML.jpg](A421548_1_En_2_Fig48_HTML.jpg)\n\n图 2-48.\n\
    \n图表结果\n\n这是一个非常有意义的图表！正如您所看到的，这些图表正变得越来越好，越来越有趣。\n\n现在跳到第202行。这一行是`model <- lm(log(price)\
    \ ∼ log(carat) + ., data = diamondSample)`，它与我们之前构建的模型密切相关，但这次我们声明了`log(price)\
    \ ∼ log(carat) + .`，这意味着我们希望对价格列的对数与数据集中的所有其他列进行建模。换句话说，这是真正的多元线性回归，而不是简单线性回归。\n\
    \n高亮显示第202行并执行它。请注意，“变量资源管理器”现在显示`List of 13`，而之前显示的是`List of 12`；这意味着我们已将模型添加到列表中，它现在在数据集中可用了。如果您愿意，您可以随时双击`model`来查看其中包含的数据。\n\
    \n![A421548_1_En_2_Fig49_HTML.jpg](A421548_1_En_2_Fig49_HTML.jpg)\n\n图 2-49.\n\
    \n模型值增加\n\n第204行显示了模型的摘要；因此高亮显示此行并执行它。图[2-50](#A421548_1_En_2_Chapter.html#Fig50)显示了此操作的结果。\n\
    \n![A421548_1_En_2_Fig50_HTML.jpg](A421548_1_En_2_Fig50_HTML.jpg)\n\n图 2-50.\n\
    \n`summary(model)`信息\n\n这很显著（一个不好的双关语），因为R平方值是98%，这意味着98%的数据非常接近回归线。不错！\n\n第211至214行表明我们现在要创建一个数据框，这是R在其模型中结构化数据的方式。这些行定义如下：\n\
    \n```r\npredicted_values <- data.frame(\n  actual = diamonds$price,\n  predicted\
    \ = exp(predict(model, diamonds))\n)\n```\n\n所以，让我们再次逐步分析，以了解这里的语法在做什么。\n\n* \
    \  `predicted_values`: 保存命令结果的对象。\n*   `data.frame`: R处理结构化数据的方式，类似于一个表。\n*  \
    \ `actual = diamonds$price`: 设置一个名为`actual`的列变量，其值等于`diamonds`数据集中的`price`值。\n\
    *   `predicted = exp(predict(model, diamonds))`: 设置一个名为`predicted`的列变量，其值等于在`diamonds`数据集中`model`线性模型的预测值的指数。\n\
    \n执行第211至214行。您会发现又没有发生任何事情，这是预期的。再次查看您的“变量资源管理器”；您会看到现在有另一个名为`predicted_values`的数据集可用，这是我们刚刚添加的。图[2-51](#A421548_1_En_2_Chapter.html#Fig51)显示了您现在应该看到的内容。\n\
    \n![A421548_1_En_2_Fig51_HTML.jpg](A421548_1_En_2_Fig51_HTML.jpg)\n\n图 2-51.\n\
    \n`predicted_values`数据集\n\n接下来是第217行，它是`head(predicted_values)`。我们之前见过这个，请回想一下`head()`命令允许我们查看数据的前六行。执行它。您应该看到图[2-52](#A421548_1_En_2_Chapter.html#Fig52)所示的内容。\n\
    \n![A421548_1_En_2_Fig52_HTML.jpg](A421548_1_En_2_Fig52_HTML.jpg)\n\n图 2-52.\n\
    \n`head(predicted_values)`\n\n接下来是重头戏。第220至224行包含`ggplot`命令，它为我们绘制出所有内容。到目前为止，我们已经用`actual`和`predicted`列设置了`data.frame`对象。现在我们看到了这些数据可视化后的样子。此命令的R代码定义如下：\n\
    \n```r\nggplot(predicted_values, aes(x = actual, y = predicted)) +\n  geom_point(colour\
    \ = \"blue\", alpha = 0.01) +\n  geom_smooth(colour = \"red\") +\n  coord_equal(ylim\
    \ = c(0, 20000)) +\n  ggtitle(\"Linear model of diamonds data\")\n```\n\n我非常确定我们可以读懂并解读这个语法，但基本上，我们是在对`predicted_values`数据集运行`ggplot`命令。我们使用`actual`数据作为x轴的美学值，`predicted`数据作为y轴的美学值。数据点是蓝色的，具有根据数据值变化的alpha（透明度），带有一条红色趋势线，y轴限制为20000（这强制了比例尺），以及一个标题。\n\
    \n图[2-53](#A421548_1_En_2_Chapter.html#Fig53)显示了您在执行第220至224行后应该看到的内容。\n\n![A421548_1_En_2_Fig53_HTML.jpg](A421548_1_En_2_Fig53_HTML.jpg)\n\
    \n图 2-53.\n\n`predicted_values`的`ggplot`图\n\n真的，这是一个非常有用的图表，你不觉得吗？如果你顺利做到这一步没有任何问题，干得漂亮！你现在已经学到了相当多的R语法基础知识，并且看到了最常用的R绘图包`ggplot2`的实际应用。"
  raw: 'Take a look at what is returned by this action. You have a lot of really useful
    information returned about the model here, so understand that this is a great
    place to get meaningful statistical information about a model.


    Head on down to lines 170 through 172, which show the following code:


    ```

    coef(model)

    coef(model)[1]

    exp(coef(model)[1])

    ```


    Line 169 says that we extract the model coefficients. So let’s highlight those
    lines and execute them now. Figure [2-47](#A421548_1_En_2_Chapter.html#Fig47)
    shows what you should see in your R Interactive window now .


    ![A421548_1_En_2_Fig47_HTML.jpg](A421548_1_En_2_Fig47_HTML.jpg)


    Figure 2-47.


    model coefficients


    Now that we’ve got that, let’s take a look at the next bit of code on lines 175
    through 179\. This code is defined as follows:


    ```

    ggplot(diamondSample, aes(x = carat, y = price)) +

    geom_point(colour = "blue") +

    geom_smooth(method = "lm", colour = "red", size = 2) +

    scale_x_log10() +

    scale_y_log10()

    ```


    We’ve already stepped through the syntax of this command, but I see that there
    is a line that says `geom_smooth(method = "lm", colour = "red", size = 2) +` that
    we didn’t define before. The addition of this line of code adds a thin red trend
    line to the chart. Highlight these lines and execute them now. Figure [2-48](#A421548_1_En_2_Chapter.html#Fig48)
    shows what you should see as a result.


    ![A421548_1_En_2_Fig48_HTML.jpg](A421548_1_En_2_Fig48_HTML.jpg)


    Figure 2-48.


    Charted result


    That is one meaningful chart! The charts are getting progressively better and
    more interesting, as you can see.


    Skip down to line 202 now. This line says `model <- lm(log(price) ∼ log(carat)
    + ., data = diamondSample)` and it is closely related to the model we built before,
    but this time, we declared `log(price) ∼ log(carat) + .`, which means that we
    want to model the log of the price column against all the other columns in the
    dataset. In other words, this is true linear regression and not simple linear
    regression.


    Highlight line 202 and execute it. Notice that Variable Explorer now shows List
    of 13 where it once showed List of 12; this means that we have added the model
    to the list and it is now available in the dataset. You can always double-click
    model to view the data contained within, if you would like.


    ![A421548_1_En_2_Fig49_HTML.jpg](A421548_1_En_2_Fig49_HTML.jpg)


    Figure 2-49.


    model value increased


    Line 204 shows the summary of the model; so highlight this line and execute it.
    Figure [2-50](#A421548_1_En_2_Chapter.html#Fig50) shows the result of this action.


    ![A421548_1_En_2_Fig50_HTML.jpg](A421548_1_En_2_Fig50_HTML.jpg)


    Figure 2-50.


    summary(model) information


    This is significant (bad pun) because the R-squared value is 98%, so that means
    that 98% of the data fits closely to the regression. Not bad!


    Lines 211 through 214 show that we are going to now create a data frame, which
    is how R structures data within its models. These lines are defined as follows:


    ```

    predicted_values <- data.frame(

    actual = diamonds$price,

    predicted = exp(predict(model, diamonds))

    )

    ```


    So, again, let’s step through this to get a feel for what the syntax is doing
    here.


    *   predicted_values: The object that holds the result of the command.

    *   data.frame: The way that R handles structured data, similar to a table.

    *   actual = diamonds$price: Sets a column variable named `actual` equal to the
    value represented by the `price` values in the `diamonds` dataset.

    *   predicted = exp(predict(model, diamonds)): Sets a column variable named `predicted`
    equal to the exponential value of the predicted values in the `model` linear model
    in the `diamonds` dataset .


    Execute lines 211 through 214\. You’ll see that nothing happens again, which is
    expected. Look at your Variable Explorer again; you’ll see that there is now another
    dataset available called `predicted_values`, which we just added. Figure [2-51](#A421548_1_En_2_Chapter.html#Fig51)
    shows what you should now see.


    ![A421548_1_En_2_Fig51_HTML.jpg](A421548_1_En_2_Fig51_HTML.jpg)


    Figure 2-51.


    predicted_values dataset


    Line 217 is next, which says `head(predicted_values)`. We saw this before, so
    recall that the `head()` command allows us to see the first six rows of data.
    Execute this. You should see what is shown in Figure [2-52](#A421548_1_En_2_Chapter.html#Fig52).


    ![A421548_1_En_2_Fig52_HTML.jpg](A421548_1_En_2_Fig52_HTML.jpg)


    Figure 2-52.


    head(predicted_values)


    Next is the big show. Lines 220 through 224 contain the `ggplot` command that
    charts all this out for us. So far, we’ve laid out the `data.frame` object with
    the `actual` and `predicted` columns. Now we see what that data looks like visualized.
    The R code for this command is defined as follows:


    ```

    ggplot(predicted_values, aes(x = actual, y = predicted)) +

    geom_point(colour = "blue", alpha = 0.01) +

    geom_smooth(colour = "red") +

    coord_equal(ylim = c(0, 20000)) +

    ggtitle("Linear model of diamonds data")

    ```


    I’m pretty sure that we can read that and decipher what the syntax says, but basically,
    we are running the `ggplot` command against the `predicted_values` dataset. We
    use the aesthetic value for the x axis to be the `actual` data and the y axis
    to be the `predicted` data. The data points are blue with a varying alpha (transparency),
    depending on the data value, with a red trend line, a y-limit of 20000 (which
    forces scale), and a title.


    Figure [2-53](#A421548_1_En_2_Chapter.html#Fig53) shows what you should see after
    you execute lines 220 through 224.


    ![A421548_1_En_2_Fig53_HTML.jpg](A421548_1_En_2_Fig53_HTML.jpg)


    Figure 2-53.


    ggplot of predicted_values


    Really, really useful chart there, don’t you think? If you got this far with no
    problems, excellent work! You’ve actually learned quite a bit about the basics
    of R syntax now and you have seen real-world application of the most commonly
    used R plotting package, `ggplot2` .'
