    用于 Visual Studio 的 R 工具的安装包括一个 R 包管理器。如果你导航到 R Tools ➤ Windows 并选择 Packages，如图
    4-9 所示，会打开一个页面，显示许多关于已安装 R 包的非常酷的信息，如图 4-10 所示。


    ![A421548_1_En_4_Fig10_HTML.jpg](img/A421548_1_En_4_Fig10_HTML.jpg)


    **图 4-10. R 包管理器**


    ![A421548_1_En_4_Fig9_HTML.jpg](img/A421548_1_En_4_Fig9_HTML.jpg)


    **图 4-9. Packages 选项的位置**


    包管理器的添加非常有用，因为否则，用户将被迫通过命令行手动管理包。虽然有些用户可能更习惯这种方法，但这多少违背了快速应用开发的目的。通过此功能，用户现在可以查看其已安装的包，并选择从此界面更新它们，而不是使用
    `installed.packages()`。


    可以随意在此区域探索一下。例如，左上角包含三个选项：


    *   **Available（可用）**：此菜单选项显示当前指向的 CRAN 镜像中所有可用的包。可以通过单击界面右侧的“Install”按钮下载并安装包。

    *   **Installed（已安装）**：此选项显示系统上当前安装的所有包。如果已安装的包有可用更新，左窗格中会出现一个蓝色图标，右窗格中会出现一个“Update”按钮。

    *   **Loaded（已加载）**：此选项显示项目中当前加载的所有包。


    详细阐述这些信息，**Available** 菜单选项如图 4-11 所示。


    ![A421548_1_En_4_Fig11_HTML.jpg](img/A421548_1_En_4_Fig11_HTML.jpg)


    **图 4-11. Available 菜单选项**


    注意右侧的“Install”按钮。单击此按钮会将当前选中的包安装到你的 R 安装中。


    **Installed** 菜单选项如图 4-12 所示。注意，我已滚动到左窗格底部以显示可更新的包。


    ![A421548_1_En_4_Fig12_HTML.jpg](img/A421548_1_En_4_Fig12_HTML.jpg)


    **图 4-12. Installed 菜单选项**


    注意 `RUnit` 和 `survival` 都需要更新。在左窗格中单击 `RUnit` 包名称，界面会变为如图 4-13 所示。


    ![A421548_1_En_4_Fig13_HTML.jpg](img/A421548_1_En_4_Fig13_HTML.jpg)


    **图 4-13. RUnit 需要更新**


    注意，此时“Update”按钮出现在右窗格中。


    最后，**Loaded** 菜单选项如图 4-14 所示。


    ![A421548_1_En_4_Fig14_HTML.jpg](img/A421548_1_En_4_Fig14_HTML.jpg)


    **图 4-14. Loaded 菜单选项**


    除了查看已加载的内容外，你对此区域能做的操作不多。请关闭 R 包管理器窗口。我们继续。'
- fmt: '## Plotting in R


    接下来，我们来看一个简单的回归示例，如脚本所示。首先，我需要指出 `ggplot2` 包预装了相当多用于测试其功能的数据集。如第105行所示，使用语法 `data(package
    = "ggplot2")$results` 访问这些数据。该语法表示我们希望对 `ggplot2` 包运行 `data()` 函数，并将输出中名为 `results`
    的子集显示在屏幕上，如图 [4-15](#A421548_1_En_4_Chapter.html#Fig15) 所示。


    ![A421548_1_En_4_Fig15_HTML.jpg](A421548_1_En_4_Fig15_HTML.jpg)


    图 4-15.

    ggplot2 结果


    因此，我们也可以执行命令 `data(package = "ggplot2")` 来查看该包中包含的数据集列表。图 [4-16](#A421548_1_En_4_Chapter.html#Fig16)
    显示了这一结果。


    ![A421548_1_En_4_Fig16_HTML.jpg](A421548_1_En_4_Fig16_HTML.jpg)


    图 4-16.

    ggplot2 数据集


    关闭该窗口，但保持你的 R 脚本打开。我们已经在 R 交互窗口中看到了 `data(package = "ggplot2")$results` 的执行结果，所以下一个跳到第109行。这一行写着
    `data(diamonds, package = "ggplot2")`。这个语法表示我们希望对 `ggplot2` 包中的 `diamonds` 数据集运行
    `data()` 命令。高亮显示该行并按 Ctrl+Enter 执行。这里并没有任何巨大的变化；只是 `diamonds` 数据集刚刚被加载以供分析。要知道它刚刚被加载，可以检查你的变量资源管理器窗口。图
    [4-17](#A421548_1_En_4_Chapter.html#Fig17) 显示了此时变量资源管理器窗口应有的样子。


    ![A421548_1_En_4_Fig17_HTML.jpg](A421548_1_En_4_Fig17_HTML.jpg)


    图 4-17.

    diamonds 数据集已加载


    所以我们的 `diamonds` 数据集已经加载并准备就绪。下一个转到第112行，该行写着 `ls()`。这一行本身没有任何参数，只返回当前会话中用户定义的数据集或函数。在这个例子中，运行一行简单的代码只会输出一个词：`diamonds`。原因是这是本次会话中唯一加载的数据集。如果你在一个没有参数的函数中执行这一行，你将能够看到该特定函数的局部变量。如你所见，这可以是一个有用的调试工具。


    现在转到并执行第115行，该行写着 `str(diamonds)`。该命令允许我们检查作为参数传入的数据集的结构。图 [4-18](#A421548_1_En_4_Chapter.html#Fig18)
    显示了在 RTVS 中显示的结构。


    ![A421548_1_En_4_Fig18_HTML.jpg](A421548_1_En_4_Fig18_HTML.jpg)


    图 4-18.

    `str(diamonds)` 输出


    简单看一下那里返回的数据。你可以看到有很多信息，但似乎被截断了。别担心；再看一下你的变量资源管理器。你看到一个非常细微的变化，即 `diamonds` 旁边现在有一个指示器，而不是只有一个表格图标。点击这个指示器。你应该看到图
    [4-19](#A421548_1_En_4_Chapter.html#Fig19) 所示的内容。


    ![A421548_1_En_4_Fig19_HTML.jpg](A421548_1_En_4_Fig19_HTML.jpg)


    图 4-19.

    diamonds 详细信息


    这对我来说更容易阅读和理解。在图 [4-19](#A421548_1_En_4_Chapter.html#Fig19) 所示的蓝色栏正上方，列被定义为名称、值、类和类型。在那里浏览一会儿，熟悉它的样子。这是一个非常酷的功能，允许在真正分析数据之前对其进行自省。


    接下来转到第118行。这一行写着 `head(diamonds)`，它简单地指示 R 输出数据集中的前六行数据。相反，第121行写着 `tail(diamonds)`，正如你可能猜到的，输出数据集中的最后六行数据。这两次执行的结果如图
    [4-20](#A421548_1_En_4_Chapter.html#Fig20) 所示。


    ![A421548_1_En_4_Fig20_HTML.jpg](A421548_1_En_4_Fig20_HTML.jpg)


    图 4-20.

    `head()` 和 `tail()` 演示


    下一个是第127行，写着 `dim(diamonds)`。`dim()` 函数允许我们查看作为参数传递的对象的维度，这里就是 `diamonds`。执行这一行只是显示了我们之前通过检查变量资源管理器已经收集到的信息：返回了一个数据集，包含10个变量的53940个对象。


    接下来，我们进入 R 中的绘图部分。在 R 中用于绘图有三个主要的包：`base`、`lattice` 和 `ggplot2`。这也体现在第136行。


    第133行和134行如下所示：


    ```

    diamondSample <- diamonds[sample(nrow(diamonds), 5000) ,]

    dim(diamondSample)

    ```


    在继续之前，让我们分解一下这个语法。


    *   `diamondSample`：声明一个对象用于存储命令的结果。

    *   `<-`：赋值运算符，声明右边命令的结果将被赋给左边的对象。

    *   `diamonds`：引用 `diamonds` 数据集。

    *   `[sample(nrow(diamonds), 5000), ]`：从 `diamonds` 数据集中随机抽取5000个数据点。

    *   `dim(diamondSample)`：显示 `diamondSample` 对象的维度。


    正如预期的那样，`dim(diamondSample)` 命令的结果是输出 `[1] 5000   10`，这意味着返回了一个数据集，包含10个变量的5000个对象。


    接下来，我们转到第140行，内容是：`theme_set(theme_gray(base_size = 18))`。这意味着我们将字体大小设置为18pt并使用灰色主题。高亮显示并执行该行，然后跳到第143和144行。那些行显示以下代码：


    ```

    ggplot(diamondSample, aes(x = carat, y = price)) +

    geom_point(colour = "blue")

    ```


    首先，请注意这是在两行上，但它实际上是一个长命令。加号的存在表示一个续行符，这是在函数或参数内部使用之外的情况。


    在我们继续之前，让我们看一下这个命令的语法。


    *   `ggplot`：定义要执行的函数。

    *   `diamondSample`：引用 `diamondSample` 对象作为活动数据集。

    *   `aes`：定义图表的美学品质；在这个例子中，x 轴是 `carat` 集，y 轴是 `price` 集。

    *   `geom_point`：在点被绘制后对其进行自定义。


    所以这意味着我们将生成一个图表。高亮显示这两行并按 Ctrl+Enter 执行它们。图 [4-21](#A421548_1_En_4_Chapter.html#Fig21)
    显示了此操作的结果。


    ![A421548_1_En_4_Fig21_HTML.jpg](A421548_1_En_4_Fig21_HTML.jpg)


    图 4-21.

    我们的第一个图表！


    注意到 R 绘图窗口在这里获得了焦点吗？这非常方便。还要注意 x 轴是 `carat`，y 轴是 `price`，正如我们在 `aes()` 命令中定义的那样。


    接下来转到第147到149行。你会看到有一个非常轻微的添加：`scale_x_log10()`。这为我们提供了 x 轴上一个很好的对数刻度（这也在第146行中说明），所以现在继续高亮显示并执行第146到149行。图
    [4-22](#A421548_1_En_4_Chapter.html#Fig22) 显示了你现在应该看到的内容。


    ![A421548_1_En_4_Fig22_HTML.jpg](A421548_1_En_4_Fig22_HTML.jpg)


    图 4-22.

    添加对数刻度


    现在开始更有意义了。接下来，添加了另一行，让我们在 y 轴上添加另一个对数刻度。这是在第152到155行；所以高亮显示这些行并按 Ctrl+Enter 执行它们。图
    [4-23](#A421548_1_En_4_Chapter.html#Fig23) 显示了你现在应该看到的内容。


    ![A421548_1_En_4_Fig23_HTML.jpg](A421548_1_En_4_Fig23_HTML.jpg)


    图 4-23.

    在 x 和 y 轴上应用对数刻度


    我认为，现在这个图表更好了。'
  raw: '## Plotting in R


    Next, we look at a simple regression example, as shown in the script. First, I
    need to point out that the `ggplot2` package comes preloaded with quite a few
    sets of data that is to be used to test the functionality of the package. This
    data is accessed as shown on line 105, using the syntax `data(package = "ggplot2")$results`.
    This syntax says that we want to run the `data()` function against the `ggplot2`
    package and return the subset of the output referenced as `results` to the screen,
    as shown in Figure [4-15](#A421548_1_En_4_Chapter.html#Fig15).


    ![A421548_1_En_4_Fig15_HTML.jpg](A421548_1_En_4_Fig15_HTML.jpg)


    Figure 4-15.


    ggplot2 Results


    Consequently, we could also execute the command `data(package = "ggplot2")` to
    see a listing of the datasets included in the package. Figure [4-16](#A421548_1_En_4_Chapter.html#Fig16)
    shows this result.


    ![A421548_1_En_4_Fig16_HTML.jpg](A421548_1_En_4_Fig16_HTML.jpg)


    Figure 4-16.


    ggplot2 datasets


    Go ahead and close that window, but keep your R script open. We’ve got the executed
    result of `data(package = "ggplot2")$results` shown in the R Interactive window,
    so skip down to line 109 next. This line says `data(diamonds, package = "ggplot2")`.
    The syntax of this says that we want to run the `data()` command against the `diamonds`
    dataset in the `ggplot2` package. Highlight that line and press Ctrl+Enter to
    execute it. There isn’t any huge change or anything here; all that happened was
    that the `diamonds` dataset was just made available for analysis. The way you
    know that it was just loaded is to check your Variable Explorer window. Figure
    [4-17](#A421548_1_En_4_Chapter.html#Fig17) shows what the Variable Explorer window
    should look like at this point.


    ![A421548_1_En_4_Fig17_HTML.jpg](A421548_1_En_4_Fig17_HTML.jpg)


    Figure 4-17.


    diamonds dataset loaded


    So there is our `diamonds` dataset, loaded and ready to go. Go down to line 112
    next, which says `ls()`. That line by itself, without any arguments, only returns
    the datasets or functions defined by the user in the current session. In this
    instance, running a simple line of code only results in the output of a single
    word: diamonds. The reason for this is that this is the only dataset loaded for
    this session. If you were to execute this line inside of a function with no arguments,
    you would be able to see the local variables for that particular function. As
    you can tell, this can be a useful debugging tool.


    Now go down and execute line 115, which says `str(diamonds)`. This command allows
    us to examine the structure of the dataset passed in as an argument. Figure [4-18](#A421548_1_En_4_Chapter.html#Fig18)
    shows the structure displayed in RTVS.


    ![A421548_1_En_4_Fig18_HTML.jpg](A421548_1_En_4_Fig18_HTML.jpg)


    Figure 4-18.


    str(diamonds) output


    Briefly look at the returned data there. You can see that there is a lot of information
    but it appears to be truncated. Have no fear; take a look at your Variable Explorer
    again. You see that there is a very slight change, in that there is now an indicator
    next to diamonds, as opposed to just a table graphic. Click this indicator. You
    should see what is shown in Figure [4-19](#A421548_1_En_4_Chapter.html#Fig19).


    ![A421548_1_En_4_Fig19_HTML.jpg](A421548_1_En_4_Fig19_HTML.jpg)


    Figure 4-19.


    diamonds detail information


    This is much easier for me to read and decipher. Across the top, just above the
    blue bar shown in Figure [4-19](#A421548_1_En_4_Chapter.html#Fig19), the columns
    are defined as Name, Value, Class, and Type. Browse around in there for a minute
    to get familiar with how it looks. This is a very cool feature that allows the
    introspection of data before it is really analyzed.


    Go to line 118 next. This line says `head(diamonds)`, which simply instructs R
    to output the first six rows of data in the dataset. Conversely, line 121 says
    `tail(diamonds)`, which, as you’ve probably guessed, outputs the last six rows
    of data in the dataset. The results of these two executions are shown in Figure
    [4-20](#A421548_1_En_4_Chapter.html#Fig20).


    ![A421548_1_En_4_Fig20_HTML.jpg](A421548_1_En_4_Fig20_HTML.jpg)


    Figure 4-20.


    head() and tail() demonstrated


    Line 127 is next, which says `dim(diamonds)`. The `dim()` function allows us to
    see the dimension of the object passed as an argument, which would be `diamonds`
    in this case. Executing this line simply shows what we have already gathered by
    examining the Variable Explorer earlier: there is one dataset returned with 53940
    objects of 10 variables.


    Next, we move on to plotting in R. There are three main packages used for charting
    in R: `base`, `lattice`, and `ggplot2`. This is also referenced on line 136.


    Lines 133 and 134 say the following:


    ```

    diamondSample <- diamonds[sample(nrow(diamonds), 5000) ,]

    dim(diamondSample)

    ```


    Let’s break the syntax of this apart before anything else.


    *   diamondSample: Declares an object for storage of the results of the command.

    *   <- : An assignment operator that declares that the result of the command(s)
    on the right are to be assigned to the object on the left.

    *   diamonds: References the `diamonds` dataset.

    *   [sample(nrow(diamonds), 5000),]: Draws a random sample of 5000 data points
    from the `diamonds` dataset.

    *   dim(diamondSample): Shows the dimension of the `diamondSample` object.


    As expected, the result of the `dim(diamondSample)` command was the output `[1]
    5000   10`, which means that one dataset and 5000 objects in 10 variables were
    returned.


    Next, we go to line 140, which reads: `theme_set(theme_gray(base_size = 18))`.
    This says that we set the font size to 18pt and use the gray theme. Highlight
    and execute that line, then skip down to lines 143 and 144\. Those lines show
    the following code:


    ```

    ggplot(diamondSample, aes(x = carat, y = price)) +

    geom_point(colour = "blue")

    ```


    First off, note that this is on two different lines, but it is actually one long
    command. The presence of the plus sign indicates a line continuation character,
    outside of usage inside a function or argument.


    Let’s take a look at the syntax of this command before we move on.


    *   ggplot: Defines the function to be executed.

    *   diamondSample: References the `diamondSample` object as the active dataset.

    *   aes: Defines the aesthetic qualities of the chart; in this example, the x
    axis is the `carat` set and the y axis is the `price` set.

    *   geom_point: Customizes the points once they are charted.


    So this means that we will generate a chart. Highlight these two rows and press
    Ctrl+Enter to execute them. Figure [4-21](#A421548_1_En_4_Chapter.html#Fig21)
    shows the result of this action.


    ![A421548_1_En_4_Fig21_HTML.jpg](A421548_1_En_4_Fig21_HTML.jpg)


    Figure 4-21.


    Our first chart !


    Notice that the R Plot window came into focus here? That’s pretty handy. Notice
    also that the x axis is `carat` and the y axis is `price`, as we defined in the
    `aes()` command.


    Go down to lines 147 through 149 next. You’ll see there is a very slight addition
    of `scale_x_log10()`. This gives us a nice little logarithmic scale on the x axis
    (which is also stated in line 146) so go ahead and highlight and execute lines
    146 through 149 now. Figure [4-22](#A421548_1_En_4_Chapter.html#Fig22) shows what
    you should see now.


    ![A421548_1_En_4_Fig22_HTML.jpg](A421548_1_En_4_Fig22_HTML.jpg)


    Figure 4-22.


    Logarithmic scale addition


    That’s starting to make a bit more sense now. Next, another line is added to let
    us add another logarithmic scale on the y axis. This is on lines 152 through 155;
    so highlight these lines and press Ctrl+Enter to execute them. Figure [4-23](#A421548_1_En_4_Chapter.html#Fig23)
    shows what you should see now.


    ![A421548_1_En_4_Fig23_HTML.jpg](A421548_1_En_4_Fig23_HTML.jpg)


    Figure 4-23.


    Logarithmic scale on x and y axes


    The chart is even better now, I think .'
