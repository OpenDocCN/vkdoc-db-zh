    ![A421548_1_En_2_Fig22_HTML.jpg](A421548_1_En_2_Fig22_HTML.jpg)

    图 2-22. 安装完成


    点击图 [2-22](#A421548_1_En_2_Chapter.html#Fig22) 中所示的 Finish 按钮，以完成安装。此时不需要重新启动。您已具备在
    Visual Studio 中启动和运行 R 所需的一切。


    ## Visual Studio 环境


    现在我们已经按照 Microsoft 的说明安装了所有内容，让我们看看我们新的开发环境，看看有什么新的、改变的或不同的。对于那些以前使用过 Visual Studio
    的人（可能你们中的大多数人），你们会看到熟悉的 Visual Studio 环境。对于那些以前没有使用过 Visual Studio 的人，我邀请你们花一点时间在各个菜单部分中浏览一下，看看您对用户界面的熟悉程度。再次说明，如果您有一个熟悉的
    IDE 更愿意用来编写 R 代码，请务必使用那个。我将引导您快速了解一下 Visual Studio 2015 中与新的 R 功能特别相关的菜单。


    请继续启动 Visual Studio。您可能会看到提示您连接到开发者服务的屏幕。如果看到这个，请继续按 Maybe Later。这些都是预期的。您最终会看到图
    [2-23](#A421548_1_En_2_Chapter.html#Fig23) 所示的主 IDE 屏幕。查看菜单栏中位于菜单工具栏中心稍右侧的 R Tools
    菜单。


    ![A421548_1_En_2_Fig23_HTML.jpg](A421548_1_En_2_Fig23_HTML.jpg)

    图 2-23. `R` 已作为 Visual Studio 的一部分安装


    R Tools 菜单是现在 Visual Studio 中所有 R 功能的所在。打开此菜单会显示图 [2-24](#A421548_1_En_2_Chapter.html#Fig24)
    中的选项。


    ![A421548_1_En_2_Fig24_HTML.jpg](A421548_1_En_2_Fig24_HTML.jpg)

    图 2-24. `R` Tools 菜单选项


    让我们看看这些菜单选项。以下小节简要描述了每个菜单选项为您做了什么以及该菜单选项允许您控制什么。


    ### Session


    Session 选项允许您进行 `R` 会话。以下是可用选项：


    *   Interrupt R

    *   Attach Debugger

    *   Reset

    *   Load Workspace…

    *   Save Workspace As…


    ### Plots


    Plots 选项允许您定义希望如何显示结果。以下是您的可用选项：


    *   Previous Plot

    *   Next Plot

    *   Save as Image

    *   Save as PDF

    *   Copy as Bitmap

    *   Copy as Metafile

    *   Remove Plot

    *   Clear All Plots


    显然，您可以看到这是一个巨大的帮助。能够将这些图导出为提到的各种类型，已经比其他一些仅生成 Flash 或 Silverlight 的系统具有了相当大的优势。


    ### Data


    Data 选项允许您定义希望如何使用已存在的数据。以下是您的可用选项：


    *   Import Dataset into R Session from Web URL…

    *   Import Dataset into R Session from Text File…

    *   Delete All Variables


    我想知道未来我们是否会获得连接到不同数据库和/或安装的选项……如果 Microsoft 决定走那条路，这将是一个有趣的发展。我认为，提供更多的数据源供使用只会增强产品的可用性。


    ### Working Directory


    Working Directory 选项允许您更改工作目录。您的工作目录与 `R` 的安装位置不同。工作目录意味着这是您保存正在处理的文件的地方。


    *   Set Working Directory to Source File Location

    *   Set Working Directory to Project Location

    *   Select Working Directory…'
  raw: '## Download Microsoft R Open


    The final step to getting the installation all working is to install Microsoft
    R Open. Go back to the web page provided by Microsoft and shown in Figure [2-1](#A421548_1_En_2_Chapter.html#Fig1)
    and click the Download Microsoft R Open link. At this point, another web page
    opens; its URL is [`https://mran.revolutionanalytics.com/download/`](https://mran.revolutionanalytics.com/download/)
    . Figure [2-14](#A421548_1_En_2_Chapter.html#Fig14) shows the Microsoft R Open
    download page that you should see at this point.


    ![A421548_1_En_2_Fig14_HTML.jpg](A421548_1_En_2_Fig14_HTML.jpg)


    Figure 2-14.


    Opened web page


    Notice that the download for Microsoft R Open is available for 64-bit platforms
    only. Microsoft R Open is available for 64-bit versions of Windows (7 SP1, 8.1,
    10, Server 2008 R2 SP1, and Server 2012), Ubuntu (14.04 and 15.04), Red Hat Enterprise
    Linux (7.1 and 6.5), and SUSE Linux Enterprise Server 11.


    Go ahead and click the link for your operating system; the download should start.
    At the time of this writing, the file name is `microsoft-r-open-3.3.1.msi` for
    the Windows installation and it is 131MB in size. The executable takes a little
    while to download, so go grab a drink or something while you’re waiting .


    Has Microsoft R Open finished downloading? Good. Then let’s go ahead and install
    it now. Double-click the executable that you’ve just downloaded. Figure [2-15](#A421548_1_En_2_Chapter.html#Fig15)
    shows what you should see at this point.


    ![A421548_1_En_2_Fig15_HTML.jpg](A421548_1_En_2_Fig15_HTML.jpg)


    Figure 2-15.


    Starting Microsoft R Open installation


    Click Next. You should be taken to the screen shown in Figure [2-16](#A421548_1_En_2_Chapter.html#Fig16).
    This screen provides some detail about the impending installation. Read over the
    information given, click the I Acknowledge check box, and then click Next when
    you are ready.


    ![A421548_1_En_2_Fig16_HTML.jpg](A421548_1_En_2_Fig16_HTML.jpg)


    Figure 2-16.


    Information


    The next screen, shown in Figure [2-17](#A421548_1_En_2_Chapter.html#Fig17), shows
    the Install Math Kernel Library (Intel© MKL) installation option.


    ![A421548_1_En_2_Fig17_HTML.jpg](A421548_1_En_2_Fig17_HTML.jpg)


    Figure 2-17.


    Install Math Kernel Library (Intel© MKL) option


    This is completely your decision to install or not, since it is not a required
    installation portion, but it is recommended that you install it. The reason it
    is selected by default is that the addition of the math kernel library allows
    your R code to use all available resources to generate a result, which means that
    it gets done a lot faster (depending on the speed of your machine and the available
    resources). I also recommend leaving this option checked. Click Next when you
    are ready to move on.


    Next, we have to accept the license terms for the MKL that we are installing.
    This is shown in Figure [2-18](#A421548_1_En_2_Chapter.html#Fig18) .


    ![A421548_1_En_2_Fig18_HTML.jpg](A421548_1_En_2_Fig18_HTML.jpg)


    Figure 2-18.


    Accept MKL license terms


    At this point, make sure that you click the I accept check box, and then click
    Next to move on.


    Next, the screen in Figure [2-19](#A421548_1_En_2_Chapter.html#Fig19) shows the
    destination location information. Click Next to accept the target folder.


    ![A421548_1_En_2_Fig19_HTML.jpg](A421548_1_En_2_Fig19_HTML.jpg)


    Figure 2-19.


    Select Destination Location


    Click Next here. The following screen, shown in Figure [2-20](#A421548_1_En_2_Chapter.html#Fig20),
    lets us begin the installation; click Install when you are ready.


    ![A421548_1_En_2_Fig20_HTML.jpg](A421548_1_En_2_Fig20_HTML.jpg)


    Figure 2-20.


    Ready to install


    Figure [2-21](#A421548_1_En_2_Chapter.html#Fig21) shows the installation running.
    It doesn’t take very long, thankfully.


    ![A421548_1_En_2_Fig21_HTML.jpg](A421548_1_En_2_Fig21_HTML.jpg)


    Figure 2-21.


    Installing


    Finally, we are done installing Microsoft R Open. Figure [2-22](#A421548_1_En_2_Chapter.html#Fig22)
    shows the final screen you should see at this point in the installation .


    ![A421548_1_En_2_Fig22_HTML.jpg](A421548_1_En_2_Fig22_HTML.jpg)


    Figure 2-22.


    Installing


    Click the Finish button, as shown in Figure [2-22](#A421548_1_En_2_Chapter.html#Fig22),
    to finish the installation. No reboot is needed at this point. You have all you
    need to be up and running with R in Visual Studio .


    ## Visual Studio Environment


    Now that we have everything installed according to Microsoft, let’s take a look
    around our new development environment and see what is new, changed, or different.
    For those of you that have used Visual Studio before (and that’s probably a large
    number of you), you see the familiar Visual Studio environment. For those of you
    that haven’t used Visual Studio before, I invite you to spend a little time poking
    around in the various menu sections to see how comfortable you are with the user
    interface. Again, if you have a familiar IDE that you would rather use to write
    R code, by all means, go ahead and use that one instead. I will guide you along
    a quick introduction to the menus specifically pertaining to the new R functionality
    in Visual Studio 2015.


    Go ahead and start Visual Studio. You might see screens prompting you to connect
    to developer services. If you see this, go ahead and press Maybe Later. Those
    are expected. You eventually get to the main IDE screen shown in Figure [2-23](#A421548_1_En_2_Chapter.html#Fig23).
    Look at the menu bar for the R Tools menu that is just a bit to the right of the
    center of the menu toolbar.


    ![A421548_1_En_2_Fig23_HTML.jpg](A421548_1_En_2_Fig23_HTML.jpg)


    Figure 2-23.


    R is installed as part of Visual Studio


    The R Tools menu is home to all the R functionality now available from Visual
    Studio. Opening this menu shows the options in Figure [2-24](#A421548_1_En_2_Chapter.html#Fig24).


    ![A421548_1_En_2_Fig24_HTML.jpg](A421548_1_En_2_Fig24_HTML.jpg)


    Figure 2-24.


    R Tools menu options


    Let’s take a look at those menu options. The following subsection gives a brief
    description of what each menu option does for you and what that menu option allows
    you to control.


    ### Session


    The Session option lets you conduct R sessions. The following are the available
    options:


    *   Interrupt R

    *   Attach Debugger

    *   Reset

    *   Load Workspace…

    *   Save Workspace As…


    ### Plots


    The Plots option lets you define how you want your results to be shown. The following
    are your available options:


    *   Previous Plot

    *   Next Plot

    *   Save as Image

    *   Save as PDF

    *   Copy as Bitmap

    *   Copy as Metafile

    *   Remove Plot

    *   Clear All Plots


    Clearly, you can see that this is a huge help. The ability to export these plots
    as the various types mentioned is already a pretty big advantage over some other
    systems that only generate in Flash or Silverlight, for example.


    ### Data


    The Data option lets you define how you want to consume data that already exists.
    The following are you available options:


    *   Import Dataset into R Session from Web URL…

    *   Import Dataset into R Session from Text File…

    *   Delete All Variables


    I wonder if we will get the option to connect to different databases and/or installations
    in the future…? It would be an interesting development, should Microsoft decide
    to pursue that path. I think that making more data sources available for consumption
    is only going to enhance the usability of the product.


    ### Working Directory


    The Working Directory option allows you to change your working directory. Your
    working directory is different from where the installation of R is installed,
    for example. A working directory means that this is where you save the files that
    you are working on.


    *   Set Working Directory to Source File Location

    *   Set Working Directory to Project Location

    *   Select Working Directory…'
