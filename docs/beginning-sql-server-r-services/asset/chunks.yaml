  trans: '## 设置新数据库和表


    现在一切准备就绪，让我们先做一些温习工作。


    回顾第 5 章，我们创建了几个需要交付给客户的报告。这些报告基于`Weather_Sample.csv`数据。稍后，我们将把这些数据导入 SQL Server
    并进行处理。不过，首先让我们粗略看一下这些数据。


    在继续之前，让我们先设置一些数据库基础设施。我们需要新建一个数据库，然后创建一个表作为该数据的数据源。


    在`SSMS`中，右键单击`数据库`并选择`新建数据库`选项。将出现一个允许创建新数据库的屏幕。如图 7-14 所示的`新建数据库`屏幕左窗格中，初始选项卡名为`常规`。请在此屏幕中进行如下更改。


    ![A421548_1_En_7_Fig14_HTML.jpg](img/A421548_1_En_7_Fig14_HTML.jpg)


    图 7-14. 新建数据库


    完成后点击`确定`按钮。名为`SQL2016RS`的新数据库即被创建。


    接下来，打开一个新的`查询`窗口，将活动数据库更改为`SQL2016RS`，然后输入以下内容：


    ```sql

    CREATE TABLE [dbo].[chartBinary] (

    [uid] int identity(1,1) PRIMARY KEY,

    [title] varchar(100) NULL,

    [binData] varbinary(max) NULL

    )

    ```


    按`F5`执行该代码——瞧！我们的表就创建好了。图 7-15 显示了这个表。


    ![A421548_1_En_7_Fig15_HTML.jpg](img/A421548_1_En_7_Fig15_HTML.jpg)


    图 7-15. chartBinary 表


    现在我们有了一个存储二进制数据和图表标题的表。接下来，我们需要生成实际的二进制数据。虽然我知道有办法将这些二进制数据直接提取到 Reporting Services
    中，但我认为理解数据如何与`报表服务器`协作以获取生成的二进制数据并创建图表是很重要的。通过这种方式，你肯定能比有些人偏好的点击方法学到更多关于图表创建过程的知识。


    回顾第 5 章，我们是如何将`Weather_Sample.csv`文件导入界面然后生成图表的。完成该操作的代码如下：


    ```r

    Weather_Sample <- read.csv(file="C:/Users/Bradley Beard/AppData/Local/Temp/Weather_Sample.csv.utf8",
    header=TRUE, row.names=NULL, encoding="UTF-8", sep=",", dec=".", quote="\"", comment.char="")

    ```


    我不再指向`Temp`目录，而是将之前下载的`.zip`文件中的`Weather_Sample.csv`文件复制出来，直接放在`C:`盘根目录下，纯粹是为了让文件路径更短。这是更新后的代码：


    ```r

    Weather_Sample <- read.csv(file="C:\\Weather_Sample.csv", header=TRUE, row.names=NULL,

    encoding="UTF-8", sep=",", dec=".", quote="\"", comment.char="")

    ```


    请注意，我将单反斜杠改为了双反斜杠，以转义`\W`命令。当存在转义字符时，`R`会报错，因此请确保已将所有单反斜杠转换为双反斜杠。


    那么，我假设我们可以将这段代码放入存储过程中，并让数据可用。这个假设正确吗？事实证明……是的！


    考虑以下代码。


    ```sql

    exec sp_execute_external_script

    @language =N''R'',

    @script=N''Weather_Sample <- read.csv(file="C:\\Weather_Sample.csv",

    header=TRUE, row.names=NULL, encoding="UTF-8", sep=",", dec=".", quote="\"", comment.char="");

    print(unique(Weather_Sample$AirportID) );''

    ```


    将其分解来看，我们可以看到`@script`属性包含一个声明，将`Weather_Sample`定义为对位于`C:\Weather_Sample.csv`的`CSV`文件执行`read()`操作的结果，该操作包含`header`信息，不含`row.names`，编码为`UTF-8`，以逗号分隔，根据需要包含小数点，并处理了转义引号和注释。然后，我们只是打印`Weather_Sample`数据集中`AirportID`列的唯一值。在`SSMS`中输入该代码。代码执行后的情况如图
    7-16 所示。


    ![A421548_1_En_7_Fig16_HTML.jpg](img/A421548_1_En_7_Fig16_HTML.jpg)


    图 7-16. 脚本执行


    这些是数据中唯一的`机场` `ID`。我们也可以对任何其他你想要的列执行此操作。`AdjustedDay`列怎么样？只需将最后一部分从`AirportID`改为`AdjustedDay`即可。你的代码应如下所示。


    ```sql

    exec sp_execute_external_script

    @language =N''R'',

    @script=N''Weather_Sample <- read.csv(file="C:\\Weather_Sample.csv",

    header=TRUE, row.names=NULL, encoding="UTF-8", sep=",", dec=".", quote="\"", comment.char="");

    print(unique(Weather_Sample$AdjustedDay));''

    ```


    在`SSMS`中运行它。你应该看到如图 7-17 所示的结果。


    ![A421548_1_En_7_Fig17_HTML.jpg](img/A421548_1_En_7_Fig17_HTML.jpg)


    图 7-17. AdjustedDay 脚本


    因此，这实际上表明，我们可以将现有的`CSV`格式数据用作本地报告的一部分。回想一下我之前提到的，我们将把此数据添加到`SQL Server`中；那么现在就开始吧。'
- fmt: '## Importing Weather Data


    What we want to do is pretty simple: import the dataset so we can work with it.
    The trick this time is that we will import it directly into SQL Server as a table
    named `Weather_Sample`. To do this, we need to expand SQL Server Management Studio
    until you see the Tables menu in the `SQL2016RS` database, as shown in Figure
    [7-18](#A421548_1_En_7_Chapter.html#Fig18).


    ![A421548_1_En_7_Fig18_HTML.jpg](A421548_1_En_7_Fig18_HTML.jpg)

    *Figure 7-18. Tables location*


    Right-click `SQL2016RS` and choose **Tasks** ➤ **Import Data**. That opens up
    the `SQL Server Import and Export Wizard` window. You are probably very familiar
    with this, if you regularly deal with manual data manipulation. This is shown
    in Figure [7-19](#A421548_1_En_7_Chapter.html#Fig19).


    ![A421548_1_En_7_Fig19_HTML.jpg](A421548_1_En_7_Fig19_HTML.jpg)

    *Figure 7-19. Import/Export Data initial screen*


    Click **Next** here. You see what is shown in Figure [7-20](#A421548_1_En_7_Chapter.html#Fig20).


    ![A421548_1_En_7_Fig20_HTML.jpg](A421548_1_En_7_Fig20_HTML.jpg)

    *Figure 7-20. Choose a Data Source*


    Pull down the **Data Source** menu at the top and choose **Flat File Source**.
    You are then shown Figure [7-21](#A421548_1_En_7_Chapter.html#Fig21), which shows
    the default values for this screen.


    ![A421548_1_En_7_Fig21_HTML.jpg](A421548_1_En_7_Fig21_HTML.jpg)

    *Figure 7-21. Default values for Flat File Source*


    Click the **Browse...** button and navigate to where you have saved the `Weather_Sample.csv`
    file. You need to pull down the file type menu and change the selected option
    to search for `.csv` files in order to find the file we are looking for. Once
    you find the `Weather_Sample.csv` file, click the **Open** button and the interface
    populates with information from the selected file. My example is shown in Figure
    [7-22](#A421548_1_En_7_Chapter.html#Fig22).


    ![A421548_1_En_7_Fig22_HTML.jpg](A421548_1_En_7_Fig22_HTML.jpg)

    *Figure 7-22. Populated values*


    Note that SQL Server automatically pulled in the values for those columns, so
    it knows what the data types and formats are.


    Notice that yellow warning on the bottom? Click the **Columns** tab in the upper
    left and then click the **General** tab again. Figure [7-23](#A421548_1_En_7_Chapter.html#Fig23)
    shows what happened when I did this.


    ![A421548_1_En_7_Fig23_HTML.jpg](A421548_1_En_7_Fig23_HTML.jpg)

    *Figure 7-23. The disappearing warning*


    No big deal, doing this action just made that warning disappear because the columns
    were mapped once the Columns section was selected. Everything else is the same,
    but I guess the interface needed to be refreshed. At any rate, we are good to
    go with this screen, so click **Next**. Figure [7-24](#A421548_1_En_7_Chapter.html#Fig24)
    shows what you will see next.


    ![A421548_1_En_7_Fig24_HTML.jpg](A421548_1_En_7_Fig24_HTML.jpg)

    *Figure 7-24. Character delimiter section*


    This section allows you to choose a delimiter for the file, if needed. We don’t
    need one since the default works just fine, so just click **Next**.


    We now come to the screen where we can choose our destination file, shown in Figure
    [7-25](#A421548_1_En_7_Chapter.html#Fig25).


    ![A421548_1_En_7_Fig25_HTML.jpg](A421548_1_En_7_Fig25_HTML.jpg)

    *Figure 7-25. Destination location*


    We want to change the **Destination** to `SQL Server Native Client 11.0` here.
    The reason for this is because we aren’t connecting over the other destination
    types (.Net and OLE DB). This is the native client. Make this change. You should
    see what is shown in Figure [7-26](#A421548_1_En_7_Chapter.html#Fig26).


    ![A421548_1_En_7_Fig26_HTML.jpg](A421548_1_En_7_Fig26_HTML.jpg)

    *Figure 7-26. Updated Destination*


    We want to keep these default values, so click **Next** at this screen. You see
    the source and destination information shown in Figure [7-27](#A421548_1_En_7_Chapter.html#Fig27).


    ![A421548_1_En_7_Fig27_HTML.jpg](A421548_1_En_7_Fig27_HTML.jpg)

    *Figure 7-27. Source and Destination information*


    This basically says that we take the data represented in the **Source** column
    on the left and put it into the destination on the right.


    The source points to the `Weather_Sample.csv` file we originally downloaded.


    The destination points to our database named instance. A table is specified by
    `[dbo].[Weather_Sample]`.


    Click **Next** to see the **Save and Run** options shown in Figure [7-28](#A421548_1_En_7_Chapter.html#Fig28).


    ![A421548_1_En_7_Fig28_HTML.jpg](A421548_1_En_7_Fig28_HTML.jpg)

    *Figure 7-28. Save and Run*


    When you see this, just click **Finish**. You’re then shown a screen that gives
    a quick recap of what we’re going to do, as shown in Figure [7-29](#A421548_1_En_7_Chapter.html#Fig29).
    Go ahead and click **Finish** here, too.


    ![A421548_1_En_7_Fig29_HTML.jpg](A421548_1_En_7_Fig29_HTML.jpg)

    *Figure 7-29. Complete the Wizard*


    The installation runs for a few seconds, but eventually, you will see what is
    shown in Figure [7-30](#A421548_1_En_7_Chapter.html#Fig30).


    ![A421548_1_En_7_Fig30_HTML.jpg](A421548_1_En_7_Fig30_HTML.jpg)

    *Figure 7-30. Import was successful*


    Go ahead and click **Close**. We’ve now got that external data brought in to SQL
    Server as internal data. Don’t worry, we’re not off track yet. We will generate
    that binary data very soon, but we have to take care of the leg work first.


    Recall that we were getting the Average Wind Speed by Airport ID earlier. In SQL,
    now that we have that data in the database, the query looks like this:


    ```sql

    SELECT AirportID, AVG(CONVERT(float, WindSpeed)) as WindSpeed

    FROM [Weather_Sample]

    GROUP BY AirportID

    ORDER BY AirportID

    ```


    Type that into a new query window and press **F5** to execute the code. You should
    see what is shown in Figure [7-31](#A421548_1_En_7_Chapter.html#Fig31).


    ![A421548_1_En_7_Fig31_HTML.jpg](A421548_1_En_7_Fig31_HTML.jpg)

    *Figure 7-31. Query execution*


    Excellent! This shows us that we have the data in the correct table and that we
    can query it normally. That is going to be absolutely vital to generating the
    chart data shortly.'
