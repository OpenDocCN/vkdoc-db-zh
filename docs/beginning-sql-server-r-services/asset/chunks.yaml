    我们在本章中做了相当多的工作，包括构建数据模型并验证我们正在将数据返回到对象变量中。我们还研究了如何通过不同类型的图表对这些值进行绘图。接下来，我们将使用适用于
    Visual Studio 的 R 工具（RTVS）深入研究 R 中更高级的绘图。


    # 5. 在 RTVS 中绘图


    接着我们在第 4 章结束的地方继续，我们可能已经对 R 足够熟悉，可以开始着手创建第 3 章中创建的软件需求文档中指定的报告。请理解，我绝不是在暗示我们是这门语言的专家。实际上恰恰相反。我们已经进展到足以理解一些基础知识，现在我们将通过继续前进来扩展这些知识，同时仍然认识到我们是在爬行而非行走。


    让我们回顾一下我们的软件需求文档中承诺的报告。这些报告是：


    *   每个 AirportID 的平均风速

    *   每个 AirportID 的平均温度（°F）


    考虑到这一点，让我们开始在适用于 Visual Studio 的 R 工具（RTVS）中规划解决方案，并看看是否能让它们正常工作。

    '
- fmt: '## Report 1: Average Wind Speed by Airport ID


    In this first part, we calculate the Average Wind Speed per Airport. This is done
    by simply adding all the wind speed values for each `AirportID`, and then dividing
    by the number of records. R provides a quick way for us to do this by using core
    functionality called `data.table`. What is `data.table`? It’s a package freely
    available with a lot of really cool ways of slicing and dicing large amounts of
    numerical data. You need the `data.table` package if you want to calculate `mean`,
    `sum`, or just about any R built-in function easily.


    Open R Tools for Visual Studio. You should see what is shown in Figure [5-1](#A421548_1_En_5_Chapter.html#Fig1).
    Notice that we are working with a fresh instance of RTVS and not using the old
    interface from the previous chapters.

    ![A421548_1_En_5_Fig1_HTML.jpg](A421548_1_En_5_Fig1_HTML.jpg)

    Figure 5-1. R Tools for Visual Studio


    The reason that we are working in a fresh environment is because we are importing
    datasets and working with that data. I don’t want there to be any chance of working
    with the wrong data and possibly getting incorrect results.


    ### Importing the Dataset


    The first thing that we have to do, as data scientists, is to gather our data.
    This sounds easy when you have a file location or URL to get the data from. When
    you don’t have the data available and you have to define it, it is consequently
    much more difficult to ascertain. Luckily, that is not the case, since we have
    a complete set of data ready to be imported.


    First, make sure that you have unzipped the file we downloaded from Chapter [4](#A421548_1_En_4_Chapter.html),
    `RTVS-docs-master`. Within this `.zip` file, navigate to `RTVS-docs-master\examples\MRS_and_Machine_Learning\Datasets`.
    In this directory is a file named `Weather_Sample.csv`. This file is our data
    source for this example, so you can either leave it there or copy it to another
    location on your PC that is easier to remember.


    Now, with RTVS up and running, we go to R Tools ➤ Data ➤ Import Dataset into R
    Session from Text File... to get that data into our environment. Once you click
    the Import Dataset into R Session from Text File menu option, an interface appears
    that prompts you to navigate to the file that you want to import. We will use
    `Weather_Sample.csv`, so navigate to the location where you saved that file and
    click the Open button.


    You should see what is shown in Figure [5-2](#A421548_1_En_5_Chapter.html#Fig2).

    ![A421548_1_En_5_Fig2_HTML.jpg](A421548_1_En_5_Fig2_HTML.jpg)

    Figure 5-2. Initial data view


    Pretty impressive! We can see that the first 19 rows of data were brought in,
    which is probably meant to give us a good sample size of the data types and lengths.


    Note that you can click the top-right corner between Input File and Data Frame
    to see the raw data vs. the formatted data.


    When you are done looking at this, click OK. You then see what is shown in Figure
    [5-3](#A421548_1_En_5_Chapter.html#Fig3).

    ![A421548_1_En_5_Fig3_HTML.jpg](A421548_1_En_5_Fig3_HTML.jpg)

    Figure 5-3. Variable Explorer


    Note that the R Interactive window also generated the following code:

    ```

    `Weather_Sample` <- read.csv(file="C:/Users/Bradley Beard/AppData/Local/Temp/Weather_Sample.csv.utf8",
    header=TRUE, row.names=NULL, encoding="UTF-8", sep=",", dec=".", quote="\"", comment.char="")

    ```

    This is interesting, because this shows us from R’s point of view how data gets
    imported into the current working project.


    ### Opening a Script Pane


    Now that we’ve loaded the dataset, we can open a Visual Studio pane for executing
    R scripts to prepare and analyze our data. Close the Start Page shown in the top-left
    pane of Figure [5-3](#A421548_1_En_5_Chapter.html#Fig3). Then open a fresh R script
    by pressing `Ctrl+N`, clicking R in the left pane, and choosing R Script, as shown
    in Figure [5-4](#A421548_1_En_5_Chapter.html#Fig4).

    ![A421548_1_En_5_Fig4_HTML.jpg](A421548_1_En_5_Fig4_HTML.jpg)

    Figure 5-4. New R Script


    Click the Open button to open a blank script window. You should now have an interface
    similar to what is shown in Figure [5-5](#A421548_1_En_5_Chapter.html#Fig5).

    ![A421548_1_En_5_Fig5_HTML.jpg](A421548_1_En_5_Fig5_HTML.jpg)

    Figure 5-5. Ready to work!


    Now that our data is loaded correctly and we have a fresh interface to work in,
    we can move on to the next section.


    ### Preparing the Dataset


    How on earth do you prepare a dataset? Isn’t it already prepared? Well, yes and
    no: yes, because the data is already well-formed and meaningful, so now we get
    to see what it is really trying to say; no, because it isn’t ready to be analyzed
    by R yet because it’s still raw. We need to do some auxiliary things to the data
    first, to get it ready for analysis.


    To get the data ready for analysis, type the following code into your `Script1.R`
    window:

    ```

    install.packages("data.table")

    library(data.table)

    Weather_Sample <- data.table(Weather_Sample)

    setkey(Weather_Sample, AirportID)

    ```

    Figure [5-6](#A421548_1_En_5_Chapter.html#Fig6) shows how your Visual Studio window
    should look after entering the code that I’ve just given.

    ![A421548_1_En_5_Fig6_HTML.jpg](A421548_1_En_5_Fig6_HTML.jpg)

    Figure 5-6. Preparation


    Now, let’s go over what this code is actually doing.


    *   `install.packages("data.table")`: This code simply installs the `data.table`
    package.

    *   `library(data.table)`: This code makes `data.table` package available to the
    current R session.

    *   `Weather_Sample <- data.table(Weather_Sample)`: This code sets an empty object
    named `Weather_Sample` equal to the `data.table` representation of the `Weather_Sample`
    dataset.

    *   `setkey(Weather_Sample, AirportID)`: This code allows for grouping on a specific
    column.


    Now that we understand what is happening here, we see that there is no code that
    actually provides analysis. You are correct in that generalization, because we
    haven’t actually begun the analysis, we have only begun to prepare the dataset
    for analysis. This is an important first step, because it is sort of like the
    foundation for what we do next, which is create the reports we need to generate
    as part of the software requirements document.


    Executing the lines of code that I provided in Figure [5-6](#A421548_1_En_5_Chapter.html#Fig6)
    shows that the `chron` package was also downloaded along with `data.table`. It
    is important to point out that any dependent packages to a requested package for
    download is always downloaded as well. This eliminates the possibility of errors
    occurring because of package dependencies. In case you haven’t already executed
    those lines of code, go ahead and do it now.'
