  trans: "\n### 为何选择 R？\n\n问得好。为什么是 R？答案其实很简单……我认为是因为微软希望借助 `SQL Server` 扩大其在数据科学领域的影响力，因此，他们自然会希望拥有最好的数据分析产品，而\
    \ `R` 无疑是首选。微软的商业智能（Business Intelligence）产品已经非常出色，因此如果他们能找到一种方法……\n\n*   收购一款已被广泛使用的数据分析产品\n\
    *   将该产品整合到其现有的数据库平台中\n*   提供一个能与 `Visual Studio` 无缝集成的图形用户界面（GUI）\n*   并免费提供这一切\n\
    \n……那么（数据分析）世界就将是他们的囊中之物了！据我所知，目前还没有任何其他数据库系统能实现与 `R` 如此全面的交互。虽然有很多场景是先在数据库中准备数据，然后再导入到\
    \ `R` 中，但这种交互是完全不同层面的。\n\n`SQL Server 2016` 实际上将 `R 引擎` 实例作为数据库引擎的原生组件来运行。这太棒了！对于那些在微软对\
    \ `SQL Server` 进行重大改动、推出 `SQL Server 2005` 时就使用过它的用户来说，你们还记得当时 `Integration Services`\
    \ 带来的震撼以及“我的 `DTS` 脚本怎么办？？”的疑问吧？这次的改动是同等级别的；对于那些对数据分析或商业智能感兴趣的人来说，加入 `R` 所带来的影响注定是深远的，并且必将促成数据科学领域一些惊人的进步。就我个人而言，我迫不及待想成为其中的一部分。\n\
    \n另外，为了让这件事明了……\n\n```text\nThe MIT License (MIT)\nCopyright (c) 2016 Microsoft\n\
    Permission is hereby granted, free of charge, to any person obtaining a copy of\
    \ this software and associated documentation files (the \"Software\"), to deal\
    \ in the Software without restriction, including without limitation the rights\
    \ to use, copy, modify, merge, publish, distribute, sublicense, and/or sell copies\
    \ of the Software, and to permit persons to whom the Software is furnished to\
    \ do so, subject to the following conditions:\nThe above copyright notice and\
    \ this permission notice shall be included in all copies or substantial portions\
    \ of the Software.\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY\
    \ KIND, EXPRESS OR\nIMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,\
    \ FITNESS FOR A\nPARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE\n\
    AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER\nLIABILITY,\
    \ WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,\nOUT OF OR\
    \ IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.\n\
    ```\n\n换句话说，感谢你，微软，让我可以免费使用你如此多的资源！我真心感激。\n\n如果你读过我的第一本书 `SQL Server 实用维护计划（Apress,\
    \ 2016）`，那么你已经熟悉我的写作风格了。我倾向于保持轻松甚至有时古怪的语气，同时不牺牲技术内容。有时，我可能会跑题到一些“兔子洞”里，但最后总会回到正题。大多数时候，我可能需要花点时间才能绕回来，但最终我总会回到原点。\n\
    \n现在——在我们开始安装和设置环境之前——是你花几分钟熟悉 `R` 及其功能的绝佳时机。\n\n一旦你准备好了，就让我们开始数据科学家的旅程吧！\n\n\
    ## 致谢\n\n再次感谢 Jonathan Gennick 和 Jill Balzano 在本书出版过程中给予我的指导。你们太棒了。\n\n再次感谢我的第一位导师\
    \ John Wysocki，他目前可能正在某个豪华度假村享受半退休生活：我无法表达我对你点燃我创造力火花的感激之情。\n\n感谢我最新的导师 Suzy Moore，她无疑是我认识的最聪明的人：我迫不及待想向你学习更多。\n\
    \n感谢独一无二的 Chester Flake：感谢你在认证方面提供的指导。任何需要认证培训的人都需要去 [`www.certificationcamps.com`](http://www.certificationcamps.com)\
    \ 今天就注册。你绝不会后悔的。\n\n感谢我的兄弟 Brian、侄女 Holly、嫂子 Andie，以及 Drew、Austin 和 Sam：妈妈说了，晚上\
    \ 10 点后不准放烟花！\n\n感谢我的父母 Richard 和 Carolyn，我的岳父母 Steve 和 Carey，我的姻亲 Al 和 Val，其他的兄弟\
    \ Joe、Rick、Zimmer 和 Dave，以及其他姐妹 Morgan、Erika、Jennifer、Kim 和 Michelle，以及所有我忘了提及的人……嗯，你们了解我的……\n\
    \n最后，感谢我的妻子 Jessica 和孩子们——Josh、Kayloo、Matthew 和 Emma，你们不得不忍受我为写这本书而长时间离开：非常感谢你们。\n\
