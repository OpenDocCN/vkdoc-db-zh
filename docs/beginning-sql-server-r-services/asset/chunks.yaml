    ## 6. Configuring SQL Server Reporting Services


    Recall back in Chapter 1 that we installed Reporting Services as part of the initial
    SQL Server installation. When we installed Reporting Services, we selected the
    Install and configure option. Now we have to configure the Reporting Services
    instance that we installed. Keep in mind that Reporting Services was already installed
    and configured (and operational) at the point that the Install and configure option
    was selected when SQL Server was installed. The purpose of this chapter is to
    familiarize you with the options available within Reporting Services Configuration
    Manager, so that if you need to change a setting in your own installation, you
    have the knowledge and confidence of how to make the required change and where
    to look for the solution.

    First, we’ll run Reporting Services Configuration Manager and connect to our newly
    installed instance, and then we’ll go through a number of configuration options
    at our disposal.


    ### Connecting to an Instance


    Go to the Windows Start menu. Reporting Services Configuration Manager should
    show in the Recently Added box. If it’s not there, open the Windows Start menu,
    click All Apps, and then scroll down to Microsoft SQL Server 2016. It should be
    inside that folder. If not, just start typing Reporting Services and it will pop
    up. Click it to continue. You then see what is shown in Figure 6-1.


    ![A421548_1_En_6_Fig1_HTML.jpg](A421548_1_En_6_Fig1_HTML.jpg)


    Figure 6-1. Reporting Services Configuration Connection


    Click the Connect button here to connect to your instance. You’ll then see the
    home configuration page shown in Figure 6-2.


    ![A421548_1_En_6_Fig2_HTML.jpg](A421548_1_En_6_Fig2_HTML.jpg)


    Figure 6-2. Report Server Status


    The home configuration page, which is my own name for it, tells you general information
    about your Reporting Services instance. Most importantly, note that the service
    has started. We won’t get very far otherwise.

    Let’s take a quick look at this interface before we move on. I will introduce
    the areas in the following subsections, and then we go back and update the fields
    so that our report server starts and runs successfully.


    ### Service Account


    The settings in the Service Account area can actually stay just as they are by
    default. If you’ve changed the Use built-in account option shown in Figure 6-3,
    the default setting is Virtual Service Account. This is an account that was created
    when you installed Reporting Services in order to connect to the report server.
    You could also choose Local System, Local Service, or Network Service. I would
    advise against that, because these accounts have heightened privileges that aren’t
    necessary to run the report server.


    ![A421548_1_En_6_Fig3_HTML.jpg](A421548_1_En_6_Fig3_HTML.jpg)


    Figure 6-3. Service Account


    You can also specify another domain account to interact with this service, if
    you prefer. This is the choice for a lot of professionals, because they can tailor
    the user account to be specific to this instance of this application, for example.
    If you choose this method, go right ahead and put the username and password for
    this account in the appropriate boxes.

    Keep in mind that if you choose a custom service account, the account specified
    more than likely needs to be reviewed by a server or domain administrator in your
    organization for security purposes and for adherence to corporate policies. In
    my experience, it is best to have the server or domain administrator provide a
    list of service accounts that can be used for the various purposes needed within
    a database or application server.


    ### Web Service URL


    Figure 6-4 shows that this area allows you to configure a URL where the reports
    generated by the Reporting Server are to be generated and provided to authorized
    users. This area is already set up, unless you wanted to give your virtual directory
    a different name. In that case, go ahead and do that.


    ![A421548_1_En_6_Fig4_HTML.jpg](A421548_1_En_6_Fig4_HTML.jpg)


    Figure 6-4. Web Service URL


    Note that there are default values that have been pre-populated for you.

    The only setting I would advise on adding is the HTTPS Certificate option. If
    you happen to have an SSL certificate, make sure that the certificate is provided
    here, if you want to run over HTTPS port 443.'
