    \ +\n  geom_point(colour = \"blue\", alpha = 0.01) +\n  geom_smooth(colour = \"\
    red\") +\n  coord_equal(ylim = c(0, 20000)) +\n  ggtitle(\"Linear model of diamonds\
    \ data\")\n```\n\n我非常确定我们可以读懂并解读这个语法，但基本上，我们是在对`predicted_values`数据集运行`ggplot`命令。我们使用`actual`数据作为\
    \ x 轴的美学值，`predicted`数据作为 y 轴的美学值。数据点是蓝色的，具有根据数据值变化的 alpha（透明度），带有一条红色趋势线，y 轴限制为\
    \ 20000（这强制了比例尺），以及一个标题。\n\n图 2-53 显示了您在执行第 220 至 224 行后应该看到的内容。\n\n![A421548_1_En_2_Fig53_HTML.jpg](img/A421548_1_En_2_Fig53_HTML.jpg)\n\
    \n图 2-53.\n\n`predicted_values`的`ggplot`图\n\n真的，这是一个非常有用的图表，你不觉得吗？如果你顺利做到这一步没有任何问题，干得漂亮！你现在已经学到了相当多的\
