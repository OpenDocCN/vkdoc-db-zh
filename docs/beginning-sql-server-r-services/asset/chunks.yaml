    \ RTVS can be used to develop R code, and SSDT cannot. SSDT can connect to the\
    \ database instance and run queries against the database, but it is not an IDE\
    \ for R. Alternatively, RTVS is an IDE for R, but in the constraints of this book,\
    \ we are not connecting to the database instance directly.\n\nThat should help\
    \ you figure that out quickly. The main difference to me is that SSDT runs an\
    \ internal process, while RTVS runs an external process. You may find other differences\
    \ between the two, so if you do, good work. As I said, though, we use RTVS in\
    \ this book."
  trans: "\n对于那些尚未记全每一个系统存储过程的人来说，你可能不会认出 `sp_execute_external_script` 是一个为执行外部脚本而引入的**全新**存储过程。可以通过以下参数调用此存储过程：\n\
    \n*   `@language`\n    *   所支持的语言名称。目前仅支持 R。\n*   `@script`\n    *   要执行的脚本（你可以将整个脚本输入到存储过程中，或将其作为变量引用）。\n\
    *   `@input_data_1`\n    *   这里填写用于从数据库收集数据的 SQL 查询。\n*   `@input_data_1_name`\n\
    \    *   作为 `@input_data_1` 查询结果集的数据框。此属性可选。\n*   `@output_data_1_name`\n    *\
    \   在 `@script` 中持有输出数据的数据框变量。此属性可选。\n\n信不信由你，微软说我们接下来只需要再做几件事，所以让我们先把它们搞定。\n\n\
    对于 Windows 用户，按下 Windows 键 + R，输入 `lusrmgr.msc`，然后按回车。你应该会看到你的“本地用户和组”，如图 1-36\
    \ 所示。\n\n![A421548_1_En_1_Fig36_HTML.jpg](img/A421548_1_En_1_Fig36_HTML.jpg)\n\
    \n图 1-36. 本地用户和组（用户）\n\n看到了吗？安装过程中创建了二十个新的用户账户，每个账户都是专门为与 R Services 交互而创建的。这\
    \ 20 个账户被添加到一个名为 `SQLRUserGroup<instance_name>` 的新组中，其中 `<instance_name>` 是你的实例名称。所以以我为例，我的组名为\
    \ `SQLRUserGroupSQL2016RS`。如果你遵循了这个命名约定，你的也会是同样的名称。\n\n点击屏幕左侧的“组”选项。你应该会看到图 1-37\
    \ 所示的内容。\n\n![A421548_1_En_1_Fig37_HTML.jpg](img/A421548_1_En_1_Fig37_HTML.jpg)\n\
    \n图 1-37. 本地用户和组（组）\n\n双击 `SQLRUserGroupSQL2016RS` 链接。你应该会看到图 1-38 所示的内容。\n\n\
    ![A421548_1_En_1_Fig38_HTML.jpg](img/A421548_1_En_1_Fig38_HTML.jpg)\n\n图 1-38.\
    \ SQLRUserGroupSQL2016RS 详情\n\n按照这种方式配置，我们就可以在这台服务器上正常工作了。我们不需要定义其他任何内容或添加其他用户账户，因为我们已经验证了\
    \ R 在数据库中运行正确。微软有一些相当好的文章，介绍如何配置数据库实例以接受来自外部开发者的 R 脚本，这本质上涉及将 `SQLRUserGroupSQL2016RS`\
    \ 组作为新登录名添加到 SQL Server 中。这样，当用户连接到数据库实例运行 R 脚本时，会使用那 20 个新用户账户中的一个，通过 Launchpad\
    \ 服务代表该用户执行脚本。微软将此称为**隐式身份验证**，因为该组中的用户随后将能够远程访问 SQL Server R Services。\n\n###\
    \ 小结\n\n让我们简要回顾一下本章涵盖的内容。\n\n*   安装了完整的 SQL Server 2016 实例\n*   安装了 SQL Server\
    \ Management Tools\n*   安装后配置了 R\n*   通过运行前面指定的脚本，验证了 R 已正确安装\n\n这是相当重要的第一章。我们涵盖了很多内容，所以如果有任何不清楚的地方，现在正是回头再试一次的好时机。\n\
    \n接下来，我们将安装 Visual Studio 的 R 工具，我们将用它来编写 R 代码。第一部分显然是必要的，以便在服务器级别安装 R 功能和数据库实例。现在，我们将重点转向使用开发工具设置客户端。\n\
    \n## 2. Visual Studio R 工具的设置与安装\n\n既然我们已经正确安装了 SQL Server 2016，我们需要某种 IDE 来开发我们的代码。微软通过在\
    \ Visual Studio 中引入一个全新的 R GUI，使 Visual Studio 2016 变得更好。它被简单地命名为 Visual Studio\
    \ 的 R 工具。\n\n如果你愿意，你也可以使用其他的 R GUI。你完全不受限制或被迫使用 Visual Studio 的 R 工具。如果你目前有喜欢的\
    \ IDE，那么请务必继续使用那个。\n\n### SQL Server Data Tools\n\n在我们开始之前，快速说明一点。本书**不会**使用 SQL\
    \ Server Data Tools。相反，我们将使用 Visual Studio 的 R 工工具。这一点从章节标题应该很明显。原因很简单，但我花了一点时间才弄明白。让我们看看两者的区别。\n\
    \n*   SQL Server Data Tools\n    *   为 Analysis Services、Reporting Services 或\
    \ Integration Services 开发解决方案。允许连接数据库开发；即“实时”编辑数据库。\n*   Visual Studio 的 R 工具\n\
    \    *   专为当前的微软用户设计，希望他们在学习 R 的同时停留在熟悉的界面中。它不与 SQL Server 中的 R 实例交互，因此需要单独安装一个名为\
    \ Microsoft R Open 的组件才能执行任何 R 代码。\n\n本书使用 Visual Studio 的 R 工具 (RTVS) 而不是 SQL\
    \ Server Data Tools (SSDT) 的主要原因是，RTVS 可用于开发 R 代码，而 SSDT 不能。SSDT 可以连接到数据库实例并对数据库运行查询，但它不是\
    \ R 的 IDE。或者，RTVS 是 R 的 IDE，但在本书的范围内，我们不直接连接到数据库实例。\n\n这应该能帮助你快速理解。对我来说，主要区别在于\
    \ SSDT 运行一个内部进程，而 RTVS 运行一个外部进程。你可能会发现两者之间的其他差异，如果发现了，很好。不过，正如我所说，我们在本书中使用 RTVS。\n"
- fmt: '## Visual Studio


    除了安装 Visual Studio 本身，你还需要下载用于 Visual Studio 的 R 扩展。这样，RTVS 才能有一个 R 版本来执行代码。为了方便地完成此操作并将所有说明集中在一个地方，微软提供了一个解释
    Visual Studio 的 R 工具（RTVS）的网站。网址是 [`https://beta.visualstudio.com/vs/rtvs/`](https://beta.visualstudio.com/vs/rtvs/)
    。该网站的一部分如图 [2-1](#A421548_1_En_2_Chapter.html#Fig1) 所示。


    ![A421548_1_En_2_Fig1_HTML.jpg](A421548_1_En_2_Fig1_HTML.jpg)

    图 2-1. R Tools for Visual Studio 网站


    正如我提到的，第一步是获取 Visual Studio。点击图 [2-1](#A421548_1_En_2_Chapter.html#Fig1) 中显示的“Free
    Visual Studio”链接。它是右上角的白色方框。随后会打开另一个页面，如图 [2-2](#A421548_1_En_2_Chapter.html#Fig2)
    所示，页面左侧有一个 Visual Studio Community 的下载链接。


    ![A421548_1_En_2_Fig2_HTML.jpg](A421548_1_En_2_Fig2_HTML.jpg)

    图 2-2. 下载 Community 2015


    从图中我们可以看到，Community 2015 几乎可以开发任何东西。向下滚动并点击紫色火箭飞船图示下方的“Download”按钮。你应该会看到如图 [2-3](#A421548_1_En_2_Chapter.html#Fig3)
    所示的内容。


    ![A421548_1_En_2_Fig3_HTML.jpg](A421548_1_En_2_Fig3_HTML.jpg)

    图 2-3. 安装程序开始下载


    如果你查看 `Downloads` 文件夹，会发现安装程序已经下载完成。这是一个很小的 209KB 安装程序，很可能在你甚至还没来得及打开 `Downloads`
    文件夹检查之前就下载好了。


    如果你真的愿意，可以完成图 [2-3](#A421548_1_En_2_Chapter.html#Fig3) 中提到的调查，但我选择了“No thanks”。抱歉，微软！


    转到你的 `Downloads` 文件夹，双击名为 `vs_community_<random string that looks like a GUID>.exe`
    的文件。当然，你的随机字符串和我的不同，所以找一下以 `vs_community` 开头的那个文件。那就是你要双击的文件。然后你应该会在屏幕上看到图 [2-4](#A421548_1_En_2_Chapter.html#Fig4)。你即将开始安装，这个过程会消耗几
    GB 的带宽。


    ![A421548_1_En_2_Fig4_HTML.jpg](A421548_1_En_2_Fig4_HTML.jpg)

    图 2-4. 打开文件


    继续点击“Run”。你会看到图 [2-5](#A421548_1_En_2_Chapter.html#Fig5) 弹出。


    ![A421548_1_En_2_Fig5_HTML.jpg](A421548_1_En_2_Fig5_HTML.jpg)

    图 2-5. 正在初始化安装


    最终，你会看到图 [2-6](#A421548_1_En_2_Chapter.html#Fig6)，它显示了 Visual Studio Community
    2015 的配置选项。


    ![A421548_1_En_2_Fig6_HTML.jpg](A421548_1_En_2_Fig6_HTML.jpg)

    图 2-6. 选择安装类型


    从这里，我们可以选择“Default”或“Custom”。我们实际上只需要 Visual Studio 的基本功能，所以保持默认选项选中并点击“Install”。


    随后会出现图 [2-7](#A421548_1_En_2_Chapter.html#Fig7) 所示的屏幕；这开始了 Visual Studio Community
    2015 的实际安装。


    ![A421548_1_En_2_Fig7_HTML.jpg](A421548_1_En_2_Fig7_HTML.jpg)

    图 2-7. 安装开始


    安装过程会持续相当长一段时间直到完成。注意，可能还有需要随实际应用程序一起下载的必需更新；所以请耐心等待，让它完成自己的工作。


    你最终会看到图 [2-8](#A421548_1_En_2_Chapter.html#Fig8)，它显示应用程序已成功完成安装。


    ![A421548_1_En_2_Fig8_HTML.jpg](A421548_1_En_2_Fig8_HTML.jpg)

    图 2-8. 安装完成


    Visual Studio 现在已安装好。接下来，我们需要下载 R Tools for Visual Studio，但首先点击“Restart Now”按钮，或者先关闭并保存所有内容然后重新启动你的计算机。


    重启后，你可能会看到图 [2-9](#A421548_1_En_2_Chapter.html#Fig9)，它显示一个漂亮的小闪屏，说明 Visual Studio
    已安装。


    ![A421548_1_En_2_Fig9_HTML.jpg](A421548_1_En_2_Fig9_HTML.jpg)

    图 2-9. 欢迎使用 Visual Studio


    如果重启后没有看到这个屏幕，可能也没关系。只要你成功安装了 Visual Studio，应该就没问题。继续阅读以安装我们需要开始测试 R 功能的其余部分。


    ### Download R Tools for VS


    第二步，如图 [2-1](#A421548_1_En_2_Chapter.html#Fig1) 所示，是下载 R Tools for Visual Studio。点击图
    [2-1](#A421548_1_En_2_Chapter.html#Fig1) 中也显示的“Download R Tools for Visual Studio”链接，就会开始下载我需要安装的东西。下载的文件名为
    `RTVS_2016-06-23.7.exe`，如图 [2-10](#A421548_1_En_2_Chapter.html#Fig10) 所示。


    ![A421548_1_En_2_Fig10_HTML.jpg](A421548_1_En_2_Fig10_HTML.jpg)

    图 2-10. RTVS 文件名


    你的文件名可能与此不同，但这没关系。微软负责管理该产品的未来版本，因此我们可以假设安装从你点击的链接中呈现的任何应用程序都是没问题的。


    下载完成后运行该可执行文件。你会看到图 [2-11](#A421548_1_En_2_Chapter.html#Fig11)，显示你已准备好开始安装 R Tools。点击“Install”按钮开始安装过程。


    ![A421548_1_En_2_Fig11_HTML.jpg](A421548_1_En_2_Fig11_HTML.jpg)

    图 2-11. R Tools 0.4 for Visual Studio


    安装程序开始工作，最终在图 [2-12](#A421548_1_En_2_Chapter.html#Fig12) 中显示已完成的 R Tools 安装界面。


    ![A421548_1_En_2_Fig12_HTML.jpg](A421548_1_En_2_Fig12_HTML.jpg)

    图 2-12. R Tools 0.4 for Visual Studio 安装完成


    如图 [2-12](#A421548_1_En_2_Chapter.html#Fig12) 所示，点击“Close”按钮也会打开一个网页，所以接下来我们在图
    [2-13](#A421548_1_En_2_Chapter.html#Fig13) 中看一下那个页面。


    ![A421548_1_En_2_Fig13_HTML.jpg](A421548_1_En_2_Fig13_HTML.jpg)

    图 2-13. 打开的网页


    这不是很棒吗！微软为我们准备了一个很棒的页面，上面列出了所有资源。当你设置时，这个页面可能会变化，但可能会非常相似。我强烈建议你浏览列出的资源，尽可能多地收集关于
    R 的信息。一旦我们进入 RTVS 的界面，我会向你展示一个更好的获取 R 文档的方法，但现在，只是大致浏览一下这个网站，以便了解有哪些可用资源。


    回到图 [2-12](#A421548_1_En_2_Chapter.html#Fig12) 所示的安装屏幕，点击“Close”。R Tools for Visual
    Studio 现在已成功安装。'
  raw: '## Visual Studio


    In addition to the installation of Visual Studio, you need to download the extensions
    for R that go into Visual Studio. That way, RTVS has a version of R to execute
    code against. To get this done easily and with instructions all in one place,
    Microsoft has a site that explains R Tools for Visual Studio (RTVS). It is at
    [`https://beta.visualstudio.com/vs/rtvs/`](https://beta.visualstudio.com/vs/rtvs/)
    . A portion of this site is shown in Figure [2-1](#A421548_1_En_2_Chapter.html#Fig1).


    ![A421548_1_En_2_Fig1_HTML.jpg](A421548_1_En_2_Fig1_HTML.jpg)


    Figure 2-1.


    R Tools for Visual Studio site


    The first step, as I mentioned, is to get Visual Studio. Go ahead and click the
    Free Visual Studio link shown in Figure [2-1](#A421548_1_En_2_Chapter.html#Fig1).
    It is the white box in the top-right corner. Another page opens, as shown in Figure
    [2-2](#A421548_1_En_2_Chapter.html#Fig2), with a download link for Visual Studio
    Community on the left of the page.


    ![A421548_1_En_2_Fig2_HTML.jpg](A421548_1_En_2_Fig2_HTML.jpg)


    Figure 2-2.


    Download Community 2015


    We can see from the graphic that pretty much anything can be developed by Community
    2015\. Scroll down and click the Download button underneath the purple rocket
    ship graphic. You should see what is shown in Figure [2-3](#A421548_1_En_2_Chapter.html#Fig3).


    ![A421548_1_En_2_Fig3_HTML.jpg](A421548_1_En_2_Fig3_HTML.jpg)


    Figure 2-3.


    Installer download begins


    If you take a look in the `Downloads` folder, you see that the installer has downloaded.
    It’s a tiny 209KB install, which is very likely to download before you can even
    open your `Downloads` folder to check for it.


    You can go through the survey mentioned in Figure [2-3](#A421548_1_En_2_Chapter.html#Fig3)
    if you really want, but I said No thanks. Sorry, Microsoft!


    Go to your `Downloads` folder and double-click the file named vs_community_<random
    string that looks like a `GUID>.exe`. Of course, you have a different random string
    than I did, so look for the file that begins with vs_community. That’s the one
    that you want to double-click. You should then see Figure [2-4](#A421548_1_En_2_Chapter.html#Fig4)
    on screen. You are about to begin the install, which consumes several gigabytes
    of bandwidth.


    ![A421548_1_En_2_Fig4_HTML.jpg](A421548_1_En_2_Fig4_HTML.jpg)


    Figure 2-4.


    Open File


    Go ahead and click Run. You will see Figure [2-5](#A421548_1_En_2_Chapter.html#Fig5)
    pop into view.


    ![A421548_1_En_2_Fig5_HTML.jpg](A421548_1_En_2_Fig5_HTML.jpg)


    Figure 2-5.


    Initializing setup


    Eventually, you get to Figure [2-6](#A421548_1_En_2_Chapter.html#Fig6), which
    shows the configuration options for Visual Studio Community 2015.


    ![A421548_1_En_2_Fig6_HTML.jpg](A421548_1_En_2_Fig6_HTML.jpg)


    Figure 2-6.


    Choose installation type


    From here, we can either choose Default or Custom. We really only need the basic
    functionality of Visual Studio, so keep the default option selected and click
    Install.


    The screen shown in Figure [2-7](#A421548_1_En_2_Chapter.html#Fig7) then appears;
    this begins the actual installation of Visual Studio Community 2015.


    ![A421548_1_En_2_Fig7_HTML.jpg](A421548_1_En_2_Fig7_HTML.jpg)


    Figure 2-7.


    Installation begins


    The installation runs for quite a while until completion. Note that there are
    probably required updates that need to be downloaded along with the actual application;
    so be patient and let it do its thing.


    You eventually get to see Figure [2-8](#A421548_1_En_2_Chapter.html#Fig8), which
    shows that the application has completed installation successfully.


    ![A421548_1_En_2_Fig8_HTML.jpg](A421548_1_En_2_Fig8_HTML.jpg)


    Figure 2-8.


    Setup Completed


    Visual Studio is now installed. Next, we need to download R Tools for Visual Studio,
    but first restart your machine by clicking the Restart Now button, or closing
    and saving everything first and then restarting.


    Once you restart, you may see Figure [2-9](#A421548_1_En_2_Chapter.html#Fig9),
    which shows a nice little splash screen saying that Visual Studio has been installed.


    ![A421548_1_En_2_Fig9_HTML.jpg](A421548_1_En_2_Fig9_HTML.jpg)


    Figure 2-9.


    Welcome to Visual Studio


    If you didn’t see this screen come up after rebooting, that’s probably okay. As
    long as you successfully installed Visual Studio, you should be good to go. Read
    further for installing the rest of what we need to start testing R functionality.


    ## Download R Tools for VS


    The second step, shown in Figure [2-1](#A421548_1_En_2_Chapter.html#Fig1), is
    to Download R Tools for Visual Studio. Clicking the Download R Tools for Visual
    Studio link, also shown in Figure [2-1](#A421548_1_En_2_Chapter.html#Fig1), starts
    a download of what I need to install. The downloaded file is named `RTVS_2016-06-23.7.exe`,
    as shown in Figure [2-10](#A421548_1_En_2_Chapter.html#Fig10).


    ![A421548_1_En_2_Fig10_HTML.jpg](A421548_1_En_2_Fig10_HTML.jpg)


    Figure 2-10.


    RTVS file name


    You may end up having a different file name than this, but that’s okay. Microsoft
    manages the future releases of this product, so we can assume that it is fine
    to install whatever application is presented from the link that you have clicked.


    Run the executable once it’s downloaded. You’ll see the Figure [2-11](#A421548_1_En_2_Chapter.html#Fig11),
    showing that you are ready to begin installing the R Tools. Click the Install
    button to start the installation process.


    ![A421548_1_En_2_Fig11_HTML.jpg](A421548_1_En_2_Fig11_HTML.jpg)


    Figure 2-11.


    R Tools 0.4 for Visual Studio


    The installer starts doing its thing, eventually showing the completed R Tools
    installation interface in Figure [2-12](#A421548_1_En_2_Chapter.html#Fig12).


    ![A421548_1_En_2_Fig12_HTML.jpg](A421548_1_En_2_Fig12_HTML.jpg)


    Figure 2-12.


    R Tools 0.4 for Visual Studio installation complete


    Clicking the Close button, as shown in Figure [2-12](#A421548_1_En_2_Chapter.html#Fig12),
    also opens a web page, so let’s take a look at that next in Figure [2-13](#A421548_1_En_2_Chapter.html#Fig13).


    ![A421548_1_En_2_Fig13_HTML.jpg](A421548_1_En_2_Fig13_HTML.jpg)


    Figure 2-13.


    Opened web page


    Isn’t that nice! Microsoft gives us a nice page all lined up with resources and
    everything. This page may change when you set yours up, but it probably will be
    fairly similar. I strongly urge you to go through the listed resources to gather
    as much information about R as you can. Once we get into the interface of RTVS,
    I show you an even better way for getting documentation on R, but for now, just
    peruse this site generally so that you are aware of what is available.


    Back to the setup screen shown in Figure [2-12](#A421548_1_En_2_Chapter.html#Fig12),
    press Close. R Tools for Visual Studio has now been successfully installed.'
  trans: '

    ## Visual Studio


    除了安装 Visual Studio 本身，你还需要下载 Visual Studio 的 R 扩展。这样，RTVS 才能有一个 R 版本来执行代码。为了方便地完成此操作并将所有说明集中在一个地方，微软提供了一个解释
    **Visual Studio 的 R 工具**（RTVS）的网站。网址是 [`https://beta.visualstudio.com/vs/rtvs/`](https://beta.visualstudio.com/vs/rtvs/)
    。该网站的一部分如图 2-1 所示。


    ![A421548_1_En_2_Fig1_HTML.jpg](img/A421548_1_En_2_Fig1_HTML.jpg)

    图 2-1. Visual Studio 的 R 工具 网站


    正如我提到的，第一步是获取 Visual Studio。点击图 2-1 中显示的“Free Visual Studio”链接。它是右上角的白色方框。随后会打开另一个页面，如图
    2-2 所示，页面左侧有一个 Visual Studio Community 的下载链接。


    ![A421548_1_En_2_Fig2_HTML.jpg](img/A421548_1_En_2_Fig2_HTML.jpg)

    图 2-2. 下载 Community 2015


    从图中我们可以看到，Community 2015 几乎可以开发任何东西。向下滚动并点击紫色火箭飞船图示下方的“Download”按钮。你应该会看到如图 2-3
    所示的内容。


    ![A421548_1_En_2_Fig3_HTML.jpg](img/A421548_1_En_2_Fig3_HTML.jpg)

    图 2-3. 安装程序开始下载


    如果你查看 `Downloads` 文件夹，会发现安装程序已经下载完成。这是一个很小的 209KB 安装程序，很可能在你甚至还没来得及打开 `Downloads`
    文件夹检查之前就下载好了。


    如果你真的愿意，可以完成图 2-3 中提到的调查，但我选择了“No thanks”。抱歉，微软！


    转到你的 `Downloads` 文件夹，双击名为 `vs_community_<random string that looks like a GUID>.exe`
    的文件。当然，你的随机字符串和我的不同，所以找一下以 `vs_community` 开头的那个文件。那就是你要双击的文件。然后你应该会在屏幕上看到图 2-4。你即将开始安装，这个过程会消耗几
    GB 的带宽。


    ![A421548_1_En_2_Fig4_HTML.jpg](img/A421548_1_En_2_Fig4_HTML.jpg)

    图 2-4. 打开文件


    继续点击“Run”。你会看到图 2-5 弹出。


    ![A421548_1_En_2_Fig5_HTML.jpg](img/A421548_1_En_2_Fig5_HTML.jpg)

    图 2-5. 正在初始化安装


    最终，你会看到图 2-6，它显示了 Visual Studio Community 2015 的配置选项。


    ![A421548_1_En_2_Fig6_HTML.jpg](img/A421548_1_En_2_Fig6_HTML.jpg)

    图 2-6. 选择安装类型


    从这里，我们可以选择“Default”或“Custom”。我们实际上只需要 Visual Studio 的基本功能，所以保持默认选项选中并点击“Install”。


    随后会出现图 2-7 所示的屏幕；这开始了 Visual Studio Community 2015 的实际安装。


    ![A421548_1_En_2_Fig7_HTML.jpg](img/A421548_1_En_2_Fig7_HTML.jpg)

    图 2-7. 安装开始


    安装过程会持续相当长一段时间直到完成。注意，可能还有需要随实际应用程序一起下载的必需更新；所以请耐心等待，让它完成自己的工作。


    你最终会看到图 2-8，它显示应用程序已成功完成安装。


    ![A421548_1_En_2_Fig8_HTML.jpg](img/A421548_1_En_2_Fig8_HTML.jpg)

    图 2-8. 安装完成


    Visual Studio 现在已安装好。接下来，我们需要下载 Visual Studio 的 R 工具，但首先点击“Restart Now”按钮，或者先关闭并保存所有内容然后重新启动你的计算机。


    重启后，你可能会看到图 2-9，它显示一个漂亮的小闪屏，说明 Visual Studio 已安装。


    ![A421548_1_En_2_Fig9_HTML.jpg](img/A421548_1_En_2_Fig9_HTML.jpg)

    图 2-9. 欢迎使用 Visual Studio


    如果重启后没有看到这个屏幕，可能也没关系。只要你成功安装了 Visual Studio，应该就没问题。继续阅读以安装我们需要开始测试 R 功能的其余部分。


    ### 下载 Visual Studio 的 R 工具


    第二步，如图 2-1 所示，是下载 Visual Studio 的 R 工具。点击图 2-1 中也显示的“Download R Tools for Visual
    Studio”链接，就会开始下载我需要安装的东西。下载的文件名为 `RTVS_2016-06-23.7.exe`，如图 2-10 所示。


    ![A421548_1_En_2_Fig10_HTML.jpg](img/A421548_1_En_2_Fig10_HTML.jpg)

    图 2-10. RTVS 文件名


    你的文件名可能与此不同，但这没关系。微软负责管理该产品的未来版本，因此我们可以假设安装从你点击的链接中呈现的任何应用程序都是没问题的。


    下载完成后运行该可执行文件。你会看到图 2-11，显示你已准备好开始安装 R 工具。点击“Install”按钮开始安装过程。


    ![A421548_1_En_2_Fig11_HTML.jpg](img/A421548_1_En_2_Fig11_HTML.jpg)

    图 2-11. Visual Studio 的 R 工具 0.4


    安装程序开始工作，最终在图 2-12 中显示已完成的 R 工具安装界面。


    ![A421548_1_En_2_Fig12_HTML.jpg](img/A421548_1_En_2_Fig12_HTML.jpg)

    图 2-12. Visual Studio 的 R 工具 0.4 安装完成


    如图 2-12 所示，点击“Close”按钮也会打开一个网页，所以接下来我们在图 2-13 中看一下那个页面。


    ![A421548_1_En_2_Fig13_HTML.jpg](img/A421548_1_En_2_Fig13_HTML.jpg)

    图 2-13. 打开的网页


    这不是很棒吗！微软为我们准备了一个很棒的页面，上面列出了所有资源。当你设置时，这个页面可能会变化，但可能会非常相似。我强烈建议你浏览列出的资源，尽可能多地收集关于
    R 的信息。一旦我们进入 RTVS 的界面，我会向你展示一个更好的获取 R 文档的方法，但现在，只是大致浏览一下这个网站，以便了解有哪些可用资源。


    回到图 2-12 所示的安装屏幕，点击“Close”。Visual Studio 的 R 工具现在已成功安装。

