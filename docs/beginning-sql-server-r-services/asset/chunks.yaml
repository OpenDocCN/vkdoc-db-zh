    \ 保存命令结果的对象。\n*   `data.frame`: R 处理结构化数据的方式，类似于一个表。\n*   `actual = diamonds$price`:\
    \ 设置一个名为`actual`的列变量，其值等于`diamonds`数据集中的`price`值。\n*   `predicted = exp(predict(model,\
    \ diamonds))`: 设置一个名为`predicted`的列变量，其值等于在`diamonds`数据集中`model`线性模型的预测值的指数。\n\n\
    执行第 211 至 214 行。您会发现又没有发生任何事情，这是预期的。再次查看您的“变量资源管理器”；您会看到现在有另一个名为`predicted_values`的数据集可用，这是我们刚刚添加的。图\
