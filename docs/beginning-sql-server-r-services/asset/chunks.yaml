    \    *   AirportID\n    *   AdjustedHour\n    *   Timezone\n    *   Visibility\n\
    \    *   DryBulbFarenheit\n    *   DryBulbCelsius\n    *   DewPointFarenheit\n\
    \    *   DewPointCelsius\n    *   RelativeHumidity\n    *   WindSpeed\n    * \
    \  Altimeter\n\nBased on these columns, it was determined that the following reports\
    \ shall be created:\n\n*   Average Wind Speed per AirportID\n*   Average Temperature\
    \ per AirportID (°F)\n\nIt is noted that many more reports could be gathered,\
    \ but the customer specifically requested that these reports be created.\n\n##\
    \ Language/Platform\n\nThis solution will use SQL Server 2016 to collect and store\
    \ the data, R to analyze the data, and SQL Server Reporting Services to provide\
    \ reports based on the data.\n\n## Medium\n\nThe medium of delivery for reports\
    \ shall be as requested by the Customer; reports can be delivered in image format,\
    \ Excel format, or PDF format. The specificity of the format can be determined\
    \ at a later date, since the delivery method via SQL Server Reporting Services\
    \ allows for exporting of the reports in a variety of formats."
  trans: "\n## 完成\n\n此刻你最希望看到的屏幕就是这个。如果你没有看到此屏幕，反而看到一个错误提示，那么说明出现了问题。如果你遵循了本附录中的说明进行操作，那么很可能是与现有的\
    \ SQL Server 2014 安装发生了冲突。\n\n我的安装大约用了 10 分钟才完成。向下滚动查看是否所有组件都已正确安装，然后点击“关闭”。\n\
    \n恭喜！你已经安装了 SQL Server 2016 R Services。不过，根据微软的说法，我们还需要做一些工作。\n\n打开 SQL Server\
    \ Management Studio（是的，就是 2014 版那个），并连接到你新安装的实例。图 A-23 展示了如何连接到实例。\n\n![A421548_1_En_10_Fig23_HTML.jpg](img/A421548_1_En_10_Fig23_HTML.jpg)\n\
    \n图 A-23.\n\n连接到新实例\n\n回想一下，我将新的 SQL Server 2016 实例命名为 `SQL2016RSVCS`，所以我将连接到这个实例。服务器名称字段的格式是\
    \ `服务器名\\实例名`，所以我按照这个格式填写了连接信息。你也可以下拉菜单并从那里导航到一个实例。无论你更习惯哪种方式都可以，只要能连上就行。点击“连接”登录到你的实例。\n\
    \n初始屏幕类似于图 A-24。\n\n![A421548_1_En_10_Fig24_HTML.jpg](img/A421548_1_En_10_Fig24_HTML.jpg)\n\
    \n图 A-24.\n\nSQL Server Management Studio 已连接到 SQL Server 2016 实例\n\n注意查看命名实例和显示的\
    \ SQL Server 版本。这意味着我们已成功连接到新实例，可以开始下一步了。\n\n微软发布了一个安装后配置步骤，我们需要先运行这个步骤。我完全预期这个步骤在未来会被移除并整合到安装程序中，但就目前而言，请按照以下步骤完成安装。\n\
    \n在 SQL Server Management Studio 中打开一个“新建查询”窗口，并键入以下命令：\n\n```\nExec sp_configure\
    \ 'external scripts enabled', 1\nReconfigure with override\n```\n\n图 A-25 展示了此操作。\n\
    \n![A421548_1_En_10_Fig25_HTML.jpg](img/A421548_1_En_10_Fig25_HTML.jpg)\n\n图 A-25.\n\
    \n准备执行的命令\n\n注意，我们是在针对 `master` 数据库执行此命令。\n\n运行它。你应该会看到图 A-26，它告诉我们执行成功了。\n\n\
    ![A421548_1_En_10_Fig26_HTML.jpg](img/A421548_1_En_10_Fig26_HTML.jpg)\n\n图 A-26.\n\
    \n成功\n\n接下来，我们需要验证 R 是否确实在运行。为此，微软要求重启 SQL Server 实例并运行以下脚本。先重启实例。然后打开一个“新建查询”窗口并键入以下内容：\n\
    \n```\nexec sp_execute_external_script\n@language =N'R',\n@script=N'OutputDataSet<-InputDataSet',\n\
    @input_data_1 =N'select 1 as hello'\nwith result sets (([hello] int not null));\n\
    go\n```\n\n对于那些还没背下每一个系统存储过程的人来说，你可能不认识 `sp_execute_external_script`，这是一个用于执行外部脚本的全新存储过程。可以使用以下参数调用此存储过程：\n\
    \n*   `@language`：支持的编程语言名称。\n*   `@script`：要执行的脚本（你可以将全部内容输入到存储过程中，或将其作为变量引用）。\n\
    *   `@input_data_1`：用于从数据库收集数据的 SQL 查询放在这里。\n*   `@input_data_1_name`：作为 `@input_data_1`\
    \ 查询结果集的 data frame。此属性是可选的。\n*   `@output_data_1_name`：`@script` 中保存输出数据的 data\
    \ frame 变量。此属性是可选的。\n\n按 F5 执行脚本。预期结果如图 A-27 所示。\n\n![A421548_1_En_10_Fig27_HTML.jpg](img/A421548_1_En_10_Fig27_HTML.jpg)\n\
    \n图 A-27.\n\nR 存活了！\n\n太好了！R 运行正常，并且与 SQL Server 实例通信顺畅。\n\n## 总结\n\n让我们简要回顾一下本附录涵盖的内容。\n\
    \n1.  在现有的 SQL Server 2014 默认实例之上安装了一个 SQL Server 2016 命名实例。\n2.  安装后配置了 R。\n\
    3.  通过运行前面指定的脚本验证了 R 已正确安装。\n\n因此，本质上，这就是如何在 SQL Server 2014 之上安装 SQL Server 2016。\n\
    \n请记住，正如我之前提到的，实例的配置方式可能仍然存在一些冲突。直接将你的实例升级到 2016 版本可能更好，但你永远、永远不应该仅仅因为某个应用程序发布了最新、最强大的版本就去升级一个关键任务服务器。你总是需要检查并做好功课，以确保操作系统是受支持的，并且升级的版本之间没有巨大差异。这就是为什么本书的主要重点是在新服务器上安装，而不是在已有\
    \ SQL Server 安装的服务器上安装。\n\n如果你对这个安装感到满意并准备继续，那么现在就可以开始第 2 章。你仍然应该能够完成本书中的练习和示例，但你需要遵循这些说明来正确安装和配置\
    \ R Tools for Visual Studio 和 Reporting Services。\n\n# 软件需求文档\n\n## 项目\n\nSQL\
    \ Server R Services 入门\n\n## 作者\n\nBradley Beard，首席开发工程师，We R Pros, LLC\n\n##\
    \ 接受方\n\nR. Customer，首席信息官，PleaseGiveUs-R-AnalysisData.com\n\n## 问题\n\nPleaseGiveUs-R-AnalysisData.com（“客户”）向\
    \ We R Pros, LLC（“供应商”）提出了一个独特的请求。\n\n客户拥有有限数量的天气相关数据，但客户没有分析这些数据的方法。客户希望供应商能够建议哪些产品和服务可以从这些数据集的分析中提炼出来。\n\
    \n本质上，客户并不确切知道自己想要什么，但知道自己想要点什么，并且依赖供应商的专业知识和经验为客户提供一个或一套解决方案。这些数据相当宝贵，其中无疑隐藏着不少“璞玉”。\n\
    \n## 解决方案\n\n在初步检查客户的数据后，收集到以下信息：\n\n*   数据文件是 1 个 Microsoft Excel 文件。\n*   文件大小约为\
    \ 5.5MB。\n*   文件长度正好是 113,333 行（减去一行标题行）。\n*   文件包含以下标题行：\n    *   `Year`\n  \
    \  *   `AdjustedMonth`\n    *   `AdjustedDay`\n    *   `AirportID`\n    *   `AdjustedHour`\n\
    \    *   `Timezone`\n    *   `Visibility`\n    *   `DryBulbFarenheit`\n    * \
    \  `DryBulbCelsius`\n    *   `DewPointFarenheit`\n    *   `DewPointCelsius`\n\
    \    *   `RelativeHumidity`\n    *   `WindSpeed`\n    *   `Altimeter`\n\n根据这些列，确定将创建以下报告：\n\
    \n*   每个 `AirportID` 的平均风速\n*   每个 `AirportID` 的平均温度（°F）\n\n需要注意的是，可以生成更多报告，但客户特别要求创建这些报告。\n\
    \n## 语言/平台\n\n本解决方案将使用 SQL Server 2016 收集和存储数据，使用 R 分析数据，并使用 SQL Server Reporting\
    \ Services 提供基于数据的报告。\n\n## 交付媒介\n\n报告的交付媒介将按客户要求确定；报告可以图像格式、Excel 格式或 PDF 格式交付。具体格式可以在日后确定，因为通过\
    \ SQL Server Reporting Services 的交付方式允许以多种格式导出报告。\n"
- fmt: '# R Plot and Tabular Code for R Tools for Visual Studio


    First, a couple of notes about this appendix:


    *   The full code for the samples in Chapter [5](#A421548_1_En_5_Chapter.html)
    are here, but you still need to import the data into RTVS from the `Weather_Sample.csv`
    file in order to actually do anything.

    *   You may not need to run the `install.packages()` references, but they are
    there just in case. If you have already installed them, then it won’t be necessary
    to install the packages again.


    ## Average Temperature by Airport ID (Plot)


    This code gives the average temperature by airport ID in graphical format. Notice
    that the `mean()` function contains the `DryBulbFarenheit` attribute, which indicates
    that this is keying on the temperature field, and not the wind speed field. Also,
    the presence of the `ggplot2` reference indicates that this is the plot code,
    and not the tabular code.


    ```r

    install.packages("data.table")

    library(data.table)

    Weather_Sample <- data.table(Weather_Sample)

    chart_by_ID <- as.data.frame(Weather_Sample[, mean(DryBulbFarenheit, na.rm = TRUE),
    by = AirportID])

    install.packages("ggplot2")

    library(ggplot2)

    ggplot(chart_by_ID, aes(x = AirportID, y = V1)) + geom_point(stat = "identity")
    + geom_smooth(method = "lm", formula = y ∼ splines::bs(x, 3)) + scale_x_continuous(name
    = "Airport ID") + scale_y_continuous(name = "Average Temperature") +

    geom_text(aes(label = AirportID), size = 3, vjust = 1.0) +

    geom_text(aes(label = round(V1, digits = 2)), size = 3, vjust = 2.0)

    ```


    ## Average Temperature by Airport ID (Tabular)


    This code gives the average temperature by airport ID in tabular format. Notice
    that the `mean()` function contains the `DryBulbFarenheit` attribute, which indicates
    that this is keying on the temperature field, and not the wind speed field. Also,
    the absence of the `ggplot2` reference indicates that this is the tabular code,
    and not the plot code.


    ```r

    install.packages("data.table")

    library(data.table)

    Weather_Sample <- data.table(Weather_Sample)

    setkey(Weather_Sample, AirportID)

    avg_temperature_by_ID <- as.data.frame(Weather_Sample[, mean(DryBulbFarenheit,
    na.rm = TRUE), by = AirportID])

    avg_temperature_by_ID

    ```


    ## Average Wind Speed by Airport ID (Plot)


    This code gives the average wind speed by airport ID in graphical format. Notice
    that the `mean()` function contains the `WindSpeed` attribute, which indicates
    that this is keying on the wind speed field, and not the temperature field. Also,
    the presence of the `ggplot2` reference indicates that this is the plot code,
    and not the tabular code.


    ```r

    install.packages("data.table")

    library(data.table)

    Weather_Sample <- data.table(Weather_Sample)

    chart_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm = TRUE), by
    = AirportID])

    install.packages("ggplot2")

    library(ggplot2)

    ggplot(chart_by_ID, aes(x = AirportID, y = V1)) + geom_point(stat = "identity")
    + geom_smooth(method = "lm", formula = y ∼ splines::bs(x, 3)) + scale_x_continuous(name
    = "Airport ID") + scale_y_continuous(name = "Average Wind Speed") +

    geom_text(aes(label = AirportID), size = 3, vjust = 1.0) +

    geom_text(aes(label = round(V1, digits = 2)), size = 3, vjust = 2.0)

    ```


    ## Average Wind Speed by Airport ID (Tabular)


    This code gives the average wind speed by airport ID in tabular format. Notice
    that the `mean()` function contains the `WindSpeed` attribute, which indicates
    that this is keying on the wind speed field, and not the temperature field. Also,
    the absence of the `ggplot2` reference indicates that this is the tabular code,
    and not the plot code.


    ```r

    install.packages("data.table")

    library(data.table)

    Weather_Sample <- data.table(Weather_Sample)

    setkey(Weather_Sample, AirportID)

    # OBJECT NAME          DATA FRAME    DATASET NAME          DATA COLUMN REMOVE
    N/A    GROUP BY COLUMN

    avg_windspeed_by_ID <- as.data.frame(Weather_Sample[, mean(WindSpeed, na.rm =
    TRUE), by = AirportID])

    avg_windspeed_by_ID

    ```


