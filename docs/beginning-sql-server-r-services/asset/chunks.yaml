  trans: "# 软件开发工作流程\n\n## 设计\n一旦收到被接受的请求，第一步是设计解决方案。有时，直接画出解决方案是最佳方式。它能让你对布局和实现解决方案所需空间有良好的预期。客户期望看到类似\
    \ `Photoshop` 制作的屏幕草图之类的东西，更可能以 `PDF` 格式呈现。这并非总是硬性要求，但如果用户希望随时了解请求的进展，那么这样做是个好主意。无论客户是否参与，花几分钟时间快速绘制草图，并可能写一段简短的伪代码示例来说明思路，总是值得的。\n\
    \n## 编码\n接下来是有趣的部分：编写代码。这可以使用任何完成工作所必需的语言，以及你的应用程序中用于交付解决方案的任何技术。在某些情况下，你会用到多种语言。在\
    \ Web 开发中，这非常常见。我日常构建应用程序时，经常稳定地混合使用 `HTML`、`ColdFusion`、`CSS` 和 `jQuery`。某些日子某种语言用得更多，但这大致就是我的工作内容。不过，这是过程中第二耗时的活动；最耗时的……是文档。\n\
    \n## 文档\n开发中最容易被忽视的部分无疑是记录所做的更改。务必严格遵循这一步！这不同于所有优秀开发人员定期进行的行内注释。那些行内注释也很棒，请别误会。这里特指的文档是面向用户的。它包含两份文档，但用户通常只看到其中一份。一份文档需要定义请求以及为实现该请求所采取的步骤。其原因在于，如果需要，可以基本上回滚这项更改。第二份文档是供用户测试更改的测试脚本。它需要相当简单明了；类似于“点击确定按钮”这样的指示。必须明确说明当某个操作发生时期望发生什么，以及失败的条件是什么。\n\
    \n## 单元测试\n这意味着在模块化环境中独立测试解决方案。它是否能独立完成所需功能，还是需要与其他单元或模块交互？换句话说，它应该尽可能地内聚。如果它需要依赖其他东西才能运行，你可能需要重新考虑这个特定的技术方案。是否有可能使用原生代码重写，使其更清晰、更模块化？这些是本阶段必须客观回答的问题。\n\
    \n## 回归测试\n在这里，你需要将解决方案作为涵盖整个应用程序的整体解决方案的一部分进行测试。换句话说，该解决方案与当前应用程序配合得如何？它是否能“无缝契合”，还是存在不一致而需要进一步处理？大多数时候，它能无缝集成，但有时则不然。因此，最好将更改视为应用程序整体的一部分来审视，而不是像单元测试那样以模块化的方式看待。考虑该更改的成功路径和失败路径（如果有独立路径）。考虑到系统其余部分的路径，它们是否合理？它实现其宣称功能的程度如何？\n\
    \n## 验收测试\n这是在解决方案通过所有其他测试且文档完成后进行的。这是提出请求的用户唯一应该看到的步骤。对其他所有内容，该用户都应该如同面对一个黑匣子，以免你陷入螺旋式开发的陷阱。千万别那么做！这个步骤非常简单，就是一行声明，表明客户同意该更改，并且已按预期交付。只需一个签名和当前日期即可完成此步骤。\n\
    \n## 安装\n解决方案被客户接受后，需要进行安装。这有点显而易见，但仍然是流程中必要的部分。这也需要记录，尽管要求可以宽松得多。务必在安装前立即备份数据库。如果你运行的是虚拟实例，我建议创建服务器镜像；如果是常规服务器，则建议创建带备份的系统镜像。其原因应该很清楚：以防万一一切变得一团糟时能快速恢复。一旦所有内容正确加载，请删除任何备份以释放系统空间。\n\
    \n## 归档\n最后，安装完成后，需要对解决方案进行归档。这包括两件事：首先，应将解决方案与所有文档一起打包压缩，并添加到某种源代码存储库中。具体使用哪种存储库由你决定。其次，网站或公告板上的请求物理记录应被移除，并添加到归档或已完成部分，以便日后必要时查阅。\n\
    \n请注意，前述工作流程并非包罗万象，而是旨在帮助你开始理解软件更改请求流程的具体样貌。\n\n现在你已经理解了范围蔓延和螺旋式开发的含义，以及它们为何对项目有害。你也了解了软件更改流程，以及它对几乎任何系统的益处。接下来是什么？让我们继续定义项目定义的各个阶段，然后讨论更多影响项目成功有时也导致项目失败的因素。\n\
    \n## 第二阶段：初始界面设计\n此阶段允许开发者（如果适用）创建初始用户界面。有时项目没有界面，因为它们发生在“幕后”。如果你的项目属于这种情况，请直接跳到下一阶段。如果不是这样，而你必须创建一个界面，那么此阶段正是为你准备的。\n\
    \n初始界面设计相当不言自明：你希望基于需求文档，并利用从客户那里收集到的任何其他信息，创建一个初始界面。请注意，这不包括回头向客户寻求想法或建议。基本上，他们之前已经有机会提出实施建议，而现在实施它们为时已晚，否则就会陷入可怕的螺旋式开发循环。还记得你如何让客户签署了项目范围吗？就像他们不能随意找你一样，从技术上讲，你也不应该回头找他们。如果你发现界面需要以某种方式实施存在真正的问题，或者某个问题阻碍你完成工作，那么你显然需要与客户沟通。这样做的关键在于“训练客户”理解，你严格依据需求文档工作，仅此而已。这样，当你交付所要求的东西时，你就知道它在技术和功能上\
    \ 100%符合需求文档。\n\n我们已经收集了需求，我在本书的示例下载中列出了这些需求。下载内容包含我们的需求文档和初始数据集。请确保你拥有以下两个文档，否则你会很难跟上进度；它们可以从本书在出版商网站上的目录页面获取：\n\
    \n* ```\n  Software Requirements Document.docx\n  ```\n\n* `Weather_Sample.csv`\n\
    \n作为参考，`Weather_Sample.csv` 文件与我们之前从微软下载提供的文档相同。经许可，我们在本书中使用相同的示例。\n\n考虑到这一点，让我们来看看我们已同意提供的报告，并规划一个解决方案。"
- fmt: '# Loading the R Solution


    Recall that back in Chapter [2](#A421548_1_En_2_Chapter.html), we downloaded a
    `.zip` file from [`https://microsoft.github.io/RTVS-docs/samples.html`](https://microsoft.github.io/RTVS-docs/samples.html).
    It contains everything that we need for what we will ultimately build. Extract
    that `.zip` file somewhere easy for you to access, because we’re going to load
    the solution in it now.


    Start Visual Studio and go to File ä Open ä Project/Solution…. Navigate to where
    you saved and unzipped the `.zip` file. Follow the folders down to `RTVS-docs-master/examples/Examples.sln`.
    Select it and click Open, as shown in Figure [3-1](#A421548_1_En_3_Chapter.html#Fig1).


    ![A421548_1_En_3_Fig1_HTML.jpg](A421548_1_En_3_Fig1_HTML.jpg)


    Figure 3-1. Open Project


    It takes a second to open the project, and then loads the solution file into Visual
    Studio.


    Notice in your Solution Explorer window (if it’s not up, press `Ctrl+Alt+L` to
    make it appear) that there is a set of files, as shown in Figure [3-2](#A421548_1_En_3_Chapter.html#Fig2).


    ![A421548_1_En_3_Fig2_HTML.jpg](A421548_1_En_3_Fig2_HTML.jpg)


    Figure 3-2. Solution Explorer files


    Double-click the bottom README file; the one not inside either of the folders.
    Figure [3-3](#A421548_1_En_3_Chapter.html#Fig3) should be what you see at this
    point.


    ![A421548_1_En_3_Fig3_HTML.jpg](A421548_1_En_3_Fig3_HTML.jpg)


    Figure 3-3. README file


    Does that look familiar? We saw this in Chapter [2](#A421548_1_En_2_Chapter.html),
    Figure [2-30](#A421548_1_En_2_Chapter.html#Fig30), before we started stepping
    through the R examples. Note that there are also more README files inside of the
    directories for even more guidance from the R gurus at Microsoft.


    Expand the `A first look at R` folder in Solution Explorer and then click the
    `Getting_Started_with_R.R` file in the right pane. You should see something similar
    to what is shown in Figure [3-4](#A421548_1_En_3_Chapter.html#Fig4).


    ![A421548_1_En_3_Fig4_HTML.jpg](A421548_1_En_3_Fig4_HTML.jpg)


    Figure 3-4. Getting Started with R initial screen


    Just to be clear, the top-left pane is the opened file and the bottom-left pane
    is the R Interactive window (basically, the results of the R operations). At the
    top right corner of the screen are the Solution Explorer and Variable Explorer
    panes, and at the bottom right are the R Plot, R Help, and R History panes. You
    can rearrange your windows however you like so that it is comfortable for you,
    as long as you have them readily available in case you need them later.


    I want to go over a couple of things before we end this chapter. First, let me
    pose two questions for you. Which version of R is running in the database? Which
    version of R is running in Visual Studio? I had to stop and think about this for
    a while, and I finally reached the conclusion that I could not tell from SQL Server
    what version of R is installed. I could easily tell what version of R was running
    from Visual Studio though, because it was prominently displayed in the R startup
    messages from within RTVS, as shown in Figure [3-5](#A421548_1_En_3_Chapter.html#Fig5).


    ![A421548_1_En_3_Fig5_HTML.jpg](A421548_1_En_3_Fig5_HTML.jpg)


    Figure 3-5. R version in RTVS


    How interesting! What if I were running two different versions of R? Certainly
    that would cause problems, particularly if I write code in RTVS and then want
    the same result from SSMS. Wouldn’t this give me different results? Logic says
    that it more than likely would. So, obviously, we want to mitigate this as much
    as possible.


    Recall the stored procedure that we use to execute R in SQL Server? Here is that
    procedure once again:


    ```sql

    exec sp_execute_external_script

    @language =N''R'',

    @script=N''OutputDataSet<-InputDataSet'',

    @input_data_1 =N''select 1 as hello''

    with result sets (([hello] int not null));

    go

    ```


    Let’s rewrite this procedure to get the version of R that is executing this code.
    Our rewrite is a simple little script that you may want to keep in your bag of
    tricks, just in case it is needed later on. You may want to switch to Results
    to Text by pressing `Ctrl+T` while in the New Query Window. Here is the script:


    ```sql

    exec sp_execute_external_script

    @language =N''R'',

    @script=N''OutputDataSet<-InputDataSet;

    message (R.Version()$version.string);''

    with result sets (([Version] varchar));

    go

    ```


    I’m sure we’re all familiar with generic scripting practices, so we can see that
    I am using R’s `message()` function to return the version of R by invoking `R.Version()$version.string`.


    The result of this operation is shown in Listing [3-1](#A421548_1_En_3_Chapter.html#Par67).


    ```

    Version


    (0 row(s) affected)

    STDERR message(s) from external script:

    R version 3.2.2 (2015-08-14)

    Listing 3-1. R Version in SQL Server 2016

    ```


    We have just verified that Visual Studio is running R version 3.3.1 and SQL Server
    is running R version 3.2.2. The reason for this is because SQL Server R Services
    is the server version, and RTVS is the client version. What we want to do is point
    RTVS to R version 3.2.2, that way we get the same results from RTVS to SQL Server.
    To do this, open Visual Studio, navigate to the R Tools menu, and then click Options.
    Figure [3-6](#A421548_1_En_3_Chapter.html#Fig6) shows this menu location.


    ![A421548_1_En_3_Fig6_HTML.jpg](A421548_1_En_3_Fig6_HTML.jpg)


    Figure 3-6. Options menu


    A screen opens, as shown in Figure [3-7](#A421548_1_En_3_Chapter.html#Fig7).


    ![A421548_1_En_3_Fig7_HTML.jpg](A421548_1_En_3_Fig7_HTML.jpg)


    Figure 3-7. R Tools Advanced options


    In the screen shown in Figure [3-7](#A421548_1_En_3_Chapter.html#Fig7), the `R
    Engine (64-bit)` option is selected, and the value of this selection is `C:\Program
    Files\Microsoft\MRO-3.3.1\`. This needs to be changed to `C:\Program Files\Microsoft
    SQL Server\MSSQL13.SQL2016RS\R_SERVICES`, since that is the location where SQL
    Server is referencing the in-database R library. Note that your folder location
    may be different from mine, so find your `R_SERVICES` folder location and use
    that instead. Once you replace this folder location, click OK. You are prompted
    to restart Visual Studio, so go ahead and close down Visual Studio and open it
    again. Once it opens again, notice that the R Interactive window holds some pretty
    important information for us. Listing [3-2](#A421548_1_En_3_Chapter.html#Par71)
    shows this information.


    ```

    R version 3.2.2 (2015-08-14) -- "Fire Safety"

    Copyright (C) 2015 The R Foundation for Statistical Computing

    Platform: x86_64-w64-mingw32/x64 (64-bit)

    R is free software and comes with ABSOLUTELY NO WARRANTY.

    You are welcome to redistribute it under certain conditions.

    Type ''license()'' or ''licence()'' for distribution details.

    R is a collaborative project with many contributors.

    Type ''contributors()'' for more information and

    ''citation()'' on how to cite R or R packages in publications.

    Type ''demo()'' for some demos, ''help()'' for on-line help, or

    ''help.start()'' for an HTML browser interface to help.

    Type ''q()'' to quit R.

    Microsoft R Server version 8.0 (64-bit):

    Microsoft packages Copyright (C) 2016 Microsoft Corporation

    Type ''readme()'' for release notes.

    Listing 3-2. Updated R Information

    ```


    This proves that we have now successfully synced our versions of SQL Server and
    Visual Studio. The next step is to update the packages, which we can easily do
    via R Package Manager. Recall from Chapter [2](#A421548_1_En_2_Chapter.html) that
    we need to install two packages (and their dependents): `ggplot2` and `data.table`.


    Open the R Package Manager in Visual Studio by going to R Tools ä Windows ä Packages.
    Figure [3-8](#A421548_1_En_3_Chapter.html#Fig8) shows the R Package Manager once
    opened.


    ![A421548_1_En_3_Fig8_HTML.jpg](A421548_1_En_3_Fig8_HTML.jpg)


    Figure 3-8. R Package Manager


    In the top pane, click the Available line, to show what is seen in Figure [3-9](#A421548_1_En_3_Chapter.html#Fig9).'
