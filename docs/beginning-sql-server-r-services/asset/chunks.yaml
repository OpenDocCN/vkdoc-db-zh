- fmt: '## Summary


    Let’s review what we’ve done in this chapter.


    *   Read the documentation for RTVS at [`http://microsoft.github.io/RTVS-docs`](http://microsoft.github.io/RTVS-docs)

    *   Went through the samples at [`http://microsoft.github.io/RTVS-docs/samples.html`](http://microsoft.github.io/RTVS-docs/samples.html)

    *   Reviewed the R documentation at [`https://cran.r-project.org/doc/manuals/r-release/R-intro.html`](https://cran.r-project.org/doc/manuals/r-release/R-intro.html)

    *   Reviewed the task views at [`https://cran.r-project.org/web/views/`](https://cran.r-project.org/web/views/)

    *   Reviewed how data import/export works in R at [`https://cran.r-project.org/doc/manuals/r-release/R-data.html`](https://cran.r-project.org/doc/manuals/r-release/R-data.html)

    *   Learned about R extensions at [`https://cran.r-project.org/doc/manuals/r-release/R-exts.html`](https://cran.r-project.org/doc/manuals/r-release/R-exts.html)


    Do I expect you to be an expert in `R` right now? No. Do I expect you to pore
    over the preceding URLs in great detail? No. What I do expect is a minimum of
    the following:


    *   `Visual Studio` is installed correctly.

    *   `R Tools for Visual Studio` is installed correctly.

    *   `SQL Server 2016` is installed correctly and is communicating with the `R`
    engine.

    *   You have at least briefly gone over the documentation listed earlier in order
    to get familiar with `R` syntax.


    The installation of these tools may be different with subsequent service packs.
    Either way, there should be a clear path to get to the solutions I just outlined
    though. At a minimum, these four things listed should be met before you move forward
    with this. If any of them aren’t functioning 100%, go back and work out the issue.
    For example, the script I gave earlier in Chapter [1](#A421548_1_En_1_Chapter.html)
    showed that `SQL Server` was working with the `R` engine. Figure [2-29](#A421548_1_En_2_Chapter.html#Fig29)
    showed that `Visual Studio` is configured for `R` as well. Therefore, we should
    all be on the same page at this point.


    In the next chapter, we go over our project scenario definition. That’s where
    we clearly define what we want the project to accomplish and the steps we’re going
    to take to get there. After that, we begin to develop our solution and implement
    it using `SQL Server 2016` and `R Tools for Visual Studio`.


    ## 3. Project Scenario Definition


    Before we get started with this chapter, I want to take a second and explain that
    this chapter deals with the program management side of development, and not the
    actual development side. Sometimes, dealing with the management side can be perhaps
    the most frustrating part of your job, but it is still necessary. For those that
    don’t have a lot of experience in this area, I included this chapter. Hopefully,
    it will help you to understand how essential it is to have a plan moving forward
    in your next project.


    The first thing that we want to do is make sure that everything is working together
    as it should be. Recall from Chapter [1](#A421548_1_En_1_Chapter.html) that `R`
    is set up correctly from `SQL Server`’s point of view. Chapter [2](#A421548_1_En_2_Chapter.html)
    shows us that `RTVS` is also set up correctly. That means that the software portion
    of what we’re doing is good to go. What’s left?


    This chapter focuses more on the management side of a program, as opposed to the
    development side. The reason for this is to prepare you for the eventuality that
    you will one day have to manage a program, if you haven’t already. While this
    is in no way meant to be everything you need to know about technical program management,
    it does give you a pretty good primer into the world of managing expectations
    from a technical point of view. I’ve found that the best managers are those that
    can put on different hats as the situation demands; they can be either technical
    or managerial, as the situation demands.


    Whenever you start a new project, it is always best to have a good idea about
    what you want to do and how to get where you want to go. Just as with starting
    a road trip, you have to be sure that you have a map and directions for how to
    get to your destination; otherwise, you will just drive around in circles and
    never really get anywhere. This is exactly the analogy to describe a poorly managed
    project; lots of hours are expended, lots of money is spent, but the project is
    never really finished. This is the hallmark for a poorly managed program. In my
    professional life, I’ve seen a lot of projects fail because of improper or incomplete
    planning, and I can tell you that it’s very easy to fall victim to the biggest
    obstacle facing new development, and that is the element of scope creep.'
