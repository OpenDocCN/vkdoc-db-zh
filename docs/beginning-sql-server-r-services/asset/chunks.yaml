- fmt: "## Complete\n\nThis is the screen you really want to see at this point. If\
    \ you don’t see this screen and instead you see an error, then something bad happened.\
    \ If you followed the directions in this Appendix, then there was probably a conflict\
    \ with the existing SQL Server 2014 installation.\n\nMy installation took about\
    \ 10 minutes to complete. Scroll down in there to see if everything installed\
    \ correctly, and then click Close.\n\nCongratulations! You have installed SQL\
    \ Server 2016 R Services. According to Microsoft, we still have a little work\
    \ to do though.\n\nOpen SQL Server Management Studio (yes, the 2014 one) and connect\
    \ to your newly installed instance. Figure [A-23](#A421548_1_En_10_Chapter.html#Fig23)\
    \ shows how to connect to the instance.\n\n![A421548_1_En_10_Fig23_HTML.jpg](A421548_1_En_10_Fig23_HTML.jpg)\n\
    \nFigure A-23.\n\nConnecting to the new instance\n\nRecall that I named the new\
    \ SQL Server 2016 instance `SQL2016RSVCS`, so that’s the instance I am going to\
    \ connect with. The format for the Server name field is `SERVER\\INSTANCE`, so\
    \ that’s how I have formatted my connection. You can also pull down the menu and\
    \ navigate to an instance from there. However you are more comfortable is fine,\
    \ as long as you get there. Click Connect to log in to your instance.\n\nThe initial\
    \ screen resembles Figure [A-24](#A421548_1_En_10_Chapter.html#Fig24).\n\n![A421548_1_En_10_Fig24_HTML.jpg](A421548_1_En_10_Fig24_HTML.jpg)\n\
    \nFigure A-24.\n\nSQL Server Management Studio connected to SQL Server 2016 instance\n\
    \nPay attention to the named instance and the SQL Server version shown. This means\
    \ that we have successfully connected to our new instance and we are ready to\
    \ get going.\n\nMicrosoft has put out a post-configuration procedure that we are\
    \ going to run first. I fully expect for this to be removed and added to the installation\
    \ in the future, but for now, follow along to complete installation.\n\nOpen a\
    \ New Query window in SQL Server Management Studio and type the following command:\n\
    \n```\nExec sp_configure 'external scripts enabled', 1\nReconfigure with override\n\
    ```\n\nFigure [A-25](#A421548_1_En_10_Chapter.html#Fig25) shows this action.\n\
    \n![A421548_1_En_10_Fig25_HTML.jpg](A421548_1_En_10_Fig25_HTML.jpg)\n\nFigure\
    \ A-25.\n\nCommand ready for execution\n\nNotice that we are executing against\
    \ the `master` database.\n\nRun that. You should see Figure [A-26](#A421548_1_En_10_Chapter.html#Fig26),\
    \ which tells us that the execution was successful.\n\n![A421548_1_En_10_Fig26_HTML.jpg](A421548_1_En_10_Fig26_HTML.jpg)\n\
    \nFigure A-26.\n\nSuccess\n\nNext, we need to verify that R is indeed running.\
    \ To do this, Microsoft says to restart the SQL Server instance and run the following\
    \ script. Restart the instance first. Then open a New Query window and type the\
    \ following:\n\n```\nexec sp_execute_external_script\n@language =N'R',\n@script=N'OutputDataSet<-InputDataSet',\n\
    @input_data_1 =N'select 1 as hello'\nwith result sets (([hello] int not null));\n\
    go\n```\n\nFor those that haven’t yet memorized every single system stored procedure,\
    \ you won’t recognize that `sp_execute_external_script` is a brand-new stored\
    \ procedure introduced to execute external scripts. This stored procedure can\
    \ be invoked with the following:\n\n*   `@language`: The name of the supported\
    \ language.\n*   `@script`: The script executed (you can either type it all in\
    \ to the stored procedure or reference it as a variable).\n*   `@input_data_1`:\
    \ The SQL query you’re using to gather data from the database goes here.\n*  \
    \ `@input_data_1_name`: The data frame that acts as the result set of the `@input_data_1`\
    \ query. This attribute is optional.\n*   `@output _data_1_name`: The data frame\
    \ variable in `@script` that holds the output data. This attribute is optional.\n\
    \nPress F5 to execute the script. The anticipated results are shown in Figure\
    \ [A-27](#A421548_1_En_10_Chapter.html#Fig27).\n\n![A421548_1_En_10_Fig27_HTML.jpg](A421548_1_En_10_Fig27_HTML.jpg)\n\
    \nFigure A-27.\n\nR is alive!\n\nExcellent! R is alive and well, and communicating\
    \ normally with the SQL Server instance.\n\n## Summary\n\nLet’s briefly review\
    \ what we have covered in this Appendix.\n\n1.  Installed a SQL Server 2016 named\
    \ instance on top of an existing SQL Server 2014 default instance.\n2.  Configured\
    \ R after installation.\n3.  Verified that R is installed correctly by running\
    \ the script specified earlier.\n\nSo, essentially, that is how you install SQL\
    \ Server 2016 on top of SQL Server 2014.\n\nKeep in mind that, as I mentioned\
    \ earlier, there could still be some conflicts with how the instances are configured.\
    \ It may be better to just upgrade your instance to 2016, but you should never,\
    \ ever upgrade a mission critical server just because the latest and greatest\
    \ version of some application was released. You always want to check and do your\
    \ homework to make sure that the OS is supported, and that there isn’t a huge\
    \ difference between the versions that you are upgrading. This is the main reason\
    \ why the primary focus of this book is about installing on a new server, and\
    \ not one with an existing SQL Server installation.\n\nIf you are comfortable\
    \ with this installation and you are ready to move on, go ahead and start at Chapter\
    \ [2](#A421548_1_En_2_Chapter.html) now. You should still be able to complete\
    \ the exercises and examples in this book, but you need to follow those directions\
    \ to get R Tools for Visual Studio and Reporting Services installed and configured\
    \ correctly.\n\n# Software Requirements Document\n\n## Project\n\nBeginning SQL\
    \ Server R Services\n\n## Author\n\nBradley Beard, Lead Developer, We R Pros,\
    \ LLC\n\n## Prepared for\n\nR. Customer, Chief Information Officer, PleaseGiveUs-R-AnalysisData.com\n\
    \n## Problem\n\nPleaseGiveUs-R-AnalysisData.com (“Customer”) has approached We\
    \ R Pros, LLC (“Vendor”) with a unique request.\n\nCustomer has a finite amount\
    \ of data related to the weather, but Customer does not have the means to analyze\
    \ this data. Customer would like Vendor to suggest products and services that\
    \ could be gleaned from the analysis of the data sets.\n\nIn essence, Customer\
    \ does not exactly know what it wants, but knows that it wants something and is\
    \ relying on the expertise and experience that Vendor has to provide a solution\
    \ or set of solutions for Customer. The data is quite valuable and is surely hiding\
    \ quite a few “diamonds in the rough.”\n\n## Solution\n\nUpon initial inspection\
    \ of Customer’s data, the following information was gathered:\n\n*   The data\
    \ file is 1 Microsoft Excel file.\n*   The file is approximately 5.5MB.\n*   The\
    \ file is exactly 113,333 rows long, minus one header column.\n*   The file consists\
    \ of the following headers:\n    *   `Year`\n    *   `AdjustedMonth`\n    *  \
    \ `AdjustedDay`\n    *   `AirportID`\n    *   `AdjustedHour`\n    *   `Timezone`\n\
    \    *   `Visibility`\n    *   `DryBulbFarenheit`\n    *   `DryBulbCelsius`\n\
    \    *   `DewPointFarenheit`\n    *   `DewPointCelsius`\n    *   `RelativeHumidity`\n\
    \    *   `WindSpeed`\n    *   `Altimeter`\n\nBased on these columns, it was determined\
    \ that the following reports shall be created:\n\n*   Average Wind Speed per `AirportID`\n\
    *   Average Temperature per `AirportID` (°F)\n\nIt is noted that many more reports\
    \ could be gathered, but the customer specifically requested that these reports\
    \ be created.\n\n## Language/Platform\n\nThis solution will use SQL Server 2016\
    \ to collect and store the data, R to analyze the data, and SQL Server Reporting\
    \ Services to provide reports based on the data.\n\n## Medium\n\nThe medium of\
    \ delivery for reports shall be as requested by the Customer; reports can be delivered\
    \ in image format, Excel format, or PDF format. The specificity of the format\
    \ can be determined at a later date, since the delivery method via SQL Server\
    \ Reporting Services allows for exporting of the reports in a variety of formats."
