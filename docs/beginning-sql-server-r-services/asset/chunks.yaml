  trans: '## 摘要


    让我们回顾一下本章所完成的工作。


    *   阅读了 RTVS 的文档，网址为 [`http://microsoft.github.io/RTVS-docs`](http://microsoft.github.io/RTVS-docs)

    *   浏览了位于 [`http://microsoft.github.io/RTVS-docs/samples.html`](http://microsoft.github.io/RTVS-docs/samples.html)
    的示例

    *   查阅了位于 [`https://cran.r-project.org/doc/manuals/r-release/R-intro.html`](https://cran.r-project.org/doc/manuals/r-release/R-intro.html)
    的 R 文档

    *   查阅了位于 [`https://cran.r-project.org/web/views/`](https://cran.r-project.org/web/views/)
    的任务视图

    *   查阅了位于 [`https://cran.r-project.org/doc/manuals/r-release/R-data.html`](https://cran.r-project.org/doc/manuals/r-release/R-data.html)
    的关于 R 中数据导入/导出工作原理的资料

    *   了解了位于 [`https://cran.r-project.org/doc/manuals/r-release/R-exts.html`](https://cran.r-project.org/doc/manuals/r-release/R-exts.html)
    的关于 R 扩展的资料


    我现在就期望你成为 `R` 专家吗？不。我期望你仔细钻研前面列出的所有网址吗？不。我期望的是至少满足以下最低要求：


    *   `Visual Studio` 已正确安装。

    *   `Visual Studio 的 R 工具` 已正确安装。

    *   `SQL Server 2016` 已正确安装，并且能够与 `R` 引擎通信。

    *   你至少已经简要浏览过前面列出的文档，以便熟悉 `R` 语法。


    这些工具的安装方式可能会因后续的服务包而有所不同。但无论如何，都应该有一条清晰的路径来实现我刚才概述的解决方案。至少，在继续本章之前，应该满足上面列出的四点。如果其中任何一项未能
    100% 正常运作，请回头解决问题。例如，我在第 1 章中给出的脚本显示了 `SQL Server` 正在与 `R` 引擎协同工作。图 2-29 显示了 `Visual
    Studio` 也已为 `R` 配置好。因此，此时我们所有人都应处于相同的理解层面。


    在下一章中，我们将讨论项目场景定义。在那里，我们将明确界定项目要达成的目标以及我们将采取的步骤来实现它。之后，我们将开始开发我们的解决方案，并使用 `SQL
    Server 2016` 和 `Visual Studio 的 R 工具` 来实施它。


    ## 3. 项目场景定义


    在开始本章之前，我想花点时间说明一下，本章涉及开发中的项目管理方面，而非实际的开发工作。有时，处理管理方面可能是你工作中最令人沮丧的部分，但它仍然是必要的。为了那些在这方面经验不多的读者，我包含了本章。希望它能帮助你理解为下一个项目制定计划是多么重要。


    我们首先要做的，是确保所有部分都能按预期协同工作。回顾第 1 章，从 `SQL Server` 的角度来看，`R` 已设置正确。第 2 章向我们展示了 `RTVS`
    也已正确设置。这意味着我们所做工作的软件部分已经就绪。还剩下什么？


    本章更侧重于项目的管理方面，而非开发方面。这样做的原因是为你将来（如果还没有的话）终将需要管理一个项目做准备。虽然这绝非关于技术项目管理你需要知道的一切，但它确实为你从技术角度管理期望提供了一个很好的入门。我发现，最好的管理者是那些能够根据情况需要戴上不同帽子的人；他们可以在需要时兼具技术性或管理性。


    每当开始一个新项目时，最好能对你想要做什么以及如何到达你想去的地方有一个清晰的想法。就像开始一次公路旅行，你必须确保有一张地图和前往目的地的路线指示；否则，你只会原地打转，永远无法真正到达任何地方。这恰好是描述一个管理不善项目的类比：耗费了大量时间，花费了大量金钱，但项目却从未真正完成。这是管理不善项目的标志。在我的职业生涯中，我见过许多项目因规划不当或不完整而失败，我可以告诉你，很容易成为新开发面临的最大障碍的受害者，那就是**范围蔓延**的要素。'
- fmt: '## Scope Creep


    What exactly is scope creep? It’s when the requirements of the project are not
    firmly adhered to. Plain and simple. There really is no point in going through
    all the time, trouble, energy, and effort of defining project requirements if
    they aren’t going to be followed. In this case, it would be easier if development
    started, and then ad hoc requests came from the customer as to the intended development
    for that day or week. The flip side of this is to have a firm set of requirements
    that are agreed on by the customer and followed religiously by the development
    team. Hence, no misinterpretation from anyone, because everything is very clearly
    laid out and agreed upon from the beginning. We get into this a bit later in this
    chapter.


    My favorite example of scope creep is to describe it using a rock. Pretend that
    you are on one side of a fence and your customer is on the other. Your customer
    shouts over the fence that they would like a painted rock. You respond that you
    are very good at painting rocks and that you will get it to them ASAP. So, you
    look around and find a decently sized rock, and then find your most popular color
    of paint. You are very good at this after all, so you’re assuming what your customer
    wants. The finished rock looks fantastic, so you throw it over the fence to your
    customer. They immediately throw it back, because it is not the right color. When
    was the color defined? Well, it wasn’t. You assumed that your color was what the
    customer wanted; but turns out, it wasn’t right at all. So instead of learning
    your lesson, you decide to paint the rock a different color and then toss it back
    over the fence. The customer immediately tosses it back, because it is again the
    wrong color. Now you’re getting frustrated because you know this is the correct
    color—it has to be! Finally, you ask the customer what color they would like;
    they answer “blue.” Not a problem, because you’ve got blue. So, you paint the
    rock blue and then toss it over the fence. Guess what. They throw it right back
    over, saying it isn’t the right shade of blue. This goes on and on until you finally
    get the right shade of blue. But they throw the rock back over again! Why? This
    time, they’re complaining that the shape of the rock isn’t correct, and actually,
    the rock is also the wrong kind of rock all together.


    So the project started out as an assumption from “paint this rock,” and then into
    “use this particular shade of paint for this particular shape of rock on this
    particular kind of rock.” See that? It’s very frustrating, I can tell you. Unfortunately,
    a lot of projects are managed exactly like this. And if you’re one of the unfortunate
    souls on the development side and not the managerial side, you get the most amount
    of grief because you constantly deliver things that may make perfect sense technically,
    but zero sense aesthetically to the customer. It becomes particularly painful
    when it becomes obvious that the development team is the last in the line of those
    taking orders to fulfill customer requirements, so ultimately, the on-time and
    under-budget status of a project is the responsibility of the development team.
    For this reason, it is important to stick to the agreed upon requirements and
    to not deviate.


    I’ve found that the best way to manage any large task is to break it into smaller,
    more manageable tasks. This is commonly known as `modularization`, and is a fantastic
    way to handle just about anything. Splitting a task into phases is what makes
    sense to me in this aspect, so let’s concentrate on that for a minute.


    ## Project Definition Phases


    Instead of going through all the trouble of scope creep, it’s best to have a very
    structured idea of what is expected, when it is expected, and how it is expected.
    There are clearly defined phases for project development, which I discuss shortly.
    Trust me; it would serve you very well to adopt these phases, or something very
    similar, in your next project, if you aren’t already using something to manage
    the project. The need for very specific goal posts is very important, no matter
    the size of your project. Please understand that this is in no way the only way
    to handle project management. I’m sure that there will be disagreements about
    the methodology and the necessary steps involved. But what I really want you to
    take from this if you’ve never had to deal with this before, is that a management
    plan is an absolute necessity when planning a project.'
  raw: '## Scope Creep


    What exactly is scope creep? It’s when the requirements of the project are not
    firmly adhered to. Plain and simple. There really is no point in going through
    all the time, trouble, energy, and effort of defining project requirements if
    they aren’t going to be followed. In this case, it would be easier if development
    started, and then ad hoc requests came from the customer as to the intended development
    for that day or week. The flip side of this is to have a firm set of requirements
    that are agreed on by the customer and followed religiously by the development
    team. Hence, no misinterpretation from anyone, because everything is very clearly
    laid out and agreed upon from the beginning. We get into this a bit later in this
    chapter.


    My favorite example of scope creep is to describe it using a rock. Pretend that
    you are on one side of a fence and your customer is on the other. Your customer
    shouts over the fence that they would like a painted rock. You respond that you
    are very good at painting rocks and that you will get it to them ASAP. So, you
    look around and find a decently sized rock, and then find your most popular color
    of paint. You are very good at this after all, so you’re assuming what your customer
    wants. The finished rock looks fantastic, so you throw it over the fence to your
    customer. They immediately throw it back, because it is not the right color. When
    was the color defined? Well, it wasn’t. You assumed that your color was what the
    customer wanted; but turns out, it wasn’t right at all. So instead of learning
    your lesson, you decide to paint the rock a different color and then toss it back
    over the fence. The customer immediately tosses it back, because it is again the
    wrong color. Now you’re getting frustrated because you know this is the correct
    color—it has to be! Finally, you ask the customer what color they would like;
    they answer “blue.” Not a problem, because you’ve got blue. So, you paint the
    rock blue and then toss it over the fence. Guess what. They throw it right back
    over, saying it isn’t the right shade of blue. This goes on and on until you finally
    get the right shade of blue. But they throw the rock back over again! Why? This
    time, they’re complaining that the shape of the rock isn’t correct, and actually,
    the rock is also the wrong kind of rock all together.


    So the project started out as an assumption from “paint this rock,” and then into
    “use this particular shade of paint for this particular shape of rock on this
    particular kind of rock.” See that? It’s very frustrating, I can tell you. Unfortunately,
    a lot of projects are managed exactly like this. And if you’re one of the unfortunate
    souls on the development side and not the managerial side, you get the most amount
    of grief because you constantly deliver things that may make perfect sense technically,
    but zero sense aesthetically to the customer. It becomes particularly painful
    when it becomes obvious that the development team is the last in the line of those
    taking orders to fulfill customer requirements, so ultimately, the on-time and
    under-budget status of a project is the responsibility of the development team.
    For this reason, it is important to stick to the agreed upon requirements and
    to not deviate.


    I’ve found that the best way to manage any large task is to break it into smaller,
    more manageable tasks. This is commonly known as modularization, and is a fantastic
    way to handle just about anything. Splitting a task into phases is what makes
    sense to me in this aspect, so let’s concentrate on that for a minute.


    ## Project Definition Phases


    Instead of going through all the trouble of scope creep, it’s best to have a very
    structured idea of what is expected, when it is expected, and how it is expected.
    There are clearly defined phases for project development, which I discuss shortly.
    Trust me; it would serve you very well to adopt these phases, or something very
    similar, in your next project, if you aren’t already using something to manage
    the project. The need for very specific goal posts is very important, no matter
    the size of your project. Please understand that this is in no way the only way
    to handle project management. I’m sure that there will be disagreements about
    the methodology and the necessary steps involved. But what I really want you to
    take from this if you’ve never had to deal with this before, is that a management
    plan is an absolute necessity when planning a project.'
  trans: '## 范围蔓延


    究竟什么是范围蔓延？简单来说，就是项目的**需求**没有得到严格遵守。如果定义项目需求的过程耗费了时间、麻烦、精力与心血，最终却不被遵循，那确实毫无意义。在这种情况下，倒不如直接开始开发，然后由客户临时提出当天或当周的开发需求。与之相反的做法是，确立一套客户与开发团队共同认可、并严格遵循的固定需求。这样一来，就不会产生任何人的误解，因为一切从一开始就被清晰地列出并达成一致。我们将在本章稍后部分深入探讨这一点。


    我最喜欢用一块石头来描述范围蔓延。假设你站在栅栏的一侧，你的客户在另一侧。客户隔着栅栏喊话，说想要一块“上了色的石头”。你回应说你非常擅长给石头上色，会尽快交给他们。于是，你四处寻找，找到一块大小适中的石头，然后拿出你最常用的颜色。毕竟你对此非常擅长，所以你默认了客户想要的就是这样。完成的石头看起来棒极了，你把它扔给了栅栏对面的客户。他们立刻扔了回来，因为颜色不对。那么颜色是什么时候确定的呢？其实并没有确定。你假设了你的颜色就是客户想要的；但结果证明，完全不对。然而你并没有吸取教训，决定把石头漆成另一种颜色，然后扔回栅栏。客户立刻又扔了回来，因为颜色还是不对。现在你开始感到沮丧，因为你认为这个颜色是正确的——它必须是正确的！最终，你问客户想要什么颜色；他们回答“蓝色”。这没问题，因为你有蓝色颜料。于是你把石头漆成蓝色，再扔回栅栏。猜猜怎么了？他们立刻又扔了回来，说蓝色的色调不对。这种情况反复发生，直到你终于调对了那个蓝色的色调。但是，他们又一次把石头扔了回来！为什么？这次，他们抱怨石头的形状不对，实际上，这块石头的种类也完全错了。


    所以，项目从“给这块石头上色”这个假设开始，最终演变成了“用这种特定色调的颜料，涂在这种特定形状的、这种特定种类的石头上”。看到了吗？我可以告诉你，这非常令人沮丧。不幸的是，许多项目正是这样管理的。如果你是开发团队中不幸的一员，而不是管理层，你将承受最多的抱怨，因为你不断交付的东西在技术上可能完全合理，但对客户来说在审美上毫无意义。当情况变得明显，开发团队是接收指令以满足客户需求的最后一个环节时，情况会变得特别痛苦，因此，项目能否按时且在预算内完成，最终责任落在了开发团队身上。因此，坚持已达成一致的需求并避免偏离至关重要。


    我发现管理任何大型任务的最佳方法是将其分解为更小、更易管理的任务。这通常被称为`模块化`，是处理几乎所有事情的绝佳方式。在这方面，将任务按阶段划分对我来说非常有意义，让我们稍作关注这一点。


    ## 项目定义阶段


    与其经历所有范围蔓延的麻烦，最好对需要什么、何时需要以及如何需要有一个非常结构化的构想。项目开发有明确定义的阶段，我很快就会讨论到。相信我；如果你的下一个项目还没有使用某种管理方法，那么采用这些阶段或非常类似的流程将会对你非常有帮助。无论项目规模大小，设定非常具体的目标节点都至关重要。请理解，这绝不是处理项目管理的唯一方式。我确信关于方法论以及必要的步骤会有不同的意见。但我真正希望你从这里学到的是，特别是如果你从未处理过这方面事务的话，那就是在规划项目时，一个管理计划是绝对必要的。'
- fmt: "### Phase I: Requirements Gathering\n\nThis phase consists of both software\
    \ and hardware definitions. This is perhaps the most important phase in the entire\
    \ process, because if this is wrong or incomplete, it affects all phases after\
    \ it. For that reason, we need to be absolutely sure that our definitions are\
    \ complete and agreed upon by all parties and stakeholders. This phase requires\
    \ a set of documentation to be created by the development team, delivered by the\
    \ development team to the customer, and signed and dated by the customer. At this\
    \ point, the documentation set is then considered to be the official scope of\
    \ the project.\n\nWhat needs to take place in this requirements gathering phase?\
    \ The following is a list of what needs to occur.\n\n*   Development team needs\
    \ to produce a `software requirements document`.\n    *   A problem or issue needs\
    \ to be clearly defined.\n        *   Get as much detail as possible from the\
    \ customer, including how this problem affects their day-to-day work or how much\
    \ more expedient they could work with the addition of a certain feature.\n   \
    \ *   A solution to the stated problem needs to be broadly defined.\n        *\
    \   This means that it is not answered in the minutia just yet. Offer many different\
    \ solutions, if possible, so the customer is aware of their varying choices.\n\
    *   The software language and technology needs to be determined.\n    *   Details\
    \ are provided on the languages and technologies used to develop the interface\
    \ or application.\n*   The medium needs to be determined.\n    *   The medium\
    \ in which it will be delivered; usually, either web-based or on the desktop.\n\
    *   A structured `software design document` needs to be produced by the development\
    \ team .\n    *   This document provides details on the interface presented to\
    \ the customer. It needs to be pointed out to the customer that this interface\
    \ will more than likely change slightly over time, depending on current web or\
    \ desktop trends and options available in the language you’re working in. The\
    \ large majority of this document will consist of mock screen shots and report\
    \ scenarios.\n*   A structured `database requirements document` needs to be produced\
    \ by the development team.\n    *   This document provides details about the database\
    \ tables and scripts that will be created to present the interface, and ultimately,\
    \ the entire solution to the customer. Notice that this document encompasses the\
    \ design and the requirements of the database. The reason for this is because\
    \ the customer, for the most part, is not bothered with the mundane details of\
    \ the database such as data type or length of the field. While this can certainly\
    \ be presented to the customer in a different document, it is probably best to\
    \ keep this information at more of an arm’s length away, so as not to overload\
    \ the customer with meaningless information (from their point of view). What is\
    \ the overall purpose of this document? Much more important than you may realize\
    \ at first. This document can be used to provide a mapping of the database for\
    \ future interaction with different, remote databases, for example. For this reason,\
    \ it is imperative that this be the last document created, in case something changes\
    \ in the database and the documentation does not reflect this change.\n\nThis\
    \ list represents what I consider the minimum amount of documentation to deliver\
    \ as part of a formal request. There could be more, but this is a good start.\n\
    \nOnce this phase is complete and a documentation set has been produced, a formal\
    \ acceptance and signature is required. It needs to be clearly related to the\
    \ customer that there are no changes of any kind after the documents are signed\
    \ and development begins. If there is a change that needs to be made, you have\
    \ a choice to make. You can either begin a spiral development process, or implement\
    \ a `software change request system`. I highly recommend a `software change request\
    \ system`. What are the differences?\n\n### Spiral Development Process\n\nSpiral\
    \ development is a particularly heinous form of development that occurs when scope\
    \ creep is actually allowed and encouraged on a project. The horrors! Can you\
    \ see the implications of allowing too much scope creep? That’s correct; the project\
    \ is never truly done. The project constantly stays in the definition and development\
    \ phases, and never progresses to completion.\n\nFor those of us who get paid\
    \ by the project, it is entirely unacceptable to encourage scope creep. Think\
    \ about it like this: if you estimate a project will take 10 hours and you charge\
    \ $500 for the project, you’re making $50 an hour. There is no guarantee that\
    \ you will be done in 10 hours, though. Let’s say it takes you 20 hours; you’re\
    \ now at $25 an hour. Even worse, it takes you 100 hours. Wow! You’re making $5\
    \ an hour.\n\nObviously, this is not how you want to work. Instead, you should\
    \ just deliver what was agreed upon, and any changes are considered `over and\
    \ above` what was estimated and paid for, and subject to a new agreement. I can\
    \ tell you from experience that it keeps everyone happy when there is a very clear\
    \ definition of what is expected to be done .\n\nAnother danger in the spiral\
    \ development process is like I said: the project is never truly done. It just\
    \ continues on and on because the customer is getting more than what they paid\
    \ for, and the developer is oftentimes too timid to bring up that something is,\
    \ in fact, outside the agreed-upon scope of the project. Does this work for you?\
    \ Would you like a reputation as someone who takes the time to go through all\
    \ the motions of correct management techniques, and then cave to the customers’\
    \ unsubstantiated request for change in the middle of a project? I don’t think\
    \ you would. I think we all would like the reputation of the competent developer\
    \ that has the integrity to call the customer out on possible or overt deviations\
    \ or expectation of deviation from the contract. In this case, there needs to\
    \ be a clearly defined remediation clause in a contract that deals specifically\
    \ with the steps necessary to enforce the rigidity of the original contract and\
    \ the scope therein.\n\n### Software Change Request Process\n\nFormal change requests\
    \ are what I recommend when making changes to a project and its scope. The reason\
    \ is very simple: the project stays structured! The initial project is completed\
    \ and is labeled as `v1.0`, right? Any change you make after this would be `v1.1`\
    \ for a small change, or maybe `2.0` for a major change. The `software change\
    \ request process` has different steps that need to be followed in a workflow\
    \ to facilitate a complete change request. It isn’t a customer sending an `e-mail`;\
    \ it is a full process that has sign-offs at each step of the workflow.\n\n####\
    \ Request Submission\n\nIn this step, any user can request a change to the software.\
    \ Requests need to be complete and organized though, and not just vague statements\
    \ like “I would like a rock painted blue.” Request submission is generally a fairly\
    \ complex step, with the user being forced to provide a large amount of information\
    \ pertaining to the request. Be sure to gather not just the customer information,\
    \ but the specific task needing to be done.\n\n#### Administrator Approval\n\n\
    The administrator then receives a notification that a change has been requested.\
    \ At this point, the admin can either accept or reject the change. There is also\
    \ the case that the administrator could contact the requestor for more information,\
    \ then reject the request so that the originator can expound on the original request.\
    \ This is very common, since nine times out of ten, regular users don’t understand\
    \ the complexity requirements needed to properly fulfill their request."
