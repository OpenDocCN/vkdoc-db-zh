    完成安装的最后一步是安装 Microsoft R Open。请返回到 Microsoft 提供并显示在图 [2-1](#A421548_1_En_2_Chapter.html#Fig1)
    中的网页，点击 Download Microsoft R Open 链接。此时，会打开另一个网页；其 URL 是 [`https://mran.revolutionanalytics.com/download/`](https://mran.revolutionanalytics.com/download/)。图
    [2-14](#A421548_1_En_2_Chapter.html#Fig14) 显示了此时您应该看到的 Microsoft R Open 下载页面。


    ![A421548_1_En_2_Fig14_HTML.jpg](A421548_1_En_2_Fig14_HTML.jpg)

    图 2-14. 打开的网页


    请注意，Microsoft R Open 的下载仅适用于 64 位平台。Microsoft R Open 可用于 64 位版本的 Windows (7 SP1,
    8.1, 10, Server 2008 R2 SP1, 和 Server 2012)、Ubuntu (14.04 和 15.04)、Red Hat Enterprise
    Linux (7.1 和 6.5) 以及 SUSE Linux Enterprise Server 11。


    请继续点击适合您操作系统的链接；下载应该会开始。在撰写本文时，Windows 安装文件的名称是 `microsoft-r-open-3.3.1.msi`，大小为
    131MB。可执行文件下载需要一点时间，所以在等待时可以去喝点什么。


    Microsoft R Open 下载完成了吗？很好。那么我们现在就安装它吧。双击您刚刚下载的可执行文件。图 [2-15](#A421548_1_En_2_Chapter.html#Fig15)
    显示了您此时应该看到的界面。


    ![A421548_1_En_2_Fig15_HTML.jpg](A421548_1_En_2_Fig15_HTML.jpg)

    图 2-15. 开始 Microsoft R Open 安装


    点击 Next。您应该会被带到图 [2-16](#A421548_1_En_2_Chapter.html#Fig16) 所示的屏幕。此屏幕提供了一些关于即将进行的安装的详细信息。阅读给出的信息，勾选
    I Acknowledge 复选框，然后在准备好时点击 Next。


    ![A421548_1_En_2_Fig16_HTML.jpg](A421548_1_En_2_Fig16_HTML.jpg)

    图 2-16. 信息


    下一个屏幕，如图 [2-17](#A421548_1_En_2_Chapter.html#Fig17) 所示，显示了 Install Math Kernel
    Library (Intel© `MKL`) 安装选项。


    ![A421548_1_En_2_Fig17_HTML.jpg](A421548_1_En_2_Fig17_HTML.jpg)

    图 2-17. Install Math Kernel Library (Intel© `MKL`) 选项


    是否安装完全由您决定，因为它不是必需的安装部分，但建议您安装。默认选中的原因是，添加数学内核库允许您的 R 代码使用所有可用资源来生成结果，这意味着完成速度会快得多（取决于您机器的速度和可用资源）。我也建议保留选中此选项。准备好继续时点击
    Next。


    接下来，我们必须接受正在安装的 `MKL` 的许可条款。这如图 [2-18](#A421548_1_En_2_Chapter.html#Fig18) 所示。


    ![A421548_1_En_2_Fig18_HTML.jpg](A421548_1_En_2_Fig18_HTML.jpg)

    图 2-18. 接受 `MKL` 许可条款


    此时，请确保点击 I accept 复选框，然后点击 Next 继续。


    接下来，图 [2-19](#A421548_1_En_2_Chapter.html#Fig19) 中的屏幕显示了目标位置信息。点击 Next 接受目标文件夹。


    ![A421548_1_En_2_Fig19_HTML.jpg](A421548_1_En_2_Fig19_HTML.jpg)

    图 2-19. 选择目标位置


    在这里点击 Next。接下来的屏幕，如图 [2-20](#A421548_1_En_2_Chapter.html#Fig20) 所示，让我们开始安装；准备好时点击
    Install。


    ![A421548_1_En_2_Fig20_HTML.jpg](A421548_1_En_2_Fig20_HTML.jpg)

