- fmt: '## Data Directories


    Recall the way that I had my file system set up. This is where that comes into
    play. Figure [A-14](#A421548_1_En_10_Chapter.html#Fig14) shows what this screen
    looks like initially and Figure [A-15](#A421548_1_En_10_Chapter.html#Fig15) shows
    what my selected options are. You can leave these however you like, but my personal
    preference is to not put the files I want in the labyrinth of folders that are
    the default.


    ![A421548_1_En_10_Fig15_HTML.jpg](A421548_1_En_10_Fig15_HTML.jpg)


    Figure A-15.

    Updated Data Directories tab


    ![A421548_1_En_10_Fig14_HTML.jpg](A421548_1_En_10_Fig14_HTML.jpg)


    Figure A-14.

    Initial Data Directories tab


    ## TempDB


    Usually, I leave this option alone. However, in this case, I set the options to
    mirror the file system that I have enabled. Figure [A-16](#A421548_1_En_10_Chapter.html#Fig16)
    shows the default settings and Figure [A-17](#A421548_1_En_10_Chapter.html#Fig17)
    shows the updated settings.


    ![A421548_1_En_10_Fig17_HTML.jpg](A421548_1_En_10_Fig17_HTML.jpg)


    Figure A-17.

    TempDB updated settings


    ![A421548_1_En_10_Fig16_HTML.jpg](A421548_1_En_10_Fig16_HTML.jpg)


    Figure A-16.

    TempDB default settings


    The changes I made were slight. I first highlighted the existing option in the
    `Data directories` field and then clicked the `Remove` button. Then I clicked
    the `Add` button and added `E:\SQL Server\Data` instead. This location was mirrored
    in the `Log directory` field, so I changed that to `E:\SQL Server\Logs` instead.
    That’s it for this tab.


    ## FILESTREAM


    Just leave the FILESTREAM tab alone. We won’t be using FILESTREAM in this book.


    ## Reporting Services Configuration


    Once you’ve got those tabs all filled in, click `Next`. Figure [A-18](#A421548_1_En_10_Chapter.html#Fig18)
    shows you what you should see now.


    ![A421548_1_En_10_Fig18_HTML.jpg](A421548_1_En_10_Fig18_HTML.jpg)


    Figure A-18.

    Reporting Services Configuration


    This is where we get to configure Reporting Services. We configure this further
    in Chapter [7](#A421548_1_En_7_Chapter.html) and onward, so we installed it now,
    using the `Install and configure` option that is selected by default.


    One quick thing while we’re talking about this; if you go in later and want to
    Reporting Services because you didn’t install it with the database engine, you
    only have the `Install only` option available to you. The reason for this is because
    the `Reporting Services Configuration Manager` must be used to add Reporting Services
    to an existing database engine instance. Ideally, you should use the principal
    of least installation here, which is a concept that states that, when installing
    new software, you should only install what is needed and disregard what is not.
    In this case particularly, that makes perfect sense and is exactly what we are
    doing my not installing all of SQL Server 2016 right now. In certain other cases,
    it makes perfect to install the deluxe bells and whistles version of the software,
    but just keep in mind that this isn’t always the case.


    Ensure that the `Install and configure` option is selected and click `Next` at
    the Reporting Services Configuration screen to move on.


    ## Consent to Install Microsoft R Open


    You should now see what is shown in Figure [A-19](#A421548_1_En_10_Chapter.html#Fig19).


    ![A421548_1_En_10_Fig19_HTML.jpg](A421548_1_En_10_Fig19_HTML.jpg)


    Figure A-19.

    Consent to Install Microsoft R Open


    This is pretty cool. Before the full version of SQL Server 2016, you had to download
    the separate components for R and then install them individually. In this release,
    you just authorize the download here instead. Click the `Accept` button. The `Next`
    button becomes enabled. Go ahead and click `Next` to move on.


    ## Ready to Install


    Figure [A-20](#A421548_1_En_10_Chapter.html#Fig20) shows the Ready to install
    screen that you should now see. Read it over and ensure that you match these settings
    before moving on, if you’re going to do the exercises in this book.


    ![A421548_1_En_10_Fig20_HTML.jpg](A421548_1_En_10_Fig20_HTML.jpg)


    Figure A-20.

    Ready to install


    Once you are ready, cross your fingers and click `Install`. Your screen flashes
    a few times while it is loading and installing what it needs. Figure [A-21](#A421548_1_En_10_Chapter.html#Fig21)
    shows what you should see when it starts running.


    ![A421548_1_En_10_Fig21_HTML.jpg](A421548_1_En_10_Fig21_HTML.jpg)


    Figure A-21.

    Installation Progress


    At this point, it is installing normally. It takes a little while, but eventually
    finishes with the screen shown in Figure [A-22](#A421548_1_En_10_Chapter.html#Fig22).


    ![A421548_1_En_10_Fig22_HTML.jpg](A421548_1_En_10_Fig22_HTML.jpg)


    Figure A-22.

    Complete'
  raw: '### Data Directories


    Recall the way that I had my file system set up. This is where that comes into
    play. Figure [A-14](#A421548_1_En_10_Chapter.html#Fig14) shows what this screen
    looks like initially and Figure [A-15](#A421548_1_En_10_Chapter.html#Fig15) shows
    what my selected options are. You can leave these however you like, but my personal
    preference is to not put the files I want in the labyrinth of folders that are
    the default.


    ![A421548_1_En_10_Fig15_HTML.jpg](A421548_1_En_10_Fig15_HTML.jpg)


    Figure A-15.


    Updated Data Directories tab


    ![A421548_1_En_10_Fig14_HTML.jpg](A421548_1_En_10_Fig14_HTML.jpg)


    Figure A-14.


    Initial Data Directories tab


    ### TempDB


    Usually, I leave this option alone. However, in this case, I set the options to
    mirror the file system that I have enabled. Figure [A-16](#A421548_1_En_10_Chapter.html#Fig16)
    shows the default settings and Figure [A-17](#A421548_1_En_10_Chapter.html#Fig17)
    shows the updated settings.


    ![A421548_1_En_10_Fig17_HTML.jpg](A421548_1_En_10_Fig17_HTML.jpg)


    Figure A-17.


    TempDB updated settings


    ![A421548_1_En_10_Fig16_HTML.jpg](A421548_1_En_10_Fig16_HTML.jpg)


    Figure A-16.


    TempDB default settings


    The changes I made were slight. I first highlighted the existing option in the
    Data directories field and then clicked the Remove button. Then I clicked the
    Add button and added E:\SQL Server\Data instead. This location was mirrored in
    the Log directory field, so I changed that to E:\SQL Server\Logs instead. That’s
    it for this tab.


    ### FILESTREAM


    Just leave the FILESTREAM tab alone. We won’t be using FILESTREAM in this book.


    ## Reporting Services Configuration


    Once you’ve got those tabs all filled in, click Next. Figure [A-18](#A421548_1_En_10_Chapter.html#Fig18)
    shows you what you should see now.


    ![A421548_1_En_10_Fig18_HTML.jpg](A421548_1_En_10_Fig18_HTML.jpg)


    Figure A-18.


    Reporting Services Configuration


    This is where we get to configure Reporting Services. We configure this further
    in Chapter [7](#A421548_1_En_7_Chapter.html) and onward, so we installed it now,
    using the Install and configure option that is selected by default.


    One quick thing while we’re talking about this; if you go in later and want to
    Reporting Services because you didn’t install it with the database engine, you
    only have the Install only option available to you. The reason for this is because
    the Reporting Services Configuration Manager must be used to add Reporting Services
    to an existing database engine instance. Ideally, you should use the principal
    of least installation here, which is a concept that states that, when installing
    new software, you should only install what is needed and disregard what is not.
    In this case particularly, that makes perfect sense and is exactly what we are
    doing my not installing all of SQL Server 2016 right now. In certain other cases,
    it makes perfect to install the deluxe bells and whistles version of the software,
    but just keep in mind that this isn’t always the case.


    Ensure that the Install and configure option is selected and click Next at the
    Reporting Services Configuration screen to move on.


    ## Consent to Install Microsoft R Open


    You should now see what is shown in Figure [A-19](#A421548_1_En_10_Chapter.html#Fig19).


    ![A421548_1_En_10_Fig19_HTML.jpg](A421548_1_En_10_Fig19_HTML.jpg)


    Figure A-19.


    Consent to Install Microsoft R Open


    This is pretty cool. Before the full version of SQL Server 2016, you had to download
    the separate components for R and then install them individually. In this release,
    you just authorize the download here instead. Click the Accept button. The Next
    button becomes enabled. Go ahead and click Next to move on.


    ## Ready to Install


    Figure [A-20](#A421548_1_En_10_Chapter.html#Fig20) shows the Ready to install
    screen that you should now see. Read it over and ensure that you match these settings
    before moving on, if you’re going to do the exercises in this book.


    ![A421548_1_En_10_Fig20_HTML.jpg](A421548_1_En_10_Fig20_HTML.jpg)


    Figure A-20.


    Ready to install


    Once you are ready, cross your fingers and click Install. Your screen flashes
    a few times while it is loading and installing what it needs. Figure [A-21](#A421548_1_En_10_Chapter.html#Fig21)
    shows what you should see when it starts running.


    ![A421548_1_En_10_Fig21_HTML.jpg](A421548_1_En_10_Fig21_HTML.jpg)


    Figure A-21.


    Installation Progress


    At this point, it is installing normally. It takes a little while, but eventually
    finishes with the screen shown in Figure [A-22](#A421548_1_En_10_Chapter.html#Fig22).


    ![A421548_1_En_10_Fig22_HTML.jpg](A421548_1_En_10_Fig22_HTML.jpg)


    Figure A-22.


    Complete'
  trans: '

    ## 数据目录


    回顾我设置文件系统的方式。这里就派上用场了。图 A-14 展示了此屏幕的初始外观，图 A-15 则展示了我选择的配置选项。你可以按喜好设置这些，但我个人的偏好是不将所需文件放在默认的、如迷宫般的文件夹结构中。


    ![A421548_1_En_10_Fig15_HTML.jpg](img/A421548_1_En_10_Fig15_HTML.jpg)


    图 A-15.

    更新后的数据目录选项卡


    ![A421548_1_En_10_Fig14_HTML.jpg](img/A421548_1_En_10_Fig14_HTML.jpg)


    图 A-14.

    初始数据目录选项卡


    ## TempDB


    通常，我会保持此选项不变。但在这里，我将选项设置为镜像我已启用的文件系统。图 A-16 显示了默认设置，图 A-17 显示了更新后的设置。


    ![A421548_1_En_10_Fig17_HTML.jpg](img/A421548_1_En_10_Fig17_HTML.jpg)


    图 A-17.

    TempDB 更新后的设置


    ![A421548_1_En_10_Fig16_HTML.jpg](img/A421548_1_En_10_Fig16_HTML.jpg)


    图 A-16.

    TempDB 默认设置


    我所做的改动很小。首先，我在 `数据目录` 字段中选中了现有选项，然后点击了 `删除` 按钮。接着，我点击了 `添加` 按钮，并添加了 `E:\SQL Server\Data`。该位置在
    `日志目录` 字段中被镜像，因此我将其改为 `E:\SQL Server\Logs`。这个选项卡的配置就到此为止。


    ## FILESTREAM


    保持 FILESTREAM 选项卡不变即可。本书中不会使用 FILESTREAM。


    ## Reporting Services 配置


    当你将所有这些选项卡都填写完毕后，点击 `下一步`。图 A-18 展示了你现在应该看到的界面。


    ![A421548_1_En_10_Fig18_HTML.jpg](img/A421548_1_En_10_Fig18_HTML.jpg)


    图 A-18.

    Reporting Services 配置


    这里是我们配置 Reporting Services 的地方。我们将在第 7 章及之后进一步配置它，所以我们现在就使用默认选中的 `安装并配置` 选项来安装它。


    顺便提一下；如果以后你想添加 Reporting Services，因为你安装数据库引擎时没有安装它，你将只有 `仅安装` 选项可用。这是因为必须使用 `Reporting
    Services 配置管理器` 才能将 Reporting Services 添加到现有的数据库引擎实例中。理想情况下，你应该遵循 **最小安装原则**，这个概念指出，安装新软件时，只应安装需要的部分，忽略不需要的部分。特别是在这种情况下，这非常合理，也正是我们现在不安装整个
    SQL Server 2016 的原因。在其他某些情况下，安装功能齐全的豪华版软件是完全合理的，但请记住，并非总是如此。


    在 Reporting Services 配置屏幕，确保选中了 `安装并配置` 选项，然后点击 `下一步` 继续。


    ## 同意安装 Microsoft R Open


    你现在应该看到如图 A-19 所示的界面。


    ![A421548_1_En_10_Fig19_HTML.jpg](img/A421548_1_En_10_Fig19_HTML.jpg)


    图 A-19.

    同意安装 Microsoft R Open


    这非常酷。在 SQL Server 2016 完整版之前，你必须下载 R 的单独组件，然后分别安装。在这个版本中，你只需在此授权下载即可。点击 `接受` 按钮。`下一步`
    按钮将变为可用。继续点击 `下一步` 以继续。


    ## 准备安装


    图 A-20 显示了你现在应该看到的“准备安装”屏幕。在继续之前（如果你打算按照本书的练习操作），请仔细阅读并确保你的设置与此匹配。


    ![A421548_1_En_10_Fig20_HTML.jpg](img/A421548_1_En_10_Fig20_HTML.jpg)


    图 A-20.

    准备安装


    一旦你准备好了，祈祷一下，然后点击 `安装`。在加载和安装所需组件时，你的屏幕会闪烁几次。图 A-21 显示了安装开始运行时你应该看到的内容。


    ![A421548_1_En_10_Fig21_HTML.jpg](img/A421548_1_En_10_Fig21_HTML.jpg)


    图 A-21.

    安装进度


    此时，安装正常进行。这需要一点时间，但最终会完成，并显示如图 A-22 所示的界面。


    ![A421548_1_En_10_Fig22_HTML.jpg](img/A421548_1_En_10_Fig22_HTML.jpg)


    图 A-22.

    完成

