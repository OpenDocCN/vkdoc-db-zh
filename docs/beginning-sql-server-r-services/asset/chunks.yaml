    ## 生成二进制数据


    接下来，我们需要弄清楚需要使用哪种存储过程语法来获取我们所需图表的二进制数据。借鉴我们之前创建图表时所做的大量工作，我们可以推断其语法可能与以下内容相似。


    ```

    EXEC sp_execute_external_script

    @language = N''R'',

    @script = N''

    library("ggplot2");

    img <- inputDataSet;

    image_file = tempfile();

    png(filename = image_file, width=800, height=600);

    print(ggplot(img, aes(x = AirportID, y = WindSpeed)) +

    labs(x = "Airport ID", y = "Wind Speed") +

    theme(axis.text.x = element_text(angle=90, hjust=1, vjust=0)) +

    geom_point(stat = "identity") +

    geom_smooth(method = "loess", aes(group = 1)) +

    geom_text(aes(label = AirportID), size = 3, vjust = 1.0) +

    geom_text(aes(label = round(WindSpeed, digits = 2)), size = 3, vjust = 2.0));

    dev.off();

    OutputDataset <- data.frame(data=readBin(file(image_file,"rb"),what=raw(),n=1e6));'',

    @input_data_1 = N''SELECT AirportID, AVG(CONVERT(float, WindSpeed)) as WindSpeed
    FROM [Weather_Sample] GROUP BY AirportID ORDER BY AirportID;'',

    @input_data_1_name = N''inputDataSet'',

    @output_data_1_name = N''OutputDataset''

    WITH RESULT SETS ((plot varbinary(max)));

    ```


    注意：我们这里生成的是 `PNG` 图像，而不是 `JPG`。这一点在后续使用 Report Builder 动态生成这些图表时很重要。


    将此代码输入一个新的查询窗口并执行，会得到一个二进制数据结果。图 7-32 展示了此时你应在 SSMS 中看到的内容。


    ![A421548_1_En_7_Fig32_HTML.jpg](img/A421548_1_En_7_Fig32_HTML.jpg)


    图 7-32. 二进制数据


    回顾一下，我们已经创建了一个表来存储图表。现在，我们将通过在存储过程中使用以下代码，将这个二进制数据插入到表中。现在，我们只需要重写存储过程来自动插入数据。知道怎么做吗？没错，我们将使用
    `INSERT INTO ... EXEC`。


    那么如何构建查询呢？实际上非常简单。我相信你们中的一些人已经知道如何操作，但对于还不清楚的人来说，它看起来是这样的：


    ```

    INSERT INTO chartBinary (binData)

    EXEC sp_execute_external_script

    @language = N''R'',

    @script = N''

    library("ggplot2");

    img <- inputDataSet;

    image_file = tempfile();

    png(filename = image_file, width=800, height=600);

    print(ggplot(img, aes(x = AirportID, y = WindSpeed)) +

    labs(x = "Airport ID", y = "Wind Speed") +

    theme(axis.text.x = element_text(angle=90, hjust=1, vjust=0)) +

    geom_point(stat = "identity") +

    geom_smooth(method = "loess", aes(group = 1)) +

    geom_text(aes(label = AirportID), size = 3, vjust = 1.0) +

    geom_text(aes(label = round(WindSpeed, digits = 2)), size = 3, vjust = 2.0));

    dev.off();

    OutputDataset <- data.frame(data=readBin(file(image_file,"rb"),what=raw(),n=1e6));'',

    @input_data_1 = N''SELECT AirportID, AVG(CONVERT(float, WindSpeed)) as WindSpeed
    FROM [Weather_Sample] GROUP BY AirportID ORDER BY AirportID;'',

    @input_data_1_name = N''inputDataSet'',

    @output_data_1_name = N''OutputDataset'';

    ```


    这更新了我们的 `binData` 列，但 `title` 列没有赋值。由于这是表中的第一条记录，`UID` 被设置为 1；因此请确保你的 `WHERE`
    子句指定了这一点。要为此图表更新 `title` 值，在运行第一个查询后，运行此 `UPDATE` 查询。


    ```

    UPDATE chartBinary

    SET title = ''按机场 ID 分组的平均风速''

    WHERE uid = 1

    ```


    这样应该就可以了。要验证，请运行以下查询来查看你的数据。


    ```

    SELECT title, binData FROM [dbo].[chartBinary] ORDER BY uid

    ```


    结果应如图 7-33 所示。


    ![A421548_1_En_7_Fig33_HTML.jpg](img/A421548_1_En_7_Fig33_HTML.jpg)


    图 7-33. 查询结果


    接下来，我们需要为另一个报表构建查询，但这实际上相当简单，因为我们已经完成了大部分困难的工作。以下是完成此操作所需的代码。


    ```

    INSERT INTO chartBinary (binData)

    EXEC sp_execute_external_script

    @language = N''R'',

    @script = N''

    library("ggplot2");

    img <- inputDataSet;

    image_file = tempfile();

    png(filename = image_file, width=800, height=600);

    print(ggplot(img, aes(x = AirportID, y = Temperature)) +

    labs(x = "Airport ID", y = "Temperature") +

    theme(axis.text.x = element_text(angle=90, hjust=1, vjust=0)) +

    geom_point(stat = "identity") +

    geom_smooth(method = "loess", aes(group = 1)) +

    geom_text(aes(label = AirportID), size = 3, vjust = 1.0) +

    geom_text(aes(label = round(Temperature, digits = 2)), size = 3, vjust = 2.0));

    dev.off();

    OutputDataset <- data.frame(data=readBin(file(image_file,"rb"),what=raw(),n=1e6));'',

    @input_data_1 = N''SELECT AirportID, AVG(CONVERT(float, DryBulbFarenheit)) as
    Temperature FROM [Weather_Sample] GROUP BY AirportID ORDER BY AirportID;'',

    @input_data_1_name = N''inputDataSet'',

    @output_data_1_name = N''OutputDataset'';

    ```


    同样，设置 `title` 列：


    ```

    UPDATE chartBinary

    SET title = ''按机场 ID 分组的平均温度''

    WHERE uid = 2

    ```


    运行那两个代码块，然后运行以下查询来检查并确保所有数据都已正确插入。


    ```

    SELECT title, binData FROM [dbo].[chartBinary] ORDER BY uid

    ```


    此时，你应该看到如图 7-34 所示的内容。


    ![A421548_1_En_7_Fig34_HTML.jpg](img/A421548_1_En_7_Fig34_HTML.jpg)


    图 7-34. 查询结果


    搞定！两个结果，正如我们所愿。现在这些数据已经正确加载到表中，我们可以开始构建要交付给客户的报表了。别忘了定期对照软件需求文档来验证我们的进度。


    ## 总结


    让我们回顾一下本章所做的事情，因为内容确实不少。


    *   下载并安装了 Report Builder。

    *   将天气数据加载到了 SQL Server 中。

    *   基于这些天气数据生成作为二进制数据的图表。


    看起来似乎不多，但其实挺多的。请务必仔细阅读本章内容，因为在下一章中，如果没有这个二进制数据，你将无法取得太大进展。


    接下来，我们将把所有这些整合起来，构建成要交付给客户实际报表。如果你在本章过程中没有感到头疼，那你可能做错了。说真的，需要消化的信息量非常大。我强烈建议你回过头去重新阅读在
    SQL Server 中生成二进制数据的步骤。特别是 `ggplot2` 函数的各个属性，实际上非常有趣。你可以按照你能想到的几乎任何方式自定义图表。互联网上甚至有关于如何创建你自己的
    `R` 包以供私人使用或分发的信息。


    我们快完成了！坚持下去——我们很快就要大功告成了。如果你已经走到了这一步，我祝贺你，并鼓励你再坚持一小会儿。我保证这一切都是值得的！

    '
- fmt: '# 8. Building Reports Using Report Builder


    Up until now, we’ve dealt with an awful lot of information in this book. We’ve
    performed a new installation of SQL Server R Services, installed R Tools for Visual
    Studio, configured Reporting Services, and installed and configured Report Builder.
    We learned quite a bit about R and how it works and we generally got a lot of
    experience with writing code in general. If you have gotten this far, nice work!
    This is really sort of advanced stuff, since it’s basically brand-new functionality.
    It’s pretty safe to assume that R will continue to be offered as part of SQL Server
    for future releases, so it’s best to go ahead and get acquainted with it now instead
    of having to deal with the learning curve later.


    In this chapter, we create a report using the binary data we created in Chapter
    [7](#A421548_1_En_7_Chapter.html). This binary data is going to be converted into
    images dynamically. That sounds pretty complicated, but luckily, Report Builder
    makes it actually pretty easy for us.


    Here’s what we’re doing in this chapter:


    *   Build the Average Wind Speed by Airport ID report.

    *   Build the Average Temperature by Airport ID report.


    We’re only going to do two things? That’s correct. This chapter is sort of quick
    compared to the other chapters, which are a lot more in-depth. Consequently, this
    chapter is much shorter than the others, but hopefully you can still find this
    information useful.


    ## Report 1: Average Wind Speed by Airport ID


    Recall that the software requirements document specifically called out two reports
    that the customer wanted delivered. The first of these reports was the average
    wind speed by airport ID report. This particular report is important to the customer,
    so we are going to put a little time into setting it up, and then use that same
    format to create our second report. Keep in mind that, once the first report is
    written, it really is much faster to create any subsequent reports because we
    already have a general idea of how it is done. All we really need to do from that
    point is apply any specific formatting to the report, disregarding the image itself
    since that is generated from the database using pre-compiled binary data.


    First of all, start up `Report Builder` and run it as `Administrator`. The initial
    interface is shown in Figure [8-1](#A421548_1_En_8_Chapter.html#Fig1).


    ![A421548_1_En_8_Fig1_HTML.jpg](A421548_1_En_8_Fig1_HTML.jpg)


    Figure 8-1. Report Builder initial interface


    Recall that we have already stepped through the features of this interface, so
    let’s just get right into it.


    ## Setting up the Report Layout


    Click `Blank Report` at the bottom of the Getting Started screen. The layover
    window should disappear, so that you are left with what is shown in Figure [8-2](#A421548_1_En_8_Chapter.html#Fig2).


    ![A421548_1_En_8_Fig2_HTML.jpg](A421548_1_En_8_Fig2_HTML.jpg)


    Figure 8-2. Blank Report


    Click inside of the box labeled `Click to add title` and type `Average Wind Speed
    by Airport ID`. And then stretch the box to the height and width of the text.
    After that, center the text using the controls at the top of the screen. Figure
    [8-3](#A421548_1_En_8_Chapter.html#Fig3) shows what your report should now look
    like.


    ![A421548_1_En_8_Fig3_HTML.jpg](A421548_1_En_8_Fig3_HTML.jpg)


    Figure 8-3. General formatting of Title


    Next, we want to just do some really basic formatting for the body, so right-click
    anywhere in the middle part of the report and choose `Body Properties`. The location
    of this option is shown in Figure [8-4](#A421548_1_En_8_Chapter.html#Fig4).


    ![A421548_1_En_8_Fig4_HTML.jpg](A421548_1_En_8_Fig4_HTML.jpg)


    Figure 8-4. Option location


    Selecting that option opens another screen, shown in Figure [8-5](#A421548_1_En_8_Chapter.html#Fig5).


    ![A421548_1_En_8_Fig5_HTML.jpg](A421548_1_En_8_Fig5_HTML.jpg)


    Figure 8-5. Report Body Properties


    Now, we don’t want to have a fill color except for plain white, but if you want
    to get adventurous, go right ahead. We also don’t want a background image, so
    leave that blank for now. Like I said, if you want to change that, go right ahead.
    It’s your report!


    Click the `Border` option on the left; you should see what’s shown in Figure [8-6](#A421548_1_En_8_Chapter.html#Fig6).


    ![A421548_1_En_8_Fig6_HTML.jpg](A421548_1_En_8_Fig6_HTML.jpg)


    Figure 8-6. Border properties


    Just click the `Outline` option in the top-right corner and then click `OK`. That
    screen closes. You can’t really see a border on the page, but it’s there. You
    will see it when you preview the report.'
