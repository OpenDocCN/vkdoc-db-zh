- fmt: '# 7. Report Builder Installation and Data Preparation


    Now that we have `SQL Server Reporting Services` installed, we need to figure
    out how to create and deliver the reports requested by the customer in our software
    requirements document. Probably the best way to create the reports is using `Report
    Builder`, a free download from Microsoft. The best way to deliver the reports,
    obviously, is to use the built-in functionality from `SQL Server Reporting Services`,
    as previously configured in Chapter 6.


    Keep in mind that, if the customer only wanted flat-file reports (meaning just
    the data in `CSV` or `XML` format, for example) we could do that with a simple
    export of the data from `SQL Server` without interaction from `SQL Server Reporting
    Services` in the slightest. But the real point of this exercise is to show the
    power of `R` when integrated with `SQL Server`; so, using `Report Builder`, we’re
    going to incorporate those charts that we created in Chapter 5 into a slick-looking
    report. We can then deal with little things like formatting and such, but the
    most important part is making sure that the report can be built first.


    ## Download Report Builder


    To start this chapter off, we need to download `Report Builder`. The link for
    this is at [`https://www.microsoft.com/en-us/download/details.aspx?id=52674`](https://www.microsoft.com/en-us/download/details.aspx?id=52674)
    , but that could change. `Google` is your friend, remember.


    **Tip**: You can also download `Report Builder` from the `SQL Server Reporting
    Services` Web Portal that we saw at the end of Chapter 6 by clicking the down
    arrow in the top-right corner.


    Figure 7-1 shows the page where `Report Builder` can be downloaded. Note that
    this interface could change in the future, but the `Download` button should stay
    clearly visible.


    ![A421548_1_En_7_Fig1_HTML.jpg](A421548_1_En_7_Fig1_HTML.jpg)


    Figure 7-1. Report Builder download screen


    Click the button to download. You should see what is shown in Figure 7-2.


    ![A421548_1_En_7_Fig2_HTML.jpg](A421548_1_En_7_Fig2_HTML.jpg)


    Figure 7-2. Download in progress


    A file called `ReportBuilder3.msi` is being downloaded in the background. Once
    the download gets done, you should be able to click it in the browser bar to begin
    the installation. If you don’t see the downloaded file here, just go to your Downloads
    folder and sort by date. The file will show up there.


    Figure 7-3 shows the first screen that is shown for the installation.


    ![A421548_1_En_7_Fig3_HTML.jpg](A421548_1_En_7_Fig3_HTML.jpg)


    Figure 7-3. Microsoft SQL Server 2016 Report Builder Installation


    Obviously, we click `Next` to continue to the license terms shown in Figure 7-4.


    ![A421548_1_En_7_Fig4_HTML.jpg](A421548_1_En_7_Fig4_HTML.jpg)


    Figure 7-4. License Agreement


    Click the `I accept the terms in the license agreement` radio button and then
    click `Next`.


    Next, we get to choose our features. Figure 7-5 shows the default feature selection
    screen.


    ![A421548_1_En_7_Fig5_HTML.jpg](A421548_1_En_7_Fig5_HTML.jpg)


    Figure 7-5. Feature Selection


    We want to install everything for this, so pull down the menu on the disk in the
    white area. Choose `Entire feature will be installed on local hard drive` to continue.


    Figure 7-6 shows the correct selection for this.


    ![A421548_1_En_7_Fig6_HTML.jpg](A421548_1_En_7_Fig6_HTML.jpg)


    Figure 7-6. Correct selection


    This makes sure that we have absolutely everything possible for `Report Builder`.
    When you’re ready, click `Next` to continue.


    We are now presented with an interface that asks for the `Default Target Server`,
    as shown in Figure 7-7.


    ![A421548_1_En_7_Fig7_HTML.jpg](A421548_1_En_7_Fig7_HTML.jpg)


    Figure 7-7. Default Target Server


    The value that needs to be entered into `Default target server URL (optional)`
    is the value from the `Web Service URL` section of the `Reporting Services Configuration
    Manager` that we did in Chapter 6, which in my case is `http://bradlaptop/ReportServer_SQL2016RS`,
    so enter your own specific URL in the box. You should have something similar to
    what is shown in Figure 7-8.


    ![A421548_1_En_7_Fig8_HTML.jpg](A421548_1_En_7_Fig8_HTML.jpg)


    Figure 7-8. Default Target Server, updated


    Click `Next` when you are ready to move on. You are then shown Figure 7-9, which
    says that we are ready to install.


    ![A421548_1_En_7_Fig9_HTML.jpg](A421548_1_En_7_Fig9_HTML.jpg)


    Figure 7-9. Ready to Install


    If you need to make any changes, click `Back` and take care of them; otherwise,
    click `Install`.


    `Report Builder` is a fairly small installation, so it loads fairly quickly. Figure
    7-10 shows the completed installation screen, which you should see at this point.


    ![A421548_1_En_7_Fig10_HTML.jpg](A421548_1_En_7_Fig10_HTML.jpg)


    Figure 7-10. Completed installation


    Click `Finish` and you’re done. Now that we’ve got `Report Builder` installed,
    click `Report Builder` in your Start menu. You should initially see what is shown
    in Figure 7-11.


    ![A421548_1_En_7_Fig11_HTML.jpg](A421548_1_En_7_Fig11_HTML.jpg)


    Figure 7-11. Report Builder splash screen


    Eventually, the interface loads and we see that `Report Builder` is authenticating
    to the `SQL2016RS` instance we specified earlier. This is shown in Figure 7-12.


    ![A421548_1_En_7_Fig12_HTML.jpg](A421548_1_En_7_Fig12_HTML.jpg)


    Figure 7-12. Report Builder login interface


    It takes a minute to load because it has to authenticate to the Report Server
    specified during setup. Take a quick look at the bottom-left corner of the initial
    login interface. I’ve shown this in Figure 7-13 zoomed in so we can see it.


    ![A421548_1_En_7_Fig13_HTML.jpg](A421548_1_En_7_Fig13_HTML.jpg)


    Figure 7-13. Report Server detail


    This quick reference section tells us right away which instance we are connected
    to. It gives us the opportunity to disconnect from this instance and either reconnect
    this same instance or connect to another `SQL Server Reporting Services` instance,
    if we like.'
