    Dejaynes），她在本书写作期间离世。 我爱你，我想念你，我们终会再见。


    ## 引言


    为了避免听起来像个彻头彻尾的微软粉丝，我得说 SQL Server 2016 加入了一些非常酷的新功能。其中最重要的之一，便是整合了一个在业界广泛使用的海量数据分析工具。这个工具简单地被称为
    R。你们中有些人可能会问，微软为何要加入这个工具，因为它本质上更像是一个分析或绘图工具，而非数据库工具。


    我认为原因相当简单：微软正在扩大其影响力。在我看来，R 是实现这一目标的一个绝佳方式。将 R 工具作为 Visual Studio 工具集和 SQL Server
    数据库实例的一部分，无疑将改变 SQL Server 开发的格局。过去，数据库开发者需要准备数据以便由某些服务进行分析；现在不再需要了。Visual Studio
    的 R 工具允许用户直接在 Visual Studio 中准备其脚本，或者直接在 SQL Server Management Studio 中操作。尽管微软不推荐后一种方式，但它仍然是可行的。


    ### 我们将涵盖的内容


    本书涵盖的内容相当简单明了。我们将……


    *   在 SQL Server 2016 上设置一个新实例

    *   设置必要的 R 资源，以便正确创建、使用和执行 R

    *   简要回顾 R 的历史、语法和函数

    *   使用 Visual Studio 的 R 工具创建一个自定义的 R 解决方案

    *   配置 SQL Server Reporting Services

    *   安装并配置 Report Builder

    *   基于在 Visual Studio R 工具中开发的 R 代码，在 Report Builder 中创建报表

    *   通过 Reporting Services 使用这些报表


    此时有几点需要注意。具体来说，…


    *   Visual Studio 的 R 工具是一个全新的发布版本，因此它存在缺陷的可能性相当大。

    *   我们是作为全新实例完全安装 SQL Server 2016 的，因为我想展示即使用户尚未完全信服 R 的好处，通过将 R 纳入其工作流程也能获得的优势。


    安装和配置在 SQL Server 2016 中运行 R 所需的一切组件，其说明都涵盖在 MSDN 上。目前，相关资源的链接位于 [`https://msdn.microsoft.com/en-us/library/mt604883.aspx`](https://msdn.microsoft.com/en-us/library/mt604883.aspx)。请注意，微软可能不会永久保留这个链接，所以请记住
    Google 是你的好帮手。我将解释使其启动并运行所需的步骤。至于在 Microsoft.com 上查找必要的工具，可能就需要你自己动手了。'
- fmt: "### Why R?\n\nGood question. Why R? The answer is actually quite simple… I\
    \ think because Microsoft wants to expand their reach into the data science field\
    \ with `SQL Server`, so it makes sense that they would want the best product out\
    \ there for data analysis, which is arguably `R`. Microsoft’s Business Intelligence\
    \ offerings are already extremely sharp, so if they could find a way to …\n\n\
    *   Acquire a data analysis product already in heavy usage\n*   Incorporate that\
    \ product into their existing database platform\n*   Offer a GUI which integrates\
    \ seamlessly into `Visual Studio`\n*   Make it all available for free\n\n… then\
    \ the (data analysis) world would be their oyster! To my knowledge, there isn’t\
    \ any other database system that will allow for such complete interaction with\
    \ `R`. There are plenty of instances where data is prepared in a database and\
    \ then imported to `R`, but this is a totally different level of interaction.\n\
    \n`SQL Server 2016` actually runs an instance of the `R engine` as native to the\
    \ database engine. Fascinating! For those of you that have worked with `SQL Server`\
    \ when they radically changed to `SQL Server 2005`, you remember the shock of\
    \ `Integration Services` and “what happened to my `DTS` scripts??” This is on\
    \ that same sort of level; for those intrigued by data analysis or business intelligence,\
    \ the implications of the addition of `R` are guaranteed to be long-reaching and\
    \ will most certainly result in some amazing advancements in data science. I,\
    \ for one, can’t wait to be a part of that.\n\nAlso, just to get this out of the\
    \ way…\n\n```text\nThe MIT License (MIT)\nCopyright (c) 2016 Microsoft\nPermission\
    \ is hereby granted, free of charge, to any person obtaining a copy of this software\
    \ and associated documentation files (the \"Software\"), to deal in the Software\
    \ without restriction, including without limitation the rights to use, copy, modify,\
    \ merge, publish, distribute, sublicense, and/or sell copies of the Software,\
    \ and to permit persons to whom the Software is furnished to do so, subject to\
    \ the following conditions:\nThe above copyright notice and this permission notice\
    \ shall be included in all copies or substantial portions of the Software.\nTHE\
    \ SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\nIMPLIED,\
    \ INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS FOR\
    \ A\nPARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE\nAUTHORS OR\
    \ COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER\nLIABILITY, WHETHER\
    \ IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,\nOUT OF OR IN CONNECTION\
    \ WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.\n```\n\nIn other\
    \ words, thank you, Microsoft, for letting me use a whole lot of your stuff! I\
    \ really appreciate it.\n\nIf you read my first book, `Practical Maintenance Plans\
    \ in SQL Server (Apress, 2016)`, then you are already familiar with my writing\
    \ style. I tend to try and keep the mood a bit light and sometimes quirky, without\
    \ sacrificing technical content. At times, I might divert down a rabbit hole,\
    \ but I always have a point at the end. Most of the time, it might take me a while\
    \ to get there, but I do eventually get there in the end.\n\nRight now—before\
    \ we get into installing and setting up our environment—is a great time for you\
    \ to take a few minutes to get familiar with `R` and what it can do.\n\nOnce you’ve\
    \ done that, let’s begin our journey as data scientists!\n\n## Acknowledgments\n\
    \nAnother big thanks to both Jonathan Gennick and Jill Balzano for guiding me\
    \ through the process of getting this book published. You guys are awesome.\n\n\
    To my first mentor once again, John Wysocki, who is currently enjoying semi-retirement\
    \ in some lavish resort somewhere: I can’t thank you enough for stoking the fire\
    \ of creativity in me.\n\nTo my newest mentor, Suzy Moore, who is hands down the\
    \ smartest person I know: I can’t wait to learn more from you.\n\nTo the one and\
    \ only Chester Flake: Thank you for your guidance on certifications. Anyone needing\
    \ any sort of certification training needs to go to [`www.certificationcamps.com`](http://www.certificationcamps.com)\
    \ and sign up today. You won’t be sorry.\n\nTo my brother Brian, niece Holly,\
    \ sister-in-law Andie, and Drew, Austin, and Sam: Mom said no fireworks past 10:00\
    \ PM!\n\nTo my parents Richard and Carolyn, my in-laws Steve and Carey, my out-laws\
    \ Al and Val, other brothers Joe, Rick, Zimmer, and Dave, and other sisters Morgan,\
    \ Erika, Jennifer, Kim, and Michelle, and everyone else I forgot…. Well, you know\
    \ me . . . .\n\nAnd finally, to my wife, Jessica, and kids—Josh, Kaylee, Matthew,\
    \ and Emma, who had to deal with me leaving for hours on end while writing this\
    \ book: Thank you so much.\n\nOh, yeah…. I can’t forget my best fraaaaaaaand Courtney.\
    \ She’s such a little cutie patootie!!\n\n## Contents\n\n### Part I: Setup and\
    \ Installation\n\n#### Chapter 1: Setup and Installation of SQL Server 2016\n\n\
