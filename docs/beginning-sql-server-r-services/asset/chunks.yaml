    因此，我们也可以通过在 Variable Explorer 中双击 `coefficients` 列来查看相同的数据，如图 [4-33](#A421548_1_En_4_Chapter.html#Fig33)
    所示。


    ![A421548_1_En_4_Fig33_HTML.jpg](A421548_1_En_4_Fig33_HTML.jpg)

