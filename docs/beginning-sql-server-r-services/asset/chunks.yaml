- fmt: '### Caching


    The Caching section allows you to choose whether or not you want your reports
    cached. Figure [9-20](#A421548_1_En_9_Chapter.html#Fig20) shows the initial interface
    for the Caching section.


    ![A421548_1_En_9_Fig20_HTML.jpg](A421548_1_En_9_Fig20_HTML.jpg)


    Figure 9-20. Caching interface


    Personally, I would choose the `Always run this report with the most recent data`
    option, just in case the report is run out of sequence or outside of the normal
    scheduled run (in the case of a subscription). There are instances where the `Cache
    copies of this report and use them when available` option would be a better option;
    for instance, if this were strictly a subscription-based server and there were
    no contingencies for users to run reports at their leisure, then it would make
    sense to generate the report once and then the server can serve the cached copy
    of the report when requested. The last option, `Always run this report against
    pregenerated snapshots`, means that the report is generated from a specific point
    in time, referred to as a snapshot, which is discussed in the next section.


    ### History Snapshots


    This section allows you to generate snapshots of the report. This enables the
    option discussed earlier to become available in this context. Clicking the `New
    history snapshot` button shown in Figure [9-21](#A421548_1_En_9_Chapter.html#Fig21)
    creates a snapshot of the report based on data from the current date and time.


    ![A421548_1_En_9_Fig21_HTML.jpg](A421548_1_En_9_Fig21_HTML.jpg)


    Figure 9-21. History snapshots


    Referring back to the Caching section, if you were then to select the `Always
    run this report against pregenerated snapshots` option after generating a snapshot,
    then any subsequent reports generated would be run against this snapshot.


    Note: If you created a snapshot at this point, go ahead and delete it unless you
    are planning on using it in the future.


    ### Security


    The Security section allows you to customize your users and roles. The `Group
    or user` information comes from the Windows subsystem. The `Roles` are based in
    SQL Server Reporting Services.


    ![A421548_1_En_9_Fig22_HTML.jpg](A421548_1_En_9_Fig22_HTML.jpg)


    Figure 9-22. Security options


    Note that we don’t need to change anything here either.


    ## Saving Reports


    Apart from subscriptions, there is still a way to save a generated report in Reporting
    Services. To do this, just run the report by clicking the name of the report on
    the Home screen, as shown in Figure [9-23](#A421548_1_En_9_Chapter.html#Fig23).


    ![A421548_1_En_9_Fig23_HTML.jpg](A421548_1_En_9_Fig23_HTML.jpg)


    Figure 9-23. Home screen


    This opens the report that we have seen before. Figure [9-24](#A421548_1_En_9_Chapter.html#Fig24)
    shows the Save dialog, which is shown by clicking the disk icon in the report
    toolbar.


    ![A421548_1_En_9_Fig24_HTML.jpg](A421548_1_En_9_Fig24_HTML.jpg)


    Figure 9-24. Save options


    So again, we have the same render options as we did when we configured the E-mail
    settings earlier. You can save the report in any format you wish at this point.


    And with that, we are done.


    ## Summary


    Congratulations! We have reached the end of this journey into the beginnings of
    data science. Understand that this is just the very tip of the iceberg as far
    as what R can do. In no way is this book everything that you ever need to know
    about the language in order to function in an R environment. Quite the opposite,
    in fact; the purpose of this book is to introduce you into the now-blended world
    of R and SQL Server, in hopes that you continue your journey of discovery, if
    you haven’t already. I encourage you to press onward and make future versions
    of SQL Server R Services even better through greater community involvement.


    Until the next time, thank you so much for taking the time to read this book.
    I hope you enjoyed reading this book as much as I enjoyed writing it!


    # Part IV Appendices


    # Installing a SQL Server 2016 Instance in a SQL Server 2014 Installation


    These instructions closely follow the instructions in Chapter [1](#A421548_1_En_1_Chapter.html),
    but instead of installing an instance of SQL Server 2016 on a server by itself,
    we install an instance of SQL Server 2016 on an existing SQL Server 2014 installation.


    We are also not going to install absolutely everything like we did in Chapter
    [1](#A421548_1_En_1_Chapter.html) either. Instead, we are only installing `R Services`,
    the SQL Server 2016 database engine, and SQL Server 2016 Reporting Services. We
    need Reporting Services to provide us with the R content later on.


    If you choose to install SQL Server 2016 on top of SQL Server 2014, understand
    that there are implications to this, such as relying on older versions of Analysis
    Services or Integration Services. If you are okay with this, then that is why
    this Appendix was created.


    ## Getting Started


    Let’s begin the install. Double-click the `setup.exe` file in the download folder.
    You should see Figure [A-1](#A421548_1_En_10_Chapter.html#Fig1).


    ![A421548_1_En_10_Fig1_HTML.jpg](A421548_1_En_10_Fig1_HTML.jpg)


    Figure A-1. Initial SQL Server 2016 installation screen


    If you see the screen asking to make changes to your system, go ahead and click
    Yes.


    Figure [A-1](#A421548_1_En_10_Chapter.html#Fig1) shows the first screen that you
    should see when you start installation. This screen should look pretty familiar
    to you. Click the `Installation` link on the left to see what is shown in Figure
    [A-2](#A421548_1_En_10_Chapter.html#Fig2).


    ![A421548_1_En_10_Fig2_HTML.jpg](A421548_1_En_10_Fig2_HTML.jpg)


    Figure A-2. SQL Server 2016 Installation options


    Once here, click the `New SQL Server stand-alone installation or add features
    to an existing installation` link at the top.


    Note that the very bottom option is something new. It says `New R Server (Standalone)
    installation`. You would select this option if you only wanted to install R Server
    as either a server (standalone, self-contained data analysis server, in other
    words) or a client (manipulating data from a remote SQL Server R Services installation).
    Note that you need the SQL Server 2016 services running as well, so this would
    be to add R services to an existing SQL Server 2016 installation. It cannot be
    added to previous versions of SQL Server, in other words.


    ## Product Key


    Now it’s time to enter a product key, or to choose to install the free edition
    of the product. In other words, if you happen to have a licensed copy of SQL Server,
    you would have gotten a 25-character license key, so you can enter that here.
    Otherwise, you can always select a free edition. The purpose of this book is for
    evaluation purposes, so go ahead and pick `Evaluation` from the drop-down menu.
    Figure [A-3](#A421548_1_En_10_Chapter.html#Fig3) shows the screen you see after
    continuing from Figure [A-2](#A421548_1_En_10_Chapter.html#Fig2) in a stand-alone
    install process.


    ![A421548_1_En_10_Fig3_HTML.jpg](A421548_1_En_10_Fig3_HTML.jpg)


    Figure A-3. Product Key screen


    SQL Server 2016 can be installed in one of three free editions:


    - `Evaluation`: A full set of features, basically the Enterprise version of SQL
    Server 2016, but only good for 180-day spans.

    - `Developer`: A full set of features, but cannot be used for production database
    work.

    - `Express`: The smallest, bare-bones installation of SQL Server 2016 that does
    not expire and can be used for production use.


    If you would like to choose an option other than `Evaluation`, go right ahead.
    Just understand the implications of choosing that option. For what we need, the
    `Evaluation` version is perfect because we will decide certainly within 180 days
    if this new functionality is something we want to permanently include in our SQL
    Server installation.


    When you have chosen the version you are most comfortable with, click `Next` to
    continue.'
  raw: '### Caching


    The Caching section allows you to choose whether or not you want your reports
    cached or not. Figure [9-20](#A421548_1_En_9_Chapter.html#Fig20) shows the initial
    interface for the Caching section.


    ![A421548_1_En_9_Fig20_HTML.jpg](A421548_1_En_9_Fig20_HTML.jpg)


    Figure 9-20.


    Caching interface


    Personally, I would choose the Always run this report with the most recent data
    option, just in case the report is run out of sequence or outside of the normal
    scheduled run (in the case of a subscription). There are instances where the Cache
    copies of this report and use them when available option would be a better option;
    for instance, if this were strictly a subscription-based server and there were
    no contingencies for users to run reports at their leisure, then it would make
    sense to generate the report once and then server can serve the cached copy of
    the report when requested. The last option, Always run this report against pregenerated
    snapshots, means that the report is generated from a specific point in time, referred
    to as a snapshot, which is discussed in the next section.


    ### History Snapshots


    This section allows you to generate snapshots of the report. This enables the
    option discussed earlier to become in this context. Clicking the New history snapshot
    button shown in Figure [9-21](#A421548_1_En_9_Chapter.html#Fig21) creates a snapshot
    of the report based on data from the current date and time.


    ![A421548_1_En_9_Fig21_HTML.jpg](A421548_1_En_9_Fig21_HTML.jpg)


    Figure 9-21.


    History snapshots


    Referring back to the Caching section, if you were then to select the Always run
    this report against pregenerated snapshots option after generating a snapshot,
    then any subsequent reports generated would be run against this snapshot.


    Note


    If you created a snapshot at this point, go ahead and delete it unless you are
    planning on using it in the future.


    ### Security


    The Security section allows you to customize your users and roles. The Group or
    user information comes from the Windows subsystem. The Roles are based in SQL
    Server Reporting Services.


    ![A421548_1_En_9_Fig22_HTML.jpg](A421548_1_En_9_Fig22_HTML.jpg)


    Figure 9-22.


    Security options


    Note that we don’t need to change anything here either.


    ## Saving Reports


    Apart from subscriptions, there is still a way to save a generated report in Reporting
    Services. To do this, just run the report by clicking the name of the report on
    the Home screen, as shown in Figure [9-23](#A421548_1_En_9_Chapter.html#Fig23).


    ![A421548_1_En_9_Fig23_HTML.jpg](A421548_1_En_9_Fig23_HTML.jpg)


    Figure 9-23.


    Home screen


    This opens the report that we have seen before. Figure [9-24](#A421548_1_En_9_Chapter.html#Fig24)
    shows the Save dialog, which is shown by clicking the disk icon in the report
    toolbar.


    ![A421548_1_En_9_Fig24_HTML.jpg](A421548_1_En_9_Fig24_HTML.jpg)


    Figure 9-24.


    Save options


    So again, we have the same render options as we did when we configured the E-mail
    settings earlier. You can save the report in any format you wish, at this point.


    And with that, we are done.


    ## Summary


    Congratulations! We have reached the end of this journey into the beginnings of
    data science. Understand that this is just the very tip of the iceberg as far
    as what R can do. In no way is this book everything that you ever need to know
    about the language in order to function in an R environment. Quite the opposite,
    in fact; the purpose of this book is to introduce you into the now-blended world
    of R and SQL Server, in hopes that you continue your journey of discovery, if
    you haven’t already. I encourage you to press onward and make future versions
    of SQL Server R Services even better through greater community involvement.


    Until the next time, thank you so much for taking the time to read this book.
    I hope you enjoyed reading this book as much as I enjoyed writing it!


    # Part IV

    Appendices


    # Installing a SQL Server 2016 Instance in a SQL Server 2014 Installation


    These instructions closely follow the instructions in Chapter [1](#A421548_1_En_1_Chapter.html),
    but instead of installing an instance of SQL Server 2016 on a server by itself,
    we install an instance of SQL Server 2016 on an existing SQL Server 2014 installation.


    We are also not going to install absolutely everything like we did in Chapter
    [1](#A421548_1_En_1_Chapter.html) either. Instead, we are only installing R Services,
    the SQL Server 2016 database engine, and SQL Server 2016 Reporting Services. We
    need Reporting Services to provide us with the R content later on.


    If you choose to install SQL Server 2016 on top of SQL Server 2014, understand
    that there are implications to this, such as relying on older versions of Analysis
    Services or Integration Services. If you are okay with this, then that is why
    this Appendix was created.


    ## Getting Started


    Let’s begin the install. Double-click the setup.exe file in the download folder.
    You should see Figure [A-1](#A421548_1_En_10_Chapter.html#Fig1).


    ![A421548_1_En_10_Fig1_HTML.jpg](A421548_1_En_10_Fig1_HTML.jpg)


    Figure A-1.


    Initial SQL Server 2016 installation screen


    If you see the screen asking to make changes to your system, go ahead and click
    Yes.


    Figure [A-1](#A421548_1_En_10_Chapter.html#Fig1) shows the first screen that you
    should see when you start installation.


    This screen should look pretty familiar to you. Click the Installation link on
    the left to see what is shown in Figure [A-2](#A421548_1_En_10_Chapter.html#Fig2).


    ![A421548_1_En_10_Fig2_HTML.jpg](A421548_1_En_10_Fig2_HTML.jpg)


    Figure A-2.


    SQL Server 2016 Installation options


    Once here, click the New SQL Server stand-alone installation or add features to
    an existing installation link at the top.


    Note that the very bottom option is something new. It says New R Server (Standalone)
    installation. You would select this option if you only wanted to install R Server
    as either a server (standalone, self-contained data analysis server, in other
    words) or a client (manipulating data from a remote SQL Server R Services installation).
    Note that you need the SQL Server 2016 services running as well, so this would
    be to add R services to an existing SQL Server 2016 installation. It cannot be
    added to previous versions of SQL Server, in other words.


    ## Product Key


    Now it’s time to enter a product key , or to choose to install the free edition
    of the product. In other words, if you happen to have a licensed copy of SQL Server,
    you would have gotten a 25-character license key, so you can enter that here.
    Otherwise, you can always select a free edition. The purpose of this book is for
    evaluation purposes, so go ahead and pick Evaluation from the drop-down menu.
    Figure [A-3](#A421548_1_En_10_Chapter.html#Fig3) shows the screen you see after
    continuing from Figure [A-2](#A421548_1_En_10_Chapter.html#Fig2) in a stand-alone
    install process.


    ![A421548_1_En_10_Fig3_HTML.jpg](A421548_1_En_10_Fig3_HTML.jpg)


    Figure A-3.


    Product Key screen


    SQL Server 2016 can be installed in one of three free editions:


    *   Evaluation: A full set of features, basically the Enterprise version of SQL
    Server 2016, but only good for 180-day spans.

    *   Developer: A full set of features, but cannot be used for production database
    work.

    *   Express: The smallest, bare-bones installation of SQL Server 2016 that does
    not expire and can be used for production use.


    If you would like to choose an option other than Evaluation, go right ahead. Just
    understand the implications of choosing that option. For what we need, the Evaluation
    version is perfect because we will decide certainly within 180 days if this new
    functionality is something we want to permanently include in our SQL Server installation.


    When you have chosen the version you are most comfortable with, click Next to
    continue.'
  trans: '### 缓存


    “缓存”部分允许您选择是否要缓存您的报表。图 9-20 显示了“缓存”部分的初始界面。


    ![A421548_1_En_9_Fig20_HTML.jpg](img/A421548_1_En_9_Fig20_HTML.jpg)


    图 9-20. 缓存界面


    我个人会选择 `始终使用最新数据运行此报表` 选项，以防报表未按顺序运行或在正常计划运行时间之外运行（对于订阅而言）。在某些情况下，`缓存此报表的副本并在可用时使用它们`
    选项可能是更好的选择；例如，如果这严格来说是一个基于订阅的服务器，并且没有允许用户随意运行报表的应急方案，那么生成一次报表，然后服务器在收到请求时提供缓存的报表副本是合理的。最后一个选项
    `始终针对预生成的快照运行此报表`，意味着报表是从一个特定时间点生成的，该时间点称为快照，这将在下一节中讨论。


    ### 历史快照


    此部分允许您生成报表的快照。这使得前面讨论的选项在此上下文中可用。点击图 9-21 中所示的 `新建历史快照` 按钮，会基于当前日期和时间的数据创建报表的快照。


    ![A421548_1_En_9_Fig21_HTML.jpg](img/A421548_1_En_9_Fig21_HTML.jpg)


    图 9-21. 历史快照


    回顾“缓存”部分，如果您在生成快照后选择 `始终针对预生成的快照运行此报表` 选项，那么随后生成的任何报表都将基于此快照运行。


    注意：如果您在此处创建了快照，请继续删除它，除非您计划将来使用它。


    ### 安全性


    “安全性”部分允许您自定义用户和角色。`组或用户` 信息来自 Windows 子系统。`角色` 基于 SQL Server Reporting Services。


    ![A421548_1_En_9_Fig22_HTML.jpg](img/A421548_1_En_9_Fig22_HTML.jpg)


    图 9-22. 安全性选项


    请注意，我们同样不需要在此处更改任何内容。


    ## 保存报表


    除了订阅之外，还有另一种方法可以在 Reporting Services 中保存已生成的报表。为此，只需在主屏幕上点击报表的名称来运行报表，如图 9-23
    所示。


    ![A421548_1_En_9_Fig23_HTML.jpg](img/A421548_1_En_9_Fig23_HTML.jpg)


    图 9-23. 主屏幕


    这将打开我们之前见过的报表。图 9-24 显示了“保存”对话框，通过点击报表工具栏中的磁盘图标调出。


    ![A421548_1_En_9_Fig24_HTML.jpg](img/A421548_1_En_9_Fig24_HTML.jpg)


    图 9-24. 保存选项


    因此，再次说明，我们拥有与之前配置电子邮件设置时相同的呈现选项。此时，您可以将报表保存为任何您希望的格式。


    至此，我们就完成了。


    ## 总结


    恭喜！我们已完成了这段数据科学入门之旅。请理解，就 R 所能实现的功能而言，这仅仅是冰山一角。这本书远非您在 R 环境中工作所需了解的全部知识；恰恰相反，本书旨在将您引入
    R 与 SQL Server 融合的当下世界，如果您尚未开始，希望您能继续您的探索之旅。我鼓励您继续前进，并通过更广泛的社区参与，让未来版本的 SQL Server
    R Services 变得更好。


    下次再见，非常感谢您花时间阅读本书。希望您阅读本书的乐趣与我撰写本书的乐趣一样多！


    # 第四部分 附录


    # 在 SQL Server 2014 安装中安装 SQL Server 2016 实例


    这些说明与第 1 章中的说明非常相似，但我们不是在一台服务器上单独安装 SQL Server 2016 实例，而是在现有的 SQL Server 2014
    安装之上安装一个 SQL Server 2016 实例。


    我们也不会像第 1 章那样安装所有组件。相反，我们只安装 `R Services`、SQL Server 2016 数据库引擎和 SQL Server 2016
    Reporting Services。我们需要 Reporting Services 以便后续为我们提供 R 内容。


    如果您选择在 SQL Server 2014 之上安装 SQL Server 2016，请理解这会带来一些影响，例如依赖旧版本的 Analysis Services
    或 Integration Services。如果您可以接受这一点，那么这就是创建此附录的原因。


    ## 开始


    让我们开始安装。双击下载文件夹中的 `setup.exe` 文件。您应该会看到图 A-1。


    ![A421548_1_En_10_Fig1_HTML.jpg](img/A421548_1_En_10_Fig1_HTML.jpg)


    图 A-1. SQL Server 2016 初始安装屏幕


    如果看到要求对系统进行更改的屏幕，请点击“是”。


    图 A-1 显示了您启动安装后应该看到的第一个屏幕。这个屏幕对您来说应该相当熟悉。点击左侧的 `安装` 链接，查看图 A-2 所示的内容。


    ![A421548_1_En_10_Fig2_HTML.jpg](img/A421548_1_En_10_Fig2_HTML.jpg)


    图 A-2. SQL Server 2016 安装选项


    到达此处后，点击顶部的 `新建 SQL Server 独立安装或向现有安装添加功能` 链接。


    请注意，最底部的选项是新的。它写着 `新建 R 服务器（独立）安装`。如果您只想将 R Server 安装为服务器（独立的、自包含的数据分析服务器）或客户端（操作来自远程
    SQL Server R Services 安装的数据），则应选择此选项。请注意，您还需要 SQL Server 2016 服务正在运行，因此这相当于向现有的
    SQL Server 2016 安装添加 R 服务。换句话说，它不能添加到以前版本的 SQL Server。


    ## 产品密钥


    现在是输入产品密钥或选择安装产品的免费版本的时候了。换句话说，如果您碰巧拥有许可的 SQL Server 副本，您会获得一个 25 个字符的许可密钥，因此您可以在此处输入。否则，您始终可以选择免费版本。本书的目的是用于评估，因此请从下拉菜单中选择
    `Evaluation`。图 A-3 显示了在独立安装过程中从图 A-2 继续后您看到的屏幕。


    ![A421548_1_En_10_Fig3_HTML.jpg](img/A421548_1_En_10_Fig3_HTML.jpg)


    图 A-3. 产品密钥屏幕


    SQL Server 2016 可以安装在以下三种免费版本之一：


    - `Evaluation`：全套功能，基本上是 SQL Server 2016 的企业版，但有效期仅为 180 天。

    - `Developer`：全套功能，但不能用于生产数据库工作。

    - `Express`：最小的、最基本的 SQL Server 2016 安装，不会过期，可用于生产用途。


    如果您想选择 `Evaluation` 以外的选项，请直接选择。只需理解选择该选项的影响。对于我们所需的功能，`Evaluation` 版本是完美的，因为我们肯定会在
    180 天内决定是否要将此新功能永久包含在我们的 SQL Server 安装中。


    选择您最习惯的版本后，点击 `下一步` 继续。'
- fmt: '## License Terms


    下一个屏幕，如图 [A-4](#A421548_1_En_10_Chapter.html#Fig4) 所示，简单地要求你接受许可条款。


    ![A421548_1_En_10_Fig4_HTML.jpg](A421548_1_En_10_Fig4_HTML.jpg)


    图 A-4.


    许可条款


    说实话，我从来没有完整阅读过这份许可条款，我敢说我认识的人里也没有谁读过。显然，只需勾选“我接受许可条款”复选框，然后单击“下一步”继续。


    ## Install Rules


    我的屏幕闪烁了几次，最终停留在如图 [A-5](#A421548_1_En_10_Chapter.html#Fig5) 所示的屏幕上。


    ![A421548_1_En_10_Fig5_HTML.jpg](A421548_1_En_10_Fig5_HTML.jpg)


    图 A-5.


    安装规则


    值得注意的是，此步骤可能会下载并安装 SQL Server 2016 的更新；因此，如果出现相关提示信息，请直接安装它。


    除了我的 .NET 应用程序安全设置和防火墙规则外，其他一切看起来都很好。这应该没问题，所以我将单击“下一步”继续。


    ## Feature Selection


    现在进入正题。图 [A-6](#A421548_1_En_10_Chapter.html#Fig6) 显示了我们一直在等待的屏幕。


    ![A421548_1_En_10_Fig6_HTML.jpg](A421548_1_En_10_Fig6_HTML.jpg)


    图 A-6.


    功能选择


    此时，我们可以直接按“全选”就完事了。但如果你仔细查看选项，就会明白它们的含义。我们肯定要选择 `R Services (In-Database)`；否则，你就可以停止阅读本文了。选择该项后，我们会看到
    `Database Engine Services` 也被自动选中。我们还需要选择 `Reporting Services – Native`，我们将在第
    [7](#A421548_1_En_7_Chapter.html) 章中使用它。然而，除了这三项，我们不想选择其他任何内容。图 [A-7](#A421548_1_En_10_Chapter.html#Fig7)
    显示了此时你应该看到的选定项。


    ![A421548_1_En_10_Fig7_HTML.jpg](A421548_1_En_10_Fig7_HTML.jpg)


    图 A-7.


    选定选项后的功能选择


    请注意底部显示的默认实例根目录和共享功能目录都指向我的 E 盘。那是我存放 SQL Server 相关内容以便于检索的位置。


    在此处单击“下一步”继续。


    ## Instance Configuration


    系统会思考一小会儿，但最终，你会看到如图 [A-8](#A421548_1_En_10_Chapter.html#Fig8) 所示的“实例配置”屏幕。


    ![A421548_1_En_10_Fig8_HTML.jpg](A421548_1_En_10_Fig8_HTML.jpg)


    图 A-8.


    实例配置


    此时，我们需要定义新实例。如果查看“已安装的实例”部分，你会看到已经安装了一个 SQL Server 2014 版本。我们不想通过覆盖安装来破坏它，因此我们选择“命名实例”选项，并将其命名为
    `SQL2016RSVCS`，以代表 SQL Server 2016 R Services。


    请注意，此值与第 [1](#A421548_1_En_1_Chapter.html) 章中给出的实例名称不同。这是为了区分两个实例。


    为“命名实例”字段输入该值。你会看到如图 [A-9](#A421548_1_En_10_Chapter.html#Fig9) 所示的内容。


    ![A421548_1_En_10_Fig9_HTML.jpg](A421548_1_En_10_Fig9_HTML.jpg)


    图 A-9.


    更新后的实例配置屏幕


    请注意此屏幕上列出的“命名实例”字段、“实例 ID”字段、SQL Server 目录位置和 Reporting Services 目录位置。这些位置都需要引用
    `SQL2016RSVCS`。一旦你确信一切设置正确，请单击“下一步”继续。


    ## Server Configuration


    下一个屏幕是我们定义服务的服务账户和启动类型的地方。该屏幕如图 [A-10](#A421548_1_En_10_Chapter.html#Fig10) 所示。


    ![A421548_1_En_10_Fig10_HTML.jpg](A421548_1_En_10_Fig10_HTML.jpg)


    图 A-10.


    服务器配置


    以下是 SQL Server 2016 创建的服务账户：


    *   `NT Service\SQLAgent$SQL2016RSVCS`：启动和管理 SQL Server Agent 服务。

    *   `NT Service\MSSQL$SQL2016RSVCS`：启动和管理 SQL Server 服务。

    *   `NT Service\ReportServer$SQL2016RSVCS`：启动和管理 Reporting Services 服务。

    *   `NT Service\MSSQLLaunchpad$SQL2016RSVCS`：启动和管理 R Services 服务。


    SQL Browser 服务在“本地服务”上下文中运行，因此这不是新创建的服务账户。换句话说，我们不用 worry 关于那个。


    这些是默认服务，但如果你有自己的服务账户，总是可以更改为你自己的。如果你没有自己的服务账户，可以保留这些建议的服务账户。我认识许多服务器管理员，他们坚持对服务采用最小权限原则，如果这是你特定环境的情况，那么你需要从服务器管理员那里获取服务名称和登录信息才能继续。另一种方法是复制这些服务名称，并在给你的系统管理员的安装摘要中包含这些账户信息，以便系统管理员可以根据需要审计此用户的权限。这里需要重点注意的是，我在这里提到的“系统管理员”是一个独立的个人或实体，不是数据库管理员，而是
    Windows 级别的管理员。换句话说，是负责操作系统层、应用层之上一层的人。


    我们只想在这里更改一小部分；具体来说，将 `SQL Server Agent` 服务的“启动类型”设置为“自动”。这是我们需要做的唯一更改。图 [A-11](#A421548_1_En_10_Chapter.html#Fig11)
    显示了你此时应该看到的内容。


    ![A421548_1_En_10_Fig11_HTML.jpg](A421548_1_En_10_Fig11_HTML.jpg)


    图 A-11.


    更新后的服务器配置


    请注意，我们无法为这些账户中的任何一个设置密码。这与我见过的每个 SQL Server 安装都是一样的。如果你将“账户名”框从默认值更改为自定义的服务账户名称，那么“密码”框将被激活并接受输入；否则，密码由
    SQL Server 控制。


    还要注意，在默认列出的服务下方，有一个新的“向 SQL Server 数据库引擎服务授予‘执行卷维护任务’特权”复选框。对于我们在本书中所做的操作，勾选此框不是必需的。在未来的安装或生产环境中，启用此功能可能是个好主意。


    此时，我们所有的服务都设置为“自动”。请注意，我们不会去管“排序规则”选项卡。默认情况下，此选项卡应指定为 `SQL_Latin1_General_CP1_CI_AS`。就是这样。继续单击“下一步”继续。


    ## Database Engine Configuration


    下一个是图 [A-12](#A421548_1_En_10_Chapter.html#Fig12) 所示的“数据库引擎配置”屏幕。它允许你在四个不同的选项卡中为引擎设置选项。


    ![A421548_1_En_10_Fig12_HTML.jpg](A421548_1_En_10_Fig12_HTML.jpg)


    图 A-12.


    初始数据库引擎配置屏幕


    ### Server Configuration


    此选项卡允许你指定此数据库引擎实例的身份验证模式和管理员。由于这只是用于测试和评估，我将通过选择“Windows 身份验证模式”并单击屏幕底部的“添加当前用户”按钮，将我自己添加为管理员。图
    [A-13](#A421548_1_En_10_Chapter.html#Fig13) 显示了选定这些选项后的界面。


    ![A421548_1_En_10_Fig13_HTML.jpg](A421548_1_En_10_Fig13_HTML.jpg)


    图 A-13.


    选定选项后的服务器配置选项卡'
  raw: '## License Terms


    The next screen, shown in Figure [A-4](#A421548_1_En_10_Chapter.html#Fig4), simply
    asks you to accept the license terms.


    ![A421548_1_En_10_Fig4_HTML.jpg](A421548_1_En_10_Fig4_HTML.jpg)


    Figure A-4.


    License terms


    I honestly have never read this license all the way through and I can’t say that
    I know anyone who has. Obviously, just click the I accept the license terms check
    box and then Next to move on.


    ## Install Rules


    My screen flashed a few times and eventually ended up at the screen shown in Figure
    [A-5](#A421548_1_En_10_Chapter.html#Fig5).


    ![A421548_1_En_10_Fig5_HTML.jpg](A421548_1_En_10_Fig5_HTML.jpg)


    Figure A-5.


    Install Rules


    It’s worth noting that there could be an update to SQL Server 2016 that gets downloaded
    and installed during this step; so if a message comes up with that information,
    go ahead and install it.


    So everything looks good except for my .NET application security and firewall
    rule. This should be fine, so I’m going to click Next to continue.


    ## Feature Selection


    Now we get to it. Figure [A-6](#A421548_1_En_10_Chapter.html#Fig6) shows the screen
    we have been waiting for.


    ![A421548_1_En_10_Fig6_HTML.jpg](A421548_1_En_10_Fig6_HTML.jpg)


    Figure A-6.


    Feature Selection


    At this point, we could just press Select All and that would be it. If you take
    a look at the options though, you see what they actually mean. We definitely want
    to choose R Services (In-Database); otherwise, you can stop reading here. Once
    we choose that, we see that Database Engine Services also gets selected. We also
    want to select Reporting Services – Native, which we’ll use in Chapter [7](#A421548_1_En_7_Chapter.html).
    We don’t want to select anything except these three options, though. Figure [A-7](#A421548_1_En_10_Chapter.html#Fig7)
    shows what you should see selected at this point.


    ![A421548_1_En_10_Fig7_HTML.jpg](A421548_1_En_10_Fig7_HTML.jpg)


    Figure A-7.


    Feature Selection with options


    Notice how the bottom shows the default instance root directory and my shared
    feature directories are pointing to my E drive. That’s where I keep my SQL Server
    stuff for easy retrieval .


    Click Next here to move on.


    ## Instance Configuration


    It takes a second to think about what it wants to do, but eventually, you see
    the Instance Configuration screen shown in Figure [A-8](#A421548_1_En_10_Chapter.html#Fig8).


    ![A421548_1_En_10_Fig8_HTML.jpg](A421548_1_En_10_Fig8_HTML.jpg)


    Figure A-8.


    Instance Configuration


    At this point, we need to define our new instance. If you look on the Installed
    Instances section, you see that there is already an installed version of SQL Server
    2014\. We don’t want to wipe that out by installing on top of it, so we choose
    the Named Instance option and call it SQL2016RSVCS for SQL Server 2016 R Services.


    Note that this value is different from the instance name given in Chapter [1](#A421548_1_En_1_Chapter.html).
    This is to differentiate between the two instances.


    Enter that value for the Named Instance field. You see what is shown in Figure
    [A-9](#A421548_1_En_10_Chapter.html#Fig9).


    ![A421548_1_En_10_Fig9_HTML.jpg](A421548_1_En_10_Fig9_HTML.jpg)


    Figure A-9.


    Updated Instance Configuration screen


    Pay attention to the Named Instance field, the Instance ID field, the SQL Server
    directory location, and the Reporting Services directory location listed on this
    screen. Those need to all have SQL2016RSVCS referenced in them. Once you are satisfied
    that everything is as it should be, click Next to continue.


    ## Server Configuration


    The next screen is where we define the service accounts and startup types for
    the services. That screen is shown in Figure [A-10](#A421548_1_En_10_Chapter.html#Fig10).


    ![A421548_1_En_10_Fig10_HTML.jpg](A421548_1_En_10_Fig10_HTML.jpg)


    Figure A-10.


    Server Configuration


    The following are the service accounts created by SQL Server 2016:


    *   NT Service\SQLAgent$SQL2016RSVCS: Starts and manages the SQL Server Agent
    service.

    *   NT Service\MSSQL$SQL2016RSVCS: Starts and manages the SQL Server service.

    *   NT Service\ReportServer$SQL2016RSVCS: Starts and manages the Reporting Services
    service.

    *   NT Service\MSSQLLaunchpad$SQL2016RSVCS: Starts and manages the R Services
    service.


    The SQL Browser service is running under the context of the Local Service, so
    that isn’t a new service account being created. We won’t worry about that one,
    in other words.


    These services are the default, but can always be changed to your own service
    accounts, if you have them. If you don’t have your own service accounts, you can
    keep these suggested service accounts. I know many server administrators that
    insist on employing the principal of least privilege for services, so if that
    is the case for your particular environment, then you need to get the service
    name and login information from the server administrator in order to proceed.
    Another way you can go about this is to copy these service names and include them
    in a summary to your system administrator regarding the accounts that were created
    during installation, so that the system administrator can audit the permissions
    for this user as needed. It is important to note here that I am referring to a
    separate individual or entity for “system administrator” that is not a database
    administrator, but rather the Windows-level administrator. The person in charge
    of the Operating System level, one step up from the Application layer, in other
    words.


    We only want to change a little bit here; specifically, set the SQL Server Agent
    service Startup Type to Automatic. That is the only change we need to make. Figure
    [A-11](#A421548_1_En_10_Chapter.html#Fig11) shows what you should see at this
    point .


    ![A421548_1_En_10_Fig11_HTML.jpg](A421548_1_En_10_Fig11_HTML.jpg)


    Figure A-11.


    Server Configuration updated


    Notice that we cannot set the password for any of these accounts. This is the
    same as it has been for every installation of SQL Server that I have ever seen.
    If you were to change the Account Name box from the default to a custom service
    account name, then the Password box would become active and accept input; otherwise,
    the password is controlled by SQL Server.


    Notice also that there is a new Grant Perform Volume Maintenance Task privilege
    to SQL Server Database Engine Service check box underneath the default services
    listed. For what we’re doing in this book, it’s not necessary to check this box.
    In future installations or for production environments, it would probably be a
    good idea to enable this.


    At this point, all of our services are set to Automatic. Notice that we aren’t
    going to bother with the Collation tab. This should have SQL_Latin1_General_CP1_CI_AS
    specified in the tab by default. That’s it. Go ahead and click Next to move on.


    ## Database Engine Configuration


    The next screen is the Database Engine Configuration screen shown in Figure [A-12](#A421548_1_En_10_Chapter.html#Fig12).
    It lets you set options for the engine in four different tabs.


    ![A421548_1_En_10_Fig12_HTML.jpg](A421548_1_En_10_Fig12_HTML.jpg)


    Figure A-12.


    Initial Database Engine Configuration screen


    ### Server Configuration


    This tab lets you specify the authentication mode and the administrators for this
    instance of the database engine. Because this is just for testing and evaluation,
    I am going to add myself in Windows Authentication Mode as the administrator by
    clicking the Add Current User button at the bottom of the screen with Windows
    Authentication Mode selected. Figure [A-13](#A421548_1_En_10_Chapter.html#Fig13)
    shows these options selected.


    ![A421548_1_En_10_Fig13_HTML.jpg](A421548_1_En_10_Fig13_HTML.jpg)


    Figure A-13.


    Server Configuration tab with options'
  trans: '

    ## 许可条款


    下一个屏幕，如图 A-4 所示，将要求你接受许可条款。


    ![A421548_1_En_10_Fig4_HTML.jpg](img/A421548_1_En_10_Fig4_HTML.jpg)


    图 A-4.


    许可条款


    说实话，我从未完整阅读过这份许可条款，我敢说我认识的人里也没有谁读过。显然，只需勾选“我接受许可条款”复选框，然后单击“下一步”继续。


