- fmt: '# 9. Viewing the Reports in Report Server


    Now that we have built the required reports in Report Builder, we can view them
    through the report server web portal. Later in this chapter, we get into other
    aspects of Report Server, but for now, let’s take a look at our reports.


    ## Viewing Reports


    Recall back in Chapter [6](#A421548_1_En_6_Chapter.html) when we set up the report
    server, we specified the URL as `http://bradlaptop:80/Reports_SQL2016RS`. Type
    your web portal address into your browser and click Enter. You should see something
    similar to what is shown in Figure [9-1](#A421548_1_En_9_Chapter.html#Fig1).


    ![A421548_1_En_9_Fig1_HTML.jpg](A421548_1_En_9_Fig1_HTML.jpg)

    Figure 9-1. Web portal


    Clicking the AverageWSbyID report on the left shows what you see in Figure [9-2](#A421548_1_En_9_Chapter.html#Fig2).


    ![A421548_1_En_9_Fig2_HTML.jpg](A421548_1_En_9_Fig2_HTML.jpg)

    Figure 9-2. Generated report


    The same happens when you click the AvgTempByID link on the home page. Figure
    [9-3](#A421548_1_En_9_Chapter.html#Fig3) shows this.


    ![A421548_1_En_9_Fig3_HTML.jpg](A421548_1_En_9_Fig3_HTML.jpg)

    Figure 9-3. Generated report


    So there you have it… a complete report using binary data to create images from
    original R code.


    ## Managing Reports


    With this release of Report Server, as with previous versions, there is the capability
    to manage the reports from the Report Server interface. Managing reports in Report
    Server requires that the user is an administrator (which we are, or should be)
    and belongs to the Content Manager group. The following security roles are available
    in Report Server:


    *   **Browser**: This role can view folders and reports in specified folders,
    and it can subscribe to reports. This role cannot create reports, though. This
    would be a regular read-only user role.

    *   **Content Manager**: This role manages the content in Report Server. This
    is the administrator account for Report Server and can do anything within the
    confines of Report Server.

    *   **My Reports**: This role can publish reports and manage user folders they
    are specifically designated to access. This would be a regular read/write “power
    user” account type.

    *   **Publisher**: This role can only publish reports and linked reports to Report
    Server. This would be a write-only user role.

    *   **Report Builder**: This role can manage and view the report definitions and
    attributes. This would be a role reserved for specific users that need to configure
    the reports, but don’t need to be full administrators (in the Content Manager
    role).


    Keep in mind that the Content Manager role can do anything we need in this instance,
    so the principal of least privilege is really overlooked here.


    Click the ellipse, as shown in Figure [9-4](#A421548_1_En_9_Chapter.html#Fig4).
    Select the Manage option from the pop-up menu.


    ![A421548_1_En_9_Fig4_HTML.jpg](A421548_1_En_9_Fig4_HTML.jpg)

    Figure 9-4. Manage menu


    A page appears, as shown in Figure [9-5](#A421548_1_En_9_Chapter.html#Fig5), which
    allows you to edit some of the properties of the report.


    ![A421548_1_En_9_Fig5_HTML.jpg](A421548_1_En_9_Fig5_HTML.jpg)

    Figure 9-5. Properties


    ## Report Body Properties


    Recall that the image we created was 800×600, so let’s update the style of the
    report. Right-click the gray area and choose Report Properties… from the menu.
    Figure [8-28](#A421548_1_En_8_Chapter.html#Fig28) shows this action.


    ![A421548_1_En_8_Fig28_HTML.jpg](A421548_1_En_8_Fig28_HTML.jpg)

    Figure 8-28. Report Properties location


    This opens up the interface shown in Figure [8-29](#A421548_1_En_8_Chapter.html#Fig29).


    ![A421548_1_En_8_Fig29_HTML.jpg](A421548_1_En_8_Fig29_HTML.jpg)

    Figure 8-29. Report Properties


    All that we need to do is change the Orientation value to Landscape and then click
    OK. We need to check the size of the page to adjust the image. A little experimenting
    shows that we want to be right around 9×5 for the stage dimensions (just click
    and drag them to that size) and the Figure [8-30](#A421548_1_En_8_Chapter.html#Fig30)
    shows what this should look like.


    ![A421548_1_En_8_Fig30_HTML.jpg](A421548_1_En_8_Fig30_HTML.jpg)

    Figure 8-30. Stage resizing


    I colored my footer blue with white text, but you can do whatever you want as
    far as styling to make this report your own.


    ## Running the Report


    Go ahead and click the Run button in the top-left corner. Get ready for a big
    surprise. Figure [8-31](#A421548_1_En_8_Chapter.html#Fig31) shows what you should
    see after this happens.


    ![A421548_1_En_8_Fig31_HTML.jpg](A421548_1_En_8_Fig31_HTML.jpg)

    Figure 8-31. Completed Report


    Not bad! Now click the Print Layout button in the menu bar. Figure [8-32](#A421548_1_En_8_Chapter.html#Fig32)
    shows this result.


    ![A421548_1_En_8_Fig32_HTML.jpg](A421548_1_En_8_Fig32_HTML.jpg)

    Figure 8-32. Print Layout view


    There it is, nicely laid out for us on one page, with our rendering time displayed
    in the blue footer.


    Click the Design button in the top-left corner and then click Ctrl+S to save the
    report. The default location and values are shown in Figure [8-33](#A421548_1_En_8_Chapter.html#Fig33).


    ![A421548_1_En_8_Fig33_HTML.jpg](A421548_1_En_8_Fig33_HTML.jpg)

    Figure 8-33. Default report location


    We can see that the default location is on our report server, so that’s perfect.
    Update the Name of the file to AverageWSbyID.rdl, as shown in Figure [8-34](#A421548_1_En_8_Chapter.html#Fig34).


    ![A421548_1_En_8_Fig34_HTML.jpg](A421548_1_En_8_Fig34_HTML.jpg)

    Figure 8-34. Updated name information


    Press the Save button here to save the report.


    This report is now saved to the report server. We will view it right after we
    get the other report going.


    ## Report 2: Average Temperature by Airport ID


    Watch how easy it is to create the second report. I hope that you are starting
    to see the flexibility that this technology gives you!


    Press Ctrl+N to open a new report (be sure to save the old one). You are immediately
    shown a blank report, just like before. You can also go to the File menu and choose
    New… to choose a different type.


    We need to essentially follow the exact same instructions as before, except this
    time, when we create the dataset, we need to change the `WHERE` clause to show
    where the UID is equal to 2 instead of 1. I am going to leave making that change
    as an exercise for you to complete on your own. It’s a trivial change to make.


    When you are done setting it up, your screen should look similar to Figure [8-35](#A421548_1_En_8_Chapter.html#Fig35).


    ![A421548_1_En_8_Fig35_HTML.jpg](A421548_1_En_8_Fig35_HTML.jpg)

    Figure 8-35. Average Temp report layout


    And your report should be very similar to what is shown in Figure [8-36](#A421548_1_En_8_Chapter.html#Fig36).


    ![A421548_1_En_8_Fig36_HTML.jpg](A421548_1_En_8_Fig36_HTML.jpg)

