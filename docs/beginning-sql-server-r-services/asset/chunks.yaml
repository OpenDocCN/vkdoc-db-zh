    Keep in mind that, if the customer only wanted flat-file reports (meaning just
    the data in CSV or XML format, for example) we could do that with a simple export
    of the data from SQL Server without interaction from SQL Server Reporting Services
    in the slightest. But the real point of this exercise is to show the power of
    R when integrated with SQL Server; so, using Report Builder, we’re going to incorporate
    those charts that we created in Chapter [5](#A421548_1_En_5_Chapter.html) into
    a slick-looking report. We can then deal with little things like formatting and
    such, but the most important part is making sure that the report can be built
    first.


    ## Download Report Builder


    To start this chapter off, we need to download Report Builder. The link for this
    is at [`https://www.microsoft.com/en-us/download/details.aspx?id=52674`](https://www.microsoft.com/en-us/download/details.aspx?id=52674)
    , but that could change. Google is your friend, remember.


    Tip


    You can also download Report Builder from the SQL Server Reporting Services Web
    Portal that we saw at the end of Chapter [6](#A421548_1_En_6_Chapter.html) by
    clicking the down arrow in the top-right corner.


    Figure [7-1](#A421548_1_En_7_Chapter.html#Fig1) shows the page where Report Builder
    can be downloaded. Note that this interface could change in the future, but the
    Download button should stay clearly visible.


    ![A421548_1_En_7_Fig1_HTML.jpg](A421548_1_En_7_Fig1_HTML.jpg)


    Figure 7-1.


    Report Builder download screen


    Click the button to download. You should see what is shown in Figure [7-2](#A421548_1_En_7_Chapter.html#Fig2).


    ![A421548_1_En_7_Fig2_HTML.jpg](A421548_1_En_7_Fig2_HTML.jpg)


    Figure 7-2.


    Download in progress


    A file called ReportBuilder3.msi is being downloaded in the background. Once the
    download gets done, you should be able to click it in the browser bar to begin
    the installation. If you don’t see the downloaded file here, just go to your Downloads
    folder and sort by date. The file will show up there.


    Figure [7-3](#A421548_1_En_7_Chapter.html#Fig3) shows the first screen that is
    shown for the installation.


    ![A421548_1_En_7_Fig3_HTML.jpg](A421548_1_En_7_Fig3_HTML.jpg)


    Figure 7-3.


    Microsoft SQL Server 2016 Report Builder Installation


    Obviously, we click Next to continue to the license terms shown in Figure [7-4](#A421548_1_En_7_Chapter.html#Fig4).


    ![A421548_1_En_7_Fig4_HTML.jpg](A421548_1_En_7_Fig4_HTML.jpg)


    Figure 7-4.


    License Agreement


    Click the I accept the terms in the license agreement radio button and then click
    Next.


    Next, we get to choose our features. Figure [7-5](#A421548_1_En_7_Chapter.html#Fig5)
    shows the default feature selection screen.


    ![A421548_1_En_7_Fig5_HTML.jpg](A421548_1_En_7_Fig5_HTML.jpg)


    Figure 7-5.


    Feature Selection


    We want to install everything for this, so pull down the menu on the disk in the
    white area. Choose Entire feature will be installed on local hard drive to continue.


    Figure [7-6](#A421548_1_En_7_Chapter.html#Fig6) shows the correct selection for
    this.


    ![A421548_1_En_7_Fig6_HTML.jpg](A421548_1_En_7_Fig6_HTML.jpg)


    Figure 7-6.


    Correct selection


    This makes sure that we have absolutely everything possible for Report Builder.
    When you’re ready, click Next to continue.


    We are now presented with an interface that asks for the Default Target Server,
    as shown in Figure [7-7](#A421548_1_En_7_Chapter.html#Fig7).


    ![A421548_1_En_7_Fig7_HTML.jpg](A421548_1_En_7_Fig7_HTML.jpg)


    Figure 7-7.


    Default Target Server


    The value that needs to be entered into Default target server URL (optional) is
    the value from the Web Service URL section of the Reporting Services Configuration
    Manager that we did in Chapter [6](#A421548_1_En_6_Chapter.html), which in my
    case is `http://bradlaptop/ReportServer_SQL2016RS`, so enter your own specific
    URL in the box. You should have something similar to what is shown in Figure [7-8](#A421548_1_En_7_Chapter.html#Fig8).


    ![A421548_1_En_7_Fig8_HTML.jpg](A421548_1_En_7_Fig8_HTML.jpg)


    Figure 7-8.


    Default Target Server, updated


    Click Next when you are ready to move on. You are then shown Figure [7-9](#A421548_1_En_7_Chapter.html#Fig9),
    which says that we are ready to install.


    ![A421548_1_En_7_Fig9_HTML.jpg](A421548_1_En_7_Fig9_HTML.jpg)


    Figure 7-9.


    Ready to Install


    If you need to make any changes, click Back and take care of them; otherwise,
    click Install.


    Report Builder is a fairly small installation, so it loads fairly quickly. Figure
    [7-10](#A421548_1_En_7_Chapter.html#Fig10) shows the completed installation screen,
    which you should see at this point.


    ![A421548_1_En_7_Fig10_HTML.jpg](A421548_1_En_7_Fig10_HTML.jpg)


    Figure 7-10.


    Completed installation


    Click Finish and you’re done. Now that we’ve got Report Builder installed, click
    Report Builder in your Start menu. You should initially see what is shown in Figure
    [7-11](#A421548_1_En_7_Chapter.html#Fig11).


    ![A421548_1_En_7_Fig11_HTML.jpg](A421548_1_En_7_Fig11_HTML.jpg)


    Figure 7-11.


    Report Builder splash screen


    Eventually, the interface loads and we see that Report Builder is authenticating
    to the `SQL2016RS` instance we specified earlier. This is shown in Figure [7-12](#A421548_1_En_7_Chapter.html#Fig12).


    ![A421548_1_En_7_Fig12_HTML.jpg](A421548_1_En_7_Fig12_HTML.jpg)


    Figure 7-12.


    Report Builder login interface


    It takes a minute to load because it has to authenticate to the Report Server
    specified during setup. Take a quick look at the bottom-left corner of the initial
    login interface. I’ve shown this in Figure [7-13](#A421548_1_En_7_Chapter.html#Fig13)
    zoomed in so we can see it.


    ![A421548_1_En_7_Fig13_HTML.jpg](A421548_1_En_7_Fig13_HTML.jpg)


    Figure 7-13.


    Report Server detail


    This quick reference section tells us right away which instance we are connected
    to. It gives us the opportunity to disconnect from this instance and either reconnect
    this same instance or connect to another SQL Server Reporting Services instance,
    if we like.'
  trans: '

    # 7. Report Builder 安装与数据准备


    既然我们已经安装了 `SQL Server Reporting Services`，接下来需要弄清楚如何根据软件需求文档中客户的要求创建并交付报表。创建报表的最佳方式很可能是使用
    `Report Builder`，这是微软提供的一个免费下载工具。而交付报表的最佳方式，显然就是使用 `SQL Server Reporting Services`
    的内置功能，正如我们在第 6 章中配置的那样。


    请记住，如果客户只需要扁平文件报表（即仅包含数据的文件，如 `CSV` 或 `XML` 格式），我们完全可以通过从 `SQL Server` 直接导出数据来实现，丝毫不需要
    `SQL Server Reporting Services` 的参与。但本练习的真正目的是展示 `R` 与 `SQL Server` 集成后的强大功能；因此，我们将使用
    `Report Builder`，把第 5 章中创建的图表整合到一份外观精美的报表中。之后，我们可以处理诸如格式调整之类的细节，但最重要的部分是确保报表能够首先成功构建。


    ## 下载 Report Builder


    本章开始，我们需要下载 `Report Builder`。下载链接在 [`https://www.microsoft.com/en-us/download/details.aspx?id=52674`](https://www.microsoft.com/en-us/download/details.aspx?id=52674)，但这个链接可能会有变化。记住，`Google`
    是你的好帮手。


    **提示**：你也可以从第 6 章末尾看到的 `SQL Server Reporting Services` Web 门户中下载 `Report Builder`，只需点击右上角的下箭头即可。


    图 7-1 展示了可以下载 `Report Builder` 的页面。请注意，此界面未来可能会变化，但 `下载` 按钮应该会保持清晰可见。


    ![A421548_1_En_7_Fig1_HTML.jpg](img/A421548_1_En_7_Fig1_HTML.jpg)


    图 7-1. Report Builder 下载界面


    点击按钮进行下载。你应该会看到如图 7-2 所示的内容。


    ![A421548_1_En_7_Fig2_HTML.jpg](img/A421548_1_En_7_Fig2_HTML.jpg)


    图 7-2. 下载进行中


    一个名为 `ReportBuilder3.msi` 的文件正在后台下载。下载完成后，你应该可以在浏览器栏中点击它来开始安装。如果在这里没有看到已下载的文件，只需转到你的“下载”文件夹并按日期排序，该文件就会出现在那里。


    图 7-3 显示了安装程序显示的第一个屏幕。


    ![A421548_1_En_7_Fig3_HTML.jpg](img/A421548_1_En_7_Fig3_HTML.jpg)


    图 7-3. Microsoft SQL Server 2016 Report Builder 安装


    显然，我们点击 `下一步` 继续，进入图 7-4 所示的许可条款页面。


    ![A421548_1_En_7_Fig4_HTML.jpg](img/A421548_1_En_7_Fig4_HTML.jpg)


    图 7-4. 许可协议


    点击 `我接受许可协议中的条款` 单选按钮，然后点击 `下一步`。


    接下来，我们选择要安装的功能。图 7-5 显示了默认的功能选择屏幕。


    ![A421548_1_En_7_Fig5_HTML.jpg](img/A421548_1_En_7_Fig5_HTML.jpg)


    图 7-5. 功能选择


    我们为此要安装所有功能，因此在白色区域的磁盘上拉下菜单。选择 `整个功能将安装在本地硬盘驱动器上` 继续。


    图 7-6 显示了此处的正确选择。


    ![A421548_1_En_7_Fig6_HTML.jpg](img/A421548_1_En_7_Fig6_HTML.jpg)


    图 7-6. 正确选择


    这确保我们拥有 `Report Builder` 绝对所有可能需要的内容。准备就绪后，点击 `下一步` 继续。


    现在，界面会要求我们输入 `默认目标服务器`，如图 7-7 所示。


    ![A421548_1_En_7_Fig7_HTML.jpg](img/A421548_1_En_7_Fig7_HTML.jpg)


    图 7-7. 默认目标服务器


    需要输入到 `默认目标服务器 URL（可选）` 框中的值，是我们在第 6 章中配置的 `Reporting Services 配置管理器` 的 `Web 服务
    URL` 部分的值，在我的例子中是 `http://bradlaptop/ReportServer_SQL2016RS`，所以请在框中输入你自己的具体 URL。你看到的应该与图
    7-8 所示类似。


    ![A421548_1_En_7_Fig8_HTML.jpg](img/A421548_1_En_7_Fig8_HTML.jpg)


    图 7-8. 已更新的默认目标服务器


    准备好继续后，点击 `下一步`。然后会显示图 7-9，表明我们已准备好安装。


    ![A421548_1_En_7_Fig9_HTML.jpg](img/A421548_1_En_7_Fig9_HTML.jpg)


    图 7-9. 准备安装


    如果需要做任何更改，请点击 `上一步` 进行修改；否则，点击 `安装`。


    `Report Builder` 是一个相当小的安装程序，因此加载得相当快。图 7-10 显示了此时你应看到的安装完成屏幕。


    ![A421548_1_En_7_Fig10_HTML.jpg](img/A421548_1_En_7_Fig10_HTML.jpg)


    图 7-10. 安装完成


    点击 `完成`，大功告成。既然我们已经安装了 `Report Builder`，请在开始菜单中点击 `Report Builder`。最初你应该看到如图 7-11
    所示的内容。


    ![A421548_1_En_7_Fig11_HTML.jpg](img/A421548_1_En_7_Fig11_HTML.jpg)


    图 7-11. Report Builder 启动画面


    最终，界面加载完成，我们看到 `Report Builder` 正在对之前指定的 `SQL2016RS` 实例进行身份验证。如图 7-12 所示。


    ![A421548_1_En_7_Fig12_HTML.jpg](img/A421548_1_En_7_Fig12_HTML.jpg)


    图 7-12. Report Builder 登录界面


    加载需要一点时间，因为它必须对安装过程中指定的报表服务器进行身份验证。快速看一下初始登录界面的左下角。我在图 7-13 中将其放大显示，以便我们看清楚。


    ![A421548_1_En_7_Fig13_HTML.jpg](img/A421548_1_En_7_Fig13_HTML.jpg)


    图 7-13. 报表服务器详情


    这个快速参考区域立即告诉我们连接到的是哪个实例。它让我们有机会断开与此实例的连接，然后可以重新连接同一个实例，或者，如果我们愿意，也可以连接到另一个 `SQL
    Server Reporting Services` 实例。

