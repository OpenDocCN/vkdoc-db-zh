- fmt: '## Generating the Binary Data


    Next, we want to figure out the stored procedure syntax that we need to use to
    get the binary data of the chart we need to produce. Borrowing heavily from the
    previous work we did with creating the charts earlier, we can deduce that it is
    probably similar to the following.


    ```

    EXEC sp_execute_external_script

    @language = N''R'',

    @script = N''

    library("ggplot2");

    img <- inputDataSet;

    image_file = tempfile();

    png(filename = image_file, width=800, height=600);

    print(ggplot(img, aes(x = AirportID, y = WindSpeed)) +

    labs(x = "Airport ID", y = "Wind Speed") +

    theme(axis.text.x = element_text(angle=90, hjust=1, vjust=0)) +

    geom_point(stat = "identity") +

    geom_smooth(method = "loess", aes(group = 1)) +

    geom_text(aes(label = AirportID), size = 3, vjust = 1.0) +

    geom_text(aes(label = round(WindSpeed, digits = 2)), size = 3, vjust = 2.0));

    dev.off();

    OutputDataset <- data.frame(data=readBin(file(image_file,"rb"),what=raw(),n=1e6));'',

    @input_data_1 = N''SELECT AirportID, AVG(CONVERT(float, WindSpeed)) as WindSpeed
    FROM [Weather_Sample] GROUP BY AirportID ORDER BY AirportID;'',

    @input_data_1_name = N''inputDataSet'',

    @output_data_1_name = N''OutputDataset''

    WITH RESULT SETS ((plot varbinary(max)));

    ```


    Note: We are generating a `PNG` image here, not a `JPG`. This will be important
    to remember once we dynamically generate these charts using Report Builder.


    Entering this into a new query window and executing it gives me a binary data
    result. Figure [7-32](#A421548_1_En_7_Chapter.html#Fig32) shows what you should
    see in SSMS at this point.


    ![A421548_1_En_7_Fig32_HTML.jpg](A421548_1_En_7_Fig32_HTML.jpg)


    Figure 7-32. Binary data


    Recall that we created a table to store our charts in. We are now going to insert
    this binary data into the table within the stored procedure by using the following
    code. Now, we just need to rewrite the stored procedure to automatically insert
    the data. Any idea how to do this? That’s right, we’re going to use `INSERT INTO
    ... EXEC`.


    So how do we build the query? It’s actually very easy. I’m sure some of you already
    know how this is done, but for those of us that don’t, it’s looks like this:


    ```

    INSERT INTO chartBinary (binData)

    EXEC sp_execute_external_script

    @language = N''R'',

    @script = N''

    library("ggplot2");

    img <- inputDataSet;

    image_file = tempfile();

    png(filename = image_file, width=800, height=600);

    print(ggplot(img, aes(x = AirportID, y = WindSpeed)) +

    labs(x = "Airport ID", y = "Wind Speed") +

    theme(axis.text.x = element_text(angle=90, hjust=1, vjust=0)) +

    geom_point(stat = "identity") +

    geom_smooth(method = "loess", aes(group = 1)) +

    geom_text(aes(label = AirportID), size = 3, vjust = 1.0) +

    geom_text(aes(label = round(WindSpeed, digits = 2)), size = 3, vjust = 2.0));

    dev.off();

    OutputDataset <- data.frame(data=readBin(file(image_file,"rb"),what=raw(),n=1e6));'',

    @input_data_1 = N''SELECT AirportID, AVG(CONVERT(float, WindSpeed)) as WindSpeed
    FROM [Weather_Sample] GROUP BY AirportID ORDER BY AirportID;'',

    @input_data_1_name = N''inputDataSet'',

    @output_data_1_name = N''OutputDataset'';

    ```


    That updated our `binData` column, but left our `title` column without a value.
    Since this is the first record in the table, the `UID` is set to 1; so make sure
    that your `WHERE` clause is set to specify that. To update the `title` value for
    this chart, run this `UPDATE` query after you run that first query.


    ```

    UPDATE chartBinary

    SET title = ''Average Wind Speed by Airport ID ''

    WHERE uid = 1

    ```


    That should do it. To verify, run the following query to view your data.


    ```

    SELECT title, binData FROM [dbo].[chartBinary] ORDER BY uid

    ```


    The results should be what you see in Figure [7-33](#A421548_1_En_7_Chapter.html#Fig33).


    ![A421548_1_En_7_Fig33_HTML.jpg](A421548_1_En_7_Fig33_HTML.jpg)


    Figure 7-33. Query results


    Next, we need to build the query for the other report, but this is actually quite
    easy since we’ve already done the hard work for it. The following code is what
    you need for this action.


    ```

    INSERT INTO chartBinary (binData)

    EXEC sp_execute_external_script

    @language = N''R'',

    @script = N''

    library("ggplot2");

    img <- inputDataSet;

    image_file = tempfile();

    png(filename = image_file, width=800, height=600);

    print(ggplot(img, aes(x = AirportID, y = Temperature)) +

    labs(x = "Airport ID", y = "Temperature") +

    theme(axis.text.x = element_text(angle=90, hjust=1, vjust=0)) +

    geom_point(stat = "identity") +

    geom_smooth(method = "loess", aes(group = 1)) +

    geom_text(aes(label = AirportID), size = 3, vjust = 1.0) +

    geom_text(aes(label = round(Temperature, digits = 2)), size = 3, vjust = 2.0));

    dev.off();

    OutputDataset <- data.frame(data=readBin(file(image_file,"rb"),what=raw(),n=1e6));'',

    @input_data_1 = N''SELECT AirportID, AVG(CONVERT(float, DryBulbFarenheit)) as
    Temperature FROM [Weather_Sample] GROUP BY AirportID ORDER BY AirportID;'',

    @input_data_1_name = N''inputDataSet'',

    @output_data_1_name = N''OutputDataset'';

    ```


    And once again, to set the `title` column:


    ```

    UPDATE chartBinary

    SET title = ''Average Temperature by Airport ID''

    WHERE uid = 2

    ```


    Run those two code blocks, and then run the following query to check and make
    sure that everything was inserted correctly.


    ```

    SELECT title, binData FROM [dbo].[chartBinary] ORDER BY uid

    ```


    At this point, you should see what is shown in Figure [7-34](#A421548_1_En_7_Chapter.html#Fig34).


    ![A421548_1_En_7_Fig34_HTML.jpg](A421548_1_En_7_Fig34_HTML.jpg)


    Figure 7-34. Query results


    There we go! Two results, just like we wanted. Now that this data is loaded into
    the table correctly, we can start building our reports to be delivered to the
    customer. Don’t forget to verify our progress with what we have in the software
    requirements document periodically.


    ## Summary


    Let’s review what we did in this chapter, because it was actually quite a lot.


    *   Downloaded and installed Report Builder.

    *   Loaded our weather data into SQL Server.

    *   Generated charts as binary based on this weather data.


    That doesn’t seem like a lot, but it is. Be sure that you have gone through this
    chapter very carefully, because you aren’t going to get very far in the next chapter
    without that binary data.


    Next, we tie this all together into the actual reports to be delivered to the
    customer. If you made it through this chapter without a headache, you are probably
    doing it wrong. Seriously, there was an awful lot of information to digest. I
    highly recommend going back and re-reading the steps that generated the binary
    data in SQL Server. The individual attributes of the `ggplot2` function, in particular,
    are actually really fun to play around with. You can customize your charts just
    about any way you can dream of. There is even information on the Internet about
    how to create your own `R` packages for private use or general distribution.


    We’re almost done now! Keep going—we will get this wrapped up shortly. If you’ve
    made it this far, I congratulate you and encourage you to go for just a bit longer.
    I promise that it will be worth it!'
