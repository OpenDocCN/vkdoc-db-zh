    \ to categorize the system files to keep everything copacetic. We will have control\
    \ over our data, logs, and backups in the folders specified earlier.\n\nAs far\
    \ as which account you should use to run the functionality of SQL Server 2016,\
    \ this should be a no-brainer. It needs to run as if it were a regular database\
    \ installation, so it needs to have the account assigned that it would normally\
    \ have. To be clear, assign the same account that you are currently using for\
    \ whatever version of SQL Server you are running. Most times, this needs to be\
    \ an administrator in order to install programs.\n\nA quick side-note here: if\
    \ you haven’t read the hardware and software requirements for SQL Server 2016,\
    \ you probably want to do that. Also, Appendix A covers installation of SQL Server\
    \ 2016 onto an existing SQL Server 2014 server. If you are running SQL Server\
    \ 2014 and want to try SQL Server 2016 on the same server, then look to Appendix\
    \ A for guidance. (But in no case should you ever use a production server to follow\
    \ along with this book).\n\n## Beginning the Installation\n\nHere we go! Double-click\
    \ the setup.exe file in the download folder. You should see what’s shown in Figure\
    \ [1-1](#A421548_1_En_1_Chapter.html#Fig1).\n\n![A421548_1_En_1_Fig1_HTML.jpg](A421548_1_En_1_Fig1_HTML.jpg)\n\
    \nFigure 1-1.\n\nInitial SQL Server 2016 installation screen\n\nIf you see the\
    \ screen asking to make changes to your system, go ahead and say Yes.\n\nFigure\
    \ [1-1](#A421548_1_En_1_Chapter.html#Fig1) shows the first screen that you should\
    \ see when you start installation. This screen should look pretty familiar to\
    \ you, if you have ever installed SQL Server before. Click the Installation link\
    \ on the left. You should see what is shown in Figure [1-2](#A421548_1_En_1_Chapter.html#Fig2).\n\
    \n![A421548_1_En_1_Fig2_HTML.jpg](A421548_1_En_1_Fig2_HTML.jpg)\n\nFigure 1-2.\n\
    \nSQL Server 2016 installation options\n\nOnce here, click the top link, titled\
    \ New SQL Server stand-alone installation or add features to an existing installation.\n\
    \nNote that the very bottom option is something new. It says New R Server (Standalone)\
    \ installation. You would select this option if you only wanted to install R Server\
    \ as either a server (standalone, self-contained data analysis server, in other\
    \ words) or a client (manipulating data from a remote SQL Server R Services installation).\
    \ Note that you need the SQL Server 2016 services running as well, so this would\
    \ be to add R services to an existing SQL Server 2016 installation.\n\n### Product\
    \ Key\n\nNext is to enter your product key . Figure [1-3](#A421548_1_En_1_Chapter.html#Fig3)\
    \ shows the screen you see after continuing from Figure [1-2](#A421548_1_En_1_Chapter.html#Fig2)\
    \ in the prior section. Here you can specify that you wish to run the free edition,\
    \ or you may enter a product key in order to run a licensed edition.\n\n![A421548_1_En_1_Fig3_HTML.jpg](A421548_1_En_1_Fig3_HTML.jpg)\n\
    \nFigure 1-3.\n\nProduct Key screen\n\nSQL Server 2016 can be installed in one\
    \ of three free editions:\n\n*   Evaluation: A full set of features; basically,\
    \ the Enterprise version of SQL Server 2016, but only good for 180-day spans.\n\
    *   Developer: A full set of features, but cannot be used for production database\
    \ work.\n*   Express: The smallest, bare-bones installation of SQL Server 2016;\
    \ does not expire and can be used for production use.\n\nIf you would like to\
    \ choose an option other than Evaluation, go right ahead. Just understand the\
    \ implications of choosing that option; for example, the Express option doesn’t\
    \ support R so I wouldn’t choose this option. For what you need here, the Evaluation\
    \ version is perfect, because you certainly decide within 180 days if this new\
    \ functionality is something you want to permanently include in your SQL Server\
    \ installation.\n\nWhen you have chosen the version you are most comfortable with,\
    \ click Next to continue.\n\n### License Terms\n\nThe next screen, shown in Figure\
    \ [1-4](#A421548_1_En_1_Chapter.html#Fig4), simply asks you to accept the license\
    \ terms.\n\n![A421548_1_En_1_Fig4_HTML.jpg](A421548_1_En_1_Fig4_HTML.jpg)\n\n\
    Figure 1-4.\n\nLicense terms\n\nI honestly have never read this license all the\
    \ way through. I can’t say that I know anyone who has. Obviously, just click the\
    \ I accept the license terms check box and then click Next to move on."
  trans: "\n# 第一部分\n## 安装与设置\n\n### 1. SQL Server 2016 的安装与设置\n\nSQL Server 2016 的一大更新是将\
    \ R 语言添加为数据库引擎的组成部分。R 语言始于 1993 年，由奥克兰大学的 Robert Gentleman 和 Ross Ihaka 开发，是一种数据分析语言。它最初是作为一种能在统计分析方面与\
    \ S 语言抗衡的语言，并逐渐发展成为在统计计算、数据分析和机器学习领域全球最流行的语言之一。\n\n随着商业世界向商业智能和数据分析的重大转变，将 R 作为\
    \ SQL Server 的组成部分是微软一项明智的商业举措。微软不仅将这一新功能引入了一个已被广泛接受的平台，而且保持了该语言核心的完整性，使得现有的 R\
    \ 统计人员可以轻松迁移到 SQL Server 平台，以增强他们的统计计算方法。最终，这提升了微软在商业智能领域的知名度，并有望使 SQL Server\
    \ 在日常数据分析操作中获得更广泛的接受。\n\n2016 年，微软收购了 Revolution Analytics，该公司围绕 R 语言构建，并提供了 R\
    \ 的开源（Revolution R Open）和商业（Revolution R Enterprise）开发平台。现在，微软的重点是将 R 重度集成到现有产品中，显而易见的首选是\
    \ SQL Server，最终将是 Azure。这是一个令人兴奋的版本，因为它为 Azure 托管服务提供了机会，可以基于在 Azure 站点或数据库中完成的\
    \ R 计算来提供内容。\n\n由于 R 已作为 SQL Server 2016 安装的一部分被添加，我们只需在安装过程中选择该选项进行添加，然后完成一些小的配置任务即可。\n\
    \n为了确保 R 能够运行，有些事项我们需要检查和安装，但我会在具体操作时展示所有步骤。现在，请先下载 SQL Server 2016，然后按照我的指导进行安装。需要注意的是，根据服务包或微软是否决定更改安装界面，您的安装屏幕可能与我的略有不同，但我认为内容的要点是相同的。\n\
    \n### 规划\n\n不过，首先要做的是规划。下载 SQL Server 2016 后，您需要规划基本设置，例如您将使用的账户以及默认文件位置的设置。如果您读过我上一本书，您会知道我对于\
    \ SQL Server 文件系统的组织有一套非常特定的方式。在本书中，我创建了一个单独的逻辑磁盘 (`E:\\`)，并采用以下文件夹结构：\n\n*  \
    \ `E:\\SQL Server`\n    *   `Backups`\n    *   `Data`\n    *   `Logs`\n\n因此，一个主文件夹\
    \ `SQL Server`，然后在该文件夹内创建三个子文件夹，用于存放所需的不同部分。可能还会有其他文件夹，例如 `DTSX` 或 `Output`，您可以用于其他用途，但通常情况下，主文件夹内的这三个子文件夹就很好用。\n\
    \n**注意**\n\n在安装过程中，SQL Server 还会希望将文件放在其他位置；这没问题，因为这是 SQL Server 对系统文件进行分类以保持一切井然有序的方式。我们将在前面指定的文件夹中控制我们的数据、日志和备份文件。\n\
    \n至于您应该使用哪个账户来运行 SQL Server 2016 的功能，这应该是显而易见的。它需要像常规数据库安装一样运行，因此需要分配它通常应有的账户。明确地说，分配您当前正在运行的任何版本\
    \ SQL Server 所使用的相同账户。大多数情况下，这需要是一个管理员账户才能安装程序。\n\n这里有个快速的附注：如果您还没有阅读 SQL Server\
    \ 2016 的硬件和软件要求，您可能需要先查阅一下。另外，附录 A 涵盖了在现有 SQL Server 2014 服务器上安装 SQL Server 2016\
    \ 的内容。如果您正在运行 SQL Server 2014 并想在同一台服务器上尝试 SQL Server 2016，那么请参阅附录 A 获取指导。（但在任何情况下，您都不应使用生产服务器来跟随本书进行操作）。\n\
    \n### 开始安装\n\n我们开始吧！双击下载文件夹中的 `setup.exe` 文件。您应该会看到如图 1-1 所示的内容。\n\n![A421548_1_En_1_Fig1_HTML.jpg](img/A421548_1_En_1_Fig1_HTML.jpg)\n\
    \n**图 1-1.** SQL Server 2016 初始安装屏幕\n\n如果您看到要求对系统进行更改的屏幕，请直接点击 **是**。\n\n图 1-1\
    \ 显示了您开始安装时应该看到的第一个屏幕。如果您曾经安装过 SQL Server，这个屏幕应该看起来很熟悉。点击左侧的 **安装** 链接。您应该会看到如图\
    \ 1-2 所示的内容。\n\n![A421548_1_En_1_Fig2_HTML.jpg](img/A421548_1_En_1_Fig2_HTML.jpg)\n\
    \n**图 1-2.** SQL Server 2016 安装选项\n\n到达这里后，点击顶部的链接，标题为 **新建 SQL Server 独立安装或向现有安装添加功能**。\n\
    \n请注意，最底部的选项是新增的。它写着 **新建 R 服务器（独立）安装**。如果您只想将 R 服务器安装为服务器（即独立的、自包含的数据分析服务器）或客户端（从远程\
    \ SQL Server R 服务安装操作数据），您应选择此选项。请注意，您还需要 SQL Server 2016 服务正在运行，因此此选项用于向现有的 SQL\
    \ Server 2016 安装添加 R 服务。\n\n#### 产品密钥\n\n下一步是输入您的 **产品密钥**。图 1-3 显示了从前一节图 1-2\
    \ 继续后您看到的屏幕。在这里，您可以指定希望运行免费版本，或者您可以输入产品密钥以运行许可版本。\n\n![A421548_1_En_1_Fig3_HTML.jpg](img/A421548_1_En_1_Fig3_HTML.jpg)\n\
    \n**图 1-3.** 产品密钥屏幕\n\nSQL Server 2016 可以安装为以下三种免费版本之一：\n\n*   **评估版**：具备全部功能；基本上是\
    \ SQL Server 2016 的企业版，但有效期仅为 180 天。\n*   **开发版**：具备全部功能，但不能用于生产数据库工作。\n*   **速达版**：SQL\
    \ Server 2016 最小、最基本的安装；不会过期，可用于生产用途。\n\n如果您想选择评估版以外的选项，请直接选择。但请理解选择该选项的含义；例如，速达版不支持\
    \ R，因此我不会选择此选项。对于您这里的需求，评估版是完美的，因为您肯定能在 180 天内决定是否希望将这项新功能永久包含在您的 SQL Server 安装中。\n\
    \n当您选择了最合适的版本后，点击 **下一步** 继续。\n\n#### 许可条款\n\n下一个屏幕，如图 1-4 所示，只是要求您接受许可条款。\n\n\
    ![A421548_1_En_1_Fig4_HTML.jpg](img/A421548_1_En_1_Fig4_HTML.jpg)\n\n**图 1-4.**\
    \ 许可条款\n\n老实说，我从未完整阅读过这个许可条款。我不能说我认识有谁读完过。显然，只需勾选 **我接受许可条款** 复选框，然后点击 **下一步**\
    \ 继续。\n"
- fmt: '### Install Rules


    This screen shows you what happens as SQL Server goes through the preliminary
    steps to check for a clean installation. If you get any errors or warnings, you
    should look at correcting them so that you can install as cleanly as possible.


    My screen flashed a few times and I eventually ended up at the screen shown in
    Figure [1-5](#A421548_1_En_1_Chapter.html#Fig5).


    ![A421548_1_En_1_Fig5_HTML.jpg](A421548_1_En_1_Fig5_HTML.jpg)

    Figure 1-5. Install Rules


    It’s worth noting that there could be an update to `SQL Server 2016` that gets
    downloaded and installed during this step, so if a message comes up with that
    information, go ahead and install it.


    So everything looks good except for my firewall rule. Since no connections come
    from a network on my laptop, this should be fine, so I’m going to click `Next`
    to continue.


    ### Feature Selection


    Now we get to choosing what we want as part of the actual installation. Figure
    [1-6](#A421548_1_En_1_Chapter.html#Fig6) shows the screen we have been waiting
    for.


    ![A421548_1_En_1_Fig6_HTML.jpg](A421548_1_En_1_Fig6_HTML.jpg)

    Figure 1-6. Feature Selection


    At this point, we need to choose just the bare minimum of what we need to test
    the functionality of `R` within our database instance. In this book, we get familiar
    with `R` and create charts using `R Tools for Visual Studio`, and then duplicate
    those results in `SSMS`, ultimately serving those results in reports through `Reporting
    Services`. Because of this, we only install `R Services (In-Database)` and `Reporting
    Services – Native`. This gives us everything we need to really get a feel for
    `R` and what it can do for us. It also means that we don’t need to install the
    entirety of `SQL Server 2016`. Figure [1-7](#A421548_1_En_1_Chapter.html#Fig7)
    shows the selected options that you should have at this time.


    ![A421548_1_En_1_Fig7_HTML.jpg](A421548_1_En_1_Fig7_HTML.jpg)

    Figure 1-7. Selected options


    Click `Next` here to move on. It takes a second to think about what it wants to
    do, but eventually, you see the `Instance Configuration` screen shown in Figure
    [1-8](#A421548_1_En_1_Chapter.html#Fig8).


    ![A421548_1_En_1_Fig8_HTML.jpg](A421548_1_En_1_Fig8_HTML.jpg)

    Figure 1-8. Instance Configuration


    ### Instance Configuration


    Since this is a new installation and there isn’t a previous version of `SQL Server`
    installed, the option is available for `Default Instance`. We can certainly do
    this with no issue, but I usually prefer to name my instances. I leave this up
    to you, but understand that I will use a `Named instance` and not a `Default instance`
    for the remainder of this book.


    At this point, we need to define our new instance. If you look on the `Installed
    Instances` section, you see that there is nothing there. We choose the `Named
    Instance` option and call it `SQL2016RS` for `SQL Server 2016 R Services`. The
    `Instance ID` field should be updated to `SQL2016RS` as well. Once you do that,
    you see what is shown in Figure [1-9](#A421548_1_En_1_Chapter.html#Fig9).


    ![A421548_1_En_1_Fig9_HTML.jpg](A421548_1_En_1_Fig9_HTML.jpg)

    Figure 1-9. Updated Instance Configuration screen


    Pay attention to the `Named Instance` field, the `Instance ID` field, the `SQL
    Server` directory location, and the `Reporting Services` directory location listed
    on this screen. Those need to all have `SQL2016RS` referenced in them. Once you
    are satisfied that everything is as it should be, click `Next` to continue.


    When you are ready, click `Next` to move on.


    ### Server Configuration


    The next screen is where we define the service accounts and startup types for
    the services. This screen is shown in Figure [1-10](#A421548_1_En_1_Chapter.html#Fig10).


    ![A421548_1_En_1_Fig10_HTML.jpg](A421548_1_En_1_Fig10_HTML.jpg)

    Figure 1-10. Server Configuration


    The only service to really pay attention to here is the `SQL Server Launchpad`
    service. This service handles the execution of `R` within the database engine,
    so if `R` isn’t behaving as expected, check this service first.


    The `SQL Browser` service is running under the context of local services, so there
    isn’t a new service account being created. We won’t worry about that one, in other
    words.


    These service accounts are the default, but can always be changed to your own
    service accounts, if you have them. If you don’t have your own service accounts,
    you can keep these suggested service accounts. I know a lot of server administrators
    that insist on employing the principal of least privilege for services, so if
    that is the case for your particular environment, then you need to get the service
    name and login information from the server administrator in order to proceed.
    Another way you can go about this is to copy these service names and include them
    in a summary to your system administrator regarding the accounts that were created
    during installation, so that the system administrator can audit the permissions
    for this user as needed. It is important to note here that I am referring to a
    separate individual or entity for “system administrator” that is not a database
    administrator, but rather the `Windows`-level administrator. The person in charge
    of the operating system level, one step up from the Application layer, in other
    words.


    We only want to change a little bit here; specifically, set the `SQL Server Agent`
    service `Startup Type` to `Automatic`. That is the only change we need to make.
    Figure [1-11](#A421548_1_En_1_Chapter.html#Fig11) shows what you should see at
    this point.


    ![A421548_1_En_1_Fig11_HTML.jpg](A421548_1_En_1_Fig11_HTML.jpg)

    Figure 1-11. Server Configuration updated


    Notice that we cannot set the password for any of these accounts. This is the
    same as it has been for every installation of `SQL Server` that I have ever seen.
    If you were to change the `Account Name` box from the default to a custom service
    account name, then the `Password` box would become active and accept input. Otherwise,
    the password is controlled by `SQL Server` and `Windows`.


    Notice also that there is a new `Grant Perform Volume Maintenance Task privilege
    to SQL Server Database Engine Service` check box underneath the default services
    listed. For what we’re doing in this book, it’s not necessary to check this box.
    In future installations, or for production environments, it would probably be
    a good idea to enable this.


    At this point, all of our services are configured correctly. Notice that we aren’t
    going to bother with the `Collation` tab. This should have `SQL_Latin1_General_CP1_CI_AS`
    specified in the tab by default. That’s it. Go ahead and click `Next` to move
    on.


    ### Database Engine Configuration


    The next screen is `Database Engine Configuration`, shown in Figure [1-12](#A421548_1_En_1_Chapter.html#Fig12).
    Here you set options for the engine in four different tabs, as specified in the
    subsections to follow.


    ![A421548_1_En_1_Fig12_HTML.jpg](A421548_1_En_1_Fig12_HTML.jpg)

    Figure 1-12. Database Engine Configuration


    #### Server Configuration


    This tab lets you specify the authentication mode and the administrators for this
    instance of the database engine. Because this is just for testing and evaluation,
    I am going to add myself in `Windows Authentication Mode` as the administrator
    by clicking the `Add Current User` button at the bottom of the screen and selecting
    `Windows Authentication Mode`. Figure [1-13](#A421548_1_En_1_Chapter.html#Fig13)
    shows these options selected.


    ![A421548_1_En_1_Fig13_HTML.jpg](A421548_1_En_1_Fig13_HTML.jpg)

    Figure 1-13. Server Configuration tab with options'
