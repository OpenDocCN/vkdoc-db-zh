  raw: '### Properties


    Notice that we are in the Properties section on the left-hand side. Across the
    top, there are the following options: Edit in Report Builder, Download, Replace,
    Move, Delete, and Create linked report. Most of these are self-explanatory, except
    for Create linked report. The Create linked report option allows you to create
    a report that retains the layout and data source information of an existing report,
    but still allow for the editing of the other parameters of the report, such as
    subscriptions and report parameters. Think of this sort of like a template creator.
    You essentially create a template of one report and have an entirely new report
    created from the basic skeleton of that report (data source and report layout),
    but then you can populate the body of the skeleton with entirely different report
    information.


    On this page, we can add a description to the report in the Description box shown
    in Figure [9-5](#A421548_1_En_9_Chapter.html#Fig5). If you were to scroll down,
    you would see there is another area titled Advanced. This area allows you to change
    the report timeout period, but since this is a dynamically generated report, I
    am going to leave this alone. There could be an instance where network traffic
    is keeping my report from being generated quickly. I don’t want to cause the report
    to fail just because of that.


    ### Data Sources


    The next section, shown on the menu on the left, is Data Sources. This section
    allows us to update or change our existing data sources. The keyword here is existing.
    We cannot create new data sources from Report Server; they must be created in
    Report Builder first.


    Figure [9-6](#A421548_1_En_9_Chapter.html#Fig6) shows the top part of this screen,
    which has the data source information we specified back in Report Builder. Notice
    that we have the option here to change anything, because we are in the Content
    Manager role.


    ![A421548_1_En_9_Fig6_HTML.jpg](A421548_1_En_9_Fig6_HTML.jpg)


    Figure 9-6.


    Data source information


    The lower part of this screen is shown in Figure [9-7](#A421548_1_En_9_Chapter.html#Fig7).
    This section allows us to define or edit the credentials necessary to connect
    to the data source. Clearly, this Credentials section already works as we have
    it set up, or we wouldn’t have been able to see the reports we created in this
    Report Server interface. Figure [9-7](#A421548_1_En_9_Chapter.html#Fig7) shows
    our options here.


    ![A421548_1_En_9_Fig7_HTML.jpg](A421548_1_En_9_Fig7_HTML.jpg)


    Figure 9-7.


    Credentials information


    Notice that we can choose from four different login types.


    Note


    This option may change for your particular installation, depending on your individual
    requirements.


    On the Credentials screen, we want to scroll to the bottom and click the Test
    Connection button. Figure [9-8](#A421548_1_En_9_Chapter.html#Fig8) shows what
    you should see at this point.


    ![A421548_1_En_9_Fig8_HTML.jpg](A421548_1_En_9_Fig8_HTML.jpg)


    Figure 9-8.


    Test Connection unsuccessful


    Additionally, an error message appears next to the Test Connection button, shown
    in Figure [9-9](#A421548_1_En_9_Chapter.html#Fig9).


    ![A421548_1_En_9_Fig9_HTML.jpg](A421548_1_En_9_Fig9_HTML.jpg)


    Figure 9-9.


    Error message


    Next, we want to click the Using the following Credentials radio button and update
    the interface to what is shown in Figure [9-10](#A421548_1_En_9_Chapter.html#Fig10).
    Your information is more than likely different than the information shown in the
    figure.


    ![A421548_1_En_9_Fig10_HTML.jpg](A421548_1_En_9_Fig10_HTML.jpg)


    Figure 9-10.


    Credentials information, updated


    Notice that the check box shown on the screen is not checked; this is essential
    to creating subscriptions in the next section. Once you have the information updated,
    click the Test Connection button at the bottom of the screen. Figure [9-11](#A421548_1_En_9_Chapter.html#Fig11)
    shows the result of this operation.


    ![A421548_1_En_9_Fig11_HTML.jpg](A421548_1_En_9_Fig11_HTML.jpg)


    Figure 9-11.


    Connection successful


    The last thing we need to do is click the Save button, which updates the report.


    Note


    At this point, you may want to run the report again and make sure that it still
    renders correctly.


    Once the connection information is saved, it becomes immediately available to
    the users that have subscribed to the report.


    ### Subscriptions


    Click the Subscriptions link in the left menu. An interface opens, as shown in
    Figure [9-12](#A421548_1_En_9_Chapter.html#Fig12); it can be used to create subscriptions
    to reports.


    ![A421548_1_En_9_Fig12_HTML.jpg](A421548_1_En_9_Fig12_HTML.jpg)


    Figure 9-12.


    Subscriptions


    Notice that there is a button labeled New subscription with a plus sign to the
    left of the text. Go ahead and click the New subscription button. You should see
    what is shown in Figure [9-13](#A421548_1_En_9_Chapter.html#Fig13).


    ![A421548_1_En_9_Fig13_HTML.jpg](A421548_1_En_9_Fig13_HTML.jpg)


    Figure 9-13.


    New subscription


    First, we want to update the Description field to say Wind Speed Report. Next,
    we are going to edit the schedule, but leave the subscription type alone. Clicking
    the blue Edit schedule link allows you to change the current schedule. Figure
    [9-14](#A421548_1_En_9_Chapter.html#Fig14) shows the initial interface when clicking
    the Edit schedule option.


    ![A421548_1_En_9_Fig14_HTML.jpg](A421548_1_En_9_Fig14_HTML.jpg)


    Figure 9-14.


    Edit schedule (top)


    Notice that this is the top part of the Edit Schedule interface. Click the Once
    radio button and then enter a time that is just a few minutes away from your current
    time.


    The bottom part of this interface is shown in Figure [9-15](#A421548_1_En_9_Chapter.html#Fig15).
    In this area, we need to just click the Apply button.


    ![A421548_1_En_9_Fig15_HTML.jpg](A421548_1_En_9_Fig15_HTML.jpg)


    Figure 9-15.


    Edit schedule (bottom)


    At this point, the subscription interface updates to show the new schedule information.
    Figure [9-16](#A421548_1_En_9_Chapter.html#Fig16) shows this updated schedule
    information, as well as the next part that we need to update.


    ![A421548_1_En_9_Fig16_HTML.jpg](A421548_1_En_9_Fig16_HTML.jpg)


    Figure 9-16.


    Destination and E-mail options


    We want to leave the destination set to E-mail and to update the rest of the information,
    as shown in Figure [9-17](#A421548_1_En_9_Chapter.html#Fig17).


    ![A421548_1_En_9_Fig17_HTML.jpg](A421548_1_En_9_Fig17_HTML.jpg)


    Figure 9-17.


    Destination and E-mail options, updated


    Notice that I entered my actual e-mail address into the To: field, as well as
    changed the Render Format to PDF.


    Note


    Available render formats (currently) are Word, Excel, PowerPoint, PDF, TIFF, MHTML,
    CSV, XML, and Data Feed.


    Next, just add some text in the Comment field, as shown in Figure [9-18](#A421548_1_En_9_Chapter.html#Fig18).


    ![A421548_1_En_9_Fig18_HTML.jpg](A421548_1_En_9_Fig18_HTML.jpg)


    Figure 9-18.


    Added comment information


    Click the Create Subscription button and we are done with this area. Wait a few
    minutes. You should see an e-mail appear in your inbox. Opening it displays something
    similar to what is shown in Figure [9-19](#A421548_1_En_9_Chapter.html#Fig19).


    ![A421548_1_En_9_Fig19_HTML.jpg](A421548_1_En_9_Fig19_HTML.jpg)


    Figure 9-19.


    E-mail received


    You have now successfully created an e-mail subscription for this report.


    ### Dependent Items


    The Dependent Items section has no configurable areas, so we’ll just leave this
    area alone.'
  trans: '

    ### 属性


    请注意，我们现在位于左侧的 **“属性”** 部分。顶部有以下几个选项：**“在报表生成器中编辑”**、**“下载”**、**“替换”**、**“移动”**、**“删除”**
    和 **“创建链接报表”**。除了 **“创建链接报表”** 之外，其他选项的含义都很直观。**“创建链接报表”** 选项允许你创建一个报表，该报表保留现有报表的布局和数据源信息，但仍允许编辑报表的其他参数，例如订阅和报表参数。可以将其理解为一种模板创建器。你本质上是为一个报表创建了一个模板，然后从该报表的基本框架（数据源和报表布局）创建一个全新的报表，但随后你可以用完全不同的报表信息填充这个框架的主体。


    在此页面上，我们可以在图 9-5 所示的 **“描述”** 框中为报表添加描述。如果向下滚动，你会看到另一个标题为 **“高级”** 的区域。此区域允许你更改报表超时时间，但由于这是一个动态生成的报表，我将保持原样。可能存在网络流量导致我的报表无法快速生成的情况。我不希望仅仅因为这个原因导致报表失败。


    ### 数据源


    左侧菜单显示的下一节是 **“数据源”**。此部分允许我们更新或更改现有的数据源。这里的关键词是 **“现有”**。我们无法在报表服务器中创建新的数据源；它们必须首先在报表生成器中创建。


    图 9-6 显示了此屏幕的顶部部分，其中包含我们之前在报表生成器中指定的数据源信息。请注意，我们在这里有更改任何内容的选项，因为我们处于 **“内容管理器”**
    角色。


    ![A421548_1_En_9_Fig6_HTML.jpg](img/A421548_1_En_9_Fig6_HTML.jpg)


    图 9-6.

    数据源信息


    此屏幕的底部部分如图 9-7 所示。此部分允许我们定义或编辑连接到数据源所需的凭据。显然，这个 **“凭据”** 部分已经按设置工作了，否则我们将无法在此报表服务器界面中看到我们创建的报表。图
    9-7 显示了我们这里的选项。


    ![A421548_1_En_9_Fig7_HTML.jpg](img/A421548_1_En_9_Fig7_HTML.jpg)


    图 9-7.

    凭据信息


    请注意，我们可以从四种不同的登录类型中选择。


    > 注意

    > 此选项可能会根据你的具体安装和个别要求而有所不同。


    在 **“凭据”** 屏幕上，我们需要滚动到底部并单击 **“测试连接”** 按钮。图 9-8 显示了此时你应该看到的内容。


    ![A421548_1_En_9_Fig8_HTML.jpg](img/A421548_1_En_9_Fig8_HTML.jpg)


    图 9-8.

    测试连接不成功


    此外，一条错误消息出现在 **“测试连接”** 按钮旁边，如图 9-9 所示。


    ![A421548_1_En_9_Fig9_HTML.jpg](img/A421548_1_En_9_Fig9_HTML.jpg)


    图 9-9.

    错误消息


    接下来，我们需要单击 **“使用以下凭据”** 单选按钮，并将界面更新为如图 9-10 所示。你的信息很可能与图中所示的信息不同。


    ![A421548_1_En_9_Fig10_HTML.jpg](img/A421548_1_En_9_Fig10_HTML.jpg)


    图 9-10.

    更新后的凭据信息


    请注意，屏幕上显示的复选框未被选中；这对于在下一节中创建订阅至关重要。更新信息后，单击屏幕底部的 **“测试连接”** 按钮。图 9-11 显示了此操作的结果。


    ![A421548_1_En_9_Fig11_HTML.jpg](img/A421548_1_En_9_Fig11_HTML.jpg)


    图 9-11.

    连接成功


    最后我们需要做的是单击 **“保存”** 按钮，这会更新报表。


    > 注意

    > 此时，你可能需要再次运行报表，并确保它仍能正确呈现。


    一旦连接信息被保存，它会立即对订阅了该报表的用户可用。


    ### 订阅


    单击左侧菜单中的 **“订阅”** 链接。将打开一个界面，如图 9-12 所示；它可用于创建报表订阅。


    ![A421548_1_En_9_Fig12_HTML.jpg](img/A421548_1_En_9_Fig12_HTML.jpg)


    图 9-12.

    订阅


    请注意，有一个标有 **“新建订阅”** 的按钮，文本左侧带有一个加号。请单击 **“新建订阅”** 按钮。你应该看到如图 9-13 所示的内容。


    ![A421548_1_En_9_Fig13_HTML.jpg](img/A421548_1_En_9_Fig13_HTML.jpg)


    图 9-13.

    新建订阅


    首先，我们希望将 **“描述”** 字段更新为 **“风速报告”**。接下来，我们将编辑计划，但保持订阅类型不变。单击蓝色的 **“编辑计划”** 链接可以更改当前计划。图
    9-14 显示了单击 **“编辑计划”** 选项时的初始界面。


    ![A421548_1_En_9_Fig14_HTML.jpg](img/A421548_1_En_9_Fig14_HTML.jpg)


    图 9-14.

    编辑计划（顶部）


    请注意，这是 **“编辑计划”** 界面的顶部部分。单击 **“一次”** 单选按钮，然后输入一个距离你当前时间仅几分钟的时间。


    此界面的底部部分如图 9-15 所示。在此区域中，我们只需要单击 **“应用”** 按钮。


    ![A421548_1_En_9_Fig15_HTML.jpg](img/A421548_1_En_9_Fig15_HTML.jpg)


    图 9-15.

    编辑计划（底部）


    此时，订阅界面更新以显示新的计划信息。图 9-16 显示了此更新后的计划信息，以及我们需要更新的下一部分。


    ![A421548_1_En_9_Fig16_HTML.jpg](img/A421548_1_En_9_Fig16_HTML.jpg)


    图 9-16.

    目标和电子邮件选项


    我们希望将目标保留为 **“电子邮件”**，并更新其余信息，如图 9-17 所示。


    ![A421548_1_En_9_Fig17_HTML.jpg](img/A421548_1_En_9_Fig17_HTML.jpg)


    图 9-17.

    更新后的目标和电子邮件选项


    请注意，我在 **“收件人:”** 字段中输入了我的实际电子邮件地址，并将 **“呈现格式”** 更改为 PDF。


    > 注意

    > 当前可用的呈现格式包括 Word、Excel、PowerPoint、PDF、TIFF、MHTML、CSV、XML 和数据提要。


    接下来，只需在 **“注释”** 字段中添加一些文本，如图 9-18 所示。


    ![A421548_1_En_9_Fig18_HTML.jpg](img/A421548_1_En_9_Fig18_HTML.jpg)


    图 9-18.

    添加的注释信息


    单击 **“创建订阅”** 按钮，我们就完成了此区域的操作。等待几分钟。你应该会在收件箱中看到一封电子邮件。打开它会显示与图 9-19 所示类似的内容。


    ![A421548_1_En_9_Fig19_HTML.jpg](img/A421548_1_En_9_Fig19_HTML.jpg)


    图 9-19.

    收到的电子邮件


    你已成功为此报表创建了电子邮件订阅。


    ### 依赖项


    **“依赖项”** 部分没有可配置的区域，因此我们将保持此区域不变。

