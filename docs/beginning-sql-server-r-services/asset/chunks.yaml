    R 所有功能的综合指南。相反，我强调基础——然后我们可以继续深入。我认为这足以引起兴趣，并让我们专注于将 R 用于严肃数据分析的实用性。'
  raw: '### Data Science Settings


    Selecting this option opens up a modal dialog window shown in Figure [2-25](#A421548_1_En_2_Chapter.html#Fig25).
    You are given the option to reconfigure Visual Studio for use by so-called data
    scientists. You’ll get a window layout and some keyboard shortcuts that Microsoft
    deems useful to those doing data analysis in R.


    ![A421548_1_En_2_Fig25_HTML.jpg](A421548_1_En_2_Fig25_HTML.jpg)


    Figure 2-25.


    Reset options


    Go ahead and click Yes. Another screen might open, as you can see in Figure [2-26](#A421548_1_En_2_Chapter.html#Fig26).


    ![A421548_1_En_2_Fig26_HTML.jpg](A421548_1_En_2_Fig26_HTML.jpg)


    Figure 2-26.


    Reset keyboard options


    If you would like to reset your keyboard shortcuts while using RTVS, click Yes;
    otherwise, click No.


    We can now see an updated interface. Take a look at Figure [2-27](#A421548_1_En_2_Chapter.html#Fig27)
    for a look at the changes.


    ![A421548_1_En_2_Fig27_HTML.jpg](A421548_1_En_2_Fig27_HTML.jpg)


    Figure 2-27.


    Updated interface


    You can see that I have my interface laid out so that R Interactive is the main
    window in the bottom-left corner. On the right, I have Variable Explorer and Solution
    Explorer at the top. R Plot, R Help, and R History are all laid out nice and neat
    at the bottom. This is proof of concept that R is installed and working correctly.


    Let’s briefly discuss what Microsoft makes available in their R product line.


    *   Microsoft R Server: An enterprise-class platform running Hadoop, Teradata
    DB, or even Linux to provide powerful interactions with data. Uses ScaleR technology
    for parallelization .

    *   Microsoft R Client: A free data science tool that works with Microsoft R Open.
    R Client uses remote data and processes the operations locally. Uses ScaleR technology
    for parallelization.

    *   Microsoft R Open: Microsoft’s “version” of R. Called MRO for short, it is
    fully compatible with R code in every way. It does not reference the proprietary
    ScaleR technology though.

    *   SQL Server R Services: Integrates R into SQL Server’s database engine natively.
    ScaleR is available in Enterprise Edition only though.


    Additionally, R Server is a server-class analysis platform and R Client is a client-based
    tool. MRO provides the interface to R from a client. So, for example, in a typical
    data analysis environment, there would be an R Server running an instance of SQL
    Server R Services, Hadoop, Teradata DB, or Linux, with one or more R Client connections
    running MRO to interact with the data in the R Server or in the SQL Server R Services
    instance. The clients could either consume the resources on their local workstations
    using the ScaleR functions, or do the computing on the R Server using SQL Server
    R Services or one of the other analysis tools (Hadoop, Teradata DB) on either
    Windows or Linux servers.


    For the examples in this book, the R Server instance is our SQL Server R Services
    database instance and the R Client is our installation of RTVS with MRO.


    ## Exploring Samples


    Let’s go back to the Samples link in the RTVS Documentation and Samples menu item.
    That link is [`http://microsoft.github.io/RTVS-docs/samples.html`](http://microsoft.github.io/RTVS-docs/samples.html)
    . On that page, there is a download of a `.zip` file containing examples that
    we will use to get familiar with the new R environment. Unzip that `.zip` file
    to a location that you can access, and then navigate to `RTVS-docs-master/examples`
    and double-click README.MD. This opens this doc in RTVS. Figure [2-28](#A421548_1_En_2_Chapter.html#Fig28)
    shows this document once opened.


    ![A421548_1_En_2_Fig28_HTML.jpg](A421548_1_En_2_Fig28_HTML.jpg)


    Figure 2-28.


    Readme file


    We need to get a little bit familiar with R as a language before we attempt to
    get into any sort of development activity, so let’s step through some of the examples
    given in A First Look at R. In the tutorial featured later in this book, we deal
    with the R Server aspect a lot more, since we will directly interface with SQL
    Server R Services to create a report with embedded information.


    There is an awful lot of information about R on the internet, so if you already
    know about it, then you can consider this a refresher course. If not, no worries.
    I’m not going to get into the complete history of R and I’m not going to make
    this a comprehensive guide to all of R’s functionality. Instead, I highlight the
    basics—and we can go from there. I think that will be enough to whet the proverbial
    whistle and get our minds keen on the practicality of using R for serious data
    analysis.'
