    ## Introduction


    In an effort to not sound like a complete Microsoft fan boy, SQL Server 2016 has
    some seriously cool additions. Not the least of these is the inclusion of a massive
    data analysis tool widely used throughout the industry. This tool is called, simply,
    R. Some of you might be asking why Microsoft would possibly include this tool,
    since it isn’t really a database thing as it is an analysis or graphing tool.


    The reason, I think, is fairly simple to deduce: Microsoft is expanding their
    reach. It seems to me that R is a great way to do that. The inclusion of R Tools
    as a part of the Visual Studio toolset and the SQL Server database instance will
    most definitely be a game changer for SQL Server development. It used to be where
    the database developer would have to prepare the data to be consumed by some service
    for analysis; not anymore. R Tools for Visual Studio (RTVS) allows the user to
    either prepare their scripts in Visual Studio, or directly in SQL Server Management
    Studio. Although this isn’t recommended by Microsoft, it is still possible.


    ### What We Will Cover


    What this book covers is pretty simple and straightforward. We will…


    *   Set up a new instance on SQL Server 2016

    *   Set up the necessary R resources to properly create, consume, and execute
    R

    *   Briefly review the history, syntax, and functions within R

    *   Create a custom R solution using R Tools for Visual Studio

    *   Configure SQL Server Reporting Services

    *   Install and configure Report Builder

    *   Create reports in Report Builder based on R code developed in R Tools for
    Visual Studio

    *   Consume those reports through Reporting Services


    It is important to note a few things at this point. Specifically, …


    *   R Tools for Visual Studio is a brand-new release, so the chances of it being
    buggy are pretty good.

    *   We are fully installing SQL Server 2016 as a completely new instance because
    I wanted to be able to show the advantages that a user stands to gain by incorporating
    R into their workflow, even though they may not be completely sold on the benefits
    of R.


    All the components needed to install and configure what is necessary to run R
    within SQL Server 2016 are covered on MSDN. As of now, the link for the resources
    is at [`https://msdn.microsoft.com/en-us/library/mt604883.aspx`](https://msdn.microsoft.com/en-us/library/mt604883.aspx).
    Please note that Microsoft may not keep that same link forever, so remember that
    Google is your friend. I will explain what is needed to get it up and running.
    It may be up to you to find the necessary tools on Microsoft.com.'
