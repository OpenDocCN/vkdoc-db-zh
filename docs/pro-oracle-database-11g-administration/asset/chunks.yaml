  trans: '# 第 17 章 配置 RMAN


    `注意` 如果您执行脱机备份，必须使用 `IMMEDIATE`、`NORMAL` 或 `TRANSACTIONAL` 选项关闭数据库，然后将其置于 `装载模式`。`RMAN`
    需要数据库处于 `装载模式` 才能读写 `控制文件`。


    ## 4. 设置归档重做日志目的地和文件格式


    启用 `归档重做日志` 模式是进行在线备份的先决条件。关于 `归档重做日志` 目的地和格式的架构决策以及如何启用/禁用 `归档日志` 模式的完整讨论，请参见第
    16 章。


    当启用 `归档日志` 模式时，`Oracle` 会将 `归档重做日志` 写入以下一个或多个位置（您可以将 `归档重做日志` 配置为同时写入 `FRA` 和您通过初始化参数手动设置的其他几个位置）：


    - 默认位置

    - `FRA`（快速恢复区）

    - 通过 `LOG_ARCHIVE_DEST_N` 初始化参数指定的位置


    如果您不使用 `FRA`，并且也没有通过 `LOG_ARCHIVE_DEST_N` 初始化参数显式设置 `归档重做日志` 目的地，那么默认情况下，`归档重做日志`
    会被写入一个与 `操作系统` 相关的位置。在许多 `Linux/Unix` 系统上，默认位置是 `ORACLE_HOME/dbs/arch` 目录。`归档重做日志`
    的默认文件名格式是 `%t_%s_%r.dbf`。


    如果您启用了 `FRA`，那么默认情况下，`归档重做日志` 会被写入 `FRA` 中的一个目录。在 `FRA` 中创建的 `归档重做日志` 文件的默认名称格式是
    `Oracle 托管文件` 格式。例如：`/<fra>/<db_name>/archivelog/<YYYY_MM_DD>/o1_mf_1_1078_68dx5dyj_.arc`


    `Oracle` 推荐使用 `FRA`。我个人倾向于不使用 `FRA`，因为当 `FRA` 空间满且旧文件未能及时清除时，我不希望遇到数据库挂起的情况。相反，我更喜欢使用
    `LOG_ARCHIVE_DEST_N` 参数来设置 `归档重做日志` 文件的位置。这是一个例子：`log_archive_dest_1=''LOCATION=/oraarch1/CHNPRD''`


    我也倾向于为默认的 `归档日志` 文件名格式使用这个：`log_archive_format=''%t_%s_%r.arc''`


    有时 `DBA` 会使用 `.dbf` 作为数据文件和 `归档重做日志` 文件的扩展名。这种格式避免了在识别文件是 `归档重做日志` 文件还是活动的数据库数据文件时产生潜在的混淆。


    ## 5. 配置 RMAN 备份位置和文件格式


    当您执行基于磁盘的 `BACKUP` 命令时，`RMAN` 会在以下位置之一创建备份片：


    - 默认位置

    - `FRA`

    - 通过 `BACKUP` 或 `FORMAT` 命令指定的位置


    如果您没有配置任何 `RMAN` 变量，也没有设置 `FRA`，默认情况下 `RMAN` 会分配一个基于磁盘的通道，并将备份文件写入默认位置。例如，您无需配置任何
    `RMAN` 参数即可运行以下命令：


    ```

    RMAN> backup database;

    ```


    如果未配置任何内容，`RMAN` 会分配一个基于磁盘的通道，并将备份写入默认的磁盘位置。此位置因 `操作系统` 而异。在许多 `Linux/Unix` 环境中，默认位置是
    `ORACLE_HOME/dbs`。创建的备份文件的默认名称格式是 `Oracle 托管文件` 格式。例如：`<ORACLE_HOME>/dbs/01ln9g7e_1_1`


    在备份到磁盘时，如果您没有明确指示 `RMAN` 将备份写入特定位置（通过 `FORMAT` 或 `CONFIGURE` 命令），并且您正在使用 `FRA`，那么
    `RMAN` 会自动将备份文件写入 `FRA` 中的目录。在 `FRA` 中创建的备份文件的默认名称格式是 `Oracle 托管文件` 格式。例如：`/<fra>/<db_name>/backupset/<YYYY_MM_DD>/o1_mf_nnndf_TAG20100907T025402_68czfbdf_.bkp`


    我通常不使用 `FRA` 来放置 `RMAN` 备份。在我工作的许多环境中，单个挂载点上没有足够的磁盘空间来容纳整个数据库备份的大小。在这种情况下，您需要分配两个或更多指向不同挂载点的通道。在这些环境中使用
    `FRA` 有些笨拙。


    此外，出于性能原因，您可能希望指示 `RMAN` 写入多个磁盘位置。如果您能确保不同的挂载点基于不同的物理磁盘并由独立的控制器写入，您可以通过分配指向不同挂载点的多个通道来减少
    `I/O` 争用。


    当您使用 `FRA` 时，`RMAN` 在给定日期首次备份数据库时会自动创建单独的目录。我更喜欢将备份写入一个目录，而不是按日期分开目录和备份。我发现如果为每个服务器上的每个数据库使用一个标准目录，会更易于管理、维护和排查备份问题。


    如果您不想将 `RMAN` 备份文件放在 `FRA` 中，有几种方法可以直接指定备份位置：


    - `BACKUP...FORMAT`

    - `CONFIGURE CHANNEL...FORMAT`


    在发出 `BACKUP` 命令时，您可以直接指定希望备份放置的位置。例如：


    ```

    RMAN> backup database format ''/ora01/O11R2/rman/rman_%U.bkp'';

    ```


    这是由 `RMAN` 生成的对应文件：`/ora01/O11R2/rman/rman_05ln9hk6_1_1.bkp`


    这里的 `%U` 指示 `RMAN` 为备份文件名动态构建一个唯一的字符串。在大多数情况下需要唯一的名称，因为 `RMAN` 不会覆盖已存在的文件。


    这一点很重要，因为如果您指示 `RMAN` 并行写入，它需要为每个通道创建唯一的文件名。例如：


    ```

    RMAN> configure device type disk parallelism 2;

    ```


    现在，当您运行此命令时，`RMAN` 会分配多个通道，并行写入两个不同的备份文件。格式字符串中的 `%U` 保证创建的文件名是唯一的。


    我通常不使用 `BACKUP...FORMAT` 语法来指定 `RMAN` 备份的位置。我更喜欢使用 `CONFIGURE CHANNEL...FORMAT`
    命令。这是因为我通常需要写入多个磁盘位置，并且需要灵活性来指定位于不同挂载点上的目录。以下是一个使用 `CONFIGURE CHANNEL...FORMAT`
    的典型配置：


    ```

    RMAN> configure device type disk parallelism 3;

    RMAN> configure channel 1 device type disk format ''/ora01/O11R2/rman/rman1_%U.bk'';

    RMAN> configure channel 2 device type disk format ''/ora02/O11R2/rman/rman2_%U.bk'';

    RMAN> configure channel 3 device type disk format ''/ora03/O11R2/rman/rman3_%U.bk'';

    ```


    在这些代码行中，您应该将设备类型的并行度配置为与您分配的通道数相匹配。`RMAN` 只分配由并行度指定的通道数；其他配置的通道将被忽略。例如，如果您指定并行度为
    2，那么无论您通过 `CONFIGURE CHANNEL` 命令配置了多少通道，`RMAN` 都只分配两个通道。


    在此配置通道的示例中，假设 `BACKUP` 命令如下发出：`RMAN> backup database;`


    `RMAN` 会分配三个通道，全部位于不同的挂载点（`/ora01`, `/ora02`, `/ora03`），并行写入指定位置。`RMAN` 会在这三个位置创建它认为创建数据库备份所必需的尽可能多的备份片。


    ## 6. 设置控制文件的自动备份


    您应该始终配置 `RMAN`，以便在运行任何 `RMAN BACKUP` 或 `COPY` 命令后，或者在您对数据库进行导致 `控制文件` 更新的物理更改（如添加/删除数据文件）后，自动备份
    `控制文件`。使用 `SHOW` 命令显示 `控制文件` 自动备份的当前设置：


    ```

    RMAN> show controlfile autobackup;

    ```


    这是一些示例输出：


    ```

    RMAN configuration parameters for database with db_unique_name O11R2 are:

    CONFIGURE CONTROLFILE AUTOBACKUP OFF;

    ```


    下面的代码行展示了如何启用 `控制文件` 自动备份功能：`RMAN> configure controlfile autobackup on;`'
- fmt: 'The automatic control-file backup always goes into its own backup set. When
    autobackup of the control file is enabled, if you''re using an `spfile`, it''s
    automatically backed up along with the control file.


    If for any reason you want to disable automatic backup of the control file, you
    can do so as follows:

    ```

    RMAN> configure controlfile autobackup off;

    ```


    `Note` If autobackup of the control file is off, then any time you back up datafile
    1 (SYSTEM tablespace datafile), `RMAN` automatically backs up the control file.


    ## Specifying the Location of the Autobackup of the Control File


    When you enable autobackup of the control file, `RMAN` creates the backup of the
    control file in one of the following locations:


    - Default location

    - `FRA`

    - Location specified via the `BACKUP` or `FORMAT` command


    If you aren''t using an `FRA` or if you haven''t specified a location for the
    control-file autobackups, the control-file autobackup is written to an OS-dependent
    default location. In many Linux/Unix environments, the default location is `ORACLE_HOME/dbs`.
    For example:

    ```

    /oracle/app/oracle/product/11.2.0/db_1/dbs/c-3453199553-20100907-04

    ```


    If you''ve enabled an `FRA`, then `RMAN` automatically writes the control-file
    autobackup files to directories in the `FRA` using an Oracle Managed File format
    for the name. For example:

    ```

    /<fra>/<db_name>/autobackup/<YYYY_MM_DD>/o1_mf_s_729103049_68fho9z2_.bkp

    ```

    I usually don''t use the default location or the `FRA` for control-file autobackups.
    I prefer these backups to be placed in the same directory the database backups
    are in. Here''s an example:

    ```

    RMAN> configure controlfile autobackup format for device type disk to

    ''/ora01/O11R2/rman/rman_ctl_%F.bk'';

    ```


    ## Backing Up Archive-Redo Logs


    You should back up your archive-redo logs on a regular basis. The archivelog files
    shouldn''t be removed from disk until you''ve backed them up at least once. I
    usually like to keep on disk any archive-redo logs that have been generated after
    the last good `RMAN` backup.


    Usually, I instruct `RMAN` to back up the archive-redo logs at the same time the
    datafiles are backed up. This is a sufficient strategy in most situations. Here
    is the command to back up the archive-redo logs along with the datafiles:

    ```

    RMAN> backup database plus archivelog;

    ```


    Sometimes, if your database generates a great deal of redo, you may need to back
    up your archive-redo logs at a different frequency than the datafiles. Sometimes
    DBAs back up the archive-redo logs two or three times a day; after the logs are
    backed up, the DBAs delete them to make room for more current archivelog files.


    In most situations, you don''t need any archive-redo logs that were generated
    before your last good backup. For example, a datafile has experienced media failure,
    you need to restore the datafile from a backup and then apply any archive-redo
    logs that were generated during and after the backup of the datafile.


    On some occasions, you may need archive-redo logs that were generated before the
    last backup. For example, you may experience a media failure, attempt to restore
    your database from the last good backup, find corruption in that backup, and therefore
    need to restore from an older backup. At that point, you need a copy of all archive-redo
    logs that have been generated since that older backup was made.


    ## Determining the Location for the Snapshot Control File


    `RMAN` requires a read-consistent view of the control file for the following tasks:


    - Synchronizing with the recovery catalog

    - Backing up the current control file


    In these situations, `RMAN` creates a snapshot copy of the current control file
    that it uses as a read-consistent copy while it''s performing these tasks. This
    ensures that `RMAN` is working from a copy of the control file that isn''t being
    modified.


    The default location of the snapshot control file is OS-specific. On Linux platforms,
    the default location is `ORACLE_HOME/dbs/snapcf_@.f`. Notice that the default
    location isn''t in the `FRA` (even if you''ve implemented an `FRA`).


    You can display the current snapshot control file details using the `SHOW` command:

    ```

    RMAN> show snapshot controlfile name;

    ```


    Here''s some sample output:

    ```

    CONFIGURE SNAPSHOT CONTROLFILE NAME TO

    ''/oracle/app/oracle/product/11.2.0/db_1/dbs/snapcf_O11R2.f''; # default

    ```

    For most situations, the default location and format of the snapshot control file
    are sufficient. This file doesn''t use much space or have any intensive I/O requirements.
    I recommend that you use the default setting.


    If you have a good reason to configure the snapshot control file to a nondefault
    location, you can configure it as follows:

    ```

    RMAN> configure snapshot controlfile name to ''/oradump/O11R2/snapcf.ctl'';

    ```


    You can set the snapshot control file back to the default like this:

    ```

    RMAN> configure snapshot controlfile name clear;

    ```


    ## Using a Recovery Catalog


    `RMAN` always stores its latest backup operations in the target database control
    file. You can set up an optional recovery catalog to store metadata regarding
    `RMAN` backups. The recovery catalog is a separate schema (usually in a different
    database than the target database) that contains database objects (tables, indexes,
    and so on) that store the `RMAN` backup information. The recovery catalog doesn''t
    store `RMAN` backup pieces—only backup metadata.


    The main advantages of using a recovery catalog are as follows:


    - Provides a secondary repository for `RMAN` metadata. If you lose all your control
    files and backups of your control files, you can still retrieve `RMAN` metadata
    from the recovery catalog.

    - Stores `RMAN` metadata for a much longer period than is possible when you just
    use a control file for the repository.

    - Provides access to all `RMAN` features. Some restore and recovery features are
    simpler when using a recovery catalog.


    The disadvantages of using a recovery catalog are that this is another database
    you have to set up, maintain, and back up. When you start a backup and attempt
    to connect to the recovery catalog, if the recovery catalog isn''t available for
    any reason (server down, network issues, and so on), you must decide whether you
    want to continue with the backup without a recovery catalog.


    You must also be aware of versioning aspects when using a recovery catalog. You
    need to make sure the version of the database you use to store the recovery catalog
    is compatible with the version of the target database. When you upgrade a target
    database, be sure the recovery catalog is upgraded (if necessary).


    `Note` See the last section in this chapter for details on how to implement a
    recovery catalog.


    `RMAN` works fine with or without a recovery catalog. For most of the databases
    I maintain, I don''t use a recovery catalog; this eliminates having to set it
    up and maintain it. For me, simplicity takes precedence over the features available
    with the recovery catalog.


    However, if you have good business reasons to use a recovery catalog, then implement
    and use one. The recovery catalog isn''t that difficult to set up and maintain,
    and Oracle recommends that you use it.


    ## Using a Media Manager


    A media manager is required for `RMAN` to back up directly to tape. Several vendors
    provide this feature (for a cost). Media managers are used in large database environments
    like data warehouses where you may not have enough room to back up a database
    to disk. You may also have a disaster-recovery requirement to back up directly
    to tape.


    If you have such requirements, then you should purchase a media-management package
    and implement it. If you don''t need to back up directly to tape, there''s no
    need to implement a media manager. `RMAN` works fine backing up directly to disk.'
