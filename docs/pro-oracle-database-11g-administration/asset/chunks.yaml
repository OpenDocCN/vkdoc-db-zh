  raw: 'SQL> exec dbms_scheduler.set_scheduler_attribute(''log_history'',15); To completely
    remove the contents of the log history, use the PURGE_LOG procedure: SQL> exec
    dbms_scheduler.purge_log();


    Modifying a Job


    You can modify various attributes of a job via the SET_ATTRIBUTE procedure. This
    example modifies the RMAN_BACKUP job to run weekly on Monday:


    BEGIN


    dbms_scheduler.set_attribute(


    name=>''RMAN_BACKUP''


    ,attribute=>''repeat_interval''


    ,value=>''freq=weekly; byday=mon'');


    END;


    /


    For this particular example, you can verify the change by selecting the REPEAT_INTERVAL
    column from DBA_SCHEDULER_JOBS. The following is the output from running query
    from the prior section of Viewing Job Details:


    JOB_NAME LAST_START_DATE LAST_RUN_DURATION NEXT_RUN_DATE REPEAT_INTERVAL


    ----------- --------------- ----------------- ----------------- -----------------


    RMAN_BACKUP 21–OCT-10 02.12 +000000000 00:00: 25-OCT-10 12.00.0 freq=weekly; byda


    .59.257151 PM - 41.933585 0.500000 AM -06:0 y=mon


    06:00 0


    From the prior output, the job will run on the next Monday, and since there was
    no BYHOUR and BYMINUTE options specified (when modifying the job), it is now scheduled
    to run at the default time of 12:00 a.m.


    Stopping a Job


    If you have a job that has been running for an abnormally long time, you may want
    to abort it. Use the STOP_JOB procedure to stop a currently running job. This
    example stops the RMAN_BACKUP job while it is running:


    SQL> exec dbms_scheduler.stop_job(job_name=>''RMAN_BACKUP'');


    CHAPTER 21 ■ AUTOMATING JOBS


    The STATUS column of DBA_SCHEDULER_JOB_LOG will show STOPPED for jobs stopped
    using the STOP_JOB


    procedure.


    Disabling a Job


    You may want to temporarily disable a job because it''s not running correctly.
    You want to ensure that the job does not run while you''re troubleshooting the
    issue. Use the DISABLE procedure to disable a job: SQL> exec dbms_scheduler.disable(''RMAN_BACKUP'');


    If the job is currently running, consider stopping the job first or using the
    FORCE option of the DISABLE procedure:


    SQL> exec dbms_scheduler.disable(name=>''RMAN_BACKUP'',force=>true); Enabling
    a Job


    You can enable a previously disabled job via the ENABLE procedure of the DBMS_SCHEDULER
    package. This example re-enables the RMAN_BACKUP job:


    SQL> exec dbms_scheduler.enable(name=>''RMAN_BACKUP'');


    ■ **Tip** You can check to see if a job has been disabled or enabled by selecting
    the ENABLED column from DBA_SCHEDULER_JOBS.


    Copying a Job


    If you have a current job that you want to clone, you can use the COPY_JOB procedure
    to accomplish this.


    This procedure takes two arguments: the old job name and the new job name. Here''s
    an example of copying a job where RMAN_BACKUP is a previously created job and
    RMAN_NEW_BACK is the new job that will be created:


    begin


    dbms_scheduler.copy_job(''RMAN_BACKUP'',''RMAN_NEW_BACK'');


    end;


    /


    The copied job will be created but not enabled. You must enable the job first
    (see the prior section in this chapter) before it will run.


    Running a Job Manually


    You can manually run a job outside of its regular schedule. You might want to
    do this to test the job to ensure that it''s working correctly. Use the RUN_JOB
    procedure to manually initiate a job. This example manually runs the previously
    created RMAN_BACKUP job:


    CHAPTER 21 ■ AUTOMATING JOBS


    BEGIN


    DBMS_SCHEDULER.RUN_JOB(


    JOB_NAME => ''RMAN_BACKUP'',


    USE_CURRENT_SESSION => FALSE);


    END;


    /


    The USE_CURRENT_SESSION parameter instructs Oracle Scheduler to run the job as
    the current user (or not). A value of FALSE means run the job as the user it would
    run as when regularly scheduled (asynchronously).


    Deleting a Job


    If you no longer require a job, you should delete it from the scheduler. Use the
    DROP_JOB procedure to permanently remove a job. This example removes the RMAN_BACKUP
    job:


    BEGIN


    dbms_scheduler.drop_job(job_name=>''RMAN_BACKUP'');


    END;


    /


    The code will drop the job and remove any information regarding the dropped job
    from the DBA_SCHEDULER_JOBS view.


    Oracle Scheduler versus cron


    DBAs often debate whether they should use Oracle Scheduler or the Linux/Unix cron
    utility for scheduling and automating tasks. The benefits that Oracle Scheduler
    has over cron include the following:


    • Can make the execution of a job dependent on the completion of another job


    • Robust resource balancing and flexible scheduling features


    • Can run jobs based on a database event


    • The Oracle Scheduler DBMS_SCHEDULER PL/SQL package syntax works the same regardless
    of the OS


    • Can run status reports using the data dictionary


    • If working in clustered environment, no need to worry about synchronizing multiple
    cron tables for each node in the cluster


    • Can be maintained and monitored via Enterprise Manager


    The Oracle Scheduler is implemented via the DBMS_SCHEDULER PL/SQL package. It''s
    fairly easy to create and maintain jobs using this utility (as shown previously
    in this chapter). While Oracle Scheduler has many benefits, many DBAs prefer to
    use a scheduling utility such as cron. The advantages of using cron include the
    following:


    CHAPTER 21 ■ AUTOMATING JOBS


    • Easy to use; simple, tried and true; only takes seconds to create and/or modify
    jobs


    • Almost universally available on all Linux/Unix boxes; for the most part, runs
    nearly identically regardless of the Linux/Unix platform (yes, there are minor
    differences)


    • Database agnostic; operates independently of the database and works the same
    regardless of the database vendor or database version


    • Works whether the database is available or not


    The prior lists aren’t comprehensive, but should give you a flavor of the uses
    of each scheduling tool. I prefer to use cron, but if you require a more sophisticated
    scheduler, then consider using Oracle Scheduler. The following sections in this
    chapter provide information on how to implement and schedule automated jobs via
    cron.


    Automating Jobs via cron


    The cron program is a job-scheduling utility that is ubiquitous in Linux/Unix
    environments. This tool derives its name from *chronos* (the Greek word for time).
    The cron (the geek word for scheduler) tool allows you to schedule scripts or
    commands to run at a specified time and repeat at a designated frequency.


    How cron Works


    When your Linux server boots up, a cron background process is automatically started
    to manages all cron jobs on the system. The cron background process is also known
    as the cron daemon. This process is started on system startup by the /etc/init.d/crond
    script. You can check to see whether the cron daemon process is running with the
    ps command:


    $ ps -ef | grep crond | grep -v grep


    root 3049 1 0 Aug02 ? 00:00:00 crond


    You can also check to see whether the cron daemon is running using the service
    command: $ /sbin/service crond status


    crond (pid 3049) is running...


    The root user uses several files and directories when executing system cron jobs.
    The /etc/crontab file contains commands to run system cron jobs. Here is a typical
    listing of the contents of the


    /etc/crontab file:


    SHELL=/bin/bash


    PATH=/sbin:/bin:/usr/sbin:/usr/bin


    MAILTO=root


    HOME=/'
