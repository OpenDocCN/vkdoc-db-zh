    \n# Filesystem check\n7 * * * * /orahome/bin/filesp.bsh 1>/orahome/bin/log/filesp.log\
    \ 2>&1\n\n## login.sql\n\nUse this script to customize aspects of your SQL*Plus\
    \ environment. When logging in to SQL*Plus, in Linux/Unix, the `login.sql` script\
    \ is automatically executed if it exists in a directory contained within the `SQLPATH`\
    \ variable. If the `SQLPATH` variable hasn’t been defined, then SQL*Plus looks\
