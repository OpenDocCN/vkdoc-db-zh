    1\. Shut down your database:


    SQL> shutdown immediate;


    2\. Edit your init.ora file with an OS utility (such as vi), and add the new controlfile
    location and name to the CONTROL_FILES parameter. This example opens the init.ora
    file using vi, and adds control02.ctl to the CONTROL_FILES parameter: $ vi $ORACLE_HOME/dbs/initO11R2.ora


    Listed next is the CONTROL_FILES parameter after control02.ctl is added: control_files=''/ora01/dbfile/O11R2/control01.ctl'',


    ''/ora01/dbfile/O11R2/control02.ctl''


    CHAPTER 5 ■ MANAGING CONTROL FILES AND ONLINE REDO LOGS


    3\. From the OS, copy the existing control file to the location and name of the
    control file being added:


    $ cp /ora01/dbfile/O11R2/control01.ctl /ora01/dbfile/O11R2/control02.ctl 4\. Start
