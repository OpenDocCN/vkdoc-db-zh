    Use the following script to check for an operating mount point that is filling
    up. Place the script in a directory such as HOME/bin. You need to modify the script
    so that the mntlist variable contains a list of mount points that exist on your
    database server. Because this script isn’t running any Oracle utilities, there
    is no reason to set the Oracle-related operating system variables (as with the
    previous shell scripts):


    #!/bin/bash


    mntlist="/orahome /oraredo /oraarch /ora01 /oradump01 /"


    for ml in $mntlist


    do


    echo $ml


    usedSpc=$(df -h $ml | awk ''{print $5}'' | grep -v capacity | cut -d "%" -f1 -)
    BOX=$(uname -a | awk ''{print $2}'')


    #


    case $usedSpc in


    [0-9])


    arcStat="relax, lots of disk space: $usedSpc"


    ;;


    [1-7][0-9])


    arcStat="disk space okay: $usedSpc"


    ;;


    [8][0-9])


    arcStat="space getting low: $usedSpc"


    echo $arcStat | mailx -s "space on: $BOX" dkuhn@sun.com


    ;;


    [9][0-9])


    arcStat="warning, running out of space: $usedSpc"


    echo $arcStat | mailx -s "space on: $BOX" dkuhn@sun.com


    ;;


    [1][0][0])


    arcStat="update resume, no space left: $usedSpc"


    echo $arcStat | mailx -s "space on: $BOX" dkuhn@sun.com


    ;;


    *)


    arcStat="huh?: $usedSpc"


    esac


    #


    BOX=$(uname -a | awk ''{print $2}'')


    echo $arcStat


    #


    done


    #


    exit 0


