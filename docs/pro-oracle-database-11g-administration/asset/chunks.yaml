- fmt: "# 配置 RMAN：从决策到实践\n\n## 配置操作系统限制参数\n\n如果你对可以同时打开的文件数量有限制，可以通过 `MAXOPENFILES`\
    \ 参数指定最大打开文件数：\n\n```sql\nRMAN> configure channel 1 device type disk maxopenfiles\
    \ 32;\n```\n\n你可能需要在让 RMAN 感知到某些操作系统或硬件限制时配置这些设置。你很少需要使用这些参数，但应该了解它们。\n\n## 从决策过渡到行动\n\
    \n既然你已经很好地理解了在实施 RMAN 之前应该做出哪些决策，查看一个实现了其中一些组件的脚本会很有指导意义。我主要使用 Linux/Unix 服务器。在这些环境中，我使用\
    \ `shell scripts` 来自动化 RMAN 备份。这些 `shell scripts` 通过 `cron` 这样的调度工具实现自动化。\n\n\
    ## RMAN 备份脚本示例\n\n本节包含一个典型的用于 RMAN 备份的 `shell script`。该脚本在输出中带有行号，便于在讨论编写脚本时所做的架构决策时进行参考。\n\
    \n（如果你复制该脚本，请在运行前去掉行号。）以下是脚本。表 17–2 详细说明了本章涵盖的每个 RMAN 架构决策点，它在 `shell script`\
    \ 中如何实现（或未实现），以及 `shell script` 中的对应行号。该脚本并未涵盖使用 RMAN 的所有方面。如果你使用该脚本，请务必根据你自身环境的需求和\
    \ RMAN 标准对其进行修改：\n\n```bash\n#!/bin/bash\n\nHOLDSID=${1} # SID name\nPRG=`basename\
    \ $0`\nUSAGE=\"Usage: ${PRG} <database name> \"\n\nif [ -z \"${HOLDSID}\" ]; then\n\
    \    echo \"${USAGE}\"\n    exit 1\nfi\n\n#----------------------------------------------\n\
    # source environment variables (see Chapter 2 for details on oraset)\n. /var/opt/oracle/oraset\
    \ $HOLDSID\n\nBOX=`uname -a | awk '{print$2}'`\nMAILX='/bin/mailx'\nMAIL_LIST='larry@oracle.com'\n\
    NLS_DATE_FORMAT='dd-mon-yy hh24:mi:ss'\ndate\n\n#----------------------------------------------\n\
    LOCKFILE=/tmp/$PRG.lock\n\nif [ -f $LOCKFILE ]; then\n    echo \"lock file exists,\
    \ exiting...\"\n    exit 1\nelse\n    echo \"DO NOT REMOVE, $LOCKFILE\" > $LOCKFILE\n\
    fi\n\n#----------------------------------------------\nrman nocatalog <<EOF\n\
    connect target /\nset echo on;\nshow all;\n\n# Synchronize RMAN with files on\
    \ OS\ncrosscheck backup;\ncrosscheck copy;\ncrosscheck archivelog all;\n\n# Configure\
    \ environment, redundant to run each time, but ensures set correctly.\nconfigure\
    \ controlfile autobackup on;\nconfigure controlfile autobackup format for device\
    \ type disk to '/oradump01/DWREP/rman/rman_ctl_%F.bk';\nconfigure retention policy\
    \ to redundancy 1;\nconfigure device type disk parallelism 5;\nconfigure channel\
    \ 1 device type disk format '/ora08/DWREP/rman/rman1_%U.bk';\nconfigure channel\
    \ 2 device type disk format '/ora08/DWREP/rman/rman2_%U.bk';\nconfigure channel\
    \ 3 device type disk format '/ora08/DWREP/rman/rman3_%U.bk';\nconfigure channel\
    \ 4 device type disk format '/ora09/DWREP/rman/rman4_%U.bk';\nconfigure channel\
    \ 5 device type disk format '/ora09/DWREP/rman/rman5_%U.bk';\n\n# Backup datafiles,\
    \ archive redo logs, and control file\nbackup as compressed backupset incremental\
    \ level=0 database plus archivelog;\n\n# Delete obsolete backups and archive logs\
    \ as defined by retention policy.\ndelete noprompt obsolete;\nEOF\n\n#----------------------------------------------\n\
    if [ $? -ne 0 ]; then\n    echo \"RMAN problem...\"\n    echo \"Check RMAN backups\"\
    \ | $MAILX -s \"RMAN issue: $ORACLE_SID on $BOX\" $MAIL_LIST\nelse\n    echo \"\
    RMAN ran okay...\"\nfi\n\n#----------------------------------------------\nsqlplus\
    \ -s /nolog <<EOF\nconnect / as sysdba;\nalter database backup controlfile to\
    \ trace;\nCOL dbid NEW_VALUE hold_dbid\nSELECT dbid FROM v\\$database;\nexec dbms_system.ksdwrt(2,'DBID:\
    \ '||TO_CHAR(&hold_dbid));\nEXIT\nEOF\n\n#----------------------------------------------\n\
    if [ -f $LOCKFILE ]; then\n    rm $LOCKFILE\nfi\n\n#----------------------------------------------\n\
    date\n```"
