    Creating Shortcuts for Frequently Used Commands


    In Linux/Unix environments, you can use two common methods to create shortcuts
    to other commands: create aliases for often-repeated commands, and use functions
    to create a shortcut for a group of commands. The following sections describe
    ways you can use these two techniques.


    Using Aliases


    You’ll often need to navigate to various directories on a server. For example,
    one such location is the database background process-logging directory. To navigate
    to this directory, you have to type something similar to this:


    $ cd /ora01/app/oracle/admin/O10R24/bdump


    You can use the alias command to create a shortcut to accomplish the same task.
    An *alias* is a simple mechanism for creating a short piece of text that executes
    other shell commands. This example creates an alias named bdump that changes directories
    to a background location that is dependent on the value of the ORACLE_SID variable:


    $ alias bdump=''cd /ora01/app/oracle/admin/$ORACLE_SID/bdump''


    Now you can type bdump, which does the same thing as changing your current working
    directory to the Oracle background dump directory.


    To show all aliases that have been defined, use the alias command with no arguments:
    $ alias


    Listed next are some common examples of alias definitions you can use: alias l.=''ls
    -d .*''


    CHAPTER 3 ■ CONFIGURING AN EFFICIENT ENVIRONMENT


    alias ll=''ls -l''


    alias lsd=''ls -altr | grep ^d''


    alias bdump=''cd /ora01/app/oracle/admin/$ORACLE_SID/bdump''


    alias sqlp=''sqlplus "/ as sysdba"''


    alias shutdb=''echo "shutdown immediate;" | sqlp''


    alias startdb=''echo "startup;" | sqlp''


    If you want to remove an alias definition from your current environment, use the
    unalias command. The following example removes the alias for lsd:


    $ unalias lsd


    Using a Function


    You can also use a function to create command shortcuts. The following line of
    code creates a simple function named bdump:


    $ function bdump { cd /ora01/app/oracle/admin/$ORACLE_SID/bdump; }


    You can now type bdump at the command line to change your working directory to
    the Oracle background dump directory.


    Using functions is usually preferable over using aliases. Functions are more powerful
    than aliases because of features such as the ability to operate on parameters
    passed in on the command line, and allowing for complex coding.


    To demonstrate the power of functions, consider a scenario in which you have different
    versions of databases installed on a server, and the background-dump destination
    differs depending on the version.


    With a function, you can build in the logic that checks to see which version of
    the database you’re using and navigates accordingly:


    function bdump {


    echo $ORACLE_HOME | grep 11 >/dev/null


    if [ $? -eq 0 ]; then


    lower_sid=$(echo $ORACLE_SID | tr ''[:upper:]'' ''[:lower:]'')


    cd $ORACLE_BASE/diag/rdbms/$lower_sid/$ORACLE_SID/trace


    else


    cd $ORACLE_BASE/admin/$ORACLE_SID/bdump


    fi


    } # bdump


    The previous lines of function code would be difficult to replicate using an alias.
    With functions, you can code as much logic as you need and pass in variables if
    required.


    DBAs commonly establish functions by setting them in the HOME/.bashrc file. A
    better way to manage functions is to create a file that stores only function code,
    and call that file from the .bashrc file.


    It’s also better to store special-purpose files in directories that you’ve created
    for these files. For example, create a directory named bin under HOME; in the
    bin directory, create a file named dba_fcns; and place in it your function code.
    Now, call the dba_fcns file from the .bashrc file. Here is an example of an entry
    in a .bashrc file:


    CHAPTER 3 ■ CONFIGURING AN EFFICIENT ENVIRONMENT


    . $HOME/bin/dba_fcns


    Listed next is a small sample of some of the types of functions you can use:


