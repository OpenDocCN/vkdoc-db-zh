    !cp /ora01/dbfile/O11R2/sysaux01.dbf /oradump/hbackup/O11R2

    !cp /ora02/dbfile/O11R2/undotbs01.dbf /oradump/hbackup/O11R2

    !cp /ora02/dbfile/O11R2/users01.dbf /oradump/hbackup/O11R2

