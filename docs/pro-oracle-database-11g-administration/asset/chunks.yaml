- fmt: '# RMAN Backups and Reporting


    ## RMAN Backup Types


    The default backup mode of RMAN instructs it to only back up blocks that have
    been used in a datafile; these are known as backup sets. RMAN can also make byte-for-byte
    copies of the datafiles; these are known as image copies. Creating a backup set
    is the default type of backup that RMAN creates. The next command creates a backup
    set backup of the database:


    ```

    RMAN> backup database;

    ```


    If you prefer, you can explicitly place the `AS BACKUPSET` command when creating
    backups:


    ```

    RMAN> backup as backupset database;

    ```


    You can instruct RMAN to create image copies by using the `AS COPY` command. The
    following creates image copies of every datafile in the database:


    ```

    RMAN> backup as copy database;

    ```


    Since image copies are identical copies of the datafiles, they can be directly
    accessed by the DBA with operating system commands. For example, say you had a
    media failure and you didn''t want to use RMAN to restore an image copy. You could
    use an operating system command to copy the image copy of a datafile to a location
    where it can be used by the database, whereas a backup set consists of binary
    files that only the RMAN utility can write to or read from.


    I prefer to use backup sets when working with RMAN. The backup sets tend to be
    smaller than the datafiles and can have true binary compression applied to them.
    Also, I don’t find it inconvenient to use RMAN as the mechanism for creating backup
    files that only RMAN can restore. Using RMAN with backup sets is efficient and
    very reliable.


    ## Backing up Tablespaces


    RMAN has the ability to back up at the entire database level (as shown in prior
    examples), the tablespace level, or even more granularly at the datafile level.
    When you back up a tablespace, RMAN backs up any datafiles associated with the
    tablespaces(s) that you specify. For example, the following command will back
    up all of the datafiles associated with the `SYSTEM` and `SYSAUX` tablespaces:


    ```

    RMAN> backup tablespace system, sysaux;

    ```


    One scenario where I back up at the tablespace level is if I''ve recently created
    a new tablespace and want to take a backup of just the datafiles (associated with
    the newly added tablespace). Note that when troubleshooting backup and recovery
    issues, it''s often more efficient to work with one tablespace (because it''s
    usually much faster to back up one tablespace than the entire database).


    ## Backing up Datafiles


    You may occasionally need to back up individual datafiles. For example, when troubleshooting
    issues with backups, it''s often helpful to attempt to successfully backup one
    datafile. You can specify datafiles by filename or by file number like so:


    ```

    RMAN> backup datafile ''/ora01/dbfile/O11R2/system01.dbf'';

    ```


    Here''s an example where file numbers are specified:


    ```

    RMAN> backup datafile 1,3;

    ```


    Here are some other examples of backing up datafiles using various features:


    ```

    RMAN> backup as copy datafile 3;

    ```


    ```

    RMAN> backup incremental level 1 datafile 4;

    ```


    > **Tip** Use the `REPORT SCHEMA` command to list tablespace, datafile name, and
    datafile number information.


    ## Backing up the Control File


    The most reliable way to back up the control file is to configure the autobackup
    feature:


    ```

    RMAN> configure controlfile autobackup on;

    ```


    This command ensures that the control file is automatically backed up when a `BACKUP`
    or `COPY` command is issued. I usually enable the autobackup of the control file
    feature and then never worry about explicitly issuing a separate command to back
    up the control file. When in this mode, the control file is always created in
    its own backup set and backup piece after the datafile backup pieces have been
    created.


    If you need to manually back up the control file, you can do so like this:


    ```

    RMAN> backup current controlfile;

    ```


    The location of the backup is either a default operating system location, the
    FRA (if using), or a manually configured location. As shown in Chapter 17, I prefer
    to set the location of the control file backup piece to the same location as the
    datafile backups:


    ```

    RMAN> configure controlfile autobackup format for device type disk to ''/ora01/O11R2/rman/rman_ctl_%F.bk'';

    ```


    ## Backing up the Spfile


    If you have enabled the autobackup of the control file feature, the spfile will
    be backed up automatically (along with the control file) anytime a `BACKUP` or
    `COPY` command is issued. If you need to manually back up the spfile, use the
    following command:


    ```

    RMAN> backup spfile;

    ```


    The location of the file that contains the backup of the spfile is dependent on
    what you have configured. By default, if you don''t use a FRA and you haven''t
    explicitly configured a location via a channel, then for Linux/Unix servers the
    backup goes to the `$ORACLE_HOME/dbs` directory.


    > **Note** RMAN can only back up the spfile if the instance was started using
    a spfile.


    ## Backing up Archive Redo Logs


    I don''t usually back up the archive redo logs separately from the database backups.
    As mentioned earlier, I normally back up the database files and the archive redo
    log files by using the following command:


    ```

    RMAN> backup incremental level=0 database plus archivelog;

    ```


    However, you will occasionally find yourself in a situation where you need to
    take a special one off backup of the archive redo logs. You can issue the following
    command to back up the archive redo logs files:


    ```

    RMAN> backup archivelog all;

    ```


    If you have a mount point that is nearly full and you determine that you want
    to back up the archive redo logs (so that they exist in a backup file) but then
    you want to immediately delete the archive redo log files (that were just backed
    up) from disk, you can use the following syntax to back up the archive redo logs
    and then have RMAN delete them from the storage media:


    ```

    RMAN> backup archivelog all delete input;

    ```


    Listed next are some other ways in which you can back up the archive redo log
    files:


    ```

    RMAN> backup archivelog sequence 300;

    ```


    ```

    RMAN> backup archivelog sequence between 300 and 400 thread 1;

    ```


    ```

    RMAN> backup archivelog from time "sysdate-7" until time "sysdate-1";

    ```


    If an archive redo log has been removed from disk manually via an operating system
    delete command, RMAN will throw the following error when attempting to back up
    the non-existent archive redo log file:


    ```

    RMAN-06059: expected archived log not found, loss of archived log compromises
    recoverability

    ```


    In this situation, first run a `CROSSCHECK` command to let RMAN know which files
    are physically available on disk:


    ```

    RMAN> crosscheck archivelog all;

    ```


    ## Backing up Fast Recovery Area


    If you use a fast recovery area, one nice RMAN feature is that you can back up
    all of the files in that location with one command. If you''re using a media manager
    and have a tape backup channel enabled, you can back up everything in the fast
    recovery area to tape like this:


    ```

    RMAN> configure channel device type sbt_tape parms ''ENV=(OB_MEDIA_FAMILY=RMAN-DB11R2)'';

    ```


    ```

    RMAN> backup device type sbt_tape recovery area;

    ```


    You can also back up the fast recovery area to a location on disk. Use the `TO
    DESTINATION` command to accomplish this:


    ```

    RMAN> backup recovery area to destination ''/ora01/O11R1/fra_back'';

    ```


    RMAN will automatically create directories as required beneath the directory specified
    by the `TO DESTINATION` command.


    > **Note** The format of the subdirectory under the directory `<TO_DESTINATION>`
    is `<SID>/backupset_<YYYY_MM_DD>`. RMAN will back up full backups, incremental
    backups, control file autobackups, and archive redo log files. Keep in mind that
    flashback logs, online redo log files, and the current control file are not backed
    up.


    ## Excluding Tablespaces from Backups


    Suppose you have a tablespace that contains non-critical data and you don''t ever
    want to back it up.'
  raw: 'The default backup mode of RMAN instructs it to only back up blocks that have
    been used in a datafile; these are known as backup sets. RMAN can also make byte-for-byte
    copies of the datafiles; these are known as image copies. Creating a backup set
    is the default type of backup that RMAN creates. The next command creates a backup
    set backup of the database:


    RMAN> backup database;


    If you prefer, you can explicitly place the AS BACKUPSET command when creating
    backups: RMAN> backup as backupset database;


    You can instruct RMAN to create image copies by using the AS COPY command. The
    following creates image copies of every datafile in the database:


    RMAN> backup as copy database;


    Since image copies are identical copies of the datafiles, they can be directly
    accessed by the DBA with operating system commands. For example, say you had a
    media failure and you didn''t want to use 490


    CHAPTER 18 ■ RMAN BACKUPS AND REPORTING


    RMAN to restore an image copy. You could use an operating system command to copy
    the image copy of a datafile to a location where it can be used by the database,
    whereas a backup set consists of binary files that only the RMAN utility can write
    to or read from.


    I prefer to use backup sets when working with RMAN. The backup sets tend to be
    smaller than the datafiles and can have true binary compression applied to them.
    Also, I don’t find it inconvenient to use RMAN as the mechanism for creating backup
    files that only RMAN can restore. Using RMAN with backup sets is efficient and
    very reliable.


    Backing up Tablespaces


    RMAN has the ability to back up at the entire database level (as shown in prior
    examples), the tablespace level, or even more granularly at the datafile level.
    When you back up a tablespace, RMAN backs up any datafiles associated with the
    tablespaces(s) that you specify. For example, the following command will back
    up all of the datafiles associated with the SYSTEM and SYSAUX tablespaces: RMAN>
    backup tablespace system, sysaux;


    One scenario where I back up at the tablespace level is if I''ve recently created
    a new tablespace and want to take a backup of just the datafiles (associated with
    the newly added tablespace). Note that when troubleshooting backup and recovery
    issues, it''s often more efficient to work with one tablespace (because it''s
    usually much faster to back up one tablespace than the entire database).


    Backing up Datafiles


    You may occasionally need to back up individual datafiles. For example, when troubleshooting
    issues with backups, it''s often helpful to attempt to successfully backup one
    datafile. You can specify datafiles by filename or by file number like so:


    RMAN> backup datafile ''/ora01/dbfile/O11R2/system01.dbf'';


    Here''s an example where file numbers are specified:


    RMAN> backup datafile 1,3;


    Here are some other examples of backing up datafiles using various features: RMAN>
    backup as copy datafile 3;


    RMAN> backup incremental level 1 datafile 4;


    ■ **Tip** Use the RMAN REPORT SCHEMA command to list tablespace, datafile name,
    and datafile number information.


    Backing up the Control File


    The most reliable way to back up the control file is to configure the autobackup
    feature: RMAN> configure controlfile autobackup on;


    This command ensures that the control file is automatically backed up when a BACKUP
    or COPY


    command is issued. I usually enable the autobackup of the control file feature
    and then never worry 491


    CHAPTER 18 ■ RMAN BACKUPS AND REPORTING


    about explicitly issuing a separate command to back up the control file. When
    in this mode, the control file is always created in its own backup set and backup
    piece after the datafile backup pieces have been created.


    If you need to manually back up the control file, you can do so like this: RMAN>
    backup current controlfile;


    The location of the backup is either a default operating system location, the
    FRA (if using), or a manually configured location. As shown in Chapter 17, I prefer
    to set the location of the control file backup piece to the same location as the
    datafile backups:


    RMAN> configure controlfile autobackup format for device type disk to


    ''/ora01/O11R2/rman/rman_ctl_%F.bk'';


    Backing up the Spfile


    If you have enabled the autobackup of the control file feature, the spfile will
    be backed up automatically (along with the control file) anytime a BACKUP or COPY
    command is issued. If you need to manually back up the spfile, use the following
    command:


    RMAN> backup spfile;


    The location of the file that contains the backup of the spfile is dependent on
    what you have configured. By default, if you don''t use a FRA and you haven''t
    explicitly configured a location via a channel, then for Linux/Unix servers the
    backup goes to the ORACLE_HOME/dbs directory.


    ■ **Note** RMAN can only back up the spfile if the instance was started using
    a spfile.


    Backing up Archive Redo Logs


    I don''t usually back up the archive redo logs separately from the database backups.
    As mentioned earlier, I normally back up the database files and the archive redo
    log files by using the following command:


    RMAN> backup incremental level=0 database plus archivelog;


    However, you will occasionally find yourself in a situation where you need to
    take a special one off backup of the archive redo logs. You can issue the following
    command to back up the archive redo logs files:


    RMAN> backup archivelog all;


    If you have a mount point that is nearly full and you determine that you want
    to back up the archive redo logs (so that they exist in a backup file) but then
    you want to immediately delete the archive redo log files (that were just backed
    up) from disk, you can use the following syntax to back up the archive redo logs
    and then have RMAN delete them from the storage media:


    RMAN> backup archivelog all delete input;


    Listed next are some other ways in which you can back up the archive redo log
    files: RMAN> backup archivelog sequence 300;


    CHAPTER 18 ■ RMAN BACKUPS AND REPORTING


    RMAN> backup archivelog sequence between 300 and 400 thread 1;


    RMAN> backup archivelog from time "sysdate-7" until time "sysdate-1"; If an archive
    redo log has been removed from disk manually via an operating system delete command,
    RMAN will throw the following error when attempting to back up the non-existent
    archive redo log file:


    RMAN-06059: expected archived log not found, loss of archived log compromises
    recoverability In this situation, first run a CROSSCHECK command to let RMAN know
