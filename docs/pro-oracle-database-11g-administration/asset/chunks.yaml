  trans: "\n对于基于目录的恢复，您可以浏览 OSB 目录来确定并验证要恢复的文件。在以下示例中，您希望恢复客户端主机 `BLLNX1` 的文件 `/home/oracle/scripts/rmanbkup.sh`。要使用\
    \ OSB 目录恢复文件，请执行以下步骤：\n\n1.  将主机变量设置为源主机 `BLLNX1`。\n    ```\n    ob> set host\
    \ BLLNX1\n    ```\n\n2.  执行 `cd` 命令导航到目录。\n    ```\n    ob> cd /home/oracle/scripts\n\
    \    ```\n\n3.  执行 `ls` 命令以验证目录中的文件。\n    ```\n    ob> ls -l rmanbkup.sh\n   \
    \ ```\n    输出：\n    ```\n    -rwxr-xr-x oracle.oinstall 782 2010/01/13.18:14 rmanbkup.sh\
    \ (0)\n    ```\n\n4.  执行 `restore` 命令。\n    ```\n    ob> restore '/home/oracle/scripts/rmanbkup.sh'\
    \ --go\n    ```\n要监视恢复作业，请参阅 OSB 作业监视部分（本章稍后介绍）。\n\n## 执行原始恢复\n要使用原始恢复来恢复数据，您必须知道从中提取数据的卷\
    \ ID 和文件编号。但是，如果您知道备份使用的特定介质系列，可以使搜索变得更容易一些。\n\n在以下示例中，您将从具有介质系列 `APRESS_OS` 的磁带卷中恢复文件\
    \ `/home/oracle/scripts/rmanbkup.sh`。\n\n1.  执行带有 `--contents` 选项的 `lsvol` 命令，以显示与介质系列\
    \ `APRESS_OS` 关联的卷的内容：\n    ```\n    ob> lsvol --contents --family APRESS_OS --nobarcode\n\
    \    ```\n    输出：\n    ```\n    VOID OOID Seq Volume ID Family Created Attributes\n\
    \    2845 2845 1 APRESS_OS-000001 APRESS_OS 10/21.04:41 open; closes 10/28.04:41\n\
    \n    BSOID File Sect Level Host Size Created Attributes\n    31250 1 1 0 BLLNX1\
    \ 208.6 MB 10/21.04:41\n    31258 2 1 0 BLLNX1 208.8 MB 10/21.06:04\n    31260\
    \ 3 1 0 BLLNX1 210.1 MB 10/21.12:23\n    31261 4 1 0 BLLNX1 210.1 MB 10/21.12:34\n\
    \    ```\n\n2.  根据上面的输出，您希望从 `10/21.06:04`（即 10 月 21 日上午 6:04）进行的备份恢复。相应的文件编号是\
    \ `2`，卷 ID 是 `APRESS_OS-000001`。执行以下 `restore` 命令，如图所示。`-R` 选项表示原始恢复操作，不使用 OSB\
    \ 目录，而 `–F` 选项表示文件编号，`–v` 选项表示卷 ID。\n    ```\n    ob> restore -R -F 2 -v APRESS_OS-000001\
    \ /home/oracle/scripts/rmanbkup.sh --go\n    ```\n要监视恢复作业，请参阅本章的“OSB 作业监视部分”。\n\
    \n## 执行 obtar 恢复\n当您运行 OSB 恢复时，它们实际上会在后台转换为 `obtar` 命令。`obtar` 命令在操作系统级别发出。由于需要提供卷\
    \ ID 和文件编号（这些信息并非随时可用，尤其是在无法访问 OSB 目录时），`obtar` 命令很少用于执行恢复操作。\n\n在以下示例中，您将从卷 ID\
    \ 为 `APRESS_OS-000001`、文件编号为 `2` 的磁带恢复文件 `/home/oracle/scripts/rmanbkup.sh`。\n\
    \n1.  执行 `loadvol` 命令，手动将卷 ID 为 `APRESS_OS-000001` 的磁带加载到可用的磁带驱动器。这里我使用了磁带驱动器\
    \ `vdrive8`。\n    ```\n    ob> loadvol -D vdrive8 --volume APRESS_OS-000001\n\
    \    ```\n\n2.  要检查磁带的内容，请执行带有 `-t` 选项的 `obtar` 命令。\n    ```\n    $ obtar -t -f\
    \ vdrive8\n    ```\n\n3.  要使用 `obtar` 命令执行恢复操作，请执行带有 `-x` 选项的以下命令。`-F` 选项表示文件编号，`-k`\
    \ 选项避免覆盖现有文件。\n    ```\n    $ obtar -F 2 -x -f vdrive8 -k /home/oracle/scripts/rmanbkup.sh\n\
    \    ```\n\n4.  由于您使用在操作系统级别执行的 `obtar` 命令进行恢复，因此无法使用 `obtool` 实用程序监视恢复作业。但是，验证文件是否已恢复的一种方法是执行\
    \ `ls` 操作系统命令。\n    ```\n    $ ls -l /home/oracle/scripts/rmanbkup.sh\n    ```\n\
    \n## OSB 作业监视\n您使用 RMAN 提交了 Oracle 数据库的备份或恢复操作，或使用 Oracle Enterprise Manager (`OEM`)、OSB\
    \ Web 工具或 `obtool` 实用程序提交了文件系统数据的备份或恢复操作，并且您想检查作业是活动、挂起还是已完成。要检查 OSB 作业的状态，请执行\
    \ `lsjob` 命令和 `catxcr` 命令以显示有关作业操作的详细信息。\n\n### 列出作业\n要显示仍在运行的作业，请执行带有 `--active`\
    \ 或 `-a` 选项的 `lsjob` 命令。对于其他作业状态，使用 `--complete` 或 `-c` 选项表示已完成的作业，`--pending`\
    \ 或 `-p` 表示挂起的作业，`--inputrequest` 或 `-i` 表示当前正在请求输入的作业，`--all` 或 `-A` 表示显示所有作业，无论其状态如何。例如，要列出活动作业：\n\
    ```\nob> lsjob --active\n```\n对于 RMAN 作业，使用 `--dbname` 或 `-d` 选项将输出限制为特定的 Oracle\
    \ 数据库。如果您知道数据库 ID，可以改用 `--dbid` 或 `-I` 选项。此示例使用 `dbname` 参数：\n```\nob> lsjob --active\
    \ --dbname DB11R2\n```\n在下面的输出中，`State` 列指示作业仍在运行。一旦作业无错误完成，`State` 列将显示“completed\
    \ successfully”。\n```\nJob ID Sched time Contents State\n---------------- ----------\
    \ ------------------ -----------------------------\napress_oracle/83.1 none incremental\
    \ backup running since 2010/10/22.22:13\n```\n对于文件系统作业，使用 `--host` 或 `-h` 选项将输出限制为特定的客户端主机，如下所示：\n\
    ```\nob> lsjob --active --host BLLNX1\n```\n```\nJob ID Sched time Contents State\n\
    ---------------- ----------- ------------- --------------------------------\n\
    apress_admin/36.1 none backup BLLNX1 running since 2010/10/22.22:11\n```\n要监视活动作业，请使用\
    \ `lsjob` 命令。如果有多个活动作业在运行，您可以通过提供作业 ID 来过滤输出。但是，如果作业已经完成，您可以使用相同的命令，但需要移除 `-a`\
    \ 选项并提供相应的作业 ID。我通常运行带有以下选项的 `lsjob` 命令：\n```\nob> lsjob -a -l -j -o -R -L -C\n\
    ```\n前面的命令显示有关作业状态的详细信息。以下是一些示例输出：\n```\napress_oracle/83:\n  Type: database DB11R2\
    \ (dbid=4187425583)\n  Scheduled time: none\n  Introduction time: 2010/10/22.22:12\n\
    \  Earliest exec time: 10/22.22:12\n  Last update time: 2010/10/22.22:12\n  Expire\
    \ time: never\n  State: processed; Oracle job(s) scheduled\n  Priority: 100\n\
    \  Run on host: (administrative server)\n  Attempts: 0\n  Log:\n\napress_oracle/83.1:\n\
    \  Type: incremental backup\n  Backup piece: tclr1n5v_1_1\n  Family: APRESS_RMAN\n\
    \  Encryption: awaiting job completion\n  Scheduled time: none\n  Introduction\
    \ time: 2010/10/21.22:12\n  Earliest exec time: 10/21.22:12\n  Last update time:\
    \ 2010/10/22.22:15\n  Expire time: never\n  State: running since 2010/10/22.22:15\n\
    \  Priority: 100\n  Run on host: BLLNX3\n  Requires: family APRESS_RMAN and any\
    \ device\n  Attempts: 4\n  Processed: 744.7 MB\n  Log:\n  2010/10/22.22:12:35\
    \ Dispatching job to run on BLLNX3.\n  2010/10/22.22:12:46 Drive or volume on\
    \ which mount attempted is unusable.\n  2010/10/22.22:13:52 Dispatching job to\
    \ run on BLLNX3.\n  2010/10/22.22:14:05 Drive or volume on which mount attempted\
    \ is unusable.\n  2010/10/22.22:14:52 Dispatching job to run on BLLNX3.\n  2010/10/22.22:15:11\
    \ Drive or volume on which mount attempted is unusable.\n  2010/10/22.22:15:52\
    \ Dispatching job to run on BLLNX3.\n```"
- fmt: 'In the output shown above, the `lsjob` command displays all active jobs using
    the `-a` option. Aside from showing the information about the job ID, scheduled
    time, contents and job state, the `-l` option shows more information, such as
    the RMAN backup piece, media family, encryption status, priority number, the host
    where the job runs, and number of times OSB attempted to run the job. The `--subjobs`
    or `-j` shows the subordinate job (subjob), which is `apress_oracle/83.1`. The
    `--progress` or `-o` option shows the progress of the active job, which is 744.7
    MB processed so far. The `--requires` or `-R` option show resources required to
    run each job, which is media family `APRESS_RMAN` and any device. The `--log`
    or `-L` option shows the log associated for the job, which is the log information
    shown at the bottom of the output. The `--times` or `-C` option shows all relevant
    times for each job, such as introduction time, earliest exec time, last update
    time, and expire time.


    ## Showing Job Transcripts


    Aside from the `lsjob` command to help monitor the OSB job, you can issue the
    `catxcr` command to gather detailed information about the operation of the job.
    The `--folow` or `-f` option shows the transcript as the file grows, which is
    useful when monitoring active jobs. The `--msgno` or `-m` shows the number for
    each line in the transcript. The `--level` or `-l` option indicates the message
    level, which is useful to generate additional messages for debugging or troubleshooting.
    For example:

    ```

    ob> catxcr -f -m -l 0 apress_oracle/88

    ```


    If you run an RMAN backup and allocated two RMAN channels for `SBT_TAPE`, then
    two sub-jobs are created. The `lsjob` command with the `--subjobs` option displays
    details for each sub-job. For example:

    ```

    ob> lsjob --active --subjobs


    Job ID Sched time Contents State

    ---------------- ----------- -------------------- -----------------------------

    apress_oracle/88 none database DB11R2 (dbid=4187425583) processed; Oracle job(s)
    scheduled

    apress_oracle/88.1 none incremental backup running since 2010/10/22.23:34

    apress_oracle/88.2 none incremental backup running since 2010/10/22.23:34

    ```


    The prior output shows two sub-job IDs, namely `apress_oracle/88.1` and `apress_oracle/88.2`,
    which is one for each of the two RMAN channels. To show the transcript of a particular
    sub-job, provide the sub-job ID `apress_oracle/88.2`, as shown here:

    ```

    ob> catxcr -f -m -l 0 apress_oracle/88.2

    ```


    ## Virtual Test Devices


    You may relate to the expression “experience is the best teacher.” You have read
    this chapter, and you want to try the OSB commands and examples yourself. However,
    you don’t have a physical tape device connected to any test servers in your environment.
    In this situation, where you are going to install and experiment with OSB? Well,
    you can configure a virtual test device solely for testing purposes.


    `Caution` You should not implement virtual test devices in a production environment.
    Oracle Support does not provide support for virtual test devices.


    To configure a virtual test device, perform the following steps. In this example,
    the hostname of the media server is `BLLNX3`.


    1. Logon as the `oracle` OS user at your designated media server of the OSB administrative
    domain.

    ```

    $ su - oracle

    ```

    2. At the OSB media server, create a directory that hosts the virtual storage
    elements and virtual tape devices. Make sure you have enough disk space on the
    mount point where you are going to create the directory.

    ```

    $ mkdir /osb_vdevices

    ```

    3. Logon as `admin` user to the `obtool` utility, and provide the corresponding
    password.

    ```

    $ obtool -u admin

    Password:

    ```

    4. Configure the virtual tape library by running the following `mkdev` command
    using the `-t` option to specify the device as a tape library and the `-v` option
    to specify as a virtual tape library. The `-S` option specifies the number of
    storage elements. The `-I` option specifies the number of export and import elements.
    The `-o` option specifies that the tape device is logically available to OSB.
    The `-B` option with the `yes` value specifies that the barcode reader is present.
    The `-a` option attaches the virtual library `vlib1` to directory `/osb_vdevices/vlib1`
    of host `BLLNX3`.

    ```

    ob> mkdev -t library -v -S20 -I2 -o -B yes -a BLLNX3:/osb_vdevices/vlib1 vlib1

    ```

    5. Configure the virtual tape devices by running the following `mkdev` command
    using the `-t` option to specify the device as a tape device and the `-v` option
    to specify as a virtual tape device. The `-o` option specifies that the tape device
    is logically available to OSB. The `-l` option specifies the name of the associated
    tape library. The `-d` option specifies the data transfer element (DTE). The `-a`
    option attaches the virtual tape `vdrive1` to directory `/osb_vdevices/vdrive1`
    of host `BLLNX3`. To configure additional virtual tape devices, run the same `mkdev`
    command. However, for the second virtual tape device, change the name `vdrive1`
    and directory `/osb_vdevices/vdrive1` to `vdrive2` and directory `/osb_vdevices/vdrive2`,
    respectively, and so on.

    ```

    ob> mkdev -t tape -v -o -l vlib1 -d1 -a BLLNX3:/osb_vdevices/vdrive1 vdrive1

    ```

    6. Run the `insertvol` command to manually insert a volume to the tape library.
    The `-L` option specifies the library name, which is `vlib1`. Since there are
    20 storage elements defined when the virtual library is created, then issue `unlabeled
    1-20` to insert 20 new volumes.

    ```

    ob> insertvol -L vlib1 unlabeled 1-20

    ```

    7. Issue the `lsvol` command to display the volumes in the tape library `vlib1`.

    ```

    ob> lsvol -l -L vlib1

    ```


    ## OSB Software Upgrades


    You have an older version of the OSB installed and you want to upgrade to the
    current release. To perform an OSB upgrade, perform steps similar to installing
    OSB. However, before performing the OSB upgrade, make sure to backup the OSB catalog
    in the admin server and stop the OSB daemons and services at all hosts in the
    administrative domain. Also, upgrade the admin server first, then the media servers
    and client hosts.


    For OS-specific commands to start and stop OSB services, refer to `Table 20–7`.
    You must have root privilege on Linux/Unix or be a member of the Administrators
    group for Windows to run these commands.


    `Table 20–7.` OSB Service Shutdown and Startup Commands


    | Operating System | Shutdown Command | Startup Command |

    |------------------|------------------|-----------------|

    | Linux | `/etc/init.d/observiced stop` | `/etc/init.d/observiced start` |

    | Solaris | `/etc/init.d/OracleBackup stop` | `/etc/init.d/OracleBackup start`
    |

    | AIX | `/etc/rc.d/init.d/OracleBackup stop` | `/etc/rc.d/init.d/OracleBackup
    start` |

    | HP-UX | `/sbin/init.d/OracleBackup stop` | `/sbin/init.d/OracleBackup start`
    |

    | Windows | `net stop observiced` | `net start observiced` |


    `Note` Oracle Secure Backup release 10.3 is not backward compatible with previous
    releases, such 10.1 and 10.2.


    ## Summary


    OSB is a tool you can use to back up and restore operating system files to and
    from tape. OSB is a full-featured tape management utility. OSB can be integrated
    with RMAN to facilitate the backup of database files directly to tape. This provides
    you with extra data protection in the event that the entire server or data center
    experiences a failure.


    OSB is available in two editions: Oracle Secure Backup Express and Oracle Secure
    Backup. The Express version is available for use without extra licensing costs
    and is suitable for small shops with one server and one physical tape device.
    The full-fledged Oracle Secure Backup edition is suitable for distributed servers
    across multiple platforms (Linux, Unix, Windows).


    You can access OSB through graphical tools like Enterprise Manager and OSB Web
    tool or through command line tools such as `obtool`. This chapter focused on demonstrating
    how to use the command line `obtool` for backup and restore operations.


    This chapter concludes the section covering backup and recovery. The next chapter
    focuses on automating jobs and database troubleshooting.


