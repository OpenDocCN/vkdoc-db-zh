    CHAPTER 4 ■ TABLESPACES AND DATAFILES


    Summary


    This chapter discussed managing tablespace and datafiles. Tablespaces are logical
    containers for a group of datafiles. Datafiles are the physical files on disk
    that contain data. You should plan carefully when creating tablespaces and the
    corresponding datafiles.


    Tablespaces allow you to separate the data of one application from another. You
    can also separate tables from indexes. These allow you to customize storage characteristics
    of the tablespace for each application. Furthermore, tablespaces provide a way
    to better manage applications that have different availability and backup and
    recovery requirements. As a DBA, you must be proficient in managing tablespaces
    and datafiles. In any type of environment, you have to add, rename, relocate,
    and drop these storage containers.


    Oracle requires three types of files for a database to operate: datafiles, control
    files, and online redo-log files. The next chapter in the book focuses on control
    file and online redo-log file management.


    ![](index-125_1.png)


    CHAPTER 5 ■ MANAGING CONTROL FILES AND ONLINE REDO LOGS


    REMOVABLE RECOVERY FILES


    DATAFILE


    You can view database information stored in the control file via the V$DATABASE
    view: SQL> select name, open_mode, created, current_scn from v$database; Here
    is the output for this example:


    NAME OPEN_MODE CREATED CURRENT_SCN


    --------- -------------------- --------- -----------


    ORC11G READ WRITE 01-JAN-10 5077636


    Every Oracle database must have at least one control file. When you start your
    database in nomount mode, the instance is aware of the location of the control
    files from the CONTROL_FILES parameter:


    -- locations of control files are known to the instance


    SQL> startup nomount;


    At this point, the control files haven’t been touched by any processes. When you
    alter your database into mount mode, the control files are read and opened for
    use:


    -- control files opened


    SQL> alter database mount;


    If any of the control files listed in the CONTROL_FILES initialization parameter
    aren’t available, then you can’t mount your database.


    When you successfully mount your database, the instance is aware of the locations
    of the datafiles and online redo logs, but hasn’t yet opened them. After you alter
    your database into open mode, the datafiles and online redo logs are opened:


    -- datafiles and online redo logs opened


    SQL> alter database open;


    The control file is created when the database is created. As you saw in Chapter
    2, you should create at least two control files when you create your database
    (to avoid a single point of failure). If possible, you should have multiple control
    files stored on separate storage devices controlled by separate controllers.


    Oracle writes to all control files specified by the CONTROL_FILES initialization
    parameter. If Oracle can’t write to one of the control files, an error is thrown:


    ORA-00210: cannot open the specified control file


    If one of your control files becomes unavailable, shut down your database and
    resolve the issue before restarting. Fixing the problem may mean resolving a storage-device
    failure or modifying the CONTROL_FILES initialization parameter to remove the
    control-file entry for the control file that isn’t available.


    ![](index-127_1.png)


