    Renaming or Relocating a Datafile


    You may occasionally need to rename a datafile. For example, you may need to move
    datafiles due to changes in the storage devices or move files that were somehow
    created in the wrong location.


    Before you rename a datafile, you must take the datafile offline. (See the previous
    section.) Here are the steps for renaming a datafile:


    1\. Use the following query to determine the names of existing datafiles: SQL>
    select name from v$datafile;


    2\. Take the datafile offline using either the ALTER TABLESPACE or ALTER DATABASE


    DATAFILE statement (see the previous section for details on how to do this). You
    can also shut down your database and then start it in mount mode; the datafiles
    can be moved while in this mode because they aren’t open for use.


    3\. Physically move the datafile to the new location using either an OS command
    (like mv or cp) or the COPY_FILE procedure of the DBMS_FILE_TRANSFER built-in
    PL/SQL package.


    4\. Use either the ALTER TABLESPACE ... RENAME DATAFILE ... TO statement or the
    ALTER DATABASE RENAME FILE ... TO statement to update the control file with the
    new datafile name.


    5\. Alter the datafile online.


    CHAPTER 4 ■ TABLESPACES AND DATAFILES


    ■ **Note** If you need to rename datafiles associated with the SYSTEM or UNDO
    tablespace, you must shut down your database and start it in mount mode. When
    your database is in mount mode, you can rename datafiles associated with the SYSTEM
    or UNDO tablespace via the ALTER DATABASE RENAME FILE statement.


    The following example demonstrates how to move the datafiles associated with a
    single tablespace.


    First, take the datafiles offline with the ALTER TABLESPACE statement: SQL> alter
    tablespace users offline;


    Now, from the operating system prompt, move two datafiles to a new location using
    the Linux/Unix mv command:


    $ mv /ora02/dbfile/O11R2/users01.dbf /ora03/dbfile/O11R2/users01.dbf


    $ mv /ora02/dbfile/O11R2/users02.dbf /ora03/dbfile/O11R2/users02.dbf


    Update the control file with the ALTER TABLESPACE statement:


    alter tablespace users


    rename datafile


    ''/ora02/dbfile/O11R2/users01.dbf'',


    ''/ora02/dbfile/O11R2/users02.dbf''


    to


    ''/ora03/dbfile/O11R2/users01.dbf'',


    ''/ora03/dbfile/O11R2/users02.dbf'';


    Finally, bring the datafiles within the tablespace back online:


    SQL> alter tablespace users online;


    If you want to rename datafiles from multiple tablespaces in one operation, you
    can use the ALTER


    DATABASE RENAME FILE statement (instead of the ALTER TABLESPACE...RENAME DATAFILE
    statement). The following example renames all datafiles in the database. Because
    the SYSTEM and UNDO tablespaces’


    datafiles are being moved, you must take the database offline first and then place
    it in mount mode: SQL> conn / as sysdba


    SQL> shutdown immediate;


    SQL> startup mount;


    Because the database is in mount mode, the datafiles aren’t open for use, and
    thus there is no need to take the datafiles offline. Next, physically move the
    files via the Linux/Unix mv command: $ mv /ora01/dbfile/O11R2/system01.dbf /ora02/dbfile/O11R2/system01.dbf
    $ mv /ora01/dbfile/O11R2/sysaux01.dbf /ora02/dbfile/O11R2/sysaux01.dbf $ mv /ora01/dbfile/O11R2/undotbs01.dbf
    /ora02/dbfile/O11R2/undotbs01.dbf $ mv /ora01/dbfile/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf


    $ mv /ora01/dbfile/O11R2/toos01.dbf /ora02/dbfile/O11R2/toos01.dbf


    $ mv /ora01/dbfile/O11R2/users02.dbf /ora02/dbfile/O11R2/users02.dbf


