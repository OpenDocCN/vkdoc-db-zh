- fmt: "# Now create DDL file from the export dump file.\n\n```bash\nimpdp darl/foo\
    \ directory=dwrep_dp dumpfile=${SID}.${DAY}.dmp \\\nSQLFILE=${SID}.${DAY}.sql\
    \ logfile=${SID}.${DAY}.sql.log\n```\n\n#\n\n```bash\nexit 0\n```\n\nThis code\
    \ listing depends on a database-directory object being created that points to\
    \ where you want the daily dump file to be written. You may also want to set up\
    \ another job that periodically deletes any files older than a certain amount\
    \ of time.\n\n## Compressing Output\n\nWhen you use Data Pump to create large\
    \ files, you should consider compressing the output. As of Oracle Database 11\
    \ *g*, the `COMPRESSION` parameter can be one of the following values: `ALL`,\
    \ `DATA_ONLY`, `METADATA_ONLY`, or `NONE`. If you specify `ALL`, then both data\
    \ and metadata are compressed in the output.\n\nThis example exports one table\
    \ and compresses both the data and metadata in the output file:\n\n```bash\n$\
    \ expdp dbauser/foo tables=locations directory=datapump \\\ndumpfile=compress.dmp\
    \ compression=all\n```\n\nIf you’re using Oracle Database 10 *g*, then the `COMPRESSION`\
    \ parameter only has the `METADATA_ONLY` and `NONE` values.\n\nCHAPTER 13 ■ DATA\
    \ PUMP\n\n`Note` The `ALL` and `DATA_ONLY` options of the `COMPRESS` parameter\
    \ require a license for the Oracle Advanced Compression option.\n\n## Encrypting\
    \ Data\n\nOne potential security issue with Data Pump dump files is that anybody\
    \ with operating-system access to the output file can search for strings in the\
    \ file. On Linux/Unix systems, you can do this with the `strings` command:\n\n\
    ```bash\n$ strings inv.dmp | grep -i secret\n```\n\nHere’s the output for this\
    \ particular dump file:\n\n```\nSecret Data<\ntop secret data<\ncorporate secret\
    \ data<\n```\n\nThis command allows you to view the contents of the dump file\
    \ because the data is in regular text and not encrypted. If you require that the\
    \ data be secured, you can use Data Pump’s encryption features.\n\nData Pump lets\
    \ you easily encrypt the output of a dump file. This example uses the `ENCRYPTION`\
    \ parameter to secure all data and metadata in the output:\n\n```bash\n$ expdp\
    \ darl/foo encryption=all directory=dp dumpfile=inv.dmp\n```\n\nFor this command\
    \ to work, your database must have an encryption wallet in place and open. See\
    \ the *Oracle Advanced Security Guide* (available on OTN) for more details about\
    \ how to create and open a wallet.\n\n`Note` The Data Pump `ENCRYPTION` parameter\
    \ requires that you use the Enterprise Edition of Oracle Database 11g or higher\
    \ and also requires a license for the Oracle Advanced Security option.\n\nThe\
    \ `ENCRYPTION` parameter takes the following options:\n\n- `ALL`\n- `DATA_ONLY`\n\
    - `ENCRYPTED_COLUMNS_ONLY`\n- `METADATA_ONLY`\n- `NONE`\n\nThe `ALL` option enables\
    \ encryption for both data and metadata. The `DATA_ONLY` option encrypts just\
    \ the data. The `ENCRYPTED_COLUMNS_ONLY` option specifies that only columns encrypted\
    \ in the database are written to the dump file in an encrypted format. The `METADATA_ONLY`\
    \ option encrypts just metadata in the export file.\n\nCHAPTER 13 ■ DATA PUMP\n\
    \n## Monitoring Data Pump Jobs\n\nWhen you have long-running Data Pump jobs, you\
    \ should occasionally check the status of the job to make sure the job hasn’t\
    \ failed, or it’s become suspended for some reason, and so on. There are several\
    \ ways to monitor the status of Data Pump jobs:\n\n- Screen output\n- Data Pump\
    \ log file\n- Database alert log\n- Querying the status table\n- Querying data-dictionary\
    \ views\n- Interactive command-mode status\n- Using operating-system utilities’\
    \ process status `ps`\n\nThe most obvious way to monitor a job is to view the\
    \ status that Data Pump displays on the screen as the job is running. If you’ve\
    \ disconnected from the command mode, then the status is no longer displayed on\
    \ your screen. In this situation, you must use another technique to monitor a\
    \ Data Pump job.\n\n### Data Pump Log File\n\nBy default, Data Pump generates\
    \ a log file for every job. When you start a Data Pump job, it’s a good practice\
    \ to name a log file that is specific for that job:\n\n```bash\n$ impdp darl/foo\
    \ directory=dp dumpfile=archive.dmp logfile=archive.log\n```\n\nThis job creates\
    \ a file named `archive.log` that is placed in the directory referenced in the\
    \ database object `DP`. If you don’t explicitly name a log file, Data Pump import\
    \ creates one named `import.log`, and Data Pump export creates one named `export.log`.\n\
    \n`Note` The log file contains the same information you see displayed interactively\
    \ on your screen when running a Data Pump job.\n\n### Data-Dictionary Views\n\n\
    A quick way to determine whether a Data Pump job is running is to check the `DBA_DATAPUMP_JOBS`\
    \ view for anything running with a `STATE` that has an `EXECUTING` status:\n\n\
    ```sql\nselect\njob_name\n,operation\n,job_mode\n,state\nfrom dba_datapump_jobs;\n\
    ```\n\nCHAPTER 13 ■ DATA PUMP\n\nHere’s some sample output:\n\n```\nJOB_NAME \
    \                  OPERATION   JOB_MODE   STATE\n-------------------------  ----------\
    \  ---------  ---------------\nSYS_IMPORT_TABLE_04        IMPORT      TABLE  \
    \    EXECUTING\nSYS_IMPORT_FULL_02         IMPORT      FULL       NOT RUNNING\n\
    ```\n\nYou can also query the `DBA_DATAPUMP_SESSIONS` view for session information\
    \ via the following query:\n\n```sql\nselect\nsid\n,serial#\n,username\n,process\n\
    ,program\nfrom v$session s,\ndba_datapump_sessions d\nwhere s.saddr = d.saddr;\n\
    ```\n\nHere’s some sample output showing that several Data Pump sessions are in\
    \ use:\n\n```\nSID    SERIAL#  USERNAME   PROCESS   PROGRAM\n------ -------- ----------\
    \ --------- ----------------------\n1049   6451     STAGING    11306     oracle@xengdb\
    \ (DM00)\n1058   33126    STAGING    11338     oracle@xengdb (DW01)\n1048   50508\
    \    STAGING    11396     oracle@xengdb (DW02)\n```\n\n### Database Alert Log\n\
    \nIf a job is taking much longer than you expected, look in the database alert\
    \ log for any messages similar to this:\n\n```\nstatement in resumable session\
    \ 'SYS_IMPORT_SCHEMA_02.1' was suspended due to\nORA-01652: unable to extend temp\
    \ segment by 64 in tablespace REG_TBSP_3\n```\n\nThis indicates that a Data Pump\
    \ import job is suspended and is waiting for space to be added to the `REG_TBSP_3`\
    \ tablespace. After you add space to the tablespace, the Data Pump job automatically\
    \ resumes processing. By default, a Data Pump job waits two hours for space to\
    \ be added.\n\n`Note` In addition to writing to the alert log, for each Data Pump\
    \ job, Oracle creates a trace file in the `ADR_HOME/trace` directory. This file\
    \ contains information such as the session ID and when the job started. The trace\
    \ file is named with the following format: `<SID>_dm00_<process_ID>.trc`.\n\n\
    ### Status Table\n\nEvery time you start a Data Pump job, a status table is automatically\
    \ created in the account of the user running the Data Pump job. For export jobs,\
    \ the table name depends on what type of export job you’re running. The table\
    \ is named with the format `SYS_<OPERATION>_<JOB_MODE>_NN`, where `OPERATION`\
    \ is either `EXPORT` or `IMPORT`. `JOB_MODE` can be `FULL`, `SCHEMA`, `TABLE`,\
    \ `TABLESPACE`, and so on.\n\nHere’s an example of querying the status table for\
    \ particulars about a currently running job:\n\n```sql\nselect\nname\n,object_name\n\
    ,total_bytes/1024/1024 t_m_bytes\n,job_mode\n,state\n,to_char(last_update, 'dd-mon-yy\
    \ hh24:mi')\nfrom SYS_IMPORT_TABLE_04\nwhere state='EXECUTING';\n```\n\nCHAPTER\
    \ 13 ■ DATA PUMP\n\n### Interactive Command-Mode Status\n\nA quick way to verify\
    \ that Data Pump is running a job is to attach in interactive command mode and\
    \ issue a `STATUS` command. For example:\n\n```bash\n$ impdp staging/staging_xst\
    \ attach=SYS_IMPORT_TABLE_04\n```\n\n```\nImport> status\n```\n\nHere’s some sample\
    \ output:\n\n```\nJob: SYS_IMPORT_TABLE_04\nOperation: IMPORT\nMode: TABLE\nState:\
    \ EXECUTING\nBytes Processed: 0\nCurrent Parallelism: 4\n```\n\nYou should see\
    \ a state of `EXECUTING`, which indicates that the job is actively running. Other\
    \ items to inspect in the output are the number of objects processed and bytes\
    \ processed. Those numbers should increase as the job progresses.\n\n### Operating-System\
    \ Utilities\n\nYou can use the process status (`ps`) operating-system utility\
    \ to display jobs running on the server. For example, you can search for master\
    \ and worker processes as follows:\n\n```bash\n$ ps -ef | egrep 'ora_dm|ora_dw'\
    \ | grep -v egrep\n```\n\nHere’s some sample output:\n\n```\noracle  29871   717\
    \  5 08:26:39 ?      11:42 ora_dw01_STAGE\noracle  29848   717  0 08:26:33 ? \
    \     0:08 ora_dm00_STAGE\noracle  29979   717  0 08:27:09 ?      0:04 ora_dw02_STAGE\n\
    ```\n\nIf you run this command multiple times, you should see the processing time\
    \ (seventh column) increase for one or more of the jobs running. This is a good\
    \ indicator that Data Pump is still executing and doing work.\n\nCHAPTER 13 ■\
    \ DATA PUMP\n\n## Data Pump Legacy Mode\n\nThis feature is covered last in this\
    \ chapter, but it’s quite useful especially if you’re an old-school DBA. As of\
    \ Oracle Database 11 *g* release 2, Data Pump allows you to use the old `exp`\
    \ and `imp` utility parameters. This is known as *legacy mode*. You don’t have\
    \ to do anything special to use legacy mode Data Pump. As soon as Data Pump detects\
    \ a legacy parameter, it attempts to process the parameter as if it were from\
    \ the old `exp/imp` utilities. You can even mix and match old legacy parameters\
    \ with newer parameters. For example:\n\n```bash\n$ expdp darl/foo consistent=y\
    \ tables=inv directory=dk\n```\n\nIn the output, Data Pump indicates that it has\
    \ encountered legacy parameters and gives you the syntax for what it translated\
    \ the legacy parameter to in Data Pump syntax. For the previous command, here’s\
    \ the output from the Data Pump session that shows what the `consistent=y` parameter\
    \ was translated into:\n\n```\nLegacy Mode Active due to the following parameters:\n\
    Legacy Mode Parameter: \"consistent=TRUE\" Location: Command Line, Replaced with:\n\
    \"flashback_time=TO_TIMESTAMP('2010-07-01 08:10:20', 'YYYY-MM-DD HH24:MI:SS')\"\
    \n```\n\nThis feature can be *extremely* handy, especially if you’re really familiar\
    \ with the old legacy syntax and wonder how it’s implemented in Data Pump.\n\n\
    I recommend that you try to use the newer Data Pump syntax whenever possible.\
    \ However, you may run into situations where you have legacy `exp/imp` jobs and\
    \ want to continue running the scripts as they are without any modifications.\n\
    \n`Note` When Data Pump runs in legacy mode, it doesn’t create an old `exp/imp`\
    \ formatted file. Data Pump always creates a Data Pump file and can only read\
    \ Data Pump files.\n\n### Data Pump Mapping to the `exp` Utility\n\nIf you’re\
    \ used to the old `exp/imp` parameters, you may initially be confused by some\
    \ of the syntax semantics. However, after you use Data Pump, you’ll find the newer\
    \ syntax fairly easy to remember and use. Table 13–3 describes how the legacy\
    \ export parameters map to Data Pump export.\n\nIn many instances, there isn’t\
    \ a one-to-one mapping. Often, Data Pump automatically provides features that\
    \ used to require a parameter in the legacy utilities. For example, whereas you\
    \ used to have to specify `DIRECT=Y` to get a direct path export, Data Pump automatically\
    \ uses direct path whenever possible.\n\nCHAPTER 13 ■ DATA PUMP\n\n***Table 13–3.**\
    \ Mapping of Old Export Parameters to Data Pump*\n\n| **Original `exp` Parameter**\
    \ | **Similar Data Pump `expdp` Parameter** |\n| :--- | :--- |\n| `BUFFER` | N/A\
    \ |\n| `COMPRESS` | `TRANSFORM` |\n| `CONSISTENT` | `FLASHBACK_SCN` or `FLASHBACK_TIME`\
    \ |\n| `CONSTRAINTS` | `EXCLUDE=CONSTRAINTS` |\n| `DIRECT` | N/A; Data Pump automatically\
    \ uses direct path when possible |\n| `FEEDBACK` | `STATUS` in client output |\n\
    | `FILE` | Database-directory object and `DUMPFILE` |\n| `GRANTS` | `EXCLUDE=GRANT`\
    \ |\n| `INDEXES` | `INCLUDE=INDEXES`, `INCLUDE=INDEXES` |\n| `LOG` | Database-directory\
    \ object and `LOGFILE` |\n| `OBJECT_CONSISTENT` | N/A |\n| `OWNER` | `SCHEMAS`\
    \ |\n| `RECORDLENGTH` | N/A |\n| `RESUMABLE` | N/A; Data Pump automatically provides\
    \ functionality |\n| `RESUMABLE_NAME` | N/A |\n| `RESUMABLE_TIMEOUT` | N/A |\n\
    | `ROWS` | `CONTENT=ALL` |\n| `STATISTICS` | N/A; Data Pump export always exports\
    \ statistics for tables |\n| `TABLESPACES` | `TRANSPORT_TABLESPACES` |\n| `TRANSPORT_TABLESPACE`\
    \ | `TRANSPORT_TABLESPACES` |\n| `TRIGGERS` | `EXCLUDE=TRIGGER` |\n| `TTS_FULL_CHECK`\
    \ | `TRANSPORT_FULL_CHECK` |\n| `VOLSIZE` | N/A; Data Pump doesn’t support tape\
    \ devices |\n\nCHAPTER 13 ■ DATA PUMP\n\n### Data Pump Mapping to the `imp` Utility\n\
    \nAs with Data Pump export, Data Pump import often doesn’t have a one-to-one mapping\
    \ of the legacy utility parameter. Data Pump import automatically provides many\
    \ features of the old `imp` utility. For example, `COMMIT=Y` isn’t required because\
    \ Data Pump import automatically commits after each table is imported. Table 13–4\
    \ describes how legacy import parameters map to Data Pump import.\n\n***Table\
    \ 13–4.** Mapping of Old Import Parameters to Data Pump*\n\n| **Original `imp`\
    \ Parameter** | **Similar Data Pump `impdp` Parameter** |\n| :--- | :--- |\n|\
    \ `BUFFER` | N/A |\n| `CHARSET` | N/A |\n| `COMMIT` | N/A; Data Pump import automatically\
    \ commits after each table is exported |\n| `COMPILE` | N/A; Data Pump import\
    \ compiles procedures after they’re created |\n| `CONSTRAINTS` | `EXCLUDE=CONSTRAINT`\
    \ |\n| `DATAFILES` | `TRANSPORT_DATAFILES` |\n| `DESTROY` | `REUSE_DATAFILES=y`\
    \ |\n| `FEEDBACK` | `STATUS` in client output |\n| `FILE` | Database-directory\
    \ object and `DUMPFILE` |\n| `FILESIZE` | N/A |\n| `FROMUSER` | `REMAP_SCHEMA`\
    \ |\n| `GRANTS` | `EXCLUDE=OBJECT_GRANT` |\n| `IGNORE` | `TABLE_EXISTS_ACTION`\
    \ with `APPEND`, `REPLACE`, `SKIP`, or `TRUNCATE` |\n| `INDEXES` | `EXCLUDE=INDEXES`\
    \ |\n| `INDEXFILE` | `SQLFILE` |\n| `LOG` | Database-directory object and `LOGFILE`\
    \ |\n| `RECORDLENGTH` | N/A |\n| `RESUMABLE` | N/A; this functionality is automatically\
    \ provided |\n| `RESUMABLE_NAME` | N/A |\n| `RESUMABLE_TIMEOUT` | N/A |\n| `ROWS=N`\
    \ | `CONTENT`, with `METADATA_ONLY` or `ALL` |\n| `SHOW` | `SQLFILE` |\n| `STATISTICS`\
    \ | N/A |\n| `STREAMS_CONFIGURATION` | N/A |\n| `STREAMS_INSTANTIATION` | N/A\
    \ |\n| `TABLESPACES` | `TRANSPORT_TABLESPACES` |\n| `TOID_NOVALIDATE` | N/A |\n\
    | `TOUSER` | `REMAP_SCHEMA` |\n| `TRANSPORT_TABLESPACE` | `TRANSPORT_TABLESPACES`\
    \ |\n| `TTS_OWNERS` | N/A |\n| `VOLSIZE` | N/A; Data Pump doesn’t support tape\
    \ devices |\n\n## Summary\n\nData Pump is an extremely powerful and feature-rich\
    \ tool. If you haven’t used Data Pump much, then I implore you to take some time\
    \ to read this chapter and work through the examples. This tool greatly simplifies\
    \ tasks like moving users and data from one environment to another. You can export\
    \ and import subsets of users, filter and remap data via SQL and PL/SQL, rename\
    \ users and tablespaces, compress, encrypt, and parallelize, all with one command.\
    \ It really is that powerful.\n\nDBAs sometimes stick with the old `exp/imp` utilities\
    \ because that’s what they’re familiar with (I’m occasionally guilty of this).\
    \ If you’re running Oracle Database 11 *g* release 2, you can directly use the\
    \ old `exp/imp` parameters and options directly from the command line. Data Pump\
    \ translates these parameters on the fly to Data Pump–specific syntax. This feature\
    \ nicely facilitates the migration from the old to the new. For reference, I’ve\
    \ also provided a mapping of the old `exp/imp` syntax and how it relates to Data\
    \ Pump commands.\n\nAlthough Data Pump is an excellent tool for moving database\
    \ objects and data from one environment to another, sometimes you need to transfer\
    \ large quantities of data to and from operating-system flat files. You use external\
    \ tables to achieve this task. This is the topic of the next chapter in this book.\n\
    \n![](index-379_1.png)\n\nCHAPTER 14 ■ EXTERNAL TABLES\n\nA quick comparison of\
    \ using SQL*Loader and external tables highlights the differences. Listed next\
    \ are the SQL*Loader steps that you use to load and transform of data:\n\n1. \
    \ Create a parameter file that SQL*Loader uses to interpret the format of the\
    \ data in the operating-system file.\n2.  Create a regular database table into\
    \ which SQL*Loader will insert records. The data will be staged here until it\
    \ can be further processed.\n3.  Run the SQL*Loader `sqlldr` utility to load data\
    \ from the operating-system file into the database table (created in step 2).\
    \ When loading data, SQL*Loader has some features that allow you to transform\
    \ data. This step is sometimes frustrating because it can take several trial-and-error\
    \ runs to correctly map the parameter file to the table and corresponding columns.\n\
    4.  Create another table that will contain the completely transformed data.\n\
    5.  First run SQL statements to load the data from the staging table (created\
    \ in step 2); then transform and insert the data into the production table (created\
    \ in step 4).\n\nCompare the previous SQL*Loader list to the following steps to\
    \ load and transform data using external tables:\n\n1.  Execute a `CREATE TABLE...ORGANIZATION\
    \ EXTERNAL` script that maps the structure of the operating-system file to table\
    \ columns. After this script is run, you can directly use SQL to query the contents\
    \ of the operating-system file.\n2.  Create a regular table to hold the completely\
    \ transformed data.\n3.  Run SQL statements to load and fully transform the data\
    \ from the external table into the table created in step 2.\n\nFor many shops,\
    \ SQL*Loader underpins large data-loading operations. It continues to be a good\
    \ tool to use for that task. However, you may want to investigate using external\
    \ tables. External tables have the following advantages:\n\n- Loading data with\
    \ external tables is more straightforward and requires fewer steps.\n- The interface\
    \ for creating and loading from external tables is SQL*Plus. Many DBAs/developers\
    \ find using SQL*Plus more intuitive and powerful than SQL*Loader’s parameter-file\
    \ interface.\n- You can view data in an external table before it’s loaded into\
    \ a database table.\n- You can load, transform, and aggregate the data without\
    \ an intermediate staging table. For large amounts of data, this can be a huge\
    \ space savings.\n\nThe next several sections contain examples of using external\
    \ tables to read from operating-system files.\n\nCHAPTER 14 ■ EXTERNAL TABLES\n\
    \n## Loading CSV Files into the Database\n\nYou can load small or very large CSV\
    \ flat files into the database using external tables and SQL. Figure 14–1 shows\
    \ the architectural components involved with using an external table to view and\
    \ load data from an operating-system file. A directory object is required that\
    \ specifies the location of the operating-system file. The `CREATE TABLE...ORGANIZATION\
    \ EXTERNAL` statement creates a database object that SQL*Plus can use to directly\
    \ select from the operating-system file.\n\n***Figure 14–1.** Architectural components\
    \ of an external table used to read a flat file*\n\nHere are the steps for using\
    \ an external table to access an operating-system flat file:\n1.  Create a database-directory\
    \ object that points to the location of the CSV file.\n2.  Grant read and write\
    \ privileges on the directory object to the user creating the external table.\
    \ I usually use a DBA privileged account, so I don’t need to perform this step.\n\
    3.  Run the `CREATE TABLE...ORGANIZATION EXTERNAL` statement.\n4.  Use SQL*Plus\
    \ to access the contents of the CSV file.\n\nIn this example, the flat file is\
    \ named `ex.csv` and is located in the `/oraet` directory. It contains the following\
    \ data:\n\n```\n5|2|0|0|12/04/2009|Half\n6|1|0|1|03/31/2010|Quarter\n7|4|0|1|05/07/2010|Full\n\
    8|1|1|0|04/30/2010|Quarter\n```\n\n`Note` Some of the CSV file examples used in\
    \ this chapter are actually separated by characters other than a comma, such as\
    \ a pipe `|` character. The character used depends on the data and the user who\
    \ supplies the CSV file. CSV files are also often commonly referred to as flat\
    \ files.\n\nCHAPTER 14 ■ EXTERNAL TABLES\n\n### Creating a Directory Object and\
    \ Granting Access\n\nFirst, create a directory object that points to the location\
    \ of the flat file on disk:\n\n```sql\nSQL> create directory exa_dir as '/oraet';\n\
    ```\n\nThis example uses a database account that has the `DBA` role granted to\
    \ it; therefore, you don’t need to grant `READ` and `WRITE` to the directory object\
    \ to the user (your account) that is accessing the directory object. If you’re\
    \ not using a DBA account to read from the directory object, then grant these\
    \ privileges to the account using this object:\n\n```sql\nSQL> grant read, write\
    \ on directory exa_dir to reg_user;\n```\n\n### Creating an External Table\n\n\
    Next, fashion the script that creates the external table that will reference the\
    \ flat file. The `CREATE TABLE...ORGANIZATION EXTERNAL` statement provides the\
    \ database with the following information:\n\n- How to interpret data in the flat\
    \ file, and a mapping of data in file-to-column definitions in the database\n\
    - A `DEFAULT DIRECTORY` clause that identifies the directory object, which in\
    \ turn specifies the directory of the flat file on disk\n- The `LOCATION` clause,\
    \ which identifies the name of the flat file\n\nThe next statement creates a database\
    \ object that looks like a table yet is able to retrieve data directly from the\
    \ flat file:\n\n```sql\ncreate table exadata_et(\n  exa_id NUMBER\n  ,machine_count\
    \ NUMBER\n  ,hide_flag NUMBER\n  ,oracle NUMBER\n  ,ship_date DATE\n  ,rack_type\
    \ VARCHAR2(32)\n)\norganization external (\n  type oracle_loader\n  default directory\
    \ exa_dir\n  access parameters\n  (\n    records delimited by newline\n    fields\
    \ terminated by '|'\n    missing field values are null\n    (exa_id\n    ,machine_count\n\
    \    ,hide_flag\n    ,oracle\n    ,ship_date char date_format date mask \"mm/dd/yyyy\"\
    \n    ,rack_type)\n  )\n  location ('ex.csv')\n)\nreject limit unlimited;\n```\n\
    \nCHAPTER 14 ■ EXTERNAL TABLES\n\nAn external table named `EXADATA_ET` is created\
    \ when you execute this script. Now, use SQL*Plus to view the contents of the\
    \ flat file:\n\n```sql\nSQL> select * from exadata_et;\n```\n\n```\nEXA_ID MACHINE_COUNT\
    \ HIDE_FLAG ORACLE SHIP_DATE  RACK_TYPE\n------ ------------- ---------- ----------\
    \ --------- ---------\n5      2             0          0         04-DEC-09 Half\n\
    6      1             0          1         31-MAR-10 Quarter\n7      4        \
    \     0          1         07-MAY-10 Full\n8      1             1          0 \
    \        30-APR-10 Quarter\n```\n\n### Viewing External-Table Metadata\n\nAt this\
    \ point, you can also view metadata regarding the external table. Query the `DBA_EXTERNAL_TABLES`\
    \ view for details:\n\n```sql\nselect\n  owner\n  ,table_name\n  ,default_directory_name\n\
    \  ,access_parameters\nfrom dba_external_tables;\n```\n\nHere’s a partial listing\
    \ of the output:\n\n```\nOWNER    TABLE_NAME    DEFAULT_DIRECTO   ACCESS_PARAMETERS\n\
    -------- ------------- ----------------  ---------------------------\nBARTS  \
    \  EXADATA_ET    EXA_DIR           records delimited by newline\n```\n\nAdditionally,\
    \ you can select from the `DBA_EXTERNAL_LOCATIONS` table for information regarding\
    \ any flat files referenced in an external table:\n\n```sql\nselect\n  owner\n\
    \  ,table_name\n  ,location\nfrom dba_external_locations;\n```\n\nHere’s some\
    \ sample output:\n\n```\nOWNER    TABLE_NAME    LOCATION\n-------- -------------\
    \ ---------------\nBARTS    EXADATA_ET    ex.csv\n```\n\n### Loading a Regular\
    \ Table from the External Table\n\nNow you can load data contained in the external\
    \ table into a regular database table. When you do this, you can take advantage\
    \ of Oracle’s direct-path loading and parallel features. This example creates\
    \ a regular database table that will be loaded with data from the external table:\n\
    \n```sql\ncreate table exa_info(\n  exa_id NUMBER\n  ,machine_count NUMBER\n \
    \ ,hide_flag NUMBER\n  ,oracle NUMBER\n  ,ship_date DATE\n  ,rack_type VARCHAR2(32)\n\
    ) nologging parallel 2;\n```\n\nCHAPTER 14 ■ EXTERNAL TABLES\n\nYou can direct-path\
    \ load this regular table (via the `APPEND` hint) from the contents of the external\
    \ table as follows:\n\n```sql\nSQL> insert /*+ APPEND */ into exa_info select\
    \ * from exadata_et;\n```\n\nYou can verify that the table was direct-path loaded\
    \ by attempting to select from it before you commit the data:\n\n```sql\nSQL>\
    \ select * from exa_info;\n```\n\nHere’s the expected error:\n\n```\nORA-12838:\
    \ cannot read/modify an object after modifying it in parallel\n```\n\nAfter you\
    \ commit the data, you can select from the table:\n\n```sql\nSQL> commit;\nSQL>\
    \ select * from exa_info;\n```\n\nThe other way to direct-path load a table is\
    \ to use the `CREATE TABLE AS SELECT` (`CTAS`) statement. A `CTAS` statement automatically\
    \ attempts to do a direct-path load. In this example, the `EXA_INFO` table is\
    \ created and loaded in one statement:\n\n```sql\nSQL> create table exa_info nologging\
    \ parallel 2 as select * from exadata_et;\n```\n\nBy using direct-path loading\
    \ and parallelism, you can achieve loading performance similar to that from using\
    \ SQL*Loader. The advantage of using SQL to create a table from an external table\
    \ is that you can now perform complex data transformations using standard SQL*Plus\
    \ features when building your regular database table (`EXA_INFO`, in this example).\n\
    \nAny `CTAS` statements automatically process with the degree of parallelism that\
    \ has been defined for the underlying table. However, when you use `INSERT AS\
    \ SELECT` statements, you need to enable parallelism for the session:\n\n```sql\n\
    SQL> alter session enable parallel dml;\n```\n\nAs a last step, you should generate\
    \ statistics for any table that has been loaded with a large amount of data. Here’s\
    \ an example:\n\n```sql\nexec dbms_stats.gather_table_stats(-\nownname=>'BARTS',-\n\
    tabname=>'EXA_INFO',-\nestimate_percent => 20, -\ncascade=>true);\n```\n\n## Performing\
    \ Advanced Transformations\n\nOracle provides sophisticated techniques for transforming\
    \ data. This section details how to use a pipelined function to transform data\
    \ in an external table. Listed next are the steps for doing this:\n1.  Create\
    \ an external table.\n2.  Create a record type that maps to the columns in the\
    \ external table.\n3.  Create a table based on the record type created in step\
    \ 2\n4.  Create a piplelined function that is used to inspect each row as it’s\
    \ loaded and transform data based on business requirements.\n5.  Use an `INSERT`\
    \ statement that selects from the external table and uses the pipelined function\
    \ to transform data as it’s loaded.\n\nThis example uses the same external table\
    \ and CSV file created in the previous section on loading data from CSV files.\
    \ Recall that the external table name is `EXADATA_ET` and the CSV file name is\
    \ `ex.csv`.\n\nAfter you create the external table, next create a record type\
    \ that maps to the column names in the external table:\n\n```sql\ncreate or replace\
    \ type rec_exa_type is object\n(\n  exa_id number\n  ,machine_count number\n \
    \ ,hide_flag number\n  ,oracle number\n  ,ship_date date\n  ,rack_type varchar2(32)\n\
    );\n/\n```\n\nCHAPTER 14 ■ EXTERNAL TABLES\n\nNext, create a table based on the\
    \ previous record type:\n\n```sql\ncreate or replace type table_exa_type is table\
    \ of rec_exa_type;\n/\n```\n\nOracle PL/SQL allows you to use functions as a row\
    \ source for SQL operations. This feature is known as *pipelining*. It lets you\
    \ use complex transformation logic combined with the power of SQL*Plus. For this\
    \ example, you create a pipelined function to transform selected column data as\
    \ it’s loaded.\n\nSpecifically, this function adds 30 days to the `SHIP_DATE`\
    \ when the `ORACLE` column has a `0` value:\n\n```sql\ncreate or replace function\
    \ exa_trans\nreturn table_exa_type pipelined is\nbegin\n  for r1 in\n    (select\
    \ rec_exa_type(\n            exa_id, machine_count, hide_flag\n            ,oracle,\
    \ ship_date, rack_type\n            ) exa_rec\n     from exadata_et) loop\n  \
    \  if (r1.exa_rec.oracle = 0) then\n      r1.exa_rec.ship_date := r1.exa_rec.ship_date\
    \ + 30;\n    end if;\n    pipe row (r1.exa_rec);\n  end loop;\n  return;\nend;\n\
    /\n```\n\nNow you can use this function to load data into a regular database table.\
    \ For reference, here’s the `CREATE TABLE` statement that instantiates the table\
    \ to be loaded:\n\n```sql\ncreate table exa_info(\n  exa_id NUMBER\n  ,machine_count\
    \ NUMBER\n  ,hide_flag NUMBER\n  ,oracle NUMBER\n  ,ship_date DATE\n  ,rack_type\
    \ VARCHAR2(32)\n) nologging parallel 2;\n```\n\nNext, use the pipelined function\
    \ to transform data selected from the external table and insert it into the regular\
    \ database table in one step:\n\n```sql\nSQL> insert into exa_info select * from\
    \ table(exa_trans);\n```\n\nHere’s the data that was loaded into the `EXA_INFO`\
    \ table for this example:\n\n```sql\nSQL> select * from exa_info;\n```\n\n```\n\
    EXA_ID MACHINE_COUNT HIDE_FLAG ORACLE SHIP_DATE  RACK_TYPE\n------ -------------\
    \ ---------- ---------- --------- ------------\n5      2             0       \
    \   0         03-JAN-10 Half\n6      1             0          1         31-MAR-10\
    \ Quarter\n7      4             0          1         07-MAY-10 Full\n8      1\
    \             1          0         30-MAY-10 Quarter\n```\n\nAlthough the example\
    \ in this section is simple, you can use the technique to apply any degree of\
    \ sophisticated transformational logic. This technique allows you to embed the\
    \ transformation requirements in a pipelined PL/SQL function that modifies data\
    \ as each row is loaded.\n\n## Viewing Text Files from SQL\n\nExternal tables\
    \ allow you to use SQL `SELECT` statements to retrieve information from operating-system\
    \ flat files. For example, say you want to report on the contents of the alert\
    \ log file. First, create a directory object that points to the location of the\
    \ alert log:\n\n```sql\nSQL> select value from v$parameter where name ='background_dump_dest';\n\
    ```\n\nHere’s the output for this example:\n\n```\n/oracle/app/oracle/diag/rdbms/o11r2/O11R2/trace\n\
    ```\n\nNext, create a directory object that points at the location of the background\
    \ dump destination:\n\n```sql\nSQL> create directory t_loc as '/oracle/app/oracle/diag/rdbms/o11r2/O11R2/trace';\n\
    ```\n\nNow, create an external table that maps to the database alert log operating-system\
    \ file. In this example, the database name is `O11R2`, and thus the alert log\
    \ file name is `alert_O11R2.log`:\n\n```sql\ncreate table alert_log_file(\n  alert_text\
    \ varchar2(4000))\norganization external\n( type oracle_loader\n  default directory\
    \ t_loc\n  access parameters (\n    records delimited by newline\n    nobadfile\n\
    \    nologfile\n    nodiscardfile\n    fields terminated by '#$~=ui$X'\n    missing\
    \ field values are null\n    (alert_text)\n  )\n  location ('alert_O11R2.log')\n\
    )\nreject limit unlimited;\n```\n\nCHAPTER 14 ■ EXTERNAL TABLES\n\nYou can query\
    \ the table via SQL queries. For example:\n\n```sql\nSQL> select * from alert_log_file\
    \ where alert_text like 'ORA-%';\n```\n\nThis allows you to use SQL to view and\
    \ report on the contents of the alert log. You may find this a convenient way\
    \ to provide SQL access to otherwise inaccessible operating-system files.\n\n\
    The `ACCESS PARAMETERS` clause of an external table’s `ORACLE_LOADER` access driver\
    \ may look familiar if you’ve previously worked with SQL*Loader. Table 14–1 describes\
    \ some of the more commonly used access parameters. For a full list of access\
    \ parameters, see Oracle’s *Database Utilities* guide (available on OTN).\n\n\
    ***Table 14–1.** Selected Access Parameters for the `ORACLE_LOADER` Driver*\n\n\
    | **Access Parameter** | **Description** |\n| :--- | :--- |\n| `DELIMITED BY`\
    \ | Indicates which character delimits the fields |\n| `TERMINATED BY` | Indicates\
    \ how a field is terminated |\n| `FIXED` | Specifies the size of records having\
    \ a fixed length |\n| `BADFILE` | Name of the file that stores records that can’t\
    \ be loaded due to an error |\n| `NOBADFILE` | Specifies that a file shouldn’t\
    \ be created to hold records that can’t be loaded due to errors |\n| `LOGFILE`\
    \ | Name of the file in which general messages are recorded when creating an external\
    \ table |\n| `NOLOGFILE` | Specifies that no log file should be created |\n| `DISCARDFILE`\
    \ | Names the file to which records are written that fail the `LOAD WHEN` clause\
    \ |\n| `NODISCARDFILE` | Specifies that no discard file should be created |\n\
    | `SKIP` | Skips the specified number of records in the file before loading |\n\
    | `PREPROCESSOR` | Specifies the user-named program that runs and modifies the\
    \ contents of the file before Oracle loads the data |\n| `MISSING FIELD VALUES\
    \ ARE NULL` | Loads fields that have no data as `NULL` values |\n\n![](index-388_1.png)\n\
    \nCHAPTER 14 ■ EXTERNAL TABLES\n\n2.  Use the `CREATE TABLE...ORGANIZATION EXTERNAL...AS\
    \ SELECT` statement to unload data from the database into the dump file.\n\nFirst,\
    \ create a directory object. The next bit of code creates a directory object named\
    \ `DP` that points at the `/oradump` directory:\n\n```sql\nSQL> create directory\
    \ dp as '/oradump';\n```\n\nIf you’re not using a user with DBA privileges, then\
    \ explicitly grant access to the directory object to the required user:\n\n```sql\n\
    SQL> grant read, write on directory dp to larry;\n```\n\nTo create a dump file,\
    \ use the `ORACLE_DATAPUMP` access driver of the `CREATE TABLE...ORGANIZATION\
    \ EXTERNAL` statement. This example unloads the `INV` table’s contents into the\
    \ `inv.dmp` file:\n\n```sql\nCREATE TABLE inv_et\nORGANIZATION EXTERNAL (\n  TYPE\
    \ ORACLE_DATAPUMP\n  DEFAULT DIRECTORY dp\n  LOCATION ('inv.dmp')\n)\nAS SELECT\
    \ * FROM inv;\n```\n\nThe previous command does two things:\n\n- Creates an external\
    \ table named `INV_ET` based on the `INV` table\n- Creates a platform-independent\
    \ dump file named `inv.dmp`\n\nNow you can copy the `inv.dmp` file to a separate\
    \ database server and base an external table on this dump file. The remote server\
    \ (to which you copy the dump file) can be a different platform than the server\
    \ where you created the file. For example, you can create a dump file on a Windows\
    \ box, copy to a Solaris server, and select from the dump file via an external\
    \ table. In this example, the external table is named `INV_DW`:\n\n```sql\nCREATE\
    \ TABLE inv_dw\n  (inv_id number\n  ,inv_desc varchar2(30))\nORGANIZATION EXTERNAL\
    \ (\n  TYPE ORACLE_DATAPUMP\n  DEFAULT DIRECTORY dp\n  LOCATION ('inv.dmp')\n\
    );\n```\n\nAfter it’s created, you can access the external table data from SQL*Plus:\n\
    \n```sql\nSQL> select * from inv_dw;\n```\n\nYou can also create and load data\
    \ into regular tables using the dump file:\n\n```sql\nSQL> create table inv as\
    \ select * from inv_dw;\n```\n\nThis provides a simple and efficient mechanism\
    \ for transporting data from one platform to another.\n\nCHAPTER 14 ■ EXTERNAL\
    \ TABLES\n\n## Using Parallelism to Reduce Elapsed Time\n\nTo maximize the unload\
    \ performance when you create a dump file via an external table, use the `PARALLEL`\
    \ clause. This example creates two dump files in parallel:\n\n```sql\nCREATE TABLE\
    \ inv_et\nORGANIZATION EXTERNAL (\n  TYPE ORACLE_DATAPUMP\n  DEFAULT DIRECTORY\
    \ dp\n  LOCATION ('inv1.dmp','inv2.dmp')\n)\nPARALLEL 2\nAS SELECT * FROM inv;\n\
    ```\n\nTo access the data in the dump files, create a different external table\
    \ that references the two dump files:\n\n```sql\nCREATE TABLE inv_dw\n  (inv_id\
    \ number\n  ,inv_desc varchar2(30))\nORGANIZATION EXTERNAL (\n  TYPE ORACLE_DATAPUMP\n\
    \  DEFAULT DIRECTORY dp\n  LOCATION ('inv1.dmp','inv2.dmp')\n);\n```\n\nYou can\
    \ now use this external table to select data from the dump files:\n\n```sql\n\
    SQL> select * from inv_dw;\n```\n\n## Compressing a Dump File\n\nYou can create\
    \ a compressed dump file via an external table. For example, use the `COMPRESS`\
    \ option of the `ACCESS PARAMETERS` clause:\n\n```sql\nCREATE TABLE inv_et\nORGANIZATION\
    \ EXTERNAL (\n  TYPE ORACLE_DATAPUMP\n  DEFAULT DIRECTORY dp\n  ACCESS PARAMETERS\
    \ (COMPRESSION ENABLED)\n  LOCATION ('inv1.dmp')\n)\nAS SELECT * FROM inv;\n```\n\
    \nYou should see quite good compression ratios when using this option. In my testing,\
    \ the output dump file was 10 to 20 times smaller when compressed. Your mileage\
    \ may vary, depending on the type data being compressed.\n\n## Encrypting a Dump\
    \ File\n\nYou can also create an encrypted dump file using an external table.\
    \ This example uses the `ENCRYPTION` option of the `ACCESS PARAMETERS` clause:\n\
    \nCHAPTER 14 ■ EXTERNAL TABLES\n\n```sql\nCREATE TABLE inv_et\nORGANIZATION EXTERNAL\
    \ (\n  TYPE ORACLE_DATAPUMP\n  DEFAULT DIRECTORY dp\n  ACCESS PARAMETERS\n  (ENCRYPTION\
    \ ENABLED)\n  LOCATION ('inv1.dmp')\n)\nAS SELECT * FROM inv;\n```\n\nFor this\
    \ example to work, you need to have a security wallet in place and open for your\
    \ database.\n\n`Note` Using encryption requires an additional license from Oracle.\
    \ Contact Oracle for details on using the Advanced Security Option.\n\nYou enable\
    \ compression and encryption via the `ACCESS PARAMETERS` clause. Table 14–2 contains\
    \ a listing of all access parameters available with the `ORACLE_DATAPUMP` access\
    \ driver.\n\n***Table 14–2.** Parameters of the `ORACLE_DATAPUMP` Access Driver*\n\
    \n| **Access Parameter** | **Description** |\n| :--- | :--- |\n| `COMPRESSION`\
    \ | Compresses the dump file. `DISABLED` is the default value. |\n| `ENCRYPTION`\
    \ | Encrypts the dump file. `DISABLED` is the default value. |\n| `NOLOGFILE`\
    \ | Suppresses the generation of a log file. |\n| `LOGFILE=[directory_object:]logfile_name`\
    \ | Allows you to name a log file. |\n| `VERSION` | Specifies the minimum version\
    \ of Oracle that can read the dump file. |\n\n## Preprocessing an External Table\n\
    \nOracle added (in 10.2.0.5 and higher) the ability to preprocess the file on\
    \ which an external table is based. For example, you can instruct the `CREATE\
    \ TABLE...ORGANIZATION EXTERNAL` statement to uncompress a compressed operating-system\
    \ file before it’s processed.\n\nHere’s a simple example to illustrate this concept.\
    \ First, create a directory object that contains the location of the compressed\
    \ file:\n\n```sql\nSQL> create or replace directory data_dir as '/orahome/oracle/dk/et';\n\
    ```\n\nYou also need to create a directory object that contains the location of\
    \ the script that will perform the preprocessing on the data file. In this example,\
    \ the directory is `/bin`:\n\n```sql\nSQL> create or replace directory exe_dir\
    \ as '/bin';\n```\n\nThis example compressed the operating-system flat file with\
    \ the `gzip` utility. The compressed file is named `exa.csv.gz`. You instruct\
    \ the `CREATE TABLE...ORGANIZATION EXTERNAL` statement to preprocess the compressed\
    \ file by specifying the `PREPROCESSOR` clause. Because the CSV file was compressed\
    \ by the `gzip` utility, it can be uncompressed by the corresponding uncompress\
    \ utility, `gunzip`. Look carefully for the `PREPROCESSOR` clause in the following\
    \ listing; it’s nested under `ACCESS PARAMETERS`:\n\n```sql\ncreate table exadata_et(\n\
    \  machine_count NUMBER\n  ,hide_flag NUMBER\n  ,oracle NUMBER\n  ,ship_date DATE\n\
    \  ,rack_type VARCHAR2(32)\n)\norganization external (\n  type oracle_loader\n\
    \  default directory data_dir\n  access parameters\n  (\n    records delimited\
    \ by newline\n    preprocessor exe_dir: 'gunzip'\n    fields terminated by '|'\n\
    \    missing field values are null\n    (exa_id\n    ,machine_count\n    ,hide_flag\n\
    \    ,oracle\n    ,ship_date char date_format date mask \"mm/dd/yyyy\"\n    ,rack_type)\n\
    \  )\n  location ('ex.csv.gz')\n)\nreject limit unlimited;\n```\n\nThe advantage\
    \ of preprocessing the dump file is that it saves you the step of having to first\
    \ uncompress the file.\n\n`Note` Oracle doesn’t let you use the `PREPROCESSOR`\
    \ clause in databases that have the Database Vault feature installed.\n\nCHAPTER\
    \ 14 ■ EXTERNAL TABLES\n\n## Summary\n\nI used to use SQL*Loader for all types\
    \ of data-loading tasks. In the past few years, I’ve become an external-table\
    \ convert. Almost anything you can do with SQL*Loader, you can also do with an\
    \ external table. The external-table approach is advantageous because there are\
    \ fewer moving parts and the interface is SQL*Plus. Most DBAs and developers find\
    \ SQL*Plus easier to use than a SQL*Loader control file.\n\nYou can easily use\
    \ an external table to enable SQL*Plus access to operating-system flat files.\
    \ You simply have to define the structure of the flat file in your `CREATE TABLE...ORGANIZATION\
    \ EXTERNAL` statement. After the external table is created, you can select directly\
    \ from the flat file as if it were a database table. You can select from an external\
    \ table, but you can’t insert, update, or delete.\n\nWhen you create an external\
    \ table, if required, you can then create regular database tables by using `CREATE\
    \ TABLE AS SELECT` from the external table. Doing so provides a fast and effective\
    \ way to load data stored in external operating-system files.\n\nThe external-table\
    \ feature also allows you to select data from a table and write it to a binary\
    \ dump file. The external table `CREATE TABLE...ORGANIZATION EXTERNAL` statement\
    \ defines which tables and columns are used to unload the data. A dump file created\
    \ in this manner is platform independent, meaning you can copy it to a server\
    \ using a different operating system and seamlessly load the data.\n\nAdditionally,\
    \ the dump file can be encrypted and compressed for secure and efficient transportation.\n\
    \nYou can also use parallel features to reduce the amount of time it takes to\
    \ create the dump file.\n\nThe next chapter deals with materialized views. These\
    \ database objects provide you with a flexible, maintainable, and scalable mechanism\
    \ for aggregating and replicating data.\n\n![](index-395_1.png)\n\nCHAPTER 15\
    \ ■ MATERIALIZED VIEWS\n\nAfter the table is created, you put in a daily process\
    \ to delete from it at 8:00 pm and completely refresh it:\n\n```sql\n-- Step 1\
    \ delete from daily aggregated sales data:\ndelete from daily_sales;\n--\n-- Step\
    \ 2 repopulate table with a snapshot of aggregated sales table:\ninsert into daily_sales\n\
    select\n  sum(sales_amt)\n  ,sales_dtt\nfrom sales\ngroup by sales_dtt;\n```\n\
    \nYou inform the users that they can have subsecond query results by selecting\
    \ from `DAILY_SALES` (instead of running the query that directly selects and aggregates\
    \ from the master `SALES` table). This process roughly describes a complete refresh\
    \ process.\n\nOracle’s MV technology automates and greatly enhances this process.\
    \ This chapter describes the procedure for implementing both basic and complex\
    \ MV features. After reading this chapter and working through the examples, you\
    \ should be able to create MVs to replicate and aggregate data in a wide variety\
    \ of situations.\n\nBefore delving into the details of creating MVs, it’s useful\
    \ to cover basic terminology and helpful data-dictionary views related to MVs.\
    \ The next two subsections briefly describe the various MV features and the many\
    \ data-dictionary views that contain MV metadata.\n\n`Note` This chapter doesn’t\
    \ cover topics like multimaster replication and updateable MVs. See the *Oracle\
    \ Advanced Replication Guide* (available on Oracle’s OTN web site) for more details\
    \ on those topics.\n\nCHAPTER 15 ■ MATERIALIZED VIEWS\n\n### Materialized View\
    \ Terminology\n\nA great many terms relate to refreshing MVs. You should be familiar\
    \ with these terms before delving into how to implement the features. Table 15–1\
    \ describes the various terms relevant to MVs.\n\n***Table 15–1.** Descriptions\
    \ of MV Terminology*\n\n| **Term** | **Meaning** |\n| :--- | :--- |\n| Materialized\
    \ view | Database object used for replicating data and improving performance.\
    \ |\n| Materialized view SQL statement | SQL query that defines what data is stored\
    \ in the underlying MV base table. |\n| Materialized view underlying table | Database\
    \ table that has the same name as the MV that stores the result of the MV SQL\
    \ query. |\n| Master (or base) table | Table that an MV references in its `FROM`\
    \ clause of the MV SQL statement. |\n| Complete refresh | Process in which an\
    \ MV is deleted from and completely refreshed with an MV SQL statement. |\n| Fast\
    \ refresh | Process during which only DML changes that have occurred since the\
    \ last refresh are applied to an MV. |\n| Materialized view log | Database object\
    \ that tracks DML changes to the MV base table. An MV log is required for fast\
    \ refreshes. It can be based on the primary key, `ROWID`, or object ID. |\n| Simple\
    \ MV | MV based on a simple query that can be fast-refreshed. |\n| Complex MV\
    \ | MV based on a complex query that isn’t eligible for fast refresh. |\n| Build\
    \ mode | Mode that specifies whether the MV should be immediately populated or\
    \ deferred. |\n| Refresh mode | Mode that specifies whether the MV should be refreshed\
    \ on demand, on commit, or never. |\n| Refresh method | Option that specifies\
    \ whether the MV refresh should be complete or fast. |\n| Query rewrite | Feature\
    \ that allows the optimizer to choose to use MVs (instead of base tables) to fulfill\
    \ the requirements of a query (even though the query doesn’t directly reference\
    \ the MVs). |\n| Local MV | MV that resides in the same database as the base table(s).\
    \ |\n| Remote MV | MV that resides in a separate database from the base table(s).\
    \ |\n| Refresh group | Set of MVs refreshed at the same consistent transactional\
    \ point. |\n\nCHAPTER 15 ■ MATERIALIZED VIEWS\n\nRefer back to Table 15–1 as you\
    \ read the rest of this chapter. These terms and concepts are explained and expounded\
    \ on in subsequent sections.\n\n### Referencing Useful Views\n\nWhen you’re working\
    \ with MVs, sometimes it’s hard to remember which data-dictionary view to query\
    \ under what circumstance. A wide variety of data-dictionary views are available.\
    \ Table 15–2 contains a description of the MV-related data-dictionary views. Examples\
    \ of using these views are shown throughout this chapter where appropriate. These\
    \ views are invaluable for troubleshooting, diagnosing issues, and understanding\
    \ your MV environment.\n\n***Table 15–2.** Materialized View Data-Dictionary View\
    \ Definitions*\n\n| **Data-Dictionary View** | **Description** |\n| :--- | :---\
    \ |\n| `DBA/ALL/USER_MVIEWS` | Information about MVs such as owner, base query,\
    \ last refresh time, and so on. |\n| `DBA/ALL/USER_MVIEW_REFRESH_TIMES` | MV last\
    \ refresh times, MV names, master table, and master owner. |\n| `DBA/ALL/USER_REGISTERED_MVIEWS`\
    \ | All registered MVs. Helps identify which MVs are using which MV logs. |\n\
    | `DBA/ALL/USER_MVIEW_LOGS` | MV log information. |\n| `DBA/ALL/USER_BASE_TABLE_MVIEWS`\
    \ | Base-table names and last refresh dates for tables that have MV logs. |\n\
    | `DBA/ALL/USER_MVIEW_AGGREGATES` | Aggregate functions that appear in `SELECT`\
    \ clauses for MVs. |\n| `DBA/ALL/USER_MVIEW_ANALYSIS` | Information about MVs.\
    \ Oracle recommends that you use `DBA/ALL/USER_MVIEWS` instead of these views.\
    \ |\n| `DBA/ALL/USER_MVIEW_COMMENTS` | Any comments associated with MVs. |\n|\
    \ `DBA/ALL/USER_MVIEW_DETAIL_PARTITION` | Partition and freshness information.\
    \ |\n| `DBA/ALL/USER_MVIEW_DETAIL_SUBPARTITION` | Subpartition and freshness information.\
    \ |\n| `DBA/ALL/USER_MVIEW_DETAIL_RELATIONS` | Local tables and MVs that an MV\
    \ is dependent on. |\n| `DBA/ALL/USER_MVIEW_JOINS` | Joins between two columns\
    \ in the `WHERE` clause of an MV definition. |\n| `DBA/ALL/USER_MVIEW_KEYS` |\
    \ Columns or expressions in the `SELECT` clause of an MV definition. |\n\nCHAPTER\
    \ 15 ■ MATERIALIZED VIEWS\n\n| **Data-Dictionary View** | **Description** |\n\
    | :--- | :--- |\n| `DBA/ALL/USER_TUNE_MVIEW` | Result of executing the `DBMS_ADVISOR.TUNE_MVIEW`\
    \ procedure. |\n| `V$MVREFRESH` | Information about MVs currently being refreshed.\
    \ |\n| `DBA/ALL/USER_REFRESH` | Details about MV refresh groups. |\n| `DBA_RGROUP`\
    \ | Information about MV refresh groups. |\n| `DBA_RCHILD` | Children in an MV\
    \ refresh group. |\n\n## Creating Basic Materialized Views\n\nThis section covers\
    \ how to create an MV. The two most common configurations used are as follows:\n\
    \n- Creating complete-refresh MVs that are refreshed on demand\n- Creating fast-refresh\
    \ MVs that are refreshed on demand\n\nIt’s important to understand these basic\
    \ configurations. They lay the foundation for everything else you do with an MV.\
    \ Therefore, this section starts with these basic configurations. Later, the section\
    \ covers more advanced configurations. Make sure you understand the material in\
    \ the following two sections before you move on to advanced MV topics.\n\n###\
    \ Creating a Complete-Refreshable Materialized View\n\nThis section explains how\
    \ to set up an MV that is periodically completely refreshed, which is about the\
    \ simplest example possible. Complete refreshes are appropriate for MVs that have\
    \ base tables in which significant portions of the rows change from one refresh\
    \ interval to the next. Complete refreshes are also required in situations where\
    \ a fast refresh isn’t possible (due to restrictions imposed by Oracle—more on\
    \ this later in the chapter).\n\n`Note` To create an MV, you need both the `CREATE\
    \ MATERIALIZED VIEW` system privilege and the `CREATE TABLE` system privilege.\n\
    \nThe example in this section uses the following base table named `SALES`:\n\n\
    ```sql\ncreate table sales(\n  sales_id number\n  ,sales_amt number\n  ,region_id\
    \ number\n  ,sales_dtt timestamp\n  ,constraint sales_pk primary key(sales_id)\n\
    );\n```\n\nCHAPTER 15 ■ MATERIALIZED VIEWS\n\nInsert some sample data into the\
    \ `SALES` table:\n\n```sql\ninsert into sales values(1,101,100,sysdate-50);\n\
    insert into sales values(2,511,200,sysdate-20);\ninsert into sales values(3,11,100,sysdate);\n\
    commit;\n```\n\nThe next step is to create the MV, using a `CREATE MATERIALIZED\
    \ VIEW...AS SELECT` statement. This statement names the MV, specifies its attributes,\
    \ and defines the SQL query on which the MV is based:\n\n```sql\ncreate materialized\
    \ view sales_mv\nsegment creation immediate\nrefresh\n  complete\n  on demand\n\
    as\n  select\n    sales_amt\n    ,sales_dtt\n  from sales;\n```\n\nThe `SEGMENT\
    \ CREATION IMMEDIATE` clause is available with Oracle 11 *g* release 2 and higher.\
    \ It instructs Oracle to create the segment and allocate an extent when you create\
    \ the MV. This was the behavior in previous versions of Oracle. If you don’t want\
    \ immediate segment creation, use the `SEGMENT CREATION DEFERRED` clause. If the\
    \ newly created MV has any rows in it, then segments are created and extents are\
    \ allocated regardless of whether you use `SEGMENT CREATION DEFERRED`.\n\nLet’s\
    \ look at the `USER_MVIEWS` data dictionary to verify that the MV was created\
    \ as expected. Here’s the query to run:\n\n```sql\nselect\n  mview_name\n  ,refresh_method\n\
    \  ,refresh_mode\n  ,build_mode\n  ,fast_refreshable\nfrom user_mviews\nwhere\
    \ mview_name = 'SALES_MV';\n```\n\nHere’s the output for this MV:\n\n```\nMVIEW_NAME\
    \   REFRESH_   REFRESH_MODE   BUILD_MOD   FAST_REFRESHABLE\n------------ ----------\
    \ -------------- ----------- --------------------\nSALES_MV     COMPLETE   DEMAND\
    \         IMMEDIATE   NO\n```\n\nIt’s also informative to inspect the `USER_OBJECTS`\
    \ and `USER_SEGMENTS` views to see what has been created. When you query `USER_OBJECTS`,\
    \ notice that several objects have been created:\n\n```sql\nselect\n  object_name\n\
    \  ,object_type\nfrom user_objects\nwhere object_name like 'SALES%'\norder by\
    \ object_name;\n```\n\nHere’s the corresponding output:\n\n```\nOBJECT_NAME  \
    \        OBJECT_TYPE\n-------------------- --------------------\nSALES       \
    \         TABLE\nSALES_MV             MATERIALIZED VIEW\nSALES_MV            \
    \ TABLE\nSALES_PK             INDEX\n```\n\nThe MV is a logical container that\
    \ stores data in a regular database table. Querying the `USER_SEGMENTS` view shows\
    \ the base table, its primary-key index, and the table that stores data returned\
    \ by the MV query:\n\n```sql\nselect\n  segment_name\n  ,segment_type\nfrom user_segments\n\
    where segment_name like 'SALES%'\norder by segment_name;\n```\n\nHere’s the output\
    \ for this example:\n\n```\nSEGMENT_NAME   SEGMENT_TYPE\n-------------- --------------------\n\
    SALES          TABLE\nSALES_PK       INDEX\nSALES_MV       TABLE\n```\n\n`Note`\
    \ Oracle sometimes automatically creates an index on the MV. In this scenario,\
    \ no index for the MV was created.\n\nFinally, let’s look at how to refresh the\
    \ `SALES_MV` MV. Here’s the data contained in `SALES_MV`:\n\n```sql\nSQL> select\
    \ sales_amt, to_char(sales_dtt,'dd-mon-yyyy') from sales_mv;\n```\n\nHere’s the\
    \ output:\n\n```\nSALES_AMT TO_CHAR(SALES_DTT\n--------- -----------------\n101\
    \       17-jun-2010\n511       17-jul-2010\n11        06-aug-2010\n```\n\nNext,\
    \ insert some additional data into the base `SALES` table:\n\n```sql\nSQL> insert\
    \ into sales values(4,99,200,sysdate);\nSQL> insert into sales values(5,127,300,sysdate);\n\
    ```\n\nNow you attempt to initiate a fast refresh of the MV using the `REFRESH`\
    \ procedure of the `DBMS_MVIEW` package. This example passes two parameters to\
    \ the `REFRESH` procedure: the name and the refresh method. The name is `SALES_MV`,\
    \ and the parameter is `F` (for *fast*):\n\n```sql\nSQL> exec dbms_mview.refresh('SALES_MV','F');\n\
    ```\n\nBecause this MV wasn’t created in conjunction with an MV log, a fast refresh\
    \ isn’t possible. The following error is thrown:\n\n```\nORA-12004: REFRESH FAST\
    \ cannot be used for materialized view \"MV\".\"SALES_MV\"\n```\n\n![](index-402_1.png)\n\
    \nCHAPTER 15 ■ MATERIALIZED VIEWS\n\n5.  Users can query data from the MV, which\
    \ contains a point-in-time snapshot of the base table’s data.\n\nIn the next section,\
    \ a more complicated example shows you how to set up a fast-refreshable MV.\n\n\
    ### Creating a Fast-Refreshable Materialized View\n\nWhen you create a fast-refreshable\
    \ MV, it initially populates the MV table with the entire result set of the MV\
    \ query. After the initial result set is in place, only data modified (in the\
    \ base table) since the last refresh needs to be applied to the MV. In other words,\
    \ any updates, inserts, or deletes from the master table that have occurred since\
    \ the last refresh are copied over. This feature is appropriate when you have\
    \ a small amount of changes to a base table over a period of time compared to\
    \ the total number of rows in the table.\n\nHere are the steps to implement a\
    \ fast-refreshable MV:\n\n1.  Create a base table (if it’s not already created).\n\
    2.  Create an MV log on the base table.\n3.  Create an MV as fast-refreshable.\n\
    \nThis example first creates a base table. In most environments, you already have\
    \ a base table in place. For illustrative purposes, here’s the table-creation\
    \ script and some sample data:\n\n```sql\ncreate table sales(\n  sales_id number\n\
    \  ,sales_amt number\n  ,region_id number\n  ,sales_dtt timestamp\n  ,constraint\
    \ sales_pk primary key(sales_id)\n);\n--\ninsert into sales values(1,101,100,sysdate-50);\n\
    insert into sales values(2,511,200,sysdate-20);\ninsert into sales values(3,11,100,sysdate);\n\
    commit;\n```\n\nA fast-refreshable MV requires an MV log on the base table. When\
    \ a fast refresh occurs, the MV log must have a unique way to identify which records\
    \ have been modified and thus need to be refreshed.\n\nYou can do this two different\
    \ approaches. One method is to specify the `PRIMARY KEY` clause when you create\
    \ the MV log, and the other is to specify the `ROWID` clause. If the underlying\
    \ base table has a primary key, then use the primary key–based MV log. If the\
    \ underlying base table has no primary key, then you have to create the MV log\
    \ using `ROWID`. In most cases, you’ll probably have a primary key defined for\
    \ every base table. However, the reality is that some systems are poorly designed\
    \ or have some rare reason for a table not to have a primary key.\n\nIn this example,\
    \ a primary key is defined on the base table, so you create the MV log with the\
    \ `PRIMARY KEY` clause:\n\n```sql\nSQL> create materialized view log on sales\
    \ with primary key;\n```\n\nIf there was no primary key defined on the base table,\
    \ this error is thrown when attempting to create the MV log:\n\n```\nORA-12014:\
    \ table does not contain a primary key constraint\n```\n\nCHAPTER 15 ■ MATERIALIZED\
    \ VIEWS\n\nIf the base table has no primary key, and you don’t have the option\
    \ to add one, you must specify `ROWID` when you create the MV log:\n\n```sql\n\
    SQL> create materialized view log on sales with rowid;\n```\n\nNow that you’ve\
    \ created the MV log, you can create the fast-refreshable MV. There are a couple\
    \ of interesting architectural considerations to point out. If there is no MV\
    \ log on the base table, then Oracle doesn’t allow you to create a fast-refreshable\
    \ MV. This error is thrown:\n\n```\nORA-23413: table does not have a materialized\
    \ view log.\n```\n\nAlso, when you create the fast-refreshable MV, you must specify\
    \ whether it’s refreshed via the `PRIMARY KEY` (which is the default) or via the\
    \ `ROWID`. This example uses a table with a primary key and an MV log created\
    \ with a primary key. In this example, the MV is fast-refreshed via a primary\
    \ key. When you use a primary key–based fast-refreshable MV, the primary-key column(s)\
    \ of the base table must be part of the fast-refreshable MV `SELECT` statement:\n\
    \n```sql\ncreate materialized view sales_mv\nsegment creation immediate\nrefresh\n\
    \  with primary key\n  fast\n  on demand\nas\n  select\n    sales_id\n    ,sales_amt\n\
    \    ,sales_dtt\n  from sales;\n```\n\nAt this point, it’s useful to inspect the\
    \ objects that are associated with the MV. The following query selects from `USER_OBJECTS`:\n\
    \n```sql\nselect\n  object_name\n  ,object_type\nfrom user_objects\nwhere object_name\
    \ like '%SALES%'\norder by object_name;\n```\n\nHere are the objects that have\
    \ been created:\n\n```\nOBJECT_NAME          OBJECT_TYPE\n--------------------\
    \ --------------------\nMLOG$_SALES          TABLE\nRUPD$_SALES          TABLE\n\
    SALES                TABLE\nSALES_MV             MATERIALIZED VIEW\nSALES_MV \
    \            TABLE\nSALES_PK             INDEX\nSALES_PK1            INDEX\n```\n\
    \nCHAPTER 15 ■ MATERIALIZED VIEWS\n\nSeveral objects in the previous output require\
    \ some explanation:\n\n- `MLOG$_SALES`\n- `RUPD$_SALES`\n- `SALES_PK1`\n\nFirst,\
    \ when an MV log is created, a corresponding table is also created that stores\
    \ the rows in the base table that changed and how they changed (insert, update,\
    \ or delete). The MV log table name is of the format `MLOG$_<base table name>`.\n\
    \nA table is also created with the format `RUPD$_<base table name>`. Oracle automatically\
    \ creates this `RUPD$` table when you create a fast-refreshable MV using a primary\
    \ key. It’s there to support the updateable MV feature. You don’t have to worry\
    \ about this table unless you’re dealing with updatable MVs (see the *Oracle Advanced\
    \ Replication Guide* for more details on updatable MVs). If you’re not using the\
    \ updatable MV feature, then you can ignore the `RUPD$` table.\n\nOracle also\
    \ creates an index with the format `<base table name>_PK1`. This index is automatically\
    \ created for primary key–based MVs and is based on the primary-key column(s)\
    \ of the base table. If this is a `ROWID` instead of a primary key, then the index\
    \ name has the format `I_SNAP$_<table_name>` and is based on the `ROWID`. If you\
    \ don’t explicitly name the primary-key index on the base table, then Oracle gives\
    \ the MV table primary-key index a system-generated name such as `SYS_C008780`.\n\
    \nNow that you understand the underlying architectural components, let’s look\
    \ at the data in the MV:\n\n```sql\nSQL> select sales_amt, to_char(sales_dtt,'dd-mon-yyyy')\
    \ from sales_mv;\n```\n\nHere’s the output:\n\n```\nSALES_AMT TO_CHAR(SALES_DTT\n\
    --------- -----------------\n101       12-jun-2010\n511       12-jul-2010\n11\
    \        01-aug-2010\n```\n\nLet’s add two records to the base `SALES` table:\n\
    \n```sql\ninsert into sales values(4,99,200,sysdate);\ninsert into sales values(5,127,300,sysdate);\n\
    commit;\n```\n\nAt this point, it’s instructional to inspect the `M$LOG` table.\
    \ You should see two records that identify how the data in the `SALES` table has\
    \ changed:\n\n```sql\nSQL> select count(*) from mlog$_sales;\n```\n\nThere are\
    \ two records:\n\n```\nCOUNT(*)\n----------\n2\n```\n\nNext, let’s refresh the\
    \ MV. This MV is fast-refreshable, so you call the `REFRESH` procedure of the\
    \ `DBMS_MVIEW` package with the `F` (for *fast*) parameter:\n\n```sql\nSQL> exec\
    \ dbms_mview.refresh('SALES_MV','F');\n```\n\nA quick inspection of the MV shows\
    \ two new records:\n\n```sql\nSQL> select sales_amt, to_char(sales_dtt,'dd-mon-yyyy')\
    \ from sales_mv;\n```\n\nHere’s some sample output:\n\nCHAPTER 15 ■ MATERIALIZED\
    \ VIEWS\n\n```\nSALES_AMT TO_CHAR(SALES_DTT\n--------- -----------------\n101\
    \       12-jun-2010\n511       12-jul-2010\n11        01-aug-2010\n99        01-aug-2010\n\
    127       01-aug-2010\n```\n\nIn addition, the count of the `MLOG$` has dropped\
    \ to zero. After the MV refresh is complete, those records are no longer required:\n\
    \n```sql\nSQL> select count(*) from mlog$_sales;\n```\n\nHere’s the output:\n\n\
    ```\nCOUNT(*)\n----------\n0\n```\n\nYou can verify the last method in which an\
    \ MV was refreshed by querying the `USER_MVIEWS` view:\n\n```sql\nselect\n  mview_name\n\
    \  ,last_refresh_type\n  ,last_refresh_date\nfrom user_mviews\norder by 1,3;\n\
    ```\n\nHere’s some sample output:\n\n```\nMVIEW_NAME   LAST_REF   LAST_REFR\n\
    ------------ ---------- ---------\nSALES_MV     FAST       01-AUG-10\n```\n\n\
    Figure 15–2 illustrates the architectural components involved with a fast refresh.\
    \ The numbers in the boxes represent the sequential flow of the fast-refresh process.\
    \ If you’re new to MVs, pause a few minutes here and make sure you understand\
    \ all the components.\n\n![](index-407_1.png)\n\nCHAPTER 15 ■ MATERIALIZED VIEWS\n\
    \n- Logging\n- Parallelism\n\nThe next section in this chapter shows examples\
    \ of how to create MVs with various features.\n\n## Going Beyond the Basics\n\n\
    Numerous MV features are available. Many of them are related to attributes that\
    \ you can apply to any table, such as storage, indexing, compression, encryption,\
    \ and so on. Other features are related to the type of MV created and how it’s\
    \ refreshed. These aspects are described in the next several subsections.\n\n\
    ### Creating MVs and Specifying Tablespace for MVs and Indexes\n\nEvery MV has\
    \ an underlying tables associated with it. Additionally, depending on the type\
    \ of MV, an index may be automatically created. When you create an MV, you can\
    \ specify the tablespace and storage characteristics for both the underlying table\
    \ and index. The next example shows how to specify the tablespace to be used for\
    \ the MV table and a separate tablespace for the index:\n\n```sql\ncreate materialized\
    \ view inv_mv\ntablespace mv_data\nusing index tablespace mv_index\nas\n  select\n\
    \    inv_id\n    ,inv_desc\n  from inv;\n```\n\nYou can also specify storage characteristics.\
    \ For example, if you know you’re loading data into MVs that will rarely be updated,\
    \ it’s appropriate to set `PCTUSED` to a high value, such as 95. For example:\n\
    \n```sql\ncreate materialized view inv_mv\npctused 95\npctfree 5\ntablespace mv_data\n\
    using index tablespace mv_index\nas\n  select\n    inv_id\n    ,inv_desc\n  from\
    \ inv;\n```\n\n### Creating Indexes on MVs\n\nAn MV stores its data in a regular\
    \ database table. Therefore, you can create indexes on the underlying table (just\
    \ as you can for any other table). In general, follow the same guidelines for\
    \ creating an index on an MV table as you would a regular table. (See Chapter\
    \ 8 for more details on creating indexes.) Keep in mind that although indexes\
    \ can significantly improve query performance, overhead is associated with maintaining\
    \ the index for any inserts, updates, and deletes. Indexes also consume disk space.\n\
    \nListed next is an example of creating an index based on a column in an MV. The\
    \ syntax is the same as for creating an index on a regular table:\n\nCHAPTER 15\
    \ ■ MATERIALIZED VIEWS\n\n```sql\nSQL> create index inv_mv_idx1 on inv_mv(region_id)\
    \ tablespace mv_index;\n```\n\nYou can display the indexes created for an MV by\
    \ querying the `USER_INDEXES` view:\n\n```sql\nselect\n  a.table_name\n  ,a.index_name\n\
    from user_indexes a\n,user_mviews b\nwhere a.table_name = b.mview_name;\n```\n\
    \n`Note` If you create a simple MV with the `WITH PRIMARY KEY` clause that selects\
    \ from a base table that has a primary key, Oracle automatically creates an index\
    \ on the corresponding primary-key columns in the MV. If you create a simple MV\
    \ using the `WITH ROWID` clause that selects from a base table that has a primary\
    \ key, Oracle automatically creates an index on a hidden column named `M_ROW$$`.\n\
    \n### Partitioning Materialized Views\n\nYou can partition an MV table like any\
    \ other regular table in the database. If you work with large MVs, you may want\
    \ to consider partitioning to better manage and maintain a large table. Use the\
    \ `PARTITION` clause when you create the MV. This example builds an MV that is\
    \ partitioned by range on the `DATE_ID` column:\n\n```sql\ncreate materialized\
    \ view inv_mv\npartition by range (date_id)\n(partition p1\nvalues less than (20100101)\n\
    ,partition p2\nvalues less than (20110101)\n,partition p3\nvalues less than (20120101))\n\
    refresh on demand complete with rowid\nas\n  select\n    inv_id\n    ,inv_desc\n\
    \    ,date_id\n  from inv;\n```\n\nThe result set from the query is stored in\
    \ a partitioned table. You can view the partition details for this table in `USER_TAB_PARTITIONS`\
    \ and `USER_PART_TABLES` (just like any other partitioned table in your database).\
    \ See chapter 12 for more details on partitioning strategies and maintenance.\n\
    \nCHAPTER 15 ■ MATERIALIZED VIEWS\n\n### Compressing a Materialized View\n\nAs\
    \ mentioned earlier, when you create an MV, an underlying table is created to\
    \ store the data. Because this table is a regular database table, you can implement\
    \ features such as compression. For example:\n\n```sql\ncreate materialized view\
    \ inv_mv\ncompress\nas\n  select\n    inv_id\n    ,inv_desc\n  from inv;\n```\n\
    \nYou can confirm the compression details with the following query:\n\n```sql\n\
    select\n  table_name\n  ,compression\n  ,compress_for\nfrom user_tables where\
    \ table_name='INV_MV';\n```\n\nHere’s the output:\n\n```\nTABLE_NAME   COMPRESS\
    \   COMPRESS_FOR\n------------ ---------- ------------\nINV_MV       ENABLED \
    \   BASIC\n```\n\n`Note` Basic table compression doesn’t require an extra license\
    \ from Oracle. Online transaction processing (OLTP) compression requires the Advanced\
    \ Compression option, which requires an extra license from Oracle. See the Oracle\
    \ Database Licensing Information documentation (available on OTN) for details.\n\
    \n### Encrypting Materialized View Columns\n\nAs mentioned earlier, when you create\
    \ an MV, an underlying table is created to store the data. Because this table\
    \ is a regular database table, you can implement features such as encryption of\
    \ columns. For example:\n\n```sql\ncreate materialized view inv_mv\n  (inv_id\
    \ encrypt no salt\n  ,inv_desc encrypt)\nas\n  select\n    inv_id inv_id\n   \
    \ ,inv_desc inv_desc\n  from inv;\n```\n\nFor the previous statement to work,\
    \ you must create and open a security wallet for your database. This feature requires\
    \ the Advanced Security option from Oracle (which requires an additional license).\n\
    \nYou can verify that encryption is in place by describing the MV:\n\nCHAPTER\
    \ 15 ■ MATERIALIZED VIEWS\n\n```sql\nSQL> desc inv_mv\n Name                 \
    \                     Null?    Type\n -----------------------------------------\
    \ -------- ----------------------------\n INV_ID                             \
    \       NOT NULL NUMBER ENCRYPT\n INV_DESC                                   \
    \        VARCHAR2(30) ENCRYPT\n```\n\n### Building a Materialized View on a Prebuilt\
    \ Table\n\nIn data-warehouse environments, sometimes you need to create a table,\
    \ populate it with large quantities of data, and then transform it into an MV.\
    \ Or you may be replicating a large table and find that it’s more efficient to\
    \ initially populate the remote MV by prebuilding the table with data using Data\
    \ Pump. Listed next are the steps for building an MV on a prebuilt table:\n\n\
    1.  Create a table.\n2.  Populate it with data.\n3.  Create an MV on the table\
    \ created in step 1.\n\nHere’s a simple example to illustrate the process. First,\
    \ you create a table:\n\n```sql\ncreate table inv_mv\n  (inv_id number\n  ,inv_desc\
    \ varchar2(30)\n  );\n```\n\nNow, populate the table with data. For example, in\
    \ a data-warehouse environment, this can be a table loaded using Data Pump, SQL*Loader,\
    \ or external tables.\n\nFinally, run the `CREATE MATERIALIZED VIEW...ON PREBUILT\
    \ TABLE` statement to turn the table into an MV. The MV name and the table name\
    \ must be identical. Additionally, each column in the query must correspond to\
    \ a column in the table. For example:\n\n```sql\ncreate materialized view inv_mv\n\
    on prebuilt table\nusing index tablespace mv_index\nas\n  select\n    inv_id\n\
    \    ,inv_desc\n  from inv;\n```\n\nNow the `INV_MV` object is an MV. If you attempt\
    \ to drop the `INV_MV` table, the following error is thrown, indicating that `INV_MV`\
    \ is now a materialized view:\n\n```sql\nSQL> drop table inv_mv;\n```\n\n```\n\
    ORA-12083: must use DROP MATERIALIZED VIEW to drop \"MV\".\"INV_MV\"\n```\n\n\
    The prebuilt-table feature is useful in data-warehouse environments where typically\
    \ there are long periods when a base table isn’t being actively updated. This\
    \ gives you time to load a prebuilt table and ensure that its contents are identical\
    \ to the base table. After you create the MV on the prebuilt table, you can fast-refresh\
    \ the MV and keep it in synch with the base table.\n\nIf your base table (specified\
    \ in the `SELECT` clause of the MV) is continuously being updated, then creating\
    \ an MV on a prebuilt table may not be a viable option. This is because there\
    \ is no way to ensure that the prebuilt table stays in synch with the base table.\n\
    \nCHAPTER 15 ■ MATERIALIZED VIEWS\n\n`Note` For MVs created on prebuilt tables,\
    \ if you subsequently issue a `DROP MATERIALIZED VIEW` statement, the underlying\
    \ table isn’t dropped. This has some interesting implications when you need to\
    \ modify a base table (like adding a column). For details, see the section later\
    \ in this chapter on Modifying Base-Table DDL and Propagating to Materialized\
    \ Views.\n\n### Creating an Unpopulated Materialized View\n\nWhen you create an\
    \ MV, you have the option of instructing Oracle whether or not to initially populate\
    \ the MV with data. For example, if it takes several hours to initially build\
    \ an MV, you may want to first define the MV and then populate it as a separate\
    \ job.\n\nThis example uses the `BUILD DEFERRED` clause to instruct Oracle not\
    \ to initially populate the MV with the results of the query:\n\n```sql\ncreate\
    \ materialized view inv_mv\ntablespace mv_data\nbuild deferred\nrefresh complete\
    \ on demand\nas\n  select\n    inv_id\n    ,inv_desc\n  from inv;\n```\n\nAt this\
    \ point, querying the MV results in zero rows returned. At some later point, you\
    \ can initiate a complete refresh to populate the MV with data.\n\n### Creating\
    \ a Materialized View Refreshed on Commit\n\nYou may have a requirement when data\
    \ is modified in the master table to have it immediately copied to an MV. In this\
    \ scenario, use the `ON COMMIT` clause when you create the MV. The master table\
    \ must have an MV log created on it for this technique to work. Here’s a simple\
    \ example that creates a table with a primary key, creates an MV log, and then\
    \ creates an MV refreshed on commit:\n\n```sql\ncreate table inv(inv_id number\
    \ primary key,\n                 inv_desc varchar2(30));\n--\ncreate materialized\
    \ view log on inv with primary key;\n--\ncreate materialized view inv_mv\nrefresh\n\
    \  on commit\nas\n  select inv_id, inv_desc from inv;\n```\n\nAs data is inserted\
    \ and committed in the master table, any changes are also available in the MV\
    \ that would be selected by the MV query.\n\nCHAPTER 15 ■ MATERIALIZED VIEWS\n\
    \nThe `ON COMMIT` refreshable MV has a few restrictions you need to be aware of:\n\
    \n- The master table and MV must be in the same database.\n- You can’t execute\
    \ distributed transaction on the base table.\n- This approach isn’t supported\
    \ with MVs that contain object types or Oracle-supplied types.\n\nAlso consider\
    \ the overhead associated with committing data simultaneously in two places; this\
    \ can impact the performance of a high-transaction OLTP system. Additionally,\
    \ if there is any problem with updating the MV, then the base table can’t commit\
    \ a transaction. For example, if the tablespace in which the MV is created becomes\
    \ full (and can’t allocate another extent), you see an error such as this when\
    \ trying to insert into the base table:\n\n```\nORA-12008: error in materialized\
    \ view refresh path\nORA-01653: unable to extend table MV.INV_MV by 16 in tablespace\
    \ TBSP2\n```\n\nFor these reasons, you should use this feature only when you’re\
    \ sure it won’t affect performance or availability.\n\n`Note` You can’t specify\
    \ an MV to be refreshed with both `ON COMMIT` and `ON DEMAND`. In addition, `ON\
    \ COMMIT` isn’t compatible with the `START WITH` and `NEXT` clauses of the `CREATE\
    \ MATERIALIZED VIEW` statement.\n\n### Creating a Never-Refreshable Materialized\
    \ View\n\nYou may never want an MV to be refreshed. For example, you may want\
    \ to guarantee that you have a snapshot of table at a point in time for auditing\
    \ purposes. Specify the `NEVER REFRESH` clause when you create the MV to achieve\
    \ this:\n\n```sql\ncreate materialized view inv_mv\ntablespace mv_data\nusing\
    \ index tablespace mv_index\nnever refresh\nas\n  select\n    inv_id\n    ,inv_desc\n\
    \  from inv;\n```\n\nIf you attempt to refresh a nonrefreshable MV, you receive\
    \ this error:\n\n```\nORA-23538: cannot explicitly refresh a NEVER REFRESH materialized\
    \ view\n```\n\nYou can alter a never-refreshable view to being refreshable. Use\
    \ the `ALTER MATERIALIZED VIEW` statement to do this:\n\n```sql\nSQL> alter materialized\
    \ view inv_mv refresh on demand complete;\n```\n\nCHAPTER 15 ■ MATERIALIZED VIEWS\n\
    \nYou can verify the refresh mode and method with the following query:\n\n```sql\n\
    select\n  mview_name\n  ,refresh_mode\n  ,refresh_method\nfrom user_mviews;\n\
    ```\n\n### Creating Materialized Views for Query-Rewrite\n\nQuery rewrite allows\
    \ the optimizer to recognize that an MV can be used to fulfill the requirements\
    \ of a query instead of using the underlying master (base) tables. If you have\
    \ an environment where users frequently write their own queries and are unaware\
    \ of the available MVs, this feature can help greatly with performance. There\
    \ are three prerequisites for enabling query-rewrite:\n\n- Oracle Enterprise Edition\n\
    - Database initialization parameter `QUERY_REWRITE_ENABLED` must be set to `TRUE`\
    \ (which is the default in Oracle Database 10 *g* or higher\n- MV either created\
    \ or altered with the `ENABLE QUERY REWRITE` clause\n\nThis example creates an\
    \ MV with query-rewrite enabled:\n\n```sql\ncreate materialized view sales_mv\n\
    tablespace mv_data\nusing index tablespace mv_index\nenable query rewrite\nas\n\
    \  select\n    sum(sales_amt)\n    ,b.reg_desc\n  from sales a\n  ,region b\n\
    \  where a.region_id = b.region_id\n  group by b.reg_desc;\n```\n\nYou can tell\
    \ if query-rewrite is enabled for an MV by selecting the `REWRITE_ENABLED` column\
    \ from `USER_MVIEWS`:\n\n```sql\nselect\n  mview_name\n  ,rewrite_enabled\n  ,rewrite_capability\n\
    from user_mviews\nwhere mview_name = 'SALES_MV';\n```\n\nHere’s the output:\n\n\
    ```\nMVIEW_NAME   R REWRITE_C\n------------ - ---------\nSALES_MV     Y GENERAL\n\
    ```\n\nIf for any reason a query isn’t using the query-rewrite functionality,\
    \ and you think it should be, use the `EXPLAIN_REWRITE` procedure of the `DBMS_MVIEW`\
    \ package to diagnose issues.\n\nCHAPTER 15 ■ MATERIALIZED VIEWS\n\n### Creating\
    \ a Fast-Refreshable MV Based on a Complex Query\n\nIn many situations, when you\
    \ base an MV on a query that joins multiple tables, it’s deemed complex, and therefore\
    \ is available only for a complete refresh. However, in some scenarios, you can\
    \ create a fast-refreshable MV when you reference two tables that are joined together\
    \ in the MV query.\n\nThis section describes how to use the `EXPLAIN_MVIEW` procedure\
    \ of the `DBMS_MVIEW` to determine whether it’s possible to fast-refresh a complex\
    \ query. To help you completely understand the example, this section shows the\
    \ SQL used to create the base tables. Say you have two base tables, `REGION` and\
    \ `INV`, which are defined as follows:\n\n```sql\ncreate table region(\n  region_id\
    \ number\n  ,reg_desc varchar2(30)\n  ,constraint region_pk primary key(region_id));\n\
    --\ncreate table inv(\n  inv_id number\n  ,inv_desc varchar2(30)\n  ,region_id\
    \ number\n  ,constraint inv_pk primary key(inv_id)\n  ,constraint dept_fk foreign\
    \ key (region_id) references region(region_id));\n```\n\nAdditionally, `REGION`\
    \ and `INV` have MV logs created on them as follows:\n\n```sql\nSQL> create materialized\
    \ view log on region with primary key;\nSQL> create materialized view log on inv\
    \ with primary key;\n```\n\nAlso, for this example, the base tables have the following\
    \ data inserted into them:\n\n```sql\ninsert into region values(10,'East');\n\
    insert into region values(20,'West');\ninsert into region values(30,'South');\n\
    insert into region values(40,'North');\n--\ninsert into inv values(1,'book',10);\n\
    insert into inv values(2,'table',20);\ninsert into inv values(3,'chair',30);\n\
    ```\n\nSuppose you want to create an MV that joins the `REGION` and `INV` base\
    \ tables as follows:\n\n```sql\ncreate materialized view inv_mv\ntablespace mv_data\n\
    using index tablespace mv_index\nas\n  select\n    a.inv_desc\n    ,b.reg_desc\n\
    \  from inv a\n  ,region b\n  where a.region_id = b.region_id;\n```\n\nNext, let’s\
    \ attempt to fast-refresh the MV:\n\n```sql\nSQL> exec dbms_mview.refresh('INV_MV','F');\n\
    ```\n\nThis error is thrown:\n\n```\nORA-12032: cannot use rowid column from materialized\
    \ view log on \"MV\".\"REGION\"\n```\n\nCHAPTER 15 ■ MATERIALIZED VIEWS\n\nThe\
    \ error indicates that the MV has issues and can’t be fast-refreshed. To determine\
    \ whether this MV can become fast-refreshable, use the output of the `EXPLAIN_MVIEW`\
    \ procedure of the `DBMS_MVIEW` package. This procedure requires that you first\
    \ create `MV_CAPABILITIES_TABLE` first be created. Oracle provides a script to\
    \ do this. Run this as the owner of the MV:\n\n```sql\nSQL> @?/rdbms/admin/utlxmv.sql\n\
    ```\n\nAfter you create the table, run the `EXPLAIN_MVIEW` procedure to populate\
    \ it:\n\n```sql\nSQL> exec dbms_mview.explain_mview(mv=>'INV_MV',stmt_id=>'100');\n\
    ```\n\nNow, query `MV_CAPABILITIES_TABLE` to see what potential issues this MV\
    \ may have:\n\n```sql\nselect\n  capability_name\n  ,possible\n  ,msgtxt\n  ,related_text\n\
    from mv_capabilities_table\nwhere capability_name like 'REFRESH_FAST_AFTER%'\n\
    and statement_id = '100'\norder by 1;\n```\n\nListed next is the output. The `P`\
    \ (`POSSIBLE`) column contains an `N` (`NO`) for every fast-refresh possibility:\n\
    \n```\nCAPABILITY_NAME                            P MSGTXT                   \
    \                        RELATED_TEXT\n------------------------------------------\
    \ - ------------------------------------------------ ------------------------------\n\
    REFRESH_FAST_AFTER_ANY_DML                  N see the reason why REFRESH_FAST_AFTER_ONETAB_DML\
    \ is disabled\nREFRESH_FAST_AFTER_INSERT                   N mv log must have\
    \ ROWID                            MV.REGION\nREFRESH_FAST_AFTER_INSERT      \
    \             N the SELECT list does not have the rowids of all the detail tables\n\
    REFRESH_FAST_AFTER_INSERT                   N mv log must have ROWID         \
    \                   MV.INV\nREFRESH_FAST_AFTER_ONETAB_DML               N see\
    \ the reason why REFRESH_FAST_AFTER_INSERT is disabled\n```\n\n`MSGTXT` indicates\
    \ one issue: the MV logs need to be `ROWID` based. Let’s drop and re-create the\
    \ MV logs with `ROWID` (instead of a primary key):\n\n```sql\ndrop materialized\
    \ view log on region;\ndrop materialized view log on inv;\n--\ncreate materialized\
    \ view log on region with rowid;\ncreate materialized view log on inv with rowid;\n\
    ```\n\nNext, reset `MV_CAPABILITIES_TABLE` and repopulate it via the `EXPLAIN_MVIEW`\
    \ procedure:\n\n```sql\nSQL> delete from mv_capabilities_table where statement_id=100;\n\
    SQL> exec dbms_mview.explain_mview(mv=>'INV_MV',stmt_id=>'100');\n```\n\nRe-running\
    \ the previous query that selects from `MV_CAPABILITIES_TABLE` (not reproduced\
    \ here) shows the output:\n\n```\nCAPABILITY_NAME                            P\
    \ MSGTXT                                           RELATED_TEXT\n------------------------------------------\
    \ - ------------------------------------------------ ------------------------------\n\
    REFRESH_FAST_AFTER_ANY_DML                  N see the reason why REFRESH_FAST_AFTER_ONETAB_DML\
    \ is disabled\nREFRESH_FAST_AFTER_INSERT                   N mv log is newer than\
    \ last full refresh           MV.REGION\nREFRESH_FAST_AFTER_INSERT           \
    \        N the SELECT list does not have the rowids of all the detail tables\n\
    REFRESH_FAST_AFTER_INSERT                   N mv log is newer than last full refresh\
    \           MV.INV\nREFRESH_FAST_AFTER_ONETAB_DML               N see the reason\
    \ why REFRESH_FAST_AFTER_INSERT is disabled\n```\n\nFrom the previous output,\
    \ the MV `SELECT` statement needs to contain the `ROWID`s of the base tables.\n\
    \nThe next few lines of code drop the MV and re-create it with the SQL statement\
    \ rewritten to contain the `ROWID`s:\n\n```sql\ndrop materialized view inv_mv;\n\
    --\ncreate materialized view inv_mv\nas\n  select\n    a.rowid inv_rowid\n   \
    \ ,b.rowid region_rowid\n    ,a.inv_desc\n    ,b.reg_desc\n  from inv a\n  ,region\
    \ b\n  where a.region_id = b.region_id;\n```\n\nNext, reset `MV_CAPABILITIES_TABLE`\
    \ and repopulate it via the `EXPLAIN_MVIEW` procedure:\n\n```sql\nSQL> delete\
    \ from mv_capabilities_table where statement_id=100;\nSQL> exec dbms_mview.explain_mview(mv=>'INV_MV',stmt_id=>'100');\n\
    ```\n\nThe output shows that it’s now possible to fast-refresh the MV:\n\n```\n\
    CAPABILITY_NAME                            P MSGTXT                          \
    \                 RELATED_TEXT\n------------------------------------------ - ------------------------------------------------\
    \ ------------------------------\nREFRESH_FAST_AFTER_ANY_DML                 \
    \ Y\nREFRESH_FAST_AFTER_INSERT                   Y\nREFRESH_FAST_AFTER_ONETAB_DML\
    \               Y\n```\n\nExecute the following statement to see if the fast refresh\
    \ works:\n\n```sql\nSQL> exec dbms_mview.refresh('INV_MV','F');\n```\n\n```\n\
    PL/SQL procedure successfully completed.\n```\n\nThe `EXPLAIN_MVIEW` procedure\
    \ is a powerful tool that allows you to determine whether a refresh capability\
    \ is possible and, if it’s not possible, why it isn’t and how to potentially resolve\
    \ the issue.\n\n## Viewing Materialized View DDL\n\nTo quickly view the SQL query\
    \ on which an MV is based, select from the `QUERY` column of `DBA/ALL/USER_MVIEWS`.\
    \ If you’re using SQL*Plus, first set the `LONG` variable to a value large enough\
    \ to display the entire contents of a `LONG` column:\n\nCHAPTER 15 ■ MATERIALIZED\
    \ VIEWS\n\n```sql\nSQL> set long 5000\nSQL> select query from dba_mviews where\
    \ mview_name=UPPER('&&mview_name');\n```\n\nTo view the entire Data Definition\
    \ Language ()DDL required to re-create an MV, use the `DBMS_METADATA` package\
    \ (you also need to set the `LONG` variable to a large value if using SQL*Plus):\n\
    \n```sql\nSQL> select dbms_metadata.get_ddl('MATERIALIZED_VIEW','INV_MV') from\
    \ dual;\n```\n\nHere’s the output for this example:\n\n```\nCREATE MATERIALIZED\
    \ VIEW \"MV\".\"INV_MV\" (\"INV_ROWID\", \"REGION_ROWID\", \"INV_DESC\",\n\"REG_DESC\"\
    ) ORGANIZATION HEAP PCTFREE 10 PCTUSED 40 INITRANS 1\nMAXTRANS 255 NOCOMPRESS\
    \ LOGGING\nSTORAGE(INITIAL 65536 NEXT 1048576 MINEXTENTS 1 MAXEXTENTS 2147483645\n\
    PCTINCREASE 0 FREELISTS 1 FREELIST GROUPS 1 BUFFER_POOL DEFAULT FLASH_CACHE\n\
    DEFAULT CELL_FLASH_CACHE DEFAULT)\nTABLESPACE \"USERS\"\nBUILD IMMEDIATE\nUSING\
    \ INDEX\nREFRESH FORCE ON DEMAND\nUSING DEFAULT LOCAL ROLLBACK SEGMENT\nUSING\
    \ ENFORCED CONSTRAINTS DISABLE QUERY REWRITE\nAS select\n    a.rowid inv_rowid\n\
    \    ,b.rowid region_rowid\n    ,a.inv_desc\n    ,b.reg_desc\n  from inv a\n \
    \ ,region b\n  where a.region_id = b.region_id\n```\n\nThis output shows the DDL\
    \ that Oracle thinks is required to re-create the MV. This is usually the most\
    \ reliable way to generate the DDL associated with an MV.\n\n## Dropping a Materialized\
    \ View\n\nYou may occasionally need to drop an MV. Perhaps a view is no longer\
    \ being used, or you need to drop and re-create an MV to change the underlying\
    \ query on which the MV is based (such as adding a column to it). Use the `DROP\
    \ MATERIALIZED VIEW` command to drop an MV. This example drops a view named `ORDERS_MV`:\n\
    \n```sql\nSQL> drop materialized view orders_mv;\n```\n\nWhen you drop an MV,\
    \ the MV object, the table object, and any corresponding indexes are also dropped.\
    \ Dropping an MV doesn’t affect any MV logs—an MV log is dependent only on the\
    \ master table.\n\nYou can also specify that the underlying table be preserved.\
    \ You may want to do this if you’re troubleshooting and need to drop the MV definition\
    \ but keep the MV table and data. For example:\n\n```sql\nSQL> drop materialized\
    \ view inv_mv preserve table;\n```\n\nIn this scenario, you can also use the underlying\
    \ table later as the basis for an MV by building the MV using the `ON PREBUILT\
    \ TABLE` clause.\n\nCHAPTER 15 ■ MATERIALIZED VIEWS\n\nIf the MV was originally\
    \ built using the `ON PREBUILT TABLE` clause, then when you drop the MV, the underlying\
    \ table isn’t dropped. If you want the underlying table dropped, you must use\
    \ a `DROP TABLE` statement:\n\n```sql\nSQL> drop materialized view inv_mv;\nSQL>\
    \ drop table inv_mv;\n```\n\n## Modifying Materialized Views\n\nThis section describes\
    \ common maintenance tasks associated with MVs. Topics covered include how to\
    \ modify an MV to reflect column changes that have been applied to the base table\
    \ some time after the MV was initially created, and modifying attributes such\
    \ as logging and parallelism.\n\n### Modifying Base-Table DDL and Propagating\
    \ to Materialized Views\n\nA common task involves adding a column to or dropping\
    \ a column from a base table (because business requirements have changed). After\
    \ the column is added to or dropped from the base table, you want those DDL changes\
    \ to be reflected in any dependent MVs. You have a few options for propagating\
    \ base-table column changes to dependent MVs:\n\n- Drop and re-create the MV with\
    \ the new column definitions.\n- Drop the MV, but preserve the underlying table,\
    \ modify the MV table, and then recreate the MV (with the new column changes)\
    \ using the `ON PREBUILT TABLE` clause.\n- If the MV was originally created using\
    \ the `ON PREBUILT TABLE` clause, drop the MV object, modify the MV table, and\
    \ then re-create the MV (with the new column changes) using the `ON PREBUILT TABLE`\
    \ clause.\n\nWith any of the previous options, you have to drop and re-create\
    \ the MV so that it’s aware of the column changes in the base table. These approaches\
    \ are described next.\n\n### Re-creating a Materialized View to Reflect Base-Table\
    \ Modifications\n\nSuppose you make a modification to a base table, such as adding\
    \ a column:\n\n```sql\nSQL> alter table inv add(inv_loc varchar2(30));\n```\n\n\
    You also have a simple MV named `INV_MV` that is based on this table. You want\
    \ the base-table modification to be reflected in the MV. How do you accomplish\
    \ this task? You know that the MV contains an underlying table that stores the\
    \ results. You decide to modify the underlying MV table directly:\n\n```sql\n\
    SQL> alter table inv_mv add(inv_loc varchar2(30));\n```\n\nThe alteration is successful.\
    \ You next refresh the MV but realize that the additional column isn’t being refreshed.\
    \ To understand why, recall that an MV is a SQL query that stores its results\
    \ in an underlying table. Therefore, to modify an MV, you have to change the SQL\
    \ query that the MV is based on. Because there is no `ALTER MATERIALIZED VIEW\
    \ ADD/DROP/MODIFY <column>` statement, you must do the following to add/delete\
    \ columns in an MV:\n\nCHAPTER 15 ■ MATERIALIZED VIEWS\n\n1.  Alter the base table.\n\
    2.  Drop and re-create the MV to reflect the changes in the base table.\n\nHere’s\
    \ an example. Say you need to add a column `INV_LOC` to the base `INV` table:\n\
    \n```sql\nSQL> alter table inv add(inv_loc varchar2(30));\n```\n\nDrop and re-create\
    \ the MV to include the column definition:\n\n```sql\ndrop materialized view inv_mv;\n\
    --\ncreate materialized view inv_mv\nrefresh fast on demand\nas\n  select\n  \
    \  inv_id\n    ,inv_desc\n    ,inv_loc\n  from inv;\n```\n\nThis approach may\
    \ take a long time if large amounts of data are involved. You have downtime for\
    \ any application that accesses the MV while it’s being rebuilt. If you work in\
    \ a large data-warehouse environment, then due to the amount of time it takes\
    \ to completely refresh the MV, you may want to consider not dropping the underlying\
    \ table. This option is discussed in the next section.\n\n### Altering a Materialized\
    \ View but Preserving the Underlying Table\n\nWhen you drop an MV, you have the\
    \ option of preserving the underlying table and its data. You may find this approach\
    \ advantageous when you’re working with large MVs in data-warehouse environments.\n\
    \nHere are the steps:\n\n1.  Alter the base table.\n2.  Drop the MV, but preserve\
    \ the underlying table.\n3.  Modify the underlying table.\n4.  Re-create the MV\
    \ using the `ON PREBUILT TABLE` clause.\n\nHere’s a simple example to illustrate\
    \ this procedure:\n\n```sql\nSQL> alter table inv add(inv_loc varchar2(30));\n\
    ```\n\nDrop the MV, but specify that you want to preserve the underlying table:\n\
    \n```sql\nSQL> drop materialized view inv_mv preserve table;\n```\n\nNow, modify\
    \ the underlying table:\n\n```sql\nSQL> alter table inv_mv add(inv_loc varchar2(30));\n\
    ```\n\nNext, create the MV using the `ON PREBUILT TABLE` clause:\n\n```sql\ncreate\
    \ materialized view inv_mv\non prebuilt table\nusing index tablespace mv_index\n\
    as\n  select\n    inv_id\n    ,inv_desc\n    ,inv_loc\n  from inv;\n```\n\nThis\
    \ allows you to redefine the MV without dropping and completely refreshing the\
    \ data. Be aware that if there is any Data Manipulation Language (DML) activity\
    \ against the base table during the MV rebuild operation, those transactions aren’t\
    \ reflected in the MV when you attempt to refresh it. In data-warehouse environments,\
    \ you typically have a known schedule for loading base tables and therefore should\
    \ be able to schedule the MV alteration during a maintenance window when no transactions\
    \ are occurring in the base table.\n\n### Altering a Materialized View Created\
    \ on a Prebuilt Table\n\nIf you originally created an MV using the `ON PREBUILT\
    \ TABLE` clause, then you can perform a procedure similar to that shown in the\
    \ previous section when preserving the underlying table. Here are the steps for\
    \ modifying an MV that was created using the `ON PREBUILT TABLE` clause:\n1. \
    \ Alter the base table.\n2.  Drop the MV. For MVs built on prebuilt tables, this\
    \ doesn’t drop the underlying table.\n3.  Alter the prebuilt table.\n4.  Re-create\
    \ the MV on the prebuilt table.\n\nHere’s a simple example to illustrate this\
    \ process. For clarity, the original definition of the table and MV are shown.\
    \ Here’s the base-table definition:\n\n```sql\ncreate table inv(\n  inv_id number\
    \ primary key\n  ,inv_desc varchar2(30));\n```\n\nTo create an MV on a prebuilt\
    \ table, you must first create a table:\n\n```sql\ncreate table inv_mv (\n  inv_id\
    \ number\n  ,inv_desc varchar2(30));\n```\n\nHere’s the definition of a simple\
    \ MV that is created using a prebuilt table and uses `INV` as a base table:\n\n\
    ```sql\ncreate materialized view inv_mv\non prebuilt table\nusing index tablespace\
    \ mv_index\nas\n  select\n    inv_id\n    ,inv_desc\n  from inv;\n```\n\nSuppose\
    \ you alter the base table as follows:\n\n```sql\nSQL> alter table inv add (inv_loc\
    \ varchar2(30));\n```\n\nCHAPTER 15 ■ MATERIALIZED VIEWS\n\nDrop the MV:\n\n```sql\n\
    SQL> drop materialized view inv_mv;\n```\n\nFor MVs created on prebuilt tables,\
    \ this doesn’t drop the underlying table—only the MV object is dropped. Next,\
    \ add a column to the prebuilt table:\n\n```sql\nSQL> alter table inv_mv add(inv_loc\
    \ varchar2(30));\n```\n\nNow you can rebuild the MV using the prebuilt table with\
    \ the new `INV_LOC` column added:\n\n```sql\ncreate materialized view inv_mv\n\
    on prebuilt table\nusing index tablespace mv_index\nas\n  select\n    inv_id\n\
    \    ,inv_desc\n    ,inv_loc\n  from inv;\n```\n\nThis process has the advantage\
    \ of allowing you to modify an MV definition without dropping the underlying table.\
    \ You have to drop the MV, alter the underlying table, and then re-create the\
    \ MV with the new definition. If the underlying table contains a large amount\
    \ of data, this method can prevent unwanted downtime.\n\nAs mentioned in the previous\
    \ section, you need to be aware that if there is any DML activity against the\
    \ base table during the MV rebuild operation, those transactions aren’t reflected\
    \ in the MV when you attempt to refresh it.\n\n### Toggling Redo Logging on a\
    \ Materialized View\n\nRecall that an MV has an underlying database table. When\
    \ you refresh an MV, this initiates transactions in the underlying table that\
    \ result in the generation of redo (just as with a normal database table). In\
    \ the event of a database failure, you can restore and recover all the transactions\
    \ associated with an MV.\n\nBy default, redo logging is enabled when you create\
    \ an MV. You have the option of specifying that redo not be logged when an MV\
    \ is refreshed. To enable no logging, create the MV with the `NOLOGGING` option:\n\
    \n```sql\ncreate materialized view inv_mv\nnologging\ntablespace mv_data\nusing\
    \ index tablespace mv_index\nas\n  select\n    inv_id\n    ,inv_desc\n  from inv;\n\
    ```\n\nYou can also alter an existing MV into no-logging mode:\n\n```sql\nSQL>\
    \ alter materialized view inv_mv nologging;\n```\n\nIf you want to re-enable logging,\
    \ then do as follows:\n\n```sql\nSQL> alter materialized view inv_mv logging;\n\
    ```\n\nTo verify that the MV has been switched to `NOLOGGING`, query the `USER_TABLES`\
    \ view:\n\nCHAPTER 15 ■ MATERIALIZED VIEWS\n\n```sql\nselect\n  a.table_name\n\
    \  ,a.logging\nfrom user_tables a\n,user_mviews b\nwhere a.table_name = b.mview_name;\n\
    ```\n\nThe advantage of enabling no logging is that refreshes take place more\
    \ quickly, because the database doesn’t have the overhead of logging redo information.\
    \ The big downside is that if a media failure occurs soon after an MV has been\
    \ refreshed, you can’t recover the data in the MV. In this scenario, the first\
    \ time you attempt to access the MV, you receive an error such as:\n\n```\nORA-01578:\
    \ ORACLE data block corrupted (file # 32, block # 131)\nORA-01110: data file 32:\
    \ '/ora01/dbfile/O11R2/mvdata01.dbf'\nORA-26040: Data block was loaded using the\
    \ NOLOGGING option\n```\n\nIf you get the previous error, then you’ll most likely\
    \ have to completely refresh the MV to make the data accessible again. In many\
    \ environments, this may be acceptable. You save on database resources by not\
    \ generating redo for the MV, but the downside is a longer restore process (in\
    \ the event of a failure) that requires you to completely refresh the MV.\n\n\
    ### Altering Parallelism\n\nSometimes an MV is created with a high degree of parallelism\
    \ to improve the performance of the creation process. After you create the MV,\
    \ you may not need the same degree of parallelism associated with the underlying\
    \ table. You can alter an MV’s parallelism as follows:\n\n```sql\nSQL> alter materialized\
    \ view inv_mv parallel 1;\n```\n\nYou can check on the degree of parallelism by\
    \ querying `USER_TABLES`:\n\n```sql\nSQL> select table_name, degree from user_tables\
    \ where table_name= upper('&mv_name');\n```\n\n```\nTABLE_NAME               \
    \      DEGREE\n------------------------------ ------\nINV_MV                 \
    \        1\n```\n\n### Moving a Materialized View\n\nAs the operating environment’s\
    \ conditions change, you may need to move an MV from one tablespace to another.\
    \ In these scenarios, use the `ALTER MATERIALIZED VIEW...MOVE TABLESPACE` statement.\
    \ This example moves the table associated with an MV to a different tablespace:\n\
    \n```sql\nSQL> alter materialized view inv_mv move tablespace tbsp2;\n```\n\n\
    If any indexes are associated with the MV table, the move operation renders them\
    \ unusable. You can check the status of the indexes as follows:\n\n```sql\nselect\n\
    \  a.table_name\n  ,a.index_name\n  ,a.status\nfrom user_indexes a\n,user_mviews\
    \ b\nwhere a.table_name = b.mview_name;\n```\n\nCHAPTER 15 ■ MATERIALIZED VIEWS\n\
    \nYou must rebuild any associated indexes after moving the table. For example:\n\
    \n```sql\nSQL> alter index inv_mv_pk1 rebuild;\n```\n\n## Managing Materialized\
    \ View Logs\n\nMV logs are required for fast-refreshable MVs. The MV log is a\
    \ table that stores DML information for a master (base) table. It’s created in\
    \ the same database as the master table with the same user that owns the master\
    \ table. You need the `CREATE TABLE` privilege to create an MV log.\n\nThe MV\
    \ log is populated by an Oracle internal trigger (that you have no control over).\
    \ This internal trigger inserts a row into the MV log after an `INSERT`, `UPDATE`,\
    \ or `DELETE` on the master table. You can view the internal triggers in use by\
    \ querying `DBA/ALL/USER_INTERNAL_TRIGGERS`.\n\nAn MV log is associated with only\
    \ one table, and each master table can have only one MV log defined for it. You\
    \ can create an MV log on a table or on another MV. Multiple fast-refreshable\
    \ MVs can use one MV log.\n\nAfter an MV performs a fast refresh, any records\
    \ in the MV log that are no longer needed are deleted. In the event that multiple\
    \ MVs are using one MV log, then records are purged from the MV log only after\
    \ they aren’t required by any of the fast-refreshable MVs.\n\nTable 15–3 describes\
    \ terms used with MV logs. These terms are referred to in the following sections\
    \ in this chapter that relate to MV logs.\n\n***Table 15–3.** Materialized View\
    \ Log Terminology and Features*\n\n| **MV Log Term** | **Description** |\n| :---\
    \ | :--- |\n| Materialized view log | Database object that tracks DML changes\
    \ to MV base table. An MV log is required for fast refreshes. |\n| Primary key\
    \ MV log | MV log that uses the base-table primary key to track DML changes. |\n\
    | ROWID MV log | MV log that uses the base table `ROWID` to track DML changes.\
    \ |\n| Commit SCN MV log | MV log based on the commit system change number (`SCN`)\
    \ instead of a timestamp. Available in Oracle Database 11 *g* R2 or higher. |\n\
    | Object ID | Object identifier used to track DML changes. |\n| Filter column\
    \ | Non-primary-key column referenced by an MV subquery. Required by some fast-refresh\
    \ scenarios. |\n| Join column | Non-primary-key column that defines a join in\
    \ the subquery `WHERE` clause. Required by some fast-refresh scenarios. |\n| Sequence\
    \ | Sequence value required for some fast-refresh scenarios. |\n| New values |\
    \ Specifies that old and new values be recorded in the MV log. Required for single-table\
    \ aggregate views to be eligible for fast refresh. |\n\nCHAPTER 15 ■ MATERIALIZED\
    \ VIEWS\n\n### Creating a Materialized View Log\n\nFast-refreshable views require\
    \ an MV log to be created on the master (base) table. Use the `CREATE MATERIALIZED\
    \ VIEW LOG` command to create an MV log. This example creates an MV log on the\
    \ `USERS` table, specifying that the primary key should be used to identify rows\
    \ in the MV log:\n\n```sql\nSQL> create materialized view log on users with primary\
    \ key;\n```\n\nYou can also specify storage information such as the tablespace\
    \ name:\n\n```sql\ncreate materialized view log\non users\npctfree 5\ntablespace\
    \ mv_data\nwith primary key;\n```\n\nWhen you create an MV log on a table, Oracle\
    \ creates a table to store the changes to a base table since the last refresh.\
    \ The name of the MV log table follows this format: `MLOG$_<master_table_name>`.\
    \ You can use the SQL*Plus `DESCRIBE` statement to view the columns of the MV\
    \ log:\n\n```sql\nSQL> desc mlog$_users;\n```\n\n```\nName                   \
    \                   Null?    Type\n----------------------------------------- --------\
    \ ----------------------------\nUSER_ID                                   NOT\
    \ NULL NUMBER\nSNAPTIME$$                                         DATE\nDMLTYPE$$\
    \                                          VARCHAR2(1)\nOLD_NEW$$            \
    \                              VARCHAR2(1)\nCHANGE_VECTOR$$                  \
    \                  RAW(255)\nXID$$                                           \
    \   NUMBER\n```\n\nYou can query this underlying `MLOG$` table to determine the\
    \ number of transactions since the last refresh. After each refresh, the MV log\
    \ table is purged. If multiple MVs use the MV log, the log table isn’t purged\
    \ until all dependent MVs are refreshed.\n\nIf you create the MV log on a table\
    \ with a primary key, then a `RUPD$_<master_table_name>` table is also created.\
    \ This table is used for updatable MVs. If you’re not using the updatable MV feature,\
    \ then this table is never used, and you can ignore it.\n\nWhen you create an\
    \ MV log, you can specify that it use `PRIMARY KEY`, `ROWID`, or `OBJECT ID` to\
    \ uniquely identify rows in the MV log table. If the master table has a primary\
    \ key, then use `WITH PRIMARY KEY` when you create the MV log. If the master table\
    \ doesn’t have a primary key, then you have to use `WITH ROWID` to specify that\
    \ a `ROWID` value is used to uniquely identify MV log records. You can use `WITH\
    \ OBJECT ID` when you create an MV log on an object table.\n\nFor database versions\
    \ prior to Oracle Database 11 *g* release 2, the MV log table will contains a\
    \ `SNAPTIME$$` time column. This column is used to determine which records need\
    \ to be applied to any dependent MVs.\n\nAs of Oracle Database 11 *g* release\
    \ 2, you have the option of creating a `COMMIT SCN`–based MV log. This type of\
    \ MV log uses the `SCN` of a transaction to determine which records need to be\
    \ applied to any dependent MVs. `COMMIT SCN`–based MV logs are more efficient\
    \ than timestamp-based MV logs. If you’re using Oracle Database 11 *g* release\
    \ 2 or higher, then you should consider using `COMMIT SCN`–based MV logs. Use\
    \ the `WITH COMMIT SCN` clause to create an `SCN`–based MV log:\n\n```sql\nSQL>\
    \ create materialized view log on inv tablespace users with commit scn;\n```\n\
    \nCHAPTER 15 ■ MATERIALIZED VIEWS\n\nYou can view whether an MV log is `SCN` based\
    \ by querying `USER_MVIEW_LOGS`:\n\n```sql\nselect\n  log_table\n  ,commit_scn_based\n\
    from user_mview_logs;\n```\n\n### Indexing Materialized View Log Columns\n\nSometimes\
    \ you may need better performance from your fast-refreshing MVs. One way to do\
    \ this is through indexes on columns of the MV log table. In particular, consider\
    \ indexing the primary-key column and the `SNAPTIME$$` column. Oracle potentially\
    \ uses two columns in `WHERE` clauses when refreshing an MV or purging the MV\
    \ log. Here are examples of creating indexes on MV log columns:\n\n```sql\nSQL>\
    \ create index mlog$_inv_idx1 on mlog$_inv(snaptime$$) tablespace mv_index;\n\
    SQL> create index mlog$_inv_idx2 on mlog$_inv(inv_id) tablespace mv_index;\n```\n\
    \nYou shouldn’t add indexes just because you think it may be a good idea. Only\
    \ add indexes on the MV log tables when you have known performance issues with\
    \ fast refreshes. Keep in mind that adding indexes consumes resources in the database.\
    \ Oracle has to maintain the index for DML operations on the table, and an index\
    \ consumes disk space. Indexes aren’t free silver bullets for performance issues;\
    \ they come with some cost, so you should use them judiciously.\n\n### Viewing\
    \ Space Used by a Materialized View Log\n\nYou should consider periodically checking\
    \ the space consumed by an MV log. If the space consumed is growing (and never\
    \ shrinking), you may have an issue with an MV not successfully refreshing (and\
    \ hence causing the MV log never to be purged). Here’s a query to check the space\
    \ of MV logs:\n\n```sql\nselect\n  segment_name\n  ,tablespace_name\n  ,bytes/1024/1024\
    \ meg_bytes\n  ,extents\nfrom dba_segments\nwhere segment_name like 'MLOG$%'\n\
    order by meg_bytes;\n```\n\nHere’s some sample output:\n\n```\nSEGMENT_NAME  \
    \             TABLESPACE_NAME   MEG_BYTES   EXTENTS\n--------------------------\
    \ --------------------------- ----------\nMLOG$_USER_ROLES_ASSOC     MV_DATA \
    \                  24.00         48\nMLOG$_ASSET_GEO_LOCATIONS  MV_DATA      \
    \             60.50        121\nMLOG$_USERS                MV_DATA           \
    \        88.50        177\nMLOG$_REGISTRATIONS        MV_DATA                \
    \  465.00        930\n```\n\nThis output indicates that several MV logs most likely\
    \ have purging issues. The `MLOG$_REGISTRATIONS` segment is consuming nearly 500MB\
    \ of space. In this situation, there are probably multiple MVs that are using\
    \ the MV log, and one of the MVs isn’t refreshing on a daily basis, thus preventing\
    \ the log from being purged.\n\nYou may run into a situation where an MV log hasn’t\
    \ been purged for quite some time. This can happen because you have multiple MVs\
    \ using the same MV log and one of those MVs isn’t successfully refreshing anymore.\
    \ This can happen when a DBA builds a development environment and connects 392\n\
    \nCHAPTER 15 ■ MATERIALIZED VIEWS\n\ndevelopment MVs to the production environment\
    \ (it shouldn’t happen, but it does). At some later point in time, the DBA drops\
    \ the development database. The production environment still has information regarding\
    \ the remote development MV and won’t purge MV log records because it thinks a\
    \ fast-refreshable MV needs the log data to refresh.\n\nIn these scenarios, you\
    \ should determine which MVs are using the log (see the section on Determining\
    \ How Many MVs Reference a Central MV Log) and resolve any issues. After the problem\
    \ is solved, check the space being used by the log and see if it can be shrunk\
    \ (see the next section).\n\n### Shrinking the Space in a Materialized View Log\n\
    \nIf an MV log doesn’t successfully delete records, this causes it to grow to\
    \ a large size. After you resolve the issue and the records are deleted from the\
    \ MV log, you can set the high-water mark for the MV log table to a high value.\
    \ But doing so may cause performance issues and also unnecessarily consumes disk\
    \ space.\n\nIn this situations, consider shrinking the space used by the MV log.\n\
    \nIn this example, `MLOG$_REGISTRATIONS` had a problem with not purging records\
    \ because of an issue with an associated MV not successfully refreshing. This\
    \ MV log subsequently grew to a large size. The issue was identified and resolved,\
    \ and now the log’s space needs to be reduced. To shrink the space in an MV log,\
    \ first enable row movement on the appropriate MV log `MLOG$` table:\n\n```sql\n\
    SQL> alter table mlog$_registrations enable row movement;\n```\n\nNext, issue\
    \ the `ALTER MATERIALIZED VIEW LOG ON...SHRINK` statement. Notice that the table\
    \ after the `ON` keyword is the master table name (in this example, it’s the `REGISTRATIONS`\
    \ table):\n\n```sql\nSQL> alter materialized view log on registrations shrink\
    \ space;\n```\n\nThis statement may take a long time, depending on the amount\
    \ of space it shrinks. After the statement finishes, you can disable row movement:\n\
    \n```sql\nSQL> alter table mlog$_registrations disable row movement;\n```\n\n\
    You can verify that the space has been reduced by querying `DBA_SEGMENTS`:\n\n\
    ```sql\nselect\n  segment_name\n  ,tablespace_name\n  ,bytes/1024/1024 meg_bytes\n\
    \  ,extents\nfrom dba_segments\nwhere segment_name = 'MLOG$_REGISTRATIONS';\n\
    ```\n\nThe space used by this segment is quite small:\n\n```\nSEGMENT_NAME   \
    \            TABLESPACE_NAME   MEG_BYTES   EXTENTS\n--------------------------\
    \ --------------------------- ----------\nMLOG$_REGISTRATIONS        MV_DATA \
    \                   .50          1\n```\n\n### Checking the Row Count of a Materialized\
    \ View Log\n\nAs mentioned earlier in this chapter, sometimes there are problems\
    \ with an MV refreshing, and this results in large numbers of rows building up\
    \ in the corresponding MV log table. This sometimes happens when multiple MVs\
    \ are using one MV log, and one of the MVs can’t perform a fast refresh. In this\
    \ situation, the MV log continues to grow until the issue is resolved.\n\nCHAPTER\
    \ 15 ■ MATERIALIZED VIEWS\n\nOne way of detecting whether an MV log isn’t being\
    \ purged is to periodically check the row counts of the MV log tables. The following\
    \ query uses SQL to generate SQL that creates a script that checks row counts\
    \ for MV log tables owned by the currently connected user:\n\n```sql\nset head\
    \ off pages 0 lines 132 trimspool on\nspo mvcount_dyn.sql\nselect 'select count(*)\
    \ || ' || '''' || ': ' || table_name || ''''\n|| ' from ' || table_name || ';'\n\
    from user_tables\nwhere table_name like 'MLOG%';\nspo off;\n```\n\nThis script\
    \ generates a script named `mvcount_dyn.sql` that contains the SQL statements\
    \ to select row counts from the `MLOG$` tables. When you’re inspecting row counts,\
    \ you must be somewhat familiar with your application and have an idea what a\
    \ normal row count is. Here’s some sample code generated by the previous script:\n\
    \n```sql\nselect count(*) || ': MLOG$_PRODUCT_TAXONOMY' from MLOG$_PRODUCT_TAXONOMY;\n\
    select count(*) || ': MLOG$_REGISTRATIONS' from MLOG$_REGISTRATIONS;\nselect count(*)\
    \ || ': MLOG$_ROLES' from MLOG$_ROLES;\n```\n\n### Moving a Materialized View\
    \ Log\n\nYou may need to move an MV log because the initial creation script didn’t\
    \ specify the correct tablespace. A common scenario is when the tablespace isn’t\
    \ specified, and the MV log is placed by default in a tablespace like `USERS`.\
    \ You can verify the tablespace information with this query:\n\n```sql\nselect\n\
    \  table_name\n  ,tablespace_name\nfrom user_tables\nwhere table_name like 'MLOG%';\n\
    ```\n\nIf any MV log tables need to be relocated, use the `ALTER MATERIALIZED\
    \ VIEW LOG ON <table_name> MOVE` statement. Notice that you specify the name of\
    \ the master table (and not the underlying `MLOG$` table) on which the MV is created:\n\
    \n```sql\nSQL> alter materialized view log on inv move tablespace tbsp2;\n```\n\
    \nAlso keep in mind that when you move a table, any associated indexes are rendered\
    \ unusable (because the `ROWID` of every record in the table has just changed).\
    \ You can check the status of the indexes as shown:\n\n```sql\nselect\n  a.table_name\n\
    \  ,a.index_name\n  ,a.status\nfrom user_indexes a\n,user_mview_logs b\nwhere\
    \ a.table_name = b.log_table;\n```\n\nAny unusable indexes must be rebuilt. Here’s\
    \ an example of rebuilding an index:\n\n```sql\nSQL> alter index mlog$_inv_idx1\
    \ rebuild;\n```\n\nCHAPTER 15 ■ MATERIALIZED VIEWS\n\n### Dropping a Materialized\
    \ View Log\n\nThere are a couple of reasons why you may want to drop an MV log:\n\
    \n- You initially created an MV log, but requirements have changed and you no\
    \ longer need it.\n- The MV log has grown large and is causing performance issues,\
    \ and you want to drop it to reset the size.\n\nBefore you drop an MV log, you\
    \ can verify the owner, master table, and MV log table with the following query:\n\
    \n```sql\nselect\n  log_owner\n  ,master -- master table\n  ,log_table\nfrom user_mview_logs;\n\
    ```\n\nUse the `DROP MATERIALIZED VIEW LOG ON` statement to drop an MV log. You\
    \ don’t need to know the name of the MV log, but you do need to know the name\
    \ of the master table on which the log was created. This example drops the MV\
    \ log on the `INV` table:\n\n```sql\nSQL> drop materialized view log on inv;\n\
    ```\n\nYou should see the following message (if successful):\n\n```\nMaterialized\
    \ view log dropped.\n```\n\nIf you have permissions, and you don’t own the table\
    \ on which the MV log is created, you can specify the schema name when dropping\
    \ the materialized view log:\n\n```sql\nSQL> drop materialized view log on <schema>.<table>;\n\
    ```\n\nIf you’re cleaning up an environment and want to drop all MV logs associated\
    \ with a user, then use SQL to generate SQL to accomplish this. The following\
    \ script creates the SQL required to drop all MV logs owned by the currently connected\
    \ user:\n\n```sql\nset lines 132 pages 0 head off trimspool on\nspo drop_dyn.sql\n\
    select 'drop materialized view log on ' || master || ';'\nfrom user_mview_logs;\n\
    spo off;\n```\n\nThe previous SQL*Plus code creates a script named `drop_dyn.sql`\
    \ that contains the SQL statements that can be used to drop all MV logs for a\
    \ user.\n\n## Refreshing Materialized Views\n\nTypically, you refresh MVs at periodic\
    \ intervals. You can either refresh the MVs manually or automate this task. The\
    \ following sections cover these related topics:\n\n- Manually refreshing MVs\
    \ from SQL*Plus\n- Automating refreshes using a shell script and scheduling utility\n\
    - Automating refreshes using the built-in Oracle job scheduler\n\n![](index-430_1.png)\n\
    \nCHAPTER 15 ■ MATERIALIZED VIEWS\n\nThe result cache can significantly improve\
    \ performance if you have long-running queries that operate on relatively static\
    \ data. MVs are better suited for replicating data and storing the results of\
    \ complex queries that only require new results on a periodic basis (such as daily,\
    \ weekly, or monthly).\n\n### Automating Refreshes Using a Shell Script and Scheduling\
    \ Utility\n\nMany MVs must be refreshed on a daily basis. To achieve this, you\
    \ can use a Linux/Unix utility such as `cron` that calls a shell script to refresh\
    \ the MVs. This approach\n\n- Is easy to implement and maintain\n- Makes it easy\
    \ to create a daily log file for auditing\n- Sends e-mail when the job has problems\
    \ or when the database isn’t available\n\nHere’s an example of a shell script\
    \ that contains the logic to refresh an MV:\n\n```bash\n#!/bin/bash\nif [ $# -ne\
    \ 1 ]; then\n  echo \"Usage: $0 SID\"\n  exit 1\nfi\n#\nHOSTNAME=`uname -a | awk\
    \ '{print$2}'`\nMAILX='/bin/mailx'\nMAIL_LIST='lellison@oracle.com'\nORACLE_SID=$1\n\
    jobname=CWP\n```"
  raw: '# Now create DDL file from the export dump file.


    impdp darl/foo directory=dwrep_dp dumpfile=${SID}.${DAY}.dmp \


    SQLFILE=${SID}.${DAY}.sql logfile=${SID}.${DAY}.sql.log


    #


    exit 0


    This code listing depends on a database-directory object being created that points
    to where you want the daily dump file to be written. You may also want to set
    up another job that periodically deletes any files older than a certain amount
    of time.


    Compressing Output


    When you use Data Pump to create large files, you should consider compressing
    the output. As of Oracle Database 11 *g*, the COMPRESSION parameter can be one
    of the following values: ALL, DATA_ONLY, METADATA_ONLY, or NONE. If you specify
    ALL, then both data and metadata are compressed in the output.


    This example exports one table and compresses both the data and metadata in the
    output file: $ expdp dbauser/foo tables=locations directory=datapump \


    dumpfile=compress.dmp compression=all


    If you’re using Oracle Database 10 *g*, then the COMPRESSION parameter only has
    the METADATA_ONLY


    and NONE values.


    CHAPTER 13 ■ DATA PUMP


    ■ **Note** The ALL and DATA_ONLY options of the COMPRESS parameter require a license
    for the Oracle Advanced Compression option.


    Encrypting Data


    One potential security issue with Data Pump dump files is that anybody with operating-system
    access to the output file can search for strings in the file. On Linux/Unix systems,
    you can do this with the strings command:


    $ strings inv.dmp | grep -i secret


    Here’s the output for this particular dump file:


    Secret Data<


    top secret data<


    corporate secret data<


    This command allows you to view the contents of the dump file because the data
    is in regular text and not encrypted. If you require that the data be secured,
    you can use Data Pump’s encryption features.


    Data Pump lets you easily encrypt the output of a dump file. This example uses
    the ENCRYPTION


    parameter to secure all data and metadata in the output:


    $ expdp darl/foo encryption=all directory=dp dumpfile=inv.dmp


    For this command to work, your database must have an encryption wallet in place
    and open. See the *Oracle Advanced Security Guide* (available on OTN) for more
    details about how to create and open a wallet.


    ■ **Note** The Data Pump ENCRYPTION parameter requires that you use the Enterprise
    Edition of Oracle Database 11g or higher and also requires a license for the Oracle
    Advanced Security option.


    The ENCRYPTION parameter takes the following options:


    • ALL


    • DATA_ONLY


    • ENCRYPTED_COLUMNS_ONLY


    • METADATA_ONLY


    • NONE


    The ALL option enables encryption for both data and metadata. The DATA_ONLY option
    encrypts just the data. The ENCRYPTED_COLUMNS_ONLY option specifies that only
    columns encrypted in the database are written to the dump file in an encrypted
    format. The METADATA_ONLY option encrypts just metadata in the export file.


    CHAPTER 13 ■ DATA PUMP


    Monitoring Data Pump Jobs


    When you have long-running Data Pump jobs, you should occasionally check the status
    of the job to make sure the job hasn’t failed, or it’s become suspended for some
    reason, and so on. There are several ways to monitor the status of Data Pump jobs:


    • Screen output


    • Data Pump log file


    • Database alert log


    • Querying the status table


    • Querying data-dictionary views


    • Interactive command-mode status


    • Using operating-system utilities’ process status ps


    The most obvious way to monitor a job is to view the status that Data Pump displays
    on the screen as the job is running. If you’ve disconnected from the command mode,
    then the status is no longer displayed on your screen. In this situation, you
    must use another technique to monitor a Data Pump job.


    Data Pump Log File


    By default, Data Pump generates a log file for every job. When you start a Data
    Pump job, it’s a good practice to name a log file that is specific for that job:


    $ impdp darl/foo directory=dp dumpfile=archive.dmp logfile=archive.log This job
    creates a file named archive.log that is placed in the directory referenced in
    the database object DP. If you don’t explicitly name a log file, Data Pump import
    creates one named import.log, and Data Pump export creates one named export.log.


    ■ **Note** The log file contains the same information you see displayed interactively
    on your screen when running a Data Pump job.


    Data-Dictionary Views


    A quick way to determine whether a Data Pump job is running is to check the DBA_DATAPUMP_JOBS
    view for anything running with a STATE that has an EXECUTING status:


    select


    job_name


    ,operation


    ,job_mode


    ,state


    from dba_datapump_jobs;


    CHAPTER 13 ■ DATA PUMP


    Here’s some sample output:


    JOB_NAME OPERATION JOB_MODE STATE


    ------------------------- -------------------- ---------- ---------------


    SYS_IMPORT_TABLE_04 IMPORT TABLE EXECUTING


    SYS_IMPORT_FULL_02 IMPORT FULL NOT RUNNING


    You can also query the DBA_DATAPUMP_SESSIONS view for session information via
    the following query: select


    sid


    ,serial#


    ,username


    ,process


    ,program


    from v$session s,


    dba_datapump_sessions d


    where s.saddr = d.saddr;


    Here’s some sample output showing that several Data Pump sessions are in use:
    SID SERIAL# USERNAME PROCESS PROGRAM


    ---------- ---------- -------------------- --------------- ----------------------


    1049 6451 STAGING 11306 oracle@xengdb (DM00) 1058 33126 STAGING 11338 oracle@xengdb
    (DW01) 1048 50508 STAGING 11396 oracle@xengdb (DW02) Database Alert Log


    If a job is taking much longer than you expected, look in the database alert log
    for any messages similar to this:


    statement in resumable session ''SYS_IMPORT_SCHEMA_02.1'' was suspended due to
    ORA-01652: unable to extend temp segment by 64 in tablespace REG_TBSP_3


    This indicates that a Data Pump import job is suspended and is waiting for space
    to be added to the REG_TBSP_3 tablespace. After you add space to the tablespace,
    the Data Pump job automatically resumes processing. By default, a Data Pump job
    waits two hours for space to be added.


    ■ **Note** In addition to writing to the alert log, for each Data Pump job, Oracle
    creates a trace file in the ADR_HOME/trace directory. This file contains information
    such as the session ID and when the job started. The trace file is named with
    the following format: <SID>_dm00_<process_ID>.trc.


    Status Table


    Every time you start a Data Pump job, a status table is automatically created
    in the account of the user running the Data Pump job. For export jobs, the table
    name depends on what type of export job you’re running. The table is named with
    the format SYS_<OPERATION>_<JOB_MODE>_NN, where OPERATION is either EXPORT or
    IMPORT. JOB_MODE can be FULL, SCHEMA, TABLE, TABLESPACE, and so on.


    Here’s an example of querying the status table for particulars about a currently
    running job: 339


    CHAPTER 13 ■ DATA PUMP


    select


    name


    ,object_name


    ,total_bytes/1024/1024 t_m_bytes


    ,job_mode


    ,state


    ,to_char(last_update, ''dd-mon-yy hh24:mi'')


    from SYS_IMPORT_TABLE_04


    where state=''EXECUTING'';


    Interactive Command-Mode Status


    A quick way to verify that Data Pump is running a job is to attach in interactive
    command mode and issue a STATUS command. For example:


    $ impdp staging/staging_xst attach=SYS_IMPORT_TABLE_04


    Import> status


    Here’s some sample output:


    Job: SYS_IMPORT_TABLE_04


    Operation: IMPORT


    Mode: TABLE


    State: EXECUTING


    Bytes Processed: 0


    Current Parallelism: 4


    You should see a state of EXECUTING, which indicates that the job is actively
    running. Other items to inspect in the output are the number of objects processed
    and bytes processed. Those numbers should increase as the job progresses.


    Operating-System Utilities


    You can use the process status (ps) operating-system utility to display jobs running
    on the server. For example, you can search for master and worker processes as
    follows:


    $ ps -ef | egrep ''ora_dm|ora_dw'' | grep -v egrep


    Here’s some sample output:


    oracle 29871 717 5 08:26:39 ? 11:42 ora_dw01_STAGE


    oracle 29848 717 0 08:26:33 ? 0:08 ora_dm00_STAGE


    oracle 29979 717 0 08:27:09 ? 0:04 ora_dw02_STAGE


    If you run this command multiple times, you should see the processing time (seventh
    column) increase for one or more of the jobs running. This is a good indicator
    that Data Pump is still executing and doing work.


    CHAPTER 13 ■ DATA PUMP


    Data Pump Legacy Mode


    This feature is covered last in this chapter, but it’s quite useful especially
    if you’re an old-school DBA. As of Oracle Database 11 *g* release 2, Data Pump
    allows you to use the old exp and imp utility parameters.


    This is known as *legacy mode*. You don’t have to do anything special to use legacy
    mode Data Pump. As soon as Data Pump detects a legacy parameter, it attempts to
    process the parameter as if it were from the old exp/imp utilities. You can even
    mix and match old legacy parameters with newer parameters. For example:


    $ expdp darl/foo consistent=y tables=inv directory=dk


    In the output, Data Pump indicates that it has encountered legacy parameters and
    gives you the syntax for what it translated the legacy parameter to in Data Pump
    syntax. For the previous command, here’s the output from the Data Pump session
    that shows what the consistent=y parameter was translated into:


    Legacy Mode Active due to the following parameters:


    Legacy Mode Parameter: "consistent=TRUE" Location: Command Line, Replaced with:


    "flashback_time=TO_TIMESTAMP(''2010-07-01 08:10:20'', ''YYYY-MM-DD HH24:MI:SS'')"


    This feature can be *extremely* handy, especially if you’re really familiar with
    the old legacy syntax and wonder how it’s implemented in Data Pump.


    I recommend that you try to use the newer Data Pump syntax whenever possible.
    However, you may run into situations where you have legacy exp/imp jobs and want
    to continue running the scripts as they are without any modifications.


    ■ **Note** When Data Pump runs in legacy mode, it doesn’t create an old exp/imp
    formatted file. Data Pump always creates a Data Pump file and can only read Data
    Pump files.


    Data Pump Mapping to the exp Utility


    If you’re used to the old exp/imp parameters, you may initially be confused by
    some of the syntax semantics. However, after you use Data Pump, you’ll find the
    newer syntax fairly easy to remember and use. Table 13–3 describes how the legacy
