    \ and recovery topics are detailed in the next chapter.\n\n![](index-543_1.png)\n\
    \n# CHAPTER 19 ■ RMAN RESTORE AND RECOVERY\n\nother server were intact. I was\
    \ able to restore and recover the production database from these backups.\n\n\
    We lost about a days worth of data (between corrupt archive logs and downtime\
    \ when no incoming transactions were allowed), but we were able to get the database\
    \ restored and recovered about 20 hours after the initial phone call. That was\
    \ a long day.\n\nMost situations in which you need to restore and recovery will\
    \ not be as bad as the one just described. However, the previous scenario does\
    \ highlight the need for:\n\n* A Backup strategy.\n* A DBA with backup & recovery\
    \ skills.\n* A restore and recovery strategy, including a requirement to periodically\
    \ test the restore and recovery.\n\nThis chapter walks you through restore and\
    \ recovery using RMAN. It covers many of the common tasks you will have to perform\
    \ when dealing with media failures.\n\n## Determining Media Recovery Required\n\
    \nThe term \"media recovery\" refers to the need to restore files that have been\
