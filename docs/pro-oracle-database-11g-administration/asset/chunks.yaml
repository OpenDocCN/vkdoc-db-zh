  trans: '

    控制文件的自动备份总是会进入其专属的备份集。当启用控制文件自动备份时，如果你使用的是 `spfile`，它将与控制文件一起自动备份。


    若因任何原因你想禁用控制文件的自动备份，可以按如下方式操作：

    ```

    RMAN> configure controlfile autobackup off;

    ```


    `注意` 如果控制文件的自动备份处于关闭状态，那么每当你备份数据文件 1（SYSTEM 表空间数据文件）时，`RMAN` 都会自动备份控制文件。


    ## 指定控制文件自动备份的位置


    当你启用控制文件自动备份时，`RMAN` 会在以下位置之一创建控制文件的备份：


    - 默认位置

    - `FRA`（快速恢复区）

    - 通过 `BACKUP` 或 `FORMAT` 命令指定的位置


    如果你未使用 `FRA` 或未为控制文件自动备份指定位置，则控制文件的自动备份会写入一个依赖于操作系统的默认位置。在许多 Linux/Unix 环境中，默认位置是
    `ORACLE_HOME/dbs`。例如：

    ```

    /oracle/app/oracle/product/11.2.0/db_1/dbs/c-3453199553-20100907-04

    ```


    如果你启用了 `FRA`，那么 `RMAN` 会自动将控制文件自动备份文件写入 `FRA` 中的目录，文件名采用 Oracle 托管文件格式。例如：

    ```

    /<fra>/<db_name>/autobackup/<YYYY_MM_DD>/o1_mf_s_729103049_68fho9z2_.bkp

    ```

    我通常不为控制文件自动备份使用默认位置或 `FRA`。我更希望这些备份与数据库备份放在同一个目录中。例如：

    ```

    RMAN> configure controlfile autobackup format for device type disk to

    ''/ora01/O11R2/rman/rman_ctl_%F.bk'';

    ```


    ## 备份归档重做日志


    你应该定期备份你的归档重做日志。在至少备份一次之前，归档日志文件不应从磁盘中删除。我通常喜欢保留自上次成功的 `RMAN` 备份之后生成的所有归档重做日志在磁盘上。


    通常，我会指示 `RMAN` 在备份数据文件的同时备份归档重做日志。在大多数情况下，这是一个足够的策略。以下是随数据文件一起备份归档重做日志的命令：

    ```

    RMAN> backup database plus archivelog;

    ```


    有时，如果你的数据库生成大量重做日志，你可能需要以不同于数据文件的频率来备份归档重做日志。有些 DBA 一天会备份归档重做日志两到三次；日志备份完成后，DBA
    会删除它们以便为更新的归档日志文件腾出空间。


    在大多数情况下，你不需要上次成功备份之前生成的任何归档重做日志。例如，如果一个数据文件发生介质故障，你需要从备份中恢复该数据文件，然后应用数据文件备份期间及之后生成的所有归档重做日志。


    在某些情况下，你可能需要上次备份之前生成的归档重做日志。例如，你可能遇到介质故障，尝试从上次成功备份恢复数据库，却发现该备份已损坏，因此需要从更早的备份恢复。那时，你就需要自该旧备份创建以来生成的所有归档重做日志副本。


    ## 确定快照控制文件的位置


    `RMAN` 在执行以下任务时需要控制文件的读一致性视图：


    - 与恢复目录同步

    - 备份当前控制文件


    在这些情况下，`RMAN` 会创建当前控制文件的快照副本，以便在执行这些任务时将其用作读一致性副本。这确保了 `RMAN` 是从一个未被修改的控制文件副本进行操作的。


    快照控制文件的默认位置依赖于操作系统。在 Linux 平台上，默认位置是 `ORACLE_HOME/dbs/snapcf_@.f`。请注意，默认位置不在 `FRA`
    中（即使你已经配置了 `FRA`）。


    你可以使用 `SHOW` 命令显示当前快照控制文件的详细信息：

    ```

    RMAN> show snapshot controlfile name;

    ```


    以下是一些示例输出：

    ```

    CONFIGURE SNAPSHOT CONTROLFILE NAME TO

    ''/oracle/app/oracle/product/11.2.0/db_1/dbs/snapcf_O11R2.f''; # default

    ```

    在大多数情况下，快照控制文件的默认位置和格式是足够的。这个文件占用空间不大，也没有密集的 I/O 要求。我建议你使用默认设置。


    如果你有充分的理由将快照控制文件配置到非默认位置，可以按如下方式配置：

    ```

    RMAN> configure snapshot controlfile name to ''/oradump/O11R2/snapcf.ctl'';

    ```


    你可以通过以下方式将快照控制文件设置回默认值：

    ```

    RMAN> configure snapshot controlfile name clear;

    ```


    ## 使用恢复目录


    `RMAN` 总是将其最新的备份操作存储在目标数据库的控制文件中。你可以设置一个可选的恢复目录来存储有关 `RMAN` 备份的元数据。恢复目录是一个独立的模式（通常位于与目标数据库不同的数据库中），其中包含存储
    `RMAN` 备份信息的数据库对象（表、索引等）。恢复目录不存储 `RMAN` 备份片——只存储备份元数据。


    使用恢复目录的主要优势如下：


    - 为 `RMAN` 元数据提供一个辅助存储库。如果你丢失了所有控制文件及其备份，你仍然可以从恢复目录中检索 `RMAN` 元数据。

    - 比仅使用控制文件作为存储库时能够存储更长时间的 `RMAN` 元数据。

    - 提供对所有 `RMAN` 功能的访问。使用恢复目录时，某些恢复和还原功能会更简单。


    使用恢复目录的缺点在于这是另一个你需要设置、维护和备份的数据库。当你开始备份并尝试连接到恢复目录时，如果恢复目录因任何原因（服务器宕机、网络问题等）不可用，你必须决定是否要在没有恢复目录的情况下继续备份。


    使用恢复目录时，你还必须注意版本方面的问题。你需要确保用于存储恢复目录的数据库版本与目标数据库的版本兼容。当你升级目标数据库时，请确保恢复目录也被升级（如有必要）。


    `注意` 有关如何实现恢复目录的详细信息，请参阅本章最后一节。


    无论是否使用恢复目录，`RMAN` 都能正常工作。对于我维护的大多数数据库，我不使用恢复目录；这样就省去了设置和维护它的工作。对我来说，简单性优先于恢复目录所提供的功能。


    然而，如果你有充分的业务理由使用恢复目录，那么就实现并使用它。恢复目录的设置和维护并不困难，而且 Oracle 建议你使用它。


    ## 使用介质管理器


    `RMAN` 需要介质管理器才能直接备份到磁带。多个供应商提供此功能（需付费）。介质管理器用于大型数据库环境，如数据仓库，在那里你可能没有足够的空间将数据库备份到磁盘。你也可能有直接备份到磁带的灾难恢复要求。


    如果你有这样的要求，那么你应该购买并实施一个介质管理软件包。如果你不需要直接备份到磁带，则无需实现介质管理器。`RMAN` 可以很好地直接备份到磁盘。

    '
- fmt: '# 配置 Oracle RMAN 备份的注意事项


    在配置 Oracle RMAN 备份时，需要注意以下几点。


    ## 备份到磁盘与磁带的协调


    许多商店使用 `RMAN` 直接备份到磁盘，然后由系统管理员在 `RMAN` 备份到磁盘完成后，将这些备份再备份到磁带。如果这样做，必须确保 `RMAN`
    备份运行的时间与磁带备份运行的时间不重叠，因为可能会导致备份到磁带的文件不完整。


    ## 12\. 设置 CONTROL_FILE_RECORD_KEEP_TIME 初始化参数


    `CONTROL_FILE_RECORD_KEEP_TIME` 初始化参数指定了控制文件中可重用记录在被覆盖前必须保留的最少天数。`RMAN` 元数据存储在控制文件的可重用部分，因此最终会被覆盖。


    如果使用恢复目录（`recovery catalog`），则无需担心此参数，因为 `RMAN` 元数据会无限期地存储在恢复目录中。因此，当使用恢复目录时，可以访问任何历史
    `RMAN` 元数据。


    如果仅使用控制文件作为 `RMAN` 元数据存储库，那么存储在其中的信息最终将被覆盖。`CONTROL_FILE_RECORD_KEEP_TIME` 的默认值是七天：


    ```

    SQL> show parameter control_file_record_keep_time


    NAME                                 TYPE        VALUE

    ------------------------------------ ----------- ------------------------------

    control_file_record_keep_time        integer     7

    ```


    可以将该值设置为 0 到 365 天之间的任意值。将值设置为 0 意味着 `RMAN` 元数据信息可能随时被覆盖。


    在旧版本的 Oracle 中，`CONTROL_FILE_RECORD_KEEP_TIME` 参数更为关键，因为当元数据被覆盖后，很难用 `RMAN` 信息重新填充控制文件。从
    Oracle Database 10*g* 开始，可以使用 `CATALOG` 命令快速让控制文件知晓 `RMAN` 备份文件。


    建议将此参数保留为七天。如果由于某种原因，保留策略大于七天，并且没有使用恢复目录，那么可能需要考虑增加此值。增加此参数的缺点是，如果有大量的 `RMAN`
    备份活动，这可能会增加控制文件的大小。


    ## 13\. 配置 RMAN 的备份保留策略


    `RMAN` 保留策略允许指定希望保留备份多长时间。`RMAN` 有两种互斥的方法来指定保留策略：


    *   恢复窗口（`Recovery window`）

    *   备份数量（`Redundancy`）


    使用恢复窗口时，可以指定一个过去的天数，以便能够恢复到该窗口内的任何时间点。例如，如果指定保留策略窗口为五天，那么 `RMAN` 不会将那些用于在五天窗口内恢复到任何时间点所需的数据文件和归档重做日志备份标记为过时：


    ```

    RMAN> configure retention policy to recovery window of 5 days;

    ```


    对于指定的恢复，`RMAN` 可能需要比五天窗口更早的备份，因为它可能需要一个更旧的备份作为起点，才能恢复到指定的恢复点。例如，假设上一次完好的备份是六天前进行的，而现在希望恢复到四天前。对于这个恢复窗口，`RMAN`
    需要六天前的备份才能进行恢复并恢复到指定时间点。


    也可以指定 `RMAN` 保留最少数量的备份。例如，如果将 `redundancy` 设置为 2，那么 `RMAN` 不会将数据文件和归档重做日志文件的最新两个备份标记为过时：


    ```

    RMAN> configure retention policy to redundancy 2;

    ```


    我发现基于 `redundancy` 的保留策略更易于使用，并且在备份保留时间方面更具可预测性。如果设置 `redundancy` 为 2，我知道 `RMAN`
    不会将最新的两个备份标记为过时。而恢复窗口（`recovery window`）保留策略则依赖于备份频率和窗口长度来确定备份是否过时。'
  raw: 'Keep in mind that many shops use RMAN to back up directly to disk and then
    have the system administrator back up the RMAN backups to tape after the RMAN
    backups to disk have finished. If you do this, you have to be sure your RMAN backups
    aren’t running the same time the tape backups are running (because you may get
    partial files backed up to tape).


    12\. Setting the CONTROL_FILE_RECORD_KEEP_TIME


    Initialization Parameter


    The CONTROL_FILE_RECORD_KEEP_TIME initialization parameter specifies the minimum
    number of days a reusable record in the control file is retained before the record
    can be overwritten. The RMAN metadata is stored in the reusable section of the
    control file and therefore is eventually overwritten.


    If you’re using a recovery catalog, then you don’t need to worry about this parameter
    because RMAN metadata is stored in the recovery catalog indefinitely. Therefore,
    when you use a recovery catalog, you can access any historical RMAN metadata.


    If you’re only using the control file as the RMAN metadata repository, then the
    information stored there will eventually be overwritten. The default value for
    CONTROL_FILE_RECORD_KEEP_TIME is seven days: SQL> show parameter control_file_record_keep_time


    NAME TYPE VALUE


    ------------------------------------ ----------- ------------------------------


    control_file_record_keep_time integer 7


    You can set the value to anything from 0 to 365 days. Setting the value to 0 means
    the RMAN


    metadata information can be overwritten at any time.


    The CONTROL_FILE_RECORD_KEEP_TIME parameter was more critical in older versions
    of Oracle where it wasn’t easy to repopulate the control file with RMAN information
    in the event that metadata was overwritten. Starting with Oracle Database 10 *g*,
    you can use the CATALOG command to quickly make the control file aware of RMAN
    backup files.


    I recommend that you leave this parameter at seven days. If for some reason you
    have a retention policy greater than seven days, and you’re not using a recovery
    catalog, then you may want to consider increasing the value. The downside to increasing
    this parameter is that if you have a significant amount of RMAN backup activity,
    this can increase the size of your control file.


    13\. Configuring RMAN’s Backup-Retention Policy


    RMAN retention policies allow you to specify how long you want to retain backups.
    RMAN has two mutually exclusive methods of specifying a retention policy:


    • Recovery window


    • Number of backups (redundancy)


    With a recovery window, you specify a number of days in the past for which you
    want to be able recover to any point in that window. For example, if you specify
    a retention policy window of five days, then RMAN doesn’t mark as obsolete backups
    of datafiles and archive-redo logs that are required to be able to restore to
    any point in that five-day window:


    RMAN> configure retention policy to recovery window of 5 days;


    CHAPTER 17 ■ CONFIGURING RMAN


    For the specified recovery, RMAN may need backups older than the five-day window
    because it may need an older backup to start with to be able to recover to the
    recovery point specified. For example, suppose your last good backup was made
    six days ago, and now you want to recover to four days in the past. For this recovery
    window, RMAN needs the backup from six days ago to restore and recover to the
    point specified.


    You can also specify that RMAN keep a minimum number of backups. For example,
    if redundancy is set to 2, then RMAN doesn’t mark as obsolete the latest two backups
    of datafiles and archive-redo log files:


    RMAN> configure retention policy to redundancy 2;


    I find that a retention policy based on redundancy is easier to work with and
    more predictable with regard to how long backups are retained. If I set redundancy
    to 2, I know RMAN won’t mark as obsolete the latest two backups. The recovery-window
    retention policy depends on the frequency of the backups and the window length
    to determine whether a backup is obsolete.'
