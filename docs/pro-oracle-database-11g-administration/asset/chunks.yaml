    \n闪回数据库有几个先决条件：\n\n- 数据库必须处于归档日志模式。\n- 必须使用快速恢复区。\n- 必须启用闪回数据库功能。\n\n请参阅本章前面关于启用归档日志模式和使用快速恢复区的部分。你可以使用以下`SQL*Plus`语句验证这些功能的状态：\n\
    \n```sql\nSQL> archive log list;\n```\n\n```sql\nSQL> show parameter db_recovery_file_dest;\n\
    ```\n\n要启用闪回数据库功能，将数据库切换到闪回模式，如下所示：\n\n```sql\nSQL> alter database flashback on;\n\
    ```\n\n**注意** 在 Oracle Database 10*g*中，数据库必须处于加载模式才能启用闪回数据库。\n\n你可以按如下方式验证闪回状态：\n\
    \n```sql\nSQL> select flashback_on from v$database;\n```\n\n```\nFLASHBACK_ON\n\
    ------------------\nYES\n```\n\n启用闪回数据库后，你可以使用以下查询查看快速恢复区中的闪回日志：\n\n```sql\nselect\n\
    \  name\n  ,log#\n  ,thread#\n  ,sequence#\n  ,bytes\nfrom v$flashback_database_logfile;\n\
    ```\n\n你可以闪回的时间范围由`DB_FLASHBACK_RETENTION_TARGET`参数决定。它指定了数据库可以闪回的时间上限（以分钟为单位）。\n\
    \n你可以通过运行以下`SQL`来查看你可以闪回数据库的最旧`SCN`和时间：\n\n```sql\nselect\n  oldest_flashback_scn\n\
    \  ,to_char(oldest_flashback_time,'dd-mon-yy hh24:mi:ss')\nfrom v$flashback_database_log;\n\
    ```\n\n如果由于任何原因需要禁用闪回数据库，可以按如下方式将其关闭：\n\n```sql\nSQL> alter database flashback\
    \ off;\n```\n\n你可以使用`RMAN`或`SQL*Plus`来回闪数据库。你可以使用以下方法之一指定过去的时间点：\n\n- `SCN`\n\
    - 时间戳\n- 还原点\n- 上次`RESETLOGS`操作（仅适用于`RMAN`）\n\n此示例创建了一个还原点：\n\n```sql\nSQL> create\
    \ restore point flash_1;\n```\n\n接下来，应用程序执行一些测试，之后数据库被闪回到该还原点，以便可以开始新一轮测试：\n\n\
    ```sql\nSQL> shutdown immediate;\n```\n\n```sql\nSQL> startup mount;\n```\n\n\
    ```sql\nSQL> flashback database to restore point flash_1;\n```\n\n```sql\nSQL>\
    \ alter database open resetlogs;\n```\n"
- fmt: '# 第16章：用户管理的备份与恢复


    ## 总结


    本章介绍了现在已不常教授或使用的备份与恢复（B&R）技术。大多数DBA正在（也应该）使用RMAN来满足其Oracle B&R需求。然而，理解冷备份和热备份的工作原理至关重要。你可能会遇到这样的咨询场景：某个环境仍在使用旧技术，现在需要你来恢复和修复其数据库，或者协助他们迁移到RMAN。在这些场景中，你必须完全理解旧的备份技术。


    本章还讨论了使用冷备份和热备份进行恢复的技术。


    理解每个步骤发生的情况以及为何需要该步骤，对于全面掌握Oracle B&R架构至关重要。这种意识在你使用Oracle工具（如RMAN（B&R）和Data Guard（灾难恢复、高可用性和复制））进行故障排查时，会转化为关键技能。


    既然你已深入理解了Oracle B&R的机制，接下来就可以研究RMAN了。本书接下来的几章将探讨如何为生产环境配置和使用RMAN。


    ![](index-491_1.png)


    ![](index-492_1.png)


    # 第17章：配置RMAN


    `PL/SQL` 包：RMAN使用两个内部的`PL/SQL`包（由`SYS`拥有）来执行B&R任务：`DBMS_RCVMAN` 和 `DBMS_BACKUP_RESTORE`。`DBMS_RCVMAN`访问控制文件中的信息，并将其传递给RMAN服务器进程。`DBMS_BACKUP_RESTORE`包执行了RMAN的大部分工作。例如，该包创建系统调用，指导通道进程执行B&R操作。


    内存缓冲区（`PGA`或`SGA`）：RMAN在程序全局区（有时也在系统全局区）中使用一个内存区域作为缓冲区，用于读取数据文件并将后续块复制到备份文件中。


    辅助数据库：RMAN将目标数据库的数据文件还原到该数据库，用于克隆数据库、创建Data Guard备用地或执行数据库时间点恢复。


    通道：Oracle服务器进程，用于处理正在备份的文件与备份设备（磁盘或磁带）之间的I/O。


    备份与备份集：当你运行RMAN `BACKUP`命令时，它会创建一个或多个备份集。`备份集`是RMAN内部的一个逻辑结构，用于对备份片文件进行分组。你可以将备份集与备份片的关系，类比为表空间与数据文件的关系：一个是逻辑结构，另一个是物理文件。


    备份片文件：RMAN的二进制备份文件。每个逻辑备份集由一个或多个备份片文件组成。这些是RMAN在磁盘或磁带上创建的物理文件。它们是专有的二进制格式文件，只能由RMAN读写。一个备份片可以包含来自许多不同数据文件的块。备份片文件通常比数据文件小，因为备份片只包含数据文件中已使用的块。


    映像副本：一种备份类型，RMAN创建数据文件、归档重做日志文件或控制文件的完全相同的副本。映像副本可以由操作系统实用程序（如Linux的`cp`和`mv`命令）直接操作。映像副本是增量更新映像备份的一部分。如果需要快速还原，有时使用映像副本比备份集更可取。


    恢复目录：一个可选的数据库模式，包含用于存储RMAN备份操作元数据信息的表。Oracle强烈建议使用恢复目录，因为它提供了更多的B&R选项。


    介质管理器：第三方软件，允许RMAN直接备份文件到磁带。当没有足够的磁盘空间直接备份，或者灾难恢复要求需要备份到易于异地转移的存储时，备份到磁带是理想的。


    快速恢复区：一个可选的磁盘区域，RMAN可用于存储备份（以前称为闪回恢复区）。你还可以使用快速恢复区来多路复用控制文件和在线重做日志。使用数据库初始化参数`DB_RECOVERY_FILE_DEST_SIZE`和`DB_RECOVERY_FILE_DEST`来实例化一个快速恢复区。


    快照控制文件：当备份控制文件或与恢复目录（如果正在使用）同步时，RMAN需要控制文件的一致性视图。在这些情况下，RMAN首先创建控制文件的临时副本（快照）。这允许RMAN使用一个保证在备份控制文件或与恢复目录同步期间不会更改的控制文件版本。


    你可以使用RMAN创建几种类型的备份：


    完全备份：备份与数据文件相关的所有已修改块。完全备份并不意味着备份整个数据库。例如，你可以对一个数据文件进行完全备份。


    增量级别0备份：备份与完全备份相同的块。唯一的区别是，级别0备份可以与其他增量备份一起使用，而完全备份不能。


    增量级别1备份：仅备份自上次备份以来修改过的块。级别1增量备份可以是差异型或累积型。`差异型`级别1备份备份自上次级别0或级别1备份以来所有修改过的块。`累积型`级别1备份备份自上次级别0备份以来所有更改过的块。


    增量更新备份：首先创建数据文件的映像副本，随后的增量备份会与该映像副本合并。这是使用映像副本进行备份的一种高效方式。使用增量更新备份进行介质恢复速度很快，因为在还原过程中使用的是数据文件的映像副本。


    块更改跟踪：数据库功能，用于跟踪数据库中已更改的块。更改块的记录保存在一个二进制文件中。RMAN可以利用该二进制文件的内容来提高增量备份的性能：RMAN无需扫描数据文件中所有已修改的块，而是可以通过二进制块更改跟踪来确定哪些块已更改。


    现在你已理解了RMAN的架构组件以及可以创建的备份类型，可以启动RMAN并为你的环境配置它了。


    ## 启动RMAN


    要连接到RMAN，你需要建立以下内容：


    *   操作系统环境变量

    *   访问具有适当权限的操作系统账户或具有`SYSDBA`权限的数据库用户


    连接RMAN的最简单方法是登录到目标数据库所在的服务器，并以Oracle软件所有者（在Linux/Unix系统上通常名为`oracle`）的身份登录。当你以`oracle`登录时，需要在使用`rman`、`sqlplus`等实用程序之前建立几个操作系统变量。第2章详细介绍了如何设置这些必需的操作系统变量。


    至少需要设置`ORACLE_HOME`和`ORACLE_SID`。此外，如果`PATH`变量包含`ORACLE_HOME/bin`目录会很方便。这是包含Oracle实用程序的目录。


    建立好操作系统变量后，可以从操作系统调用RMAN，如下所示：460


    ![](index-495_1.png)


    ■ **注意** 如果你想通过Oracle Net远程连接到RMAN，需要首先实现一个密码文件。


    ## RMAN架构决策'
  raw: 'At this point, your database should be transactionally consistent as it was
    at the SCN associated with the restore point.


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    Summary


    This chapter covers B&R techniques that aren’t taught or used much anymore. Most
    DBAs are (and should be) using RMAN for their Oracle B&R requirements. However,
    it’s critical for you to understand how cold backups and hot backups work. You
    may find yourself consulting in a shop where they’ve implemented old technology
    and now need you to restore and recover their database or assist them in migrating
    to RMAN. In these scenarios, you must fully understand the older backup technologies.


    This chapter also discussed restore and recovery techniques using cold and hot
    backups.


    Understanding what happens at each step and why the step is required is vital
    for complete knowledge of the Oracle B&R architecture. This awareness translates
    into key troubleshooting skills when you’re using Oracle tools such as RMAN (B&R)
    and Data Guard (disaster recovery, high availability, and replication).


    Now that you have an in-depth understanding of Oracle B&R mechanics, you’re ready
    to investigate RMAN. The next several chapters in this book examine how to configure
    and use RMAN for production-strength B&R.


    ![](index-491_1.png)


    ![](index-492_1.png)


    CHAPTER 17 ■ CONFIGURING RMAN


    *PL/SQL packages:* RMAN uses two internal PL/SQL packages (owned by SYS) to perform
    B&R tasks: DBMS_RCVMAN and DBMS_BACKUP_RESTORE. DBMS_RCVMAN


    accesses information in the control file and passes that to the RMAN server processes.
    The DBMS_BACKUP_RESTORE package performs most of RMAN’s work.


    For example, this package creates the system calls that direct the channel processes
    to perform B&R operations.


    *Memory buffers (PGA or SGA):* RMAN uses a memory area in the program global area
    (and sometimes in the system global area) as a buffer when reading from datafiles
    and copying subsequent blocks to back up files.


    *Auxiliary database:* A database to which RMAN restores target database datafiles
    for the purpose of duplicating a database, creating a Data Guard standby database,
    or performing a database point-in-time recovery.


    *Channel(s):* Oracle server processes for handling I/O between files being backed
    up and the backup device (disk or tape).


    *Backups and backup sets:* When you run an RMAN BACKUP command, it creates one
    or more backup sets. A *backup set* is an internal RMAN construct that logically
    groups backup piece files. You can think of the relationship of a backup set to
    a backup piece as similar to the relationship between a tablespace and a datafile.
    One is a logical construct, and the other is a physical file.


    *Backup piece file:* RMAN binary backup files. Each logical backup set consists
    of one or more backup piece files. These are the physical files that RMAN creates
    on disk or tape. They’re binary, proprietary format files that only RMAN can read
    or write to. A backup piece can contain blocks from many different datafiles.
    Backup piece files are typically smaller than datafiles because backup pieces
    only contain blocks that have been used in the datafiles.


    *Image copy:* A type of backup in which RMAN creates identical copies of a datafile,
    archive-redo log file, or control file. Image copies can be operated on by OS
    utilities such as the Linux cp and mv commands. Image copies are used as part
    of incrementally updated image backups. Sometimes it’s preferable to use image
    copies over backup sets if you need to be able to restore quickly.


    *Recovery catalog:* An optional database schema that contains tables used to store
    metadata information regarding RMAN backup operations. Oracle


    strongly recommends using a recovery catalog, because it provides more options
    for B&R.


    *Media manager:* Third-party software that allows RMAN to back up files directly
    to tape. Backing up to tape is desirable when you don’t have enough room to back
    up directly to disk or when disaster-recovery requirements necessitate a backup
    to storage that can be easily moved offsite.


    *Fast-recovery area:* An optional disk area that RMAN can use for backups (formerly
    known as the flash recovery area). You can also use the FRA to multiplex control
    files and online-redo logs. You instantiate a fast recovery with the database
    initialization parameters DB_RECOVERY_FILE_DEST_SIZE and DB_RECOVERY_FILE_DEST.


    CHAPTER 17 ■ CONFIGURING RMAN


    *Snapshot control file:* RMAN requires a read-consistent view of the control file
    when either backing up the control file or synchronizing with the recovery catalog
    (if it’s being used). In these situations, RMAN first creates a temporary copy
    (snapshot) of the control file. This allows RMAN to use a version of the control
    file that is guaranteed not to change while backing up the control file or synchronizing
    with the recovery catalog.


    You can make several types of backups with RMAN:


    *Full backup:* All modified blocks associated with the datafile are backed up.
    A full backup doesn’t refer to backing up the entire database. For example, you
    can make a full backup of one datafile.


    *Incremental level 0 backup:* Backs up the same blocks as a full backup. The only
    difference is that you can use a level 0 backup with other incremental backups,
    whereas you can use a full backup that way.


    *Incremental level 1 backup:* Backs up only blocks that have been modified since
    the previous backup. Level 1 incremental backups can be either differential or
    cumulative. A *differential* level 1 backup backs up all blocks that have been
    modified since the last level 0 or level 1 backup. A *cumulative* level 1 backup
    backs up all blocks that have changed since the last level 0 backup.


    *Incrementally updated backup:* First creates an image copy of the datafiles,
    after which subsequent backups are incremental backups that are merged with the
    image copy. This is an efficient way to use image copies for backups. Media recoveries
    using incrementally updated backups are fast because the image copy of the datafile
    is used during the restore.


    *Block-change tracking:* Database feature that keeps track of blocks that have
    changed in the database. A record of the changed blocks is kept in a binary file.


    RMAN can use the contents of the binary file to improve the performance of incremental
    backups: instead of having to scan all modified blocks in a datafile, RMAN can
    determine which blocks have changed from the binary block-change tracking.


    Now that you understand the RMAN architectural components and the types of backups
    you can make, you’re ready to start up RMAN and configure it for your environment.


    Starting RMAN


    To connect to RMAN, you need to establish the following:


    • OS environment variables


    • Access to a privileged operating-system account or a database user with SYSDBA
    privileges


    The easiest way to connect to RMAN is to log on to the server where the target
    database resides and log in as the owner of the Oracle software (usually named
    oracle on Linux/Unix boxes). When you log in as oracle, you need to establish
    several OS variables before you can use utilities such as rman, sqlplus, and so
    on. Setting these required OS variables is covered in detail in Chapter 2.


    At minimum, you need to set ORACLE_HOME and ORACLE_SID. Additionally, it’s convenient
    if the PATH


    variable includes the directory ORACLE_HOME/bin. This is the directory that contains
    the Oracle utilities.


    After you’ve established your OS variables, you can invoke RMAN from the OS as
    shown: 460


    ![](index-495_1.png)


    CHAPTER 17 ■ CONFIGURING RMAN


    ■ **Note** If you want to connect remotely to RMAN via Oracle Net, you need to
    first implement a password file.


    RMAN Architectural Decisions'
