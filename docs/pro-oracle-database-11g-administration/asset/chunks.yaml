    # 第 17 章 ■ 配置 RMAN


    ## 表 17–2. 架构决策的实现


    | 决策点 | 脚本中的实现方式 | 脚本中的行号 |

    | :--- | :--- | :--- |

    | 1\. 远程或本地运行 RMAN 客户端 | 在数据库服务器上本地运行脚本。 | 第 26 行，本地连接（非网络连接）。 |

    | 2\. 指定备份用户 | 使用 SYS 用户连接。 | 第 27 行，使用`/`连接启动 rman。 |

    | 3\. 使用联机或脱机备份 | 联机备份。 | 不适用。假设备份期间数据库处于运行状态。 |

    | 4\. 设置归档重做日志目标位置和文件格式 | `LOG_ARCHIVE_DEST_N`和`LOG_ARCHIVE_FORMAT`初始化参数在脚本外的数据库初始化文件中设置。
    | 不适用。在脚本外设置。 |

    | 5\. 配置 RMAN 备份位置和文件格式 | 直接在脚本中使用`CONFIGURE`命令。 | 第 38 至 43 行。 |

    | 6\. 设置控制文件的自动备份 | 在脚本中启用。 | 第 35 行。 |

    | 7\. 指定控制文件自动备份的位置 | 放置在与备份相同的目录中。 | 第 36 行。 |

    | 8\. 备份归档重做日志 | 与其他数据库一起备份。具体来说，使用`PLUS ARCHIVELOG`子句。 | 第 45 行。 |

    | 9\. 确定快照控制文件的位置 | 使用默认位置。 | 不适用 |

    | 10\. 使用恢复目录 | 未使用。 | 第 26 行，以`nocatalog`模式连接。 |

    | 11\. 使用介质管理器 | 未使用。 | 第 38 至 43 行，`device type disk`。 |

    | 12\. 设置`CONTROL_FILE_RECORD_KEEP_TIME`初始化参数 | 使用默认值。 | 不适用 |

    | 13\. 配置 RMAN 的备份保留策略 | 配置为冗余度为 1，进行交叉检查，并删除过时的备份和归档重做日志文件。 | 第 37 行，配置。<br>
    第 47 行，使用 RMAN 删除旧文件。 |

    | 14\. 配置归档重做日志的删除策略 | 使用与备份相同的保留策略。 | 不适用 |

    | 15\. 设置并行度 | 设置并行度为 5。 | 第 38 至 43 行。 |

    | 16\. 使用备份集或映像副本 | 使用备份集。 | 第 45 行。 |

    | 17\. 使用增量备份 | 增量级别 0，等同于完全备份。 | 第 45 行。 |

    | 18\. 使用增量更新备份 | 未使用。 | 不适用 |

    | 19\. 使用块变更跟踪 | 未使用。 | 不适用 |

    | 20\. 配置压缩 | 使用基本压缩。 | 第 45 行。 |

    | 21\. 配置加密 | 未使用。 | 不适用 |

    | 22\. 配置其他设置 | 未使用。 | 不适用 |


    关于此脚本的几个方面需要进一步讨论（除表中已包含的内容外）。


    第 11 行通过运行名为`oraset`的脚本来设置所需的 OS 变量。有关运行`oraset`和获取 OS 变量的详细信息，请参见第 2 章。许多 DBA
    选择将 OS 变量（如`ORACLE_HOME`和`ORACLE_SID`）硬编码到脚本中。但是，您应避免硬编码变量，而应使用脚本来获取所需变量。运行脚本要灵活得多，尤其是在一台服务器上有许多安装了不同版本
    Oracle 的数据库时。


    第 15 行将`NLS_DATE_FORMAT` OS 变量设置为一个包含小时、分钟和秒的值。这确保了当 RMAN 运行适当的命令时，其显示的日期输出包含时间成分。这在调试和诊断问题时非常有用。默认情况下，RMAN
    只显示日期部分。仅知道命令运行的日期，很少足以确定命令执行的具体时间。至少，您需要看到小时和分钟（连同日期）。


    第 18 至 24 行检查锁文件是否存在。如果此脚本已经在运行，则不希望再次运行它。脚本检查锁文件，如果存在，则脚本退出。备份完成后，锁文件会被删除（第 66
    至 68 行）。


    第 28 行将`ECHO`参数设置为`on`。这指示 RMAN 在输出中显示即将执行的命令。这对于调试问题非常有用。第 29 行显示所有可配置变量。这对于故障排查也很方便，因为您可以在执行任何命令之前看到
    RMAN 变量被设置成了什么。


    第 35 至 43 行使用了`CONFIGURE`命令。这些命令在脚本每次执行时都会运行。为什么要这样做？`CONFIGURE`命令只需要运行一次，它会存储在控制文件中——您不需要再次运行它，对吗？这是正确的。然而，我曾偶尔因此吃亏，当一个习惯不好的
    DBA 为数据库配置了某个设置却没告诉任何人，而我直到尝试进行另一次备份时才发现配置错误。我强烈建议将`CONFIGURE`命令放在脚本中，这样无论其他 DBA
    在脚本外做了什么，脚本的行为都能保持一致。脚本中的`CONFIGURE`设置也充当了一种文档形式：我可以轻松查看脚本来确定各项设置是如何配置的。


    第 31 至 33 行运行了`CROSSCHECK`命令。为什么要这样做？有时文件会丢失，或者一个鲁莽的 DBA 可能使用 RMAN 之外的操作系统命令从磁盘上删除了归档重做日志文件。当
    RMAN 运行时，如果它找不到它认为应该存在的文件，就会抛出错误并停止备份。我更倾向于运行`CROSSCHECK`命令，让 RMAN 协调它认为应该在磁盘上的文件与实际在磁盘上的文件。这能使
    RMAN 顺利运行。


    在第 47 行，您运行了`DELETE NOPROMPT OBSOLETE`。这将删除所有被 RMAN 根据保留策略标记为`OBSOLETE`的备份文件和归档重做日志文件。这使得
    RMAN 能够管理磁盘上应保留哪些文件。我倾向于在备份完成后运行`DELETE`命令（而不是在备份前运行）。保留策略被定义为 1，因此如果在备份后运行`DELETE`，磁盘上会保留一份备份副本。如果在备份前运行`DELETE`，磁盘上会保留一份备份副本。备份运行后，磁盘上就会有两份备份副本，而我的服务器上没有足够的空间。


    第 59 行创建了一个跟踪文件，其中包含在此数据库需要重新创建控制文件时所需的`CREATE CONTROLFILE` SQL 语句。第 62 行将数据库标识符（`DBID`）写入警报日志文件。在某些需要数据库
    ID 才能执行的控制文件恢复类型中，这可能会派上用场。


    您可以从 Linux/Unix 调度工具`cron`执行此 shell 脚本，如下所示：

    ```

    0 16 * * * $HOME/bin/rmanback.bsh INVPRD >$HOME/bin/log/INVPRDRMAN.log 2>&1

    ```

    该脚本在数据库服务器上每天按军用时间 1600 小时运行。会创建一个日志文件（`INVPRDRMAN.log`）来捕获 RMAN 作业的任何输出和错误。有关通过`cron`自动化作业的详细信息，请参见第
    21 章。


    再次说明，本节中的脚本是基础性的；您无疑需要根据您的需求对其进行增强和修改。此脚本为您提供了一个起点，包含具体的 RMAN 建议以及如何实施它们。


    ## 使用恢复目录


    当您使用恢复目录时，可以在与目标数据库相同的服务器上的同一数据库中创建恢复目录用户。但是，不建议采用这种方法，因为您不希望目标数据库的可用性或目标数据库所在服务器的可用性影响恢复目录。因此，您应该在不同于目标数据库的服务器上创建恢复目录数据库。


