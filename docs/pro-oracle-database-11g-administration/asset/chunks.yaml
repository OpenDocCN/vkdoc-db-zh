- fmt: '# CHAPTER 17 CONFIGURING RMAN


    如果您的数据库启用了归档，您可以开箱即用地使用`RMAN`运行如下命令来备份整个目标数据库：


    ```

    $ rman target /


    RMAN> backup database;

    ```


    如果遇到介质故障，您可以按如下方式恢复所有数据文件：


    ```

    RMAN> shutdown immediate;


    RMAN> startup mount;


    RMAN> restore database;

    ```


    数据库恢复后，您可以完全恢复它：


    ```

    RMAN> recover database;


    RMAN> alter database open;

    ```


    这样就万事大吉了吗？不，还不完全是。`RMAN`的默认属性设置对于简单的备份需求来说是合理的。开箱即用的`RMAN`设置可能适用于小型开发或测试数据库。但对于任何类型的业务关键型数据库，您需要仔细考虑诸如备份存储位置、在磁盘或磁带上保留备份多长时间、哪些`RMAN`功能适合数据库等事项。本章后续部分将引导您了解在生产环境中实施`RMAN`时需要考虑的许多备份与恢复（`B&R`）架构决策。`RMAN`拥有大量稳健的选项用于自定义`B&R`；通常，您不需要实现其许多功能。但是，每次使用`RMAN`备份生产数据库时，您都应仔细权衡每个决策点，并决定是否需要某个属性。


    表17-1总结了`RMAN`的实施决策和建议。表中的每个决策点都将在本章后续部分详细阐述。许多数据库管理员可能会不同意其中一些建议；这没关系。关键在于您需要考虑每个架构方面，并确定什么最适合您的业务需求。


    ## 表17-1 架构决策与建议概述


    | 决策点 | 建议 |

    | :--- | :--- |

    | 1. 远程或本地运行`RMAN`客户端 | 在目标数据库服务器上本地运行客户端。 |

    | 2. 指定备份用户 | 除非安全要求另有规定，否则使用`SYS`。 |

    | 3. 使用联机或脱机备份 | 取决于您的业务需求。大多数生产数据库需要联机备份，这意味着您必须启用归档。 |

    | 4. 设置归档重做日志的目标位置和文件格式 | 如果您使用闪回恢复区（`FRA`），归档日志将以默认格式写入其中。我更喜欢使用`LOG_ARCHIVE_DEST_N`初始化参数在`FRA`之外明确设置位置。
    |

    | 5. 配置`RMAN`备份位置和文件格式 | 取决于您的业务需求。有些站点需要磁带备份。如果使用磁盘，请将备份放在`FRA`中或通过通道设置指定位置。我更倾向于不使用`FRA`，而是通过`CONFIGURE`命令明确指定位置和文件格式。
    |

    | 6. 设置控制文件的自动备份 | 始终启用控制文件的自动备份。 |

    | 7. 指定控制文件自动备份的位置 | 将其放在`FRA`中或配置一个位置。我更倾向于将控制文件的自动备份写入与数据库备份相同的位置（通常在`FRA`之外）。
    |

    | 8. 备份归档重做日志 | 取决于您的业务需求。对于许多环境，我使用与备份数据库相同的命令每天备份归档重做日志。 |

    | 9. 确定快照控制文件的位置 | 使用默认位置。 |

    | 10. 使用恢复目录 | 取决于您的业务需求。对于许多环境，我不使用恢复目录。`Oracle`建议您使用恢复目录。如果`RMAN`保留策略大于`CONTROL_FILE_RECORD_KEEP_TIME`，则我建议您使用恢复目录。
    |

    | 11. 使用介质管理器 | 直接备份到磁带所需。 |

    | 12. 设置`CONTROL_FILE_RECORD_KEEP_TIME`初始化参数 | 通常，默认的七天足够。 |

    | 13. 配置`RMAN`的备份保留策略 | 取决于您的数据库和业务需求。 |'
  raw: 'If archiving is enabled for your database, you can use RMAN out of the box
    to run commands such as this to back up your entire target database:


    $ rman target /


    RMAN> backup database;


    If you experience a media failure, you can restore all datafiles as follows: RMAN>
    shutdown immediate;


    RMAN> startup mount;


    RMAN> restore database;


    After your database is restored, you can fully recover it:


    RMAN> recover database;


    RMAN> alter database open;


    You’re good to go, right? No, not quite. RMAN’s default attributes are reasonably
    set for simple backup requirements. The RMAN out-of-the-box settings may be appropriate
    for small development or test databases. But for any type of business-critical
    database, you need to carefully consider items such as where the backups are stored,
    how long to store backups on disk or tape, which RMAN features are appropriate
    for the database, and so on. The following sections in this chapter walk you through
    many of the B&R architectural decisions that you need to consider when implementing
    RMAN in a production environment. RMAN has a vast and robust variety of options
    for customizing B&R; and typically, you don’t need to implement many of its features.
    However, each time you implement RMAN to back up a production database, you should
    think through each decision point and decide whether you require an attribute.


    Table 17–1 summarizes the RMAN implementation decisions and recommendations. Each
    of the decision points in the table is elaborated on in subsequent sections in
    this chapter. Many DBAs will disagree with some of these recommendations; that’s
    fine. The point is that you need to consider each architectural aspect and determine
    what makes sense for your business requirements.


    ***Table 17–1.** Overview of Architectural Decisions and Recommendations* **Decision
    Point**


    **Recommendation**


    1\. Running the RMAN client remotely or locally


    Run the client locally on the target database server.


    2\. Specifying the backup user


    Use SYS unless you have a security requirement


    that dictates otherwise.


    3\. Using online or offline backups


    Depends on your business requirements. Most


    production databases require online backups,


    which means you must enable archiving.


    CHAPTER 17 ■ CONFIGURING RMAN


    **Decision Point**


    **Recommendation**


