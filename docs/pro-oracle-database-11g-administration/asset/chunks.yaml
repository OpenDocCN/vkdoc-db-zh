    \ SQL prompt\nSET SQLPROMPT '&_USER.@&_CONNECT_IDENTIFIER.> '\n\nNow, when I log\
    \ in to SQL*Plus, my prompt is automatically set:\n\n$ sqlplus / as sysdba\nSYS@O11R2>\n\
    \n## top.sql\n\nThe following script lists the top CPU-consuming SQL processes.\
    \ It’s useful for identifying problem SQL statements. Place this script in a directory\
    \ such as `HOME/scripts`:\n\n```sql\nselect * from(\nselect\n    sql_text\n  \
    \ ,buffer_gets\n   ,disk_reads\n   ,sorts\n   ,cpu_time/1000000 cpu_sec\n   ,executions\n\
    \   ,rows_processed\nfrom v$sqlstats\norder by cpu_time DESC)\nwhere rownum <\
    \ 11;\n```\n\nHere’s how you execute this script:\n\nSQL> @top\n\nHere is a small\
    \ snippet of the output, showing a SQL statement that is consuming a large amount\
    \ of database resources:\n\nSQL_TEXT\ninsert into reg_queue (registration_urn,registration_data,client_ip_addr,\
    \ relay_\nBUFFER_GETS DISK_READS SORTS CPU_SEC EXECUTIONS ROWS_PROCESSED\n-----------\
    \ ---------- ---------- ---------- ---------- --------------\n6079221 2482 28309\
    \ 986.704467 697494 997467\n\n## lock.sql\n\nThis script displays sessions that\
    \ have locks on tables that are preventing other sessions from completing work.\
    \ The script shows details about the blocking and waiting sessions. You should\
    \ place this script in a directory such as `HOME/scripts`. Here are the contents\
    \ of `lock.sql`:\n\n```sql\nselect s1.username blkg_user, s1.machine blkg_ws,\
    \ s1.sid blkg_sid,\n       s2.username wait_user, s2.machine wait_ws, s2.sid wait_sid,\n\
    \       lo.object_id blkd_obj_id, do.owner, do.object_name\nfrom v$lock l1, v$session\
    \ s1, v$lock l2, v$session s2,\n     v$locked_object lo, dba_objects do\nwhere\
    \ s1.sid = l1.sid\n  and s2.sid = l2.sid\n  and l1.id1 = l2.id1\n  and s1.sid\
