    ## Creating a Database


    This section explains how to manually create an Oracle database with the `SQL*Plus`
    `CREATE DATABASE` statement. Listed next are the steps required to create a database:


    1.  Set the operating system variables.

    2.  Configure the initialization file.

    3.  Create the required directories.

    4.  Create the database.

    5.  Create a data dictionary.


    Each of these steps is covered in the following subsections.


    ### Step 1\. Set the Operating System Variables


    Before you run `SQL*Plus` (or any other Oracle utility), you must set several
    OS variables:


    *   `ORACLE_HOME`

    *   `PATH`

    *   `ORACLE_SID`

    *   `LD_LIBRARY_PATH`


    The `ORACLE_HOME` variable defines the default directory location for the initialization
    file, which is `ORACLE_HOME/dbs` on Linux/Unix. On Windows, this directory is
    usually `ORACLE_HOME\database`. The `ORACLE_HOME` variable is also important because
    it defines the directory location of the Oracle binary files (such as `sqlplus`)
    that are in `ORACLE_HOME/bin`.


    The `PATH` variable specifies which directories are looked in by default when
    you type a command from the operating system prompt. In almost all situations,
    you require `ORACLE_HOME/bin` (the location of the Oracle binaries) to be included
    in your `PATH` variable.


    The `ORACLE_SID` variable defines the default name of the database you’re attempting
    to create. `ORACLE_SID` is also used as the default name for the initialization
    file, which is `init<ORACLE_SID>.ora`.


    The `LD_LIBRARY_PATH` variable is important because it specifies where to search
    for libraries on Linux/Unix boxes. The value of this variable is typically set
    to include `ORACLE_HOME/lib`.


    ### Step 2: Configure the Initialization File


    Oracle requires that you have an initialization file in place before you attempt
    to start the instance. The initialization file is used to configure features such
    as memory and to control file locations. You can use two types of initialization
    files:


    *   Server parameter binary file (`spfile`)

    *   `init.ora` text file


    Oracle recommends that you use an `spfile` for reasons such as these:


    *   You can modify the contents of the `spfile` with the SQL `ALTER SYSTEM` statement.

    *   You can use remote-client SQL sessions to start the database without requiring
    a local (client) initialization file.


    These are good reasons to use an `spfile`. However, some shops still use the traditional
    `init.ora` file. The `init.ora` file also has advantages:


    *   You can directly edit it with an operating system text editor.

    *   You can place comments in it that contain a history of modifications.


    When I first create a database, I find it easier to use an `init.ora` file. This
    file can be easily converted later to an `spfile` if required (via the `CREATE
    SPFILE FROM PFILE` statement). Here are the contents of a typical Oracle Database
    `11g` `init.ora` file:


    ```

    db_name=O11R2

    db_block_size=8192

    memory_target=800M

    memory_max_target=800M

    processes=200

    control_files=(/ora01/dbfile/O11R2/control01.ctl,/ora02/dbfile/O11R2/control02.ctl)
    job_queue_processes=10

    open_cursors=300

    fast_start_mttr_target=500

    undo_management=AUTO

    undo_tablespace=UNDOTBS1

    remote_login_passwordfile=EXCLUSIVE

    ```


    Ensure that the initialization file is named correctly and located in the appropriate
    directory. When starting your instance, Oracle looks in the default location for
    a binary initialization file named `spfile<ORACLE_SID>.ora`. If there is no binary
    `spfile`, Oracle looks for a text file with the name `init<ORACLE_SID>.ora`. Oracle
    throws an error if it can’t find an initialization file (either `spfile` or `init.ora`)
    in the default location. You can explicitly tell Oracle which directory and file
    to use by specifying the `PFILE` clause of the `STARTUP` statement, which allows
    you to specify a nondefault directory and name of a client (not server) initialization
    file.


    On Linux/Unix systems, the initialization file (either a text `init.ora` or binary
    `spfile`) is by default located in the `ORACLE_HOME/dbs` directory. On Windows,
    the default directory is `ORACLE_HOME\database`.


    Table 2–1 lists best practices when configuring an Oracle initialization file.


    ### Table 2–1. Initialization File Best Practices


    | Best Practice | Reasoning |

    | :--- | :--- |

    | Oracle recommends that you use a binary server parameter file (`spfile`). However,
    I still use the old text `init.ora` files in some cases. | Use whichever type
    of initialization parameter file you’re comfortable with. If you have a requirement
    to use an `spfile`, then by all means implement one. |

    | In general, don’t set initialization parameters if you’re not sure of their
    intended purpose. When in doubt, use the default. | Setting initialization parameters
    can have far-reaching consequences in terms of database performance. Only modify
    parameters if you know what the resulting behavior will be. |

    | For `11g`, set the `memory_target` and `memory_max_target` initialization parameters.
    | Doing this allows Oracle to manage all memory components for you. |

    | For `10g`, set the `sga_target` and `sga_target_max` initialization parameters.
    | Doing this lets Oracle manage most memory components for you. |

    | For `10g`, set `pga_aggregate_target` and `workarea_size_policy`. | Doing this
    allows Oracle to manage the memory used for the sort space. |

    | Starting with `10g`, use the automatic UNDO feature. This is set using the `undo_management`
    and `undo_tablespace` parameters. | Doing this allows Oracle to manage most features
    of the UNDO tablespace. |

    | Set `open_cursors` to a higher value than the default. I typically set it to
    `500`. Active online transaction processing (OLTP) databases may need a much higher
    value. | The default value of 50 is almost never enough. Even a small one-user
    application can exceed the default value of 50 open cursors. |

    | Name the control files with the pattern `/<mount_point>/dbfile/<database_name>/control0N.ctl`.
    | This deviates slightly from the Optimal Flexible Architecture (OFA) standard.
    I find this location easier to navigate to, as opposed to being located under
    `ORACLE_BASE`. |

    | Use at least two control files, preferably in different locations using different
    disks. | If one control file becomes corrupt, it’s always a good idea to have
    at least one other control file available. |


    ### Step 3: Create the Required Directories


    Any directories referenced in the initialization file or `CREATE DATABASE` statement
    must be created on the server before you attempt to create a database. For example,
    in the previous section’s initialization file, the control files are defined as
    `control_files=(/ora01/dbfile/O11R2/control01.ctl,/ora02/dbfile/O11R2/control02.ctl)`.
    From the previous line, ensure that you’ve created the directories `/ora01/dbfile/O11R2`
    and `/ora02/dbfile/O11R2` (modify this according to your environment). In Linux/Unix,
    you can create directories and any parent directories required by using the `mkdir`
    command with the `-p` switch:


    ```

    $ mkdir -p /ora01/dbfile/O11R2

    $ mkdir -p /ora02/dbfile/O11R2

    ```


    Also ensure that you create any directories required for datafiles and online
    redo logs referenced in the `CREATE DATABASE` statement (see the section “Step
    4: Create the Database”). For this example, here are the directories required:


    ```

    $ mkdir -p /ora01/dbfile/O11R2

    $ mkdir -p /ora01/dbfile/O11R2

    $ mkdir -p /ora01/dbfile/O11R2

    $ mkdir -p /ora02/oraredo/O11R2

    $ mkdir -p /ora03/oarredo/O11R2

    ```


