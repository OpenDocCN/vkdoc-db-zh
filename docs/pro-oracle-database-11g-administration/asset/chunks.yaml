    ## Generating the File Copy Script


    At the same time that you generate the hot-backup script, it’s prudent to generate
    a script that you can use to copy the datafiles from a backup directory. You have
    to modify the `hbdir` and `dbname` variables in this script to match your environment.
    Here’s a script that generates the copy commands:


    ```bash

    #!/bin/bash

    # source oracle OS variables

    . /var/opt/oracle/oraset $1

    #

    sqlplus -s <<EOF

    / as sysdba

    set head off pages0 lines 132 verify off feed off trimsp on

    define hbdir=/oradump/hbackup

    define dbname=O11R2

    spo hotrest.sql

    select ''!cp '' || ''&&hbdir'' || substr(name,instr(name,''&&dbname'')-1)

    || '' '' || name from v\$datafile;

    spo off;

    #

    exit 0

    ```


    Here’s a listing of the code you can execute from SQL\*Plus to copy the datafiles
    back from the backup directory in the event of a failure:


    ```

    !cp /oradump/hbackup/O11R2/system01.dbf /ora01/dbfile/O11R2/system01.dbf

    !cp /oradump/hbackup/O11R2/sysaux01.dbf /ora01/dbfile/O11R2/sysaux01.dbf

    !cp /oradump/hbackup/O11R2/undotbs01.dbf /ora02/dbfile/O11R2/undotbs01.dbf

    !cp /oradump/hbackup/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf

    !cp /oradump/hbackup/O11R2/appdata.dbf /ora01/dbfile/O11R2/appdata.dbf

    !cp /oradump/hbackup/O11R2/inv_mgmt_data01.dbf \

    /ora01/dbfile/O11R2/inv_mgmt_data01.dbf

    !cp /oradump/hbackup/O11R2/inv_mgmt_index01.dbf \

    /ora01/dbfile/O11R2/inv_mgmt_index01.dbf

    !cp /oradump/hbackup/O11R2/mvdata01.dbf /ora01/dbfile/O11R2/mvdata01.dbf

    !cp /oradump/hbackup/O11R2/mvindex01.dbf /ora01/dbfile/O11R2/mvindex01.dbf

    ```


    In this output, you can remove the `!` character from each line if you prefer
    to run the commands from the OS prompt. The main idea is that these commands are
    available in the event of a failure so you know what files have been backed up
    to what location and how to copy them back. In the prior code listing, also notice
    that two lines have been wrapped with the `\` character. This is to fit the output
    within the page width constraints of this book.


    **Tip** Don’t use user-managed hot-backup technology for online backups. Use RMAN
    for backups. RMAN doesn’t need to place tablespaces in backup mode and automates
    nearly everything related to B&R.


    ## Understanding the Split-Block Issue


    To perform a hot backup, one critical step is to alter a tablespace into backup
    mode before you copy any of the datafiles associated with the tablespace using
    an OS utility. To understand why you have to alter a tablespace into backup mode,
    you must be familiar with what is sometimes called the split (or fractured) block
    issue.


    Recall that a database block is often a different size than the OS block. For
    example, a database block may be sized at 8KB, whereas the OS block size is 4KB.
    As part of the hot backup, you use an OS utility to copy the live datafiles. While
    the OS utility is copying the datafile, the possibility exists that database writers
    are writing to a block at the same time the OS utility is copying the block. Because
    the Oracle block and the OS block are different sizes, the following may happen:

    1.  The OS utility copies part of the Oracle block.

    2.  A moment later, a database writer updates the entire block.

    3.  A split second later, the OS utility copies the latter half of the Oracle
    block.


    This can result in the OS copy of the block being inconsistent with what Oracle
    wrote to the OS.


    Figure 16–1 illustrates this concept.


    Looking at Figure 16–1, the block copied to disk at time 3 is corrupt as far as
    Oracle is concerned. The first half of the block is from time 1, and the latter
    half of the block is copied at time 3. This is why you can’t copy datafiles in
    an open Oracle database to make a backup. When you make a hot backup, you’re guaranteeing
    block-level corruption in the backups of the datafiles.


    To understand how Oracle resolves the split-block issue, first consider a database
    operating in its normal mode (not in backup mode). The redo information that is
    written to the online-redo logs is only what Oracle needs to reapply transactions.
    The redo stream doesn’t contain entire blocks of data. Oracle only records a change
    vector in the redo stream that specifies which block changed and how it was changed.
    Figure 16–2 shows Oracle under normal operations.


