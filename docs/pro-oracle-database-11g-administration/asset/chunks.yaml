    Rerunning Commands Quickly


    When there are problems with a database server, you need to be able to quickly
    run commands from the operating system prompt. You may be having some sort of
    performance issue and want to run commands that navigate you to directories that
    contain log files, or you may want to display the top consuming processes from
    time to time. In these situations, you don’t want to waste time having to retype
    command sequences.


    CHAPTER 3 ■ CONFIGURING AN EFFICIENT ENVIRONMENT


    One timesaving feature of the Bash shell is that it has several methods for editing
    and rerunning previously executed commands. The following list highlights several
    options available for manipulating previously typed commands:


    • Scrolling with the up and down arrow keys


    • Using Ctrl+P and Ctrl+N


    • Listing the command history


    • Searching in reverse


    • Setting the command editor


    Each of these techniques is described briefly in the following sections.


    Scrolling with the Up and Down Arrow Keys


    You can use the up arrow to scroll up through your recent command history. As
    you scroll through previously run commands, you can rerun a desired command by
    pressing the Enter or Return key.


    If you want to edit a command, use the Backspace key to erase characters, or use
    the left arrow to navigate to the desired location in the command text. After
    you’ve scrolled up through command stack, use the down arrow to scroll back down
    through previously viewed commands.


    ■ **Note** If you’re familiar with Windows, scrolling through the command stack
    is similar to using the DOSKEY


    utility.


    Pressing Ctrl+P and Ctrl+N


    The Ctrl+P keystroke (pressing the Ctrl and P keys at the same time) displays
    your previously entered command. If you’ve pressed Ctrl+P several times, you can
    scroll back down the command stack by pressing Ctrl+N (pressing the Ctrl and N
    keys at the same time).


    Listing the Command History


    You can use the history command to display commands that the use previously entered:
    $ history


    Depending on how many commands have previously been executed, you may see a lengthy
    stack.


    You can limit the output to the last *n* number of commands by providing a number
    with the command.


    For example, the following lists the last five commands that were run: $ history
    5


    CHAPTER 3 ■ CONFIGURING AN EFFICIENT ENVIRONMENT


    Here is some sample output:


    273 cd -


    274 grep -i ora alert.log


    275 ssh -Y -l oracle 65.217.177.98


    276 pwd


    277 history 5


    To run a previously listed command in the output, use an exclamation point (!,
    sometimes called the *bang*) followed by the history number. In this example,
    to run the pwd command on line 276, use ! as follows:


    $ !276


    To run the last command you ran, use !!, as shown here:


    $ !!


    Searching in Reverse


    Press Ctrl+R, and you’re presented with the Bash shell reverse-search utility:
    $ (reverse-i-search)`'':


    From the reverse-i-search prompt, as you type each letter, the tool automatically
    searches through previously run commands that have text similar to the string
    you entered. As soon as you’re presented with the desired command match, you can
    rerun the command by pressing the Enter or Return key. To view all commands that
    match a string, press Ctrl+R repeatedly. To exit the reverse search, press Ctrl+C.


    Setting the Command Editor


    You can use the set -o command to make your command-line editor be either vi or
    emacs. This example sets the command-line editor to be vi:


    $ set -o vi


    Now, when you press Esc+K, you’re placed in a mode where you can use vi commands
    to search through the stack of previously entered commands.


    For example, if you want to scroll up the command stack, you can use the K key;
    and similarly, you can scroll down using the J key. When in this mode, you can
    use the slash (/) key and then type a string to be searched for in the entire
    command stack.


    ■ **Tip** Before you attempt to use the command editor feature, be sure you’re
    thoroughly familiar with either the vi or emacs editor.


    A short example will illustrate the power of this feature. Say you know that you
    ran the ls -altr command about an hour ago. You want to run it again, but this
    time without the r (reverse-sort) option.


    To enter the command stack, press Esc+K:


    $ Esc+K


    CHAPTER 3 ■ CONFIGURING AN EFFICIENT ENVIRONMENT


    You should now see the last command you executed. To search the command stack
    for the ls command, type /ls and then press Enter or Return:


    $ /ls


    The most recently executed ls command appears at the prompt:


    $ ls -altr


    To remove the r option, use the right arrow key to place the prompt over the r
    on the screen, and press X to remove the r from the end of the command. After
    you’ve edited the command, press the Enter or Return key to execute it.


    Developing Standard Scripts


    I’ve worked in shops where the database administration team developed hundreds
    of scripts and utilities to help manage an environment. One company had a small
    squad of DBAs whose job function was to maintain the environmental scripts. I
    think that’s overkill. I tend to use a small set of focused scripts, where each
    script is usually less than 50 lines long. If you develop a script that another
    DBA can’t understand or maintain, then it’s probably too complicated.


    ■ **Note** All the scripts in this chapter are available for download from the
    Apress web site at www.apress.com. Go to the catalog page for this book. Look
    for the Source Code link under the book’s cover image.


    This section contains several short shell functions, shell scripts, and SQL scripts
    that can help you manage a database environment. This is by no means a complete
    list of scripts—rather, it provides a starting point you can build on. Each subsection
    heading is the name of a script.


    ■ **Note** Before you attempt to run a shell script, ensure that it’s executable.
    Use the chmod command to achieve this: chmod 750 <script>


    dba_setup


    Usually, you’ll set a common set of operating system variables and aliases in
    the same manner for every database server. When navigating among servers, you
    should set these variables and aliases in a consistent and repeatable manner.
    Doing so helps you (or your team) efficiently operate in every environment. For
    example, it’s extremely useful to have the operating system prompt set in a consistent
    way when you work with dozens of different servers. This helps you quickly identify
    what box you’re on, which OS user you’re logged in as, and so on.


    One technique is to store these standard settings in a script and then have that
    script executed automatically when you log in to a server. I usually create a
    script named dba_setup to set these operating system variables and aliases. You
    can place this script in a directory like HOME/bin and 60


    CHAPTER 3 ■ CONFIGURING AN EFFICIENT ENVIRONMENT


    automatically execute the script via a startup script (covered later in this chapter
    in the “Organizing Scripts” section). Here are the contents of a typical dba_setup
    script:


    # set prompt


    PS1=''[\h:\u:${ORACLE_SID}]$ ''


    #


    export EDITOR=vi


    export VISUAL=$EDITOR


    export SQLPATH=$HOME/scripts


    set -o vi


    #


    # list directories only


    alias lsd="ls -p | grep /"'
