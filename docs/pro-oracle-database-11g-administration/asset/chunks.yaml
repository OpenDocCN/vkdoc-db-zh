    \ to initialize the environment.\n\nThe previous steps are detailed in the following\
    \ subsections.\n\n### Step 1: Create Directories\n\nCreate a standard set of directories\
    \ on each database server to store your custom scripts. A directory beneath the\
    \ `HOME` directory of the oracle user is usually a good location. I usually create\
    \ the following three directories:\n\n*   `HOME/bin`. Standard location for shell\
