    ## 步骤 2. 确保操作系统已充分配置


    与此步骤相关的任务因每个数据库版本和操作系统而有所不同。您必须参考针对数据库版本和操作系统供应商的 Oracle 安装手册，以获取确切要求。要执行此步骤，您需要验证和配置操作系统组件，例如：


    - 内存和交换空间

    - 系统架构（处理器）

    - 可用磁盘空间（Oracle 现在安装几乎需要 5GB 空间）

    - 操作系统版本和内核

    - 操作系统软件（所需的软件包和补丁）


    运行以下命令以确认 Linux 服务器上的内存大小：`$ grep MemTotal /proc/meminfo`


    要验证内存和交换空间的大小，请运行以下命令：


    `$ free -t`


    要验证 `/tmp` 目录的空间大小，请输入此命令：`$ df -h /tmp`


    要显示可用磁盘空间量，请执行此命令：


    `$ df -h`


    要验证操作系统版本，请输入此命令：


    `$ cat /proc/version`


    要验证内核信息，请运行以下命令：


    `$ uname -r`


    要确定是否已安装所需的软件包，请执行以下命令并提供所需的软件包名称：


    `$ rpm -q <package_name>`


    再次强调，数据库服务器的要求因操作系统和数据库版本而有很大差异。您可以从 Oracle 的网站 `www.oracle.com/documentation`
    下载具体的安装手册。


    ■ **注意** OUI（Oracle 通用安装程序）会显示操作系统软件和硬件的任何不足。运行安装程序将在“步骤 5”部分介绍。


    ## 步骤 3. 获取 Oracle 安装软件


    通常，获取 Oracle 软件最简单的方法是从 Oracle 软件网站下载：`www.oracle.com/technology/software`。导航到软件下载页面，并下载适合您要安装软件的操作系统和硬件类型（Linux、Solaris、Windows
    等）的 Oracle 数据库版本。


    ## 步骤 4. 解压缩文件


    在解压缩文件之前，我建议您创建一个标准目录来放置 Oracle 安装介质。您应该这样做有几个原因：当您一周、一个月或一年后回到这台机器时，您会希望能够轻松找到安装介质。


    标准的目录结构可以帮助您快速组织和理解机器上已安装或未安装的内容。


    创建一组标准目录来存放用于安装 Oracle 软件的文件。我喜欢将安装介质存储在诸如 `/ora01/orainst` 的目录中，然后在其中为安装在机器上的每个
    Oracle 软件版本创建一个子目录：


    `$ mkdir -p /ora01/orainst/10.2.0.1`


    `$ mkdir -p /ora01/orainst/10.2.0.4`


    `$ mkdir -p /ora01/orainst/11.2.0.1`


    现在，将安装文件移动到相应的目录，并在那里解压缩它们：


    `$ mv linux_11gR2_database_1of2.zip /ora01/orainst/11.2.0.1`


    `$ mv linux_11gR2_database_2of2.zip /ora01/orainst/11.2.0.1`


    使用 `unzip` 命令解压缩 zip 文件。Oracle Database 11 *g* release 2 软件的解压缩操作如下所示：


    ```

    $ unzip linux_11gR2_database_1of2.zip

    $ unzip linux_11gR2_database_2of2.zip

    ```


    在某些 Oracle 安装中，您可能会发现分发文件是以压缩的 cpio 文件形式提供的。您可以使用一个命令进行解压缩和解包，如下所示：


    `$ cat 10gr2_db_sol.cpio.gz | gunzip | cpio -idvm`


    ## 步骤 5. 配置响应文件并运行安装程序


    您可以在两种模式之一运行 OUI：图形化模式或静默模式。通常，DBA 使用图形化安装程序。


    然而，我强烈偏好使用静默安装选项，原因如下：静默安装不需要 X Window System 软件的可用性。


    您可以避免远程图形化安装可能遇到的性能问题，因为尝试在本地绘制屏幕时速度可能极慢。


    静默安装可以编写脚本并实现自动化。这意味着每次安装都可以按照相同的一致标准执行，无论哪个团队成员执行安装（我甚至让系统管理员以此方式安装 Oracle 二进制文件）。


    执行静默安装的关键是使用响应文件。解压缩 Oracle 软件后，查找 Oracle 提供的示例响应文件：


    `$ find . -name "*.rsp"`


    根据 Oracle 的版本和操作系统平台，您找到的响应文件的名称和数量可能会有很大不同。接下来的两个小节展示了两种场景：Oracle Database 10
    *g* release 2 和 Oracle Database 11 *g* release 2 的静默安装。


    ### Oracle Database 10g 场景


    Oracle 安装软件附带了各种默认响应文件。这些文件因数据库版本和操作系统而异。例如，以下是 Oracle Database 10 *g* release
    2 (Solaris) 环境中提供的响应文件：


    `$ find . -name "*.rsp"`


    `./response/emca.rsp`


    `./response/custom.rsp`


    `./response/enterprise.rsp`


    `./response/dbca.rsp`


    `./response/netca.rsp`


    `./response/standard.rsp`


    `./install/response/se.rsp`


    `./install/response/pe.rsp`


    `./install/response/ee.rsp`


    `./inst.rsp`


    将 `enterprise.rsp` 文件复制到当前工作目录，并为其指定一个不同的名称（这样您始终可以参考原始文件）：


    `$ cp response/enterprise.rsp inst.rsp`


    使用操作系统实用程序（如 `vi`）编辑 `inst.rsp` 文件，并为响应文件变量提供值。以下是典型的 Oracle Database 10 *g* 安装需要提供的最小值：


    ```

    RESPONSEFILE_VERSION=2.2.1.0.0

    # 安装组，我使用 dba，许多其他人使用 oinstall

    UNIX_GROUP_NAME=dba

    FROM_LOCATION="/ora01/orainst/10.2.0.1/stage/products.xml"

    n_configurationOption=3

    s_nameForDBAGrp=dba

    s_nameForOPERGrp=dba

    ORACLE_HOME=/ora01/app/oracle/product/10.2.0.4/db_1

    ORACLE_HOME_NAME=OHOME10

    ```


    ■ **注意** 有关所有响应文件变量的完整说明，请参阅 Oracle OTN 网站上提供的 Oracle 通用安装程序指南。


    在此场景中，我不修改任何其他响应文件值。我让它们保持空白或保留已指定的默认值。现在，以静默模式运行 `runInstaller` 实用程序，并提供响应文件位置的完整目录路径：


    `$ ./runInstaller -ignoreSysPrereqs -force -silent -responseFile /ora01/orainst/10.2.0.1/inst.rsp`


    ■ **注意** 在 Windows 上，`setup.exe` 命令等同于 Linux/Unix 的 `runInstaller` 命令。


    安装程序会显示相当多的输出。如果所有系统检查都通过，安装 Oracle 软件需要几分钟时间。成功完成后，您应该会看到此消息：需要以 root 用户身份执行以下配置脚本
    `/ora01/app/oracle/product/10.2.0.4/db_1/root.sh` 来配置系统。


    以 root 身份登录，并运行 `root.sh`：

    '
- fmt: '# /ora01/app/oracle/product/10.2.0.4/db_1/root.sh


    I usually accept the defaults. After `root.sh` runs, you should have a good installation
    of the Oracle software and can create a database (database creation is covered
    in Chapter 2).


    ## Oracle Database 11g Scenario


    Here are the response files provided with an Oracle Database `11g` release 2 on
    a Linux server:

    ```

    $ find . -name "*.rsp"

    ./response/db_install.rsp

    ./response/dbca.rsp

    ./response/netca.rsp

    ```


    Copy one of the response files so that you can modify it. This example copies
    the `db_install.rsp` file to the current working directory and names the file
    `inst.rsp`:

    ```

    $ cp response/db_install.rsp inst.rsp

    ```


    Keep in mind that the format of response files can differ quite a bit depending
    on the Oracle database version. For example, there are major differences from
    Oracle Database `11g` release 1 to Oracle Database `11g` release 2. When you install
    a new release, you have to inspect the response file and determine which parameters
    must be set. Here is a partial listing of an Oracle Database `11g` release 2 response
    file (the first two lines of the following file should be on one line, but is
    placed on two lines in this book to fit on one page):


    ```

    oracle.install.responseFileVersion=/oracle/install/rspfmt_dbinstall_response_schema_v11_2_0

    oracle.install.option=INSTALL_DB_SWONLY

    ORACLE_HOSTNAME=ora03

    UNIX_GROUP_NAME=dba

    oracle.install.db.DBA_GROUP=dba

    oracle.install.db.OPER_GROUP=dba

    INVENTORY_LOCATION=/ora01/orainst/11.2.0.1/database/stage/products.xml

    SELECTED_LANGUAGES=en

    ORACLE_HOME=/oracle/app/oracle/product/11.2.0/db_1

    ORACLE_BASE=/oracle/app/oracle

    DECLINE_SECURITY_UPDATES=true

    oracle.install.db.InstallEdition=EE

    oracle.install.db.isCustomInstall=true

    ```


    Be sure to modify the appropriate parameters for your environment. If you’re unsure
    what to set the `ORACLE_HOME` and `ORACLE_BASE` values to, see the this chapter’s
    first section, “Understanding the Optimal Flexible Architecture,” which has a
    description of the OFA standard directories.


    There are sometimes idiosyncrasies to these parameters that are specific to a
    release. For example, in Oracle Database `11g` release 2, if you don’t want to
    specify your My Oracle Support (MOS) login information, then you need to set the
    following:


    `DECLINE_SECURITY_UPDATES=true`


    If you don’t set `DECLINE_SECURITY_UPDATES` to `TRUE`, then you’re expected to
    provide your MOS login information. If you don’t do so, the installation won’t
    succeed.


    After you’ve configured your response file, you can run the Oracle installer in
    silent mode. Notice that you have to put the entire directory path for the location
    of your response file:

    ```

    $ ./runInstaller -ignoreSysPrereqs -force -silent -responseFile /ora01/orainst/11.2.0.1/database/inst.rsp

    ```

    The previous command is entered on two lines. The first line is continued to the
    second line via the `\` (backward slash) character.


    If you encounter errors with the installation process, you can view the associated
    log file. Each time you attempt to run the installer, it creates a log file with
    a unique name that includes a timestamp. The log file is created in the `oraInventory/logs`
    directory. You can stream the output to your screen as the OUI writes to it:

    ```

    $ tail -f <logfile name>

    ```

    The log file is named something like:

    ```

    installActions2009-04-25_11–42-51AM.log

    ```


    If everything runs successfully, in the output, you’re notified that you need
    to run the `root.sh` script as the root user:

    ```

    #Root scripts to run

    /oracle/app/oracle/product/11.2.0/db_1/root.sh

    ```


    Run the `root.sh` script as the root operating system user. After you do that,
    you should be able to create an Oracle database (database creation is covered
    in Chapter 2).


    **Note** On Linux/Unix platforms, the `root.sh` script contains commands that
    must be run as the root user. This script needs to modify the owner and permissions
    of some of the Oracle executables (such as the `nmo` executable).


    Some versions of `root.sh` prompt you as to whether you want to accept the default
    values. Usually, it’s suitable to accept the default values.


    ## Step 6. Troubleshoot Any Issues


    If you encounter an error using a response file, 90 percent of the time it’s due
    to an issue with how you set the variables in the response file. Inspect those
    variables carefully, and ensure that they’re set correctly. Also, if you don’t
    fully specify the command-line path to the response file, you receive errors such
    as this:

    ```

    OUI-10203: The specified response file ''enterprise.rsp'' is not found.

    ```


    Here is another common error when the path or name of the response file is incorrectly
    specified:

    ```

    OUI-10202:No response file is specified for this session.

    ```


    Listed next is the error message you receive if you enter a wrong path to your
    `products.xml` file within the response file’s `FROM_LOCATION` variable:

    ```

    OUI-10133:Invalid staging area

    ```


    Also, be sure you provide the correct command-line syntax when running a response
    file. If you incorrectly specify or misspell an option, you may receive a misleading
    error message such as `DISPLAY not set`. When using a response file, you don’t
    need to have your `DISPLAY` variable set. This message is confusing because in
    this scenario, the error is caused by an incorrectly specified command-line option
    and has nothing to do with the `DISPLAY` variable. Check all options entered from
    the command line, and ensure that you haven’t misspelled an option.


    Another common issue occurs when you specify an `ORACLE_HOME` and the silent installation
    thinks the given home already exists:

    ```

    Check complete: Failed <<<<

    Problem: Oracle Database 11g Release 2 can only be installed in a new Oracle Home

    Recommendation: Choose a new Oracle Home for installing this product.

    ```


    Check your `inventory.xml` file (in the `oraInventory/ContentsXML` directory),
    and make sure there’s not a conflict with an already-existing Oracle home name.


    When you’re troubleshooting issues with Oracle installations, remember that the
    installer uses two key files to keep track of what software has been installed
    and where: `oraInst.loc` and `inventory.xml`.


    Table 1–1 describes the files used by the Oracle installer.


    **Table 1–1.** Useful Files for Troubleshooting Oracle Installation Issues


    | File name | Directory Location | Contents |

    | :--- | :--- | :--- |

    | `oraInst.loc` | The location of this file varies by operating system. On Linux,
    this file is in `/etc`; on Solaris, it’s in `/var/opt/oracle`. | oraInventory
    directory location and installation operating system group |

    | `inst.loc` (Windows registry) | `HKEY_LOCAL_MACHINE\Software\Oracle` | Inventory
    information |

    | `inventory.xml` | `oraInventory/ContentsXML/inventory.xml` | Oracle home names
    and corresponding directory location |

    | `.log` files | `oraInventory/logs` | Installation log files, which are extremely
    useful for troubleshooting |


    ## Installing with a Copy of an Existing Installation


    DBAs sometimes install Oracle software by using a utility such as `tar` to copy
    an existing installation of the Oracle binaries to a different server (or a different
    location on the same server). This approach is fast and simple (especially compared
    to downloading and running the Oracle installer). This technique allows DBAs to
    easily install the Oracle software on multiple servers and at the same time ensure
    that each installation is identical.


    Installing Oracle with an existing copy of the binaries is a two-part process:
    Copy the binaries using an operating system utility. Attach the Oracle home.


    These steps are detailed in the next two subsections.


    **Tip** MOS note `300062.1` contains instructions on how to clone an existing
    Oracle installation.


