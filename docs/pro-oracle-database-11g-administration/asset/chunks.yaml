  raw: '# See Chapter 2 for details on using a utility


    # like oraset to source OS variables'
  trans: '

    # 详见第 2 章关于使用类似`oraset`的工具来设置操作系统变量

    '
- fmt: "# CHAPTER 15 ■ MATERIALIZED VIEWS\n\n## Source oracle OS variables\n\n`. /var/opt/oracle/oraset\
    \ $ORACLE_SID`\n\n`date`\n\n`sqlplus -s <<EOF`\n\n`rep_mv2/foobar`\n\n`WHENEVER\
    \ SQLERROR EXIT FAILURE`\n\n`exec dbms_mview.refresh('CWP_COUNTRY_INFO','C');`\n\
    \n`EOF`\n\n```bash\nif [ $? -ne 0 ]; then\n    echo \"not okay\"\n    $MAILX -s\
    \ \"Problem with MV refresh on $HOSTNAME $jobname\" $MAIL_LIST <<EOF\n    $HOSTNAME\
    \ $jobname MVs not okay.\n    EOF\nelse\n    echo \"okay\"\n    $MAILX -s \"MV\
    \ refresh OK on $HOSTNAME $jobname\" $MAIL_LIST <<EOF\n    $HOSTNAME $jobname\
    \ MVs okay.\n    EOF\nfi\n```\n\n`date`\n\n`exit 0`\n\nFor this particular MV\
    \ refresh job, here’s the corresponding cron entry that invokes it:\n\n```\n25\
    \ 16 * * * /orahome/oracle/bin/mvref_cwp.bsh DWREP 1>/orahome/oracle/bin/log/mvref_cwp.log\
    \ 2>&1\n```\n\nThis job runs on a daily basis at 4:25 p.m. For details on using\
    \ cron to schedule jobs, see Chapter 21.\n\n## Creating an MV with a Refresh Interval\n\
    \nWhen you initially create an MV, you have the option of specifying `START WITH`\
    \ and `NEXT` clauses that instruct Oracle to set up an internal database job (via\
    \ the `DBMS_JOB` package) to initiate the refresh of an MV on a periodic basis.\
    \ If you omit `START WITH` and `NEXT`, then no job is set up, and you have to\
    \ use another technique (such as a scheduling utility like cron).\n\nI almost\
    \ never specify `START WITH` and `NEXT` as a refresh mechanism. I strongly prefer\
    \ to use another scheduling utility such as cron. When using cron, it’s easy to\
    \ create a log file that details how the job ran and whether there were any issues.\
    \ Also, when using cron, it’s easy to have the log file e-mailed to a distribution\
    \ list so the support DBAs are aware of any issues.\n\nRegardless, it’s important\
    \ to understand how `START WITH` and `NEXT` work, because sooner or later you’ll\
    \ find yourself in an environment where DBAs or developers prefer to use the `DBMS_JOB`\
    \ package for refreshes. When you’re troubleshooting refresh issues, you must\
    \ understand how this refresh mechanism works.\n\nThe `START WITH` parameter specifies\
    \ the date when you want the first refresh of an MV to occur. The `NEXT` parameter\
    \ specifies a date expression that Oracle uses to calculate the interval between\
    \ refreshes.\n\nFor example, this MV initially refreshes one minute in the future\
    \ (`sysdate+1/1440`) and subsequently refreshes on a daily basis (`sysdate+1`):\n\
    \n```sql\ncreate materialized view inv_mv\nrefresh\n    start with sysdate+1/1440\n\
    \    next sysdate+1\nas\nselect\n    inv_id\n    ,inv_desc\nfrom inv;\n```\n\n\
    You can view details of the scheduled job by querying `USER_JOBS`:\n\n```sql\n\
    select\n    job\n    ,schema_user\n    ,to_char(last_date,'dd-mon-yyyy hh24:mi:ss')\
    \ last_date\n    ,to_char(next_date,'dd-mon-yyyy hh24:mi:ss') next_date\n    ,interval\n\
    \    ,broken\nfrom user_jobs;\n```\n\nHere’s some sample output:\n\n```\nJOB SCHEMA_USE\
    \ LAST_DATE             NEXT_DATE            INTERVAL       B\n------ ----------\
    \ -------------------- -------------------- --------------- -\n50    INV     \
    \   21-oct-2010 15:30:28                     sysdate+1       N\n```\n\nYou can\
    \ also view job information in the `USER_REFRESH` view:\n\n```sql\nselect\n  \
    \  rowner\n    ,rname\n    ,job\n    ,to_char(next_date,'dd-mon-yyyy hh24:mi:ss')\n\
    \    ,interval\n    ,broken\nfrom user_refresh;\n```\n\nHere’s some sample output:\n\
    \n```\nROWNER      RNAME      JOB TO_CHAR(NEXT_DATE,'DD-MON- INTERVAL       B\n\
    ----------- ---------- --- -------------------------- --------------- -\nINV \
    \        INV_MV     50  22-oct-2010 15:30:29       sysdate+1       N\n```\n\n\
    When you drop an MV, the associated job is also removed. If you want to manually\
    \ remove a job, use the `REMOVE` procedure of `DBMS_JOB`. This example removes\
    \ job number 32, which was identified from the previous queries:\n\n```sql\nSQL>\
    \ exec dbms_job.remove(32);\n```\n\n`Note` You can't use `START WITH` or `NEXT`\
    \ in conjunction with an MV that refreshes `ON COMMIT`.\n\n## Efficiently Performing\
    \ a Complete Refresh\n\nWhen an MV does a complete refresh, the default behavior\
    \ is to use a `DELETE` statement to remove all records from the MV table. After\
    \ the delete is finished, records are selected from the master table and inserted\
    \ into the MV table. The delete and insert are done as one transaction; this means\
    \ anybody selecting from the MV during the complete-refresh process sees the data\
    \ as it existed before the `DELETE` statement. Anybody accessing the MV immediately\
    \ after the `INSERT` commits sees a fresh view of the data.\n\nIn some scenarios,\
    \ you may want to modify this behavior. If a large amount of data is being refreshed,\
    \ the `DELETE` statement can take a long time. You have the option of instructing\
    \ Oracle to perform the removal of data as efficiently as possible via the `ATOMIC_REFRESH`\
    \ parameter. When this parameter is set to `FALSE`, it allows Oracle to use a\
    \ `TRUNCATE` statement instead of a `DELETE` when performing a complete refresh:\n\
    \n```sql\nSQL> exec dbms_mview.refresh('INV_MV',method=>'C',atomic_refresh=>false);\n\
    ```\n\n`TRUNCATE` works faster than `DELETE` for large data sets because `TRUNCATE`\
    \ doesn’t have the overhead of generating redo. The disadvantage of using the\
    \ `TRUNCATE` statement is that a user selecting from the MV may see zero rows\
    \ while the refresh is taking place.\n\n## Handling the ORA-12034 Error\n\nWhen\
    \ you attempt to perform a fast refresh of an MV, you may sometimes get the `ORA-12034`\
    \ error. For example:\n\n```sql\nSQL> exec dbms_mview.refresh('PRODUCTLINEITEM','F');\n\
    ```\n\nThe statement subsequently throws this error message:\n\n```\nBEGIN dbms_mview.refresh('PRODUCTLINEITEM','F');\
    \ END;\n*\nERROR at line 1:\nORA-12034: materialized view log on \"CDS_PROD_ES2_LIVE\"\
    .\"PRODUCTLINEITEM\"\nyounger than last refresh\n```\n\nTo resolve this error,\
    \ try to completely refresh the MV:\n\n```sql\nSQL> exec dbms_mview.refresh('PRODUCTLINEITEM','C');\n\
    ```\n\nAfter the complete refresh has finished, you should be able to perform\
    \ a fast refresh without receiving an error:\n\n```sql\nSQL> exec dbms_mview.refresh('PRODUCTLINEITEM','F');\n\
    ```\n\nThe `ORA-12034` error is thrown when Oracle determines that the MV log\
    \ was created after the last refresh took place in the associated MV. In other\
    \ words, the MV log is younger than the last refresh of MV. There are several\
    \ possible causes:\n* The MV log was dropped and re-created.\n* The MV log was\
    \ purged.\n* The master table was reorganized.\n* The master table was truncated.\n\
    * The previous refresh failed.\n\nIn this situation, Oracle knows that transactions\
    \ may have been created between the last refresh time of the MV and when the MV\
    \ log was created. In this scenario, you have to first perform a complete refresh\
    \ before you can start using the fast-refresh mechanism.\n\n## Monitoring Materialized\
    \ View Refreshes\n\nThis section contains some very handy examples of how to monitor\
    \ MV refresh jobs. Examples include how to view the last refresh time, determine\
    \ whether a job is currently executing, determine the progress of a refresh job,\
    \ and checks to see whether MVs haven’t refreshed within the last day. Scripts\
    \ like these are invaluable for troubleshooting and diagnosing refresh problems.\n\
    \n### Viewing Materialized Views’ Last Refresh Times\n\nWhen you’re troubleshooting\
    \ issues with MVs, usually the first item to check is the `LAST_REFRESH_DATE`\
    \ in `DBA/ALL/USER_MVIEWS`. Viewing this information allows you to determine whether\
    \ the MVs are refreshing on schedule. Run this query as the owner of the MV to\
    \ display the last refresh date:\n\n```sql\nselect\n    mview_name\n    ,to_char(last_refresh_date,'dd-mon-yy\
    \ hh24:mi:ss')\n    ,refresh_mode\n    ,refresh_method\nfrom user_mviews\norder\
    \ by 2;\n```\n\nHere’s some sample output:\n\n```\nMVIEW_NAME                \
    \  TO_CHAR(LAST_REFRESH_DAT REFRES REFRESH_\n---------------------------- ------------------------\
    \ ------ --------\nGEM_COMPANY_MV              29-jul-10 06:18:58       DEMAND\
    \ COMPLETE\nTOP_REG_DAILY               29-jul-10 06:57:33       DEMAND FORCE\n\
    ```\n\nThe `LAST_REFRESH_DATE` column of `DBA/ALL/USER_MVIEWS` shows the last\
    \ date and time that an MV successfully finished refreshing. The `LAST_REFRESH_DATE`\
    \ is `NULL` if the MV has never successfully refreshed.\n\n### Determining Whether\
    \ a Refresh Is in Progress\n\nIf you need to know what MVs are running, then use\
    \ this query:\n\n```sql\nselect\n    sid\n    ,serial#\n    ,currmvowner\n   \
    \ ,currmvname\nfrom v$mvrefresh;\n```\n\nHere’s some sample output:\n\n```\nSID\
    \    SERIAL#  CURRMVOWNER          CURRMVNAME\n------ -------- --------------------\
    \ ------------------------------\n1034   47872    REP_MV               USERS_MV\n\
    ```\n\n### Monitoring Real-Time Refresh Progress\n\nIf you deal with large MVs,\
    \ the next query shows you the real-time progress of the refresh operation. When\
    \ you’re troubleshooting issues, this query can be very useful. Run the following\
    \ as the user that has privileges on the internal `SYS` tables:\n\n```sql\ncolumn\
    \ \"MVIEW BEING REFRESHED\" format a25\ncolumn inserts format 9999999\ncolumn\
    \ updates format 9999999\ncolumn deletes format 9999999\n--\nselect\n    currmvowner_knstmvr\
    \ || '.' || currmvname_knstmvr \"MVIEW BEING REFRESHED\",\n    decode(reftype_knstmvr,\
    \ 1, 'FAST', 2, 'COMPLETE', 'UNKNOWN') reftype,\n    decode(groupstate_knstmvr,\
    \ 1, 'SETUP', 2, 'INSTANTIATE',\n           3, 'WRAPUP', 'UNKNOWN' ) STATE,\n\
    \    total_inserts_knstmvr inserts,\n    total_updates_knstmvr updates,\n    total_deletes_knstmvr\
    \ deletes\nfrom x$knstmvr x\nwhere type_knst = 6\nand exists (select 1\n     \
    \       from v$session s\n            where s.sid=x.sid_knst\n            and\
    \ s.serial#=x.serial_knst);\n```\n\nWhen an MV first starts refreshing, you see\
    \ this output:\n\n```\nMVIEW BEING REFRESHED   REFTYPE  STATE      INSERTS   UPDATES\
    \   DELETES\n------------------------- -------- ----------- --------- ---------\
    \ ---------\nREP_MV.USERS_MV         UNKNOWN  SETUP             0         0  \
    \       0\n```\n\nAfter a few seconds, the MV reaches the `INSTANTIATE` state:\n\
    \n```\nREP_MV.USERS_MV         FAST     INSTANTIATE       0         0        \
    \ 0\n```\n\nAs the MV refreshes, the `INSERTS`, `UPDATES`, and `DELETES` columns\
    \ are updated appropriately:\n\n```\nREP_MV.USERS_MV         FAST     INSTANTIATE\
    \     860       274         0\n```\n\nWhen the MV is almost finished refreshing,\
    \ it reaches the `WRAPUP` state:\n\n```\nREP_MV.USERS_MV         FAST     WRAPUP\
    \         5284      1518         0\n```\n\nAfter the MV has completed refreshing,\
    \ the query returns no rows:\n\n```\nno rows selected\n```\n\nAs you can imagine,\
    \ this query can be quite useful for troubleshooting and diagnosing MV refresh\
    \ issues.\n\n### Checking Whether MVs Are Refreshing Within a Time Period\n\n\
    When you’re dealing with MVs, it’s nice to have some sort of automated way of\
    \ determining whether refreshes are occurring. Use the following shell script\
    \ to detect which MVs haven’t refreshed within the last day and then send an e-mail\
    \ if any are detected:\n\n```bash\n#!/bin/bash\n```"
