    Creating a Fast-Refreshable Materialized View


    When you create a fast-refreshable MV, it initially populates the MV table with
    the entire result set of the MV query. After the initial result set is in place,
    only data modified (in the base table) since the last refresh needs to be applied
    to the MV. In other words, any updates, inserts, or deletes from the master table
    that have occurred since the last refresh are copied over. This feature is appropriate
    when you have a small amount of changes to a base table over a period of time
    compared to the total number of rows in the table.


    Here are the steps to implement a fast-refreshable MV:


    1\. Create a base table (if it’s not already created).


    2\. Create an MV log on the base table.


    3\. Create an MV as fast-refreshable.


    This example first creates a base table. In most environments, you already have
    a base table in place. For illustrative purposes, here’s the table-creation script
    and some sample data: create table sales(


    sales_id number


    ,sales_amt number


    ,region_id number


    ,sales_dtt timestamp


    ,constraint sales_pk primary key(sales_id)


    );


    --


    insert into sales values(1,101,100,sysdate-50);


    insert into sales values(2,511,200,sysdate-20);


    insert into sales values(3,11,100,sysdate);


    commit;


    A fast-refreshable MV requires an MV log on the base table. When a fast refresh
    occurs, the MV log must have a unique way to identify which records have been
    modified and thus need to be refreshed.


    You can do this two different approaches. One method is to specify the PRIMARY
    KEY clause when you create the MV log, and the other is to specify the ROWID clause.
    If the underlying base table has a primary key, then use the primary key–based
    MV log. If the underlying base table has no primary key, then you have to create
    the MV log using ROWID. In most cases, you’ll probably have a primary key defined
    for every base table. However, the reality is that some systems are poorly designed
    or have some rare reason for a table not to have a primary key.


    In this example, a primary key is defined on the base table, so you create the
    MV log with the PRIMARY KEY clause:


    SQL> create materialized view log on sales with primary key;


    If there was no primary key defined on the base table, this error is thrown when
    attempting to create the MV log:


    ORA-12014: table does not contain a primary key constraint


    CHAPTER 15 ■ MATERIALIZED VIEWS


    If the base table has no primary key, and you don’t have the option to add one,
    you must specify ROWID when you create the MV log:


    SQL> create materialized view log on sales with rowid;


    Now that you’ve created the MV log, you can create the fast-refreshable MV. There
    are a couple of interesting architectural considerations to point out. If there
    is no MV log on the base table, then Oracle doesn’t allow you to create a fast-refreshable
    MV. This error is thrown: ORA-23413: table does not have a materialized view log.


    Also, when you create the fast-refreshable MV, you must specify whether it’s refreshed
    via the PRIMARY KEY (which is the default) or via the ROWID. This example uses
    a table with a primary key and an MV log created with a primary key. In this example,
    the MV is fast-refreshed via a primary key. When you use a primary key–based fast-refreshable
    MV, the primary-key column(s) of the base table must be part of the fast-refreshable
    MV SELECT statement:


    create materialized view sales_mv


    segment creation immediate


    refresh


    with primary key


    fast


    on demand


    as


    select


    sales_id


    ,sales_amt


    ,sales_dtt


    from sales;


    At this point, it’s useful to inspect the objects that are associated with the
    MV. The following query selects from USER_OBJECTS:


    select


    object_name


    ,object_type


    from user_objects


    where object_name like ''%SALES%''


    order by object_name;


    Here are the objects that have been created:


    OBJECT_NAME OBJECT_TYPE


    -------------------- --------------------


    MLOG$_SALES TABLE


    RUPD$_SALES TABLE


    SALES TABLE


    SALES_MV MATERIALIZED VIEW


    SALES_MV TABLE


    SALES_PK INDEX


    SALES_PK1 INDEX


    CHAPTER 15 ■ MATERIALIZED VIEWS


    Several objects in the previous output require some explanation:


    • MLOG$_SALES


    • RUPD$_SALES


    • SALES_PK1


    First, when an MV log is created, a corresponding table is also created that stores
    the rows in the base table that changed and how they changed (insert, update,
    or delete). The MV log table name is of the format MLOG$_<base table name>.


    A table is also created with the format RUPD$_<base table name>. Oracle automatically
    creates this RUPD$ table when you create a fast-refreshable MV using a primary
    key. It’s there to support the updateable MV feature. You don’t have to worry
    about this table unless you’re dealing with updatable MVs (see the *Oracle Advanced
    Replication Guide* for more details on updatable MVs). If you’re not using the
    updatable MV feature, then you can ignore the RUPD$ table.


    Oracle also creates an index with the format <base table name>_PK1\. This index
    is automatically created for primary key–based MVs and is based on the primary-key
    column(s) of the base table. If this is a ROWID instead of a primary key, then
    the index name has the format I_SNAP$_<table_name> and is based on the ROWID.
    If you don’t explicitly name the primary-key index on the base table, then Oracle
    gives the MV table primary-key index a system-generated name such as SYS_C008780.


