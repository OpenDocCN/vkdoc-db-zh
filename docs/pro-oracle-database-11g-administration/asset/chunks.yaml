    # 第 20 章：Oracle 安全备份


    ## 注意


    如果在为 `SBT_TAPE` 分配或配置 RMAN 通道时没有显式传递介质家族，或者没有为主机和/或数据库定义数据库备份存储选择器，OSB 将使用默认介质家族
    `RMAN-DEFAULT`，该家族在安装 OSB 时创建。


    ## 表 20–4：OSB 介质管理参数


    **参数** | **含义**

    :---|:---

    `OB_MEDIA_FAMILY` | 用于指定定义磁带卷特性的介质家族。

    `OB_DEVICE` | 用于指定备份期间要使用的磁带驱动器。

    `OB_RESOURCE_WAIT_TIME` | 用于指定等待资源变为可用的时间。

    `OB_ENCRYPTION` | 用于指定 OSB 加密。如果设置了此项，则 OSB 不会执行进一步的加密。

    `OB_RESTORE_DEVICE` | 用于指定还原期间要使用的磁带驱动器。


    ## 数据库还原


    对于 RMAN 还原和恢复，您必须为 `SBT_TAPE` 分配一个 RMAN 通道。在以下示例中，`SBT_TAPE` 的 RMAN 通道在 `run{}`
    块内分配：


    ```

    RMAN> run {

    allocate channel t1 type sbt_tape;

    restore database;

    recover database;

    }

    ```


    另一种选择是运行 `CONFIGURE` 命令。与前面的示例不同，您必须在 `CONFIGURE` 命令中包含 `PARMS` 子句（如果不使用 `PARMS`
    子句，将返回语法错误）：


    ```

    RMAN> configure channel device type sbt_tape parms ''ENV=(OB_MEDIA_FAMILY=APRESS_RMAN)'';

    RMAN> restore device type sbt_tape database;

    RMAN> recover device type sbt_tape database;

    ```


    假设您遇到这样一种情况：生产服务器因灾难性事件完全损毁，但幸运的是您有数据库的异地磁带备份。此外，您没有使用 RMAN 恢复目录，并且控制文件自动备份已禁用。您发现最新的控制文件备份已损坏，但可以从两天前的备份中还原控制文件。挂载数据库后，您意识到在执行
    `RMAN LIST BACKUP` 命令时，昨天进行的最新 RMAN 备份不在列表中（因为还原的控制文件来自两天前，不知道昨天的 RMAN 备份）。


    在这种情况下，从两天前的备份还原的控制文件没有关于昨天在磁带上创建的备份片的信息。要使 RMAN 存储库（在此场景中是控制文件）知晓磁带上的备份片，请执行以下操作：


    1.  为磁带配置一个通道。

    2.  通过 `CATALOG` 命令使 RMAN 存储库知晓备份片。


    接下来，发出 `CATALOG DEVICE TYPE SBT_TAPE BACKUPPIECE` 命令，后跟备份片的名称。在此示例中，编录了一个备份片：


    ```

    RMAN> catalog device type sbt_tape backuppiece ''silr06fk_1_1'';

    ```


    如果您有多个要编录的备份片，必须为每个单独的备份片发出 `CATALOG DEVICE TYPE SBT_TAPE BACKUPPIECE` 命令。在磁带上编录
    RMAN 备份片的关键是您必须知道备份片的确切名称。


    ## 注意


    如第 19 章所述，对于基于磁盘的备份，您可以通过 `CATALOG START WITH <directory>` 命令轻松地使 RMAN 存储库知晓多个备份片。但是，此技术仅适用于基于磁盘的备份，不适用于磁带备份。


    如果您不知道备份片的名称怎么办？一种找出它们名称的方法是查看 RMAN 备份期间生成的 RMAN 日志文件。在此处显示的 RMAN 日志文件片段中，RMAN
    备份片是 `silr06fk_1_1`：


    ```

    channel ORA_SBT_TAPE_1: finished piece 1 at 21-OCT-2010 08:29:35

    piece handle=silr06fk_1_1 tag=TAG20101021T082105 comment=API Version 2.0,MMS Version
    10.3.0.2

    channel ORA_SBT_TAPE_1: backup set complete, elapsed time: 00:08:26

    ```

