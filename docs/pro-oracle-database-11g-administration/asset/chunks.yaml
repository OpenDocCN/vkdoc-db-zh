- fmt: "# CHAPTER 18 RMAN BACKUPS AND REPORTING\n\n## Table 18–1. Description of RMAN\
    \ Backup Data Dictionary Views\n\n| View Name | Information Regarding |\n| :---\
    \ | :--- |\n| `V$RMAN_BACKUP_JOB_DETAILS` | RMAN backup jobs. |\n| `V$BACKUP`\
    \ | Backup status of online datafiles. |\n| `V$BACKUP_ARCHIVELOG_DETAILS` | Archive\
    \ logs backed up. |\n| `V$BACKUP_CONTROLFILE_DETAILS` | Control files backed up.\
    \ |\n| `V$BACKUP_COPY_DETAILS` | Control file and datafile copies. |\n| `V$BACKUP_DATAFILE`\
    \ | Control files and datafiles backups. |\n| `V$BACKUP_DATAFILE_DETAILS` | Datafiles\
    \ backed up in backup sets, image copies, and proxy copies. |\n| `V$BACKUP_FILES`\
    \ | Datafiles, control files, spfiles, and archive redo logs backed up. |\n| `V$BACKUP_PIECE`\
    \ | Backup piece files. |\n| `V$BACKUP_PIECE_DETAILS` | Backup piece detailed\
    \ information. |\n| `V$BACKUP_SET` | Backup sets. |\n| `V$BACKUP_SET_DETAILS`\
    \ | Backup set detailed information. |\n\nSometimes DBAs new to RMAN have a hard\
    \ time grasping the concept of backups, backup sets, backup pieces, datafiles,\
    \ and how those concepts relate. I find the following query useful when discussing\
    \ RMAN backup components. This query will display backup sets, the backup pieces\
    \ within the set, and the datafiles that are backed up within the backup piece:\n\
    \n```sql\nSET LINES 132 PAGESIZE 100\nBREAK ON REPORT ON bs_key ON completion_time\
    \ ON bp_name ON file_name\nCOL bs_key FORM 99999 HEAD \"BS Key\"\nCOL bp_name\
    \ FORM a40 HEAD \"BP Name\"\nCOL file_name FORM a40 HEAD \"Datafile\"\n--\nSELECT\n\
    \    s.recid bs_key\n    ,TRUNC(s.completion_time) completion_time\n    ,p.handle\
    \ bp_name\n    ,f.name file_name\nFROM v$backup_set s\n    ,v$backup_piece p\n\
    \    ,v$backup_datafile d\n    ,v$datafile f\nWHERE p.set_stamp = s.set_stamp\n\
    AND p.set_count = s.set_count\nAND d.set_stamp = s.set_stamp\nAND d.set_count\
    \ = s.set_count\nAND d.file# = f.file#\nORDER BY\n    s.recid\n    ,p.handle\n\
    \    ,f.name;\n```\n\nThe output here has been shortened to fit on the page:\n\
    \n```\nBS Key COMPLET BP Name                                          Datafile\n\
    ------ ------- ------------------------------------------------ -----------------------------------------\n\
    \   414 14-SEP /ora01/O11R2/rman/r1j_1_1.bk                     /ora01/dbfile/O11R2/mvindex01.dbf\n\
    \                                                              /ora01/dbfile/O11R2/sysaux01.dbf\n\
    \                                                              /ora01/dbfile/O11R2/system01.dbf\n\
    \                                                              /ora02/dbfile/O11R2/users01.dbf\n\
    ```\n\nSometimes it's useful to report on the performance of RMAN backups. The\
    \ following query reports on the time taken for an RMAN backup per session.\n\n\
    ```sql\nCOL hours FORM 9999.99\nCOL time_taken_display FORM a20\nSET LINESIZE\
    \ 132\n--\nSELECT\n    session_recid\n    ,compression_ratio\n    ,time_taken_display\n\
    \    ,(end_time - start_time) * 24 as hours\n    ,TO_CHAR(end_time,'dd-mon-yy\
    \ hh24:mi') as end_time\nFROM v$rman_backup_job_details\nORDER BY end_time;\n\
    ```\n\nHere is some sample output:\n\n```\nSESSION_RECID COMPRESSION_RATIO TIME_TAKEN_DISPLAY\
    \      HOURS END_TIME\n------------- ----------------- -------------------- -------\
    \ -----------------\n         7509        4.55050595 03:20:48                3.35\
    \ 04-sep-10 19:23\n         7515        4.51185084 03:23:04                3.38\
    \ 05-sep-10 19:25\n         7521        4.43947443 03:31:48                3.53\
    \ 06-sep-10 19:34\n         7527        4.35619748 03:45:03                3.75\
    \ 07-sep-10 19:47\n         7533        4.2773889  04:20:04                4.33\
    \ 08-sep-10 20:23\n         7547        4.51488    03:22:21                3.37\
    \ 09-sep-10 19:24\n         7554        4.49303627 03:28:06                3.47\
    \ 10-sep-10 19:31\n         7561        4.51925905 03:17:00                3.28\
    \ 11-sep-10 19:19\n         7568        4.54671383 03:14:03                3.23\
    \ 12-sep-10 19:16\n         7575        4.52995677 03:17:07                3.29\
    \ 13-sep-10 19:19\n```\n\nThe contents of `V$RMAN_BACKUP_JOB_DETAILS` are summarized\
    \ by a session connection to RMAN. Therefore, the report output is more accurate\
    \ if you connect to RMAN (establishing a session) and then exit out of RMAN after\
    \ the backup job is complete. If you remain connected to RMAN while running multiple\
    \ backup jobs, the query output reports on all backup activity while connected\
    \ (for that session).\n\nYou should have an automated method of detecting whether\
    \ or not RMAN backups are running and if datafiles are being backed up. One reliable\
    \ method of automating such a task is to embed SQL into a shell script and then\
    \ run the script on a periodic basis from a scheduling utility such as `cron`.\n\
    \nI typically run two basic types of checks regarding the RMAN backups:\n* Have\
    \ the RMAN backups run recently?\n* Are there any datafiles that have not been\
    \ backed up recently?\n\nThe following shell script checks for the conditions\
    \ listed above. You'll need to modify the script and provide it with a username\
    \ and password for a user that can query the data dictionary objects referenced\
    \ in the script (in this script the username/password is `darl/foobar`). When\
    \ running the script, you’ll need to pass in two variables: the Oracle SID and\
    \ the threshold number of days that you want to check in the past for the last\
    \ time the backups ran or when a datafile was backed up.\n\n```bash\n#!/bin/bash\n\
    #\nif [ $# -ne 2 ]; then\n    echo \"Usage: $0 SID threshold\"\n    exit 1\nfi\n\
    ```"
