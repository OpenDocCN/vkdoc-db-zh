    \                              OPERATION STATUS\n------------ -------------------------------------\
    \ --------- ----------\nRMAN_BACKUP  21–OCT-10 02.13.41.196695 PM -06:00  RUN\
    \       SUCCEEDED\n```\n\n## 修改作业日志记录历史\n\n默认情况下，Oracle 调度器保留 30 天的日志历史记录。你可以通过\
    \ `SET_SCHEDULER_ATTRIBUTE` 过程来修改默认的保留期限。例如，这会将默认天数更改为 15 天：\n"
- fmt: "# CHAPTER 21 ■ AUTOMATING JOBS\n\nSQL> exec `dbms_scheduler.set_scheduler_attribute('log_history',15);`\n\
    To completely remove the contents of the log history, use the `PURGE_LOG` procedure:\n\
    SQL> exec `dbms_scheduler.purge_log();`\n\n## Modifying a Job\n\nYou can modify\
    \ various attributes of a job via the `SET_ATTRIBUTE` procedure. This example\
    \ modifies the `RMAN_BACKUP` job to run weekly on Monday:\n\n```\nBEGIN\n  dbms_scheduler.set_attribute(\n\
    \    name=>'RMAN_BACKUP'\n    ,attribute=>'repeat_interval'\n    ,value=>'freq=weekly;\
    \ byday=mon');\nEND;\n/\n```\n\nFor this particular example, you can verify the\
    \ change by selecting the `REPEAT_INTERVAL` column from `DBA_SCHEDULER_JOBS`.\
    \ The following is the output from running query from the prior section of Viewing\
    \ Job Details:\n\n```\nJOB_NAME    LAST_START_DATE          LAST_RUN_DURATION\
    \       NEXT_RUN_DATE           REPEAT_INTERVAL\n----------- -----------------------\
    \ ----------------------- ----------------------- -----------------\nRMAN_BACKUP\
    \ 21-OCT-10 02.12.59.257 +000000000 00:00:41.93 25-OCT-10 12.00.00.000 freq=weekly;\
    \ byday=mon\n            06:00 PM - 06:00        3385 PM - 06:00         AM -\
    \ 06:00\n```\n\nFrom the prior output, the job will run on the next Monday, and\
    \ since there was no `BYHOUR` and `BYMINUTE` options specified (when modifying\
    \ the job), it is now scheduled to run at the default time of 12:00 a.m.\n\n##\
    \ Stopping a Job\n\nIf you have a job that has been running for an abnormally\
    \ long time, you may want to abort it. Use the `STOP_JOB` procedure to stop a\
    \ currently running job. This example stops the `RMAN_BACKUP` job while it is\
    \ running:\n\nSQL> exec `dbms_scheduler.stop_job(job_name=>'RMAN_BACKUP');`\n\n\
    The `STATUS` column of `DBA_SCHEDULER_JOB_LOG` will show `STOPPED` for jobs stopped\
    \ using the `STOP_JOB` procedure.\n\n## Disabling a Job\n\nYou may want to temporarily\
    \ disable a job because it's not running correctly. You want to ensure that the\
    \ job does not run while you're troubleshooting the issue. Use the `DISABLE` procedure\
    \ to disable a job:\nSQL> exec `dbms_scheduler.disable('RMAN_BACKUP');`\n\nIf\
    \ the job is currently running, consider stopping the job first or using the `FORCE`\
    \ option of the `DISABLE` procedure:\nSQL> exec `dbms_scheduler.disable(name=>'RMAN_BACKUP',force=>true);`\n\
    \n## Enabling a Job\n\nYou can enable a previously disabled job via the `ENABLE`\
    \ procedure of the `DBMS_SCHEDULER` package. This example re-enables the `RMAN_BACKUP`\
    \ job:\nSQL> exec `dbms_scheduler.enable(name=>'RMAN_BACKUP');`\n\n> **Tip** You\
    \ can check to see if a job has been disabled or enabled by selecting the `ENABLED`\
    \ column from `DBA_SCHEDULER_JOBS`.\n\n## Copying a Job\n\nIf you have a current\
    \ job that you want to clone, you can use the `COPY_JOB` procedure to accomplish\
    \ this. This procedure takes two arguments: the old job name and the new job name.\
    \ Here's an example of copying a job where `RMAN_BACKUP` is a previously created\
    \ job and `RMAN_NEW_BACK` is the new job that will be created:\n\n```\nbegin\n\
    \  dbms_scheduler.copy_job('RMAN_BACKUP','RMAN_NEW_BACK');\nend;\n/\n```\n\nThe\
    \ copied job will be created but not enabled. You must enable the job first (see\
    \ the prior section in this chapter) before it will run.\n\n## Running a Job Manually\n\
    \nYou can manually run a job outside of its regular schedule. You might want to\
    \ do this to test the job to ensure that it's working correctly. Use the `RUN_JOB`\
    \ procedure to manually initiate a job. This example manually runs the previously\
    \ created `RMAN_BACKUP` job:\n\n```\nBEGIN\n  DBMS_SCHEDULER.RUN_JOB(\n    JOB_NAME\
    \ => 'RMAN_BACKUP',\n    USE_CURRENT_SESSION => FALSE);\nEND;\n/\n```\n\nThe `USE_CURRENT_SESSION`\
    \ parameter instructs Oracle Scheduler to run the job as the current user (or\
    \ not). A value of `FALSE` means run the job as the user it would run as when\
    \ regularly scheduled (asynchronously).\n\n## Deleting a Job\n\nIf you no longer\
    \ require a job, you should delete it from the scheduler. Use the `DROP_JOB` procedure\
    \ to permanently remove a job. This example removes the `RMAN_BACKUP` job:\n\n\
    ```\nBEGIN\n  dbms_scheduler.drop_job(job_name=>'RMAN_BACKUP');\nEND;\n/\n```\n\
    \nThe code will drop the job and remove any information regarding the dropped\
    \ job from the `DBA_SCHEDULER_JOBS` view.\n\n## Oracle Scheduler versus cron\n\
    \nDBAs often debate whether they should use Oracle Scheduler or the Linux/Unix\
    \ `cron` utility for scheduling and automating tasks. The benefits that Oracle\
    \ Scheduler has over `cron` include the following:\n\n- Can make the execution\
    \ of a job dependent on the completion of another job\n- Robust resource balancing\
    \ and flexible scheduling features\n- Can run jobs based on a database event\n\
    - The Oracle Scheduler `DBMS_SCHEDULER` PL/SQL package syntax works the same regardless\
