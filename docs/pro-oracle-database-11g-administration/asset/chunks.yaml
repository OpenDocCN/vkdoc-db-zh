    Another way you can relocate all datafiles in a database is to re-create the control
    file with the CREATE CONTROLFILE statement. The steps for this operation are as
    follows: 1\. Create trace file that contains a CREATE CONTROLFILE statement.


    2\. Locate the trace file that contains the CREATE CONTROLFILE statement.


    3\. Modify the trace file to display the new location of the datafiles.


    4\. Shut down the database.


    5\. Physically move the datafiles using an operating system command.


    6\. Start the database in nomount mode.


    7\. Run the CREATE CONTROLFILE command.


    ■ **Note** When you re-create a control file, be aware that any Oracle Recovery
    Manager (RMAN) information that was contained in the control file will be lost.
    If you’re not using a recovery catalog, you can repopulate the control file with
    RMAN backup information using the RMAN CATALOG command.


    The following example walks through the previous steps. First, you write a CREATE
    CONTROLFILE


    statement to a trace file via an ALTER DATABASE BACKUP CONTROLFILE TO TRACE statement:
    87


