    NOMOUNT statement instantiates the background processes and memory areas used
    by Oracle. At this point, you have an Oracle instance, but you have no database.


    ■ **Note** An Oracle instance is defined to be the background processes and memory
    areas. The Oracle database is defined to be the physical files on disk.


    Listed next is a typical Oracle CREATE DATABASE statement:


