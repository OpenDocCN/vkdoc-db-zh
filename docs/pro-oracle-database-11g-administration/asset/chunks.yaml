- fmt: '# 第17章 ■ 配置RMAN


    ## 14. 配置归档重做日志的删除策略

    取决于您的数据库和业务策略要求。在许多场景下，将备份保留策略应用于归档重做日志就足够了（这是默认行为）。


    **决策点**


    **建议**


    ## 15. 设置并行度

    取决于可用的硬件资源和业务需求。对于大多数具有多个CPU的生产服务器，我将并行度配置为2或更高。


    ## 16. 使用备份集还是映像副本

    我倾向于使用备份集。备份集通常更小，也更容易管理。


    ## 17. 使用增量备份

    对于大型数据库，如果在两次备份之间只有很小比例的数据库发生更改，并且您希望节省磁盘空间，则使用增量备份。


    ## 18. 使用增量更新的备份

    如果您需要数据文件的映像副本，请使用此方法。


    ## 19. 使用块更改跟踪

    使用此功能以提高增量备份的性能。


    ## 20. 配置二进制压缩

    取决于您的业务要求。压缩备份占用的空间更少，但备份和还原操作需要更多的CPU资源（和时间）。


    ## 21. 配置加密

    取决于您的业务要求。


    ## 22. 配置其他设置

    您可以设置许多与通道相关的属性，例如备份集大小和备份片大小。根据需要进行配置。


    ## 1. 远程或本地运行RMAN客户端

    可以从远程服务器运行`rman`工具，并通过Oracle Net连接到目标数据库：

    ```

    $ rman target sys/foo@remote_db

    ```

    这使您可以从一个中心位置在不同的远程服务器上运行RMAN备份。当远程运行RMAN时，备份文件总是在目标数据库服务器上创建。


    只要可能，我会在目标服务器上本地运行`rman`客户端并这样连接：

    ```

    $ rman target /

    ```

    此方法简单且足以满足大多数需求。您不必担心网络问题或密码文件问题，并且`rman`客户端和目标数据库之间永远不会存在兼容性问题。如果远程运行RMAN，则需要确保远程的`rman`可执行文件与目标数据库兼容。例如，您运行的远程`rman`可执行文件是Oracle
    Database 10*g*版本的RMAN客户端，是否可以将该客户端连接到远程的Oracle Database 8*i*目标数据库？如果在目标服务器上本地运行`rman`客户端，则永远不会出现兼容性问题，因为`rman`客户端始终与目标数据库版本相同。


    ## 2. 指定备份用户

    如前一节所述，RMAN要求您使用具有`SYSDBA`权限的数据库用户。

    无论我是从命令行运行RMAN还是在脚本中调用RMAN，在大多数场景中，我都会直接以`SYS`身份连接到目标数据库。例如，以下是我如何从命令行连接到RMAN：

    ```

    $ rman target /

    ```

    一些DBA不使用这种方法；他们更喜欢设置一个独立于`SYS`的用户，并以安全顾虑为由这样做。

    我更喜欢直接使用`SYS`账户，因为在服务器上本地连接到RMAN时，无需指定用户名和密码。这意味着您永远不必将用户名和密码硬编码到任何备份脚本中，也不必在命令行上指定可能被不良开发人员或旁观的经理看到的用户名和密码。


    ## 3. 使用联机或脱机备份

    大多数生产数据库都有24x7的可用性要求。因此，您唯一的选择是在线RMAN备份。您的数据库必须处于归档日志模式才能进行在线备份。您需要仔细考虑将归档重做日志放在何处、如何格式化它们、备份频率以及在删除前保留多长时间。这些主题将在后续章节中讨论。'
  raw: 'requirements. For many environments, I use a


    backup-retention redundancy of 1 or 2.


    14\. Configuring the archive-redo logs’ deletion


    Depends on your database and business


    policy


    requirements. In many scenarios, applying the


    backup-retention policy to the archive-redo logs is


    sufficient (this is the default behavior).


    CHAPTER 17 ■ CONFIGURING RMAN


    **Decision Point**


    **Recommendation**


    15\. Setting the degree of parallelism


    Depends on the available hardware resources and


    business requirements. For most production


    servers, where there are multiple CPUs, I configure


    a degree of parallelism of 2 or more.


    16\. Using backup sets or image copies


    I prefer backup sets. Backup sets are usually


    smaller and easier to manage.


    17\. Using incremental backups


    Use incremental backups for large databases


    where a small percentage of the database changes


    between backups and where you want to conserve


    on disk space.


    18\. Using incrementally updated backups


    Use this approach if you require image copies of


    datafiles.


    19\. Using block-change tracking


    Use this to improve the performance of


    incremental backups.


    20\. Configuring binary compression


    Depends on your business requirements.


    Compressed backups consume less space but


    require more CPU resources (and time) for backup


    and restore operations.


    21\. Configuring encryption


    Depends on your business requirements.


    22\. Configuring miscellaneous settings


    You can set many channel-related properties, such


    as the backup-set size and the backup-piece size.


    Configure as needed.


    1\. Running the RMAN Client Remotely or Locally


    It’s possible to run the rman utility from a remote server and connect to a target
    database via Oracle Net: $ rman target sys/foo@remote_db


    This allows you to run RMAN backups on disparate remote servers from one central
    location. When you run RMAN remotely, the backup files are always created on the
    target database server.


    Whenever possible, I run the rman client locally on the target server and connect
    like this: $ rman target /


    This approach is simple and adequate for most requirements. You don’t have to
    worry about network issues or password files, and there are never compatibility
    issues with the rman client and the target database. If you run RMAN remotely,
    you need to be sure the remote rman executable is compatible with the target database.
    For example, is the remote rman executable you’re running an Oracle Database 10
    *g* version of the RMAN client, and is it possible to connect that client to a
    remote Oracle Database 8 *i* target database? If you run the rman client locally
    on the target server, there never is a compatibility issue because the rman client
    is always the same version as the target database.


    CHAPTER 17 ■ CONFIGURING RMAN


    2\. Specifying the Backup User


    As described in the previous section, RMAN requires that you use a database user
    with SYSDBA privileges.


    Whether I’m running RMAN from the command line or invoking RMAN in a script, in
    most scenarios, I connect directly as SYS to the target database. For example,
    here’s how I connect to RMAN from the command line:


    $ rman target /


    Some DBAs don’t use that approach; they prefer to set up a separate user from
    SYS and cite security concerns as a reason for doing this.


    I prefer to use the SYS account directly because when connecting to RMAN locally
    on the server, there is no need to specify a username and password. This means
    you never have to hard-code usernames and passwords into any backup scripts or
    specify a username and password on the command line that can be viewed by rogue
    developers or managers looking over your shoulder.


    3\. Using Online or Offline Backups


    Most production databases have 24x7 availability requirements. Therefore, your
    only option is online RMAN backups. Your database must be in archivelog mode for
    online backups. You need to carefully consider where to place archive-redo logs,
    how to format them, how often to back them up, and how long to retain them before
    deletion. These topics are discussed in subsequent sections.'
  trans: '# 第 17 章 ■ 配置 RMAN


    ## 14. 配置归档重做日志的删除策略

    这取决于您的数据库和业务策略要求。在许多场景下，将备份保留策略应用于归档重做日志就足够了（这是默认行为）。


    **决策点**


    **建议**


    ## 15. 设置并行度

    取决于可用的硬件资源和业务需求。对于大多数具有多个 CPU 的生产服务器，我将并行度配置为 2 或更高。


    ## 16. 使用备份集还是映像副本

    我倾向于使用备份集。备份集通常更小，也更容易管理。


    ## 17. 使用增量备份

    对于大型数据库，如果在两次备份之间只有很小比例的数据库发生更改，并且您希望节省磁盘空间，则使用增量备份。


    ## 18. 使用增量更新的备份

    如果您需要数据文件的映像副本，请使用此方法。


    ## 19. 使用块更改跟踪

    使用此功能以提高增量备份的性能。


    ## 20. 配置二进制压缩

    取决于您的业务要求。压缩备份占用的空间更少，但备份和还原操作需要更多的 CPU 资源（和时间）。


    ## 21. 配置加密

    取决于您的业务要求。


    ## 22. 配置其他设置

    您可以设置许多与通道相关的属性，例如备份集大小和备份片大小。根据需要进行配置。


    ## 1. 远程或本地运行 RMAN 客户端

    可以从远程服务器运行`rman`工具，并通过 Oracle Net 连接到目标数据库：

    ```

    $ rman target sys/foo@remote_db

    ```

    这使您可以从一个中心位置在不同的远程服务器上运行 RMAN 备份。当远程运行 RMAN 时，备份文件总是在目标数据库服务器上创建。


    只要可能，我会在目标服务器上本地运行`rman`客户端并这样连接：

    ```

    $ rman target /

    ```

    此方法简单且足以满足大多数需求。您不必担心网络问题或密码文件问题，并且`rman`客户端和目标数据库之间永远不会存在兼容性问题。如果远程运行 RMAN，则需要确保远程的`rman`可执行文件与目标数据库兼容。例如，您运行的远程`rman`可执行文件是
    Oracle Database 10*g*版本的 RMAN 客户端，是否可以将该客户端连接到远程的 Oracle Database 8*i*目标数据库？如果在目标服务器上本地运行`rman`客户端，则永远不会出现兼容性问题，因为`rman`客户端始终与目标数据库版本相同。


    ## 2. 指定备份用户

    如前一节所述，RMAN 要求您使用具有`SYSDBA`权限的数据库用户。

    无论我是从命令行运行 RMAN 还是在脚本中调用 RMAN，在大多数场景中，我都会直接以`SYS`身份连接到目标数据库。例如，以下是我如何从命令行连接到 RMAN：

    ```

    $ rman target /

    ```

    一些 DBA 不使用这种方法；他们更喜欢设置一个独立于`SYS`的用户，并以安全顾虑为由这样做。

    我更喜欢直接使用`SYS`账户，因为在服务器上本地连接到 RMAN 时，无需指定用户名和密码。这意味着您永远不必将用户名和密码硬编码到任何备份脚本中，也不必在命令行上指定可能被不良开发人员或旁观的经理看到的用户名和密码。


    ## 3. 使用联机或脱机备份

    大多数生产数据库都有 24x7 的可用性要求。因此，您唯一的选择是在线 RMAN 备份。您的数据库必须处于归档日志模式才能进行在线备份。您需要仔细考虑将归档重做日志放在何处、如何格式化它们、备份频率以及在删除前保留多长时间。这些主题将在后续章节中讨论。'
- fmt: '# CHAPTER 17 CONFIGURING RMAN


    `Note` If you make offline backups, you must shut down your database with `IMMEDIATE`,
    `NORMAL`, or `TRANSACTIONAL` and then place it in `mount mode`. `RMAN` needs the
    database in `mount mode` so it can read from and write to the `control file`.


    ## 4. Setting the Archive-Redo Log Destination and File Format


    Enabling `archive-redo log` mode is a prerequisite for making online backups.
    See Chapter 16 for a full discussion of architectural decisions regarding the
    `archive-redo log` destination and format and how to enable/disable `archivelog`
    mode.


    When `archivelog` mode is enabled, `Oracle` writes the `archive-redo logs` to
    one or more of the following locations (you can configure `archive-redo logs`
    to be written both to the `FRA` and several other locations that you manually
    set via initialization parameters):


    - Default location

    - `FRA`

    - Location specified via `LOG_ARCHIVE_DEST_N` initialization parameter(s)


    If you don’t use an `FRA` and if you don’t explicitly set the `archive-redo log`
    destination via a `LOG_ARCHIVE_DEST_N` initialization parameter, then by default
    the `archive-redo logs` are written to an `OS`-dependent location. On many `Linux/Unix`
    boxes, the default location is the `ORACLE_HOME/dbs/arch` directory. The default
    filename format for `archive-redo logs` is `%t_%s_%r.dbf`.


    If you enable an `FRA`, then by default the `archive-redo logs` are written to
    a directory in the `FRA`. The default format of the name of `archive-redo log`
    files created in the `FRA` is an `Oracle Managed File` format. For example: `/<fra>/<db_name>/archivelog/<YYYY_MM_DD>/o1_mf_1_1078_68dx5dyj_.arc`


    `Oracle` recommends using an `FRA`. I prefer not to use an `FRA` because I don’t
    like to be surprised with a hung database when there are issues with the `FRA`
    filling up and not being purged of old files quickly enough. Instead, I prefer
    to use the `LOG_ARCHIVE_DEST_N` parameter to set the location of the `archive-redo
    log` files. Here’s an example: `log_archive_dest_1=''LOCATION=/oraarch1/CHNPRD''`


    I also prefer to use this for the default `archivelog` file name format: `log_archive_format=''%t_%s_%r.arc''`


    Sometimes `DBAs` use `.dbf` as an extension for both datafiles and `archive-redo
    log` files. This format avoids potential confusion with identifying a file as
    an `archive-redo log` file or a live database datafile.


    ## 5. Configuring the RMAN Backup Location and File Format


    When you run a `BACKUP` command for disk-based backups, `RMAN` creates backup
    pieces in one of the following locations:


    - Default location

    - `FRA`

    - Location specified via the `BACKUP` or `FORMAT` command


    If you don’t configure any `RMAN` variables and don’t set up an `FRA`, by default
    `RMAN` allocates one disk-based channel and writes the backup files to a default
    location. For example, you can run the following command without configuring any
    `RMAN` parameters:


    ```

    RMAN> backup database;

    ```


    If nothing has been configured, `RMAN` allocates a disk-based channel and writes
    the backups to the default disk location. This location varies by `OS`. In many
    `Linux/Unix` environments, the default location is `ORACLE_HOME/dbs`. The default
    format of the name of the backup files created is an `Oracle Managed File` format.
    For example: `<ORACLE_HOME>/dbs/01ln9g7e_1_1`


    When backing up to disk, if you don’t explicitly instruct `RMAN` to write the
    backups to a specific location (via the `FORMAT` or `CONFIGURE` command), and
    if you’re using an `FRA`, `RMAN` automatically writes the backup files to directories
    in the `FRA`. The default format of the name of the backup files created in the
    `FRA` is an `Oracle Managed File` format. For example: `/<fra>/<db_name>/backupset/<YYYY_MM_DD>/o1_mf_nnndf_TAG20100907T025402_68czfbdf_.bkp`


    I usually don’t use an `FRA` for the placement of `RMAN` backups. In many of the
    environments I work in, there isn’t enough disk space on a single mount point
    to accommodate the entire size of the database backups. In such situations, you
    need to allocate two or more channels that point to different mount points. Using
    an `FRA` in these environments is somewhat unwieldy.


    Also, for performance reasons, you may want to instruct `RMAN` to write to multiple
    disk locations. If you can ensure that different mount points are based on different
    physical disks and are written to by separate controllers, you can reduce `I/O`
    contention by allocating multiple channels pointing to separate mount points.


    When you’re using an `FRA`, `RMAN` automatically creates separate directories
    when backing up a database for the first time on a given date. I prefer to have
    the backups written to one directory and not separate the directories and backups
    by date. I find it easier to manage, maintain, and troubleshoot the backups if
    I use one standard directory for each database on each server.


    If you don’t want to place `RMAN` backup files in the `FRA`, there are a couple
    of methods for directly specifying a backup location:


    - `BACKUP...FORMAT`

    - `CONFIGURE CHANNEL...FORMAT`


    You can directly specify where you want backups to be placed when you issue the
    `BACKUP` command. For example:


    ```

    RMAN> backup database format ''/ora01/O11R2/rman/rman_%U.bkp'';

    ```


    Here’s a corresponding file generated by `RMAN`: `/ora01/O11R2/rman/rman_05ln9hk6_1_1.bkp`


    The `%U` instructs `RMAN` to dynamically construct a unique string for the backup
    file name. A unique name is required in most situations, because `RMAN` won’t
    write over the top of a file that already exists.


    This is important because if you instruct `RMAN` to write in parallel, it needs
    to create unique file names for each channel. For example:


    ```

    RMAN> configure device type disk parallelism 2;

    ```


    Now, when you run this command, `RMAN` allocates multiple channels and write in
    parallel to two different backup files. The `U%` in the format string guarantees
    that unique file names are created.


    I usually don’t use the `BACKUP...FORMAT` syntax to specify the location for `RMAN`
    backups. I prefer to use the `CONFIGURE CHANNEL...FORMAT` command. This is because
    I’m usually writing to multiple disk locations and need the flexibility to specify
    directories located on different mount points. Here’s a typical configuration
    specifying `CONFIGURE CHANNEL...FORMAT`:


    ```

    RMAN> configure device type disk parallelism 3;

    RMAN> configure channel 1 device type disk format ''/ora01/O11R2/rman/rman1_%U.bk'';

    RMAN> configure channel 2 device type disk format ''/ora02/O11R2/rman/rman2_%U.bk'';

    RMAN> configure channel 3 device type disk format ''/ora03/O11R2/rman/rman3_%U.bk'';

    ```


    In these lines of code, you should configure the device-type parallelism degree
    to match the number of channels that you allocated. `RMAN` only allocates the
    number of channels as specified by the degree of parallelism; other configured
    channels are ignored. For example, if you specify a degree of parallelism of 2,
    `RMAN` allocates only two channels regardless of the number of channels you configured
    via the `CONFIGURE CHANNEL` command.


    In this example of configuring channels, suppose the `BACKUP` command is issued
    like this: `RMAN> backup database;`


    `RMAN` allocates three channels, all on separate mount points (`/ora01`, `/ora02`,
    `/ora03`), and writes in parallel to the specified locations. `RMAN` creates as
    many backup pieces in the three locations as it deems necessary to create a backup
    of the database.


    ## 6. Setting Autobackup of the Control File


    You should always configure `RMAN` to automatically back up the `control file`
    after running any `RMAN BACKUP` or `COPY` command or after you make physical changes
    to the database that result in updates to the `control file` (such as adding/removing
    a datafile). Use the `SHOW` command to display the current setting of the `control
    file` autobackup:


    ```

    RMAN> show controlfile autobackup;

    ```


    Here’s some sample output:


    ```

    RMAN configuration parameters for database with db_unique_name O11R2 are:

    CONFIGURE CONTROLFILE AUTOBACKUP OFF;

    ```


    The following line of code shows how to enable automatic backup of the `control-file`
    feature: `RMAN> configure controlfile autobackup on;`'
