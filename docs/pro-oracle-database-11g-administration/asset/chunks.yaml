    Redirecting cron Output


    Whenever you run a Linux shell command, by default the standard output (of the
    command) will be displayed on your screen. Also, if any error messages are generated,
    they will by default be displayed on your terminal. You can use either > or 1>
    (they are synonymous) to redirect any standard output to an operating system file.
    Additionally, you can use 2> redirect any error messages to a file. The notation
    of 2>&1 instructs the shell to send any error messages to the same location as
    standard output.


    When you create a cron job, you can use these redirection features to send the
    output of a shell script to a log file. For example, in the following cron table
    entry, any standard output and error messages generated by the backup.bsh shell
    script are captured in a file named bck.log: 11 12 * * * /home/oracle/bin/backup.bsh
    1>/home/oracle/bin/log/bck.log 2>&1


    If you don’t redirect the cron job output, then any output will be e-mailed to
    the user who owns the cron job. You can override this behavior by specifying the
    MAILTO variable directly within the cron table.


    In this next example, you want to aggravate the system administrator and send
    cron output to the root user:


    MAILTO=root


    11 12 * * * /home/oracle/bin/backup.bsh


    If you don’t want the output to go anywhere, then redirect it to the proverbial
    bit bucket. The following entry sends the standard output and standard error to
    the /dev/null device: 11 12 * * * /home/oracle/bin/backup.bsh 1>/dev/null 2>&1


    Troubleshooting cron


    If you have a cron job that isn’t running correctly, follow these steps to troubleshoot
    the issue: 1\. Copy your *cron* entry, paste it to the operating system command
    line, and manually run the command. Often a slight typo in a directory or file
    name can be the source of the problem. Manually running the command will highlight
    errors like this.


