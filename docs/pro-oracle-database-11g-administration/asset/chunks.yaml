    Moving a Control File


    You may occasionally need to move a control file from one location to another.
    For example, if new storage is added to the database server, you may want to move
    an existing control file to the newly available location.


    The procedure for moving a control file is very similar to adding a control file.
    The only difference is that you rename the control file instead of copying it.
    This example shows how to move a control file when you’re using an spfile:


    1\. Determine the CONTROL_FILES parameter’s current value:


    SQL> show parameter control_files


    The output shows that this database is using only one control file:


    NAME TYPE VALUE


    ------------------------------------ ----------- ------------------------------


    control_files string /ora01/dbfile/O11R2/control01.ctl 2\. Alter your CONTROL_FILES
    parameter to reflect that you’re moving a control file.


    In this example, the control file is currently in this location:


    /ora01/dbfile/O11R2/control01.ctl


    You’re moving the control file to this location:


    /ora02/dbfile/O11R2/control01.ctl


    Alter the spfile to reflect the new location for the control file. You have to
    specify SCOPE=SPFILE because the CONTROL_FILES parameter can’t be modified in
    memory:


    SQL> alter system set


    CHAPTER 5 ■ MANAGING CONTROL FILES AND ONLINE REDO LOGS


    control_files=''/ora02/dbfile/O11R2/control01.ctl'' scope=spfile;


    3\. Shut down your database:


    SQL> shutdown immediate;


    4\. At the OS prompt, move the control file to the new location. This example
    uses the OS mv command:


    $ mv /ora01/dbfile/O11R2/control01.ctl /ora02/dbfile/O11R2/control01.ctl 5\. Start
    up your database:


    SQL> startup;


    You can verify that the new control file is being used by displaying the CONTROL_FILES
    parameter: SQL> show parameter control_files


    Here is the output for this example:


    NAME TYPE VALUE


    ------------------------------------ ----------- ---------------------------------


    control_files string /ora02/dbfile/O11R2/control01.ctl Removing a Control File


    You may run into a situation where you experience a media failure with a storage
    device that contains one of your multiplexed control files:


    ORA-00205: error in identifying control file, check alert log for more info In
    this scenario, you still have at least one good control file. To remove a control
    file, follow these steps.


    1\. Identify which control file has experienced media failure by inspecting the
    alert.log for information:


    ORA-00202: control file: ''/ora01/dbfile/O11R2/control02.ctl''


    ORA-27037: unable to obtain file status


    2\. Remove the unavailable control file name from the CONTROL_FILES parameter.
    If you’re using an init.ora file, modify the file directly with an OS editor (such
    as vi). If you’re using an spfile, modify the CONTROL_FILES parameter with the
    ALTER SYSTEM statement. In this spfile example, the control02.ctl control file
    is removed from the CONTROL_FILES parameter:


    SQL> alter system set control_files=''/ora01/dbfile/O11R2/control01.ctl''


    scope=spfile;


    In this example, this database now has only one control file associated with it.


    You should never run a production database with just one control file. See the
    section “Adding a Control File” to add more control files to your database.


    3\. Stop and start your database:


    SQL> shutdown immediate;


    SQL> startup;


