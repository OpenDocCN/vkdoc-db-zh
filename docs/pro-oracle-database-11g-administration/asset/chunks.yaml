    Suppose you have a tablespace that contains non-critical data and you don''t ever
    want to back it up.'
  trans: '

    # RMAN 备份与报告


    ## RMAN 备份类型


    RMAN 的默认备份模式指示其仅备份数据文件中已使用的块；这些被称为**备份集**。RMAN 也可以对数据文件进行逐字节复制；这些被称为**映像副本**。创建备份集是
    RMAN 创建的默认备份类型。以下命令创建数据库的备份集备份：


    ```

    RMAN> backup database;

    ```


    如果你愿意，可以在创建备份时显式指定 `AS BACKUPSET` 命令：


    ```

    RMAN> backup as backupset database;

    ```


    你可以通过使用 `AS COPY` 命令指示 RMAN 创建映像副本。以下命令为数据库中的每个数据文件创建映像副本：


    ```

    RMAN> backup as copy database;

    ```


    由于映像副本是数据文件的完全相同副本，数据库管理员可以直接通过操作系统命令访问它们。例如，假设发生了介质故障，而你不想使用 RMAN 来恢复映像副本。你可以使用操作系统命令将数据文件的映像副本复制到数据库可以使用的位置，而备份集由二进制文件组成，只有
    RMAN 工具可以写入或读取。


    我更喜欢在使用 RMAN 时使用备份集。备份集往往比数据文件小，并且可以应用真正的二进制压缩。此外，我不觉得使用 RMAN 作为创建只有 RMAN 才能恢复的备份文件的机制有什么不便。使用
    RMAN 和备份集既高效又非常可靠。


    ## 备份表空间


    RMAN 能够在数据库级别（如前面的示例所示）、表空间级别，甚至更精细地在数据文件级别进行备份。当你备份表空间时，RMAN 会备份与你指定的表空间相关联的任何数据文件。例如，以下命令将备份与
    `SYSTEM` 和 `SYSAUX` 表空间相关联的所有数据文件：


    ```

    RMAN> backup tablespace system, sysaux;

    ```


    我备份表空间的一个场景是，如果我最近创建了一个新的表空间，并且只想备份（与新添加的表空间相关的）数据文件。请注意，在排查备份和恢复问题时，使用一个表空间进行操作通常更有效（因为备份一个表空间通常比备份整个数据库快得多）。


    ## 备份数据文件


    你可能偶尔需要备份单个数据文件。例如，在排查备份问题时，尝试成功备份一个数据文件通常很有帮助。你可以通过文件名或文件号指定数据文件，如下所示：


    ```

    RMAN> backup datafile ''/ora01/dbfile/O11R2/system01.dbf'';

    ```


    这是一个指定文件号的示例：


    ```

    RMAN> backup datafile 1,3;

    ```


    以下是使用各种功能备份数据文件的其他示例：


    ```

    RMAN> backup as copy datafile 3;

    ```


    ```

    RMAN> backup incremental level 1 datafile 4;

    ```


    > **提示** 使用 `REPORT SCHEMA` 命令列出表空间、数据文件名和数据文件编号信息。


    ## 备份控制文件


    备份控制文件最可靠的方法是配置自动备份功能：


    ```

    RMAN> configure controlfile autobackup on;

    ```


    此命令确保在发出 `BACKUP` 或 `COPY` 命令时自动备份控制文件。我通常启用控制文件的自动备份功能，然后就再也不用担心显式发出单独命令来备份控制文件了。在此模式下，控制文件总是在数据文件备份片段创建完成后，在其自己的备份集和备份片段中创建。


    如果你需要手动备份控制文件，可以这样做：


    ```

    RMAN> backup current controlfile;

    ```


    备份的位置可以是默认的操作系统位置、快速恢复区（如果使用），或者手动配置的位置。如第 17 章所示，我更喜欢将控制文件备份片段的位置设置为与数据文件备份相同的位置：


    ```

    RMAN> configure controlfile autobackup format for device type disk to ''/ora01/O11R2/rman/rman_ctl_%F.bk'';

    ```


    ## 备份 Spfile


    如果你启用了控制文件的自动备份功能，那么每当发出 `BACKUP` 或 `COPY` 命令时，spfile 也会（与控制文件一起）被自动备份。如果你需要手动备份
    spfile，请使用以下命令：


    ```

    RMAN> backup spfile;

    ```


    包含 spfile 备份的文件的位置取决于你的配置。默认情况下，如果你没有使用快速恢复区，并且没有通过通道显式配置位置，那么对于 Linux/Unix 服务器，备份会进入
    `$ORACLE_HOME/dbs` 目录。


    > **注意** 只有实例是使用 spfile 启动时，RMAN 才能备份 spfile。


    ## 备份归档重做日志


    我通常不会将归档重做日志与数据库备份分开备份。如前所述，我通常使用以下命令备份数据库文件和归档重做日志文件：


    ```

    RMAN> backup incremental level=0 database plus archivelog;

    ```


    然而，你偶尔会发现自己处于需要对归档重做日志进行特殊的一次性备份的情况。你可以发出以下命令来备份归档重做日志文件：


    ```

    RMAN> backup archivelog all;

    ```


    如果你有一个几乎满的挂载点，并且你决定要备份归档重做日志（以便它们存在于备份文件中），但随后又想立即将刚备份过的归档重做日志文件从磁盘上删除，你可以使用以下语法来备份归档重做日志，然后让
    RMAN 将它们从存储介质中删除：


    ```

    RMAN> backup archivelog all delete input;

    ```


    接下来列出了一些其他可以用来备份归档重做日志文件的方法：


    ```

    RMAN> backup archivelog sequence 300;

    ```


    ```

    RMAN> backup archivelog sequence between 300 and 400 thread 1;

    ```


    ```

    RMAN> backup archivelog from time "sysdate-7" until time "sysdate-1";

    ```


    如果一个归档重做日志已通过操作系统删除命令手动从磁盘中移除，RMAN 在尝试备份不存在的归档重做日志文件时将抛出以下错误：


    ```

    RMAN-06059: expected archived log not found, loss of archived log compromises
    recoverability

    ```


    在这种情况下，首先运行一个 `CROSSCHECK` 命令，让 RMAN 知道哪些文件在磁盘上物理可用：


    ```

    RMAN> crosscheck archivelog all;

    ```


    ## 备份快速恢复区


    如果你使用快速恢复区，RMAN 的一个很好的功能是，你可以用一条命令备份该位置的所有文件。如果你使用介质管理器并启用了磁带备份通道，你可以像这样将快速恢复区中的所有内容备份到磁带：


    ```

    RMAN> configure channel device type sbt_tape parms ''ENV=(OB_MEDIA_FAMILY=RMAN-DB11R2)'';

    ```


    ```

    RMAN> backup device type sbt_tape recovery area;

    ```


    你也可以将快速恢复区备份到磁盘上的某个位置。使用 `TO DESTINATION` 命令来实现这一点：


    ```

    RMAN> backup recovery area to destination ''/ora01/O11R1/fra_back'';

    ```


    RMAN 会根据需要，在 `TO DESTINATION` 命令指定的目录下自动创建目录。


    > **注意** `<TO_DESTINATION>` 目录下的子目录格式为 `<SID>/backupset_<YYYY_MM_DD>`。RMAN 将备份完全备份、增量备份、控制文件自动备份和归档重做日志文件。请注意，闪回日志、联机重做日志文件和当前控制文件不会被备份。


    ## 从备份中排除表空间


    假设你有一个包含非关键数据的表空间，并且你永远不想备份它。

    '
- fmt: '# RMAN备份配置与报告


    ## 排除表空间备份

    RMAN可以被配置为从备份中排除特定的表空间。要确定RMAN当前是否配置为排除任何表空间，请运行此命令：

    `RMAN> show exclude;`


    命令输出显示数据库的RMAN配置参数（数据库唯一名为`O11R2`），示例中RMAN配置没有存储或默认参数。


    使用`EXCLUDE`命令来指示RMAN不要备份哪些表空间：

    `RMAN> configure exclude for tablespace users;`


    配置后，对于任何数据库级别的备份，RMAN将排除与`USERS`表空间关联的数据文件。你可以使用以下命令指示RMAN备份任何被排除的表空间：

    `RMAN> backup database noexclude;`


    你可以通过以下命令清除排除设置：

    `RMAN> configure exclude for tablespace users clear;`


    ## 备份未备份的数据文件

    假设你刚向数据库添加了几个数据文件，并想确保已备份它们。你可以发出以下命令来指示Oracle备份尚未备份的数据文件：

    `RMAN> backup database not backed up;`


    你还可以指定一个尚未备份文件的时间范围。假设你发现备份在过去几天没有运行，并且想要备份过去24小时内所有未备份的内容。以下命令备份过去一天内未备份的所有数据文件：

    `RMAN> backup database not backed up since time=''sysdate-1'';`


    如果你的备份因某些原因（如数据中心断电或备份目录在备份期间变满）而中止，此命令也很有用。在解决导致备份作业失败的问题后，你可以发出前面的命令，RMAN将仅备份指定时间段内未备份的数据文件。


    ## 跳过只读表空间

    由于只读表空间中的数据在只读模式下无法更改，你可能希望只备份只读表空间一次，然后在后续备份中跳过它们。使用`SKIP READONLY`命令实现这一点：

    `RMAN> backup database skip readonly;`


    请记住，当你跳过只读表空间时，需要保留一个包含这些表空间的可用备份。不要让自己陷入这样的情况：一个只读表空间六个月没有备份，然后发生了介质故障。


    ## 跳过离线或不可访问的文件

    有时数据文件会损坏。你知道这个数据文件不再需要，于是将其离线，如下所示：

    `SQL> alter database datafile ''/ora01/INVDEV/sysaux01.dbf'' offline for drop;`


    现在，假设你尝试运行RMAN备份：

    `RMAN> backup database;`


    当RMAN遇到无法备份的数据文件时，会抛出以下错误：

    `RMAN-03002: failure of backup command at 09/14/2010 13:24:04`

    `RMAN-06056: could not access datafile 3`


    在这种情况下，你必须指示RMAN将离线数据文件排除在备份之外。`SKIP OFFLINE`命令指示RMAN忽略状态为离线的数据文件：

    `RMAN> backup database skip offline;`


    如果一个文件完全丢失，请使用`SKIP INACCESSIBLE`来指示RMAN忽略磁盘上不可用的文件。如果使用操作系统命令删除了数据文件，可能会发生这种情况。以下是将不可访问的数据文件排除在RMAN备份之外的示例：

    `RMAN> backup database skip inaccessible;`


    你可以用一个命令跳过只读、离线和不可访问的数据文件：

    `RMAN> backup database skip readonly skip offline skip inaccessible;`


    在处理离线和不可访问的文件时，你应该查明文件离线或不可访问的原因，并尝试解决任何问题。


    ## 并行备份大文件

    通常，RMAN只使用一个通道来备份单个数据文件。当你启用并行性时，它允许RMAN生成多个进程来备份多个文件。然而，即使启用了并行性，RMAN也不会同时使用并行通道来备份一个数据文件，但从Oracle
    Database 11g开始，你可以指示RMAN使用多个通道并行备份一个数据文件。


    这被称为**多节备份**。此功能可以加快非常大的数据文件的备份速度。


    使用`SECTION SIZE`参数进行多节备份。以下示例配置两个并行通道来备份一个文件：

    ```

    RMAN> configure device type disk parallelism 2;

    RMAN> configure channel 1 device type disk format ''/ora01/O11R2/rman/r1%U.bk'';

    RMAN> configure channel 2 device type disk format ''/ora02/O11R2/rman/r2%U.bk'';

    RMAN> backup section size 2500M datafile 10;

    ```

    当此代码运行时，RMAN将分配两个通道来并行备份数据文件`10`。


    **注意：** 如果你指定的节大小大于数据文件的大小，RMAN将不会并行备份该文件。


    ## 将RMAN备份信息添加到存储库

    另一种场景是当你需要向控制文件填充有关RMAN备份的信息时。例如，假设你必须重建控制文件，现在控制文件不再包含任何关于RMAN的信息。在这种情况下，使用`CATALOG`命令向控制文件填充RMAN元数据。例如，如果所有RMAN备份文件都保存在`/ora01/O11R2/rman`目录中，你可以让控制文件感知该目录中的这些备份文件，如下所示：

    `RMAN> catalog start with ''/ora01/O11R2/rman'';`


    这导致RMAN在指定目录中查找任何备份片、映像副本、控制文件副本或归档重做日志，如果找到，则将适当的元数据填充到控制文件中。对于此示例，在给定目录中找到了两个备份片文件：

    ```

    searching for all files that match the pattern /ora01/O11R2/rman


    List of Files Unknown to the Database

    =====================================

    File Name: /ora01/O11R2/rman/r1otlns90o_1_1.bk

    File Name: /ora01/O11R2/rman/r1xyklnrveg_1_1.bk


    Do you really want to catalog the above files (enter YES or NO)?

    ```

    如果你输入`YES`，则有关备份文件的元数据将被添加到控制文件中。这样，`CATALOG`命令允许你让RMAN存储库（控制文件和恢复目录）感知RMAN可用于备份和恢复的文件。


    你还可以指示RMAN编录恢复区域中控制文件当前未知的任何文件：

    `RMAN> catalog recovery area;`


    你也可以编录特定的文件。此示例指示RMAN为特定的备份片文件向控制文件添加元数据：

    `RMAN> catalog backuppiece ''/ora01/O11R2/rman/r1xyklnrveg_1_1.bk'';`


    ## 创建增量备份

    RMAN有三种独立且不同的增量备份功能：

    - 增量级别备份

    - 增量更新备份

    - 块更改跟踪


    使用增量级别备份，RMAN只备份自上次备份以来已修改的块。增量备份可应用于整个数据库、表空间或数据文件。这是RMAN最常用的增量功能。


    增量更新备份与增量级别备份是完全不同的功能。这些备份获取数据文件的映像副本，然后使用增量备份来更新这些映像副本。这为你提供了一种高效的方法，将映像副本作为备份策略的一部分进行实施和维护。你只需进行一次映像副本备份，然后使用增量备份来保持映像副本更新为最新的事务。'
  raw: 'RMAN can be configured to exclude such tablespaces from the backup. To determine
    if RMAN is currently configured to exclude any tablespaces, run this command:


    RMAN> show exclude;


    RMAN configuration parameters for database with db_unique_name O11R2 are: RMAN
    configuration has no stored or default parameters


    Use the EXCLUDE command to instruct RMAN which tablespaces to not back up: RMAN>
    configure exclude for tablespace users;


    CHAPTER 18 ■ RMAN BACKUPS AND REPORTING


    Now for any database level backups, RMAN will exclude the datafiles associated
    with the USERS


    tablespace. You can instruct RMAN to back up any excluded tablespaces with this
    command: RMAN> backup database noexclude;


    You can clear the exclude setting via the following command:


    RMAN> configure exclude for tablespace users clear;


    Backing up Datafiles Not Backed Up


    Suppose you have just added several datafiles to your database and you want to
    ensure that you have a backup of them. You can issue the following command to
    instruct Oracle to back up datafiles that have not been backed up yet:


    RMAN> backup database not backed up;


    You can also specify a time range for files that haven''t been backed up yet.
    Suppose you discover that your backups haven''t been running for the last several
    days and you want to back up everything that hasn''t been backed up within the
    last 24 hours. The following command backs up all datafiles that have not been
    backed up within the last day:


    RMAN> backup database not backed up since time=''sysdate-1'';


    This command is also useful if your backups aborted for some reason, such as a
    power failure in the data center or your backup directory became full during backups.
    After you have resolved the issue that caused your backup job to fail, you can
    issue the previous command and RMAN will only back up the datafiles that haven''t
    been backed up in the specified time period.


    Skipping Read-Only Tablespaces


    Since data in read-only tablespaces can''t change while in read-only mode, you
    may only want to back up read-only tablespaces once and then skip them in subsequent
    backups. Use the SKIP READONLY


    command to achieve this:


    RMAN> backup database skip readonly;


    Keep in mind that when you skip read-only tablespaces, you’ll need to keep available
    a backup that contains these tablespaces. You don''t want to find yourself in
    the situation where you haven''t backed up a read-only tablespace for six months
    and then have a media failure.


    Skipping Offline or Inaccessible Files


    Sometimes datafiles become corrupt. You know that you don''t need this datafile
    for anything so you take it offline, like so:


    SQL> alter database datafile ''/ora01/INVDEV/sysaux01.dbf'' offline for drop;
    Now, suppose you attempt to run an RMAN backup:


    RMAN> backup database;


    The following error is thrown when RMAN encounters a datafile that it can''t back
    up: RMAN-03002: failure of backup command at 09/14/2010 13:24:04


    CHAPTER 18 ■ RMAN BACKUPS AND REPORTING


    RMAN-06056: could not access datafile 3


    In this situation, you''ll have to instruct RMAN to exclude the offline datafile
    from the backup. The SKIP OFFLINE command instructs RMAN to ignore datafiles with
    an offline status: RMAN> backup database skip offline;


    If a file has gone completely missing, use SKIP INACCESSIBLE to instruct RMAN
    to ignore files that are not available on disk. This might happen if the datafile
    was deleted using an operating system command. Here''s an example of excluding
    inaccessible datafiles from the RMAN backup: RMAN> backup database skip inaccessible;


    You can skip read-only, offline, and inaccessible datafiles with one command:
    RMAN> backup database skip readonly skip offline skip inaccessible; When dealing
    with offline and inaccessible files, you should figure out why the files are offline
    or inaccessible and try to resolve any issues.


    Backing Up Large Files in Parallel


    Normally, RMAN will only use one channel to back up a single datafile. When you
    enable parallelism, it allows RMAN to spawn multiple processes to back up multiple
    files. However, even when parallelism is enabled, RMAN will not use parallel channels
    simultaneously to back up one datafile, but starting with Oracle Database 11g,
    you can instruct RMAN to use multiple channels to back up one datafile in parallel.


    This is known as a *multisection backup*. This feature can speed up the backups
    of very large datafiles.


    Use the SECTION SIZE parameter to make a multisection backup. The following example
    configures two parallel channels to back up one file:


    RMAN> configure device type disk parallelism 2;


    RMAN> configure channel 1 device type disk format ''/ora01/O11R2/rman/r1%U.bk'';
    RMAN> configure channel 2 device type disk format ''/ora02/O11R2/rman/r2%U.bk'';
    RMAN> backup section size 2500M datafile 10;


    When this code runs, RMAN will allocate two channels to back up datafile 10 in
    parallel.


    ■ **Note** If you specify a section size greater than the size of the datafile,
    RMAN will not back up the file in parallel.


    Adding RMAN Backup Information to the Repository


    Another scenario is when you need to populate the control file with information
    regarding RMAN


    backups. For example, say you had to recreate your control file, and now the control
    file no longer contains any information regarding RMAN. In this situation, use
    the CATALOG command to populate the control file with RMAN metadata. For example,
    if all of the RMAN backup files are kept in the


    /ora01/O11R2/rman directory, you can make the control file aware of these backups
    files in this directory like this:


    RMAN> catalog start with ''/ora01/O11R2/rman'';


    CHAPTER 18 ■ RMAN BACKUPS AND REPORTING


    This causes RMAN to look for any backup pieces, image copies, control file copies,
    or archive redo logs in the specified directory, and if found, populate the control
    file with the appropriate metadata. For this example, two backup piece files are
    found in the given directory: searching for all files that match the pattern /ora01/O11R2/rman


    List of Files Unknown to the Database


    =====================================


    File Name: /ora01/O11R2/rman/r1otlns90o_1_1.bk


    File Name: /ora01/O11R2/rman/r1xyklnrveg_1_1.bk


    Do you really want to catalog the above files (enter YES or NO)?


    If you enter YES, then metadata regarding the backup files will be added to the
    control file. In this way, the CATALOG command allows you to make the RMAN repository
    (control file and recovery catalog) aware of files that RMAN can work with for
    backup and recovery.


    You can also instruct RMAN to catalog any files in the recovery area that the
    control file isn''t currently aware of like this:


    RMAN> catalog recovery area;


    You can also catalog specific files. This example instructs RMAN to add metadata
    to the control file for a specific backup piece file:


    RMAN> catalog backuppiece ''/ora01/O11R2/rman/r1xyklnrveg_1_1.bk'';


    Creating Incremental Backups


    RMAN has three separate and distinct incremental backup features:


    •


    Incremental level backups


    •


    Incrementally updating backups


    •


    Block change tracking


    With incremental level backups, RMAN only backs up the blocks that have been modified
    since a previous backup. Incremental backups can be applied to the entire database,
    tablespaces, or datafiles.


    This is the most commonly used incremental feature with RMAN.


    Incrementally updating backups is an entirely different feature from incremental
    level backups.


    These backups take image copies of the datafiles and then use incremental backups
    to update the image copies. This gives you an efficient way to implement and maintain
    image copies as part of your backup strategy. You only take the image copy backup
    once, and then use incremental backups to keep the image copies updated with the
    most recent transactions.'
  trans: '

    # RMAN 备份配置与报告


    ## 排除表空间备份

    RMAN 可被配置为从备份中排除特定表空间。要检查 RMAN 当前是否配置了排除任何表空间，请运行此命令：

    `RMAN> show exclude;`


    该命令输出显示数据库的 RMAN 配置参数（数据库唯一名为`O11R2`），示例中 RMAN 未配置任何存储或默认参数。


    使用`EXCLUDE`命令来指示 RMAN 不要备份哪些表空间：

    `RMAN> configure exclude for tablespace users;`


    配置后，对于任何数据库级别的备份，RMAN 将排除与`USERS`表空间关联的数据文件。你可以使用以下命令指示 RMAN 备份任何被排除的表空间：

    `RMAN> backup database noexclude;`


    你可以通过以下命令清除排除设置：

    `RMAN> configure exclude for tablespace users clear;`


    ## 备份未备份的数据文件

    假设你刚向数据库添加了几个数据文件，并想确保它们已被备份。你可以执行以下命令来指示 Oracle 备份那些尚未备份的数据文件：

    `RMAN> backup database not backed up;`


    你还可以指定一个时间范围，以备份该范围内尚未备份的文件。假设你发现过去几天备份未运行，并且想要备份过去 24 小时内所有未备份的内容。以下命令将备份过去一天内未备份的所有数据文件：

    `RMAN> backup database not backed up since time=''sysdate-1'';`


    如果你的备份因某些原因（如数据中心断电或备份目录在备份期间已满）而中止，此命令也很有用。在解决导致备份作业失败的问题后，你可以执行前面的命令，RMAN 将仅备份指定时间段内未备份的数据文件。


    ## 跳过只读表空间

    由于只读表空间中的数据在只读模式下无法更改，你可能希望只备份只读表空间一次，然后在后续备份中跳过它们。使用`SKIP READONLY`命令实现这一点：

    `RMAN> backup database skip readonly;`


    请记住，当你跳过只读表空间时，需要保留一个包含这些表空间的有效备份。避免陷入这样的情况：一个只读表空间六个月没有备份，然后发生了介质故障。


    ## 跳过离线或不可访问的文件

    有时数据文件会损坏。假设你已知该数据文件不再需要，并将其离线，如下所示：

    `SQL> alter database datafile ''/ora01/INVDEV/sysaux01.dbf'' offline for drop;`


    现在，假设你尝试运行 RMAN 备份：

    `RMAN> backup database;`


    当 RMAN 遇到无法备份的数据文件时，会抛出以下错误：

    `RMAN-03002: failure of backup command at 09/14/2010 13:24:04`

    `RMAN-06056: could not access datafile 3`


    在这种情况下，你必须指示 RMAN 将离线数据文件排除在备份之外。`SKIP OFFLINE`命令指示 RMAN 忽略状态为离线的数据文件：

    `RMAN> backup database skip offline;`


    如果一个文件完全丢失，请使用`SKIP INACCESSIBLE`来指示 RMAN 忽略磁盘上不可访问的文件。如果使用操作系统命令删除了数据文件，可能会发生这种情况。以下是将不可访问的数据文件排除在
    RMAN 备份之外的示例：

    `RMAN> backup database skip inaccessible;`


    你可以用一个命令跳过只读、离线和不可访问的数据文件：

    `RMAN> backup database skip readonly skip offline skip inaccessible;`


    在处理离线和不可访问的文件时，你应该查明文件离线或不可访问的原因，并尝试解决任何问题。


    ## 并行备份大文件

    通常，RMAN 只使用一个通道来备份单个数据文件。当你启用并行性时，它允许 RMAN 生成多个进程来备份多个文件。然而，即使启用了并行性，RMAN 通常也不会同时使用多个并行通道来备份一个数据文件，但从
    Oracle Database 11g 开始，你可以指示 RMAN 使用多个通道并行备份一个数据文件。


    这被称为**多节备份**。此功能可以加快非常大的数据文件的备份速度。


    使用`SECTION SIZE`参数进行多节备份。以下示例配置两个并行通道来备份一个文件：

    ```

    RMAN> configure device type disk parallelism 2;

    RMAN> configure channel 1 device type disk format ''/ora01/O11R2/rman/r1%U.bk'';

    RMAN> configure channel 2 device type disk format ''/ora02/O11R2/rman/r2%U.bk'';

    RMAN> backup section size 2500M datafile 10;

    ```

    当此代码运行时，RMAN 将分配两个通道来并行备份数据文件`10`。


    **注意：** 如果你指定的节大小大于数据文件的大小，RMAN 将不会并行备份该文件。


    ## 将 RMAN 备份信息添加到存储库

    另一种场景是当你需要向控制文件填充有关 RMAN 备份的信息时。例如，假设你必须重建控制文件，现在控制文件不再包含任何关于 RMAN 的信息。在这种情况下，使用`CATALOG`命令向控制文件填充
    RMAN 元数据。例如，如果所有 RMAN 备份文件都保存在`/ora01/O11R2/rman`目录中，你可以让控制文件识别该目录中的这些备份文件，如下所示：

    `RMAN> catalog start with ''/ora01/O11R2/rman'';`


    这导致 RMAN 在指定目录中查找任何备份片、映像副本、控制文件副本或归档重做日志，如果找到，则将适当的元数据填充到控制文件中。对于此示例，在给定目录中找到了两个备份片文件：

    ```

    searching for all files that match the pattern /ora01/O11R2/rman


    List of Files Unknown to the Database

    =====================================

    File Name: /ora01/O11R2/rman/r1otlns90o_1_1.bk

    File Name: /ora01/O11R2/rman/r1xyklnrveg_1_1.bk


    Do you really want to catalog the above files (enter YES or NO)?

    ```

    如果你输入`YES`，则有关备份文件的元数据将被添加到控制文件中。这样，`CATALOG`命令允许你让 RMAN 存储库（控制文件和恢复目录）识别 RMAN
    可用于备份和恢复的文件。


    你还可以指示 RMAN 编录恢复区域中控制文件当前未知的任何文件：

    `RMAN> catalog recovery area;`


    你也可以编录特定的文件。此示例指示 RMAN 为特定的备份片文件向控制文件添加元数据：

    `RMAN> catalog backuppiece ''/ora01/O11R2/rman/r1xyklnrveg_1_1.bk'';`


    ## 创建增量备份

    RMAN 有三种独立且不同的增量备份功能：

    - 增量级别备份

    - 增量更新备份

    - 块更改跟踪


    使用增量级别备份，RMAN 只备份自上次备份以来已修改的块。增量备份可应用于整个数据库、表空间或数据文件。这是 RMAN 最常用的增量功能。


    增量更新备份与增量级别备份是完全不同的功能。这些备份获取数据文件的映像副本，然后使用增量备份来更新这些映像副本。这为你提供了一种高效的方法，将映像副本作为备份策略的一部分进行实施和维护。你只需进行一次映像副本备份，然后使用增量备份来保持映像副本更新为最新的事务。

    '
- fmt: "# RMAN 备份与报告\n\n## 块改变跟踪\n\n块改变跟踪是另一项旨在提升增量备份性能的功能。其核心思想是使用一个操作系统文件来记录自上次备份以来发生更改的数据块。在执行增量备份时，RMAN\
    \ 可以利用块改变跟踪文件快速识别出需要备份的数据块。此功能可以极大提升增量备份的性能。\n\n## 采用增量级别备份\n\nRMAN 通过级别来实现增量备份。从\
    \ Oracle Database 10*g* 开始，文档化的增量备份级别只有两种：级别 0 和级别 1。早期版本的 Oracle 提供 0 到 4 共五个级别。这些级别（0\
    \ 到 4）在 Oracle Database 10g 和 11g 中仍然可用，但未在 Oracle 文档中指定。你必须首先执行一个增量级别 0 备份来建立基线，之后才能执行级别\
    \ 1 增量备份。\n\n**注意**：完全备份备份的数据块与级别 0 备份完全相同。然而，你不能将完全备份用于增量备份。你必须以级别 0 备份开始增量备份。如果你尝试执行级别\
    \ 1 备份但不存在级别 0 备份，RMAN 会自动执行一个级别 0 备份。\n\n以下是一个执行增量级别 0 备份的示例：\n\n```\nRMAN> backup\
    \ incremental level=0 database;\n```\n\n假设接下来的几次备份，你只想备份自上次级别 0 基线备份以来发生更改的数据块。下面这行代码执行一个级别\
    \ 1 备份：\n\n```\nRMAN> backup incremental level=1 database;\n```\n\n增量备份有两种不同的类型：差异备份和累积备份。使用哪种类型的增量备份（差异或累积）取决于你的要求。差异备份（默认）较小，但恢复所需时间更长。累积备份比差异备份大，但恢复所需时间更短。\n\
    \n差异增量级别 1 备份指示 RMAN 备份自上次级别 1 或级别 0 备份以来发生更改的数据块，而累积增量级别 1 备份则指示 RMAN 备份自上次级别\
    \ 0 备份以来发生更改的数据块。累积增量备份实际上会忽略任何级别 1 增量备份。\n\n**注意**：RMAN 增量级别 0 备份用于还原数据文件，而 RMAN\
    \ 增量级别 1 备份用于恢复数据文件。\n\n在使用增量备份时，我几乎总是使用默认的差异备份。通常我不太担心差异备份和累积备份之间的区别。如果你需要累积备份，必须指定关键字\
    \ `CUMULATIVE`。以下是一个执行累积级别 1 备份的示例：\n\n```\nRMAN> backup incremental level=1 cumulative\
    \ database;\n```\n\n以下是一些在比数据库更细粒度级别上执行增量备份的其他示例：\n\n```\nRMAN> backup incremental\
    \ level=0 tablespace sysaux;\nRMAN> backup incremental level=1 tablespace sysaux\
    \ plus archivelog;\nRMAN> backup incremental level=1 datafile 3;\n```\n\n## 执行增量更新备份\n\
    \n增量更新备份的基本思想是创建数据文件的映像副本，然后使用增量备份来更新这些映像副本。这样，你就拥有了一份数据库的映像副本，通过应用增量备份使其保持某种程度的最新状态。这可以是一种将映像副本备份与增量备份相结合的高效方式。\n\
    \n要理解这种备份技术的工作原理，你需要检查执行增量更新备份的命令。你需要两行 RMAN 代码来启用此功能：\n\n```\nRMAN> recover copy\
    \ of database with tag 'incupdate';\nRMAN> backup incremental level 1 for recover\
    \ of copy with tag 'incupdate' database;\n```\n\n在第一行中，指定了一个标签（此示例使用 `incupdate`）。你可以使用任何你想要的标签名称；该标签名称让\
    \ RMAN 能够关联每次运行命令时使用的备份文件。然后，此代码在你第一次运行脚本时会执行以下操作：\n\n- `RECOVER COPY` 生成一条消息，表示没有需要操作的内容。\n\
    - 如果不存在映像副本，`BACKUP INCREMENTAL` 会创建数据库数据文件的映像副本。\n\n当 `RECOVER COPY` 命令首次运行时，你应该会在输出中看到类似这样的消息：\n\
    \n```\nno parent backup or copy of datafile ... found\n```\n\n在 `BACKUP INCREMENTAL`\
    \ 的输出中，你应该会看到类似这样的文本，表明正在创建映像副本：\n\n```\nchannel ORA_DISK_1: datafile copy complete,\
    \ elapsed time: 00:00:25\n```\n\n第二次运行增量更新备份时，它执行以下操作：\n\n- `RECOVER COPY` 仍然没有需要操作的内容。\n\
    - `BACKUP INCREMENTAL` 执行一个增量级别 1 备份并为其分配指定的标签名称；此备份随后将被 `RECOVER COPY` 命令使用。\n\
    \n第三次运行增量更新备份时，它执行以下操作：\n\n- 既然已经创建了一个增量备份，`RECOVER COPY` 会将该增量备份应用到映像副本上。\n-\
    \ `BACKUP INCREMENTAL` 执行一个增量级别 1 备份并为其分配指定的标签名称；此备份随后将被 `RECOVER COPY` 命令使用。\n\
    \n此后，每次你运行这两行代码，你都将拥有一个定期重复的备份模式。如果你使用映像副本进行备份，可以考虑使用增量更新备份策略，因为这样可以避免每次备份运行时都创建完整的映像副本。\n\
    \n每次备份运行时，映像副本都会根据上一次备份的增量更改进行更新。\n\n## 使用块改变跟踪\n\n块改变跟踪是指使用一个二进制文件来记录数据库数据文件块的更改。其目的是提升增量备份性能，因为\
    \ RMAN 可以使用块改变跟踪文件来精确定位自上次备份以来发生更改的数据块。这节省了大量时间，否则 RMAN 将必须扫描所有已备份的数据块以确定它们自上次备份以来是否已更改。你可以通过以下步骤启用块改变跟踪：\n\
    \n1.  如果尚未启用，将 `DB_CREATE_FILE_DEST` 参数设置为一个位置。例如：\n    ```\n    SQL> alter system\
    \ set db_create_file_dest='/ora01/O11R2/bct' scope=both;\n    ```\n2.  通过 `ALTER\
    \ DATABASE` 命令启用块改变跟踪：\n    ```\n    SQL> alter database enable block change tracking;\n\
    \    ```\n\n此示例在 `DB_CREATE_FILE_DEST` 指定的目录中创建一个使用 OMF 名称的文件。在此示例中，创建的文件名为：\n\
    \n```\n/ora01/O11R2/bct/O11R2/changetracking/o1_mf_68wxc16g_.chg\n```\n\n你也可以通过直接指定文件名来启用块改变跟踪，这不需要设置\
    \ `DB_CREATE_FILE_DEST`。例如：\n\n```\nSQL> alter database enable block change tracking\
    \ using file '/ora01/O11R2/bct/btc.bt';\n```\n\n你可以通过运行以下查询来验证块改变跟踪的详细信息：\n\n\
    ```\nSQL> select * from v$block_change_tracking;\n```\n\n出于空间规划目的，块改变跟踪文件的大小大约是数据库中被跟踪块总大小的\
    \ 1/30,000。因此，块改变跟踪文件的大小与数据库大小成正比，而不是与生成的日志量成正比。\n\n要禁用块改变跟踪，请运行以下命令：\n\n```\n\
    SQL> alter database disable block change tracking;\n```\n\n**注意**：当你禁用块改变跟踪时，Oracle\
    \ 会自动删除块改变跟踪文件。\n\n## 检查数据文件和备份中的损坏情况"
  raw: 'Block change tracking is another feature designed to speed up the performance
    of incremental backups. The idea here is that an operating system file is used
    to record which blocks have changed since the last backup. RMAN can use the block
    change tracking file to quickly identify which blocks need to be backed up when
    performing incremental backups. This feature can greatly improve the performance
    of incremental backups.


    CHAPTER 18 ■ RMAN BACKUPS AND REPORTING


    Taking Incremental Level Backups


    RMAN implements incremental backups through levels. Starting with Oracle Database
    10 *g*, there are only two documented levels of incremental backups: level 0 and
    level 1\. Prior versions of Oracle offer five levels, 0 through 4\. These levels
    (0 through 4) are still available in Oracle Database 10g and 11g, but are not
    specified in the Oracle documentation. You must first take an incremental level
    0 backup to establish a baseline, after which you can take a level 1 incremental
    backup.


    ■ **Note** A full backup backs up the exact same blocks as a level 0 backup. However,
    you can''t use a full backup with incremental backups. You have to start an incremental
    backup with a level 0 backup. If you attempt to take a level 1 backup and no level
    0 exists, RMAN will automatically take a level 0 backup.


    Here''s an example of taking an incremental level 0 backup:


    RMAN> backup incremental level=0 database;


    Suppose for the next several backups you only want to back up the blocks that
    have changed since the last level 0 baseline backup. This line of code takes a
    level 1 backup: RMAN> backup incremental level=1 database;


    There are two different types of incremental backups: differential and cumulative.
    Which type of incremental (differential or cumulative) you use depends on your
    requirements. Differential backups (the default) are smaller but take more time
    to recover from. Cumulative backups are larger than differential backups but take
    less time to recover from.


    A differential incremental level 1 backup instructs RMAN to back up blocks that
    have changed since the last level 1 or level 0 backups, whereas a cumulative incremental
    level 1 backup instructs RMAN to back up blocks that have changed since the last
    level 0 backup. Cumulative incremental backups, in effect, ignore any level 1
    incremental backups.


    ■ **Note** The RMAN incremental level 0 backups are used to restore the datafiles,
    while the RMAN incremental level 1 backups are used to recover the datafiles.


    When using incremental backups, I almost always use the default of differential.
    Usually I don''t worry about the differences between incremental and cumulative
    backups. If you require cumulative backups, you must specify the key word CUMULATIVE.
    Here''s an example of taking a cumulative level 1


    backup:


    RMAN> backup incremental level=1 cumulative database;


    Here are some other examples of taking incremental backups at more granular level
    than the database:


    CHAPTER 18 ■ RMAN BACKUPS AND REPORTING


    RMAN> backup incremental level=0 tablespace sysaux;


    RMAN> backup incremental level=1 tablespace sysaux plus archivelog; RMAN> backup
    incremental level=1 datafile 3;


    Making Incrementally Updating Backups


    The basic idea behind an incrementally updating backup is to create image copies
    of datafiles and then use incremental backups to update the image copies. In this
    manner, you have image copies of your database that are kept somewhat current
    by applying an incremental backup to them. This can be an efficient way to combine
    image copy backups with incremental backups.


    To understand how this backup technique works, you''ll need to inspect the commands
    that perform an incrementally updating backup. You need two lines of RMAN code
    to enable this feature: RMAN> recover copy of database with tag ''incupdate'';


    RMAN> backup incremental level 1 for recover of copy with tag ''incupdate'' database;
    In the first line, a tag is specified (this example uses incupdate). You can use
    whatever you want for the tag name; the tag name lets RMAN associate the backup
    files being used each time the commands are run. Then, this code will do the following
    the first time you run the script:


    • RECOVER COPY generates a message saying there''s nothing for it to do.


    • If no image copies exist, the BACKUP INCREMENTAL creates an image copy of the
    database datafiles.


    You should see messages like this in the output when the RECOVER COPY command
    runs the first time:


    no parent backup or copy of datafile ... found


    In the output for the BACKUP INCREMENTAL, you should see text like this indicating
    that image copies are being created:


    channel ORA_DISK_1: datafile copy complete, elapsed time: 00:00:25


    The second time you run the incrementally updating backup, it does as follows:


    • RECOVER COPY still has nothing to do.


    • BACKUP INCREMENTAL makes an incremental level 1 backup and assigns it the tag
    name specified; this backup will subsequently be used by the RECOVER COPY


    command.


    The third time you run the incrementally updating backup, it does this:


    • Now that an incremental backup has been created, the RECOVER COPY applies the
    incremental backup to the image copies.


    • BACKUP INCREMENTAL makes an incremental level 1 backup and assigns it the tag
    name specified; this backup will subsequently be used by the RECOVER COPY


    command.


    Going forward, each time that you run the two lines of code you will have a regularly
    repeating backup pattern. If you use image copies for backups, you might consider
    using an incrementally updating backup strategy because you avoid creating entire
    image copies each time the backup runs.


    CHAPTER 18 ■ RMAN BACKUPS AND REPORTING


    The image copies are updated each time the backup runs with the incremental changes
    from the previous backup.


    Using Block Change Tracking


    Block change tracking is where a binary file is used to record changes to database
    datafile blocks. The idea is that incremental backup performance can be improved
    because RMAN can use the block change tracking file to pinpoint which blocks have
    changed since the last backup. This saves a great deal of time because otherwise
    RMAN would have to scan all blocks that have been backed up to determine if they''ve
    changed since the last backup. You can enable block change tracking by doing the
    following: 1\. If not already enabled, set the *DB_CREATE_FILE_DEST* parameter
    to a location. For example:


    SQL> alter system set db_create_file_dest=''/ora01/O11R2/bct'' scope=both; 2\.
    Enable block change tracking via the ALTER DATABASE command:


    SQL> alter database enable block change tracking;


    This example creates a file with an OMF name in the directory specified by DB_CREATE_FILE_DEST.
    In this example, the file created is named as:


    /ora01/O11R2/bct/O11R2/changetracking/o1_mf_68wxc16g_.chg


    You can also enable block change tracking by directly specifying a file name,
    which does not require DB_CREATE_FILE_DEST to be set. For example:


    SQL> alter database enable block change tracking using file ''/ora01/O11R2/bct/btc.bt'';
    You can verify the details of block change tracking by running the following query:
    SQL> select * from v$block_change_tracking;


    For space planning purposes, the size of the block change tracking file is approximately
    1/30,000 the size of the total size of the blocks being tracked in the database.
    Therefore, the size of the block change tracking file is proportional to the size
    of the database and not the amount of redo generated.


    To disable block change tracking, run the following command:


    SQL> alter database disable block change tracking;


    ■ **Note** When you disable block change tracking, Oracle will automatically delete
    the block change tracking file.


    Checking for Corruption in Datafiles and Backups'
  trans: "# RMAN 备份与报告\n\n## 块改变跟踪\n\n块改变跟踪是另一项旨在提升增量备份性能的功能。其核心思想是使用一个操作系统文件来记录自上次备份以来发生更改的数据块。在执行增量备份时，RMAN\
    \ 可以利用块改变跟踪文件快速识别出需要备份的数据块。此功能可以极大提升增量备份的性能。\n\n## 采用增量级别备份\n\nRMAN 通过级别来实现增量备份。从\
    \ Oracle Database 10*g* 开始，文档化的增量备份级别只有两种：级别 0 和级别 1。早期版本的 Oracle 提供 0 到 4 共五个级别。这些级别（0\
    \ 到 4）在 Oracle Database 10g 和 11g 中仍然可用，但未在 Oracle 文档中指定。你必须首先执行一个增量级别 0 备份来建立基线，之后才能执行级别\
    \ 1 增量备份。\n\n**注意**：完全备份备份的数据块与级别 0 备份完全相同。然而，你不能将完全备份用于增量备份。你必须以级别 0 备份开始增量备份。如果你尝试执行级别\
    \ 1 备份但不存在级别 0 备份，RMAN 会自动执行一个级别 0 备份。\n\n以下是一个执行增量级别 0 备份的示例：\n\n```\nRMAN> backup\
    \ incremental level=0 database;\n```\n\n假设接下来的几次备份，你只想备份自上次级别 0 基线备份以来发生更改的数据块。下面这行代码执行一个级别\
    \ 1 备份：\n\n```\nRMAN> backup incremental level=1 database;\n```\n\n增量备份有两种不同的类型：差异备份和累积备份。使用哪种类型的增量备份（差异或累积）取决于你的要求。差异备份（默认）较小，但恢复所需时间更长。累积备份比差异备份大，但恢复所需时间更短。\n\
    \n差异增量级别 1 备份指示 RMAN 备份自上次级别 1 或级别 0 备份以来发生更改的数据块，而累积增量级别 1 备份则指示 RMAN 备份自上次级别\
    \ 0 备份以来发生更改的数据块。累积增量备份实际上会忽略任何级别 1 增量备份。\n\n**注意**：RMAN 增量级别 0 备份用于还原数据文件，而 RMAN\
    \ 增量级别 1 备份用于恢复数据文件。\n\n在使用增量备份时，我几乎总是使用默认的差异备份。通常我不太担心差异备份和累积备份之间的区别。如果你需要累积备份，必须指定关键字\
    \ `CUMULATIVE`。以下是一个执行累积级别 1 备份的示例：\n\n```\nRMAN> backup incremental level=1 cumulative\
    \ database;\n```\n\n以下是一些在比数据库更细粒度级别上执行增量备份的其他示例：\n\n```\nRMAN> backup incremental\
    \ level=0 tablespace sysaux;\nRMAN> backup incremental level=1 tablespace sysaux\
    \ plus archivelog;\nRMAN> backup incremental level=1 datafile 3;\n```\n\n## 执行增量更新备份\n\
    \n增量更新备份的基本思想是创建数据文件的映像副本，然后使用增量备份来更新这些映像副本。这样，你就拥有了一份数据库的映像副本，通过应用增量备份使其保持某种程度的最新状态。这可以是一种将映像副本备份与增量备份相结合的高效方式。\n\
    \n要理解这种备份技术的工作原理，你需要检查执行增量更新备份的命令。你需要两行 RMAN 代码来启用此功能：\n\n```\nRMAN> recover copy\
    \ of database with tag 'incupdate';\nRMAN> backup incremental level 1 for recover\
    \ of copy with tag 'incupdate' database;\n```\n\n在第一行中，指定了一个标签（此示例使用 `incupdate`）。你可以使用任何你想要的标签名称；该标签名称让\
    \ RMAN 能够关联每次运行命令时使用的备份文件。然后，此代码在你第一次运行脚本时会执行以下操作：\n\n- `RECOVER COPY` 生成一条消息，表示没有需要操作的内容。\n\
    - 如果不存在映像副本，`BACKUP INCREMENTAL` 会创建数据库数据文件的映像副本。\n\n当 `RECOVER COPY` 命令首次运行时，你应该会在输出中看到类似这样的消息：\n\
    \n```\nno parent backup or copy of datafile ... found\n```\n\n在 `BACKUP INCREMENTAL`\
    \ 的输出中，你应该会看到类似这样的文本，表明正在创建映像副本：\n\n```\nchannel ORA_DISK_1: datafile copy complete,\
    \ elapsed time: 00:00:25\n```\n\n第二次运行增量更新备份时，它执行以下操作：\n\n- `RECOVER COPY` 仍然没有需要操作的内容。\n\
    - `BACKUP INCREMENTAL` 执行一个增量级别 1 备份并为其分配指定的标签名称；此备份随后将被 `RECOVER COPY` 命令使用。\n\
    \n第三次运行增量更新备份时，它执行以下操作：\n\n- 既然已经创建了一个增量备份，`RECOVER COPY` 会将该增量备份应用到映像副本上。\n-\
    \ `BACKUP INCREMENTAL` 执行一个增量级别 1 备份并为其分配指定的标签名称；此备份随后将被 `RECOVER COPY` 命令使用。\n\
    \n此后，每次你运行这两行代码，你都将拥有一个定期重复的备份模式。如果你使用映像副本进行备份，可以考虑使用增量更新备份策略，因为这样可以避免每次备份运行时都创建完整的映像副本。\n\
    \n每次备份运行时，映像副本都会根据上一次备份的增量更改进行更新。\n\n## 使用块改变跟踪\n\n块改变跟踪是指使用一个二进制文件来记录数据库数据文件块的更改。其目的是提升增量备份性能，因为\
    \ RMAN 可以使用块改变跟踪文件来精确定位自上次备份以来发生更改的数据块。这节省了大量时间，否则 RMAN 将必须扫描所有已备份的数据块以确定它们自上次备份以来是否已更改。你可以通过以下步骤启用块改变跟踪：\n\
    \n1.  如果尚未启用，将 `DB_CREATE_FILE_DEST` 参数设置为一个位置。例如：\n    ```\n    SQL> alter system\
    \ set db_create_file_dest='/ora01/O11R2/bct' scope=both;\n    ```\n2.  通过 `ALTER\
    \ DATABASE` 命令启用块改变跟踪：\n    ```\n    SQL> alter database enable block change tracking;\n\
    \    ```\n\n此示例在 `DB_CREATE_FILE_DEST` 指定的目录中创建一个使用 OMF 名称的文件。在此示例中，创建的文件名为：\n\
    \n```\n/ora01/O11R2/bct/O11R2/changetracking/o1_mf_68wxc16g_.chg\n```\n\n你也可以通过直接指定文件名来启用块改变跟踪，这不需要设置\
    \ `DB_CREATE_FILE_DEST`。例如：\n\n```\nSQL> alter database enable block change tracking\
    \ using file '/ora01/O11R2/bct/btc.bt';\n```\n\n你可以通过运行以下查询来验证块改变跟踪的详细信息：\n\n\
    ```\nSQL> select * from v$block_change_tracking;\n```\n\n出于空间规划目的，块改变跟踪文件的大小大约是数据库中被跟踪块总大小的\
    \ 1/30,000。因此，块改变跟踪文件的大小与数据库大小成正比，而不是与生成的日志量成正比。\n\n要禁用块改变跟踪，请运行以下命令：\n\n```\n\
    SQL> alter database disable block change tracking;\n```\n\n**注意**：当你禁用块改变跟踪时，Oracle\
    \ 会自动删除块改变跟踪文件。\n\n## 检查数据文件和备份中的损坏情况"
- fmt: '# CHAPTER 18 ■ RMAN BACKUPS AND REPORTING


    You can use `RMAN` to check for corruption in datafiles, archive redo logs, and
    control files. You can also verify whether a backup set is restorable. The `RMAN
    VALIDATE` command is used to perform these types of integrity checks. There are
    three ways you can run the `VALIDATE` command:


    - `VALIDATE`

    - `BACKUP...VALIDATE`

    - `RESTORE...VALIDATE`


    ■ `Note` The standalone `VALIDATE` command is available in Oracle Database 11g
    or higher. The `BACKUP...VALIDATE` and `RESTORE...VALIDATE` commands are available
    in Oracle Database 10g or higher.


    ## Using VALIDATE


    The `VALIDATE` command can be used alone (without `BACKUP` or `RESTORE`) to check
    for missing files or physical corruption in database datafiles, archive redo log
    files, control files, `spfile`, and backup set pieces. For example, this command
    will validate all datafiles and the control files: `RMAN> validate database;`


    You can also validate just the control file as follows: `RMAN> validate current
    controlfile;`


    You can validate the archive redo log files like so: `RMAN> validate archivelog
    all;`


    You can combine all of the prior three integrity checks into one command, as shown:
    `RMAN> validate database include current controlfile plus archivelog;` Under normal
    operations the `VALIDATE` command only checks for physical corruption. You can
    specify that you want to also check for logical corruption by using the `CHECK
    LOGICAL` clause like so: `RMAN> validate check logical database include current
    controlfile plus archivelog;` You can use `VALIDATE` in a variety of ways. Here
    are a few more examples: `RMAN> validate database skip offline;`


    `RMAN> validate copy of database;`


    `RMAN> validate tablespace system;`


    `RMAN> validate datafile 3 block 20 to 30;`


    `RMAN> validate spfile;`


    `RMAN> validate backupset <primary_key_value>;`


    `RMAN> validate recovery area;`


    If `RMAN` detects any corrupt blocks, the `V$DATABASE_BLOCK_CORRUPTION` is populated.
    This view contains information on the file number, block number, and the number
    of blocks affected. You can use this information to perform a block level recovery.
    See Chapter 19 for details on block level recovery.


    ■ `Note` Physical corruption is when the block contents don’t match the physical
    format that Oracle expects. By default, `RMAN` checks for physical corruption
    when backing up, restoring, or validating datafiles. Logical corruption is when
    the block is in the correct format but the contents aren’t consistent with what
    Oracle expects. Logical corruption would be issues such as corruption in a row
    piece or an index entry.


    ## Using BACKUP...VALIDATE


    The `BACKUP VALIDATE` command is very similar to the `VALIDATE` command in that
    it can check to see if datafiles are available and if the datafiles contain any
    corrupt blocks. For example: `RMAN> backup validate database;`


    This command doesn''t actually perform any type of backup or create any files.
    It only scans the datafiles and checks for corruption. Like the `VALIDATE` command,
    `BACKUP VALIDATE` by default only checks for physical corruption. You can instruct
    it to also check for logical corruption as shown: `RMAN> backup validate check
    logical database;`


    Here are some other variations of the `BACKUP...VALIDATE` command:


    `RMAN> backup validate database current controlfile;`


    `RMAN> backup validate check logical database current controlfile plus archivelog;`
    Like the `VALIDATE` command, `BACKUP...VALIDATE` will populate `V$DATABASE_BLOCK_CORRUPTION`
    if it detects any corrupt blocks. The information in this view can be used to
    determine which blocks can potentially be restored by block level recovery. See
    Chapter 19 for more details on block level recovery.


    ## Using RESTORE...VALIDATE


    The `RESTORE...VALIDATE` command is used to verify backup files that would be
    used to restore. This command validates backup sets, datafile copies, and archive
    redo log files: `RMAN> restore validate database;`


    No actual files are restored when using `RESTORE...VALIDATE`. This means you can
    run the command while the database is online and available.'
