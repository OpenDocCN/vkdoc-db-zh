    ### Creating Remote Materialized View Refreshes


    You can create MVs that select from remote tables, MVs, and/or views. This allows
    you to quickly and efficiently replicate data. The setup for basing MVs on remote
    objects is as follows:


    1.  Ensure that Oracle Net connectivity exists from the replicated database environment
    to the database with the master tables. If you don’t have this connectivity, you
    can’t replicate using MVs.

    2.  Obtain access to a user account in the remote database that has access to
    the remote tables, MVs, or views that you want to replicate.

    3.  For fast refreshes, create an MV log on the master (base) table. You only
    need to do this if you intend to perform fast refreshes.

    4.  Create a database link in the replicated database environment that points
    to the master database.

    5.  Create MVs in a replicated database environment that access remote master
    objects via the database link created in step 4.


    Here’s a simple example. First, ensure that you can establish Oracle Net connectivity
    from the replicated environment to the master database. You can verify connectivity
    and ensure that you can log on to the master database by connecting via SQL*Plus
    from the replicated database environment to the remote master. From the command
    prompt on the database that will contain the MVs, attempt to connect to the user
    `REP_MV` in the master database named `ENGDEV` on the `XENGDB` server:


    ```sql

    $sqlplus rep_mv/foo@''xengdb:1522/engdev''

    ```


    When you’re connected to the remote master database, also be sure you have access
    to the tables that you base the MV on. In this example, the name of the remote
    master table is `INV`:


    ```sql

    SQL> select count(*) from inv;

    ```


    Next, create a database link in the database that will contain the MVs. The database
    link points to the user in the remote master database:


    ```sql

    create database link engdev

    connect to rep_mv identified by foo

    using ''xengdb:1522/engdev'';

    ```


    Now, create an MV that accesses the master `INV` table:


    ```sql

    create materialized view inv_mv

    refresh complete on demand

    as

    select

    inv_id

    ,inv_desc

    from inv@engdev;

    ```


    ![](index-438_1.png)

    ![](index-439_1.png)

    ![](index-440_1.png)


    ## CHAPTER 15 ■ MATERIALIZED VIEWS


    Here’s some sample output that shows two MVs connected to one MV log:


    ```

    MOWNER BASE_TABLE SNAPID SNAPTIME

    -------------------- ------------------------- ---------- ---------

    INV_MGMT CMP_GRP_ASSOC 651 05-AUG-10

    INV_MGMT CMP_GRP_ASSOC 541 02-JAN-08

    ```


    The next query displays information regarding all MVs that have been created that
    tie into an MV log. Run this query on the master site:


    ```sql

    select

    a.log_table

    ,a.log_owner

    ,b.master mast_tab

    ,c.owner mv_owner

    ,c.name mview_name

    ,c.mview_site

    ,c.mview_id

    from dba_mview_logs a

    ,dba_base_table_mviews b

    ,dba_registered_mviews c

    where b.mview_id = c.mview_id

    and b.owner = a.log_owner

    and b.master = a.master

    order by a.log_table;

    ```


    Here’s some sample output:


    ```

    LOG_TABLE LOG_OWNE MAST_TAB MV_OWN MVIEW_NAME MVIEW_S MVIEW_ID

    ------------------- -------- ------------- ------ ---------------- ------- --------

    MLOG$_CMP_GRP_ASSOC INV_MGMT CMP_GRP_ASSOC REP_MV CMP_GRP_ASSOC_MV DWREP 651

    MLOG$_CMP_GRP_ASSOC INV_MGMT CMP_GRP_ASSOC TSTDEV CMP_GRP_ASSOC_MV ENGDEV 541

    ```


    When you drop a remote MV, it should de-register from the master database. However,
    this doesn’t always happen. A remote database may get wiped out (maybe a short-term
    development database), and the MV doesn’t get a chance to un-register itself (via
    the `DROP MATERIALIZED VIEW` statement). In this situation, the MV log is unaware
    that a dependent MV is no longer available, and therefore it keeps records indefinitely.


    To purge unwanted MV information from the database that contains the MV log, execute
    the `PURGE_MVIEW_FROM_LOG` procedure of `DBMS_MVIEW`. This example passes in the
    ID of the MV to be purged:


    ```sql

    SQL> exec dbms_mview.purge_mview_from_log(541);

    ```


    This statement should update the data dictionary and remove information from the
    internal table `SLOG$` and `DBA_REGISTERED_MVIEWS`. If the MV being purged is
    the oldest MV associated with the MV log table, the associate old records are
    also deleted from the MV log.


    If a remote MV is no longer available but still registered with the MV log table,
    you can manually unregister it at the master site. Use the `UNREGISTER_MVIEW`
    procedure of the `DBMS_MVIEW` package to unregister a remote MV. To do this, you
    need to know the remote MV owner, MV name, and MV site (available from the output
    of the previous query in this section):


    ```sql

    SQL> exec dbms_mview.unregister_mview(''TSTDEV'',''CMP_GRP_ASSOC_MV'',''ENGDEV'');

    ```


    If successful, the previous operation removes a record from `DBA_REGISTERED_MVIEWS`.


