- fmt: "## 安装与初始配置\n\n12. 输入管理员用户的电子邮件地址。显示以下输出：\n    ```\n    generating links for\
    \ admin installation with Web server\n    checking Oracle Secure Backup's configuration\
    \ file (/etc/obconfig)\n    protecting the Oracle Secure Backup directory\n  \
    \  creating /etc/rc.d/init.d/observiced\n    activating observiced via chkconfig\n\
    \    upgrading the administrative domain (where required)\n    ```\n\n    ```\n\
    \    **************************** N O T E ****************************\n    On\
    \ Linux systems Oracle recommends that you answer no to the next two questions.\
    \ The preferred mode of operation on Linux systems is to use the /dev/sg devices\
    \ for attach points as described in the 'ReadMe' and in the 'Installation and\
    \ Configuration Guide'.\n    Is BLLNX4 connected to any tape libraries that you'd\
    \ like to use with Oracle Secure Backup [no]? no\n    Is BLLNX4 connected to any\
    \ tape drives that you'd like to use with Oracle Secure Backup [no]? no\n    ```\n\
    \n13. 由于我是在 Linux 服务器上安装 OSB，因此我接受默认设置，并对两个提示都输入 `no`。显示以下最终输出，显示安装摘要：\n\n   \
    \ ```\n    Installation summary:\n    Installation Host OS Driver OS Move Reboot\
    \ Mode Name Name Installed? Required? Required?\n    admin BLLNX4 Linux no no\
    \ no\n    Oracle Secure Backup is now ready for your use.\n    ```\n\n`Note` 要卸载\
    \ Oracle Secure Backup，以 root 用户身份运行位于 `OSB_HOME/install` 目录中的 `uninstallob` 脚本。操作系统变量\
    \ `OSB_HOME` 通常设置为 `/usr/local/oracle/backup` 目录。\n\n## OSB 的命令行访问\n\n本章中的所有示例都使用\
    \ `obtool` 或 `RMAN` 来访问 OSB 并执行任务，例如创建备份和恢复文件。本节重点介绍如何连接到 `obtool` 实用程序。第一次运行\
    \ `obtool` 实用程序时，系统将提示您输入 `admin` 用户的密码，这是安装 OSB 时创建的默认 OSB 用户。出现提示时，使用您安装 OSB\
    \ 软件时指定的密码：\n```\n$ obtool\nOracle Secure Backup 10.3\nlogin:\n```\n\n要启动 `obtool`\
    \ 实用程序并登录到特定用户，请使用 `-u` 选项，如下所示。您将在下一节中学习如何维护 OSB 用户。\n```\n$ obtool -u apress_oracle\n\
    ```\n\n要验证您登录的 OSB 用户，请发出 `id` 命令：\n```\nob> id\napress_oracle\n```\n\n要查看 `obtool`\
    \ 帮助主题列表，请输入以下命令：\n```\nob> help topics\n```\n这是输出的一小部分：\n```\nHelp is available\
    \ on the following topics:\nadvanced .. advanced and seldom-used commands\nbackups\
    \ .. data backup operations\nbackupwindow .. backup window definition\nbrowser\
    \ .. file system browser\ncheckpoint .. checkpoint management\nclass .. user class\
    \ rights\n```\n\n要退出 `obtool` 实用程序，请发出 `exit` 或 `quit` 命令，如下所示：\n```\nob> exit\n\
    ```\n\n## OSB 配置\n\n安装 OSB 后，您可以运行一个简单的备份命令。但是，在安全性是首要任务之一的环境中，您可能希望先更改 OSB 默认设置。想象一下，您的生产数据库严格执行严格的安全性，并且使用单个\
    \ OSB 用户帐户来备份生产数据库和测试数据库。您处于易受攻击的境地，因为测试团队中的 DBA 可以将生产数据库的备份恢复到另一台服务器并从那里访问数据。为了提高安全性并更好地管理磁带备份，我建议创建新的用户帐户并分配特定角色，以及创建媒体家族和数据库备份存储选择器。接下来的几个小节将讨论这些主题。\n\
    \n### 配置用户和类\n\n安装 OSB 时，创建的默认用户帐户名为 `admin`，它拥有与 OSB 相关的所有权限。出于安全原因，请创建单独的 OSB\
    \ 用户帐户以访问不同的环境，例如生产、测试和开发。此外，为这些用户分配特定的类（或角色），例如 `admin`、`operator`、`oracle`、`user`\
    \ 和 `reader`。监控他们以限制他们修改 OSB 管理域配置以及执行备份和恢复操作的权限。限制权限可确保特定的 OSB 用户可以备份测试数据库，但无权（例如）恢复生产数据库。\n\
    \n要确定 `admin` 类的权限，请发出 `lsclass` 命令，如下所示：\n```\nob> lsclass -l admin\n```\n这是一些示例输出：\n\
    ```\nadmin:\nbrowse backup catalogs with this access: privileged\naccess Oracle\
    \ database backups: all\naccess file system backups: all\ndisplay administrative\
    \ domain's configuration: yes\nmodify own name and password: yes\nmodify administrative\
    \ domain's configuration: yes\nmodify catalog: yes\nperform file system backups\
    \ as self: yes\nperform file system backups as privileged user: yes\nlist any\
    \ jobs owned by user: yes\nmodify any jobs owned by user: yes\nperform file system\
    \ restores as self: yes\nperform file system restores as privileged user: yes\n\
    receive email requesting operator assistance: yes\nreceive email describing internal\
    \ errors: yes\nreceive email regarding expired passphrase keys: yes\nquery and\
    \ display information about devices: yes\nmanage devices and change device state:\
    \ yes\nlist any job, regardless of its owner: yes\nmodify any job, regardless\
    \ of its owner: yes\nperform Oracle database backups and restores: yes\n```\n\n\
    `Note` 要显示 OSB 命令的完整语法，请发出 `help` 命令，后跟该 OSB 命令。\n\n要创建 OSB 用户，请发出 `mkuser` 命令。在以下示例中，创建了\
    \ OSB 用户 `apress_oracle` 并分配了 `oracle` 权限：\n```\nob> mkuser --class oracle apress_oracle\
    \ --preauth BLLNX3:oracle+cmdline+rman\n```\n`--preauth` 选项中的 `+cmdline` 属性授予\
    \ Oracle OS 用户对 `obtool` 实用程序的预先授权访问权限，而 `+rman` 属性授予通过 RMAN 进行的 Oracle Database\
    \ SBT 备份。如果未为您要备份的目标数据库所在的服务器定义 `+rman` 预授权，则 RMAN 备份将因 `ORA-19511` 错误而失败，如下所示：\n\
    ```\nORA-19511: Error received from media manager layer, error text:\nsbt__rpc_cat_query:\
    \ Query for piece u8lr5bs6_1_1 failed.\n(Oracle Secure Backup error: 'no preauth\
    \ config found for OS user (OB tools) oracle').\n```\n\n如果您想查看所有 OSB 用户，请发出 `lsuser`\
    \ 命令：\n```\nob> lsuser\n```\n\n表 20–1 描述了用于维护 OSB 用户帐户的各种 OSB 命令。\n\n| 命令 | 含义\
    \ |\n| :--- | :--- |\n| `mkuser` | 创建 OSB 用户。 |\n| `lsuser` | 显示有关 OSB 用户的信息。\
    \ |\n| `renuser` | 重命名 OSB 用户。 |\n| `chuser` | 修改 OSB 用户的属性。 |\n| `rmuser` | 删除\
    \ OSB 用户。 |\n\n### 配置媒体家族\n\n媒体家族对磁带卷的特征进行分类和定义，例如卷 ID、卷过期时间和写入窗口。卷 ID 由 OSB 用来唯一标识磁带卷，它由媒体家族的名称加上\
    \ OSB 生成的六位序列号组成。例如，如果媒体家族的名称是 `APRESS_BACKUP`，则第一个卷 ID 是 `APRESS_BACKUP-000001`，第二个是\
    \ `APRESS_BACKUP-000002`，依此类推。\n\n有两种类型的卷过期策略：时间管理和内容管理。时间管理媒体家族中的磁带卷在超过过期时间后可以过期；在内容管理的媒体家族中，当卷上的所有备份\
    \ piece 都被标记为删除时，它们会过期。"
  raw: '12\. Enter the email address for the admin user. The following output is displayed:
    generating links for admin installation with Web server


    checking Oracle Secure Backup''s configuration file (/etc/obconfig)


    protecting the Oracle Secure Backup directory


    creating /etc/rc.d/init.d/observiced


    activating observiced via chkconfig


    upgrading the administrative domain (where required)


    ****************************** N O T E ******************************


    On Linux systems Oracle recommends that you answer no to the next two questions.
    The preferred mode of operation on Linux systems is to use the /dev/sg devices
    for attach points as described in the ''ReadMe''


    and in the ''Installation and Configuration Guide''.


    Is BLLNX4 connected to any tape libraries that you''d like to use with Oracle
    Secure Backup [no]? no


    Is BLLNX4 connected to any tape drives that you''d like to use with


    Oracle Secure Backup [no]? no


    13\. Since I am installing OSB on a Linux server, then I accept the default and
    type no for both prompts. The following final output is displayed showing the
    installation summary:


    Installation summary:


    Installation Host OS Driver OS Move Reboot Mode Name Name Installed? Required?
    Required?


    admin BLLNX4 Linux no no no Oracle Secure Backup is now ready for your use.


    ■ **Note** To remove the Oracle Secure Backup, as root run the uninstallob shell
    script located in the OSB_HOME/install directory. The operating system variable
    OSB_HOME is commonly set to the


    /usr/local/oracle/backup directory.


    Command-line Access to OSB


    All the examples in this chapter use either obtool or RMAN to access OSB and perform
    tasks such as creating backups and restoring files. This section focuses on connecting
    to the obtool utility. The first time you run the obtool utility, you will be
    prompted for the password of the admin user, which is the default OSB user created
    when you installed OSB. When prompted, use the password you specified when you
    installed the OSB software:


    $ obtool


    Oracle Secure Backup 10.3


    login:


    CHAPTER 20 ■ ORACLE SECURE BACKUP


    To launch obtool utility and logon to a specific user, use the -u option, as shown
    here. You will learn on how to maintain OSB users in the next section.


    $ obtool -u apress_oracle


    To verify the OSB user that you are logged in as, issue the id command: ob> id


    apress_oracle


    To view a list of obtool help topics, enter the following command:


    ob> help topics


    Here is a small snippet of the output:


    Help is available on the following topics:


    advanced .. advanced and seldom-used commands


    backups .. data backup operations


    backupwindow .. backup window definition


    browser .. file system browser


    checkpoint .. checkpoint management


    class .. user class rights


    To exit the obtool utility, issue either exit or quit commands, as shown here:
    ob> exit


    OSB Configuration


    Once OSB is installed, you can run a simple backup command. However, for an environment
    where security is one of the top priorities, you may want to change the OSB default
    settings first. Imagine that tight security is strictly enforced on your production
    database, and a single OSB user account is used to backup both production and
    test databases. You are in a vulnerable situation because a DBA on your testing
    team can restore the backup of your production database to another server and
    access the data from there. To increase security and better manage your tape backups,
    I recommend creating new user accounts and assigning specific roles, as well as
    creating media families and database backup storage selectors. These topics are
    discussed in the next several subsections.


    Configuring Users and Classes


    When OSB is installed, the default user account created is named admin, which
    has all of the privileges relating to OSB. For security reasons, create separate
    OSB user accounts to access the different environments, such as production, test,
    and development. Also, assign specific classes (or roles) to these users, such
    as admin, operator, oracle, user, and reader. Monitor them to limit their rights
    to modify OSB administrative domain configurations and perform backup and restore
    operations. Limiting rights ensures that a particular OSB user can back up the
    test database, but has no rights to, say, restore the production database.


    To determine the rights of class admin, issue the lsclass command, as shown here:
    ob> lsclass -l admin


    Here is some sample output:


    admin:


    CHAPTER 20 ■ ORACLE SECURE BACKUP


    browse backup catalogs with this access: privileged


    access Oracle database backups: all


    access file system backups: all


    display administrative domain''s configuration: yes


    modify own name and password: yes


    modify administrative domain''s configuration: yes


    modify catalog: yes


    perform file system backups as self: yes


    perform file system backups as privileged user: yes


    list any jobs owned by user: yes


    modify any jobs owned by user: yes


    perform file system restores as self: yes


    perform file system restores as privileged user: yes


    receive email requesting operator assistance: yes


    receive email describing internal errors: yes


    receive email regarding expired passphrase keys: yes


    query and display information about devices: yes


    manage devices and change device state: yes


    list any job, regardless of its owner: yes


    modify any job, regardless of its owner: yes


    perform Oracle database backups and restores: yes


    ■ **Note** To display the complete syntax of an OSB command, issue the help command
    followed by the OSB


    command.


    To create an OSB user, issue the mkuser command. In the following example, OSB
    user apress_oracle is created and assigned with oracle rights:


    ob> mkuser --class oracle apress_oracle --preauth BLLNX3:oracle+cmdline+rman The
    +cmdline attribute in the --preauth option grants the oracle OS user preauthorized
    access to obtool utility, while the +rman attribute grants Oracle Database SBT
    backups via RMAN. If no +rman preauthorization is defined for the server hosting
    the target database that you want to backup, then the RMAN backup fails with ORA-19511
    error, as shown here:


    ORA-19511: Error received from media manager layer, error text:


    sbt__rpc_cat_query: Query for piece u8lr5bs6_1_1 failed.


    (Oracle Secure Backup error: ''no preauth config found for OS user (OB tools)
    oracle'').


    If you want to view all OSB users, issue the lsuser command:


    ob> lsuser


    Table 20–1 describes the various OSB commands used to maintain the OSB user accounts.


    CHAPTER 20 ■ ORACLE SECURE BACKUP


    ***Table 20–1.** OSB Commands to Maintain OSB User*


    **Command Meaning**


    mkuser


    To create an OSB user.


    lsuser


    To display information about OSB users.


    renuser


    To rename an OSB user.


    chuser


    To modify the attributes of an OSB user.


    rmuser


    To delete an OSB user.


    Configuring Media Families


    The media family classifies and defines the characteristics of the tape volume,
    such as the volume ID, volume expiration, and write window. The volume ID, which
    is used by OSB to uniquely identify the tape volume, consists of the name of the
    media family affixed with a six-digit sequence number generated by OSB. For example,
    if the name of the media family is APRESS_BACKUP, then the first volume ID is
    APRESS_BACKUP-000001, the second is APRESS_BACKUP-000002, and so on.


    There are two types of volume expiration policies: time-managed and content-managed.
    The tape volumes in a time-managed media family can expire after surpassing the
    expiration time; in a contentmanaged media family, they expire when all of the
    backup pieces on the volume are marked as deleted.'
