    \ command, 478\n\nALTER INDEX...MONITORING USAGE\n\nALL_SYNONYMS view, 203\n\n\
    statement, 190\n\nALL_TABLES view, 214, 224\n\nALTER INDEX...REBUILD PARTITION\n\
    \nALL_TAB_PRIVS view, 234\n\nstatement, 297\n\nALL_TAB_PRIVS_MADE view, 234\n\n\
