    \ type disk to '/oradump01/DWREP/rman/rman_ctl_%F.bk';\nconfigure retention policy\
    \ to redundancy 1;\nconfigure device type disk parallelism 5;\nconfigure channel\
    \ 1 device type disk format '/ora08/DWREP/rman/rman1_%U.bk';\nconfigure channel\
    \ 2 device type disk format '/ora08/DWREP/rman/rman2_%U.bk';\nconfigure channel\
    \ 3 device type disk format '/ora08/DWREP/rman/rman3_%U.bk';\nconfigure channel\
    \ 4 device type disk format '/ora09/DWREP/rman/rman4_%U.bk';\nconfigure channel\
    \ 5 device type disk format '/ora09/DWREP/rman/rman5_%U.bk';\n\n# Backup datafiles,\
    \ archive redo logs, and control file\nbackup as compressed backupset incremental\
    \ level=0 database plus archivelog;\n\n# Delete obsolete backups and archive logs\
    \ as defined by retention policy.\ndelete noprompt obsolete;\nEOF\n\n#----------------------------------------------\n\
    if [ $? -ne 0 ]; then\n    echo \"RMAN problem...\"\n    echo \"Check RMAN backups\"\
    \ | $MAILX -s \"RMAN issue: $ORACLE_SID on $BOX\" $MAIL_LIST\nelse\n    echo \"\
    RMAN ran okay...\"\nfi\n\n#----------------------------------------------\nsqlplus\
    \ -s /nolog <<EOF\nconnect / as sysdba;\nalter database backup controlfile to\
    \ trace;\nCOL dbid NEW_VALUE hold_dbid\nSELECT dbid FROM v\\$database;\nexec dbms_system.ksdwrt(2,'DBID:\
    \ '||TO_CHAR(&hold_dbid));\nEXIT\nEOF\n\n#----------------------------------------------\n\
    if [ -f $LOCKFILE ]; then\n    rm $LOCKFILE\nfi\n\n#----------------------------------------------\n\
    date\n```\n"
- fmt: '# CHAPTER 17 ■ CONFIGURING RMAN


    ## Table 17–2. Implementation of Architectural Decisions


    | Decision Point | Implementation in Script | Line Number in Script |

    | :--- | :--- | :--- |

    | 1\. Running the RMAN client remotely or locally | Running script locally on
    the database server. | Line 26, connecting locally (not a network connection).
    |

    | 2\. Specifying the backup user | Using SYS to connect. | Line 27, starting rman
    connecting with `/`. |

    | 3\. Using online or offline backups | Online backup. | N/A. The database is
    assumed to be up during the backup. |

    | 4\. Setting the archive-redo log destination and file format | `LOG_ARCHIVE_DEST_N`
    and `LOG_ARCHIVE_FORMAT` initialization parameters set outside of the script in
    a database-initialization file. | N/A. Set outside of the script. |

    | 5\. Configuring the RMAN backup location and file format | Using the `CONFIGURE`
    command directly in the script. | Lines 38 through 43. |

    | 6\. Setting autobackup of the control file | Enabled in the script. | Line 35.
    |

    | 7\. Specifying the location of the autobackup of the control file | Placed in
    the same directory as the backups. | Line 36. |

    | 8\. Backing up archive-redo logs | Backing up with the rest of the database.
    Specifically, using the `PLUS ARCHIVELOG` clause. | Line 45. |

    | 9\. Determining the location for the snapshot control file | Using the default
    location. | N/A |

    | 10\. Using a recovery catalog | Not using. | Line 26, connecting as `nocatalog`.
    |

    | 11\. Using a media manager | Not using. | Lines 38 through 43, `device type
    disk`. |

    | 12\. Setting the `CONTROL_FILE_RECORD_KEEP_TIME` initialization parameter |
    Using the default. | N/A |

    | 13\. Configuring RMAN’s backup-retention policy | Configuring to a redundancy
    of 1, crosschecking, and deleting obsolete backups and archive redo log files.
    | Line 37, configuring. <br> Line 47, using RMAN to delete old files. |

    | 14\. Configuring the archive-redo logs’ deletion policy | Using the same retention
    policy as applied to the backups. | N/A |

    | 15\. Setting the degree of parallelism | Setting a degree of 5. | Lines 38 through
    43. |

    | 16\. Using backup sets or image copies | Using backup sets. | Line 45. |

    | 17\. Using incremental backups | Incremental level 0, the same as a full backup.
    | Line 45. |

    | 18\. Using incrementally updated backups | Not using. | N/A |

    | 19\. Using block-change tracking | Not using. | N/A |

    | 20\. Configuring compression | Using basic compression. | Line 45. |

    | 21\. Configuring encryption | Not using. | N/A |

    | 22\. Configuring miscellaneous settings | Not using. | N/A |


    A few aspects about this script need further discussion (in addition to what’s
    included in the table).


    Line 11 sets the required OS variables by running a script named `oraset`. See
    Chapter 2 for details on running `oraset` and sourcing OS variables. Many DBAs
    choose to hard-code OS variables such as `ORACLE_HOME` and `ORACLE_SID` into the
    script. However, you should avoid hard-coding variables and instead use a script
    to source the required variables. Running a script is much more flexible, especially
    when you have many databases on a box with different versions of Oracle installed.


    Line 15 sets the `NLS_DATE_FORMAT` OS variable to a value that includes hours,
    minutes, and seconds. This ensures that when RMAN runs commands that are appropriate,
    it displays the date output with a time component. This can be invaluable when
    you’re debugging and diagnosing issues. By default, RMAN displays only the date
    component. Knowing just the date when a command ran is rarely enough information
    to determine the timing of the commands as they were executed. At minimum, you
    need to see hours and minutes (along with the date).


    Lines 18 through 24 check for the existence of a lock file. You don’t want to
    run this script if it’s already running. The script checks for the lock file,
    and if it exists, the script exits. After the backup has finished, the lock file
    is removed (lines 66 through 68).


    Line 28 sets the `ECHO` parameter to `on`. This instructs RMAN to display in the
    output the command before it runs it. This can be invaluable for debugging issues.
    Line 29 displays all the configurable variables. This also comes in handy for
    troubleshooting issues because you can see what the RMAN variables were set to
    before any commands are executed.


    Lines 35 through 43 use the `CONFIGURE` command. These commands run each time
    the script is executed. Why do that? You only need to run a `CONFIGURE` command
    once, and it’s stored in the control file—you don’t have to run it again, right?
    That is correct. However, I’ve occasionally been burned when a DBA with poor habits
    configured a setting for a database and didn’t tell anybody, and I didn’t discover
    the misconfiguration until I attempted to make another backup. I strongly prefer
    to place the `CONFIGURE` commands in the script so the behavior is the same regardless
    of what another DBA may have done outside of the script. The `CONFIGURE` settings
    in the script also act as a form of documentation: I can readily look at the script
    and determine how settings have been configured.


    Lines 31 through 33 run `CROSSCHECK` commands. Why do that? Sometimes files go
    missing, or a rogue DBA may remove archive-redo log files from disk with an OS
    command outside of RMAN. When RMAN runs, if it can’t find files that it thinks
    should be in place, it throws an error and stops the backup. I prefer to run the
    `CROSSCHECK` command and let RMAN reconcile what files it thinks should be on
    disk with those that are actually on disk. This keeps RMAN running smoothly.


    You run `DELETE NOPROMPT OBSOLETE` on line 47. This removes all backup files and
    archive-redo log files that have been marked as `OBSOLETE` by RMAN as defined
    by the retention policy. This lets RMAN manage which files should be kept on disk.
    I prefer to run the `DELETE` command after the backup has finished (as opposed
    to running it before the backup). The retention policy is defined to be 1, so
    if you run `DELETE` after the backup, it leaves one backup copy on disk. If you
    run `DELETE` before the backup, it leaves one copy of the backup on disk. After
    the backup runs, there are be two copies of the backup on disk, which I don’t
    have room for on this server.


    Line 59 creates a trace file that contains the `CREATE CONTROLFILE` SQL statement
    that would be required for this database in the event you had to re-create the
    control file. Line 62 writes the database identifier (`DBID`) to the alert log
    file. This may come in handy for some types of control-file restores when you
    need the database ID to perform the restore.


    You can execute the shell script from the Linux/Unix scheduling utility `cron`
    as follows:

    ```

    0 16 * * * $HOME/bin/rmanback.bsh INVPRD >$HOME/bin/log/INVPRDRMAN.log 2>&1

    ```

    The script runs daily at 1600 hours military time on the database server. A log
    file is created (`INVPRDRMAN.log`) to capture any output and any errors associated
    with the RMAN job. See Chapter 21 for details on automating jobs through `cron`.


    Again, the script in this section is basic; you’ll no doubt want to enhance and
    modify it to meet your requirements. This script gives you a starting point with
    tangible RMAN recommendations and how to implement them.


    ## Using a Recovery Catalog


    When you use a recovery catalog, it’s possible to create the recovery-catalog
    user in the same database on the same server as your target database. However,
    that approach isn’t recommended because you don’t want the availability of your
    target database or the availability of the server on which the target database
    resides to affect the recovery catalog. Therefore, you should create the recovery-catalog
    database on a different server than your target database.


    ## Creating a Recovery Catalog'
