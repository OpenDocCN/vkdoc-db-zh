    \ |\n| `V$BACKUP_PIECE_DETAILS` | 备份片的详细信息。 |\n| `V$BACKUP_SET` | 备份集。 |\n| `V$BACKUP_SET_DETAILS`\
    \ | 备份集的详细信息。 |\n\n有时，刚接触 RMAN 的 DBA 会难以理解备份、备份集、备份片、数据文件这些概念以及它们之间的关系。在讨论 RMAN\
    \ 备份组件时，我发现下面的查询很有用。这个查询将显示备份集、备份集内的备份片以及备份片内备份的数据文件：\n\n```sql\nSET LINES 132\
    \ PAGESIZE 100\nBREAK ON REPORT ON bs_key ON completion_time ON bp_name ON file_name\n\
    COL bs_key FORM 99999 HEAD \"BS Key\"\nCOL bp_name FORM a40 HEAD \"BP Name\"\n\
    COL file_name FORM a40 HEAD \"Datafile\"\n--\nSELECT\n    s.recid bs_key\n   \
    \ ,TRUNC(s.completion_time) completion_time\n    ,p.handle bp_name\n    ,f.name\
    \ file_name\nFROM v$backup_set s\n    ,v$backup_piece p\n    ,v$backup_datafile\
    \ d\n    ,v$datafile f\nWHERE p.set_stamp = s.set_stamp\nAND p.set_count = s.set_count\n\
    AND d.set_stamp = s.set_stamp\nAND d.set_count = s.set_count\nAND d.file# = f.file#\n\
    ORDER BY\n    s.recid\n    ,p.handle\n    ,f.name;\n```\n\n此处的输出经过缩短以适合页面显示：\n\
    \n```\nBS Key COMPLET BP Name                                          Datafile\n\
    ------ ------- ------------------------------------------------ -----------------------------------------\n\
    \   414 14-SEP /ora01/O11R2/rman/r1j_1_1.bk                     /ora01/dbfile/O11R2/mvindex01.dbf\n\
    \                                                              /ora01/dbfile/O11R2/sysaux01.dbf\n\
    \                                                              /ora01/dbfile/O11R2/system01.dbf\n\
    \                                                              /ora02/dbfile/O11R2/users01.dbf\n\
    ```\n\n有时，对 RMAN 备份的性能进行报告很有用。下面的查询报告了每个会话的 RMAN 备份耗时。\n\n```sql\nCOL hours FORM\
    \ 9999.99\nCOL time_taken_display FORM a20\nSET LINESIZE 132\n--\nSELECT\n   \
    \ session_recid\n    ,compression_ratio\n    ,time_taken_display\n    ,(end_time\
    \ - start_time) * 24 as hours\n    ,TO_CHAR(end_time,'dd-mon-yy hh24:mi') as end_time\n\
    FROM v$rman_backup_job_details\nORDER BY end_time;\n```\n\n这是一些示例输出：\n\n```\n\
    SESSION_RECID COMPRESSION_RATIO TIME_TAKEN_DISPLAY      HOURS END_TIME\n-------------\
    \ ----------------- -------------------- ------- -----------------\n         7509\
    \        4.55050595 03:20:48                3.35 04-sep-10 19:23\n         7515\
    \        4.51185084 03:23:04                3.38 05-sep-10 19:25\n         7521\
    \        4.43947443 03:31:48                3.53 06-sep-10 19:34\n         7527\
    \        4.35619748 03:45:03                3.75 07-sep-10 19:47\n         7533\
    \        4.2773889  04:20:04                4.33 08-sep-10 20:23\n         7547\
    \        4.51488    03:22:21                3.37 09-sep-10 19:24\n         7554\
    \        4.49303627 03:28:06                3.47 10-sep-10 19:31\n         7561\
    \        4.51925905 03:17:00                3.28 11-sep-10 19:19\n         7568\
    \        4.54671383 03:14:03                3.23 12-sep-10 19:16\n         7575\
    \        4.52995677 03:17:07                3.29 13-sep-10 19:19\n```\n\n`V$RMAN_BACKUP_JOB_DETAILS`\
    \ 的内容是按连接到 RMAN 的会话汇总的。因此，如果你连接到 RMAN（建立一个会话），然后在备份作业完成后退出 RMAN，报告输出会更准确。如果你在连接到\
