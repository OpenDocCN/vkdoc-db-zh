    \ script (named `rman_chk.bsh`) like this:\n\n`$ rman_chk.bsh INVPRD 2`\n\nThe\
    \ prior script is basic but effective. You can enhance and add to it as required\
    \ for your RMAN environment.\n\n## Summary\n\nRMAN provides many flexible and\
    \ feature rich options for backups. By default, RMAN only takes backups of blocks\
