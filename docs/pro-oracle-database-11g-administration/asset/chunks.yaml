    ```\n\n`SHOW RECYCLEBIN`语句只显示已被删除的表。要获得更完整的重命名对象信息，请查询`RECYCLEBIN`视图：\n\n```sql\n\
    select\n  object_name\n  ,original_name\n  ,type\nfrom recyclebin;\n```\n\n输出如下：\n\
    \n```\nOBJECT_NAME ORIGINAL_NAME TYPE\n------------------------------ --------------------\
    \ -------------------------\nBIN$jmx7BIkFlYrgQAB/AQBIgg==$0 INV TABLE\nBIN$jmx7BIkElYrgQAB/AQBIgg==$0\
    \ INV_TRIG TRIGGER\nBIN$jmx7BIkDlYrgQAB/AQBIgg==$0 INV_PK INDEX\n```\n\n在此输出中，当对象被删除时，该表的主键也被重命名。要恢复该表，请执行以下操作：\n\
    \n```sql\nSQL> flashback table inv to before drop;\n```\n\n这会将表恢复为其原始名称。不过，此语句不会将索引恢复为原始名称：\n\
    \n```sql\nSQL> select index_name from user_indexes where table_name='INV';\n```\n\
    \n```\nINDEX_NAME\nBIN$jmx7BIkDlYrgQAB/AQBIgg==$0\n```\n\n在此场景中，你必须重命名索引：\n\n\
    ```sql\nSQL> alter index \"BIN$jmx7BIkDlYrgQAB/AQBIgg==$0\" rename to inv_pk;\n\
    ```\n\n你必须以相同的方式重命名任何触发器对象。如果在删除表之前存在引用约束，则必须手动重新创建它们。\n\n如果由于某些原因，你需要将表闪回到一个不同于原始名称的名称，可以按如下方式进行：\n\
    \n```sql\nSQL> flashback table inv to before drop rename to inv_bef;\n```\n\n\
    ## 闪回到之前的某个时间点\n\n闪回到之前某个时间点的闪回表功能与`FLASHBACK TABLE TO BEFORE DROP`完全不同。闪回到过去的某个时间点使用的是`UNDO`表空间中的信息。过去的那个时间点取决于你的`UNDO`表空间保留期，它指定了`UNDO`信息被保留的最短时间。\n\
    \n如果所需的闪回信息不在`UNDO`表空间中，你将收到如下错误：\n`ORA-01555: snapshot too old`\n\n换句话说，要能够闪回到过去的某个时间点，`UNDO`表空间中的所需信息一定不能被覆盖。\n\
    \n### 闪回到SCN\n\n假设你正在测试一个应用程序功能，并且希望快速将表恢复到特定的`SCN`。作为应用程序测试的一部分，你在测试开始前记录了`SCN`：\n\
    \n```sql\nSQL> select current_scn from v$database;\n```\n\n```\nCURRENT_SCN\n\
    -----------\n    17879789\n```\n\n你执行了一些测试，然后希望将表闪回到之前记录的`SCN`。\n\n首先，确保为表启用了行移动：\n\
    \n```sql\nSQL> alter table inv enable row movement;\n```\n\n```sql\nSQL> flashback\
    \ table inv to scn 17879789;\n```\n\n现在，该表应反映在`FLASHBACK`语句中指定的历史`SCN`值时已提交的事务。\n\
    \n### 闪回到时间戳\n\n你也可以将表闪回到之前的某个时间点。例如，要将表闪回到15分钟前，首先启用行移动，然后使用`FLASHBACK TABLE`：\n\
    \n```sql\nSQL> alter table inv enable row movement;\n```\n\n```sql\nSQL> flashback\
    \ table inv to timestamp(sysdate-1/96) ;\n```\n\n你提供的时间戳必须评估为Oracle时间戳的有效格式。你也可以显式指定一个时间，如下所示：\n\
    \n```sql\nSQL> flashback table inv to timestamp\n     to_timestamp('22-aug-10\
    \ 12:07:33','dd-mon-yy hh:mi:ss');\n```\n\n### 闪回到还原点\n\n*还原点*是与数据库中的时间戳或`SCN`相关联的名称。你可以创建一个还原点，其中包含数据库的当前`SCN`，如下所示：\n\
    \n```sql\nSQL> create restore point point_a;\n```\n\n之后，如果你决定将表闪回到该还原点，首先启用行移动：\n\
    \n```sql\nSQL> alter table inv enable row movement;\n```\n\n```sql\nSQL> flashback\
    \ table inv to restore point point_a;\n```\n\n现在，该表应包含与指定还原点相关联的`SCN`时的事务。\n\n\
    ## 闪回数据库\n\n闪回数据库功能允许你执行不完全恢复，恢复到过去的某个时间点。闪回数据库使用存储在闪回日志中的信息；它不依赖于还原数据库文件（如冷备份、热备份或`RMAN`）。在某些情况下，闪回数据库可以比执行用户管理的不完全恢复（需要你从备份中复制数据文件）更快地将数据库恢复到过去的某个时间点。\n\
    \n**提示** 闪回数据库不能替代数据库备份。如果你遇到数据文件的介质故障，无法使用闪回数据库闪回到故障发生前。如果数据文件损坏，你必须使用物理备份（热备份、冷备份或`RMAN`）进行还原和恢复。\n\
    \n在希望一致地将数据库重置到过去某个时间点的情况下，闪回数据库功能可能是可取的。例如，你可能希望定期将测试或培训数据库设置回已知的基线。或者，你可能正在升级一个应用程序，并且在对应用程序数据库对象进行大规模更改之前，标记起始点。升级后，如果情况不顺利，你希望能够快速将数据库重置到升级发生前的时间点。\n\
    \n闪回数据库有几个先决条件：\n\n- 数据库必须处于归档日志模式。\n- 必须使用快速恢复区。\n- 必须启用闪回数据库功能。\n\n请参阅本章前面关于启用归档日志模式和使用快速恢复区的部分。你可以使用以下`SQL*Plus`语句验证这些功能的状态：\n\
    \n```sql\nSQL> archive log list;\n```\n\n```sql\nSQL> show parameter db_recovery_file_dest;\n\
    ```\n\n要启用闪回数据库功能，将数据库切换到闪回模式，如下所示：\n\n```sql\nSQL> alter database flashback on;\n\
    ```\n\n**注意** 在Oracle Database 10*g*中，数据库必须处于加载模式才能启用闪回数据库。\n\n你可以按如下方式验证闪回状态：\n\
    \n```sql\nSQL> select flashback_on from v$database;\n```\n\n```\nFLASHBACK_ON\n\
    ------------------\nYES\n```\n\n启用闪回数据库后，你可以使用以下查询查看快速恢复区中的闪回日志：\n\n```sql\nselect\n\
    \  name\n  ,log#\n  ,thread#\n  ,sequence#\n  ,bytes\nfrom v$flashback_database_logfile;\n\
    ```\n\n你可以闪回的时间范围由`DB_FLASHBACK_RETENTION_TARGET`参数决定。它指定了数据库可以闪回的时间上限（以分钟为单位）。\n\
    \n你可以通过运行以下`SQL`来查看你可以闪回数据库的最旧`SCN`和时间：\n\n```sql\nselect\n  oldest_flashback_scn\n\
    \  ,to_char(oldest_flashback_time,'dd-mon-yy hh24:mi:ss')\nfrom v$flashback_database_log;\n\
    ```\n\n如果由于任何原因需要禁用闪回数据库，可以按如下方式将其关闭：\n\n```sql\nSQL> alter database flashback\
    \ off;\n```\n\n你可以使用`RMAN`或`SQL*Plus`来回闪数据库。你可以使用以下方法之一指定过去的时间点：\n\n- `SCN`\n\
    - 时间戳\n- 还原点\n- 上次`RESETLOGS`操作（仅适用于`RMAN`）\n\n此示例创建了一个还原点：\n\n```sql\nSQL> create\
    \ restore point flash_1;\n```\n\n接下来，应用程序执行一些测试，之后数据库被闪回到该还原点，以便可以开始新一轮测试：\n\n\
    ```sql\nSQL> shutdown immediate;\n```\n\n```sql\nSQL> startup mount;\n```\n\n\
    ```sql\nSQL> flashback database to restore point flash_1;\n```\n\n```sql\nSQL>\
    \ alter database open resetlogs;\n```"
  raw: 'When you drop a table, if you don’t specify the PURGE clause, Oracle renames
    the table with a system-generated name. Because the table isn’t really dropped,
    you can use FLASHBACK TABLE TO BEFORE DROP to instruct Oracle to rename the table
    with its original name. Here’s an example. Suppose the INV table is accidentally
    dropped:


    SQL> drop table inv;


    Verify that the table has been renamed by viewing the contents of the recycle
    bin: SQL> show recyclebin;


    ORIGINAL NAME RECYCLEBIN NAME OBJECT TYPE DROP TIME


    ---------------- ------------------------------ ------------ -------------------


    INV BIN$jmx7BIkFlYrgQAB/AQBIgg==$0 TABLE 2010-08-22:10:36:11


    The SHOW RECYCLEBIN statement only shows tables that have been dropped. To get
    a more complete picture of renamed objects, query the RECYCLEBIN view:


    select


    object_name


    ,original_name


    ,type


    from recyclebin;


    Here’s the output:


    OBJECT_NAME ORIGINAL_NAME TYPE


    ------------------------------ -------------------- -------------------------


    BIN$jmx7BIkFlYrgQAB/AQBIgg==$0 INV TABLE


    BIN$jmx7BIkElYrgQAB/AQBIgg==$0 INV_TRIG TRIGGER


    BIN$jmx7BIkDlYrgQAB/AQBIgg==$0 INV_PK INDEX


    In this output, the table also has a primary key that was renamed when the object
    was dropped. To undrop the table, do the following:


    SQL> flashback table inv to before drop;


    This restores the table to its original name. This statement doesn’t restore the
    index to its original name, though:


    SQL> select index_name from user_indexes where table_name=''INV'';


    INDEX_NAME


    BIN$jmx7BIkDlYrgQAB/AQBIgg==$0


    In this scenario, you have to rename the index:


    SQL> alter index "BIN$jmx7BIkDlYrgQAB/AQBIgg==$0" rename to inv_pk; You have to
    rename any trigger objects in the same manner. If referential constraints were
    in place before the table was dropped, you must manually re-create them.


    If for some reason you need to flash back a table to a different name than the
    original name, you can do so as follows:


    SQL> flashback table inv to before drop rename to inv_bef;


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    Flashing Back a Table to a Previous Point in Time


    The Flashback Table feature that flashes back to a previous point in time is completely
    different from FLASHBACK TABLE TO BEFORE DROP. Flashing back a table to a previous
    point in time uses information in the undo tablespace. The point in time in the
    past depends on your undo tablespace retention period, which specifies the minimum
    time that undo information is kept.


    If the required flashback information isn’t in the undo tablespace, you receive
    an error such as this: ORA-01555: snapshot too old


    In other words, to be able to flash back to a point in time in the past, the required
    information in the undo tablespace must not have been overwritten.


    FLASHBACK TABLE TO SCN


    Suppose you’re testing an application feature, and you want to quickly restore
    a table back to a specific SCN. As part of the application testing, you record
    the SCN before testing begins: SQL> select current_scn from v$database;


    CURRENT_SCN


    You perform some testing and then want to flash back the table to the SCN previously
    recorded.


    First, ensure that row movement is enabled for the table:


    SQL> alter table inv enable row movement;


    SQL> flashback table inv to scn 17879789;


    The table should now reflect transactions that were committed as of the historical
    SCN value specified in the FLASHBACK statement.


    FLASHBACK TABLE TO TIMESTAMP


    You can also flash back a table to a prior point in time. For example, to flash
    back a table to 15 minutes in the past, first enable row movement, and then use
    FLASHBACK TABLE:


    SQL> alter table inv enable row movement;


    SQL> flashback table inv to timestamp(sysdate-1/96) ;


    The timestamp you provide must evaluate to a valid format for an Oracle timestamp.
    You can also explicitly specify a time as follows:


    SQL> flashback table inv to timestamp


    to_timestamp(''22-aug-10 12:07:33'',''dd-mon-yy hh:mi:ss'');


    FLASHBACK TABLE TO RESTORE POINT


    A *restore point* is a name associated with a timestamp or SCN in the database.
    You can create a restore point that contains the current SCN of the database as
    follows:


    SQL> create restore point point_a;


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    Later, if you decide to flash back a table to that restore point, first enable
    row movement: SQL> alter table inv enable row movement;


    SQL> flashback table inv to restore point point_a;


    The table should now contain transactions as they were at the SCN associated with
    the specified restore point.


    Flashing Back a Database


    The Flashback Database feature allows you to perform an incomplete recovery to
    a point in time in the past. Flashback Database uses information stored in flashback
    logs; it doesn’t rely on restoring database files (like a cold backup, hot backup,
    or RMAN). In some situations, Flashback Database can restore your database to
    a point in time in the past much more quickly than performing a user-managed incomplete
    recovery (which requires you to copy datafiles from the backup).


    ■ **Tip** Flashback Database isn’t a substitute for a backup of your database.
    If you experience a media failure with a datafile, you can’t use Flashback Database
    to flash back to before the failure. If a datafile is damaged, you have to restore
    and recover using a physical backup (hot, cold, or RMAN).


    The Flashback Database feature may be desirable in situations where you want to
    consistently reset your database to a point in time in the past. For example,
    you may want to periodically set a test or training database back to a known baseline.
    Or you may be upgrading an application and, before making large-scale changes
    to the application database objects, mark the starting point. After the upgrade,
    if things don’t go well, you want the ability to quickly reset the database back
    to the point in time before the upgrade took place.


    There are several prerequisites for Flashback Database:


    • The database must be in archivelog mode.


    • You must be using an FRA.


    • The Flashback Database feature must be enabled.


    See the earlier sections in this chapter about enabling archivelog mode and using
    the FRA. You can verify the status of these features using the following SQL*Plus
    statements: SQL> archive log list;


    SQL> show parameter db_recovery_file_dest;


    To enable the Flashback Database feature, alter your database into flashback mode
    as shown: SQL> alter database flashback on;


    ■ **Note** In Oracle Database 10 *g*, the database must be in mount mode to enable
    Flashback Database.


    You can verify the flashback status as follows:


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    SQL> select flashback_on from v$database;


    FLASHBACK_ON


    YES


    After you enable Flashback Database, you can view the flashback logs in your FRA
    with this query: select


    name


    ,log#


    ,thread#


    ,sequence#


    ,bytes


    from v$flashback_database_logfile;


    The range of time you can flash back is determined by the DB_FLASHBACK_RETENTION_TARGET


    parameter. This specifies the upper limit in minutes of how far your database
    can be flashed back.


    You can view the oldest SCN and time you can flash back your database by running
    the following SQL:


    select


    oldest_flashback_scn


    ,to_char(oldest_flashback_time,''dd-mon-yy hh24:mi:ss'')


    from v$flashback_database_log;


    If you need to disable Flashback Database for any reason, you can turn it off
    as follows: SQL> alter database flashback off;


    You can use either RMAN or SQL*Plus to flash back a database. You can specify
    a point in time in the past using one of the following:


    • SCN


    • Timestamp


    • Restore point


    • Last RESETLOGS operation (works from RMAN only)


    This example creates a restore point:


    SQL> create restore point flash_1;


    Next, the application performs some testing, after which the database is flashed
    back to the restore point so that a new round of testing can begin:


    SQL> shutdown immediate;


    SQL> startup mount;


    SQL> flashback database to restore point flash_1;


    SQL> alter database open resetlogs;'
