    Going Beyond the Basics


    Numerous MV features are available. Many of them are related to attributes that
    you can apply to any table, such as storage, indexing, compression, encryption,
    and so on. Other features are related to the type of MV created and how it’s refreshed.
    These aspects are described in the next several subsections.


    Creating MVs and Specifying Tablespace for MVs and Indexes


    Every MV has an underlying tables associated with it. Additionally, depending
    on the type of MV, an index may be automatically created. When you create an MV,
    you can specify the tablespace and storage characteristics for both the underlying
    table and index. The next example shows how to specify the tablespace to be used
    for the MV table and a separate tablespace for the index: create materialized
    view inv_mv


    tablespace mv_data


    using index tablespace mv_index


    as


    select


    inv_id


    ,inv_desc


    from inv;


    You can also specify storage characteristics. For example, if you know you’re
    loading data into MVs that will rarely be updated, it’s appropriate to set PCTUSED
    to a high value, such as 95\. For example: create materialized view inv_mv


    pctused 95


    pctfree 5


    tablespace mv_data


    using index tablespace mv_index


    as


    select


    inv_id


    ,inv_desc


    from inv;


    Creating Indexes on MVs


    An MV stores its data in a regular database table. Therefore, you can create indexes
    on the underlying table (just as you can for any other table). In general, follow
    the same guidelines for creating an index on an MV table as you would a regular
    table. (See Chapter 8 for more details on creating indexes.) Keep in mind that
    although indexes can significantly improve query performance, overhead is associated
    with maintaining the index for any inserts, updates, and deletes. Indexes also
    consume disk space.


    Listed next is an example of creating an index based on a column in an MV. The
    syntax is the same as for creating an index on a regular table:


    CHAPTER 15 ■ MATERIALIZED VIEWS


    SQL> create index inv_mv_idx1 on inv_mv(region_id) tablespace mv_index; You can
    display the indexes created for an MV by querying the USER_INDEXES view: select


    a.table_name


    ,a.index_name


    from user_indexes a


    ,user_mviews b


    where a.table_name = b.mview_name;


    ■ **Note** If you create a simple MV with the WITH PRIMARY KEY clause that selects
    from a base table that has a primary key, Oracle automatically creates an index
    on the corresponding primary-key columns in the MV. If you create a simple MV
    using the WITH ROWID clause that selects from a base table that has a primary
    key, Oracle automatically creates an index on a hidden column named M_ROW$$.


    Partitioning Materialized Views


    You can partition an MV table like any other regular table in the database. If
    you work with large MVs, you may want to consider partitioning to better manage
    and maintain a large table. Use the PARTITION


    clause when you create the MV. This example builds an MV that is partitioned by
    range on the DATE_ID


    column:


    create materialized view inv_mv


    partition by range (date_id)


    (partition p1


    values less than (20100101)


    ,partition p2


    values less than (20110101)


    ,partition p3


    values less than (20120101))


    refresh on demand complete with rowid


    as


    select


    inv_id


    ,inv_desc


    ,date_id


    from inv;


    The result set from the query is stored in a partitioned table. You can view the
    partition details for this table in USER_TAB_PARTITIONS and USER_PART_TABLES (just
    like any other partitioned table in your database). See chapter 12 for more details
    on partitioning strategies and maintenance.


    CHAPTER 15 ■ MATERIALIZED VIEWS


    Compressing a Materialized View


    As mentioned earlier, when you create an MV, an underlying table is created to
    store the data. Because this table is a regular database table, you can implement
    features such as compression. For example: create materialized view inv_mv


    compress


    as


    select


    inv_id


    ,inv_desc


    from inv;


    You can confirm the compression details with the following query:


    select


    table_name


    ,compression


    ,compress_for


    from user_tables where table_name=''INV_MV'';


    Here’s the output:


    TABLE_NAME COMPRESS COMPRESS_FOR


    ------------------------------ -------- ------------


    INV_MV ENABLED BASIC


    ■ **Note** Basic table compression doesn’t require an extra license from Oracle.
    Online transaction processing (OLTP) compression requires the Advanced Compression
    option, which requires an extra license from Oracle. See the Oracle Database Licensing
    Information documentation (available on OTN) for details.


    Encrypting Materialized View Columns


    As mentioned earlier, when you create an MV, an underlying table is created to
    store the data. Because this table is a regular database table, you can implement
    features such as encryption of columns. For example:


    create materialized view inv_mv


    (inv_id encrypt no salt


    ,inv_desc encrypt)


    as


    select


    inv_id inv_id


    ,inv_desc inv_desc


    from inv;


    For the previous statement to work, you must create and open a security wallet
    for your database.


    This feature requires the Advanced Security option from Oracle (which requires
    an additional license).


    You can verify that encryption is in place by describing the MV:


    CHAPTER 15 ■ MATERIALIZED VIEWS


    SQL> desc inv_mv


    Name Null? Type


    ----------------------------------------- -------- --------------------


    INV_ID NOT NULL NUMBER ENCRYPT


    INV_DESC VARCHAR2(30) ENCRYPT


    Building a Materialized View on a Prebuilt Table


    In data-warehouse environments, sometimes you need to create a table, populate
    it with large quantities of data, and then transform it into an MV. Or you may
    be replicating a large table and find that it’s more efficient to initially populate
    the remote MV by prebuilding the table with data using Data Pump. Listed next
    are the steps for building an MV on a prebuilt table:


    1\. Create a table.


    2\. Populate it with data.


    3\. Create an MV on the table created in step 1.


    Here’s a simple example to illustrate the process. First, you create a table:
    create table inv_mv


    (inv_id number


    ,inv_desc varchar2(30)


    );


    Now, populate the table with data. For example, in a data-warehouse environment,
    this can be a table loaded using Data Pump, SQL*Loader, or external tables.


    Finally, run the CREATE MATERIALIZED VIEW...ON PREBUILT TABLE statement to turn
    the table into an MV. The MV name and the table name must be identical. Additionally,
    each column in the query must correspond to a column in the table. For example:


    create materialized view inv_mv


    on prebuilt table


    using index tablespace mv_index


    as


    select


    inv_id


    ,inv_desc


    from inv;


    Now the INV_MV object is an MV. If you attempt to drop the INV_MV table, the following
    error is thrown, indicating that INV_MV is now a materialized view:


    SQL> drop table inv_mv;


    ORA-12083: must use DROP MATERIALIZED VIEW to drop "MV"."INV_MV"


    The prebuilt-table feature is useful in data-warehouse environments where typically
    there are long periods when a base table isn’t being actively updated. This gives
    you time to load a prebuilt table and ensure that its contents are identical to
    the base table. After you create the MV on the prebuilt table, you can fast-refresh
    the MV and keep it in synch with the base table.


    If your base table (specified in the SELECT clause of the MV) is continuously
    being updated, then creating an MV on a prebuilt table may not be a viable option.
    This is because there is no way to ensure that the prebuilt table stays in synch
    with the base table.


    CHAPTER 15 ■ MATERIALIZED VIEWS


    ■ **Note** For MVs created on prebuilt tables, if you subsequently issue a DROP
    MATERIALIZED VIEW statement, the underlying table isn’t dropped. This has some
    interesting implications when you need to modify a base table (like adding a column).
    For details, see the section later in this chapter on Modifying Base-Table DDL
    and Propagating to Materialized Views.


    Creating an Unpopulated Materialized View


    When you create an MV, you have the option of instructing Oracle whether or not
    to initially populate the MV with data. For example, if it takes several hours
    to initially build an MV, you may want to first define the MV and then populate
    it as a separate job.


    This example uses the BUILD DEFERRED clause to instruct Oracle not to initially
    populate the MV with the results of the query:


    create materialized view inv_mv


    tablespace mv_data


    build deferred


    refresh complete on demand


    as


    select


    inv_id


    ,inv_desc


    from inv;


    At this point, querying the MV results in zero rows returned. At some later point,
    you can initiate a complete refresh to populate the MV with data.


    Creating a Materialized View Refreshed on Commit


    You may have a requirement when data is modified in the master table to have it
    immediately copied to an MV. In this scenario, use the ON COMMIT clause when you
    create the MV. The master table must have an MV log created on it for this technique
    to work. Here’s a simple example that creates a table with a primary key, creates
    an MV log, and then creates an MV refreshed on commit: create table inv(inv_id
    number primary key,


    inv_desc varchar2(30));


    --


    create materialized view log on inv with primary key;


    --


    create materialized view inv_mv


    refresh


    on commit


    as


    select inv_id, inv_desc from inv;


    As data is inserted and committed in the master table, any changes are also available
    in the MV that would be selected by the MV query.


    CHAPTER 15 ■ MATERIALIZED VIEWS


    The ON COMMIT refreshable MV has a few restrictions you need to be aware of:


    • The master table and MV must be in the same database.


    • You can’t execute distributed transaction on the base table.


    • This approach isn’t supported with MVs that contain object types or Oracle-supplied
    types.


    Also consider the overhead associated with committing data simultaneously in two
    places; this can impact the performance of a high-transaction OLTP system. Additionally,
    if there is any problem with updating the MV, then the base table can’t commit
    a transaction. For example, if the tablespace in which the MV is created becomes
    full (and can’t allocate another extent), you see an error such as this when trying
    to insert into the base table:


    ORA-12008: error in materialized view refresh path


    ORA-01653: unable to extend table MV.INV_MV by 16 in tablespace TBSP2


    For these reasons, you should use this feature only when you’re sure it won’t
    affect performance or availability.


    ■ **Note** You can’t specify an MV to be refreshed with both ON COMMIT and ON
    DEMAND. In addition, ON COMMIT isn’t compatible with the START WITH and NEXT clauses
    of the CREATE MATERIALIZED VIEW statement.


    Creating a Never-Refreshable Materialized View


    You may never want an MV to be refreshed. For example, you may want to guarantee
    that you have a snapshot of table at a point in time for auditing purposes. Specify
    the NEVER REFRESH clause when you create the MV to achieve this:


    create materialized view inv_mv


    tablespace mv_data


    using index tablespace mv_index


    never refresh


    as


    select


    inv_id


    ,inv_desc


    from inv;


    If you attempt to refresh a nonrefreshable MV, you receive this error: ORA-23538:
    cannot explicitly refresh a NEVER REFRESH materialized view You can alter a never-refreshable
    view to being refreshable. Use the ALTER MATERIALIZED VIEW


    statement to do this:


    SQL> alter materialized view inv_mv refresh on demand complete;


    CHAPTER 15 ■ MATERIALIZED VIEWS


    You can verify the refresh mode and method with the following query:


    select


    mview_name


    ,refresh_mode


    ,refresh_method


    from user_mviews;


    Creating Materialized Views for Query-Rewrite


    Query rewrite allows the optimizer to recognize that an MV can be used to fulfill
    the requirements of a query instead of using the underlying master (base) tables.
    If you have an environment where users frequently write their own queries and
    are unaware of the available MVs, this feature can help greatly with performance.
    There are three prerequisites for enabling query-rewrite:


    • Oracle Enterprise Edition


    • Database initialization parameter QUERY_REWRITE_ENABLED must be set to TRUE


    (which is the default in Oracle Database 10 *g* or higher


    • MV either created or altered with the ENABLE QUERY REWRITE clause


    This example creates an MV with query-rewrite enabled:


    create materialized view sales_mv


    tablespace mv_data


    using index tablespace mv_index


    enable query rewrite


    as


    select


    sum(sales_amt)


    ,b.reg_desc


    from sales a


    ,region b


    where a.region_id = b.region_id


    group by b.reg_desc;


    You can tell if query-rewrite is enabled for an MV by selecting the REWRITE_ENABLED
    column from USER_MVIEWS:


    select


    mview_name


    ,rewrite_enabled


    ,rewrite_capability


    from user_mviews


    where mview_name = ''SALES_MV'';


    Here’s the output:


    MVIEW_NAME R REWRITE_C


    ---------- - ---------


    SALES_MV Y GENERAL


    If for any reason a query isn’t using the query-rewrite functionality, and you
    think it should be, use the EXPLAIN_REWRITE procedure of the DBMS_MVIEW package
    to diagnose issues.


    CHAPTER 15 ■ MATERIALIZED VIEWS


    Creating a Fast-Refreshable MV Based on a Complex Query


    In many situations, when you base an MV on a query that joins multiple tables,
    it’s deemed complex, and therefore is available only for a complete refresh. However,
    in some scenarios, you can create a fast-refreshable MV when you reference two
    tables that are joined together in the MV query.


    This section describes how to use the EXPLAIN_MVIEW procedure of the DBMS_MVIEW
    to determine whether it’s possible to fast-refresh a complex query. To help you
    completely understand the example, this section shows the SQL used to create the
    base tables. Say you have two base tables, REGION and INV, which are defined as
    follows:


    create table region(


    region_id number


    ,reg_desc varchar2(30)


    ,constraint region_pk primary key(region_id));


    --


    create table inv(


    inv_id number


    ,inv_desc varchar2(30)


    ,region_id number


    ,constraint inv_pk primary key(inv_id)


    ,constraint dept_fk foreign key (region_id) references region(region_id)); Additionally,
    REGION and INV have MV logs created on them as follows: SQL> create materialized
    view log on region with primary key;


    SQL> create materialized view log on inv with primary key;


    Also, for this example, the base tables have the following data inserted into
    them: insert into region values(10,''East'');


    insert into region values(20,''West'');


    insert into region values(30,''South'');


    insert into region values(40,''North'');


    --


    insert into inv values(1,''book'',10);


    insert into inv values(2,''table'',20);


    insert into inv values(3,''chair'',30);


    Suppose you want to create an MV that joins the REGION and INV base tables as
    follows: create materialized view inv_mv


    tablespace mv_data


    using index tablespace mv_index


    as


    select


    a.inv_desc


    ,b.reg_desc


    from inv a


    ,region b


    where a.region_id = b.region_id;


    Next, let’s attempt to fast-refresh the MV:


    SQL> exec dbms_mview.refresh(''INV_MV'',''F'');


    This error is thrown:


    ORA-12032: cannot use rowid column from materialized view log on "MV"."REGION"


    CHAPTER 15 ■ MATERIALIZED VIEWS


    The error indicates that the MV has issues and can’t be fast-refreshed. To determine
    whether this MV can become fast-refreshable, use the output of the EXPLAIN_MVIEW
    procedure of the DBMS_MVIEW


    package. This procedure requires that you first create MV_CAPABILITIES_TABLE first
    be created. Oracle provides a script to do this. Run this as the owner of the
    MV:


    SQL> @?/rdbms/admin/utlxmv.sql


    After you create the table, run the EXPLAIN_MVIEW procedure to populate it: SQL>
    exec dbms_mview.explain_mview(mv=>''INV_MV'',stmt_id=>''100''); Now, query MV_CAPABILITIES_TABLE
    to see what potential issues this MV may have: select


    capability_name


    ,possible


    ,msgtxt


    ,related_text


    from mv_capabilities_table


    where capability_name like ''REFRESH_FAST_AFTER%''


    and statement_id = ''100''


    order by 1;


    Listed next is the output. The P (POSSIBLE) column contains an N (NO) for every
    fast-refresh possibility:


    CAPABILITY_NAME P MSGTXT RELATED_TEXT


    ------------------------------ - ------------------------------ ---------------


    REFRESH_FAST_AFTER_ANY_DML N see the reason why REFRESH_FAS


    T_AFTER_ONETAB_DML is disabled


    REFRESH_FAST_AFTER_INSERT N mv log must have ROWID MV.REGION


    REFRESH_FAST_AFTER_INSERT N the SELECT list does not have B


    the rowids of all the detail t


    ables


    REFRESH_FAST_AFTER_INSERT N mv log must have ROWID MV.INV


    REFRESH_FAST_AFTER_ONETAB_DML N see the reason why REFRESH_FAS


    T_AFTER_INSERT is disabled


    MSGTXT indicates one issue: the MV logs need to be ROWID based. Let’s drop and
    re-create the MV logs with ROWID (instead of a primary key):


    drop materialized view log on region;


    drop materialized view log on inv;


    --


    create materialized view log on region with rowid;


    create materialized view log on inv with rowid;


    Next, reset MV_CAPABILITIES_TABLE and repopulate it via the EXPLAIN_MVIEW procedure:
    SQL> delete from mv_capabilities_table where statement_id=100;


    SQL> exec dbms_mview.explain_mview(mv=>''INV_MV'',stmt_id=>''100''); Re-running
    the previous query that selects from MV_CAPABILITIES_TABLE (not reproduced here)
    shows the output:


    CAPABILITY_NAME P MSGTXT RELATED_TEXT


    ------------------------------ - ------------------------------ ---------------


    REFRESH_FAST_AFTER_ANY_DML N see the reason why REFRESH_FAS


    CHAPTER 15 ■ MATERIALIZED VIEWS


    T_AFTER_ONETAB_DML is disabled


    REFRESH_FAST_AFTER_INSERT N mv log is newer than last full MV.REGION


    refresh


    REFRESH_FAST_AFTER_INSERT N the SELECT list does not have B


    the rowids of all the detail t


    ables


    REFRESH_FAST_AFTER_INSERT N mv log is newer than last full MV.INV


    refresh


    REFRESH_FAST_AFTER_ONETAB_DML N see the reason why REFRESH_FAS


    T_AFTER_INSERT is disabled


    From the previous output, the MV SELECT statement needs to contain the ROWIDs
    of the base tables.


    The next few lines of code drop the MV and re-create it with the SQL statement
    rewritten to contain the ROWIDs:


    drop materialized view inv_mv;


    --


    create materialized view inv_mv


    as


    select


    a.rowid inv_rowid


    ,b.rowid region_rowid


    ,a.inv_desc


    ,b.reg_desc


    from inv a


    ,region b


    where a.region_id = b.region_id;


    Next, reset MV_CAPABILITIES_TABLE and repopulate it via the EXPLAIN_MVIEW procedure:
    SQL> delete from mv_capabilities_table where statement_id=100;


    SQL> exec dbms_mview.explain_mview(mv=>''INV_MV'',stmt_id=>''100''); The output
    shows that it’s now possible to fast-refresh the MV:


    CAPABILITY_NAME P MSGTXT RELATED_TEXT


    ------------------------------ - ------------------------------ ---------------


    REFRESH_FAST_AFTER_ANY_DML Y


    REFRESH_FAST_AFTER_INSERT Y


    REFRESH_FAST_AFTER_ONETAB_DML Y


    Execute the following statement to see if the fast refresh works:


    SQL> exec dbms_mview.refresh(''INV_MV'',''F'');


    PL/SQL procedure successfully completed.


    The EXPLAIN_MVIEW procedure is a powerful tool that allows you to determine whether
    a refresh capability is possible and, if it’s not possible, why it isn’t and how
    to potentially resolve the issue.


    Viewing Materialized View DDL


    To quickly view the SQL query on which an MV is based, select from the QUERY column
    of DBA/ALL/USER_MVIEWS. If you’re using SQL*Plus, first set the LONG variable
    to a value large enough to display the entire contents of a LONG column:


    CHAPTER 15 ■ MATERIALIZED VIEWS


    SQL> set long 5000


    SQL> select query from dba_mviews where mview_name=UPPER(''&&mview_name''); To
    view the entire Data Definition Language ()DDL required to re-create an MV, use
    the DBMS_METADATA package (you also need to set the LONG variable to a large value
    if using SQL*Plus): SQL> select dbms_metadata.get_ddl(''MATERIALIZED_VIEW'',''INV_MV'')
    from dual; Here’s the output for this example:


    CREATE MATERIALIZED VIEW "MV"."INV_MV" ("INV_ROWID", "REGION_ROWID", "INV_DESC",


    "REG_DESC") ORGANIZATION HEAP PCTFREE 10 PCTUSED 40 INITRANS 1


    MAXTRANS 255 NOCOMPRESS LOGGING


    STORAGE(INITIAL 65536 NEXT 1048576 MINEXTENTS 1 MAXEXTENTS 2147483645


    PCTINCREASE 0 FREELISTS 1 FREELIST GROUPS 1 BUFFER_POOL DEFAULT FLASH_CACHE


    DEFAULT CELL_FLASH_CACHE DEFAULT)


    TABLESPACE "USERS"


    BUILD IMMEDIATE


    USING INDEX


    REFRESH FORCE ON DEMAND


    USING DEFAULT LOCAL ROLLBACK SEGMENT


    USING ENFORCED CONSTRAINTS DISABLE QUERY REWRITE


    AS select


    a.rowid inv_rowid


    ,b.rowid region_rowid


