    \ cron 任务的相关信息。\n\n## 自动化 DBA 任务示例\n\n在当今通常混乱的商业环境中，自动化任务几乎是强制性的。如果不进行自动化，你可能会忘记执行某项任务，或者在手动执行工作时引入错误。如果不进行自动化，你可能会发现自己被一组更高效或更便宜的\
    \ DBA 取代或外包。\n\n当我自动化任务时，脚本通常只在失败的情况下才发送电子邮件。\n\n在成功时生成电子邮件通常会导致邮箱爆满。有些 DBA 喜欢看到成功消息。我通常不喜欢。\n\
    \nDBA 自动化各种各样的任务和工作。几乎任何类型的环境都要求你创建某种操作系统脚本，该脚本封装了操作系统命令、SQL 语句和 PL/SQL 块的组合。\n\
    \n本章中的以下脚本是 DBA 将自动化的各种不同类型任务的示例。这套脚本绝非完整。其中许多脚本在你的环境中可能不需要。关键是要给你提供一个良好的采样，展示自动化的任务类型以及用于完成特定任务的技术。\n\
    \n**注意** 第 3 章包含了一些 DBA 所需的核心脚本的基础示例。本节提供了 DBA 常自动化的任务和脚本的高级示例。\n\n## 启动和停止数据库与监听器\n\
    \n在许多环境中，希望 Oracle 数据库和监听器在服务器重启时自动关闭和启动。如果你有此要求，那么请按照以下步骤自动化你的数据库和监听器的关闭和启动：\n\
    \n1.  编辑 `/etc/oratab` 文件，并在你希望系统重启时自动重启的数据库条目末尾放置一个 `Y`。你可能需要 `root` 权限来编辑该文件：\n\
    \n    ```\n    # vi /etc/oratab\n    ```\n\n2.  在文件中为你的环境添加一行类似以下的内容：`O11R2:/oracle/app/oracle/product/11.2.0/db_1:Y`\n\
    \n3.  在上一行中，`O11R2` 是数据库名称，`/oracle/app/oracle/product/11.2.0/db_1` 指定了 `ORACLE_HOME`\
    \ 目录。\n\n    末尾的 `Y` 表示该数据库可以由 `ORACLE_HOME/bin/dbstart` 和 `ORACLE_HOME/bin/dbshut`\
    \ 脚本启动和停止。\n\n    如果你不希望数据库自动停止和重启，可以将 `Y` 替换为 `N`。\n\n    **注意** 在某些 Unix 系统（如\
    \ Solaris）中，oratab 文件通常位于 `/var/opt/oracle` 目录。\n\n4.  以 `root` 身份导航到 `/etc/init.d`\
    \ 目录，并创建一个名为 `dbora` 的文件：\n\n    ```\n    # cd /etc/init.d\n    # vi dbora\n \
    \   ```\n\n5.  将以下行放入 `dbora` 文件中。确保将变量 `ORA_HOME` 和 `ORA_OWNER` 的值更改为匹配你的环境。这是一个用于停止和启动数据库及监听器的最简骨架脚本：\n\
    \n    ```\n    #!/bin/bash\n    # chkconfig: 35 99 10\n    # description: Starts\
    \ and stops Oracle processes\n    ORA_HOME=/oracle/app/oracle/product/11.2.0/db_1\n\
    \    ORA_OWNER=oracle\n    case \"$1\" in\n    'start')\n        su - $ORA_OWNER\
    \ -c \"$ORA_HOME/bin/lsnrctl start\"\n        su - $ORA_OWNER -c $ORA_HOME/bin/dbstart\n\
    \        ;;\n    'stop')\n        su - $ORA_OWNER -c \"$ORA_HOME/bin/lsnrctl stop\"\
    \n        su - $ORA_OWNER -c $ORA_HOME/bin/dbshut\n        ;;\n    esac\n    ```\n\
    \n这些行在 `dbora` 文件中看起来像注释，但实际上是必需的行：\n\n```\n# chkconfig: 35 99 10\n```\n"
- fmt: "# description: Starts and stops Oracle processes\n\nThese lines describe the\
    \ service characteristics of the script. The 35 means the service will be started\
    \ in runlevels 3 and 5. The 99 indicates that the service will be started near\
    \ the end of the init processing.\n\nThe 10 signifies that the service will be\
    \ stopped near the beginning of the init processing. A description is also required\
    \ that provides textual information about the service.\n\n**Note** A Linux runlevel\
    \ is a logical container for specifying which services will run when the system\
    \ is started.\n\n1.  Change the group of the `dbora` file to match the group assigned\
    \ to the operating system owner of the Oracle software (usually `oinstall` or\
    \ `dba`):\n    ```bash\n    # chgrp dba dbora\n    ```\n2.  Change the permissions\
    \ on the `dbora` file to 750:\n    ```bash\n    # chmod 750 dbora\n    ```\n3.\
    \  Run the following `chkconfig` command:\n    ```bash\n    # /sbin/chkconfig\
    \ --add dbora\n    ```\n\nHere, the `chkconfig` command registers the service\
    \ script. This also creates the appropriate symbolic links to files beneath the\
    \ `/etc/rc.d` directory. Use the `--list` option to display whether a service\
    \ is on or off for each runlevel:\n```bash\n# chkconfig --list | grep dbora\n\
    dbora 0:off 1:off 2:off 3:on 4:off 5:on 6:off\n```\nThis output indicates the\
    \ `dbora` service is on for runlevels 3 and 5. If you need to delete a service,\
    \ use the `--del` option of `chkconfig`.\n\n**Tip** If you want to automatically\
    \ stop and start (on system reboots) other processes such as the Intelligent Agent,\
    \ Management Server, and the HTTP Server, see My Oracle Support Note 222813.1\
    \ for details.\n\nAutomating the shutdown and startup of your Oracle database\
    \ will vary depending on whether you’re using tools like cluster software or ASM.\
    \ The solution in this section demonstrates the typical steps to implement the\
    \ shutdown and startup of your database in the scenarios where you don’t have\
    \ other software that manages this task.\n\n![](index-619_1.png)\n\n## CHAPTER\
    \ 21 ■ AUTOMATING JOBS\n\nTo set the default runlevel, specify `N` in the `id:<N>:initdefault`\
    \ line in the `/etc/inittab` file. The following example sets the default runlevel\
    \ to 5:\n```\nid:5:initdefault:\n```\n\nThe runlevel of 1 is used by system administrators\
    \ (SAs) when performing maintenance and repairs. The runlevel of 5 will start\
    \ the Linux server with a graphical login screen at the console plus networking\
    \ capabilities. However, if you have a problem running the display manager at\
    \ the console—due to a video driver issue, for example—then you can start in runlevel\
    \ 3 instead, which is command-line-based but still has networking services.\n\n\
    Most SAs who are security conscious operate their servers on runlevel 3. With\
    \ the wide acceptance of VNC, SAs oftentimes do not see the benefit of running\
    \ on runlevel 5. If an SA wants to take advantage of graphical utilities, they’ll\
    \ just use VNC (or a similar tool). Do not, by the way, attempt to set `initdefault`\
    \ to either 0 or 6, because your Linux server will never start.\n\nTo determine\
    \ the current runlevel, you can run `who -r` or `runlevel` as follows:\n```bash\n\
    # runlevel\nN 5\n# who -r\nrun-level 5 Jun 17 00:29 last=S\n```\n\nA given runlevel\
    \ governs which scripts Linux will run when starting. These scripts are located\
    \ in the directory `/etc/rc.d/rc<N>.d`, where `<N>` corresponds to the runlevel.\
    \ For runlevel 5, the scripts are in the `/etc/rc.d/rc5.d` directory. For example,\
    \ when Linux starts up in runlevel 5, one of the scripts it will run is `/etc/rc.d/rc5.d/S55sshd`,\
    \ which is actually a softlink to `/etc/rc.d/init.d/sshd`.\n\n## Checking for\
    \ Archive Redo Destination Fullness\n\nSometimes DBAs and system administrators\
    \ don't adequately plan and implement a location to be used on disk to store archive\
    \ redo log files. In these scenarios it's sometimes convenient to have a script\
    \ that checks for space in the primary location and send out warnings before the\
    \ archive redo destination becomes full. In addition, you may want to implement\
    \ within the script to automatically switch the archive redo log location to an\
    \ alternate location that has adequate disk space.\n\nI've only used scripts like\
    \ this in chaotic environments that have issues with the archive redo log destination\
    \ filling up at unpredictable frequencies. If the archive redo log destination\
    \ fills up, the database will hang. In some environments, this is highly unacceptable.\
    \ You could argue that a DBA should plan and never let herself get into this type\
    \ of situation. However, if you're brought in to maintain an unpredictable environment\
    \ and you're the one getting the phone calls at 2:00 a.m., you may want to consider\
    \ implementing a script such as the one listed in the section.\n\nBefore using\
    \ the script in Listing 21–4, change the variables within the script to match\
    \ your environment. For example, `SWITCH_DIR` should point to an alternate location\
    \ on disk where you can safely switch the archive redo log destination in the\
    \ event the primary destination becomes full. The script will send warning e-mails\
    \ when the threshold gets below the amount of space specified by the `THRESH_GET_WORRIED`\
    \ variable. If the archive redo log space falls below the value contained in the\
    \ `THRESH_SPACE_CRIT` variable, then the destination will automatically be switched\
    \ to the directory contained in the `SWITCH_DIR` variable.\n\n## CHAPTER 21 ■\
    \ AUTOMATING JOBS\n\n**Listing 21–4.** Archive Redo Destination Space Survey Script\n\
    ```bash\n#!/bin/bash\n\nPRG=`basename $0`\nDB=$1\nUSAGE=\"Usage: ${PRG} <sid>\"\
    \n\nif [ -z \"$DB\" ]; then\n    echo \"${USAGE}\"\n    exit 1\nfi\n\n# source\
    \ OS variables\n. /var/opt/oracle/oraset ${DB}\n\n# Set an alternative location,\
    \ make sure it exists and has space.\nSWITCH_DIR=/oradump01/${DB}/archivelog\n\
    \n# Set thresholds for getting concerned and switching.\nTHRESH_GET_WORRIED=2000000\
    \ # 2Gig from df -k\nTHRESH_SPACE_CRIT=1000000 # 1Gig from df -k\n\nMAILX=\"/bin/mailx\"\
    \nMAIL_LIST=\"dkuhn@sun.com \"\nBOX=`uname -a | awk '{print$2}'`\n\n#\nloc=`sqlplus\
    \ -s <<EOF\nCONNECT / AS sysdba\nSET HEAD OFF FEEDBACK OFF\nSELECT SUBSTR(destination,1,INSTR(destination,'/',1,2)-1)\n\
    FROM v\\$archive_dest WHERE dest_name='LOG_ARCHIVE_DEST_1';\nEOF`\n\n#\nfree_space=`df\
    \ -k | grep ${loc} | awk '{print $4}'`\necho box = ${BOX}, sid = ${DB}, Arch Log\
    \ Mnt Pnt = ${loc}\necho \"free_space = ${free_space} K\"\necho \"THRESH_GET_WORRIED=\
    \ ${THRESH_GET_WORRIED} K\"\necho \"THRESH_SPACE_CRIT = ${THRESH_SPACE_CRIT} K\"\
    \n\n#\nif [ $free_space -le $THRESH_GET_WORRIED ]; then\n    $MAILX -s \"Arch\
    \ Redo Space Low ${DB} on $BOX\" $MAIL_LIST <<EOF\nArchive log dest space low,\
    \ box: $BOX, sid: ${DB}, free space: $free_space\nEOF\nfi\n\n#\nif [ $free_space\
    \ -le $THRESH_SPACE_CRIT ]; then\n    sqlplus -s << EOF\nCONNECT / AS sysdba\n\
    ALTER SYSTEM SET log_archive_dest_1='location=${SWITCH_DIR}';\nALTER SYSTEM SWITCH\
    \ LOGFILE;\nEOF\n    $MAILX -s \"Archive Switch ${DB} on $BOX\" $MAIL_LIST <<EOF\n\
    Archive log dest, box: $BOX, sid: ${DB} has switched.\nThen ALTER SYSTEM SET LOG_ARCHIVE_DEST_1='location=<Normal\
    \ Location>';\nEOF\nelse\n    echo no need to switch, ${free_space} KB free on\
    \ ${loc}\nfi\n\n#\nexit 0\n```\n\nThe prior script assumes that you've set your\
    \ `LOG_ARCHIVE_DEST_1` initialization parameter to set your archive redo location.\
    \ If you're using a FRA for the location of your archive redo log files, you can\
    \ derive the archive location from the `V$ARCHIVED_LOG` view, for example:\n```sql\n\
    select\nsubstr(name,1,instr(name,'/',1,2)-1)\nfrom v$archived_log\nwhere first_time\
    \ =\n    (select max(first_time) from v$archived_log);\n```\n\nTypically I'll\
    \ run a script to check the archive redo log destination once an hour. Here's\
    \ a typical `cron` entry:\n```\n#---------------------------------------------------\n\
    ```"
