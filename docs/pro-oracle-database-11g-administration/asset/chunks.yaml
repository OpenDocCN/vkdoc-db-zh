    This output shows the DDL that Oracle thinks is required to re-create the MV.
    This is usually the most reliable way to generate the DDL associated with an MV.


    Dropping a Materialized View


    You may occasionally need to drop an MV. Perhaps a view is no longer being used,
    or you need to drop and re-create an MV to change the underlying query on which
    the MV is based (such as adding a column to it). Use the DROP MATERIALIZED VIEW
    command to drop an MV. This example drops a view named ORDERS_MV:


    SQL> drop materialized view orders_mv;


    When you drop an MV, the MV object, the table object, and any corresponding indexes
    are also dropped. Dropping an MV doesn’t affect any MV logs—an MV log is dependent
    only on the master table.


    You can also specify that the underlying table be preserved. You may want to do
    this if you’re troubleshooting and need to drop the MV definition but keep the
    MV table and data. For example: SQL> drop materialized view inv_mv preserve table;


    In this scenario, you can also use the underlying table later as the basis for
    an MV by building the MV using the ON PREBUILT TABLE clause.


    CHAPTER 15 ■ MATERIALIZED VIEWS


    If the MV was originally built using the ON PREBUILT TABLE clause, then when you
    drop the MV, the underlying table isn’t dropped. If you want the underlying table
    dropped, you must use a DROP TABLE


    statement:


    SQL> drop materialized view inv_mv;


    SQL> drop table inv_mv;


    Modifying Materialized Views


    This section describes common maintenance tasks associated with MVs. Topics covered
    include how to modify an MV to reflect column changes that have been applied to
    the base table some time after the MV


    was initially created, and modifying attributes such as logging and parallelism.


    Modifying Base-Table DDL and Propagating to Materialized Views


    A common task involves adding a column to or dropping a column from a base table
    (because business requirements have changed). After the column is added to or
    dropped from the base table, you want those DDL changes to be reflected in any
    dependent MVs. You have a few options for propagating base-table column changes
    to dependent MVs:


    • Drop and re-create the MV with the new column definitions.


    • Drop the MV, but preserve the underlying table, modify the MV table, and then
    recreate the MV (with the new column changes) using the ON PREBUILT TABLE clause.


    • If the MV was originally created using the ON PREBUILT TABLE clause, drop the
    MV


    object, modify the MV table, and then re-create the MV (with the new column changes)
    using the ON PREBUILT TABLE clause.


    With any of the previous options, you have to drop and re-create the MV so that
    it’s aware of the column changes in the base table. These approaches are described
    next.


    Re-creating a Materialized View to Reflect Base-Table Modifications


    Suppose you make a modification to a base table, such as adding a column: SQL>
    alter table inv add(inv_loc varchar2(30));


    You also have a simple MV named INV_MV that is based on this table. You want the
    base-table modification to be reflected in the MV. How do you accomplish this
    task? You know that the MV


    contains an underlying table that stores the results. You decide to modify the
    underlying MV table directly:


    SQL> alter table inv_mv add(inv_loc varchar2(30));


    The alteration is successful. You next refresh the MV but realize that the additional
    column isn’t being refreshed. To understand why, recall that an MV is a SQL query
    that stores its results in an underlying table. Therefore, to modify an MV, you
    have to change the SQL query that the MV is based on. Because there is no ALTER
    MATERIALIZED VIEW ADD/DROP/MODIFY <column> statement, you must do the following
    to add/delete columns in an MV:


    CHAPTER 15 ■ MATERIALIZED VIEWS


    1\. Alter the base table.


    2\. Drop and re-create the MV to reflect the changes in the base table.


    Here’s an example. Say you need to add a column INV_LOC to the base INV table:
    SQL> alter table inv add(inv_loc varchar2(30));


    Drop and re-create the MV to include the column definition:


    drop materialized view inv_mv;


    --


    create materialized view inv_mv


    refresh fast on demand


    as


    select


    inv_id


    ,inv_desc


    ,inv_loc


    from inv;


    This approach may take a long time if large amounts of data are involved. You
    have downtime for any application that accesses the MV while it’s being rebuilt.
    If you work in a large data-warehouse environment, then due to the amount of time
    it takes to completely refresh the MV, you may want to consider not dropping the
    underlying table. This option is discussed in the next section.


    Altering a Materialized View but Preserving the Underlying Table


    When you drop an MV, you have the option of preserving the underlying table and
    its data. You may find this approach advantageous when you’re working with large
    MVs in data-warehouse environments.


    Here are the steps:


    1.


    Alter the base table.


    2.


    Drop the MV, but preserve the underlying table.


    3.


    Modify the underlying table.


    4.


    Re-create the MV using the ON PREBUILT TABLE clause.


    Here’s a simple example to illustrate this procedure:


    SQL> alter table inv add(inv_loc varchar2(30));


    Drop the MV, but specify that you want to preserve the underlying table: SQL>
    drop materialized view inv_mv preserve table;


    Now, modify the underlying table:


    SQL> alter table inv_mv add(inv_loc varchar2(30));


    Next, create the MV using the ON PREBUILT TABLE clause:


    create materialized view inv_mv


    on prebuilt table


    using index tablespace mv_index


    as


    select


    CHAPTER 15 ■ MATERIALIZED VIEWS


    inv_id


    ,inv_desc


    ,inv_loc


    from inv;


    This allows you to redefine the MV without dropping and completely refreshing
    the data. Be aware that if there is any Data Manipulation Language (DML) activity
    against the base table during the MV


    rebuild operation, those transactions aren’t reflected in the MV when you attempt
    to refresh it. In data-warehouse environments, you typically have a known schedule
    for loading base tables and therefore should be able to schedule the MV alteration
    during a maintenance window when no transactions are occurring in the base table.


    Altering a Materialized View Created on a Prebuilt Table


    If you originally created an MV using the ON PREBUILT TABLE clause, then you can
    perform a procedure similar to that shown in the previous section when preserving
    the underlying table. Here are the steps for modifying an MV that was created
    using the ON PREBUILT TABLE clause: 1. Alter the base table.


    2\. Drop the MV. For MVs built on prebuilt tables, this doesn’t drop the underlying
    table.


    3\. Alter the prebuilt table.


    4\. Re-create the MV on the prebuilt table.


    Here’s a simple example to illustrate this process. For clarity, the original
    definition of the table and MV are shown. Here’s the base-table definition:


    create table inv(


    inv_id number primary key


    ,inv_desc varchar2(30));


    To create an MV on a prebuilt table, you must first create a table:


    create table inv_mv (


    inv_id number


    ,inv_desc varchar2(30));


    Here’s the definition of a simple MV that is created using a prebuilt table and
    uses INV as a base table:


    create materialized view inv_mv


    on prebuilt table


    using index tablespace mv_index


    as


    select


    inv_id


    ,inv_desc


    from inv;


    Suppose you alter the base table as follows:


    SQL> alter table inv add (inv_loc varchar2(30));


    CHAPTER 15 ■ MATERIALIZED VIEWS


    Drop the MV:


    SQL> drop materialized view inv_mv;


    For MVs created on prebuilt tables, this doesn’t drop the underlying table—only
    the MV object is dropped. Next, add a column to the prebuilt table:


    SQL> alter table inv_mv add(inv_loc varchar2(30));


    Now you can rebuild the MV using the prebuilt table with the new INV_LOC column
    added: create materialized view inv_mv


    on prebuilt table


    using index tablespace mv_index


    as


    select


    inv_id


    ,inv_desc


    ,inv_loc


    from inv;


    This process has the advantage of allowing you to modify an MV definition without
    dropping the underlying table. You have to drop the MV, alter the underlying table,
    and then re-create the MV with the new definition. If the underlying table contains
    a large amount of data, this method can prevent unwanted downtime.


    As mentioned in the previous section, you need to be aware that if there is any
    DML activity against the base table during the MV rebuild operation, those transactions
    aren’t reflected in the MV when you attempt to refresh it.


    Toggling Redo Logging on a Materialized View


    Recall that an MV has an underlying database table. When you refresh an MV, this
    initiates transactions in the underlying table that result in the generation of
    redo (just as with a normal database table). In the event of a database failure,
    you can restore and recover all the transactions associated with an MV.


    By default, redo logging is enabled when you create an MV. You have the option
    of specifying that redo not be logged when an MV is refreshed. To enable no logging,
    create the MV with the NOLOGGING


    option:


    create materialized view inv_mv


    nologging


    tablespace mv_data


    using index tablespace mv_index


    as


    select


    inv_id


    ,inv_desc


    from inv;


    You can also alter an existing MV into no-logging mode:


    SQL> alter materialized view inv_mv nologging;


    If you want to re-enable logging, then do as follows:


    SQL> alter materialized view inv_mv logging;


    To verify that the MV has been switched to NOLOGGING, query the USER_TABLES view:
    388


    CHAPTER 15 ■ MATERIALIZED VIEWS


    select


    a.table_name


    ,a.logging


    from user_tables a


    ,user_mviews b


    where a.table_name = b.mview_name;


    The advantage of enabling no logging is that refreshes take place more quickly,
    because the database doesn’t have the overhead of logging redo information. The
    big downside is that if a media failure occurs soon after an MV has been refreshed,
    you can’t recover the data in the MV. In this scenario, the first time you attempt
    to access the MV, you receive an error such as: ORA-01578: ORACLE data block corrupted
    (file # 32, block # 131)


    ORA-01110: data file 32: ''/ora01/dbfile/O11R2/mvdata01.dbf''


    ORA-26040: Data block was loaded using the NOLOGGING option


    If you get the previous error, then you’ll most likely have to completely refresh
    the MV to make the data accessible again. In many environments, this may be acceptable.
    You save on database resources by not generating redo for the MV, but the downside
    is a longer restore process (in the event of a failure) that requires you to completely
    refresh the MV.


    Altering Parallelism


    Sometimes an MV is created with a high degree of parallelism to improve the performance
    of the creation process. After you create the MV, you may not need the same degree
    of parallelism associated with the underlying table. You can alter an MV’s parallelism
    as follows: SQL> alter materialized view inv_mv parallel 1;


    You can check on the degree of parallelism by querying USER_TABLES:


    SQL> select table_name, degree from user_tables where table_name= upper(''&mv_name'');
    TABLE_NAME DEGREE


    ------------------------------ ------


    INV_MV 1


    Moving a Materialized View


    As the operating environment’s conditions change, you may need to move an MV from
    one tablespace to another. In these scenarios, use the ALTER MATERIALIZED VIEW...MOVE
    TABLESPACE statement. This example moves the table associated with an MV to a
    different tablespace: SQL> alter materialized view inv_mv move tablespace tbsp2;


    If any indexes are associated with the MV table, the move operation renders them
    unusable. You can check the status of the indexes as follows:


    select


    a.table_name


    ,a.index_name


    ,a.status


    from user_indexes a


    ,user_mviews b


    where a.table_name = b.mview_name;


    CHAPTER 15 ■ MATERIALIZED VIEWS


    You must rebuild any associated indexes after moving the table. For example: SQL>
    alter index inv_mv_pk1 rebuild;


    Managing Materialized View Logs


    MV logs are required for fast-refreshable MVs. The MV log is a table that stores
    DML information for a master (base) table. It’s created in the same database as
    the master table with the same user that owns the master table. You need the CREATE
    TABLE privilege to create an MV log.


    The MV log is populated by an Oracle internal trigger (that you have no control
    over). This internal trigger inserts a row into the MV log after an INSERT, UPDATE,
    or DELETE on the master table. You can view the internal triggers in use by querying
    DBA/ALL/USER_INTERNAL_TRIGGERS.


    An MV log is associated with only one table, and each master table can have only
    one MV log defined for it. You can create an MV log on a table or on another MV.
    Multiple fast-refreshable MVs can use one MV log.


    After an MV performs a fast refresh, any records in the MV log that are no longer
    needed are deleted.


    In the event that multiple MVs are using one MV log, then records are purged from
    the MV log only after they aren’t required by any of the fast-refreshable MVs.


    Table 15–3 describes terms used with MV logs. These terms are referred to in the
    following sections in this chapter that relate to MV logs.


    ***Table 15–3.** Materialized View Log Terminology and Features* **MV Log Term**


    **Description**


    Materialized view log


    Database object that tracks DML changes to MV base table. An MV


    log is required for fast refreshes.


    Primary key MV log


    MV log that uses the base-table primary key to track DML changes.


    ROWID MV log


    MV log that uses the base table ROWID to track DML changes.


    Commit SCN MV log


    MV log based on the commit system change number (SCN) instead


    of a timestamp. Available in Oracle Database 11 *g* R2 or higher.


    Object ID


    Object identifier used to track DML changes.


    Filter column


    Non-primary-key column referenced by an MV subquery. Required


    by some fast-refresh scenarios.


    Join column


    Non-primary-key column that defines a join in the subquery WHERE


    clause. Required by some fast-refresh scenarios.


    Sequence


    Sequence value required for some fast-refresh scenarios.


    New values


    Specifies that old and new values be recorded in the MV log.


    Required for single-table aggregate views to be eligible for fast


    refresh.


    CHAPTER 15 ■ MATERIALIZED VIEWS


    Creating a Materialized View Log


    Fast-refreshable views require an MV log to be created on the master (base) table.
    Use the CREATE


    MATERIALIZED VIEW LOG command to create an MV log. This example creates an MV
    log on the USERS


    table, specifying that the primary key should be used to identify rows in the
    MV log: SQL> create materialized view log on users with primary key;


    You can also specify storage information such as the tablespace name: create materialized
    view log


    on users


    pctfree 5


    tablespace mv_data


    with primary key;


    When you create an MV log on a table, Oracle creates a table to store the changes
    to a base table since the last refresh. The name of the MV log table follows this
    format: MLOG$_<master_table_name>. You can use the SQL*Plus DESCRIBE statement
    to view the columns of the MV log: SQL> desc mlog$_users;


    Name Null? Type


    ----------------------------------- -------- ------------------------


    USER_ID NUMBER


    SNAPTIME$$ DATE


    DMLTYPE$$ VARCHAR2(1)


    OLD_NEW$$ VARCHAR2(1)


    CHANGE_VECTOR$$ RAW(255)


    XID$$ NUMBER


    You can query this underlying MLOG$ table to determine the number of transactions
    since the last refresh. After each refresh, the MV log table is purged. If multiple
    MVs use the MV log, the log table isn’t purged until all dependent MVs are refreshed.


    If you create the MV log on a table with a primary key, then a RUPD$_<master_table_name>
    table is also created. This table is used for updatable MVs. If you’re not using
    the updatable MV feature, then this table is never used, and you can ignore it.


    When you create an MV log, you can specify that it use PRIMARY KEY, ROWID, or
    OBJECT ID to uniquely identify rows in the MV log table. If the master table has
    a primary key, then use WITH PRIMARY KEY when you create the MV log. If the master
    table doesn’t have a primary key, then you have to use WITH ROWID to specify that
    a ROWID value is used to uniquely identify MV log records. You can use WITH OBJECT
    ID when you create an MV log on an object table.


    For database versions prior to Oracle Database 11 *g* release 2, the MV log table
    will contains a SNAPTIME$$ time column. This column is used to determine which
    records need to be applied to any dependent MVs.


    As of Oracle Database 11 *g* release 2, you have the option of creating a COMMIT
    SCN–based MV log.


    This type of MV log uses the SCN of a transaction to determine which records need
    to be applied to any dependent MVs. COMMIT SCN–based MV logs are more efficient
    than timestamp-based MV logs. If you’re using Oracle Database 11 *g* release 2
    or higher, then you should consider using COMMIT SCN–based MV


    logs. Use the WITH COMMIT SCN clause to create an SCN–based MV log:


    SQL> create materialized view log on inv tablespace users with commit scn; 391


    CHAPTER 15 ■ MATERIALIZED VIEWS


    You can view whether an MV log is SCN based by querying USER_MVIEW_LOGS: select


    log_table


    ,commit_scn_based


    from user_mview_logs;


    Indexing Materialized View Log Columns


    Sometimes you may need better performance from your fast-refreshing MVs. One way
    to do this is through indexes on columns of the MV log table. In particular, consider
    indexing the primary-key column and the SNAPTIME$$ column. Oracle potentially
    uses two columns in WHERE clauses when refreshing an MV or purging the MV log.
    Here are examples of creating indexes on MV log columns: SQL> create index mlog$_inv_idx1
    on mlog$_inv(snaptime$$) tablespace mv_index; SQL> create index mlog$_inv_idx2
    on mlog$_inv(inv_id) tablespace mv_index; You shouldn’t add indexes just because
    you think it may be a good idea. Only add indexes on the MV log tables when you
    have known performance issues with fast refreshes. Keep in mind that adding indexes
    consumes resources in the database. Oracle has to maintain the index for DML operations
    on the table, and an index consumes disk space. Indexes aren’t free silver bullets
    for performance issues; they come with some cost, so you should use them judiciously.


    Viewing Space Used by a Materialized View Log


    You should consider periodically checking the space consumed by an MV log. If
    the space consumed is growing (and never shrinking), you may have an issue with
    an MV not successfully refreshing (and hence causing the MV log never to be purged).
    Here’s a query to check the space of MV logs: select


    segment_name


    ,tablespace_name


    ,bytes/1024/1024 meg_bytes


    ,extents


    from dba_segments


    where segment_name like ''MLOG$%''


    order by meg_bytes;


    Here’s some sample output:


    SEGMENT_NAME TABLESPACE_NAME MEG_BYTES EXTENTS


    ------------------------- --------------- ----------- ----------


    MLOG$_USER_ROLES_ASSOC MV_DATA 24.00 48


    MLOG$_ASSET_GEO_LOCATIONS MV_DATA 60.50 121


    MLOG$_USERS MV_DATA 88.50 177


    MLOG$_REGISTRATIONS MV_DATA 465.00 930


    This output indicates that several MV logs most likely have purging issues. The
    MLOG$_REGISTRATIONS


    segment is consuming nearly 500MB of space. In this situation, there are probably
    multiple MVs that are using the MV log, and one of the MVs isn’t refreshing on
    a daily basis, thus preventing the log from being purged.


    You may run into a situation where an MV log hasn’t been purged for quite some
    time. This can happen because you have multiple MVs using the same MV log and
    one of those MVs isn’t successfully refreshing anymore. This can happen when a
    DBA builds a development environment and connects 392


    CHAPTER 15 ■ MATERIALIZED VIEWS


    development MVs to the production environment (it shouldn’t happen, but it does).
    At some later point in time, the DBA drops the development database. The production
    environment still has information regarding the remote development MV and won’t
    purge MV log records because it thinks a fast-refreshable MV needs the log data
    to refresh.


    In these scenarios, you should determine which MVs are using the log (see the
    section on Determining How Many MVs Reference a Central MV Log) and resolve any
    issues. After the problem is solved, check the space being used by the log and
    see if it can be shrunk (see the next section).


    Shrinking the Space in a Materialized View Log


    If an MV log doesn’t successfully delete records, this causes it to grow to a
    large size. After you resolve the issue and the records are deleted from the MV
    log, you can set the high-water mark for the MV log table to a high value. But
    doing so may cause performance issues and also unnecessarily consumes disk space.


    In this situations, consider shrinking the space used by the MV log.


    In this example, MLOG$_REGISTRATIONS had a problem with not purging records because
    of an issue with an associated MV not successfully refreshing. This MV log subsequently
    grew to a large size. The issue was identified and resolved, and now the log’s
    space needs to be reduced. To shrink the space in an MV log, first enable row
    movement on the appropriate MV log MLOG$ table: SQL> alter table mlog$_registrations
    enable row movement;


    Next, issue the ALTER MATERIALIZED VIEW LOG ON...SHRINK statement. Notice that
    the table after the ON keyword is the master table name (in this example, it’s
    the REGISTRATIONS table): SQL> alter materialized view log on registrations shrink
    space;


    This statement may take a long time, depending on the amount of space it shrinks.
    After the statement finishes, you can disable row movement:


    SQL> alter table mlog$_registrations disable row movement;


    You can verify that the space has been reduced by querying DBA_SEGMENTS: select


    segment_name


    ,tablespace_name


    ,bytes/1024/1024 meg_bytes


    ,extents


    from dba_segments


    where segment_name = ''MLOG$_REGISTRATIONS'';


    The space used by this segment is quite small:


    SEGMENT_NAME TABLESPACE_NAME MEG_BYTES EXTENTS


    ------------------------- --------------- ----------- ----------


    MLOG$_REGISTRATIONS MV_DATA .50 1


    Checking the Row Count of a Materialized View Log


    As mentioned earlier in this chapter, sometimes there are problems with an MV
    refreshing, and this results in large numbers of rows building up in the corresponding
    MV log table. This sometimes happens when multiple MVs are using one MV log, and
    one of the MVs can’t perform a fast refresh. In this situation, the MV log continues
    to grow until the issue is resolved.


    CHAPTER 15 ■ MATERIALIZED VIEWS


    One way of detecting whether an MV log isn’t being purged is to periodically check
    the row counts of the MV log tables. The following query uses SQL to generate
    SQL that creates a script that checks row counts for MV log tables owned by the
    currently connected user:


    set head off pages 0 lines 132 trimspool on


    spo mvcount_dyn.sql


    select ''select count(*) || '' || '''''''' || '': '' || table_name || ''''''''


    || '' from '' || table_name || '';''


    from user_tables


    where table_name like ''MLOG%'';


    spo off;


    This script generates a script named mvcount_dyn.sql that contains the SQL statements
    to select row counts from the MLOG$ tables. When you’re inspecting row counts,
    you must be somewhat familiar with your application and have an idea what a normal
    row count is. Here’s some sample code generated by the previous script:


    select count(*) || '': MLOG$_PRODUCT_TAXONOMY'' from MLOG$_PRODUCT_TAXONOMY; select
    count(*) || '': MLOG$_REGISTRATIONS'' from MLOG$_REGISTRATIONS;


    select count(*) || '': MLOG$_ROLES'' from MLOG$_ROLES;


    Moving a Materialized View Log


    You may need to move an MV log because the initial creation script didn’t specify
    the correct tablespace.


    A common scenario is when the tablespace isn’t specified, and the MV log is placed
    by default in a tablespace like USERS. You can verify the tablespace information
    with this query: select


    table_name


    ,tablespace_name


    from user_tables


    where table_name like ''MLOG%'';


    If any MV log tables need to be relocated, use the ALTER MATERIALIZED VIEW LOG
    ON <table_name> MOVE statement. Notice that you specify the name of the master
    table (and not the underlying MLOG$


    table) on which the MV is created:


    SQL> alter materialized view log on inv move tablespace tbsp2;


    Also keep in mind that when you move a table, any associated indexes are rendered
    unusable (because the ROWID of every record in the table has just changed). You
    can check the status of the indexes as shown:


    select


    a.table_name


    ,a.index_name


    ,a.status


    from user_indexes a


    ,user_mview_logs b


    where a.table_name = b.log_table;


    Any unusable indexes must be rebuilt. Here’s an example of rebuilding an index:
    SQL> alter index mlog$_inv_idx1 rebuild;


    CHAPTER 15 ■ MATERIALIZED VIEWS


    Dropping a Materialized View Log


    There are a couple of reasons why you may want to drop an MV log:


    • You initially created an MV log, but requirements have changed and you no longer
    need it.


    • The MV log has grown large and is causing performance issues, and you want to
    drop it to reset the size.


    Before you drop an MV log, you can verify the owner, master table, and MV log
    table with the following query:


    select


    log_owner


    ,master -- master table


    ,log_table


    from user_mview_logs;


    Use the DROP MATERIALIZED VIEW LOG ON statement to drop an MV log. You don’t need
    to know the name of the MV log, but you do need to know the name of the master
    table on which the log was created.


    This example drops the MV log on the INV table:


    SQL> drop materialized view log on inv;


    You should see the following message (if successful):


    Materialized view log dropped.


    If you have permissions, and you don’t own the table on which the MV log is created,
    you can specify the schema name when dropping the materialized view log:


    SQL> drop materialized view log on <schema>.<table>;


    If you’re cleaning up an environment and want to drop all MV logs associated with
    a user, then use SQL to generate SQL to accomplish this. The following script
    creates the SQL required to drop all MV


    logs owned by the currently connected user:


    set lines 132 pages 0 head off trimspool on


    spo drop_dyn.sql


    select ''drop materialized view log on '' || master || '';''


    from user_mview_logs;


    spo off;


    The previous SQL*Plus code creates a script named drop_dyn.sql that contains the
    SQL statements that can be used to drop all MV logs for a user.


    Refreshing Materialized Views


    Typically, you refresh MVs at periodic intervals. You can either refresh the MVs
    manually or automate this task. The following sections cover these related topics:


    • Manually refreshing MVs from SQL*Plus


    • Automating refreshes using a shell script and scheduling utility


    • Automating refreshes using the built-in Oracle job scheduler


    ![](index-430_1.png)


    CHAPTER 15 ■ MATERIALIZED VIEWS


    The result cache can significantly improve performance if you have long-running
    queries that operate on relatively static data. MVs are better suited for replicating
    data and storing the results of complex queries that only require new results
    on a periodic basis (such as daily, weekly, or monthly).


    Automating Refreshes Using a Shell Script and Scheduling Utility


    Many MVs must be refreshed on a daily basis. To achieve this, you can use a Linux/Unix
    utility such as cron that calls a shell script to refresh the MVs. This approach


    • Is easy to implement and maintain


    • Makes it easy to create a daily log file for auditing


    • Sends e-mail when the job has problems or when the database isn’t available
    Here’s an example of a shell script that contains the logic to refresh an MV:


    #!/bin/bash


    if [ $# -ne 1 ]; then


    echo "Usage: $0 SID"


    exit 1


    fi


    #


    HOSTNAME=ùname -a | awk ''{print$2}''`


    MAILX=''/bin/mailx''


    MAIL_LIST=''lellison@oracle.com''


    ORACLE_SID=$1


    jobname=CWP'
