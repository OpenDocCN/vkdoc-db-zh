    control files, spfile, and backup set pieces. For example, this command will validate
    all datafiles and the control files: RMAN> validate database;


    You can also validate just the control file as follows:


    RMAN> validate current controlfile;


    You can validate the archive redo log files like so:


    RMAN> validate archivelog all;


    You can combine all of the prior three integrity checks into one command, as shown:
    RMAN> validate database include current controlfile plus archivelog; Under normal
    operations the VALIDATE command only checks for physical corruption. You can specify
    that you want to also check for logical corruption by using the CHECK LOGICAL
    clause like so: RMAN> validate check logical database include current controlfile
    plus archivelog; You can use VALIDATE in a variety of ways. Here are a few more
    examples: RMAN> validate database skip offline;


    RMAN> validate copy of database;


    RMAN> validate tablespace system;


    RMAN> validate datafile 3 block 20 to 30;


    RMAN> validate spfile;


    RMAN> validate backupset <primary_key_value>;


    RMAN> validate recovery area;


    If RMAN detects any corrupt blocks, the V$DATABASE_BLOCK_CORRUPTION is populated.
    This view contains information on the file number, block number, and the number
    of blocks affected. You can use this information to perform a block level recovery.
    See Chapter 19 for details on block level recovery.


    ■ **Note** Physical corruption is when the block contents don’t match the physical
    format that Oracle expects. By default, RMAN checks for physical corruption when
    backing up, restoring, or validating datafiles. Logical corruption is when the
    block is in the correct format but the contents aren’t consistent with what Oracle
    expects. Logical corruption would be issues such as corruption in a row piece
    or an index entry.


    CHAPTER 18 ■ RMAN BACKUPS AND REPORTING


    Using BACKUP...VALIDATE


    The BACKUP VALIDATE command is very similar to the VALIDATE command in that it
    can check to see if datafiles are available and if the datafiles contain any corrupt
    blocks. For example: RMAN> backup validate database;


    This command doesn''t actually perform any type of backup or create any files.
    It only scans the datafiles and checks for corruption. Like the VALIDATE command,
    BACKUP VALIDATE by default only checks for physical corruption. You can instruct
    it to also check for logical corruption as shown: RMAN> backup validate check
    logical database;


    Here are some other variations of the BACKUP...VALIDATE command:


    RMAN> backup validate database current controlfile;


    RMAN> backup validate check logical database current controlfile plus archivelog;
    Like the VALIDATE command, BACKUP...VALIDATE will populate V$DATABASE_BLOCK_CORRUPTION
    if it detects any corrupt blocks. The information in this view can be used to
    determine which blocks can potentially be restored by block level recovery. See
    Chapter 19 for more details on block level recovery.


    Using RESTORE...VALIDATE


    The RESTORE...VALIDATE command is used to verify backup files that would be used
    to restore. This command validates backup sets, datafile copies, and archive redo
    log files: RMAN> restore validate database;


    No actual files are restored when using RESTORE...VALIDATE. This means you can
    run the command while the database is online and available.'
  trans: '

    # 第 18 章 ■ RMAN 备份与报告


    你可以使用`RMAN`来检查数据文件、归档重做日志和控制文件中的损坏情况。你还可以验证备份集是否可恢复。`RMAN VALIDATE`命令用于执行这类完整性检查。运行`VALIDATE`命令有三种方式：


    - `VALIDATE`

    - `BACKUP...VALIDATE`

    - `RESTORE...VALIDATE`


    ■ `注意` 独立的`VALIDATE`命令在 Oracle Database 11g 或更高版本中可用。`BACKUP...VALIDATE`和`RESTORE...VALIDATE`命令在
    Oracle Database 10g 或更高版本中可用。


    ## 使用 VALIDATE


    `VALIDATE`命令可以单独使用（无需`BACKUP`或`RESTORE`）来检查数据库数据文件、归档重做日志文件、控制文件、`spfile`和备份集片段中的缺失文件或物理损坏。例如，以下命令将验证所有数据文件和控制文件：`RMAN>
    validate database;`


    你也可以仅验证控制文件，如下所示：`RMAN> validate current controlfile;`


    你可以像这样验证归档重做日志文件：`RMAN> validate archivelog all;`


    你可以将前述三个完整性检查合并为一个命令，如下所示：`RMAN> validate database include current controlfile
    plus archivelog;` 在正常操作下，`VALIDATE`命令仅检查物理损坏。你可以通过使用`CHECK LOGICAL`子句来指定还要检查逻辑损坏，如下所示：`RMAN>
    validate check logical database include current controlfile plus archivelog;`
    你可以以多种方式使用`VALIDATE`。以下是其他一些示例：

    `RMAN> validate database skip offline;`


    `RMAN> validate copy of database;`


    `RMAN> validate tablespace system;`


    `RMAN> validate datafile 3 block 20 to 30;`


    `RMAN> validate spfile;`


    `RMAN> validate backupset <primary_key_value>;`


    `RMAN> validate recovery area;`


    如果`RMAN`检测到任何损坏的数据块，`V$DATABASE_BLOCK_CORRUPTION`视图会被填充。该视图包含有关文件号、数据块号和受影响的数据块数量的信息。你可以使用此信息执行数据块级别的恢复。有关数据块级别恢复的详细信息，请参见第
    19 章。


    ■ `注意` 物理损坏是指数据块内容与 Oracle 预期的物理格式不匹配。默认情况下，`RMAN`在备份、恢复或验证数据文件时会检查物理损坏。逻辑损坏是指数据块格式正确但其内容与
    Oracle 预期不一致。逻辑损坏可能是诸如行片段或索引条目损坏等问题。


    ## 使用 BACKUP...VALIDATE


    `BACKUP VALIDATE`命令与`VALIDATE`命令非常相似，它可以检查数据文件是否可用以及数据文件是否包含任何损坏的数据块。例如：

    `RMAN> backup validate database;`


    此命令实际上不执行任何类型的备份，也不创建任何文件。它只扫描数据文件并检查损坏情况。与`VALIDATE`命令类似，`BACKUP VALIDATE`默认只检查物理损坏。你可以指示它同时检查逻辑损坏，如下所示：

    `RMAN> backup validate check logical database;`


    以下是`BACKUP...VALIDATE`命令的其他一些变体：


    `RMAN> backup validate database current controlfile;`


    `RMAN> backup validate check logical database current controlfile plus archivelog;`
    与`VALIDATE`命令类似，如果`BACKUP...VALIDATE`检测到任何损坏的数据块，它也会填充`V$DATABASE_BLOCK_CORRUPTION`视图。该视图中的信息可用于确定哪些数据块可能通过数据块级别的恢复来修复。有关数据块级别恢复的更多详细信息，请参见第
    19 章。


    ## 使用 RESTORE...VALIDATE


    `RESTORE...VALIDATE`命令用于验证将用于恢复的备份文件。此命令验证备份集、数据文件副本和归档重做日志文件：

    `RMAN> restore validate database;`


    使用`RESTORE...VALIDATE`时，不会恢复任何实际文件。这意味着你可以在数据库处于联机和可用状态时运行该命令。

