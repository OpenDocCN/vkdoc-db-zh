    ### Implementing a Cold-Backup Strategy for a Noarchivelog-Mode Database


    You perform a user-managed cold backup by copying files after the database has
    been shut down. This type of backup is also known as an offline backup. Your database
    can be in either noarchivelog mode or archivelog mode when you make a cold backup.


    For some reason, DBAs tend to think of a cold backup as being synonymous with
    a backup of a database in noarchivelog mode. That isn’t correct. You can make
    a cold backup of a database in archivelog mode, and that’s a backup strategy that
    many shops employ. The differences between a cold backup with the database in
    noarchivelog and in archivelog mode are detailed in the following sections.


    #### Making a Cold Backup of a Noarchivelog-Mode Database


    One main reason to make a cold backup of a database in noarchivelog mode is to
    give you a way to restore a database back to a point in time in the past. You
    should use this type of backup only if you don’t need to recover transactions
    that occurred after the backup. This type of B&R strategy is acceptable only if
    your business requirements allow for the loss of data and downtime. Rarely would
    you ever implement this type of B&R solution for a production business database.


    Having said that, there are some good reasons to implement this type of backup.
    One common use is to make a cold backup of a development/test/training database
    and periodically reset the database back to the baseline. This gives you a way
    to restart a performance test or a training session with the same point-in-time
    snapshot of the database.


    ■ **Tip** Consider using the Flashback Database feature to set your database back
    to a point in time in the past. Flashback Database is discussed later in this
    chapter.


    The example in this section shows you how to make a backup of every critical file
    in your database: all control files, datafiles, temporary datafiles, and online-redo
    log files. With this type of backup, you can easily restore your database back
    to the point in time when the backup was made. The main advantages of this approach
    are that it’s conceptually simple and easy to implement. Here are the steps required
    for a cold backup of a database in noarchivelog mode:


    1.  Determine where to copy the backup files and how much space is required.

    2.  Determine the locations and names of the database files to copy.

    3.  Shut down the database with the `IMMEDIATE`, `TRANSACTIONAL`, or `NORMAL`
    clause.

    4.  Copy the files (identified in step 2) to the backup location (determined in
    step 1).

    5.  Restart your database.


    ## CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    The following sections elaborate on these steps.


    ##### Step 1: Determine Where to Copy the Backup Files and How Much Space Is Required


    Ideally, the backup location should be on a separate set of disks from your live
    datafiles location. However, in many shops you may not have a choice and are told
    which mount points are to be used by the database. Often it’s not up to you architect
    the underlying subdisk system.


    For this example, the backup location is the directory `/oradump/cbackup/O11R2`.
    To get a rough idea of how much space you need to store one copy of the backups,
    you can run this query:


    ```sql

    select sum(sum_bytes)/1024/1024 m_bytes

    from(

    select sum(bytes) sum_bytes from v$datafile

    union

    select sum(bytes) sum_bytes from v$tempfile

    union

    select (sum(bytes) * members) sum_bytes from v$log

    group by members);

    ```


    ##### Step 2: Determine the Locations and Names of the Files to Copy


    Run this query to list the names (and paths) of files that are included in a cold
    backup of a noarchivelog-mode database:


    ```sql

    select name from v$datafile

    union

    select name from v$controlfile

    union

    select name from v$tempfile

    union

    select member from v$logfile;

    ```


    Do you need to back up the online-redo logs? No; you never need to back up the
    online-redo logs as part of any type of backup. Then why do DBAs back up the online-redo
    logs as part of a cold backup?


    One reason is that it makes the restore process for the noarchivelog mode scenario
    slightly easier. The online-redo logs are required to normally open the database.
    If you back up all files (including the online-redo logs), then to get your database
    back to the state it was in at the time of the backup, you restore all files (including
    the online-redo logs) and start up your database.


    ■ **Tip** See the later sections in this chapter on scripting for examples of
    SQL-generating commands you can use to automate B&R steps.


    ## CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    ##### Step 3: Shut Down the Database


    Connect to your database as the `SYS` (or as a `SYSDBA` privileged user), and
    shut down your database using `IMMEDIATE`, `TRANSACTIONAL`, or `NORMAL` In almost
    every situation, using `IMMEDIATE` is the preferred method. This mode disconnects
    users, rolls back uncompleted transactions, and shuts down the database:


    ```bash

    $ sqlplus / as sysdba

    SQL> shutdown immediate;

    ```


    ##### Step 4: Create Backup Copies of the Files


    For every file identified in step 2, use an OS utility to copy the files to a
    backup directory (identified in step 1). In this simple example, all the datafiles,
    control files, temporary database files, and online-redo logs are in the same
    directory. In production environments, you’ll most likely have files spread out
    in several different directories. This example uses the Linux/Unix `cp` command
    to copy the database files from `/ora01/dbfile/O11R2` to the `/oradump/cbackup/O11R2`
    directory:


    ```bash

    $ cp /ora01/dbfile/O11R2/*.* /oradump/cbackup/O11R2

    ```


    ##### Step 5: Restart Your Database


    After all the files are copied, you can start up your database:


    ```bash

    $ sqlplus / as sysdba

    SQL> startup;

    ```


    #### Restoring a Cold Backup in Noarchivelog Mode with Online-Redo Logs


    The next example explains how to restore from a cold backup of a database in noarchivelog
    mode. If you included the online-redo logs as part of the cold backup, you can
    include the online-redo logs when you restore the files. Here are the steps involved
    with this procedure:


    1.  Shut down the instance.

    2.  Copy the datafiles, online-redo logs, temporary files, and control files back
    from the backup.

    3.  Start up your database.

    4.  These steps are detailed in the following sections.


    ##### Step 1: Shut Down the Instance


    Shut down the instance, if it’s running. In this scenario, it doesn’t matter how
    you shut down the database, because you’re restoring back to a point in time.
    Any files in the live database directory locations are overwritten when the backup
    files are copied back. If your instance is running, you can abruptly abort it.
    As a `SYSDBA` privileged user, do the following:


    ```bash

    $ sqlplus / as sysdba

    SQL> shutdown abort;

    ```


    ## CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    ##### Step 2: Copy the Files Back from the Backup


    This step does the reverse of the backup: you’re copying files from the backup
    location to the live database file locations. In this example, all the backup
    files are located in the `/oradump/cbackup/O11R2` directory and all files are
    being copied to the `/ora01/dbfile/O11R2` directory:


    ```bash

    $ cp /oradump/cbackup/O11R2/*.* /ora01/dbfile/O11R2

    ```


    ##### Step 3: Start Up the database


    Connect to your database as `SYS` (or a user that has `SYSDBA` privileges), and
    start up your database:


    ```bash

    $ sqlplus / as sysdba

    SQL> startup;

    ```


    After you finish these steps, you should have an exact copy of your database as
    it was when you made the cold backup. It’s as if you set your database back to
    the point in time when you made the backup.


    #### Restoring a Cold Backup in Noarchivelog Mode Without Online-Redo Logs


    As mentioned earlier, you don’t ever need the online-redo logs when restoring
    from a cold backup. If you made a cold backup of your database in noarchivelog
    mode and didn’t include the online-redo logs as part of the backup, the steps
    to restore are nearly identical to the steps in the previous section. The main
    difference is that the last step requires you to open your database using the
    `OPEN RESETLOGS` clause.


    Here are the steps:


    1.  Shut down the instance.

    2.  Copy the control files and datafiles back from the backup.

    3.  Start up the database in mount mode.

    4.  Open the database with the `OPEN RESETLOGS` clause.


    ##### Step 1: Shut Down the Instance


    Shut down the instance, if it’s running. In this scenario, it doesn’t matter how
    you shut down the database because you’re restoring back to a point in time. Any
    files in the live database directory locations are overwritten when the backups
    are copied. In this scenario, if your instance is running, you can abruptly abort
    it. As a `SYSDBA` privileged user, do the following:


    ```bash

    $ sqlplus / as sysdba

    SQL> shutdown abort;

    ```


    ##### Step 2: Copy the Files Back from the Backup


    Copy the control files and datafiles from the backup location to the live datafile
    locations:


    ```bash

    $ cp <backup directory>/*.* <live database file directory>

    ```


    417


    ## CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    ##### Step 3: Start Up the Database in Mount Mode


    Connect to your database as `SYS` or a user with `SYSDBA` privileges, and start
    the database in mount mode:


    ```bash

    $ sqlplus / as sysdba

    SQL> startup mount

    ```


    ##### Step 4: Open the Database with the `OPEN RESETLOGS` Clause


    Open your database for use with the `OPEN RESETLOGS` clause:


    ```sql

    SQL> alter database open resetlogs;

    ```


    If you see the “Database altered” message, the command was successful. However,
    you may see this error:


    ```

    ORA-01139: RESETLOGS option only valid after an incomplete database recovery

    ```


    In this case, issue the following:


    ```sql

    SQL> recover database until cancel;

    ```


    You should see this message:


    ```

    Media recovery complete.

    ```


    Now, attempt to open your database with the `OPEN RESETLOGS` clause:


    ```sql

    SQL> alter database open resetlogs;

    ```


    This statement instructs Oracle to re-create the online-redo logs. Oracle uses
    information in the control file for the placement, name, and size of the redo
    logs. If there are old online-redo log files in those locations, they’re overwritten.


    If you’re monitoring your `alert.log` throughout this process, you may see `ORA-00312`
    and `ORA-00313`. This means Oracle can’t find the online-redo log files; this
    is okay because these files aren’t physically available until they’re re-created
    by the `OPEN RESETLOGS` command.


    #### Scripting a Cold Backup and Restore


    It’s instructional to view how you script a cold backup. The basic idea is to
    dynamically query the data dictionary to determine the locations and names of
    the files to be backed up. This is preferable to hardcoding the directory locations
    and file names in a script. The dynamic generation of a script is less prone to
    errors and surprises (for example, when new datafiles are added to a database
    but not added to an old hard-coded backup script).


    ■ **Note** The scripts in this section aren’t meant to be production-strength
    B&R scripts. Rather, they illustrate the basic concepts of scripting a cold backup
    and subsequent restore.


    The first script in this section makes a cold backup of a database. Before you
    use the cold-backup script, you need to modify these variables contained in the
    script to match your database environment:


    418


    ## CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    *   `ORACLE_SID`

    *   `ORACLE_HOME`

    *   `cbdir`


    The `cbdir` variable specifies the name of the backup-directory location. The
    script creates a file named `coldback.sql`, which is executed from SQL*Plus to
    initiate a cold backup of the database:


    ```bash

    #!/bin/bash

    ORACLE_SID=O11R2

    ORACLE_HOME=/oracle/app/oracle/product/11.2.0/db_1

    PATH=$PATH:$ORACLE_HOME/bin

    #

    sqlplus -s <<EOF

    / as sysdba

    set head off pages0 lines 132 verify off feed off trimsp on

    define cbdir=/oradump/cbackup/O11R2

    spo coldback.sql

    select ''shutdown immediate;'' from dual;

    select ''!cp '' || name || '' '' || ''&&cbdir'' from v\$datafile;

    select ''!cp '' || name || '' '' || ''&&cbdir'' from v\$tempfile;

    select ''!cp '' || member || '' '' || ''&&cbdir'' from v\$logfile;

    select ''!cp '' || name || '' '' || ''&&cbdir'' from v\$controlfile;

    select ''startup;'' from dual;

    spo off;

    @@coldback.sql

    EOF

    exit 0

    ```


    This file generates commands that are to be executed from a SQL*Plus script to
    make a cold backup of a database. You place an exclamation mark (`!`) in front
    of the Unix `cp` command to instruct SQL*Plus to host out to the OS to run the
    copy command. You also place a backward slash (`\`) in front of each dollar sign
    (`$`) when referencing `v$` data-dictionary views; this is required in a Linux/Unix
    shell script. The `\` escapes the `$` and tells the shell script not to treat
    the `$` character as a special character (the `$` normally signifies a shell variable).


    After you run this script, here’s a sample of the copy commands written to the
    `coldback.sql` script:


    ```sql

    shutdown immediate;

    !cp /ora01/dbfile/O11R2/system01.dbf /oradump/cbackup/O11R2

    !cp /ora01/dbfile/O11R2/sysaux01.dbf /oradump/cbackup/O11R2

    !cp /ora02/dbfile/O11R2/undotbs01.dbf /oradump/cbackup/O11R2

    !cp /ora02/dbfile/O11R2/users01.dbf /oradump/cbackup/O11R2

    ...

    !cp /ora01/oraredo/O11R2/redo02a.rdo /oradump/cbackup/O11R2

    !cp /ora02/oraredo/O11R2/redo02b.rdo /oradump/cbackup/O11R2

    !cp /ora01/dbfile/O11R2/control01.ctl /oradump/cbackup/O11R2

    startup;

    ```


    At the same time you make a cold backup, you should also generate a script that
    provides the commands to copy datafiles, tempfiles, logfiles, and control files
    back to their original locations. You can use this file to restore from the cold
    backup (either on purpose or in the event of a media failure). The next script
    in this section dynamically creates a `coldrest.sql` script that copies files
    from the backup location to the original datafile locations. You need to modify
    this script in the same manner that you modified the cold-backup script (change
    the `ORACLE_SID`, `ORACLE_HOME`, and `cbdir` variables to match your environment):


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    ```bash

    #!/bin/bash

    ORACLE_SID=O11R2

    ORACLE_HOME=/oracle/app/oracle/product/11.2.0/db_1

    PATH=$PATH:$ORACLE_HOME/bin

    #

    sqlplus -s <<EOF

    / as sysdba

    set head off pages0 lines 132 verify off feed off trimsp on

    define cbdir=/oradump/cbackup/O11R2

    define dbname=$ORACLE_SID

    spo coldrest.sql

    select ''shutdown abort;'' from dual;

    select ''!cp '' || ''&&cbdir/'' || substr(name, instr(name,''/'',-1,1)+1) ||

    '' '' || name from v\$datafile;

    select ''!cp '' || ''&&cbdir/'' || substr(name, instr(name,''/'',-1,1)+1) ||

    '' '' || name from v\$tempfile;

    select ''!cp '' || ''&&cbdir/'' || substr(member, instr(member,''/'',-1,1)+1)
    ||

    '' '' || member from v\$logfile;

    select ''!cp '' || ''&&cbdir/'' || substr(name, instr(name,''/'',-1,1)+1) ||

    '' '' || name from v\$controlfile;

    select ''startup;'' from dual;

    spo off;

    EOF

    exit 0

    ```


    This script creates a script named `coldrest.sql` that generates the copy commands
    to restore your datafiles, tempfiles, logfiles, and control files back to their
    original locations. After you run this shell script, here’s a partial snippet
    of the code in the `coldrest.sql` file:


    ```sql

    shutdown abort;

    !cp /oradump/cbackup/O11R2/system01.dbf /ora01/dbfile/O11R2/system01.dbf

    !cp /oradump/cbackup/O11R2/sysaux01.dbf /ora01/dbfile/O11R2/sysaux01.dbf

    !cp /oradump/cbackup/O11R2/undotbs01.dbf /ora02/dbfile/O11R2/undotbs01.dbf

    !cp /oradump/cbackup/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf

    ...

    !cp /oradump/cbackup/O11R2/redo02a.rdo /ora01/oraredo/O11R2/redo02a.rdo

    !cp /oradump/cbackup/O11R2/redo02b.rdo /ora02/oraredo/O11R2/redo02b.rdo

    !cp /oradump/cbackup/O11R2/control01.ctl /ora01/dbfile/O11R2/control01.ctl

    startup;

    ```


    If you need to restore from a cold backup using this script, log on to SQL*Plus
    as `SYS` and execute the script:


    ```bash

    $ sqlplus / as sysdba

    SQL> @coldrest.sql

    ```


    #### Implementing Archivelog Mode


    Recall from the discussion in Chapter 5 that archive redo logs are created only
    if your database is in archivelog mode. In this mode, as the online-redo logs
    fill up, a log switch is initiated. When a log switch occurs, the log-writer process
    stops writing to the most recently filled online-redo logs and starts writing
    to a new online-redo log group. The online-redo log groups are written to in a
    round-robin fashion.


    Archivelog mode is a prerequisite for the following technologies: user-managed
    hot backups, the Flashback Database feature, and RMAN online backups. If you don’t
    have archiving enabled, and you attempt to make a user-managed hot backup, you
    receive this error when altering a database or tablespace into backup mode:


    ```

    ORA-01123: cannot start online backup; media recovery not enabled

    ```


    At this point, you need to place your database in archivelog mode.


    420


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    #### Making Architectural Decisions


    When you implement archivelog mode, you also need a strategy for managing these
    files. The archive-redo logs consume disk space. If left unattended, these files
    will eventually consume all the space allocated for them. If this happens, the
    archiver can’t write a new archive redo log file to disk, and your database will
    stop processing transactions. At this point you have a hung database. You need
    to manually intervene by creating space for the archiver to resume work. For these
    reasons, there are several architectural decisions you must carefully consider
    before you turn on archiving:


    *   Where to place the archive-redo logs, and whether to use the fast-recovery
    area (formerly known as the flash-recovery area) to store the archive-redo logs

    *   How to name the archive-redo logs

    *   How much space should be allocated to the archive-redo log location

    *   How often to back up the archive-redo logs

    *   When it’s okay to permanently remove archive-redo logs from disk

    *   Whether multiple archive-redo log locations should be enabled

    *   If this is a production database, when to schedule the small amount of downtime
    that’s required


    Minimally, you should have enough space in your primary archive-redo location
    to hold at least a day’s worth of archive-redo logs. This lets you back them up
    on a daily basis and then remove them from disk after they’ve been backed up.


    If you decide to use a fast-recovery area (FRA) for your archive-redo log location,
    you must ensure that it contains sufficient space to hold the number of archive-redo
    logs generated between backups. Keep in mind that the FRA typically contains other
    types of files, such as RMAN backup files, flashback logs, and so on. If you use
    an FRA, be aware that the generation of other types of files can potentially impact
    the space required by the archive-redo log files.


    You need a strategy to automate the backup and removal of archive-redo log files.
    For user-managed backups, this can be implemented with a shell script that periodically
    copies the archive-redo logs to a backup location and then removes them from the
    primary location. As you see in later chapters, RMAN automates the backup and
    removal of archive-redo log files.


    If your business requirements are such that you must have a certain degree of
    high availability and redundancy, then you should consider writing your archive-redo
    logs to more than one location. Some shops set up jobs to copy the archive-redo
    logs periodically to a different location on disk or even copy them to a different
    server.


    #### Setting the Archive-Redo File Location


    Before you set your database mode to archiving, you should specifically instruct
    Oracle where you want the archive-redo logs to be placed. You can set the archive-redo
    log-file destination with the following techniques:


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    *   Set the `LOG_ARCHIVE_DEST_N` database initialization parameter.

    *   Implement an FRA.


    These two approaches are discussed in detail in the following sections.


    ■ **Tip** If you don’t specifically set the archive-redo log location via an initialization
    parameter or by enabling the FRA, then the archive-redo logs are written to a
    default location. This location depends on the database version and operating
    system. For active production database systems, the default archive-redo log location
    is rarely appropriate.


    ##### Setting the Archive Location to a User-Defined Disk Location (non-FRA)


    If you’re using an `init.ora` file, modify the file with an OS utility (such as
    `vi`) and place in it the location where you want the archive-redo logs written.
    In this example, the archive-redo log location is set to `/ora02/oraarch/O11R2`:


    ```

    log_archive_dest_1=''location=/ora02/oraarch/O11R2''

    log_archive_format=''%t_%s_%r.arc''

    ```


    If you’re using an `spfile`, use `ALTER SYSTEM` to modify the appropriate initialization
    variables:


    ```sql

    SQL> alter system set log_archive_dest_1=''location=/ora02/oraarch/O11R2'' scope=both;

    SQL> alter system set log_archive_format=''%t_%s_%r.arc'' scope=spfile;

    ```


    You can dynamically change the `LOG_ARCHIVE_DEST_n` parameters while your database
    is open. However, you have to stop and start your database for the `LOG_ARCHIVE_FORMAT`
    parameter to take effect.


    Take care not to set the `LOG_ARCHIVE_FORMAT` to an invalid value, because then
    you can’t start your database:


    ```sql

    SQL> startup nomount;

    ORA-19905: log_archive_format must contain %s, %t and %r

    ```


    In this situation, if you’re using an `spfile`, you can’t start your instance.
    You have to rename the `spfile`, create a `pfile` from the `spfile` (`SQL> create
    pfile from spfile;`), modify the parameter to a valid value, start the database
    with the `pfile`, and re-create the `spfile` from the `pfile`.


    When you specify `LOG_ARCHIVE_FORMAT`, you must include `%t` (or `%T`), `%s` (or
    `%S`), and `d%` in the format string. Table 16–1 lists the valid variables you
    can use with the `LOG_ARCHIVE_FORMAT` initialization parameter.


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    ***Table 16–1.** Valid Variables for the Log Archive Format String*


    **Format String** | **Meaning**

    --- | ---

    `%s` | Log-sequence number

    `%S` | Log-sequence number padded to the left with zeros

    `%t` | Thread number

    `%T` | Thread number padded to the left with zeros

    `%a` | Activation ID

    `%d` | Database ID

    `%r` | Resetlogs ID required to ensure uniqueness across multiple incarnations
    of the database


    If you don’t specify a value for `LOG_ARCHIVE_FORMAT`, Oracle uses a default such
    as `%t_%s_%r.dbf`. One aspect of the default format that I don’t like is that
    it ends with the extension `.dbf`, which is widely used for datafiles. This can
    cause confusion about whether a particular file can be safely removed because
    it’s an old archive-redo log file or whether the file shouldn’t be touched because
    it’s a live datafile. Most DBAs are reluctant to issue commands like this (for
    fear of accidentally removing a critical datafile):


    ```bash

    $ rm *.dbf

    ```


    You can view the value of the `LOG_ARCHIVE_DEST_N` parameter by running the following:


    ```sql

    SQL> show parameter log_archive_dest

    ```


    Here’s a partial listing of the output:


    ```

    NAME TYPE VALUE

    ------------------------------------ ----------- ------------------------------

    log_archive_dest string

    log_archive_dest_1 string location=/ora02/oraarch/O11R2

    log_archive_dest_10 string

    log_archive_dest_11 string

    ```


    For Oracle Database 11*g*, you can enable up to 31 different locations for the
    archive-redo log file destination. For most production systems, you can enable
    just one archive-redo log destination location.


    If you need a higher degree of protection, you can enable multiple destinations.
    Keep in mind that when you use multiple destinations, the archiver must be able
    to write to at least one location successfully. If you enable multiple mandatory
    locations and set `LOG_ARCHIVE_MIN_SUCCEED_DEST` to be higher than 1, then your
    database may hang if the archiver can’t write to all mandatory locations.


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    You can check the details regarding the status of archive-redo log locations via
    this query:


    ```sql

    select

    dest_name

    ,destination

    ,status

    ,binding

    from v$archive_dest;

    ```


    Here’s a small sample of the output:


    ```

    DEST_NAME DESTINATION STATUS BINDING

    -------------------- ------------------------------ --------- ---------

    LOG_ARCHIVE_DEST_1 /ora02/oraarch/O11R2 VALID OPTIONAL

    LOG_ARCHIVE_DEST_2 INACTIVE OPTIONAL

    ```


    ##### Using the FRA for Archive Log Files


    The FRA is an area on disk—specified via database-initialization parameters—that
    instructs Oracle to place specific files like archive-redo logs, RMAN backup files,
    flashback logs, and multiplexed control files and online-redo logs. To enable
    the use of an FRA, you must set two initialization parameters:


    *   `DB_RECOVERY_FILE_DEST_SIZE` specifies the maximum space to be used for all
    files that are stored the FRA.

    *   `DB_RECOVERY_FILE_DEST` specifies the base directory for the FRA.


    When you create an FRA, you’re not really creating anything—you’re telling Oracle
    which directory to use when storing files that go in the FRA. For example, say
    200GB of space are reserved on a mount point, and you want the base directory
    for the FRA to be `/ora02/fra`. To enable the FRA, first set `DB_RECOVERY_FILE_DEST_SIZE`:


    ```sql

    SQL> alter system set db_recovery_file_dest_size=200g;

    ```


    Next, set the `DB_RECOVERY_FILE_DEST` parameter:


    ```sql

    SQL> alter system set db_recovery_file_dest=''/ora02/fra'';

    ```


    If you’re using an `init.ora` file, be sure you modify it with an OS utility (such
    as `vi`) so the changes persist across database restarts.


    After you enable an FRA, by default, Oracle writes archive-redo logs to subdirectories
    in the FRA.


    ■ **Note** If you’ve set the `LOG_ARCHIVE_DEST_N` parameter to be a location on
    disk, archive-redo logs aren’t written to the FRA.


    You can verify that the archive location is using an FRA:


    ```sql

    SQL> archive log list;

    ```


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    If archive files are being written to the FRA, you should see output like this:


    ```

    Database log mode Archive Mode

    Automatic archival Enabled

    Archive destination USE_DB_RECOVERY_FILE_DEST

    ```


    You can display the directory associated with the FRA like this:


    ```sql

    SQL> show parameter db_recovery_file_dest

    ```


    When you first implement an FRA, there are no subdirectories beneath the base
    FRA directory (specified with `DB_RECOVERY_FILE_DEST`). The first time Oracle
    needs to write a file to the FRA, it creates any required directories beneath
    the base directory. For example, after you implement an FRA, if archiving for
    your database is enabled, then the first time a online-redo log switch occurs,
    Oracle creates the following directories beneath the base FRA directory:


    ```

    <SID>/archivelog/<YYYY_MM_DD>

    ```


    For this database example, the archive logs are written to the following directory:


    ```

    /ora02/fra/O11R2/archivelog/2010_08_25

    ```


    Each day that archive-redo logs are generated results in a new directory being
    created in the FRA using the directory name format of `YYYY_MM_DD`.


    If you want archive-redo logs written to both an FRA and a non-FRA location, you
    can enable that as follows:


    ```sql

    SQL> alter system set log_archive_dest_1=''location=/ora02/oraarch/O11R2'';

    SQL> alter system set log_archive_dest_2=''location=USE_DB_RECOVERY_FILE_DEST'';

    ```


    ##### Thinking Unoraclethodox FRA Thoughts


    Oracle recommends that you use an FRA for archive-redo logs and RMAN backups.
    However, I usually don’t implement an FRA in production environments—not for the
    archive-redo logs, not for the RMAN backup files, not for any types of files.
    Why is that?


    When you enable an FRA, if you don’t set the initialization parameter `LOG_ARCHIVE_DEST_N`,
    then by default, the archive-redo logs are written to the FRA. It’s the same with
    RMAN backups: if you don’t specifically configure an RMAN channel disk location,
    then by default, the RMAN backup files are written to the FRA.


    When you use an FRA (as described earlier), the disk space consumed by the archive-redo
    logs and RMAN backups must fit in the disk space assigned to the FRA. What happens
    if you have an unexpected spike in the amount of redo generated for a database,
    or if an unforeseen issue arises with the RMAN backups that results in unanticipated
    amounts of disk space being consumed?


    With regard to the RMAN backups, if the FRA fills up, the RMAN backups abort.
    An RMAN backup failure isn’t catastrophic, because usually you can quickly resolve
    space issues and manually run another backup. In most situations, this doesn’t
    compromise your database availability; in the event of a backup failure, you still
    have a previous RMAN backup that you can use to restore and recover your database.


    However, in the event that the archive-redo log destination fills up, and the
    archiver can’t write to the file system, your database will hang. In many 24x7
    mission-critical environments, this type of downtime is unacceptable and will
    jeopardize your ability to keep your job.


    I find it easier to control the space allocated to the archive-redo logs by using
    a dedicated mount point for these critical files. If possible, don’t share the
    disk space allocated to the archive-redo logs with the RMAN backups. A problem
    with the RMAN backups can cause disk-space issues for the archive-redo logs, and
    you want the space consumed by the archive-redo logs to be as stable and predictable
    as possible.


