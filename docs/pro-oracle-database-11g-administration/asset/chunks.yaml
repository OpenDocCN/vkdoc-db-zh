    # 第十九章 ■ RMAN 恢复与修复


    恢复与修复的场景多种多样。如何恢复和修复直接取决于您的备份策略以及哪些文件受到了损坏。面对介质故障时，通常遵循以下一般步骤：


    1.  确定需要恢复哪些文件。

    2.  根据损坏情况，将数据库模式设置为 `nomount`、`mount` 或 `open`。

    3.  使用 `RESTORE` 命令从 RMAN 备份中检索文件。

    4.  对需要修复的数据文件使用 `RECOVER` 命令。

    5.  打开数据库。


    您特定的恢复和修复场景可能不需要执行上述所有步骤。例如，您可能只想恢复 `spfile`，这就不需要修复步骤。


    恢复与修复过程的第一步是确定哪些文件发生了介质故障。通常可以从以下来源判断需要恢复的文件：


    *   屏幕上显示的错误信息（来自 RMAN 或 SQL*Plus）

    *   `Alert.log` 文件及相应的跟踪文件

    *   数据字典视图


    如果您使用的是 Oracle Database 11 *g* 或更高版本，除了前述方法，您还应考虑使用数据恢复指导工具来获取故障范围信息和相应的纠正措施。


    ## 使用数据恢复指导工具


    数据恢复指导工具是在 Oracle Database 11 *g* 中引入的。当发生介质故障时，此工具将显示故障详情、建议纠正措施，并且如果您指定，它还会执行建议的措施。这就像在恢复和修复情况下多了一双眼睛来提供反馈。数据恢复指导工具具有三种模式：


    *   列出故障。

    *   建议纠正措施。

    *   运行命令以修复故障。


    数据恢复指导工具从 RMAN 中调用。您可以将数据恢复指导工具视为一组在处理介质故障时能为您提供帮助的 RMAN 命令。


    ### 列出故障


    使用数据恢复指导工具时，`LIST FAILURE` 命令用于显示数据文件、控制文件或在线重做日志的任何问题：


    ```

    RMAN> list failure;

    ```


    如果没有检测到故障，您将看到一条消息，指示没有故障。以下是一些示例输出，表明某个数据文件可能存在问题：


    ```

    List of Database Failures

    =========================


    Failure ID Priority Status Time Detected Summary

    ---------- -------- --------- ------------- -------

    662 HIGH OPEN 16-SEP-10 One or more non-system datafiles are missing

    ```


    前面的消息并未指出具体哪个文件可能出现了故障。要深入探究，请使用 `DETAIL` 子句：


    ```

    RMAN> list failure 662 detail;


    List of Database Failures

    =========================


    Failure ID Priority Status Time Detected Summary

    ---------- -------- --------- ------------- -------

    662 HIGH OPEN 16-SEP-10

    One or more non-system datafiles are missing

    Impact: See impact for individual child failures


    List of child failures for parent failure ID 662

    Failure ID Priority Status Time Detected Summary

    ---------- -------- --------- ------------- -------

    665 HIGH OPEN 16-SEP-10 Datafile 7:

    ''/ora01/dbfile/O11R2/users02.dbf'' is missing

    Impact: Some objects in tablespace USERS might be unavailable

    ```


    此输出详细说明了哪个文件出现了故障以及问题的性质（文件丢失）。


    ### 建议纠正措施


    `ADVISE FAILURE` 命令就如何从数据恢复指导工具检测到的潜在问题中恢复提供建议。如果您的数据库存在多个故障，您可以直接指定故障 ID 以获取针对特定故障的建议，如下所示：


    ```

    RMAN> advise failure 665;

    ```


    以下是针对此特定问题的一些示例输出：


    ```

    =======================

    1. If file /ora01/dbfile/O11R2/users02.dbf was unintentionally renamed or moved,
    restore it


    Automated Repair Options

    ========================


    Option Repair Description

    ------ ------------------

    1 Restore and recover datafile 7

    Strategy: The repair includes complete media recovery with no data loss

    Repair script: /ora01/app/oracle/diag/rdbms/o11r2/O11R2/hm/reco_1184243250.hm

    ```


    在此情况下，数据恢复指导工具创建了一个可能用于解决问题的脚本。可以使用操作系统编辑器查看修复脚本的内容。例如：


    ```

    $ vi /ora01/app/oracle/diag/rdbms/o11r2/O11R2/hm/reco_1184243250.hm

    ```


    以下是此脚本的内容（针对此特定示例）：

    '
- fmt: "# restore and recover datafile\n\nsql 'alter database datafile 7 offline';\n\
    \nrestore datafile 7;\n\nrecover datafile 7;\n\nsql 'alter database datafile 7\
    \ online';\n\nAfter reviewing the script, you can decide to manually run the suggested\
    \ commands, or you can have the Data Recovery Advisor run the script via the `REPAIR`\
    \ command (see the next section for details).\n\n## Repairing Failures\n\nIf you\
    \ have identified a failure and viewed the recommended advice, you can proceed\
    \ to actually repairing a failure. If you want to inspect what the `REPAIR FAILURE`\
    \ command will do without actually running the commands, use the `PREVIEW` clause.\
    \ Before you run the command, make sure you first run the `LIST FAILURE` and `ADVISE\
    \ FAILURE` commands from the same connected session. In other words, the RMAN\
    \ session that you're in must run the `LIST` and `ADVISE` commands within the\
    \ same session before running the `REPAIR` command.\n\n```\nRMAN> repair failure\
    \ preview;\n```\n\nIf you're satisfied with the repair suggestions, then run the\
    \ `REPAIR FAILURE` command.\n\n```\nRMAN> repair failure;\n```\n\nYou'll be prompted\
    \ at this point for confirmation.\n\n```\nDo you really want to execute the above\
    \ repair (enter YES or NO)?\n```\n\nType in `YES` to proceed.\n\n```\nYES\n```\n\
    \nIf all goes well, you should see a final message like this:\n\n```\nmedia recovery\
    \ complete, elapsed time: 00:00:02\nFinished recover at 16-SEP-10\nsql statement:\
    \ alter database datafile 7 online\nrepair failure complete\n```\n\n■ **Note**\
    \ You can run the Data Recovery Advisor commands from the RMAN command prompt\
    \ or from Enterprise Manager.\n\nIn this way, you can use the RMAN commands of\
    \ `LIST FAILURE`, `ADVISE FAILURE`, and `REPAIR FAILURE` to resolve media failures.\
    \ The Data Recovery Advisor can assist with most issues that you'll run into.\
    \ I did have a couple scenarios where the following recommendation was provided:\n\
    \n```\nMandatory Manual Actions\n========================\n1. Please contact Oracle\
    \ Support Services to resolve failure 149165...\n\nOptional Manual Actions\n=======================\n\
    no manual actions available\n\nAutomated Repair Options\n========================\n\
    no automatic repair options available\n```\n\nThis output indicates that you (the\
    \ DBA) aren't quite out of a job yet. ;)\n\n## Using RMAN to Stop/Start Oracle\n\
    \nYou can use RMAN to stop and start your database with methods that are almost\
    \ identical to those available through SQL*Plus. When performing restore and recovery\
    \ operations, it’s often more convenient to stop and start your database from\
    \ within RMAN. The following RMAN commands can be used to stop and start your\
    \ database:\n\n- `SHUTDOWN`\n- `STARTUP`\n- `ALTER DATABASE`\n\n### Shutting Down\n\
    \nThe `SHUTDOWN` command works the same from RMAN as it does from SQL*Plus. There\
    \ are four types of shutdown: `ABORT`, `IMMEDIATE`, `NORMAL`, and `TRANSACTIONAL`.\
    \ I usually first attempt to use `SHUTDOWN IMMEDIATE` to stop a database. If that\
    \ doesn't work, don't hesitate to use `SHUTDOWN ABORT`. Here are some examples:\n\
    \n```\nRMAN> shutdown immediate;\nRMAN> shutdown abort;\n```\n\nIf you don't specify\
    \ a shutdown option, `NORMAL` is the default. Shutting a database down with `NORMAL`\
    \ is rarely viable as this mode waits for currently connected users to disconnect\
    \ at their leisure. I never use `NORMAL` when shutting down a database.\n\n###\
    \ Starting Up\n\nAs with SQL*Plus, you can use a combination of `STARTUP` and\
    \ `ALTER DATABASE` commands to step the database through startup phases using\
    \ RMAN, like so:\n\n```\nRMAN> startup nomount;\nRMAN> alter database mount;\n\
    RMAN> alter database open;\n```\n\nHere's another example:\n\n```\nRMAN> startup\
    \ mount;\nRMAN> alter database open;\n```\n\nIf you want to start the database\
    \ with restricted access, use the `DBA` option:\n\n```\nRMAN> startup dba;\n```\n\
    \n## Complete Recovery\n\nComplete recovery means that you can restore all transactions\
    \ that were committed before the failure occurred. Complete recovery does not\
    \ mean that you are restoring and recovering all datafiles in your database. For\
    \ example, you can perform a complete recovery if you have a media failure with\
    \ one datafile, and you restore and recover the one datafile. For complete recovery,\
    \ the following conditions must be true:\n\n- Your database is in archivelog mode.\n\
    - You have a good baseline backup of your database.\n- You have any required redo\
    \ that has been generated since the last backup.\n- All archive redo logs start\
    \ from the point that the last online backup began.\n- If using, any incremental\
    \ backups that RMAN can use for recovery must be available.\n- Online redo logs\
    \ that contain transactions that have not yet been archived must be available.\n\
    \nIf you've experienced a media failure and you have the required files to perform\
    \ a complete recovery, then you can restore and recover your database.\n\n## Testing\
    \ Restore and Recovery\n\nYou can determine which files RMAN will use for restore\
    \ and recovery before you actually perform the restore and recovery. You can also\
    \ instruct RMAN to verify the integrity of the backup files that will be used\
    \ for restore and recovery.\n\n### Previewing Backups Used for Recovery\n\nUse\
    \ the `RESTORE...PREVIEW` command to list the backups and archive redo log files\
    \ that RMAN will use to restore and recover database datafiles. The `RESTORE...PREVIEW`\
    \ does not actually restore any files; rather, it lists out the backup files that\
    \ will be used for a restore operation. This example previews in detail the backups\
    \ required for restore and recovery for the entire database:\n\n```\nRMAN> restore\
    \ database preview;\n```\n\nYou can also preview require backup files at a summarized\
    \ level of detail:\n\n```\nRMAN> restore database preview summary;\n```\n\nHere\
    \ is a snippet of the output:\n\n```\nList of Backups\n===============\nKey  \
    \   TY LV S Device Type Completion Time #Pieces #Copies Com Tag\n------- -- --\
    \ - ----------- --------------- ------- ------- --- ---\n571     B  F  A DISK\
    \        22-SEP-10       1       1       YES TAG20100922T141215\n570     B  F\
    \  A DISK        22-SEP-10       1       1       YES TAG20100922T141215\n\nList\
    \ of Archived Log Copies for database with db_unique_name O11R2\n=====================================================================\n\
    \nKey     Thrd     Seq     S Low Time\n------- ---- ------- - ---------\n878 \
    \    1    878     A 22-SEP-10\n\nMedia recovery start SCN is 19993679\nRecovery\
    \ must be done beyond SCN 19993680 to clear datafile fuzziness\n```\n\nHere are\
    \ some more examples of how to preview backups required for restore and recovery:\n\
    \n```\nRMAN> restore tablespace system preview;\nRMAN> restore archivelog from\
    \ time 'sysdate -1' preview;\nRMAN> restore datafile 1, 2, 3 preview;\n```\n\n\
    ### Validating Backup Files Before Restoring\n\nThere are several levels of verification\
    \ that you can perform on backup files without actually restoring anything. If\
    \ you just want RMAN to verify that the files exist and check the file headers,\
    \ the use the `RESTORE...VALIDATE HEADER` command like so:\n\n```\nRMAN> restore\
    \ database validate header;\n```\n\nThis command only validates the existence\
    \ of files and the file headers. You can further instruct RMAN to verify the integrity\
    \ of blocks within backup files required to restore the database datafiles via\
    \ the `RESTORE...VALIDATE` command (sans the `HEADER` clause). Again, RMAN will\
    \ not restore any datafiles in this mode:\n\n```\nRMAN> restore database validate;\n\
    ```\n\nThis command only checks for physical corruption within the backup files.\
    \ You can also check for logical corruption (along with physical corruption) as\
    \ follows:\n\n```\nRMAN> restore database validate check logical;\n```\n\nHere\
    \ are some other examples of using `RESTORE...VALIDATE`:\n\n```\nRMAN> restore\
    \ datafile 1,2,3 validate;\nRMAN> restore archivelog all validate;\nRMAN> restore\
    \ controlfile validate;\nRMAN> restore tablespace system validate;\n```\n\n###\
    \ Testing Media Recovery\n\nThe prior sections covered reporting and verifying\
    \ the restore operations. You can also instruct RMAN to verify the recovery process\
    \ via the `RECOVER...TEST` command. Before performing a test recovery, you need\
    \ to ensure that the datafiles being recovered are offline. Oracle will throw\
    \ an error for any online datafiles being recovered in test mode.\n\nIn this example,\
    \ the tablespace `USERS` is restored first, and then a trial recovery is performed:\n\
    \n```\nRMAN> connect target /\nRMAN> startup mount;\nRMAN> restore tablespace\
    \ users;\nRMAN> recover tablespace users test;\n```\n\nIf there are any missing\
    \ archive redo logs that are required for recovery, the following error is thrown:\n\
    \n```\nRMAN-06053: unable to perform media recovery because of missing log\nRMAN-06025:\
    \ no backup of archived log for thread 1 with sequence 10 and starting SCN...\n\
    ```\n\nIf the testing of the recovery succeeded, you will messages like the following,\
    \ indicating the application of redo was tested but not applied:\n\n```\nORA-10574:\
    \ Test recovery did not corrupt any data block\nORA-10573: Test recovery tested\
    \ redo from change 19993679 to 19993861\nORA-10572: Test recovery canceled due\
    \ to errors\nORA-10585: Test recovery can not apply redo that may modify control\
    \ file\n```\n\nHere are some other examples of testing the recovery process:\n\
    \n```\nRMAN> recover database test;\nRMAN> recover tablespace users, tools test;\n\
    RMAN> recover datafile 1,2,3 test;\n```\n\n## Restoring Entire Database\n\nThe\
    \ `RESTORE DATABASE` command will restore every datafile in your database. The\
    \ exception to this is when RMAN detects that datafiles have already been restored;\
    \ in that case, it will not restore them again.\n\nIf you want to override that\
    \ behavior, use the `FORCE` command.\n\nWhen you issue the `RECOVER DATABASE`\
    \ command, RMAN will automatically apply redo to any datafiles that need recovery.\
    \ The recovery process includes applying changes found in the following:\n\n-\
    \ Incremental backup pieces (applicable only if using incremental backups)\n-\
    \ Archived redo log files (generated since the last backup or last incremental\
    \ backup that is applied)\n- Online redo log files (current and unarchived)\n\n\
    You can open your database after the restore and recovery process is complete.\
    \ Complete database recovery works only if you have good backups of your database\
    \ and have access to all redo generated after the backup was taken. You need all\
    \ the redo required to recover the database datafiles. If you don’t have all the\
    \ required redo, then you’ll most likely have to perform an incomplete recovery\
    \ (covered later in this chapter).\n\n■ **Note** Your database has to be at least\
    \ mounted to restore datafiles using RMAN. This is because RMAN reads information\
    \ from the control file during the restore and recovery process.\n\nYou can perform\
    \ a complete database-level recovery with either the current control file or a\
    \ backup control file.\n\n### Using Current Control File\n\nYou must first put\
    \ your database in mount mode to perform a database-wide restore and recovery.\
    \ This is because the `SYSTEM` tablespace datafile(s) must be offline when being\
    \ restored and recovered. Oracle won’t allow you to operate your database in open\
    \ mode with datafiles associated with the `SYSTEM` tablespace offline. In this\
    \ situation, start up the database in mount mode, issue the `RESTORE` and `RECOVER`\
    \ commands, and then open the database like so:\n\n```\nRMAN> connect target /\n\
    RMAN> startup mount;\nRMAN> restore database;\nRMAN> recover database;\nRMAN>\
    \ alter database open;\n```\n\nIf everything went as expected, the last message\
    \ you should see is this:\n\n```\ndatabase opened\n```\n\n### Using Backup Control\
    \ File\n\nThis solution uses a backup of the control file retrieved from the fast\
    \ recovery area. For more examples of how to restore your control file, see the\
    \ “Restoring Control Files” section of this chapter. In this scenario, the control\
    \ file is first retrieved from a backup before restoring and recovering the database:\n\
    \n```\nRMAN> connect target /\nRMAN> startup nomount;\nRMAN> restore controlfile\
    \ from autobackup;\nRMAN> alter database mount;\nRMAN> restore database;\nRMAN>\
    \ recover database;\nRMAN> alter database open resetlogs;\n```\n\nIf everything\
    \ went as expected, the last message you should see is this:\n\n```\ndatabase\
    \ opened\n```\n\n■ **Note** You are required to open your database with the `OPEN\
    \ RESETLOGS` command anytime you use a backup control file during a recovery operation.\n\
    \n## Restoring Tablespaces\n\nSometimes you'll have media failures that are localized\
    \ to a particular tablespace or set of tablespaces. In these circumstances, it's\
    \ appropriate to restore and recover at the tablespace level of granularity. The\
    \ RMAN `RESTORE TABLESPACE` and `RECOVER TABLESPACE` commands will restore and\
    \ recover all datafiles associated with the specified tablespace(s).\n\n### Restoring\
    \ Tablespace While Database is Open\n\nIf your database is open, then you must\
    \ take offline the tablespace you want to restore and recover. You can do this\
    \ for any tablespaces except for `SYSTEM` and `UNDO`. This example restores and\
    \ recovers the `USERS` tablespace while database is open:\n\n```\nRMAN> connect\
    \ target /\nRMAN> sql 'alter tablespace users offline immediate';\nRMAN> restore\
    \ tablespace users;\nRMAN> recover tablespace users;\nRMAN> sql 'alter tablespace\
    \ users online';\n```\n\nAfter the tablespace is brought online, you should see\
    \ a message similar to this:\n\n```\nsql statement: alter tablespace users online\n\
    ```\n\n### Restoring Tablespace While Database in Mount Mode\n\nUsually when performing\
    \ a restore and recovery, DBAs will shut down the database re-start the database\
    \ in mount mode in preparation to perform the recovery. While a database is mount\
    \ mode this ensures that no users are connecting to the database and also ensures\
    \ that no transactions are transpiring. This next example restores the `SYSTEM`\
    \ tablespace while the database is in mount mode:\n\n```\nRMAN> connect target\
    \ /\nRMAN> shutdown immediate;\nRMAN> startup mount;\nRMAN> restore tablespace\
    \ system;\nRMAN> recover tablespace system;\nRMAN> alter database open;\n```\n\
    \nIf everything was successful, the last message you should see is this:\n\n```\n\
    database opened\n```\n\n### Restoring Read-Only Tablespaces\n\nRMAN will restore\
    \ read-only tablespaces along with the rest of the database when you issue a `RESTORE\
    \ DATDABASE` command. For example, the following command will restore all datafiles\
    \ (including those in read-only mode):\n\n```\nRMAN> restore database;\n```\n\n\
    Prior to Oracle Database 11 *g*, you were required to issue `RESTORE DATABASE\
    \ CHECK READONLY` to instruct RMAN to restore read-only tablespaces along with\
    \ tablespaces in read-write mode. This is no longer a requirement in Oracle Database\
    \ 11 *g* or higher.\n\n■ **Note** If you are using a backup that was created after\
    \ the read-only tablespace was placed into read-only mode, then no recovery is\
    \ necessary for the read-only datafiles. In this situation, there is no redo that\
    \ has been generated for the read-only tablespace since it was backed up.\n\n\
    ### Restoring Temporary Tablespaces\n\nStarting with Oracle Database 10 *g*, you\
    \ don’t have to restore or re-create missing locally managed temporary tablespace\
    \ tempfiles. When you open your database for use, Oracle automatically detects\
    \ and re-creates locally managed temporary tablespace tempfiles.\n\nWhen Oracle\
    \ automatically re-creates a temporary tablespace, it will log a message to your\
    \ target database `alert.log` similar to the following:\n\n```\nRe-creating tempfile\
    \ <your temporary tablespace filename>\n```\n\nIf for any reason your temporary\
    \ tablespace becomes unavailable, you can also re-create it yourself. Since there\
    \ are never any permanent objects in temporary tablespaces, you can simply re-create\
    \ them as needed. Here is an example of how to create a locally managed temporary\
    \ tablespace:\n\n```\nCREATE TEMPORARY TABLESPACE temp TEMPFILE\n'/ora03/oradata/BRDSTN/temp01.dbf'\
    \ SIZE 5000M REUSE\nEXTENT MANAGEMENT LOCAL UNIFORM SIZE 512K;\n```\n\nIf your\
    \ temporary tablespace exists but the temporary datafiles are missing, you can\
    \ simply add the temporary datafile(s) as shown here:\n\n```\nalter tablespace\
    \ temp\nadd tempfile '/ora03/oradata/BRDSTN/temp01.dbf' SIZE 5000M REUSE;\n```\n\
    \n## Restoring Datafiles\n\nA datafile-level restore and recovery works well when\
    \ a media failure is isolated to a small set of datafiles. With datafile-level\
    \ recoveries, you can instruct RMAN to restore and recover either with datafile\
    \ number or the datafile name. For datafiles not associated with the `SYSTEM`\
    \ or `UNDO` tablespaces, you have the option of restoring and recovering while\
    \ the database remains open. While the database is open, you have to first take\
    \ offline any datafiles being restored and recovered.\n\n### Restoring Datafile\
    \ While Database Is Open\n\nUse the `RESTORE DATAFILE` and `RECOVER DATAFILE`\
    \ commands to restore and recover at the datafile level. When your database is\
    \ open, you’re required to take offline any datafiles you’re attempting to restore\
    \ and recover. This example restores and recovers datafiles 32 and 33 while the\
    \ database is open:\n\n```\nRMAN> sql 'alter database datafile 32, 33 offline';\n\
    RMAN> restore datafile 32, 33;\nRMAN> recover datafile 32, 33;\nRMAN> sql 'alter\
    \ database datafile 32, 33 online';\n```\n\n■ **Tip** Use the RMAN `REPORT SCHEMA`\
    \ command to list datafile names and file numbers. You can also query the `NAME`\
    \ and `FILE#` columns of `V$DATAFILE` to take names and numbers.\n\nYou can also\
    \ specify the name of the datafile that you want to restore and recover. In this\
    \ example, the `mvdata01.dbf` datafile is restored and recovered:\n\n```\nRMAN>\
    \ sql \"alter database datafile ''/ora01/dbfile/O11R2/mvdata01.dbf'' offline\"\
    ;\nRMAN> restore datafile '/ora01/dbfile/O11R2/mvdata01.dbf';\nRMAN> recover datafile\
    \ '/ora01/dbfile/O11R2/mvdata01.dbf';\nRMAN> sql \"alter database datafile ''/ora01/dbfile/O11R2/mvdata01.dbf''\
    \ online\";\n```\n\n■ **Note** When using the RMAN `SQL` command, if there are\
    \ single quote marks within the SQL statement, then you are required to use double\
    \ quotes to enclose the entire SQL statement and to use two single quote marks\
    \ where you would ordinarily just use one quote mark.\n\n### Restoring Datafile\
    \ While Database Is Not Open\n\nIn this scenario, the database is first shut down\
    \ and then started in mount mode. You can restore and recover any datafile in\
    \ your database while the database is not open. This example shows restoring the\
    \ datafile 1, which is associated to the `SYSTEM` tablespace:\n\n```\nRMAN> connect\
    \ target /\nRMAN> shutdown abort;\nRMAN> startup mount;\nRMAN> restore datafile\
    \ 1;\nRMAN> recover datafile 1;\nRMAN> alter database open;\n```\n\nYou can also\
    \ specify the filename when performing a datafile recovery:\n\n```\nRMAN> connect\
    \ target /\nRMAN> shutdown abort;\nRMAN> startup mount;\nRMAN> restore datafile\
    \ '/ora01/dbfile/O11R2/system01.dbf';\nRMAN> recover datafile '/ora01/dbfile/O11R2/system01.dbf';\n\
    RMAN> alter database open;\n```\n\n### Restoring Datafiles to Non-Default Locations\n\
    \nSometimes a failure will occur that renders the disks associated with a mount\
    \ point inoperable. In situations like this, you will need to restore and recover\
    \ the datafiles to a different location from where they originally resided. Another\
    \ typical need for restoring datafiles to non-default locations is that you're\
    \ restoring to a different database server where the mount points are completely\
    \ different from the server where the backup originated.\n\nUse the `SET NEWNAME`\
    \ and `SWITCH` commands to restore datafiles to non-default locations. Both of\
    \ these commands must be run from within an RMAN `run{}` block. You can think\
    \ of using `SET NEWNAME` and `SWITCH` as a way to rename datafiles (similar to\
    \ the SQL*Plus `ALTER DATABASE RENAME FILE` statement).\n\nThis example changes\
    \ the location of datafiles 32 and 33:\n\n```\nRMAN> connect target /\nRMAN> startup\
    \ mount;\nRMAN> run{\n2> set newname for datafile 32 to '/ora02/dbfile/O11R2/mvdata01.dbf';\n\
    3> set newname for datafile 33 to '/ora02/dbfile/O11R2/mvindex01.dbf';\n4> restore\
    \ datafile 32, 33;\n5> switch datafile all; # Updates repository with new datafile\
    \ location.\n6> recover datafile 32, 33;\n7> alter database open;\n8> }\n```\n\
    \nThis is a partial listing of the output:\n\n```\nchannel ORA_DISK_2: restore\
    \ complete, elapsed time: 00:00:01\nFinished restore at 22-SEP-10\n...\ndatafile\
    \ 32 switched to datafile copy\ninput datafile copy RECID=92 STAMP=730375692 file\
    \ name=/ora02/dbfile/O11R2/mvdata01.dbf\ndatafile 33 switched to datafile copy\n\
    input datafile copy RECID=93 STAMP=730375692 file name=/ora02/dbfile/O11R2/mvindex01.dbf\n\
    ...\nStarting recover at 22-SEP-10\nmedia recovery complete, elapsed time: 00:00:05\n\
    Finished recover at 22-SEP-10\ndatabase opened\n```\n\nIf the database is open,\
    \ you can place the datafiles offline and then set their new names for restore\
    \ and recovery like so:\n\n```\nRMAN> run{\n2> sql 'alter database datafile 32,\
    \ 33 offline';\n3> set newname for datafile 32 to '/ora02/dbfile/O11R2/mvdata01.dbf';\n\
    4> set newname for datafile 33 to '/ora02/dbfile/O11R2/mvindex01.dbf';\n5> restore\
    \ datafile 32, 33;\n6> switch datafile all; # Updates repository with new datafile\
    \ location.\n7> recover datafile 32, 33;\n8> sql 'alter database datafile 32,\
    \ 33 online';\n9> }\n```\n\nYou should now see a message similar to the following:\n\
    \n```\nstarting media recovery\nFinished recover at 22-SEP-10\nsql statement:\
    \ alter database datafile 32, 33 online\n```\n\n## Performing Block Level Recovery\n\
    \nBlock-level corruption is rare and is usually caused by some sort of I/O error.\
    \ However, if you do have an isolated corrupt block within a large datafile, it’s\
    \ nice to have the option of performing a block-level recovery. Block-level recovery\
    \ is useful when a small number of blocks are corrupt within a datafile. Block\
    \ recovery is not appropriate if the entire datafile needs media recovery.\n\n\
    RMAN will automatically detect corrupt blocks whenever a `BACKUP`, `VALIDATE`,\
    \ or `BACKUP VALIDATE` command is run. Details on corrupt blocks can be viewed\
    \ in the `V$DATABASE_BLOCK_CORRUPTION` view. In the following example, the regular\
    \ backup job has reported a corrupt block in the output:\n\n```\nORA-19566: exceeded\
    \ limit of 0 corrupt blocks for file...\n```\n\nQuerying the `V$DATABASE_BLOCK_CORRUPTION`\
    \ view indicates which file contains corruption:\n\n```\nSQL> select * from v$database_block_corruption;\n\
    \nFILE# BLOCK# BLOCKS CORRUPTION_CHANGE# CORRUPTIO\n---------- ---------- ----------\
    \ ------------------ ---------\n5    20        1                 0 ALL ZERO\n\
    ```\n\nYour database can be either mounted or open when performing block level\
    \ recovery. You do not have to take the datafile being recovered offline. You\
    \ can instruct RMAN to recover all blocks reported in `V$DATABASE_BLOCK_CORRUPTION`\
    \ as shown:\n\n```\nRMAN> recover corruption list;\n```\n\nIf successful, the\
    \ following message is displayed:\n\n```\nmedia recovery complete...\n```\n\n\
    Another way to recover the block is to specify the datafile and block number like\
    \ so:\n\n```\nRMAN> recover datafile 5 block 20;\n```\n\nIt's preferable to use\
    \ the `RECOVER CORRUPTION LIST` syntax because it will clear out any blocks recovered\
    \ from the `V$DATABASE_BLOCK_CORRUPTION` view.\n\n■ **Note** RMAN cannot perform\
    \ block-level recovery on block 1 (datafile header) of the datafile.\n\nBlock-level\
    \ media recovery allows you to keep your database available and also reduces the\
    \ mean time to recovery since only the corrupt blocks are offline during the recovery.\
    \ Your database must be in archivelog mode for performing block-level recoveries.\
    \ In Oracle Database 11 *g*, RMAN can restore the block from the flashback logs\
    \ (if available). If the flashback logs are not available, then RMAN will attempt\
    \ to restore the block from a full backup, a level 0 backup, or an image copy\
    \ backup generated by `BACKUP AS COPY` command. After the block has been restored,\
    \ any required archived redo logs must be available to recover the block. RMAN\
    \ can’t perform block media recovery using incremental level 1 (or higher) backups.\n\
    \n■ **Note** If you’re using Oracle Database 10g or Oracle9i Database, use the\
    \ `BLOCKRECOVER` command to perform block media recovery. Block level recovery\
    \ is not available in Oracle version 8.\n\n## Restoring Archive Redo Log Files\n\
    \nRMAN will automatically restore any archived redo log files that it needs during\
    \ a recovery process. You normally don't need to manually restore archived redo\
    \ log files. However, you may want to manually restore the archived redo log files\
    \ if any of the following situations apply:\n\n- You need to restore archived\
    \ redo log files in anticipation of later performing a recovery; the idea is that\
    \ if the archived redo log files are already restored, it will speed up the recovery\
    \ operation.\n- You’re required to restore the archived redo log files to a non-default\
    \ location, either because of media failure or because of storage space issues.\n\
    - You need to restore specific archived redo log files because you want to inspect\
    \ them via LogMiner.\n\nIf you’ve enabled a flash recovery area, then RMAN will\
    \ by default restore archived redo log files to the destination defined by the\
    \ initialization parameter `DB_RECOVERY_FILE_DEST`. Otherwise, RMAN uses the `LOG_ARCHIVE_DEST_1`\
    \ initialization parameter to determine where to restore the archived redo log\
    \ files.\n\nIf you restore archived redo log files to a non-default location,\
    \ RMAN knows the location they were restored to and automatically finds these\
    \ files when you issue any subsequent `RECOVER` commands.\n\nRMAN will not restore\
    \ archived redo log files that it determines are already on disk. Even if you\
    \ specify a non-default location, RMAN will not restore an archived redo log file\
    \ to disk if the file already exists. In this situation, RMAN will simply return\
    \ a message stating that the archived redo log file has already been restored.\
    \ Use the `FORCE` option to override this behavior.\n\nIf you are uncertain of\
    \ the sequence numbers to use during a restore of log files, you can query the\
    \ `V$LOG_HISTORY` view or issue an RMAN `LIST BACKUP` command for more information.\n\
    \n■ **Note** When restoring archived redo log files, your database can be either\
    \ mounted or open.\n\n### Restoring to the Default Location\n\nThe following command\
    \ will restore all archived redo log files that RMAN has backed up:\n\n```\nRMAN>\
    \ restore archivelog all;\n```\n\nIf you want to restore from a specified sequence,\
    \ use the `FROM SEQUENCE` clause. You may want to run this query first to determine\
    \ the most recent log files and sequence numbers that have been generated:\n\n\
    ```\nSQL> select sequence#, first_time from v$log_history order by 2;\n```\n\n\
    This example restores all archived redo log files from sequence 68:\n\n```\nRMAN>\
    \ restore archivelog from sequence 68;\n```\n\nIf you want to restore a range\
    \ of archived redo log files, use the `FROM SEQUENCE` and `UNTIL SEQUENCE` clauses\
    \ or the `SEQUENCE BETWEEN` clause, as shown here. The following commands restore\
    \ archived redo log files from sequence 68 through (and including) sequence 78\
    \ using thread 1:\n\n```\nRMAN> restore archivelog from sequence 68 until sequence\
    \ 78 thread 1;\nRMAN> restore archivelog sequence between 68 and 78 thread 1;\n\
    ```\n\nBy default, RMAN won’t restore an archived redo log file if it is already\
    \ on disk. You can override this behavior if you use the `FORCE` like so:\n\n\
    ```\nRMAN> restore archivelog from sequence 1 force;\n```\n\n### Restoring to\
    \ a Nondefault Location\n\nUse the `SET ARCHIVELOG DESTINATION` clause if you\
    \ want to restore archived redo log files to a different location than the default.\
    \ The following example restores to the non-default location of `/ora01/archtemp`.\
    \ This option of the `SET` command must be executed from within an RMAN `run{}`\
    \ block.\n\n```\nRMAN> run{\n2> set archivelog destination to '/ora01/archtemp';\n\
    3> restore archivelog from sequence 68 force;\n4> }\n```\n\n## Restoring the Spfile\n\
    \nYou might want to restore a spfile for several different reasons:\n\n- You accidentally\
    \ set a value in the spfile that keeps your instance from starting.\n- You accidentally\
    \ deleted the spfile.\n- You are required to see what it looked like at some time\
    \ in the past.\n\nOne scenario (this has happened to me more than once) is that\
    \ you're using a spfile and one of the DBAs on your team does something inexplicable\
    \ like this:\n\n```\nSQL> alter system set processes=1000000 scope=spfile;\n```\n\
    \nThe parameter is changed in the pfile on disk but not in memory. Several months\
    \ later, the database is stopped for some maintenance. When attempting to start\
    \ the database, you can't even get the instance to start in a `NOMOUNT` state.\
    \ This is because a parameter has been set to a ridiculous value that will consume\
    \ all memory on the box. In this scenario, the instance may hang or you might\
    \ see this message:\n\n```\nORA-01078: failure in processing system parameters\n\
    LRM-00109: could not open parameter file\n```\n\nIf you are using a recovery catalog,\
    \ it’s a fairly simple procedure to restore the spfile:\n\n```\nRMAN> connect\
    \ target /\nRMAN> connect catalog rmancat/foo@rcat\nRMAN> startup nomount;\nRMAN>\
    \ restore spfile;\n```\n\nIf you’re not using a recovery catalog, there are a\
    \ number of ways to restore your spfile. The approach you take depends on several\
    \ variables such as:\n\n- If you’re using a FRA\n- If you’ve configured a channel\
    \ backup location for the autobackup\n- If you’re using the default location for\
    \ autobackups\n\nI’m not going to show every detail of all of these scenarios.\
    \ Usually I determine the location of the backup piece that contains the backup\
    \ of the spfile and do the restore like this:\n\n```\nRMAN> startup nomount force;\n\
    RMAN> restore spfile from\n'/ora01/fra/O11R2/autobackup/2010_09_18/o1_mf_s_730048900_69bcc8h2_.bkp';\n\
    ```\n\nYou should see a message similar to this:\n\n```\nchannel ORA_DISK_1: SPFILE\
    \ restore from AUTOBACKUP complete\n```\n\nIn this example, I knew that a FRA\
    \ was in use and located the latest backup file in the autobackup directory and\
    \ used it.\n\n■ **Note** For a complete description of all possible spfile and\
    \ control file restore scenarios, refer to *RMAN Recipes for Oracle Database 11g*\
    \ (Apress, 2007).\n\n## Restoring a Control File\n\nIf you are missing one control\
    \ file and you have multiple copies, then you can shutdown your database, and\
    \ simply restore the missing or damaged control file by copying a good control\
    \ file to the correct location and name of the missing control file (see Chapter\
    \ 5 for details).\n\nThe following sections cover these specific scenarios when\
    \ restoring a control file:\n\n- Using a Recovery Catalog.\n- Using an autobackup.\n\
    - Specifying a backup file name.\n\n### Using a Recovery Catalog\n\nWhen you’re\
    \ connected to the recovery catalog, you can view backup information about your\
    \ control files even while your target database is in `NOMOUNT` mode. To list\
    \ backups of your control files, use the `LIST` command as shown here:\n\n```\n\
    RMAN> connect target /\nRMAN> connect catalog rcat/rcat@recov\nRMAN> startup nomount;\n\
    RMAN> list backup of controlfile;\n```\n\nIf you are missing all of your control\
    \ files and you are using a recovery catalog, then issue `STARTUP NOMOUNT` and\
    \ issue the `RESTORE CONTROLFILE` command. In this example, the recovery catalog\
    \ owner and password are both `rcat` and the name of the recovery catalog is `recov`.\
    \ You’ll have to change those values to match the username/password@service in\
    \ your environment.\n\n```\nRMAN> connect target /\nRMAN> connect catalog rcat/rcat@recov\n\
    RMAN> startup nomount;\nRMAN> restore controlfile;\n```\n\nRMAN restores the control\
    \ files to the location defined by your `CONTROL_FILES` initialization parameter.\
    \ You should see a message indicating that your control files have been successfully\
    \ copied back from an RMAN backup piece. Here’s a partial listing of RMAN’s message\
    \ stack after a successful control file restore:\n\n```\nallocated channel: ORA_DISK_1\n\
    channel ORA_DISK_1: sid=156 devtype=DISK\nchannel ORA_DISK_1: restoring control\
    \ file\nchannel ORA_DISK_1: reading from backup piece\nchannel ORA_DISK_1: restore\
    \ complete, elapsed time: 00:00:05\n```\n\nYou can now alter your database into\
    \ mount mode and perform any additional restore and recovery commands required\
    \ for your database.\n\n■ **Note** When you restore a control file from a backup,\
    \ you are required to perform media recovery on your entire database and open\
    \ your database with the `OPEN RESETLOGS` command, even if you didn’t restore\
    \ any datafiles.\n\nYou can determine whether your control file is a backup by\
    \ querying the `CONTROLFILE_TYPE` column of the `V$DATABASE` view.\n\n### Using\
    \ an Autobackup to Restore\n\nWhen you enable the autobackup of your control file\
    \ and are using a fast recovery area, restoring your control file is fairly simple.\
    \ First, connect to your target database, then issue a `STARTUP NOMOUNT` command,\
    \ and lastly issue the `RESTORE CONTROLFILE FROM AUTOBACKUP` command like so:\n\
    \n```\nRMAN> connect target /\nRMAN> startup nomount;\nRMAN> restore controlfile\
    \ from autobackup;\n```\n\nRMAN restores the control files to the location defined\
    \ by your `CONTROL_FILES` initialization parameter. You should see a message indicating\
    \ that your control files have been successfully copied back from an RMAN backup\
    \ piece. Here is a partial snippet of the output:\n\n```\nallocated channel: ORA_DISK_1\n\
    channel ORA_DISK_1: sid=156 devtype=DISK\ndatabase name (or database unique name)\
    \ used for search: ORCL\nchannel ORA_DISK_1: autobackup found in the recovery\
    \ area\n```\n\nYou can now alter your database into mount mode and perform any\
    \ additional restore and recovery commands required for your database.\n\n###\
    \ Specifying a Filename\n\nWhen restoring a database to a different server, the\
    \ first few steps in the process usually are: take a backup of the target database,\
    \ copy to the remote server, and then restore the control file from the RMAN backup.\
    \ In these scenarios, I usually know the name of the backup piece that contains\
    \ the control file. Here is an example where you instruct RMAN to restore a control\
    \ file from a specific backup piece file:\n\n```\nRMAN> startup nomount;\nRMAN>\
    \ restore controlfile from '/ora01/O11R2/rman/c-3453199553-20100923-07.bk';\n\
    ```\n\nThe control file will be restored to the location defined by the `CONTROL_FILES`\
    \ initialization parameter.\n\n## Incomplete Recovery\n\n*Incomplete database\
    \ recovery* means that you cannot recover all committed transactions. Incomplete\
    \ means that you do not apply all redo to restore to the point of the last committed\
    \ transaction that occurred in your database. In other words, you are restoring\
    \ and recovering to a point in time in the past. For this reason, incomplete database\
    \ recovery is also called *database point-in-time recovery* (DBPITR). Usually\
    \ you perform incomplete database recovery because of one of the following reasons:\n\
    \n- You don’t have all the redo required to perform a complete recovery. You’re\
    \ missing either the archived redo log files or online redo log files that are\
    \ required for complete recovery. This situation could arise because the required\
    \ redo files are damaged or missing.\n- You purposely want to roll the database\
    \ back to a point in time. For example, you would do this if somebody accidentally\
    \ truncated a table and you intentionally wanted to roll the database back to\
    \ just before the truncate table command was issued.\n\n■ **Tip** To minimize\
    \ the chance of failure with your online redo log files, I recommend you multiplex\
    \ them with at least two members in each group and have each member on separate\
    \ physical devices governed by separate controllers.\n\nIncomplete database recovery\
    \ consists of two steps: restore and recovery. The restore step will recreate\
    \ datafiles, and the recover step will apply redo up to the specified point in\
    \ time. The restore process can be initiated from RMAN in several ways:\n\n- `RESTORE\
    \ DATABASE UNTIL`\n- `RESTORE TABLESPACE UNTIL`\n- `FLASHBACK DATABASE`\n\nFor\
    \ the majority of incomplete database recovery circumstances, you use the `RESTORE\
    \ DATABASE UNTIL` command to instruct RMAN to retrieve datafiles from the RMAN\
    \ backup files. This type of incomplete database recovery is the main focus of\
    \ this chapter. The `UNTIL` portion of the `RESTORE DATABASE` command instructs\
    \ RMAN to retrieve datafiles from a point in the past based on one of the following\
    \ methods:\n\n- Time\n- Change (sometimes called *system change number* or SCN)\n\
    - Log sequence number\n- Restore point\n\nThe RMAN `RESTORE DATABASE UNTIL` command\
    \ will retrieve all datafiles from the most recent backup set or image copy. RMAN\
    \ will automatically determine from the `UNTIL` clause which backup set contains\
    \ the required datafiles. If you omit the `UNTIL` clause of the `RESTORE DATABASE`\
    \ command, RMAN will retrieve datafiles from latest available backup set or image\
    \ copy. In some situations, this may be the behavior you desire. I recommend you\
    \ use the `UNTIL` clause to ensure that RMAN restores from the correct backup\
    \ set. When you issue the `RESTORE DATABASE UNTIL` command, RMAN will determine\
    \ how to extract the datafiles from any of the following:\n\n- Full database backup\n\
    - Incremental level 0 backup\n- Image copy backup generated by the `BACKUP AS\
    \ COPY` command\n\nYou cannot perform an incomplete database recovery on a subset\
    \ of your database’s online datafiles. When performing incomplete database recovery,\
    \ all of the checkpoint SCNs for all online datafiles must be synchronized before\
    \ you can open your database with the `alter database open resetlogs` command.\
    \ You can view the datafile header SCNs and the status of each datafile via this\
    \ SQL query:\n\n```\nselect\n  file#\n  ,status\n  ,fuzzy\n  ,error\n  ,checkpoint_change#,\n\
    \  to_char(checkpoint_time,'dd-mon-rrrr hh24:mi:ss') as checkpoint_time\nfrom\
    \ v$datafile_header;\n```\n\n■ **Note** The `FUZZY` column of `V$DATAFILE_HEADER`\
    \ refers to a datafile that contains one or more blocks that have an SCN value\
    \ greater than or equal to the checkpoint SCN in the datafile header. If datafile\
    \ is restored and has a `FUZZY` value of `YES`, then media recovery is required.\n\
    \nThe only exception to this rule of not performing an incomplete recovery on\
    \ a subset of online database files is a tablespace point-in-time recovery (TSPITR),\
    \ which uses the `RECOVER TABLESPACE UNTIL` command. TSPITR is used in rare situations;\
    \ it restores and recovers only the tablespace(s) you specify.\n\nThe recovery\
    \ portion of an incomplete database recovery is always initiated with the `RECOVER\
    \ DATABASE UNTIL` command. RMAN will automatically recover your database to the\
    \ point specified with the `UNTIL` clause. Just like the `RESTORE` command, you\
    \ can recover until time, change/SCN, log sequence number, or restore point. When\
    \ RMAN reaches the specified point, it will automatically terminate the recovery\
    \ process.\n\n■ **Note** Regardless of what you specify in the `UNTIL` clause,\
    \ RMAN will convert that into a corresponding `UNTIL SCN` clause and assign the\
    \ appropriate SCN. This is to avoid any timing issues, particularly those caused\
    \ by daylight saving time.\n\nDuring a recovery, RMAN will automatically determine\
    \ how to apply redo. First, RMAN will apply any incremental backups available.\
    \ Next, any archived redo log files on disk will be applied. If the archived redo\
    \ log files do not exist on disk, then RMAN will attempt to retrieve them from\
    \ a backup set. If you want to apply redo as part of an incomplete database recovery,\
    \ the following conditions must be true:\n\n- Your database must be in archivelog\
    \ mode.\n- You must have a good backup of all datafiles.\n- You must have all\
    \ redo required to restore up to the specified point.\n\n■ **Tip** Starting with\
    \ Oracle Database 10g, you can perform parallel media recovery by using the `RECOVER\
    \ DATABASE PARALLEL` command.\n\nWhen performing an incomplete database recovery\
    \ with RMAN, you must have your database in mount mode. RMAN needs the database\
    \ in mount mode to be able to read and write to the control file. Also, with an\
    \ incomplete database recovery, the system datafile is always one of the datafiles\
    \ being recovered. The `SYSTEM` tablespace's datafile(s) must be offline while\
    \ it is being recovered. Oracle will not allow your database to be open while\
    \ this is happening.\n\n■ **Note** After incomplete database recovery is performed,\
    \ you are required to open your database with the `ALTER DATABASE OPEN RESETLOGS`\
    \ command.\n\nDepending on your scenario, you can use RMAN to perform a variety\
    \ of incomplete recovery methods. The next section discusses how to determine\
    \ what type of incomplete recovery to perform.\n\n### Determining the Type of\
    \ Incomplete Recovery\n\nTime-based restore and recovery is commonly used when\
    \ you know the approximate date and time to which you want to recover your database.\
    \ For example, you may know approximately the time you want to stop the recovery\
    \ process but not a particular SCN.\n\nLog sequence–based and cancel-based recovery\
    \ work well in situations where you have missing or damaged log files. In such\
    \ scenarios, you can recover only up to your last good archived redo log file.\n\
    \nSCN-based recovery works well if you can pinpoint the SCN at which you want\
    \ to stop the recovery process. You can retrieve SCN information from views such\
    \ as `V$LOG` and `V$LOG_HISTORY`. You can also use tools such as LogMiner to retrieve\
    \ the SCN of a particular SQL statement.\n\nRestore point recoveries work only\
    \ if you have established restore points. In these situations, you restore and\
    \ recover up to the SCN associated with the specified restore point.\n\nTablespace\
    \ point-in-time recovery is used in situations where you can restore and recover\
    \ just a few tablespaces. You can use RMAN to automate many of the tasks associated\
    \ with this type of incomplete recovery.\n\n■ **Note** Flashing back your database\
    \ works only if you have enabled the flashback database feature (see Chapter 16\
    \ for details).\n\n### Performing Time-Based Recovery\n\nTo restore and recover\
    \ your database back to a point in time, you can use either the `UNTIL TIME` clause\
    \ of the `RESTORE` and `RECOVER` commands or the `SET UNTIL TIME` clause within\
    \ a `run{}` block. RMAN will restore and recover the database up to, but not including,\
    \ the specified time. In other words, RMAN will restore any transactions committed\
    \ prior to the time specified. RMAN automatically stops the recovery process when\
    \ it reaches the time you specified.\n\nThe default date format that RMAN expects\
    \ is `YYYY-MM-DD:HH24:MI:SS`. However, I recommend using the `TO_DATE` function\
    \ and specifying a format mask. This eliminates ambiguities with different national\
    \ date formats and having to set the operating system `NLS_DATE_FORMAT` variable.\
    \ The following example specifies a time when issuing the restore and recover\
    \ commands:\n\n```\nRMAN> connect target /\nRMAN> startup mount;\nRMAN> restore\
    \ database until time\n2> \"to_date('04-sep-2010 14:00:00', 'dd-mon-rrrr hh24:mi:ss')\"\
    ;\nRMAN> recover database until time\n2> \"to_date('04-sep-2010 14:00:00', 'dd-mon-rrrr\
    \ hh24:mi:ss')\";\nRMAN> alter database open resetlogs;\n```\n\nIf everything\
    \ went well, you should now see output similar to this:\n\n```\nDatabase altered\n\
    ```\n\n### Performing Log Sequenced-Based Recovery\n\nUsually this type of incomplete\
    \ database recovery is initiated because you have a missing or damaged archived\
    \ redo log file. If that’s the case, you can recover only up to your last good\
    \ archived redo log file, because you cannot skip a missing archived redo log.\n\
    \nHow you determine which archived redo log file to restore up to (but not including)\
    \ will vary by situation. For example, if you are physically missing an archived\
    \ redo log file and if RMAN can’t find it in a backup set, then you’ll receive\
    \ the following message when trying to apply the missing file:\n\n```\nRMAN-06053:\
    \ unable to perform media recovery because of missing log\nRMAN-06025: no backup\
    \ of log thread 1 seq 45 lowscn 2149069 found to restore\n```\n\nBased on the\
    \ previous error message, you would restore up to (but not including) log sequence\
    \ 45.\n\n```\nRMAN> connect target /\nRMAN> startup mount;\nRMAN> restore database\
    \ until sequence 45;\nRMAN> recover database until sequence 45;\nRMAN> alter database\
    \ open resetlogs;\n```\n\nIf everything went well, you should now see output similar\
    \ to this:\n\n```\nDatabase altered\n```\n\n■ **Note** Log sequenced-based recovery\
    \ is similar to user-managed cancel based recovery. See Chapter 16 for details\
    \ on a user-managed cancel based recovery.\n\n### Performing Change/SCN-Based\
    \ Recovery\n\nSCN-based incomplete database recovery works in situations where\
    \ you know the SCN value up to where you want to end the restore and recovery\
    \ session. RMAN will recover up to, but not including, the specified SCN. RMAN\
    \ automatically terminates the restore process when it reaches the specified SCN.\n\
    \nYou can view your database SCN information in several ways:\n\n- By using LogMiner\
    \ to determine an SCN associated with a DDL or DML statement.\n- By looking in\
    \ the `alert.log` file.\n- By looking in your trace files.\n- By querying the\
    \ `FIRST_CHANGE#` column of `V$LOG`, `V$LOG_HISTORY`, and `V$ARCHIVED_LOG`.\n\n\
    After establishing the SCN to which you want to restore, use the `UNTIL SCN` clause\
    \ to restore up to, but not including, the SCN specified. The following example\
    \ restores all transactions that have an SCN that is less than 950:\n\n```\nRMAN>\
    \ connect target /\nRMAN> startup mount;\nRMAN> restore database until scn 95019865425;\n\
    RMAN> recover database until scn 95019865425;\nRMAN> alter database open resetlogs;\n\
    ```\n\nIf everything went well, you should now see output similar to this:\n\n\
    ```\nDatabase altered\n```\n\n### Restoring to a Restore Point\n\nThere are two\
    \ types of restore points: normal and guaranteed. Guaranteed restore points require\
    \ that you have the flashback database feature enabled. You can create a normal\
    \ restore point using SQL*Plus as follows:\n\n```\nSQL> create restore point MY_RP;\n\
    ```\n\nThis command creates a restore point named `MY_RP` that is associated with\
    \ the SCN of the database at the time the command was issued. You can view the\
    \ current SCN of your database as shown here:\n\n```\nSQL> select current_scn\
    \ from v$database;\n```\n\nYou can view restore point information in the `V$RESTORE_POINT`\
    \ view like so:\n\n```\nSQL> select name, scn from v$restore_point;\n```\n\nThe\
    \ restore point acts like a synonym for the particular SCN. It allows you to restore\
    \ and recover to an SCN without having to specify a number. RMAN will restore\
    \ and recover up to, but not including, the SCN associated with the restore point.\n\
    \nThis example restores and recovers to the `MY_RP` restore point:\n\n```\nRMAN>\
    \ connect target /\nRMAN> startup mount;\nRMAN> restore database until restore\
    \ point MY_RP;\nRMAN> recover database until restore point MY_RP;\nRMAN> alter\
    \ database open resetlogs;\n```\n\n## Restoring and Recovering to Different Server\n\
    \nWhen you think about backups, you must as the same time think about restore\
    \ and recovery. Your backups are only as good as the last time you tested a restore\
    \ and recovery. A backup strategy can be rendered worthless without a good restore\
    \ and recovery strategy. The last thing you want to happen is to have a media\
    \ failure, go to restore your database, and then find out you're missing critical\
    \ pieces, don't have enough space to restore, learn that something is corrupt,\
    \ and so on.\n\nOne of the best ways to test an RMAN backup is to restore and\
    \ recover it to a different database server. This will exercise all of your backup,\
    \ restore, and recovery DBA skills. If you can restore and recover an RMAN backup\
    \ on a different server, it will give you confidence when a real disaster hits.\
    \ You can think of all of the prior material in this book as the building blocks\
    \ for performing technically challenging tasks. Moving a database from one server\
    \ to another using an RMAN backup requires an expert level understanding of the\
    \ Oracle architecture and how backup and recovery works.\n\n■ **Note** RMAN does\
    \ have a `DUPLICATE DATABASE` command which works well for copying a database\
    \ from one server to another. If you're going to be performing this type of task\
    \ often, I would recommend that you use RMAN's duplicate database functionality.\
    \ However, you may still have to manually copy a backup of a database from one\
    \ server to another, especially when the security is such that you can't directly\
    \ connect a production server to a development environment. I work with many production\
    \ databases where there is no direct access to a production server, so the only\
    \ way to duplicate a database is by manually copying the RMAN backups from production\
    \ to a test environment.\n\nIn this example, the originating server and destination\
    \ server have completely different mount points and disk layouts. Listed next\
    \ are the high-level steps required to take an RMAN backup and use it to recreate\
    \ a database on a separate server:\n\n1.  Create an RMAN backup on the originating\
    \ database.\n2.  Copy RMAN backup to the destination server. All steps after this\
    \ step are performed on the destination database server.\n3.  Ensure that Oracle\
    \ is installed.\n4.  Source the required OS variables.\n5.  Create an `init.ora`\
    \ file for the database to be restored.\n6.  Create any required directories for\
    \ datafiles, control files, and dump/trace files.\n7.  Startup the database in\
    \ `NOMOUNT` mode.\n8.  Restore a control file from the RMAN backup.\n9.  Startup\
    \ the database in `MOUNT` mode.\n10. Make the control file aware of the location\
    \ of the RMAN backups.\n11. Rename and restore the datafiles to reflect new directory\
    \ locations.\n12. Recover the database.\n13. Set the new location for the online\
    \ redo logs.\n14. Open the database.\n15. Add tempfile.\n16. Rename the database.\n\
    \nEach of the prior steps is covered in detail in the next several sections. Steps\
    \ 1 and 2 occur on the source database server. All other steps are performed on\
    \ the destination server. For this example, the source database is named `E64202`,\
    \ and the destination database will be named `O11DEV`.\n\nOn the source database,\
    \ the location of the datafiles, control files, and online redo logs are all in\
    \ this directory:\n\n```\n/u02/oracle/oradata/E64202\n```\n\nThe source database\
    \ archive redo log file location is here:\n\n```\n/u02/oracle/product/11.2.0/dbhome_1/dbs/arch\n\
    ```\n\nThe RMAN backup location is determined by the following configurations:\n\
    \n```\nCONFIGURE CONTROLFILE AUTOBACKUP ON;\nCONFIGURE CONTROLFILE AUTOBACKUP\
    \ FORMAT FOR DEVICE TYPE DISK TO '/u02/rman/%F.bk';\nCONFIGURE CHANNEL 1 DEVICE\
    \ TYPE DISK FORMAT '/u02/rman/rman1_%U.bk';\n```\n\nOn the destination database,\
    \ the datafiles and control files will be renamed and restored to this directory:\n\
    \n```\n/ora02/dbfile/O11DEV\n```\n\nThe destination database online redo logs\
    \ will be recreated in this directory:\n\n```\n/ora02/oraredo/O11DEV\n```\n\n\
    The destination database archive redo log file location will be set as follows:\n\
    \n```\n/ora02/oraarch/O11DEV\n```\n\n### Step 1: Create an RMAN Backup on the\
    \ Originating Database\n\nWhen backing up a database, make sure you have the autobackup\
    \ control file feature turned on. Also include the archive redo logs as part of\
    \ the backup, like so:\n\n```\nRMAN> backup database plus archivelog;\n```\n\n\
    I usually configure a channel and have both the backup pieces and the control\
    \ file autobackup go to the same directory. For example, this is what the backup\
    \ pieces look like for the source database:\n\n```\nrman1_03lol0i0_1_1.bk\nrman1_04lol0i1_1_1.bk\n\
    rman1_05lol0j5_1_1.bk\nc-1984315547-20100923-00.bk\n```\n\n### Step 2: Copy RMAN\
    \ Backup to Destination Server\n\nFor this step, I usually use a utility such\
    \ as `rsync` or `scp` to copy the backup pieces from one server to another. This\
    \ example uses the `scp` command:\n\n```\n$ scp *.bk oracle@ora03:/ora02/rman/O11DEV\n\
    ```\n\nIn this example, the `/ora02/rman/O11DEV` directory must be created on\
    \ the destination server before copying the backup files.\n\n■ **Note** If the\
    \ RMAN backups are on tape instead on disk, then the same media manager software\
    \ must be installed/configured on the destination server. Also, that server must\
    \ have direct access to the RMAN backups on tape.\n\n### Step 3: Ensure that Oracle\
    \ is Installed\n\nMake sure you have the same version of Oracle binaries installed\
    \ on the destination as you do on the originating database. In this example, Oracle\
    \ Database 11 *g* release 2 is used for both the source and destination databases.\n\
    \n### Step 4: Source the Required OS Variables\n\nYou need to establish the operating\
    \ system variables such as `ORACLE_SID`, `ORACLE_HOME`, and `PATH`. I usually\
    \ set the `ORACLE_SID` variable to match what it was on the original database.\
    \ The database name will be changed as part of the last step in this section.\
    \ Here are the settings for `ORACLE_SID` and `ORACLE_HOME` on the destination\
    \ server:\n\n```\n$ echo $ORACLE_SID\nE64202\n$ echo $ORACLE_HOME\n/oracle/app/oracle/product/11.2.0/db_1\n\
    ```\n\n### Step 5: Create an init.ora File for the Database to be Restored\n\n\
    Copy the `init.ora` file from the original server to the destination server and\
    \ modify it so that it matches the destination box in terms of any directory paths.\
    \ For example, make sure you modify the `CONTROL_FILES` parameter so that the\
    \ path names are reflective of where the control files will be placed on the new\
    \ server.\n\nFor now, the name of the `init.ora` file is `ORACLE_HOME/dbs/initE64202.ora`.\
    \ This file will be renamed when the database is renamed to `O11DEV` in a later\
    \ step. For now, the name of the database is `E64202`; this will be renamed in\
    \ a later step.\n\nHere are the contents of the `init.ora` file:\n\n```\ndb_name='E64202'\n\
    control_files='/ora02/dbfile/O11DEV/control01.ctl'\n,'/ora02/dbfile/O11DEV/control02.ctl'\n\
    diagnostic_dest='/oracle/app/oracle'\nlog_archive_dest_1='location=/ora02/oraarch/O11DEV'\n\
    log_archive_format='%t_%s_%r.arc'\ndb_block_size=8192\nmemory_target=408944640\n\
    open_cursors=300\nprocesses=100\nremote_login_passwordfile='EXCLUSIVE'\nsessions=115\n\
    undo_tablespace='UNDOTBS1'\n```\n\nNotice that the `CONTROL_FILES`, `DIAGNOSTIC_DEST`,\
    \ and `LOG_ARCHIVE_DEST_1` reflect the new path directories on the destination\
    \ server.\n\n■ **Note** If this was an Oracle Database 10g example, you would\
    \ need to set the parameters of: `BACKGROUND_DUMP_DEST`, `USER_DUMP_DEST`, `CORE_DUMP_DEST`.\n\
    \n### Step 6: Create any Required Directories for Datafiles, Control Files, and\
    \ Dump/Trace Files\n\nFor this example, the directories of `/ora02/dbfile/O11DEV`,\
    \ `/oracle/app/oracle`, and `/ora02/oraarch/O11DEV` are created:\n\n```\n$ mkdir\
    \ -p /ora02/dbfile/O11DEV\n$ mkdir -p /oracle/app/oracle\n$ mkdir -p /ora02/oraarch/O11DEV\n\
    ```\n\n### Step 7: Startup the Database in NOMOUNT Mode\n\nYou should now be able\
    \ to startup the database in `NOMOUNT` mode:\n\n```\n$ rman target /\nRMAN> startup\
    \ nomount;\n```\n\n### Step 8: Restore a Control File from the RMAN Backup\n\n\
    Now restore the control file from the backup that was previously copied. In this\
    \ example, the backup piece that contains the control file backup is `c-1984315547-20100923-00.bk`:\n\
    \n```\nRMAN> restore controlfile from '/ora02/rman/O11DEV/c-1984315547-20100923-00.bk';\n\
    ```\n\nThe control file will be restored to all locations specified by the `CONTROL_FILES`\
    \ initialization parameter. Here is some sample output:\n\n```\nchannel ORA_DISK_1:\
    \ restoring control file\nchannel ORA_DISK_1: restore complete, elapsed time:\
    \ 00:00:01\noutput file name=/ora02/dbfile/O11DEV/control01.ctl\noutput file name=/ora02/dbfile/O11DEV/control02.ctl\n\
    ```\n\n### Step 9: Startup Database in Mount Mode\n\nYou should be able to startup\
    \ your database in mount mode now:\n\n```\nRMAN> alter database mount;\n```\n\n\
    ### Step 10: Make the Control File Aware of the Location of the RMAN Backups\n\
    \nFirst, use the `CROSSCHECK` command to let the control file know that none of\
    \ the backups or archive redo logs are in the same location that they were on\
    \ the original server:\n\n```\nRMAN> crosscheck backup;\nRMAN> crosscheck copy;\n\
    RMAN> crosscheck archivelog all;\n```\n\nNow use the `CATALOG` command to make\
    \ the control file aware of the location and names of the backup pieces that were\
    \ copied to the destination server. In this example, any RMAN files that are in\
    \ the `/ora02/rman/O11DEV` directory will be cataloged in the control file:\n\n\
    ```\nRMAN> catalog start with '/ora02/rman/O11DEV';\n```\n\nHere is some sample\
    \ output:\n\n```\nsearching for all files that match the pattern /ora02/rman/O11DEV\n\
    \nList of Files Unknown to the Database\n=====================================\n\
    File Name: /ora02/rman/O11DEV/rman1_05lol0j5_1_1.bk\nFile Name: /ora02/rman/O11DEV/c-1984315547-20100923-00.bk\n\
    File Name: /ora02/rman/O11DEV/rman1_04lol0i1_1_1.bk\nFile Name: /ora02/rman/O11DEV/rman1_03lol0i0_1_1.bk\n\
    Do you really want to catalog the above files (enter YES or NO)?\n```\n\nNow,\
    \ type in `YES` (if everything looks okay). You should be able to use the RMAN\
    \ `LIST BACKUP` command now to view the newly cataloged backup pieces:\n\n```\n\
    RMAN> list backup;\n```\n\n### Step 11: Rename and restore the datafiles to Reflect\
    \ New Directory Locations\n\nIf your destination server has the exact same directory\
    \ structure as the original server directories, you can issue the `RESTORE` command\
    \ directly:\n\n```\nRMAN> restore database;\n```\n\nHowever, when restoring datafiles\
    \ to locations are different from the original directories, you'll have to use\
    \ the `SET NEWNAME` command. Create a file that uses an RMAN `run{}` block that\
    \ contains the appropriate `SET NEWNAME` and `RESTORE` commands. I like to use\
    \ a SQL script that generates SQL to give me a starting point. Here is a sample\
    \ script:\n\n```\nset head off feed off verify off pages 0 trimspool on\nset lines\
    \ 132 pagesize 0\nspo newname.sql\n--\nselect 'run{' from dual;\n--\nselect\n\
    'set newname for datafile ' || file# || ' to ' || '''' || name || '''' || ';'\n\
    from v$datafile;\n--\nselect\n'restore database;' || chr(10) ||\n'switch datafile\
    \ all;' || chr(10) ||\n'}'\nfrom dual;\n--\nspo off;\n```\n\nAfter running the\
    \ script, here are the contents of the `newname.sql` script that was generated:\n\
    \n```\nrun{\nset newname for datafile 1 to '/u02/oracle/oradata/E64202/system01.dbf';\n\
    set newname for datafile 2 to '/u02/oracle/oradata/E64202/sysaux01.dbf';\nset\
    \ newname for datafile 3 to '/u02/oracle/oradata/E64202/undotbs01.dbf';\nset newname\
    \ for datafile 4 to '/u02/oracle/oradata/E64202/users01.dbf';\nrestore database;\n\
    switch datafile all;\n}\n```\n\nNow, modify the contents of the `newname.sql`\
    \ script to reflect the directories on the destination database server. Here is\
    \ what the final `newname.sql` script looks like for this example:\n\n```\nrun{\n\
    set newname for datafile 1 to '/ora02/dbfile/O11DEV/system01.dbf';\nset newname\
    \ for datafile 2 to '/ora02/dbfile/O11DEV/sysaux01.dbf';\nset newname for datafile\
    \ 3 to '/ora02/dbfile/O11DEV/undotbs01.dbf';\nset newname for datafile 4 to '/ora02/dbfile/O11DEV/users01.dbf';\n\
    restore database;\nswitch datafile all;\n}\n```\n\nNow, connect to RMAN and run\
    \ the prior script to restore the datafiles to the new locations:\n\n```\n$ rman\
    \ target /\nRMAN> @newname.sql\n```\n\nHere is a snippet of the output for this\
    \ example:\n\n```\nchannel ORA_DISK_1: restore complete, elapsed time: 00:01:05\n\
    Finished restore at 24-SEP-10\ndatafile 1 switched to datafile copy\ninput datafile\
    \ copy RECID=5 STAMP=730527824 file name=/ora02/dbfile/O11DEV/system01.dbf\ndatafile\
    \ 2 switched to datafile copy\ninput datafile copy RECID=6 STAMP=730527824 file\
    \ name=/ora02/dbfile/O11DEV/sysaux01.dbf\ndatafile 3 switched to datafile copy\n\
    input datafile copy RECID=7 STAMP=730527824 file name=/ora02/dbfile/O11DEV/undotbs01.dbf\n\
    datafile 4 switched to datafile copy\ninput datafile copy RECID=8 STAMP=730527824\
    \ file name=/ora02/dbfile/O11DEV/users01.dbf\nRMAN> end-of-file\n```\n\nAll of\
    \ the datafiles have been restored to the new database server. You can use the\
    \ RMAN `REPORT SCHEMA` command to verify that the files have been restored and\
    \ are in the correct locations:\n\n```\nRMAN> report schema;\n```\n\nHere is some\
    \ sample output:\n\n```\nRMAN-06139: WARNING: control file is not current for\
    \ REPORT SCHEMA\nReport of database schema for database with db_unique_name E64202\n\
    \nList of Permanent Datafiles\n===========================\nFile Size(MB) Tablespace\
    \ RB segs Datafile Name\n---- -------- -------------------- ------- ------------------------\n\
    1    670      SYSTEM       ***     /ora02/dbfile/O11DEV/system01.dbf\n2    470\
    \      SYSAUX       ***     /ora02/dbfile/O11DEV/sysaux01.dbf\n3    30       UNDOTBS1\
    \     ***     /ora02/dbfile/O11DEV/undotbs01.dbf\n4    5        USERS        ***\
    \     /ora02/dbfile/O11DEV/users01.dbf\n\nList of Temporary Files\n=======================\n\
    File Size(MB) Tablespace Maxsize(MB) Tempfile Name\n---- -------- --------------------\
    \ ----------- --------------------\n1    0        TEMP         32767       /u02/oracle/oradata/E64202/temp01.dbf\n\
    ```\n\nFrom the prior output, the database name and temporary tablespace datafile\
    \ still don't reflect the destination database. Those will be modified in subsequent\
    \ steps.\n\n### Step 12: Recover the Database\n\nNext, you need to apply any archive\
    \ redo files that were generated during the backup. These should be included in\
    \ the backup because the `ARCHIVELOG ALL` clause was used to take the backup.\
    \ Initiate the application of redo via the `RECOVER DATABASE` command:\n\n```\n\
    RMAN> recover database;\n```\n\nRMAN will restore and apply as many archive redo\
    \ logs as it has in the backup pieces and then will throw an error when it reaches\
    \ an archive redo log which doesn't exist:\n\n```\nchannel ORA_DISK_1: starting\
    \ archived log restore to default destination\nchannel ORA_DISK_1: restoring archived\
    \ log\narchived log thread=1 sequence=4\nchannel ORA_DISK_1: reading from backup\
    \ piece /ora02/rman/O11DEV/rman1_05lol0j5_1_1.bk\nchannel ORA_DISK_1: piece handle=/ora02/rman/O11DEV/rman1_05lol0j5_1_1.bk\
    \ tag=TAG20100923T200037\nchannel ORA_DISK_1: restored backup piece 1\nchannel\
    \ ORA_DISK_1: restore complete, elapsed time: 00:00:01\narchived log file name=/ora02/oraarch/O11DEV/1_4_729167134.arc\
    \ thread=1 sequence=4\nunable to find archived log\narchived log thread=1 sequence=5\n\
    RMAN-00571: ===========================================================\nRMAN-00569:\
    \ =============== ERROR MESSAGE STACK FOLLOWS ===============\nRMAN-00571: ===========================================================\n\
    RMAN-03002: failure of recover command at 09/24/2010 04:35:09\nRMAN-06054: media\
    \ recovery requesting unknown archived log\nfor thread 1 with sequence 5 and starting\
    \ SCN of 977214\n```\n\nNow is a good time to verify that your datafiles are online\
    \ and not in a fuzzy state. Run the following query:\n\n```\nselect\n  file#\n\
    \  ,status\n  ,fuzzy\n  ,error\n  ,checkpoint_change#,\n  to_char(checkpoint_time,'dd-mon-rrrr\
    \ hh24:mi:ss') as checkpoint_time\nfrom v$datafile_header;\n```\n\n### Step 13:\
    \ Set the New Location for the Online Redo Logs\n\nSet the names for the online\
    \ redo logs to reflect the new directory structures on the destination database\
    \ server. I sometimes use a SQL script that generates SQL to assist with this\
    \ step:\n\n```\nset head off lines 132 pages 0 trimspoo on\nspo renlog.sql\nselect\n\
    'alter database rename file ' || chr(10)\n|| '''' || member || '''' || ' to '\
    \ || chr(10) || '''' || member || '''' ||';'\nfrom v$logfile;\nspo off;\n```\n\
    \nFor this example, here are the contents of the `renlog.sql` file that was generated:\n\
    \n```\nalter database rename file\n'/u02/oracle/oradata/E64202/redo03.log' to\n\
    '/u02/oracle/oradata/E64202/redo03.log';\n\nalter database rename file\n'/u02/oracle/oradata/E64202/redo02.log'\
    \ to\n'/u02/oracle/oradata/E64202/redo02.log';\n\nalter database rename file\n\
    '/u02/oracle/oradata/E64202/redo01.log' to\n'/u02/oracle/oradata/E64202/redo01.log';\n\
    ```\n\nThe contents of `renlog.sql` need to be modified to reflect the directory\
    \ structure on the destination server. Here is what `renlog.sql` looks like after\
    \ being edited for this example:\n\n```\nalter database rename file\n'/u02/oracle/oradata/E64202/redo03.log'\
    \ to\n'/ora02/oraredo/O11DEV/redo03.log';\n\nalter database rename file\n'/u02/oracle/oradata/E64202/redo02.log'\
    \ to\n'/ora02/oraredo/O11DEV/redo02.log';\n\nalter database rename file\n'/u02/oracle/oradata/E64202/redo01.log'\
    \ to\n'/ora02/oraredo/O11DEV/redo01.log';\n```\n\nUpdate the control file by running\
    \ the prior script:\n\n```\nSQL> @renlog.sql\n```\n\nYou can select from `V$LOGFILE`\
    \ to verify that the online redo log names are correct:\n\n```\nSQL> select member\
    \ from v$logfile;\n```\n\nHere is the output for this example:\n\n```\n/ora02/oraredo/O11DEV/redo03.log\n\
    /ora02/oraredo/O11DEV/redo02.log\n/ora02/oraredo/O11DEV/redo01.log\n```\n\nMake\
    \ sure the directories exist on the new server that will contain the online redo\
    \ logs. For this example, here's the `mkdir` command:\n\n```\n$ mkdir -p /ora02/oraredo/O11DEV\n\
    ```\n\n### Step 14: Open the Database\n\nYou must open the database with the `OPEN\
    \ RESETLOGS` command (because there are no redo logs and they must be recreated\
    \ at this point):\n\n```\nSQL> alter database open resetlogs;\n```\n\nIf successful,\
    \ you should see this message:\n\n```\nDatabase altered.\n```\n\n### Step 15:\
    \ Add tempfile\n\nWhen you start your database, Oracle will automatically try\
    \ to add any missing tempfiles to the database. Oracle won't be able to do this\
    \ if the directory structure on the destination server is different from the source\
    \ server. In this scenario you will have to manually add any missing tempfile(s).\
    \ To do this, first take offline the temporary tablespace tempfile. The file definition\
    \ from the originating database is taken offline like so:\n\n```\nSQL> alter database\
    \ tempfile '/u02/oracle/oradata/E64202/temp01.dbf' offline;\n```\n\nNext, add\
    \ a temporary tablespace file to the `TEMP` tablespace that matches the directory\
    \ structure of the destination database server:\n\n```\nSQL> alter tablespace\
    \ temp add tempfile '/ora02/dbfile/O11DEV/temp01.dbf' size 100m;\n```\n\n### Step\
    \ 16: Rename the Database\n\nIf you need to rename the database to reflect the\
    \ name for a development or test database, create a trace file that contains the\
    \ `CREATE CONTROLFILE` statement and use it to rename your database. These steps\
    \ are covered in detail in Chapter 4. The basic steps involved are:\n\n1.  Generate\
    \ a trace file.\n\n    ```\n    SQL> oradebug setmypid\n    SQL> alter database\
    \ backup controlfile to trace resetlogs;\n    SQL> oradebug tracefile_name\n \
    \   ```\n2.  Modify the trace file to include the `SET DATABASE`.\n\n    ```\n\
    \    CREATE CONTROLFILE SET DATABASE \"O11DEV\" RESETLOGS...\n    ```\n3.  Create\
    \ an `init.ora` file that matches the new name.\n4.  `ORACLE_HOME/dbs/init<newSID>.ora`.\n\
    5.  Modify the `DB_NAME` variable within the new `init.ora` file (in this example,\
    \ it’s set to `O11DEV`).\n6.  Set `ORACLE_SID` to reflect the new SID name (in\
    \ this example, it’s set to `O11DEV`).\n7.  `SQL> startup nomount;`\n8.  Run the\
    \ trace file to recreate the control file (trace file from Step 2).\n9.  `SQL>\
    \ alter database open resetlogs;`\n\nIf successful, you should have a database\
    \ that is a copy of the original database. All of the datafiles, control files,\
    \ archive redo logs, and online redo logs are in the new locations, and the database\
    \ has a new name.\n\n■ **Tip** You can also use the `NID` utility to change the\
    \ database name and DBID. For additional information, see My Oracle Support note\
    \ 863800.1 for more details.\n\n## Summary\n\nRMAN is an acronym short for Recovery\
    \ Manager. It's worth noting that Oracle did not name this tool Backup Manager.\
    \ The Oracle team recognized that while backups are important, the real value\
    \ of a B&R tool is its ability to restore and recover the database. Being able\
    \ to managing the recovery process is the critical skill. When a database is damaged\
    \ and needs to be restored, everybody looks to the DBA to perform a smooth and\
    \ speedy recovery of the database. Oracle DBAs should use RMAN to protect, secure,\
    \ and ensure the availability of the company's data assets.\n\nRestore and recovery\
    \ are analogous to the healing process when you break a bone. Restoring is similar\
    \ to the process of setting the bone back to its original position. This is like\
    \ restoring datafiles from a backup and placing them in their original directories.\
    \ Recovering a datafile is similar to the healing process of a broken bone—returning\
    \ the bone back to its state before it was broken. When you recover datafiles,\
    \ you apply transactions (obtained from archive redo and online redo) to transform\
    \ the restored datafiles back to the state they were in before the media failure\
    \ occurred.\n\nRMAN can be used for any type of restore and recovery scenario.\
    \ Depending on the situation, RMAN can be used to restore the entire database,\
    \ specific datafiles, control files, server parameter files, archive redo logs,\
    \ or just specific data blocks. You can instruct RMAN to perform a complete recovery\
    \ or incomplete.\n\nThe last section in this chapter details how to use RMAN to\
    \ restore and recover a database to a remote server. I recommend that you periodically\
    \ attempt to test this type of recover. This will fully exercise your backup and\
    \ recovery strategy. You will gain much confidence and fully understand backup\
    \ and recovery internals once you can successfully restore a database to a different\
    \ server from the original.\n\n# ORACLE SECURE BACKUP\n\n-   Integrated with Oracle\
    \ Enterprise Manager Grid Control (with Oracle Database 10g Release 2 or higher)\n\
    -   Supports multiple tape drives\n-   Encrypted tape backups\n-   Fibre-attached\
    \ device support\n-   Fast backup compression (with Oracle Database 11g Release\
    \ 1 or higher)\n-   RMAN medium level compression (with Oracle Database 11g Release\
    \ 2 or higher)\n-   Networked backup of distributed hosts and tape devices\n-\
    \   Automated cartridge system library software (ACSLS) and automated rotation\
    \ of tapes between multiple locations (vaulting)\n\nIf you are a small shop with\
    \ just one production database server, then Oracle Secure Backup Express may satisfy\
    \ your business requirements, whereas the full fledged Oracle Secure Backup edition\
    \ is more suitable for environments with multiple distributed hosts that require\
    \ advanced data protection requirements.\n\n■ **Note** OSB is available on most\
    \ Linux and Unix platforms as well as Windows. See My Oracle Support's certification\
    \ matrix for a current list (https://support.oracle.com).\n\n## OSB Terminology\n\
    \nTake some time to familiarize yourself with the architectural terms used with\
    \ OSB. This section gives a brief description of the major OSB parts, starting\
    \ with an administrative domain.\n\n### OSB Administrative Domain and Servers\n\
    \nAn administrative domain is collection of servers (hosts) that you manage as\
    \ a single group for backup and restore operations. Within an OSB administrative\
    \ domain, each server can be assigned one or more of the following roles:\n\n\
    -   Administrative (admin) server\n-   Media server\n-   Client server (or client\
    \ host)\n\nFor each administrative domain, as shown in Figure 20–1, there is only\
    \ one administrative server that controls the backup, restore, and scheduling\
    \ operations. An administrative server manages one or more media servers and one\
    \ or more clients.\n\n■ **Tip** For complete details on all of the OSB interfaces,\
    \ see the *Oracle Secure Backup Administrator's Guide* and *Oracle Secure Backup\
    \ Reference* available at www.oracle.com/technetwork/database/secure-backup/documentation/.\n\
    \n### OSB Users and Classes\n\nAn Oracle Secure Backup user is an account defined\
    \ within an OSB administrative domain. These users are separate from operating\
    \ system users. OSB user information is stored in the OSB administrative domain\
    \ server. You are required to enter a username and password when accessing OSB\
    \ through its interfaces such as `obtool` or OSB Web tool.\n\nAn OSB class is\
    \ a set of privileges and rights granted to a user. Each user can be assigned\
    \ to only one OSB class. OSB classes help maintain a consistent user experience\
    \ across all servers in an administrative domain.\n\n### OSB Daemons\n\nOracle\
    \ Secure Backup uses seven different background processes (daemons) to manage\
    \ the configuration, backup, and restore operations. The executables that start\
    \ the daemons are in the `OSB_HOME/etc` directory on each of the servers. These\
    \ processes are described in this list:\n\n-   **Schedule daemon** runs only on\
    \ the administrative server and manages the scheduled backups.\n-   **Index daemon**\
    \ runs only on the administrative server and manages the backup catalog for each\
    \ client.\n-   **Apache web server daemon** runs only on the administrative server\
    \ and services the OSB web tool.\n-   **Service Daemon** runs on the administrative,\
    \ media, and client servers. On the administrative server, it runs jobs as requested\
    \ by the schedule daemon. When running on the media or client server, it allows\
    \ for remote administration of the host.\n-   **Network data management protocol\
    \ (NDMP) daemon** runs on the administrative, media, and client servers; it provides\
    \ data communication between servers in the administrative domain.\n-   **Robot\
    \ Daemon** runs only on the media server and helps manage communication to tape\
    \ devices.\n-   **Proxy Daemon** runs only on the client server and verifies user\
    \ access for SBT backup and restore operations.\n\nNow that you have a basic understanding\
    \ of the OSB architecture, you are ready to download and install the OSB software.\n\
    \n## Download and Installation\n\nYou can download the OSB software from Oracle’s\
    \ Technology Network (OTN) site at www.oracle.com/technetwork/database/secure-backup/downloads/.\n\
    \nFor the examples in this chapter, I downloaded OSB version 10.3.0.3.0, and saved\
    \ the zip file `osb-10.3.0.3.0_linux32.zip` under a staging directory `/stage/osb`\
    \ of my admin server in the OSB administrative domain. You can stage this binary\
    \ file in a choice of your location on your server.\n\nOracle recommends installing\
    \ the OSB software under the directory `/usr/local/oracle/backup` for Unix and\
    \ Linux platforms and `C:\\Program Files\\Oracle\\Backup` for the Windows platform.\
    \ Once you have downloaded the OSB zip file and copied it to the appropriate directory,\
    \ then you may proceed to the installation steps, as shown here:\n\n1.  To perform\
    \ the OSB installation, you must logon as root.\n\n    ```\n    $ su - root\n\
    \    ```\n2.  If the uncompress utility is not available, create a link."
