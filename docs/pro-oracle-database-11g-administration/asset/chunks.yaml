- fmt: "# CHAPTER 3 ■ CONFIGURING AN EFFICIENT ENVIRONMENT\n\n## Check to connect\
    \ to db.\n\n45 * * * * /orahome/bin/conn.bsh INVPRD 1>/orahome/bin/log/conn.log\
    \ 2>&1\n\nThis cron entry runs the script once per hour. Depending on your availability\
    \ requirements, you may want to run a script like this on a more frequent basis.\n\
    \n## filesp.bsh\n\nUse the following script to check for an operating mount point\
    \ that is filling up. Place the script in a directory such as `HOME/bin`. You\
    \ need to modify the script so that the `mntlist` variable contains a list of\
    \ mount points that exist on your database server. Because this script isn’t running\
    \ any Oracle utilities, there is no reason to set the Oracle-related operating\
    \ system variables (as with the previous shell scripts):\n\n```bash\n#!/bin/bash\n\
    \nmntlist=\"/orahome /oraredo /oraarch /ora01 /oradump01 /\"\n\nfor ml in $mntlist\n\
    do\n  echo $ml\n  usedSpc=$(df -h $ml | awk '{print $5}' | grep -v capacity |\
    \ cut -d \"%\" -f1 -)\n  BOX=$(uname -a | awk '{print $2}')\n  #\n  case $usedSpc\
