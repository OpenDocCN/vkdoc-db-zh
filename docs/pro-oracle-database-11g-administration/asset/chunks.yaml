    Creating Basic Materialized Views


    This section covers how to create an MV. The two most common configurations used
    are as follows:


    • Creating complete-refresh MVs that are refreshed on demand


    • Creating fast-refresh MVs that are refreshed on demand


    It’s important to understand these basic configurations. They lay the foundation
    for everything else you do with an MV. Therefore, this section starts with these
    basic configurations. Later, the section covers more advanced configurations.
    Make sure you understand the material in the following two sections before you
    move on to advanced MV topics.


    Creating a Complete-Refreshable Materialized View


    This section explains how to set up an MV that is periodically completely refreshed,
    which is about the simplest example possible. Complete refreshes are appropriate
    for MVs that have base tables in which significant portions of the rows change
    from one refresh interval to the next. Complete refreshes are also required in
    situations where a fast refresh isn’t possible (due to restrictions imposed by
    Oracle—more on this later in the chapter).


    ■ **Note** To create an MV, you need both the CREATE MATERIALIZED VIEW system
    privilege and the CREATE TABLE


    system privilege.


    The example in this section uses the following base table named SALES: create
    table sales(


    sales_id number


    ,sales_amt number


    ,region_id number


    ,sales_dtt timestamp


    ,constraint sales_pk primary key(sales_id)


    );


    CHAPTER 15 ■ MATERIALIZED VIEWS


    Insert some sample data into the SALES table:


    insert into sales values(1,101,100,sysdate-50);


    insert into sales values(2,511,200,sysdate-20);


    insert into sales values(3,11,100,sysdate);


    commit;


    The next step is to create the MV, using a CREATE MATERIALIZED VIEW...AS SELECT
    statement. This statement names the MV, specifies its attributes, and defines
    the SQL query on which the MV is based: create materialized view sales_mv


    segment creation immediate


    refresh


    complete


    on demand


    as


    select


    sales_amt


    ,sales_dtt


    from sales;


    The SEGMENT CREATION IMMEDIATE clause is available with Oracle 11 *g* release
    2 and higher. It instructs Oracle to create the segment and allocate an extent
    when you create the MV. This was the behavior in previous versions of Oracle.
    If you don’t want immediate segment creation, use the SEGMENT CREATION


    DEFERRED clause. If the newly created MV has any rows in it, then segments are
    created and extents are allocated regardless of whether you use SEGMENT CREATION
    DEFERRED.


