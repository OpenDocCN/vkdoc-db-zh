    `ORACLE_HOME_NAME=OHOME10`


    In the previous list, the `ORACLE_HOME` and `ORACLE_HOME_NAME` variables must
    match the values of the set of binaries you’re upgrading. If you’re upgrading
    an existing Oracle installation, ensure that no databases are running that are
    using the binaries you’re upgrading.


    Now, run the `runInstaller` utility in silent mode as follows:


    `$ ./runInstaller -ignoreSysPrereqs -force -silent -responseFile /orahome/orainst/10.2.0.4/Disk1/inst.rsp`


    When you’re performing an upgrade, there are two basic scenarios. Here is scenario
    A: Shut down any databases using the Oracle home to be upgraded.


    Upgrade the Oracle home binaries.


    Start up the database, and run any required upgrade scripts.


    Here are the steps for the scenario B approach to an upgrade:


    Leave the existing Oracle home as it is—don’t upgrade it.


    Install a new Oracle home that is the same version as the old Oracle home.


    Upgrade the new Oracle home to the desired version.


    When you’re ready, shut down the database using the old Oracle home, set the OS
    variables to point to the new upgraded Oracle home, start the database, and run
    any required upgrade scripts.


    Which of the previous two scenarios is better? Scenario B has the advantage of
    leaving the old Oracle home as it is; therefore, if you need to switch back to
    the old Oracle home for any reason, you have those binaries available. Scenario
    B has the disadvantage of requiring extra disk space to contain two installations
    of Oracle home. This usually isn’t an issue, because after the upgrade is complete,
    you can delete the old Oracle home when it’s convenient.


    ## Reinstalling After Failed Installation


    You may run into the situation where you’re attempting to install Oracle and for
    some reason the installation fails. You correct the issue and attempt to re-run
    the Oracle installer. However, you receive this message:


    `Check complete: Failed <<<<`


    `Problem: Oracle Database 10g Release 2 can only be installed in a new Oracle
    Home Recommendation: Choose a new Oracle Home for installing this product.`


    # CHAPTER 1 ■ INSTALLING THE ORACLE BINARIES


    In this situation, Oracle thinks the software has already been installed for a
    couple of reasons: Files in the `ORACLE_HOME` directory are specified in the response
    file.


    An existing Oracle home and location in your `oraInventory/ContentsXML/inventory.xml`
    file match what you have specified in the response file.


    Oracle doesn’t allow you to install a new set of binaries over an existing Oracle
    home. If you’re sure you don’t need any of the files in the `ORACLE_HOME` directory,
    you can remove them (be very careful—ensure that you absolutely want to do this).
    This example navigates to `ORACLE_HOME` and then removes the `dev_1` directory
    and its contents:


    ```

    $ cd $ORACLE_HOME

    $ cd ..

    $ rm -rf dev_1

    ```


    Also, even if there are no files in the `ORACLE_HOME` directory, the installer
    inspects the `inventory.xml` file for previous Oracle home names and locations.
    In the `inventory.xml` file, you must remove the entry that corresponds to the
    Oracle home location that matches the Oracle home you’re trying to install to.


    To remove the entry, first locate your `oraInst.loc` file, which contains the
    directory of your `oraInventory`. Navigate to the `oraInventory/ContentsXML` directory.
    Make a copy of `inventory.xml` before you modify it:


    `$ cp inventory.xml inventory.xml.old`


    Edit the `inventory.xml` file with an operating system utility (such as `vi`),
    and remove the line that contains the Oracle home information of your previously
    failed installation. You can now attempt to execute the `runInstaller` utility
    again.


    ## Applying Interim Patches


    Sometimes you’re required to apply a patch to resolve a database issue or eradicate
    a bug. You usually obtain patches from the MOS web site and install them with
    the `opatch` utility. Here are the basic steps for applying a patch:


    Obtain the patch from MOS (requires a valid support contract).


    Unzip the patch file.'
