    # ■ INTRODUCTION


    `Chapters 6, 7, 8, 9, and 10` discuss configuring users and database objects such
    as tables, constraints, indexes, views, synonyms, sequences, and so forth.

    `Chapters 11 and 12` detail how to create and maintain large database objects
    and partitioned tables and indexes.

    `Chapters 13, 14, and 15` show how DBAs use tools such as Data Pump, external
    tables, and materialized views to mange and distribute large amounts of data.

    `Chapters 16, 17, 18, 19, and 20` take a deep dive into backup and recovery concepts.
    Both user managed backups and RMAN backup and recovery are discussed in detail.

    `Chapters 21 and 22` focus on techniques used to automate database jobs and how
    to troubleshoot typical problems that DBAs encounter.


    ### Conventions Used in This Book


    The following typographical conventions are used in this book:


    * `$` is used to denote Linux/Unix commands that can be run by the operating system
    owner of the Oracle binaries (usually named `oracle`).

    * `#` is used to denote Linux/Unix commands that should be run as the `root` operating
    system user.

    * `SQL>` is used to denote one line SQL*Plus statements.

    * Monospaced font is used for code examples, utility names, file names, URLs,
    and directory paths.

    * *Italic* is used to highlight a new concept or word.

    * UPPERCASE indicates names of database objects like views, tables, and corresponding
    column names.

    * `< >` is used where you need to provide input, such as a filename or password.


    ### Comments


    I''ve tried to keep this book as error free as possible. However, mistakes happen
    or inadvertently get overlooked. If you find any type of error in this book, whether
    it be a typo or an erroneous command, please let me now about it. You can submit
    any issues by going to the main Apress web page at: `http://www.apress.com`. Search
    for this book and then use the errata page to submit corrections.


    ### Contacting the Author


    If you have any questions regarding the book, feel free to contact me directly
    at the following email address: `darl.kuhn@gmail.com`.


