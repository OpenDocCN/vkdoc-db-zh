    \ startup dba;\n```\n\n## 完全恢复\n\n完全恢复意味着你可以还原在故障发生前已提交的所有事务。完全恢复并不意味着你要还原和恢复数据库中的所有数据文件。例如，如果你有一个数据文件发生介质故障，你可以还原和恢复那一个数据文件来执行完全恢复。对于完全恢复，以下条件必须成立：\n\
