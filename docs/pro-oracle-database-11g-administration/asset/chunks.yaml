    Name**


    **Information Regarding**


    V$RMAN_BACKUP_JOB_DETAILS


    RMAN backup jobs.


    V$BACKUP


    Backup status of online datafiles.


    V$BACKUP_ARCHIVELOG_DETAILS


    Archive logs backed up.


    V$BACKUP_CONTROLFILE_DETAILS


    Control files backed up.


    V$BACKUP_COPY_DETAILS


    Control file and datafile copies.


    V$BACKUP_DATAFILE


    Control files and datafiles backups.


    V$BACKUP_DATAFILE_DETAILS


    Datafiles backed up in backup sets, image copies, and proxy


    copies.


    V$BACKUP_FILES


    Datafiles, control files, spfiles, and archive redo logs backed up.


    V$BACKUP_PIECE


    Backup piece files.


    V$BACKUP_PIECE_DETAILS


    Backup piece detailed information.


    V$BACKUP_SET


    Backup sets.


    V$BACKUP_SET_DETAILS


    Backup set detailed information.


    CHAPTER 18 ■ RMAN BACKUPS AND REPORTING


    Sometimes DBAs new to RMAN have a hard time grasping the concept of backups, backup
    sets, backup pieces, datafiles, and how those concepts relate. I find the following
    query useful when discussing RMAN backup components. This query will display backup
    sets, the backup pieces with the set, and the datafiles that are backed up within
    the backup piece:


    SET LINES 132 PAGESIZE 100


    BREAK ON REPORT ON bs_key ON completion_time ON bp_name ON file_name


    COL bs_key FORM 99999 HEAD "BS Key"


    COL bp_name FORM a40 HEAD "BP Name"


    COL file_name FORM a40 HEAD "Datafile"


    --


    SELECT


    s.recid bs_key


    ,TRUNC(s.completion_time) completion_time


    ,p.handle bp_name


    ,f.name file_name


    FROM v$backup_set s


    ,v$backup_piece p


    ,v$backup_datafile d


    ,v$datafile f


    WHERE p.set_stamp = s.set_stamp


    AND p.set_count = s.set_count


    AND d.set_stamp = s.set_stamp


    AND d.set_count = s.set_count


    AND d.file# = f.file#


    ORDER BY


    s.recid


    ,p.handle


    ,f.name;


    The output here has been shortened to fit on the page:


    BS Key COMPLET BP Name Datafile


    ------ --------- ---------------------------- ---------------------------------


    414 14-SEP-10 /ora01/O11R2/rman/r1j_1_1.bk /ora01/dbfile/O11R2/mvindex01.dbf


    /ora01/dbfile/O11R2/sysaux01.dbf


    /ora01/dbfile/O11R2/system01.dbf


    /ora02/dbfile/O11R2/users01.dbf


    Sometimes it''s useful to report on the performance of RMAN backups. The following
    query reports on the time taken for an RMAN backup per session.


    COL hours FORM 9999.99


    COL time_taken_display FORM a20


    SET LINESIZE 132


    --


    SELECT


    session_recid


    ,compression_ratio


    ,time_taken_display


    ,(end_time - start_time) * 24 as hours


    ,TO_CHAR(end_time,''dd-mon-yy hh24:mi'') as end_time


    FROM v$rman_backup_job_details


    ORDER BY end_time;


    CHAPTER 18 ■ RMAN BACKUPS AND REPORTING


    Here is some sample output:


    SESSION_RECID COMPRESSION_RATIO TIME_TAKEN_DISPLAY HOURS END_TIME,


    ------------- ----------------- -------------------- ------ -----------------


    7509 4.55050595 03:20:48 3.35 04-sep-10 19:23


    7515 4.51185084 03:23:04 3.38 05-sep-10 19:25


    7521 4.43947443 03:31:48 3.53 06-sep-10 19:34


    7527 4.35619748 03:45:03 3.75 07-sep-10 19:47


    7533 4.2773889 04:20:04 4.33 08-sep-10 20:23


    7547 4.51488 03:22:21 3.37 09-sep-10 19:24


    7554 4.49303627 03:28:06 3.47 10-sep-10 19:31


    7561 4.51925905 03:17:00 3.28 11-sep-10 19:19


    7568 4.54671383 03:14:03 3.23 12-sep-10 19:16


    7575 4.52995677 03:17:07 3.29 13-sep-10 19:19


    The contents of V$RMAN_BACKUP_JOB_DETAILS are summarized by a session connection
    to RMAN.


    Therefore, the report output is more accurate if you connect to RMAN (establishing
    a session) and then exit out of RMAN after the backup job is complete. If you
    remain connected to RMAN while running multiple backup jobs, the query output
    reports on all backup activity while connected (for that session).


    You should have an automated method of detecting whether or not RMAN backups are
    running and if datafiles are being backed up. One reliable method of automating
    such a task is to embed SQL into a shell script and then run the script on a periodic
    basis from a scheduling utility such as cron.


    I typically run two basic types of checks regarding the RMAN backups:


    • Have the RMAN backups run recently?


    • Are there any datafiles that have not been backed up recently?


    The following shell script checks for the conditions listed above. You''ll need
    to modify the script and provide it with a username and password for a user that
    can query the data dictionary objects referenced in the script (in this script
    the username/password is darl/foobar). When running the script, you’ll need to
    pass in two variables: the Oracle SID and the threshold number of days that you
    want to check in the past for the last time the backups ran or when a datafile
    was backed up.


    #!/bin/bash


    #


    if [ $# -ne 2 ]; then


    echo "Usage: $0 SID threshold"


    exit 1


    fi'
  trans: "\n# 第 18 章 RMAN 备份与报告\n\n## 表 18–1. RMAN 备份数据字典视图描述\n\n| 视图名称 | 关于...的信息\
