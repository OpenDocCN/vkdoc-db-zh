    \nUSERNAME ACCOUNT_STATUS LOCK_DATE CREATED\n-------------------- --------------------------------\
    \ --------- ---------\nCLUSTERUSER OPEN 09-MAY-10\nDIP EXPIRED & LOCKED 09-MAY-10\
    \ 09-MAY-10\nDP122764 LOCKED 07-JAN-10 09-JUL-10\n\n## 组织脚本\n\n当您拥有一组脚本和实用程序时，应对其进行组织，以便在每个数据库服务器上都能一致地实施。请按照以下步骤为环境中的每个数据库服务器实施前述\
    \ DBA 实用程序：\n\n1.  创建用于存储脚本的操作系统目录。\n2.  将您的脚本和实用程序复制到步骤 1 创建的目录中。\n3.  配置您的启动文件以初始化环境。\n\
    \n前面的步骤将在以下小节中详细说明。\n\n### 步骤 1：创建目录\n\n在每个数据库服务器上创建一套标准目录来存储您的自定义脚本。`oracle`\
    \ 用户的 `HOME` 目录下的目录通常是一个不错的位置。我通常创建以下三个目录：\n\n*   `HOME/bin`。以自动方式（如从 `cron`）运行的\
    \ shell 脚本的标准位置。\n*   `HOME/bin/log`。由计划的 shell 脚本生成的日志文件的标准位置。\n*   `HOME/scripts`。存储\
    \ SQL 脚本的标准位置。\n\n您可以使用 `mkdir` 命令创建上述目录，如下所示：\n\n$ mkdir -p $HOME/bin/log\n$\
    \ mkdir $HOME/scripts\n\n脚本放置在何处或目录如何命名并不重要，只要您有一个标准位置，这样当您在服务器间导航时，总能在相同位置找到相同的文件。换句话说，标准是什么并不重要，重要的是您有一个标准。\n\
    \n### 步骤 2：将文件复制到目录\n\n将您的实用程序和脚本放入相应的目录。将以下文件复制到 `HOME/bin` 目录：\n\n*   `dba_setup`\n\
    *   `dba_fcns`\n*   `tbsp_chk.bsh`\n*   `conn.bsh`\n*   `filesp.bsh`\n\n将以下 SQL\
    \ 脚本放入 `HOME/scripts` 目录：\n\n*   `login.sql`\n*   `top.sql`\n*   `lock.sql`\n\
    *   `users.sql`\n\n### 步骤 3：配置启动文件\n\n将以下代码放入 `.bashrc` 文件或您使用的 shell 的等效启动文件中（Korn\
    \ shell 为 `.profile`）。以下是如何配置 `.bashrc` 文件的示例：\n\n```bash\n# 引入全局定义\nif [ -f /etc/bashrc\
    \ ]; then\n    . /etc/bashrc\nfi\n#\n# 引入 Oracle 操作系统变量\n. /var/opt/oracle/oraset\
    \ <default_database>\n#\n```"
- fmt: "# User Specific Aliases and Functions\n\n`. $HOME/bin/dba_setup`\n\n`. $HOME/bin/dba_fcns`\n\
    \nNow, each time you log in to an environment, you have full access to all the\
    \ operating system variables, aliases, and functions established in the `dba_setup`\
    \ and `dba_fcns` files. If you don’t want to log off and back on, then run the\
    \ file manually using the `.` (dot) command. This command executes the lines contained\
    \ within a file. The following example runs the `.bashrc` file: `$ . $HOME/.bashrc`\n\
    \nThe `.` instructs the shell to *source* the script. Sourcing tells the shell\
    \ process you’re currently logged on to, to inherit any variables set with an\
    \ `export` command in an executed script. If you don’t use the `.` notation, then\
    \ the variables set within the script are visible only in the context of the subshell\
    \ that is spawned when the script is executed.\n\n## CHAPTER 3 ■ CONFIGURING AN\
    \ EFFICIENT ENVIRONMENT\n\n**Note:** In the Bash shell, the `source` command is\
    \ equivalent to the `.` (dot) command.\n\n## Summary\n\nThis chapter describes\
    \ how to configure an efficient environment. This is especially important for\
    \ DBAs who manage multiple databases on multiple servers. Regular maintenance\
    \ and troubleshooting activities require you to log on directly to the database\
    \ server. To promote efficiency and sanity, you should develop a standard set\
    \ of operating system tools and SQL scripts that help you maintain multiple environments.\
    \ You can use standard features of the OS to assist with navigating, repeating\
    \ commands, showing system bottlenecks, quickly finding critical files, and so\
    \ on.\n\nThe techniques for configuring a standard OS are especially useful when\
    \ you’re working on multiple servers with multiple databases. When you have multiple\
    \ terminal sessions running simultaneously, it’s easy to lose your bearings and\
    \ forget which session is associated with a particular server and database.\n\n\
    With just a small amount of setup, you can ensure that your OS prompt always shows\
    \ information such as the host and database. Likewise, you can always set your\
    \ SQL prompt to show the username and database connection. These techniques help\
    \ ensure that you don’t accidentally run a command or script in the wrong environment.\n\
    \nAfter you have installed the Oracle binaries, created a database, configured\
    \ your environment, you are ready to perform additional database administration\
    \ tasks such as creating tablespaces for the applications. The topic of tablespace\
    \ creation and maintenance is described in the next chapter.\n\n![](index-105_1.png)\n\
    \n# CHAPTER 4 ■ TABLESPACES AND DATAFILES\n\ncreate additional tablespaces to\
    \ store application data. This chapter discusses the purpose of the standard set\
    \ of tablespaces, the need for additional tablespaces, and how to manage these\
    \ critical database storage containers.\n\n## Understanding the First Five\n\n\
    The `SYSTEM` tablespace provides storage for the Oracle data-dictionary objects.\
    \ This tablespace is where all objects owned by the `SYS` user are stored. The\
    \ `SYS` user should be the only user that owns objects created in the `SYSTEM`\
    \ tablespace.\n\nStarting with Oracle Database 10 *g*, the `SYSAUX` (system auxiliary)\
    \ tablespace is created when you create the database. This is an auxiliary tablespace\
    \ used as a data repository for Oracle database tools such as Enterprise Manager,\
    \ Statspack, LogMiner, Logical Standby, and so on.\n\nThe `UNDO` tablespace stores\
    \ the information required to roll back uncommitted data. This tablespace contains\
    \ information about data as it existed before an insert, update, or delete statement\
    \ (this is sometimes referred to as a *before image* copy of the data). This information\
    \ is used to roll back uncommitted data in the event of a crash recovery and to\
    \ provide read consistency for SQL statements.\n\nSome Oracle SQL statements require\
    \ a sort area, either in memory or on disk. For example, the results of a query\
    \ may need to be sorted before being returned to the user. Oracle first uses memory\
    \ to sort the query results; and when there isn’t sufficient room in memory, the\
    \ `TEMP` tablespace is used as a sorting area on disk. When you create a database,\
    \ typically you create the `TEMP` tablespace and specify it to be the default\
    \ temporary tablespace for any users you create.\n\nThe `USERS` tablespace is\
    \ often used as a default permanent tablespace for table and index data for users.\
    \ As shown in Chapter 2, you can create a default permanent tablespace for users\
    \ when you create the database.\n\n## Understanding the Need for More\n\nAlthough\
    \ you could put every database user’s data in the `USERS` tablespace, this usually\
    \ isn’t scalable or maintainable for any type of serious database application.\
    \ Instead, it’s more efficient to create additional tablespaces for application\
    \ users. You typically create at least two tablespaces specific for each application\
    \ using the database: one for the application table data and one for the application\
    \ index data.\n\nFor example, for the `APP` user, you can create tablespaces named\
    \ `APP_DATA` and `APP_INDEX` for table and index data, respectively.\n\nDBAs used\
    \ to separate table and index data for performance reasons. The thinking was that\
    \ separating table data from index data would reduce I/O contention. This is because\
    \ each tablespace and associated datafiles could be placed on different disks\
    \ with separate controllers.\n\nWith modern storage configurations that have multiple\
    \ layers of abstraction between the application and the underlying physical storage\
    \ devices, it’s debatable whether you can realize any performance gains by creating\
    \ multiple separate tablespaces. But there still are valid reasons for creating\
    \ multiple tablespaces for table and index data:\n\n- Backup and recovery requirements\
    \ may be different for the tables and indexes.\n- Indexes may have different storage\
    \ requirements than the table data.\n\nIn addition to separate tablespaces for\
    \ data and indexes, you sometimes create separate tablespaces for objects of different\
    \ sizes. For example, if an application has very large tables, you can create\
    \ an `APP_DATA_LARGE` tablespace that has a large extent size, and a separate\
    \ `APP_DATA_SMALL` tablespace that has a smaller extent size.\n\nDepending on\
    \ your requirements, you should consider creating separate tablespaces for each\
    \ application using the database. For example, for an inventory application, create\
    \ `INV_DATA` and `INV_INDEX`; and for an HR application, create `HR_DATA` and\
    \ `HR_INDEX`. Here are some reasons to consider creating separate tablespaces\
    \ for each application using the database:\n\n- Applications may have different\
    \ availability requirements. Separate tablespaces let you take tablespaces offline\
    \ for one application while not affecting another application.\n- Applications\
    \ may have different backup and recovery requirements. Separate tablespaces let\
    \ tablespaces be backed up and recovered independently.\n- Applications may have\
    \ different storage requirements. Separate tablespaces allow for different settings\
    \ for extent sizes and segment management.\n- You may have some data that is purely\
    \ read only. Separate tablespaces let you put a tablespace that contains only\
    \ read-only data into read-only mode.\n\nThis chapter focuses on the most common\
    \ and critical tasks associated with creating and maintaining tablespaces and\
    \ datafiles. The next section discusses creating tablespaces, and the chapter\
    \ progresses to more advanced topics such as moving and renaming datafiles.\n\n\
    ## Creating Tablespaces\n\nYou use the `CREATE TABLESPACE` statement to create\
    \ tablespaces. The Oracle SQL reference manual contains more than 12 pages of\
    \ syntax and examples for creating tablespaces. In most scenarios, you need to\
    \ use only a few of the features available, namely locally managed extent allocation,\
    \ and automatic segment space management. The following code snippet demonstrates\
    \ how to create a tablespace that utilizes the most common features:\n\n```sql\n\
    create tablespace tools\ndatafile '/ora01/dbfile/INVREP/tools01.dbf'\nsize 100m\n\
    extent management local\nuniform size 128k\nsegment space management auto;\n```\n\
    \nYou need to modify this script for your environment. For example, the directory\
    \ path, datafile size, and uniform extent size should be changed per environment\
    \ requirements.\n\nYou create tablespaces as locally managed by using the `EXTENT\
    \ MANAGEMENT LOCAL` clause. A locally managed tablespace uses a bitmap in the\
    \ datafile to efficiently determine whether an extent is in use.\n\nThe storage\
    \ parameters `NEXT`, `PCTINCREASE`, `MINEXTENTS`, `MAXEXTENTS`, and `DEFAULT`\
    \ aren’t valid for extent options in locally managed tablespaces.\n\n**Note:**\
    \ A locally managed tablespace with uniform extents must be minimally sized for\
    \ at least five database blocks per extent.\n\nAs you add data to objects in tablespaces,\
    \ Oracle automatically allocates more extents to an associated tablespace datafile\
    \ as needed to accommodate the growth. You can instruct Oracle to allocate a uniform\
    \ size for each extent via the `UNIFORM SIZE [size]` clause. If you don’t specify\
    \ a size, then the default uniform extent size is 1MB.\n\nThe uniform extent size\
    \ that you use varies depending on the storage requirements of your tables and\
    \ indexes. I usually create several tablespaces for a given application. For example,\
    \ you can create one tablespace for small objects that has a uniform extent size\
    \ of 512KB, one tablespace for medium-sized objects that has a uniform extent\
    \ size of 4MB, one tablespace for large objects with a uniform extent size of\
    \ 16MB, and so on.\n\nAlternatively, you can specify that Oracle determine the\
    \ extent size via the `AUTOALLOCATE` clause.\n\nOracle allocates extent sizes\
    \ of 64KB, 1MB, 8MB, or 64MB. Using `AUTOALLOCATE` is appropriate when you think\
    \ objects in one tablespace will be of varying sizes.\n\nThe `SEGMENT SPACE MANAGEMENT\
    \ AUTO` clause instructs Oracle to manage the space within the block.\n\nWhen\
    \ you use this clause, there is no need to specify parameters such as `PCTUSED`,\
    \ `FREELISTS`, and `FREELIST GROUPS`. The alternative to `AUTO` space management\
    \ is `MANUAL`. When you use `MANUAL`, you can adjust the previously mentioned\
    \ parameters depending on the needs of your application. I recommend that you\
    \ use `AUTO` and not `MANUAL`. Using `AUTO` vastly reduces that number of parameters\
    \ you’d otherwise need to configure and manage.\n\nWhen a datafile fills up, you\
    \ can instruct Oracle to automatically increase the size of the datafile with\
    \ the `AUTOEXTEND` feature. I recommend that you don’t use this feature. Instead,\
    \ you should monitor tablespace growth and add space as necessary. Manually adding\
    \ space is preferable to having a runaway SQL process that accidentally grows\
    \ a tablespace until it has consumed all space on a mount point. If you inadvertently\
    \ fill up a mount point that contains a control file or the Oracle binaries, you\
    \ can hang your database.\n\nIf you do use the `AUTOEXTEND` feature, I recommend\
    \ that you always specify a corresponding `MAXSIZE` so that a runaway SQL process\
    \ doesn’t accidentally fill up a tablespace that in turn fills up a mount point.\n\
    \nHere’s an example of creating an autoextending tablespace with a cap on its\
    \ maximum size:\n\n```sql\ncreate tablespace tools\ndatafile '/ora01/dbfile/INVREP/tools01.dbf'\n\
    size 100m\nautoextend on maxsize 1000m\nextent management local\nuniform size\
    \ 128k\nsegment space management auto;\n```\n\nWhen you’re using `CREATE TABLESPACE`\
    \ scripts in different environments, it’s useful to be able to parameterize portions\
    \ of the script. For example, in development, you may size the datafiles at 100MB,\
    \ whereas in production the datafiles may be 1000GB. Use ampersand `&` variables\
    \ to make `CREATE TABLESPACE` scripts more portable among environments.\n\nThe\
    \ next listing defines ampersand variables at the top of the script, and those\
    \ variables determine the sizes of datafiles created for the tablespaces:\n\n\
    ```sql\ndefine tbsp_large=5G\ndefine tbsp_med=500M\n--\ncreate tablespace reg_data\n\
    datafile '/ora01/oradata/INVREP/reg_data01.dbf'\nsize &&tbsp_large\nextent management\
    \ local\nuniform size 128k\nsegment space management auto;\n--\ncreate tablespace\
    \ reg_index\ndatafile '/ora01/oradata/INVREP/reg_index01.dbf'\nsize &&tbsp_med\n\
    extent management local\nuniform size 128k\nsegment space management auto;\n```\n\
    \nUsing ampersand variables allows you to modify the script once and have the\
    \ variables reused throughout the script. You can parameterize all aspects of\
    \ the script, including datafile mount points and extent sizes.\n\nYou can also\
    \ pass the values of the ampersand variables in to the `CREATE TABLESPACE` script\
    \ from the SQL*Plus command line. This lets you avoid hard-coding a specific size\
    \ in the script and instead provide the sizes at runtime. To accomplish this,\
    \ first define at the top of the script the ampersand variables to accept the\
    \ values being passed in:\n\n```sql\ndefine tbsp_large=&1\ndefine tbsp_med=&2\n\
    --\ncreate tablespace reg_data\ndatafile '/ora01/oradata/INVREP/reg_data01.dbf'\n\
    size &&tbsp_large\nextent management local\nuniform size 128k\nsegment space management\
    \ auto;\n--\ncreate tablespace reg_index\ndatafile '/ora01/oradata/INVREP/reg_index01.dbf'\n\
    size &&tbsp_med\nextent management local\nuniform size 128k\nsegment space management\
    \ auto;\n```\n\nNow you can pass variables in to the script from the SQL*Plus\
    \ command line. The following example executes a script named `cretbsp.sql` and\
    \ passes in two values that set the ampersand variables to `5G` and `500M`, respectively:\n\
    \n```sql\nSQL> @cretbsp 5G 500M\n```\n\nTable 4–1 summarizes the best practices\
    \ for creating and managing tablespaces.\n\n***Table 4–1.** Best Practices for\
    \ Managing Tablespaces*\n\n| Best Practice | Reasoning |\n| :--- | :--- |\n| Create\
    \ separate tablespaces for different applications using the same database. | If\
    \ a tablespace needs to be taken offline, it affects only one application. |\n\
    | For an application, separate table data from index data in different tablespaces.\
    \ | Table and index data may have different storage requirements. |\n| Don’t use\
    \ the `AUTOALLOCATE` feature for datafiles. If you do use `AUTOALLOCATE`, specify\
    \ a maximum size. | Specifying a maximum size prevents a runaway SQL statement\
    \ from filling up a storage device. |\n| Create tablespaces as locally managed.\
    \ You shouldn’t create a tablespace as dictionary managed. | This provides better\
    \ performance and manageability. |\n| For a tablespace’s datafile naming convention,\
    \ use a name that contains the tablespace name followed by a two-digit number\
    \ that’s unique within datafiles for that tablespace. | Doing this makes it easy\
    \ to identify which datafiles are associated with which tablespaces. |\n| Try\
    \ to minimize the number of datafiles associated with a tablespace. | You have\
    \ fewer datafiles to manage. |\n| In tablespace `CREATE` scripts, use ampersand\
    \ variables to define aspects such as storage characteristics. | This makes scripts\
    \ more reusable among various environments. |\n\n## Renaming a Tablespace\n\n\
    Sometimes you need to rename a tablespace. You may want to do this because a tablespace\
    \ was initially erroneously named, or you may want the tablespace name to better\
    \ conform to your database naming standards. Use the `ALTER TABLESPACE` statement\
    \ to rename a tablespace. This example renames a tablespace from `FOOBAR` to `USERS`:\n\
    \n```sql\nSQL> alter tablespace foobar rename to users;\n```\n\nWhen you rename\
    \ a tablespace, Oracle updates the name of the tablespace in the data dictionary,\
    \ control files, and data headers. Keep in mind that renaming a tablespace doesn’t\
    \ rename any associated datafiles. Renaming datafiles is covered later in this\
    \ chapter.\n\n**Note:** You can’t rename the `SYSTEM` tablespace or the `SYSAUX`\
    \ tablespace.\n\n## Controlling the Generation of Redo\n\nFor some types of applications,\
    \ you may know beforehand that you can easily re-create the data. An example might\
    \ be a data-warehouse environment where you perform direct path inserts or use\
    \ SQL*Loader to load data. In these scenarios, you can turn off the generation\
    \ of redo for direct path loading. You use the `NOLOGGING` clause to do this:\n\
    \n```sql\ncreate tablespace inv_mgmt_data\ndatafile '/ora02/dbfile/O11R2/inv_mgmt_data01.dbf'\
    \ size 100m\nextent management local\nuniform size 128k\nsegment space management\
    \ auto\nnologging;\n```\n\nIf you have an existing tablespace and want to alter\
    \ its logging mode, use the `ALTER TABLESPACE` statement:\n\n```sql\nSQL> alter\
    \ tablespace inv_mgmt_data nologging;\n```\n\nYou can confirm the tablespace logging\
    \ mode by querying the `DBA_TABLESPACES` view:\n\n```sql\nSQL> select tablespace_name,\
    \ logging from dba_tablespaces;\n```\n\nThe generation of redo logging can’t be\
    \ suppressed for regular `INSERT`, `UPDATE`, and `DELETE` statements. For regular\
    \ Data Manipulation Language (DML) statements, the `NOLOGGING` clause is ignored.\n\
    \nThe `NOLOGGING` clause does apply, however, to the following types of DML:\n\
    \n- Direct path `INSERT` statements\n- Direct path SQL*Loader\n\nThe `NOLOGGING`\
    \ clause also applies to the following types of DDL statements:\n\n- `CREATE TABLE\
    \ ... AS SELECT`\n- `ALTER TABLE ... MOVE`\n- `ALTER TABLE ... ADD/MERGE/SPLIT/MOVE/MODIFY\
    \ PARTITION`\n- `CREATE INDEX`\n- `ALTER INDEX ... REBUILD`\n- `CREATE MATERIALIZED\
    \ VIEW`\n- `ALTER MATERIALIZED VIEW ... MOVE`\n- `CREATE MATERIALIZED VIEW LOG`\n\
    - `ALTER MATERIALIZED VIEW LOG ... MOVE`\n\nBe aware that if redo isn’t logged\
    \ for a table or index, and you have a media failure before the object is backed\
    \ up, then you can’t recover the data. You receive an `ORA-01578` error indicating\
    \ that there is logical corruption of the data.\n\n**Note:** You can also override\
    \ the tablespace level of logging at the object level. For example, even if a\
    \ tablespace specified as `NOLOGGING`, you can create a table with the `LOGGING`\
    \ clause.\n\n## Changing a Tablespace’s Write Mode\n\nIn environments such as\
    \ data warehouses, you may need to load data into tables and then never modify\
    \ the data again. To enforce that all objects in a tablespace can’t be modified,\
    \ you can alter the tablespace to be read-only. To do this, use the `ALTER TABLESPACE`\
    \ statement:\n\n```sql\nSQL> alter tablespace inv_mgmt_rep read only;\n```\n\n\
    One advantage of a read-only tablespace is that you only have to back it up once.\
    \ You should be able to restore the datafiles from a read-only tablespace no matter\
    \ how long ago the backup was made.\n\nIf you need to modify the tablespace out\
    \ of read-only mode, you do so as follows:\n\n```sql\nSQL> alter tablespace inv_mgmt_rep\
    \ read write;\n```\n\nMake sure you re-enable backups of a tablespace after you\
    \ place it in read/write mode.\n\n**Note:** You can’t make a tablespace that contains\
    \ active rollback segments read-only. For this reason, the `SYSTEM` tablespace\
    \ can’t be made read-only, because it contains the `SYSTEM` rollback segment.\n\
    \nIn Oracle Database 11 *g* and above, you can modify individual tables to be\
    \ read-only. For example:\n\n```sql\nSQL> alter table my_tab read only;\n```\n\
    \nWhile in read-only mode, you can’t issue any `insert`, `update`, or `delete`\
    \ statements against the table.\n\nMaking individual tables read/write can be\
    \ advantageous when you’re doing maintenance (such as a data migration) when you\
    \ want to ensure that users don’t update the data.\n\nThis example modifies a\
    \ table back to read/write mode:\n\n```sql\nSQL> alter table my_tab read write;\n\
    ```\n\n## Dropping a Tablespace\n\nIf you have a tablespace that is unused, it’s\
    \ best to drop it so it doesn’t clutter your database, consume unnecessary resources,\
    \ and potentially confuse DBAs who aren’t familiar with the database. Before dropping\
    \ a tablespace, it’s a good practice to first take it offline:\n\n```sql\nSQL>\
    \ alter tablespace inv_data offline;\n```\n\nYou may want to wait to see if anybody\
    \ screams that an application is broken because it can’t write to a table or index\
    \ in the tablespace to be dropped. When you’re sure the tablespace isn’t required,\
    \ drop the tablespace and delete its datafiles:\n\n```sql\nSQL> drop tablespace\
    \ inv_data including contents and datafiles;\n```\n\n**Tip:** You can drop a tablespace\
    \ whether it’s online or offline. The exception to this is the `SYSTEM` tablespace,\
    \ which can’t be dropped. It’s always a good idea to take a tablespace offline\
    \ before you drop it. By doing so, you can better determine if an application\
    \ is using any objects in the tablespace. If you attempt to query a table in an\
    \ offline tablespace, you receive an `ORA-00376: file can’t be read at this time`\
    \ error.\n\nDropping a tablespace using `INCLUDING CONTENTS AND DATAFILES` permanently\
    \ removes the tablespace and any of its datafiles. Make certain the tablespace\
    \ doesn’t contain any data you want to keep before you drop it.\n\nIf you attempt\
    \ to drop a tablespace that contains a primary key that is referenced by a foreign\
    \ key associated with a table in a different tablespace (than the one you’re trying\
    \ to drop), you receive this error:\n\n```\nORA-02449: unique/primary keys in\
    \ table referenced by foreign keys\n```\n\nRun this query first to determine whether\
    \ any foreign-key constraints will be affected:\n\n```sql\nselect p.owner,\n \
    \      p.table_name,\n       p.constraint_name,\n       f.table_name referencing_table,\n\
    \       f.constraint_name foreign_key_name,\n       f.status fk_status\nfrom \
    \  dba_constraints P,\n       dba_constraints F,\n       dba_tables T\nwhere \
    \ p.constraint_name = f.r_constraint_name\nand    f.constraint_type = 'R'\nand\
    \    p.table_name = t.table_name\nand    t.tablespace_name = UPPER('&tablespace_name')\n\
    order by 1,2,3,4,5;\n```\n\nIf there are referenced constraints, you need to first\
    \ drop the constraints or use the `CASCADE CONSTRAINTS` clause of the `DROP TABLESPACE`\
    \ statement. This statement uses `CASCADE CONSTRAINTS` to automatically drop any\
    \ affected constraints:\n\n```sql\nSQL> drop tablespace inv_data including contents\
    \ and datafiles cascade constraints;\n```\n\nThis statement drops any referential-integrity\
    \ constraints from tables outside the tablespace being dropped that reference\
    \ tables within the dropped tablespace.\n\nIf you drop a tablespace that has required\
    \ objects in a production system, the results can be catastrophic. You must perform\
    \ some sort of recovery to get the tablespace and its objects back.\n\nNeedless\
    \ to say, be very careful when dropping a tablespace. Table 4–2 lists recommendations\
    \ to consider when you do this.\n\n***Table 4–2.** Best Practices for Dropping\
    \ Tablespaces*\n\n| Best Practice | Reasoning |\n| :--- | :--- |\n| Before dropping\
    \ a tablespace, run a script similar to this to determine if any objects exist\
    \ in the tablespace: <br>`select owner, segment_name, segment_type`<br>`from dba_segments`<br>`where\
    \ tablespace_name=upper('&&tbsp_name');` | Doing this ensures that no tables or\
    \ indexes exist in the tablespace before you drop it. |\n| Consider renaming tables\
    \ in a tablespace before you drop the tablespace. | If any applications are using\
    \ tables within the tablespace to be dropped, the application throws an error\
    \ when a required table is renamed. |\n| If there are no objects in the tablespace,\
    \ resize the associated datafiles to a very small number like 10MB. | Reducing\
    \ the size of the datafiles to a miniscule amount of space quickly shows whether\
    \ any applications are trying to access objects that require space in a tablespace.\
    \ |\n| Make a backup of your database before dropping a tablespace. | This ensures\
    \ that you have a way to recover objects that are discovered to be in use after\
    \ you drop the tablespace. |\n| Take the tablespace and datafiles offline before\
    \ you drop the tablespace. Use the `ALTER TABLESPACE` statement to take the tablespace\
    \ offline. | This helps determine if any applications or users are using objects\
    \ in the tablespaces. They can’t access the objects if the tablespace and datafiles\
    \ are offline. |\n| When you’re sure a tablespace isn't in use, use the `DROP\
    \ TABLESPACE ... INCLUDING CONTENTS AND DATAFILES` statement. | This removes the\
    \ tablespace and physically removes any datafiles associated with the tablespace.\
    \ Some DBAs don’t like this approach, but you should be fine if you’ve taken the\
    \ necessary precautions. |\n\n## Using Oracle Managed Files\n\nThe Oracle Managed\
    \ File (OMF) feature automates many aspects of tablespace management, such as\
    \ file placement, naming, and sizing. You control OMF by setting the following\
    \ initialization parameters:\n\n- `DB_CREATE_FILE_DEST`\n- `DB_CREATE_ONLINE_LOG_DEST_N`\n\
    - `DB_RECOVERY_FILE_DEST`\n\nIf you set these parameters before you create the\
    \ database, Oracle uses them for the placement of the datafiles, control files,\
    \ and online redo logs. You can also enable OMF after your database has been created.\
    \ Oracle uses the values of the initialization parameters for the locations of\
    \ any newly added datafiles and online redo-log files. Oracle also determines\
    \ the name of the newly added file.\n\nThe advantage of using OMF is that creating\
    \ tablespaces is simplified. For example, the `CREATE TABLESPACE` statement doesn’t\
    \ need to specify anything other than the tablespace name. First, enable the OMF\
    \ feature by setting the `DB_CREATE_FILE_DEST` parameter:\n\n```sql\nSQL> alter\
    \ system set db_create_file_dest='/ora01/OMF';\n```\n\nNow, issue the `CREATE\
    \ TABLESPACE` statement:\n\n```sql\nSQL> create tablespace inv1;\n```\n\nThis\
    \ statement creates a tablespace named `INV1` with a default datafile size of\
    \ 100MB. You can override the default by specifying a size:\n\n```sql\nSQL> create\
    \ tablespace inv2 datafile size 20m;\n```\n\nOne limitation of OMF is that you’re\
    \ limited to one directory for the placement of datafiles. If you want to add\
    \ datafiles to a different directory, you can alter the location dynamically:\n\
    \n```sql\nSQL> alter system set db_create_file_dest='/ora02/OMF';\n```\n\nAlthough\
    \ this procedure isn’t a huge deal, I find it easier not to use OMF. Most of the\
    \ environments I’ve worked in have many mount points assigned for database use.\
    \ You don’t want to have to modify an initialization parameter every time you\
    \ need a datafile added to a directory that isn’t in the current definition of\
    \ `DB_CREATE_FILE_DEST`. It’s easier to issue a `CREATE TABLESPACE` statement\
    \ or `ALTER TABLESPACE` statement that has the file-location and storage parameters\
    \ in the script. It isn’t cumbersome to provide directory names and filenames\
    \ to the tablespace-management statements.\n\n## Creating a Bigfile Tablespace\n\
    \nThe bigfile feature allows you to create a tablespace with a potentially very\
    \ large datafile assigned to it.\n\nThe advantage of using the bigfile feature\
    \ is that you can create very large files. With an 8KB block size, you can create\
    \ a datafile as large as 32TB. With a 32KB blocksize, you can create a datafile\
    \ up to 128TB.\n\nUse the `BIGFILE` clause to create a bigfile tablespace:\n\n\
    ```sql\ncreate bigfile tablespace inv_big_data\ndatafile '/ora02/dbfile/O11R2/inv_big_data01.dbf'\n\
    size 10g\nextent management local\nuniform size 128k\nsegment space management\
    \ auto;\n```\n\nAs long as you have plenty of space associated with the filesystem\
    \ supporting the bigfile tablespace datafile, you can store massive amounts of\
    \ data in a tablespace.\n\nOne potential disadvantage of using a bigfile tablespace\
    \ is that if for any reason you run out of space on a filesystem that supports\
    \ the datafile associated with the bigfile, you can’t expand the size of the tablespace\
    \ (unless you can add space to the filesystem). You can’t add more datafiles to\
    \ a bigfile tablespace if they’re placed on separate mount points. A bigfile tablespace\
    \ allows only one datafile to be associated with it.\n\nYou can make the bigfile\
    \ tablespace the default type of tablespace for a database using the `ALTER DATABASE\
    \ SET DEFAULT BIGFILE TABLESPACE` statement. However, I don’t recommend doing\
    \ that. You could potentially create a tablespace, not know it was a bigfile tablespace\
    \ (because you forgot it was the default, or you’re a new DBA on the project and\
    \ didn’t realize it), and create a tablespace on a mount point. Then, when you\
    \ discovered that you needed more space, you wouldn’t know that you couldn’t add\
    \ another datafile on a different mount point for this tablespace because it was\
    \ bigfile constrained.\n\n## Displaying Tablespace Size\n\nDBAs often use monitoring\
    \ scripts to alert them when they need to increase the space allocated to a tablespace.\
    \ The following script displays the percentage of free space left in a tablespace\
    \ and datafile:\n\n```sql\nSET PAGESIZE 100 LINES 132 ECHO OFF VERIFY OFF FEEDB\
    \ OFF SPACE 1 TRIMSP ON\nCOMPUTE SUM OF a_byt t_byt f_byt ON REPORT\nBREAK ON\
    \ REPORT ON tablespace_name ON pf\nCOL tablespace_name FOR A17 TRU HEAD 'Tablespace|Name'\n\
    COL file_name FOR A40 TRU HEAD 'Filename'\nCOL a_byt FOR 9,990.999 HEAD 'Allocated|GB'\n\
    COL t_byt FOR 9,990.999 HEAD 'Current|Used GB'\nCOL f_byt FOR 9,990.999 HEAD 'Current|Free\
    \ GB'\nCOL pct_free FOR 990.0 HEAD 'File %|Free'\nCOL pf FOR 990.0 HEAD 'Tbsp\
    \ %|Free'\nCOL seq NOPRINT\nDEFINE b_div=1073741824\n--\nSELECT 1 seq, b.tablespace_name,\
    \ nvl(x.fs,0)/y.ap*100 pf, b.file_name file_name, b.bytes/&&b_div a_byt, NVL((b.bytes-SUM(f.bytes))/&&b_div,b.bytes/&&b_div)\
    \ t_byt, NVL(SUM(f.bytes)/&&b_div,0) f_byt, NVL(SUM(f.bytes)/b.bytes*100,0) pct_free\n\
    FROM dba_free_space f, dba_data_files b\n    ,(SELECT y.tablespace_name, SUM(y.bytes)\
    \ fs\n      FROM dba_free_space y GROUP BY y.tablespace_name) x\n    ,(SELECT\
    \ x.tablespace_name, SUM(x.bytes) ap\n      FROM dba_data_files x GROUP BY x.tablespace_name)\
    \ y\nWHERE f.file_id(+) = b.file_id\nAND x.tablespace_name(+) = y.tablespace_name\n\
    and y.tablespace_name = b.tablespace_name\nAND f.tablespace_name(+) = b.tablespace_name\n\
    GROUP BY b.tablespace_name, nvl(x.fs,0)/y.ap*100, b.file_name, b.bytes\nUNION\n\
    SELECT 2 seq, tablespace_name,\n    j.bf/k.bb*100 pf, b.name file_name, b.bytes/&&b_div\
    \ a_byt,\n    a.bytes_used/&&b_div t_byt, a.bytes_free/&&b_div f_byt, a.bytes_free/b.bytes*100\
    \ pct_free\nFROM v$temp_space_header a, v$tempfile b\n    ,(SELECT SUM(bytes_free)\
    \ bf FROM v$temp_space_header) j\n    ,(SELECT SUM(bytes) bb FROM v$tempfile)\
    \ k\nWHERE a.file_id = b.file#\nORDER BY 1,2,4,3;\n```\n\nIf you don’t have any\
    \ monitoring in place, you’re alerted via the SQL statement that is attempting\
    \ to perform an insert or update operation that requires more space but isn’t\
    \ able to allocate more. For example:\n\n```\nORA-01653: unable to extend table\
    \ INVENTORY by 128 in tablespace INV_IDX\n```\n\nAfter you determine that a tablespace\
    \ needs more space, you need to either increase the size of a datafile or add\
    \ a datafile to a tablespace. These topics are discussed in the next section.\n\
    \n## Altering Tablespace Size\n\nWhen you’ve determined which datafile you want\
    \ to resize, first make sure you have enough disk space to increase the size of\
    \ the datafile on the mount point on which the datafile exists:\n\n```bash\n$\
    \ df -h | sort\n```\n\nUse the `ALTER DATABASE DATAFILE ... RESIZE` command to\
    \ increase the datafile’s size. This example resizes the datafile to 5GB:\n\n\
    ```sql\nSQL> alter database datafile '/ora01/oradata/INVREP/reg_data01.dbf' resize\
    \ 5g;\n```\n\nIf you don’t have space on an existing mount point to increase the\
    \ size of a datafile, then you must add a datafile. To add a datafile to an existing\
    \ tablespace, use the `ALTER TABLESPACE ... ADD DATAFILE` statement:\n\n```sql\n\
    SQL> alter tablespace reg_data\nadd datafile '/ora01/dbfile/INVREP/reg_data02.dbf'\
    \ size 100m;\n```\n\nIf you have bigfile tablespaces, then you can’t use the `ALTER\
    \ DATABASE ... DATAFILE` statement to change the size of a tablespace’s datafile.\
    \ To resize the single datafile associated with a bigfile tablespace, you must\
    \ use the `ALTER TABLESPACE` clause:\n\n```sql\nSQL> alter tablespace bigstuff\
    \ resize 1T;\n```\n\nResizing datafiles can be a daily task when you’re managing\
    \ databases with heavy transaction loads.\n\nIncreasing the size of an existing\
    \ datafile allows you to add space to a tablespace without adding more datafiles.\
    \ If there isn’t enough disk space left on the storage device that contains an\
    \ existing datafile, you can add a datafile in a different location to an existing\
    \ tablespace.\n\nIf you want to add space to a temporary tablespace, first query\
    \ the `V$TEMPFILE` view to verify the current size and location of temporary datafiles:\n\
    \n```sql\nSQL> select name, bytes from v$tempfile;\n```\n\nNext, use the `TEMPFILE`\
    \ option of the `ALTER DATABASE` statement:\n\n```sql\nSQL> alter database tempfile\
    \ '/ora01/oradata/INVREP/temp01.dbf' resize 500m;\n```\n\nYou can also add a file\
    \ to a temporary tablespace via the `ALTER TABLESPACE` statement:\n\n```sql\n\
    SQL> alter tablespace temp add tempfile '/ora01/oradata/INVREP/temp02.dbf' size\
    \ 5000m;\n```\n\n## Toggling Datafiles Offline and Online\n\nSometimes, when you’re\
    \ performing maintenance operations (such as renaming datafiles), you may need\
    \ to first take a datafile offline. You can use either the `ALTER TABLESPACE`\
    \ or the `ALTER DATABASE DATAFILE` statement to toggle datafiles offline and online.\n\
    \nUse the `ALTER TABLESPACE ... OFFLINE NORMAL` statement to take a tablespace\
    \ and its associated datafiles offline. You don’t need to specify `NORMAL`, because\
    \ it’s the default:\n\n```sql\nSQL> alter tablespace users offline;\n```\n\nWhen\
    \ you place a tablespace offline in normal mode, Oracle checkpoints the datafiles\
    \ associated with the tablespace. This ensures that all modified blocks in memory\
    \ that are associated with the tablespace are flushed and written to the datafiles.\
    \ You don’t need to perform media recovery when you bring the tablespace and its\
    \ associated datafiles back online.\n\nYou can’t use the `ALTER TABLESPACE` statement\
    \ to place tablespaces offline when the database is in mount mode. If you attempt\
    \ to take a tablespace offline while the database is mounted (but not open), you\
    \ receive the following error:\n\n```\nORA-01190: database not open\n```\n\n**Note:**\
    \ When in mount mode, you must use the `ALTER DATABASE DATAFILE` statement to\
    \ take a datafile offline.\n\nWhen taking a tablespace offline, you can also specify\
    \ `ALTER TABLESPACE ... OFFLINE TEMPORARY`. In this scenario, Oracle checkpoints\
    \ all datafiles associated with the tablespace that are online. Oracle doesn’t\
    \ checkpoint offline datafiles associated with the tablespace.\n\nYou can specify\
    \ `ALTER TABLESPACE ... OFFLINE IMMEDIATE` when taking a tablespace offline. Your\
    \ database must be in archivelog mode in this situation. When using `OFFLINE IMMEDIATE`,\
    \ Oracle doesn’t checkpoint the datafiles. You must perform media recovery on\
    \ the tablespace before bringing it back online.\n\n**Note:** You can’t take the\
    \ `SYSTEM` or `UNDO` tablespace offline while the database is open.\n\nYou can\
    \ also use the `ALTER DATABASE DATAFILE` statement to take a datafile offline.\
    \ If your database is open for use, then it must be in archivelog mode in order\
    \ for you to take a datafile offline with the `ALTER DATABASE DATAFILE` statement.\
    \ If you attempt to take a datafile offline using the `ALTER DATABASE DATAFILE`\
    \ statement, and your database isn’t in archivelog mode, you receive the following\
    \ error:\n\n```sql\nSQL> alter database datafile 6 offline;\nORA-01145: offline\
    \ immediate disallowed unless media recovery enabled\n```\n\nIf your database\
    \ isn’t in archivelog mode, you must specify `ALTER DATABASE DATAFILE ... OFFLINE\
    \ FOR DROP` when taking a datafile offline. You can specify the entire filename\
    \ or provide the file number. In this example, datafile 6 is taken offline:\n\n\
    ```sql\nSQL> alter database datafile 6 offline for drop;\n```\n\nNow, if you attempt\
    \ to online the offline datafile, you receive the following error:\n\n```sql\n\
    SQL> alter database datafile 6 online;\nORA-0113: file 6 needs media recovery\n\
    ```\n\nWhen you use the `OFFLINE FOR DROP` clause, no checkpoint is taken on the\
    \ datafile. This means you need to perform media recovery on the datafile before\
    \ bringing it online. Performing media recovery applies any changes to the datafile\
    \ that are recorded in the online redo logs that aren’t in the datafiles themselves.\
    \ Before you can bring online a datafile that was taken offline with the `OFFLINE\
    \ FOR DROP` clause, you must perform media recovery on it. You can specify either\
    \ the entire filename or the file number:\n\n```sql\nSQL> recover datafile 6;\n\
    ```\n\nIf the redo information that Oracle needs is contained in the online redo\
    \ logs, you should see this message:\n\n```\nMedia recovery complete.\n```\n\n\
    If your database isn’t in archivelog mode, and if Oracle needs redo information\
    \ not contained in the online redo logs to recover the datafile, then you can’t\
    \ recover the datafile and place it back online.\n\nIf your database is in archivelog\
    \ mode, you can take it offline without the `FOR DROP` clause. In this scenario,\
    \ Oracle ignores the `FOR DROP` clause. Even when your database is in archivelog\
    \ mode, you need to perform media recovery on a datafile that has been taken offline\
    \ with the `ALTER DATABASE DATAFILE` statement. Table 4–3 summarizes the options\
    \ you must consider when taking a tablespace offline.\n\n**Note:** While the database\
    \ is in mount mode (and not open), you can use the `ALTER DATABASE DATAFILE` command\
    \ to take any datafile offline, including `SYSTEM` and `UNDO`.\n\n***Table 4–3.**\
    \ Options for Taking a Datafile Offline*\n\n| Statement | Archivelog Mode Required?\
    \ | Media Recovery Required When Toggling Online? | Works in Mount Mode? |\n|\
    \ :--- | :--- | :--- | :--- |\n| `ALTER TABLESPACE ... OFFLINE NORMAL` | No |\
    \ No | No |\n| `ALTER TABLESPACE ... OFFLINE TEMPORARY` | No | Maybe: depends\
    \ on whether any datafiles already have offline status | No |\n| `ALTER TABLESPACE\
    \ ... OFFLINE IMMEDIATE` | No | Yes | No |\n| `ALTER DATABASE DATAFILE ... OFFLINE`\
    \ | Yes | Yes | Yes |\n| `ALTER DATABASE DATAFILE ... OFFLINE FOR DROP` | No |\
    \ Yes | Yes |\n\n## Renaming or Relocating a Datafile\n\nYou may occasionally\
    \ need to rename a datafile. For example, you may need to move datafiles due to\
    \ changes in the storage devices or move files that were somehow created in the\
    \ wrong location.\n\nBefore you rename a datafile, you must take the datafile\
    \ offline. (See the previous section.) Here are the steps for renaming a datafile:\n\
    \n1.  Use the following query to determine the names of existing datafiles:\n\
    \    ```sql\n    SQL> select name from v$datafile;\n    ```\n2.  Take the datafile\
    \ offline using either the `ALTER TABLESPACE` or `ALTER DATABASE DATAFILE` statement\
    \ (see the previous section for details on how to do this). You can also shut\
    \ down your database and then start it in mount mode; the datafiles can be moved\
    \ while in this mode because they aren’t open for use.\n3.  Physically move the\
    \ datafile to the new location using either an OS command (like `mv` or `cp`)\
    \ or the `COPY_FILE` procedure of the `DBMS_FILE_TRANSFER` built-in PL/SQL package.\n\
    4.  Use either the `ALTER TABLESPACE ... RENAME DATAFILE ... TO` statement or\
    \ the `ALTER DATABASE RENAME FILE ... TO` statement to update the control file\
    \ with the new datafile name.\n5.  Alter the datafile online.\n\n**Note:** If\
    \ you need to rename datafiles associated with the `SYSTEM` or `UNDO` tablespace,\
    \ you must shut down your database and start it in mount mode. When your database\
    \ is in mount mode, you can rename datafiles associated with the `SYSTEM` or `UNDO`\
    \ tablespace via the `ALTER DATABASE RENAME FILE` statement.\n\nThe following\
    \ example demonstrates how to move the datafiles associated with a single tablespace.\n\
    \nFirst, take the datafiles offline with the `ALTER TABLESPACE` statement:\n\n\
    ```sql\nSQL> alter tablespace users offline;\n```\n\nNow, from the operating system\
    \ prompt, move two datafiles to a new location using the Linux/Unix `mv` command:\n\
    \n```bash\n$ mv /ora02/dbfile/O11R2/users01.dbf /ora03/dbfile/O11R2/users01.dbf\n\
    $ mv /ora02/dbfile/O11R2/users02.dbf /ora03/dbfile/O11R2/users02.dbf\n```\n\n\
    Update the control file with the `ALTER TABLESPACE` statement:\n\n```sql\nalter\
    \ tablespace users\nrename datafile\n'/ora02/dbfile/O11R2/users01.dbf',\n'/ora02/dbfile/O11R2/users02.dbf'\n\
    to\n'/ora03/dbfile/O11R2/users01.dbf',\n'/ora03/dbfile/O11R2/users02.dbf';\n```\n\
    \nFinally, bring the datafiles within the tablespace back online:\n\n```sql\n\
    SQL> alter tablespace users online;\n```\n\nIf you want to rename datafiles from\
    \ multiple tablespaces in one operation, you can use the `ALTER DATABASE RENAME\
    \ FILE` statement (instead of the `ALTER TABLESPACE...RENAME DATAFILE` statement).\
    \ The following example renames all datafiles in the database. Because the `SYSTEM`\
    \ and `UNDO` tablespaces’ datafiles are being moved, you must take the database\
    \ offline first and then place it in mount mode:\n\n```sql\nSQL> conn / as sysdba\n\
    SQL> shutdown immediate;\nSQL> startup mount;\n```\n\nBecause the database is\
    \ in mount mode, the datafiles aren’t open for use, and thus there is no need\
    \ to take the datafiles offline. Next, physically move the files via the Linux/Unix\
    \ `mv` command:\n\n```bash\n$ mv /ora01/dbfile/O11R2/system01.dbf /ora02/dbfile/O11R2/system01.dbf\n\
    $ mv /ora01/dbfile/O11R2/sysaux01.dbf /ora02/dbfile/O11R2/sysaux01.dbf\n$ mv /ora01/dbfile/O11R2/undotbs01.dbf\
    \ /ora02/dbfile/O11R2/undotbs01.dbf\n$ mv /ora01/dbfile/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf\n\
    $ mv /ora01/dbfile/O11R2/toos01.dbf /ora02/dbfile/O11R2/toos01.dbf\n$ mv /ora01/dbfile/O11R2/users02.dbf\
    \ /ora02/dbfile/O11R2/users02.dbf\n```\n\n**Note:** You must move the files before\
    \ you update the control file. The `ALTER DATABASE RENAME FILE` command expects\
    \ the file to be in the renamed location. If the file isn’t there, an error is\
    \ thrown: `ORA-27037: unable to obtain file status`.\n\nNow you can update the\
    \ control file to be aware of the new filename:\n\n```sql\nalter database rename\
    \ file\n'/ora01/dbfile/O11R2/system01.dbf',\n'/ora01/dbfile/O11R2/sysaux01.dbf',\n\
    '/ora01/dbfile/O11R2/undotbs01.dbf',\n'/ora01/dbfile/O11R2/users01.dbf',\n'/ora01/dbfile/O11R2/toos01.dbf',\n\
    '/ora01/dbfile/O11R2/users02.dbf'\nto\n'/ora02/dbfile/O11R2/system01.dbf',\n'/ora02/dbfile/O11R2/sysaux01.dbf',\n\
    '/ora02/dbfile/O11R2/undotbs01.dbf',\n'/ora02/dbfile/O11R2/users01.dbf',\n'/ora02/dbfile/O11R2/toos01.dbf',\n\
    '/ora02/dbfile/O11R2/users02.dbf';\n```\n\nYou should be able to open your database:\n\
    \n```sql\nSQL> alter database open;\n```\n\nAnother way you can relocate all datafiles\
    \ in a database is to re-create the control file with the `CREATE CONTROLFILE`\
    \ statement. The steps for this operation are as follows:\n1.  Create trace file\
    \ that contains a `CREATE CONTROLFILE` statement.\n2.  Locate the trace file that\
    \ contains the `CREATE CONTROLFILE` statement.\n3.  Modify the trace file to display\
    \ the new location of the datafiles.\n4.  Shut down the database.\n5.  Physically\
    \ move the datafiles using an operating system command.\n6.  Start the database\
    \ in nomount mode.\n7.  Run the `CREATE CONTROLFILE` command.\n\n**Note:** When\
    \ you re-create a control file, be aware that any Oracle Recovery Manager (RMAN)\
    \ information that was contained in the control file will be lost. If you’re not\
    \ using a recovery catalog, you can repopulate the control file with RMAN backup\
    \ information using the `RMAN CATALOG` command.\n\nThe following example walks\
    \ through the previous steps. First, you write a `CREATE CONTROLFILE` statement\
    \ to a trace file via an `ALTER DATABASE BACKUP CONTROLFILE TO TRACE` statement:\n\
    \n```sql\nSQL> alter database backup controlfile to trace noresetlogs;\n```\n\n\
    This statement uses the `NORESETLOGS` clause. It instructs Oracle to write only\
    \ one SQL statement to the trace file. If you don’t specify `NORESETLOGS`, Oracle\
    \ writes two SQL statements to the trace file: one to re-create the control file\
    \ with the `NORESETLOGS` option, and one to re-create the control file with `RESETLOGS`.\
    \ Normally, you know whether you want to reset the online redo logs as part of\
    \ re-creating the control file. In this case, you know that you don’t need to\
    \ reset the online redo logs when you re-create the control file (because the\
    \ online redo logs haven’t been damaged and are still in the normal location for\
    \ the database).\n\nNow, locate the directory that contains the trace files for\
    \ your database:\n\n```sql\nSQL> show parameter background_dump_dest\n```\n\n\
    For this example, the directory is `/ora01/app/oracle/diag/rdbms/o11r2/O11R2/trace`\n\
    \nNext, navigate to the trace directory on the operating system:\n\n```bash\n\
    $ cd /ora01/app/oracle/diag/rdbms/o11r2/O11R2/trace\n```\n\nLook for the last\
    \ trace file that was generated (or one that was generated at the same time you\
    \ ran the `ALTER DATABASE` statement). In this example, the trace file is `O11R2_ora_17017.trc`.\n\
    \nMake a copy of the trace file, and open the copy with an operating system editor:\n\
    \n```bash\n$ cp O11R2_ora_17017.trc mv.sql\n```\n\nEdit the `mv.sql` file. In\
    \ this example, the trace file contains only one SQL statement (because I specified\
    \ `NORESTLOGS` when creating the trace file). If you don’t specify `NORESETLOGS`,\
    \ the trace file contains two `CREATE CONTROLFILE` statements, and you must modify\
    \ the trace file to remove the statement that contains the `RESETLOGS` as part\
    \ of the statement.\n\nNext, modify the names of the datafiles to the new locations\
    \ where you want to move the datafiles.\n\nHere is a `CREATE CONTROLFILE` statement\
    \ for this example:\n\n```sql\nCREATE CONTROLFILE REUSE DATABASE \"O11R2\" NORESETLOGS\
    \ ARCHIVELOG\nMAXLOGFILES 16\nMAXLOGMEMBERS 4\nMAXDATAFILES 1024\nMAXINSTANCES\
    \ 1\nMAXLOGHISTORY 876\nLOGFILE\nGROUP 1 (\n  '/ora02/oraredo/O11R2/redo01a.rdo',\n\
    \  '/ora03/oraredo/O11R2/redo01b.rdo'\n) SIZE 100M BLOCKSIZE 512,\nGROUP 2 (\n\
    \  '/ora02/oraredo/O11R2/redo02a.rdo',\n  '/ora03/oraredo/O11R2/redo02b.rdo'\n\
    ) SIZE 100M BLOCKSIZE 512,\nGROUP 3 (\n  '/ora02/oraredo/O11R2/redo03a.rdo',\n\
    \  '/ora03/oraredo/O11R2/redo03b.rdo'\n) SIZE 100M BLOCKSIZE 512\nDATAFILE\n'/ora02/dbfile/O11R2/system01.dbf',\n\
    '/ora02/dbfile/O11R2/sysaux01.dbf',\n'/ora02/dbfile/O11R2/undotbs01.dbf',\n```\n\
    \n![](index-123_1.png)\n\n## Summary\n\nThis chapter discussed managing tablespace\
    \ and datafiles. Tablespaces are logical containers for a group of datafiles.\
    \ Datafiles are the physical files on disk that contain data. You should plan\
    \ carefully when creating tablespaces and the corresponding datafiles.\n\nTablespaces\
    \ allow you to separate the data of one application from another. You can also\
    \ separate tables from indexes. These allow you to customize storage characteristics\
    \ of the tablespace for each application. Furthermore, tablespaces provide a way\
    \ to better manage applications that have different availability and backup and\
    \ recovery requirements. As a DBA, you must be proficient in managing tablespaces\
    \ and datafiles. In any type of environment, you have to add, rename, relocate,\
    \ and drop these storage containers.\n\nOracle requires three types of files for\
    \ a database to operate: datafiles, control files, and online redo-log files.\
    \ The next chapter in the book focuses on control file and online redo-log file\
    \ management.\n\n![](index-125_1.png)\n\n# CHAPTER 5 ■ MANAGING CONTROL FILES\
    \ AND ONLINE REDO LOGS\n\n## REMOVABLE RECOVERY FILES\n\n## DATAFILE\n\nYou can\
    \ view database information stored in the control file via the `V$DATABASE` view:\n\
    \n```sql\nSQL> select name, open_mode, created, current_scn from v$database;\n\
    ```\n\nHere is the output for this example:\n\n```\nNAME      OPEN_MODE      CREATED\
    \      CURRENT_SCN\n--------- -------------- ------------ -----------\nORC11G\
    \    READ WRITE     01-JAN-10    5077636\n```\n\nEvery Oracle database must have\
    \ at least one control file. When you start your database in nomount mode, the\
    \ instance is aware of the location of the control files from the `CONTROL_FILES`\
    \ parameter:\n\n```sql\n-- locations of control files are known to the instance\n\
    SQL> startup nomount;\n```\n\nAt this point, the control files haven’t been touched\
    \ by any processes. When you alter your database into mount mode, the control\
    \ files are read and opened for use:\n\n```sql\n-- control files opened\nSQL>\
    \ alter database mount;\n```\n\nIf any of the control files listed in the `CONTROL_FILES`\
    \ initialization parameter aren’t available, then you can’t mount your database.\n\
    \nWhen you successfully mount your database, the instance is aware of the locations\
    \ of the datafiles and online redo logs, but hasn’t yet opened them. After you\
    \ alter your database into open mode, the datafiles and online redo logs are opened:\n\
    \n```sql\n-- datafiles and online redo logs opened\nSQL> alter database open;\n\
    ```\n\nThe control file is created when the database is created. As you saw in\
    \ Chapter 2, you should create at least two control files when you create your\
    \ database (to avoid a single point of failure). If possible, you should have\
    \ multiple control files stored on separate storage devices controlled by separate\
    \ controllers.\n\nOracle writes to all control files specified by the `CONTROL_FILES`\
    \ initialization parameter. If Oracle can’t write to one of the control files,\
    \ an error is thrown:\n\n```\nORA-00210: cannot open the specified control file\n\
    ```\n\nIf one of your control files becomes unavailable, shut down your database\
    \ and resolve the issue before restarting. Fixing the problem may mean resolving\
    \ a storage-device failure or modifying the `CONTROL_FILES` initialization parameter\
    \ to remove the control-file entry for the control file that isn’t available.\n\
    \n![](index-127_1.png)\n\nIf you’re using a text-based initialization file, you\
    \ can view the file directly with an OS editor or use the `grep` command:\n\n\
    ```bash\n$ grep -i control_files $ORACLE_HOME/dbs/initO11.ora\n```\n\n## Adding\
    \ a Control File\n\n*Adding a control file* means copying an existing control\
    \ file and making your database aware of the copy by modifying your `CONTROL_FILES`\
    \ parameter. This task must be done while your database is shut down.\n\nThis\
    \ procedure only works when you have a good existing control file that can be\
    \ copied. Adding a control file isn’t the same thing as creating or restoring\
    \ a control file.\n\nIf your database uses only one control file, and that control\
    \ file becomes damaged, you need to either restore a control file from a backup\
    \ (if available) and perform a recovery, or re-create the damaged control file.\
    \ If you’re using two or more control files, and one becomes damaged, you can\
    \ use the remaining good control file(s) to quickly get your database into an\
    \ operating state.\n\nIf a database is using only one control file, the basic\
    \ procedure for adding a control file is as follows:\n1.  Alter the initialization\
    \ file `CONTROL_FILES` parameter to include the new location and name of the control\
    \ file.\n2.  Shut down your database.\n3.  Use an OS command to copy an existing\
    \ control file to the new location and name.\n4.  Restart your database.\n\nDepending\
    \ on whether you use an spfile or an init.ora file, the previous steps varies\
    \ slightly. The next two subsections detail these different scenarios.\n\n###\
    \ Spfile Scenario\n\nIf your database is open, you can quickly determine whether\
    \ you’re using an spfile with the following SQL statement:\n\n```sql\nSQL> show\
    \ parameter spfile\n```\n\nHere is some sample output:\n\n```\nNAME          \
    \                       TYPE        VALUE\n------------------------------------\
    \ ----------- ------------------------------\nspfile                         \
    \      string      /oracle/app/oracle/product/11.\n                          \
    \                       2.0/db_1/dbs/spfileO11R2.ora\n```\n\nWhen you’ve determined\
    \ that you’re using an spfile, use the following steps to add a control file:\n\
    1.  Determine the `CONTROL_FILES` parameter’s current value:\n\n    ```sql\n \
    \   SQL> show parameter control_files\n    ```\n\n    The output shows that this\
    \ database is using only one control file:\n\n    ```\n    NAME              \
    \                   TYPE        VALUE\n    ------------------------------------\
    \ ----------- ------------------------------\n    control_files              \
    \          string      /ora01/dbfile/O11R2/control01.ctl\n    ```\n2.  Alter your\
    \ `CONTROL_FILES` parameter to include the new control file that you want to add,\
    \ but limit the scope of the operation to the spfile (you can’t modify this parameter\
    \ in memory). Make sure you also include any control files listed in step 1:\n\
    \n    ```sql\n    SQL> alter system set control_files='/ora01/dbfile/O11R2/control01.ctl',\n\
    \      '/ora01/dbfile/O11R2/control02.ctl' scope=spfile;\n    ```\n3.  Shut down\
    \ your database:\n\n    ```sql\n    SQL> shutdown immediate;\n    ```\n4.  Copy\
    \ an existing control file to the new location and name. In this example, a new\
    \ control file named `control02.ctl` is created via the OS `cp` command:\n\n \
    \   ```bash\n    $ cp /ora01/dbfile/O11R2/control01.ctl /ora01/dbfile/O11R2/control02.ctl\n\
    \    ```\n5.  Start up your database:\n\n    ```sql\n    SQL> startup;\n    ```\n\
    \nYou can verify that the new control file is being used by displaying the `CONTROL_FILES`\
    \ parameter:\n\n```sql\nSQL> show parameter control_files\n```\n\nHere is the\
    \ output for this example:\n\n```\nNAME                                 TYPE \
    \       VALUE\n------------------------------------ ----------- ------------------------------\n\
    control_files                        string      /ora01/dbfile/O11R2/control01.ctl,\n\
    \                                                 /ora01/dbfile/O11R2/control02.ctl\n\
    ```\n\n### Init.ora Scenario\n\nRun the following statement to verify that you’re\
    \ using an init.ora file. If you’re not using an spfile, the `VALUE` column is\
    \ blank:\n\n```sql\nSQL> show parameter spfile\nNAME                         \
    \        TYPE        VALUE\n------------------------------------ ----------- ------------------------------\n\
    spfile                               string\n```\n\nTo add a control file when\
    \ using a text init.ora file, perform the following steps:\n1.  Shut down your\
    \ database:\n\n    ```sql\n    SQL> shutdown immediate;\n    ```\n2.  Edit your\
    \ init.ora file with an OS utility (such as vi), and add the new controlfile location\
    \ and name to the `CONTROL_FILES` parameter. This example opens the init.ora file\
    \ using vi, and adds `control02.ctl` to the `CONTROL_FILES` parameter:\n\n   \
    \ ```bash\n    $ vi $ORACLE_HOME/dbs/initO11R2.ora\n    ```\n\n    Listed next\
    \ is the `CONTROL_FILES` parameter after `control02.ctl` is added:\n\n    ```\n\
    \    control_files='/ora01/dbfile/O11R2/control01.ctl',\n                  '/ora01/dbfile/O11R2/control02.ctl'\n\
    \    ```\n3.  From the OS, copy the existing control file to the location and\
    \ name of the control file being added:\n\n    ```bash\n    $ cp /ora01/dbfile/O11R2/control01.ctl\
    \ /ora01/dbfile/O11R2/control02.ctl\n    ```\n4.  Start up your database:\n\n\
    \    ```sql\n    SQL> startup;\n    ```\n\nYou can view the control files in use\
    \ by displaying the `CONTROL_FILES` parameter:\n\n```sql\nSQL> show parameter\
    \ control_files\n```\n\nFor this example, here is the output:\n\n```\nNAME   \
    \                              TYPE        VALUE\n------------------------------------\
    \ ----------- ------------------------------\ncontrol_files                  \
    \      string      /ora01/dbfile/O11R2/control01.ctl,\n                      \
    \                           /ora01/dbfile/O11R2/control02.ctl\n```\n\n**Note:**\
    \ See Chapter 4 for an example of re-creating a control file from a trace file.\n\
    \n## Moving a Control File\n\nYou may occasionally need to move a control file\
    \ from one location to another. For example, if new storage is added to the database\
    \ server, you may want to move an existing control file to the newly available\
    \ location.\n\nThe procedure for moving a control file is very similar to adding\
    \ a control file. The only difference is that you rename the control file instead\
    \ of copying it. This example shows how to move a control file when you’re using\
    \ an spfile:\n\n1.  Determine the `CONTROL_FILES` parameter’s current value:\n\
    \n    ```sql\n    SQL> show parameter control_files\n    ```\n\n    The output\
    \ shows that this database is using only one control file:\n\n    ```\n    NAME\
    \                                 TYPE        VALUE\n    ------------------------------------\
    \ ----------- ------------------------------\n    control_files              \
    \          string      /ora01/dbfile/O11R2/control01.ctl\n    ```\n2.  Alter your\
    \ `CONTROL_FILES` parameter to reflect that you’re moving a control file. In this\
    \ example, the control file is currently in this location: `/ora01/dbfile/O11R2/control01.ctl`\
    \ You’re moving the control file to this location: `/ora02/dbfile/O11R2/control01.ctl`\
    \ Alter the spfile to reflect the new location for the control file. You have\
    \ to specify `SCOPE=SPFILE` because the `CONTROL_FILES` parameter can’t be modified\
    \ in memory:\n\n    ```sql\n    SQL> alter system set\n      control_files='/ora02/dbfile/O11R2/control01.ctl'\
    \ scope=spfile;\n    ```\n3.  Shut down your database:\n\n    ```sql\n    SQL>\
    \ shutdown immediate;\n    ```\n4.  At the OS prompt, move the control file to\
    \ the new location. This example uses the OS `mv` command:\n\n    ```bash\n  \
    \  $ mv /ora01/dbfile/O11R2/control01.ctl /ora02/dbfile/O11R2/control01.ctl\n\
    \    ```\n5.  Start up your database:\n\n    ```sql\n    SQL> startup;\n    ```\n\
    \nYou can verify that the new control file is being used by displaying the `CONTROL_FILES`\
    \ parameter:\n\n```sql\nSQL> show parameter control_files\n```\n\nHere is the\
    \ output for this example:\n\n```\nNAME                                 TYPE \
    \       VALUE\n------------------------------------ ----------- ---------------------------------\n\
    control_files                        string      /ora02/dbfile/O11R2/control01.ctl\n\
    ```\n\n## Removing a Control File\n\nYou may run into a situation where you experience\
    \ a media failure with a storage device that contains one of your multiplexed\
    \ control files:\n\n```\nORA-00205: error in identifying control file, check alert\
    \ log for more info\n```\n\nIn this scenario, you still have at least one good\
    \ control file. To remove a control file, follow these steps.\n\n1.  Identify\
    \ which control file has experienced media failure by inspecting the alert.log\
    \ for information:\n\n    ```\n    ORA-00202: control file: '/ora01/dbfile/O11R2/control02.ctl'\n\
    \    ORA-27037: unable to obtain file status\n    ```\n2.  Remove the unavailable\
    \ control file name from the `CONTROL_FILES` parameter. If you’re using an init.ora\
    \ file, modify the file directly with an OS editor (such as vi). If you’re using\
    \ an spfile, modify the `CONTROL_FILES` parameter with the `ALTER SYSTEM` statement.\
    \ In this spfile example, the `control02.ctl` control file is removed from the\
    \ `CONTROL_FILES` parameter:\n\n    ```sql\n    SQL> alter system set control_files='/ora01/dbfile/O11R2/control01.ctl'\n\
    \      scope=spfile;\n    ```\n\n    In this example, this database now has only\
    \ one control file associated with it.\n\n    You should never run a production\
    \ database with just one control file. See the section “Adding a Control File”\
    \ to add more control files to your database.\n3.  Stop and start your database:\n\
    \n    ```sql\n    SQL> shutdown immediate;\n    SQL> startup;\n    ```\n\n![](index-132_1.png)\n\
    \n![](index-133_1.png)\n\nThe contents of the current online redo-log files aren’t\
    \ archived until a log switch occurs. This means that if you lose all members\
    \ of the current online redo-log file, you lose transactions. Listed next are\
    \ several mechanisms you can implement to minimize the chance of failure with\
    \ the online redo-log files:\n\n- Multiplex groups to have multiple members.\n\
    - Never allow two members of the same group to share the same controller.\n- Never\
    \ put two members of the same group on the same physical disk.\n- Ensure that\
    \ OS file permissions are set appropriately.\n- Use physical storage devices that\
    \ are redundant (that is, RAID).\n- Appropriately size the log files so that they\
    \ switch and are archived at regular intervals.\n- Set the `ARCHIVE_LAG_TARGET`\
    \ initialization parameter to ensure that the online redo logs are switched at\
    \ regular intervals.\n\n**Note:** The only tool provided by Oracle that can protect\
    \ you and preserve all committed transactions in the event you lose all members\
    \ of the current online redo-log group is Oracle Data Guard implemented in Maximum\
    \ Protection Mode. For more details, see the Data Guard Concepts and Administration\
    \ guide, available on Oracle’s Oracle Technology Network (OTN) website.\n\nThe\
    \ online redo-log files are never backed up by an RMAN backup or by a user-managed\
    \ hot backup. If you did back up the online redo-log files, it would be meaningless\
    \ to restore them. The online redo-log files contain the latest redo generated\
    \ by the database. You wouldn’t want to overwrite them from a backup with old\
    \ redo information. For a database in archivelog mode, the online redo-log files\
    \ contain the most recently generated transactions that are required to perform\
    \ a complete recovery.\n\n## Displaying Online Redo-Log Information\n\nUse the\
    \ `V$LOG` and `V$LOGFILE` views to display information about online redo-log groups\
    \ and corresponding members:\n\n```sql\nselect a.group#,a.member,b.status,b.archived,bytes/1024/1024\
    \ mbytes\nfrom   v$logfile a, v$log b\nwhere  a.group# = b.group#\norder by 1,2;\n\
    ```\n\nHere is some sample output:\n\n```\nGROUP# MEMBER                     \
    \          STATUS    ARCHIVED      MBYTES\n------ -----------------------------------\
    \ --------- -------- ----------\n1      /ora01/oraredo/O11R2/redo01a.rdo    INACTIVE\
    \  YES             100\n1      /ora02/oraredo/O11R2/redo01b.rdo    INACTIVE  YES\
    \             100\n2      /ora01/oraredo/O11R2/redo02a.rdo    CURRENT   NO   \
    \           100\n2      /ora02/oraredo/O11R2/redo02b.rdo    CURRENT   NO     \
    \         100\n```\n\nWhen you’re diagnosing online redo-log issues, the `V$LOG`\
    \ and `V$LOGFILE` views are particularly helpful. You can query these views while\
    \ the database is mounted or open. Table 5–1 briefly describes each view.\n\n\
    ***Table 5–1.** Useful Views Related to Online Redo Logs*\n\n| View | Description\
    \ |\n| :--- | :--- |\n| `V$LOG` | Displays the online redo-log group information\
    \ stored in the control file |\n| `V$LOGFILE` | Displays online redo-log file\
    \ member information |\n\nThe `STATUS` column of the `V$LOG` view is particularly\
    \ useful when you’re working with online redo-logs groups. Table 5–2 describes\
    \ each status and meaning for the `V$LOG` view.\n\n***Table 5–2.** Status for\
    \ Online Redo-Log Groups in the V$LOG View*\n\n| Status | Meaning |\n| :--- |\
    \ :--- |\n| `CURRENT` | The log group is currently being written to by the log\
    \ writer. |\n| `ACTIVE` | The log group is required for crash recovery and may\
    \ or may not have been archived. |\n| `CLEARING` | The log group is being cleared\
    \ out by an `ALTER DATABASE CLEAR LOGFILE` command. |\n| `CLEARING_CURRENT` |\
    \ The current log group is being cleared of a closed thread. |\n| `INACTIVE` |\
    \ The log group isn’t needed for crash recovery and may or may not have been archived.\
    \ |\n| `UNUSED` | The log group has never been written to; it was recently created.\
    \ |\n\nThe `STATUS` column of the `V$LOGFILE` view also contains useful information.\
    \ This view contains information about each physical online redo-log file member\
    \ of a log group. Table 5–3 provides descriptions of the status of each log-file\
    \ member.\n\n***Table 5–3.** Status for Online Redo-Log File Members in the V$LOGFILE\
    \ View*\n\n| Status | Meaning |\n| :--- | :--- |\n| `INVALID` | The log-file member\
    \ is inaccessible or has been recently created. |\n| `DELETED` | The log-file\
    \ member is no longer in use. |\n| `STALE` | The log-file member’s contents aren’t\
    \ complete. |\n| `NULL` | The log-file member is being used by the database. |\n\
    \nIt’s important to differentiate between the `STATUS` column in `V$LOG` and the\
    \ `STATUS` column in `V$LOGFILE`. The `STATUS` column in `V$LOG` reflects the\
    \ status of the log group. The `STATUS` column in `V$LOGFILE` reports the status\
    \ of the physical online redo-log file member. Refer to these tables when diagnosing\
    \ issues with your online redo logs.\n\n## Determining the Optimal Size of Online\
    \ Redo-Log Groups\n\nTry to size the online redo logs so they switch anywhere\
    \ from two to six times per hour. The `V$LOG_HISTORY` contains a history of how\
    \ frequently the online redo logs have switched. Execute this query to view the\
    \ number of log switches per hour:\n\n```sql\nselect count(*)\n       ,to_char(first_time,'YYYY:MM:DD:HH24')\n\
    from   v$log_history\ngroup by to_char(first_time,'YYYY:MM:DD:HH24')\norder by\
    \ 2;\n```\n\nHere’s a snippet of the output:\n\n```\nCOUNT(*) TO_CHAR(FIRST\n\
    ---------- -------------\n         1 2010:03:23:20\n         2 2010:03:23:22\n\
    \        19 2010:03:23:23\n        17 2010:03:24:00\n        25 2010:03:24:01\n\
    \        35 2010:03:24:02\n        23 2010:03:24:03\n         5 2010:03:24:04\n\
    \        11 2010:03:24:05\n         2 2010:03:24:06\n```\n\nFrom the previous\
    \ output, you can see that a lot of redo generation occurred on March 24 from\
    \ about midnight to 3:00 a.m. This could be due to a nightly batch job or users\
    \ in different time zones updating data. For this database, the size of the online\
    \ redo logs should be increased. You should try to size the online redo logs to\
    \ accommodate peak transaction loads on the database.\n\nThe `V$LOG_HISTORY` derives\
    \ its data from the control file. Each time there is a log switch, an entry is\
    \ recorded in this view that details information, such as the time of the switch\
    \ and the system change number (SCN). As mentioned earlier, a general rule of\
    \ thumb is that you should size your online redo-log files so that they switch\
    \ about two to six times per hour. You don’t want them switching too often because\
    \ there is overhead with the log switch. Oracle initiates a checkpoint as part\
    \ of a log switch.\n\nDuring a checkpoint, the database-writer background process\
    \ writes modified (also referred to as *dirty*) blocks to disk, which is resource-intensive.\n\
    \nOn the other hand, you don’t want online redo-log files to never switch, because\
    \ the current online redo log contains transactions that you may need in the event\
    \ of a recovery. If a disaster causes a media failure in your current online redo\
    \ log, you can lose those transactions that haven’t been archived yet.\n\n**Tip:**\
    \ Use the `ARCHIVE_LAG_TARGET` initialization parameter to set a maximum amount\
    \ of time (in seconds) between log switches. A typical setting for this parameter\
    \ is 1800 seconds (30 minutes). A value of 0 (default) disables this feature.\
    \ This parameter is commonly used in Oracle Data Guard environments to force log\
    \ switches after the specified amount of time elapses.\n\nYou can also query the\
    \ `OPTIMAL_LOGFILE_SIZE` column from the `V$INSTANCE_RECOVERY` view to determine\
    \ if your online redo-log files have been sized correctly:\n\n```sql\nSQL> select\
    \ optimal_logfile_size from v$instance_recovery;\n```\n\nHere is some sample output:\n\
    \n```\nOPTIMAL_LOGFILE_SIZE\n--------------------\n                 500\n```\n\
    \nThis reports the redo-log file size (in megabytes) that is considered optimal\
    \ based on the initialization parameter setting of `FAST_START_MTTR_TARGET`. Oracle\
    \ recommends you configure all online redo logs to be at least the value of `OPTIMAL_LOGFILE_SIZE`.\
    \ However, when sizing your online redo logs, you must take into consideration\
    \ information about your environment (such as the frequency of the switches).\n\
    \n## Determining the Optimal Number of Redo-Log Groups\n\nOracle requires at least\
    \ two redo-log groups to function. But having just two groups sometimes isn’t\
    \ enough. To understand why two groups may not be enough, remember that every\
    \ time a log switch occurs, it initiates a checkpoint. As part of a checkpoint,\
    \ the database writer writes all modified (dirty) blocks from the system global\
    \ area (SGA) to the datafiles on disk. Also recall that the online redo logs are\
    \ written to in a round-robin fashion, and eventually the information in a given\
    \ log is overwritten. Before the log writer can begin to overwrite information\
    \ in an online redo log, all modified blocks in the SGA associated with the redo\
    \ log must first be written to a datafile. If all modified blocks haven’t been\
    \ written to the datafiles, you see this message in the alert.log file:\n\n```\n\
    Thread 1 cannot allocate new log, sequence <sequence number>\nCheckpoint not complete\n\
    ```\n\nAnother way to explain this issue is that Oracle needs to store in the\
    \ online redo logs any information that would be required to perform a crash recovery.\
    \ To help visualize this, see Figure 5–2.\n\n![](index-138_1.png)\n\nIf adding\
    \ more redo-log groups doesn’t resolve the issue, you should carefully consider\
    \ lowering the value of `FAST_START_MTTR_TARGET`. When you lower this value, you\
    \ can potentially see more I/O because the database-writer process is more actively\
    \ writing modified blocks to datafiles. Ideally, it would be nice to verify the\
    \ impact of modifying `FAST_START_MTTR_TARGET` in a test environment before making\
    \ the change in production. You can modify this parameter while your instance\
    \ is up; this means you can quickly modify it back to its original setting if\
    \ there are unforeseen side effects.\n\nFinally, consider increasing the value\
    \ of the `DB_WRITER_PROCESSES` parameter. Carefully analyze the impact of modifying\
    \ this parameter in a test environment before you apply it to production. This\
    \ value requires that you stop and start your database; so, if there are adverse\
    \ effects, it requires downtime to set this value back to the original setting.\n\
    \n## Adding Online Redo-Log Groups\n\nIf you determine that you need to add an\
    \ online redo-log group, use the `ADD LOGFILE GROUP` statement. In this example,\
    \ the database already contains four online redo-log groups that are sized at\
    \ 500M each. An additional log group is added that has two members and is sized\
    \ at 500MB:\n\n```sql\nalter database add logfile group 5\n('/ora01/oraredo/O11R2/redo05a.rdo',\n\
    \ '/ora02/oraredo/O11R2/redo05b.rdo') SIZE 500M;\n```\n\nIn this scenario, I highly\
    \ recommend that the log group you add be the same size and have the same number\
    \ of members as the existing online redo logs. If the newly added group doesn’t\
    \ have the same physical characteristics as the existing groups, it’s harder to\
    \ accurately determine performance issues with the online redo-log groups.\n\n\
    For example, if you have two log groups sized at 20MB, and you add a new log group\
    \ sized at 200MB, this is very likely to produce the `Checkpoint not complete`\
    \ issue described in the previous section. This is because flushing all modified\
    \ blocks from the SGA that are protected by the redo in a 200MB log file can potentially\
    \ take much longer than flushing modified blocks from the SGA that are protected\
    \ by a 20MB redo-log file.\n\n## Resizing Online Redo-Log Groups\n\nYou may need\
    \ to change the size of your online redo logs (see also the section “Determining\
    \ the Optimal Size of Online Redo-Log Groups” earlier in this chapter). You can’t\
    \ directly modify the size of an existing online redo log (as you can a datafile).\
    \ To resize an online redo log, you have to first add online redo-log groups that\
    \ contain the size you want, and then drop the online redo logs that are the old\
    \ size.\n\nSay you want to resize the online redo logs to be 200MB each. First,\
    \ you add the new groups that are 200MB using the `ADD LOGFILE GROUP` statement.\
    \ The following example adds log group 4 with two members sized at 200MB:\n\n\
    ```sql\nalter database add logfile group 4\n('/ora02/oraredo/O11R2/redo04a.rdo',\n\
    \ '/ora03/oraredo/O11R2/redo04b.rdo') SIZE 200M;\n```\n\n**Note:** You can specify\
    \ the size of the log file in bytes, kilobytes, or megabytes.\n\nAfter you’ve\
    \ added the log files with the new size, you can drop the old online redo logs.\
    \ A log group must have an `INACTIVE` status before you can drop it. You can check\
    \ the status of the log group, as shown here:\n\n```sql\nSQL> select group#, status,\
    \ archived, thread#, sequence# from v$log;\n```\n\nYou can drop an inactive log\
    \ group with the `ALTER DATABASE DROP LOGFILE GROUP` statement:\n\n```sql\nSQL>\
    \ alter database drop logfile group <group #>;\n```\n\nIf you attempt to drop\
    \ the current online log group, Oracle returns an `ORA-01623` error stating that\
    \ you can’t drop the current group. Use the `ALTER SYSTEM SWITCH LOGFILE` statement\
    \ to switch the logs and make the next group the current group:\n\n```sql\nSQL>\
    \ alter system switch logfile;\n```\n\nAfter a log switch, the log group that\
    \ was previously the current group retains an active status as long as it contains\
    \ redo that Oracle requires to perform crash recovery. If you attempt to drop\
    \ a log group with an active status, Oracle throws an `ORA-01624` error stating\
    \ that the log group is required for crash recovery. Issue an `ALTER SYSTEM CHECKPOINT`\
    \ command to make the log group inactive:\n\n```sql\nSQL> alter system checkpoint;\n\
    ```\n\nAdditionally, you can’t drop an online redo-log group if doing so leaves\
    \ your database with only one log group. If you attempt to do this, Oracle throws\
    \ an `ORA-01567` error and informs you that dropping the log group isn’t permitted\
    \ because it would leave you with less than two log groups for your database (Oracle\
    \ requires at least two log groups to function).\n\nDropping an online redo-log\
    \ group doesn’t remove the log files from the OS. You have to use an OS command\
    \ to do this (such as the `rm` Linux/Unix command). Before you remove a file from\
    \ the OS, ensure that it isn’t in use and that you don’t remove a live online\
    \ redo-log file. For every database on the server, issue this query to view which\
    \ online redo-log files are in use:\n\n```sql\nSQL> select member from v$logfile;\n\
    ```\n\nBefore you physically remove a log file, first switch the online redo logs\
    \ enough times so that all online redo-log groups have recently been switched;\
    \ doing so causes the OS to write to the file and thus give it a new timestamp.\
    \ For example, if you have three groups, ensure that you perform at least three\
    \ log switches:\n\n```sql\nSQL> alter system switch logfile;\nSQL> /\nSQL> /\n\
    ```\n\nNow, verify at the OS prompt that the logfile you intend to remove doesn’t\
    \ have a new timestamp:\n\n```bash\n$ ls -altr\n```\n\nWhen you’re absolutely\
    \ sure the file isn’t in use, you can remove it. The danger in removing a file\
    \ is that if it happens to be an in-use online redo log and the only member of\
    \ a group, you can cause serious damage to your database. Make sure you have a\
    \ good backup of your database and that the file you’re removing isn’t used by\
    \ any databases on the server.\n\n## Adding Online Redo-Log Files to a Group\n\
    \nYou may occasionally need to add a log file to an existing group. For example,\
    \ if you have an online redo-log group that contains only one member, you should\
    \ consider adding a log file (to provide a higher level of protection against\
    \ a single log-file member failure). Use the `ALTER DATABASE ADD LOGFILE MEMBER`\
    \ statement to add a member file to an existing online redo-log group. You need\
    \ to specify the new member file location, name, and group to which you want to\
    \ add the file:\n\n```sql\nSQL> alter database add logfile member '/ora02/oraredo/O11R2/redo04c.rdo'\n\
    to group 4;\n```\n\nEnsure that you follow standards with regard to the location\
    \ and names of any newly added redo-log files.\n\n## Removing Online Redo-Log\
    \ Files from a Group\n\nOccasionally, you may need to remove an online redo-log\
    \ file. For example, your database may have experienced a failure with one member\
    \ of a multiplexed group, and you want to remove the apostate member. First, make\
    \ sure the log file you want to drop isn’t in the current group:\n\n```sql\nSELECT\
    \ a.group#, a.member, b.status, b.archived, SUM(b.bytes)/1024/1024 mbytes\nFROM\
    \   v$logfile a, v$log b\nWHERE  a.group# = b.group#\nGROUP BY a.group#, a.member,\
    \ b.status, b.archived\nORDER BY 1, 2\n```\n\nIf you attempt to drop a log file\
    \ that is in the group with the `CURRENT` status, you receive the following error:\n\
    \n```\nORA-01609: log 4 is the current log for thread 1 - cannot drop members\n\
    ```\n\nIf you’re attempting to drop a member from the current online redo-log\
    \ group, then force a switch as follows:\n\n```sql\nSQL> alter system switch logfile;\n\
    ```\n\nUse the `ALTER DATABASE DROP LOGFILE MEMBER` statement to remove a member\
    \ file from an existing online redo-log group. You don’t need to specify the group\
    \ number because you’re removing a specific file:\n\n```sql\nSQL> alter database\
    \ drop logfile member '/ora02/oraredo/O11R2/redo04a.rdo';\n```\n\nYou also can’t\
    \ drop the last remaining log file of a group. A group must contain at least one\
    \ log file. If you attempt to drop the last remaining log file in a group, you\
    \ receive the following error:\n\n```\nORA-00361: cannot remove last log member\n\
    ```\n\n## Moving or Renaming Redo-Log Files\n\nSometimes, you need to move or\
    \ rename online redo-log files. For example, you may have added some new mount\
    \ points to the system, and you want to move the online redo logs to the new storage.\
    \ You can use two methods to accomplish this task:\n\n- Add the new log files\
    \ in the new location, and drop the old log files.\n- Physically rename the files\
    \ from the OS.\n\nIf you can’t afford any downtime, consider adding new log files\
    \ in the new location and then dropping the old log files. See the section, “Adding\
    \ Online Redo-Log Groups,” for details on how to add a log group. Also see the\
    \ section “Resizing Online Redo-Log Groups” for details on how to drop a log group.\n\
    \nYou can also physically move the files from the OS. You can do this with the\
    \ database open or closed. If your database is open, ensure that the files you\
    \ move aren’t part of the current online redo-log group (because those are actively\
    \ written to by the log-writer background process). It’s dangerous to try to do\
    \ this task while your database is open because on an active system, the online\
    \ redo logs may be switching at a rapid rate, which creates the possibility that\
    \ you attempt to move a file at the same time it’s switched to be the current\
    \ online redo log.\n\nThe next example shows how to move the online redo-log files\
    \ with the database shut down. Here are the steps:\n\n1.  Shut down your database:\n\
    \n    ```sql\n    SQL> shutdown immediate;\n    ```\n2.  From the OS prompt, move\
    \ the files. This example uses the `mv` command to accomplish this task:\n\n \
    \   ```bash\n    $ mv /ora02/oraredo/O11R2/redo01a.rdo /ora03/oraredo/O11R2/redo01a.rdo\n\
    \    $ mv /ora02/oraredo/O11R2/redo02a.rdo /ora03/oraredo/O11R2/redo02a.rdo\n\
    \    $ mv /ora02/oraredo/O11R2/redo03a.rdo /ora03/oraredo/O11R2/redo03a.rdo\n\
    \    ```\n3.  Start up your database in mount mode:\n\n    ```sql\n    SQL> startup\
    \ mount;\n    ```\n4.  Update the control file with the new file locations and\
    \ names:\n\n    ```sql\n    SQL> alter database rename file '/ora02/oraredo/O11R2/redo01a.rdo'\n\
    \      to '/ora03/oraredo/O11R2/redo01a.rdo';\n    SQL> alter database rename\
    \ file '/ora02/oraredo/O11R2/redo02a.rdo'\n      to '/ora03/oraredo/O11R2/redo02a.rdo';\n\
    \    SQL> alter database rename file '/ora02/oraredo/O11R2/redo03a.rdo'\n    \
    \  to '/ora03/oraredo/O11R2/redo03a.rdo';\n    ```\n5.  Open your database:\n\n\
    \    ```sql\n    SQL> alter database open;\n    ```\n\nYou can verify that your\
    \ online redo logs are in the new locations by querying the `V$LOGFILE` view.\
    \ I also recommend that you switch your online redo logs several times and then\
    \ verify from the OS that the files have recent time stamps. Also check the alert.log\
    \ file for any pertinent errors.\n\n## Summary\n\nThis chapter described how to\
    \ configure and manage control files and online redo-log files. Control files\
    \ and online redo logs are critical database files; a normally operating database\
    \ can’t function without them.\n\nControl files are small binary files that contain\
    \ information about the structure of the database. Any control files specified\
    \ in the initialization file must be available for you to mount the database.\
    \ If a control file becomes unavailable, then your database will cease operating\
    \ until you resolve the issue. I highly recommend that you configure your database\
    \ with at least three control files. If one control file becomes unavailable,\
    \ you can replace it with a copy of a good existing control file. It's critical\
    \ that you know how to configure, add, and remove these files.\n\nOnline redo\
    \ logs are crucial files that record the database’s transaction history. If you\
    \ have multiple instances connected to one database, then each instance generates\
    \ its own redo thread. Each database must be created with two or more online redo-log\
    \ groups. You can operate a database with each group having just one online redo-log\
    \ member. However, I highly recommend that you create your online redo-log groups\
    \ with two members in each group. If an online redo log has at least one member\
    \ that can be written to, your database will continue to function. If all members\
    \ of an online redo-log group are unavailable, then your database will cease to\
    \ operate. As a DBA, you must be extremely proficient with creating, adding, moving,\
    \ and dropping these critical database files.\n\nThe chapters up to this point\
    \ in the book have covered tasks such as installing the Oracle software, creating\
    \ databases, and managing tablespaces, datafiles, control files, and online redo\
    \ log files. The next several chapters concentrate on how to configure a database\
    \ for application use, including topics such as creating users and database objects.\n\
    \n![](index-145_1.png)\n\n# CHAPTER 6 ■ USERS AND BASIC SECURITY\n\n## Managing\
    \ Default Users\n\nWhen you create a database, Oracle creates several default\
    \ database users. The specific users that are created vary by database version.\
    \ If you’ve just created your database, you can view the default user accounts\
    \ as follows:\n\n```sql\nSQL> select username from dba_users order by 1;\n```\n\
    \nHere is an example listing of some default database user accounts:\n\n```\n\
    USERNAME\n-------------------------\nAPPQOSSYS\nDBSNMP\nDIP\nORACLE_OCM\nOUTLN\n\
    SYS\nSYSTEM\n```\n\nTo begin securing your database, you should minimally change\
    \ the password for every default account and then lock any accounts that you’re\
    \ not using. After creating a database, I usually lock every default account and\
    \ change their passwords to expired; I unlock default users only as they’re needed.\n\
    \nThe following script generates the SQL statements that lock all users and set\
    \ their passwords to expired:\n\n```sql\nselect\n'alter user ' || username ||\
    \ ' password expire account lock;'\nfrom dba_users;\n```\n\nA locked user can\
    \ only be accessed by altering the user to an unlocked state. For example:\n\n\
    ```sql\nSQL> alter user outln account unlock;\n```\n\nA user with an expired password\
    \ is prompted for a new password when first connecting to the database as that\
    \ user. When connecting to a user, Oracle checks to see if the current password\
    \ is expired, and if so prompts you as follows:\n\n```\nORA-28001: the password\
    \ has expired\n\nChanging password for <user>\nNew password:\n```\n\nAfter entering\
    \ the new password, you’re prompted to enter it again:\n\n```\nRetype new password:\n\
    Password changed\nConnected.\n```\n\n**Note:** You can lock the `SYS` account,\
    \ but this has no effect on your ability to connect as the `SYS` user using OS\
    \ authentication or when using a password file.\n\nIf you’ve inherited a database\
    \ from another DBA, then sometimes it’s useful to determine whether another DBA\
    \ created a user or if a user is a default account created by Oracle. As mentioned\
    \ earlier, usually several user accounts are created for you when you create a\
    \ database. The number of accounts varies somewhat by version and options installed.\
    \ Run this query to display users that have been created by another DBA versus\
    \ those created by Oracle (such as those created by default when the database\
    \ is created):\n\n```sql\nselect\n  distinct u.username\n  ,case when d.user_name\
    \ is null then 'DBA created account'\n   else 'Oracle created account'\n  end\n\
    from   dba_users u\n       ,default_pwd$ d\nwhere  u.username=d.user_name(+);\n\
    ```\n\n**Note:** The `DEFAULT_PWD$` view is available starting with Oracle Database\
    \ 11g. For more details about guidelines regarding checking for default passwords,\
    \ see My Oracle Support note 227010.1.\n\nWhen you’re determining if a password\
    \ is secure, it’s useful to check to see whether the password for a user has ever\
    \ been changed. If the password for a user has never been changed, this may be\
    \ viewed as a security risk. This example performs such a check:\n\n```sql\nselect\n\
    \  name\n  ,to_char(ctime,'dd-mon-yy hh24:mi:ss')\n  ,to_char(ptime,'dd-mon-yy\
    \ hh24:mi:ss')\n  ,length(password)\nfrom   user$\nwhere  password is not null\n\
    and    password not in ('GLOBAL','EXTERNAL')\nand    ctime=ptime;\n```\n\nIn this\
    \ script, the `CTIME` column contains the timestamp of when the user was created.\
    \ The `PTIME` column contains the timestamp of when the password was changed.\
    \ If the `CTIME` and `PTIME` are identical, then this indicates that the password\
    \ has never changed.\n\nYou should also check your database to determine whether\
    \ any accounts are using default passwords. If you’re using an Oracle Database\
    \ 11 *g* or higher, you can check the `DBA_USERS_WITH_DEFPWD` view to determine\
    \ whether any Oracle-created user accounts are still set to the default password:\n\
    \n```sql\nSQL> select * from dba_users_with_defpwd;\n```\n\nIf you aren’t using\
    \ Oracle Database 11 *g*, then you have to manually check the passwords or use\
    \ a script. Listed next is a simple shell script that attempts to connect to the\
    \ database using default passwords:\n\n```bash\n#!/bin/bash\nif [ $# -ne 1 ];\
    \ then\necho \"Usage: $0 SID\"\nexit 1\nfi\n```"
