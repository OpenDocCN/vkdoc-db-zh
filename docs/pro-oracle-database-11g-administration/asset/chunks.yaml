    oracle root


    The cron background process is mostly idle. It wakes up once every minute and
    checks


    /etc/crontab, /etc/cron.d, and the user cron table files and determines whether
    there are any jobs that need to be executed.


    Table 21–1 summarizes the purpose of the various files and directories used by
    cron. Knowledge of these files and directories will help you troubleshoot any
    issues as well as understand cron in more detail.


    ***Table 21–1.** Descriptions of Files and Directories Used by the cron Utility*
    **File**


    **Purpose**


    /etc/init.d/crond


    Starts the cron daemon in system boot.


    /var/log/cron


    System messages related to the cron process. Useful for


    troubleshooting problems.


    /var/spool/cron/<username>


    User crontab files are stored in the /var/spool/cron directory.


    /etc/cron.allow


    Specifies users who can create a cron table.


    /etc/cron.deny


    Specifies users who are not allowed to create a cron table.


