    \n只需少量设置，您就可以确保操作系统提示符始终显示主机和数据库等信息。同样，您总是可以设置 SQL 提示符以显示用户名和数据库连接。这些技术有助于确保您不会在错误的环境中意外运行命令或脚本。\n\
    \n在安装了 Oracle 二进制文件、创建了数据库并配置了环境之后，您就可以执行额外的数据库管理任务，例如为应用程序创建表空间。表空间的创建和维护主题将在下一章中描述。\n\
    \n![](img/index-105_1.png)\n\n# 第 4 章 ■ 表空间和数据文件\n\n创建额外的表空间来存储应用程序数据。本章讨论标准表空间集的目的、对额外表空间的需求以及如何管理这些关键的数据库存储容器。\n\
    \n## 理解前五个表空间\n\n`SYSTEM` 表空间为 Oracle 数据字典对象提供存储。这是 `SYS` 用户拥有的所有对象存储的位置。`SYS`\
    \ 用户应该是唯一在 `SYSTEM` 表空间中拥有对象的用户。\n\n从 Oracle Database 10*g* 开始，创建数据库时会创建 `SYSAUX`\
    \ (系统辅助) 表空间。这是一个辅助表空间，用作 Oracle 数据库工具（如 Enterprise Manager、Statspack、LogMiner、Logical\
    \ Standby 等）的数据存储库。\n\n`UNDO` 表空间存储回滚未提交数据所需的信息。此表空间包含有关数据在 `INSERT`、`UPDATE`\
    \ 或 `DELETE` 语句执行之前状态的信息（这有时被称为数据的*前像*副本）。此信息用于在崩溃恢复时回滚未提交的数据，并为 SQL 语句提供读一致性。\n\
    \n某些 Oracle SQL 语句需要排序区域，可以在内存中或在磁盘上。例如，查询的结果可能需要在返回给用户之前进行排序。Oracle 首先使用内存对查询结果进行排序；当内存中没有足够的空间时，`TEMP`\
    \ 表空间将用作磁盘上的排序区域。创建数据库时，通常会创建 `TEMP` 表空间并将其指定为您创建的任何用户的默认临时表空间。\n\n`USERS` 表空间通常用作用户表和索引数据的默认永久表空间。如第\
    \ 2 章所示，您可以在创建数据库时为用户创建默认永久表空间。\n\n## 理解对更多表空间的需求\n\n尽管您可以将每个数据库用户的数据都放在 `USERS`\
    \ 表空间中，但这对于任何类型的严肃数据库应用程序通常都是不可扩展或不可维护的。相反，为应用程序用户创建额外的表空间更有效。您通常为使用数据库的每个应用程序创建至少两个特定的表空间：一个用于应用程序表数据，一个用于应用程序索引数据。\n\
    \n例如，对于 `APP` 用户，您可以分别为表和索引数据创建名为 `APP_DATA` 和 `APP_INDEX` 的表空间。\n\nDBA 过去出于性能原因分离表和索引数据。当时的思路是，将表数据与索引数据分开可以减少\
    \ I/O 争用。这是因为每个表空间及其关联的数据文件可以放在具有独立控制器的不同磁盘上。\n\n在具有应用程序与底层物理存储设备之间多层抽象的现代存储配置中，通过创建多个独立的表空间是否能实现任何性能提升是有争议的。但为表和索引数据创建多个表空间仍有合理的理由：\n\
    \n- 表和索引的备份和恢复要求可能不同。\n- 索引可能具有与表数据不同的存储要求。\n\n除了为数据和索引创建独立的表空间外，有时还为不同大小的对象创建独立的表空间。例如，如果一个应用程序有非常大的表，您可以创建一个具有较大区间大小的\
    \ `APP_DATA_LARGE` 表空间，以及一个具有较小区间大小的独立 `APP_DATA_SMALL` 表空间。\n\n根据您的要求，您应考虑为使用数据库的每个应用程序创建独立的表空间。例如，为库存应用程序创建\
    \ `INV_DATA` 和 `INV_INDEX`；为 HR 应用程序创建 `HR_DATA` 和 `HR_INDEX`。考虑为使用数据库的每个应用程序创建独立表空间的原因如下：\n\
    \n- 应用程序可能有不同的可用性要求。独立的表空间允许您将一个应用程序的表空间脱机而不影响另一个应用程序。\n- 应用程序可能有不同的备份和恢复要求。独立的表空间允许独立备份和恢复表空间。\n\
    - 应用程序可能有不同的存储要求。独立的表空间允许不同的区间大小和段管理设置。\n- 您可能有一些数据是纯只读的。独立的表空间允许您将包含只读数据的表空间设置为只读模式。\n\
    \n本章重点介绍与创建和维护表空间及数据文件相关的最常见和最关键的任务。下一节讨论创建表空间，本章进而讨论更高级的主题，例如移动和重命名数据文件。\n\n\
    ## 创建表空间\n\n使用 `CREATE TABLESPACE` 语句创建表空间。Oracle SQL 参考手册包含超过 12 页的创建表空间的语法和示例。在大多数情况下，您只需要使用可用功能中的一小部分，即本地管理的区间分配和自动段空间管理。以下代码片段演示了如何创建利用最常见功能的表空间：\n\
    \n```sql\ncreate tablespace tools\ndatafile '/ora01/dbfile/INVREP/tools01.dbf'\n\
    size 100m\nextent management local\nuniform size 128k\nsegment space management\
    \ auto;\n```\n\n您需要根据您的环境修改此脚本。例如，目录路径、数据文件大小和统一区间大小应根据环境要求进行更改。\n\n通过使用 `EXTENT\
    \ MANAGEMENT LOCAL` 子句，您可以创建本地管理的表空间。本地管理的表空间使用数据文件中的位图来高效确定区间是否正在使用。\n\n存储参数\
    \ `NEXT`、`PCTINCREASE`、`MINEXTENTS`、`MAXEXTENTS` 和 `DEFAULT` 对于本地管理表空间中的区间选项无效。\n\
    \n**注意：** 具有统一区间的本地管理表空间的大小必须至少为每个区间五个数据库块。\n\n当您向表空间中的对象添加数据时，Oracle 会根据需要自动为关联的表空间数据文件分配更多区间以适应增长。您可以通过\
    \ `UNIFORM SIZE [size]` 子句指示 Oracle 为每个区间分配统一的大小。如果您未指定大小，则默认的统一区间大小为 1MB。\n\n\
    您使用的统一区间大小取决于表和索引的存储要求。我通常为给定的应用程序创建多个表空间。例如，您可以创建一个用于小对象的表空间，其统一区间大小为 512KB；一个用于中等大小对象的表空间，其统一区间大小为\
    \ 4MB；一个用于大对象的表空间，其统一区间大小为 16MB，依此类推。\n\n或者，您可以通过 `AUTOALLOCATE` 子句指定 Oracle 确定区间大小。\n\
    \nOracle 分配 64KB、1MB、8MB 或 64MB 的区间大小。当您认为一个表空间中的对象大小不同时，使用 `AUTOALLOCATE` 是合适的。\n\
    \n`SEGMENT SPACE MANAGEMENT AUTO` 子句指示 Oracle 管理块内的空间。\n\n使用此子句时，无需指定诸如 `PCTUSED`、`FREELISTS`\
    \ 和 `FREELIST GROUPS` 之类的参数。`AUTO` 空间管理的替代方案是 `MANUAL`。使用 `MANUAL` 时，您可以根据应用程序的需求调整前面提到的参数。我建议您使用\
    \ `AUTO` 而不是 `MANUAL`。使用 `AUTO` 极大地减少了您原本需要配置和管理的参数数量。\n\n当数据文件填满时，您可以使用 `AUTOEXTEND`\
    \ 功能指示 Oracle 自动增加数据文件的大小。我建议您不要使用此功能。相反，您应该监控表空间增长并在必要时添加空间。手动添加空间比让失控的 SQL 过程意外增长表空间直到耗尽挂载点上的所有空间更可取。如果您无意中填满了包含控制文件或\
    \ Oracle 二进制文件的挂载点，则可能会导致数据库挂起。\n\n如果您确实使用了 `AUTOEXTEND` 功能，我建议您始终指定相应的 `MAXSIZE`，这样失控的\
    \ SQL 过程就不会意外填满表空间，进而填满挂载点。\n\n以下是创建具有最大大小限制的自动扩展表空间的示例：\n\n```sql\ncreate tablespace\
    \ tools\ndatafile '/ora01/dbfile/INVREP/tools01.dbf'\nsize 100m\nautoextend on\
    \ maxsize 1000m\nextent management local\nuniform size 128k\nsegment space management\
    \ auto;\n```\n\n在不同环境中使用 `CREATE TABLESPACE` 脚本时，能够对脚本的部分内容进行参数化是很有用的。例如，在开发环境中，您可能将数据文件大小设置为\
    \ 100MB，而在生产环境中数据文件大小可能是 1000GB。使用 `&` 变量使 `CREATE TABLESPACE` 脚本在不同环境中更易于移植。\n\
    \n下一个清单在脚本顶部定义了 `&` 变量，这些变量确定为表空间创建的数据文件的大小：\n\n```sql\ndefine tbsp_large=5G\n\
    define tbsp_med=500M\n--\ncreate tablespace reg_data\ndatafile '/ora01/oradata/INVREP/reg_data01.dbf'\n\
    size &&tbsp_large\nextent management local\nuniform size 128k\nsegment space management\
    \ auto;\n--\ncreate tablespace reg_index\ndatafile '/ora01/oradata/INVREP/reg_index01.dbf'\n\
    size &&tbsp_med\nextent management local\nuniform size 128k\nsegment space management\
    \ auto;\n```\n\n使用 `&` 变量允许您修改脚本一次，然后在整个脚本中重用这些变量。您可以对脚本的所有方面进行参数化，包括数据文件挂载点和区间大小。\n\
    \n您还可以从 SQL*Plus 命令行将 `&` 变量的值传递到 `CREATE TABLESPACE` 脚本中。这使您可以避免在脚本中硬编码特定大小，而是在运行时提供大小。为此，首先在脚本顶部定义\
    \ `&` 变量以接受传入的值：\n\n```sql\ndefine tbsp_large=&1\ndefine tbsp_med=&2\n--\ncreate\
    \ tablespace reg_data\ndatafile '/ora01/oradata/INVREP/reg_data01.dbf'\nsize &&tbsp_large\n\
    extent management local\nuniform size 128k\nsegment space management auto;\n--\n\
    create tablespace reg_index\ndatafile '/ora01/oradata/INVREP/reg_index01.dbf'\n\
    size &&tbsp_med\nextent management local\nuniform size 128k\nsegment space management\
    \ auto;\n```\n\n现在，您可以从 SQL*Plus 命令行将变量传递到脚本中。以下示例执行名为 `cretbsp.sql` 的脚本，并传入两个值，将\
    \ `&` 变量分别设置为 `5G` 和 `500M`：\n\n```sql\nSQL> @cretbsp 5G 500M\n```\n\n表 4-1 总结了创建和管理表空间的最佳实践。\n\
    \n***表 4-1.** 管理表空间的最佳实践*\n\n| 最佳实践 | 推理 |\n| :--- | :--- |\n| 为使用同一数据库的不同应用程序创建独立的表空间。\
    \ | 如果需要将某个表空间脱机，它只会影响一个应用程序。 |\n| 对于一个应用程序，将表数据和索引数据分离到不同的表空间中。 | 表和索引数据可能有不同的存储要求。\
    \ |\n| 不要对数据文件使用 `AUTOALLOCATE` 功能。如果确实使用了 `AUTOALLOCATE`，请指定最大大小。 | 指定最大大小可防止失控的\
    \ SQL 语句填满存储设备。 |\n| 将表空间创建为本地管理的。您不应将表空间创建为字典管理的。 | 这提供了更好的性能和可管理性。 |\n| 对于表空间的数据文件命名约定，使用包含表空间名称后跟在该表空间的数据文件中唯一的两位数字的名称。\
    \ | 这样可以轻松识别哪些数据文件与哪些表空间相关联。 |\n| 尽量减少与表空间关联的数据文件数量。 | 您需要管理的数据文件更少。 |\n| 在表空间\
    \ `CREATE` 脚本中，使用 `&` 变量定义存储特性等方面。 | 这使得脚本在各种环境中更具可重用性。 |\n\n## 重命名表空间\n\n有时您需要重命名表空间。您可能希望这样做是因为表空间最初被错误命名，或者您希望表空间名称更好地符合数据库命名标准。使用\
    \ `ALTER TABLESPACE` 语句重命名表空间。此示例将表空间从 `FOOBAR` 重命名为 `USERS`：\n\n```sql\nSQL>\
    \ alter tablespace foobar rename to users;\n```\n\n重命名表空间时，Oracle 会更新数据字典、控制文件和数据头中的表空间名称。请记住，重命名表空间不会重命名任何关联的数据文件。重命名数据文件将在本章后面介绍。\n\
    \n**注意：** 您不能重命名 `SYSTEM` 表空间或 `SYSAUX` 表空间。\n\n## 控制重做生成\n\n对于某些类型的应用程序，您可能事先知道可以轻松重新创建数据。例如，数据仓库环境，您执行直接路径插入或使用\
    \ SQL*Loader 加载数据。在这些场景中，您可以关闭直接路径加载的重做生成。使用 `NOLOGGING` 子句来实现：\n\n```sql\ncreate\
    \ tablespace inv_mgmt_data\ndatafile '/ora02/dbfile/O11R2/inv_mgmt_data01.dbf'\
    \ size 100m\nextent management local\nuniform size 128k\nsegment space management\
    \ auto\nnologging;\n```\n\n如果您有一个现有的表空间并想更改其日志记录模式，请使用 `ALTER TABLESPACE` 语句：\n\
    \n```sql\nSQL> alter tablespace inv_mgmt_data nologging;\n```\n\n您可以通过查询 `DBA_TABLESPACES`\
    \ 视图来确认表空间日志记录模式：\n\n```sql\nSQL> select tablespace_name, logging from dba_tablespaces;\n\
    ```\n\n对于常规的 `INSERT`、`UPDATE` 和 `DELETE` 语句，无法抑制重做日志的生成。对于常规的数据操作语言 (DML) 语句，`NOLOGGING`\
    \ 子句将被忽略。\n\n但是，`NOLOGGING` 子句确实适用于以下类型的 DML：\n\n- 直接路径 `INSERT` 语句\n- 直接路径 SQL*Loader\n\
    \n`NOLOGGING` 子句也适用于以下类型的 DDL 语句：\n\n- `CREATE TABLE ... AS SELECT`\n- `ALTER\
    \ TABLE ... MOVE`\n- `ALTER TABLE ... ADD/MERGE/SPLIT/MOVE/MODIFY PARTITION`\n\
    - `CREATE INDEX`\n- `ALTER INDEX ... REBUILD`\n- `CREATE MATERIALIZED VIEW`\n\
    - `ALTER MATERIALIZED VIEW ... MOVE`\n- `CREATE MATERIALIZED VIEW LOG`\n- `ALTER\
    \ MATERIALIZED VIEW LOG ... MOVE`\n\n请注意，如果表或索引没有记录重做，并且在备份该对象之前发生了介质故障，那么您将无法恢复数据。您将收到\
    \ `ORA-01578` 错误，表明数据存在逻辑损坏。\n\n**注意：** 您也可以在对象级别覆盖表空间级别的日志记录。例如，即使表空间指定为 `NOLOGGING`，您也可以使用\
    \ `LOGGING` 子句创建表。\n\n## 更改表空间的写入模式\n\n在数据仓库等环境中，您可能需要将数据加载到表中，然后永远不再修改数据。为了强制表空间中的所有对象都无法修改，您可以将表空间更改为只读。为此，使用\
    \ `ALTER TABLESPACE` 语句：\n\n```sql\nSQL> alter tablespace inv_mgmt_rep read only;\n\
    ```\n\n只读表空间的一个优点是您只需备份一次。无论备份是多久之前进行的，您都应该能够从只读表空间还原数据文件。\n\n如果您需要将表空间从只读模式修改为读写模式，可以按如下方式进行：\n\
    \n```sql\nSQL> alter tablespace inv_mgmt_rep read write;\n```\n\n请确保在将表空间置于读/写模式后重新启用其备份。\n\
    \n**注意：** 您不能使包含活动回滚段的表空间变为只读。因此，`SYSTEM` 表空间不能设置为只读，因为它包含 `SYSTEM` 回滚段。\n\n在\
    \ Oracle Database 11*g* 及更高版本中，您可以将单个表修改为只读。例如：\n\n```sql\nSQL> alter table my_tab\
    \ read only;\n```\n\n在只读模式下，您不能对表发出任何 `INSERT`、`UPDATE` 或 `DELETE` 语句。\n\n在进行维护（例如数据迁移）时，将单个表设置为读/写可能很有用，因为您希望确保用户不会更新数据。\n\
    \n此示例将表修改回读/写模式：\n\n```sql\nSQL> alter table my_tab read write;\n```\n\n## 删除表空间\n\
    \n如果您有一个未使用的表空间，最好将其删除，这样它不会使数据库变得杂乱，消耗不必要的资源，并可能使不熟悉该数据库的 DBA 感到困惑。在删除表空间之前，最好先将其脱机：\n\
    \n```sql\nSQL> alter tablespace inv_data offline;\n```\n\n您可能希望等待，看看是否有人抱怨应用程序因为无法写入要删除的表空间中的表或索引而中断。当您确定不需要该表空间时，删除该表空间并删除其数据文件：\n\
    \n```sql\nSQL> drop tablespace inv_data including contents and datafiles;\n```\n\
    \n**提示：** 无论表空间是联机还是脱机，您都可以删除它。例外是 `SYSTEM` 表空间，它不能被删除。在删除表空间之前将其脱机总是一个好主意。这样做可以更好地确定应用程序是否正在使用表空间中的任何对象。如果您尝试查询脱机表空间中的表，您会收到\
    \ `ORA-00376: file can't be read at this time` 错误。\n\n使用 `INCLUDING CONTENTS AND\
    \ DATAFILES` 删除表空间会永久删除该表空间及其任何数据文件。在删除表空间之前，请确保它不包含任何您想要保留的数据。\n\n如果您尝试删除包含主键的表空间，而该主键被另一个表空间（不同于您尝试删除的表空间）中的表的外键引用，您会收到此错误：\n\
    \n```\nORA-02449: unique/primary keys in table referenced by foreign keys\n```\n\
    \n首先运行此查询以确定是否有任何外键约束将受到影响：\n\n```sql\nselect p.owner,\n       p.table_name,\n\
    \       p.constraint_name,\n       f.table_name referencing_table,\n       f.constraint_name\
    \ foreign_key_name,\n       f.status fk_status\nfrom   dba_constraints P,\n  \
    \     dba_constraints F,\n       dba_tables T\nwhere  p.constraint_name = f.r_constraint_name\n\
    and    f.constraint_type = 'R'\nand    p.table_name = t.table_name\nand    t.tablespace_name\
    \ = UPPER('&tablespace_name')\norder by 1,2,3,4,5;\n```\n\n如果存在引用的约束，您需要首先删除约束，或者使用\
    \ `DROP TABLESPACE` 语句的 `CASCADE CONSTRAINTS` 子句。此语句使用 `CASCADE CONSTRAINTS` 自动删除任何受影响的约束：\n\
    \n```sql\nSQL> drop tablespace inv_data including contents and datafiles cascade\
    \ constraints;\n```\n\n此语句将删除被删除表空间之外的表中引用被删除表空间内的表的任何引用完整性约束。\n\n如果您在生产系统中删除了包含所需对象的表空间，后果可能是灾难性的。您必须执行某种恢复才能将表空间及其对象恢复。\n\
    \n不用说，删除表空间时要非常小心。表 4-2 列出了执行此操作时需要考虑的建议。\n\n***表 4-2.** 删除表空间的最佳实践*\n\n| 最佳实践\
    \ | 推理 |\n| :--- | :--- |\n| 在删除表空间之前，运行类似于以下的脚本以确定表空间中是否存在任何对象： <br>`select owner,\
    \ segment_name, segment_type`<br>`from dba_segments`<br>`where tablespace_name=upper('&&tbsp_name');`\
    \ | 这样做可确保在删除表空间之前其中不存在任何表或索引。 |\n| 考虑在删除表空间之前重命名其中的表。 | 如果任何应用程序正在使用要删除的表空间内的表，则在所需表被重命名时，应用程序会抛出错误。\
    \ |\n| 如果表空间中没有对象，请将关联的数据文件大小调整为一个很小的数字，例如 10MB。 | 将数据文件大小减小到极小的空间可以快速显示是否有任何应用程序试图访问需要表空间空间的对象。\
    \ |\n| 在删除表空间之前备份数据库。 | 这确保您有一种方法可以在删除表空间后发现有对象正在使用时恢复它们。 |\n| 在删除表空间之前将表空间和数据文件脱机。使用\
    \ `ALTER TABLESPACE` 语句将表空间脱机。 | 这有助于确定是否有任何应用程序或用户正在使用表空间中的对象。如果表空间和数据文件脱机，他们将无法访问这些对象。\
    \ |\n| 当您确定表空间未在使用时，使用 `DROP TABLESPACE ... INCLUDING CONTENTS AND DATAFILES`\
    \ 语句。 | 这会删除表空间并物理删除与该表空间关联的任何数据文件。一些 DBA 不喜欢这种方法，但如果您采取了必要的预防措施，应该没问题。 |\n\n\
    ## 使用 Oracle 托管文件\n\nOracle 托管文件 (OMF) 功能自动化了表空间管理的许多方面，例如文件放置、命名和大小调整。您通过设置以下初始化参数来控制\
    \ OMF：\n\n- `DB_CREATE_FILE_DEST`\n- `DB_CREATE_ONLINE_LOG_DEST_N`\n- `DB_RECOVERY_FILE_DEST`\n\
    \n如果您在创建数据库之前设置这些参数，Oracle 将使用它们来放置数据文件、控制文件和联机重做日志。您也可以在数据库创建后启用 OMF。Oracle 将初始化参数的值用于任何新添加的数据文件和联机重做日志文件的位置。Oracle\
    \ 还确定新添加文件的名称。\n\n使用 OMF 的优点是简化了表空间的创建。例如，`CREATE TABLESPACE` 语句只需要指定表空间名称。首先，通过设置\
    \ `DB_CREATE_FILE_DEST` 参数启用 OMF 功能：\n\n```sql\nSQL> alter system set db_create_file_dest='/ora01/OMF';\n\
    ```\n\n现在，发出 `CREATE TABLESPACE` 语句：\n\n```sql\nSQL> create tablespace inv1;\n\
    ```\n\n此语句创建一个名为 `INV1` 的表空间，默认数据文件大小为 100MB。您可以通过指定大小来覆盖默认值：\n\n```sql\nSQL>\
    \ create tablespace inv2 datafile size 20m;\n```\n\nOMF 的一个限制是您仅限于一个目录来放置数据文件。如果要将数据文件添加到不同的目录，您可以动态更改位置：\n\
    \n```sql\nSQL> alter system set db_create_file_dest='/ora02/OMF';\n```\n\n尽管这个过程不是什么大事，但我发现不使用\
    \ OMF 更容易。我工作过的大多数环境都有许多分配给数据库使用的挂载点。您不希望每次需要将数据文件添加到不在 `DB_CREATE_FILE_DEST`\
    \ 当前定义中的目录时都修改初始化参数。更容易的方法是发出包含文件位置和存储参数的 `CREATE TABLESPACE` 或 `ALTER TABLESPACE`\
    \ 语句。向表空间管理语句提供目录名和文件名并不麻烦。\n\n## 创建大文件表空间\n\n大文件功能允许您创建一个可能分配了非常大的数据文件的表空间。\n\
    \n使用大文件功能的优点是可以创建非常大的文件。使用 8KB 块大小，您最多可以创建 32TB 的数据文件。使用 32KB 块大小，您最多可以创建 128TB\
    \ 的数据文件。\n\n使用 `BIGFILE` 子句创建大文件表空间：\n\n```sql\ncreate bigfile tablespace inv_big_data\n\
    datafile '/ora02/dbfile/O11R2/inv_big_data01.dbf'\nsize 10g\nextent management\
    \ local\nuniform size 128k\nsegment space management auto;\n```\n\n只要支持大文件表空间数据文件的文件系统有足够空间，您就可以在表空间中存储海量数据。\n\
    \n使用大文件表空间的一个潜在缺点是，如果由于任何原因支持大文件关联数据文件的文件系统空间不足，您将无法扩展表空间的大小（除非您可以向文件系统添加空间）。如果数据文件放置在单独的挂载点上，则无法向大文件表空间添加更多数据文件。大文件表空间只允许一个数据文件与之关联。\n\
    \n您可以使用 `ALTER DATABASE SET DEFAULT BIGFILE TABLESPACE` 语句将大文件表空间设置为数据库的默认表空间类型。但是，我不建议这样做。您可能会创建一个表空间，却不知道它是大文件表空间（因为您忘记了它是默认值，或者您是项目的新\
    \ DBA 没有意识到），并在挂载点上创建表空间。然后，当您发现需要更多空间时，您会不知道因为它是大文件约束而无法为此表空间在其他挂载点上添加另一个数据文件。\n\
    \n## 显示表空间大小\n\nDBA 通常使用监控脚本在需要增加表空间分配的空间时发出警报。以下脚本显示表空间和数据文件中剩余的空闲空间百分比：\n\n\
    ```sql\nSET PAGESIZE 100 LINES 132 ECHO OFF VERIFY OFF FEEDB OFF SPACE 1 TRIMSP\
    \ ON\nCOMPUTE SUM OF a_byt t_byt f_byt ON REPORT\nBREAK ON REPORT ON tablespace_name\
    \ ON pf\nCOL tablespace_name FOR A17 TRU HEAD 'Tablespace|Name'\nCOL file_name\
    \ FOR A40 TRU HEAD 'Filename'\nCOL a_byt FOR 9,990.999 HEAD 'Allocated|GB'\nCOL\
    \ t_byt FOR 9,990.999 HEAD 'Current|Used GB'\nCOL f_byt FOR 9,990.999 HEAD 'Current|Free\
    \ GB'\nCOL pct_free FOR 990.0 HEAD 'File %|Free'\nCOL pf FOR 990.0 HEAD 'Tbsp\
    \ %|Free'\nCOL seq NOPRINT\nDEFINE b_div=1073741824\n--\nSELECT 1 seq, b.tablespace_name,\
    \ nvl(x.fs,0)/y.ap*100 pf, b.file_name file_name, b.bytes/&&b_div a_byt, NVL((b.bytes-SUM(f.bytes))/&&b_div,b.bytes/&&b_div)\
    \ t_byt, NVL(SUM(f.bytes)/&&b_div,0) f_byt, NVL(SUM(f.bytes)/b.bytes*100,0) pct_free\n\
    FROM dba_free_space f, dba_data_files b\n    ,(SELECT y.tablespace_name, SUM(y.bytes)\
    \ fs\n      FROM dba_free_space y GROUP BY y.tablespace_name) x\n    ,(SELECT\
    \ x.tablespace_name, SUM(x.bytes) ap\n      FROM dba_data_files x GROUP BY x.tablespace_name)\
    \ y\nWHERE f.file_id(+) = b.file_id\nAND x.tablespace_name(+) = y.tablespace_name\n\
    and y.tablespace_name = b.tablespace_name\nAND f.tablespace_name(+) = b.tablespace_name\n\
    GROUP BY b.tablespace_name, nvl(x.fs,0)/y.ap*100, b.file_name, b.bytes\nUNION\n\
    SELECT 2 seq, tablespace_name,\n    j.bf/k.bb*100 pf, b.name file_name, b.bytes/&&b_div\
    \ a_byt,\n    a.bytes_used/&&b_div t_byt, a.bytes_free/&&b_div f_byt, a.bytes_free/b.bytes*100\
    \ pct_free\nFROM v$temp_space_header a, v$tempfile b\n    ,(SELECT SUM(bytes_free)\
    \ bf FROM v$temp_space_header) j\n    ,(SELECT SUM(bytes) bb FROM v$tempfile)\
    \ k\nWHERE a.file_id = b.file#\nORDER BY 1,2,4,3;\n```\n\n如果您没有任何监控措施，您将通过尝试执行插入或更新操作的\
    \ SQL 语句收到警报，该操作需要更多空间但无法分配更多空间。例如：\n\n```\nORA-01653: unable to extend table\
    \ INVENTORY by 128 in tablespace INV_IDX\n```\n\n在确定表空间需要更多空间后，您需要增加数据文件的大小或向表空间添加数据文件。这些主题将在下一节中讨论。\n\
    \n## 更改表空间大小\n\n当您确定要调整大小的数据文件后，首先确保数据文件所在的挂载点上有足够的磁盘空间来增加数据文件的大小：\n\n```bash\n\
    $ df -h | sort\n```\n\n使用 `ALTER DATABASE DATAFILE ... RESIZE` 命令增加数据文件的大小。此示例将数据文件大小调整为\
    \ 5GB：\n\n```sql\nSQL> alter database datafile '/ora01/oradata/INVREP/reg_data01.dbf'\
    \ resize 5g;\n```\n\n如果现有挂载点上没有空间来增加数据文件的大小，则必须添加数据文件。要向现有表空间添加数据文件，请使用 `ALTER\
    \ TABLESPACE ... ADD DATAFILE` 语句：\n\n```sql\nSQL> alter tablespace reg_data\n\
    add datafile '/ora01/dbfile/INVREP/reg_data02.dbf' size 100m;\n```\n\n如果您有大文件表空间，则不能使用\
    \ `ALTER DATABASE ... DATAFILE` 语句来更改表空间数据文件的大小。要调整大文件表空间关联的单个数据文件的大小，必须使用 `ALTER\
    \ TABLESPACE` 子句：\n\n```sql\nSQL> alter tablespace bigstuff resize 1T;\n```\n\n\
    在管理具有高事务负载的数据库时，调整数据文件大小可能是日常任务。\n\n增加现有数据文件的大小允许您向表空间添加空间而无需添加更多数据文件。如果包含现有数据文件的存储设备上没有足够的磁盘空间，您可以向现有表空间添加位于不同位置的数据文件。\n\
    \n如果要向临时表空间添加空间，首先查询 `V$TEMPFILE` 视图以验证临时数据文件的当前位置和大小：\n\n```sql\nSQL> select\
    \ name, bytes from v$tempfile;\n```\n\n接下来，使用 `ALTER DATABASE` 语句的 `TEMPFILE`\
    \ 选项：\n\n```sql\nSQL> alter database tempfile '/ora01/oradata/INVREP/temp01.dbf'\
    \ resize 500m;\n```\n\n您也可以通过 `ALTER TABLESPACE` 语句向临时表空间添加文件：\n\n```sql\nSQL>\
    \ alter tablespace temp add tempfile '/ora01/oradata/INVREP/temp02.dbf' size 5000m;\n\
    ```\n\n## 切换数据文件脱机和联机\n\n有时，在执行维护操作（例如重命名数据文件）时，您可能需要先将数据文件脱机。您可以使用 `ALTER TABLESPACE`\
    \ 或 `ALTER DATABASE DATAFILE` 语句来切换数据文件的脱机和联机状态。\n\n使用 `ALTER TABLESPACE ... OFFLINE\
    \ NORMAL` 语句将表空间及其关联的数据文件脱机。您不需要指定 `NORMAL`，因为它是默认值：\n\n```sql\nSQL> alter tablespace\
    \ users offline;\n```\n\n当您以正常模式将表空间脱机时，Oracle 会对与表空间关联的数据文件执行检查点。这确保与表空间关联的内存中所有已修改的块都被刷新并写入数据文件。当您将表空间及其关联的数据文件重新联机时，不需要执行介质恢复。\n\
    \n当数据库处于装载 (mount) 模式时，不能使用 `ALTER TABLESPACE` 语句将表空间脱机。如果您在数据库已装载（但未打开）时尝试将表空间脱机，您将收到以下错误：\n\
    \n```\nORA-01190: database not open\n```\n\n**注意：** 在装载模式下，必须使用 `ALTER DATABASE\
    \ DATAFILE` 语句将数据文件脱机。\n\n在将表空间脱机时，您也可以指定 `ALTER TABLESPACE ... OFFLINE TEMPORARY`。在这种情况下，Oracle\
    \ 会对与表空间关联的、处于联机状态的所有数据文件执行检查点。Oracle 不会对与表空间关联的处于脱机状态的数据文件执行检查点。\n\n在将表空间脱机时，您可以指定\
    \ `ALTER TABLESPACE ... OFFLINE IMMEDIATE`。在这种情况下，您的数据库必须处于归档日志模式。使用 `OFFLINE\
    \ IMMEDIATE` 时，Oracle 不会对数据文件执行检查点。在将其重新联机之前，您必须对表空间执行介质恢复。\n\n**注意：** 在数据库打开时，不能将\
    \ `SYSTEM` 或 `UNDO` 表空间脱机。\n\n您也可以使用 `ALTER DATABASE DATAFILE` 语句将数据文件脱机。如果您的数据库已打开供使用，那么它必须处于归档日志模式，才能使用\
    \ `ALTER DATABASE DATAFILE` 语句将数据文件脱机。如果您尝试使用 `ALTER DATABASE DATAFILE` 语句将数据文件脱机，而您的数据库不在归档日志模式下，您将收到以下错误：\n\
    \n```sql\nSQL> alter database datafile 6 offline;\nORA-01145: offline immediate\
    \ disallowed unless media recovery enabled\n```\n\n如果您的数据库不在归档日志模式下，在将数据文件脱机时必须指定\
    \ `ALTER DATABASE DATAFILE ... OFFLINE FOR DROP`。您可以指定完整的文件名或提供文件编号。在此示例中，数据文件\
    \ 6 被脱机：\n\n```sql\nSQL> alter database datafile 6 offline for drop;\n```\n\n\
    现在，如果您尝试将脱机的数据文件联机，您将收到以下错误：\n\n```sql\nSQL> alter database datafile 6 online;\n\
    ORA-0113: file 6 needs media recovery\n```\n\n当您使用 `OFFLINE FOR DROP` 子句时，不会对数据文件执行检查点。这意味着在将数据文件重新联机之前，您需要对其执行介质恢复。执行介质恢复将应用联机重做日志中记录的、数据文件本身没有的所有更改到数据文件。在可以将使用\
    \ `OFFLINE FOR DROP` 子句脱机的数据文件重新联机之前，您必须对其执行介质恢复。您可以指定完整的文件名或文件编号：\n\n```sql\n\
    SQL> recover datafile 6;\n```\n\n如果 Oracle 需要的重做信息包含在联机重做日志中，您应该看到此消息：\n\n```\n\
    Media recovery complete.\n```\n\n如果您的数据库不在归档日志模式下，并且如果 Oracle 需要未包含在联机重做日志中的重做信息来恢复数据文件，那么您将无法恢复该数据文件并将其重新联机。\n\
    \n如果您的数据库处于归档日志模式，您可以将其脱机而不使用 `FOR DROP` 子句。在这种情况下，Oracle 会忽略 `FOR DROP` 子句。即使您的数据库处于归档日志模式，对于使用\
    \ `ALTER DATABASE DATAFILE` 语句脱机的数据文件，您也需要执行介质恢复。表 4-3 总结了在表空间脱机时必须考虑的选项。\n\n\
    **注意：** 在数据库处于装载模式（且未打开）时，您可以使用 `ALTER DATABASE DATAFILE` 命令将任何数据文件脱机，包括 `SYSTEM`\
    \ 和 `UNDO`。\n\n***表 4-3.** 数据文件脱机选项*\n\n| 语句 | 是否需要归档日志模式？ | 联机时是否需要介质恢复？ | 在装载模式下是否有效？\
    \ |\n| :--- | :--- | :--- | :--- |\n| `ALTER TABLESPACE ... OFFLINE NORMAL` |\
    \ 否 | 否 | 否 |\n| `ALTER TABLESPACE ... OFFLINE TEMPORARY` | 否 | 可能：取决于是否有数据文件已处于脱机状态\
    \ | 否 |\n| `ALTER TABLESPACE ... OFFLINE IMMEDIATE` | 否 | 是 | 否 |\n| `ALTER DATABASE\
    \ DATAFILE ... OFFLINE` | 是 | 是 | 是 |\n| `ALTER DATABASE DATAFILE ... OFFLINE\
    \ FOR DROP` | 否 | 是 | 是 |\n\n## 重命名或重新定位数据文件\n\n您可能偶尔需要重命名数据文件。例如，由于存储设备的更改，或者因为文件以某种方式创建在错误的位置，您可能需要移动文件。\n\
    \n在重命名数据文件之前，必须将数据文件脱机。（请参阅上一节。）以下是重命名数据文件的步骤：\n\n1.  使用以下查询确定现有数据文件的名称：\n   \
    \ ```sql\n    SQL> select name from v$datafile;\n    ```\n2.  使用 `ALTER TABLESPACE`\
    \ 或 `ALTER DATABASE DATAFILE` 语句将数据文件脱机（有关如何执行此操作的详细信息，请参阅上一节）。您也可以关闭数据库，然后以装载模式启动；因为在此模式下数据文件未打开供使用，所以可以移动它们。\n\
    3.  使用操作系统命令（如 `mv` 或 `cp`）或内置的 `DBMS_FILE_TRANSFER` PL/SQL 包的 `COPY_FILE` 过程将数据文件物理移动到新位置。\n\
    4.  使用 `ALTER TABLESPACE ... RENAME DATAFILE ... TO` 语句或 `ALTER DATABASE RENAME\
    \ FILE ... TO` 语句使用新的数据文件名更新控制文件。\n5.  将数据文件联机。\n\n**注意：** 如果需要重命名与 `SYSTEM` 或\
    \ `UNDO` 表空间关联的数据文件，必须关闭数据库并以装载模式启动。当数据库处于装载模式时，您可以通过 `ALTER DATABASE RENAME FILE`\
    \ 语句重命名与 `SYSTEM` 或 `UNDO` 表空间关联的数据文件。\n\n以下示例演示如何移动与单个表空间关联的数据文件。\n\n首先，使用 `ALTER\
    \ TABLESPACE` 语句将数据文件脱机：\n\n```sql\nSQL> alter tablespace users offline;\n```\n\
    \n现在，在操作系统提示符下，使用 Linux/Unix `mv` 命令将两个数据文件移动到新位置：\n\n```bash\n$ mv /ora02/dbfile/O11R2/users01.dbf\
    \ /ora03/dbfile/O11R2/users01.dbf\n$ mv /ora02/dbfile/O11R2/users02.dbf /ora03/dbfile/O11R2/users02.dbf\n\
    ```\n\n使用 `ALTER TABLESPACE` 语句更新控制文件：\n\n```sql\nalter tablespace users\nrename\
    \ datafile\n'/ora02/dbfile/O11R2/users01.dbf',\n'/ora02/dbfile/O11R2/users02.dbf'\n\
    to\n'/ora03/dbfile/O11R2/users01.dbf',\n'/ora03/dbfile/O11R2/users02.dbf';\n```\n\
    \n最后，将表空间内的数据文件重新联机：\n\n```sql\nSQL> alter tablespace users online;\n```\n\n如果您想在一次操作中重命名多个表空间的数据文件，可以使用\
    \ `ALTER DATABASE RENAME FILE` 语句（而不是 `ALTER TABLESPACE...RENAME DATAFILE` 语句）。以下示例重命名数据库中的所有数据文件。由于\
    \ `SYSTEM` 和 `UNDO` 表空间的数据文件正在被移动，因此必须先将数据库脱机，然后将其置于装载模式：\n\n```sql\nSQL> conn\
    \ / as sysdba\nSQL> shutdown immediate;\nSQL> startup mount;\n```\n\n由于数据库处于装载模式，数据文件未打开供使用，因此无需将数据文件脱机。接下来，通过\
    \ Linux/Unix `mv` 命令物理移动文件：\n\n```bash\n$ mv /ora01/dbfile/O11R2/system01.dbf\
    \ /ora02/dbfile/O11R2/system01.dbf\n$ mv /ora01/dbfile/O11R2/sysaux01.dbf /ora02/dbfile/O11R2/sysaux01.dbf\n\
    $ mv /ora01/dbfile/O11R2/undotbs01.dbf /ora02/dbfile/O11R2/undotbs01.dbf\n$ mv\
    \ /ora01/dbfile/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf\n$ mv /ora01/dbfile/O11R2/toos01.dbf\
    \ /ora02/dbfile/O11R2/toos01.dbf\n$ mv /ora01/dbfile/O11R2/users02.dbf /ora02/dbfile/O11R2/users02.dbf\n\
    ```\n\n**注意：** 必须在更新控制文件之前移动文件。`ALTER DATABASE RENAME FILE` 命令期望文件位于重命名后的位置。如果文件不在那里，会抛出错误：`ORA-27037:\
    \ unable to obtain file status`。\n\n现在您可以更新控制文件以识别新的文件名：\n\n```sql\nalter database\
    \ rename file\n'/ora01/dbfile/O11R2/system01.dbf',\n'/ora01/dbfile/O11R2/sysaux01.dbf',\n\
    '/ora01/dbfile/O11R2/undotbs01.dbf',\n'/ora01/dbfile/O11R2/users01.dbf',\n'/ora01/dbfile/O11R2/toos01.dbf',\n\
    '/ora01/dbfile/O11R2/users02.dbf'\nto\n'/ora02/dbfile/O11R2/system01.dbf',\n'/ora02/dbfile/O11R2/sysaux01.dbf',\n\
    '/ora02/dbfile/O11R2/undotbs01.dbf',\n'/ora02/dbfile/O11R2/users01.dbf',\n'/ora02/dbfile/O11R2/toos01.dbf',\n\
    '/ora02/dbfile/O11R2/users02.dbf';\n```\n\n您应该能够打开数据库：\n\n```sql\nSQL> alter database\
    \ open;\n```\n\n重新定位数据库中所有数据文件的另一种方法是使用 `CREATE CONTROLFILE` 语句重新创建控制文件。此操作的步骤如下：\n\
    1.  创建包含 `CREATE CONTROLFILE` 语句的跟踪文件。\n2.  找到包含 `CREATE CONTROLFILE` 语句的跟踪文件。\n\
    3.  修改跟踪文件以显示数据文件的新位置。\n4.  关闭数据库。\n5.  使用操作系统命令物理移动数据文件。\n6.  在未装载模式下启动数据库。\n\
    7.  运行 `CREATE CONTROLFILE` 命令。\n\n**注意：** 重新创建控制文件时，请注意控制文件中包含的任何 Oracle 恢复管理器\
    \ (RMAN) 信息将会丢失。如果您不使用恢复目录，可以使用 `RMAN CATALOG` 命令用 RMAN 备份信息重新填充控制文件。\n\n以下示例将逐步完成前面的步骤。首先，通过\
    \ `ALTER DATABASE BACKUP CONTROLFILE TO TRACE` 语句将 `CREATE CONTROLFILE` 语句写入跟踪文件：\n\
    \n```sql\nSQL> alter database backup controlfile to trace noresetlogs;\n```\n\n\
    此语句使用 `NORESETLOGS` 子句。它指示 Oracle 仅将一个 SQL 语句写入跟踪文件。如果您未指定 `NORESETLOGS`，Oracle\
    \ 会将两个 SQL 语句写入跟踪文件：一个使用 `NORESETLOGS` 选项重新创建控制文件，另一个使用 `RESETLOGS` 重新创建控制文件。通常，您知道在重新创建控制文件时是否要重置联机重做日志。在这种情况下，您知道在重新创建控制文件时不需要重置联机重做日志（因为联机重做日志未损坏并且仍处于数据库的正常位置）。\n\
    \n现在，找到包含数据库跟踪文件的目录：\n\n```sql\nSQL> show parameter background_dump_dest\n```\n\
    \n对于此示例，目录是 `/ora01/app/oracle/diag/rdbms/o11r2/O11R2/trace`\n\n接下来，在操作系统上导航到跟踪目录：\n\
    \n```bash\n$ cd /ora01/app/oracle/diag/rdbms/o11r2/O11R2/trace\n```\n\n查找最后生成的跟踪文件（或在运行\
    \ `ALTER DATABASE` 语句时生成的跟踪文件）。在此示例中，跟踪文件是 `O11R2_ora_17017.trc`。\n\n复制跟踪文件，并用操作系统编辑器打开副本：\n\
    \n```bash\n$ cp O11R2_ora_17017.trc mv.sql\n```\n\n编辑 `mv.sql` 文件。在此示例中，跟踪文件只包含一个\
    \ SQL 语句（因为在创建跟踪文件时我指定了 `NORESTLOGS`）。如果您未指定 `NORESETLOGS`，跟踪文件包含两个 `CREATE CONTROLFILE`\
    \ 语句，您必须修改跟踪文件以删除包含 `RESETLOGS` 的语句。\n\n接下来，将数据文件的名称修改为您要移动数据文件的新位置。\n\n以下是此示例的\
    \ `CREATE CONTROLFILE` 语句：\n\n```sql\nCREATE CONTROLFILE REUSE DATABASE \"O11R2\"\
    \ NORESETLOGS ARCHIVELOG\nMAXLOGFILES 16\nMAXLOGMEMBERS 4\nMAXDATAFILES 1024\n\
    MAXINSTANCES 1\nMAXLOGHISTORY 876\nLOGFILE\nGROUP 1 (\n  '/ora02/oraredo/O11R2/redo01a.rdo',\n\
    \  '/ora03/oraredo/O11R2/redo01b.rdo'\n) SIZE 100M BLOCKSIZE 512,\nGROUP 2 (\n\
    \  '/ora02/oraredo/O11R2/redo02a.rdo',\n  '/ora03/oraredo/O11R2/redo02b.rdo'\n\
    ) SIZE 100M BLOCKSIZE 512,\nGROUP 3 (\n  '/ora02/oraredo/O11R2/redo03a.rdo',\n\
    \  '/ora03/oraredo/O11R2/redo03b.rdo'\n) SIZE 100M BLOCKSIZE 512\nDATAFILE\n'/ora02/dbfile/O11R2/system01.dbf',\n\
    '/ora02/dbfile/O11R2/sysaux01.dbf',\n'/ora02/dbfile/O11R2/undotbs01.dbf',\n```\n\
    \n![](img/index-123_1.png)\n\n## 总结\n\n本章讨论了管理表空间和数据文件。表空间是一组数据文件的逻辑容器。数据文件是磁盘上包含数据的物理文件。在创建表空间和相应的数据文件时应仔细规划。\n\
    \n表空间允许您将一个应用程序的数据与另一个应用程序的数据分开。您还可以将表与索引分开。这允许您为每个应用程序自定义表空间的存储特性。此外，表空间提供了一种更好地管理具有不同可用性、备份和恢复要求的应用程序的方法。作为\
    \ DBA，您必须精通管理表空间和数据文件。在任何类型的环境中，您都必须添加、重命名、重新定位和删除这些存储容器。\n\nOracle 需要三种文件来运行数据库：数据文件、控制文件和联机重做日志文件。本书的下一章重点介绍控制文件和联机重做日志文件管理。\n\
    \n![](img/index-125_1.png)\n\n# 第 5 章 ■ 管理控制文件和联机重做日志\n\n## 可移除的恢复文件\n\n## 数据文件\n\
    \n您可以通过 `V$DATABASE` 视图查看存储在控制文件中的数据库信息：\n\n```sql\nSQL> select name, open_mode,\
    \ created, current_scn from v$database;\n```\n\n此示例的输出如下：\n\n```\nNAME      OPEN_MODE\
    \      CREATED      CURRENT_SCN\n--------- -------------- ------------ -----------\n\
    ORC11G    READ WRITE     01-JAN-10    5077636\n```\n\n每个 Oracle 数据库必须至少有一个控制文件。当您在未装载\
    \ (nomount) 模式下启动数据库时，实例通过 `CONTROL_FILES` 参数知道控制文件的位置：\n\n```sql\n-- 控制文件的位置对实例是已知的\n\
    SQL> startup nomount;\n```\n\n此时，任何进程都还未接触控制文件。当您将数据库更改为装载 (mount) 模式时，控制文件被读取并打开供使用：\n\
    \n```sql\n-- 控制文件已打开\nSQL> alter database mount;\n```\n\n如果 `CONTROL_FILES` 初始化参数中列出的任何控制文件不可用，那么您将无法装载数据库。\n\
    \n当您成功装载数据库后，实例知道数据文件和联机重做日志的位置，但尚未打开它们。在您将数据库更改为打开 (open) 模式后，数据文件和联机重做日志将被打开：\n\
    \n```sql\n-- 数据文件和联机重做日志已打开\nSQL> alter database open;\n```\n\n控制文件是在创建数据库时创建的。如第\
    \ 2 章所述，创建数据库时应至少创建两个控制文件（以避免单点故障）。如果可能，您应该将多个控制文件存储在由独立控制器控制的独立存储设备上。\n\nOracle\
    \ 写入 `CONTROL_FILES` 初始化参数指定的所有控制文件。如果 Oracle 无法写入其中一个控制文件，则会抛出错误：\n\n```\nORA-00210:\
    \ cannot open the specified control file\n```\n\n如果您的某个控制文件变得不可用，请在重新启动之前关闭数据库并解决问题。修复问题可能意味着解决存储设备故障，或者修改\
    \ `CONTROL_FILES` 初始化参数以删除不可用控制文件的条目。\n\n![](img/index-127_1.png)\n\n如果您使用的是基于文本的初始化文件，您可以直接使用操作系统编辑器查看该文件，或者使用\
    \ `grep` 命令：\n\n```bash\n$ grep -i control_files $ORACLE_HOME/dbs/initO11.ora\n\
    ```\n\n## 添加控制文件\n\n*添加控制文件* 意味着复制现有的控制文件，并通过修改您的 `CONTROL_FILES` 参数使您的数据库知道该副本。此任务必须在数据库关闭时完成。\n\
    \n此过程仅在您有一个可以复制的良好现有控制文件时才有效。添加控制文件与创建或恢复控制文件不同。\n\n如果您的数据库仅使用一个控制文件，并且该控制文件损坏，您需要从备份中恢复控制文件（如果有）并执行恢复，或者重新创建损坏的控制文件。如果您使用两个或多个控制文件，并且其中一个损坏，您可以使用剩余的良好控制文件快速使数据库进入可操作状态。\n\
    \n如果数据库仅使用一个控制文件，添加控制文件的基本过程如下：\n1.  更改初始化文件的 `CONTROL_FILES` 参数以包含控制文件的新位置和名称。\n\
    2.  关闭数据库。\n3.  使用操作系统命令将现有控制文件复制到新位置和名称。\n4.  重新启动数据库。\n\n根据您使用的是 spfile 还是 init.ora\
    \ 文件，前面的步骤略有不同。接下来的两个小节详细介绍了这些不同的场景。\n\n### Spfile 场景\n\n如果您的数据库已打开，您可以使用以下 SQL\
    \ 语句快速确定是否正在使用 spfile：\n\n```sql\nSQL> show parameter spfile\n```\n\n以下是一些示例输出：\n\
    \n```\nNAME                                 TYPE        VALUE\n------------------------------------\
    \ ----------- ------------------------------\nspfile                         \
    \      string      /oracle/app/oracle/product/11.\n                          \
    \                       2.0/db_1/dbs/spfileO11R2.ora\n```\n\n当您确定正在使用 spfile 时，请使用以下步骤添加控制文件：\n\
    1.  确定 `CONTROL_FILES` 参数的当前值：\n\n    ```sql\n    SQL> show parameter control_files\n\
    \    ```\n\n    输出显示此数据库仅使用一个控制文件：\n\n    ```\n    NAME                      \
    \           TYPE        VALUE\n    ------------------------------------ -----------\
    \ ------------------------------\n    control_files                        string\
    \      /ora01/dbfile/O11R2/control01.ctl\n    ```\n2.  更改您的 `CONTROL_FILES` 参数以包含您想要添加的新控制文件，但将操作范围限制为\
    \ spfile（您无法在内存中修改此参数）。确保您也包含步骤 1 中列出的任何控制文件：\n\n    ```sql\n    SQL> alter system\
    \ set control_files='/ora01/dbfile/O11R2/control01.ctl',\n      '/ora01/dbfile/O11R2/control02.ctl'\
    \ scope=spfile;\n    ```\n3.  关闭数据库：\n\n    ```sql\n    SQL> shutdown immediate;\n\
    \    ```\n4.  将现有控制文件复制到新位置和名称。在此示例中，通过操作系统 `cp` 命令创建名为 `control02.ctl` 的新控制文件：\n\
    \n    ```bash\n    $ cp /ora01/dbfile/O11R2/control01.ctl /ora01/dbfile/O11R2/control02.ctl\n\
    \    ```\n5.  启动数据库：\n\n    ```sql\n    SQL> startup;\n    ```\n\n您可以通过显示 `CONTROL_FILES`\
    \ 参数来验证是否正在使用新的控制文件：\n\n```sql\nSQL> show parameter control_files\n```\n\n此示例的输出如下：\n\
    \n```\nNAME                                 TYPE        VALUE\n------------------------------------\
    \ ----------- ------------------------------\ncontrol_files                  \
    \      string      /ora01/dbfile/O11R2/control01.ctl,\n                      \
    \                           /ora01/dbfile/O11R2/control02.ctl\n```\n\n### Init.ora\
    \ 场景\n\n运行以下语句以验证您是否正在使用 init.ora 文件。如果您未使用 spfile，`VALUE` 列为空：\n\n```sql\nSQL>\
    \ show parameter spfile\nNAME                                 TYPE        VALUE\n\
    ------------------------------------ ----------- ------------------------------\n\
    spfile                               string\n```\n\n要在使用文本 init.ora 文件时添加控制文件，请执行以下步骤：\n\
    1.  关闭数据库：\n\n    ```sql\n    SQL> shutdown immediate;\n    ```\n2.  使用操作系统实用程序（如\
    \ vi）编辑您的 init.ora 文件，并将新的控制文件位置和名称添加到 `CONTROL_FILES` 参数中。此示例使用 vi 打开 init.ora\
    \ 文件，并将 `control02.ctl` 添加到 `CONTROL_FILES` 参数：\n\n    ```bash\n    $ vi $ORACLE_HOME/dbs/initO11R2.ora\n\
    \    ```\n\n    以下是在添加 `control02.ctl` 后的 `CONTROL_FILES` 参数：\n\n    ```\n   \
    \ control_files='/ora01/dbfile/O11R2/control01.ctl',\n                  '/ora01/dbfile/O11R2/control02.ctl'\n\
    \    ```\n3.  从操作系统，将现有控制文件复制到要添加的控制文件的位置和名称：\n\n    ```bash\n    $ cp /ora01/dbfile/O11R2/control01.ctl\
    \ /ora01/dbfile/O11R2/control02.ctl\n    ```\n4.  启动数据库：\n\n    ```sql\n    SQL>\
    \ startup;\n    ```\n\n您可以通过显示 `CONTROL_FILES` 参数来查看正在使用的控制文件：\n\n```sql\nSQL>\
    \ show parameter control_files\n```\n\n对于此示例，输出如下：\n\n```\nNAME              \
    \                   TYPE        VALUE\n------------------------------------ -----------\
    \ ------------------------------\ncontrol_files                        string\
    \      /ora01/dbfile/O11R2/control01.ctl,\n                                  \
    \               /ora01/dbfile/O11R2/control02.ctl\n```\n\n**注意：** 有关从跟踪文件重新创建控制文件的示例，请参见第\
    \ 4 章。\n\n## 移动控制文件\n\n您可能偶尔需要将控制文件从一个位置移动到另一个位置。例如，如果向数据库服务器添加了新存储，您可能希望将现有控制文件移动到新可用的位置。\n\
    \n移动控制文件的过程与添加控制文件非常相似。唯一的区别是您重命名控制文件而不是复制它。此示例显示在使用 spfile 时如何移动控制文件：\n\n1. \
    \ 确定 `CONTROL_FILES` 参数的当前值：\n\n    ```sql\n    SQL> show parameter control_files\n\
    \    ```\n\n    输出显示此数据库仅使用一个控制文件：\n\n    ```\n    NAME                      \
    \           TYPE        VALUE\n    ------------------------------------ -----------\
    \ ------------------------------\n    control_files                        string\
    \      /ora01/dbfile/O11R2/control01.ctl\n    ```\n2.  更改您的 `CONTROL_FILES` 参数以反映您正在移动控制文件。在此示例中，控制文件当前位于此位置：`/ora01/dbfile/O11R2/control01.ctl`\
    \ 您要将控制文件移动到此位置：`/ora02/dbfile/O11R2/control01.ctl` 更改 spfile 以反映控制文件的新位置。您必须指定\
    \ `SCOPE=SPFILE`，因为 `CONTROL_FILES` 参数无法在内存中修改：\n\n    ```sql\n    SQL> alter\
    \ system set\n      control_files='/ora02/dbfile/O11R2/control01.ctl' scope=spfile;\n\
    \    ```\n3.  关闭数据库：\n\n    ```sql\n    SQL> shutdown immediate;\n    ```\n4.\
    \  在操作系统提示符下，将控制文件移动到新位置。此示例使用操作系统 `mv` 命令：\n\n    ```bash\n    $ mv /ora01/dbfile/O11R2/control01.ctl\
    \ /ora02/dbfile/O11R2/control01.ctl\n    ```\n5.  启动数据库：\n\n    ```sql\n    SQL>\
    \ startup;\n    ```\n\n您可以通过显示 `CONTROL_FILES` 参数来验证是否正在使用新的控制文件：\n\n```sql\n\
    SQL> show parameter control_files\n```\n\n此示例的输出如下：\n\n```\nNAME             \
    \                    TYPE        VALUE\n------------------------------------ -----------\
    \ ---------------------------------\ncontrol_files                        string\
    \      /ora02/dbfile/O11R2/control01.ctl\n```\n\n## 删除控制文件\n\n您可能会遇到一种情况：包含您一个多路复用的控制文件的存储设备发生介质故障：\n\
    \n```\nORA-00205: error in identifying control file, check alert log for more\
    \ info\n```\n\n在此场景中，您仍然至少有一个良好的控制文件。要删除控制文件，请按照以下步骤操作。\n\n1.  通过检查 alert.log\
    \ 文件中的信息来识别发生介质故障的控制文件：\n\n    ```\n    ORA-00202: control file: '/ora01/dbfile/O11R2/control02.ctl'\n\
    \    ORA-27037: unable to obtain file status\n    ```\n2.  从 `CONTROL_FILES` 参数中删除不可用的控制文件名。如果您使用的是\
    \ init.ora 文件，请直接使用操作系统编辑器（如 vi）修改该文件。如果您使用的是 spfile，请使用 `ALTER SYSTEM` 语句修改 `CONTROL_FILES`\
    \ 参数。在此 spfile 示例中，`control02.ctl` 控制文件从 `CONTROL_FILES` 参数中删除：\n\n    ```sql\n\
    \    SQL> alter system set control_files='/ora01/dbfile/O11R2/control01.ctl'\n\
    \      scope=spfile;\n    ```\n\n    在此示例中，此数据库现在仅关联一个控制文件。\n\n    您绝不应只使用一个控制文件运行生产数据库。请参阅“添加控制文件”部分以向数据库添加更多控制文件。\n\
    3.  停止并启动数据库：\n\n    ```sql\n    SQL> shutdown immediate;\n    SQL> startup;\n\
    \    ```\n\n![](img/index-132_1.png)\n\n![](img/index-133_1.png)\n\n当前联机重做日志文件的内容在发生日志切换之前不会被归档。这意味着如果您丢失了当前联机重做日志文件的所有成员，您将丢失事务。以下是您可以实施的几种机制，以最小化联机重做日志文件故障的可能性：\n\
    \n- 多路复用日志组，使其拥有多个成员。\n- 绝不允许同一组的两个成员共享同一个控制器。\n- 绝不要将同一组的两个成员放在同一物理磁盘上。\n- 确保操作系统文件权限设置正确。\n\
    - 使用冗余的物理存储设备（即 RAID）。\n- 适当调整日志文件大小，使其以规则的间隔切换和归档。\n- 设置 `ARCHIVE_LAG_TARGET`\
    \ 初始化参数，以确保联机重做日志以规则的间隔切换。\n\n**注意：** Oracle 提供的唯一可以保护您并在您丢失当前联机重做日志组的所有成员时保留所有已提交事务的工具是\
    \ Oracle Data Guard 在最大保护模式下实现。有关详细信息，请参阅 Oracle 技术网络 (OTN) 网站上的 Data Guard Concepts\
    \ and Administration 指南。\n\n联机重做日志文件永远不会被 RMAN 备份或用户管理的热备份备份。如果您确实备份了联机重做日志文件，那么还原它们将是毫无意义的。联机重做日志文件包含数据库生成的最新重做信息。您不会希望从备份中用旧的重做信息覆盖它们。对于处于归档日志模式的数据库，联机重做日志文件包含执行完全恢复所需的最新生成的事务。\n\
    \n## 显示联机重做日志信息\n\n使用 `V$LOG` 和 `V$LOGFILE` 视图显示有关联机重做日志组及相应成员的信息：\n\n```sql\n\
    select a.group#,a.member,b.status,b.archived,bytes/1024/1024 mbytes\nfrom   v$logfile\
    \ a, v$log b\nwhere  a.group# = b.group#\norder by 1,2;\n```\n\n以下是一些示例输出：\n\n\
    ```\nGROUP# MEMBER                               STATUS    ARCHIVED      MBYTES\n\
    ------ ----------------------------------- --------- -------- ----------\n1  \
    \    /ora01/oraredo/O11R2/redo01a.rdo    INACTIVE  YES             100\n1    \
    \  /ora02/oraredo/O11R2/redo01b.rdo    INACTIVE  YES             100\n2      /ora01/oraredo/O11R2/redo02a.rdo\
    \    CURRENT   NO              100\n2      /ora02/oraredo/O11R2/redo02b.rdo  \
    \  CURRENT   NO              100\n```\n\n在诊断联机重做日志问题时，`V$LOG` 和 `V$LOGFILE` 视图特别有用。您可以在数据库已装载或打开时查询这些视图。表\
    \ 5-1 简要描述了每个视图。\n\n***表 5-1.** 与联机重做日志相关的有用视图*\n\n| 视图 | 描述 |\n| :--- | :---\
    \ |\n| `V$LOG` | 显示存储在控制文件中的联机重做日志组信息 |\n| `V$LOGFILE` | 显示联机重做日志文件成员信息 |\n\n\
    `V$LOG` 视图的 `STATUS` 列在处理联机重做日志组时特别有用。表 5-2 描述了 `V$LOG` 视图中每种状态的含义。\n\n***表 5-2.**\
    \ V$LOG 视图中联机重做日志组的状态*\n\n| 状态 | 含义 |\n| :--- | :--- |\n| `CURRENT` | 日志组当前正在被日志写入器写入。\
    \ |\n| `ACTIVE` | 该日志组对于崩溃恢复是必需的，并且可能已归档也可能未归档。 |\n| `CLEARING` | 该日志组正在被 `ALTER\
    \ DATABASE CLEAR LOGFILE` 命令清除。 |\n| `CLEARING_CURRENT` | 当前日志组正在清除一个已关闭的线程。 |\n\
    | `INACTIVE` | 该日志组对于崩溃恢复不是必需的，并且可能已归档也可能未归档。 |\n| `UNUSED` | 该日志组从未被写入；它是最近创建的。\
    \ |\n\n`V$LOGFILE` 视图的 `STATUS` 列也包含有用的信息。此视图包含日志组的每个物理联机重做日志文件成员的信息。表 5-3 提供了每个日志文件成员的状态描述。\n\
    \n***表 5-3.** V$LOGFILE 视图中联机重做日志文件成员的状态*\n\n| 状态 | 含义 |\n| :--- | :--- |\n| `INVALID`\
    \ | 日志文件成员不可访问或最近已创建。 |\n| `DELETED` | 日志文件成员不再使用。 |\n| `STALE` | 日志文件成员的内容不完整。\
    \ |\n| `NULL` | 日志文件成员正被数据库使用。 |\n\n区分 `V$LOG` 中的 `STATUS` 列和 `V$LOGFILE` 中的 `STATUS`\
    \ 列非常重要。`V$LOG` 中的 `STATUS` 列反映日志组的状态。`V$LOGFILE` 中的 `STATUS` 列报告物理联机重做日志文件成员的状态。在诊断联机重做日志问题时，请参考这些表格。\n\
    \n## 确定联机重做日志组的最佳大小\n\n尝试调整联机重做日志的大小，使其每小时切换两到六次。`V$LOG_HISTORY` 包含联机重做日志切换频率的历史记录。执行此查询以查看每小时的日志切换次数：\n\
    \n```sql\nselect count(*)\n       ,to_char(first_time,'YYYY:MM:DD:HH24')\nfrom\
    \   v$log_history\ngroup by to_char(first_time,'YYYY:MM:DD:HH24')\norder by 2;\n\
    ```\n\n以下是输出的片段：\n\n```\nCOUNT(*) TO_CHAR(FIRST\n---------- -------------\n  \
    \       1 2010:03:23:20\n         2 2010:03:23:22\n        19 2010:03:23:23\n\
    \        17 2010:03:24:00\n        25 2010:03:24:01\n        35 2010:03:24:02\n\
    \        23 2010:03:24:03\n         5 2010:03:24:04\n        11 2010:03:24:05\n\
    \         2 2010:03:24:06\n```\n\n从前面的输出中，您可以看到在 3 月 24 日午夜到凌晨 3:00 左右生成了大量重做。这可能是由于夜间批处理作业或不同时区的用户更新数据造成的。对于此数据库，应增加联机重做日志的大小。您应该尝试调整联机重做日志的大小以适应数据库的峰值事务负载。\n\
    \n`V$LOG_HISTORY` 从控制文件派生其数据。每次发生日志切换时，都会在此视图中记录一个条目，详细记录诸如切换时间和系统更改号 (SCN) 等信息。如前所述，一个经验法则是，您应该调整联机重做日志文件的大小，使其每小时大约切换两到六次。您不希望它们切换得太频繁，因为日志切换有开销。Oracle\
    \ 在日志切换期间会启动检查点。\n\n在检查点期间，数据库写入器后台进程将已修改（也称为*脏*）的块写入磁盘，这是资源密集型的。\n\n另一方面，您不希望联机重做日志文件永不切换，因为当前联机重做日志包含您可能在恢复时需要的事务。如果灾难导致当前联机重做日志发生介质故障，您可能会丢失那些尚未归档的事务。\n\
    \n**提示：** 使用 `ARCHIVE_LAG_TARGET` 初始化参数设置日志切换之间的最大时间量（以秒为单位）。此参数的典型设置是 1800 秒（30\
    \ 分钟）。值为 0（默认值）会禁用此功能。此参数通常用于 Oracle Data Guard 环境中，以在指定时间过后强制进行日志切换。\n\n您也可以查询\
    \ `V$INSTANCE_RECOVERY` 视图中的 `OPTIMAL_LOGFILE_SIZE` 列，以确定您的联机重做日志文件大小是否正确：\n\n\
    ```sql\nSQL> select optimal_logfile_size from v$instance_recovery;\n```\n\n以下是一些示例输出：\n\
    \n```\nOPTIMAL_LOGFILE_SIZE\n--------------------\n                 500\n```\n\
    \n这报告了基于 `FAST_START_MTTR_TARGET` 初始化参数设置被认为是最佳的重做日志文件大小（以兆字节为单位）。Oracle 建议您将所有联机重做日志配置为至少为\
    \ `OPTIMAL_LOGFILE_SIZE` 的值。但是，在调整联机重做日志大小时，您必须考虑环境信息（例如切换的频率）。\n\n## 确定联机重做日志组的最佳数量\n\
    \nOracle 至少需要两个重做日志组才能运行。但仅有两个组有时是不够的。要理解为什么两个组可能不够，请记住每次日志切换都会启动一个检查点。作为检查点的一部分，数据库写入器将系统全局区\
    \ (SGA) 中所有已修改（脏）的块写入磁盘上的数据文件。另外，请记住联机重做日志是以循环方式写入的，最终给定日志中的信息将被覆盖。在日志写入器可以开始覆盖联机重做日志中的信息之前，与该重做日志关联的\
    \ SGA 中所有已修改的块必须首先写入数据文件。如果所有已修改的块尚未写入数据文件，您将在 alert.log 文件中看到此消息：\n\n```\nThread\
    \ 1 cannot allocate new log, sequence <sequence number>\nCheckpoint not complete\n\
    ```\n\n解释此问题的另一种方式是，Oracle 需要在联机重做日志中存储执行崩溃恢复所需的任何信息。为了帮助可视化这一点，请参见图 5-2。\n\n\
    ![](img/index-138_1.png)\n\n如果添加更多重做日志组无法解决问题，您应仔细考虑降低 `FAST_START_MTTR_TARGET`\
    \ 的值。当您降低此值时，您可能会看到更多的 I/O，因为数据库写入器进程更积极地将已修改的块写入数据文件。理想情况下，在将此更改应用到生产环境之前，在测试环境中验证修改\
    \ `FAST_START_MTTR_TARGET` 的影响会很好。您可以在实例启动时修改此参数；这意味着如果有不可预见的副作用，您可以快速将其修改回原始设置。\n\
    \n最后，考虑增加 `DB_WRITER_PROCESSES` 参数的值。在将此参数应用到生产环境之前，请在测试环境中仔细分析修改此参数的影响。此值要求您停止并启动数据库；因此，如果有不利影响，则需要停机时间才能将此值设置回原始设置。\n\
    \n## 添加联机重做日志组\n\n如果确定需要添加联机重做日志组，请使用 `ADD LOGFILE GROUP` 语句。在此示例中，数据库已包含四个大小为\
    \ 500M 的联机重做日志组。添加一个具有两个成员且大小为 500MB 的额外日志组：\n\n```sql\nalter database add logfile\
    \ group 5\n('/ora01/oraredo/O11R2/redo05a.rdo',\n '/ora02/oraredo/O11R2/redo05b.rdo')\
    \ SIZE 500M;\n```\n\n在这种情况下，我强烈建议您添加的日志组与现有的联机重做日志具有相同的大小和相同数量的成员。如果新添加的组与现有组不具有相同的物理特性，则更难准确确定与联机重做日志组相关的性能问题。\n\
    \n例如，如果您有两个大小为 20MB 的日志组，并且添加一个大小为 200MB 的新日志组，这很可能会产生前一节描述的 `Checkpoint not complete`\
    \ 问题。这是因为刷新受 200MB 日志文件中重做保护的 SGA 中所有已修改的块可能比刷新受 20MB 重做日志文件保护的已修改块花费更长的时间。\n\n\
    ## 调整联机重做日志组的大小\n\n您可能需要更改联机重做日志的大小（另请参阅本章前面的“确定联机重做日志组的最佳大小”部分）。您不能直接修改现有联机重做日志的大小（就像对数据文件那样）。要调整联机重做日志的大小，您必须首先添加包含所需大小的联机重做日志组，然后删除旧大小的联机重做日志。\n\
    \n假设您希望将联机重做日志大小调整为每个 200MB。首先，使用 `ADD LOGFILE GROUP` 语句添加大小为 200MB 的新组。以下示例添加日志组\
    \ 4，其中包含两个大小为 200MB 的成员：\n\n```sql\nalter database add logfile group 4\n('/ora02/oraredo/O11R2/redo04a.rdo',\n\
    \ '/ora03/oraredo/O11R2/redo04b.rdo') SIZE 200M;\n```\n\n**注意：** 您可以以字节、千字节或兆字节为单位指定日志文件的大小。\n\
    \n在添加了具有新大小的日志文件之后，您可以删除旧的联机重做日志。日志组必须具有 `INACTIVE` 状态，然后您才能删除它。您可以按如下方式检查日志组的状态：\n\
    \n```sql\nSQL> select group#, status, archived, thread#, sequence# from v$log;\n\
    ```\n\n您可以使用 `ALTER DATABASE DROP LOGFILE GROUP` 语句删除不活动的日志组：\n\n```sql\nSQL>\
    \ alter database drop logfile group <group #>;\n```\n\n如果您尝试删除当前联机日志组，Oracle 会返回\
    \ `ORA-01623` 错误，指出您无法删除当前组。使用 `ALTER SYSTEM SWITCH LOGFILE` 语句切换日志并使下一个组成为当前组：\n\
    \n```sql\nSQL> alter system switch logfile;\n```\n\n日志切换后，先前的当前组只要包含 Oracle 执行崩溃恢复所需的重做，就会保留活动状态。如果您尝试删除具有活动状态的日志组，Oracle\
    \ 会抛出 `ORA-01624` 错误，指出该日志组是崩溃恢复所必需的。发出 `ALTER SYSTEM CHECKPOINT` 命令使日志组变为不活动状态：\n\
    \n```sql\nSQL> alter system checkpoint;\n```\n\n此外，如果删除联机重做日志组会导致数据库只剩下两个日志组，则无法删除它。如果您尝试这样做，Oracle\
    \ 会抛出 `ORA-01567` 错误并通知您不允许删除该日志组，因为它会使您的数据库只剩下不到两个日志组（Oracle 需要至少两个日志组才能运行）。\n\
    \n删除联机重做日志组不会从操作系统中删除日志文件。您必须使用操作系统命令（如 Linux/Unix 的 `rm` 命令）来执行此操作。在从操作系统中删除文件之前，请确保它未被使用，并且您没有删除正在使用的联机重做日志文件。对于服务器上的每个数据库，发出此查询以查看正在使用的联机重做日志文件：\n\
    \n```sql\nSQL> select member from v$logfile;\n```\n\n在物理删除日志文件之前，首先切换联机重做日志足够多次，以便所有联机重做日志组最近都被切换过；这样做会导致操作系统写入文件，从而为其提供新的时间戳。例如，如果您有三个组，请确保执行至少三次日志切换：\n\
    \n```sql\nSQL> alter system switch logfile;\nSQL> /\nSQL> /\n```\n\n现在，在操作系统提示符下，验证您打算删除的日志文件没有新的时间戳：\n\
    \n```bash\n$ ls -altr\n```\n\n当您完全确定文件未被使用时，才可以删除它。删除文件的危险在于，如果它恰好是一个正在使用的联机重做日志并且是组的唯一成员，则可能对数据库造成严重损害。确保您有一个良好的数据库备份，并且您要删除的文件未被服务器上的任何数据库使用。\n\
    \n## 向组中添加联机重做日志文件\n\n您可能偶尔需要向现有组添加日志文件。例如，如果您有一个仅包含一个成员的联机重做日志组，您应考虑添加一个日志文件（以提供更高级别的保护，防止单个日志文件成员故障）。使用\
    \ `ALTER DATABASE ADD LOGFILE MEMBER` 语句向现有的联机重做日志组添加成员文件。您需要指定新的成员文件位置、名称以及要向其添加文件的组：\n\
    \n```sql\nSQL> alter database add logfile member '/ora02/oraredo/O11R2/redo04c.rdo'\n\
    to group 4;\n```\n\n确保您遵守有关任何新添加的重做日志文件的位置和名称的标准。\n\n## 从组中删除联机重做日志文件\n\n偶尔，您可能需要删除一个联机重做日志文件。例如，您的数据库可能经历了多路复用组中某个成员的故障，并且您想要删除该有问题的成员。首先，确保您要删除的日志文件不在当前组中：\n\
    \n```sql\nSELECT a.group#, a.member, b.status, b.archived, SUM(b.bytes)/1024/1024\
    \ mbytes\nFROM   v$logfile a, v$log b\nWHERE  a.group# = b.group#\nGROUP BY a.group#,\
    \ a.member, b.status, b.archived\nORDER BY 1, 2\n```\n\n如果您尝试删除状态为 `CURRENT` 的组中的日志文件，您将收到以下错误：\n\
    \n```\nORA-01609: log 4 is the current log for thread 1 - cannot drop members\n\
    ```\n\n如果您尝试从当前联机重做日志组中删除成员，请按如下方式强制切换：\n\n```sql\nSQL> alter system switch logfile;\n\
    ```\n\n使用 `ALTER DATABASE DROP LOGFILE MEMBER` 语句从现有的联机重做日志组中删除成员文件。您不需要指定组号，因为您要删除的是特定文件：\n\
    \n```sql\nSQL> alter database drop logfile member '/ora02/oraredo/O11R2/redo04a.rdo';\n\
    ```\n\n您也不能删除组中最后一个剩余的日志文件。一个组必须至少包含一个日志文件。如果您尝试删除组中最后一个剩余的日志文件，您将收到以下错误：\n\n\
    ```\nORA-00361: cannot remove last log member\n```\n\n## 移动或重命名重做日志文件\n\n有时，您需要移动或重命名联机重做日志文件。例如，您可能已向系统添加了一些新的挂载点，并且您希望将联机重做日志移动到新存储上。您可以使用两种方法来完成此任务：\n\
    \n- 在新位置添加新的日志文件，然后删除旧的日志文件。\n- 从操作系统物理重命名文件。\n\n如果无法承受任何停机时间，请考虑在新位置添加新的日志文件，然后删除旧的日志文件。有关如何添加日志组的详细信息，请参阅“添加联机重做日志组”部分。另请参阅“调整联机重做日志组的大小”部分有关如何删除日志组的详细信息。\n\
    \n您也可以从操作系统物理移动文件。您可以在数据库打开或关闭时执行此操作。如果您的数据库已打开，请确保您移动的文件不是当前联机重做日志组的一部分（因为这些文件正被日志写入器后台进程主动写入）。在数据库打开时尝试执行此任务是危险的，因为在活动系统上，联机重做日志可能以极快的速度切换，这会产生您试图在文件切换为当前联机重做日志的同时移动它的可能性。\n\
    \n下一个示例显示如何在数据库关闭时移动联机重做日志文件。步骤如下：\n\n1.  关闭数据库：\n\n    ```sql\n    SQL> shutdown\
    \ immediate;\n    ```\n2.  在操作系统提示符下，移动文件。此示例使用 `mv` 命令完成此任务：\n\n    ```bash\n\
    \    $ mv /ora02/oraredo/O11R2/redo01a.rdo /ora03/oraredo/O11R2/redo01a.rdo\n\
    \    $ mv /ora02/oraredo/O11R2/redo02a.rdo /ora03/oraredo/O11R2/redo02a.rdo\n\
    \    $ mv /ora02/oraredo/O11R2/redo03a.rdo /ora03/oraredo/O11R2/redo03a.rdo\n\
    \    ```\n3.  在装载模式下启动数据库：\n\n    ```sql\n    SQL> startup mount;\n    ```\n4.\
    \  使用新的文件位置和名称更新控制文件：\n\n    ```sql\n    SQL> alter database rename file '/ora02/oraredo/O11R2/redo01a.rdo'\n\
    \      to '/ora03/oraredo/O11R2/redo01a.rdo';\n    SQL> alter database rename\
    \ file '/ora02/oraredo/O11R2/redo02a.rdo'\n      to '/ora03/oraredo/O11R2/redo02a.rdo';\n\
    \    SQL> alter database rename file '/ora02/oraredo/O11R2/redo03a.rdo'\n    \
    \  to '/ora03/oraredo/O11R2/redo03a.rdo';\n    ```\n5.  打开数据库：\n\n    ```sql\n\
    \    SQL> alter database open;\n    ```\n\n您可以通过查询 `V$LOGFILE` 视图来验证您的联机重做日志是否在新位置。我还建议您切换几次联机重做日志，然后从操作系统验证文件是否具有最近的时间戳。同时检查\
    \ alert.log 文件是否有任何相关错误。\n\n## 总结\n\n本章描述了如何配置和管理控制文件和联机重做日志文件。控制文件和联机重做日志是关键的数据库文件；正常运行的数据库离不开它们。\n\
    \n控制文件是包含数据库结构信息的小型二进制文件。初始化文件中指定的任何控制文件都必须可用，您才能装载数据库。如果某个控制文件变得不可用，那么您的数据库将停止运行，直到您解决问题为止。我强烈建议您至少配置三个控制文件。如果某个控制文件变得不可用，您可以使用现有良好控制文件的副本来替换它。了解如何配置、添加和删除这些文件至关重要。\n\
    \n联机重做日志是记录数据库事务历史的关键文件。如果您有多个实例连接到一个数据库，那么每个实例都会生成自己的重做线程。每个数据库创建时必须包含两个或多个联机重做日志组。您可以在每个组中仅有一个联机重做日志成员的情况下运行数据库。但是，我强烈建议您创建的联机重做日志组在每个组中有两个成员。如果联机重做日志至少有一个可以写入的成员，您的数据库将继续运行。如果联机重做日志组的所有成员都不可用，那么您的数据库将停止运行。作为\
    \ DBA，您必须非常精通创建、添加、移动和删除这些关键的数据库文件。\n\n到目前为止，本书的章节涵盖了安装 Oracle 软件、创建数据库以及管理表空间、数据文件、控制文件和联机重做日志文件等任务。接下来的几章将重点介绍如何配置数据库以供应用程序使用，包括创建用户和数据库对象等主题。\n\
    \n![](img/index-145_1.png)\n\n# 第 6 章 ■ 用户和基本安全性\n\n## 管理默认用户\n\n创建数据库时，Oracle\
    \ 会创建几个默认的数据库用户。创建的特定用户因数据库版本而异。如果您刚刚创建了数据库，可以按如下方式查看默认用户帐户：\n\n```sql\nSQL> select\
    \ username from dba_users order by 1;\n```\n\n以下是一些默认数据库用户帐户的示例列表：\n\n```\nUSERNAME\n\
    -------------------------\nAPPQOSSYS\nDBSNMP\nDIP\nORACLE_OCM\nOUTLN\nSYS\nSYSTEM\n\
    ```\n\n为了开始保护数据库，您至少应更改每个默认帐户的密码，然后锁定您不使用的任何帐户。创建数据库后，我通常会锁定每个默认帐户并将其密码设置为过期；我只在需要时才解锁默认用户。\n\
    \n以下脚本生成锁定所有用户并将其密码设置为过期的 SQL 语句：\n\n```sql\nselect\n'alter user ' || username\
    \ || ' password expire account lock;'\nfrom dba_users;\n```\n\n锁定的用户只能通过将用户更改为解锁状态来访问。例如：\n\
    \n```sql\nSQL> alter user outln account unlock;\n```\n\n密码过期的用户在首次以该用户身份连接到数据库时会被提示输入新密码。连接到用户时，Oracle\
    \ 会检查当前密码是否已过期，如果已过期，则提示您：\n\n```\nORA-28001: the password has expired\n\nChanging\
    \ password for <user>\nNew password:\n```\n\n输入新密码后，系统会提示您再次输入：\n\n```\nRetype\
    \ new password:\nPassword changed\nConnected.\n```\n\n**注意：** 您可以锁定 `SYS` 帐户，但这对您使用操作系统身份验证或密码文件以\
    \ `SYS` 用户身份连接的能力没有影响。\n\n如果您从其他 DBA 那里继承了一个数据库，那么有时确定是其他 DBA 创建了用户还是用户是 Oracle\
    \ 创建的默认帐户是很有用的。如前所述，通常在创建数据库时会为您创建几个用户帐户。帐户数量因版本和安装的选项而异。运行此查询以显示由其他 DBA 创建的用户与由\
    \ Oracle 创建的用户（例如在创建数据库时默认创建的用户）：\n\n```sql\nselect\n  distinct u.username\n \
    \ ,case when d.user_name is null then 'DBA created account'\n   else 'Oracle created\
    \ account'\n  end\nfrom   dba_users u\n       ,default_pwd$ d\nwhere  u.username=d.user_name(+);\n\
    ```\n\n**注意：** `DEFAULT_PWD$` 视图从 Oracle Database 11g 开始可用。有关检查默认密码的指南的更多详细信息，请参阅\
    \ My Oracle Support 说明 227010.1。\n\n在确定密码是否安全时，检查用户密码是否曾经更改过是很有用的。如果某个用户的密码从未更改过，这可能被视为安全风险。此示例执行此类检查：\n\
    \n```sql\nselect\n  name\n  ,to_char(ctime,'dd-mon-yy hh24:mi:ss')\n  ,to_char(ptime,'dd-mon-yy\
    \ hh24:mi:ss')\n  ,length(password)\nfrom   user$\nwhere  password is not null\n\
    and    password not in ('GLOBAL','EXTERNAL')\nand    ctime=ptime;\n```\n\n在此脚本中，`CTIME`\
    \ 列包含用户创建时的时间戳。`PTIME` 列包含密码更改时的时间戳。如果 `CTIME` 和 `PTIME` 相同，则表明密码从未更改。\n\n您还应该检查您的数据库以确定是否有任何帐户使用默认密码。如果您使用的是\
    \ Oracle Database 11*g* 或更高版本，您可以检查 `DBA_USERS_WITH_DEFPWD` 视图以确定是否任何 Oracle 创建的用户帐户仍设置为默认密码：\n\
    \n```sql\nSQL> select * from dba_users_with_defpwd;\n```\n\n如果您未使用 Oracle Database\
    \ 11*g*，则必须手动检查密码或使用脚本。下面是一个简单的 shell 脚本，它尝试使用默认密码连接到数据库：\n\n```bash\n#!/bin/bash\n\
    if [ $# -ne 1 ]; then\necho \"Usage: $0 SID\"\nexit 1\nfi\n```"
- fmt: '# `source` oracle OS variables via `oraset` script.'
  raw: '# source oracle OS variables via oraset script.'
  trans: '# 通过 `oraset` 脚本加载 Oracle OS 变量。'
- fmt: "See chapter 2 for more details on setting OS variables.\n\n. /var/opt/oracle/oraset\
    \ $1\n\n#\n\nuserlist=\"system sys dbsnmp dip oracle_ocm outln\"\n\n![](index-148_1.png)\n\
    \n# CHAPTER 6 ■ USERS AND BASIC SECURITY\n\n## Creating Users\n\nWhen you’re creating\
    \ a user, you need to consider the following factors:\n\n- User name\n- Authentication\
    \ method\n- Basic privileges\n- Default permanent tablespace\n- Default temporary\
    \ tablespace\n\nThese aspects of creating a user are discussed in the next few\
    \ subsections.\n\n### Choosing a User Name and Authentication Method\n\nPick a\
    \ user name that gives you an idea what application will be using the user. For\
    \ example, if you have an inventory-management application, a good choice for\
    \ a user name is `INV_MGMT`. Choosing a meaningful username helps identify the\
    \ purpose of a user. This can be helpful especially if a system isn’t documented\
    \ appropriately.\n\nAuthentication is the method used to confirm that the user\
    \ is authorized to use the account. Oracle supports three types of authentication:\n\
    \n- Password\n- External service, such as the OS\n- Global user via enterprise\
    \ directory service (Oracle Internet Directory)\n\nThe most common method of authenticating\
    \ a user is with a password. The external authentication method allows you to\
    \ authenticate using smart cards, Kerberos, or the OS. This section shows examples\
    \ of password verification and external authentication. Refer to the *Oracle Database\
    \ Security Guide* and the *Oracle Database Advanced Security Administrator’s Guide*\
    \ (available at http://otn.oracle.com) for more information about external and\
    \ global authentication methods.\n\nWhen you’re creating users as a DBA, your\
    \ account must have the `CREATE USER` system privilege. You use the `CREATE USER`\
    \ SQL statement to create users. This example creates a user named `HEERA` with\
    \ the password `CHAYA` and assigns the default permanent tablespace `USERS` and\
    \ the default temporary tablespace `TEMP`:\n\n```sql\ncreate user heera identified\
    \ by chaya\ndefault tablespace users\ntemporary tablespace temp;\n```\n\nThis\
    \ creates a bare-bones schema that has no privileges to do anything in the database.\
    \ To make the user useful, you must minimally grant it the `CREATE SESSION` system\
    \ privilege:\n\n```sql\nSQL> grant create session to heera;\n```\n\nIf the new\
    \ schema needs to be able to create tables, you need to grant it additional privileges\
    \ like `CREATE TABLE`:\n\n```sql\nSQL> grant create table to heera;\n```\n\nThe\
    \ new schema also must have quota privileges granted for any tablespace in which\
    \ it needs to create objects:\n\n```sql\nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\
    \nSQL> alter user heera quota unlimited on users;\n```\n\n**Note:** A common technique\
    \ is to grant the predefined roles of `CONNECT` and `RESOURCE` to newly created\
    \ schemas. These roles contain system privileges such as `CREATE SESSION` and\
    \ `CREATE TABLE` (and several others, which vary by release). I recommend against\
    \ doing this, because Oracle has stated that those roles may not be available\
    \ in future releases.\n\nYou can also create a user that is authenticated by an\
    \ external service, such as the OS. In this scenario, you assume that if a user\
    \ has been authenticated by the OS logon, that level of security is also good\
    \ enough to allow access to the database. External authentication has some interesting\
    \ advantages:\n\n- Users with access to the server don’t have to maintain a password\
    \ to the database.\n- Scripts that log on to the database don’t have to use hard-coded\
    \ passwords if executed by OS-authenticated users.\n- Another database user can’t\
    \ hack into the externally identified user by trying to guess the username and\
    \ password connection string. The only way to log on to an externally authenticated\
    \ user is from an external authentication source (such as the OS).\n- A DBA doesn’t\
    \ have to maintain a password for the database user.\n\nWhen using external OS\
    \ authentication, Oracle prefixes the value contained in `OS_AUTHENT_PREFIX` to\
    \ the OS user connecting to the database. The default value for this parameter\
    \ is `OPS$`. Oracle strongly recommends that you set the `OS_AUTHENT_PREFIX` parameter\
    \ to a null string. For example:\n\n```sql\nSQL> alter system set os_authent_prefix=''\
    \ scope=spfile;\n```\n\nYou have to stop and start your database for this modification\
    \ to take effect. After you’ve set the `OS_AUTHENT_PREFIX` variable, you can create\
    \ an externally authenticated user. For example, say you have an OS user named\
    \ `jsmith` and you want anybody with access to this OS user to be able to log\
    \ in to the database without supplying a password. Use the `CREATE EXTERNALLY`\
    \ statement to do this:\n\n```sql\nSQL> create user jsmith identified externally;\n\
    ```\n\nNow, when `jsmith` logs on to the database server, this user can connect\
    \ to SQL*Plus as follows:\n\n```bash\n$ sqlplus /\n```\n\nNo username or password\
    \ is required because the user has already been authenticated by the OS.\n\n###\
    \ Assigning Default Permanent and Temporary Tablespaces\n\nWhen maintaining a\
    \ database, you should verify the default and temporary tablespace settings to\
    \ ensure that they meet your database standards. You can view user information\
    \ by selecting from the `DBA_USERS` view:\n\n```sql\nselect\n  username\n  ,password\n\
    \  ,default_tablespace\n  ,temporary_tablespace\nfrom dba_users;\n```\n\nHere\
    \ is some sample output:\n\n```\nUSERNAME       PASSWORD    DEFAULT_TABLESP TEMPORARY_TABLE\n\
    -------------- ----------- --------------- ---------------\nJSMITH         EXTERNAL\
    \    USERS           TEMP\nDBSNMP         SYSAUX      TEMP\nORACLE_OCM     USERS\
    \       TEMP\nAPPQOSSYS      SYSAUX      TEMP\nAPPUSR         USERS       TEMP\n\
    ```\n\nNone of your users, other than the `SYS` user, should have a default permanent\
    \ tablespace of `SYSTEM`.\n\nYou don’t want any users other than `SYS` creating\
    \ objects in the `SYSTEM` tablespace. The `SYSTEM` tablespace should be reserved\
    \ for the `SYS` user’s objects. If other users’ objects existed in the `SYSTEM`\
    \ tablespace, you’d run the risk of filling up that tablespace and compromising\
    \ the availability of your database.\n\nAll of your users should be assigned a\
    \ temporary tablespace that has been created as type temporary. Usually, this\
    \ tablespace is named `TEMP` (see Chapter 4 for more details).\n\nYou never want\
    \ any users with a temporary tablespace of `SYSTEM`. If a user has a temporary\
    \ tablespace of `SYSTEM`, then any sort area for which they require temporary\
    \ disk storage acquires extents in the `SYSTEM` tablespace. This can lead to the\
    \ `SYSTEM` tablespace filling up. You don’t want the `SYSTEM` tablespace ever\
    \ filling up, because that can lead to a nonfunctioning database if the `SYS`\
    \ schema can’t acquire more space as its objects grow. To check for users that\
    \ have a temporary tablespace of `SYSTEM`, run this script:\n\n```sql\nSQL> select\
    \ username from dba_users where temporary_tablespace='SYSTEM';\n```\n\nTypically,\
    \ I use a script name `creuser.sql` when creating a user. The script uses variables\
    \ that define the user names, passwords, default tablespace name, and so on. For\
    \ each environment (development, test, QA, beta, production) in which the script\
    \ is executed, you can change the ampersand variables as required for each environment.\
    \ For example, you can use a different password for each separate environment.\n\
    \nHere’s an example `creuser.sql` script:\n\n```sql\nDEFINE cre_user=inv_mgmt\n\
    DEFINE cre_user_pwd=inv_mgmt_pwd\nDEFINE def_tbsp=inv_data\nDEFINE idx_tbsp=inv_index\n\
    DEFINE smk_ttbl=zzzzzzz\n--\nCREATE USER &&cre_user IDENTIFIED BY &&cre_user_pwd\n\
    DEFAULT TABLESPACE &&def_tbsp;\n--\nGRANT CREATE SESSION TO &&cre_user;\nGRANT\
    \ CREATE TABLE TO &&cre_user;\n--\nALTER USER &&cre_user QUOTA UNLIMITED ON &&def_tbsp;\n\
    ALTER USER &&cre_user QUOTA UNLIMITED ON &&idx_tbsp;\n--\n-- Smoke test\n```\n\
    \n![](index-152_1.png)\n\nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\n### Enforcing\
    \ Password Security\n\nThere are a couple schools of thought about enforcing password\
    \ security:\n\n- Use easily remembered passwords so you don’t have them written\
    \ down or recorded in a file somewhere. Because the passwords aren’t sophisticated,\
    \ they aren’t very secure.\n- Enforce a level of sophistication for passwords.\
    \ Such passwords aren’t easily remembered and thus must be recorded somewhere,\
    \ which isn’t secure.\n\nYou may choose to enforce a degree of password sophistication\
    \ because you think it’s the most secure option. Or you may be required to enforce\
    \ password security by your corporate security team (and thus have no choice in\
    \ the matter). This section isn’t about debating which of the prior methods is\
    \ preferable. Should you choose to impose a degree of sophistication (strength)\
    \ for a password, this section describes how to enforce the rules.\n\nYou can\
    \ enforce a minimum standard of password complexity by assigning a password-verification\
    \ function to a user’s profile. Oracle supplies a default password-verification\
    \ function that you create by running the following script as the `SYS` schema:\n\
    \n```sql\nSQL> @?/rdbms/admin/utlpwdmg\nFunction created.\nProfile altered.\n\
    Function created.\n```\n\nFor Oracle Database 11g, set the `PASSWORD_VERIFY_FUNCTION`\
    \ of the `DEFAULT` profile to `VERIFY_FUNCTION_11G`:\n\n```sql\nSQL> alter profile\
    \ default limit PASSWORD_VERIFY_FUNCTION verify_function_11G;\n```\n\nFor Oracle\
    \ Database 10g, set the `PASSWORD_VERIFY_FUNCTION` of the `DEFAULT` profile to\
    \ `VERIFY_FUNCTION`:\n\n```sql\nSQL> alter profile default limit PASSWORD_VERIFY_FUNCTION\
    \ verify_function;\n```\n\nIf for any reason you need to back out of the new security\
    \ modifications, run this statement to disable the password function:\n\n```sql\n\
    SQL> alter profile default limit PASSWORD_VERIFY_FUNCTION null;\n```\n\nWhen enabled,\
    \ the password-verification function ensures that users are correctly creating\
    \ or modifying their passwords. The `utlpwdmg.sql` script creates a function that\
    \ checks a password to ensure that it meets basic security standards such as minimum\
    \ password length, password not the same as username, and so on. You can verify\
    \ that the new security function is in effect by attempting to change the password\
    \ of a user that has been assigned the `DEFAULT` profile. This example tries to\
    \ change the password to less than the minimum length:\n\n```sql\nSQL> password\n\
    Changing password for HEERA\nOld password:\nNew password:\nRetype new password:\n\
    ERROR:\nORA-28003: password verification for the specified password failed\nORA-20001:\
    \ Password length less than 8\nPassword unchanged\n```\n\nCHAPTER 6 ■ USERS AND\
    \ BASIC SECURITY\n\n**Note:** For Oracle Database 11g, the minimum password length\
    \ is eight characters. For Oracle Database 10g, the minimum length is four characters.\n\
    \nAs mentioned earlier, starting with Oracle Database 11g, password case-sensitivity\
    \ is enforced. You can disable this feature by setting the `SEC_CASE_SENSITIVE_LOGON`\
    \ initialization parameter to `FALSE`:\n\n```sql\nSQL> alter system set sec_case_sensitive_logon\
    \ = FALSE;\n```\n\nHowever, doing so isn’t recommended. For most security requirements,\
    \ you should have passwords that are case-sensitive.\n\nAlso keep in mind that\
    \ it’s possible to modify the code used to create the password-verification function.\
    \ For example, you can open and modify the script used to create this function:\n\
    \n```bash\n$ vi $ORACLE_HOME/rdbms/admin/utlpwdmg.sql\n```\n\nIf you feel that\
    \ the Oracle-supplied verification function is too strong or overly restrictive,\
    \ you can create your own function and assign it to the appropriate database profiles.\n\
    \n### Logging On as a Different User\n\nThis section details how to log on to\
    \ a different user without having the clear-text form of the user’s password.\
    \ You may wish to do this in a couple of situations:\n\n- You’re copying a user\
    \ from one environment (such as production) to a different environment (such as\
    \ test), and you want to retain the original password.\n- You’re working in a\
    \ production environment, and you need to be able to connect as the user who owns\
    \ objects to execute `CREATE TABLE` statements, issue grants, and so on. In a\
    \ production environment, you may not know the user’s password because of poor\
    \ maintenance procedures.\n\nYou need access to a DBA-privileged account to be\
    \ able to log on as a different user without knowing the password. Here are the\
    \ steps to do this:\n\n1. As a DBA, temporarily store a user’s encrypted password.\n\
    2. Change the user’s password.\n3. Connect to the user with the new password,\
    \ and run Data Definition Language (DDL) statements.\n4. Connect as a DBA, and\
    \ change the password back to the original.\n\nBe very careful before changing\
    \ a user’s password as describe in the previous steps. First, the application\
    \ can’t connect to the database while the password has been changed to a temporary\
    \ setting.\n\nIf the application repeatedly fails to successfully connect, this\
    \ may lock the account when you exceed the `FAILED_LOGIN_ATTEMPTS` limit of a\
    \ user’s profile (the default is 10 failed attempts before the user is locked).\n\
    \nFurthermore, if you’ve modified the values of `PASSWORD_REUSE_MAX` (the number\
    \ of days before a password can be reused) and `PASSWORD_REUSE_TIME` (the number\
    \ of times a password must change before a password can be reused), then you can’t\
    \ reset the password back to its original value.\n\nCHAPTER 6 ■ USERS AND BASIC\
    \ SECURITY\n\nListed next is an example that shows how to temporarily change a\
    \ user’s password and then set the password back to its original value. First,\
    \ select the statement required to restore a user’s password to what it’s currently\
    \ set to. In this example, the username is `APPUSR`:\n\n```sql\nselect 'alter\
    \ user appusr identified by values ' ||\n'''' || password || '''' || ';'\nfrom\
    \ user$ where name='APPUSR';\n```\n\nHere is the output for this example:\n\n\
    ```sql\nSQL> alter user appusr identified by values 'A0493EBF86198724';\n```\n\
    \nNow, modify the user’s password to a known value (in this example, `foo`):\n\
    \n```sql\nSQL> alter user appusr identified by foo;\n```\n\nConnect to the `APPUSR`\
    \ user:\n\n```sql\nSQL> conn appusr/foo\n```\n\nAfter you’re finished using the\
    \ `APPUSR` user, change its password back to the original value:\n\n```sql\nSQL>\
    \ alter user appusr identified by values 'A0493EBF86198724';\n```\n\nAgain, be\
    \ very cautious when performing this procedure, because you don’t want to put\
    \ yourself in a situation where a password-profile setting won’t allow you to\
    \ reset the password:\n\n```\nORA-28007: the password cannot be reused\n```\n\n\
    If you get this error, one option is to set the password to a brand-new value.\
    \ However, doing so may have an undesirable impact on the application. If developers\
    \ have hard-coded the password into response files, the application can’t log\
    \ on without changing the hard-coded password to the new password.\n\nYour other\
    \ option is to temporarily change the user’s profile to allow the password to\
    \ be reused.\n\nFirst, check to see what the current profile is for the user:\n\
    \n```sql\nSQL> select username, profile from dba_users where username = UPPER('&&username');\n\
    ```\n\nHere is some sample output:\n\n```\nUSERNAME              PROFILE\n------------------------------\
    \ ------------------------------\nAPPUSR                SECURE\n```\n\nNow, create\
    \ a profile that specifically allows a password to be reused without any restrictions:\n\
    \n```sql\nCREATE PROFILE temp_prof LIMIT\n  PASSWORD_REUSE_MAX unlimited\n  PASSWORD_REUSE_TIME\
    \ unlimited;\n```\n\nNext, assign the user the profile that doesn’t limit the\
    \ reuse of passwords:\n\n```sql\nSQL> alter user appusr profile temp_prof;\n```\n\
    \nYou should be able to modify the password as shown previously:\n\n```sql\nSQL>\
    \ alter user appusr identified by values 'A0493EBF86198724';\n```\n\nIf successful,\
    \ you see this message:\n\n```\nUser altered.\n```\n\nCHAPTER 6 ■ USERS AND BASIC\
    \ SECURITY\n\nMake sure you set the profile back to the original value for the\
    \ user:\n\n```sql\nSQL> alter user appusr profile secure;\n```\n\nFinally, drop\
    \ the temporary profile so it isn’t accidentally used in the future:\n\n```sql\n\
    SQL> drop profile temp_prof;\n```\n\n## Modifying Users\n\nSometimes you need\
    \ to modify existing users for the following types of reasons:\n\n- To change\
    \ a user’s password\n- To lock or unlock a user\n- To change the default permanent\
    \ and/or temporary tablespace\n- To change a profile or role\n- To change system\
    \ or object privileges\n- To modify quotas on tablespaces\n\nUse the `ALTER USER`\
    \ statement to modify users. Listed next are several SQL statements that modify\
    \ a user. This example changes a user’s password using the `IDENTIFIED BY` clause:\n\
    \n```sql\nSQL> alter user inv_mgmt identified by i2jy22a;\n```\n\nIf you don’t\
    \ set a default permanent tablespace and temporary tablespace when you initially\
    \ create the user, you can modify then after creation as shown here:\n\n```sql\n\
    SQL> alter user inv_mgmt default tablespace users temporary tablespace temp;\n\
    ```\n\nThis example locks a user account:\n\n```sql\nSQL> alter user inv_mgmt\
    \ account lock;\n```\n\nAnd this example alters the user’s quota on the `USERS`\
    \ tablespace:\n\n```sql\nSQL> alter user inv_mgmt quota 500m on users;\n```\n\n\
    ## Dropping Users\n\nBefore you drop a user, I recommend that you first lock the\
    \ user. Locking the user prevents anybody from connecting to a locked database\
    \ account. This allows you to determine better whether someone is using the account\
    \ before it’s dropped. Here’s an example of locking a user:\n\n```sql\nSQL> alter\
    \ user heera account lock;\n```\n\nAny user or application attempting to connect\
    \ to this user now receives the following error:\n\n```\nORA-28000: the account\
    \ is locked\n```\n\nTo view the users and lock dates in your database, issue this\
    \ query:\n\n```sql\nSQL> select username, lock_date from dba_users;\n```\n\nCHAPTER\
    \ 6 ■ USERS AND BASIC SECURITY\n\nTo unlock an account, issue this command:\n\n\
    ```sql\nSQL> alter user heera account unlock;\n```\n\nLocking users is a very\
    \ handy technique for securing your database and discovering which users are active.\n\
    \nBe aware that by locking a user, you aren’t locking access to a user’s objects.\
    \ For example, if a `USER_A` has select, insert, update, and delete privileges\
    \ on tables owned by `USER_B`, if you lock the `USER_B` account, `USER_A` can\
    \ still issue Data Manipulation Language (DML) statements against the objects\
    \ owned by `USER_B`.\n\nTo determine whether the objects are being used, see the\
    \ auditing section of Chapter 22.\n\n**Tip:** If a user’s objects don’t consume\
    \ inordinate amounts of disk space, then before you drop the user, it’s prudent\
    \ to make a quick backup. See Chapter 13 for details on using Data Pump to back\
    \ up a single user.\n\nAfter you’re sure that a user and its objects aren’t needed,\
    \ use the `DROP USER` statement to remove a database account. This example drops\
    \ the user `HEERA`:\n\n```sql\nSQL> drop user heera;\n```\n\nThe prior command\
    \ won’t work if the user owns any database objects. Use the `CASCADE` clause to\
    \ remove a user and have its objects dropped:\n\n```sql\nSQL> drop user heera\
    \ cascade;\n```\n\n**Note:** The `DROP USER` statement may take an inordinate\
    \ amount of time to execute if the user being dropped owns a vast number of database\
    \ objects. In these situations, you may want to consider dropping the user’s objects\
    \ before dropping the user.\n\nWhen you drop a user, any tables that it owns are\
    \ also dropped. Additionally, all indexes, triggers, and referential-integrity\
    \ constraints are removed. If referential integrity constraints exist in other\
    \ schemas that depend on any dropped primary-key and unique-key constraints, the\
    \ referential constraints in other schemas are also dropped. Oracle invalidates\
    \ but doesn’t drop any views, synonyms, procedures, functions, and packages that\
    \ are dependent on the dropped user’s objects.\n\n## Enforcing Password Security\
    \ and Resource Limits\n\nWhen you’re creating users, sometimes requirements call\
    \ for passwords to adhere to a set of security rules. For example, the password\
    \ must be of a certain length and contain numeric characters. Also, when you set\
    \ up database users, you may want to ensure that a certain user isn’t capable\
    \ of consuming inordinate amounts of CPU resources.\n\nYou can use a database\
    \ profile to meet these types of requirements. An Oracle *profile* is a database\
    \ object that serves two purposes:\n\nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\n\
    - Enforcing password security settings\n- Limiting system resources that a user\
    \ consumes\n\nThese topics are discussed in the next two subsections.\n\n### Implementing\
    \ Password Security\n\nWhen you create a user, if no profile is specified, the\
    \ `DEFAULT` profile is assigned to the newly created user. To view the current\
    \ settings for a profile, issue the following SQL:\n\n```sql\nSQL> select profile,\
    \ resource_name, resource_type, limit from dba_profiles;\n```\n\nHere is a partial\
    \ listing of the output:\n\n```\nPROFILE    RESOURCE_NAME            RESOURCE_T\
    \ LIMIT\n---------- ------------------------- ---------- --------------------\n\
    DEFAULT    CONNECT_TIME             KERNEL     UNLIMITED\nDEFAULT    PRIVATE_SGA\
    \              KERNEL     UNLIMITED\nDEFAULT    FAILED_LOGIN_ATTEMPTS    PASSWORD\
    \   10\nDEFAULT    PASSWORD_LIFE_TIME       PASSWORD   180\nDEFAULT    PASSWORD_REUSE_TIME\
    \      PASSWORD   UNLIMITED\nDEFAULT    PASSWORD_REUSE_MAX       PASSWORD   10\n\
    DEFAULT    PASSWORD_VERIFY_FUNCTION PASSWORD   NULL\n```\n\nA profile’s password\
    \ restrictions are in effect as soon as the profile is assigned to a user. For\
    \ example, from the previous output, if you’ve assigned the `DEFAULT` profile\
    \ to a user, that user is allowed only 10 consecutive failed login attempts before\
    \ the user account is automatically locked by Oracle. See Table 6–1 for a description\
    \ of the password profile security settings.\n\n**Tip:** See My Oracle Support\
    \ note 454635.1 for details on Oracle Database 11g `DEFAULT` profile changes.\n\
    \nYou can alter the `DEFAULT` profile to customize it for your environment. For\
    \ example, say you want to enforce a cap on the maximum number of days a password\
    \ can be used. The next line of code sets the `PASSWORD_LIFE_TIME` of the `DEFAULT`\
    \ profile to 300 days:\n\n```sql\nSQL> alter profile default limit password_life_time\
    \ 300;\n```\n\nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\n***Table 6–1.** Password\
    \ Security Settings*\n\n| **Password Setting**          | **Description**    \
    \                                                             | **11g default**\
    \ | **10g default** |\n| :---------------------------- | :------------------------------------------------------------------------------\
    \ | :-------------- | :-------------- |\n| `FAILED_LOGIN_ATTEMPTS`       | Number\
    \ of failed login attempts before the schema is locked                     | 10\
    \ attempts     | 10 attempts     |\n| `PASSWORD_GRACE_TIME`         | Number of\
    \ days after a password expires that the owner can log in with an old password\
    \ | 7 days          | Unlimited       |\n| `PASSWORD_LIFE_TIME`          | Number\
    \ of days a password is valid                                              | 180\
    \ days        | Unlimited       |\n| `PASSWORD_LOCK_TIME`          | Number of\
    \ days an account is locked after `FAILED_LOGIN_ATTEMPTS` has been reached | 1\
    \ day           | Unlimited       |\n| `PASSWORD_REUSE_MAX`          | Number\
    \ of days before a password can be reused                                  | Unlimited\
    \       | Unlimited       |\n| `PASSWORD_REUSE_TIME`         | Number of times\
    \ a password must change before a password can be reused          | Unlimited\
    \       | Unlimited       |\n| `PASSWORD_VERIFY_FUNCTION`    | Database function\
    \ used to verify the password                                   | Null       \
    \     | Null            |\n\nThe `PASSWORD_REUSE_TIME` and `PASSWORD_REUSE_MAX`\
    \ settings must be used in conjunction. If you specify an integer for one parameter\
    \ (doesn’t matter which one) and then `UNLIMITED` for the other parameter, the\
    \ current password can never be reused.\n\nIf you want to specify that the `DEFAULT`\
    \ profile password must be changed 10 times within 100 days before it can be reused,\
    \ use a line of code similar to this:\n\n```sql\nSQL> alter profile default limit\
    \ password_reuse_time 100 password_reuse_max 10;\n```\n\nAlthough using the `DEFAULT`\
    \ profile is sufficient for many environments, you may need tighter security management.\
    \ I recommend that you create custom security profiles and assign them to users\
    \ as required. For example, create a profile specifically for application users:\n\
    \n```sql\nCREATE PROFILE SECURE_APP LIMIT\n  PASSWORD_LIFE_TIME 200\n  PASSWORD_GRACE_TIME\
    \ 10\n  PASSWORD_REUSE_TIME 1\n  PASSWORD_REUSE_MAX 1\n  FAILED_LOGIN_ATTEMPTS\
    \ 3\n  PASSWORD_LOCK_TIME 1\n  PASSWORD_VERIFY_FUNCTION verify_function_11G;\n\
    ```\n\nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\nAfter you create the profile, you\
    \ can assign it to users as appropriate. The following SQL generates a SQL script\
    \ named `alt_prof_dyn.sql` that you can use to assign users to the newly created\
    \ profile:\n\n```sql\nset head off;\nspo alt_prof_dyn.sql\nselect 'alter user\
    \ ' || username || ' profile secure_app;'\nfrom dba_users where username like\
    \ '%APP%';\nspo off;\n```\n\nBe careful when assigning profiles to application\
    \ accounts that use the database. If you want to enforce that a password must\
    \ change at a regular frequency, be sure you understand the impact on production\
    \ systems. Passwords tend to get hard-coded into response files and code. Enforcing\
    \ password changes in these environments can wreak havoc as you try to chase down\
    \ all the places where the password is referenced. If you don’t want to enforce\
    \ the periodic changing of the password, you can set `PASSWORD_LIFE_TIME` to a\
    \ high value such as 10000 (days).\n\n### Limiting Database Resource Usage\n\n\
    As mentioned earlier, the password-profile settings take effect as soon as you\
    \ assign the profile to a user.\n\nUnlike password settings, kernel resource profile\
    \ restrictions don’t take effect until you set the `RESOURCE_LIMIT` initialization\
    \ parameter to `TRUE` for your database. For example:\n\n```sql\nSQL> alter system\
    \ set resource_limit=true scope=both;\n```\n\nTo view the current setting of the\
    \ `RESOURCE_LIMIT` parameter:\n\n```sql\nSQL> select name, value from v$parameter\
    \ where name='resource_limit';\n```\n\nWhen you create a user, if you don’t specify\
    \ a profile, then the `DEFAULT` profile is assigned to the user.\n\nYou can modify\
    \ the `DEFAULT` profile with the `ALTER PROFILE` statement. The next example modifies\
    \ the `DEFAULT` profile to limit `CPU_PER_SESSION` to 240000 (in hundredths of\
    \ seconds):\n\n```sql\nSQL> alter profile default limit cpu_per_session 240000;\n\
    ```\n\nThis limits any user with the `DEFAULT` profile to 2400 seconds of CPU\
    \ use. You can set various limits in a profile. Table 6–2 describes the database\
    \ resource settings you can limit via a profile.\n\nCHAPTER 6 ■ USERS AND BASIC\
    \ SECURITY\n\n***Table 6–2.** Database Resource Profile Settings*\n\n| **Profile\
    \ Resource**      | **Meaning**                                              \
    \                                                 |\n| :------------------------\
    \ | :--------------------------------------------------------------------------------------------------------\
    \ |\n| `COMPOSITE_LIMIT`         | Limit based on a weighted-sum algorithm for\
    \ these resources: `CPU_PER_SESSION`, `CONNECT_TIME`, `LOGICAL_READS_PER_SESSION`,\
    \ and `PRIVATE_SGA` |\n| `CONNECT_TIME`            | Connect time in minutes \
    \                                                                            \
    \      |\n| `CPU_PER_CALL`            | CPU time limit per call in hundredths\
    \ of seconds                                                          |\n| `CPU_PER_SESSION`\
    \         | CPU time limit per session in hundredths of seconds              \
    \                                         |\n| `IDLE_TIME`               | Idle\
    \ time in minutes                                                            \
    \                          |\n| `LOGICAL_READS_PER_CALL`  | Blocks read per call\
    \                                                                            \
    \          |\n| `LOGICAL_READS_PER_SESSION` | Blocks read per session        \
    \                                                                         |\n\
    | `PRIVATE_SGA`             | Amount of space consumed in the shared pool    \
    \                                                           |\n| `SESSIONS_PER_USER`\
    \       | Number of concurrent sessions                                      \
    \                                       |\n\nYou can also create custom profiles\
    \ and assign them to users via the `CREATE PROFILE` statement. You can then assign\
    \ that profile to any existing database users. The following SQL statement creates\
    \ a profile that limits resources, such as the amount of CPU an individual session\
    \ can consume:\n\n```sql\ncreate profile user_profile_limit\nlimit\n  sessions_per_user\
    \ 20\n  cpu_per_session 240000\n  logical_reads_per_session 1000000\n  connect_time\
    \ 480\n  idle_time 120;\n```\n\nAfter you create a profile, you can assign it\
    \ to a user. In the next example, user `HEERA` is assigned `USER_PROFILE_LIMIT`:\n\
    \n```sql\nSQL> alter user heera profile user_profile_limit;\n```\n\n**Note:**\
    \ Oracle recommends that you use Database Resource Manager to manage database\
    \ resource limits.\n\nHowever, I find database profiles (implemented via SQL)\
    \ to be an effective and easy mechanism for limiting resources.\n\nAs part of\
    \ the `CREATE USER` statement, you can specify a profile other than `DEFAULT`:\n\
    \n```sql\nSQL> create user heera identified by foo profile user_profile_limit;\n\
    ```\n\n127\n\nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\nWhen should you use database\
    \ profiles? You should always take advantage of the password-security settings\
    \ of the `DEFAULT` profile. You can easily modify the default settings of this\
    \ profile as required by your business rules.\n\nA profile’s kernel resource limits\
    \ are useful when you have power users who need to connect directly to the database\
    \ and run queries. For example, you can use the kernel resource settings to limit\
    \ the amount of CPU time a user consumes, which is handy when a user writes a\
    \ bad query that inadvertently consumes excessive database resources.\n\n## Managing\
    \ Privileges\n\nA database user must be granted privileges before the user can\
    \ perform any task in the database. In Oracle, you assign privileges either by\
    \ granting a specific privilege to a user or by granting the privilege to a role\
    \ and then granting the role that contains the privilege to a user. There are\
    \ two types of privileges: system privileges and object privileges. The following\
    \ sections discuss these privileges in detail.\n\n### Assigning Database System\
    \ Privileges\n\nDatabase system privileges allow you to do tasks such as connecting\
    \ to the database and creating and modifying objects. There are hundreds of different\
    \ system privileges. You can view system privileges by querying the `DBA_SYS_PRIVS`\
    \ view:\n\n```sql\nSQL> select distinct privilege from dba_sys_privs;\n```\n\n\
    You can grant privileges to other users or roles. To be able to grant privileges,\
    \ a user needs the `GRANT ANY PRIVILEGE` privilege or must have been granted a\
    \ system privilege with `ADMIN OPTION`.\n\nUse the `GRANT` statement to assign\
    \ a system privileges to a user. For example, minimally a user needs `CREATE SESSION`\
    \ to be able to connect to the database. You grant this system privilege as shown:\n\
    \n```sql\nSQL> grant create session to inv_mgmt;\n```\n\nUsually, a user needs\
    \ to do more than just connect to the database. For example, a user may need to\
    \ create tables and other types of database objects. This example grants a user\
    \ the `CREATE TABLE` and `CREATE DATABASE LINK` system privileges:\n\n```sql\n\
    SQL> grant create table, create database link to inv_mgmt;\n```\n\nIf you need\
    \ to take away privileges, use the `REVOKE` statement:\n\n```sql\nSQL> revoke\
    \ create table from inv_mgmt;\n```\n\nOracle has a feature that allows you to\
    \ grant a system privilege and also give that user the ability to administer a\
    \ privilege. You do this with the `WITH ADMIN OPTION` clause:\n\n```sql\nSQL>\
    \ grant create table to inv_mgmt with admin option;\n```\n\nI rarely use `WITH\
    \ ADMIN OPTION` when granting privileges. Usually, a user with the `DBA` role\
    \ is used to grant privileges, and that privilege isn’t generally meted out to\
    \ non-DBA users in the database. This is because it would be hard to keep track\
    \ of who assigned what system privileges, for what reason, and when. In a production\
    \ environment, this would be untenable.\n\nYou can also grant system privileges\
    \ to the `PUBLIC` user group (I don’t recommend doing this). For example, you\
    \ could grant `CREATE SESSION` to all users that ever need to connect to the database,\
    \ as follows:\n\n```sql\nSQL> grant create session to public;\n```\n\nCHAPTER\
    \ 6 ■ USERS AND BASIC SECURITY\n\nNow every user that is created can automatically\
    \ connect to the database. Granting system privileges to the `PUBLIC` user group\
    \ is almost always a bad idea. As a DBA, one of your main priorities is to ensure\
    \ that the data in the database is safe and secure. Granting privileges to the\
    \ `PUBLIC` role is a sure way of not being able to manage who is authorized to\
    \ perform specific actions within the database.\n\n### Assigning Database Object\
    \ Privileges\n\nDatabase object privileges allow you to access and manipulate\
    \ other users’ objects. The types of database objects on which you can grant privileges\
    \ include tables, views, materialized views, sequences, packages, functions, procedures,\
    \ user-defined types, and directories. To be able to grant object privileges,\
    \ one of the following must be true:\n\n- You own the object.\n- You’ve been granted\
    \ the object privilege with `GRANT OPTION`.\n- You have the `GRANT ANY OBJECT\
    \ PRIVILEGE` system privilege.\n\nThis example grants object privileges (as the\
    \ object owner) to the `INV_MGMT_APP` user:\n\n```sql\nSQL> grant insert, update,\
    \ delete, select on registrations to inv_mgmt_app;\n```\n\nThe `GRANT ALL` statement\
    \ is equivalent to granting `INSERT`, `UPDATE`, `DELETE`, and `SELECT` to an object.\n\
    \nThe next statement is equivalent to the prior statement:\n\n```sql\nSQL> grant\
    \ all on registrations to inv_mgmt_app;\n```\n\nYou can also grant `INSERT` and\
    \ `UPDATE` privileges to tables at the column level. The next example grants `INSERT`\
    \ privileges to specific columns in the `INVENTORY` table:\n\n```sql\nSQL> grant\
    \ insert (inv_id, inv_name, inv_desc) on inventory to inv_mgmt_app;\n```\n\nIf\
    \ you want a user that is being granted object privileges to be able to subsequently\
    \ grant those same object privileges to other users, then use the `WITH GRANT\
    \ OPTION` clause:\n\n```sql\nSQL> grant insert on registrations to grouping_app\
    \ with grant option;\n```\n\nNow the `GROUPING_APP` user can grant insert privileges\
    \ on the `REGISTRATIONS` table to other users.\n\nI rarely use the `WITH GRANT\
    \ OPTION` when granting object privileges. This option allows other users to propagate\
    \ object privileges to other users. This makes it hard to keep track of who assigned\
    \ what object privileges, for what reason, when, and so on. In a production environment,\
    \ this would be untenable.\n\nWhen you’re managing a production environment, when\
    \ problems arise, you need to know what changed and when and for what reason.\n\
    \nYou can also grant object privileges to the `PUBLIC` user group (I don’t recommend\
    \ doing this). For example, you could grant select privileges on a table to `PUBLIC`:\n\
    \n```sql\nSQL> grant select on registrations to public;\n```\n\nNow every user\
    \ can select from the `REGISTRATIONS` table. Granting object privileges to the\
    \ `PUBLIC` role is almost always a bad idea. As a DBA, one of your main priorities\
    \ is to ensure that the data in the database is safe and secure. Granting object\
    \ privileges to the `PUBLIC` role is a sure way of not being able to manage who\
    \ can access what data in the database.\n\nIf you need to take away object privileges,\
    \ then use the `REVOKE` statement. This example revokes DML privileges from the\
    \ `INV_MGMT_APP` user:\n\n```sql\nSQL> revoke insert, update, delete, select on\
    \ registrations from inv_mgmt_app;\n```\n\n129\n\nCHAPTER 6 ■ USERS AND BASIC\
    \ SECURITY\n\n## Grouping and Assigning Privileges\n\nA *role* is a database object\
    \ that allows you to logically group system and/or object privileges together\
    \ so you can assign those privileges in one operation to a user. Roles help you\
    \ manage aspects of database security in that they provide a central object that\
    \ has privileges assigned to it. You can subsequently assign the role to multiple\
    \ users or other roles.\n\nTo create a role, connect to the database as a user\
    \ that has the `CREATE ROLE` system privilege. Next, create a role and assign\
    \ to it the system or object privileges that you want to group together. This\
    \ example uses the `CREATE ROLE` statement to create the `JR_DBA` role:\n\n```sql\n\
    SQL> create role jr_dba;\n```\n\nThe next several lines of SQL grant system privileges\
    \ to the newly created role:\n\n```sql\nSQL> grant select any table to jr_dba;\n\
    SQL> grant create any table to jr_dba;\nSQL> grant create any view to jr_dba;\n\
    SQL> grant create synonym to jr_dba;\nSQL> grant create database link to jr_dba;\n\
    ```\n\nNext, grant the role to any schema you want to possess those privileges:\n\
    \n```sql\nSQL> grant jr_dba to lellison;\nSQL> grant jr_dba to mhurd;\n```\n\n\
    The users `LELLISON` and `MHURD` can now perform tasks such as creating synonyms,\
    \ views, and so on.\n\nTo view users assigned to roles, query the `DBA_ROLE_PRIVS`\
    \ view:\n\n```sql\nSQL> select grantee, granted_role from dba_role_privs order\
    \ by 1;\n```\n\nTo view roles granted to your currently connected user, query\
    \ from the `USER_ROLE_PRIVS` view:\n\n```sql\nSQL> select * from user_role_privs;\n\
    ```\n\nTo revoke a privilege from a role, use the `REVOKE` command:\n\n```sql\n\
    SQL> revoke create database link from jr_dba;\n```\n\nSimilarly, use the `REVOKE`\
    \ command to remove a role from a user:\n\n```sql\nSQL> revoke jr_dba from lellison;\n\
    ```\n\n**Note:** Unlike other database objects, roles don’t have owners. A role\
    \ is defined by the privileges assigned to it.\n\n![](index-165_1.png)\n\n![](index-167_1.png)\n\
    \nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\n***Table 7–1**. Oracle Table Type Descriptions*\n\
    \n| **Table Type**   | **Description**                                       \
    \    | **Typical Use**                                                       \
    \          |\n| :--------------- | :--------------------------------------------------------\
    \ | :------------------------------------------------------------------------------\
    \ |\n| Heap-organized   | The default table type and the most commonly used. \
    \       | Table type to use unless you have a specific reason to use a different\
    \ type.     |\n| Temporary        | Session private data, stored for the duration\
    \ of a session or transaction. Space is allocated in temporary segments. | Program\
    \ needs a temporary table structure to store and sort data. Table isn’t required\
    \ after program ends. |\n| Index-organized (IOT) | Data stored in a B-tree index\
    \ structure sorted by primary key. | Table is queried mainly on primary key columns.\
    \ Provides fast random access.     |\n| Partitioned      | A logical table that\
    \ consists of separate physical segments. | Type used with large tables with millions\
    \ of rows.                               |\n| Clustered        | A group of tables\
    \ that share the same data blocks.        | Type used to reduce I/O for tables\
    \ that are often joined on the same columns.    |\n| External         | Tables\
    \ that use data stored in operating system files outside of the database. | Type\
    \ lets you efficiently access data in a file outside of the database (like a CSV\
    \ file). |\n| Nested           | A table with a column with a data type that is\
    \ another table. | Rarely used.                                              \
    \                     |\n| Object           | A table with a column with a data\
    \ type that is an object type. | Rarely used.                                \
    \                                   |\n\nThis chapter focuses on the table types\
    \ that are most often used, in particular heap-organized, index-organized, and\
    \ temporary tables. Partitioned tables are used extensively in data warehouse\
    \ environments and are covered separately in Chapter 12. For details on table\
    \ types not covered in this chapter, see the *Oracle SQL Reference Guide*, which\
    \ is available for download from http://otn.oracle.com.\n\nThe number of table\
    \ features expands with each new version of Oracle. Consider this: the *Oracle\
    \ SQL Reference Guide* presents nearly 80 pages of syntax associated with the\
    \ `CREATE TABLE` statement. On top of that, the `ALTER TABLE` statement takes\
    \ up another 80 plus pages of details related to table maintenance. For most situations,\
    \ you typically need to use only a fraction of the table options available.\n\n\
    CHAPTER 7 ■ TABLES AND CONSTRAINTS\n\n## Creating a Table\n\nListed next are the\
    \ general factors you should consider when creating a table:\n\n- Type of table\
    \ (heap-organized, temporary, index-organized, partitioned, and so on)\n- Naming\
    \ conventions\n- Column data types and sizes\n- Constraints (primary key, foreign\
    \ keys, and so on)\n- Index requirements (see Chapter 8 for details)\n- Initial\
    \ storage requirements\n- Special features such as virtual columns, read-only,\
    \ parallel, compression, no logging, and so on\n- Growth requirements\n- Tablespace(s)\
    \ for the table and its indexes\n\nBefore you run a `CREATE TABLE` statement,\
    \ you need to give some thought to each item in the previous list. To that end,\
    \ DBAs often use data-modeling tools to help manage the creation of DDL scripts\
    \ that are used to create database objects. Data-modeling tools allow you to visually\
    \ define tables and relationships and the underlying database features.\n\n###\
    \ Creating a Heap-Organized Table\n\nYou use the `CREATE TABLE` statement to create\
    \ tables. When creating a table, at minimum you must specify the table name, column\
    \ name(s), and data types associated with the columns. The Oracle default table\
    \ type is heap-organized. The term *heap* means that the data isn’t stored in\
    \ a specific order in the table (instead, it’s a heap of data). Here’s a simple\
    \ example of creating a heap-organized table with four columns:\n\n```sql\ncreate\
    \ table d_sources(\n  d_source_id number not null,\n  source_type varchar2(32),\n\
    \  create_dtt date default sysdate not null,\n  update_dtt timestamp(5)\n);\n\
    ```\n\nIf you don’t specify a tablespace, then the table is created in the default\
    \ permanent tablespace of the user that creates the table. Allowing the table\
    \ to be created in the default permanent tablespace is fine for a few small test\
    \ tables. For anything more sophisticated, you should explicitly specify the tablespace\
    \ in which you want tables created.\n\nUsually, when you create a table, you should\
    \ also specify constraints, such as the primary key. The following code shows\
    \ the most common features you use when creating a table. This DDL defines primary\
    \ keys, foreign keys, tablespace information, and comments:\n\n```sql\ncreate\
    \ table operating_systems(\n  operating_system_id number(19, 0) not null,\n  version\
    \ varchar2(50),\n  os_name varchar2(256),\n  release varchar2(50),\n  vendor varchar2(50),\n\
    \  create_dtt date default sysdate not null,\n  update_dtt date,\n  constraint\
    \ operating_systems_pk primary key (operating_system_id)\n    using index tablespace\
    \ inv_mgmt_index\n) tablespace inv_mgmt_data;\n--\n\ncreate unique index operating_system_uk1\
    \ on operating_systems\n  (os_name, version, release, vendor)\n  tablespace inv_mgmt_index;\n\
    --\n\ncreate table computer_systems(\n  computer_system_id number(38, 0) not null,\n\
    \  agent_uuid varchar2(256),\n  operating_system_id number(19, 0) not null,\n\
    \  hardware_model varchar2(50),\n  create_dtt date default sysdate not null,\n\
    \  update_dtt date,\n  constraint computer_systems_pk primary key (computer_system_id)\n\
    \    using index tablespace inv_mgmt_index\n) tablespace inv_mgmt_data;\n--\n\n\
    comment on column computer_systems.computer_system_id is\n  'Surrogate key generated\
    \ via an Oracle sequence.';\n--\n\ncreate unique index computer_system_uk1 on\
    \ computer_systems(agent_uuid) tablespace inv_mgmt_index;\n--\n\nalter table computer_systems\
    \ add constraint computer_systems_fk1\n  foreign key (operating_system_id)\n \
    \ references operating_systems(operating_system_id);\n```\n\nWhen creating a table,\
    \ I usually don’t specify table-level physical space properties. If you don’t\
    \ specify table-level space properties, then the table inherits its space properties\
    \ from the tablespace in which it’s created. This simplifies administration and\
    \ maintenance. If you have tables that require different physical space properties,\
    \ then you can create separate tablespaces to hold tables with differing needs.\
    \ For example, you might create a `DATA_LARGE` tablespace with extent sizes of\
    \ 16MB and a `DATA_SMALL` tablespace with extents sizes of 128KB, and choose where\
    \ a table is created based on its storage requirements. See Chapter 4 for details\
    \ regarding the creation of tablespaces.\n\nTable 7–2 lists some guidelines to\
    \ consider when creating tables. These aren’t hard and fast rules; adapt them\
    \ as needed for your environment. Some of these guidelines may seem like obvious\
    \ suggestions. However, after inheriting many databases over the years, I’ve seen\
    \ each of these recommendations violated in some way that makes database maintenance\
    \ difficult and unwieldy.\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\n***Table 7–2.**\
    \ Guidelines to Consider When Creating Tables*\n\n| **Recommendation**       \
    \                                                                            \
    \                                          | **Reasoning**                   \
    \                                                                            \
    \                                  |\n| :---------------------------------------------------------------------------------------------------------------------------------------------\
    \ | :--------------------------------------------------------------------------------------------------------------------------------------------\
    \ |\n| Use standards when naming tables, columns, constraints, triggers, indexes,\
    \ and so on.                                                          | Helps\
    \ document the application and simplifies maintenance.                       \
    \                                                            |\n| If a column\
    \ always contains numeric data, make it a number data type.                  \
    \                                                        | Enforces a business\
    \ rule and allows for the greatest flexibility, performance, and consistent results\
    \ when using Oracle SQL math functions (which may behave differently for an “01”\
    \ character versus a 1 number). |\n| If you have a business rule that defines\
    \ the length and precision of a number field, then enforce it: for example, `NUMBER(7,2)`.\
    \ If you don’t have a business rule, make it `NUMBER(38)`. | Enforces a business\
    \ rule and keeps the data cleaner.                                           \
    \                                              |\n| For character data that is\
    \ of variable length, use `VARCHAR2` (and not `VARCHAR`).                    \
    \                                          | Follows Oracle’s recommendation of\
    \ using `VARCHAR2` for character data (instead of `VARCHAR`). The Oracle documentation\
    \ states that in the future, `VARCHAR` will be redefined as a separate data type.\
    \ |\n| If you have a business rule that specifies the maximum length of a column,\
    \ then use that length, as opposed to making all columns `VARCHAR2(4000)`. | Enforces\
    \ a business rule and keeps the data cleaner.                                \
    \                                                         |\n| Use `DATE` and\
    \ `TIMESTAMP` data types appropriately.                                      \
    \                                                     | Enforces a business rule,\
    \ ensures that the data is of the appropriate format, and allows for the greatest\
    \ flexibility when using SQL date functions. |\n| Specify a separate tablespace\
    \ for the table and indexes. Let the table and indexes inherit storage attributes\
    \ from the tablespaces.             | Simplifies administration and maintenance.\
    \                                                                            \
    \                       |\n| Most tables should be created with a primary key.\
    \                                                                            \
    \                  | Enforces a business rule and allows you to uniquely identify\
    \ each row.                                                                  \
    \     |\n| Create a numeric surrogate key to be the primary key for each table.\
    \ Populate the surrogate key from a sequence.                               |\
    \ Makes joins easier and more efficient.                                     \
    \                                                                  |\n| Create\
    \ primary-key constraints out of line.                                       \
    \                                                              | Allows you more\
    \ flexibility when creating the primary key, especially if you have a situation\
    \ where the primary key consists of multiple columns. |\n\nCHAPTER 7 ■ TABLES\
