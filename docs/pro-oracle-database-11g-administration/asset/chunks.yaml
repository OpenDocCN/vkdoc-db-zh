  trans: "\n# 第 16 章 ■ 用户管理的备份与恢复\n\n如果您在开始标记和结束标记之间的所有重做数据都应用到数据文件之前，尝试停止恢复过程，Oracle\
    \ 将抛出此错误：\n\n`ORA-01195: online backup of file 1 needs more recovery to be consistent`\n\
    \n在表空间热备份期间生成的所有重做数据必须应用到数据文件后，才能打开它们。Oracle 至少需要应用从开始备份 SCN 标记到结束备份标记之间的所有重做数据，以涵盖表空间处于备份模式时修改的每一个数据块。这些重做数据存档在归档重做日志文件中；或者，如果故障恰好发生在备份结束后，部分重做数据可能尚未归档，而存在于在线重做日志中。因此，您必须指示\
    \ Oracle 应用在线重做日志中的内容。\n\n## 理解数据文件*确实*被更新\n\n请注意，在图 16-2 和图 16-3 中，数据库写入器的行为在备份过程中基本保持不变。无论数据库处于何种备份模式，数据库写入器都会持续将数据块写入数据文件。它并不关心是否正在进行热备份；它的职责就是将数据块从缓冲区缓存写入数据文件。\n\
    \n偶尔，您会遇到一位声称在用户管理的热备份期间，数据库写入器不会写入数据文件的 DBA。这是一种普遍的误解。运用一些常识：如果在热备份期间数据库写入器不写入数据文件，那么修改是在哪里被写入的呢？如果事务被写入数据文件以外的地方，那么备份后这些数据文件如何重新同步呢？这根本说不通。\n\
    \n一些 DBA 说：“数据文件头被冻结了，这意味着数据文件没有变化。” Oracle 确实会冻结 SCN 以在数据文件头中标记热备份的开始，并且在表空间退出备份模式之前不会更新该\
    \ SCN。这个“冻结的 SCN”并不意味着在备份期间没有数据块被写入数据文件。您可以通过以下操作轻松证明在备份模式下数据文件会被写入：\n\n1.  将表空间至于备份模式：\n\
    \    `SQL> alter tablespace users begin backup;`\n2.  创建一个包含字符字段的表：\n    `SQL>\
    \ create table cc(cc varchar2(20)) tablespace users;`\n3.  向该表中插入一个字符串：\n    `SQL>\
    \ insert into cc values('DBWR does write');`\n4.  切换在线重做日志文件以强制执行检查点：\n    `SQL>\
    \ alter system switch logfile;`\n5.  在操作系统层面，使用 `strings` 和 `grep` 命令在数据文件中搜索该字符串：\n\
    \    `$ strings /ora02/dbfile/O11R2/users01.dbf | grep \"DBWR does write\"`\n\
    6.  以下是证明数据库写入器确实将数据写入磁盘的输出：`DBWR does write`\n7.  别忘了将表空间退出备份模式：\n    `SQL> alter\
    \ tablespace users end backup;`\n\n## 执行归档日志模式数据库的完全恢复\n\n*完全恢复*意味着您可以恢复故障发生前所有已提交的事务。\n\
    \n完全恢复并不意味着您必须完全恢复和恢复整个数据库。例如，如果只有一个数据文件发生了介质故障，您只需恢复和恢复受损的数据文件即可完成完全恢复。\n\n**提示**\
    \ 如果您有权访问测试或开发数据库，请花时间逐步完成本节中每个示例的每个步骤。实践这些步骤比任何文档都能教会您更多关于备份与恢复的知识。\n\n本节的步骤适用于在归档日志模式下备份的任何数据库。无论您进行的是冷备份还是热备份都没关系。只要备份时数据库处于归档日志模式，恢复和还原数据文件的步骤都是相同的。对于完全恢复，您需要：\n\
    \n*   能够还原发生介质故障的数据文件\n*   能够访问自上次备份开始以来生成的所有归档重做日志\n*   拥有完整的在线重做日志。\n\n以下是完全恢复的基本过程：\n\
    \n1.  任何需要还原的数据文件在还原前必须处于脱机状态；最简单的实现方法是将数据库置于加载模式。\n2.  使用操作系统复制实用程序还原受损的数据文件。\n\
    3.  发出相应的 SQL*Plus `RECOVER` 命令，以应用归档重做日志和在线重做日志中所需的任何信息。\n4.  将数据库打开。\n\n接下来的几个小节将演示一些常见的完全还原和恢复场景。您应该能够运用这些基本场景来诊断和恢复您遇到的任何复杂情况。\n\
    \n## 数据库脱机时的还原与恢复\n\n本节详细描述了一个简单的还原与恢复场景。接下来将描述模拟故障然后执行完全还原与恢复的步骤。请在开发数据库中尝试此场景。\n\
    \n确保您有一个良好的备份，并且不要在包含关键业务数据的数据库中尝试此实验。\n\n在开始此示例之前，请创建一个表并插入一些数据。在完全恢复过程的最后将选择此表和数据，以证明恢复成功：\n\
    ```sql\nSQL> create table foo(foo number) tablespace users;\nSQL> insert into\
    \ foo values(1);\nSQL> commit;\n```\n\n现在，多次切换在线日志。这样做可以确保在恢复过程中必须应用归档重做日志：\n\
    ```sql\nSQL> alter system switch logfile;\nSQL> /\nSQL> /\nSQL> /\n```\n\n接下来，通过重命名与\
    \ USERS 表空间关联的数据文件来模拟介质故障。您可以通过以下查询识别与 USERS 表空间关联的数据文件名称：\n```sql\nSQL> select\
    \ file_name from dba_data_files where tablespace_name='USERS';\nFILE_NAME\n/ora02/dbfile/O11R2/users01.dbf\n\
    ```\n\n在操作系统层面，重命名该文件：\n```bash\n$ mv /ora02/dbfile/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf.old\n\
    ```\n\n并尝试停止您的数据库：\n```bash\n$ sqlplus / as sysdba\nSQL> shutdown immediate;\n\
    ```\n\n您应该看到类似以下的错误：\n`ORA-01110: data file 4: '/ora02/dbfile/O11R2/users01.dbf'`\n\
    `ORA-27041: unable to open file`\n\n如果这是一场真实的灾难，谨慎的做法是导航到数据文件目录，列出文件，并查看相关文件是否在其正确的位置。您还应该检查\
    \ `alert.log` 文件，看看 Oracle 是否在其中记录了任何相关信息。\n\n既然您已经模拟了介质故障，接下来的几个步骤将引导您完成还原和完全恢复。\n\
    \n### 步骤 1：将数据库置于加载模式\n\n在将数据库置于加载模式之前，您可能需要先使用 `ABORT` 选项关闭它：\n```bash\n$ sqlplus\
    \ / as sysdba\nSQL> shutdown abort;\nSQL> startup mount;\n```\n\n### 步骤 2：从备份中还原数据文件\n\
    \n下一步是将备份中对应于故障文件的数据文件复制回来：\n```bash\n$ cp /oradump/hbackup/O11R2/users01.dbf\
    \ /ora02/dbfile/O11R2/users01.dbf\n```\n\n此时，思考一下如果您尝试启动数据库，Oracle 会做什么是很有启发性的。当您发出\
    \ `ALTER DATABASE OPEN` 语句时，Oracle 会检查控制文件中每个数据文件的 SCN。您可以通过查询 `V$DATAFILE` 来检查此\
    \ SCN：\n```sql\nSQL> select checkpoint_change# from v$datafile where file#=4;\n\
    CHECKPOINT_CHANGE#\n```\n\nOracle 将控制文件中的 SCN 与数据文件头中的 SCN 进行比较。您可以通过查询 `V$DATAFILE_HEADER`\
    \ 来检查数据文件头中的 SCN。例如：\n```sql\nSQL> select file#, checkpoint_change# from v$datafile_header\
    \ where file#=4;\nFILE# CHECKPOINT_CHANGE#\n---------- ------------------\n4 17779631\n\
    ```\n"
- fmt: '# CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    Notice that the `SCN` recorded in `V$DATAFILE_HEADER` is less than the `SCN` in
    `V$DATAFILE` for the same datafile. If you attempt to open your database, Oracle
    throws an error stating that media recovery is required (meaning you need to apply
    redo) to synchronize the `SCN` in the datafile with the `SCN` in the control file.
    Here’s what happens when you attempt to open the database at this point:


    ```

    SQL> alter database open;


    alter database open;


    alter database open


    *


    ERROR at line 1:

    ORA-01113: file 4 needs media recovery

    ORA-01110: data file 4: ''/ora02/dbfile/O11R2/users01.dbf''

    ```


    Oracle doesn’t let you open the database until the `SCN` in all datafile headers
    matches the corresponding `SCN` in the control file.


    ## Step 3: Issue the Appropriate `RESTORE` Statement


    The archive-redo logs and online-redo logs have the information required to catch
    the datafile `SCN` up to the control-file `SCN`. You can apply redo to the datafile
    that needs media recovery by issuing one of the following `SQL*Plus` statements:


    - `RECOVER DATAFILE`

    - `RECOVER TABLESPACE`

    - `RECOVER DATABASE`


    Because only one datafile in this example needs to be recovered, the `RECOVER
    DATAFILE` statement is appropriate. However, keep in mind that you can run any
    of the previously listed `RECOVER` statements, and Oracle will figure out what
    needs to be recovered. In this particular scenario, you may find it easier to
    remember the name of the tablespace that contains the restored datafile(s) than
    to remember the datafile name(s). Next, any datafiles that need recovery in the
    `USERS` tablespace are recovered:


    `SQL> recover tablespace users;`


    At this point, Oracle uses the `SCN` in the datafile header to determine which
    archive-redo log or online-redo log to use to begin applying redo. If all of the
    redo required is in the online-redo logs, Oracle applies that redo and displays
    this message:


    `Media recovery complete.`


    If Oracle needs to apply redo that is only contained in archived redo logs (meaning
    that the online-redo log that contained the appropriate redo has already been
    overwritten), you’re prompted with a recommendation from Oracle as to which archive-redo
    log to apply first:


    ```

    ORA-00279: change 17779631 generated at 08/21/2010 04:51:22 needed for thread
    1

    ORA-00289: suggestion : /ora02/oraarch/O11R2/1_33_726314508.arc

    ORA-00280: change 17779631 for thread 1 is in sequence #33

    Specify log: {<RET>=suggested | filename | AUTO | CANCEL}

    ```


    You can press Enter or Return (`<RET>`) to have Oracle apply the suggested archive-redo
    log file, or specify a filename, or specify `AUTO` to instruct Oracle to automatically
    apply any suggested files, or type `CANCEL` to cancel out of the recovery operation.


    In this example, specify `AUTO`. Oracle applies all redo in all archive-redo log
    files and online-redo log files to perform a complete recovery:


    ```

    AUTO

    ```


    The last message displayed after all required archive redo and online redo has
    been applied is this: `Log applied.`


    `Media recovery complete.`


    ## Step 4: Alter Your Database Open


    After the media recovery is successful, you can open your database:


    `SQL> alter database open;`


    You can now verify that the transaction you committed just prior to the media
    failure was restored and recovered:


    `SQL> select * from foo;`


    `FOO`


    ## Restoring and Recovering with a Database Online


    If you lose a datafile associated with a tablespace other than with `SYSTEM` and
    `UNDO`, you can restore and recover the damaged datafile while leaving the database
    online. For this to work, any datafiles being restored and recovered must be taken
    offline first. You may be alerted to an issue with one datafile when a user is
    attempting to update a table and sees an error such as this:


    `SQL> insert into foo values(2);`


    ```

    ORA-01116: error in opening database file 4

    ORA-01110: data file 4: ''/ora02/dbfile/O11R2/users01.dbf''

    ORA-27041: unable to open file

    ```


    You navigate to the OS directory that contains the datafile, and determine that
    the datafile has been erroneously removed by a system administrator.'
