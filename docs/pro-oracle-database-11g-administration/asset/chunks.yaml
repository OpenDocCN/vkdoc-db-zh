    RMAN to Stop/Start Oracle


    You can use RMAN to stop and start your database with methods that are almost
    identical to those available through SQL*Plus. When performing restore and recovery
    operations, it’s often more convenient to stop and start your database from within
    RMAN. The following RMAN commands can be used to stop and start your database:


    • SHUTDOWN


    • STARTUP


    • ALTER DATABASE


    Shutting Down


    The SHUTDOWN command works the same from RMAN as it does from SQL*Plus. There
    are four types of shutdown: ABORT, IMMEDIATE, NORMAL, and TRANSACTIONAL. I usually
    first attempt to use SHUTDOWN


    IMMEDIATE to stop a database. If that doesn''t work, don''t hesitate to use SHUTDOWN
    ABORT. Here are some examples:


    RMAN> shutdown immediate;


    RMAN> shutdown abort;


    If you don''t specify a shutdown option, NORMAL is the default. Shutting a database
    down with NORMAL


    is rarely viable as this mode waits for currently connected users to disconnect
    at their leisure. I never use NORMAL when shutting down a database.


    Starting Up


    As with SQL*Plus, you can use a combination of STARTUP and ALTER DATABASE commands
    to step the database through startup phases using RMAN, like so:


    RMAN> startup nomount;


    RMAN> alter database mount;


    RMAN> alter database open;


    Here''s another example:


    RMAN> startup mount;


    RMAN> alter database open;


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    If you want to start the database with restricted access, use the DBA option:
    RMAN> startup dba;


    Complete Recovery


    Complete recovery means that you can restore all transactions that were committed
    before the failure occurred. Complete recovery does not mean that you are restoring
    and recovering all datafiles in your database. For example, you can perform a
    complete recovery if you have a media failure with one datafile, and you restore
    and recover the one datafile. For complete recovery, the following conditions
    must be true:


    •


    Your database is in archivelog mode.


    •


    You have a good baseline backup of your database.


    •


    You have any required redo that has been generated since the last backup.


    •


    All archive redo logs start from the point that the last online backup began.


    •


    If using, any incremental backups that RMAN can use for recovery must be available


    •


    Online redo logs that contain transactions that have not yet been archived must
    be available.


    If you''ve experienced a media failure and you have the required files to perform
    a complete recovery, then you can restore and recover your database.


    Testing Restore and Recovery


    You can determine which files RMAN will use for restore and recovery before you
    actually perform the restore and recovery. You can also instruct RMAN to verify
    the integrity of the backup files that will be used for restore and recovery.


    Previewing Backups Used for Recovery


    Use the RESTORE...PREVIEW command to list the backups and archive redo log files
    that RMAN will use to restore and recover database datafiles. The RESTORE...PREVIEW
    does not actually restore any files; rather, it lists out the backup files that
    will be used for a restore operation. This example previews in detail the backups
    required for restore and recovery for the entire database: RMAN> restore database
    preview;


    You can also preview require backup files at a summarized level of detail: RMAN>
    restore database preview summary;


    Here is a snippet of the output:


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    List of Backups


    ===============


    Key TY LV S Device Type Completion Time #Pieces #Copies Com Tag


    ------- -- -- - ----------- --------------- ------- ------- --- ---


    571 B F A DISK 22-SEP-10 1 1 YES TAG20100922T141215


    570 B F A DISK 22-SEP-10 1 1 YES TAG20100922T141215


    List of Archived Log Copies for database with db_unique_name O11R2


    =====================================================================


    Key Thrd Seq S Low Time


    ------- ---- ------- - ---------


    878 1 1 A 22-SEP-10


    Media recovery start SCN is 19993679


    Recovery must be done beyond SCN 19993680 to clear datafile fuzziness Here are
    some more examples of how to preview backups required for restore and recovery:
    RMAN> restore tablespace system preview;


    RMAN> restore archivelog from time ''sysdate -1'' preview;


    RMAN> restore datafile 1, 2, 3 preview;


    Validating Backup Files Before Restoring


    There are several levels of verification that you can perform on backup files
    without actually restoring anything. If you just want RMAN to verify that the
    files exist and check the file headers, the use the RESTORE...VALIDATE HEADER
    command like so:


    RMAN> restore database validate header;


    This command only validates the existence of files and the file headers. You can
    further instruct RMAN to verify the integrity of blocks within backup files required
    to restore the database datafiles via the RESTORE...VALIDATE command (sans the
    HEADER clause). Again, RMAN will not restore any datafiles in this mode:


    RMAN> restore database validate;


    This command only checks for physical corruption within the backup files. You
    can also check for logical corruption (along with physical corruption) as follows:


    RMAN> restore database validate check logical;


    Here are some other examples of using RESTORE...VALIDATE:


    RMAN> restore datafile 1,2,3 validate;


    RMAN> restore archivelog all validate;


    RMAN> restore controlfile validate;


    RMAN> restore tablespace system validate;


    Testing Media Recovery


    The prior sections covered reporting and verifying the restore operations. You
    can also instruct RMAN to verify the recovery process via the RECOVER...TEST command.
    Before performing a test recovery, you need to ensure that the datafiles being
    recovered are offline. Oracle will throw an error for any online datafiles being
    recovered in test mode.


    In this example, the tablespace USERS is restored first, and then a trial recovery
    is performed: 517


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    RMAN> connect target /


    RMAN> startup mount;


    RMAN> restore tablespace users;


    RMAN> recover tablespace users test;


    If there are any missing archive redo logs that are required for recovery, the
    following error is thrown:


    RMAN-06053: unable to perform media recovery because of missing log


    RMAN-06025: no backup of archived log for thread 1 with sequence 10 and starting
    SCN...


    If the testing of the recovery succeeded, you will messages like the following,
    indicating the application of redo was tested but not applied:


    ORA-10574: Test recovery did not corrupt any data block


    ORA-10573: Test recovery tested redo from change 19993679 to 19993861


    ORA-10572: Test recovery canceled due to errors


    ORA-10585: Test recovery can not apply redo that may modify control file Here
    are some other examples of testing the recovery process:


    RMAN> recover database test;


    RMAN> recover tablespace users, tools test;


    RMAN> recover datafile 1,2,3 test;


    Restoring Entire Database


    The RESTORE DATABASE command will restore every datafile in your database. The
    exception to this is when RMAN detects that datafiles have already been restored;
    in that case, it will not restore them again.


    If you want to override that behavior, use the FORCE command.


    When you issue the RECOVER DATABASE command, RMAN will automatically apply redo
    to any datafiles that need recovery. The recovery process includes applying changes
    found in the following:


    • Incremental backup pieces (applicable only if using incremental backups)


    • Archived redo log files (generated since the last backup or last incremental
    backup that is applied)


    • Online redo log files (current and unarchived)


    You can open your database after the restore and recovery process is complete.
    Complete database recovery works only if you have good backups of your database
    and have access to all redo generated after the backup was taken. You need all
    the redo required to recover the database datafiles. If you don’t have all the
    required redo, then you’ll most likely have to perform an incomplete recovery
    (covered later in this chapter).


    ■ **Note** Your database has to be at least mounted to restore datafiles using
    RMAN. This is because RMAN reads information from the control file during the
    restore and recovery process.


    You can perform a complete database-level recovery with either the current control
    file or a backup control file.


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    Using Current Control File


    You must first put your database in mount mode to perform a database-wide restore
    and recovery. This is because the SYSTEM tablespace datafile(s) must be offline
    when being restored and recovered. Oracle won’t allow you to operate your database
    in open mode with datafiles associated with the SYSTEM


    tablespace offline. In this situation, start up the database in mount mode, issue
    the RESTORE and RECOVER


    commands, and then open the database like so:


    RMAN> connect target /


    RMAN> startup mount;


    RMAN> restore database;


    RMAN> recover database;


    RMAN> alter database open;


    If everything went as expected, the last message you should see is this: database
    opened


    Using Backup Control File


    This solution uses a backup of the control file retrieved from the fast recovery
    area. For more examples of how to restore your control file, see the “Restoring
    Control Files” section of this chapter. In this scenario, the control file is
    first retrieved from a backup before restoring and recovering the database: RMAN>
    connect target /


    RMAN> startup nomount;


    RMAN> restore controlfile from autobackup;


    RMAN> alter database mount;


    RMAN> restore database;


    RMAN> recover database;


    RMAN> alter database open resetlogs;


    If everything went as expected, the last message you should see is this: database
    opened


    ■ **Note** You are required to open your database with the OPEN RESETLOGS command
    anytime you use a backup control file during a recovery operation.


    Restoring Tablespaces


    Sometimes you''ll have media failures that are localized to a particular tablespace
    or set of tablespaces.


    In these circumstances, it''s appropriate to restore and recover at the tablespace
    level of granularity. The RMAN RESTORE TABLESPACE and RECOVER TABLESPACE commands
    will restore and recover all datafiles associated with the specified tablespace(s).


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    Restoring Tablespace While Database is Open


    If your database is open, then you must take offline the tablespace you want to
    restore and recover. You can do this for any tablespaces except for SYSTEM and
    UNDO. This example restores and recovers the USERS


    tablespace while database is open:


    RMAN> connect target /


    RMAN> sql ''alter tablespace users offline immediate'';


    RMAN> restore tablespace users;


    RMAN> recover tablespace users;


    RMAN> sql ''alter tablespace users online'';


    After the tablespace is brought online, you should see a message similar to this:
    sql statement: alter tablespace users online


    Restoring Tablespace While Database in Mount Mode


    Usually when performing a restore and recovery, DBAs will shut down the database
    re-start the database in mount mode in preparation to perform the recovery. While
    a database is mount mode this ensures that no users are connecting to the database
    and also ensures that no transactions are transpiring. This next example restores
    the SYSTEM tablespace while the database is in mount mode: RMAN> connect target
    /


    RMAN> shutdown immediate;


    RMAN> startup mount;


    RMAN> restore tablespace system;


    RMAN> recover tablespace system;


    RMAN> alter database open;


    If everything was successful, the last message you should see is this: database
    opened


    Restoring Read-Only Tablespaces


    RMAN will restore read-only tablespaces along with the rest of the database when
    you issue a RESTORE


    DATDABASE command. For example, the following command will restore all datafiles
    (including those in read-only mode):


    RMAN> restore database;


    Prior to Oracle Database 11 *g*, you were required to issue RESTORE DATABASE CHECK
    READONLY to instruct RMAN to restore read-only tablespaces along with tablespaces
    in read-write mode. This is no longer a requirement in Oracle Database 11 *g*
    or higher.


    ■ **Note** If you are using a backup that was created after the read-only tablespace
    was placed into read-only mode, then no recovery is necessary for the read-only
    datafiles. In this situation, there is no redo that has been generated for the
    read-only tablespace since it was backed up.


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    Restoring Temporary Tablespaces


    Starting with Oracle Database 10 *g*, you don’t have to restore or re-create missing
    locally managed temporary tablespace tempfiles. When you open your database for
    use, Oracle automatically detects and re-creates locally managed temporary tablespace
    tempfiles.


    When Oracle automatically re-creates a temporary tablespace, it will log a message
    to your target database alert.log similar to the following:


    Re-creating tempfile <your temporary tablespace filename>


    If for any reason your temporary tablespace becomes unavailable, you can also
    re-create it yourself.


    Since there are never any permanent objects in temporary tablespaces, you can
    simply re-create them as needed. Here is an example of how to create a locally
    managed temporary tablespace: CREATE TEMPORARY TABLESPACE temp TEMPFILE


    ''/ora03/oradata/BRDSTN/temp01.dbf'' SIZE 5000M REUSE


    EXTENT MANAGEMENT LOCAL UNIFORM SIZE 512K;


    If your temporary tablespace exists but the temporary datafiles are missing, you
    can simply add the temporary datafile(s) as shown here:


    alter tablespace temp


    add tempfile ''/ora03/oradata/BRDSTN/temp01.dbf'' SIZE 5000M REUSE;


    Restoring Datafiles


    A datafile-level restore and recovery works well when a media failure is isolated
    to a small set of datafiles.


    With datafile-level recoveries, you can instruct RMAN to restore and recover either
    with datafile number or the datafile name. For datafiles not associated with the
    SYSTEM or UNDO tablespaces, you have the option of restoring and recovering while
    the database remains open. While the database is open, you have to first take
    offline any datafiles being restored and recovered.


    Restoring Datafile While Database Is Open


    Use the RESTORE DATAFILE and RECOVER DATAFILE commands to restore and recover
    at the datafile level.


    When your database is open, you’re required to take offline any datafiles you’re
    attempting to restore and recover. This example restores and recovers datafiles
    32 and 33 while the database is open: RMAN> sql ''alter database datafile 32,
    33 offline'';


    RMAN> restore datafile 32, 33;


    RMAN> recover datafile 32, 33;


    RMAN> sql ''alter database datafile 32, 33 online'';


    ■ **Tip** Use the RMAN REPORT SCHEMA command to list datafile names and file numbers.
    You can also query the NAME and FILE# columns of V$DATAFILE to take names and
    numbers.


    You can also specify the name of the datafile that you want to restore and recover.
    In this example, the mvdata01.dbf datafile is restored and recovered:


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    RMAN> sql "alter database datafile ''''/ora01/dbfile/O11R2/mvdata01.dbf'''' offline";
    RMAN> restore datafile ''/ora01/dbfile/O11R2/mvdata01.dbf'';


    RMAN> recover datafile ''/ora01/dbfile/O11R2/mvdata01.dbf'';


    RMAN> sql "alter database datafile ''''/ora01/dbfile/O11R2/mvdata01.dbf'''' online";


    ■ **Note** When using the RMAN SQL command, if there are single quote marks within
    the SQL statement, then you are required to use double quotes to enclose the entire
    SQL statement and to use two single quote marks where you would ordinarily just
    use one quote mark.


    Restoring Datafile While Database Is Not Open


    In this scenario, the database is first shut down and then started in mount mode.
    You can restore and recover any datafile in your database while the database is
    not open. This example shows restoring the datafile 1, which is associated to
    the SYSTEM tablespace:


    RMAN> connect target /


    RMAN> shutdown abort;


    RMAN> startup mount;


    RMAN> restore datafile 1;


    RMAN> recover datafile 1;


    RMAN> alter database open;


    You can also specify the filename when performing a datafile recovery: RMAN> connect
    target /


    RMAN> shutdown abort;


    RMAN> startup mount;


    RMAN> restore datafile ''/ora01/dbfile/O11R2/system01.dbf'';


    RMAN> recover datafile ''/ora01/dbfile/O11R2/system01.dbf'';


    RMAN> alter database open;


    Restoring Datafiles to Non-Default Locations


    Sometimes a failure will occur that renders the disks associated with a mount
    point inoperable. In situations like this, you will need to restore and recover
    the datafiles to a different location from where they originally resided. Another
    typical need for restoring datafiles to non-default locations is that you''re
    restoring to a different database server where the mount points are completely
    different from the server where the backup originated.


    Use the SET NEWNAME and SWITCH commands to restore datafiles to non-default locations.
    Both of these commands must be run from within an RMAN run{} block. You can think
    of using SET NEWNAME


    and SWITCH as a way to rename datafiles (similar to the SQL*Plus ALTER DATABASE
    RENAME FILE


    statement).


    This example changes the location of datafiles 32 and 33:


    RMAN> connect target /


    RMAN> startup mount;


    RMAN> run{


    2> set newname for datafile 32 to ''/ora02/dbfile/O11R2/mvdata01.dbf''; 522


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    3> set newname for datafile 33 to ''/ora02/dbfile/O11R2/mvindex01.dbf''; 4> restore
    datafile 32, 33;


    5> switch datafile all; # Updates repository with new datafile location.


    6> recover datafile 32, 33;


    7> alter database open;


    8> }


    This is a partial listing of the output:


    channel ORA_DISK_2: restore complete, elapsed time: 00:00:01


    Finished restore at 22-SEP-10


    ...


    datafile 32 switched to datafile copy


    input datafile copy RECID=92 STAMP=730375692 file name=/ora02/dbfile/O11R2/mvdata01.dbf
    datafile 33 switched to datafile copy


    input datafile copy RECID=93 STAMP=730375692 file name=/ora02/dbfile/O11R2/mvindex01.dbf


    ...


    Starting recover at 22-SEP-10


    media recovery complete, elapsed time: 00:00:05


    Finished recover at 22-SEP-10


    database opened


    If the database is open, you can place the datafiles offline and then set their
    new names for restore and recovery like so:


    RMAN> run{


    2> sql ''alter database datafile 32, 33 offline'';


    3> set newname for datafile 32 to ''/ora02/dbfile/O11R2/mvdata01.dbf''; 4> set
    newname for datafile 33 to ''/ora02/dbfile/O11R2/mvindex01.dbf''; 5> restore datafile
    32, 33;


    6> switch datafile all; # Updates repository with new datafile location.


    7> recover datafile 32, 33;


    8> sql ''alter database datafile 32, 33 online'';


    9> }


    You should now see a message similar to the following:


    starting media recovery


    Finished recover at 22-SEP-10


    sql statement: alter database datafile 32, 33 online


    Performing Block Level Recovery


    Block-level corruption is rare and is usually caused by some sort of I/O error.
    However, if you do have an isolated corrupt block within a large datafile, it’s
    nice to have the option of performing a block-level recovery. Block-level recovery
    is useful when a small number of blocks are corrupt within a datafile.


    Block recovery is not appropriate if the entire datafile needs media recovery.


    RMAN will automatically detect corrupt blocks whenever a BACKUP, VALIDATE, or
    BACKUP VALIDATE


    command is run. Details on corrupt blocks can be viewed in the V$DATABASE_BLOCK_CORRUPTION
    view. In the following example, the regular backup job has reported a corrupt
    block in the output: ORA-19566: exceeded limit of 0 corrupt blocks for file...


    Querying the V$DATABASE_BLOCK_CORRUPTION view indicates which file contains corruption:
    SQL> select * from v$database_block_corruption;


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    FILE# BLOCK# BLOCKS CORRUPTION_CHANGE# CORRUPTIO


    ---------- ---------- ---------- ------------------ ---------


    5 20 1 0 ALL ZERO


    Your database can be either mounted or open when performing block level recovery.
    You do not have to take the datafile being recovered offline. You can instruct
    RMAN to recover all blocks reported in V$DATABASE_BLOCK_CORRUPTION as shown:


    RMAN> recover corruption list;


    If successful, the following message is displayed:


    media recovery complete...


    Another way to recover the block is to specify the datafile and block number like
    so: RMAN> recover datafile 5 block 20;


    It''s preferable to use the RECOVER CORRUPTION LIST syntax because it will clear
    out any blocks recovered from the V$DATABASE_BLOCK_CORRUPTION view.


    ■ **Note** RMAN cannot perform block-level recovery on block 1 (datafile header)
    of the datafile.


    Block-level media recovery allows you to keep your database available and also
    reduces the mean time to recovery since only the corrupt blocks are offline during
    the recovery. Your database must be in archivelog mode for performing block-level
    recoveries. In Oracle Database 11 *g*, RMAN can restore the block from the flashback
    logs (if available). If the flashback logs are not available, then RMAN will attempt
    to restore the block from a full backup, a level 0 backup, or an image copy backup
    generated by BACKUP AS COPY command. After the block has been restored, any required
    archived redo logs must be available to recover the block. RMAN can’t perform
    block media recovery using incremental level 1 (or higher) backups.


    ■ **Note** If you’re using Oracle Database 10g or Oracle9i Database, use the BLOCKRECOVER
    command to perform block media recovery. Block level recovery is not available
    in Oracle version 8.


    Restoring Archive Redo Log Files


    RMAN will automatically restore any archived redo log files that it needs during
    a recovery process. You normally don''t need to manually restore archived redo
    log files. However, you may want to manually restore the archived redo log files
    if any of the following situations apply:


    • You need to restore archived redo log files in anticipation of later performing
    a recovery; the idea is that if the archived redo log files are already restored,
    it will speed up the recovery operation.


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    • You’re required to restore the archived redo log files to a non-default location,
    either because of media failure or because of storage space issues.


    • You need to restore specific archived redo log files because you want to inspect
    them via LogMiner.


    If you’ve enabled a flash recovery area, then RMAN will by default restore archived
    redo log files to the destination defined by the initialization parameter DB_RECOVERY_FILE_DEST.
    Otherwise, RMAN uses the LOG_ARCHIVE_DEST_1 initialization parameter to determine
    where to restore the archived redo log files.


    If you restore archived redo log files to a non-default location, RMAN knows the
    location they were restored to and automatically finds these files when you issue
    any subsequent RECOVER commands.


    RMAN will not restore archived redo log files that it determines are already on
    disk. Even if you specify a non-default location, RMAN will not restore an archived
    redo log file to disk if the file already exists. In this situation, RMAN will
    simply return a message stating that the archived redo log file has already been
    restored. Use the FORCE option to override this behavior.


    If you are uncertain of the sequence numbers to use during a restore of log files,
    you can query the V$LOG_HISTORY view or issue an RMAN LIST BACKUP command for
    more information.


    ■ **Note** When restoring archived redo log files, your database can be either
    mounted or open.


    Restoring to the Default Location


    The following command will restore all archived redo log files that RMAN has backed
    up: RMAN> restore archivelog all;


    If you want to restore from a specified sequence, use the FROM SEQUENCE clause.
    You may want to run this query first to determine the most recent log files and
    sequence numbers that have been generated: SQL> select sequence#, first_time from
    v$log_history order by 2;


    This example restores all archived redo log files from sequence 68:


    RMAN> restore archivelog from sequence 68;


    If you want to restore a range of archived redo log files, use the FROM SEQUENCE
    and UNTIL SEQUENCE


    clauses or the SEQUENCE BETWEEN clause, as shown here. The following commands
    restore archived redo log files from sequence 68 through (and including) sequence
    78 using thread 1: RMAN> restore archivelog from sequence 68 until sequence 78
    thread 1; RMAN> restore archivelog sequence between 68 and 78 thread 1;


    By default, RMAN won’t restore an archived redo log file if it is already on disk.
    You can override this behavior if you use the FORCE like so:


    RMAN> restore archivelog from sequence 1 force;


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    Restoring to a Nondefault Location


    Use the SET ARCHIVELOG DESTINATION clause if you want to restore archived redo
    log files to a different location than the default. The following example restores
    to the non-default location of /ora01/archtemp.


    This option of the SET command must be executed from within an RMAN run RMAN run{}
    block.


    RMAN> run{


    2> set archivelog destination to ''/ora01/archtemp'';


    3> restore archivelog from sequence 68 force;


    4> }


    Restoring the Spfile


    You might want to restore a spfile for several different reasons:


    •


    You accidentally set a value in the spfile that keeps your instance from starting.


    •


    You accidentally deleted the spfile.


    •


    You are required to see what it looked like at some time in the past.


    One scenario (this has happened to me more than once) is that you''re using a
    spfile and one of the DBAs on your team does something inexplicable like this:


    SQL> alter system set processes=1000000 scope=spfile;


    The parameter is changed in the pfile on disk but not in memory. Several months
    later, the database is stopped for some maintenance. When attempting to start
    the database, you can''t even get the instance to start in a NOMOUNT state. This
    is because a parameter has been set to a ridiculous value that will consume all
    memory on the box. In this scenario, the instance may hang or you might see this
    message:


    ORA-01078: failure in processing system parameters


    LRM-00109: could not open parameter file


    If you are using a recovery catalog, it’s a fairly simple procedure to restore
    the spfile: RMAN> connect target /


    RMAN> connect catalog rmancat/foo@rcat


    RMAN> startup nomount;


    RMAN> restore spfile;


    If you’re not using a recovery catalog, there are a number of ways to restore
    your spfile. The approach you take depends on several variables such as:


    •


    If you’re using a FRA


    •


    If you’ve configured a channel backup location for the autobackup


    •


    If you’re using the default location for autobackups


    I’m not going to show every detail of all of these scenarios. Usually I determine
    the location of the backup piece that contains the backup of the spfile and do
    the restore like this: RMAN> startup nomount force;


    RMAN> restore spfile from


    ''/ora01/fra/O11R2/autobackup/2010_09_18/o1_mf_s_730048900_69bcc8h2_.bkp''; 526


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    You should see a message similar to this:


    channel ORA_DISK_1: SPFILE restore from AUTOBACKUP complete


    In this example, I knew that a FRA was in use and located the latest backup file
    in the autobackup directory and used it.


    ■ **Note** For a complete description of all possible spfile and control file
    restore scenarios, refer to RMAN Recipes for Oracle Database 11g (Apress, 2007).


    Restoring a Control File


    If you are missing one control file and you have multiple copies, then you can
    shutdown your database, and simply restore the missing or damaged control file
    by copying a good control file to the correct location and name of the missing
    control file (see Chapter 5 for details).


    The following sections cover these specific scenarios when restoring a control
    file:


    • Using a Recovery Catalog.


    • Using an autobackup.


    • Specifying a backup file name.


    Using a Recovery Catalog


    When you’re connected to the recovery catalog, you can view backup information
    about your control files even while your target database is in NOMOUNT mode. To
    list backups of your control files, use the LIST command as shown here:


    RMAN> connect target /


    RMAN> connect catalog rcat/rcat@recov


    RMAN> startup nomount;


    RMAN> list backup of controlfile;


    If you are missing all of your control files and you are using a recovery catalog,
    then issue STARTUP


    NOMOUNT and issue the RESTORE CONTROLFILE command. In this example, the recovery
    catalog owner and password are both *rcat* and the name of the recovery catalog
    is *recov*. You’ll have to change those values to match the username/password@service
    in your environment.


    RMAN> connect target /


    RMAN> connect catalog rcat/rcat@recov


    RMAN> startup nomount;


    RMAN> restore controlfile;


    RMAN restores the control files to the location defined by your CONTROL_FILES
    initialization parameter. You should see a message indicating that your control
    files have been successfully copied back from an RMAN backup piece. Here’s a partial
    listing of RMAN’s message stack after a successful control file restore:


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    allocated channel: ORA_DISK_1


    channel ORA_DISK_1: sid=156 devtype=DISK


    channel ORA_DISK_1: restoring control file


    channel ORA_DISK_1: reading from backup piece


    channel ORA_DISK_1: restore complete, elapsed time: 00:00:05


    You can now alter your database into mount mode and perform any additional restore
    and recovery commands required for your database.


    ■ **Note** When you restore a control file from a backup, you are required to
    perform media recovery on your entire database and open your database with the
    OPEN RESETLOGS command, even if you didn’t restore any datafiles.


    You can determine whether your control file is a backup by querying the CONTROLFILE_TYPE
    column of the V$DATABASE view.


    Using an Autobackup to Restore


    When you enable the autobackup of your control file and are using a fast recovery
    area, restoring your control file is fairly simple. First, connect to your target
    database, then issue a STARTUP NOMOUNT


    command, and lastly issue the RESTORE CONTROLFILE FROM AUTOBACKUP command like
    so: RMAN> connect target /


    RMAN> startup nomount;


    RMAN> restore controlfile from autobackup;


    RMAN restores the control files to the location defined by your CONTROL_FILES
    initialization parameter. You should see a message indicating that your control
    files have been successfully copied back from an RMAN backup piece. Here is a
    partial snippet of the output: allocated channel: ORA_DISK_1


    channel ORA_DISK_1: sid=156 devtype=DISK


    database name (or database unique name) used for search: ORCL


    channel ORA_DISK_1: autobackup found in the recovery area


    You can now alter your database into mount mode and perform any additional restore
    and recovery commands required for your database.


    Specifying a Filename


    When restoring a database to a different server, the first few steps in the process
    usually are: take a backup of the target database, copy to the remote server,
    and then restore the control file from the RMAN backup. In these scenarios, I
    usually know the name of the backup piece that contains the control file. Here
    is an example where you instruct RMAN to restore a control file from a specific
    backup piece file:


    RMAN> startup nomount;


    RMAN> restore controlfile from ''/ora01/O11R2/rman/c-3453199553-20100923-07.bk'';
    The control file will be restored to the location defined by the CONTROL_FILES
    initialization parameter.


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    Incomplete Recovery


    *Incomplete database recovery* means that you cannot recover all committed transactions.
    Incomplete means that you do not apply all redo to restore to the point of the
    last committed transaction that occurred in your database. In other words, you
    are restoring and recovering to a point in time in the past. For this reason,
    incomplete database recovery is also called *database point-in-time recovery*
    (DBPITR). Usually you perform incomplete database recovery because of one of the
    following reasons:


    • You don’t have all the redo required to perform a complete recovery. You’re
    missing either the archived redo log files or online redo log files that are required
    for complete recovery. This situation could arise because the required redo files
    are damaged or missing.


    • You purposely want to roll the database back to a point in time. For example,
    you would do this if somebody accidentally truncated a table and you intentionally
    wanted to roll the database back to just before the truncate table command was
    issued.


    ■ **Tip** To minimize the chance of failure with your online redo log files, I
    recommend you multiplex them with at least two members in each group and have
    each member on separate physical devices governed by separate controllers.


    Incomplete database recovery consists of two steps: restore and recovery. The
    restore step will recreate datafiles, and the recover step will apply redo up
    to the specified point in time. The restore process can be initiated from RMAN
    in several ways:


    • RESTORE DATABASE UNTIL


    • RESTORE TABLESPACE UNTIL


    • FLASHBACK DATABASE


    For the majority of incomplete database recovery circumstances, you use the RESTORE
    DATABASE


    UNTIL command to instruct RMAN to retrieve datafiles from the RMAN backup files.
    This type of incomplete database recovery is the main focus of this chapter. The
    UNTIL portion of the RESTORE


    DATABASE command instructs RMAN to retrieve datafiles from a point in the past
    based on one of the following methods:


    • Time


    • Change (sometimes called *system change number* or SCN)


    • Log sequence number


    • Restore point


    The RMAN RESTORE DATABASE UNTIL command will retrieve all datafiles from the most
    recent backup set or image copy. RMAN will automatically determine from the UNTIL
    clause which backup set contains the required datafiles. If you omit the UNTIL
    clause of the RESTORE DATABASE command, RMAN


    will retrieve datafiles from latest available backup set or image copy. In some
    situations, this may be the 529


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    behavior you desire. I recommend you use the UNTIL clause to ensure that RMAN
    restores from the correct backup set. When you issue the RESTORE DATABASE UNTIL
    command, RMAN will determine how to extract the datafiles from any of the following:


    • Full database backup


    • Incremental level 0 backup


    • Image copy backup generated by the BACKUP AS COPY command


    You cannot perform an incomplete database recovery on a subset of your database’s
    online datafiles. When performing incomplete database recovery, all of the checkpoint
    SCNs for all online datafiles must be synchronized before you can open your database
    with the alter database open resetlogs command. You can view the datafile header
    SCNs and the status of each datafile via this SQL


    query:


    select


    file#


    ,status


    ,fuzzy


    ,error


    ,checkpoint_change#,


    to_char(checkpoint_time,''dd-mon-rrrr hh24:mi:ss'') as checkpoint_time


    from v$datafile_header;


    ■ **Note** The FUZZY column of V$DATAFILE_HEADER refers to a datafile that contains
    one or more blocks that have an SCN value greater than or equal to the checkpoint
    SCN in the datafile header. If datafile is restored and has a FUZZY value of YES,
    then media recovery is required.


    The only exception to this rule of not performing an incomplete recovery on a
    subset of online database files is a tablespace point-in-time recovery (TSPITR),
    which uses the RECOVER TABLESPACE UNTIL


    command. TSPITR is used in rare situations; it restores and recovers only the
    tablespace(s) you specify.


    The recovery portion of an incomplete database recovery is always initiated with
    the RECOVER


    DATABASE UNTIL command. RMAN will automatically recover your database to the point
    specified with the UNTIL clause. Just like the RESTORE command, you can recover
    until time, change/SCN, log sequence number, or restore point. When RMAN reaches
    the specified point, it will automatically terminate the recovery process.


    ■ **Note** Regardless of what you specify in the UNTIL clause, RMAN will convert
    that into a corresponding UNTIL


    SCN clause and assign the appropriate SCN. This is to avoid any timing issues,
    particularly those caused by daylight saving time.


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    During a recovery, RMAN will automatically determine how to apply redo. First,
    RMAN will apply any incremental backups available. Next, any archived redo log
    files on disk will be applied. If the archived redo log files do not exist on
    disk, then RMAN will attempt to retrieve them from a backup set. If you want to
    apply redo as part of an incomplete database recovery, the following conditions
    must be true:


    • Your database must be in archivelog mode.


    • You must have a good backup of all datafiles.


    • You must have all redo required to restore up to the specified point.


    ■ **Tip** Starting with Oracle Database 10g, you can perform parallel media recovery
    by using the RECOVER


    DATABASE PARALLEL command.


    When performing an incomplete database recovery with RMAN, you must have your
    database in mount mode. RMAN needs the database in mount mode to be able to read
    and write to the control file.


    Also, with an incomplete database recovery, the system datafile is always one
    of the datafiles being recovered. The SYSTEM tablespace''s datafile(s) must be
    offline while it is being recovered. Oracle will not allow your database to be
    open while this is happening.


    ■ **Note** After incomplete database recovery is performed, you are required to
    open your database with the ALTER


    DATABASE OPEN RESETLOGS command.


    Depending on your scenario, you can use RMAN to perform a variety of incomplete
    recovery methods. The next section discusses how to determine what type of incomplete
    recovery to perform.


    Determining the Type of Incomplete Recovery


    Time-based restore and recovery is commonly used when you know the approximate
    date and time to which you want to recover your database. For example, you may
    know approximately the time you want to stop the recovery process but not a particular
    SCN.


    Log sequence–based and cancel-based recovery work well in situations where you
    have missing or damaged log files. In such scenarios, you can recover only up
    to your last good archived redo log file.


    SCN-based recovery works well if you can pinpoint the SCN at which you want to
    stop the recovery process. You can retrieve SCN information from views such as
    V$LOG and V$LOG_HISTORY. You can also use tools such as LogMiner to retrieve the
    SCN of a particular SQL statement.


    Restore point recoveries work only if you have established restore points. In
    these situations, you restore and recover up to the SCN associated with the specified
    restore point.


    Tablespace point-in-time recovery is used in situations where you can restore
    and recover just a few tablespaces. You can use RMAN to automate many of the tasks
    associated with this type of incomplete recovery.


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    ■ **Note** Flashing back your database works only if you have enabled the flashback
    database feature (see Chapter 16 for details).


    Performing Time-Based Recovery


    To restore and recover your database back to a point in time, you can use either
    the UNTIL TIME clause of the RESTORE and RECOVER commands or the SET UNTIL TIME
    clause within a run{} block. RMAN will restore and recover the database up to,
    but not including, the specified time. In other words, RMAN will restore any transactions
    committed prior to the time specified. RMAN automatically stops the recovery process
    when it reaches the time you specified.


    The default date format that RMAN expects is YYYY-MM-DD:HH24:MI:SS. However, I
    recommend using the TO_DATE function and specifying a format mask. This eliminates
    ambiguities with different national date formats and having to set the operating
    system NLS_DATE_FORMAT variable. The following example specifies a time when issuing
    the restore and recover commands:


    RMAN> connect target /


    RMAN> startup mount;


    RMAN> restore database until time


    2> "to_date(''04-sep-2010 14:00:00'', ''dd-mon-rrrr hh24:mi:ss'')"; RMAN> recover
    database until time


    2> "to_date(''04-sep-2010 14:00:00'', ''dd-mon-rrrr hh24:mi:ss'')"; RMAN> alter
    database open resetlogs;


    If everything went well, you should now see output similar to this:


    Database altered


    Performing Log Sequenced-Based Recovery


    Usually this type of incomplete database recovery is initiated because you have
    a missing or damaged archived redo log file. If that’s the case, you can recover
    only up to your last good archived redo log file, because you cannot skip a missing
    archived redo log.


    How you determine which archived redo log file to restore up to (but not including)
    will vary by situation. For example, if you are physically missing an archived
    redo log file and if RMAN can’t find it in a backup set, then you’ll receive the
    following message when trying to apply the missing file: RMAN-06053: unable to
    perform media recovery because of missing log


    RMAN-06025: no backup of log thread 1 seq 45 lowscn 2149069 found to restore Based
    on the previous error message, you would restore up to (but not including) log
    sequence 45.


    RMAN> connect target /


    RMAN> startup mount;


    RMAN> restore database until sequence 45;


    RMAN> recover database until sequence 45;


    RMAN> alter database open resetlogs;


    If everything went well, you should now see output similar to this:


    Database altered


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    ■ **Note** Log sequenced-based recovery is similar to user-managed cancel based
    recovery. See Chapter 16 for details on a user-managed cancel based recovery.


    Performing Change/SCN-Based Recovery


    SCN-based incomplete database recovery works in situations where you know the
    SCN value up to where you want to end the restore and recovery session. RMAN will
    recover up to, but not including, the specified SCN. RMAN automatically terminates
    the restore process when it reaches the specified SCN.


    You can view your database SCN information in several ways:


    • By using LogMiner to determine an SCN associated with a DDL or DML


    statement.


    • By looking in the alert.log file.


    • By looking in your trace files.


    • By querying the FIRST_CHANGE# column of V$LOG, V$LOG_HISTORY, and


    V$ARCHIVED_LOG.


    After establishing the SCN to which you want to restore, use the UNTIL SCN clause
    to restore up to, but not including, the SCN specified. The following example
    restores all transactions that have an SCN


    that is less than 950:


    RMAN> connect target /


    RMAN> startup mount;


    RMAN> restore database until scn 95019865425;


    RMAN> recover database until scn 95019865425;


    RMAN> alter database open resetlogs;


    If everything went well, you should now see output similar to this:


    Database altered


    Restoring to a Restore Point


    There are two types of restore points: normal and guaranteed. Guaranteed restore
    points require that you have the flashback database feature enabled. You can create
    a normal restore point using SQL*Plus as follows:


    SQL> create restore point MY_RP;


    This command creates a restore point named MY_RP that is associated with the SCN
    of the database at the time the command was issued. You can view the current SCN
    of your database as shown here: SQL> select current_scn from v$database;


    You can view restore point information in the V$RESTORE_POINT view like so: SQL>
    select name, scn from v$restore_point;


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    The restore point acts like a synonym for the particular SCN. It allows you to
    restore and recover to an SCN without having to specify a number. RMAN will restore
    and recover up to, but not including, the SCN associated with the restore point.


    This example restores and recovers to the MY_RP restore point:


    RMAN> connect target /


    RMAN> startup mount;


    RMAN> restore database until restore point MY_RP;


    RMAN> recover database until restore point MY_RP;


    RMAN> alter database open resetlogs;


    Restoring and Recovering to Different Server


    When you think about backups, you must as the same time think about restore and
    recovery. Your backups are only as good as the last time you tested a restore
    and recovery. A backup strategy can be rendered worthless without a good restore
    and recovery strategy. The last thing you want to happen is to have a media failure,
    go to restore your database, and then find out you''re missing critical pieces,
    don''t have enough space to restore, learn that something is corrupt, and so on.


    One of the best ways to test an RMAN backup is to restore and recover it to a
    different database server. This will exercise all of your backup, restore, and
    recovery DBA skills. If you can restore and recover an RMAN backup on a different
    server, it will give you confidence when a real disaster hits. You can think of
    all of the prior material in this book as the building blocks for performing technically
    challenging tasks. Moving a database from one server to another using an RMAN
    backup requires an expert level understanding of the Oracle architecture and how
    backup and recovery works.


    ■ **Note** RMAN does have a DUPLICATE DATABASE command which works well for copying
    a database from one server to another. If you''re going to be performing this
    type of task often, I would recommend that you use RMAN''s duplicate database
    functionality. However, you may still have to manually copy a backup of a database
    from one server to another, especially when the security is such that you can''t
    directly connect a production server to a development environment. I work with
    many production databases where there is no direct access to a production server,
    so the only way to duplicate a database is by manually copying the RMAN backups
    from production to a test environment.


    In this example, the originating server and destination server have completely
    different mount points and disk layouts. Listed next are the high-level steps
    required to take an RMAN backup and use it to recreate a database on a separate
    server:


    1\. Create an RMAN backup on the originating database.


    2\. Copy RMAN backup to the destination server. All steps after this step are
    performed on the destination database server.


    3\. Ensure that Oracle is installed.


    4\. Source the required OS variables.


    5\. Create an init.ora file for the database to be restored.


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    6\. Create any required directories for datafiles, control files, and dump/trace
    files.


    7\. Startup the database in NOMOUNT mode.


    8\. Restore a control file from the RMAN backup.


    9\. Startup the database in MOUNT mode.


    10\. Make the control file aware of the location of the RMAN backups.


    11\. Rename and restore the datafiles to reflect new directory locations.


    12\. Recover the database.


    13\. Set the new location for the online redo logs.


    14\. Open the database.


    15\. Add tempfile.


    16\. Rename the database.


    Each of the prior steps is covered in detail in the next several sections. Steps
    1 and 2 occur on the source database server. All other steps are performed on
    the destination server. For this example, the source database is named E64202,
    and the destination database will be named O11DEV.


    On the source database, the location of the datafiles, control files, and online
    redo logs are all in this directory:


    /u02/oracle/oradata/E64202


    The source database archive redo log file location is here:


    /u02/oracle/product/11.2.0/dbhome_1/dbs/arch


    The RMAN backup location is determined by the following configurations: CONFIGURE
    CONTROLFILE AUTOBACKUP ON;


    CONFIGURE CONTROLFILE AUTOBACKUP FORMAT FOR DEVICE TYPE DISK TO ''/u02/rman/%F.bk'';
    CONFIGURE CHANNEL 1 DEVICE TYPE DISK FORMAT ''/u02/rman/rman1_%U.bk''; On the
    destination database, the datafiles and control files will be renamed and restored
    to this directory:


    /ora02/dbfile/O11DEV


    The destination database online redo logs will be recreated in this directory:


    /ora02/oraredo/O11DEV


    The destination database archive redo log file location will be set as follows:


    /ora02/oraarch/O11DEV


    Step 1: Create an RMAN Backup on the Originating Database


    When backing up a database, make sure you have the autobackup control file feature
    turned on. Also include the archive redo logs as part of the backup, like so:


    RMAN> backup database plus archivelog;


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    I usually configure a channel and have both the backup pieces and the control
    file autobackup go to the same directory. For example, this is what the backup
    pieces look like for the source database: rman1_03lol0i0_1_1.bk


    rman1_04lol0i1_1_1.bk


    rman1_05lol0j5_1_1.bk


    c-1984315547-20100923-00.bk


    Step 2: Copy RMAN Backup to Destination Server


    For this step, I usually use a utility such as rsync or scp to copy the backup
    pieces from one server to another. This example uses the scp command:


    $ scp *.bk oracle@ora03:/ora02/rman/O11DEV


    In this example, the /ora02/rman/O11DEV directory must be created on the destination
    server before copying the backup files.


    ■ **Note** If the RMAN backups are on tape instead on disk, then the same media
    manager software must be installed/configured on the destination server. Also,
    that server must have direct access to the RMAN backups on tape.


    Step 3: Ensure that Oracle is Installed


    Make sure you have the same version of Oracle binaries installed on the destination
    as you do on the originating database. In this example, Oracle Database 11 *g*
    release 2 is used for both the source and destination databases.


    Step 4: Source the Required OS Variables


    You need to establish the operating system variables such as ORACLE_SID, ORACLE_HOME,
    and PATH. I usually set the ORACLE_SID variable to match what it was on the original
    database. The database name will be changed as part of the last step in this section.
    Here are the settings for ORACLE_SID and ORACLE_HOME on the destination server:


    $ echo $ORACLE_SID


    E64202


    $ echo $ORACLE_HOME


    /oracle/app/oracle/product/11.2.0/db_1


    Step 5: Create an init.ora File for the Database to be Restored


    Copy the init.ora file from the original server to the destination server and
    modify it so that it matches the destination box in terms of any directory paths.
    For example, make sure you modify the 536


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    CONTROL_FILES parameter so that the path names are reflective of where the control
    files will be placed on the new server.


    For now, the name of the init.ora file is ORACLE_HOME/dbs/initE64202.ora. This
    file will be renamed when the database is renamed to O11DEV in a later step. For
    now, the name of the database is E64202; this will be renamed in a later step.


    Here are the contents of the init.ora file:


    db_name=''E64202''


    control_files=''/ora02/dbfile/O11DEV/control01.ctl''


    ,''/ora02/dbfile/O11DEV/control02.ctl''


    diagnostic_dest=''/oracle/app/oracle''


    log_archive_dest_1=''location=/ora02/oraarch/O11DEV''


    log_archive_format=''%t_%s_%r.arc''


    db_block_size=8192


    memory_target=408944640


    open_cursors=300


    processes=100


    remote_login_passwordfile=''EXCLUSIVE''


    sessions=115


    undo_tablespace=''UNDOTBS1''


    Notice that the CONTROL_FILES, DIAGNOSTIC_DEST, and LOG_ARCHIVE_DEST_1 reflect
    the new path directories on the destination server.


    ■ **Note** If this was an Oracle Database 10g example, you would need to set the
    parameters of: BACKGROUND_DUMP_DEST, USER_DUMP_DEST, CORE_DUMP_DEST.


    Step 6: Create any Required Directories for Datafiles, Control Files, and Dump/Trace
    Files


    For this example, the directories of /ora02/dbfile/O11DEV, /oracle/app/oracle,
    and


    /ora02/oraarch/O11DEV are created:


    $ mkdir -p /ora02/dbfile/O11DEV


    $ mkdir -p /oracle/app/oracle


    $ mkdir -p /ora02/oraarch/O11DEV


    Step 7: Startup the Database in NOMOUNT Mode


    You should now be able to startup the database in NOMOUNT mode:


    $ rman target /


    RMAN> startup nomount;


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    Step 8: Restore a Control File from the RMAN Backup


    Now restore the control file from the backup that was previously copied. In this
    example, the backup piece that contains the control file backup is c-1984315547-20100923-00.bk:
    RMAN> restore controlfile from ''/ora02/rman/O11DEV/c-1984315547-20100923-00.bk'';
    The control file will be restored to all locations specified by the CONTROL_FILES
    initialization parameter. Here is some sample output:


    channel ORA_DISK_1: restoring control file


    channel ORA_DISK_1: restore complete, elapsed time: 00:00:01


    output file name=/ora02/dbfile/O11DEV/control01.ctl


    output file name=/ora02/dbfile/O11DEV/control02.ctl


    Step 9: Startup Database in Mount Mode


    You should be able to startup your database in mount mode now:


    RMAN> alter database mount;


    Step 10: Make the Control File Aware of the Location of the RMAN


    Backups


    First, use the CROSSCHECK command to let the control file know that none of the
    backups or archive redo logs are in the same location that they were on the original
    server: RMAN> crosscheck backup;


    RMAN> crosscheck copy;


    RMAN> crosscheck archivelog all;


    Now use the CATALOG command to make the control file aware of the location and
    names of the backup pieces that were copied to the destination server. In this
    example, any RMAN files that are in the


    /ora02/rman/O11DEV directory will be cataloged in the control file:


    RMAN> catalog start with ''/ora02/rman/O11DEV'';


    Here is some sample output:


    searching for all files that match the pattern /ora02/rman/O11DEV


    List of Files Unknown to the Database


    =====================================


    File Name: /ora02/rman/O11DEV/rman1_05lol0j5_1_1.bk


    File Name: /ora02/rman/O11DEV/c-1984315547-20100923-00.bk


    File Name: /ora02/rman/O11DEV/rman1_04lol0i1_1_1.bk


    File Name: /ora02/rman/O11DEV/rman1_03lol0i0_1_1.bk


    Do you really want to catalog the above files (enter YES or NO)?


    Now, type in YES (if everything looks okay). You should be able to use the RMAN
    LIST BACKUP


    command now to view the newly cataloged backup pieces:


    RMAN> list backup;


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    Step 11: Rename and restore the datafiles to Reflect New Directory


    Locations


    If your destination server has the exact same directory structure as the original
    server directories, you can issue the RESTORE command directly:


    RMAN> restore database;


    However, when restoring datafiles to locations are different from the original
    directories, you''ll have to use the SET NEWNAME command. Create a file that uses
    an RMAN run{} block that contains the appropriate SET NEWNAME and RESTORE commands.
    I like to use a SQL script that generates SQL to give me a starting point. Here
    is a sample script:


    set head off feed off verify off pages 0 trimspool on


    set lines 132 pagesize 0


    spo newname.sql


    --


    select ''run{'' from dual;


    --


    select


    ''set newname for datafile '' || file# || '' to '' || '''''''' || name || ''''''''
    || '';''


    from v$datafile;


    --


    select


    ''restore database;'' || chr(10) ||


    ''switch datafile all;'' || chr(10) ||


    ''}''


    from dual;


    --


    spo off;


    After running the script, here are the contents of the newname.sql script that
    was generated: run{


    set newname for datafile 1 to ''/u02/oracle/oradata/E64202/system01.dbf''; set
    newname for datafile 2 to ''/u02/oracle/oradata/E64202/sysaux01.dbf''; set newname
    for datafile 3 to ''/u02/oracle/oradata/E64202/undotbs01.dbf''; set newname for
    datafile 4 to ''/u02/oracle/oradata/E64202/users01.dbf''; restore database;


    switch datafile all;


    }


    Now, modify the contents of the newname.sql script to reflect the directories
    on the destination database server. Here is what the final newname.sql script
    looks like for this example: run{


    set newname for datafile 1 to ''/ora02/dbfile/O11DEV/system01.dbf'';


    set newname for datafile 2 to ''/ora02/dbfile/O11DEV/sysaux01.dbf'';


    set newname for datafile 3 to ''/ora02/dbfile/O11DEV/undotbs01.dbf'';


    set newname for datafile 4 to ''/ora02/dbfile/O11DEV/users01.dbf'';


    restore database;


    switch datafile all;


    }


    Now, connect to RMAN and run the prior script to restore the datafiles to the
    new locations: 539


