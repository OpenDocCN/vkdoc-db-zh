    \nCHAPTER 8 ■ INDEXES\n\nRefer to these guidelines as you create and manage indexes\
    \ in your databases. These recommendations are intended to help you correctly\
    \ use index technology.\n\nCreating Indexes\n\nWhen you think about creating tables,\
    \ you must think about the corresponding index architecture.\n\nCreating the appropriate\
    \ indexes and using the correct index features usually results in dramatic performance\
    \ improvements. Likewise, creating indexes on the wrong columns or using the features\
    \ in the wrong situations can cause dramatic performance degradation.\n\nAs a\
    \ DBA, you need to be aware of the types of indexes available with Oracle and\
    \ when to use them.\n\nCreating indexes and implementing specific features are\
    \ discussed in the next several subsections. The B-tree index is the most used\
    \ and default index type and therefore is first in line.\n\nCreating B-tree Indexes\n\
    \nThe default index type in Oracle is a B-tree (balanced tree) index. To create\
    \ a B-tree index on an existing table, use the CREATE INDEX statement. This example\
    \ creates an index on the D_SOURCES table, specifying D_SOURCE_ID as the column:\n\
    \nSQL> create index d_sources_idx1 on d_sources(d_source_id);\n\nBy default, Oracle\
    \ tries to create an index in your default tablespace. Sometimes that may be the\
    \ desired behavior. But often, for manageability reasons, you want to create the\
    \ index in a specific tablespace. Use the following syntax to instruct Oracle\
    \ to build an index in a specific tablespace: SQL> create index d_sources_idx1\
    \ on d_sources(d_source_id) tablespace dim_index;\n\n■ **Tip** If you don’t specify\
    \ any physical storage properties for an index, the index inherits its properties\
    \ from the tablespace in which it’s created. This is usually an acceptable method\
    \ for managing index storage.\n\nFigure 8–1 shows the balanced, tree-like structure\
    \ of a B-tree index created on a first-name column.\n\nThis type of index has\
    \ a hierarchical tree structure. When Oracle accesses the index, it starts with\
    \ the top node called the root (or header) block. It uses this block to determine\
    \ which second-level block (often referred to as a branch block) to read next.\
    \ The second-level block points to several third-level leaf nodes that contain\
    \ a ROWID and the name value. In this structure, it will take three I/O operations\
    \ to find the ROWID. Once the ROWID is determined, Oracle will use it to read\
    \ the table block that contains the ROWID.\n\nCHAPTER 8 ■ INDEXES\n\n***Figure\
    \ 8–1.** Oracle B-tree heirarchical index structure*\n\nThe index definition is\
    \ associated with a table and column(s). The index structure stores a mapping\
    \ of a row’s ROWID and the column data on which the index is built. A ROWID usually\
    \ uniquely identifies a row within a database and contains information to physically\
    \ locate a row (datafile, block, and row position within block).\n\nCreating Concatenated\
    \ Indexes\n\nOracle allows you to create an index that contains more than one\
    \ column. Multicolumn indexes are known as *concatenated indexes*. These indexes\
    \ are especially effective when you often use multiple columns in the WHERE clause\
    \ when accessing a table.\n\nFor the examples in this section, the underlying\
    \ table is created as follows: create table inv(\n\ninv_name varchar2(30)\n\n\
    ,cust_name varchar2(30));\n\nNow, suppose you have this scenario, where two columns\
    \ from the same table are used in the WHERE\n\nclause:\n\nSQL> select cust_name\
    \ from inv where inv_name='Mouse' and cust_name='Bob'; Because both INV_NAME and\
    \ CUST_NAME are often used in WHERE clauses for retrieving data, it may be efficient\
    \ to create a concatenated index on the two columns:\n\nSQL> create index inv_idx3\
    \ on inv(inv_name, cust_name);\n\nOften, it’s not clear whether a concatenated\
    \ index is more efficient than a single-column index. For the previous SQL statement,\
    \ you may wonder whether it’s more efficient to create two single-column index\
    \ on INV_NAME and CUST_NAME, such as\n\nSQL> create index idx1 on inv(inv_name);\n\
    \nSQL> create index idx2 on inv(cust_name);\n\nHowever, if you’re consistently\
    \ selecting the columns that appear in the WHERE clause, then the optimizer will\
    \ most likely use the concatenated index and not use the single-column indexes.\
    \ Using a 176\n\nCHAPTER 8 ■ INDEXES\n\nconcatenated index in these situations\
    \ is usually much more efficient. You can verify that the optimizer chooses the\
    \ concatenated index by generating an explain plan. For example: SQL> set autotrace\
    \ trace exlain;\n\nSQL> select cust_name from inv where inv_name='Mouse' and cust_name='Bob';\
    \ Here’s some sample output indicating that the optimizer uses the concatenated\
    \ index on INV_IDX3\n\nto retrieve data:\n\n| Id | Operation | Name | Rows | Bytes\
    \ | Cost (%CPU)| Time |\n\n| 0 | SELECT STATEMENT | | 1 | 34 | 1 (0)| 00:00:01\
    \ |\n\n|* 1 | INDEX RANGE SCAN| INV_IDX3 | 1 | 34 | 1 (0)| 00:00:01 |\n\nIn older\
    \ versions of Oracle (circa v8), the optimizer would use a concatenated index\
    \ only if the leading edge column(s) appeared in the WHERE clause. In modern versions,\
    \ the optimizer uses a concatenated index even if the leading edge column(s) aren’t\
    \ present in the WHERE clause. This ability to use an index without reference\
    \ to leading edge columns is known as the *skip-scan* feature.\n\nA concatenated\
    \ index that is used for skip-scanning is more efficient than a full-table scan.\n\
    \nHowever, you should try to create concatenated indexes that use the leading\
    \ column. If you’re consistently using only a lagging edge column of a concatenated\
    \ index, then consider creating a single-column index on the lagging column.\n\
    \nImplementing Function-Based Indexes\n\n*Function-based indexes* are created\
    \ with functions or expressions in their definitions. Sometimes, function-based\
    \ indexes are required when queries use SQL functions. For example, consider the\
    \ following query that uses a SQL UPPER function:\n\nSQL> select emp_name from\
    \ emp where UPPER(emp_name) = 'DAVE';\n\nIn this scenario, there may be a normal\
    \ B-tree index on the EMP_NAME column, but Oracle won’t use a regular index that\
    \ exists on a column when a function is applied to it.\n\nIn this situation, you\
    \ can create a function-based index to improve performance of queries that use\
    \ a SQL function in the WHERE clause. This example creates a function-based index\
    \ on UPPER(EMP_NAME): SQL> create index user_upper_idx on emp(upper(emp_name));\n\
    \nFunction-based indexes allow index lookups on columns referenced by functions\
    \ in the WHERE\n\nclause of a SQL query. The index can be as simple as the preceding\
    \ example, or it can be based on complex logic stored in a PL/SQL function.\n\n\
    ■ **Note** Any user-created SQL functions must be declared deterministic before\
    \ they can be used in a function-based index. Deterministic means that for a given\
    \ set of inputs, the function always returns the same results. You must use the\
    \ keyword DETERMINISTIC when creating a user-defined function that you want to\
    \ use in a function-based index.\n\nCHAPTER 8 ■ INDEXES\n\nIf you want to see\
    \ the definition of a function-based index, select from the DBA/ALL/USER_IND_EXPRESSIONS\
    \ view to display the SQL associated with the index. If you’re using SQL*Plus,\
    \ be sure to issue a SET LONG command first. For example:\n\nSQL> SET LONG 500\n\
    \nSQL> select index_name, column_expression from user_ind_expressions; The SET\
    \ LONG command in this example tells SQL*Plus to display up to 500 characters\
    \ from the COLUMN_EXPRESSION column, which is of type LONG.\n\nCreating Unique\
    \ Indexes\n\nWhen you create a B-tree index, you can also specify that the index\
    \ be unique. Doing so ensures that non-NULL values are unique when you insert\
    \ or update columns in a table.\n\nSuppose you’ve identified a column (or combination\
    \ of columns) in the table (outside of the primary key) that is used heavily in\
    \ the WHERE clause. In addition, this column (or combination of columns) has the\
    \ requirement that it be unique within a table. This is a good scenario in which\
    \ to use a unique index. Use the UNIQUE clause to create a unique index:\n\nSQL>\
    \ create unique index inv_uidx1 on inv(sku_id);\n\n■ **Note** The unique index\
    \ doesn’t enforce uniqueness for NULL values inserted into the table. In other\
    \ words, you can insert the value NULL into the indexed column for multiple rows.\n\
    \nYou must be aware of some interesting nuances regarding unique indexes, primary-key\
    \ constraints, and unique-key constraints. For a detailed discussion of primary-key\
    \ constraints and unique-key constraints, see Chapter 7\\. When you create a primary-key\
    \ constraint or a unique-key constraint, Oracle automatically creates a unique\
    \ index and a corresponding constraint that is visible in DBA/ALL/USER_CONSTRAINTS.\n\
    \nWhen you only create a unique index explicitly (as in the example in this section),\
    \ Oracle creates a unique index but doesn’t add an entry for a constraint in DBA/ALL/USER_CONSTRAINTS.\
    \ Why does this matter? Consider this scenario:\n\nSQL> create unique index inv_uidx1\
    \ on inv(sku_id);\n\nSQL> insert into inv(sku_id) values (1);\n\nSQL> insert into\
    \ inv(sku_id) values (1);\n\nHere’s the corresponding error message that is thrown:\n\
    \nERROR at line 1:\n\nORA-00001: unique constraint (INV_MGMT.INV_UIDX1) violated\n\
    \nIf you’re asked to troubleshoot this issue, the first place you look is in DBA_CONSTRAINTS\
    \ for a constraint named INV_UIDX1\\. However, there is no information:\n\nselect\n\
    \nconstraint_name\n\nfrom dba_constraints\n\nwhere constraint_name='INV_UIDX1';\n\
    \nno rows selected\n\nCHAPTER 8 ■ INDEXES\n\nThe “no rows selected” message can\
    \ be confusing: the error message thrown when you insert into the table indicates\
    \ that a unique constraint has been violated, yet there is no information in the\
    \ constraint-related data-dictionary views. In this situation, you have to look\
    \ at DBA_INDEXES to view the details of the unique index that has been created.\n\
    \nIf you want to have information related to the constraint in the DBA/ALL/USER_CONSTRAINTS\
    \ views, you can explicitly associate a constraint after the index has been created:\
    \ SQL> alter table inv add constraint inv_uidx1 unique(sku_id);\n\nIn this situation,\
    \ you can enable and disable the constraint independent of the index. However,\
    \ because the index was created as unique, the index still enforces uniqueness\
    \ regardless of whether the constraint has been disabled.\n\nWhen should you explicitly\
    \ create a unique index versus creating a constraint and having Oracle automatically\
    \ create the index? There are no hard and fast rules. I prefer to create a unique-key\
    \ constraint and let Oracle automatically create the unique index, because then\
    \ I get information in both the DBA/ALL/USER_CONSTRAINTS views and the DBA/ALL/USER_INDEXES\
    \ views.\n\nBut Oracle’s documentation recommends that if you have a scenario\
    \ where you’re strictly using a unique constraint to improve query performance,\
    \ it’s preferable to create only the unique index. This is fine. If you take this\
    \ approach, just be aware that you may not find any information in the constraint-related\
    \ data-dictionary views.\n\nUsing Bitmap Indexes\n\nBitmap indexes are recommended\
    \ for columns with a relatively low number of distinct values (low cardinality).\
    \ You shouldn’t use bitmap indexes on OLTP databases with high INSERT/UPDATE/DELETE\n\
    \nactivities, due to of locking issues. This is the case because the structure\
    \ of the bitmap index results in potentially many rows being locked during DML\
    \ operations, which results in locking problems for high-transaction OLTP systems.\n\
    \nBitmap indexes are commonly used in data-warehouse environments. A typical star\
    \ schema structure consists of a large fact table and many small dimension (lookup)\
    \ tables. In these scenarios, it’s common to create bitmap indexes on fact table\
    \ foreign-key columns. The fact tables are typically loaded on a daily basis and\
    \ (usually) aren’t updated or deleted from.\n\nListed next is a simple example\
    \ that demonstrates the creation and structure of a bitmap index. First you create\
    \ a LOCATIONS table:\n\ncreate table locations(\n\nlocation_id number\n\n,region\
    \ varchar2(10)\n\n);\n\nNow, insert seven rows into the table:\n\ninsert into\
    \ locations values(1,'NORTH');\n\ninsert into locations values(2,'EAST');\n\n\
    insert into locations values(3,'NORTH');\n\ninsert into locations values(4,'WEST');\n\
    \ninsert into locations values(5,'EAST');\n\ninsert into locations values(6,'NORTH');\n\
    \ninsert into locations values(7,'NORTH');\n\nYou use the BITMAP keyword to create\
    \ a bitmap index. The next line of code creates a bitmap index on the REGION column\
    \ of the LOCATIONS table:\n\nSQL> create bitmap index reg_idx1 on locations(region);\n\
    \nCHAPTER 8 ■ INDEXES\n\nA bitmap index stores the ROWID of a row and a corresponding\
    \ bitmap. You can think of the bitmap as a combination of ones and zeros. A 1\
    \ indicates the presence of a value, and a 0 indicates that the value doesn’t\
    \ exist. Table 8–3 shows the resulting structure of the bitmap index.\n\n***Table\
    \ 8–3.** Structure of the REG_IDX1 Bitmap Index*\n\n**Value/Row Row 1**\n\n**Row\
    \ 2**\n\n**Row 3**\n\n**Row 4**\n\n**Row 5**\n\n**Row 6**\n\n**Row 7**\n\nEAST\n\
    \n0 1 0 0 1 0 0\n\nNORTH\n\n1 0 1 0 0 1 1\n\nWEST\n\n0 0 0 1 0 0 0\n\nFor each\
    \ value of REGION (EAST, NORTH, and WEST), an array of values is stored that indicates\
    \ which rows contain a value for a particular REGION. For example, the EAST location\
    \ has bit settings in row 2\n\nand row 5 (meaning that the EAST location is present\
    \ for those two rows).\n\nBitmap indexes are effective at retrieving rows when\
    \ multiple AND and OR conditions appear in the WHERE clause. For example, to perform\
    \ the task “find all rows with a region of EAST or WEST,” a Boolean algebra OR\
    \ operation is performed on the EAST and WEST bitmaps to quickly return the rows\
    \ 2, 4, and 5.\n\nTable 8–4 shows the OR operation on the EAST and WEST bitmap\
    \ as the last row.\n\n***Table 8–4.** Results of an OR Operation*\n\n**Value/Row\
    \ Row 1**\n\n**Row 2**\n\n**Row 3**\n\n**Row 4**\n\n**Row 5**\n\n**Row 6**\n\n\
    **Row 7**\n\nEAST\n\n0 1 0 0 1 0 0\n\nNORTH\n\n1 0 1 0 0 1 1\n\nWEST\n\n0 0 0\
    \ 1 0 0 0\n\nBoolean\n\n0 1 0 1 1 0 0\n\nOR on\n\nEAST and\n\nWEST\n\n■ **Note**\
    \ Bitmap indexes and bitmap join indexes are available only with the Oracle Enterprise\
    \ Edition of the database.\n\nCreating Bitmap Join Indexes\n\nBitmap join indexes\
    \ store the results of a join between two tables in an index. Bitmap indexes are\
    \ beneficial because they avoid joining tables to retrieve results. The syntax\
    \ for a bitmap join index differs 180\n\nCHAPTER 8 ■ INDEXES\n\nfrom a regular\
    \ bitmap index in that it contains FROM and WHERE clauses. Here’s the basic syntax\
    \ for creating a bitmap join index:\n\ncreate bitmap index <index_name>\n\non\
    \ <fact_table> (<dimension_table.dimension_column>)\n\nfrom <fact_table>, <dimension_table>\n\
    \nwhere <fact_table>.<foreign_key_column> = <dimension_table>.<primary_key_column>;\
    \ Bitmap join indexes are appropriate in situations where you’re joining two tables\
    \ using the foreign-key column(s) in one table that relate to primary-key column(s)\
    \ in another table. For example, suppose you typically retrieve the CUSTOMER_NAME\
    \ from the D_CUSTOMERS table while joining to a large F_SHIPMENTS fact table.\
    \ This next example creates a bitmap join index between the F_SHIPMENTS\n\nand\
    \ D_CUSTOMERS tables:\n\ncreate bitmap index f_shipments_bm_idx1\n\non f_shipments(d_customers.cust_name)\n\
    \nfrom f_shipments, d_customers\n\nwhere f_shipments.d_cust_id = d_customers.d_cust_id;\n\
    \nNow, consider a query such as this:\n\nselect\n\nd.cust_name\n\nfrom f_shipments\
    \ f, d_customers d\n\nwhere f.d_cust_id = d.d_cust_id\n\nand d.cust_name = 'Sun';\n\
    \nThe optimizer can choose to use the bitmap join index and thus avoid the expense\
    \ of having to join the tables.\n\nImplementing Reverse-Key Indexes\n\nReverse-key\
    \ indexes are similar to B-tree indexes except that the bytes of the index key\
    \ are reversed when an index entry is created. For example, if the index values\
    \ are 201, 202, and 203, the reverse-key index values are 102, 202, and 302:\n\
    \nIndex value Reverse key value\n\n------------- --------------------\n\n201 102\n\
    \n202 202\n\n203 302\n\nReverse-key indexes can perform better in scenarios where\
    \ you need a way to evenly distribute index data that would otherwise have similar\
    \ values clustered together. Thus, when using a reverse-key index, you avoid having\
    \ I/O concentrated in one physical disk location within the index during large\
    \ inserts of sequential values.\n\nUse the REVERSE clause to create a reverse-key\
    \ index:\n\nSQL> create index inv_idx1 on inv(inv_id) reverse;\n\nYou can verify\
    \ that an index is reverse-key by running the following query: SQL> select index_name,\
    \ index_type from user_indexes;\n\nHere’s some sample output showing that the\
    \ INV_IDX1 index is reverse-key: 181\n\nCHAPTER 8 ■ INDEXES\n\nINDEX_NAME INDEX_TYPE\n\
    \n------------------------------ ---------------------------\n\nINV_IDX1 NORMAL/REV\n\
    \nUSERS_IDX1 NORMAL\n\n■ **Note** You can’t specify REVERSE for a bitmap index\
    \ or an index-organized table.\n\nCreating Key-Compressed Indexes\n\nIndex compression\
    \ is useful for indexes that contain multiple columns where the leading index\
    \ column value is often repeated. Compressed indexes in these situations have\
    \ the following advantages:\n\n• Reduced storage\n\n• More rows stored in leaf\
    \ blocks, which can result in less I/O when accessing a compressed index\n\nSuppose\
    \ you have a table defined as follows:\n\ncreate table users(\n\nlast_name varchar2(30)\n\
    \n,first_name varchar2(30)\n\n,address_id number);\n\nYou want to create a concatenated\
    \ index on the LAST_NAME and FIRST_NAME columns. You know from examining the data\
    \ that there is duplication in the LAST_NAME column. Use the COMPRESS *N* clause\
    \ to create a compressed index:\n\nSQL> create index users_idx1 on users(last_name,\
    \ first_name) compress 2; The prior line of code instructs Oracle to create a\
    \ compressed index on two columns. You can verify that an index is compressed\
    \ as follows:\n\nselect\n\nindex_name\n\n,compression\n\nfrom\n\nuser_indexes\
    \ where index_name like 'USERS%';\n\nHere’s some sample output indicating that\
    \ compression is enabled for the index: INDEX_NAME COMPRESS\n\n------------------------------\
    \ --------\n\nUSERS_IDX1 ENABLED\n\n■ **Note** You can’t create a key-compressed\
    \ index on a bitmap index.\n\nCHAPTER 8 ■ INDEXES\n\nParallelizing Index Creation\n\
    \nIn large database environments where you’re attempting to create an index on\
    \ a table that is populated with many rows, you may be able to reduce the time\
    \ it takes to create the index by using the PARALLEL\n\nclause:\n\ncreate index\
    \ inv_idx1 on inv(inv_id)\n\nparallel 2\n\ntablespace inv_mgmt_data;\n\nIf you\
    \ don’t specify a degree of parallelism, Oracle selects a degree based on the\
    \ number of CPUs on the box times the value of PARALLEL_THREADS_PER_CPU.\n\nAvoiding\
    \ Redo Generation When Creating an Index\n\nYou can optionally create an index\
    \ with the NOLOGGING clause. Doing so has these implications:\n\n• The redo isn’t\
    \ generated that would be required to recover the index in the event of a media\
    \ failure.\n\n• Subsequent direct-path operations also won’t generate the redo\
    \ required to recover the index information in the event of a media failure.\n\
    \nHere’s an example of creating an index with the NOLOGGING clause:\n\ncreate\
    \ index inv_idx1 on inv(inv_id, inv_id2)\n\nnologging\n\ntablespace inv_mgmt_index;\n\
    \nThe main advantage of NOLOGGING is that when you create the index, a minimal\
    \ amount of redo information is generated, which can have significant performance\
    \ implications for a large index. The disadvantage is that if you experience a\
    \ media failure soon after the index is created (or have records inserted via\
    \ a direct-path operation), and you must do a restore from a backup that was created\
    \ prior to the index, you may see this error when the index is accessed:\n\nORA-01578:\
    \ ORACLE data block corrupted (file # 4, block # 11407)\n\nORA-01110: data file\
    \ 4: '/ora01/dbfile/O11R2/inv_mgmt_index01.dbf'\n\nORA-26040: Data block was loaded\
    \ using the NOLOGGING option\n\nThis error indicates that the index is logically\
    \ corrupt. In this scenario you must re-create or rebuild the index before it’s\
    \ usable. In most scenarios, it’s acceptable to use the NOLOGGING clause when\
    \ creating an index, because the index can be re-created or rebuilt without affecting\
    \ the table on which the index is based.\n\nYou can run this query to view whether\
    \ an index has been created with NOLOGGING: SQL> select index_name, logging from\
    \ user_indexes;\n\nImplementing Invisible Indexes\n\nIn Oracle Database 11 *g*\
    \ and higher, you have the option of making an index invisible to the optimizer.\n\
    \nOracle still maintains invisible indexes but doesn’t make them available for\
    \ use by the optimizer. If you want the optimizer to use an invisible index, you\
    \ can do so with a SQL hint.\n\nInvisible indexes have a couple of interesting\
    \ uses:\n\nCHAPTER 8 ■ INDEXES\n\n• Altering an index to invisible before dropping\
    \ it allows you to quickly recover if you later determine that the index is required.\n\
    \n• You can add an invisible index to a third-party application without affecting\
    \ existing code or support agreements.\n\nThese two scenarios are discussed in\
    \ the following subsections.\n\nMaking an Existing Index Invisible\n\nSuppose\
    \ you’ve identified an index that isn’t being used and are considering dropping\
    \ it. In earlier releases of Oracle, you could mark the index as UNUSABLE and\
    \ then later drop indexes that you were certain weren’t being used. If you later\
    \ determined that you needed an unusable index, the only way to re-enable the\
    \ index was to rebuild it. For large indexes, this could take a long time and\
    \ a lot of database resources.\n\nMaking an index invisible has the advantage\
    \ that it only tells the optimizer to not use the index. The invisible index is\
    \ still maintained as the underlying table has records inserted, updated, or deleted.\
    \ If you decide that you later need the index, there is no need to rebuild it.\n\
    \nUse the INVISIBLE clause to make an index invisible:\n\nSQL> alter index inv_idx1\
    \ invisible;\n\nNext, monitor SQL queries and applications for degraded performance.\
    \ After you’re confident there will be no bad performance effects, you can drop\
    \ the index:\n\nSQL> drop index inv_idx1;\n\nYou can verify the visibility of\
    \ an index via this query:\n\nSQL> select index_name, status, visibility from\
    \ user_indexes;\n\nHere’s some sample output:\n\nINDEX_NAME STATUS VISIBILITY\n\
    \n------------------------------ -------- ----------\n\nINV_IDX1 VALID INVISIBLE\n\
    \nCOMPUTER_SYSTEM_UK1 VALID VISIBLE\n\nUse the VISIBLE clause to make an invisible\
    \ index visible to the optimizer again: SQL> alter index inv_idx1 visible;\n\n\
    Guaranteeing Application Behavior Is Unchanged When You Add an Index\n\nYou can\
    \ also use an invisible index is when you’re working with third-party applications.\
    \ Often, third-party vendors don’t support customers adding their own indexes\
    \ to an application. However, there may be a scenario in which you’re certain\
    \ you can increase a query’s performance without impacting other queries in the\
    \ application. You can create the index as invisible and then explicitly instruct\
    \ a query to use the index via a hint:\n\nSQL> create index inv_idx1 on inv(inv_id)\
    \ invisible;\n\nNext, ensure that the OPTIMIZER_USE_INVISIBLE_INDEXES initialization\
    \ parameter is set to true. This instructs the optimizer to consider invisible\
    \ indexes:\n\nSQL> alter system set optimizer_use_invisible_indexes=true;\n\n\
    CHAPTER 8 ■ INDEXES\n\nNow, use a hint to tell the optimizer that the index exists:\n\
    \nSQL> select /*+ index (inv INV_IDX1) */ inv_id from inv where inv_id=1; You\
    \ can verify that the index is being used by setting AUTOTRACE on and running\
    \ the SELECT\n\nstatement:\n\nSQL> set autotrace trace explain;\n\nSQL> select\
    \ /*+ index (inv INV_IDX1) */ inv_id from inv where inv_id=1; Here’s some sample\
    \ output indicating that the optimizer chose to use the invisible index:\n\n|\
    \ Id | Operation | Name | Rows | Bytes | Cost (%CPU)| Time |\n\n| 0 | SELECT STATEMENT\
    \ | | 1 | 13 | 1 (0)| 00:00:01 |\n\n|* 1 | INDEX RANGE SCAN| INV_IDX1 | 1 | 13\
    \ | 1 (0)| 00:00:01 |\n\nKeep in mind that an invisible index only means the optimizer\
    \ can’t see the index. Just like any other index, an invisible index consumes\
    \ space and resources during DML statements.\n\nUsing Index-Naming Standards\n\
    \nWhen you’re creating and managing indexes, it’s highly desirable to develop\
    \ some standards regarding naming. Index-naming standards are desirable for the\
    \ following reasons:\n\n• Diagnosing issues is simplified when error messages\
    \ contain information that indicates the table, index type, and so on.\n\n• Reports\
    \ that display index information are more easily grouped and therefore more readable\
    \ and easier in which to see patterns and issues.\n\nI usually don’t care what\
    \ the naming standards are as long as standards exist and are followed. Here are\
    \ some sample index-naming guidelines:\n\n• Primary-key index names should contain\
    \ the table name and a suffix such as _PK.\n\n• Unique-key index names should\
    \ contain the table name and a suffix such as _UKN, where N is a number.\n\n•\
    \ Indexes on foreign-key columns should contain the foreign-key table and a suffix\
    \ such as _FKN, where N is a number.\n\n• Function-based index names should contain\
    \ the table name and a suffix such as FCN, where N is a number.\n\nSome shops\
    \ use prefixes when naming indexes. All of these various naming standards are\
    \ valid. The key is to use the standard consistently.\n\nCHAPTER 8 ■ INDEXES\n\
    \nSpecifying Index Tablespaces\n\nWhen creating an index, if you don’t specify\
    \ a tablespace, by default the index is created in the default tablespace for\
    \ the user. That approach is acceptable for development databases where you may\
    \ not be concerned about managing indexes separately from tables. Or perhaps you’re\
    \ not concerned about the storage characteristics of the index because there’s\
    \ only a small amount of data.\n\nFor production databases, you should consider\
    \ the following with regard to index storage:\n\n•\n\nCreating indexes in a tablespace\
    \ separate from table data\n\n•\n\nCreating several tablespaces specifically for\
    \ use with indexes, depending on their storage requirements\n\nThese topics are\
    \ discussed in detail in the following subsections.\n\nPlacing Indexes in Tablespaces\
    \ Separate from Tables\n\nDBAs debate the merits of separating tables and indexes\
    \ into different tablespaces. If you have the luxury of setting up a storage system\
    \ from scratch and can set up mount points that have their own sets of disks and\
    \ controllers, you may see some I/O benefits by separating tables and indexes\
    \ into different tablespaces.\n\nNowadays, storage administrators often give you\
    \ a large slice of storage in a SAN, and there’s no way to guarantee that data\
    \ and indexes will be stored physically on separate disks (and controllers). Thus\
    \ you typically don’t gain any performance benefits by separating tables and indexes\
    \ into different tablespaces. Nevertheless, there are still valid reasons to separate\
    \ index tablespaces from table tablespaces:\n\n•\n\nYou may want to implement\
    \ different physical storage characteristics (such as extent size) for tables\
    \ and indexes, and you prefer to allow the table and index to inherit their storage\
    \ attributes from the tablespace.\n\n•\n\nYou prefer to have the option of being\
    \ able to back up, restore, and recover table and index tablespaces separately.\n\
    \n•\n\nWhen running maintenance reports, you find it easier to manage tables and\
    \ indexes when the reports have sections separated by tablespace.\n\nIf any of\
    \ these reasons are valid for your environment, it’s probably worth the extra\
    \ effort to employ different tablespaces for tables and indexes. Here’s a simple\
    \ example of building a table and an index in separate tablespaces:\n\nSQL> create\
    \ table inv(inv_id number, inv_dtt date) tablespace inv_mgmt_data; SQL> create\
    \ index inv_idx1 on inv(inv_dtt) tablespace inv_mgmt_index; I almost always use\
    \ ampersand variables in scenarios like this. To do so, at the top of the script,\
    \ define the names of the tablespaces to be used, and then refer to the ampersand\
    \ variables within the script. This technique has the advantage of making scripts\
    \ more portable from one environment (development, test, production, and so on)\
    \ to another where the tablespaces may be differently named.\n\nFor example:\n\
    \nCHAPTER 8 ■ INDEXES\n\ndefine tab_tbsp_small=INV_MGMT_DATA\n\ndefine ind_tbsp_small=INV_MGMT_INDEX\n\
    \n--\n\ncreate table inv(inv_id number, inv_dtt date) tablespace &&tab_tbsp_small;\
    \ create index inv_idx1 on inv(inv_dtt) tablespace &&ind_tbsp_small; Placing Indexes\
    \ in Tablespaces Based on Extent Size\n\nIf you know how large an index may initially\
    \ be or what its growth requirements are, consider placing the index in a tablespace\
    \ that is appropriate in terms of the size of the tablespace and the size of the\
    \ extents. I usually create at least two index tablespaces per application. Here’s\
    \ an example: create tablespace inv_idx_small\n\ndatafile '/ora01/dbfile/O11R2/inv_idx_small01.dbf'\n\
    \nsize 100m\n\nextent management local\n\nuniform size 128k\n\nsegment space management\
    \ auto;\n\n--\n\ncreate tablespace inv_idx_med\n\ndatafile '/ora01/dbfile/O11R2/inv_idx_med01.dbf'\n\
    \nsize 1000m\n\nextent management local\n\nuniform size 4m\n\nsegment space management\
    \ auto;\n\nIndexes that have small space and growth requirements are placed in\
    \ the INV_IDX_SMALL tablespace, and indexes that have medium storage requirements\
    \ would be created in INV_IDX_MED. If you discover that an index is growing at\
    \ an unpredicted rate, consider dropping the index and re-creating it in a different\
    \ tablespace or rebuilding the index in a more appropriate tablespace.\n\nMaintaining\
    \ Indexes\n\nAs applications age, you invariably have to perform some maintenance\
    \ activities on existing indexes.\n\nYou may need to rename an index to conform\
    \ to newly implemented standards, or you may need to rebuild a large index to\
    \ move it to a different tablespace that better suits the index’s storage requirements.\
    \ The following list shows common tasks associated with index maintenance:\n\n\
    • Renaming an index\n\n• Displaying the DDL for an index\n\n• Rebuilding an index\n\
    \n• Setting indexes to be unusable\n\n• Dropping an index\n\nEach of these items\
    \ is discussed in the following subsections.\n\nCHAPTER 8 ■ INDEXES\n\nRenaming\
    \ an Index\n\nSometimes you need to rename an index. The index may have been erroneously\
    \ misnamed when it was created, or perhaps you want a name that better conforms\
    \ to naming standards. Use the ALTER INDEX\n\n... RENAME TO statement to rename\
    \ an index:\n\nSQL> alter index user1_index rename to emp_idx1;\n\nYou can verify\
    \ that the index was renamed by querying the data dictionary: select\n\ntable_name\n\
    \n,index_name\n\n,index_type\n\n,tablespace_name\n\n,status\n\nfrom user_indexes\n\
    \norder by table_name, index_name;\n\nDisplaying Code to Re-create an Index\n\n\
    You may be performing routine maintenance activities, such as moving an index\
    \ to a different tablespace, and before you do so, you want to verify the current\
    \ storage settings. You can use the DBMS_METADATA package to display the DDL required\
    \ to re-create an index. If you’re using SQL*Plus, set the LONG variable to a\
    \ value large enough to display all of the output. Here’s an example: SQL> set\
    \ long 10000\n\nSQL> select dbms_metadata.get_ddl('INDEX','INV_IDX1') from dual;\n\
    \nHere’s a partial listing of the output:\n\nCREATE INDEX \"DARL\".\"INV_IDX1\"\
    \ ON \"DARL\".\"INV\" (\"INV_ID\", \"INV_ID2\") PCTFREE 10 INITRANS 2 MAXTRANS\
    \ 255 NOLOGGING COMPUTE STATISTICS\n\nTo show all index DDL for a user, run this\
    \ query:\n\nSQL> select dbms_metadata.get_ddl('INDEX',index_name) from user_indexes;\
    \ You can also display the DDL for a particular user. You must provide as input\
    \ to the GET_DDL\n\nfunction the object type, object name, and schema. For example:\n\
    \nselect\n\ndbms_metadata.get_ddl(object_type=>'INDEX', name=>'INV_IDX1', schema=>'INV')\
    \ from dual;\n\nRebuilding an Index\n\nThere are a few good reasons to rebuild\
    \ an index:\n\n• The index has become corrupt (see the previous section on Avoiding\
    \ Redo Generation When Creating an Index for the scenario in which you encounter\
    \ logical corruption).\n\n• You want to modify storage characteristics, such as\
    \ changing the tablespace.\n\n![](index-223_1.png)\n\nCHAPTER 8 ■ INDEXES\n\n\
    Making Indexes Unusable\n\nIf you’ve identified an index that is no longer being\
    \ used, you can mark it as UNUSABLE. From that point forward, Oracle won’t maintain\
    \ the index, nor will the optimizer consider the index for use in SELECT\n\nstatements.\
    \ The advantage of marking the index as UNUSABLE (rather than dropping it) is\
    \ that if you later determine that the index is being used, you can alter to a\
    \ USABLE state and rebuild the index without needing the DDL on hand to re-create\
    \ the index.\n\nHere’s an example of marking an index as UNUSABLE:\n\nSQL> alter\
    \ index inv_idx1 unusable;\n\nYou can verify that it’s unusable via this query:\n\
    \nSQL> select index_name, status from user_indexes;\n\nThe index has an UNUSABLE\
    \ status:\n\nINDEX_NAME STATUS\n\n------------------------------ --------\n\n\
    INV_IDX1 UNUSABLE\n\nIf you determine that the index is needed (before you drop\
    \ it), then it must be rebuilt to become usable again:\n\nSQL> alter index inv_idx1\
    \ rebuild;\n\nAnother common scenario for marking indexes as UNUSABLE is if you’re\
    \ performing a large data load.\n\nWhen you want to maximize table-loading performance,\
    \ you can mark the indexes as UNUSABLE before performing the load. After you’ve\
    \ loaded the table, you must rebuild the indexes to make them usable again.\n\n\
    ■ **Note** The alternative to setting an index as UNUSABLE is to drop and re-create\
    \ the index. This approach requires the CREATE INDEX DDL.\n\nMonitoring Index\
    \ Usage\n\nYou may have inherited a database, and as part of getting to know the\
    \ database and application, you want to determine which indexes are being used\
    \ (or not). The idea is that you can identify indexes that aren’t being used and\
    \ drop them, thus eliminating the extra overhead and storage required.\n\nUse\
    \ the ALTER INDEX...MONITORING USAGE statement to enable basic index monitoring.\
    \ The following example enables index monitoring on an index named F_DOWN_DOM_FK9:\
    \ SQL> alter index F_DOWN_DOM_FK9 monitoring usage;\n\nThe first time the index\
    \ is accessed, Oracle records this; you can view whether an index has been accessed\
    \ via the V$OBJECT_USAGE view. To report which indexes are being monitored and\
    \ have ever been used, run this query:\n\nSQL> select * from v$object_usage;\n\
    \nMost likely, you won’t monitor only one index. Rather, you’ll want to monitor\
    \ all indexes for a user.\n\nIn this situation, use SQL to generate SQL to create\
    \ a script you can run to turn on monitoring for all indexes. Here’s such a script:\n\
    \nCHAPTER 8 ■ INDEXES\n\nselect\n\n'alter index ' || index_name || ' monitoring\
    \ usage;'\n\nfrom user_indexes;\n\nThe V$OBJECT_USAGE view only shows information\
    \ for the currently connected user. If you inspect the TEXT column of DBA_VIEWS,\
    \ notice the following line:\n\nwhere io.owner# = userenv('SCHEMAID')\n\nIf you’re\
    \ logged in as a DBA privileged user and want to view the status of all indexes\
    \ that have monitoring enabled (regardless of the user), execute this query:\n\
    \nselect io.name, t.name,\n\ndecode(bitand(i.flags, 65536), 0, 'NO', 'YES'),\n\
    \ndecode(bitand(ou.flags, 1), 0, 'NO', 'YES'),\n\nou.start_monitoring,\n\nou.end_monitoring\n\
    \nfrom sys.obj$ io\n\n,sys.obj$ t\n\n,sys.ind$ i\n\n,sys.object_usage ou\n\nwhere\
    \ i.obj# = ou.obj#\n\nand io.obj# = ou.obj#\n\nand t.obj# = i.bo#;\n\nThe prior\
    \ query removes the line from the query that restricts the currently logged-in\
    \ user. This provides you with a convenient way to view all monitored indexes.\n\
    \nDropping an Index\n\nIf you’ve determined that an index isn’t being used, then\
    \ it’s a good idea to drop it. Unused indexes take up space and can potentially\
    \ slow down DML statements (because the index must be maintained as part of those\
    \ DML operations). Use the DROP INDEX statement to drop an index: SQL> drop index\
    \ inv_idx1;\n\nDropping an index is a permanent DDL operation; there is no way\
    \ to undo an index drop other than to rebuild the index. Before you drop an index,\
    \ it doesn’t hurt to quickly capture the DDL required to rebuild the index. Doing\
    \ so will allow you to re-create the index in the event you subsequently discover\
    \ that you did need it after all.\n\nSummary\n\nIndexes are critical objects separate\
    \ from tables; they vastly increase the performance of a database application.\
    \ Your index architecture should be well planned, implemented, and maintained.\
    \ Carefully choose which tables and columns are indexed. Although indexes dramatically\
    \ increase the speed of queries, indexes can slow down DML statement because the\
    \ index has to be maintained as the table data changes. Indexes also consume disk\
    \ space and thus should be created only when required.\n\nOracle’s B-tree index\
    \ is the default index type and is sufficient for most applications. However,\
    \ you should be aware of other index types and their uses. Specific features such\
    \ as bitmap and function-based indexes should be implemented where applicable.\
    \ You (the DBA) are expected to be an expert on index types and when to use them.\
    \ Competent implementation of these features provides large performance benefits.\n\
    \nCHAPTER 8 ■ INDEXES\n\nIndexes should be monitored to determine whether they’re\
    \ being used. When you detect unused indexes, consider making them invisible or\
    \ marking them as unused. After you’re certain an index isn’t being accessed,\
    \ drop it. Doing so eliminates the overhead associated with maintaining the index\
    \ and frees up storage.\n\nAfter you build a database and users and configure\
    \ the database with tables and indexes, the next step is to create additional\
    \ objects needed by the application and users. In addition to tables and indexes,\
    \ other typical objects include views, synonyms, and sequences. Building these\
    \ database objects is detailed in the next chapter.\n\n![](index-227_1.png)\n\n\
    CHAPTER 9 ■ VIEWS, SYNONYMS, AND SEQUENCES\n\nTo create a view, your user account\
    \ must have the CREATE VIEW system privilege. If you want to create a view in\
    \ another user’s schema, then you must have the CREATE ANY VIEW privilege.\n\n\
    Use the CREATE VIEW statement to create a view. The following code creates a view\
    \ (or replaces it if the view already exists) that selects a subset of columns\
    \ and rows from the SALES table: create or replace view sales_rockies as\n\nselect\n\
    \nsales_id\n\n,amnt\n\n,state\n\nfrom sales\n\nwhere state in ('CO','UT','WY','ID','AZ');\n\
    \nNow you can treat the SALES_ROCKIES view as if it were a table. The schema that\
    \ has access to the view can perform any SELECT, INSERT, UPDATE, or DELETE operation\
    \ for which it has object grants, and the Data Manipulation Language (DML) operation\
    \ will result in the underlying table data being changed.\n\nFor example, if a\
    \ schema separate from the owner of the base table has INSERT privileges on the\
    \ SALES\n\ntable, then you can use the view in the INSERT statement:\n\ninsert\
    \ into sales_rockies(\n\nsales_id, amnt, state)\n\nvalues\n\n(1,100,'CO');\n\n\
    Notice that you can insert a value into the view that results in a row in the\
    \ underlying table that isn’t selectable by the view:\n\ninsert into sales_rockies(\n\
    \nsales_id, amnt, state)\n\nvalues (2,123,'CA');\n\nSQL> select * from sales_rockies;\n\
    \nSALES_ID AMNT ST\n\n---------- ---------- --\n\n1 100 CO\n\nIf you only want\
    \ the view to allow DML statements that result in data modifications that are\
    \ selectable by the view statement, then use WITH CHECK OPTION (see the next section).\n\
    \nChecking Updates\n\nIf you want to allow only the underlying table data within\
    \ the scope of the view to be changed, specify WITH CHECK OPTION:\n\ncreate or\
    \ replace view sales_rockies as\n\nselect\n\nsales_id\n\n,amnt\n\n,state\n\nfrom\
    \ sales\n\nwhere state in ('CO','UT','WY','ID','AZ')\n\nwith check option;\n\n\
    CHAPTER 9 ■ VIEWS, SYNONYMS, AND SEQUENCES\n\nUsing WITH CHECK OPTION means that\
    \ you can only insert or update rows that would be returned by the view query.\
    \ For example, this UPDATE statement works because the statement isn’t changing\
    \ the underlying data in a way would result in the row not being returned by the\
    \ view query: SQL> update sales_rockies set state='ID' where sales_id=1;\n\nHowever,\
    \ this next update statement fails because it attempts to update the STATE column\
    \ to a state that isn’t selectable by the query on which the view is based:\n\n\
    SQL> update sales_rockies set state='CA' where sales_id=1;\n\nIn this example,\
    \ the following error is thrown:\n\nERROR at line 1:\n\nORA-01402: view WITH CHECK\
    \ OPTION where-clause violation\n\nCreating Read-Only Views\n\nIf you don’t want\
    \ a user to be able to perform INSERT, UPDATE, or DELETE operations on a view,\
    \ then don’t grant those object privileges on the underlying table(s) to that\
    \ user. You should also create a view with the WITH READ ONLY clause for any views\
    \ for which you don’t want the underlying tables to be modified (keep in mind\
    \ that by default, the view is updatable, and the underlying objects can be modified\
    \ if the object grants exist). This example creates a view with the WITH READ\
    \ ONLY clause: create or replace view sales_rockies as\n\nselect\n\nsales_id\n\
    \n,amnt\n\n,state\n\nfrom sales\n\nwhere state in ('CO','UT','WY','ID','AZ')\n\
    \nwith read only;\n\nIf you use views for reporting, and you never intend for\
    \ the views to be used as a mechanism to update a table, then you should always\
    \ create the views with the WITH READ ONLY clause. Doing so prevent accidental\
    \ modifications to the underlying tables through a view that was never intended\
    \ to be used for changing data.\n\nUpdatable Join Views\n\nIf you have multiple\
    \ tables defined in the FROM clause of the SQL query on which the view is based,\
    \ it’s still possible to update the underlying tables. This is known as an *updatable\
    \ join view*.\n\nFor reference purposes, here are the CREATE TABLE statements\
    \ for the two tables used in the examples in this section:\n\ncreate table emp(\n\
    \nemp_id number primary key\n\n,emp_name varchar2(15)\n\n,dept_id number);\n\n\
    --\n\ncreate table dept(\n\ndept_id number primary key\n\n,dept_name varchar2(15),\n\
    \nconstraint emp_dept_fk\n\nforeign key(dept_id) references dept(dept_id));\n\n\
    CHAPTER 9 ■ VIEWS, SYNONYMS, AND SEQUENCES\n\nFor this example, here’s some seed\
    \ data for the two tables:\n\ninsert into dept values(1,'HR');\n\ninsert into\
    \ dept values(2,'IT');\n\ninsert into dept values(3,'SALES');\n\ninsert into emp\
    \ values(10,'John',2);\n\ninsert into emp values(20,'Bob',1);\n\ninsert into emp\
    \ values(30,'Craig',2);\n\ninsert into emp values(40,'Joe',3);\n\ninsert into\
    \ emp values(50,'Jane',1);\n\ninsert into emp values(60,'Mark',2);\n\nHere’s an\
    \ example of an updatable join view based on the two prior base tables: create\
    \ or replace view emp_dept_v\n\nas\n\nselect\n\na.emp_id\n\n,a.emp_name\n\n,b.dept_name\n\
    \n,b.dept_id\n\nfrom emp a, dept b\n\nwhere a.dept_id = b.dept_id;\n\nThere are\
    \ some restrictions regarding the columns on which DML operations are permitted.\
    \ For example, columns in the underlying tables can be updated only if the following\
    \ conditions are true:\n\n•\n\nThe DML statement must modify only one underlying\
    \ table.\n\n•\n\nThe view must be created without the READ ONLY clause.\n\n•\n\
    \nThe column being updated belongs to the key-preserved table in the join view\
    \ (there is only one key-preserved table in a join view).\n\nAn underlying table\
    \ in a view is *key-preserved* if the table’s primary key can also be used to\
    \ uniquely identify rows returned by the view. An example with data will help\
    \ illustrate whether an underlying table is key-preserved. In this example, the\
    \ primary key of the EMP table is the EMP_ID column. And the primary key of the\
    \ DEPT table is the DEPT_ID column. Here’s some sample data returned by the view\
    \ listed previously listed in this section:\n\nEMP_ID EMP_NAME DEPT_NAME DEPT_ID\n\
    \n---------- --------------- --------------- ----------\n\n10 John IT 2\n\n20\
    \ Bob HR 1\n\n30 Craig IT 2\n\n40 Joe SALES 3\n\n50 Jane HR 1\n\n60 Mark IT 2\n\
    \nAs you can see from the output of the view, the EMP_ID column is always unique.\
    \ Therefore, the EMP table is key-preserved (and its columns can be updated).\
    \ On the other hand, the view’s output shows that it’s possible for the DEPT_ID\
    \ column to be not unique. Therefore, the DEPT table isn’t key-preserved (its\
    \ columns can’t be updated).\n\nWhen you update the view, any modifications that\
    \ result in columns that map to the underlying EMP table should be allowed because\
    \ the EMP table is key-preserved in this view. For example, this UPDATE statement\
    \ is successful:\n\nCHAPTER 9 ■ VIEWS, SYNONYMS, AND SEQUENCES\n\nSQL> update\
    \ emp_dept_v set emp_name = 'Jon' where emp_name = 'John'; However, statements\
    \ that result in updating the DEPT table’s columns aren’t allowed. The next statement\
    \ attempts to update a column in the view that maps to the DEPT table: SQL> update\
    \ emp_dept_v set dept_name = 'HR West' where dept_name = 'HR'; Here’s the resulting\
    \ error message that’s thrown:\n\nORA-01779: cannot modify a column which maps\
    \ to a non key-preserved table To summarize, a join view can select from many\
    \ tables, but only one of the tables in the join view is key preserved. The primary-key\
    \ and foreign-key relationships of the tables in the query determine which table\
    \ is key-preserved, and not the data returned by the view.\n\nCreating an INSTEAD\
    \ OF Trigger\n\nAn INSTEAD OF trigger on a view instructs Oracle to execute PL/SQL\
    \ code instead of using the DML\n\nstatement. The INSTEAD OF trigger allows you\
    \ to modify the underlying base tables in ways that you can’t with regular join\
    \ views.\n\nI’m not a huge fan of INSTEAD OF triggers. In my opinion, if you’re\
    \ considering using them, you should rethink how you’re issuing DML statements\
    \ to modify base tables. Maybe you should allow the application to issue INSERT,\
    \ UPDATE, and DELETE statements directly against the base tables instead of trying\
    \ to build PL/SQL INSTEAD OF triggers on a view.\n\nThink about how you’ll maintain\
    \ and troubleshoot issues with INSTEAD OF triggers. Will it be difficult for the\
    \ next DBA to figure out how the base tables are being modified? Will it be easy\
    \ for the next DBA or developer to make modifications to the INSTEAD OF triggers?\
    \ When an INSTEAD OF trigger throws an error, will it be obvious what code is\
    \ throwing the error and how to resolve the problem?\n\nHaving said that, if you\
    \ determine that you require an INSTEAD OF trigger on a view, use the INSTEAD\n\
    \nOF clause to create it, and embed it in it the required PL/SQL. This example\
    \ creates an INSTEAD OF trigger on the EMP_DEPT_V view (created in the previous\
    \ section):\n\ncreate or replace trigger emp_dept_v_updt\n\ninstead of update\
    \ on emp_dept_v\n\nfor each row\n\nbegin\n\nupdate emp set emp_name=UPPER(:new.emp_name)\n\
    \nwhere emp_id=:old.emp_id;\n\nend;\n\n/\n\nNow, when an update is issued against\
    \ EMP_DEPT_V, instead of the DML being executed, Oracle intercepts the statement\
    \ and runs the INSTEAD OF PL/SQL code. For example: SQL> update emp_dept_v set\
    \ emp_name='Jonathan' where emp_id = 10;\n\n1 row updated.\n\nNow you can verify\
    \ that the trigger correctly updated the table by selecting the data: 197\n\n\
    CHAPTER 9 ■ VIEWS, SYNONYMS, AND SEQUENCES\n\nSQL> select * from emp_dept_v;\n\
    \nEMP_ID EMP_NAME DEPT_NAME DEPT_ID\n\n---------- --------------- ---------------\
    \ ----------\n\n10 JONATHAN IT 2\n\n20 Bob HR 1\n\n30 Craig IT 2\n\n40 Joe SALES\
    \ 3\n\n50 Jane HR 1\n\n60 Mark IT 2\n\nThis code is a simple example, but it illustrates\
    \ that you can have PL/SQL execute instead of the DML that was run on the view.\
    \ Again, be careful when using INSTEAD OF triggers; be sure you’re confident that\
    \ you can efficiently diagnose and resolve any related issues that may arise.\n\
    \nModifying a View Definition\n\nIf you need to modify the SQL query on which\
    \ a view is based, then either drop and re-create the view or use the CREATE OR\
    \ REPLACE syntax as in the previous examples. For instance, to add the REGION\
    \ column to the SALES_ROCKIES view, run the following to replace the existing\
    \ view: create or replace view sales_rockies as\n\nselect sales_id, amnt, state,\
    \ region\n\nfrom sales\n\nwhere state in ('CO','UT','WY','ID','AZ')\n\nwith read\
    \ only;\n\nThe advantage of using the CREATE OR REPLACE method is that you don’t\
    \ have to reestablish access to the view for users with previously granted permissions.\n\
    \nThe alternative to CREATE OR REPLACE is to drop and re-create the view with\
    \ the new definition. If you drop and re-create the view, you must re-grant privileges\
    \ to any users or roles that were previously granted access to the dropped and\
    \ re-created object. For this reason, I almost never use the drop and recreate\
    \ method when altering the structure of a view.\n\n■ **Note** The ALTER VIEW command\
    \ is used to modify a view’s constraint attributes. You can also use the ALTER\n\
    \nVIEW command to recompile a view.\n\nDisplaying the SQL Used to Create a View\n\
    \nSometimes, when you’re troubleshooting issues with the information a view returns,\
    \ you need to see the SQL query on which the view is based. Use the following\
    \ script to display the text associated with a particular view for a user:\n\n\
    select\n\nview_name\n\n,text\n\nfrom dba_views\n\nwhere owner = upper('&owner')\n\
    \nand view_name like upper('&view_name');\n\n![](index-233_1.png)\n\nCHAPTER 9\
    \ ■ VIEWS, SYNONYMS, AND SEQUENCES\n\nRenaming a View\n\nThere are a couple of\
    \ good reasons to rename a view. You may want to change the name so that it better\
    \ conforms to standard, or you may want to rename a view before dropping it so\
    \ that you can better determine whether it’s in use.\n\nUse the RENAME statement\
    \ to change the name of a view. This example renames the INV view to INV_OLD:\n\
    \nSQL> rename inv to inv_old;\n\nYou should see this message:\n\nTable renamed.\n\
    \nDropping a View\n\nBefore you drop a view, consider renaming it. If you’re certain\
    \ that a view isn’t being used anymore, then it makes sense to keep your schema\
    \ as clean as possible and drop any unused objects. Use the DROP VIEW\n\nstatement\
    \ to drop a view:\n\nSQL> drop view inv_v;\n\nKeep in mind that when you drop\
    \ a view, any dependent views, materialized views, and/or synonyms become invalid.\n\
    \nManaging Synonyms\n\nSynonyms provide a mechanism to create an alternate name\
    \ for an object. For example, say USER1 is the currently connected user, and USER1\
    \ has select access to USER2’s EMP table. Without a synonym, USER1\n\nmust select\
    \ from USER2’s EMP table as follows:\n\nSQL> select * from user2.emp;\n\nWith\
    \ a synonym, USER1 can do the following:\n\nSQL> create synonym emp for user2.emp;\n\
    \nSQL> select * from emp;\n\nYou can create synonyms for the following types of\
    \ database objects:\n\n• Tables\n\n• Views or object views\n\n• Other synonyms\n\
    \n• Remote objects via a database link\n\n• PL/SQL packages, procedures, and functions\n\
    \n• Materialized views\n\n• Sequences\n\n• Java class schema object\n\n• User-defined\
    \ object types\n\nCHAPTER 9 ■ VIEWS, SYNONYMS, AND SEQUENCES\n\nCreating a synonym\
    \ that points to another object eliminates the need to specify the schema owner\
    \ or name of the object. This lets you create a layer of abstraction between an\
    \ object and the user, often referred to as *object transparency*. Synonyms allow\
    \ you to transparently manage objects separately from the users who access the\
    \ objects. You can also seamlessly relocate objects to different schemas or even\
    \ different databases. The application code that references the sequences doesn’t\
    \ need to change—only the definition of the synonym.\n\n■ **Tip** You can use\
    \ synonyms to set up multiple application environments within one database. Each\
    \ environment has its own synonyms that point to a different user’s objects, allowing\
    \ you to run the same code against several different schemas within one database.\
    \ For example, you may do this because you can’t afford to build a separate box\
    \ or database for development, testing, quality assurance, production, and so\
    \ on.\n\nCreating a Synonym\n\nUse the CREATE SYNONYM command to create an alias\
    \ for another database object. The following example creates a synonym for a table\
    \ named INV that’s owned by the INV_MGMT user: SQL> create or replace synonym\
    \ inv for inv_mgmt.inv;\n\nAfter you’ve created the INV synonym, you can operate\
    \ on the INV_MGMT.INV table directly. If select access has been granted to the\
    \ INV_MGMT.INV table, you can now select by referencing the synonym INV:\n\nSQL>\
    \ select * from inv;\n\nThe creation of the synonym doesn’t create the privilege\
    \ to access an object. Such privileges must be granted separately, usually before\
    \ you create the synonym.\n\nBy default, when you create a synonym, it’s a private\
    \ synonym. This means it’s owned by the user who created the synonym, and other\
    \ users can’t access the synonym unless they’re granted the appropriate object\
    \ privileges.\n\nCreating Public Synonyms\n\nYou can also define a synonym to\
    \ be public (see the prior section for a discussion of private synonyms), which\
    \ means any user in the database has access to the synonym. Sometimes, an inexperienced\
    \ DBA does the following:\n\nSQL> grant all on books to public;\n\nSQL> create\
    \ public synonym books for inv_mgmt.books;\n\nNow, any user who can connect to\
    \ the database can perform any INSERT, UPDATE, DELETE, or SELECT\n\noperation\
    \ on the BOOKS table that exists in the INV_MGMT schema. You may be tempted to\
    \ do this so you don’t have to bother setting up individual grants and synonyms\
    \ for each schema that needs access. This is almost always a bad idea. There are\
    \ a few issues with using public synonyms: 201\n\nCHAPTER 9 ■ VIEWS, SYNONYMS,\
    \ AND SEQUENCES\n\n• Troubleshooting can be problematic if you’re not aware of\
    \ globally defined (public) synonyms.\n\n• Applications that share one database\
    \ can have collisions on object names if multiple applications use public synonyms\
    \ that aren’t unique within the database.\n\n• Security should be administered\
    \ as needed, not on a wholesale basis.\n\nI usually try to avoid using public\
    \ synonyms. However, there may be scenarios that warrant their use. For example,\
    \ when Oracle creates the data dictionary, public synonyms are used to simplify\
    \ the administration of access to internal database objects. To display any public\
    \ synonyms in your database, run this query:\n\nselect owner, synonym_name\n\n\
    from dba_synonyms\n\nwhere owner='PUBLIC';\n\nDynamically Generating Synonyms\n\
    \nSometimes it’s useful to dynamically generate synonyms for all tables or views\
    \ for a schema that needs private synonyms. The following script uses SQL*Plus\
    \ commands to format and capture the output of a SQL script that generates synonyms\
    \ for all tables within a schema:\n\nCONNECT &&master_user/&&master_pwd.@&&tns_alias\n\
    \n--\n\nSET LINESIZE 132 PAGESIZE 0 ECHO OFF FEEDBACK OFF\n\nSET VERIFY OFF HEAD\
    \ OFF TERM OFF TRIMSPOOL ON\n\n--\n\nSPO gen_syns_dyn.sql\n\n--\n\nselect 'create\
    \ or replace synonym ' || table_name ||\n\n' for ' || '&&master_user..' ||\n\n\
    table_name || ';'\n\nfrom user_tables;\n\n--\n\nSPO OFF;\n\n--\n\nSET ECHO ON\
    \ FEEDBACK ON VERIFY ON HEAD ON TERM ON;\n\nLook at the &&master_user variable\
    \ with the two dots appended to it in the SELECT statement: what is the purpose\
    \ of double-dot syntax? A single dot at the end of an ampersand variable instructs\
    \ SQL*Plus to concatenate anything after the single dot to the ampersand variable.\
    \ When you place two dots together, that tells SQL*Plus to concatenate a single\
    \ dot to the string contained in the ampersand variable.\n\nDisplaying Synonym\
    \ Metadata\n\nThe DBA/ALL/USER_SYNONYMS views contain information about synonyms\
    \ in the database. Use the following SQL to view synonym metadata for the currently\
    \ connected user: select\n\nsynonym_name, table_owner, table_name, db_link\n\n\
    from user_synonyms\n\norder by 1;\n\nCHAPTER 9 ■ VIEWS, SYNONYMS, AND SEQUENCES\n\
    \nThe ALL_SYNONYMS view displays all private synonyms, all public synonyms, and\
    \ any private synonyms owned by different users for which your currently connected\
    \ user has select access to the underlying base table. You can display information\
    \ for all private and public synonyms in your database by querying the DBA_SYNONYMS\
    \ view.\n\nThe TABLE_NAME column in the DBA/ALL/USER_SYNONYMS views is a bit of\
    \ a misnomer because TABLE_NAME can reference many types of database objects,\
    \ such as another synonym, view, package, function, procedure, materialized view,\
    \ and so on. Similarly, TABLE_OWNER refers to the owner of the object (and that\
    \ object may not necessarily be a table).\n\nWhen you’re diagnosing data-integrity\
    \ issues, sometimes you first want to identify what table or object is being accessed.\
    \ You can select from what appears to be a table, but in reality it may be a synonym\
    \ that points to a view that selects from a synonym which in turn points to a\
    \ table in a different database.\n\nThe following query is often a starting point\
    \ for figuring out whether an object is a synonym, a view, or a table:\n\nselect\n\
    \nowner\n\n,object_name\n\n,object_type\n\n,status\n\nfrom dba_objects\n\nwhere\
    \ object_name like upper('&object_name%');\n\nNotice that using the percent-sign\
    \ wildcard character in this query allows you to enter the object’s partial name.\
    \ Therefore, the query has the potential to return information regarding any object\
    \ that partially matches the text string you enter.\n\nYou can also use the GET_DDL\
    \ function of the DBMS_METADATA package to display synonym metadata. If you want\
    \ to display the DDL for all synonyms for the currently connected user, run this\
    \ SQL: SQL> select dbms_metadata.get_ddl('SYNONYM', synonym_name) from user_synonyms;\
    \ You can also display the DDL for a particular user. You must provide as input\
    \ to the GET_DDL\n\nfunction the object type, object name, and schema:\n\nselect\n\
    \ndbms_metadata.get_ddl(object_type=>'SYNONYM', name=>'VDB', schema=>'INV') from\
    \ dual;\n\nRenaming a Synonym\n\nYou may want to rename a synonym so it conforms\
    \ to naming standards or so you can determine whether it’s being used. Use the\
    \ RENAME statement to change the name of a synonym: SQL> rename inv_s to inv_st;\n\
    \nNotice that the output displays this:\n\nTable renamed.\n\nThis message is somewhat\
    \ misleading. It indicates a table has been renamed, when in this scenario it\
    \ was a synonym.\n\nCHAPTER 9 ■ VIEWS, SYNONYMS, AND SEQUENCES\n\nDropping a Synonym\n\
    \nUse the DROP SYNONYM statement to drop a private synonym:\n\nSQL> drop synonym\
    \ inv;\n\nIf it’s a public synonym, then you need to specify PUBLIC when you drop\
    \ it: SQL> drop public synonym inv_pub;\n\nManaging Sequences\n\nA *sequence*\
    \ is a database object that users can access to select unique integers. Sequences\
    \ are typically used to generate integers for populating primary-key and foreign-key\
    \ columns. You increment a sequence by accessing it via a SELECT, INSERT, or UPDATE\
    \ statement. Oracle guarantees that a sequence number is unique when selected;\
    \ no two user sessions can select the same sequence number.\n\nThere is no way\
    \ to guarantee that occasional gaps won’t occur in the numbers generated by a\
    \ sequence. Usually, some number of sequence values are cached in memory, and\
    \ in the event of an instance failure (power failure, shutdown abort), any unused\
    \ values still in memory are lost. Even if you don’t cache the sequence, nothing\
    \ stops a user from acquiring a sequence as part of a transaction and then rolling\
    \ back that transaction. But for most applications, it’s acceptable to have a\
    \ mostly gap-free unique integer generator. Just be aware that gaps can exist.\n\
    \nCreating a Sequence\n\nFor many applications, creating a sequence can be as\
    \ simple as this:\n\nSQL> create sequence inv_seq;\n\nIf you don’t specify a starting\
    \ number and a maximum number for a sequence, by default the starting number is\
    \ 1, the increment is 1, and the maximum value is 10^27\\. This example specifies\
    \ a starting value of 1000 and a maximum value of 1000000:\n\nSQL> create sequence\
    \ inv2 start with 10000 maxvalue 1000000;\n\nTable 9–1 lists the various options\
    \ available when you’re creating a sequence.\n\nCHAPTER 9 ■ VIEWS, SYNONYMS, AND\
    \ SEQUENCES\n\n***Table 9–1.** Sequence-Creation Options*\n\n**Option Description**\n\
    \nINCREMENT BY\n\nSpecifies the interval between sequence numbers.\n\nSTART WITH\n\
    \nSpecifies the first sequence number generated.\n\nMAXVALUE\n\nSpecifies the\
    \ maximum value of the sequence.\n\nNOMAXVALUE\n\nSets the maximum value of a\
    \ sequence to a really big number (10^28 -1).\n\nMINVALUE\n\nSpecifies the minimum\
    \ value of sequence.\n\nNOMINVALUE\n\nSets the minimum value to 1 for an ascending\
    \ sequence; sets the value to –\n\n(10^28–1) for a descending sequence.\n\nCYCLE\n\
    \nSpecifies that when the sequence hits a maximum or minimum value, it\n\nshould\
    \ start generating numbers from the minimum value for an\n\nascending sequence\
    \ and from the maximum value for a descending\n\nsequence.\n\nNOCYCLE\n\nTells\
    \ the sequence to stop generating numbers after a maximum or\n\nminimum value\
    \ is reached.\n\nCACHE\n\nSpecifies how many sequence numbers to preallocate and\
    \ keep in\n\nmemory. If CACHE and NOCACHE aren’t specified, the default is CACHE\
    \ 20.\n\nNOCACHE\n\nSpecifies that sequence numbers aren’t to be cached.\n\nORDER\n\
    \nGuarantees that the numbers are generated in the order of request.\n\nNOORDER\n\
    \nUsed if you don’t need to guarantee that sequence numbers are generated in the\
    \ order of request. This is usually acceptable and is the default.\n\nUsing Sequence\
    \ Pseudo-columns\n\nAfter a sequence is created, you can use two pseudo-columns\
    \ to access the sequence’s value:\n\n• NEXTVAL\n\n• CURRVAL\n\nYou can reference\
    \ these pseudo-columns in any SELECT, INSERT, or UPDATE statements. To retrieve\
    \ a value from the INV_SEQ sequence, access the NEXTVAL value as shown:\n\nSQL>\
    \ select inv_seq.nextval from dual;\n\nCHAPTER 9 ■ VIEWS, SYNONYMS, AND SEQUENCES\n\
    \nNow that a sequence number has been retrieved for this session, you can use\
    \ it multiple times by accessing the CURRVAL value:\n\nSQL> select inv_seq.currval\
    \ from dual;\n\nThe following example uses a sequence to populate the primary-key\
    \ value of a parent table, and then uses the same sequence to populate the corresponding\
    \ foreign-key values in a child table. The sequence can be accessed directly in\
    \ the INSERT statement. The first time you access the sequence, use the NEXTVAL\
    \ pseudo-column.\n\nSQL> insert into inv(inv_id, inv_desc) values (inv_seq.nextval,\
    \ 'Book'); If you want to reuse the same sequence value, you can reference it\
    \ via the CURRVAL pseudocolumn. Next, a record is inserted into a child table\
    \ that uses the same value for the foreign-key column as its parent primary-key\
    \ value:\n\ninsert into inv_lines\n\n(inv_line_id,inv_id,inv_item_desc)\n\n**values**\n\
    \n **(1, inv_seq.currval, 'Tome1');\n\n--\n\ninsert into inv_lines\n\n(inv_line_id,inv_id,inv_item_desc)\n\
    \nvalues\n\n(2, inv_seq.currval, 'Tome2');\n\nAutoincrementing Columns\n\nI occasionally\
    \ get this request from a developer: “I used to work with another database, and\
    \ it had a really cool feature that would allow you to create a table and as part\
    \ of the table definition specify that a column should always be populated with\
    \ an automatically incrementing number.” I usually reply something like, “Oracle\
    \ has no such feature. If you have an issue with this, please send an email to\
    \ Larry at….” Or I inform the developer that they can either use the sequence\
    \ number directly in an INSERT\n\nstatement (as shown in the prior section) or\
    \ select the sequence value into a variable and then reference the variable as\
    \ needed.\n\nIf you really need an autoincrementing column, you can simulate this\
    \ functionality by using triggers. For example, say you create a table and sequence\
    \ as follows: SQL> create table inv(inv_id number, inv_desc varchar2(30));\n\n\
    SQL> create sequence inv_seq;\n\nNext, create a trigger on the INV table that\
    \ automatically populates the INV_ID column from the sequence:\n\ncreate or replace\
    \ trigger inv_bu_tr\n\nbefore insert on inv\n\nfor each row\n\nbegin\n\nselect\
    \ inv_seq.nextval into :new.inv_id from dual;\n\nend;\n\n/\n\nNow, insert a couple\
    \ of records into the INV table:\n\nSQL> insert into inv (inv_desc) values( 'Book');\n\
    \nSQL> insert into inv (inv_desc) values( 'Pen');\n\n![](index-241_1.png)\n\n\
    CHAPTER 9 ■ VIEWS, SYNONYMS, AND SEQUENCES\n\nSQL> create sequence inv_seq_odd\
    \ start with 1 increment by 2;\n\nSQL> create sequence inv_seq_even start with\
    \ 2 increment by 2;\n\nSQL> create sequence inv_seq_odd_dwn start with -1 increment\
    \ by -2; SQL> create sequence inv_seq_even_dwn start with -2 increment by -2;\
    \ The numbers generated by these four sequences should never intersect. However,\
    \ this approach is limited to being able to use only four sequences.\n\nIf you\
    \ need more than four unique sequences, you can use ranges of numbers. For example:\
    \ SQL> create sequence inv_seq_low start with 1 increment by 1 maxvalue 10000000;\
    \ SQL> create sequence inv_seq_ml start with 10000001 increment by 1 maxvalue\
    \ 20000000; SQL> create sequence inv_seq_mh start with 20000001 increment by 1\
    \ maxvalue 30000000; SQL> create sequence inv_seq_high start with 30000001 increment\
    \ by 1 maxvalue 40000000; With this technique, you can set up numerous different\
    \ ranges of numbers to be used by each sequence. The downside is that you’re limited\
    \ by the number of unique values that can be generated by each sequence.\n\nUsing\
    \ One Sequence or Many\n\nSay you have an application with 20 tables. One question\
    \ that comes up is whether you should use 20\n\ndifferent sequences to populate\
    \ the primary-key and/or foreign-key columns for each table, or use just 1\n\n\
    sequence.\n\nI recommend using just one sequence. One sequence is easier to manage\
    \ than multiple sequences, it’s less DDL code to manage, and it means fewer places\
    \ to investigate when there are issues.\n\nSometimes developers raise issues such\
    \ as\n\n• Performance issues with only one sequence\n\n• Sequence numbers that\
    \ get too high\n\nIf you cache the sequence values, usually there are no performance\
    \ issues with accessing sequences.\n\nThe maximum number for a sequence is 10^28–1,\
    \ so if the sequence is incrementing by 1, you’ll never reach the maximum value\
    \ (at least, not in this lifetime).\n\nHowever, in some scenarios where you’re\
    \ generating surrogate keys for the primary and child tables, it’s convenient\
    \ to use more than one sequence. In these situations, multiple sequences per application\
    \ may be warranted. When you use this approach, you must remember to add a sequence\
    \ when tables are added and potentially drop sequences as tables are removed.\
    \ It isn’t a big deal, but it means a little more maintenance for the DBA; and\
    \ the developers must ensure that they use the correct sequence for each table.\n\
    \nViewing Sequence Metadata\n\nIf you have DBA privileges, you can query the DBA_SEQUENCES\
    \ view to display information about all sequences in the database. To view sequences\
    \ that your schema owns, query the USER_SEQUENCES view: select\n\nsequence_name\n\
    \n,min_value\n\n,max_value\n\n,increment_by\n\nfrom user_sequences;\n\nCHAPTER\
    \ 9 ■ VIEWS, SYNONYMS, AND SEQUENCES\n\nTo view the DDL code required to recreate\
    \ a sequence, access the DBMS_METADATA view. If you’re using SQL*Plus to execute\
    \ DBMS_METADATA, first ensure that you set the LONG variable: SQL> set long 5000\n\
    \nThis example extracts the DDL for INV_SEQ:\n\nSQL> select dbms_metadata.get_ddl('SEQUENCE','INV_SEQ')\
    \ from dual; Here’s a snippet of the output:\n\nCREATE SEQUENCE \"INV_MGMT\".\"\
    INV_SEQ\"\n\nMINVALUE 1 MAXVALUE 9999999999999999999999\n\n999999 INCREMENT BY\
    \ 1 START WITH 1 CACHE 20 NOORDER NOCYCLE\n\nIf you want to display the DDL for\
    \ all sequences for the currently connected user, run this SQL: SQL> select dbms_metadata.get_ddl('SEQUENCE',sequence_name)\
    \ from user_sequences; You can also generate the DDL for a sequence owned by a\
    \ particular user by providing the SCHEMA parameter:\n\nselect\n\ndbms_metadata.get_ddl(object_type=>'SEQUENCE',\
    \ name=>'INV_SEQ', schema=>'INV_APP') from dual;\n\nRenaming a Sequence\n\nOccasionally\
    \ you may need to rename a sequence. For example, a sequence may have been created\
    \ with an erroneous name, or you want to rename the sequence before dropping it\
    \ from the database. Use the RENAME statement to do this. This example renames\
    \ INV_SEQ to INV_SEQ_OLD: SQL> rename inv_seq to inv_seq_old;\n\nYou should see\
    \ the following message:\n\nTable renamed.\n\nIn this case, the message indicates\
    \ that the sequence has been renamed.\n\nDropping a Sequence\n\nTo drop a sequence,\
    \ use the DROP SEQUENCE statement:\n\nSQL> drop sequence inv;\n\nTo reset a sequence\
    \ number, you can drop the sequence and re-create it with the desired starting\
    \ point. The following code drops a sequence and then re-creates it to start at\
    \ the number 1: SQL> drop sequence cia_seq;\n\nSQL> create sequence cia_seq start\
    \ with 1;\n\nCHAPTER 9 ■ VIEWS, SYNONYMS, AND SEQUENCES\n\n■ **Tip** See the next\
    \ section on resetting a sequence for an alternative approach to dropping and\
    \ re-creating a sequence.\n\nResetting a Sequence\n\nIn a couple of scenarios,\
    \ you may be required to change the current value of a sequence number:\n\n• Scenario\
    \ 1: Your task is to create a development environment from a copy of production.\
    \ You create the copy of production with a Data Pump export. During the export\
    \ process, some sequences are exported before the tables are exported.\n\nBecause\
    \ the application using the database doesn’t stop transacting during the export,\
    \ it increments the sequence by several thousand numbers beyond what the exported\
    \ sequence contains. When you do the import and begin selecting from the sequence,\
    \ you realize that the current value of the imported sequence is too low and contains\
    \ numbers that are already in use in the tables. To work around this, you need\
    \ to increment your sequence(s) one time with a large value beyond that currently\
    \ used by keys in the tables.\n\n• Scenario 2: You have a test database and periodically\
    \ need to truncate tables and reset the sequence back to zero.\n\nThese two scenarios\
    \ are detailed in the following subsections.\n\nSetting the Current Value of a\
    \ Sequence to a Higher or Lower Value\n\nOracle’s documentation states, “to restart\
    \ a sequence at a different number, you must drop and recreate it.” That’s not\
    \ entirely accurate (as this section shows). In most cases, you should avoid dropping\
    \ a sequence because you must re-grant permissions on the object to users that\
    \ currently have select permissions on the sequence. This can lead to temporary\
    \ downtime for your application while you track down users that need to be re-granted\
    \ select permission.\n\nThe technique in this section demonstrates how to set\
    \ the current value to a higher or lower value using the ALTER SEQUENCE statement.\
    \ The basic procedure is as follows: 1\\. Alter INCREMENT BY to a large number.\n\
    \n2\\. Select from the sequence to increment it by the large positive or negative\
    \ value.\n\n3\\. Set INCREMENT BY back to its original value (usually 1).\n\n\
    This example sets the next value of a sequence number to 1000 integers higher\
    \ than the current value: SQL> alter sequence myseq increment by 1000;\n\nSQL>\
    \ select myseq.nextval from dual;\n\nSQL> alter sequence myseq increment by 1;\n\
    \nYou can also use this technique to set the sequence number to a much lower number\
    \ than the current value. The difference is that the INCREMENT BY setting is a\
    \ large negative number. For example, this sets the sequence back 1000 integers:\n\
    \nSQL> alter sequence myseq increment by -1000;\n\nSQL> select myseq.nextval from\
    \ dual;\n\nSQL> alter sequence myseq increment by 1;\n\nCHAPTER 9 ■ VIEWS, SYNONYMS,\
    \ AND SEQUENCES\n\nResetting a Sequence Back to a Lower Value\n\nSometimes you\
    \ need to reset a sequence back to a starting point. For example, you may have\
    \ a test database in which you occasionally truncate all the table data and reset\
    \ the sequence the application uses back to 1\\. Oracle doesn’t provide a way\
    \ to reset a sequence. You have two options in this situation:\n\n• Drop the sequence\
    \ and re-create it at the desired starting number.\n\n• As a one-time operation,\
    \ alter the sequence to increment by a large negative number, increment it once\
    \ by that number, and then set the increment value back to a positive 1.\n\nTo\
    \ quickly reset a sequence, you can drop and re-create it:\n\nSQL> drop sequence\
    \ myseq;\n\nSQL> create sequence myseq;\n\nThe default starting number for a sequence\
    \ is 1:\n\nSQL> select myseq.nextval from dual;\n\nNEXTVAL\n\nOr you can re-create\
    \ the sequence with a starting value. For example, this creates a sequence starting\
    \ with the number 1000:\n\nSQL> create sequence myseq start with 1000;\n\nOne\
    \ side effect of dropping and re-creating a sequence is that if other schemas\
    \ access the sequence, you must re-grant them select access to the sequence. This\
    \ is because when you drop an object, any grants that were associated with that\
    \ object are also dropped. Dropping and re-creating a sequence like this can have\
    \ an adverse impact on your application if you haven’t done a good job of determining\
    \ which users need access to the dropped and re-created sequence.\n\nAn alternative\
    \ approach to dropping and re-creating the sequence is to alter the sequence’s\
    \ INCREMENT BY value to one integer below where you want to reset it, and then\
    \ alter the sequence’s INCREMENT BY value to 1\\. Doing so effectively resets\
    \ the sequence without having to drop and re-create it and removes the need to\
    \ re-grant select access to the sequence. This technique is shown in the next\
    \ several lines of SQL code:\n\nUNDEFINE seq_name\n\nUNDEFINE reset_to\n\nPROMPT\
    \ \"sequence name\" ACCEPT '&&seq_name'\n\nPROMPT \"reset to value\" ACCEPT &&reset_to\n\
    \nCOL seq_id NEW_VALUE hold_seq_id\n\nCOL min_id NEW_VALUE hold_min_id\n\n--\n\
    \nSELECT &&reset_to - &&seq_name..nextval - 1 seq_id\n\nFROM dual;\n\n--\n\nSELECT\
    \ &&hold_seq_id - 1 min_id FROM dual;\n\n--\n\nALTER SEQUENCE &&seq_name INCREMENT\
    \ BY &hold_seq_id MINVALUE &hold_min_id;\n\n--\n\nSELECT &&seq_name..nextval FROM\
    \ dual;\n\n--\n\nCHAPTER 9 ■ VIEWS, SYNONYMS, AND SEQUENCES\n\nALTER SEQUENCE\
    \ &&seq_name INCREMENT BY 1;\n\nTo ensure that the sequence has been set to the\
    \ value you want, select the NEXTVAL from it: SQL> select &&seq_name..nextval\
    \ from dual;\n\nThis approach can be quite useful when you’re moving applications\
    \ through various development, test, and production environments. It allows you\
    \ to reset the sequence without having to reissue object grants.\n\nSummary\n\n\
    Views, synonyms, and sequences are used extensively in Oracle database applications.\
    \ These objects (along with tables and indexes) provide the technology for creating\
    \ sophisticated applications.\n\nViews provide a way to create and store complex\
    \ multi-table join queries that can then be used by databases users and applications.\
    \ Views can be used to update the underlying base tables or can be created read-only\
    \ for reporting requirements.\n\nSynonyms (along with appropriate privileges)\
    \ provide a mechanism to transparently allow a user to access objects that are\
    \ owned by a separate schema. The user accessing a synonym only needs to know\
    \ the synonym name, regardless of the underlying object type and owner. This lets\
    \ the application designer seamlessly separate the owner of the objects from the\
    \ users that access the objects.\n\nSequences generate unique integers that are\
    \ often used by applications to populate primary-key and foreign-key columns.\
    \ Oracle guarantees that when a sequence is accessed, it will always return a\
    \ unique value to the selecting user.\n\nAfter installing the Oracle binaries\
    \ and creating a database and tablespaces, usually you create an application that\
    \ consists of the owning user and corresponding tables, constraints, indexes,\
    \ views, synonyms, and sequences. Metadata regarding these objects is stored internally\
    \ in the data dictionary.\n\nThe data dictionary is used extensively for monitoring,\
    \ troubleshooting, and diagnosing issues. You must be thoroughly fluent with retrieving\
    \ information from the data dictionary. Retrieving and analyzing data-dictionary\
    \ information is the topic of the next chapter.\n\n![](index-247_1.png)\n\n![](index-248_1.png)\n\
    \nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\nSQL> set long 5000\n\nSQL> select text\
    \ from dba_views where view_name='DBA_VIEWS';\n\nHere’s the output:\n\nselect\
    \ u.name, o.name, v.textlength, v.text, t.typetextlength, t.typetext, t.oidtextlength,\
    \ t.oidtext, t.typeowner, t.typename,\n\ndecode(bitand(v.property, 134217728),\
    \ 134217728,\n\n(select sv.name from superobj$ h, \"_CURRENT_EDITION_OBJ\" sv\
    \ where h.subobj# = o.obj# and h.superobj# = sv.obj#), null),\n\ndecode(bitand(v.property,\
    \ 32), 32, 'Y', 'N'),\n\ndecode(bitand(v.property, 16384), 16384, 'Y', 'N')\n\n\
    from sys.\"_CURRENT_EDITION_OBJ\" o, sys.view$ v, sys.user$ u, sys.typed_view$\
    \ t where o.obj# = v.obj#\n\nand o.obj# = t.obj#(+)\n\nand o.owner# = u.user#\n\
    \n■ **Note** If you manually create a database (not using the database-creation\
    \ assistant), you must be connected as the SYS schema when you run the catalog.sql\
    \ and catproc.sql scripts. The SYS schema is the owner of all objects in the data\
    \ dictionary.\n\nDynamic Performance Views\n\nThe dynamic performance data-dictionary\
    \ views are often referred to as the V$ and GV$ views. These views are constantly\
    \ updated by Oracle and reflect the current condition of the instance and database.\n\
    \nDynamic views are critical for diagnosing real-time performance issues.\n\n\
    The V$ and GV$ views are indirectly based on the underlying X$ tables, which are\
    \ internal memory structures that are instantiated when you start your Oracle\
    \ instance. Some of the V$ views are available the moment the Oracle instance\
    \ is started. For example, V$PARAMETER contains meaningful data after the STARTUP\
    \ NOMOUNT command has been issued, and doesn’t require the database to be mounted\
    \ or open.\n\nOther dynamic views depend on information in the control file and\
    \ therefore contain meaningful information only after the database has been mounted\
    \ (like V$CONTROLFILE). Some V$ views provide kernel-processing information (like\
    \ V$BH) and thus have useful results only after the database has been opened.\n\
    \nAt the top layer, the V$ views are actually synonyms that point to underlying\
    \ SYS.V_$ views. At the next layer down, the SYS.V_$ objects are views created\
    \ on top of another layer of SYS.V$ views. The SYS.V$ views in turn are based\
    \ on the SYS.GV$ views. At the bottom layer, the SYS.GV$ views are based on the\
    \ X$ memory structures.\n\nThe top-level V$ synonyms and SYS.V_$ views are created\
    \ when you run the catalog.sql script, which you usually run after the database\
    \ is initially created. Figure 10–2 shows the process for creating the V$ dynamic\
    \ performance views.\n\n![](index-250_1.png)\n\nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\
    \nIf you know roughly the name of the view from which you want to select information,\
    \ you can first query from DBA_OBJECTS. For example, if you’re troubleshooting\
    \ an issue regarding materialized views, and you can’t remember the exact names\
    \ of the data-dictionary views associated with materialized views, you can do\
    \ this:\n\nselect\n\nobject_name\n\nfrom dba_objects\n\nwhere object_name like\
    \ '%MV%'\n\nand owner='SYS';\n\nSometimes that’s enough to get you in the ballpark.\
    \ But often you need more information about each view. This is where the DICTIONARY\
    \ and DICT_COLUMNS views can be invaluable. The DICTIONARY view stores the name\
    \ of the data-dictionary views. It has two columns:\n\nSQL> desc dictionary\n\n\
    Name Null? Type\n\n----------------------------------------- -------- ----------------------------\n\
    \nTABLE_NAME VARCHAR2(30)\n\nCOMMENTS VARCHAR2(4000)\n\nFor example, say you’re\
    \ troubleshooting an issue with materialized views, and you want to determine\
    \ the name of data-dictionary views related to the materialized-view feature.\
    \ You can run a query such as this:\n\nselect\n\ntable_name\n\n,comments\n\nfrom\
    \ dictionary where table_name like '%MV%';\n\nHere’s a short snippet of the output:\n\
    \nTABLE_NAME COMMENTS\n\n------------------------- -------------------------------------------------------\n\
    \nDBA_MVIEW_LOGS All materialized view logs in the database\n\nDBA_MVIEWS All\
    \ materialized views in the database\n\nDBA_MVIEW_ANALYSIS Description of the\
    \ materialized views accessible to dba DBA_MVIEW_COMMENTS Comments on all materialized\
    \ views in the database In this manner, you can quickly determine which view you\
    \ need to access. If you want further information about the view, you can describe\
    \ it. For example:\n\nSQL> desc dba_mviews\n\nIf that doesn’t provide you with\
    \ enough information regarding the column names, you can query the DICT_COLUMNS\
    \ view. This view provides comments about the columns of a data-dictionary view.\
    \ For example:\n\nselect\n\ncolumn_name\n\n,comments\n\nfrom dict_columns\n\n\
    where table_name='DBA_MVIEWS';\n\nHere’s a fraction of the output:\n\nCOLUMN_NAME\
    \ COMMENTS\n\n![](index-252_1.png)\n\nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\n\
    Table 10–1 describes some of the views used to report on database physical-space\
    \ management.\n\nThis isn’t an exhaustive list; rather, this table contains the\
    \ most commonly used views for monitoring database space.\n\n***Table 10–1.**\
    \ Overview of Database Space-Management Views*\n\n**Data-Dictionary View**\n\n\
    **Purpose**\n\nV$DATABASE\n\nInformation about the database in the control file\n\
    \nDBA/ALL/USER_USERS\n\nUser account information\n\nDBA/USER_TABLESPACES\n\nTablespace\
    \ descriptions\n\nDBA_DATA_FILES\n\nDatabase datafile descriptions\n\nDBA/USER_FREE_SPACE\n\
    \nFree extents in tablespaces\n\nV$DATAFILE\n\nDatafile information from the control\
    \ file\n\nV$DATAFILE_HEADER\n\nDatafile information derived from the datafile\
    \ header\n\nDBA/ALL/USER_TABLES\n\nTable attribute descriptions\n\nDBA/ALL/USER_INDEXES\n\
    \nIndex attribute descriptions\n\nDBA/USER_SEGMENTS\n\nStorage data for segments\n\
    \nDBA/ALL/USER_PART_TABLES\n\nPartitioned table data\n\nDBA/ALL/USER_PART_INDEXES\n\
    \nPartitioned index data\n\nDBA/ALL/USER_TAB_PARTITIONS\n\nStorage information\
    \ for partitioned tables\n\nDBA/ALL/USER_IND_PARTITIONS\n\nStorage information\
    \ for partitioned indexes\n\nDBA/USER_EXTENTS\n\nExtent information of each segment\n\
    \nV$CONTROLFILE\n\nNames and size of control files\n\nV$LOG\n\nOnline redo-log\
    \ file information in the control file\n\nV$LOG_HISTORY\n\nOnline redo-log file\
    \ history information in control file\n\nV$ARCHIVED_LOG\n\nArchive log-file information\
    \ in the control file\n\nThis chapter doesn’t contain an exhaustive set of SQL\
    \ scripts for querying data-dictionary objects.\n\nRather, it covers basic techniques\
    \ for querying the data dictionary about topics covered up to this point 219\n\
    \nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\nin the book (for example, users, tables,\
    \ indexes, and so on). You should be able to build on the concepts in this chapter\
    \ to fulfill any requirement you have for viewing data-dictionary metadata.\n\n\
    Displaying User Information\n\nYou may find yourself in an environment that contains\
    \ hundreds of databases located on dozens of different servers. In such a scenario,\
    \ you want to ensure that you don’t run the wrong commands in the incorrect database.\
    \ When performing DBA tasks, it’s prudent to verify that you’re connected as the\
    \ appropriate account and to the correct database.\n\nCurrently Connected User\n\
    \nYou can run the following types of SQL commands to verify the currently connected\
    \ user and database information:\n\nSQL> show user;\n\nSQL> select * from user_users;\n\
    \nSQL> select name from v$database;\n\nSQL> select instance_name, host_name from\
    \ v$instance;\n\nAs shown in Chapter 3, an efficient way of staying aware of your\
    \ environment is to set your SQL*Plus prompt automatically via the login.sql script\
    \ to display user and instance information. This example manually sets the SQL\
    \ prompt:\n\nSQL> set sqlprompt '&_USER.@&_CONNECT_IDENTIFIER.> '\n\nHere’s what\
    \ the SQL prompt now looks like:\n\nSYS@O11R2>\n\nYou can also use the SYS_CONTEXT\
    \ built-in SQL function to display a wide variety of details about your currently\
    \ connected session. The general syntax for this function is as follows: SYS_CONTEXT('<namespace>','<parameter>',[length])\n\
    \nThis example displays the user, authentication method, host, and instance: select\n\
    \nsys_context('USERENV','CURRENT_USER') usr\n\n,sys_context('USERENV','AUTHENTICATION_METHOD')\
    \ auth_mth\n\n,sys_context('USERENV','HOST') host\n\n,sys_context('USERENV','INSTANCE_NAME')\
    \ inst\n\nfrom dual;\n\nUSERENV is a built-in Oracle namespace. More than 50 parameters\
    \ are available when you use the USERENV namespace with the SYS_CONTEXT function.\
    \ Table 10–2 describes some of the more useful parameters. Refer to the Oracle\
    \ SQL Reference guide for a complete list of parameters available.\n\nCHAPTER\
    \ 10 ■ DATA DICTIONARY BASICS\n\n***Table 10–2.** Useful USERENV Parameters Available\
    \ with SYS_CONTEXT*\n\n**Parameter Name**\n\n**Description**\n\nAUTHENTICATED_IDENTITY\n\
    \nIdentity used in authentication\n\nAUTHENTICATION_METHOD\n\nMethod of authentication\n\
    \nCURRENT_USER\n\nUsername for the currently active session\n\nDB_NAME\n\nName\
    \ specified by the DB_NAME initialization parameter\n\nDB_UNIQUE_NAME\n\nName\
    \ specified by the DB_UNIQUE_NAME initialization parameter\n\nHOST\n\nHostname\
    \ for the machine where the client initiated the database\n\nconnection\n\nINSTANCE_NAME\n\
    \nInstance name\n\nIP_ADDRESS\n\nIP address of the machine where the client initiated\
    \ the database\n\nconnection\n\nISDBA TRUE if the user authenticated with DBA\
    \ privileges through the operating system or password file\n\nNLS_DATE_FORMAT\n\
    \nDate format for the session\n\nOS_USER\n\nOperating-system user from the machine\
    \ where the client initiated the database connection\n\nSERVER_HOST\n\nHostname\
    \ of the machine where the database instance is running\n\nSERVICE_NAME\n\nService\
    \ name for the connection\n\nSID\n\nSession identifier\n\nTERMINAL\n\nOperating-system\
    \ identifier for the client terminal\n\nUsers Currently Logged In\n\nWhen you’re\
    \ debugging performance or connectivity issues, it’s useful to view which users\
    \ are connected to the database and the number of connections per user. If you\
    \ want to view dynamic information such as users currently logged on to your database,\
    \ as a user assigned the SELECT_CATALOG_ROLE, execute the following query:\n\n\
    CHAPTER 10 ■ DATA DICTIONARY BASICS\n\nselect\n\ncount(*)\n\n,username\n\nfrom\
    \ v$session\n\ngroup by username;\n\nIn Oracle Database 11 *g*, the V$SESSION\
    \ view has nearly 100 columns. Other columns that are commonly queried are OSUSER,\
    \ SQL_ID, PROCESS, MACHINE, PORT, TERMINAL, and PROGRAM. See the *Oracle Database\
    \ Reference* guide (available on Oracle’s OTN website) for a complete list of\
    \ columns and their descriptions.\n\nCurrently Executing SQL\n\nIf you want to\
    \ view SQL statements that currently connected users are running, issue this query:\
    \ select\n\na.sid\n\n,a.username\n\n,b.sql_text\n\nfrom v$session a\n\n,v$sqltext_with_newlines\
    \ b\n\nwhere a.sql_id = b.sql_id\n\norder by\n\na.username\n\n,a.sid\n\n,b.piece;\n\
    \nIf you’re using an Oracle Database 9 *i* or earlier, the previous query won’t\
    \ work because the SQL_ID\n\ncolumn isn’t available. Here’s a query that works\
    \ for older versions of Oracle: select\n\na.sid\n\n,a.username\n\n,b.sql_text\n\
    \nfrom v$session a\n\n,v$sqltext_with_newlines b\n\nwhere a.sql_address = b.address\n\
    \nand a.sql_hash_value = b.hash_value\n\norder by\n\na.username\n\n,a.sid\n\n\
    ,b.piece;\n\n■ **Tip** V$SQLTEXT_WITH_NEWLINES is identical to V$SQLTEXT with\
    \ the exception that V$SQLTEXT_WITH_NEWLINES\n\ndoesn’t replace tabs and newlines\
    \ with spaces.\n\n![](index-257_1.png)\n\nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\
    \nViewing Accessible Tables\n\nSometimes, when you’re troubleshooting table-accessibility\
    \ issues, the first thing to check is which tables you have access to. You can\
    \ query the USER_TABLES view to display tables owned by the currently connected\
    \ user:\n\nselect\n\na.table_name\n\n,b.created\n\n,b.last_ddl_time\n\n,a.last_analyzed\n\
    \nfrom user_tables a, user_objects b\n\nwhere a.table_name = b.object_name;\n\n\
    To view all tables to which your currently connected user has access—for example,\
    \ via GRANT\n\nstatements issued by other owners—use the ALL_TABLES view:\n\n\
    select\n\ntable_name\n\n,tablespace_name\n\nfrom all_tables;\n\nQuerying the USER_TABLES\
    \ view is a quick way to determine which tables exist in your current account,\
    \ whereas the ALL_TABLES view contains every table to which you have any type\
    \ of DML (SELECT, INSERT, UPDATE, and/or DELETE) access. If you have access to\
    \ the DBA_TABLES view, you can also query the tables a user has access to via\
    \ the following query:\n\nselect\n\ntable_name\n\nfrom dba_tables\n\nwhere owner\
    \ = upper('&owner');\n\nWhen you’re troubleshooting, you can check columns like\
    \ CREATED and LAST_DDL_TIME, which tell when the structure of a table was last\
    \ modified. Use the following query to view this information: select\n\na.table_name\n\
    \n,b.created\n\n,b.last_ddl_time\n\n,a.last_analyzed\n\nfrom dba_tables a\n\n\
    ,dba_objects b\n\nwhere a.table_name = b.object_name\n\nand a.owner = upper('&owner');\n\
    \nDisplaying Object Disk-Space Usage\n\nWhen you’re diagnosing database space\
    \ issues, it’s handy to view how much space a user’s tables and indexes are consuming.\
    \ The next query is useful when you want to view the space consumption of objects\
    \ for a user:\n\nUNDEFINE owner\n\nCOL summer FORM 999,999.999\n\nSET LINES 132\
    \ TRIMSPOOL ON PAGES 100\n\nSPO space.txt\n\nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\
    \nSELECT\n\nsegment_name\n\n,partition_name\n\n,tablespace_name\n\n,segment_type\n\
    \n,SUM(bytes)/1024/1024 summer\n\nFROM dba_extents\n\nWHERE owner = UPPER('&&owner')\n\
    \nGROUP BY segment_name,partition_name,tablespace_name,segment_type\n\nORDER BY\
    \ segment_name,partition_name;\n\nSPO OFF;\n\nThis script prompts you for an object\
    \ owner. If the table has partitions, the space per partition is displayed. You\
    \ need access to DBA-level views to run the script. You can modify the script\
    \ to point at the ALL or USER-level views to report on objects for the currently\
    \ connected user account. This query also uses SQL*Plus-specific commands, such\
    \ as setting the line size and column formatting, which are necessary to make\
    \ the output readable.\n\nDisplaying Table Row Counts\n\nWhen you’re investigating\
    \ performance or space issues, it’s useful to display each table’s row count.\
    \ Run the following SQL code as a DBA-privileged schema. Notice that this script\
    \ contains SQL*Plus-specific commands such as UNDEFINE and SPOOL. The script prompts\
    \ you each time for a username: UNDEFINE user\n\nSPOOL tabcount_&&user..sql\n\n\
    SET LINESIZE 132 PAGESIZE 0 TRIMSPO OFF VERIFY OFF FEED OFF TERM OFF\n\nSELECT\n\
    \n'SELECT RPAD(' || '''' || table_name || '''' ||',30)'\n\n|| ',' || ' COUNT(*)\
    \ FROM &&user..' || table_name || ';'\n\nFROM dba_tables\n\nWHERE owner = UPPER('&&user')\n\
    \nORDER BY 1;\n\nSPO OFF;\n\nSET TERM ON\n\n@@tabcount_&&user..sql\n\nSET VERIFY\
    \ ON FEED ON\n\nThis code generates a file named tabcount_<user>.sql that contains\
    \ the SQL statements that select row counts from all tables in the specified schema.\
    \ If the username you provide to the script is INVUSER, then you can run the generated\
    \ script as follows.\n\nSQL> @tabcount_invuser.sql\n\nKeep in mind that if the\
    \ table row counts are high, then this script can take a long time to run (several\
    \ minutes).\n\nDevelopers and DBAs often use SQL to generate SQL statements. This\
    \ is a useful technique when you need to apply the same SQL process (repetitively)\
    \ to many different objects, such as all tables in a schema..If you don’t have\
    \ access to DBA-level views, you can query the USER_TABLES view. For example:\
    \ SPO tabcount.sql\n\nSET LINESIZE 132 PAGESIZE 0 TRIMSPO OFF VERIFY OFF FEED\
    \ OFF TERM OFF\n\nSELECT\n\n'SELECT RPAD(' || '''' || table_name || '''' ||',30)'\n\
    \n|| ',' || ' COUNT(*) FROM ' || table_name || ';'\n\n![](index-260_1.png)\n\n\
    CHAPTER 10 ■ DATA DICTIONARY BASICS\n\n||' PARTITION ( '||r1.partition_name ||'\
    \ )';\n\nEXECUTE IMMEDIATE sql_stmt INTO counter;\n\nDBMS_OUTPUT.PUT_LINE(RPAD(r1.table_name\n\
    \n||'('||r1.partition_name||')',30) ||' '||TO_CHAR(counter));\n\nEND LOOP;\n\n\
    END;\n\n/\n\nSPO OFF\n\nDisplaying Index Information\n\nDBAs often view index\
    \ metadata. Sometimes you need to verify that an environment has all the correct\
    \ indexes, or you may need to investigate a performance problem. This section\
    \ contains several queries that are typically used to retrieve index information\
    \ from the data dictionary.\n\nDisplaying Indexes for a Table\n\nWhen you’re dealing\
    \ with performance issues, one of the first items to check is which columns are\
    \ indexed on a table. First, ensure that the object you’re dealing with is a table\
    \ (and not a synonym or a view). Run the following query to check whether an object\
    \ is a table or not: select\n\nobject_name\n\n,object_type\n\nfrom user_objects\n\
    \nwhere object_name=upper('&object_name');\n\nThis query prompts you for a SQL*Plus\
    \ ampersand variable (OBJECT_NAME). If you’re not using SQL*Plus, you may have\
    \ to modify the query to explicitly query for a particular object.\n\nWhen you’ve\
    \ verified that the object is a table, query the USER_INDEXES view to display\
    \ indexes for a particular table in your user. The USER_INDEXES view contains\
    \ the index name information, and the USER_IND_COLUMNS view contains the columns\
    \ that are indexed. If the index is built on more than one column, the COLUMN_POSITION\
    \ column provides the order in which the columns appear in the index.\n\nFor example:\n\
    \nselect\n\na.index_name\n\n,a.column_name\n\n,b.status\n\n,b.index_type\n\n,a.column_position\n\
    \nfrom user_ind_columns a\n\n,user_indexes b\n\nwhere a.table_name = upper('&table_name')\n\
    \nand a.index_name = b.index_name\n\norder by a.index_name, a.column_position;\n\
    \nThis query prompts you for a SQL*Plus ampersand variable (TABLE_NAME). If you’re\
    \ not using SQL*Plus, you may have to modify the query and name the table of interest.\
    \ The indexes and the corresponding columns are displayed for the table you enter.\n\
    \nIf you use function-based indexes, sometimes it’s handy to display the expression\
    \ used to create those indexes. The function expression is contained in the COLUMN_EXPRESSION\
    \ column of the 227\n\nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\nDBA/ALL/USER_IND_EXPRESSIONS\
    \ view. The following script displays that expression, along with the index and\
    \ table names:\n\nselect\n\ntable_name\n\n,index_name\n\n,column_expression\n\n\
    from user_ind_expressions\n\norder by table_name;\n\nShowing Foreign-Key Columns\
    \ Not Indexed\n\nAfter you’ve built an application, you should verify that all\
    \ the foreign-key columns are indexed. The following query indicates for a schema\
    \ which table columns have foreign-key constraints defined for them but don’t\
    \ have a corresponding index:\n\nselect\n\na.constraint_name cons_name\n\n,a.table_name\
    \ tab_name\n\n,b.column_name cons_column\n\n,nvl(c.column_name,'***No Index***')\
    \ ind_column\n\nfrom user_constraints a\n\njoin\n\nuser_cons_columns b on a.constraint_name\
    \ = b.constraint_name\n\nleft outer join\n\nuser_ind_columns c on b.column_name\
    \ = c.column_name\n\nand b.table_name = c.table_name\n\nwhere constraint_type\
    \ = 'R'\n\norder by 2,1;\n\nFor older DBAs who aren’t familiar with the ANSI SQL\
    \ standard, here’s a similar query that uses the Oracle-specific (+) syntax to\
    \ denote an outer join:\n\nselect\n\na.constraint_name cons_name\n\n,a.table_name\
    \ tab_name\n\n,b.column_name cons_column\n\n,nvl(c.column_name,'***No Index***')\
    \ ind_column\n\nfrom user_constraints a\n\n,user_cons_columns b\n\n,user_ind_columns\
    \ c\n\nwhere constraint_type = 'R'\n\nand a.constraint_name = b.constraint_name\n\
    \nand b.column_name = c.column_name(+)\n\nand b.table_name = c.table_name(+)\n\
    \norder by 2,1;\n\nAny column that has a foreign-key constraint but no corresponding\
    \ index is noted in the last column of the output with the text ***No Index***.\
    \ Here’s some sample output: CONS_NAME TAB_NAME CONS_COLUMN IND_COLUMN\n\n--------------------\
    \ -------------------- -------------------- ----------------\n\nFK_DEPOSITS DEPOSITS\
    \ BATCH_NO ***No Index***\n\nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\nThe USER_CONSTRAINTS\
    \ view contains definitions of all constraints in a user’s schema. This is joined\
    \ to USER_CONS_COLUMNS, which contains information about the columns accessible\
    \ to the user that are used in constraints. You place a LEFT OUTER JOIN clause\
    \ between USER_CONS_COLUMNS and USER_IND_COLUMNS because there may be a case where\
    \ the view on the left side of the join has rows without corresponding rows on\
    \ the right. You then apply the condition that any constraints reported by this\
    \ query are of type R (a referential or foreign-key constraint).\n\nDisplaying\
    \ Constraint Information\n\nConstraints play a critical role in ensuring that\
    \ data conforms to well-defined business rules. You need to be well versed with\
    \ techniques for displaying the various types of constraints that can exist in\
    \ a database.\n\nThe following sections detail some techniques on how to query\
    \ the data dictionary for constraint information.\n\nDisplaying Table Constraints\n\
    \nYou occasionally need to view constraint information. For example, a user or\
    \ developer may report that a constraint violation occurs when they try to insert\
    \ or update data in a table (and they want you to figure out what’s wrong with\
    \ the database). You can query the DBA_CONSTRAINTS view to display constraint\
    \ information for an owner and table name. The following script prompts you for\
    \ two SQL*Plus ampersand variables (OWNER and TABLE_NAME); if you aren’t using\
    \ SQL*Plus, then you may need to modify the script with the appropriate values\
    \ before you run the script:\n\nselect\n\ntable_name\n\n,(case constraint_type\n\
    \nwhen 'P' then 'Primary Key'\n\nwhen 'R' then 'Foreign Key'\n\nwhen 'C' then\
    \ 'Check'\n\nwhen 'U' then 'Unique'\n\nwhen 'O' then 'Read Only View'\n\nwhen\
    \ 'V' then 'Check view'\n\nwhen 'H' then 'Hash expression'\n\nwhen 'F' then 'REF\
    \ column'\n\nwhen 'S' then 'Supplemental logging'\n\nend) cons_type\n\n,constraint_name\
    \ cons_name\n\n,search_condition check_cons\n\n,status\n\nfrom dba_constraints\n\
    \nwhere owner like upper('&owner')\n\nand table_name like upper('&table_name')\n\
    \norder by cons_type;\n\nThe DBA/ALL/USER_CONSTRAINTS views document the constraints\
    \ defined for tables in your database.\n\nIntegrity constraints allow you to define\
    \ rules about your data that are verified by the database engine before the data\
    \ can be successfully added or modified. This ensures that your data has a high\
    \ degree of quality.\n\nThe CONSTRAINT_TYPE column of the DBA/ALL/USER_CONSTRAINTS\
    \ views is a one-character code.\n\nCurrently, there are nine different types\
    \ of constraints. Table 10–3 describes the integrity constraints available.\n\n\
    CHAPTER 10 ■ DATA DICTIONARY BASICS\n\n***Table 10–3.** Integrity Constraint Descriptions*\n\
    \n**Constraint Code**\n\n**Meaning**\n\nC\n\nChecks for a condition\n\nP\n\nPrimary\
    \ key\n\nU\n\nUnique key\n\nR\n\nReferential integrity (foreign key)\n\nV\n\n\
    With check option on a view\n\nO\n\nWith read-only on a view\n\nH\n\nHash expression\n\
    \nF\n\nConstraint with a REF column\n\nS\n\nSupplemental logging\n\n■ **Note**\
    \ The check-constraint types H, F, and S are available only in Oracle Database\
    \ 11g or higher.\n\nShowing Primary-Key and Foreign-Key Relationships\n\nSometimes,\
    \ when you’re diagnosing constraint issues, it’s useful to show what primary-key\
    \ constraint is associated with a foreign-key constraint. For example, perhaps\
    \ you’re attempting to insert into a child table and an error is thrown indicating\
    \ that the parent key doesn’t exist, and you want to display more information\
    \ about the parent key constraint.\n\nThe following script queries the DBA_CONSTRAINTS\
    \ view to determine the parent primary-key constraints that are related to child\
    \ foreign-key constraints. You need to provide as input to the script the owner\
    \ of the table and the child table for which you wish to display primary-key constraints:\
    \ select\n\na.constraint_type cons_type\n\n,a.table_name child_table\n\n,a.constraint_name\
    \ child_cons\n\n,b.table_name parent_table\n\n,b.constraint_name parent_cons\n\
    \n,b.constraint_type cons_type\n\nfrom dba_constraints a\n\n,dba_constraints b\n\
    \nwhere a.owner = upper('&owner')\n\nand a.table_name = upper('&table_name')\n\
    \nand a.constraint_type = 'R'\n\nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\nand a.r_owner\
    \ = b.owner\n\nand a.r_constraint_name = b.constraint_name;\n\nThe preceding script\
    \ prompts you for two SQL*Plus ampersand variables (OWNER and TABLE_NAME); if\
    \ you aren’t using SQL*Plus, then you may need to modify the script with the appropriate\
    \ values before you run the script.\n\nThe following output shows that there are\
    \ two foreign-key constraints. It also shows the parent table primary-key constraints:\n\
    \nC CHILD_TABLE CHILD_CONS PARENT_TABLE PARENT_CONS C\n\n- --------------- -------------------\
    \ --------------- ------------------- -\n\nR REG_COMPANIES REG_COMPANIES_FK2 D_COMPANIES\
    \ D_COMPANIES_PK P\n\nR REG_COMPANIES REG_COMPANIES_FK1 CLUSTER_BUCKETS CLUSTER_BUCKETS_PK\
    \ P\n\nWhen the CONSTRAINT_TYPE column (of DBA/ALL/USER_CONSTRAINTS) contains\
    \ an R value, this indicates that the row describes a referential-integrity constraint,\
    \ which means the child-table constraint references a primary-key constraint.\
    \ You use the technique of joining to the same table twice to retrieve the primary-key\
    \ constraint information. The child-constraint columns (R_OWNER and R_CONSTRAINT_NAME)\
    \ match with another row in the DBA_CONSTRAINTS view that contains the primary-key\
    \ information.\n\nYou can also do the reverse of the prior query in this section;\
    \ for a primary-key constraint, you want to find the foreign-key columns (if any)\
    \ that correlate to it. The next script takes the primary-key record and looks\
    \ to see if it has any child records that have a constraint type of R. When you\
    \ run this script, you’re prompted for the primary-key table owner and name:\n\
    \nselect\n\nb.table_name primary_key_table\n\n,a.table_name fk_child_table\n\n\
    ,a.constraint_name fk_child_table_constraint\n\nfrom dba_constraints a\n\n,dba_constraints\
    \ b\n\nwhere a.r_constraint_name = b.constraint_name\n\nand a.r_owner = b.owner\n\
    \nand a.constraint_type = 'R'\n\nand b.owner = upper('&table_owner')\n\nand b.table_name\
    \ = upper('&table_name');\n\nHere’s some sample output:\n\nPRIMARY_KEY_TABLE FK_CHILD_TABLE\
    \ FK_CHILD_TABLE_CONSTRAINT\n\n-------------------- -------------------- ------------------------------\n\
    \nCLUSTER_BUCKETS CB_AD_ASSOC CB_AD_ASSOC_FK1\n\nCLUSTER_BUCKETS CLUSTER_CONTACTS\
    \ CLUSTER_CONTACTS_FK1\n\nCLUSTER_BUCKETS CLUSTER_NOTES CLUSTER_NOTES_FK1\n\n\
    CLUSTER_BUCKETS DOMAIN_NAMES DOMAIN_NAMES_FK1\n\nCLUSTER_BUCKETS REG_COMPANIES\
    \ REG_COMPANIES_FK1\n\nCLUSTER_BUCKETS CB_MS_ASSOC CB_MS_ASSOC_FK2\n\n **The output\
    \ indicates that the CLUSTER_BUCKETS table has several foreign-key constraints\
    \ that refer to it.\n\nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\nViewing Basic Security\
    \ Information\n\nBasic database security is often administered through roles,\
    \ object grants, and system-privilege grants.\n\nWhen there are data-accessibility\
    \ issues, you must be proficient in retrieving information about these fundamental\
    \ security constructs. The next few sections describe some techniques and queries\
    \ for viewing role and grant assignments.\n\nDisplaying Granted Roles\n\nYou may\
    \ find yourself investigating table-access issues and want to display the roles\
    \ that a user has been granted. Use this query to view which roles are granted\
    \ to the currently connected user: select\n\nusername\n\n,granted_role\n\nfrom\
    \ user_role_privs;\n\nThe next query displays the roles that have been granted\
    \ to a specific user (you're prompted for GRANTEE):\n\nselect\n\ngrantee\n\n,granted_role\n\
    \nfrom dba_role_privs\n\nwhere grantee = upper('&grantee')\n\norder by grantee;\n\
    \nThe USER_ROLE_PRIVS and DBA_ROLE_PRIVS views describe roles granted to users.\
    \ To display roles granted to roles, query the ROLE_ROLE_PRIVS view:\n\nselect\n\
    \nrole\n\n,granted_role\n\nfrom role_role_privs;\n\nWhen you create a database,\
    \ several predefined roles are created for you, including DBA and SELECT_CATALOG_ROLE.\
    \ To view all the roles in your database (both predefined and user-created), select\
    \ the ROLE column from DBA_ROLES:\n\nselect\n\nrole\n\nfrom dba_roles;\n\nHere’s\
    \ some sample output of role names in a typical database:\n\nCONNECT\n\nRESOURCE\n\
    \nDBA\n\nSELECT_CATALOG_ROLE\n\nEXECUTE_CATALOG_ROLE\n\nDELETE_CATALOG_ROLE\n\n\
    EXP_FULL_DATABASE\n\nIMP_FULL_DATABASE\n\nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\
    \nDisplaying System Privileges\n\nDatabase system privileges allow you to perform\
    \ tasks such as connecting to the database and creating and modifying objects.\
    \ For example, some commonly granted privileges are CREATE TABLE and CREATE\n\n\
    VIEW. Query the DBA_SYS_PRIVS view to display which system privileges have been\
    \ granted to users. Listed next is a simple script that prompts for the GRANTEE:\n\
    \nselect\n\ngrantee\n\n,privilege\n\n,admin_option\n\nfrom dba_sys_privs\n\nwhere\
    \ grantee = UPPER('&grantee')\n\norder by privilege;\n\n **To view system privileges\
    \ granted to the currently connected user, run this query: select\n\nusername\n\
    \n,privilege\n\n,admin_option\n\nfrom user_sys_privs;\n\nThe USERNAME column shows\
    \ whether the privilege has been granted to the currently connected user or if\
    \ the privilege has been granted to PUBLIC.\n\nThe ROLE_SYS_PRIVS view displays\
    \ what system privileges have been assigned to a role. When querying this view,\
    \ you see only roles that have been granted to the currently connected schema.\
    \ Here’s an example query that lists privileges granted to a specified role:\n\
    \nselect\n\nrole\n\n,privilege\n\nfrom role_sys_privs\n\nwhere role = upper('&role');\n\
    \nThe prior SQL displays only database system privileges that have been directly\
    \ granted to a user. To view any system privileges that have been granted through\
    \ a role to a user, you have to also query a view such as ROLE_SYS_PRIVS. The\
    \ following query displays system privileges granted either directly to the currently\
    \ connected user or through any roles granted to the user:\n\nselect\n\nprivilege\n\
    \n,'DIRECT GRANT'\n\nfrom user_sys_privs\n\nunion\n\nselect\n\nprivilege\n\n,'ROLE\
    \ GRANT'\n\nfrom role_sys_privs;\n\nTwo roles—CONNECT and RESOURCE—are commonly\
    \ assigned to newly created accounts. However, Oracle recommends that you not\
    \ assign these roles to users because they may not be available in future releases.\
    \ Instead, Oracle advises that you create your own roles and assign privileges\
    \ as required. Run the following query to view privileges assigned to these roles:\n\
    \nselect\n\ngrantee\n\nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\n,privilege\n\nfrom\
    \ dba_sys_privs\n\nwhere grantee IN ('CONNECT','RESOURCE')\n\norder by grantee;\n\
    \nHere’s the output:\n\nROLE PRIVILEGE\n\n------------------------- -------------------------\n\
    \nCONNECT CREATE SESSION\n\nRESOURCE CREATE CLUSTER\n\nRESOURCE CREATE INDEXTYPE\n\
    \nRESOURCE CREATE OPERATOR\n\nRESOURCE CREATE PROCEDURE\n\nRESOURCE CREATE SEQUENCE\n\
    \nRESOURCE CREATE TABLE\n\nRESOURCE CREATE TRIGGER\n\nRESOURCE CREATE TYPE\n\n\
    You can use a vast array of data-dictionary views to determine what users and\
    \ roles have been assigned which system and object privileges. This section has\
    \ touched on only a few examples. See Table 10–4 for a description of the various\
    \ privilege-related data-dictionary views and their purposes.\n\n***Table 10–4.**\
    \ Privilege-Related Data-Dictionary Views*\n\n**View Description**\n\nDBA_ROLES\n\
    \nAll roles in the database\n\nDBA_ROLE_PRIVS\n\nRoles granted to users and roles\n\
