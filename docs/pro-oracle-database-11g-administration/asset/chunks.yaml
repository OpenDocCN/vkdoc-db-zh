    `/ora01/oraredo/O11R2/redo02a.rdo`


    You should see this message when the correct online-redo log is applied: `Log
    applied.`


    `Media recovery complete.`


    The database is completely recovered at this point. However, because a backup
    control file was used for the recovery process, the database must be opened with
    the `RESETLOGS` clause:

    ```

    SQL> alter database open resetlogs;

    ```


    Upon success, you should see this:


    `Database altered.`


    ## Performing an Incomplete Recovery of an Archivelog-Mode Database


    `Incomplete recovery` means you don’t restore all transactions that were committed
    before the failure.


    With this type of recovery, you’re recovering to a point in time in the past,
    and transactions are lost. This is why incomplete recovery is also referred to
    as `database point-in-time recovery` (DBPITR).


    Incomplete recovery doesn’t mean you’re restoring and recovering only a subset
    of datafiles. In fact, with most incomplete scenarios, you have to restore all
    datafiles from the backup as part of the procedure. If you don’t restore all datafiles,
    you first need to take offline any datafiles you don’t intend to participate in
    the incomplete-recovery process. Any datafiles taken offline can’t be later restored
    and recovered.


    You may want to perform an incomplete recovery for many different reasons:

    - You attempt to perform a complete recovery but are missing the required archive-redo
    logs or unarchived online-redo log information.

    - You want to restore the database back to a point in time in the past just prior
    to an erroneous user error (such as deleted data, dropped table, and so on).

    - You have a testing environment in which you have a baseline copy of the database.
    After the testing is finished, you want to reset the database back to baseline
    for another round of new testing.


    If you’re using user-managed incomplete recovery for any of these reasons, you
    should consider using the `Flashback Table` or `Flashback Database` feature. These
    features are discussed in detail later in the chapter.


    You can perform user-managed incomplete recovery three ways:

    - Cancel based

    - SCN based

    - Time based


    `Cancel based` allows you to apply archive redo and halt the process at the boundary
    based on an archive-redo log file. For example, say you’re attempting to restore
    and recover your database, and you realize that you’re missing an archive-redo
    log. You have to stop the recover process at the point of your last good archive-redo
    log. You initiate cancel-based incomplete recovery with the `CANCEL` clause of
    the `RECOVER DATABASE` statement:

    ```

    SQL> recover database until cancel;

    ```


    If you want to recover up to and including a certain SCN number, use `SCN-based`
    incomplete recovery. You may know from the alert log or from the output of `LogMiner`
    the point to which you want to restore to a certain SCN. Use the `UNTIL CHANGE`
    clause to perform this type of incomplete recovery:

    ```

    SQL> recover database until change 12345;

    ```


    If you know the time at which you want to stop the recovery process, use `time-based`
    incomplete recovery. For example, you may know that a table was dropped at a certain
    time and want to restore and recover the database up to the specified time. The
    format for a time-based recovery is always as follows: `''YYYY-MM-DD:HH24:MI:SS''`.
    Here’s an example:

    ```

    SQL> recover database until time ''2010-10-21:02:00:00'';

    ```


    When you perform an incomplete recovery, you have to restore all datafiles that
    you plan to have online when the incomplete restoration is finished. Here are
    the steps for an incomplete recovery:

    1. Shut down the database.

    2. Restore all the datafiles from the backup.

    3. Start the database in mount mode.

    4. Apply redo (roll forward) to the desired point, and halt the recovery process
    (use cancel-, SCN-, or time-based recovery).

    5. Open the database with the `RESETLOGS` clause.


    The following example performs a cancel-based incomplete recovery. If the database
    is open, shut it down:

    ```

    $ sqlplus / as sysdba

    SQL> shutdown abort;

    ```


    Next, copy `all` datafiles from the backup (either a cold or hot backup). This
    example restores all datafiles from a hot backup. For this example, the current
    control file is intact and doesn’t need to be restored. Here’s a partial snippet
    of the OS copy commands for the database being restored:

    ```

    $ cp /oradump/cbackup/O11R2/system01.dbf /ora01/dbfile/O11R2/system01.dbf

    $ cp /oradump/cbackup/O11R2/sysaux01.dbf /ora01/dbfile/O11R2/sysaux01.dbf

    $ cp /oradump/cbackup/O11R2/undotbs01.dbf /ora02/dbfile/O11R2/undotbs01.dbf

    $ cp /oradump/cbackup/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf

    $ cp /oradump/cbackup/O11R2/appdata.dbf /ora01/dbfile/O11R2/appdata.dbf

    ```


    After the datafiles have been copied back, you can initiate the recovery process.
    This example performs a cancel-based incomplete recovery:

    ```

    $ sqlplus / as sysdba

    SQL> startup mount;

    SQL> recover database until cancel;

    ```


    At this point, the Oracle recovery process suggests an archive-redo log to apply:

    `ORA-00279: change 17851736 generated at 08/22/2010 07:33:42 needed for thread
    1`

    `ORA-00289: suggestion : /ora02/oraarch/O11R2/1_3_727625398.arc`

    `ORA-00280: change 17851736 for thread 1 is in sequence #3`

    `Specify log: {<RET>=suggested | filename | AUTO | CANCEL}`


    In this example, you know that the last good archive-redo log that you have is
    sequence 7, so you apply redo to that point and then type `CANCEL`:

    `CANCEL`


    This stops the recovery process. Now you can open the database with the `RESETLOGS`
    clause:

    ```

    SQL> alter database open resetlogs;

    ```


    The database has been opened to a point in time in the past. The recovery is deemed
    incomplete because not all redo was applied.


    ## Flashing Back a Table


    In older versions of the database, if a table was accidentally dropped, you had
    to do the following to restore the table:

    1. Restore a backup of the database to a test database.

    2. Perform an incomplete recovery up to the point in time when the table was dropped.

    3. Export the table.

    4. Import the table into the production database.


    This process can be time-consuming and resource-intensive. It requires extra server
    resources as well as time and effort from a DBA.


    Oracle introduced the `Flashback` feature in recent versions; it lets you quickly
    restore from an accidentally dropped table. Oracle applies the term `flashback`
    to several different database features, which can be confusing. In regard to flashing
    back tables, Oracle provides two distinctly different types of flashback operations:

    - `FLASHBACK TABLE TO BEFORE DROP` quickly undrops a previously dropped table.
    This feature uses the recycle bin.

    - `FLASHBACK TABLE` flashes back to a recent point in time to revert the effects
    of undesired Data Manipulation Language (DML) statements. You can flash back to
    an SCN, timestamp, or restore point.


    Oracle introduced `FLASHBACK TABLE TO BEFORE DROP` to allow you to quickly recover
    a dropped table.


    As of Oracle Database 10 `g`, when you drop a table, if you don’t specify the
    `PURGE` clause, Oracle doesn’t drop the table—instead, the table is renamed. Any
    tables you drop (that Oracle actually renames) are placed into a logical container
    named the `recycle bin`. The recycle bin provides you with an efficient way to
    view and manage dropped objects.


    **Note** To use the `Flashback Table` feature, you don’t need to implement an
    FRA. Nor do you need `Flashback Database` enabled.


    The `FLASHBACK TABLE TO BEFORE DROP` operation only works if your database has
    the recycle bin feature enabled (which it is by default). You can check the status
    of the recycle bin as follows:

    ```

    SQL> show parameter recyclebin

    NAME TYPE VALUE

    ------------------------------------ ----------- ------------------------------

    recyclebin string on

    ```


