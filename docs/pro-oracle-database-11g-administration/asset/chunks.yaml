    \n第 13 章 ■ 数据泵\n\n## 监控数据泵作业\n\n当你有长时间运行的数据泵作业时，应偶尔检查作业状态，以确保作业没有失败，或因某种原因挂起等。有几种方法可以监控数据泵作业的状态：\n\
