    CHAPTER 14 ■ EXTERNAL TABLES


    2\. Use the CREATE TABLE...ORGANIZATION EXTERNAL...AS SELECT statement to unload
    data from the database into the dump file.


    First, create a directory object. The next bit of code creates a directory object
    named DP that points at the /oradump directory:


    SQL> create directory dp as ''/oradump'';


    If you’re not using a user with DBA privileges, then explicitly grant access to
    the directory object to the required user:


    SQL> grant read, write on directory dp to larry;


    To create a dump file, use the ORACLE_DATAPUMP access driver of the CREATE TABLE...ORGANIZATION


    EXTERNAL statement. This example unloads the INV table’s contents into the inv.dmp
    file: CREATE TABLE inv_et


    ORGANIZATION EXTERNAL (


    TYPE ORACLE_DATAPUMP


    DEFAULT DIRECTORY dp


    LOCATION (''inv.dmp'')


    )


    AS SELECT * FROM inv;


    The previous command does two things:


    • Creates an external table named INV_ET based on the INV table


    • Creates a platform-independent dump file named inv.dmp


    Now you can copy the inv.dmp file to a separate database server and base an external
    table on this dump file. The remote server (to which you copy the dump file) can
    be a different platform than the server where you created the file. For example,
    you can create a dump file on a Windows box, copy to a Solaris server, and select
    from the dump file via an external table. In this example, the external table
    is named INV_DW:


    CREATE TABLE inv_dw


    (inv_id number


    ,inv_desc varchar2(30))


    ORGANIZATION EXTERNAL (


    TYPE ORACLE_DATAPUMP


    DEFAULT DIRECTORY dp


    LOCATION (''inv.dmp'')


    );


    After it’s created, you can access the external table data from SQL*Plus: SQL>
    select * from inv_dw;


    You can also create and load data into regular tables using the dump file: SQL>
    create table inv as select * from inv_dw;


    This provides a simple and efficient mechanism for transporting data from one
    platform to another.


    CHAPTER 14 ■ EXTERNAL TABLES


    Using Parallelism to Reduce Elapsed Time


    To maximize the unload performance when you create a dump file via an external
    table, use the PARALLEL clause. This example creates two dump files in parallel:


    CREATE TABLE inv_et


    ORGANIZATION EXTERNAL (


    TYPE ORACLE_DATAPUMP


    DEFAULT DIRECTORY dp


    LOCATION (''inv1.dmp'',''inv2.dmp'')


    )


    PARALLEL 2


    AS SELECT * FROM inv;


    To access the data in the dump files, create a different external table that references
    the two dump files:


    CREATE TABLE inv_dw


    (inv_id number


    ,inv_desc varchar2(30))


    ORGANIZATION EXTERNAL (


    TYPE ORACLE_DATAPUMP


    DEFAULT DIRECTORY dp


    LOCATION (''inv1.dmp'',''inv2.dmp'')


    );


    You can now use this external table to select data from the dump files: SQL> select
    * from inv_dw;


    Compressing a Dump File


    You can create a compressed dump file via an external table. For example, use
    the COMPRESS option of the ACCESS PARAMETERS clause:


    CREATE TABLE inv_et


    ORGANIZATION EXTERNAL (


    TYPE ORACLE_DATAPUMP


    DEFAULT DIRECTORY dp


    ACCESS PARAMETERS (COMPRESSION ENABLED)


    LOCATION (''inv1.dmp'')


    )


    AS SELECT * FROM inv;


    You should see quite good compression ratios when using this option. In my testing,
    the output dump file was 10 to 20 times smaller when compressed. Your mileage
    may vary, depending on the type data being compressed.


    Encrypting a Dump File


    You can also create an encrypted dump file using an external table. This example
    uses the ENCRYPTION


    option of the ACCESS PARAMETERS clause:


    CHAPTER 14 ■ EXTERNAL TABLES


    CREATE TABLE inv_et


    ORGANIZATION EXTERNAL (


    TYPE ORACLE_DATAPUMP


    DEFAULT DIRECTORY dp


    ACCESS PARAMETERS


    (ENCRYPTION ENABLED)


    LOCATION (''inv1.dmp'')


    )


    AS SELECT * FROM inv;


    For this example to work, you need to have a security wallet in place and open
    for your database.


    ■ **Note** Using encryption requires an additional license from Oracle. Contact
    Oracle for details on using the Advanced Security Option.


    You enable compression and encryption via the ACCESS PARAMETERS clause. Table
    14–2 contains a listing of all access parameters available with the ORACLE_DATAPUMP
    access driver.


    ***Table 14–2.** Parameters of the ORACLE_DATAPUMP Access Driver* **Access Parameter**


    **Description**


    COMPRESSION


    Compresses the dump file. DISABLED is the default


    value.


    ENCRYPTION


    Encrypts the dump file. DISABLED is the default


    value.


    NOLOGFILE


    Suppresses the generation of a log file.


    LOGFILE=[directory_object:]logfile_name


    Allows you to name a log file.


    VERSION


    Specifies the minimum version of Oracle that can


    read the dump file.


    Preprocessing an External Table


    Oracle added (in 10.2.0.5 and higher) the ability to preprocess the file on which
    an external table is based. For example, you can instruct the CREATE TABLE...ORGANIZATION
    EXTERNAL statement to uncompress a compressed operating-system file before it’s
    processed.


    Here’s a simple example to illustrate this concept. First, create a directory
    object that contains the location of the compressed file:


    SQL> create or replace directory data_dir as ''/orahome/oracle/dk/et''; 357


    CHAPTER 14 ■ EXTERNAL TABLES


    You also need to create a directory object that contains the location of the script
    that will perform the preprocessing on the data file. In this example, the directory
    is /bin: SQL> create or replace directory exe_dir as ''/bin'';


    This example compressed the operating-system flat file with the gzip utility.
    The compressed file is named exa.csv.gz. You instruct the CREATE TABLE...ORGANIZATION
    EXTERNAL statement to preprocess the compressed file by specifying the PREPROCESSOR
    clause. Because the CSV file was compressed by the gzip utility, it can be uncompressed
    by the corresponding uncompress utility, gunzip. Look carefully for the PREPROCESSOR
    clause in the following listing; it’s nested under ACCESS PARAMETERS: create table
    exadata_et(


    machine_count NUMBER


    ,hide_flag NUMBER


    ,oracle NUMBER


    ,ship_date DATE


    ,rack_type VARCHAR2(32)


    )


    organization external (


    type oracle_loader


    default directory data_dir


    access parameters


    (


    records delimited by newline


    preprocessor exe_dir: ''gunzip''


    fields terminated by ''|''


    missing field values are null


    (exa_id


    ,machine_count


    ,hide_flag


    ,oracle


    ,ship_date char date_format date mask "mm/dd/yyyy"


    ,rack_type)


    )


    location (''ex.csv.gz'')


    )


    reject limit unlimited;


    The advantage of preprocessing the dump file is that it saves you the step of
    having to first uncompress the file.


    ■ **Note** Oracle doesn’t let you use the PREPROCESSOR clause in databases that
    have the Database Vault feature installed.


    CHAPTER 14 ■ EXTERNAL TABLES


    Summary


    I used to use SQL*Loader for all types of data-loading tasks. In the past few
    years, I’ve become an external-table convert. Almost anything you can do with
    SQL*Loader, you can also do with an external table. The external-table approach
    is advantageous because there are fewer moving parts and the interface is SQL*Plus.
    Most DBAs and developers find SQL*Plus easier to use than a SQL*Loader control
    file.


    You can easily use an external table to enable SQL*Plus access to operating-system
    flat files. You simply have to define the structure of the flat file in your CREATE
    TABLE...ORGANIZATION EXTERNAL


    statement. After the external table is created, you can select directly from the
    flat file as if it were a database table. You can select from an external table,
    but you can’t insert, update, or delete.


    When you create an external table, if required, you can then create regular database
    tables by using CREATE TABLE AS SELECT from the external table. Doing so provides
    a fast and effective way to load data stored in external operating-system files.


    The external-table feature also allows you to select data from a table and write
    it to a binary dump file. The external table CREATE TABLE...ORGANIZATION EXTERNAL
    statement defines which tables and columns are used to unload the data. A dump
    file created in this manner is platform independent, meaning you can copy it to
    a server using a different operating system and seamlessly load the data.


    Additionally, the dump file can be encrypted and compressed for secure and efficient
    transportation.


    You can also use parallel features to reduce the amount of time it takes to create
    the dump file.


    The next chapter deals with materialized views. These database objects provide
    you with a flexible, maintainable, and scalable mechanism for aggregating and
    replicating data.


    ![](index-395_1.png)


    CHAPTER 15 ■ MATERIALIZED VIEWS


    After the table is created, you put in a daily process to delete from it at 8:00
    pm and completely refresh it:


    -- Step 1 delete from daily aggregated sales data:


    delete from daily_sales;


    --


    -- Step 2 repopulate table with a snapshot of aggregated sales table: insert into
    daily_sales


    select


    sum(sales_amt)


    ,sales_dtt


    from sales


    group by sales_dtt;


    You inform the users that they can have subsecond query results by selecting from
    DAILY_SALES


    (instead of running the query that directly selects and aggregates from the master
    SALES table). This process roughly describes a complete refresh process.


    Oracle’s MV technology automates and greatly enhances this process. This chapter
    describes the procedure for implementing both basic and complex MV features. After
    reading this chapter and working through the examples, you should be able to create
    MVs to replicate and aggregate data in a wide variety of situations.


    Before delving into the details of creating MVs, it’s useful to cover basic terminology
    and helpful data-dictionary views related to MVs. The next two subsections briefly
    describe the various MV features and the many data-dictionary views that contain
    MV metadata.


    ■ **Note** This chapter doesn’t cover topics like multimaster replication and
    updateable MVs. See the Oracle Advanced Replication Guide (available on Oracle’s
    OTN web site) for more details on those topics.


