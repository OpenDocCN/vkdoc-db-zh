    RMAN> run {


    allocate channel t1 type sbt_tape parms ''ENV=(OB_MEDIA_FAMILY=APRESS_RMAN)'';
    backup database;


    }


    You can configure multiple channels for SBT_TAPE equivalent to the number of available
    physical tape devices. However, if you allocate two channels and only have one
    physical tape device, the other channel will just wait for the tape resource to
    become available. You can also use the CONFIGURE


    command to set the RMAN channel for SBT_TAPE, as shown here:


    RMAN> configure channel device type sbt_tape'
  trans: '# 第 20 章 ■ Oracle 安全备份


    对于文件系统备份，您必须使用时间管理的介质家族，以让 OSB 管理卷的过期。对于 RMAN 备份，您必须使用内容管理的介质家族，让 RMAN 而非 OSB
    来管理磁带上备份片的过期。这避免了 RMAN 元数据与磁带内容之间的不一致。


    要创建时间管理的介质家族，请使用 `mkmf` 命令。在以下示例中，介质家族 `APRESS_OS` 有 7 天的写入窗口和 14 天的保留期。这意味着，自磁带卷上创建第一个备份片起，`APRESS_OS`
    介质家族的卷将在 21 天后过期并准备好被回收：


    ```

    ob> mkmf --writewindow 7days --retain 14days APRESS_OS

    ```


    要创建内容管理的介质家族，请使用 `mkmf` 命令，如下所示。由于默认的卷过期策略就是内容管理的，因此您可以省略 `--contentmanaged` 选项。


    ```

    ob> mkmf --contentmanaged APRESS_RMAN

    ```


    表 20-2 描述了用于维护介质家族的 OSB 命令。


    *表 20-2. 用于维护介质家族的 OSB 命令*

    | 命令 | 含义 |

    | :--- | :--- |

    | `mkmf` | 创建介质家族。 |

    | `lsmf` | 显示介质家族的信息。 |

    | `renmf` | 重命名介质家族。 |

    | `chmf` | 修改介质家族的属性。 |

    | `rmmf` | 删除介质家族。 |


    为了提高安全性并更好地管理磁带备份，您可以为不同的环境（如生产、测试和开发）创建单独的介质家族。这样，生产数据库和测试数据库的备份就不会共享相同的磁带卷。


    ## 配置数据库备份存储选择器


    RMAN 备份的默认介质家族是 `RMAN-DEFAULT`。要在运行 RMAN 备份时使用不同的介质家族，请使用 `mkssel` 命令创建一个数据库备份存储选择器。在以下示例中，数据库备份存储选择器名称为
    `BLLNX3-DB11R2.ssel`，它为在客户端服务器 `BLLNX3` 上托管的 Oracle 数据库 `DB11R2` 的 RMAN 备份分配了介质家族
    `APRESS_RMAN`：


    ```

    ob> mkssel --host BLLNX3 --dbname DB11R2 --family APRESS_RMAN BLLNX3-DB11R2.ssel

    ```


    ■ **注意** 如果一次 RMAN 备份匹配了数据库备份存储选择器上定义的 Oracle 数据库和/或客户端主机，那么您在为 `SBT_TAPE` 分配
    RMAN 通道时，就不必传递 OS 环境变量 `OB_MEDIA_FAMILY` 参数。


    有关用于维护数据库备份存储选择器的 OSB 命令的描述，请参见表 20-3。


    *表 20-3. 用于维护数据库备份存储选择器的 OSB 命令*

    | 命令 | 含义 |

    | :--- | :--- |

    | `mkssel` | 创建数据库备份存储选择器。 |

    | `lsssel` | 显示数据库备份存储选择器的信息。 |

    | `renssel` | 重命名数据库备份存储选择器。 |

    | `chssel` | 修改数据库备份存储选择器的属性。 |

    | `rmssel` | 删除数据库备份存储选择器。 |


    ## 数据库备份


    在第 18 章中，您学习了如何使用 RMAN 将数据库文件备份到磁盘。在本节中，您将使用 OSB 和 RMAN 在磁带上创建备份。配置 RMAN 以备份到磁带有两种方式：

    - 分配通道

    - 配置通道


    第一种选择是在 `run{}` 块内为 `SBT_TAPE` 分配一个 RMAN 通道。在以下示例中，介质家族 `APRESS_RMAN` 作为参数传递给环境变量
    `OB_MEDIA_FAMILY`。磁带卷将具有一个由 OSB 生成的六位数序列号附加的 `APRESS_RMAN` 卷 ID。


    ```

    RMAN> run {

    allocate channel t1 type sbt_tape parms ''ENV=(OB_MEDIA_FAMILY=APRESS_RMAN)'';

    backup database;

    }

    ```


    您可以为 `SBT_TAPE` 配置多个通道，数量与可用的物理磁带设备相同。但是，如果您分配了两个通道却只有一个物理磁带设备，那么另一个通道只会等待磁带资源变得可用。您也可以使用
    `CONFIGURE` 命令来为 `SBT_TAPE` 设置 R 通道，如下所示：


    ```

    RMAN> configure channel device type sbt_tape

    ```'
- fmt: '# CHAPTER 20: ORACLE SECURE BACKUP


    ## Note


    If no media family is explicitly passed when allocating or configuring an RMAN
    channel for `SBT_TAPE` or no Database Backup Storage Selector is defined for the
    specific host and or database, OSB will use the default media family `RMAN-DEFAULT`,
    which is created when OSB is installed.


    ## Table 20–4: OSB Media Management Parameters


    **Parameter** | **Meaning**

    :---|:---

    `OB_MEDIA_FAMILY` | To specify the media family that defines the characteristics
    of the tape volumes.

    `OB_DEVICE` | To specify the tape drives to use during backup.

    `OB_RESOURCE_WAIT_TIME` | To specify the wait time for resources to become available.

    `OB_ENCRYPTION` | To specify the OSB encryption. If this is set, then OSB does
    not perform further encryption.

    `OB_RESTORE_DEVICE` | To specify the tape drives to use during restore.


    ## Database Restore


    For RMAN restore and recover, you have to allocate an RMAN channel for `SBT_TAPE`.
    In the following example, the RMAN channel for `SBT_TAPE` is allocated inside
    the `run{}` block:


    ```

    RMAN> run {

    allocate channel t1 type sbt_tape;

    restore database;

    recover database;

    }

    ```


    Another option is to run the `CONFIGURE` command. Unlike the previous example,
    you must include the `PARMS` clause in the `CONFIGURE` command (if you don''t
    use the `PARMS` clause, a syntax error is returned):


    ```

    RMAN> configure channel device type sbt_tape parms ''ENV=(OB_MEDIA_FAMILY=APRESS_RMAN)'';

    RMAN> restore device type sbt_tape database;

    RMAN> recover device type sbt_tape database;

    ```


    Suppose you have a scenario where the production server is completely gone due
    to a catastrophic event, but luckily you have an offsite tape backup of the database.
    In addition, you are not using an RMAN recovery catalog, and control file autobackup
    is disabled. You discover that the latest backup of the control file is corrupted,
    but you are able to restore the control file from a backup taken two days ago.
    After mounting the database, you realize that the latest RMAN backups taken yesterday
    are not in the list when you issue the `RMAN LIST BACKUP` command (because the
    control file restored was from two days ago and has no knowledge of yesterday''s
    RMAN backup).


    In this situation, the control file restored from a backup taken two days ago
    has no information about the backup pieces created on tape yesterday. To make
    the RMAN repository (control file in this scenario) aware of backup pieces on
    tape, do the following:


    1.  Configure a channel for tape.

    2.  Make the RMAN repository aware of the backup piece via the `CATALOG` command.


    Next, issue the `CATALOG DEVICE TYPE SBT_TAPE BACKUPPIECE` command, followed by
    the name of the backup piece. In this example, one backup piece is cataloged:


    ```

    RMAN> catalog device type sbt_tape backuppiece ''silr06fk_1_1'';

    ```


    If you have multiple backup pieces that you want to catalog, you must issue the
    `CATALOG DEVICE TYPE SBT_TAPE BACKUPPIECE` command for each individual backup
    piece. The key in cataloging the RMAN backup pieces on tape is you must know the
    exact names of the backup pieces.


    ## Note


    As mentioned in Chapter 19, for disk-based backups, you can easily make the RMAN
    repository aware of multiple backup pieces via the `CATALOG START WITH <directory>`
    command. However, this technique only works for disk-based backups and not tape
    backups.


    What if you don''t know the names of the back pieces? One way to figure out their
    names is to check the RMAN log file generated during the RMAN backup. In the snippet
    of the RMAN log file shown here, the RMAN backup piece is `silr06fk_1_1`:


    ```

    channel ORA_SBT_TAPE_1: finished piece 1 at 21-OCT-2010 08:29:35

    piece handle=silr06fk_1_1 tag=TAG20101021T082105 comment=API Version 2.0,MMS Version
    10.3.0.2

    channel ORA_SBT_TAPE_1: backup set complete, elapsed time: 00:08:26

    ```'
