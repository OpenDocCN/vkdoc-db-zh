    Enabling Access to cron


    Sometimes when system administrators set up a new box, they don''t (by default)
    enable the use of cron for all users on the system. To verify whether you have
    access to access cron, type in the following: $ crontab -e


    If you receive the following error message, then you do not have access: You (oracle)
    are not allowed to use this program (crontab)


    To enable cron access as the root user, add oracle to the /etc/cron.allow file
    with the echo command:


    # echo oracle >> /etc/cron.allow


    Once the oracle entry is added to the /etc/cron.allow file, you can use the crontab
    utility to schedule a job.


    ■ **Note** You can also use an editing utility (such as vi) to add an entry to
    the cron.allow file.


    The root user can always schedule jobs with the crontab utility. Other users must
    be listed in the


    /etc/cron.allow file. If the /etc/cron.allow file does not exist, then the operating
    system user must not appear in the /etc/cron.deny file. If neither the /etc/cron.allow
    nor the /etc/cron.deny file exists, then only the root user can access the crontab
    utility.


    ■ **Note** On some Unix operating systems (such as Solaris), the cron.allow and
    cron.deny files are located in the


    /etc/cron.d directory.


    Understanding cron Table Entries


    Your cron table is a list of numbers and commands that the cron background process
    (cron daemon) will run at a specified time and schedule. The crontab utility expects
    entries to follow a well-defined format.


    It’s a good idea to add a comment line at the beginning of your crontab file that
    documents the required format:'
  trans: '

    # **run-parts**


    ```bash

    01 * * * * root run-parts /etc/cron.hourly

    02 4 * * * root run-parts /etc/cron.daily

    22 4 * * 0 root run-parts /etc/cron.weekly

    42 4 1 * * root run-parts /etc/cron.monthly

    ```


    ## **第 21 章 ■ 自动化任务**


    这个 `/etc/crontab` 文件使用 `run-parts` 工具来运行位于以下目录中的脚本：`/etc/cron.hourly`、`/etc/cron.daily`、`/etc/cron.weekly`
    和 `/etc/cron.monthly`。如果有一个需要运行的系统工具，其执行周期并非每小时、每天、每周或每月一次，那么可以将其放置在 `/etc/cron.d`
    目录中。


    每个用户都可以创建自己的 `crontab`（也称为 cron 表）文件。该文件包含了你希望在特定时间和间隔运行的程序列表。此文件通常位于 `/var/spool/cron`
    目录中。对于每一个创建了 cron 表的用户，在 `/var/spool/cron` 目录下都会有一个以该用户名命名的文件。作为 `root` 用户，你可以列出该目录中的文件：


    ```bash

    # ls /var/spool/cron

    oracle root

    ```


    `cron` 后台进程大部分时间处于空闲状态。它每分钟唤醒一次，并检查 `/etc/crontab`、`/etc/cron.d` 以及用户 cron 表文件，以确定是否有任何需要执行的任务。


    表 21–1 总结了 `cron` 使用的各种文件和目录的用途。了解这些文件和目录将有助于你排查问题并更详细地理解 `cron`。


