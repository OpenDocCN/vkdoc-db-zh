  trans: '# 第 16 章 ■ 用户管理的备份与恢复


    请注意，`V$DATAFILE_HEADER` 中记录的 `SCN` 小于 `V$DATAFILE` 中同一数据文件的 `SCN`。此时若尝试打开数据库，Oracle
    会抛出错误，提示需要进行介质恢复（即需要应用重做日志），以将数据文件中的 `SCN` 与控制文件中的 `SCN` 同步。当你在此时尝试打开数据库，会发生以下情况：


    ```

    SQL> alter database open;


    alter database open;


    alter database open


    *


    ERROR at line 1:

    ORA-01113: file 4 needs media recovery

    ORA-01110: data file 4: ''/ora02/dbfile/O11R2/users01.dbf''

    ```


    在数据文件头中的 `SCN` 与控制文件中对应的 `SCN` 匹配之前，Oracle 不允许你打开数据库。


    ## 步骤 3：发出适当的 `RESTORE` 语句


    归档重做日志和在线重做日志包含了将数据文件 `SCN` 赶上控制文件 `SCN` 所需的信息。你可以通过发出以下 `SQL*Plus` 语句之一，将重做日志应用到需要介质恢复的数据文件上：


    - `RECOVER DATAFILE`

    - `RECOVER TABLESPACE`

    - `RECOVER DATABASE`


    由于本例中只有一个数据文件需要恢复，因此使用 `RECOVER DATAFILE` 语句是合适的。不过请记住，你可以运行上述任何一个 `RECOVER` 语句，Oracle
    会自行判断需要恢复什么。在此特定场景下，你可能会发现记住包含已恢复数据文件的表空间名称，比记住数据文件名更容易。接下来，恢复 `USERS` 表空间中所有需要恢复的数据文件：


    `SQL> recover tablespace users;`


    此时，Oracle 使用数据文件头中的 `SCN` 来确定应使用哪个归档重做日志或在线重做日志开始应用重做。如果所有需要的重做日志都存在于在线重做日志中，Oracle
    会应用该重做并显示以下消息：


    `介质恢复完成。`


    如果 Oracle 需要应用仅包含在归档重做日志中的重做日志（意味着包含相应重做的在线重做日志已被覆盖），你会收到 Oracle 的提示，建议首先应用哪个归档重做日志：


    ```

    ORA-00279: 更改 17779631 生成于 2010-08-21 04:51:22，需要用于线程 1

    ORA-00289: 建议：/ora02/oraarch/O11R2/1_33_726314508.arc

    ORA-00280: 更改 17779631 对于线程 1 属于序列号 #33

    指定日志：{<RET>=建议 | 文件名 | AUTO | CANCEL}

    ```


    你可以按回车或回车键（`<RET>`）让 Oracle 应用建议的归档重做日志文件，或指定一个文件名，或指定 `AUTO` 指示 Oracle 自动应用所有建议的文件，或键入
    `CANCEL` 以取消恢复操作。


    在本例中，指定 `AUTO`。Oracle 会应用所有归档重做日志文件和在线重做日志文件中的重做日志，以执行完全恢复：


    ```

    AUTO

    ```


    应用完所有需要的归档重做和在线重做后，显示的最后一条消息是：`日志已应用。`


    `介质恢复完成。`


    ## 步骤 4：将数据库打开


    介质恢复成功后，你可以打开数据库：


    `SQL> alter database open;`


    现在，你可以验证在介质故障之前提交的事务是否已恢复：


    `SQL> select * from foo;`


    `FOO`


    ## 联机状态下恢复与恢复数据库


    如果你丢失了除 `SYSTEM` 和 `UNDO` 表空间之外的其他表空间关联的数据文件，可以在保持数据库联机的情况下，恢复并恢复受损的数据文件。为此，任何需要恢复和恢复的数据文件必须首先被脱机。当用户尝试更新表时遇到类似如下错误，你可能会收到关于某个数据文件存在问题的警报：


    `SQL> insert into foo values(2);`


    ```

    ORA-01116: 打开数据库文件 4 时出错

    ORA-01110: 数据文件 4: ''/ora02/dbfile/O11R2/users01.dbf''

    ORA-27041: 无法打开文件

    ```


    你导航到包含该数据文件的操作系统目录，并确定该数据文件已被系统管理员错误地删除。'
- fmt: "In this example, the datafile associated with the `USERS` tablespace is taken\
    \ offline and subsequently restored and recovered while the rest of the database\
    \ remains online. First, take the datafile offline:\n```sql\nSQL> alter database\
    \ datafile '/ora02/dbfile/O11R2/users01.dbf' offline;\n```\nNow, restore the appropriate\
    \ datafile from the backup location:\n```bash\n$ cp /oradump/hbackup/O11R2/users01.dbf\
    \ /ora02/dbfile/O11R2/users01.dbf\n```\nIn this situation, you can’t use `RECOVER\
    \ DATABASE`. The `RECOVER DATABASE` statement attempts to recover all datafiles\
    \ in the database, of which the `SYSTEM` tablespace is part. The `SYSTEM` tablespace\
    \ can’t be recovered while the database is online.\n\nIf you use the `RECOVER\
    \ TABLESPACE`, all datafiles associated with the tablespace must be offline. In\
    \ this case, it’s more appropriate to recover at the datafile level of granularity:\n\
    ```sql\nSQL> recover datafile '/ora02/dbfile/O11R2/users01.dbf';\n```\nOracle\
    \ inspects the SCN in the datafile header and determines which archive-redo log\
    \ or online-redo log to use to start applying redo. If all redo required is in\
    \ the online-redo logs, you see this message: `Media recovery complete`.\n\nIf\
    \ the starting point for redo is contained only in an archive-redo log file, Oracle\
    \ suggests which file to start with:\n```\nORA-00279: change 17809451 generated\
    \ at 08/21/2010 10:10:56 needed for thread 1\nORA-00289: suggestion : /ora02/oraarch/O11R2/1_45_726314508.arc\n\
    ORA-00280: change 17809451 for thread 1 is in sequence #45\nSpecify log: {<RET>=suggested\
    \ | filename | AUTO | CANCEL}\n```\nYou can type `AUTO` to have Oracle apply all\
    \ required redo in archive-redo log files and online-redo log files:\n```\nAUTO\n\
    ```\nYou should see this message if successful:\n```\nLog applied.\nMedia recovery\
    \ complete.\n```\nYou can now bring the datafile back online:\n```sql\nSQL> alter\
    \ database datafile '/ora02/dbfile/O11R2/users01.dbf' online;\n```\n\n## Restoring\
    \ Control Files\n\nWhen you’re dealing with user-managed backups, you usually\
    \ restore the control file in one of these situations:\n\n*   One control file\
    \ is damaged, and the control file is multiplexed.\n*   All control files are\
    \ damaged.\n\nThese two situations are covered in this section.\n\n### Restoring\
    \ One Damaged Control File When Multiplexed\n\nIf you configure your database\
    \ with more than one control file, you can shut down the database and use an OS\
    \ command to copy an existing control file to the location of the missing control\
    \ file. For example, from the initialization file, you know that two control files\
    \ are used for this database:\n```sql\nSQL> show parameter control_files\n\nNAME\
    \                                 TYPE        VALUE\n------------------------------------\
    \ ----------- ------------------------------\ncontrol_files                  \
    \      string      /ora01/dbfile/O11R2/control01.ctl,\n                      \
    \                           /ora01/dbfile/O11R2/control02.ctl\n```\nSuppose the\
    \ `control02.ctl` file has become damaged. Oracle throws this error when querying\
    \ the data dictionary:\n```\nORA-00210: cannot open the specified control file\n\
    ORA-00202: control file: '/ora01/dbfile/O11R2/control02.ctl'\n```\nWhen a good\
    \ control file is available, you can shut down the database, and copy the existing\
    \ good control file to the name and location of the bad control file:\n```sql\n\
    SQL> shutdown abort;\n```\n```bash\n$ cp /ora01/dbfile/O11R2/control01.ctl /ora01/dbfile/O11R2/control02.ctl\n\
    ```\nNow, restart the database:\n```sql\nSQL> startup;\n```\nIn this manner, you\
    \ can restore a control file from an existing control file.\n\n### Restoring When\
    \ All Control Files Are Damaged\n\nIf you lose all of your control files, you\
    \ can restore one from a backup or you can re-create the control file. As long\
    \ as you have all your datafiles and any required redo (archive redo and online\
    \ redo), you should be able to completely recover your database. The steps for\
    \ this scenario are as follows:\n\n1.  Shut down the database.\n2.  Restore a\
    \ control file from the backup.\n3.  Restore all datafiles from the backup.\n\
    4.  Start the database in mount mode, and initiate database recovery using the\
    \ `RECOVER DATABASE USING BACKUP CONTROLFILE` clause.\n5.  For a complete recovery,\
    \ manually apply the redo contained in the online-redo logs.\n6.  Open the database\
    \ with the `RESETLOGS` clause."
  raw: 'In this example, the datafile associated with the USERS tablespace is taken
    offline and subsequently restored and recovered while the rest of the database
    remains online. First, place take the datafile offline: SQL> alter database datafile
    ''/ora02/dbfile/O11R2/users01.dbf'' offline; Now, restore the appropriate datafile
    from the backup location:


    $ cp /oradump/hbackup/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf In this
    situation, you can’t use RECOVER DATABASE. The RECOVER DATABASE statement attempts
    to recover all datafiles in the database, of which the SYSTEM tablespace is part.
    The SYSTEM tablespace can’t be recovered while the database is online. If you
    use the RECOVER TABLESPACE, all datafiles associated with the tablespace must
    be offline. In this case, it’s more appropriate to recover at the datafile level
    of granularity:


    SQL> recover datafile ''/ora02/dbfile/O11R2/users01.dbf'';


    Oracle inspects the SCN in the datafile header and determines which archive-redo
    log or online-redo log to use to start applying redo. If all redo required is
    in the online-redo logs, you see this message: Media recovery complete.


    If the starting point for redo is contained only in an archive-redo log file,
    Oracle suggests which file to start with:


    ORA-00279: change 17809451 generated at 08/21/2010 10:10:56 needed for thread
    1


    ORA-00289: suggestion : /ora02/oraarch/O11R2/1_45_726314508.arc


    ORA-00280: change 17809451 for thread 1 is in sequence #45


    Specify log: {<RET>=suggested | filename | AUTO | CANCEL}


    You can type AUTO to have Oracle apply all required redo in archive-redo log files
    and online-redo log files:


    AUTO


    You should see this message if successful:


    Log applied.


    Media recovery complete.


    You can now bring the datafile back online:


    SQL> alter database datafile ''/ora02/dbfile/O11R2/users01.dbf'' online; Restoring
    Control Files


    When you’re dealing with user-managed backups, you usually restore the control
    file in one of these situations:


    • One control file is damaged, and the control file is multiplexed.


    • All control files are damaged.


    These two situations are covered in this section.


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    Restoring One Damaged Control File When Multiplexed


    If you configure your database with more than one control file, you can shut down
    the database and use an OS command to copy an existing control file to the location
    of the missing control file. For example, from the initialization file, you know
    that two control files are used for this database: SQL> show parameter control_files


    NAME TYPE VALUE


    ---------------------------- ----------- ------------------------------


    control_files string /ora01/dbfile/O11R2/control01.ctl,


    /ora01/dbfile/O11R2/control02.ctl


    Suppose the control02.ctl file has become damaged. Oracle throws this error when
    querying the data dictionary:


    ORA-00210: cannot open the specified control file


    ORA-00202: control file: ''/ora01/dbfile/O11R2/control02.ctl''


    When a good control file is available, you can shut down the database, and copy
    the existing good control file to the name and location of the bad control file:


    SQL> shutdown abort;


    $ cp /ora01/dbfile/O11R2/control01.ctl /ora01/dbfile/O11R2/control02.ctl Now,
    restart the database:


    SQL> startup;


    In this manner, you can restore a control file from an existing control file.


    Restoring When Al Control Files Are Damaged


    If you lose all of your control files, you can restore one from a backup or you
    can re-create the control file. As long as you have all your datafiles and any
    required redo (archive redo and online redo), you should be able to completely
    recover your database. The steps for this scenario are as follows: 1.


    Shut down the database.


    2.


    Restore a control file from the backup.


    3.


    Restore all datafiles from the backup.


    4.


    Start the database in mount mode, and initiate database recovery using the RECOVER
    DATABASE USING BACKUP CONTROLFILE clause.


    5.


    For a complete recovery, manually apply the redo contained in the online-redo
    logs.


    6.


    Open the database with the RESETLOGS clause.'
  trans: "\n在此示例中，与 `USERS` 表空间关联的数据文件被脱机，随后在数据库其余部分保持在线的状态下被还原和恢复。首先，将数据文件脱机：\n```sql\n\
    SQL> alter database datafile '/ora02/dbfile/O11R2/users01.dbf' offline;\n```\n\
    现在，从备份位置还原相应的数据文件：\n```bash\n$ cp /oradump/hbackup/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf\n\
    ```\n在此情况下，不能使用 `RECOVER DATABASE`。`RECOVER DATABASE` 语句尝试恢复数据库中的所有数据文件，而 `SYSTEM`\
    \ 表空间是其中的一部分。`SYSTEM` 表空间在数据库在线时无法被恢复。\n\n如果使用 `RECOVER TABLESPACE`，则与该表空间关联的所有数据文件必须处于脱机状态。在这种情况下，更合适的做法是在数据文件粒度级别进行恢复：\n\
    ```sql\nSQL> recover datafile '/ora02/dbfile/O11R2/users01.dbf';\n```\nOracle\
    \ 会检查数据文件头中的 SCN，并确定使用哪个归档重做日志或在线重做日志来开始应用重做。如果所有需要的重做都在在线重做日志中，你会看到这条消息：`Media\
    \ recovery complete`。\n\n如果重做的起始点仅存在于归档重做日志文件中，Oracle 会建议从哪个文件开始：\n```\nORA-00279:\
    \ change 17809451 generated at 08/21/2010 10:10:56 needed for thread 1\nORA-00289:\
    \ suggestion : /ora02/oraarch/O11R2/1_45_726314508.arc\nORA-00280: change 17809451\
    \ for thread 1 is in sequence #45\nSpecify log: {<RET>=suggested | filename |\
    \ AUTO | CANCEL}\n```\n你可以输入 `AUTO`，让 Oracle 自动应用所有归档重做日志文件和在线重做日志文件中的必需重做：\n\
    ```\nAUTO\n```\n如果成功，你应该会看到这条消息：\n```\nLog applied.\nMedia recovery complete.\n\
    ```\n现在，你可以将数据文件重新联机：\n```sql\nSQL> alter database datafile '/ora02/dbfile/O11R2/users01.dbf'\
    \ online;\n```\n\n## 还原控制文件\n\n当你处理用户管理的备份时，通常会在以下情况之一还原控制文件：\n\n*   一个控制文件损坏，并且控制文件是多路复用的。\n\
    *   所有控制文件都损坏。\n\n本节涵盖这两种情况。\n\n### 多路复用时还原一个损坏的控制文件\n\n如果你为数据库配置了多个控制文件，可以关闭数据库并使用操作系统命令将现有控制文件复制到丢失控制文件的位置。例如，从初始化文件中，你得知此数据库使用了两个控制文件：\n\
    ```sql\nSQL> show parameter control_files\n\nNAME                            \
    \     TYPE        VALUE\n------------------------------------ ----------- ------------------------------\n\
    control_files                        string      /ora01/dbfile/O11R2/control01.ctl,\n\
    \                                                 /ora01/dbfile/O11R2/control02.ctl\n\
    ```\n假设 `control02.ctl` 文件已损坏。查询数据字典时，Oracle 会抛出此错误：\n```\nORA-00210: cannot open\
    \ the specified control file\nORA-00202: control file: '/ora01/dbfile/O11R2/control02.ctl'\n\
    ```\n当有一个完好的控制文件可用时，你可以关闭数据库，并将现有的完好控制文件复制到损坏控制文件的名称和位置：\n```sql\nSQL> shutdown\
    \ abort;\n```\n```bash\n$ cp /ora01/dbfile/O11R2/control01.ctl /ora01/dbfile/O11R2/control02.ctl\n\
    ```\n现在，重新启动数据库：\n```sql\nSQL> startup;\n```\n这样，你就可以从现有的控制文件还原一个控制文件。\n\n###\
    \ 所有控制文件都损坏时的还原\n\n如果丢失了所有控制文件，你可以从备份中还原一个，或者重新创建控制文件。只要你有所有数据文件和任何必需的重做（归档重做和在线重做），就应该能够完全恢复数据库。此场景的步骤如下：\n\
    \n1.  关闭数据库。\n2.  从备份中还原一个控制文件。\n3.  从备份中还原所有数据文件。\n4.  以装载模式启动数据库，并使用 `RECOVER\
    \ DATABASE USING BACKUP CONTROLFILE` 子句启动数据库恢复。\n5.  对于完全恢复，手动应用在线重做日志中包含的重做。\n\
    6.  使用 `RESETLOGS` 子句打开数据库。\n"
- fmt: '# CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    In this example, all control files for the database were accidentally deleted,
    and Oracle subsequently reports this error:


    `ORA-00202: control file: ''/ora01/dbfile/O11R2/control01.ctl''`

    `ORA-27041: unable to open file`


    ## Step 1: Shut Down the Database


    In this case, you have to shut down your database and restore all datafiles and
    the control file from the backup location to the live database locations. First,
    shut down the database:

    ```sql

    SQL> shutdown abort;

    ```


    ## Step 2: Restore the Control File from the Backup


    This database was configured with just one control file, which you copy back from
    the backup location as shown:

    ```bash

    $ cp /oradump/hbackup/O11R2/controlbk.ctl /ora01/dbfile/O11R2/control01.ctl

    ```

    If more than one control file is being used, you have to copy the backup control
    file to each control file and location name listed in the `CONTROL_FILES` initialization
    parameter.


    ## Step 3: Restore All Datafiles from the Backup


    As part of this recovery procedure, all datafiles must be restored from the backup.
    In this example, all the backup files are in the `/oradump/hbackup/O11R2` directory:

    ```bash

    $ cp /oradump/hbackup/O11R2/*.dbf /ora01/dbfile/O11R2

    ```

    In this type of recovery scenario, you need to copy all the datafiles back from
    the last hot backup. If you didn’t, the `SCN` information in the datafile headers
    would be more current than the `SCN` in the control file. There is no way for
    Oracle to apply redo to a control file to catch it up to a datafile (it works
    just the opposite: redo must be applied to the datafiles).


    ## Step 4: Start the Database in Mount Mode, and Initiate Database Recovery


    Next, start the database in mount mode:

    ```sql

    SQL> startup mount;

    ```

    After the control file(s) and datafiles have been copied back, you can perform
    a recovery. Oracle knows that the control file was from a backup (because it was
    created with the `ALTER DATABASE BACKUP CONTROLFILE` statement), so the recovery
    must be performed with the `USING BACKUP CONTROLFILE` clause:

    ```sql

    SQL> recover database using backup controlfile;

    ```

    At this point, you’re prompted for the application of archive-redo log files:

    ```

    ORA-00279: change 17779631 generated at 08/21/2010 04:51:22 needed for thread
    1

    ORA-00289: suggestion : /ora02/oraarch/O11R2/1_33_726314508.arc

    ORA-00280: change 17779631 for thread 1 is in sequence #33

    Specify log: {<RET>=suggested | filename | AUTO | CANCEL}

    ```

    Type `AUTO` to instruct the recovery process to automatically apply all archive-redo
    logs:

    ```

    AUTO

    ```

    After all archive-redo logs have been applied, it’s instructional to think about
    what would happen if you tried to open your database at this point:

    ```sql

    SQL> alter database open;

    ```

    Oracle throws the following error in this situation:

    ```

    ORA-01589: must use RESETLOGS or NORESETLOGS option for database open

    ```

    In this scenario, the online-redo logs are still intact, so a complete recovery
    is possible by applying the redo that exists in the online-redo logs (and doesn’t
    exist in the archive-redo logs). To apply what’s in the online-redo logs, first
    determine the locations and names of the online-redo log files:

    ```sql

    select a.first_change#, b.member

    from v$log a, v$logfile b

    where a.group# = b.group#;

    ```

    Here’s the partial output for this example:

    ```

    FIRST_CHANGE# MEMBER

    ------------- -----------------------------------

    17779560 /ora01/oraredo/O11R2/redo01a.rdo

    17779678 /ora02/oraredo/O11R2/redo02a.rdo

    ```

    Now, re-initiate the recover process:

    ```sql

    SQL> recover database using backup controlfile;

    ```

    The last archive-redo log generated for this database was sequence 51. The recovery
    process prompts for an archive-redo log that doesn’t exist:

    ```

    ORA-00279: change 17815760 generated at 08/21/2010 13:21:58 needed for thread
    1

    ORA-00289: suggestion : /ora02/oraarch/O11R2/1_52_726314508.arc

    ORA-00280: change 17815760 for thread 1 is in sequence #52

    ```

    Instead of supplying the recovery process with an archive-redo log file, you type
    in the name of an online-redo log file. This instructs the recovery process to
    apply any redo in the online-redo log:'
