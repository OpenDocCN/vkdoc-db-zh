    ```\n\n### 步骤 4：创建数据库\n\n在建立了操作系统变量、创建了初始化文件并创建了任何必需的目录之后，就可以创建数据库了。此步骤说明如何使用\
    \ `CREATE DATABASE` 语句来创建数据库。\n\n在运行 `CREATE DATABASE` 语句之前，必须通过 `STARTUP NOMOUNT`\
