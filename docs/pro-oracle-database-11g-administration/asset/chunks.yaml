- fmt: "# File System Backup\n\n## 重新定义备份的3W1H\n\n与任何备份作业一样，你需要定义三个W（什么、何时、何地）和一个H（如何）。要备份什么数据？何时运行备份？备份存储在何处？备份如何运行？要使用Oracle\
    \ Secure Backup（OSB）完成这3W1H，你需要创建一个数据集文件，并配置备份窗口、备份计划和触发器。\n\n## 创建数据集文件\n\n数据集文件定义了你希望在客户端主机上备份的目录和文件。在以下示例中，此数据集文件指定包含客户端主机`BLLNX1`上`/home/oracle`目录下的所有文件，但排除`/home/oracle/temp`目录下的文件和Oracle数据库相关文件：\n\
    ```\ninclude host BLLNX1\n\ninclude path /home/oracle {\n    exclude oracle database\
    \ files\n    exclude path /home/oracle/temp\n}\n```\n\n要使用`obtool`实用程序创建一个名为`bllnx1_home-oracle.ds`的数据集文件，请执行以下步骤：\n\
    \n1.  发出`mkds`命令，后跟数据集文件的名称。\n    ```\n    ob> mkds bllnx1_home-oracle.ds\n  \
    \  ```\n2.  `vi`编辑器被调用，并显示一个数据集模板。\n3.  注释掉或删除所有现有行，并添加以下行：\n    ```\n    include\
    \ host BLLNX1\n    include path /home/oracle {\n        exclude oracle database\
    \ files\n        exclude path /home/oracle/temp\n    }\n    ```\n4.  按`Esc`键，输入`:wq!`保存文件。\n\
    5.  将显示以下提示。按`Enter`键确认更改。\n    ```\n    Apply your changes, if any [yes]?\n \
    \   ```\n\n这样你就创建了一个数据集文件。有关其他数据集命令的描述，请参考下表。\n\n| 命令 | 含义 |\n| :--- | :--- |\n\
    | `catds` | 显示数据集文件的内容。 |\n| `cdds` | 更改数据集目录。 |\n| `chkds` | 检查数据集文件中的语法。 |\n\
    | `edds` | 修改数据集文件。 |\n| `lsds` | 列出数据集文件和数据集目录名称。 |\n| `mkds` | 创建数据集文件或数据集目录。\
    \ |\n| `pwdds` | 显示数据集目录树中的当前目录。 |\n| `rends` | 重命名数据集文件或数据集目录。 |\n| `rmds` |\
    \ 删除数据集文件或数据集目录。 |\n\n## 配置备份窗口\n\n备份窗口定义了允许计划备份运行的时间范围。默认的备份窗口是每天`00:00`到`24:00`。如果没有定义备份窗口，计划备份将根本不会运行。\n\
    \n对于生产服务器，你可能希望备份仅在每天凌晨1点到5点数据库流量最小时段运行。要定义备份窗口的时间范围，请执行以下步骤：\n\n1.  通过发出`rmbw`命令删除现有的`daily\
    \ 00:00-24:00`备份窗口，因为它与你想要创建的备份窗口重叠，如下所示：\n    ```\n    ob> rmbw daily\n    ```\n\
    2.  发出`lsbw`命令。\n    ```\n    ob> lsbw\n    ```\n    输出显示：\n    ```\n    There\
    \ are no backup windows.\n    ```\n    此结果表明每日备份窗口已被移除。\n3.  要创建备份窗口，请发出`addbw`命令。以下示例定义了从`01:00`到`05:00`的每日备份窗口：\n\
    \    ```\n    ob> addbw --times '01:00-05:00' --days mon,tue,wed,thu,fri,sat,sun\n\
    \    ```\n\n有关其他备份窗口命令，请参考下表。\n\n| 命令 | 含义 |\n| :--- | :--- |\n| `addbw` | 添加一个备份窗口。\
    \ |\n| `chkbw` | 检查是否已定义备份窗口。 |\n| `lsbw` | 列出备份窗口。 |\n| `rmbw` | 移除一个备份窗口。 |\n\
    | `setbw` | 修改一个备份窗口。 |\n\n## 配置备份计划和触发器\n\n备份计划定义了要备份什么数据、将备份存储在何处以及备份如何运行，而触发器定义了计划备份运行的时间。\n\
    \n-   对于要备份的数据，设置特定的数据集。\n-   对于将备份存储在何处，设置特定的磁带驱动器。如果未选择特定的磁带驱动器，则将使用任何可用的磁带驱动器。\n\
    -   对于备份如何运行，设置作业优先级和备份加密选项。作业优先级编号的值越低，调度程序为作业分配的优先级越高。作业优先级的默认值是`100`，加密选项的默认值是`no`。\n\
    \n以下示例使用`mksched`命令为数据集`bllnx1_home-oracle.ds`创建一个名为`bllnx1_home-oracle.sched`的备份计划：\n\
    ```\nob> mksched --dataset bllnx1_home-oracle.ds bllnx1_home-oracle.sched\n```\n\
    \n创建备份计划后，创建一个触发器来定义何时运行计划备份。以下示例使用`chsched`命令为计划`bllnx1_home-oracle.sched`定义一个触发器，以在每天`02:00`（凌晨2点）运行。`-a`选项表示添加触发器(`addtrigger`)，`-d`选项表示日(`day`)，`-t`选项表示时间(`time`)，`-f`选项表示介质族(`media\
    \ family`)。\n```\nob> chsched -a -d daily -t 02:00 -f APRESS_OS bllnx1_home-oracle.sched\n\
    ```\n\n要显示有关备份计划的信息，请发出`lssched`命令，如下所示：\n```\nob> lssched -l bllnx1_home-oracle.sched\n\
    ```\n输出显示如下信息：\n```\nbllnx1_home-oracle.sched:\n    Type: backup\n    State: enabled\n\
    \    Dataset: bllnx1_home-oracle.ds\n    Encryption: no\n    UUID: 1ea82008-bfdd-102d-a743-0002a530c867\n\
    \    Trigger 1:\n        Day/date: daily\n        At: 02:00\n        Backup level:\
    \ full\n        Media family: APRESS_OS\n```\n\n你刚刚安排了一个名为`bllnx1_home-oracle.sched`的备份，它将在每天凌晨2点运行。要监控作业，请参阅本章的“OSB作业监控”部分。\n\
    \n要删除备份计划，请发出`rmsched`命令，如下所示：\n```\nob> rmsched bllnx1_home-oracle.sched\n```\n\
    \n## 执行按需文件系统备份\n\n要在特定客户端主机上运行一次性备份，请使用`backup`命令。在以下示例中，使用的是之前创建的数据集文件`bllnx1_home-oracle.ds`：\n\
    ```\nob> backup --dataset bllnx1_home-oracle.ds --go\n```\n\n如果省略`--go`选项，备份请求仍将保留在队列中。你可以发出`lsbackup`命令来显示队列中排队的备份请求，如下所示：\n\
    ```\nob> lsbackup\n```\n输出可能如下：\n```\nItem #  Save data\n1       dataset bllnx1_home-oracle.ds\n\
    ```\n\n要将备份请求转发给OSB调度程序，请发出带有`GO`选项的以下`backup`命令：\n```\nob> backup --go\n```\n\
    \n要手动备份管理服务器的OSB目录，请发出以下`backup`命令：\n```\nob> backup --level 0 --dataset OSB-CATALOG-DS\
    \ --go\n```\n\n要监控你已提交的备份作业，请参阅本章的“OSB作业监控”部分。\n\n> **注意**：默认情况下，`OSB-CATALOG-SCHED`计划在每天凌晨1点运行，使用数据集文件`OSB-CATALOG-DS`来备份OSB目录。\n\
    \n## 文件系统恢复\n\n有三种方式可以从文件系统备份中恢复：\n-   基于目录的恢复\n-   原始恢复\n-   `obtar`命令\n\n在基于目录的恢复中，你提供可以从OSB目录浏览的目录和文件。在原始恢复和`obtar`命令中，你都需要提供卷ID和文件号。卷ID是分配给磁带卷的唯一名称（包含介质族），文件号是磁带卷上备份镜像的编号。基于目录的恢复和原始恢复都使用`obtool`实用程序执行，而`obtar`命令则在操作系统提示符下发出。\n\
    \n### 执行基于目录的恢复\n\n..."
  raw: 'But what if the RMAN log file is not available? You can issue the lspiece
    command using the obtool utility. In the following example, the output is filtered
    to display only the backup pieces for the hostname BLLNX3 that hosts the database
    DB11R2:


    The following is the snippet of the output of the LSPIECE command:


    POID Database Content Copy Created Host Piece name 8830 DB11R2 incremental 0 10/21.08:23
    BLLNX3 **silr06fk_1_1**


    This listing shows information such as the creation date and backup piece name.
    In this example, the missing RMAN backup piece is silr06fk_1_1\. After you catalog
    the missing RMAN backup pieces, you can proceed with the RMAN restore and recovery.


    File System Backup


    Like any backup job, you need to define the three Ws and one H. What data to backup?
    When to run the backup? Where to store the backup? How the backup runs? To accomplish
    these 3 Ws and 1 H using OSB, you need to create a dataset file, as well configure
    a backup window, a schedule, and a trigger.


    CHAPTER 20 ■ ORACLE SECURE BACKUP


    Creating Dataset Files


    Dataset files define the directories and files on the client hosts that you want
    to backup. In the following example, this dataset file specifies to include all
    files under the directory /home/oracle on the client hosts BLLNX1 except for files
    under the directory /home/oracle/temp and Oracle database-related files: include
    host BLLNX1


    include path /home/oracle {


    exclude path /home/oracle/temp


    exclude oracle database files


    }


    To create a dataset file named bllnx1_home-oracle.ds, perform the following steps
    using the obtool utility, as shown here:


    1\. Issue the mkds command and followed by the name of the dataset file.


    ob> mkds bllnx1_home-oracle.ds


    2\. The vi editor is invoked, and a dataset template is displayed.


    3\. Comment out or remove all existing lines, and add the following lines: include
    host BLLNX1


    include path /home/oracle {


    exclude oracle database files


    exclude path /home/oracle/temp


    }


    4\. Save the file by typing Esc key, : and wq!


    5\. The following prompt is displayed. Press the Enter key to confirm the changes.


    Apply your changes, if any [yes]?


    You just created a dataset file. For descriptions of other dataset commands, refer
    to Table 20–5.


    ***Table 20–5.** Dataset Commands*


    **Command Meaning**


    catds


    To display the contents of a dataset file.


    cdds


    To change the dataset directory.


    chkds


    To check the syntax in a dataset file.


    edds


    To modify a dataset file.


    lsds


    To list the dataset file and dataset directory names.


    mkds


    To create a dataset file or dataset directory.


    pwdds


    To show the current directory in the dataset directory tree.


    rends


    To rename a dataset file or dataset directory.


    rmds


    To delete a dataset file or dataset directory.


    CHAPTER 20 ■ ORACLE SECURE BACKUP


    Configuring Backup Windows


    The backup window defines the range of time the scheduled backups are allowed
    to run. The default backup window is daily 00:00 to 24:00\. If there is no backup
    window defined, the scheduled backups are not going to run at all.


    For production servers, you may want the backups to run daily only between 1 a.m.
    and 5 a.m. when there is minimal database traffic. To define a range of time for
    your backup window, perform the following steps:


    1\. Remove the existing daily 00:00-24:00 backup window, since it overlaps the
    backup window you want to create by issuing the rmbw command, as shown here:


    ob> rmbw daily


    2\. Issue the lsbw command.


    ob> lsbw


    There are no backup windows.


    This result indicates that the daily backup window is already removed.


    3\. To create the backup window, issue the addbw command. The following example
    defines the backup window daily from 01:00 to 0500:


    ob> addbw --times ''01:00-05:00'' ,mon,tue,wed,thu,fri,sat,sun


    For other backup window commands, refer to Table 20–6.


    ***Table 20–6.** Backup Window Commands*


    **Command Meaning**


    addbw


    To add a backup window.


    chkbw


    To check whether there is a backup window defined.


    lsbw


    To list the backup windows.


    rmbw


    To remove a backup window.


    setbw


    To modify a backup window.


    Configuring Backup Schedules and Triggers


    The backup schedule defines what data to backup, where to store the backup, and
    how the backup runs, while the triggers define when a backup is scheduled to run.
    For what data to backup, set the specific datasets. For where to store the backup,
    set the specific tape drives. If no specific tape drive is selected, then any
    available tape drive will be used. For how the backup runs, set the job priority
    and backup encryption options. The lower the value of the job priority number,
    the greater preference is assigned to the job by the scheduler. The default value
    of the job priority is 100 and no for the encryption option.


    The following example uses the MKSCHED command to create a backup schedule named
    bllnx1_home-oracle.sched for dataset bllnx1_home-oracle.ds:


    CHAPTER 20 ■ ORACLE SECURE BACKUP


    ob> mksched --dataset bllnx1_home-oracle.ds bllnx1_home-oracle.sched After creating
    the backup schedule, create a trigger to define when to run the scheduled backup.
    The following example uses the CHSCHED command to define a trigger for schedule
    bllnx1_home-oracle.sched to run daily at 02:00 (2 a.m.). The -a option means the
    addtrigger, the –d option means day, the –t option means time, and the –f means
    media family.


    ob> chsched -a -d daily -t 02:00 -f APRESS_OS bllnx1_home-oracle.sched To display
    the information about the backup schedules, issue the lssched command, like so:
    ob> lssched -l bllnx1_home-oracle.sched


    bllnx1_home-oracle.sched:


    Type: backup


    State: enabled


    Dataset: bllnx1_home-oracle.ds


    Encryption: no


    UUID: 1ea82008-bfdd-102d-a743-0002a530c867


    Trigger 1:


    Day/date: daily


    At: 02:00


    Backup level: full


    Media family: APRESS_OS


    You just scheduled a backup named bllnx1_home-oracle.sched that is going to run
    daily at 2 a.m. To monitor the jobs, refer to the “OSB Job Monitoring” section
    in this chapter.


    To remove a backup schedule, issue the rmsched command, as shown here: ob> rmsched
    bllnx1_home-oracle.sched


    Performing On-Demand File-System Backups


    To run a one-time backup on a specific client host use the backup command. In
    the following example, the dataset file is bllnx1_home-oracle.ds, which was created
    earlier: ob> backup --dataset bllnx1_home-oracle.ds --go


    If you omit the --go option, the backup request is still in the queue. You can
    issue the lsbackup command to display the backup requests that are queued, as
    shown here: ob> lsbackup


    Item # Save data


    1 dataset bllnx1_home-oracle.ds


    To forward the backup request to the OSB scheduler, issue the following backup
    command with the GO option, as shown here:


    ob> backup --go


    To manually back up the OSB catalog of the admin server, issue the following backup
    command: ob> backup --level 0 --dataset OSB-CATALOG-DS --go


    To monitor the backup jobs you have submitted, refer to the “OSB Job Monitoring”
    section of this chapter.


    CHAPTER 20 ■ ORACLE SECURE BACKUP


    ■ **Note** By default, OSB-CATALOG-SCHED is scheduled to run daily at 1 a.m. to
    backup the OSB catalog using the dataset file OSB-CATALOG-DS.


    File System Restore


    There are three options on how you can restore from a file-system backup:


    • catalog-based restore


    • raw restore


    • obtar command


    In a catalog-based restore, you provide the directory and file, which you can
    browse from the OSB


    catalog. In both the raw restore and the obtar command, you provide the volume
    ID and file number.


    The volume ID is the unique name (that contains the media family) assigned to
    a tape volume, and the file number is the number of the backup image on the tape
    volume. Both the catalog-based restore and raw restore are performed using the
    obtool utility, while the obtar commands are issued at the operating system prompt.


    Performing Catalog-Based Restore'
  trans: "\n# 文件系统备份\n\n## 重新定义备份的 3W1H\n\n与任何备份作业一样，你需要定义三个 W（什么、何时、何地）和一个 H（如何）。要备份什么数据？何时运行备份？备份存储在何处？备份如何运行？要使用\
    \ Oracle Secure Backup（OSB）完成这 3W1H，你需要创建一个数据集文件，并配置备份窗口、备份计划和触发器。\n\n## 创建数据集文件\n\
    \n数据集文件定义了你希望在客户端主机上备份的目录和文件。在以下示例中，此数据集文件指定包含客户端主机`BLLNX1`上`/home/oracle`目录下的所有文件，但排除`/home/oracle/temp`目录下的文件和\
    \ Oracle 数据库相关文件：\n```\ninclude host BLLNX1\n\ninclude path /home/oracle {\n \
    \   exclude oracle database files\n    exclude path /home/oracle/temp\n}\n```\n\
    \n要使用`obtool`实用程序创建一个名为`bllnx1_home-oracle.ds`的数据集文件，请执行以下步骤：\n\n1.  发出`mkds`命令，后跟数据集文件的名称。\n\
    \    ```\n    ob> mkds bllnx1_home-oracle.ds\n    ```\n2.  `vi`编辑器被调用，并显示一个数据集模板。\n\
    3.  注释掉或删除所有现有行，并添加以下行：\n    ```\n    include host BLLNX1\n    include path /home/oracle\
    \ {\n        exclude oracle database files\n        exclude path /home/oracle/temp\n\
    \    }\n    ```\n4.  按`Esc`键，输入`:wq!`保存文件。\n5.  将显示以下提示。按`Enter`键确认更改。\n    ```\n\
    \    Apply your changes, if any [yes]?\n    ```\n\n这样你就创建了一个数据集文件。有关其他数据集命令的描述，请参考下表。\n\
    \n| 命令 | 含义 |\n| :--- | :--- |\n| `catds` | 显示数据集文件的内容。 |\n| `cdds` | 更改数据集目录。\
    \ |\n| `chkds` | 检查数据集文件中的语法。 |\n| `edds` | 修改数据集文件。 |\n| `lsds` | 列出数据集文件和数据集目录名称。\
    \ |\n| `mkds` | 创建数据集文件或数据集目录。 |\n| `pwdds` | 显示数据集目录树中的当前目录。 |\n| `rends` | 重命名数据集文件或数据集目录。\
    \ |\n| `rmds` | 删除数据集文件或数据集目录。 |\n\n## 配置备份窗口\n\n备份窗口定义了允许计划备份运行的时间范围。默认的备份窗口是每天`00:00`到`24:00`。如果没有定义备份窗口，计划备份将根本不会运行。\n\
    \n对于生产服务器，你可能希望备份仅在每天凌晨 1 点到 5 点数据库流量最小时段运行。要定义备份窗口的时间范围，请执行以下步骤：\n\n1.  通过发出`rmbw`命令删除现有的`daily\
    \ 00:00-24:00`备份窗口，因为它与你想要创建的备份窗口重叠，如下所示：\n    ```\n    ob> rmbw daily\n    ```\n\
    2.  发出`lsbw`命令。\n    ```\n    ob> lsbw\n    ```\n    输出显示：\n    ```\n    There\
    \ are no backup windows.\n    ```\n    此结果表明每日备份窗口已被移除。\n3.  要创建备份窗口，请发出`addbw`命令。以下示例定义了从`01:00`到`05:00`的每日备份窗口：\n\
    \    ```\n    ob> addbw --times '01:00-05:00' --days mon,tue,wed,thu,fri,sat,sun\n\
    \    ```\n\n有关其他备份窗口命令，请参考下表。\n\n| 命令 | 含义 |\n| :--- | :--- |\n| `addbw` | 添加一个备份窗口。\
    \ |\n| `chkbw` | 检查是否已定义备份窗口。 |\n| `lsbw` | 列出备份窗口。 |\n| `rmbw` | 移除一个备份窗口。 |\n\
    | `setbw` | 修改一个备份窗口。 |\n\n## 配置备份计划和触发器\n\n备份计划定义了要备份什么数据、将备份存储在何处以及备份如何运行，而触发器定义了计划备份运行的时间。\n\
    \n-   对于要备份的数据，设置特定的数据集。\n-   对于将备份存储在何处，设置特定的磁带驱动器。如果未选择特定的磁带驱动器，则将使用任何可用的磁带驱动器。\n\
    -   对于备份如何运行，设置作业优先级和备份加密选项。作业优先级编号的值越低，调度程序为作业分配的优先级越高。作业优先级的默认值是`100`，加密选项的默认值是`no`。\n\
    \n以下示例使用`mksched`命令为数据集`bllnx1_home-oracle.ds`创建一个名为`bllnx1_home-oracle.sched`的备份计划：\n\
    ```\nob> mksched --dataset bllnx1_home-oracle.ds bllnx1_home-oracle.sched\n```\n\
    \n创建备份计划后，创建一个触发器来定义何时运行计划备份。以下示例使用`chsched`命令为计划`bllnx1_home-oracle.sched`定义一个触发器，以在每天`02:00`（凌晨\
    \ 2 点）运行。`-a`选项表示添加触发器(`addtrigger`)，`-d`选项表示日(`day`)，`-t`选项表示时间(`time`)，`-f`选项表示介质族(`media\
    \ family`)。\n```\nob> chsched -a -d daily -t 02:00 -f APRESS_OS bllnx1_home-oracle.sched\n\
    ```\n\n要显示有关备份计划的信息，请发出`lssched`命令，如下所示：\n```\nob> lssched -l bllnx1_home-oracle.sched\n\
    ```\n输出显示如下信息：\n```\nbllnx1_home-oracle.sched:\n    Type: backup\n    State: enabled\n\
    \    Dataset: bllnx1_home-oracle.ds\n    Encryption: no\n    UUID: 1ea82008-bfdd-102d-a743-0002a530c867\n\
    \    Trigger 1:\n        Day/date: daily\n        At: 02:00\n        Backup level:\
    \ full\n        Media family: APRESS_OS\n```\n\n你刚刚安排了一个名为`bllnx1_home-oracle.sched`的备份，它将在每天凌晨\
    \ 2 点运行。要监控作业，请参阅本章的“OSB 作业监控”部分。\n\n要删除备份计划，请发出`rmsched`命令，如下所示：\n```\nob> rmsched\
    \ bllnx1_home-oracle.sched\n```\n\n## 执行按需文件系统备份\n\n要在特定客户端主机上运行一次性备份，请使用`backup`命令。在以下示例中，使用的是之前创建的数据集文件`bllnx1_home-oracle.ds`：\n\
    ```\nob> backup --dataset bllnx1_home-oracle.ds --go\n```\n\n如果省略`--go`选项，备份请求仍将保留在队列中。你可以发出`lsbackup`命令来显示队列中排队的备份请求，如下所示：\n\
    ```\nob> lsbackup\n```\n输出可能如下：\n```\nItem #  Save data\n1       dataset bllnx1_home-oracle.ds\n\
    ```\n\n要将备份请求转发给 OSB 调度程序，请发出带有`GO`选项的以下`backup`命令：\n```\nob> backup --go\n```\n\
    \n要手动备份管理服务器的 OSB 目录，请发出以下`backup`命令：\n```\nob> backup --level 0 --dataset OSB-CATALOG-DS\
    \ --go\n```\n\n要监控你已提交的备份作业，请参阅本章的“OSB 作业监控”部分。\n\n> **注意**：默认情况下，`OSB-CATALOG-SCHED`计划在每天凌晨\
    \ 1 点运行，使用数据集文件`OSB-CATALOG-DS`来备份 OSB 目录。\n\n## 文件系统恢复\n\n有三种方式可以从文件系统备份中恢复：\n\
    -   基于目录的恢复\n-   原始恢复\n-   `obtar`命令\n\n在基于目录的恢复中，你提供可以从 OSB 目录浏览的目录和文件。在原始恢复和`obtar`命令中，你都需要提供卷\
    \ ID 和文件号。卷 ID 是分配给磁带卷的唯一名称（包含介质族），文件号是磁带卷上备份镜像的编号。基于目录的恢复和原始恢复都使用`obtool`实用程序执行，而`obtar`命令则在操作系统提示符下发出。\n\
    \n### 执行基于目录的恢复\n\n...\n"
- fmt: "For a catalog-based restore, you can browse the OSB catalog to determine and\
    \ verify the files you want to restore. In the following example, you want to\
    \ restore the file `/home/oracle/scripts/rmanbkup.sh` of the client host `BLLNX1`.\
    \ To restore the files using the OSB catalog, perform the following steps:\n\n\
    1.  Set the host variable to `BLLNX1`, which is the source host.\n    ```\n  \
    \  ob> set host BLLNX1\n    ```\n\n2.  Issue the `cd` command to navigate to the\
    \ directory.\n    ```\n    ob> cd /home/oracle/scripts\n    ```\n\n3.  Issue the\
    \ `ls` command to verify the files in the directory.\n    ```\n    ob> ls -l rmanbkup.sh\n\
    \    ```\n    Output:\n    ```\n    -rwxr-xr-x oracle.oinstall 782 2010/01/13.18:14\
    \ rmanbkup.sh (0)\n    ```\n\n4.  Issue the `restore` command.\n    ```\n    ob>\
    \ restore '/home/oracle/scripts/rmanbkup.sh' --go\n    ```\nTo monitor the restore\
    \ job, refer to the OSB Job Monitoring section (covered a bit later in this chapter).\n\
    \n## Performing a Raw Restore\nTo restore a data using the raw restore, you must\
    \ know the volume ID and file number where to extract the data from. However,\
    \ you know that the backups are using a particular media family, which can make\
    \ the search a bit easier.\n\nIn the following example, you are going to restore\
    \ the file `/home/oracle/scripts/rmanbkup.sh` from a tape volume that has media\
    \ family `APRESS_OS`.\n\n1.  Issue the `lsvol` command with `--contents` option\
    \ to display the contents of the volumes associated to media family `APRESS_OS`:\n\
    \    ```\n    ob> lsvol --contents --family APRESS_OS --nobarcode\n    ```\n \
    \   Output:\n    ```\n    VOID OOID Seq Volume ID Family Created Attributes\n\
    \    2845 2845 1 APRESS_OS-000001 APRESS_OS 10/21.04:41 open; closes 10/28.04:41\n\
    \n    BSOID File Sect Level Host Size Created Attributes\n    31250 1 1 0 BLLNX1\
    \ 208.6 MB 10/21.04:41\n    31258 2 1 0 BLLNX1 208.8 MB 10/21.06:04\n    31260\
    \ 3 1 0 BLLNX1 210.1 MB 10/21.12:23\n    31261 4 1 0 BLLNX1 210.1 MB 10/21.12:34\n\
    \    ```\n\n2.  According to the output shown above, you want to restore from\
    \ a backup taken on `10/21.06:04` (i.e. October 21 at 6:04am). The corresponding\
    \ file number is `2`, and the volume ID is `APRESS_OS-000001`. Issue the following\
    \ `restore` command, as shown here. The `-R` option indicates a raw restore operation\
    \ and does not use an OSB catalog, while the `–F` option means the filenumber,\
    \ and the `–v` option means the volume ID.\n    ```\n    ob> restore -R -F 2 -v\
    \ APRESS_OS-000001 /home/oracle/scripts/rmanbkup.sh --go\n    ```\nTo monitor\
    \ the restore job, refer to the \"OSB Job Monitoring section\" of this chapter.\n\
    \n## Performing an obtar Restore\nWhen you run the OSB restores, they are actually\
    \ translated to `obtar` commands in the background. The `obtar` commands are issued\
    \ at the operating system level. The `obtar` command is seldom used to perform\
    \ restore operations, since you need to provide the volume ID and file number,\
    \ which is not readily available especially if you have no access to the OSB catalog.\n\
    \nIn the following example, you are going to restore the file `/home/oracle/scripts/rmanbkup.sh`\
    \ from the tape that has volume ID `APRESS_OS-000001` at file number `2`.\n\n\
    1.  Issue the `loadvol` command to manually load the tape that has volume ID `APRESS_OS-000001`\
    \ to an available tape drive. Here I used tape drive `vdrive8`.\n    ```\n   \
    \ ob> loadvol -D vdrive8 --volume APRESS_OS-000001\n    ```\n\n2.  To check the\
    \ contents of the tape, issue the `obtar` command with `-t` option.\n    ```\n\
    \    $ obtar -t -f vdrive8\n    ```\n\n3.  To perform the restore operation using\
    \ the `obtar` command, issue the following command with the `-x` option. The `-F`\
    \ option means the file number, and the `-k` option avoids overwriting the existing\
    \ file.\n    ```\n    $ obtar -F 2 -x -f vdrive8 -k /home/oracle/scripts/rmanbkup.sh\n\
    \    ```\n\n4.  Since you restore using the `obtar` command, which is executed\
    \ at the operating system level, you can’t monitor the restore job using the `obtool`\
    \ utility. However, one way to verify whether the file is restored is to issue\
    \ the `ls` OS command.\n    ```\n    $ ls -l /home/oracle/scripts/rmanbkup.sh\n\
    \    ```\n\n## OSB Job Monitoring\nYou submitted a backup or restore operation\
    \ for an Oracle database using RMAN or file-system data using Oracle Enterprise\
    \ Manager (`OEM`), OSB Web tool, or `obtool` utility, and you want to check whether\
    \ the job is active, pending, or completed. To check the status of an OSB job,\
    \ issue the `lsjob` command and `catxcr` command to show the details about the\
    \ operation of a job.\n\n### Listing Jobs\nTo display the jobs that are still\
    \ running, issue `lsjob` command with the `--active` or `-a` option. For other\
    \ job states, use `--complete` or `-c` option for completed jobs, `--pending`\
    \ or `-p` for pending jobs, `--inputrequest` or `-i` for jobs currently requesting\
    \ input, and `--all` or `-A` to display all jobs regardless of the job state.\
    \ For example, to list active jobs:\n```\nob> lsjob --active\n```\nFor RMAN jobs,\
    \ use the `--dbname` or `-d` option to limit the output for a specific Oracle\
    \ database. If you know the database ID, you can use the `--dbid` or `-I` option\
    \ instead. This example uses the `dbname` parameter:\n```\nob> lsjob --active\
    \ --dbname DB11R2\n```\nIn the following output, the `State` column indicates\
    \ that the job is still running. Once the job is done without errors, the `State`\
    \ column displays \"completed successfully.\"\n```\nJob ID Sched time Contents\
    \ State\n---------------- ---------- ------------------ -----------------------------\n\
    apress_oracle/83.1 none incremental backup running since 2010/10/22.22:13\n```\n\
    For file-system jobs, use the `--host` or `-h` option to limit the output for\
    \ a specific client host, as shown here:\n```\nob> lsjob --active --host BLLNX1\n\
    ```\n```\nJob ID Sched time Contents State\n---------------- ----------- -------------\
    \ --------------------------------\napress_admin/36.1 none backup BLLNX1 running\
    \ since 2010/10/22.22:11\n```\nTo monitor active jobs, use the `lsjob` command.\
    \ If there are several active jobs running, you can filter the output by providing\
    \ the job ID. However, if the job is already completed, you can use the same command,\
    \ but you need to remove the `-a` option and provide the corresponding job ID.\
    \ I usually run the `lsjob` command with the following options:\n```\nob> lsjob\
    \ -a -l -j -o -R -L -C\n```\nThe prior command displays detailed information about\
    \ the status of the job. Here is some sample output:\n```\napress_oracle/83:\n\
    \  Type: database DB11R2 (dbid=4187425583)\n  Scheduled time: none\n  Introduction\
    \ time: 2010/10/22.22:12\n  Earliest exec time: 10/22.22:12\n  Last update time:\
    \ 2010/10/22.22:12\n  Expire time: never\n  State: processed; Oracle job(s) scheduled\n\
    \  Priority: 100\n  Run on host: (administrative server)\n  Attempts: 0\n  Log:\n\
    \napress_oracle/83.1:\n  Type: incremental backup\n  Backup piece: tclr1n5v_1_1\n\
    \  Family: APRESS_RMAN\n  Encryption: awaiting job completion\n  Scheduled time:\
    \ none\n  Introduction time: 2010/10/21.22:12\n  Earliest exec time: 10/21.22:12\n\
    \  Last update time: 2010/10/22.22:15\n  Expire time: never\n  State: running\
    \ since 2010/10/22.22:15\n  Priority: 100\n  Run on host: BLLNX3\n  Requires:\
    \ family APRESS_RMAN and any device\n  Attempts: 4\n  Processed: 744.7 MB\n  Log:\n\
    \  2010/10/22.22:12:35 Dispatching job to run on BLLNX3.\n  2010/10/22.22:12:46\
    \ Drive or volume on which mount attempted is unusable.\n  2010/10/22.22:13:52\
    \ Dispatching job to run on BLLNX3.\n  2010/10/22.22:14:05 Drive or volume on\
    \ which mount attempted is unusable.\n  2010/10/22.22:14:52 Dispatching job to\
    \ run on BLLNX3.\n  2010/10/22.22:15:11 Drive or volume on which mount attempted\
    \ is unusable.\n  2010/10/22.22:15:52 Dispatching job to run on BLLNX3.\n```"
  raw: 'For a catalog-based restore, you can browse the OSB catalog to determine and
    verify the files you want to restore. In the following example, you want to restore
    the file /home/oracle/scripts/rmanbkup.sh of the client host BLLNX1\. To restore
    the files using the OSB catalog, perform the following steps: 1\. Set the host
    variable to BLLNX1, which is the source host.


    ob> set host BLLNX1


    2\. Issue the cd command to navigate to the directory.


    ob> cd /home/oracle/scripts


    3\. Issue the ls command to verify the files in the directory.


    ob> ls -l rmanbkup.sh


    -rwxr-xr-x oracle.oinstall 782 2010/01/13.18:14 rmanbkup.sh (0) 4. Issue the restore
    command.


    ob> restore ''/home/oracle/scripts/rmanbkup.sh'' --go


    To monitor the restore job, refer to the OSB Job Monitoring section (covered a
    bit later in this chapter).


    Performing a Raw Restore


    To restore a data using the raw restore, you must know the volume ID and file
    number where to extract the data from. However, you know that the backups are
    using a particular media family, which can make the search a bit easier.


    CHAPTER 20 ■ ORACLE SECURE BACKUP


    In the following example, you are going to restore the file /home/oracle/scripts/rmanbkup.sh
    from a tape volume that has media family APRESS_OS.


    1\. Issue the lsvol command with --contents option to display the contents of
    the volumes associated to media family APRESS_OS:


    ob> lsvol --contents --family APRESS_OS --nobarcode


    VOID OOID Seq Volume ID Family Created Attributes 2845 2845 1 APRESS_OS-000001
    APRESS_OS 10/21.04:41 open; closes 10/28.04:41


    BSOID File Sect Level Host Size Created Attributes 31250 1 1 0 BLLNX1 208.6 MB
    10/21.04:41


    31258 2 1 0 BLLNX1 208.8 MB 10/21.06:04


    31260 3 1 0 BLLNX1 210.1 MB 10/21.12:23


    31261 4 1 0 BLLNX1 210.1 MB 10/21.12:34


    2\. According to the output shown above, you want to restore from a backup taken
    on 10/21.06:04 (i.e. October 21 at 6:04am). The corresponding file number is 2,
    and the volume ID is APRESS_OS-000001. Issue the following restore command, as
    shown here. The -R option indicates a raw restore operation and does not use an
    OSB catalog, while the –F option means the filenumber, and the –v option means
    the volume ID.


    ob> restore -R -F 2 -v APRESS_OS-000001 /home/oracle/scripts/rmanbkup.sh --go
    To monitor the restore job, refer to the “OSB Job Monitoring section” of this
    chapter.


    Performing an obtar Restore


    When you run the OSB restores, they are actually translated to obtar commands
    in the background. The obtar commands are issued at the operating system level.
    The obtar command is seldom used to perform restore operations, since you need
    to provide the volume ID and file number, which is not readily available especially
    if you have no access to the OSB catalog.


    In the following example, you are going to restore the file /home/oracle/scripts/rmanbkup.sh
    from the tape that has volume ID APRESS_OS-000001 at file number 2.


    1\. Issue the loadvol command to manually load the tape that has volume ID


    APRESS_OS-000001 to an available tape drive. Here I used tape drive vdrive8.


    ob> loadvol -D vdrive8 --volume APRESS_OS-000001


    2\. To check the contents of the tape, issue the obtar command with -t option.


    $ obtar -t -f vdrive8


    3\. To perform the restore operation using the obtar command, issue the following
    command with the -x option. The -F option means the file number, and the -k option
    avoids overwriting the existing file.


    $ obtar -F 2 -x -f vdrive8 -k /home/oracle/scripts/rmanbkup.sh


    4\. Since you restore using the obtar command, which is executed at the operating
    system level, you can’t monitor the restore job using the obtool utility.


    However, one way to verify whether the file is restored is to issue the ls OS


    command.


    $ ls -l /home/oracle/scripts/rmanbkup.sh


    CHAPTER 20 ■ ORACLE SECURE BACKUP


    OSB Job Monitoring


    You submitted a backup or restore operation for an Oracle database using RMAN
    or file-system data using Oracle Enterprise Manager (OEM), OSB Web tool, or obtool
    utility, and you want to check whether the job is active, pending, or completed.
    To check the status of an OSB job, issue the lsjob command and catxcr command
    to show the details about the operation of a job.


    Listing Jobs


    To display the jobs that are still running, issue lsjob command with the --active
    or -a option. For other job states, use --complete or -c option for completed
    jobs, --pending or -p for pending jobs, --


    inputrequest or -i for jobs currently requesting input, and --all or -A to display
    all jobs regardless of the job state. For example, to list active jobs:


    ob> lsjob --active


    For RMAN jobs, use the --dbname or -d option to limit the output for a specific
    Oracle database. If you know the database ID, you can use the --dbid or -I option
    instead. This example uses the dbname parameter:


    ob> lsjob --active --dbname DB11R2


    In the following output, the State column indicates that the job is still running.
    Once the job is done without errors, the State column displays “completed successfully.”


    Job ID Sched time Contents State


    ---------------- ---------- ------------------ -----------------------------


    apress_oracle/83.1 none incremental backup running since 2010/10/22.22:13


    For file-system jobs, use the --host or -h option to limit the output for a specific
    client host, as shown here:


    ob> lsjob --active --host BLLNX1


    Job ID Sched time Contents State


    ---------------- ----------- ------------- --------------------------------


    apress_admin/36.1 none backup BLLNX1 running since 2010/10/22.22:11


    To monitor active jobs, use the lsjob command. If there are several active jobs
    running, you can filter the output by providing the job ID. However, if the job
    is already completed, you can use the same command, but you need to remove the
    -a option and provide the corresponding job ID. I usually run the lsjob command
    with the following options:


    ob> lsjob -a -l -j -o -R -L -C


    The prior command displays detailed information about the status of the job. Here
    is some sample output:


    apress_oracle/83:


    Type: database DB11R2 (dbid=4187425583)


    Scheduled time: none


    Introduction time: 2010/10/22.22:12


    Earliest exec time: 10/22.22:12


    Last update time: 2010/10/22.22:12


