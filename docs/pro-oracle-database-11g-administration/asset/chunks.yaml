    distributed hosts that require advanced data protection requirements.


    ■ **Note** OSB is available on most Linux and Unix platforms as well as Windows.
    See My Oracle Support''s certification matrix for a current list (https://support.oracle.com).


    OSB Terminology


    Take some time to familiarize yourself with the architectural terms used with
    OSB. This section gives a brief description of the major OSB parts, starting with
    an administrative domain.


    OSB Administrative Domain and Servers


    An administrative domain is collection of servers (hosts) that you manage as a
    single group for backup and restore operations. Within an OSB administrative domain,
    each server can be assigned one or more of the following roles:


    •


    Administrative (admin) server


    •


    Media server


    •


    Client server (or client host)


    For each administrative domain, as shown in Figure 20–1, there is only one administrative
    server that controls the backup, restore, and scheduling operations. An administrative
    server manages one or more media servers and one or more clients.


    ![](index-581_1.png)


    CHAPTER 20 ■ ORACLE SECURE BACKUP


    ■ **Tip** For complete details on all of the OSB interfaces, see the Oracle Secure
    Backup Administrator''s Guide and Oracle Secure Backup Reference available at
    www.oracle.com/technetwork/database/secure-backup/documentation/.


    OSB Users and Classes


    An Oracle Secure Backup user is an account defined within an OSB administrative
    domain. These users are separate from operating system users. OSB user information
    is stored in the OSB administrative domain server. You are required to enter a
    username and password when accessing OSB through its interfaces such as obtool
    or OSB Web tool.


    An OSB class is a set of privileges and rights granted to a user. Each user can
    be assigned to only one OSB class. OSB classes help maintain a consistent user
    experience across all servers in an administrative domain.


    OSB Daemons


    Oracle Secure Backup uses seven different background processes (daemons) to manage
    the configuration, backup, and restore operations. The executables that start
    the daemons are in the OSB_HOME/etc directory on each of the servers. These processes
    are described in this list: **Schedule daemon** runs only on the administrative
    server and manages the scheduled backups.


    **Index daemon** runs only on the administrative server and manages the backup
    catalog for each client.


    **Apache web server daemon** runs only on the administrative server and services
    the OSB web tool.


    **Service Daemon** runs on the administrative, media, and client servers. On the
    administrative server, it runs jobs as requested by the schedule daemon. When
    running on the media or client server, it allows for remote administration of
    the host.


    **Network data management protocol (NDMP) daemon** runs on the


    administrative, media, and client servers; it provides data communication between
    servers in the administrative domain.


    **Robot Daemon** runs only on the media server and helps manage


    communication to tape devices.


    **Proxy Daemon** runs only on the client server and verifies user access for SBT


    backup and restore operations.


    Now that you have a basic understanding of the OSB architecture, you are ready
    to download and install the OSB software.


