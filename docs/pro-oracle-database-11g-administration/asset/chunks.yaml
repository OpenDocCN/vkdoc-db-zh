    To resolve this error, try to completely refresh the MV:


    SQL> exec dbms_mview.refresh(''PRODUCTLINEITEM'',''C'');


    After the complete refresh has finished, you should be able to perform a fast
    refresh without receiving an error:


    SQL> exec dbms_mview.refresh(''PRODUCTLINEITEM'',''F'');


    The ORA-12034 error is thrown when Oracle determines that the MV log was created
    after the last refresh took place in the associated MV. In other words, the MV
    log is younger than the last refresh of MV. There are several possible causes:


    • The MV log was dropped and re-created.


    • The MV log was purged.


    • The master table was reorganized.


    • The master table was truncated.


    • The previous refresh failed.


    In this situation, Oracle knows that transactions may have been created between
    the last refresh time of the MV and when the MV log was created. In this scenario,
    you have to first perform a complete refresh before you can start using the fast-refresh
    mechanism.


    Monitoring Materialized View Refreshes


    This section contains some very handy examples of how to monitor MV refresh jobs.
    Examples include how to view the last refresh time, determine whether a job is
    currently executing, determine the progress of a refresh job, and checks to see
    whether MVs haven’t refreshed within the last day. Scripts like these are invaluable
    for troubleshooting and diagnosing refresh problems.


    Viewing Materialized Views’ Last Refresh Times


    When you’re troubleshooting issues with MVs, usually the first item to check is
    the LAST_REFRESH_DATE in DBA/ALL/USER_MVIEWS. Viewing this information allows
    you to determine whether the MVs are refreshing on schedule. Run this query as
    the owner of the MV to display the last refresh date: select


