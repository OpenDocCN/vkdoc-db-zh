    \n### 配置用户和类\n\n安装 OSB 时，创建的默认用户帐户名为 `admin`，它拥有与 OSB 相关的所有权限。出于安全原因，请创建单独的 OSB\
    \ 用户帐户以访问不同的环境，例如生产、测试和开发。此外，为这些用户分配特定的类（或角色），例如 `admin`、`operator`、`oracle`、`user`\
    \ 和 `reader`。监控他们以限制他们修改 OSB 管理域配置以及执行备份和恢复操作的权限。限制权限可确保特定的 OSB 用户可以备份测试数据库，但无权（例如）恢复生产数据库。\n\
    \n要确定 `admin` 类的权限，请发出 `lsclass` 命令，如下所示：\n```\nob> lsclass -l admin\n```\n这是一些示例输出：\n\
    ```\nadmin:\n浏览备份目录，此访问权限为：特权\n访问 Oracle 数据库备份：全部\n访问文件系统备份：全部\n显示管理域配置：是\n修改自己的名称和密码：是\n\
    修改管理域配置：是\n修改目录：是\n以本人身份执行文件系统备份：是\n以特权用户身份执行文件系统备份：是\n列出用户拥有的任何作业：是\n修改用户拥有的任何作业：是\n\
    以本人身份执行文件系统恢复：是\n以特权用户身份执行文件系统恢复：是\n接收请求操作员协助的电子邮件：是\n接收描述内部错误的电子邮件：是\n接收关于过期密码密钥的电子邮件：是\n\
    查询和显示设备信息：是\n管理设备并更改设备状态：是\n列出任何作业，无论其所有者是谁：是\n修改任何作业，无论其所有者是谁：是\n执行 Oracle 数据库备份和恢复：是\n\
    ```\n\n`注意` 要显示 OSB 命令的完整语法，请发出 `help` 命令，后跟该 OSB 命令。\n\n要创建 OSB 用户，请发出 `mkuser`\
    \ 命令。在以下示例中，创建了 OSB 用户 `apress_oracle` 并分配了 `oracle` 权限：\n```\nob> mkuser --class\
    \ oracle apress_oracle --preauth BLLNX3:oracle+cmdline+rman\n```\n`--preauth`\
    \ 选项中的 `+cmdline` 属性授予 Oracle OS 用户对 `obtool` 实用程序的预先授权访问权限，而 `+rman` 属性授予通过 RMAN\
    \ 进行的 Oracle Database SBT 备份。如果未为您要备份的目标数据库所在的服务器定义 `+rman` 预授权，则 RMAN 备份将因 `ORA-19511`\
    \ 错误而失败，如下所示：\n```\nORA-19511: 从介质管理器层接收到错误，错误文本:\nsbt__rpc_cat_query: 对 piece\
    \ u8lr5bs6_1_1 的查询失败。\n(Oracle Secure Backup 错误: '未找到 OS 用户 (OB tools) oracle\
    \ 的预授权配置').\n```\n\n如果您想查看所有 OSB 用户，请发出 `lsuser` 命令：\n```\nob> lsuser\n```\n\n\
    表 20–1 描述了用于维护 OSB 用户帐户的各种 OSB 命令。\n\n| 命令 | 含义 |\n| :--- | :--- |\n| `mkuser`\
    \ | 创建 OSB 用户。 |\n| `lsuser` | 显示有关 OSB 用户的信息。 |\n| `renuser` | 重命名 OSB 用户。 |\n\
    | `chuser` | 修改 OSB 用户的属性。 |\n| `rmuser` | 删除 OSB 用户。 |\n\n### 配置媒体家族\n\n媒体家族对磁带卷的特征进行分类和定义，例如卷\
    \ ID、卷过期时间和写入窗口。卷 ID 由 OSB 用来唯一标识磁带卷，它由媒体家族的名称加上 OSB 生成的六位序列号组成。例如，如果媒体家族的名称是\
    \ `APRESS_BACKUP`，则第一个卷 ID 是 `APRESS_BACKUP-000001`，第二个是 `APRESS_BACKUP-000002`，依此类推。\n\
    \n有两种类型的卷过期策略：时间管理和内容管理。时间管理媒体家族中的磁带卷在超过过期时间后可以过期；在内容管理的媒体家族中，当卷上的所有备份 piece 都被标记为删除时，它们会过期。\n"
- fmt: '# CHAPTER 20 ■ ORACLE SECURE BACKUP


    For file-system backups, you must use a time-managed media family to let OSB manage
    the volume expiration. For RMAN backups, you must use content-managed media family
    to let RMAN manage the expiration of the backup pieces on the tape volume instead
    of OSB. This avoids inconsistency between the RMAN metadata and contents of the
    tapes.


    To create a time-managed media family, issue the `mkmf` command. In the following
    example, media family `APRESS_OS` has 7 days of write-period and 14 days of retention
    period. This means the volumes of media family `APRESS_OS` will expire and are
    ready for recycling after 21 days since the first backup piece is created on the
    tape volume:


    ```

    ob> mkmf --writewindow 7days --retain 14days APRESS_OS

    ```


    To create a content-managed media family, issue the `mkmf`, as shown here. Since
    the default volume expiration policy is content-managed, you can omit the `--contentmanaged`
    option.


    ```

    ob> mkmf --contentmanaged APRESS_RMAN

    ```


    Table 20–2 describes OSB commands used to maintain the media families.


    *Table 20–2. OSB Commands to Maintain Media Family*

    | Command | Meaning |

    | :--- | :--- |

    | `mkmf` | To create a media family. |

    | `lsmf` | To display information about media families. |

    | `renmf` | To rename a media family. |

    | `chmf` | To modify the attributes of a media family. |

    | `rmmf` | To delete a media family. |


    To increase security and better manage your tape backups, you may create separate
    media families for different environments, such as production, test, and development.
    In this way, the backup of the production database and test database are not sharing
    the same tape volumes.


    ## Configuring Database Backup Storage Selector


    The default media family for RMAN backup is `RMAN-DEFAULT`. To use a different
    media family when running RMAN backup, create a database backup storage selector
    using the `mkssel` command. In the following example, the database backup storage
    selector name is `BLLNX3-DB11R2.ssel`, which assigns the media family `APRESS_RMAN`
    for RMAN backups on Oracle database `DB11R2` hosted on client server `BLLNX3`:


    ```

    ob> mkssel --host BLLNX3 --dbname DB11R2 --family APRESS_RMAN BLLNX3-DB11R2.ssel

    ```


    ■ `Note` If an RMAN backup matches the Oracle database and/or client host defined
    on a database backup storage selector, then you don’t have to pass the OS environment
    variable `OB_MEDIA_FAMILY` parameter when allocating the RMAN channel for `SBT_TAPE`.


    Refer to Table 20–3 for descriptions of OSB commands related to maintaining the
    database backup storage selector.


    *Table 20–3. OSB Commands to Maintain Database Backup Storage Selector*

    | Command | Meaning |

    | :--- | :--- |

    | `mkssel` | To create a database backup storage selector. |

    | `lsssel` | To display information about database backup storage selectors. |

    | `renssel` | To rename a database backup storage selector. |

    | `chssel` | To modify the attributes of a database backup storage selector. |

    | `rmssel` | To delete a database backup storage selector. |


    ## Database Backup


    In Chapter 18, you learned how to use RMAN to back up database files to disk.
    In this section, you will use OSB and RMAN to create backups on tape. There are
    two ways to configure RMAN for a backup to tape:

    - Allocating a channel

    - Configuring a channel


    The first option is to allocate an RMAN channel for `SBT_TAPE` inside the `run{}`
    block. In the following example, the media family `APRESS_RMAN` is passed as a
    parameter to the environment variable `OB_MEDIA_FAMILY`. The tape volumes will
    have a volume ID of `APRESS_RMAN` affixed with a six-digit sequence number generated
    by OSB.


    ```

    RMAN> run {

    allocate channel t1 type sbt_tape parms ''ENV=(OB_MEDIA_FAMILY=APRESS_RMAN)'';

    backup database;

    }

    ```


    You can configure multiple channels for `SBT_TAPE` equivalent to the number of
    available physical tape devices. However, if you allocate two channels and only
    have one physical tape device, the other channel will just wait for the tape resource
    to become available. You can also use the `CONFIGURE` command to set the RMAN
    channel for `SBT_TAPE`, as shown here:


    ```

    RMAN> configure channel device type sbt_tape

    ```'
