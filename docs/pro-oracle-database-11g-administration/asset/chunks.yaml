    \nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\nCreating Users\n\nWhen you’re creating\
    \ a user, you need to consider the following factors:\n\n• User name\n\n• Authentication\
    \ method\n\n• Basic privileges\n\n• Default permanent tablespace\n\n• Default\
    \ temporary tablespace\n\nThese aspects of creating a user are discussed in the\
    \ next few subsections.\n\nChoosing a User Name and Authentication Method\n\n\
    Pick a user name that gives you an idea what application will be using the user.\
    \ For example, if you have an inventory-management application, a good choice\
    \ for a user name is INV_MGMT. Choosing a meaningful username helps identify the\
    \ purpose of a user. This can be helpful especially if a system isn't documented\
    \ appropriately.\n\nAuthentication is the method used to confirm that the user\
    \ is authorized to use the account. Oracle supports three types of authentication:\n\
    \n• Password\n\n• External service, such as the OS\n\n• Global user via enterprise\
    \ directory service (Oracle Internet Directory) The most common method of authenticating\
    \ a user is with a password. The external authentication method allows you to\
    \ authenticate using smart cards, Kerberos, or the OS. This section shows examples\
    \ of password verification and external authentication. Refer to the *Oracle Database\
    \ Security Guide* and the *Oracle Database Advanced Security Administrator’s Guide*\
    \ (available at http://otn.oracle.com) for more information about external and\
    \ global authentication methods.\n\nWhen you’re creating users as a DBA, your\
    \ account must have the CREATE USER system privilege. You use the CREATE USER\
    \ SQL statement to create users. This example creates a user named HEERA with\
    \ the password CHAYA and assigns the default permanent tablespace USERS and the\
    \ default temporary tablespace TEMP:\n\ncreate user heera identified by chaya\n\
    \ndefault tablespace users\n\ntemporary tablespace temp;\n\nThis creates a bare-bones\
    \ schema that has no privileges to do anything in the database. To make the user\
    \ useful, you must minimally grant it the CREATE SESSION system privilege: SQL>\
    \ grant create session to heera;\n\nIf the new schema needs to be able to create\
    \ tables, you need to grant it additional privileges like CREATE TABLE:\n\nSQL>\
    \ grant create table to heera;\n\nThe new schema also must have quota privileges\
    \ granted for any tablespace in which it needs to create objects:\n\nCHAPTER 6\
    \ ■ USERS AND BASIC SECURITY\n\nSQL> alter user heera quota unlimited on users;\n\
    \n■ **Note** A common technique is to grant the predefined roles of CONNECT and\
    \ RESOURCE to newly created schemas.\n\nThese roles contain system privileges\
    \ such as CREATE SESSION and CREATE TABLE (and several others, which vary by release).\
    \ I recommend against doing this, because Oracle has stated that those roles may\
    \ not be available in future releases.\n\nYou can also create a user that is authenticated\
    \ by an external service, such as the OS. In this scenario, you assume that if\
    \ a user has been authenticated by the OS logon, that level of security is also\
    \ good enough to allow access to the database. External authentication has some\
    \ interesting advantages:\n\n•\n\nUsers with access to the server don’t have to\
    \ maintain a password to the database.\n\n•\n\nScripts that log on to the database\
    \ don’t have to use hard-coded passwords if executed by OS-authenticated users.\n\
    \n•\n\nAnother database user can’t hack into the externally identified user by\
    \ trying to guess the username and password connection string. The only way to\
    \ log on to an externally authenticated user is from an external authentication\
    \ source (such as the OS).\n\n•\n\nA DBA doesn’t have to maintain a password for\
    \ the database user.\n\nWhen using external OS authentication, Oracle prefixes\
    \ the value contained in OS_AUTHENT_PREFIX to the OS user connecting to the database.\
    \ The default value for this parameter is OPS$. Oracle strongly recommends that\
    \ you set the OS_AUTHENT_PREFIX parameter to a null string. For example: SQL>\
    \ alter system set os_authent_prefix='' scope=spfile;\n\nYou have to stop and\
    \ start your database for this modification to take effect. After you’ve set the\
    \ OS_AUTHENT_PREFIX variable, you can create an externally authenticated user.\
    \ For example, say you have an OS user named jsmith and you want anybody with\
    \ access to this OS user to be able to log in to the database without supplying\
    \ a password. Use the CREATE EXTERNALLY statement to do this: SQL> create user\
    \ jsmith identified externally;\n\nNow, when jsmith logs on to the database server,\
    \ this user can connect to SQL*Plus as follows: $ sqlplus /\n\nNo username or\
    \ password is required because the user has already been authenticated by the\
    \ OS.\n\nAssigning Default Permanent and Temporary Tablespaces\n\nWhen maintaining\
    \ a database, you should verify the default and temporary tablespace settings\
    \ to ensure that they meet your database standards. You can view user information\
    \ by selecting from the DBA_USERS\n\nview:\n\nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\
    \nselect\n\nusername\n\n,password\n\n,default_tablespace\n\n,temporary_tablespace\n\
    \nfrom dba_users;\n\nHere is some sample output:\n\nUSERNAME PASSWORD DEFAULT_TABLESP\
    \ TEMPORARY_TABLE\n\n-------------------- -------------------- ---------------\
    \ ---------------\n\nJSMITH EXTERNAL USERS TEMP\n\nDBSNMP SYSAUX TEMP\n\nORACLE_OCM\
    \ USERS TEMP\n\nAPPQOSSYS SYSAUX TEMP\n\nAPPUSR USERS TEMP\n\nNone of your users,\
    \ other than the SYS user, should have a default permanent tablespace of SYSTEM.\n\
    \nYou don’t want any users other than SYS creating objects in the SYSTEM tablespace.\
    \ The SYSTEM tablespace should be reserved for the SYS user’s objects. If other\
    \ users’ objects existed in the SYSTEM tablespace, you’d run the risk of filling\
    \ up that tablespace and compromising the availability of your database.\n\nAll\
    \ of your users should be assigned a temporary tablespace that has been created\
    \ as type temporary. Usually, this tablespace is named TEMP (see Chapter 4 for\
    \ more details).\n\nYou never want any users with a temporary tablespace of SYSTEM.\
    \ If a user has a temporary tablespace of SYSTEM, then any sort area for which\
    \ they require temporary disk storage acquires extents in the SYSTEM tablespace.\
    \ This can lead to the SYSTEM tablespace filling up. You don’t want the SYSTEM\n\
    \ntablespace ever filling up, because that can lead to a nonfunctioning database\
    \ if the SYS schema can’t acquire more space as its objects grow. To check for\
    \ users that have a temporary tablespace of SYSTEM, run this script:\n\nSQL> select\
    \ username from dba_users where temporary_tablespace='SYSTEM'; Typically, I use\
    \ a script name creuser.sql when creating a user. The script uses variables that\
    \ define the user names, passwords, default tablespace name, and so on. For each\
    \ environment (development, test, QA, beta, production) in which the script is\
    \ executed, you can change the ampersand variables as required for each environment.\
    \ For example, you can use a different password for each separate environment.\n\
    \nHere’s an example creuser.sql script:\n\nDEFINE cre_user=inv_mgmt\n\nDEFINE\
    \ cre_user_pwd=inv_mgmt_pwd\n\nDEFINE def_tbsp=inv_data\n\nDEFINE idx_tbsp=inv_index\n\
    \nDEFINE smk_ttbl=zzzzzzz\n\n--\n\nCREATE USER &&cre_user IDENTIFIED BY &&cre_user_pwd\n\
    \nDEFAULT TABLESPACE &&def_tbsp;\n\n--\n\nGRANT CREATE SESSION TO &&cre_user;\n\
    \nGRANT CREATE TABLE TO &&cre_user;\n\n--\n\nALTER USER &&cre_user QUOTA UNLIMITED\
    \ ON &&def_tbsp;\n\nALTER USER &&cre_user QUOTA UNLIMITED ON &&idx_tbsp;\n\n--\n\
    \n-- Smoke test\n\n![](index-152_1.png)\n\nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\
    \nEnforcing Password Security\n\nThere are a couple schools of thought about enforcing\
    \ password security:\n\n• Use easily remembered passwords so you don’t have them\
    \ written down or recorded in a file somewhere. Because the passwords aren’t sophisticated,\
    \ they aren’t very secure.\n\n• Enforce a level of sophistication for passwords.\
    \ Such passwords aren’t easily remembered and thus must be recorded somewhere,\
    \ which isn’t secure.\n\nYou may choose to enforce a degree of password sophistication\
    \ because you think it’s the most secure option. Or you may be required to enforce\
    \ password security by your corporate security team (and thus have no choice in\
    \ the matter). This section isn’t about debating which of the prior methods is\
    \ preferable. Should you choose to impose a degree of sophistication (strength)\
    \ for a password, this section describes how to enforce the rules.\n\nYou can\
    \ enforce a minimum standard of password complexity by assigning a password-verification\
    \ function to a user’s profile. Oracle supplies a default password-verification\
    \ function that you create by running the following script as the SYS schema:\n\
    \nSQL> @?/rdbms/admin/utlpwdmg\n\nFunction created.\n\nProfile altered.\n\nFunction\
    \ created.\n\nFor Oracle Database 11 *g*, set the PASSWORD_VERIFY_FUNCTION of\
    \ the DEFAULT profile to VERIFY_FUNCTION_11G:\n\nSQL> alter profile default limit\
    \ PASSWORD_VERIFY_FUNCTION verify_function_11G; For Oracle Database 10 *g*, set\
    \ the PASSWORD_VERIFY_FUNCTION of the DEFAULT profile to VERIFY_FUNCTION:\n\n\
    SQL> alter profile default limit PASSWORD_VERIFY_FUNCTION verify_function; If\
    \ for any reason you need to back out of the new security modifications, run this\
    \ statement to disable the password function:\n\nSQL> alter profile default limit\
    \ PASSWORD_VERIFY_FUNCTION null;\n\nWhen enabled, the password-verification function\
    \ ensures that users are correctly creating or modifying their passwords. The\
    \ utlpwdmg.sql script creates a function that checks a password to ensure that\
    \ it meets basic security standards such as minimum password length, password\
    \ not the same as username, and so on. You can verify that the new security function\
    \ is in effect by attempting to change the password of a user that has been assigned\
    \ the DEFAULT profile. This example tries to change the password to less than\
    \ the minimum length:\n\nSQL> password\n\nChanging password for HEERA\n\nOld password:\n\
    \nNew password:\n\nRetype new password:\n\nERROR:\n\nORA-28003: password verification\
    \ for the specified password failed\n\nORA-20001: Password length less than 8\n\
    \nPassword unchanged\n\nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\n■ **Note** For\
    \ Oracle Database 11g, the minimum password length is eight characters. For Oracle\
    \ Database 10g, the minimum length is four characters.\n\nAs mentioned earlier,\
    \ starting with Oracle Database 11 *g*, password case-sensitivity is enforced.\
    \ You can disable this feature by setting the SEC_CASE_SENSITIVE_LOGON initialization\
    \ parameter to FALSE: SQL> alter system set sec_case_sensitive_logon = FALSE;\n\
    \nHowever, doing so isn’t recommended. For most security requirements, you should\
    \ have passwords that are case-sensitive.\n\nAlso keep in mind that it’s possible\
    \ to modify the code used to create the password-verification function. For example,\
    \ you can open and modify the script used to create this function: $ vi $ORACLE_HOME/rdbms/admin/utlpwdmg.sql\n\
    \nIf you feel that the Oracle-supplied verification function is too strong or\
    \ overly restrictive, you can create your own function and assign it to the appropriate\
    \ database profiles.\n\nLogging On as a Different User\n\nThis section details\
    \ how to log on to a different user without having the clear-text form of the\
    \ user’s password. You may wish to do this in a couple of situations:\n\n• You’re\
    \ copying a user from one environment (such as production) to a different environment\
    \ (such as test), and you want to retain the original password.\n\n• You’re working\
    \ in a production environment, and you need to be able to connect as the user\
    \ who owns objects to execute CREATE TABLE statements, issue grants, and so on.\
    \ In a production environment, you may not know the user’s password because of\
    \ poor maintenance procedures.\n\nYou need access to a DBA-privileged account\
    \ to be able to log on as a different user without knowing the password. Here\
    \ are the steps to do this:\n\n1\\. As a DBA, temporarily store a user’s encrypted\
    \ password.\n\n2\\. Change the user’s password.\n\n3\\. Connect to the user with\
    \ the new password, and run Data Definition Language (DDL) statements.\n\n4\\\
    . Connect as a DBA, and change the password back to the original.\n\nBe very careful\
    \ before changing a user’s password as describe in the previous steps. First,\
    \ the application can’t connect to the database while the password has been changed\
    \ to a temporary setting.\n\nIf the application repeatedly fails to successfully\
    \ connect, this may lock the account when you exceed the FAILED_LOGIN_ATTEMPTS\
    \ limit of a user’s profile (the default is 10 failed attempts before the user\
    \ is locked).\n\nFurthermore, if you’ve modified the values of PASSWORD_REUSE_MAX\
    \ (the number of days before a password can be reused) and PASSWORD_REUSE_TIME\
    \ (the number of times a password must change before a password can be reused),\
    \ then you can’t reset the password back to its original value.\n\nCHAPTER 6 ■\
    \ USERS AND BASIC SECURITY\n\nListed next is an example that shows how to temporarily\
    \ change a user’s password and then set the password back to its original value.\
    \ First, select the statement required to restore a user’s password to what it’s\
    \ currently set to. In this example, the username is APPUSR:\n\nselect 'alter\
    \ user appusr identified by values ' ||\n\n'''' || password || '''' || ';'\n\n\
    from user$ where name='APPUSR';\n\nHere is the output for this example:\n\nSQL>\
    \ alter user appusr identified by values 'A0493EBF86198724';\n\nNow, modify the\
    \ user’s password to a known value (in this example, foo): SQL> alter user appusr\
    \ identified by foo;\n\nConnect to the APPUSR user:\n\nSQL> conn appusr/foo\n\n\
    After you’re finished using the APPUSR user, change its password back to the original\
    \ value: SQL> alter user appusr identified by values 'A0493EBF86198724';\n\nAgain,\
    \ be very cautious when performing this procedure, because you don’t want to put\
    \ yourself in a situation where a password-profile setting won’t allow you to\
    \ reset the password: ORA-28007: the password cannot be reused\n\nIf you get this\
    \ error, one option is to set the password to a brand-new value. However, doing\
    \ so may have an undesirable impact on the application. If developers have hard-coded\
    \ the password into response files, the application can’t log on without changing\
    \ the hard-coded password to the new password.\n\nYour other option is to temporarily\
    \ change the user’s profile to allow the password to be reused.\n\nFirst, check\
    \ to see what the current profile is for the user:\n\nSQL> select username, profile\
    \ from dba_users where username = UPPER('&&username'); Here is some sample output:\n\
    \nUSERNAME PROFILE\n\n------------------------------ ------------------------------\n\
    \nAPPUSR SECURE\n\nNow, create a profile that specifically allows a password to\
    \ be reused without any restrictions: CREATE PROFILE temp_prof LIMIT\n\nPASSWORD_REUSE_MAX\
    \ unlimited\n\nPASSWORD_REUSE_TIME unlimited;\n\nNext, assign the user the profile\
    \ that doesn’t limit the reuse of passwords: SQL> alter user appusr profile temp_prof;\n\
    \nYou should be able to modify the password as shown previously:\n\nSQL> alter\
    \ user appusr identified by values 'A0493EBF86198724';\n\nIf successful, you see\
    \ this message:\n\nUser altered.\n\nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\nMake\
    \ sure you set the profile back to the original value for the user: SQL> alter\
    \ user appusr profile secure;\n\nFinally, drop the temporary profile so it isn’t\
    \ accidentally used in the future: SQL> drop profile temp_prof;\n\nModifying Users\n\
    \nSometimes you need to modify existing users for the following types of reasons:\n\
    \n• To change a user’s password\n\n• To lock or unlock a user\n\n• To change the\
    \ default permanent and/or temporary tablespace\n\n• To change a profile or role\n\
    \n• To change system or object privileges\n\n• To modify quotas on tablespaces\n\
    \nUse the ALTER USER statement to modify users. Listed next are several SQL statements\
    \ that modify a user. This example changes a user’s password using the IDENTIFIED\
    \ BY clause: SQL> alter user inv_mgmt identified by i2jy22a;\n\nIf you don’t set\
    \ a default permanent tablespace and temporary tablespace when you initially create\
    \ the user, you can modify then after creation as shown here:\n\nSQL> alter user\
    \ inv_mgmt default tablespace users temporary tablespace temp; This example locks\
    \ a user account:\n\nSQL> alter user inv_mgmt account lock;\n\nAnd this example\
    \ alters the user’s quota on the USERS tablespace:\n\nSQL> alter user inv_mgmt\
    \ quota 500m on users;\n\nDropping Users\n\nBefore you drop a user, I recommend\
    \ that you first lock the user. Locking the user prevents anybody from connecting\
    \ to a locked database account. This allows you to determine better whether someone\
    \ is using the account before it’s dropped. Here’s an example of locking a user:\
    \ SQL> alter user heera account lock;\n\nAny user or application attempting to\
    \ connect to this user now receives the following error: ORA-28000: the account\
    \ is locked\n\nTo view the users and lock dates in your database, issue this query:\n\
    \nSQL> select username, lock_date from dba_users;\n\nCHAPTER 6 ■ USERS AND BASIC\
    \ SECURITY\n\nTo unlock an account, issue this command:\n\nSQL> alter user heera\
    \ account unlock;\n\nLocking users is a very handy technique for securing your\
    \ database and discovering which users are active.\n\nBe aware that by locking\
    \ a user, you aren’t locking access to a user’s objects. For example, if a USER_A\
    \ has select, insert, update, and delete privileges on tables owned by USER_B,\
    \ if you lock the USER_B account, USER_A can still issue Data Manipulation Language\
    \ (DML) statements against the objects owned by USER_B.\n\nTo determine whether\
    \ the objects are being used, see the auditing section of Chapter 22.\n\n■ **Tip**\
    \ If a user’s objects don’t consume inordinate amounts of disk space, then before\
    \ you drop the user, it’s prudent to make a quick backup. See Chapter 13 for details\
    \ on using Data Pump to back up a single user.\n\nAfter you’re sure that a user\
    \ and its objects aren’t needed, use the DROP USER statement to remove a database\
    \ account. This example drops the user HEERA:\n\nSQL> drop user heera;\n\nThe\
    \ prior command won’t work if the user owns any database objects. Use the CASCADE\
    \ clause to remove a user and have its objects dropped:\n\nSQL> drop user heera\
    \ cascade;\n\n■ **Note** The DROP USER statement may take an inordinate amount\
    \ of time to execute if the user being dropped owns a vast number of database\
    \ objects. In these situations, you may want to consider dropping the user’s objects\
    \ before dropping the user.\n\nWhen you drop a user, any tables that it owns are\
    \ also dropped. Additionally, all indexes, triggers, and referential-integrity\
    \ constraints are removed. If referential integrity constraints exist in other\
    \ schemas that depend on any dropped primary-key and unique-key constraints, the\
    \ referential constraints in other schemas are also dropped. Oracle invalidates\
    \ but doesn’t drop any views, synonyms, procedures, functions, and packages that\
    \ are dependent on the dropped user’s objects.\n\nEnforcing Password Security\
    \ and Resource Limits\n\nWhen you’re creating users, sometimes requirements call\
    \ for passwords to adhere to a set of security rules. For example, the password\
    \ must be of a certain length and contain numeric characters. Also, when you set\
    \ up database users, you may want to ensure that a certain user isn’t capable\
    \ of consuming inordinate amounts of CPU resources.\n\nYou can use a database\
    \ profile to meet these types of requirements. An Oracle *profile* is a database\
    \ object that serves two purposes:\n\nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\n\
    • Enforcing password security settings\n\n• Limiting system resources that a user\
    \ consumes\n\nThese topics are discussed in the next two subsections.\n\nImplementing\
    \ Password Security\n\nWhen you create a user, if no profile is specified, the\
    \ DEFAULT profile is assigned to the newly created user. To view the current settings\
    \ for a profile, issue the following SQL: SQL> select profile, resource_name,\
    \ resource_type, limit from dba_profiles; Here is a partial listing of the output:\n\
    \nPROFILE RESOURCE_NAME RESOURCE_T LIMIT\n\n---------- -------------------------\
    \ ---------- --------------------\n\nDEFAULT CONNECT_TIME KERNEL UNLIMITED\n\n\
    DEFAULT PRIVATE_SGA KERNEL UNLIMITED\n\nDEFAULT FAILED_LOGIN_ATTEMPTS PASSWORD\
    \ 10\n\nDEFAULT PASSWORD_LIFE_TIME PASSWORD 180\n\nDEFAULT PASSWORD_REUSE_TIME\
    \ PASSWORD UNLIMITED\n\nDEFAULT PASSWORD_REUSE_MAX PASSWORD 10\n\nDEFAULT PASSWORD_VERIFY_FUNCTION\
    \ PASSWORD NULL\n\nA profile’s password restrictions are in effect as soon as\
    \ the profile is assigned to a user. For example, from the previous output, if\
    \ you’ve assigned the DEFAULT profile to a user, that user is allowed only 10\
    \ consecutive failed login attempts before the user account is automatically locked\
    \ by Oracle. See Table 6–1 for a description of the password profile security\
    \ settings.\n\n■ **Tip** See My Oracle Support note 454635.1 for details on Oracle\
    \ Database 11g DEFAULT profile changes.\n\nYou can alter the DEFAULT profile to\
    \ customize it for your environment. For example, say you want to enforce a cap\
    \ on the maximum number of days a password can be used. The next line of code\
    \ sets the PASSWORD_LIFE_TIME of the DEFAULT profile to 300 days:\n\nSQL> alter\
    \ profile default limit password_life_time 300;\n\nCHAPTER 6 ■ USERS AND BASIC\
    \ SECURITY\n\n***Table 6–1.** Password Security Settings*\n\n**Password Setting**\n\
    \n**Description**\n\n**11g default**\n\n**10g default**\n\nFAILED_LOGIN_ATTEMPTS\n\
    \nNumber of failed login\n\n10 attempts\n\n10 attempts\n\nattempts before the\
    \ schema is\n\nlocked\n\nPASSWORD_GRACE_TIME\n\nNumber of days after a\n\n7 days\n\
    \nUnlimited\n\npassword expires that the\n\nowner can log in with an old\n\npassword\n\
    \nPASSWORD_LIFE_TIME\n\nNumber of days a password is\n\n180 days\n\nUnlimited\n\
    \nvalid\n\nPASSWORD_LOCK_TIME\n\nNumber of days an account is\n\n1 day\n\nUnlimited\n\
    \nlocked after\n\nFAILED_LOGIN_ATTEMPTS has\n\nbeen reached\n\nPASSWORD_REUSE_MAX\n\
    \nNumber of days before a\n\nUnlimited Unlimited\n\npassword can be reused\n\n\
    PASSWORD_REUSE_TIME\n\nNumber of times a password\n\nUnlimited Unlimited\n\nmust\
    \ change before a\n\npassword can be reused\n\nPASSWORD_VERIFY_FUNCTION\n\nDatabase\
    \ function used to\n\nNull Null\n\nverify the password\n\nThe PASSWORD_REUSE_TIME\
    \ and PASSWORD_REUSE_MAX settings must be used in conjunction. If you specify\
    \ an integer for one parameter (doesn’t matter which one) and then UNLIMITED for\
    \ the other parameter, the current password can never be reused.\n\nIf you want\
    \ to specify that the DEFAULT profile password must be changed 10 times within\
    \ 100 days before it can be reused, use a line of code similar to this:\n\nSQL>\
    \ alter profile default limit password_reuse_time 100 password_reuse_max 10; Although\
    \ using the DEFAULT profile is sufficient for many environments, you may need\
    \ tighter security management. I recommend that you create custom security profiles\
    \ and assign them to users as required. For example, create a profile specifically\
    \ for application users: CREATE PROFILE SECURE_APP LIMIT\n\nPASSWORD_LIFE_TIME\
    \ 200\n\nPASSWORD_GRACE_TIME 10\n\nPASSWORD_REUSE_TIME 1\n\nPASSWORD_REUSE_MAX\
    \ 1\n\nFAILED_LOGIN_ATTEMPTS 3\n\nPASSWORD_LOCK_TIME 1\n\nPASSWORD_VERIFY_FUNCTION\
    \ verify_function_11G;\n\nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\nAfter you create\
    \ the profile, you can assign it to users as appropriate. The following SQL generates\
    \ a SQL script named alt_prof_dyn.sql that you can use to assign users to the\
    \ newly created profile: set head off;\n\nspo alt_prof_dyn.sql\n\nselect 'alter\
    \ user ' || username || ' profile secure_app;'\n\nfrom dba_users where username\
    \ like '%APP%';\n\nspo off;\n\nBe careful when assigning profiles to application\
    \ accounts that use the database. If you want to enforce that a password must\
    \ change at a regular frequency, be sure you understand the impact on production\
    \ systems. Passwords tend to get hard-coded into response files and code. Enforcing\
    \ password changes in these environments can wreak havoc as you try to chase down\
    \ all the places where the password is referenced. If you don’t want to enforce\
    \ the periodic changing of the password, you can set PASSWORD_LIFE_TIME to a high\
    \ value such as 10000 (days).\n\nLimiting Database Resource Usage\n\nAs mentioned\
    \ earlier, the password-profile settings take effect as soon as you assign the\
    \ profile to a user.\n\nUnlike password settings, kernel resource profile restrictions\
    \ don’t take effect until you set the RESOURCE_LIMIT initialization parameter\
    \ to TRUE for your database. For example: SQL> alter system set resource_limit=true\
    \ scope=both;\n\nTo view the current setting of the RESOURCE_LIMIT parameter:\n\
    \nSQL> select name, value from v$parameter where name='resource_limit'; When you\
    \ create a user, if you don’t specify a profile, then the DEFAULT profile is assigned\
    \ to the user.\n\nYou can modify the DEFAULT profile with the ALTER PROFILE statement.\
    \ The next example modifies the DEFAULT profile to limit CPU_PER_SESSION to 240000\
    \ (in hundredths of seconds): SQL> alter profile default limit cpu_per_session\
    \ 240000;\n\nThis limits any user with the DEFAULT profile to 2400 seconds of\
    \ CPU use. You can set various limits in a profile. Table 6–2 describes the database\
    \ resource settings you can limit via a profile.\n\nCHAPTER 6 ■ USERS AND BASIC\
    \ SECURITY\n\n***Table 6–2.** Database Resource Profile Settings*\n\n**Profile\
    \ Resource**\n\n**Meaning**\n\nCOMPOSITE_LIMIT\n\nLimit based on a weighted-sum\
    \ algorithm for these resources:\n\nCPU_PER_SESSION, CONNECT_TIME, LOGICAL_READS_PER_SESSION,\
    \ and\n\nPRIVATE_SGA\n\nCONNECT_TIME\n\nConnect time in minutes\n\nCPU_PER_CALL\n\
    \nCPU time limit per call in hundredths of seconds\n\nCPU_PER_SESSION\n\nCPU time\
    \ limit per session in hundredths of seconds\n\nIDLE_TIME\n\nIdle time in minutes\n\
    \nLOGICAL_READS_PER_CALL\n\nBlocks read per call\n\nLOGICAL_READS_PER_SESSION\n\
    \nBlocks read per session\n\nPRIVATE_SGA\n\nAmount of space consumed in the shared\
    \ pool\n\nSESSIONS_PER_USER\n\nNumber of concurrent sessions\n\nYou can also create\
    \ custom profiles and assign them to users via the CREATE PROFILE statement. You\
    \ can then assign that profile to any existing database users. The following SQL\
    \ statement creates a profile that limits resources, such as the amount of CPU\
    \ an individual session can consume: create profile user_profile_limit\n\nlimit\n\
    \nsessions_per_user 20\n\ncpu_per_session 240000\n\nlogical_reads_per_session\
    \ 1000000\n\nconnect_time 480\n\nidle_time 120;\n\nAfter you create a profile,\
    \ you can assign it to a user. In the next example, user HEERA is assigned USER_PROFILE_LIMIT:\n\
    \nSQL> alter user heera profile user_profile_limit;\n\n■ **Note** Oracle recommends\
    \ that you use Database Resource Manager to manage database resource limits.\n\
    \nHowever, I find database profiles (implemented via SQL) to be an effective and\
    \ easy mechanism for limiting resources.\n\nAs part of the CREATE USER statement,\
    \ you can specify a profile other than DEFAULT: SQL> create user heera identified\
    \ by foo profile user_profile_limit; 127\n\nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\
    \nWhen should you use database profiles? You should always take advantage of the\
    \ password-security settings of the DEFAULT profile. You can easily modify the\
    \ default settings of this profile as required by your business rules.\n\nA profile’s\
    \ kernel resource limits are useful when you have power users who need to connect\
    \ directly to the database and run queries. For example, you can use the kernel\
    \ resource settings to limit the amount of CPU time a user consumes, which is\
    \ handy when a user writes a bad query that inadvertently consumes excessive database\
    \ resources.\n\nManaging Privileges\n\nA database user must be granted privileges\
    \ before the user can perform any task in the database. In Oracle, you assign\
    \ privileges either by granting a specific privilege to a user or by granting\
    \ the privilege to a role and then granting the role that contains the privilege\
    \ to a user. There are two types of privileges: system privileges and object privileges.\
    \ The following sections discuss these privileges in detail.\n\nAssigning Database\
    \ System Privileges\n\nDatabase system privileges allow you to do tasks such as\
    \ connecting to the database and creating and modifying objects. There are hundreds\
    \ of different system privileges. You can view system privileges by querying the\
    \ DBA_SYS_PRIVS view:\n\nSQL> select distinct privilege from dba_sys_privs;\n\n\
    You can grant privileges to other users or roles. To be able to grant privileges,\
    \ a user needs the GRANT\n\nANY PRIVILEGE privilege or must have been granted\
    \ a system privilege with ADMIN OPTION.\n\nUse the GRANT statement to assign a\
    \ system privileges to a user. For example, minimally a user needs CREATE SESSION\
    \ to be able to connect to the database. You grant this system privilege as shown:\
    \ SQL> grant create session to inv_mgmt;\n\nUsually, a user needs to do more than\
    \ just connect to the database. For example, a user may need to create tables\
    \ and other types of database objects. This example grants a user the CREATE TABLE\
    \ and CREATE DATABASE LINK system privileges:\n\nSQL> grant create table, create\
    \ database link to inv_mgmt;\n\nIf you need to take away privileges, use the REVOKE\
    \ statement:\n\nSQL> revoke create table from inv_mgmt;\n\nOracle has a feature\
    \ that allows you to grant a system privilege and also give that user the ability\
    \ to administer a privilege. You do this with the WITH ADMIN OPTION clause: SQL>\
    \ grant create table to inv_mgmt with admin option;\n\nI rarely use WITH ADMIN\
    \ OPTION when granting privileges. Usually, a user with the DBA role is used to\
    \ grant privileges, and that privilege isn’t generally meted out to non-DBA users\
    \ in the database. This is because it would be hard to keep track of who assigned\
    \ what system privileges, for what reason, and when. In a production environment,\
    \ this would be untenable.\n\nYou can also grant system privileges to the PUBLIC\
    \ user group (I don’t recommend doing this). For example, you could grant CREATE\
    \ SESSION to all users that ever need to connect to the database, as follows:\n\
    \nSQL> grant create session to public;\n\nCHAPTER 6 ■ USERS AND BASIC SECURITY\n\
    \nNow every user that is created can automatically connect to the database. Granting\
    \ system privileges to the PUBLIC user group is almost always a bad idea. As a\
    \ DBA, one of your main priorities is to ensure that the data in the database\
    \ is safe and secure. Granting privileges to the PUBLIC role is a sure way of\
    \ not being able to manage who is authorized to perform specific actions within\
    \ the database.\n\nAssigning Database Object Privileges\n\nDatabase object privileges\
    \ allow you to access and manipulate other users’ objects. The types of database\
    \ objects on which you can grant privileges include tables, views, materialized\
    \ views, sequences, packages, functions, procedures, user-defined types, and directories.\
    \ To be able to grant object privileges, one of the following must be true:\n\n\
    • You own the object.\n\n• You’ve been granted the object privilege with GRANT\
    \ OPTION.\n\n• You have the GRANT ANY OBJECT PRIVILEGE system privilege.\n\nThis\
    \ example grants object privileges (as the object owner) to the INV_MGMT_APP user:\
    \ SQL> grant insert, update, delete, select on registrations to inv_mgmt_app;\
    \ The GRANT ALL statement is equivalent to granting INSERT, UPDATE, DELETE, and\
    \ SELECT to an object.\n\nThe next statement is equivalent to the prior statement:\n\
    \nSQL> grant all on registrations to inv_mgmt_app;\n\nYou can also grant INSERT\
    \ and UPDATE privileges to tables at the column level. The next example grants\
    \ INSERT privileges to specific columns in the INVENTORY table:\n\nSQL> grant\
    \ insert (inv_id, inv_name, inv_desc) on inventory to inv_mgmt_app; If you want\
    \ a user that is being granted object privileges to be able to subsequently grant\
    \ those same object privileges to other users, then use the WITH GRANT OPTION\
    \ clause: SQL> grant insert on registrations to grouping_app with grant option;\
    \ Now the GROUPING_APP user can grant insert privileges on the REGISTRATIONS table\
    \ to other users.\n\nI rarely use the WITH GRANT OPTION when granting object privileges.\
    \ This option allows other users to propagate object privileges to other users.\
    \ This makes it hard to keep track of who assigned what object privileges, for\
    \ what reason, when, and so on. In a production environment, this would be untenable.\n\
    \nWhen you’re managing a production environment, when problems arise, you need\
    \ to know what changed and when and for what reason.\n\nYou can also grant object\
    \ privileges to the PUBLIC user group (I don’t recommend doing this). For example,\
    \ you could grant select privileges on a table to PUBLIC:\n\nSQL> grant select\
    \ on registrations to public;\n\nNow every user can select from the REGISTRATIONS\
    \ table. Granting object privileges to the PUBLIC\n\nrole is almost always a bad\
    \ idea. As a DBA, one of your main priorities is to ensure that the data in the\
    \ database is safe and secure. Granting object privileges to the PUBLIC role is\
    \ a sure way of not being able to manage who can access what data in the database.\n\
    \nIf you need to take away object privileges, then use the REVOKE statement. This\
    \ example revokes DML privileges from the INV_MGMT_APP user:\n\nSQL> revoke insert,\
    \ update, delete, select on registrations from inv_mgmt_app; 129\n\nCHAPTER 6\
    \ ■ USERS AND BASIC SECURITY\n\nGrouping and Assigning Privileges\n\nA *role*\
    \ is a database object that allows you to logically group system and/or object\
    \ privileges together so you can assign those privileges in one operation to a\
    \ user. Roles help you manage aspects of database security in that they provide\
    \ a central object that has privileges assigned to it. You can subsequently assign\
    \ the role to multiple users or other roles.\n\nTo create a role, connect to the\
    \ database as a user that has the CREATE ROLE system privilege. Next, create a\
    \ role and assign to it the system or object privileges that you want to group\
    \ together. This example uses the CREATE ROLE statement to create the JR_DBA role:\n\
    \nSQL> create role jr_dba;\n\nThe next several lines of SQL grant system privileges\
    \ to the newly created role: SQL> grant select any table to jr_dba;\n\nSQL> grant\
    \ create any table to jr_dba;\n\nSQL> grant create any view to jr_dba;\n\nSQL>\
    \ grant create synonym to jr_dba;\n\nSQL> grant create database link to jr_dba;\n\
    \nNext, grant the role to any schema you want to possess those privileges: SQL>\
    \ grant jr_dba to lellison;\n\nSQL> grant jr_dba to mhurd;\n\nThe users LELLISON\
    \ and MHURD can now perform tasks such as creating synonyms, views, and so on.\n\
    \nTo view users assigned to roles, query the DBA_ROLE_PRIVS view:\n\nSQL> select\
    \ grantee, granted_role from dba_role_privs order by 1;\n\nTo view roles granted\
    \ to your currently connected user, query from the USER_ROLE_PRIVS view: SQL>\
    \ select * from user_role_privs;\n\nTo revoke a privilege from a role, use the\
    \ REVOKE command:\n\nSQL> revoke create database link from jr_dba;\n\nSimilarly,\
    \ use the REVOKE command to remove a role from a user:\n\nSQL> revoke jr_dba from\
    \ lellison;\n\n■ **Note** Unlike other database objects, roles don’t have owners.\
    \ A role is defined by the privileges assigned to it.\n\n![](index-165_1.png)\n\
    \n![](index-167_1.png)\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\n***Table 7–1**.\
