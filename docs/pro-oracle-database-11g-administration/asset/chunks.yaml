    Summary


    This chapter describes how to configure an efficient environment. This is especially
    important for DBAs who manage multiple databases on multiple servers. Regular
    maintenance and troubleshooting activities require you to log on directly to the
    database server. To promote efficiency and sanity, you should develop a standard
    set of operating system tools and SQL scripts that help you maintain multiple
    environments. You can use standard features of the OS to assist with navigating,
    repeating commands, showing system bottlenecks, quickly finding critical files,
    and so on.


    The techniques for configuring a standard OS are especially useful when you’re
    working on multiple servers with multiple databases. When you have multiple terminal
    sessions running simultaneously, it’s easy to lose your bearings and forget which
    session is associated with a particular server and database.


    With just a small amount of setup, you can ensure that your OS prompt always shows
    information such as the host and database. Likewise, you can always set your SQL
    prompt to show the username and database connection. These techniques help ensure
    that you don’t accidentally run a command or script in the wrong environment.


    After you have installed the Oracle binaries, created a database, configured your
    environment, you are ready to perform additional database administration tasks
    such as creating tablespaces for the applications. The topic of tablespace creation
    and maintenance is described in the next chapter.


    ![](index-105_1.png)


    CHAPTER 4 ■ TABLESPACES AND DATAFILES


    create additional tablespaces to store application data. This chapter discusses
    the purpose of the standard set of tablespaces, the need for additional tablespaces,
    and how to manage these critical database storage containers.


    Understanding the First Five


    The SYSTEM tablespace provides storage for the Oracle data-dictionary objects.
    This tablespace is where all objects owned by the SYS user are stored. The SYS
    user should be the only user that owns objects created in the SYSTEM tablespace.


    Starting with Oracle Database 10 *g*, the SYSAUX (system auxiliary) tablespace
    is created when you create the database. This is an auxiliary tablespace used
    as a data repository for Oracle database tools such as Enterprise Manager, Statspack,
    LogMiner, Logical Standby, and so on.


    The UNDO tablespace stores the information required to roll back uncommitted data.
    This tablespace contains information about data as it existed before an insert,
    update, or delete statement (this is sometimes referred to as a *before image*
    copy of the data). This information is used to roll back uncommitted data in the
    event of a crash recovery and to provide read consistency for SQL statements.


    Some Oracle SQL statements require a sort area, either in memory or on disk. For
    example, the results of a query may need to be sorted before being returned to
    the user. Oracle first uses memory to sort the query results; and when there isn’t
    sufficient room in memory, the TEMP tablespace is used as a sorting area on disk.
    When you create a database, typically you create the TEMP tablespace and specify
    it to be the default temporary tablespace for any users you create.


    The USERS tablespace is often used as a default permanent tablespace for table
    and index data for users. As shown in Chapter 2, you can create a default permanent
    tablespace for users when you create the database.


    Understanding the Need for More


    Although you could put every database user’s data in the USERS tablespace, this
    usually isn’t scalable or maintainable for any type of serious database application.
    Instead, it’s more efficient to create additional tablespaces for application
    users. You typically create at least two tablespaces specific for each application
    using the database: one for the application table data and one for the application
    index data.


    For example, for the APP user, you can create tablespaces named APP_DATA and APP_INDEX
    for table and index data, respectively.


    DBAs used to separate table and index data for performance reasons. The thinking
    was that separating table data from index data would reduce I/O contention. This
    is because each tablespace and associated datafiles could be placed on different
    disks with separate controllers.


    With modern storage configurations that have multiple layers of abstraction between
    the application and the underlying physical storage devices, it’s debatable whether
    you can realize any performance gains by creating multiple separate tablespaces.
    But there still are valid reasons for creating multiple tablespaces for table
    and index data:


    • Backup and recovery requirements may be different for the tables and indexes.


    • Indexes may have different storage requirements than the table data.


    In addition to separate tablespaces for data and indexes, you sometimes create
    separate tablespaces for objects of different sizes. For example, if an application
    has very large tables, you can create an APP_DATA_LARGE tablespace that has a
    large extent size, and a separate APP_DATA_SMALL tablespace that has a smaller
    extent size.


    Depending on your requirements, you should consider creating separate tablespaces
    for each application using the database. For example, for an inventory application,
    create INV_DATA and 72


    CHAPTER 4 ■ TABLESPACES AND DATAFILES


    INV_INDEX; and for an HR application, create HR_DATA and HR_INDEX. Here are some
    reasons to consider creating separate tablespaces for each application using the
    database:


    • Applications may have different availability requirements. Separate tablespaces
    let you take tablespaces offline for one application while not affecting another
    application.


    • Applications may have different backup and recovery requirements. Separate tablespaces
    let tablespaces be backed up and recovered independently.


    • Applications may have different storage requirements. Separate tablespaces allow
    for different settings for extent sizes and segment management.


    • You may have some data that is purely read only. Separate tablespaces let you
    put a tablespace that contains only read-only data into read-only mode.


    This chapter focuses on the most common and critical tasks associated with creating
    and maintaining tablespaces and datafiles. The next section discusses creating
    tablespaces, and the chapter progresses to more advanced topics such as moving
    and renaming datafiles.


    Creating Tablespaces


    You use the CREATE TABLESPACE statement to create tablespaces. The Oracle SQL
    reference manual contains more than 12 pages of syntax and examples for creating
    tablespaces. In most scenarios, you need to use only a few of the features available,
    namely locally managed extent allocation, and automatic segment space management.
    The following code snippet demonstrates how to create a tablespace that utilizes
    the most common features:


    create tablespace tools


    datafile ''/ora01/dbfile/INVREP/tools01.dbf''


    size 100m


    extent management local


    uniform size 128k


    segment space management auto;


    You need to modify this script for your environment. For example, the directory
    path, datafile size, and uniform extent size should be changed per environment
    requirements.


    You create tablespaces as locally managed by using the EXTENT MANAGEMENT LOCAL
    clause. A locally managed tablespace uses a bitmap in the datafile to efficiently
    determine whether an extent is in use.


    The storage parameters NEXT, PCTINCREASE, MINEXTENTS, MAXEXTENTS, and DEFAULT
    aren’t valid for extent options in locally managed tablespaces.


    ■ **Note** A locally managed tablespace with uniform extents must be minimally
    sized for at least five database blocks per extent.


    As you add data to objects in tablespaces, Oracle automatically allocates more
    extents to an associated tablespace datafile as needed to accommodate the growth.
    You can instruct Oracle to allocate a uniform size for each extent via the UNIFORM
    SIZE [size] clause. If you don’t specify a size, then the default uniform extent
    size is 1MB.


    CHAPTER 4 ■ TABLESPACES AND DATAFILES


    The uniform extent size that you use varies depending on the storage requirements
    of your tables and indexes. I usually create several tablespaces for a given application.
    For example, you can create one tablespace for small objects that has a uniform
    extent size of 512KB, one tablespace for medium-sized objects that has a uniform
    extent size of 4MB, one tablespace for large objects with a uniform extent size
    of 16MB, and so on.


    Alternatively, you can specify that Oracle determine the extent size via the AUTOALLOCATE
    clause.


    Oracle allocates extent sizes of 64KB, 1MB, 8MB, or 64MB. Using AUTOALLOCATE is
    appropriate when you think objects in one tablespace will be of varying sizes.


    The SEGMENT SPACE MANAGEMENT AUTO clause instructs Oracle to manage the space
    within the block.


    When you use this clause, there is no need to specify parameters such as PCTUSED,
    FREELISTS, and FREELIST GROUPS. The alternative to AUTO space management is MANUAL.
    When you use MANUAL, you can adjust the previously mentioned parameters depending
    on the needs of your application. I recommend that you use AUTO and not MANUAL.
    Using AUTO vastly reduces that number of parameters you’d otherwise need to configure
    and manage.


    When a datafile fills up, you can instruct Oracle to automatically increase the
    size of the datafile with the AUTOEXTEND feature. I recommend that you don’t use
    this feature. Instead, you should monitor tablespace growth and add space as necessary.
    Manually adding space is preferable to having a runaway SQL process that accidentally
    grows a tablespace until it has consumed all space on a mount point. If you inadvertently
    fill up a mount point that contains a control file or the Oracle binaries, you
    can hang your database.


    If you do use the AUTOEXTEND feature, I recommend that you always specify a corresponding
    MAXSIZE so that a runaway SQL process doesn’t accidentally fill up a tablespace
    that in turn fills up a mount point.


    Here’s an example of creating an autoextending tablespace with a cap on its maximum
    size: create tablespace tools


    datafile ''/ora01/dbfile/INVREP/tools01.dbf''


    size 100m


    autoextend on maxsize 1000m


    extent management local


    uniform size 128k


    segment space management auto;


    When you’re using CREATE TABLESPACE scripts in different environments, it’s useful
    to be able to parameterize portions of the script. For example, in development,
    you may size the datafiles at 100MB, whereas in production the datafiles may be
    1000GB. Use ampersand & variables to make CREATE


    TABLESPACE scripts more portable among environments.


    The next listing defines ampersand variables at the top of the script, and those
    variables determine the sizes of datafiles created for the tablespaces:


    define tbsp_large=5G


    define tbsp_med=500M


    --


    create tablespace reg_data


    datafile ''/ora01/oradata/INVREP/reg_data01.dbf''


    size &&tbsp_large


    extent management local


    uniform size 128k


    segment space management auto;


    --


    create tablespace reg_index


    datafile ''/ora01/oradata/INVREP/reg_index01.dbf''


    size &&tbsp_med


    extent management local


    uniform size 128k


    segment space management auto;


    CHAPTER 4 ■ TABLESPACES AND DATAFILES


    Using ampersand variables allows you to modify the script once and have the variables
    reused throughout the script. You can parameterize all aspects of the script,
    including datafile mount points and extent sizes.


    You can also pass the values of the ampersand variables in to the CREATE TABLESPACE
    script from the SQL*Plus command line. This lets you avoid hard-coding a specific
    size in the script and instead provide the sizes at runtime. To accomplish this,
    first define at the top of the script the ampersand variables to accept the values
    being passed in:


    define tbsp_large=&1


    define tbsp_med=&2


    --


    create tablespace reg_data


    datafile ''/ora01/oradata/INVREP/reg_data01.dbf''


    size &&tbsp_large


    extent management local


    uniform size 128k


    segment space management auto;


    --


    create tablespace reg_index


    datafile ''/ora01/oradata/INVREP/reg_index01.dbf''


    size &&tbsp_med


    extent management local


    uniform size 128k


    segment space management auto;


    Now you can pass variables in to the script from the SQL*Plus command line. The
    following example executes a script named cretbsp.sql and passes in two values
    that set the ampersand variables to 5G and 500M, respectively:


    SQL> @cretbsp 5G 500M


