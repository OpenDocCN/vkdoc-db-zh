- fmt: 'You can report on backups that RMAN has determined to be obsolete per the
    retention policy as follows:


    ```

    RMAN> report obsolete;

    ```


    To delete obsolete backups, run the `DELETE OBSOLETE` command:


    ```

    RMAN> delete obsolete;

    ```


    You’re prompted with:


    `Do you really want to delete the above objects (enter YES or NO)?`


    If you’re scripting this, you can specify the delete not to prompt for input:


    ```

    RMAN> delete noprompt obsolete;

    ```


    I usually have the `DELETE NOPROMPT OBSOLETE` command coded into the same shell
    script that backs up the database. This instructs RMAN to delete any obsolete
    backups and any obsolete archive-redo logs as specified by the retention policy.
    See the shell script later in this chapter for an example of how to automate the
    deleting of obsolete backups.


    The default retention policy is redundancy of 1. You can completely disable the
    RMAN retention policy via the `TO NONE` command:


    ```

    RMAN> configure retention policy to none;

    ```


    To set the retention policy back to the default, use the `CLEAR` command:


    ```

    RMAN> configure retention policy clear;

    ```


    ### Configuring the Archive-Redo Logs’ Deletion Policy


    In most scenarios, I have RMAN delete the archive-redo logs based on the retention
    policy of the database backups. This is the default behavior. You can view the
    database retention policy using the `SHOW` command:


    ```

    RMAN> show retention policy;

    CONFIGURE RETENTION POLICY TO REDUNDANCY 1; # default

    ```


    To remove archive-redo logs (and backup pieces) based on the database retention
    policy, run the following:


    ```

    RMAN> delete obsolete;

    ```


    As of Oracle Database 11g, you can specify an archive-redo log deletion policy
    that is separate from the database backups. This deletion policy applies to both
    archive-redo logs outside of the FRA and in the FRA.


    #### Note


    Prior to Oracle Database 11g, the archive-deletion policy only applied to archive-redo
    logs associated with a standby database.


    To configure an archive-redo log deletion policy, use the `CONFIGURE ARCHIVELOG
    DELETION` command. The following command configures the archive-redo deletion
    policy so that archive-redo logs aren’t deleted until they have been backed up
    twice to disk:


    ```

    RMAN> configure archivelog deletion policy to backed up 2 times to device type
    disk;

    ```


    To have RMAN delete obsolete archive-redo logs as defined by the archivelog-deletion
    policy, issue the following:


    ```

    RMAN> delete archivelog all;

    ```


    To see whether a retention policy has been set specifically for the archive-redo
    log files, use this command:


    ```

    RMAN> show archivelog deletion policy;

    ```


    To clear the archive deletion policy, do this:


    ```

    RMAN> configure archivelog deletion policy clear;

    ```


    #### Tip


    Run the `CROSSCHECK` command before running the `DELETE` command. Doing so ensures
    that RMAN is aware of whether a file is on disk.


    ### Setting the Degree of Parallelism


    You can significantly increase the performance of RMAN backup and restore operations
    if your database server is equipped with the hardware to support multiple channels.
    If your server has multiple CPUs and multiple storage devices (disks or tape devices),
    then you can improve performance by enabling multiple backup channels.


    If you require better performance from backup and restore operations and have
    hardware that facilitates parallel operations, you should enable parallelism and
    perform tests to determine the optimal degree. If you have hardware that can take
    advantage of parallel RMAN channels, there is little downside to enabling parallelism.


    If you have multiple CPUs but just one storage-device location, you can enable
    multiple channels to write to and read from one location. For example, if you’re
    backing up to an FRA, you can still take advantage of multiple channels by enabling
    parallelism. Suppose you have four CPUs on a server and want to enable a corresponding
    degree of parallelism:


    ```

    RMAN> configure device type disk parallelism 4;

    ```


    You can also write to separate locations in parallel by configuring multiple channels
    associated with different mount points. For example:


    ```

    RMAN> configure device type disk parallelism 4;

    RMAN> configure channel 1 device type disk format ''/ora01/O11R2/rman/rman1_%U.bk'';

    RMAN> configure channel 2 device type disk format ''/ora02/O11R2/rman/rman2_%U.bk'';

    RMAN> configure channel 3 device type disk format ''/ora03/O11R2/rman/rman3_%U.bk'';

    RMAN> configure channel 3 device type disk format ''/ora04/O11R2/rman/rman4_%U.bk'';

    ```


    This code configures four channels that write to separate locations on disk. When
    you configure separate channels for different locations, make sure you enable
    the degree of parallelism to match the number of configured device channels. If
    you allocate more channels than the specified degree of parallelism, RMAN only
    writes to the number of channels specified by the degree of parallelism and ignores
    the other channels.


    If you need to clear the degree of parallelism, you can do so as follows:


    ```

    RMAN> configure device type disk clear;

    ```


    Similarly, to clear the channel device types, use the `CLEAR` command. This example
    clears channel 3:


    ```

    RMAN> configure channel 3 device type disk clear;

    ```


    ### Using Backup Sets or Image Copies


    When you issue an RMAN `BACKUP` command, you can specify the backup to be one
    of the following:


    *   Backup set

    *   Image copy


    A backup set is the default type of backup that RMAN creates. A backup set contains
    backup pieces, which are binary files that only RMAN can write to or read from.
    Backup sets are desirable because they’re usually smaller than the datafiles being
    backed up. If you’re using Oracle Database 10g release 2 or higher, RMAN automatically
    attempts to create backup pieces with `unused block compression`. In this mode,
    RMAN reads a bitmap to determine which blocks are allocated and only reads from
    those blocks in the datafiles. This feature is supported only for disk-based backup
    sets and Oracle Secure Backup tape backups.


    If you’re using a database version prior to Oracle Database 10g release 2, by
    default backup sets are created using `null block compression` (sometimes referred
    to more aptly as `block skipping`). In this mode, RMAN checks blocks in the datafile;
    if the blocks haven’t been used, they aren’t backed up.


    #### Note


    RMAN can also create backup sets using true binary compression. This is the type
    of compression you get from an OS compression utility (such as zip). Oracle supports
    several levels of binary compression. The `BASIC` compression algorithm is available
    without an additional license. Oracle provides further compression features with
    the Oracle Advanced Compression option (see the later section in this chapter
    for details on how to enable binary compression).


    When you create a backup as a backup set, the binary backup piece files can only
    be manipulated by RMAN processes. Some DBAs view this as a disadvantage because
    they must use RMAN to back up and restore these files (you have no direct access
    to or control over the backup pieces). But these perceptions aren’t warranted.
    Unless you hit a rare bug, RMAN is dependable and works reliably in all backup
    and restore situations.


    Contrast the backup set to an image copy. An image copy creates a byte-for-byte
    identical copy of each datafile. The advantages of creating an image copy are
    that (if necessary) you can manipulate the image copy without using RMAN (as with
    an OS copy utility). Additionally, in the event of a media failure, an image copy
    is a fast method of restoring datafiles, because RMAN has to copy the file back
    from the backup location (there is no reconstructing of the datafile, because
    it’s an exact copy).'
