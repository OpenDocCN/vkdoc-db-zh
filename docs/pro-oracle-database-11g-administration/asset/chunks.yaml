    Enforces a business rule and keeps the data\n\ncleaner.\n\nImplementing Virtual\
    \ Columns\n\nWith Oracle Database 11 *g* and higher, you can create a *virtual\
    \ column* as part of your table definition. A virtual column is based on one or\
    \ more existing columns from the same table and/or a combination of constants,\
    \ SQL functions, and user-defined PL/SQL functions. Virtual columns aren’t stored\
    \ on disk; they’re evaluated at runtime when the SQL query executes. Virtual columns\
    \ can be indexed and can have stored statistics.\n\nPrior to Oracle Database 11\
    \ *g*, you could simulate a virtual column via a SELECT statement or in a view\
    \ definition. For example, this next SQL SELECT statement generates a virtual\
    \ value when the query is executed:\n\nselect inv_id, inv_count,\n\ncase when\
    \ inv_count <= 100 then 'GETTING LOW'\n\nwhen inv_count > 100 then 'OKAY'\n\n\
    end\n\nfrom inv;\n\nWhy use a virtual column? The advantages of doing so are as\
    \ follows:\n\n• You can create an index on a virtual column. Internally, Oracle\
    \ creates a function-based index.\n\n• You can store statistics in a virtual column\
    \ that can be used by the cost-based optimizer (CBO).\n\nCHAPTER 7 ■ TABLES AND\
    \ CONSTRAINTS\n\n• Virtual columns can be referenced in WHERE clauses.\n\n• Virtual\
    \ columns are permanently defined in the database. There is one central definition\
    \ of such a column\n\nHere’s an example of creating a table with a virtual column:\n\
    \ncreate table inv(\n\ninv_id number\n\n,inv_count number\n\n,inv_status generated\
    \ always as (\n\ncase when inv_count <= 100 then 'GETTING LOW'\n\nwhen inv_count\
    \ > 100 then 'OKAY'\n\nend)\n\n);\n\nIn the prior code listing, specifying GENERATED\
    \ ALWAYS is optional. For example, the next listing is equivalent to the previous\
    \ one:\n\ncreate table inv(\n\ninv_id number\n\n,inv_count number\n\n,inv_status\
    \ as (\n\ncase when inv_count <= 100 then 'GETTING LOW'\n\nwhen inv_count > 100\
    \ then 'OKAY'\n\nend)\n\n);\n\nI prefer to add GENERATED ALWAYS because it reinforces\
    \ in my mind that the column is always virtual.\n\nThe GENERATED ALWAYS helps\
    \ document inline what you’ve done. This helps with maintenance for other DBAs\
    \ who come along long after you.\n\nTo view values generated by virtual columns,\
    \ first insert some data into the table: SQL> insert into inv (inv_id, inv_count)\
    \ values (1,100);\n\nNext, select from the table to view the generated value:\n\
    \nSQL> select * from inv;\n\nHere is some sample output:\n\nINV_ID INV_COUNT INV_STATUS\n\
    \n---------- ---------- -----------\n\n1 100 GETTING LOW\n\n■ **Note** If you\
    \ insert data into the table, nothing is stored in a column GENERATED ALWAYS AS.\
    \ The virtual value is generated when you select from the table.\n\nYou can also\
    \ alter a table to contain a virtual column:\n\nalter table inv add(\n\ninv_comm\
    \ generated always as(inv_count * 0.1) virtual\n\n);\n\nCHAPTER 7 ■ TABLES AND\
    \ CONSTRAINTS\n\nAnd you can change the definition of an existing virtual column:\n\
    \nalter table inv modify inv_status generated always as(\n\ncase when inv_count\
    \ <= 50 then 'NEED MORE'\n\nwhen inv_count >50 and inv_count <=200 then 'GETTING\
    \ LOW'\n\nwhen inv_count > 200 then 'OKAY'\n\nend);\n\nYou can access virtual\
    \ columns in SQL queries (DML or DDL). For example, suppose you want to update\
    \ a permanent column based on the value in a virtual column:\n\nSQL> update inv\
    \ set inv_count=100 where inv_status='OKAY';\n\nA virtual column itself can’t\
    \ be updated via the SET clause of an UPDATE statement. However, you can reference\
    \ a virtual column in the WHERE clause of an UPDATE or DELETE statement.\n\nYou\
    \ can optionally specify the data type of a virtual column. If you omit the data\
    \ type, Oracle derives the data type from the expression you use to define the\
    \ virtual column.\n\nSeveral caveats are associated with virtual columns:\n\n\
    • You can only define a virtual column on a regular heap-organized table. You\
    \ can’t define a virtual column on an index-organized table, an external table,\
    \ a temporary table, object tables, or cluster tables.\n\n• Virtual columns can’t\
    \ reference other virtual columns.\n\n• Virtual columns can only reference columns\
    \ from the table in which the virtual column is defined.\n\n• The output of a\
    \ virtual column must be a scalar value (a single value, not a set of values).\n\
    \nTo view the definition of a virtual column, use the DBMS_METADATA package to\
    \ view the DDL\n\nassociated with the table. If you’re selecting from SQL*Plus,\
    \ you need to set the LONG variable to a value large enough to show all data returned:\n\
    \nSQL> set long 10000;\n\nSQL> select dbms_metadata.get_ddl('TABLE','INV') from\
    \ dual;\n\nHere is a partial snippet of the output:\n\nCREATE TABLE \"INV_MGMT\"\
    .\"INV\"\n\n( \"INV_ID\" NUMBER,\n\n\"INV_COUNT\" NUMBER,\n\n\"INV_STATUS\" VARCHAR2(11)\
    \ GENERATED ALWAYS AS (CASE WHEN \"INV_COUNT\"<=50 THEN\n\n'NEED MORE' WHEN (\"\
    INV_COUNT\">50 AND \"INV_COUNT\"<=200) THEN 'GETTING LOW' WHEN \"\n\nINV_COUNT\"\
    >200 THEN 'OKAY' END) VIRTUAL VISIBLE ...\n\nMaking Read-Only Tables\n\nStarting\
    \ with Oracle Database 11 *g*, you can place individual tables in read-only mode.\
    \ Doing so prevents any INSERT, UPDATE, or DELETE statements from running against\
    \ a table. In versions prior to Oracle Database 11 *g*, the only way to make a\
    \ table read-only was to either place the entire database into readonly mode or\
    \ place a tablespace in read-only mode (making all tables in the tablespace read-only).\n\
    \nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nThere are several reasons why you may\
    \ require the read-only feature at the table level:\n\n• The data in the table\
    \ is historical and should never be updated in normal circumstances.\n\n• You’re\
    \ performing some maintenance on the table and want to ensure that it doesn’t\
    \ change while it’s being updated.\n\n• You want to drop the table, but before\
    \ you do, you want to place it in read-only mode to better determine if any users\
    \ are attempting to update the table.\n\nUse the ALTER TABLE statement to place\
    \ a table in read-only mode:\n\nSQL> alter table inv read only;\n\nYou can verify\
    \ the status of a read-only table by issuing the following query: SQL> select\
    \ table_name, read_only from user_tables where read_only='YES'; To modify a read-only\
    \ table to read-write, issue the following SQL:\n\nSQL> alter table inv read write;\n\
    \n■ **Note** The read-only table feature requires that the database initialization\
    \ COMPATIBLE parameter be set to 11.1.0 or higher.\n\nUnderstanding Deferred Segment\
    \ Creation\n\nStarting with Oracle Database 11 *g* Release 2, when you create\
    \ a table, the creation of the associated segment is deferred until the first\
    \ row is inserted into the table. This feature has some interesting implications.\
    \ For example, if you have thousands of objects that you’re initially creating\
    \ for an application (such as when you first install it), no space is consumed\
    \ by any of the tables (or associated indexes) until data is inserted into the\
    \ application tables. This means the initial DDL runs more quickly when you create\
    \ a table, but the first INSERT statement runs slightly slower.\n\nTo illustrate\
    \ the concept of deferred segments, first create a table: SQL> create table inv(inv_id\
    \ number, inv_desc varchar2(30));\n\nYou can verify that the table has been created\
    \ by inspecting USER_TABLES: select\n\ntable_name\n\n,segment_created\n\nfrom\
    \ user_tables\n\nwhere table_name='INV';\n\nHere’s some sample output:\n\nTABLE_NAME\
    \ SEG\n\n------------------------------ ---\n\nINV NO\n\nNext, query USER_SEGMENTS\
    \ to verify that a segment hasn’t yet been allocated for this table: 141\n\nCHAPTER\
    \ 7 ■ TABLES AND CONSTRAINTS\n\nselect\n\nsegment_name\n\n,segment_type\n\n,bytes\n\
    \nfrom user_segments\n\nwhere segment_name='INV'\n\nand segment_type='TABLE';\n\
    \nHere’s the corresponding output for this example:\n\nno rows selected\n\nNow,\
    \ insert a row into a table:\n\nSQL> insert into inv values(1,'BOOK');\n\nRerun\
    \ the query, selecting from USER_SEGMENTS, and notice that a segment has been\
    \ created: SEGMENT_NAME SEGMENT_TYPE BYTES\n\n--------------- ------------------\
    \ ----------\n\nINV TABLE 65536\n\nIf you’re used to working with older versions\
    \ of Oracle, the deferred-segment-creation feature can cause confusion. For example,\
    \ if you have space-related monitoring reports that query DBA_SEGMENTS or DBA_EXTENTS,\
    \ be aware that these views aren’t populated that for a table or any indexes associated\
    \ with the table until the first row is inserted into the table.\n\n■ **Note**\
    \ You can disable the deferred-segment-creation feature by setting the database-initialization\
    \ parameter DEFERRED_SEGMENT_CREATION to FALSE. The default for this parameter\
    \ is TRUE.\n\nAllowing for Parallel SQL Execution\n\nIf you work with large tables,\
    \ you may want to consider creating your tables as PARALLEL. This instructs Oracle\
    \ to set the degree of parallelism to be used for any subsequent INSERT, UPDATE,\
    \ DELETE, MERGE, and query statements. This example creates a table with a PARALLEL\
    \ clause of 2: create table inv_apr_10\n\nparallel 2\n\nas select * from inv\n\
    \nwhere create_dtt >= '01-apr-10' and create_dtt < '01-may-10';\n\nYou can specify\
    \ PARALLEL, NOPARALLEL, or PARALLEL N. If you don’t specify N, Oracle sets the\
    \ degree of parallelism based on the PARALLEL_THREADS_PER_CPU initialization parameter.\n\
    \nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\n■ **Tip** Keep in mind that PARALLEL_THREADS_PER_CPU\
    \ can vary considerably from a development environment to a production environment.\
    \ Your development box may contain only 2 CPUS, whereas a production server may\
    \ have 32 CPUs. Therefore, if you don’t specify the degree of parallelism, the\
    \ behavior of parallel operations can vary widely depending on the environment.\n\
    \nCompressing Table Data\n\nOracle has had table compression for quite some time.\
    \ Prior to Oracle Database 11 *g*, the compression available was only suitable\
    \ for data-warehouse environments, mainly because the table-level compression\
    \ was CPU intensive and degraded the performance of DML statements. This type\
    \ of compression usually wasn’t suitable for online transaction processing (OLTP)\
    \ environments.\n\n■ **Note** OLTP table compression is a feature of the Oracle\
    \ Advanced Compression option. The Oracle Advanced Compression option requires\
    \ an additional license from Oracle.\n\nStarting with Oracle Database 11 *g*,\
    \ you can do this:\n\ncreate table inv(\n\ninv_id number\n\n,inv_name varchar2(64)\n\
    \n) compress for oltp;\n\nThe COMPRESS FOR OLTP clause enables compression for\
    \ all DML operations (in prior versions of Oracle, the compress feature was limited\
    \ to direct-path INSERT operations). The OLTP compression doesn’t immediately\
    \ compress data as it’s inserted and updated in a table. Rather, the compression\
    \ occurs in a batch mode when the block reaches a certain internally defined threshold.\
    \ When the threshold is reached, all of the uncompressed rows are compressed at\
    \ the same time. The threshold at which compression occurs is determined by an\
    \ internal algorithm.\n\n■ **Note** Oracle also has a hybrid columnar compression\
    \ feature that is available with the Oracle Exadata product.\n\nSee Oracle’s technology\
    \ website (http://otn.oracle.com) for more details.\n\nCHAPTER 7 ■ TABLES AND\
    \ CONSTRAINTS\n\nYou can verify the compression for a table via the following\
    \ SELECT statement: select\n\ntable_name\n\n,compression\n\n,compress_for\n\n\
    from user_tables where table_name='INV';\n\nHere is some sample output:\n\nTABLE_NAME\
    \ COMPRESS COMPRESS_FOR\n\n------------------------------ -------- ------------\n\
    \nINV ENABLED OLTP\n\nAvoiding Redo Creation\n\nWhen you’re creating a table,\
    \ you have the option of specifying the NOLOGGING clause. The NOLOGGING\n\nfeature\
    \ can greatly reduce the amount of redo generation for certain types of operations.\
    \ Sometimes, when you’re working with large amounts of data, it’s desirable for\
    \ performance reasons to reduce the redo generation when you initially create\
    \ and insert data into a table.\n\nThe downside to eliminating redo generation\
    \ is that you can’t recover the data created via NOLOGGING\n\nin the event a failure\
    \ occurs after the data is loaded (and before you can back up the table). If you\
    \ can tolerate some risk of data loss, then use NOLOGGING but back up the table\
    \ soon after the data is loaded. If your data is critical, then don’t use NOLOGGING.\
    \ If your data can be easily re-created, then NOLOGGING is desirable when you’re\
    \ trying to improve performance of large data loads.\n\nOne perception is that\
    \ NOLOGGING eliminates redo generation for the table for all DML operations.\n\
    \nThat isn’t correct. The NOLOGGING feature never affects redo generation for\
    \ normal DML statements (regular INSERT, UPDATE, and DELETE).\n\nThe NOLOGGING\
    \ feature can significantly reduce redo generation for the following types of\
    \ operations:\n\n• SQL*Loader direct path load\n\n• Direct path INSERT /*+ append\
    \ */\n\n• CREATE TABLE AS SELECT\n\n• ALTER TABLE MOVE\n\n• Creating or rebuilding\
    \ an index\n\nYou need to be aware of some quirks (features) when using NOLOGGING.\
    \ If your database is in FORCE\n\nLOGGING mode, then redo is generated for all\
    \ operations, regardless of whether you specify NOLOGGING.\n\nWhen you’re loading\
    \ a table, if the table has a referential foreign-key constraint defined, then\
    \ redo is generated regardless of whether you specify NOLOGGING.\n\nYou can specify\
    \ NOLOGGING at one of the following levels:\n\n• Statement\n\n• CREATE TABLE or\
    \ ALTER TABLE\n\n• CREATE TABLESPACE or ALTER TABLESPACE\n\nI prefer to specify\
    \ the NOLOGGING clause at the statement or table level. In these scenarios, it’s\
    \ obvious to the DBA executing the statement or DDL that NOLOGGING is used. If\
    \ you specify NOLOGGING at the tablespace level, then each DBA that creates objects\
    \ within that tablespace must be aware of this 144\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\
    \ntablespace-level setting. In teams with multiple DBAs, it’s easy for one DBA\
    \ to be unaware that another DBA has created a tablespace with NOLOGGING.\n\n\
    This example first creates a table with the NOLOGGING option:\n\ncreate table\
    \ inv(inv_id number)\n\ntablespace users\n\nnologging;\n\nNext, do a direct-path\
    \ insert via selecting from a table with historical data: SQL> insert /*+ append\
    \ */ into inv select inv_id from inv_mar_2010; SQL> commit;\n\nWhat happens if\
    \ you have a media failure after you’ve populated a table in NOLOGGING mode (and\
    \ before you’ve made a backup of the table)? After a restore and recovery operation,\
    \ it will appear that the table has been restored:\n\nSQL> desc inv\n\nName Null?\
    \ Type\n\n----------------------------------------- -------- ----------------------------\n\
    \nINV_ID NUMBER\n\nHowever, try to execute a query that scans every block in the\
    \ table:\n\nSQL> select * from inv;\n\nAn error is thrown, indicating that there\
    \ is logical corruption in the datafile: ORA-01578: ORACLE data block corrupted\
    \ (file # 4, block # 11057)\n\nORA-01110: data file 4: '/ora02/dbfile/O11R2/users01.dbf'\n\
    \nORA-26040: Data block was loaded using the NOLOGGING option\n\nIf you specify\
    \ a logging clause at the statement level, it overrides any table or tablespace\
    \ setting. If you specify a logging clause at the table level, it sets the default\
    \ mode for any statements that don’t specify a logging clause, and overrides the\
    \ logging setting at the tablespace. If you specify a logging clause at the tablespace\
    \ level, it sets the default logging for any CREATE TABLE statements that don’t\
    \ specify a logging clause.\n\nYou verify the logging mode of the database as\
    \ follows:\n\nSQL> select name, log_mode, force_logging from v$database;\n\nThe\
    \ next statement verifies the logging mode of a tablespace:\n\nSQL> select tablespace_name,\
    \ logging from dba_tablespaces;\n\nAnd this example verifies the logging mode\
    \ of a table:\n\nSQL> select owner, table_name, logging from dba_tables where\
    \ logging = 'NO'; How do you tell whether Oracle logged redo for an operation?\
    \ One way is to measure the amount of redo generated for an operation with logging\
    \ enabled versus operating in NOLOGGING mode. If you have a development environment\
    \ that you can test in, you can monitor how often the redo logs switch while the\
    \ operation is taking place. Another simple test is to time how long the operation\
    \ takes with and without logging. The operation performed in NOLOGGING mode should\
    \ be faster (because a minimal amount of redo is being generated).\n\nCHAPTER\
    \ 7 ■ TABLES AND CONSTRAINTS\n\nCreating a Table from a Query\n\nSometimes it’s\
    \ convenient to create a table based on the definition of an existing table. For\
    \ example, say you want to create a quick backup of a table before you modify\
    \ the table’s structure or data. Use the CREATE TABLE AS SELECT statement (sometimes\
    \ referred to colloquially as CTAS) to achieve this. For example:\n\ncreate table\
    \ cwp_user_profile_101910\n\nas select * from cwp_user_profile;\n\nThe previous\
    \ statement creates an identical table complete with data. If you don’t want the\
    \ data included, you just want the structure of the table replicated, then provide\
    \ a WHERE clause that always evaluates to false (in this example, 1 will never\
    \ equal 2):\n\ncreate table cwp_user_profile_test\n\nas select * from cwp_user_profile\n\
    \nwhere 1=2;\n\nYou can also specify that no redo be logged when a CTAS table\
    \ is created. For large data sets, this can reduce the amount of time required\
    \ to create the table:\n\ncreate table cwp_user_profile_101910\n\nnologging\n\n\
    as select * from cwp_user_profile;\n\nBe aware that using the CTAS technique with\
    \ the NOLOGGING clause creates the table as NOLOGGING\n\nand doesn’t generate\
    \ the redo required to recover the data that populates the table as the result\
    \ of the SELECT statement. Also, if the tablespace is defined to be NOLOGGING\
    \ (in which the CTAS table is being created), then no redo is generated. In these\
    \ scenarios, you can’t restore and recover your table in the event a failure occurs\
    \ before you’re able to back up the table. If your data is critical, then don’t\
    \ use the NOLOGGING clause.\n\nYou can also specify parallelism and storage parameters.\
    \ Depending on the number of CPUs, you may see some performance gains:\n\ncreate\
    \ table cwp_user_profile_101910\n\nnologging\n\ntablespace staging_data\n\nparallel\
    \ 2\n\nas select * from cwp_user_profile_tab;\n\n■ **Note** The CTAS technique\
    \ doesn’t create any indexes or triggers. You have to create indexes and triggers\
    \ separately if you need those objects from the original table.\n\nModifying a\
    \ Table\n\nAltering a table is a common task. New requirements often mean that\
    \ you need to rename, add, drop or change column data types. In development environments,\
    \ changing a table is often a trivial task: you often don’t have large quantities\
    \ of data or hundreds of users simultaneously accessing a table.\n\nHowever, for\
    \ active production systems, you need to understand the ramifications of trying\
    \ to change tables that are currently being accessed and/or are already populated\
    \ with data.\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nObtaining the Needed Lock\n\
    \nWhen you modify a table, you must have an exclusive lock on the table. One issue\
    \ is that if a DML\n\ntransaction has a lock on the table, you can’t alter the\
    \ table. In this situation, you receive this error: ORA-00054: resource busy and\
    \ acquire with NOWAIT specified or timeout expired The prior error message is\
    \ somewhat confusing in that it leads you to believe that you can resolve the\
    \ issue by acquiring a lock with NOWAIT. However, this is a generic message that\
    \ is generated when the DDL you’re issuing can’t obtain an exclusive lock on the\
    \ table. In this situation, you have a few options:\n\n• After issuing the DDL\
    \ command and receiving the ORA-00054 error, rapidly press the / (forward slash)\
    \ key repeatedly in hopes of modifying the table between transactions.\n\n• Shut\
    \ down the database and start it in restricted mode, modify the table, and then\
    \ open the database for normal use.\n\n• In Oracle Database 11 *g* and higher,\
    \ set the DDL_LOCK_TIMEOUT parameter.\n\nThe last item in the previous list instructs\
    \ Oracle to repeatedly attempt to run a DDL statement until it obtains the required\
    \ lock on the table. You can set the DDL_LOCK_TIMEOUT parameter at the system\
    \ or session level. This next example instructs Oracle to repeatedly retry to\
    \ obtain a lock for 100 seconds: SQL> alter session set ddl_lock_timeout=100;\n\
    \nThe default value for the system-level DDL_LOCK_TIMEOUT initialization parameter\
    \ is 0\\. If you want to modify the default behavior for every session in the\
    \ system, issue an ALTER SYSTEM SET statement. The following command sets the\
    \ default timeout value to 10 seconds for the system: SQL> alter system set ddl_lock_timeout=10\
    \ scope=both;\n\nRenaming a Table\n\nThere are a couple of reasons for renaming\
    \ a table:\n\n• To make the table conform to standards\n\n• To better determine\
    \ whether the table is being used before you drop it This example renames a table\
    \ from INV_MGMT to INV_MGMT_OLD:\n\nSQL> rename inv_mgmt to inv_mgmt_old;\n\n\
    If successful, you should see this message:\n\nTable renamed.\n\nAdding a Column\n\
    \nUse the ALTER TABLE ... ADD statement to add a column to a table. This example\
    \ adds a column to the INV table:\n\nSQL> alter table inv add(inv_count number);\n\
    \nIf successful, you should see this message:\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\
    \nTable altered.\n\nAltering a Column\n\nOccasionally, you need to alter a column\
    \ to adjust its size or change its data type. Use the ALTER TABLE\n\n... MODIFY\
    \ statement to adjust the size of a column. This example changes the size of a\
    \ column to 256\n\ncharacters:\n\nSQL> alter table inv modify inv_desc varchar2(256);\n\
    \nIf you decrease the size of a column, first ensure that no values exist that\
    \ are greater than the decreased size value:\n\nSQL> select max(length(<column_name>))\
    \ from <table_name>; When you change a column to NOT NULL, then there must be\
    \ a valid value for each column. First, verify that there are no NULL values:\n\
    \nSQL> select <column_name> from <table_name> where <column_name> is null; If\
    \ any rows have a NULL value for the column you’re modifying to NOT NULL, then\
    \ you must first update the column to contain a value. Here is an example of modifying\
    \ a column to NOT NULL: SQL> alter table inv modify(inv_desc not null);\n\nYou\
    \ can also alter the column to have a default value. The default value is used\
    \ any time a record is inserted into the table but no value is provided for a\
    \ column:\n\nSQL> alter table inv modify(inv_desc default 'No Desc');\n\nIf you\
    \ want to remove the default value of a column, then set it to be NULL: SQL> alter\
    \ table inv modify(inv_desc default NULL);\n\nSometimes you need to change a table’s\
    \ data type: for example, a column that was originally incorrectly defined as\
    \ a VARCHAR2 needs to be changed to a NUMBER. Before you change a column’s data\
    \ type, first verify that all values for an existing column contain only valid\
    \ numeric values. Here’s a simple PL/SQL script to do this:\n\ncreate or replace\
    \ function isnum(v_in varchar2)\n\nreturn varchar is\n\nval_err exception;\n\n\
    pragma exception_init(val_err, -6502); -- char to num conv. error\n\nscrub_num\
    \ number;\n\nbegin\n\nscrub_num := to_number(v_in);\n\nreturn 'Y';\n\nexception\
    \ when val_err then\n\nreturn 'N';\n\nend;\n\n/\n\nYou can use the ISNUM function\
    \ to detect whether data in a column is numeric. The function defines a PL/SQL\
    \ pragma exception for the ORA-06502 character-to-number conversion error. When\
    \ this error is encountered, the exception handler captures it and returns an\
    \ N. If the value passed in to the ISNUM\n\nfunction is a number, then a Y is\
    \ returned. If the value can’t be converted to a number, then an N is returned.\
    \ After you’ve defined the function, you can run it as follows: 148\n\nCHAPTER\
    \ 7 ■ TABLES AND CONSTRAINTS\n\nSQL> select hold_col from stage where isnum(hold_col)='N';\n\
    \nSimilarly, when you modify a character column to a DATE or TIMESTAMP data type,\
    \ it’s prudent to first check to see whether the data can be successfully converted.\
    \ Here’s a function that does that: create or replace function isdate(p_in varchar2,\
    \ f_in varchar2)\n\nreturn varchar is\n\nscrub_dt date;\n\nbegin\n\nscrub_dt :=\
    \ to_date(p_in, f_in);\n\nreturn 'Y';\n\nexception when others then\n\nreturn\
    \ 'N';\n\nend;\n\n/\n\nWhen you call the ISDATE function, you need to pass it\
    \ a valid date-format mask: SQL> select hold_col from stage where isdate(hold_col,'YYYYMMDD')='N';\
    \ Renaming a Column\n\nThere are a couple of reasons to rename a column:\n\n•\
    \ Sometimes requirements change, and you want to modify the column name to better\
    \ reflect what the column is used for.\n\n• If you’re planning to drop a column,\
    \ it doesn’t hurt to rename the column first to better determine whether any users\
    \ or applications are accessing the column.\n\nUse the ALTER TABLE ... RENAME\
    \ statement to rename a column:\n\nSQL> alter table inv rename column inv_count\
    \ to inv_amt;\n\nDropping a Column\n\nTables sometimes end up having columns that\
    \ are never used. This may be because the initial requirements changed or were\
    \ inaccurate. If you have a table that contains an unused column, you should consider\
    \ dropping it. If you leave an unused column in a table, you may run into issues\
    \ with future DBAs not knowing what the column is used for, and the column can\
    \ potentially consume space unnecessarily.\n\nBefore you drop a column, I recommend\
    \ that you first rename it. Doing so gives you an opportunity to discover whether\
    \ any users or applications are using the column. After you’re confident the column\
    \ isn’t being used, first make a backup of the table using Data Pump export, and\
    \ then drop the column.\n\nThe previous strategies provide you with options if\
    \ you drop a column and then subsequently realize that it’s needed.\n\nTo drop\
    \ a column, use the ALTER TABLE ... DROP statement:\n\nSQL> alter table inv drop\
    \ (inv_name);\n\nBe aware that the DROP operation may take some time if the table\
    \ from which you’re removing the column contains a large amount of data. This\
    \ time lag may result in transactions being delayed while the table is being modified\
    \ (because the ALTER TABLE statement locks the table). In scenarios like this,\
    \ you may want to first mark the column as unused and then later drop it when\
    \ you have a maintenance window:\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nSQL>\
    \ alter table inv set unused (inv_name);\n\nWhen you mark a column as unused,\
    \ it no longer shows up in the table description. The SET UNUSED\n\nclause doesn’t\
    \ incur the overhead associated with dropping the column. This technique allows\
    \ you to quickly stop the column from being seen or used by SQL queries or applications.\
    \ Any query that attempts to access an unused column receives the following error:\n\
    \nORA-00904: ... invalid identifier\n\nYou can later drop any unused columns when\
    \ you’ve scheduled some downtime for the application.\n\nUse the DROP UNUSED clause\
    \ to remove any columns marked as UNUSED.\n\nSQL> alter table inv drop unused\
    \ columns;\n\nDisplaying Table DDL\n\nSometimes DBAs do a poor job of documenting\
    \ what DDL is used when creating or modifying a table.\n\nNormally, you should\
    \ maintain the database DDL code in a source-control repository or in some sort\
    \ of modeling tool. If your shop doesn’t have the DDL source code, then there\
    \ are a few ways that you can manually reproduce DDL:\n\n• Query the data dictionary\n\
    \n• Use the exp and imp utilities\n\n• Use Data Pump\n\n• Use the DBMS_METADATA\
    \ package\n\nBack in the olden days, say version 7 and earlier, DBAs often wrote\
    \ SQL that queries the data dictionary to attempt to extract the DDL required\
    \ to re-create objects. Although this method was better than nothing, it was often\
    \ prone to errors because the SQL didn’t account for every object-creation feature.\n\
    \nThe exp and imp utilities are useful for generating DDL. The basic idea is that\
    \ you export the object in question and then use the imp utility with the SCRIPT\
    \ or SHOW option to display the DDL. This is a good method, but you often have\
    \ to manually edit the output of the imp utility to produce the desired DDL.\n\
    \nThe Data Pump utility is an excellent method for generating the DDL used to\
    \ create database objects. Using Data Pump to generate DDL is covered in detail\
    \ in Chapter 13.\n\nThe GET_DDL function of the DBMS_METADATA package is usually\
    \ the quickest way to display the DDL\n\nrequired to create an object. This example\
    \ shows how to generate the DDL for a table named INV: SQL> set long 10000\n\n\
    SQL> select dbms_metadata.get_ddl('TABLE','INV') from dual;\n\nHere is some sample\
    \ output:\n\nDBMS_METADATA.GET_DDL('TABLE','INV')\n\nCREATE TABLE \"DARL\".\"\
    INV\"\n\n( \"INV_ID\" NUMBER,\n\n\"INV_DESC\" VARCHAR2(30),\n\n\"INV_COUNT\" NUMBER\n\
    \n) SEGMENT CREATION DEFERRED\n\nPCTFREE 10 PCTUSED 40 INITRANS 1 MAXTRANS 255\
    \ NOCOMPRESS LOGGING\n\nTABLESPACE \"USERS\"\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\
    \nThe following SQL statement displays all the DDL for the tables in a schema:\
    \ select\n\ndbms_metadata.get_ddl('TABLE',table_name)\n\nfrom user_tables;\n\n\
    If you want to display the DDL for a table owned by another user, add the SCHEMA\
    \ parameter to the GET_DDL procedure.\n\nselect\n\ndbms_metadata.get_ddl(object_type=>'TABLE',\
    \ name=>'INVENTORY', schema=>'INV_APP') from dual;\n\n■ **Note** You can display\
    \ the DDL for almost any database object type, such as INDEX, FUNCTION, ROLE,\
    \ PACKAGE, MATERIALIZED VIEW, PROFILE, CONSTRAINT, SEQUENCE, SYNONYM, and so on.\n\
    \nDropping a Table\n\nIf you want to remove an object such as a table from a user,\
    \ use the DROP TABLE statement. This example drops a table named INVENTORY:\n\n\
    SQL> drop table inventory;\n\nYou should see the following confirmation:\n\nTable\
    \ dropped.\n\nIf you attempt to drop a parent table that has a primary key or\
    \ unique keys referenced as a foreign key in a child table, you see an error such\
    \ as\n\nORA-02449: unique/primary keys in table referenced by foreign keys\n\n\
    You need to either drop the referenced foreign-key constraint(s) or use the CASCADE\
    \ CONSTRAINTS\n\noption when dropping the parent table:\n\nSQL> drop table inventory\
    \ cascade constraints;\n\nYou must be the owner of the table or have the DROP\
    \ ANY TABLE system privilege to drop a table. If you have the DROP ANY TABLE privilege,\
    \ you can drop a table in a different schema by prepending the schema name to\
    \ the table name:\n\nSQL> drop table inv_mgmt.inventory;\n\nIf you don’t prepend\
    \ the table name with a user name, Oracle assumes you’re dropping a table in your\
    \ current user.\n\n■ **Tip** If you’re using Oracle Database 10g or higher, keep\
    \ in mind that you can undrop an accidentally dropped table.\n\nCHAPTER 7 ■ TABLES\
    \ AND CONSTRAINTS\n\nUndropping a Table\n\nSuppose you accidentally drop a table,\
    \ and you want to restore it. First, verify that the table you want to restore\
    \ is in the recycle bin:\n\nSQL> show recyclebin;\n\nHere is some sample output:\n\
    \nORIGINAL NAME RECYCLEBIN NAME OBJECT TYPE DROP TIME\n\n---------------- ------------------------------\
    \ ------------ -------------------\n\nPURCHASES BIN$YzqK0hN3Fh/gQHdAPLFgMA==$0\
    \ TABLE 2009-02-18:17:23:15\n\nNext, use the FLASHBACK TABLE...TO BEFORE DROP\
    \ statement to recover the dropped table: SQL> flashback table purchases to before\
    \ drop;\n\n■ **Note** You can’t FLASHBACK TABLE...TO BEFORE DROP for a table created\
    \ in the SYSTEM tablespace.\n\nIn Oracle Database 10 *g* and higher, when you\
    \ issue a DROP TABLE statement, the table is renamed (to a name that starts with\
    \ BIN$) and placed in the recycle bin. The recycle bin is a mechanism that allows\
    \ you to view some of the metadata associated with a dropped object. You can view\
    \ complete metadata regarding renamed objects by querying DBA_SEGMENTS:\n\nselect\n\
    \nowner\n\n,segment_name\n\n,segment_type\n\n,tablespace_name\n\nfrom dba_segments\n\
    \nwhere segment_name like 'BIN$%';\n\nHere is some sample output:\n\nOWNER SEGMENT_NAME\
    \ SEGMENT_TYPE TABLESPACE_NAME\n\n--------------- ------------------------------\
    \ --------------- ---------------\n\nINV BIN$kptXkzzMdFrgQAB/AQBsFw==$0 TABLE\
    \ USERS\n\nINV BIN$kptXkzzNdFrgQAB/AQBsFw==$0 TABLE USERS\n\nThe FLASHBACK TABLE\
    \ statement simply renames the table back to its original name. By default, the\
    \ RECYCLEBIN feature is enabled in Oracle Database 10 *g* and higher. You can\
    \ change the default by setting the RECYCLEBIN initialization parameter to OFF.\n\
    \nI recommend that you not disable the RECYCLEBIN feature. It’s safer to leave\
    \ this feature enabled and purge the RECYCLEBIN to remove objects that you want\
    \ permanently deleted. This means the space associated with a dropped table isn’t\
    \ released until you purge your RECYCLEBIN. If you want to purge the entire contents\
    \ of the currently connected user’s recycle bin, use the PURGE RECYCLEBIN statement:\
    \ SQL> purge recyclebin;\n\nIf you want to purge the recycle bin for all users\
    \ in the database, then do the following as a DBA privileged user:\n\nSQL> purge\
    \ dba_recyclebin;\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nIf you want to bypass\
    \ the RECYCLEBIN feature and permanently drop a table, use the PURGE option of\
    \ the DROP TABLE statement:\n\nSQL> drop table dept purge;\n\nYou can’t use the\
    \ FLASHBACK TABLE statement to retrieve a table dropped with the PURGE option.\
    \ All space used by the table is released, and any associated indexes and triggers\
    \ are also dropped.\n\nRemoving Data from a Table\n\nYou can use either the DELETE\
    \ statement or the TRUNCATE statement to remove records from a table. You need\
    \ to be aware of some important differences between these two approaches. Table\
    \ 7–3 summarizes the attributes of the DELETE and TRUNCATE statements.\n\n***Table\
    \ 7–3.** Features of DELETE and TRUNCATE*\n\n**DELETE**\n\n**TRUNCATE**\n\nChoice\
    \ of COMMIT or ROLLBACK YES\n\nNO\n\nGenerates undo\n\nYES\n\nNO\n\nResets the\
    \ high-water mark to zero\n\nNO\n\nYES\n\nAffected by referenced and\n\nNO YES\n\
    \nenabled foreign-key constraints\n\nPerforms well with large amounts\n\nNO YES\n\
    \nof data\n\nUsing DELETE\n\nOne big difference is that the DELETE statement can\
    \ be either committed or rolled back. Committing a DELETE statement makes the\
    \ changes permanent:\n\nSQL> delete from inv;\n\nSQL> commit;\n\nIf you issue\
    \ a ROLLBACK statement instead of COMMIT, the table contains data as it was before\
    \ the DELETE was issued.\n\nUsing TRUNCATE\n\nTRUNCATE is a DDL statement. This\
    \ means Oracle automatically commits the statement (and the current transaction)\
    \ after it runs, so there is no way to roll back a TRUNCATE statement. If you\
    \ need the option of choosing to roll back (instead of committing) when removing\
    \ data, then you should use the DELETE\n\nstatement. However, the DELETE statement\
    \ has the disadvantage that it generates a great deal of undo and redo information.\
    \ Thus for large tables, a TRUNCATE statement is usually the most efficient way\
    \ to remove data.\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nThis example uses a\
    \ TRUNCATE statement to remove all data from the COMPUTER_SYSTEMS table: SQL>\
    \ truncate table computer_systems;\n\nBy default, Oracle deallocates all space\
    \ used for the table except the space defined by the MINEXTENTS\n\ntable-storage\
    \ parameter. If you don’t want the TRUNCATE statement to deallocate the extents,\
    \ use the REUSE STORAGE parameter:\n\nSQL> truncate table computer_systems reuse\
    \ storage;\n\nThe TRUNCATE statement sets the high-water mark of a table back\
    \ to zero. When you use a DELETE\n\nstatement to remove data from a table, the\
    \ high-water mark doesn’t change. One advantage of using a TRUNCATE statement\
    \ and resetting the high-water mark is that full-table scans only search for rows\
    \ in blocks below the high-water mark. This can have significant performance implications.\n\
    \nYou can’t truncate a table that has a primary key defined that is referenced\
    \ by an enabled foreign-key constraint in a child table—even if the child table\
    \ contains zero rows. Oracle prevents you from doing this because in a multiuser\
    \ system, there is a possibility that another session can populate the child table\
    \ with rows in between the time you truncate the child table and the time you\
    \ subsequently truncate the parent table. In this scenario, you must temporarily\
    \ disable the referenced foreign-key constraints, issue the TRUNCATE statement,\
    \ and then re-enable the constraints.\n\nBecause a TRUNCATE statement is DDL,\
    \ you can’t truncate two separate tables as one transaction.\n\nCompare this TRUNCATE\
    \ behavior to that of DELETE. Oracle does allow you to use the DELETE statement\
    \ to remove rows from a parent table while the constraints are enabled that reference\
    \ a child table. This is because DELETE generates undo, is read-consistent, and\
    \ can be rolled back.\n\n■ **Note** Another way to remove data from a table is\
    \ to drop and re-create the table. However, this means you also have to re-create\
    \ any indexes, constraints, grants, and triggers that belong to the table. Additionally,\
    \ when you drop a table, it’s temporarily unavailable until you re-create it and\
    \ reissue any required grants. Usually, dropping and re-creating a table is acceptable\
    \ only in a development or test environment.\n\nViewing and Adjusting the High-Water\
    \ Mark\n\nOracle defines the *high-water mark* of a table as the boundary between\
    \ used and unused space in a segment. When you create a table, Oracle allocates\
    \ a number of extents to the table defined by the MINEXTENTS table-storage parameter.\
    \ Each extent contains a number of blocks. Before data is inserted into the table,\
    \ none of the blocks have been used, and the high-water mark is zero.\n\nAs data\
    \ is inserted into a table, the high-water mark boundary is raised as extents\
    \ are allocated. A DELETE statement doesn’t reset the high-water mark.\n\nYou\
    \ need to be aware of a couple of performance-related issues regarding the high-water\
    \ mark:\n\n• SQL query full-table scans\n\n• Direct-path load-space usage\n\n\
    Oracle sometimes needs to scan every block of a table (under the high-water mark)\
    \ when performing a query. This is known as a *full-table scan*. If a significant\
    \ amount of data has been deleted from a table, a full-table scan can take a long\
    \ time to complete, even for a table with zero rows.\n\nCHAPTER 7 ■ TABLES AND\
    \ CONSTRAINTS\n\nAlso, when doing direct-path loads, Oracle inserts data above\
    \ the high-water mark line. Potentially, you can end up with a large amount of\
    \ unused space in a table that is regularly deleted from and also is loaded via\
    \ a direct-path mechanism.\n\nYou can use a couple of methods to detect space\
    \ below the high-water mark:\n\n• Autotrace tool\n\n• DBMS_SPACE package\n\nThe\
    \ autotrace tool provides a simple method for detecting high-water-mark issues.\
    \ Autotrace is advantageous because it’s easy to use and the output is easy to\
    \ interpret.\n\nYou can use the DBMS_SPACE package to determine the high-water\
    \ mark of objects created in tablespaces that use auto-space segment management.\
    \ The DBMS_SPACE package allows you to programmatically check for high-water mark\
    \ problems. The downside to this approach is that the output is somewhat cryptic\
    \ and sometimes difficult to derive concrete answers from.\n\nTracing to Detect\
    \ Space Below the High-Water Mark\n\nYou can run this simple test to detect whether\
    \ you have an issue with unused space below the high-water mark:\n\n1\\. SQL>\
    \ set autotrace trace statistics\n\n2\\. Run the query that performs the full-table\
    \ scan.\n\n3\\. Compare the number of rows processed to the number of logical\
    \ I/Os (memory and disk accesses).\n\nIf the number of rows processed is low but\
    \ the number of logical I/Os is high, you may have an issue with the number of\
    \ free blocks below the high-water mark. Here’s a simple example to illustrate\
    \ this technique:\n\nSQL> set autotrace trace statistics\n\nThe next query generates\
    \ a full-table scan on the INV table:\n\nSQL> select * from inv;\n\nHere’s a partial\
    \ snippet of the output from AUTOTRACE:\n\nno rows selected\n\nStatistics\n\n\
    1405 consistent gets\n\n0 physical reads\n\nThe number of rows returned is zero,\
    \ yet the consistent gets (memory accesses) is 1405\\. This indicates that there\
    \ is free space beneath the high-water mark.\n\nNext, truncate the table and run\
    \ the query again:\n\nSQL> truncate table inv;\n\nSQL> select * from inv;\n\n\
    Here’s a partial listing from the output of AUTOTRACE:\n\nCHAPTER 7 ■ TABLES AND\
    \ CONSTRAINTS\n\nno rows selected\n\nStatistics\n\n3 consistent gets\n\n0 physical\
    \ reads\n\nNotice that the number of memory accesses has been reduced to 3.\n\n\
    Using DBMS_SPACE to Detect Space Below the High-Water Mark\n\nYou can use the\
    \ DBMS_SPACE package to detect free blocks beneath the high-water mark. Here’s\
    \ an anonymous block of PL/SQL that you can call from SQL*Plus:\n\nset serverout\
    \ on size 1000000\n\ndeclare\n\np_fs1_bytes number;\n\np_fs2_bytes number;\n\n\
    p_fs3_bytes number;\n\np_fs4_bytes number;\n\np_fs1_blocks number;\n\np_fs2_blocks\
    \ number;\n\np_fs3_blocks number;\n\np_fs4_blocks number;\n\np_full_bytes number;\n\
    \np_full_blocks number;\n\np_unformatted_bytes number;\n\np_unformatted_blocks\
    \ number;\n\nbegin\n\ndbms_space.space_usage(\n\nsegment_owner => user,\n\nsegment_name\
    \ => 'INV',\n\nsegment_type => 'TABLE',\n\nfs1_bytes => p_fs1_bytes,\n\nfs1_blocks\
    \ => p_fs1_blocks,\n\nfs2_bytes => p_fs2_bytes,\n\nfs2_blocks => p_fs2_blocks,\n\
    \nfs3_bytes => p_fs3_bytes,\n\nfs3_blocks => p_fs3_blocks,\n\nfs4_bytes => p_fs4_bytes,\n\
    \nfs4_blocks => p_fs4_blocks,\n\nfull_bytes => p_full_bytes,\n\nfull_blocks =>\
    \ p_full_blocks,\n\nunformatted_blocks => p_unformatted_blocks,\n\nunformatted_bytes\
    \ => p_unformatted_bytes\n\n);\n\ndbms_output.put_line('FS1: blocks = '||p_fs1_blocks);\n\
    \ndbms_output.put_line('FS2: blocks = '||p_fs2_blocks);\n\ndbms_output.put_line('FS3:\
    \ blocks = '||p_fs3_blocks);\n\ndbms_output.put_line('FS4: blocks = '||p_fs4_blocks);\n\
    \ndbms_output.put_line('Full blocks = '||p_full_blocks);\n\nend;\n\n/\n\nCHAPTER\
    \ 7 ■ TABLES AND CONSTRAINTS\n\nIn this scenario, you want to check the INV table\
    \ for free space below the high-water mark. Here’s the output of the previous\
    \ PL/SQL:\n\nFS1: blocks = 0\n\nFS2: blocks = 0\n\nFS3: blocks = 0\n\nFS4: blocks\
    \ = 1394\n\nFull blocks = 0\n\nIn the prior output, the FS1 parameter shows that\
    \ 0 blocks have 0% to 25% free space. The FS2\n\nparameter shows that 0 blocks\
    \ have 25% to 50% free space. The FS3 parameter shows that 0 blocks have 50% to\
    \ 75% free space. The FS4 parameter shows there are 1394 blocks that with 75%\
    \ to 100% free space.\n\nFinally, there are 0 full blocks. Because there are no\
    \ full blocks and a large number of blocks are mostly empty, this is an indication\
    \ that free space exists below the high-water mark.\n\nHow can you reduce a table’s\
    \ high-water mark? You can use several techniques to reset the high-water mark\
    \ back to zero:\n\n• Use a TRUNCATE statement\n\n• Use ALTER TABLE ... SHRINK\
    \ SPACE\n\n• Use ALTER TABLE ... MOVE\n\nUsing the TRUNCATE statement was discussed\
    \ earlier in this chapter. Shrinking a table and moving a table are discussed\
    \ in the following subsections.\n\nShrinking a Table\n\nTo readjust the high-water\
    \ mark, you must enable row movement for the table and then use the ALTER\n\n\
    TABLE...SHRINK SPACE statement. The tablespace in which the table is created must\
    \ have been built with automatic segment-space management enabled. You can determine\
    \ the tablespace space-segment management type via this query:\n\nSQL> select\
    \ tablespace_name, segment_space_management from dba_tablespaces; The SEGMENT_SPACE_MANAGEMENT\
    \ value must be AUTO for the tablespace in which the table is created.\n\nNext,\
    \ you need to enable row movement for the table to be shrunk. This example enables\
    \ row movement for the INV table:\n\nSQL> alter table inv enable row movement;\n\
    \nNow you can shrink the space used by the table:\n\nSQL> alter table inv shrink\
    \ space;\n\nYou can also shrink the space associated with any index segments via\
    \ the CASCADE clause: SQL> alter table inv shrink space cascade;\n\nIf for some\
    \ reason you don’t want to move the high-water mark when you shrink the table,\
    \ then use the COMPACT clause:\n\nSQL> alter table inv shrink space compact;\n\
    \n![](index-192_1.png)\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nHere’s some sample\
    \ output:\n\nROWID EMP_ID\n\n------------------ ----------\n\nAAAFWXAAFAAAAlWAAA\
    \ 1\n\nThe ROWID pseudo-column value isn’t physically stored in the database.\
    \ Oracle calculates its value when you query it. The ROWID contents are displayed\
    \ as base 64 values that can contain the characters A–Z, a–\n\nz, 0–9, +, and\
    \ /. You can translate the ROWID value into meaningful information via the DMBS_ROWID\n\
    \npackage. For example, to display the relative file number in which a row is\
    \ stored, issue this statement: SQL> select dbms_rowid.rowid_relative_fno(rowid),\
    \ emp_id from emp; Here’s some sample output:\n\nDBMS_ROWID.ROWID_RELATIVE_FNO(ROWID)\
    \ EMP_ID\n\n------------------------------------ ----------\n\n5 1\n\nYou can\
    \ use the ROWID value in the SELECT and WHERE clauses of a SQL statement. In most\
    \ cases, the ROWID uniquely identifies a row. However, it’s possible to have rows\
    \ in different tables that are stored in the same cluster and so contain rows\
    \ with the same ROWID.\n\nCreating a Temporary Table\n\nUse the CREATE GLOBAL\
    \ TEMPORARY TABLE statement to create a table that stores data only provisionally.\n\
    \nYou can specify that the temporary table retain the data for a session or until\
    \ a transaction commits. Use ON COMMIT PRESERVE ROWS to specify that the data\
    \ be deleted at the end of the user’s session. In this example, the rows will\
    \ be retained until the user either explicitly deletes the data or terminates\
    \ the session:\n\ncreate global temporary table today_regs\n\non commit preserve\
    \ rows\n\nas select * from f_registrations\n\nwhere create_dtt > sysdate - 1;\n\
    \nSpecify ON COMMIT DELETE ROWS to indicate that the data should be deleted at\
    \ the end of the transaction. The following example creates a temporary table\
    \ named TEMP_OUTPUT and specifies that records should be deleted at the end of\
    \ each committed transaction:\n\ncreate global temporary table temp_output(\n\n\
    temp_row varchar2(30))\n\non commit delete rows;\n\n■ **Note** If you don’t specify\
    \ a commit method for a global temporary table, then the default is ON COMMIT\
    \ DELETE\n\nROWS.\n\n![](index-194_1.png)\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\
    \nCreating an Index-Organized Table\n\nIndex-organized tables (IOTs) are efficient\
    \ objects when the table data is typically accessed through querying on the primary\
    \ key. Use the ORGANIZATION INDEX clause to create an IOT: create table prod_sku\n\
    \n(prod_sku_id number,\n\nsku varchar2(256),\n\ncreate_dtt timestamp(5),\n\nconstraint\
    \ prod_sku_pk primary key(prod_sku_id)\n\n)\n\norganization index\n\nincluding\
    \ sku\n\npctthreshold 30\n\ntablespace inv_mgmt_data\n\noverflow\n\ntablespace\
    \ mts;\n\nAn IOT stores the entire contents of the table’s row in a B-tree index\
    \ structure. IOTs provide fast access for queries that have exact matches and/or\
    \ range searches on the primary key.\n\nAll columns specified up to and including\
    \ the column specified in the INCLUDING clause are stored in the same block as\
    \ the PROD_SKU_ID primary-key column. In other words, the INCLUDING clause specifies\
    \ the last column to keep in the table segment. Columns listed after the column\
    \ specified in the INCLUDING clause are stored in the overflow data segment. In\
    \ the previous example, the CREATE_DTT\n\ncolumn is stored in the overflow segment.\n\
    \nPCTTHRESHOLD specifies the percentage of space reserved in the index block for\
    \ the IOT row. This value can be from 1 to 50, and defaults to 50 if no value\
    \ is specified. There must be enough space in the index block to store the primary\
    \ key.\n\nThe OVERFLOW clause details which tablespace should be used to store\
    \ overflow data segments.\n\nNotice that DBA/ALL/USER_TABLES includes an entry\
    \ for the table name used when creating an IOT.\n\nAdditionally, DBA/ALL/USER_INDEXES\
    \ contains a record with the name of the primary-key constraint specified. The\
    \ INDEX_TYPE column contains a value of IOT - TOP for IOTs: SQL> select index_name,table_name,index_type\
    \ from user_indexes;\n\nManaging Constraints\n\nThe next several sections in this\
    \ chapter deal with constraints. Constraints provide a mechanism to ensure that\
    \ data conforms to certain business rules. You must be aware of what types of\
    \ constraints are available and when it’s appropriate to use them. Oracle provides\
    \ several types of constraints:\n\n• Primary key\n\n• Unique key\n\n• Foreign\
    \ key\n\n• Check\n\n• NOT NULL\n\nImplementing and managing these constraints\
    \ are discussed in the next several subsections.\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\
    \nCreating Primary-Key Constraints\n\nWhen you implement a database, most tables\
    \ you create require a primary-key constraint to guarantee that every record in\
    \ the table can be uniquely identified. There are multiple techniques for adding\
    \ a primary-key constraint to a table. The first example creates the primary key\
    \ inline with the column definition:\n\ncreate table dept(\n\ndept_id number primary\
    \ key\n\n,dept_desc varchar2(30));\n\nIf you select the CONSTRAINT_NAME from USER_CONSTRAINTS,\
    \ notice that Oracle generates a cryptic name for the constraint (something like\
    \ SYS_C003682). Use the following syntax to explicitly give a name to a primary-key\
    \ constraint:\n\ncreate table dept(\n\ndept_id number constraint dept_pk primary\
    \ key using index tablespace users, dept_desc varchar2(30));\n\n■ **Note** When\
    \ you create a primary-key constraint, Oracle also creates a unique index with\
    \ the same name as the constraint.\n\nYou can also specify the primary-key constraint\
    \ definition after the columns have been defined. The advantage of doing this\
    \ is that you can define the constraint on multiple columns. The next example\
    \ creates the primary key when the table is created, but not inline with the column\
    \ definition: create table dept(\n\ndept_id number,\n\ndept_desc varchar2(30),\n\
    \nconstraint dept_pk primary key (dept_id)\n\nusing index tablespace prod_index);\n\
    \nIf the table has already been created and you want to add a primary-key constraint,\
    \ use the ALTER\n\nTABLE statement. This example places a primary-key constraint\
    \ on the DEPT_ID column of the DEPT\n\ntable:\n\nalter table dept\n\nadd constraint\
    \ dept_pk primary key (dept_id)\n\nusing index tablespace users;\n\nWhen a primary-key\
    \ constraint is enabled, Oracle automatically creates a unique index associated\
    \ with the primary-key constraint. Some DBAs prefer to first create a non-unique\
    \ index on the primary-key column and then define the primary-key constraint:\n\
    \nSQL> create index dept_pk on dept(dept_id);\n\nSQL> alter table dept add constraint\
    \ dept_pk primary key (dept_id); The advantage of this approach is that you can\
    \ drop or disable the primary-key constraint independently of the index. When\
    \ you’re working with large data sets, you may want that sort of flexibility.\
    \ If you don’t create the index before creating the primary-key constraint, then\
    \ whenever you drop or disable the primary-key constraint, the index is automatically\
    \ dropped.\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nConfused about which method\
    \ to use to create a primary key? All of the methods are valid and have their\
    \ merits. Table 7–4 summarizes the primary-key and unique-key constraint creation\
    \ methods. I’ve used all these methods to create primary-key constraints. Usually,\
    \ I use the ALTER TABLE statement that adds the constraint after the table has\
    \ been created.\n\n***Table 7–4.** Primary-Key and Unique-Key Constraint Creation\
    \ Methods* **Constraint Creation Method Advantages**\n\n**Disadvantages**\n\n\
    Inline, no name\n\nVery simple\n\nOracle-generated name\n\nmakes troubleshooting\n\
    \nharder; less control over\n\nstorage attributes; only\n\napplied to a single\
    \ column\n\nInline, with name\n\nSimple; user-defined name makes\n\nRequires more\
    \ thought than\n\ntroubleshooting easier\n\ninline without name\n\nInline, with\
    \ name and tablespace\n\nUser-defined name and\n\nLess simple\n\ndefinition\n\n\
    tablespace; makes troubleshooting\n\neasier\n\nAfter column definition (out of\n\
    \nUser-defined name and\n\nLess simple\n\nline)\n\ntablespace; can operate on\n\
    \nmultiple columns\n\nALTER TABLE add just constraint\n\nLets you manage constraints\
    \ in\n\nMore complicated\n\nseparate statements (and files)\n\nfrom table creation\
    \ scripts; can\n\noperate on multiple columns\n\nCREATE INDEX, ALTER TABLE add\n\
    \nSeparates the index and constraint\n\nMost complicated, more to\n\nconstraint\n\
    \nso you can drop/disable\n\nmaintain, more moving parts\n\nconstraints without\
    \ affecting the\n\nindex; can operate on multiple\n\ncolumns\n\nEnforcing Unique\
    \ Key Values\n\nIn addition to creating a primary-key constraint, you should also\
    \ create unique constraints on any combination of columns that should always be\
    \ unique within a table. For example, for the primary key for a table, it’s common\
    \ to use a numeric key (sometimes called a *surrogate key*) that is populated\
    \ via a sequence. In addition to the surrogate primary key, sometimes users have\
    \ column(s) that the business uses to uniquely identify a record (also called\
    \ a *logical key*). Using both a surrogate key and logical key\n\n• Lets you efficiently\
    \ join parent and child tables on a single numeric column\n\n• Allows updates\
    \ to logical-key columns without changing the surrogate key A unique key guarantees\
    \ uniqueness on the defined column(s) within a table. There are some subtle differences\
    \ between primary-key and unique-key constraints. For example, you can define\
    \ only one 163\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nprimary key per table,\
    \ but there can be several unique keys. Also, a primary key doesn’t allow a NULL\n\
    \nvalue in any of its columns, whereas a unique key allows NULL values.\n\nAs\
    \ with the primary-key constraint, you can use several methods to create a unique\
    \ column constraint. This method uses the UNIQUE keyword inline with the column:\
    \ create table dept(\n\ndept_id number\n\n,dept_desc varchar2(30) unique);\n\n\
    If you want to explicitly name the constraint, use the CONSTRAINT keyword: create\
    \ table dept(\n\ndept_id number\n\n,dept_desc varchar2(30) constraint dept_desc_uk1\
    \ unique);\n\nAs with primary keys, Oracle automatically creates an index associated\
    \ with the unique-key constraint. You can specify the tablespace information inline\
    \ to be used for the associated unique index: create table dept(\n\ndept_id number\n\
    \n,dept_desc varchar2(30) constraint dept_desc_uk1\n\nunique using index tablespace\
    \ prod_index);\n\nYou can also alter a table to include a unique constraint:\n\
    \nSQL> alter table dept add constraint dept_desc_uk1 unique (dept_desc); And you\
    \ can create an index on the columns of interest before you define a unique-key\
    \ constraint: SQL> create index dept_desc_uk1 on dept(dept_desc);\n\nSQL> alter\
    \ table dept add constraint dept_desc_uk1 unique(dept_desc); This can be helpful\
    \ when you’re working with large data sets and you want to be able to disable\
    \ or drop the unique constraint without dropping the associated index.\n\n■ **Note**\
    \ See Table 7–4 for a description of the advantages and disadvantages of the various\
    \ unique-key and primary-key constraint creation methods.\n\nCreating Foreign-key\
    \ Constraints\n\nForeign-key constraints are used to ensure that a column value\
    \ is contained within a defined list of values. Using a foreign-key constraint\
    \ is an efficient way of enforcing that data must be a predefined value before\
    \ an insert or update is allowed. This technique works well for the following\
    \ scenarios:\n\n• The list of values contains many entries.\n\n• Other information\
    \ about the lookup value needs to be stored.\n\n• It’s easy to select, insert,\
    \ update, or delete values via SQL.\n\nFor example, suppose the EMP table is created\
    \ with a DEPT_ID column. To ensure that each employee is assigned a valid department,\
    \ you can create a foreign-key constraint that enforces the rule that each DEPT_ID\
    \ in the EMP table must exist in the DEPT table.\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\
    \n■ **Tip** If the condition you want to check for is a small list that doesn’t\
    \ change very often, consider using a check constraint instead of a foreign-key\
    \ constraint. For example, if you have a column that will always be defined to\
    \ contain either a 0 or a 1, a check constraint is an efficient solution.\n\n\
    You can use several methods to create a foreign-key constraint. The following\
    \ example creates a foreign-key constraint on the DEPT_ID column in the EMP table:\n\
    \ncreate table emp(\n\nemp_id number,\n\nname varchar2(30),\n\ndept_id constraint\
    \ emp_dept_fk references dept(dept_id));\n\nNotice that the DEPT_ID data type\
    \ isn’t explicitly defined. It derives the data type from the referenced DEPT_ID\
    \ column of the DEPT table. You can also explicitly specify the data type when\
    \ you define a column (regardless of the foreign-key definition):\n\ncreate table\
    \ emp(\n\nemp_id number,\n\nname varchar2(30),\n\ndept_id number constraint emp_dept_fk\
    \ references dept(dept_id));\n\nYou can also specify the foreign-key definition\
    \ out of line from the column definition in the CREATE\n\nTABLE statement:\n\n\
    create table emp(\n\nemp_id number,\n\nname varchar2(30),\n\ndept_id number,\n\
    \nconstraint emp_dept_fk foreign key (dept_id) references dept(dept_id)\n\n);\n\
    \nAnd you can alter an existing table to add a foreign-key constraint:\n\nalter\
    \ table emp\n\nadd constraint emp_dept_fk foreign key (dept_id)\n\nreferences\
    \ dept(dept_id);\n\n■ **Note** Unlike with primary-key and unique-key constraints,\
    \ Oracle doesn’t automatically add an index to the foreign-key column(s). You\
    \ must explicitly create indexes on foreign-key columns.\n\nChecking for Specific\
    \ Data Conditions\n\nA check constraint works well for lookups when you have a\
    \ short list of fairly static values, such as a column that can be either Y or\
    \ N. In this situation, the list of values most likely won’t change, and no other\
    \ information needs to be stored other than Y or N, so a check constraint is the\
    \ appropriate solution.\n\nIf you have a long list of values that needs to be\
    \ periodically updated, then a table and a foreign-key constraint are a better\
    \ solution.\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nAlso, a check constraint\
    \ works well for a business rule that must always be enforced and can be written\
    \ with a simple SQL expression. If you have sophisticated business logic that\
    \ must be validated, then the application code is more appropriate.\n\nYou can\
    \ define a check constraint when you create a table. The following defines that\
    \ the ST_FLG\n\ncolumn must be either 0 or 1:\n\ncreate table emp(\n\nemp_id number,\n\
    \nemp_name varchar2(30),\n\nst_flg number(1) CHECK (st_flg in (0,1))\n\n);\n\n\
    A slightly better method is to give the check constraint a name:\n\ncreate table\
    \ emp(\n\nemp_id number,\n\nemp_name varchar2(30),\n\nst_flg number(1) constraint\
    \ st_flg_chk CHECK (st_flg in (0,1))\n\n);\n\nA more descriptive way to name the\
    \ constraint is to embed information in the constraint name that describes the\
    \ condition that was violated. For example:\n\nCREATE table emp(\n\nemp_id number,\n\
    \nemp_name varchar2(30),\n\nst_flg number(1) constraint \"st_flg must be 0 or\
    \ 1\" check (st_flg in (0,1))\n\n);\n\nYou can also alter an existing column to\
    \ include a constraint. The column must not contain any values that violate the\
    \ constraint being enabled:\n\nSQL> alter table emp add constraint \"st_flg must\
    \ be 0 or 1\" check (st_flg in (0,1));\n\n■ **Note** The check constraint must\
    \ evaluate to a true or unknown (NULL) value in the row being inserted or updated.\
    \ You can’t use subqueries or sequences in a check constraint. Also, you can’t\
    \ reference the SQL functions UID, USER, SYSDATE, and USERENV, or the pseudo-columns\
    \ LEVEL or ROWNUM.\n\nEnforcing Not Null Conditions\n\nAnother common condition\
    \ to check for is whether a column is null; you use the NOT NULL constraint to\
    \ do this. The NOT NULL constraint can be defined in several ways. The simplest\
    \ technique is shown here: create table emp(\n\nemp_id number,\n\nemp_name varchar2(30)\
    \ not null);\n\nA slightly better approach is to give the NOT NULL constraint\
    \ a name that makes sense to you: create table emp(\n\nemp_id number,\n\nemp_name\
    \ varchar2(30) constraint emp_name_nn not null);\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\
    \nUse the ALTER TABLE command if you need to modify a column for an existing table.\
    \ For the following command to work, there must not be any NULL values in the\
    \ column being defined as NOT NULL: SQL> alter table emp modify(emp_name not null);\n\
    \n■ **Note** If there are currently NULL values in a column that is being defined\
    \ as NOT NULL, you must first update the table so that the column has a value\
    \ in every row.\n\nDisabling Constraints\n\nOne nice feature of Oracle is that\
    \ you can disable and enable constraints without dropping and recreating them.\
    \ This means you avoid having to know the DDL statements that would be required\
    \ to recreate the dropped constraints.\n\nOccasionally, you need to disable constraints.\
    \ For example, you may be trying to truncate a table but receive the following\
    \ error message:\n\nORA-02266: unique/primary keys in table referenced by enabled\
    \ foreign keys Oracle doesn’t allow a truncate operation on a parent table with\
    \ a primary key that is referenced by an enabled foreign key in a child table.\
    \ If you need to truncate a parent table, you first have to disable all of the\
    \ enabled foreign-key constraints that reference the parent table’s primary key.\
    \ Run this query to determine the names of the constraints that need to be disabled:\n\
    \nselect\n\nb.table_name primary_key_table\n\n,a.table_name fk_child_table\n\n\
    ,a.constraint_name fk_child_table_constraint\n\nfrom dba_constraints a\n\n,dba_constraints\
    \ b\n\nwhere a.r_constraint_name = b.constraint_name\n\nand a.r_owner = b.owner\n\
    \nand a.constraint_type = 'R'\n\nand b.owner = upper('&table_owner')\n\nand b.table_name\
    \ = upper('&table_name');\n\nFor this example, there is only one foreign-key dependency:\n\
    \nPRIMARY_KEY_TABLE FK_CHILD_TABLE FK_CHILD_TABLE_CONST\n\n--------------------\
    \ -------------------- --------------------\n\nD_DATES F_SALES F_SALES_FK1\n\n\
    Use the ALTER TABLE statement to disable constraints on a table. In this case,\
    \ there is only one foreign key to disable:\n\nSQL> alter table f_sales disable\
    \ constraint f_sales_fk1;\n\nYou can now truncate the parent table:\n\nSQL> truncate\
    \ table d_dates;\n\nDon’t forget to re-enable the foreign-key constraints after\
    \ the truncate operation has completed, like this:\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\
    \nSQL> alter table f_sales enable constraint f_sales_fk1;\n\nYou can disable a\
    \ primary key and all dependent foreign-key constraints with the CASCADE option\
    \ of the DISABLE clause. For example, the next line of code disables all foreign-key\
    \ constraints related to the D_DATES_PK primary-key constraint:\n\nSQL> alter\
    \ table d_dates disable constraint d_dates_pk cascade;\n\nThis statement doesn’t\
    \ cascade through all levels of dependencies; it only disables the foreign-key\
    \ constraints directly dependent on D_DATES_PK. Also keep in mind that there is\
    \ no ENABLE...CASCADE\n\nstatement. To re-enable the constraints, you have to\
    \ query the data dictionary to determine which constraints have been disabled\
    \ and then re-enable them individually.\n\nSometimes you run into situations when\
    \ loading data where it’s convenient to disable all the foreign keys before loading\
    \ data (perhaps from a schema-level import using the imp utility). In these situations,\
    \ the imp utility imports the tables in alphabetical order and doesn’t ensure\
    \ that child tables are imported before parent tables. You may also want to run\
    \ several import jobs in parallel to take advantage of parallel hardware. In such\
    \ scenarios, you can disable the foreign keys, perform the import, and then re-enable\
    \ the foreign keys.\n\nHere’s a script that uses SQL to generate SQL to disable\
    \ all foreign-key constraints for a user: set lines 132 trimsp on head off feed\
    \ off verify off echo off pagesize 0\n\nspo dis_dyn.sql\n\nselect 'alter table\
    \ ' || a.table_name\n\n|| ' disable constraint ' || a.constraint_name || ';'\n\
    \nfrom dba_constraints a\n\n,dba_constraints b\n\nwhere a.r_constraint_name =\
    \ b.constraint_name\n\nand a.r_owner = b.owner\n\nand a.constraint_type = 'R'\n\
    \nand b.owner = upper('&table_owner');\n\nspo off;\n\nThis script generates a\
    \ file named dis_dyn.sql that contains the SQL statements to disable all the foreign-key\
    \ constraints for a user.\n\nEnabling Constraints\n\nThis section contains a few\
    \ scripts to help you enable constraints that you’ve disabled. Listed next is\
    \ a script that creates a file with the SQL statements required to re-enable any\
    \ foreign-key constraints for tables owned by a specified user:\n\nset lines 132\
    \ trimsp on head off feed off verify off echo off pagesize 0\n\nspo enable_dyn.sql\n\
    \nselect 'alter table ' || a.table_name\n\n|| ' enable constraint ' || a.constraint_name\
    \ || ';'\n\nfrom dba_constraints a\n\n,dba_constraints b\n\nwhere a.r_constraint_name\
    \ = b.constraint_name\n\nand a.r_owner = b.owner\n\nand a.constraint_type = 'R'\n\
    \nand b.owner = upper('&table_owner');\n\nspo off;\n\nWhen enabling constraints,\
    \ by default Oracle checks to ensure that the data doesn’t violate the constraint\
    \ definition. If you’re fairly certain that the data integrity is fine and that\
    \ you don’t need to 168\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nincur the performance\
    \ hit by revalidating the constraint, you can use the NOVALIDATE clause when re-enabling\
    \ the constraints. Here’s an example:\n\nselect 'alter table ' || a.table_name\n\
    \n|| ' modify constraint ' || a.constraint_name || ' enable novalidate;'\n\nfrom\
    \ dba_constraints a\n\n,dba_constraints b\n\nwhere a.r_constraint_name = b.constraint_name\n\
    \nand a.r_owner = b.owner\n\nand a.constraint_type = 'R'\n\nand b.owner = upper('&table_owner');\n\
    \nThe NOVALIDATE clause instructs Oracle not to validate the constraints being\
    \ enabled, but it does enforce that any new DML activities adhere to the constraint\
    \ definition.\n\nIn multiuser systems, the possibility exists that another session\
    \ has inserted data into the child table while the foreign-key constraint was\
    \ disabled. If that happens, you see the following error when you attempt to re-enable\
    \ the foreign key:\n\nORA-02298: cannot validate (<owner>.<constraint>) - parent\
    \ keys not found In this scenario, you can use the ENABLE NOVALIDATE clause:\n\
    \nSQL> alter table f_sales enable novalidate constraint f_sales_fk1; To clean\
    \ up the rows that violate the constraint, first ensure that you have an EXCEPTIONS\
    \ table created in your user. If you don’t have an EXCEPTIONS table, use this\
    \ script to create one: SQL> @?/rdbms/admin/utlexcpt.sql\n\nNext, populate the\
    \ EXCEPTIONS table with the rows that violate the constraint, using the EXCEPTIONS\
    \ INTO clause:\n\nSQL> alter table f_sales modify constraint f_sales_fk1 validate\n\
    \nexceptions into exceptions;\n\nThis statement still throws the ORA-02298 error\
    \ as long as there are rows that violate the constraint.\n\nThe statement also\
    \ inserts records into the EXCEPTIONS table for any bad rows. You can now use\
    \ the ROW_ID column of the EXCEPTIONS table to remove any records that violate\
    \ the constraint.\n\nHere you see that one row needs to be removed from the F_SALES\
    \ table: SQL> select * from exceptions;\n\nROW_ID OWNER TABLE_NAME CONSTRAINT\n\
    \n------------------ ---------- --------------- ---------------\n\nAAAFVmAAFAAAAihAAA\
    \ INV_MMGT F_SALES F_SALES_FK1\n\nTo remove the offending record, issue a DELETE\
    \ statement:\n\nSQL> delete from f_sales where rowid = 'AAAFVmAAFAAAAihAAA';\n\
    \nIf the EXCEPTIONS table contains many records, you can run a query such as the\
    \ following to delete by OWNER and TABLE_NAME:\n\ndelete from f_sales where rowid\
    \ in\n\n(select row_id\n\nfrom exceptions\n\nwhere owner=upper('&owner') and table_name\
    \ = upper('&table_name')); You may also run into situations where you need to\
    \ disable primary-key or unique-key constraints.\n\nFor example, you may want\
    \ to perform a large data load, and for performance reasons want to disable 169\n\
    \nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nthe primary-key and unique-key constraints.\
    \ You don’t want to incur the overhead of having every row checked as it’s inserted.\n\
    \nThe same general techniques used for disabling foreign keys are applicable for\
    \ disabling primary or unique keys. Run this query to display the primary-key\
    \ and unique-key constraints for a user: select\n\na.table_name\n\n,a.constraint_name\n\
    \n,a.constraint_type\n\nfrom dba_constraints a\n\nwhere a.owner = upper('&table_owner')\n\
    \nand a.constraint_type in ('P','U')\n\norder by a.table_name;\n\nHere’s some\
    \ sample output:\n\nTABLE_NAME CONSTRAINT_NAME C\n\n------------------------------\
    \ ------------------------------ -\n\nDEPT SYS_C006507 P\n\nD_DATES D_DATES_UK1\
    \ U\n\nD_DATES D_DATES_PK P\n\nWhen the table name and constraint name are identified,\
    \ use the ALTER TABLE statement to disable the constraint:\n\nSQL> alter table\
    \ d_dates disable constraint d_dates_pk;\n\n■ **Note** Oracle doesn’t let you\
    \ disable a primary-key or unique-key constraint that is referenced in an enabled\
    \ foreign-key constraint. You first have to disable the foreign-key constraint.\n\
    \nSummary\n\nThis chapter focused on basic activities related to creating and\
    \ maintaining tables. Tables are the containers that store the data within the\
    \ database. Key table-management tasks include modifying, moving, deleting from,\
    \ shrinking, and dropping. You must also be familiar with how to implement and\
    \ use special table types such as temporary, index-organized, and read-only.\n\
    \nOracle also provides various constraints to help you manage the data within\
    \ tables. Constraints form the bedrock of data integrity. In most cases, each\
    \ table should include a primary-key constraint that ensures that every row is\
    \ uniquely identifiable. Additionally, any parent/child relationships should be\
    \ enforced with foreign-key constraints. You can use unique constraints to implement\
    \ business rules that require a column or combination of columns to be unique.\
    \ Check and NOT NULL constraints ensure that columns contain business-specified\
    \ data requirements.\n\nAfter you create tables, the next logical activity is\
    \ to create indexes where appropriate. Indexes are optional database objects that\
    \ help improve performance. Index-creation and -maintenance tasks are covered\
    \ in the next chapter.\n\n![](index-205_1.png)\n\nCHAPTER 8 ■ INDEXES\n\nmust\
    \ be sure that the statements that are improved warrant the penalty being applied\
    \ to other statements.\n\nYou should only add an index when you’re certain it\
    \ will improve performance. And after an index is implemented, you should monitor\
    \ it to ensure that the Oracle optimizer is using it to speed up queries.\n\n\
    What to Think About\n\nOracle provides a wide assortment of indexing features\
    \ and options. As a DBA or a developer, you need to be aware of the various features\
    \ and how to utilize them. If you choose the wrong type of index or use a feature\
    \ incorrectly, there may be serious detrimental performance implications. Listed\
    \ next are aspects to consider before you create an index:\n\n• Type of index\n\
    \n• Table column(s) to include\n\n• Whether to use a single column or a combination\
    \ of columns\n\n• Special features such as the PARALLEL clause, NOLOGGING, compression,\
    \ invisible indexes, and so on\n\n• Uniqueness\n\n• Naming conventions\n\n• Tablespace\
    \ placement\n\n• Initial sizing requirements and growth\n\n• Impact on performance\
    \ of SELECT statements (improvement)\n\n• Impact on performance of INSERT, UPDATE,\
    \ and DELETE statements\n\n• Global or local index, if the underlying table is\
    \ partitioned\n\nWhen you create an index you should give some thought to every\
    \ aspect mentioned in the previous list. One of the first decisions you need to\
    \ make is the type of index and the columns to include. Oracle provides a robust\
    \ variety of index types. For most scenarios, you can use the default B-tree (balanced\
    \ tree) index type. Other commonly used types are bitmap and function-based indexes.\
    \ Table 8–1\n\ndescribes the types of indexes available with Oracle.\n\nCHAPTER\
    \ 8 ■ INDEXES\n\n***Table 8–1.** Oracle Index Type Descriptions*\n\n**Index Type**\n\
    \n**Usage**\n\nB-tree\n\nDefault, balanced tree index, good for high-\n\ncardinality\
