    If you’re using a text-based initialization file, you can view the file directly
    with an OS editor or use the grep command:


    $ grep -i control_files $ORACLE_HOME/dbs/initO11.ora


    Adding a Control File


    *Adding a control file* means copying an existing control file and making your
    database aware of the copy by modifying your CONTROL_FILES parameter. This task
    must be done while your database is shut down.


    This procedure only works when you have a good existing control file that can
    be copied. Adding a control file isn’t the same thing as creating or restoring
    a control file.


    If your database uses only one control file, and that control file becomes damaged,
    you need to either restore a control file from a backup (if available) and perform
    a recovery, or re-create the damaged control file. If you’re using two or more
    control files, and one becomes damaged, you can use the remaining good control
    file(s) to quickly get your database into an operating state.


    If a database is using only one control file, the basic procedure for adding a
    control file is as follows: 1\. Alter the initialization file CONTROL_FILES parameter
    to include the new location and name of the control file.


    2\. Shut down your database.


    3\. Use an OS command to copy an existing control file to the new location and
    name.


    4\. Restart your database.


    Depending on whether you use an spfile or an init.ora file, the previous steps
    varies slightly. The next two subsections detail these different scenarios.


    Spfile Scenario


    If your database is open, you can quickly determine whether you’re using an spfile
    with the following SQL statement:


    SQL> show parameter spfile


    Here is some sample output:


    NAME TYPE VALUE


    -------------- ------- ------------------------------


    spfile string /oracle/app/oracle/product/11. 2.0/db_1/dbs/spfileO11R2.ora When
    you’ve determined that you’re using an spfile, use the following steps to add
    a control file: 1\. Determine the CONTROL_FILES parameter’s current value:


    SQL> show parameter control_files


    The output shows that this database is using only one control file:


    NAME TYPE VALUE


    ------------------------------------ ----------- ------------------------------


    control_files string /ora01/dbfile/O11R2/control01.ctl 94


    CHAPTER 5 ■ MANAGING CONTROL FILES AND ONLINE REDO LOGS


    2\. Alter your CONTROL_FILES parameter to include the new control file that you
    want to add, but limit the scope of the operation to the spfile (you can’t modify
    this parameter in memory). Make sure you also include any control files listed
    in step 1:


    SQL> alter system set control_files=''/ora01/dbfile/O11R2/control01.ctl'',


    ''/ora01/dbfile/O11R2/control02.ctl'' scope=spfile;


    3\. Shut down your database:


    SQL> shutdown immediate;


    4\. Copy an existing control file to the new location and name. In this example,
    a new control file named control02.ctl is created via the OS cp command: $ cp
    /ora01/dbfile/O11R2/control01.ctl /ora01/dbfile/O11R2/control02.ctl 5\. Start
    up your database:


    SQL> startup;


    You can verify that the new control file is being used by displaying the CONTROL_FILES
    parameter: SQL> show parameter control_files


    Here is the output for this example:


    NAME TYPE VALUE


    ------------------------------------ ----------- ------------------------------


    control_files string /ora01/dbfile/O11R2/control01.ctl,


    /ora01/dbfile/O11R2/control02.ctl


    Init.ora Scenario


    Run the following statement to verify that you’re using an init.ora file. If you’re
    not using an spfile, the VALUE column is blank:


    SQL> show parameter spfile


    NAME TYPE VALUE


    ------------------------------------ ----------- ------------------------------


    spfile string


