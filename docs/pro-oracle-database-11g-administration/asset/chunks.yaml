    你可以使用 RMAN 创建几种类型的备份：


    完全备份：备份与数据文件相关的所有已修改块。完全备份并不意味着备份整个数据库。例如，你可以对一个数据文件进行完全备份。


    增量级别 0 备份：备份与完全备份相同的块。唯一的区别是，级别 0 备份可以与其他增量备份一起使用，而完全备份不能。


    增量级别 1 备份：仅备份自上次备份以来修改过的块。级别 1 增量备份可以是差异型或累积型。`差异型`级别 1 备份备份自上次级别 0 或级别 1 备份以来所有修改过的块。`累积型`级别
    1 备份备份自上次级别 0 备份以来所有更改过的块。


    增量更新备份：首先创建数据文件的映像副本，随后的增量备份会与该映像副本合并。这是使用映像副本进行备份的一种高效方式。使用增量更新备份进行介质恢复速度很快，因为在还原过程中使用的是数据文件的映像副本。


    块更改跟踪：数据库功能，用于跟踪数据库中已更改的块。更改块的记录保存在一个二进制文件中。RMAN 可以利用该二进制文件的内容来提高增量备份的性能：RMAN
    无需扫描数据文件中所有已修改的块，而是可以通过二进制块更改跟踪来确定哪些块已更改。


    现在你已理解了 RMAN 的架构组件以及可以创建的备份类型，可以启动 RMAN 并为你的环境配置它了。


    ## 启动 RMAN


    要连接到 RMAN，你需要建立以下内容：


    *   操作系统环境变量

    *   访问具有适当权限的操作系统账户或具有`SYSDBA`权限的数据库用户


    连接 RMAN 的最简单方法是登录到目标数据库所在的服务器，并以 Oracle 软件所有者（在 Linux/Unix 系统上通常名为`oracle`）的身份登录。当你以`oracle`登录时，需要在使用`rman`、`sqlplus`等实用程序之前建立几个操作系统变量。第
    2 章详细介绍了如何设置这些必需的操作系统变量。


    至少需要设置`ORACLE_HOME`和`ORACLE_SID`。此外，如果`PATH`变量包含`ORACLE_HOME/bin`目录会很方便。这是包含 Oracle
    实用程序的目录。


    建立好操作系统变量后，可以从操作系统调用 RMAN，如下所示：460


    ![](img/index-495_1.png)


    ■ **注意** 如果你想通过 Oracle Net 远程连接到 RMAN，需要首先实现一个密码文件。


    ## RMAN 架构决策

