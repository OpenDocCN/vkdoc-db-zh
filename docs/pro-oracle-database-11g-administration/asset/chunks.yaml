    ## 显示作业记录


    除了使用 `lsjob` 命令帮助监控 OSB 作业外，您还可以使用 `catxcr` 命令收集作业操作的详细信息。`--follow` 或 `-f` 选项在文件增长时显示记录，这在监控活动作业时很有用。`--msgno`
    或 `-m` 显示记录中每一行的编号。`--level` 或 `-l` 选项指示消息级别，这对于生成调试或故障排除的附加信息很有用。例如：

    ```

    ob> catxcr -f -m -l 0 apress_oracle/88

    ```


    如果您运行 RMAN 备份并为 `SBT_TAPE` 分配了两个 RMAN 通道，则会创建两个子作业。使用 `--subjobs` 选项的 `lsjob`
    命令显示每个子作业的详细信息。例如：

    ```

    ob> lsjob --active --subjobs


    Job ID Sched time Contents State

    ---------------- ----------- -------------------- -----------------------------

    apress_oracle/88 none database DB11R2 (dbid=4187425583) processed; Oracle job(s)
    scheduled

    apress_oracle/88.1 none incremental backup running since 2010/10/22.23:34

    apress_oracle/88.2 none incremental backup running since 2010/10/22.23:34

    ```


    上述输出显示了两个子作业 ID，即 `apress_oracle/88.1` 和 `apress_oracle/88.2`，分别对应两个 RMAN 通道中的一个。要显示特定子作业的记录，请提供子作业
    ID `apress_oracle/88.2`，如下所示：

    ```

    ob> catxcr -f -m -l 0 apress_oracle/88.2

    ```


    ## 虚拟测试设备


    您可能对“经验是最好的老师”这句话深有体会。您已经阅读了本章，并希望亲自尝试 OSB 命令和示例。但是，您的环境中没有任何测试服务器连接物理磁带设备。在这种情况下，您将在哪里安装和试验
    OSB 呢？好吧，您可以专门配置一个用于测试目的的虚拟测试设备。


    **注意** 你不应该在生产环境中实施虚拟测试设备。Oracle 支持不为虚拟测试设备提供支持。


    要配置虚拟测试设备，请执行以下步骤。在此示例中，媒体服务器的主机名为 `BLLNX3`。


    1.  以 `oracle` 操作系统用户身份登录到 OSB 管理域中指定的媒体服务器。

    ```

    $ su - oracle

    ```

    2.  在 OSB 媒体服务器上，创建一个用于存放虚拟存储元素和虚拟磁带设备的目录。确保您要在其上创建目录的挂载点有足够的磁盘空间。

    ```

    $ mkdir /osb_vdevices

    ```

    3.  以 `admin` 用户身份登录到 `obtool` 实用程序，并提供相应的密码。

    ```

    $ obtool -u admin

    Password:

    ```

    4.  通过运行以下 `mkdev` 命令配置虚拟磁带库，使用 `-t` 选项指定设备为磁带库，使用 `-v` 选项指定为虚拟磁带库。`-S` 选项指定存储元素的数量。`-I`
    选项指定导入和导出元素的数量。`-o` 选项指定该磁带设备在逻辑上可供 OSB 使用。值为 `yes` 的 `-B` 选项指定存在条形码阅读器。`-a` 选项将虚拟库
    `vlib1` 附加到主机 `BLLNX3` 的目录 `/osb_vdevices/vlib1`。

    ```

    ob> mkdev -t library -v -S20 -I2 -o -B yes -a BLLNX3:/osb_vdevices/vlib1 vlib1

    ```

    5.  通过运行以下 `mkdev` 命令配置虚拟磁带设备，使用 `-t` 选项指定设备为磁带设备，使用 `-v` 选项指定为虚拟磁带设备。`-o` 选项指定该磁带设备在逻辑上可供
    OSB 使用。`-l` 选项指定关联的磁带库名称。`-d` 选项指定数据传输元素 (DTE)。`-a` 选项将虚拟磁带 `vdrive1` 附加到主机 `BLLNX3`
    的目录 `/osb_vdevices/vdrive1`。要配置额外的虚拟磁带设备，请运行相同的 `mkdev` 命令。但是，对于第二个虚拟磁带设备，将名称
    `vdrive1` 和目录 `/osb_vdevices/vdrive1` 分别更改为 `vdrive2` 和 `/osb_vdevices/vdrive2`，依此类推。

    ```

    ob> mkdev -t tape -v -o -l vlib1 -d1 -a BLLNX3:/osb_vdevices/vdrive1 vdrive1

    ```

    6.  运行 `insertvol` 命令手动将卷插入磁带库。`-L` 选项指定库名称，这里是 `vlib1`。由于在创建虚拟库时定义了 20 个存储元素，因此发出
    `unlabeled 1-20` 来插入 20 个新卷。

    ```

    ob> insertvol -L vlib1 unlabeled 1-20

    ```

    7.  发出 `lsvol` 命令显示磁带库 `vlib1` 中的卷。

    ```

    ob> lsvol -l -L vlib1

    ```


    ## OSB 软件升级


    您安装了旧版本的 OSB，并希望升级到当前版本。执行 OSB 升级的步骤类似于安装 OSB。但是，在执行 OSB 升级之前，请确保备份管理服务器中的 OSB
    目录，并停止管理域中所有主机上的 OSB 守护进程和服务。此外，先升级管理服务器，然后是媒体服务器和客户端主机。


    有关启动和停止 OSB 服务的特定于操作系统的命令，请参阅 `表 20–7`。您必须在 Linux/Unix 上具有 root 权限或是 Windows 的
    Administrators 组成员才能运行这些命令。


    `表 20–7.` OSB 服务关闭和启动命令


    | 操作系统 | 关闭命令 | 启动命令 |

    |----------|----------|----------|

    | Linux | `/etc/init.d/observiced stop` | `/etc/init.d/observiced start` |

    | Solaris | `/etc/init.d/OracleBackup stop` | `/etc/init.d/OracleBackup start`
    |

    | AIX | `/etc/rc.d/init.d/OracleBackup stop` | `/etc/rc.d/init.d/OracleBackup
    start` |

    | HP-UX | `/sbin/init.d/OracleBackup stop` | `/sbin/init.d/OracleBackup start`
    |

    | Windows | `net stop observiced` | `net start observiced` |


    **提示** Oracle Secure Backup 版本 10.3 与之前的版本（如 10.1 和 10.2）不向后兼容。


    ## 总结


    OSB 是一个可用于将操作系统文件备份到磁带以及从磁带还原的工具。OSB 是一个功能齐全的磁带管理实用程序。OSB 可以与 RMAN 集成，以促进数据库文件直接备份到磁带。这为您在整台服务器或数据中心发生故障时提供了额外的数据保护。


    OSB 提供两个版本：Oracle Secure Backup Express 和 Oracle Secure Backup。Express 版本无需额外许可费用即可使用，适用于只有一台服务器和一台物理磁带设备的小型场所。功能齐全的
    Oracle Secure Backup 版本适用于跨多个平台（Linux、Unix、Windows）的分布式服务器。


    您可以通过图形工具（如 Enterprise Manager 和 OSB Web 工具）或命令行工具（如 `obtool`）访问 OSB。本章重点演示了如何使用命令行
    `obtool` 进行备份和还原操作。


    本章结束了关于备份和恢复的章节。下一章将重点介绍自动化作业和数据库故障排除。


    ![](img/index-603_1.png)


    # 第 21 章 ■ 自动化作业


    ## 使用 Oracle Scheduler 自动化作业

    '
- fmt: "# Oracle Scheduler\n\nOracle Scheduler 是一个工具，它提供了一种自动化作业调度的方法。Oracle Scheduler\
    \ 通过内部的 PL/SQL 包 `DBMS_SCHEDULER` 来实现。它提供了一套复杂的功能用于调度作业。本章的后续章节仅涵盖使用 Oracle Scheduler\
    \ 来自动化具有简单需求的作业的基础知识。\n\n**提示**：目前 `DBMS_SCHEDULER` 包中提供了近 70 个过程和函数。完整细节请参阅 *Oracle\
    \ Database PL/SQL Packages and Types Reference* 指南（可在 OTN 上获取）。\n\n## 创建和调度作业\n\
    \n在清单 21–1 中，创建了一个包含 RMAN 备份命令的 shell 脚本。这个 shell 脚本被命名为 `rmanback.bsh`，位于 `/orahome/oracle/bin`\
    \ 目录中。该 shell 脚本还假定存在一个 `/orahome/oracle/bin/log` 目录。\n\n**清单 21–1.** 一个包含 RMAN\
    \ 备份命令的 Shell 脚本\n\n```bash\n#!/bin/bash\n# source oracle OS variables; see chapter\
    \ 2 for an example of oraset script\n. /var/opt/oracle/oraset RMDB1\nrman target\
    \ / <<EOF\nspool log to '/orahome/oracle/bin/log/rmanback.log'\nbackup database;\n\
    spool log off;\nEOF\nexit 0\n```\n\n在清单 21–2 中，你使用 `DBMS_SCHEDULER` 包的 `CREATE_JOB`\
    \ 过程来创建一个作业。\n以 SYS 用户身份运行（从 SQL*Plus）。\n\n**清单 21–2.** 使用 `CREATE_JOB` 过程\n\n\
    ```sql\nBEGIN\n  DBMS_SCHEDULER.CREATE_JOB(\n    job_name      => 'RMAN_BACKUP',\n\
    \    job_type      => 'EXECUTABLE',\n    job_action    => '/orahome/oracle/bin/rmanback.bsh',\n\
    \    repeat_interval => 'FREQ=DAILY;BYHOUR=14;BYMINUTE=11',\n    start_date  \
    \  => to_date('21–OCT-10'),\n    job_class     => '\"DEFAULT_JOB_CLASS\"',\n \
    \   auto_drop     => FALSE,\n    comments      => 'RMAN backup job',\n    enabled\
    \       => TRUE);\nEND;\n/\n```\n\n在清单 21–2 中，一些参数值得额外解释。`JOB_TYPE` 参数可以是以下类型之一：`STORED_PROCEDURE`、`PLSQL_BLOCK`\
    \ 或 `EXTERNAL`。在这个例子中，执行的是一个外部 shell 脚本，因此作业类型是 `EXTERNAL`。如果你有一个想要运行的 PL/SQL\
    \ 存储过程，则使用 `STORED_PROCEDURE` 类型。`PLSQL_BLOCK` 类型允许你直接运行一个匿名的 PL/SQL 块。\n\n`REPEAT_INTERVAL`\
    \ 参数被设置为 `FREQ=DAILY;BYHOUR=14;BYMINUTE=11`。这指示作业每天运行，在 14:00（24 小时制）过 11 分运行（换句话说，每天下午\
    \ 2:11 运行）。`CREATE_JOB` 的 `REPEAT_INTERVAL` 参数能够实现复杂的日历频率。例如，它支持各种年度、月度、每周、每日、每小时、每分钟和每秒的计划。*Oracle\
    \ Database PL/SQL Packages and Types Reference* 指南仅针对 `REPEAT_INTERVAL` 参数就包含数页的语法细节。\n\
    \n`JOB_CLASS` 参数指定将作业分配到哪个作业类。通常，你会创建一个作业类，以提供一种方法，让作业通过被分配到特定类来自动继承属性。例如，你可能希望某个特定类中的所有作业具有相同的日志记录级别或以相同的方式清除日志文件。如果你尚未创建任何作业类，可以使用默认的作业类。此示例使用了默认作业类。\n\
    \n在此示例中，`AUTO_DROP` 参数被设置为 `FALSE`。这指示 Oracle Scheduler 不要在作业运行后自动删除它。我希望这个作业持久存在并按照计划的频率运行。\n\
    \n## 查看作业详情\n\n要查看作业配置的详细信息，请查询 `DBA_SCHEDULER_JOBS` 视图。清单 21–3 选择了 `RMAN_BACKUP`\
    \ 作业的信息：\n\n**清单 21–3.** `RMAN_BACKUP` 作业的信息\n\n```sql\nSELECT\n  job_name\n \
    \ ,last_start_date\n  ,last_run_duration\n  ,next_run_date\n  ,repeat_interval\n\
    FROM dba_scheduler_jobs\nWHERE job_name='RMAN_BACKUP';\n```\n\n以下是输出的一个片段（输出已换行以适应页面）：\n\
    \n```\nJOB_NAME     LAST_START_DATE               LAST_RUN_DURATION   NEXT_RUN_DATE\
    \           REPEAT_INTERVAL\n------------ ----------------------------- -------------------\
    \ ----------------------- -------------------\nRMAN_BACKUP  21–OCT-10 02.12.59.257151\
    \ PM  +000000000 00:00:   22-OCT-10 02.11.0.3000  FREQ=DAILY;BYHOUR\n        \
    \     -06:00                        41.933585 -06:00    PM -06:00            \
    \   =14;BYMINUTE=11\n```\n\n每次作业运行时，作业执行的记录都会被记录在数据字典中。要检查每次作业执行的状态，请查询 `DBA_SCHEDULER_JOB_LOG`。应该对作业的每次运行都有一条记录，如下所示：\n\
    \n```sql\nSELECT\n  job_name\n  ,log_date\n  ,operation\n  ,status\nFROM dba_scheduler_job_log\n\
    WHERE job_name='RMAN_BACKUP';\n```\n\n以下是一些示例输出：\n\n```\nJOB_NAME     LOG_DATE\
    \                              OPERATION STATUS\n------------ -------------------------------------\
    \ --------- ----------\nRMAN_BACKUP  21–OCT-10 02.13.41.196695 PM -06:00  RUN\
    \       SUCCEEDED\n```\n\n## 修改作业日志记录历史\n\n默认情况下，Oracle Scheduler 保留 30 天的日志历史记录。你可以通过\
    \ `SET_SCHEDULER_ATTRIBUTE` 过程来修改默认的保留期限。例如，这会将默认天数更改为 15 天："
  raw: 'Oracle Scheduler is a tool that provides you a way of automating the scheduling
    of jobs. Oracle Scheduler is implemented via the DBMS_SCHEDULER internal PL/SQL
    package. Oracle Scheduler provides you with a sophisticated set of features for
    scheduling jobs. The following sections of this chapter only cover the basics
    of using Oracle Scheduler to automate jobs with simple requirements.


    ■ **Tip** There are currently nearly 70 procedures and functions available within
    the DBMS_SCHEDULER package. See the Oracle Database PL/SQL Packages and Types
    Reference guide (available on OTN) for complete details.


    Creating and Scheduling a Job


    In Listing 21–1, a shell script is created that contains an RMAN backup command.
    This shell script is named rmanback.bsh and is located in the /orahome/oracle/bin
    directory. The shell script also assumes that there is a /orahome/oracle/bin/log
    directory available.


    ***Listing 21–1.** A Shell Script Containing an RMAN Backup Command*


    #!/bin/bash


    # source oracle OS variables; see chapter 2 for an example of oraset script


    . /var/opt/oracle/oraset RMDB1


    rman target / <<EOF


    spool log to ''/orahome/oracle/bin/log/rmanback.log''


    backup database;


    spool log off;


    EOF


    exit 0


    In Listing 21–2, you use the CREATE_JOB procedure of the DBMS_SCHEDULER package
    to create a job.


    Run it as SYS (from the SQL*Plus).


    ***Listing 21–2.** Using the CREATE_JOB Procedure*


    BEGIN


    DBMS_SCHEDULER.CREATE_JOB(


    job_name => ''RMAN_BACKUP'',


    job_type => ''EXECUTABLE'',


    job_action => ''/orahome/oracle/bin/rmanback.bsh'',


    repeat_interval => ''FREQ=DAILY;BYHOUR=14;BYMINUTE=11'',


    start_date => to_date(''21–OCT-10''),


    job_class => ''"DEFAULT_JOB_CLASS"'',


    auto_drop => FALSE,


    comments => ''RMAN backup job'',


    enabled => TRUE);


    END;


    /


    CHAPTER 21 ■ AUTOMATING JOBS


    In Listing 21–2, some of the parameters warrant additional explanation. The JOB_TYPE
    parameter can be one of the following types: STORED PROCEDURE, PLSQL BLOCK, or
    EXTERNAL. In this example, an external shell script is executed so the job is
    of type EXTERNAL. If you have a PL/SQL stored procedure that you want to run,
    you use the STORED PROCEDURE type. The PLSQL BLOCK type allows you to directly
    run an anonymous block of PL/SQL.


    The REPEAT_INTERVAL parameter is set to FREQ=DAILY;BYHOUR=14;BYMINUTE=11\. This
    instructs the job to run daily, at 1400 hours (military time) at 11 minutes after
    the hour (in other words, to run daily at 2:11 p.m.). The REPEAT_INTERVAL parameter
    of the CREATE_JOB is capable of implementing sophisticated calendaring frequencies.
    For example, it supports a variety of yearly, monthly, weekly, daily, hourly,
    minutely, and secondly schedules. The Oracle Database *PL/SQL Packages and Types
    Reference* guide contains several pages of syntax details for just the REPEAT_INTERVAL
    parameter.


    The JOB_CLASS parameter specifies which job class to assign the job to. Typically,
    you would create a job class to provide a method for a job to automatically inherit
    attributes by virtue of being assigned to a particular class. For example, you
    might want all jobs in a particular class to have the same logging level or purge
    log files in the same manner. There''s a default job class that can be used if
    you haven''t created any job classes. This example uses the default job class.


    The AUTO_DROP parameter is set to FALSE in this example. This instructs the Oracle
    Scheduler to not automatically drop the job after it runs. I want this job to
    persist and run at the scheduled frequency.


    Viewing Job Details


    To view details about how a job is configured, query the DBA_SCHEDULER_JOBS view.
    Listing 21–3 selects information for the RMAN_BACKUP job:


    ***Listing 21–3.** Information for the RMAN_BACKUP Job*


    SELECT


    job_name


    ,last_start_date


    ,last_run_duration


    ,next_run_date


    ,repeat_interval


    FROM dba_scheduler_jobs


    WHERE job_name=''RMAN_BACKUP'';


    Here is a snippet of the output (the output has been wrapped to fit on the page):
    JOB_NAME LAST_START_DATE LAST_RUN_DURATION NEXT_RUN_DATE REPEAT_INTERVAL


    ----------- --------------- ----------------- ----------------- -----------------


    RMAN_BACKUP 21–OCT-10 02.12 +000000000 00:00: 22-OCT-10 02.11.0 FREQ=DAILY;BYHOUR


    .59.257151 PM - 41.933585 0.300000 PM -06:0 =14;BYMINUTE=11


    06:00 0


    Each time a job runs, a record of the job execution is logged in the data dictionary.
    To check on the each statuses of job executions, query DBA_SCHEDULER_JOB_LOG.
    There should be one entry for every time a job has run, like so:


    SELECT


    job_name


    ,log_date


    ,operation


    ,status


    FROM dba_scheduler_job_log


    WHERE job_name=''RMAN_BACKUP'';


    CHAPTER 21 ■ AUTOMATING JOBS


    Here is some sample output:


    OB_NAME LOG_DATE OPERATION STATUS


    ----------- ---------------------------------------- ---------- ----------


    RMAN_BACKUP 21–OCT-10 02.13.41.196695 PM -06:00 RUN SUCCEEDED


    Modifying Job Logging History


    By default, Oracle Scheduler keeps 30 days worth of log history. You can modify
    the default retention period via the SET_SCHEDULER_ATTRIBUTE procedure. For example,
    this changes the default number of days to 15:'
