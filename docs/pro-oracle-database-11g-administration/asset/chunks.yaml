- fmt: "# CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY\n\nIf you attempt to stop\
    \ the recovery process before all redo between the begin and end markers has been\
    \ applied to the datafile, Oracle throws this error:\n\n`ORA-01195: online backup\
    \ of file 1 needs more recovery to be consistent`\n\nAll redo generated during\
    \ the hot backup of a tablespace must be applied to the datafiles before they\
    \ can be opened. Oracle at minimum needs to apply everything between the begin-backup\
    \ SCN marker and the end-backup marker, to account for every block modified while\
    \ the tablespace was in backup mode. This redo is in archive-redo log files; or,\
    \ if the failure happened right after the backup ended, some of the redo may not\
    \ have been archived and is in the online-redo logs. Therefore, you have to instruct\
    \ Oracle to apply what’s in the online-redo logs.\n\n## Understanding that Datafiles\
    \ *Are* Updated\n\nNotice in Figure 16–2 and Figure 16–3 that the behavior of\
    \ the database writer is for the most part unchanged throughout the backup procedure.\
    \ The database writer continues to write blocks to datafiles regardless of the\
    \ backup mode of the database. It doesn’t care if a hot backup is taking place;\
    \ its job is to write blocks from the buffer cache to the datafiles.\n\nEvery\
    \ once in while, you run into a DBA who states that the database writer doesn’t\
    \ write to datafiles during user-managed hot backups. This is a widespread misconception.\
    \ Use some common sense: if the database writer isn’t writing to the datafiles\
    \ during a hot backup, then where are the changes being written? If the transactions\
    \ are being written to somewhere other than the datafiles, how would those datafiles\
    \ be resynchronized after the backup? It doesn’t make any sense.\n\nSome DBAs\
    \ say, “The datafile header is frozen, which means no changes to the datafile.”\
    \ Oracle does freeze the SCN to indicate the start of the hot backup in the datafile\
    \ header and doesn’t update that SCN until the tablespace is taken out of backup\
    \ mode. This “frozen SCN” doesn’t mean blocks aren’t being written to datafiles\
    \ during the backup. You can easily demonstrate that a datafile is written to\
    \ during backup mode by doing this:\n\n1.  Put a tablespace in backup mode:\n\
    \    `SQL> alter tablespace users begin backup;`\n2.  Create a table that has\
    \ a character field:\n    `SQL> create table cc(cc varchar2(20)) tablespace users;`\n\
    3.  Insert a string into that table:\n    `SQL> insert into cc values('DBWR does\
    \ write');`\n4.  Switch the online-redo log files to force a checkpoint:\n   \
    \ `SQL> alter system switch logfile;`\n5.  From the OS, use the `strings` and\
    \ `grep` commands to search for the string in the datafile:\n    `$ strings /ora02/dbfile/O11R2/users01.dbf\
    \ | grep \"DBWR does write\"`\n6.  Here’s the output proving that the database\
    \ writer did write the data to disk: `DBWR does write`\n7.  Don’t forget to take\
    \ the tablespace out of backup mode:\n    `SQL> alter tablespace users end backup;`\n\
    \n## Performing a Complete Recovery of an Archivelog-Mode Database\n\n*Complete\
    \ recovery* means you can recover all transactions that were committed before\
    \ a failure occurred.\n\nComplete recovery doesn’t mean you completely restore\
    \ and recover the entire database. For example, if only one datafile has experienced\
    \ media failure, you only need to restore and recover the damaged datafile to\
    \ perform a complete recovery.\n\n**Tip** If you have access to a test or development\
    \ database, take the time to walk through each step in each example in this section.\
    \ Going through these steps can teach you more about B&R than any documentation.\n\
    \nThe steps in this section apply to any database backed up while in archivelog\
    \ mode. It doesn’t matter if you made a cold backup or hot backup. The steps to\
    \ restore and recover datafiles are the same, as long as the database was in archivelog\
    \ mode during the backup. For a complete recovery, you need:\n\n*   To be able\
    \ to restore the datafiles that have experienced media failure\n*   Access to\
    \ all archive-redo logs generated since the last backup was started\n*   Have\
    \ intact online-redo logs.\n\nHere’s the basic procedure for a complete recovery:\n\
    \n1.  Any datafiles being restored need to be offline before the restoration can\
    \ take place; the easiest way to achieve this is to place your database in mount\
    \ mode.\n2.  Restore the damaged datafiles with an OS copy utility.\n3.  Issue\
    \ the appropriate SQL*Plus `RECOVER` command to apply any information required\
    \ in the archive-redo logs and online-redo logs.\n4.  Alter the database open.\n\
    \nThe next several sections demonstrate some common complete restore and recovery\
    \ scenarios. You should be able to apply these basic scenarios to diagnose and\
    \ recover from any complex situation you find yourself in.\n\n## Restoring and\
    \ Recovering with the Database Offline\n\nThis section details a simple restore-and-recovery\
    \ scenario. Described next are the steps to simulate a failure and then perform\
    \ a complete restore and recovery. Try this scenario in a development database.\n\
    \nEnsure that you have a good backup and that you aren’t trying this experiment\
    \ in a database that contains critical business data.\n\nBefore you start this\
    \ example, create a table and insert some data. This table and data are selected\
    \ from at the end of the complete recovery process to demonstrate a successful\
    \ recovery:\n```sql\nSQL> create table foo(foo number) tablespace users;\nSQL>\
    \ insert into foo values(1);\nSQL> commit;\n```\n\nNow, switch the online logs\
    \ several times. Doing so ensures that you have to apply archive-redo logs as\
    \ part of the recovery:\n```sql\nSQL> alter system switch logfile;\nSQL> /\nSQL>\
    \ /\nSQL> /\n```\n\nNext, simulate a media failure by renaming the datafile associated\
    \ with the USERS tablespace. You can identify the name of the datafile associated\
    \ with the USERS tablespace with this query:\n```sql\nSQL> select file_name from\
    \ dba_data_files where tablespace_name='USERS';\nFILE_NAME\n/ora02/dbfile/O11R2/users01.dbf\n\
    ```\n\nFrom the OS, rename the file:\n```bash\n$ mv /ora02/dbfile/O11R2/users01.dbf\
    \ /ora02/dbfile/O11R2/users01.dbf.old\n```\n\nAnd attempt to stop your database:\n\
    ```bash\n$ sqlplus / as sysdba\nSQL> shutdown immediate;\n```\n\nYou should see\
    \ an error similar to the following:\n`ORA-01110: data file 4: '/ora02/dbfile/O11R2/users01.dbf'`\n\
    `ORA-27041: unable to open file`\n\nIf this were a real disaster, it would be\
    \ prudent to navigate to the datafile directory, list the files, and see if the\
    \ file in question was in its correct location. You should also inspect the `alert.log`\
    \ file to see if any relevant information is logged there by Oracle.\n\nNow that\
    \ you’ve simulated a media failure, the next several steps walk you through a\
    \ restore and complete recovery.\n\n### Step 1: Place Your Database in Mount Mode\n\
    \nBefore you place your database in mount mode, you may need to first shut it\
    \ down using `ABORT`:\n```bash\n$ sqlplus / as sysdba\nSQL> shutdown abort;\n\
    SQL> startup mount;\n```\n\n### Step 2: Restore the Datafile from the Backup\n\
    \nThe next step is to copy from the backup the datafile that corresponds to the\
    \ one that has had a failure:\n```bash\n$ cp /oradump/hbackup/O11R2/users01.dbf\
    \ /ora02/dbfile/O11R2/users01.dbf\n```\n\nAt this point, it’s instructional to\
    \ ponder what Oracle would do if you attempted to start your database. When you\
    \ issue the `ALTER DATABASE OPEN` statement, Oracle inspects the SCN in the control\
    \ file for each datafile. You can inspect this SCN by querying `V$DATAFILE`:\n\
    ```sql\nSQL> select checkpoint_change# from v$datafile where file#=4;\nCHECKPOINT_CHANGE#\n\
    ```\n\nOracle compares the SCN in the control file with the SCN in the datafile\
    \ header. You can inspect the SCN in the datafile header by querying `V$DATAFILE_HEADER`.\
    \ For example:\n```sql\nSQL> select file#, checkpoint_change# from v$datafile_header\
    \ where file#=4;\nFILE# CHECKPOINT_CHANGE#\n---------- ------------------\n4 17779631\n\
    ```"
