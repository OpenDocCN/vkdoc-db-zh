  trans: '# 第 1 章：安装 Oracle 二进制文件


    您可以使用任何操作系统的复制工具来执行此步骤。Linux/Unix 的 `tar`、`scp` 和 `rsync` 工具是 DBA 用来复制文件的常用工具。本示例展示了如何使用
    Linux/Unix 的 `tar` 工具将一组现有的 Oracle 二进制文件复制到不同的服务器。首先，定位您想要复制的目标 Oracle 主目录二进制文件：


    ```

    $ echo $ORACLE_HOME

    /oracle/app/oracle/product/11.2.0/db_1

    ```


    在此示例中，`tar` 工具会复制 `db_1` 目录内及以下的所有文件和子目录：


    ```

    $ cd $ORACLE_HOME

    $ cd ..

    $ tar -cvf orahome.tar db_1

    ```


    现在，将 `orahome.tar` 文件复制到您想要安装 Oracle 软件的服务器。在此示例中，tar 文件被复制到另一台服务器上的 `/oracle/app/oracle/product/11.2.0.1`
    目录。tar 文件在那里被解压，并在解压过程中创建一个 `db_1` 目录：


    ```

    $ cd /oracle/app/oracle/product/11.2.0.1

    ```


    确保您有足够的磁盘空间来解压文件。一次典型的 Oracle 安装至少会占用 3-4 GB 的空间。使用 Linux/Unix 的 `df` 命令来验证您是否有足够的空间：


    ```

    $ df -h | sort

    ```


    接下来，解压文件：


    ```

    $ tar -xvf orahome.tar

    ```


    当 `tar` 命令完成后，在 `/oracle/app/oracle/product/11.2.0.1` 目录下应该会有一个 `db_1` 目录。


    ■ **提示** 使用 `tar -tvf <tarfile_name>` 命令可以预览将要恢复的目录和文件，而无需实际恢复它们。


    ![](img/index-48_1.png)


    ```

    $ cd $ORACLE_HOME/oui/bin

    ```


    现在，通过运行 `runInstaller` 工具来附加 Oracle 主目录，如下所示：


    ```

    $ ./runInstaller -silent -attachHome -invPtrLoc /etc/oraInst.loc \

    ORACLE_HOME="/oracle/app/oracle/product/11.2.0.1/db_1" ORACLE_HOME_NAME="ONEW"

    ```


    如果成功，您应该会看到类似这样的消息：


    ```

    The inventory pointer is located at /etc/oraInst.loc

    The inventory is located at /oracle/app/oracle/oraInventory

    ''AttachHome'' was successful.

    ```


    您也可以检查 `oraInventory/ContentsXML/inventory.xml` 文件的内容。以下是由于使用 `attachHome` 选项运行
    `runInstaller` 工具而插入到 `inventory.xml` 文件中的一行内容的片段：


    ```

    <HOME NAME="ONEW" LOC="/oracle/app/oracle/product/11.2.0.1/db_1" TYPE="O" IDX="3"/>

    ```


    ## 升级 Oracle 软件


    您也可以使用静默安装方法来升级 Oracle 软件的版本。例如，让我们看看如何从 Oracle Database 10 *g* 10.2.0.1 升级到版本
    10.2.0.4。


    ■ **注意** 升级 Oracle 软件与升级 Oracle 数据库不同。本节仅涉及使用静默安装方法升级 Oracle 软件。升级数据库涉及额外的步骤。有关如何将数据库从一个版本升级到另一个版本的文档，请参阅
    MOS 注释 730365.1。


    首先，从 MOS 网站 `http://support.oracle.com` 下载升级版本（您需要有效的支持合同才能执行此操作）。对于本示例的 Solaris
    系统，文件名为 `p6810189_10204_Solaris-64.zip`。将该文件复制到您要执行 Oracle 升级的数据库服务器。将其放置在诸如 `/orahome/orainst/10.2.0.4`
    的目录中。现在，解压该文件：


    ```

    $ unzip p6810189_10204_Solaris-64.zip

    ```


    `unzip` 命令应该只需要几分钟就能解包文件。完成后，找到与此升级关联的示例响应文件：


    ```

    $ find . -name "*.rsp"

    ```


    本示例的响应文件位置如下：


    ```

    ./Disk1/response/patchset.rsp

    ```


    切换到 `Disk1` 目录：


    ```

    $ cd Disk1

    ```


    接下来，将响应文件从 response 目录复制到当前工作目录：


    ```

    $ cp response/patchset.rsp inst.rsp

    ```


    使用操作系统编辑器工具（如 `vi`）打开响应文件：


    ```

