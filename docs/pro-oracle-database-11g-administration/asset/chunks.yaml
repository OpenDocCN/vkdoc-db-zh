- fmt: '# Logging RMAN Output


    When troubleshooting RMAN output or checking on the status of a backup job, it''s
    essential to have a record of what RMAN ran and the status of each command. There
    are several methods for logging RMAN output. Some of them are built-in aspects
    of the Linux/Unix operating system and others are RMAN-specific features:


    *   Linux/Unix redirect output to file

    *   Linux/Unix logging commands

    *   RMAN `LOG` command

    *   `V$RMAN_OUTPUT` view


    These logging features are discussed in the next sections.


    ## Redirecting Output to a File


    I run almost all RMAN backup jobs from shell scripts. The shell scripts are usually
    run automatically from a scheduling tool such as `cron`. When running RMAN commands
    in this fashion, I always capture the output by instructing the shell command
    to redirect standard output messaging and standard error messaging to a log file.
    This is done with the redirection `>` character. This example runs a shell script
    (`rmanback.bsh`) and redirects both standard output and standard error output
    to a log file named `rmanback.log`:


    ```

    $ rmanback.bsh 1>/home/oracle/bin/log/rmanback.log 2>&1

    ```


    Here, `1>` instructs standard output to be redirected to the specified file. The
    `2>&1` instructs the shell script to send standard error output to the same location
    as standard output.


    **Tip:** For full details on how DBAs use shell scripts and Linux features see
    `Linux Recipes for Oracle DBAs` (Apress, 2008).


    ## Capturing Output with Unix/Linux Logging Commands


    You can instruct Unix/Linux to create a log file to capture any output that is
    also being displayed on your screen. This can be done in one of two ways:


    *   `tee`

    *   `script`


    ### Capturing Output with `tee`


    When you start RMAN, you can send the output you see on your screen to an operating
    system text file using the `tee` command:


    ```

    $ rman | tee /tmp/rman.log

    ```


    Now you can connect to the target database and run commands. All of the output
    seen on your screen will be logged to the `/tmp/rman.log` file:


    ```

    RMAN> connect target /

    RMAN> backup database;

    RMAN> exit;

    ```


    The `tee` party session stops writing to the log file when you exit from RMAN.


    ### Capturing Output with the `script` Command


    The `script` command is useful because it instructs the operating system to log
    any output that appears on the terminal to a log file. To capture all output,
    run the `script` command before connecting to RMAN:


    ```

    $ script /tmp/rman.log

    Script started, file is /tmp/rman.log

    $ rman target /

    RMAN> backup database;

    RMAN> exit;

    ```


    To end a `script` session, type in `Ctrl+D` or type in `exit`. The `/tmp/rman.log`
    file will contain all output that was displayed on your screen. The `script` command
    is useful when you need to capture all output from one point in time to another
    point in time. For example, you may be running RMAN commands, exiting from RMAN,
    running SQL*Plus commands, and so on. The `script` session lasts from the point
    you start `script` to where you type in `Ctrl+D`.


    ## Logging Output to a File


    An easy way to capture RMAN output is to use the `SPOOL LOG` command to send the
    output to a file. This example spools a log file from within RMAN:


    ```

    RMAN> spool log to ''/tmp/rmanout.log''

    RMAN> set echo on;

    RMAN> <run RMAN commands>

    RMAN> spool log off;

    ```


    By default, the `SPOOL LOG` command will overwrite an existing file. If you want
    to append to the log file, use the keyword `APPEND`:


    ```

    RMAN> spool log to ''/tmp/rmanout.log'' append

    ```


    You can also direct output to a log file when starting RMAN on the command line,
    which will overwrite an existing file:


    ```

    $ rman target / log /tmp/rmanout.log

    ```


    You can also append to the log file as shown:


    ```

    $ rman target / log /tmp/rmanout.log append

    ```


    When you use `SPOOL LOG` as shown in the previous examples, the output goes to
    a file and not to your terminal. Therefore, I hardly ever use `SPOOL LOG` when
    running RMAN interactively. It''s mainly a tool for capturing output when running
    RMAN from scripts.


    ## Querying for Output in the Data Dictionary'
