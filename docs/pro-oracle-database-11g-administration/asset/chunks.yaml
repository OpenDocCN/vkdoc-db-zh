  trans: '

    当我使用恢复目录时，我倾向于使用一个专用的、仅用于恢复目录的数据库。这确保了恢复目录不受其他应用程序所需的任何维护或停机时间的影响（反之亦然）。


    接下来列出的是创建恢复目录的步骤：


    1.  在与你的目标数据库不同的服务器上创建一个数据库，用于恢复目录。确保数据库大小合适。我发现 Oracle 推荐的大小通常都太小了。以下是一些合适的建议：


    ## 第 17 章 ■ 配置 RMAN


    *   `SYSTEM` 表空间：500MB

    *   `SYSAUX` 表空间：500MB

    *   `TEMP` 表空间：500MB

    *   `UNDO` 表空间：500MB

    *   在线重做日志：每个 25MB，3 组，每组多路复用 2 个成员

    *   `RECCAT` 表空间：500MB


    2.  创建一个供恢复目录用户使用的表空间。我建议将表空间命名为类似 `RECCAT` 的名称，以便易于识别为包含恢复目录元数据的表空间：


    ```sql

    CREATE TABLESPACE reccat

    DATAFILE ''/ora01/dbfile/O11R2/reccat01.dbf''

    SIZE 500M

    EXTENT MANAGEMENT LOCAL

    UNIFORM SIZE 128k

    SEGMENT SPACE MANAGEMENT AUTO;

    ```


    3.  创建一个用户，该用户将拥有用于存储目标数据库元数据的表和其他对象。我建议你将恢复目录用户命名为类似 `RCAT` 的名称，以便易于识别其为恢复目录对象的拥有者。同时，将
    `RECOVERY_CATALOG_OWNER` 角色以及 `CREATE SESSION` 权限授予 `RCAT` 用户：


    ```sql

    CREATE USER rcat IDENTIFIED BY foo

    TEMPORARY TABLESPACE temp

    DEFAULT TABLESPACE reccat

    QUOTA UNLIMITED ON reccat;


    GRANT RECOVERY_CATALOG_OWNER TO rcat;

    GRANT CREATE SESSION TO rcat;

    ```


    4.  通过 `RMAN` 以 `RCAT` 身份连接，并创建恢复目录对象：


    ```

    $ rman catalog rcat/foo

    ```


    5.  现在，运行 `CREATE CATALOG` 命令：


    ```

    RMAN> create catalog;

    RMAN> exit;

    ```


    6.  此命令可能需要运行几分钟。完成后，你可以通过以下查询验证表是否已创建：


    ```

    $ sqlplus rcat/foo

    SQL> select table_name from user_tables;

    ```


    7.  以下是一些示例输出：


    ## 第 17 章 ■ 配置 RMAN


    TABLE\_NAME

    DB

    NODE

    CONF

    DBINC

    BRDSTN

    CKP

    TS


    ## 注册目标数据库


    现在，你可以将目标数据库注册到恢复目录。登录到目标数据库服务器。


    确保你可以建立到恢复目录数据库的 Oracle Net 连接。例如，一种方法是在 `TNS_ADMIN/tnsnames.ora` 文件中填入一个指向远程数据库的条目。在目标数据库服务器上，按如下方式注册恢复目录：


    ```

    $ rman target / catalog rcat/foo@rcat

    ```


    当你连接时，应该会看到连接到目标数据库和恢复目录的验证信息：


    connected to target database: `O11R2` (DBID=3457609395)

    connected to recovery catalog database


    接下来，运行 `REGISTER DATABASE` 命令：


    ```

    RMAN> register database;

    ```


    现在，你可以运行备份操作，并将有关备份任务的元数据同时写入控制文件和恢复目录。确保每次运行 `RMAN` 命令时都连接到恢复目录和目标数据库：


    ```

    $ rman target / catalog rcat/foo@rcat

    ```


    ## 备份恢复目录


    确保你包含备份和恢复恢复目录数据库的策略。为了获得最大程度的保护，请确保恢复目录数据库处于归档日志模式，并使用 `RMAN` 备份该数据库。


    你也可以使用像 Data Pump 这样的工具来获取数据库快照。使用 Data Pump 的缺点是，你可能会丢失在 Data Pump 导出之后创建的、恢复目录中的某些信息。


    请记住，如果你的恢复目录数据库服务器发生完全故障，你仍然可以使用 `RMAN` 备份你的目标数据库。你只是无法连接到恢复目录。因此，任何指示 `RMAN`
    连接到目标和恢复目录的脚本都必须修改。


    另外，如果你完全丢失了恢复目录并且没有备份，一个选择是从头重新创建它。一旦重新创建，你需要重新将目标数据库注册到恢复目录。


    你会丢失任何长期的历史恢复目录元数据。


    ## 第 17 章 ■ 配置 RMAN


    ## 同步恢复目录


    你可能遇到网络问题，导致恢复目录无法访问。在此期间，你连接到目标数据库并执行备份操作。一段时间后，网络问题解决，你又可以连接到恢复目录了。


    在这种情况下，你需要将恢复目录与目标数据库重新同步，以便恢复目录知晓那些未存储在恢复目录中的任何备份操作。运行以下命令以确保恢复目录拥有最新的备份信息：


    ```

    $ rman target / catalog rcat/foo@rcat

    RMAN> resync catalog;

    ```


    请记住，仅当由于某些原因你在未连接到目录的情况下执行备份操作时，才需要重新同步目录。在正常情况下，你无需运行 `RESYNC` 命令。


    ## 恢复目录版本


    我建议你为每个正在备份的目标数据库版本创建一个恢复目录。这样做可以为你节省一些因兼容性和升级问题带来的麻烦。我发现，当 `rman` 客户端的数据库版本与创建目录时使用的数据库版本相同时，使用恢复目录会更容易。


    是的，拥有多个版本的恢复目录可能会引起一些混淆。但是，如果你处于一个拥有多个不同版本 Oracle 数据库的环境中，那么多个恢复目录可能更方便。


    ## 删除恢复目录


    如果你确定不再使用恢复目录并且不再需要其中的数据，可以将其删除。为此，以目录所有者身份连接到目录数据库，并发出 `DROP CATALOG` 命令：


    ```

    $ rman catalog rcat/foo

    RMAN> drop catalog;

    ```


    系统会提示你：


    recovery catalog owner is `RCAT`

    enter `DROP CATALOG` command again to confirm catalog removal


    如果你再次输入 `DROP CATALOG` 命令，恢复目录中的所有对象都将从目录数据库中删除。


    另一种删除目录的方法是删除其所有者。为此，以具有 `DBA` 权限的用户身份连接到恢复目录，并发出 `DROP USER` 语句：


    ```

    $ sqlplus system/manager

    SQL> drop user rcat cascade;

    ```


    `SQL*Plus` 不会提示你两次。它会按照你的指示操作，删除该用户及其对象。


    再次强调，执行此操作的唯一原因是你确定不再需要恢复目录或其数据。删除用户或恢复目录时请谨慎：我建议你在删除恢复目录所有者之前，使用 Data Pump 导出其数据。


    ## 第 17 章 ■ 配置 RMAN


    ## 总结


    `RMAN` 是 Oracle 的旗舰级 B&R（备份与恢复）工具。如果你仍在使用较旧的用户管理备份技术，那么我强烈建议你切换到 `RMAN`。`RMAN`
    包含一组强大的功能，是任何其他可用备份工具所无法比拟的。它易于使用和配置。`RMAN` 将在你实施稳健的 B&R 策略时，为你节省时间和精力，并让你高枕无忧。


    如果你是 `RMAN` 的新手，可能并不清楚哪些功能应该始终启用和实施，同样，哪些方面你很少需要。本章包含一个供你遵循的检查清单，引导你完成每个架构决策点。你可能不同意我的某些结论，或者某些建议可能不符合你的业务需求——这没关系。关键在于，你应该仔细考虑每个组件以及如何实施那些有意义的功能。

    '
- fmt: 'The chapter ended with a real-world example of a script used to implement
    RMAN in a production environment. Now that you have a good idea of RMAN’s features
    and how to use them, you’re ready to start making backups. The next chapter deals
    with RMAN backup scenarios.


    ![](index-521_1.png)


    # CHAPTER 18 ■ RMAN BACKUPS AND REPORTING


    The bulleted items are discussed in the following sections.


    ## Setting NLS_DATE_FORMAT


    Before running any RMAN job, I set the operating system variable `NLS_DATE_FORMAT`
    to include a time (hours, minutes, and seconds) component. For example:


    `$ export NLS_DATE_FORMAT=''dd-mon-yyyy hh24:mi:ss''`


    Additionally, if I have a shell script that calls RMAN, I put the prior line directly
    in the shell script (see the shell script at the end of Chapter 17 for an example):


    `NLS_DATE_FORMAT=''dd-mon-yyyy hh24:mi:ss''`


    This ensures that when RMAN displays a date, it always includes the hours, minutes,
    and seconds as part of the output. By default, RMAN only includes the date component
    (`DD-MON-YYYY`) in the output.


    For example, when starting a backup, here is what RMAN displays:


    `Starting backup at 15-sep-2010`


    When you set the `NLS_DATE_FORMAT` OS variable to include a time component, the
    output will look like this instead:


    `Starting backup at 15-sep-2010 03:20:17`


    When troubleshooting, it''s essential to have a time component so that you can
    determine how long a command took to run, or how long a command was running before
    a failure occurred. Oracle Support will almost always ask you to set this variable
    to include the time component before capturing output and sending it to them.


    The only downside to setting the `NLS_DATE_FORMAT` is if you set it to a value
    unknown to RMAN, it can cause connectivity issues. For example, here the `NLS_DATE_FORMAT`
    is set to an invalid value:


    `$ export NLS_DATE_FORMAT=''dd-mon-yyyy hh24:mi:sd''`

    `$ rman target /`


    When set to an invalid value, you get this error when logging into RMAN: `RMAN-03999:
    Oracle error occurred while converting a date: ORA-01821:`


    To unset the `NLS_DATE_FORMAT` variable, set it to a blank value, like so:


    `$ export NLS_DATE_FORMAT=''''`


    ## Setting ECHO


    Another value that I always set in any RMAN scripts is the `ECHO` command, seen
    here:


    `RMAN> set echo on;`


    This instructs RMAN to display the command that it''s running in the output, so
    you can see what RMAN command is running along with any relevant error or output
    messages associated with the command. This is especially important when you''re
    running RMAN commands within scripts, because you''re not directly typing in a
    command (and may not know what command was issued within the shell script). For
    example, without `SET ECHO ON`, here''s what is displayed in the output for a
    command:


    `Starting backup at 15-sep-2010 03:49:55`

    `using target database control file instead of recovery catalog`


    With `SET ECHO ON`, this output shows the actual command that was run:


    `backup datafile 4;`

    `Starting backup at 15-sep-2010 03:49:55`

    `using target database control file instead of recovery catalog`


    From the prior output you can see which command is running, when it started, and
    so on.


    ## Showing Variables


    Another good practice is to run the `SHOW ALL` command within any script, like
    so:


    `RMAN> show all;`


    This displays all of the RMAN configurable variables. When troubleshooting, you
    may not be aware of something that another DBA has configured. This gives you
    a snapshot of the settings as they were when the RMAN session executed.


    ## Running Backups


    Before you run an RMAN backup, make sure you read Chapter 17 for details on how
    to configure RMAN with settings for a production environment. For production databases,
    I mainly run RMAN from a shell script similar to the script shown at the end of
    Chapter 17. Within the shell script, I configure every aspect of RMAN that I want
    to use for a particular database. If you run RMAN out-of-the-box with its default
    settings, you will be able to back up your database. However, these settings will
    not be adequate for most production database applications.


    ### Backing up the Entire Database


    If you''re not sure where RMAN will be backing up your database files, you need
    to read Chapter 17 because it describes how to configure RMAN to create the backup
    files in the location of your choice.


    Here is how I usually configure RMAN to write to specific locations on disk (note
    that the `CONFIGURE` command must be executed before you run the `BACKUP` command):


    `RMAN> configure channel 1 device type disk format ''/ora01/O11R2/rman/rman1_%U.bk'';`


    After a backup location is configured, I almost always use a command similar to
    the one shown next to back up the entire database:


    `RMAN> backup incremental level=0 database plus archivelog;`


    This command ensures that RMAN will back up all datafiles in the database, all
    archive redo logs generated prior to the backup, and all archive redo logs generated
    during the backup. This command also ensures that you have all of the datafiles
    and archive redo logs that would be required to restore and recover your database.


    If you have the autobackup of the control file feature enabled (see Chapter 17
    for details), the last task RMAN does as part of the backup is generate a backup
    set that contains a backup of the control file. This control file will contain
    all information regarding the backup that took place and any archive redo logs
    that were generated during the backup.


    > **Tip** Always enable the autobackup of the control file feature.


    There are many nuances to the `RMAN BACKUP` command. For production databases,
    I usually back up the database with the `BACKUP INCREMENTAL LEVEL=0 DATABASE PLUS
    ARCHIVELOG` command. That''s usually sufficient. However, you will encounter many
    situations where you need to run a backup that uses a specific RMAN feature or
    you might troubleshoot an issue where you need to be aware of the other ways to
    invoke an RMAN backup. These aspects are discussed in the next several sections
    of this chapter.


    ### Full Backup versus Incremental Level=0


    The term "RMAN full backup" sometimes causes confusion. A more apt way of phrasing
    what a full backup is doing would be "RMAN is backing up all modified blocks within
    one or more datafiles." The term "full" does not mean that all blocks are backed
    up or that all datafiles are backed up. It simply refers to the fact that all
    blocks that would be required to rebuild a datafile (in the event of a failure)
    are being backed up. You can take a full backup of a single datafile and the contents
    of that backup piece may be quite a bit smaller than the datafile itself.


    The term "RMAN level 0 incremental backup" doesn''t exactly describe itself very
    well, either. A level 0 incremental backup is backing up the exact same blocks
    as a full backup. In other words, the following two commands back up the exact
    same blocks in a database:


    `RMAN> backup as backupset full database;`

    `RMAN> backup as backupset incremental level=0 database;`


    The only difference between the prior two commands is that an incremental level
    0 backup can be used in conjunction with other incremental backups whereas a full
    backup can not participate in an incremental backup strategy.


    Therefore, I almost always prefer to use the `INCREMENTAL LEVEL=0` syntax (as
    opposed to a full backup). This is because it gives me the flexibility to use
    the level 0 incremental backup with different incremental level backups.


    ### Backup Sets versus Image Copies'
