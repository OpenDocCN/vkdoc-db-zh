    # CHAPTER 1 ■ INSTALLING THE ORACLE BINARIES


    ### Oracle Inventory Directory


    The Oracle inventory directory stores the inventory of Oracle software installed
    on the server. This directory is required and is shared among all installations
    of Oracle software on a server. When you first install Oracle, the installer checks
    to see whether there is an existing OFA-compliant directory structure in the format
    of `/u[01–09]/app`. If such a directory exists, then the installer creates an
    Oracle inventory directory such as `/u01/app/oraInventory`.

    If you have the `ORACLE_BASE` variable defined for the `oracle` operating system
    user, then the installer creates a directory as follows for the location of Oracle
    inventory: `ORACLE_BASE/../oraInventory`.

    For example, if `ORACLE_BASE` is defined to be `/ora01/app/oracle`, then the installer
    defines the location of Oracle inventory to be `/ora01/app/oraInventory`.

    If the installer doesn’t find a recognizable OFA-compliant directory structure
    or an `ORACLE_BASE` variable, then the location of Oracle inventory is created
    under the `HOME` directory of the `oracle` user. For example, if the `HOME` directory
    is `/home/oracle`, then the location of Oracle inventory is `/home/oracle/oraInventory`.'
