    implementation enables you to think through problems and solve them in ways that
    checklists don’t.


    #### Implementing a Hot-Backup Strategy


    As mentioned earlier in this chapter, RMAN should be your tool of choice for any
    type of Oracle database backup (either online or offline). RMAN is more efficient
    than user-managed backups and automates almost all of the tasks. Having said that,
    one of the best ways to gain an understanding of Oracle B&R internals is to make
    a hot backup and then use that backup to restore and recover your database.


    Manually issuing the commands involved in a hot backup, and then a restore and
    recovery, helps you understand the role of each type of file (control files, datafiles,
    archive-redo logs, and online-redo logs) in a restore-and-recovery scenario.


    This section begins by showing you how to implement a hot backup. It also provides
    basic scripts that you can use to automate the hot-backup process. Later sections
    explain some of the internal mechanics of a hot backup and clarify why you must
    put tablespaces in backup mode before the hot backup takes place.


    #### Making a Hot Backup


    Here are the steps required for a hot backup:


    1.  Ensure that the database is in archivelog mode.

    2.  Determine where to copy the backup files.

    3.  Determine which files need to be backed up.

    4.  Note the maximum sequence number of the online-redo logs.

    5.  Alter the database/tablespace into backup mode.

    6.  Copy the datafiles with an OS utility.

    7.  Alter the database/tablespace out of backup mode.

    8.  Archive the current online-redo log, and note the maximum sequence number
    of the online-redo logs.

    9.  Back up the control file.

    10. Back up any archive-redo logs generated during the backup.


    These steps are covered in detail in the following sections.


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    ##### Step 1: Ensure That the Database Is in Archivelog Mode


    Run the following command to check the archivelog-mode status of your database:


    ```sql

    SQL> archive log list;

    ```


    The output shows that this database is in archivelog mode:


    ```

    Database log mode Archive Mode

    Automatic archival Enabled

    Archive destination /ora02/oraarch/O11R2

    ```


    If you’re not sure how to enable archiving, see the earlier section in this chapter
    on Enabling Archivelog Mode that details how to implement archiving.


    ##### Step 2: Determine Where to Copy the Backup Files


    Now, determine the backup location. For this example, the backup location is the
    directory `/oradump/hbackup/O11R2`. To get a rough idea of how much space you
    need, you can run this query:


    ```sql

    SQL> select sum(bytes) from dba_data_files;

    ```


    Ideally, the backup location should be on a separate set of disks from your live
    datafiles. But in practice, many times you’re given a slice of space on a storage
    area network (SAN) and have no idea about the underlying disk layout. In these
    situations, you rely on redundancy being built into the SAN hardware (RAID disks,
    multiple controllers, and so on) to ensure high availability and recoverability.


    ##### Step 3: Determine Which Files Need to Be Backed Up


    For this step, you only need to know the locations of the datafiles:


    ```sql

    SQL> select name from v$datafile;

    ```


    When you get to step 5, you may want to consider altering tablespaces one at a
    time into backup mode. If you take that approach, you need to know which datafiles
    are associated with which tablespace:


    ```sql

    select

    tablespace_name

    ,file_name

    from dba_data_files

    order by 1,2;

    ```


    ##### Step 4: Note the Maximum Sequence Number of the Online-Redo Logs


    To recover successfully using a hot backup, you require at minimum all the archive-redo
    logs that were generated during the backup. For this reason, you need to note
    the archivelog sequence before starting the hot backup:


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    ```sql

    select

    thread#

    ,max(sequence#)

    from v$log

    group by thread#

    order by thread#;

    ```


    ##### Step 5: Alter the Database/Tablespaces into Backup Mode


    You can put all your tablespaces into backup mode at the same time using the `ALTER
    DATABASE BEGIN BACKUP` statement:


    ```sql

    SQL> alter database begin backup;

    ```


    If it’s an active OLTP database, doing this can greatly degrade performance. This
    is because when a tablespace is in backup mode, Oracle copies a full image of
    any block (when it’s first modified) to the redo stream. This is discussed in
    detail later in the chapter.


    The alternative is to alter only one tablespace at a time into backup mode. After
    the tablespace has been altered into backup mode, you can copy the associated
    datafiles (step 6) and then alter the tablespace out of backup mode (step 7).
    You have to do this for each tablespace:


    ```sql

    SQL> alter tablespace <tablespace_name> begin backup;

    ```


    ##### Step 6: Copy the Datafiles with an OS Utility


    Use an OS utility (Linux/Unix `cp` command) to copy the datafiles to the backup
    location. In this example, all the datafiles are in one directory, and they’re
    all copied to the same backup directory:


    ```bash

    $ cp /ora01/dbfile/O11R2/*.dbf /oradump/hbackup/O11R2

    ```


    ##### Step 7: Alter the Database/Tablespaces Out of Backup Mode


    After you’re finished copying all your datafiles to the backup directory, you
    need to alter the tablespaces out of backup mode. This example alters all tablespaces
    out of backup mode at the same time:


    ```sql

    SQL> alter database end backup;

    ```


    If you’re altering your tablespaces into backup mode one at a time, you need to
    alter each tablespace out of backup mode after its datafiles have been copied:


    ```sql

    SQL> alter tablespace <tablespace_name> end backup;

    ```


    If you don’t take the tablespaces out of backup mode, you can seriously degrade
    performance and compromise the ability to recover your database.


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    ##### Step 8: Archive the Current Online-Redo Log and Note the Maximum Sequence
    Number of the Online-Redo Logs


    The following statement instructs Oracle to archive any unarchived online-redo
    logs and also to initiate a log switch. This ensures that an end-of-backup marker
    is written to the archive-redo logs:


    ```sql

    SQL> alter system archive log current;

    ```


    Also note the maximum online-redo log sequence number. If a failure occurs immediately
    after the hot backup, you need any archive-redo logs generated during the hot
    backup to fully recover your database:


    ```sql

    select

    thread#

    ,max(sequence#)

    from v$log

    group by thread#

    order by thread#;

    ```


    ##### Step 9: Back Up the Control File


    For a hot backup, you can’t use an OS copy command to make a backup of control
    file. Oracle’s hot-backup procedure specifies that you must use the `ALTER DATABASE
    BACKUP CONTROLFILE` statement. This example makes a backup of the control file
    and places it in the same location as the database backup files:


    ```sql

    SQL> alter database backup controlfile

    to ''/oradump/hbackup/O11R2/controlbk.ctl'' reuse;

    ```


    The `REUSE` clause instructs Oracle to overwrite the file if it already exists
    in the backup location.


    ##### Step 10: Back Up Any Archive-Redo Logs Generated During the Backup


    Back up the archive-redo logs that were generated during the hot backup. You can
    back up the archive-redo logs with an OS copy command:


    ```bash

    $ cp <archive redo logs generated during backup> <backup directory>

    ```


    This guarantees that you have the logs in the event of a failure that occurs soon
    after the hot backup finishes. Be sure you don’t back up an archive-redo log that
    is currently being written to by the archiver process—doing so results in an incomplete
    copy of that file. Sometimes, DBAs script this process by checking the maximum
    `SEQUENCE#` with the maximum `RESETLOGS_ID` in the `V$ARCHIVED_LOG` view. Oracle
    updates that view when it’s finished copying the archive-redo log to disk. Therefore,
    any archive-redo log file that appears in the `V$ARCHIVED_LOG` view should be
    safe to copy.


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    #### Scripting Hot Backups


    The script in this section covers the minimal tasks associated with a hot backup.
    For a production environment, a hot backup script can be quite complex. The script
    listed here provides you with a baseline of what you should include in a hot-backup
    script.


    You need to modify these variables in the script for it to work in your environment:


    *   `hbdir`

    *   `dbname`


    The SQL*Plus variable `hbdir` points to the base directory for the hot backups.
    The script also needs the `dbname` to be set to the Oracle system identifier (SID)
    of your database. The script copies files to a directory that is the concatenated
    string of the `hbdir` and `dbname` variables. For example, if you set `hbdir`
    to `/oradump/hbackup` and set `dbname` to `O11R2`, the backup files are copied
    to the `/oradump/hbackup/O11R2` directory:


