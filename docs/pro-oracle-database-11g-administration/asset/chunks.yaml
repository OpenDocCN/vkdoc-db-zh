  trans: '# 记录 RMAN 输出


    在排查 RMAN 输出问题或检查备份作业状态时，记录 RMAN 的执行内容和每条命令的状态至关重要。有多种方法可以记录 RMAN 输出：其中一些是 Linux/Unix
    操作系统的内置功能，另一些则是 RMAN 特有的功能：


    *   Linux/Unix 重定向输出到文件

    *   Linux/Unix 日志记录命令

    *   RMAN `LOG` 命令

    *   `V$RMAN_OUTPUT` 视图


    这些日志功能将在后续章节中讨论。


    ## 将输出重定向到文件


    我几乎所有的 RMAN 备份作业都从 Shell 脚本运行。这些 Shell 脚本通常由`cron`等调度工具自动执行。当以此方式运行 RMAN 命令时，我总是通过让
    Shell 命令将标准输出消息和标准错误消息重定向到日志文件来捕获输出。这是通过重定向字符`>`完成的。此示例运行一个 Shell 脚本（`rmanback.bsh`），并将标准输出和标准错误输出都重定向到一个名为`rmanback.log`的日志文件：


    ```

    $ rmanback.bsh 1>/home/oracle/bin/log/rmanback.log 2>&1

    ```


    此处，`1>`指示标准输出被重定向到指定文件。`2>&1`指示 Shell 脚本将标准错误输出发送到与标准输出相同的位置。


    **提示：** 有关 DBA 如何使用 Shell 脚本和 Linux 功能的完整细节，请参阅《Linux Recipes for Oracle DBAs》（Apress,
    2008）。


    ## 使用 Unix/Linux 日志命令捕获输出


    你可以指示 Unix/Linux 创建一个日志文件，以捕获同时显示在屏幕上的任何输出。这可以通过以下两种方式之一完成：


    *   `tee`

    *   `script`


    ### 使用`tee`捕获输出


    当你启动 RMAN 时，可以使用`tee`命令将屏幕上看到的输出发送到操作系统文本文件：


    ```

    $ rman | tee /tmp/rman.log

    ```


    现在你可以连接到目标数据库并运行命令。屏幕上看到的所有输出都将被记录到`/tmp/rman.log`文件中：


    ```

    RMAN> connect target /

    RMAN> backup database;

    RMAN> exit;

    ```


    当你退出 RMAN 时，`tee`会话停止写入日志文件。


    ### 使用`script`命令捕获输出


    `script`命令非常有用，因为它指示操作系统将终端上出现的任何输出记录到日志文件中。要捕获所有输出，请在连接到 RMAN 之前运行`script`命令：


    ```

    $ script /tmp/rman.log

    Script started, file is /tmp/rman.log

    $ rman target /

    RMAN> backup database;

    RMAN> exit;

    ```


    要结束`script`会话，输入`Ctrl+D`或输入`exit`。`/tmp/rman.log`文件将包含显示在屏幕上的所有输出。当你需要捕获从一个时间点到另一个时间点的所有输出时，`script`命令很有用。例如，你可能正在运行
    RMAN 命令、退出 RMAN、运行 SQL*Plus 命令等等。`script`会话从你启动`script`开始，直到你输入`Ctrl+D`结束。


    ## 将输出记录到文件


    捕获 RMAN 输出的一种简单方法是使用`SPOOL LOG`命令将输出发送到文件。此示例在 RMAN 内部假脱机一个日志文件：


    ```

    RMAN> spool log to ''/tmp/rmanout.log''

    RMAN> set echo on;

    RMAN> <run RMAN commands>

    RMAN> spool log off;

    ```


    默认情况下，`SPOOL LOG`命令会覆盖现有文件。如果要追加到日志文件，请使用关键字`APPEND`：


    ```

    RMAN> spool log to ''/tmp/rmanout.log'' append

    ```


    你也可以在命令行启动 RMAN 时将输出定向到日志文件，这会覆盖现有文件：


    ```

    $ rman target / log /tmp/rmanout.log

    ```


    你也可以追加到日志文件，如下所示：


    ```

    $ rman target / log /tmp/rmanout.log append

    ```


    当你按前面示例所示使用`SPOOL LOG`时，输出会进入文件而不是你的终端。因此，我在交互式运行 R 曼时很少使用`SPOOL LOG`。它主要是一个在从脚本运行
    RMAN 时捕获输出的工具。


    ## 在数据字典中查询输出'
- fmt: '# RMAN Backups and Reporting


    ## Viewing Recent RMAN Output


    If you don''t capture any RMAN output, you can still view the most recent RMAN
    output by querying the data dictionary. The `V$RMAN_OUTPUT` view contains messages
    recently reported by RMAN:


    ```

    select

    sid

    ,recid

    ,output

    from v$rman_output

    order by recid;

    ```


    Here is some sample output:


    ```

    173 1108 Starting backup at 13-SEP-10

    173 1109 using channel ORA_DISK_1

    173 1110 using channel ORA_DISK_2

    ```


    The `V$RMAN_OUTPUT` view is an in-memory object that holds up to 32,768 rows.
    Information in this view is cleared out when you stop and restart your database.
    This view is handy when you''re using the RMAN `SPOOL LOG` command to spool output
    to a file and cannot view what is happening on your terminal.


    ## RMAN Reporting


    There are several different methods for reporting on the RMAN environment:

    - `LIST` command

    - `REPORT` command

    - Query metadata via data dictionary views


    When first learning RMAN, the difference between the `LIST` and `REPORT` commands
    may seem confusing because the distinction between the two commands is not clear
    cut. In general, I use the `LIST` command to view information about existing backups,
    whereas the `REPORT` command is used to determine what files need to be backed
    or to display information on obsolete or expired backups.


    I use SQL queries for specialized reports (not available via the `LIST` or `REPORT`)
    or for automating reports. For example, I''ll generally implement an automated
    check via a shell script and SQL that reports whether the RMAN backups have run
    within the last day.


    ### Using `LIST`


    When investigating issues with RMAN backups, one of the first tasks I usually
    do is connect to the target database and run the `LIST BACKUP` command. This command
    shows backup sets, backup pieces, and the files included in the backup:


    ```

    RMAN> list backup;

    ```


    It shows all RMAN backups recorded in the repository. You may want to spool that
    to an output file so that you can save the output and then use an operating system
    editor to search through and look for specific strings in the output.


    To get a summarized view of backup information, use the `LIST BACKUP SUMARY` command:


    ```

    RMAN> list backup summary;

    ```


    You can also use the `LIST` command to report just image copy information:


    ```

    RMAN> list copy;

    ```


    The next command reports on archive redo log backups:


    ```

    RMAN> list archivelog all;

    ```


    There are a great number of ways in which you can run the `LIST` command (and
    likewise the `REPORT` command, covered in the next section). The prior methods
    listed are the ones you''ll run most of the time. For a complete list of options
    available see the Oracle Database *Backup and Recovery Reference* guide (available
    on Oracle''s OTN website).


    ### Using `REPORT`


    The RMAN `REPORT` command is useful for reporting on a variety of details. You
    can quickly view all of the datafiles associated with a database via the following:


    ```

    RMAN> report schema;

    ```


    The `REPORT` command provides detailed information about backups marked as obsolete
    via the RMAN retention policy. For example:


    ```

    RMAN> report obsolete;

    ```


    You can report on datafiles that need to be backed up as defined by the retention
    policy like so:


    ```

    RMAN> report need backup;

    ```


    There are several ways to report on datafiles that need to be backed up. Here
    are some other varieties:


    ```

    RMAN> report need backup redundancy 2;

    RMAN> report need backup redundancy 2 datafile 2;

    ```


    Another way to use the `REPORT` command is for datafiles that have never been
    backed up or may contain data created from a `NOLOGGING` operation. For example,
    say you have direct path loaded data into a table, and the datafile in which the
    table resides has not been backed up. The following command will detect these
    situations:


    ```

    RMAN> report unrecoverable;

    ```


    ### Using SQL


    There are a number of data dictionary views available for querying about backup
    information. `Table 18–1` describes RMAN-related data dictionary views. These
    views are available regardless of your use of a recovery catalog (the information
    in these views is derived from the control file).'
