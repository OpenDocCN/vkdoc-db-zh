    Used with hash clusters.\n\nFunction\n\nGood for columns that have SQL functions\
    \ applied\n\nto them.\n\nGlobal partitioned\n\nGlobal index across all partitions\
    \ in a partitioned\n\ntable.\n\nLocal partitioned\n\nLocal index based on individual\
    \ partitions in a\n\npartitioned table.\n\nReverse key\n\nUseful to balance I/O\
    \ in an index that has many\n\nsequential inserts.\n\nKey compressed\n\nUseful\
    \ for concatenated indexes where the leading\n\ncolumn is often repeated. Compresses\
    \ leaf block\n\nentries.\n\nBitmap\n\nUseful in data-warehouse environments with\
    \ low-\n\ncardinality columns. These indexes aren’t\n\nappropriate for online\
    \ transaction processing\n\n(OLTP) databases where rows are heavily updated.\n\
    \nBitmap join\n\nUseful in data-warehouse environments for\n\nqueries that join\
    \ fact and dimension tables.\n\nDomain\n\nSpecific for an application or cartridge.\n\
    \nThis chapter focuses on the most commonly used indexes and features: B-tree,\
    \ bitmap, reverse-key, and function-based indexes, and useful options. Partitioned\
    \ indexes are covered in Chapter 12\\. If you need more information about index\
    \ types or features not covered in this chapter or book, see Oracle’s SQL Reference\
    \ guide at http://otn.oracle.com.\n\nIndex-Management Guidelines\n\nMisusing indexes\
    \ can have serious negative performance effects. Indexes created of the wrong\
    \ type or on the wrong columns do nothing but consume space and processing resources.\
    \ As a DBA, you must have a strategy to ensure that indexes enhance performance\
    \ and don’t negatively impact applications.\n\nCHAPTER 8 ■ INDEXES\n\nTable 8–2\
