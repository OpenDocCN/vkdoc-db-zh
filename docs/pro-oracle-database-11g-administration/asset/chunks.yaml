    #### Disabling Archivelog Mode


    Usually, you don’t disable archivelog mode for a production database. However,
    you may be doing a big data load and want to reduce any overhead associated with
    the archiving process, so you want to turn off archivelog mode before the load
    begins and then re-enable it after the load. If you do this, be sure you make
    a backup as soon as possible after you re-enable archiving.


    To disable archiving, do the following as `SYS` (or a user with the `SYSDBA` privilege):


    ```bash

    $ sqlplus / as sysdba

    SQL> shutdown immediate;

    SQL> startup mount;

    SQL> alter database noarchivelog;

    SQL> alter database open;

    ```


    You can confirm archivelog mode with the following:


    ```sql

    SQL> archive log list;

    ```


    You can also confirm the log mode as follows:


    ```sql

    SQL> select log_mode from v$database;

    LOG_MODE

    NOARCHIVELOG

    ```


    #### Reacting to a Lack of Disk Space in Your Archive Log Destination


    The archiver background process writes archive-redo logs to a location that you
    specify. If for any reason the archiver process can’t write to the archive location,
    your database hangs. Any users attempting to connect receive this error:


    ```

    ORA-00257: archiver error. Connect internal only, until freed.

    ```


    As a production-support DBA, you never want to let your database get into that
    state. Sometimes unpredictable events happen, and you have to deal with issues
    that weren’t ever supposed to happen.


    ■ **Note** DBAs who support production databases have a completely different mindset
    that architect DBAs who get new ideas from flashy presentations or regurgitated
    documentation.


    In this situation, your database is as good as down and completely unavailable.
    To fix the issue, you have to do something quickly:


    *   Move files to a different location.

    *   Compress old files in the archive-redo log location.

    *   Permanently remove old files.

    *   Switch the archive-redo log destination to a different location.


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    Moving files is usually the quickest and safest way to resolve the archiver error.
    You can use an OS utility such as `mv` to move old archive-redo logs to a different
    location. If they’re needed for a subsequent restore and recovery, you can let
    the recovery process know about the new location. Be careful not to move an archive-redo
    log that is currently being written to. If an archived redo log file appears in
    `V$ARCHIVED_LOG`, that means it has been completely archived.


    You can use an OS utility such as `gzip` to compress archive-redo log files in
    the current archive destination. If you do this, you have to remember to uncompress
    any files that may be later needed for a restore and recovery. Be careful not
    to compress an archive-redo log that is currently being written to.


    Another option is to use an OS utility such as `rm` to permanently remove archive-redo
    logs from disk. This approach is dangerous because you may need those archive-redo
    logs for a subsequent recovery. If you do remove archive-redo log files, and you
    don’t have a backup of them, you should make a full backup of your database as
    soon as possible.


    If another location on your server has plenty of space, you can consider changing
    the location to which the archive-redo logs are being written. For example:


    ```sql

    SQL> alter system set log_archive_dest_1=''location=/oraarch02'';

    ```


    After you’ve resolve the issue with the primary location, you can switch back
    the original location. You can perform this operation while the database is up
    and running.


    When the archive-redo log-file destination is full, you have to scramble to resolve
    it. This is why a good deal of thought should precede enabling archiving for production
    24x7 databases.


    For most databases, writing the archive-redo logs to one location is sufficient.
    However, if you have any type of disaster-recovery or high-availability requirement,
    then you should write to multiple locations. Sometimes DBAs set up a job to back
    up the archive-redo logs every hour and copy them to an alternate location or
    even an alternate server.


    #### Backing Up Archive-Redo Log Files


    Depending on your business requirements, you may need a strategy for backing up
    archive-redo log files. Minimally, you should back up any archive-redo logs generated
    during a backup of a database in archivelog mode. Additional strategies may include


    *   Periodically copying archive-redo logs to an alternate location and then removing
    them from the primary destination

    *   Copying the archive-redo logs to tape and then deleting them from disk

    *   Using two archive-redo log locations

    *   Using Data Guard for a robust disaster-recovery solution


    Keep in mind that you need all archive-redo logs generated since the begin time
    of the last good backup to ensure that you can completely recover your database.
    Only after you’re sure you have a good backup of your database should you consider
    removing archive-redo logs that were generated prior to the backup.


    #### Making a Cold Backup of an Archivelog-Mode Database


    You can use a backup of a database in archivelog mode to restore and recover up
    to the last committed transaction prior to a failure. Therefore, unlike a backup
    of a noarchivelog-mode database, this type of backup is never intended to be used
    to reset the database back to a point in time in the past from which no recovery
    can be applied. The purpose of a backup of an archivelog-mode database is to restore
    the database and roll forward and apply transactions to fully recover the database.


