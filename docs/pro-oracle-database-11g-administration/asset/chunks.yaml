    \ you typically need to use only a fraction of the table options available.\n\n\
    CHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nCreating a Table\n\nListed next are the\
    \ general factors you should consider when creating a table:\n\n• Type of table\
    \ (heap-organized, temporary, index-organized, partitioned, and so on)\n\n• Naming\
    \ conventions\n\n• Column data types and sizes\n\n• Constraints (primary key,\
    \ foreign keys, and so on)\n\n• Index requirements (see Chapter 8 for details)\n\
    \n• Initial storage requirements\n\n• Special features such as virtual columns,\
    \ read-only, parallel, compression, no logging, and so on\n\n• Growth requirements\n\
    \n• Tablespace(s) for the table and its indexes\n\nBefore you run a CREATE TABLE\
    \ statement, you need to give some thought to each item in the previous list.\
    \ To that end, DBAs often use data-modeling tools to help manage the creation\
    \ of DDL\n\nscripts that are used to create database objects. Data-modeling tools\
    \ allow you to visually define tables and relationships and the underlying database\
    \ features.\n\nCreating a Heap-Organized Table\n\nYou use the CREATE TABLE statement\
    \ to create tables. When creating a table, at minimum you must specify the table\
    \ name, column name(s), and data types associated with the columns. The Oracle\
    \ default table type is heap-organized. The term *heap* means that the data isn’t\
    \ stored in a specific order in the table (instead, it’s a heap of data). Here’s\
    \ a simple example of creating a heap-organized table with four columns:\n\ncreate\
    \ table d_sources(\n\nd_source_id number not null,\n\nsource_type varchar2(32),\n\
    \ncreate_dtt date default sysdate not null,\n\nupdate_dtt timestamp(5)\n\n);\n\
    \nIf you don’t specify a tablespace, then the table is created in the default\
    \ permanent tablespace of the user that creates the table. Allowing the table\
    \ to be created in the default permanent tablespace is fine for a few small test\
    \ tables. For anything more sophisticated, you should explicitly specify the tablespace\
    \ in which you want tables created.\n\nUsually, when you create a table, you should\
    \ also specify constraints, such as the primary key. The following code shows\
    \ the most common features you use when creating a table. This DDL defines primary\
    \ keys, foreign keys, tablespace information, and comments:\n\nCHAPTER 7 ■ TABLES\
    \ AND CONSTRAINTS\n\ncreate table operating_systems(\n\noperating_system_id number(19,\
    \ 0) not null,\n\nversion varchar2(50),\n\nos_name varchar2(256),\n\nrelease varchar2(50),\n\
    \nvendor varchar2(50),\n\ncreate_dtt date default sysdate not null,\n\nupdate_dtt\
    \ date,\n\nconstraint operating_systems_pk primary key (operating_system_id)\n\
    \nusing index tablespace inv_mgmt_index\n\n)\n\ntablespace inv_mgmt_data\n\n;\n\
    \n--\n\ncreate unique index operating_system_uk1 on operating_systems\n\n(os_name,\
    \ version, release, vendor)\n\ntablespace inv_mgmt_index\n\n;\n\n--\n\ncreate\
    \ table computer_systems(\n\ncomputer_system_id number(38, 0) not null,\n\nagent_uuid\
    \ varchar2(256),\n\noperating_system_id number(19, 0) not null,\n\nhardware_model\
    \ varchar2(50),\n\ncreate_dtt date default sysdate not null,\n\nupdate_dtt date,\n\
    \nconstraint computer_systems_pk primary key (computer_system_id)\n\nusing index\
    \ tablespace inv_mgmt_index\n\n) tablespace inv_mgmt_data;\n\n--\n\ncomment on\
    \ column computer_systems.computer_system_id is\n\n'Surrogate key generated via\
    \ an Oracle sequence.';\n\n--\n\ncreate unique index computer_system_uk1 on computer_systems(agent_uuid)\
    \ tablespace inv_mgmt_index;\n\n--\n\nalter table computer_systems add constraint\
    \ computer_systems_fk1\n\nforeign key (operating_system_id)\n\nreferences operating_systems(operating_system_id);\n\
    \nWhen creating a table, I usually don’t specify table-level physical space properties.\
    \ If you don’t specify table-level space properties, then the table inherits its\
    \ space properties from the tablespace in which it’s created. This simplifies\
    \ administration and maintenance. If you have tables that require different physical\
    \ space properties, then you can create separate tablespaces to hold tables with\
    \ differing needs. For example, you might create a DATA_LARGE tablespace with\
    \ extent sizes of 16MB and a DATA_SMALL tablespace with extents sizes of 128KB,\
    \ and choose where a table is created based on its storage requirements. See Chapter\
    \ 4 for details regarding the creation of tablespaces.\n\nTable 7–2 lists some\
    \ guidelines to consider when creating tables. These aren’t hard and fast rules;\
    \ adapt them as needed for your environment. Some of these guidelines may seem\
    \ like obvious suggestions. However, after inheriting many databases over the\
    \ years, I’ve seen each of these recommendations violated in some way that makes\
    \ database maintenance difficult and unwieldy.\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\
    \n***Table 7–2.** Guidelines to Consider When Creating Tables*\n\n**Recommendation\
