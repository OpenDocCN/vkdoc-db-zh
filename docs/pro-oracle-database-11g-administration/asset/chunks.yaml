    \ 3，这是基于命令行的，但仍然具有网络服务。\n\n大多数具有安全意识的 SA 在运行级别 3 上运行他们的服务器。随着 VNC 的广泛接受，SA 通常看不到在运行级别\
    \ 5 上运行的好处。如果 SA 想要利用图形实用程序，他们会直接使用 VNC（或类似的工具）。顺便说一下，不要尝试将 `initdefault` 设置为\
    \ 0 或 6，因为你的 Linux 服务器将永远不会启动。\n\n要确定当前运行级别，你可以运行 `who -r` 或 `runlevel`，如下所示：\n\
    ```bash\n# runlevel\nN 5\n# who -r\nrun-level 5 Jun 17 00:29 last=S\n```\n\n给定的运行级别管理着\
    \ Linux 在启动时将运行哪些脚本。这些脚本位于目录 `/etc/rc.d/rc<N>.d` 中，其中 `<N>` 对应于运行级别。对于运行级别 5，脚本位于\
    \ `/etc/rc.d/rc5.d` 目录中。例如，当 Linux 在运行级别 5 启动时，它将运行的脚本之一是 `/etc/rc.d/rc5.d/S55sshd`，这实际上是指向\
    \ `/etc/rc.d/init.d/sshd` 的软链接。\n\n## 检查归档重做目标位置是否已满\n\n有时，数据库管理员和系统管理员没有充分规划并实施用于在磁盘上存储归档重做日志文件的位置。在这些情况下，如果有一个脚本可以在主位置检查空间并在归档重做目标位置变满之前发出警告，通常会很方便。此外，你可能希望在脚本中实现自动将归档重做日志位置切换到具有足够磁盘空间的备用位置的功能。\n\
    \n我只在那些归档重做日志目标位置会以不可预测的频率填满的混乱环境中使用过类似的脚本。如果归档重做日志目标位置填满，数据库将挂起。在某些环境中，这是非常不可接受的。你可能会争辩说，数据库管理员应该做好规划，永远不要让自己陷入这种情况。然而，如果你被请来维护一个不可预测的环境，而且你是那个在凌晨\
    \ 2:00 接到电话的人，你可能需要考虑实现一个如本节所列的脚本。\n\n在使用清单 21-4 中的脚本之前，请更改脚本内的变量以匹配你的环境。例如，`SWITCH_DIR`\
    \ 应该指向磁盘上的一个备用位置，以便在主要目标位置变满时可以安全地切换归档重做日志目标。当空间使用量低于 `THRESH_GET_WORRIED` 变量指定的数量时，脚本将发送警告电子邮件。如果归档重做日志空间低于\
    \ `THRESH_SPACE_CRIT` 变量中包含的值，则目标位置将自动切换到 `SWITCH_DIR` 变量中包含的目录。\n\n## 第 21 章\
    \ ■ 自动化作业\n\n**清单 21–4.** 归档重做目标位置空间调查脚本\n```bash\n#!/bin/bash\n\nPRG=`basename\
    \ $0`\nDB=$1\nUSAGE=\"Usage: ${PRG} <sid>\"\n\nif [ -z \"$DB\" ]; then\n    echo\
    \ \"${USAGE}\"\n    exit 1\nfi\n\n# source OS variables\n. /var/opt/oracle/oraset\
    \ ${DB}\n\n# Set an alternative location, make sure it exists and has space.\n\
    SWITCH_DIR=/oradump01/${DB}/archivelog\n\n# Set thresholds for getting concerned\
    \ and switching.\nTHRESH_GET_WORRIED=2000000 # 2Gig from df -k\nTHRESH_SPACE_CRIT=1000000\
    \ # 1Gig from df -k\n\nMAILX=\"/bin/mailx\"\nMAIL_LIST=\"dkuhn@sun.com \"\nBOX=`uname\
    \ -a | awk '{print$2}'`\n\n#\nloc=`sqlplus -s <<EOF\nCONNECT / AS sysdba\nSET\
    \ HEAD OFF FEEDBACK OFF\nSELECT SUBSTR(destination,1,INSTR(destination,'/',1,2)-1)\n\
    FROM v\\$archive_dest WHERE dest_name='LOG_ARCHIVE_DEST_1';\nEOF`\n\n#\nfree_space=`df\
    \ -k | grep ${loc} | awk '{print $4}'`\necho box = ${BOX}, sid = ${DB}, Arch Log\
    \ Mnt Pnt = ${loc}\necho \"free_space = ${free_space} K\"\necho \"THRESH_GET_WORRIED=\
    \ ${THRESH_GET_WORRIED} K\"\necho \"THRESH_SPACE_CRIT = ${THRESH_SPACE_CRIT} K\"\
    \n\n#\nif [ $free_space -le $THRESH_GET_WORRIED ]; then\n    $MAILX -s \"Arch\
    \ Redo Space Low ${DB} on $BOX\" $MAIL_LIST <<EOF\nArchive log dest space low,\
    \ box: $BOX, sid: ${DB}, free space: $free_space\nEOF\nfi\n\n#\nif [ $free_space\
    \ -le $THRESH_SPACE_CRIT ]; then\n    sqlplus -s << EOF\nCONNECT / AS sysdba\n\
    ALTER SYSTEM SET log_archive_dest_1='location=${SWITCH_DIR}';\nALTER SYSTEM SWITCH\
    \ LOGFILE;\nEOF\n    $MAILX -s \"Archive Switch ${DB} on $BOX\" $MAIL_LIST <<EOF\n\
    Archive log dest, box: $BOX, sid: ${DB} has switched.\nThen ALTER SYSTEM SET LOG_ARCHIVE_DEST_1='location=<Normal\
    \ Location>';\nEOF\nelse\n    echo no need to switch, ${free_space} KB free on\
    \ ${loc}\nfi\n\n#\nexit 0\n```\n\n前面的脚本假设你已经将 `LOG_ARCHIVE_DEST_1` 初始化参数设置为你归档重做位置。如果你使用闪回恢复区\
    \ (FRA) 作为归档重做日志文件的位置，你可以从 `V$ARCHIVED_LOG` 视图中推导出归档位置，例如：\n```sql\nselect\nsubstr(name,1,instr(name,'/',1,2)-1)\n\
    from v$archived_log\nwhere first_time =\n    (select max(first_time) from v$archived_log);\n\
    ```\n\n通常我会每小时运行一个脚本来检查一次归档重做日志目标位置。以下是一个典型的 `cron` 条目：\n```\n#---------------------------------------------------\n\
    ```\n"
- fmt: "# Archive directory check for fullness.\n\n```\n38 * * * * /u01/oracle/bin/arch_check.bsh\
    \ DWREP\n1>/u01/oracle/bin/log/arch_check.log 2>&1\n```\n> (Note that the code\
    \ should be on one line. It's placed on two lines in this book so that it fits\
    \ on the page.)\n\n# Truncating Large Log Files\n\nSometimes log files can grow\
    \ to very large sizes and cause issues by filling up critical mount points. The\
    \ `listener.log` will record information about incoming connections to the database.\
    \ For active systems, this file can quickly grow to several gigabytes. For most\
    \ of my environments, the information in the `listener.log` file does not need\
    \ to be retained for any reason. If there are Oracle Net connectivity issues,\
    \ then the file can be inspected to help troubleshoot issues.\n\nThe `listener.log`\
    \ file is actively written to, so you shouldn't just delete it. If you remove\
    \ the file, the listener process won't recreate the file and start writing to\
    \ it again. You have to stop and restart the listener to reinstate its writing\
    \ to the `listener.log` file. You can, however, null out the `listener.log` file\
    \ or truncate it. In Linux/Unix environments this is done via the following technique:\n\
    ```\n$ cat /dev/null >listener.log\n```\n\nThe previous command replaces the contents\
    \ of the `listener.log` file with the contents of `/dev/null` (a default file\
    \ on Linux/Unix systems that contains nothing). The result of the prior line of\
    \ code is that the `listener.log` file is truncated and the listener can continue\
    \ to actively write to it.\n\n**Listing 21–5.** Script to Truncate the Default\
    \ `listener.log`\n```\n#!/bin/bash\n#\nif [ $# -ne 1 ]; then\n    echo \"Usage:\
    \ $0 SID\"\n    exit 1\nfi\n# See chapter 2 for details on setting OS variables\n\
    # Source oracle OS variables with oraset script\n. /var/opt/oracle/oraset $1\n\
    #\nMAILX='/bin/mailx'\nMAIL_LIST='dkuhn@sun.com'\n#\nif [ -f $TNS_ADMIN/../log/listener.log\
    \ ]; then\n    cat /dev/null > $TNS_ADMIN/../log/listener.log\nfi\nif [ $? -ne\
    \ 0 ]; then\n    echo \"trunc list. problem\" | $MAILX -s \"trunc list. problem\
    \ $1\" $MAIL_LIST\nelse\n    echo \"no problem...\"\nfi\n# A named listener log\
    \ file\nif [ -f $TNS_ADMIN/../log/appinvprd.log ]; then\n    cat /dev/null > $TNS_ADMIN/../log/appinvprd.log\n\
    fi\nif [ $? -ne 0 ]; then\n    echo \"trunc list. problem\" | $MAILX -s \"trunc\
    \ list. problem $1\" $MAIL_LIST\nelse\n    echo \"no problem...\"\nfi\n#\nexit\
    \ 0\n```\n\nThe following `cron` entry runs the prior script on a monthly basis:\n\
    ```\n# Trunc log files once a month.\n30 6 1 * * /orahome/oracle/bin/trunc_log.bsh\
    \ DWREP\n1>/orahome/oracle/bin/log/trunc_log.log 2>&1\n```\n> (Note that this\
    \ `cron` table entry is broken into two lines to fit on the page. In the `cron`\
    \ table, it needs to be all on one line.)\n\n# Checking for Locked Production\
    \ Accounts\n\nUsually I have a database profile in place that specifies that a\
    \ database account become locked after a specified number of failed login attempts.\
    \ For example, I'll set the `DEFAULT` profile `FAILED_LOGIN_ATTEMPTS` to `5`.\
    \ What sometimes happens is that a rogue user or developer will attempt to guess\
    \ the production account password, and after 5 attempts, this locks the production\
    \ account. When this happens, I need to know about it as soon as possible so that\
    \ I can investigate the issue and then unlock the account.\n\n**Listing 21–6.**\
    \ A shell script to check the `LOCK_DATE` value in `DBA_USERS`\n```\n#!/bin/bash\n\
    if [ $# -ne 1 ]; then\n    echo \"Usage: $0 SID\"\n    exit 1\nfi\n# source oracle\
    \ OS variables\n. /var/opt/oracle/oraset $1\n#\ncrit_var=$(sqlplus -s <<EOF\n\
    / as sysdba\nSET HEAD OFF FEED OFF\nSELECT count(*)\nFROM dba_users\nWHERE lock_date\
    \ IS NOT NULL\nAND username in ('CIAP','REPV','CIAL','STARPROD');\nEOF)\n#\nif\
    \ [ $crit_var -ne 0 ]; then\n    echo $crit_var\n    echo \"locked acct. issue\
    \ with $1\" | mailx -s \"locked acct. issue\" dkuhn@sun.com\nelse\n    echo $crit_var\n\
    \    echo \"no locked accounts\"\nfi\nexit 0\n```\n\nThis shell script is called\
    \ from a scheduling tool such as `cron`. For example, this `cron` entry instructs\
    \ the job to run every ten minutes:\n```\n# Job to detect locked database accounts\n\
    0,10,20,30,40,50 * * * * /home/oracle/bin/lock.bsh DWREP\n1>/home/oracle/bin/log/lock.log\
    \ 2>&1\n```\n\nIn this way, I am notified when one of the production database\
    \ accounts becomes locked. In this `cron` entry, the code should be on one line.\
    \ It's placed on two lines in this book so that it fits on the page.\n\n# Checking\
    \ for Files over a Certain Age\n\nFor some jobs that I run from shell scripts\
    \ (like backups) I'll first check to see if another backup job is already running.\
    \ The check involves looking for a lock file. If the lock file exists then the\
    \ shell script exits.\n\nIf the lock file doesn't exist, then one is created.\
    \ At the end of the job the lock file is removed.\n\nWhat happens sometimes is\
    \ that there's a problem with the job and it aborts abnormally before the lock\
    \ file can be removed. In these situations, I want to know if a lock file exists\
    \ on a server that is older than one day old. The existence of an old lock file\
    \ indicates there has been an issue, so I need to investigate. **Listing 21–7**\
    \ checks for any lock files in the `/tmp` directory older than one day.\n\n**Listing\
    \ 21–7.** A Script that checks for any lock files in the `/tmp` directory older\
    \ than one day\n```\n#!/bin/bash\nBOX=$(uname -a | awk '{print $2}')\n# find all\
    \ lock files gt 1 day old.\n# Find all lock files in /tmp, if found, find any\
    \ older than one day\nls /tmp/*.lock 2>/dev/null && \\\nfilevar=$(find /tmp/*lock\
    \ -type f -mtime +1 | wc -l) || filevar=0\nif [ $filevar -gt 0 ]; then\n    echo\
    \ \"$BOX, lockfile issue: $filevar\" | \\\n    mailx -s \"$BOX lockfile problem\"\
    \ dkuhn@sun.com\nelse\n    echo \"Lock file ok: $filevar\"\nfi\nexit 0\n```\n\n\
    I usually check for the existence of a lock file on a daily basis. Here is a typical\
    \ `cron` entry to run the prior script named `lock_chk.bsh`:\n```\n```"
  raw: '# Archive directory check for fullness.


    38 * * * * /u01/oracle/bin/arch_check.bsh DWREP


    1>/u01/oracle/bin/log/arch_check.log 2>&1


    #---------------------------------------------------


    (Note that the code should be on one line. It''s placed on two lines in this book
    so that it fits on the page.)


    Truncating Large Log Files


    Sometimes log files can grow to very large sizes and cause issues by filling up
    critical mount points. The listener.log will record information about incoming
    connections to the database. For active systems, this file can quickly grow to
    several gigabytes. For most of my environments, the information in the listener.log
    file does not need to be retained for any reason. If there are Oracle Net connectivity
    issues, then the file can be inspected to help troubleshoot issues.


    The listener.log file is actively written to, so you shouldn''t just delete it.
    If you remove the file, the listener process won''t recreate the file and start
    writing to it again. You have to stop and restart the listener to reinstatiate
    its writing to the listener.log file. You can, however, null out the listener.log
    file or truncate it. In Linux/Unix environments this is done via the following
    technique: $ cat /dev/null >listener.log


    The previous command replaces the contents of the listener.log file with the contents
    of


    /dev/null (a default file on Linux/Unix systems that contains nothing). The result
    of the prior line of code is that the listener.log file is truncated and the listener
    can continue to actively write to it.


    Listing 21–5 is a shell script that truncates the default listener.log file and
    a named listener appinvprd.log file. This script is dependent on setting on the
    operating system variable TNS_ADMIN. If you don''t set that variable in your environment,
    you''ll have to hard code the directory path within this script: 588


    CHAPTER 21 ■ AUTOMATING JOBS


    ***Listing 21–5.** Script to Truncate the Default listener.log*


    #!/bin/bash


    #


    if [ $# -ne 1 ]; then


    echo "Usage: $0 SID"


    exit 1


    fi


    # See chapter 2 for details on setting OS variables


    # Source oracle OS variables with oraset script


    . /var/opt/oracle/oraset $1


    #


    MAILX=''/bin/mailx''


    MAIL_LIST=''dkuhn@sun.com''


    #


    if [ -f $TNS_ADMIN/../log/listener.log ]; then


    cat /dev/null > $TNS_ADMIN/../log/listener.log


    fi


    if [ $? -ne 0 ]; then


    echo "trunc list. problem" | $MAILX -s "trunc list. problem $1" $MAIL_LIST


    else


    echo "no problem..."


    fi


    # A named listener log file


    if [ -f $TNS_ADMIN/../log/appinvprd.log ]; then


    cat /dev/null > $TNS_ADMIN/../log/appinvprd.log


    fi


    if [ $? -ne 0 ]; then


    echo "trunc list. problem" | $MAILX -s "trunc list. problem $1" $MAIL_LIST


    else


    echo "no problem..."


    fi


    #


    exit 0


    The following cron entry runs the prior script on a monthly basis:


    #---------------------------------------------------


    # Trunc log files once a month.


    30 6 1 * * /orahome/oracle/bin/trunc_log.bsh DWREP


    1>/orahome/oracle/bin/log/trunc_log.log 2>&1


    #---------------------------------------------------


    (Note that this cron table entry is broken into two lines to fit on the page.
    In the cron table, it needs to be all on one line.)


    Checking for Locked Production Accounts


    Usually I have a database profile in place that specifies that a database account
    become locked after a specified number of failed login attempts. For example,
    I''ll set the DEFAULT profile FAILED_LOGIN_ATTEMPTS to 5\. What sometimes happens
    is that a rogue user or developer will attempt to guess the production account
    password, and after 5 attempts, this locks the production account. When 589


    CHAPTER 21 ■ AUTOMATING JOBS


    this happens, I need to know about it as soon as possible so that I can investigate
    the issue and then unlock the account.


    Listing 21–6 is a shell script that checks the LOCK_DATE value in DBA_USERS for
    a list of production database accounts:


    ***Listing 21–6.** A shell script to check the LOCK_DATE value in DBA_USERS*


    #!/bin/bash


    if [ $# -ne 1 ]; then


    echo "Usage: $0 SID"


    exit 1


    fi


    # source oracle OS variables


    . /var/opt/oracle/oraset $1


    #


    crit_var=$(sqlplus -s <<EOF


    / as sysdba


    SET HEAD OFF FEED OFF


    SELECT count(*)


    FROM dba_users


    WHERE lock_date IS NOT NULL


    AND username in (''CIAP'',''REPV'',''CIAL'',''STARPROD'');


    EOF)


    #


    if [ $crit_var -ne 0 ]; then


    echo $crit_var


    echo "locked acct. issue with $1" | mailx -s "locked acct. issue" dkuhn@sun.com
    else


    echo $crit_var


    echo "no locked accounts"


    fi


    exit 0


    This shell script is called from a scheduling tool such as cron. For example,
    this cron entry instructs the job to run every ten minutes:


    #---------------------------------------------------


    # Job to detect locked database accounts


    0,10,20,30,40,50 * * * * /home/oracle/bin/lock.bsh DWREP


    1>/home/oracle/bin/log/lock.log 2>&1


    #---------------------------------------------------


    In this way, I am notified when one of the production database accounts becomes
    locked. In this cron entry, the code should be on one line. It''s placed on two
    lines in this book so that it fits on the page.


    Checking for Files over a Certain Age


    For some jobs that I run from shell scripts (like backups) I''ll first check to
    see if another backup job is already running. The check involves looking for a
    lock file. If the lock file exists then the shell script exits.


    If the lock file doesn''t exist, then one is created. At the end of the job the
    lock file is removed.


    What happens sometimes is that there''s a problem with the job and it aborts abnormally
    before the lock file can be removed. In these situations, I want to know if a
    lock file exists on a server that is older 590


    CHAPTER 21 ■ AUTOMATING JOBS


    than one day old. The existence of an old lock file indicates there has been an
    issue, so I need to investigate. Listing 21–7 checks for any lock files in the
    /tmp directory older than one day.


    ***Listing 21–7.** A Script that checks for any lock files in the /tmp directory
    older than one day*


    #!/bin/bash


    BOX=$(uname -a | awk ''{print $2}'')


    # find all lock files gt 1 day old.


    # Find all lock files in /tmp, if found, find any older than one day


    ls /tmp/*.lock 2>/dev/null && \


    filevar=$(find /tmp/*lock -type f -mtime +1 | wc -l) || filevar=0


    if [ $filevar -gt 0 ]; then


    echo "$BOX, lockfile issue: $filevar" | \


    mailx -s "$BOX lockfile problem" dkuhn@sun.com


    else


    echo "Lock file ok: $filevar"


    fi


    exit 0


    I usually check for the existence of a lock file on a daily basis. Here is a typical
    cron entry to run the prior script named lock_chk.bsh:


    #---------------------------------------------------'
