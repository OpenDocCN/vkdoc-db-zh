    \ specifies the directory `ORACLE_HOME`.\n\n    The `Y` on the end of the string\
    \ signifies that the database can be started and stopped by the `ORACLE_HOME/bin/dbstart`\
    \ and `ORACLE_HOME/bin/dbshut` scripts.\n\n    You can replace the `Y` with an\
    \ `N` if you do not want the database automatically stopped and restarted.\n\n\
    \    **Note** With some Unix systems (such as Solaris), the oratab file is usually\
    \ located in the `/var/opt/oracle` directory.\n\n4.  As `root`, navigate to the\
    \ `/etc/init.d` directory, and create a file named `dbora`:\n\n    ```\n    #\
    \ cd /etc/init.d\n    # vi dbora\n    ```\n\n5.  Place the following lines in\
    \ the `dbora` file. Make sure you change the values of variables `ORA_HOME` and\
    \ `ORA_OWNER` to match your environment. This is a bare bones script of what you\
    \ minimally would need to stop and start a database and listener:\n\n    ```\n\
    \    #!/bin/bash\n    # chkconfig: 35 99 10\n    # description: Starts and stops\
