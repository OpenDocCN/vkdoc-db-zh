    \ DBA 设置的，那么你可能已经注意到 `alert.log` 和跟踪文件有时位于非标准位置。在查找旧的跟踪文件时，我首先尝试找到 `alert.log`。通常，与\
    \ `alert.log` 文件相关的跟踪文件位于同一目录中。由于 `alert.log` 文件具有特定且众所周知的名称（`alert_<SID>.log`），因此通常先找到它，然后再查找相关的跟踪文件会更容易。\n\
    \n对于 Oracle Database 11*g* 及更高版本，`alert.log` 的文本版本位于以下标准目录和名称中：\n\n```\n<ADR base>/diag/rdbms/<DB_UNIQUE_NAME>/<SID>/trace/alert_<SID>.log\n\
    ```\n\n`ADR base` 位置由 `DIAGNOSTIC_DEST` 数据库初始化参数定义。如果你未设置 `DIAGNOSTIC_DEST`，那么\
    \ Oracle 会从操作系统环境变量 `ORACLE_BASE` 推导该值。如果操作系统 `ORACLE_BASE` 变量未设置，则 `DIAGNOSTIC_DEST`\
    \ 被设置为 `ORACLE_HOME/log` 的值（其中 `ORACLE_HOME` 是一个几乎普遍设置的操作系统变量）。\n\n对于 Oracle Database\
    \ 10*g*，`alert.log` 的标准位置定义为：\n\n```\n<ORACLE_BASE>/admin/<SID>/bdump\n```\n\n\
    对于 Oracle Database 10*g*，上述路径通常与 `BACKGROUND_DUMP_DEST` 数据库初始化参数的常规设置值相同。`ORACLE_BASE`\
    \ 操作系统变量的典型值是 `/ora01/app/oracle` 或 `/u01/app/oracle`。例如，以下是 `DEVDB` 数据库的 `init.ora`\
    \ 中 `BACKGROUND_DUMP_DEST` 初始化变量的条目：\n\n```\nbackground_dump_dest=/ora01/app/oracle/admin/DEVDB/bdump\n\
    ```\n\n然而，没有什么能阻止经验不足的 DBA 将 `BACKGROUND_DUMP_DEST` 等参数设置为完全非标准的位置。例如，以下是我最近被要求维护的一个数据库中的设置：\n\
    \n```\nbackground_dump_dest=/oralogs08/dba/admin/bdump\n```\n\n为什么 DBA 会将参数设置为如此非标准的位置？这其实并不重要。\n\
    \n你只需要意识到 DBA 有时会以使维护变得更加困难的方式启用功能。\n\n无论如何，如果你可以通过 `SQL*Plus` 连接到你的数据库，那么确定即使是非标准位置的\
    \ `alert.log` 位置也是轻而易举的事。这将正确显示任何 Oracle 数据库版本的 `alert.log` 位置：\n\n```\nSQL> show\
    \ parameter background_dump_dest\n```\n\n当数据库无法启动，并且文件被放置在非标准（且不明显）的目录中时，如何确定\
    \ `alert.log` 和跟踪文件的位置？在这种情况下，使用 `find` 命令来定位 `alert.log` 文件。首先，切换到 `ORACLE_BASE`\
    \ 目录：\n\n```\n$ cd $ORACLE_BASE\n```\n\n接下来，使用 `find` 命令尝试定位文件：\n\n```\n$ find\
    \ . -name \"alert*.log\"\n```\n\n如果你没有定义 `ORACLE_BASE`，或者 `alert.log` 不在相对标准的位置，那么前面的命令可能找不到任何文件。在这种情况下，执行更全面的全局搜索。\n\
    \n导航到服务器的根目录，然后发出 `find` 命令：\n\n```\n$ cd /\n$ find . -name \"alert*.log\" 2>/dev/null\n\
    ```\n"
- fmt: '# CHAPTER 22 ■ DATABASE TROUBLESHOOTING


    In the prior command, you''re inspecting all files on the operating system in
    an attempt to locate a file named with "alert" in the first part of the string
    and ".log" in the last section of the string. When performing a global search,
    an error will be thrown when the `find` command attempts to access files that
    it has no permissions to read. The `2>/dev/null` is useful because it redirects
    all error messages to the `/dev/null` (bit bucket) file. The result is that you
    don''t see volumes of error messages, and you only see output when `find` successfully
    locates a file that matches the string pattern.


    When attempting to find the `alert.log`, you may find more than one file. This
    happens when inexperienced DBAs move the `alert.log` from a standard location
    to a non-standard location and leaves old files scattered throughout the operating
    system.


    When you think you''ve located the correct `alert.log` file, check the date on
    it to ensure that it has been recently updated. Sometimes you find an `alert.log`,
    but it turns out not to be the current file. You can check the last update time
    with the `ls` command long listing:


    ```

    $ ls -altr alert_<SID>.log

    ```


    Once you have found the correct `alert.log`, inspect the most recent entries in
    it for errors and or look for trace files in the same directory as the `alert.log`
    file:


    ```

    $ ls -altr *.trc

    ```


    If any of these trace files are over several days old, consider moving or removing
    them.


    ## Removing Files


    Needless to say, be very careful when removing files. When trying to resolve issues,
    the last thing you want to do is make things worse. Accidentally removing one
    critical file can be catastrophic. For any files you identify as candidates for
    deletion, consider moving the files (instead of deleting) them. If you have a
    mount point that has free space, move the files there and leave them for a couple
    of days and then remove them.


    If you have identified files that can be removed, first list out the files that
    you will be removed before you actually delete them. Minimally, I do this before
    removing any file:


    ```

    $ ls -altr <file_name>

    ```


    After viewing the results returned by the `ls` command, remove the file(s). This
    example uses the Linux/Unix `rm` command to permanently delete the file:


    ```

    $ rm <file_name>

    ```


    You can also remove files based on the age of the file. For example, say you determine
    that any trace files over two days old can be safely deleted. Typically, the `find`
    command is used in conjunction with the `rm` command to accomplish this task.
    Before removing files, first list out the result of the `find` command:


    ```

    $ find . -type f -mtime +2 -name "*.trc"

    ```


    If you are satisfied with the list of files, then add the `rm` command to remove
    them:


    ```

    $ find . -type f -mtime +2 -name "*.trc" | xargs rm

    ```


    In the prior line of code, the results of the `find` command are piped to `xargs`
    command, which executes the `rm` command for every file found by the `find` command.
    This is an efficient method for deleting files based on age. However, make very
    sure that you know which files will be deleted.


    Another file that sometimes consumes large amounts of space is the `listener.log`
    file. Since this file is actively written to by the listener process, you can''t
    simply remove it. If you need to preserve the contents of this file, then first
    copy it to a backup location (that contains free disk space) and then truncate
    the file. In this example, the `listener.log` file is first copied to `/ora01/backups`
    and then the file is truncated by:


    ```

    $ cp listener.log /ora01/backups

    ```


    Next, use the `cat` command to replace the contents of the `listener.log` with
    the `/dev/null` file (which contains zero bytes):


    ```

    $ cat /dev/null > listener.log

    ```


    ## Inspecting the Alert Log


    When dealing with database issues, the `alert.log` should be one of the first
    files you check for relevant error messages. You can use either operating system
    tools or the ADRCI utility to view the `alert.log` file and corresponding trace
    files.


    ### Viewing the Alert Log via OS Tools


    After navigating to the directory that contains the `alert.log`, you can view
    the most current messages by viewing the end (furthest down) in the file (in other
    words, the most current messages are written to the end of the file). To view
    the last 50 lines, use the `tail` command:


    ```

    $ tail -50 alert_<SID>.log

    ```


    You can continuously view the most current entries by using the `-f` switch:


    ```

    $ tail -f alert_<SID>.log

    ```


    You can also directly open the `alert.log` with an operating system editor (such
    as `vi`):


    ```

    $ vi alert_<SID>.log

    ```


    Sometimes it''s handy to define a function that will allow you to open the `alert.log`
    regardless of your current working directory. The next few lines of code define
    a function that locates and opens the `alert.log` with the `view` command in either
    an `11g` or `10g` environment:


    ```

    #-----------------------------------------------------------#

