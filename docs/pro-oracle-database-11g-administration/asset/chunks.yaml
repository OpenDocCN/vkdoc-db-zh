    Summary


    After you’ve installed the Oracle binaries, you can create a database. Before
    creating a database, make sure you’ve correctly set the required operating system
    variables. You also need an initialization file and need to pre-create any necessary
    directories. You should carefully think about which initialization parameters
    should be set to a nondefault value. In general, I try to use as many default
    values as possible and only change an initialization parameter when there’s a
    good reason.


    This chapter focused on using SQL*Plus to create databases. This is an efficient
    and repeatable method for creating a database. When you’re crafting a CREATE DATABASE
    statement, consider the size of the datafiles and online redo logs. You should
    also put some thought into how many groups of online redo logs you require and
    how many members per group.


    I’ve worked in some environments where management dictated the requirement of
    one database per server. Usually that is overkill. A fast server with large memory
    areas and many CPUs should be capable of hosting several different databases.
    You have to determine what architecture meets your business requirements when
    deciding how many databases to place on one box.


    After you’ve created a database, the next step is to configure the environment
    so you can efficiently navigate, operate, and monitor the database. These tasks
    are described in the next chapter.


