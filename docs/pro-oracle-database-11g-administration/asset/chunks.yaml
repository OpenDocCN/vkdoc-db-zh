    \ 234\n\nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\n**View Description**\n\nUSER_ROLE_PRIVS\n\
    \nRoles granted to the user\n\nUSER_SYS_PRIVS\n\nSystem privileges granted to\
    \ the user\n\nUSER_TAB_PRIVS\n\nObject grants for which the user is the object\
    \ owner, grantor, or grantee USER_TAB_PRIVS_MADE\n\nObject grants where the user\
    \ is the object owner\n\nUSER_TAB_PRIVS_RECD\n\nObject grants where the user is\
    \ the grantee\n\nUSER_COL_PRIVS\n\nColumn object grants where the user is the\
    \ object owner, grantor, or grantee USER_COL_PRIVS_MADE\n\nColumn object grants\
    \ where user is the object owner\n\nUSER_COL_PRIVS_RECD\n\nColumn object grants\
    \ where the user is the grantee\n\nDisplaying Object Privileges\n\nObject *privileges*\
    \ are grants that allow you to perform DML operations (INSERT, UPDATE, and DELETE)\
    \ on another user’s tables. Before you can perform DML operations on another user’s\
    \ objects, you must be granted the appropriate privileges. Object privileges are\
    \ managed through the GRANT and REVOKE\n\nstatements.\n\nSometimes, when you’re\
    \ troubleshooting table-access issues, you need to view what DML privileges have\
    \ been granted. The following query selects from the USER_TAB_PRIVS_RECD view\
    \ to display the table privileges that have been granted to the currently connected\
    \ user:\n\nselect\n\nowner\n\n,table_name\n\n,grantor\n\n,privilege\n\nfrom user_tab_privs_recd;\n\
    \nTo view privileges that the current user has granted to other users, select\
    \ from the USER_TAB_PRIVS_MADE view:\n\nselect\n\ngrantee\n\n,table_name\n\n,grantor\n\
    \n,privilege\n\nfrom user_tab_privs_made;\n\nRun the following query to view table\
    \ privileges that have been granted to your current user: select grantee, table_name,\
    \ privilege\n\nfrom user_tab_privs\n\nwhere grantee = sys_context('USERENV','CURRENT_USER')\n\
    \norder by table_name, privilege;\n\nIn the previous lines of code, the SYS_CONTEXT\
    \ function is used to extract the current username from the session. Without qualifying\
    \ the GRANTEE with your current username, the query also displays object 235\n\
    \nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\nprivileges you’ve granted and privileges\
    \ that have been granted by other users to your objects. The query can alternatively\
    \ prompt you for your current username. For example:\n\nselect grantee, table_name,\
    \ privilege\n\nfrom user_tab_privs\n\nwhere grantee = UPPER('&your_user_name')\n\
    \norder by table_name, privilege;\n\nThis next query selects from USER_TAB_PRIVS\
    \ and ROLE_TAB_PRIVS to check for any object privileges that have been granted\
    \ directly to the user or granted through a role that has been granted to the\
    \ user: select\n\ngrantee\n\n,owner\n\n,table_name\n\n,grantor\n\n,privilege\n\
    \nfrom user_tab_privs\n\nunion\n\nselect\n\nrole\n\n,owner\n\n,table_name\n\n\
    ,'ROLE'\n\n,privilege\n\nfrom role_tab_privs\n\norder by 2, 3;\n\nThe ROLE_TAB_PRIVS\
    \ view shows table privileges that have been granted to a role to which the current\
    \ user has access.\n\nDisplaying Object Dependencies\n\nSay you need to drop a\
    \ table, but before you drop it you want to display any objects that are dependent\
    \ on the table. For example, you may have a table that has synonyms, views, materialized\
    \ views, functions, procedures, and triggers that rely on it. Before making the\
    \ changes you want to review what other objects are dependent on the object you’re\
    \ modifying. You can use the DBA_DEPENDENCIES view to display object dependencies.\
    \ The following query prompts you for a username and an object name: select '+'\
    \ || lpad(' ',level+2) || type || ' ' || owner || '.' || name dep_tree from dba_dependencies\n\
    \nconnect by prior owner = referenced_owner and prior name = referenced_name and\
    \ prior type = referenced_type\n\nstart with referenced_owner = upper('&object_owner')\n\
    \nand referenced_name = upper('&object_name')\n\nand owner is not null;\n\nIn\
    \ the output, each object listed has a dependency on the object you entered. Lines\
    \ are indented to show the dependency of an object on the object in the preceding\
    \ line: 236\n\nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\nDEP_TREE\n\n+ TRIGGER STAR2.D_COMPANIES_BU_TR1\n\
    \n+ MATERIALIZED VIEW CIA.CB_RAD_COUNTS\n\n+ SYNONYM STAR1.D_COMPANIES\n\n+ SYNONYM\
    \ CIA.D_COMPANIES\n\n+ MATERIALIZED VIEW CIA.CB_RAD_COUNTS\n\nIn this example,\
    \ the object being analyzed is a table named D_COMPANIES. Several synonyms, materialized\
    \ views, and one trigger are dependent on this table. For example, the materialized\
    \ view CB_RAD_COUNTS owned by CIA is dependent on the synonym D_COMPANIES owned\
    \ by CIA, which in turn is dependent on the D_COMPANIES synonym owned by STAR1.\n\
    \nThe DBA_DEPENDENCIES view contains a hierarchical relationship between the OWNER,\
    \ NAME, and TYPE columns and their referenced column names of REFERENCED_OWNER,\
    \ REFERENCED_NAME, and REFERENCED_TYPE. Oracle provides a number of constructs\
    \ to perform hierarchical queries. For example, START WITH and CONNECT BY allow\
    \ you to identify a starting point in a tree and walk either up or down the hierarchical\
    \ relationship.\n\nThe previous SQL query in this section operates on only one\
    \ object. If you want to inspect every object in a schema, you can use SQL to\
    \ generate SQL to create scripts that display all dependencies for a schema’s\
    \ objects. The next section of code does that. For formatting and output, it uses\
    \ some constructs specific to SQL*Plus, such as setting the page sizes and line\
    \ size and spooling the output: UNDEFINE owner\n\nSET LINESIZE 132 PAGESIZE 0\
    \ VERIFY OFF FEEDBACK OFF TIMING OFF\n\nSPO dep_dyn_&&owner..sql\n\nSELECT 'SPO\
    \ dep_dyn_&&owner..txt' FROM DUAL;\n\n--\n\nSELECT\n\n'PROMPT ' || '_____________________________'||\
    \ CHR(10) ||\n\n'PROMPT ' || object_type || ': ' || object_name || CHR(10) ||\n\
    \n'SELECT ' || '''' || '+' || '''' || ' ' || '|| LPAD(' || '''' || ' '\n\n|| ''''\
    \ || ',level+3)' || CHR(10) || ' || type || ' || '''' || ' ' || '''' ||\n\n' ||\
    \ owner || ' || '''' || '.' || '''' || ' || name' || CHR(10) ||\n\n' FROM dba_dependencies\
    \ ' || CHR(10) ||\n\n' CONNECT BY PRIOR owner = referenced_owner AND prior name\
    \ = referenced_name '\n\n|| CHR(10) ||\n\n' AND prior type = referenced_type '\
    \ || CHR(10) ||\n\n' START WITH referenced_owner = ' || '''' || UPPER('&&owner')\
    \ || '''' || CHR(10) ||\n\n' AND referenced_name = ' || '''' || object_name ||\
    \ '''' || CHR(10) ||\n\n' AND owner IS NOT NULL;'\n\nFROM dba_objects\n\nWHERE\
    \ owner = UPPER('&&owner')\n\nAND object_type NOT IN ('INDEX','INDEX PARTITION','TABLE\
    \ PARTITION');\n\n--\n\nSELECT 'SPO OFF' FROM dual;\n\nSPO OFF\n\nSET VERIFY ON\
    \ LINESIZE 80 FEEDBACK ON\n\nYou should now have a script named dep_dyn_<owner>.sql\
    \ created in the same directory from which you ran the script. This script contains\
    \ all the SQL required to display dependencies on objects in the owner you entered.\
    \ Run the script to display object dependencies. In this example, the owner is\
    \ CIA: SQL> @dep_dyn_cia.sql\n\n![](index-272_1.png)\n\nCHAPTER 10 ■ DATA DICTIONARY\
    \ BASICS\n\ndefine user1=ccim_dev\n\ndefine user1_pwd=ccim_pwd\n\ndefine user2=ccim_prod\n\
    \ndefine user2_pwd=abc123\n\ndefine conn1=@db1\n\ndefine conn2=@db2\n\ncreate\
    \ database link db1 connect to &&user1 identified by &&user1_pwd using 'sb-db5:1521/sb6';\n\
    \ncreate database link db2 connect to &&user2 identified by &&user2_pwd using\
    \ 'db-prod1:1521/scaprd';\n\nThe CREATE DATABASE LINK statements use the easy-connect\
    \ naming method to determine the location of the remote database. The USING clause\
    \ specifies the database-connection information using this syntax:\n\n'<remote_server>:<port>/<service_name>'\n\
    \nAfter the database links are created, you run SQL statements that display metadata\
    \ differences from the data-dictionary views. The next two statements use the\
    \ MINUS set operator to determine whether there any differences between table\
    \ names:\n\nprompt ...Tables in db1 NOT IN db2\n\nselect table_name\n\nfrom user_tables&&conn1\n\
    \nminus\n\nselect table_name\n\nfrom user_tables&&conn2;\n\nprompt ...Tables in\
    \ db2 NOT IN db1\n\nselect table_name\n\nfrom user_tables&&conn2\n\nminus\n\n\
    select table_name\n\nfrom user_tables&&conn1;\n\nIf you want to compare a local\
    \ schema with a remote schema, then you need only one database link.\n\nIn this\
    \ situation, you must also define one of the connection variables to be blank:\
    \ define conn2=''\n\nNow you can connect as a local user in your database and\
    \ compare a remote schema to a local schema.\n\nIf you want to compare objects\
    \ in two schemas in the same database, then you have to modify the scripts to\
    \ include an OWNER and use the DBA or ALL data-dictionary view (instead of USER).\n\
    \nListed next is a more complex example of comparing two schemas’ objects. The\
    \ following script compares several data-dictionary views for differences in metadata:\n\
    \nspo diff.txt\n\nprompt Default or temp tablespace in db1 NOT IN db2\n\nselect\
    \ default_tablespace, temporary_tablespace\n\nfrom user_users&&conn1\n\nminus\n\
    \nselect default_tablespace, temporary_tablespace\n\nfrom user_users&&conn2;\n\
    \nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\nprompt Default or temp tablespace in\
    \ db2 NOT IN db1\n\nselect default_tablespace, temporary_tablespace\n\nfrom user_users&&conn2\n\
    \nminus\n\nselect default_tablespace, temporary_tablespace\n\nfrom user_users&&conn1;\n\
    \nprompt Tablespace quotas in db1 NOT IN db2\n\nselect tablespace_name, max_bytes\n\
    \nfrom user_ts_quotas&&conn1\n\nminus\n\nselect tablespace_name, max_bytes\n\n\
    from user_ts_quotas&&conn2;\n\nprompt Tablespace quotas in db2 NOT IN db1\n\n\
    select tablespace_name, max_bytes\n\nfrom user_ts_quotas&&conn2\n\nminus\n\nselect\
    \ tablespace_name, max_bytes\n\nfrom user_ts_quotas&&conn1;\n\nprompt Objects\
    \ in db1 NOT IN db2\n\nselect object_name, object_type\n\nfrom user_objects&&conn1\n\
    \nminus\n\nselect object_name, object_type\n\nfrom user_objects&&conn2 order by\
    \ 2;\n\nprompt Objects in db2 NOT IN db1\n\nselect object_name, object_type\n\n\
    from user_objects&&conn2\n\nminus\n\nselect object_name, object_type\n\nfrom user_objects&&conn1\
    \ order by 2;\n\nprompt Tables in db1 NOT IN db2\n\nselect table_name\n\nfrom\
    \ user_tables&&conn1\n\nminus\n\nselect table_name\n\nfrom user_tables&&conn2;\n\
    \nprompt Tables in db2 NOT IN db1\n\nselect table_name\n\nfrom user_tables&&conn2\n\
    \nminus\n\nselect table_name\n\nfrom user_tables&&conn1;\n\nprompt Indexes in\
    \ db2 NOT IN db1\n\nselect table_name, index_name, index_type, uniqueness\n\n\
    from user_indexes&&conn2\n\nminus\n\nselect table_name, index_name, index_type,\
    \ uniqueness\n\nCHAPTER 10 ■ DATA DICTIONARY BASICS\n\nfrom user_indexes&&conn1\
    \ order by 1, 2;\n\nprompt Table columns db1 NOT IN db2\n\nselect table_name,\
    \ column_name\n\nfrom user_tab_columns&&conn1\n\nminus\n\nselect table_name, column_name\n\
    \nfrom user_tab_columns&&conn2 order by 1,2;\n\nprompt Table columns in db2 NOT\
    \ IN db1\n\nselect table_name, column_name\n\nfrom user_tab_columns&&conn2\n\n\
    minus\n\nselect table_name, column_name\n\nfrom user_tab_columns&&conn1 order\
    \ by 1,2;\n\nspo off;\n\nThis script is just a sample of what you can do with\
    \ data-dictionary views to report on metadata differences between schemas. The\
    \ script doesn’t include every possible type of check. Rather, it includes enough\
    \ to give you an example of how to find the most common types of differences that\
    \ developers and DBAs look for. A full version of this script is available in\
    \ the source code section of the Apress website (www.apress.com).\n\nIf you have\
    \ access to a tool such as Enterprise Manager Change Management Pack, then you\
    \ can use it to display differences between two schemas. A quick Google search\
    \ shows dozens of tools available for comparing schemas. The purpose of the examples\
    \ in this section isn’t to compete with these tools, but to show that you can\
    \ quickly create a set of SQL statements that display schema differences. You\
    \ can easily augment and enhance these statements as required for your environment.\n\
    \nSummary\n\nSometimes you're handed an old database that has been running for\
    \ years, and it’s up to you to manage and maintain it. In some scenarios, you\
    \ aren’t given any documentation regarding the users and objects in the database.\
    \ Even if you’re provided with documentation, it may not be accurate or up to\
    \ date. In this case, the data dictionary quickly becomes your source of documentation.\
    \ You can use it to extract user information, the physical structure of the database,\
    \ security information, objects and owners, currently connected users, and so\
    \ forth.\n\nOracle provides static and dynamic views in the data dictionary. The\
    \ static views contain information about the objects in the database. You can\
    \ use these views to determine which tables are consuming the most space, contain\
    \ the most rows, have the most extents allocated, and so on. The dynamic-performance\
    \ views provide a real-time window into events currently transacting in the database.\
    \ These views provide information about currently connected users, SQL executing,\
    \ where resources are being consumed, and so on. DBAs use these views extensively\
    \ to monitor and troubleshoot performance issues.\n\nThe book now turns its attention\
    \ toward specialized Oracle features such as large objects, partitioning, Data\
    \ Pump, and external tables. These topics are covered in the next several chapters.\n\
    \n![](index-277_1.png)\n\nCHAPTER 11 ■ LARGE OBJECTS\n\nreplication, or disaster-recovery\
    \ mechanisms. BFILEs are more appropriate for large binary files that are read-only\
    \ and don’t change while an application is running. For example, you may have\
    \ large binary video files that are referenced by a database application. In this\
    \ scenario, the business determines that you don’t need to create and maintain\
    \ a 500TB database when all the application really needs is a pointer (stored\
    \ in the database) to the locations of the large files on disk.\n\n***Table 11–1.**\
    \ Oracle Large Object Data Types*\n\n**Data Type**\n\n**Description**\n\n**Maximum\
    \ Size**\n\nLONG\n\nDon’t create tables with LONG data types This\n\n2GB\n\ndata\
    \ type is supported for backward\n\ncompatibility. Use a CLOB or an NCLOB\n\n\
    instead.\n\nLONG RAW\n\nDon’t create tables with LONG RAW columns.\n\n2GB\n\n\
    This data type is supported for backward\n\ncompatibility. Use a BLOB instead.\n\
    \nCLOB\n\nCharacter large object for storing character\n\n(4GB – 1)* blocksize\n\
    \ndocuments such as big text files, log files,\n\nXML files, and so on.\n\nNCLOB\n\
    \nNational character large object. Stores data\n\n(4GB – 1) * blocksize\n\nin\
    \ national character set format. Supports\n\ncharacters with varying width.\n\n\
    BLOB\n\nBinary large object for storing unstructured\n\n(4GB – 1) * blocksize\n\
    \nbitstream data (images, video, and so on).\n\nBFILE\n\nBinary file large object\
    \ stored on the\n\n2^64 – 1 bytes (operating system\n\nfilesystem outside of the\
    \ database. BFILEs\n\nmay impose a size limit that is less\n\nare read-only.\n\
    \nthan this)\n\nIllustrating LOB Locators, Indexes, and Chunks\n\nInternal LOBs\
    \ (CLOB, NCLOB, and BLOB) store data in pieces called *chunks*. A chunk is the\
    \ smallest unit of allocation for a LOB and is made up of one or more database\
    \ blocks. A LOB *locator* is stored in a row that contains a LOB column. The LOB\
    \ locator points to a LOB *index*. The LOB index stores information regarding\
    \ the LOB chunks. When a table is queried, the database uses the LOB locator and\
    \ associated LOB index to locate the appropriate LOB chunks. Figure 11–1 shows\
    \ the relationship between a table, a row, a LOB locator, and its associated index\
    \ and chunks.\n\n![](index-279_1.png)\n\nCHAPTER 11 ■ LARGE OBJECTS\n\n■ **Note**\
    \ The DBMS_LOB package performs operations on LOBs through the LOB locator.\n\n\
    Distinguishing Between BasicFiles and SecureFiles\n\nSeveral significant improvements\
    \ were made to LOBs in Oracle Database 11 *g*. Oracle now distinguishes between\
    \ two different types of underlying LOB architectures:\n\n• BasicFile\n\n• SecureFile\n\
    \nSecureFile is a new LOB architecture introduced in Oracle Database 11 *g*. The\
    \ SecureFile architecture has many new enhancements that improve the manageability\
    \ and performance of LOBs. If you’re using Oracle Database 11 *g* or higher, then\
    \ you should create your LOB columns with the SECUREFILE clause. Be aware that\
    \ the SecureFile feature itself doesn’t require an additional license.\n\nHowever,\
    \ some of the SecureFile advanced features do require additional licenses (encryption,\
    \ deduplication, and compression).\n\nIf you’re not using Oracle Database 11 *g*,\
    \ then your only option is to use the BasicFile architecture.\n\nThis is the default\
    \ type of LOB created, and it’s been available since Oracle version 8.\n\nBasicFile\n\
    \nBasicFile is the name Oracle gives to the LOB architecture available prior to\
    \ Oracle Database 11 *g*. It’s still important to understand the BasicFile LOBs\
    \ because many shops use Oracle versions that don’t support SecureFiles. You don’t\
    \ need to do anything special to enable the use of BasicFile LOBs; this is the\
    \ default LOB architecture that is implemented when you create a table with LOB\
    \ columns.\n\nSecureFile\n\nIf you’re using Oracle Database 11 *g* or higher,\
    \ then you have the option of using the SecureFile LOB\n\narchitecture. It includes\
    \ the following enhancements (over BasicFile LOBs):\n\n•\n\nEncryption (requires\
    \ Oracle Advanced Security Option)\n\n•\n\nCompression (requires Oracle Advanced\
    \ Compression Option)\n\n•\n\nDeduplication (requires Oracle Advanced Compression\
    \ Option)\n\nSecureFile encryption lets you transparently encrypt LOB data (just\
    \ like other data types). The compression feature allows for significant space\
    \ savings. The deduplication feature eliminates duplicate LOBs that otherwise\
    \ would be stored multiple times.\n\nPrerequisites for SecureFiles\n\nYou need\
    \ to do a small amount of planning before using SecureFiles. Specifically, use\
    \ of SecureFiles requires the following:\n\nCHAPTER 11 ■ LARGE OBJECTS\n\n• A\
    \ SecureFile LOB must be stored in a tablespace using the automated segment space\
    \ management feature (ASSM).\n\n• The DB_SECUREFILE initialization setting must\
    \ be either PERMITTED or ALWAYS.\n\nA SecureFile LOB must be created within a\
    \ tablespace using ASSM. To create an ASSM-enabled tablespace, specify the SEGMENT\
    \ SPACE MANAGEMENT AUTO clause. For example: create tablespace inv_mgmt_data\n\
    \ndatafile '/ora01/dbfile/O11R2/inv_mgmt_data01.dbf'\n\nsize 1000m\n\nextent management\
    \ local\n\nuniform size 1m\n\nsegment space management auto;\n\nIf you have existing\
    \ tablespaces, you can verify the use of ASSM by querying the DBA_TABLESPACES\n\
    \nview. The SEGMENT_SPACE_MANAGEMENT column should have a value of AUTO for any\
    \ tablespaces that you want to use with SecureFiles:\n\nselect\n\ntablespace_name\n\
    \n,segment_space_management\n\nfrom dba_tablespaces;\n\nHere’s a snippet of the\
    \ output indicating that the USER1 tablespace is using ASSM: TABLESPACE_NAME SEGMEN\n\
    \n------------------------------ ------\n\nUSER1 AUTO\n\nAlso, SecureFiles require\
    \ that the DB_SECUREFILE initialization setting is either PERMITTED or ALWAYS.\n\
    \nThe default value is PERMITTED. You can verify the value as follows:\n\nSQL>\
    \ show parameter db_securefile\n\nNAME TYPE VALUE\n\n------------------------------------\
    \ ----------- ------------------------------\n\ndb_securefile string PERMITTED\n\
    \nYou can use either ALTER SYSTEM or ALTER SESSION to modify the value of DB_SECUREFILE.\
    \ Table 11–2\n\ndescribes the valid values for DB_SECUREFILE.\n\n***Table 11–2.**\
    \ Description of DB_SECUREFILE Settings*\n\nDB_SECUREFILE **Setting**\n\n**Description**\n\
    \nNEVER\n\nThe LOB is created as a BasicFile regardless of whether the SECUREFILE\n\
    \noption is specified.\n\nPERMITTED\n\nSecureFile LOBs can be created.\n\nALWAYS\n\
    \nThe LOB is created as a SecureFile type unless the underlying tablespace isn’t\
    \ using ASSM.\n\nIGNORE\n\nThe SECUREFILE option is ignored, along with any SecureFile\
    \ settings.\n\nCHAPTER 11 ■ LARGE OBJECTS\n\nCreating a Table with a LOB Column\n\
    \nBy default, when you create a LOB, it’s a BasicFile LOB. The next subsection\
    \ covers BasicFiles and is followed by a subsection on creating a SecureFile LOB.\
    \ If you’re using Oracle Database 11 *g* and higher, I recommend that you always\
    \ create a LOB as a SecureFile LOB. As discussed previously, SecureFiles allow\
    \ you to use features such as compression and encryption.\n\nCreating a BasicFile\
    \ LOB Column\n\nTo create a LOB column, you have to specify a LOB data type. Listed\
    \ next is a basic example of creating a table with a CLOB data type:\n\ncreate\
    \ table patchmain(\n\npatch_id number\n\n,patch_desc clob);\n\nWhen you create\
    \ a table with a LOB column, you must be aware of some technical underpinnings.\n\
    \nReview the following bulleted list and be sure you understand each point:\n\n\
    • LOBs by default are created as BasicFiles.\n\n• Oracle creates a LOB segment\
    \ and a LOB index for each LOB column.\n\n• The LOB segment has a name of this\
    \ format: SYS_LOB<string>.\n\n• The LOB index has a name of this format: SYS_IL<string>.\n\
    \n• The <string> is the same for each LOB segment and its associated index.\n\n\
    • The LOB segment and index are created in the same tablespace as the table unless\
    \ you specify a different tablespace.\n\n• By default, nearly 4000 bytes of a\
    \ LOB are stored in the table row (inline).\n\n• With Oracle Database 11 *g* release\
    \ 2 and higher, a LOB segment and a LOB index aren’t created until a record is\
    \ inserted into the table (the so-called *deferred* *segment creation* feature).\
    \ This means DBA/ALL/USER_SEGMENTS and DBA/ALL/USER_EXTENTS have no information\
    \ in them until a row is inserted into the table.\n\nOracle creates a LOB segment\
    \ and a LOB index for each LOB column. The LOB segment stores the data. The LOB\
    \ index keeps track of where the chunks of LOB data are physically stored and\
    \ in what order the LOB chunks should be accessed.\n\nYou can query the DBA/ALL/USER_LOBS\
    \ view to display the LOB segment and LOB index names: select\n\ntable_name\n\n\
    ,segment_name\n\n,index_name\n\n,securefile\n\n,in_row\n\nfrom user_lobs;\n\n\
    CHAPTER 11 ■ LARGE OBJECTS\n\nHere’s the output for this example:\n\nTABLE_NAME\
    \ SEGMENT_NAME INDEX_NAME SECUREFILE IN_ROW\n\n------------ -------------------------\
    \ ------------------------- ---------- ------\n\nPATCHMAIN SYS_LOB0000024169C00002$$\
    \ SYS_IL0000024169C00002$$ NO YES\n\nYou can also query DBA/USER/ALL_SEGMENTS\
    \ to view information regarding LOB segments. As mentioned earlier, if you create\
    \ a table in Oracle Database 11 *g* release 2 and higher, an initial segment isn’t\
    \ created until you insert a row into the table (deferred segment creation). This\
    \ can be confusing because you may expect a row to be present in DBA/ALL/USER_SEGMENTS\
    \ immediately after you create the table:\n\nselect\n\nsegment_name\n\n,segment_type\n\
    \n,segment_subtype\n\n,bytes/1024/1024 meg_bytes\n\nfrom user_segments\n\nwhere\
    \ segment_name IN ('&&table_just_created',\n\n'&&lob_segment_just_created',\n\n\
    '&&lob_index_just_created');\n\nThe prior query prompts for the segment names.\
    \ The output shows no rows: no rows selected\n\nNext, insert a record into the\
    \ table that contains the LOB column:\n\nSQL> insert into patchmain values(1,'clob\
    \ text');\n\nRerunning the query against USER_SEGMENTS shows that three segments\
    \ have been created—one for the table, one for the LOB segment, and one for the\
    \ LOB index:\n\nSEGMENT_NAME SEGMENT_TYPE SEGMENT_SU MEG_BYTES\n\n------------------------------\
    \ --------------- ---------- ----------\n\nPATCHMAIN TABLE ASSM .0625\n\nSYS_IL0000024169C00002$$\
    \ LOBINDEX ASSM .0625\n\nSYS_LOB0000024169C00002$$ LOBSEGMENT ASSM .0625\n\nCreating\
    \ a LOB in a Specific Tablespace\n\nBy default, the LOB segment is stored in the\
    \ same tablespace as its table. You can specify a separate tablespace for a LOB\
    \ segment by using the LOB...STORE AS clause of the CREATE TABLE statement. The\
    \ next table-creation script creates the table in a tablespace, and creates separate\
    \ tablespaces for the CLOB\n\nand BLOB columns:\n\ncreate table patchmain\n\n\
    (patch_id number\n\n,patch_desc clob\n\n,patch blob\n\n) tablespace users\n\n\
    lob (patch_desc) store as (tablespace clob_data)\n\n,lob (patch) store as (tablespace\
    \ blob_data);\n\nYou need to modify this query so that the tablespace names match\
    \ your environment (or you can explicitly create CLOB_DATA and BLOB_DATA tablespaces).\
    \ The following query verifies that three tablespaces are utilized for this table:\n\
    \nCHAPTER 11 ■ LARGE OBJECTS\n\nselect table_name, tablespace_name, 'N/A' column_name\n\
    \nfrom user_tables\n\nwhere table_name='PATCHMAIN'\n\nunion\n\nselect table_name,\
    \ tablespace_name, column_name\n\nfrom user_lobs\n\nwhere table_name='PATCHMAIN';\n\
    \nHere’s the output:\n\nTABLE_NAME TABLESPACE_NAME COLUMN_NAME\n\n--------------------\
    \ -------------------- --------------------\n\nPATCHMAIN BLOB_DATA PATCH\n\nPATCHMAIN\
    \ CLOB_DATA PATCH_DESC\n\nPATCHMAIN USERS N/A\n\nI recommend that you always create\
    \ a LOB with its storage specified in a separate tablespace from the table data.\
    \ This is because LOBs have different growth patterns and require different storage\
    \ characteristics (than the table data).\n\nCreating a SecureFile LOB Column\n\
    \nIf you don’t specify the SECUREFILE clause when creating a table with a LOB\
    \ column, then by default the LOB is created as a BasicFile LOB. This next example\
    \ shows how to create a SecureFile LOB and place it in a tablespace separate from\
    \ the table. As mentioned earlier, the tablespace that contains the Securefile\
    \ LOB must be an ASSM-managed tablespace:\n\ncreate table patchmain(\n\npatch_id\
    \ number\n\n,patch_desc clob)\n\nlob(patch_desc) store as securefile (tablespace\
    \ lob_data);\n\n■ **Tip** Oracle allows you to create a table with the STORE AS\
    \ SECUREFILE clause in a non-ASSM tablespace.\n\nHowever, if you attempt to insert\
    \ data into this table, the following error is displayed: “ORA-43853: SECUREFILE\n\
    \nlobs can’t be used in non-ASSM tablespace.”\n\nBefore viewing the data dictionary,\
    \ you can insert a record into the table to ensure that segment information is\
    \ available (due to the deferred-segment-allocation feature in Oracle Database\
    \ 11 *g* release 2\n\nand higher). For example:\n\nSQL> insert into patchmain\
    \ values(1,'clob text');\n\nYou can now verify a LOB’s architecture by querying\
    \ the USER_SEGMENTS view: select\n\nsegment_name\n\n,segment_type\n\n,segment_subtype\n\
    \nfrom user_segments;\n\nCHAPTER 11 ■ LARGE OBJECTS\n\nHere’s some sample output\
    \ indicating that a LOB segment is a SecureFile: SEGMENT_NAME SEGMENT_TYPE SEGMENT_SU\n\
    \n-------------------------- -------------------- ----------\n\nPATCHMAIN TABLE\
    \ MSSM\n\nSYS_IL0000023963C00002$$ LOBINDEX ASSM\n\nSYS_LOB0000023963C00002$$\
    \ LOBSEGMENT SECUREFILE\n\nYou can also query the USER_LOBS view to verify the\
    \ SecureFile LOB architecture: select\n\ntable_name\n\n,segment_name\n\n,index_name\n\
    \n,securefile\n\n,in_row\n\nfrom user_lobs;\n\nHere’s the output:\n\nTABLE_NAME\
    \ SEGMENT_NAME INDEX_NAME SEC IN_\n\n------------ -------------------------- -------------------------\
    \ --- ---\n\nPATCHMAIN SYS_LOB0000023963C00002$$ SYS_IL0000023963C00002$$ YES\
    \ YES\n\n■ **Note** With SecureFiles, you no longer need to specify the following\
    \ options: CHUNK, PCTVERSION, FREEPOOLS, FREELIST, and FREELIST GROUPS.\n\nCreating\
    \ a Partitioned LOB\n\nYou can create a partitioned table that has a LOB column.\
    \ Doing so lets you spread a LOB across multiple tablespaces. Such partitioning\
    \ helps with balancing I/O, maintenance, and backup and recovery operations.\n\
    \nYou can partition LOBs by RANGE, LIST, or HASH. The next example creates a LIST-partitioned\
    \ table in which LOB column data is stored in tablespaces separate from the table\
    \ data: CREATE TABLE patchmain(\n\npatch_id NUMBER\n\n,region VARCHAR2(16)\n\n\
    ,patch_desc CLOB)\n\nLOB(patch_desc) STORE AS (TABLESPACE patch1)\n\nPARTITION\
    \ BY LIST (REGION) (\n\nPARTITION p1 VALUES ('EAST')\n\nLOB(patch_desc) STORE\
    \ AS SECUREFILE\n\n(TABLESPACE patch1 COMPRESS HIGH)\n\nTABLESPACE inv_data1\n\
    \n,\n\nPARTITION p2 VALUES ('WEST')\n\nLOB(patch_desc) STORE AS SECUREFILE\n\n\
    (TABLESPACE patch2 DEDUPLICATE NOCOMPRESS)\n\nTABLESPACE inv_data2\n\n,\n\nCHAPTER\
    \ 11 ■ LARGE OBJECTS\n\nPARTITION p3 VALUES (DEFAULT)\n\nLOB(patch_desc) STORE\
    \ AS SECUREFILE\n\n(TABLESPACE patch3 COMPRESS LOW)\n\nTABLESPACE inv_data3\n\n\
    );\n\nNotice that each LOB partition is created with its own storage options (the\
    \ SecureFile features are covered a bit later in this chapter). You can view the\
    \ details about the LOB partitions as shown: select\n\ntable_name\n\n,column_name\n\
    \n,partition_name\n\n,tablespace_name\n\n,compression\n\n,deduplication\n\nfrom\
    \ user_lob_partitions;\n\nHere’s some sample output:\n\nTABLE_NAME COLUMN_NAME\
    \ PARTITION_ TABLESPACE_NAME COMPRE DEDUPLICATION\n\n------------ ---------------\
    \ ---------- --------------- ------ --------------\n\nPATCHMAIN PATCH_DESC P1\
    \ PATCH1 HIGH NO\n\nPATCHMAIN PATCH_DESC P2 PATCH2 NO LOB\n\nPATCHMAIN PATCH_DESC\
    \ P3 PATCH3 LOW NO\n\n■ **Tip** You can also view DBA/ALL_USER_PART_LOBS for information\
    \ about partitioned LOBs.\n\nYou can change the storage characteristics of a partitioned\
    \ LOB column after it’s been created. To do so, use the ALTER TABLE ... MODIFY\
    \ PARTITION statement. This example alters a LOB partition to have a high degree\
    \ of compression:\n\nalter table patchmain modify partition p1\n\nlob (patch_desc)\
    \ (compress high);\n\nThe next example modifies a partitioned LOB so it doesn’t\
    \ keep duplicate values (via the DEDUPLICATE clause):\n\nalter table patchmain\
    \ modify partition p2\n\nlob (patch_desc) (deduplicate lob);\n\n■ **Note** Partitioning\
    \ is an extra-cost option that is available only with the Oracle Enterprise Edition.\n\
    \nCHAPTER 11 ■ LARGE OBJECTS\n\nMaintaining LOB Columns\n\nThe following sections\
    \ describe some common maintenance tasks that are performed on LOB columns or\
    \ that involve LOB columns. You learn to move columns between tablespaces, to\
    \ add new LOB columns to a table, and so forth.\n\nMoving a LOB Column\n\nAs mentioned\
    \ previously, if you create a table with a LOB column and don’t specify a tablespace,\
    \ then by default the LOB is created in the same tablespace as its table. This\
    \ happens sometimes in environments where the DBAs don’t plan ahead very well;\
    \ only after the LOB column has consumed large amounts of disk space does the\
    \ DBA wonder why the table has grown so big.\n\nYou can use the ALTER TABLE...MOVE...STORE\
    \ AS statement to move a LOB column to a separate tablespace (from the table’s\
    \ tablespace). Here’s the basic syntax:\n\nalter table <table_name> move lob(<lob_name>)\
    \ store as (tablespace <new_tablespace); The next example moves the LOB column\
    \ to the INV_CLOB tablespace:\n\nalter table patchmain\n\nmove lob(patch_desc)\n\
    \nstore as basicfile (tablespace inv_clob);\n\nYou can verify that the LOB was\
    \ moved by querying USER_LOBS:\n\nSQL> select table_name, column_name, tablespace_name\
    \ from user_lobs; If the LOB column is populated with large amounts of data, you\
    \ almost always want to store the LOB\n\nin a tablespace separate from the rest\
    \ of the table data. In these scenarios, the LOB data has different growth and\
    \ storage requirements and is best maintained in its own tablespace.\n\nAdding\
    \ a LOB Column\n\nIf you have an existing table to which you want to add a LOB\
    \ column, use the ALTER TABLE...ADD\n\nstatement. The next statement adds the\
    \ INV_IMAGE column to a table:\n\nSQL> alter table inv add(inv_image blob);\n\n\
    This statement is fine for quickly adding a LOB column to a development environment.\
    \ For anything else, you should specify the storage characteristics. For example,\
    \ this specifies that a SecureFile LOB is created in the LOB_DATA tablespace:\n\
    \nalter table inv add(inv_image blob)\n\nlob(inv_image) store as securefile(tablespace\
    \ lob_data);\n\nRemoving a LOB Column\n\nYou may have a scenario where your business\
    \ requirements change and you no longer need a column.\n\nBefore you remove a\
    \ column, consider renaming it so that you can better identify whether any applications\
    \ or users are still accessing it:\n\nSQL> alter table patchmain rename column\
    \ patch_desc to patch_desc_old; 253\n\nCHAPTER 11 ■ LARGE OBJECTS\n\nAfter you\
    \ determine that nobody is using the column, use the ALTER TABLE...DROP statement\
    \ to drop it:\n\nSQL> alter table patchmain drop(patch_desc_old);\n\nYou can also\
    \ remove a LOB column by dropping and re-creating a table (without the LOB column).\n\
    \nThis of course permanently removes any data as well.\n\nAlso keep in mind that\
    \ in Oracle Database 10 *g* or higher, if your recycle bin is enabled, then when\
    \ you don’t drop a table with the PURGE clause, space is still consumed by the\
    \ dropped table. If you want to remove the space associated with the table, use\
    \ the PURGE clause or purge the recycle bin after dropping the table.\n\nCaching\
    \ LOBs\n\nBy default, when reading and writing LOB columns, Oracle doesn’t cache\
    \ LOBs in memory. You can change the default behavior by setting the cache-related\
    \ storage options. This example specifies that Oracle should cache a LOB column\
    \ in memory:\n\ncreate table patchmain(\n\npatch_id number\n\n,patch_desc clob)\n\
    \nlob(patch_desc) store as (tablespace lob_data cache);\n\nYou can verify the\
    \ LOB caching with this query:\n\nSQL> select table_name, column_name, cache from\
    \ user_lobs;\n\nHere’s some sample output:\n\nTABLE_NAME COLUMN_NAME CACHE\n\n\
    -------------------- -------------------- ----------\n\nPATCHMAIN PATCH_DESC YES\n\
    \nTable 11–3 describes the memory cache settings related to LOBs. If you have\
    \ LOBs that are frequently read and written to, consider using the CACHE option.\
    \ If your LOB column is read frequently but rarely written to, then the CACHE\
    \ READS setting is more appropriate. If the LOB column is infrequently read or\
    \ written to, then the NOCACHE setting is suitable.\n\n***Table 11–3.** Cache\
    \ Descriptions Regarding LOB Columns*\n\n**Cache Setting**\n\n**Meaning**\n\n\
    CACHE\n\nOracle should place LOB data in the buffer cache for faster access.\n\
    \nCACHE READS\n\nOracle should place LOB data in the buffer cache for reads but\
    \ not for writes.\n\nNOCACHE\n\nLOB data shouldn’t be placed in the buffer cache.\
    \ This is the default for both SecureFile and BasicFile LOBs.\n\nCHAPTER 11 ■\
    \ LARGE OBJECTS\n\nStoring LOBs In and Out of Line\n\nBy default, up to approximately\
    \ 4000 characters of a LOB column are stored in line with the table row. If the\
    \ LOB is over 4000 characters, then Oracle automatically stores the LOB outside\
    \ of the row data. The main advantage of storing a LOB in row is that small LOBs\
    \ (less than 4000 characters) require less I/O, because Oracle doesn’t have to\
    \ search out of row for the LOB data.\n\nHowever, storing LOB data in row isn’t\
    \ always desirable. The disadvantage of storing LOBs in row is that the table\
    \ row sizes are potentially longer. This can impact the performance of full-table\
    \ scans, range scans, and updates to columns other than the LOB column. In these\
    \ situations, you may want to disable storage in the row. For example, you explicitly\
    \ instruct Oracle to store the LOB outside of the row with the DISABLE STORAGE\
    \ IN ROW clause:\n\ncreate table patchmain(\n\npatch_id number\n\n,patch_desc\
    \ clob\n\n,log_file blob)\n\nlob(patch_desc, log_file)\n\nstore as (\n\ntablespace\
    \ lob_data\n\ndisable storage in row);\n\nIf you want to store up to 4000 characters\
    \ of a LOB in the table row, use the ENABLE STORAGE IN ROW\n\nclause when creating\
    \ the table:\n\ncreate table patchmain(\n\npatch_id number\n\n,patch_desc clob\n\
    \n,log_file blob)\n\nlob(patch_desc, log_file)\n\nstore as (\n\ntablespace lob_data\n\
    \nenable storage in row);\n\n■ **Note** The LOB locator is always stored in line\
    \ with the row.\n\nYou can’t modify the LOB storage in a row after the table has\
    \ been created. The only ways to alter storage in row is to either move the LOB\
    \ column or drop and re-create the table. This example alters the storage in row\
    \ by moving the LOB column:\n\nalter table patchmain\n\nmove lob(patch_desc)\n\
    \nstore as (enable storage in row);\n\nYou can verify the in-row storage via the\
    \ IN_ROW column of USER_LOBS: select\n\ntable_name\n\n,column_name\n\n,tablespace_name\n\
    \nCHAPTER 11 ■ LARGE OBJECTS\n\n,in_row\n\nfrom user_lobs;\n\nA value of YES indicates\
    \ that the LOB is stored in row:\n\nTABLE_NAME COLUMN_NAME TABLESPACE_NAME IN_ROW\n\
    \n--------------- --------------- --------------- ------\n\nPATCHMAIN LOG_FILE\
    \ LOB_DATA NO\n\nPATCHMAIN PATCH_DESC LOB_DATA YES\n\nUsing SecureFile Features\n\
    \nAs mentioned previously in this chapter, the SecureFile LOB architecture allows\
    \ you to compress LOB\n\ncolumns, eliminate duplicates, and transparently encrypt\
    \ LOB data. These features provide high performance and manageability of LOB data\
    \ and are available in Oracle Database 11 *g* and higher. The next few subsections\
    \ cover features specific to SecureFiles.\n\nCompressing LOBs\n\nIf you’re using\
    \ SecureFile LOBs, then you can specify a degree of compression. The benefit is\
    \ that the LOBs consume much less space in the database. The downside is that\
    \ reading and writing the LOBs may take longer. See Table 11–4 for a description\
    \ of the compression values.\n\nThis example creates a CLOB column with a low\
    \ degree of compression:\n\nCREATE TABLE patchmain(\n\npatch_id NUMBER\n\n,patch_desc\
    \ CLOB)\n\nLOB(patch_desc) STORE AS SECUREFILE\n\n(COMPRESS LOW)\n\nTABLESPACE\
    \ inv_clob;\n\n***Table 11–4.** Degrees of Compression Available with SecureFile\
    \ LOBs* **Compression Type**\n\n**Description**\n\nHIGH\n\nHighest degree of compression.\
    \ Incurs higher\n\nlatency when reading and writing the LOB.\n\nMEDIUM\n\nMedium\
    \ level of compression. Default value if\n\ncompression is specified but with\
    \ no degree.\n\nLOW\n\nLowest level of compression. Provides the lowest\n\nlatency\
    \ when reading and writing the LOB.\n\nCOMPRESS clause isn’t specified.\n\nNo\
    \ compression is used if you don’t specify the\n\nCOMPRESS clause.\n\nIf a LOB\
    \ has been created as a SecureFile, you can alter its compression level. For example,\
    \ this changes the compression to HIGH:\n\nCHAPTER 11 ■ LARGE OBJECTS\n\nALTER\
    \ TABLE patchmain\n\nMODIFY LOB(patch_desc)\n\n(COMPRESS HIGH);\n\nIf you create\
    \ a LOB with compression but decide that you don’t want to use the feature, you\
    \ can alter the LOB to have no compression via the NOCOMPRESS clause:\n\nALTER\
    \ TABLE patchmain\n\nMODIFY LOB(patch_desc)\n\n(NOCOMPRESS);\n\n■ **Tip** Try\
    \ to enable compression, deduplication, and encryption through a CREATE TABLE\
    \ statement. If you use an ALTER TABLE statement, the table is locked while the\
    \ LOB is modified.\n\nDeduplicating LOBs\n\nIf you have an application where identical\
    \ LOBs are associated with two or more rows, you should consider using the SecureFile\
    \ deduplication feature. When enabled, this instructs Oracle to check when a new\
    \ LOB is inserted into a table and see whether that LOB is already stored in another\
    \ row (for the same LOB column). If it’s already stored, then Oracle stores a\
    \ pointer to the existing identical LOB. This can potentially mean huge space\
    \ savings for your application.\n\n■ **Note** Deduplication requires the Oracle\
    \ Advanced Compression option. See the Oracle Database Licensing Information guide\
    \ (available on OTN) for more information.\n\nThis example creates a LOB column\
    \ using the deduplication feature:\n\nCREATE TABLE patchmain(\n\npatch_id NUMBER\n\
    \n,patch_desc CLOB)\n\nLOB(patch_desc) STORE AS SECUREFILE\n\n(DEDUPLICATE)\n\n\
    TABLESPACE inv_clob;\n\nTo verify that the deduplication feature is in effect,\
    \ run this query: select\n\ntable_name\n\n,column_name\n\n,deduplication\n\nfrom\
    \ user_lobs;\n\nCHAPTER 11 ■ LARGE OBJECTS\n\nHere’s some sample output:\n\nTABLE_NAME\
    \ COLUMN_NAME DEDUPLICATION\n\n--------------- --------------- ---------------\n\
    \nPATCHMAIN PATCH_DESC LOB\n\nIf an existing table has a SecureFile LOB, then\
    \ you can alter the column to enable deduplication: alter table patchmain\n\n\
    modify lob(patch_desc) (deduplicate);\n\nHere’s another example that modifies\
    \ a partitioned LOB to enable deduplication: alter table patchmain modify partition\
    \ p2\n\nlob (patch_desc) (deduplicate lob);\n\nIf you decide that you don’t want\
    \ deduplication enabled, use the KEEP_DUPLICATES clause: alter table patchmain\n\
    \nmodify lob(patch_desc) (keep_duplicates);\n\nEncrypting LOBs\n\nYou can transparently\
    \ encrypt a SecureFile LOB column (just like any other column). Before you use\
    \ encryption features, you must set up an encryption *wallet*. If you don’t know\
    \ how to setup a wallet, I’ve included a sidebar at the end of this subsection\
    \ that describes this task. Also, see the *Oracle Advanced* *Security* guide (available\
    \ on OTN) for more details.\n\n■ **Note** The SecureFile encryption feature requires\
    \ a license for the Oracle Advanced Security Option. See the Oracle Database Licensing\
    \ Information guide (available on OTN) for more information.\n\nThe ENCRYPT clause\
    \ enables SecureFile encryption using Oracle Transparent Data Encryption (TDE).\n\
    \nThe following example enables encryption for the PATCH_DESC LOB column: CREATE\
    \ TABLE patchmain(\n\npatch_id number\n\n,patch_desc clob)\n\nLOB(patch_desc)\
    \ STORE AS SECUREFILE (encrypt)\n\ntablespace inv_clob;\n\nWhen you describe the\
    \ table, the LOB column now shows that encryption is in effect: SQL> desc patchmain;\n\
    \nName Null? Type\n\n----------------------------------------- -------- ----------------------------\n\
    \nPATCH_ID NUMBER\n\nPATCH_DESC CLOB ENCRYPT\n\n![](index-293_1.png)\n\nCHAPTER\
    \ 11 ■ LARGE OBJECTS\n\nThe wallet must be open for TDE to work. If the wallet\
    \ is closed, you can’t access encrypted columns. If you stop and restart your\
    \ database, you must reopen the wallet before you can access encrypted columns.\n\
    \nSQL> alter system set encryption wallet open authenticated by \"foobar\"; In\
    \ the prior statement, you must use the same password that you used when you created\
    \ the wallet: Migrating BasicFiles to SecureFiles\n\nYou can migrate BasicFile\
    \ LOB data to SecureFiles via one of the following methods:\n\n• Create a new\
    \ table, load the data from the old table, and rename the tables.\n\n• Move the\
    \ table.\n\n• Redefine the table online.\n\nEach of these techniques is described\
    \ in the following subsections.\n\nCreating a New Table\n\nHere’s a brief example\
    \ of creating a new table and loading data from the old table. In this example,\
    \ PATCHMAIN_NEW is the new table being created with a SecureFile LOB.\n\ncreate\
    \ table patchmain_new(\n\npatch_id number\n\n,patch_desc clob)\n\nlob(patch_desc)\
    \ store as securefile (tablespace lob_data);\n\nNext, load the newly created table\
    \ with data from the old table:\n\nSQL> insert into patchmain_new select * from\
    \ patchmain;\n\nNow, rename the tables:\n\nSQL> rename patchmain to patchmain_old;\n\
    \nSQL> rename patchmain_new to patchmain;\n\nWhen using this technique, be sure\
    \ any grants that were pointing at the old table are reissued for the new table.\n\
    \nMoving a Table to a SecureFile Architecture\n\nYou can also use the ALTER TABLE...MOVE\
    \ statement to redefine the storage of a LOB as a SecureFile. For example:\n\n\
    alter table patchmain\n\nmove lob(patch_desc)\n\nstore as securefile (tablespace\
    \ inv_clob);\n\nYou can verify that the column is now a SecureFile via this query:\n\
    \nSQL> select table_name, column_name, securefile from user_lobs;\n\nCHAPTER 11\
    \ ■ LARGE OBJECTS\n\nThe SECUREFILE column now has a value of YES:\n\nTABLE_NAME\
    \ COLUMN_NAME SEC\n\n--------------- --------------- ---\n\nPATCHMAIN PATCH_DESC\
    \ YES\n\nOnline Redefinition\n\nYou can also redefine a table while it’s online\
    \ via the DBMS_REDEFINITION package. Use the following steps to do an online redefinition:\n\
    \n1\\. Ensure that the table has a primary key. If the table doesn’t have a primary\
    \ key, then create one:\n\nalter table patchmain\n\nadd constraint patchmain_pk\n\
    \nprimary key (patch_id);\n\n2\\. Create a new table that defines the LOB column(s)\
    \ as SecureFile:\n\ncreate table patchmain_new(\n\npatch_id number\n\n,patch_desc\
    \ clob)\n\nlob(patch_desc)\n\nstore as securefile (tablespace lob_data);\n\n3\\\
    . Map the columns of the new table to the original table:\n\ndeclare\n\nl_col_map\
    \ varchar2(2000);\n\nbegin\n\nl_col_map := 'patch_id patch_id, patch_desc patch_desc';\n\
    \ndbms_redefinition.start_redef_table(\n\n'DARL','PATCHMAIN','PATCHMAIN_NEW',l_col_map\n\
    \n);\n\nend;\n\n/\n\n4\\. Copy the data (this can take a long time if there are\
    \ many rows): set serverout on size 1000000\n\ndeclare\n\nl_err_cnt integer :=0;\n\
    \nbegin\n\ndbms_redefinition.copy_table_dependents(\n\n'DARL','PATCHMAIN','PATCHMAIN_NEW',1,TRUE,\
    \ TRUE, TRUE, FALSE, l_err_cnt\n\n);\n\ndbms_output.put_line('Num Errors: ' ||\
    \ l_err_cnt);\n\nend;\n\n/\n\n5\\. Finish the redefinition:\n\nbegin\n\ndbms_redefinition.finish_redef_table('DARL','PATCHMAIN','PATCHMAIN_NEW');\
    \ end;\n\n/\n\nCHAPTER 11 ■ LARGE OBJECTS\n\nYou can confirm that the table has\
    \ been redefined via this query:\n\nSQL> select table_name, column_name, securefile\
    \ from user_lobs;\n\nHere’s the output for this example:\n\nTABLE_NAME COLUMN_NAME\
    \ SECUREFILE\n\n-------------------- -------------------- --------------------\n\
    \nPATCHMAIN_NEW PATCH_DESC NO\n\nPATCHMAIN PATCH_DESC YES\n\nViewing LOB Metadata\n\
    \nYou can use any of the DBA/ALL/USER_LOBS views to display information about\
    \ LOBs in your database: select\n\ntable_name\n\n,column_name\n\n,index_name\n\
    \n,tablespace_name\n\nfrom all_lobs\n\norder by table_name;\n\nTable 11–5 describes\
    \ the columns available with DBA/ALL_LOBS:\n\n***Table 11–5.** ALL_LOBS Column\
    \ Descriptions*\n\n**Column Description**\n\nOWNER\n\nOwner of the object that\
    \ contains the LOB.\n\nTABLE_NAME\n\nTable name that contains the LOB.\n\nCOLUMN_NAME\n\
    \nColumn name of the LOB.\n\nSEGMENT_NAME\n\nSegment name of the LOB.\n\nTABLESPACE_NAME\n\
    \nTablespace name that contains the LOB.\n\nINDEX_NAME\n\nIndex name of the LOB.\n\
    \nCHUNK\n\nSize in bytes of the LOB chunk.\n\nPCTVERSION\n\nMaximum percentage\
    \ of LOB space used for versioning.\n\nRETENTION\n\nMaximum time duration for\
    \ versioning of LOB space.\n\nFREEPOOLS\n\nNumber of free pools for the LOB.\n\
    \nCACHE\n\nYES indicates that the LOB data is placed in the buffer cache. NO indicates\
    \ that the LOB data isn’t placed in the buffer cache. CACHEREADS indicates that\
    \ the LOB is brought into the cache for read operations only.\n\nLOGGING\n\nWhether\
    \ changes to the LOB are logged in the redo stream.\n\nCHAPTER 11 ■ LARGE OBJECTS\n\
    \n**Column Description**\n\nENCRYPT\n\nWhether the LOB is encrypted.\n\nCOMPRESSION\n\
    \nDegree of compression,\n\nDEDUPLICATION\n\nWhether deduplication is used for\
    \ the LOB.\n\nIN_ROW\n\nWhether some of the LOB is stored in line with the row.\n\
    \nFORMAT\n\nWhether the LOB storage format depends on the endianness of the platform.\n\
    \nPARTITIONED\n\nWhether the LOB is in a partitioned table.\n\nSECUREFILE\n\n\
    Whether the LOB architecture is SecureFile.\n\nSEGMENT_CREATED\n\nWhether the\
    \ LOB segment has been created.\n\nAlso keep in mind that a LOB segment has a\
    \ corresponding index segment. Thus you can query both the segment and the index\
    \ in the DBA/ALL/USER_SEGMENTS views for LOB information: select\n\nsegment_name\n\
    \n,segment_type\n\n,tablespace_name\n\nfrom user_segments\n\nwhere segment_name\
    \ like 'SYS_LOB%'\n\nor segment_name like 'SYS_IL%';\n\nLoading LOBs\n\nLoading\
    \ LOB data isn’t typically the DBA’s job, but you should be familiar with techniques\
    \ used to populate LOB columns. Developers may come to you for help with troubleshooting,\
    \ performance, or space-related issues.\n\nLoading a CLOB\n\nFirst, create an\
    \ Oracle database directory object that points to the operating system directory\
    \ in which the CLOB file is stored. This directory object is used when loading\
    \ the CLOB. In this example, the Oracle directory object is named LOAD_LOB and\
    \ the operating system directory is /home/oracle/scripts: SQL> create or replace\
    \ directory load_lob as '/home/oracle/scripts'; For reference, listed next is\
    \ the DDL used to create the table in which the CLOB file is loaded: create table\
    \ patchmain(\n\npatch_id number primary key\n\n,patch_desc clob\n\n,patch_file\
    \ blob)\n\nlob(patch_desc, patch_file)\n\nstore as securefile (compress low) tablespace\
    \ lob_data;\n\nCHAPTER 11 ■ LARGE OBJECTS\n\nThis example also uses a sequence\
    \ named PATCH_SEQ. Here’s the sequence-creation script: SQL> create sequence patch_seq;\n\
    \nThe following bit of code uses the DBMS_LOB package to load a text file (named\
    \ patch.txt) into a CLOB\n\ncolumn. In this example, the table name is PATCHMAIN\
    \ and the CLOB column is PATCH_DESC: declare\n\nsrc_clb bfile; -- point to source\
    \ CLOB on file system\n\ndst_clb clob; -- destination CLOB in table\n\nsrc_doc_name\
    \ varchar2(300) := 'patch.txt';\n\nsrc_offset integer := 1; -- where to start\
    \ in the source CLOB\n\ndst_offset integer := 1; -- where to start in the target\
    \ CLOB\n\nlang_ctx integer := dbms_lob.default_lang_ctx;\n\nwarning_msg number;\
    \ -- returns warning value if bad chars\n\nbegin\n\nsrc_clb := bfilename('LOAD_LOB',src_doc_name);\
    \ -- assign pointer to file\n\n--\n\ninsert into patchmain(patch_id, patch_desc)\
    \ -- create LOB placeholder values(patch_seq.nextval, empty_clob())\n\nreturning\
    \ patch_desc into dst_clb;\n\n--\n\ndbms_lob.open(src_clb, dbms_lob.lob_readonly);\
    \ -- open file\n\n--\n\n-- load the file into the LOB\n\ndbms_lob.loadclobfromfile(\n\
    \ndest_lob => dst_clb,\n\nsrc_bfile => src_clb,\n\namount => dbms_lob.lobmaxsize,\n\
    \ndest_offset => dst_offset,\n\nsrc_offset => src_offset,\n\nbfile_csid => dbms_lob.default_csid,\n\
    \nlang_context => lang_ctx,\n\nwarning => warning_msg\n\n);\n\ndbms_lob.close(src_clb);\
    \ -- close file\n\n--\n\ndbms_output.put_line('Wrote CLOB: ' || src_doc_name);\n\
    \nend;\n\n/\n\nYou can place this code in a file and execute it from the SQL command\
    \ prompt. In this example, the file that contains the code is named clob.sql:\n\
    \nSQL> set serverout on size 1000000\n\nSQL> @clob.sql\n\nHere’s the expected\
    \ output:\n\nWrote CLOB: patch.txt\n\nPL/SQL procedure successfully completed.\n\
    \nCHAPTER 11 ■ LARGE OBJECTS\n\nLoading a BLOB\n\nLoading a BLOB is similar to\
    \ loading a CLOB. This example uses the same directory object, table, and sequence\
    \ from the previous example, which loaded a CLOB. Loading a BLOB is simpler than\
    \ loading a CLOB\n\nbecause you don’t have to specify character-set information.\n\
    \nThis example loads a file named patch.zip into the PATCH_FILE BLOB column: declare\n\
    \nsrc_blb bfile; -- point to source BLOB on file system\n\ndst_blb blob; -- destination\
    \ BLOB in table\n\nsrc_doc_name varchar2(300) := 'patch.zip';\n\nsrc_offset integer\
    \ := 1; -- where to start in the source BLOB\n\ndst_offset integer := 1; -- where\
    \ to start in the target BLOB\n\nbegin\n\nsrc_blb := bfilename('LOAD_LOB',src_doc_name);\
    \ -- assign pointer to file\n\n--\n\ninsert into patchmain(patch_id, patch_file)\n\
    \nvalues(patch_seq.nextval, empty_blob())\n\nreturning patch_file into dst_blb;\
    \ -- create LOB placeholder column first dbms_lob.open(src_blb, dbms_lob.lob_readonly);\n\
    \n--\n\ndbms_lob.loadblobfromfile(\n\ndest_lob => dst_blb,\n\nsrc_bfile => src_blb,\n\
    \namount => dbms_lob.lobmaxsize,\n\ndest_offset => dst_offset,\n\nsrc_offset =>\
    \ src_offset\n\n);\n\ndbms_lob.close(src_blb);\n\ndbms_output.put_line('Wrote\
    \ BLOB: ' || src_doc_name);\n\nend;\n\n/\n\nYou can place this code in a file\
    \ and run it from the SQL command prompt. In this example, the file that contains\
    \ the code is named blob.sql:\n\nSQL> set serverout on size 1000000\n\nSQL> @blob.sql\n\
    \nHere’s the expected output:\n\nWrote BLOB: patch.zip\n\nPL/SQL procedure successfully\
    \ completed.\n\nMeasuring LOB Space Consumed\n\nAs mentioned previously in this\
    \ chapter, a LOB consists of an in-row lob locator, a LOB index, and a LOB\n\n\
    segment that consists of one or more chunks. The space used by the LOB index is\
    \ usually negligible compared to the space used by the LOB segment. You can view\
    \ the space consumed by a segment by querying the BYTES column of DBA/ALL/USER_SEGMENTS\
    \ (just like any other segment in the database).\n\nHere’s a sample query:\n\n\
    select\n\nsegment_name\n\nCHAPTER 11 ■ LARGE OBJECTS\n\n,segment_type\n\n,segment_subtype\n\
    \n,bytes/1024/1024 meg_bytes\n\nfrom user_segments;\n\nYou can modify the query\
    \ to specifically report on only LOBs by joining to the USER_LOBS view: select\n\
    \na.table_name\n\n,a.column_name\n\n,a.segment_name\n\n,a.index_name\n\n,b.bytes/1024/1024\
    \ meg_bytes\n\nfrom user_lobs a\n\n,user_segments b\n\nwhere a.segment_name =\
    \ b.segment_name;\n\nYou can use the DBMS_SPACE.SPACE_USAGE package and procedure\
    \ to report on the blocks being used by a LOB. This package only works on objects\
    \ that have been created in an ASSM-managed tablespace.\n\nThere are two different\
    \ forms of the SPACE_USAGE procedure: one form reports on BasicFile LOBs, and\
    \ the other form reports on SecureFile LOBs.\n\nBasicFile Space Used\n\nHere’s\
    \ an example of how to call DBMS_SPACE.SPACE_USAGE for a BasicFile LOB: declare\n\
    \np_fs1_bytes number;\n\np_fs2_bytes number;\n\np_fs3_bytes number;\n\np_fs4_bytes\
    \ number;\n\np_fs1_blocks number;\n\np_fs2_blocks number;\n\np_fs3_blocks number;\n\
    \np_fs4_blocks number;\n\np_full_bytes number;\n\np_full_blocks number;\n\np_unformatted_bytes\
    \ number;\n\np_unformatted_blocks number;\n\nbegin\n\ndbms_space.space_usage(\n\
    \nsegment_owner => user,\n\nsegment_name => 'SYS_LOB0000024082C00002$$',\n\nsegment_type\
    \ => 'LOB',\n\nfs1_bytes => p_fs1_bytes,\n\nfs1_blocks => p_fs1_blocks,\n\nfs2_bytes\
    \ => p_fs2_bytes,\n\nfs2_blocks => p_fs2_blocks,\n\nfs3_bytes => p_fs3_bytes,\n\
    \nfs3_blocks => p_fs3_blocks,\n\nfs4_bytes => p_fs4_bytes,\n\nfs4_blocks => p_fs4_blocks,\n\
    \nfull_bytes => p_full_bytes,\n\nfull_blocks => p_full_blocks,\n\nCHAPTER 11 ■\
    \ LARGE OBJECTS\n\nunformatted_blocks => p_unformatted_blocks,\n\nunformatted_bytes\
    \ => p_unformatted_bytes\n\n);\n\ndbms_output.put_line('Full bytes = '||p_full_bytes);\n\
    \ndbms_output.put_line('Full blocks = '||p_full_blocks);\n\ndbms_output.put_line('UF\
    \ bytes = '||p_unformatted_bytes);\n\ndbms_output.put_line('UF blocks = '||p_unformatted_blocks);\n\
    \nend;\n\n/\n\nIn this PL/SQL, you need to modify the code so that it reports\
    \ on the LOB segment in your environment.\n\nSecureFile Space Used\n\nHere’s an\
    \ example of how to call DBMS_SPACE.SPACE_USAGE for a SecureFile LOB: DECLARE\n\
    \nl_segment_owner varchar2(40);\n\nl_table_name varchar2(40);\n\nl_segment_name\
    \ varchar2(40);\n\nl_segment_size_blocks number;\n\nl_segment_size_bytes number;\n\
    \nl_used_blocks number;\n\nl_used_bytes number;\n\nl_expired_blocks number;\n\n\
    l_expired_bytes number;\n\nl_unexpired_blocks number;\n\nl_unexpired_bytes number;\n\
    \n--\n\nCURSOR c1 IS\n\nSELECT owner, table_name, segment_name\n\nFROM dba_lobs\n\
    \nWHERE table_name = 'PATCHMAIN2';\n\nBEGIN\n\nFOR r1 IN c1 LOOP\n\nl_segment_owner\
    \ := r1.owner;\n\nl_table_name := r1.table_name;\n\nl_segment_name := r1.segment_name;\n\
    \n--\n\ndbms_output.put_line('-----------------------------');\n\ndbms_output.put_line('Table\
    \ Name : ' || l_table_name);\n\ndbms_output.put_line('Segment Name : ' || l_segment_name);\n\
    \n--\n\ndbms_space.space_usage(\n\nsegment_owner => l_segment_owner,\n\nsegment_name\
    \ => l_segment_name,\n\nsegment_type => 'LOB',\n\npartition_name => NULL,\n\n\
    segment_size_blocks => l_segment_size_blocks,\n\nsegment_size_bytes => l_segment_size_bytes,\n\
    \nused_blocks => l_used_blocks,\n\nused_bytes => l_used_bytes,\n\nCHAPTER 11 ■\
    \ LARGE OBJECTS\n\nexpired_blocks => l_expired_blocks,\n\nexpired_bytes => l_expired_bytes,\n\
    \nunexpired_blocks => l_unexpired_blocks,\n\nunexpired_bytes => l_unexpired_bytes\n\
    \n);\n\n--\n\ndbms_output.put_line('segment_size_blocks: '|| l_segment_size_blocks);\
    \ dbms_output.put_line('segment_size_bytes : '|| l_segment_size_bytes); dbms_output.put_line('used_blocks\
    \ : '|| l_used_blocks);\n\ndbms_output.put_line('used_bytes : '|| l_used_bytes);\n\
    \ndbms_output.put_line('expired_blocks : '|| l_expired_blocks);\n\ndbms_output.put_line('expired_bytes\
    \ : '|| l_expired_bytes);\n\ndbms_output.put_line('unexpired_blocks : '|| l_unexpired_blocks);\n\
    \ndbms_output.put_line('unexpired_bytes : '|| l_unexpired_bytes);\n\nEND LOOP;\n\
    \nEND;\n\n/\n\nAgain, in this PL/SQL, you need to modify the code so that it reports\
    \ on the table with the LOB\n\nsegment in your environment.\n\nSummary\n\nOracle\
    \ lets you store large objects in databases via various LOB data types. LOBs facilitate\
    \ the storage, management, and retrieval of video clips, images, movies, word-processing\
    \ documents, large text files, and so on. Oracle can store these files in the\
    \ database and thus provide backup and recovery and security protection (just\
    \ as it does for any other data type). Oracle’s CLOB data type is used to store\
    \ large character text files that exceed 4000 characters (the maximum length of\
    \ a VARCHAR2 column). BLOBs are used to store binary files such as images (JPEG\
    \ or MPEG), movie files, sound files, and so on. If it’s not feasible to store\
    \ the file in the database, you can use a BFILE LOB.\n\nOracle provides two underlying\
    \ architectures for LOBS: BasicFile and SecureFile. BasicFile is the LOB architecture\
    \ that has been available since Oracle version 8\\. The SecureFile feature was\
    \ introduced in Oracle Database 11 *g*. SecureFile has many advanced options such\
    \ as compression, deduplication, and encryption (these specific features require\
    \ an extra license from Oracle).\n\nLOBs provide a way to manage very large files.\
    \ Oracle has another feature, partitioning, which allows you to manage very large\
    \ tables and indexes. Partitioning is covered in detail in the next chapter.\n\
    \n![](index-303_1.png)\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\n**Term\
    \ Meaning**\n\nPartition pruning\n\nElimination of unnecessary partitions. Oracle\
    \ detects which partitions need to be accessed by a SQL statement and removes\
    \ (prunes) any partitions that aren’t needed.\n\nPartition-wise join\n\nJoin executed\
    \ in partition-sized pieces to improve performance by executing many smaller tasks\
    \ in parallel rather than one, large task in sequence.\n\nLocal partitioned index\n\
    \nIndex that uses the same partition key as its table.\n\nGlobal partitioned index\n\
    \nIndex that doesn’t use the same partition key as its table.\n\nGlobal nonpartitioned\n\
    \nRegular index created on a partitioned table. The index itself isn’t\n\nindexed\n\
    \npartitioned.\n\nIf you work with mainly small online transaction processing\
    \ (OLTP) databases, you probably don’t need to create partitioned tables and indexes.\
    \ However, if you work with large OLTP databases or in data-warehouse environments,\
    \ you can most likely benefit from partitioning. Partitioning is a key to designing\
    \ and building scalable and highly available database systems.\n\nWhat Tables\
    \ Should Be Partitioned?\n\nFollowing are some rules of thumb for determining\
    \ whether to partition a table. In general, you should consider partitioning for\n\
    \n• Tables that are over 2GB in size.\n\n• Tables that have more than 10 million\
    \ rows, when SQL operations are getting slower as more data is added.\n\n• Tables\
    \ you know will grow large. It’s better to create a table as partitioned rather\
    \ than rebuild it as partitioned after performance begins to suffer as the table\
    \ grows.\n\n• Tables that have rows that can be divided in a way that facilitates\
    \ parallel operations like loading, retrieval, or backup and recovery.\n\n• Tables\
    \ for which you want to archive the oldest partition on a periodic basis, and\
    \ tables from which you want to drop the oldest partition regularly as data becomes\
    \ stale.\n\nOne rule is that any table over 2GB in size is a potential candidate\
    \ for partitioning. Run this query to show the top space-consuming objects in\
    \ your database:\n\nselect * from (\n\nselect\n\nowner\n\n,segment_name\n\n,segment_type\n\
    \n,partition_name\n\n,sum(extents) num_ext\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE\
    \ AND CONQUER\n\n,sum(bytes)/1024/1024 meg_tot\n\nfrom dba_segments\n\ngroup by\
    \ owner, segment_name, segment_type, partition_name\n\norder by sum(extents) desc)\n\
    \nwhere rownum <= 10;\n\nHere’s a snippet of the output from the query:\n\nOWNER\
    \ SEGMENT_NAME SEGMENT_TYPE PARTITION_NAME NUM_EXT MEG_TOT\n\n------- --------------------\
    \ ---------------- -------------- -------- --------\n\nREP_MV REG_QUEUE_REP_ARCH\
    \ TABLE 29,218 29,218\n\nREP_MV REG_QUEUE_REP TABLE 15,257 15,257\n\nSTAR2 F_INSTALLATIONS\
    \ TABLE PARTITION INST_P_6 4,092 4,092\n\nThis output shows that a few large tables\
    \ in this database may benefit from partitioning. For this database, if there\
    \ are performance issues with these large objects, then partitioning may help.\n\
    \nIf you’re running the previous query from SQL*Plus, you need to apply some formatting\
    \ to the columns to reasonably display the output within the limited width of\
    \ your terminal: set lines 132\n\ncol owner form a10\n\ncol segment_name form\
    \ a20\n\ncol partition_name form a15\n\nIn addition to looking at the size of\
    \ objects, if you can divide your data so that it facilitates operations such\
    \ as loading data, querying, backups, archiving, and deleting, you should consider\
    \ using partitioning. For example, if you work with a large table that contains\
    \ data that is often accessed by a particular time range—such as by day, week,\
    \ month, or year—it makes sense to consider partitioning.\n\nA large table size\
    \ combined with a good business reason means you should consider partitioning.\n\
    \nKeep in mind that there is more setup work and maintenance when you partition\
    \ a table. However, as mentioned earlier, it’s much easier to partition a table\
    \ during setup than it is to convert it after it’s grown to an unwieldy size.\n\
    \n■ **Note** Partitioning is an extra-cost option that is available only with\
    \ the Oracle Enterprise Edition. You have to decide based on your business requirements\
    \ whether partitioning is worth the cost.\n\nCreating Partitioned Tables\n\nOracle\
    \ provides a robust set of methods for dividing tables and indexes into smaller\
    \ subsets. For example, you can divide a table’s data by date ranges, such as\
    \ by month or year. Table 12–2 gives an overview of the partitioning strategies\
    \ available.\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\n***Table 12–2.**\
    \ Partitioning Strategies*\n\n**Partition Type**\n\n**Description**\n\nRange\n\
    \nAllows partitioning based on ranges of dates, numbers, or characters.\n\nList\n\
    \nUseful when the partitions fit nicely into a list of values, like state or region\
    \ codes.\n\nHash\n\nAllows even distribution of rows when there is no obvious\
    \ partitioning key.\n\nComposite\n\nAllows combinations of other partitioning\
    \ strategies.\n\nInterval\n\nExtends range partitioning by automatically allocating\
    \ new partitions when new partition key values exceed the existing high range.\n\
    \nReference\n\nUseful for partitioning a child table based on a parent table column.\n\
    \nVirtual\n\nAllows partitioning on a virtual column.\n\nSystem\n\nAllows the\
    \ application inserting the data to determine which partition should be used.\n\
    \nThe following subsections show examples of each partitioning strategy. In addition,\
    \ you learn how to place partitions into separate tablespaces; to take advantage\
    \ of all the benefits of partitioning, you need to understand how to assign a\
    \ partition to its own tablespace.\n\nPartitioning by Range\n\nRange partitioning\
    \ is frequently used. This strategy instructs Oracle to place rows in partitions\
    \ based on ranges of values such as dates or numbers. As data is inserted into\
    \ a range-partitioned table, Oracle determines which partition to place a row\
    \ in based on the lower and upper bound of each range partition.\n\nThe range-based\
    \ partition key is defined by the PARTITION BY RANGE clause in the CREATE TABLE\n\
    \nstatement. This determines which column is used to determine which partition\
    \ a row belongs in. You’ll see some examples shortly.\n\nEach range partition\
    \ requires a VALUES LESS THAN clause that identifies the non-inclusive value of\
    \ the upper bound of the range. The first partition defined for a range has no\
    \ lower bound. Any value less than the first partition's VALUES LESS THAN clause\
    \ are inserted into the first partition. For partitions other than the first partition,\
    \ the lower bound of a range is determined by the upper bound of the previous\
    \ partition.\n\nOptionally, you can create a range-partitioned table’s highest\
    \ partition with the MAXVALUE clause.\n\nAny row inserted that doesn’t have a\
    \ partition key that falls in any lower ranges is inserted into this topmost MAXVALUE\
    \ partition.\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\nUsing a NUMBER\
    \ for the Partition Key Column\n\nLet’s look at an example to illustrate the previous\
    \ concepts. Suppose you’re working in a data-warehouse environment where you typically\
    \ have a fact table that stores information about an event (such as registrations,\
    \ sales, downloads, and so forth). In this scenario the fact table contains a\
    \ number column that represents a date. For example, the value 20110101 represents\
    \ January 1, 2011\\. You want to partition the fact table based on this number\
    \ column. This SQL statement creates a table with three partitions based on a\
    \ range of numbers:\n\ncreate table f_regs\n\n(reg_count number\n\n,d_date_id\
    \ number\n\n)\n\npartition by range (d_date_id)(\n\npartition p_2010 values less\
    \ than (20110101),\n\npartition p_2011 values less than (20120101),\n\npartition\
    \ p_max values less than (maxvalue)\n\n);\n\n **When creating a range-partitioned\
    \ table, you don’t have to specify a MAXVALUE partition. However, if you don’t\
    \ specify a partition with the MAXVALUE clause, and you attempt to insert a row\
    \ that doesn’t fall in any other defined ranges, you receive an error such as\n\
    \nORA-14400: inserted partition key does not map to any partition\n\nWhen you\
    \ see that error, you have to add a partition that accommodates the partition-key\
    \ value being inserted or add a partition with the MAXVALUE clause.\n\n■ **Tip**\
    \ If you’re using Oracle Database 11g or higher, consider using an interval partitioning\
    \ strategy in which partitions are automatically added by Oracle when the high\
    \ range value is exceeded. This topic is covered a bit later in the section “Creating\
    \ Partitions on Demand.”\n\nYou can view information about the partitioned table\
    \ you just created by running the following query:\n\nselect\n\ntable_name\n\n\
    ,partitioning_type\n\n,def_tablespace_name\n\nfrom user_part_tables\n\nwhere table_name='F_REGS';\n\
    \nHere’s a snippet of the output:\n\nTABLE_NAME PARTITION DEF_TABLESPACE_NAME\n\
    \n-------------------- --------- -------------------------\n\nF_REGS RANGE USERS\n\
    \n![](index-308_1.png)\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\nEOF\n\
    \n#\n\nif [ $? -ne 0 ]; then\n\nmailx -s \"Partition range issue: f_regs\" dkuhn@oracle.com\
    \ <<EOF\n\ncheck f_regs high range.\n\nEOF\n\nelse\n\necho \"f_regs ok\"\n\nfi\n\
    \n#\n\nexit 0\n\nEnsure that you don’t inadvertently add data to a production\
    \ table with a script like this. You have to modify this script carefully to match\
    \ your table and high-range partition-key column.\n\nUsing a TIMESTAMP for the\
    \ Partition Key Column\n\nYou may have noticed that the example in the previous\
    \ section created the column D_DATE_ID as a NUMBER data type instead of a DATE\
    \ data type for the F_REGS table. One technique sometimes employed in data-warehouse\
    \ environments uses an intelligent surrogate key for the primary key of the D_DATES\n\
    \ndimension. It’s intelligent because the key number represents a date. This lets\
    \ you partition the fact table (F_REGS) on a range of numbers that always represent\
    \ a date. Sometimes data-warehouse architects find this type of partitioning easier\
    \ to work with than DATE- or TIMESTAMP-based fields.\n\nTo illustrate the previous\
    \ point, the following example creates the F_REGS table with a TIMESTAMP\n\ndata\
    \ type for the D_DATE_DTT column:\n\ncreate table f_regs\n\n(reg_count number\n\
    \n,d_date_dtt timestamp\n\n)\n\npartition by range (d_date_dtt)(\n\npartition\
    \ p_2010 values less than (to_date('01-jan-2011','dd-mon-yyyy')), partition p_2011\
    \ values less than (to_date('01-jan-2012','dd-mon-yyyy')), partition p_max values\
    \ less than (maxvalue)\n\n);\n\nAs shown in this code, I recommend that you use\
    \ the TO_DATE function with a format mask to be sure there is no ambiguity about\
    \ how the date should be interpreted. This technique is every bit as valid as\
    \ using a NUMBER field for the partition key. Just keep in mind that whoever designs\
    \ the data-warehouse tables may have a strong opinion about which technique to\
    \ use.\n\nOne slight variation on this example leaves out the TO_DATE function.\
    \ You must then ensure that the date string you use matches a date format recognized\
    \ by Oracle. For example: create table f_regs\n\n(reg_count number\n\n,d_date_dtt\
    \ timestamp\n\n)\n\npartition by range (d_date_dtt)(\n\npartition p_2010 values\
    \ less than ('01-jan-11'),\n\npartition p_2011 values less than ('01-jan-12'),\n\
    \npartition p_max values less than (maxvalue)\n\n);\n\n![](index-310_1.png)\n\n\
    ![](index-311_1.png)\n\n![](index-312_1.png)\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE\
    \ AND CONQUER\n\ncreate table f_sales (\n\nsales_id number\n\n,amt number\n\n\
    ,d_date_id number)\n\ntablespace p1_tbsp\n\npartition by range(d_date_id)(\n\n\
    partition y11 values less than (20120101)\n\ntablespace p1_tbsp pctfree 5 pctused\
    \ 90 nologging\n\n,partition y12 values less than (20130101)\n\ntablespace p2_tbsp\
    \ pctfree 5 pctused 90 nologging\n\n,partition y13 values less than (20140101)\n\
    \ntablespace p3_tbsp pctfree 5 pctused 90 nologging\n\n);\n\nPartitioning by List\n\
    \nList partitioning works well for partitioning unordered and unrelated sets of\
    \ data. For example, say you have a large table and want to partition it by state\
    \ codes. To do so, use the PARTITION BY LIST clause of the CREATE TABLE statement.\
    \ This example uses state codes to create three list-based partitions: create\
    \ table f_sales\n\n(reg_sales number\n\n,d_date_id number\n\n,state_code varchar2(20)\n\
    \n)\n\npartition by list (state_code)\n\n( partition reg_west values ('AZ','CA','CO','MT','OR','ID','UT','NV')\n\
    \n,partition reg_mid values ('IA','KS','MI','MN','MO','NE','OH','ND')\n\n,partition\
    \ reg_rest values (default)\n\n);\n\nThe partition key for a list-partitioned\
    \ table can be only one column. Use the DEFAULT list to specify a partition for\
    \ rows that don’t match values in the list. If you don’t specify a DEFAULT list,\
    \ then an error is generated when a row is inserted with a value that doesn’t\
    \ map to the defined partitions. Run this SQL\n\nstatement to view list values\
    \ for each partition:\n\nselect\n\ntable_name\n\n,partition_name\n\n,high_value\n\
    \nfrom user_tab_partitions\n\nwhere table_name = 'F_SALES'\n\norder by 1;\n\n\
    Here’s the output for this example:\n\nTABLE_NAME PARTITION_ HIGH_VALUE\n\n----------\
    \ ---------- --------------------------------------------------\n\nF_SALES REG_MID\
    \ 'IA', 'KS', 'MI', 'MN', 'MO', 'NE', 'OH', 'ND'\n\nF_SALES REG_REST default\n\
    \nF_SALES REG_WEST 'AZ', 'CA', 'CO', 'MT', 'OR', 'ID', 'UT', 'NV'\n\nCHAPTER 11\
    \ ■ PARTITIONING: DIVIDE AND CONQUER\n\nThe HIGH_VALUE column displays the list\
    \ values defined for each partition. This column is of data type LONG. If you’re\
    \ using SQL*Plus, you may need to set the LONG variable to a value higher than\
    \ the default (80 bytes), to display the entire contents of the column:\n\nSQL>\
    \ set long 1000\n\nPartitioning by Hash\n\nSometimes a large table doesn’t contain\
    \ an obvious column by which to partition the table, whether by range or by list.\
    \ For example, suppose you have a table to store census data. Each person entered\
    \ into the table has a government-assigned unique number (such as a Social Security\
    \ Number in the US). In this scenario, you have a somewhat random primary key\
    \ that doesn’t follow a distinct pattern. This table is a candidate for partitioning\
    \ by hash because it doesn’t fit well into a range- or list-partitioning scheme.\n\
    \nHash partitioning maps rows to partitions based on an internal algorithm that\
    \ spreads data evenly across all defined partitions. You don’t have any control\
    \ over the hashing algorithm or how Oracle distributes the data. You specify how\
    \ many partitions you’d like, and Oracle divides the data evenly based on the\
    \ hash-key column.\n\nTo create hash-based partitions, use the PARTITION BY HASH\
    \ clause of the CREATE TABLE statement.\n\nThis example creates a table that is\
    \ divided into three partitions; each partition is created in its own tablespace:\n\
    \ncreate table browns(\n\nbrown_id number\n\n,bear_name varchar2(30))\n\npartition\
    \ by hash(brown_id)\n\npartitions 3\n\nstore in(tbsp1, tbsp2, tbsp3);\n\nOf course,\
    \ you have to modify details like the tablespace names to match those in your\
    \ environment. Alternatively, you can eliminate the STORE IN clause, and Oracle\
    \ places all partitions in your default tablespace. If you want to name both the\
    \ tablespaces and partitions, you can specify them as follows:\n\ncreate table\
    \ browns(\n\nbrown_id number\n\n,bear_name varchar2(30))\n\npartition by hash(brown_id)\n\
    \n(partition p1 tablespace tbsp1\n\n,partition p2 tablespace tbsp2\n\n,partition\
    \ p3 tablespace tbsp3);\n\nHash partitioning has some interesting performance\
    \ implications. All rows that share the same value for the hash key are inserted\
    \ into the same partition. This means inserts are particularly efficient, because\
    \ the hashing algorithm ensures that the data is distributed uniformly across\
    \ partitions. Also, if you typically select for a specific key value, Oracle has\
    \ to access only one partition to retrieve those rows.\n\nHowever, if you search\
    \ by ranges of values, Oracle will most likely have to search every partition\
    \ to determine which rows to retrieve. Thus range searches can perform poorly\
    \ in hash-partitioned tables.\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\
    \nBlending Different Partitioning Methods\n\nOracle allows you to partition a\
    \ table using multiple strategies ( *composite partitioning*). Suppose you have\
    \ a table that you want to partition on a number range, but you also want to subdivide\
    \ each partition by a list of regions. The following example does just that:\n\
    \ncreate table f_sales(\n\nsales_amnt number\n\n,reg_code varchar2(3)\n\n,d_date_id\
    \ number\n\n)\n\npartition by range(d_date_id)\n\nsubpartition by list(reg_code)\n\
    \n(partition p2010 values less than (20110101)\n\n(subpartition p1_north values\
    \ ('ID','OR')\n\n,subpartition p1_south values ('AZ','NM')\n\n),\n\npartition\
    \ p2011 values less than (20120101)\n\n(subpartition p2_north values ('ID','OR')\n\
    \n,subpartition p2_south values ('AZ','NM')\n\n)\n\n);\n\nYou can view subpartition\
    \ information by running the following query: select\n\ntable_name\n\n,partitioning_type\n\
    \n,subpartitioning_type\n\nfrom user_part_tables\n\nwhere table_name = 'F_SALES';\n\
    \nHere’s some sample output:\n\nTABLE_NAME PARTITION SUBPART\n\n--------------------\
    \ --------- -------\n\nF_SALES RANGE LIST\n\nRun the next query to view information\
    \ about the subpartitions:\n\nselect\n\ntable_name\n\n,partition_name\n\n,subpartition_name\n\
    \nfrom user_tab_subpartitions\n\nwhere table_name = 'F_SALES'\n\norder by\n\n\
    table_name\n\n,partition_name;\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\
    \nHere’s a snippet of the output:\n\nTABLE_NAME PARTITION_NAME SUBPARTITION_NAME\n\
    \n-------------------- -------------------- --------------------\n\nF_SALES P2010\
    \ P1_SOUTH\n\nF_SALES P2010 P1_NORTH\n\nF_SALES P2011 P2_SOUTH\n\nF_SALES P2011\
    \ P2_NORTH\n\nPrior to Oracle Database 11 *g*, composite partitioning can be implemented\
    \ as range-hash (available since version 8 *i*) and range-list (available since\
    \ version 9 *i*). Starting with Oracle Database 11 *g*, here are the composite\
    \ partitioning strategies available:\n\n• *Range-hash (8* i *):* Appropriate for\
    \ ranges that can be subdivided by a somewhat random key, like ORDER_DATE and\
    \ CUSTOMER_ID.\n\n• *Range-list (9* i *):* Useful when a range can be further\
    \ partitioned by a list, such as SHIP_DATE and STATE_CODE.\n\n• *Range-range:*\
    \ Appropriate when you have two distinct partition range values, like ORDER_DATE\
    \ and SHIP_DATE.\n\n• *List-range:* Useful when a list can be further subdivided\
    \ by a range, like REGION\n\nand ORDER_DATE.\n\n• *List-hash:* Useful for further\
    \ partitioning a list by a somewhat random key, such as STATE_CODE and CUSTOMER_ID.\n\
    \n• *List-list:* Appropriate when a list can be further delineated by another\
    \ list, such as COUNTRY_CODE and STATE_CODE.\n\nAs you can see, composite partitioning\
    \ gives you a great deal of flexibility in the way you partition your data.\n\n\
    Creating Partitions on Demand\n\nAs of Oracle Database 11 *g,* you can instruct\
    \ Oracle to automatically add partitions to range-partitioned tables. The feature\
    \ is known as *interval partitioning*. Oracle dynamically creates a new partition\
    \ when data inserted exceeds the maximum bound of the range-partitioned table.\
    \ The newly added partition is based on an interval that you specify (hence the\
    \ name *interval partitioning*).\n\nSuppose you have a range-partitioned table\
    \ and want Oracle to automatically add a partition when values are inserted above\
    \ the highest value defined for the highest range. You can use the INTERVAL\n\n\
    clause of the CREATE TABLE statement to instruct Oracle to automatically add a\
    \ partition to the high end of a range-partitioned table.\n\nThe following example\
    \ creates a table that initially has one partition with a high-value range of\
    \ 01-JAN-2012:\n\ncreate table f_sales(\n\nsales_amt number\n\n,d_date date\n\n\
    )\n\npartition by range (d_date)\n\ninterval(numtoyminterval(1, 'YEAR'))\n\nstore\
    \ in (p1_tbsp, p2_tbsp, p3_tbsp)\n\n(partition p1 values less than (to_date('01-jan-2012','dd-mon-yyyy'))\
    \ tablespace p1_tbsp);\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\nThe\
    \ first partition is created in P1_TBSP. As Oracle adds partitions, it assigns\
    \ a new partition to the tablespaces defined in the STORE IN clause (it’s supposed\
    \ to store them in a round-robin fashion, but isn’t always consistent).\n\n■ **Note**\
    \ With interval partitioning, you can specify only a single key column from the\
    \ table, and it must be either a DATE or a NUMBER data type.\n\nThe interval in\
    \ this example is one year, specified by the INTERVAL(NUMTOYMINTERVAL(1, 'YEAR'))\
    \ clause. If a record is inserted into the table with a D_DATE value greater than\
    \ or equal to 01-JAN-2012, Oracle automatically adds a new partition to the high\
    \ end of the table. You can check the details of the partition by running this\
    \ SQL statement:\n\nselect\n\ntable_name\n\n,partition_name\n\n,partition_position\n\
    \n,tablespace_name\n\n,high_value\n\nfrom user_tab_partitions\n\nwhere table_name\
    \ = 'F_SALES'\n\norder by\n\ntable_name\n\n,partition_position;\n\nHere’s some\
    \ sample output (the column headings have been shortened and the HIGH_VALUE\n\n\
    column has been cut short so the output fits on the page):\n\nTABLE_NAME PARTITION_\
    \ Part. Pos TABLESPACE HIGH_VALUE\n\n---------- ---------- --------- ----------\
    \ ------------------------------\n\nF_SALES P1 1 P1_TBSP TO_DATE(' 2012–01-01\
    \ 00:00:00'\n\nNow, insert data above the high value for the highest partition:\n\
    \nSQL> insert into f_sales values(1,sysdate+1000);\n\nHere’s what the output from\
    \ selecting from USER_TAB_PARTITIONS now shows: TABLE_NAME PARTITION_ Part. Pos\
    \ TABLESPACE HIGH_VALUE\n\n---------- ---------- --------- ---------- ------------------------------\n\
    \nF_SALES P1 1 P1_TBSP TO_DATE(' 2012–01-01 00:00:00'\n\nF_SALES SYS_P476 2 P3_TBSP\
    \ TO_DATE(' 2014-01-01 00:00:00'\n\nA partition named SYS_P476 was automatically\
    \ created with a high value of 2014-01-01\\. If you don’t like the name that Oracle\
    \ gives the partition, you can rename it:\n\nSQL> alter table f_sales rename partition\
    \ sys_p476 to p2;\n\nNotice what happens when a value is inserted that falls into\
    \ a year interval between the two partitions:\n\nSQL> insert into f_sales values(1,sysdate+500);\n\
    \nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\nQuerying the USER_TAB_PARTITIONS\
    \ table shows that another partition has been created because the value inserted\
    \ falls into a year interval that isn’t included in the existing partitions: TABLE_NAME\
    \ PARTITION_ Part. Pos TABLESPACE HIGH_VALUE\n\n---------- ---------- ---------\
    \ ---------- ------------------------------\n\nF_SALES P1 1 P1_TBSP TO_DATE('\
    \ 2012–01-01 00:00:00'\n\nF_SALES SYS_P477 2 P2_TBSP TO_DATE(' 2013-01-01 00:00:00'\n\
    \nF_SALES P2 3 P3_TBSP TO_DATE(' 2014-01-01 00:00:00'\n\nYou can also have Oracle\
    \ add partitions by other increments of time, such as a week. For example: create\
    \ table f_sales(\n\nsales_amt number\n\n,d_date date\n\n)\n\npartition by range\
    \ (d_date)\n\ninterval(numtodsinterval(7,'day'))\n\nstore in (p1_tbsp, p2_tbsp,\
    \ p3_tbsp)\n\n(partition p1 values less than (to_date('01-oct-2010', 'dd-mon-yyyy'))\
    \ tablespace p1_tbsp);\n\nAs data is inserted into weeks in the future, new weekly\
    \ partitions will be created automatically. In this way, Oracle automatically\
    \ manages the addition of partitions to the table.\n\nPartitioning to Match a\
    \ Parent Table\n\nIf you’re using Oracle Database 11 *g* or higher, you can use\
    \ the PARTITION BY REFERENCE clause to specify that a child table should be partitioned\
    \ in the same way as its parent. This allows a child table to inherit the partitioning\
    \ strategy of its parent table. Any parent table partition-maintenance operations\
    \ are also applied to the child record tables.\n\n■ **Note** Before the advent\
    \ of the partitioning-by-reference feature, you had to physically duplicate and\
    \ maintain the parent table column in the child table. Doing so not only requires\
    \ more disk space but also is a source of error when you’re maintaining the partitions.\n\
    \nFor example, say you have a parent ORDERS table and a child ORDER_ITEMS table\
    \ that are related by primary-key and foreign-key constraints on the ORDER_ID\
    \ column. The parent ORDERS table is partitioned on the ORDER_DATE column. Even\
    \ though the child ORDER_ITEMS table doesn’t contain the ORDER_DATE column, you\
    \ wonder whether you can partition it so that the records are distributed the\
    \ same way as in the parent ORDERS table. This example creates a parent table\
    \ with a primary-key constraint on ORDER_ID and range partitions on ORDER_DATE:\n\
    \ncreate table orders(\n\norder_id number\n\n,order_date date\n\n,constraint order_pk\
    \ primary key(order_id)\n\n)\n\npartition by range(order_date)\n\n(partition p10\
    \ values less than (to_date('01-jan-2010','dd-mon-yyyy')) 284\n\nCHAPTER 11 ■\
    \ PARTITIONING: DIVIDE AND CONQUER\n\n,partition p11 values less than (to_date('01-jan-2011','dd-mon-yyyy'))\n\
    \n,partition pmax values less than (maxvalue)\n\n);\n\nNext, you create the child\
    \ ORDER_ITEMS table. It’s partitioned by naming the foreign-key constraint as\
    \ the referenced object:\n\ncreate table order_items(\n\nline_id number\n\n,order_id\
    \ number not null\n\n,sku number\n\n,quantity number\n\n,constraint order_items_pk\
    \ primary key(line_id, order_id)\n\n,constraint order_items_fk1 foreign key (order_id)\
    \ references orders\n\n)\n\npartition by reference (order_items_fk1);\n\nNotice\
    \ that the foreign-key column ORDER_ID must be defined as NOT NULL. The foreign-key\
    \ column must be enabled and enforced.\n\nYou can inspect the partition-key columns\
    \ via the following query:\n\nselect\n\nname\n\n,column_name\n\n,column_position\n\
    \nfrom user_part_key_columns\n\nwhere name in ('ORDERS','ORDER_ITEMS');\n\nHere’s\
    \ the output for this example:\n\nNAME COLUMN_NAME COLUMN_POSITION\n\n--------------------\
    \ -------------------- ---------------\n\nORDERS ORDER_DATE 1\n\nORDER_ITEMS ORDER_ID\
    \ 1\n\nNotice that the child table is partitioned by the ORDER_ID column. This\
    \ ensures that the child record is partitioned in the same manner as the parent\
    \ record (because the child record is related to the parent record via the ORDER_ID\
    \ key column).\n\nWhen you create the referenced partition child table, if you\
    \ don’t explicitly name the child table partitions, by default Oracle creates\
    \ partitions for the child table with the same partition names as its parent table.\
    \ This example explicitly names the child table referenced partitions: create\
    \ table order_items(\n\nline_id number\n\n,order_id number not null\n\n,sku number\n\
    \n,quantity number\n\n,constraint order_items_pk primary key(line_id, order_id)\n\
    \n,constraint order_items_fk1 foreign key (order_id) references orders\n\n)\n\n\
    partition by reference (order_items_fk1)\n\n(partition c10\n\n,partition c11\n\
    \n,partition cmax\n\n);\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\nYou\
    \ can’t specify the partition bounds of a referenced table. Partitions of a referenced\
    \ table are created in the same tablespace as the parent partition unless you\
    \ specify tablespaces for the child partitions.\n\nPartitioning on a Virtual Column\n\
    \nIf you’re using Oracle Database 11 *g* or higher, you can partition on a virtual\
    \ column (see Chapter 7 for a discussion of virtual columns). Here’s a sample\
    \ script that creates a table named EMP with the virtual column COMMISSION and\
    \ a corresponding range partition for the virtual column: create table emp (\n\
    \nemp_id number\n\n,salary number\n\n,comm_pct number\n\n,commission generated\
    \ always as (salary*comm_pct)\n\n)\n\npartition by range(commission)\n\n(partition\
    \ p1 values less than (1000)\n\n,partition p2 values less than (2000)\n\n,partition\
    \ p3 values less than (maxvalue));\n\nThis strategy allows you to partition on\
    \ a column that isn’t stored in the table but is computed dynamically. Virtual-column\
    \ partitioning is appropriate when there is a business requirement to partition\
    \ on a column that isn’t physically stored in a table. The expression behind a\
    \ virtual column can be a complex calculation, can return a subset of a column\
    \ string, can combine column values, and so on.\n\nThe possibilities are endless.\n\
    \nFor example, you may have a 10-character string column in which the first 2\
    \ digits represent a region and last 8 digits represent a specific location (this\
    \ is a bad design, but it happens). In this case, it may make sense from a business\
    \ perspective to partition on the first two digits of this column (by region).\n\
    \nGiving an Application Control over Partitioning\n\nYou may have a rare scenario\
    \ in which you want the application inserting records into a table to explicitly\
    \ control which partition it inserts data into. If you’re using Oracle Database\
    \ 11 *g* or higher, you can use the PARTITION BY SYSTEM clause to allow an INSERT\
    \ statement to specify into which partition to insert data. This next example\
    \ creates a system-partitioned table with three partitions: create table apps\n\
    \n(app_id number\n\n,app_amnt number)\n\npartition by system\n\n(partition p1\n\
    \n,partition p2\n\n,partition p3);\n\nWhen inserting data into this table, you\
    \ must specify a partition. The next line of code inserts a record into partition\
    \ P1:\n\nSQL> insert into apps partition(p1) values(1,100);\n\nWhen you’re updating\
    \ or deleting, if you don’t specify a partition, Oracle scans all partitions of\
    \ a system-partitioned table to find the relevant rows. Therefore, you should\
    \ specify a partition when updating and deleting to avoid poor performance.\n\n\
    CHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\nA system-partitioned table is\
    \ helpful in unusual situations in which you need to explicitly control which\
    \ partition a record is inserted into. This allows your application code to manage\
    \ the distribution of records among the partitions. I recommend that you use this\
    \ feature only when you can’t use one of Oracle’s other partitioning mechanisms\
    \ to meet your business requirement.\n\nMaintaining Partitions\n\nWhen using partitions,\
    \ you'll eventually have to perform some sort of maintenance operation. For example,\
    \ you may be required to add, drop, truncate, split, and merge partitions. The\
    \ various partition maintenance tasks are described in this section, starting\
    \ with a description of the data-dictionary objects that relate to partitioning.\n\
    \nViewing Partition Metadata\n\nWhen you’re maintaining partitions, it’s helpful\
    \ to view metadata information about the partitioned objects. Oracle provides\
    \ many data-dictionary views that contain information about partitioned tables\
    \ and indexes. Table 12–3 describes each of the views.\n\nKeep in mind the DBA-level\
    \ views contain data for all partitioned objects in the database, the ALL\n\n\
    level shows partitioning information to which the currently connect user has access,\
    \ and the USER-level views contain information for the partitioned objects owned\
    \ by the currently connected user.\n\n***Table 12–3.** Data-Dictionary Views Containing\
    \ Partitioning Information* **View Contains**\n\nDBA/ALL/USER_PART_TABLES\n\n\
    Displays partitioned table information\n\nDBA/ALL/USER_TAB_PARTITIONS\n\nContains\
    \ information regarding individual table\n\npartitions\n\nDBA/ALL/USER_TAB_SUBPARTITIONS\n\
    \nShows subpartition-level table information\n\nregarding storage and statistics\n\
    \nDBA/ALL/USER_PART_KEY_COLUMNS\n\nDisplays partition-key columns\n\nDBA/ALL/USER_SUBPART_KEY_COLUMNS\n\
    \nContains subpartition-key columns\n\nDBA/ALL/USER_PART_COL_STATISTICS\n\nShows\
    \ column-level statistics\n\nDBA/ALL/USER_SUBPART_COL_STATISTICS\n\nDisplays subpartition-level\
    \ statistics\n\nDBA/ALL/USER_PART_HISTOGRAMS\n\nContains histogram information\
    \ for partitions\n\nDBA/ALL/USER_SUBPART_HISTOGRAMS\n\nShows histogram information\
    \ for subpartitions\n\nDBA/ALL/USER_PART_INDEXES\n\nDisplays partitioned index\
    \ information\n\nDBA/ALL/USER_IND_PARTITIONS\n\nContains information regarding\
    \ individual index\n\npartitions\n\nDBA/ALL/USER_IND_SUBPARTITIONS\n\nShows subpartition-level\
    \ index information\n\nDBA/ALL/USER_SUBPARTITION_TEMPLATES\n\nDisplays subpartition\
    \ template information\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\nTwo\
    \ views you’ll use quite often are DBA_PART_TABLES and the DBA_TAB_PARTITIONS.\
    \ The DBA_PART_TABLES view contains table-level partitioning information such\
    \ as partitioning method and default storage settings. The DBA_TAB_PARTITIONS\
    \ view contains information about the individual table partitions, such as the\
    \ partition name and storage settings for individual partitions.\n\nMoving a Partition\n\
    \nSuppose you create a partitioned table as shown:\n\ncreate table f_sales\n\n\
    (reg_sales number\n\n,sales_amt number\n\n,d_date_id number\n\n,state_code varchar2(20)\n\
    \n)\n\npartition by list (state_code)\n\n( partition reg_west values ('AZ','CA','CO','MT','OR','ID','UT','NV')\n\
    \n,partition reg_mid values ('IA','KS','MI','MN','MO','NE','OH','ND')\n\n,partition\
    \ reg_rest values (default)\n\n);\n\nAlso for this partitioned table, you decide\
    \ to create a local index on the STATE_CODE column: SQL> create index f_sales_idx1\
    \ on f_sales(state_code) local;\n\nYou create a global index on the REG_SALES\
    \ column:\n\nSQL> create index f_sales_gidx1 on f_sales(reg_sales);\n\nAnd you\
    \ create a global partitioned index on the SALES_AMT column:\n\ncreate index f_sales_gidx2\
    \ on f_sales(sales_amt)\n\nglobal partition by range(sales_amt)\n\n(partition\
    \ pg1 values less than (25)\n\n,partition pg2 values less than (50)\n\n,partition\
    \ pg3 values less than (maxvalue));\n\nLater, you decide that you want to move\
    \ a partition to a specific tablespace. In this scenario, you can use the ALTER\
    \ TABLE...MOVE PARTITION statement to relocate a table partition. This example\
    \ moves the REG_WEST partition to a new tablespace:\n\nSQL> alter table f_sales\
    \ move partition reg_west tablespace p1_tbsp; It’s a fairly simple operation to\
    \ move a partition to a different tablespace. Whenever you do this, make sure\
    \ you check on the status of any indexes associated with the table. When you move\
    \ a table partition to a different tablespace, any associated indexes are invalidated;\
    \ therefore, you must rebuild any local indexes associated with a table partition\
    \ that has been moved. You can verify the status of global and local index partitions\
    \ by querying the data dictionary. Here’s a sample query: select\n\nb.table_name\n\
    \n,a.index_name\n\n,a.partition_name\n\n,a.status\n\n,b.locality\n\nfrom user_ind_partitions\
    \ a\n\n,user_part_indexes b\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\
    \nwhere a.index_name=b.index_name\n\nand table_name = 'F_SALES';\n\nHere’s the\
    \ output for this example. One global index and one partition of a local index\
    \ need to be rebuilt:\n\nTABLE_NAME INDEX_NAME PARTITION_ STATUS LOCALITY\n\n\
    -------------------- --------------- ---------- ---------- --------------------\n\
    \nF_SALES F_SALES_IDX1 REG_MID USABLE LOCAL\n\nF_SALES F_SALES_IDX1 REG_REST USABLE\
    \ LOCAL\n\nF_SALES F_SALES_IDX1 REG_WEST UNUSABLE LOCAL\n\nF_SALES F_SALES_GIDX2\
    \ PG1 UNUSABLE GLOBAL\n\nF_SALES F_SALES_GIDX2 PG2 UNUSABLE GLOBAL\n\nF_SALES\
    \ F_SALES_GIDX2 PG3 UNUSABLE GLOBAL\n\nNotice that the entire global index is\
    \ rendered unusable, and only one partition of the local index (the partition\
    \ that was moved) is unusable. Keep in mind that any maintenance operation on\
    \ a table invalidates every partition of any associated global partitioned indexes\
    \ or global nonpartitioned indexes.\n\nTo check for global nonpartitioned indexes,\
    \ you need to look in the USER_INDEXES view. Here’s a query for this example:\n\
    \nselect\n\nindex_name\n\n,status\n\nfrom user_indexes\n\nwhere table_name ='F_SALES';\n\
    \nHere’s some sample output:\n\nINDEX_NAME STATUS\n\n--------------- ----------\n\
    \nF_SALES_IDX1 N/A\n\nF_SALES_GIDX1 UNUSABLE\n\nF_SALES_GIDX2 N/A\n\nYou need\
    \ to rebuild any indexes or partitions in an unusable state. This example rebuilds\
    \ the unusable partition of the local index:\n\nSQL> alter index f_sales_idx1\
    \ rebuild partition reg_west tablespace p1_tbsp; When you move a table partition\
    \ to a different tablespace, this causes the ROWID of each record in the table\
    \ partition to change. Because a regular index stores the table ROWID as part\
    \ of its structure, the index partition is invalidated if the table partition\
    \ moves. In this scenario, you must rebuild the index. When you rebuild the index\
    \ partition, you have the option of moving it to a different tablespace.\n\nAutomatically\
    \ Moving Updated Rows\n\nBy default, Oracle doesn’t let you update a row by setting\
    \ the partition key to a value outside of its current partition. For example,\
    \ this statement updates the partition-key column (D_DATE_ID) to a value that\
    \ would result in the row needing to exist in a different partition: SQL> update\
    \ f_regs set d_date_id = 20100901 where d_date_id = 20090201; You receive the\
    \ following error:\n\nORA-14402: updating partition key column would cause a partition\
    \ change 289\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\nIn this scenario,\
    \ use the ENABLE ROW MOVEMENT clause of the ALTER TABLE statement to allow updates\
    \ to the partition key that would change the partition in which a value belongs.\
    \ For this example, the F_REGS table is first modified to enable row movement:\n\
    \nSQL> alter table f_regs enable row movement;\n\nYou should now be able to update\
    \ the partition key to a value that moves the row to a different segment. You\
    \ can verify that row movement has been enabled by querying the ROW_MOVEMENT\n\
    \ncolumn of the USER_TABLES view:\n\nSQL> select row_movement from user_tables\
    \ where table_name='F_REGS'; You should see the value ENABLED:\n\nROW_MOVE\n\n\
    ENABLED\n\nTo disable row movement, use the DISABLE ROW MOVEMENT clause:\n\nSQL>\
    \ alter table f_regs disable row movement;\n\nPartitioning an Existing Table\n\
    \nYou may have a nonpartitioned table that has grown quite large, and want to\
    \ partition it. There are several methods for converting a nonpartitioned table\
    \ to a partitioned table. Table 12–4 lists the pros and cons of various techniques.\n\
    \n***Table 12–4.** Methods of Converting a Nonpartitioned Table*\n\n**Conversion\
    \ Method**\n\n**Advantages Disadvantages**\n\nCREATE <new_part_tab> AS SELECT\
    \ Simple; can use NOLOGGING and\n\nRequires space for both old\n\n* FROM <old_tab>\n\
    \nPARALLEL options. Direct path\n\nand new tables.\n\nload.\n\nINSERT /*+ APPEND\
    \ */ INTO\n\nFast, simple. Direct path load.\n\nRequires space for both old\n\n\
    <new_part_tab> SELECT * FROM\n\nand new tables.\n\n<old_tab>\n\nData Pump EXPDP\
    \ old table; IMPDP\n\nFast; less space required. Takes\n\nMore complicated because\n\
    \nnew table (or EXP IMP if using older\n\ncare of grants, privileges, and so\n\
    \nyou need to use a utility.\n\nversion of Oracle)\n\non. Loading can be done\
    \ per\n\npartition with filtering conditions.\n\nCreate partitioned\n\nPotentially\
    \ less downtime.\n\nMany steps; complicated.\n\n<new_part_tab>; exchange\n\npartitions\
    \ with <old_tab>\n\nUse the DBMS_REDEFINITION\n\nConverts existing table inline.\n\
    \nMany steps; complicated.\n\npackage (newer versions of Oracle)\n\nCreate CSV\
    \ file or external table;\n\nLoading can be done partition by\n\nMany steps; complicated.\n\
    \nload <new_part_tab> with\n\npartition.\n\nSQL*Loader\n\nCHAPTER 11 ■ PARTITIONING:\
    \ DIVIDE AND CONQUER\n\nOne of the easiest ways from Table 12–4 to partition an\
    \ existing table is to create a new table—one that *is* partitioned—and load it\
    \ with data from the old table. Listed next are the required steps: 1. If this\
    \ is a table in an active production database, you should schedule some downtime\
    \ for the table to ensure that no active transactions are occurring while the\
    \ table is being migrated.\n\n2\\. Create a new partitioned table from the old\
    \ with CREATE TABLE <new table>...AS SELECT * FROM <old table>.\n\n3\\. Drop or\
    \ rename the old table.\n\n4\\. Rename the table created in step 1 to the name\
    \ of the dropped table.\n\nFor example, let’s assume that the F_REGS table used\
    \ so far in this chapter was created as an unpartitioned table. The following\
    \ statement creates a new table that *is* partitioned, taking data from the old\
    \ table that isn’t:\n\ncreate table f_regs_new\n\npartition by range (d_date_id)\n\
    \n(partition p2008 values less than(20090101),\n\npartition p2009 values less\
    \ than(20100101),\n\npartition pmax values less than(maxvalue)\n\n)\n\nnologging\n\
    \nas select * from f_regs;\n\nNow you can drop (or rename) the old nonpartitioned\
    \ table and rename the new partitioned table to the old table name. Be sure you\
    \ don’t need the old table before you drop it with the PURGE option (because this\
    \ permanently drops the table):\n\nSQL> drop table f_regs purge;\n\nSQL> rename\
    \ f_regs_new to f_regs;\n\nFinally, build any constraints, grants, indexes, and\
    \ statistics for the new table. You should now have a partitioned table that replaces\
    \ the old, nonpartitioned table.\n\nFor the last step, if the original table contains\
    \ many constraints, grants, and indexes, you may want to use Data Pump expd or\
    \ exp to export the original table without data. Then, after the new table is\
    \ created, use Data Pump impdp or imp to create the constraints, grants, indexes,\
    \ and statistics on the new table.\n\nAdding a Partition\n\nSometimes it’s hard\
    \ to predict how many partitions you should initially make for a table. A typical\
    \ example is a range-partitioned table that’s created without a MAXVALUE-created\
    \ partition. You make a partitioned table that contains enough partitions for\
    \ two years into the future, and then you forget about the table. Some time in\
    \ the future, application users report that this message is being thrown: ORA-14406:\
    \ updated partition key is beyond highest legal partition key\n\n■ **Tip** Consider\
    \ using interval partitioning, which enables Oracle to automatically add range\
    \ partitions when the upper bound is exceeded.\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE\
    \ AND CONQUER\n\nFor a range-partitioned table, if the table’s highest bound isn’t\
    \ defined with a MAXVALUE, you can use the ALTER TABLE...ADD PARTITION statement\
    \ to add a partition to the high end of the table. If you’re not sure what the\
    \ current upper bound is, query the data dictionary:\n\nselect\n\ntable_name\n\
    \n,partition_name\n\n,high_value\n\nfrom user_tab_partitions\n\nwhere table_name\
    \ = UPPER('&&tab_name')\n\norder by table_name, partition_name;\n\nThis example\
    \ adds a partition to the high end of a range-partitioned table: alter table f_regs\n\
    \nadd partition p2011\n\nvalues less than (20120101)\n\npctfree 5 pctused 95\n\
    \ntablespace p11_tbsp;\n\nIf you have a range-partitioned table with the high\
    \ range bounded by MAXVALUE, you can’t add a partition. In this situation, you\
    \ have to split an existing partition (see the section “Splitting a Partition”\
    \ in this chapter).\n\nFor a list-partitioned table, you can add a new partition\
    \ only if there isn’t a DEFAULT partition defined. The next example adds a partition\
    \ to a list-partitioned table: SQL> alter table f_sales add partition reg_east\
    \ values('GA');\n\n **If you have a hash-partitioned table, use the ADD PARTITION\
    \ clause as follows to add a partition: alter table browns\n\nadd partition hash_5\n\
    \ntablespace p_tbsp\n\nupdate indexes;\n\n■ **Note** When you’re adding to a hash\
    \ partitioned table, if you don’t specify the UPDATE INDEXES clause, any global\
    \ indexes must be rebuilt. In addition, you must rebuild any local indexes for\
    \ the newly added partition.\n\nIn general, after adding a partition to a table,\
    \ always check the partitioned indexes to be sure they all still have a VALID\
    \ status:\n\nselect\n\nb.table_name\n\n,a.index_name\n\n,a.partition_name\n\n\
    ,a.status\n\n,b.locality\n\nfrom user_ind_partitions a\n\n,user_part_indexes b\n\
    \nwhere a.index_name=b.index_name\n\nand table_name = upper('&&part_table');\n\
    \nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\nAlso check the status of any\
    \ global nonpartitioned indexes:\n\nselect\n\nindex_name\n\n,status\n\nfrom user_indexes\n\
    \nwhere table_name = upper('&&part_table');\n\nConsider using the UPDATE INDEXES\
    \ clause of the ALTER TABLE statement to automatically rebuild indexes when you’re\
    \ performing maintenance operations. In some cases, Oracle may not allow you to\
    \ use the UPDATE INDEXES clause, in which case you have to manually rebuild any\
    \ unusable indexes. I highly recommend that you always test a maintenance operation\
    \ in a nonproduction database to determine any unforeseen side effects.\n\nExchanging\
    \ a Partition with an Existing Table\n\nExchanging a partition is a common technique\
    \ for loading new data into large partitioned tables. This feature allows you\
    \ to take a stand-alone table and swap it with an existing partition (in an already-partitioned\
    \ table). Doing that lets you transparently add fully loaded new partitions without\
    \ affecting the availability or performance of operations against the other partitions\
    \ in the table.\n\nThe following simple example illustrates the process. Say you\
    \ have a range-partitioned table created as follows:\n\ncreate table f_sales\n\
    \n(sales_amt number\n\n,d_date_id number)\n\npartition by range (d_date_id)\n\n\
    (partition p_2009 values less than (20100101),\n\npartition p_2010 values less\
    \ than (20110101),\n\npartition p_2011 values less than (20120101)\n\n);\n\nYou\
    \ also create a bitmap index on the D_DATE_ID column:\n\ncreate bitmap index d_date_id_fk1\
    \ on\n\nf_sales(d_date_id)\n\nlocal;\n\nNow, add a new partition to the table\
    \ that will store new data:\n\nalter table f_sales\n\nadd partition p_2012\n\n\
    values less than(20130101);\n\nNext, create a staging table, and insert data that\
    \ falls in the range of values for the newly added partition:\n\ncreate table\
    \ workpart(\n\nsales_amt number\n\n,d_date_id number);\n\ninsert into workpart\
    \ values(100,20120201);\n\ninsert into workpart values(120,20120507);\n\nCHAPTER\
    \ 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\nCreate a bitmap index on the WORKPART\
    \ table that matches the structure of the bitmap index on F_SALES:\n\ncreate bitmap\
    \ index\n\nd_date_id_fk2\n\non workpart(d_date_id);\n\nNow, exchange the WORKPART\
    \ table with the P_2012 partition:\n\nalter table f_sales\n\nexchange partition\
    \ p_2012\n\nwith table workpart\n\nincluding indexes\n\nwithout validation;\n\n\
    A quick query of the F_SALES table verifies that the partition was exchanged successfully:\
    \ SQL> select * from f_sales partition(p_2012);\n\nHere’s the output:\n\nSALES_AMT\
    \ D_DATE_ID\n\n---------- ----------\n\n100 20120201\n\n120 20120507\n\nThis query\
    \ displays that the indexes are all still usable:\n\nSQL> select index_name, partition_name,\
    \ status from user_ind_partitions; You can also verify that a local index segment\
    \ was created for the new partition: select segment_name,segment_type,partition_name\n\
    \nfrom user_segments\n\nwhere segment_name IN('F_SALES','D_DATE_ID_FK1');\n\n\
    Here’s the output:\n\nSEGMENT_NAME SEGMENT_TYPE PARTITION_\n\n--------------------\
    \ ------------------ ----------\n\nD_DATE_ID_FK1 INDEX PARTITION P_2009\n\nD_DATE_ID_FK1\
    \ INDEX PARTITION P_2010\n\nD_DATE_ID_FK1 INDEX PARTITION P_2011\n\nD_DATE_ID_FK1\
    \ INDEX PARTITION P_2012\n\nF_SALES TABLE PARTITION P_2009\n\nF_SALES TABLE PARTITION\
    \ P_2010\n\nF_SALES TABLE PARTITION P_2011\n\nF_SALES TABLE PARTITION P_2012\n\
    \nThe ability to exchange partitions is an extremely powerful feature. It allows\
    \ you to take a partition of an existing table and make it a stand-alone table,\
    \ and at the same time make a stand-alone table (which can be fully populated\
    \ before the partition exchange operation) part of a partitioned table. When you\
    \ exchange a partition, Oracle updates the entries in the data dictionary to perform\
    \ the exchange.\n\nWhen you exchange a partition with the WITHOUT VALIDATION clause,\
    \ you instruct Oracle not to validate that the rows in the incoming partition\
    \ (or subpartition) are valid entries for the defined range.\n\nThis has the advantage\
    \ of making the exchange a very quick operation because Oracle is only updating\
    \ pointers in the data dictionary to perform the exchange operation. You need\
    \ to make sure your data is accurate if you use WITHOUT VALIDATION.\n\nCHAPTER\
    \ 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\nIf a primary key is defined for the\
    \ partitioned table, the table being exchanged must have the same primary-key\
    \ structure defined. If there is a primary key, the WITHOUT VALIDATION clause\
    \ doesn’t stop Oracle from enforcing unique constraints.\n\nRenaming a Partition\n\
    \nSometimes you need to rename a table partition or index partition. For example,\
    \ you may want to rename a partition before you drop it (to ensure that it’s not\
    \ being used). Also, you may want to rename objects so they conform to standards.\
    \ In these scenarios, use the appropriate ALTER TABLE or ALTER\n\nINDEX statement.\n\
    \nThis example uses the ALTER TABLE statement to rename a table partition: SQL>\
    \ alter table f_regs rename partition reg_p_1 to reg_part_1;\n\nThe next line\
    \ of code uses the ALTER INDEX statement to rename an index partition: SQL> alter\
    \ index f_reg_dates_fk1 rename partition reg_p_1 to reg_part_1; You can query\
    \ the data dictionary to verify the information regarding renamed objects. This\
    \ query shows partitioned table names:\n\nselect\n\ntable_name\n\n,partition_name\n\
    \n,tablespace_name\n\nfrom user_tab_partitions;\n\nSimilarly, this query displays\
    \ partitioned index information:\n\nselect\n\nindex_name\n\n,partition_name\n\n\
    ,status\n\n,high_value\n\n,tablespace_name\n\nfrom user_ind_partitions;\n\nSplitting\
    \ a Partition\n\nSuppose you’ve identified a partition that has too many rows,\
    \ and you want to split it into two partitions.\n\nUse the ALTER TABLE...SPLIT\
    \ PARTITION statement to split an existing partition. The following example splits\
    \ a partition in a range-partitioned table:\n\nalter table f_regs split partition\
    \ p2010 at (20100601)\n\ninto (partition p2010_a, partition p2010)\n\nupdate indexes;\n\
    \nIf you don’t specify UPDATE INDEXES, you need to rebuild any local indexes associated\
    \ with the split partition as well as any global indexes. You can verify the status\
    \ of partitioned indexes with the following SQL:\n\nSQL> select index_name, partition_name,\
    \ status from user_ind_partitions; The next example splits a list partition. First,\
    \ here’s the CREATE TABLE statement, which shows you how the list partitions were\
    \ originally defined:\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\ncreate\
    \ table f_sales\n\n(reg_sales number\n\n,d_date_id number\n\n,state_code varchar2(20)\n\
    \n)\n\npartition by list (state_code)\n\n( partition reg_west values ('AZ','CA','CO','MT','OR','ID','UT','NV')\n\
    \n,partition reg_mid values ('IA','KS','MI','MN','MO','NE','OH','ND')\n\n,partition\
    \ reg_rest values (default)\n\n);\n\nNext, the REG_MID partition is split:\n\n\
    alter table f_sales split partition reg_mid values ('IA','KS','MI','MN') into\
    \ (partition reg_mid_a,\n\npartition reg_mid_b);\n\nThe REG_MID_A partition now\
    \ contains the values IA, KS, MI, and MN, and REG_MID_B is assigned the remaining\
    \ values MO, NE, OH, and ND.\n\nThe split-partition operation allows you to create\
    \ two new partitions from a single partition. Each new partition has its own segment,\
    \ physical attributes, and extents. The segment associated with the original partition\
    \ is deleted.\n\nMerging Partitions\n\nWhen you create a partition, sometimes\
    \ it’s hard to predict how many rows the partition will eventually contain. You\
    \ may have two partitions that don’t contain enough data to warrant separate partitions.\
    \ In such a situation, use the ALTER TABLE...MERGE PARTITIONS statement to combine\
    \ partitions.\n\nThis example merges the REG_P_1 partition into the REG_P_2 partition:\
    \ SQL> alter table f_regs merge partitions reg_p_1, reg_p_2 into partition reg_p_2;\
    \ In this example, the partitions are organized by a range of dates. The merged\
    \ partition is defined to accept rows with the highest range of the two merged\
    \ partitions. Any local indexes are also merged into the new single partition.\n\
    \nBe aware that merging partitions invalidates any local indexes associated with\
    \ the merged partitions. Additionally, all partitions of any global indexes that\
    \ exist on the table are marked as unusable. You can verify the status of the\
    \ partitioned indexes by querying the data dictionary: select\n\nindex_name\n\n\
    ,partition_name\n\n,tablespace_name\n\n,high_value,status\n\nfrom user_ind_partitions\n\
    \norder by 1,2;\n\nHere’s some sample output showing what a global index and a\
    \ local index look like after a partition merge:\n\nINDEX_NAME PARTITION_NAME\
    \ TABLESPACE_NAME HIGH_VALUE STATUS\n\n-------------------- --------------- ---------------\
    \ --------------- ----------\n\nF_GLO_IDX1 SYS_P680 IDX1 UNUSABLE\n\nF_GLO_IDX1\
    \ SYS_P681 IDX1 UNUSABLE\n\nF_GLO_IDX1 SYS_P682 IDX1 UNUSABLE\n\nCHAPTER 11 ■\
    \ PARTITIONING: DIVIDE AND CONQUER\n\nF_LOC_FK1 REG_P_2 USERS 20110101 UNUSABLE\n\
    \nF_LOC_FK1 REG_P_3 TBSP3 20120101 USABLE\n\nWhen you merge partitions, you can\
    \ use the UPDATE INDEXES clause of the ALTER TABLE statement to instruct Oracle\
    \ to automatically rebuild any associated indexes:\n\nalter table f_regs merge\
    \ partitions reg_p_1, reg_p_2 into partition reg_p_2\n\ntablespace tbsp2\n\nupdate\
    \ indexes;\n\nKeep in mind that the merge operation takes longer when you use\
    \ the UPDATE INDEXES clause. If you want to minimize the length of the merge operation,\
    \ don’t use this clause. Instead, manually rebuild local indexes associated with\
    \ a merged partition:\n\nSQL> alter table f_regs modify partition reg_p_2 rebuild\
    \ unusable local indexes; You can rebuild each partition of a global index with\
    \ the ALTER INDEX...REBUILD PARTITION\n\nstatement:\n\nSQL> alter index f_glo_idx1\
    \ rebuild partition sys_p680;\n\nSQL> alter index f_glo_idx1 rebuild partition\
    \ sys_p681;\n\nSQL> alter index f_glo_idx1 rebuild partition sys_p682;\n\nYou\
    \ can merge two or more partitions with the ALTER TABLE...MERGE PARTITIONS statement.\
    \ The name of the partition into which you’re merging can be the name of one of\
    \ the partitions you’re merging or a completely new name.\n\nBefore you merge\
    \ two (or more) partitions, make certain the merged partition has enough space\
    \ in its tablespace to accommodate all the merged rows. If there isn’t enough\
    \ space, you receive an error that the tablespace can’t extend to the necessary\
    \ size.\n\nDropping a Partition\n\nYou occasionally need to drop a partition.\
    \ A common scenario is when you have old data that isn’t used anymore, meaning\
    \ the partition can be dropped.\n\nFirst, identify the name of the partition you\
    \ want to drop. Run the following query to list partitions for a particular table\
    \ for the currently connected user:\n\nselect segment_name, segment_type, partition_name\n\
    \nfrom user_segments\n\nwhere segment_name = upper('&table_name');\n\nNext, use\
    \ the ALTER TABLE...DROP PARTITION statement to remove a partition from a table.\
    \ This example drops the P_2008 partition from the F_SALES table:\n\nSQL> alter\
    \ table f_sales drop partition p_2008;\n\nYou should see the following message:\n\
    \nTable altered.\n\nIf you want to drop a subpartition, use the DROP SUBPARTITION\
    \ clause: SQL> alter table f_sales drop subpartition p2_south;\n\n **You can query\
    \ USER_TAB_SUBPARTITIONS to verify that the subpartition has been dropped.\n\n\
    CHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\n■ **Note** Oracle doesn’t let\
    \ you drop all subpartitions of a composite-partitioned table. There must be at\
    \ least one subpartition per partition.\n\nWhen you drop a partition, there is\
    \ no undrop operation. Therefore, before you do this, be sure you’re in the correct\
    \ environment and really do need to drop the partition. If you need to preserve\
    \ the data in a partition to be dropped, merge the partition to another partition\
    \ instead of dropping it.\n\nYou can’t drop a partition from a hash-partitioned\
    \ table. For hash-partitioned tables, you must coalesce partitions to remove one.\
    \ And you can’t explicitly drop a partition from a reference-partitioned table.\
    \ When a parent table partition is dropped, it’s also dropped from corresponding\
    \ child reference-partitioned tables.\n\nGenerating Statistics for a Partition\n\
    \nAfter you load a large amount of data into a partition, you should generate\
    \ statistics to reflect the newly inserted data. Use the EXECUTE statement to\
    \ run the DBMS_STATS package to generate statistics for a particular partition.\
    \ In this example, the owner is STAR, the table is F_SALES, and the partition\
    \ being analyzed is P_2012:\n\nexec dbms_stats.gather_table_stats(ownname=>'STAR',-\n\
    \ntabname=>'F_SALES',-\n\npartname=>'P_2012');\n\nIf you’re working with a large\
    \ partition, you probably want to specify the percentage sampling size and degree\
    \ of parallelism, and also generate statistics for any indexes: exec dbms_stats.gather_table_stats(ownname=>'STAR',-\n\
    \ntabname=>'F_SALES',-\n\npartname=>'P_2012',-\n\nestimate_percent=>dbms_stats.auto_sample_size,-\n\
    \ndegree=>dbms_stats.auto_degree,-\n\ncascade=>true);\n\nFor a partitioned table,\
    \ you can generate statistics on either a single partition or the entire table.\
    \ I recommend that you generate statistics whenever a significant amount of data\
    \ changes in the partition.\n\nYou need to understand your tables and data well\
    \ enough to determine whether generating new statistics is required.\n\nRemoving\
    \ Rows from a Partition\n\nYou can use several techniques to remove rows from\
    \ a partition. If the data in the particular partition is no longer needed, consider\
    \ dropping the partition. If you want to remove the data and leave the partition\
    \ intact, then you can either truncate or delete from it. Truncating a partition\
    \ permanently and quickly removes the data. If you need the option of rolling\
    \ back the removal of records, then you should delete (instead of truncate). Both\
    \ truncating and deleting are described next.\n\nFirst, identify the name of the\
    \ partition from which you want to remove records: select segment_name, segment_type,\
    \ partition_name\n\nfrom user_segments\n\nwhere partition_name is not null;\n\n\
    CHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\nUse the ALTER TABLE...TRUNCATE\
    \ PARTITION statement to remove all records from a partition. This example truncates\
    \ the P_2008 partition of the F_SALES table:\n\nSQL> alter table f_sales truncate\
    \ partition p_2008;\n\nYou should see the following message:\n\nTable truncated.\n\
    \nIn this scenario, that message doesn’t mean the entire table was truncated—it\
    \ only confirms that the specified partition was truncated.\n\nTruncating a partition\
    \ is an efficient way to quickly remove large amounts of data. When you truncate\
    \ a partition, however, there is no rollback mechanism. The truncate operation\
    \ permanently deletes the data from the partition.\n\nIf you need the option of\
    \ rolling back a transaction, use the DELETE statement: SQL> delete from f_sales\
    \ partition(p_2008);\n\nThe downside to this approach is that if you have millions\
    \ of records, the DELETE operation can take a long time to run. Also, for a large\
    \ number of records, DELETE generates a great deal of rollback information. This\
    \ can cause performance issues for other SQL statements contending for resources.\n\
    \nManipulating Data within a Partition\n\nIf you need to select or manipulate\
    \ data within one partition, specify the partition name as part the SQL\n\nstatement.\
    \ For example, you can select the rows from a specific partition as shown: SQL>\
    \ select * from f_sales partition (y11);\n\nIf you want to select from two (or\
    \ more) partitions, then use the UNION clause: select * from f_sales partition\
    \ (y11)\n\nunion\n\nselect * from f_sales partition (y12);\n\nIf you’re a developer\
    \ and you don’t have access to the data dictionary to view which partitions are\
    \ available, you can use the following SELECT...PARTITION FOR <partition_key_value>\
    \ syntax (available in Oracle Database 11 *g* and higher). With this new syntax,\
    \ you provide a partition-key value, and Oracle determines what partition that\
    \ key value belongs in and returns the rows from the corresponding partition.\
    \ For example:\n\nSQL> select * from f_sales partition for (20101120);\n\nYou\
    \ can also update and delete partition rows. This example updates a column in\
    \ a partition: SQL> update f_sales partition(Y11) set sales_amt=200;\n\nYou can\
    \ use the PARTITION FOR <partition_key_value> syntax for update, delete, and truncate\
    \ operations. For example:\n\nSQL> update f_sales partition for (20101120) set\
    \ sales_amt=200;\n\n■ **Note** See the previous section on removing rows for examples\
    \ of deleting and truncating a partition.\n\nCHAPTER 11 ■ PARTITIONING: DIVIDE\
    \ AND CONQUER\n\nPartitioning Indexes\n\nIn today’s large database environments,\
    \ indexes can also grow to unwieldy sizes. Partitioning indexes provides the same\
    \ benefits as partitioning tables: improved performance, scalability, and maintainability.\n\
    \nYou can create an index that uses its table-partitioning strategy (local), or\
    \ you can create a partitioned index that uses a different partitioning method\
    \ than its table (global). Both of these techniques are described in the following\
    \ subsections.\n\nPartitioning an Index to Follow Its Table\n\nWhen you create\
    \ an index on a partitioned table, you have the option of making it type LOCAL.\
    \ A local partitioned index is partitioned in the same manner as the partitioned\
    \ table. Each table partition has a corresponding index that contains ROWID values\
    \ and index-key values for just that table partition. In other words, the ROWID\
    \ values in a local partitioned index only point to rows in the corresponding\
    \ table partition.\n\nThe following example illustrates the concept of a locally\
    \ partitioned index. First, create a table that has only two partitions:\n\ncreate\
    \ table f_sales (\n\nsales_id number\n\n,sales_amt number\n\n,d_date_id number)\n\
    \ntablespace p1_tbsp\n\npartition by range(d_date_id)(\n\npartition y11 values\
    \ less than (20120101)\n\ntablespace p1_tbsp\n\n,partition y12 values less than\
    \ (20130101)\n\ntablespace p2_tbsp\n\n);\n\nNext, use the LOCAL clause of the\
    \ CREATE INDEX statement to create a local index on the partitioned table. This\
    \ example creates a local index on the D_DATE_ID column of the F_SALES table:\
    \ SQL> create index f_sales_fk1 on f_sales(d_date_id) local;\n\nRun the following\
    \ query to view information about partitioned indexes: select\n\nindex_name\n\n\
    ,table_name\n\n,partitioning_type\n\nfrom user_part_indexes\n\nwhere table_name\
    \ = 'F_SALES';\n\nHere’s some sample output:\n\nINDEX_NAME TABLE_NAME PARTITION\n\
    \n------------------------------ ---------- ---------\n\nF_SALES_FK1 F_SALES RANGE\n\
    \nNow, query the USER_IND_PARTITIONS table to view information about the locally\
    \ partitioned index:\n\nselect\n\n![](index-335_1.png)\n\nCHAPTER 11 ■ PARTITIONING:\
    \ DIVIDE AND CONQUER\n\nIf you specify the partition information when building\
    \ a local-partitioned index, the number of partitions must match the number of\
    \ partitions in the table on which the partitioned index is built.\n\nOracle automatically\
    \ keeps local index partitions in sync with the table partitions. You can’t explicitly\
    \ add a partition to or drop a partition from a local index. When you add or drop\
    \ a table partition, Oracle automatically performs the corresponding work for\
    \ the local index. Oracle manages the local index partitions regardless of how\
    \ the local indexes have been assigned to tablespaces.\n\nLocal indexes are common\
    \ in data-warehouse and decision-support systems. If you query frequently by using\
    \ the partitioned column(s), a local index is appropriate. This approach lets\
    \ Oracle use the appropriate index and table partition to quickly retrieve the\
    \ data.\n\nThere are two types of local indexes: local *prefixed* and local *nonprefixed*.\
    \ A local-prefixed index is one in which the leftmost column of the index matches\
    \ the table partition key. The previous example in this section is a local-prefixed\
    \ index because its leftmost column (D_DATE_ID) is also the partition key for\
    \ the table.\n\nA nonprefixed-local index is one in which the leftmost column\
    \ doesn’t match the partition key used to partition the corresponding table. For\
    \ example, this is a local-nonprefixed index: SQL> create index f_sales_idx1 on\
    \ f_sales(sales_amt) local;\n\nThe index is partitioned with the SALES_AMT column,\
    \ which isn’t the partition key of the table, and is therefore a nonprefixed index.\
    \ You can verify whether an index is considered prefixed by querying the ALIGNMENT\
    \ column from USER_PART_INDEXES:\n\nselect\n\nindex_name\n\n,table_name\n\n,alignment\n\
    \n,locality\n\nfrom user_part_indexes\n\nwhere table_name = 'F_SALES';\n\nHere’s\
    \ some sample output:\n\nINDEX_NAME TABLE_NAME ALIGNMENT LOCALI\n\n--------------------\
    \ -------------------- ------------ ------\n\nF_SALES_FK1 F_SALES PREFIXED LOCAL\n\
    \nF_SALES_IDX1 F_SALES NON_PREFIXED LOCAL\n\nYou may wonder why the distinction\
    \ exists between prefixed and nonprefixed. A local-nonprefixed index means the\
    \ index doesn’t include the partition key as a leading edge of its index definition.\
    \ This can have performance implications, in that a range scan accessing a nonprefixed\
    \ index may need to search every index partition. If there are a large number\
    \ of partitions, this can result in poor performance.\n\nYou can choose to create\
    \ all local indexes as prefixed by including the partition-key column in the leading\
    \ edge of the index. For example, you can create the F_SALES_IDX2 index as prefixed\
    \ as follows: SQL> create index f_sales_idx2 on f_sales(d_date_id, sales_amt)\
    \ local; Is a prefixed index better than a nonprefixed index? It depends on how\
    \ you query your tables. You have to generate explain plans for the queries you\
    \ use and examine whether a prefixed index is able to better take advantage of\
    \ partition *pruning* (eliminating partitions to search in) than a nonprefixed\
    \ index.\n\nAlso keep in mind that a multicolumn prefixed local index consumes\
    \ more space and resources than a nonprefixed local index.\n\n![](index-337_1.png)\n\
    \nCHAPTER 11 ■ PARTITIONING: DIVIDE AND CONQUER\n\noperations on the underlying\
    \ partitioned table require that the global index partitions be rebuilt. The following\
    \ operations on a heap-organized table render a global index unusable:\n\n• ADD\
    \ (HASH)\n\n• COALESCE (HASH)\n\n• DROP\n\n• EXCHANGE\n\n• MERGE\n\n• MOVE\n\n\
    • SPLIT\n\n• TRUNCATE\n\nConsider using the UPDATE INDEXES clause when you perform\
    \ maintenance operations. Doing so keeps the global index available during the\
    \ operation and eliminates the need for rebuilding. The downside of using UPDATE\
    \ INDEXES is that the maintenance operation takes longer due to the indexes being\
    \ maintained during the action.\n\nGlobal indexes are useful for queries that\
    \ retrieve a small set of rows via an index. In these situations, Oracle can eliminate\
    \ (prune) any unnecessary index partitions and efficiently retrieve the data.\
    \ For example, global range-partitioned indexes are useful in OLTP environments\
    \ where you need efficient access to individual records.\n\nPartition Pruning\n\
    \nPartition pruning can greatly improve the performance of queries executing against\
    \ partitioned tables. If a SQL query specifically accesses a table on a partition\
    \ key, Oracle only searches the partitions that contain data the query needs (and\
    \ doesn’t access any partitions that don’t contain data that the query requires—pruning\
    \ them, so to speak).\n\nFor example, say a partitioned table is defined as follows:\n\
    \ncreate table f_sales (\n\nsales_id number\n\n,sales_amt number\n\n,d_date_id\
    \ number)\n\ntablespace p1_tbsp\n\npartition by range(d_date_id)(\n\npartition\
    \ y10 values less than (20110101)\n\ntablespace p1_tbsp\n\n,partition y11 values\
    \ less than (20120101)\n\ntablespace p2_tbsp\n\n,partition y12 values less than\
    \ (20130101)\n\ntablespace p3_tbsp\n\n);\n\nAdditionally, you create a local index\
    \ on the partition-key column:\n\nSQL> create index f_sales_fk1 on f_sales(d_date_id)\
    \ local;\n\nFor this example, insert some sample data:\n\nCHAPTER 11 ■ PARTITIONING:\
    \ DIVIDE AND CONQUER\n\nSQL> insert into f_sales values(1,100,20090202);\n\nSQL>\
    \ insert into f_sales values(2,200,20110202);\n\nSQL> insert into f_sales values(3,300,20120202);\n\
    \nTo illustrate the process of partition pruning, enable the autotrace facility:\
    \ SQL> set autotrace trace explain;\n\nNow, execute a SQL statement that accesses\
    \ a row based on the partition key: select\n\nsales_amt\n\nfrom f_sales\n\nwhere\
    \ d_date_id = '20110202';\n\nAutotrace displays the explain plan. Some of the\
    \ columns have been removed in order to fit the output on the page neatly:\n\n\
    | Id | Operation | Name | Rows | Pstart| Pstop|\n\n| 0 | SELECT STATEMENT | |\
    \ 1 | | |\n\n| 1 | PARTITION RANGE SINGLE | | 1 | 2 | 2 |\n\n| 2 | TABLE ACCESS\
    \ BY LOCAL INDEX ROWID| F_SALES | 1 | 2 | 2 |\n\n|* 3 | INDEX RANGE SCAN | F_SALES_FK1\
    \ | 1 | 2 | 2 |\n\nIn this output, Pstart shows that the starting partition accessed\
    \ is number 2\\. Pstop shows that the last partition accessed is number 2\\. In\
    \ this example, partition 2 is the only partition used to retrieve data; the other\
    \ partitions in the table aren’t accessed at all by the query.\n\nIf a query is\
    \ executed that doesn’t use the partition key, then all partitions are accessed.\
    \ For example:\n\nSQL> select * from f_sales;\n\nHere’s the corresponding explain\
    \ plan:\n\n| Id | Operation | Name | Rows| Pstart| Pstop|\n\n| 0 | SELECT STATEMENT\
    \ | | 3 | | |\n\n| 1 | PARTITION RANGE ALL| | 3 | 1 | 3 |\n\n| 2 | TABLE ACCESS\
    \ FULL | F_SALES | 3 | 1 | 3 |\n\nNotice in this output that the starting partition\
    \ is number 1 and the stopping partition is number 3.\n\nThis means partitions\
    \ 1 through 3 are accessed by this query with no pruning of partitions.\n\nThis\
    \ example is simple but demonstrates the concept of partition pruning. When you\
    \ access the table by the partition key, you can drastically reduce the number\
    \ of rows Oracle needs to inspect and process. This has huge performance benefits\
    \ for queries that are able to prune partitions.\n\nSummary\n\nOracle provides\
    \ a partitioning feature that is critical for implementing large tables and indexes.\n\
    \nPartitioning is vital for building highly scalable and maintainable applications.\
    \ This feature works on the concept of logically creating an object (table or\
    \ index) but implementing the object as several separate 305\n\nCHAPTER 11 ■ PARTITIONING:\
    \ DIVIDE AND CONQUER\n\nobjects. A partitioned object allows you to build, load,\
    \ maintain, and query on a partition-by-partition basis. Maintenance operations\
    \ such as deleting, archiving, updating, and inserting data are manageable because\
    \ you’re working on only a small subset of the large logical table.\n\nIf you\
    \ work in data-warehouse environments or with large databases, you must be highly\
    \ knowledgeable of partitioning concepts. As a DBA, you’re required to create\
    \ and maintain partitioned objects. You have to make recommendations about table-partitioning\
    \ strategies and where to use local and global indexes. These decisions have a\
    \ huge impact on the usability and performance of the system.\n\nAfter this chapter,\
    \ the book focuses on utilities used to copy and move users, objects, and data\
    \ from one environment to another. Oracle’s Data Pump and External Table feature\
    \ are covered in the next two chapters.\n\n![](index-341_1.png)\n\nCHAPTER 13\
    \ ■ DATA PUMP\n\nData Pump Architecture\n\nData Pump consists of the following\
    \ components:\n\n• expdp (Data Pump export utility)\n\n• impdp (Data Pump import\
    \ utility)\n\n• DBMS_DATAPUMP PL/SQL package (Data Pump API)\n\n• DBMS_METADATA\
    \ PL/SQL package (Data Pump Metadata API)\n\nThe expdp and impdp utilities use\
    \ the DBMS_DATAPUMP and DBMS_METADATA built-in PL/SQL packages when exporting\
    \ and importing data and metadata. The DBMS_DATAPUMP package moves entire databases\
    \ or subsets of data between database environments. The DBMS_METADATA package\
    \ exports and imports information about database objects.\n\n■ **Note** You can\
    \ call the DBMS_DATAPUMP and DBMS_METADATA packages independently (outside of\
    \ expdp and impdp) from SQL*Plus. I rarely call these packages directly from SQL*Plus;\
    \ but you may have a specific scenario where it’s desirable to interact directly\
    \ with them. See the Oracle Database PL/SQL Packages and Types Reference guide\
    \ (available on OTN) for more details.\n\nWhen you start a Data Pump export or\
    \ import job, a master operating-system process is initiated on the database server.\
    \ This master process name has the format ora_dmNN_<SID>. On Linux/Unix systems,\
    \ you can view this process from the operating-system prompt using the ps command:\
    \ $ ps -ef | grep ora_dm\n\noracle 14950 717 0 10:59:06 ? 0:10 ora_dm00_STAGE\n\
    \nDepending on the degree of parallelism and the work specified, a number of worker\
    \ processes are also started. The master process coordinates the work between\
    \ master and worker processes. The worker process names have the format ora_dwNN_<SID>.\n\
    \nAlso, when a user starts an export or import job, a database status table is\
    \ created (owned by the user who starts the job). This table exists for the duration\
    \ of the Data Pump job. The name of the status table is dependent on what type\
    \ of job you’re running. The table is named with the format SYS_<OPERATION>_<JOB_MODE>_NN,\
    \ where OPERATION is either EXPORT or IMPORT. JOB_MODE can be FULL, SCHEMA, TABLE,\
    \ TABLESPACE, and so on.\n\nFor example, if you’re exporting a schema, a table\
    \ is created in your account with the name SYS_EXPORT_SCHEMA_NN, where NN is a\
    \ number that makes the table name unique in the user’s schema.\n\nThis status\
    \ table contains information such as the objects exported/imported, start time,\
    \ elapsed time, rows, error count, and so on. The status table has over 80 columns.\n\
    \nThe status table is dropped by Data Pump upon successful completion of an export\
    \ or import job. If you use the KILL_JOB interactive command, the master table\
    \ is also dropped. If you stop a job with the STOP_JOB interactive command, the\
    \ table isn’t removed and is used in the event you restart the job.\n\nIf your\
    \ job terminates abnormally, the master table is retained. You can delete the\
    \ status table if you don’t plan to restart the job.\n\n![](index-343_1.png)\n\
    \n![](index-344_1.png)\n\nCHAPTER 13 ■ DATA PUMP\n\nDIRECTORY command to accomplish\
    \ this. This example creates a directory named dp_dir and specifies that it is\
    \ to map to the /oradump physical location on disk:\n\nSQL> create directory dp_dir\
    \ as '/oradump';\n\nTo view the details of the newly created directory, issue\
    \ this query: SQL> select owner, directory_name, directory_path from dba_directories;\
    \ By default, when you install Oracle, one default directory object is created\
    \ named DATA_PUMP_DIR. If you don’t specify the DIRECTORY parameter when exporting\
    \ or importing, Oracle by default attempts to use the default database-directory\
    \ object. The default directory associated with DATA_PUMP_DIR can vary depending\
    \ on the version of Oracle. On some systems, it may be ORACLE_HOME/rdbms/log;\
    \ on other systems, it may point to ORACLE_BASE/admin/ORACLE_SID/dpdump. You have\
    \ to inspect DBA_DIRECTORIES to verify the default location for your system.\n\
    \nGranting Access to the Directory\n\nYou need to grant permissions on the database-directory\
    \ object to a user that wants to use Data Pump.\n\nUse the GRANT statement to\
    \ allocate the appropriate privileges. If you want a user to be able to read from\
    \ and write to the directory, you must grant security access as follows: SQL>\
    \ grant read, write on directory dp_dir to darl;\n\nAll directory objects are\
    \ owned by the SYS user. If you’re using a user account that has the DBA role\
    \ granted to it, then you have the read and write privileges on the directory\
    \ object. I usually perform Data Pump jobs with a user that has DBA granted to\
    \ it (so I don’t need to bother with granting access).\n\nTaking an Export\n\n\
    When the directory object and grants are in place, you can use Data Pump to export\
    \ information from a database. DBAs typically use exports for point-in-time backups\
    \ of data and metadata. You can use these exports to either restore database objects\
    \ or move data to different database environments. Suppose you recently created\
    \ a table and populated it with data:\n\nSQL> create table inv(inv_id number);\n\
    \nSQL> insert into inv values (123);\n\nNow, you want to export the table. This\
    \ example uses the previously created directory named DP_DIR. Data Pump uses the\
    \ directory path specified by the directory object as the location on disk to\
    \ write the dump file and log file:\n\n$ expdp darl/foo directory=dp_dir tables=inv\
    \ dumpfile=exp.dmp logfile=exp.log The expdp job creates a file named exp.dmp\
    \ in the /oradump directory that contains the information required to re-create\
    \ the INV table and populate it with data as of the time the export was taken.\
    \ In addition, a log file named exp.log is created in the /oradump directory that\
    \ contains all the logging information associated with this export job.\n\nIf\
    \ you don’t specify a dump-file name, Data Pump creates a file named expdat.dmp.\
    \ If a file named expdat.dmp already exists in the directory, then Data Pump throws\
    \ an error. If you don’t specify a log-file name, then Data Pump creates one named\
    \ export.log. If a file already exists (named export.log), then Data Pump overwrites\
    \ it.\n\n![](index-346_1.png)\n\nCHAPTER 13 ■ DATA PUMP\n\nInteractive Command\
    \ Mode\n\nData Pump provides an interactive command mode that allows you to monitor\
    \ the status of a Data Pump job and modify on-the-fly a number of job characteristics.\
    \ The interactive command mode is most useful for long-running Data Pump operations.\
    \ In this mode, you can also stop, re-start, or terminate a currently running\
    \ job. Each of these activities is discussed in the following subsections.\n\n\
    Entering Interactive Command Mode\n\nThere are two ways to get to the interactive\
    \ command-mode prompt:\n\n• Press Ctrl+C in a Data Pump job that you started via\
    \ expdp or impdp.\n\n• Use the ATTACH parameter to attach to a currently running\
    \ job\n\nWhen you run a Data Pump job from the command line, you’re placed in\
    \ the command-line mode.\n\nYou should see output displayed to your terminal as\
    \ a job progresses. If you want to exit command-line mode, press Ctrl+C. This\
    \ places you in the interactive command-interface mode. For an export job, the\
    \ prompt is\n\nExport>\n\nType in the HELP command to view the export interactive\
    \ commands available (see Table 13–1 for a description):\n\nExport> help\n\nType\
    \ EXIT to leave interactive command mode:\n\nExport> exit\n\nYou should now be\
    \ at the operating-system prompt.\n\n***Table 13–1.** Export Interactive Commands*\n\
    \n**Command Description**\n\nADD_FILE\n\nAdds files to the export dump set.\n\n\
    CONTINUE_CLIENT\n\nContinues with interactive client mode.\n\nEXIT_CLIENT\n\n\
    Exits the client session and returns to the operating-system prompt. Leaves the\
    \ current job running.\n\nFILESIZE\n\nDefines file size for any subsequently created\
    \ dump files.\n\nHELP\n\nDisplays interactive export commands.\n\nKILL_JOB\n\n\
    Terminates the current job.\n\nPARALLEL\n\nIncreases or decreases the degree of\
    \ parallelism.\n\nSTART_JOB\n\nRestarts the attached job.\n\nSTATUS\n\nDisplays\
    \ the status of the currently attached job.\n\nSTOP_JOB\n\nStops a job from processing\
    \ (you can later restart it). Using the IMMEDIATE\n\n[=IMMEDIATE]\n\nparameter\
    \ quickly stops the job, but there may be some incomplete tasks.\n\nCHAPTER 13\
    \ ■ DATA PUMP\n\nYou can press Ctrl+C for either an export or import job. For\
    \ an import job, the interactive command-mode prompt is\n\nImport>\n\nTo view\
    \ all commands available, type HELP:\n\nImport> help\n\nThe interactive command-mode\
    \ import commands are summarized in table 13–2.\n\n***Table 13–2.** Import Interactive\
    \ Commands*\n\n**Command Description**\n\nCONTINUE_CLIENT\n\nContinues with interactive\
    \ logging mode.\n\nEXIT_CLIENT\n\nExits the client session and returns to the\
    \ operating-system prompt.\n\nLeaves the current job running.\n\nHELP\n\nDisplays\
    \ the available interactive commands.\n\nKILL_JOB\n\nTerminates the job it’s currently\
    \ connected to in the client.\n\nPARALLEL\n\nIncreases or decreases the degree\
    \ of parallelism.\n\nSTART_JOB\n\nRestarts a previously stopped job. START_JOB=SKIP_CURRENT\
    \ restarts the job and skips any operations that were active when the job was\
    \ stopped.\n\nSTATUS\n\nSpecifies the frequency at which the job status is monitored.\
    \ Default mode is 0; the client reports job status changes whenever available\
    \ in this mode.\n\nSTOP_JOB [=IMMEDIATE]\n\nStops a job from processing (you can\
    \ later restart it). Using the IMMEDIATE\n\nparameter quickly stops the job, but\
    \ there may be some incomplete tasks.\n\nType EXIT to leave the Data Pump status\
    \ utility:\n\nImport> exit\n\nYou should now be at the operating-system prompt.\n\
    \nAttaching to a Running Job\n\nOne powerful feature of Data Pump is that you\
    \ can attach to a currently running job and view its progress and status. If you\
    \ have DBA privileges, you can even attach to a job if you aren’t the owner. You\
    \ can attach to either an import or an export job via the ATTACH parameter.\n\n\
    Before you attach to a job, you must first determine the Data Pump job name (and\
    \ owner name if you’re not the owner of the job). Run the following SQL query\
    \ to display currently running jobs: SQL> select owner_name, operation, job_name,\
    \ state from dba_datapump_jobs; 314\n\nCHAPTER 13 ■ DATA PUMP\n\nHere’s some sample\
    \ output:\n\nOWNER_NAME OPERATION JOB_NAME STATE\n\n--------------- ---------------\
    \ -------------------- ---------------\n\nDARL IMPORT SYS_IMPORT_SCHEMA_02 EXECUTING\n\
    \nDARL IMPORT SYS_IMPORT_SCHEMA_01 NOT RUNNING\n\nIn this example, you’re the\
    \ owner of the job, so you use the ATTACH parameter without prepending the owner\
    \ name to it. This is an import job, so you use the impdp command to attach to\
    \ the job name SYS_IMPORT_SCHEMA_02:\n\n$ impdp darl/engdev attach=sys_import_schema_02\n\
    \nIf you aren’t the owner of the job, you attach to the job by specifying the\
    \ owner name and the job name:\n\n$ impdp system/foobar attach=darl.sys_import_schema_02\n\
    \nYou should now see the Data Pump command-line prompt:\n\nImport>\n\nType STATUS\
    \ to view the status of the currently attached job:\n\nImport> status\n\nStopping\
    \ and Restarting a Job\n\nIf you have a currently running Data Pump job that you\
    \ want to temporarily stop, you can do so by first attaching to the interactive\
    \ command mode. You may want to stop a job to resolve space issues or performance\
    \ issues and then, after resolving the issues, restart the job. This example attaches\
    \ to an import job:\n\n$ impdp darl/foo attach=sys_import_table_01\n\nNow, stop\
    \ the job using the STOP_JOB parameter:\n\nImport> stop_job\n\nYou should see\
    \ this output:\n\nAre you sure you wish to stop this job ([yes]/no):\n\nType YES\
    \ to proceed with stopping the job. You can also specify that the job be stopped\
    \ immediately:\n\nImport> stop_job=immediate\n\nWhen you stop a job with the IMMEDIATE\
    \ option, there may be some incomplete tasks associated with the job. To restart\
    \ a job, attach to interactive command mode and issue the START_JOB command: Import>\
    \ start_job\n\nIf you want to resume logging job output to your terminal, issue\
    \ the CONTINUE_CLIENT command: Import> continue_client\n\nCHAPTER 13 ■ DATA PUMP\n\
    \nTerminating a Data Pump Job\n\nYou can instruct Data Pump to permanently kill\
    \ an export or import job. First, attach to the job in interactive command mode,\
    \ and then issue the KILL_JOB command:\n\nImport> kill_job\n\nYou should be prompted\
    \ with the following:\n\nAre you sure you wish to stop this job ([yes]/no):\n\n\
    Type YES to permanently kill the job. Data Pump unceremoniously kills the job\
    \ and drops the associated status table from the user running the export or import.\n\
    \nTips for Getting Started\n\nThis section describes some common Data Pump features\
    \ that I regularly use. These techniques can assist you in minimizing command-line\
    \ errors and help verify what was exported or what objects and metadata are imported.\n\
    \nUse a Parameter File\n\nInstead of typing commands on the command line, in many\
    \ situations it’s preferable to store the commands in a file and then reference\
    \ the file when executing Data Pump export or import. Using parameter files makes\
    \ tasks more repeatable and less prone to errors. You can place the commands in\
    \ a file once and then reference that file multiple times.\n\nAdditionally, some\
    \ of the Data Pump commands (like FLASHBACK_TIME) require the use of quotation\
    \ marks; in these situations, it’s sometimes hard to predict how the operating\
    \ system will interpret the quotation marks. Whenever a command requires quotation\
    \ marks, it’s highly preferable to use a parameter file.\n\nTo use a parameter\
    \ file, first create an operating text file that contains the commands you want\
    \ to use to control the behavior of your job. This example uses the Linux/Unix\
    \ vi command to create a text file named imp.par:\n\n$ vi imp.par\n\nNow, place\
    \ the following commands in the imp.par file:\n\nuserid=darl/foo\n\ndirectory=dp\n\
    \ndumpfile=invp.dmp\n\nlogfile=invp.log\n\ntables=f_sales\n\nNext, reference the\
    \ parameter file via the PARFILE command-line option: $ impdp parfile=pfile.ctl\n\
    \nData Pump import processes the parameters in the file as if they were typed\
    \ on the command line. If you find yourself repeatedly typing the same commands,\
    \ then consider using a parameter file to increase your efficiency.\n\nCHAPTER\
    \ 13 ■ DATA PUMP\n\nEstimating the Size of Export Jobs\n\nIf you’re about to export\
    \ a large amount of data, you can estimate the size of the file that Data Pump\
    \ creates before you run the export. You may want to do this because you’re concerned\
    \ about the amount of space an export job needs.\n\nTo estimate the size, use\
    \ the ESTIMATE_ONLY parameter. This example estimates the size of the export file\
    \ for an entire database:\n\n$ expdp dbauser/foo estimate_only=y full=y logfile=n\n\
    \nHere’s a snippet of the output:\n\nEstimate in progress using BLOCKS method...\n\
    \nProcessing object type DATABASE_EXPORT/SCHEMA/TABLE/TABLE_DATA\n\n. estimated\
    \ \"REP_MV\".\"REG_QUEUE_REP\" 9.606 GB\n\n. estimated \"REP_MV\".\"CWP_USER_PROFILE\"\
    \ 2.589 GB\n\n. estimated \"REP_MV\".\"PRODUCT_INSTANCES_MV\" 1.620 GB\n\n. estimated\
    \ \"REP_MV\".\"ROLES_MV\" 1.550 GB\n\n. estimated \"STAR2\".\"F_DOWNLOADS\":\"\
    DOWN_P_5\" 1.450 GB\n\n. estimated \"STAR2\".\"F_DOWNLOADS\":\"DOWN_P_11\" 1.414\
    \ GB\n\nSimilarly, you can specify a schema name to get an estimate of the size\
    \ required to export a user: $ expdp dbauser/foo estimate_only=y schemas=star2\
    \ logfile=n\n\nHere’s an example of estimating the size required for two tables:\n\
    \n$ expdp dbauser/foo estimate_only=y tables=star2.f_downloads,star2.f_installations\
    \ \\\n\nlogfile=n\n\nListing the Contents of Dump Files\n\nData Pump has a very\
    \ robust method of creating a file that contains all the SQL that’s executed when\
    \ an import job runs. Data Pump uses the DBMS_METADATA package to create the DDL\
    \ that you can use to recreate objects in the Data Pump dump file.\n\nUse the\
    \ SQLFILE option of Data Pump import to list the contents of a Data Pump export\
    \ file. This example creates a file named expfull.sql that contains the SQL statements\
    \ that the import process calls (the file is placed in the directory defined by\
    \ the DPUMP_DIR2 directory object): $ impdp hr/hr DIRECTORY=dpump_dir1 DUMPFILE=expfull.dmp\
    \ \\\n\nSQLFILE=dpump_dir2:expfull.sql\n\nIn the previous command, if you don’t\
    \ specify a separate directory (like dpump_dir2 in this example), then the SQL\
    \ file is written to the location specified in the DIRECTORY option.\n\n■ **Tip**\
    \ You must run the previous command as a user with DBA privileges or the schema\
    \ that performed the Data Pump export. Otherwise, you get an empty SQL file without\
    \ the expected SQL statements in it.\n\nWhen you use the SQLFILE option with an\
    \ import, the impdp process doesn’t import any data. It only creates a file that\
    \ contains the SQL commands that would be run by the import process. It’s sometimes\
    \ handy to generate a SQL file for the following reasons:\n\n![](index-352_1.png)\n\
    \nCHAPTER 13 ■ DATA PUMP\n\nOracle also provides the transportable tablespace\
    \ feature, which lets you copy the datafiles from a source database to the destination\
    \ and then use Data Pump to transfer the associated metadata. These two techniques\
    \ are described in this section.\n\n■ **Note** See Chapter 14 for a discussion\
    \ of using external tables to transfer data.\n\nExporting and Importing Directly\
    \ Across the Network\n\nSometimes you need to create a testing database and load\
    \ it with production data. In scenarios like this, the production box is usually\
    \ located remotely from the development box. Data Pump provides you the ability\
    \ to take an export and directly import it into your target database without creating\
    \ any intermediate dump files. This is a fast and efficient way to create new\
    \ environments from existing environments.\n\nAn example will help illustrate\
    \ how this works. For this example, the production database users are STAR2, CIA_APP,\
    \ and CIA_SEL. You want to move these users into a testing database and name them\
    \ STAR_JUL, CIA_APP_JUL, and CIA_SEL_JUL.\n\nThis task requires the following\
    \ high-level steps:\n\n1\\. Create users in the destination database to be imported\
    \ into. Here’s a sample script that creates the users in the testing database:\n\
    \ndefine star_user=star_jul\n\ndefine star_user_pwd=star_jul_pwd\n\ndefine cia_app_user=cia_jul_dec\n\
    \ndefine cia_app_user_pwd=cia_app_jul_pwd\n\ndefine cia_sel_user=cia_sel_jul\n\
    \ndefine cia_sel_user_pwd=cia_sel_jul_pwd\n\n--\n\ncreate user &&star_user identified\
    \ by &&star_user_pwd; grant connect,resource to &&star_user;\n\nalter user &&star_user\
    \ default tablespace dim_data;\n\n--\n\ncreate user &&cia_app_user identified\
    \ by &&cia_app_user_pwd; grant connect,resource to &&cia_app_user;\n\nalter user\
    \ &&cia_app_user default tablespace cia_data;\n\n--\n\ncreate user &&cia_sel_user\
    \ identified by &&cia_app_user_pwd; grant connect,resource to &&cia_app_user;\n\
    \nalter user &&cia_sel_user default tablespace cia_data;\n\n2\\. Create a database\
    \ link in your testing database that points to your production database. The remote\
    \ user referenced in the CREATE DATABASE LINK statement has the DBA role granted\
    \ to it in the production database. Here’s a sample CREATE DATABASE LINK script:\n\
    \ncreate database link dk\n\nconnect to darl identified by foobar\n\nusing 'dwdb1:1522/dwrep1';\n\
    \n3\\. Create a directory that points to the location where you want your log\
    \ file to go: 319\n\nCHAPTER 13 ■ DATA PUMP\n\nSQL> create or replace directory\
    \ engdev as '/orahome/oracle/ddl/engdev'; 4\\. Run the import command on the testing\
    \ box. This command references the remote database via the NETWORK_LINK parameter.\
    \ This command also instructs Data Pump to map the production database user names\
    \ to the newly created users in the testing database.\n\n$ impdp darl/engdev directory=engdev\
    \ network_link=dk \\\n\nschemas='STAR2,CIA_APP,CIA_SEL' \\\n\nremap_schema=STAR2:STAR_JUL,CIA_APP:CIA_APP_JUL,CIA_SEL:CIA_SEL_JUL\
    \ \\\n\nparallel=4\n\nThis technique allows you to move large amounts of data\
    \ between disparate databases without having to create or copy any dump files\
    \ or datafiles. This is a very powerful Data Pump feature that lets you quickly\
    \ and efficiently transfer data.\n\nIf you don’t have Oracle Net connectivity\
    \ between the two databases, then the steps to accomplish the same task are as\
    \ follows:\n\n1\\. Export the production database.\n\n2\\. Copy the dump file\
    \ to the testing database.\n\n3\\. Import the dump file into the testing database.\n\
    \nCopying Datafile(s)\n\nOracle provides a mechanism for copying datafiles from\
    \ one database to another in conjunction with using Data Pump to transport the\
    \ associated metadata. This is known as the *transportable tablespace* feature.\
    \ The amount of time this takes depends on how long it takes you to copy the datafiles\
    \ to the destination server. This technique is appropriate for moving data in\
    \ decision-support systems and data-warehousing environments.\n\nFollow these\
    \ steps to transport tablespaces:\n\n1\\. Ensure that the tablespace is self-contained.\
    \ These are some common violations of the self-contained rule:\n\n• An index in\
    \ one tablespace can’t point to a table in another tablespace that isn’t in the\
    \ set of tablespaces being transported.\n\n• A foreign-key constraint is defined\
    \ on a table in one tablespace that references a primary-key constraint on a table\
    \ in a tablespace that isn’t in the set of tablespaces being transported.\n\n\
    Run the following check to see if the set of tablespaces being transported violates\
    \ any of the self-contained rules:\n\nSQL> exec dbms_tts.transport_set_check('INV_DATA,INV_INDEX',\
    \ TRUE); Now, see if Oracle detected any violations:\n\nSQL> select * from transport_set_violations;\n\
    \nIf you don’t have any violations, you should see:\n\nno rows selected\n\n2\\\
    . Make the tablespaces being transported read-only:\n\nCHAPTER 13 ■ DATA PUMP\n\
    \nSQL> alter tablespace inv_data read only;\n\nSQL> alter tablespace inv_index\
    \ read only;\n\n3\\. Use Data Pump to export the metadata for the tablespaces\
    \ being transported: $ expdp darl/foo directory=dp dumpfile=trans.dmp \\\n\ntransport_tablespaces=INV_DATA,INV_INDEX\n\
    \n4\\. Copy the Data Pump export dump file to the destination server.\n\n5\\.\
    \ Copy the datafile(s) to the destination database. Place the files in the directory\
    \ where you want them in the destination database server. The filename and directory\
    \ path must match the import command used in the next step.\n\n6\\. Import the\
    \ metadata into the destination database. Use the following parameter file to\
    \ import the metadata for the datafiles being transported: userid=darl/foo\n\n\
    directory=dp\n\ndumpfile=trans.dmp\n\ntransport_datafiles=/ora01/dbfile/O11R2/inv_data01.dbf,\n\
    \n/ora01/dbfile/O11R2/inv_index01.dbf\n\nIf everything goes well, you should see\
    \ some output indicating success: Processing object type TRANSPORTABLE_EXPORT/CONSTRAINT/REF_CONSTRAINT\n\
    \nProcessing object type TRANSPORTABLE_EXPORT/POST_INSTANCE/PLUGTS_BLK\n\nJob\
    \ \"DARL\".\"SYS_IMPORT_TRANSPORTABLE_01\" successfully completed at 11:24:01\n\
    \nIf the datafiles that are being transported have a different block size than\
    \ the destination database, then you must modify your initialization file (or\
    \ use an ALTER SYSTEM command) and add a buffer pool that contains the block size\
    \ of the source database. For example, to add a 16KB buffer cache, place this\
    \ in the initialization file:\n\ndb_16k_cache_size=200M\n\nThe transportable tablespace\
    \ mechanism allows you to quickly move datafiles between databases, even if the\
    \ databases use different block sizes or have different endian formats. This section\
    \ doesn’t discuss all the details involved with transportable tablespaces; the\
    \ focus in this chapter is showing how to use Data Pump to transport data. For\
    \ complete details on transportable tablespaces, refer to the *Oracle Database\
    \ Administrator’s Guide* available on OTN.\n\n■ **Note** To generate transportable\
    \ tablespaces, you must use Oracle Enterprise Edition. You can use other editions\
    \ of Oracle to import transportable tablespaces.\n\nExporting and Importing Tablespaces\
    \ and Datafiles\n\nData Pump contains some flexible features for exporting and\
    \ importing tablespaces and datafiles. This section shows Data Pump techniques\
    \ that you can use when working with these important database objects.\n\nCHAPTER\
    \ 13 ■ DATA PUMP\n\nExporting Tablespace Metadata\n\nSometimes you want to replicate\
    \ environments—say, a production environment into a testing environment. One of\
    \ the first tasks is to replicate the tablespaces. You can use Data Pump to pull\
    \ out just the DDL required to re-create the tablespaces for an environment:\n\
    \n$ expdp darl/foo directory=dp dumpfile=phredstg.dmp content=metadata_only full=y\
    \ \\\n\ninclude=tablespace\n\nThe FULL parameter instructs Data Pump to export\
    \ everything in the database. When you also specify INCLUDE, Data Pump exports\
    \ only those objects. In this scenario, the dump file only has information in\
    \ it regarding tablespaces.\n\nNow you can use the SQLFILE parameter to view the\
    \ DDL associated with the tablespaces that were exported:\n\n$ impdp darl/foo\
    \ directory=dp dumpfile=phredstg.dmp sqlfile=tbsp.sql\n\nRecall that when you\
    \ use the SQLFILE parameter, nothing is imported. The previous command only creates\
    \ a file named tbsp.sql that contains SQL statements. You can modify the DDL and\
    \ run it in the destination database environment; or, if nothing needs to change,\
    \ you can directly use the dump file by importing it into the destination database.\n\
    \nSpecifying Different Datafile Paths and Names\n\nWhen you’re exporting and then\
    \ importing, sometimes you import tablespaces into a database where the directory\
    \ structures are different from the original database. On the import step, the\
    \ REMAP_DATAFILE\n\nallows you to seamlessly change the underlying names of datafiles.\
    \ Here’s a parameter file that contains the remapping statements:\n\nuserid=darl/foo\n\
    \ndirectory=dp\n\ndumpfile=phredstg.dmp\n\nfull=y\n\ninclude=tablespace:\"like\
    \ 'TBSP%'\"\n\nremap_datafile=\"'/ora01/dbfile/O11R2/tbsp101.dbf':'/ora02/O11R2/tb1.dbf'\"\
    \n\nremap_datafile=\"'/ora01/dbfile/O11R2/tbsp201.dbf':'/ora02/O11R2/tb2.dbf'\"\
    \n\nremap_datafile=\"'/ora01/dbfile/O11R2/tbsp301.dbf':'/ora02/O11R2/tb3.dbf'\"\
    \n\nWhen Data Pump creates the tablespaces, for any paths that match the first\
    \ part of the string (to the left of the colon [:]), the string is replaced with\
    \ the text to the right of the colon.\n\nChanging Segment and Storage Attributes\n\
    \nWhen importing, you can alter the storage attributes of a table by using the\
    \ TRANSFORM parameter. The general syntax for this parameter is\n\nTRANSFORM=transform_name:value[:object_type]\n\
    \nWhen you use SEGMENT_ATTRIBUTES:n for the transformation name, you can remove\
    \ the following segment attributes during an import:\n\n• Physical attributes\n\
    \n• Storage attributes\n\nCHAPTER 13 ■ DATA PUMP\n\n• Tablespaces\n\n• Logging\n\
    \nHere’s an example that removes the segment attributes:\n\n$ impdp darl/foo directory=dp\
    \ dumpfile=inv.dmp transform=segment_attributes:n You can remove just the storage\
    \ clause by using STORAGE:n:\n\n$ impdp darl/foo directory=dp dumpfile=inv.dmp\
    \ transform=storage:n\n\nImporting into a Different Tablespace from the Original\n\
    \nSometimes you’re exporting out of one database and want to import objects into\
    \ another database, but you want to change the tablespaces for the tables and\
    \ indexes—in other words, create the objects in the destination database but in\
    \ tablespaces different than the source database configuration.\n\nThis example\
    \ remaps the user as well as the tablespaces. The original user and tablespaces\
    \ are HEERA and TBSP1\\. This command imports the TICKET table into the CHAYA\
    \ user and the V_DATA tablespace: $ impdp darl/foo directory=dp dumpfile=rm.dmp\
    \ remap_schema=HEERA:CHAYA \\\n\nremap_tablespace=TBSP1:V_DATA tables=heera.ticket\n\
    \nThe REMAP_TABLESPACE feature doesn’t re-create tablespaces. It only instructs\
    \ Data Pump to place objects in different tablespaces (from where they were originally\
    \ exported). When importing, if the tablespace that you’re placing the object\
    \ in doesn’t exist, Data Pump throws an error.\n\nChanging the Size of Datafiles\n\
    \nYou can change the size of the datafiles when importing by using the TRANSFORM\
    \ parameter with the PCTSPACE option. For example, if you want the tablespaces\
    \ to be created at 20 percent of the original size, specify the following:\n\n\
    userid=darl/foo\n\ndirectory=dp\n\ndumpfile=phredstg.dmp\n\nfull=y\n\ninclude=tablespace:\"\
    like 'TBSP%'\"\n\ntransform=pctspace:20\n\nThe tablespaces are created with datafiles\
    \ 20 percent of their original size. The extent allocation sizes are also 20 percent\
    \ of their original definition. This feature is useful when used to export production\
    \ data and then import it into a smaller database. In these scenarios, you may\
    \ be filtering out some of the production data via the SAMPLE parameter or QUERY\
    \ parameters (discussed in the next section).\n\nCHAPTER 13 ■ DATA PUMP\n\nFiltering\
    \ Data and Objects\n\nData Pump has a vast array of mechanisms to filter data\
    \ and metadata. You can influence what is excluded or included in a Data Pump\
    \ export or import in the following ways:\n\n• Use the QUERY parameter to export\
    \ or import subsets of data.\n\n• Use the SAMPLE parameter to export a percentage\
    \ of the rows in a table.\n\n• Use the CONTENT parameter to exclude or include\
    \ data and metadata.\n\n• Use the EXCLUDE parameter to specifically name items\
    \ to be excluded.\n\n• Use the INCLUDE parameter to name the items to be included\
    \ (thereby excluding other non-dependent items not included in the list).\n\n\
    • Use parameters like SCHEMA to specify that you only want a subset of the database’s\
    \ objects (those that belong to the specified user or users).\n\nExamples of each\
    \ of these techniques are described in the following subsections.\n\n■ **Note**\
    \ You can’t use EXCLUDE and INCLUDE at the same time. These parameters are mutually\
    \ exclusive.\n\nSpecifying a Query\n\nYou can use the QUERY parameter to instruct\
    \ Data Pump to write to a dump file only rows that meet a certain criterion. You\
    \ may want to do this if you’re re-creating a test environment and only need subsets\
    \ of the data. Keep in mind that this technique is unaware of any foreign-key\
    \ constraints that may be in place, so you can’t blindly restrict the data sets\
    \ without considering parent/child relationships.\n\nIt has this general syntax\
    \ for including a query:\n\nQUERY = [schema.][table_name:] query_clause\n\nThe\
    \ query clause can be any valid SQL clause. The query must be enclosed by either\
    \ double quotes or single quotes. I recommend using double quotes because you\
    \ may need single quotes embedded in the query to handle VARCHAR data. Also, you\
    \ should use a parameter file so that there is no confusion about how the operating\
    \ system interprets the quotation marks.\n\nThis example uses a parameter file\
    \ and limits the rows exported for two tables. Here’s the parameter file used\
    \ when exporting:\n\nuserid=darl/foo\n\ndirectory=dp\n\ndumpfile=inv.dmp\n\ntables=inv,reg\n\
    \nquery=inv:\"WHERE inv_desc='Book'\"\n\nquery=reg:\"WHERE reg_id <=20\"\n\nSay\
    \ you place the previous lines of code in a file named inv.par. The export job\
    \ references the parameter file as shown:\n\nCHAPTER 13 ■ DATA PUMP\n\n$ expdp\
    \ parfile=inv.par\n\nThe resulting dump file only contains rows filtered by the\
    \ QUERY parameters. Again, be mindful of any parent/child relationships, and ensure\
    \ that what gets exported won’t violate any constraints on the import.\n\nYou\
    \ can also specify a query when importing data. Here’s a parameter file that limits\
    \ the rows imported into the INV table based on the INV_ID column:\n\nuserid=darl/foo\n\
    \ndirectory=dp\n\ndumpfile=inv.dmp\n\ntables=inv,reg\n\nquery=inv:\"WHERE inv_id\
    \ > 10\"\n\nThe previous text is placed in a file named inv2.par and is referenced\
    \ during the import as follows: $ impdp parfile=inv2.par\n\nOnly the rows in the\
    \ INV table that are filtered via the query are imported.\n\nExporting a Percentage\
    \ of the Data\n\nWhen exporting, the SAMPLE parameter instructs Data Pump to retrieve\
    \ a certain percentage of rows based on a number you provide. Data Pump doesn’t\
    \ keep track of parent/child relationships when exporting. Therefore, this approach\
    \ doesn’t work well when you have tables linked via foreign-key constraints and\
    \ you’re trying to randomly select a percentage of rows.\n\nHere’s the general\
    \ syntax for this parameter:\n\nSAMPLE=[[schema_name.]table_name:]sample_percent\n\
    \nFor example, if you want to export 10 percent of the data in a table, do so\
    \ as follows: $ expdp darl/foo directory=dp tables=inv sample=10 dumpfile=inv.dmp\n\
    \nThis next example exports two tables, but only 30 percent of the REG table’s\
    \ data: $ expdp darl/foo directory=dp tables=inv,reg sample=reg:30 dumpfile=inv.dmp\n\
    \n■ **Note** The SAMPLE parameter is only valid for exports.\n\nExcluding Objects\
    \ from the Export File\n\nFor export, the EXLUDE parameter instructs Data Pump\
    \ to not export specified objects (whereas the INCLUDE parameter instructs Data\
    \ Pump to only include specific objects in the export file). The EXCLUDE\n\nparameter\
    \ has this general syntax:\n\nEXCLUDE=object_type[:name_clause] [, ...]\n\nThe\
    \ OBJECT_TYPE refers to a database object like TABLE or INDEX. To see which object\
    \ types can be filtered, view the OBJECT_PATH column of DATABASE_EXPORT_OBJECTS,\
    \ SCHEMA_EXPORT_OBJECTS, or TABLE_EXPORT_OBJECTS. For example, if you want to\
    \ view what schema-level objects can be filtered, run this query:\n\nCHAPTER 13\
    \ ■ DATA PUMP\n\nSELECT\n\nobject_path\n\nFROM schema_export_objects\n\nWHERE\
    \ object_path NOT LIKE '%/%';\n\nHere’s a small snippet of the output:\n\nOBJECT_PATH\n\
    \nSTATISTICS\n\nSYNONYM\n\nSYSTEM_GRANT\n\nTABLE\n\nTABLESPACE_QUOTA\n\nTRIGGER\n\
    \nThe EXCLUDE parameter instructs Data Pump export to filter out specific objects\
    \ from the export. For example, say you’re exporting a table but want to exclude\
    \ the indexes and grants: $ expdp darl/foo directory=dp dumpfile=inv.dmp tables=inv\
    \ exclude=index,grant You can filter at a more granular level by using NAME_CLAUSE.\
    \ The NAME_CLAUSE option of EXCLUDE\n\nallows you to specify a SQL filter. To\
    \ exclude indexes that have names that start with the string “INV”, you use the\
    \ following:\n\nexclude=index:\"LIKE 'INV%'\"\n\nThe previous line requires that\
    \ you use quotation marks; in these scenarios, I recommend that you use a parameter\
    \ file. This is because when you filter by the name of the object, it uses quotation\
    \ marks.\n\nSometimes it’s hard to predict how the operating system will interpret\
    \ quotation marks on the command line. Here’s a parameter file that contains an\
    \ EXCLUDE clause: userid=darl/foo\n\ndirectory=dp\n\ndumpfile=inv.dmp\n\ntables=inv\n\
    \nexclude=index:\"LIKE 'INV%'\"\n\nA few aspects of the EXCLUDE clause may seem\
    \ counterintuitive. For example, consider the following export parameter file:\n\
    \nuserid=darl/foo\n\ndirectory=dp\n\ndumpfile=sch.dmp\n\nexclude=schema:\"='HEERA'\"\
    \n\nIf you attempt to exclude a user in this manner, an error is thrown. This\
    \ is because the default mode of export is SCHEMA level, and Data Pump can’t exclude\
    \ and include a schema at the same time. If you want to exclude a user from an\
    \ export file, specify the FULL mode and exclude the user: userid=darl/foo\n\n\
    directory=dp\n\ndumpfile=sch.dmp\n\nexclude=schema:\"='HEERA'\"\n\nfull=y\n\n\
    CHAPTER 13 ■ DATA PUMP\n\nExcluding Statistics\n\nIf you want to exclude statistics\
    \ from your export job, you can do so using the EXCLUDE parameter. Here’s an example:\n\
    \n$ expdp darl/foo directory=dp dumpfile=invp.dmp tables=f_sales exclude=statistics\
    \ By default, when you export a table object, any statistics are also exported.\
    \ You can prevent statistics from being imported via the EXCLUDE parameter:\n\n\
    $ impdp darl/foo directory=dp dumpfile=invp.dmp tables=f_sales exclude=statistics\
    \ When importing, if you attempt to exclude statistics from a dump file that didn’t\
    \ originally include the statistics, then you receive this error:\n\nORA-39168:\
    \ Object path STATISTICS was not found.\n\nYou also receive this error if the\
    \ objects in the exported dump file never had statistics generated for them.\n\
    \nIncluding Only Specific Objects in an Export File\n\nUse the INCLUDE parameter\
    \ to include only certain database objects in the export file. The following example\
    \ only exports the procedures and functions that a user owns:\n\n$ expdp darl/foo\
    \ dumpfile=proc.dmp directory=datapump include=procedure,function The proc.dmp\
    \ file that is created only contains the DDL required to re-create any procedures\
    \ and functions the user owns.\n\nWhen using INCLUDE, you can also specify that\
    \ only specific PL/SQL objects should be exported: $ expdp darl/foo directory=datapump\
    \ dumpfile=ss.dmp \\\n\ninclude=function:\\\"=\\'IS_DATE\\'\\\"\n\nWhen you’re\
    \ only exporting specific PL/SQL objects, because of the issues with having to\
    \ escape quote marks on the operating-system command line, I recommend using a\
    \ parameter file. When you use a parameter file, you don’t have escape the quote\
    \ marks. The following shows the contents of a parameter file that exports specific\
    \ objects:\n\ndirectory=datapump\n\ndumpfile=pl.dmp\n\ninclude=function:\"='ISDATE'\"\
    ,procedure:\"='DEPTREE_FILL'\"\n\nIf you specify an object that doesn’t exist,\
    \ Data Pump throws an error but continues with the export operation:\n\nORA-39168:\
    \ Object path FUNCTION was not found.\n\nExporting Table, Index, Constraint, and\
    \ Trigger DDL\n\nSuppose you want to export the DDL associated with tables, indexes,\
    \ constraints, and triggers in your database. To do this, use the FULL export\
    \ mode and only include tables: $ expdp darl/foo directory=dp dumpfile=phredstg.dmp\
    \ content=metadata_only full=y \\\n\ninclude=table\n\nCHAPTER 13 ■ DATA PUMP\n\
    \nWhen you export an object, Data Pump also exports any dependent objects. So,\
    \ when you export a table, you also get indexes, constraints, and triggers associated\
    \ with the table.\n\nExcluding Objects from Import\n\nIn general, you can use\
    \ the same techniques used to filter objects in exports to exclude objects from\
    \ being imported. Use the EXCLUDE parameter to exclude objects from being imported.\
    \ For example, to exclude triggers and procedures from being imported:\n\n$ impdp\
    \ darl/foo dumpfile=d.dmp directory=dp exclude=TRIGGER,PROCEDURE\n\nYou can further\
    \ refine what is excluded by adding a SQL clause. For example, say you want to\
    \ not import triggers that begin with the letter *B*. Here’s what the parameter\
    \ file looks like: userid=darl/foo\n\ndirectory=dp\n\ndumpfile=h.dmp\n\nschemas=HEERA\n\
    \nexclude=trigger:\"like 'B%'\"\n\nIncluding Objects in Import\n\nYou can use\
    \ the INCLUDE parameter to reduce what is imported. Suppose you have a schema\
    \ from which you want to import tables that begin with the letter *A*. Here’s\
    \ the parameter file: userid=darl/foo\n\ndirectory=dp\n\ndumpfile=h.dmp\n\nschemas=HEERA\n\
    \ninclude=table:\"like 'A%'\"\n\nIf you place the previous text in a file name\
    \ h.par, then the parameter file can be invoked as follows: $ impdp parfile=h.par\n\
    \nIn this example, the HEERA schema must already exist. Only tables that start\
    \ with the letter *A* are imported.\n\nCommon Data Pump Tasks\n\nThis section\
    \ contains common features you can use with Data Pump. Many of these features\
    \ are standard parts of Data Pump, such as creating a consistent export or taking\
    \ action when imported objects already exist in the database. Other features,\
    \ such as compression and encryption, require the Enterprise Edition of Oracle\
    \ and/or an extra license. I’ll point out these requirements (if relevant) for\
    \ the Data Pump element being described.\n\nCHAPTER 13 ■ DATA PUMP\n\nCreating\
    \ a Consistent Export\n\nA *consistent* export means that all data in the export\
    \ file is consistent as of a time or an system change number (SCN). When you’re\
    \ exporting an active database with many parent-child tables, then you should\
    \ ensure that you get a consistent snapshot of the data. You create a consistent\
    \ export by using either the FLASHBACK_SCN or FLASHBACK_TIME parameter.\n\nThis\
    \ example uses the FLASHBACK_SCN parameter to take an export. To determine the\
    \ current value of the SCN of your dataset, issue this query:\n\nSQL> select current_scn\
    \ from v$database;\n\nHere’s some typical output:\n\nCURRENT_SCN\n\nNext, export\
    \ using the FLASHBACK_SCN parameter:\n\n$ expdp darl/foo directory=dp flashback_scn=8400741902387\n\
    \nThe previous export command ensures that all data exported is consistent with\
    \ any committed transactions in the database as of SCN 8400741902387.\n\nWhen\
    \ you use the FLASHBACK_SCN parameter, Data Pump ensures that the data in the\
    \ export file is consistent as of the specified SCN. This means any transactions\
    \ committed after the specified SCN\n\naren’t included in the export file.\n\n\
    ■ **Note** If you use the NETWORK_LINK parameter in conjunction with FLASHBACK_SCN,\
    \ then the export is taken with the SCN consistent with the database referenced\
    \ in the database link.\n\nYou can also use FLASHBACK_TIME to specify that the\
    \ export file should be created with consistent committed transactions as of a\
    \ specified time. When using FLASHBACK_TIME, Oracle determines the SCN\n\nthat\
    \ most closely matches the time specified and uses that to produce an export consistent\
    \ with that SCN. The syntax for using FLASHBACK_TIME is as follows:\n\nFLASHBACK_TIME=\"\
    TO_TIMESTAMP{<value>}\"\n\nFor some operating systems, double quotes directly\
    \ on the command line must be escaped by a backslash character (\\), because the\
    \ operating system treats the double quotes as special characters.\n\nDue to issues\
    \ regarding how operating systems treat quote marks, it’s much more straightforward\
    \ to use a parameter file. Here are the contents of a parameter file that uses\
    \ FLASHBACK_TIME: directory=datapump\n\ncontent=metadata_only\n\ndumpfile=exp.dmp\n\
    \nflashback_time=\"to_timestamp('26-oct-2009 07:03:00','dd-mon-yyyy hh24:mi:ss')\"\
    \n\nDepending on your operating system, the command-line version of the previous\
    \ example must be specified as follows:\n\nflashback_time=\\\"to_timestamp\\(\\\
    '26-oct-2009 07:03:00\\',\n\nCHAPTER 13 ■ DATA PUMP\n\n\\'dd-mon-yyyy hh24:mi:ss\\\
    '\\)\\\"\n\nThis line of code should be specified on one line. It’s wrapped on\
    \ two lines in this book to fit on the page.\n\nYou can’t specify both FLASHBACK_SCN\
    \ and FLASHBACK_TIME when taking an export; these two parameters are mutually\
    \ exclusive. If you attempt to use both parameters at the same time, Data Pump\
    \ throws the following error message and halts the export job:\n\nORA-39050: parameter\
    \ FLASHBACK_TIME is incompatible with parameter FLASHBACK_SCN\n\n■ **Note** The\
    \ FLASHBACK_SCN and FLASHBACK_TIME parameters are only applicable to the Oracle\
    \ flashback query functionality. These parameters aren’t applicable to flashback\
    \ database or flashback drop.\n\nImporting When Objects Already Exist\n\nWhen\
    \ export and importing data, often you import into a schema that already has the\
    \ objects created (tables, indexes, and so on). In this situation, you should\
    \ import the data but instruct Data Pump to not try to create already-existing\
    \ objects.\n\nYou can achieve this with the TABLE_EXISTS_ACTION and CONTENT parameters.\
    \ The next example instructs Data Pump to append data in any tables that already\
    \ exist via the TABLE_EXISTS_ACTION=APPEND\n\noption. Also used is the CONTENT=DATA_ONLY\
    \ option, which instructs Data Pump to not run any DDL to create objects (only\
    \ load data):\n\n$ impdp darl/foo directory=dk dumpfile=inv.dmp table_exists_action=append\
    \ \\\n\ncontent=data_only\n\nExisting objects aren’t modified in any way, and\
    \ any new data that exists in the dump file is inserted into any tables.\n\nYou\
    \ may wonder what happens if you just use the TABLE_EXISTS_ACTION option and don’t\
    \ combine it with the CONTENT:\n\n$ impdp darl/foo directory=dk dumpfile=inv.dmp\
    \ table_exists_action=append The only difference is that Data Pump attempts to\
    \ run DDL commands to create objects if they exist. It doesn’t stop the job from\
    \ running, but you see an error message in the output indicating that the object\
    \ already exists. Here’s a snippet of the output for the previous command: ORA-39152:\
    \ Table \"INV_MGMT\".\"INV\" exists. Data will be appended to existing table but\
    \ all dependent metadata will be skipped due to table_exists_action of append\
    \ The default for the TABLE_EXISTS_ACTION parameter is SKIP, unless you also specify\
    \ the parameter of CONTENT=DATA_ONLY. If you use CONTENT=DATA_ONLY, then the default\
    \ for TABLE_EXISTS_ACTION is APPEND.\n\nThe TABLE_EXISTS_ACTION parameter takes\
    \ the following options:\n\n• SKIP (default if not combined with CONTENT=DATA_ONLY)\n\
    \n• APPEND (default if combined with CONTENT=DATA_ONLY)\n\n• REPLACE\n\n• TRUNCATE\n\
    \nCHAPTER 13 ■ DATA PUMP\n\nThe SKIP option tells Data Pump to not process the\
    \ object if it exists. The APPEND option instructs Data Pump to not delete existing\
    \ data, but rather to add data to the table without modifying any existing data.\
    \ The REPLACE option instructs Data Pump to drop and re-create objects; this parameter\
    \ isn’t valid when the CONTENT parameter is used with the DATA_ONLY option. The\
    \ TRUNCATE parameter instructs Data Pump to delete rows from tables via a TRUNCATE\
    \ statement.\n\nThe CONTENT parameter takes the following parameter options:\n\
    \n• ALL (default)\n\n• DATA_ONLY\n\n• METADATA_ONLY\n\nThe ALL option instructs\
    \ Data Pump to load both data and metadata contained in the dump file; this is\
    \ the default behavior. The DATA_ONLY option instructs Data Pump to load only\
    \ table data into existing tables; no database objects are created. The METADATA_ONLY\
    \ option only creates objects; no data is loaded.\n\n■ **Note** With the old imp\
    \ utility, you can instruct the import process to ignore existing objects via\
    \ the ignore=y option.\n\nRenaming a Table\n\nStarting with Oracle Database 11\
    \ *g*, you have the option of renaming a table during import operations.\n\nThere\
    \ are many reasons you may want to rename a table when importing it. For example,\
    \ you may have a table in the target schema that has the same name as the table\
    \ you want to import. You can rename a table when importing by using the REMAP_TABLE\
    \ parameter. This example imports the table from the HEERA user INV table to the\
    \ HEERA user INVEN table:\n\n$ impdp darl/foo directory=dk dumpfile=inv.dmp tables=heera.inv\
    \ \\\n\nremap_table=heera.inv:inven\n\nHere’s the general syntax for renaming\
    \ a table:\n\nREMAP_TABLE=[schema.]old_tablename[.partition]:new_tablename\n\n\
    or\n\nREMAP_TABLE=[schema.]old_tablename[:partition]:new_tablename\n\nNotice that\
    \ this syntax doesn’t allow you to rename a table into a different schema. If\
    \ you’re not careful, you may attempt to do the following (thinking that you’re\
    \ moving a table and renaming it in one operation):\n\n$ impdp darl/foo directory=dk\
    \ dumpfile=inv.dmp tables=heera.inv \\\n\nremap_table=heera.inv:scott.inven\n\n\
    You end up with a table in the HEERA schema named SCOTT.INVEN. That can be confusing.\
    \ If you want to import a table into a different schema and rename it at the same\
    \ time, use REMAP_SCHEMA with the REMAP_TABLE parameters:\n\n$ impdp darl/foo\
    \ directory=dk dumpfile=inv.dmp remap_schema=heera:darl \\\n\ntables=heera.inv\
    \ remap_table=heera.inv:invent\n\nCHAPTER 13 ■ DATA PUMP\n\n■ **Note** The process\
    \ of renaming a table wasn’t entirely bug-free in Oracle Database 11g release\
    \ 1\\. It’s been corrected in Oracle Database 11g release 2\\. See My Oracle Support\
    \ Note 886762.1 for more details.\n\nRemapping Data\n\nStarting with Oracle Database\
    \ 11 *g*, when either exporting or importing, you can apply a PL/SQL function\
    \ to alter a column value. For example, you may have an auditor who needs to look\
    \ at the data, and one requirement is that you apply a simple obfuscation function\
    \ to sensitive columns. The data doesn’t need to be encrypted, it just needs to\
    \ be changed enough that the auditor can’t readily determine the value of the\
    \ LAST_NAME column in the CUSTOMERS table.\n\nThis example first creates a simple\
    \ package that is used to obfuscate the data: create or replace package obfus\
    \ is\n\nfunction obf(clear_string varchar2) return varchar2;\n\nfunction unobf(obs_string\
    \ varchar2) return varchar2;\n\nend obfus;\n\n/\n\n--\n\ncreate or replace package\
    \ body obfus is\n\nfromstr varchar2(62) := '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'\
    \ ||\n\n'abcdefghijklmnopqrstuvwxyz';\n\ntostr varchar2(62) := 'defghijklmnopqrstuvwxyzabc3456789012'\
    \ ||\n\n'KLMNOPQRSTUVWXYZABCDEFGHIJ';\n\n--\n\nfunction obf(clear_string varchar2)\
    \ return varchar2 is\n\nbegin\n\nreturn translate(clear_string, fromstr, tostr);\n\
    \nend obf;\n\n--\n\nfunction unobf(obs_string varchar2) return varchar2 is\n\n\
    begin\n\nreturn translate(obs_string, tostr, fromstr);\n\nend unobf;\n\nend obfus;\n\
    \n/\n\nNow, when you import the data into the database, you apply the obfuscation\
    \ function to the LAST_NAME column of the CUSTOMERS table:\n\n$ impdp darl/foo\
    \ directory=dp dumpfile=cust.dmp tables=customers \\\n\nremap_data=customers.last_name:obfus.obf\n\
    \nSelecting LAST_NAME from CUSTOMERS shows that it has been imported in an obfuscated\
    \ manner:\n\nSQL> select last_name from customers;\n\nLAST_NAME\n\nyYZEJ\n\ntOXXSMU\n\
    \nxERX\n\nCHAPTER 13 ■ DATA PUMP\n\nYou can manually apply the package’s UNOBF\
    \ function to see the real values of the column: SQL> select obfus.unobf(last_name)\
    \ from customers;\n\nOBFUS.UNOBF(LAST_NAME)\n\nLopuz\n\nGennick\n\nKuhn\n\nCloning\
    \ a User\n\nSuppose you need to move a user’s objects and data to a new database.\
    \ As part of the migration, you want to rename the user. First, create an export\
    \ file that contains the user you want to clone. In this example, the user name\
    \ is INV:\n\n$ expdp darl/foo directory=dp schemas=inv dumpfile=inv.dmp\n\nNow\
    \ you can use Data Pump import to clone the user. You can do this in the database\
    \ from which the user was exported or in a different database. Use the REMAP_SCHEMA\
    \ parameter to create a copy of a user. In this example, the INV user is cloned\
    \ to the INV_DW user:\n\n$ impdp darl/foo directory=dp remap_schema=inv:inv_dw\
    \ dumpfile=inv.dmp This command copies all structures and data in the INV user\
    \ to the INV_DW user. The resulting INV_DW\n\nuser is identical in terms of objects\
    \ to the INV user. The duplicated schema also contains the same password as the\
    \ schema from which it was copied.\n\nIf you just want to duplicate the metadata\
    \ from one schema to another, use the CONTENT parameter with the METADATA_ONLY\
    \ option:\n\n$ impdp darl/foo remap_schema=inv:inv_dw content=metadata_only dumpfile=inv.dmp\
    \ The REMAP_SCHEMA parameter provides an efficient way to duplicate a schema with\
    \ or without the data. During a schema duplication operation, if you want to change\
    \ the tablespace in which the objects reside, also use the REMAP_TABLESPACE parameter.\
    \ This allows you to duplicate a schema and also place the objects in a different\
    \ tablespace than the source objects’ tablespaces.\n\nYou can also duplicate a\
    \ user from one database to another without first creating a dump file. To do\
    \ this, use the NETWORK_LINK parameter. See the prior section in this chapter\
    \ on Exporting and Importing Directly Across the Network for details on copying\
    \ data directly from one database to another.\n\nSuppressing a Log File\n\nBy\
    \ default, Data Pump creates a log file when generating an export or an import.\
    \ If you know that you don’t want a log file generated, you can suppress it by\
    \ specifying the NOLOGFILE parameter. Here’s an example:\n\n$ expdp heera/foo\
    \ directory=dk tables=inv nologfile=y\n\nIf you choose to not create a log file,\
    \ Data Pump still displays status messages on the output device.\n\nIn general,\
    \ I recommend that you create a log file with every Data Pump operation. This\
    \ gives you an audit trail of your actions.\n\nCHAPTER 13 ■ DATA PUMP\n\nUsing\
    \ Parallelism\n\nUse the PARALLEL parameter to parallelize a Data Pump job. For\
    \ example, if you know you have four CPUs on a box, and you want to set the degree\
    \ of parallelism to 4, use PARALLEL as follows: $ expdp darl/foo parallel=4 dumpfile=exp.dmp\
    \ directory=datapump full=y To take full advantage of the parallel feature, ensure\
    \ that you specify multiple files when exporting.\n\nThe following example creates\
    \ one file for each thread of parallelism: $ expdp darl/foo parallel=4 dumpfile=exp1.dmp,exp2.dmp,exp3.dmp,exp4.dmp\
    \ You can also use the %U substitution variable to instruct Data Pump to automatically\
    \ create dump files to match the degree of parallelism. The %U variable starts\
    \ at the value 01 and increments as additional dump files are allocated. This\
    \ example uses the %U variable: $ expdp darl/foo parallel=4 dumpfile=exp%U.dmp\n\
    \nNow, say you need to import from the dump files created from an export. You\
    \ can either individually specify the dump files or, if the dump files were created\
    \ with the %U variable, use that on import:\n\n$ impdp darl/foo parallel=4 dumpfile=exp%U.dmp\n\
    \nWhen using the % U substitution variable, in this example the import process\
    \ starts by looking for a file with the name of exp01.dmp, then exp02.dmp, and\
    \ so on.\n\n■ **Tip** Oracle recommends that the degree of parallelism not be\
    \ set to more than two times the number of CPUs available on the server.\n\nYou\
    \ can also modify the degree of parallelism while the job is running. First, attach\
    \ in the interactive command mode to the job for which you want to modify the\
    \ degree of parallelism. Then, use the PARALLEL option. In this example, the job\
    \ attached to is SYS_IMPORT_TABLE_01: $ impdp darl/foo attach=sys_import_table_01\n\
    \nImport> parallel=6\n\nYou can check the degree of parallelism via the STATUS\
    \ command:\n\nImport> status\n\nHere’s some sample output:\n\nJob: SYS_IMPORT_TABLE_01\n\
    \nOperation: IMPORT\n\nMode: TABLE\n\nState: EXECUTING\n\nBytes Processed: 0\n\
    \nCurrent Parallelism: 6\n\nCHAPTER 13 ■ DATA PUMP\n\n■ **Note** The PARALLEL\
    \ feature is only available in the Enterprise Edition of the Oracle Database.\n\
    \nSpecifying Additional Dump Files\n\nIf you run out of space in the primary dump-file\
    \ location, then you can specify additional dump-file locations on the fly. Use\
    \ the ADD_FILE command from the interactive command prompt. Here’s the basic syntax\
    \ for adding additional files:\n\nADD_FILE=[directory_object:]file_name [,...]\n\
    \nThis example adds another output file to an already existing Data Pump export\
    \ job: Export> add_file=alt2.dmp\n\nYou can also specify a separate database-directory\
    \ object:\n\nExport> add_file=alt_dir:alt3.dmp\n\nReusing Output File Names\n\n\
    By default, Data Pump doesn’t overwrite an existing dump file. For example, the\
    \ first time you run this job, it will run fine because there is no dump file\
    \ named inv.dmp in the directory being used: $ expdp heera/foo directory=dk dumpfile=inv.dmp\n\
    \nIf you attempt to run the previous command again with the same directory and\
    \ the same dump-file name, this error is thrown:\n\nORA-39000: bad dump file specification\n\
    \nORA-31641: unable to create dump file \"/home/oracle/dp/inv.dmp\"\n\nORA-27038:\
    \ created file already exists\n\nYou can either specify a new dump-file name for\
    \ the export job or use the REUSE_DUMPFILES\n\nparameter to direct Data Pump to\
    \ overwrite an existing dump file. For example: $ expdp heera/foo directory=dk\
    \ dumpfile=inv.dmp reuse_dumpfiles=y\n\nYou should now be able to run the Data\
    \ Pump export regardless of an existing dump file in the output directory with\
    \ the same name. When you set REUSE_DUMPFILES to a value of y, if Data Pump finds\
    \ a dump file with the same name, it overwrites the file.\n\n■ **Note** The default\
    \ value for REUSE_DUMPFILES is n. The REUSE_DUMPFILES parameter is available only\
    \ in Oracle Database 11g or higher.\n\nCHAPTER 13 ■ DATA PUMP\n\nCreating a Daily\
    \ DDL File\n\nSometimes, in database environments, changes occur to database objects\
    \ in unexpected ways. You may have a developer who somehow obtains the production\
    \ user passwords and decides to make a change on the fly without telling anybody.\
    \ Or a DBA may decide not to follow the standard release process and make a change\
    \ to an object while troubleshooting an issue. These scenarios can be frustrating\
    \ for production-support DBAs. Whenever there’s an issue, the first question raised\
    \ is, “What changed?”\n\nWhen you use Data Pump, it’s fairly simple to create\
    \ a file that contains all the DDL to re-create every object in your database.\
    \ You can instruct Data Pump to export or import just the metadata via the CONTENT=METADATA_ONLY\
    \ option.\n\nFor instance, in a production environment you can set up a daily\
    \ job to capture this DDL. If there is ever a question about what changed and\
    \ when, you can go back and compare the DDL in the daily dump files to see exactly\
    \ what changed and when.\n\nListed next is a simple shell script that first exports\
    \ the metadata content from the database and then uses Data Pump import to create\
    \ a DDL file from that export:\n\n#!/bin/bash"
  trans: "\n参考第 2 章了解更多关于设置操作系统变量的细节。\n\n. /var/opt/oracle/oraset $1\n\n#\n\nuserlist=\"\
    system sys dbsnmp dip oracle_ocm outln\"\n\n![](img/index-148_1.png)\n\n# 第 6\
    \ 章 ■ 用户与基本安全\n\n## 创建用户\n\n创建用户时，需要考虑以下因素：\n\n- 用户名\n- 认证方式\n- 基本权限\n- 默认永久表空间\n\
    - 默认临时表空间\n\n创建用户的这些方面将在接下来的小节中讨论。\n\n### 选择用户名和认证方式\n\n选择一个能让你了解该用户将用于哪个应用程序的用户名。例如，如果你有一个库存管理应用程序，一个合适的用户名是`INV_MGMT`。选择一个有意义的用户名有助于识别用户的用途。如果系统文档记录不充分，这会特别有帮助。\n\
    \n认证是用于确认用户是否有权使用该账户的方法。Oracle 支持三种类型的认证：\n\n- 密码\n- 外部服务，例如操作系统\n- 通过企业目录服务（Oracle\
    \ Internet Directory）的全局用户\n\n最常见的用户认证方式是使用密码。外部认证方法允许你使用智能卡、Kerberos 或操作系统进行认证。本节展示了密码验证和外部认证的示例。有关外部和全局认证方法的更多信息，请参考*Oracle\
    \ 数据库安全指南*和*Oracle 数据库高级安全管理员指南*（可从 http://otn.oracle.com 获取）。\n\n当你以 DBA 身份创建用户时，你的账户必须具有`CREATE\
    \ USER`系统权限。你使用`CREATE USER` SQL 语句来创建用户。此示例创建一个名为`HEERA`的用户，密码为`CHAYA`，并分配默认永久表空间`USERS`和默认临时表空间`TEMP`：\n\
    \n```sql\ncreate user heera identified by chaya\ndefault tablespace users\ntemporary\
    \ tablespace temp;\n```\n\n这创建了一个没有任何权限执行数据库中任何操作的原始模式。要使该用户有用，你必须至少授予其`CREATE\
    \ SESSION`系统权限：\n\n```sql\nSQL> grant create session to heera;\n```\n\n如果新模式需要能够创建表，则需要授予其额外的权限，如`CREATE\
    \ TABLE`：\n\n```sql\nSQL> grant create table to heera;\n```\n\n新模式还必须在其需要创建对象的任何表空间上被授予配额权限：\n\
    \n```sql\n第 6 章 ■ 用户与基本安全\n\nSQL> alter user heera quota unlimited on users;\n\
    ```\n\n**注意：** 一种常见的技术是将预定义的角色`CONNECT`和`RESOURCE`授予新创建的模式。这些角色包含诸如`CREATE SESSION`和`CREATE\
    \ TABLE`（以及其他几个，因版本而异）的系统权限。我不建议这样做，因为 Oracle 已声明这些角色在未来版本中可能不可用。\n\n你也可以创建一个由外部服务（如操作系统）认证的用户。在这种情况下，你假设如果用户已通过操作系统登录认证，那么该级别的安全性也足以允许访问数据库。外部认证有一些有趣的优势：\n\
    \n- 访问服务器的用户不必维护数据库的密码。\n- 登录数据库的脚本在由操作系统认证的用户执行时，不必使用硬编码的密码。\n- 其他数据库用户无法通过猜测用户名和密码连接字符串来入侵外部标识的用户。登录外部认证用户的唯一方式是通过外部认证源（如操作系统）。\n\
    - DBA 不必为数据库用户维护密码。\n\n当使用外部操作系统认证时，Oracle 会将`OS_AUTHENT_PREFIX`中包含的值作为前缀添加到连接到数据库的操作系统用户。此参数的默认值是`OPS$`。Oracle\
    \ 强烈建议你将`OS_AUTHENT_PREFIX`参数设置为空字符串。例如：\n\n```sql\nSQL> alter system set os_authent_prefix=''\
    \ scope=spfile;\n```\n\n你必须停止并启动数据库才能使此修改生效。设置好`OS_AUTHENT_PREFIX`变量后，你可以创建一个外部认证的用户。例如，假设你有一个名为`jsmith`的操作系统用户，并且你希望任何拥有此操作系统用户访问权限的人都能够无需提供密码即可登录数据库。使用`CREATE\
    \ EXTERNALLY`语句来实现：\n\n```sql\nSQL> create user jsmith identified externally;\n\
    ```\n\n现在，当`jsmith`登录到数据库服务器时，该用户可以如下连接到 SQL*Plus：\n\n```bash\n$ sqlplus /\n```\n\
    \n不需要用户名或密码，因为用户已经通过操作系统认证。\n\n### 分配默认永久和临时表空间\n\n维护数据库时，应验证默认和临时表空间设置，以确保它们符合你的数据库标准。你可以通过查询`DBA_USERS`视图来查看用户信息：\n\
    \n```sql\nselect\n  username\n  ,password\n  ,default_tablespace\n  ,temporary_tablespace\n\
    from dba_users;\n```\n\n以下是一些示例输出：\n\n```\nUSERNAME       PASSWORD    DEFAULT_TABLESP\
    \ TEMPORARY_TABLE\n-------------- ----------- --------------- ---------------\n\
    JSMITH         EXTERNAL    USERS           TEMP\nDBSNMP         SYSAUX      TEMP\n\
    ORACLE_OCM     USERS       TEMP\nAPPQOSSYS      SYSAUX      TEMP\nAPPUSR     \
    \    USERS       TEMP\n```\n\n除了`SYS`用户之外，你的任何用户都不应将默认永久表空间设置为`SYSTEM`。\n\n你不希望任何非`SYS`用户在`SYSTEM`表空间中创建对象。`SYSTEM`表空间应保留给`SYS`用户的对象。如果其他用户的对象存在于`SYSTEM`表空间中，你将面临填满该表空间并损害数据库可用性的风险。\n\
    \n你所有的用户都应被分配一个创建为临时类型的临时表空间。通常，该表空间命名为`TEMP`（详见第 4 章）。\n\n你绝不希望任何用户的临时表空间是`SYSTEM`。如果用户的临时表空间是`SYSTEM`，那么他们需要临时磁盘存储的任何排序区域都会在`SYSTEM`表空间中获取区。这可能导致`SYSTEM`表空间被填满。你不希望`SYSTEM`表空间被填满，因为如果`SYS`模式无法在其对象增长时获取更多空间，这可能导致数据库无法正常运行。要检查哪些用户的临时表空间是`SYSTEM`，请运行此脚本：\n\
    \n```sql\nSQL> select username from dba_users where temporary_tablespace='SYSTEM';\n\
    ```\n\n通常，在创建用户时，我使用一个名为`creuser.sql`的脚本。该脚本使用定义用户名、密码、默认表空间名称等的变量。对于执行脚本的每个环境（开发、测试、QA、Beta、生产），你可以根据需要为每个环境更改`&`变量。例如，你可以为每个不同的环境使用不同的密码。\n\
    \n以下是一个`creuser.sql`脚本示例：\n\n```sql\nDEFINE cre_user=inv_mgmt\nDEFINE cre_user_pwd=inv_mgmt_pwd\n\
    DEFINE def_tbsp=inv_data\nDEFINE idx_tbsp=inv_index\nDEFINE smk_ttbl=zzzzzzz\n\
    --\nCREATE USER &&cre_user IDENTIFIED BY &&cre_user_pwd\nDEFAULT TABLESPACE &&def_tbsp;\n\
    --\nGRANT CREATE SESSION TO &&cre_user;\nGRANT CREATE TABLE TO &&cre_user;\n--\n\
    ALTER USER &&cre_user QUOTA UNLIMITED ON &&def_tbsp;\nALTER USER &&cre_user QUOTA\
    \ UNLIMITED ON &&idx_tbsp;\n--\n-- 冒烟测试\n```\n\n![](img/index-152_1.png)\n\n第\
    \ 6 章 ■ 用户与基本安全\n\n### 强制实施密码安全\n\n关于强制实施密码安全，有几种不同的思路：\n\n- 使用易于记住的密码，这样你就不必将其写下来或记录在某个文件中。由于密码不够复杂，它们不是很安全。\n\
    - 强制密码达到一定的复杂程度。这样的密码不易记住，因此必须记录在某个地方，这也不安全。\n\n你可能选择强制执行一定程度的密码复杂性，因为你认为这是最安全的选择。或者，你可能被公司安全团队要求强制实施密码安全（因此别无选择）。本节的目的不是辩论前述哪种方法更可取。如果你选择强制密码具有一定程度的复杂性（强度），本节将描述如何强制执行这些规则。\n\
    \n你可以通过将密码验证函数分配给用户的配置文件来强制执行密码复杂性的最低标准。Oracle 提供了一个默认的密码验证函数，你可以通过以`SYS`模式运行以下脚本来创建它：\n\
    \n```sql\nSQL> @?/rdbms/admin/utlpwdmg\nFunction created.\nProfile altered.\n\
    Function created.\n```\n\n对于 Oracle Database 11g，将`DEFAULT`配置文件的`PASSWORD_VERIFY_FUNCTION`设置为`VERIFY_FUNCTION_11G`：\n\
    \n```sql\nSQL> alter profile default limit PASSWORD_VERIFY_FUNCTION verify_function_11G;\n\
    ```\n\n对于 Oracle Database 10g，将`DEFAULT`配置文件的`PASSWORD_VERIFY_FUNCTION`设置为`VERIFY_FUNCTION`：\n\
    \n```sql\nSQL> alter profile default limit PASSWORD_VERIFY_FUNCTION verify_function;\n\
    ```\n\n如果因任何原因需要撤销新的安全修改，请运行此语句以禁用密码函数：\n\n```sql\nSQL> alter profile default\
    \ limit PASSWORD_VERIFY_FUNCTION null;\n```\n\n启用后，密码验证函数可确保用户正确创建或修改其密码。`utlpwdmg.sql`脚本创建一个函数来检查密码，以确保其满足基本安全标准，如最小密码长度、密码不能与用户名相同等。你可以通过尝试更改已分配`DEFAULT`配置文件的用户的密码来验证新的安全函数是否生效。此示例尝试将密码更改为小于最小长度：\n\
    \n```sql\nSQL> password\nChanging password for HEERA\nOld password:\nNew password:\n\
    Retype new password:\nERROR:\nORA-28003: password verification for the specified\
    \ password failed\nORA-20001: Password length less than 8\nPassword unchanged\n\
    ```\n\n第 6 章 ■ 用户与基本安全\n\n**注意：** 对于 Oracle Database 11g，最小密码长度为 8 个字符。对于 Oracle\
    \ Database 10g，最小长度为 4 个字符。\n\n如前所述，从 Oracle Database 11g 开始，强制实施密码大小写敏感性。你可以通过将`SEC_CASE_SENSITIVE_LOGON`初始化参数设置为`FALSE`来禁用此功能：\n\
    \n```sql\nSQL> alter system set sec_case_sensitive_logon = FALSE;\n```\n\n然而，不建议这样做。对于大多数安全要求，你应该使用区分大小写的密码。\n\
    \n另外请记住，可以修改用于创建密码验证函数的代码。例如，你可以打开并修改用于创建此函数的脚本：\n\n```bash\n$ vi $ORACLE_HOME/rdbms/admin/utlpwdmg.sql\n\
    ```\n\n如果你觉得 Oracle 提供的验证函数太强或限制过多，你可以创建自己的函数并将其分配给相应的数据库配置文件。\n\n### 以其他用户身份登录\n\
    \n本节详细介绍如何在不知道用户明文密码的情况下以其他用户身份登录。你可能希望在以下几种情况下执行此操作：\n\n- 你正在将一个用户从一个环境（如生产环境）复制到另一个环境（如测试环境），并且希望保留原始密码。\n\
    - 你需要在生产环境中工作，并且需要能够以拥有对象的用户身份连接，以执行`CREATE TABLE`语句、授予权限等。在生产环境中，由于维护程序不当，你可能不知道用户的密码。\n\
    \n你需要访问具有 DBA 权限的账户，才能在不知道密码的情况下以其他用户身份登录。以下是执行此操作的步骤：\n\n1.  以 DBA 身份，临时存储用户的加密密码。\n\
    2.  更改用户的密码。\n3.  使用新密码连接到用户，并运行数据定义语言（DDL）语句。\n4.  以 DBA 身份连接，并将密码更改回原始密码。\n\n\
    在按照前述步骤更改用户密码之前，请务必小心。首先，在密码更改为临时设置期间，应用程序无法连接到数据库。\n\n如果应用程序反复连接失败，当你超过用户配置文件的`FAILED_LOGIN_ATTEMPTS`限制（默认为锁定前\
    \ 10 次失败尝试）时，可能会锁定该账户。\n\n此外，如果你修改了`PASSWORD_REUSE_MAX`（密码可重用前的天数）和`PASSWORD_REUSE_TIME`（密码可重用前必须更改的次数）的值，那么你将无法将密码重置回其原始值。\n\
    \n第 6 章 ■ 用户与基本安全\n\n下面列出了一个示例，展示如何临时更改用户密码，然后将密码设置回其原始值。首先，选择恢复用户密码到当前设置所需的语句。在此示例中，用户名是`APPUSR`：\n\
    \n```sql\nselect 'alter user appusr identified by values ' ||\n'''' || password\
    \ || '''' || ';'\nfrom user$ where name='APPUSR';\n```\n\n此示例的输出如下：\n\n```sql\n\
    SQL> alter user appusr identified by values 'A0493EBF86198724';\n```\n\n现在，将用户的密码修改为一个已知值（此示例中为`foo`）：\n\
    \n```sql\nSQL> alter user appusr identified by foo;\n```\n\n连接到`APPUSR`用户：\n\n\
    ```sql\nSQL> conn appusr/foo\n```\n\n完成使用`APPUSR`用户后，将其密码更改回原始值：\n\n```sql\nSQL>\
    \ alter user appusr identified by values 'A0493EBF86198724';\n```\n\n再次强调，执行此过程时要非常谨慎，因为你不想让自己陷入密码配置文件设置不允许你重置密码的境地：\n\
    \n```\nORA-28007: the password cannot be reused\n```\n\n如果你收到此错误，一个选项是将密码设置为一个全新的值。然而，这样做可能会对应用程序产生不良影响。如果开发人员已将密码硬编码到响应文件中，那么应用程序将无法登录，除非将硬编码的密码更改为新密码。\n\
    \n你的另一个选项是临时更改用户的配置文件以允许密码重用。\n\n首先，检查用户的当前配置文件是什么：\n\n```sql\nSQL> select username,\
    \ profile from dba_users where username = UPPER('&&username');\n```\n\n以下是一些示例输出：\n\
    \n```\nUSERNAME              PROFILE\n------------------------------ ------------------------------\n\
    APPUSR                SECURE\n```\n\n现在，创建一个明确允许密码无任何限制重用的配置文件：\n\n```sql\nCREATE\
    \ PROFILE temp_prof LIMIT\n  PASSWORD_REUSE_MAX unlimited\n  PASSWORD_REUSE_TIME\
    \ unlimited;\n```\n\n接下来，为用户分配不限制密码重用的配置文件：\n\n```sql\nSQL> alter user appusr\
    \ profile temp_prof;\n```\n\n你应该能够如前所述修改密码：\n\n```sql\nSQL> alter user appusr\
    \ identified by values 'A0493EBF86198724';\n```\n\n如果成功，你将看到此消息：\n\n```\nUser\
    \ altered.\n```\n\n第 6 章 ■ 用户与基本安全\n\n确保你将用户的配置文件设置回原始值：\n\n```sql\nSQL> alter\
    \ user appusr profile secure;\n```\n\n最后，删除临时配置文件，以免将来意外使用：\n\n```sql\nSQL> drop\
    \ profile temp_prof;\n```\n\n## 修改用户\n\n有时出于以下类型的原因，你需要修改现有用户：\n\n- 更改用户密码\n-\
    \ 锁定或解锁用户\n- 更改默认永久和/或临时表空间\n- 更改配置文件或角色\n- 更改系统或对象权限\n- 修改表空间配额\n\n使用`ALTER USER`语句来修改用户。下面列出了几条修改用户的\
    \ SQL 语句。此示例使用`IDENTIFIED BY`子句更改用户密码：\n\n```sql\nSQL> alter user inv_mgmt identified\
    \ by i2jy22a;\n```\n\n如果在最初创建用户时未设置默认永久表空间和临时表空间，你可以在创建后修改它们，如下所示：\n\n```sql\n\
    SQL> alter user inv_mgmt default tablespace users temporary tablespace temp;\n\
    ```\n\n此示例锁定用户账户：\n\n```sql\nSQL> alter user inv_mgmt account lock;\n```\n\n此示例更改用户在`USERS`表空间上的配额：\n\
    \n```sql\nSQL> alter user inv_mgmt quota 500m on users;\n```\n\n## 删除用户\n\n在删除用户之前，我建议你先锁定该用户。锁定用户可以防止任何人连接到已锁定的数据库账户。这使你能够在删除账户之前更好地确定是否有人正在使用该账户。以下是锁定用户的示例：\n\
    \n```sql\nSQL> alter user heera account lock;\n```\n\n现在，任何尝试连接到此用户的用户或应用程序都会收到以下错误：\n\
    \n```\nORA-28000: the account is locked\n```\n\n要查看数据库中的用户和锁定日期，请发出此查询：\n\n```sql\n\
    SQL> select username, lock_date from dba_users;\n```\n\n第 6 章 ■ 用户与基本安全\n\n要解锁账户，请发出此命令：\n\
    \n```sql\nSQL> alter user heera account unlock;\n```\n\n锁定用户是一种非常方便的技术，可用于保护数据库安全并发现哪些用户是活动的。\n\
    \n请注意，锁定用户并不会锁定对其用户对象的访问。例如，如果`USER_A`对`USER_B`拥有的表具有 select、insert、update 和 delete\
    \ 权限，即使你锁定了`USER_B`账户，`USER_A`仍然可以对`USER_B`拥有的对象发出数据操作语言（DML）语句。\n\n要确定对象是否正在被使用，请参阅第\
    \ 22 章的审计部分。\n\n**提示：** 如果用户的对象没有占用过多的磁盘空间，那么在删除用户之前，快速备份一下是谨慎的做法。有关使用 Data Pump\
    \ 备份单个用户的详细信息，请参见第 13 章。\n\n在你确定用户及其对象不再需要后，使用`DROP USER`语句删除数据库账户。此示例删除用户`HEERA`：\n\
    \n```sql\nSQL> drop user heera;\n```\n\n如果用户拥有任何数据库对象，上述命令将不起作用。使用`CASCADE`子句删除用户及其对象：\n\
    \n```sql\nSQL> drop user heera cascade;\n```\n\n**注意：** 如果被删除的用户拥有大量数据库对象，`DROP\
    \ USER`语句可能需要异常长的时间才能执行。在这种情况下，你可能需要考虑在删除用户之前先删除其对象。\n\n删除用户时，其拥有的任何表也会被删除。此外，所有索引、触发器和引用完整性约束也会被删除。如果在其他模式中存在依赖于任何被删除的主键和唯一键约束的引用完整性约束，那么这些模式中的引用约束也会被删除。Oracle\
    \ 会使依赖于被删除用户对象的视图、同义词、过程、函数和包失效，但不会删除它们。\n\n## 强制实施密码安全和资源限制\n\n创建用户时，有时要求密码遵守一组安全规则。例如，密码必须具有特定长度并包含数字字符。此外，当你设置数据库用户时，你可能希望确保某个用户无法消耗过多的\
    \ CPU 资源。\n\n你可以使用数据库配置文件来满足这类要求。Oracle *配置文件*是一个数据库对象，有两个用途：\n\n第 6 章 ■ 用户与基本安全\n\
    \n- 强制实施密码安全设置\n- 限制用户消耗的系统资源\n\n这些主题将在接下来的两个小节中讨论。\n\n### 实施密码安全\n\n创建用户时，如果未指定配置文件，则`DEFAULT`配置文件将分配给新创建的用户。要查看配置文件的当前设置，请发出以下\
    \ SQL：\n\n```sql\nSQL> select profile, resource_name, resource_type, limit from\
    \ dba_profiles;\n```\n\n以下是输出的部分列表：\n\n```\nPROFILE    RESOURCE_NAME         \
    \   RESOURCE_T LIMIT\n---------- ------------------------- ---------- --------------------\n\
    DEFAULT    CONNECT_TIME             KERNEL     UNLIMITED\nDEFAULT    PRIVATE_SGA\
    \              KERNEL     UNLIMITED\nDEFAULT    FAILED_LOGIN_ATTEMPTS    PASSWORD\
    \   10\nDEFAULT    PASSWORD_LIFE_TIME       PASSWORD   180\nDEFAULT    PASSWORD_REUSE_TIME\
    \      PASSWORD   UNLIMITED\nDEFAULT    PASSWORD_REUSE_MAX       PASSWORD   10\n\
    DEFAULT    PASSWORD_VERIFY_FUNCTION PASSWORD   NULL\n```\n\n配置文件的密码限制在配置文件分配给用户后立即生效。例如，从前面的输出中，如果你已将`DEFAULT`配置文件分配给用户，则该用户只允许连续\
    \ 10 次登录尝试失败，之后用户账户将被 Oracle 自动锁定。有关密码配置文件安全设置的说明，请参见表 6–1。\n\n**提示：** 有关 Oracle\
    \ Database 11g `DEFAULT`配置文件更改的详细信息，请参阅 My Oracle Support 说明 454635.1。\n\n你可以更改`DEFAULT`配置文件以使其适应你的环境。例如，假设你想强制执行密码可使用的最长期限。下一行代码将`DEFAULT`配置文件的`PASSWORD_LIFE_TIME`设置为\
    \ 300 天：\n\n```sql\nSQL> alter profile default limit password_life_time 300;\n\
    ```\n\n第 6 章 ■ 用户与基本安全\n\n***表 6–1.** 密码安全设置*\n\n| **密码设置**                  \
    \ | **描述**                                                                 | **11g\
    \ 默认值** | **10g 默认值** |\n| :----------------------------- | :-----------------------------------------------------------------------\
    \ | :------------- | :------------- |\n| `FAILED_LOGIN_ATTEMPTS`        | 模式被锁定前的失败登录尝试次数\
    \                                           | 10 次          | 10 次          |\n\
    | `PASSWORD_GRACE_TIME`          | 密码过期后，所有者可以使用旧密码登录的天数                     \
    \          | 7 天           | 无限制         |\n| `PASSWORD_LIFE_TIME`           |\
    \ 密码有效的天数                                                           | 180 天  \
    \       | 无限制         |\n| `PASSWORD_LOCK_TIME`           | 达到`FAILED_LOGIN_ATTEMPTS`后账户被锁定的天数\
    \                            | 1 天           | 无限制         |\n| `PASSWORD_REUSE_MAX`\
    \           | 密码可重用前的天数                                                      \
    \ | 无限制         | 无限制         |\n| `PASSWORD_REUSE_TIME`          | 密码可重用前必须更改的次数\
    \                                               | 无限制         | 无限制         |\n\
    | `PASSWORD_VERIFY_FUNCTION`     | 用于验证密码的数据库函数                              \
    \                   | Null           | Null           |\n\n`PASSWORD_REUSE_TIME`和`PASSWORD_REUSE_MAX`设置必须结合使用。如果你为一个参数（哪个参数无关紧要）指定一个整数，而为另一个参数指定`UNLIMITED`，则当前密码永远无法重用。\n\
    \n如果你想指定`DEFAULT`配置文件密码必须在 100 天内更改 10 次才能重用，请使用类似于以下的代码行：\n\n```sql\nSQL> alter\
    \ profile default limit password_reuse_time 100 password_reuse_max 10;\n```\n\n\
    虽然使用`DEFAULT`配置文件对于许多环境来说已经足够，但你可能需要更严格的安全管理。我建议你创建自定义的安全配置文件，并根据需要将其分配给用户。例如，专门为应用程序用户创建一个配置文件：\n\
    \n```sql\nCREATE PROFILE SECURE_APP LIMIT\n  PASSWORD_LIFE_TIME 200\n  PASSWORD_GRACE_TIME\
    \ 10\n  PASSWORD_REUSE_TIME 1\n  PASSWORD_REUSE_MAX 1\n  FAILED_LOGIN_ATTEMPTS\
    \ 3\n  PASSWORD_LOCK_TIME 1\n  PASSWORD_VERIFY_FUNCTION verify_function_11G;\n\
    ```\n\n第 6 章 ■ 用户与基本安全\n\n创建配置文件后，你可以根据需要将其分配给用户。以下 SQL 生成一个名为`alt_prof_dyn.sql`的\
    \ SQL 脚本，可用于将用户分配到新创建的配置文件：\n\n```sql\nset head off;\nspo alt_prof_dyn.sql\nselect\
    \ 'alter user ' || username || ' profile secure_app;'\nfrom dba_users where username\
    \ like '%APP%';\nspo off;\n```\n\n将配置文件分配给使用数据库的应用程序账户时要小心。如果你想强制密码必须定期更改，请确保你理解这对生产系统的影响。密码往往会硬编码到响应文件和代码中。在这些环境中强制更改密码可能会带来灾难，因为你需要追踪所有引用密码的位置。如果你不想强制定期更改密码，可以将`PASSWORD_LIFE_TIME`设置为一个较大的值，例如\
    \ 10000（天）。\n\n### 限制数据库资源使用\n\n如前所述，密码配置文件设置在你将配置文件分配给用户后立即生效。\n\n与密码设置不同，内核资源配置文件限制在你将数据库的`RESOURCE_LIMIT`初始化参数设置为`TRUE`之前不会生效。例如：\n\
    \n```sql\nSQL> alter system set resource_limit=true scope=both;\n```\n\n要查看`RESOURCE_LIMIT`参数的当前设置：\n\
    \n```sql\nSQL> select name, value from v$parameter where name='resource_limit';\n\
    ```\n\n创建用户时，如果未指定配置文件，则`DEFAULT`配置文件将分配给用户。\n\n你可以使用`ALTER PROFILE`语句修改`DEFAULT`配置文件。下一个示例修改`DEFAULT`配置文件以将`CPU_PER_SESSION`限制为\
    \ 240000（以百分之一秒为单位）：\n\n```sql\nSQL> alter profile default limit cpu_per_session\
    \ 240000;\n```\n\n这将任何使用`DEFAULT`配置文件的用户限制为 2400 秒的 CPU 使用时间。你可以在配置文件中设置各种限制。表\
    \ 6–2 描述了你可以通过配置文件限制的数据库资源设置。\n\n第 6 章 ■ 用户与基本安全\n\n***表 6–2.** 数据库资源配置文件设置*\n\
    \n| **配置文件资源**                | **含义**                                       \
    \                                                                            \
    \            |\n| :------------------------------ | :-------------------------------------------------------------------------------------------------------------------------------------\
    \ |\n| `COMPOSITE_LIMIT`               | 基于加权和算法的限制，涉及以下资源：`CPU_PER_SESSION`、`CONNECT_TIME`、`LOGICAL_READS_PER_SESSION`\
    \ 和 `PRIVATE_SGA`                    |\n| `CONNECT_TIME`                  | 连接时间（分钟）\
    \                                                                            \
    \                                           |\n| `CPU_PER_CALL`              \
    \    | 每次调用的 CPU 时间限制（以百分之一秒为单位）                                             \
    \                                                |\n| `CPU_PER_SESSION`      \
    \         | 每个会话的 CPU 时间限制（以百分之一秒为单位）                                        \
    \                                                     |\n| `IDLE_TIME`       \
    \              | 空闲时间（分钟）                                                    \
    \                                                                   |\n| `LOGICAL_READS_PER_CALL`\
    \        | 每次调用的逻辑读取块数                                                       \
    \                                                          |\n| `LOGICAL_READS_PER_SESSION`\
    \     | 每个会话的逻辑读取块数                                                          \
    \                                                       |\n| `PRIVATE_SGA`   \
    \                | 在共享池中消耗的空间量                                               \
    \                                                                  |\n| `SESSIONS_PER_USER`\
    \             | 并发会话数                                                        \
    \                                                                     |\n\n你也可以通过`CREATE\
    \ PROFILE`语句创建自定义配置文件，然后将其分配给用户。以下 SQL 语句创建一个限制资源（如单个会话可消耗的 CPU 量）的配置文件：\n\n```sql\n\
    create profile user_profile_limit\nlimit\n  sessions_per_user 20\n  cpu_per_session\
    \ 240000\n  logical_reads_per_session 1000000\n  connect_time 480\n  idle_time\
    \ 120;\n```\n\n创建配置文件后，你可以将其分配给用户。在下一个示例中，用户`HEERA`被分配了`USER_PROFILE_LIMIT`：\n\
    \n```sql\nSQL> alter user heera profile user_profile_limit;\n```\n\n**注意：** Oracle\
    \ 建议你使用数据库资源管理器来管理数据库资源限制。\n\n然而，我发现通过 SQL 实现的数据库配置文件是一种有效且简单的资源限制机制。\n\n作为`CREATE\
    \ USER`语句的一部分，你可以指定一个非`DEFAULT`的配置文件：\n\n```sql\nSQL> create user heera identified\
    \ by foo profile user_profile_limit;\n```\n\n127\n\n第 6 章 ■ 用户与基本安全\n\n何时应该使用数据库配置文件？你应该始终利用`DEFAULT`配置文件的密码安全设置。你可以根据业务规则的需要轻松修改此配置文件的默认设置。\n\
    \n配置文件的内核资源限制在当你有高级用户需要直接连接到数据库并运行查询时非常有用。例如，你可以使用内核资源设置来限制用户消耗的 CPU 时间量，这在用户编写了意外消耗过多数据库资源的糟糕查询时非常方便。\n\
    \n## 管理权限\n\n数据库用户必须在数据库中执行任何任务之前被授予权限。在 Oracle 中，你通过将特定权限授予用户或将权限授予角色，然后将包含该权限的角色授予用户来分配权限。有两种类型的权限：系统权限和对象权限。以下各节详细讨论这些权限。\n\
    \n### 分配数据库系统权限\n\n数据库系统权限允许你执行诸如连接到数据库以及创建和修改对象等任务。有数百种不同的系统权限。你可以通过查询`DBA_SYS_PRIVS`视图来查看系统权限：\n\
    \n```sql\nSQL> select distinct privilege from dba_sys_privs;\n```\n\n你可以将权限授予其他用户或角色。为了能够授予权限，用户需要`GRANT\
    \ ANY PRIVILEGE`权限，或者必须已被授予带有`ADMIN OPTION`的系统权限。\n\n使用`GRANT`语句将系统权限分配给用户。例如，用户至少需要`CREATE\
    \ SESSION`才能连接到数据库。你授予此系统权限的方式如下所示：\n\n```sql\nSQL> grant create session to inv_mgmt;\n\
    ```\n\n通常，用户需要做的不仅仅是连接到数据库。例如，用户可能需要创建表和其他类型的数据库对象。此示例授予用户`CREATE TABLE`和`CREATE\
    \ DATABASE LINK`系统权限：\n\n```sql\nSQL> grant create table, create database link\
    \ to inv_mgmt;\n```\n\n如果你需要收回权限，请使用`REVOKE`语句：\n\n```sql\nSQL> revoke create\
    \ table from inv_mgmt;\n```\n\nOracle 有一个功能，允许你在授予权限的同时，也授予该用户管理权限的能力。你可以使用`WITH\
    \ ADMIN OPTION`子句来实现：\n\n```sql\nSQL> grant create table to inv_mgmt with admin\
    \ option;\n```\n\n我在授予权限时很少使用`WITH ADMIN OPTION`。通常，具有`DBA`角色的用户用于授予权限，而该权限通常不会分配给数据库中的非\
    \ DBA 用户。这是因为很难跟踪谁分配了什么系统权限、出于什么原因以及何时分配的。在生产环境中，这是难以接受的。\n\n你还可以将系统权限授予`PUBLIC`用户组（我不建议这样做）。例如，你可以将`CREATE\
    \ SESSION`授予所有曾经需要连接到数据库的用户，如下所示：\n\n```sql\nSQL> grant create session to public;\n\
    ```\n\n第 6 章 ■ 用户与基本安全\n\n现在，创建的每个用户都可以自动连接到数据库。将系统权限授予`PUBLIC`用户组几乎总是一个坏主意。作为\
    \ DBA，你的主要优先事项之一是确保数据库中的数据是安全的。将权限授予`PUBLIC`角色肯定会导致无法管理谁被授权在数据库中执行特定操作。\n\n###\
    \ 分配数据库对象权限\n\n数据库对象权限允许你访问和操作其他用户的对象。你可以授予权限的数据库对象类型包括表、视图、物化视图、序列、包、函数、过程、用户定义类型和目录。为了能够授予对象权限，必须满足以下条件之一：\n\
    \n- 你拥有该对象。\n- 你已被授予带有`GRANT OPTION`的对象权限。\n- 你拥有`GRANT ANY OBJECT PRIVILEGE`系统权限。\n\
    \n此示例将对象权限（作为对象所有者）授予`INV_MGMT_APP`用户：\n\n```sql\nSQL> grant insert, update, delete,\
    \ select on registrations to inv_mgmt_app;\n```\n\n`GRANT ALL`语句等同于授予对象的`INSERT`、`UPDATE`、`DELETE`和`SELECT`权限。\n\
    \n下一条语句等同于前一条语句：\n\n```sql\nSQL> grant all on registrations to inv_mgmt_app;\n\
    ```\n\n你还可以在列级别授予表的`INSERT`和`UPDATE`权限。下一个示例将`INSERT`权限授予`INVENTORY`表中的特定列：\n\n\
    ```sql\nSQL> grant insert (inv_id, inv_name, inv_desc) on inventory to inv_mgmt_app;\n\
    ```\n\n如果你希望被授予对象权限的用户能够随后将相同的对象权限授予其他用户，请使用`WITH GRANT OPTION`子句：\n\n```sql\n\
    SQL> grant insert on registrations to grouping_app with grant option;\n```\n\n\
    现在`GROUPING_APP`用户可以将`REGISTRATIONS`表上的插入权限授予其他用户。\n\n我在授予对象权限时很少使用`WITH GRANT\
    \ OPTION`。此选项允许其他用户将对象权限传播给其他用户。这使得很难跟踪谁分配了什么对象权限、出于什么原因、何时分配等等。在生产环境中，这是难以接受的。\n\
    \n在管理生产环境时，当问题出现时，你需要知道更改了什么、何时更改以及出于什么原因。\n\n你还可以将对象权限授予`PUBLIC`用户组（我不建议这样做）。例如，你可以将表上的选择权限授予`PUBLIC`：\n\
    \n```sql\nSQL> grant select on registrations to public;\n```\n\n现在每个用户都可以从`REGISTRATIONS`表中进行选择。将对象权限授予`PUBLIC`角色几乎总是一个坏主意。作为\
    \ DBA，你的主要优先事项之一是确保数据库中的数据是安全的。将对象权限授予`PUBLIC`角色肯定会导致无法管理谁可以访问数据库中的什么数据。\n\n如果你需要收回对象权限，请使用`REVOKE`语句。此示例从`INV_MGMT_APP`用户收回\
    \ DML 权限：\n\n```sql\nSQL> revoke insert, update, delete, select on registrations\
    \ from inv_mgmt_app;\n```\n\n129\n\n第 6 章 ■ 用户与基本安全\n\n## 分组和分配权限\n\n*角色*是一个数据库对象，它允许你将系统和/或对象权限逻辑地分组在一起，以便你可以通过一次操作将这些权限分配给用户。角色有助于管理数据库安全性的各个方面，因为它们提供了一个分配了权限的中心对象。你可以随后将角色分配给多个用户或其他角色。\n\
    \n要创建角色，请以具有`CREATE ROLE`系统权限的用户身份连接到数据库。接下来，创建一个角色，并将你希望分组的系统或对象权限分配给它。此示例使用`CREATE\
    \ ROLE`语句创建`JR_DBA`角色：\n\n```sql\nSQL> create role jr_dba;\n```\n\n接下来的几行 SQL\
    \ 将系统权限授予新创建的角色：\n\n```sql\nSQL> grant select any table to jr_dba;\nSQL> grant\
    \ create any table to jr_dba;\nSQL> grant create any view to jr_dba;\nSQL> grant\
    \ create synonym to jr_dba;\nSQL> grant create database link to jr_dba;\n```\n\
    \n接下来，将该角色授予你希望拥有这些权限的任何模式：\n\n```sql\nSQL> grant jr_dba to lellison;\nSQL> grant\
    \ jr_dba to mhurd;\n```\n\n用户`LELLISON`和`MHURD`现在可以执行创建同义词、视图等任务。\n\n要查看分配给角色的用户，请查询`DBA_ROLE_PRIVS`视图：\n\
    \n```sql\nSQL> select grantee, granted_role from dba_role_privs order by 1;\n\
    ```\n\n要查看授予当前连接用户的角色，请从`USER_ROLE_PRIVS`视图查询：\n\n```sql\nSQL> select * from user_role_privs;\n\
    ```\n\n要从角色中撤销权限，请使用`REVOKE`命令：\n\n```sql\nSQL> revoke create database link from\
    \ jr_dba;\n```\n\n同样，使用`REVOKE`命令从用户中移除角色：\n\n```sql\nSQL> revoke jr_dba from\
    \ lellison;\n```\n\n**注意：** 与其他数据库对象不同，角色没有所有者。角色由分配给它的权限定义。\n\n![](img/index-165_1.png)\n\
    \n![](img/index-167_1.png)\n\n第 7 章 ■ 表与约束\n\n***表 7–1.** Oracle 表类型描述*\n\n| **表类型**\
    \        | **描述**                                                            \
    \     | **典型用途**                                                             \
    \    |\n| :---------------- | :-----------------------------------------------------------------------\
    \ | :--------------------------------------------------------------------------\
    \ |\n| 堆组织表          | 默认表类型，也是最常用的。                                         \
    \      | 除非你有特定原因使用其他类型，否则使用此表类型。                            |\n| 临时表        \
    \    | 会话私有数据，在会话或事务期间存储。空间在临时段中分配。                 | 程序需要临时表结构来存储和排序数据。程序结束后不需要该表。\
    \                  |\n| 索引组织表 (IOT)  | 数据存储在按主键排序的 B 树索引结构中。                 \
    \                   | 主要查询主键列的表。提供快速的随机访问。                                   \
    \ |\n| 分区表            | 由独立物理段组成的逻辑表。                                        \
    \       | 与包含数百万行的大表一起使用。                                              |\n| 簇表\
    \              | 一组共享相同数据块的表。                                                \
    \ | 用于减少经常在同一列上连接的表的 I/O。                                       |\n| 外部表     \
    \       | 使用存储在数据库外部操作系统文件中的数据的表。                           | 让你高效地访问数据库外部文件（如\
    \ CSV 文件）中的数据。                         |\n| 嵌套表            | 包含数据类型为另一张表的列的表。\
    \                                         | 很少使用。                            \
    \                                      |\n| 对象表            | 包含数据类型为对象类型的列的表。\
    \                                         | 很少使用。                            \
    \                                      |\n\n本章重点介绍最常用的表类型，特别是堆组织表、索引组织表和临时表。分区表在数据仓库环境中广泛使用，将在第\
    \ 12 章单独介绍。有关本章未涵盖的表类型的详细信息，请参阅《Oracle SQL 参考指南》，可从 http://otn.oracle.com 下载。\n\
    \n表功能的数量随着 Oracle 的每个新版本而增加。想想看：《Oracle SQL 参考指南》中与`CREATE TABLE`语句相关的语法就有近 80\
    \ 页。除此之外，`ALTER TABLE`语句又占用了 80 多页与表维护相关的细节。在大多数情况下，你通常只需要使用可用表选项的一小部分。\n\n第 7\
    \ 章 ■ 表与约束\n\n## 创建表\n\n创建表时，应考虑以下一般因素：\n\n- 表类型（堆组织、临时、索引组织、分区等）\n- 命名约定\n- 列数据类型和大小\n\
    - 约束（主键、外键等）\n- 索引要求（详见第 8 章）\n- 初始存储要求\n- 特殊功能，如虚拟列、只读、并行、压缩、无日志等\n- 增长要求\n-\
    \ 表及其索引的表空间\n\n在运行`CREATE TABLE`语句之前，你需要仔细考虑上述列表中的每一项。为此，DBA 通常使用数据建模工具来帮助管理用于创建数据库对象的\
    \ DDL 脚本的创建。数据建模工具允许你直观地定义表、关系以及底层数据库特性。\n\n### 创建堆组织表\n\n你使用`CREATE TABLE`语句来创建表。创建表时，至少必须指定表名、列名以及与列关联的数据类型。Oracle\
    \ 默认的表类型是堆组织表。术语*堆*意味着数据不是以特定顺序存储在表中（相反，它是一个数据堆）。这是一个创建具有四列的堆组织表的简单示例：\n\n```sql\n\
    create table d_sources(\n  d_source_id number not null,\n  source_type varchar2(32),\n\
    \  create_dtt date default sysdate not null,\n  update_dtt timestamp(5)\n);\n\
    ```\n\n如果你不指定表空间，则表将在创建该表的用户的默认永久表空间中创建。允许表在默认永久表空间中创建对于一些小型测试表来说是可以的。对于更复杂的情况，你应该显式指定希望创建表的表空间。\n\
    \n通常，创建表时，还应指定约束，例如主键。以下代码显示了创建表时使用的最常见功能。此 DDL 定义了主键、外键、表空间信息和注释：\n\n```sql\n\
    create table operating_systems(\n  operating_system_id number(19, 0) not null,\n\
    \  version varchar2(50),\n  os_name varchar2(256),\n  release varchar2(50),\n\
    \  vendor varchar2(50),\n  create_dtt date default sysdate not null,\n  update_dtt\
    \ date,\n  constraint operating_systems_pk primary key (operating_system_id)\n\
    \    using index tablespace inv_mgmt_index\n) tablespace inv_mgmt_data;\n--\n\n\
    create unique index operating_system_uk1 on operating_systems\n  (os_name, version,\
    \ release, vendor)\n  tablespace inv_mgmt_index;\n--\n\ncreate table computer_systems(\n\
    \  computer_system_id number(38, 0) not null,\n  agent_uuid varchar2(256),\n \
    \ operating_system_id number(19, 0) not null,\n  hardware_model varchar2(50),\n\
    \  create_dtt date default sysdate not null,\n  update_dtt date,\n  constraint\
    \ computer_systems_pk primary key (computer_system_id)\n    using index tablespace\
    \ inv_mgmt_index\n) tablespace inv_mgmt_data;\n--\n\ncomment on column computer_systems.computer_system_id\
    \ is\n  '通过 Oracle 序列生成的代理键。';\n--\n\ncreate unique index computer_system_uk1\
    \ on computer_systems(agent_uuid) tablespace inv_mgmt_index;\n--\n\nalter table\
    \ computer_systems add constraint computer_systems_fk1\n  foreign key (operating_system_id)\n\
    \  references operating_systems(operating_system_id);\n```\n\n创建表时，我通常不指定表级物理空间属性。如果不指定表级空间属性，则表将从其创建的表空间继承空间属性。这简化了管理和维护。如果你的表需要不同的物理空间属性，则可以创建单独的表空间来容纳具有不同需求的表。例如，你可以创建一个区大小为\
    \ 16MB 的`DATA_LARGE`表空间和一个区大小为 128KB 的`DATA_SMALL`表空间，并根据其存储需求选择表的创建位置。有关创建表空间的详细信息，请参见第\
    \ 4 章。\n\n表 7–2 列出了创建表时需要考虑的一些指导原则。这些不是硬性规定；请根据你的环境需要调整它们。其中一些指导原则可能看起来是显而易见的建议。然而，在继承了许多数据库多年之后，我见过每一种建议都以某种方式被违反，这使得数据库维护变得困难和笨重。\n\
    \n第 7 章 ■ 表与约束\n\n***表 7–2.** 创建表时应考虑的准则*\n\n| **建议**                        \
    \                                                                            \
    \                         | **理由**                                           \
    \                                                                            \
    \          |\n| :-----------------------------------------------------------------------------------------------------------------------------------\
    \ | :---------------------------------------------------------------------------------------------------------------------------------------\
    \ |\n| 命名表、列、约束、触发器、索引等时使用标准。                                                \
    \                                         | 有助于记录应用程序并简化维护。                  \
    \                                                                            \
    \             |\n| 如果列始终包含数字数据，则将其定义为数字数据类型。                                 \
    \                                                  | 强制执行业务规则，并在使用 Oracle SQL\
    \ 数学函数时提供最大的灵活性、性能和一致的结果（对于“01”字符与数字 1 的行为可能不同）。                     |\n| 如果业务规则定义了数字字段的长度和精度，则强制执行它：例如`NUMBER(7,2)`。如果没有业务规则，则将其定义为`NUMBER(38)`。\
    \                 | 强制执行业务规则并保持数据干净。                                         \
    \                                                                |\n| 对于可变长度的字符数据，使用`VARCHAR2`（而不是`VARCHAR`）。\
    \                                                                           |\
    \ 遵循 Oracle 的建议，对字符数据使用`VARCHAR2`（而不是`VARCHAR`）。Oracle 文档指出，在未来，`VARCHAR`将被重新定义为单独的数据类型。\
    \         |\n| 如果业务规则指定了列的最大长度，则使用该长度，而不是将所有列定义为`VARCHAR2(4000)`。            \
