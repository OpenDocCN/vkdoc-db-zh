    that archive-redo logs aren’t deleted until they have been backed up twice to
    disk:


    RMAN> configure archivelog deletion policy to backed up 2 times to device type
    disk; To have RMAN delete obsolete archive-redo logs as defined by the archivelog-deletion
    policy, issue the following:


    RMAN> delete archivelog all;


    To see whether a retention policy has been set specifically for the archive-redo
    log files, use this command:


    RMAN> show archivelog deletion policy;


    To clear the archive deletion policy, do this:


    RMAN> configure archivelog deletion policy clear;


    ■ **Tip** Run the CROSSCHECK command before running the DELETE command. Doing
    so ensures that RMAN is aware of whether a file is on disk.


    15\. Setting the Degree of Parallelism


    You can significantly increase the performance of RMAN backup and restore operations
    if your database server is equipped with the hardware to support multiple channels.
    If your server has multiple CPUs and multiple storage devices (disks or tape devices),
    then you can improve performance by enabling multiple backup channels.


    If you require better performance from backup and restore operations and have
    hardware that facilitates parallel operations, you should enable parallelism and
    perform tests to determine the optimal degree. If you have hardware that can take
    advantage of parallel RMAN channels, there is little downside to enabling parallelism.


    If you have multiple CPUs but just one storage-device location, you can enable
    multiple channels to write to and read from one location. For example, if you’re
    backing up to an FRA, you can still take advantage of multiple channels by enabling
    parallelism. Suppose you have four CPUs on a server and want to enable a corresponding
    degree of parallelism:


    RMAN> configure device type disk parallelism 4;


    CHAPTER 17 ■ CONFIGURING RMAN


    You can also write to separate locations in parallel by configuring multiple channels
    associated with different mount points. For example:


    RMAN> configure device type disk parallelism 4;


    RMAN> configure channel 1 device type disk format ''/ora01/O11R2/rman/rman1_%U.bk'';
    RMAN> configure channel 2 device type disk format ''/ora02/O11R2/rman/rman2_%U.bk'';
    RMAN> configure channel 3 device type disk format ''/ora03/O11R2/rman/rman3_%U.bk'';
    RMAN> configure channel 3 device type disk format ''/ora04/O11R2/rman/rman4_%U.bk'';
    This code configures four channels that write to separate locations on disk. When
    you configure separate channels for different locations, make sure you enable
    the degree of parallelism to match the number of configured device channels. If
    you allocate more channels than the specified degree of parallelism, RMAN only
    writes to the number of channels specified by the degree of parallelism and ignores
    the other channels.


    If you need to clear the degree of parallelism, you can do so as follows: RMAN>
    configure device type disk clear;


    Similarly, to clear the channel device types, use the CLEAR command. This example
    clears channel 3: RMAN> configure channel 3 device type disk clear;


    16\. Using Backup Sets or Image Copies


    When you issue an RMAN BACKUP command, you can specify the backup to be one of
    the following:


    • Backup set


    • Image copy


    A backup set is the default type of backup that RMAN creates. A backup set contains
    backup pieces, which are binary files that only RMAN can write to or read from.
    Backup sets are desirable because they’re usually smaller than the datafiles being
    backed up. If you’re using Oracle Database 10 *g* release 2


    or higher, RMAN automatically attempts to create backup pieces with *unused block
    compression*. In this mode, RMAN reads a bitmap to determine which blocks are
    allocated and only reads from those blocks in the datafiles. This feature is supported
    only for disk-based backup sets and Oracle Secure Backup tape backups.


    If you’re using a database version prior to Oracle Database 10 *g* release 2,
    by default backup sets are created using *null block compression* (sometimes referred
    to more aptly as *block skipping*). In this mode, RMAN checks blocks in the datafile;
    if the blocks haven’t been used, they aren’t backed up.


    ■ **Note** RMAN can also create backup sets using true binary compression. This
    is the type of compression you get from an OS compression utility (such as zip).
    Oracle supports several levels of binary compression. The BASIC


    compression algorithm is available without an additional license. Oracle provides
    further compression features with the Oracle Advanced Compression option (see
    the later section in this chapter for details on how to enable binary compression).


    When you create a backup as a backup set, the binary backup piece files can only
    be manipulated by RMAN processes. Some DBAs view this as a disadvantage because
    they must use RMAN to back up and 474


    CHAPTER 17 ■ CONFIGURING RMAN


    restore these files (you have no direct access to or control over the backup pieces).
    But these perceptions aren’t warranted. Unless you hit a rare bug, RMAN is dependable
    and works reliably in all backup and restore situations.


    Contrast the backup set to an image copy. An image copy creates a byte-for-byte
    identical copy of each datafile. The advantages of creating an image copy are
    that (if necessary) you can manipulate the image copy without using RMAN (as with
    an OS copy utility). Additionally, in the event of a media failure, an image copy
    is a fast method of restoring datafiles, because RMAN has to copy the file back
    from the backup location (there is no reconstructing of the datafile, because
    it’s an exact copy).'
  trans: '

    您可以按如下方式报告 RMAN 根据保留策略已判定为过时的备份：


    ```

    RMAN> report obsolete;

    ```


    要删除过时的备份，请运行 `DELETE OBSOLETE` 命令：


    ```

    RMAN> delete obsolete;

    ```


    您会看到提示：


    `Do you really want to delete the above objects (enter YES or NO)?`


    如果您在编写脚本，可以指定删除操作而不提示输入：


    ```

    RMAN> delete noprompt obsolete;

    ```


    我通常将 `DELETE NOPROMPT OBSOLETE` 命令编写到备份数据库的同一个 shell 脚本中。这指示 RMAN 根据保留策略删除任何过时的备份和过时的归档重做日志。有关如何自动删除过时备份的示例，请参阅本章后面的
    shell 脚本。


    默认的保留策略是冗余度为 1。您可以通过 `TO NONE` 命令完全禁用 RMAN 保留策略：


    ```

    RMAN> configure retention policy to none;

    ```


    要将保留策略设置回默认值，请使用 `CLEAR` 命令：


    ```

    RMAN> configure retention policy clear;

    ```


    ### 配置归档重做日志的删除策略


    在大多数场景中，我让 RMAN 根据数据库备份的保留策略删除归档重做日志。这是默认行为。您可以使用 `SHOW` 命令查看数据库保留策略：


    ```

    RMAN> show retention policy;

    CONFIGURE RETENTION POLICY TO REDUNDANCY 1; # default

    ```


    要根据数据库保留策略删除归档重做日志（和备份片），请运行以下命令：


    ```

    RMAN> delete obsolete;

    ```


    从 Oracle Database 11g 开始，您可以指定一个独立于数据库备份的归档重做日志删除策略。此删除策略适用于 FRA 内和 FRA 外的归档重做日志。


    #### 注意


    在 Oracle Database 11g 之前，归档删除策略仅适用于与备用数据库关联的归档重做日志。


    要配置归档重做日志删除策略，请使用 `CONFIGURE ARCHIVELOG DELETION` 命令。以下命令配置归档重做日志删除策略，使得归档重做日志在被备份到磁盘两次之前不会被删除：


    ```

    RMAN> configure archivelog deletion policy to backed up 2 times to device type
    disk;

    ```


    要让 RMAN 根据归档日志删除策略删除过时的归档重做日志，请发出以下命令：


    ```

    RMAN> delete archivelog all;

    ```


    要查看是否为归档重做日志文件专门设置了保留策略，请使用此命令：


    ```

    RMAN> show archivelog deletion policy;

    ```


    要清除归档删除策略，请执行：


    ```

    RMAN> configure archivelog deletion policy clear;

    ```


    #### 提示


    在运行 `DELETE` 命令之前，请先运行 `CROSSCHECK` 命令。这样做可以确保 RMAN 知晓文件是否在磁盘上。


    ### 设置并行度


    如果您的数据库服务器配备了支持多通道的硬件，您可以显著提高 RMAN 备份和恢复操作的性能。如果您的服务器有多个 CPU 和多个存储设备（磁盘或磁带设备），那么通过启用多个备份通道可以提升性能。


    如果您需要从备份和恢复操作中获得更好的性能，并且有便于并行操作的硬件，您应该启用并行性并进行测试以确定最佳程度。如果您有可以利用并行 RMAN 通道的硬件，启用并行性几乎没有缺点。


    如果您有多个 CPU 但只有一个存储设备位置，您可以启用多个通道向一个位置写入和读取。例如，如果您备份到 FRA，您仍然可以通过启用并行性来利用多个通道。假设您的服务器有四个
    CPU，并希望启用相应的并行度：


    ```

    RMAN> configure device type disk parallelism 4;

    ```


    您还可以通过配置与不同挂载点关联的多个通道来并行写入单独的位置。例如：


    ```

    RMAN> configure device type disk parallelism 4;

    RMAN> configure channel 1 device type disk format ''/ora01/O11R2/rman/rman1_%U.bk'';

    RMAN> configure channel 2 device type disk format ''/ora02/O11R2/rman/rman2_%U.bk'';

    RMAN> configure channel 3 device type disk format ''/ora03/O11R2/rman/rman3_%U.bk'';

    RMAN> configure channel 3 device type disk format ''/ora04/O11R2/rman/rman4_%U.bk'';

    ```


    此代码配置了四个写入到磁盘上不同位置的通道。当您为不同位置配置单独的通道时，请确保启用的并行度与配置的设备通道数匹配。如果您分配的通道数超过了指定的并行度，RMAN
    只会写入由并行度指定的通道数，并忽略其他通道。


    如果您需要清除并行度，可以按如下方式操作：


    ```

    RMAN> configure device type disk clear;

    ```


    类似地，要清除通道设备类型，请使用 `CLEAR` 命令。此示例清除通道 3：


    ```

    RMAN> configure channel 3 device type disk clear;

    ```


    ### 使用备份集或映像副本


    当您发出 RMAN `BACKUP` 命令时，可以指定备份为以下类型之一：


    *   备份集

    *   映像副本


    备份集是 RMAN 创建的默认备份类型。备份集包含备份片，这些是只有 RMAN 才能写入或读取的二进制文件。备份集之所以可取，是因为它们通常比被备份的数据文件要小。如果您使用的是
    Oracle Database 10g release 2 或更高版本，RMAN 会自动尝试使用 `未使用块压缩` 创建备份片。在此模式下，RMAN 读取位图以确定哪些块已分配，并且仅读取数据文件中的那些块。此功能仅适用于基于磁盘的备份集和
    Oracle Secure Backup 磁带备份。


    如果您使用的数据库版本早于 Oracle Database 10g release 2，默认情况下使用 `空块压缩`（有时更恰当地称为 `块跳过`）创建备份集。在此模式下，RMAN
    检查数据文件中的块；如果块未被使用，则不进行备份。


    #### 注意


    RMAN 还可以使用真正的二进制压缩创建备份集。这是您从 OS 压缩实用程序（如 zip）获得的那种压缩。Oracle 支持多个级别的二进制压缩。`BASIC`
    压缩算法无需额外许可即可使用。Oracle 通过 Oracle Advanced Compression 选项提供了进一步的压缩功能（有关如何启用二进制压缩的详细信息，请参阅本章后面的部分）。


    当您将备份创建为备份集时，二进制备份片文件只能由 RMAN 进程操作。一些 DBA 将此视为一个缺点，因为他们必须使用 RMAN 来备份和恢复这些文件（您无法直接访问或控制备份片）。但这些看法是没有根据的。除非遇到罕见的错误，否则
    RMAN 在所有备份和恢复情况下都是可靠且稳定工作的。


    将备份集与映像副本进行对比。映像副本创建每个数据文件的字节对字节完全相同的副本。创建映像副本的优点是（如有必要）您可以不使用 RMAN（如使用 OS 复制实用程序）来操作映像副本。此外，在发生介质故障时，映像副本是恢复数据文件的快速方法，因为
    RMAN 只需将文件从备份位置复制回来（无需重新构建数据文件，因为它是一个精确的副本）。

    '
- fmt: '# 配置RMAN


    我几乎总是使用备份集进行数据库备份，而不是映像副本。通常，我需要某种形式的RMAN压缩（块跳过）。备份到磁盘的大小几乎总是需要关注的问题。备份集在磁盘空间消耗方面更高效。由于备份集可以利用RMAN压缩，与映像副本相比，备份集涉及的I/O也更少。在许多环境中，减少I/O以避免影响其他应用程序是一个需要关注的问题。


    但如果你觉得需要直接控制RMAN创建的备份文件，或者你处于一个恢复过程速度至关重要的环境，请考虑使用映像副本。


    ## 使用增量备份


    对于我负责的大多数数据库，我运行每日的0级备份。我通常不实施任何类型的增量备份策略。


    增量备份策略适用于大型数据库，这些数据库中只有很小一部分数据块在备份之间发生变化。如果你处于数据仓库环境，可能需要考虑增量备份策略，因为它可以大大减少备份的大小。例如，你可能希望运行每周的0级备份，然后运行每日的1级增量备份。


    > **注意** 有关如何使用增量备份数据库的详细信息，请参见第18章。


    ## 使用增量更新备份


    增量更新备份是实施映像副本备份策略的一种高效方法。此技术指示RMAN首先创建数据文件的映像副本；然后，在下次运行备份时，RMAN不再创建新的映像副本，而是创建一个增量备份（自映像副本创建以来块的更改）并将该增量备份应用到映像副本上。


    如果你有磁盘空间可用于存储数据库的完整映像副本，并且你希望在发生介质故障时能够直接使用映像副本的灵活性，请考虑此备份策略。


    这种方法的一个潜在缺点是，如果你需要恢复并恢复到过去的某个时间点，你只能恢复并恢复到映像副本上次使用增量备份更新的时间点。


    > **注意** 有关如何使用增量更新备份数据库的详细信息，请参见第18章。


    ## 使用块更改跟踪


    此功能跟踪数据库块何时更改。其思想是，如果你正在使用增量备份策略，可以通过实施此功能来增强性能，这样RMAN就不必扫描数据文件中的每个块（高水位线下）来确定是否需要备份某个块。相反，RMAN只需访问块更改跟踪文件即可确定自上次备份以来哪些块已更改，并直接访问已被标识为已更改的块。如果你在大型数据仓库环境中工作并使用增量备份策略，请考虑启用块更改跟踪以提高性能。


    > **注意** 有关如何实施块更改跟踪的详细信息，请参见第18章。


    ## 配置二进制压缩


    你可以配置RMAN在生成备份集时使用真正的二进制压缩。你可以通过两种方式之一启用压缩：

    - 在`BACKUP`命令中指定`AS COMPRESSED BACKUPSET`。

    - 使用一次性的`CONFIGURE`命令。


    以下是在发出`BACKUP`命令时使用压缩进行备份的示例：

    ```

    RMAN> backup as compressed backupset database;

    ```


    以下是一个为磁盘设备配置压缩的示例：

    ```

    RMAN> configure device type disk backup type to compressed backupset;

    ```

    如果需要清除设备类型压缩，请发出此命令：

    ```

    RMAN> configure device type disk clear;

    ```


    我发现默认的压缩算法相当高效。对于典型的数据库，备份通常比常规备份小四到五倍。当然，你的压缩结果可能因数据而异。


    为什么不压缩所有备份？压缩备份会消耗更多的CPU资源，并且创建和恢复所需的时间更长，但它们会导致更少的I/O，分布在更长的时间内。如果你有多个CPU，并且备份速度不是问题，那么你应该考虑压缩备份。


    你可以使用`SHOW`命令查看启用的压缩类型：

    ```

    RMAN> show compression algorithm;

    ```

    以下是一些示例输出：

    ```

    CONFIGURE COMPRESSION ALGORITHM ''BASIC'' AS OF RELEASE ''DEFAULT''

    OPTIMIZE FOR LOAD TRUE ; # default

    ```


    基本压缩算法不需要Oracle的额外许可。如果你使用的是Oracle Database 11*g*第2版或更高版本，并且拥有Advanced Compression
    Option的许可，那么你还可以使用三个额外的可配置二进制压缩级别。例如：

    ```

    RMAN> configure compression algorithm ''HIGH'';

    RMAN> configure compression algorithm ''MEDIUM'';

    RMAN> configure compression algorithm ''LOW'';

    ```


    你可以查询`V$RMAN_COMPRESSION_ALGORITHM`以查看有关你的数据库版本可用的压缩算法的详细信息。要将当前压缩算法重置为默认的`BASIC`，请使用`CLEAR`命令：

    ```

    RMAN> configure compression algorithm clear;

    ```


    ## 配置加密


    你可能需要加密备份。一些站点特别要求对包含敏感数据并存储在异地的备份进行加密。要使用加密进行备份，你必须使用Oracle企业版，拥有Advanced Security
    Option的许可，并且使用Oracle Database 10*g*第2版或更高版本。


    如果你已配置了安全钱包（有关详细信息，请参阅《Oracle Advanced Security Administrator’s Guide》，可在Oracle的OTN网站上找到），则可以如下配置备份的透明加密：

    ```

    RMAN> configure encryption for database on;

    ```

    你现在制作的任何备份都将被加密。如果你需要从备份中恢复，它会自动解密（假设与你加密备份时相同的安全钱包仍在位）。要禁用加密，请使用`CONFIGURE`命令：

    ```

    RMAN> configure encryption for database off;

    ```

    你也可以使用`CLEAR`清除加密设置：

    ```

    RMAN> configure encryption for database clear;

    ```

    你可以查询`V$RMAN_ENCRYPTION_ALGORITHMS`以查看有关你的数据库版本可用的加密算法的详细信息。


    ## 配置其他设置


    RMAN提供了灵活的通道配置命令。根据数据库的特殊情况和需求，你偶尔需要使用它们。以下是一些选项：

    - 最大备份集大小

    - 最大备份片大小

    - 最大速率

    - 最大打开文件数


    默认情况下，最大备份集大小是无限的。你可以在`CONFIGURE`或`BACKUP`命令中使用`MAXSETSIZE`参数来指定整个备份集的最大大小。确保此参数的值至少与RMAN正在备份的最大数据文件一样大。以下是一个示例：

    ```

    RMAN> configure maxsetsize to 2g;

    ```


    有时你可能希望由于存储设备的物理限制而限制备份片的整体大小。使用`CONFIGURE CHANNEL`或`ALLOCATE CHANNEL`命令的`MAXPIECESIZE`参数来实现这一点。例如：

    ```

    RMAN> configure channel device type disk maxpiecesize = 2g;

    ```


    如果你需要设置RMAN每秒在通道上读取的最大字节数，可以使用`RATE`参数。此配置将通道1的最大读取速率设置为每秒200MB：

    ```

    configure channel 1 device type disk rate 200M;

    ```'
  raw: 'I almost always use backup sets for database backups, rather than image copies.
    Usually, I require some form of RMAN compression (block skipping). The size of
    the backup to disk is almost always a concern. Backup sets are more efficient
    regarding disk-space consumption. Because backup sets can take advantage of RMAN
    compression, there is also less I/O involved with a backup set compared to an
    image copy. In many environments, reducing the I/O so as not to impact other applications
    is a concern.


    But if you feel that you need direct control over the backup files that RMAN creates,
    or you’re in an environment in which the speed of the restore process is paramount,
    consider using image copies.


    17\. Using Incremental Backups


    For most of the databases I’m responsible for, I run a daily level 0 backup. I
    usually don’t implement any type of incremental backup strategy.


    Incremental backup strategies are appropriate for large databases where only a
    small portion of the database blocks change from one backup to the next. If you’re
    in a data-warehouse environment, you may want to consider an incremental backup
    strategy, because it can greatly reduce the size of your backups. For example,
    you may want to run a weekly level 0 backup and then run a daily level 1


    incremental backup.


    ■ **Note** See Chapter 18 for details on how to back up a database using incremental
    backups.


    18\. Using Incrementally Updated Backups


    Incrementally updated backups are an efficient way to implement an image-copy
    backup strategy. This technique instructs RMAN to first create image copies of
    datafiles; then, the next time the backup runs, instead of creating a fresh set
    of image copies, RMAN makes an incremental backup (changes to blocks since the
    image copy was created) and applies that incremental backup to the image copies.


    If you have the disk space available for full image copies of your database, and
    you want the flexibility to be able to directly use the image copies in the event
    of a media failure, consider this backup strategy.


    One potential disadvantage of this approach is that if you’re required to restore
    and recover to some point in the past, you can only restore and recover to the
    point where the image copies were last updated with the incremental backup.


    ■ **Note** See Chapter 18 for details on how to back up a database using incrementally
    updated backups.


    CHAPTER 17 ■ CONFIGURING RMAN


    19\. Using Block-Change Tracking


    This feature keeps track of when a database block changes. The idea is that if
    you’re using an incremental backup strategy, you can enhance performance by implementing
    this feature so that RMAN


    doesn’t have to scan each block (under the high-water mark) in the datafiles to
    determine whether a block needs to be backed up. Rather, RMAN only has to access
    the block-change tracking file to determine which blocks have changed since the
    last backup and directly access blocks that have been identified as changed. If
    you work in a large data-warehouse environment and are using an incremental backup
    strategy, consider enabling block-change tracking to enhance performance.


    ■ **Note** See Chapter 18 for details on how to implement block-change tracking.


    20\. Configuring Binary Compression


    You can configure RMAN to use true binary compression when generating backup sets.
    You can enable compression in one of two ways:


    • Specify AS COMPRESSED BACKUPSET with the BACKUP command.


    • Use a one-time CONFIGURE command.


    Here’s an example of backing up with compression when issuing the BACKUP command:
    RMAN> backup as compressed backupset database;


    Here’s an example of configuring compression for the disk device:


    RMAN> configure device type disk backup type to compressed backupset; If you need
    to clear the device-type compression, issue this command: RMAN> configure device
    type disk clear;


    I’ve found the default compression algorithm to be quite efficient. For a typical
    database, the backups are usually about four to five times smaller than the regular
    backups. Of course, your compression results may vary depending on your data.


    Why not compress all backups? Compressed backups consume more CPU resources and
    take a longer time to create and restore from, but they result in less I/O spread
    out over a longer time. If you have multiple CPUs and the speed of making a backup
    isn’t an issue, then you should consider compressing your backups.


    You can view the type of compression enabled using the SHOW command:


    RMAN> show compression algorithm;


    Here’s some sample output:


    CONFIGURE COMPRESSION ALGORITHM ''BASIC'' AS OF RELEASE ''DEFAULT''


    OPTIMIZE FOR LOAD TRUE ; # default


    The basic compression algorithm doesn’t require an extra license from Oracle.
    If you’re using Oracle Database 11 *g* release 2 or higher, and if you have a
    license for the Advanced Compression Option, then you have available three additional
    configurable levels of binary compression. For example: RMAN> configure compression
    algorithm ''HIGH'';


    CHAPTER 17 ■ CONFIGURING RMAN


    RMAN> configure compression algorithm ''MEDIUM'';


    RMAN> configure compression algorithm ''LOW'';


    You can query V$RMAN_COMPRESSION_ALGORITHM to view details regarding the compression
    algorithms available for your release of the database. To reset the current compression
    algorithm to the default of BASIC, use the CLEAR command:


    RMAN> configure compression algorithm clear;


    21\. Configuring Encryption


    You may be required to encrypt backups. Some shops especially require this for
    backups that contain sensitive data and that are stored offsite. To use encryption
    when backing up, you must use the Oracle Enterprise Edition, possess a license
    for the Advanced Security Option, and use Oracle Database 10 *g* release 2 or
    higher.


    If you’ve configured a security wallet (see the *Oracle Advanced Security Administrator’s
    Guide* for details, available on Oracle’s OTN website), you can configure transparent
    encryption for backups as shown:


    RMAN> configure encryption for database on;


    Any backups you make will now be encrypted. If you need to restore from a backup,
    it’s automatically unencrypted (assuming the same security wallet is in place
    as when you encrypted the backup). To disable encryption, use the CONFIGURE command:


    RMAN> configure encryption for database off;


    You can also clear the encryption setting with CLEAR:


    RMAN> configure encryption for database clear;


    You can query V$RMAN_ENCRYPTION_ALGORITHMS to view details regarding the encryption
    algorithms available for your release of the database.


    22\. Configuring Miscellaneous Settings


    RMAN provides a flexible number of channel-configuration commands. You occasionally
    need to use them depending on special circumstances and requirements for your
    database. Here are some of the options:


    • Maximum backup-set size


    • Maximum backup-piece size


    • Maximum rate


    • Maximum open files


    By default, the maximum backup-set size is unlimited. You can use the MAXSETSIZE
    parameter with the CONFIGURE or BACKUP command to specify the overall maximum
    backup-set size. Make sure the value of this parameter is at least as large as
    the largest datafile being backed up by RMAN. Here’s an example: RMAN> configure
    maxsetsize to 2g;


    CHAPTER 17 ■ CONFIGURING RMAN


    Sometimes you may want limit the overall size of a backup piece due to physical
    limitations of storage devices. Use the MAXPIECESIZE parameter of the CONFIGURE
    CHANNEL or ALLOCATE CHANNEL


    command do this. For example:


    RMAN> configure channel device type disk maxpiecesize = 2g;


    If you need to set the maximum number of bytes that RMAN reads each second on
    a channel, you can do so using the RATE parameter. This configures the maximum
    read rate for channel 1 to 200MB per second:


    configure channel 1 device type disk rate 200M;'
