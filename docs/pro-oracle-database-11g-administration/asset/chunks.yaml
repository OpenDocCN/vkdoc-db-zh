    There are few key things to note about the prior CREATE DATABASE statement example.
    For example, notice that the SYSTEM datafile is defined as locally managed. This
    means any tablespace created in this database must be locally managed (as opposed
    to dictionary managed). Oracle throws an error if you attempt to create a dictionary-managed
    tablespace in this database. This is the desired behavior.


    A dictionary-managed tablespace uses the Oracle data dictionary to manage extents
    and free space, whereas a locally managed tablespace uses a bitmap in each datafile
    to manage its extents and free space. Locally managed tablespaces have these advantages:


    • No rollback information is generated.


    • No coalescing is required.


    • Contention for resources in the data dictionary is reduced.


    • Recursive space management is reduced.


    Also notice that the TEMP tablespace is defined to be the default temporary tablespace.
    This means any user created in the database automatically has the TEMP tablespace
    assigned to them as their default temporary tablespace. You can verify the default
    temporary tablespace with this query: select *


    from database_properties


    where property_name = ''DEFAULT_TEMP_TABLESPACE'';


    Finally, notice that the USERS tablespace is defined to be the default permanent
    tablespace for any users created that don’t have a default tablespace defined
    in a CREATE USER statement. You can run this query to determine the default temporary
    tablespace:


    select *


    from database_properties


    where property_name = ''DEFAULT_PERMANENT_TABLESPACE'';


