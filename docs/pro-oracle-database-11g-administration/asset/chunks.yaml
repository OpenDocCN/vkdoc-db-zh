- fmt: '# run-parts


    ```bash

    01 * * * * root run-parts /etc/cron.hourly

    02 4 * * * root run-parts /etc/cron.daily

    22 4 * * 0 root run-parts /etc/cron.weekly

    42 4 1 * * root run-parts /etc/cron.monthly

    ```


    ## CHAPTER 21 ■ AUTOMATING JOBS


    This `/etc/crontab` file uses the `run-parts` utility to run scripts located in
    the following directories: `/etc/cron.hourly`, `/etc/cron.daily`, `/etc/cron.weekly`,
    and `/etc/cron.monthly`. If there is a system utility that needs to run other
    than on an hourly, daily, weekly, or monthly basis, then it can be placed in the
    `/etc/cron.d` directory.


    Each user can create a `crontab` (also known as a cron table) file. This file
    contains the list of programs that you want to run at a specific time and interval.
    This file is usually located in the `/var/spool/cron` directory. For every user
    who creates a cron table, there will be a file in the `/var/spool/cron` directory
    named after the user. As root, you can list the files in that directory:


    ```bash

    # ls /var/spool/cron

    oracle root

    ```


    The `cron` background process is mostly idle. It wakes up once every minute and
    checks `/etc/crontab`, `/etc/cron.d`, and the user cron table files and determines
    whether there are any jobs that need to be executed.


    Table 21–1 summarizes the purpose of the various files and directories used by
    `cron`. Knowledge of these files and directories will help you troubleshoot any
    issues as well as understand `cron` in more detail.


    ### Table 21–1. Descriptions of Files and Directories Used by the cron Utility


    | File | Purpose |

    | :--- | :--- |

    | `/etc/init.d/crond` | Starts the cron daemon in system boot. |

    | `/var/log/cron` | System messages related to the cron process. Useful for troubleshooting
    problems. |

    | `/var/spool/cron/<username>` | User crontab files are stored in the `/var/spool/cron`
    directory. |

    | `/etc/cron.allow` | Specifies users who can create a cron table. |

    | `/etc/cron.deny` | Specifies users who are not allowed to create a cron table.
    |

    | `/etc/crontab` | The system cron table that has commands to run scripts located
    in the following directories: `/etc/cron.hourly`, `/etc/cron.daily`, `/etc/cron.weekly`,
    and `/etc/cron.monthly`. |

    | `/etc/cron.d` | A directory that contains cron tables for jobs that need to
    run on a schedule other than hourly, daily, weekly, or monthly. |

    | `/etc/cron.hourly` | A directory that contains system scripts to run on an hourly
    basis. |

    | `/etc/cron.daily` | A directory that contains system scripts to run on a daily
    basis. |

    | `/etc/cron.weekly` | A directory that contains system scripts to run on a weekly
    basis. |

    | `/etc/cron.monthly` | A directory that contains system scripts to run on a monthly
    basis. |


    ## Enabling Access to cron


    Sometimes when system administrators set up a new box, they don''t (by default)
    enable the use of `cron` for all users on the system. To verify whether you have
    access to access `cron`, type in the following:


    ```bash

    $ crontab -e

    ```


    If you receive the following error message, then you do not have access: `You
    (oracle) are not allowed to use this program (crontab)`


    To enable `cron` access as the `root` user, add `oracle` to the `/etc/cron.allow`
    file with the `echo` command:


    ```bash

    # echo oracle >> /etc/cron.allow

    ```


    Once the `oracle` entry is added to the `/etc/cron.allow` file, you can use the
    `crontab` utility to schedule a job.


    > **Note:** You can also use an editing utility (such as `vi`) to add an entry
    to the `cron.allow` file.


    The `root` user can always schedule jobs with the `crontab` utility. Other users
    must be listed in the `/etc/cron.allow` file. If the `/etc/cron.allow` file does
    not exist, then the operating system user must not appear in the `/etc/cron.deny`
    file. If neither the `/etc/cron.allow` nor the `/etc/cron.deny` file exists, then
    only the `root` user can access the `crontab` utility.


    > **Note:** On some Unix operating systems (such as Solaris), the `cron.allow`
    and `cron.deny` files are located in the `/etc/cron.d` directory.


    ## Understanding cron Table Entries


    Your cron table is a list of numbers and commands that the `cron` background process
    (`cron` daemon) will run at a specified time and schedule. The `crontab` utility
    expects entries to follow a well-defined format.


    It’s a good idea to add a comment line at the beginning of your `crontab` file
    that documents the required format:'
