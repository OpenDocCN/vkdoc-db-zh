    Configuring and Implementing the Listener


    After you’ve installed binaries and created a database, you need to make the database
    accessible to remote client connections. You do this by configuring and starting
    the Oracle listener. Appropriately named, the *listener* is the process that listens
    for connection requests from remote clients. If you don’t have a listener started
    on the database server, then you can’t connect from a remote client.


    When you’re setting up a new environment, configuring the listener is a two-step
    process: 1\. Configure the listener.ora file.


    2\. Start the listener.


    The listener.ora file is located by default in the ORACLE_HOME/network/admin directory.
    This is the same directory that the TNS_ADMIN operating system variable should
    be set to. Here is a sample listener.ora file that contains network-configuration
    information for one database: LISTENER =


    (DESCRIPTION_LIST =


    (DESCRIPTION =


    (ADDRESS_LIST =


    (ADDRESS = (PROTOCOL = TCP)(HOST = ora03)(PORT = 1521))


    )


    )


    )


    SID_LIST_LISTENER =


    (SID_LIST =


    CHAPTER 2 ■ IMPLEMENTING A DATABASE


    (SID_DESC =


    (GLOBAL_DBNAME = O11R2)


    (ORACLE_HOME = /oracle/app/oracle/product/11.2.0/db_1)


    (SID_NAME = O11R2)


    )


    )


    This code listing has two sections. The first defines the listener name and service;
    in this example, the listener name is LISTENER. The second section defines the
    list of SIDs for which the listener is listening for incoming connections (to
    the database). The format of the SID list name is SID_LIST_<name of listener>.
    The name of the listener must appear in the SID list name. The SID list name in
    this example is SID_LIST_LISTENER.


    After you have a listener.ora file in place, you can start the listener background
    process with the lsnrctl utility:


    $ lsnrctl start


    You should see informational messages such as the following:


    Listener Parameter File


    /oracle/app/oracle/product/11.2.0/db_1/network/admin/listener.ora


