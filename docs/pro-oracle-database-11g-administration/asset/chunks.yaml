    If it’s successful, you should see the following message:


    Database created.


    If any errors are thrown while the CREATE DATABASE statement is running, check
    the alert log file.


    Typical errors occur when required directories don’t exist, or the memory allocation
    isn’t enough, or some operating system limit has been exceeded. If you’re unsure
