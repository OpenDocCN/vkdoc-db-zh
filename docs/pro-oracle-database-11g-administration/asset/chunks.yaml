    Creating an MV with a Refresh Interval


    When you initially create an MV, you have the option of specifying START WITH
    and NEXT clauses that instruct Oracle to set up an internal database job (via
    the DBMS_JOB package) to initiate the refresh of an MV on a periodic basis. If
    you omit START WITH and NEXT, then no job is set up, and you have to use another
    technique (such as a scheduling utility like cron).


    I almost never specify START WITH and NEXT as a refresh mechanism. I strongly
    prefer to use another scheduling utility such as cron. When using cron, it’s easy
    to create a log file that details how the job ran and whether there were any issues.
    Also, when using cron, it’s easy to have the log file e-mailed to a distribution
    list so the support DBAs are aware of any issues.


    Regardless, it’s important to understand how START WITH and NEXT work, because
    sooner or later you’ll find yourself in an environment where DBAs or developers
    prefer to use the DBMS_JOB package for refreshes. When you’re troubleshooting
    refresh issues, you must understand how this refresh mechanism works.


    The START WITH parameter specifies the date when you want the first refresh of
    an MV to occur. The NEXT parameter specifies a date expression that Oracle uses
    to calculate the interval between refreshes.


    For example, this MV initially refreshes one minute in the future (sysdate+1/1440)
    and subsequently refreshes on a daily basis (sysdate+1):


    create materialized view inv_mv


    refresh


    start with sysdate+1/1440


    next sysdate+1


    as


    select


    inv_id


    ,inv_desc


    from inv;


    You can view details of the scheduled job by querying USER_JOBS:


    select


    job


    ,schema_user


    ,to_char(last_date,''dd-mon-yyyy hh24:mi:ss'') last_date


    ,to_char(next_date,''dd-mon-yyyy hh24:mi:ss'') next_date


    ,interval


    ,broken


    from user_jobs;


    Here’s some sample output:


    JOB SCHEMA_USE LAST_DATE NEXT_DATE INTERVAL B


