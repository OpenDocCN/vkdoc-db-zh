    ```\n\nThe error may be displayed on your screen when performing DBA tasks such\
    \ as stopping and starting the database. Or you might see such an error in a trace\
    \ file or the `alert.log` file. If you don't notice the issue right away, with\
    \ a severe media failure, the database will stop processing transactions and users\
    \ will start calling you.\n\nTo understand how Oracle is determining that media\
    \ recovery is required, you must understand how Oracle determines that everything\
    \ is okay. When Oracle shuts down normally (`IMMEDIATE`, `TRANSACTIONAL`, `NORMAL`),\
    \ part of the shutdown process is to flush all modified blocks to disk and mark\
    \ the header of each datafile with the current SCN and to update the control file\
    \ with the current SCN information.\n\nUpon startup, Oracle checks to see if the\
    \ SCN in the control file matches the SCN in the header of the datafile. If there\
    \ is a match, then Oracle attempts to open the datafiles and online redo log files.\
    \ If all files are available and can be opened, Oracle starts normally. The following\
    \ query compares the SCN in the control file (for each datafile) with the SCN\
    \ in the datafile header:\n\n```\nSET LINES 132\nCOL name FORM a40\nCOL status\
    \ FORM A8\nCOL file# FORM 9999\nCOL control_file_SCN FORM 999999999999999\nCOL\
    \ datafile_SCN FORM 999999999999999\n--\nSELECT\n    a.name\n    ,a.status\n \
    \   ,a.file#\n    ,a.checkpoint_change# control_file_SCN\n    ,b.checkpoint_change#\
    \ datafile_SCN\n    ,CASE\n        WHEN ((a.checkpoint_change# - b.checkpoint_change#)\
    \ = 0) THEN 'Startup Normal'\n        WHEN ((b.checkpoint_change#) = 0) THEN 'File\
    \ Missing?'\n        WHEN ((a.checkpoint_change# - b.checkpoint_change#) > 0)\
    \ THEN 'Media Rec. Req.'\n        WHEN ((a.checkpoint_change# - b.checkpoint_change#)\
    \ < 0) THEN 'Old Control File'\n        ELSE 'what the ?'\n    END datafile_status\n\
    FROM v$datafile a -- control file SCN for datafile\n    ,v$datafile_header b --\
    \ datafile header SCN\nWHERE a.file# = b.file#\nORDER BY a.file#;\n```\n\nIf the\
    \ control file SCN values are greater than the datafile SCN values, then media\
    \ recovery is most likely required.\n\n## Determining What to Restore\n\nMedia\
    \ recovery requires that you perform manual tasks to get your database back in\
    \ one piece. These tasks usually involve a combination of `RESTORE` and `RECOVER`\
    \ commands. You will have to issue an RMAN `RESTORE` command if your datafiles\
    \ have experienced media failure. This could be because of somebody accidentally\
    \ deleting files or a disk failure.\n\n## How the Process Works\n\nWhen you issue\
    \ the `RESTORE` command, RMAN will automatically determine how to extract the\
    \ datafiles from any of the following available backups:\n\n* Full database backup\n\
    * Incremental level 0 backup\n* Image copy backup generated by `BACKUP AS COPY`\
    \ command\n\nAfter the files are restored from a backup, you are required to apply\
    \ redo to them via the `RECOVER` command. When you issue the `RECOVER` command,\
    \ Oracle will examine the SCNs in the affected datafiles and determine whether\
    \ any of them need to be recovered. If the SCN in the datafile is less than the\
    \ corresponding SCN in the control file, then media recovery will be required.\n\
    \nOracle will retrieve the datafile SCN and then look for the corresponding SCN\
    \ in the redo stream to determine where to start the recovery process. If the\
    \ starting recovery SCN is in the online redo log files, the archived redo log\
    \ files are not required for recovery.\n\nDuring a recovery, RMAN will automatically\
    \ determine how to apply redo. First, RMAN will apply any incremental backups\
    \ available that are greater than zero, such as the incremental level 1\\. Next,\
    \ any archived redo log files on disk will be applied. If the archived redo log\
    \ files do not exist on disk, RMAN will attempt to retrieve them from a backup\
    \ set.\n\nTo be able to perform a complete recovery, all of the following conditions\
    \ need to be true:\n\n* Your database is in archivelog mode.\n* You have a good\
    \ baseline backup of your database."
