    select


    rowner


    ,rname


    ,job


    ,to_char(next_date,''dd-mon-yyyy hh24:mi:ss'')


    ,interval


    ,broken


    from user_refresh;


    Here’s some sample output:


    ROWNER RNAME JOB TO_CHAR(NEXT_DATE,''DD-MON- INTERVAL B


    ----------- ----------- ------ -------------------------- --------------- -


    INV INV_MV 50 22-oct-2010 15:30:29 sysdate+1 N


    When you drop an MV, the associated job is also removed. If you want to manually
    remove a job, use the REMOVE procedure of DBMS_JOB. This example removes job number
    32, which was identified from the previous queries:


    SQL> exec dbms_job.remove(32);


    ■ **Note** You can''t use START WITH or NEXT in conjunction with an MV that refreshes
    ON COMMIT.


    Efficiently Performing a Complete Refresh


    When an MV does a complete refresh, the default behavior is to use a DELETE statement
    to remove all records from the MV table. After the delete is finished, records
    are selected from the master table and inserted into the MV table. The delete
    and insert are done as one transaction; this means anybody selecting from the
    MV during the complete-refresh process sees the data as it existed before the
    DELETE


    statement. Anybody accessing the MV immediately after the INSERT commits sees
    a fresh view of the data.


    In some scenarios, you may want to modify this behavior. If a large amount of
    data is being refreshed, the DELETE statement can take a long time. You have the
    option of instructing Oracle to perform the removal of data as efficiently as
    possible via the ATOMIC_REFRESH parameter. When this parameter is set to FALSE,
    it allows Oracle to use a TRUNCATE statement instead of a DELETE when performing
    a complete refresh:


    SQL> exec dbms_mview refresh(''INV_MV'',method=>''C'',atomic_refresh=>false);
    TRUNCATE works faster than DELETE for large data sets because TRUNCATE doesn’t
    have the overhead of generating redo. The disadvantage of using the TRUNCATE statement
    is that a user selecting from the MV


    may see zero rows while the refresh is taking place.


    Handling the ORA-12034 Error


    When you attempt to perform a fast refresh of an MV, you may sometimes get the
    ORA-12034 error. For example:


    SQL> exec dbms_mview.refresh(''PRODUCTLINEITEM'',''F'');


