    \ LOB columns, like unexpected growth, performance issues when copying, and so\
    \ on.                                            |\n| If a column always should\
    \ always have a value, then enforce it with a `NOT NULL` constraint.         \
    \                                               | Enforces a business rule and\
    \ keeps the data cleaner.                                                    \
    \                                                               |\n| Create audit-type\
    \ columns such as `CREATE_DTT` and `UPDATE_DTT` that are automatically populated\
    \ with default values and/or triggers.              | Helps with maintenance and\
    \ figuring out when data was inserted and/or updated. Other types of audit columns\
    \ to consider include the users who inserted and updated the row. |\n| Use check\
    \ constraints where appropriate.                                             \
    \                                                              | Enforces a business\
    \ rule and keeps the data cleaner.                                           \
    \                                                                        |\n|\
    \ Define foreign keys where appropriate.                                     \
    \                                                                        | Enforces\
    \ a business rule and keeps the data cleaner.                                \
    \                                                                            \
    \       |\n\n### Implementing Virtual Columns\n\nWith Oracle Database 11g and\
    \ higher, you can create a *virtual column* as part of your table definition.\
    \ A virtual column is based on one or more existing columns from the same table\
    \ and/or a combination of constants, SQL functions, and user-defined PL/SQL functions.\
    \ Virtual columns aren’t stored on disk; they’re evaluated at runtime when the\
    \ SQL query executes. Virtual columns can be indexed and can have stored statistics.\n\
    \nPrior to Oracle Database 11g, you could simulate a virtual column via a `SELECT`\
    \ statement or in a view definition. For example, this next SQL `SELECT` statement\
    \ generates a virtual value when the query is executed:\n\n```sql\nselect inv_id,\
    \ inv_count,\n  case when inv_count <= 100 then 'GETTING LOW'\n       when inv_count\
    \ > 100 then 'OKAY'\n  end\nfrom inv;\n```\n\nWhy use a virtual column? The advantages\
    \ of doing so are as follows:\n\n- You can create an index on a virtual column.\
    \ Internally, Oracle creates a function-based index.\n- You can store statistics\
    \ in a virtual column that can be used by the cost-based optimizer (CBO).\n- Virtual\
    \ columns can be referenced in `WHERE` clauses.\n- Virtual columns are permanently\
    \ defined in the database. There is one central definition of such a column.\n\
    \nHere’s an example of creating a table with a virtual column:\n\n```sql\ncreate\
    \ table inv(\n  inv_id number\n  ,inv_count number\n  ,inv_status generated always\
    \ as (\n      case when inv_count <= 100 then 'GETTING LOW'\n           when inv_count\
    \ > 100 then 'OKAY'\n      end)\n);\n```\n\nIn the prior code listing, specifying\
    \ `GENERATED ALWAYS` is optional. For example, the next listing is equivalent\
    \ to the previous one:\n\n```sql\ncreate table inv(\n  inv_id number\n  ,inv_count\
    \ number\n  ,inv_status as (\n      case when inv_count <= 100 then 'GETTING LOW'\n\
    \           when inv_count > 100 then 'OKAY'\n      end)\n);\n```\n\nI prefer\
    \ to add `GENERATED ALWAYS` because it reinforces in my mind that the column is\
    \ always virtual.\n\nThe `GENERATED ALWAYS` helps document inline what you’ve\
    \ done. This helps with maintenance for other DBAs who come along long after you.\n\
    \nTo view values generated by virtual columns, first insert some data into the\
    \ table:\n\n```sql\nSQL> insert into inv (inv_id, inv_count) values (1,100);\n\
    ```\n\nNext, select from the table to view the generated value:\n\n```sql\nSQL>\
    \ select * from inv;\n```\n\nHere is some sample output:\n\n```\nINV_ID INV_COUNT\
    \ INV_STATUS\n---------- ---------- -----------\n1        100      GETTING LOW\n\
    ```\n\n**Note:** If you insert data into the table, nothing is stored in a column\
    \ `GENERATED ALWAYS AS`. The virtual value is generated when you select from the\
    \ table.\n\nYou can also alter a table to contain a virtual column:\n\n```sql\n\
    alter table inv add(\n  inv_comm generated always as(inv_count * 0.1) virtual\n\
    );\n```\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nAnd you can change the definition\
    \ of an existing virtual column:\n\n```sql\nalter table inv modify inv_status\
    \ generated always as(\n  case when inv_count <= 50 then 'NEED MORE'\n       when\
    \ inv_count >50 and inv_count <=200 then 'GETTING LOW'\n       when inv_count\
    \ > 200 then 'OKAY'\n  end);\n```\n\nYou can access virtual columns in SQL queries\
    \ (DML or DDL). For example, suppose you want to update a permanent column based\
    \ on the value in a virtual column:\n\n```sql\nSQL> update inv set inv_count=100\
    \ where inv_status='OKAY';\n```\n\nA virtual column itself can’t be updated via\
    \ the `SET` clause of an `UPDATE` statement. However, you can reference a virtual\
    \ column in the `WHERE` clause of an `UPDATE` or `DELETE` statement.\n\nYou can\
    \ optionally specify the data type of a virtual column. If you omit the data type,\
    \ Oracle derives the data type from the expression you use to define the virtual\
    \ column.\n\nSeveral caveats are associated with virtual columns:\n\n- You can\
    \ only define a virtual column on a regular heap-organized table. You can’t define\
    \ a virtual column on an index-organized table, an external table, a temporary\
    \ table, object tables, or cluster tables.\n- Virtual columns can’t reference\
    \ other virtual columns.\n- Virtual columns can only reference columns from the\
    \ table in which the virtual column is defined.\n- The output of a virtual column\
    \ must be a scalar value (a single value, not a set of values).\n\nTo view the\
    \ definition of a virtual column, use the `DBMS_METADATA` package to view the\
    \ DDL associated with the table. If you’re selecting from SQL*Plus, you need to\
    \ set the `LONG` variable to a value large enough to show all data returned:\n\
    \n```sql\nSQL> set long 10000;\nSQL> select dbms_metadata.get_ddl('TABLE','INV')\
    \ from dual;\n```\n\nHere is a partial snippet of the output:\n\n```\nCREATE TABLE\
    \ \"INV_MGMT\".\"INV\"\n(  \"INV_ID\" NUMBER,\n  \"INV_COUNT\" NUMBER,\n  \"INV_STATUS\"\
    \ VARCHAR2(11) GENERATED ALWAYS AS (CASE WHEN \"INV_COUNT\"<=50 THEN\n'NEED MORE'\
    \ WHEN (\"INV_COUNT\">50 AND \"INV_COUNT\"<=200) THEN 'GETTING LOW' WHEN \"\n\
    INV_COUNT\">200 THEN 'OKAY' END) VIRTUAL VISIBLE ...\n```\n\n### Making Read-Only\
    \ Tables\n\nStarting with Oracle Database 11g, you can place individual tables\
    \ in read-only mode. Doing so prevents any `INSERT`, `UPDATE`, or `DELETE` statements\
    \ from running against a table. In versions prior to Oracle Database 11g, the\
    \ only way to make a table read-only was to either place the entire database into\
    \ readonly mode or place a tablespace in read-only mode (making all tables in\
    \ the tablespace read-only).\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nThere are\
    \ several reasons why you may require the read-only feature at the table level:\n\
    \n- The data in the table is historical and should never be updated in normal\
    \ circumstances.\n- You’re performing some maintenance on the table and want to\
    \ ensure that it doesn’t change while it’s being updated.\n- You want to drop\
    \ the table, but before you do, you want to place it in read-only mode to better\
    \ determine if any users are attempting to update the table.\n\nUse the `ALTER\
    \ TABLE` statement to place a table in read-only mode:\n\n```sql\nSQL> alter table\
    \ inv read only;\n```\n\nYou can verify the status of a read-only table by issuing\
    \ the following query:\n\n```sql\nSQL> select table_name, read_only from user_tables\
    \ where read_only='YES';\n```\n\nTo modify a read-only table to read-write, issue\
    \ the following SQL:\n\n```sql\nSQL> alter table inv read write;\n```\n\n**Note:**\
    \ The read-only table feature requires that the database initialization `COMPATIBLE`\
    \ parameter be set to 11.1.0 or higher.\n\n### Understanding Deferred Segment\
    \ Creation\n\nStarting with Oracle Database 11g Release 2, when you create a table,\
    \ the creation of the associated segment is deferred until the first row is inserted\
    \ into the table. This feature has some interesting implications. For example,\
    \ if you have thousands of objects that you’re initially creating for an application\
    \ (such as when you first install it), no space is consumed by any of the tables\
    \ (or associated indexes) until data is inserted into the application tables.\
    \ This means the initial DDL runs more quickly when you create a table, but the\
    \ first `INSERT` statement runs slightly slower.\n\nTo illustrate the concept\
    \ of deferred segments, first create a table:\n\n```sql\nSQL> create table inv(inv_id\
    \ number, inv_desc varchar2(30));\n```\n\nYou can verify that the table has been\
    \ created by inspecting `USER_TABLES`:\n\n```sql\nselect\n  table_name\n  ,segment_created\n\
    from user_tables\nwhere table_name='INV';\n```\n\nHere’s some sample output:\n\
    \n```\nTABLE_NAME                     SEG\n------------------------------ ---\n\
    INV                            NO\n```\n\nNext, query `USER_SEGMENTS` to verify\
    \ that a segment hasn’t yet been allocated for this table:\n\n```sql\nselect\n\
    \  segment_name\n  ,segment_type\n  ,bytes\nfrom user_segments\nwhere segment_name='INV'\n\
    and segment_type='TABLE';\n```\n\nHere’s the corresponding output for this example:\n\
    \n```\nno rows selected\n```\n\nNow, insert a row into a table:\n\n```sql\nSQL>\
    \ insert into inv values(1,'BOOK');\n```\n\nRerun the query, selecting from `USER_SEGMENTS`,\
    \ and notice that a segment has been created:\n\n```\nSEGMENT_NAME           \
    \        SEGMENT_TYPE       BYTES\n------------------------------ ------------------\
    \ ----------\nINV                            TABLE              65536\n```\n\n\
    If you’re used to working with older versions of Oracle, the deferred-segment-creation\
    \ feature can cause confusion. For example, if you have space-related monitoring\
    \ reports that query `DBA_SEGMENTS` or `DBA_EXTENTS`, be aware that these views\
    \ aren’t populated for a table or any indexes associated with the table until\
    \ the first row is inserted into the table.\n\n**Note:** You can disable the deferred-segment-creation\
    \ feature by setting the database-initialization parameter `DEFERRED_SEGMENT_CREATION`\
    \ to `FALSE`. The default for this parameter is `TRUE`.\n\n### Allowing for Parallel\
    \ SQL Execution\n\nIf you work with large tables, you may want to consider creating\
    \ your tables as `PARALLEL`. This instructs Oracle to set the degree of parallelism\
    \ to be used for any subsequent `INSERT`, `UPDATE`, `DELETE`, `MERGE`, and query\
    \ statements. This example creates a table with a `PARALLEL` clause of 2:\n\n\
    ```sql\ncreate table inv_apr_10\nparallel 2\nas select * from inv\nwhere create_dtt\
    \ >= '01-apr-10' and create_dtt < '01-may-10';\n```\n\nYou can specify `PARALLEL`,\
    \ `NOPARALLEL`, or `PARALLEL N`. If you don’t specify `N`, Oracle sets the degree\
    \ of parallelism based on the `PARALLEL_THREADS_PER_CPU` initialization parameter.\n\
    \nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\n**Tip:** Keep in mind that `PARALLEL_THREADS_PER_CPU`\
    \ can vary considerably from a development environment to a production environment.\
    \ Your development box may contain only 2 CPUS, whereas a production server may\
    \ have 32 CPUs. Therefore, if you don’t specify the degree of parallelism, the\
    \ behavior of parallel operations can vary widely depending on the environment.\n\
    \n### Compressing Table Data\n\nOracle has had table compression for quite some\
    \ time. Prior to Oracle Database 11g, the compression available was only suitable\
    \ for data-warehouse environments, mainly because the table-level compression\
    \ was CPU intensive and degraded the performance of DML statements. This type\
    \ of compression usually wasn’t suitable for online transaction processing (OLTP)\
    \ environments.\n\n**Note:** OLTP table compression is a feature of the Oracle\
    \ Advanced Compression option. The Oracle Advanced Compression option requires\
    \ an additional license from Oracle.\n\nStarting with Oracle Database 11g, you\
    \ can do this:\n\n```sql\ncreate table inv(\n  inv_id number\n  ,inv_name varchar2(64)\n\
    ) compress for oltp;\n```\n\nThe `COMPRESS FOR OLTP` clause enables compression\
    \ for all DML operations (in prior versions of Oracle, the compress feature was\
    \ limited to direct-path `INSERT` operations). The OLTP compression doesn’t immediately\
    \ compress data as it’s inserted and updated in a table. Rather, the compression\
    \ occurs in a batch mode when the block reaches a certain internally defined threshold.\
    \ When the threshold is reached, all of the uncompressed rows are compressed at\
    \ the same time. The threshold at which compression occurs is determined by an\
    \ internal algorithm.\n\n**Note:** Oracle also has a hybrid columnar compression\
    \ feature that is available with the Oracle Exadata product. See Oracle’s technology\
    \ website (http://otn.oracle.com) for more details.\n\nCHAPTER 7 ■ TABLES AND\
    \ CONSTRAINTS\n\nYou can verify the compression for a table via the following\
    \ `SELECT` statement:\n\n```sql\nselect\n  table_name\n  ,compression\n  ,compress_for\n\
    from user_tables where table_name='INV';\n```\n\nHere is some sample output:\n\
    \n```\nTABLE_NAME                     COMPRESS COMPRESS_FOR\n------------------------------\
    \ -------- ------------\nINV                            ENABLED  OLTP\n```\n\n\
    ### Avoiding Redo Creation\n\nWhen you’re creating a table, you have the option\
    \ of specifying the `NOLOGGING` clause. The `NOLOGGING` feature can greatly reduce\
    \ the amount of redo generation for certain types of operations. Sometimes, when\
    \ you’re working with large amounts of data, it’s desirable for performance reasons\
    \ to reduce the redo generation when you initially create and insert data into\
    \ a table.\n\nThe downside to eliminating redo generation is that you can’t recover\
    \ the data created via `NOLOGGING` in the event a failure occurs after the data\
    \ is loaded (and before you can back up the table). If you can tolerate some risk\
    \ of data loss, then use `NOLOGGING` but back up the table soon after the data\
    \ is loaded. If your data is critical, then don’t use `NOLOGGING`. If your data\
    \ can be easily re-created, then `NOLOGGING` is desirable when you’re trying to\
    \ improve performance of large data loads.\n\nOne perception is that `NOLOGGING`\
    \ eliminates redo generation for the table for all DML operations. That isn’t\
    \ correct. The `NOLOGGING` feature never affects redo generation for normal DML\
    \ statements (regular `INSERT`, `UPDATE`, and `DELETE`).\n\nThe `NOLOGGING` feature\
    \ can significantly reduce redo generation for the following types of operations:\n\
    \n- SQL*Loader direct path load\n- Direct path `INSERT /*+ append */`\n- `CREATE\
    \ TABLE AS SELECT`\n- `ALTER TABLE MOVE`\n- Creating or rebuilding an index\n\n\
    You need to be aware of some quirks (features) when using `NOLOGGING`. If your\
    \ database is in `FORCE LOGGING` mode, then redo is generated for all operations,\
    \ regardless of whether you specify `NOLOGGING`.\n\nWhen you’re loading a table,\
    \ if the table has a referential foreign-key constraint defined, then redo is\
    \ generated regardless of whether you specify `NOLOGGING`.\n\nYou can specify\
    \ `NOLOGGING` at one of the following levels:\n\n- Statement: `CREATE TABLE` or\
    \ `ALTER TABLE`\n- `CREATE TABLESPACE` or `ALTER TABLESPACE`\n\nI prefer to specify\
    \ the `NOLOGGING` clause at the statement or table level. In these scenarios,\
    \ it’s obvious to the DBA executing the statement or DDL that `NOLOGGING` is used.\
    \ If you specify `NOLOGGING` at the tablespace level, then each DBA that creates\
    \ objects within that tablespace must be aware of this\n\n144\n\nCHAPTER 7 ■ TABLES\
    \ AND CONSTRAINTS\n\ntablespace-level setting. In teams with multiple DBAs, it’s\
    \ easy for one DBA to be unaware that another DBA has created a tablespace with\
    \ `NOLOGGING`.\n\nThis example first creates a table with the `NOLOGGING` option:\n\
    \n```sql\ncreate table inv(inv_id number)\ntablespace users\nnologging;\n```\n\
    \nNext, do a direct-path insert via selecting from a table with historical data:\n\
    \n```sql\nSQL> insert /*+ append */ into inv select inv_id from inv_mar_2010;\n\
    SQL> commit;\n```\n\nWhat happens if you have a media failure after you’ve populated\
    \ a table in `NOLOGGING` mode (and before you’ve made a backup of the table)?\
    \ After a restore and recovery operation, it will appear that the table has been\
    \ restored:\n\n```sql\nSQL> desc inv\nName Null? Type\n-----------------------------------------\
    \ -------- ----------------------------\nINV_ID NUMBER\n```\n\nHowever, try to\
    \ execute a query that scans every block in the table:\n\n```sql\nSQL> select\
    \ * from inv;\n```\n\nAn error is thrown, indicating that there is logical corruption\
    \ in the datafile:\n\n```\nORA-01578: ORACLE data block corrupted (file # 4, block\
    \ # 11057)\nORA-01110: data file 4: '/ora02/dbfile/O11R2/users01.dbf'\nORA-26040:\
    \ Data block was loaded using the NOLOGGING option\n```\n\nIf you specify a logging\
    \ clause at the statement level, it overrides any table or tablespace setting.\
    \ If you specify a logging clause at the table level, it sets the default mode\
    \ for any statements that don’t specify a logging clause, and overrides the logging\
    \ setting at the tablespace. If you specify a logging clause at the tablespace\
    \ level, it sets the default logging for any `CREATE TABLE` statements that don’t\
    \ specify a logging clause.\n\nYou verify the logging mode of the database as\
    \ follows:\n\n```sql\nSQL> select name, log_mode, force_logging from v$database;\n\
    ```\n\nThe next statement verifies the logging mode of a tablespace:\n\n```sql\n\
    SQL> select tablespace_name, logging from dba_tablespaces;\n```\n\nAnd this example\
    \ verifies the logging mode of a table:\n\n```sql\nSQL> select owner, table_name,\
    \ logging from dba_tables where logging = 'NO';\n```\n\nHow do you tell whether\
    \ Oracle logged redo for an operation? One way is to measure the amount of redo\
    \ generated for an operation with logging enabled versus operating in `NOLOGGING`\
    \ mode. If you have a development environment that you can test in, you can monitor\
    \ how often the redo logs switch while the operation is taking place. Another\
    \ simple test is to time how long the operation takes with and without logging.\
    \ The operation performed in `NOLOGGING` mode should be faster (because a minimal\
    \ amount of redo is being generated).\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\n\
    ### Creating a Table from a Query\n\nSometimes it’s convenient to create a table\
    \ based on the definition of an existing table. For example, say you want to create\
    \ a quick backup of a table before you modify the table’s structure or data. Use\
    \ the `CREATE TABLE AS SELECT` statement (sometimes referred to colloquially as\
    \ CTAS) to achieve this. For example:\n\n```sql\ncreate table cwp_user_profile_101910\n\
    as select * from cwp_user_profile;\n```\n\nThe previous statement creates an identical\
    \ table complete with data. If you don’t want the data included, you just want\
    \ the structure of the table replicated, then provide a `WHERE` clause that always\
    \ evaluates to false (in this example, 1 will never equal 2):\n\n```sql\ncreate\
    \ table cwp_user_profile_test\nas select * from cwp_user_profile\nwhere 1=2;\n\
    ```\n\nYou can also specify that no redo be logged when a CTAS table is created.\
    \ For large data sets, this can reduce the amount of time required to create the\
    \ table:\n\n```sql\ncreate table cwp_user_profile_101910\nnologging\nas select\
    \ * from cwp_user_profile;\n```\n\nBe aware that using the CTAS technique with\
    \ the `NOLOGGING` clause creates the table as `NOLOGGING` and doesn’t generate\
    \ the redo required to recover the data that populates the table as the result\
    \ of the `SELECT` statement. Also, if the tablespace is defined to be `NOLOGGING`\
    \ (in which the CTAS table is being created), then no redo is generated. In these\
    \ scenarios, you can’t restore and recover your table in the event a failure occurs\
    \ before you’re able to back up the table. If your data is critical, then don’t\
    \ use the `NOLOGGING` clause.\n\nYou can also specify parallelism and storage\
    \ parameters. Depending on the number of CPUs, you may see some performance gains:\n\
    \n```sql\ncreate table cwp_user_profile_101910\nnologging\ntablespace staging_data\n\
    parallel 2\nas select * from cwp_user_profile_tab;\n```\n\n**Note:** The CTAS\
    \ technique doesn’t create any indexes or triggers. You have to create indexes\
    \ and triggers separately if you need those objects from the original table.\n\
    \n## Modifying a Table\n\nAltering a table is a common task. New requirements\
    \ often mean that you need to rename, add, drop or change column data types. In\
    \ development environments, changing a table is often a trivial task: you often\
    \ don’t have large quantities of data or hundreds of users simultaneously accessing\
    \ a table.\n\nHowever, for active production systems, you need to understand the\
    \ ramifications of trying to change tables that are currently being accessed and/or\
    \ are already populated with data.\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\n###\
    \ Obtaining the Needed Lock\n\nWhen you modify a table, you must have an exclusive\
    \ lock on the table. One issue is that if a DML transaction has a lock on the\
    \ table, you can’t alter the table. In this situation, you receive this error:\n\
    \n```\nORA-00054: resource busy and acquire with NOWAIT specified or timeout expired\n\
    ```\n\nThe prior error message is somewhat confusing in that it leads you to believe\
    \ that you can resolve the issue by acquiring a lock with `NOWAIT`. However, this\
    \ is a generic message that is generated when the DDL you’re issuing can’t obtain\
    \ an exclusive lock on the table. In this situation, you have a few options:\n\
    \n- After issuing the DDL command and receiving the `ORA-00054` error, rapidly\
    \ press the `/` (forward slash) key repeatedly in hopes of modifying the table\
    \ between transactions.\n- Shut down the database and start it in restricted mode,\
    \ modify the table, and then open the database for normal use.\n- In Oracle Database\
    \ 11g and higher, set the `DDL_LOCK_TIMEOUT` parameter.\n\nThe last item in the\
    \ previous list instructs Oracle to repeatedly attempt to run a DDL statement\
    \ until it obtains the required lock on the table. You can set the `DDL_LOCK_TIMEOUT`\
    \ parameter at the system or session level. This next example instructs Oracle\
    \ to repeatedly retry to obtain a lock for 100 seconds:\n\n```sql\nSQL> alter\
    \ session set ddl_lock_timeout=100;\n```\n\nThe default value for the system-level\
    \ `DDL_LOCK_TIMEOUT` initialization parameter is 0. If you want to modify the\
    \ default behavior for every session in the system, issue an `ALTER SYSTEM SET`\
    \ statement. The following command sets the default timeout value to 10 seconds\
    \ for the system:\n\n```sql\nSQL> alter system set ddl_lock_timeout=10 scope=both;\n\
    ```\n\n### Renaming a Table\n\nThere are a couple of reasons for renaming a table:\n\
    \n- To make the table conform to standards\n- To better determine whether the\
    \ table is being used before you drop it\n\nThis example renames a table from\
    \ `INV_MGMT` to `INV_MGMT_OLD`:\n\n```sql\nSQL> rename inv_mgmt to inv_mgmt_old;\n\
    ```\n\nIf successful, you should see this message:\n\n```\nTable renamed.\n```\n\
    \n### Adding a Column\n\nUse the `ALTER TABLE ... ADD` statement to add a column\
    \ to a table. This example adds a column to the `INV` table:\n\n```sql\nSQL> alter\
    \ table inv add(inv_count number);\n```\n\nIf successful, you should see this\
    \ message:\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\n```\nTable altered.\n```\n\
    \n### Altering a Column\n\nOccasionally, you need to alter a column to adjust\
    \ its size or change its data type. Use the `ALTER TABLE ... MODIFY` statement\
    \ to adjust the size of a column. This example changes the size of a column to\
    \ 256 characters:\n\n```sql\nSQL> alter table inv modify inv_desc varchar2(256);\n\
    ```\n\nIf you decrease the size of a column, first ensure that no values exist\
    \ that are greater than the decreased size value:\n\n```sql\nSQL> select max(length(<column_name>))\
    \ from <table_name>;\n```\n\nWhen you change a column to `NOT NULL`, then there\
    \ must be a valid value for each column. First, verify that there are no `NULL`\
    \ values:\n\n```sql\nSQL> select <column_name> from <table_name> where <column_name>\
    \ is null;\n```\n\nIf any rows have a `NULL` value for the column you’re modifying\
    \ to `NOT NULL`, then you must first update the column to contain a value. Here\
    \ is an example of modifying a column to `NOT NULL`:\n\n```sql\nSQL> alter table\
    \ inv modify(inv_desc not null);\n```\n\nYou can also alter the column to have\
    \ a default value. The default value is used any time a record is inserted into\
    \ the table but no value is provided for a column:\n\n```sql\nSQL> alter table\
    \ inv modify(inv_desc default 'No Desc');\n```\n\nIf you want to remove the default\
    \ value of a column, then set it to be `NULL`:\n\n```sql\nSQL> alter table inv\
    \ modify(inv_desc default NULL);\n```\n\nSometimes you need to change a table’s\
    \ data type: for example, a column that was originally incorrectly defined as\
    \ a `VARCHAR2` needs to be changed to a `NUMBER`. Before you change a column’s\
    \ data type, first verify that all values for an existing column contain only\
    \ valid numeric values. Here’s a simple PL/SQL script to do this:\n\n```sql\n\
    create or replace function isnum(v_in varchar2)\nreturn varchar is\n  val_err\
    \ exception;\n  pragma exception_init(val_err, -6502); -- char to num conv. error\n\
    \  scrub_num number;\nbegin\n  scrub_num := to_number(v_in);\n  return 'Y';\n\
    exception\n  when val_err then\n    return 'N';\nend;\n/\n```\n\nYou can use the\
    \ `ISNUM` function to detect whether data in a column is numeric. The function\
    \ defines a PL/SQL pragma exception for the `ORA-06502` character-to-number conversion\
    \ error. When this error is encountered, the exception handler captures it and\
    \ returns an `N`. If the value passed in to the `ISNUM` function is a number,\
    \ then a `Y` is returned. If the value can’t be converted to a number, then an\
    \ `N` is returned. After you’ve defined the function, you can run it as follows:\n\
    \n148\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\n```sql\nSQL> select hold_col from\
    \ stage where isnum(hold_col)='N';\n```\n\nSimilarly, when you modify a character\
    \ column to a `DATE` or `TIMESTAMP` data type, it’s prudent to first check to\
    \ see whether the data can be successfully converted. Here’s a function that does\
    \ that:\n\n```sql\ncreate or replace function isdate(p_in varchar2, f_in varchar2)\n\
    return varchar is\n  scrub_dt date;\nbegin\n  scrub_dt := to_date(p_in, f_in);\n\
    \  return 'Y';\nexception\n  when others then\n    return 'N';\nend;\n/\n```\n\
    \nWhen you call the `ISDATE` function, you need to pass it a valid date-format\
    \ mask:\n\n```sql\nSQL> select hold_col from stage where isdate(hold_col,'YYYYMMDD')='N';\n\
    ```\n\n### Renaming a Column\n\nThere are a couple of reasons to rename a column:\n\
    \n- Sometimes requirements change, and you want to modify the column name to better\
    \ reflect what the column is used for.\n- If you’re planning to drop a column,\
    \ it doesn’t hurt to rename the column first to better determine whether any users\
    \ or applications are accessing the column.\n\nUse the `ALTER TABLE ... RENAME`\
    \ statement to rename a column:\n\n```sql\nSQL> alter table inv rename column\
    \ inv_count to inv_amt;\n```\n\n### Dropping a Column\n\nTables sometimes end\
    \ up having columns that are never used. This may be because the initial requirements\
    \ changed or were inaccurate. If you have a table that contains an unused column,\
    \ you should consider dropping it. If you leave an unused column in a table, you\
    \ may run into issues with future DBAs not knowing what the column is used for,\
    \ and the column can potentially consume space unnecessarily.\n\nBefore you drop\
    \ a column, I recommend that you first rename it. Doing so gives you an opportunity\
    \ to discover whether any users or applications are using the column. After you’re\
    \ confident the column isn’t being used, first make a backup of the table using\
    \ Data Pump export, and then drop the column.\n\nThe previous strategies provide\
    \ you with options if you drop a column and then subsequently realize that it’s\
    \ needed.\n\nTo drop a column, use the `ALTER TABLE ... DROP` statement:\n\n```sql\n\
    SQL> alter table inv drop (inv_name);\n```\n\nBe aware that the `DROP` operation\
    \ may take some time if the table from which you’re removing the column contains\
    \ a large amount of data. This time lag may result in transactions being delayed\
    \ while the table is being modified (because the `ALTER TABLE` statement locks\
    \ the table). In scenarios like this, you may want to first mark the column as\
    \ unused and then later drop it when you have a maintenance window:\n\nCHAPTER\
    \ 7 ■ TABLES AND CONSTRAINTS\n\n```sql\nSQL> alter table inv set unused (inv_name);\n\
    ```\n\nWhen you mark a column as unused, it no longer shows up in the table description.\
    \ The `SET UNUSED` clause doesn’t incur the overhead associated with dropping\
    \ the column. This technique allows you to quickly stop the column from being\
    \ seen or used by SQL queries or applications. Any query that attempts to access\
    \ an unused column receives the following error:\n\n```\nORA-00904: ... invalid\
    \ identifier\n```\n\nYou can later drop any unused columns when you’ve scheduled\
    \ some downtime for the application.\n\nUse the `DROP UNUSED` clause to remove\
    \ any columns marked as `UNUSED`.\n\n```sql\nSQL> alter table inv drop unused\
    \ columns;\n```\n\n### Displaying Table DDL\n\nSometimes DBAs do a poor job of\
    \ documenting what DDL is used when creating or modifying a table. Normally, you\
    \ should maintain the database DDL code in a source-control repository or in some\
    \ sort of modeling tool. If your shop doesn’t have the DDL source code, then there\
    \ are a few ways that you can manually reproduce DDL:\n\n- Query the data dictionary\n\
    - Use the `exp` and `imp` utilities\n- Use Data Pump\n- Use the `DBMS_METADATA`\
    \ package\n\nBack in the olden days, say version 7 and earlier, DBAs often wrote\
    \ SQL that queries the data dictionary to attempt to extract the DDL required\
    \ to re-create objects. Although this method was better than nothing, it was often\
    \ prone to errors because the SQL didn’t account for every object-creation feature.\n\
    \nThe `exp` and `imp` utilities are useful for generating DDL. The basic idea\
    \ is that you export the object in question and then use the `imp` utility with\
    \ the `SCRIPT` or `SHOW` option to display the DDL. This is a good method, but\
    \ you often have to manually edit the output of the `imp` utility to produce the\
    \ desired DDL.\n\nThe Data Pump utility is an excellent method for generating\
    \ the DDL used to create database objects. Using Data Pump to generate DDL is\
    \ covered in detail in Chapter 13.\n\nThe `GET_DDL` function of the `DBMS_METADATA`\
    \ package is usually the quickest way to display the DDL required to create an\
    \ object. This example shows how to generate the DDL for a table named `INV`:\n\
    \n```sql\nSQL> set long 10000\nSQL> select dbms_metadata.get_ddl('TABLE','INV')\
    \ from dual;\n```\n\nHere is some sample output:\n\n```\nDBMS_METADATA.GET_DDL('TABLE','INV')\n\
    --------------------------------------------------------------------------------\n\
    CREATE TABLE \"DARL\".\"INV\"\n(  \"INV_ID\" NUMBER,\n  \"INV_DESC\" VARCHAR2(30),\n\
    \  \"INV_COUNT\" NUMBER\n) SEGMENT CREATION DEFERRED\n  PCTFREE 10 PCTUSED 40\
    \ INITRANS 1 MAXTRANS 255 NOCOMPRESS LOGGING\n  TABLESPACE \"USERS\"\n```\n\n\
    The following SQL statement displays all the DDL for the tables in a schema:\n\
    \n```sql\nselect\n  dbms_metadata.get_ddl('TABLE',table_name)\nfrom user_tables;\n\
    ```\n\nIf you want to display the DDL for a table owned by another user, add the\
    \ `SCHEMA` parameter to the `GET_DDL` procedure.\n\n```sql\nselect\n  dbms_metadata.get_ddl(object_type=>'TABLE',\
    \ name=>'INVENTORY', schema=>'INV_APP') from dual;\n```\n\n**Note:** You can display\
    \ the DDL for almost any database object type, such as `INDEX`, `FUNCTION`, `ROLE`,\
    \ `PACKAGE`, `MATERIALIZED VIEW`, `PROFILE`, `CONSTRAINT`, `SEQUENCE`, `SYNONYM`,\
    \ and so on.\n\n### Dropping a Table\n\nIf you want to remove an object such as\
    \ a table from a user, use the `DROP TABLE` statement. This example drops a table\
    \ named `INVENTORY`:\n\n```sql\nSQL> drop table inventory;\n```\n\nYou should\
    \ see the following confirmation:\n\n```\nTable dropped.\n```\n\nIf you attempt\
    \ to drop a parent table that has a primary key or unique keys referenced as a\
    \ foreign key in a child table, you see an error such as\n\n```\nORA-02449: unique/primary\
    \ keys in table referenced by foreign keys\n```\n\nYou need to either drop the\
    \ referenced foreign-key constraint(s) or use the `CASCADE CONSTRAINTS` option\
    \ when dropping the parent table:\n\n```sql\nSQL> drop table inventory cascade\
    \ constraints;\n```\n\nYou must be the owner of the table or have the `DROP ANY\
    \ TABLE` system privilege to drop a table. If you have the `DROP ANY TABLE` privilege,\
    \ you can drop a table in a different schema by prepending the schema name to\
    \ the table name:\n\n```sql\nSQL> drop table inv_mgmt.inventory;\n```\n\nIf you\
    \ don’t prepend the table name with a user name, Oracle assumes you’re dropping\
    \ a table in your current user.\n\n**Tip:** If you’re using Oracle Database 10g\
    \ or higher, keep in mind that you can undrop an accidentally dropped table.\n\
    \nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\n### Undropping a Table\n\nSuppose you\
    \ accidentally drop a table, and you want to restore it. First, verify that the\
    \ table you want to restore is in the recycle bin:\n\n```sql\nSQL> show recyclebin;\n\
    ```\n\nHere is some sample output:\n\n```\nORIGINAL NAME    RECYCLEBIN NAME  \
    \              OBJECT TYPE  DROP TIME\n---------------- ------------------------------\
    \ ------------ -------------------\nPURCHASES        BIN$YzqK0hN3Fh/gQHdAPLFgMA==$0\
    \ TABLE       2009-02-18:17:23:15\n```\n\nNext, use the `FLASHBACK TABLE...TO\
    \ BEFORE DROP` statement to recover the dropped table:\n\n```sql\nSQL> flashback\
    \ table purchases to before drop;\n```\n\n**Note:** You can’t `FLASHBACK TABLE...TO\
    \ BEFORE DROP` for a table created in the `SYSTEM` tablespace.\n\nIn Oracle Database\
    \ 10g and higher, when you issue a `DROP TABLE` statement, the table is renamed\
    \ (to a name that starts with `BIN$`) and placed in the recycle bin. The recycle\
    \ bin is a mechanism that allows you to view some of the metadata associated with\
    \ a dropped object. You can view complete metadata regarding renamed objects by\
    \ querying `DBA_SEGMENTS`:\n\n```sql\nselect\n  owner\n  ,segment_name\n  ,segment_type\n\
    \  ,tablespace_name\nfrom dba_segments\nwhere segment_name like 'BIN$%';\n```\n\
    \nHere is some sample output:\n\n```\nOWNER      SEGMENT_NAME                \
    \   SEGMENT_TYPE       TABLESPACE_NAME\n---------- ------------------------------\
    \ ------------------ ---------------\nINV        BIN$kptXkzzMdFrgQAB/AQBsFw==$0\
    \ TABLE              USERS\nINV        BIN$kptXkzzNdFrgQAB/AQBsFw==$0 TABLE  \
    \            USERS\n```\n\nThe `FLASHBACK TABLE` statement simply renames the\
    \ table back to its original name. By default, the `RECYCLEBIN` feature is enabled\
    \ in Oracle Database 10g and higher. You can change the default by setting the\
    \ `RECYCLEBIN` initialization parameter to `OFF`.\n\nI recommend that you not\
    \ disable the `RECYCLEBIN` feature. It’s safer to leave this feature enabled and\
    \ purge the `RECYCLEBIN` to remove objects that you want permanently deleted.\
    \ This means the space associated with a dropped table isn’t released until you\
    \ purge your `RECYCLEBIN`. If you want to purge the entire contents of the currently\
    \ connected user’s recycle bin, use the `PURGE RECYCLEBIN` statement:\n\n```sql\n\
    SQL> purge recyclebin;\n```\n\nIf you want to purge the recycle bin for all users\
    \ in the database, then do the following as a DBA privileged user:\n\n```sql\n\
    SQL> purge dba_recyclebin;\n```\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nIf you\
    \ want to bypass the `RECYCLEBIN` feature and permanently drop a table, use the\
    \ `PURGE` option of the `DROP TABLE` statement:\n\n```sql\nSQL> drop table dept\
    \ purge;\n```\n\nYou can’t use the `FLASHBACK TABLE` statement to retrieve a table\
    \ dropped with the `PURGE` option. All space used by the table is released, and\
    \ any associated indexes and triggers are also dropped.\n\n### Removing Data from\
    \ a Table\n\nYou can use either the `DELETE` statement or the `TRUNCATE` statement\
    \ to remove records from a table. You need to be aware of some important differences\
    \ between these two approaches. Table 7–3 summarizes the attributes of the `DELETE`\
    \ and `TRUNCATE` statements.\n\n***Table 7–3.** Features of `DELETE` and `TRUNCATE`*\n\
    \n| **Feature**                           | **DELETE** | **TRUNCATE** |\n| :------------------------------------\
    \ | :--------- | :----------- |\n| Choice of `COMMIT` or `ROLLBACK`      | YES\
    \        | NO           |\n| Generates undo                        | YES     \
    \   | NO           |\n| Resets the high-water mark to zero    | NO         | YES\
    \          |\n| Affected by referenced and enabled foreign-key constraints | NO\
    \         | YES          |\n| Performs well with large amounts of data | NO  \
    \       | YES          |\n\n#### Using `DELETE`\n\nOne big difference is that\
    \ the `DELETE` statement can be either committed or rolled back. Committing a\
    \ `DELETE` statement makes the changes permanent:\n\n```sql\nSQL> delete from\
    \ inv;\nSQL> commit;\n```\n\nIf you issue a `ROLLBACK` statement instead of `COMMIT`,\
    \ the table contains data as it was before the `DELETE` was issued.\n\n#### Using\
    \ `TRUNCATE`\n\n`TRUNCATE` is a DDL statement. This means Oracle automatically\
    \ commits the statement (and the current transaction) after it runs, so there\
    \ is no way to roll back a `TRUNCATE` statement. If you need the option of choosing\
    \ to roll back (instead of committing) when removing data, then you should use\
    \ the `DELETE` statement. However, the `DELETE` statement has the disadvantage\
    \ that it generates a great deal of undo and redo information. Thus for large\
    \ tables, a `TRUNCATE` statement is usually the most efficient way to remove data.\n\
    \nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nThis example uses a `TRUNCATE` statement\
    \ to remove all data from the `COMPUTER_SYSTEMS` table:\n\n```sql\nSQL> truncate\
    \ table computer_systems;\n```\n\nBy default, Oracle deallocates all space used\
    \ for the table except the space defined by the `MINEXTENTS` table-storage parameter.\
    \ If you don’t want the `TRUNCATE` statement to deallocate the extents, use the\
    \ `REUSE STORAGE` parameter:\n\n```sql\nSQL> truncate table computer_systems reuse\
    \ storage;\n```\n\nThe `TRUNCATE` statement sets the high-water mark of a table\
    \ back to zero. When you use a `DELETE` statement to remove data from a table,\
    \ the high-water mark doesn’t change. One advantage of using a `TRUNCATE` statement\
    \ and resetting the high-water mark is that full-table scans only search for rows\
    \ in blocks below the high-water mark. This can have significant performance implications.\n\
    \nYou can’t truncate a table that has a primary key defined that is referenced\
    \ by an enabled foreign-key constraint in a child table—even if the child table\
    \ contains zero rows. Oracle prevents you from doing this because in a multiuser\
    \ system, there is a possibility that another session can populate the child table\
    \ with rows in between the time you truncate the child table and the time you\
    \ subsequently truncate the parent table. In this scenario, you must temporarily\
    \ disable the referenced foreign-key constraints, issue the `TRUNCATE` statement,\
    \ and then re-enable the constraints.\n\nBecause a `TRUNCATE` statement is DDL,\
    \ you can’t truncate two separate tables as one transaction.\n\nCompare this `TRUNCATE`\
    \ behavior to that of `DELETE`. Oracle does allow you to use the `DELETE` statement\
    \ to remove rows from a parent table while the constraints are enabled that reference\
    \ a child table. This is because `DELETE` generates undo, is read-consistent,\
    \ and can be rolled back.\n\n**Note:** Another way to remove data from a table\
    \ is to drop and re-create the table. However, this means you also have to re-create\
    \ any indexes, constraints, grants, and triggers that belong to the table. Additionally,\
    \ when you drop a table, it’s temporarily unavailable until you re-create it and\
    \ reissue any required grants. Usually, dropping and re-creating a table is acceptable\
    \ only in a development or test environment.\n\n### Viewing and Adjusting the\
    \ High-Water Mark\n\nOracle defines the *high-water mark* of a table as the boundary\
    \ between used and unused space in a segment. When you create a table, Oracle\
    \ allocates a number of extents to the table defined by the `MINEXTENTS` table-storage\
    \ parameter. Each extent contains a number of blocks. Before data is inserted\
    \ into the table, none of the blocks have been used, and the high-water mark is\
    \ zero.\n\nAs data is inserted into a table, the high-water mark boundary is raised\
    \ as extents are allocated. A `DELETE` statement doesn’t reset the high-water\
    \ mark.\n\nYou need to be aware of a couple of performance-related issues regarding\
    \ the high-water mark:\n\n- SQL query full-table scans\n- Direct-path load-space\
    \ usage\n\nOracle sometimes needs to scan every block of a table (under the high-water\
    \ mark) when performing a query. This is known as a *full-table scan*. If a significant\
    \ amount of data has been deleted from a table, a full-table scan can take a long\
    \ time to complete, even for a table with zero rows.\n\nCHAPTER 7 ■ TABLES AND\
    \ CONSTRAINTS\n\nAlso, when doing direct-path loads, Oracle inserts data above\
    \ the high-water mark line. Potentially, you can end up with a large amount of\
    \ unused space in a table that is regularly deleted from and also is loaded via\
    \ a direct-path mechanism.\n\nYou can use a couple of methods to detect space\
    \ below the high-water mark:\n\n- Autotrace tool\n- `DBMS_SPACE` package\n\nThe\
    \ autotrace tool provides a simple method for detecting high-water-mark issues.\
    \ Autotrace is advantageous because it’s easy to use and the output is easy to\
    \ interpret.\n\nYou can use the `DBMS_SPACE` package to determine the high-water\
    \ mark of objects created in tablespaces that use auto-space segment management.\
    \ The `DBMS_SPACE` package allows you to programmatically check for high-water\
    \ mark problems. The downside to this approach is that the output is somewhat\
    \ cryptic and sometimes difficult to derive concrete answers from.\n\n#### Tracing\
    \ to Detect Space Below the High-Water Mark\n\nYou can run this simple test to\
    \ detect whether you have an issue with unused space below the high-water mark:\n\
    \n1. `SQL> set autotrace trace statistics`\n2. Run the query that performs the\
    \ full-table scan.\n3. Compare the number of rows processed to the number of logical\
    \ I/Os (memory and disk accesses).\n\nIf the number of rows processed is low but\
    \ the number of logical I/Os is high, you may have an issue with the number of\
    \ free blocks below the high-water mark. Here’s a simple example to illustrate\
    \ this technique:\n\n```sql\nSQL> set autotrace trace statistics\n```\n\nThe next\
    \ query generates a full-table scan on the `INV` table:\n\n```sql\nSQL> select\
    \ * from inv;\n```\n\nHere’s a partial snippet of the output from AUTOTRACE:\n\
    \n```\nno rows selected\n\nStatistics\n----------------------------------------------------------\n\
    \       1405  consistent gets\n          0  physical reads\n```\n\nThe number\
    \ of rows returned is zero, yet the consistent gets (memory accesses) is 1405.\
    \ This indicates that there is free space beneath the high-water mark.\n\nNext,\
    \ truncate the table and run the query again:\n\n```sql\nSQL> truncate table inv;\n\
    SQL> select * from inv;\n```\n\nHere’s a partial listing from the output of AUTOTRACE:\n\
    \n```\nno rows selected\n\nStatistics\n----------------------------------------------------------\n\
    \          3  consistent gets\n          0  physical reads\n```\n\nNotice that\
    \ the number of memory accesses has been reduced to 3.\n\n#### Using `DBMS_SPACE`\
    \ to Detect Space Below the High-Water Mark\n\nYou can use the `DBMS_SPACE` package\
    \ to detect free blocks beneath the high-water mark. Here’s an anonymous block\
    \ of PL/SQL that you can call from SQL*Plus:\n\n```sql\nset serverout on size\
    \ 1000000\ndeclare\n  p_fs1_bytes number;\n  p_fs2_bytes number;\n  p_fs3_bytes\
    \ number;\n  p_fs4_bytes number;\n  p_fs1_blocks number;\n  p_fs2_blocks number;\n\
    \  p_fs3_blocks number;\n  p_fs4_blocks number;\n  p_full_bytes number;\n  p_full_blocks\
    \ number;\n  p_unformatted_bytes number;\n  p_unformatted_blocks number;\nbegin\n\
    \  dbms_space.space_usage(\n    segment_owner => user,\n    segment_name => 'INV',\n\
    \    segment_type => 'TABLE',\n    fs1_bytes => p_fs1_bytes,\n    fs1_blocks =>\
    \ p_fs1_blocks,\n    fs2_bytes => p_fs2_bytes,\n    fs2_blocks => p_fs2_blocks,\n\
    \    fs3_bytes => p_fs3_bytes,\n    fs3_blocks => p_fs3_blocks,\n    fs4_bytes\
    \ => p_fs4_bytes,\n    fs4_blocks => p_fs4_blocks,\n    full_bytes => p_full_bytes,\n\
    \    full_blocks => p_full_blocks,\n    unformatted_blocks => p_unformatted_blocks,\n\
    \    unformatted_bytes => p_unformatted_bytes\n  );\n  dbms_output.put_line('FS1:\
    \ blocks = '||p_fs1_blocks);\n  dbms_output.put_line('FS2: blocks = '||p_fs2_blocks);\n\
    \  dbms_output.put_line('FS3: blocks = '||p_fs3_blocks);\n  dbms_output.put_line('FS4:\
    \ blocks = '||p_fs4_blocks);\n  dbms_output.put_line('Full blocks = '||p_full_blocks);\n\
    end;\n/\n```\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\nIn this scenario, you want\
    \ to check the `INV` table for free space below the high-water mark. Here’s the\
    \ output of the previous PL/SQL:\n\n```\nFS1: blocks = 0\nFS2: blocks = 0\nFS3:\
    \ blocks = 0\nFS4: blocks = 1394\nFull blocks = 0\n```\n\nIn the prior output,\
    \ the `FS1` parameter shows that 0 blocks have 0% to 25% free space. The `FS2`\
    \ parameter shows that 0 blocks have 25% to 50% free space. The `FS3` parameter\
    \ shows that 0 blocks have 50% to 75% free space. The `FS4` parameter shows there\
    \ are 1394 blocks that with 75% to 100% free space.\n\nFinally, there are 0 full\
    \ blocks. Because there are no full blocks and a large number of blocks are mostly\
    \ empty, this is an indication that free space exists below the high-water mark.\n\
    \nHow can you reduce a table’s high-water mark? You can use several techniques\
    \ to reset the high-water mark back to zero:\n\n- Use a `TRUNCATE` statement\n\
    - Use `ALTER TABLE ... SHRINK SPACE`\n- Use `ALTER TABLE ... MOVE`\n\nUsing the\
    \ `TRUNCATE` statement was discussed earlier in this chapter. Shrinking a table\
    \ and moving a table are discussed in the following subsections.\n\n### Shrinking\
    \ a Table\n\nTo readjust the high-water mark, you must enable row movement for\
    \ the table and then use the `ALTER TABLE...SHRINK SPACE` statement. The tablespace\
    \ in which the table is created must have been built with automatic segment-space\
    \ management enabled. You can determine the tablespace space-segment management\
    \ type via this query:\n\n```sql\nSQL> select tablespace_name, segment_space_management\
    \ from dba_tablespaces;\n```\n\nThe `SEGMENT_SPACE_MANAGEMENT` value must be `AUTO`\
    \ for the tablespace in which the table is created.\n\nNext, you need to enable\
    \ row movement for the table to be shrunk. This example enables row movement for\
    \ the `INV` table:\n\n```sql\nSQL> alter table inv enable row movement;\n```\n\
    \nNow you can shrink the space used by the table:\n\n```sql\nSQL> alter table\
    \ inv shrink space;\n```\n\nYou can also shrink the space associated with any\
    \ index segments via the `CASCADE` clause:\n\n```sql\nSQL> alter table inv shrink\
    \ space cascade;\n```\n\nIf for some reason you don’t want to move the high-water\
    \ mark when you shrink the table, then use the `COMPACT` clause:\n\n```sql\nSQL>\
    \ alter table inv shrink space compact;\n```\n\n![](index-192_1.png)\n\nCHAPTER\
    \ 7 ■ TABLES AND CONSTRAINTS\n\nHere’s some sample output:\n\n```\nROWID     \
    \         EMP_ID\n------------------ ----------\nAAAFWXAAFAAAAlWAAA 1\n```\n\n\
    The `ROWID` pseudo-column value isn’t physically stored in the database. Oracle\
    \ calculates its value when you query it. The `ROWID` contents are displayed as\
    \ base 64 values that can contain the characters A–Z, a–z, 0–9, +, and /. You\
    \ can translate the `ROWID` value into meaningful information via the `DMBS_ROWID`\
    \ package. For example, to display the relative file number in which a row is\
    \ stored, issue this statement:\n\n```sql\nSQL> select dbms_rowid.rowid_relative_fno(rowid),\
    \ emp_id from emp;\n```\n\nHere’s some sample output:\n\n```\nDBMS_ROWID.ROWID_RELATIVE_FNO(ROWID)\
    \ EMP_ID\n------------------------------------ ----------\n5                 \
    \                   1\n```\n\nYou can use the `ROWID` value in the `SELECT` and\
    \ `WHERE` clauses of a SQL statement. In most cases, the `ROWID` uniquely identifies\
    \ a row. However, it’s possible to have rows in different tables that are stored\
    \ in the same cluster and so contain rows with the same `ROWID`.\n\n### Creating\
    \ a Temporary Table\n\nUse the `CREATE GLOBAL TEMPORARY TABLE` statement to create\
    \ a table that stores data only provisionally. You can specify that the temporary\
    \ table retain the data for a session or until a transaction commits. Use `ON\
    \ COMMIT PRESERVE ROWS` to specify that the data be deleted at the end of the\
    \ user’s session. In this example, the rows will be retained until the user either\
    \ explicitly deletes the data or terminates the session:\n\n```sql\ncreate global\
    \ temporary table today_regs\non commit preserve rows\nas select * from f_registrations\n\
    where create_dtt > sysdate - 1;\n```\n\nSpecify `ON COMMIT DELETE ROWS` to indicate\
    \ that the data should be deleted at the end of the transaction. The following\
    \ example creates a temporary table named `TEMP_OUTPUT` and specifies that records\
    \ should be deleted at the end of each committed transaction:\n\n```sql\ncreate\
    \ global temporary table temp_output(\n  temp_row varchar2(30))\non commit delete\
    \ rows;\n```\n\n**Note:** If you don’t specify a commit method for a global temporary\
    \ table, then the default is `ON COMMIT DELETE ROWS`.\n\n![](index-194_1.png)\n\
    \nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\n### Creating an Index-Organized Table\n\
    \nIndex-organized tables (IOTs) are efficient objects when the table data is typically\
    \ accessed through querying on the primary key. Use the `ORGANIZATION INDEX` clause\
    \ to create an IOT:\n\n```sql\ncreate table prod_sku\n(prod_sku_id number,\n sku\
    \ varchar2(256),\n create_dtt timestamp(5),\n constraint prod_sku_pk primary key(prod_sku_id)\n\
    )\norganization index\nincluding sku\npctthreshold 30\ntablespace inv_mgmt_data\n\
    overflow\ntablespace mts;\n```\n\nAn IOT stores the entire contents of the table’s\
    \ row in a B-tree index structure. IOTs provide fast access for queries that have\
    \ exact matches and/or range searches on the primary key.\n\nAll columns specified\
    \ up to and including the column specified in the `INCLUDING` clause are stored\
    \ in the same block as the `PROD_SKU_ID` primary-key column. In other words, the\
    \ `INCLUDING` clause specifies the last column to keep in the table segment. Columns\
    \ listed after the column specified in the `INCLUDING` clause are stored in the\
    \ overflow data segment. In the previous example, the `CREATE_DTT` column is stored\
    \ in the overflow segment.\n\n`PCTTHRESHOLD` specifies the percentage of space\
    \ reserved in the index block for the IOT row. This value can be from 1 to 50,\
    \ and defaults to 50 if no value is specified. There must be enough space in the\
    \ index block to store the primary key.\n\nThe `OVERFLOW` clause details which\
    \ tablespace should be used to store overflow data segments.\n\nNotice that `DBA/ALL/USER_TABLES`\
    \ includes an entry for the table name used when creating an IOT. Additionally,\
    \ `DBA/ALL/USER_INDEXES` contains a record with the name of the primary-key constraint\
    \ specified. The `INDEX_TYPE` column contains a value of `IOT - TOP` for IOTs:\n\
    \n```sql\nSQL> select index_name,table_name,index_type from user_indexes;\n```\n\
    \n## Managing Constraints\n\nThe next several sections in this chapter deal with\
    \ constraints. Constraints provide a mechanism to ensure that data conforms to\
    \ certain business rules. You must be aware of what types of constraints are available\
    \ and when it’s appropriate to use them. Oracle provides several types of constraints:\n\
    \n- Primary key\n- Unique key\n- Foreign key\n- Check\n- `NOT NULL`\n\nImplementing\
    \ and managing these constraints are discussed in the next several subsections.\n\
    \nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\n### Creating Primary-Key Constraints\n\
    \nWhen you implement a database, most tables you create require a primary-key\
    \ constraint to guarantee that every record in the table can be uniquely identified.\
    \ There are multiple techniques for adding a primary-key constraint to a table.\
    \ The first example creates the primary key inline with the column definition:\n\
    \n```sql\ncreate table dept(\n  dept_id number primary key\n  ,dept_desc varchar2(30));\n\
    ```\n\nIf you select the `CONSTRAINT_NAME` from `USER_CONSTRAINTS`, notice that\
    \ Oracle generates a cryptic name for the constraint (something like `SYS_C003682`).\
    \ Use the following syntax to explicitly give a name to a primary-key constraint:\n\
    \n```sql\ncreate table dept(\n  dept_id number constraint dept_pk primary key\
    \ using index tablespace users,\n  dept_desc varchar2(30));\n```\n\n**Note:**\
    \ When you create a primary-key constraint, Oracle also creates a unique index\
    \ with the same name as the constraint.\n\nYou can also specify the primary-key\
    \ constraint definition after the columns have been defined. The advantage of\
    \ doing this is that you can define the constraint on multiple columns. The next\
    \ example creates the primary key when the table is created, but not inline with\
    \ the column definition:\n\n```sql\ncreate table dept(\n  dept_id number,\n  dept_desc\
    \ varchar2(30),\n  constraint dept_pk primary key (dept_id)\n    using index tablespace\
    \ prod_index);\n```\n\nIf the table has already been created and you want to add\
    \ a primary-key constraint, use the `ALTER TABLE` statement. This example places\
    \ a primary-key constraint on the `DEPT_ID` column of the `DEPT` table:\n\n```sql\n\
    alter table dept\nadd constraint dept_pk primary key (dept_id)\nusing index tablespace\
    \ users;\n```\n\nWhen a primary-key constraint is enabled, Oracle automatically\
    \ creates a unique index associated with the primary-key constraint. Some DBAs\
    \ prefer to first create a non-unique index on the primary-key column and then\
    \ define the primary-key constraint:\n\n```sql\nSQL> create index dept_pk on dept(dept_id);\n\
    SQL> alter table dept add constraint dept_pk primary key (dept_id);\n```\n\nThe\
    \ advantage of this approach is that you can drop or disable the primary-key constraint\
    \ independently of the index. When you’re working with large data sets, you may\
    \ want that sort of flexibility. If you don’t create the index before creating\
    \ the primary-key constraint, then whenever you drop or disable the primary-key\
    \ constraint, the index is automatically dropped.\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\
    \nConfused about which method to use to create a primary key? All of the methods\
    \ are valid and have their merits. Table 7–4 summarizes the primary-key and unique-key\
    \ constraint creation methods. I’ve used all these methods to create primary-key\
    \ constraints. Usually, I use the `ALTER TABLE` statement that adds the constraint\
    \ after the table has been created.\n\n***Table 7–4.** Primary-Key and Unique-Key\
    \ Constraint Creation Methods*\n\n| **Constraint Creation Method**           \
    \                   | **Advantages**                                      | **Disadvantages**\
    \                                                                 |\n| :----------------------------------------------------------\
    \ | :-------------------------------------------------- | :--------------------------------------------------------------------------------\
    \ |\n| Inline, no name                                             | Very simple\
    \                                         | Oracle-generated name makes troubleshooting\
    \ harder; less control over storage attributes; only applied to a single column\
    \ |\n| Inline, with name                                           | Simple; user-defined\
    \ name makes troubleshooting easier | Requires more thought than inline without\
    \ name                                     |\n| Inline, with name and tablespace\
    \ definition                 | User-defined name and tablespace; makes troubleshooting\
    \ easier | Less simple                                                       \
    \                |\n| After column definition (out of line)                  \
    \     | User-defined name and tablespace; can operate on multiple columns | Less\
    \ simple                                                                     \
    \  |\n| `ALTER TABLE` add just constraint                           | Lets you\
    \ manage constraints in separate statements (and files) from table creation scripts;\
    \ can operate on multiple columns | More complicated                         \
    \                                         |\n| `CREATE INDEX`, `ALTER TABLE` add\
    \ constraint                | Separates the index and constraint so you can drop/disable\
    \ constraints without affecting the index; can operate on multiple columns | Most\
    \ complicated, more to maintain, more moving parts                           \
    \  |\n\n### Enforcing Unique Key Values\n\nIn addition to creating a primary-key\
    \ constraint, you should also create unique constraints on any combination of\
    \ columns that should always be unique within a table. For example, for the primary\
    \ key for a table, it’s common to use a numeric key (sometimes called a *surrogate\
    \ key*) that is populated via a sequence. In addition to the surrogate primary\
    \ key, sometimes users have column(s) that the business uses to uniquely identify\
    \ a record (also called a *logical key*). Using both a surrogate key and logical\
    \ key\n\n- Lets you efficiently join parent and child tables on a single numeric\
    \ column\n- Allows updates to logical-key columns without changing the surrogate\
    \ key\n\nA unique key guarantees uniqueness on the defined column(s) within a\
    \ table. There are some subtle differences between primary-key and unique-key\
    \ constraints. For example, you can define only one\n\n163\n\nCHAPTER 7 ■ TABLES\
    \ AND CONSTRAINTS\n\nprimary key per table, but there can be several unique keys.\
    \ Also, a primary key doesn’t allow a `NULL` value in any of its columns, whereas\
    \ a unique key allows `NULL` values.\n\nAs with the primary-key constraint, you\
    \ can use several methods to create a unique column constraint. This method uses\
    \ the `UNIQUE` keyword inline with the column:\n\n```sql\ncreate table dept(\n\
    \  dept_id number\n  ,dept_desc varchar2(30) unique);\n```\n\nIf you want to explicitly\
    \ name the constraint, use the `CONSTRAINT` keyword:\n\n```sql\ncreate table dept(\n\
    \  dept_id number\n  ,dept_desc varchar2(30) constraint dept_desc_uk1 unique);\n\
    ```\n\nAs with primary keys, Oracle automatically creates an index associated\
    \ with the unique-key constraint. You can specify the tablespace information inline\
    \ to be used for the associated unique index:\n\n```sql\ncreate table dept(\n\
    \  dept_id number\n  ,dept_desc varchar2(30) constraint dept_desc_uk1\n    unique\
    \ using index tablespace prod_index);\n```\n\nYou can also alter a table to include\
    \ a unique constraint:\n\n```sql\nSQL> alter table dept add constraint dept_desc_uk1\
    \ unique (dept_desc);\n```\n\nAnd you can create an index on the columns of interest\
    \ before you define a unique-key constraint:\n\n```sql\nSQL> create index dept_desc_uk1\
    \ on dept(dept_desc);\nSQL> alter table dept add constraint dept_desc_uk1 unique(dept_desc);\n\
    ```\n\nThis can be helpful when you’re working with large data sets and you want\
    \ to be able to disable or drop the unique constraint without dropping the associated\
    \ index.\n\n**Note:** See Table 7–4 for a description of the advantages and disadvantages\
    \ of the various unique-key and primary-key constraint creation methods.\n\n###\
    \ Creating Foreign-key Constraints\n\nForeign-key constraints are used to ensure\
    \ that a column value is contained within a defined list of values. Using a foreign-key\
    \ constraint is an efficient way of enforcing that data must be a predefined value\
    \ before an insert or update is allowed. This technique works well for the following\
    \ scenarios:\n\n- The list of values contains many entries.\n- Other information\
    \ about the lookup value needs to be stored.\n- It’s easy to select, insert, update,\
    \ or delete values via SQL.\n\nFor example, suppose the `EMP` table is created\
    \ with a `DEPT_ID` column. To ensure that each employee is assigned a valid department,\
    \ you can create a foreign-key constraint that enforces the rule that each `DEPT_ID`\
    \ in the `EMP` table must exist in the `DEPT` table.\n\nCHAPTER 7 ■ TABLES AND\
    \ CONSTRAINTS\n\n**Tip:** If the condition you want to check for is a small list\
    \ that doesn’t change very often, consider using a check constraint instead of\
    \ a foreign-key constraint. For example, if you have a column that will always\
    \ be defined to contain either a 0 or a 1, a check constraint is an efficient\
    \ solution.\n\nYou can use several methods to create a foreign-key constraint.\
    \ The following example creates a foreign-key constraint on the `DEPT_ID` column\
    \ in the `EMP` table:\n\n```sql\ncreate table emp(\n  emp_id number,\n  name varchar2(30),\n\
    \  dept_id constraint emp_dept_fk references dept(dept_id));\n```\n\nNotice that\
    \ the `DEPT_ID` data type isn’t explicitly defined. It derives the data type from\
    \ the referenced `DEPT_ID` column of the `DEPT` table. You can also explicitly\
    \ specify the data type when you define a column (regardless of the foreign-key\
    \ definition):\n\n```sql\ncreate table emp(\n  emp_id number,\n  name varchar2(30),\n\
    \  dept_id number constraint emp_dept_fk references dept(dept_id));\n```\n\nYou\
    \ can also specify the foreign-key definition out of line from the column definition\
    \ in the `CREATE TABLE` statement:\n\n```sql\ncreate table emp(\n  emp_id number,\n\
    \  name varchar2(30),\n  dept_id number,\n  constraint emp_dept_fk foreign key\
    \ (dept_id) references dept(dept_id)\n);\n```\n\nAnd you can alter an existing\
    \ table to add a foreign-key constraint:\n\n```sql\nalter table emp\nadd constraint\
    \ emp_dept_fk foreign key (dept_id)\nreferences dept(dept_id);\n```\n\n**Note:**\
    \ Unlike with primary-key and unique-key constraints, Oracle doesn’t automatically\
    \ add an index to the foreign-key column(s). You must explicitly create indexes\
    \ on foreign-key columns.\n\n### Checking for Specific Data Conditions\n\nA check\
    \ constraint works well for lookups when you have a short list of fairly static\
    \ values, such as a column that can be either `Y` or `N`. In this situation, the\
    \ list of values most likely won’t change, and no other information needs to be\
    \ stored other than `Y` or `N`, so a check constraint is the appropriate solution.\n\
    \nIf you have a long list of values that needs to be periodically updated, then\
    \ a table and a foreign-key constraint are a better solution.\n\nCHAPTER 7 ■ TABLES\
    \ AND CONSTRAINTS\n\nAlso, a check constraint works well for a business rule that\
    \ must always be enforced and can be written with a simple SQL expression. If\
    \ you have sophisticated business logic that must be validated, then the application\
    \ code is more appropriate.\n\nYou can define a check constraint when you create\
    \ a table. The following defines that the `ST_FLG` column must be either 0 or\
    \ 1:\n\n```sql\ncreate table emp(\n  emp_id number,\n  emp_name varchar2(30),\n\
    \  st_flg number(1) CHECK (st_flg in (0,1))\n);\n```\n\nA slightly better method\
    \ is to give the check constraint a name:\n\n```sql\ncreate table emp(\n  emp_id\
    \ number,\n  emp_name varchar2(30),\n  st_flg number(1) constraint st_flg_chk\
    \ CHECK (st_flg in (0,1))\n);\n```\n\nA more descriptive way to name the constraint\
    \ is to embed information in the constraint name that describes the condition\
    \ that was violated. For example:\n\n```sql\nCREATE table emp(\n  emp_id number,\n\
    \  emp_name varchar2(30),\n  st_flg number(1) constraint \"st_flg must be 0 or\
    \ 1\" check (st_flg in (0,1))\n);\n```\n\nYou can also alter an existing column\
    \ to include a constraint. The column must not contain any values that violate\
    \ the constraint being enabled:\n\n```sql\nSQL> alter table emp add constraint\
    \ \"st_flg must be 0 or 1\" check (st_flg in (0,1));\n```\n\n**Note:** The check\
    \ constraint must evaluate to a true or unknown (`NULL`) value in the row being\
    \ inserted or updated. You can’t use subqueries or sequences in a check constraint.\
    \ Also, you can’t reference the SQL functions `UID`, `USER`, `SYSDATE`, and `USERENV`,\
    \ or the pseudo-columns `LEVEL` or `ROWNUM`.\n\n### Enforcing Not Null Conditions\n\
    \nAnother common condition to check for is whether a column is null; you use the\
    \ `NOT NULL` constraint to do this. The `NOT NULL` constraint can be defined in\
    \ several ways. The simplest technique is shown here:\n\n```sql\ncreate table\
    \ emp(\n  emp_id number,\n  emp_name varchar2(30) not null);\n```\n\nA slightly\
    \ better approach is to give the `NOT NULL` constraint a name that makes sense\
    \ to you:\n\n```sql\ncreate table emp(\n  emp_id number,\n  emp_name varchar2(30)\
    \ constraint emp_name_nn not null);\n```\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\
    \nUse the `ALTER TABLE` command if you need to modify a column for an existing\
    \ table. For the following command to work, there must not be any `NULL` values\
    \ in the column being defined as `NOT NULL`:\n\n```sql\nSQL> alter table emp modify(emp_name\
    \ not null);\n```\n\n**Note:** If there are currently `NULL` values in a column\
    \ that is being defined as `NOT NULL`, you must first update the table so that\
    \ the column has a value in every row.\n\n### Disabling Constraints\n\nOne nice\
    \ feature of Oracle is that you can disable and enable constraints without dropping\
    \ and recreating them. This means you avoid having to know the DDL statements\
    \ that would be required to recreate the dropped constraints.\n\nOccasionally,\
    \ you need to disable constraints. For example, you may be trying to truncate\
    \ a table but receive the following error message:\n\n```\nORA-02266: unique/primary\
    \ keys in table referenced by enabled foreign keys\n```\n\nOracle doesn’t allow\
    \ a truncate operation on a parent table with a primary key that is referenced\
    \ by an enabled foreign key in a child table. If you need to truncate a parent\
    \ table, you first have to disable all of the enabled foreign-key constraints\
    \ that reference the parent table’s primary key. Run this query to determine the\
    \ names of the constraints that need to be disabled:\n\n```sql\nselect\n  b.table_name\
    \ primary_key_table\n  ,a.table_name fk_child_table\n  ,a.constraint_name fk_child_table_constraint\n\
    from dba_constraints a\n  ,dba_constraints b\nwhere a.r_constraint_name = b.constraint_name\n\
    \  and a.r_owner = b.owner\n  and a.constraint_type = 'R'\n  and b.owner = upper('&table_owner')\n\
    \  and b.table_name = upper('&table_name');\n```\n\nFor this example, there is\
    \ only one foreign-key dependency:\n\n```\nPRIMARY_KEY_TABLE    FK_CHILD_TABLE\
    \       FK_CHILD_TABLE_CONST\n-------------------- -------------------- --------------------\n\
    D_DATES              F_SALES              F_SALES_FK1\n```\n\nUse the `ALTER TABLE`\
    \ statement to disable constraints on a table. In this case, there is only one\
    \ foreign key to disable:\n\n```sql\nSQL> alter table f_sales disable constraint\
    \ f_sales_fk1;\n```\n\nYou can now truncate the parent table:\n\n```sql\nSQL>\
    \ truncate table d_dates;\n```\n\nDon’t forget to re-enable the foreign-key constraints\
    \ after the truncate operation has completed, like this:\n\nCHAPTER 7 ■ TABLES\
    \ AND CONSTRAINTS\n\n```sql\nSQL> alter table f_sales enable constraint f_sales_fk1;\n\
    ```\n\nYou can disable a primary key and all dependent foreign-key constraints\
    \ with the `CASCADE` option of the `DISABLE` clause. For example, the next line\
    \ of code disables all foreign-key constraints related to the `D_DATES_PK` primary-key\
    \ constraint:\n\n```sql\nSQL> alter table d_dates disable constraint d_dates_pk\
    \ cascade;\n```\n\nThis statement doesn’t cascade through all levels of dependencies;\
    \ it only disables the foreign-key constraints directly dependent on `D_DATES_PK`.\
    \ Also keep in mind that there is no `ENABLE...CASCADE` statement. To re-enable\
    \ the constraints, you have to query the data dictionary to determine which constraints\
    \ have been disabled and then re-enable them individually.\n\nSometimes you run\
    \ into situations when loading data where it’s convenient to disable all the foreign\
    \ keys before loading data (perhaps from a schema-level import using the `imp`\
    \ utility). In these situations, the `imp` utility imports the tables in alphabetical\
    \ order and doesn’t ensure that child tables are imported before parent tables.\
    \ You may also want to run several import jobs in parallel to take advantage of\
    \ parallel hardware. In such scenarios, you can disable the foreign keys, perform\
    \ the import, and then re-enable the foreign keys.\n\nHere’s a script that uses\
    \ SQL to generate SQL to disable all foreign-key constraints for a user:\n\n```sql\n\
    set lines 132 trimsp on head off feed off verify off echo off pagesize 0\nspo\
    \ dis_dyn.sql\nselect 'alter table ' || a.table_name\n  || ' disable constraint\
    \ ' || a.constraint_name || ';'\nfrom dba_constraints a\n  ,dba_constraints b\n\
    where a.r_constraint_name = b.constraint_name\n  and a.r_owner = b.owner\n  and\
    \ a.constraint_type = 'R'\n  and b.owner = upper('&table_owner');\nspo off;\n\
    ```\n\nThis script generates a file named `dis_dyn.sql` that contains the SQL\
    \ statements to disable all the foreign-key constraints for a user.\n\n### Enabling\
    \ Constraints\n\nThis section contains a few scripts to help you enable constraints\
    \ that you’ve disabled. Listed next is a script that creates a file with the SQL\
    \ statements required to re-enable any foreign-key constraints for tables owned\
    \ by a specified user:\n\n```sql\nset lines 132 trimsp on head off feed off verify\
    \ off echo off pagesize 0\nspo enable_dyn.sql\nselect 'alter table ' || a.table_name\n\
    \  || ' enable constraint ' || a.constraint_name || ';'\nfrom dba_constraints\
    \ a\n  ,dba_constraints b\nwhere a.r_constraint_name = b.constraint_name\n  and\
    \ a.r_owner = b.owner\n  and a.constraint_type = 'R'\n  and b.owner = upper('&table_owner');\n\
    spo off;\n```\n\nWhen enabling constraints, by default Oracle checks to ensure\
    \ that the data doesn’t violate the constraint definition. If you’re fairly certain\
    \ that the data integrity is fine and that you don’t need to\n\n168\n\nCHAPTER\
    \ 7 ■ TABLES AND CONSTRAINTS\n\nincur the performance hit by revalidating the\
    \ constraint, you can use the `NOVALIDATE` clause when re-enabling the constraints.\
    \ Here’s an example:\n\n```sql\nselect 'alter table ' || a.table_name\n  || '\
    \ modify constraint ' || a.constraint_name || ' enable novalidate;'\nfrom dba_constraints\
    \ a\n  ,dba_constraints b\nwhere a.r_constraint_name = b.constraint_name\n  and\
    \ a.r_owner = b.owner\n  and a.constraint_type = 'R'\n  and b.owner = upper('&table_owner');\n\
    ```\n\nThe `NOVALIDATE` clause instructs Oracle not to validate the constraints\
    \ being enabled, but it does enforce that any new DML activities adhere to the\
    \ constraint definition.\n\nIn multiuser systems, the possibility exists that\
    \ another session has inserted data into the child table while the foreign-key\
    \ constraint was disabled. If that happens, you see the following error when you\
    \ attempt to re-enable the foreign key:\n\n```\nORA-02298: cannot validate (<owner>.<constraint>)\
    \ - parent keys not found\n```\n\nIn this scenario, you can use the `ENABLE NOVALIDATE`\
    \ clause:\n\n```sql\nSQL> alter table f_sales enable novalidate constraint f_sales_fk1;\n\
    ```\n\nTo clean up the rows that violate the constraint, first ensure that you\
    \ have an `EXCEPTIONS` table created in your user. If you don’t have an `EXCEPTIONS`\
    \ table, use this script to create one:\n\n```sql\nSQL> @?/rdbms/admin/utlexcpt.sql\n\
    ```\n\nNext, populate the `EXCEPTIONS` table with the rows that violate the constraint,\
    \ using the `EXCEPTIONS INTO` clause:\n\n```sql\nSQL> alter table f_sales modify\
    \ constraint f_sales_fk1 validate\n  exceptions into exceptions;\n```\n\nThis\
    \ statement still throws the `ORA-02298` error as long as there are rows that\
    \ violate the constraint. The statement also inserts records into the `EXCEPTIONS`\
    \ table for any bad rows. You can now use the `ROW_ID` column of the `EXCEPTIONS`\
    \ table to remove any records that violate the constraint.\n\nHere you see that\
    \ one row needs to be removed from the `F_SALES` table:\n\n```sql\nSQL> select\
    \ * from exceptions;\nROW_ID              OWNER      TABLE_NAME   CONSTRAINT\n\
    ------------------ ---------- ------------ ---------------\nAAAFVmAAFAAAAihAAA\
    \ INV_MMGT   F_SALES      F_SALES_FK1\n```\n\nTo remove the offending record,\
    \ issue a `DELETE` statement:\n\n```sql\nSQL> delete from f_sales where rowid\
    \ = 'AAAFVmAAFAAAAihAAA';\n```\n\nIf the `EXCEPTIONS` table contains many records,\
    \ you can run a query such as the following to delete by `OWNER` and `TABLE_NAME`:\n\
    \n```sql\ndelete from f_sales where rowid in\n(select row_id\nfrom exceptions\n\
    where owner=upper('&owner') and table_name = upper('&table_name'));\n```\n\nYou\
    \ may also run into situations where you need to disable primary-key or unique-key\
    \ constraints.\n\nFor example, you may want to perform a large data load, and\
    \ for performance reasons want to disable\n\n169\n\nCHAPTER 7 ■ TABLES AND CONSTRAINTS\n\
    \nthe primary-key and unique-key constraints. You don’t want to incur the overhead\
    \ of having every row checked as it’s inserted.\n\nThe same general techniques\
    \ used for disabling foreign keys are applicable for disabling primary or unique\
    \ keys. Run this query to display the primary-key and unique-key constraints for\
    \ a user:\n\n```sql\nselect\n  a.table_name\n  ,a.constraint_name\n  ,a.constraint_type\n\
    from dba_constraints a\nwhere a.owner = upper('&table_owner')\n  and a.constraint_type\
    \ in ('P','U')\norder by a.table_name;\n```\n\nHere’s some sample output:\n\n\
    ```\nTABLE_NAME                     CONSTRAINT_NAME                C\n------------------------------\
    \ ------------------------------ -\nDEPT                           SYS_C006507\
    \                    P\nD_DATES                        D_DATES_UK1           \
    \         U\nD_DATES                        D_DATES_PK                     P\n\
    ```\n\nWhen the table name and constraint name are identified, use the `ALTER\
    \ TABLE` statement to disable the constraint:\n\n```sql\nSQL> alter table d_dates\
    \ disable constraint d_dates_pk;\n```\n\n**Note:** Oracle doesn’t let you disable\
    \ a primary-key or unique-key constraint that is referenced in an enabled foreign-key\
    \ constraint. You first have to disable the foreign-key constraint.\n\n## Summary\n\
    \nThis chapter focused on basic activities related to creating and maintaining\
    \ tables. Tables are the containers that store the data within the database. Key\
    \ table-management tasks include modifying, moving, deleting from, shrinking,\
    \ and dropping. You must also be familiar with how to implement and use special\
    \ table types such as temporary, index-organized, and read-only.\n\nOracle also\
    \ provides various constraints to help you manage the data within tables. Constraints\
    \ form the bedrock of data integrity. In most cases, each table should include\
    \ a primary-key constraint that ensures that every row is uniquely identifiable.\
    \ Additionally, any parent/child relationships should be enforced with foreign-key\
    \ constraints. You can use unique constraints to implement business rules that\
    \ require a column or combination of columns to be unique. Check and `NOT NULL`\
    \ constraints ensure that columns contain business-specified data requirements.\n\
    \nAfter you create tables, the next logical activity is to create indexes where\
    \ appropriate. Indexes are optional database objects that help improve performance.\
    \ Index-creation and -maintenance tasks are covered in the next chapter.\n\n![](index-205_1.png)\n\
    \nCHAPTER 8 ■ INDEXES\n\nmust be sure that the statements that are improved warrant\
    \ the penalty being applied to other statements.\n\nYou should only add an index\
    \ when you’re certain it will improve performance. And after an index is implemented,\
    \ you should monitor it to ensure that the Oracle optimizer is using it to speed\
    \ up queries.\n\n## What to Think About\n\nOracle provides a wide assortment of\
    \ indexing features and options. As a DBA or a developer, you need to be aware\
    \ of the various features and how to utilize them. If you choose the wrong type\
    \ of index or use a feature incorrectly, there may be serious detrimental performance\
    \ implications. Listed next are aspects to consider before you create an index:\n\
    \n- Type of index\n- Table column(s) to include\n- Whether to use a single column\
    \ or a combination of columns\n- Special features such as the `PARALLEL` clause,\
    \ `NOLOGGING`, compression, invisible indexes, and so on\n- Uniqueness\n- Naming\
    \ conventions\n- Tablespace placement\n- Initial sizing requirements and growth\n\
    - Impact on performance of `SELECT` statements (improvement)\n- Impact on performance\
    \ of `INSERT`, `UPDATE`, and `DELETE` statements\n- Global or local index, if\
    \ the underlying table is partitioned\n\nWhen you create an index you should give\
    \ some thought to every aspect mentioned in the previous list. One of the first\
    \ decisions you need to make is the type of index and the columns to include.\
    \ Oracle provides a robust variety of index types. For most scenarios, you can\
    \ use the default B-tree (balanced tree) index type. Other commonly used types\
    \ are bitmap and function-based indexes. Table 8–1 describes the types of indexes\
    \ available with Oracle.\n\nCHAPTER 8 ■ INDEXES\n\n***Table 8–1.** Oracle Index\
    \ Type Descriptions*\n\n| **Index Type**        | **Usage**                  \
    \                                                                            \
    \ |\n| :-------------------- | :------------------------------------------------------------------------------------------------------\
    \ |\n| B-tree                | Default, balanced tree index, good for high-cardinality\
    \ columns.                                         |\n| B-tree cluster       \
    \ | Used with clustered tables.                                              \
    \                               |\n| Hash cluster          | Used with hash clusters.\
    \                                                                            \
    \    |\n| Function              | Good for columns that have SQL functions applied\
    \ to them.                                               |\n| Global partitioned\
    \    | Global index across all partitions in a partitioned table.            \
    \                                  |\n| Local partitioned     | Local index based\
    \ on individual partitions in a partitioned table.                           \
    \           |\n| Reverse key           | Useful to balance I/O in an index that\
    \ has many sequential inserts.                                     |\n| Key compressed\
    \        | Useful for concatenated indexes where the leading column is often repeated.\
    \ Compresses leaf block entries. |\n| Bitmap                | Useful in data-warehouse\
    \ environments with low-cardinality columns. These indexes aren’t appropriate\
    \ for online transaction processing (OLTP) databases where rows are heavily updated.\
    \ |\n| Bitmap join           | Useful in data-warehouse environments for queries\
    \ that join fact and dimension tables.                  |\n| Domain          \
    \      | Specific for an application or cartridge.                           \
    \                                    |\n\nThis chapter focuses on the most commonly\
    \ used indexes and features: B-tree, bitmap, reverse-key, and function-based indexes,\
    \ and useful options. Partitioned indexes are covered in Chapter 12. If you need\
    \ more information about index types or features not covered in this chapter or\
    \ book, see Oracle’s SQL Reference guide at http://otn.oracle.com.\n\n## Index-Management\
    \ Guidelines\n\nMisusing indexes can have serious negative performance effects.\
    \ Indexes created of the wrong type or on the wrong columns do nothing but consume\
    \ space and processing resources. As a DBA, you must have a strategy to ensure\
    \ that indexes enhance performance and don’t negatively impact applications.\n\
    \nCHAPTER 8 ■ INDEXES\n\nTable 8–2 encapsulates many of the index-management concepts\
    \ covered in this chapter. These recommendations aren’t written in stone: adapt\
    \ and modify them as needed for your environment.\n\n***Table 8–2.** Index-Creation\
    \ and -Maintenance Guidelines*\n\n| **Guideline**                            \
    \                                     | **Reasoning**                        \
    \                                                                            \
    \                                                                            \
    \                 |\n| :----------------------------------------------------------------------------\
    \ | :------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------\
    \ |\n| Add indexes judiciously. Test first to determine quantifiable performance\
    \ gains. | Indexes consume disk space and processing resources. Don’t add indexes\
    \ unnecessarily.                                                             \
    \                                                             |\n| Use the correct\
    \ type of index.                                                | Correct index\
    \ usage maximizes performance. See Table 8–1 for more details.               \
    \                                                                            \
    \                                          |\n| Use a separate tablespace(s) for\
    \ indexes (separate from tablespaces used for tables). | Table and index data\
    \ may have different storage and/or backup and recovery requirements. Using separate\
    \ tablespaces lets you manage indexes separately from tables.                \
    \                           |\n| When creating primary-key constraints or unique-key\
    \ constraints, specify the tablespace for the index. | Doing this separates the\
    \ table and index data, which may have different storage and/or backup and recovery\
    \ requirements.                                                              \
    \                       |\n| Let the index inherit its storage properties from\
    \ the tablespace.              | This makes it easier to manage and maintain index\
    \ storage.                                                                   \
    \                                                                            \
    \    |\n| Use consistent naming standards.                                   \
    \           | This makes maintenance and troubleshooting easier.             \
    \                                                                            \
    \                                                                  |\n| Don’t\
    \ rebuild indexes unless you have a solid reason to do so.                 | Rebuilding\
    \ indexes is generally unnecessary unless an index is corrupt or you want to move\
    \ an index to different tablespace.                                          \
    \                                        |\n| Monitor your indexes, and drop indexes\
    \ that aren’t used.                       | Doing this frees up physical space\
    \ and improves the performance of Data Manipulation Language (DML) statements.\
    \                                                                            \
    \                   |\n| Before dropping an index, consider marking it as unusable\
    \ or invisible.        | This allows you to better determine if there are any\
    \ performance issues before you drop the index. These options let you rebuild\
    \ or re-enable the index without requiring the Data Definition Language (DDL)\
    \ creation statement. |\n| Create indexes on foreign-key columns.            \
    \                            | Foreign-key columns are usually included in the\
    \ `WHERE` clause when joining tables and thus improve performance of SQL `SELECT`\
    \ statements. This can also improve performance when you’re deleting a parent\
    \ row and Oracle needs to look for any records in a child table. |\n\nCHAPTER\
    \ 8 ■ INDEXES\n\nRefer to these guidelines as you create and manage indexes in\
    \ your databases. These recommendations are intended to help you correctly use\
    \ index technology.\n\n## Creating Indexes\n\nWhen you think about creating tables,\
    \ you must think about the corresponding index architecture. Creating the appropriate\
    \ indexes and using the correct index features usually results in dramatic performance\
    \ improvements. Likewise, creating indexes on the wrong columns or using the features\
    \ in the wrong situations can cause dramatic performance degradation.\n\nAs a\
    \ DBA, you need to be aware of the types of indexes available with Oracle and\
    \ when to use them. Creating indexes and implementing specific features are discussed\
    \ in the next several subsections. The B-tree index is the most used and default\
    \ index type and therefore is first in line.\n\n### Creating B-tree Indexes\n\n\
    The default index type in Oracle is a B-tree (balanced tree) index. To create\
    \ a B-tree index on an existing table, use the `CREATE INDEX` statement. This\
    \ example creates an index on the `D_SOURCES` table, specifying `D_SOURCE_ID`\
    \ as the column:\n\n```sql\nSQL> create index d_sources_idx1 on d_sources(d_source_id);\n\
    ```\n\nBy default, Oracle tries to create an index in your default tablespace.\
    \ Sometimes that may be the desired behavior. But often, for manageability reasons,\
    \ you want to create the index in a specific tablespace. Use the following syntax\
    \ to instruct Oracle to build an index in a specific tablespace:\n\n```sql\nSQL>\
    \ create index d_sources_idx1 on d_sources(d_source_id) tablespace dim_index;\n\
    ```\n\n**Tip:** If you don’t specify any physical storage properties for an index,\
    \ the index inherits its properties from the tablespace in which it’s created.\
    \ This is usually an acceptable method for managing index storage.\n\nFigure 8–1\
    \ shows the balanced, tree-like structure of a B-tree index created on a first-name\
    \ column.\n\nThis type of index has a hierarchical tree structure. When Oracle\
    \ accesses the index, it starts with the top node called the root (or header)\
    \ block. It uses this block to determine which second-level block (often referred\
    \ to as a branch block) to read next. The second-level block points to several\
    \ third-level leaf nodes that contain a `ROWID` and the name value. In this structure,\
    \ it will take three I/O operations to find the `ROWID`. Once the `ROWID` is determined,\
    \ Oracle will use it to read the table block that contains the `ROWID`.\n\nCHAPTER\
    \ 8 ■ INDEXES\n\n***Figure 8–1.** Oracle B-tree hierarchical index structure*\n\
    \nThe index definition is associated with a table and column(s). The index structure\
    \ stores a mapping of a row’s `ROWID` and the column data on which the index is\
    \ built. A `ROWID` usually uniquely identifies a row within a database and contains\
    \ information to physically locate a row (datafile, block, and row position within\
    \ block).\n\n### Creating Concatenated Indexes\n\nOracle allows you to create\
    \ an index that contains more than one column. Multicolumn indexes are known as\
    \ *concatenated indexes*. These indexes are especially effective when you often\
    \ use multiple columns in the `WHERE` clause when accessing a table.\n\nFor the\
    \ examples in this section, the underlying table is created as follows:\n\n```sql\n\
    create table inv(\n  inv_name varchar2(30)\n  ,cust_name varchar2(30));\n```\n\
    \nNow, suppose you have this scenario, where two columns from the same table are\
    \ used in the `WHERE` clause:\n\n```sql\nSQL> select cust_name from inv where\
    \ inv_name='Mouse' and cust_name='Bob';\n```\n\nBecause both `INV_NAME` and `CUST_NAME`\
    \ are often used in `WHERE` clauses for retrieving data, it may be efficient to\
    \ create a concatenated index on the two columns:\n\n```sql\nSQL> create index\
    \ inv_idx3 on inv(inv_name, cust_name);\n```\n\nOften, it’s not clear whether\
    \ a concatenated index is more efficient than a single-column index. For the previous\
    \ SQL statement, you may wonder whether it’s more efficient to create two single-column\
    \ index on `INV_NAME` and `CUST_NAME`, such as\n\n```sql\nSQL> create index idx1\
    \ on inv(inv_name);\nSQL> create index idx2 on inv(cust_name);\n```\n\nHowever,\
    \ if you’re consistently selecting the columns that appear in the `WHERE` clause,\
    \ then the optimizer will most likely use the concatenated index and not use the\
    \ single-column indexes. Using a\n\n176\n\nCHAPTER 8 ■ INDEXES\n\nconcatenated\
    \ index in these situations is usually much more efficient. You can verify that\
    \ the optimizer chooses the concatenated index by generating an explain plan.\
    \ For example:\n\n```sql\nSQL> set autotrace trace explain;\nSQL> select cust_name\
    \ from inv where inv_name='Mouse' and cust_name='Bob';\n```\n\nHere’s some sample\
    \ output indicating that the optimizer uses the concatenated index on `INV_IDX3`\
    \ to retrieve data:\n\n```\n| Id | Operation         | Name     | Rows | Bytes\
    \ | Cost (%CPU)| Time     |\n|----|-------------------|----------|------|-------|------------|----------|\n\
    |  0 | SELECT STATEMENT  |          |    1 |    34 |      1 (0)| 00:00:01 |\n\
    |* 1 |  INDEX RANGE SCAN | INV_IDX3 |    1 |    34 |      1 (0)| 00:00:01 |\n\
    ```\n\nIn older versions of Oracle (circa v8), the optimizer would use a concatenated\
    \ index only if the leading edge column(s) appeared in the `WHERE` clause. In\
    \ modern versions, the optimizer uses a concatenated index even if the leading\
    \ edge column(s) aren’t present in the `WHERE` clause. This ability to use an\
    \ index without reference to leading edge columns is known as the *skip-scan*\
    \ feature.\n\nA concatenated index that is used for skip-scanning is more efficient\
    \ than a full-table scan. However, you should try to create concatenated indexes\
    \ that use the leading column. If you’re consistently using only a lagging edge\
    \ column of a concatenated index, then consider creating a single-column index\
    \ on the lagging column.\n\n### Implementing Function-Based Indexes\n\n*Function-based\
    \ indexes* are created with functions or expressions in their definitions. Sometimes,\
    \ function-based indexes are required when queries use SQL functions. For example,\
    \ consider the following query that uses a SQL `UPPER` function:\n\n```sql\nSQL>\
    \ select emp_name from emp where UPPER(emp_name) = 'DAVE';\n```\n\nIn this scenario,\
    \ there may be a normal B-tree index on the `EMP_NAME` column, but Oracle won’t\
    \ use a regular index that exists on a column when a function is applied to it.\n\
    \nIn this situation, you can create a function-based index to improve performance\
    \ of queries that use a SQL function in the `WHERE` clause. This example creates\
    \ a function-based index on `UPPER(EMP_NAME)`:\n\n```sql\nSQL> create index user_upper_idx\
    \ on emp(upper(emp_name));\n```\n\nFunction-based indexes allow index lookups\
    \ on columns referenced by functions in the `WHERE` clause of a SQL query. The\
    \ index can be as simple as the preceding example, or it can be based on complex\
    \ logic stored in a PL/SQL function.\n\n**Note:** Any user-created SQL functions\
    \ must be declared `DETERMINISTIC` before they can be used in a function-based\
    \ index. Deterministic means that for a given set of inputs, the function always\
    \ returns the same results. You must use the keyword `DETERMINISTIC` when creating\
    \ a user-defined function that you want to use in a function-based index.\n\n\
    CHAPTER 8 ■ INDEXES\n\nIf you want to see the definition of a function-based index,\
    \ select from the `DBA/ALL/USER_IND_EXPRESSIONS` view to display the SQL associated\
    \ with the index. If you’re using SQL*Plus, be sure to issue a `SET LONG` command\
    \ first. For example:\n\n```sql\nSQL> SET LONG 500\nSQL> select index_name, column_expression\
    \ from user_ind_expressions;\n```\n\nThe `SET LONG` command in this example tells\
    \ SQL*Plus to display up to 500 characters from the `COLUMN_EXPRESSION` column,\
    \ which is of type `LONG`.\n\n### Creating Unique Indexes\n\nWhen you create a\
    \ B-tree index, you can also specify that the index be unique. Doing so ensures\
    \ that non-`NULL` values are unique when you insert or update columns in a table.\n\
    \nSuppose you’ve identified a column (or combination of columns) in the table\
    \ (outside of the primary key) that is used heavily in the `WHERE` clause. In\
    \ addition, this column (or combination of columns) has the requirement that it\
    \ be unique within a table. This is a good scenario in which to use a unique index.\
    \ Use the `UNIQUE` clause to create a unique index:\n\n```sql\nSQL> create unique\
    \ index inv_uidx1 on inv(sku_id);\n```\n\n**Note:** The unique index doesn’t enforce\
    \ uniqueness for `NULL` values inserted into the table. In other words, you can\
    \ insert the value `NULL` into the indexed column for multiple rows.\n\nYou must\
    \ be aware of some interesting nuances regarding unique indexes, primary-key constraints,\
    \ and unique-key constraints. For a detailed discussion of primary-key constraints\
    \ and unique-key constraints, see Chapter 7. When you create a primary-key constraint\
    \ or a unique-key constraint, Oracle automatically creates a unique index and\
    \ a corresponding constraint that is visible in `DBA/ALL/USER_CONSTRAINTS`.\n\n\
    When you only create a unique index explicitly (as in the example in this section),\
    \ Oracle creates a unique index but doesn’t add an entry for a constraint in `DBA/ALL/USER_CONSTRAINTS`.\
    \ Why does this matter? Consider this scenario:\n\n```sql\nSQL> create unique\
    \ index inv_uidx1 on inv(sku_id);\nSQL> insert into inv(sku_id) values (1);\n\
    SQL> insert into inv(sku_id) values (1);\n```\n\nHere’s the corresponding error\
    \ message that is thrown:\n\n```\nERROR at line 1:\nORA-00001: unique constraint\
    \ (INV_MGMT.INV_UIDX1) violated\n```\n\nIf you’re asked to troubleshoot this issue,\
    \ the first place you look is in `DBA_CONSTRAINTS` for a constraint named `INV_UIDX1`.\
    \ However, there is no information:\n\n```sql\nselect\n  constraint_name\nfrom\
    \ dba_constraints\nwhere constraint_name='INV_UIDX1';\n```\n\n```\nno rows selected\n\
    ```\n\nCHAPTER 8 ■ INDEXES\n\nThe “no rows selected” message can be confusing:\
    \ the error message thrown when you insert into the table indicates that a unique\
    \ constraint has been violated, yet there is no information in the constraint-related\
    \ data-dictionary views. In this situation, you have to look at `DBA_INDEXES`\
    \ to view the details of the unique index that has been created.\n\nIf you want\
    \ to have information related to the constraint in the `DBA/ALL/USER_CONSTRAINTS`\
    \ views, you can explicitly associate a constraint after the index has been created:\n\
    \n```sql\nSQL> alter table inv add constraint inv_uidx1 unique(sku_id);\n```\n\
    \nIn this situation, you can enable and disable the constraint independent of\
    \ the index. However, because the index was created as unique, the index still\
    \ enforces uniqueness regardless of whether the constraint has been disabled.\n\
    \nWhen should you explicitly create a unique index versus creating a constraint\
    \ and having Oracle automatically create the index? There are no hard and fast\
    \ rules. I prefer to create a unique-key constraint and let Oracle automatically\
    \ create the unique index, because then I get information in both the `DBA/ALL/USER_CONSTRAINTS`\
    \ views and the `DBA/ALL/USER_INDEXES` views.\n\nBut Oracle’s documentation recommends\
    \ that if you have a scenario where you’re strictly using a unique constraint\
    \ to improve query performance, it’s preferable to create only the unique index.\
    \ This is fine. If you take this approach, just be aware that you may not find\
    \ any information in the constraint-related data-dictionary views.\n\n### Using\
    \ Bitmap Indexes\n\nBitmap indexes are recommended for columns with a relatively\
    \ low number of distinct values (low cardinality). You shouldn’t use bitmap indexes\
    \ on OLTP databases with high `INSERT`/`UPDATE`/`DELETE` activities, due to locking\
    \ issues. This is the case because the structure of the bitmap index results in\
    \ potentially many rows being locked during DML operations, which results in locking\
    \ problems for high-transaction OLTP systems.\n\nBitmap indexes are commonly used\
    \ in data-warehouse environments. A typical star schema structure consists of\
    \ a large fact table and many small dimension (lookup) tables. In these scenarios,\
    \ it’s common to create bitmap indexes on fact table foreign-key columns. The\
    \ fact tables are typically loaded on a daily basis and (usually) aren’t updated\
    \ or deleted from.\n\nListed next is a simple example that demonstrates the creation\
    \ and structure of a bitmap index. First you create a `LOCATIONS` table:\n\n```sql\n\
    create table locations(\n  location_id number\n  ,region varchar2(10)\n);\n```\n\
    \nNow, insert seven rows into the table:\n\n```sql\ninsert into locations values(1,'NORTH');\n\
    insert into locations values(2,'EAST');\ninsert into locations values(3,'NORTH');\n\
    insert into locations values(4,'WEST');\ninsert into locations values(5,'EAST');\n\
    insert into locations values(6,'NORTH');\ninsert into locations values(7,'NORTH');\n\
    ```\n\nYou use the `BITMAP` keyword to create a bitmap index. The next line of\
    \ code creates a bitmap index on the `REGION` column of the `LOCATIONS` table:\n\
    \n```sql\nSQL> create bitmap index reg_idx1 on locations(region);\n```\n\nCHAPTER\
    \ 8 ■ INDEXES\n\nA bitmap index stores the `ROWID` of a row and a corresponding\
    \ bitmap. You can think of the bitmap as a combination of ones and zeros. A 1\
    \ indicates the presence of a value, and a 0 indicates that the value doesn’t\
    \ exist. Table 8–3 shows the resulting structure of the bitmap index.\n\n***Table\
    \ 8–3.** Structure of the `REG_IDX1` Bitmap Index*\n\n| **Value/Row** | **Row\
    \ 1** | **Row 2** | **Row 3** | **Row 4** | **Row 5** | **Row 6** | **Row 7**\
    \ |\n| :------------ | :-------- | :-------- | :-------- | :-------- | :--------\
    \ | :-------- | :-------- |\n| EAST          | 0         | 1         | 0     \
    \    | 0         | 1         | 0         | 0         |\n| NORTH         | 1  \
    \       | 0         | 1         | 0         | 0         | 1         | 1      \
    \   |\n| WEST          | 0         | 0         | 0         | 1         | 0   \
    \      | 0         | 0         |\n\nFor each value of `REGION` (`EAST`, `NORTH`,\
    \ and `WEST`), an array of values is stored that indicates which rows contain\
    \ a value for a particular `REGION`. For example, the `EAST` location has bit\
    \ settings in row 2 and row 5 (meaning that the `EAST` location is present for\
    \ those two rows).\n\nBitmap indexes are effective at retrieving rows when multiple\
    \ `AND` and `OR` conditions appear in the `WHERE` clause. For example, to perform\
    \ the task “find all rows with a region of `EAST` or `WEST`,” a Boolean algebra\
    \ `OR` operation is performed on the `EAST` and `WEST` bitmaps to quickly return\
    \ the rows 2, 4, and 5.\n\nTable 8–4 shows the `OR` operation on the `EAST` and\
    \ `WEST` bitmap as the last row.\n\n***Table 8–4.** Results of an `OR` Operation*\n\
    \n| **Value/Row** | **Row 1** | **Row 2** | **Row 3** | **Row 4** | **Row 5**\
    \ | **Row 6** | **Row 7** |\n| :------------ | :-------- | :-------- | :--------\
    \ | :-------- | :-------- | :-------- | :-------- |\n| EAST          | 0     \
    \    | 1         | 0         | 0         | 1         | 0         | 0         |\n\
    | NORTH         | 1         | 0         | 1         | 0         | 0         |\
    \ 1         | 1         |\n| WEST          | 0         | 0         | 0       \
    \  | 1         | 0         | 0         | 0         |\n| Boolean OR on EAST and\
    \ WEST | 0         | 1         | 0         | 1         | 1         | 0       \
    \  | 0         |\n\n**Note:** Bitmap indexes and bitmap join indexes are available\
    \ only with the Oracle Enterprise Edition of the database.\n\n### Creating Bitmap\
    \ Join Indexes\n\nBitmap join indexes store the results of a join between two\
    \ tables in an index. Bitmap indexes are beneficial because they avoid joining\
    \ tables to retrieve results. The syntax for a bitmap join index differs\n\n180\n\
    \nCHAPTER 8 ■ INDEXES\n\nfrom a regular bitmap index in that it contains `FROM`\
    \ and `WHERE` clauses. Here’s the basic syntax for creating a bitmap join index:\n\
    \n```sql\ncreate bitmap index <index_name>\non <fact_table> (<dimension_table.dimension_column>)\n\
    from <fact_table>, <dimension_table>\nwhere <fact_table>.<foreign_key_column>\
    \ = <dimension_table>.<primary_key_column>;\n```\n\nBitmap join indexes are appropriate\
    \ in situations where you’re joining two tables using the foreign-key column(s)\
    \ in one table that relate to primary-key column(s) in another table. For example,\
    \ suppose you typically retrieve the `CUSTOMER_NAME` from the `D_CUSTOMERS` table\
    \ while joining to a large `F_SHIPMENTS` fact table. This next example creates\
    \ a bitmap join index between the `F_SHIPMENTS` and `D_CUSTOMERS` tables:\n\n\
    ```sql\ncreate bitmap index f_shipments_bm_idx1\non f_shipments(d_customers.cust_name)\n\
    from f_shipments, d_customers\nwhere f_shipments.d_cust_id = d_customers.d_cust_id;\n\
    ```\n\nNow, consider a query such as this:\n\n```sql\nselect\n  d.cust_name\n\
    from f_shipments f, d_customers d\nwhere f.d_cust_id = d.d_cust_id\n  and d.cust_name\
    \ = 'Sun';\n```\n\nThe optimizer can choose to use the bitmap join index and thus\
    \ avoid the expense of having to join the tables.\n\n### Implementing Reverse-Key\
    \ Indexes\n\nReverse-key indexes are similar to B-tree indexes except that the\
    \ bytes of the index key are reversed when an index entry is created. For example,\
    \ if the index values are 201, 202, and 203, the reverse-key index values are\
    \ 102, 202, and 302:\n\n```\nIndex value    Reverse key value\n------------- \
    \ --------------------\n201            102\n202            202\n203          \
    \  302\n```\n\nReverse-key indexes can perform better in scenarios where you need\
    \ a way to evenly distribute index data that would otherwise have similar values\
    \ clustered together. Thus, when using a reverse-key index, you avoid having I/O\
    \ concentrated in one physical disk location within the index during large inserts\
    \ of sequential values.\n\nUse the `REVERSE` clause to create a reverse-key index:\n\
    \n```sql\nSQL> create index inv_idx1 on inv(inv_id) reverse;\n```\n\nYou can verify\
    \ that an index is reverse-key by running the following query:\n\n```sql\nSQL>\
    \ select index_name, index_type from user_indexes;\n```\n\nHere’s some sample\
    \ output showing that the `INV_IDX1"
