    ### 在还原前验证备份文件\n\n你可以对备份文件执行多个级别的验证，而无需实际还原任何内容。如果你只想让 RMAN 验证文件是否存在并检查文件头，请使用\
    \ `RESTORE...VALIDATE HEADER` 命令，如下所示：\n\n```\nRMAN> restore database validate\
