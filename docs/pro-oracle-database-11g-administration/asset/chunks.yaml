    for Unix and Linux platforms and C:\Program Files\Oracle\Backup for the Windows
    platform. Once you have downloaded the OSB zip file and copied it to the appropriate
    directory, then you may proceed to the installation steps, as shown here:


    1\. To perform the OSB installation, you must logon as root.


    $ su - root


