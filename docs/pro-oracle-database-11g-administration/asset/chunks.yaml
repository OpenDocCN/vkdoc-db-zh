    \ on: $BOX\" dkuhn@sun.com\n      ;;\n    *)\n      arcStat=\"huh?: $usedSpc\"\
    \n  esac\n  #\n  BOX=$(uname -a | awk '{print $2}')\n  echo $arcStat\n  #\ndone\n\
    #\nexit 0\n```\n\nYou can run this script manually from the command line like\
    \ this:\n\n$ filesp.bsh\n\nHere is the output for this database server:\n\n/orahome\n\
