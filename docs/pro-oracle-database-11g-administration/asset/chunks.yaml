    Here is the output for this example:


    /ora02/oraredo/O11DEV/redo03.log


    /ora02/oraredo/O11DEV/redo02.log


    /ora02/oraredo/O11DEV/redo01.log


    Make sure the directories exist on the new server that will contain the online
    redo logs. For this example, here''s the mkdir command:


    $ mkdir -p /ora02/oraredo/O11DEV


    Step 14: Open the Database


    You must open the database with the OPEN RESETLOGS command (because there are
    no redo logs and they must be recreated at this point):


    SQL> alter database open resetlogs;


    If successful, you should see this message:


    Database altered.


    Step 15: Add tempfile


    When you start your database, Oracle will automatically try to add any missing
    tempfiles to the database.


    Oracle won''t be able to do this if the directory structure on the destination
    server is different from the source server. In this scenario you will have to
    manually add any missing tempfile(s). To do this, first take offline the temporary
    tablespace tempfile. The file definition from the originating database is taken
    offline like so:


    SQL> alter database tempfile ''/u02/oracle/oradata/E64202/temp01.dbf'' offline;
    542


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    Next, add a temporary tablespace file to the TEMP tablespace that matches the
    directory structure of the destination database server:


    SQL> alter tablespace temp add tempfile ''/ora02/dbfile/O11DEV/temp01.dbf'' size
    100m; Step 16: Rename the Database


    If you need to rename the database to reflect the name for a development or test
    database, create a trace file that contains the CREATE CONTROLFILE statement and
    use it to rename your database. These steps are covered in detail in Chapter 4\.
    The basic steps involved are:


    1\. Generate a trace file.


    SQL> oradebug setmypid


    SQL> alter database backup controlfile to trace resetlogs;


    SQL> oradebug tracefile_name


    2\. Modify the trace file to include the SET DATABASE.


    CREATE CONTROLFILE SET DATABASE "O11DEV" RESETLOGS...


    3\. Create an init.ora file that matches the new name.


    4\. ORACLE_HOME/dbs/init<newSID>.ora.


    5\. Modify the DB_NAME variable within the new init.ora file (in this example,
    it’s set to O11DEV).


    6\. Set ORACLE_SID to reflect the new SID name (in this example, it’s set to O11DEV),
    7\. SQL> startup nomount;


    8\. Run the trace file to recreate the control file (trace file from Step 2).


    9\. SQL> alter database open resetlogs;


    If successful, you should have a database that is a copy of the original database.
    All of the datafiles, control files, archive redo logs, and online redo logs are
    in the new locations, and the database has a new name.


    ■ **Tip** You can also use the NID utility to change the database name and DBID.
    For additional information, see My Oracle Support note 863800.1 for more details.


    Summary


    RMAN is an acronym short for Recovery Manager. It''s worth noting that Oracle
    did not name this tool Backup Manager. The Oracle team recognized that while backups
    are important, the real value of a B&R


    tool is its ability to restore and recover the database. Being able to managing
    the recovery process is the critical skill. When a database is damaged and needs
    to be restored, everybody looks to the DBA to perform a smooth and speedy recovery
    of the database. Oracle DBAs should use RMAN to protect, secure, and ensure the
    availability of the company''s data assets.


    CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    Restore and recovery are analogous to the healing process when you break a bone.
    Restoring is similar to the process of setting the bone back to its original position.
    This is like restoring datafiles from a backup and placing them in their original
    directories. Recovering a datafile is similar to the healing process of a broken
    bone—returning the bone back to its state before it was broken. When you recover
    datafiles, you apply transactions (obtained from archive redo and online redo)
    to transform the restored datafiles back to the state they were in before the
    media failure occurred.


    RMAN can be used for any type of restore and recovery scenario. Depending on the
    situation, RMAN can be used to restore the entire database, specific datafiles,
    control files, server parameter files, archive redo logs, or just specific data
    blocks. You can instruct RMAN to perform a complete recovery or incomplete.


    The last section in this chapter details how to use RMAN to restore and recover
    a database to a remote server. I recommend that you periodically attempt to test
    this type of recover. This will fully exercise your backup and recovery strategy.
    You will gain much confidence and fully understand backup and recovery internals
    once you can successfully restore a database to a different server from the original.


