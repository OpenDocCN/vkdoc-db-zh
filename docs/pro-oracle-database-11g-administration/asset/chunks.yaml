    CHAPTER 5 ■ MANAGING CONTROL FILES AND ONLINE REDO LOGS


    The contents of the current online redo-log files aren’t archived until a log
    switch occurs. This means that if you lose all members of the current online redo-log
    file, you lose transactions. Listed next are several mechanisms you can implement
    to minimize the chance of failure with the online redo-log files:


    • Multiplex groups to have multiple members.


    • Never allow two members of the same group to share the same controller.


    • Never put two members of the same group on the same physical disk.


    • Ensure that OS file permissions are set appropriately.


    • Use physical storage devices that are redundant (that is, RAID).


    • Appropriately size the log files so that they switch and are archived at regular
    intervals.


    • Set the ARCHIVE_LAG_TARGET initialization parameter to ensure that the online
    redo logs are switched at regular intervals.


    ■ **Note** The only tool provided by Oracle that can protect you and preserve
    all committed transactions in the event you lose all members of the current online
    redo-log group is Oracle Data Guard implemented in Maximum Protection Mode. For
    more details, see the Data Guard Concepts and Administration guide, available
    on Oracle’s Oracle Technology Network (OTN) website.


    The online redo-log files are never backed up by an RMAN backup or by a user-managed
    hot backup. If you did back up the online redo-log files, it would be meaningless
    to restore them. The online redo-log files contain the latest redo generated by
    the database. You wouldn’t want to overwrite them from a backup with old redo
    information. For a database in archivelog mode, the online redo-log files contain
    the most recently generated transactions that are required to perform a complete
    recovery.


    Displaying Online Redo-Log Information


    Use the V$LOG and V$LOGFILE views to display information about online redo-log
    groups and corresponding members:


    select a.group#,a.member,b.status,b.archived,bytes/1024/1024 mbytes


    from v$logfile a, v$log b


    where a.group# = b.group#


    order by 1,2;


    Here is some sample output:


    GROUP# MEMBER STATUS ARCHIVED MBYTES


    -------- ----------------------------------- ---------- -------- ---------


    1 /ora01/oraredo/O11R2/redo01a.rdo INACTIVE YES 100


    1 /ora02/oraredo/O11R2/redo01b.rdo INACTIVE YES 100


    2 /ora01/oraredo/O11R2/redo02a.rdo CURRENT NO 100


    2 /ora02/oraredo/O11R2/redo02b.rdo CURRENT NO 100


