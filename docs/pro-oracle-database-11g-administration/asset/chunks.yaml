    Checking for Too Many Processes


    On some database servers you may have many background SQL*Plus jobs. These batch
    jobs might perform tasks such as copying data from remote databases, large daily
    update jobs, and so on. In these environments it''s useful to know if at any given
    time there are an abnormal number of shell scripts running or an unusually large
    number of SQL*Plus processes running on the database server. An abnormal amount
    of job could be an indication that something is broken or hung.


    The shell script in Listing 21–8 has two checks in it, one check for the number
    of shell scripts that are named with the extension of bsh, and another check for
    the number of processes that contain the string of sqlplus:


    ***Listing 21–8.** A Script That Runs Two Checks*


    #!/bin/bash


    #


    if [ $# -ne 0 ]; then


    echo "Usage: $0"


    exit 1


    fi


    #


    crit_var=$(ps -ef | grep -v grep | grep bsh | wc -l)


    if [ $crit_var -lt 20 ]; then


    CHAPTER 21 ■ AUTOMATING JOBS


    echo $crit_var


    echo "processes running normal"


    else


    echo "too many processes"


    echo $crit_var | mailx -s "too many bsh procs: $1" dkuhn@sun.com fi


    #


    crit_var=$(ps -ef | grep -v grep | grep sqlplus | wc -l)


    if [ $crit_var -lt 30 ]; then


    echo $crit_var


    echo "processes running normal"


    else


    echo "too many processes"


    echo $crit_var | mailx -s "too many sqlplus procs: $1" dkuhn@sun.com fi


    #


    exit 0


    The prior shell script is named proc_count.bsh and is run once an hour from a
    cron job:


    #---------------------------------------------------


    # Process count check, sqlplus process count check.


    33 * * * * /home/oracle/bin/proc_count.bsh


    1>/home/oracle/bin/log/proc_count.log 2>&1


    #---------------------------------------------------


    (Again, the code for this cron entry should be on one line. It''s placed on two
    lines in this book so that it fits on the page.)


    Verifying Integrity of RMAN Backups


    As part of your backup and recovery strategy you should periodically validate
    the integrity of the backup files. RMAN provides a RESTORE...VALIDATE command
    that checks for physical corruption within the backup files. Listing 21–9 is a
    script starts RMAN and spools a log file. The log file is subsequently searched
    for the keyword "error". If there are any errors in the log file, an email is
    sent.


    ***Listing 21–9.** A Script that Starts RMAN and Spools a Log File*


    #!/bin/bash


    #


    if [ $# -ne 1 ]; then


    echo "Usage: $0 SID"


    exit 1


    fi


    # source oracle OS variables


    . /var/opt/oracle/oraset $1


    #


    date


    BOX=ùname -a | awk ''{print$2}''`


    rman nocatalog <<EOF


    connect target /


    spool log to $HOME/bin/log/rman_val.log


    set echo on;


    restore database validate;


    CHAPTER 21 ■ AUTOMATING JOBS


    EOF


    grep -i error $HOME/bin/log/rman_val.log


    if [ $? -eq 0 ]; then


    echo "RMAN verify issue $BOX, $1" | \


    mailx -s "RMAN verify issue $BOX, $1" dkuhn@sun.com


    else


    echo "no problem..."


    fi


    #


    date


    exit 0


    The RESTORE...VALIDATE doesn''t actually restore any files; it only validates
    that the required files to restore the database are available and checks for physical
    corruption.


    If you need to also check for logical corruption, specify the CHECK LOGICAL clause.
    For example, to check for logical corruption, Listing 21–6 would have this line
    in it: restore database validate check logical;


    For large databases, the validation process can take a great deal of time (because
    it checks each block in the backup file for corruption). If you only want to check
    that the backup files exist, specify the VALIDATE HEADER clause, like so:


    restore database validate header;


    This command only checks for valid information in the header of each file that
    would be required for a restore and recovery.


    Summary


    Automating routine database jobs is a key attribute of the successful DBA. Automated
    jobs ensure that tasks are repeatable, verifiable, and that you are immediately
    notified when there are any problems.


    Your job as a DBA depends on successfully running backups and ensuring the database
    is highly available. This chapter includes several scripts and examples that detail
    how to run routine jobs at defined frequencies.


    If you are a DBA who works in a Linux/Unix shop, you should familiarize yourself
    with the cron utility. This scheduler is simple to use and is almost universally
    available. Even if you don''t use cron in your current work assignment, you''re
    sure to encounter its use in future work environments.


    Oracle provides Oracle Scheduler utility (implemented via the DBMS_SCHEDULER PL/SQL
    package) for scheduling jobs. This tool can be used to automate any type of database
    task. You can also initiate jobs based on system events or based on the success/failure
    of other scheduled jobs. I prefer to use cron for scheduling database jobs. However,
    you might have sophisticated scheduling requirements that dictate the use of a
    tool such as the Oracle Scheduler.


    At this point in the book, you''ve learned how to implement and perform many tasks
    required of a DBA. Even if you manage just one database, no doubt you''ve also
    been embroiled in a vast number of troubleshooting activities. The next chapter
    of the book focuses on diagnosing and resolving many of the issues that a DBA
    encounters.


    ![](index-629_1.png)


    CHAPTER 22 ■ DATABASE TROUBLESHOOTING


    Checking Database Availability


    The first few checks that I perform don''t require the DBA to logon to the database
    server. Rather, they can be performed remotely via SQL*Plus and operating system
    commands. In fact, I perform all of the initial checks remotely over the network;
    this establishes whether all of the system components are working.


    One quick check to establish whether the remote server is available, the database
    is up, the network is working, and the listener is accepting incoming connections
    is to connect via a SQL*Plus client to the remote database over the network. I
    usually have a standard database account and password that I create in all databases
    for use in such scenarios. Here''s an example of connecting over the network to
    a remote database as the barts user with a password of l1sa; the network connect
    information is embedded directly into the connect string (where dwdb1 is the server,
    1521 is the port, and dwrep1 is the database service name):


    $ sqlplus barts/l1sa@''dwdb1:1521/dwrep1'''
