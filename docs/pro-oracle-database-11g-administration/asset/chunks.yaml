  trans: '# 第 22 章 ■ 数据库故障排除


    在前面的命令中，你正在检查操作系统上的所有文件，试图定位一个文件名以“alert”开头、以“.log”结尾的文件。执行全局搜索时，当 `find` 命令尝试访问它没有读取权限的文件时，将会抛出错误。`2>/dev/null`
    非常有用，因为它将所有错误消息重定向到 `/dev/null`（位桶）文件。结果是你不会看到大量的错误消息，只有当 `find` 成功找到与字符串模式匹配的文件时，你才会看到输出。


    当尝试查找 `alert.log` 文件时，你可能会发现不止一个文件。当经验不足的 DBA 将 `alert.log` 从标准位置移动到非标准位置，并且将旧文件散落在整个操作系统中时，就会发生这种情况。


    当你认为找到了正确的 `alert.log` 文件时，检查其上的日期以确保它是最近更新的。有时你找到了一个 `alert.log`，但结果发现它不是当前文件。你可以使用
    `ls` 命令的长格式列表来检查最后更新时间：


    ```

    $ ls -altr alert_<SID>.log

    ```


    一旦找到了正确的 `alert.log` 文件，检查其中最近的条目以查找错误，或者在与 `alert.log` 文件相同的目录中查找跟踪文件：


    ```

    $ ls -altr *.trc

    ```


    如果其中任何跟踪文件已经存在好几天了，考虑移动或删除它们。


    ## 删除文件


    不用说，删除文件时要非常小心。试图解决问题时，最糟糕的事情就是让情况变得更糟。意外删除一个关键文件可能是灾难性的。对于你识别为候选删除的任何文件，考虑移动（而不是删除）它们。如果你有一个有可用空间的挂载点，将文件移动到那里，保留几天，然后再删除它们。


    如果你已经确定了可以删除的文件，那么在实际删除它们之前，先列出你将删除的文件。至少，我会在删除任何文件之前执行此操作：


    ```

    $ ls -altr <file_name>

    ```


    查看 `ls` 命令返回的结果后，删除文件。此示例使用 Linux/Unix 的 `rm` 命令永久删除文件：


    ```

    $ rm <file_name>

    ```


    你也可以根据文件的年龄来删除文件。例如，假设你确定任何超过两天的跟踪文件都可以安全删除。通常，`find` 命令与 `rm` 命令结合使用来完成此任务。在删除文件之前，首先列出
    `find` 命令的结果：


    ```

    $ find . -type f -mtime +2 -name "*.trc"

    ```


    如果你对文件列表满意，则添加 `rm` 命令来删除它们：


    ```

    $ find . -type f -mtime +2 -name "*.trc" | xargs rm

    ```


    在前面的代码行中，`find` 命令的结果通过管道传递给 `xargs` 命令，该命令为 `find` 命令找到的每个文件执行 `rm` 命令。这是一种基于文件年龄删除文件的高效方法。但是，务必非常确定你知道哪些文件将被删除。


    另一个有时会占用大量空间的文件是 `listener.log` 文件。由于此文件被监听器进程持续写入，你不能简单地删除它。如果你需要保留此文件的内容，那么首先将其复制到有可用磁盘空间的备份位置，然后截断该文件。在此示例中，`listener.log`
    文件首先被复制到 `/ora01/backups`，然后通过以下方式截断该文件：


    ```

    $ cp listener.log /ora01/backups

    ```


    接下来，使用 `cat` 命令将 `listener.log` 的内容替换为 `/dev/null` 文件（该文件包含零字节）：


    ```

    $ cat /dev/null > listener.log

    ```


    ## 检查告警日志


    在处理数据库问题时，`alert.log` 应该是你检查相关错误信息的首要文件之一。你可以使用操作系统工具或 ADRCI 实用程序来查看 `alert.log`
    文件和相应的跟踪文件。


    ### 通过操作系统工具查看告警日志


    导航到包含 `alert.log` 的目录后，你可以通过查看文件的末尾（最下面的部分）来查看最新的消息（换句话说，最新的消息写入文件的末尾）。要查看最后 50
    行，请使用 `tail` 命令：


    ```

    $ tail -50 alert_<SID>.log

    ```


    你可以使用 `-f` 开关持续查看最新的条目：


    ```

    $ tail -f alert_<SID>.log

    ```


    你也可以直接用操作系统编辑器（如 `vi`）打开 `alert.log`：


    ```

    $ vi alert_<SID>.log

    ```


    有时定义一个函数会很方便，它允许你无论当前工作目录在哪里都能打开 `alert.log`。接下来的几行代码定义了一个函数，该函数在 `11g` 或 `10g`
    环境中使用 `view` 命令定位并打开 `alert.log`：


    ```

    #-----------------------------------------------------------#

    ```'
- fmt: "# view alert log\n\n```\nfunction valert {\n\necho $ORACLE_HOME | grep 11\
    \ >/dev/null\n\nif [ $? -eq 0 ]; then\n\nlower_sid=$(echo $ORACLE_SID | tr '[:upper:]'\
    \ '[:lower:]')\n\nview $ORACLE_BASE/diag/rdbms/$lower_sid/$ORACLE_SID/trace/alert_$ORACLE_SID.log\
    \ else\n\nview $ORACLE_BASE/admin/$ORACLE_SID/bdump/alert_$ORACLE_SID.log\n\n\
    fi\n\n} # valert\n```\n\n#-----------------------------------------------------------#\n\
    \nUsually the prior lines of code are placed in a startup file so that the function\
    \ is automatically defined when you logon to a server. Once defined, you can view\
    \ the `alert.log` by typing in: `$ valert`\n\nWhen inspecting the bottom of the\
    \ `alert.log`, look for errors that indicate issues with:\n\n• Archiver process\
    \ hung due to inadequate disk space.\n• File system out of space.\n• Tablespace\
    \ out of space.\n• Running out of memory in the buffer cache or shared pool.\n\
    • Media error indicating a datafile is missing or damaged.\n\nFor example, here's\
    \ an error indicating there is an issue writing an archive redo log:\n`ORA-19502:\
    \ write error on file \"/ora01/fra/O11R2/archivelog/...\"`\n\nFor a serious error\
    \ message listed in the `alert.log` file there is almost always a corresponding\
    \ trace file. For example, here is the accompanying message to the prior error\
    \ message: Errors in file\n`/oracle/app/oracle/diag/rdbms/o11r2/O11R2/trace/O11R2_arc0_4485.trc`\n\
    \nInspecting the trace file will often (but not always) provide additional insight\
    \ into the issue.\n\n## Viewing the `alert.log` Using the ADRCI Utility\n\nIf\
    \ you're using Oracle Database 11 *g* or higher, you can use the ADRCI utility\
    \ to view the contents of the `alert.log` file. Run the following command from\
    \ the operating system to start the ADRCI utility: `$ adrci`\n\nYou should be\
    \ presented with a prompt:\n`adrci>`\n\nUse the `SHOW ALERT` command to view the\
    \ `alert.log` file:\n`adrci> show alert`\n\nIf there are multiple Oracle homes\
    \ on the server, then you will be prompted to choose which `alert.log` you want\
    \ to view. The `SHOW ALERT` command will open up the `alert.log` with the utility\
    \ that has been set as the default editor for your operating system. On Linux/Unix\
    \ systems, the default editor is derived from the operating system `EDITOR` variable\
    \ (which is usually set to an utility such as `vi`).\n\n■ **Tip** When presented\
    \ with the `alert.log`, if you are unfamiliar with `vi`, and want to exit, first\
    \ hit the escape key, then press and hold down the shift key while also pressing\
    \ the `:` key. Then type in a `q!`. That should exit you out of the `vi` editor\
    \ and back to the ADRCI prompt.\n\nYou can override the default editor within\
    \ ADRCI using the `SET EDITOR` command. This example sets the default editor to\
    \ `emacs`:\n`adrci> set editor emacs`\n\nYou can view the last N number of lines\
    \ in the `alert.log` with the `TAIL` option. The following command displays the\
    \ last 50 lines of the `alert.log`:\n`adrci> show alert -tail 50`\n\nIf you have\
    \ multiple Oracle homes, you may see a message like this:\n`DIA-48449: Tail alert\
    \ can only apply to single ADR home`\n\nThe ADRCI utility doesn't assume that\
    \ you want to work with one Oracle home over another on a server. To specifically\
    \ set the Oracle home (for the ADRCI utility), first use the `SHOW HOMES` command\
    \ to display all available Oracle homes:\n`adrci> show homes`\n\nHere is some\
    \ sample output for this server:\n```\ndiag/rdbms/e64208/E64208\ndiag/rdbms/e64211/E64211\n\
    diag/rdbms/e64214/E64214\n```\n\nNow to specifically set the Oracle home, use\
    \ the `SET HOMEPATH` command. This sets the `HOMEPATH` to `diag/rdbms/e64208/E64208`:\n\
    `adrci> set homepath diag/rdbms/e64208/E64208`\n\nTo continuously display the\
    \ end of the file, use the following command: `adrci> show alert -tail -f`\n\n\
    Press `Ctrl+C` to break out of continuously viewing the `alert.log` file. To display\
    \ lines from the `alert.log` that contains specific strings, use the `MESSAGE_TEXT\
    \ LIKE` command. This example shows messages that contain the `ORA-27037` string:\n\
    `adrci> show alert -p \"MESSAGE_TEXT LIKE '%ORA-27037%'\"`\n\nYou will be presented\
    \ with a file that contains all lines in the `alert.log` that match the specified\
    \ string.\n\n■ **Tip** See the Oracle Database Utilities guide for full details\
    \ on how to use the ADRCI utility.\n\n## Identifying Bottlenecks via Operating\
    \ System Utilities\n\nIn the Oracle world, there is sometimes a tendency to assume\
    \ that you have a dedicated machine for one Oracle database. Furthermore, this\
    \ database is the latest version of Oracle, fully patched, and monitored by a\
    \ sophisticated graphical tool. This database environment is completely automated\
    \ and kept trouble free through the use of visual tools that quickly pinpoint\
    \ problems and efficiently isolate and resolve issues. If you live in this ideal\
    \ world, then you probably don't need any of the material in this chapter.\n\n\
    Let me paint a slightly different picture. I have an environment where one machine\
    \ has a dozen databases running on it. There's a MySQL database, a PostgreSQL\
    \ database, and a mix of Oracle version 9i, version 10g, and version 11g databases.\
    \ Furthermore, many of these old databases are on non-terminal releases of Oracle\
    \ and are therefore technically not supported by Oracle Support. There are no\
    \ plans to upgrade any of these unsupported databases because the business can't\
    \ take the risk of potentially breaking the applications that depend on these\
    \ databases.\n\nSo what does one do in this type of environment when somebody\
    \ reports that a database application is performing poorly? In this scenario,\
    \ it's often something else in a different database that is causing other applications\
    \ on the box to behave poorly. It may not be an Oracle process or an Oracle databases\
    \ that is causing problems.\n\nIn this situation, it's almost always more effective\
    \ to start investigating issues by using an operating system tool. The OS tools\
    \ are database agnostic. OS performance utilities help pinpoint where the most\
    \ resources are consumed regardless of database vendor or version.\n\nIn Linux/Unix\
    \ environments, there are several tools available for monitoring resource usage.\n\
    \nTable 22–1 summarizes the most commonly used OS utilities for diagnosing performance\
    \ issues. Being familiar with how these operating system commands work and how\
    \ to interpret the output will allow you to better diagnose server performance\
    \ issues, especially when it's a non-Oracle or even a non-database process that\
    \ is tanking performance for every other application on the box.\n\n***Table 22–1.**\
    \ Performance and Monitoring Utilities*\n\n| **Tool** | **Purpose** |\n| :---\
    \ | :--- |\n| `vmstat` | Monitors processes, CPU, memory, or disk I/O bottlenecks.\
    \ |\n| `top` | Identifies sessions consuming the most resources. |\n| `watch`\
    \ | Periodically runs another command. |\n| `ps` | Identifies highest CPU- and\
    \ memory-consuming sessions. Used to identify Oracle sessions consuming the most\
    \ system resources. |\n| `mpstat` | Reports CPU statistics. |\n| `sar` | Displays\
    \ CPU, memory, disk I/O, and network usage, both current and historical. |\n|\
    \ `free` | Displays free and used memory. |\n| `df` | Reports on free disk space.\
    \ |\n| `du` | Displays disk usage. |\n| `iostat` | Displays disk I/O statistics.\
    \ |\n| `netstat` | Reports on network statistics. |\n\nWhen diagnosing performance\
    \ issues, it's useful to determine where the operating system is constrained.\
    \ For example, try to identify whether the issue is related to CPU, memory, I/O,\
    \ or a combination of these resources.\n\n### Identifying System Bottlenecks\n\
    \nWhenever there are application performance issues or availability problems,\
    \ seemingly (from the DBA’s perspective) the first question asked is, what’s wrong\
    \ with the database? Regardless of the source of the problem, the onus is often\
    \ on the DBA to either prove or disprove whether the database is behaving well.\n\
    \nI usually approach this issue by determining what system-wide resources are\
    \ being consumed. There are two Linux/Unix operating system tools that are particularly\
    \ useful for displaying system wide resource usage:\n\n• `vmstat`\n• `top`\n\n\
    The `vmstat` (virtual memory statistics) tool is intended to help you quickly\
    \ identify bottlenecks on your server. The `top` utility provides a dynamic real-time\
    \ view of system resource usage. These two utility are discussed in the next two\
    \ subsections.\n\n### Using `vmstat`\n\nThe `vmstat` utility displays real-time\
    \ performance information about processes, memory, paging, disk I/O, and CPU usage.\
    \ This example shows using `vmstat` to display the default output with no options\
    \ specified:\n```\n$ vmstat\nprocs -----------memory---------- ---swap-- -----io----\
    \ --system-- ----cpu----\nr b swpd free buff cache si so bi bo in cs us sy id\
    \ wa\n14 0 52340 25272 3068 1662704 0 0 63 76 9 31 15 1 84 0\n```\n\nHere are\
    \ some general heuristics you can use when interpreting the output of `vmstat`:\n\
    \n• If the `wa` (time waiting for I/O) column is high, this is usually an indication\
    \ that the storage subsystem is overloaded.\n• If `b` (processes sleeping) is\
    \ consistently greater than 0, then you may not have enough CPU processing power.\n\
    • If `so` (memory swapped out to disk) and `si` (memory swapped in from disk)\
    \ are consistently greater than 0, you may have a memory bottleneck.\n\nBy default,\
    \ only one line of server statistics is displayed when running `vmstat` (without\
    \ supplying any options). This one line of output displays average statistics\
    \ calculated from the last time the system was rebooted. This is fine for a quick\
    \ snapshot. However, if you want to gather metrics over a period of time, use\
    \ `vmstat` with this syntax:\n`$ vmstat <interval in seconds> <number of intervals>`\n\
    \nWhile in this mode, `vmstat` reports statistics sampling from one interval to\
    \ the next. For example, if you wanted to report system statistics every two seconds\
    \ for ten intervals, you’d issue this command: `$ vmstat 2 10`\n\nYou can also\
    \ send the `vmstat` output to a file. This is useful for analyzing historical\
    \ performance over a period of time. This example samples statistics every 5 seconds\
    \ for a total of 60 reports and records the output in a file:\n`$ vmstat 5 60\
    \ > vmout.perf`\n\nAnother useful way to use `vmstat` is with the `watch` tool.\
    \ The `watch` command is used to execute another program on a periodic basis.\
    \ This example uses `watch` to run the `vmstat` command every five seconds and\
    \ to highlight on the screen any differences between each snapshot: `$ watch –n\
    \ 5 –d vmstat`\n```\nEvery 5.0s: vmstat Thu Aug 9 13:27:57 2007\nprocs -----------memory----------\
    \ ---swap-- -----io---- --system-- ----cpu----\nr b swpd free buff cache si so\
    \ bi bo in cs us sy id wa\n0 0 144 15900 64620 1655100 0 0 1 7 16 4 0 0 99 0\n\
    ```\n\nWhen running `vmstat` in `watch -d` (differences) mode, you’ll visually\
    \ see changes on your screen as they alter from snapshot to snapshot. To exit\
    \ from `watch`, press `Ctrl+C`.\n\nNote that the default unit of measure for the\
    \ memory columns of `vmstat` is in kilobytes. If you want to view memory statistics\
    \ in megabytes, then use the `–S m` (statistics in megabytes) option: `$ vmstat\
    \ –S m`\n\nFor reference, Table 22–2 details the meanings of the columns displayed\
    \ in the default output of `vmstat`.\n\n***Table 22–2.** Column Descriptions of\
    \ `vmstat` Output*\n\n| **Column** | **Description** |\n| :--- | :--- |\n| `r`\
    \ | Number of processes waiting for runtime |\n| `b` | Number of processes in\
    \ uninterruptible sleep |\n| `swpd` | Total virtual memory (swap) in use (KB)\
    \ |\n| `free` | Total idle memory (KB) |\n| `buff` | Total memory used as buffers\
    \ (KB) |\n| `cache` | Total memory used as cache (KB) |\n| `si` | Memory swapped\
    \ in from disk (KB/s) |\n| `so` | Memory swapped out to disk (KB/s) |\n| `bi`\
    \ | Blocks read in (blocks/s) from block device |\n| `bo` | Blocks written out\
    \ (blocks/s) per second to block device |\n| `in` | Interrupts per second |\n\
    | `cs` | Context switches per second |\n| `us` | User-level code time as a percentage\
    \ of total CPU time |\n| `sy` | System level code time as a percentage of total\
    \ CPU time |\n| `id` | Idle time as a percentage of total CPU time |\n| `wa` |\
    \ Time waiting for I/O completion |\n\n### Using `top`\n\nAnother tool for identifying\
    \ resource-intensive processes is the `top` command. Use this utility to quickly\
    \ identify which processes are the highest consumers of resources on the server.\
    \ By default, `top` will repetitively refresh (every three seconds) information\
    \ regarding the most CPU-intensive processes.\n\nHere’s the simplest way to run\
    \ `top`:\n`$ top`\n\nHere’s a fragment of the output:\n```\ntop - 21:05:39 up\
    \ 43 days, 23:45, 8 users, load average: 1.10, 0.87, 0.72\nTasks: 576 total, 2\
    \ running, 574 sleeping, 0 stopped, 0 zombie\nCpu(s): 0.1%us, 0.2%sy, 0.0%ni,\
    \ 98.8%id, 0.8%wa, 0.0%hi, 0.0%si, 0.0%st\nMem: 16100352k total, 12480204k used,\
    \ 3620148k free, 38016k buffers\nSwap: 18481144k total, 380072k used, 18101072k\
    \ free, 8902940k cached\nPID USER PR NI VIRT RES SHR S %CPU %MEM TIME+ COMMAND\n\
    9236 mscd642 15 0 13000 1468 812 R 0.7 0.0 0:00.03 top\n3179 oracle 16 0 2122m\
    \ 1.9g 1.9g S 0.3 12.3 97:54.00 oracle\n4116 oracle 16 0 618m 133m 124m S 0.3\
    \ 0.8 0:08.62 oracle\n20763 mscd642 15 0 609m 91m 88m S 0.3 0.6 0:00.26 oracle\n\
    1 root 15 0 10344 684 572 S 0.0 0.0 0:25.98 init\n2 root RT -5 0 0 0 S 0.0 0.0\
    \ 0:16.01 migration/0\n3 root 34 19 0 0 0 S 0.0 0.0 0:03.16 ksoftirqd/0\n```\n\
    \nThe process IDs of the top-consuming sessions are listed in the first column\
    \ (`PID`). You can use this process ID to see if it maps to a database process\
    \ (see the section in this chapter on mapping a PID to a database process).\n\n\
    While `top` is running, you can interactively change its output. For example,\
    \ if you type `>`, this will move the column that `top` is sorting one position\
    \ to the right. Table 22–3 lists some key features that you can use to alter the\
    \ `top` display to the desired format.\n\n***Table 22–3.** Commands to Interactively\
    \ Change the `top` Output*\n\n| **Command** | **Function** |\n| :--- | :--- |\n\
    | Spacebar | Immediately refreshes the output. |\n| `<` or `>` | Moves the sort\
    \ column one to the left or to the right. By default, `top` sorts on the CPU column.\
    \ |\n| `D` | Changes the refresh time. |\n| `R` | Reverses the sort order. |\n\
    | `Z` | Toggles the color output. |\n| `H` | Displays help menu. |\n| `F` or `O`\
    \ | Chooses a sort column. |\n| `e` | |\n| `q` or `Ctrl+C` | Exits `top`. |\n\n\
    Table 22–4 describes several of the columns displayed in the default output of\
    \ `top`.\n\n***Table 22–4.** Column Descriptions of the `top` Output*\n\n| **Column**\
    \ | **Description** |\n| :--- | :--- |\n| `PID` | Unique process identifier. |\n\
    | `USER` | OS username running the process. |\n| `PR` | Priority of the process.\
    \ |\n| `NI` | Nice value or process. Negative value means high priority. Positive\
    \ value means low priority. |\n| `VIRT` | Total virtual memory used by process.\
    \ |\n| `RES` | Nonswapped physical memory used. |\n| `SHR` | Shared memory used\
    \ by process. |\n| `S` | Process status. |\n| `%CPU` | Processes percent of CPU\
    \ consumption since last screen refresh. |\n| `%MEM` | Percent of physical memory\
    \ the process is consuming. |\n| `TIME` | Total CPU time used by process. |\n\
    | `TIME+` | Total CPU time, showing hundredths of seconds. |\n| `COMMAND` | Command\
    \ line used to start a process. |\n\nYou can also run `top` using the `-b` (batch\
    \ mode) option and send the output to a file for later analysis: `$ top –b > tophat.out`\n\
    \nWhile running in batch mode, the `top` command will run until you kill it (with\
    \ a `Ctrl+C`) or until it reaches a specified number of iterations. You could\
    \ run the previous `top` command in batch mode with a combination of `nohup` and\
    \ `&` to keep it running regardless if you were logged onto the system. The danger\
    \ there is that you might forget about it and eventually create a very large output\
    \ file (and an angry system administrator).\n\nIf you have a particular process\
    \ that you’re interesting in monitoring, use the `-p` option to monitor a process\
    \ ID or the `-U` option to monitor a specific username. You can also specify a\
    \ delay and number of iterations by using the `-d` and `-n` options. The following\
    \ example monitors the `oracle` user with a delay of 5 seconds for 25 iterations:\n\
    `$ top –u oracle –d 5 –n 25`\n\n■ **Tip** Use the `man top` or `top --help` commands\
    \ to list all the options available in your operating system version.\n\n### Mapping\
    \ an Operating System Process to a SQL Statement\n\nWhen identifying operating\
    \ system processes, it's useful to view which processes are consuming the most\
    \ amount of CPU. If the resource hog is a database process, it's also useful to\
    \ map the operating system process to a database job or query. To determine the\
    \ ID of the processes consuming the most CPU resources, use a command like `ps`,\
    \ like so:\n`$ ps -e -o pcpu,pid,user,tty,args | sort -n -k 1 -r | head`\n\nHere\
    \ is some sample output:\n```\n72.4 25922 mscd642 ? oracleE64215 (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))\n\
    1.5 28215 oracle ? oracleemrep (LOCAL=NO)\n0.2 24764 oracle ? /u01/oracle/product/11.0.0/grid/agent10g/bin/emagent\n\
    0.1 3179 oracle ? ora_j000_emrep\n```\n\nFrom the output, the operating system\
    \ session of `25922` is consuming the most CPU resources at 72.4 percent. In this\
    \ example, the `25922` process is associated with the `E64215` database. Next,\
    \ log onto the appropriate database and use the following SQL statement to determine\
    \ what type of program is associated with the operating system process of `25922`:\n\
    ```\nselect\n'USERNAME : ' || s.username|| chr(10) ||\n'OSUSER : ' || s.osuser\
    \ || chr(10) ||\n'PROGRAM : ' || s.program || chr(10) ||\n'SPID : ' || p.spid\
    \ || chr(10) ||\n'SID : ' || s.sid || chr(10) ||\n'SERIAL# : ' || s.serial# ||\
    \ chr(10) ||\n'MACHINE : ' || s.machine || chr(10) ||\n'TERMINAL : ' || s.terminal\n\
    from v$session s,\nv$process p\nwhere s.paddr = p.addr\nand p.spid = '&PID_FROM_OS';\n\
    ```\n\nWhen you run the example, SQL*Plus will prompt you for the value to use\
    \ in place of `&PID_FROM_OS`. In this example, you’ll enter `25922`. Here is the\
    \ output:\n```\n'USERNAME:'||S.USERNAME||CHR(10)||'OSUSER:'||S.OSUSER||CHR(10)||'PROGRAM:'||S.PR\n\
    USERNAME : SYS\nOSUSER : mscd642\nPROGRAM : sqlplus@ora04.regis.local (TNS V1-V3)\n\
    SPID : 25922\nSID : 139\nSERIAL# : 90\nMACHINE : ora04.regis.local\nTERMINAL :\
    \ pts/9\n```\n\nIn this output, the `PROGRAM` value is `sqlplus@ora04.regis.local`.\
    \ This indicates that a SQL*Plus session is the program consuming the inordinate\
    \ amount of resources on the server. Next, run the following query to display\
    \ the SQL statement associated with the operating system process ID (in this example,\
    \ the `SPID` is `25922`):\n```\nselect\n'USERNAME : ' || s.username || chr(10)\
    \ ||\n'OSUSER : ' || s.osuser || chr(10) ||\n'PROGRAM : ' || s.program || chr(10)\
    \ ||\n'SPID : ' || p.spid || chr(10) ||\n'SID : ' || s.sid || chr(10) ||\n'SERIAL#\
    \ : ' || s.serial# || chr(10) ||\n'MACHINE : ' || s.machine || chr(10) ||\n'TERMINAL\
    \ : ' || s.terminal || chr(10) ||\n'SQL TEXT : ' || q.sql_text\nfrom v$session\
    \ s\n,v$process p\n,v$sql q\nwhere s.paddr = p.addr\nand p.spid = '&PID_FROM_OS'\n\
    and s.sql_id = q.sql_id;\n```\n\nThe result shows the resource-consuming SQL as\
    \ part of the output in the `SQL TEXT` column:\n```\n'USERNAME:'||S.USERNAME||CHR(10)||'OSUSER:'||S.OSUSER||CHR(10)||'PROGRAM:'||S.PR\n\
    USERNAME : SYS\nOSUSER : mscd642\nPROGRAM : sqlplus@ora04.regis.local (TNS V1-V3)\n\
    SPID : 25922\nSID : 139\nSERIAL# : 90\nMACHINE : ora04.regis.local\nTERMINAL :\
    \ pts/9\nSQL TEXT : select a.table_name from dba_tables a,dba_indexes,dba_constraints\
    \ uni\n```\n\nWhen you run multiple databases on one server and are experiencing\
    \ server performance issues, it can sometimes be difficult to pinpoint which database\
    \ and associated process are causing the problems. In these situations, you have\
    \ to use an operating system tool to identify the top-consuming sessions on the\
    \ system.\n\nIn a Linux or Unix environment, you can use utilities such as `ps`,\
    \ `top`, or `vmstat` to identify top-consuming operating system processes. The\
    \ `ps` utility is handy because it lets you identify processes consuming the most\
    \ CPU or memory. The previous `ps` command identified the top consuming CPU processes.\
    \ Here, it’s used it to identify the top Oracle memory-using processes: `$ ps\
    \ -e -o pmem,pid,user,tty,args | grep -i oracle | sort -n -k 1 -r | head`\n\n\
    Once you have identified a top-consuming process associated with a database, you\
    \ can query the data dictionary views based on the server process ID to identify\
    \ what the database process is executing.\n\n![](index-644_1.png)\n\n## Displaying\
    \ Resource Intensive SQL\n\nAs mentioned in the prior section, the `V$SQL_MONITOR`\
    \ view is available with Oracle Database 11g or higher. If you're using an older\
    \ version of Oracle, you can query views like `V$SQLSTATS` to determine which\
    \ SQL statements are consuming inordinate amounts of resources. For example, use\
    \ the following query to identify the ten most resource-intensive queries based\
    \ on CPU time:\n```\nselect * from(\nselect\nsql_text\n,buffer_gets\n,disk_reads\n\
    ,sorts\n,cpu_time/1000000 cpu_sec\n,executions\n,rows_processed\nfrom v$sqlstats\n\
    order by cpu_time DESC)\nwhere rownum < 11;\n```\n\nIn the prior query, an inline\
    \ view is utilized to first retrieve all records and sorts the output by `CPU_TIME`\
    \ in descending order. The outer query then limits the result set to the top ten\
    \ rows using the `ROWNUM` pseudocolumn. The query can be easily modified to sort\
    \ by a column other than `CPU_TIME`. For example, if you want to report resource\
    \ usage by `BUFFER_GETS`, simply change the `ORDER BY` clause to use `BUFFER_GETS`\
    \ instead of `CPU_TIME`. The `CPU_TIME` column is calculated in microseconds;\
    \ to convert it to seconds, divided it by 1000000.\n\nThe `V$SQLSTATS` view displays\
    \ performance statistics for SQL statements that have recently executed. You can\
    \ also use `V$SQL` and `V$SQLAREA` to report on SQL resource usage. `V$SQLSTATS`\
    \ is faster and retains information for a longer period of time, but contains\
    \ only a subset of the columns in `V$SQL` and `V$SQLAREA`. Thus, there are scenarios\
    \ where you may want to query from `V$SQL` or `V$SQLAREA`. For example, if you\
    \ want to display information such as the user who first parsed the query, use\
    \ the `PARSING_USER_ID` column of `V$SQLAREA`:\n```\nselect * from(\nselect\n\
    b.sql_text\n,a.username\n,b.buffer_gets\n,b.disk_reads\n,b.sorts\n,b.cpu_time/1000000\
    \ cpu_sec\nfrom v$sqlarea b\n,dba_users a\nwhere b.parsing_user_id = a.user_id\n\
    order by b.cpu_time DESC)\nwhere rownum < 11;\n```\n\n## Running Oracle Diagnostic\
    \ Utilities\n\nOracle provides several utilities for diagnosing database performance\
    \ issues:\n\n• Automatic Workload Repository (AWR)\n• Automatic Database Diagnostic\
    \ Monitor (ADDM)\n• Active Session History (ASH)\n• Statspack\n\nAWR, ADDM, and\
    \ ASH were introduced in Oracle Database 10 *g*. These tools provide advanced\
    \ reporting capabilities that allow you to troubleshoot and resolve performance\
    \ issues. These new utilities require an extra license from Oracle. The older\
    \ Statspack utility is free and requires no license.\n\nAll of these tools rely\
    \ heavily on the underlying `V$` dynamic performance views. Oracle maintains a\
    \ vast collection of these views that track and accumulate metrics of database\
    \ performance. For example, if you run the following query, you’ll notice that\
    \ for Oracle Database 11 *g* release 2, there are 600 or so `V$` views:\n```\n\
    SQL> select count(*) from dictionary where table_name like 'V$%';\nCOUNT(*)\n\
    ----------\n       608\n```\n\nThe Oracle performance utilities rely on periodic\
    \ snapshots gathered from these internal performance views. Two of the most useful\
    \ views with regard to performance statistics are the `V$SYSSTAT` and `V$SESSTAT`\
    \ views. The `V$SYSSTAT` view contains over 400 types of database statistics.\
    \ This `V$SYSSTAT` view contains information about the entire database, whereas\
    \ the `V$SESSTAT` view contains statistics for individual sessions. A few of the\
    \ values in the `V$SYSSTAT` and `V$SESSTAT` views contain the current usage of\
    \ the resource. These values are:\n\n• `opened cursors current`\n• `logons current`\n\
    • `session cursor cache current`\n• `work area memory allocated`\n\nThe rest of\
    \ the values are cumulative. The values in `V$SYSSTAT` are cumulative for the\
    \ entire database from the time the instance was started. The values in `V$SESSTAT`\
    \ are cumulative per session from the time the session was started. Some of the\
    \ more important performance-related cumulative values are:\n\n• `CPU used`\n\
    • `consistent gets`\n• `physical reads`\n• `physical writes`\n\nFor the cumulative\
    \ statistics, the way to measure periodic usage is to note the value of a statistic\
    \ at a starting point, then note the value at a later point in time, and capture\
    \ the delta. This is the approach used by the Oracle performance utilities such\
    \ as AWR and Statspack. Periodically, Oracle will take a snapshot of the dynamic\
    \ wait interface views and store them in a repository.\n\nThe following sections\
    \ in this chapter detail how access AWR, ADDM, ASH, and Statspack from SQL*Plus.\n\
    \n■ **Tip** You can access AWR, ADDM, and ASH from Enterprise Manager. You may\
    \ find the Enterprise Manager screens more intuitive and efficient than using\
    \ SQL*Plus.\n\n### Using AWR\n\nAn AWR report is good for viewing the entire system\
    \ performance and identifying the top resource-consuming SQL queries. Run the\
    \ following script to generate an AWR report: `SQL> @?/rdbms/admin/awrrpt`\n\n\
    From the AWR output, identify top resource-consuming statements in the “SQL ordered\
    \ by Elapsed Time” or the “SQL ordered by CPU Time” sections of the report. Here\
    \ is some sample output:\n```\nSQL ordered by CPU Time\nDB/Inst: DWREP/DWREP \
    \ Snaps: 11384-11407\n-> Resources reported for PL/SQL code includes the resources\
    \ used by all SQL\n   statements called by the code.\n-> % Total DB Time is the\
    \ Elapsed Time of the SQL statement divided into the\n   Total Database Time multiplied\
    \ by 100\n   CPU      Elapsed    CPU per      % Total\n   Time (s) Time (s)  Executions\
    \  Exec (s)  DB Time   SQL Id\n---------- ---------- ------------ --------- -------\
    \ -------------\n      4,809     13,731           10    480.86     6.2 8wx77jyhdr31c\n\
    Module: JDBC Thin Client\nSELECT D.DERIVED_COMPANY ,CB.CLUSTER_BUCKET_ID ,CB.CB_NAME\
    \ ,CB.SOA_ID ,COUNT(*)\nTOTAL ,NVL(SUM(CASE WHEN F.D_DATE_ID > TO_NUMBER(TO_CHAR(SYSDATE-30,'YYYYMMDD'))\n\
    THEN 1 END), 0) RECENT ,NVL(D.BLACKLIST_FLG,0) BLACKLIST_FLG FROM F_DOWNLOADS\
    \ F\n,D_DOMAINS D ,D_PRODUCTS P ,PID_DF_ASSOC PDA ,( SELECT * FROM ( SELECT CLUSTER_\n\
    ```\n\nAs of Oracle Database 10 *g*, Oracle will automatically take a snapshot\
    \ of your database once an hour and populate the underlying AWR tables that store\
    \ the statistics. By default, seven days of statistics are retained.\n\nYou can\
    \ also generate an AWR report for a specific SQL statement by running the `awrsqrpt.sql`\
    \ report. When you run the following script, you will be prompted for the `SQL_ID`\
    \ of the query of interest: `SQL> @?/rdbms/admin/awrsqrpt.sql`\n\n### Using ADDM\n\
    \nThe ADDM report provides useful suggestions on which SQL statements are candidates\
    \ for tuning. Use the following SQL script to generate an ADDM report:\n`SQL>\
    \ @?/rdbms/admin/addmrpt`\n\nLook for the section of the report labeled “SQL statements\
    \ consuming significant database time.” Here is some sample output:\n```\nFINDING\
    \ 2: 29% impact (65043 seconds)\n------------------------------\nSQL statements\
    \ consuming significant database time were found.\n\n  RECOMMENDATION 1: SQL Tuning,\
    \ 6.7% benefit (14843 seconds)\n  ACTION: Investigate the SQL statement with SQL_ID\
    \ \"46cc3t7ym5sx0\" for\n          possible performance improvements.\n  RELEVANT\
    \ OBJECT: SQL statement with SQL_ID 46cc3t7ym5sx0 and\n          PLAN_HASH 1234997150\n\
    \    MERGE INTO d_files a\n    USING\n    ( SELECT\n```\n\nThe ADDM report analyzes\
    \ data in the AWR tables to identify potential bottlenecks and high resource-consuming\
    \ SQL queries.\n\n### Using ASH\n\nThe ASH report allows you to focus on short-lived\
    \ SQL statements that have been recently run and may have only executed for a\
    \ brief amount of time. Use the following script to generate an ASH report: `SQL>\
    \ @?/rdbms/admin/ashrpt`\n\nSearch the output for the section labeled “Top SQL.”\
    \ Here is some sample output:\n```\nSampled #\nSQL ID            Planhash    of\
    \ Executions % Activity\n----------------------- -------------------- --------------------\
    \ --------------\nEvent                     % Event Top Row Source           \
    \ % RwSrc\n---------------------------------------- ------- ---------------------------------\
    \ -------\n4k8runghhh31d            3219321046               12    51.61\nCPU\
    \ + Wait for CPU        51.61 HASH JOIN                       12.26\nselect countryimp0_.COUNTRY_ID\
    \ as COUNTRY_ID, countryimp0_.COUNTRY_NAME\n```\n\nThe previous output indicates\
    \ that the query is waiting for CPU resources. In this scenario, it may actually\
    \ be another query that is consuming the CPU resources that is the problem.\n\n\
    When is the ASH report more useful than the AWR or ADDM reports? The AWR and ADDM\
    \ output shows top-consuming SQL in terms of total database time. If the SQL performance\
    \ problem is transient and short-lived, it may not appear on the AWR and ADDM\
    \ reports. In these situations, an ASH report is more useful.\n\n### Using Statspack\n\
    \nIf you don’t have a license to use the AWR, ADDM, and ASH reports, the free\
    \ Statspack utility can help you identify poorly performing SQL statements. Run\
    \ the following script as `SYS` to install Statspack: `SQL> @?/rdbms/admin/spcreate.sql`\n\
    \nThis script creates a `PERFSTAT` user that owns the Statspack repository. To\
    \ enable the automatic gathering of Statspack statistics, run this script:\n`SQL>\
    \ @?/rdbms/admin/spauto.sql`\n\nAfter some snapshots have been gathered, you can\
    \ run the following script as the `PERFSTAT` user to create a Statspack report:\n\
    `SQL> @?/rdbms/admin/spreport.sql`\n\nOnce the report is created, search for the\
    \ section labeled “SQL ordered by CPU.” Here is some sample output:\n```\nSQL\
    \ ordered by CPU\nDB/Inst: DW11/DW11  Snaps: 11-14\n-> Total DB CPU (s): 107\n\
    -> Captured SQL accounts for  246.0% of Total DB CPU\n-> SQL reported below exceeded\
    \  1.0% of Total DB CPU\n   CPU      CPU per        Elapsd                   \
    \  Old\n  Time (s)  Executions   Exec (s)  %Total   Time (s)  Buffer Gets    Hash\
    \ Value\n---------- ------------ ---------- ------ ---------- ---------------\
    \ ------------\n    254.95            4      63.74  238.1     249.74         \
    \ 12,811   2873951798\nModule: SQL*Plus\nselect count(*) from dba_indexes, dba_tables\n\
    ```\n\n■ **Tip** View the `ORACLE_HOME/rdbms/admin/spdoc.txt` file for Statspack\
    \ documentation.\n\n## Detecting and Resolving Locking Issues\n\nSometimes a developer\
    \ or application user will report that a process that normally takes seconds to\
    \ run is now taking several minutes and doesn't appear to be doing anything. In\
    \ these situations, the problem is usually one of the following:\n\n• Space related\
    \ issue (for example, archive redo destination is full and has suspended all transactions).\n\
    • One process has a lock on a row in a table and is not committing or rolling\
    \ back, thus preventing another session from modifying the same row.\n\nIn this\
    \ scenario, I first check the `alert.log` to see if there are any obvious issues\
    \ that have occurred recently (like a tablespace not being able to allocate another\
    \ extent). If there is nothing obvious in the `alert.log` file, I run a SQL query\
    \ to check for locking issues. The query listed here is a more sophisticated version\
    \ of the lock detecting script introduced in Chapter 3. This query shows information\
    \ such as the locking session SQL statement and the waiting SQL statement:\n```\n\
    set lines 80\ncol blkg_user form a10\ncol blkg_machine form a10\ncol blkg_sid\
    \ form 99999999\ncol wait_user form a10\ncol wait_machine form a10\ncol wait_sid\
    \ form 9999999\ncol obj_own form a10\ncol obj_name form a10\ncol blkg_sql form\
    \ a50\ncol wait_sql form a50\n--\nselect\ns1.username   blkg_user\n,s1.machine\
    \   blkg_machine\n,s1.sid       blkg_sid\n,s1.serial#   blkg_serialnum\n,s1.process\
    \   blkg_OS_PID\n,substr(b1.sql_text,1,50) blkg_sql\n,chr(10)\n,s2.username  \
    \ wait_user\n,s2.machine    wait_machine\n,s2.sid        wait_sid\n,s2.serial#\
    \    wait_serialnum\n,s2.process    wait_OS_PID\n,substr(w1.sql_text,1,50) wait_sql\n\
    ,lo.object_id  blkd_obj_id\n,do.owner      obj_own\n,do.object_name obj_name\n\
    from v$lock l1\n,v$session s1\n,v$lock l2\n,v$session s2\n,v$locked_object lo\n\
    ,v$sqlarea b1\n,v$sqlarea w1\n,dba_objects do\nwhere s1.sid = l1.sid\nand s2.sid\
    \ = l2.sid\nand l1.id1 = l2.id1\nand s1.sid = lo.session_id\nand lo.object_id\
    \ = do.object_id\nand l1.block = 1\nand s1.prev_sql_addr = b1.address\nand s2.sql_address\
    \ = w1.address\nand l2.request > 0;\n```\n\nThe output from this query does not\
    \ fit well on one page. When running this query, you will have to format it so\
    \ that it fits within the size of your terminal. Here is some sample output indicating\
    \ that the `INV` table is locked by the `STAR2` user and that the `CIA_SEL` user\
    \ is waiting for the lock to be released:\n```\nBLKG_USER  BLKG_MACHI   BLKG_SID\
    \ BLKG_SERIALNUM BLKG_OS_PID\n---------- ---------- --------- -------------- ------------\n\
    BLKG_SQL                                                               C\n--------------------------------------------------\
    \ -\nWAIT_USER  WAIT_MACHI\n---------- ----------\nWAIT_SID  WAIT_SERIALNUM WAIT_OS_PID\n\
    --------  -------------- ------------\nWAIT_SQL                              \
    \                               BLKD_OBJ_ID OBJ_OWN\n--------------------------------------------------\
    \ ----------- ----------\nOBJ_NAME\nupdate star2.inv set inv_id=3 where inv_id=7\
    \                                150553 STAR2\nINV\n```\n\nThis situation is typical\
    \ when applications don't explicitly issue a `COMMIT` or `ROLLBACK` at appropriate\
    \ times in the code. This leaves a lock on a row and prevents one transaction\
    \ from continuing until the lock is released. In this scenario, you can try to\
    \ locate the user who is blocking the transaction and see if they need to push\
    \ a button on the screen that says something like \"commit your changes.\" If\
    \ that's not possible, you can manually kill one of the sessions. Keep in mind\
    \ that terminating a session may have unforeseen side effects (like rolling back\
    \ data that a user thought was committed).\n\nIf you decide to kill one of the\
    \ sessions, you need to identify the `SID` and serial number of the session you\
    \ want to terminate. Once identified, use the `ALTER SYSTEM KILL SESSION` statement\
    \ to terminate a user session. In this example, I decide to kill the lock held\
    \ by the `STAR2` user with the `SID` of `1072` and a serial number of `29`, so\
    \ from a DBA privileged account I run the following statement: `SQL> alter system\
    \ kill session '1084,265';`\n\nAgain, be careful when killing sessions. Ensure\
    \ that you know the impact of killing a session and thereby rolling back any active\
    \ transactions currently open in that session.\n\nThe other way to kill a session\
    \ is to use an operating system command such as `kill`. From the prior output,\
    \ you can identify the operating system processes from the `BLKG_OS_PID` column\
    \ and `WAIT_OS_PID` column. Before you terminate a process from the operating\
    \ system, ensure that it isn't a critical process.\n\nFor this example, to terminate\
    \ the blocking OS process, first check the blocking process ID: `$ ps -ef | grep\
    \ 3153`\n\nHere is some sample output:\n`oracle   3153   1690  0 10:40:30 pts/1\
    \    0:00 sqlplus star2....`\n\nNext use the `kill` command as shown:\n`$ kill\
    \ -9 3153`\n\nThe `kill` command will unceremoniously terminate a process. Any\
    \ open transactions associated with the process will be rolled back by the Oracle\
    \ process monitor.\n\n## Resolving Open Cursor Issues\n\nThe `OPEN_CURSORS` initialization\
    \ parameter determines the maximum number of cursors a session can have open.\
    \ This setting is per each session. The default value of 50 is usually too low\
    \ for any application.\n\nWhen an application exceeds the number of open cursors\
    \ allowed, the following error is thrown:\n`ORA-01000: maximum open cursors exceeded`\n\
    \nUsually the prior error is encountered when:\n\n• `OPEN_CURSORS` initialization\
    \ parameter is set too low.\n• Developers write code that doesn't close cursors\
    \ properly.\n\nTo investigate this issue, first determine the current setting\
    \ of the parameter: `SQL> show parameter open_cursors;`\n\nIf the value is less\
    \ than 300, consider setting it higher. I typically set this value to 1000 for\
    \ busy OLTP systems. You can dynamically modify this value while your database\
    \ is open as shown: `SQL> alter system set open_cursors=1000;`\n\nIf you're using\
    \ an `spfile`, consider making the change both in memory and in the `spfile` at\
    \ the same time:\n`SQL> alter system set open_cursors=1000 scope=both;`\n\nAfter\
    \ setting `OPEN_CURSORS` to a higher value, if the application still continues\
    \ to exceed the maximum value, you probably have an issue with code that is not\
    \ properly closing cursors. Run a query such as the following to determine the\
    \ number of open cursors each session has opened:\n```\nselect\na.value\n,c.username\n\
    ,c.machine\n,c.sid\n,c.serial#\nfrom v$sesstat a\n,v$statname b\n,v$session c\n\
    where a.statistic# = b.statistic#\nand c.sid = a.sid\nand b.name = 'opened cursors\
    \ current'\nand a.value != 0\nand c.username IS NOT NULL\norder by 1,2;\n```\n\
    \n■ **Tip** I recommend that you query `V$SESSION` instead of `V$OPEN_CURSOR`\
    \ to determine the number of open cursors. `V$SESSION` provides a more accurate\
    \ number of the cursors currently open.\n\nIf you work in an environment that\
    \ has thousands of connections to the database, you may want to view only the\
    \ top cursor-consuming sessions. The following query uses an inline view and the\
    \ pseudocolumn `ROWNUM` to display the top twenty values:\n```\nselect * from\
    \ (\nselect\na.value\n,c.username\n,c.machine\n,c.sid\n,c.serial#\nfrom v$sesstat\
    \ a\n,v$statname b\n,v$session c\nwhere a.statistic# = b.statistic#\nand c.sid\
    \ = a.sid\nand b.name = 'opened cursors current'\nand a.value != 0\nand c.username\
    \ IS NOT NULL\norder by 1 desc,2)\nwhere rownum < 21;\n```\n\nIf a single session\
    \ has over 1000 open cursors, there is probably something in the code that is\
    \ not closing a cursor. When this limit is reached, somebody should inspect the\
    \ application code to determine if a cursor is not being closed.\n\n## Troubleshooting\
    \ Undo Tablespace Issues\n\nProblems with the undo tablespace are usually of the\
    \ following nature:\n\n• `ORA-01555: snapshot too old`\n• `ORA-30036: unable to\
    \ extend segment by ... in undo tablespace 'UNDOTBS1'`\n\nThe prior listed errors\
    \ can be caused by many different issues such as the undo tablespace not being\
    \ sized correctly or poorly written SQL or PL/SQL code.\n\n### Determining if\
    \ Undo is Correctly Sized\n\nSuppose that you have a long-running SQL statement\
    \ that is throwing an `ORA-01555` “snapshot too old” error and you want to determine\
    \ if adding space to the undo tablespace might help alleviate the issue.\n\nRun\
    \ this next query to identify potential issues with your undo tablespace. The\
    \ query checks for issues with the undo tablespace that have occurred within the\
    \ last day:\n```\nselect\nto_char(begin_time,'MM-DD-YYYY HH24:MI') begin_time\n\
    ,ssolderrcnt ORA_01555_cnt\n,nospaceerrcnt no_space_cnt\n,txncount max_num_txns\n\
    ,maxquerylen max_query_len\n,expiredblks blck_in_expired\nfrom v$undostat\nwhere\
    \ begin_time > sysdate - 1\norder by begin_time;\n```\n\nHere is some sample output.\
    \ Part of the output has been omitted to fit this on the page:\n```\nBEGIN_TIME\
    \       ORA_01555_CNT NO_SPACE_CNT MAX_NUM_TXNS MAX_QUERY_LEN\n----------------\
    \ ------------- ------------ ------------ -------------\n07-20-2009 18:10    \
    \         0            0          249             0\n07-20-2009 18:20        \
    \     0            0          290             0\n07-20-2009 18:30            \
    \ 0            0          244             0\n07-20-2009 18:40             0  \
    \          0          179             0\n```\n\nThe `ORA_01555_CNT` column indicates\
    \ the number of times your database has encountered the `ORA-01555` “snapshot\
    \ too old” error. If this column reports a non-zero value, you need to do one\
    \ or more of the following:\n\n• Ensure that code does not contain `COMMIT` statements\
    \ within cursor loops.\n• Tune the SQL statement throwing the error so that it\
    \ runs faster.\n• Ensure that you have good statistics (so your SQL runs efficiently).\n\
    • Increase the `UNDO_RETENTION` initialization parameter.\n\nThe `NO_SPACE_CNT`\
    \ column displays the number of times space was requested in the undo tablespace\
    \ but none was to be found. If the `NO_SPACE_CNT` is reporting a non-zero value,\
    \ you may need to add more space to your undo tablespace.\n\nThere is a maximum\
    \ of four days’ worth of information stored in the `V$UNDOSTAT` view. The statistics\
    \ are gathered every ten minutes for a maximum of 576 rows in the table. If you’ve\
    \ stopped and started your database within the last four days, this view will\
    \ only have information in it from the time you last started your database.\n\n\
    Another way to get advice on the undo tablespace sizing is to use the Oracle Undo\
    \ Advisor, which you can invoke by querying the PL/SQL `DBMS_UNDO_ADV` package\
    \ from a `SELECT` statement. The following query displays the current undo size\
    \ and the recommended size for an undo retention setting of 900 seconds:\n```\n\
    select\nsum(bytes)/1024/1024 cur_mb_size\n,dbms_undo_adv.required_undo_size(900)\
    \ req_mb_size\nfrom dba_data_files\nwhere tablespace_name =\n(select\nvalue\n\
    from v$parameter\nwhere name = 'undo tablespace');\n```\n\nHere is some sample\
    \ output:\n```\nCUR_MB_SIZE REQ_MB_SIZE\n----------- -----------\n      36864\
    \       20897\n```\n\nThe output shows that the undo tablespace currently has\
    \ 36.8 gigabytes allocated to it. In the prior query, you used 900 seconds as\
    \ the amount of time to retain information in the undo tablespace. To retain undo\
    \ information for 900 seconds, the Oracle Undo Advisor estimates that the undo\
    \ tablespace should be 20.8 gigabytes. For this example, the undo tablespace is\
    \ sized adequately. If it were not sized adequately, you would either have to\
    \ add space to an existing datafile or add a datafile to the undo tablespace.\n\
    \nHere’s a slightly more complex example of using the Oracle Undo Advisor to find\
    \ the required size of the undo tablespace. This example uses PL/SQL to display\
    \ information about potential issues and recommendations to fix the problem:\n\
    ```\nSET SERVEROUT ON SIZE 1000000\nDECLARE\n  pro VARCHAR2(200);\n  rec VARCHAR2(200);\n\
    \  rtn VARCHAR2(200);\n  ret NUMBER;\n  utb NUMBER;\n  retval NUMBER;\nBEGIN\n\
    \  DBMS_OUTPUT.PUT_LINE(DBMS_UNDO_ADV.UNDO_ADVISOR(1));\n  DBMS_OUTPUT.PUT_LINE('Required\
    \ Undo Size (megabytes): ' || DBMS_UNDO_ADV.REQUIRED_UNDO_SIZE(900));\n  retval\
    \ := DBMS_UNDO_ADV.UNDO_HEALTH(pro, rec, rtn, ret, utb);\n  DBMS_OUTPUT.PUT_LINE('Problem:\
    \ ' || pro);\n  DBMS_OUTPUT.PUT_LINE('Advice: ' || rec);\n  DBMS_OUTPUT.PUT_LINE('Rational:\
    \ ' || rtn);\n  DBMS_OUTPUT.PUT_LINE('Retention: ' || TO_CHAR(ret));\n  DBMS_OUTPUT.PUT_LINE('UTBSize:\
    \ ' || TO_CHAR(utb));\nEND;\n/\n```\n\nIf no issues are found, a 0 will be returned\
    \ for the retention size. Here is some sample output:\n```\nFinding 1:The undo\
    \ tablespace is OK.\nRequired Undo Size (megabytes): 20897\nProblem: No problem\
    \ found\nAdvice:\nRational:\nRetention: 0\nUTBSize: 0\n```\n\n### Viewing SQL\
    \ that is Consuming Undo Space\n\nSometimes a piece of code does not commit properly,\
    \ which results in large amounts of space being allocated in the undo tablespace\
    \ and never being released. Sooner or later you'll get the `ORA-30036` error indicating\
    \ that the tablespace can't extend. Usually the first time a space related error\
    \ is thrown, I simply increase the size of one of the datafiles associated with\
    \ the undo tablespace.\n\nHowever, if a SQL statement continues to run and fills\
    \ up the newly added space, then the issue is probably with a poorly written application.\
    \ For example, a developer might not have appropriate commit statements in the\
    \ code.\n\nIn these situations it's helpful to identify which users are consuming\
    \ space in the undo tablespace. Run this query to report on basic information\
    \ regarding space allocated on a per user basis:\n```\nselect\ns.sid\n,s.serial#\n\
    ,s.osuser\n,s.logon_time\n,s.status\n,s.machine\n,t.used_ublk\n,t.used_ublk*16384/1024/1024\
    \ undo_usage_mb\nfrom v$session s\n,v$transaction t\nwhere t.addr = s.taddr;\n\
    ```\n\nIf you want to view the SQL statement associated with the user consuming\
    \ undo space, then join to `V$SQL` as shown:\n```\nselect\ns.sid\n,s.serial#\n\
    ,s.osuser\n,s.logon_time\n,s.status\n,s.machine\n,t.used_ublk\n,t.used_ublk*16384/1024/1024\
    \ undo_usage_mb\n,q.sql_text\nfrom v$session s\n,v$transaction t\n,v$sql q\nwhere\
    \ t.addr = s.taddr\nand s.sql_id = q.sql_id;\n```\n\nIf you need more information,\
    \ such as the name and status of the rollback segment, run a query that joins\
    \ to the `V$ROLLNAME` and `V$ROLLSTAT` views, like so:\n```\nselect\ns.sid\n,s.serial#\n\
    ,s.username\n,s.program\n,r.name undo_name\n,rs.status\n,rs.rssize/1024/1024 redo_size_mb\n\
    ,rs.extents\nfrom v$session s\n,v$transaction t\n,v$rollname r\n,v$rollstat rs\n\
    where s.taddr = t.addr\nand t.xidusn = r.usn\nand r.usn = rs.usn;\n```\n\nThe\
    \ prior queries allow you to pinpoint which users are responsible for space allocated\
    \ within the undo tablespace. This can be especially useful when there is code\
    \ that is not committing at appropriate times and is excessively consuming undo\
    \ space.\n\n## Handling Temporary Tablespace Issues\n\nIssues with temporary tablespaces\
    \ are somewhat easy to spot. For example, when the temporary tablespace runs out\
    \ of space, the following error will be thrown:\n`ORA-01652: unable to extend\
    \ temp segment by 128 in tablespace TEMP`\n\nWhen you see this error, you need\
    \ to determine if there's enough space in the temporary tablespace or if it's\
    \ a rare runaway SQL query that has temporarily consumed an inordinate amount\
    \ of temp space. Both of these issues are discussed in the following sections.\n\
    \n### Determining if Temporary Tablespace is Sized Correctly\n\nThe temporary\
    \ tablespace is used as a sorting area on disk when a process has consumed the\
    \ available memory and needs more space. Operations that require a sorting area\
    \ include:\n\n• Index creation\n• SQL sorting operations\n• Temporary tables and\
    \ temporary indexes\n• Temporary LOBs\n• Temporary B-trees\n\nThere is no exact\
    \ formula for determining if your temporary tablespace is sized correctly. It\
    \ depends on the number and types of queries, index build operations, parallel\
    \ operations, and size of your memory sort space (program global area). You’ll\
    \ have to monitor your temporary tablespace while there is a load on your database\
    \ to determine its usage patterns. If you are using Oracle Database 11 *g* or\
    \ higher, run the following query to show both the allocated and free space within\
    \ the temporary tablespace:\n```\nselect\ntablespace_name\n,tablespace_size/1024/1024\
    \ mb_size\n,allocated_space/1024/1024 mb_alloc\n,free_space/1024/1024 mb_free\n\
    from dba_temp_free_space;\n```\n\nHere is some sample output:\n```\nTABLESPACE_NAME\
    \                MB_SIZE   MB_ALLOC    MB_FREE\n------------------------------\
    \ -------- ---------- ----------\nTEMP                               200     \
    \   200        170\n```\n\nIf the `FREE_SPACE` (`MB_FREE`) value drops to near\
    \ zero, there are SQL operations in your database consuming most of the available\
    \ space. The `FREE_SPACE` (`MB_FREE`) column is the total free space available,\
    \ including space currently allocated and available for reuse.\n\nIf you are using\
    \ an Oracle Database 10 *g* database, run this query to view space being used\
    \ in your temporary tablespace:\n```\nselect\ntablespace_name\n,sum(bytes_used)/1024/1024\
    \ mb_used\nfrom v$temp_extent_pool\ngroup by tablespace_name;\n```\n\nHere is\
    \ some sample output:\n```\nTABLESPACE_NAME                  MB_USED\n------------------------------\
    \ ----------\nTEMP                                 120\n```\n\nIf the used amount\
    \ is getting near your current allocated amount, you may need to allocate more\
    \ space to the temporary tablespace datafiles. Run the following query to view\
    \ the temporary datafile names and allocated sizes:\n`SQL> select name, bytes/1024/1024\
    \ mb_alloc from v$tempfile;`\n\nHere is some typical output:\n```\nNAME      \
    \                                            MB_ALLOC\n--------------------------------------------------\
    \ ----------\n/ora02/DWREP/temp01.dbf                                12000\n/ora03/DWREP/temp03.dbf\
    \                                10240\n/ora01/DWREP/temp02.dbf              \
    \                   2048\n```\n\nWhen first creating a database, if I have no\
    \ idea as to \"correct\" size of the temporary tablespace, I'll usually size this\
    \ tablespace at something like 2GB. If I'm building a data warehouse type database,\
    \ I might size the temporary tablespace at something like 20GB. You'll have to\
    \ monitor your temporary tablespace with the appropriate SQL and adjust the size\
    \ as necessary.\n\n### Viewing SQL that is Consuming Temporary Space\n\nWhen Oracle\
    \ throws the `ORA-01652` “unable to extend temp” error, it’s one indicator that\
    \ your temporary tablespace is too small. However, Oracle may throw that error\
    \ if it runs out of space because of a one-time event, like a large index build.\
    \ You’ll have to decide whether a one-time index build or a query that consumes\
    \ large amounts of sort space in the temporary tablespace warrants adding space.\n\
    \nTo view the space a session is using in the temporary tablespace, run this query:\n\
    ```\nSELECT\n    s.sid\n    ,s.serial#\n    ,s.username\n    ,p.spid\n    ,s.module\n\
    \    ,p.program\n    ,SUM(su.blocks) * tbsp.block_size/1024/1024 mb_used\n   \
    \ ,su.tablespace\nFROM v$sort_usage su\n    ,v$session s\n    ,dba_tablespaces\
    \ tbsp\n    ,v$process p\nWHERE su.session_addr = s.saddr\n  AND su.tablespace\
    \ = tbsp.tablespace_name\n  AND s.paddr = p.addr\nGROUP BY\n    s.sid, s.serial#,\
    \ s.username, s.osuser, p.spid, s.module,\n    p.program, tbsp.block_size, su.tablespace\n\
    ORDER BY s.sid;\n```\n\nIf you determine that you need to add space, you can either\
    \ resize an existing datafile or add a new datafile. To resize a temporary tablespace\
    \ datafile, use the `ALTER DATABASE TEMPFILE...RESIZE` statement. The following\
    \ resizes a temporary datafile to 12GB:\n`SQL> alter database tempfile '/ora03/DWREP/temp03.dbf'\
    \ resize 12g;`\n\nYou can add a datafile to a temporary tablespace as follows:\n\
    `SQL> alter tablespace temp add tempfile '/ora04/DWREP/temp04.dbf' size 2g;`\n\
    \n## Auditing\n\n*Auditing* usually means creating a record whenever a certain\
    \ event happens. Activities that are typically audited include:\n\n• When a table\
    \ is inserted into, selected from, updated, or deleted from.\n• User logon/logoff\
    \ times.\n• What SQL was used to update a table.\n• When was an index last used.\n\
    \nAuditing is especially helpful when troubleshooting security issues with the\
    \ database. Auditing gives you information to diagnose what objects are accessed\
    \ by which users and when. This gives you a mechanism to detect and report on\
    \ unauthorized actions or security breaches. For this reason, many databases are\
    \ required to enable some degree of auditing to comply with regulatory agencies\
    \ or internal company security requirements.\n\nAuditing can also help with diagnosing\
    \ some performance issues. For example, knowing what SQL ran and when or how many\
    \ users are connected to the database at a specific time will help with diagnosing\
    \ and resolving some issues.\n\nThere are several different ways to enable auditing:\n\
    \n• Setting database initialization parameters.\n• Oracle Standard Auditing enabled\
    \ via the `AUDIT` SQL statement.\n• Enabling fine-grained auditing.\n• Using data\
    \ dictionary views.\n• Custom DBA developed triggers that populate columns or\
    \ tables based on certain events.\n\nI'm not going to cover every aspect of auditing\
    \ in the prior list (that would be a large amount of documentation). Rather, I'll\
    \ show the basic techniques that DBAs use to audit databases. If you need more\
    \ details, see the Oracle *Database Security Guide* (available on Oracle's OTN\
    \ website).\n\n### Enabling Oracle Standard Auditing\n\nOracle Standard Auditing\
    \ allows you to audit nearly any type of SQL activity in the database. You can\
    \ audit any type of insert, update, delete, or select on a tables. You can also\
    \ audit any system privilege activity such as `CREATE TABLE`, `DROP INDEX`, and\
    \ so on.\n\nYou can enable auditing `BY ACCESS` or `BY SESSION`. Prior to Oracle\
    \ Database 11 *g* release 2, the `BY SESSION` would record just one record per\
    \ session for an auditing action. With the current version of Oracle, the `BY\
    \ SESSION` will record multiple records for the same auditing action.\n\nYou can\
    \ also enable auditing by `WHENEVER SUCCESSFUL` or `WHENEVER NOT SUCCESSFUL`.\
    \ This allows you to audit specifically for the success or failure of a particular\
    \ statement.\n\nOracle's Standard Auditing feature is enabled through setting\
    \ the `AUDIT_TRAIL` initialization parameter. I usually set the `AUDIT_TRAIL`\
    \ parameter to `DB`, which specifies that Oracle will write audit records to an\
    \ internal database table named `AUD$`. For example, when using an `spfile`, here's\
    \ how to set the `AUDIT_TRAIL` parameter:\n`SQL> alter system set audit_trail=db\
    \ scope=spfile;`\n\nIf you are using an `init.ora` file, open it with a text editor\
    \ and set the `AUDIT_TRAIL` value to `DB`. See Table 22–5 for a description of\
    \ valid values for the `AUDIT_TRAIL` parameter.\n\n■ **Tip** I typically set the\
    \ `AUDIT_TRAIL` parameter to `DB` even if I'm not doing any auditing. This way\
    \ when I want to enable auditing for a specific action, I can do so without having\
    \ to stop and re-start the database.\n\n***Table 22–5.** Valid `AUDIT_TRAIL` Settings*\n\
    \n| **Setting** | **Meaning** |\n| :--- | :--- |\n| `DB` | Enables auditing and\
    \ sets the `SYS.AUD$` table as the audit repository. |\n| `DB_EXTENDED` | Enables\
    \ auditing and sets the `SYS.AUD$` table as the audit repository and includes\
    \ the `SQLTEXT` and `SQLBIND` columns. This is useful for viewing the actual SQL\
    \ statement that was issued. Be careful when using this option as it will consume\
    \ much more space. In prior releases of Oracle, the parameter was specified as\
    \ `'DB, EXTENDED'`. |\n| `OS` | Enables auditing and specifies that an operating\
    \ system file will store auditing information. |\n| `XML` | Enables auditing and\
    \ writes audit records in XML format to an OS file. |\n| `NONE` | Disables database\
    \ auditing. |\n\nYou must stop and start your database for the `AUDIT_TRAIL` parameter\
    \ to take effect:\n```\nSQL> shutdown immediate;\nSQL> startup;\nSQL> show parameter\
    \ audit_trail;\nNAME                                 TYPE        VALUE\n------------------------------------\
    \ ----------- ------------------------------\naudit_trail                    \
    \      string      DB\n```\n\nAfter you've set the `AUDIT_TRAIL` parameter, no\
    \ actual auditing events are enabled. You have to use the `AUDIT` statement to\
    \ control auditing for specific database events. Examples of enabling auditing\
    \ are shown in the next few sections.\n\n■ **Tip** Set the database initialization\
    \ parameter `AUDIT_SYS_OPERATIONS` to `TRUE`. This ensures that all `SYS` activities\
    \ are logged to files in the directory specified by `AUDIT_FILE_DEST` (regardless\
    \ of the setting of `AUDIT_TRAIL`). This provides you with a simple and effective\
    \ method for auditing the `SYS` user.\n\n### Auditing DML Usage\n\nSometimes it's\
    \ handy when troubleshooting disk space or performance issues to know which tables\
    \ in the database are actually being used by the application. If you've inherited\
    \ a database that contains hundreds of tables, it may not be obvious which objects\
    \ are being accessed. The idea is that if you can identify tables that are not\
    \ being used, then you can rename and eventually drop them so that you can free\
    \ up space and have less objects cluttering up your database.\n\nAuditing allows\
    \ you to capture the types of SQL statements being used to access a table. For\
    \ example, the following statement enables auditing on all DML access to the `EMP`\
    \ table owned by `INV_MGMT`:\n`SQL> audit select, insert, update, delete on inv_mgmt.emp;`\n\
    \nFrom this point on, any DML access to the `INV_MGMT.EMP` table will be recorded\
    \ in the `SYS.AUD$` table. You can use a query such as this to report on DML access\
    \ to a table:\n```\nselect\nusername\n,obj_name\n,timestamp\n,substr(ses_actions,4,1)\
    \ del\n,substr(ses_actions,7,1) ins\n,substr(ses_actions,10,1) sel\n,substr(ses_actions,11,1)\
    \ upd\nfrom dba_audit_object;\n```\n\nIn the prior SQL statement, notice the use\
    \ of the `SUBSTR` function to reference the `SES_ACTIONS` column of the `DBA_AUDIT_OBJECT`\
    \ view. That column contains a 16-character string in which each character means\
    \ that a certain operation has occurred. The 16 characters represent the following\
    \ operations in this order: `ALTER`, `AUDIT`, `COMMENT`, `DELETE`, `GRANT`, `INDEX`,\
    \ `INSERT`, `LOCK`, `RENAME`, `SELECT`, `UPDATE`, `REFERENCES`, and `EXECUTE`.\
    \ Positions 14, 15, and 16 are reserved by Oracle for future use. The character\
    \ of `S` represents success, `F` represents failure, and `B` represents both success\
    \ and failure.\n\nOnce you have identified tables that are not being used, you\
    \ can simply rename the tables and see if this breaks the application or if any\
    \ users complain. If there are no complaints, then after some time you can consider\
    \ dropping the tables. Make sure you take a good backup of your database with\
    \ both RMAN and Data Pump before you drop any tables you might have to later recover.\n\
    \nTo turn off auditing on an object, use the `NOAUDIT` statement:\n`SQL> noaudit\
    \ select, insert, update, delete on inv_mgmt.inv;`\n\n■ **Tip** If you simply\
    \ need to know whether a table is being inserted, updated, or deleted from, you\
    \ can use the `USER_TAB_MODIFICATIONS` view to report on that type of activity.\
    \ This view has columns such as `INSERTS`, `UPDATES`, `DELETES`, and `TRUNCATED`\
    \ that will provide information as to how data in the table is being modified.\n\
    \n### Auditing Logon/Logoff Events\n\nOne basic security auditing technique is\
    \ to record all user logon and logoff activity in the database. This allows the\
    \ auditor to determine who was using the database and when. This information is\
    \ critical when diagnosing security breaches and unauthorized actions.\n\nUse\
    \ the `BY ACCESS` clause of `AUDIT` to enable auditing of logon and logoff activities,\
    \ like so:\n`SQL> audit create session by access;`\n\nNow every user that logs\
    \ on and logs off the database will result in a record being inserted into the\
    \ `AUD$` table. You can report on logon and logoff activity with a query such\
    \ as this:\n```\nselect\nusername\n,action_name\n,to_char(timestamp,'dd-mon-yyyy\
    \ hh24:mi:ss') event_time\n,to_char(logoff_time,'dd-mon-yyyy hh24:mi:ss') logoff_time\n\
    from dba_audit_trail;\n```\n\nHere is some sample output:\n```\nUSERNAME     ACTION_NAME\
    \    EVENT_TIME             LOGOFF_TIME\n------------ -------------- ----------------------\
    \ --------------------------\nLARRY        LOGON          08-oct-2010 16:18:45\n\
    LARRY        LOGOFF         08-oct-2010 16:18:49 08-oct-2010 16:18:49\nDW_MAINT\
    \     LOGON          08-oct-2010 16:19:33\n```\n\nYou can enable logon and logoff\
    \ access for a specific user by specifying the username: `SQL> audit session by\
    \ larry by access;`\n\nYou can disable logon/logoff auditing as shown:\n`SQL>\
    \ noaudit create session;`\n\nTo disable logon/logoff for individual sessions,\
    \ specify the username: `SQL> noaudit session by larry;`\n\nAnother way to audit\
    \ connections is via the `CONNECT` option of `AUDIT`, like so: `SQL> audit connect;`\n\
    \nTo disable this option, run this SQL:\n`SQL> noaudit connect;`\n\nThe prior\
    \ techniques provide a way to quickly enable the auditing of connections to the\
    \ database. This can be useful when troubleshooting security violations or application\
    \ issues.\n\nNOTE: **Some DBAs enable auditing of logon and logoff through an\
    \ `AFTER LOGON ON DATABASE` trigger and `BEFORE LOGOFF ON DATDABASE` trigger that\
    \ inserts into a custom table. I'm not a fan of this approach because it requires\
    \ custom objects and custom code. Why write code to achieve something that Oracle\
    \ already has a simple and effective solution? Furthermore, if there is an issue\
    \ with the trigger or custom table, you may find that you can't logon to Oracle\
    \ anymore. Not good.**\n\n### Viewing Enabled Audit Actions\n\nThere are several\
    \ data dictionary views that allow you to view what auditing actions have been\
    \ enabled.\n\nUse the following query to enabled auditing at the privilege level:\n\
    ```\nselect\nuser_name\n,privilege\n,success\n,failure\nfrom dba_priv_audit_opts;\n\
    ```\n\nHere is some sample output:\n```\nUSER_NAME              PRIVILEGE    \
    \                  SUCCESS    FAILURE\n---------------------- ------------------------------\
    \ ---------- ----------\n                       CREATE ANY PROCEDURE         \
    \  BY ACCESS  BY ACCESS\n                       CREATE PROCEDURE             \
    \  BY ACCESS  BY ACCESS\n                       DELETE ANY TABLE             \
    \  BY SESSION BY SESSION\n```\n\nRun the following query to view statement level\
    \ auditing actions:\n```\nselect\nuser_name\n,audit_option\n,success\n,failure\n\
    from dba_stmt_audit_opts;\n```\n\nThe next query audits object level auditing\
    \ actions. For this example, only a small subset of the columns available is selected\
    \ (to keep the output on one page):\n```\nselect\nowner\n,object_name\n,object_type\n\
    ,alt\n,del\n,upd\nfrom dba_obj_audit_opts;\n```\n\nHere is some sample output:\n\
    ```\nOWNER      OBJECT_NAME   OBJECT_TYPE ALT    DEL    UPD\n---------- -------------\
    \ ----------- ------ ------ ------\nSYS        AUD$          TABLE       -/- \
    \   S/S    -/-\n```\n\nIn the prior output, a dash (`-`) means the audit option\
    \ is not enabled, an `S` indicates that the audit option by session is enabled,\
    \ and an `A` indicates that the audit action is enabled by access. For each option,\
    \ there are two possible settings: `WHENEVER SUCCESSFUL` and `WHENEVER NOT SUCCESSFUL`.\
    \ These are separated by a forward slash. So in the prior output, auditing by\
    \ delete from the `AUD$` table is enabled by session for both successful and unsuccessful\
    \ statements.\n\n### Turning Auditing Off\n\nTo permanently disable auditing,\
    \ set the `AUDIT_TRAIL` initialization parameter to `none`:\n`SQL> alter system\
    \ set audit_trail='none' scope=spfile;`\n\nNow stop and restart your database\
    \ to turn off Oracle's Standard Auditing feature.\n\n■ **Note** Some database\
    \ events are always audited (regardless of the setting of `AUDIT_TRAIL`) such\
    \ as connections as `SYSDBA` or `SYSOPER` and database startup and shutdown events.\n\
    \nIf you only want to disable features that you have previously enabled with `AUDIT`,\
    \ then use the `NOAUDIT` statement to turn off specific auditing events. For example,\
    \ the following statement turns off all statement auditing that was enabled via\
    \ an `AUDIT ALL` statement:\n`SQL> noaudit all;`\n\nThis next example turns off\
    \ the auditing of privileges:\n`SQL> noaudit all privileges;`\n\nYou can turn\
    \ off specific auditing actions. For example, say you had previously enabled auditing\
    \ on a table like this:\n`SQL> audit delete any table;`\n\nYou can turn off the\
    \ prior auditing like this:\n`SQL> noaudit delete any table;`\n\nYou can also\
    \ use SQL to generate SQL to turn off auditing. The following script generates\
    \ a script that can be used to turn off all statement auditing:\n```\nset head\
    \ off pages 0\nspo turn_off_audit.sql\nselect 'noaudit ' || audit_option || ';'\n\
    from dba_stmt_audit_opts;\nspo off;\n```\n\n### Purging the Audit Table and Files\n\
    \nYou should periodically purge the `AUD$` table so that it doesn’t consume inordinate\
    \ amounts of space in your `SYSTEM` tablespace. (To move the `AUD$` table out\
    \ of the `SYSTEM` tablespace, see the next section.) The easiest way to purge\
    \ audit records is to delete from or truncate the audit table. This example truncates\
    \ the `AUD$` table:\n`SQL> truncate table aud$;`\n\nIf you need to save the `AUD$`\
    \ data, you can first export the table and then use the `TRUNCATE` command to\
    \ remove records. If you want to preserve newer records in the `AUD$` table, then\
    \ use a `DELETE` statement. For example, this deletes records over 21 days old:\n\
    `SQL> delete from aud$ where timestamp# > sysdate + 21;`\n\nIf you need to remove\
    \ audit records from the operating system, use the Linux/Unix `find` command to\
    \ identify files over a certain age and then remove them. First, determine the\
    \ directory location of the audit files:\n```\nSQL> select value from v$parameter\
    \ where name='audit_file_dest';\nVALUE\n/oracle/app/oracle/product/11.2.0/db_1/rdbms/audit\n\
    ```\n\nNow from the operating system, navigate to the audit file directory and\
    \ identify and remove audit files over a certain age:\n`$ cd /oracle/app/oracle/product/11.2.0/db_1/rdbms/audit`\n\
    \nUse the `find` and `rm` command to remove any files over a certain age. The\
    \ following command removes any files with the extension of `.aud` from the current\
    \ working directory that are over seven days old:\n`$ find . -maxdepth 1 -type\
    \ f -mtime +7 -name \"*.aud\" | xargs rm`\n\nThe prior technique permanently removes\
    \ files from the operating system. Ensure that you're in the correct location\
    \ and that the audit files are no longer needed.\n\nKeep in mind that you can\
    \ use the `DBMS_AUDIT_MGMT` package to purge audit trail records and audit trail\
    \ files. I personally prefer to truncate and remove files manually as shown in\
    \ this section because it's simple and efficient. If you want to use the `DBMS_AUDIT_MGMT`\
    \ package to manage your audit space, see the *Oracle Database Security* guide\
    \ (available on Oracle's OTN site) for more details.\n\n### Moving the Audit Table\
    \ to a Non-System Tablespace\n\nIf you're going to do an extensive amount of auditing,\
    \ I recommend moving the `AUD$` table to a non-SYSETM tablespace. You may want\
    \ to do this so that auditing actions doesn’t impact the space used in the `SYSTEM`\
    \ tablespace or affect the performance of the `SYSTEM` tablespace.\n\nUse the\
    \ `DBMS_AUDIT_MGMT` package to move the `AUD$` table to a separate tablespace.\
    \ This example moves the `AUD$` table to a tablespace named `AUD_TBSP`:\n```\n\
    BEGIN\n  DBMS_AUDIT_MGMT.SET_AUDIT_TRAIL_LOCATION(\n    AUDIT_TRAIL_TYPE => DBMS_AUDIT_MGMT.AUDIT_TRAIL_AUD_STD,\n\
    \    AUDIT_TRAIL_LOCATION_VALUE => 'AUD_TBSP');\nEND;\n/\n```\n\nIn the prior\
    \ PL/SQL code, the `AUDIT_TRAIL_TYPE` parameter can have the following values:\n\
    \n• `DBMS_AUDIT_MGMT.AUDIT_TRAIL_AUD_STD` moves just the standard audit trail\
    \ `AUD$` table.\n• `DBMS_AUDIT_MGMT.AUDIT_TRAIL_FGA_STD` moves just the fine-grained\
    \ audit trail `FGA_LOG$` table.\n• `DBMS_AUDIT_MGMT.AUDIT_TRAIL_DB_STD` moves\
    \ both standard and fine-grained audit trail tables.\n\nBe aware that the previous\
    \ PL/SQL can take a long time if there are numerous records in the `AUD$` table.\
    \ You can verify that the table was moved correctly via this query: `SQL> select\
    \ table_name, tablespace_name from dba_tables where table_name='AUD$';`\n\n■ **Tip**\
    \ If you want to manually move the `AUD$` table to a non-`SYSTEM` tablespace,\
    \ refer to My Oracle Support note 72460.1 for instructions. Be aware that manually\
    \ moving the `AUD$` table is not supported by Oracle Support and may cause issues\
    \ when upgrading your database. I only mention it because I know many DBAs who\
    \ manually move the `AUD$` table. If you're maintaining a database that you inherited\
    \ from other DBAs, you need to be aware of this type of activity.\n\n### Auditing\
    \ at a Granular Level\n\n*Fine-grained auditing* (FGA auditing) is a separate\
    \ feature from regular database auditing. Fine-grained auditing allows you to\
    \ audit SQL at a more granular level than simple `INSERT`, `UPDATE`, `DELETE`,\
    \ and `SELECT` operations. FGA auditing allows you to audit for SQL activities\
    \ that occur at the column level. FGA auditing also allows you to perform a Boolean\
    \ check on an operation, such as “if the value selected is in a range then audit\
    \ the activity.”\n\nYou manage fine-grained auditing through the use of FGA policies.\
    \ The `DBMS_FGA` package allows you to add, disable, enable, and drop FGA policies.\
    \ You need execute privilege on the `DBMS_FGA` package to administer audit policies.\n\
    \n■ **Note** The fine-grained auditing feature requires the Enterprise Edition\
    \ of Oracle.\n\nThe follow are the steps to implement FGA:\n\n1.  Create a policy\
    \ using the `DBMS_FGA` package. This example creates a policy for the `INV` table\
    \ and specifies that any `INSERT`, `UPDATE`, `DELETE`, or `SELECT` statement against\
    \ the `SALARY` column of the `EMP` table will be recorded in the audit trail:\n\
    ```\nbegin\n  dbms_fga.add_policy (\n    object_schema   => 'INV',\n    object_name\
    \     => 'EMP',\n    audit_column    => 'SALARY',\n    policy_name     => 'S1_AUDIT',\n\
    \    statement_types => 'INSERT, UPDATE, DELETE, SELECT',\n    audit_trail   \
    \  => DBMS_FGA.DB_EXTENDED\n  );\nend;\n/\n```\n2.  Verify that the policy exists\
    \ by querying the `DBA_AUDIT_POLICIES` view:\n```\nselect object_schema\n    \
    \  ,object_name\n      ,policy_name\n      ,sel, ins, upd, del\n      ,policy_column\n\
    from dba_audit_policies;\n```\nHere’s the output for this example:\n```\nOBJECT_SCHEMA\
    \  OBJECT_NAME  POLICY_NAME  SEL INS UPD DEL POLICY_COL\n-------------- ------------\
    \ ------------ --- --- --- --- ----------\nINV            EMP          S1_AUDIT\
    \     YES YES YES YES SALARY\n```\n3.  To view the recorded SQL statements in\
    \ the FGA audit trail, select from the `DBA_FGA_AUDIT_TRAIL` view:\n```\nselect\n\
    db_user\n,to_char(timestamp,'dd-mon-yy hh24:mi:ss') ts\n,sql_text\nfrom dba_fga_audit_trail\n\
    order by timestamp;\n```\n■ **Note** The `DBA_FGA_AUDIT_TRAIL` view is based on\
    \ the `FGA_LOG$` table.\nHere’s some sample output:\n```\nDB_USER  TS        \
    \        SQL_TEXT\n-------- ----------------- --------------------------\nINV\
    \      21-jul-09 21:47:07 select * from emp\nSYSTEM   21-jul-09 21:58:36 select\
    \ salary from inv.emp\n```\n\nIf you need to disable a policy, use the `DISABLE_POLICY`\
    \ procedure:\n`SQL> exec dbms_fga.disable_policy('INV','EMP','S1_AUDIT');`\n\n\
    To drop a policy, use the `DROP_POLICY` procedure:\n`SQL> exec dbms_fga.drop_policy('INV','EMP','S1_AUDIT');`\n\
    \nAs the `SYS` schema you can purge records from the fine-grained auditing audit\
    \ table as follows: `SQL> truncate table fga_log$;`\n\n■ **Tip** For more details\
    \ on fine-grained auditing, see Oracle’s Security Guide available on Oracle's\
    \ OTN website."
  raw: "# view alert log\n\nfunction valert {\n\necho $ORACLE_HOME | grep 11 >/dev/null\n\
    \nif [ $? -eq 0 ]; then\n\nlower_sid=$(echo $ORACLE_SID | tr '[:upper:]' '[:lower:]')\n\
    \nview $ORACLE_BASE/diag/rdbms/$lower_sid/$ORACLE_SID/trace/alert_$ORACLE_SID.log\
    \ else\n\nview $ORACLE_BASE/admin/$ORACLE_SID/bdump/alert_$ORACLE_SID.log\n\n\
    fi\n\n} # valert\n\n#-----------------------------------------------------------#\n\
    \nUsually the prior lines of code are placed in a startup file so that the function\
    \ is automatically defined when you logon to a server. Once defined, you can view\
    \ the alert.log by typing in: $ valert\n\nWhen inspecting the bottom of the alert.log,\
    \ look for errors that indicate issues with:\n\n• Archiver process hung due to\
    \ inadequate disk space.\n\n• File system out of space.\n\n• Tablespace out of\
    \ space.\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\n• Running out of memory in\
    \ the buffer cache or shared pool.\n\n• Media error indicating a datafile is missing\
    \ or damaged.\n\n• For example, here's an error indicating there is an issue writing\
    \ an archive redo log:\n\nORA-19502: write error on file \"/ora01/fra/O11R2/archivelog/...\n\
    \nFor a serious error message listed in the alert.log file there is almost always\
    \ a corresponding trace file. For example, here is the accompanying message to\
    \ the prior error message: Errors in file\n\n/oracle/app/oracle/diag/rdbms/o11r2/O11R2/trace/O11R2_arc0_4485.trc\n\
    \nInspecting the trace file will often (but not always) provide additional insight\
    \ into the issue.\n\nViewing the alert.log Using the ADRCI Utility\n\nIf you're\
    \ using Oracle Database 11 *g* or higher, you can use the ADRCI utility to view\
    \ the contents of the alert.log file. Run the following command from the operating\
    \ system to start the ADRCI utility: $ adrci\n\nYou should be presented with a\
    \ prompt:\n\nadrci>\n\nUse the SHOW ALERT command to view the alert.log file:\n\
    \nadrci> show alert\n\nIf there are multiple Oracle homes on the server, then\
    \ you will be prompted to choose which alert.log you want to view. The SHOW ALERT\
    \ command will open up the alert.log with the utility that has been set as the\
    \ default editor for your operating system. On Linux/Unix systems, the default\
    \ editor is derived from the operating system EDITOR variable (which is usually\
    \ set to an utility such as vi).\n\n■ **Tip** When presented with the alert.log,\
    \ if you are unfamiliar with vi, and want to exit, first hit the escape key, then\
    \ press and hold down the shift key while also pressing the : key. Then type in\
    \ a q!. That should exit you out of the vi editor and back to the ADRCI prompt.\n\
    \nYou can override the default editor within ADRCI using the SET EDITOR command.\
    \ This example sets the default editor to emacs:\n\nadrci> set editor emacs\n\n\
    You can view the last N number of lines in the alert.log with the TAIL option.\
    \ The following command displays the last 50 lines of the alert.log:\n\nadrci>\
    \ show alert -tail 50\n\nIf you have multiple Oracle homes, you may see a message\
    \ like this:\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nDIA-48449: Tail alert\
    \ can only apply to single ADR home\n\nThe ADRCI utility doesn't assume that you\
    \ want to work with one Oracle home over another on a server. To specifically\
    \ set the Oracle home (for the ADRCI utility), first use the SHOW HOMES command\
    \ to display all available Oracle homes:\n\nadrci> show homes\n\nHere is some\
    \ sample output for this server:\n\ndiag/rdbms/e64208/E64208\n\ndiag/rdbms/e64211/E64211\n\
    \ndiag/rdbms/e64214/E64214\n\nNow to specifically set the Oracle home, use the\
    \ SET HOMEPATH command. This sets the HOMEPATH to diag/rdbms/e64208/E64208:\n\n\
    adrci> set homepath diag/rdbms/e64208/E64208\n\nTo continuously display the end\
    \ of the file, use the following command: adrci> show alert -tail -f\n\nPress\
    \ Ctrl+C to break out of continuously viewing the alert.log file. To display lines\
    \ from the alert.log that contains specific strings, use the MESSAGE_TEXT LIKE\
    \ command. This example shows messages that contain the ORA-27037 string:\n\n\
    adrci> show alert -p \"MESSAGE_TEXT LIKE '%ORA-27037%'\"\n\nYou will be presented\
    \ with a file that contains all lines in the alert.log that match the specified\
    \ string.\n\n■ **Tip** See the Oracle Database Utilities guide for full details\
    \ on how to use the ADRCI utility.\n\nIdentifying Bottlenecks via Operating System\
    \ Utilities\n\nIn the Oracle world, there is sometimes a tendency to assume that\
    \ you have a dedicated machine for one Oracle database. Furthermore, this database\
    \ is the latest version of Oracle, fully patched, and monitored by a sophisticated\
    \ graphical tool. This database environment is completely automated and kept trouble\
    \ free through the use of visual tools that quickly pinpoint problems and efficiently\
    \ isolate and resolve issues. If you live in this ideal world, then you probably\
    \ don't need any of the material in this chapter.\n\nLet me paint a slightly different\
    \ picture. I have an environment where one machine has a dozen databases running\
    \ on it. There's a MySQL database, a PostgreSQL database, and a mix of Oracle\
    \ version 9i, version 10g, and version 11g databases. Furthermore, many of these\
    \ old databases are on non-terminal releases of Oracle and are therefore technically\
    \ not supported by Oracle Support. There are no plans to upgrade any of these\
    \ unsupported databases because the business can't take the risk of potentially\
    \ breaking the applications that depend on these databases.\n\nSo what does one\
    \ do in this type of environment when somebody reports that a database application\
    \ is performing poorly? In this scenario, it's often something else in a different\
    \ database that is causing other applications on the box to behave poorly. It\
    \ may not be an Oracle process or an Oracle databases that is causing problems.\n\
    \nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nIn this situation, it's almost always\
    \ more effective to start investigating issues by using an operating system tool.\
    \ The OS tools are database agnostic. OS performance utilities help pinpoint where\
    \ the most resources are consumed regardless of database vendor or version.\n\n\
    In Linux/Unix environments, there are several tools available for monitoring resource\
    \ usage.\n\nTable 22–1 summarizes the most commonly used OS utilities for diagnosing\
    \ performance issues. Being familiar with how these operating system commands\
    \ work and how to interpret the output will allow you to better diagnose server\
    \ performance issues, especially when it's a non-Oracle or even a non-database\
    \ process that is tanking performance for every other application on the box.\n\
    \n***Table 22–1.** Performance and Monitoring Utilities*\n\n**Tool**\n\n**Purpose**\n\
    \nvmstat\n\nMonitors processes, CPU, memory, or disk I/O bottlenecks.\n\ntop\n\
    \nIdentifies sessions consuming the most resources.\n\nwatch\n\nPeriodically runs\
    \ another command.\n\nps\n\nIdentifies highest CPU- and memory-consuming sessions.\
    \ Used to identify Oracle sessions consuming the most system resources.\n\nmpstat\n\
    \nReports CPU statistics.\n\nsar\n\nDisplays CPU, memory, disk I/O, and network\
    \ usage, both current and\n\nhistorical.\n\nfree\n\nDisplays free and used memory.\n\
    \ndf\n\nReports on free disk space.\n\ndu\n\nDisplays disk usage.\n\niostat\n\n\
    Displays disk I/O statistics.\n\nnetstat\n\nReports on network statistics.\n\n\
    When diagnosing performance issues, it's useful to determine where the operating\
    \ system is constrained. For example, try to identify whether the issue is related\
    \ to CPU, memory, I/O, or a combination of these resources.\n\nIdentifying System\
    \ Bottlenecks\n\nWhenever there are application performance issues or availability\
    \ problems, seemingly (from the DBA’s perspective) the first question asked is,\
    \ what’s wrong with the database? Regardless of the source of the problem, the\
    \ onus is often on the DBA to either prove or disprove whether the database is\
    \ behaving well.\n\nI usually approach this issue by determining what system-wide\
    \ resources are being consumed. There are two Linux/Unix operating system tools\
    \ that are particularly useful for displaying system wide resource usage:\n\n\
    CHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\n• vmstat\n\n• top\n\nThe vmstat (virtual\
    \ memory statistics) tool is intended to help you quickly identify bottlenecks\
    \ on your server. The top utility provides a dynamic real-time view of system\
    \ resource usage. These two utility are discussed in the next two subsections.\n\
    \nUsing vmstat\n\nThe vmstat utility displays real-time performance information\
    \ about processes, memory, paging, disk I/O, and CPU usage. This example shows\
    \ using vmstat to display the default output with no options specified:\n\n$ vmstat\n\
    \nprocs -----------memory---------- ---swap-- -----io---- --system-- ----cpu----\n\
    \nr b swpd free buff cache si so bi bo in cs us sy id wa 14 0 52340 25272 3068\
    \ 1662704 0 0 63 76 9 31 15 1 84 0\n\nHere are some general heuristics you can\
    \ use when interpreting the output of vmstat:\n\n• If the wa (time waiting for\
    \ I/O) column is high, this is usually an indication that the storage subsystem\
    \ is overloaded.\n\n• If b (processes sleeping) is consistently greater than 0,\
    \ then you may not have enough CPU processing power.\n\n• If so (memory swapped\
    \ out to disk) and si (memory swapped in from disk) are consistently greater than\
    \ 0, you may have a memory bottleneck.\n\nBy default, only one line of server\
    \ statistics is displayed when running vmstat (without supplying any options).\
    \ This one line of output displays average statistics calculated from the last\
    \ time the system was rebooted. This is fine for a quick snapshot. However, if\
    \ you want to gather metrics over a period of time, use vmstat with this syntax:\n\
    \n$ vmstat <interval in seconds> <number of intervals>\n\nWhile in this mode,\
    \ vmstat reports statistics sampling from one interval to the next. For example,\
    \ if you wanted to report system statistics every two seconds for ten intervals,\
    \ you’d issue this command: $ vmstat 2 10\n\nYou can also send the vmstat output\
    \ to a file. This is useful for analyzing historical performance over a period\
    \ of time. This example samples statistics every 5 seconds for a total of 60 reports\
    \ and records the output in a file:\n\n$ vmstat 5 60 > vmout.perf\n\nAnother useful\
    \ way to use vmstat is with the watch tool. The watch command is used to execute\
    \ another program on a periodic basis. This example uses watch to run the vmstat\
    \ command every five seconds and to highlight on the screen any differences between\
    \ each snapshot: $ watch –n 5 –d vmstat\n\nEvery 5.0s: vmstat Thu Aug 9 13:27:57\
    \ 2007\n\nprocs -----------memory---------- ---swap-- -----io---- --system-- ----cpu----\n\
    \nr b swpd free buff cache si so bi bo in cs us sy id wa 0 0 144 15900 64620 1655100\
    \ 0 0 1 7 16 4 0 0 99 0\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nWhen running\
    \ vmstat in watch -d (differences) mode, you’ll visually see changes on your screen\
    \ as they alter from snapshot to snapshot. To exit from watch, press Ctrl+C.\n\
    \nNote that the default unit of measure for the memory columns of vmstat is in\
    \ kilobytes. If you want to view memory statistics in megabytes, then use the\
    \ –S m (statistics in megabytes) option: $ vmstat –S m\n\nFor reference, Table\
    \ 22–2 details the meanings of the columns displayed in the default output of\
    \ vmstat.\n\n***Table 22–2.** Column Descriptions of vmstat Output*\n\n**Column**\n\
    \n**Description**\n\nr\n\nNumber of processes waiting for runtime\n\nb\n\nNumber\
    \ of processes in uninterruptible sleep\n\nswpd\n\nTotal virtual memory (swap)\
    \ in use (KB)\n\nfree\n\nTotal idle memory (KB)\n\nbuff\n\nTotal memory used as\
    \ buffers (KB)\n\ncache\n\nTotal memory used as cache (KB)\n\nsi\n\nMemory swapped\
    \ in from disk (KB/s)\n\nso\n\nMemory swapped out to disk (KB/s)\n\nbi\n\nBlocks\
    \ read in (blocks/s) from block device\n\nbo\n\nBlocks written out (blocks/s)\
    \ per second to block device\n\nin\n\nInterrupts per second\n\ncs\n\nContext switches\
    \ per second\n\nus\n\nUser-level code time as a percentage of total CPU time\n\
    \nsy\n\nSystem level code time as a percentage of total CPU time\n\nid\n\nIdle\
    \ time as a percentage of total CPU time\n\nwa\n\nTime waiting for I/O completion\n\
    \nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nUsing top\n\nAnother tool for identifying\
    \ resource-intensive processes is the top command. Use this utility to quickly\
    \ identify which processes are the highest consumers of resources on the server.\
    \ By default, top will repetitively refresh (every three seconds) information\
    \ regarding the most CPU-intensive processes.\n\nHere’s the simplest way to run\
    \ top:\n\n$ top\n\nHere’s a fragment of the output:\n\ntop - 21:05:39 up 43 days,\
    \ 23:45, 8 users, load average: 1.10, 0.87, 0.72\n\nTasks: 576 total, 2 running,\
    \ 574 sleeping, 0 stopped, 0 zombie\n\nCpu(s): 0.1%us, 0.2%sy, 0.0%ni, 98.8%id,\
    \ 0.8%wa, 0.0%hi, 0.0%si, 0.0%st Mem: 16100352k total, 12480204k used, 3620148k\
    \ free, 38016k buffers Swap: 18481144k total, 380072k used, 18101072k free, 8902940k\
    \ cached PID USER PR NI VIRT RES SHR S %CPU %MEM TIME+ COMMAND\n\n9236 mscd642\
    \ 15 0 13000 1468 812 R 0.7 0.0 0:00.03 top\n\n3179 oracle 16 0 2122m 1.9g 1.9g\
    \ S 0.3 12.3 97:54.00 oracle\n\n4116 oracle 16 0 618m 133m 124m S 0.3 0.8 0:08.62\
    \ oracle\n\n20763 mscd642 15 0 609m 91m 88m S 0.3 0.6 0:00.26 oracle\n\n1 root\
    \ 15 0 10344 684 572 S 0.0 0.0 0:25.98 init\n\n2 root RT -5 0 0 0 S 0.0 0.0 0:16.01\
    \ migration/0\n\n3 root 34 19 0 0 0 S 0.0 0.0 0:03.16 ksoftirqd/0\n\nThe process\
    \ IDs of the top-consuming sessions are listed in the first column (PID). You\
    \ can use this process ID to see if it maps to a database process (see the section\
    \ in this chapter on mapping a PID to a database process).\n\nWhile top is running,\
    \ you can interactively change its output. For example, if you type >, this will\
    \ move the column that top is sorting one position to the right. Table 22–3 lists\
    \ some key features that you can use to alter the top display to the desired format.\n\
    \n***Table 22–3.** Commands to Interactively Change the top Output* **Command**\n\
    \n**Function**\n\nSpacebar\n\nImmediately refreshes the output.\n\n< or >\n\n\
    Moves the sort column one to the left or to the right. By default, top sorts on\
    \ the CPU column.\n\nD\n\nChanges the refresh time.\n\nR\n\nReverses the sort\
    \ order.\n\nZ\n\nToggles the color output.\n\nH\n\nDisplays help menu.\n\nF or\
    \ O\n\nChooses a sort column.\n\ne\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\n\
    Type q or press Ctrl+C to exit top. Table 22–4 describes several of the columns\
    \ displayed in the default output of top.\n\n***Table 22–4.** Column Descriptions\
    \ of the top Output*\n\n**Column**\n\n**Description**\n\nPID\n\nUnique process\
    \ identifier.\n\nUSER\n\nOS username running the process.\n\nPR\n\nPriority of\
    \ the process.\n\nNI\n\nNice value or process. Negative value means high priority.\
    \ Positive value means low priority.\n\nVIRT\n\nTotal virtual memory used by process.\n\
    \nRES\n\nNonswapped physical memory used.\n\nSHR\n\nShared memory used by process.\n\
    \nS Process\n\nstatus.\n\n%CPU\n\nProcesses percent of CPU consumption since last\
    \ screen refresh.\n\n%MEM\n\nPercent of physical memory the process is consuming.\n\
    \nTIME\n\nTotal CPU time used by process.\n\nTIME+\n\nTotal CPU time, showing\
    \ hundredths of seconds.\n\nCOMMAND\n\nCommand line used to start a process.\n\
    \nYou can also run top using the -b (batch mode) option and send the output to\
    \ a file for later analysis: $ top –b > tophat.out\n\nWhile running in batch mode,\
    \ the top command will run until you kill it (with a Ctrl+C) or until it reaches\
    \ a specified number of iterations. You could run the previous top command in\
    \ batch mode with a combination of nohup and & to keep it running regardless if\
    \ you were logged onto the system. The danger there is that you might forget about\
    \ it and eventually create a very large output file (and an angry system administrator).\n\
    \nIf you have a particular process that you’re interesting in monitoring, use\
    \ the -p option to monitor a process ID or the -U option to monitor a specific\
    \ username. You can also specify a delay and number of iterations by using the\
    \ -d and -n options. The following example monitors the oracle user with a delay\
    \ of 5 seconds for 25 iterations:\n\n$ top –u oracle –d 5 –n 25\n\nCHAPTER 22\
    \ ■ DATABASE TROUBLESHOOTING\n\n■ **Tip** Use the man top or top --help commands\
    \ to list all the options available in your operating system version.\n\nMapping\
    \ an Operating System Process to a SQL Statement\n\nWhen identifying operating\
    \ system processes, it's useful to view which processes are consuming the most\
    \ amount of CPU. If the resource hog is a database process, it's also useful to\
    \ map the operating system process to a database job or query. To determine the\
    \ ID of the processes consuming the most CPU resources, use a command like ps,\
    \ like so:\n\n$ ps -e -o pcpu,pid,user,tty,args | sort -n -k 1 -r | head\n\nHere\
    \ is some sample output:\n\n72.4 25922 mscd642 ? oracleE64215 (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))\
    \ 1.5 28215 oracle ? oracleemrep (LOCAL=NO)\n\n0.2 24764 oracle ? /u01/oracle/product/11.0.0/grid/agent10g/bin/emagent\
    \ 0.1 3179 oracle ? ora_j000_emrep\n\nFrom the output, the operating system session\
    \ of 25922 is consuming the most CPU resources at 72.4 percent. In this example,\
    \ the 25922 process is associated with the E64215 database. Next, log onto the\
    \ appropriate database and use the following SQL statement to determine what type\
    \ of program is associated with the operating system process of 25922:\n\nselect\n\
    \n'USERNAME : ' || s.username|| chr(10) ||\n\n'OSUSER : ' || s.osuser || chr(10)\
    \ ||\n\n'PROGRAM : ' || s.program || chr(10) ||\n\n'SPID : ' || p.spid || chr(10)\
    \ ||\n\n'SID : ' || s.sid || chr(10) ||\n\n'SERIAL# : ' || s.serial# || chr(10)\
    \ ||\n\n'MACHINE : ' || s.machine || chr(10) ||\n\n'TERMINAL : ' || s.terminal\n\
    \nfrom v$session s,\n\nv$process p\n\nwhere s.paddr = p.addr\n\nand p.spid = '&PID_FROM_OS';\n\
    \nWhen you run the example, SQL*Plus will prompt you for the value to use in place\
    \ of &PID_FROM_OS.\n\nIn this example, you’ll enter 25922\\. Here is the output:\n\
    \n'USERNAME:'||S.USERNAME||CHR(10)||'OSUSER:'||S.OSUSER||CHR(10)||'PROGRAM:'||S.PR\n\
    \nUSERNAME : SYS\n\nOSUSER : mscd642\n\nPROGRAM : sqlplus@ora04.regis.local (TNS\
    \ V1-V3)\n\nSPID : 25922\n\nSID : 139\n\nSERIAL# : 90\n\nMACHINE : ora04.regis.local\n\
    \nTERMINAL : pts/9\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nIn this output,\
    \ the PROGRAM value is sqlplus@ora04.regis.local. This indicates that a SQL*Plus\
    \ session is the program consuming the inordinate amount of resources on the server.\
    \ Next, run the following query to display the SQL statement associated with the\
    \ operating system process ID (in this example, the SPID is 25922):\n\nselect\n\
    \n'USERNAME : ' || s.username || chr(10) ||\n\n'OSUSER : ' || s.osuser || chr(10)\
    \ ||\n\n'PROGRAM : ' || s.program || chr(10) ||\n\n'SPID : ' || p.spid || chr(10)\
    \ ||\n\n'SID : ' || s.sid || chr(10) ||\n\n'SERIAL# : ' || s.serial# || chr(10)\
    \ ||\n\n'MACHINE : ' || s.machine || chr(10) ||\n\n'TERMINAL : ' || s.terminal\
    \ || chr(10) ||\n\n'SQL TEXT : ' || q.sql_text\n\nfrom v$session s\n\n,v$process\
    \ p\n\n,v$sql q\n\nwhere s.paddr = p.addr\n\nand p.spid = '&PID_FROM_OS'\n\nand\
    \ s.sql_id = q.sql_id;\n\nThe result shows the resource-consuming SQL as part\
    \ of the output in the SQL TEXT column:\n\n'USERNAME:'||S.USERNAME||CHR(10)||'OSUSER:'||S.OSUSER||CHR(10)||'PROGRAM:'||S.PR\n\
    \nUSERNAME : SYS\n\nOSUSER : mscd642\n\nPROGRAM : sqlplus@ora04.regis.local (TNS\
    \ V1-V3)\n\nSPID : 25922\n\nSID : 139\n\nSERIAL# : 90\n\nMACHINE : ora04.regis.local\n\
    \nTERMINAL : pts/9\n\nSQL TEXT : select a.table_name from dba_tables a,dba_indexes,dba_constraints\
    \ uni When you run multiple databases on one server and are experiencing server\
    \ performance issues, it can sometimes be difficult to pinpoint which database\
    \ and associated process are causing the problems.\n\nIn these situations, you\
    \ have to use an operating system tool to identify the top-consuming sessions\
    \ on the system.\n\nIn a Linux or Unix environment, you can use utilities such\
    \ as ps, top, or vmstat to identify top-consuming operating system processes.\
    \ The ps utility is handy because it lets you identify processes consuming the\
    \ most CPU or memory. The previous ps command identified the top consuming CPU\n\
    \nprocesses. Here, it’s used it to identify the top Oracle memory-using processes:\
    \ $ ps -e -o pmem,pid,user,tty,args | grep -i oracle | sort -n -k 1 -r | head\
    \ Once you have identified a top-consuming process associated with a database,\
    \ you can query the data dictionary views based on the server process ID to identify\
    \ what the database process is executing.\n\n![](index-644_1.png)\n\nCHAPTER 22\
    \ ■ DATABASE TROUBLESHOOTING\n\n---------- ------------- --------- ----------\
    \ ----------- ---------- ---------------\n\n139 d07nngmx93rq7 DONE 331.88 5708\
    \ 3490 select count(*) 130 9dtu8zn9yy4uc EXECUTING 11.55 5710 248 select task_name\
    \ In the query, an inline view is utilized to first retrieve all records and organize\
    \ them by CPU_TIME in descending order. The outer query then limits the result\
    \ set to the top twenty rows using the ROWNUM\n\npseudocolumn. You can modify\
    \ the previous query to order by the statistic of your choice or modify it to\
    \ display only the queries that are currently executing. For example, the next\
    \ SQL statement monitors currently executing queries ordered by the number of\
    \ disk reads:\n\nselect * from (\n\nselect\n\na.sid session_id\n\n,a.sql_id\n\n\
    ,a.status\n\n,a.cpu_time/1000000 cpu_sec\n\n,a.buffer_gets\n\n,a.disk_reads\n\n\
    ,substr(b.sql_text,1,15) sql_text\n\nfrom v$sql_monitor a\n\n,v$sql b\n\nwhere\
    \ a.sql_id = b.sql_id\n\nand a.status='EXECUTING'\n\norder by a.disk_reads desc)\n\
    \nwhere rownum <=20;\n\n **The statistics in V$SQL_MONITOR are updated every second\
    \ so you can view resource consumption as it changes. These statistics are gathered\
    \ by default if a SQL statement runs in parallel or consumes more than 5 seconds\
    \ of CPU or I/O time.\n\nThe V$SQL_MONITOR view includes a subset of statistics\
    \ contained in the V$SQL, V$SQLAREA, and V$SQLSTATS views. The V$SQL_MONITOR view\
    \ displays real-time statistics for each execution of a resource-intensive SQL\
    \ statement, whereas V$SQL, V$SQLAREA, and V$SQLSTATATS contain cumulative sets\
    \ of statistics over several executions of a SQL statement.\n\nOnce the SQL statement\
    \ execution ends, the run time statistics are not immediately flushed from V$SQL_MONITOR.\
    \ Depending on activity in your database, the statistics can be available for\
    \ some period of time. If you have a very active database, the statistics could\
    \ potentially be flushed soon after the query finishes.\n\n■ **Tip** You can uniquely\
    \ identify an execution of a SQL statement in V$SQL_MONITOR from a combination\
    \ of the following columns: SQL_ID, SQL_EXEC_START, SQL_EXEC_ID.\n\nDisplaying\
    \ Resource Intensive SQL\n\nAs mentioned in the prior section, the V$SQL_MONITOR\
    \ view is available with Oracle Database 11g or higher. If you're using an older\
    \ version of Oracle, you can query views like V$SQLSTATS to determine which SQL\
    \ statements are consuming inordinate amounts of resources. For example, use the\
    \ following query to identify the ten most resource-intensive queries based on\
    \ CPU time: 611\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nselect * from(\n\n\
    select\n\nsql_text\n\n,buffer_gets\n\n,disk_reads\n\n,sorts\n\n,cpu_time/1000000\
    \ cpu_sec\n\n,executions\n\n,rows_processed\n\nfrom v$sqlstats\n\norder by cpu_time\
    \ DESC)\n\nwhere rownum < 11;\n\nIn the prior query, an inline view is utilized\
    \ to first retrieve all records and sorts the output by CPU_TIME in descending\
    \ order. The outer query then limits the result set to the top ten rows using\
    \ the ROWNUM pseudocolumn. The query can be easily modified to sort by a column\
    \ other than CPU_TIME. For example, if you want to report resource usage by BUFFER_GETS,\
    \ simply change the ORDER BY clause to use BUFFER_GETS instead of CPU_TIME. The\
    \ CPU_TIME column is calculated in microseconds; to convert it to seconds, divided\
    \ it by 1000000.\n\nThe V$SQLSTATS view displays performance statistics for SQL\
    \ statements that have recently executed.\n\nYou can also use V$SQL and V$SQLAREA\
    \ to report on SQL resource usage. V$SQLSTATS is faster and retains information\
    \ for a longer period of time, but contains only a subset of the columns in V$SQL\
    \ and V$SQLAREA. Thus, there are scenarios where you may want to query from V$SQL\
    \ or V$SQLAREA. For example, if you want to display information such as the user\
    \ who first parsed the query, use the PARSING_USER_ID column of V$SQLAREA:\n\n\
    select * from(\n\nselect\n\nb.sql_text\n\n,a.username\n\n,b.buffer_gets\n\n,b.disk_reads\n\
    \n,b.sorts\n\n,b.cpu_time/1000000 cpu_sec\n\nfrom v$sqlarea b\n\n,dba_users a\n\
    \nwhere b.parsing_user_id = a.user_id\n\norder by b.cpu_time DESC)\n\nwhere rownum\
    \ < 11;\n\nRunning Oracle Diagnostic Utilities\n\nOracle provides several utilities\
    \ for diagnosing database performance issues:\n\n• Automatic Workload Repository\
    \ (AWR)\n\n• Automatic Database Diagnostic Monitor (ADDM)\n\n• Active Session\
    \ History (ASH)\n\n• Statspack\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nAWR,\
    \ ADDM, and ASH were introduced in Oracle Database 10 *g*. These tools provide\
    \ advanced reporting capabilities that allow you to troubleshoot and resolve performance\
    \ issues. These new utilities require an extra license from Oracle. The older\
    \ Statspack utility is free and requires no license.\n\nAll of these tools rely\
    \ heavily on the underlying V$ dynamic performance views. Oracle maintains a vast\
    \ collection of these views that track and accumulate metrics of database performance.\
    \ For example, if you run the following query, you’ll notice that for Oracle Database\
    \ 11 *g* release 2, there are 600 or so V$\n\nviews:\n\nSQL> select count(*) from\
    \ dictionary where table_name like 'V$%';\n\nCOUNT(*)\n\nThe Oracle performance\
    \ utilities rely on periodic snapshots gathered from these internal performance\
    \ views. Two of the most useful views with regard to performance statistics are\
    \ the V$SYSSTAT\n\nand V$SESSTAT views. The V$SYSSTAT view contains over 400 types\
    \ of database statistics. This V$SYSSTAT\n\nview contains information about the\
    \ entire database, whereas the V$SESSTAT view contains statistics for individual\
    \ sessions. A few of the values in the V$SYSSTAT and V$SESSTAT views contain the\
    \ current usage of the resource. These values are:\n\n• opened cursors current\n\
    \n• logons current\n\n• session cursor cache current\n\n• work area memory allocated\n\
    \nThe rest of the values are cumulative. The values in V$SYSSTAT are cumulative\
    \ for the entire database from the time the instance was started. The values in\
    \ V$SESSTAT are cumulative per session from the time the session was started.\
    \ Some of the more important performance-related cumulative values are:\n\n• CPU\
    \ used\n\n• consistent gets\n\n• physical reads\n\n• physical writes\n\nFor the\
    \ cumulative statistics, the way to measure periodic usage is to note the value\
    \ of a statistic at a starting point, then note the value at a later point in\
    \ time, and capture the delta. This is the approach used by the Oracle performance\
    \ utilities such as AWR and Statspack. Periodically, Oracle will take a snapshot\
    \ of the dynamic wait interface views and store them in a repository.\n\nThe following\
    \ sections in this chapter detail how access AWR, ADDM, ASH, and Statspack from\
    \ SQL*Plus.\n\n■ **Tip** You can access AWR, ADDM, and ASH from Enterprise Manager.\
    \ You may find the Enterprise Manager screens more intuitive and efficient than\
    \ using SQL*Plus.\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nUsing AWR\n\nAn\
    \ AWR report is good for viewing the entire system performance and identifying\
    \ the top resource-consuming SQL queries. Run the following script to generate\
    \ an AWR report: SQL> @?/rdbms/admin/awrrpt\n\nFrom the AWR output, identify top\
    \ resource-consuming statements in the “SQL ordered by Elapsed Time” or the “SQL\
    \ ordered by CPU Time” sections of the report. Here is some sample output: SQL\
    \ ordered by CPU Time DB/Inst: DWREP/DWREP Snaps: 11384-11407\n\n-> Resources\
    \ reported for PL/SQL code includes the resources used by all SQL\n\nstatements\
    \ called by the code.\n\n-> % Total DB Time is the Elapsed Time of the SQL statement\
    \ divided into the Total Database Time multiplied by 100\n\nCPU Elapsed CPU per\
    \ % Total\n\nTime (s) Time (s) Executions Exec (s) DB Time SQL Id\n\n----------\
    \ ---------- ------------ ----------- ------- -------------\n\n4,809 13,731 10\
    \ 480.86 6.2 8wx77jyhdr31c\n\nModule: JDBC Thin Client\n\nSELECT D.DERIVED_COMPANY\
    \ ,CB.CLUSTER_BUCKET_ID ,CB.CB_NAME ,CB.SOA_ID ,COUNT(*) TOTAL ,NVL(SUM(CASE WHEN\
    \ F.D_DATE_ID > TO_NUMBER(TO_CHAR(SYSDATE-30,'YYYYMMDD')) THEN 1 END), 0) RECENT\
    \ ,NVL(D.BLACKLIST_FLG,0) BLACKLIST_FLG FROM F_DOWNLOADS F\n\n,D_DOMAINS D ,D_PRODUCTS\
    \ P ,PID_DF_ASSOC PDA ,( SELECT * FROM ( SELECT CLUSTER_\n\nAs of Oracle Database\
    \ 10 *g*, Oracle will automatically take a snapshot of your database once an hour\
    \ and populate the underlying AWR tables that store the statistics. By default,\
    \ seven days of statistics are retained.\n\nYou can also generate an AWR report\
    \ for a specific SQL statement by running the awrsqrpt.sql report. When you run\
    \ the following script, you will be prompted for the SQL_ID of the query of interest:\
    \ SQL> @?/rdbms/admin/awrsqrpt.sql\n\nUsing ADDM\n\nThe ADDM report provides useful\
    \ suggestions on which SQL statements are candidates for tuning. Use the following\
    \ SQL script to generate an ADDM report:\n\nSQL> @?/rdbms/admin/addmrpt\n\nLook\
    \ for the section of the report labeled “SQL statements consuming significant\
    \ database time.”\n\nHere is some sample output:\n\nFINDING 2: 29% impact (65043\
    \ seconds)\n\nSQL statements consuming significant database time were found.\n\
    \nRECOMMENDATION 1: SQL Tuning, 6.7% benefit (14843 seconds)\n\nACTION: Investigate\
    \ the SQL statement with SQL_ID \"46cc3t7ym5sx0\" for possible performance improvements.\n\
    \nRELEVANT OBJECT: SQL statement with SQL_ID 46cc3t7ym5sx0 and\n\nPLAN_HASH 1234997150\n\
    \nMERGE INTO d_files a\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nUSING\n\n(\
    \ SELECT\n\nThe ADDM report analyzes data in the AWR tables to identify potential\
    \ bottlenecks and high resource-consuming SQL queries.\n\nUsing ASH\n\nThe ASH\
    \ report allows you to focus on short-lived SQL statements that have been recently\
    \ run and may have only executed for a brief amount of time. Use the following\
    \ script to generate an ASH report: SQL> @?/rdbms/admin/ashrpt\n\nSearch the output\
    \ for the section labeled “Top SQL.” Here is some sample output: Sampled #\n\n\
    SQL ID Planhash of Executions % Activity\n\n----------------------- --------------------\
    \ -------------------- --------------\n\nEvent % Event Top Row Source % RwSrc\n\
    \n------------------------------ ------- --------------------------------- -------\n\
    \n4k8runghhh31d 3219321046 12 51.61\n\nCPU + Wait for CPU 51.61 HASH JOIN 12.26\n\
    \nselect countryimp0_.COUNTRY_ID as COUNTRY_ID, countryimp0_.COUNTRY_NAME\n\n\
    The previous output indicates that the query is waiting for CPU resources. In\
    \ this scenario, it may actually be another query that is consuming the CPU resources\
    \ that is the problem.\n\nWhen is the ASH report more useful than the AWR or ADDM\
    \ reports? The AWR and ADDM output shows top-consuming SQL in terms of total database\
    \ time. If the SQL performance problem is transient and short-lived, it may not\
    \ appear on the AWR and ADDM reports. In these situations, an ASH report is more\
    \ useful.\n\nUsing Statspack\n\nIf you don’t have a license to use the AWR, ADDM,\
    \ and ASH reports, the free Statspack utility can help you identify poorly performing\
    \ SQL statements. Run the following script as SYS to install Statspack: SQL> @?/rdbms/admin/spcreate.sql\n\
    \nThis script creates a PERFSTAT user that owns the Statspack repository. To enable\
    \ the automatic gathering of Statspack statistics, run this script:\n\nSQL> @?/rdbms/admin/spauto.sql\n\
    \nAfter some snapshots have been gathered, you can run the following script as\
    \ the PERFSTAT user to create a Statspack report:\n\nSQL> @?/rdbms/admin/spreport.sql\n\
    \nOnce the report is created, search for the section labeled “SQL ordered by CPU.”\
    \ Here is some sample output:\n\nSQL ordered by CPU DB/Inst: DW11/DW11 Snaps:\
    \ 11-14\n\n-> Total DB CPU (s): 107\n\n-> Captured SQL accounts for 246.0% of\
    \ Total DB CPU\n\n-> SQL reported below exceeded 1.0% of Total DB CPU\n\nCHAPTER\
    \ 22 ■ DATABASE TROUBLESHOOTING\n\nCPU CPU per Elapsd Old Time (s) Executions\
    \ Exec (s) %Total Time (s) Buffer Gets Hash Value\n\n---------- ----------- ----------\
    \ ------ ---------- --------------- ----------\n\n254.95 4 63.74 238.1 249.74\
    \ 12,811 2873951798\n\nModule: SQL*Plus\n\nselect count(*) from dba_indexes, dba_tables\n\
    \n■ **Tip** View the ORACLE_HOME/rdbms/admin/spdoc.txt file for Statspack documentation.\n\
    \nDetecting and Resolving Locking Issues\n\nSometimes a developer or application\
    \ user will report that a process that normally takes seconds to run is now taking\
    \ several minutes and doesn't appear to be doing anything. In these situations,\
    \ the problem is usually one of the following:\n\n•\n\nSpace related issue (for\
    \ example, archive redo destination is full and has suspended all transactions).\n\
    \n•\n\nOne process has a lock on a row in a table and is not committing or rolling\
    \ back, thus preventing another session from modifying the same row.\n\nIn this\
    \ scenario, I first check the alert.log to see if there are any obvious issues\
    \ that have occurred recently (like a tablespace not being able to allocate another\
    \ extent). If there is nothing obvious in the alert.log file, I run a SQL query\
    \ to check for locking issues. The query listed here is a more sophisticated version\
    \ of the lock detecting script introduced in Chapter 3\\. This query shows information\
    \ such as the locking session SQL statement and the waiting SQL statement:\n\n\
    set lines 80\n\ncol blkg_user form a10\n\ncol blkg_machine form a10\n\ncol blkg_sid\
    \ form 99999999\n\ncol wait_user form a10\n\ncol wait_machine form a10\n\ncol\
    \ wait_sid form 9999999\n\ncol obj_own form a10\n\ncol obj_name form a10\n\ncol\
    \ blkg_sql form a50\n\ncol wait_sql form a50\n\n--\n\nselect\n\ns1.username blkg_user\n\
    \n,s1.machine blkg_machine\n\n,s1.sid blkg_sid\n\n,s1.serial# blkg_serialnum\n\
    \n,s1.process blkg_OS_PID\n\n,substr(b1.sql_text,1,50) blkg_sql\n\n,chr(10)\n\n\
    ,s2.username wait_user\n\n,s2.machine wait_machine\n\n,s2.sid wait_sid\n\nCHAPTER\
    \ 22 ■ DATABASE TROUBLESHOOTING\n\n,s2.serial# wait_serialnum\n\n,s2.process wait_OS_PID\n\
    \n,substr(w1.sql_text,1,50) wait_sql\n\n,lo.object_id blkd_obj_id\n\n,do.owner\
    \ obj_own\n\n,do.object_name obj_name\n\nfrom v$lock l1\n\n,v$session s1\n\n,v$lock\
    \ l2\n\n,v$session s2\n\n,v$locked_object lo\n\n,v$sqlarea b1\n\n,v$sqlarea w1\n\
    \n,dba_objects do\n\nwhere s1.sid = l1.sid\n\nand s2.sid = l2.sid\n\nand l1.id1\
    \ = l2.id1\n\nand s1.sid = lo.session_id\n\nand lo.object_id = do.object_id\n\n\
    and l1.block = 1\n\nand s1.prev_sql_addr = b1.address\n\nand s2.sql_address =\
    \ w1.address\n\nand l2.request > 0;\n\nThe output from this query does not fit\
    \ well on one page. When running this query, you will have to format it so that\
    \ it fits within the size of your terminal. Here is some sample output indicating\
    \ that the INV table is locked by the STAR2 user and that the CIA_SEL user is\
    \ waiting for the lock to be released: BLKG_USER BLKG_MACHI BLKG_SID BLKG_SERIALNUM\
    \ BLKG_OS_PID\n\n---------- ---------- --------- -------------- ------------\n\
    \nBLKG_SQL C WAIT_USER WAIT_MACHI\n\n--------------------------------------------------\
    \ - ---------- ----------\n\nSTAR2 dwdb 1084 265 3153\n\nupdate inv set inv_id=5\
    \ where inv_id = 7 CIA_SEL xengdb 1086 222 21436\n\nWAIT_SID WAIT_SERIALNUM WAIT_OS_PID\n\
    \n-------- -------------- ------------\n\nWAIT_SQL BLKD_OBJ_ID OBJ_OWN\n\n--------------------------------------------------\
    \ ----------- ----------\n\nOBJ_NAME\n\nupdate star2.inv set inv_id=3 where inv_id=7\
    \ 150553 STAR2\n\nINV\n\nThis situation is typical when applications don't explicitly\
    \ issue a COMMIT or ROLLBACK at appropriate times in the code. This leaves a lock\
    \ on a row and prevents one transaction from continuing until the lock is released.\
    \ In this scenario, you can try to locate the user who is blocking the transaction\
    \ and see if they need to push a button on the screen that says something like\
    \ \"commit your changes.\" If that's not possible, you can manually kill one of\
    \ the sessions. Keep in mind that terminating a session may have unforeseen side\
    \ effects (like rolling back data that a user thought was committed).\n\nIf you\
    \ decide to kill one of the sessions, you need to identify the SID and serial\
    \ number of the session you want to terminate. Once identified, use the ALTER\
    \ SYSTEM KILL SESSION statement to 617\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\
    \nterminate a user session. In this example, I decide to kill the lock held by\
    \ the STAR2 user with the SID of 1072 and a serial number of 29, so from a DBA\
    \ privileged account I run the following statement: SQL> alter system kill session\
    \ '1084,265';\n\nAgain, be careful when killing sessions. Ensure that you know\
    \ the impact of killing a session and thereby rolling back any active transactions\
    \ currently open in that session.\n\nThe other way to kill a session is to use\
    \ an operating system command such as kill. From the prior output, you can identify\
    \ the operating system processes from the BLKG_OS_PID column and WAIT_OS_PID\n\
    \ncolumn. Before you terminate a process from the operating system, ensure that\
    \ it isn't a critical process.\n\nFor this example, to terminate the blocking\
    \ OS process, first check the blocking process ID: $ ps -ef | grep 3153\n\nHere\
    \ is some sample output:\n\noracle 3153 1690 0 10:40:30 pts/1 0:00 sqlplus star2....\n\
    \nNext use the kill command as shown:\n\n$ kill -9 3153\n\nThe kill command will\
    \ unceremoniously terminate a process. Any open transactions associated with the\
    \ process will be rolled back by the Oracle process monitor.\n\nResolving Open\
    \ Cursor Issues\n\nThe OPEN_CURSORS initialization parameter determines the maximum\
    \ number of cursors a session can have open. This setting is per each session.\
    \ The default value of 50 is usually too low for any application.\n\nWhen an application\
    \ exceeds the number of open cursors allowed, the following error is thrown: ORA-01000:\
    \ maximum open cursors exceeded\n\nUsually the prior error is encountered when:\n\
    \n• OPEN_CURSORS initialization parameter is set too low.\n\n• Developers write\
    \ code that doesn't close cursors properly.\n\nTo investigate this issue, first\
    \ determine the current setting of the parameter: SQL> show parameter open_cursors;\n\
    \nIf the value is less than 300, consider setting it higher. I typically set this\
    \ value to 1000 for busy OLTP\n\nsystems. You can dynamically modify this value\
    \ while your database is open as shown: SQL> alter system set open_cursors=1000;\n\
    \nIf you're using an spfile, consider making the change both in memory and in\
    \ the spfile at the same time:\n\nSQL> alter system set open_cursors=1000 scope=both;\n\
    \nAfter setting OPEN_CURSORS to a higher value, if the application still continues\
    \ to exceed the maximum value, you probably have an issue with code that is not\
    \ properly closing cursors. Run a query such as the following to determine the\
    \ number of open cursors each session has opened: 618\n\nCHAPTER 22 ■ DATABASE\
    \ TROUBLESHOOTING\n\nselect\n\na.value\n\n,c.username\n\n,c.machine\n\n,c.sid\n\
    \n,c.serial#\n\nfrom v$sesstat a\n\n,v$statname b\n\n,v$session c\n\nwhere a.statistic#\
    \ = b.statistic#\n\nand c.sid = a.sid\n\nand b.name = 'opened cursors current'\n\
    \nand a.value != 0\n\nand c.username IS NOT NULL\n\norder by 1,2;\n\n■ **Tip**\
    \ I recommend that you query V$SESSION instead of V$OPEN_CURSOR to determine the\
    \ number of open cursors. V$SESSION provides a more accurate number of the cursors\
    \ currently open.\n\nIf you work in an environment that has thousands of connections\
    \ to the database, you may want to view only the top cursor-consuming sessions.\
    \ The following query uses an inline view and the pseudocolumn ROWNUM to display\
    \ the top twenty values:\n\nselect * from (\n\nselect\n\na.value\n\n,c.username\n\
    \n,c.machine\n\n,c.sid\n\n,c.serial#\n\nfrom v$sesstat a\n\n,v$statname b\n\n\
    ,v$session c\n\nwhere a.statistic# = b.statistic#\n\nand c.sid = a.sid\n\nand\
    \ b.name = 'opened cursors current'\n\nand a.value != 0\n\nand c.username IS NOT\
    \ NULL\n\norder by 1 desc,2)\n\nwhere rownum < 21;\n\nIf a single session has\
    \ over 1000 open cursors, there is probably something in the code that is not\
    \ closing a cursor. When this limit is reached, somebody should inspect the application\
    \ code to determine if a cursor is not being closed.\n\nCHAPTER 22 ■ DATABASE\
    \ TROUBLESHOOTING\n\nTroubleshooting Undo Tablespace Issues\n\nProblems with the\
    \ undo tablespace are usually of the following nature:\n\n• ORA-01555: snapshot\
    \ too old\n\n• ORA-30036: unable to extend segment by ... in undo tablespace 'UNDOTBS1'\n\
    \nThe prior listed errors can be caused by many different issues such as the undo\
    \ tablespace not being sized correctly or poorly written SQL or PL/SQL code.\n\
    \nDetermining if Undo is Correctly Sized\n\nSuppose that you have a long-running\
    \ SQL statement that is throwing an ORA-01555 “snapshot too old”\n\nerror and\
    \ you want to determine if adding space to the undo tablespace might help alleviate\
    \ the issue.\n\nRun this next query to identify potential issues with your undo\
    \ tablespace. The query checks for issues with the undo tablespace that have occurred\
    \ within the last day:\n\nselect\n\nto_char(begin_time,'MM-DD-YYYY HH24:MI') begin_time\n\
    \n,ssolderrcnt ORA_01555_cnt\n\n,nospaceerrcnt no_space_cnt\n\n,txncount max_num_txns\n\
    \n,maxquerylen max_query_len\n\n,expiredblks blck_in_expired\n\nfrom v$undostat\n\
    \nwhere begin_time > sysdate - 1\n\norder by begin_time;\n\nHere is some sample\
    \ output. Part of the output has been omitted to fit this on the page: BEGIN_TIME\
    \ ORA_01555_CNT NO_SPACE_CNT MAX_NUM_TXNS MAX_QUERY_LEN\n\n---------------- -------------\
    \ ------------ ------------ -------------\n\n07-20-2009 18:10 0 0 249 0\n\n07-20-2009\
    \ 18:20 0 0 290 0\n\n07-20-2009 18:30 0 0 244 0\n\n07-20-2009 18:40 0 0 179 0\n\
    \nThe ORA_01555_CNT column indicates the number of times your database has encountered\
    \ the ORA-01555 “snapshot too old” error. If this column reports a non-zero value,\
    \ you need to do one or more of the following:\n\n• Ensure that code does not\
    \ contain COMMIT statements within cursor loops.\n\n• Tune the SQL statement throwing\
    \ the error so that it runs faster.\n\n• Ensure that you have good statistics\
    \ (so your SQL runs efficiently).\n\n• Increase the UNDO_RETENTION initialization\
    \ parameter.\n\nThe NO_SPACE_CNT column displays the number of times space was\
    \ requested in the undo tablespace but none was to be found. If the NO_SPACE_CNT\
    \ is reporting a non-zero value, you may need to add more space to your undo tablespace.\n\
    \nThere is a maximum of four days’ worth of information stored in the V$UNDOSTAT\
    \ view. The statistics are gathered every ten minutes for a maximum of 576 rows\
    \ in the table. If you’ve stopped and started 620\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\
    \nyour database within the last four days, this view will only have information\
    \ in it from the time you last started your database.\n\nAnother way to get advice\
    \ on the undo tablespace sizing is to use the Oracle Undo Advisor, which you can\
    \ invoke by querying the PL/SQL DBMS_UNDO_ADV package from a SELECT statement.\
    \ The following query displays the current undo size and the recommended size\
    \ for an undo retention setting of 900\n\nseconds:\n\nselect\n\nsum(bytes)/1024/1024\
    \ cur_mb_size\n\n,dbms_undo_adv.required_undo_size(900) req_mb_size\n\nfrom dba_data_files\n\
    \nwhere tablespace_name =\n\n(select\n\nvalue\n\nfrom v$parameter\n\nwhere name\
    \ = 'undo tablespace');\n\nHere is some sample output:\n\nCUR_MB_SIZE REQ_MB_SIZE\n\
    \n----------- -----------\n\n36864 20897\n\nThe output shows that the undo tablespace\
    \ currently has 36.8 gigabytes allocated to it. In the prior query, you used 900\
    \ seconds as the amount of time to retain information in the undo tablespace.\
    \ To retain undo information for 900 seconds, the Oracle Undo Advisor estimates\
    \ that the undo tablespace should be 20.8 gigabytes. For this example, the undo\
    \ tablespace is sized adequately. If it were not sized adequately, you would either\
    \ have to add space to an existing datafile or add a datafile to the undo tablespace.\n\
    \nHere’s a slightly more complex example of using the Oracle Undo Advisor to find\
    \ the required size of the undo tablespace. This example uses PL/SQL to display\
    \ information about potential issues and recommendations to fix the problem:\n\
    \nSET SERVEROUT ON SIZE 1000000\n\nDECLARE\n\npro VARCHAR2(200);\n\nrec VARCHAR2(200);\n\
    \nrtn VARCHAR2(200);\n\nret NUMBER;\n\nutb NUMBER;\n\nretval NUMBER;\n\nBEGIN\n\
    \nDBMS_OUTPUT.PUT_LINE(DBMS_UNDO_ADV.UNDO_ADVISOR(1));\n\nDBMS_OUTPUT.PUT_LINE('Required\
    \ Undo Size (megabytes): ' || DBMS_UNDO_ADV.REQUIRED_UNDO_SIZE\n\n(900));\n\n\
    retval := DBMS_UNDO_ADV.UNDO_HEALTH(pro, rec, rtn, ret, utb);\n\nDBMS_OUTPUT.PUT_LINE('Problem:\
    \ ' || pro);\n\nDBMS_OUTPUT.PUT_LINE('Advice: ' || rec);\n\nDBMS_OUTPUT.PUT_LINE('Rational:\
    \ ' || rtn);\n\nDBMS_OUTPUT.PUT_LINE('Retention: ' || TO_CHAR(ret));\n\nDBMS_OUTPUT.PUT_LINE('UTBSize:\
    \ ' || TO_CHAR(utb));\n\nEND;\n\n/\n\nIf no issues are found, a 0 will be returned\
    \ for the retention size. Here is some sample output: 621\n\nCHAPTER 22 ■ DATABASE\
    \ TROUBLESHOOTING\n\nFinding 1:The undo tablespace is OK.\n\nRequired Undo Size\
    \ (megabytes): 20897\n\nProblem: No problem found\n\nAdvice:\n\nRational:\n\n\
    Retention: 0\n\nUTBSize: 0\n\nViewing SQL that is Consuming Undo Space\n\nSometimes\
    \ a piece of code does not commit properly, which results in large amounts of\
    \ space being allocated in the undo tablespace and never being released. Sooner\
    \ or later you'll get the ORA-30036 error indicating that the tablespace can't\
    \ extend. Usually the first time a space related error is thrown, I simply increase\
    \ the size of one of the datafiles associated with the undo tablespace.\n\nHowever,\
    \ if a SQL statement continues to run and fills up the newly added space, then\
    \ the issue is probably with a poorly written application. For example, a developer\
    \ might not have appropriate commit statements in the code.\n\nIn these situations\
    \ it's helpful to identify which users are consuming space in the undo tablespace.\n\
    \nRun this query to report on basic information regarding space allocated on a\
    \ per user basis: select\n\ns.sid\n\n,s.serial#\n\n,s.osuser\n\n,s.logon_time\n\
    \n,s.status\n\n,s.machine\n\n,t.used_ublk\n\n,t.used_ublk*16384/1024/1024 undo_usage_mb\n\
    \nfrom v$session s\n\n,v$transaction t\n\nwhere t.addr = s.taddr;\n\nIf you want\
    \ to view the SQL statement associated with the user consuming undo space, then\
    \ join to V$SQL as shown:\n\nselect\n\ns.sid\n\n,s.serial#\n\n,s.osuser\n\n,s.logon_time\n\
    \n,s.status\n\n,s.machine\n\n,t.used_ublk\n\n,t.used_ublk*16384/1024/1024 undo_usage_mb\n\
    \n,q.sql_text\n\nfrom v$session s\n\n,v$transaction t\n\n,v$sql q\n\nwhere t.addr\
    \ = s.taddr\n\nand s.sql_id = q.sql_id;\n\nIf you need more information, such\
    \ as the name and status of the rollback segment, run a query that joins to the\
    \ V$ROLLNAME and V$ROLLSTAT views, like so:\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\
    \nselect\n\ns.sid\n\n,s.serial#\n\n,s.username\n\n,s.program\n\n,r.name undo_name\n\
    \n,rs.status\n\n,rs.rssize/1024/1024 redo_size_mb\n\n,rs.extents\n\nfrom v$session\
    \ s\n\n,v$transaction t\n\n,v$rollname r\n\n,v$rollstat rs\n\nwhere s.taddr =\
    \ t.addr\n\nand t.xidusn = r.usn\n\nand r.usn = rs.usn;\n\nThe prior queries allow\
    \ you to pinpoint which users are responsible for space allocated within the undo\
    \ tablespace. This can be especially useful when there is code that is not committing\
    \ at appropriate times and is excessively consuming undo space.\n\nHandling Temporary\
    \ Tablespace Issues\n\nIssues with temporary tablespaces are somewhat easy to\
    \ spot. For example, when the temporary tablespace runs out of space, the following\
    \ error will be thrown:\n\nORA-01652: unable to extend temp segment by 128 in\
    \ tablespace TEMP\n\nWhen you see this error, you need to determine if there's\
    \ enough space in the temporary tablespace or if it's a rare runaway SQL query\
    \ that has temporarily consumed an inordinate amount of temp space.\n\nBoth of\
    \ these issues are discussed in the following sections.\n\nDetermining if Temporary\
    \ Tablespace is Sized Correctly\n\nThe temporary tablespace is used as a sorting\
    \ area on disk when a process has consumed the available memory and needs more\
    \ space. Operations that require a sorting area include:\n\n• Index creation\n\
    \n• SQL sorting operations\n\n• Temporary tables and temporary indexes\n\n• Temporary\
    \ LOBs\n\n• Temporary B-trees\n\nThere is no exact formula for determining if\
    \ your temporary tablespace is sized correctly. It depends on the number and types\
    \ of queries, index build operations, parallel operations, and size of your memory\
    \ sort space (program global area). You’ll have to monitor your temporary tablespace\
    \ while there is a load on your database to determine its usage patterns. If you\
    \ are using Oracle Database 11 *g* or higher, run the following query to show\
    \ both the allocated and free space within the temporary tablespace:\n\nCHAPTER\
    \ 22 ■ DATABASE TROUBLESHOOTING\n\nselect\n\ntablespace_name\n\n,tablespace_size/1024/1024\
    \ mb_size\n\n,allocated_space/1024/1024 mb_alloc\n\n,free_space/1024/1024 mb_free\n\
    \nfrom dba_temp_free_space;\n\nHere is some sample output:\n\nTABLESPACE_NAME\
    \ MB_SIZE MB_ALLOC MB_FREE\n\n--------------- ---------- ---------- ----------\n\
    \nTEMP 200 200 170\n\nIf the FREE_SPACE (MB_FREE) value drops to near zero, there\
    \ are SQL operations in your database consuming most of the available space. The\
    \ FREE_SPACE (MB_FREE) column is the total free space available, including space\
    \ currently allocated and available for reuse.\n\nIf you are using an Oracle Database\
    \ 10 *g* database, run this query to view space being used in your temporary tablespace:\n\
    \nselect\n\ntablespace_name\n\n,sum(bytes_used)/1024/1024 mb_used\n\nfrom v$temp_extent_pool\n\
    \ngroup by tablespace_name;\n\nHere is some sample output:\n\nTABLESPACE_NAME\
    \ MB_USED\n\n--------------- ----------\n\nTEMP 120\n\nIf the used amount is getting\
    \ near your current allocated amount, you may need to allocate more space to the\
    \ temporary tablespace datafiles. Run the following query to view the temporary\
    \ datafile names and allocated sizes:\n\nSQL> select name, bytes/1024/1024 mb_alloc\
    \ from v$tempfile;\n\nHere is some typical output:\n\nNAME MB_ALLOC\n\n------------------------------\
    \ ----------\n\n/ora02/DWREP/temp01.dbf 12000\n\n/ora03/DWREP/temp03.dbf 10240\n\
    \n/ora01/DWREP/temp02.dbf 2048\n\nWhen first creating a database, if I have no\
    \ idea as to \"correct\" size of the temporary tablespace, I'll usually size this\
    \ tablespace at something like 2GB. If I'm building a data warehouse type database,\
    \ I might size the temporary tablespace at something like 20GB. You'll have to\
    \ monitor your temporary tablespace with the appropriate SQL and adjust the size\
    \ as necessary.\n\nViewing SQL that is Consuming Temporary Space\n\nWhen Oracle\
    \ throws the ORA-01652 “unable to extend temp” error, it’s one indicator that\
    \ your temporary tablespace is too small. However, Oracle may throw that error\
    \ if it runs out of space because of a one-time event, like a large index build.\
    \ You’ll have to decide whether a one-time index build or a query that consumes\
    \ large amounts of sort space in the temporary tablespace warrants adding space.\n\
    \nTo view the space a session is using in the temporary tablespace, run this query:\
    \ 624\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nSELECT\n\ns.sid\n\n,s.serial#\n\
    \n,s.username\n\n,p.spid\n\n,s.module\n\n,p.program\n\n,SUM(su.blocks) * tbsp.block_size/1024/1024\
    \ mb_used\n\n,su.tablespace\n\nFROM v$sort_usage su\n\n,v$session s\n\n,dba_tablespaces\
    \ tbsp\n\n,v$process p\n\nWHERE su.session_addr = s.saddr\n\nAND su.tablespace\
    \ = tbsp.tablespace_name\n\nAND s.paddr = p.addr\n\nGROUP BY\n\ns.sid, s.serial#,\
    \ s.username, s.osuser, p.spid, s.module,\n\np.program, tbsp.block_size, su.tablespace\n\
    \nORDER BY s.sid;\n\nIf you determine that you need to add space, you can either\
    \ resize an existing datafile or add a new datafile. To resize a temporary tablespace\
    \ datafile, use the ALTER DATABASE TEMPFILE...RESIZE\n\nstatement. The following\
    \ resizes a temporary datafile to 12GB:\n\nSQL> alter database tempfile '/ora03/DWREP/temp03.dbf'\
    \ resize 12g; You can add a datafile to a temporary tablespace as follows:\n\n\
    SQL> alter tablespace temp add tempfile '/ora04/DWREP/temp04.dbf' size 2g; Auditing\n\
    \n*Auditing* usually means creating a record whenever a certain event happens.\
    \ Activities that are typically audited include:\n\n• When a table is inserted\
    \ into, selected from, updated, or deleted from.\n\n• User logon/logoff times.\n\
    \n• What SQL was used to update a table.\n\n• When was an index last used.\n\n\
    Auditing is especially helpful when troubleshooting security issues with the database.\
    \ Auditing gives you information to diagnose what objects are accessed by which\
    \ users and when. This gives you a mechanism to detect and report on unauthorized\
    \ actions or security breaches. For this reason, many databases are required to\
    \ enable some degree of auditing to comply with regulatory agencies or internal\
    \ company security requirements.\n\nAuditing can also help with diagnosing some\
    \ performance issues. For example, knowing what SQL\n\nran and when or how many\
    \ users are connected to the database at a specific time will help with diagnosing\
    \ and resolving some issues.\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nThere\
    \ are several different ways to enable auditing:\n\n•\n\nSetting database initialization\
    \ parameters.\n\n•\n\nOracle Standard Auditing enabled via the AUDIT SQL statement.\n\
    \n•\n\nEnabling fine-grained auditing.\n\n•\n\nUsing data dictionary views.\n\n\
    •\n\nCustom DBA developed triggers that populate columns or tables based on certain\
    \ events.\n\nI'm not going to cover every aspect of auditing in the prior list\
    \ (that would be a large amount of documentation). Rather, I'll show the basic\
    \ techniques that DBAs use to audit databases. If you need more details, see the\
    \ Oracle *Database Security Guide* (available on Oracle's OTN website).\n\nEnabling\
    \ Oracle Standard Auditing\n\nOracle Standard Auditing allows you to audit nearly\
    \ any type of SQL activity in the database. You can audit any type of insert,\
    \ update, delete, or select on a tables. You can also audit any system privilege\
    \ activity such as CREATE TABLE, DROP INDEX, and so on.\n\nYou can enable auditing\
    \ BY ACCESS or BY SESSION. Prior to Oracle Database 11 *g* release 2, the BY\n\
    \nSESSION would record just one record per session for an auditing action. With\
    \ the current version of Oracle, the BY SESSION will record multiple records for\
    \ the same auditing action.\n\nYou can also enable auditing by WHENEVER SUCCESSFUL\
    \ or WHENEVER NOT SUCCESSFUL. This allows you to audit specifically for the success\
    \ or failure of a particular statement.\n\nOracle's Standard Auditing feature\
    \ is enabled through setting the AUDIT_TRAIL initialization parameter. I usually\
    \ set the AUDIT_TRAIL parameter to DB, which specifies that Oracle will write\
    \ audit records to an internal database table named AUD$. For example, when using\
    \ an spfile, here's how to set the AUDIT_TRAIL parameter:\n\nSQL> alter system\
    \ set audit_trail=db scope=spfile;\n\nIf you are using an init.ora file, open\
    \ it with a text editor and set the AUDIT_TRAIL value to DB. See Table 22–5 for\
    \ a description of valid values for the AUDIT_TRAIL parameter.\n\n■ **Tip** I\
    \ typically set the AUDIT_TRAIL parameter to DB even if I'm not doing any auditing.\
    \ This way when I want to enable auditing for a specific action, I can do so without\
    \ having to stop and re-start the database.\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\
    \n***Table 22–5.** Valid AUDIT_TRAILSettings*\n\n**Setting Meaning**\n\nDB\n\n\
    Enables auditing and sets the SYS.AUD$ table as the audit repository.\n\nDB_EXTENDED\n\
    \nEnables auditing and sets the SYS.AUD$ table as the audit repository and includes\
    \ the SQLTEXT and SQLBIND columns. This is useful for viewing the actual SQL statement\
    \ that was issued. Be careful when using this option as it will consume much more\
    \ space. In prior releases of Oracle, the parameter was specified as 'DB, EXTENDED'.\n\
    \nOS\n\nEnables auditing and specifies that an operating system file will store\
    \ auditing information.\n\nXML\n\nEnables auditing and writes audit records in\
    \ XML format to an OS file.\n\nNONE\n\nDisables database auditing.\n\nYou must\
    \ stop and start your database for the AUDIT_TRAIL parameter to take effect: SQL>\
    \ shutdown immediate;\n\nSQL> startup;\n\nSQL> show parameter audit_trail;\n\n\
    NAME TYPE VALUE\n\n------------------------------------ ----------- ------------------------------\n\
    \naudit_trail string DB\n\nAfter you've set the AUDIT_TRAIL parameter, no actual\
    \ auditing events are enabled. You have to use the AUDIT statement to control\
    \ auditing for specific database events. Examples of enabling auditing are shown\
    \ in the next few sections.\n\n■ **Tip** Set the database initialization parameter\
    \ AUDIT_SYS_OPERATIONS to TRUE. This ensures that all SYS\n\nactivities are logged\
    \ to files in the directory specified by AUDIT_FILE_DEST (regardless of the setting\
    \ of AUDIT_TRAIL). This provides you with a simple and effective method for auditing\
    \ the SYS user.\n\nAuditing DML Usage\n\nSometimes it's handy when troubleshooting\
    \ disk space or performance issues to know which tables in the database are actually\
    \ being used by the application. If you've inherited a database that contains\
    \ hundreds of tables, it may not be obvious which objects are being accessed.\
    \ The idea is that if you can identify tables that are not being used, then you\
    \ can rename and eventually drop them so that you can free up space and have less\
    \ objects cluttering up your database.\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\
    \nAuditing allows you to capture the types of SQL statements being used to access\
    \ a table. For example, the following statement enables auditing on all DML access\
    \ to the EMP table owned by INV_MGMT:\n\nSQL> audit select, insert, update, delete\
    \ on inv_mgmt.emp;\n\nFrom this point on, any DML access to the INV_MGMT.EMP table\
    \ will be recorded in the SYS.AUD$ table.\n\nYou can use a query such as this\
    \ to report on DML access to a table:\n\nselect\n\nusername\n\n,obj_name\n\n,timestamp\n\
    \n,substr(ses_actions,4,1) del\n\n,substr(ses_actions,7,1) ins\n\n,substr(ses_actions,10,1)\
    \ sel\n\n,substr(ses_actions,11,1) upd\n\nfrom dba_audit_object;\n\nIn the prior\
    \ SQL statement, notice the use of the SUBSTR function to reference the SES_ACTIONS\n\
    \ncolumn of the DBA_AUDIT_OBJECT view. That column contains a 16-character string\
    \ in which each character means that a certain operation has occurred. The 16\
    \ characters represent the following operations in this order: ALTER, AUDIT, COMMENT,\
    \ DELETE, GRANT, INDEX, INSERT, LOCK, RENAME, SELECT, UPDATE, REFERENCES, and\
    \ EXECUTE. Positions 14, 15, and 16 are reserved by Oracle for future use. The\
    \ character of S\n\nrepresents success, F represents failure, and B represents\
    \ both success and failure.\n\nOnce you have identified tables that are not being\
    \ used, you can simply rename the tables and see if this breaks the application\
    \ or if any users complain. If there are no complaints, then after some time you\
    \ can consider dropping the tables. Make sure you take a good backup of your database\
    \ with both RMAN\n\nand Data Pump before you drop any tables you might have to\
    \ later recover.\n\nTo turn off auditing on an object, use the NOAUDIT statement:\n\
    \nSQL> noaudit select, insert, update, delete on inv_mgmt.inv;\n\n■ **Tip** If\
    \ you simply need to know whether a table is being inserted, updated, or deleted\
    \ from, you can use the USER_TAB_MODIFICATIONS view to report on that type of\
    \ activity. This view has columns such as INSERTS, UPDATES, DELETES, and TRUNCATED\
    \ that will provide information as to how data in the table is being modified.\n\
    \nAuditing Logon/Logoff Events\n\nOne basic security auditing technique is to\
    \ record all user logon and logoff activity in the database. This allows the auditor\
    \ to determine who was using the database and when. This information is critical\
    \ when diagnosing security breaches and unauthorized actions.\n\nUse the BY ACCESS\
    \ clause of AUDIT to enable auditing of logon and logoff activities, like so:\
    \ SQL> audit create session by access;\n\nNow every user that logs on and logs\
    \ off the database will result in a record being inserted into the AUD$ table.\
    \ You can report on logon and logoff activity with a query such as this: 628\n\
    \nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nselect\n\nusername\n\n,action_name\n\
    \n,to_char(timestamp,'dd-mon-yyyy hh24:mi:ss') event_time\n\n,to_char(logoff_time,'dd-mon-yyyy\
    \ hh24:mi:ss') logoff_time\n\nfrom dba_audit_trail;\n\nHere is some sample output:\n\
    \nUSERNAME ACTION_NAME EVENT_TIME LOGOFF_TIME\n\n---------- --------------- --------------------\
    \ --------------------------\n\nLARRY LOGON 08-oct-2010 16:18:45\n\nLARRY LOGOFF\
    \ 08-oct-2010 16:18:49 08-oct-2010 16:18:49\n\nDW_MAINT LOGON 08-oct-2010 16:19:33\n\
    \nYou can enable logon and logoff access for a specific user by specifying the\
    \ username: SQL> audit session by larry by access;\n\nYou can disable logon/logoff\
    \ auditing as shown:\n\nSQL> noaudit create session;\n\nTo disable logon/logoff\
    \ for individual sessions, specify the username: SQL> noaudit session by larry;\n\
    \nAnother way to audit connections is via the CONNECT option of AUDIT, like so:\
    \ SQL> audit connect;\n\nTo disable this option, run this SQL:\n\nSQL> noaudit\
    \ connect;\n\nThe prior techniques provide a way to quickly enable the auditing\
    \ of connections to the database.\n\nThis can be useful when troubleshooting security\
    \ violations or application issues.\n\nNOTE: **Some DBAs enable auditing of logon\
    \ and logoff through an AFTER LOGON ON DATABASE trigger and BEFORE**\n\n **LOGOFF\
    \ ON DATDABASE trigger that inserts into a custom table. I'm not a fan of this\
    \ approach because it requires custom objects and custom code. Why write code\
    \ to achieve something that Oracle already has a simple and effective solution?\
    \ Furthermore, if there is an issue with the trigger or custom table, you may\
    \ find that you can't logon to Oracle anymore. Not good.\n\nViewing Enabled Audit\
    \ Actions\n\nThere are several data dictionary views that allow you to view what\
    \ auditing actions have been enabled.\n\nUse the following query to enabled auditing\
    \ at the privilege level:\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nselect\n\
    \nuser_name\n\n,privilege\n\n,success\n\n,failure\n\nfrom dba_priv_audit_opts;\n\
    \nHere is some sample output:\n\nUSER_NAME PRIVILEGE SUCCESS FAILURE\n\n---------------\
    \ ------------------------------ ---------- ----------\n\nCREATE ANY PROCEDURE\
    \ BY ACCESS BY ACCESS\n\nCREATE PROCEDURE BY ACCESS BY ACCESS\n\nDELETE ANY TABLE\
    \ BY SESSION BY SESSION\n\nRun the following query to view statement level auditing\
    \ actions:\n\nselect\n\nuser_name\n\n,audit_option\n\n,success\n\n,failure\n\n\
    from dba_stmt_audit_opts;\n\nThe next query audits object level auditing actions.\
    \ For this example, only a small subset of the columns available is selected (to\
    \ keep the output on one page):\n\nselect\n\nowner\n\n,object_name\n\n,object_type\n\
    \n,alt\n\n,del\n\n,upd\n\nfrom dba_obj_audit_opts;\n\nHere is some sample output:\n\
    \nOWNER OBJECT_NAME OBJECT_TYPE ALT DEL UPD\n\n--------------- ---------------\
    \ --------------- ---------- ---------- -------\n\nSYS AUD$ TABLE -/- S/S -/-\n\
    \nIn the prior output, a dash (-) means the audit option is not enabled, an S\
    \ indicates that the audit option by session is enabled, and an A indicates that\
    \ the audit action is enabled by access. For each option, there are two possible\
    \ settings: WHENEVER SUCCESSFUL and WHENEVER NOT SUCCESSFUL. These are separated\
    \ by a forward slash. So in the prior output, auditing by delete from the AUD$\
    \ table is enabled by session for both successful and unsuccessful statements.\n\
    \nTurning Auditing Off\n\nTo permanently disable auditing, set the AUDIT_TRAIL\
    \ initialization parameter to none: SQL> alter system set audit_trail='none' scope=spfile;\n\
    \nNow stop and restart your database to turn off Oracle's Standard Auditing feature.\n\
    \nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\n■ **Note** Some database events are\
    \ always audited (regardless of the setting of AUDIT_TRAIL) such as connections\
    \ as SYSDBA or SYSOPER and database startup and shutdown events.\n\nIf you only\
    \ want to disable features that you have previously enabled with AUDIT, then use\
    \ the NOAUDIT statement to turn off specific auditing events. For example, the\
    \ following statement turns off all statement auditing that was enabled via an\
    \ AUDIT ALL statement:\n\nSQL> noaudit all;\n\nThis next example turns off the\
    \ auditing of privileges:\n\nSQL> noaudit all privileges;\n\nYou can turn off\
    \ specific auditing actions. For example, say you had previously enabled auditing\
    \ on a table like this:\n\nSQL> audit delete any table;\n\nYou can turn off the\
    \ prior auditing like this:\n\nSQL> noaudit delete any table;\n\nYou can also\
    \ use SQL to generate SQL to turn off auditing. The following script generates\
    \ a script that can be used to turn off all statement auditing:\n\nset head off\
    \ pages 0\n\nspo turn_off_audit.sql\n\nselect 'noaudit ' || audit_option || ';'\n\
    \nfrom dba_stmt_audit_opts;\n\nspo off;\n\nPurging the Audit Table and Files\n\
    \nYou should periodically purge the AUD$ table so that it doesn’t consume inordinate\
    \ amounts of space in your SYSTEM tablespace. (To move the AUD$ table out of the\
    \ SYSTEM tablespace, see the next section.) The easiest way to purge audit records\
    \ is to delete from or truncate the audit table. This example truncates the AUD$\
    \ table:\n\nSQL> truncate table aud$;\n\nIf you need to save the AUD$ data, you\
    \ can first export the table and then use the TRUNCATE command to remove records.\
    \ If you want to preserve newer records in the AUD$ table, then use a DELETE\n\
    \nstatement. For example, this deletes records over 21 days old:\n\nSQL> delete\
    \ from aud$ where timestamp# > sysdate + 21;\n\nIf you need to remove audit records\
    \ from the operating system, use the Linux/Unix find command to identify files\
    \ over a certain age and then remove them. First, determine the directory location\
    \ of the audit files:\n\nSQL> select value from v$parameter where name='audit_file_dest';\n\
    \nVALUE\n\n/oracle/app/oracle/product/11.2.0/db_1/rdbms/audit\n\nCHAPTER 22 ■\
    \ DATABASE TROUBLESHOOTING\n\nNow from the operating system, navigate to the audit\
    \ file directory and identify and remove audit files over a certain age:\n\n$\
    \ cd /oracle/app/oracle/product/11.2.0/db_1/rdbms/audit\n\nUse the find and rm\
    \ command to remove any files over a certain age. The following command removes\
    \ any files with the extension of .aud from the current working directory that\
    \ are over seven days old:\n\n$ find . -maxdepth 1 -type f -mtime +7 -name \"\
    *.aud\" | xargs rm The prior technique permanently removes files from the operating\
    \ system. Ensure that you're in the correct location and that the audit files\
    \ are no longer needed.\n\nKeep in mind that you can use the DBMS_AUDIT_MGMT package\
    \ to purge audit trail records and audit trail files. I personally prefer to truncate\
    \ and remove files manually as shown in this section because it's simple and efficient.\
    \ If you want to use the DBMS_AUDIT_MGMT package to manage your audit space, see\
    \ the *Oracle Database Security* guide (available on Oracle's OTN site) for more\
    \ details.\n\nMoving the Audit Table to a Non-System Tablespace\n\nIf you're going\
    \ to do an extensive amount of auditing, I recommend moving the AUD$ table to\
    \ a non-SYSETM tablespace. You may want to do this so that auditing actions doesn’t\
    \ impact the space used in the SYSTEM tablespace or affect the performance of\
    \ the SYSTEM tablespace.\n\nUse the DBMS_AUDIT_MGMT package to move the AUD$ table\
    \ to a separate tablespace. This example moves the AUD$ table to a tablespace\
    \ named AUD_TBSP:\n\nBEGIN\n\nDBMS_AUDIT_MGMT.SET_AUDIT_TRAIL_LOCATION(\n\nAUDIT_TRAIL_TYPE\
    \ => DBMS_AUDIT_MGMT.AUDIT_TRAIL_AUD_STD,\n\nAUDIT_TRAIL_LOCATION_VALUE => 'AUD_TBSP');\n\
    \nEND;\n\n/\n\nIn the prior PL/SQL code, the AUDIT_TRAIL_TYPE parameter can have\
    \ the following values:\n\n• DBMS_AUDIT_MGMT.AUDIT_TRAIL_AUD_STD moves just the\
    \ standard audit trail AUD$\n\ntable.\n\n• DBMS_AUDIT_MGMT.AUDIT_TRAIL_FGA_STD\
    \ moves just the fine-grained audit trail FGA_LOG$ table.\n\n• DBMS_AUDIT_MGMT.AUDIT_TRAIL_DB_STD\
    \ moves both standard and fine-grained audit trail tables.\n\nBe aware that the\
    \ previous PL/SQL can take a long time if there are numerous records in the AUD$\n\
    \ntable. You can verify that the table was moved correctly via this query: SQL>\
    \ select table_name, tablespace_name from dba_tables where table_name='AUD$';\
    \ 632\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\n■ **Tip** If you want to manually\
    \ move the AUD$ table to a non-SYSTEM tablespace, refer to My Oracle Support note\
    \ 72460.1 for instructions. Be aware that manually moving the AUD$ table is not\
    \ supported by Oracle Support and may cause issues when upgrading your database.\
    \ I only mention it because I know many DBAs who manually move the AUD$ table.\
    \ If you're maintaining a database that you inherited from other DBAs, you need\
    \ to be aware of this type of activity.\n\nAuditing at a Granular Level\n\n*Fine-grained\
    \ auditing* (FGA auditing) is a separate feature from regular database auditing.\
    \ Fine-grained auditing allows you to audit SQL at a more granular level than\
    \ simple INSERT, UPDATE, DELETE, and SELECT\n\noperations. FGA auditing allows\
    \ you to audit for SQL activities that occur at the column level. FGA auditing\
    \ also allows you to perform a Boolean check on an operation, such as “if the\
    \ value selected is in a range then audit the activity.”\n\nYou manage fine-grained\
    \ auditing through the use of FGA policies. The DBMS_FGA package allows you to\
    \ add, disable, enable, and drop FGA policies. You need execute privilege on the\
    \ DBMS_FGA package to administer audit policies.\n\n■ **Note** The fine-grained\
    \ auditing feature requires the Enterprise Edition of Oracle.\n\nThe follow are\
    \ the steps to implement FGA:\n\n1\\. Create a policy using the DBMS_FGA package.\
    \ This example creates a policy for the INV table and specifies that any INSERT,\
    \ UPDATE, DELETE, or SELECT statement against the SALARY column of the EMP table\
    \ will be recorded in the audit trail: begin\n\ndbms_fga.add_policy (\n\nobject_schema\
    \ => 'INV',\n\nobject_name => 'EMP',\n\naudit_column=> 'SALARY',\n\npolicy_name\
    \ => 'S1_AUDIT',\n\nstatement_types => 'INSERT, UPDATE, DELETE, SELECT',\n\naudit_trail\
    \ => DBMS_FGA.DB_EXTENDED\n\n);\n\nend;\n\n/\n\n2\\. Verify that the policy exists\
    \ by querying the DBA_AUDIT_POLICIES view: select object_schema\n\n,object_name\n\
    \n,policy_name\n\n,sel, ins, upd, del, policy_column\n\nfrom dba_audit_policies;\n\
    \nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nHere’s the output for this example:\n\
    \nOBJECT_SCHEMA OBJECT_NAME POLICY_NAME SEL INS UPD DEL POLICY_COL\n\n--------------\
    \ -------------- -------------- ----- ----- ----- ----- ----------\n\nINV EMP\
    \ S1_AUDIT YES YES YES YES SALARY\n\n3\\. To view the recorded SQL statements\
    \ in the FGA audit trail, select from the DBA_FGA_AUDIT_TRAIL view:\n\nselect\n\
    \ndb_user\n\n,to_char(timestamp,'dd-mon-yy hh24:mi:ss') ts\n\n,sql_text\n\nfrom\
    \ dba_fga_audit_trail\n\norder by timestamp;\n\n■ **Note** The DBA_FGA_AUDIT_TRAIL\
    \ view is based on the FGA_LOG$ table.\n\nHere’s some sample output:\n\nDB_USER\
    \ TS SQL_TEXT\n\n--------------- ------------------------ --------------------------\n\
    \nINV 21-jul-09 21:47:07 select * from emp\n\nSYSTEM 21-jul-09 21:58:36 select\
    \ salary from inv.emp\n\nIf you need to disable a policy, use the DISABLE_POLICY\
    \ procedure:\n\nSQL> exec dbms_fga.disable_policy('INV','EMP','S1_AUDIT');\n\n\
    To drop a policy, use the DROP_POLICY procedure:\n\nSQL> exec dbms_fga.drop_policy('INV','EMP','S1_AUDIT');\n\
    \nAs the SYS schema you can purge records from the fine-grained auditing audit\
    \ table as follows: SQL> truncate table fga_log$;\n\n■ **Tip** For more details\
    \ on fine-grained auditing, see Oracle’s Security Guide available on Oracle's\
    \ OTN website.\n\nSummary\n\nA senior database administrator must be adept at\
    \ efficiently determining the source of database unavailability and performance\
    \ problems. Identifying and resolving problems defines a professional level DBA.\
    \ Anyone can Google a topic (there's nothing worse than being on a trouble call\
    \ with a manager who is Googling and recommending random solutions). Determining\
    \ the appropriate solution and confidently applying it in a production database\
    \ environment is where you add tremendous value.\n\nDiagnosing issues sometimes\
    \ requires some system and network administrator skills. An effective DBA must\
    \ also know how to leverage the Oracle data dictionary to identify problems. As\
    \ part of your 634\n\nCHAPTER 22 ■ DATABASE TROUBLESHOOTING\n\nstrategy, you should\
    \ also proactively monitor for the common sources of database unavailability.\
    \ Ideally, you'll be aware of the problem before anybody else and will proactively\
    \ solve the issue.\n\nNo book can cover every troubleshooting activity. This chapter\
    \ includes some of the most common techniques for identifying problems and dealing\
    \ with them. Often, basic operating system utilities will help you identify the\
    \ source of a hung database. In almost every scenario, the alert.log and corresponding\
    \ trace files should be inspected. Finding the actual root cause of a problem\
    \ is often the hardest task. Use a consistent and methodical approach and you'll\
    \ be much more successful in diagnosing and resolving issues.\n\nThis is the end\
    \ of the book. I have tried to convey techniques and methods that will help you\
    \ survive even the most chaotic database environments. To summarize these thoughts,\
    \ a DBA's manifesto of sorts:\n\n• Automate and monitor through scripts and schedulers.\
    \ Be the first to know when something is broken.\n\n• Strive for repeatability\
    \ and efficiency in processes and scripts. Be consistent.\n\n• Keep it simple.\
    \ If a module is over a page long, it’s too long. Don’t implement a script or\
    \ feature that another DBA won’t be able to understand or maintain.\n\nSometimes\
    \ the simple solution *is* the correct solution.\n\n• Remain calm regardless of\
    \ the disaster. Be respectful.\n\n• Don’t be afraid to seek or take advice. Welcome\
    \ feedback and criticism. Listen to others. Entertain the thought that you might\
    \ be wrong.\n\n• Take advantage of graphical tools, but always know how to manually\
    \ implement a feature.\n\n• Expect failure, predict failure, prepare for failure.\
    \ You don't know what will go wrong but you do know something will go wrong. Be\
    \ happy that you prepared for failure. The best lessons are painful.\n\n• Test\
    \ and document your operating procedures. This will help you stay calm(er) and\
    \ focused when in stressful database-down situations.\n\n• Don’t write code to\
    \ implement a feature that the database vendor has already provided a solution\
    \ for (replication, disaster recovery, backup and recovery, and so on).\n\n• Become\
    \ proficient with SQL, procedural SQL, and OS commands. These skills separate\
    \ the weak from the strong. The best DBAs posses both SA and developer expertise.\n\
    \n• Continually investigate new features and technology. Learning is a never-ending\
    \ process. Question everything, re-evaluate, and look for a better way. Verify\
    \ your solutions with repeatable peer-reviewed tests. Document and freely share\
    \ your knowledge.\n\n• Do what it takes to get the job done. You compete with\
    \ the world now. Work harder and smarter.\n\nThe job of a database administrator\
    \ can be quite rewarding. It can also be very painful and stressful.\n\nHopefully,\
    \ the techniques documented in this book will get you from being mostly stressed\
    \ to an occasionally happy state. Good luck.\n\n![](index-671_1.png)\n\n■ INDEX\n\
