    Silent installs can be scripted and automated. This means every install can be
    performed with the same consistent standards regardless of which team member is
    performing the install (I even have the SA install the Oracle binaries this way).


    The key to performing a silent install is to use a response file. After unzipping
    the Oracle software, find the sample response files that Oracle provides:


    $ find . -name "*.rsp"


    Depending on the version of Oracle and the operating system platform, the names
    and number of response files that you find may be quite different. The next two
    subsections show two scenarios: an Oracle Database 10 *g* release 2 and an Oracle
    Database 11 *g* release 2 silent install.


    Oracle Database 10g Scenario


    A variety of default response files ship with the Oracle installation software.
    These files vary somewhat depending on the database version and operating system.
    For example, here are the response files provided in an Oracle Database 10 *g*
    release 2 (Solaris) environment: 8


    CHAPTER 1 ■ INSTALLING THE ORACLE BINARIES


    $ find . -name "*.rsp"


    ./response/emca.rsp


    ./response/custom.rsp


    ./response/enterprise.rsp


    ./response/dbca.rsp


    ./response/netca.rsp


    ./response/standard.rsp


    ./install/response/se.rsp


    ./install/response/pe.rsp


    ./install/response/ee.rsp


    ./inst.rsp


    Copy the enterprise.rsp file to the current working directory, and give it a different
    name (so that you always have the original to reference):


    $ cp response/enterprise.rsp inst.rsp


    Edit the inst.rsp file with an operating system utility such as vi, and provide
    values for the response file variables. Here are the minimal values you need to
    provide for a typical Oracle Database 10 *g* installation:


    RESPONSEFILE_VERSION=2.2.1.0.0


    # install group, I use dba, many others use oinstall


    UNIX_GROUP_NAME=dba


    FROM_LOCATION="/ora01/orainst/10.2.0.1/stage/products.xml"


    n_configurationOption=3


    s_nameForDBAGrp=dba


    s_nameForOPERGrp=dba


    ORACLE_HOME=/ora01/app/oracle/product/10.2.0.4/db_1


    ORACLE_HOME_NAME=OHOME10


    ■ **Note** Refer to the Oracle Universal Installer Guide available on Oracle’s
    OTN web site for a complete description of all response-file variables.


    I don’t modify any other response-file values in this scenario. I leave them blank
    or leave them with the defaults already specified. Now, run the runInstaller utility
    in silent mode, providing a full directory path to the response file location:


    $ ./runInstaller -ignoreSysPrereqs -force -silent \


    -responseFile /ora01/orainst/10.2.0.1/inst.rsp


    ■ **Note** On Windows, the setup.exe command is equivalent to the Linux/Unix runInstaller
    command.


