    and end markers has been applied to the datafile, Oracle throws this error:


    ORA-01195: online backup of file 1 needs more recovery to be consistent All redo
    generated during the hot backup of a tablespace must be applied to the datafiles
    before they can be opened. Oracle at minimum needs to apply everything between
    the begin-backup SCN marker and the end-backup marker, to account for every block
    modified while the tablespace was in backup mode. This redo is in archive-redo
    log files; or, if the failure happened right after the backup ended, some of the
    redo may not have been archived and is in the online-redo logs. Therefore, you
    have to instruct Oracle to apply what’s in the online-redo logs.


    Understanding that Datafiles *Are* Updated


    Notice in Figure 16–2 and Figure 16–3 that the behavior of the database writer
    is for the most part unchanged throughout the backup procedure. The database writer
    continues to write blocks to datafiles regardless of the backup mode of the database.
    It doesn’t care if a hot backup is taking place; its job is to write blocks from
    the buffer cache to the datafiles.


    Every once in while, you run into a DBA who states that the database writer doesn’t
    write to datafiles during user-managed hot backups. This is a widespread misconception.
    Use some common sense: if the database writer isn’t writing to the datafiles during
    a hot backup, then where are the changes being written? If the transactions are
    being written to somewhere other than the datafiles, how would those datafiles
    be resynchronized after the backup? It doesn’t make any sense.


    Some DBAs say, “The datafile header is frozen, which means no changes to the datafile.”
    Oracle does freeze the SCN to indicate the start of the hot backup in the datafile
    header and doesn’t update that SCN until the tablespace is taken out of backup
    mode. This “frozen SCN” doesn’t mean blocks aren’t being written to datafiles
    during the backup. You can easily demonstrate that a datafile is written to during
    backup mode by doing this:


    1\. Put a tablespace in backup mode:


    SQL> alter tablespace users begin backup;


    2\. Create a table that has a character field:


    SQL> create table cc(cc varchar2(20)) tablespace users;


    3\. Insert a string into that table:


    SQL> insert into cc values(''DBWR does write'');


    4\. Switch the online-redo log files to force a checkpoint:


    SQL> alter system switch logfile;


    5\. From the OS, use the strings and grep commands to search for the string in
    the datafile:


    $ strings /ora02/dbfile/O11R2/users01.dbf | grep "DBWR does write"


    6\. Here’s the output proving that the database writer did write the data to disk:
    DBWR does write


    7\. Don’t forget to take the tablespace out of backup mode:


    SQL> alter tablespace users end backup;


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    Performing a Complete Recovery of an Archivelog-Mode


    Database


    *Complete recovery* means you can recover all transactions that were committed
    before a failure occurred.


    Complete recovery doesn’t mean you completely restore and recover the entire database.
    For example, if only one datafile has experienced media failure, you only need
    to restore and recover the damaged datafile to perform a complete recovery.


    ■ **Tip** If you have access to a test or development database, take the time
    to walk through each step in each example in this section. Going through these
    steps can teach you more about B&R than any documentation.


    The steps in this section apply to any database backed up while in archivelog
    mode. It doesn’t matter if you made a cold backup or hot backup. The steps to
    restore and recover datafiles are the same, as long as the database was in archivelog
    mode during the backup. For a complete recovery, you need


    • To be able to restore the datafiles that have experienced media failure


    • Access to all archive-redo logs generated since the last backup was started


    • Have intact online-redo logs.


    Here’s the basic procedure for a complete recovery:


    1\. Any datafiles being restored need to be offline before the restoration can
    take place; the easiest way to achieve this is to place your database in mount
    mode.


    2\. Restore the damaged datafiles with an OS copy utility.


    3\. Issue the appropriate SQL*Plus RECOVER command to apply any information required
    in the archive-redo logs and online-redo logs.


    4\. Alter the database open.


    The next several sections demonstrate some common complete restore and recovery
    scenarios. You should be able to apply these basic scenarios to diagnose and recover
    from any complex situation you find yourself in.


    Restoring and Recovering with the Database Offline


    This section details a simple restore-and-recovery scenario. Described next are
    the steps to simulate a failure and then perform a complete restore and recovery.
    Try this scenario in a development database.


    Ensure that you have a good backup and that you aren’t trying this experiment
    in a database that contains critical business data.


    Before you start this example, create a table and insert some data. This table
    and data are selected from at the end of the complete recovery process to demonstrate
    a successful recovery: SQL> create table foo(foo number) tablespace users;


    SQL> insert into foo values(1);


    SQL> commit;


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    Now, switch the online logs several times. Doing so ensures that you have to apply
    archive-redo logs as part of the recovery:


    SQL> alter system switch logfile;


    The forward slash (/) reruns the most recently executed SQL statement: SQL> /


    SQL> /


    SQL> /


    Next, simulate a media failure by renaming the datafile associated with the USERS
    tablespace. You can identify the name of the datafile associated with the USERS
    tablespace with this query: SQL> select file_name from dba_data_files where tablespace_name=''USERS'';
    FILE_NAME


    /ora02/dbfile/O11R2/users01.dbf


    From the OS, rename the file:


    $ mv /ora02/dbfile/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf.old And attempt
    to stop your database:


    $ sqlplus / as sysdba


    SQL> shutdown immediate;


    You should see an error similar to the following:


    ORA-01110: data file 4: ''/ora02/dbfile/O11R2/users01.dbf''


    ORA-27041: unable to open file


    If this were a real disaster, it would be prudent to navigate to the datafile
    directory, list the files, and see if the file in question was in its correct
    location. You should also inspect the alert.log file to see if any relevant information
    is logged there by Oracle.


    Now that you’ve simulated a media failure, the next several steps walk you through
    a restore and complete recovery.


    Step 1: Place Your Database in Mount Mode


    Before you place your database in mount mode, you may need to first shut it down
    using ABORT: $ sqlplus / as sysdba


    SQL> shutdown abort;


    SQL> startup mount;


    Step 2: Restore the Datafile from the Backup


    The next step is to copy from the backup the datafile that corresponds to the
    one that has had a failure: $ cp /oradump/hbackup/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf
    At this point, it’s instructional to ponder what Oracle would do if you attempted
    to start your database. When you issue the ALTER DATABASE OPEN statement, Oracle
    inspects the SCN in the control file for each datafile. You can inspect this SCN
    by querying V$DATAFILE:


    k


    CHAPTER 16 ■ USER-MANAGED BACKUP AND RECOVERY


    SQL> select checkpoint_change# from v$datafile where file#=4;


    CHECKPOINT_CHANGE#


    Oracle compares the SCN in the control file with the SCN in the datafile header.
    You can inspect the SCN in the datafile header by querying V$DATAFILE_HEADER.
    For example: SQL> select file#, checkpoint_change# from v$datafile_header where
    file#=4; FILE# CHECKPOINT_CHANGE#


