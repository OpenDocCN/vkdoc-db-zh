    \ \"Usage: $0 SID\"\n    exit 1\nfi\n# 加载 oracle 操作系统变量\n. /var/opt/oracle/oraset\
    \ $1\n#\ncrit_var=$(sqlplus -s <<EOF\n/ as sysdba\nSET HEAD OFF FEED OFF\nSELECT\
    \ count(*)\nFROM dba_users\nWHERE lock_date IS NOT NULL\nAND username in ('CIAP','REPV','CIAL','STARPROD');\n\
    EOF)\n#\nif [ $crit_var -ne 0 ]; then\n    echo $crit_var\n    echo \"locked acct.\
    \ issue with $1\" | mailx -s \"locked acct. issue\" dkuhn@sun.com\nelse\n    echo\
    \ $crit_var\n    echo \"no locked accounts\"\nfi\nexit 0\n```\n\n此 shell 脚本从诸如\
    \ `cron` 的调度工具调用。例如，此 `cron` 条目指示作业每十分钟运行一次：\n```\n# 检测被锁定的数据库账户的作业\n0,10,20,30,40,50\
    \ * * * * /home/oracle/bin/lock.bsh DWREP\n1>/home/oracle/bin/log/lock.log 2>&1\n\
    ```\n\n通过这种方式，当生产数据库账户之一被锁定时，我会收到通知。在此 `cron` 条目中，代码应位于一行。本书中将其置于两行是为了适应页面排版。\n\
    \n# 检查超过一定期限的文件\n\n对于我从 shell 脚本运行的一些作业（如备份），我会首先检查另一个备份作业是否已经在运行。该检查涉及查找一个锁文件。如果锁文件存在，则\
    \ shell 脚本退出。\n\n如果锁文件不存在，则创建一个。在作业结束时，锁文件被删除。\n\n有时发生的情况是作业出现问题，并在删除锁文件之前异常中止。在这些情况下，我想知道服务器上是否存在超过一天的旧锁文件。存在旧锁文件表明出现问题，因此我需要调查。**清单\
    \ 21–7** 检查 `/tmp` 目录中任何超过一天的锁文件。\n\n**清单 21–7.** 用于检查 `/tmp` 目录中任何超过一天锁文件的脚本\n\
    ```\n#!/bin/bash\nBOX=$(uname -a | awk '{print $2}')\n# 查找所有超过 1 天的旧锁文件。\n# 在\
