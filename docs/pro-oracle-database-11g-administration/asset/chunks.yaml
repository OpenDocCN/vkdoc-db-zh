    Renaming a Tablespace


    Sometimes you need to rename a tablespace. You may want to do this because a tablespace
    was initially erroneously named, or you may want the tablespace name to better
    conform to your database naming standards. Use the ALTER TABLESPACE statement
    to rename a tablespace. This example renames a tablespace from FOOBAR to USERS:


    SQL> alter tablespace foobar rename to users;


    When you rename a tablespace, Oracle updates the name of the tablespace in the
    data dictionary, control files, and data headers. Keep in mind that renaming a
    tablespace doesn’t rename any associated datafiles. Renaming datafiles is covered
    later in this chapter.


    ■ **Note** You can’t rename the SYSTEM tablespace or the SYSAUX tablespace.


    Controlling the Generation of Redo


    For some types of applications, you may know beforehand that you can easily re-create
    the data. An example might be a data-warehouse environment where you perform direct
    path inserts or use SQL*Loader to load data. In these scenarios, you can turn
    off the generation of redo for direct path loading. You use the NOLOGGING clause
    to do this:


    create tablespace inv_mgmt_data


    datafile ''/ora02/dbfile/O11R2/inv_mgmt_data01.dbf'''' size 100m


    extent management local


    uniform size 128k


    segment space management auto


    nologging;


    If you have an existing tablespace and want to alter its logging mode, use the
    ALTER TABLESPACE


    statement:


    SQL> alter tablespace inv_mgmt_data nologging;


    You can confirm the tablespace logging mode by querying the DBA_TABLESPACES view:
    SQL> select tablespace_name, logging from dba_tablespaces;


    CHAPTER 4 ■ TABLESPACES AND DATAFILES


    The generation of redo logging can’t be suppressed for regular INSERT, UPDATE,
    and DELETE


    statements. For regular Data Manipulation Language (DML) statements, the NOLOGGING
    clause is ignored.


    The NOLOGGING clause does apply, however, to the following types of DML:


    • Direct path INSERT statements


    • Direct path SQL*Loader


    The NOLOGGING clause also applies to the following types of DDL statements:


    • CREATE TABLE ... AS SELECT


    • ALTER TABLE ... MOVE


    • ALTER TABLE ... ADD/MERGE/SPLIT/MOVE/MODIFY PARTITION


    • CREATE INDEX


    • ALTER INDEX ... REBUILD


    • CREATE MATERIALIZED VIEW


    • ALTER MATERIALIZED VIEW ... MOVE


    • CREATE MATERIALIZED VIEW LOG


    • ALTER MATERIALIZED VIEW LOG ... MOVE


    Be aware that if redo isn’t logged for a table or index, and you have a media
    failure before the object is backed up, then you can’t recover the data. You receive
    an ORA-01578 error indicating that there is logical corruption of the data.


    ■ **Note** You can also override the tablespace level of logging at the object
    level. For example, even if a tablespace specified as NOLOGGING, you can create
    a table with the LOGGING clause.


    Changing a Tablespace’s Write Mode


    In environments such as data warehouses, you may need to load data into tables
    and then never modify the data again. To enforce that all objects in a tablespace
    can’t be modified, you can alter the tablespace to be read-only. To do this, use
    the ALTER TABLESPACE statement:


    SQL> alter tablespace inv_mgmt_rep read only;


    One advantage of a read-only tablespace is that you only have to back it up once.
    You should be able to restore the datafiles from a read-only tablespace no matter
    how long ago the backup was made.


    If you need to modify the tablespace out of read-only mode, you do so as follows:
    SQL> alter tablespace inv_mgmt_rep read write;


    Make sure you re-enable backups of a tablespace after you place it in read/write
    mode.


    CHAPTER 4 ■ TABLESPACES AND DATAFILES


    ■ **Note** You can’t make a tablespace that contains active rollback segments
    read-only. For this reason, the SYSTEM


    tablespace can’t be made read-only, because it contains the SYSTEM rollback segment.


    In Oracle Database 11 *g* and above, you can modify individual tables to be read-only.
    For example: SQL> alter table my_tab read only;


    While in read-only mode, you can’t issue any insert, update, or delete statements
    against the table.


    Making individual tables read/write can be advantageous when you’re doing maintenance
    (such as a data migration) when you want to ensure that users don’t update the
    data.


    This example modifies a table back to read/write mode:


    SQL> alter table my_tab read write;


    Dropping a Tablespace


    If you have a tablespace that is unused, it’s best to drop it so it doesn’t clutter
    your database, consume unnecessary resources, and potentially confuse DBAs who
    aren’t familiar with the database. Before dropping a tablespace, it’s a good practice
    to first take it offline: SQL> alter tablespace inv_data offline;


    You may want to wait to see if anybody screams that an application is broken because
    it can’t write to a table or index in the tablespace to be dropped. When you’re
    sure the tablespace isn’t required, drop the tablespace and delete its datafiles:


    SQL> drop tablespace inv_data including contents and datafiles;


    ■ **Tip** You can drop a tablespace whether it’s online or offline. The exception
    to this is the SYSTEM tablespace, which can’t be dropped. It’s always a good idea
    to take a tablespace offline before you drop it. By doing so, you can better determine
    if an application is using any objects in the tablespace. If you attempt to query
    a table in an offline tablespace, you receive an “ORA-00376: file can’t be read
    at this time” error.


    Dropping a tablespace using INCLUDING CONTENTS AND DATAFILES permanently removes
    the tablespace and any of its datafiles. Make certain the tablespace doesn’t contain
    any data you want to keep before you drop it.


    If you attempt to drop a tablespace that contains a primary key that is referenced
    by a foreign key associated with a table in a different tablespace (than the one
    you’re trying to drop), you receive this error:


    ORA-02449: unique/primary keys in table referenced by foreign keys


    CHAPTER 4 ■ TABLESPACES AND DATAFILES


    Run this query first to determine whether any foreign-key constraints will be
    affected: select p.owner,


    p.table_name,


    p.constraint_name,


    f.table_name referencing_table,


    f.constraint_name foreign_key_name,


    f.status fk_status


    from dba_constraints P,


    dba_constraints F,


    dba_tables T


    where p.constraint_name = f.r_constraint_name


    and f.constraint_type = ''R''


    and p.table_name = t.table_name


    and t.tablespace_name = UPPER(''&tablespace_name'')


    order by 1,2,3,4,5;


    If there are referenced constraints, you need to first drop the constraints or
    use the CASCADE


    CONSTRAINTS clause of the DROP TABLESPACE statement. This statement uses CASCADE
    CONSTRAINTS to automatically drop any affected constraints:


    SQL> drop tablespace inv_data including contents and datafiles cascade constraints;
    This statement drops any referential-integrity constraints from tables outside
    the tablespace being dropped that reference tables within the dropped tablespace.


    If you drop a tablespace that has required objects in a production system, the
    results can be catastrophic. You must perform some sort of recovery to get the
    tablespace and its objects back.


    Needless to say, be very careful when dropping a tablespace. Table 4–2 lists recommendations
    to consider when you do this.


