    You can verify user account information by viewing the `/etc/passwd` file. Here
    is what you can expect to see after running the `useradd` command:


    `oracle:x:500:500::/home/oracle:/bin/bash`


    You can also use the `id` command to display the operating system user and group
    information: `$ id`


    `uid=500(oracle) gid=500(dba) groups=500(dba)`


    On most Linux systems, the default value for the `HOME` variable is `/home/oracle`,
    and the default shell is the Bash shell. You can display the value of `HOME` and
    `SHELL` as follows: `$ echo $HOME`


    `$ echo $SHELL`


    If you need to modify a user, use the `usermod` command. If you need to remove
    an operating system user, use the `userdel` command. You need root privileges
    to run the `userdel` command. This example removes the `oracle` user from the
    server:


    `# userdel oracle`


    ## Step 2. Ensure That the Operating System Is Adequately Configured


    The tasks associated with this step vary somewhat for each database release and
    operating system. You must refer to the Oracle installation manual for the database
    release and operating system vendor to get the exact requirements. To perform
    this step, you’re required to verify and configure operating system components
    such as the following:


    - Memory and swap space

    - System architecture (processor)

    - Free disk space (Oracle now takes almost 5GB of space to install)

    - Operating system version and kernel

    - Operating system software (required packages and patches)


    Run the following command to confirm the size of memory on a Linux server: `$
    grep MemTotal /proc/meminfo`


    To verify the amount of memory and swap space, run the following command:


    `$ free -t`


    To verify the amount of space in the `/tmp` directory, enter this command: `$
    df -h /tmp`


    To display the amount of free disk space, execute this command:


    `$ df -h`


    To verify the operating system version, enter this command:


    `$ cat /proc/version`


    To verify kernel information, run the following command:


    `$ uname -r`


    To determine whether the required packages are installed, execute the following
    and provide the required package name:


    `$ rpm -q <package_name>`


    Again, database server requirements vary quite a bit by operating system and database
    version. You can download the specific installation manual from Oracle’s web site
    at `www.oracle.com/documentation`.


    ■ **Note** The OUI displays any deficiencies in operating system software and
    hardware. Running the installer is covered in the “Step 5” section.


    ## Step 3. Obtain the Oracle Installation Software


    Usually, the easiest way to obtain the Oracle software is to download it from
    the Oracle software web site: `www.oracle.com/technology/software`. Navigate to
    the software download page, and download the Oracle database version that is appropriate
    for the type of operating system and hardware on which you want to install it
    (Linux, Solaris, Windows, and so on).


    ## Step 4. Unzip the Files


    Before you unzip the files, I recommend that you create a standard directory where
    you can place the Oracle installation media. You should do this for a couple of
    reasons: When you come back to a box a week, month, or year later, you’ll want
    to be able to easily find the installation media.


    Standard directory structures help you organize and understand quickly what has
    or hasn’t been installed on the box.


    Create a standard set of directories to contain the files used to install the
    Oracle software. I like to store the installation media in a directory such as
    `/ora01/orainst` and then create a subdirectory there for each version of the
    Oracle software that is installed on the box:


    `$ mkdir -p /ora01/orainst/10.2.0.1`


    `$ mkdir -p /ora01/orainst/10.2.0.4`


    `$ mkdir -p /ora01/orainst/11.2.0.1`


    Now, move the installation files to the appropriate directory, and unzip them
    there:


    `$ mv linux_11gR2_database_1of2.zip /ora01/orainst/11.2.0.1`


    `$ mv linux_11gR2_database_2of2.zip /ora01/orainst/11.2.0.1`


    Use the `unzip` command for unbundling zipped files. The Oracle Database 11 *g*
    release 2 software is unzipped as shown:


    ```

    $ unzip linux_11gR2_database_1of2.zip

    $ unzip linux_11gR2_database_2of2.zip

    ```


    On some installations of Oracle, you may find that the distribution file is provided
    as a compressed cpio file. You can uncompress and unbundle the file with one command
    as follows:


    `$ cat 10gr2_db_sol.cpio.gz | gunzip | cpio -idvm`


    ## Step 5. Configure the Response File, and Run the Installer


    You can run the OUI in one of two modes: graphical or silent. Typically, DBAs
    use the graphical installer.


    However, I strongly prefer using the silent install option for the following reasons:
    Silent installs don’t require the availability of X Window System software.


    You avoid performance issues with remote graphical installs that can be extremely
    slow when trying to paint screens locally.


    Silent installs can be scripted and automated. This means every install can be
    performed with the same consistent standards regardless of which team member is
    performing the install (I even have the SA install the Oracle binaries this way).


    The key to performing a silent install is to use a response file. After unzipping
    the Oracle software, find the sample response files that Oracle provides:


    `$ find . -name "*.rsp"`


    Depending on the version of Oracle and the operating system platform, the names
    and number of response files that you find may be quite different. The next two
    subsections show two scenarios: an Oracle Database 10 *g* release 2 and an Oracle
    Database 11 *g* release 2 silent install.


    ### Oracle Database 10g Scenario


    A variety of default response files ship with the Oracle installation software.
    These files vary somewhat depending on the database version and operating system.
    For example, here are the response files provided in an Oracle Database 10 *g*
    release 2 (Solaris) environment:


    `$ find . -name "*.rsp"`


    `./response/emca.rsp`


    `./response/custom.rsp`


    `./response/enterprise.rsp`


    `./response/dbca.rsp`


    `./response/netca.rsp`


    `./response/standard.rsp`


    `./install/response/se.rsp`


    `./install/response/pe.rsp`


    `./install/response/ee.rsp`


    `./inst.rsp`


    Copy the `enterprise.rsp` file to the current working directory, and give it a
    different name (so that you always have the original to reference):


    `$ cp response/enterprise.rsp inst.rsp`


    Edit the `inst.rsp` file with an operating system utility such as `vi`, and provide
    values for the response file variables. Here are the minimal values you need to
    provide for a typical Oracle Database 10 *g* installation:


    ```

    RESPONSEFILE_VERSION=2.2.1.0.0

    # install group, I use dba, many others use oinstall

    UNIX_GROUP_NAME=dba

    FROM_LOCATION="/ora01/orainst/10.2.0.1/stage/products.xml"

    n_configurationOption=3

    s_nameForDBAGrp=dba

    s_nameForOPERGrp=dba

    ORACLE_HOME=/ora01/app/oracle/product/10.2.0.4/db_1

    ORACLE_HOME_NAME=OHOME10

    ```


    ■ **Note** Refer to the Oracle Universal Installer Guide available on Oracle’s
    OTN web site for a complete description of all response-file variables.


    I don’t modify any other response-file values in this scenario. I leave them blank
    or leave them with the defaults already specified. Now, run the `runInstaller`
    utility in silent mode, providing a full directory path to the response file location:


    `$ ./runInstaller -ignoreSysPrereqs -force -silent -responseFile /ora01/orainst/10.2.0.1/inst.rsp`


    ■ **Note** On Windows, the `setup.exe` command is equivalent to the Linux/Unix
    `runInstaller` command.


    The installer displays quite a bit of output. If all system checks pass, it takes
    a few minutes to install the Oracle software. After it successfully completes,
    you should see this message: The following configuration scripts `/ora01/app/oracle/product/10.2.0.4/db_1/root.sh`
    need to be executed as root for configuring the system.


    Log in as root, and run `root.sh`:'
