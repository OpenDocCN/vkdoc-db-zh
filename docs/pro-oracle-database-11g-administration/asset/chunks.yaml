    Summary


    Data Pump is an extremely powerful and feature-rich tool. If you haven’t used
    Data Pump much, then I implore you to take some time to read this chapter and
    work through the examples. This tool greatly simplifies tasks like moving users
    and data from one environment to another. You can export and import subsets of
    users, filter and remap data via SQL and PL/SQL, rename users and tablespaces,
    compress, encrypt, and parallelize, all with one command. It really is that powerful.


    DBAs sometimes stick with the old exp/imp utilities because that’s what they’re
    familiar with (I’m occasionally guilty of this). If you’re running Oracle Database
    11 *g* release 2, you can directly use the old exp/imp parameters and options
    directly from the command line. Data Pump translates these parameters on the fly
    to Data Pump–specific syntax. This feature nicely facilitates the migration from
    the old to the new. For reference, I’ve also provided a mapping of the old exp/imp
    syntax and how it relates to Data Pump commands.


    Although Data Pump is an excellent tool for moving database objects and data from
    one environment to another, sometimes you need to transfer large quantities of
    data to and from operating-system flat files. You use external tables to achieve
    this task. This is the topic of the next chapter in this book.


    ![](index-379_1.png)


    CHAPTER 14 ■ EXTERNAL TABLES


    A quick comparison of using SQL*Loader and external tables highlights the differences.
    Listed next are the SQL*Loader steps that you use to load and transform of data:


    1.


    Create a parameter file that SQL*Loader uses to interpret the format of the data
    in the operating-system file.


    2.


    Create a regular database table into which SQL*Loader will insert records. The
    data will be staged here until it can be further processed.


    3.


    Run the SQL*Loader sqlldr utility to load data from the operating-system file
    into the database table (created in step 2). When loading data, SQL*Loader has
    some features that allow you to transform data. This step is sometimes frustrating
    because it can take several trial-and-error runs to correctly map the parameter
    file to the table and corresponding columns.


    4.


    Create another table that will contain the completely transformed data.


    5.


    First run SQL statements to load the data from the staging table (created in step
    2); then transform and insert the data into the production table (created in step
    4).


    Compare the previous SQL*Loader list to the following steps to load and transform
    data using external tables:


    1.


    Execute a CREATE TABLE...ORGANIZATION EXTERNAL script that maps the


    structure of the operating-system file to table columns. After this script is
    run, you can directly use SQL to query the contents of the operating-system file.


    2.


    Create a regular table to hold the completely transformed data.


    3.


    Run SQL statements to load and fully transform the data from the external table
    into the table created in step 2.


    For many shops, SQL*Loader underpins large data-loading operations. It continues
    to be a good tool to use for that task. However, you may want to investigate using
    external tables. External tables have the following advantages:


    •


    Loading data with external tables is more straightforward and requires fewer steps.


    •


    The interface for creating and loading from external tables is SQL*Plus. Many
    DBAs/developers find using SQL*Plus more intuitive and powerful than


    SQL*Loader’s parameter-file interface.


    •


    You can view data in an external table before it’s loaded into a database table.


    •


    You can load, transform, and aggregate the data without an intermediate staging
    table. For large amounts of data, this can be a huge space savings.


    The next several sections contain examples of using external tables to read from
    operating-system files.


    CHAPTER 14 ■ EXTERNAL TABLES


    Loading CSV Files into the Database


    You can load small or very large CSV flat files into the database using external
    tables and SQL. Figure 14–


    1 shows the architectural components involved with using an external table to
    view and load data from an operating-system file. A directory object is required
    that specifies the location of the operating-system file. The CREATE TABLE...ORGANIZATION
    EXTERNAL statement creates a database object that SQL*Plus can use to directly
    select from the operating-system file.


    ***Figure 14–1.** Architectural components of an external table used to read a
    flat file* Here are the steps for using an external table to access an operating-system
    flat file: 1. Create a database-directory object that points to the location of
    the CSV file.


    2\. Grant read and write privileges on the directory object to the user creating
    the external table. I usually use a DBA privileged account, so I don’t need to
    perform this step.


    3\. Run the CREATE TABLE...ORGANIZATION EXTERNAL statement.


    4\. Use SQL*Plus to access the contents of the CSV file.


    In this example, the flat file is named ex.csv and is located in the /oraet directory.
    It contains the following data:


    5|2|0|0|12/04/2009|Half


    6|1|0|1|03/31/2010|Quarter


    7|4|0|1|05/07/2010|Full


    8|1|1|0|04/30/2010|Quarter


    ■ **Note** Some of the CSV file examples used in this chapter are actually separated
    by characters other than a comma, such as a pipe | character. The character used
    depends on the data and the user who supplies the CSV


    file. CSV files are also often commonly referred to as flat files.


    CHAPTER 14 ■ EXTERNAL TABLES


    Creating a Directory Object and Granting Access


    First, create a directory object that points to the location of the flat file
    on disk: SQL> create directory exa_dir as ''/oraet'';


    This example uses a database account that has the DBA role granted to it; therefore,
    you don’t need to grant READ and WRITE to the directory object to the user (your
    account) that is accessing the directory object. If you’re not using a DBA account
    to read from the directory object, then grant these privileges to the account
    using this object:


    SQL> grant read, write on directory exa_dir to reg_user;


    Creating an External Table


    Next, fashion the script that creates the external table that will reference the
    flat file. The CREATE


    TABLE...ORGANIZATION EXTERNAL statement provides the database with the following
    information:


    • How to interpret data in the flat file, and a mapping of data in file-to-column
    definitions in the database


    • A DEFAULT DIRECTORY clause that identifies the directory object, which in turn
    specifies the directory of the flat file on disk


    • The LOCATION clause, which identifies the name of the flat file


    The next statement creates a database object that looks like a table yet is able
    to retrieve data directly from the flat file:


    create table exadata_et(


    exa_id NUMBER


    ,machine_count NUMBER


    ,hide_flag NUMBER


    ,oracle NUMBER


    ,ship_date DATE


    ,rack_type VARCHAR2(32)


    )


    organization external (


    type oracle_loader


    default directory exa_dir


    access parameters


    (


    records delimited by newline


    fields terminated by ''|''


    missing field values are null


    (exa_id


    ,machine_count


    ,hide_flag


    ,oracle


    ,ship_date char date_format date mask "mm/dd/yyyy"


    ,rack_type)


    )


    location (''ex.csv'')


    )


    reject limit unlimited;


    CHAPTER 14 ■ EXTERNAL TABLES


    An external table named EXADATA_ET is created when you execute this script. Now,
    use SQL*Plus to view the contents of the flat file:


    SQL> select * from exadata_et;


    EXA_ID MACHINE_COUNT HIDE_FLAG ORACLE SHIP_DATE RACK_TYPE


    ---------- ------------- ---------- ---------- --------- ---------


    5 2 0 0 04-DEC-09 Half


    6 1 0 1 31-MAR-10 Quarter


    7 4 0 1 07-MAY-10 Full


    8 1 1 0 30-APR-10 Quarter


    Viewing External-Table Metadata


    At this point, you can also view metadata regarding the external table. Query
    the DBA_EXTERNAL_TABLES


    view for details:


    select


    owner


    ,table_name


    ,default_directory_name


    ,access_parameters


    from dba_external_tables;


    Here’s a partial listing of the output:


    OWNER TABLE_NAME DEFAULT_DIRECTO ACCESS_PARAMETERS


    --------- ----------------- ------------------ ---------------------------


    BARTS EXADATA_ET EXA_DIR records delimited by newline Additionally, you can select
    from the DBA_EXTERNAL_LOCATIONS table for information regarding any flat files
    referenced in an external table:


    select


    owner


    ,table_name


    ,location


    from dba_external_locations;


    Here’s some sample output:


    OWNER TABLE_NAME LOCATION


    --------------- -------------------- ---------------


    BARTS EXADATA_ET ex.csv


    Loading a Regular Table from the External Table


    Now you can load data contained in the external table into a regular database
    table. When you do this, you can take advantage of Oracle’s direct-path loading
    and parallel features. This example creates a regular database table that will
    be loaded with data from the external table: create table exa_info(


    exa_id NUMBER


    ,machine_count NUMBER


    ,hide_flag NUMBER


    CHAPTER 14 ■ EXTERNAL TABLES


    ,oracle NUMBER


    ,ship_date DATE


    ,rack_type VARCHAR2(32)


    ) nologging parallel 2;


    You can direct-path load this regular table (via the APPEND hint) from the contents
    of the external table as follows:


    SQL> insert /*+ APPEND */ into exa_info select * from exadata_et;


    You can verify that the table was direct-path loaded by attempting to select from
    it before you commit the data:


    SQL> select * from exa_info;


    Here’s the expected error:


    ORA-12838: cannot read/modify an object after modifying it in parallel After you
    commit the data, you can select from the table:


    SQL> commit;


    SQL> select * from exa_info;


    The other way to direct-path load a table is to use the CREATE TABLE AS SELECT
    (CTAS) statement. A CTAS statement automatically attempts to do a direct-path
    load. In this example, the EXA_INFO table is created and loaded in one statement:


    SQL> create table exa_info nologging parallel 2 as select * from exadata_et; By
    using direct-path loading and parallelism, you can achieve loading performance
    similar to that from using SQL*Loader. The advantage of using SQL to create a
    table from an external table is that you can now perform complex data transformations
    using standard SQL*Plus features when building your regular database table (EXA_INFO,
    in this example).


    Any CTAS statements automatically process with the degree of parallelism that
    has been defined for the underlying table. However, when you use INSERT AS SELECT
    statements, you need to enable parallelism for the session:


    SQL> alter session enable parallel dml;


    As a last step, you should generate statistics for any table that has been loaded
    with a large amount of data. Here’s an example:


    exec dbms_stats.gather_table_stats(-


    ownname=>''BARTS'',-


    tabname=>''EXA_INFO'',-


    estimate_percent => 20, -


    cascade=>true);


    Performing Advanced Transformations


    Oracle provides sophisticated techniques for transforming data. This section details
    how to use a pipelined function to transform data in an external table. Listed
    next are the steps for doing this: 1\. Create an external table.


    2\. Create a record type that maps to the columns in the external table.


    CHAPTER 14 ■ EXTERNAL TABLES


    3\. Create a table based on the record type created in step 2


    4\. Create a piplelined function that is used to inspect each row as it’s loaded
    and transform data based on business requirements.


    5\. Use an INSERT statement that selects from the external table and uses the
    pipelined function to transform data as it’s loaded.


    This example uses the same external table and CSV file created in the previous
    section on loading data from CSV files. Recall that the external table name is
    EXADATA_ET and the CSV file name is ex.csv.


    After you create the external table, next create a record type that maps to the
    column names in the external table:


    create or replace type rec_exa_type is object


    (


    exa_id number


    ,machine_count number


    ,hide_flag number


    ,oracle number


    ,ship_date date


    ,rack_type varchar2(32)


    );


    /


    Next, create a table based on the previous record type:


    create or replace type table_exa_type is table of rec_exa_type;


    /


    Oracle PL/SQL allows you to use functions as a row source for SQL operations.
    This feature is known as *pipelining*. It lets you use complex transformation
    logic combined with the power of SQL*Plus. For this example, you create a pipelined
    function to transform selected column data as it’s loaded.


    Specifically, this function adds 30 days to the SHIP_DATE when the ORACLE column
    has a 0 value: create or replace function exa_trans


    return table_exa_type pipelined is


    begin


    for r1 in


    (select rec_exa_type(


    exa_id, machine_count, hide_flag


    ,oracle, ship_date, rack_type


    ) exa_rec


    from exadata_et) loop


    if (r1.exa_rec.oracle = 0) then


    r1.exa_rec.ship_date := r1.exa_rec.ship_date + 30;


    end if;


    pipe row (r1.exa_rec);


    end loop;


    return;


    end;


    /


    Now you can use this function to load data into a regular database table. For
    reference, here’s the CREATE TABLE statement that instantiates the table to be
    loaded:


    CHAPTER 14 ■ EXTERNAL TABLES


    create table exa_info(


    exa_id NUMBER


    ,machine_count NUMBER


    ,hide_flag NUMBER


    ,oracle NUMBER


    ,ship_date DATE


    ,rack_type VARCHAR2(32)


    ) nologging parallel 2;


    Next, use the pipelined function to transform data selected from the external
    table and insert it into the regular database table in one step:


    SQL> insert into exa_info select * from table(exa_trans);


    Here’s the data that was loaded into the EXA_INFO table for this example: SQL>
    select * from exa_info;


    EXA_ID MACHINE_COUNT HIDE_FLAG ORACLE SHIP_DATE RACK_TYPE


    ---------- ------------- ---------- ---------- --------- ------------


    5 2 0 0 03-JAN-10 Half


    6 1 0 1 31-MAR-10 Quarter


    7 4 0 1 07-MAY-10 Full


    8 1 1 0 30-MAY-10 Quarter


    Although the example in this section is simple, you can use the technique to apply
    any degree of sophisticated transformational logic. This technique allows you
    to embed the transformation requirements in a pipelined PL/SQL function that modifies
    data as each row is loaded.


    Viewing Text Files from SQL


    External tables allow you to use SQL SELECT statements to retrieve information
    from operating-system flat files. For example, say you want to report on the contents
    of the alert log file. First, create a directory object that points to the location
    of the alert log:


    SQL> select value from v$parameter where name =''background_dump_dest''; Here’s
    the output for this example:


    /oracle/app/oracle/diag/rdbms/o11r2/O11R2/trace


    Next, create a directory object that points at the location of the background
    dump destination: SQL> create directory t_loc as ''/oracle/app/oracle/diag/rdbms/o11r2/O11R2/trace'';
    Now, create an external table that maps to the database alert log operating-system
    file. In this example, the database name is O11R2, and thus the alert log file
    name is alert_O11R2.log: create table alert_log_file(


    alert_text varchar2(4000))


    organization external


    ( type oracle_loader


    default directory t_loc


    access parameters (


    records delimited by newline


    nobadfile


    nologfile


    CHAPTER 14 ■ EXTERNAL TABLES


    nodiscardfile


    fields terminated by ''#$~=ui$X''


    missing field values are null


    (alert_text)


    )


    location (''alert_O11R2.log'')


    )


    reject limit unlimited;


    You can query the table via SQL queries. For example:


    SQL> select * from alert_log_file where alert_text like ''ORA-%'';


    This allows you to use SQL to view and report on the contents of the alert log.
    You may find this a convenient way to provide SQL access to otherwise inaccessible
    operating-system files.


    The ACCESS PARAMETERS clause of an external table’s ORACLE_LOADER access driver
    may look familiar if you’ve previously worked with SQL*Loader. Table 14–1 describes
    some of the more commonly used access parameters. For a full list of access parameters,
    see Oracle’s *Database Utilities* guide (available on OTN).


