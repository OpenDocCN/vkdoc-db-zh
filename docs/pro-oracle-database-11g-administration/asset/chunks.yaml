    2\. If the script runs Oracle utilities, ensure that you *source* (set) the required
    operating system variables within the script such as ORACLE_HOME and


    ORACLE_SID. Oftentimes these variables are set by startup scripts (like HOME/.bashrc)
    when you log on. Since cron doesn’t run a user’s startup scripts, any required
    variables must be set explicitly within the script.


    3\. Ensure that the first line of any shell scripts invoked from cron specifies
    the name of the program that will be used to interpret the commands within the
    script. For example, #!/bin/bash should be the first entry in a Bash shell script.


    Since cron doesn’t run a user’s startup scripts (like HOME/.bashrc), you can’t
    assume that your operating system user’s default shell will be used to run a command
    or script evoked from cron.


    4\. Ensure that the cron background process is running. Issue the following from
    the operating system to verify:


    $ ps -ef | grep cron


    5\. If the cron daemon (background process) is running, you should see something
    similar to this:


    root 2969 1 0 Mar23 ? 00:00:00 crond


    6\. Check your e-mail on the server. The cron utility will usually send an e-mail
    to the operating system account when there are issues with a misbehaving cron
    job.


    7\. Inspect the contents of the /var/log/cron file for any errors. Sometimes this
    file has relevant information regarding a cron job that has failed to run.


    Examples of Automated DBA Jobs


    In today''s often chaotic business environment, it''s almost mandatory to automate
    jobs. If you don''t automate, you might forget to do a task or you may introduce
    error into the procedure if performing a job manually. If you don''t automate,
    you may find yourself replaced or outsourced by a more efficient or cheaper set
    of DBAs.


    When I automate jobs, usually the script will only send an e-mail in the event
    of a failure.


    Generating an e-mail upon success often leads to a full mailbox. Some DBAs like
    to see success messages. I usually don''t.


    DBAs automate a wide variety of tasks and jobs. Almost any type of environment
    requires that you create some sort of operating system script that encapsulates
    a combination of OS commands, SQL


    statements, and PL/SQL blocks.


    The following scripts in this chapter are a sample of the wide variety of different
    types of tasks that DBAs will automate. This set of scripts is by no means complete.
    Many of these scripts you may not need in your environment. The point is to give
    you a good sampling of the types of jobs automated and the techniques used to
    accomplish a given task.


    ■ **Note** Chapter 3 contains basic examples of some core scripts that DBAs require.
    This section provides advanced examples of tasks and scripts that DBAs commonly
    automate.


    CHAPTER 21 ■ AUTOMATING JOBS


    Starting and Stopping Database and Listener


    In many environments, it''s desirable to have the Oracle database and listener
    automatically shutdown and startup when the server reboots. If you have that requirement,
    then follow the next several steps to automate your database and listener shutdown
    and startup:


    1\. Edit the */etc/oratab* file, and place a *Y* at the end of the entry for the
    databases you want to automatically restart when the system reboots. You might
    need *root* privileges to edit the file:


    # vi /etc/oratab


    2\. Place within the file a line similar to this for your environment: O11R2:/oracle/app/oracle/product/11.2.0/db_1:Y


    3\. In the previous line, O11R2 is the database name, and


    /oracle/app/oracle/product/11.2.0/db_1 specifies the directory ORACLE_HOME.


    The Y on the end of the string signifies that the database can be started and
    stopped by the ORACLE_HOME/bin/dbstart and ORACLE_HOME/bin/dbshut scripts.


    You can replace the Y with an N if you do not want the database automatically
    stopped and restarted.


    ■ **Note** With some Unix systems (such as Solaris), the oratab file is usually
    located in the /var/opt/oracle directory.


    4\. As *root*, navigate to the */etc/init.d* directory, and create a file named
    *dbora*:


    # cd /etc/init.d


    # vi dbora


    5\. Place the following lines in the *dbora* file. Make sure you change the values
    of variables *ORA_HOME* and *ORA_OWNER* to match your environment. This is a bare
    bones script of what you minimally would need to stop and start a database and
    listener:


    #!/bin/bash


    # chkconfig: 35 99 10


    # description: Starts and stops Oracle processes


    ORA_HOME=/oracle/app/oracle/product/11.2.0/db_1


    ORA_OWNER=oracle


    case "$1" in


    ''start'')


    su - $ORA_OWNER -c "$ORA_HOME/bin/lsnrctl start"


    su - $ORA_OWNER -c $ORA_HOME/bin/dbstart


    ;;


    ''stop'')


    su - $ORA_OWNER -c "$ORA_HOME/bin/lsnrctl stop"


    su - $ORA_OWNER -c $ORA_HOME/bin/dbshut


    ;;


    esac


