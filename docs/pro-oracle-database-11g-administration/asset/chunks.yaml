    \ (sysdate - MAX(end_time)) delta\nFROM v\\$rman_backup_job_details) a\nWHERE\
    \ a.delta > $2;\nEOF)`\n\n#\n\n`if [ $crit_var -ne 0 ]; then`\n    `echo \"rman\
    \ backups not running on $1\" | mailx -s \"rman problem\" dkuhn@oracle.com`\n\
    `else`\n    `echo \"rman backups ran ok\"`\n`fi`\n\n`#--------------------------------------------`\n\
    \n`crit_var2=$(sqlplus -s <<EOF\ndarl/foobar\nSET HEAD OFF FEEDBACK OFF\nSELECT\
    \ COUNT(*)\nFROM\n(\n    SELECT name\n    FROM v\\$datafile\n    MINUS\n    SELECT\
    \ DISTINCT\n    f.name\n    FROM v\\$backup_datafile d\n        ,v\\$datafile\
    \ f\n    WHERE d.file# = f.file#\n    AND d.completion_time > sysdate - $2);\n\
    EOF)`\n\n#\n\n`if [ $crit_var2 -ne 0 ]; then`\n    `echo \"datafile not backed\
    \ up on $1\" | mailx -s \"rman problem\" dkuhn@oracle.com`\n`else`\n    `echo\
    \ \"datafiles are backed up...\"`\n`fi`\n\n#\n\n`exit 0`\n\n例如，要检查备份是否在最近两天内成功运行，请如下运行该脚本（名为\
    \ `rman_chk.bsh`）：\n\n`$ rman_chk.bsh INVPRD 2`\n\n上述脚本虽然基础但很有效。您可以根据您的 RMAN 环境需求对其进行增强和补充。\n\
    \n## 总结\n\nRMAN 为备份提供了许多灵活且功能丰富的选项。默认情况下，RMAN 仅备份数据库中已修改的数据块。增量备份功能还允许您仅备份自上次备份以来修改过的数据块。这些增量功能在大型数据库环境中特别有用，因为在这种环境中，从一次备份到下一次备份，只有很小比例的数据会发生变化。\n\
    \n您可以通过映像副本（`BACKUP AS COPY` 命令生成）指示 RMAN 备份每个数据文件中的每个数据块。映像副本是数据文件的逐块相同副本。映像副本的优势在于可以直接从备份中还原备份文件（无需使用\
    \ RMAN）。您可以使用增量更新备份功能来实现映像副本备份和增量备份的高效混合。\n\nRMAN 包含用于报告备份多个方面的内置命令。`LIST` 命令报告备份活动。`REPORT`\
    \ 命令对于确定根据保留策略需要备份哪些文件非常有用。\n\n在成功配置 RMAN 并创建备份后，您就具备了在发生介质故障时还原和恢复数据库的能力。还原和恢复主题将在下一章详细讨论。\n\
    \n![](img/index-543_1.png)\n\n# 第 19 章 ■ RMAN 还原与恢复\n\n（另一台服务器上的备份是完好的。我能够从这些备份中还原和恢复生产数据库。\n\
    \n我们丢失了大约一天的数据（介于归档日志损坏和不允许传入事务的停机时间之间），但我们能够在最初接到电话后大约 20 小时内完成数据库的还原和恢复。那真是漫长的一天。\n\
    \n大多数需要进行还原和恢复的情况都不会像刚才描述的那样糟糕。然而，前面的场景确实突显了以下几点的必要性：\n\n*   备份策略。\n*   具备备份与恢复技能的\
    \ DBA。\n*   还原和恢复策略，包括定期测试还原和恢复的要求。\n\n本章将引导您使用 RMAN 进行还原和恢复。它涵盖了处理介质故障时必须执行的许多常见任务。\n\
    \n## 确定是否需要介质恢复\n\n术语“介质恢复”指的是需要还原由于底层存储介质（通常是某种磁盘）故障而丢失或损坏的文件。通常，您会通过某种错误得知需要进行介质恢复，例如：\n\
    \n```\nORA-01157: cannot identify/lock data file 1 - see DBWR trace file\nORA-01110:\
    \ data file 1: '/u02/oracle/oradata/E64208/system01.dbf'\n```\n\n在执行停止和启动数据库等\
    \ DBA 任务时，该错误可能会显示在屏幕上。或者您可能在跟踪文件或 `alert.log` 文件中看到此类错误。如果您没有立即注意到问题，在严重的介质故障情况下，数据库将停止处理事务，用户会开始给您打电话。\n\
    \n要了解 Oracle 如何确定需要介质恢复，您必须了解 Oracle 如何确定一切正常。当 Oracle 正常关闭时（`IMMEDIATE`、`TRANSACTIONAL`、`NORMAL`），关闭过程的一部分是将所有已修改的块刷新到磁盘，在每个数据文件的头部标记当前\
    \ SCN，并用当前 SCN 信息更新控制文件。\n\n启动时，Oracle 会检查控制文件中的 SCN 是否与数据文件头中的 SCN 匹配。如果匹配，Oracle\
    \ 尝试打开数据文件和在线重做日志文件。如果所有文件都可用且可以打开，Oracle 则正常启动。以下查询比较控制文件中的 SCN（对于每个数据文件）与数据文件头中的\
    \ SCN：\n\n```\nSET LINES 132\nCOL name FORM a40\nCOL status FORM A8\nCOL file#\
    \ FORM 9999\nCOL control_file_SCN FORM 999999999999999\nCOL datafile_SCN FORM\
    \ 999999999999999\n--\nSELECT\n    a.name\n    ,a.status\n    ,a.file#\n    ,a.checkpoint_change#\
    \ control_file_SCN\n    ,b.checkpoint_change# datafile_SCN\n    ,CASE\n      \
    \  WHEN ((a.checkpoint_change# - b.checkpoint_change#) = 0) THEN 'Startup Normal'\n\
    \        WHEN ((b.checkpoint_change#) = 0) THEN 'File Missing?'\n        WHEN\
    \ ((a.checkpoint_change# - b.checkpoint_change#) > 0) THEN 'Media Rec. Req.'\n\
    \        WHEN ((a.checkpoint_change# - b.checkpoint_change#) < 0) THEN 'Old Control\
    \ File'\n        ELSE 'what the ?'\n    END datafile_status\nFROM v$datafile a\
    \ -- control file SCN for datafile\n    ,v$datafile_header b -- datafile header\
    \ SCN\nWHERE a.file# = b.file#\nORDER BY a.file#;\n```\n\n如果控制文件的 SCN 值大于数据文件的\
    \ SCN 值，则很可能需要介质恢复。\n\n## 确定要还原的内容\n\n介质恢复需要您执行手动任务以使数据库恢复完整。这些任务通常涉及 `RESTORE`\
    \ 和 `RECOVER` 命令的组合。如果您的数据文件经历了介质故障，您将必须发出 RMAN `RESTORE` 命令。这可能是由于有人意外删除了文件或磁盘故障。\n\
    \n## 流程如何工作\n\n当您发出 `RESTORE` 命令时，RMAN 会自动确定如何从以下任何可用备份中提取数据文件：\n\n*   全数据库备份\n\
    *   增量级别 0 备份\n*   由 `BACKUP AS COPY` 命令生成的映像副本备份\n\n文件从备份中还原后，您需要通过 `RECOVER`\
    \ 命令将重做日志应用于它们。当您发出 `RECOVER` 命令时，Oracle 将检查受影响数据文件中的 SCN，并确定其中是否需要恢复。如果数据文件中的\
    \ SCN 小于控制文件中相应的 SCN，则需要介质恢复。\n\nOracle 将检索数据文件的 SCN，然后在重做流中查找相应的 SCN，以确定从何处开始恢复过程。如果起始恢复\
    \ SCN 位于在线重做日志文件中，则不需要归档重做日志文件进行恢复。\n\n在恢复过程中，RMAN 会自动确定如何应用重做日志。首先，RMAN 将应用任何可用的增量备份（大于零级别，例如增量级别\
    \ 1）。接下来，将应用磁盘上任何归档重做日志文件。如果归档重做日志文件在磁盘上不存在，RMAN 将尝试从备份集中检索它们。\n\n要能够执行完全恢复，需要满足以下所有条件：\n\
    \n*   您的数据库处于归档日志模式。\n*   您拥有良好的数据库基线备份。\n"
- fmt: '# CHAPTER 19 ■ RMAN RESTORE AND RECOVERY


    There are a wide variety of restore and recovery scenarios. How you restore and
    recover depends directly on your backup strategy and what files have been damaged.
    Listed next are the general steps to follow when facing a media failure:


    1.  Determine what files need to be restored.

    2.  Depending on the damage, set your database mode to `nomount`, `mount`, or
    `open`.

    3.  Use the `RESTORE` command to retrieve files from RMAN backups.

    4.  Use the `RECOVER` command for datafiles requiring recovery.

    5.  Open your database.


    Your particular restore and recovery scenario may not require that all of the
    previous steps be performed. For example, you may just want to restore your `spfile`,
    which doesn’t require a recovery step.


    The first step in a restore and recovery process is to determine what files have
    experienced media failure. You can usually determine what files need to be restored
    from the following sources:


    *   Error messages displayed on your screen, either from RMAN or SQL*Plus

    *   `Alert.log` file and corresponding trace files

    *   Data dictionary views


    If you''re using Oracle Database 11 *g* or higher, then in addition to the previously
    listed methods you should consider the Data Recovery Advisor for obtaining information
    about the extent of a failure and corresponding corrective action.


    ## Using Data Recovery Advisor


    The Data Recovery Advisor tool was introduced in Oracle Database 11 *g*. In the
    event of a media failure, this tool will display the details of the failure, recommend
    corrective actions, and it will perform the recommended actions if you specify
    it to do so. It''s like having another set of eyes to provide feedback when in
    a restore and recovery situation. There are three modes to Data Recovery Advisor:


    *   Listing failures.

    *   Suggesting corrective action.

    *   Running commands to repair failures.


    The Data Recovery Advisor is invoked from RMAN. You can think of the Data Recovery
    Advisor as a set of RMAN commands that can assist you when dealing with media
    failures.


    ### Listing Failures


    When using the Data Recovery Advisor, the `LIST FAILURE` command is used to display
    any issues with the datafiles, control files, or online redo logs:


    ```

    RMAN> list failure;

    ```


    If there are no detected failures, you''ll see a message indicating that there
    are no failures. Here is some sample output indicating that there may be an issue
    with a datafile:


    ```

    List of Database Failures

    =========================


    Failure ID Priority Status Time Detected Summary

    ---------- -------- --------- ------------- -------

    662 HIGH OPEN 16-SEP-10 One or more non-system datafiles are missing

    ```


    The prior message doesn’t indicate which specific file may be experiencing a failure.
    To dig a little deeper, use the `DETAIL` clause:


    ```

    RMAN> list failure 662 detail;


    List of Database Failures

    =========================


    Failure ID Priority Status Time Detected Summary

    ---------- -------- --------- ------------- -------

    662 HIGH OPEN 16-SEP-10

    One or more non-system datafiles are missing

    Impact: See impact for individual child failures


    List of child failures for parent failure ID 662

    Failure ID Priority Status Time Detected Summary

    ---------- -------- --------- ------------- -------

    665 HIGH OPEN 16-SEP-10 Datafile 7:

    ''/ora01/dbfile/O11R2/users02.dbf'' is missing

    Impact: Some objects in tablespace USERS might be unavailable

    ```


    This output details which file has experienced a failure and the nature of the
    problem (file missing).


    ### Suggesting Corrective Action


    The `ADVISE FAILURE` command gives advice about how to recover from potential
    problems detected by the Data Recovery Advisor. If you have multiple failures
    with your database, you can directly specify the failure ID to get advice on a
    given failure like so:


    ```

    RMAN> advise failure 665;

    ```


    Here is some sample output for this particular issue:


    ```

    =======================

    1. If file /ora01/dbfile/O11R2/users02.dbf was unintentionally renamed or moved,
    restore it


    Automated Repair Options

    ========================


    Option Repair Description

    ------ ------------------

    1 Restore and recover datafile 7

    Strategy: The repair includes complete media recovery with no data loss

    Repair script: /ora01/app/oracle/diag/rdbms/o11r2/O11R2/hm/reco_1184243250.hm

    ```


    In this case, the Data Recovery Advisor created a script that can be used to potentially
    fix the problem. The contents of the repair script can be viewed with an operating
    system editor. For example:


    ```

    $ vi /ora01/app/oracle/diag/rdbms/o11r2/O11R2/hm/reco_1184243250.hm

    ```


    Here are the contents of the script (for this particular example):'
