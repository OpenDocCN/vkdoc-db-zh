    Dropping a Database


    If you have an unused database that you need to drop, you can use the DROP DATABASE
    statement to accomplish this. Doing so removes all datafiles, control files, and
    online redo logs associated with the database.


    CHAPTER 2 ■ IMPLEMENTING A DATABASE


    Needless to say, use extreme caution when dropping a database. Before you drop
    a database, ensure that you’re on the correct server and are connected to the
    correct database. On a Linux/Unix system, issue the following OS command from
    the operating system prompt:


    $ uname -a


    Next, connect to SQL*Plus, and be sure you’re connected to the database you want
    to drop: SQL> select name from v$database;


    After you’ve verified that you’re in the correct database environment, issue the
    following SQL


    commands from a SYSDBA privileged account:


    SQ> shutdown immediate;


    SQL> startup mount exclusive restrict;


    SQL> drop database;


    ■ **Caution** Obviously, you should be careful when dropping a database. You aren’t
    prompted when dropping the database and, as of this writing, there is no UNDROP
    ACCIDENTALLY DROPPED DATABASE command. Use extreme caution when dropping a database,
    because this operation removes datafiles, control files, and online redo log files.


    The DROP DATABASE command is useful when you have a database that needs to be
    removed. It may be a test database or an old database that is no longer used.
    The DROP DATABASE command doesn’t remove old archive redo log files. You must
    manually remove those files with an operating system command (such as rm in Linux/Unix
    or del at the Windows command prompt). You can also instruct RMAN to remove archive
    redo log files.


    How Many Databases on One Server?


    Sometimes, when you’re creating new databases, this question arises: How many
    databases should you put on one server? One extreme is to have only one database
    running on each database server. This architecture is illustrated in Figure 2–2,
    which shows two different database servers, each with its own installation of
    the Oracle binaries. This type of setup is profitable for the hardware vendor
    but in many environments isn’t an economical use of resources.


