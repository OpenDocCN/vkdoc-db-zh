    \ 命令指示 RMAN 验证恢复过程。在执行测试恢复之前，你需要确保正在恢复的数据文件处于离线状态。对于在测试模式下恢复的任何联机数据文件，Oracle 都会抛出错误。\n\
    \n在此示例中，首先还原了 `USERS` 表空间，然后执行了试运行恢复：\n\n```\nRMAN> connect target /\nRMAN> startup\
    \ mount;\nRMAN> restore tablespace users;\nRMAN> recover tablespace users test;\n\
    ```\n\n如果缺少恢复所需的归档重做日志，则会抛出以下错误：\n\n```\nRMAN-06053: unable to perform media recovery\
    \ because of missing log\nRMAN-06025: no backup of archived log for thread 1 with\
    \ sequence 10 and starting SCN...\n```\n\n如果恢复测试成功，你将看到类似以下的消息，表明重做的应用已进行测试但未实际应用：\n\
    \n```\nORA-10574: Test recovery did not corrupt any data block\nORA-10573: Test\
    \ recovery tested redo from change 19993679 to 19993861\nORA-10572: Test recovery\
    \ canceled due to errors\nORA-10585: Test recovery can not apply redo that may\
    \ modify control file\n```\n\n以下是一些测试恢复过程的其他示例：\n\n```\nRMAN> recover database\
    \ test;\nRMAN> recover tablespace users, tools test;\nRMAN> recover datafile 1,2,3\
    \ test;\n```\n\n## 还原整个数据库\n\n`RESTORE DATABASE` 命令将还原数据库中的每个数据文件。例外情况是当 RMAN\
    \ 检测到数据文件已经还原；在这种情况下，它不会再次还原它们。\n\n如果你想覆盖该行为，请使用 `FORCE` 命令。\n\n当你发出 `RECOVER\
    \ DATABASE` 命令时，RMAN 会自动将重做应用于需要恢复的任何数据文件。恢复过程包括应用在以下位置找到的更改：\n\n- 增量备份片（仅在使用增量备份时适用）\n\
    - 归档重做日志文件（自上次备份或上次应用的增量备份以来生成）\n- 联机重做日志文件（当前且未归档）\n\n在还原和恢复过程完成后，你可以打开数据库。只有当你拥有良好的数据库备份并有权访问备份后生成的所有重做日志时，完全数据库恢复才有效。你需要所有恢复数据库数据文件所需的重做日志。如果你没有所有所需的重做日志，那么你很可能必须执行不完全恢复（本章稍后介绍）。\n\
    \n■ **注意** 你的数据库至少必须处于加载（MOUNT）模式才能使用 RMAN 还原数据文件。这是因为在还原和恢复过程中，RMAN 从控制文件中读取信息。\n\
    \n你可以使用当前控制文件或备份控制文件执行数据库级别的完全恢复。\n\n### 使用当前控制文件\n\n你必须首先将数据库置于加载模式以执行数据库范围的还原和恢复。这是因为\
    \ `SYSTEM` 表空间数据文件在还原和恢复时必须处于离线状态。Oracle 不允许你在数据库打开状态下操作与 `SYSTEM` 表空间关联但处于离线状态的数据文件。在这种情况下，以加载模式启动数据库，发出\
    \ `RESTORE` 和 `RECOVER` 命令，然后打开数据库，如下所示：\n\n```\nRMAN> connect target /\nRMAN>\
    \ startup mount;\nRMAN> restore database;\nRMAN> recover database;\nRMAN> alter\
    \ database open;\n```\n\n如果一切按预期进行，你最后应该看到这条消息：\n\n```\ndatabase opened\n```\n\
    \n### 使用备份控制文件\n\n此解决方案使用从快速恢复区检索的控制文件备份。有关如何还原控制文件的更多示例，请参阅本章的“还原控制文件”部分。在此场景中，首先从备份中检索控制文件，然后再还原和恢复数据库：\n\
    \n```\nRMAN> connect target /\nRMAN> startup nomount;\nRMAN> restore controlfile\
    \ from autobackup;\nRMAN> alter database mount;\nRMAN> restore database;\nRMAN>\
    \ recover database;\nRMAN> alter database open resetlogs;\n```\n\n如果一切按预期进行，你最后应该看到这条消息：\n\
    \n```\ndatabase opened\n```\n\n■ **注意** 任何时候在恢复操作中使用备份控制文件，你都需要使用 `OPEN RESETLOGS`\
    \ 命令打开数据库。\n\n## 还原表空间\n\n有时，你遇到的介质故障仅限于特定表空间或一组表空间。在这些情况下，在表空间级别的粒度进行还原和恢复是合适的。RMAN\
    \ 的 `RESTORE TABLESPACE` 和 `RECOVER TABLESPACE` 命令将还原和恢复与指定表空间关联的所有数据文件。\n\n###\
    \ 在数据库打开时还原表空间\n\n如果你的数据库已打开，那么你必须将要还原和恢复的表空间脱机。你可以对任何表空间执行此操作，但 `SYSTEM` 和 `UNDO`\
    \ 表空间除外。此示例在数据库打开时还原和恢复 `USERS` 表空间：\n\n```\nRMAN> connect target /\nRMAN> sql\
    \ 'alter tablespace users offline immediate';\nRMAN> restore tablespace users;\n\
    RMAN> recover tablespace users;\nRMAN> sql 'alter tablespace users online';\n\
    ```\n\n在表空间联机后，你应该会看到类似这样的消息：\n\n```\nsql statement: alter tablespace users online\n\
    ```\n\n### 在数据库处于加载模式时还原表空间\n\n通常在执行还原和恢复时，DBA 会关闭数据库并重新启动数据库进入加载模式，为执行恢复做准备。当数据库处于加载模式时，这确保没有用户连接到数据库，并且没有事务正在发生。下一个示例在数据库处于加载模式时还原\
    \ `SYSTEM` 表空间：\n\n```\nRMAN> connect target /\nRMAN> shutdown immediate;\nRMAN>\
    \ startup mount;\nRMAN> restore tablespace system;\nRMAN> recover tablespace system;\n\
    RMAN> alter database open;\n```\n\n如果一切成功，你最后应该看到这条消息：\n\n```\ndatabase opened\n\
    ```\n\n### 还原只读表空间\n\n当你发出 `RESTORE DATABASE` 命令时，RMAN 会随数据库的其余部分一起还原只读表空间。例如，以下命令将还原所有数据文件（包括只读模式下的文件）：\n\
    \n```\nRMAN> restore database;\n```\n\n在 Oracle Database 11*g* 之前，你需要发出 `RESTORE\
    \ DATABASE CHECK READONLY` 来指示 RMAN 同时还原只读表空间和读写模式的表空间。在 Oracle Database 11*g*\
    \ 或更高版本中，这不再是必需的。\n\n■ **注意** 如果你使用的备份是在只读表空间被置为只读模式之后创建的，那么只读数据文件就不需要恢复。在这种情况下，自备份以来没有为只读表空间生成重做日志。\n\
    \n### 还原临时表空间\n\n从 Oracle Database 10*g* 开始，你不必还原或重新创建缺失的本地管理临时表空间临时文件。当你打开数据库供使用时，Oracle\
    \ 会自动检测并重新创建本地管理临时表空间临时文件。\n\n当 Oracle 自动重新创建临时表空间时，它会将一条类似以下内容的消息记录到你的目标数据库 `alert.log`\
    \ 中：\n\n```\nRe-creating tempfile <your temporary tablespace filename>\n```\n\n\
    如果由于任何原因你的临时表空间变得不可用，你也可以自己重新创建它。由于临时表空间中永远不会有永久对象，你可以根据需要简单地重新创建它们。以下是如何创建本地管理临时表空间的示例：\n\
    \n```\nCREATE TEMPORARY TABLESPACE temp TEMPFILE\n'/ora03/oradata/BRDSTN/temp01.dbf'\
    \ SIZE 5000M REUSE\nEXTENT MANAGEMENT LOCAL UNIFORM SIZE 512K;\n```\n\n如果你的临时表空间存在但临时数据文件缺失，你可以如这里所示简单地添加临时数据文件：\n\
    \n```\nalter tablespace temp\nadd tempfile '/ora03/oradata/BRDSTN/temp01.dbf'\
    \ SIZE 5000M REUSE;\n```\n\n## 还原数据文件\n\n当介质故障仅限于一小部分数据文件时，数据文件级别的还原和恢复效果很好。通过数据文件级别的恢复，你可以指示\
    \ RMAN 使用数据文件编号或数据文件名称进行还原和恢复。对于与 `SYSTEM` 或 `UNDO` 表空间无关的数据文件，你可以选择在数据库保持打开状态时进行还原和恢复。在数据库打开时，你必须首先将任何正在还原和恢复的数据文件脱机。\n\
    \n### 在数据库打开时还原数据文件\n\n使用 `RESTORE DATAFILE` 和 `RECOVER DATAFILE` 命令在数据文件级别进行还原和恢复。当你的数据库打开时，你必须首先将要还原和恢复的任何数据文件脱机。此示例在数据库打开时还原和恢复数据文件\
    \ 32 和 33：\n\n```\nRMAN> sql 'alter database datafile 32, 33 offline';\nRMAN>\
    \ restore datafile 32, 33;\nRMAN> recover datafile 32, 33;\nRMAN> sql 'alter database\
    \ datafile 32, 33 online';\n```\n\n■ **提示** 使用 RMAN 的 `REPORT SCHEMA` 命令列出数据文件名称和文件编号。你也可以查询\
    \ `V$DATAFILE` 的 `NAME` 和 `FILE#` 列来获取名称和编号。\n\n你也可以指定要还原和恢复的数据文件的名称。在此示例中，还原并恢复了\
    \ `mvdata01.dbf` 数据文件：\n\n```\nRMAN> sql \"alter database datafile ''/ora01/dbfile/O11R2/mvdata01.dbf''\
    \ offline\";\nRMAN> restore datafile '/ora01/dbfile/O11R2/mvdata01.dbf';\nRMAN>\
    \ recover datafile '/ora01/dbfile/O11R2/mvdata01.dbf';\nRMAN> sql \"alter database\
    \ datafile ''/ora01/dbfile/O11R2/mvdata01.dbf'' online\";\n```\n\n■ **注意** 当使用\
    \ RMAN 的 `SQL` 命令时，如果 SQL 语句中有单引号，则你需要使用双引号括起整个 SQL 语句，并在通常只使用一个引号的地方使用两个单引号。\n\
    \n### 在数据库未打开时还原数据文件\n\n在此场景中，首先关闭数据库，然后启动到加载模式。在数据库未打开时，你可以还原和恢复数据库中的任何数据文件。此示例显示了还原与\
    \ `SYSTEM` 表空间关联的数据文件 1：\n\n```\nRMAN> connect target /\nRMAN> shutdown abort;\n\
    RMAN> startup mount;\nRMAN> restore datafile 1;\nRMAN> recover datafile 1;\nRMAN>\
    \ alter database open;\n```\n\n你也可以在执行数据文件恢复时指定文件名：\n\n```\nRMAN> connect target\
    \ /\nRMAN> shutdown abort;\nRMAN> startup mount;\nRMAN> restore datafile '/ora01/dbfile/O11R2/system01.dbf';\n\
    RMAN> recover datafile '/ora01/dbfile/O11R2/system01.dbf';\nRMAN> alter database\
    \ open;\n```\n\n### 将数据文件还原到非默认位置\n\n有时会发生故障，导致与挂载点关联的磁盘无法操作。在这种情况下，你需要将数据文件还原和恢复到与原来不同的位置。另一个将数据文件还原到非默认位置的典型需求是你正在还原到不同的数据库服务器，该服务器的挂载点与备份来源服务器完全不同。\n\
    \n使用 `SET NEWNAME` 和 `SWITCH` 命令将数据文件还原到非默认位置。这两个命令都必须在 RMAN 的 `run{}` 块内运行。你可以将使用\
    \ `SET NEWNAME` 和 `SWITCH` 视为重命名数据文件的一种方式（类似于 SQL*Plus 的 `ALTER DATABASE RENAME\
    \ FILE` 语句）。\n\n此示例更改了数据文件 32 和 33 的位置：\n\n```\nRMAN> connect target /\nRMAN>\
    \ startup mount;\nRMAN> run{\n2> set newname for datafile 32 to '/ora02/dbfile/O11R2/mvdata01.dbf';\n\
    3> set newname for datafile 33 to '/ora02/dbfile/O11R2/mvindex01.dbf';\n4> restore\
    \ datafile 32, 33;\n5> switch datafile all; # 使用新数据文件位置更新存储库。\n6> recover datafile\
    \ 32, 33;\n7> alter database open;\n8> }\n```\n\n这是输出的部分列表：\n\n```\nchannel ORA_DISK_2:\
    \ restore complete, elapsed time: 00:00:01\nFinished restore at 22-SEP-10\n...\n\
    datafile 32 switched to datafile copy\ninput datafile copy RECID=92 STAMP=730375692\
    \ file name=/ora02/dbfile/O11R2/mvdata01.dbf\ndatafile 33 switched to datafile\
    \ copy\ninput datafile copy RECID=93 STAMP=730375692 file name=/ora02/dbfile/O11R2/mvindex01.dbf\n\
    ...\nStarting recover at 22-SEP-10\nmedia recovery complete, elapsed time: 00:00:05\n\
    Finished recover at 22-SEP-10\ndatabase opened\n```\n\n如果数据库已打开，你可以将数据文件脱机，然后为还原和恢复设置它们的新名称，如下所示：\n\
    \n```\nRMAN> run{\n2> sql 'alter database datafile 32, 33 offline';\n3> set newname\
    \ for datafile 32 to '/ora02/dbfile/O11R2/mvdata01.dbf';\n4> set newname for datafile\
    \ 33 to '/ora02/dbfile/O11R2/mvindex01.dbf';\n5> restore datafile 32, 33;\n6>\
    \ switch datafile all; # 使用新数据文件位置更新存储库。\n7> recover datafile 32, 33;\n8> sql\
    \ 'alter database datafile 32, 33 online';\n9> }\n```\n\n你现在应该会看到类似以下的消息：\n\n\
    ```\nstarting media recovery\nFinished recover at 22-SEP-10\nsql statement: alter\
    \ database datafile 32, 33 online\n```\n\n## 执行块级别恢复\n\n块级别损坏很少见，通常是由某种 I/O 错误引起的。但是，如果你在大型数据文件中确实有一个孤立的损坏块，那么可以选择执行块级别恢复是很好的。当数据文件中只有少量块损坏时，块级别恢复很有用。如果整个数据文件需要介质恢复，则块恢复就不合适。\n\
    \n每当运行 `BACKUP`、`VALIDATE` 或 `BACKUP VALIDATE` 命令时，RMAN 都会自动检测损坏的块。有关损坏块的详细信息可以在\
    \ `V$DATABASE_BLOCK_CORRUPTION` 视图中查看。在以下示例中，常规备份作业在输出中报告了一个损坏块：\n\n```\nORA-19566:\
    \ exceeded limit of 0 corrupt blocks for file...\n```\n\n查询 `V$DATABASE_BLOCK_CORRUPTION`\
    \ 视图可以指示哪个文件包含损坏：\n\n```\nSQL> select * from v$database_block_corruption;\n\n\
    FILE# BLOCK# BLOCKS CORRUPTION_CHANGE# CORRUPTIO\n---------- ---------- ----------\
    \ ------------------ ---------\n5    20        1                 0 ALL ZERO\n\
    ```\n\n执行块级别恢复时，你的数据库可以处于加载或打开状态。你不必将正在恢复的数据文件脱机。你可以指示 RMAN 恢复在 `V$DATABASE_BLOCK_CORRUPTION`\
    \ 中报告的所有块，如下所示：\n\n```\nRMAN> recover corruption list;\n```\n\n如果成功，将显示以下消息：\n\
    \n```\nmedia recovery complete...\n```\n\n恢复块的另一种方法是指定数据文件和块号，如下所示：\n\n```\nRMAN>\
    \ recover datafile 5 block 20;\n```\n\n最好使用 `RECOVER CORRUPTION LIST` 语法，因为它会从\
    \ `V$DATABASE_BLOCK_CORRUPTION` 视图中清除任何已恢复的块。\n\n■ **注意** RMAN 无法对数据文件的块 1（数据文件头）执行块级别恢复。\n\
    \n块级别介质恢复允许你保持数据库可用，并且由于只有损坏的块在恢复期间处于离线状态，从而减少了平均恢复时间（MTTR）。执行块级别恢复时，你的数据库必须处于归档日志模式。在\
    \ Oracle Database 11*g* 中，RMAN 可以从闪回日志（如果可用）中还原块。如果闪回日志不可用，则 RMAN 将尝试从完整备份、级别\
    \ 0 备份或 `BACKUP AS COPY` 命令生成的映像副本备份中还原块。块被还原后，任何所需的归档重做日志必须可用才能恢复该块。RMAN 不能使用增量级别\
    \ 1（或更高）备份执行块介质恢复。\n\n■ **注意** 如果你使用的是 Oracle Database 10g 或 Oracle9i Database，请使用\
    \ `BLOCKRECOVER` 命令执行块介质恢复。Oracle 版本 8 不支持块级别恢复。\n\n## 还原归档重做日志文件\n\nRMAN 会在恢复过程中自动还原其所需的任何归档重做日志文件。你通常不需要手动还原归档重做日志文件。但是，在以下任何一种情况下，你可能希望手动还原归档重做日志文件：\n\
    \n- 你需要还原归档重做日志文件以备以后执行恢复；想法是如果归档重做日志文件已经还原，将加快恢复操作。\n- 由于介质故障或存储空间问题，你需要将归档重做日志文件还原到非默认位置。\n\
    - 你需要还原特定的归档重做日志文件，因为你希望通过 LogMiner 检查它们。\n\n如果你启用了闪回恢复区，那么 RMAN 默认会将归档重做日志文件还原到初始化参数\
    \ `DB_RECOVERY_FILE_DEST` 定义的目标位置。否则，RMAN 使用 `LOG_ARCHIVE_DEST_1` 初始化参数来确定还原归档重做日志文件的位置。\n\
    \n如果你将归档重做日志文件还原到非默认位置，RMAN 知道它们被还原到的位置，并在你发出任何后续的 `RECOVER` 命令时自动找到这些文件。\n\n\
    RMAN 不会还原它确定已在磁盘上的归档重做日志文件。即使你指定了非默认位置，如果文件已存在，RMAN 也不会将归档重做日志文件还原到磁盘。在这种情况下，RMAN\
    \ 只会返回一条消息，说明归档重做日志文件已经还原。使用 `FORCE` 选项可覆盖此行为。\n\n如果在还原日志文件时不确定要使用哪个序列号，可以查询 `V$LOG_HISTORY`\
    \ 视图或发出 RMAN 的 `LIST BACKUP` 命令以获取更多信息。\n\n■ **注意** 还原归档重做日志文件时，你的数据库可以处于加载或打开状态。\n\
    \n### 还原到默认位置\n\n以下命令将还原 RMAN 已备份的所有归档重做日志文件：\n\n```\nRMAN> restore archivelog\
    \ all;\n```\n\n如果你想从指定的序列开始还原，请使用 `FROM SEQUENCE` 子句。你可能希望先运行此查询以确定最近生成的日志文件和序列号：\n\
    \n```\nSQL> select sequence#, first_time from v$log_history order by 2;\n```\n\
    \n此示例从序列 68 还原所有归档重做日志文件：\n\n```\nRMAN> restore archivelog from sequence 68;\n\
    ```\n\n如果你想还原一系列归档重做日志文件，请使用 `FROM SEQUENCE` 和 `UNTIL SEQUENCE` 子句或 `SEQUENCE\
    \ BETWEEN` 子句，如此处所示。以下命令使用线程 1 还原从序列 68 到序列 78（包括序列 78）的归档重做日志文件：\n\n```\nRMAN>\
    \ restore archivelog from sequence 68 until sequence 78 thread 1;\nRMAN> restore\
    \ archivelog sequence between 68 and 78 thread 1;\n```\n\n默认情况下，如果归档重做日志文件已在磁盘上，RMAN\
    \ 不会还原它。如果你使用 `FORCE`，可以覆盖此行为，如下所示：\n\n```\nRMAN> restore archivelog from sequence\
    \ 1 force;\n```\n\n### 还原到非默认位置\n\n如果你想将归档重做日志文件还原到不同于默认位置的位置，请使用 `SET ARCHIVELOG\
    \ DESTINATION` 子句。以下示例还原到 `/ora01/archtemp` 这个非默认位置。`SET` 命令的此选项必须在 RMAN 的 `run{}`\
    \ 块内执行。\n\n```\nRMAN> run{\n2> set archivelog destination to '/ora01/archtemp';\n\
    3> restore archivelog from sequence 68 force;\n4> }\n```\n\n## 还原 Spfile\n\n出于以下几个不同的原因，你可能需要还原\
    \ spfile：\n\n- 你不小心在 spfile 中设置了一个值，导致实例无法启动。\n- 你不小心删除了 spfile。\n- 你需要查看它在过去某个时间点的样子。\n\
    \n一种情况（这种情况我遇到过不止一次）是你正在使用 spfile，而你团队中的一位 DBA 做了一些莫名其妙的事情，比如这样：\n\n```\nSQL>\
    \ alter system set processes=1000000 scope=spfile;\n```\n\n该参数在磁盘上的 pfile 中被更改，但不在内存中。几个月后，数据库因某些维护而停止。当尝试启动数据库时，你甚至无法让实例进入\
    \ `NOMOUNT` 状态。这是因为某个参数被设置为一个荒谬的值，将消耗机器上的所有内存。在这种情况下，实例可能会挂起，或者你可能会看到此消息：\n\n\
    ```\nORA-01078: failure in processing system parameters\nLRM-00109: could not\
    \ open parameter file\n```\n\n如果你使用的是恢复目录，还原 spfile 是一个相当简单的过程：\n\n```\nRMAN>\
    \ connect target /\nRMAN> connect catalog rmancat/foo@rcat\nRMAN> startup nomount;\n\
    RMAN> restore spfile;\n```\n\n如果你没有使用恢复目录，有多种方法可以还原 spfile。你所采取的方法取决于几个变量，例如：\n\
    \n- 你是否使用了 FRA（快速恢复区）\n- 你是否为自动备份配置了通道备份位置\n- 你是否使用了自动备份的默认位置\n\n我不会展示所有这些场景的每个细节。通常，我会确定包含\
    \ spfile 备份的备份片的位置，并像这样进行还原：\n\n```\nRMAN> startup nomount force;\nRMAN> restore\
    \ spfile from\n'/ora01/fra/O11R2/autobackup/2010_09_18/o1_mf_s_730048900_69bcc8h2_.bkp';\n\
    ```\n\n你应该会看到类似这样的消息：\n\n```\nchannel ORA_DISK_1: SPFILE restore from AUTOBACKUP\
    \ complete\n```\n\n在此示例中，我知道使用了 FRA，在自动备份目录中找到了最新的备份文件并使用了它。\n\n■ **注意** 有关所有可能的\
    \ spfile 和控制文件还原场景的完整描述，请参阅 *RMAN Recipes for Oracle Database 11g* (Apress, 2007)。\n\
    \n## 还原控制文件\n\n如果你缺少一个控制文件，并且你有多个副本，那么你可以关闭数据库，然后通过将一个好的控制文件复制到缺失控制文件的正确位置和名称来简单地还原缺失或损坏的控制文件（详见第\
    \ 5 章）。\n\n还原控制文件时，以下部分涵盖这些特定场景：\n\n- 使用恢复目录。\n- 使用自动备份。\n- 指定备份文件名。\n\n### 使用恢复目录\n\
    \n当你连接到恢复目录时，即使你的目标数据库处于 `NOMOUNT` 模式，你也可以查看有关控制文件的备份信息。要列出控制文件的备份，请使用 `LIST`\
    \ 命令，如下所示：\n\n```\nRMAN> connect target /\nRMAN> connect catalog rcat/rcat@recov\n\
    RMAN> startup nomount;\nRMAN> list backup of controlfile;\n```\n\n如果你丢失了所有控制文件并且你正在使用恢复目录，那么发出\
    \ `STARTUP NOMOUNT` 并发出 `RESTORE CONTROLFILE` 命令。在此示例中，恢复目录所有者和密码都是 `rcat`，恢复目录的名称是\
    \ `recov`。你必须更改这些值以匹配你环境中的 用户名/密码@服务。\n\n```\nRMAN> connect target /\nRMAN> connect\
    \ catalog rcat/rcat@recov\nRMAN> startup nomount;\nRMAN> restore controlfile;\n\
    ```\n\nRMAN 将控制文件还原到由你的 `CONTROL_FILES` 初始化参数定义的位置。你应该会看到一条消息，表明你的控制文件已成功从 RMAN\
    \ 备份片复制回来。以下是成功还原控制文件后 RMAN 消息堆栈的部分列表：\n\n```\nallocated channel: ORA_DISK_1\n\
    channel ORA_DISK_1: sid=156 devtype=DISK\nchannel ORA_DISK_1: restoring control\
    \ file\nchannel ORA_DISK_1: reading from backup piece\nchannel ORA_DISK_1: restore\
    \ complete, elapsed time: 00:00:05\n```\n\n你现在可以将数据库更改为加载模式，并执行数据库所需的任何其他还原和恢复命令。\n\
    \n■ **注意** 当你从备份还原控制文件时，你必须对整个数据库执行介质恢复，并使用 `OPEN RESETLOGS` 命令打开数据库，即使你没有还原任何数据文件。\n\
    \n你可以通过查询 `V$DATABASE` 视图的 `CONTROLFILE_TYPE` 列来确定你的控制文件是否是备份。\n\n### 使用自动备份进行还原\n\
    \n当你启用控制文件的自动备份并使用快速恢复区时，还原控制文件相当简单。首先，连接到你的目标数据库，然后发出 `STARTUP NOMOUNT` 命令，最后发出\
    \ `RESTORE CONTROLFILE FROM AUTOBACKUP` 命令，如下所示：\n\n```\nRMAN> connect target\
    \ /\nRMAN> startup nomount;\nRMAN> restore controlfile from autobackup;\n```\n\
    \nRMAN 将控制文件还原到由你的 `CONTROL_FILES` 初始化参数定义的位置。你应该会看到一条消息，表明你的控制文件已成功从 RMAN 备份片复制回来。这是输出的部分片段：\n\
    \n```\nallocated channel: ORA_DISK_1\nchannel ORA_DISK_1: sid=156 devtype=DISK\n\
    database name (or database unique name) used for search: ORCL\nchannel ORA_DISK_1:\
    \ autobackup found in the recovery area\n```\n\n你现在可以将数据库更改为加载模式，并执行数据库所需的任何其他还原和恢复命令。\n\
    \n### 指定文件名\n\n当将数据库还原到不同的服务器时，该过程的前几步通常是：对目标数据库进行备份，复制到远程服务器，然后从 RMAN 备份中还原控制文件。在这些场景中，我通常知道包含控制文件的备份片的名称。以下是一个示例，你指示\
    \ RMAN 从特定的备份片文件还原控制文件：\n\n```\nRMAN> startup nomount;\nRMAN> restore controlfile\
    \ from '/ora01/O11R2/rman/c-3453199553-20100923-07.bk';\n```\n\n控制文件将被还原到 `CONTROL_FILES`\
    \ 初始化参数定义的位置。\n\n## 不完全恢复\n\n*不完全数据库恢复* 意味着你无法恢复所有已提交的事务。不完全意味着你不应用所有重做来恢复到数据库中发生的最后一个已提交事务的点。换句话说，你正在还原并恢复到过去的某个时间点。因此，不完全数据库恢复也称为\
    \ *数据库时间点恢复* (DBPITR)。通常你执行不完全数据库恢复是由于以下原因之一：\n\n- 你没有执行完全恢复所需的所有重做日志。你缺少执行完全恢复所需的归档重做日志文件或联机重做日志文件。这种情况可能是因为所需的重做日志文件损坏或丢失。\n\
    - 你故意希望将数据库回滚到某个时间点。例如，如果有人意外截断了表，而你希望故意将数据库回滚到发出截断表命令之前的时间点，你就会这样做。\n\n■ **提示**\
    \ 为了尽量减少联机重做日志文件故障的可能性，我建议你对它们进行多路复用，每组至少有两个成员，并且每个成员位于由单独控制器管理的独立物理设备上。\n\n不完全数据库恢复包括两个步骤：还原和恢复。还原步骤将重新创建数据文件，恢复步骤将应用重做直到指定的时间点。可以通过几种方式从\
    \ RMAN 启动还原过程：\n\n- `RESTORE DATABASE UNTIL`\n- `RESTORE TABLESPACE UNTIL`\n-\
    \ `FLASHBACK DATABASE`\n\n对于大多数不完全数据库恢复情况，你使用 `RESTORE DATABASE UNTIL` 命令指示 RMAN\
    \ 从 RMAN 备份文件中检索数据文件。这种类型的不完全数据库恢复是本章的主要焦点。`RESTORE DATABASE` 命令的 `UNTIL` 部分指示\
    \ RMAN 基于以下方法之一从过去的某个点检索数据文件：\n\n- 时间\n- 变更（有时称为 *系统变更号* 或 SCN）\n- 日志序列号\n- 还原点\n\
    \nRMAN 的 `RESTORE DATABASE UNTIL` 命令将从最近的备份集或映像副本中检索所有数据文件。RMAN 会自动从 `UTIL` 子句确定哪个备份集包含所需的数据文件。如果你省略\
    \ `RESTORE DATABASE` 命令的 `UTIL` 子句，RMAN 将从最新可用的备份集或映像副本中检索数据文件。在某些情况下，这可能是你想要的行为。我建议你使用\
    \ `UTIL` 子句来确保 RMAN 从正确的备份集中还原。当你发出 `RESTORE DATABASE UNTIL` 命令时，RMAN 将确定如何从以下任一项中提取数据文件：\n\
    \n- 完整数据库备份\n- 增量级别 0 备份\n- 由 `BACKUP AS COPY` 命令生成的映像副本备份\n\n你不能在数据库在线数据文件的子集上执行不完全数据库恢复。执行不完全数据库恢复时，所有在线数据文件的检查点\
    \ SCN 必须同步，然后你才能使用 `alter database open resetlogs` 命令打开数据库。你可以通过以下 SQL 查询查看数据文件头\
    \ SCN 和每个数据文件的状态：\n\n```\nselect\n  file#\n  ,status\n  ,fuzzy\n  ,error\n  ,checkpoint_change#,\n\
    \  to_char(checkpoint_time,'dd-mon-rrrr hh24:mi:ss') as checkpoint_time\nfrom\
    \ v$datafile_header;\n```\n\n■ **注意** `V$DATAFILE_HEADER` 的 `FUZZY` 列指的是包含一个或多个\
    \ SCN 值大于或等于数据文件头中检查点 SCN 的块的数据文件。如果数据文件被还原且 `FUZZY` 值为 `YES`，则需要介质恢复。\n\n此规则（不在数据库在线文件的子集上执行不完全恢复）的唯一例外是表空间时间点恢复\
    \ (TSPITR)，它使用 `RECOVER TABLESPACE UNTIL` 命令。TSPITR 用于罕见的情况；它只还原和恢复你指定的表空间。\n\n\
    不完全数据库恢复的恢复部分总是使用 `RECOVER DATABASE UNTIL` 命令启动。RMAN 将使用 `UTIL` 子句指定的点自动恢复你的数据库。就像\
    \ `RESTORE` 命令一样，你可以恢复到时间、变更/SCN、日志序列号或还原点。当 RMAN 到达指定的点时，它将自动终止恢复过程。\n\n■ **注意**\
    \ 无论你在 `UTIL` 子句中指定什么，RMAN 都会将其转换为相应的 `UTIL SCN` 子句并分配适当的 SCN。这是为了避免任何时序问题，特别是由夏令时引起的问题。\n\
    \n在恢复期间，RMAN 会自动确定如何应用重做。首先，RMAN 将应用任何可用的增量备份。接下来，将应用磁盘上任何归档重做日志文件。如果归档重做日志文件不在磁盘上，则\
    \ RMAN 将尝试从备份集中检索它们。如果你想作为不完全数据库恢复的一部分应用重做，则以下条件必须成立：\n\n- 你的数据库必须处于归档日志模式。\n\
    - 你必须拥有所有数据文件的良好备份。\n- 你必须拥有恢复到指定点所需的所有重做日志。\n\n■ **提示** 从 Oracle Database 10g\
    \ 开始，你可以使用 `RECOVER DATABASE PARALLEL` 命令执行并行介质恢复。\n\n使用 RMAN 执行不完全数据库恢复时，必须将数据库置于加载模式。RMAN\
    \ 需要数据库处于加载模式才能读写控制文件。此外，对于不完全数据库恢复，系统数据文件始终是要恢复的数据文件之一。`SYSTEM` 表空间的数据文件在恢复期间必须处于离线状态。Oracle\
    \ 不允许你的数据库在此时处于打开状态。\n\n■ **注意** 执行不完全数据库恢复后，你需要使用 `ALTER DATABASE OPEN RESETLOGS`\
    \ 命令打开数据库。\n\n根据你的场景，你可以使用 RMAN 执行各种不完全恢复方法。下一节讨论如何确定要执行哪种类型的不完全恢复。\n\n### 确定不完全恢复的类型\n\
    \n当你知道要恢复数据库的大致日期和时间时，通常使用基于时间的还原和恢复。例如，你可能知道希望停止恢复过程的大致时间，但不知道特定的 SCN。\n\n基于日志序列的恢复和基于取消的恢复在缺少或损坏日志文件的情况下效果很好。在这种情况下，你只能恢复到最后一个良好的归档重做日志文件。\n\
    \n基于 SCN 的恢复在你能精确定位希望停止恢复过程的 SCN 时效果很好。你可以从诸如 `V$LOG` 和 `V$LOG_HISTORY` 之类的视图中检索\
    \ SCN 信息。你也可以使用 LogMiner 等工具来检索特定 SQL 语句的 SCN。\n\n还原点恢复仅在你已建立还原点的情况下才有效。在这些情况下，你可以还原和恢复到与指定还原点关联的\
    \ SCN。\n\n表空间时间点恢复用于你可以仅还原和恢复少数几个表空间的情况。你可以使用 RMAN 自动化与此类不完全恢复相关的许多任务。\n\n■ **注意**\
    \ 闪回数据库仅在你启用了闪回数据库功能时有效（详见第 16 章）。\n\n### 执行基于时间的恢复\n\n要将数据库还原和恢复到某个时间点，你可以使用\
    \ `RESTORE` 和 `RECOVER` 命令的 `UNTIL TIME` 子句，或者使用 `run{}` 块内的 `SET UNTIL TIME`\
    \ 子句。RMAN 将还原和恢复数据库到但不包括指定时间点。换句话说，RMAN 将还原在该时间点之前提交的任何事务。当到达你指定的时间时，RMAN 会自动停止恢复过程。\n\
    \nRMAN 期望的默认日期格式是 `YYYY-MM-DD:HH24:MI:SS`。但是，我建议使用 `TO_DATE` 函数并指定格式掩码。这消除了不同国家日期格式的歧义以及设置操作系统\
    \ `NLS_DATE_FORMAT` 变量的需要。以下示例在发出还原和恢复命令时指定了时间：\n\n```\nRMAN> connect target /\n\
    RMAN> startup mount;\nRMAN> restore database until time\n2> \"to_date('04-sep-2010\
    \ 14:00:00', 'dd-mon-rrrr hh24:mi:ss')\";\nRMAN> recover database until time\n\
    2> \"to_date('04-sep-2010 14:00:00', 'dd-mon-rrrr hh24:mi:ss')\";\nRMAN> alter\
    \ database open resetlogs;\n```\n\n如果一切顺利，你现在应该看到类似这样的输出：\n\n```\nDatabase altered\n\
    ```\n\n### 执行基于日志序列的恢复\n\n通常，启动这种类型的不完全数据库恢复是因为你缺少或损坏了一个归档重做日志文件。如果是这种情况，你只能恢复到最后一个良好的归档重做日志文件，因为你不能跳过一个缺失的归档重做日志文件。\n\
    \n你如何确定要还原到（但不包括）哪个归档重做日志文件会因情况而异。例如，如果你在物理上缺失了一个归档重做日志文件，并且 RMAN 无法在备份集中找到它，那么当尝试应用缺失的文件时，你会收到以下消息：\n\
    \n```\nRMAN-06053: unable to perform media recovery because of missing log\nRMAN-06025:\
    \ no backup of log thread 1 seq 45 lowscn 2149069 found to restore\n```\n\n根据前面的错误消息，你将还原到（但不包括）日志序列\
    \ 45。\n\n```\nRMAN> connect target /\nRMAN> startup mount;\nRMAN> restore database\
    \ until sequence 45;\nRMAN> recover database until sequence 45;\nRMAN> alter database\
    \ open resetlogs;\n```\n\n如果一切顺利，你现在应该看到类似这样的输出：\n\n```\nDatabase altered\n```\n\
    \n■ **注意** 基于日志序列的恢复类似于用户管理的基于取消的恢复。有关用户管理的基于取消的恢复的详细信息，请参见第 16 章。\n\n### 执行基于变更/SCN\
    \ 的恢复\n\n当你知道希望结束还原和恢复会话的 SCN 值时，基于 SCN 的不完全数据库恢复有效。RMAN 将恢复到但不包括指定的 SCN。当到达指定的\
    \ SCN 时，RMAN 会自动终止恢复过程。\n\n你可以通过多种方式查看数据库 SCN 信息：\n\n- 使用 LogMiner 确定与 DDL 或 DML\
    \ 语句关联的 SCN。\n- 查看 `alert.log` 文件。\n- 查看跟踪文件。\n- 查询 `V$LOG`、`V$LOG_HISTORY` 和\
    \ `V$ARCHIVED_LOG` 的 `FIRST_CHANGE#` 列。\n\n确定要恢复到的 SCN 后，使用 `UNTIL SCN` 子句还原到但不包括指定的\
    \ SCN。以下示例还原所有 SCN 小于 950 的事务：\n\n```\nRMAN> connect target /\nRMAN> startup mount;\n\
    RMAN> restore database until scn 95019865425;\nRMAN> recover database until scn\
    \ 95019865425;\nRMAN> alter database open resetlogs;\n```\n\n如果一切顺利，你现在应该看到类似这样的输出：\n\
    \n```\nDatabase altered\n```\n\n### 还原到还原点\n\n有两种类型的还原点：普通和保证。保证还原点要求你启用闪回数据库功能。你可以使用\
    \ SQL*Plus 创建普通还原点，如下所示：\n\n```\nSQL> create restore point MY_RP;\n```\n\n此命令创建一个名为\
    \ `MY_RP` 的还原点，该还原点与发出命令时数据库的 SCN 相关联。你可以查看数据库的当前 SCN，如下所示：\n\n```\nSQL> select\
    \ current_scn from v$database;\n```\n\n你可以在 `V$RESTORE_POINT` 视图中查看还原点信息，如下所示：\n\
    \n```\nSQL> select name, scn from v$restore_point;\n```\n\n还原点就像特定 SCN 的同义词。它允许你还原和恢复到某个\
    \ SCN，而不必指定一个数字。RMAN 将还原和恢复到但不包括与还原点关联的 SCN。\n\n此示例还原并恢复到 `MY_RP` 还原点：\n\n```\n\
    RMAN> connect target /\nRMAN> startup mount;\nRMAN> restore database until restore\
    \ point MY_RP;\nRMAN> recover database until restore point MY_RP;\nRMAN> alter\
    \ database open resetlogs;\n```\n\n## 还原和恢复到不同的服务器\n\n当你考虑备份时，你必须同时考虑还原和恢复。你的备份的好坏取决于你上次测试还原和恢复的结果。如果没有一个好的还原和恢复策略，备份策略可能会变得毫无价值。你最不希望发生的事情是遇到介质故障，去还原数据库，然后发现缺少关键部分，没有足够的空间进行还原，发现某些东西损坏了，等等。\n\
    \n测试 RMAN 备份的最佳方法之一是将其还原和恢复到不同的数据库服务器。这将锻炼你所有的备份、还原和恢复 DBA 技能。如果你能在不同的服务器上还原和恢复\
    \ RMAN 备份，当真正的灾难发生时，这会给你信心。你可以将本书前面的所有内容视为执行技术挑战性任务的构建块。使用 RMAN 备份将数据库从一个服务器移动到另一个服务器需要专家级的\
    \ Oracle 架构以及备份和恢复工作原理的理解。\n\n■ **注意** RMAN 确实有一个 `DUPLICATE DATABASE` 命令，它对于将数据库从一个服务器复制到另一个服务器非常有效。如果你要经常执行此类任务，我建议你使用\
    \ RMAN 的复制数据库功能。但是，你可能仍然需要手动将数据库备份从一个服务器复制到另一个服务器，特别是在安全性要求你无法直接将生产服务器连接到开发环境的情况下。我处理过许多生产数据库，无法直接访问生产服务器，因此复制数据库的唯一方法是手动将\
    \ RMAN 备份从生产环境复制到测试环境。\n\n在此示例中，源服务器和目标服务器具有完全不同的挂载点和磁盘布局。下面列出了使用 RMAN 备份在单独的服务器上重新创建数据库所需的高级步骤：\n\
    \n1.  在源数据库上创建 RMAN 备份。\n2.  将 RMAN 备份复制到目标服务器。此步骤之后的所有步骤都在目标数据库服务器上执行。\n3.  确保已安装\
    \ Oracle。\n4.  源所需的 OS 变量。\n5.  为要还原的数据库创建 `init.ora` 文件。\n6.  为数据文件、控制文件和转储/跟踪文件创建任何所需的目录。\n\
    7.  以 `NOMOUNT` 模式启动数据库。\n8.  从 RMAN 备份中还原控制文件。\n9.  以 `MOUNT` 模式启动数据库。\n10. 使控制文件知道\
    \ RMAN 备份的位置。\n11. 重命名并还原数据文件以反映新的目录位置。\n12. 恢复数据库。\n13. 为联机重做日志设置新位置。\n14. 打开数据库。\n\
    15. 添加临时文件。\n16. 重命名数据库。\n\n前面的每个步骤都将在接下来的几个小节中详细介绍。步骤 1 和 2 在源数据库服务器上执行。所有其他步骤都在目标服务器上执行。在此示例中，源数据库名为\
    \ `E64202`，目标数据库将命名为 `O11DEV`。\n\n在源数据库上，数据文件、控制文件和联机重做日志的位置都在此目录中：\n\n```\n/u02/oracle/oradata/E64202\n\
    ```\n\n源数据库归档重做日志文件位置在此处：\n\n```\n/u02/oracle/product/11.2.0/dbhome_1/dbs/arch\n\
    ```\n\nRMAN 备份位置由以下配置确定：\n\n```\nCONFIGURE CONTROLFILE AUTOBACKUP ON;\nCONFIGURE\
    \ CONTROLFILE AUTOBACKUP FORMAT FOR DEVICE TYPE DISK TO '/u02/rman/%F.bk';\nCONFIGURE\
    \ CHANNEL 1 DEVICE TYPE DISK FORMAT '/u02/rman/rman1_%U.bk';\n```\n\n在目标数据库上，数据文件和控制文件将被重命名并还原到此目录：\n\
    \n```\n/ora02/dbfile/O11DEV\n```\n\n目标数据库联机重做日志将在此目录中重新创建：\n\n```\n/ora02/oraredo/O11DEV\n\
    ```\n\n目标数据库归档重做日志文件位置将设置如下：\n\n```\n/ora02/oraarch/O11DEV\n```\n\n### 步骤 1：在源数据库上创建\
    \ RMAN 备份\n\n备份数据库时，请确保开启了自动备份控制文件功能。还要将归档重做日志作为备份的一部分包括在内，如下所示：\n\n```\nRMAN>\
    \ backup database plus archivelog;\n```\n\n我通常配置一个通道，并将备份片和控制文件自动备份都放到同一个目录中。例如，源数据库的备份片如下所示：\n\
    \n```\nrman1_03lol0i0_1_1.bk\nrman1_04lol0i1_1_1.bk\nrman1_05lol0j5_1_1.bk\nc-1984315547-20100923-00.bk\n\
    ```\n\n### 步骤 2：将 RMAN 备份复制到目标服务器\n\n对于此步骤，我通常使用 `rsync` 或 `scp` 等实用程序将备份片从一个服务器复制到另一个服务器。此示例使用\
    \ `scp` 命令：\n\n```\n$ scp *.bk oracle@ora03:/ora02/rman/O11DEV\n```\n\n在此示例中，在复制备份文件之前，必须在目标服务器上创建\
    \ `/ora02/rman/O11DEV` 目录。\n\n■ **注意** 如果 RMAN 备份在磁带上而不是磁盘上，则必须在目标服务器上安装/配置相同的介质管理器软件。此外，该服务器必须能够直接访问磁带上的\
    \ RMAN 备份。\n\n### 步骤 3：确保已安装 Oracle\n\n确保在目标服务器上安装了与源数据库相同版本的 Oracle 二进制文件。在此示例中，源和目标数据库都使用\
    \ Oracle Database 11*g* 第 2 版。\n\n### 步骤 4：源所需的 OS 变量\n\n你需要设置操作系统变量，例如 `ORACLE_SID`、`ORACLE_HOME`\
    \ 和 `PATH`。我通常将 `ORACLE_SID` 变量设置为与原始数据库上的值匹配。数据库名称将作为本节最后一步的一部分进行更改。以下是目标服务器上\
    \ `ORACLE_SID` 和 `ORACLE_HOME` 的设置：\n\n```\n$ echo $ORACLE_SID\nE64202\n$ echo\
    \ $ORACLE_HOME\n/oracle/app/oracle/product/11.2.0/db_1\n```\n\n### 步骤 5：为要还原的数据库创建\
    \ init.ora 文件\n\n将 `init.ora` 文件从原始服务器复制到目标服务器，并修改它，使其在目录路径方面与目标机器匹配。例如，确保修改 `CONTROL_FILES`\
    \ 参数，使路径名反映控制文件在新服务器上的存放位置。\n\n目前，`init.ora` 文件的名称是 `ORACLE_HOME/dbs/initE64202.ora`。当数据库在后面的步骤中被重命名为\
    \ `O11DEV` 时，此文件将被重命名。目前，数据库名称是 `E64202`；这将在后面的步骤中重命名。\n\n以下是 `init.ora` 文件的内容：\n\
    \n```\ndb_name='E64202'\ncontrol_files='/ora02/dbfile/O11DEV/control01.ctl'\n\
    ,'/ora02/dbfile/O11DEV/control02.ctl'\ndiagnostic_dest='/oracle/app/oracle'\n\
    log_archive_dest_1='location=/ora02/oraarch/O11DEV'\nlog_archive_format='%t_%s_%r.arc'\n\
    db_block_size=8192\nmemory_target=408944640\nopen_cursors=300\nprocesses=100\n\
    remote_login_passwordfile='EXCLUSIVE'\nsessions=115\nundo_tablespace='UNDOTBS1'\n\
    ```\n\n请注意，`CONTROL_FILES`、`DIAGNOSTIC_DEST` 和 `LOG_ARCHIVE_DEST_1` 反映了目标服务器上的新路径目录。\n\
    \n■ **注意** 如果这是 Oracle Database 10g 的示例，则需要设置参数：`BACKGROUND_DUMP_DEST`、`USER_DUMP_DEST`、`CORE_DUMP_DEST`。\n\
    \n### 步骤 6：为数据文件、控制文件和转储/跟踪文件创建任何所需的目录\n\n对于此示例，创建目录 `/ora02/dbfile/O11DEV`、`/oracle/app/oracle`\
    \ 和 `/ora02/oraarch/O11DEV`：\n\n```\n$ mkdir -p /ora02/dbfile/O11DEV\n$ mkdir\
    \ -p /oracle/app/oracle\n$ mkdir -p /ora02/oraarch/O11DEV\n```\n\n### 步骤 7：以 NOMOUNT\
    \ 模式启动数据库\n\n你现在应该能够以 `NOMOUNT` 模式启动数据库：\n\n```\n$ rman target /\nRMAN> startup\
    \ nomount;\n```\n\n### 步骤 8：从 RMAN 备份中还原控制文件\n\n现在从先前复制的备份中还原控制文件。在此示例中，包含控制文件备份的备份片是\
    \ `c-1984315547-20100923-00.bk`：\n\n```\nRMAN> restore controlfile from '/ora02/rman/O11DEV/c-1984315547-20100923-00.bk';\n\
    ```\n\n控制文件将被还原到 `CONTROL_FILES` 初始化参数指定的所有位置。以下是一些示例输出：\n\n```\nchannel ORA_DISK_1:\
    \ restoring control file\nchannel ORA_DISK_1: restore complete, elapsed time:\
    \ 00:00:01\noutput file name=/ora02/dbfile/O11DEV/control01.ctl\noutput file name=/ora02/dbfile/O11DEV/control02.ctl\n\
    ```\n\n### 步骤 9：以 MOUNT 模式启动数据库\n\n你现在应该能够以加载模式启动数据库：\n\n```\nRMAN> alter database\
    \ mount;\n```\n\n### 步骤 10：使控制文件知道 RMAN 备份的位置\n\n首先，使用 `CROSSCHECK` 命令让控制文件知道没有任何备份或归档重做日志位于它们在原始服务器上的相同位置：\n\
    \n```\nRMAN> crosscheck backup;\nRMAN> crosscheck copy;\nRMAN> crosscheck archivelog\
    \ all;\n```\n\n现在使用 `CATALOG` 命令使控制文件知道复制到目标服务器的备份片的位置和名称。在此示例中，位于 `/ora02/rman/O11DEV`\
    \ 目录中的任何 RMAN 文件都将在控制文件中编录：\n\n```\nRMAN> catalog start with '/ora02/rman/O11DEV';\n\
    ```\n\n以下是一些示例输出：\n\n```\nsearching for all files that match the pattern /ora02/rman/O11DEV\n\
    \nList of Files Unknown to the Database\n=====================================\n\
    File Name: /ora02/rman/O11DEV/rman1_05lol0j5_1_1.bk\nFile Name: /ora02/rman/O11DEV/c-1984315547-20100923-00.bk\n\
    File Name: /ora02/rman/O11DEV/rman1_04lol0i1_1_1.bk\nFile Name: /ora02/rman/O11DEV/rman1_03lol0i0_1_1.bk\n\
    Do you really want to catalog the above files (enter YES or NO)?\n```\n\n现在，输入\
    \ `YES`（如果一切看起来正常）。你现在应该能够使用 RMAN 的 `LIST BACKUP` 命令查看新编录的备份片：\n\n```\nRMAN> list\
    \ backup;\n```\n\n### 步骤 11：重命名并还原数据文件以反映新的目录位置\n\n如果你的目标服务器具有与原始服务器目录完全相同的目录结构，你可以直接发出\
    \ `RESTORE` 命令：\n\n```\nRMAN> restore database;\n```\n\n但是，当将数据文件还原到与原始目录不同的位置时，你将必须使用\
    \ `SET NEWNAME` 命令。创建一个文件，使用包含适当 `SET NEWNAME` 和 `RESTORE` 命令的 RMAN `run{}` 块。我喜欢使用生成\
    \ SQL 的 SQL 脚本来作为起点。这是一个示例脚本：\n\n```\nset head off feed off verify off pages 0\
    \ trimspool on\nset lines 132 pagesize 0\nspo newname.sql\n--\nselect 'run{' from\
    \ dual;\n--\nselect\n'set newname for datafile ' || file# || ' to ' || '''' ||\
    \ name || '''' || ';'\nfrom v$datafile;\n--\nselect\n'restore database;' || chr(10)\
    \ ||\n'switch datafile all;' || chr(10) ||\n'}'\nfrom dual;\n--\nspo off;\n```\n\
    \n运行脚本后，生成的 `newname.sql` 脚本的内容如下：\n\n```\nrun{\nset newname for datafile 1 to\
    \ '/u02/oracle/oradata/E64202/system01.dbf';\nset newname for datafile 2 to '/u02/oracle/oradata/E64202/sysaux01.dbf';\n\
    set newname for datafile 3 to '/u02/oracle/oradata/E64202/undotbs01.dbf';\nset\
    \ newname for datafile 4 to '/u02/oracle/oradata/E64202/users01.dbf';\nrestore\
    \ database;\nswitch datafile all;\n}\n```\n\n现在，修改 `newname.sql` 脚本的内容以反映目标数据库服务器上的目录。以下是此示例最终\
    \ `newname.sql` 脚本的样子：\n\n```\nrun{\nset newname for datafile 1 to '/ora02/dbfile/O11DEV/system01.dbf';\n\
    set newname for datafile 2 to '/ora02/dbfile/O11DEV/sysaux01.dbf';\nset newname\
    \ for datafile 3 to '/ora02/dbfile/O11DEV/undotbs01.dbf';\nset newname for datafile\
    \ 4 to '/ora02/dbfile/O11DEV/users01.dbf';\nrestore database;\nswitch datafile\
    \ all;\n}\n```\n\n现在，连接到 RMAN 并运行前面的脚本以将数据文件还原到新位置：\n\n```\n$ rman target /\n\
    RMAN> @newname.sql\n```\n\n以下是此示例的输出片段：\n\n```\nchannel ORA_DISK_1: restore complete,\
    \ elapsed time: 00:01:05\nFinished restore at 24-SEP-10\ndatafile 1 switched to\
    \ datafile copy\ninput datafile copy RECID=5 STAMP=730527824 file name=/ora02/dbfile/O11DEV/system01.dbf\n\
    datafile 2 switched to datafile copy\ninput datafile copy RECID=6 STAMP=730527824\
    \ file name=/ora02/dbfile/O11DEV/sysaux01.dbf\ndatafile 3 switched to datafile\
    \ copy\ninput datafile copy RECID=7 STAMP=730527824 file name=/ora02/dbfile/O11DEV/undotbs01.dbf\n\
    datafile 4 switched to datafile copy\ninput datafile copy RECID=8 STAMP=730527824\
    \ file name=/ora02/dbfile/O11DEV/users01.dbf\nRMAN> end-of-file\n```\n\n所有数据文件都已还原到新的数据库服务器。你可以使用\
    \ RMAN 的 `REPORT SCHEMA` 命令来验证文件是否已还原并位于正确的位置：\n\n```\nRMAN> report schema;\n\
    ```\n\n以下是一些示例输出：\n\n```\nRMAN-06139: WARNING: control file is not current for\
    \ REPORT SCHEMA\nReport of database schema for database with db_unique_name E64202\n\
    \nList of Permanent Datafiles\n===========================\nFile Size(MB) Tablespace\
    \ RB segs Datafile Name\n---- -------- -------------------- ------- ------------------------\n\
    1    670      SYSTEM       ***     /ora02/dbfile/O11DEV/system01.dbf\n2    470\
    \      SYSAUX       ***     /ora02/dbfile/O11DEV/sysaux01.dbf\n3    30       UNDOTBS1\
    \     ***     /ora02/dbfile/O11DEV/undotbs01.dbf\n4    5        USERS        ***\
    \     /ora02/dbfile/O11DEV/users01.dbf\n\nList of Temporary Files\n=======================\n\
    File Size(MB) Tablespace Maxsize(MB) Tempfile Name\n---- -------- --------------------\
    \ ----------- --------------------\n1    0        TEMP         32767       /u02/oracle/oradata/E64202/temp01.dbf\n\
    ```\n\n从前面的输出来看，数据库名称和临时表空间数据文件仍未反映目标数据库。这些将在后续步骤中进行修改。\n\n### 步骤 12：恢复数据库\n\n\
    接下来，你需要应用在备份期间生成的任何归档重做文件。由于备份时使用了 `ARCHIVELOG ALL` 子句，这些文件应包含在备份中。通过 `RECOVER\
    \ DATABASE` 命令启动重做的应用：\n\n```\nRMAN> recover database;\n```\n\nRMAN 将还原并应用备份片中尽可能多的归档重做日志，当到达不存在的归档重做日志时会抛出错误：\n\
    \n```\nchannel ORA_DISK_1: starting archived log restore to default destination\n\
    channel ORA_DISK_1: restoring archived log\narchived log thread=1 sequence=4\n\
    channel ORA_DISK_1: reading from backup piece /ora02/rman/O11DEV/rman1_05lol0j5_1_1.bk\n\
    channel ORA_DISK_1: piece handle=/ora02/rman/O11DEV/rman1_05lol0j5_1_1.bk tag=TAG20100923T200037\n\
    channel ORA_DISK_1: restored backup piece 1\nchannel ORA_DISK_1: restore complete,\
    \ elapsed time: 00:00:01\narchived log file name=/ora02/oraarch/O11DEV/1_4_729167134.arc\
    \ thread=1 sequence=4\nunable to find archived log\narchived log thread=1 sequence=5\n\
    RMAN-00571: ===========================================================\nRMAN-00569:\
    \ =============== ERROR MESSAGE STACK FOLLOWS ===============\nRMAN-00571: ===========================================================\n\
    RMAN-03002: failure of recover command at 09/24/2010 04:35:09\nRMAN-06054: media\
    \ recovery requesting unknown archived log\nfor thread 1 with sequence 5 and starting\
    \ SCN of 977214\n```\n\n现在是验证数据文件是否在线且不处于模糊状态的好时机。运行以下查询：\n\n```\nselect\n  file#\n\
    \  ,status\n  ,fuzzy\n  ,error\n  ,checkpoint_change#,\n  to_char(checkpoint_time,'dd-mon-rrrr\
    \ hh24:mi:ss') as checkpoint_time\nfrom v$datafile_header;\n```\n\n### 步骤 13：为联机重做日志设置新位置\n\
    \n设置联机重做日志的名称以反映目标数据库服务器上的新目录结构。我有时使用生成 SQL 的 SQL 脚本来协助此步骤：\n\n```\nset head off\
    \ lines 132 pages 0 trimspoo on\nspo renlog.sql\nselect\n'alter database rename\
    \ file ' || chr(10)\n|| '''' || member || '''' || ' to ' || chr(10) || '''' ||\
    \ member || '''' ||';'\nfrom v$logfile;\nspo off;\n```\n\n对于此示例，生成的 `renlog.sql`\
    \ 文件的内容如下：\n\n```\nalter database rename file\n'/u02/oracle/oradata/E64202/redo03.log'\
    \ to\n'/u02/oracle/oradata/E64202/redo03.log';\n\nalter database rename file\n\
    '/u02/oracle/oradata/E64202/redo02.log' to\n'/u02/oracle/oradata/E64202/redo02.log';\n\
    \nalter database rename file\n'/u02/oracle/oradata/E64202/redo01.log' to\n'/u02/oracle/oradata/E64202/redo01.log';\n\
    ```\n\n`renlog.sql` 的内容需要进行修改以反映目标服务器上的目录结构。以下是为此示例编辑后的 `renlog.sql`：\n\n```\n\
    alter database rename file\n'/u02/oracle/oradata/E64202/redo03.log' to\n'/ora02/oraredo/O11DEV/redo03.log';\n\
    \nalter database rename file\n'/u02/oracle/oradata/E64202/redo02.log' to\n'/ora02/oraredo/O11DEV/redo02.log';\n\
    \nalter database rename file\n'/u02/oracle/oradata/E64202/redo01.log' to\n'/ora02/oraredo/O11DEV/redo01.log';\n\
    ```\n\n通过运行前面的脚本来更新控制文件：\n\n```\nSQL> @renlog.sql\n```\n\n你可以从 `V$LOGFILE` 中选择以验证联机重做日志名称是否正确：\n\
    \n```\nSQL> select member from v$logfile;\n```\n\n这是此示例的输出：\n\n```\n/ora02/oraredo/O11DEV/redo03.log\n\
    /ora02/oraredo/O11DEV/redo02.log\n/ora02/oraredo/O11DEV/redo01.log\n```\n\n确保新服务器上包含联机重做日志的目录存在。对于此示例，`mkdir`\
    \ 命令如下：\n\n```\n$ mkdir -p /ora02/oraredo/O11DEV\n```\n\n### 步骤 14：打开数据库\n\n你必须使用\
    \ `OPEN RESETLOGS` 命令打开数据库（因为此时没有重做日志，必须重新创建）：\n\n```\nSQL> alter database open\
    \ resetlogs;\n```\n\n如果成功，你应该会看到此消息：\n\n```\nDatabase altered.\n```\n\n### 步骤\
    \ 15：添加临时文件\n\n当你启动数据库时，Oracle 会自动尝试向数据库添加任何缺失的临时文件。如果目标服务器上的目录结构与源服务器不同，Oracle\
    \ 将无法执行此操作。在这种情况下，你将必须手动添加任何缺失的临时文件。为此，首先将临时表空间的临时文件脱机。来自源数据库的文件定义如下脱机：\n\n```\n\
    SQL> alter database tempfile '/u02/oracle/oradata/E64202/temp01.dbf' offline;\n\
    ```\n\n接下来，向 `TEMP` 表空间添加一个与目标数据库服务器目录结构匹配的临时表空间文件：\n\n```\nSQL> alter tablespace\
    \ temp add tempfile '/ora02/dbfile/O11DEV/temp01.dbf' size 100m;\n```\n\n### 步骤\
    \ 16：重命名数据库\n\n如果你需要将数据库重命名为开发或测试数据库的名称，请创建包含 `CREATE CONTROLFILE` 语句的跟踪文件，并使用它来重命名数据库。这些步骤在第\
    \ 4 章中有详细介绍。涉及的基本步骤是：\n\n1.  生成跟踪文件。\n\n    ```\n    SQL> oradebug setmypid\n\
    \    SQL> alter database backup controlfile to trace resetlogs;\n    SQL> oradebug\
    \ tracefile_name\n    ```\n2.  修改跟踪文件以包含 `SET DATABASE`。\n\n    ```\n    CREATE\
    \ CONTROLFILE SET DATABASE \"O11DEV\" RESETLOGS...\n    ```\n3.  创建一个与新名称匹配的 `init.ora`\
    \ 文件。\n4.  `ORACLE_HOME/dbs/init<newSID>.ora`。\n5.  在新的 `init.ora` 文件中修改 `DB_NAME`\
    \ 变量（在此示例中，将其设置为 `O11DEV`）。\n6.  将 `ORACLE_SID` 设置为新的 SID 名称（在此示例中，将其设置为 `O11DEV`）。\n\
    7.  `SQL> startup nomount;`\n8.  运行跟踪文件以重新创建控制文件（来自步骤 2 的跟踪文件）。\n9.  `SQL> alter\
    \ database open resetlogs;`\n\n如果成功，你将拥有一个复制自原始数据库的数据库。所有数据文件、控制文件、归档重做日志和联机重做日志都位于新位置，并且数据库具有新名称。\n\
    \n■ **提示** 你也可以使用 `NID` 实用程序来更改数据库名称和 DBID。有关更多信息，请参阅 My Oracle Support 说明 863800.1。\n\
    \n## 总结\n\nRMAN 是 Recovery Manager 的缩写。值得注意的是，Oracle 并未将此工具命名为 Backup Manager。Oracle\
    \ 团队认识到，虽然备份很重要，但 B&R 工具的真正价值在于其还原和恢复数据库的能力。能够管理恢复过程是关键技能。当数据库损坏需要恢复时，每个人都指望 DBA\
    \ 执行平稳快速的数据库恢复。Oracle DBA 应使用 RMAN 来保护、确保公司数据资产的安全性和可用性。\n\n还原和恢复类似于骨折后的愈合过程。还原类似于将骨头设置回其原始位置的过程。这就像从备份中还原数据文件并将其放回其原始目录。恢复数据文件类似于骨折的愈合过程——将骨头恢复到其断裂前的状态。当你恢复数据文件时，你应用事务（从归档重做和联机重做中获得）将还原的数据文件转换回介质故障发生前的状态。\n\
    \nRMAN 可用于任何类型的还原和恢复场景。根据情况，RMAN 可用于还原整个数据库、特定数据文件、控制文件、服务器参数文件、归档重做日志，或者只是特定的数据块。你可以指示\
    \ RMAN 执行完全恢复或不完全恢复。\n\n本章的最后一节详细介绍了如何使用 RMAN 将数据库还原和恢复到远程服务器。我建议你定期尝试测试此类恢复。这将全面检验你的备份和恢复策略。一旦你能成功地将数据库还原到与原始服务器不同的服务器上，你将获得很大的信心，并充分理解备份和恢复的内部机制。\n\
    \n# ORACLE 安全备份\n\n-   与 Oracle Enterprise Manager Grid Control 集成（需要 Oracle Database\
    \ 10g Release 2 或更高版本）\n-   支持多个磁带驱动器\n-   加密磁带备份\n-   光纤连接设备支持\n-   快速备份压缩（需要\
    \ Oracle Database 11g Release 1 或更高版本）\n-   RMAN 中级压缩（需要 Oracle Database 11g Release\
    \ 2 或更高版本）\n-   分布式主机和磁带设备的网络备份\n-   自动磁带库系统软件（ACSLS）和磁带在多个位置（库）之间的自动轮换\n\n如果你是一个只有一个生产数据库服务器的小型机构，那么\
    \ Oracle Secure Backup Express 可能满足你的业务需求，而功能齐全的 Oracle Secure Backup 版本则更适用于需要高级数据保护需求的具有多个分布式主机的环境。\n\
    \n■ **注意** OSB 在大多数 Linux 和 Unix 平台以及 Windows 上可用。请查看 My Oracle Support 的认证矩阵以获取最新列表（https://support.oracle.com）。\n\
    \n## OSB 术语\n\n花些时间熟悉与 OSB 相关的架构术语。本节简要描述了 OSB 的主要组成部分，从管理域开始。\n\n### OSB 管理域和服务器\n\
    \n管理域是一组服务器（主机）的集合，你将其作为一个组进行管理以执行备份和还原操作。在 OSB 管理域中，每个服务器可以分配以下一个或多个角色：\n\n-\
    \   管理（admin）服务器\n-   媒体服务器\n-   客户端服务器（或客户端主机）\n\n对于每个管理域，如图 20–1 所示，只有一个管理服务器控制备份、还原和调度操作。一个管理服务器管理一个或多个媒体服务器以及一个或多个客户端。\n\
    \n■ **提示** 有关所有 OSB 接口的完整详细信息，请参阅 *Oracle Secure Backup Administrator's Guide*\
    \ 和 *Oracle Secure Backup Reference*，网址为 www.oracle.com/technetwork/database/secure-backup/documentation/。\n\
    \n### OSB 用户和类\n\nOracle Secure Backup 用户是在 OSB 管理域内定义的帐户。这些用户与操作系统用户是分开的。OSB\
    \ 用户信息存储在 OSB 管理域服务器中。当你通过其接口（如 `obtool` 或 OSB Web 工具）访问 OSB 时，需要输入用户名和密码。\n\n\
    OSB 类是一组授予用户的权限和权利。每个用户只能分配给一个 OSB 类。OSB 类有助于在管理域中的所有服务器上保持一致的用户体。\n\n### OSB\
    \ 守护进程\n\nOracle Secure Backup 使用七个不同的后台进程（守护进程）来管理配置、备份和还原操作。启动守护进程的可执行文件位于每个服务器上的\
    \ `OSB_HOME/etc` 目录中。这些进程在此列表中描述：\n\n-   **调度守护进程** 仅在管理服务器上运行，管理计划的备份。\n-   **索引守护进程**\
    \ 仅在管理服务器上运行，管理每个客户端的备份目录。\n-   **Apache Web 服务器守护进程** 仅在管理服务器上运行，服务于 OSB Web\
    \ 工具。\n-   **服务守护进程** 在管理、媒体和客户端服务器上运行。在管理服务器上，它根据调度守护进程的请求运行作业。在媒体或客户端服务器上运行时，它允许对主机进行远程管理。\n\
    -   **网络数据管理协议 (NDMP) 守护进程** 在管理、媒体和客户端服务器上运行；它提供管理域内服务器之间的数据通信。\n-   **机器人守护进程**\
    \ 仅在媒体服务器上运行，帮助管理与磁带设备的通信。\n-   **代理守护进程** 仅在客户端服务器上运行，验证 SBT 备份和还原操作的用户访问权限。\n\
    \n现在你已基本了解 OSB 架构，可以下载并安装 OSB 软件了。\n\n## 下载和安装\n\n你可以从 Oracle 技术网络 (OTN) 网站 www.oracle.com/technetwork/database/secure-backup/downloads/\
    \ 下载 OSB 软件。\n\n对于本章的示例，我下载了 OSB 版本 10.3.0.3.0，并将 zip 文件 `osb-10.3.0.3.0_linux32.zip`\
    \ 保存到我的 OSB 管理域中管理服务器的临时目录 `/stage/osb` 下。你可以将此二进制文件临时存放在服务器上你选择的任意位置。\n\nOracle\
    \ 建议在 Unix 和 Linux 平台的目录 `/usr/local/oracle/backup` 下安装 OSB 软件，在 Windows 平台的目录\
    \ `C:\\Program Files\\Oracle\\Backup` 下安装。一旦你下载了 OSB zip 文件并将其复制到适当的目录，就可以继续执行安装步骤，如下所示：\n\
    \n1.  要执行 OSB 安装，你必须以 root 用户身份登录。\n\n    ```\n    $ su - root\n    ```\n2.  如果未提供解压缩实用程序，请创建一个链接。\n"
- fmt: "# 安装 Oracle Secure Backup\n\n1.  创建符号链接：\n    ```\n    ln -s /bin/gunzip /bin/uncompress\n\
    \    ```\n\n2.  进入暂存目录，解压从 OTN 下载的 zip 文件：\n    ```\n    cd /stage/osb\n    unzip\
    \ osb-10.3.0.3.0_linux32.zip\n    ```\n\n3.  如果 OSB 主目录不存在，则创建该目录：\n    ```\n\
    \    mkdir -p /usr/local/oracle/backup\n    ```\n\n4.  进入 OSB 主目录并运行安装脚本：\n  \
    \  ```\n    cd /usr/local/oracle/backup\n    /stage/osb/osb-10.3.0.3.0_linux32/setup\n\
    \    ```\n    将显示以下输出：\n    ```\n    Welcome to Oracle's setup program for Oracle\
    \ Secure Backup. This\n    program loads Oracle Secure Backup software from the\
    \ CD-ROM to a\n    filesystem directory of your choosing.\n\n    This CD-ROM contains\
    \ Oracle Secure Backup version 10.3.0.3.0_LINUX32.\n\n    Please wait a moment\
    \ while I learn about this host... done.\n\n    - - - - - - - - - - - - - - -\
    \ - - - - - - - - - - - -\n    1. linux32\n       administrative server, media\
    \ server, client\n    - - - - - - - - - - - - - - - - - - - - - - - - - - -\n\n\
    \    Loading Oracle Secure Backup installation tools... done.\n\n    Loading linux32\
    \ administrative server, media server, client... done.\n\n    - - - - - - - -\
    \ - - - - - - - - - - - - - - - - - - -\n\n    Oracle Secure Backup has installed\
    \ a new obparameters file.\n    Your previous version has been saved as install/obparameters.savedbysetup.\n\
    \    Any changes you have made to the previous version must be\n    made to the\
    \ new obparameters file.\n\n    Would you like the opportunity to edit the obparameters\
    \ file\n    Please answer 'yes' or 'no' [no]:\n    ```\n\n5.  由于不修改`obparameters`文件，按\
    \ Enter 键接受默认参数。将显示以下输出：\n    ```\n    Loading of Oracle Secure Backup software\
    \ from CD-ROM is complete.\n    You may unmount and remove the CD-ROM.\n\n   \
    \ Would you like to continue Oracle Secure Backup installation with\n    'installob'\
    \ now? (The Oracle Secure Backup Installation Guide\n    contains complete information\
    \ about installob.)\n\n    Please answer 'yes' or 'no' [yes]:\n    ```\n\n6. \
    \ 按 Enter 键继续运行`installob`。将显示以下输出：\n    ```\n    Welcome to installob, Oracle\
    \ Secure Backup's installation program.\n\n    For most questions, a default answer\
    \ appears enclosed in square brackets.\n    Press Enter to select this answer.\n\
    \n    Please wait a few seconds while I learn about this machine... done.\n\n\
    \    Have you already reviewed and customized install/obparameters for your Oracle\
    \ Secure Backup installation [yes]?\n    ```\n\n7.  按 Enter 键继续 OSB 安装。将显示以下输出：\n\
    \    ```\n    Oracle Secure Backup is already installed on this machine (BLLNX4).\n\
    \n    Would you like to re-install it preserving current configuration data[no]?\n\
    \    ```\n\n8.  如果已安装 OSB 并正在执行升级，请输入`yes`以保留先前的配置。将显示以下输出：\n    ```\n    Oracle\
    \ Secure Backup's Web server has been loaded, but is not yet configured.\n\n \
    \   Choose from one of the following options. The option you choose defines the\
    \ software components to be installed.\n\n    Configuration of this host is required\
    \ after installation completes.\n\n    You can install the software on this host\
    \ in one of the following ways: (a) administrative server, media server and client\n\
    \                                                                    (b) media\
    \ server and client\n                                                        \
    \            (c) client\n\n    If you are not sure which option to choose, please\
    \ refer to the Oracle Secure Backup Installation Guide. (a,b or c) [a]? a\n  \
    \  ```\n\n9.  按 Enter 键接受默认值`a`，将服务器配置为管理服务器、介质服务器和客户端。将显示以下输出：\n    ```\n   \
    \ Beginning the installation. This will take just a minute and will produce several\
    \ lines of informational output.\n\n    Installing Oracle Secure Backup on BLLNX4\
    \ (Linux version 2.6.9-67.EL)\n    You must now enter a password for the Oracle\
    \ Secure Backup admin user.\n\n    Oracle suggests you choose a password of at\
    \ least eight characters in length, containing a mixture of alphabetic and numeric\
    \ characters.\n\n    Please enter the admin password:\n    Re-type password for\
    \ verification:\n    ```\n\n10. 为`admin`用户输入两次密码。将显示以下输出：\n    ```\n    You should\
    \ now enter an email address for the Oracle Secure Backup 'admin'\n    user. Oracle\
    \ Secure Backup uses this email address to send job summary reports and to notify\
    \ the user when a job requires input. If you leave this blank, you can set it\
    \ later using the obtool's 'chuser' command.\n\n    Please enter the admin email\
    \ address: juan.cruz@oracle.com\n    ```"
