    ![](img/index-629_1.png)\n\n## 检查数据库可用性\n\n我执行的前几项检查不需要 DBA 登录到数据库服务器。相反，它们可以通过\
    \ SQL*Plus 和操作系统命令远程执行。事实上，我所有的初始检查都是通过网络远程执行的；这可以确定所有系统组件是否正常工作。\n\n一个快速检查远程服务器是否可用、数据库是否启动、网络是否正常以及侦听器是否接受传入连接的方法是：通过\
    \ SQL*Plus 客户端通过网络连接到远程数据库。我通常会在所有数据库中创建一个标准的数据库帐户和密码，用于此类场景。以下是一个通过网络以用户 `barts`\
    \ 和密码 `l1sa` 连接到远程数据库的示例；网络连接信息直接嵌入到连接字符串中（其中 `dwdb1` 是服务器，`1521` 是端口，`dwrep1`\
    \ 是数据库服务名）：\n\n`$ sqlplus barts/l1sa@'dwdb1:1521/dwrep1'`"
- fmt: "## 测试连接性\n\n如果可以建立连接，则表示远程服务器可用，数据库和监听器均已启动并运行。此时，我会联系报告问题的人员，查看连接问题是否与应用程序或其他非数据库因素有关。\n\
    \n如果之前的 `SQL*Plus` 命令不起作用，请尝试确定远程服务器是否可用。\n\n此示例使用 `ping` 命令测试名为 `dwdb1` 的远程服务器：\n\
    \n```\n$ ping dwdb1\n```\n\n如果 `ping` 成功，你应该看到类似以下的输出：\n\n```\n64 bytes from dwdb1\
    \ (192.168.254.215): icmp_seq=1 ttl=64 time=0.044 ms\n```\n\n如果 `ping` 失败，则可能是网络或远程服务器存在问题。如果远程服务器不可用，我通常会尝试联系系统管理员或网络管理员。\n\
    \n如果 `ping` 确实有效，我会检查远程服务器是否可以通过监听器监听的端口访问。我使用 `telnet` 命令来完成此操作：\n\n```\n$ telnet\
    \ IP <port>\n```\n\n在此示例中，尝试连接到服务器的 IP 地址的 1521 端口：\n\n```\n$ telnet 192.168.254.215\
    \ 1521\n```\n\n如果 IP 地址在指定端口上可访问，你应该在输出中看到 \"Connected to ...\"，如下所示：\n\n```\n\
    Trying 192.168.254.216...\nConnected to ora04.\nEscape character is '^]'.\n```\n\
    \n如果 `telnet` 命令不起作用，我会联系系统管理员或网络管理员。\n\n如果 `telnet` 命令有效，则表示网络可以在指定端口上连接到服务器。\n\
    \n接下来，我使用 `tnsping` 命令通过 Oracle Net 测试到远程服务器和数据库的网络连接。此示例尝试访问 `DWREP1` 远程服务：\n\
    \n```\n$ tnsping DWREP1\n```\n\n如果成功，输出应包含字符串 \"OK\"，如下所示：\n\n```\nAttempting\
    \ to contact (DESCRIPTION = (ADDRESS = (PROTOCOL = TCP)(HOST = DWDB1)(PORT = 1521))\
    \ (CONNECT_DATA = (SERVICE_NAME = DWREP1)))\nOK (20 msec)\n```\n\n如果 `tnsping`\
    \ 有效，则表示远程监听器已启动并运行。这并不一定意味着数据库已启动，因此你可能需要登录到数据库服务器进行进一步调查。如果 `tnsping` 不起作用，则监听器或数据库已关闭或挂起。此时，我会直接登录到服务器执行其他检查，例如检查挂载点是否已满。\n\
    \n## 调查磁盘空间\n\n要进一步诊断问题，你需要直接登录到远程服务器。通常，你需要以 Oracle 软件所有者（通常是 `oracle` 操作系统账户）的身份登录。首次登录到服务器时，导致数据库挂起或出现问题的一个常见原因是挂载点已满。\n\
    \n带有 `-h`（人类可读）开关的 `df` 命令有助于验证磁盘使用情况：\n\n```\n$ df -h\n```\n\n任何已满的挂载点都需要调查。如果包含\
    \ `ORACLE_HOME` 的挂载点已满，那么在连接到数据库时你会收到类似这样的错误：\n\n```\nLinux Error: 28: No space\
    \ left on device\n```\n\n要解决挂载点已满的问题，首先要确定可以移动或删除的文件。\n\n通常，我首先查找旧的跟踪文件；通常，有数\
    \ GB 的旧文件可以安全删除。\n\n## 定位告警日志和跟踪文件\n\n如果你使用一致的标准设置了所有数据库，那么定位 `alert.log` 和/或相关的跟踪文件应该不会有问题。如第\
    \ 3 章所述，我定义了一个操作系统函数，该函数将从 `ORACLE_BASE` 和 `ORACLE_SID` 变量推导出 `alert.log` 的位置。\n\
    \n例如，以下 shell 函数在 11*g* 或 10*g* 环境中均有效（假设目录名称遵循标准的 Oracle OFA 标准）：\n\n```\n#-----------------------------------------------------------#\n\
    # cd to bdump\nfunction bdump {\n  echo $ORACLE_HOME | grep 11 >/dev/null\n  if\
    \ [ $? -eq 0 ]; then\n    lower_sid=$(echo $ORACLE_SID | tr '[:upper:]' '[:lower:]')\n\
    \    cd $ORACLE_BASE/diag/rdbms/$lower_sid/$ORACLE_SID/trace\n  else\n    cd $ORACLE_BASE/admin/$ORACLE_SID/bdump\n\
    \  fi\n} # bdump\n#-----------------------------------------------------------#\n\
    ```\n\n当上述函数放置在启动文件（如 `.bashrc`）中时，你将能够立即导航到包含 `alert.log` 和跟踪文件的目录，如下所示：\n\n\
    ```\n$ bdump\n$ pwd\n/ora01/app/oracle/diag/rdbms/o11r2/O11R2/trace\n```\n\n如果你继承的环境是由其他\
    \ DBA 设置的，那么你可能已经注意到 `alert.log` 和跟踪文件有时位于非标准位置。在查找旧的跟踪文件时，我首先尝试找到 `alert.log`。通常，与\
    \ `alert.log` 文件相关的跟踪文件位于同一目录中。由于 `alert.log` 文件具有特定且众所周知的名称（`alert_<SID>.log`），因此通常先找到它，然后再查找相关的跟踪文件会更容易。\n\
    \n对于 Oracle Database 11*g* 及更高版本，`alert.log` 的文本版本位于以下标准目录和名称中：\n\n```\n<ADR base>/diag/rdbms/<DB_UNIQUE_NAME>/<SID>/trace/alert_<SID>.log\n\
    ```\n\n`ADR base` 位置由 `DIAGNOSTIC_DEST` 数据库初始化参数定义。如果你未设置 `DIAGNOSTIC_DEST`，那么\
    \ Oracle 会从操作系统环境变量 `ORACLE_BASE` 推导该值。如果操作系统 `ORACLE_BASE` 变量未设置，则 `DIAGNOSTIC_DEST`\
    \ 被设置为 `ORACLE_HOME/log` 的值（其中 `ORACLE_HOME` 是一个几乎普遍设置的操作系统变量）。\n\n对于 Oracle Database\
    \ 10*g*，`alert.log` 的标准位置定义为：\n\n```\n<ORACLE_BASE>/admin/<SID>/bdump\n```\n\n\
    对于 Oracle Database 10*g*，上述路径通常与 `BACKGROUND_DUMP_DEST` 数据库初始化参数的常规设置值相同。`ORACLE_BASE`\
    \ 操作系统变量的典型值是 `/ora01/app/oracle` 或 `/u01/app/oracle`。例如，以下是 `DEVDB` 数据库的 `init.ora`\
    \ 中 `BACKGROUND_DUMP_DEST` 初始化变量的条目：\n\n```\nbackground_dump_dest=/ora01/app/oracle/admin/DEVDB/bdump\n\
    ```\n\n然而，没有什么能阻止经验不足的 DBA 将 `BACKGROUND_DUMP_DEST` 等参数设置为完全非标准的位置。例如，以下是我最近被要求维护的一个数据库中的设置：\n\
    \n```\nbackground_dump_dest=/oralogs08/dba/admin/bdump\n```\n\n为什么 DBA 会将参数设置为如此非标准的位置？这其实并不重要。\n\
    \n你只需要意识到 DBA 有时会以使维护变得更加困难的方式启用功能。\n\n无论如何，如果你可以通过 `SQL*Plus` 连接到你的数据库，那么确定即使是非标准位置的\
    \ `alert.log` 位置也是轻而易举的事。这将正确显示任何 Oracle 数据库版本的 `alert.log` 位置：\n\n```\nSQL> show\
    \ parameter background_dump_dest\n```\n\n当数据库无法启动，并且文件被放置在非标准（且不明显）的目录中时，如何确定\
    \ `alert.log` 和跟踪文件的位置？在这种情况下，使用 `find` 命令来定位 `alert.log` 文件。首先，切换到 `ORACLE_BASE`\
    \ 目录：\n\n```\n$ cd $ORACLE_BASE\n```\n\n接下来，使用 `find` 命令尝试定位文件：\n\n```\n$ find\
    \ . -name \"alert*.log\"\n```\n\n如果你没有定义 `ORACLE_BASE`，或者 `alert.log` 不在相对标准的位置，那么前面的命令可能找不到任何文件。在这种情况下，执行更全面的全局搜索。\n\
    \n导航到服务器的根目录，然后发出 `find` 命令：\n\n```\n$ cd /\n$ find . -name \"alert*.log\" 2>/dev/null\n\
    ```"
  raw: 'If a connection can be established, then the remote server is available and
    the database and listener are up and working. At this point, I contact whomever
    reported an issue and see if the connectivity issue has something to do with the
    application or something other than the database.


    If the prior SQL*Plus command doesn''t work, try to establish whether the remote
    server is available.


    This example uses the ping command to the remote server named dwdb1:


    $ ping dwdb1


    If ping works, you should see output similar to this:


    64 bytes from dwdb1 (192.168.254.215): icmp_seq=1 ttl=64 time=0.044 ms If ping
    doesn''t work, there is probably an issue with either the network or the remote
    server. If the remote server isn''t available, I usually try to contact a system
    administrator or network administrator.


    If ping does work, I check to see if the remote server is reachable via the port
    that the listener is listening on. I use the telnet command to accomplish this:


    $ telnet IP <port>


    In this example, a network connection is attempted to the server''s IP address
    on the 1521 port: $ telnet 192.168.254.215 1521


    If the IP address is reachable on the specified port, you should see "Connected
    to ..." in the output, like so:


    Trying 192.168.254.216...


    Connected to ora04.


    Escape character is ''^]''.


    If the telnet command doesn''t work, I contact the system administrator or the
    network administrator.


    If the telnet command works, there is network connectivity to the server on the
    specified port.


    Next, I use tnsping command to test network connectivity using Oracle Net to the
    remote server and database. This example attempts to reach the DWREP1 remote service:


    $ tnsping DWREP1


    If successful, the output should contain the string "OK", like so: Attempting
    to contact (DESCRIPTION = (ADDRESS = (PROTOCOL = TCP)(HOST = DWDB1) (PORT = 1521))
    (CONNECT_DATA = (SERVICE_NAME = DWREP1)))


    OK (20 msec)


    CHAPTER 22 ■ DATABASE TROUBLESHOOTING


    If tnsping works, it means the remote listener is up and working. It doesn''t
    necessarily mean that the database is up, so you may need to log onto the database
    server to further investigate. If tnsping doesn''t work, then the listener or
    the database is down or hung. At this point, I logon directly to the server to
    perform additional checks such as a mount point filling up.


    Investigating Disk Fullness


    To further diagnose issues, you need to logon directly to the remote server. Typically,
    you will need to logon as the owner of the Oracle software (usually the oracle
    operating system account). When first logging onto a box, one issue that will
    cause a database to hang or have problems is a full mount point.


    The df command with the human readable -h switch assists with verifying disk fullness:
    $ df -h


    Any mount point that is full needs to be investigated. If the mount point that
    contains ORACLE_HOME


    becomes full, then you''ll receive errors like this when connecting to the database:
    Linux Error: 28: No space left on device


    To fix issues with a full mount point, first identify files that can either be
    moved or removed.


    Usually, I first look for old trace files; often, there’s a gigabyte of old files
    that can safely be removed.


    Locating the Alert Log and Trace Files


    If you''ve set up all of the databases using consistent standards, there should
    never be issues with locating the alert.log and/or associated trace files. As
    seen in Chapter 3, I define an operating system function that will derive the
    location of the alert.log from the ORACLE_BASE and ORACLE_SID variables.


    For example, the following shell function works in either an 11 *g* or 10 *g*
    environment (assuming that standard Oracle OFA standards are in place for directory
    names):


    #-----------------------------------------------------------#


    # cd to bdump


    function bdump {


    echo $ORACLE_HOME | grep 11 >/dev/null


    if [ $? -eq 0 ]; then


    lower_sid=$(echo $ORACLE_SID | tr ''[:upper:]'' ''[:lower:]'')


    cd $ORACLE_BASE/diag/rdbms/$lower_sid/$ORACLE_SID/trace


    else


    cd $ORACLE_BASE/admin/$ORACLE_SID/bdump


    fi


    } # bdump


    #-----------------------------------------------------------#


    When the prior function is placed within a startup file (like .bashrc), you''ll
    be able to immediately navigate to the directory that contains the alert.log and
    trace files, like so: $ bdump


    $ pwd


    /ora01/app/oracle/diag/rdbms/o11r2/O11R2/trace


    If you inherit environments that were setup by other DBAs, then you''ve probably
    noticed that the alert.log and trace files are sometimes located in non-standard
    locations. When looking for old trace files, I start by attempting to find the
    alert.log. Usually, there are associated trace files in the same 597


    CHAPTER 22 ■ DATABASE TROUBLESHOOTING


    directory as the alert.log file. Since the alert.log file has a specific and well-known
    name (alert_<SID>.log), it''s usually easier to first find the it and then look
    for associated trace files.


    For Oracle Database 11 *g* and higher, there’s a text version of the alert.log
    in the following standard directory and name:


    <ADR base>/diag/rdbms/<DB_UNIQUE_NAME>/<SID>/trace/alert_<SID>.log The ADR base
    location is defined by DIAGNOSTIC_DEST database initialization parameter. If you
    haven''t set DIAGNOSTIC_DEST, then Oracle derives the value from the ORACLE_BASE
    operating system environment variable. If the operating system ORACLE_BASE variable
    is not set, then DIAGNOSTIC_DEST is set to the value of ORACLE_HOME/log (where
    ORACLE_HOME is an operating system variable that is almost universally set).


    For Oracle Database 10 *g*, the standard location for the alert.log is defined
    to be:


    <ORACLE_BASE>/admin/<SID>/bdump


    For Oracle Database 10 *g*, the prior path is usually the same value as what the
    BACKGROUND_DUMP_DEST


    database initialization parameter is customarily set to. Typical values for the
    ORACLE_BASE operating system variable are /ora01/app/oracle or /u01/app/oracle.
    For example, here''s an entry in the init.ora for the DEVDB database for the BACKGROUND_DUMP_DEST
    initialization variable: background_dump_dest=/ora01/app/oracle/admin/DEVDB/bdump


    However, nothing prevents an inexperienced DBA from setting parameters like BACKGROUND_DUMP_DEST
    to completely non-standard locations. For example, here''s a setting from a database
    I was recently asked to maintain:


    background_dump_dest=/oralogs08/dba/admin/bdump


    Why would a DBA set a parameter like that to such a non-standard location? It
    really doesn''t matter.


    You just have to be aware that DBAs sometimes enable features in ways that make
    maintenance much more difficult.


    Regardless, if you can connect to your database through SQL*Plus, it''s trivial
    to determine the location of even the most non-standard locations for the alert.log.
    This will correctly show the location of the alert.log for any version of the
    Oracle database:


    SQL> show parameter background_dump_dest


    How do you determine the location of the alert.log and trace files when the database
    won''t start and the file has been placed in a non-standard (and not obvious)
    directory? In these situations, use the find command to locate the alert.log file.
    First, change directories to ORACLE_BASE: $ cd $ORACLE_BASE


    Next, use the find command to attempt to locate the file:


    $ find . -name "alert*.log"


    If you don''t have ORACLE_BASE defined or the alert.log isn''t in a somewhat standard
    location, then the prior command may not find any files. In this situation, perform
    a more system-wide global search.


    Navigate to the root directory of the box and then issue the find command: $ cd
    /


    $ find . -name "alert*.log" 2>/dev/null'
