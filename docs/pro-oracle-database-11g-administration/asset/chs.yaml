  ## 升级 Oracle 软件


  您也可以使用静默安装方法来升级 Oracle 软件的版本。例如，让我们看看如何从 Oracle Database 10 *g* 10.2.0.1 升级到版本 10.2.0.4。


  ■ **注意** 升级 Oracle 软件与升级 Oracle 数据库不同。本节仅涉及使用静默安装方法升级 Oracle 软件。升级数据库涉及额外的步骤。有关如何将数据库从一个版本升级到另一个版本的文档，请参阅
  MOS 注释 730365.1。


  首先，从 MOS 网站 `http://support.oracle.com` 下载升级版本（您需要有效的支持合同才能执行此操作）。对于本示例的 Solaris
  系统，文件名为 `p6810189_10204_Solaris-64.zip`。将该文件复制到您要执行 Oracle 升级的数据库服务器。将其放置在诸如 `/orahome/orainst/10.2.0.4`
  的目录中。现在，解压该文件：


  ```

  $ unzip p6810189_10204_Solaris-64.zip

  ```


  `unzip` 命令应该只需要几分钟就能解包文件。完成后，找到与此升级关联的示例响应文件：


  ```

  $ find . -name "*.rsp"

  ```


  本示例的响应文件位置如下：


  ```

  ./Disk1/response/patchset.rsp

  ```


  切换到 `Disk1` 目录：


  ```

  $ cd Disk1

  ```


  接下来，将响应文件从 response 目录复制到当前工作目录：


  ```

  $ cp response/patchset.rsp inst.rsp

  ```


  使用操作系统编辑器工具（如 `vi`）打开响应文件：


  ```

  $ vi inst.rsp

  ```


  修改参数以匹配您的环境。对于此次特定的 Oracle Database 10 *g* 10.2.0.4 升级，以下是最值得注意的需要修改的参数：


  ```

  UNIX_GROUP_NAME=dba

  ```



  `FROM_LOCATION=/ora01/orainst/10.2.0.4/Disk1/stage/products.xml`


  `ORACLE_HOME=/ora01/app/oracle/product/10.2.0.4/db_1`


  `ORACLE_HOME_NAME=OHOME10`


  在上面的列表中，`ORACLE_HOME` 和 `ORACLE_HOME_NAME` 变量的值必须与您要升级的那套二进制文件相匹配。如果您正在升级现有的 Oracle
  安装，请确保没有任何使用您要升级的二进制文件的数据库正在运行。


  现在，按如下所示在静默模式下运行 `runInstaller` 实用程序：


  `$ ./runInstaller -ignoreSysPrereqs -force -silent -responseFile /orahome/orainst/10.2.0.4/Disk1/inst.rsp`


  执行升级时，有两种基本场景。以下是场景 A：关闭所有使用待升级 Oracle 主目录的数据库。


  升级 Oracle 主目录二进制文件。


  启动数据库，并运行任何必需的升级脚本。


  以下是采用场景 B 方法进行升级的步骤：


  保持现有的 Oracle 主目录原样——不对其进行升级。


  安装一个与旧 Oracle 主目录版本相同的新 Oracle 主目录。


  将新的 Oracle 主目录升级到所需版本。


  准备就绪后，关闭使用旧 Oracle 主目录的数据库，设置操作系统变量以指向新的已升级 Oracle 主目录，启动数据库，并运行任何必需的升级脚本。


  上述两种场景中，哪一种更好？场景 B 的优势在于保持旧的 Oracle 主目录不变；因此，如果您因任何原因需要切换回旧的 Oracle 主目录，那些二进制文件仍然可用。场景
  B 的劣势在于需要额外的磁盘空间来容纳两套 Oracle 主目录安装。这通常不是问题，因为在升级完成后，您可以在方便时删除旧的 Oracle 主目录。


  ## 安装失败后重新安装


  您可能会遇到这样的情况：您正在尝试安装 Oracle，但由于某种原因安装失败。您纠正了问题并尝试重新运行 Oracle 安装程序。然而，您收到了这条消息：


  `Check complete: Failed <<<<`


  `Problem: Oracle Database 10g Release 2 can only be installed in a new Oracle Home
  Recommendation: Choose a new Oracle Home for installing this product.`


  '
- '# 第一章 ■ 安装 Oracle 二进制文件


  在这种情况下，Oracle 认为软件已经安装，原因有几个：响应文件中指定了 `ORACLE_HOME` 目录中的文件。


  您 `oraInventory/ContentsXML/inventory.xml` 文件中的现有 Oracle 主目录和位置与您在响应文件中指定的相匹配。


  Oracle 不允许您将一套新的二进制文件安装到现有的 Oracle 主目录之上。如果您确定不需要 `ORACLE_HOME` 目录中的任何文件，您可以删除它们（务必非常小心——确保您绝对想要这样做）。此示例导航到
  `ORACLE_HOME`，然后删除 `dev_1` 目录及其内容：


  ```

  $ cd $ORACLE_HOME

  $ cd ..

  $ rm -rf dev_1

  ```


  此外，即使 `ORACLE_HOME` 目录中没有文件，安装程序也会检查 `inventory.xml` 文件以查找以前的 Oracle 主目录名称和位置。在
  `inventory.xml` 文件中，您必须删除与您尝试安装到的 Oracle 主目录位置相对应的条目。


  要删除该条目，首先定位您的 `oraInst.loc` 文件，该文件包含您的 `oraInventory` 的目录。导航到 `oraInventory/ContentsXML`
  目录。在修改 `inventory.xml` 之前先制作一个副本：


  `$ cp inventory.xml inventory.xml.old`


  使用操作系统实用程序（例如 `vi`）编辑 `inventory.xml` 文件，并删除包含您先前失败安装的 Oracle 主目录信息的行。现在，您可以尝试再次执行
  `runInstaller` 实用程序。


