- "# 显示最耗内存的进程\n\n```bash\nalias topm=\"ps -e -o pmem,pid,user,tty,args | sort -n\
  \ -k 1 -r | head\"\n```\n\n```bash\nalias sqlp='sqlplus \"/ as sysdba\"'\nalias\
  \ shutdb='echo \"shutdown immediate;\" | sqlp'\nalias startdb='echo \"startup;\"\
  \ | sqlp'\n```\n\n## `dba_fcns`\n\n使用此脚本来存储有助于您在数据库环境中导航和操作的操作系统函数。函数通常比别名具有更多的功能。您可以根据需要使用的函数数量和复杂性发挥相当的创造力。关键在于，无论您登录到哪个数据库服务器，都希望有一套一致且标准的函数可供调用。\n\
  \n例如，您可能经常需要导航到数据库警报日志所在的目录。\n\n如果您在包含多个 Oracle 版本的环境中工作，警报日志的位置会因数据库版本而异。下一个脚本中包含一个函数，用于确定您是否处于\
  \ Oracle Database 11g 环境中（或不是），并导航到警报日志的适当位置。您可以通过手动运行脚本来建立这些函数，像这样：`$ . dba_fcns`\n\
  \n现在您就有了一个名为 `bdump` 的函数可以执行：\n\n```bash\n$ bdump\n```\n\n对于这个环境，该函数将我的目录更改为：\n\n\
  ```\n/oracle/app/oracle/diag/rdbms/o11r2/O11R2/trace\n```\n\n将此脚本放置在 `HOME/bin`\
  \ 这样的目录中。通常，您会通过启动脚本（将在后面的“组织脚本”部分介绍）在登录服务器时自动调用此脚本。以下是一些您可以使用的典型函数：\n\n## 第三章 ■\
  \ 配置高效环境\n\n```bash\n#-----------------------------------------------------------#\n\
  # 以排序列表显示环境变量\nfunction envs {\n  if test -z \"$1\"\n  then /bin/env | /bin/sort\n\
  \  else /bin/env | /bin/sort | /bin/grep -i $1\n  fi\n} # envs\n\n#-----------------------------------------------------------#\n\
  # 登录到 sqlplus\nfunction sp {\n  time sqlplus \"/ as sysdba\"\n} # sp\n\n#-----------------------------------------------------------#\n\
  # 查找当前目录下最大的文件\nfunction flf {\n  find . -ls | sort -nrk7 | head -10\n}\n\n#-----------------------------------------------------------#\n\
  # 查找当前目录下占用空间最大的目录\nfunction fld {\n  du -S . | sort -nr | head -10\n}\n\n#-----------------------------------------------------------#\n\
  # cd 到 bdump 目录\nfunction bdump {\n  echo $ORACLE_HOME | grep 11 >/dev/null\n  if\
  \ [ $? -eq 0 ]; then\n    lower_sid=$(echo $ORACLE_SID | tr '[:upper:]' '[:lower:]')\n\
  \    cd $ORACLE_BASE/diag/rdbms/$lower_sid/$ORACLE_SID/trace\n  else\n    cd $ORACLE_BASE/admin/$ORACLE_SID/bdash\n\
  \  fi\n} # bdump\n\n#-----------------------------------------------------------#\n\
  # 查看警报日志\nfunction valert {\n  echo $ORACLE_HOME | grep 11 >/dev/null\n  if [ $?\
  \ -eq 0 ]; then\n    lower_sid=$(echo $ORACLE_SID | tr '[:upper:]' '[:lower:]')\n\
  \    view $ORACLE_BASE/diag/rdbms/$lower_sid/$ORACLE_SID/trace/alert_$ORACLE_SID.log\n\
  \  else\n    view $ORACLE_BASE/admin/$ORACLE_SID/bdash/alert_$ORACLE_SID.log\n \
  \ fi\n} # valert\n\n#-----------------------------------------------------------#\n\
  ```\n\n## `tbsp_chk.bsh`\n\n此脚本用于检查是否有任何表空间超过了特定的已满阈值。将此脚本存储在 `HOME/bin` 这样的目录中。请确保修改脚本，使其包含适用于您环境的用户名、密码和电子邮件地址。\n\
  \n## 第三章 ■ 配置高效环境\n\n您还需要建立所需的操作系统变量，如 `ORACLE_SID` 和 `ORACLE_HOME`。您可以将这些变量硬编码到脚本中，也可以调用一个为您设置这些变量的脚本。下一个脚本调用了一个名为\
  \ `oraset` 的脚本来建立操作系统变量。有关此脚本的详细信息请参见第二章。您不必使用此脚本——关键在于为您的环境建立一种一致且可重复的方式来设置操作系统变量。\n\
  \n您可以从命令行运行此脚本。例如，我传入了数据库名称 (`O11R2`)，并希望查看哪些表空间剩余空间不足 20%：\n\n```bash\n$ tbsp_chk.bsh\
  \ O11R2 20\n```\n\n输出表明此数据库的两个表空间剩余空间不足 20%：\n\n```\nspace not okay\n0 % free UNDOTBS1,\
  \ 17 % free SYSAUX,\n```\n\n以下是 `tbsp_chk.bsh` 脚本的内容：\n\n```bash\n#!/bin/bash\n\
  #\nif [ $# -ne 2 ]; then\n  echo \"Usage: $0 SID threshold\"\n  exit 1\nfi\n# 可以硬编码操作系统变量，或者从脚本中\
  \ source 它们。\n# 有关 oraset 脚本的详细信息请参见第 2 章\n# source oracle 操作系统变量\n. /var/opt/oracle/oraset\
  \ $1\n#\ncrit_var=$(\nsqlplus -s <<EOF\nsystem/foo\nSET HEAD OFF TERM OFF FEED OFF\
  \ VERIFY OFF\nCOL pct_free FORMAT 999\nSELECT (f.bytes/a.bytes)*100 pct_free,'%\
  \ free',a.tablespace_name||','\nFROM\n  (SELECT NVL(SUM(bytes),0) bytes, x.tablespace_name\n\
  \   FROM dba_free_space y, dba_tablespaces x\n   WHERE x.tablespace_name = y.tablespace_name(+)\n\
  \     AND x.contents != 'TEMPORARY' AND x.status != 'READ ONLY'\n     AND x.tablespace_name\
  \ NOT LIKE 'UNDO%'\n   GROUP BY x.tablespace_name) f,\n  (SELECT SUM(bytes) bytes,\
  \ tablespace_name\n   FROM dba_data_files\n   GROUP BY tablespace_name) a\nWHERE\
  \ a.tablespace_name = f.tablespace_name\n  AND (f.bytes/a.bytes)*100 <= $2\nORDER\
  \ BY 1;\nEXIT;\nEOF)\n\nif [ \"$crit_var\" = \"\" ]; then\n  echo \"space okay\"\
  \nelse\n  echo \"space not okay\"\n  echo $crit_var\n  echo $crit_var | mailx -s\
  \ \"tbsp getting full on $1\" dkuhn@gmail.com\nfi\nexit 0\n```\n\n## 第三章 ■ 配置高效环境\n\
  \n通常，您会从 `cron` 这样的调度工具中定期自动运行此类脚本。以下是一个典型的 `cron` 条目，每小时运行一次该脚本：\n\n```bash\n#\
  \ 表空间检查\n2 * * * * /orahome/bin/tbsp_chk.bsh INVPRD 10 1>/orahome/bin/log/tbsp_chk.log\
  \ 2>&1\n```\n\n此 `cron` 条目运行作业并将任何信息输出存储在 `tbsp_chk.log` 文件中。\n\n## `conn.bsh`\n\
  \n如果数据库连接出现问题，您需要收到警报。此脚本检查是否可以建立与数据库的连接。如果无法建立连接，则会发送一封电子邮件。\n\n将此脚本放置在 `HOME/bin`\
  \ 这样的目录中。请确保修改脚本，使其包含适用于您环境的用户名、密码和电子邮件地址。\n\n您还需要建立所需的操作系统变量，如 `ORACLE_SID` 和 `ORACLE_HOME`。您可以将这些变量硬编码到脚本中，也可以调用一个为您设置这些变量的脚本。与上一个脚本类似，此脚本调用了一个名为\
  \ `oraset` 的脚本来建立操作系统变量。（参见第 2 章。）\n\n该脚本需要将 `ORACLE_SID` 传递给它。例如：\n\n```bash\n\
  $ conn.bsh INVPRD\n```\n\n如果脚本能够建立与数据库的连接，则显示以下消息：\n\n```\nsuccess\ndb ok\n```\n\
  \n以下是 `conn.bsh` 脚本的内容：\n\n```bash\n#!/bin/bash\nif [ $# -ne 1 ]; then\n  echo \"\
  Usage: $0 SID\"\n  exit 1\nfi\n# 可以硬编码操作系统变量，或者从脚本中 source 它们。\n# 有关 oraset 脚本的详细信息请参见第\
  \ 2 章\n# source oracle 操作系统变量\n. /var/opt/oracle/oraset $1\n#\necho \"select 'success'\
  \ from dual;\" | sqlplus -s darl/foo@INVPRD | grep success\nif [[ $? -ne 0 ]]; then\n\
  \  echo \"problem with $1\" | mailx -s \"db problem\" dkuhn@sun.com\nelse\n  echo\
  \ \"db ok\"\nfi\n#\nexit 0\n```\n\n此脚本通常通过 `cron` 这样的工具实现自动化。以下是一个典型的 `cron` 条目：\n\
  \n\n"
