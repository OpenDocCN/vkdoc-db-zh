  ## 应用补丁


  请仔细阅读 `README.txt` 文件以获取特别说明。


  关闭所有使用要应用补丁的 Oracle 主目录的数据库和进程。


  应用补丁。


  验证补丁是否已成功安装。


  下面的一个简要示例将说明应用补丁的过程。在此示例中，使用补丁号 `7695070` 来修复 Solaris 机器上 `10.2.0.4` 数据库的时区格式问题。首先，从
  MOS (https://support.oracle.com) 下载 `p7695070_10204_Solaris-64.zip` 文件。接着，在要应用补丁的服务器上解压该文件：


  ```bash

  $ unzip p7695070_10204_Solaris-64.zip

  ```


  `README.txt` 指示你按如下方式更改目录：


  ```bash

  $ cd 7695070

  ```


  请确保遵循 `README.txt` 中包含的说明，例如关闭所有使用要应用补丁的 Oracle 主目录的数据库：


  ```bash

  $ sqlplus / as sysdba


  SQL> shutdown immediate;

  ```


  接下来，应用补丁。确保以 Oracle 软件所有者（通常是 `oracle` 操作系统账户）的身份执行此步骤。同时确保你的 `ORACLE_HOME` 变量已设置为指向你要应用补丁的
  Oracle 主目录。在此示例中，由于 `opatch` 实用程序不在 `PATH` 目录包含的路径中，你需要指定完整路径：


  ```bash

  $ $ORACLE_HOME/OPatch/opatch apply

