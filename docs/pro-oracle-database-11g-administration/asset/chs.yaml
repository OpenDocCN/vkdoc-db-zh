  \ `ORACLE_HOME` 变量中的目录。这可以防止您错误地运行来自错误版本的 `ORACLE_HOME` 的脚本。 |\n\n请注意，此步骤中使用的 `CREATE\
  \ DATABASE` 语句在目录结构方面与 OFA 标准略有偏差。我倾向于不将 Oracle 数据文件、联机重做日志和控制文件放在 `ORACLE_BASE`\
  \ 下（如 OFA 标准所指定）。我改为直接将文件放在名为 `/<mount_point>/<file_type>/<database_name>` 的目录下，因为路径名短得多。较短的路径名使命令行导航到目录更容易，并且名称在\
  \ SQL `SELECT` 语句的输出中更清晰。**图 2–1** 显示了这种与 OFA 标准的偏差。\n\n![图 2–1。目录结构偏差](img/index-70_1.png)\n\
  \n在创建数据字典之前，我喜欢假脱机一个输出文件，以便在发生意外错误时进行检查：\n\n```sql\nSQL> spool create_dd.lis\n```\n\
  \n现在，创建数据字典：\n\n```sql\nSQL> @?/rdbms/admin/catalog.sql\nSQL> @?/rdbms/admin/catproc.sql\n\
  ```\n\n成功创建数据字典后，作为 `SYSTEM` 模式，创建产品用户配置文件表：\n\n```sql\nSQL> connect system/<password>\n\
  SQL> @?/sqlplus/admin/pupbld\n```\n\n这些表允许 `SQL*Plus` 按用户禁用命令。如果未运行 `pupbld.sql`\
  \ 脚本，则所有非 `sys` 用户在登录 `SQL*Plus` 时都会看到以下警告：\n\n```\nError accessing PRODUCT_USER_PROFILE\n\
  Warning: Product user profile information not loaded!\nYou may need to run PUPBLD.SQL\
  \ as SYSTEM\n```\n\n可以忽略这些错误。如果您不想在登录 `SQL*Plus` 时看到它们，请确保运行 `pupbld.sql` 脚本。\n\n\
  此时，您应该拥有一个功能齐全的数据库。接下来，您需要配置并实现您的侦听器以启用远程连接，并可选地设置密码文件。这些任务将在接下来的两个部分中描述。\n\n##\
  \ 配置和实现侦听器\n\n安装了二进制文件并创建了数据库后，您需要使数据库可供远程客户端连接。您通过配置并启动 Oracle 侦听器来实现这一点。顾名思义，*侦听器*\
  \ 是侦听来自远程客户端的连接请求的进程。如果您没有在数据库服务器上启动侦听器，则无法从远程客户端连接。\n\n在设置新环境时，配置侦听器是一个两步过程：\n\
  1.  配置 `listener.ora` 文件。\n2.  启动侦听器。\n\n`listener.ora` 文件默认位于 `ORACLE_HOME/network/admin`\
  \ 目录中。这与 `TNS_ADMIN` 操作系统变量应设置的目录相同。以下是一个示例 `listener.ora` 文件，其中包含一个数据库的网络配置信息：\n\
  \n```\nLISTENER =\n(DESCRIPTION_LIST =\n(DESCRIPTION =\n(ADDRESS_LIST =\n(ADDRESS\
  \ = (PROTOCOL = TCP)(HOST = ora03)(PORT = 1521))\n)\n)\n)\nSID_LIST_LISTENER =\n\
  (SID_LIST =\n(SID_DESC =\n(GLOBAL_DBNAME = O11R2)\n(ORACLE_HOME = /oracle/app/oracle/product/11.2.0/db_1)\n\
  (SID_NAME = O11R2)\n)\n)\n```\n\n此代码清单有两个部分。第一部分定义了侦听器名称和服务；在此示例中，侦听器名称为 `LISTENER`。第二部分定义了侦听器正在侦听传入连接（到数据库）的\
  \ SID 列表。SID 列表名称的格式为 `SID_LIST_<侦听器名称>`。侦听器名称必须出现在 SID 列表名称中。此示例中的 SID 列表名称是 `SID_LIST_LISTENER`。\n\
  \n在 `listener.ora` 文件就位后，您可以使用 `lsnrctl` 实用程序启动侦听器后台进程：\n\n```bash\n$ lsnrctl start\n\
  ```\n\n您应该看到如下信息性消息：\n\n```\nListener Parameter File   /oracle/app/oracle/product/11.2.0/db_1/network/admin/listener.ora\n\
  Listener Log File         /oracle/app/oracle/diag/tnslsnr/ora03/listener/alert/log.xml\n\
  Listening Endpoints Summary...\n  (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=ora03.regis.local)(PORT=1521)))\n\
  Services Summary...\nService \"O11R2\" has 1 instance(s).\n  Instance \"O11R2\"\
  , status UNKNOWN, has 1 handler(s) for this service...\n```\n\n侦听器启动后，您可以从 `SQL*Plus`\
  \ 客户端测试远程连接，如下所示：\n\n```bash\n$ sqlplus user/pass@'server:port/db_name'\n```\n\n\
  在下一行代码中，用户和密码是 `system/manager`，连接到 `ora03` 服务器，端口 `1521`，数据库名为 `O11R2`：\n\n```bash\n\
  $ sqlplus system/manager@'ora03:1521/O11R2'\n```\n\n此示例演示了所谓的*轻松连接*命名方法来连接到数据库。它*简单*是因为它不依赖于任何设置文件或实用程序。您唯一需要知道的信息是用户名、密码、服务器、端口和\
  \ `SID`。\n\n另一种常见的连接方法是*本地命名*。此方法依赖于 `TNS_ADMIN/tnsnames.ora` 文件中的连接信息。在此示例中，编辑了\
  \ `tnsnames.ora` 文件并添加了以下透明网络底板（TNS，Oracle 的网络架构）条目：\n\n```\nO11R2 =\n(DESCRIPTION\
  \ =\n(ADDRESS = (PROTOCOL = TCP)(HOST = ora03)(PORT = 1521))\n(CONNECT_DATA = (SERVICE_NAME\
  \ = O11R2)))\n```\n\n现在，从操作系统命令行，您通过引用放置在 `tnsnames.ora` 文件中的 `O11R2` TNS 信息来建立连接：\n\
  \n```bash\n$ sqlplus system/manager@O11R2\n```\n\n此连接方法是*本地*的，因为它依赖于本地客户端的 `tnsnames.ora`\
  \ 副本来确定 Oracle Net 连接详细信息。默认情况下，`SQL*Plus` 检查由操作系统变量 `TNS_ADMIN` 定义的目录中名为 `tnsnames.ora`\
  \ 的文件。如果 `tnsnames.ora` 文件包含 `SQL*Plus` 连接字符串中指定的别名（在此示例中为 `O11R2`），则连接详细信息将从 `tnsnames.ora`\
  \ 文件中的条目确定。\n\nOracle 使用的其他连接命名方法是*外部命名*和*目录命名*。有关更多详细信息，请参阅《Oracle Net Services\
  \ Administrator’s Guide》（可在 Oracle 的 OTN 网站上找到）。\n\n## 创建密码文件\n\n创建密码文件是可选的。有一些充分的理由要求使用密码文件：\n\
  \n*   您希望将非 `sys` 用户分配为具有 `sysdba` 或 `sysoper` 权限。\n*   您希望通过 Oracle Net 以 `sysdba`\
  \ 或 `sysoper` 权限远程连接到数据库。\n*   Oracle 功能或实用程序要求使用密码文件。\n\n执行以下步骤来实现密码文件：\n1.  使用\
  \ `orapwd` 实用程序创建密码文件。\n2.  将初始化参数 `REMOTE_LOGIN_PASSWORDFILE` 设置为 `EXCLUSIVE`。\n\
  \n在 Linux/Unix 环境中，使用 `orapwd` 实用程序创建密码文件，如下所示：\n\n```bash\n$ cd $ORACLE_HOME/dbs\n\
  $ orapwd file=orapw<ORACLE_SID> password=<sys password>\n```\n\n在 Linux/Unix 环境中，密码文件通常存储在\
  \ `ORACLE_HOME/dbs` 中；在 Windows 中，它通常放在 `ORACLE_HOME\\database` 目录中。\n\n您在上一个命令中指定的文件名格式可能因操作系统而异。例如，在\
  \ Windows 上，格式是 `PWD<ORACLE_SID>.ora`。以下显示了 Windows 环境中的语法：\n\n```bash\nc:\\> cd\
  \ %ORACLE_HOME%\\database\nc:\\> orapwd file=PWD<ORACLE_SID>.ora password=<sys password>\n\
  ```\n\n要启用密码文件的使用，请将初始化参数 `REMOTE_LOGIN_PASSWORDFILE` 设置为 `EXCLUSIVE`。将此值设置为 `EXCLUSIVE`\
  \ 指示 Oracle 只允许一个实例连接到数据库，并且还指定密码文件可以包含除 `sys` 之外的模式。**表 2–3** 详细说明了 `REMOTE_LOGIN_PASSWORDFILE`\
  \ 可能值的含义。\n\n**表 2–3. remote_login_passwordfile 的值**\n| **值** | **含义** |\n| :---\
  \ | :--- |\n| `EXCLUSIVE` | 一个实例可以连接到数据库。密码文件中可以包含 `sys` 以外的用户。 |\n| `SHARED` |\
  \ 多个数据库可以共享一个密码文件。`sys` 是唯一允许在密码文件中的用户。当值设置为 `SHARED` 时，如果您尝试向用户授予 `sysdba` 权限，Oracle\
  \ 会返回 `ORA-01999`。 |\n| `NONE` | Oracle 忽略密码文件。只有本地特权账户才能以 `sysdba` 身份连接。 |\n\n\
  您可以通过 `GRANT SYSDBA` 语句将用户添加到密码文件。以下示例授予 `sysdba` 权限并将用户 `heera` 添加到密码文件：\n\n```sql\n\
  SQL> grant sysdba to heera;\nGrant succeeded.\n```\n\n启用密码文件还允许您通过 Oracle Net 连接以\
  \ `sysdba` 权限远程连接到您的数据库：\n\n```bash\n$ sqlplus <username>/<password>@<database connection\
  \ string> as sysdba\n```\n\n这使您可以执行需要物理登录到数据库服务器的远程维护操作。\n\n> **提示**：您可以查询 `V$PWFILE_USERS`\
  \ 视图以显示被授予 `sysdba` 和 `sysoper` 权限的用户。\n\n特权用户的概念对于 RMAN 备份和恢复也很重要。与 `SQL*Plus`\
  \ 一样，RMAN 使用操作系统认证和密码文件来允许特权用户连接到数据库。只有特权账户才被允许备份、恢复和恢复数据库。\n\n## 启动和停止数据库\n\n在启动和停止\
  \ Oracle 实例之前，必须设置正确的操作系统变量（本章前面已介绍）。您还需要访问特权操作系统账户或特权数据库用户账户。以特权用户身份连接允许您执行管理任务，例如启动、停止和创建数据库。您可以使用操作系统认证或密码文件以特权用户身份连接到数据库。\n\
  \n### 理解认证\n\n*操作系统认证* 意味着如果您可以登录到授权的操作系统账户，则无需额外密码即可连接到您的数据库。操作系统认证通过向操作系统账户分配特殊权限来管理。\n\
  \n当您在 Linux/Unix 环境中安装 Oracle 二进制文件时，需要在安装时指定被分配 `sysdba` 和 `sysoper` 数据库权限的操作系统组的名称（通常命名为\
  \ `dba` 和 `oper`）。在 Windows 环境中，会自动创建一个操作系统组（通常名为 `ora_dba`）并分配给安装 Oracle 软件的操作系统用户。\n\
  \n`sysdba` 和 `sysoper` 权限允许您执行管理任务，例如启动和停止数据库。如 **表 2–4** 所示，`sysoper` 权限包含 `sysdba`\
  \ 权限的子集。\n\n**表 2–4. sysdba 和 sysoper 的权限**\n| **系统权限** | **授权操作** |\n| :--- | :---\
  \ |\n| `sysdba`（`sys` 模式的所有权限） | 启动和关闭，更改数据库，创建和删除数据库，切换归档日志模式，恢复数据库 |\n| `sysoper`\
  \ | 启动和关闭，更改数据库，切换归档日志模式，恢复数据库 |\n\n任何分配给授权操作系统组的操作系统账户都可以无密码连接到数据库并执行管理操作。在 Linux/Unix\
  \ 中，通常创建一个 `oracle` 操作系统账户并将其主组分配为 `dba`。以下是使用 Linux/Unix `id` 命令显示用户和组 ID 信息，然后使用操作系统认证连接到数据库的示例：\n\
  \n```bash\n$ id\nuuid=100(oracle) gid=101(dba)\n$ sqlplus / as sysdba\n```\n\n在\
  \ Windows 环境中，您可以按如下方式验证哪些操作系统用户属于 `ora_dba` 组：选择“开始”->“控制面板”->“管理工具”->“计算机管理”->“本地用户和组”->“组”。您应该会看到一个名为\
  \ `ora_dba` 的组。您可以单击该组并查看分配给它的操作系统用户。\n\n此外，要在 Windows 环境中使操作系统认证正常工作，您的 `sqlnet.ora`\
  \ 文件中必须包含以下条目：\n\n```\nSQLNET.AUTHENTICATION_SERVICES=(NTS)\n```\n\n`sqlnet.ora`\
  \ 文件位于 `ORACLE_HOME/network/admin` 目录中。\n\n### 启动数据库\n\n启动和停止数据库是您经常执行的任务。要启动/停止数据库，请使用\
  \ `sysdba` 或 `sysoper` 特权用户账户连接，并发出 `startup` 和 `shutdown` 语句。以下示例使用操作系统认证连接到数据库：\n\
  \n```bash\n$ sqlplus / as sysdba\n```\n\n以特权账户连接后，您可以按如下方式启动数据库：\n\n```sql\nSQL>\
  \ startup;\n```\n\n> **注意**：快速连续停止和重新启动数据库在 DBA 领域俗称“弹跳”您的数据库。\n\n但是，如果参数文件（`pfile`\
  \ 或 `spfile`）不在 Linux/Unix 的 `ORACLE_HOME/dbs` 中或 Windows 的 `ORACLE_HOME\\database`\
  \ 中，则必须包含 `pfile` 子句来引用 `init.ora` 文件，如下所示：\n\n```sql\nSQL> startup pfile=C:\\temp\\\
  initORCL.ora\n```\n\n您应该会看到来自 Oracle 的消息，指示系统全局区（SGA）已分配。数据库被装载然后打开：\n\n```\nORACLE\
  \ instance started.\nTotal System Global Area  289406976 bytes\nFixed Size     \
  \             11235813 bytes\nVariable Size              31415926 bytes\nDatabase\
  \ Buffers          192937984 bytes\nRedo Buffers                1235711 bytes\n\
  Database mounted.\nDatabase opened.\n```\n\n从前面的输出来看，数据库启动操作在打开 Oracle 数据库时经历了三个不同的阶段：\n\
  1.  启动实例\n2.  装载数据库\n3.  打开数据库\n\n在启动数据库时，您可以逐步完成这些阶段。首先，启动 Oracle 实例（后台进程和内存结构）：\n\
  \n```sql\nSQL> startup nomount;\n```\n\n接下来，装载数据库。此时，Oracle 读取控制文件：\n\n```sql\n\
  SQL> alter database mount;\n```\n\n最后，打开数据文件和联机重做日志文件：\n\n```sql\nSQL> alter database\
  \ open;\n```\n\n在大多数情况下，您发出不带参数的 `STARTUP` 语句来启动数据库。**表 2–5** 描述了可与数据库 `STARTUP`\
  \ 语句一起使用的参数的含义。\n\n**表 2–5. startup 命令可用的参数**\n| **参数** | **含义** |\n| :--- | :---\
  \ |\n| `FORCE` | 在重新启动之前以 `ABORT` 方式关闭实例。对于故障排除启动问题很有用。通常不使用。 |\n| `RESTRICT` |\
  \ 仅允许具有 `RESTRICTED SESSION` 权限的用户连接到数据库。 |\n| `PFILE` | 指定启动实例时要使用的客户端参数文件。 |\n\
  | `QUIET` | 在启动实例时抑制显示 SGA 信息。 |\n| `NOMOUNT` | 启动后台进程并分配内存。不读取控制文件。 |\n| `MOUNT`\
  \ | 启动后台进程，分配内存，并读取控制文件。 |\n| `OPEN` | 启动后台进程，分配内存，读取控制文件，并打开联机重做日志和数据文件。 |\n| `OPEN\
  \ RECOVER` | 在打开数据库之前尝试介质恢复。 |\n| `OPEN READ ONLY` | 以只读模式打开数据库。 |\n| `UPGRADE`\
  \ | 在升级数据库时使用。 |\n| `DOWNGRADE` | 在降级数据库时使用。 |\n\n### 停止数据库\n\n通常，您使用 `SHUTDOWN\
  \ IMMEDIATE` 语句来停止数据库。`IMMEDIATE` 参数指示 Oracle 停止数据库活动并回滚任何打开的事务：\n\n```sql\nSQL>\
  \ shutdown immediate;\nDatabase closed.\nDatabase dismounted.\nORACLE instance shut\
  \ down.\n```\n\n有关 `SHUTDOWN` 语句可用参数的详细定义，请参阅 **表 2–6**。\n\n在大多数情况下，`SHUTDOWN IMMEDIATE`\
  \ 是关闭数据库的可接受方法。如果您发出 `SHUTDOWN` 命令而不带参数，则相当于发出 `SHUTDOWN NORMAL`。\n\n**表 2–6. SHUTDOWN\
  \ 命令可用的参数**\n| **参数** | **含义** |\n| :--- | :--- |\n| `NORMAL` | 等待用户退出活动会话后再关闭。\
  \ |\n| `TRANSACTIONAL` | 等待事务完成，然后终止会话。 |\n| `TRANSACTIONAL LOCAL` | 仅对本地实例执行事务性关闭。\
  \ |\n| `IMMEDIATE` | 立即终止活动会话。打开的事务将被回滚。 |\n| `ABORT` | 立即终止实例。事务被终止且不会回滚。 |\n\n\
  启动和停止数据库是一个相当简单的过程。如果环境设置正确，您应该能够连接到数据库并发出适当的 `STARTUP` 和 `SHUTDOWN` 语句。\n\n> **提示**：如果您在启动或停止数据库时遇到任何问题，请查看警报日志以获取详细信息。警报日志通常包含有关任何问题的相关消息。\n\
  \n您很少需要使用 `SHUTDOWN ABORT` 语句。通常，`SHUTDOWN IMMEDIATE` 就足够了。话虽如此，使用 `SHUTDOWN ABORT`\
  \ 并没有什么错。如果 `SHUTDOWN IMMEDIATE` 因任何原因不起作用，那么请使用 `SHUTDOWN ABORT`。\n\n在极少数情况下，`SHUTDOWN\
  \ ABORT` 语句不起作用。在这些情况下，您可以使用 `ps -ef | grep smon` 来定位 Oracle 系统监视进程，然后使用 Linux/Unix\
  \ `kill` 命令终止实例。当您杀死必需的 Oracle 后台进程时，这会导致实例中止。显然，您应仅在最后 resort 时才使用操作系统 `kill` 命令。\n\
  \n![图 2–2。单服务器与多服务器配置](img/index-79_1.png)\n\n## 使用 DBCA 创建数据库\n\n数据库配置助手（DBCA）是\
  \ Oracle 提供的用于创建、配置和管理数据库的图形工具。除了图形界面外，DBCA 还支持静默模式，允许您从命令行或脚本中创建数据库。\n\n要使用 DBCA\
  \ 在静默模式下创建数据库，请首先创建一个响应文件。Oracle 在 `ORACLE_HOME/assistants/dbca/templates` 目录中提供了一个名为\
  \ `dbca.rsp` 的模板响应文件。复制该文件以便您不修改原始文件（这样您始终拥有一个好的原始文件）：\n\n```bash\n$ cp dbca.rsp\
  \ mydb.rsp\n```\n\n现在，编辑 `mydb.rsp` 文件。您至少需要修改以下参数：`GDBNAME`、`SID`、`SYSPASSWORD`、`SYSTEMPASSWORD`、`SYSMANPASSWORD`、`DBSNMPPASSWORD`、`DATAFILEDESTINATION`、`STORAGETYPE`、`CHARACTERSET`\
  \ 和 `NATIONALCHARACTERSET`。以下显示了 `mydb.rsp` 文件中的修改值示例：\n\n```\n[CREATEDATABASE]\n\
  GDBNAME = \"ORC11G\"\nSID = \"ORC11G\"\nTEMPLATENAME = \"General_Purpose.dbc\"\n\
  SYSPASSWORD = \"foo\"\nSYSTEMPASSWORD = \"foo\"\nSYSMANPASSWORD = \"foo\"\nDBSNMPPASSWORD\
  \ = \"foo\"\nDATAFILEDESTINATION =\"/ora01/ORC11G\"\nSTORAGETYPE=\"FS\"\nCHARACTERSET\
  \ = \"AL32UTF8\"\nNATIONALCHARACTERSET= \"UTF8\"\n```\n\n接下来，使用响应文件以静默模式运行 `dbca`\
  \ 实用程序：\n\n```bash\n$ dbca -silent -responseFile /ora01/orainst/11.2.0.1/database/response/mydb.rsp\n\
  ```\n\n您应该会看到如下输出：\n\n```\nCopying database files\n1% complete\n...\nCreating and\
  \ starting Oracle instance\n...\n62% complete\nCompleting Database Creation\n...\n\
  100% complete\nLook at the log file \"/oracle/app/oracle/cfgtoollogs/dbca/ORC11G/ORC11G.log\"\
  \ for further details.\n```\n\n如果您查看日志文件，请注意 `dbca` 实用程序使用 `rman` 实用程序来恢复数据库使用的数据文件。然后，它创建实例并执行安装后步骤。在\
  \ Linux 服务器上，您还应该在 `/etc/oratab` 文件中为您的新数据库添加一个条目。\n\n许多 DBA 启动 `dbca` 并在 GUI 模式下配置数据库，但有些人会利用响应文件中可用的选项。通过有效利用响应文件，您可以始终如一地自动化数据库创建过程。您可以修改响应文件以在自动存储管理（ASM）上构建数据库，甚至创建\
  \ RAC 数据库。此外，您可以控制响应文件的几乎所有方面，类似于以图形模式启动 `dbca`。\n\n## 删除数据库\n\n如果您有一个不再使用的数据库需要删除，可以使用\
  \ `DROP DATABASE` 语句来完成。这样做会删除与数据库关联的所有数据文件、控制文件和联机重做日志。\n\n> **注意**：显然，在删除数据库时要格外小心。删除数据库时不会提示您，并且在撰写本文时，没有\
  \ `UNDROP ACCIDENTALLY DROPPED DATABASE` 命令。删除数据库时请极其小心，因为此操作会删除数据文件、控制文件和联机重做日志文件。\n\
  \n`DROP DATABASE` 命令在需要删除数据库时非常有用。它可能是一个测试数据库或不再使用的旧数据库。`DROP DATABASE` 命令不会删除旧的归档重做日志文件。您必须使用操作系统命令（例如\
  \ Linux/Unix 中的 `rm` 或 Windows 命令提示符中的 `del`）手动删除这些文件。您也可以指示 RMAN 删除归档重做日志文件。\n\n\
  ## 一台服务器上可以有多少个数据库？\n\n有时，在创建新数据库时，会出现这个问题：一台服务器上应该放多少个数据库？一个极端是在每个数据库服务器上只运行一个数据库。这种架构如**图\
  \ 2–2**所示，显示了两个不同的数据库服务器，每个服务器都有自己安装的 Oracle 二进制文件。这种设置对硬件供应商有利，但在许多环境中不是资源的经济利用。\n\
  \n![图 2–3。共享 Oracle 主目录](img/index-82_1.png)\n![图 2–4。共享二进制文件](img/index-83_1.png)\n\
  \n**表 2–7. Oracle 数据库配置的优缺点**\n| **配置** | **优点** | **缺点** |\n| :--- | :--- | :---\
  \ |\n| 每台服务器一个数据库 | 为使用数据库的应用程序提供专用资源。完全隔离应用程序。 | 最昂贵。需要更多硬件。 |\n| 每台服务器多个数据库和多个\
  \ Oracle 主目录 | 需要更少的服务器。 | 多个数据库竞争磁盘、内存和 CPU 资源。 |\n| 服务器上多个数据库和一个 Oracle 二进制文件安装\
  \ | 需要更少的服务器。不需要多次安装 Oracle 二进制文件。 | 多个数据库竞争磁盘、内存和 CPU 资源。 |\n| 一个数据库和一个 Oracle\
  \ 主目录服务于多个应用程序 | 成本最低。 | 多个数据库竞争磁盘、内存和 CPU 资源。多个应用程序依赖于一个数据库。一个单点故障。 |\n\n## 总结\n\
  \n安装了 Oracle 二进制文件后，您可以创建数据库。在创建数据库之前，请确保已正确设置所需的操作系统变量。您还需要一个初始化文件并需要预先创建任何必要的目录。您应该仔细考虑哪些初始化参数应设置为非默认值。通常，我尝试使用尽可能多的默认值，并且仅在有充分理由时才更改初始化参数。\n\
  \n本章重点介绍了使用 `SQL*Plus` 创建数据库。这是一种高效且可重复的创建数据库的方法。在编写 `CREATE DATABASE` 语句时，请考虑数据文件和联机重做日志的大小。您还应该考虑需要多少组联机重做日志以及每组多少个成员。\n\
  \n我曾在一些环境中工作，管理层规定每台服务器一个数据库的要求。通常这是过度的。具有大内存区域和多个 CPU 的快速服务器应该能够托管几个不同的数据库。在决定在一台服务器上放置多少个数据库时，您必须确定满足您业务需求的架构。\n\
  \n创建数据库后，下一步是配置环境，以便您可以高效地导航、操作和监控数据库。这些任务将在下一章中描述。\n\n---\n\n"
- '# 第三章 配置高效环境


  > **提示**：在数据库服务器上工作时，始终使用一种操作系统 shell。我建议您使用 Bash shell；它包含了来自其他 shell（Korn 和 C）的所有最有用的功能，并且还具有增加其易用性的附加功能。


  ## 自定义操作系统命令提示符


  通常，DBA 与多台服务器和多个数据库一起工作。在这些情况下，您可能在屏幕上打开了许多终端会话。您可以运行以下类型的命令来标识您当前的工作环境：


  ```bash

  $ hostname -a

  $ id

  $ who am i

  $ echo $ORACLE_SID

  $ pwd

  ```


  为了避免混淆您正在使用的服务器，通常希望配置您的命令提示符以显示有关其环境的信息，例如计算机名和数据库 `SID`。在此示例中，命令提示符名称被自定义为包含主机名、用户和
  `Oracle SID`：


  ```bash

  $ PS1=''[\h:\u:${ORACLE_SID}]$ ''

  ```


  `\h` 指定主机名。`\u` 指定当前操作系统用户。`$ORACLE_SID` 包含 `Oracle` 实例标识符的当前设置。以下是此示例中命令提示符现在的样子：


  ```

  [ora03:oracle:devdb1]$

  ```


  命令提示符包含有关环境的三个重要信息：服务器名、操作系统用户名和数据库名称。当您在多个环境之间导航时，设置命令提示符对于跟踪您所在的位置和所处的环境来说是一个非常宝贵的工具。


  如果您希望在登录时自动配置操作系统提示符，那么您需要在启动文件中设置它。在 Bash shell 环境中，通常使用 `.bashrc` 文件。此文件通常位于您的
  `HOME` 目录中。将以下代码行放入 `.bashrc` 中：


  ```bash

  PS1=''[\h:\u:${ORACLE_SID}]$ ''

  ```


  当您将此代码行放入启动文件时，那么每当您登录服务器时，操作系统提示符都会自动为您设置。在其他 shell 中，例如 Korn shell，`.profile`
  文件是启动文件。


  根据您的个人偏好，您可能希望修改命令提示符以满足您的特定需求。例如，许多 DBA 喜欢在命令提示符中显示当前工作目录。要显示当前工作目录信息，请添加 `\w`
  变量：


  ```bash

  $ PS1=''[\h:\u:\w:${ORACLE_SID}]$ ''

  ```


  正如您可以想象的那样，可用于命令提示符中显示的信息有多种选项。以下是另一种流行的格式：


  ```bash

  $ PS1=''[\u@${ORACLE_SID}@\h:\w]$ ''

  ```


  **表 3–1** 列出了许多可用于自定义操作系统命令提示符的 Bash shell 变量。


  **表 3–1. 用于自定义命令提示符的 Bash Shell 反斜杠转义变量**

  | **变量** | **描述** |

  | :--- | :--- |

  | `\a` | ASCII 响铃字符 |

  | `\d` | 日期，格式为“星期几 月份 日期” |

  | `\h` | 主机名 |

  | `\e` | ASCII 转义字符 |

  | `\j` | shell 管理的作业数 |

  | `\l` | shell 的终端设备的基本名称 |

  | `\n` | 换行符 |

  | `\r` | 回车符 |

  | `\s` | shell 的名称 |

  | `\t` | 时间，24 小时制 HH:MM:SS 格式 |

  | `\T` | 时间，12 小时制 HH:MM:SS 格式 |

  | `\@` | 时间，12 小时制 a.m./p.m. 格式 |

  | `\A` | 时间，24 小时制 HH:MM 格式 |

  | `\u` | 当前用户的用户名 |

  | `\v` | Bash shell 的版本 |

  | `\V` | Bash shell 的发布版本 |

  | `\w` | 当前工作目录 |

  | `\W` | 当前工作目录的基本名称 |

  | `\!` | 命令的历史编号 |

  | `\$` | 如果有效 UID 为 0，则显示 `#`；否则，显示 `$` |


  可用于命令提示符的变量因操作系统和 shell 而异。例如，在 Korn shell 环境中，主机名变量在操作系统提示符中显示服务器名称：


  ```bash

  $ export PS1="[`hostnamè]$ "

  ```


  ## 自定义 SQL 提示符


  DBA 经常使用 `SQL*Plus` 来执行日常管理任务。通常，您将在包含多个数据库的服务器上工作。显然，每个数据库包含多个用户账户。连接到数据库时，您可以运行以下命令来验证您的用户名和数据库连接：


  ```sql

  SQL> show user;

  SQL> select name from v$database;

  ```


  确定用户名和 `SID` 的更有效方法是设置 `SQL` 提示符以显示该信息。例如：


  ```sql

  SQL> SET SQLPROMPT ''&_USER.@&_CONNECT_IDENTIFIER.> ''

  ```


  配置 `SQL` 提示符的更有效方法是让您在登录 `SQL*Plus` 时自动运行 `SET SQLPROMPT` 命令。请按照以下步骤完全自动化此操作：

  1.  创建一个名为 `login.sql` 的文件，并在其中放入 `SET SQLPROMPT` 命令。

  2.  设置您的 `SQLPATH` 操作系统变量以包含 `login.sql` 的目录位置。在此示例中，`SQLPATH` 操作系统变量在 `.bashrc`
  操作系统文件中设置，该文件在每次登录或启动新 shell 时执行。以下是条目：


  ```bash

  export SQLPATH=$HOME/scripts

  ```

  3.  在 `HOME/scripts` 目录中创建一个名为 `login.sql` 的文件。在文件中放入以下行：


  ```sql

  SET SQLPROMPT ''&_USER.@&_CONNECT_IDENTIFIER.> ''

  ```

  4.  要查看结果，您可以注销并重新登录到服务器，或者直接 source `.bashrc` 文件：


  ```bash

  $ . ./.bashrc

  ```


  现在，登录到 SQL。以下是 `SQL*Plus` 提示符的示例：


  ```

  SYS@devdb1>

  ```


  如果您连接到不同的用户，这应该反映在提示符中：


  ```sql

  SQL> conn system/foo

  ```


  `SQL*Plus` 提示符现在显示为


  ```

  SYSTEM@devdb1

  ```


  设置 `SQL` 提示符是提醒您当前连接的环境和用户的简便方法。这将有助于防止您在错误的环境中意外运行 SQL 语句。您最不希望发生的事情是以为自己在开发环境中，然后发现您在连接生产环境时运行了删除对象的脚本。


  **表 3–2** 包含可用于自定义提示符的 `SQL*Plus` 变量的完整列表。


  **表 3–2. 预定义的 SQL*Plus 变量**

  | **变量** | **描述** |

  | :--- | :--- |

  | `_CONNECT_IDENTIFIER` | 连接标识符，例如 Oracle SID |

  | `_DATE` | 当前日期 |

  | `_EDITOR` | `SQL EDIT` 命令使用的编辑器 |

  | `_O_VERSION` | Oracle 版本 |

  | `_O_RELEASE` | Oracle 发布版本 |

  | `_PRIVILEGE` | 当前连接会话的权限级别 |

  | `_SQLPLUS_RELEASE` | `SQL*Plus` 版本号 |

  | `_USER` | 当前连接的用户 |


  ## 为常用命令创建快捷方式


  在 Linux/Unix 环境中，您可以使用两种常用方法为其他命令创建快捷方式：为经常重复的命令创建别名，以及使用函数为一组命令创建快捷方式。以下部分描述了您可以使用这两种技术的方法。


  ### 使用别名


  您经常需要导航到服务器上的各个目录。例如，其中一个位置是数据库后台进程日志记录目录。要导航到此目录，您必须键入类似以下内容：


  ```bash

  $ cd /ora01/app/oracle/admin/O10R24/bdump

  ```


  您可以使用 `alias` 命令创建一个快捷方式来完成相同的任务。*别名* 是创建一小段文本以执行其他 shell 命令的简单机制。此示例创建一个名为 `bdump`
  的别名，该别名根据 `ORACLE_SID` 变量的值更改目录到后台位置：


  ```bash

  $ alias bdump=''cd /ora01/app/oracle/admin/$ORACLE_SID/bdump''

  ```


  现在您可以键入 `bdump`，这与将当前工作目录更改为 Oracle 后台转储目录相同。


  要显示所有已定义的别名，请使用不带参数的 `alias` 命令：


  ```bash

  $ alias

  ```


  接下来列出了一些可以使用的常见别名定义示例：


  ```bash

  alias l.=''ls -d .*''

  alias ll=''ls -l''

  alias lsd=''ls -altr | grep ^d''

  alias bdump=''cd /ora01/app/oracle/admin/$ORACLE_SID/bdump''

  alias sqlp=''sqlplus "/ as sysdba"''

  alias shutdb=''echo "shutdown immediate;" | sqlp''

  alias startdb=''echo "startup;" | sqlp''

  ```


  如果您想从当前环境中删除别名定义，请使用 `unalias` 命令。以下示例删除了 `lsd` 的别名：


  ```bash

  $ unalias lsd

  ```


  ### 使用函数


  您也可以使用函数创建命令快捷方式。以下代码行创建了一个名为 `bdump` 的简单函数：


  ```bash

  $ function bdump { cd /ora01/app/oracle/admin/$ORACLE_SID/bdump; }

  ```


  您现在可以在命令行键入 `bdump` 以将工作目录更改为 Oracle 后台转储目录。


  使用函数通常比使用别名更可取。函数比别名更强大，因为它们具有诸如能够在命令行上传递的参数上操作以及允许复杂编码等功能。


  为了演示函数的强大功能，请考虑这样一种场景：您在服务器上安装了不同版本的数据库，并且后台转储目标根据版本而异。使用函数，您可以构建逻辑来检查您使用的是哪个版本的数据库并相应地导航：


  ```bash

  function bdump {

  echo $ORACLE_HOME | grep 11 >/dev/null

  if [ $? -eq 0 ]; then

  lower_sid=$(echo $ORACLE_SID | tr ''[:upper:]'' ''[:lower:]'')

  cd $ORACLE_BASE/diag/rdbms/$lower_sid/$ORACLE_SID/trace

  else

  cd $ORACLE_BASE/admin/$ORACLE_SID/bdump

  fi

  } # bdump

  ```


  前面的函数代码行很难用别名复制。使用函数，您可以根据需要编写任意多的逻辑，并在需要时传入变量。


  DBA 通常通过在 `HOME/.bashrc` 文件中设置函数来建立函数。管理函数的更好方法是创建一个仅存储函数代码的文件，并从 `.bashrc` 文件中调用该文件。


  将特殊用途的文件存储在您为这些文件创建的目录中也更好。例如，在 `HOME` 下创建一个名为 `bin` 的目录；在 `bin` 目录中，创建一个名为 `dba_fcns`
  的文件，并将您的函数代码放入其中。现在，从 `.bashrc` 文件调用 `dba_fcns` 文件。以下是 `.bashrc` 文件中的条目示例：


  ```bash

  . $HOME/bin/dba_fcns

  ```


  接下来列出了一些您可以使用的函数类型的小样本：


  ```bash

  #-----------------------------------------------------------#

  ```



