- '# 第 2 章 ■ 数据库实现


  ## `PS3` 指示了 Bash `select` 命令要使用的提示符。


  ```bash

  PS3=''SID? ''


  select sid in ${SIDLIST}; do


  if [ -n $sid ]; then


  HOLD_SID=$sid


  break


  fi


  done


  else


  if grep -v ''#'' ${OTAB} | grep -w "${1}:">/dev/null; then HOLD_SID=$1


  else


  echo "SID: $1 not found in $OTAB"


  fi


