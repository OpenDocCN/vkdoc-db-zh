  \n## OSB 的命令行访问\n\n本章中的所有示例都使用 `obtool` 或 `RMAN` 来访问 OSB 并执行任务，例如创建备份和恢复文件。本节重点介绍如何连接到\
  \ `obtool` 实用程序。第一次运行 `obtool` 实用程序时，系统将提示您输入 `admin` 用户的密码，这是安装 OSB 时创建的默认 OSB\
  \ 用户。出现提示时，使用您安装 OSB 软件时指定的密码：\n```\n$ obtool\nOracle Secure Backup 10.3\nlogin:\n\
  ```\n\n要启动 `obtool` 实用程序并登录到特定用户，请使用 `-u` 选项，如下所示。您将在下一节中学习如何维护 OSB 用户。\n```\n$\
  \ obtool -u apress_oracle\n```\n\n要验证您登录的 OSB 用户，请发出 `id` 命令：\n```\nob> id\napress_oracle\n\
  ```\n\n要查看 `obtool` 帮助主题列表，请输入以下命令：\n```\nob> help topics\n```\n这是输出的一小部分：\n```\n\
  以下主题提供帮助：\nadvanced .. 高级且不常用的命令\nbackups .. 数据备份操作\nbackupwindow .. 备份窗口定义\nbrowser\
  \ .. 文件系统浏览器\ncheckpoint .. 检查点管理\nclass .. 用户类别权限\n```\n\n要退出 `obtool` 实用程序，请发出\
  \ `exit` 或 `quit` 命令，如下所示：\n```\nob> exit\n```\n\n## OSB 配置\n\n安装 OSB 后，您可以运行一个简单的备份命令。但是，在安全性是首要任务之一的环境中，您可能希望先更改\
  \ OSB 默认设置。想象一下，您的生产数据库严格执行严格的安全性，并且使用单个 OSB 用户帐户来备份生产数据库和测试数据库。您处于易受攻击的境地，因为测试团队中的\
  \ DBA 可以将生产数据库的备份恢复到另一台服务器并从那里访问数据。为了提高安全性并更好地管理磁带备份，我建议创建新的用户帐户并分配特定角色，以及创建媒体家族和数据库备份存储选择器。接下来的几个小节将讨论这些主题。\n\
  \n### 配置用户和类\n\n安装 OSB 时，创建的默认用户帐户名为 `admin`，它拥有与 OSB 相关的所有权限。出于安全原因，请创建单独的 OSB\
  \ 用户帐户以访问不同的环境，例如生产、测试和开发。此外，为这些用户分配特定的类（或角色），例如 `admin`、`operator`、`oracle`、`user`\
  \ 和 `reader`。监控他们以限制他们修改 OSB 管理域配置以及执行备份和恢复操作的权限。限制权限可确保特定的 OSB 用户可以备份测试数据库，但无权（例如）恢复生产数据库。\n\
  \n要确定 `admin` 类的权限，请发出 `lsclass` 命令，如下所示：\n```\nob> lsclass -l admin\n```\n这是一些示例输出：\n\
  ```\nadmin:\n浏览备份目录，此访问权限为：特权\n访问 Oracle 数据库备份：全部\n访问文件系统备份：全部\n显示管理域配置：是\n修改自己的名称和密码：是\n\
  修改管理域配置：是\n修改目录：是\n以本人身份执行文件系统备份：是\n以特权用户身份执行文件系统备份：是\n列出用户拥有的任何作业：是\n修改用户拥有的任何作业：是\n\
  以本人身份执行文件系统恢复：是\n以特权用户身份执行文件系统恢复：是\n接收请求操作员协助的电子邮件：是\n接收描述内部错误的电子邮件：是\n接收关于过期密码密钥的电子邮件：是\n\
  查询和显示设备信息：是\n管理设备并更改设备状态：是\n列出任何作业，无论其所有者是谁：是\n修改任何作业，无论其所有者是谁：是\n执行 Oracle 数据库备份和恢复：是\n\
  ```\n\n`注意` 要显示 OSB 命令的完整语法，请发出 `help` 命令，后跟该 OSB 命令。\n\n要创建 OSB 用户，请发出 `mkuser`\
  \ 命令。在以下示例中，创建了 OSB 用户 `apress_oracle` 并分配了 `oracle` 权限：\n```\nob> mkuser --class\
  \ oracle apress_oracle --preauth BLLNX3:oracle+cmdline+rman\n```\n`--preauth` 选项中的\
  \ `+cmdline` 属性授予 Oracle OS 用户对 `obtool` 实用程序的预先授权访问权限，而 `+rman` 属性授予通过 RMAN 进行的\
  \ Oracle Database SBT 备份。如果未为您要备份的目标数据库所在的服务器定义 `+rman` 预授权，则 RMAN 备份将因 `ORA-19511`\
  \ 错误而失败，如下所示：\n```\nORA-19511: 从介质管理器层接收到错误，错误文本:\nsbt__rpc_cat_query: 对 piece u8lr5bs6_1_1\
  \ 的查询失败。\n(Oracle Secure Backup 错误: '未找到 OS 用户 (OB tools) oracle 的预授权配置').\n```\n\
  \n如果您想查看所有 OSB 用户，请发出 `lsuser` 命令：\n```\nob> lsuser\n```\n\n表 20–1 描述了用于维护 OSB 用户帐户的各种\
  \ OSB 命令。\n\n| 命令 | 含义 |\n| :--- | :--- |\n| `mkuser` | 创建 OSB 用户。 |\n| `lsuser`\
  \ | 显示有关 OSB 用户的信息。 |\n| `renuser` | 重命名 OSB 用户。 |\n| `chuser` | 修改 OSB 用户的属性。 |\n\
  | `rmuser` | 删除 OSB 用户。 |\n\n### 配置媒体家族\n\n媒体家族对磁带卷的特征进行分类和定义，例如卷 ID、卷过期时间和写入窗口。卷\
  \ ID 由 OSB 用来唯一标识磁带卷，它由媒体家族的名称加上 OSB 生成的六位序列号组成。例如，如果媒体家族的名称是 `APRESS_BACKUP`，则第一个卷\
  \ ID 是 `APRESS_BACKUP-000001`，第二个是 `APRESS_BACKUP-000002`，依此类推。\n\n有两种类型的卷过期策略：时间管理和内容管理。时间管理媒体家族中的磁带卷在超过过期时间后可以过期；在内容管理的媒体家族中，当卷上的所有备份\
  \ piece 都被标记为删除时，它们会过期。\n\n\n# 第 20 章 ■ Oracle 安全备份\n\n对于文件系统备份，您必须使用时间管理的介质家族，以让\
  \ OSB 管理卷的过期。对于 RMAN 备份，您必须使用内容管理的介质家族，让 RMAN 而非 OSB 来管理磁带上备份片的过期。这避免了 RMAN 元数据与磁带内容之间的不一致。\n\
  \n要创建时间管理的介质家族，请使用 `mkmf` 命令。在以下示例中，介质家族 `APRESS_OS` 有 7 天的写入窗口和 14 天的保留期。这意味着，自磁带卷上创建第一个备份片起，`APRESS_OS`\
  \ 介质家族的卷将在 21 天后过期并准备好被回收：\n\n```\nob> mkmf --writewindow 7days --retain 14days\
  \ APRESS_OS\n```\n\n要创建内容管理的介质家族，请使用 `mkmf` 命令，如下所示。由于默认的卷过期策略就是内容管理的，因此您可以省略 `--contentmanaged`\
  \ 选项。\n\n```\nob> mkmf --contentmanaged APRESS_RMAN\n```\n\n表 20-2 描述了用于维护介质家族的\
  \ OSB 命令。\n\n*表 20-2. 用于维护介质家族的 OSB 命令*\n| 命令 | 含义 |\n| :--- | :--- |\n| `mkmf`\
  \ | 创建介质家族。 |\n| `lsmf` | 显示介质家族的信息。 |\n| `renmf` | 重命名介质家族。 |\n| `chmf` | 修改介质家族的属性。\
  \ |\n| `rmmf` | 删除介质家族。 |\n\n为了提高安全性并更好地管理磁带备份，您可以为不同的环境（如生产、测试和开发）创建单独的介质家族。这样，生产数据库和测试数据库的备份就不会共享相同的磁带卷。\n\
  \n### 配置数据库备份存储选择器\n\nRMAN 备份的默认介质家族是 `RMAN-DEFAULT`。要在运行 RMAN 备份时使用不同的介质家族，请使用\
  \ `mkssel` 命令创建一个数据库备份存储选择器。在以下示例中，数据库备份存储选择器名称为 `BLLNX3-DB11R2.ssel`，它为在客户端服务器\
  \ `BLLNX3` 上托管的 Oracle 数据库 `DB11R2` 的 RMAN 备份分配了介质家族 `APRESS_RMAN`：\n\n```\nob>\
  \ mkssel --host BLLNX3 --dbname DB11R2 --family APRESS_RMAN BLLNX3-DB11R2.ssel\n\
  ```\n\n■ **注意** 如果一次 RMAN 备份匹配了数据库备份存储选择器上定义的 Oracle 数据库和/或客户端主机，那么您在为 `SBT_TAPE`\
  \ 分配 RMAN 通道时，就不必传递 OS 环境变量 `OB_MEDIA_FAMILY` 参数。\n\n有关用于维护数据库备份存储选择器的 OSB 命令的描述，请参见表\
  \ 20-3。\n\n*表 20-3. 用于维护数据库备份存储选择器的 OSB 命令*\n| 命令 | 含义 |\n| :--- | :--- |\n| `mkssel`\
  \ | 创建数据库备份存储选择器。 |\n| `lsssel` | 显示数据库备份存储选择器的信息。 |\n| `renssel` | 重命名数据库备份存储选择器。\
  \ |\n| `chssel` | 修改数据库备份存储选择器的属性。 |\n| `rmssel` | 删除数据库备份存储选择器。 |\n\n## 数据库备份\n\
  \n在第 18 章中，您学习了如何使用 RMAN 将数据库文件备份到磁盘。在本节中，您将使用 OSB 和 RMAN 在磁带上创建备份。配置 RMAN 以备份到磁带有两种方式：\n\
  - 分配通道\n- 配置通道\n\n第一种选择是在 `run{}` 块内为 `SBT_TAPE` 分配一个 RMAN 通道。在以下示例中，介质家族 `APRESS_RMAN`\
  \ 作为参数传递给环境变量 `OB_MEDIA_FAMILY`。磁带卷将具有一个由 OSB 生成的六位数序列号附加的 `APRESS_RMAN` 卷 ID。\n\
  \n```\nRMAN> run {\nallocate channel t1 type sbt_tape parms 'ENV=(OB_MEDIA_FAMILY=APRESS_RMAN)';\n\
  backup database;\n}\n```\n\n您可以为 `SBT_TAPE` 配置多个通道，数量与可用的物理磁带设备相同。但是，如果您分配了两个通道却只有一个物理磁带设备，那么另一个通道只会等待磁带资源变得可用。您也可以使用\
  \ `CONFIGURE` 命令来为 `SBT_TAPE` 设置 R 通道，如下所示：\n\n```\nRMAN> configure channel device\
  \ type sbt_tape\n```\n\n\n# 第 20 章：Oracle 安全备份\n\n## 注意\n\n如果在为 `SBT_TAPE` 分配或配置\
  \ RMAN 通道时没有显式传递介质家族，或者没有为主机和/或数据库定义数据库备份存储选择器，OSB 将使用默认介质家族 `RMAN-DEFAULT`，该家族在安装\
  \ OSB 时创建。\n\n## 表 20–4：OSB 介质管理参数\n\n**参数** | **含义**\n:---|:---\n`OB_MEDIA_FAMILY`\
  \ | 用于指定定义磁带卷特性的介质家族。\n`OB_DEVICE` | 用于指定备份期间要使用的磁带驱动器。\n`OB_RESOURCE_WAIT_TIME`\
  \ | 用于指定等待资源变为可用的时间。\n`OB_ENCRYPTION` | 用于指定 OSB 加密。如果设置了此项，则 OSB 不会执行进一步的加密。\n\
  `OB_RESTORE_DEVICE` | 用于指定还原期间要使用的磁带驱动器。\n\n## 数据库还原\n\n对于 RMAN 还原和恢复，您必须为 `SBT_TAPE`\
  \ 分配一个 RMAN 通道。在以下示例中，`SBT_TAPE` 的 RMAN 通道在 `run{}` 块内分配：\n\n```\nRMAN> run {\n\
  allocate channel t1 type sbt_tape;\nrestore database;\nrecover database;\n}\n```\n\
  \n另一种选择是运行 `CONFIGURE` 命令。与前面的示例不同，您必须在 `CONFIGURE` 命令中包含 `PARMS` 子句（如果不使用 `PARMS`\
  \ 子句，将返回语法错误）：\n\n```\nRMAN> configure channel device type sbt_tape parms 'ENV=(OB_MEDIA_FAMILY=APRESS_RMAN)';\n\
  RMAN> restore device type sbt_tape database;\nRMAN> recover device type sbt_tape\
  \ database;\n```\n\n假设您遇到这样一种情况：生产服务器因灾难性事件完全损毁，但幸运的是您有数据库的异地磁带备份。此外，您没有使用 RMAN\
  \ 恢复目录，并且控制文件自动备份已禁用。您发现最新的控制文件备份已损坏，但可以从两天前的备份中还原控制文件。挂载数据库后，您意识到在执行 `RMAN LIST\
  \ BACKUP` 命令时，昨天进行的最新 RMAN 备份不在列表中（因为还原的控制文件来自两天前，不知道昨天的 RMAN 备份）。\n\n在这种情况下，从两天前的备份还原的控制文件没有关于昨天在磁带上创建的备份片的信息。要使\
  \ RMAN 存储库（在此场景中是控制文件）知晓磁带上的备份片，请执行以下操作：\n\n1.  为磁带配置一个通道。\n2.  通过 `CATALOG` 命令使\
  \ RMAN 存储库知晓备份片。\n\n接下来，发出 `CATALOG DEVICE TYPE SBT_TAPE BACKUPPIECE` 命令，后跟备份片的名称。在此示例中，编录了一个备份片：\n\
  \n```\nRMAN> catalog device type sbt_tape backuppiece 'silr06fk_1_1';\n```\n\n如果您有多个要编录的备份片，必须为每个单独的备份片发出\
  \ `CATALOG DEVICE TYPE SBT_TAPE BACKUPPIECE` 命令。在磁带上编录 RMAN 备份片的关键是您必须知道备份片的确切名称。\n\
  \n## 注意\n\n如第 19 章所述，对于基于磁盘的备份，您可以通过 `CATALOG START WITH <directory>` 命令轻松地使 RMAN\
  \ 存储库知晓多个备份片。但是，此技术仅适用于基于磁盘的备份，不适用于磁带备份。\n\n如果您不知道备份片的名称怎么办？一种找出它们名称的方法是查看 RMAN\
  \ 备份期间生成的 RMAN 日志文件。在此处显示的 RMAN 日志文件片段中，RMAN 备份片是 `silr06fk_1_1`：\n\n```\nchannel\
  \ ORA_SBT_TAPE_1: finished piece 1 at 21-OCT-2010 08:29:35\npiece handle=silr06fk_1_1\
  \ tag=TAG20101021T082105 comment=API Version 2.0,MMS Version 10.3.0.2\nchannel ORA_SBT_TAPE_1:\
  \ backup set complete, elapsed time: 00:08:26\n```\n\n\n\n## 文件系统备份\n\n## 重新定义备份的\
  \ 3W1H\n\n与任何备份作业一样，你需要定义三个 W（什么、何时、何地）和一个 H（如何）。要备份什么数据？何时运行备份？备份存储在何处？备份如何运行？要使用\
  \ Oracle Secure Backup（OSB）完成这 3W1H，你需要创建一个数据集文件，并配置备份窗口、备份计划和触发器。\n\n### 创建数据集文件\n\
  \n数据集文件定义了你希望在客户端主机上备份的目录和文件。在以下示例中，此数据集文件指定包含客户端主机`BLLNX1`上`/home/oracle`目录下的所有文件，但排除`/home/oracle/temp`目录下的文件和\
  \ Oracle 数据库相关文件：\n```\ninclude host BLLNX1\n\ninclude path /home/oracle {\n   \
  \ exclude oracle database files\n    exclude path /home/oracle/temp\n}\n```\n\n\
  要使用`obtool`实用程序创建一个名为`bllnx1_home-oracle.ds`的数据集文件，请执行以下步骤：\n\n1.  发出`mkds`命令，后跟数据集文件的名称。\n\
  \    ```\n    ob> mkds bllnx1_home-oracle.ds\n    ```\n2.  `vi`编辑器被调用，并显示一个数据集模板。\n\
  3.  注释掉或删除所有现有行，并添加以下行：\n    ```\n    include host BLLNX1\n    include path /home/oracle\
  \ {\n        exclude oracle database files\n        exclude path /home/oracle/temp\n\
  \    }\n    ```\n4.  按`Esc`键，输入`:wq!`保存文件。\n5.  将显示以下提示。按`Enter`键确认更改。\n    ```\n\
  \    Apply your changes, if any [yes]?\n    ```\n\n这样你就创建了一个数据集文件。有关其他数据集命令的描述，请参考下表。\n\
  \n| 命令 | 含义 |\n| :--- | :--- |\n| `catds` | 显示数据集文件的内容。 |\n| `cdds` | 更改数据集目录。 |\n\
  | `chkds` | 检查数据集文件中的语法。 |\n| `edds` | 修改数据集文件。 |\n| `lsds` | 列出数据集文件和数据集目录名称。 |\n\
  | `mkds` | 创建数据集文件或数据集目录。 |\n| `pwdds` | 显示数据集目录树中的当前目录。 |\n| `rends` | 重命名数据集文件或数据集目录。\
  \ |\n| `rmds` | 删除数据集文件或数据集目录。 |\n\n### 配置备份窗口\n\n备份窗口定义了允许计划备份运行的时间范围。默认的备份窗口是每天`00:00`到`24:00`。如果没有定义备份窗口，计划备份将根本不会运行。\n\
  \n对于生产服务器，你可能希望备份仅在每天凌晨 1 点到 5 点数据库流量最小时段运行。要定义备份窗口的时间范围，请执行以下步骤：\n\n1.  通过发出`rmbw`命令删除现有的`daily\
  \ 00:00-24:00`备份窗口，因为它与你想要创建的备份窗口重叠，如下所示：\n    ```\n    ob> rmbw daily\n    ```\n\
  2.  发出`lsbw`命令。\n    ```\n    ob> lsbw\n    ```\n    输出显示：\n    ```\n    There are\
  \ no backup windows.\n    ```\n    此结果表明每日备份窗口已被移除。\n3.  要创建备份窗口，请发出`addbw`命令。以下示例定义了从`01:00`到`05:00`的每日备份窗口：\n\
  \    ```\n    ob> addbw --times '01:00-05:00' --days mon,tue,wed,thu,fri,sat,sun\n\
  \    ```\n\n有关其他备份窗口命令，请参考下表。\n\n| 命令 | 含义 |\n| :--- | :--- |\n| `addbw` | 添加一个备份窗口。\
  \ |\n| `chkbw` | 检查是否已定义备份窗口。 |\n| `lsbw` | 列出备份窗口。 |\n| `rmbw` | 移除一个备份窗口。 |\n\
  | `setbw` | 修改一个备份窗口。 |\n\n## 配置备份计划和触发器\n\n备份计划定义了要备份什么数据、将备份存储在何处以及备份如何运行，而触发器定义了计划备份运行的时间。\n\
  \n-   对于要备份的数据，设置特定的数据集。\n-   对于将备份存储在何处，设置特定的磁带驱动器。如果未选择特定的磁带驱动器，则将使用任何可用的磁带驱动器。\n\
  -   对于备份如何运行，设置作业优先级和备份加密选项。作业优先级编号的值越低，调度程序为作业分配的优先级越高。作业优先级的默认值是`100`，加密选项的默认值是`no`。\n\
  \n以下示例使用`mksched`命令为数据集`bllnx1_home-oracle.ds`创建一个名为`bllnx1_home-oracle.sched`的备份计划：\n\
  ```\nob> mksched --dataset bllnx1_home-oracle.ds bllnx1_home-oracle.sched\n```\n\
  \n创建备份计划后，创建一个触发器来定义何时运行计划备份。以下示例使用`chsched`命令为计划`bllnx1_home-oracle.sched`定义一个触发器，以在每天`02:00`（凌晨\
  \ 2 点）运行。`-a`选项表示添加触发器(`addtrigger`)，`-d`选项表示日(`day`)，`-t`选项表示时间(`time`)，`-f`选项表示介质族(`media\
  \ family`)。\n```\nob> chsched -a -d daily -t 02:00 -f APRESS_OS bllnx1_home-oracle.sched\n\
  ```\n\n要显示有关备份计划的信息，请发出`lssched`命令，如下所示：\n```\nob> lssched -l bllnx1_home-oracle.sched\n\
  ```\n输出显示如下信息：\n```\nbllnx1_home-oracle.sched:\n    Type: backup\n    State: enabled\n\
  \    Dataset: bllnx1_home-oracle.ds\n    Encryption: no\n    UUID: 1ea82008-bfdd-102d-a743-0002a530c867\n\
  \    Trigger 1:\n        Day/date: daily\n        At: 02:00\n        Backup level:\
  \ full\n        Media family: APRESS_OS\n```\n\n你刚刚安排了一个名为`bllnx1_home-oracle.sched`的备份，它将在每天凌晨\
  \ 2 点运行。要监控作业，请参阅本章的“OSB 作业监控”部分。\n\n要删除备份计划，请发出`rmsched`命令，如下所示：\n```\nob> rmsched\
  \ bllnx1_home-oracle.sched\n```\n\n### 执行按需文件系统备份\n\n要在特定客户端主机上运行一次性备份，请使用`backup`命令。在以下示例中，使用的是之前创建的数据集文件`bllnx1_home-oracle.ds`：\n\
  ```\nob> backup --dataset bllnx1_home-oracle.ds --go\n```\n\n如果省略`--go`选项，备份请求仍将保留在队列中。你可以发出`lsbackup`命令来显示队列中排队的备份请求，如下所示：\n\
  ```\nob> lsbackup\n```\n输出可能如下：\n```\nItem #  Save data\n1       dataset bllnx1_home-oracle.ds\n\
  ```\n\n要将备份请求转发给 OSB 调度程序，请发出带有`GO`选项的以下`backup`命令：\n```\nob> backup --go\n```\n\
  \n要手动备份管理服务器的 OSB 目录，请发出以下`backup`命令：\n```\nob> backup --level 0 --dataset OSB-CATALOG-DS\
  \ --go\n```\n\n要监控你已提交的备份作业，请参阅本章的“OSB 作业监控”部分。\n\n> **注意**：默认情况下，`OSB-CATALOG-SCHED`计划在每天凌晨\
  \ 1 点运行，使用数据集文件`OSB-CATALOG-DS`来备份 OSB 目录。\n\n## 文件系统恢复\n\n有三种方式可以从文件系统备份中恢复：\n\
  -   基于目录的恢复\n-   原始恢复\n-   `obtar`命令\n\n在基于目录的恢复中，你提供可以从 OSB 目录浏览的目录和文件。在原始恢复和`obtar`命令中，你都需要提供卷\
  \ ID 和文件号。卷 ID 是分配给磁带卷的唯一名称（包含介质族），文件号是磁带卷上备份镜像的编号。基于目录的恢复和原始恢复都使用`obtool`实用程序执行，而`obtar`命令则在操作系统提示符下发出。\n\
  \n### 执行基于目录的恢复\n\n...\n\n\n\n对于基于目录的恢复，您可以浏览 OSB 目录来确定并验证要恢复的文件。在以下示例中，您希望恢复客户端主机\
  \ `BLLNX1` 的文件 `/home/oracle/scripts/rmanbkup.sh`。要使用 OSB 目录恢复文件，请执行以下步骤：\n\n1.\
  \  将主机变量设置为源主机 `BLLNX1`。\n    ```\n    ob> set host BLLNX1\n    ```\n\n2.  执行 `cd`\
  \ 命令导航到目录。\n    ```\n    ob> cd /home/oracle/scripts\n    ```\n\n3.  执行 `ls` 命令以验证目录中的文件。\n\
  \    ```\n    ob> ls -l rmanbkup.sh\n    ```\n    输出：\n    ```\n    -rwxr-xr-x oracle.oinstall\
  \ 782 2010/01/13.18:14 rmanbkup.sh (0)\n    ```\n\n4.  执行 `restore` 命令。\n    ```\n\
  \    ob> restore '/home/oracle/scripts/rmanbkup.sh' --go\n    ```\n要监视恢复作业，请参阅 OSB\
  \ 作业监视部分（本章稍后介绍）。\n\n## 执行原始恢复\n要使用原始恢复来恢复数据，您必须知道从中提取数据的卷 ID 和文件编号。但是，如果您知道备份使用的特定介质系列，可以使搜索变得更容易一些。\n\
  \n在以下示例中，您将从具有介质系列 `APRESS_OS` 的磁带卷中恢复文件 `/home/oracle/scripts/rmanbkup.sh`。\n\n\
  1.  执行带有 `--contents` 选项的 `lsvol` 命令，以显示与介质系列 `APRESS_OS` 关联的卷的内容：\n    ```\n  \
  \  ob> lsvol --contents --family APRESS_OS --nobarcode\n    ```\n    输出：\n    ```\n\
  \    VOID OOID Seq Volume ID Family Created Attributes\n    2845 2845 1 APRESS_OS-000001\
  \ APRESS_OS 10/21.04:41 open; closes 10/28.04:41\n\n    BSOID File Sect Level Host\
  \ Size Created Attributes\n    31250 1 1 0 BLLNX1 208.6 MB 10/21.04:41\n    31258\
  \ 2 1 0 BLLNX1 208.8 MB 10/21.06:04\n    31260 3 1 0 BLLNX1 210.1 MB 10/21.12:23\n\
  \    31261 4 1 0 BLLNX1 210.1 MB 10/21.12:34\n    ```\n\n2.  根据上面的输出，您希望从 `10/21.06:04`（即\
  \ 10 月 21 日上午 6:04）进行的备份恢复。相应的文件编号是 `2`，卷 ID 是 `APRESS_OS-000001`。执行以下 `restore`\
  \ 命令，如图所示。`-R` 选项表示原始恢复操作，不使用 OSB 目录，而 `–F` 选项表示文件编号，`–v` 选项表示卷 ID。\n    ```\n \
  \   ob> restore -R -F 2 -v APRESS_OS-000001 /home/oracle/scripts/rmanbkup.sh --go\n\
  \    ```\n要监视恢复作业，请参阅本章的“OSB 作业监视部分”。\n\n## 执行 obtar 恢复\n当您运行 OSB 恢复时，它们实际上会在后台转换为\
  \ `obtar` 命令。`obtar` 命令在操作系统级别发出。由于需要提供卷 ID 和文件编号（这些信息并非随时可用，尤其是在无法访问 OSB 目录时），`obtar`\
  \ 命令很少用于执行恢复操作。\n\n在以下示例中，您将从卷 ID 为 `APRESS_OS-000001`、文件编号为 `2` 的磁带恢复文件 `/home/oracle/scripts/rmanbkup.sh`。\n\
  \n1.  执行 `loadvol` 命令，手动将卷 ID 为 `APRESS_OS-000001` 的磁带加载到可用的磁带驱动器。这里我使用了磁带驱动器 `vdrive8`。\n\
  \    ```\n    ob> loadvol -D vdrive8 --volume APRESS_OS-000001\n    ```\n\n2.  要检查磁带的内容，请执行带有\
  \ `-t` 选项的 `obtar` 命令。\n    ```\n    $ obtar -t -f vdrive8\n    ```\n\n3.  要使用 `obtar`\
  \ 命令执行恢复操作，请执行带有 `-x` 选项的以下命令。`-F` 选项表示文件编号，`-k` 选项避免覆盖现有文件。\n    ```\n    $ obtar\
  \ -F 2 -x -f vdrive8 -k /home/oracle/scripts/rmanbkup.sh\n    ```\n\n4.  由于您使用在操作系统级别执行的\
  \ `obtar` 命令进行恢复，因此无法使用 `obtool` 实用程序监视恢复作业。但是，验证文件是否已恢复的一种方法是执行 `ls` 操作系统命令。\n\
  \    ```\n    $ ls -l /home/oracle/scripts/rmanbkup.sh\n    ```\n\n## OSB 作业监视\n\
  您使用 RMAN 提交了 Oracle 数据库的备份或恢复操作，或使用 Oracle Enterprise Manager (`OEM`)、OSB Web 工具或\
  \ `obtool` 实用程序提交了文件系统数据的备份或恢复操作，并且您想检查作业是活动、挂起还是已完成。要检查 OSB 作业的状态，请执行 `lsjob` 命令和\
  \ `catxcr` 命令以显示有关作业操作的详细信息。\n\n### 列出作业\n要显示仍在运行的作业，请执行带有 `--active` 或 `-a` 选项的\
  \ `lsjob` 命令。对于其他作业状态，使用 `--complete` 或 `-c` 选项表示已完成的作业，`--pending` 或 `-p` 表示挂起的作业，`--inputrequest`\
  \ 或 `-i` 表示当前正在请求输入的作业，`--all` 或 `-A` 表示显示所有作业，无论其状态如何。例如，要列出活动作业：\n```\nob> lsjob\
  \ --active\n```\n对于 RMAN 作业，使用 `--dbname` 或 `-d` 选项将输出限制为特定的 Oracle 数据库。如果您知道数据库\
  \ ID，可以改用 `--dbid` 或 `-I` 选项。此示例使用 `dbname` 参数：\n```\nob> lsjob --active --dbname\
  \ DB11R2\n```\n在下面的输出中，`State` 列指示作业仍在运行。一旦作业无错误完成，`State` 列将显示“completed successfully”。\n\
  ```\nJob ID Sched time Contents State\n---------------- ---------- ------------------\
  \ -----------------------------\napress_oracle/83.1 none incremental backup running\
  \ since 2010/10/22.22:13\n```\n对于文件系统作业，使用 `--host` 或 `-h` 选项将输出限制为特定的客户端主机，如下所示：\n\
  ```\nob> lsjob --active --host BLLNX1\n```\n```\nJob ID Sched time Contents State\n\
  ---------------- ----------- ------------- --------------------------------\napress_admin/36.1\
  \ none backup BLLNX1 running since 2010/10/22.22:11\n```\n要监视活动作业，请使用 `lsjob` 命令。如果有多个活动作业在运行，您可以通过提供作业\
  \ ID 来过滤输出。但是，如果作业已经完成，您可以使用相同的命令，但需要移除 `-a` 选项并提供相应的作业 ID。我通常运行带有以下选项的 `lsjob`\
  \ 命令：\n```\nob> lsjob -a -l -j -o -R -L -C\n```\n前面的命令显示有关作业状态的详细信息。以下是一些示例输出：\n\
  ```\napress_oracle/83:\n  Type: database DB11R2 (dbid=4187425583)\n  Scheduled time:\
  \ none\n  Introduction time: 2010/10/22.22:12\n  Earliest exec time: 10/22.22:12\n\
  \  Last update time: 2010/10/22.22:12\n  Expire time: never\n  State: processed;\
  \ Oracle job(s) scheduled\n  Priority: 100\n  Run on host: (administrative server)\n\
  \  Attempts: 0\n  Log:\n\napress_oracle/83.1:\n  Type: incremental backup\n  Backup\
  \ piece: tclr1n5v_1_1\n  Family: APRESS_RMAN\n  Encryption: awaiting job completion\n\
  \  Scheduled time: none\n  Introduction time: 2010/10/21.22:12\n  Earliest exec\
  \ time: 10/21.22:12\n  Last update time: 2010/10/22.22:15\n  Expire time: never\n\
  \  State: running since 2010/10/22.22:15\n  Priority: 100\n  Run on host: BLLNX3\n\
  \  Requires: family APRESS_RMAN and any device\n  Attempts: 4\n  Processed: 744.7\
  \ MB\n  Log:\n  2010/10/22.22:12:35 Dispatching job to run on BLLNX3.\n  2010/10/22.22:12:46\
  \ Drive or volume on which mount attempted is unusable.\n  2010/10/22.22:13:52 Dispatching\
  \ job to run on BLLNX3.\n  2010/10/22.22:14:05 Drive or volume on which mount attempted\
  \ is unusable.\n  2010/10/22.22:14:52 Dispatching job to run on BLLNX3.\n  2010/10/22.22:15:11\
  \ Drive or volume on which mount attempted is unusable.\n  2010/10/22.22:15:52 Dispatching\
  \ job to run on BLLNX3.\n```\n\n\n在上面显示的输出中，`lsjob` 命令使用 `-a` 选项显示所有活动作业。除了显示作业\
  \ ID、计划时间、内容和作业状态等信息外，`-l` 选项还显示更多信息，例如 RMAN 备份片、介质家族、加密状态、优先级编号、作业运行的主机以及 OSB 尝试运行作业的次数。`--subjobs`\
  \ 或 `-j` 显示从属作业（子作业），这里是 `apress_oracle/83.1`。`--progress` 或 `-o` 选项显示活动作业的进度，目前已处理\
  \ 744.7 MB。`--requires` 或 `-R` 选项显示运行每个作业所需的资源，这里是介质家族 `APRESS_RMAN` 和任意设备。`--log`\
  \ 或 `-L` 选项显示与作业关联的日志，即输出底部显示的日志信息。`--times` 或 `-C` 选项显示每个作业的所有相关时间，例如引入时间、最早执行时间、最后更新时间和过期时间。\n\
  \n## 显示作业记录\n\n除了使用 `lsjob` 命令帮助监控 OSB 作业外，您还可以使用 `catxcr` 命令收集作业操作的详细信息。`--follow`\
  \ 或 `-f` 选项在文件增长时显示记录，这在监控活动作业时很有用。`--msgno` 或 `-m` 显示记录中每一行的编号。`--level` 或 `-l`\
  \ 选项指示消息级别，这对于生成调试或故障排除的附加信息很有用。例如：\n```\nob> catxcr -f -m -l 0 apress_oracle/88\n\
  ```\n\n如果您运行 RMAN 备份并为 `SBT_TAPE` 分配了两个 RMAN 通道，则会创建两个子作业。使用 `--subjobs` 选项的 `lsjob`\
  \ 命令显示每个子作业的详细信息。例如：\n```\nob> lsjob --active --subjobs\n\nJob ID Sched time Contents\
  \ State\n---------------- ----------- -------------------- -----------------------------\n\
  apress_oracle/88 none database DB11R2 (dbid=4187425583) processed; Oracle job(s)\
  \ scheduled\napress_oracle/88.1 none incremental backup running since 2010/10/22.23:34\n\
  apress_oracle/88.2 none incremental backup running since 2010/10/22.23:34\n```\n\
  \n上述输出显示了两个子作业 ID，即 `apress_oracle/88.1` 和 `apress_oracle/88.2`，分别对应两个 RMAN 通道中的一个。要显示特定子作业的记录，请提供子作业\
  \ ID `apress_oracle/88.2`，如下所示：\n```\nob> catxcr -f -m -l 0 apress_oracle/88.2\n\
  ```\n\n## 虚拟测试设备\n\n您可能对“经验是最好的老师”这句话深有体会。您已经阅读了本章，并希望亲自尝试 OSB 命令和示例。但是，您的环境中没有任何测试服务器连接物理磁带设备。在这种情况下，您将在哪里安装和试验\
  \ OSB 呢？好吧，您可以专门配置一个用于测试目的的虚拟测试设备。\n\n**注意** 你不应该在生产环境中实施虚拟测试设备。Oracle 支持不为虚拟测试设备提供支持。\n\
  \n要配置虚拟测试设备，请执行以下步骤。在此示例中，媒体服务器的主机名为 `BLLNX3`。\n\n1.  以 `oracle` 操作系统用户身份登录到 OSB\
  \ 管理域中指定的媒体服务器。\n```\n$ su - oracle\n```\n2.  在 OSB 媒体服务器上，创建一个用于存放虚拟存储元素和虚拟磁带设备的目录。确保您要在其上创建目录的挂载点有足够的磁盘空间。\n\
  ```\n$ mkdir /osb_vdevices\n```\n3.  以 `admin` 用户身份登录到 `obtool` 实用程序，并提供相应的密码。\n\
  ```\n$ obtool -u admin\nPassword:\n```\n4.  通过运行以下 `mkdev` 命令配置虚拟磁带库，使用 `-t` 选项指定设备为磁带库，使用\
  \ `-v` 选项指定为虚拟磁带库。`-S` 选项指定存储元素的数量。`-I` 选项指定导入和导出元素的数量。`-o` 选项指定该磁带设备在逻辑上可供 OSB\
  \ 使用。值为 `yes` 的 `-B` 选项指定存在条形码阅读器。`-a` 选项将虚拟库 `vlib1` 附加到主机 `BLLNX3` 的目录 `/osb_vdevices/vlib1`。\n\
  ```\nob> mkdev -t library -v -S20 -I2 -o -B yes -a BLLNX3:/osb_vdevices/vlib1 vlib1\n\
  ```\n5.  通过运行以下 `mkdev` 命令配置虚拟磁带设备，使用 `-t` 选项指定设备为磁带设备，使用 `-v` 选项指定为虚拟磁带设备。`-o`\
  \ 选项指定该磁带设备在逻辑上可供 OSB 使用。`-l` 选项指定关联的磁带库名称。`-d` 选项指定数据传输元素 (DTE)。`-a` 选项将虚拟磁带 `vdrive1`\
  \ 附加到主机 `BLLNX3` 的目录 `/osb_vdevices/vdrive1`。要配置额外的虚拟磁带设备，请运行相同的 `mkdev` 命令。但是，对于第二个虚拟磁带设备，将名称\
  \ `vdrive1` 和目录 `/osb_vdevices/vdrive1` 分别更改为 `vdrive2` 和 `/osb_vdevices/vdrive2`，依此类推。\n\
  ```\nob> mkdev -t tape -v -o -l vlib1 -d1 -a BLLNX3:/osb_vdevices/vdrive1 vdrive1\n\
  ```\n6.  运行 `insertvol` 命令手动将卷插入磁带库。`-L` 选项指定库名称，这里是 `vlib1`。由于在创建虚拟库时定义了 20 个存储元素，因此发出\
  \ `unlabeled 1-20` 来插入 20 个新卷。\n```\nob> insertvol -L vlib1 unlabeled 1-20\n```\n\
  7.  发出 `lsvol` 命令显示磁带库 `vlib1` 中的卷。\n```\nob> lsvol -l -L vlib1\n```\n\n## OSB 软件升级\n\
  \n您安装了旧版本的 OSB，并希望升级到当前版本。执行 OSB 升级的步骤类似于安装 OSB。但是，在执行 OSB 升级之前，请确保备份管理服务器中的 OSB\
  \ 目录，并停止管理域中所有主机上的 OSB 守护进程和服务。此外，先升级管理服务器，然后是媒体服务器和客户端主机。\n\n有关启动和停止 OSB 服务的特定于操作系统的命令，请参阅\
  \ `表 20–7`。您必须在 Linux/Unix 上具有 root 权限或是 Windows 的 Administrators 组成员才能运行这些命令。\n\
  \n`表 20–7.` OSB 服务关闭和启动命令\n\n| 操作系统 | 关闭命令 | 启动命令 |\n|----------|----------|----------|\n\
  | Linux | `/etc/init.d/observiced stop` | `/etc/init.d/observiced start` |\n| Solaris\
  \ | `/etc/init.d/OracleBackup stop` | `/etc/init.d/OracleBackup start` |\n| AIX\
  \ | `/etc/rc.d/init.d/OracleBackup stop` | `/etc/rc.d/init.d/OracleBackup start`\
  \ |\n| HP-UX | `/sbin/init.d/OracleBackup stop` | `/sbin/init.d/OracleBackup start`\
  \ |\n| Windows | `net stop observiced` | `net start observiced` |\n\n**提示** Oracle\
  \ Secure Backup 版本 10.3 与之前的版本（如 10.1 和 10.2）不向后兼容。\n\n## 总结\n\nOSB 是一个可用于将操作系统文件备份到磁带以及从磁带还原的工具。OSB\
  \ 是一个功能齐全的磁带管理实用程序。OSB 可以与 RMAN 集成，以促进数据库文件直接备份到磁带。这为您在整台服务器或数据中心发生故障时提供了额外的数据保护。\n\
  \nOSB 提供两个版本：Oracle Secure Backup Express 和 Oracle Secure Backup。Express 版本无需额外许可费用即可使用，适用于只有一台服务器和一台物理磁带设备的小型场所。功能齐全的\
  \ Oracle Secure Backup 版本适用于跨多个平台（Linux、Unix、Windows）的分布式服务器。\n\n您可以通过图形工具（如 Enterprise\
  \ Manager 和 OSB Web 工具）或命令行工具（如 `obtool`）访问 OSB。本章重点演示了如何使用命令行 `obtool` 进行备份和还原操作。\n\
  \n本章结束了关于备份和恢复的章节。下一章将重点介绍自动化作业和数据库故障排除。\n\n![](img/index-603_1.png)\n\n# 第 21 章\
  \ ■ 自动化作业\n\n## 使用 Oracle Scheduler 自动化作业\n\n\n\n# Oracle 调度器 (Oracle Scheduler)\n\
  \nOracle 调度器是一个工具，它提供了一种自动化作业调度的方法。Oracle 调度器通过内置的 PL/SQL 包 `DBMS_SCHEDULER` 来实现。它提供了一套复杂的功能用于调度作业。本章的后续章节仅涵盖使用\
  \ Oracle 调度器来自动化具有简单需求的作业的基础知识。\n\n**提示**：目前 `DBMS_SCHEDULER` 包中提供了近 70 个过程和函数。完整细节请参阅\
  \ *Oracle Database PL/SQL Packages and Types Reference* 指南（可在 OTN 上获取）。\n\n## 创建和调度作业\n\
  \n在清单 21–1 中，创建了一个包含 RMAN 备份命令的 shell 脚本。这个 shell 脚本被命名为 `rmanback.bsh`，位于 `/orahome/oracle/bin`\
  \ 目录中。该 shell 脚本还假定存在一个 `/orahome/oracle/bin/log` 目录。\n\n**清单 21–1.** 一个包含 RMAN\
  \ 备份命令的 Shell 脚本\n\n```bash\n#!/bin/bash\n"
- "# source oracle OS variables; see chapter 2 for an example of oraset script\n.\
  \ /var/opt/oracle/oraset RMDB1\nrman target / <<EOF\nspool log to '/orahome/oracle/bin/log/rmanback.log'\n\
  backup database;\nspool log off;\nEOF\nexit 0\n```\n\n在清单 21–2 中，你使用 `DBMS_SCHEDULER`\
  \ 包的 `CREATE_JOB` 过程来创建一个作业。\n以 SYS 用户身份运行（从 SQL*Plus）。\n\n**清单 21–2.** 使用 `CREATE_JOB`\
  \ 过程\n\n```sql\nBEGIN\n  DBMS_SCHEDULER.CREATE_JOB(\n    job_name      => 'RMAN_BACKUP',\n\
  \    job_type      => 'EXECUTABLE',\n    job_action    => '/orahome/oracle/bin/rmanback.bsh',\n\
  \    repeat_interval => 'FREQ=DAILY;BYHOUR=14;BYMINUTE=11',\n    start_date    =>\
  \ to_date('21–OCT-10'),\n    job_class     => '\"DEFAULT_JOB_CLASS\"',\n    auto_drop\
  \     => FALSE,\n    comments      => 'RMAN backup job',\n    enabled       => TRUE);\n\
  END;\n/\n```\n\n在清单 21–2 中，一些参数值得额外解释。`JOB_TYPE` 参数可以是以下类型之一：`STORED_PROCEDURE`、`PLSQL_BLOCK`\
  \ 或 `EXTERNAL`。在这个例子中，执行的是一个外部 shell 脚本，因此作业类型是 `EXTERNAL`。如果你有一个想要运行的 PL/SQL 存储过程，则使用\
  \ `STORED_PROCEDURE` 类型。`PLSQL_BLOCK` 类型允许你直接运行一个匿名的 PL/SQL 块。\n\n`REPEAT_INTERVAL`\
  \ 参数被设置为 `FREQ=DAILY;BYHOUR=14;BYMINUTE=11`。这指示作业每天运行，在 14:00（24 小时制）过 11 分运行（换句话说，每天下午\
  \ 2:11 运行）。`CREATE_JOB` 的 `REPEAT_INTERVAL` 参数能够实现复杂的日历频率。例如，它支持各种年度、月度、每周、每日、每小时、每分钟和每秒的计划。*Oracle\
  \ Database PL/SQL Packages and Types Reference* 指南仅针对 `REPEAT_INTERVAL` 参数就包含数页的语法细节。\n\
  \n`JOB_CLASS` 参数指定将作业分配到哪个作业类。通常，你会创建一个作业类，以提供一种方法，让作业通过被分配到特定类来自动继承属性。例如，你可能希望某个特定类中的所有作业具有相同的日志记录级别或以相同的方式清除日志文件。如果你尚未创建任何作业类，可以使用默认的作业类。此示例使用了默认作业类。\n\
  \n在此示例中，`AUTO_DROP` 参数被设置为 `FALSE`。这指示 Oracle 调度器不要在作业运行后自动删除它。我希望这个作业持久存在并按照计划的频率运行。\n\
  \n## 查看作业详情\n\n要查看作业配置的详细信息，请查询 `DBA_SCHEDULER_JOBS` 视图。清单 21–3 选择了 `RMAN_BACKUP`\
  \ 作业的信息：\n\n**清单 21–3.** `RMAN_BACKUP` 作业的信息\n\n```sql\nSELECT\n  job_name\n  ,last_start_date\n\
  \  ,last_run_duration\n  ,next_run_date\n  ,repeat_interval\nFROM dba_scheduler_jobs\n\
  WHERE job_name='RMAN_BACKUP';\n```\n\n以下是输出的一个片段（输出已换行以适应页面）：\n\n```\nJOB_NAME \
  \    LAST_START_DATE               LAST_RUN_DURATION   NEXT_RUN_DATE           REPEAT_INTERVAL\n\
  ------------ ----------------------------- ------------------- -----------------------\
  \ -------------------\nRMAN_BACKUP  21–OCT-10 02.12.59.257151 PM  +000000000 00:00:\
  \   22-OCT-10 02.11.0.3000  FREQ=DAILY;BYHOUR\n             -06:00             \
  \           41.933585 -06:00    PM -06:00               =14;BYMINUTE=11\n```\n\n\
  每次作业运行时，作业执行的记录都会被记录在数据字典中。要检查每次作业执行的状态，请查询 `DBA_SCHEDULER_JOB_LOG`。应该对作业的每次运行都有一条记录，如下所示：\n\
  \n```sql\nSELECT\n  job_name\n  ,log_date\n  ,operation\n  ,status\nFROM dba_scheduler_job_log\n\
  WHERE job_name='RMAN_BACKUP';\n```\n\n以下是一些示例输出：\n\n```\nJOB_NAME     LOG_DATE \
  \                             OPERATION STATUS\n------------ -------------------------------------\
  \ --------- ----------\nRMAN_BACKUP  21–OCT-10 02.13.41.196695 PM -06:00  RUN  \
  \     SUCCEEDED\n```\n\n## 修改作业日志记录历史\n\n默认情况下，Oracle 调度器保留 30 天的日志历史记录。你可以通过 `SET_SCHEDULER_ATTRIBUTE`\
  \ 过程来修改默认的保留期限。例如，这会将默认天数更改为 15 天：\n\n\n# 第 21 章 ■ 自动化作业\n\nSQL> exec `dbms_scheduler.set_scheduler_attribute('log_history',15);`\n\
  要完全清除日志历史记录的内容，请使用 `PURGE_LOG` 过程：\nSQL> exec `dbms_scheduler.purge_log();`\n\n\
  ## 修改作业\n\n你可以通过 `SET_ATTRIBUTE` 过程修改作业的各种属性。此示例将 `RMAN_BACKUP` 作业修改为每周一运行：\n\n\
  ```\nBEGIN\n  dbms_scheduler.set_attribute(\n    name=>'RMAN_BACKUP'\n    ,attribute=>'repeat_interval'\n\
  \    ,value=>'freq=weekly; byday=mon');\nEND;\n/\n```\n\n对于这个特定示例，你可以通过从 `DBA_SCHEDULER_JOBS`\
  \ 中选择 `REPEAT_INTERVAL` 列来验证更改。以下是运行上一节“查看作业详情”中的查询所产生的输出：\n\n```\nJOB_NAME    LAST_START_DATE\
  \          LAST_RUN_DURATION       NEXT_RUN_DATE           REPEAT_INTERVAL\n-----------\
  \ ----------------------- ----------------------- ----------------------- -----------------\n\
  RMAN_BACKUP 21-OCT-10 02.12.59.257 +000000000 00:00:41.93 25-OCT-10 12.00.00.000\
  \ freq=weekly; byday=mon\n            06:00 PM - 06:00        3385 PM - 06:00  \
  \       AM - 06:00\n```\n\n根据之前的输出，作业将在下一个周一运行，并且由于修改作业时没有指定 `BYHOUR` 和 `BYMINUTE`\
  \ 选项，它现在被安排在默认时间 12:00 a.m. 运行。\n\n## 停止作业\n\n如果你有一个运行时间异常长的作业，你可能希望中止它。使用 `STOP_JOB`\
  \ 过程来停止当前正在运行的作业。此示例在 `RMAN_BACKUP` 作业运行时停止它：\n\nSQL> exec `dbms_scheduler.stop_job(job_name=>'RMAN_BACKUP');`\n\
  \n`DBA_SCHEDULER_JOB_LOG` 的 `STATUS` 列将为使用 `STOP_JOB` 过程停止的作业显示 `STOPPED`。\n\n##\
  \ 禁用作业\n\n你可能希望暂时禁用一个作业，因为它运行不正确。你需要确保在排查问题期间该作业不会运行。使用 `DISABLE` 过程来禁用作业：\nSQL>\
  \ exec `dbms_scheduler.disable('RMAN_BACKUP');`\n\n如果作业当前正在运行，请考虑先停止作业或使用 `DISABLE`\
  \ 过程的 `FORCE` 选项：\nSQL> exec `dbms_scheduler.disable(name=>'RMAN_BACKUP',force=>true);`\n\
  \n## 启用作业\n\n你可以通过 `DBMS_SCHEDULER` 包的 `ENABLE` 过程来启用先前禁用的作业。此示例重新启用 `RMAN_BACKUP`\
  \ 作业：\nSQL> exec `dbms_scheduler.enable(name=>'RMAN_BACKUP');`\n\n> **提示** 你可以通过选择\
  \ `DBA_SCHEDULER_JOBS` 的 `ENABLED` 列来检查作业是否已被禁用或启用。\n\n## 复制作业\n\n如果你有一个想要克隆的现有作业，你可以使用\
  \ `COPY_JOB` 过程来实现。此过程接受两个参数：旧作业名称和新作业名称。以下是一个复制作业的示例，其中 `RMAN_BACKUP` 是先前创建的作业，`RMAN_NEW_BACK`\
  \ 是将要创建的新作业：\n\n```\nbegin\n  dbms_scheduler.copy_job('RMAN_BACKUP','RMAN_NEW_BACK');\n\
  end;\n/\n```\n\n复制的作业将被创建但未启用。你必须首先启用该作业（参见本章前面的部分），它才会运行。\n\n## 手动作业运行\n\n你可以在其常规计划之外手动作业运行。你可能希望这样做来测试作业以确保其正常工作。使用\
  \ `RUN_JOB` 过程手动启动作业。此示例手动运行先前创建的 `RMAN_BACKUP` 作业：\n\n```\nBEGIN\n  DBMS_SCHEDULER.RUN_JOB(\n\
  \    JOB_NAME => 'RMAN_BACKUP',\n    USE_CURRENT_SESSION => FALSE);\nEND;\n/\n```\n\
  \n`USE_CURRENT_SESSION` 参数指示 Oracle 调度程序是否以当前用户身份运行作业。`FALSE` 值表示以作业常规计划运行时所使用的用户身份运行该作业（异步方式）。\n\
  \n## 删除作业\n\n如果你不再需要某个作业，应将其从调度程序中删除。使用 `DROP_JOB` 过程永久删除作业。此示例移除 `RMAN_BACKUP`\
  \ 作业：\n\n```\nBEGIN\n  dbms_scheduler.drop_job(job_name=>'RMAN_BACKUP');\nEND;\n\
  /\n```\n\n此代码将删除作业，并从 `DBA_SCHEDULER_JOBS` 视图中移除有关该已删除作业的任何信息。\n\n## Oracle 调度程序\
  \ vs cron\n\n数据库管理员经常争论是应该使用 Oracle 调度程序还是 Linux/Unix 的 `cron` 实用程序来安排和自动化任务。Oracle\
  \ 调度程序相对于 `cron` 的优势包括：\n\n- 可以使作业的执行依赖于另一作业的完成\n- 强大的资源平衡和灵活的计划功能\n- 可以基于数据库事件运行作业\n\
  - Oracle 调度程序 `DBMS_SCHEDULER` PL/SQL 包语法无论操作系统如何都保持一致\n- 可以使用数据字典运行状态报告\n- 如果在集群环境中工作，无需担心为集群中的每个节点同步多个\
  \ `cron` 表\n- 可以通过企业管理器进行维护和监控\n\nOracle 调度程序通过 `DBMS_SCHEDULER` PL/SQL 包实现。使用此实用程序创建和维护作业相当容易（如本章前面所示）。虽然\
  \ Oracle 调度程序有许多优点，但许多 DBA 更喜欢使用 `cron` 等调度实用程序。使用 `cron` 的优势包括：\n\n- 易于使用；简单、久经考验且可靠；创建和/或修改作业只需几秒钟\n\
  - 几乎在所有 Linux/Unix 机器上普遍可用；在很大程度上，无论 Linux/Unix 平台如何，其运行方式几乎相同（是的，存在细微差异）\n- 数据库无关；独立于数据库运行，无论数据库供应商或数据库版本如何，其工作方式都相同\n\
  - 无论数据库是否可用，都能工作\n\n前面的列表并非详尽无遗，但应该让你了解每种调度工具的用途。我倾向于使用 `cron`，但如果你需要更复杂的调度程序，那么可以考虑使用\
  \ Oracle 调度程序。本章接下来的几节将提供有关如何通过 `cron` 实现和调度自动化作业的信息。\n\n## 通过 cron 自动化作业\n\n`cron`\
  \ 程序是 Linux/Unix 环境中普遍存在的作业调度实用程序。该工具的名称源自 *chronos*（希腊语中的时间）。`cron`（调度程序的行话）工具允许你安排脚本或命令在指定时间运行，并按指定的频率重复。\n\
  \n### cron 工作原理\n\n当你的 Linux 服务器启动时，会自动启动一个 `cron` 后台进程来管理系统上的所有 `cron` 作业。此 `cron`\
  \ 后台进程也称为 `cron` 守护进程。该进程在系统启动时通过 `/etc/init.d/crond` 脚本启动。你可以使用 `ps` 命令检查 `cron`\
  \ 守护进程是否正在运行：\n\n```\n$ ps -ef | grep crond | grep -v grep\nroot      3049     1\
  \  0 Aug02 ?        00:00:00 crond\n```\n\n你也可以使用 `service` 命令检查 `cron` 守护进程是否正在运行：\n\
  \n```\n$ /sbin/service crond status\ncrond (pid  3049) is running...\n```\n\nroot\
  \ 用户在执行系统 `cron` 作业时使用几个文件和目录。`/etc/crontab` 文件包含要运行的系统 `cron` 作业的命令。以下是 `/etc/crontab`\
  \ 文件内容的典型列表：\n\n```\nSHELL=/bin/bash\nPATH=/sbin:/bin:/usr/sbin:/usr/bin\nMAILTO=root\n\
  HOME=/\n```\n\n\n# **run-parts**\n\n```bash\n01 * * * * root run-parts /etc/cron.hourly\n\
  02 4 * * * root run-parts /etc/cron.daily\n22 4 * * 0 root run-parts /etc/cron.weekly\n\
  42 4 1 * * root run-parts /etc/cron.monthly\n```\n\n## **第 21 章 ■ 自动化任务**\n\n这个\
  \ `/etc/crontab` 文件使用 `run-parts` 工具来运行位于以下目录中的脚本：`/etc/cron.hourly`、`/etc/cron.daily`、`/etc/cron.weekly`\
  \ 和 `/etc/cron.monthly`。如果有一个需要运行的系统工具，其执行周期并非每小时、每天、每周或每月一次，那么可以将其放置在 `/etc/cron.d`\
  \ 目录中。\n\n每个用户都可以创建自己的 `crontab`（也称为 cron 表）文件。该文件包含了你希望在特定时间和间隔运行的程序列表。此文件通常位于\
  \ `/var/spool/cron` 目录中。对于每一个创建了 cron 表的用户，在 `/var/spool/cron` 目录下都会有一个以该用户名命名的文件。作为\
  \ `root` 用户，你可以列出该目录中的文件：\n\n```bash\n"
- '# ls /var/spool/cron

  oracle root

  ```


  `cron` 后台进程大部分时间处于空闲状态。它每分钟唤醒一次，并检查 `/etc/crontab`、`/etc/cron.d` 以及用户 cron 表文件，以确定是否有任何需要执行的任务。


  表 21–1 总结了 `cron` 使用的各种文件和目录的用途。了解这些文件和目录将有助于你排查问题并更详细地理解 `cron`。


  ### **表 21–1. cron 工具使用的文件和目录描述**


  | 文件 | 用途 |

  | :--- | :--- |

  | `/etc/init.d/crond` | 在系统启动时启动 cron 守护进程。 |

  | `/var/log/cron` | 与 cron 进程相关的系统消息。对于故障排除很有用。 |

  | `/var/spool/cron/<用户名>` | 用户的 crontab 文件存储在 `/var/spool/cron` 目录中。 |

  | `/etc/cron.allow` | 指定可以创建 cron 表的用户。 |

  | `/etc/cron.deny` | 指定不允许创建 cron 表的用户。 |

  | `/etc/crontab` | 系统 cron 表，其命令用于运行位于以下目录中的脚本：`/etc/cron.hourly`、`/etc/cron.daily`、`/etc/cron.weekly`
  和 `/etc/cron.monthly`。 |

  | `/etc/cron.d` | 一个目录，包含需要以非每小时、每天、每周或每月周期运行的任务的 cron 表。 |

  | `/etc/cron.hourly` | 包含需要每小时运行的系统脚本的目录。 |

  | `/etc/cron.daily` | 包含需要每天运行的系统脚本的目录。 |

  | `/etc/cron.weekly` | 包含需要每周运行的系统脚本的目录。 |

  | `/etc/cron.monthly` | 包含需要每月运行的系统脚本的目录。 |


  ## **启用对 cron 的访问权限**


  有时，系统管理员在设置新系统时，默认不会为所有用户启用 `cron` 功能。要验证你是否有权限访问 `cron`，请键入以下命令：


  ```bash

  $ crontab -e

  ```


  如果你收到以下错误消息，则表示你没有权限：`You (oracle) are not allowed to use this program (crontab)`


  要以 `root` 用户身份启用 `cron` 访问权限，可以使用 `echo` 命令将 `oracle` 用户添加到 `/etc/cron.allow` 文件中：


  ```bash

  '
- "# echo oracle >> /etc/cron.allow\n```\n\n一旦 `oracle` 条目被添加到 `/etc/cron.allow` 文件中，你就可以使用\
  \ `crontab` 工具来调度任务了。\n\n> **注意：** 你也可以使用编辑工具（如 `vi`）向 `cron.allow` 文件添加条目。\n\n\
  `root` 用户始终可以使用 `crontab` 工具调度任务。其他用户必须被列在 `/etc/cron.allow` 文件中。如果 `/etc/cron.allow`\
  \ 文件不存在，那么该操作系统用户不得出现在 `/etc/cron.deny` 文件中。如果既不存在 `/etc/cron.allow` 文件，也不存在 `/etc/cron.deny`\
  \ 文件，那么只有 `root` 用户可以访问 `crontab` 工具。\n\n> **注意：** 在某些 Unix 操作系统（例如 Solaris）上，`cron.allow`\
  \ 和 `cron.deny` 文件位于 `/etc/cron.d` 目录中。\n\n## **理解 cron 表条目**\n\n你的 cron 表是一个由数字和命令组成的列表，`cron`\
  \ 后台进程（`cron` 守护进程）将在指定的时间和计划下运行它们。`crontab` 工具要求条目遵循明确定义的格式。\n\n在你的 `crontab` 文件开头添加一行注释来记录所需格式是一个好主意：\n\
  \n\n\n# 第 21 章 ■ 自动化工件\n\n# 分(0-59) 时(0-23) 日(1-31) 月(1-12) 周(0/7-6) 命令或脚本\n\n在上一行中，cron\
  \ 文件中的井号 (`#`) 表示注释的开始。输入到 `#` 之后的任何文本都会被 cron 忽略。\n\n`crontab` 中的每个条目都是包含六个字段的单行。前五个字段指定了执行时间和频率。这些条目可以用逗号或连字符分隔。逗号表示条目的多个值，而连字符表示一个值范围。条目也可以是星号\
  \ (`*`)，表示所有可能的值都生效。下面有一个例子来帮助澄清。\n\n以下条目在星期一至星期五的上午 8 点到下午 4 点半之间，每半小时发送一封主题为“wake\
  \ up”的电子邮件：\n\n```\n0,30 8-16 * * 1-5 echo \"wake up\" | mailx -s \"wake up\" larry@oracle.com\n\
  ```\n\n在一些 Linux 系统上，您可以通过在条目后跟上 `/<整数>` 来在某个范围内跳过一个值。\n\n例如，如果您想每隔一分钟运行一个任务，可以在分钟列使用\
  \ `0-59/2`。您也可以将斜杠 (`/`) 与星号结合使用来跳过值。例如，要每四分钟运行一个任务，您会在分钟列使用 `*/4`。\n\n`crontab`\
  \ 中的第六个字段可以是一个或多个 Linux 命令或一个 shell 脚本。或者换句话说，第六列可以是您在 Linux 命令行中能一行运行的任何命令组合或一个脚本。\n\
  \n`cron` 工具有几个需要进一步解释的特殊之处。第五列是星期几。星期日由 `0` 或 `7` 指定，星期一由 `1` 指定，星期二由 `2` 指定，依此类推，直到星期六，用\
  \ `6` 表示。\n\n第二列中的小时数采用 24 小时制，范围从 `0` 到 `23`。第四列（月份）和第五列（星期几）可以用数值表示，也可以用三个字母的缩写表示。例如，`crontab`\
  \ 中的以下条目使用了月份和星期的三字母缩写：\n\n```\n0,30 8-16 * Jan-Dec Mon-Fri echo \"wake up\" | mailx\
  \ -s \"get up\" larry@oracle.com\n```\n\n似乎还有一些重叠的列，例如第三列（日）和第五列（星期几）。这些列允许您为需要在特定时间表（如每月的\
  \ 1 号和 15 号或每周二）运行的任务创建灵活的计划。在您不使用的列中放入一个星号。如果您需要在 1 号、15 号和每周二运行一个任务，那么就填写这两个列。\n\
  \n如果您从 `cron` 运行一个包含对 Oracle 实用程序（如 `sqlplus` 或 `rman`）调用的 shell 脚本，请确保您实例化（source）任何必需的操作系统变量，例如\
  \ `ORACLE_SID` 和 `ORACLE_HOME`。\n\n如果您不 source 这些变量，当您的 shell 脚本从 `cron` 运行时，您会看到如下错误：\n\
  \n```\nsqlplus: command not found\n```\n\n当 `cron` 以用户身份运行脚本时，它不会运行该用户的启动或登录文件（如\
  \ `.bashrc`）。因此，任何（从 `cron` 运行的）脚本都需要显式设置任何必需的变量。您可以在脚本中直接设置变量，或者调用另一个导出这些变量的脚本（如\
  \ Oracle 的 `oraenv` 脚本）。\n\n**提示** 不要将在 `cron` 中输入的所有任务都安排在同一时间运行。相反，应将它们分散开，以免在任何特定时间点拖慢\
  \ `cron` 或系统。\n\n## 安排任务自动运行\n\n要安排一个任务，您必须在您的 cron 表中添加一行，指定您希望任务执行的时间。\n\n在您的\
  \ cron 表中有两种添加条目的方法：\n- 直接编辑 cron 表文件\n- 从文件加载 cron 表\n\n这两种技术将在以下章节中描述。\n\n## 从文件加载\
  \ cron 表\n\n另一种修改 cron 表的方法是使用以下语法，通过文件名直接加载它：\n```\n$ crontab <文件名>\n```\n\n这里\
  \ `crontab` 工具将把指定文件的内容加载到您的 cron 表中。使用此方法修改 cron 表的推荐步骤如下：\n\n1.  首先创建一个包含您现有 cron\
  \ 表内容的文件，像这样：\n    ```\n    $ crontab -l > mycron.txt\n    ```\n\n下面列出了数据库服务器上 cron\
  \ 表的一个示例条目：\n\n```\n#---------------------------------------------------------------------------------\n"
- '# 分(0-59) 时(0-23) 日(1-31) 月(1-12) 周(0/7-6) 命令或脚本

  #---------------------------------------------------------------------------------


  '
- '# RMAN 备份，dk：2010 年 5 月 1 日，已更新。

  1 16 * * * /u01/oracle/bin/rmanback.bsh INV >/u01/oracle/bin/log/bck.log 2>&1


  #-----------------------------------------------------------------

  '
- '# 表空间检查，sp：2009 年 7 月 17 日，已创建。

  5 * * * * /u01/oracle/bin/tbsp_chk.bsh INV 10 1>/u01/oracle/bin/log/tbsp.log 2>&1

  #-----------------------------------------------------------------

  ```


  请注意上述 cron 表条目中的几个方面。我总是在每个 cron 表（在每个数据库服务器上）的顶部放置一行，简要描述日期调度功能的含义：

  ```

  '
- '# 分(0-59) 时(0-23) 日(1-31) 月(1-12) 周(0/7-6) 命令或脚本

  ```


  我还用注释行分隔每个条目。这使得 cron 表条目更加易读：

  ```

  #-----------------------------------------------------------------

  ```


  我还会放一个简短的注释（附上我的姓名首字母）描述 cron 任务是什么，以及我上次编辑该 cron 条目的时间：

  ```

  '
- "# RMAN 备份，dk：2010 年 5 月 1 日，已更新。\n```\n\n如果您管理着数十个数据库服务器（每个都有自己的 cron 任务）并且有多个\
  \ DBA，您将需要某种机制（而且不必很复杂）来跟踪谁做了更改以及何时做的。\n\n2.  接下来，在编辑 cron 表之前制作一个副本。这允许您在引入错误且无法轻易找出问题所在时，恢复到原始状态。这也为您提供了\
