- "# 截断大型日志文件\n\n有时，日志文件可能变得非常大，并通过填满关键挂载点而导致问题。`listener.log` 将记录有关数据库传入连接的信息。对于活跃系统，此文件可能迅速增长到数\
  \ GB。对于我的大多数环境，`listener.log` 文件中的信息无需出于任何原因保留。如果出现 Oracle Net 连接问题，则可以检查该文件以帮助进行故障排除。\n\
  \n`listener.log` 文件是正在写入的，因此您不应该直接删除它。如果您删除了该文件，监听器进程不会重新创建该文件并再次开始写入。您必须停止并重新启动监听器才能恢复其对\
  \ `listener.log` 文件的写入。但是，您可以清空或截断 `listener.log` 文件。在 Linux/Unix 环境中，这通过以下技术完成：\n\
  ```\n$ cat /dev/null >listener.log\n```\n\n前面的命令用 `/dev/null`（Linux/Unix 系统上的一个默认文件，内容为空）的内容替换\
  \ `listener.log` 文件的内容。上一行代码的结果是 `listener.log` 文件被截断，监听器可以继续主动向其中写入。\n\n**清单 21–5.**\
  \ 截断默认 `listener.log` 的脚本\n```\n#!/bin/bash\n#\nif [ $# -ne 1 ]; then\n    echo\
  \ \"Usage: $0 SID\"\n    exit 1\nfi\n# 关于设置操作系统变量的详细信息请参见第 2 章\n# 使用 oraset 脚本加载\
  \ oracle 操作系统变量\n. /var/opt/oracle/oraset $1\n#\nMAILX='/bin/mailx'\nMAIL_LIST='dkuhn@sun.com'\n\
  #\nif [ -f $TNS_ADMIN/../log/listener.log ]; then\n    cat /dev/null > $TNS_ADMIN/../log/listener.log\n\
  fi\nif [ $? -ne 0 ]; then\n    echo \"trunc list. problem\" | $MAILX -s \"trunc\
  \ list. problem $1\" $MAIL_LIST\nelse\n    echo \"no problem...\"\nfi\n# 一个命名的监听器日志文件\n\
  if [ -f $TNS_ADMIN/../log/appinvprd.log ]; then\n    cat /dev/null > $TNS_ADMIN/../log/appinvprd.log\n\
  fi\nif [ $? -ne 0 ]; then\n    echo \"trunc list. problem\" | $MAILX -s \"trunc\
  \ list. problem $1\" $MAIL_LIST\nelse\n    echo \"no problem...\"\nfi\n#\nexit 0\n\
  ```\n\n以下的 `cron` 条目每月运行一次前述脚本：\n```\n# 每月截断日志文件一次。\n30 6 1 * * /orahome/oracle/bin/trunc_log.bsh\
  \ DWREP\n1>/orahome/oracle/bin/log/trunc_log.log 2>&1\n```\n> （注意：此 `cron` 表条目被分成两行以适应页面。在\
  \ `cron` 表中，它需要位于一行。）\n\n"
- "# 检查被锁定的生产账户\n\n通常，我会配置一个数据库配置文件，指定数据库账户在指定次数的登录尝试失败后被锁定。例如，我将 `DEFAULT` 配置文件的\
  \ `FAILED_LOGIN_ATTEMPTS` 设置为 `5`。有时会发生的情况是，某个恶意用户或开发人员试图猜测生产账户密码，经过 5 次尝试后，这会锁定生产账户。当这种情况发生时，我需要尽快知晓，以便调查问题然后解锁账户。\n\
  \n**清单 21–6.** 用于检查 `DBA_USERS` 中 `LOCK_DATE` 值的 shell 脚本\n```\n#!/bin/bash\nif\
  \ [ $# -ne 1 ]; then\n    echo \"Usage: $0 SID\"\n    exit 1\nfi\n# 加载 oracle 操作系统变量\n\
  . /var/opt/oracle/oraset $1\n#\ncrit_var=$(sqlplus -s <<EOF\n/ as sysdba\nSET HEAD\
  \ OFF FEED OFF\nSELECT count(*)\nFROM dba_users\nWHERE lock_date IS NOT NULL\nAND\
  \ username in ('CIAP','REPV','CIAL','STARPROD');\nEOF)\n#\nif [ $crit_var -ne 0\
  \ ]; then\n    echo $crit_var\n    echo \"locked acct. issue with $1\" | mailx -s\
  \ \"locked acct. issue\" dkuhn@sun.com\nelse\n    echo $crit_var\n    echo \"no\
  \ locked accounts\"\nfi\nexit 0\n```\n\n此 shell 脚本从诸如 `cron` 的调度工具调用。例如，此 `cron`\
  \ 条目指示作业每十分钟运行一次：\n```\n# 检测被锁定的数据库账户的作业\n0,10,20,30,40,50 * * * * /home/oracle/bin/lock.bsh\
  \ DWREP\n1>/home/oracle/bin/log/lock.log 2>&1\n```\n\n通过这种方式，当生产数据库账户之一被锁定时，我会收到通知。在此\
  \ `cron` 条目中，代码应位于一行。本书中将其置于两行是为了适应页面排版。\n\n"
- "# 检查超过一定期限的文件\n\n对于我从 shell 脚本运行的一些作业（如备份），我会首先检查另一个备份作业是否已经在运行。该检查涉及查找一个锁文件。如果锁文件存在，则\
  \ shell 脚本退出。\n\n如果锁文件不存在，则创建一个。在作业结束时，锁文件被删除。\n\n有时发生的情况是作业出现问题，并在删除锁文件之前异常中止。在这些情况下，我想知道服务器上是否存在超过一天的旧锁文件。存在旧锁文件表明出现问题，因此我需要调查。**清单\
  \ 21–7** 检查 `/tmp` 目录中任何超过一天的锁文件。\n\n**清单 21–7.** 用于检查 `/tmp` 目录中任何超过一天锁文件的脚本\n\
  ```\n#!/bin/bash\nBOX=$(uname -a | awk '{print $2}')\n# 查找所有超过 1 天的旧锁文件。\n# 在 /tmp\
  \ 中查找所有锁文件，如果找到，则查找任何超过一天的\nls /tmp/*.lock 2>/dev/null && \\\nfilevar=$(find /tmp/*lock\
  \ -type f -mtime +1 | wc -l) || filevar=0\nif [ $filevar -gt 0 ]; then\n    echo\
  \ \"$BOX, lockfile issue: $filevar\" | \\\n    mailx -s \"$BOX lockfile problem\"\
  \ dkuhn@sun.com\nelse\n    echo \"Lock file ok: $filevar\"\nfi\nexit 0\n```\n\n\
  我通常每天检查锁文件的存在。以下是一个典型的 `cron` 条目，用于运行名为 `lock_chk.bsh` 的前述脚本：\n```\n```\n\n\n"
- "# 锁文件数量检查\n\n`33 5 * * * /orahome/oracle/bin/lock_chk.bsh`\n\n`1>/orahome/oracle/bin/log/lock_chk.log\
  \ 2>&1`\n\n（注意：此 cron 条目的代码本应位于一行。为适应页面，本书中将其置于两行。）\n\n## 检查进程数量是否过多\n\n在某些数据库服务器上，可能存在许多后台\
  \ SQL*Plus 作业。这些批处理作业可能执行诸如从远程数据库复制数据、大型日常更新等任务。在这些环境中，了解当前是否有异常数量的 shell 脚本在运行，或者数据库服务器上是否有异常数量的\
  \ SQL*Plus 进程在运行，是非常有用的。异常数量的作业可能表明某些任务已损坏或挂起。\n\n清单 21–8 中的 shell 脚本包含两个检查：一个检查名称以\
  \ `bsh` 结尾的 shell 脚本数量，另一个检查包含 `sqlplus` 字符串的进程数量：\n\n**清单 21–8. 运行两个检查的脚本**\n\n\
  ```bash\n#!/bin/bash\n#\nif [ $# -ne 0 ]; then\n  echo \"Usage: $0\"\n  exit 1\n\
  fi\n#\ncrit_var=$(ps -ef | grep -v grep | grep bsh | wc -l)\nif [ $crit_var -lt\
  \ 20 ]; then\n  echo $crit_var\n  echo \"processes running normal\"\nelse\n  echo\
  \ \"too many processes\"\n  echo $crit_var | mailx -s \"too many bsh procs: $1\"\
  \ dkuhn@sun.com\nfi\n#\ncrit_var=$(ps -ef | grep -v grep | grep sqlplus | wc -l)\n\
  if [ $crit_var -lt 30 ]; then\n  echo $crit_var\n  echo \"processes running normal\"\
  \nelse\n  echo \"too many processes\"\n  echo $crit_var | mailx -s \"too many sqlplus\
  \ procs: $1\" dkuhn@sun.com\nfi\n#\nexit 0\n```\n\n上述 shell 脚本名为 `proc_count.bsh`，并由\
  \ cron 作业每小时运行一次：\n\n## 进程数量检查\n\n`33 * * * * /home/oracle/bin/proc_count.bsh`\n\
  \n`1>/home/oracle/bin/log/proc_count.log 2>&1`\n\n（注意：此 cron 条目的代码本应位于一行。为适应页面，本书中将其置于两行。）\n\
  \n## 验证 RMAN 备份的完整性\n\n作为备份和恢复策略的一部分，您应定期验证备份文件的完整性。RMAN 提供了 `RESTORE...VALIDATE`\
  \ 命令，用于检查备份文件中的物理损坏。清单 21–9 是一个启动 RMAN 并将输出记录到日志文件的脚本。随后会搜索日志文件中是否包含关键字 “error”。如果日志文件中有任何错误，则会发送电子邮件。\n\
  \n**清单 21–9. 启动 RMAN 并记录日志文件的脚本**\n\n```bash\n#!/bin/bash\n#\nif [ $# -ne 1 ]; then\n\
  \  echo \"Usage: $0 SID\"\n  exit 1\nfi\n# source oracle OS variables\n. /var/opt/oracle/oraset\
  \ $1\n#\ndate\nBOX=`uname -a | awk '{print$2}'`\nrman nocatalog <<EOF\n  connect\
  \ target /\n  spool log to $HOME/bin/log/rman_val.log\n  set echo on;\n  restore\
  \ database validate;\nEOF\ngrep -i error $HOME/bin/log/rman_val.log\nif [ $? -eq\
  \ 0 ]; then\n  echo \"RMAN verify issue $BOX, $1\" | \\\n  mailx -s \"RMAN verify\
  \ issue $BOX, $1\" dkuhn@sun.com\nelse\n  echo \"no problem...\"\nfi\n#\ndate\n\
  exit 0\n```\n\n`RESTORE...VALIDATE` 命令并不会实际恢复任何文件；它仅验证恢复数据库所需的文件是否可用，并检查物理损坏。\n\n\
  如果您还需要检查逻辑损坏，请指定 `CHECK LOGICAL` 子句。例如，要检查逻辑损坏，清单 21–6 中将包含如下行：`restore database\
  \ validate check logical;`\n\n对于大型数据库，验证过程可能非常耗时（因为它会检查备份文件中的每个块是否存在损坏）。如果您只想检查备份文件是否存在，请指定\
  \ `VALIDATE HEADER` 子句，如下所示：\n\n`restore database validate header;`\n\n此命令仅检查每个用于恢复的文件的头部是否包含有效信息。\n\
  \n## 总结\n\n自动化常规数据库作业是成功 DBA 的关键属性。自动化作业确保任务可重复、可验证，并且在任何问题出现时您都能立即得到通知。\n\nDBA\
  \ 的工作依赖于成功运行备份并确保数据库高可用性。本章包含多个脚本和示例，详细说明了如何以定义的频率运行常规作业。\n\n如果您是 Linux/Unix 环境下的\
  \ DBA，您应该熟悉 `cron` 实用程序。该调度器简单易用，且几乎普遍可用。即使您当前工作中没有使用 `cron`，您未来也肯定会遇到它。\n\nOracle\
  \ 提供了 Oracle Scheduler 实用程序（通过 `DBMS_SCHEDULER` PL/SQL 包实现）来调度作业。此工具可用于自动化任何类型的数据库任务。您还可以基于系统事件或其他调度作业的成功/失败来启动作业。我更倾向于使用\
  \ `cron` 来调度数据库作业。然而，您可能有复杂的调度要求，需要使用像 Oracle Scheduler 这样的工具。\n\n至此，您已经学习了如何实现和执行\
  \ DBA 所需的许多任务。即使您只管理一个数据库，毫无疑问，您也卷入了大量的故障排除活动。本书的下一章将重点介绍诊断和解决 DBA 遇到的许多问题。\n\n\
  ![](img/index-629_1.png)\n\n## 检查数据库可用性\n\n我执行的前几项检查不需要 DBA 登录到数据库服务器。相反，它们可以通过\
  \ SQL*Plus 和操作系统命令远程执行。事实上，我所有的初始检查都是通过网络远程执行的；这可以确定所有系统组件是否正常工作。\n\n一个快速检查远程服务器是否可用、数据库是否启动、网络是否正常以及侦听器是否接受传入连接的方法是：通过\
  \ SQL*Plus 客户端通过网络连接到远程数据库。我通常会在所有数据库中创建一个标准的数据库帐户和密码，用于此类场景。以下是一个通过网络以用户 `barts`\
  \ 和密码 `l1sa` 连接到远程数据库的示例；网络连接信息直接嵌入到连接字符串中（其中 `dwdb1` 是服务器，`1521` 是端口，`dwrep1` 是数据库服务名）：\n\
  \n`$ sqlplus barts/l1sa@'dwdb1:1521/dwrep1'`\n\n\n## 测试连接性\n\n如果可以建立连接，则表示远程服务器可用，数据库和监听器均已启动并运行。此时，我会联系报告问题的人员，查看连接问题是否与应用程序或其他非数据库因素有关。\n\
  \n如果之前的 `SQL*Plus` 命令不起作用，请尝试确定远程服务器是否可用。\n\n此示例使用 `ping` 命令测试名为 `dwdb1` 的远程服务器：\n\
  \n```\n$ ping dwdb1\n```\n\n如果 `ping` 成功，你应该看到类似以下的输出：\n\n```\n64 bytes from dwdb1\
  \ (192.168.254.215): icmp_seq=1 ttl=64 time=0.044 ms\n```\n\n如果 `ping` 失败，则可能是网络或远程服务器存在问题。如果远程服务器不可用，我通常会尝试联系系统管理员或网络管理员。\n\
  \n如果 `ping` 确实有效，我会检查远程服务器是否可以通过监听器监听的端口访问。我使用 `telnet` 命令来完成此操作：\n\n```\n$ telnet\
  \ IP <port>\n```\n\n在此示例中，尝试连接到服务器的 IP 地址的 1521 端口：\n\n```\n$ telnet 192.168.254.215\
  \ 1521\n```\n\n如果 IP 地址在指定端口上可访问，你应该在输出中看到 \"Connected to ...\"，如下所示：\n\n```\nTrying\
  \ 192.168.254.216...\nConnected to ora04.\nEscape character is '^]'.\n```\n\n如果\
  \ `telnet` 命令不起作用，我会联系系统管理员或网络管理员。\n\n如果 `telnet` 命令有效，则表示网络可以在指定端口上连接到服务器。\n\n\
  接下来，我使用 `tnsping` 命令通过 Oracle Net 测试到远程服务器和数据库的网络连接。此示例尝试访问 `DWREP1` 远程服务：\n\n```\n\
  $ tnsping DWREP1\n```\n\n如果成功，输出应包含字符串 \"OK\"，如下所示：\n\n```\nAttempting to contact\
  \ (DESCRIPTION = (ADDRESS = (PROTOCOL = TCP)(HOST = DWDB1)(PORT = 1521)) (CONNECT_DATA\
  \ = (SERVICE_NAME = DWREP1)))\nOK (20 msec)\n```\n\n如果 `tnsping` 有效，则表示远程监听器已启动并运行。这并不一定意味着数据库已启动，因此你可能需要登录到数据库服务器进行进一步调查。如果\
  \ `tnsping` 不起作用，则监听器或数据库已关闭或挂起。此时，我会直接登录到服务器执行其他检查，例如检查挂载点是否已满。\n\n## 调查磁盘空间\n\n\
  要进一步诊断问题，你需要直接登录到远程服务器。通常，你需要以 Oracle 软件所有者（通常是 `oracle` 操作系统账户）的身份登录。首次登录到服务器时，导致数据库挂起或出现问题的一个常见原因是挂载点已满。\n\
  \n带有 `-h`（人类可读）开关的 `df` 命令有助于验证磁盘使用情况：\n\n```\n$ df -h\n```\n\n任何已满的挂载点都需要调查。如果包含\
  \ `ORACLE_HOME` 的挂载点已满，那么在连接到数据库时你会收到类似这样的错误：\n\n```\nLinux Error: 28: No space\
  \ left on device\n```\n\n要解决挂载点已满的问题，首先要确定可以移动或删除的文件。\n\n通常，我首先查找旧的跟踪文件；通常，有数 GB\
  \ 的旧文件可以安全删除。\n\n## 定位告警日志和跟踪文件\n\n如果你使用一致的标准设置了所有数据库，那么定位 `alert.log` 和/或相关的跟踪文件应该不会有问题。如第\
  \ 3 章所述，我定义了一个操作系统函数，该函数将从 `ORACLE_BASE` 和 `ORACLE_SID` 变量推导出 `alert.log` 的位置。\n\
  \n例如，以下 shell 函数在 11*g* 或 10*g* 环境中均有效（假设目录名称遵循标准的 Oracle OFA 标准）：\n\n```\n#-----------------------------------------------------------#\n\
  # cd to bdump\nfunction bdump {\n  echo $ORACLE_HOME | grep 11 >/dev/null\n  if\
  \ [ $? -eq 0 ]; then\n    lower_sid=$(echo $ORACLE_SID | tr '[:upper:]' '[:lower:]')\n\
  \    cd $ORACLE_BASE/diag/rdbms/$lower_sid/$ORACLE_SID/trace\n  else\n    cd $ORACLE_BASE/admin/$ORACLE_SID/bdump\n\
  \  fi\n} # bdump\n#-----------------------------------------------------------#\n\
  ```\n\n当上述函数放置在启动文件（如 `.bashrc`）中时，你将能够立即导航到包含 `alert.log` 和跟踪文件的目录，如下所示：\n\n```\n\
  $ bdump\n$ pwd\n/ora01/app/oracle/diag/rdbms/o11r2/O11R2/trace\n```\n\n如果你继承的环境是由其他\
  \ DBA 设置的，那么你可能已经注意到 `alert.log` 和跟踪文件有时位于非标准位置。在查找旧的跟踪文件时，我首先尝试找到 `alert.log`。通常，与\
  \ `alert.log` 文件相关的跟踪文件位于同一目录中。由于 `alert.log` 文件具有特定且众所周知的名称（`alert_<SID>.log`），因此通常先找到它，然后再查找相关的跟踪文件会更容易。\n\
  \n对于 Oracle Database 11*g* 及更高版本，`alert.log` 的文本版本位于以下标准目录和名称中：\n\n```\n<ADR base>/diag/rdbms/<DB_UNIQUE_NAME>/<SID>/trace/alert_<SID>.log\n\
  ```\n\n`ADR base` 位置由 `DIAGNOSTIC_DEST` 数据库初始化参数定义。如果你未设置 `DIAGNOSTIC_DEST`，那么 Oracle\
  \ 会从操作系统环境变量 `ORACLE_BASE` 推导该值。如果操作系统 `ORACLE_BASE` 变量未设置，则 `DIAGNOSTIC_DEST` 被设置为\
  \ `ORACLE_HOME/log` 的值（其中 `ORACLE_HOME` 是一个几乎普遍设置的操作系统变量）。\n\n对于 Oracle Database\
  \ 10*g*，`alert.log` 的标准位置定义为：\n\n```\n<ORACLE_BASE>/admin/<SID>/bdump\n```\n\n对于\
  \ Oracle Database 10*g*，上述路径通常与 `BACKGROUND_DUMP_DEST` 数据库初始化参数的常规设置值相同。`ORACLE_BASE`\
  \ 操作系统变量的典型值是 `/ora01/app/oracle` 或 `/u01/app/oracle`。例如，以下是 `DEVDB` 数据库的 `init.ora`\
  \ 中 `BACKGROUND_DUMP_DEST` 初始化变量的条目：\n\n```\nbackground_dump_dest=/ora01/app/oracle/admin/DEVDB/bdump\n\
  ```\n\n然而，没有什么能阻止经验不足的 DBA 将 `BACKGROUND_DUMP_DEST` 等参数设置为完全非标准的位置。例如，以下是我最近被要求维护的一个数据库中的设置：\n\
  \n```\nbackground_dump_dest=/oralogs08/dba/admin/bdump\n```\n\n为什么 DBA 会将参数设置为如此非标准的位置？这其实并不重要。\n\
  \n你只需要意识到 DBA 有时会以使维护变得更加困难的方式启用功能。\n\n无论如何，如果你可以通过 `SQL*Plus` 连接到你的数据库，那么确定即使是非标准位置的\
  \ `alert.log` 位置也是轻而易举的事。这将正确显示任何 Oracle 数据库版本的 `alert.log` 位置：\n\n```\nSQL> show\
  \ parameter background_dump_dest\n```\n\n当数据库无法启动，并且文件被放置在非标准（且不明显）的目录中时，如何确定 `alert.log`\
  \ 和跟踪文件的位置？在这种情况下，使用 `find` 命令来定位 `alert.log` 文件。首先，切换到 `ORACLE_BASE` 目录：\n\n```\n\
  $ cd $ORACLE_BASE\n```\n\n接下来，使用 `find` 命令尝试定位文件：\n\n```\n$ find . -name \"alert*.log\"\
  \n```\n\n如果你没有定义 `ORACLE_BASE`，或者 `alert.log` 不在相对标准的位置，那么前面的命令可能找不到任何文件。在这种情况下，执行更全面的全局搜索。\n\
  \n导航到服务器的根目录，然后发出 `find` 命令：\n\n```\n$ cd /\n$ find . -name \"alert*.log\" 2>/dev/null\n\
  ```\n\n\n"
- '# 第 22 章 ■ 数据库故障排除


  在前面的命令中，你正在检查操作系统上的所有文件，试图定位一个文件名以“alert”开头、以“.log”结尾的文件。执行全局搜索时，当 `find` 命令尝试访问它没有读取权限的文件时，将会抛出错误。`2>/dev/null`
  非常有用，因为它将所有错误消息重定向到 `/dev/null`（位桶）文件。结果是你不会看到大量的错误消息，只有当 `find` 成功找到与字符串模式匹配的文件时，你才会看到输出。


  当尝试查找 `alert.log` 文件时，你可能会发现不止一个文件。当经验不足的 DBA 将 `alert.log` 从标准位置移动到非标准位置，并且将旧文件散落在整个操作系统中时，就会发生这种情况。


  当你认为找到了正确的 `alert.log` 文件时，检查其上的日期以确保它是最近更新的。有时你找到了一个 `alert.log`，但结果发现它不是当前文件。你可以使用
  `ls` 命令的长格式列表来检查最后更新时间：


  ```

  $ ls -altr alert_<SID>.log

  ```


  一旦找到了正确的 `alert.log` 文件，检查其中最近的条目以查找错误，或者在与 `alert.log` 文件相同的目录中查找跟踪文件：


  ```

  $ ls -altr *.trc

  ```


  如果其中任何跟踪文件已经存在好几天了，考虑移动或删除它们。


  ## 删除文件


  不用说，删除文件时要非常小心。试图解决问题时，最糟糕的事情就是让情况变得更糟。意外删除一个关键文件可能是灾难性的。对于你识别为候选删除的任何文件，考虑移动（而不是删除）它们。如果你有一个有可用空间的挂载点，将文件移动到那里，保留几天，然后再删除它们。


  如果你已经确定了可以删除的文件，那么在实际删除它们之前，先列出你将删除的文件。至少，我会在删除任何文件之前执行此操作：


  ```

  $ ls -altr <file_name>

  ```


  查看 `ls` 命令返回的结果后，删除文件。此示例使用 Linux/Unix 的 `rm` 命令永久删除文件：


  ```

  $ rm <file_name>

  ```


  你也可以根据文件的年龄来删除文件。例如，假设你确定任何超过两天的跟踪文件都可以安全删除。通常，`find` 命令与 `rm` 命令结合使用来完成此任务。在删除文件之前，首先列出
  `find` 命令的结果：


  ```

  $ find . -type f -mtime +2 -name "*.trc"

  ```


  如果你对文件列表满意，则添加 `rm` 命令来删除它们：


  ```

  $ find . -type f -mtime +2 -name "*.trc" | xargs rm

  ```


  在前面的代码行中，`find` 命令的结果通过管道传递给 `xargs` 命令，该命令为 `find` 命令找到的每个文件执行 `rm` 命令。这是一种基于文件年龄删除文件的高效方法。但是，务必非常确定你知道哪些文件将被删除。


  另一个有时会占用大量空间的文件是 `listener.log` 文件。由于此文件被监听器进程持续写入，你不能简单地删除它。如果你需要保留此文件的内容，那么首先将其复制到有可用磁盘空间的备份位置，然后截断该文件。在此示例中，`listener.log`
  文件首先被复制到 `/ora01/backups`，然后通过以下方式截断该文件：


  ```

  $ cp listener.log /ora01/backups

  ```


  接下来，使用 `cat` 命令将 `listener.log` 的内容替换为 `/dev/null` 文件（该文件包含零字节）：


  ```

  $ cat /dev/null > listener.log

  ```


  ## 检查告警日志


  在处理数据库问题时，`alert.log` 应该是你检查相关错误信息的首要文件之一。你可以使用操作系统工具或 ADRCI 实用程序来查看 `alert.log`
  文件和相应的跟踪文件。


  ### 通过操作系统工具查看告警日志


  导航到包含 `alert.log` 的目录后，你可以通过查看文件的末尾（最下面的部分）来查看最新的消息（换句话说，最新的消息写入文件的末尾）。要查看最后 50
  行，请使用 `tail` 命令：


  ```

  $ tail -50 alert_<SID>.log

  ```


  你可以使用 `-f` 开关持续查看最新的条目：


  ```

  $ tail -f alert_<SID>.log

  ```


  你也可以直接用操作系统编辑器（如 `vi`）打开 `alert.log`：


  ```

  $ vi alert_<SID>.log

  ```


  有时定义一个函数会很方便，它允许你无论当前工作目录在哪里都能打开 `alert.log`。接下来的几行代码定义了一个函数，该函数在 `11g` 或 `10g`
  环境中使用 `view` 命令定位并打开 `alert.log`：


  ```

  #-----------------------------------------------------------#

  ```



  '
- "# 查看警报日志\n\n```\nfunction valert {\n\necho $ORACLE_HOME | grep 11 >/dev/null\n\n\
  if [ $? -eq 0 ]; then\n\nlower_sid=$(echo $ORACLE_SID | tr '[:upper:]' '[:lower:]')\n\
  \nview $ORACLE_BASE/diag/rdbms/$lower_sid/$ORACLE_SID/trace/alert_$ORACLE_SID.log\
  \ else\n\nview $ORACLE_BASE/admin/$ORACLE_SID/bdump/alert_$ORACLE_SID.log\n\nfi\n\
  \n} # valert\n```\n\n#-----------------------------------------------------------#\n\
  \n通常，前面的代码行会被放置在一个启动文件中，这样当你登录到服务器时，函数会自动定义。一旦定义，你可以通过输入以下命令来查看 `alert.log`：`$ valert`\n\
  \n检查 `alert.log` 的底部时，寻找指示以下问题的错误：\n\n•  由于磁盘空间不足导致归档进程挂起。\n•  文件系统空间不足。\n•  表空间空间不足。\n\
  •  缓冲区高速缓存或共享池内存耗尽。\n•  指示数据文件缺失或损坏的介质错误。\n\n例如，以下错误指示在写入归档重做日志时出现问题：\n`ORA-19502:\
  \ write error on file \"/ora01/fra/O11R2/archivelog/...\"`\n\n对于在 `alert.log` 文件中列出的严重错误消息，几乎总是存在一个对应的跟踪文件。例如，这是前述错误消息的伴随消息：\n\
  `Errors in file /oracle/app/oracle/diag/rdbms/o11r2/O11R2/trace/O11R2_arc0_4485.trc`\n\
  \n检查跟踪文件通常（但不总是）能提供对问题的额外洞察。\n\n## 使用 ADRCI 实用程序查看 `alert.log`\n\n如果你使用的是 Oracle\
  \ Database 11 *g* 或更高版本，你可以使用 ADRCI 实用程序来查看 `alert.log` 文件的内容。从操作系统运行以下命令以启动 ADRCI\
  \ 实用程序：\n`$ adrci`\n\n你应该会看到一个提示符：\n`adrci>`\n\n使用 `SHOW ALERT` 命令查看 `alert.log`\
  \ 文件：\n`adrci> show alert`\n\n如果服务器上有多个 Oracle 主目录，系统会提示你选择要查看哪个 `alert.log`。`SHOW\
  \ ALERT` 命令将使用操作系统默认编辑器打开 `alert.log`。在 Linux/Unix 系统上，默认编辑器源自操作系统 `EDITOR` 变量（通常设置为\
  \ `vi` 之类的实用程序）。\n\n■ **提示** 当显示 `alert.log` 时，如果你不熟悉 `vi` 并想退出，请先按 Escape 键，然后按住\
  \ Shift 键的同时按下 `:` 键。接着输入 `q!`。这将使你退出 `vi` 编辑器并返回到 ADRCI 提示符。\n\n你可以在 ADRCI 内使用\
  \ `SET EDITOR` 命令覆盖默认编辑器。此示例将默认编辑器设置为 `emacs`：\n`adrci> set editor emacs`\n\n你可以使用\
  \ `TAIL` 选项查看 `alert.log` 中最后 N 行的内容。以下命令显示 `alert.log` 的最后 50 行：\n`adrci> show\
  \ alert -tail 50`\n\n如果你有多个 Oracle 主目录，可能会看到如下消息：\n`DIA-48449: Tail alert can only\
  \ apply to single ADR home`\n\nADRCI 实用程序不会假设你想在服务器上使用一个 Oracle 主目录而不是另一个。要专门设置\
  \ Oracle 主目录（对于 ADRCI 实用程序），首先使用 `SHOW HOMES` 命令显示所有可用的 Oracle 主目录：\n`adrci> show\
  \ homes`\n\n以下是此服务器的一些示例输出：\n```\ndiag/rdbms/e64208/E64208\ndiag/rdbms/e64211/E64211\n\
  diag/rdbms/e64214/E64214\n```\n\n现在要专门设置 Oracle 主目录，请使用 `SET HOMEPATH` 命令。这将 `HOMEPATH`\
  \ 设置为 `diag/rdbms/e64208/E64208`：\n`adrci> set homepath diag/rdbms/e64208/E64208`\n\
  \n要持续显示文件末尾，请使用以下命令：\n`adrci> show alert -tail -f`\n\n按 `Ctrl+C` 可中断持续查看 `alert.log`\
  \ 文件。要显示 `alert.log` 中包含特定字符串的行，请使用 `MESSAGE_TEXT LIKE` 命令。此示例显示包含 `ORA-27037` 字符串的消息：\n\
  `adrci> show alert -p \"MESSAGE_TEXT LIKE '%ORA-27037%'\"`\n\n系统将显示一个文件，其中包含 `alert.log`\
  \ 中匹配指定字符串的所有行。\n\n■ **提示** 有关如何使用 ADRCI 实用程序的完整详细信息，请参阅《Oracle 数据库实用程序》指南。\n\n\
  ## 通过操作系统实用程序识别瓶颈\n\n在 Oracle 领域，有时会倾向于假设你有一台专用机器用于一个 Oracle 数据库。此外，该数据库是最新版本的 Oracle，已完全打补丁，并由复杂的图形工具监控。这个数据库环境是完全自动化的，通过使用可视化工具快速定位问题并有效隔离和解决问题来保持无故障运行。如果你生活在这个理想的世界里，那么你可能不需要本章的任何内容。\n\
  \n让我描绘一个略有不同的场景。我有一个环境，其中一台机器运行着十几个数据库。有一个 MySQL 数据库，一个 PostgreSQL 数据库，以及混合的 Oracle\
  \ 9i、10g 和 11g 版本的数据库。此外，这些旧数据库中有许多处于 Oracle 的非终端版本，因此在技术上不受 Oracle 支持的支持。没有计划升级这些不受支持的数据库，因为业务无法承担可能破坏依赖这些数据库的应用程序的风险。\n\
  \n那么，在这种环境中，当有人报告数据库应用程序性能不佳时，该怎么办呢？在这种情况下，通常是不同数据库中的其他东西导致该服务器上的其他应用程序表现不佳。造成问题的可能不是\
  \ Oracle 进程或 Oracle 数据库。\n\n在这种情况下，使用操作系统工具开始调查问题几乎总是更有效。操作系统工具与数据库无关。操作系统性能实用程序有助于确定资源消耗最多的位置，无论数据库供应商或版本如何。\n\
  \n在 Linux/Unix 环境中，有几种工具可用于监控资源使用情况。\n\n表 22–1 总结了用于诊断性能问题的最常用操作系统实用程序。熟悉这些操作系统命令的工作原理以及如何解释输出，将使你能够更好地诊断服务器性能问题，尤其是当导致服务器上所有其他应用程序性能下降的不是\
  \ Oracle 过程甚至不是数据库过程时。\n\n***表 22–1.** 性能和监控实用程序*\n\n| **工具** | **用途** |\n| :---\
  \ | :--- |\n| `vmstat` | 监控进程、CPU、内存或磁盘 I/O 瓶颈。 |\n| `top` | 识别消耗资源最多的会话。 |\n| `watch`\
  \ | 定期运行另一个命令。 |\n| `ps` | 识别消耗 CPU 和内存最多的会话。用于识别消耗系统资源最多的 Oracle 会话。 |\n| `mpstat`\
  \ | 报告 CPU 统计信息。 |\n| `sar` | 显示当前和历史 CPU、内存、磁盘 I/O 和网络使用情况。 |\n| `free` | 显示空闲和已使用的内存。\
  \ |\n| `df` | 报告空闲磁盘空间。 |\n| `du` | 显示磁盘使用情况。 |\n| `iostat` | 显示磁盘 I/O 统计信息。 |\n\
  | `netstat` | 报告网络统计信息。 |\n\n在诊断性能问题时，确定操作系统在何处受到限制很有用。例如，尝试确定问题是否与 CPU、内存、I/O 或这些资源的组合有关。\n\
  \n### 识别系统瓶颈\n\n每当出现应用程序性能问题或可用性问题时，从 DBA 的角度来看，第一个问题似乎是，数据库出了什么问题？无论问题来源如何，责任通常落在\
  \ DBA 身上，要求其证明或反驳数据库是否运行良好。\n\n我通常通过确定系统范围内正在消耗的资源来处理此问题。有两种 Linux/Unix 操作系统工具对于显示系统范围的资源使用特别有用：\n\
  \n• `vmstat`\n• `top`\n\n`vmstat`（虚拟内存统计信息）工具旨在帮助你快速识别服务器上的瓶颈。`top` 实用程序提供系统资源使用情况的动态实时视图。这两种实用程序将在接下来的两个小节中讨论。\n\
  \n### 使用 `vmstat`\n\n`vmstat` 实用程序显示有关进程、内存、页面调度、磁盘 I/O 和 CPU 使用情况的实时性能信息。此示例显示使用\
  \ `vmstat` 显示未指定选项时的默认输出：\n```\n$ vmstat\nprocs -----------memory---------- ---swap--\
  \ -----io---- --system-- ----cpu----\n r  b   swpd   free   buff  cache   si   so\
  \    bi    bo   in   cs us sy id wa\n 14  0  52340  25272   3068 1662704    0  \
  \  0    63    76    9   31 15  1 84  0\n```\n\n解释 `vmstat` 输出时，可以使用以下一般启发式方法：\n\n\
  • 如果 `wa`（等待 I/O 的时间）列很高，这通常表明存储子系统过载。\n• 如果 `b`（正在休眠的进程）持续大于 0，则可能 CPU 处理能力不足。\n\
  • 如果 `so`（换出到磁盘的内存）和 `si`（从磁盘换入的内存）持续大于 0，则可能存在内存瓶颈。\n\n默认情况下，运行 `vmstat`（不提供任何选项）时，只显示一行服务器统计信息。这一行输出显示自上次系统重新启动以来计算的平均统计信息。这对于快速快照来说没问题。但是，如果你想在一段时间内收集指标，请使用此语法的\
  \ `vmstat`：\n`$ vmstat <间隔秒数> <间隔数>`\n\n在此模式下，`vmstat` 报告从一个间隔到下一个间隔的统计信息样本。例如，如果你想每两秒报告一次系统统计信息，共十个间隔，请发出此命令：\n\
  `$ vmstat 2 10`\n\n你也可以将 `vmstat` 输出发送到文件。这对于分析一段时间内的历史性能很有用。此示例每 5 秒采样一次统计信息，总共生成\
  \ 60 份报告，并将输出记录到文件中：\n`$ vmstat 5 60 > vmout.perf`\n\n使用 `vmstat` 的另一种有用方式是与 `watch`\
  \ 工具结合使用。`watch` 命令用于定期执行另一个程序。此示例使用 `watch` 每五秒运行一次 `vmstat` 命令，并在屏幕上突出显示每个快照之间的差异：\n\
  `$ watch –n 5 –d vmstat`\n```\nEvery 5.0s: vmstat Thu Aug 9 13:27:57 2007\nprocs\
  \ -----------memory---------- ---swap-- -----io---- --system-- ----cpu----\n r \
  \ b   swpd   free   buff  cache   si   so    bi    bo   in   cs us sy id wa\n 0\
  \  0    144  15900  64620 1655100    0    0     1     7   16    4  0  0 99  0\n\
  ```\n\n当在 `watch -d`（差异）模式下运行 `vmstat` 时，你会直观地看到屏幕上从快照到快照的变化。要退出 `watch`，请按 `Ctrl+C`。\n\
  \n请注意，`vmstat` 内存列的默认度量单位是千字节。如果你想以兆字节查看内存统计信息，请使用 `–S m`（以兆字节为单位的统计信息）选项：\n`$ vmstat\
  \ –S m`\n\n供参考，表 22–2 详细说明了 `vmstat` 默认输出中显示的列的含义。\n\n***表 22–2.** `vmstat` 输出的列描述*\n\
  \n| **列** | **描述** |\n| :--- | :--- |\n| `r` | 等待运行时间的进程数 |\n| `b` | 处于不可中断睡眠状态的进程数\
  \ |\n| `swpd` | 已使用的总虚拟内存（交换空间）(KB) |\n| `free` | 空闲的总内存 (KB) |\n| `buff` | 用作缓冲区的总内存\
  \ (KB) |\n| `cache` | 用作高速缓存的总内存 (KB) |\n| `si` | 从磁盘换入的内存 (KB/s) |\n| `so` | 换出到磁盘的内存\
  \ (KB/s) |\n| `bi` | 从块设备读入的块 (blocks/s) |\n| `bo` | 写入块设备的块 (blocks/s) |\n| `in`\
  \ | 每秒中断数 |\n| `cs` | 每秒上下文切换数 |\n| `us` | 用户级代码时间占总 CPU 时间的百分比 |\n| `sy` | 系统级代码时间占总\
  \ CPU 时间的百分比 |\n| `id` | 空闲时间占总 CPU 时间的百分比 |\n| `wa` | 等待 I/O 完成的时间 |\n\n### 使用\
  \ `top`\n\n另一个用于识别资源密集型进程的工具是 `top` 命令。使用此实用程序可以快速识别服务器上哪些进程是资源的最大消费者。默认情况下，`top`\
  \ 会重复刷新（每三秒）有关最耗费 CPU 的进程的信息。\n\n以下是运行 `top` 的最简单方法：\n`$ top`\n\n这是输出的一个片段：\n```\n\
  top - 21:05:39 up 43 days, 23:45,  8 users,  load average: 1.10, 0.87, 0.72\nTasks:\
  \ 576 total,   2 running, 574 sleeping,   0 stopped,   0 zombie\nCpu(s):  0.1%us,\
  \  0.2%sy,  0.0%ni, 98.8%id,  0.8%wa,  0.0%hi,  0.0%si,  0.0%st\nMem:  16100352k\
  \ total, 12480204k used,  3620148k free,    38016k buffers\nSwap: 18481144k total,\
  \   380072k used, 18101072k free,  8902940k cached\n  PID USER      PR  NI  VIRT\
  \  RES  SHR S %CPU %MEM    TIME+  COMMAND            \n 9236 mscd642   15   0 13000\
  \ 1468  812 R  0.7  0.0   0:00.03 top                \n 3179 oracle    16   0 2122m\
  \ 1.9g 1.9g S  0.3 12.3  97:54.00 oracle             \n 4116 oracle    16   0  618m\
  \ 133m 124m S  0.3  0.8   0:08.62 oracle             \n20763 mscd642   15   0  609m\
  \ 91m  88m S  0.3  0.6   0:00.26 oracle             \n    1 root      15   0 10344\
  \  684  572 S  0.0  0.0   0:25.98 init               \n    2 root      RT  -5  \
  \   0    0    0 S  0.0  0.0   0:16.01 migration/0        \n    3 root      34  19\
  \     0    0    0 S  0.0  0.0   0:03.16 ksoftirqd/0        \n```\n\n消耗最多的会话的进程 ID\
  \ 列在第一列 (`PID`)。你可以使用此进程 ID 来查看它是否映射到数据库进程（请参阅本章中关于将 PID 映射到数据库进程的部分）。\n\n在 `top`\
  \ 运行时，你可以交互式地更改其输出。例如，如果你键入 `>`，这将使 `top` 排序的列向右移动一个位置。表 22–3 列出了一些可用于将 `top` 显示更改为你所需格式的关键功能。\n\
  \n***表 22–3.** 用于交互式更改 `top` 输出的命令*\n\n| **命令** | **功能** |\n| :--- | :--- |\n| 空格键\
  \ | 立即刷新输出。 |\n| `<` 或 `>` | 将排序列向左或向右移动一个位置。默认情况下，`top` 按 CPU 列排序。 |\n| `D` | 更改刷新时间。\
  \ |\n| `R` | 反转排序顺序。 |\n| `Z` | 切换彩色输出。 |\n| `H` | 显示帮助菜单。 |\n| `F` 或 `O` | 选择一个排序列。\
  \ |\n| `e` |  |\n| `q` 或 `Ctrl+C` | 退出 `top`。 |\n\n表 22–4 描述了 `top` 默认输出中显示的几个列。\n\
  \n***表 22–4.** `top` 输出的列描述*\n\n| **列** | **描述** |\n| :--- | :--- |\n| `PID` | 唯一的进程标识符。\
  \ |\n| `USER` | 运行进程的操作系统用户名。 |\n| `PR` | 进程的优先级。 |\n| `NI` | 进程的 nice 值。负值表示高优先级。正值表示低优先级。\
  \ |\n| `VIRT` | 进程使用的总虚拟内存。 |\n| `RES` | 使用的非换出物理内存。 |\n| `SHR` | 进程使用的共享内存。 |\n\
  | `S` | 进程状态。 |\n| `%CPU` | 自上次屏幕刷新以来进程占用的 CPU 百分比。 |\n| `%MEM` | 进程消耗的物理内存百分比。\
  \ |\n| `TIME` | 进程使用的总 CPU 时间。 |\n| `TIME+` | 总 CPU 时间，显示到百分之一秒。 |\n| `COMMAND`\
  \ | 用于启动进程的命令行。 |\n\n你也可以使用 `-b`（批处理模式）选项运行 `top` 并将输出发送到文件以供以后分析：\n`$ top –b >\
  \ tophat.out`\n\n在批处理模式下运行时，`top` 命令将一直运行，直到你终止它（使用 `Ctrl+C`）或达到指定的迭代次数。你可以结合使用\
  \ `nohup` 和 `&` 在批处理模式下运行前面的 `top` 命令，以使其无论你是否登录到系统都保持运行。这样做的危险在于你可能会忘记它，最终创建一个非常大的输出文件（以及一位愤怒的系统管理员）。\n\
  \n如果你有一个特定进程想要监控，请使用 `-p` 选项监控进程 ID，或使用 `-U` 选项监控特定用户名。你还可以使用 `-d` 和 `-n` 选项指定延迟和迭代次数。以下示例监控\
  \ `oracle` 用户，延迟为 5 秒，共 25 次迭代：\n`$ top –u oracle –d 5 –n 25`\n\n■ **提示** 使用 `man\
  \ top` 或 `top --help` 命令列出操作系统版本中所有可用的选项。\n\n### 将操作系统进程映射到 SQL 语句\n\n在识别操作系统进程时，查看哪些进程消耗的\
  \ CPU 最多是很有用的。如果资源消耗大户是数据库进程，将操作系统进程映射到数据库作业或查询也很有用。要确定消耗最多 CPU 资源的进程的 ID，请使用 `ps`\
  \ 之类的命令，如下所示：\n`$ ps -e -o pcpu,pid,user,tty,args | sort -n -k 1 -r | head`\n\n\
  以下是一些示例输出：\n```\n 72.4 25922 mscd642 ?    oracleE64215 (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))\n\
  \  1.5 28215 oracle ?     oracleemrep (LOCAL=NO)\n  0.2 24764 oracle ?     /u01/oracle/product/11.0.0/grid/agent10g/bin/emagent\n\
  \  0.1  3179 oracle ?     ora_j000_emrep\n```\n\n从输出中，操作系统会话 `25922` 消耗的 CPU 资源最多，为\
  \ 72.4%。在此示例中，`25922` 进程与 `E64215` 数据库相关联。接下来，登录到相应的数据库并使用以下 SQL 语句来确定与操作系统进程 `25922`\
  \ 关联的程序类型：\n```\nselect\n'USERNAME : ' || s.username|| chr(10) ||\n'OSUSER : ' ||\
  \ s.osuser || chr(10) ||\n'PROGRAM : ' || s.program || chr(10) ||\n'SPID : ' ||\
  \ p.spid || chr(10) ||\n'SID : ' || s.sid || chr(10) ||\n'SERIAL# : ' || s.serial#\
  \ || chr(10) ||\n'MACHINE : ' || s.machine || chr(10) ||\n'TERMINAL : ' || s.terminal\n\
  from v$session s,\n     v$process p\nwhere s.paddr = p.addr\n  and p.spid = '&PID_FROM_OS';\n\
  ```\n\n当你运行此示例时，SQL*Plus 将提示你输入替代 `&PID_FROM_OS` 的值。在此示例中，你将输入 `25922`。输出如下：\n```\n\
  'USERNAME:'||S.USERNAME||CHR(10)||'OSUSER:'||S.OSUSER||CHR(10)||'PROGRAM:'||S.PR\n\
  --------------------------------------------------------------------------------\n\
  USERNAME : SYS\nOSUSER : mscd642\nPROGRAM : sqlplus@ora04.regis.local (TNS V1-V3)\n\
  SPID : 25922\nSID : 139\nSERIAL# : 90\nMACHINE : ora04.regis.local\nTERMINAL : pts/9\n\
  ```\n\n在此输出中，`PROGRAM` 值为 `sqlplus@ora04.regis.local`。这表明 SQL*Plus 会话是消耗服务器上过量资源的程序。接下来，运行以下查询以显示与操作系统进程\
  \ ID 关联的 SQL 语句（在此示例中，`SPID` 为 `25922`）：\n```\nselect\n'USERNAME : ' || s.username\
  \ || chr(10) ||\n'OSUSER : ' || s.osuser || chr(10) ||\n'PROGRAM : ' || s.program\
  \ || chr(10) ||\n'SPID : ' || p.spid || chr(10) ||\n'SID : ' || s.sid || chr(10)\
  \ ||\n'SERIAL# : ' || s.serial# || chr(10) ||\n'MACHINE : ' || s.machine || chr(10)\
  \ ||\n'TERMINAL : ' || s.terminal || chr(10) ||\n'SQL TEXT : ' || q.sql_text\nfrom\
  \ v$session s\n    ,v$process p\n    ,v$sql q\nwhere s.paddr = p.addr\n  and p.spid\
  \ = '&PID_FROM_OS'\n  and s.sql_id = q.sql_id;\n```\n\n结果显示消耗资源的 SQL 作为 `SQL TEXT`\
  \ 列输出的一部分：\n```\n'USERNAME:'||S.USERNAME||CHR(10)||'OSUSER:'||S.OSUSER||CHR(10)||'PROGRAM:'||S.PR\n\
  --------------------------------------------------------------------------------\n\
  USERNAME : SYS\nOSUSER : mscd642\nPROGRAM : sqlplus@ora04.regis.local (TNS V1-V3)\n\
  SPID : 25922\nSID : 139\nSERIAL# : 90\nMACHINE : ora04.regis.local\nTERMINAL : pts/9\n\
  SQL TEXT : select a.table_name from dba_tables a,dba_indexes,dba_constraints uni\n\
  ```\n\n当在一台服务器上运行多个数据库并遇到服务器性能问题时，有时很难确定是哪个数据库及相关进程导致了问题。在这些情况下，你必须使用操作系统工具来识别系统上消耗最多的会话。\n\
  \n在 Linux 或 Unix 环境中，你可以使用 `ps`、`top` 或 `vmstat` 等实用程序来识别消耗最多的操作系统进程。`ps` 实用程序很方便，因为它可以让你识别消耗最多\
  \ CPU 或内存的进程。前面的 `ps` 命令识别了消耗 CPU 最多的进程。这里，用它来识别使用 Oracle 内存最多的进程：\n`$ ps -e -o\
  \ pmem,pid,user,tty,args | grep -i oracle | sort -n -k 1 -r | head`\n\n一旦你识别出与数据库相关的消耗最多的进程，就可以基于服务器进程\
  \ ID 查询数据字典视图，以确定数据库进程正在执行什么。\n\n![](img/index-644_1.png)\n\n### 显示资源密集型 SQL\n\n\
  如前一节所述，`V$SQL_MONITOR` 视图在 Oracle Database 11g 或更高版本中可用。如果你使用的是较旧版本的 Oracle，可以查询\
  \ `V$SQLSTATS` 等视图来确定哪些 SQL 语句消耗了过多的资源。例如，使用以下查询根据 CPU 时间识别十个最消耗资源的查询：\n```\nselect\
  \ * from(\nselect\n       sql_text\n      ,buffer_gets\n      ,disk_reads\n    \
  \  ,sorts\n      ,cpu_time/1000000 cpu_sec\n      ,executions\n      ,rows_processed\n\
  from v$sqlstats\norder by cpu_time DESC)\nwhere rownum < 11;\n```\n\n在前面的查询中，使用了一个内联视图首先检索所有记录，并按\
  \ `CPU_TIME` 降序对输出进行排序。然后，外部查询使用 `ROWNUM` 伪列将结果集限制为前 10 行。该查询可以轻松修改为按 `CPU_TIME`\
  \ 以外的列排序。例如，如果你想按 `BUFFER_GETS` 报告资源使用情况，只需将 `ORDER BY` 子句更改为使用 `BUFFER_GETS` 而不是\
  \ `CPU_TIME`。`CPU_TIME` 列以微秒计算；要将其转换为秒，请除以 1000000。\n\n`V$SQLSTATS` 视图显示最近执行的 SQL\
  \ 语句的性能统计信息。你也可以使用 `V$SQL` 和 `V$SQLAREA` 来报告 SQL 资源使用情况。`V$SQLSTATS` 速度更快，保留信息的时间更长，但仅包含\
  \ `V$SQL` 和 `V$SQLAREA` 中的列的子集。因此，在某些情况下你可能希望从 `V$SQL` 或 `V$SQLAREA` 查询。例如，如果你想显示诸如首次解析查询的用户之类的信息，请使用\
  \ `V$SQLAREA` 的 `PARSING_USER_ID` 列：\n```\nselect * from(\nselect\n       b.sql_text\n\
  \      ,a.username\n      ,b.buffer_gets\n      ,b.disk_reads\n      ,b.sorts\n\
  \      ,b.cpu_time/1000000 cpu_sec\nfrom v$sqlarea b\n    ,dba_users a\nwhere b.parsing_user_id\
  \ = a.user_id\norder by b.cpu_time DESC)\nwhere rownum < 11;\n```\n\n## 运行 Oracle\
  \ 诊断实用程序\n\nOracle 提供了几种用于诊断数据库性能问题的实用程序：\n\n•  自动工作量存储库 (AWR)\n•  自动数据库诊断监视器 (ADDM)\n\
  •  活动会话历史 (ASH)\n•  Statspack\n\nAWR、ADDM 和 ASH 是在 Oracle Database 10 *g* 中引入的。这些工具提供高级报告功能，使你能够对性能问题进行故障排除和解决。这些新实用程序需要从\
  \ Oracle 获得额外许可。较旧的 Statspack 实用程序是免费的，不需要许可。\n\n所有这些工具都严重依赖底层的 `V$` 动态性能视图。Oracle\
  \ 维护着大量这些视图，用于跟踪和累积数据库性能指标。例如，如果你运行以下查询，你会发现对于 Oracle Database 11 *g* release 2，有大约\
  \ 600 个 `V$` 视图：\n```\nSQL> select count(*) from dictionary where table_name like\
  \ 'V$%';\n  COUNT(*)\n----------\n       608\n```\n\nOracle 性能实用程序依赖于从这些内部性能视图收集的定期快照。关于性能统计信息最有用的两个视图是\
  \ `V$SYSSTAT` 和 `V$SESSTAT` 视图。`V$SYSSTAT` 视图包含超过 400 种数据库统计信息类型。这个 `V$SYSSTAT`\
  \ 视图包含整个数据库的信息，而 `V$SESSTAT` 视图包含各个会话的统计信息。`V$SYSSTAT` 和 `V$SESSTAT` 视图中的几个值包含资源的当前使用情况。这些值是：\n\
  \n• `opened cursors current`\n• `logons current`\n• `session cursor cache current`\n\
  • `work area memory allocated`\n\n其余的值是累积的。`V$SYSSTAT` 中的值自实例启动以来对整个数据库是累积的。`V$SESSTAT`\
  \ 中的值自会话启动以来对每个会话是累积的。一些更重要的与性能相关的累积值是：\n\n• `CPU used`\n• `consistent gets`\n•\
  \ `physical reads`\n• `physical writes`\n\n对于累积统计信息，测量周期性使用情况的方法是注意起始点的统计信息值，然后注意稍后时间点的值，并捕获增量。这就是\
  \ AWR 和 Statspack 等 Oracle 性能实用程序所采用的方法。Oracle 会定期拍摄动态等待接口视图的快照并将其存储在存储库中。\n\n本章接下来的几节将详细介绍如何从\
  \ SQL*Plus 访问 AWR、ADDM、ASH 和 Statspack。\n\n■ **提示** 你可以从 Enterprise Manager 访问 AWR、ADDM\
  \ 和 ASH。你可能会发现 Enterprise Manager 屏幕比使用 SQL*Plus 更直观、更高效。\n\n### 使用 AWR\n\nAWR 报告适用于查看整个系统性能并识别消耗资源最多的\
  \ SQL 查询。运行以下脚本以生成 AWR 报告：\n`SQL> @?/rdbms/admin/awrrpt`\n\n从 AWR 输出中，在报告的“按经过时间排序的\
  \ SQL”或“按 CPU 时间排序的 SQL”部分识别消耗资源最多的语句。以下是一些示例输出：\n```\nSQL ordered by CPU Time\n\
  DB/Inst: DWREP/DWREP  Snaps: 11384-11407\n-> Resources reported for PL/SQL code\
  \ includes the resources used by all SQL\n   statements called by the code.\n->\
  \ % Total DB Time is the Elapsed Time of the SQL statement divided into the\n  \
  \ Total Database Time multiplied by 100\n   CPU      Elapsed    CPU per      % Total\n\
  \   Time (s) Time (s)  Executions  Exec (s)  DB Time   SQL Id\n---------- ----------\
  \ ------------ --------- ------- -------------\n      4,809     13,731         \
  \  10    480.86     6.2 8wx77jyhdr31c\nModule: JDBC Thin Client\nSELECT D.DERIVED_COMPANY\
  \ ,CB.CLUSTER_BUCKET_ID ,CB.CB_NAME ,CB.SOA_ID ,COUNT(*)\nTOTAL ,NVL(SUM(CASE WHEN\
  \ F.D_DATE_ID > TO_NUMBER(TO_CHAR(SYSDATE-30,'YYYYMMDD'))\nTHEN 1 END), 0) RECENT\
  \ ,NVL(D.BLACKLIST_FLG,0) BLACKLIST_FLG FROM F_DOWNLOADS F\n,D_DOMAINS D ,D_PRODUCTS\
  \ P ,PID_DF_ASSOC PDA ,( SELECT * FROM ( SELECT CLUSTER_\n```\n\n从 Oracle Database\
  \ 10 *g* 开始，Oracle 会每小时自动拍摄一次数据库快照，并填充存储统计信息的底层 AWR 表。默认情况下，保留七天的统计信息。\n\n你还可以通过运行\
  \ `awrsqrpt.sql` 报告为特定 SQL 语句生成 AWR 报告。当你运行以下脚本时，系统将提示你输入感兴趣的查询的 `SQL_ID`：\n`SQL>\
  \ @?/rdbms/admin/awrsqrpt.sql`\n\n### 使用 ADDM\n\nADDM 报告提供了有关哪些 SQL 语句是调整候选者的有用建议。使用以下\
  \ SQL 脚本生成 ADDM 报告：\n`SQL> @?/rdbms/admin/addmrpt`\n\n查找报告中标记为“消耗大量数据库时间的 SQL 语句”的部分。以下是一些示例输出：\n\
  ```\nFINDING 2: 29% impact (65043 seconds)\n------------------------------\nSQL\
  \ statements consuming significant database time were found.\n\n  RECOMMENDATION\
  \ 1: SQL Tuning, 6.7% benefit (14843 seconds)\n  ACTION: Investigate the SQL statement\
  \ with SQL_ID \"46cc3t7ym5sx0\" for\n          possible performance improvements.\n\
  \  RELEVANT OBJECT: SQL statement with SQL_ID 46cc3t7ym5sx0 and\n          PLAN_HASH\
  \ 1234997150\n    MERGE INTO d_files a\n    USING\n    ( SELECT\n```\n\nADDM 报告分析\
  \ AWR 表中的数据，以识别潜在的瓶颈和高资源消耗的 SQL 查询。\n\n### 使用 ASH\n\nASH 报告使你能够关注最近运行的、可能只执行了很短时间的短暂\
  \ SQL 语句。使用以下脚本生成 ASH 报告：\n`SQL> @?/rdbms/admin/ashrpt`\n\n在输出中搜索标记为“Top SQL”的部分。以下是一些示例输出：\n\
  ```\n                Sampled #\nSQL ID            Planhash    of Executions % Activity\n\
  ----------------------- -------------------- -------------------- --------------\n\
  Event                     % Event Top Row Source            % RwSrc\n----------------------------------------\
  \ ------- --------------------------------- -------\n4k8runghhh31d            3219321046\
  \               12    51.61\nCPU + Wait for CPU        51.61 HASH JOIN         \
  \              12.26\nselect countryimp0_.COUNTRY_ID as COUNTRY_ID, countryimp0_.COUNTRY_NAME\n\
  ```\n\n前面的输出表明该查询正在等待 CPU 资源。在这种情况下，实际问题可能是另一个消耗 CPU 资源的查询。\n\n什么时候 ASH 报告比 AWR\
  \ 或 ADDM 报告更有用？AWR 和 ADDM 输出显示按总数据库时间排序的消耗最多的 SQL。如果 SQL 性能问题是短暂的，它可能不会出现在 AWR 和\
  \ ADDM 报告中。在这些情况下，ASH 报告更有用。\n\n### 使用 Statspack\n\n如果你没有使用 AWR、ADDM 和 ASH 报告的许可证，免费的\
  \ Statspack 实用程序可以帮助你识别性能不佳的 SQL 语句。以 `SYS` 身份运行以下脚本来安装 Statspack：\n`SQL> @?/rdbms/admin/spcreate.sql`\n\
  \n此脚本创建一个拥有 Statspack 存储库的 `PERFSTAT` 用户。要启用 Statspack 统计信息的自动收集，请运行此脚本：\n`SQL>\
  \ @?/rdbms/admin/spauto.sql`\n\n在收集了一些快照之后，你可以以 `PERFSTAT` 用户身份运行以下脚本来创建 Statspack\
  \ 报告：\n`SQL> @?/rdbms/admin/spreport.sql`\n\n创建报告后，搜索标记为“按 CPU 排序的 SQL”的部分。以下是一些示例输出：\n\
  ```\nSQL ordered by CPU\nDB/Inst: DW11/DW11  Snaps: 11-14\n-> Total DB CPU (s):\
  \ 107\n-> Captured SQL accounts for  246.0% of Total DB CPU\n-> SQL reported below\
  \ exceeded  1.0% of Total DB CPU\n   CPU      CPU per        Elapsd            \
  \         Old\n  Time (s)  Executions   Exec (s)  %Total   Time (s)  Buffer Gets\
  \    Hash Value\n---------- ------------ ---------- ------ ---------- ---------------\
  \ ------------\n    254.95            4      63.74  238.1     249.74          12,811\
  \   2873951798\nModule: SQL*Plus\nselect count(*) from dba_indexes, dba_tables\n\
  ```\n\n■ **提示** 查看 `ORACLE_HOME/rdbms/admin/spdoc.txt` 文件以获取 Statspack 文档。\n\n##\
  \ 检测和解决锁定问题\n\n有时开发人员或应用程序用户会报告，一个通常只需几秒钟运行的进程现在需要几分钟，并且似乎没有任何进展。在这些情况下，问题通常是以下之一：\n\
  \n•  与空间相关的问题（例如，归档重做目标已满并暂停了所有事务）。\n•  一个进程锁定了表中的某一行，并且未提交或回滚，从而阻止另一个会话修改同一行。\n\
  \n在这种情况下，我首先检查 `alert.log`，看看最近是否有任何明显的问题发生（例如表空间无法再分配另一个区）。如果 `alert.log` 文件中没有明显问题，我会运行\
  \ SQL 查询来检查锁定问题。此处列出的查询是第 3 章介绍的锁定检测脚本的更复杂版本。此查询显示诸如锁定会话 SQL 语句和等待 SQL 语句等信息：\n\
  ```\nset lines 80\ncol blkg_user form a10\ncol blkg_machine form a10\ncol blkg_sid\
  \ form 99999999\ncol wait_user form a10\ncol wait_machine form a10\ncol wait_sid\
  \ form 9999999\ncol obj_own form a10\ncol obj_name form a10\ncol blkg_sql form a50\n\
  col wait_sql form a50\n--\nselect\n       s1.username   blkg_user\n      ,s1.machine\
  \   blkg_machine\n      ,s1.sid       blkg_sid\n      ,s1.serial#   blkg_serialnum\n\
  \      ,s1.process   blkg_OS_PID\n      ,substr(b1.sql_text,1,50) blkg_sql\n   \
  \   ,chr(10)\n      ,s2.username   wait_user\n      ,s2.machine    wait_machine\n\
  \      ,s2.sid        wait_sid\n      ,s2.serial#    wait_serialnum\n      ,s2.process\
  \    wait_OS_PID\n      ,substr(w1.sql_text,1,50) wait_sql\n      ,lo.object_id\
  \  blkd_obj_id\n      ,do.owner      obj_own\n      ,do.object_name obj_name\nfrom\
  \ v$lock l1\n    ,v$session s1\n    ,v$lock l2\n    ,v$session s2\n    ,v$locked_object\
  \ lo\n    ,v$sqlarea b1\n    ,v$sqlarea w1\n    ,dba_objects do\nwhere s1.sid =\
  \ l1.sid\n  and s2.sid = l2.sid\n  and l1.id1 = l2.id1\n  and s1.sid = lo.session_id\n\
  \  and lo.object_id = do.object_id\n  and l1.block = 1\n  and s1.prev_sql_addr =\
  \ b1.address\n  and s2.sql_address = w1.address\n  and l2.request > 0;\n```\n\n\
  此查询的输出不太适合放在一页上。运行此查询时，必须对其进行格式化以适应终端大小。以下是一些示例输出，表明 `INV` 表被 `STAR2` 用户锁定，而 `CIA_SEL`\
  \ 用户正在等待锁被释放：\n```\nBLKG_USER  BLKG_MACHI   BLKG_SID BLKG_SERIALNUM BLKG_OS_PID\n\
  ---------- ---------- --------- -------------- ------------\nBLKG_SQL          \
  \                                                     C\n--------------------------------------------------\
  \ -\nWAIT_USER  WAIT_MACHI\n---------- ----------\nWAIT_SID  WAIT_SERIALNUM WAIT_OS_PID\n\
  --------  -------------- ------------\nWAIT_SQL                                \
  \                             BLKD_OBJ_ID OBJ_OWN\n--------------------------------------------------\
  \ ----------- ----------\nOBJ_NAME\nupdate star2.inv set inv_id=3 where inv_id=7\
  \                                150553 STAR2\nINV\n```\n\n这种情况在应用程序未在代码中适当位置显式发出\
  \ `COMMIT` 或 `ROLLBACK` 时很常见。这会留下行上的锁，并阻止一个事务继续，直到锁被释放。在这种情况下，你可以尝试找到阻塞事务的用户，看看他们是否需要按下屏幕上类似“提交更改”的按钮。如果那不可能，你可以手动终止其中一个会话。请记住，终止会话可能会产生不可预见的副作用（例如回滚用户认为已提交的数据）。\n\
  \n如果你决定终止其中一个会话，则需要标识要终止的会话的 `SID` 和序列号。标识后，使用 `ALTER SYSTEM KILL SESSION` 语句终止用户会话。在此示例中，我决定终止\
  \ `STAR2` 用户持有的 `SID` 为 `1072`、序列号为 `29` 的锁，因此我以 DBA 特权账户运行以下语句：\n`SQL> alter system\
  \ kill session '1084,265';`\n\n再次强调，终止会话时要小心。确保你知道终止会话的影响，从而回滚该会话中当前打开的任何活动事务。\n\
  \n终止会话的另一种方法是使用操作系统命令，例如 `kill`。从前面的输出中，你可以从 `BLKG_OS_PID` 列和 `WAIT_OS_PID` 列标识操作系统进程。在操作系统终止进程之前，请确保它不是关键进程。\n\
  \n对于此示例，要终止阻塞的操作系统进程，首先要检查阻塞的进程 ID：\n`$ ps -ef | grep 3153`\n\n以下是一些示例输出：\n`oracle\
  \   3153   1690  0 10:40:30 pts/1    0:00 sqlplus star2....`\n\n接下来使用 `kill` 命令，如下所示：\n\
  `$ kill -9 3153`\n\n`kill` 命令将立即终止进程。与该进程相关的任何打开的事务都将由 Oracle 进程监视器回滚。\n\n## 解决打开游标问题\n\
  \n`OPEN_CURSORS` 初始化参数确定一个会话可以打开的游标数最大值。此设置是针对每个会话的。默认值 50 对于任何应用程序来说通常都太低。\n\n\
  当应用程序超过允许的打开游标数时，会抛出以下错误：\n`ORA-01000: maximum open cursors exceeded`\n\n通常在以下情况下遇到前面的错误：\n\
  \n•  `OPEN_CURSORS` 初始化参数设置得太低。\n•  开发人员编写的代码未能正确关闭游标。\n\n要调查此问题，首先确定参数的当前设置：\n\
  `SQL> show parameter open_cursors;`\n\n如果该值小于 300，请考虑将其设置得更高。我通常将此值设置为 1000 以用于繁忙的\
  \ OLTP 系统。你可以在数据库打开时动态修改此值，如下所示：\n`SQL> alter system set open_cursors=1000;`\n\n\
  如果你使用的是 `spfile`，请考虑同时在内存和 `spfile` 中进行更改：\n`SQL> alter system set open_cursors=1000\
  \ scope=both;`\n\n将 `OPEN_CURSORS` 设置为更高的值后，如果应用程序仍然继续超过最大值，则可能存在未正确关闭游标的代码问题。运行如下查询以确定每个会话已打开的游标数：\n\
  ```\nselect\n       a.value\n      ,c.username\n      ,c.machine\n      ,c.sid\n\
  \      ,c.serial#\nfrom v$sesstat a\n    ,v$statname b\n    ,v$session c\nwhere\
  \ a.statistic# = b.statistic#\n  and c.sid = a.sid\n  and b.name = 'opened cursors\
  \ current'\n  and a.value != 0\n  and c.username IS NOT NULL\norder by 1,2;\n```\n\
  \n■ **提示** 我建议你查询 `V$SESSION` 而不是 `V$OPEN_CURSOR` 来确定打开的游标数。`V$SESSION` 提供当前打开的游标数的更准确数字。\n\
  \n如果你在一个有数千个数据库连接的环境中工作，可能只想查看消耗游标最多的会话。以下查询使用内联视图和伪列 `ROWNUM` 来显示前二十个值：\n```\n\
  select * from (\nselect\n       a.value\n      ,c.username\n      ,c.machine\n \
  \     ,c.sid\n      ,c.serial#\nfrom v$sesstat a\n    ,v$statname b\n    ,v$session\
  \ c\nwhere a.statistic# = b.statistic#\n  and c.sid = a.sid\n  and b.name = 'opened\
  \ cursors current'\n  and a.value != 0\n  and c.username IS NOT NULL\norder by 1\
  \ desc,2)\nwhere rownum < 21;\n```\n\n如果单个会话有超过 1000 个打开的游标，代码中很可能有未关闭游标的地方。当达到此限制时，应该有人检查应用程序代码以确定是否有游标未被关闭。\n\
  \n## 排除撤销表空间问题\n\n撤销表空间的问题通常具有以下性质：\n\n• `ORA-01555: snapshot too old`\n• `ORA-30036:\
  \ unable to extend segment by ... in undo tablespace 'UNDOTBS1'`\n\n前面列出的错误可能由许多不同的问题引起，例如撤销表空间大小设置不正确或编写不佳的\
  \ SQL 或 PL/SQL 代码。\n\n### 确定撤销是否设置正确\n\n假设你有一个运行时间很长的 SQL 语句，它抛出 `ORA-01555` “快照太旧”错误，你想确定向撤销表空间添加空间是否可能有助于缓解此问题。\n\
  \n运行下一个查询以识别撤销表空间的潜在问题。该查询检查过去一天内发生的撤销表空间问题：\n```\nselect\n       to_char(begin_time,'MM-DD-YYYY\
  \ HH24:MI') begin_time\n      ,ssolderrcnt ORA_01555_cnt\n      ,nospaceerrcnt no_space_cnt\n\
  \      ,txncount max_num_txns\n      ,maxquerylen max_query_len\n      ,expiredblks\
  \ blck_in_expired\nfrom v$undostat\nwhere begin_time > sysdate - 1\norder by begin_time;\n\
  ```\n\n以下是一些示例输出。部分输出已被省略以适合页面：\n```\nBEGIN_TIME       ORA_01555_CNT NO_SPACE_CNT\
  \ MAX_NUM_TXNS MAX_QUERY_LEN\n---------------- ------------- ------------ ------------\
  \ -------------\n07-20-2009 18:10             0            0          249      \
  \       0\n07-20-2009 18:20             0            0          290            \
  \ 0\n07-20-2009 18:30             0            0          244             0\n07-20-2009\
  \ 18:40             0            0          179             0\n```\n\n`ORA_01555_CNT`\
  \ 列指示你的数据库遇到 `ORA-01555` “快照太旧”错误的次数。如果此列报告非零值，你需要执行以下一项或多项操作：\n\n•  确保代码中不包含游标循环内的\
  \ `COMMIT` 语句。\n•  调整抛出错误的 SQL 语句，使其运行得更快。\n•  确保你有良好的统计信息（以便你的 SQL 高效运行）。\n•  增加\
  \ `UNDO_RETENTION` 初始化参数。\n\n`NO_SPACE_CNT` 列显示在撤销表空间中请求空间但未找到的次数。如果 `NO_SPACE_CNT`\
  \ 报告非零值，你可能需要向撤销表空间添加更多空间。\n\n`V$UNDOSTAT` 视图中最多存储四天的信息。每十分钟收集一次统计信息，表中最多有 576 行。如果你在过去四天内停止并启动了数据库，则此视图仅包含上次启动数据库以来的信息。\n\
  \n获取撤销表空间大小设置建议的另一种方法是使用 Oracle 撤销顾问 (Undo Advisor)，你可以通过从 `SELECT` 语句中查询 PL/SQL\
  \ `DBMS_UNDO_ADV` 包来调用它。以下查询显示当前撤销大小以及撤销保留设置为 900 秒的推荐大小：\n```\nselect\n       sum(bytes)/1024/1024\
  \ cur_mb_size\n      ,dbms_undo_adv.required_undo_size(900) req_mb_size\nfrom dba_data_files\n\
  where tablespace_name =\n      (select\n             value\n       from v$parameter\n\
  \       where name = 'undo tablespace');\n```\n\n以下是一些示例输出：\n```\nCUR_MB_SIZE REQ_MB_SIZE\n\
  ----------- -----------\n      36864       20897\n```\n\n输出显示撤销表空间当前分配了 36.8 GB。在前面的查询中，你使用\
  \ 900 秒作为在撤销表空间中保留信息的时间。要将撤销信息保留 900 秒，Oracle 撤销顾问估计撤销表空间应为 20.8 GB。在此示例中，撤销表空间大小是足够的。如果大小不足，则必须向现有数据文件添加空间，或者向撤销表空间添加一个数据文件。\n\
  \n以下是使用 Oracle 撤销顾问查找所需撤销表空间大小的一个稍微复杂的示例。此示例使用 PL/SQL 显示有关潜在问题的信息以及修复问题的建议：\n```\n\
  SET SERVEROUT ON SIZE 1000000\nDECLARE\n  pro VARCHAR2(200);\n  rec VARCHAR2(200);\n\
  \  rtn VARCHAR2(200);\n  ret NUMBER;\n  utb NUMBER;\n  retval NUMBER;\nBEGIN\n \
  \ DBMS_OUTPUT.PUT_LINE(DBMS_UNDO_ADV.UNDO_ADVISOR(1));\n  DBMS_OUTPUT.PUT_LINE('Required\
  \ Undo Size (megabytes): ' || DBMS_UNDO_ADV.REQUIRED_UNDO_SIZE(900));\n  retval\
  \ := DBMS_UNDO_ADV.UNDO_HEALTH(pro, rec, rtn, ret, utb);\n  DBMS_OUTPUT.PUT_LINE('Problem:\
  \ ' || pro);\n  DBMS_OUTPUT.PUT_LINE('Advice: ' || rec);\n  DBMS_OUTPUT.PUT_LINE('Rational:\
  \ ' || rtn);\n  DBMS_OUTPUT.PUT_LINE('Retention: ' || TO_CHAR(ret));\n  DBMS_OUTPUT.PUT_LINE('UTBSize:\
  \ ' || TO_CHAR(utb));\nEND;\n/\n```\n\n如果未发现问题，将为保留大小返回 0。以下是一些示例输出：\n```\nFinding\
  \ 1:The undo tablespace is OK.\nRequired Undo Size (megabytes): 20897\nProblem:\
  \ No problem found\nAdvice:\nRational:\nRetention: 0\nUTBSize: 0\n```\n\n### 查看消耗撤销空间的\
  \ SQL\n\n有时一段代码未正确提交，导致大量空间被分配到撤销表空间中且永远不会被释放。迟早你会得到 `ORA-30036` 错误，指示表空间无法扩展。通常，第一次出现空间相关错误时，我只是增加与撤销表空间关联的一个数据文件的大小。\n\
  \n但是，如果 SQL 语句继续运行并填满新添加的空间，那么问题可能出在编写不佳的应用程序上。例如，开发人员可能未在代码中包含适当的提交语句。\n\n在这些情况下，识别哪些用户正在消耗撤销表空间中的空间很有帮助。运行此查询以报告每个用户分配空间的基本信息：\n\
  ```\nselect\n       s.sid\n      ,s.serial#\n      ,s.osuser\n      ,s.logon_time\n\
  \      ,s.status\n      ,s.machine\n      ,t.used_ublk\n      ,t.used_ublk*16384/1024/1024\
  \ undo_usage_mb\nfrom v$session s\n    ,v$transaction t\nwhere t.addr = s.taddr;\n\
  ```\n\n如果你想查看与消耗撤销空间的用户关联的 SQL 语句，请连接到 `V$SQL`，如下所示：\n```\nselect\n       s.sid\n\
  \      ,s.serial#\n      ,s.osuser\n      ,s.logon_time\n      ,s.status\n     \
  \ ,s.machine\n      ,t.used_ublk\n      ,t.used_ublk*16384/1024/1024 undo_usage_mb\n\
  \      ,q.sql_text\nfrom v$session s\n    ,v$transaction t\n    ,v$sql q\nwhere\
  \ t.addr = s.taddr\n  and s.sql_id = q.sql_id;\n```\n\n如果你需要更多信息，例如回退段的名称和状态，请运行连接到\
  \ `V$ROLLNAME` 和 `V$ROLLSTAT` 视图的查询，如下所示：\n```\nselect\n       s.sid\n      ,s.serial#\n\
  \      ,s.username\n      ,s.program\n      ,r.name undo_name\n      ,rs.status\n\
  \      ,rs.rssize/1024/1024 redo_size_mb\n      ,rs.extents\nfrom v$session s\n\
  \    ,v$transaction t\n    ,v$rollname r\n    ,v$rollstat rs\nwhere s.taddr = t.addr\n\
  \  and t.xidusn = r.usn\n  and r.usn = rs.usn;\n```\n\n前面的查询允许你精确定位哪些用户应对撤销表空间内分配的空间负责。当存在未在适当时间提交并过度消耗撤销空间的代码时，这尤其有用。\n\
  \n## 处理临时表空间问题\n\n临时表空间的问题比较容易发现。例如，当临时表空间空间不足时，将抛出以下错误：\n`ORA-01652: unable to\
  \ extend temp segment by 128 in tablespace TEMP`\n\n当你看到此错误时，需要确定临时表空间是否有足够空间，或者是否是一个罕见的失控\
  \ SQL 查询暂时消耗了过多的临时空间。以下部分将讨论这两个问题。\n\n### 确定临时表空间是否设置正确\n\n当进程消耗了可用内存并需要更多空间时，临时表空间用作磁盘上的排序区域。需要排序区域的操作包括：\n\
  \n•  索引创建\n•  SQL 排序操作\n•  临时表和临时索引\n•  临时 LOB\n•  临时 B 树\n\n没有确切的公式来确定临时表空间是否设置正确。它取决于查询的数量和类型、索引构建操作、并行操作以及内存排序空间（程序全局区）的大小。你必须在数据库上有负载时监控临时表空间，以确定其使用模式。如果你使用的是\
  \ Oracle Database 11 *g* 或更高版本，请运行以下查询以显示临时表空间中已分配和可用的空间：\n```\nselect\n       tablespace_name\n\
  \      ,tablespace_size/1024/1024 mb_size\n      ,allocated_space/1024/1024 mb_alloc\n\
  \      ,free_space/1024/1024 mb_free\nfrom dba_temp_free_space;\n```\n\n以下是一些示例输出：\n\
  ```\nTABLESPACE_NAME                MB_SIZE   MB_ALLOC    MB_FREE\n------------------------------\
  \ -------- ---------- ----------\nTEMP                               200       \
  \ 200        170\n```\n\n如果 `FREE_SPACE` (`MB_FREE`) 值降至接近零，则表示数据库中的 SQL 操作正在消耗大部分可用空间。`FREE_SPACE`\
  \ (`MB_FREE`) 列是总的可用空间，包括当前已分配和可重用的空间。\n\n如果你使用的是 Oracle Database 10 *g* 数据库，请运行此查询以查看临时表空间中正在使用的空间：\n\
  ```\nselect\n       tablespace_name\n      ,sum(bytes_used)/1024/1024 mb_used\n\
  from v$temp_extent_pool\ngroup by tablespace_name;\n```\n\n以下是一些示例输出：\n```\nTABLESPACE_NAME\
  \                  MB_USED\n------------------------------ ----------\nTEMP    \
  \                             120\n```\n\n如果使用量接近当前分配量，你可能需要向临时表空间数据文件分配更多空间。运行以下查询以查看临时数据文件名称和分配大小：\n\
  `SQL> select name, bytes/1024/1024 mb_alloc from v$tempfile;`\n\n以下是一些典型输出：\n```\n\
  NAME                                                  MB_ALLOC\n--------------------------------------------------\
  \ ----------\n/ora02/DWREP/temp01.dbf                                12000\n/ora03/DWREP/temp03.dbf\
  \                                10240\n/ora01/DWREP/temp02.dbf                \
  \                 2048\n```\n\n在首次创建数据库时，如果我对临时表空间的“正确”大小一无所知，我通常会将此表空间的大小设置为大约\
  \ 2GB。如果我正在构建数据仓库类型的数据库，我可能会将临时表空间的大小设置为大约 20GB。你必须使用适当的 SQL 监控临时表空间，并根据需要调整大小。\n\
  \n### 查看消耗临时空间的 SQL\n\n当 Oracle 抛出 `ORA-01652` “无法扩展临时段”错误时，这是临时表空间太小的一个指标。但是，如果\
  \ Oracle 因一次性事件（例如大型索引构建）而耗尽空间，它也可能会抛出该错误。你必须决定一次性索引构建或消耗临时表空间中大量排序空间的查询是否值得添加空间。\n\
  \n要查看会话在临时表空间中使用的空间，请运行此查询：\n```\nSELECT\n    s.sid\n    ,s.serial#\n    ,s.username\n\
  \    ,p.spid\n    ,s.module\n    ,p.program\n    ,SUM(su.blocks) * tbsp.block_size/1024/1024\
  \ mb_used\n    ,su.tablespace\nFROM v$sort_usage su\n    ,v$session s\n    ,dba_tablespaces\
  \ tbsp\n    ,v$process p\nWHERE su.session_addr = s.saddr\n  AND su.tablespace =\
  \ tbsp.tablespace_name\n  AND s.paddr = p.addr\nGROUP BY\n    s.sid, s.serial#,\
  \ s.username, s.osuser, p.spid, s.module,\n    p.program, tbsp.block_size, su.tablespace\n\
  ORDER BY s.sid;\n```\n\n如果你确定需要添加空间，可以调整现有数据文件的大小或添加新的数据文件。要调整临时表空间数据文件的大小，请使用 `ALTER\
  \ DATABASE TEMPFILE...RESIZE` 语句。以下将临时数据文件大小调整为 12GB：\n`SQL> alter database tempfile\
  \ '/ora03/DWREP/temp03.dbf' resize 12g;`\n\n你可以按如下方式向临时表空间添加数据文件：\n`SQL> alter tablespace\
  \ temp add tempfile '/ora04/DWREP/temp04.dbf' size 2g;`\n\n## 审计\n\n*审计*通常意味着在发生特定事件时创建记录。通常审计的活动包括：\n\
  \n•  向表插入、从表选择、更新或删除数据时。\n•  用户登录/注销时间。\n•  使用什么 SQL 更新表。\n•  索引上次使用的时间。\n\n审计在对数据库进行安全问题故障排除时特别有用。审计为你提供信息，用于诊断哪些对象被哪些用户在何时访问。这为你提供了一种检测和报告未经授权的操作或安全漏洞的机制。因此，许多数据库需要启用某种程度的审计，以符合监管机构或公司内部安全要求。\n\
  \n审计还有助于诊断某些性能问题。例如，了解何时运行了什么 SQL 或在特定时间连接到数据库的用户数量，将有助于诊断和解决某些问题。\n\n有几种不同的方法可以启用审计：\n\
  \n•  设置数据库初始化参数。\n•  通过 `AUDIT` SQL 语句启用 Oracle 标准审计。\n•  启用细粒度审计。\n•  使用数据字典视图。\n\
  •  基于某些事件填充列或表的自定义 DBA 开发的触发器。\n\n我不打算涵盖前面列表中审计的每个方面（那将是大量的文档）。相反，我将展示 DBA 用于审计数据库的基本技术。如果需要更多详细信息，请参阅《Oracle\
  \ 数据库安全指南》（可在 Oracle 的 OTN 网站上获取）。\n\n### 启用 Oracle 标准审计\n\nOracle 标准审计允许你审计数据库中几乎任何类型的\
  \ SQL 活动。你可以审计对表的任何类型的插入、更新、删除或选择。你还可以审计任何系统权限活动，如 `CREATE TABLE`、`DROP INDEX` 等。\n\
  \n你可以通过 `BY ACCESS` 或 `BY SESSION` 启用审计。在 Oracle Database 11 *g* release 2 之前，`BY\
  \ SESSION` 会为每个审计操作为每个会话只记录一条记录。在当前版本的 Oracle 中，`BY SESSION` 将为相同的审计操作记录多条记录。\n\n\
  你还可以通过 `WHENEVER SUCCESSFUL` 或 `WHENEVER NOT SUCCESSFUL` 启用审计。这允许你专门针对特定语句的成功或失败进行审计。\n\
  \nOracle 的标准审计功能通过设置 `AUDIT_TRAIL` 初始化参数来启用。我通常将 `AUDIT_TRAIL` 参数设置为 `DB`，这指定 Oracle\
  \ 将审计记录写入名为 `AUD$` 的内部数据库表。例如，使用 `spfile` 时，设置 `AUDIT_TRAIL` 参数的方法如下：\n`SQL> alter\
  \ system set audit_trail=db scope=spfile;`\n\n如果你使用的是 `init.ora` 文件，请用文本编辑器打开它并将\
  \ `AUDIT_TRAIL` 值设置为 `DB`。`AUDIT_TRAIL` 参数的有效值描述见表 22–5。\n\n■ **提示** 即使我不做任何审计，我也通常将\
  \ `AUDIT_TRAIL` 参数设置为 `DB`。这样，当我想要为特定操作启用审计时，我可以这样做，而无需停止并重新启动数据库。\n\n***表 22–5.**\
  \ 有效的 `AUDIT_TRAIL` 设置*\n\n| **设置** | **含义** |\n| :--- | :--- |\n| `DB` | 启用审计并将\
  \ `SYS.AUD$` 表设置为审计存储库。 |\n| `DB_EXTENDED` | 启用审计并将 `SYS.AUD$` 表设置为审计存储库，并包含 `SQLTEXT`\
  \ 和 `SQLBIND` 列。这对于查看发出的实际 SQL 语句很有用。使用此选项时要小心，因为它会消耗更多空间。在 Oracle 的早期版本中，该参数指定为\
  \ `'DB, EXTENDED'`。 |\n| `OS` | 启用审计并指定操作系统文件将存储审计信息。 |\n| `XML` | 启用审计并将审计记录以 XML\
  \ 格式写入操作系统文件。 |\n| `NONE` | 禁用数据库审计。 |\n\n你必须停止并启动数据库才能使 `AUDIT_TRAIL` 参数生效：\n```\n\
  SQL> shutdown immediate;\nSQL> startup;\nSQL> show parameter audit_trail;\nNAME\
  \                                 TYPE        VALUE\n------------------------------------\
  \ ----------- ------------------------------\naudit_trail                      \
  \    string      DB\n```\n\n设置 `AUDIT_TRAIL` 参数后，不会启用任何实际的审计事件。你必须使用 `AUDIT` 语句来控制对特定数据库事件的审计。启用审计的示例将在接下来的几节中展示。\n\
  \n■ **提示** 将数据库初始化参数 `AUDIT_SYS_OPERATIONS` 设置为 `TRUE`。这确保所有 `SYS` 活动都记录到由 `AUDIT_FILE_DEST`\
  \ 指定的目录中的文件中（无论 `AUDIT_TRAIL` 的设置如何）。这为你提供了一种简单有效的方法来审计 `SYS` 用户。\n\n### 审计 DML\
  \ 使用情况\n\n有时在对磁盘空间或性能问题进行故障排除时，了解数据库中哪些表实际被应用程序使用会很方便。如果你继承了一个包含数百个表的数据库，可能不明显哪些对象正在被访问。想法是，如果你能识别未使用的表，那么你可以重命名并最终删除它们，从而释放空间并减少数据库中杂乱的对象。\n\
  \n审计允许你捕获用于访问表的 SQL 语句类型。例如，以下语句启用对 `INV_MGMT` 用户拥有的 `EMP` 表的所有 DML 访问的审计：\n`SQL>\
  \ audit select, insert, update, delete on inv_mgmt.emp;`\n\n从此时起，对 `INV_MGMT.EMP`\
  \ 表的任何 DML 访问都将记录在 `SYS.AUD$` 表中。你可以使用如下查询来报告对表的 DML 访问：\n```\nselect\n       username\n\
  \      ,obj_name\n      ,timestamp\n      ,substr(ses_actions,4,1) del\n      ,substr(ses_actions,7,1)\
  \ ins\n      ,substr(ses_actions,10,1) sel\n      ,substr(ses_actions,11,1) upd\n\
  from dba_audit_object;\n```\n\n在前面的 SQL 语句中，注意使用 `SUBSTR` 函数引用 `DBA_AUDIT_OBJECT`\
  \ 视图的 `SES_ACTIONS` 列。该列包含一个 16 字符的字符串，其中每个字符表示已发生某个操作。这 16 个字符按以下顺序表示以下操作：`ALTER`、`AUDIT`、`COMMENT`、`DELETE`、`GRANT`、`INDEX`、`INSERT`、`LOCK`、`RENAME`、`SELECT`、`UPDATE`、`REFERENCES`\
  \ 和 `EXECUTE`。位置 14、15 和 16 由 Oracle 保留供将来使用。字符 `S` 代表成功，`F` 代表失败，`B` 代表成功和失败。\n\
  \n一旦识别出未使用的表，你可以简单地重命名这些表，看看这是否会破坏应用程序或是否有任何用户投诉。如果没有投诉，那么过一段时间你可以考虑删除这些表。确保在删除任何可能需要恢复的表之前，使用\
  \ RMAN 和 Data Pump 对数据库进行良好备份。\n\n要关闭对对象的审计，请使用 `NOAUDIT` 语句：\n`SQL> noaudit select,\
  \ insert, update, delete on inv_mgmt.inv;`\n\n■ **提示** 如果你只需要知道表是否正在被插入、更新或删除，可以使用\
  \ `USER_TAB_MODIFICATIONS` 视图来报告此类活动。该视图具有 `INSERTS`、`UPDATES`、`DELETES` 和 `TRUNCATED`\
  \ 等列，这些列将提供有关表数据如何被修改的信息。\n\n### 审计登录/注销事件\n\n一种基本的安全审计技术是记录数据库中所有用户的登录和注销活动。这使审计员能够确定谁在何时使用了数据库。这些信息在诊断安全漏洞和未经授权的操作时至关重要。\n\
  \n使用 `AUDIT` 的 `BY ACCESS` 子句来启用登录和注销活动的审计，如下所示：\n`SQL> audit create session by\
  \ access;`\n\n现在，每个登录和注销数据库的用户都会导致一条记录插入到 `AUD$` 表中。你可以使用如下查询报告登录和注销活动：\n```\nselect\n\
  \       username\n      ,action_name\n      ,to_char(timestamp,'dd-mon-yyyy hh24:mi:ss')\
  \ event_time\n      ,to_char(logoff_time,'dd-mon-yyyy hh24:mi:ss') logoff_time\n\
  from dba_audit_trail;\n```\n\n以下是一些示例输出：\n```\nUSERNAME     ACTION_NAME    EVENT_TIME\
  \             LOGOFF_TIME\n------------ -------------- ---------------------- --------------------------\n\
  LARRY        LOGON          08-oct-2010 16:18:45\nLARRY        LOGOFF         08-oct-2010\
  \ 16:18:49 08-oct-2010 16:18:49\nDW_MAINT     LOGON          08-oct-2010 16:19:33\n\
  ```\n\n你可以通过指定用户名来为特定用户启用登录和注销访问审计：\n`SQL> audit session by larry by access;`\n\n\
  你可以如下禁用登录/注销审计：\n`SQL> noaudit create session;`\n\n要禁用单个会话的登录/注销，请指定用户名：\n`SQL>\
  \ noaudit session by larry;`\n\n另一种审计连接的方法是通过 `AUDIT` 的 `CONNECT` 选项，如下所示：\n`SQL>\
  \ audit connect;`\n\n要禁用此选项，请运行此 SQL：\n`SQL> noaudit connect;`\n\n前面的技术提供了一种快速启用数据库连接审计的方法。这在对安全违规或应用程序问题进行故障排除时非常有用。\n\
  \n注意：**一些 DBA 通过 `AFTER LOGON ON DATABASE` 触发器和 `BEFORE LOGOFF ON DATDABASE` 触发器启用登录和注销的审计，这些触发器插入到自定义表中。我不喜欢这种方法，因为它需要自定义对象和自定义代码。为什么要编写代码来实现\
  \ Oracle 已经拥有简单有效解决方案的事情？此外，如果触发器或自定义表出现问题，你可能会发现无法再登录到 Oracle。这不好。**\n\n### 查看已启用的审计操作\n\
  \n有几个数据字典视图允许你查看已启用哪些审计操作。\n\n使用以下查询查看在权限级别启用的审计：\n```\nselect\n       user_name\n\
  \      ,privilege\n      ,success\n      ,failure\nfrom dba_priv_audit_opts;\n```\n\
  \n以下是一些示例输出：\n```\nUSER_NAME              PRIVILEGE                      SUCCESS\
  \    FAILURE\n---------------------- ------------------------------ ---------- ----------\n\
  \                       CREATE ANY PROCEDURE           BY ACCESS  BY ACCESS\n  \
  \                     CREATE PROCEDURE               BY ACCESS  BY ACCESS\n    \
  \                   DELETE ANY TABLE               BY SESSION BY SESSION\n```\n\n\
  运行以下查询以查看语句级别审计操作：\n```\nselect\n       user_name\n      ,audit_option\n      ,success\n\
  \      ,failure\nfrom dba_stmt_audit_opts;\n```\n\n下一个查询审计对象级别审计操作。在此示例中，仅选择了可用列的一小部分（以使输出位于一页上）：\n\
  ```\nselect\n       owner\n      ,object_name\n      ,object_type\n      ,alt\n\
  \      ,del\n      ,upd\nfrom dba_obj_audit_opts;\n```\n\n以下是一些示例输出：\n```\nOWNER\
  \      OBJECT_NAME   OBJECT_TYPE ALT    DEL    UPD\n---------- ------------- -----------\
  \ ------ ------ ------\nSYS        AUD$          TABLE       -/-    S/S    -/-\n\
  ```\n\n在前面的输出中，短横线 (`-`) 表示未启用审计选项，`S` 表示按会话启用了审计选项，`A` 表示按访问启用了审计操作。对于每个选项，有两个可能的设置：`WHENEVER\
  \ SUCCESSFUL` 和 `WHENEVER NOT SUCCESSFUL`。它们由正斜杠分隔。因此，在前面的输出中，对从 `AUD$` 表删除的按会话审计已为成功和不成功的语句启用。\n\
  \n### 关闭审计\n\n要永久禁用审计，请将 `AUDIT_TRAIL` 初始化参数设置为 `none`：\n`SQL> alter system set\
  \ audit_trail='none' scope=spfile;`\n\n现在停止并重新启动数据库以关闭 Oracle 标准审计功能。\n\n■ **注意**\
  \ 无论 `AUDIT_TRAIL` 的设置如何，某些数据库事件总是被审计，例如作为 `SYSDBA` 或 `SYSOPER` 的连接以及数据库启动和关闭事件。\n\
  \n如果你只想禁用之前使用 `AUDIT` 启用的功能，请使用 `NOAUDIT` 语句关闭特定的审计事件。例如，以下语句关闭通过 `AUDIT ALL` 语句启用的所有语句审计：\n\
  `SQL> noaudit all;`\n\n下一个示例关闭权限的审计：\n`SQL> noaudit all privileges;`\n\n你可以关闭特定的审计操作。例如，假设你之前通过以下方式启用了对表的审计：\n\
  `SQL> audit delete any table;`\n\n你可以如下关闭前面的审计：\n`SQL> noaudit delete any table;`\n\
  \n你也可以使用 SQL 生成 SQL 来关闭审计。以下脚本生成一个可用于关闭所有语句审计的脚本：\n```\nset head off pages 0\nspo\
  \ turn_off_audit.sql\nselect 'noaudit ' || audit_option || ';'\nfrom dba_stmt_audit_opts;\n\
  spo off;\n```\n\n### 清除审计表和文件\n\n你应该定期清除 `AUD$` 表，以免它在 `SYSTEM` 表空间中消耗过多的空间。（要将\
  \ `AUD$` 表移出 `SYSTEM` 表空间，请参阅下一节。）清除审计记录的最简单方法是从审计表中删除或截断。此示例截断 `AUD$` 表：\n`SQL>\
  \ truncate table aud$;`\n\n如果你需要保存 `AUD$` 数据，可以先导出该表，然后使用 `TRUNCATE` 命令删除记录。如果你想保留\
  \ `AUD$` 表中的较新记录，请使用 `DELETE` 语句。例如，这会删除超过 21 天的记录：\n`SQL> delete from aud$ where\
  \ timestamp# > sysdate + 21;`\n\n如果需要从操作系统中删除审计记录，请使用 Linux/Unix `find` 命令识别超过一定时限的文件，然后删除它们。首先，确定审计文件的目录位置：\n\
  ```\nSQL> select value from v$parameter where name='audit_file_dest';\nVALUE\n/oracle/app/oracle/product/11.2.0/db_1/rdbms/audit\n\
  ```\n\n现在从操作系统导航到审计文件目录，识别并删除超过一定时限的文件：\n`$ cd /oracle/app/oracle/product/11.2.0/db_1/rdbms/audit`\n\
  \n使用 `find` 和 `rm` 命令删除超过一定时限的文件。以下命令从当前工作目录中删除扩展名为 `.aud` 且超过七天的文件：\n`$ find .\
  \ -maxdepth 1 -type f -mtime +7 -name \"*.aud\" | xargs rm`\n\n前面的技术会永久删除操作系统中的文件。请确保你位于正确的位置，并且不再需要审计文件。\n\
  \n请记住，你可以使用 `DBMS_AUDIT_MGMT` 包来清除审计跟踪记录和审计跟踪文件。我个人更喜欢像本节所示那样手动截断和删除文件，因为它简单高效。如果你想使用\
  \ `DBMS_AUDIT_MGMT` 包来管理审计空间，请参阅《Oracle 数据库安全》指南（可在 Oracle 的 OTN 网站上获取）以获取更多详细信息。\n\
  \n### 将审计表移动到非系统表空间\n\n如果你要进行大量审计，我建议将 `AUD$` 表移动到非 `SYSTEM` 表空间。你可能希望这样做，以便审计操作不会影响\
  \ `SYSTEM` 表空间中使用的空间或影响 `SYSTEM` 表空间的性能。\n\n使用 `DBMS_AUDIT_MGMT` 包将 `AUD$` 表移动到单独的表空间。此示例将\
  \ `AUD$` 表移动到名为 `AUD_TBSP` 的表空间：\n```\nBEGIN\n  DBMS_AUDIT_MGMT.SET_AUDIT_TRAIL_LOCATION(\n\
  \    AUDIT_TRAIL_TYPE     => DBMS_AUDIT_MGMT.AUDIT_TRAIL_AUD_STD,\n    AUDIT_TRAIL_LOCATION_VALUE\
  \ => 'AUD_TBSP');\nEND;\n/\n```\n\n在前面的 PL/SQL 代码中，`AUDIT_TRAIL_TYPE` 参数可以具有以下值：\n\
  \n• `DBMS_AUDIT_MGMT.AUDIT_TRAIL_AUD_STD` 仅移动标准审计跟踪 `AUD$` 表。\n• `DBMS_AUDIT_MGMT.AUDIT_TRAIL_FGA_STD`\
  \ 仅移动细粒度审计跟踪 `FGA_LOG$` 表。\n• `DBMS_AUDIT_MGMT.AUDIT_TRAIL_DB_STD` 同时移动标准和细粒度审计跟踪表。\n\
  \n请注意，如果 `AUD$` 表中有大量记录，前面的 PL/SQL 可能需要很长时间。你可以通过以下查询验证表是否已正确移动：\n`SQL> select table_name,\
  \ tablespace_name from dba_tables where table_name='AUD$';`\n\n■ **提示** 如果你想手动将\
  \ `AUD$` 表移动到非 `SYSTEM` 表空间，请参阅 My Oracle Support 说明 72460.1 以获取说明。请注意，手动移动 `AUD$`\
  \ 表不受 Oracle 支持，并且在升级数据库时可能会导致问题。我提到它是因为我知道许多 DBA 手动移动 `AUD$` 表。如果你维护的是从其他 DBA 那里继承的数据库，则需要了解此类活动。\n\
  \n### 细粒度审计\n\n*细粒度审计*（FGA 审计）是与常规数据库审计分开的功能。细粒度审计允许你在比简单的 `INSERT`、`UPDATE`、`DELETE`\
  \ 和 `SELECT` 操作更精细的级别上审计 SQL。FGA 审计允许你审计在列级别发生的 SQL 活动。FGA 审计还允许你对操作执行布尔检查，例如“如果选定的值在某个范围内，则审计该活动。”\n\
  \n你通过使用 FGA 策略来管理细粒度审计。`DBMS_FGA` 包允许你添加、禁用、启用和删除 FGA 策略。你需要 `DBMS_FGA` 包的执行权限来管理审计策略。\n\
  \n■ **注意** 细粒度审计功能需要 Oracle 的企业版。\n\n以下是实现 FGA 的步骤：\n\n1.  使用 `DBMS_FGA` 包创建策略。此示例为\
  \ `INV` 表创建一个策略，并指定对 `EMP` 表的 `SALARY` 列的任何 `INSERT`、`UPDATE`、`DELETE` 或 `SELECT`\
  \ 语句都将记录在审计跟踪中：\n```\nbegin\n  dbms_fga.add_policy (\n    object_schema   => 'INV',\n\
  \    object_name     => 'EMP',\n    audit_column    => 'SALARY',\n    policy_name\
  \     => 'S1_AUDIT',\n    statement_types => 'INSERT, UPDATE, DELETE, SELECT',\n\
  \    audit_trail     => DBMS_FGA.DB_EXTENDED\n  );\nend;\n/\n```\n2.  通过查询 `DBA_AUDIT_POLICIES`\
  \ 视图验证策略是否存在：\n```\nselect object_schema\n      ,object_name\n      ,policy_name\n\
  \      ,sel, ins, upd, del\n      ,policy_column\nfrom dba_audit_policies;\n```\n\
  此示例的输出如下：\n```\nOBJECT_SCHEMA  OBJECT_NAME  POLICY_NAME  SEL INS UPD DEL POLICY_COL\n\
  -------------- ------------ ------------ --- --- --- --- ----------\nINV       \
  \     EMP          S1_AUDIT     YES YES YES YES SALARY\n```\n3.  要查看 FGA 审计跟踪中记录的\
  \ SQL 语句，请从 `DBA_FGA_AUDIT_TRAIL` 视图中选择：\n```\nselect\n       db_user\n      ,to_char(timestamp,'dd-mon-yy\
  \ hh24:mi:ss') ts\n      ,sql_text\nfrom dba_fga_audit_trail\norder by timestamp;\n\
  ```\n■ **注意** `DBA_FGA_AUDIT_TRAIL` 视图基于 `FGA_LOG$` 表。\n以下是一些示例输出：\n```\nDB_USER\
  \  TS                SQL_TEXT\n-------- ----------------- --------------------------\n\
  INV      21-jul-09 21:47:07 select * from emp\nSYSTEM   21-jul-09 21:58:36 select\
  \ salary from inv.emp\n```\n\n如果需要禁用策略，请使用 `DISABLE_POLICY` 过程：\n`SQL> exec dbms_fga.disable_policy('INV','EMP','S1_AUDIT');`\n\
  \n要删除策略，请使用 `DROP_POLICY` 过程：\n`SQL> exec dbms_fga.drop_policy('INV','EMP','S1_AUDIT');`\n\
  \n作为 `SYS` 方案，你可以按如下方式清除细粒度审计审计表中的记录：\n`SQL> truncate table fga_log$;`\n\n■ **提示**\
  \ 有关细粒度审计的更多详细信息，请参阅 Oracle 的安全指南，可在 Oracle 的 OTN 网站上获取。\n\n\n\n"
