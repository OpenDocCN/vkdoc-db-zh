  有时您需要应用补丁来解决数据库问题或修复错误。您通常从 MOS 网站获取补丁，并使用 `opatch` 实用程序进行安装。以下是应用补丁的基本步骤：


  从 MOS 获取补丁（需要有效的支持合同）。


  解压缩补丁文件。




