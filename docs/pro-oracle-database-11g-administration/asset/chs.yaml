  \n本章重点介绍最常用的索引和功能：B-tree、位图、反向键和基于函数索引，以及有用的选项。分区索引在第 12 章中介绍。如果你需要有关本章或本书未涵盖的索引类型或功能的更多信息，请参阅\
  \ Oracle 的 SQL 参考指南：http://otn.oracle.com。\n\n## 索引管理准则\n\n误用索引可能会产生严重的负面性能影响。错误类型或在错误列上创建的索引只会消耗空间和处理资源。作为\
  \ DBA，你必须有一个策略来确保索引增强性能，而不会对应用程序产生负面影响。\n\n第 8 章 ■ 索引\n\n表 8–2 概括了本章涵盖的许多索引管理概念。这些建议不是一成不变的：请根据你的环境需要进行调整和修改。\n\
  \n***表 8–2.** 索引创建和维护准则*\n\n| **准则**                                           \
