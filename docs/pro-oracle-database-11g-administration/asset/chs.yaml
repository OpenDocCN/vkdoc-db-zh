- "# 现在从导出转储文件创建 DDL 文件。\n\n```bash\nimpdp darl/foo directory=dwrep_dp dumpfile=${SID}.${DAY}.dmp\
  \ \\\nSQLFILE=${SID}.${DAY}.sql logfile=${SID}.${DAY}.sql.log\n```\n\n#\n\n```bash\n\
  exit 0\n```\n\n此代码清单依赖于已创建一个数据库目录对象，该对象指向你希望每日转储文件写入的位置。你可能还需要设置另一个作业，定期删除超过特定时间的文件。\n\
  \n### 压缩输出\n\n当你使用数据泵创建大文件时，应考虑压缩输出。从 Oracle 数据库 11*g*开始，`COMPRESSION`参数可以是以下值之一：`ALL`、`DATA_ONLY`、`METADATA_ONLY`或`NONE`。如果你指定`ALL`，则输出中的数据和元数据都将被压缩。\n\
  \n此示例导出一个表并压缩输出文件中的数据和元数据：\n\n```bash\n$ expdp dbauser/foo tables=locations directory=datapump\
  \ \\\ndumpfile=compress.dmp compression=all\n```\n\n如果你使用的是 Oracle 数据库 10*g*，则`COMPRESSION`参数只有`METADATA_ONLY`和`NONE`值。\n\
  \n第 13 章 ■ 数据泵\n\n`注意` `COMPRESS`参数的`ALL`和`DATA_ONLY`选项需要 Oracle 高级压缩选项的许可。\n\n\
  ### 加密数据\n\n数据泵转储文件的一个潜在安全问题是，任何拥有操作系统输出文件访问权限的人都可以在文件中搜索字符串。在 Linux/Unix 系统上，你可以使用`strings`命令执行此操作：\n\
  \n```bash\n$ strings inv.dmp | grep -i secret\n```\n\n以下是此特定转储文件的输出：\n\n```\nSecret\
  \ Data<\ntop secret data<\ncorporate secret data<\n```\n\n此命令允许你查看转储文件的内容，因为数据是常规文本且未加密。如果你要求数据是安全的，可以使用数据泵的加密功能。\n\
  \n数据泵可以轻松加密转储文件的输出。此示例使用`ENCRYPTION`参数来保护输出中的所有数据和元数据：\n\n```bash\n$ expdp darl/foo\
  \ encryption=all directory=dp dumpfile=inv.dmp\n```\n\n要使此命令生效，你的数据库必须有一个已打开的加密钱包。有关如何创建和打开钱包的更多详细信息，请参阅《Oracle\
  \ 高级安全指南》（可在 OTN 上获取）。\n\n`注意` 数据泵的`ENCRYPTION`参数要求你使用 Oracle 数据库 11g 或更高版本的企业版，并且需要\
  \ Oracle 高级安全选项的许可。\n\n`ENCRYPTION`参数接受以下选项：\n\n- `ALL`\n- `DATA_ONLY`\n- `ENCRYPTED_COLUMNS_ONLY`\n\
  - `METADATA_ONLY`\n- `NONE`\n\n`ALL`选项为数据和元数据启用加密。`DATA_ONLY`选项仅加密数据。`ENCRYPTED_COLUMNS_ONLY`选项指定只有在数据库中加密的列才以加密格式写入转储文件。`METADATA_ONLY`选项仅加密导出文件中的元数据。\n\
  \n第 13 章 ■ 数据泵\n\n## 监控数据泵作业\n\n当你有长时间运行的数据泵作业时，应偶尔检查作业状态，以确保作业没有失败，或因某种原因挂起等。有几种方法可以监控数据泵作业的状态：\n\
  \n- 屏幕输出\n- 数据泵日志文件\n- 数据库警报日志\n- 查询状态表\n- 查询数据字典视图\n- 交互式命令模式状态\n- 使用操作系统实用程序的进程状态\
  \ `ps`\n\n监控作业最明显的方法是查看数据泵在作业运行时显示在屏幕上的状态。如果你已从命令模式断开连接，则状态不再显示在屏幕上。在这种情况下，你必须使用另一种技术来监控数据泵作业。\n\
  \n### 数据泵日志文件\n\n默认情况下，数据泵为每个作业生成一个日志文件。启动数据泵作业时，最好为该作业指定一个特定的日志文件名：\n\n```bash\n\
  $ impdp darl/foo directory=dp dumpfile=archive.dmp logfile=archive.log\n```\n\n\
  此作业创建一个名为`archive.log`的文件，该文件放置在数据库对象`DP`引用的目录中。如果你没有显式命名日志文件，数据泵导入会创建一个名为`import.log`的文件，数据泵导出会创建一个名为`export.log`的文件。\n\
  \n`注意` 日志文件包含与运行数据泵作业时在屏幕上交互式显示的信息相同的信息。\n\n### 数据字典视图\n\n确定数据泵作业是否正在运行的快速方法是检查`DBA_DATAPUMP_JOBS`视图，查找状态为`EXECUTING`的正在运行的作业：\n\
  \n```sql\nselect\njob_name\n,operation\n,job_mode\n,state\nfrom dba_datapump_jobs;\n\
  ```\n\n第 13 章 ■ 数据泵\n\n以下是一些示例输出：\n\n```\nJOB_NAME                   OPERATION \
  \  JOB_MODE   STATE\n-------------------------  ----------  ---------  ---------------\n\
  SYS_IMPORT_TABLE_04        IMPORT      TABLE      EXECUTING\nSYS_IMPORT_FULL_02\
  \         IMPORT      FULL       NOT RUNNING\n```\n\n你还可以通过以下查询`DBA_DATAPUMP_SESSIONS`视图来获取会话信息：\n\
  \n```sql\nselect\nsid\n,serial#\n,username\n,process\n,program\nfrom v$session s,\n\
  dba_datapump_sessions d\nwhere s.saddr = d.saddr;\n```\n\n以下是一些示例输出，显示正在使用几个数据泵会话：\n\
  \n```\nSID    SERIAL#  USERNAME   PROCESS   PROGRAM\n------ -------- ----------\
  \ --------- ----------------------\n1049   6451     STAGING    11306     oracle@xengdb\
  \ (DM00)\n1058   33126    STAGING    11338     oracle@xengdb (DW01)\n1048   50508\
  \    STAGING    11396     oracle@xengdb (DW02)\n```\n\n### 数据库警报日志\n\n如果作业花费的时间比预期的长，请在数据库警报日志中查找类似以下的消息：\n\
  \n```\nstatement in resumable session 'SYS_IMPORT_SCHEMA_02.1' was suspended due\
  \ to\nORA-01652: unable to extend temp segment by 64 in tablespace REG_TBSP_3\n\
  ```\n\n这表明数据泵导入作业已挂起，并正在等待向`REG_TBSP_3`表空间添加空间。向表空间添加空间后，数据泵作业会自动恢复处理。默认情况下，数据泵作业会等待两个小时以添加空间。\n\
  \n`注意` 除了写入警报日志外，对于每个数据泵作业，Oracle 会在`ADR_HOME/trace`目录中创建一个跟踪文件。该文件包含会话 ID 和作业开始时间等信息。跟踪文件的命名格式为：`<SID>_dm00_<process_ID>.trc`。\n\
  \n### 状态表\n\n每次启动数据泵作业时，都会在运行数据泵作业的用户帐户中自动创建一个状态表。对于导出作业，表名取决于你运行的导出作业类型。表的命名格式为`SYS_<OPERATION>_<JOB_MODE>_NN`，其中`OPERATION`是`EXPORT`或`IMPORT`。`JOB_MODE`可以是`FULL`、`SCHEMA`、`TABLE`、`TABLESPACE`等。\n\
  \n以下是查询状态表以获取当前运行作业详细信息的示例：\n\n```sql\nselect\nname\n,object_name\n,total_bytes/1024/1024\
  \ t_m_bytes\n,job_mode\n,state\n,to_char(last_update, 'dd-mon-yy hh24:mi')\nfrom\
  \ SYS_IMPORT_TABLE_04\nwhere state='EXECUTING';\n```\n\n第 13 章 ■ 数据泵\n\n### 交互式命令模式状态\n\
  \n验证数据泵是否正在运行作业的快速方法是附加到交互式命令模式并发出`STATUS`命令。例如：\n\n```bash\n$ impdp staging/staging_xst\
  \ attach=SYS_IMPORT_TABLE_04\n```\n\n```\nImport> status\n```\n\n以下是一些示例输出：\n\n\
  ```\nJob: SYS_IMPORT_TABLE_04\nOperation: IMPORT\nMode: TABLE\nState: EXECUTING\n\
  Bytes Processed: 0\nCurrent Parallelism: 4\n```\n\n你应该看到状态为`EXECUTING`，这表明作业正在主动运行。输出中要检查的其他项目是已处理的对象数和字节数。这些数字应随着作业的进展而增加。\n\
  \n### 操作系统实用程序\n\n你可以使用操作系统实用程序进程状态（`ps`）来显示服务器上正在运行的作业。例如，你可以按如下方式搜索主进程和工作进程：\n\
  \n```bash\n$ ps -ef | egrep 'ora_dm|ora_dw' | grep -v egrep\n```\n\n以下是一些示例输出：\n\
  \n```\noracle  29871   717  5 08:26:39 ?      11:42 ora_dw01_STAGE\noracle  29848\
  \   717  0 08:26:33 ?      0:08 ora_dm00_STAGE\noracle  29979   717  0 08:27:09\
  \ ?      0:04 ora_dw02_STAGE\n```\n\n如果你多次运行此命令，你应该会看到正在运行的一个或多个作业的处理时间（第七列）增加。这是数据泵仍在执行并工作的良好指标。\n\
  \n第 13 章 ■ 数据泵\n\n## 数据泵传统模式\n\n此功能在本章最后介绍，但如果你是一位老派的 DBA，它非常有用。从 Oracle 数据库 11*g*第\
  \ 2 版开始，数据泵允许你使用旧的`exp`和`imp`实用程序参数。这被称为*传统模式*。你不需要做任何特殊的事情来使用传统模式数据泵。一旦数据泵检测到传统参数，它会尝试像处理旧的`exp/imp`实用程序参数一样处理该参数。你甚至可以混合使用旧的传统参数和较新的参数。例如：\n\
  \n```bash\n$ expdp darl/foo consistent=y tables=inv directory=dk\n```\n\n在输出中，数据泵指示它遇到了传统参数，并向你显示它将传统参数转换为数据泵语法的语法。对于前面的命令，以下是数据泵会话的输出，显示了`consistent=y`参数被转换成的内容：\n\
  \n```\nLegacy Mode Active due to the following parameters:\nLegacy Mode Parameter:\
  \ \"consistent=TRUE\" Location: Command Line, Replaced with:\n\"flashback_time=TO_TIMESTAMP('2010-07-01\
  \ 08:10:20', 'YYYY-MM-DD HH24:MI:SS')\"\n```\n\n此功能可能*极其*方便，特别是如果你对旧的传统语法非常熟悉，并想知道它如何在数据泵中实现。\n\
  \n我建议你尽可能使用较新的数据泵语法。但是，你可能会遇到一些情况，你有传统的`exp/imp`作业，并希望继续按原样运行脚本而不进行任何修改。\n\n`注意`\
  \ 当数据泵在传统模式下运行时，它不会创建旧的`exp/imp`格式文件。数据泵始终创建数据泵文件，并且只能读取数据泵文件。\n\n### 数据泵映射到 `exp`\
  \ 实用程序\n\n如果你习惯于旧的`exp/imp`参数，最初可能会对一些语法语义感到困惑。然而，在使用数据泵之后，你会发现新语法相当容易记忆和使用。表 13–3\
  \ 描述了传统导出参数如何映射到数据泵导出。\n\n在许多情况下，不存在一对一的映射。通常，数据泵自动提供了过去在传统实用程序中需要参数才能实现的功能。例如，过去你必须指定`DIRECT=Y`才能进行直接路径导出，而数据泵在可能时自动使用直接路径。\n\
  \n第 13 章 ■ 数据泵\n\n***表 13–3.** 旧导出参数到数据泵的映射*\n\n| **原始 `exp` 参数** | **类似的 数据泵 `expdp`\
  \ 参数** |\n| :--- | :--- |\n| `BUFFER` | 不适用 |\n| `COMPRESS` | `TRANSFORM` |\n| `CONSISTENT`\
  \ | `FLASHBACK_SCN` 或 `FLASHBACK_TIME` |\n| `CONSTRAINTS` | `EXCLUDE=CONSTRAINTS`\
  \ |\n| `DIRECT` | 不适用；数据泵在可能时自动使用直接路径 |\n| `FEEDBACK` | 客户端输出中的 `STATUS` |\n| `FILE`\
  \ | 数据库目录对象和 `DUMPFILE` |\n| `GRANTS` | `EXCLUDE=GRANT` |\n| `INDEXES` | `INCLUDE=INDEXES`\
  \ |\n| `LOG` | 数据库目录对象和 `LOGFILE` |\n| `OBJECT_CONSISTENT` | 不适用 |\n| `OWNER` |\
  \ `SCHEMAS` |\n| `RECORDLENGTH` | 不适用 |\n| `RESUMABLE` | 不适用；数据泵自动提供该功能 |\n| `RESUMABLE_NAME`\
  \ | 不适用 |\n| `RESUMABLE_TIMEOUT` | 不适用 |\n| `ROWS` | `CONTENT=ALL` |\n| `STATISTICS`\
  \ | 不适用；数据泵导出始终导出表的统计信息 |\n| `TABLESPACES` | `TRANSPORT_TABLESPACES` |\n| `TRANSPORT_TABLESPACE`\
  \ | `TRANSPORT_TABLESPACES` |\n| `TRIGGERS` | `EXCLUDE=TRIGGER` |\n| `TTS_FULL_CHECK`\
  \ | `TRANSPORT_FULL_CHECK` |\n| `VOLSIZE` | 不适用；数据泵不支持磁带设备 |\n\n第 13 章 ■ 数据泵\n\n\
  ### 数据泵映射到 `imp` 实用程序\n\n与数据泵导出类似，数据泵导入通常与传统实用程序参数没有一对一的映射。数据泵导入自动提供了许多旧`imp`实用程序的功能。例如，不需要`COMMIT=Y`，因为数据泵导入在每个表导入后自动提交。表\
  \ 13–4 描述了传统导入参数如何映射到数据泵导入。\n\n***表 13–4.** 旧导入参数到数据泵的映射*\n\n| **原始 `imp` 参数** |\
  \ **类似的 数据泵 `impdp` 参数** |\n| :--- | :--- |\n| `BUFFER` | 不适用 |\n| `CHARSET` | 不适用\
  \ |\n| `COMMIT` | 不适用；数据泵导入在每个表导出后自动提交 |\n| `COMPILE` | 不适用；数据泵导入在过程创建后编译它们 |\n\
  | `CONSTRAINTS` | `EXCLUDE=CONSTRAINT` |\n| `DATAFILES` | `TRANSPORT_DATAFILES`\
  \ |\n| `DESTROY` | `REUSE_DATAFILES=y` |\n| `FEEDBACK` | 客户端输出中的 `STATUS` |\n| `FILE`\
  \ | 数据库目录对象和 `DUMPFILE` |\n| `FILESIZE` | 不适用 |\n| `FROMUSER` | `REMAP_SCHEMA` |\n\
  | `GRANTS` | `EXCLUDE=OBJECT_GRANT` |\n| `IGNORE` | `TABLE_EXISTS_ACTION`，使用 `APPEND`、`REPLACE`、`SKIP`\
  \ 或 `TRUNCATE` |\n| `INDEXES` | `EXCLUDE=INDEXES` |\n| `INDEXFILE` | `SQLFILE` |\n\
  | `LOG` | 数据库目录对象和 `LOGFILE` |\n| `RECORDLENGTH` | 不适用 |\n| `RESUMABLE` | 不适用；此功能是自动提供的\
  \ |\n| `RESUMABLE_NAME` | 不适用 |\n| `RESUMABLE_TIMEOUT` | 不适用 |\n| `ROWS=N` | `CONTENT`，使用\
  \ `METADATA_ONLY` 或 `ALL` |\n| `SHOW` | `SQLFILE` |\n| `STATISTICS` | 不适用 |\n| `STREAMS_CONFIGURATION`\
  \ | 不适用 |\n| `STREAMS_INSTANTIATION` | 不适用 |\n| `TABLESPACES` | `TRANSPORT_TABLESPACES`\
  \ |\n| `TOID_NOVALIDATE` | 不适用 |\n| `TOUSER` | `REMAP_SCHEMA` |\n| `TRANSPORT_TABLESPACE`\
  \ | `TRANSPORT_TABLESPACES` |\n| `TTS_OWNERS` | 不适用 |\n| `VOLSIZE` | 不适用；数据泵不支持磁带设备\
  \ |\n\n## 总结\n\n数据泵是一个极其强大且功能丰富的工具。如果你不常使用数据泵，那么我恳请你花些时间阅读本章并完成示例。此工具极大地简化了将用户和数据从一个环境迁移到另一个环境等任务。你可以导出和导入用户子集、通过\
  \ SQL 和 PL/SQL 过滤和重映射数据、重命名用户和表空间、压缩、加密和并行化，所有这些只需一个命令。它确实如此强大。\n\nDBA 有时坚持使用旧的`exp/imp`实用程序，因为那是他们熟悉的（我偶尔也会犯这个错误）。如果你运行的是\
  \ Oracle 数据库 11*g*第 2 版，你可以直接从命令行使用旧的`exp/imp`参数和选项。数据泵会将这些参数动态转换为数据泵特定的语法。此功能很好地促进了从旧到新的迁移。作为参考，我还提供了旧的`exp/imp`语法及其与数据泵命令关系的映射。\n\
  \n虽然数据泵是将数据库对象和数据从一个环境移动到另一个环境的优秀工具，但有时你需要将大量数据传输到操作系统平面文件中或从中传输。你可以使用外部表来实现此任务。这是本书下一章的主题。\n\
  \n![](img/index-379_1.png)\n\n第 14 章 ■ 外部表\n\n快速比较使用 SQL*Loader 和外部表突出了它们的差异。以下是用于加载和转换数据的\
  \ SQL*Loader 步骤：\n\n1.  创建一个参数文件，SQL*Loader 使用它来解释操作系统文件中的数据格式。\n2.  创建一个常规数据库表，SQL*Loader\
  \ 将向其中插入记录。数据将暂存于此，直到可以进一步处理。\n3.  运行 SQL*Loader `sqlldr`实用程序，将数据从操作系统文件加载到数据库表（在步骤\
  \ 2 中创建）。加载数据时，SQL*Loader 具有一些允许你转换数据的功能。这一步有时令人沮丧，因为可能需要多次尝试才能正确映射参数文件到表和相应的列。\n\
  4.  创建另一个表，其中将包含完全转换后的数据。\n5.  首先运行 SQL 语句从暂存表（在步骤 2 中创建）加载数据；然后转换数据并将其插入到生产表（在步骤\
  \ 4 中创建）。\n\n将上述 SQL*Loader 列表与以下使用外部表加载和转换数据的步骤进行比较：\n\n1.  执行`CREATE TABLE...ORGANIZATION\
  \ EXTERNAL`脚本，将操作系统文件的结构映射到表列。运行此脚本后，你可以直接使用 SQL 查询操作系统文件的内容。\n2.  创建一个常规表来保存完全转换后的数据。\n\
  3.  运行 SQL 语句，将数据从外部表加载并完全转换到步骤 2 中创建的表中。\n\n对于许多公司来说，SQL*Loader 是大型数据加载操作的基础。它仍然是执行该任务的好工具。但是，你可能需要考虑使用外部表。外部表具有以下优势：\n\
  \n- 使用外部表加载数据更直接，步骤更少。\n- 创建和从外部表加载的接口是 SQL*Plus。许多 DBA/开发人员发现使用 SQL*Plus 比 SQL*Loader\
  \ 的参数文件界面更直观、更强大。\n- 你可以在数据加载到数据库表之前查看外部表中的数据。\n- 你可以加载、转换和聚合数据，而无需中间暂存表。对于大量数据，这可以节省大量空间。\n\
  \n接下来的几节包含使用外部表从操作系统文件读取的示例。\n\n第 14 章 ■ 外部表\n\n## 将 CSV 文件加载到数据库中\n\n你可以使用外部表和\
  \ SQL 将小型或非常大的 CSV 平面文件加载到数据库中。图 14–1 显示了使用外部表查看和加载操作系统文件数据所涉及的体系结构组件。需要一个目录对象来指定操作系统文件的位置。`CREATE\
  \ TABLE...ORGANIZATION EXTERNAL`语句创建一个数据库对象，SQL*Plus 可以使用它直接从操作系统文件中选择。\n\n***图\
  \ 14–1.** 用于读取平面文件的外部表的体系结构组件*\n\n以下是使用外部表访问操作系统平面文件的步骤：\n1.  创建一个指向 CSV 文件位置的数据库目录对象。\n\
  2.  将目录对象的读写权限授予创建外部表的用户。我通常使用具有 DBA 权限的帐户，因此不需要执行此步骤。\n3.  运行`CREATE TABLE...ORGANIZATION\
  \ EXTERNAL`语句。\n4.  使用 SQL*Plus 访问 CSV 文件的内容。\n\n在此示例中，平面文件名为`ex.csv`，位于`/oraet`目录中。它包含以下数据：\n\
  \n```\n5|2|0|0|12/04/2009|Half\n6|1|0|1|03/31/2010|Quarter\n7|4|0|1|05/07/2010|Full\n\
  8|1|1|0|04/30/2010|Quarter\n```\n\n`注意` 本章中使用的一些 CSV 文件示例实际上是由逗号以外的字符（例如管道`|`字符）分隔的。使用的字符取决于数据和提供\
  \ CSV 文件的用户。CSV 文件通常也常被称为平面文件。\n\n第 14 章 ■ 外部表\n\n### 创建目录对象并授予权限\n\n首先，创建一个指向磁盘上平面文件位置的目录对象：\n\
  \n```sql\nSQL> create directory exa_dir as '/oraet';\n```\n\n此示例使用授予了`DBA`角色的数据库帐户；因此，你不需要向访问目录对象的用户（你的帐户）授予对该目录对象的`READ`和`WRITE`权限。如果你不使用\
  \ DBA 帐户从目录对象读取，则使用此对象向该帐户授予权限：\n\n```sql\nSQL> grant read, write on directory exa_dir\
  \ to reg_user;\n```\n\n### 创建外部表\n\n接下来，构建创建外部表的脚本，该外部表将引用平面文件。`CREATE TABLE...ORGANIZATION\
  \ EXTERNAL`语句向数据库提供以下信息：\n\n- 如何解释平面文件中的数据，以及文件中的数据与数据库中列定义的映射\n- `DEFAULT DIRECTORY`子句，标识目录对象，该对象又指定磁盘上平面文件的目录\n\
  - `LOCATION`子句，标识平面文件的名称\n\n下一个语句创建一个看起来像表的数据库对象，但它能够直接从平面文件中检索数据：\n\n```sql\ncreate\
  \ table exadata_et(\n  exa_id NUMBER\n  ,machine_count NUMBER\n  ,hide_flag NUMBER\n\
  \  ,oracle NUMBER\n  ,ship_date DATE\n  ,rack_type VARCHAR2(32)\n)\norganization\
  \ external (\n  type oracle_loader\n  default directory exa_dir\n  access parameters\n\
  \  (\n    records delimited by newline\n    fields terminated by '|'\n    missing\
  \ field values are null\n    (exa_id\n    ,machine_count\n    ,hide_flag\n    ,oracle\n\
  \    ,ship_date char date_format date mask \"mm/dd/yyyy\"\n    ,rack_type)\n  )\n\
  \  location ('ex.csv')\n)\nreject limit unlimited;\n```\n\n第 14 章 ■ 外部表\n\n执行此脚本时会创建一个名为`EXADATA_ET`的外部表。现在，使用\
  \ SQL*Plus 查看平面文件的内容：\n\n```sql\nSQL> select * from exadata_et;\n```\n\n```\nEXA_ID\
  \ MACHINE_COUNT HIDE_FLAG ORACLE SHIP_DATE  RACK_TYPE\n------ ------------- ----------\
  \ ---------- --------- ---------\n5      2             0          0         04-DEC-09\
  \ Half\n6      1             0          1         31-MAR-10 Quarter\n7      4  \
  \           0          1         07-MAY-10 Full\n8      1             1        \
  \  0         30-APR-10 Quarter\n```\n\n### 查看外部表元数据\n\n此时，你还可以查看有关外部表的元数据。查询`DBA_EXTERNAL_TABLES`视图以获取详细信息：\n\
  \n```sql\nselect\n  owner\n  ,table_name\n  ,default_directory_name\n  ,access_parameters\n\
  from dba_external_tables;\n```\n\n以下是输出的部分列表：\n\n```\nOWNER    TABLE_NAME    DEFAULT_DIRECTO\
  \   ACCESS_PARAMETERS\n-------- ------------- ----------------  ---------------------------\n\
  BARTS    EXADATA_ET    EXA_DIR           records delimited by newline\n```\n\n此外，你可以从`DBA_EXTERNAL_LOCATIONS`表中选择有关外部表中引用的任何平面文件的信息：\n\
  \n```sql\nselect\n  owner\n  ,table_name\n  ,location\nfrom dba_external_locations;\n\
  ```\n\n以下是一些示例输出：\n\n```\nOWNER    TABLE_NAME    LOCATION\n-------- -------------\
  \ ---------------\nBARTS    EXADATA_ET    ex.csv\n```\n\n### 从外部表加载常规表\n\n现在你可以将外部表中包含的数据加载到常规数据库表中。执行此操作时，你可以利用\
  \ Oracle 的直接路径加载和并行功能。此示例创建一个常规数据库表，该表将从外部表加载数据：\n\n```sql\ncreate table exa_info(\n\
  \  exa_id NUMBER\n  ,machine_count NUMBER\n  ,hide_flag NUMBER\n  ,oracle NUMBER\n\
  \  ,ship_date DATE\n  ,rack_type VARCHAR2(32)\n) nologging parallel 2;\n```\n\n\
  第 14 章 ■ 外部表\n\n你可以通过以下方式从外部表的内容直接路径加载此常规表（通过`APPEND`提示）：\n\n```sql\nSQL> insert\
  \ /*+ APPEND */ into exa_info select * from exadata_et;\n```\n\n你可以在提交数据之前尝试从中进行选择来验证表是否已直接路径加载：\n\
  \n```sql\nSQL> select * from exa_info;\n```\n\n这是预期的错误：\n\n```\nORA-12838: cannot\
  \ read/modify an object after modifying it in parallel\n```\n\n提交数据后，你可以从表中进行选择：\n\
  \n```sql\nSQL> commit;\nSQL> select * from exa_info;\n```\n\n直接路径加载表的另一种方法是使用`CREATE\
  \ TABLE AS SELECT`（`CTAS`）语句。`CTAS`语句自动尝试进行直接路径加载。在此示例中，`EXA_INFO`表在一条语句中被创建和加载：\n\
  \n```sql\nSQL> create table exa_info nologging parallel 2 as select * from exadata_et;\n\
  ```\n\n通过使用直接路径加载和并行性，你可以实现与使用 SQL*Loader 相似的加载性能。使用 SQL 从外部表创建表的优势在于，你现在可以在构建常规数据库表（在此示例中为`EXA_INFO`）时使用标准\
  \ SQL*Plus 功能执行复杂的数据转换。\n\n任何`CTAS`语句都会自动以为基础表定义的并行度进行处理。但是，当你使用`INSERT AS SELECT`语句时，需要为会话启用并行性：\n\
  \n```sql\nSQL> alter session enable parallel dml;\n```\n\n作为最后一步，你应该为已加载大量数据的任何表生成统计信息。以下是一个示例：\n\
  \n```sql\nexec dbms_stats.gather_table_stats(-\nownname=>'BARTS',-\ntabname=>'EXA_INFO',-\n\
  estimate_percent => 20, -\ncascade=>true);\n```\n\n## 执行高级转换\n\nOracle 提供了复杂的技术来转换数据。本节详细介绍如何使用管道函数转换外部表中的数据。以下是执行此操作的步骤：\n\
  1.  创建一个外部表。\n2.  创建一个记录类型，映射到外部表中的列。\n3.  创建一个基于步骤 2 中创建的记录类型的表。\n4.  创建一个管道函数，用于在加载时检查每一行，并根据业务需求转换数据。\n\
  5.  使用`INSERT`语句，该语句从外部表中选择并使用管道函数在加载时转换数据。\n\n此示例使用上一节关于从 CSV 文件加载数据中创建的相同外部表和\
  \ CSV 文件。回想一下，外部表名称是`EXADATA_ET`，CSV 文件名称是`ex.csv`。\n\n创建外部表后，接下来创建一个记录类型，映射到外部表中的列名：\n\
  \n```sql\ncreate or replace type rec_exa_type is object\n(\n  exa_id number\n  ,machine_count\
  \ number\n  ,hide_flag number\n  ,oracle number\n  ,ship_date date\n  ,rack_type\
  \ varchar2(32)\n);\n/\n```\n\n第 14 章 ■ 外部表\n\n接下来，基于前面的记录类型创建一个表：\n\n```sql\ncreate\
  \ or replace type table_exa_type is table of rec_exa_type;\n/\n```\n\nOracle PL/SQL\
  \ 允许你将函数用作 SQL 操作的行源。此功能称为*管道化*。它让你可以使用复杂的转换逻辑，并结合 SQL*Plus 的强大功能。在此示例中，你创建一个管道函数，以便在加载时转换选定的列数据。\n\
  \n具体来说，当`ORACLE`列的值为`0`时，此函数将`SHIP_DATE`增加 30 天：\n\n```sql\ncreate or replace function\
  \ exa_trans\nreturn table_exa_type pipelined is\nbegin\n  for r1 in\n    (select\
  \ rec_exa_type(\n            exa_id, machine_count, hide_flag\n            ,oracle,\
  \ ship_date, rack_type\n            ) exa_rec\n     from exadata_et) loop\n    if\
  \ (r1.exa_rec.oracle = 0) then\n      r1.exa_rec.ship_date := r1.exa_rec.ship_date\
  \ + 30;\n    end if;\n    pipe row (r1.exa_rec);\n  end loop;\n  return;\nend;\n\
  /\n```\n\n现在你可以使用此函数将数据加载到常规数据库表中。作为参考，以下是实例化要加载的表的`CREATE TABLE`语句：\n\n```sql\n\
  create table exa_info(\n  exa_id NUMBER\n  ,machine_count NUMBER\n  ,hide_flag NUMBER\n\
  \  ,oracle NUMBER\n  ,ship_date DATE\n  ,rack_type VARCHAR2(32)\n) nologging parallel\
  \ 2;\n```\n\n接下来，使用管道函数转换从外部表中选择的数据，并一步将其插入到常规数据库表中：\n\n```sql\nSQL> insert into\
  \ exa_info select * from table(exa_trans);\n```\n\n以下是此示例加载到`EXA_INFO`表中的数据：\n\n\
  ```sql\nSQL> select * from exa_info;\n```\n\n```\nEXA_ID MACHINE_COUNT HIDE_FLAG\
  \ ORACLE SHIP_DATE  RACK_TYPE\n------ ------------- ---------- ---------- ---------\
  \ ------------\n5      2             0          0         03-JAN-10 Half\n6    \
  \  1             0          1         31-MAR-10 Quarter\n7      4             0\
  \          1         07-MAY-10 Full\n8      1             1          0         30-MAY-10\
  \ Quarter\n```\n\n尽管本节中的示例很简单，但你可以使用该技术应用任何复杂程度的转换逻辑。此技术允许你将转换需求嵌入到管道化 PL/SQL 函数中，该函数在加载每一行时修改数据。\n\
  \n## 从 SQL 查看文本文件\n\n外部表允许你使用 SQL `SELECT`语句从操作系统平面文件中检索信息。例如，假设你希望报告警报日志文件的内容。首先，创建一个指向警报日志位置的目录对象：\n\
  \n```sql\nSQL> select value from v$parameter where name ='background_dump_dest';\n\
  ```\n\n此示例的输出：\n\n```\n/oracle/app/oracle/diag/rdbms/o11r2/O11R2/trace\n```\n\n\
  接下来，创建一个指向后台转储目标位置的目录对象：\n\n```sql\nSQL> create directory t_loc as '/oracle/app/oracle/diag/rdbms/o11r2/O11R2/trace';\n\
  ```\n\n现在，创建一个映射到数据库警报日志操作系统文件的外部表。在此示例中，数据库名称为`O11R2`，因此警报日志文件名为`alert_O11R2.log`：\n\
  \n```sql\ncreate table alert_log_file(\n  alert_text varchar2(4000))\norganization\
  \ external\n( type oracle_loader\n  default directory t_loc\n  access parameters\
  \ (\n    records delimited by newline\n    nobadfile\n    nologfile\n    nodiscardfile\n\
  \    fields terminated by '#$~=ui$X'\n    missing field values are null\n    (alert_text)\n\
  \  )\n  location ('alert_O11R2.log')\n)\nreject limit unlimited;\n```\n\n第 14 章\
  \ ■ 外部表\n\n你可以通过 SQL 查询查询该表。例如：\n\n```sql\nSQL> select * from alert_log_file where\
  \ alert_text like 'ORA-%';\n```\n\n这允许你使用 SQL 查看和报告警报日志的内容。你可能会发现这是一种方便的方式，为原本无法访问的操作系统文件提供\
  \ SQL 访问。\n\n如果你之前使用过 SQL*Loader，外部表的`ACCESS PARAMETERS`子句中的`ORACLE_LOADER`访问驱动程序可能看起来很熟悉。表\
  \ 14–1 描述了一些更常用的访问参数。有关访问参数的完整列表，请参阅 Oracle 的《数据库实用程序》指南（可在 OTN 上获取）。\n\n***表 14–1.**\
  \ `ORACLE_LOADER`驱动程序的选定访问参数*\n\n| **访问参数** | **描述** |\n| :--- | :--- |\n| `DELIMITED\
  \ BY` | 指示哪个字符分隔字段 |\n| `TERMINATED BY` | 指示字段如何终止 |\n| `FIXED` | 指定具有固定长度的记录的大小\
  \ |\n| `BADFILE` | 存储由于错误而无法加载的记录的文件名 |\n| `NOBADFILE` | 指定不应创建文件来保存由于错误而无法加载的记录\
  \ |\n| `LOGFILE` | 创建外部表时记录一般消息的文件名 |\n| `NOLOGFILE` | 指定不应创建日志文件 |\n| `DISCARDFILE`\
  \ | 命名记录未通过`LOAD WHEN`子句的写入文件 |\n| `NODISCARDFILE` | 指定不应创建丢弃文件 |\n| `SKIP` | 在加载前跳过文件中指定数量的记录\
  \ |\n| `PREPROCESSOR` | 指定在 Oracle 加载数据之前运行并修改文件内容的用户命名程序 |\n| `MISSING FIELD VALUES\
  \ ARE NULL` | 将没有数据的字段加载为`NULL`值 |\n\n![](img/index-388_1.png)\n\n第 14 章 ■ 外部表\n\
  \n2.  使用`CREATE TABLE...ORGANIZATION EXTERNAL...AS SELECT`语句将数据从数据库卸载到转储文件中。\n\n\
  首先，创建一个目录对象。以下代码创建一个名为`DP`的目录对象，该对象指向`/oradump`目录：\n\n```sql\nSQL> create directory\
  \ dp as '/oradump';\n```\n\n如果你使用的用户没有 DBA 权限，则需要显式授予该目录对象对所需用户的访问权限：\n\n```sql\n\
  SQL> grant read, write on directory dp to larry;\n```\n\n要创建转储文件，请使用`CREATE TABLE...ORGANIZATION\
  \ EXTERNAL`语句的`ORACLE_DATAPUMP`访问驱动程序。此示例将`INV`表的内容卸载到`inv.dmp`文件中：\n\n```sql\n\
  CREATE TABLE inv_et\nORGANIZATION EXTERNAL (\n  TYPE ORACLE_DATAPUMP\n  DEFAULT\
  \ DIRECTORY dp\n  LOCATION ('inv.dmp')\n)\nAS SELECT * FROM inv;\n```\n\n前面的命令做了两件事：\n\
  \n- 创建一个基于`INV`表的名为`INV_ET`的外部表\n- 创建一个名为`inv.dmp`的平台无关的转储文件\n\n现在你可以将`inv.dmp`文件复制到单独的数据库服务器，并基于此转储文件创建一个外部表。远程服务器（将转储文件复制到的服务器）可以是与你创建文件所在的服务器不同的平台。例如，你可以在\
  \ Windows 机器上创建转储文件，复制到 Solaris 服务器，然后通过外部表从转储文件中进行选择。在此示例中，外部表名为`INV_DW`：\n\n```sql\n\
  CREATE TABLE inv_dw\n  (inv_id number\n  ,inv_desc varchar2(30))\nORGANIZATION EXTERNAL\
  \ (\n  TYPE ORACLE_DATAPUMP\n  DEFAULT DIRECTORY dp\n  LOCATION ('inv.dmp')\n);\n\
  ```\n\n创建后，你可以从 SQL*Plus 访问外部表数据：\n\n```sql\nSQL> select * from inv_dw;\n```\n\n\
  你还可以使用转储文件创建常规表并加载数据：\n\n```sql\nSQL> create table inv as select * from inv_dw;\n\
  ```\n\n这提供了一种简单高效的机制来将数据从一个平台传输到另一个平台。\n\n第 14 章 ■ 外部表\n\n## 使用并行性减少耗时\n\n为了最大化通过外部表创建转储文件时的卸载性能，请使用`PARALLEL`子句。此示例并行创建两个转储文件：\n\
  \n```sql\nCREATE TABLE inv_et\nORGANIZATION EXTERNAL (\n  TYPE ORACLE_DATAPUMP\n\
  \  DEFAULT DIRECTORY dp\n  LOCATION ('inv1.dmp','inv2.dmp')\n)\nPARALLEL 2\nAS SELECT\
  \ * FROM inv;\n```\n\n要访问转储文件中的数据，请创建一个引用这两个转储文件的不同外部表：\n\n```sql\nCREATE TABLE\
  \ inv_dw\n  (inv_id number\n  ,inv_desc varchar2(30))\nORGANIZATION EXTERNAL (\n\
  \  TYPE ORACLE_DATAPUMP\n  DEFAULT DIRECTORY dp\n  LOCATION ('inv1.dmp','inv2.dmp')\n\
  );\n```\n\n你现在可以使用此外部表从转储文件中选择数据：\n\n```sql\nSQL> select * from inv_dw;\n```\n\n\
  ## 压缩转储文件\n\n你可以通过外部表创建压缩的转储文件。例如，使用`ACCESS PARAMETERS`子句的`COMPRESS`选项：\n\n```sql\n\
  CREATE TABLE inv_et\nORGANIZATION EXTERNAL (\n  TYPE ORACLE_DATAPUMP\n  DEFAULT\
  \ DIRECTORY dp\n  ACCESS PARAMETERS (COMPRESSION ENABLED)\n  LOCATION ('inv1.dmp')\n\
  )\nAS SELECT * FROM inv;\n```\n\n使用此选项时，你应该会看到相当好的压缩率。在我的测试中，压缩后的输出转储文件缩小了 10 到\
  \ 20 倍。根据被压缩数据的类型，你的结果可能会有所不同。\n\n## 加密转储文件\n\n你还可以使用外部表创建加密的转储文件。此示例使用`ACCESS PARAMETERS`子句的`ENCRYPTION`选项：\n\
  \n第 14 章 ■ 外部表\n\n```sql\nCREATE TABLE inv_et\nORGANIZATION EXTERNAL (\n  TYPE ORACLE_DATAPUMP\n\
  \  DEFAULT DIRECTORY dp\n  ACCESS PARAMETERS\n  (ENCRYPTION ENABLED)\n  LOCATION\
  \ ('inv1.dmp')\n)\nAS SELECT * FROM inv;\n```\n\n要使此示例生效，你需要为数据库设置并打开一个安全钱包。\n\n\
  `注意` 使用加密需要 Oracle 的额外许可。有关使用高级安全选项的详细信息，请联系 Oracle。\n\n你通过`ACCESS PARAMETERS`子句启用压缩和加密。表\
  \ 14–2 包含`ORACLE_DATAPUMP`访问驱动程序可用的所有访问参数的列表。\n\n***表 14–2.** `ORACLE_DATAPUMP`访问驱动程序的参数*\n\
  \n| **访问参数** | **描述** |\n| :--- | :--- |\n| `COMPRESSION` | 压缩转储文件。`DISABLED`是默认值。\
  \ |\n| `ENCRYPTION` | 加密转储文件。`DISABLED`是默认值。 |\n| `NOLOGFILE` | 抑制日志文件的生成。 |\n|\
  \ `LOGFILE=[directory_object:]logfile_name` | 允许你命名日志文件。 |\n| `VERSION` | 指定可以读取转储文件的\
  \ Oracle 最低版本。 |\n\n## 预处理外部表\n\nOracle（在 10.2.0.5 及更高版本中）添加了预处理外部表所基于文件的能力。例如，你可以指示`CREATE\
  \ TABLE...ORGANIZATION EXTERNAL`语句在处理之前解压缩压缩的操作系统文件。\n\n以下是一个简单的示例来说明此概念。首先，创建一个包含压缩文件位置的目录对象：\n\
  \n```sql\nSQL> create or replace directory data_dir as '/orahome/oracle/dk/et';\n\
  ```\n\n你还需要创建一个目录对象，其中包含将对数据文件执行预处理的脚本的位置。在此示例中，目录是`/bin`：\n\n```sql\nSQL> create\
  \ or replace directory exe_dir as '/bin';\n```\n\n此示例使用`gzip`实用程序压缩了操作系统平面文件。压缩文件名为`exa.csv.gz`。你通过指定`PREPROCESSOR`子句来指示`CREATE\
  \ TABLE...ORGANIZATION EXTERNAL`语句预处理压缩文件。由于 CSV 文件是通过`gzip`实用程序压缩的，因此可以通过相应的解压缩实用程序`gunzip`进行解压缩。请仔细查看以下列表中的`PREPROCESSOR`子句；它嵌套在`ACCESS\
  \ PARAMETERS`下：\n\n```sql\ncreate table exadata_et(\n  machine_count NUMBER\n  ,hide_flag\
  \ NUMBER\n  ,oracle NUMBER\n  ,ship_date DATE\n  ,rack_type VARCHAR2(32)\n)\norganization\
  \ external (\n  type oracle_loader\n  default directory data_dir\n  access parameters\n\
  \  (\n    records delimited by newline\n    preprocessor exe_dir: 'gunzip'\n   \
  \ fields terminated by '|'\n    missing field values are null\n    (exa_id\n   \
  \ ,machine_count\n    ,hide_flag\n    ,oracle\n    ,ship_date char date_format date\
  \ mask \"mm/dd/yyyy\"\n    ,rack_type)\n  )\n  location ('ex.csv.gz')\n)\nreject\
  \ limit unlimited;\n```\n\n预处理转储文件的优势在于，它为你节省了必须首先解压缩文件的步骤。\n\n`注意` 如果数据库安装了 Database\
  \ Vault 功能，Oracle 不允许你在其中使用`PREPROCESSOR`子句。\n\n第 14 章 ■ 外部表\n\n## 总结\n\n我曾经使用 SQL*Loader\
  \ 处理所有类型的数据加载任务。在过去的几年里，我已成为外部表的拥护者。几乎任何你可以用 SQL*Loader 完成的事情，你也可以用外部表完成。外部表方法的优势在于移动部件更少，并且接口是\
  \ SQL*Plus。大多数 DBA 和开发人员发现 SQL*Plus 比 SQL*Loader 控制文件更容易使用。\n\n你可以轻松使用外部表使 SQL*Plus\
  \ 能够访问操作系统平面文件。你只需在`CREATE TABLE...ORGANIZATION EXTERNAL`语句中定义平面文件的结构。创建外部表后，你可以直接从平面文件中进行选择，就像它是数据库表一样。你可以从外部表中选择，但不能插入、更新或删除。\n\
  \n创建外部表后，如果需要，可以通过使用`CREATE TABLE AS SELECT`从外部表创建常规数据库表。这样做提供了一种快速有效的方式来加载存储在外部操作系统文件中的数据。\n\
  \n外部表功能还允许你从表中选择数据并将其写入二进制转储文件。外部表`CREATE TABLE...ORGANIZATION EXTERNAL`语句定义了用于卸载数据的表和列。以这种方式创建的转储文件是平台无关的，意味着你可以将其复制到使用不同操作系统的服务器，并无缝加载数据。\n\
  \n此外，转储文件可以被加密和压缩，以便安全高效地传输。\n\n你还可以使用并行功能来减少创建转储文件所需的时间。\n\n下一章涉及物化视图。这些数据库对象为你提供了一种灵活、可维护且可扩展的机制来聚合和复制数据。\n\
  \n![](img/index-395_1.png)\n\n第 15 章 ■ 物化视图\n\n表创建后，你放入一个每日进程，在晚上 8:00 删除它并完全刷新它：\n\
  \n```sql\n-- 步骤 1 删除每日汇总销售数据：\ndelete from daily_sales;\n--\n-- 步骤 2 用汇总销售表的快照重新填充表：\n\
  insert into daily_sales\nselect\n  sum(sales_amt)\n  ,sales_dtt\nfrom sales\ngroup\
  \ by sales_dtt;\n```\n\n你通知用户，他们可以通过从`DAILY_SALES`中选择（而不是直接从主`SALES`表中运行查询和聚合）来获得亚秒级的查询结果。此过程大致描述了完全刷新过程。\n\
  \nOracle 的物化视图（MV）技术自动化并极大地增强了这一过程。本章描述了实现基本和复杂 MV 功能的步骤。阅读本章并完成示例后，你应该能够创建 MV 以在各种情况下复制和聚合数据。\n\
  \n在深入探讨创建 MV 的细节之前，先介绍与 MV 相关的基本术语和有用的数据字典视图是有益的。接下来的两个小节简要介绍了各种 MV 功能以及包含 MV 元数据的众多数据字典视图。\n\
  \n`注意` 本章不涵盖多主复制和可更新 MV 等主题。有关这些主题的更多详细信息，请参阅《Oracle 高级复制指南》（可在 Oracle 的 OTN 网站上获取）。\n\
  \n第 15 章 ■ 物化视图\n\n## 物化视图术语\n\n许多术语与刷新 MV 相关。在深入探讨如何实现这些功能之前，你应该熟悉这些术语。表 15–1 描述了\
  \ MV 相关的各种术语。\n\n***表 15–1.** MV 术语描述*\n\n| **术语** | **含义** |\n| :--- | :--- |\n\
  | 物化视图 | 用于复制数据和提高性能的数据库对象。 |\n| 物化视图 SQL 语句 | 定义底层 MV 基表中存储的数据的 SQL 查询。 |\n| 物化视图底层表\
  \ | 与 MV 同名的数据库表，用于存储 MV SQL 查询的结果。 |\n| 主表（或基表） | MV 在其 SQL 语句的`FROM`子句中引用的表。 |\n\
  | 完全刷新 | 删除 MV 并使用 MV SQL 语句完全刷新它的过程。 |\n| 快速刷新 | 仅将自上次刷新以来发生的 DML 更改应用到 MV 的过程。\
  \ |\n| 物化视图日志 | 跟踪 MV 基表上 DML 更改的数据库对象。快速刷新需要 MV 日志。它可以基于主键、`ROWID`或对象 ID。 |\n|\
  \ 简单 MV | 基于可以快速刷新的简单查询的 MV。 |\n| 复杂 MV | 基于不符合快速刷新条件的复杂查询的 MV。 |\n| 构建模式 | 指定是应立即填充\
  \ MV 还是延迟填充的模式。 |\n| 刷新模式 | 指定是应按需、在提交时还是从不刷新 MV 的模式。 |\n| 刷新方法 | 指定 MV 刷新应为完全刷新还是快速刷新的选项。\
  \ |\n| 查询重写 | 允许优化器选择使用 MV（而不是基表）来满足查询要求的功能（即使查询没有直接引用 MV）。 |\n| 本地 MV | 与基表位于同一数据库中的\
  \ MV。 |\n| 远程 MV | 与基表位于不同数据库中的 MV。 |\n| 刷新组 | 在同一个一致的事务点刷新的一组 MV。 |\n\n第 15 章 ■\
  \ 物化视图\n\n在阅读本章的其余部分时，请参考表 15–1。这些术语和概念将在后续章节中解释和阐述。\n\n## 引用有用的视图\n\n使用 MV 时，有时很难记住在什么情况下查询哪个数据字典视图。有各种各样的数据字典视图可用。表\
  \ 15–2 包含 MV 相关数据字典视图的描述。本章中适当地显示了使用这些视图的示例。这些视图对于故障排除、诊断问题和理解你的 MV 环境非常宝贵。\n\n\
  ***表 15–2.** 物化视图数据字典视图定义*\n\n| **数据字典视图** | **描述** |\n| :--- | :--- |\n| `DBA/ALL/USER_MVIEWS`\
  \ | 关于 MV 的信息，例如所有者、基查询、上次刷新时间等。 |\n| `DBA/ALL/USER_MVIEW_REFRESH_TIMES` | MV 的上次刷新时间、MV\
  \ 名称、主表和主所有者。 |\n| `DBA/ALL/USER_REGISTERED_MVIEWS` | 所有已注册的 MV。有助于识别哪些 MV 正在使用哪些\
  \ MV 日志。 |\n| `DBA/ALL/USER_MVIEW_LOGS` | MV 日志信息。 |\n| `DBA/ALL/USER_BASE_TABLE_MVIEWS`\
  \ | 具有 MV 日志的表的基表名称和上次刷新日期。 |\n| `DBA/ALL/USER_MVIEW_AGGREGATES` | 出现在 MV 的`SELECT`子句中的聚合函数。\
  \ |\n| `DBA/ALL/USER_MVIEW_ANALYSIS` | 关于 MV 的信息。Oracle 建议你使用`DBA/ALL/USER_MVIEWS`而不是这些视图。\
  \ |\n| `DBA/ALL/USER_MVIEW_COMMENTS` | 与 MV 相关的任何注释。 |\n| `DBA/ALL/USER_MVIEW_DETAIL_PARTITION`\
  \ | 分区和新鲜度信息。 |\n| `DBA/ALL/USER_MVIEW_DETAIL_SUBPARTITION` | 子分区和新鲜度信息。 |\n| `DBA/ALL/USER_MVIEW_DETAIL_RELATIONS`\
  \ | MV 依赖的本地表和 MV。 |\n| `DBA/ALL/USER_MVIEW_JOINS` | MV 定义的`WHERE`子句中两个列之间的连接。 |\n\
  | `DBA/ALL/USER_MVIEW_KEYS` | MV 定义的`SELECT`子句中的列或表达式。 |\n\n第 15 章 ■ 物化视图\n\n| **数据字典视图**\
  \ | **描述** |\n| :--- | :--- |\n| `DBA/ALL/USER_TUNE_MVIEW` | 执行`DBMS_ADVISOR.TUNE_MVIEW`过程的结果。\
  \ |\n| `V$MVREFRESH` | 当前正在刷新的 MV 的信息。 |\n| `DBA/ALL/USER_REFRESH` | 关于 MV 刷新组的详细信息。\
  \ |\n| `DBA_RGROUP` | 关于 MV 刷新组的信息。 |\n| `DBA_RCHILD` | MV 刷新组中的子项。 |\n\n## 创建基本物化视图\n\
  \n本节介绍如何创建 MV。最常用的两种配置如下：\n\n- 创建按需刷新的完全刷新 MV\n- 创建按需刷新的快速刷新 MV\n\n理解这些基本配置很重要。它们为你使用\
  \ MV 所做的其他一切奠定了基础。因此，本节从这些基本配置开始。稍后，本节将介绍更高级的配置。在进入高级 MV 主题之前，请确保你理解以下两节中的内容。\n\n\
  ### 创建可完全刷新的物化视图\n\n本节说明如何设置定期完全刷新的 MV，这可能是最简单的示例。完全刷新适用于基表中很大一部分行在刷新间隔之间发生变化的 MV。在无法进行快速刷新的情况下（由于\
  \ Oracle 施加的限制——本章稍后将详细介绍），也需要完全刷新。\n\n`注意` 要创建 MV，你需要`CREATE MATERIALIZED VIEW`系统特权和`CREATE\
  \ TABLE`系统特权。\n\n本节中的示例使用以下名为`SALES`的基表：\n\n```sql\ncreate table sales(\n  sales_id\
  \ number\n  ,sales_amt number\n  ,region_id number\n  ,sales_dtt timestamp\n  ,constraint\
  \ sales_pk primary key(sales_id)\n);\n```\n\n第 15 章 ■ 物化视图\n\n向`SALES`表中插入一些示例数据：\n\
  \n```sql\ninsert into sales values(1,101,100,sysdate-50);\ninsert into sales values(2,511,200,sysdate-20);\n\
  insert into sales values(3,11,100,sysdate);\ncommit;\n```\n\n下一步是创建 MV，使用`CREATE\
  \ MATERIALIZED VIEW...AS SELECT`语句。该语句命名 MV，指定其属性，并定义 MV 所基于的 SQL 查询：\n\n```sql\n\
  create materialized view sales_mv\nsegment creation immediate\nrefresh\n  complete\n\
  \  on demand\nas\n  select\n    sales_amt\n    ,sales_dtt\n  from sales;\n```\n\n\
  `SEGMENT CREATION IMMEDIATE`子句在 Oracle 11*g*第 2 版及更高版本中可用。它指示 Oracle 在创建 MV 时创建段并分配区。这是早期\
  \ Oracle 版本的行为。如果你不希望立即创建段，请使用`SEGMENT CREATION DEFERRED`子句。如果新创建的 MV 包含任何行，那么无论是否使用`SEGMENT\
  \ CREATION DEFERRED`，都会创建段并分配区。\n\n让我们查看`USER_MVIEWS`数据字典以验证 MV 是否按预期创建。要运行的查询如下：\n\
  \n```sql\nselect\n  mview_name\n  ,refresh_method\n  ,refresh_mode\n  ,build_mode\n\
  \  ,fast_refreshable\nfrom user_mviews\nwhere mview_name = 'SALES_MV';\n```\n\n\
  此 MV 的输出：\n\n```\nMVIEW_NAME   REFRESH_   REFRESH_MODE   BUILD_MOD   FAST_REFRESHABLE\n\
  ------------ ---------- -------------- ----------- --------------------\nSALES_MV\
  \     COMPLETE   DEMAND         IMMEDIATE   NO\n```\n\n检查`USER_OBJECTS`和`USER_SEGMENTS`视图以查看已创建的内容也很有帮助。当你查询`USER_OBJECTS`时，请注意已创建多个对象：\n\
  \n```sql\nselect\n  object_name\n  ,object_type\nfrom user_objects\nwhere object_name\
  \ like 'SALES%'\norder by object_name;\n```\n\n相应的输出：\n\n```\nOBJECT_NAME      \
  \    OBJECT_TYPE\n-------------------- --------------------\nSALES             \
  \   TABLE\nSALES_MV             MATERIALIZED VIEW\nSALES_MV             TABLE\n\
  SALES_PK             INDEX\n```\n\nMV 是一个逻辑容器，用于在常规数据库表中存储数据。查询`USER_SEGMENTS`视图显示基表、其主键索引以及存储\
  \ MV 查询返回数据的表：\n\n```sql\nselect\n  segment_name\n  ,segment_type\nfrom user_segments\n\
  where segment_name like 'SALES%'\norder by segment_name;\n```\n\n此示例的输出：\n\n```\n\
  SEGMENT_NAME   SEGMENT_TYPE\n-------------- --------------------\nSALES        \
  \  TABLE\nSALES_PK       INDEX\nSALES_MV       TABLE\n```\n\n`注意` Oracle 有时会自动在\
  \ MV 上创建索引。在此场景中，没有为 MV 创建索引。\n\n最后，让我们看看如何刷新`SALES_MV` MV。以下是`SALES_MV`中包含的数据：\n\
  \n```sql\nSQL> select sales_amt, to_char(sales_dtt,'dd-mon-yyyy') from sales_mv;\n\
  ```\n\n输出：\n\n```\nSALES_AMT TO_CHAR(SALES_DTT\n--------- -----------------\n101\
  \       17-jun-2010\n511       17-jul-2010\n11        06-aug-2010\n```\n\n接下来，向基`SALES`表中插入一些附加数据：\n\
  \n```sql\nSQL> insert into sales values(4,99,200,sysdate);\nSQL> insert into sales\
  \ values(5,127,300,sysdate);\n```\n\n现在你尝试使用`DBMS_MVIEW`包的`REFRESH`过程启动 MV 的快速刷新。此示例向`REFRESH`过程传递两个参数：名称和刷新方法。名称是`SALES_MV`，参数是`F`（表示*快速*）：\n\
  \n```sql\nSQL> exec dbms_mview.refresh('SALES_MV','F');\n```\n\n由于此 MV 不是在 MV 日志结合下创建的，因此无法进行快速刷新。抛出以下错误：\n\
  \n```\nORA-12004: REFRESH FAST cannot be used for materialized view \"MV\".\"SALES_MV\"\
  \n```\n\n![](img/index-402_1.png)\n\n第 15 章 ■ 物化视图\n\n5.  用户可以从 MV 查询数据，该 MV 包含基表数据的某时间点快照。\n\
  \n在下一节中，一个更复杂的示例向你展示如何设置可快速刷新的 MV。\n\n### 创建可快速刷新的物化视图\n\n当你创建可快速刷新的 MV 时，它最初使用\
  \ MV 查询的整个结果集填充 MV 表。初始结果集就位后，只有自上次刷新以来在基表中修改的数据需要应用到 MV。换句话说，自上次刷新以来主表发生的任何更新、插入或删除都会被复制过来。当基表在一段时间内的更改量相对于表中的总行数较小时，此功能适用。\n\
  \n以下是实现可快速刷新 MV 的步骤：\n\n1.  创建基表（如果尚未创建）。\n2.  在基表上创建 MV 日志。\n3.  创建可快速刷新的 MV。\n\
  \n此示例首先创建一个基表。在大多数环境中，你已经有一个基表。出于说明目的，以下是表创建脚本和一些示例数据：\n\n```sql\ncreate table sales(\n\
  \  sales_id number\n  ,sales_amt number\n  ,region_id number\n  ,sales_dtt timestamp\n\
  \  ,constraint sales_pk primary key(sales_id)\n);\n--\ninsert into sales values(1,101,100,sysdate-50);\n\
  insert into sales values(2,511,200,sysdate-20);\ninsert into sales values(3,11,100,sysdate);\n\
  commit;\n```\n\n可快速刷新的 MV 需要在基表上创建 MV 日志。当发生快速刷新时，MV 日志必须有一种唯一的方法来识别哪些记录已被修改，因此需要刷新。\n\
  \n你可以通过两种不同的方法来实现这一点。一种方法是在创建 MV 日志时指定`PRIMARY KEY`子句，另一种是指定`ROWID`子句。如果底层基表具有主键，则使用基于主键的\
  \ MV 日志。如果底层基表没有主键，则必须使用`ROWID`创建 MV 日志。在大多数情况下，你可能为每个基表定义了主键。然而，现实情况是，有些系统设计不佳，或者有某些罕见原因导致表没有主键。\n\
  \n在此示例中，基表上定义了主键，因此你使用`PRIMARY KEY`子句创建 MV 日志：\n\n```sql\nSQL> create materialized\
  \ view log on sales with primary key;\n```\n\n如果基表上没有定义主键，则在尝试创建 MV 日志时会抛出此错误：\n\
  \n```\nORA-12014: table does not contain a primary key constraint\n```\n\n第 15 章\
  \ ■ 物化视图\n\n如果基表没有主键，并且你没有选择添加主键，则必须在创建 MV 日志时指定`ROWID`：\n\n```sql\nSQL> create\
  \ materialized view log on sales with rowid;\n```\n\n现在你已经创建了 MV 日志，你可以创建可快速刷新的\
  \ MV 了。有几个有趣的体系结构考虑需要指出。如果基表上没有 MV 日志，则 Oracle 不允许你创建可快速刷新的 MV。会抛出此错误：\n\n```\n\
  ORA-23413: table does not have a materialized view log.\n```\n\n此外，当你创建可快速刷新的 MV\
  \ 时，必须指定它是通过`PRIMARY KEY`（默认值）还是通过`ROWID`刷新。此示例使用具有主键的表和使用主键创建的 MV 日志。在此示例中，MV 通过主键快速刷新。当你使用基于主键的可快速刷新\
  \ MV 时，基表的主键列必须是可快速刷新 MV `SELECT`语句的一部分：\n\n```sql\ncreate materialized view sales_mv\n\
  segment creation immediate\nrefresh\n  with primary key\n  fast\n  on demand\nas\n\
  \  select\n    sales_id\n    ,sales_amt\n    ,sales_dtt\n  from sales;\n```\n\n\
  此时，检查与 MV 关联的对象很有用。以下查询从`USER_OBJECTS`中选择：\n\n```sql\nselect\n  object_name\n  ,object_type\n\
  from user_objects\nwhere object_name like '%SALES%'\norder by object_name;\n```\n\
  \n以下是已创建的对象：\n\n```\nOBJECT_NAME          OBJECT_TYPE\n-------------------- --------------------\n\
  MLOG$_SALES          TABLE\nRUPD$_SALES          TABLE\nSALES                TABLE\n\
  SALES_MV             MATERIALIZED VIEW\nSALES_MV             TABLE\nSALES_PK   \
  \          INDEX\nSALES_PK1            INDEX\n```\n\n第 15 章 ■ 物化视图\n\n前面输出中的几个对象需要一些解释：\n\
  \n- `MLOG$_SALES`\n- `RUPD$_SALES`\n- `SALES_PK1`\n\n首先，创建 MV 日志时，还会创建一个相应的表，用于存储基表中更改的行以及它们的更改方式（插入、更新或删除）。MV\
  \ 日志表名的格式为`MLOG$_<基表名>`。\n\n还会创建一个格式为`RUPD$_<基表名>`的表。当你使用主键创建可快速刷新的 MV 时，Oracle\
  \ 会自动创建此`RUPD$`表。它是为了支持可更新 MV 功能而存在的。除非你处理可更新 MV（有关可更新 MV 的更多详细信息，请参阅《Oracle 高级复制指南》），否则你不必担心此表。如果你不使用可更新\
  \ MV 功能，则可以忽略`RUPD$`表。\n\nOracle 还会创建一个格式为`<基表名>_PK1`的索引。此索引是为基于主键的 MV 自动创建的，并基于基表的主键列。如果这是`ROWID`而不是主键，则索引名称的格式为`I_SNAP$_<表名>`，并基于`ROWID`。如果你没有显式命名基表上的主键索引，则\
  \ Oracle 会给 MV 表主键索引一个系统生成的名称，例如`SYS_C008780`。\n\n现在你了解了底层体系结构组件，让我们看看 MV 中的数据：\n\
  \n```sql\nSQL> select sales_amt, to_char(sales_dtt,'dd-mon-yyyy') from sales_mv;\n\
  ```\n\n输出：\n\n```\nSALES_AMT TO_CHAR(SALES_DTT\n--------- -----------------\n101\
  \       12-jun-2010\n511       12-jul-2010\n11        01-aug-2010\n```\n\n让我们向基`SALES`表添加两条记录：\n\
  \n```sql\ninsert into sales values(4,99,200,sysdate);\ninsert into sales values(5,127,300,sysdate);\n\
  commit;\n```\n\n此时，检查`M$LOG`表很有指导意义。你应该看到两条记录，标识`SALES`表中的数据如何更改：\n\n```sql\nSQL>\
  \ select count(*) from mlog$_sales;\n```\n\n有两条记录：\n\n```\nCOUNT(*)\n----------\n\
  2\n```\n\n接下来，让我们刷新 MV。此 MV 是可快速刷新的，因此你使用`F`（表示*快速*）参数调用`DBMS_MVIEW`包的`REFRESH`过程：\n\
  \n```sql\nSQL> exec dbms_mview.refresh('SALES_MV','F');\n```\n\n快速检查 MV 显示两条新记录：\n\
  \n```sql\nSQL> select sales_amt, to_char(sales_dtt,'dd-mon-yyyy') from sales_mv;\n\
  ```\n\n以下是一些示例输出：\n\n第 15 章 ■ 物化视图\n\n```\nSALES_AMT TO_CHAR(SALES_DTT\n---------\
  \ -----------------\n101       12-jun-2010\n511       12-jul-2010\n11        01-aug-2010\n\
  99        01-aug-2010\n127       01-aug-2010\n```\n\n此外，`MLOG$`的计数已降至零。MV 刷新完成后，不再需要这些记录：\n\
  \n```sql\nSQL> select count(*) from mlog$_sales;\n```\n\n输出：\n\n```\nCOUNT(*)\n\
  ----------\n0\n```\n\n你可以通过查询`USER_MVIEWS`视图来验证 MV 上次刷新的方式：\n\n```sql\nselect\n\
  \  mview_name\n  ,last_refresh_type\n  ,last_refresh_date\nfrom user_mviews\norder\
  \ by 1,3;\n```\n\n以下是一些示例输出：\n\n```\nMVIEW_NAME   LAST_REF   LAST_REFR\n------------\
  \ ---------- ---------\nSALES_MV     FAST       01-AUG-10\n```\n\n图 15–2 说明了快速刷新所涉及的体系结构组件。框中的数字表示快速刷新过程的顺序流。如果你是\
  \ MV 的新手，请在这里暂停几分钟，确保你理解所有组件。\n\n![](img/index-407_1.png)\n\n第 15 章 ■ 物化视图\n\n-\
  \ 日志记录\n- 并行性\n\n本章下一节展示了如何创建具有各种功能的 MV 的示例。\n\n## 超越基础\n\n有许多 MV 功能可用。其中许多与可以应用于任何表的属性相关，例如存储、索引、压缩、加密等。其他功能与创建的\
  \ MV 类型及其刷新方式相关。这些方面将在接下来的几个小节中描述。\n\n### 创建 MV 并为 MV 和索引指定表空间\n\n每个 MV 都有一个与之关联的底层表。此外，根据\
  \ MV 的类型，可能会自动创建索引。创建 MV 时，可以为底层表和索引指定表空间和存储特性。下一个示例显示如何指定用于 MV 表的表空间和用于索引的单独表空间：\n\
  \n```sql\ncreate materialized view inv_mv\ntablespace mv_data\nusing index tablespace\
  \ mv_index\nas\n  select\n    inv_id\n    ,inv_desc\n  from inv;\n```\n\n你也可以指定存储特性。例如，如果你知道要加载到很少更新的\
  \ MV 中，将`PCTUSED`设置为较高值（例如 95）是合适的。例如：\n\n```sql\ncreate materialized view inv_mv\n\
  pctused 95\npctfree 5\ntablespace mv_data\nusing index tablespace mv_index\nas\n\
  \  select\n    inv_id\n    ,inv_desc\n  from inv;\n```\n\n### 在 MV 上创建索引\n\nMV 将其数据存储在常规数据库表中。因此，你可以在底层表上创建索引（就像对任何其他表一样）。通常，在\
  \ MV 表上创建索引遵循与常规表相同的准则。（有关创建索引的更多详细信息，请参见第 8 章。）请记住，尽管索引可以显著提高查询性能，但为任何插入、更新和删除维护索引会带来开销。索引也会消耗磁盘空间。\n\
  \n以下是基于 MV 中的列创建索引的示例。语法与在常规表上创建索引相同：\n\n第 15 章 ■ 物化视图\n\n```sql\nSQL> create index\
  \ inv_mv_idx1 on inv_mv(region_id) tablespace mv_index;\n```\n\n你可以通过查询`USER_INDEXES`视图来显示为\
  \ MV 创建的索引：\n\n```sql\nselect\n  a.table_name\n  ,a.index_name\nfrom user_indexes\
  \ a\n,user_mviews b\nwhere a.table_name = b.mview_name;\n```\n\n`注意` 如果你使用`WITH\
  \ PRIMARY KEY`子句创建一个简单的 MV，该子句选择具有主键的基表，则 Oracle 会自动在 MV 中相应的主键列上创建索引。如果你使用`WITH\
  \ ROWID`子句创建一个简单的 MV，该子句选择具有主键的基表，则 Oracle 会自动在名为`M_ROW$$`的隐藏列上创建索引。\n\n### 对物化视图进行分区\n\
  \n你可以像对数据库中的任何其他常规表一样对 MV 表进行分区。如果你处理大型 MV，可能需要考虑分区以更好地管理和维护大型表。创建 MV 时使用`PARTITION`子句。此示例构建一个按`DATE_ID`列范围分区的\
  \ MV：\n\n```sql\ncreate materialized view inv_mv\npartition by range (date_id)\n\
  (partition p1\nvalues less than (20100101)\n,partition p2\nvalues less than (20110101)\n\
  ,partition p3\nvalues less than (20120101))\nrefresh on demand complete with rowid\n\
  as\n  select\n    inv_id\n    ,inv_desc\n    ,date_id\n  from inv;\n```\n\n查询的结果集存储在分区表中。你可以在`USER_TAB_PARTITIONS`和`USER_PART_TABLES`中查看此表的分区详细信息（就像数据库中的任何其他分区表一样）。有关分区策略和维护的更多详细信息，请参见第\
  \ 12 章。\n\n第 15 章 ■ 物化视图\n\n### 压缩物化视图\n\n如前所述，创建 MV 时，会创建一个底层表来存储数据。由于此表是常规数据库表，因此你可以实现压缩等功能。例如：\n\
  \n```sql\ncreate materialized view inv_mv\ncompress\nas\n  select\n    inv_id\n\
  \    ,inv_desc\n  from inv;\n```\n\n你可以通过以下查询确认压缩详细信息：\n\n```sql\nselect\n  table_name\n\
  \  ,compression\n  ,compress_for\nfrom user_tables where table_name='INV_MV';\n\
  ```\n\n输出：\n\n```\nTABLE_NAME   COMPRESS   COMPRESS_FOR\n------------ ----------\
  \ ------------\nINV_MV       ENABLED    BASIC\n```\n\n`注意` 基本表压缩不需要 Oracle 的额外许可。联机事务处理（OLTP）压缩需要高级压缩选项，这需要\
  \ Oracle 的额外许可。有关详细信息，请参阅《Oracle 数据库许可信息》文档（可在 OTN 上获取）。\n\n### 加密物化视图列\n\n如前所述，创建\
  \ MV 时，会创建一个底层表来存储数据。由于此表是常规数据库表，因此你可以实现列加密等功能。例如：\n\n```sql\ncreate materialized\
  \ view inv_mv\n  (inv_id encrypt no salt\n  ,inv_desc encrypt)\nas\n  select\n \
  \   inv_id inv_id\n    ,inv_desc inv_desc\n  from inv;\n```\n\n要使前面的语句生效，你必须为数据库创建并打开一个安全钱包。此功能需要\
  \ Oracle 的高级安全选项（这需要额外的许可）。\n\n你可以通过描述 MV 来验证加密是否已启用：\n\n第 15 章 ■ 物化视图\n\n```sql\n\
  SQL> desc inv_mv\n Name                                      Null?    Type\n -----------------------------------------\
  \ -------- ----------------------------\n INV_ID                               \
  \     NOT NULL NUMBER ENCRYPT\n INV_DESC                                       \
  \    VARCHAR2(30) ENCRYPT\n```\n\n### 在预构建表上构建物化视图\n\n在数据仓库环境中，有时你需要创建一个表，用大量数据填充它，然后将其转换为\
  \ MV。或者你可能正在复制一个大表，并发现使用数据泵通过预构建表来初始填充远程 MV 更有效。以下是构建预构建表上的 MV 的步骤：\n\n1.  创建一个表。\n\
  2.  用数据填充它。\n3.  在步骤 1 中创建的表上创建 MV。\n\n以下是一个简单示例来说明此过程。首先，你创建一个表：\n\n```sql\ncreate\
  \ table inv_mv\n  (inv_id number\n  ,inv_desc varchar2(30)\n  );\n```\n\n现在，用数据填充表。例如，在数据仓库环境中，这可以是使用数据泵、SQL*Loader\
  \ 或外部表加载的表。\n\n最后，运行`CREATE MATERIALIZED VIEW...ON PREBUILT TABLE`语句将表变为 MV。MV 名称和表名称必须相同。此外，查询中的每一列必须对应于表中的列。例如：\n\
  \n```sql\ncreate materialized view inv_mv\non prebuilt table\nusing index tablespace\
  \ mv_index\nas\n  select\n    inv_id\n    ,inv_desc\n  from inv;\n```\n\n现在`INV_MV`对象是一个\
  \ MV。如果你尝试删除`INV_MV`表，会抛出以下错误，表明`INV_MV`现在是一个物化视图：\n\n```sql\nSQL> drop table inv_mv;\n\
  ```\n\n```\nORA-12083: must use DROP MATERIALIZED VIEW to drop \"MV\".\"INV_MV\"\
  \n```\n\n预构建表功能在数据仓库环境中非常有用，这些环境通常有很长一段时间基表没有被主动更新。这为你提供了时间来加载预构建表并确保其内容与基表相同。在预构建表上创建\
  \ MV 后，你可以快速刷新 MV 并使其与基表保持同步。\n\n如果你的基表（在 MV 的`SELECT`子句中指定）不断被更新，那么在预构建表上创建 MV\
  \ 可能不是一个可行的选择。这是因为无法确保预构建表与基表保持同步。\n\n第 15 章 ■ 物化视图\n\n`注意` 对于在预构建表上创建的 MV，如果你随后发出`DROP\
  \ MATERIALIZED VIEW`语句，则不会删除底层表。当你需要修改基表（如添加列）时，这有一些有趣的含义。有关详细信息，请参阅本章后面的“修改基表 DDL\
  \ 并传播到物化视图”部分。\n\n### 创建未填充的物化视图\n\n创建 MV 时，你可以选择指示 Oracle 是否最初用数据填充 MV。例如，如果初始构建\
  \ MV 需要几个小时，你可能希望首先定义 MV，然后将其作为单独的作业填充。\n\n此示例使用`BUILD DEFERRED`子句指示 Oracle 不要最初用查询结果填充\
  \ MV：\n\n```sql\ncreate materialized view inv_mv\ntablespace mv_data\nbuild deferred\n\
  refresh complete on demand\nas\n  select\n    inv_id\n    ,inv_desc\n  from inv;\n\
  ```\n\n此时，查询 MV 将返回零行。在稍后的某个时间点，你可以启动完全刷新以用数据填充 MV。\n\n### 创建在提交时刷新的物化视图\n\n你可能有这样的要求：当主表中的数据被修改时，立即将其复制到\
  \ MV。在这种情况下，在创建 MV 时使用`ON COMMIT`子句。主表必须在其上创建 MV 日志，此技术才能工作。以下是一个简单示例，该示例创建一个具有主键的表，创建一个\
  \ MV 日志，然后创建一个在提交时刷新的 MV：\n\n```sql\ncreate table inv(inv_id number primary key,\n\
  \                 inv_desc varchar2(30));\n--\ncreate materialized view log on inv\
  \ with primary key;\n--\ncreate materialized view inv_mv\nrefresh\n  on commit\n\
  as\n  select inv_id, inv_desc from inv;\n```\n\n当数据在主表中插入并提交时，任何更改也将在通过 MV 查询选择的\
  \ MV 中可用。\n\n第 15 章 ■ 物化视图\n\n`ON COMMIT`可刷新 MV 有一些限制你需要了解：\n\n- 主表和 MV 必须位于同一数据库中。\n\
  - 你不能在基表上执行分布式事务。\n- 此方法不支持包含对象类型或 Oracle 提供类型的 MV。\n\n此外，考虑同时在两个地方提交数据相关的开销；这会影响高事务\
  \ OLTP 系统的性能。此外，如果更新 MV 时出现问题，则基表无法提交事务。例如，如果创建 MV 的表空间已满（并且无法分配另一个区），则在尝试插入基表时会看到如下错误：\n\
  \n```\nORA-12008: error in materialized view refresh path\nORA-01653: unable to\
  \ extend table MV.INV_MV by 16 in tablespace TBSP2\n```\n\n由于这些原因，你应仅在确定它不会影响性能或可用性时才使用此功能。\n\
  \n`注意` 你不能将 MV 指定为同时使用`ON COMMIT`和`ON DEMAND`刷新。此外，`ON COMMIT`与`CREATE MATERIALIZED\
  \ VIEW`语句的`START WITH`和`NEXT`子句不兼容。\n\n### 创建永不刷新的物化视图\n\n你可能希望 MV 永远不被刷新。例如，你可能希望保证你在某个时间点拥有表的快照用于审计目的。创建\
  \ MV 时指定`NEVER REFRESH`子句以实现此目的：\n\n```sql\ncreate materialized view inv_mv\ntablespace\
  \ mv_data\nusing index tablespace mv_index\nnever refresh\nas\n  select\n    inv_id\n\
  \    ,inv_desc\n  from inv;\n```\n\n如果你尝试刷新不可刷新的 MV，会收到此错误：\n\n```\nORA-23538: cannot\
  \ explicitly refresh a NEVER REFRESH materialized view\n```\n\n你可以将永不刷新的视图更改为可刷新的。使用`ALTER\
  \ MATERIALIZED VIEW`语句执行此操作：\n\n```sql\nSQL> alter materialized view inv_mv refresh\
  \ on demand complete;\n```\n\n第 15 章 ■ 物化视图\n\n你可以通过以下查询验证刷新模式和方法：\n\n```sql\nselect\n\
  \  mview_name\n  ,refresh_mode\n  ,refresh_method\nfrom user_mviews;\n```\n\n###\
  \ 创建用于查询重写的物化视图\n\n查询重写允许优化器识别可以使用 MV 来满足查询的要求，而不是使用底层主（基）表。如果你的环境是用户经常编写自己的查询并且不知道可用的\
  \ MV，此功能可以极大地帮助提高性能。启用查询重写有三个先决条件：\n\n- Oracle 企业版\n- 数据库初始化参数`QUERY_REWRITE_ENABLED`必须设置为`TRUE`（在\
  \ Oracle 数据库 10*g*或更高版本中是默认值）\n- MV 使用`ENABLE QUERY REWRITE`子句创建或更改\n\n此示例创建启用了查询重写的\
  \ MV：\n\n```sql\ncreate materialized view sales_mv\ntablespace mv_data\nusing index\
  \ tablespace mv_index\nenable query rewrite\nas\n  select\n    sum(sales_amt)\n\
  \    ,b.reg_desc\n  from sales a\n  ,region b\n  where a.region_id = b.region_id\n\
  \  group by b.reg_desc;\n```\n\n你可以通过从`USER_MVIEWS`中选择`REWRITE_ENABLED`列来判断查询重写是否对\
  \ MV 启用：\n\n```sql\nselect\n  mview_name\n  ,rewrite_enabled\n  ,rewrite_capability\n\
  from user_mviews\nwhere mview_name = 'SALES_MV';\n```\n\n输出：\n\n```\nMVIEW_NAME\
  \   R REWRITE_C\n------------ - ---------\nSALES_MV     Y GENERAL\n```\n\n如果由于某种原因查询没有使用查询重写功能，并且你认为它应该使用，请使用`DBMS_MVIEW`包的`EXPLAIN_REWRITE`过程来诊断问题。\n\
  \n第 15 章 ■ 物化视图\n\n### 基于复杂查询创建可快速刷新的 MV\n\n在许多情况下，当你基于连接多个表的查询创建 MV 时，它被认为是复杂的，因此仅适用于完全刷新。然而，在某些场景中，当\
  \ MV 查询中引用两个连接在一起的表时，你可以创建可快速刷新的 MV。\n\n本节描述如何使用`DBMS_MVIEW`的`EXPLAIN_MVIEW`过程来确定是否可以快速刷新复杂查询。为了帮助你完全理解该示例，本节显示了用于创建基表的\
  \ SQL。假设你有两个基表`REGION`和`INV`，定义如下：\n\n```sql\ncreate table region(\n  region_id\
  \ number\n  ,reg_desc varchar2(30)\n  ,constraint region_pk primary key(region_id));\n\
  --\ncreate table inv(\n  inv_id number\n  ,inv_desc varchar2(30)\n  ,region_id number\n\
  \  ,constraint inv_pk primary key(inv_id)\n  ,constraint dept_fk foreign key (region_id)\
  \ references region(region_id));\n```\n\n此外，`REGION`和`INV`上创建了 MV 日志，如下所示：\n\n```sql\n\
  SQL> create materialized view log on region with primary key;\nSQL> create materialized\
  \ view log on inv with primary key;\n```\n\n另外，对于此示例，基表中插入了以下数据：\n\n```sql\ninsert\
  \ into region values(10,'East');\ninsert into region values(20,'West');\ninsert\
  \ into region values(30,'South');\ninsert into region values(40,'North');\n--\n\
  insert into inv values(1,'book',10);\ninsert into inv values(2,'table',20);\ninsert\
  \ into inv values(3,'chair',30);\n```\n\n假设你想创建一个连接`REGION`和`INV`基表的 MV，如下所示：\n\n\
  ```sql\ncreate materialized view inv_mv\ntablespace mv_data\nusing index tablespace\
  \ mv_index\nas\n  select\n    a.inv_desc\n    ,b.reg_desc\n  from inv a\n  ,region\
  \ b\n  where a.region_id = b.region_id;\n```\n\n接下来，让我们尝试快速刷新 MV：\n\n```sql\nSQL>\
  \ exec dbms_mview.refresh('INV_MV','F');\n```\n\n抛出此错误：\n\n```\nORA-12032: cannot\
  \ use rowid column from materialized view log on \"MV\".\"REGION\"\n```\n\n第 15\
  \ 章 ■ 物化视图\n\n错误表明 MV 存在问题，无法快速刷新。要确定此 MV 是否可以变为可快速刷新，请使用`DBMS_MVIEW`包的`EXPLAIN_MVIEW`过程的输出。此过程要求你首先创建`MV_CAPABILITIES_TABLE`。Oracle\
  \ 提供了一个脚本来完成此操作。以 MV 的所有者身份运行此脚本：\n\n```sql\nSQL> @?/rdbms/admin/utlxmv.sql\n```\n\
  \n创建表后，运行`EXPLAIN_MVIEW`过程来填充它：\n\n```sql\nSQL> exec dbms_mview.explain_mview(mv=>'INV_MV',stmt_id=>'100');\n\
  ```\n\n现在，查询`MV_CAPABILITIES_TABLE`以查看此 MV 可能存在的潜在问题：\n\n```sql\nselect\n  capability_name\n\
  \  ,possible\n  ,msgtxt\n  ,related_text\nfrom mv_capabilities_table\nwhere capability_name\
  \ like 'REFRESH_FAST_AFTER%'\nand statement_id = '100'\norder by 1;\n```\n\n以下是输出。`P`（`POSSIBLE`）列对每个快速刷新可能性都包含`N`（`NO`）：\n\
  \n```\nCAPABILITY_NAME                            P MSGTXT                     \
  \                      RELATED_TEXT\n------------------------------------------\
  \ - ------------------------------------------------ ------------------------------\n\
  REFRESH_FAST_AFTER_ANY_DML                  N see the reason why REFRESH_FAST_AFTER_ONETAB_DML\
  \ is disabled\nREFRESH_FAST_AFTER_INSERT                   N mv log must have ROWID\
  \                            MV.REGION\nREFRESH_FAST_AFTER_INSERT              \
  \     N the SELECT list does not have the rowids of all the detail tables\nREFRESH_FAST_AFTER_INSERT\
  \                   N mv log must have ROWID                            MV.INV\n\
  REFRESH_FAST_AFTER_ONETAB_DML               N see the reason why REFRESH_FAST_AFTER_INSERT\
  \ is disabled\n```\n\n`MSGTXT`指示一个问题：MV 日志需要基于`ROWID`。让我们删除并重新创建使用`ROWID`（而不是主键）的\
  \ MV 日志：\n\n```sql\ndrop materialized view log on region;\ndrop materialized view\
  \ log on inv;\n--\ncreate materialized view log on region with rowid;\ncreate materialized\
  \ view log on inv with rowid;\n```\n\n接下来，重置`MV_CAPABILITIES_TABLE`并通过`EXPLAIN_MVIEW`过程重新填充它：\n\
  \n```sql\nSQL> delete from mv_capabilities_table where statement_id=100;\nSQL> exec\
  \ dbms_mview.explain_mview(mv=>'INV_MV',stmt_id=>'100');\n```\n\n重新运行前面的从`MV_CAPABILITIES_TABLE`中选择的查询（此处未复制）显示输出：\n\
  \n```\nCAPABILITY_NAME                            P MSGTXT                     \
  \                      RELATED_TEXT\n------------------------------------------\
  \ - ------------------------------------------------ ------------------------------\n\
  REFRESH_FAST_AFTER_ANY_DML                  N see the reason why REFRESH_FAST_AFTER_ONETAB_DML\
  \ is disabled\nREFRESH_FAST_AFTER_INSERT                   N mv log is newer than\
  \ last full refresh           MV.REGION\nREFRESH_FAST_AFTER_INSERT             \
  \      N the SELECT list does not have the rowids of all the detail tables\nREFRESH_FAST_AFTER_INSERT\
  \                   N mv log is newer than last full refresh           MV.INV\n\
  REFRESH_FAST_AFTER_ONETAB_DML               N see the reason why REFRESH_FAST_AFTER_INSERT\
  \ is disabled\n```\n\n从前面的输出中，MV `SELECT`语句需要包含基表的`ROWID`。\n\n接下来的几行代码删除 MV 并使用重写的\
  \ SQL 语句重新创建它，该语句包含`ROWID`：\n\n```sql\ndrop materialized view inv_mv;\n--\ncreate\
  \ materialized view inv_mv\nas\n  select\n    a.rowid inv_rowid\n    ,b.rowid region_rowid\n\
  \    ,a.inv_desc\n    ,b.reg_desc\n  from inv a\n  ,region b\n  where a.region_id\
  \ = b.region_id;\n```\n\n接下来，重置`MV_CAPABILITIES_TABLE`并通过`EXPLAIN_MVIEW`过程重新填充它：\n\
  \n```sql\nSQL> delete from mv_capabilities_table where statement_id=100;\nSQL> exec\
  \ dbms_mview.explain_mview(mv=>'INV_MV',stmt_id=>'100');\n```\n\n输出显示现在可以快速刷新 MV：\n\
  \n```\nCAPABILITY_NAME                            P MSGTXT                     \
  \                      RELATED_TEXT\n------------------------------------------\
  \ - ------------------------------------------------ ------------------------------\n\
  REFRESH_FAST_AFTER_ANY_DML                  Y\nREFRESH_FAST_AFTER_INSERT       \
  \            Y\nREFRESH_FAST_AFTER_ONETAB_DML               Y\n```\n\n执行以下语句以查看快速刷新是否有效：\n\
  \n```sql\nSQL> exec dbms_mview.refresh('INV_MV','F');\n```\n\n```\nPL/SQL procedure\
  \ successfully completed.\n```\n\n`EXPLAIN_MVIEW`过程是一个强大的工具，它允许你确定刷新功能是否可能，如果不可能，为什么不可能以及如何潜在地解决问题。\n\
  \n### 查看物化视图 DDL\n\n要快速查看 MV 所基于的 SQL 查询，请从`DBA/ALL/USER_MVIEWS`的`QUERY`列中选择。如果你使用\
  \ SQL*Plus，首先将`LONG`变量设置为足够大的值以显示`LONG`列的全部内容：\n\n第 15 章 ■ 物化视图\n\n```sql\nSQL>\
  \ set long 5000\nSQL> select query from dba_mviews where mview_name=UPPER('&&mview_name');\n\
  ```\n\n要查看重新创建 MV 所需的整个数据定义语言（DDL），请使用`DBMS_METADATA`包（如果使用 SQL*Plus，你还需要将`LONG`变量设置为较大的值）：\n\
  \n```sql\nSQL> select dbms_metadata.get_ddl('MATERIALIZED_VIEW','INV_MV') from dual;\n\
  ```\n\n此示例的输出：\n\n```\nCREATE MATERIALIZED VIEW \"MV\".\"INV_MV\" (\"INV_ROWID\"\
  , \"REGION_ROWID\", \"INV_DESC\",\n\"REG_DESC\") ORGANIZATION HEAP PCTFREE 10 PCTUSED\
  \ 40 INITRANS 1\nMAXTRANS 255 NOCOMPRESS LOGGING\nSTORAGE(INITIAL 65536 NEXT 1048576\
  \ MINEXTENTS 1 MAXEXTENTS 2147483645\nPCTINCREASE 0 FREELISTS 1 FREELIST GROUPS\
  \ 1 BUFFER_POOL DEFAULT FLASH_CACHE\nDEFAULT CELL_FLASH_CACHE DEFAULT)\nTABLESPACE\
  \ \"USERS\"\nBUILD IMMEDIATE\nUSING INDEX\nREFRESH FORCE ON DEMAND\nUSING DEFAULT\
  \ LOCAL ROLLBACK SEGMENT\nUSING ENFORCED CONSTRAINTS DISABLE QUERY REWRITE\nAS select\n\
  \    a.rowid inv_rowid\n    ,b.rowid region_rowid\n    ,a.inv_desc\n    ,b.reg_desc\n\
  \  from inv a\n  ,region b\n  where a.region_id = b.region_id\n```\n\n此输出显示了 Oracle\
  \ 认为重新创建 MV 所需的 DDL。这通常是生成与 MV 关联的 DDL 的最可靠方法。\n\n### 删除物化视图\n\n你可能偶尔需要删除 MV。也许视图不再被使用，或者你需要删除并重新创建\
  \ MV 以更改 MV 所基于的底层查询（例如向其添加列）。使用`DROP MATERIALIZED VIEW`命令删除 MV。此示例删除名为`ORDERS_MV`的视图：\n\
  \n```sql\nSQL> drop materialized view orders_mv;\n```\n\n删除 MV 时，MV 对象、表对象以及任何相应的索引也会被删除。删除\
  \ MV 不会影响任何 MV 日志——MV 日志仅依赖于主表。\n\n你还可以指定保留底层表。如果你正在排除故障并需要删除 MV 定义但保留 MV 表和数据，可能需要这样做。例如：\n\
  \n```sql\nSQL> drop materialized view inv_mv preserve table;\n```\n\n在此场景中，你以后还可以使用底层表作为\
  \ MV 的基础，通过使用`ON PREBUILT TABLE`子句构建 MV。\n\n第 15 章 ■ 物化视图\n\n如果 MV 最初是使用`ON PREBUILT\
  \ TABLE`子句构建的，则当你删除 MV 时，不会删除底层表。如果你想删除底层表，必须使用`DROP TABLE`语句：\n\n```sql\nSQL> drop\
  \ materialized view inv_mv;\nSQL> drop table inv_mv;\n```\n\n## 修改物化视图\n\n本节描述与\
  \ MV 相关的常见维护任务。涵盖的主题包括如何修改 MV 以反映基表列的更改（这些更改是在 MV 最初创建一段时间后应用的），以及修改属性（如日志记录和并行性）。\n\
  \n### 修改基表 DDL 并传播到物化视图\n\n一项常见任务涉及向基表添加列或从基表删除列（因为业务需求已更改）。将列添加到基表或从基表删除列后，你希望这些\
  \ DDL 更改反映在任何依赖的 MV 中。你有几个选项可以将基表列更改传播到依赖的 MV：\n\n- 删除并使用新的列定义重新创建 MV。\n- 删除 MV，但保留底层表，修改\
  \ MV 表，然后使用`ON PREBUILT TABLE`子句重新创建 MV（具有新的列更改）。\n- 如果 MV 最初是使用`ON PREBUILT TABLE`子句创建的，则删除\
  \ MV 对象，修改 MV 表，然后使用`ON PREBUILT TABLE`子句重新创建 MV（具有新的列更改）。\n\n使用前面的任何选项，你都必须删除并重新创建\
  \ MV，以便它知道基表中的列更改。接下来描述这些方法。\n\n### 重新创建物化视图以反映基表修改\n\n假设你对基表进行了修改，例如添加一列：\n\n```sql\n\
  SQL> alter table inv add(inv_loc varchar2(30));\n```\n\n你还有一个基于此表的名为`INV_MV`的简单\
  \ MV。你希望基表修改反映在 MV 中。你如何完成此任务？你知道 MV 包含一个存储结果的底层表。你决定直接修改底层 MV 表：\n\n```sql\nSQL>\
  \ alter table inv_mv add(inv_loc varchar2(30));\n```\n\n修改成功。接下来你刷新 MV，但意识到附加列没有被刷新。要理解原因，请回想\
  \ MV 是一个将其结果存储在底层表中的 SQL 查询。因此，要修改 MV，你必须更改 MV 所基于的 SQL 查询。由于没有`ALTER MATERIALIZED\
  \ VIEW ADD/DROP/MODIFY <column>`语句，你必须执行以下操作来在 MV 中添加/删除列：\n\n第 15 章 ■ 物化视图\n\n\
  1.  修改基表。\n2.  删除并重新创建 MV 以反映基表的更改。\n\n以下是一个示例。假设你需要向基`INV`表添加一列`INV_LOC`：\n\n```sql\n\
  SQL> alter table inv add(inv_loc varchar2(30));\n```\n\n删除并重新创建 MV 以包含列定义：\n\n```sql\n\
  drop materialized view inv_mv;\n--\ncreate materialized view inv_mv\nrefresh fast\
  \ on demand\nas\n  select\n    inv_id\n    ,inv_desc\n    ,inv_loc\n  from inv;\n\
  ```\n\n如果涉及大量数据，此方法可能需要很长时间。在重建期间，任何访问 MV 的应用程序都会停机。如果你在大型数据仓库环境中工作，那么由于完全刷新 MV\
  \ 所需的时间，你可能需要考虑不删除底层表。此选项在下一节中讨论。\n\n### 修改物化视图但保留底层表\n\n删除 MV 时，你可以选择保留底层表及其数据。当你在数据仓库环境中处理大型\
  \ MV 时，可能会发现此方法很有优势。\n\n以下是步骤：\n\n1.  修改基表。\n2.  删除 MV，但保留底层表。\n3.  修改底层表。\n4. \
  \ 使用`ON PREBUILT TABLE`子句重新创建 MV。\n\n以下是一个简单示例来说明此过程：\n\n```sql\nSQL> alter table\
  \ inv add(inv_loc varchar2(30));\n```\n\n删除 MV，但指定要保留底层表：\n\n```sql\nSQL> drop materialized\
  \ view inv_mv preserve table;\n```\n\n现在，修改底层表：\n\n```sql\nSQL> alter table inv_mv\
  \ add(inv_loc varchar2(30));\n```\n\n接下来，使用`ON PREBUILT TABLE`子句创建 MV：\n\n```sql\n\
  create materialized view inv_mv\non prebuilt table\nusing index tablespace mv_index\n\
  as\n  select\n    inv_id\n    ,inv_desc\n    ,inv_loc\n  from inv;\n```\n\n这允许你重新定义\
  \ MV 而无需删除和完全刷新数据。请注意，如果在 MV 重建操作期间有任何针对基表的数据操作语言（DML）活动，那么当你尝试刷新 MV 时，这些事务不会反映在\
  \ MV 中。在数据仓库环境中，你通常有已知的加载基表的时间表，因此应该能够在维护窗口期间安排 MV 更改，此时基表中没有事务发生。\n\n### 修改在预构建表上创建的物化视图\n\
  \n如果你最初使用`ON PREBUILT TABLE`子句创建了 MV，则可以执行类似于上一节中保留底层表时所示的操作。以下是修改使用`ON PREBUILT\
  \ TABLE`子句创建的 MV 的步骤：\n1.  修改基表。\n2.  删除 MV。对于在预构建表上构建的 MV，这不会删除底层表。\n3.  修改预构建表。\n\
  4.  在预构建表上重新创建 MV。\n\n以下是一个简单示例来说明此过程。为清晰起见，显示了表和 MV 的原始定义。这是基表定义：\n\n```sql\ncreate\
  \ table inv(\n  inv_id number primary key\n  ,inv_desc varchar2(30));\n```\n\n要在预构建表上创建\
  \ MV，必须首先创建一个表：\n\n```sql\ncreate table inv_mv (\n  inv_id number\n  ,inv_desc varchar2(30));\n\
  ```\n\n这是一个简单 MV 的定义，该 MV 使用预构建表并使用`INV`作为基表：\n\n```sql\ncreate materialized view\
  \ inv_mv\non prebuilt table\nusing index tablespace mv_index\nas\n  select\n   \
  \ inv_id\n    ,inv_desc\n  from inv;\n```\n\n假设你如下修改基表：\n\n```sql\nSQL> alter table\
  \ inv add (inv_loc varchar2(30));\n```\n\n第 15 章 ■ 物化视图\n\n删除 MV：\n\n```sql\nSQL>\
  \ drop materialized view inv_mv;\n```\n\n对于在预构建表上创建的 MV，这不会删除底层表——只删除 MV 对象。接下来，向预构建表添加一列：\n\
  \n```sql\nSQL> alter table inv_mv add(inv_loc varchar2(30));\n```\n\n现在你可以使用添加了新`INV_LOC`列的预构建表重建\
  \ MV：\n\n```sql\ncreate materialized view inv_mv\non prebuilt table\nusing index\
  \ tablespace mv_index\nas\n  select\n    inv_id\n    ,inv_desc\n    ,inv_loc\n \
  \ from inv;\n```\n\n此过程的优点是允许你修改 MV 定义而无需删除底层表。你必须删除 MV，修改底层表，然后使用新定义重新创建 MV。如果底层表包含大量数据，此方法可以防止不必要的停机时间。\n\
  \n如前一节所述，你需要注意，如果在 MV 重建操作期间有任何针对基表的 DML 活动，那么当你尝试刷新 MV 时，这些事务不会反映在 MV 中。\n\n###\
  \ 切换物化视图上的重做日志记录\n\n回想一下，MV 有一个底层数据库表。当你刷新 MV 时，这会在底层表中启动事务，从而生成重做（就像普通数据库表一样）。如果发生数据库故障，你可以恢复和恢复与\
  \ MV 关联的所有事务。\n\n默认情况下，创建 MV 时启用重做日志记录。你可以选择指定在刷新 MV 时不记录重做。要启用无日志记录，请使用`NOLOGGING`选项创建\
  \ MV：\n\n```sql\ncreate materialized view inv_mv\nnologging\ntablespace mv_data\n\
  using index tablespace mv_index\nas\n  select\n    inv_id\n    ,inv_desc\n  from\
  \ inv;\n```\n\n你也可以将现有 MV 更改为无日志模式：\n\n```sql\nSQL> alter materialized view inv_mv\
  \ nologging;\n```\n\n如果你想重新启用日志记录，则执行以下操作：\n\n```sql\nSQL> alter materialized view\
  \ inv_mv logging;\n```\n\n要验证 MV 已切换到`NOLOGGING`，请查询`USER_TABLES`视图：\n\n第 15 章 ■\
  \ 物化视图\n\n```sql\nselect\n  a.table_name\n  ,a.logging\nfrom user_tables a\n,user_mviews\
  \ b\nwhere a.table_name = b.mview_name;\n```\n\n启用无日志记录的优势在于，刷新速度更快，因为数据库没有记录重做信息的开销。最大的缺点是，如果在刷新\
  \ MV 后不久发生媒体故障，则无法恢复 MV 中的数据。在此场景中，首次尝试访问 MV 时，你会收到如下错误：\n\n```\nORA-01578: ORACLE\
  \ data block corrupted (file # 32, block # 131)\nORA-01110: data file 32: '/ora01/dbfile/O11R2/mvdata01.dbf'\n\
  ORA-26040: Data block was loaded using the NOLOGGING option\n```\n\n如果收到前面的错误，那么你很可能必须完全刷新\
  \ MV 才能再次访问数据。在许多环境中，这可能是可以接受的。你通过不为 MV 生成重做来节省数据库资源，但缺点是恢复过程更长（在发生故障时），需要你完全刷新\
  \ MV。\n\n### 更改并行性\n\n有时创建 MV 时具有高度并行性以提高创建过程的性能。创建 MV 后，你可能不需要与底层表关联的相同并行度。你可以如下更改\
  \ MV 的并行性：\n\n```sql\nSQL> alter materialized view inv_mv parallel 1;\n```\n\n你可以通过查询`USER_TABLES`来检查并行度：\n\
  \n```sql\nSQL> select table_name, degree from user_tables where table_name= upper('&mv_name');\n\
  ```\n\n```\nTABLE_NAME                     DEGREE\n------------------------------\
  \ ------\nINV_MV                         1\n```\n\n### 移动物化视图\n\n随着操作系统环境条件的变化，你可能需要将\
  \ MV 从一个表空间移动到另一个表空间。在这些情况下，使用`ALTER MATERIALIZED VIEW...MOVE TABLESPACE`语句。此示例将与\
  \ MV 关联的表移动到不同的表空间：\n\n```sql\nSQL> alter materialized view inv_mv move tablespace\
  \ tbsp2;\n```\n\n如果存在与 MV 表关联的任何索引，则移动操作会使它们不可用。你可以检查索引的状态，如下所示：\n\n```sql\nselect\n\
  \  a.table_name\n  ,a.index_name\n  ,a.status\nfrom user_indexes a\n,user_mviews\
  \ b\nwhere a.table_name = b.mview_name;\n```\n\n第 15 章 ■ 物化视图\n\n移动表后必须重建任何关联的索引。例如：\n\
  \n```sql\nSQL> alter index inv_mv_pk1 rebuild;\n```\n\n## 管理物化视图日志\n\n快速刷新 MV 需要\
  \ MV 日志。MV 日志是一个表，用于存储主（基）表的 DML 信息。它与主表在同一数据库中创建，并由拥有主表的同一用户拥有。你需要`CREATE TABLE`特权来创建\
  \ MV 日志。\n\nMV 日志由 Oracle 内部触发器填充（你无法控制此触发器）。在主表上执行`INSERT`、`UPDATE`或`DELETE`后，此内部触发器将一行插入\
  \ MV 日志。你可以通过查询`DBA/ALL/USER_INTERNAL_TRIGGERS`来查看正在使用的内部触发器。\n\n一个 MV 日志仅与一个表关联，并且每个主表只能定义一个\
  \ MV 日志。你可以在表上或另一个 MV 上创建 MV 日志。多个可快速刷新的 MV 可以使用一个 MV 日志。\n\nMV 执行快速刷新后，MV 日志中不再需要的任何记录将被删除。如果多个\
  \ MV 使用一个 MV 日志，则仅当任何可快速刷新的 MV 不再需要这些记录时，才会从 MV 日志中清除它们。\n\n表 15–3 描述了与 MV 日志一起使用的术语。这些术语将在本章后面与\
  \ MV 日志相关的章节中引用。\n\n***表 15–3.** 物化视图日志术语和功能*\n\n| **MV 日志术语** | **描述** |\n| :---\
  \ | :--- |\n| 物化视图日志 | 跟踪 MV 基表上 DML 更改的数据库对象。快速刷新需要 MV 日志。 |\n| 主键 MV 日志 | 使用基表主键跟踪\
  \ DML 更改的 MV 日志。 |\n| ROWID MV 日志 | 使用基表`ROWID`跟踪 DML 更改的 MV 日志。 |\n| 提交 SCN MV\
  \ 日志 | 基于提交系统更改号（`SCN`）而不是时间戳的 MV 日志。在 Oracle 数据库 11*g* R2 或更高版本中可用。 |\n| 对象 ID\
  \ | 用于跟踪 DML 更改的对象标识符。 |\n| 过滤列 | MV 子查询中引用的非主键列。某些快速刷新场景需要。 |\n| 连接列 | 在子查询`WHERE`子句中定义连接的非主键列。某些快速刷新场景需要。\
  \ |\n| 序列 | 某些快速刷新场景所需的序列值。 |\n| 新值 | 指定在 MV 日志中记录旧值和新值。单表聚合视图符合快速刷新条件需要。 |\n\n\
  第 15 章 ■ 物化视图\n\n### 创建物化视图日志\n\n可快速刷新视图需要在主（基）表上创建 MV 日志。使用`CREATE MATERIALIZED\
  \ VIEW LOG`命令创建 MV 日志。此示例在`USERS`表上创建 MV 日志，指定应使用主键来标识 MV 日志中的行：\n\n```sql\nSQL>\
  \ create materialized view log on users with primary key;\n```\n\n你还可以指定存储信息，例如表空间名称：\n\
  \n```sql\ncreate materialized view log\non users\npctfree 5\ntablespace mv_data\n\
  with primary key;\n```\n\n当你在表上创建 MV 日志时，Oracle 会创建一个表来存储自上次刷新以来基表的更改。MV 日志表的名称遵循以下格式：`MLOG$_<主表名>`。你可以使用\
  \ SQL*Plus `DESCRIBE`语句查看 MV 日志的列：\n\n```sql\nSQL> desc mlog$_users;\n```\n\n```\n\
  Name                                      Null?    Type\n-----------------------------------------\
  \ -------- ----------------------------\nUSER_ID                               \
  \    NOT NULL NUMBER\nSNAPTIME$$                                         DATE\n\
  DMLTYPE$$                                          VARCHAR2(1)\nOLD_NEW$$      \
  \                                    VARCHAR2(1)\nCHANGE_VECTOR$$              \
  \                      RAW(255)\nXID$$                                         \
  \     NUMBER\n```\n\n你可以查询此底层`MLOG$`表以确定自上次刷新以来的事务数。每次刷新后，MV 日志表都会被清除。如果多个 MV 使用\
  \ MV 日志，则直到所有依赖的 MV 都被刷新后，日志表才会被清除。\n\n如果在具有主键的表上创建 MV 日志，则还会创建一个`RUPD$_<主表名>`表。此表用于可更新\
  \ MV。如果你不使用可更新 MV 功能，则此表永远不会被使用，你可以忽略它。\n\n创建 MV 日志时，可以指定它使用`PRIMARY KEY`、`ROWID`或`OBJECT\
  \ ID`来唯一标识 MV 日志表中的行。如果主表有主键，则在创建 MV 日志时使用`WITH PRIMARY KEY`。如果主表没有主键，则必须使用`WITH\
  \ ROWID`来指定使用`ROWID`值唯一标识 MV 日志记录。在对象表上创建 MV 日志时，可以使用`WITH OBJECT ID`。\n\n对于 Oracle\
  \ 数据库 11*g*第 2 版之前的数据库版本，MV 日志表将包含一个`SNAPTIME$$`时间列。此列用于确定需要应用到任何依赖 MV 的记录。\n\n\
  从 Oracle 数据库 11*g*第 2 版开始，你可以选择创建基于`COMMIT SCN`的 MV 日志。这种类型的 MV 日志使用事务的`SCN`来确定需要应用到任何依赖\
  \ MV 的记录。基于`COMMIT SCN`的 MV 日志比基于时间戳的 MV 日志更高效。如果你使用的是 Oracle 数据库 11*g*第 2 版或更高版本，则应考虑使用基于`COMMIT\
  \ SCN`的 MV 日志。使用`WITH COMMIT SCN`子句创建基于`SCN`的 MV 日志：\n\n```sql\nSQL> create materialized\
  \ view log on inv tablespace users with commit scn;\n```\n\n第 15 章 ■ 物化视图\n\n你可以通过查询`USER_MVIEW_LOGS`来查看\
  \ MV 日志是否基于`SCN`：\n\n```sql\nselect\n  log_table\n  ,commit_scn_based\nfrom user_mview_logs;\n\
  ```\n\n### 索引物化视图日志列\n\n有时你可能需要从快速刷新 MV 获得更好的性能。一种方法是通过 MV 日志表列上的索引。特别是，考虑对主键列和`SNAPTIME$$`列进行索引。Oracle\
  \ 在刷新 MV 或清除 MV 日志时可能在`WHERE`子句中使用两列。以下是创建 MV 日志列索引的示例：\n\n```sql\nSQL> create index\
  \ mlog$_inv_idx1 on mlog$_inv(snaptime$$) tablespace mv_index;\nSQL> create index\
  \ mlog$_inv_idx2 on mlog$_inv(inv_id) tablespace mv_index;\n```\n\n你不应该仅仅因为你认为可能是个好主意而添加索引。仅当你已知快速刷新存在性能问题时才在\
  \ MV 日志表上添加索引。请记住，添加索引会消耗数据库中的资源。Oracle 必须为表上的 DML 操作维护索引，并且索引会消耗磁盘空间。索引不是性能问题的免费灵丹妙药；它们带来了一些成本，因此你应该谨慎使用它们。\n\
  \n### 查看物化视图日志使用的空间\n\n你应考虑定期检查 MV 日志消耗的空间。如果消耗的空间在增长（并且从不缩小），你可能遇到了 MV 未成功刷新的问题（从而导致\
  \ MV 日志从未被清除）。以下是一个检查 MV 日志空间的查询：\n\n```sql\nselect\n  segment_name\n  ,tablespace_name\n\
  \  ,bytes/1024/1024 meg_bytes\n  ,extents\nfrom dba_segments\nwhere segment_name\
  \ like 'MLOG$%'\norder by meg_bytes;\n```\n\n以下是一些示例输出：\n\n```\nSEGMENT_NAME   \
  \            TABLESPACE_NAME   MEG_BYTES   EXTENTS\n-------------------------- ---------------------------\
  \ ----------\nMLOG$_USER_ROLES_ASSOC     MV_DATA                   24.00       \
  \  48\nMLOG$_ASSET_GEO_LOCATIONS  MV_DATA                   60.50        121\nMLOG$_USERS\
  \                MV_DATA                   88.50        177\nMLOG$_REGISTRATIONS\
  \        MV_DATA                  465.00        930\n```\n\n此输出表明几个 MV 日志很可能存在清除问题。`MLOG$_REGISTRATIONS`段消耗了近\
  \ 500MB 的空间。在此情况下，可能有多个 MV 正在使用该 MV 日志，并且其中一个 MV 未按日常刷新，从而阻止了日志被清除。\n\n你可能会遇到 MV\
  \ 日志很长时间未被清除的情况。这可能是因为你有多个 MV 使用同一个 MV 日志，并且其中一个 MV 不再成功刷新。当 DBA 构建开发环境并将 392 个开发\
  \ MV 连接到生产环境时（不应该发生，但确实会发生），可能会发生这种情况。\n\n第 15 章 ■ 物化视图\n\n在之后的某个时间点，DBA 删除了开发数据库。生产环境仍然有关于远程开发\
  \ MV 的信息，并且由于它认为需要日志数据来刷新快速刷新 MV，因此不会清除 MV 日志记录。\n\n在这些情况下，你应该确定哪些 MV 正在使用该日志（请参阅“确定有多少\
  \ MV 引用中央 MV 日志”部分）并解决任何问题。问题解决后，检查日志使用的空间，看看是否可以缩小（请参阅下一节）。\n\n### 缩小物化视图日志中的空间\n\
  \n如果 MV 日志未成功删除记录，这会导致它增长到很大尺寸。解决问题并从 MV 日志中删除记录后，你可以将 MV 日志表的高水位线设置为较高值。但这样做可能会导致性能问题，并且还会不必要地消耗磁盘空间。\n\
  \n在这种情况下，考虑缩小 MV 日志使用的空间。\n\n在此示例中，`MLOG$_REGISTRATIONS`由于关联的 MV 未成功刷新而存在问题，导致无法清除记录。该\
  \ MV 日志随后增长到很大尺寸。问题已被识别并解决，现在需要减少日志的空间。要缩小 MV 日志中的空间，首先在相应的 MV 日志`MLOG$`表上启用行移动：\n\
  \n```sql\nSQL> alter table mlog$_registrations enable row movement;\n```\n\n接下来，发出`ALTER\
  \ MATERIALIZED VIEW LOG ON...SHRINK`语句。请注意，`ON`关键字之后的表是主表名称（在此示例中为`REGISTRATIONS`表）：\n\
  \n```sql\nSQL> alter materialized view log on registrations shrink space;\n```\n\
  \n此语句可能需要很长时间，具体取决于它缩小的空间量。语句完成后，你可以禁用行移动：\n\n```sql\nSQL> alter table mlog$_registrations\
  \ disable row movement;\n```\n\n你可以通过查询`DBA_SEGMENTS`来验证空间是否已减少：\n\n```sql\nselect\n\
  \  segment_name\n  ,tablespace_name\n  ,bytes/1024/1024 meg_bytes\n  ,extents\n\
  from dba_segments\nwhere segment_name = 'MLOG$_REGISTRATIONS';\n```\n\n此段使用的空间相当小：\n\
  \n```\nSEGMENT_NAME               TABLESPACE_NAME   MEG_BYTES   EXTENTS\n--------------------------\
  \ --------------------------- ----------\nMLOG$_REGISTRATIONS        MV_DATA   \
  \                 .50          1\n```\n\n### 检查物化视图日志的行数\n\n如本章前面所述，有时 MV 刷新存在问题，这导致相应\
  \ MV 日志表中积累大量行。当多个 MV 使用一个 MV 日志，并且其中一个 MV 无法执行快速刷新时，有时会发生这种情况。在此情况下，MV 日志会继续增长，直到问题解决。\n\
  \n第 15 章 ■ 物化视图\n\n检测 MV 日志是否未被清除的一种方法是定期检查 MV 日志表的行数。以下查询使用 SQL 生成 SQL，该脚本检查当前连接用户拥有的\
  \ MV 日志表的行数：\n\n```sql\nset head off pages 0 lines 132 trimspool on\nspo mvcount_dyn.sql\n\
  select 'select count(*) || ' || '''' || ': ' || table_name || ''''\n|| ' from '\
  \ || table_name || ';'\nfrom user_tables\nwhere table_name like 'MLOG%';\nspo off;\n\
  ```\n\n此脚本生成一个名为`mvcount_dyn.sql`的脚本，其中包含从`MLOG$`表中选择行数的 SQL 语句。检查行数时，你必须对你的应用程序有所了解，并知道正常的行数是多少。以下是前面脚本生成的一些示例代码：\n\
  \n```sql\nselect count(*) || ': MLOG$_PRODUCT_TAXONOMY' from MLOG$_PRODUCT_TAXONOMY;\n\
  select count(*) || ': MLOG$_REGISTRATIONS' from MLOG$_REGISTRATIONS;\nselect count(*)\
  \ || ': MLOG$_ROLES' from MLOG$_ROLES;\n```\n\n### 移动物化视图日志\n\n你可能需要移动 MV 日志，因为初始创建脚本未指定正确的表空间。常见的情况是未指定表空间，并且\
  \ MV 日志默认放置在`USERS`等表空间中。你可以通过以下查询验证表空间信息：\n\n```sql\nselect\n  table_name\n  ,tablespace_name\n\
  from user_tables\nwhere table_name like 'MLOG%';\n```\n\n如果需要重新定位任何 MV 日志表，请使用`ALTER\
  \ MATERIALIZED VIEW LOG ON <table_name> MOVE`语句。请注意，你指定在其上创建 MV 的主表的名称（而不是底层`MLOG$`表）：\n\
  \n```sql\nSQL> alter materialized view log on inv move tablespace tbsp2;\n```\n\n\
  另外请记住，移动表时，任何关联的索引都会变得不可用（因为表中每条记录的`ROWID`刚刚更改）。你可以检查索引的状态，如下所示：\n\n```sql\nselect\n\
  \  a.table_name\n  ,a.index_name\n  ,a.status\nfrom user_indexes a\n,user_mview_logs\
  \ b\nwhere a.table_name = b.log_table;\n```\n\n任何不可用的索引都必须重建。以下是重建索引的示例：\n\n```sql\n\
  SQL> alter index mlog$_inv_idx1 rebuild;\n```\n\n第 15 章 ■ 物化视图\n\n### 删除物化视图日志\n\
  \n你可能想要删除 MV 日志的原因有几个：\n\n- 你最初创建了 MV 日志，但需求已更改，你不再需要它。\n- MV 日志增长很大并导致性能问题，你想删除它以重置大小。\n\
  \n删除 MV 日志之前，你可以通过以下查询验证所有者、主表和 MV 日志表：\n\n```sql\nselect\n  log_owner\n  ,master\
  \ -- master table\n  ,log_table\nfrom user_mview_logs;\n```\n\n使用`DROP MATERIALIZED\
  \ VIEW LOG ON`语句删除 MV 日志。你不需要知道 MV 日志的名称，但你需要知道在其上创建日志的主表的名称。此示例删除`INV`表上的 MV 日志：\n\
  \n```sql\nSQL> drop materialized view log on inv;\n```\n\n你应该看到以下消息（如果成功）：\n\n```\n\
  Materialized view log dropped.\n```\n\n如果你有权限，并且你不拥有在其上创建 MV 日志的表，则可以在删除物化视图日志时指定模式名称：\n\
  \n```sql\nSQL> drop materialized view log on <schema>.<table>;\n```\n\n如果你正在清理环境并希望删除与用户关联的所有\
  \ MV 日志，则使用 SQL 生成 SQL 来完成此操作。以下脚本创建删除当前连接用户拥有的所有 MV 日志所需的 SQL：\n\n```sql\nset lines\
  \ 132 pages 0 head off trimspool on\nspo drop_dyn.sql\nselect 'drop materialized\
  \ view log on ' || master || ';'\nfrom user_mview_logs;\nspo off;\n```\n\n前面的 SQL*Plus\
  \ 代码创建一个名为`drop_dyn.sql`的脚本，其中包含可用于为用户删除所有 MV 日志的 SQL 语句。\n\n## 刷新物化视图\n\n通常，你定期刷新\
  \ MV。你可以手动刷新 MV，也可以将此任务自动化。以下部分涵盖了这些相关主题：\n\n- 从 SQL*Plus 手动刷新 MV\n- 使用 Shell 脚本和调度实用程序自动刷新\n\
  - 使用内置 Oracle 作业调度器自动刷新\n\n![](img/index-430_1.png)\n\n第 15 章 ■ 物化视图\n\n如果你有对相对静态数据操作的长时间运行的查询，结果缓存可以显著提高性能。MV\
  \ 更适合复制数据和存储复杂查询的结果，这些查询只需要定期（例如每天、每周或每月）获取新结果。\n\n### 使用 Shell 脚本和调度实用程序自动刷新\n\n\
  许多 MV 必须每天刷新。为了实现这一点，你可以使用 Linux/Unix 实用程序（如`cron`）调用 Shell 脚本来刷新 MV。这种方法\n\n- 易于实施和维护\n\
  - 易于创建每日日志文件以供审核\n- 当作业出现问题或数据库不可用时发送电子邮件\n\n以下是一个包含刷新 MV 逻辑的 Shell 脚本示例：\n\n```bash\n\
  #!/bin/bash\nif [ $# -ne 1 ]; then\n  echo \"Usage: $0 SID\"\n  exit 1\nfi\n#\n\
  HOSTNAME=`uname -a | awk '{print$2}'`\nMAILX='/bin/mailx'\nMAIL_LIST='lellison@oracle.com'\n\
  ORACLE_SID=$1\njobname=CWP\n```\n\n\n\n"
- '# 详见第 2 章关于使用类似`oraset`的工具来设置操作系统变量



  '
- "# 第 15 章 ■ 物化视图\n\n## 源 Oracle OS 变量\n\n`. /var/opt/oracle/oraset $ORACLE_SID`\n\
  \n`date`\n\n`sqlplus -s <<EOF`\n\n`rep_mv2/foobar`\n\n`WHENEVER SQLERROR EXIT FAILURE`\n\
  \n`exec dbms_mview.refresh('CWP_COUNTRY_INFO','C');`\n\n`EOF`\n\n```bash\nif [ $?\
  \ -ne 0 ]; then\n    echo \"not okay\"\n    $MAILX -s \"Problem with MV refresh\
  \ on $HOSTNAME $jobname\" $MAIL_LIST <<EOF\n    $HOSTNAME $jobname MVs not okay.\n\
  \    EOF\nelse\n    echo \"okay\"\n    $MAILX -s \"MV refresh OK on $HOSTNAME $jobname\"\
  \ $MAIL_LIST <<EOF\n    $HOSTNAME $jobname MVs okay.\n    EOF\nfi\n```\n\n`date`\n\
  \n`exit 0`\n\n对于这个特定的物化视图刷新作业，以下是调用它的对应 cron 条目：\n\n```\n25 16 * * * /orahome/oracle/bin/mvref_cwp.bsh\
  \ DWREP 1>/orahome/oracle/bin/log/mvref_cwp.log 2>&1\n```\n\n此作业每天下午 4:25 运行。有关使用\
  \ cron 调度作业的详细信息，请参见 **第 21 章**。\n\n### 创建具有刷新间隔的物化视图\n\n在最初创建物化视图时，你可以选择指定 `START\
  \ WITH` 和 `NEXT` 子句，以指示 Oracle 设置一个内部数据库作业（通过 `DBMS_JOB` 包），来周期性地启动物化视图的刷新。如果省略\
  \ `START WITH` 和 `NEXT`，则不会设置作业，你必须使用其他技术（例如像 cron 这样的调度工具）。\n\n我几乎从不将 `START WITH`\
  \ 和 `NEXT` 指定为刷新机制。我强烈倾向于使用另一个调度工具，例如 cron。使用 cron 时，可以轻松创建一个详细记录作业运行情况以及是否存在任何问题的日志文件。此外，使用\
  \ cron 时，可以轻松地将日志文件通过电子邮件发送到分发列表，以便支持 DBA 了解任何问题。\n\n无论如何，理解 `START WITH` 和 `NEXT`\
  \ 的工作原理很重要，因为迟早你会发现自己身处一个 DBA 或开发人员倾向于使用 `DBMS_JOB` 包进行刷新的环境。当你在对刷新问题进行故障排除时，必须理解这种刷新机制的工作原理。\n\
  \n`START WITH` 参数指定你希望物化视图首次刷新发生的日期。`NEXT` 参数指定一个日期表达式，Oracle 用它来计算刷新之间的时间间隔。\n\n\
  例如，这个物化视图在将来一分钟（`sysdate+1/1440`）进行初始刷新，随后每天刷新一次（`sysdate+1`）：\n\n```sql\ncreate\
  \ materialized view inv_mv\nrefresh\n    start with sysdate+1/1440\n    next sysdate+1\n\
  as\nselect\n    inv_id\n    ,inv_desc\nfrom inv;\n```\n\n你可以通过查询 `USER_JOBS` 来查看计划作业的详细信息：\n\
  \n```sql\nselect\n    job\n    ,schema_user\n    ,to_char(last_date,'dd-mon-yyyy\
  \ hh24:mi:ss') last_date\n    ,to_char(next_date,'dd-mon-yyyy hh24:mi:ss') next_date\n\
  \    ,interval\n    ,broken\nfrom user_jobs;\n```\n\n以下是一些示例输出：\n\n```\nJOB SCHEMA_USE\
  \ LAST_DATE             NEXT_DATE            INTERVAL       B\n------ ----------\
  \ -------------------- -------------------- --------------- -\n50    INV       \
  \ 21-oct-2010 15:30:28                     sysdate+1       N\n```\n\n你也可以在 `USER_REFRESH`\
  \ 视图中查看作业信息：\n\n```sql\nselect\n    rowner\n    ,rname\n    ,job\n    ,to_char(next_date,'dd-mon-yyyy\
  \ hh24:mi:ss')\n    ,interval\n    ,broken\nfrom user_refresh;\n```\n\n以下是一些示例输出：\n\
  \n```\nROWNER      RNAME      JOB TO_CHAR(NEXT_DATE,'DD-MON- INTERVAL       B\n\
  ----------- ---------- --- -------------------------- --------------- -\nINV   \
  \      INV_MV     50  22-oct-2010 15:30:29       sysdate+1       N\n```\n\n当你删除一个物化视图时，关联的作业也会被移除。如果你想手动移除一个作业，请使用\
  \ `DBMS_JOB` 的 `REMOVE` 过程。此示例移除作业编号 32（该编号是从之前的查询中识别出来的）：\n\n```sql\nSQL> exec\
  \ dbms_job.remove(32);\n```\n\n`注意` 你不能在 `ON COMMIT` 刷新的物化视图中结合使用 `START WITH` 或\
  \ `NEXT`。\n\n### 高效执行完全刷新\n\n当物化视图执行完全刷新时，默认行为是使用 `DELETE` 语句从物化视图表中删除所有记录。删除完成后，从主表中选择记录并插入到物化视图表中。删除和插入作为单个事务完成；这意味着在完全刷新过程中从物化视图进行选择的任何用户看到的数据，都是\
  \ `DELETE` 语句执行前的状态。任何在 `INSERT` 提交后立即访问物化视图的用户，看到的都是数据的最新视图。\n\n在某些场景下，你可能希望修改此行为。如果要刷新大量数据，`DELETE`\
  \ 语句可能需要很长时间。你可以选择通过 `ATOMIC_REFRESH` 参数指示 Oracle 尽可能高效地执行数据移除。当此参数设置为 `FALSE` 时，它允许\
  \ Oracle 在执行完全刷新时使用 `TRUNCATE` 语句代替 `DELETE`：\n\n```sql\nSQL> exec dbms_mview.refresh('INV_MV',method=>'C',atomic_refresh=>false);\n\
  ```\n\n对于大型数据集，`TRUNCATE` 比 `DELETE` 运行更快，因为 `TRUNCATE` 没有生成重做日志的开销。使用 `TRUNCATE`\
  \ 语句的缺点是，在刷新进行期间，从物化视图查询的用户可能会看到零行数据。\n\n### 处理 ORA-12034 错误\n\n当你尝试对物化视图执行快速刷新时，有时可能会收到\
  \ `ORA-12034` 错误。例如：\n\n```sql\nSQL> exec dbms_mview.refresh('PRODUCTLINEITEM','F');\n\
  ```\n\n该语句随后会抛出此错误消息：\n\n```\nBEGIN dbms_mview.refresh('PRODUCTLINEITEM','F'); END;\n\
  *\nERROR at line 1:\nORA-12034: materialized view log on \"CDS_PROD_ES2_LIVE\".\"\
  PRODUCTLINEITEM\"\nyounger than last refresh\n```\n\n要解决此错误，请尝试完全刷新物化视图：\n\n```sql\n\
  SQL> exec dbms_mview.refresh('PRODUCTLINEITEM','C');\n```\n\n完全刷新完成后，你应该能够执行快速刷新而不会收到错误：\n\
  \n```sql\nSQL> exec dbms_mview.refresh('PRODUCTLINEITEM','F');\n```\n\n当 Oracle\
  \ 确定物化视图日志是在关联物化视图的上次刷新之后创建的时，就会抛出 `ORA-12034` 错误。换句话说，物化视图日志比物化视图的上次刷新更“年轻”。有几种可能的原因：\n\
  *   物化视图日志被删除并重新创建。\n*   物化视图日志被清除。\n*   主表被重组。\n*   主表被截断。\n*   上次刷新失败。\n\n在这种情况下，Oracle\
  \ 知道在物化视图的上次刷新时间和物化视图日志创建时间之间可能产生了事务。在此场景中，你必须首先执行一次完全刷新，然后才能开始使用快速刷新机制。\n\n## 监控物化视图刷新\n\
  \n本节包含一些非常实用的示例，说明如何监控物化视图刷新作业。示例包括如何查看上次刷新时间、确定作业是否正在执行、确定刷新作业的进度，以及检查物化视图在过去一天内是否未刷新。像这样的脚本对于故障排除和诊断刷新问题非常宝贵。\n\
  \n### 查看物化视图的上次刷新时间\n\n在对物化视图进行故障排除时，通常首先要检查 `DBA/ALL/USER_MVIEWS` 中的 `LAST_REFRESH_DATE`。查看此信息可以确定物化视图是否按计划刷新。以物化视图所有者的身份运行此查询，以显示上次刷新日期：\n\
  \n```sql\nselect\n    mview_name\n    ,to_char(last_refresh_date,'dd-mon-yy hh24:mi:ss')\n\
  \    ,refresh_mode\n    ,refresh_method\nfrom user_mviews\norder by 2;\n```\n\n\
  以下是一些示例输出：\n\n```\nMVIEW_NAME                  TO_CHAR(LAST_REFRESH_DAT REFRES REFRESH_\n\
  ---------------------------- ------------------------ ------ --------\nGEM_COMPANY_MV\
  \              29-jul-10 06:18:58       DEMAND COMPLETE\nTOP_REG_DAILY         \
  \      29-jul-10 06:57:33       DEMAND FORCE\n```\n\n`DBA/ALL/USER_MVIEWS` 的 `LAST_REFRESH_DATE`\
  \ 列显示物化视图上次成功完成刷新的日期和时间。如果物化视图从未成功刷新过，则 `LAST_REFRESH_DATE` 为 `NULL`。\n\n### 确定刷新是否正在进行中\n\
  \n如果你需要知道哪些物化视图正在运行，请使用此查询：\n\n```sql\nselect\n    sid\n    ,serial#\n    ,currmvowner\n\
  \    ,currmvname\nfrom v$mvrefresh;\n```\n\n以下是一些示例输出：\n\n```\nSID    SERIAL#  CURRMVOWNER\
  \          CURRMVNAME\n------ -------- -------------------- ------------------------------\n\
  1034   47872    REP_MV               USERS_MV\n```\n\n### 监控实时刷新进度\n\n如果你处理大型物化视图，下一个查询将向你显示刷新操作的实时进度。在进行故障排除时，此查询非常有用。以内部\
  \ `SYS` 表的权限用户身份运行以下命令：\n\n```sql\ncolumn \"MVIEW BEING REFRESHED\" format a25\n\
  column inserts format 9999999\ncolumn updates format 9999999\ncolumn deletes format\
  \ 9999999\n--\nselect\n    currmvowner_knstmvr || '.' || currmvname_knstmvr \"MVIEW\
  \ BEING REFRESHED\",\n    decode(reftype_knstmvr, 1, 'FAST', 2, 'COMPLETE', 'UNKNOWN')\
  \ reftype,\n    decode(groupstate_knstmvr, 1, 'SETUP', 2, 'INSTANTIATE',\n     \
  \      3, 'WRAPUP', 'UNKNOWN' ) STATE,\n    total_inserts_knstmvr inserts,\n   \
  \ total_updates_knstmvr updates,\n    total_deletes_knstmvr deletes\nfrom x$knstmvr\
  \ x\nwhere type_knst = 6\nand exists (select 1\n            from v$session s\n \
  \           where s.sid=x.sid_knst\n            and s.serial#=x.serial_knst);\n\
  ```\n\n当物化视图首次开始刷新时，你会看到此输出：\n\n```\nMVIEW BEING REFRESHED   REFTYPE  STATE    \
  \  INSERTS   UPDATES   DELETES\n------------------------- -------- ----------- ---------\
  \ --------- ---------\nREP_MV.USERS_MV         UNKNOWN  SETUP             0    \
  \     0         0\n```\n\n几秒钟后，物化视图进入 `INSTANTIATE` 状态：\n\n```\nREP_MV.USERS_MV\
  \         FAST     INSTANTIATE       0         0         0\n```\n\n随着物化视图的刷新，`INSERTS`、`UPDATES`\
  \ 和 `DELETES` 列会相应更新：\n\n```\nREP_MV.USERS_MV         FAST     INSTANTIATE     860\
  \       274         0\n```\n\n当物化视图几乎完成刷新时，它会进入 `WRAPUP` 状态：\n\n```\nREP_MV.USERS_MV\
  \         FAST     WRAPUP         5284      1518         0\n```\n\n物化视图完成刷新后，查询将返回无行：\n\
  \n```\nno rows selected\n```\n\n正如你可以想象的那样，此查询对于故障排除和诊断物化视图刷新问题非常有用。\n\n### 检查物化视图是否在时间周期内刷新\n\
  \n在处理物化视图时，如果能有某种自动化方式来确定是否发生刷新，那会很方便。使用以下 shell 脚本来检测哪些物化视图在过去一天内未刷新，然后如果检测到任何此类情况，就发送电子邮件：\n\
  \n```bash\n#!/bin/bash\n```\n\n详见第 2 章，了解如何使用类似`oraset`的工具来加载操作系统变量。\n\n\n"
- '# 源 Oracle 操作系统变量


  ```bash

  . /var/opt/oracle/oraset $1

  ```


  ```bash

  crit_var=$(sqlplus -s <<EOF

  rep_mv/jc00le

  SET HEAD OFF FEED OFF

  SELECT count(*) FROM user_mviews

  WHERE sysdate-last_refresh_date > 1;

  EOF)

  ```


  ```bash

  if [ $crit_var -ne 0 ]; then

  echo $crit_var

  echo "mv_ref refresh problem with $1" | mailx -s "mv_ref problem" \

  dkuhn@sun.com

  else

  echo $crit_var

  echo "MVs ok"

  fi

  ```


  ```bash

  exit 0

  ```


  ## 第 15 章 ■ 物化视图


  此脚本获取 SQL*Plus 语句的输出并将其返回给 shell 变量 `crit_var`。如果 `REP_MV` 用户的任何物化视图在过去一天内未刷新，则
  `crit_var` 变量的值不为零。如果 `crit_var` 不等于零，则会发送一封电子邮件，指出存在问题。


  ## 创建远程物化视图刷新


  您可以创建从远程表、物化视图和/或视图中选择数据的物化视图。这使您能够快速高效地复制数据。基于远程对象设置物化视图的步骤如下：


  1.  确保从复制数据库环境到主表所在的数据库存在 Oracle Net 连接。如果没有此连接，则无法使用物化视图进行复制。

  2.  获取对远程数据库中用户帐户的访问权限，该帐户应有权访问您要复制的远程表、物化视图或视图。

  3.  对于快速刷新，在主（基）表上创建物化视图日志。仅当您打算执行快速刷新时才需要这样做。

  4.  在复制数据库环境中创建一个指向主数据库的数据库链接。

  5.  在复制数据库环境中，通过步骤 4 创建的数据库链接访问远程主对象来创建物化视图。


  下面是一个简单示例。首先，确保可以从复制环境建立到主数据库的 Oracle Net 连接。您可以通过从复制数据库环境使用 SQL*Plus 连接到远程主数据库来验证连接并确保可以登录到主数据库。在将包含物化视图的数据库的命令提示符下，尝试连接到名为
  `ENGDEV`、位于 `XENGDB` 服务器上的主数据库中的用户 `REP_MV`：


  ```sql

  $sqlplus rep_mv/foo@''xengdb:1522/engdev''

  ```


  当连接到远程主数据库时，还要确保您有权访问基于其创建物化视图的表。在此示例中，远程主表的名称为 `INV`：


  ```sql

  SQL> select count(*) from inv;

  ```


  接下来，在将包含物化视图的数据库中创建一个数据库链接。该数据库链接指向远程主数据库中的用户：


  ```sql

  create database link engdev

  connect to rep_mv identified by foo

  using ''xengdb:1522/engdev'';

  ```


  现在，创建一个访问主 `INV` 表的物化视图：


  ```sql

  create materialized view inv_mv

  refresh complete on demand

  as

  select

  inv_id

  ,inv_desc

  from inv@engdev;

  ```


  ![](img/index-438_1.png)

  ![](img/index-439_1.png)

  ![](img/index-440_1.png)


  ## 第 15 章 ■ 物化视图


  以下是一些示例输出，显示了两个连接到一个物化视图日志的物化视图：


  ```

  MOWNER BASE_TABLE SNAPID SNAPTIME

  -------------------- ------------------------- ---------- ---------

  INV_MGMT CMP_GRP_ASSOC 651 05-AUG-10

  INV_MGMT CMP_GRP_ASSOC 541 02-JAN-08

  ```


  下一个查询显示有关所有已创建的、连接到物化视图日志的物化视图的信息。在主站点上运行此查询：


  ```sql

  select

  a.log_table

  ,a.log_owner

  ,b.master mast_tab

  ,c.owner mv_owner

  ,c.name mview_name

  ,c.mview_site

  ,c.mview_id

  from dba_mview_logs a

  ,dba_base_table_mviews b

  ,dba_registered_mviews c

  where b.mview_id = c.mview_id

  and b.owner = a.log_owner

  and b.master = a.master

  order by a.log_table;

  ```


  以下是示例输出：


  ```

  LOG_TABLE LOG_OWNE MAST_TAB MV_OWN MVIEW_NAME MVIEW_S MVIEW_ID

  ------------------- -------- ------------- ------ ---------------- ------- --------

  MLOG$_CMP_GRP_ASSOC INV_MGMT CMP_GRP_ASSOC REP_MV CMP_GRP_ASSOC_MV DWREP 651

  MLOG$_CMP_GRP_ASSOC INV_MGMT CMP_GRP_ASSOC TSTDEV CMP_GRP_ASSOC_MV ENGDEV 541

  ```


  当您删除远程物化视图时，它应该从主数据库中注销。然而，这并不总是发生。远程数据库可能被清除（也许是一个短期的开发数据库），而物化视图没有机会自行注销（通过 `DROP
  MATERIALIZED VIEW` 语句）。在这种情况下，物化视图日志不知道依赖的物化视图已不再可用，因此它会无限期地保留记录。


  要从包含物化视图日志的数据库中清除不需要的物化视图信息，请执行 `DBMS_MVIEW` 的 `PURGE_MVIEW_FROM_LOG` 过程。此示例传入要清除的物化视图的
  ID：


  ```sql

  SQL> exec dbms_mview.purge_mview_from_log(541);

  ```


  此语句应更新数据字典并从内部表 `SLOG$` 和 `DBA_REGISTERED_MVIEWS` 中删除信息。如果被清除的物化视图是与物化视图日志表关联的最旧物化视图，则相关的旧记录也会从物化视图日志中删除。


  如果远程物化视图不再可用但仍注册在物化视图日志表中，您可以在主站点手动注销它。使用 `DBMS_MVIEW` 包的 `UNREGISTER_MVIEW` 过程来注销远程物化视图。为此，您需要知道远程物化视图的所有者、名称和站点（可从本节前面查询的输出中获取）：


  ```sql

  SQL> exec dbms_mview.unregister_mview(''TSTDEV'',''CMP_GRP_ASSOC_MV'',''ENGDEV'');

  ```


  如果成功，先前的操作将从 `DBA_REGISTERED_MVIEWS` 中删除一条记录。


  ## 第 15 章 ■ 物化视图


  ## 在组中管理物化视图


  物化视图组是一个有用的功能，它使您能够在一致的事务点时间刷新一组物化视图。如果您刷新基于具有父/子关系的主表的物化视图，那么您很可能应该使用刷新组。此方法可确保您的刷新物化视图集中不会出现任何孤立的子记录。以下部分描述了如何创建和维护物化视图刷新组。


  ■ **注意** 您使用 `DBMS_REFRESH` 包来完成本节中的大多数任务。该包在 Oracle 高级复制管理 API 参考指南（可在 OTN 上获取）中有完整记录。


  ### 创建物化视图组


  您使用 `DBMS_REFRESH` 包的 `MAKE` 过程来创建物化视图组。创建物化视图组时，必须指定名称、组中物化视图的逗号分隔列表、下次刷新日期以及用于计算下次刷新时间的间隔。以下是一个包含两个物化视图的组的示例：


  ```sql

  begin

  dbms_refresh.make(

  name => ''INV_GROUP''

  ,list => ''INV_MV, REGION_MV''

  ,next_date => sysdate-100

  ,interval => ''sysdate+1''

  );

  end;

  /

  ```


  创建物化视图组时，Oracle 会自动创建一个数据库作业来管理组的刷新。您可以通过查询 `DBA/ALL/USER_REFRESH` 来查看物化视图组的详细信息：


  ```sql

  select

  rname

  ,job

  ,next_date

  ,interval

  from user_refresh;

  ```


  以下是示例输出：


  ```

  RNAME JOB NEXT_DATE INTERVAL

  ---------- --------- --------- ---------------

  INV_GROUP 34 26-APR-10 sysdate+1

  ```


  我很少使用内部数据库作业作为刷新机制。请注意，前面 SQL 中指定的 `NEXT_DATE` 值是 `sysdate-100`。这意味着只有当日期被设置为过去
  100 天时，数据库作业才会启动此作业。这样，作业调度器永远不会启动刷新。


  在大多数环境中，刷新需要在特定时间启动。在这些场景中，您使用 `cron` 作业或具有作业调度功能的类似实用程序。


  ## 第 15 章 ■ 物化视图


  ### 更改物化视图刷新组


  您可以更改刷新组的特性，例如刷新日期和/或间隔。如果您依赖数据库作业作为刷新机制，那么您可能偶尔需要调整刷新特性。使用 `DBMS_REFRESH` 包的 `CHANGE`
  函数来实现这一点。此示例更改了 `INTERVAL` 计算：


  ```sql

  SQL> exec dbms_refresh.change(name=>''CCIM_GROUP'',interval=>''SYSDATE+1'');

  ```


  同样，只有在使用内部数据库作业启动物化组刷新时才需要更改刷新间隔。您可以使用以下查询验证刷新组的间隔和作业信息的详细信息：


  ```sql

  select

  a.job

  ,a.broken

  ,b.rowner

  ,b.rname

  ,b.interval

  from dba_jobs a

  ,dba_refresh b

  where a.job = b.job

  order by a.job;

  ```


  此示例的输出如下：


  ```

  JOB B ROWNER RNAME INTERVAL

  ---------- - --------------- --------------- ------------

  104 N REP_MV CCIM_GROUP SYSDATE+1

  ```


  ### 刷新物化视图组


  创建组后，您可以使用 `DBMS_REFRESH` 包的 `REFRESH` 函数手动刷新它。此示例刷新您先前创建的组：


  ```sql

  SQL> exec dbms_refresh.refresh(''INV_GROUP'');

  ```


  如果您检查 `USER_MVIEWS` 的 `LAST_REFRESH_DATE` 列，您会注意到组中的所有物化视图都具有相同的刷新时间。这是预期行为，因为组中的物化视图都是在一致的事务点时间刷新的。


  ### DBMS_MVIEW 与 DBMS_REFRESH


  您可能已经注意到，您可以使用 `DBMS_MVIEW` 包来刷新一组物化视图。例如，您可以使用 `DBMS_MVIEW` 刷新列表中的一组物化视图，如下所示：


  ```sql

  SQL> exec dbms_mview.refresh(list=>''INV_MV,REGION_MV'');

  ```


  这将把列表中的每个物化视图作为单个事务进行刷新。这相当于使用物化视图组。


  但是，当您使用 `DBMS_MVIEW` 时，您可以选择将 `ATOMIC_REFRESH` 参数设置为 `TRUE`（默认值）或 `FALSE`。例如，这里
  `ATOMIC_REFRESH` 参数设置为 `FALSE`：


  ```sql

  SQL> exec dbms_mview.refresh(list=>''INV_MV,REGION_MV'',atomic_refresh=>false);

  ```


  409


  ## 第 15 章 ■ 物化视图


  将 `ATOMIC_REFRESH` 设置为 `FALSE` 会指示 `DBMS_MVIEW` 将列表中的每个物化视图作为单独的事务进行刷新。它还指示物化视图的完全刷新考虑使用
  `TRUNCATE` 语句。前面的代码行等效于以下两行：


  ```sql

  SQL> exec dbms_mview.refresh(list=>''INV_MV'', atomic_refresh=>false);

  SQL> exec dbms_mview.refresh(list=>''REGION_MV'', atomic_refresh=>false);

  ```


  将此与 `DBMS_REFRESH` 的行为进行比较，`DBMS_REFRESH` 是您应该用于设置和维护物化视图组的包。`DBMS_REFRESH` 包总是将一组物化视图作为一个一致的事务进行刷新。


  如果您总是需要将一组物化视图作为一个事务一致的组进行刷新，请使用 `DBMS_REFRESH`。如果您需要灵活性，决定是否将一组物化视图作为一个一致的事务进行刷新，请使用
  `DBMS_MVIEW`。


  ### 确定组中的物化视图


  当您调查物化视图刷新组的问题时，一个很好的起点是显示该组包含哪些物化视图。查询数据字典视图 `DBA_RGROUP` 和 `DBA_RCHILD` 以查看刷新组中的物化视图：


  ```sql

  select

  a.owner

  ,a.name mv_group

  ,b.name mv_name

  from dba_rgroup a

  ,dba_rchild b

  where a.refgroup = b.refgroup

  and a.owner = b.owner

  order by a.owner, a.name, b.name;

  ```


  以下是输出片段：


  ```

  OWNER MV_GROUP MV_NAME

  --------------- -------------------- --------------------

  DARL INV_GROUP INV_MV

  DARL INV_GROUP REGION_MV

  ```


  在 `DBA_RGROUP` 视图中，`NAME` 列表示刷新组的名称。`DBA_RCHILD` 视图包含刷新组中每个物化视图的名称。


  ### 向刷新组添加物化视图


  随着业务需求的变化，您偶尔需要向组中添加物化视图。使用 `DBMS_REFRESH` 包的 `ADD` 过程来完成此任务：


  ```sql

  SQL> exec dbms_refresh.add(name=>''INV_GROUP'',list=>''PRODUCTS_MV,USERS_MV'');

  ```


  您必须指定一个名称并提供要添加的物化视图名称的逗号分隔列表。新添加的物化视图将在下次组刷新时刷新。


  另一种将物化视图添加到组中的方法是删除该组并使用新的物化视图重新创建它。但是，通常更可取的方法是添加物化视图。


  ## 第 15 章 ■ 物化视图


  ### 从刷新组中移除物化视图


  有时您需要从组中移除物化视图。为此，请使用 `DBMS_REFRESH` 包的 `SUBTRACT` 函数。此示例从组中移除一个物化视图：


  ```sql

  SQL> exec dbms_refresh.subtract(name=>''INV_GROUP'',list=>''REGION_MV'');

  ```


  您必须指定物化视图组的名称，并提供一个包含要移除的物化视图名称的逗号分隔列表。


  另一种从组中移除物化视图的方法是删除该组并使用不需要的物化视图重新创建它。但是，通常更可取的方法是移除物化视图。


  ### 删除物化视图刷新组


  如果您需要删除物化视图刷新组，请使用 `DBMS_REFRESH` 包的 `DESTROY` 过程。此示例删除名为 `INV_GROUP` 的物化视图组：


  ```sql

  SQL> exec dbms_refresh.destroy(''INV_GROUP'');

  ```


  这仅删除物化视图刷新组对象——它不会删除任何实际的物化视图。如果您还需要删除物化视图，请使用 `DROP MATERIALIZED VIEW` 语句。


  ## 总结


  有时术语 *物化视图* 会让刚接触该技术的人感到困惑。也许 Oracle 本应将此功能命名为“定期清除并重新填充包含查询结果的表”，但那可能太长了。无论如何，当您了解了此工具的强大功能后，您就可以使用它来复制和聚合大量数据。通过定期计算和存储复杂数据聚合的结果，您可以大大提高查询性能。


  物化视图可以是*可快速刷新*的，这意味着它们仅复制自上次刷新以来主表中发生的更改。要使用这种类型的物化视图，您必须在主表上创建物化视图日志。并非总是可以创建物化视图日志；在这些场景中，物化视图必须完全刷新。


  如果需要，您还可以使用物化视图压缩和加密数据。这有助于更好的空间管理和安全性。此外，您可以对物化视图使用的底层表进行分区，以实现更好的可扩展性、性能和可用性。


  物化视图提供了一种高效的数据复制方法。在某些情况下，您需要复制整个数据库或仅复制某些数据库对象和部分数据。接下来的几章重点介绍 Data Pump，您可以使用它来卸载、传输和加载整个数据库或部分对象和数据。


  ![](img/index-447_1.png)


  ## 第 16 章 ■ 用户管理的备份与恢复


  讨论了热备份。您还将研究几种常见的恢复和还原场景。这些示例构建了您对 Oracle B&R 内部机制的基础知识。最后，本章介绍了 Oracle 的闪回技术以及它如何补充许多用户管理的恢复场景。


  ### 为非归档日志模式数据库实施冷备份策略


  您通过在数据库关闭后复制文件来执行用户管理的冷备份。这种类型的备份也称为脱机备份。进行冷备份时，您的数据库可以处于非归档日志模式或归档日志模式。


  出于某些原因，DBA 倾向于认为冷备份等同于对非归档日志模式数据库的备份。这是不正确的。您可以对归档日志模式数据库进行冷备份，这是许多机构采用的备份策略。以下各节详细介绍了数据库处于非归档日志模式与归档日志模式下进行冷备份的区别。


  #### 对非归档日志模式数据库进行冷备份


  对非归档日志模式数据库进行冷备份的一个主要原因是可以为您提供一种将数据库还原到过去某个时间点的方法。仅当您不需要恢复备份之后发生的事务时，才应使用此类型的备份。仅当您的业务要求允许数据丢失和停机时，这种类型的
  B&R 策略才是可接受的。您很少会对生产业务数据库实施这种类型的 B&R 解决方案。


  话虽如此，实施这种类型的备份有一些充分的理由。一个常见的用途是对开发/测试/培训数据库进行冷备份，并定期将数据库重置回基线。这为您提供了一种方式，可以使用数据库的相同时间点快照重新启动性能测试或培训课程。


  ■ **提示** 考虑使用“闪回数据库”功能将数据库设置回过去的某个时间点。本章后面将讨论闪回数据库。


  本节中的示例向您展示了如何备份数据库中的每个关键文件：所有控制文件、数据文件、临时数据文件和联机重做日志文件。使用这种类型的备份，您可以轻松地将数据库还原到进行备份的时间点。这种方法的主要优点是概念简单且易于实施。对非归档日志模式数据库进行冷备份所需的步骤如下：


  1.  确定将备份文件复制到何处以及需要多少空间。

  2.  确定要复制的数据库文件的位置和名称。

  3.  使用 `IMMEDIATE`、`TRANSACTIONAL` 或 `NORMAL` 子句关闭数据库。

  4.  将文件（在步骤 2 中识别）复制到备份位置（在步骤 1 中确定）。

  5.  重新启动数据库。


  ## 第 16 章 ■ 用户管理的备份与恢复


  以下各节详细阐述了这些步骤。


  ##### 步骤 1：确定将备份文件复制到何处以及需要多少空间


  理想情况下，备份位置应与您的实时数据文件位置位于不同的磁盘组上。但是，在许多机构中，您可能没有选择权，并且会被告知数据库要使用哪些挂载点。通常，底层子磁盘系统的设计不由您决定。


  在此示例中，备份位置是目录 `/oradump/cbackup/O11R2`。要大致了解存储备份副本所需的空间，您可以运行此查询：


  ```sql

  select sum(sum_bytes)/1024/1024 m_bytes

  from(

  select sum(bytes) sum_bytes from v$datafile

  union

  select sum(bytes) sum_bytes from v$tempfile

  union

  select (sum(bytes) * members) sum_bytes from v$log

  group by members);

  ```


  ##### 步骤 2：确定要复制的文件的位置和名称


  运行此查询以列出非归档日志模式数据库冷备份中包含的文件的名称（和路径）：


  ```sql

  select name from v$datafile

  union

  select name from v$controlfile

  union

  select name from v$tempfile

  union

  select member from v$logfile;

  ```


  您需要备份联机重做日志吗？不需要；作为任何类型备份的一部分，您永远不需要备份联机重做日志。那么为什么 DBA 作为冷备份的一部分备份联机重做日志呢？


  一个原因是它使非归档日志模式场景的还原过程稍微容易一些。需要联机重做日志才能正常打开数据库。如果您备份所有文件（包括联机重做日志），那么要使数据库恢复到备份时的状态，您需要还原所有文件（包括联机重做日志）并启动数据库。


  ■ **提示** 有关可用于自动化 B&R 步骤的 SQL 生成命令示例，请参阅本章后面关于编写脚本的部分。


  ## 第 16 章 ■ 用户管理的备份与恢复


  ##### 步骤 3：关闭数据库


  以 `SYS`（或具有 `SYSDBA` 权限的用户）身份连接到您的数据库，并使用 `IMMEDIATE`、`TRANSACTIONAL` 或 `NORMAL`
  关闭数据库。在几乎所有情况下，使用 `IMMEDIATE` 是首选方法。此模式会断开用户连接，回滚未完成的事务，并关闭数据库：


  ```bash

  $ sqlplus / as sysdba

  SQL> shutdown immediate;

  ```


  ##### 步骤 4：创建文件的备份副本


  对于在步骤 2 中识别的每个文件，使用操作系统实用程序将文件复制到备份目录（在步骤 1 中确定）。在这个简单的示例中，所有数据文件、控制文件、临时数据库文件和联机重做日志都位于同一目录中。在生产环境中，您很可能将文件分布在几个不同的目录中。此示例使用
  Linux/Unix `cp` 命令将数据库文件从 `/ora01/dbfile/O11R2` 复制到 `/oradump/cbackup/O11R2` 目录：


  ```bash

  $ cp /ora01/dbfile/O11R2/*.* /oradump/cbackup/O11R2

  ```


  ##### 步骤 5：重新启动数据库


  复制所有文件后，您可以启动数据库：


  ```bash

  $ sqlplus / as sysdba

  SQL> startup;

  ```


  #### 在非归档日志模式下还原包含联机重做日志的冷备份


  下一个示例解释如何还原非归档日志模式数据库的冷备份。如果冷备份中包含了联机重做日志，则在还原文件时可以包含联机重做日志。此过程涉及以下步骤：


  1.  关闭实例。

  2.  从备份中将数据文件、联机重做日志、临时文件和控制文件复制回来。

  3.  启动数据库。

  4.  这些步骤在以下各节中详述。


  ##### 步骤 1：关闭实例


  如果实例正在运行，请关闭它。在此场景中，如何关闭数据库并不重要，因为您要还原到某个时间点。实时数据库目录位置中的任何文件在备份文件复制回来时都会被覆盖。如果您的实例正在运行，您可以强行中止它。作为具有
  `SYSDBA` 权限的用户，执行以下操作：


  ```bash

  $ sqlplus / as sysdba

  SQL> shutdown abort;

  ```


  ## 第 16 章 ■ 用户管理的备份与恢复


  ##### 步骤 2：从备份复制文件回来


  此步骤执行与备份相反的操作：您将文件从备份位置复制到实时数据库文件位置。在此示例中，所有备份文件都位于 `/oradump/cbackup/O11R2` 目录中，并且所有文件都被复制到
  `/ora01/dbfile/O11R2` 目录：


  ```bash

  $ cp /oradump/cbackup/O11R2/*.* /ora01/dbfile/O11R2

  ```


  ##### 步骤 3：启动数据库


  以 `SYS`（或具有 `SYSDBA` 权限的用户）身份连接到您的数据库，并启动数据库：


  ```bash

  $ sqlplus / as sysdba

  SQL> startup;

  ```


  完成这些步骤后，您应该拥有与进行冷备份时完全相同的数据库副本。就好像您将数据库设置回进行备份的时间点一样。


  #### 在非归档日志模式下不包含联机重做日志还原冷备份


  如前所述，从冷备份还原时永远不需要联机重做日志。如果您对非归档日志模式数据库进行了冷备份并且备份中未包含联机重做日志，则还原步骤与上一节中的步骤几乎相同。主要区别在于最后一步需要使用
  `OPEN RESETLOGS` 子句打开数据库。


  步骤如下：


  1.  关闭实例。

  2.  从备份中将控制文件和数据文件复制回来。

  3.  以装载模式启动数据库。

  4.  使用 `OPEN RESETLOGS` 子句打开数据库。


  ##### 步骤 1：关闭实例


  如果实例正在运行，请关闭它。在此场景中，如何关闭数据库并不重要，因为您要还原到某个时间点。实时数据库目录位置中的任何文件在备份复制时都会被覆盖。在此场景中，如果您的实例正在运行，您可以强行中止它。作为具有
  `SYSDBA` 权限的用户，执行以下操作：


  ```bash

  $ sqlplus / as sysdba

  SQL> shutdown abort;

  ```


  ##### 步骤 2：从备份复制文件回来


  将控制文件和数据文件从备份位置复制到实时数据文件位置：


  ```bash

  $ cp <backup directory>/*.* <live database file directory>

  ```


  417


  ## 第 16 章 ■ 用户管理的备份与恢复


  ##### 步骤 3：以装载模式启动数据库


  以 `SYS` 或具有 `SYSDBA` 权限的用户身份连接到您的数据库，并以装载模式启动数据库：


  ```bash

  $ sqlplus / as sysdba

  SQL> startup mount

  ```


  ##### 步骤 4：使用 `OPEN RESETLOGS` 子句打开数据库


  使用 `OPEN RESETLOGS` 子句打开您的数据库以供使用：


  ```sql

  SQL> alter database open resetlogs;

  ```


  如果您看到“Database altered”消息，则命令成功。但是，您可能会看到此错误：


  ```

  ORA-01139: RESETLOGS option only valid after an incomplete database recovery

  ```


  在这种情况下，发出以下命令：


  ```sql

  SQL> recover database until cancel;

  ```


  您应该看到此消息：


  ```

  Media recovery complete.

  ```


  现在，尝试使用 `OPEN RESETLOGS` 子句打开数据库：


  ```sql

  SQL> alter database open resetlogs;

  ```


  此语句指示 Oracle 重新创建联机重做日志。Oracle 使用控制文件中的信息来确定重做日志的位置、名称和大小。如果那些位置中存在旧的联机重做日志文件，它们将被覆盖。


  如果您在此过程中监控 `alert.log`，您可能会看到 `ORA-00312` 和 `ORA-00313`。这意味着 Oracle 找不到联机重做日志文件；这是可以的，因为这些文件在
  `OPEN RESETLOGS` 命令重新创建之前是物理不可用的。


  #### 为冷备份和还原编写脚本


  查看如何为冷备份编写脚本具有指导意义。基本思想是动态查询数据字典以确定要备份的文件的位置和名称。这比在脚本中硬编码目录位置和文件名更可取。动态生成脚本不太容易出错和出现意外（例如，当新数据文件添加到数据库但未添加到旧的硬编码备份脚本时）。


  ■ **注意** 本节中的脚本并非生产强度的 B&R 脚本。相反，它们说明了为冷备份及后续还原编写脚本的基本概念。


  本节中的第一个脚本对数据库进行冷备份。在使用冷备份脚本之前，您需要修改脚本中包含的这些变量以匹配您的数据库环境：


  418


  ## 第 16 章 ■ 用户管理的备份与恢复


  *   `ORACLE_SID`

  *   `ORACLE_HOME`

  *   `cbdir`


  `cbdir` 变量指定备份目录位置的名称。该脚本创建一个名为 `coldback.sql` 的文件，该文件从 SQL*Plus 执行以启动数据库的冷备份：


  ```bash

  #!/bin/bash

  ORACLE_SID=O11R2

  ORACLE_HOME=/oracle/app/oracle/product/11.2.0/db_1

  PATH=$PATH:$ORACLE_HOME/bin

  #

  sqlplus -s <<EOF

  / as sysdba

  set head off pages0 lines 132 verify off feed off trimsp on

  define cbdir=/oradump/cbackup/O11R2

  spo coldback.sql

  select ''shutdown immediate;'' from dual;

  select ''!cp '' || name || '' '' || ''&&cbdir'' from v\$datafile;

  select ''!cp '' || name || '' '' || ''&&cbdir'' from v\$tempfile;

  select ''!cp '' || member || '' '' || ''&&cbdir'' from v\$logfile;

  select ''!cp '' || name || '' '' || ''&&cbdir'' from v\$controlfile;

  select ''startup;'' from dual;

  spo off;

  @@coldback.sql

  EOF

  exit 0

  ```


  此文件生成要从 SQL*Plus 脚本执行的命令，以对数据库进行冷备份。您在 Unix `cp` 命令前放置一个感叹号 (`!`)，以指示 SQL*Plus 托管到操作系统以运行复制命令。当引用
  `v$` 数据字典视图时，您还在每个美元符号 (`$`) 前放置一个反斜杠 (`\`)；这在 Linux/Unix shell 脚本中是必需的。`\` 转义 `$`
  并告诉 shell 脚本不要将 `$` 字符视为特殊字符（`$` 通常表示 shell 变量）。


  运行此脚本后，写入 `coldback.sql` 脚本的复制命令示例如下：


  ```sql

  shutdown immediate;

  !cp /ora01/dbfile/O11R2/system01.dbf /oradump/cbackup/O11R2

  !cp /ora01/dbfile/O11R2/sysaux01.dbf /oradump/cbackup/O11R2

  !cp /ora02/dbfile/O11R2/undotbs01.dbf /oradump/cbackup/O11R2

  !cp /ora02/dbfile/O11R2/users01.dbf /oradump/cbackup/O11R2

  ...

  !cp /ora01/oraredo/O11R2/redo02a.rdo /oradump/cbackup/O11R2

  !cp /ora02/oraredo/O11R2/redo02b.rdo /oradump/cbackup/O11R2

  !cp /ora01/dbfile/O11R2/control01.ctl /oradump/cbackup/O11R2

  startup;

  ```


  在进行冷备份的同时，您还应该生成一个脚本，该脚本提供将数据文件、临时文件、日志文件和控制文件复制回其原始位置的命令。您可以使用此文件从冷备份还原（无论是有意还是由于介质故障）。本节中的下一个脚本动态创建一个
  `coldrest.sql` 脚本，该脚本将文件从备份位置复制到原始数据文件位置。您需要以与修改冷备份脚本相同的方式修改此脚本（将 `ORACLE_SID`、`ORACLE_HOME`
  和 `cbdir` 变量更改为匹配您的环境）：


  第 16 章 ■ 用户管理的备份与恢复


  ```bash

  #!/bin/bash

  ORACLE_SID=O11R2

  ORACLE_HOME=/oracle/app/oracle/product/11.2.0/db_1

  PATH=$PATH:$ORACLE_HOME/bin

  #

  sqlplus -s <<EOF

  / as sysdba

  set head off pages0 lines 132 verify off feed off trimsp on

  define cbdir=/oradump/cbackup/O11R2

  define dbname=$ORACLE_SID

  spo coldrest.sql

  select ''shutdown abort;'' from dual;

  select ''!cp '' || ''&&cbdir/'' || substr(name, instr(name,''/'',-1,1)+1) ||

  '' '' || name from v\$datafile;

  select ''!cp '' || ''&&cbdir/'' || substr(name, instr(name,''/'',-1,1)+1) ||

  '' '' || name from v\$tempfile;

  select ''!cp '' || ''&&cbdir/'' || substr(member, instr(member,''/'',-1,1)+1) ||

  '' '' || member from v\$logfile;

  select ''!cp '' || ''&&cbdir/'' || substr(name, instr(name,''/'',-1,1)+1) ||

  '' '' || name from v\$controlfile;

  select ''startup;'' from dual;

  spo off;

  EOF

  exit 0

  ```


  此脚本创建一个名为 `coldrest.sql` 的脚本，该脚本生成将您的数据文件、临时文件、日志文件和控制文件复制回其原始位置的复制命令。运行此 shell
  脚本后，`coldrest.sql` 文件中的代码片段示例如下：


  ```sql

  shutdown abort;

  !cp /oradump/cbackup/O11R2/system01.dbf /ora01/dbfile/O11R2/system01.dbf

  !cp /oradump/cbackup/O11R2/sysaux01.dbf /ora01/dbfile/O11R2/sysaux01.dbf

  !cp /oradump/cbackup/O11R2/undotbs01.dbf /ora02/dbfile/O11R2/undotbs01.dbf

  !cp /oradump/cbackup/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf

  ...

  !cp /oradump/cbackup/O11R2/redo02a.rdo /ora01/oraredo/O11R2/redo02a.rdo

  !cp /oradump/cbackup/O11R2/redo02b.rdo /ora02/oraredo/O11R2/redo02b.rdo

  !cp /oradump/cbackup/O11R2/control01.ctl /ora01/dbfile/O11R2/control01.ctl

  startup;

  ```


  如果需要使用此脚本从冷备份还原，以 `SYS` 身份登录到 SQL*Plus 并执行该脚本：


  ```bash

  $ sqlplus / as sysdba

  SQL> @coldrest.sql

  ```


  #### 实施归档日志模式


  回想一下第 5 章的讨论，只有当您的数据库处于归档日志模式时，才会创建归档重做日志。在此模式下，当联机重做日志填满时，会启动日志切换。当日志切换发生时，日志写入器进程停止写入最近填满的联机重做日志，并开始写入新的联机重做日志组。联机重做日志组以循环方式写入。


  归档日志模式是以下技术的先决条件：用户管理的热备份、闪回数据库功能和 RMAN 联机备份。如果您没有启用归档，并且尝试进行用户管理的热备份，则在将数据库或表空间更改为备份模式时会收到此错误：


  ```

  ORA-01123: cannot start online backup; media recovery not enabled

  ```


  此时，您需要将数据库置于归档日志模式。


  420


  第 16 章 ■ 用户管理的备份与恢复


  ### 做出架构决策


  当您实施归档日志模式时，您还需要一个管理这些文件的策略。归档重做日志会消耗磁盘空间。如果置之不理，这些文件最终将消耗分配给它们的所有空间。如果发生这种情况，归档器无法将新的归档重做日志文件写入磁盘，您的数据库将停止处理事务。此时您将拥有一个挂起的数据库。您需要通过手动干预为归档器恢复工作创建空间。出于这些原因，在启用归档之前，您必须仔细考虑几个架构决策：


  *   将归档重做日志放在何处，以及是否使用快速恢复区（以前称为闪回恢复区）来存储归档重做日志

  *   如何命名归档重做日志

  *   应为归档重做日志位置分配多少空间

  *   备份归档重做日志的频率

  *   何时可以永久从磁盘中删除归档重做日志

  *   是否应启用多个归档重做日志位置

  *   如果这是生产数据库，何时安排所需的小量停机时间


  至少，您的主归档重做位置应有足够的空间来保存至少一天的归档重做日志。这让您可以每天备份它们，然后在备份后从磁盘中删除它们。


  如果您决定为归档重做日志位置使用快速恢复区 (FRA)，则必须确保它包含足够的空间来保存两次备份之间生成的归档重做日志。请记住，FRA 通常包含其他类型的文件，例如
  RMAN 备份文件、闪回日志等。如果您使用 FRA，请注意其他类型文件的生成可能会潜在地影响归档重做日志文件所需的空间。


  您需要一个策略来自动化归档重做日志文件的备份和删除。对于用户管理的备份，这可以通过一个 shell 脚本来实现，该脚本定期将归档重做日志复制到备份位置，然后从主位置删除它们。正如您在后面章节中看到的，RMAN
  自动化了归档重做日志文件的备份和删除。


  如果您的业务要求是必须具有一定程度的高可用性和冗余，那么您应该考虑将归档重做日志写入多个位置。一些机构设置作业来定期将归档重做日志复制到磁盘上的不同位置，甚至复制到不同的服务器。


  ### 设置归档重做文件位置


  在将数据库模式设置为归档之前，您应明确指示 Oracle 将归档重做日志放置在何处。您可以使用以下技术设置归档重做日志文件的目标位置：


  第 16 章 ■ 用户管理的备份与恢复


  *   设置 `LOG_ARCHIVE_DEST_N` 数据库初始化参数。

  *   实施 FRA。


  这两种方法在以下部分中详细讨论。


  ■ **提示** 如果您没有通过初始化参数或启用 FRA 显式设置归档重做日志位置，则归档重做日志将写入默认位置。此位置取决于数据库版本和操作系统。对于活动的生产数据库系统，默认的归档重做日志位置很少是合适的。


  ##### 将归档位置设置为用户定义的磁盘位置（非 FRA）


  如果您使用的是 `init.ora` 文件，请使用操作系统实用程序（如 `vi`）修改该文件，并在其中放置您希望归档重做日志写入的位置。在此示例中，归档重做日志位置设置为
  `/ora02/oraarch/O11R2`：


  ```

  log_archive_dest_1=''location=/ora02/oraarch/O11R2''

  log_archive_format=''%t_%s_%r.arc''

  ```


  如果您使用的是 `spfile`，请使用 `ALTER SYSTEM` 修改相应的初始化变量：


  ```sql

  SQL> alter system set log_archive_dest_1=''location=/ora02/oraarch/O11R2'' scope=both;

  SQL> alter system set log_archive_format=''%t_%s_%r.arc'' scope=spfile;

  ```


  您可以在数据库打开时动态更改 `LOG_ARCHIVE_DEST_n` 参数。但是，您必须停止并启动数据库才能使 `LOG_ARCHIVE_FORMAT` 参数生效。


  注意不要将 `LOG_ARCHIVE_FORMAT` 设置为无效值，因为这样您将无法启动数据库：


  ```sql

  SQL> startup nomount;

  ORA-19905: log_archive_format must contain %s, %t and %r

  ```


  在这种情况下，如果您使用的是 `spfile`，则无法启动实例。您必须重命名 `spfile`，从 `spfile` 创建 `pfile` (`SQL> create
  pfile from spfile;`)，将参数修改为有效值，使用 `pfile` 启动数据库，然后从 `pfile` 重新创建 `spfile`。


  指定 `LOG_ARCHIVE_FORMAT` 时，必须在格式字符串中包含 `%t`（或 `%T`）、`%s`（或 `%S`）和 `d%`。表 16–1 列出了可以与
  `LOG_ARCHIVE_FORMAT` 初始化参数一起使用的有效变量。


  第 16 章 ■ 用户管理的备份与恢复


  ***表 16–1.** 日志归档格式字符串的有效变量*


  **格式字符串** | **含义**

  --- | ---

  `%s` | 日志序列号

  `%S` | 左侧补零的日志序列号

  `%t` | 线程号

  `%T` | 左侧补零的线程号

  `%a` | 激活 ID

  `%d` | 数据库 ID

  `%r` | 重置日志 ID，需要确保跨数据库多个化身的唯一性


  如果您没有为 `LOG_ARCHIVE_FORMAT` 指定值，Oracle 会使用默认值，例如 `%t_%s_%r.dbf`。我不喜欢默认格式的一个方面是它以扩展名
  `.dbf` 结尾，该扩展名广泛用于数据文件。这可能会引起混淆，无法确定特定文件是否可以安全删除，因为它是一个旧的归档重做日志文件，或者该文件是否不应被触动，因为它是一个活动的数据文件。大多数
  DBA 不愿意发出这样的命令（因为害怕意外删除关键数据文件）：


  ```bash

  $ rm *.dbf

  ```


  您可以通过运行以下命令查看 `LOG_ARCHIVE_DEST_N` 参数的值：


  ```sql

  SQL> show parameter log_archive_dest

  ```


  以下是输出的部分列表：


  ```

  NAME TYPE VALUE

  ------------------------------------ ----------- ------------------------------

  log_archive_dest string

  log_archive_dest_1 string location=/ora02/oraarch/O11R2

  log_archive_dest_10 string

  log_archive_dest_11 string

  ```


  对于 Oracle Database 11*g*，您可以启用最多 31 个不同的位置作为归档重做日志文件目标。对于大多数生产系统，您可以仅启用一个归档重做日志目标位置。


  如果您需要更高级别的保护，可以启用多个目标。请记住，当您使用多个目标时，归档器必须能够成功写入至少一个位置。如果您启用了多个强制位置并将 `LOG_ARCHIVE_MIN_SUCCEED_DEST`
  设置为大于 1，那么如果归档器无法写入所有强制位置，您的数据库可能会挂起。


  第 16 章 ■ 用户管理的备份与恢复


  您可以通过此查询检查有关归档重做日志位置状态的详细信息：


  ```sql

  select

  dest_name

  ,destination

  ,status

  ,binding

  from v$archive_dest;

  ```


  以下是输出的一小部分示例：


  ```

  DEST_NAME DESTINATION STATUS BINDING

  -------------------- ------------------------------ --------- ---------

  LOG_ARCHIVE_DEST_1 /ora02/oraarch/O11R2 VALID OPTIONAL

  LOG_ARCHIVE_DEST_2 INACTIVE OPTIONAL

  ```


  ##### 使用 FRA 存放归档日志文件


  FRA 是磁盘上的一个区域——通过数据库初始化参数指定——指示 Oracle 将特定文件（如归档重做日志、RMAN 备份文件、闪回日志以及多路复用的控制文件和联机重做日志）放置于此。要启用
  FRA 的使用，必须设置两个初始化参数：


  *   `DB_RECOVERY_FILE_DEST_SIZE` 指定 FRA 中存储的所有文件可使用的最大空间。

  *   `DB_RECOVERY_FILE_DEST` 指定 FRA 的基本目录。


  当您创建 FRA 时，您实际上并不是在创建任何东西——您是在告诉 Oracle 在存储进入 FRA 的文件时使用哪个目录。例如，假设在挂载点上保留了 200GB
  的空间，并且您希望 FRA 的基本目录为 `/ora02/fra`。要启用 FRA，首先设置 `DB_RECOVERY_FILE_DEST_SIZE`：


  ```sql

  SQL> alter system set db_recovery_file_dest_size=200g;

  ```


  接下来，设置 `DB_RECOVERY_FILE_DEST` 参数：


  ```sql

  SQL> alter system set db_recovery_file_dest=''/ora02/fra'';

  ```


  如果您使用的是 `init.ora` 文件，请确保使用操作系统实用程序（如 `vi`）对其进行修改，以便更改在数据库重启后仍然有效。


  启用 FRA 后，默认情况下，Oracle 会将归档重做日志写入 FRA 中的子目录。


  ■ **注意** 如果您已将 `LOG_ARCHIVE_DEST_N` 参数设置为磁盘上的某个位置，则归档重做日志不会写入 FRA。


  您可以验证归档位置是否使用了 FRA：


  ```sql

  SQL> archive log list;

  ```


  第 16 章 ■ 用户管理的备份与恢复


  如果归档文件正在写入 FRA，您应该看到如下输出：


  ```

  Database log mode Archive Mode

  Automatic archival Enabled

  Archive destination USE_DB_RECOVERY_FILE_DEST

  ```


  您可以像这样显示与 FRA 关联的目录：


  ```sql

  SQL> show parameter db_recovery_file_dest

  ```


  当您首次实施 FRA 时，基本 FRA 目录（使用 `DB_RECOVERY_FILE_DEST` 指定）下没有子目录。当 Oracle 首次需要向 FRA 写入文件时，它会在基本目录下创建任何必需的目录。例如，在您实施
  FRA 后，如果您的数据库启用了归档，那么当首次发生联机重做日志切换时，Oracle 会在基本 FRA 目录下创建以下目录：


  ```

  <SID>/archivelog/<YYYY_MM_DD>

  ```


  对于此数据库示例，归档日志写入以下目录：


  ```

  /ora02/fra/O11R2/archivelog/2010_08_25

  ```


  每天生成的归档重做日志都会导致在 FRA 中创建一个使用目录名称格式 `YYYY_MM_DD` 的新目录。


  如果您希望将归档重做日志同时写入 FRA 和非 FRA 位置，可以按如下方式启用：


  ```sql

  SQL> alter system set log_archive_dest_1=''location=/ora02/oraarch/O11R2'';

  SQL> alter system set log_archive_dest_2=''location=USE_DB_RECOVERY_FILE_DEST'';

  ```


  ##### 非正统的 FRA 思考


  Oracle 建议您将 FRA 用于归档重做日志和 RMAN 备份。但是，我通常不在生产环境中实施 FRA——不用于归档重做日志，不用于 RMAN 备份文件，也不用于任何类型的文件。为什么会这样？


  当您启用 FRA 时，如果您没有设置初始化参数 `LOG_ARCHIVE_DEST_N`，那么默认情况下，归档重做日志会写入 FRA。RMAN 备份也是如此：如果您没有专门配置
  RMAN 通道磁盘位置，那么默认情况下，RMAN 备份文件会写入 FRA。


  当您使用 FRA（如前所述）时，归档重做日志和 RMAN 备份消耗的磁盘空间必须适合分配给 FRA 的磁盘空间。如果您的数据库生成的重做量意外激增，或者 RMAN
  备份出现不可预见的问题，导致消耗了未预料到的磁盘空间量，会发生什么？


  关于 RMAN 备份，如果 FRA 满了，RMAN 备份将中止。RMAN 备份失败并非灾难性的，因为通常您可以快速解决空间问题并手动运行另一次备份。在大多数情况下，这不会损害您的数据库可用性；在备份失败的情况下，您仍然拥有以前的
  RMAN 备份，可用于还原和恢复数据库。


  但是，如果归档重做日志目标已满，并且归档器无法写入文件系统，您的数据库将挂起。在许多 24x7 的关键任务环境中，这种类型的停机是不可接受的，并且会危及您保住工作的能力。


  我发现通过使用专用挂载点来存放这些关键文件，更容易控制分配给归档重做日志的空间。如果可能，请不要将分配给归档重做日志的磁盘空间与 RMAN 备份共享。RMAN
  备份的问题可能导致归档重做日志出现磁盘空间问题，而您希望归档重做日志消耗的空间尽可能稳定和可预测。


  ![](img/index-460_1.png)


  第 16 章 ■ 用户管理的备份与恢复


  #### 禁用归档日志模式


  通常，您不会为生产数据库禁用归档日志模式。但是，您可能正在执行大量数据加载，并希望减少与归档过程相关的任何开销，因此您希望在加载开始前关闭归档日志模式，然后在加载后重新启用它。如果您这样做，请确保在重新启用归档后尽快进行备份。


  要禁用归档，请以 `SYS`（或具有 `SYSDBA` 权限的用户）身份执行以下操作：


  ```bash

  $ sqlplus / as sysdba

  SQL> shutdown immediate;

  SQL> startup mount;

  SQL> alter database noarchivelog;

  SQL> alter database open;

  ```


  您可以通过以下方式确认归档日志模式：


  ```sql

  SQL> archive log list;

  ```


  您也可以通过以下方式确认日志模式：


  ```sql

  SQL> select log_mode from v$database;

  LOG_MODE

  NOARCHIVELOG

  ```


  #### 对归档日志目标磁盘空间不足做出反应


  归档器后台进程将归档重做日志写入您指定的位置。如果由于任何原因归档器进程无法写入归档位置，您的数据库将挂起。任何尝试连接的用户都会收到此错误：


  ```

  ORA-00257: archiver error. Connect internal only, until freed.

  ```


  作为生产支持 DBA，您永远不希望您的数据库进入该状态。有时会发生不可预测的事件，您必须处理本不应发生的问题。


  ■ **注意** 支持生产数据库的 DBA 与那些从闪亮的演示或重复的文档中获取新想法的架构 DBA 具有完全不同的心态。


  在这种情况下，您的数据库相当于宕机并且完全不可用。要解决此问题，您必须快速采取行动：


  *   将文件移动到其他位置。

  *   压缩归档重做日志位置中的旧文件。

  *   永久删除旧文件。

  *   将归档重做日志目标切换到其他位置。


  第 16 章 ■ 用户管理的备份与恢复


  移动文件通常是解决归档器错误的最快、最安全的方法。您可以使用操作系统实用程序（如 `mv`）将旧的归档重做日志移动到其他位置。如果后续还原和恢复需要它们，您可以让恢复过程知道新位置。注意不要移动当前正在写入的归档重做日志。如果归档重做日志文件出现在
  `V$ARCHIVED_LOG` 中，则表示它已完全归档。


  您可以使用操作系统实用程序（如 `gzip`）压缩当前归档目标中的归档重做日志文件。如果您这样做，必须记住解压缩以后可能用于还原和恢复的任何文件。注意不要压缩当前正在写入的归档重做日志。


  另一个选项是使用操作系统实用程序（如 `rm`）永久从磁盘删除归档重做日志。这种方法很危险，因为您可能需要这些归档重做日志进行后续恢复。如果您确实删除了归档重做日志文件，并且您没有它们的备份，您应该尽快对数据库进行完整备份。


  如果服务器上的另一个位置有大量空间，您可以考虑更改归档重做日志的写入位置。例如：


  ```sql

  SQL> alter system set log_archive_dest_1=''location=/oraarch02'';

  ```


  解决主位置的问题后，您可以切换回原始位置。您可以在数据库运行时执行此操作。


  当归档重做日志文件目标已满时，您必须争分夺秒地解决它。这就是为什么在为生产 24x7 数据库启用归档之前应该进行充分考虑的原因。


  对于大多数数据库，将归档重做日志写入一个位置就足够了。但是，如果您有任何类型的灾难恢复或高可用性要求，那么您应该写入多个位置。有时 DBA 设置一个作业，每小时备份一次归档重做日志，并将它们复制到备用位置甚至备用服务器。


  ### 备份归档重做日志文件


  根据您的业务要求，您可能需要一个备份归档重做日志文件的策略。至少，您应该备份在对归档日志模式数据库进行备份期间生成的任何归档重做日志。其他策略可能包括：


  *   定期将归档重做日志复制到备用位置，然后从主目标中删除它们

  *   将归档重做日志复制到磁带，然后从磁盘中删除它们

  *   使用两个归档重做日志位置

  *   使用 Data Guard 实现强大的灾难恢复解决方案


  请记住，您需要自上次良好备份开始时间以来生成的所有归档重做日志，以确保可以完全恢复数据库。只有在确定拥有良好的数据库备份后，才应考虑删除备份之前生成的归档重做日志。


  #### 对归档日志模式数据库进行冷备份


  您可以使用归档日志模式数据库的备份来还原和恢复到故障之前最后一次提交的事务。因此，与非归档日志模式数据库的备份不同，这种类型的备份绝不是为了将数据库重置回无法应用恢复的过去某个时间点。归档日志模式数据库备份的目的是还原数据库，并前滚和应用事务以完全恢复数据库。


  ![](img/index-463_1.png)


  第 16 章 ■ 用户管理的备份与恢复


  “变速器是好的。他只是那种只知道按按钮的人，对该动作背后的原理没有任何理解。”


  您为理解 B&R 实施方式所付出的努力从长远来看会得到回报。您实际上需要记忆的东西更少——因为您对底层实现的理解使您能够思考问题并以清单无法做到的方式解决问题。


  ## 实施热备份策略


  如本章前面所述，RMAN 应该是您进行任何类型 Oracle 数据库备份（联机或脱机）的首选工具。RMAN 比用户管理的备份更高效，并且自动化了几乎所有任务。话虽如此，获得对
  Oracle B&R 内部机制理解的最佳方法之一是进行热备份，然后使用该备份来还原和恢复您的数据库。


  手动发出热备份以及随后的还原和恢复中涉及的命令，有助于您理解每种类型文件（控制文件、数据文件、归档重做日志和联机重做日志）在还原和恢复场景中的作用。


  本节首先向您展示如何实施热备份。它还提供了可用于自动化热备份过程的基本脚本。后面的部分解释了热备份的一些内部机制，并阐明了为什么在执行热备份之前必须将表空间置于备份模式。


  ### 进行热备份


  热备份所需的步骤如下：


  1.  确保数据库处于归档日志模式。

  2.  确定将备份文件复制到何处。

  3.  确定需要备份哪些文件。

  4.  记录联机重做日志的最大序列号。

  5.  将数据库/表空间更改为备份模式。

  6.  使用操作系统实用程序复制数据文件。

  7.  将数据库/表空间更改为退出备份模式。

  8.  归档当前联机重做日志，并记录联机重做日志的最大序列号。

  9.  备份控制文件。

  10. 备份在备份期间生成的任何归档重做日志。


  这些步骤在以下各节中详细说明。


  第 16 章 ■ 用户管理的备份与恢复


  ##### 步骤 1：确保数据库处于归档日志模式


  运行以下命令以检查数据库的归档日志模式状态：


  ```sql

  SQL> archive log list;

  ```


  输出显示此数据库处于归档日志模式：


  ```

  Database log mode Archive Mode

  Automatic archival Enabled

  Archive destination /ora02/oraarch/O11R2

  ```


  如果您不确定如何启用归档，请参阅本章前面的“启用归档日志模式”部分，其中详细说明了如何实施归档。


  ##### 步骤 2：确定将备份文件复制到何处


  现在，确定备份位置。在此示例中，备份位置是目录 `/oradump/hbackup/O11R2`。要大致了解所需空间，您可以运行此查询：


  ```sql

  SQL> select sum(bytes) from dba_data_files;

  ```


  理想情况下，备份位置应与您的实时数据文件位于不同的磁盘组上。但在实践中，很多时候您会被给予存储区域网络 (SAN) 上的一块空间，并且对底层磁盘布局一无所知。在这些情况下，您依赖
  SAN 硬件中内置的冗余（RAID 磁盘、多个控制器等）来确保高可用性和可恢复性。


  ##### 步骤 3：确定需要备份哪些文件


  对于此步骤，您只需要知道数据文件的位置：


  ```sql

  SQL> select name from v$datafile;

  ```


  当您进行到步骤 5 时，您可能需要考虑一次将一个表空间更改为备份模式。如果您采用这种方法，您需要知道哪些数据文件与哪些表空间相关联：


  ```sql

  select

  tablespace_name

  ,file_name

  from dba_data_files

  order by 1,2;

  ```


  ##### 步骤 4：记录联机重做日志的最大序列号


  要使用热备份成功恢复，您至少需要备份期间生成的所有归档重做日志。因此，您需要在开始热备份之前记录归档日志序列：


  第 16 章 ■ 用户管理的备份与恢复


  ```sql

  select

  thread#

  ,max(sequence#)

  from v$log

  group by thread#

  order by thread#;

  ```


  ##### 步骤 5：将数据库/表空间更改为备份模式


  您可以使用 `ALTER DATABASE BEGIN BACKUP` 语句同时将所有表空间置于备份模式：


  ```sql

  SQL> alter database begin backup;

  ``


  如果是活动的 OLTP 数据库，这样做会大大降低性能。这是因为当表空间处于备份模式时，Oracle 会在首次修改任何块时将该块的完整映像复制到重做流中。本章后面将详细讨论这一点。


  另一种方法是一次只将一个表空间更改为备份模式。将表空间更改为备份模式后，您可以复制相关数据文件（步骤 6），然后将表空间更改为退出备份模式（步骤 7）。您必须对每个表空间执行此操作：


  ```sql

  SQL> alter tablespace <tablespace_name> begin backup;

  ```


  ##### 步骤 6：使用操作系统实用程序复制数据文件


  使用操作系统实用程序（Linux/Unix `cp` 命令）将数据文件复制到备份位置。在此示例中，所有数据文件都在一个目录中，并且它们都被复制到同一个备份目录：


  ```bash

  $ cp /ora01/dbfile/O11R2/*.dbf /oradump/hbackup/O11R2

  ```


  ##### 步骤 7：将数据库/表空间更改为退出备份模式


  将所有数据文件复制到备份目录后，您需要将表空间更改为退出备份模式。此示例同时将所有表空间更改为退出备份模式：


  ```sql

  SQL> alter database end backup;

  ```


  如果您一次将一个表空间更改为备份模式，则在复制其数据文件后，需要将每个表空间更改为退出备份模式：


  ```sql

  SQL> alter tablespace <tablespace_name> end backup;

  ```


  如果您不将表空间退出备份模式，可能会严重降低性能并损害恢复数据库的能力。


  第 16 章 ■ 用户管理的备份与恢复


  ##### 步骤 8：归档当前联机重做日志并记录联机重做日志的最大序列号


  以下语句指示 Oracle 归档任何未归档的联机重做日志，并启动日志切换。这确保了备份结束标记被写入归档重做日志：


  ```sql

  SQL> alter system archive log current;

  ```


  同时记录联机重做日志的最大序列号。如果在热备份之后立即发生故障，您需要热备份期间生成的任何归档重做日志来完全恢复数据库：


  ```sql

  select

  thread#

  ,max(sequence#)

  from v$log

  group by thread#

  order by thread#;

  ```


  ##### 步骤 9：备份控制文件


  对于热备份，您不能使用操作系统复制命令来备份控制文件。Oracle 的热备份过程指定您必须使用 `ALTER DATABASE BACKUP CONTROLFILE`
  语句。此示例备份控制文件并将其放在与数据库备份文件相同的位置：


  ```sql

  SQL> alter database backup controlfile

  to ''/oradump/hbackup/O11R2/controlbk.ctl'' reuse;

  ```


  `REUSE` 子句指示 Oracle 如果备份位置中已存在该文件，则覆盖它。


  ##### 步骤 10：备份在备份期间生成的任何归档重做日志


  备份在热备份期间生成的归档重做日志。您可以使用操作系统复制命令备份归档重做日志：


  ```bash

  $ cp <archive redo logs generated during backup> <backup directory>

  ```


  这确保了在热备份完成后不久发生故障时，您拥有这些日志。确保不要备份归档器进程当前正在写入的归档重做日志——这样做会导致该文件的副本不完整。有时，DBA 通过检查
  `V$ARCHIVED_LOG` 视图中的最大 `SEQUENCE#` 和最大 `RESETLOGS_ID` 来编写此过程的脚本。当 Oracle 完成将归档重做日志复制到磁盘时，它会更新该视图。因此，出现在
  `V$ARCHIVED_LOG` 视图中的任何归档重做日志文件都应该是安全的，可以复制。


  第 16 章 ■ 用户管理的备份与恢复


  #### 为热备份编写脚本


  本节中的脚本涵盖了热备份相关的最少任务。对于生产环境，热备份脚本可能相当复杂。此处列出的脚本为您提供了一个热备份脚本中应包含内容的基线。


  您需要修改脚本中的这些变量，使其在您的环境中工作：


  *   `hbdir`

  *   `dbname`


  SQL*Plus 变量 `hbdir` 指向热备份的基本目录。该脚本还需要将 `dbname` 设置为数据库的 Oracle 系统标识符 (SID)。该脚本将文件复制到由
  `hbdir` 和 `dbname` 变量连接而成的字符串目录。例如，如果您将 `hbdir` 设置为 `/oradump/hbackup`，并将 `dbname`
  设置为 `O11R2`，则备份文件将被复制到 `/oradump/hbackup/O11R2` 目录：


  ```bash

  #!/bin/bash

  ```



  # 用户管理的备份与恢复


  ## 生成热备份脚本


  你可以硬编码操作系统变量，或者通过脚本引用它们，有关 `oraset` 脚本的更多详情请参见第 2 章。


  ```bash

  . /var/opt/oracle/oraset $1

  #

  sqlplus -s <<EOF

  / as sysdba

  set head off pages0 lines 132 verify off feed off trimsp on

  define hbdir=/oradump/hbackup

  define dbname=O11R2

  spo hotback.sql

  select ''spo &&hbdir/&&dbname/hotlog.txt'' from dual;

  select ''select max(sequence#) from v\$log;'' from dual;

  select ''alter database begin backup;'' from dual;

  select ''!cp '' || name || '' '' || ''&&hbdir/&&dbname'' from v\$datafile;

  select ''alter database end backup;'' from dual;

  select ''alter database backup controlfile to '' || '''''''' || ''&&hbdir'' || ''/''

  || ''&&dbname'' || ''/controlbk.ctl'' || '''''''' || '' reuse;'' from dual;

  select ''alter system archive log current;'' from dual;

  select ''select max(sequence#) from v\$log;'' from dual;

  select ''select member from v\$logfile;'' from dual;

  select ''spo off;'' from dual;

  spo off;

  @@hotback.sql

  EOF

  exit 0

  ```


  该脚本会生成一个 `hotback.sql` 脚本。这个脚本包含了执行热备份所需的命令。以下是一个测试数据库的 `hotback.sql` 脚本列表：


  ```sql

  spo /oradump/hbackup/O11R2/hotlog.txt

  select max(sequence#) from v$log;

  alter database begin backup;

  !cp /ora01/dbfile/O11R2/system01.dbf /oradump/hbackup/O11R2

  !cp /ora01/dbfile/O11R2/sysaux01.dbf /oradump/hbackup/O11R2

  !cp /ora02/dbfile/O11R2/undotbs01.dbf /oradump/hbackup/O11R2

  !cp /ora02/dbfile/O11R2/users01.dbf /oradump/hbackup/O11R2

  !cp /ora01/dbfile/O11R2/appdata.dbf /oradump/hbackup/O11R2

  !cp /ora01/dbfile/O11R2/inv_mgmt_data01.dbf /oradump/hbackup/O11R2

  !cp /ora01/dbfile/O11R2/inv_mgmt_index01.dbf /oradump/hbackup/O11R2

  !cp /ora01/dbfile/O11R2/mvdata01.dbf /oradump/hbackup/O11R2

  !cp /ora01/dbfile/O11R2/mvindex01.dbf /oradump/hbackup/O11R2

  alter database end backup;

  alter database backup controlfile to ''/oradump/hbackup/O11R2/controlbk.ctl'' reuse;

  alter system archive log current;

  select max(sequence#) from v$log;

  select member from v$logfile;

  spo off;

  ```


  你可以像这样从 SQL\*Plus 手动运行此脚本：


  ```

  SQL> @hotback.sql

  ```


  **警告** 如果上述脚本在执行 `ALTER DATABASE END BACKUP` 之前失败，你必须手动以 `SYS` 身份从 SQL\*Plus 运行
  `ALTER DATABASE END BACKUP`，将数据库（表空间）退出备份模式。


  ## 生成文件复制脚本


  在生成热备份脚本的同时，生成一个用于从备份目录复制数据文件的脚本是审慎的做法。你需要修改此脚本中的 `hbdir` 和 `dbname` 变量以匹配你的环境。以下是一个生成复制命令的脚本：


  ```bash

  #!/bin/bash

  '
- "# 引用 Oracle 操作系统变量\n. /var/opt/oracle/oraset $1\n#\nsqlplus -s <<EOF\n/ as sysdba\n\
  set head off pages0 lines 132 verify off feed off trimsp on\ndefine hbdir=/oradump/hbackup\n\
  define dbname=O11R2\nspo hotrest.sql\nselect '!cp ' || '&&hbdir' || substr(name,instr(name,'&&dbname')-1)\n\
  || ' ' || name from v\\$datafile;\nspo off;\n#\nexit 0\n```\n\n以下是你可以在发生故障时从 SQL\\\
  *Plus 执行以将数据文件从备份目录复制回来的代码列表：\n\n```\n!cp /oradump/hbackup/O11R2/system01.dbf /ora01/dbfile/O11R2/system01.dbf\n\
  !cp /oradump/hbackup/O11R2/sysaux01.dbf /ora01/dbfile/O11R2/sysaux01.dbf\n!cp /oradump/hbackup/O11R2/undotbs01.dbf\
  \ /ora02/dbfile/O11R2/undotbs01.dbf\n!cp /oradump/hbackup/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf\n\
  !cp /oradump/hbackup/O11R2/appdata.dbf /ora01/dbfile/O11R2/appdata.dbf\n!cp /oradump/hbackup/O11R2/inv_mgmt_data01.dbf\
  \ \\\n/ora01/dbfile/O11R2/inv_mgmt_data01.dbf\n!cp /oradump/hbackup/O11R2/inv_mgmt_index01.dbf\
  \ \\\n/ora01/dbfile/O11R2/inv_mgmt_index01.dbf\n!cp /oradump/hbackup/O11R2/mvdata01.dbf\
  \ /ora01/dbfile/O11R2/mvdata01.dbf\n!cp /oradump/hbackup/O11R2/mvindex01.dbf /ora01/dbfile/O11R2/mvindex01.dbf\n\
  ```\n\n在此输出中，如果你倾向于从操作系统提示符运行命令，可以移除每行开头的 `!` 字符。核心思想是，在发生故障时这些命令是可用的，这样你就知道哪些文件被备份到了什么位置以及如何将它们复制回来。在上面的代码列表中，请注意有两行使用了\
  \ `\\` 字符进行换行。这是为了适应本书页面宽度的限制。\n\n**提示** 不要使用用户管理的热备份技术进行联机备份。使用 RMAN 进行备份。RMAN\
  \ 不需要将表空间置于备份模式，并且自动化了几乎所有与备份与恢复相关的工作。\n\n## 理解块分裂问题\n\n要执行热备份，一个关键步骤是在使用操作系统实用程序复制与表空间关联的任何数据文件之前，将表空间更改为备份模式。要理解为什么必须将表空间更改为备份模式，你必须熟悉有时被称为分裂（或破碎）块的问题。\n\
  \n回想一下，数据库块的大小通常与操作系统块的大小不同。例如，一个数据库块的大小可能是 8KB，而操作系统块的大小是 4KB。作为热备份的一部分，你使用操作系统实用程序复制活动的数据文件。在操作系统实用程序复制数据文件的同时，数据库写入器有可能正在写入某个块，而操作系统实用程序正在复制该块。由于\
  \ Oracle 块和操作系统块的大小不同，可能会发生以下情况：\n1.  操作系统实用程序复制了 Oracle 块的一部分。\n2.  片刻之后，数据库写入器更新了整个块。\n\
  3.  转瞬之间，操作系统实用程序复制了 Oracle 块的后半部分。\n\n这可能导致操作系统的块副本与 Oracle 写入操作系统的内容不一致。\n\n图\
  \ 16–1 说明了这个概念。\n\n查看图 16–1，在时间 3 复制到磁盘的块，就 Oracle 而言是损坏的。块的前半部分来自时间 1，而块的后半部分是在时间\
  \ 3 复制的。这就是为什么你不能通过复制开放的 Oracle 数据库中的数据文件来制作备份。当你进行热备份时，你是在保证数据文件的备份中存在块级别的损坏。\n\
  \n要理解 Oracle 如何解决块分裂问题，首先考虑一个在正常模式下（非备份模式）运行的数据库。写入联机重做日志的重做信息仅包含 Oracle 需要重新应用事务所需的内容。重做流不包含完整的数据块。Oracle\
  \ 只会在重做流中记录一个更改向量，该向量指定了哪个块被更改以及如何被更改。图 16–2 显示了 Oracle 在正常操作下的情况。\n\n![](img/index-471_1.png)\n\
  \n![](img/index-472_1.png)\n\n![](img/index-473_1.png)\n\n\n\n# 第 16 章 ■ 用户管理的备份与恢复\n\
  \n如果您在开始标记和结束标记之间的所有重做数据都应用到数据文件之前，尝试停止恢复过程，Oracle 将抛出此错误：\n\n`ORA-01195: online\
  \ backup of file 1 needs more recovery to be consistent`\n\n在表空间热备份期间生成的所有重做数据必须应用到数据文件后，才能打开它们。Oracle\
  \ 至少需要应用从开始备份 SCN 标记到结束备份标记之间的所有重做数据，以涵盖表空间处于备份模式时修改的每一个数据块。这些重做数据存档在归档重做日志文件中；或者，如果故障恰好发生在备份结束后，部分重做数据可能尚未归档，而存在于在线重做日志中。因此，您必须指示\
  \ Oracle 应用在线重做日志中的内容。\n\n## 理解数据文件*确实*被更新\n\n请注意，在图 16-2 和图 16-3 中，数据库写入器的行为在备份过程中基本保持不变。无论数据库处于何种备份模式，数据库写入器都会持续将数据块写入数据文件。它并不关心是否正在进行热备份；它的职责就是将数据块从缓冲区缓存写入数据文件。\n\
  \n偶尔，您会遇到一位声称在用户管理的热备份期间，数据库写入器不会写入数据文件的 DBA。这是一种普遍的误解。运用一些常识：如果在热备份期间数据库写入器不写入数据文件，那么修改是在哪里被写入的呢？如果事务被写入数据文件以外的地方，那么备份后这些数据文件如何重新同步呢？这根本说不通。\n\
  \n一些 DBA 说：“数据文件头被冻结了，这意味着数据文件没有变化。” Oracle 确实会冻结 SCN 以在数据文件头中标记热备份的开始，并且在表空间退出备份模式之前不会更新该\
  \ SCN。这个“冻结的 SCN”并不意味着在备份期间没有数据块被写入数据文件。您可以通过以下操作轻松证明在备份模式下数据文件会被写入：\n\n1.  将表空间至于备份模式：\n\
  \    `SQL> alter tablespace users begin backup;`\n2.  创建一个包含字符字段的表：\n    `SQL> create\
  \ table cc(cc varchar2(20)) tablespace users;`\n3.  向该表中插入一个字符串：\n    `SQL> insert\
  \ into cc values('DBWR does write');`\n4.  切换在线重做日志文件以强制执行检查点：\n    `SQL> alter\
  \ system switch logfile;`\n5.  在操作系统层面，使用 `strings` 和 `grep` 命令在数据文件中搜索该字符串：\n \
  \   `$ strings /ora02/dbfile/O11R2/users01.dbf | grep \"DBWR does write\"`\n6. \
  \ 以下是证明数据库写入器确实将数据写入磁盘的输出：`DBWR does write`\n7.  别忘了将表空间退出备份模式：\n    `SQL> alter\
  \ tablespace users end backup;`\n\n## 执行归档日志模式数据库的完全恢复\n\n*完全恢复*意味着您可以恢复故障发生前所有已提交的事务。\n\
  \n完全恢复并不意味着您必须完全恢复和恢复整个数据库。例如，如果只有一个数据文件发生了介质故障，您只需恢复和恢复受损的数据文件即可完成完全恢复。\n\n**提示**\
  \ 如果您有权访问测试或开发数据库，请花时间逐步完成本节中每个示例的每个步骤。实践这些步骤比任何文档都能教会您更多关于备份与恢复的知识。\n\n本节的步骤适用于在归档日志模式下备份的任何数据库。无论您进行的是冷备份还是热备份都没关系。只要备份时数据库处于归档日志模式，恢复和还原数据文件的步骤都是相同的。对于完全恢复，您需要：\n\
  \n*   能够还原发生介质故障的数据文件\n*   能够访问自上次备份开始以来生成的所有归档重做日志\n*   拥有完整的在线重做日志。\n\n以下是完全恢复的基本过程：\n\
  \n1.  任何需要还原的数据文件在还原前必须处于脱机状态；最简单的实现方法是将数据库置于加载模式。\n2.  使用操作系统复制实用程序还原受损的数据文件。\n\
  3.  发出相应的 SQL*Plus `RECOVER` 命令，以应用归档重做日志和在线重做日志中所需的任何信息。\n4.  将数据库打开。\n\n接下来的几个小节将演示一些常见的完全还原和恢复场景。您应该能够运用这些基本场景来诊断和恢复您遇到的任何复杂情况。\n\
  \n## 数据库脱机时的还原与恢复\n\n本节详细描述了一个简单的还原与恢复场景。接下来将描述模拟故障然后执行完全还原与恢复的步骤。请在开发数据库中尝试此场景。\n\
  \n确保您有一个良好的备份，并且不要在包含关键业务数据的数据库中尝试此实验。\n\n在开始此示例之前，请创建一个表并插入一些数据。在完全恢复过程的最后将选择此表和数据，以证明恢复成功：\n\
  ```sql\nSQL> create table foo(foo number) tablespace users;\nSQL> insert into foo\
  \ values(1);\nSQL> commit;\n```\n\n现在，多次切换在线日志。这样做可以确保在恢复过程中必须应用归档重做日志：\n```sql\n\
  SQL> alter system switch logfile;\nSQL> /\nSQL> /\nSQL> /\n```\n\n接下来，通过重命名与 USERS\
  \ 表空间关联的数据文件来模拟介质故障。您可以通过以下查询识别与 USERS 表空间关联的数据文件名称：\n```sql\nSQL> select file_name\
  \ from dba_data_files where tablespace_name='USERS';\nFILE_NAME\n/ora02/dbfile/O11R2/users01.dbf\n\
  ```\n\n在操作系统层面，重命名该文件：\n```bash\n$ mv /ora02/dbfile/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf.old\n\
  ```\n\n并尝试停止您的数据库：\n```bash\n$ sqlplus / as sysdba\nSQL> shutdown immediate;\n```\n\
  \n您应该看到类似以下的错误：\n`ORA-01110: data file 4: '/ora02/dbfile/O11R2/users01.dbf'`\n`ORA-27041:\
  \ unable to open file`\n\n如果这是一场真实的灾难，谨慎的做法是导航到数据文件目录，列出文件，并查看相关文件是否在其正确的位置。您还应该检查\
  \ `alert.log` 文件，看看 Oracle 是否在其中记录了任何相关信息。\n\n既然您已经模拟了介质故障，接下来的几个步骤将引导您完成还原和完全恢复。\n\
  \n### 步骤 1：将数据库置于加载模式\n\n在将数据库置于加载模式之前，您可能需要先使用 `ABORT` 选项关闭它：\n```bash\n$ sqlplus\
  \ / as sysdba\nSQL> shutdown abort;\nSQL> startup mount;\n```\n\n### 步骤 2：从备份中还原数据文件\n\
  \n下一步是将备份中对应于故障文件的数据文件复制回来：\n```bash\n$ cp /oradump/hbackup/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf\n\
  ```\n\n此时，思考一下如果您尝试启动数据库，Oracle 会做什么是很有启发性的。当您发出 `ALTER DATABASE OPEN` 语句时，Oracle\
  \ 会检查控制文件中每个数据文件的 SCN。您可以通过查询 `V$DATAFILE` 来检查此 SCN：\n```sql\nSQL> select checkpoint_change#\
  \ from v$datafile where file#=4;\nCHECKPOINT_CHANGE#\n```\n\nOracle 将控制文件中的 SCN\
  \ 与数据文件头中的 SCN 进行比较。您可以通过查询 `V$DATAFILE_HEADER` 来检查数据文件头中的 SCN。例如：\n```sql\nSQL>\
  \ select file#, checkpoint_change# from v$datafile_header where file#=4;\nFILE#\
  \ CHECKPOINT_CHANGE#\n---------- ------------------\n4 17779631\n```\n\n\n# 第 16\
  \ 章 ■ 用户管理的备份与恢复\n\n请注意，`V$DATAFILE_HEADER` 中记录的 `SCN` 小于 `V$DATAFILE` 中同一数据文件的\
  \ `SCN`。此时若尝试打开数据库，Oracle 会抛出错误，提示需要进行介质恢复（即需要应用重做日志），以将数据文件中的 `SCN` 与控制文件中的 `SCN`\
  \ 同步。当你在此时尝试打开数据库，会发生以下情况：\n\n```\nSQL> alter database open;\n\nalter database open;\n\
  \nalter database open\n\n*\n\nERROR at line 1:\nORA-01113: file 4 needs media recovery\n\
  ORA-01110: data file 4: '/ora02/dbfile/O11R2/users01.dbf'\n```\n\n在数据文件头中的 `SCN`\
  \ 与控制文件中对应的 `SCN` 匹配之前，Oracle 不允许你打开数据库。\n\n## 步骤 3：发出适当的 `RESTORE` 语句\n\n归档重做日志和在线重做日志包含了将数据文件\
  \ `SCN` 赶上控制文件 `SCN` 所需的信息。你可以通过发出以下 `SQL*Plus` 语句之一，将重做日志应用到需要介质恢复的数据文件上：\n\n-\
  \ `RECOVER DATAFILE`\n- `RECOVER TABLESPACE`\n- `RECOVER DATABASE`\n\n由于本例中只有一个数据文件需要恢复，因此使用\
  \ `RECOVER DATAFILE` 语句是合适的。不过请记住，你可以运行上述任何一个 `RECOVER` 语句，Oracle 会自行判断需要恢复什么。在此特定场景下，你可能会发现记住包含已恢复数据文件的表空间名称，比记住数据文件名更容易。接下来，恢复\
  \ `USERS` 表空间中所有需要恢复的数据文件：\n\n`SQL> recover tablespace users;`\n\n此时，Oracle 使用数据文件头中的\
  \ `SCN` 来确定应使用哪个归档重做日志或在线重做日志开始应用重做。如果所有需要的重做日志都存在于在线重做日志中，Oracle 会应用该重做并显示以下消息：\n\
  \n`介质恢复完成。`\n\n如果 Oracle 需要应用仅包含在归档重做日志中的重做日志（意味着包含相应重做的在线重做日志已被覆盖），你会收到 Oracle\
  \ 的提示，建议首先应用哪个归档重做日志：\n\n```\nORA-00279: 更改 17779631 生成于 2010-08-21 04:51:22，需要用于线程\
  \ 1\nORA-00289: 建议：/ora02/oraarch/O11R2/1_33_726314508.arc\nORA-00280: 更改 17779631\
  \ 对于线程 1 属于序列号 #33\n指定日志：{<RET>=建议 | 文件名 | AUTO | CANCEL}\n```\n\n你可以按回车或回车键（`<RET>`）让\
  \ Oracle 应用建议的归档重做日志文件，或指定一个文件名，或指定 `AUTO` 指示 Oracle 自动应用所有建议的文件，或键入 `CANCEL` 以取消恢复操作。\n\
  \n在本例中，指定 `AUTO`。Oracle 会应用所有归档重做日志文件和在线重做日志文件中的重做日志，以执行完全恢复：\n\n```\nAUTO\n```\n\
  \n应用完所有需要的归档重做和在线重做后，显示的最后一条消息是：`日志已应用。`\n\n`介质恢复完成。`\n\n## 步骤 4：将数据库打开\n\n介质恢复成功后，你可以打开数据库：\n\
  \n`SQL> alter database open;`\n\n现在，你可以验证在介质故障之前提交的事务是否已恢复：\n\n`SQL> select * from\
  \ foo;`\n\n`FOO`\n\n## 联机状态下恢复与恢复数据库\n\n如果你丢失了除 `SYSTEM` 和 `UNDO` 表空间之外的其他表空间关联的数据文件，可以在保持数据库联机的情况下，恢复并恢复受损的数据文件。为此，任何需要恢复和恢复的数据文件必须首先被脱机。当用户尝试更新表时遇到类似如下错误，你可能会收到关于某个数据文件存在问题的警报：\n\
  \n`SQL> insert into foo values(2);`\n\n```\nORA-01116: 打开数据库文件 4 时出错\nORA-01110:\
  \ 数据文件 4: '/ora02/dbfile/O11R2/users01.dbf'\nORA-27041: 无法打开文件\n```\n\n你导航到包含该数据文件的操作系统目录，并确定该数据文件已被系统管理员错误地删除。\n\
  \n\n在此示例中，与 `USERS` 表空间关联的数据文件被脱机，随后在数据库其余部分保持在线的状态下被还原和恢复。首先，将数据文件脱机：\n```sql\n\
  SQL> alter database datafile '/ora02/dbfile/O11R2/users01.dbf' offline;\n```\n现在，从备份位置还原相应的数据文件：\n\
  ```bash\n$ cp /oradump/hbackup/O11R2/users01.dbf /ora02/dbfile/O11R2/users01.dbf\n\
  ```\n在此情况下，不能使用 `RECOVER DATABASE`。`RECOVER DATABASE` 语句尝试恢复数据库中的所有数据文件，而 `SYSTEM`\
  \ 表空间是其中的一部分。`SYSTEM` 表空间在数据库在线时无法被恢复。\n\n如果使用 `RECOVER TABLESPACE`，则与该表空间关联的所有数据文件必须处于脱机状态。在这种情况下，更合适的做法是在数据文件粒度级别进行恢复：\n\
  ```sql\nSQL> recover datafile '/ora02/dbfile/O11R2/users01.dbf';\n```\nOracle 会检查数据文件头中的\
  \ SCN，并确定使用哪个归档重做日志或在线重做日志来开始应用重做。如果所有需要的重做都在在线重做日志中，你会看到这条消息：`Media recovery complete`。\n\
  \n如果重做的起始点仅存在于归档重做日志文件中，Oracle 会建议从哪个文件开始：\n```\nORA-00279: change 17809451 generated\
  \ at 08/21/2010 10:10:56 needed for thread 1\nORA-00289: suggestion : /ora02/oraarch/O11R2/1_45_726314508.arc\n\
  ORA-00280: change 17809451 for thread 1 is in sequence #45\nSpecify log: {<RET>=suggested\
  \ | filename | AUTO | CANCEL}\n```\n你可以输入 `AUTO`，让 Oracle 自动应用所有归档重做日志文件和在线重做日志文件中的必需重做：\n\
  ```\nAUTO\n```\n如果成功，你应该会看到这条消息：\n```\nLog applied.\nMedia recovery complete.\n\
  ```\n现在，你可以将数据文件重新联机：\n```sql\nSQL> alter database datafile '/ora02/dbfile/O11R2/users01.dbf'\
  \ online;\n```\n\n### 还原控制文件\n\n当你处理用户管理的备份时，通常会在以下情况之一还原控制文件：\n\n*   一个控制文件损坏，并且控制文件是多路复用的。\n\
  *   所有控制文件都损坏。\n\n本节涵盖这两种情况。\n\n### 多路复用时还原一个损坏的控制文件\n\n如果你为数据库配置了多个控制文件，可以关闭数据库并使用操作系统命令将现有控制文件复制到丢失控制文件的位置。例如，从初始化文件中，你得知此数据库使用了两个控制文件：\n\
  ```sql\nSQL> show parameter control_files\n\nNAME                              \
  \   TYPE        VALUE\n------------------------------------ ----------- ------------------------------\n\
  control_files                        string      /ora01/dbfile/O11R2/control01.ctl,\n\
  \                                                 /ora01/dbfile/O11R2/control02.ctl\n\
  ```\n假设 `control02.ctl` 文件已损坏。查询数据字典时，Oracle 会抛出此错误：\n```\nORA-00210: cannot open\
  \ the specified control file\nORA-00202: control file: '/ora01/dbfile/O11R2/control02.ctl'\n\
  ```\n当有一个完好的控制文件可用时，你可以关闭数据库，并将现有的完好控制文件复制到损坏控制文件的名称和位置：\n```sql\nSQL> shutdown\
  \ abort;\n```\n```bash\n$ cp /ora01/dbfile/O11R2/control01.ctl /ora01/dbfile/O11R2/control02.ctl\n\
  ```\n现在，重新启动数据库：\n```sql\nSQL> startup;\n```\n这样，你就可以从现有的控制文件还原一个控制文件。\n\n### 所有控制文件都损坏时的还原\n\
  \n如果丢失了所有控制文件，你可以从备份中还原一个，或者重新创建控制文件。只要你有所有数据文件和任何必需的重做（归档重做和在线重做），就应该能够完全恢复数据库。此场景的步骤如下：\n\
  \n1.  关闭数据库。\n2.  从备份中还原一个控制文件。\n3.  从备份中还原所有数据文件。\n4.  以装载模式启动数据库，并使用 `RECOVER\
  \ DATABASE USING BACKUP CONTROLFILE` 子句启动数据库恢复。\n5.  对于完全恢复，手动应用在线重做日志中包含的重做。\n\
  6.  使用 `RESETLOGS` 子句打开数据库。\n\n\n\n# 第 16 章 ■ 用户管理的备份与恢复\n\n在本例中，数据库的所有控制文件被意外删除，随后\
  \ Oracle 报告了以下错误：\n\n`ORA-00202: control file: '/ora01/dbfile/O11R2/control01.ctl'`\n\
  `ORA-27041: unable to open file`\n\n## 步骤 1：关闭数据库\n\n在这种情况下，您必须关闭数据库，并从备份位置将所有数据文件和控制文件恢复到生产数据库位置。首先，关闭数据库：\n\
  ```sql\nSQL> shutdown abort;\n```\n\n## 步骤 2：从备份中恢复控制文件\n\n此数据库配置了一个控制文件，如所示将其从备份位置复制回来：\n\
  ```bash\n$ cp /oradump/hbackup/O11R2/controlbk.ctl /ora01/dbfile/O11R2/control01.ctl\n\
  ```\n如果使用了多个控制文件，您必须将备份的控制文件复制到 `CONTROL_FILES` 初始化参数中列出的每个控制文件及其位置名称。\n\n## 步骤\
  \ 3：从备份中恢复所有数据文件\n\n作为此恢复过程的一部分，必须从备份中恢复所有数据文件。在此例中，所有备份文件都位于 `/oradump/hbackup/O11R2`\
  \ 目录中：\n```bash\n$ cp /oradump/hbackup/O11R2/*.dbf /ora01/dbfile/O11R2\n```\n在此类恢复场景中，您需要将上次热备份中的所有数据文件复制回来。如果您没有这样做，数据文件头中的\
  \ `SCN` 信息将比控制文件中的 `SCN` 更新。Oracle 无法将重做应用于控制文件以使其追上数据文件（其工作方式恰恰相反：必须将重做应用于数据文件）。\n\
  \n## 步骤 4：在加载模式下启动数据库，并启动数据库恢复\n\n接下来，在加载模式下启动数据库：\n```sql\nSQL> startup mount;\n\
  ```\n将控制文件和数据文件复制回来后，即可执行恢复。Oracle 知道控制文件来自备份（因为它是使用 `ALTER DATABASE BACKUP CONTROLFILE`\
  \ 语句创建的），因此恢复必须使用 `USING BACKUP CONTROLFILE` 子句执行：\n```sql\nSQL> recover database\
  \ using backup controlfile;\n```\n此时，系统会提示您应用归档重做日志文件：\n```\nORA-00279: change 17779631\
  \ generated at 08/21/2010 04:51:22 needed for thread 1\nORA-00289: suggestion :\
  \ /ora02/oraarch/O11R2/1_33_726314508.arc\nORA-00280: change 17779631 for thread\
  \ 1 is in sequence #33\nSpecify log: {<RET>=suggested | filename | AUTO | CANCEL}\n\
  ```\n键入 `AUTO` 以指示恢复过程自动应用所有归档重做日志：\n```\nAUTO\n```\n所有归档重做日志应用后，思考一下如果此时尝试打开数据库会发生什么，这将很有启发意义：\n\
  ```sql\nSQL> alter database open;\n```\n在这种情况下，Oracle 会抛出以下错误：\n```\nORA-01589:\
  \ must use RESETLOGS or NORESETLOGS option for database open\n```\n在此场景中，在线重做日志仍然完好无损，因此通过应用在线重做日志（而不一定存在于归档重做日志中）中存在的重做，完全恢复是可能的。要应用在线重做日志中的内容，首先确定在线重做日志文件的位置和名称：\n\
  ```sql\nselect a.first_change#, b.member\nfrom v$log a, v$logfile b\nwhere a.group#\
  \ = b.group#;\n```\n以下是此示例的部分输出：\n```\nFIRST_CHANGE# MEMBER\n------------- -----------------------------------\n\
  17779560 /ora01/oraredo/O11R2/redo01a.rdo\n17779678 /ora02/oraredo/O11R2/redo02a.rdo\n\
  ```\n现在，重新启动恢复过程：\n```sql\nSQL> recover database using backup controlfile;\n```\n\
  为该数据库生成的最后一个归档重做日志是序列 51。恢复过程会提示一个不存在的归档重做日志：\n```\nORA-00279: change 17815760 generated\
  \ at 08/21/2010 13:21:58 needed for thread 1\nORA-00289: suggestion : /ora02/oraarch/O11R2/1_52_726314508.arc\n\
  ORA-00280: change 17815760 for thread 1 is in sequence #52\n```\n不要向恢复过程提供归档重做日志文件，而是键入一个在线重做日志文件的名称。这会指示恢复过程应用在线重做日志中的任何重做：\n\
  \n\n\n# 第 16 章 ■ 用户管理的备份与恢复\n\n`/ora01/oraredo/O11R2/redo02a.rdo`\n\n当应用正确的联机重做日志时，你应该会看到此消息：`Log\
  \ applied.`\n\n`Media recovery complete.`\n\n至此，数据库已完全恢复。然而，由于恢复过程中使用了备份的控制文件，因此必须使用\
  \ `RESETLOGS` 子句打开数据库：\n```\nSQL> alter database open resetlogs;\n```\n\n成功后，你将看到：\n\
  `Database altered.`\n\n## 执行归档日志模式数据库的不完全恢复\n\n`不完全恢复`意味着你没有还原故障发生前已提交的所有事务。\n\n\
  进行此类恢复时，你是恢复到过去的某个时间点，而事务会丢失。这就是为什么不完全恢复也被称为 `数据库按时间点恢复` (DBPITR)。\n\n不完全恢复并不意味着只还原和恢复数据文件的子集。事实上，在大多数不完全恢复场景中，作为过程的一部分，你必须从备份中还原所有数据文件。如果你不还原所有数据文件，则首先需要将那些不打算参与不完全恢复过程的数据文件离线。任何被离线的数据文件都无法在之后被还原和恢复。\n\
  \n你可能出于许多不同原因需要执行不完全恢复：\n- 你尝试执行完全恢复，但缺少所需的归档重做日志或未归档的联机重做日志信息。\n- 你希望将数据库恢复到过去的某个时间点，就在发生用户错误（如误删数据、删除表等）之前。\n\
  - 你有一个测试环境，其中包含数据库的基线副本。测试完成后，你希望将数据库重置回基线，以便进行新一轮的新测试。\n\n如果你因上述任何原因使用用户管理的不完全恢复，应该考虑使用\
  \ `闪回表` 或 `闪回数据库` 功能。本章稍后将详细讨论这些功能。\n\n你可以通过三种方式执行用户管理的不完全恢复：\n- 基于取消的恢复\n- 基于 SCN\
  \ 的恢复\n- 基于时间的恢复\n\n`基于取消的恢复` 允许你应用归档重做，并在基于归档重做日志文件的边界处暂停过程。例如，假设你正在尝试还原和恢复数据库，并且发现缺少一个归档重做日志。你必须在最后一个完好的归档重做日志点停止恢复过程。你可以使用\
  \ `RECOVER DATABASE` 语句的 `CANCEL` 子句来启动基于取消的不完全恢复：\n```\nSQL> recover database until\
  \ cancel;\n```\n\n如果你想恢复到并包含某个特定的 SCN 号，请使用 `基于 SCN` 的不完全恢复。你可能从告警日志或 `LogMiner`\
  \ 的输出中知道要恢复到的某个特定 SCN 点。使用 `UNTIL CHANGE` 子句执行此类不完全恢复：\n```\nSQL> recover database\
  \ until change 12345;\n```\n\n如果你知道希望停止恢复过程的时间点，请使用 `基于时间` 的不完全恢复。例如，你可能知道某个表在特定时间被删除，并希望将数据库恢复并恢复到该指定时间。基于时间的恢复格式始终如下：`'YYYY-MM-DD:HH24:MI:SS'`。示例如下：\n\
  ```\nSQL> recover database until time '2010-10-21:02:00:00';\n```\n\n执行不完全恢复时，你必须还原计划在不完全恢复完成后保持在线的所有数据文件。以下是执行不完全恢复的步骤：\n\
  1.  关闭数据库。\n2.  从备份中还原所有数据文件。\n3.  以挂载模式启动数据库。\n4.  应用重做（前滚）到所需点，然后暂停恢复过程（使用基于取消、SCN\
  \ 或时间的恢复）。\n5.  使用 `RESETLOGS` 子句打开数据库。\n\n以下示例执行基于取消的不完全恢复。如果数据库是打开的，则将其关闭：\n```\n\
  $ sqlplus / as sysdba\nSQL> shutdown abort;\n```\n\n接下来，从备份（冷备份或热备份均可）复制 `所有` 数据文件。此示例从热备份还原所有数据文件。对于本示例，当前控制文件完好无损，无需还原。以下是用于还原数据库的部分操作系统复制命令片段：\n\
  ```\n$ cp /oradump/cbackup/O11R2/system01.dbf /ora01/dbfile/O11R2/system01.dbf\n\
  $ cp /oradump/cbackup/O11R2/sysaux01.dbf /ora01/dbfile/O11R2/sysaux01.dbf\n$ cp\
  \ /oradump/cbackup/O11R2/undotbs01.dbf /ora02/dbfile/O11R2/undotbs01.dbf\n$ cp /oradump/cbackup/O11R2/users01.dbf\
  \ /ora02/dbfile/O11R2/users01.dbf\n$ cp /oradump/cbackup/O11R2/appdata.dbf /ora01/dbfile/O11R2/appdata.dbf\n\
  ```\n\n数据文件复制回去后，就可以启动恢复过程。此示例执行基于取消的不完全恢复：\n```\n$ sqlplus / as sysdba\nSQL> startup\
  \ mount;\nSQL> recover database until cancel;\n```\n\n此时，Oracle 恢复进程会建议应用一个归档重做日志：\n\
  `ORA-00279: change 17851736 generated at 08/22/2010 07:33:42 needed for thread 1`\n\
  `ORA-00289: suggestion : /ora02/oraarch/O11R2/1_3_727625398.arc`\n`ORA-00280: change\
  \ 17851736 for thread 1 is in sequence #3`\n`Specify log: {<RET>=suggested | filename\
  \ | AUTO | CANCEL}`\n\n在此示例中，你已知你拥有的最后一个完好的归档重做日志是序列 7，因此将重做应用到该点，然后输入 `CANCEL`：\n\
  `CANCEL`\n\n这会停止恢复过程。现在，你可以使用 `RESETLOGS` 子句打开数据库：\n```\nSQL> alter database open\
  \ resetlogs;\n```\n\n数据库已打开到过去的某个时间点。由于并非所有重做都已应用，因此该恢复被视为不完全恢复。\n\n## 闪回表\n\n在旧版本的数据库中，如果表被意外删除，你必须执行以下操作来恢复该表：\n\
  1.  将数据库的备份还原到测试数据库。\n2.  执行不完全恢复，直到该表被删除的时间点。\n3.  导出该表。\n4.  将该表导入生产数据库。\n\n此过程可能非常耗时且消耗资源。它需要额外的服务器资源以及\
  \ DBA 的时间和精力。\n\nOracle 在近期版本中引入了 `闪回` 功能；它可以让你快速恢复意外删除的表。Oracle 将 `闪回` 一词应用于几种不同的数据库功能，这可能令人困惑。关于闪回表，Oracle\
  \ 提供了两种截然不同的闪回操作：\n- `FLASHBACK TABLE TO BEFORE DROP` 可以快速撤消先前删除的表。此功能使用回收站。\n-\
  \ `FLASHBACK TABLE` 可闪回到最近的某个时间点，以撤消不需要的数据操作语言 (DML) 语句的影响。你可以闪回到 SCN、时间戳或还原点。\n\
  \nOracle 引入 `FLASHBACK TABLE TO BEFORE DROP` 是为了让你能够快速恢复被删除的表。\n\n从 Oracle Database\
  \ 10 `g` 开始，当你删除表时，如果没有指定 `PURGE` 子句，Oracle 不会删除该表——而是会重命名该表。你删除的任何表（Oracle 实际上重命名了它们）都会被放入一个名为\
  \ `回收站` 的逻辑容器中。回收站为你提供了一种查看和管理已删除对象的有效方式。\n\n**注意** 要使用 `闪回表` 功能，你不需要实施闪回恢复区 (FRA)。也不需要启用\
  \ `闪回数据库`。\n\n`FLASHBACK TABLE TO BEFORE DROP` 操作仅在你的数据库启用了回收站功能（默认启用）时有效。你可以按如下方式检查回收站的状态：\n\
  ```\nSQL> show parameter recyclebin\nNAME TYPE VALUE\n------------------------------------\
  \ ----------- ------------------------------\nrecyclebin string on\n```\n\n### FLASHBACK\
  \ TABLE TO BEFORE DROP\n\n\n\n# Oracle 闪回技术\n\n## 闪回表\n\n### 闪回到删除前\n\n当你删除一个表时，如果没有指定`PURGE`子句，Oracle\
  \ 会使用一个系统生成的名称来重命名该表。因为表并未被真正删除，所以你可以使用`FLASHBACK TABLE TO BEFORE DROP`来指示 Oracle\
  \ 使用其原始名称重命名该表。下面是一个示例。假设`INV`表被意外删除：\n\n```sql\nSQL> drop table inv;\n```\n\n通过查看回收站的内容来验证表已被重命名：`SQL>\
  \ show recyclebin;`\n\n```\nORIGINAL NAME RECYCLEBIN NAME OBJECT TYPE DROP TIME\n\
  ---------------- ------------------------------ ------------ -------------------\n\
  INV BIN$jmx7BIkFlYrgQAB/AQBIgg==$0 TABLE 2010-08-22:10:36:11\n```\n\n`SHOW RECYCLEBIN`语句只显示已被删除的表。要获得更完整的重命名对象信息，请查询`RECYCLEBIN`视图：\n\
  \n```sql\nselect\n  object_name\n  ,original_name\n  ,type\nfrom recyclebin;\n```\n\
  \n输出如下：\n\n```\nOBJECT_NAME ORIGINAL_NAME TYPE\n------------------------------ --------------------\
  \ -------------------------\nBIN$jmx7BIkFlYrgQAB/AQBIgg==$0 INV TABLE\nBIN$jmx7BIkElYrgQAB/AQBIgg==$0\
  \ INV_TRIG TRIGGER\nBIN$jmx7BIkDlYrgQAB/AQBIgg==$0 INV_PK INDEX\n```\n\n在此输出中，当对象被删除时，该表的主键也被重命名。要恢复该表，请执行以下操作：\n\
  \n```sql\nSQL> flashback table inv to before drop;\n```\n\n这会将表恢复为其原始名称。不过，此语句不会将索引恢复为原始名称：\n\
  \n```sql\nSQL> select index_name from user_indexes where table_name='INV';\n```\n\
  \n```\nINDEX_NAME\nBIN$jmx7BIkDlYrgQAB/AQBIgg==$0\n```\n\n在此场景中，你必须重命名索引：\n\n```sql\n\
  SQL> alter index \"BIN$jmx7BIkDlYrgQAB/AQBIgg==$0\" rename to inv_pk;\n```\n\n你必须以相同的方式重命名任何触发器对象。如果在删除表之前存在引用约束，则必须手动重新创建它们。\n\
  \n如果由于某些原因，你需要将表闪回到一个不同于原始名称的名称，可以按如下方式进行：\n\n```sql\nSQL> flashback table inv to\
  \ before drop rename to inv_bef;\n```\n\n## 闪回到之前的某个时间点\n\n闪回到之前某个时间点的闪回表功能与`FLASHBACK\
  \ TABLE TO BEFORE DROP`完全不同。闪回到过去的某个时间点使用的是`UNDO`表空间中的信息。过去的那个时间点取决于你的`UNDO`表空间保留期，它指定了`UNDO`信息被保留的最短时间。\n\
  \n如果所需的闪回信息不在`UNDO`表空间中，你将收到如下错误：\n`ORA-01555: snapshot too old`\n\n换句话说，要能够闪回到过去的某个时间点，`UNDO`表空间中的所需信息一定不能被覆盖。\n\
  \n### 闪回到 SCN\n\n假设你正在测试一个应用程序功能，并且希望快速将表恢复到特定的`SCN`。作为应用程序测试的一部分，你在测试开始前记录了`SCN`：\n\
  \n```sql\nSQL> select current_scn from v$database;\n```\n\n```\nCURRENT_SCN\n-----------\n\
  \    17879789\n```\n\n你执行了一些测试，然后希望将表闪回到之前记录的`SCN`。\n\n首先，确保为表启用了行移动：\n\n```sql\n\
  SQL> alter table inv enable row movement;\n```\n\n```sql\nSQL> flashback table inv\
  \ to scn 17879789;\n```\n\n现在，该表应反映在`FLASHBACK`语句中指定的历史`SCN`值时已提交的事务。\n\n### 闪回到时间戳\n\
  \n你也可以将表闪回到之前的某个时间点。例如，要将表闪回到 15 分钟前，首先启用行移动，然后使用`FLASHBACK TABLE`：\n\n```sql\n\
  SQL> alter table inv enable row movement;\n```\n\n```sql\nSQL> flashback table inv\
  \ to timestamp(sysdate-1/96) ;\n```\n\n你提供的时间戳必须评估为 Oracle 时间戳的有效格式。你也可以显式指定一个时间，如下所示：\n\
  \n```sql\nSQL> flashback table inv to timestamp\n     to_timestamp('22-aug-10 12:07:33','dd-mon-yy\
  \ hh:mi:ss');\n```\n\n### 闪回到还原点\n\n*还原点*是与数据库中的时间戳或`SCN`相关联的名称。你可以创建一个还原点，其中包含数据库的当前`SCN`，如下所示：\n\
  \n```sql\nSQL> create restore point point_a;\n```\n\n之后，如果你决定将表闪回到该还原点，首先启用行移动：\n\
  \n```sql\nSQL> alter table inv enable row movement;\n```\n\n```sql\nSQL> flashback\
  \ table inv to restore point point_a;\n```\n\n现在，该表应包含与指定还原点相关联的`SCN`时的事务。\n\n##\
  \ 闪回数据库\n\n闪回数据库功能允许你执行不完全恢复，恢复到过去的某个时间点。闪回数据库使用存储在闪回日志中的信息；它不依赖于还原数据库文件（如冷备份、热备份或`RMAN`）。在某些情况下，闪回数据库可以比执行用户管理的不完全恢复（需要你从备份中复制数据文件）更快地将数据库恢复到过去的某个时间点。\n\
  \n**提示** 闪回数据库不能替代数据库备份。如果你遇到数据文件的介质故障，无法使用闪回数据库闪回到故障发生前。如果数据文件损坏，你必须使用物理备份（热备份、冷备份或`RMAN`）进行还原和恢复。\n\
  \n在希望一致地将数据库重置到过去某个时间点的情况下，闪回数据库功能可能是可取的。例如，你可能希望定期将测试或培训数据库设置回已知的基线。或者，你可能正在升级一个应用程序，并且在对应用程序数据库对象进行大规模更改之前，标记起始点。升级后，如果情况不顺利，你希望能够快速将数据库重置到升级发生前的时间点。\n\
  \n闪回数据库有几个先决条件：\n\n- 数据库必须处于归档日志模式。\n- 必须使用快速恢复区。\n- 必须启用闪回数据库功能。\n\n请参阅本章前面关于启用归档日志模式和使用快速恢复区的部分。你可以使用以下`SQL*Plus`语句验证这些功能的状态：\n\
  \n```sql\nSQL> archive log list;\n```\n\n```sql\nSQL> show parameter db_recovery_file_dest;\n\
  ```\n\n要启用闪回数据库功能，将数据库切换到闪回模式，如下所示：\n\n```sql\nSQL> alter database flashback on;\n\
  ```\n\n**注意** 在 Oracle Database 10*g*中，数据库必须处于加载模式才能启用闪回数据库。\n\n你可以按如下方式验证闪回状态：\n\
  \n```sql\nSQL> select flashback_on from v$database;\n```\n\n```\nFLASHBACK_ON\n\
  ------------------\nYES\n```\n\n启用闪回数据库后，你可以使用以下查询查看快速恢复区中的闪回日志：\n\n```sql\nselect\n\
  \  name\n  ,log#\n  ,thread#\n  ,sequence#\n  ,bytes\nfrom v$flashback_database_logfile;\n\
  ```\n\n你可以闪回的时间范围由`DB_FLASHBACK_RETENTION_TARGET`参数决定。它指定了数据库可以闪回的时间上限（以分钟为单位）。\n\
  \n你可以通过运行以下`SQL`来查看你可以闪回数据库的最旧`SCN`和时间：\n\n```sql\nselect\n  oldest_flashback_scn\n\
  \  ,to_char(oldest_flashback_time,'dd-mon-yy hh24:mi:ss')\nfrom v$flashback_database_log;\n\
  ```\n\n如果由于任何原因需要禁用闪回数据库，可以按如下方式将其关闭：\n\n```sql\nSQL> alter database flashback off;\n\
  ```\n\n你可以使用`RMAN`或`SQL*Plus`来回闪数据库。你可以使用以下方法之一指定过去的时间点：\n\n- `SCN`\n- 时间戳\n- 还原点\n\
  - 上次`RESETLOGS`操作（仅适用于`RMAN`）\n\n此示例创建了一个还原点：\n\n```sql\nSQL> create restore point\
  \ flash_1;\n```\n\n接下来，应用程序执行一些测试，之后数据库被闪回到该还原点，以便可以开始新一轮测试：\n\n```sql\nSQL> shutdown\
  \ immediate;\n```\n\n```sql\nSQL> startup mount;\n```\n\n```sql\nSQL> flashback\
  \ database to restore point flash_1;\n```\n\n```sql\nSQL> alter database open resetlogs;\n\
  ```\n\n\n\n# 第 16 章：用户管理的备份与恢复\n\n## 总结\n\n本章介绍了如今已较少被教授或使用的备份与恢复技术。大多数 DBA 正在（也应该）使用\
  \ RMAN 来满足其 Oracle B&R 需求。然而，理解冷备份和热备份的工作原理至关重要。你可能会遇到这样的咨询场景：某个环境仍在使用旧技术，现在需要你来恢复和修复其数据库，或者协助他们迁移到\
  \ RMAN。在这些场景中，你必须完全理解旧的备份技术。\n\n本章还讨论了使用冷备份和热备份进行恢复的技术。\n\n理解每个步骤发生的情况以及为何需要该步骤，对于全面掌握\
  \ Oracle B&R 架构至关重要。这种意识在你使用 Oracle 工具（如 RMAN（B&R）和 Data Guard（灾难恢复、高可用性和复制））进行故障排查时，会转化为关键技能。\n\
  \n既然你已深入理解了 Oracle B&R 的机制，接下来就可以研究 RMAN 了。本书接下来的几章将探讨如何为生产环境配置和使用 RMAN。\n\n![](img/index-491_1.png)\n\
  \n![](img/index-492_1.png)\n\n# 第 17 章：配置 RMAN\n\n`PL/SQL` 包：RMAN 使用两个内部的`PL/SQL`包（由`SYS`拥有）来执行\
  \ B&R 任务：`DBMS_RCVMAN` 和 `DBMS_BACKUP_RESTORE`。`DBMS_RCVMAN`访问控制文件中的信息，并将其传递给 RMAN\
  \ 服务器进程。`DBMS_BACKUP_RESTORE`包执行了 RMAN 的大部分工作。例如，该包创建系统调用，指导通道进程执行 B&R 操作。\n\n内存缓冲区（`PGA`或`SGA`）：RMAN\
  \ 在程序全局区（有时也在系统全局区）中使用一个内存区域作为缓冲区，用于读取数据文件并将后续块复制到备份文件中。\n\n辅助数据库：RMAN 将目标数据库的数据文件还原到该数据库，用于克隆数据库、创建\
  \ Data Guard 备用地或执行数据库时间点恢复。\n\n通道：Oracle 服务器进程，用于处理正在备份的文件与备份设备（磁盘或磁带）之间的 I/O。\n\
  \n备份与备份集：当你运行 RMAN `BACKUP`命令时，它会创建一个或多个备份集。`备份集`是 RMAN 内部的一个逻辑结构，用于对备份片文件进行分组。你可以将备份集与备份片的关系，类比为表空间与数据文件的关系：一个是逻辑结构，另一个是物理文件。\n\
  \n备份片文件：RMAN 的二进制备份文件。每个逻辑备份集由一个或多个备份片文件组成。这些是 RMAN 在磁盘或磁带上创建的物理文件。它们是专有的二进制格式文件，只能由\
  \ RMAN 读写。一个备份片可以包含来自许多不同数据文件的块。备份片文件通常比数据文件小，因为备份片只包含数据文件中已使用的块。\n\n映像副本：一种备份类型，RMAN\
  \ 创建数据文件、归档重做日志文件或控制文件的完全相同的副本。映像副本可以由操作系统实用程序（如 Linux 的`cp`和`mv`命令）直接操作。映像副本是增量更新映像备份的一部分。如果需要快速还原，有时使用映像副本比备份集更可取。\n\
  \n恢复目录：一个可选的数据库模式，包含用于存储 RMAN 备份操作元数据信息的表。Oracle 强烈建议使用恢复目录，因为它提供了更多的 B&R 选项。\n\n\
  介质管理器：第三方软件，允许 RMAN 直接备份文件到磁带。当没有足够的磁盘空间直接备份，或者灾难恢复要求需要备份到易于异地转移的存储时，备份到磁带是理想的。\n\
  \n快速恢复区：一个可选的磁盘区域，RMAN 可用于存储备份（以前称为闪回恢复区）。你还可以使用快速恢复区来多路复用控制文件和在线重做日志。使用数据库初始化参数`DB_RECOVERY_FILE_DEST_SIZE`和`DB_RECOVERY_FILE_DEST`来实例化一个快速恢复区。\n\
  \n快照控制文件：当备份控制文件或与恢复目录（如果正在使用）同步时，RMAN 需要控制文件的一致性视图。在这些情况下，RMAN 首先创建控制文件的临时副本（快照）。这允许\
  \ RMAN 使用一个保证在备份控制文件或与恢复目录同步期间不会更改的控制文件版本。\n\n你可以使用 RMAN 创建几种类型的备份：\n\n完全备份：备份与数据文件相关的所有已修改块。完全备份并不意味着备份整个数据库。例如，你可以对一个数据文件进行完全备份。\n\
  \n增量级别 0 备份：备份与完全备份相同的块。唯一的区别是，级别 0 备份可以与其他增量备份一起使用，而完全备份不能。\n\n增量级别 1 备份：仅备份自上次备份以来修改过的块。级别\
  \ 1 增量备份可以是差异型或累积型。`差异型`级别 1 备份备份自上次级别 0 或级别 1 备份以来所有修改过的块。`累积型`级别 1 备份备份自上次级别 0\
  \ 备份以来所有更改过的块。\n\n增量更新备份：首先创建数据文件的映像副本，随后的增量备份会与该映像副本合并。这是使用映像副本进行备份的一种高效方式。使用增量更新备份进行介质恢复速度很快，因为在还原过程中使用的是数据文件的映像副本。\n\
  \n块更改跟踪：数据库功能，用于跟踪数据库中已更改的块。更改块的记录保存在一个二进制文件中。RMAN 可以利用该二进制文件的内容来提高增量备份的性能：RMAN\
  \ 无需扫描数据文件中所有已修改的块，而是可以通过二进制块更改跟踪来确定哪些块已更改。\n\n现在你已理解了 RMAN 的架构组件以及可以创建的备份类型，可以启动\
  \ RMAN 并为你的环境配置它了。\n\n## 启动 RMAN\n\n要连接到 RMAN，你需要建立以下内容：\n\n*   操作系统环境变量\n*   访问具有适当权限的操作系统账户或具有`SYSDBA`权限的数据库用户\n\
  \n连接 RMAN 的最简单方法是登录到目标数据库所在的服务器，并以 Oracle 软件所有者（在 Linux/Unix 系统上通常名为`oracle`）的身份登录。当你以`oracle`登录时，需要在使用`rman`、`sqlplus`等实用程序之前建立几个操作系统变量。第\
  \ 2 章详细介绍了如何设置这些必需的操作系统变量。\n\n至少需要设置`ORACLE_HOME`和`ORACLE_SID`。此外，如果`PATH`变量包含`ORACLE_HOME/bin`目录会很方便。这是包含\
  \ Oracle 实用程序的目录。\n\n建立好操作系统变量后，可以从操作系统调用 RMAN，如下所示：460\n\n![](img/index-495_1.png)\n\
  \n■ **注意** 如果你想通过 Oracle Net 远程连接到 RMAN，需要首先实现一个密码文件。\n\n## RMAN 架构决策\n\n\n\n# 第\
  \ 17 章 配置 RMAN\n\n如果您的数据库启用了归档，您可以开箱即用地使用`RMAN`运行如下命令来备份整个目标数据库：\n\n```\n$ rman\
  \ target /\n\nRMAN> backup database;\n```\n\n如果遇到介质故障，您可以按如下方式恢复所有数据文件：\n\n```\n\
  RMAN> shutdown immediate;\n\nRMAN> startup mount;\n\nRMAN> restore database;\n```\n\
  \n数据库恢复后，您可以完全恢复它：\n\n```\nRMAN> recover database;\n\nRMAN> alter database open;\n\
  ```\n\n这样就万事大吉了吗？不，还不完全是。`RMAN`的默认属性设置对于简单的备份需求来说是合理的。开箱即用的`RMAN`设置可能适用于小型开发或测试数据库。但对于任何类型的业务关键型数据库，您需要仔细考虑诸如备份存储位置、在磁盘或磁带上保留备份多长时间、哪些`RMAN`功能适合数据库等事项。本章后续部分将引导您了解在生产环境中实施`RMAN`时需要考虑的许多备份与恢复（`B&R`）架构决策。`RMAN`拥有大量稳健的选项用于自定义`B&R`；通常，您不需要实现其许多功能。但是，每次使用`RMAN`备份生产数据库时，您都应仔细权衡每个决策点，并决定是否需要某个属性。\n\
  \n表 17-1 总结了`RMAN`的实施决策和建议。表中的每个决策点都将在本章后续部分详细阐述。许多数据库管理员可能会不同意其中一些建议；这没关系。关键在于您需要考虑每个架构方面，并确定什么最适合您的业务需求。\n\
  \n## 表 17-1 架构决策与建议概述\n\n| 决策点 | 建议 |\n| :--- | :--- |\n| 1. 远程或本地运行`RMAN`客户端 |\
  \ 在目标数据库服务器上本地运行客户端。 |\n| 2. 指定备份用户 | 除非安全要求另有规定，否则使用`SYS`。 |\n| 3. 使用联机或脱机备份 |\
  \ 取决于您的业务需求。大多数生产数据库需要联机备份，这意味着您必须启用归档。 |\n| 4. 设置归档重做日志的目标位置和文件格式 | 如果您使用闪回恢复区（`FRA`），归档日志将以默认格式写入其中。我更喜欢使用`LOG_ARCHIVE_DEST_N`初始化参数在`FRA`之外明确设置位置。\
  \ |\n| 5. 配置`RMAN`备份位置和文件格式 | 取决于您的业务需求。有些站点需要磁带备份。如果使用磁盘，请将备份放在`FRA`中或通过通道设置指定位置。我更倾向于不使用`FRA`，而是通过`CONFIGURE`命令明确指定位置和文件格式。\
  \ |\n| 6. 设置控制文件的自动备份 | 始终启用控制文件的自动备份。 |\n| 7. 指定控制文件自动备份的位置 | 将其放在`FRA`中或配置一个位置。我更倾向于将控制文件的自动备份写入与数据库备份相同的位置（通常在`FRA`之外）。\
  \ |\n| 8. 备份归档重做日志 | 取决于您的业务需求。对于许多环境，我使用与备份数据库相同的命令每天备份归档重做日志。 |\n| 9. 确定快照控制文件的位置\
  \ | 使用默认位置。 |\n| 10. 使用恢复目录 | 取决于您的业务需求。对于许多环境，我不使用恢复目录。`Oracle`建议您使用恢复目录。如果`RMAN`保留策略大于`CONTROL_FILE_RECORD_KEEP_TIME`，则我建议您使用恢复目录。\
  \ |\n| 11. 使用介质管理器 | 直接备份到磁带所需。 |\n| 12. 设置`CONTROL_FILE_RECORD_KEEP_TIME`初始化参数\
  \ | 通常，默认的七天足够。 |\n| 13. 配置`RMAN`的备份保留策略 | 取决于您的数据库和业务需求。 |\n\n\n# 第 17 章 ■ 配置 RMAN\n\
  \n## 14. 配置归档重做日志的删除策略\n这取决于您的数据库和业务策略要求。在许多场景下，将备份保留策略应用于归档重做日志就足够了（这是默认行为）。\n\n\
  **决策点**\n\n**建议**\n\n## 15. 设置并行度\n取决于可用的硬件资源和业务需求。对于大多数具有多个 CPU 的生产服务器，我将并行度配置为\
  \ 2 或更高。\n\n## 16. 使用备份集还是映像副本\n我倾向于使用备份集。备份集通常更小，也更容易管理。\n\n## 17. 使用增量备份\n对于大型数据库，如果在两次备份之间只有很小比例的数据库发生更改，并且您希望节省磁盘空间，则使用增量备份。\n\
  \n## 18. 使用增量更新的备份\n如果您需要数据文件的映像副本，请使用此方法。\n\n## 19. 使用块更改跟踪\n使用此功能以提高增量备份的性能。\n\
  \n## 20. 配置二进制压缩\n取决于您的业务要求。压缩备份占用的空间更少，但备份和还原操作需要更多的 CPU 资源（和时间）。\n\n## 21. 配置加密\n\
  取决于您的业务要求。\n\n## 22. 配置其他设置\n您可以设置许多与通道相关的属性，例如备份集大小和备份片大小。根据需要进行配置。\n\n## 1. 远程或本地运行\
  \ RMAN 客户端\n可以从远程服务器运行`rman`工具，并通过 Oracle Net 连接到目标数据库：\n```\n$ rman target sys/foo@remote_db\n\
  ```\n这使您可以从一个中心位置在不同的远程服务器上运行 RMAN 备份。当远程运行 RMAN 时，备份文件总是在目标数据库服务器上创建。\n\n只要可能，我会在目标服务器上本地运行`rman`客户端并这样连接：\n\
  ```\n$ rman target /\n```\n此方法简单且足以满足大多数需求。您不必担心网络问题或密码文件问题，并且`rman`客户端和目标数据库之间永远不会存在兼容性问题。如果远程运行\
  \ RMAN，则需要确保远程的`rman`可执行文件与目标数据库兼容。例如，您运行的远程`rman`可执行文件是 Oracle Database 10*g*版本的\
  \ RMAN 客户端，是否可以将该客户端连接到远程的 Oracle Database 8*i*目标数据库？如果在目标服务器上本地运行`rman`客户端，则永远不会出现兼容性问题，因为`rman`客户端始终与目标数据库版本相同。\n\
  \n## 2. 指定备份用户\n如前一节所述，RMAN 要求您使用具有`SYSDBA`权限的数据库用户。\n无论我是从命令行运行 RMAN 还是在脚本中调用 RMAN，在大多数场景中，我都会直接以`SYS`身份连接到目标数据库。例如，以下是我如何从命令行连接到\
  \ RMAN：\n```\n$ rman target /\n```\n一些 DBA 不使用这种方法；他们更喜欢设置一个独立于`SYS`的用户，并以安全顾虑为由这样做。\n\
  我更喜欢直接使用`SYS`账户，因为在服务器上本地连接到 RMAN 时，无需指定用户名和密码。这意味着您永远不必将用户名和密码硬编码到任何备份脚本中，也不必在命令行上指定可能被不良开发人员或旁观的经理看到的用户名和密码。\n\
  \n## 3. 使用联机或脱机备份\n大多数生产数据库都有 24x7 的可用性要求。因此，您唯一的选择是在线 RMAN 备份。您的数据库必须处于归档日志模式才能进行在线备份。您需要仔细考虑将归档重做日志放在何处、如何格式化它们、备份频率以及在删除前保留多长时间。这些主题将在后续章节中讨论。\n\
  \n# 第 17 章 配置 RMAN\n\n`注意` 如果您执行脱机备份，必须使用 `IMMEDIATE`、`NORMAL` 或 `TRANSACTIONAL`\
  \ 选项关闭数据库，然后将其置于 `装载模式`。`RMAN` 需要数据库处于 `装载模式` 才能读写 `控制文件`。\n\n## 4. 设置归档重做日志目的地和文件格式\n\
  \n启用 `归档重做日志` 模式是进行在线备份的先决条件。关于 `归档重做日志` 目的地和格式的架构决策以及如何启用/禁用 `归档日志` 模式的完整讨论，请参见第\
  \ 16 章。\n\n当启用 `归档日志` 模式时，`Oracle` 会将 `归档重做日志` 写入以下一个或多个位置（您可以将 `归档重做日志` 配置为同时写入\
  \ `FRA` 和您通过初始化参数手动设置的其他几个位置）：\n\n- 默认位置\n- `FRA`（快速恢复区）\n- 通过 `LOG_ARCHIVE_DEST_N`\
  \ 初始化参数指定的位置\n\n如果您不使用 `FRA`，并且也没有通过 `LOG_ARCHIVE_DEST_N` 初始化参数显式设置 `归档重做日志` 目的地，那么默认情况下，`归档重做日志`\
  \ 会被写入一个与 `操作系统` 相关的位置。在许多 `Linux/Unix` 系统上，默认位置是 `ORACLE_HOME/dbs/arch` 目录。`归档重做日志`\
  \ 的默认文件名格式是 `%t_%s_%r.dbf`。\n\n如果您启用了 `FRA`，那么默认情况下，`归档重做日志` 会被写入 `FRA` 中的一个目录。在\
  \ `FRA` 中创建的 `归档重做日志` 文件的默认名称格式是 `Oracle 托管文件` 格式。例如：`/<fra>/<db_name>/archivelog/<YYYY_MM_DD>/o1_mf_1_1078_68dx5dyj_.arc`\n\
  \n`Oracle` 推荐使用 `FRA`。我个人倾向于不使用 `FRA`，因为当 `FRA` 空间满且旧文件未能及时清除时，我不希望遇到数据库挂起的情况。相反，我更喜欢使用\
  \ `LOG_ARCHIVE_DEST_N` 参数来设置 `归档重做日志` 文件的位置。这是一个例子：`log_archive_dest_1='LOCATION=/oraarch1/CHNPRD'`\n\
  \n我也倾向于为默认的 `归档日志` 文件名格式使用这个：`log_archive_format='%t_%s_%r.arc'`\n\n有时 `DBA` 会使用\
  \ `.dbf` 作为数据文件和 `归档重做日志` 文件的扩展名。这种格式避免了在识别文件是 `归档重做日志` 文件还是活动的数据库数据文件时产生潜在的混淆。\n\
  \n## 5. 配置 RMAN 备份位置和文件格式\n\n当您执行基于磁盘的 `BACKUP` 命令时，`RMAN` 会在以下位置之一创建备份片：\n\n- 默认位置\n\
  - `FRA`\n- 通过 `BACKUP` 或 `FORMAT` 命令指定的位置\n\n如果您没有配置任何 `RMAN` 变量，也没有设置 `FRA`，默认情况下\
  \ `RMAN` 会分配一个基于磁盘的通道，并将备份文件写入默认位置。例如，您无需配置任何 `RMAN` 参数即可运行以下命令：\n\n```\nRMAN> backup\
  \ database;\n```\n\n如果未配置任何内容，`RMAN` 会分配一个基于磁盘的通道，并将备份写入默认的磁盘位置。此位置因 `操作系统` 而异。在许多\
  \ `Linux/Unix` 环境中，默认位置是 `ORACLE_HOME/dbs`。创建的备份文件的默认名称格式是 `Oracle 托管文件` 格式。例如：`<ORACLE_HOME>/dbs/01ln9g7e_1_1`\n\
  \n在备份到磁盘时，如果您没有明确指示 `RMAN` 将备份写入特定位置（通过 `FORMAT` 或 `CONFIGURE` 命令），并且您正在使用 `FRA`，那么\
  \ `RMAN` 会自动将备份文件写入 `FRA` 中的目录。在 `FRA` 中创建的备份文件的默认名称格式是 `Oracle 托管文件` 格式。例如：`/<fra>/<db_name>/backupset/<YYYY_MM_DD>/o1_mf_nnndf_TAG20100907T025402_68czfbdf_.bkp`\n\
  \n我通常不使用 `FRA` 来放置 `RMAN` 备份。在我工作的许多环境中，单个挂载点上没有足够的磁盘空间来容纳整个数据库备份的大小。在这种情况下，您需要分配两个或更多指向不同挂载点的通道。在这些环境中使用\
  \ `FRA` 有些笨拙。\n\n此外，出于性能原因，您可能希望指示 `RMAN` 写入多个磁盘位置。如果您能确保不同的挂载点基于不同的物理磁盘并由独立的控制器写入，您可以通过分配指向不同挂载点的多个通道来减少\
  \ `I/O` 争用。\n\n当您使用 `FRA` 时，`RMAN` 在给定日期首次备份数据库时会自动创建单独的目录。我更喜欢将备份写入一个目录，而不是按日期分开目录和备份。我发现如果为每个服务器上的每个数据库使用一个标准目录，会更易于管理、维护和排查备份问题。\n\
  \n如果您不想将 `RMAN` 备份文件放在 `FRA` 中，有几种方法可以直接指定备份位置：\n\n- `BACKUP...FORMAT`\n- `CONFIGURE\
  \ CHANNEL...FORMAT`\n\n在发出 `BACKUP` 命令时，您可以直接指定希望备份放置的位置。例如：\n\n```\nRMAN> backup\
  \ database format '/ora01/O11R2/rman/rman_%U.bkp';\n```\n\n这是由 `RMAN` 生成的对应文件：`/ora01/O11R2/rman/rman_05ln9hk6_1_1.bkp`\n\
  \n这里的 `%U` 指示 `RMAN` 为备份文件名动态构建一个唯一的字符串。在大多数情况下需要唯一的名称，因为 `RMAN` 不会覆盖已存在的文件。\n\n\
  这一点很重要，因为如果您指示 `RMAN` 并行写入，它需要为每个通道创建唯一的文件名。例如：\n\n```\nRMAN> configure device type\
  \ disk parallelism 2;\n```\n\n现在，当您运行此命令时，`RMAN` 会分配多个通道，并行写入两个不同的备份文件。格式字符串中的 `%U`\
  \ 保证创建的文件名是唯一的。\n\n我通常不使用 `BACKUP...FORMAT` 语法来指定 `RMAN` 备份的位置。我更喜欢使用 `CONFIGURE\
  \ CHANNEL...FORMAT` 命令。这是因为我通常需要写入多个磁盘位置，并且需要灵活性来指定位于不同挂载点上的目录。以下是一个使用 `CONFIGURE\
  \ CHANNEL...FORMAT` 的典型配置：\n\n```\nRMAN> configure device type disk parallelism\
  \ 3;\nRMAN> configure channel 1 device type disk format '/ora01/O11R2/rman/rman1_%U.bk';\n\
  RMAN> configure channel 2 device type disk format '/ora02/O11R2/rman/rman2_%U.bk';\n\
  RMAN> configure channel 3 device type disk format '/ora03/O11R2/rman/rman3_%U.bk';\n\
  ```\n\n在这些代码行中，您应该将设备类型的并行度配置为与您分配的通道数相匹配。`RMAN` 只分配由并行度指定的通道数；其他配置的通道将被忽略。例如，如果您指定并行度为\
  \ 2，那么无论您通过 `CONFIGURE CHANNEL` 命令配置了多少通道，`RMAN` 都只分配两个通道。\n\n在此配置通道的示例中，假设 `BACKUP`\
  \ 命令如下发出：`RMAN> backup database;`\n\n`RMAN` 会分配三个通道，全部位于不同的挂载点（`/ora01`, `/ora02`,\
  \ `/ora03`），并行写入指定位置。`RMAN` 会在这三个位置创建它认为创建数据库备份所必需的尽可能多的备份片。\n\n## 6. 设置控制文件的自动备份\n\
  \n您应该始终配置 `RMAN`，以便在运行任何 `RMAN BACKUP` 或 `COPY` 命令后，或者在您对数据库进行导致 `控制文件` 更新的物理更改（如添加/删除数据文件）后，自动备份\
  \ `控制文件`。使用 `SHOW` 命令显示 `控制文件` 自动备份的当前设置：\n\n```\nRMAN> show controlfile autobackup;\n\
  ```\n\n这是一些示例输出：\n\n```\nRMAN configuration parameters for database with db_unique_name\
  \ O11R2 are:\nCONFIGURE CONTROLFILE AUTOBACKUP OFF;\n```\n\n下面的代码行展示了如何启用 `控制文件`\
  \ 自动备份功能：`RMAN> configure controlfile autobackup on;`\n\n\n控制文件的自动备份总是会进入其专属的备份集。当启用控制文件自动备份时，如果你使用的是\
  \ `spfile`，它将与控制文件一起自动备份。\n\n若因任何原因你想禁用控制文件的自动备份，可以按如下方式操作：\n```\nRMAN> configure\
  \ controlfile autobackup off;\n```\n\n`注意` 如果控制文件的自动备份处于关闭状态，那么每当你备份数据文件 1（SYSTEM\
  \ 表空间数据文件）时，`RMAN` 都会自动备份控制文件。\n\n## 指定控制文件自动备份的位置\n\n当你启用控制文件自动备份时，`RMAN` 会在以下位置之一创建控制文件的备份：\n\
  \n- 默认位置\n- `FRA`（快速恢复区）\n- 通过 `BACKUP` 或 `FORMAT` 命令指定的位置\n\n如果你未使用 `FRA` 或未为控制文件自动备份指定位置，则控制文件的自动备份会写入一个依赖于操作系统的默认位置。在许多\
  \ Linux/Unix 环境中，默认位置是 `ORACLE_HOME/dbs`。例如：\n```\n/oracle/app/oracle/product/11.2.0/db_1/dbs/c-3453199553-20100907-04\n\
  ```\n\n如果你启用了 `FRA`，那么 `RMAN` 会自动将控制文件自动备份文件写入 `FRA` 中的目录，文件名采用 Oracle 托管文件格式。例如：\n\
  ```\n/<fra>/<db_name>/autobackup/<YYYY_MM_DD>/o1_mf_s_729103049_68fho9z2_.bkp\n\
  ```\n我通常不为控制文件自动备份使用默认位置或 `FRA`。我更希望这些备份与数据库备份放在同一个目录中。例如：\n```\nRMAN> configure\
  \ controlfile autobackup format for device type disk to\n'/ora01/O11R2/rman/rman_ctl_%F.bk';\n\
  ```\n\n#### 备份归档重做日志\n\n你应该定期备份你的归档重做日志。在至少备份一次之前，归档日志文件不应从磁盘中删除。我通常喜欢保留自上次成功的 `RMAN`\
  \ 备份之后生成的所有归档重做日志在磁盘上。\n\n通常，我会指示 `RMAN` 在备份数据文件的同时备份归档重做日志。在大多数情况下，这是一个足够的策略。以下是随数据文件一起备份归档重做日志的命令：\n\
  ```\nRMAN> backup database plus archivelog;\n```\n\n有时，如果你的数据库生成大量重做日志，你可能需要以不同于数据文件的频率来备份归档重做日志。有些\
  \ DBA 一天会备份归档重做日志两到三次；日志备份完成后，DBA 会删除它们以便为更新的归档日志文件腾出空间。\n\n在大多数情况下，你不需要上次成功备份之前生成的任何归档重做日志。例如，如果一个数据文件发生介质故障，你需要从备份中恢复该数据文件，然后应用数据文件备份期间及之后生成的所有归档重做日志。\n\
  \n在某些情况下，你可能需要上次备份之前生成的归档重做日志。例如，你可能遇到介质故障，尝试从上次成功备份恢复数据库，却发现该备份已损坏，因此需要从更早的备份恢复。那时，你就需要自该旧备份创建以来生成的所有归档重做日志副本。\n\
  \n## 确定快照控制文件的位置\n\n`RMAN` 在执行以下任务时需要控制文件的读一致性视图：\n\n- 与恢复目录同步\n- 备份当前控制文件\n\n在这些情况下，`RMAN`\
  \ 会创建当前控制文件的快照副本，以便在执行这些任务时将其用作读一致性副本。这确保了 `RMAN` 是从一个未被修改的控制文件副本进行操作的。\n\n快照控制文件的默认位置依赖于操作系统。在\
  \ Linux 平台上，默认位置是 `ORACLE_HOME/dbs/snapcf_@.f`。请注意，默认位置不在 `FRA` 中（即使你已经配置了 `FRA`）。\n\
  \n你可以使用 `SHOW` 命令显示当前快照控制文件的详细信息：\n```\nRMAN> show snapshot controlfile name;\n\
  ```\n\n以下是一些示例输出：\n```\nCONFIGURE SNAPSHOT CONTROLFILE NAME TO\n'/oracle/app/oracle/product/11.2.0/db_1/dbs/snapcf_O11R2.f';\
  \ # default\n```\n在大多数情况下，快照控制文件的默认位置和格式是足够的。这个文件占用空间不大，也没有密集的 I/O 要求。我建议你使用默认设置。\n\
  \n如果你有充分的理由将快照控制文件配置到非默认位置，可以按如下方式配置：\n```\nRMAN> configure snapshot controlfile\
  \ name to '/oradump/O11R2/snapcf.ctl';\n```\n\n你可以通过以下方式将快照控制文件设置回默认值：\n```\nRMAN>\
  \ configure snapshot controlfile name clear;\n```\n\n### 使用恢复目录\n\n`RMAN` 总是将其最新的备份操作存储在目标数据库的控制文件中。你可以设置一个可选的恢复目录来存储有关\
  \ `RMAN` 备份的元数据。恢复目录是一个独立的模式（通常位于与目标数据库不同的数据库中），其中包含存储 `RMAN` 备份信息的数据库对象（表、索引等）。恢复目录不存储\
  \ `RMAN` 备份片——只存储备份元数据。\n\n使用恢复目录的主要优势如下：\n\n- 为 `RMAN` 元数据提供一个辅助存储库。如果你丢失了所有控制文件及其备份，你仍然可以从恢复目录中检索\
  \ `RMAN` 元数据。\n- 比仅使用控制文件作为存储库时能够存储更长时间的 `RMAN` 元数据。\n- 提供对所有 `RMAN` 功能的访问。使用恢复目录时，某些恢复和还原功能会更简单。\n\
  \n使用恢复目录的缺点在于这是另一个你需要设置、维护和备份的数据库。当你开始备份并尝试连接到恢复目录时，如果恢复目录因任何原因（服务器宕机、网络问题等）不可用，你必须决定是否要在没有恢复目录的情况下继续备份。\n\
  \n使用恢复目录时，你还必须注意版本方面的问题。你需要确保用于存储恢复目录的数据库版本与目标数据库的版本兼容。当你升级目标数据库时，请确保恢复目录也被升级（如有必要）。\n\
  \n`注意` 有关如何实现恢复目录的详细信息，请参阅本章最后一节。\n\n无论是否使用恢复目录，`RMAN` 都能正常工作。对于我维护的大多数数据库，我不使用恢复目录；这样就省去了设置和维护它的工作。对我来说，简单性优先于恢复目录所提供的功能。\n\
  \n然而，如果你有充分的业务理由使用恢复目录，那么就实现并使用它。恢复目录的设置和维护并不困难，而且 Oracle 建议你使用它。\n\n## 使用介质管理器\n\
  \n`RMAN` 需要介质管理器才能直接备份到磁带。多个供应商提供此功能（需付费）。介质管理器用于大型数据库环境，如数据仓库，在那里你可能没有足够的空间将数据库备份到磁盘。你也可能有直接备份到磁带的灾难恢复要求。\n\
  \n如果你有这样的要求，那么你应该购买并实施一个介质管理软件包。如果你不需要直接备份到磁带，则无需实现介质管理器。`RMAN` 可以很好地直接备份到磁盘。\n\n\
  \n\n# 配置 Oracle RMAN 备份的注意事项\n\n在配置 Oracle RMAN 备份时，需要注意以下几点。\n\n## 备份到磁盘与磁带的协调\n\
  \n许多机构使用 `RMAN` 直接备份到磁盘，然后由系统管理员在 `RMAN` 备份到磁盘完成后，将这些备份再备份到磁带。如果这样做，必须确保 `RMAN`\
  \ 备份运行的时间与磁带备份运行的时间不重叠，因为可能会导致备份到磁带的文件不完整。\n\n## 12\\. 设置 CONTROL_FILE_RECORD_KEEP_TIME\
  \ 初始化参数\n\n`CONTROL_FILE_RECORD_KEEP_TIME` 初始化参数指定了控制文件中可重用记录在被覆盖前必须保留的最少天数。`RMAN`\
  \ 元数据存储在控制文件的可重用部分，因此最终会被覆盖。\n\n如果使用恢复目录（`recovery catalog`），则无需担心此参数，因为 `RMAN`\
  \ 元数据会无限期地存储在恢复目录中。因此，当使用恢复目录时，可以访问任何历史 `RMAN` 元数据。\n\n如果仅使用控制文件作为 `RMAN` 元数据存储库，那么存储在其中的信息最终将被覆盖。`CONTROL_FILE_RECORD_KEEP_TIME`\
  \ 的默认值是七天：\n\n```\nSQL> show parameter control_file_record_keep_time\n\nNAME   \
  \                              TYPE        VALUE\n------------------------------------\
  \ ----------- ------------------------------\ncontrol_file_record_keep_time    \
  \    integer     7\n```\n\n可以将该值设置为 0 到 365 天之间的任意值。将值设置为 0 意味着 `RMAN` 元数据信息可能随时被覆盖。\n\
  \n在旧版本的 Oracle 中，`CONTROL_FILE_RECORD_KEEP_TIME` 参数更为关键，因为当元数据被覆盖后，很难用 `RMAN` 信息重新填充控制文件。从\
  \ Oracle Database 10*g* 开始，可以使用 `CATALOG` 命令快速让控制文件知晓 `RMAN` 备份文件。\n\n建议将此参数保留为七天。如果由于某种原因，保留策略大于七天，并且没有使用恢复目录，那么可能需要考虑增加此值。增加此参数的缺点是，如果有大量的\
  \ `RMAN` 备份活动，这可能会增加控制文件的大小。\n\n## 13\\. 配置 RMAN 的备份保留策略\n\n`RMAN` 保留策略允许指定希望保留备份多长时间。`RMAN`\
  \ 有两种互斥的方法来指定保留策略：\n\n*   恢复窗口（`Recovery window`）\n*   备份数量（`Redundancy`）\n\n使用恢复窗口时，可以指定一个过去的天数，以便能够恢复到该窗口内的任何时间点。例如，如果指定保留策略窗口为五天，那么\
  \ `RMAN` 不会将那些用于在五天窗口内恢复到任何时间点所需的数据文件和归档重做日志备份标记为过时：\n\n```\nRMAN> configure retention\
  \ policy to recovery window of 5 days;\n```\n\n对于指定的恢复，`RMAN` 可能需要比五天窗口更早的备份，因为它可能需要一个更旧的备份作为起点，才能恢复到指定的恢复点。例如，假设上一次完好的备份是六天前进行的，而现在希望恢复到四天前。对于这个恢复窗口，`RMAN`\
  \ 需要六天前的备份才能进行恢复并恢复到指定时间点。\n\n也可以指定 `RMAN` 保留最少数量的备份。例如，如果将 `redundancy` 设置为 2，那么\
  \ `RMAN` 不会将数据文件和归档重做日志文件的最新两个备份标记为过时：\n\n```\nRMAN> configure retention policy\
  \ to redundancy 2;\n```\n\n我发现基于 `redundancy` 的保留策略更易于使用，并且在备份保留时间方面更具可预测性。如果设置\
  \ `redundancy` 为 2，我知道 `RMAN` 不会将最新的两个备份标记为过时。而恢复窗口（`recovery window`）保留策略则依赖于备份频率和窗口长度来确定备份是否过时。\n\
  \n\n\n您可以按如下方式报告 RMAN 根据保留策略已判定为过时的备份：\n\n```\nRMAN> report obsolete;\n```\n\n要删除过时的备份，请运行\
  \ `DELETE OBSOLETE` 命令：\n\n```\nRMAN> delete obsolete;\n```\n\n您会看到提示：\n\n`Do you\
  \ really want to delete the above objects (enter YES or NO)?`\n\n如果您在编写脚本，可以指定删除操作而不提示输入：\n\
  \n```\nRMAN> delete noprompt obsolete;\n```\n\n我通常将 `DELETE NOPROMPT OBSOLETE` 命令编写到备份数据库的同一个\
  \ shell 脚本中。这指示 RMAN 根据保留策略删除任何过时的备份和过时的归档重做日志。有关如何自动删除过时备份的示例，请参阅本章后面的 shell 脚本。\n\
  \n默认的保留策略是冗余度为 1。您可以通过 `TO NONE` 命令完全禁用 RMAN 保留策略：\n\n```\nRMAN> configure retention\
  \ policy to none;\n```\n\n要将保留策略设置回默认值，请使用 `CLEAR` 命令：\n\n```\nRMAN> configure retention\
  \ policy clear;\n```\n\n### 配置归档重做日志的删除策略\n\n在大多数场景中，我让 RMAN 根据数据库备份的保留策略删除归档重做日志。这是默认行为。您可以使用\
  \ `SHOW` 命令查看数据库保留策略：\n\n```\nRMAN> show retention policy;\nCONFIGURE RETENTION\
  \ POLICY TO REDUNDANCY 1; # default\n```\n\n要根据数据库保留策略删除归档重做日志（和备份片），请运行以下命令：\n\n\
  ```\nRMAN> delete obsolete;\n```\n\n从 Oracle Database 11g 开始，您可以指定一个独立于数据库备份的归档重做日志删除策略。此删除策略适用于\
  \ FRA 内和 FRA 外的归档重做日志。\n\n#### 注意\n\n在 Oracle Database 11g 之前，归档删除策略仅适用于与备用数据库关联的归档重做日志。\n\
  \n要配置归档重做日志删除策略，请使用 `CONFIGURE ARCHIVELOG DELETION` 命令。以下命令配置归档重做日志删除策略，使得归档重做日志在被备份到磁盘两次之前不会被删除：\n\
  \n```\nRMAN> configure archivelog deletion policy to backed up 2 times to device\
  \ type disk;\n```\n\n要让 RMAN 根据归档日志删除策略删除过时的归档重做日志，请发出以下命令：\n\n```\nRMAN> delete\
  \ archivelog all;\n```\n\n要查看是否为归档重做日志文件专门设置了保留策略，请使用此命令：\n\n```\nRMAN> show archivelog\
  \ deletion policy;\n```\n\n要清除归档删除策略，请执行：\n\n```\nRMAN> configure archivelog deletion\
  \ policy clear;\n```\n\n#### 提示\n\n在运行 `DELETE` 命令之前，请先运行 `CROSSCHECK` 命令。这样做可以确保\
  \ RMAN 知晓文件是否在磁盘上。\n\n### 设置并行度\n\n如果您的数据库服务器配备了支持多通道的硬件，您可以显著提高 RMAN 备份和恢复操作的性能。如果您的服务器有多个\
  \ CPU 和多个存储设备（磁盘或磁带设备），那么通过启用多个备份通道可以提升性能。\n\n如果您需要从备份和恢复操作中获得更好的性能，并且有便于并行操作的硬件，您应该启用并行性并进行测试以确定最佳程度。如果您有可以利用并行\
  \ RMAN 通道的硬件，启用并行性几乎没有缺点。\n\n如果您有多个 CPU 但只有一个存储设备位置，您可以启用多个通道向一个位置写入和读取。例如，如果您备份到\
  \ FRA，您仍然可以通过启用并行性来利用多个通道。假设您的服务器有四个 CPU，并希望启用相应的并行度：\n\n```\nRMAN> configure device\
  \ type disk parallelism 4;\n```\n\n您还可以通过配置与不同挂载点关联的多个通道来并行写入单独的位置。例如：\n\n```\n\
  RMAN> configure device type disk parallelism 4;\nRMAN> configure channel 1 device\
  \ type disk format '/ora01/O11R2/rman/rman1_%U.bk';\nRMAN> configure channel 2 device\
  \ type disk format '/ora02/O11R2/rman/rman2_%U.bk';\nRMAN> configure channel 3 device\
  \ type disk format '/ora03/O11R2/rman/rman3_%U.bk';\nRMAN> configure channel 3 device\
  \ type disk format '/ora04/O11R2/rman/rman4_%U.bk';\n```\n\n此代码配置了四个写入到磁盘上不同位置的通道。当您为不同位置配置单独的通道时，请确保启用的并行度与配置的设备通道数匹配。如果您分配的通道数超过了指定的并行度，RMAN\
  \ 只会写入由并行度指定的通道数，并忽略其他通道。\n\n如果您需要清除并行度，可以按如下方式操作：\n\n```\nRMAN> configure device\
  \ type disk clear;\n```\n\n类似地，要清除通道设备类型，请使用 `CLEAR` 命令。此示例清除通道 3：\n\n```\nRMAN>\
  \ configure channel 3 device type disk clear;\n```\n\n### 使用备份集或映像副本\n\n当您发出 RMAN\
  \ `BACKUP` 命令时，可以指定备份为以下类型之一：\n\n*   备份集\n*   映像副本\n\n备份集是 RMAN 创建的默认备份类型。备份集包含备份片，这些是只有\
  \ RMAN 才能写入或读取的二进制文件。备份集之所以可取，是因为它们通常比被备份的数据文件要小。如果您使用的是 Oracle Database 10g release\
  \ 2 或更高版本，RMAN 会自动尝试使用 `未使用块压缩` 创建备份片。在此模式下，RMAN 读取位图以确定哪些块已分配，并且仅读取数据文件中的那些块。此功能仅适用于基于磁盘的备份集和\
  \ Oracle Secure Backup 磁带备份。\n\n如果您使用的数据库版本早于 Oracle Database 10g release 2，默认情况下使用\
  \ `空块压缩`（有时更恰当地称为 `块跳过`）创建备份集。在此模式下，RMAN 检查数据文件中的块；如果块未被使用，则不进行备份。\n\n#### 注意\n\n\
  RMAN 还可以使用真正的二进制压缩创建备份集。这是您从 OS 压缩实用程序（如 zip）获得的那种压缩。Oracle 支持多个级别的二进制压缩。`BASIC`\
  \ 压缩算法无需额外许可即可使用。Oracle 通过 Oracle Advanced Compression 选项提供了进一步的压缩功能（有关如何启用二进制压缩的详细信息，请参阅本章后面的部分）。\n\
  \n当您将备份创建为备份集时，二进制备份片文件只能由 RMAN 进程操作。一些 DBA 将此视为一个缺点，因为他们必须使用 RMAN 来备份和恢复这些文件（您无法直接访问或控制备份片）。但这些看法是没有根据的。除非遇到罕见的错误，否则\
  \ RMAN 在所有备份和恢复情况下都是可靠且稳定工作的。\n\n将备份集与映像副本进行对比。映像副本创建每个数据文件的字节对字节完全相同的副本。创建映像副本的优点是（如有必要）您可以不使用\
  \ RMAN（如使用 OS 复制实用程序）来操作映像副本。此外，在发生介质故障时，映像副本是恢复数据文件的快速方法，因为 RMAN 只需将文件从备份位置复制回来（无需重新构建数据文件，因为它是一个精确的副本）。\n\
  \n\n\n# 配置 RMAN\n\n我几乎总是使用备份集进行数据库备份，而不是映像副本。通常，我需要某种形式的 RMAN 压缩（块跳过）。备份到磁盘的大小几乎总是需要关注的问题。备份集在磁盘空间消耗方面更高效。由于备份集可以利用\
  \ RMAN 压缩，与映像副本相比，备份集涉及的 I/O 也更少。在许多环境中，减少 I/O 以避免影响其他应用程序是一个需要关注的问题。\n\n但如果你觉得需要直接控制\
  \ RMAN 创建的备份文件，或者你处于一个恢复过程速度至关重要的环境，请考虑使用映像副本。\n\n## 使用增量备份\n\n对于我负责的大多数数据库，我运行每日的\
  \ 0 级备份。我通常不实施任何类型的增量备份策略。\n\n增量备份策略适用于大型数据库，这些数据库中只有很小一部分数据块在备份之间发生变化。如果你处于数据仓库环境，可能需要考虑增量备份策略，因为它可以大大减少备份的大小。例如，你可能希望运行每周的\
  \ 0 级备份，然后运行每日的 1 级增量备份。\n\n> **注意** 有关如何使用增量备份数据库的详细信息，请参见第 18 章。\n\n## 使用增量更新备份\n\
  \n增量更新备份是实施映像副本备份策略的一种高效方法。此技术指示 RMAN 首先创建数据文件的映像副本；然后，在下次运行备份时，RMAN 不再创建新的映像副本，而是创建一个增量备份（自映像副本创建以来块的更改）并将该增量备份应用到映像副本上。\n\
  \n如果你有磁盘空间可用于存储数据库的完整映像副本，并且你希望在发生介质故障时能够直接使用映像副本的灵活性，请考虑此备份策略。\n\n这种方法的一个潜在缺点是，如果你需要恢复并恢复到过去的某个时间点，你只能恢复并恢复到映像副本上次使用增量备份更新的时间点。\n\
  \n> **注意** 有关如何使用增量更新备份数据库的详细信息，请参见第 18 章。\n\n## 使用块更改跟踪\n\n此功能跟踪数据库块何时更改。其思想是，如果你正在使用增量备份策略，可以通过实施此功能来增强性能，这样\
  \ RMAN 就不必扫描数据文件中的每个块（高水位线下）来确定是否需要备份某个块。相反，RMAN 只需访问块更改跟踪文件即可确定自上次备份以来哪些块已更改，并直接访问已被标识为已更改的块。如果你在大型数据仓库环境中工作并使用增量备份策略，请考虑启用块更改跟踪以提高性能。\n\
  \n> **注意** 有关如何实施块更改跟踪的详细信息，请参见第 18 章。\n\n## 配置二进制压缩\n\n你可以配置 RMAN 在生成备份集时使用真正的二进制压缩。你可以通过两种方式之一启用压缩：\n\
  - 在 `BACKUP` 命令中指定 `AS COMPRESSED BACKUPSET`。\n- 使用一次性的 `CONFIGURE` 命令。\n\n以下是在发出\
  \ `BACKUP` 命令时使用压缩进行备份的示例：\n```\nRMAN> backup as compressed backupset database;\n\
  ```\n\n以下是一个为磁盘设备配置压缩的示例：\n```\nRMAN> configure device type disk backup type to\
  \ compressed backupset;\n```\n如果需要清除设备类型压缩，请发出此命令：\n```\nRMAN> configure device\
  \ type disk clear;\n```\n\n我发现默认的压缩算法相当高效。对于典型的数据库，备份通常比常规备份小四到五倍。当然，你的压缩结果可能因数据而异。\n\
  \n为什么不压缩所有备份？压缩备份会消耗更多的 CPU 资源，并且创建和恢复所需的时间更长，但它们会导致更少的 I/O，分布在更长的时间内。如果你有多个 CPU，并且备份速度不是问题，那么你应该考虑压缩备份。\n\
  \n你可以使用 `SHOW` 命令查看启用的压缩类型：\n```\nRMAN> show compression algorithm;\n```\n以下是一些示例输出：\n\
  ```\nCONFIGURE COMPRESSION ALGORITHM 'BASIC' AS OF RELEASE 'DEFAULT'\nOPTIMIZE FOR\
  \ LOAD TRUE ; # default\n```\n\n基本压缩算法不需要 Oracle 的额外许可。如果你使用的是 Oracle Database 11*g*\
  \ 第 2 版或更高版本，并且拥有 Advanced Compression Option 的许可，那么你还可以使用三个额外的可配置二进制压缩级别。例如：\n\
  ```\nRMAN> configure compression algorithm 'HIGH';\nRMAN> configure compression\
  \ algorithm 'MEDIUM';\nRMAN> configure compression algorithm 'LOW';\n```\n\n你可以查询\
  \ `V$RMAN_COMPRESSION_ALGORITHM` 以查看有关你的数据库版本可用的压缩算法的详细信息。要将当前压缩算法重置为默认的 `BASIC`，请使用\
  \ `CLEAR` 命令：\n```\nRMAN> configure compression algorithm clear;\n```\n\n## 配置加密\n\
  \n你可能需要加密备份。一些站点特别要求对包含敏感数据并存储在异地的备份进行加密。要使用加密进行备份，你必须使用 Oracle 企业版，拥有 Advanced\
  \ Security Option 的许可，并且使用 Oracle Database 10*g* 第 2 版或更高版本。\n\n如果你已配置了安全钱包（有关详细信息，请参阅《Oracle\
  \ Advanced Security Administrator’s Guide》，可在 Oracle 的 OTN 网站上找到），则可以如下配置备份的透明加密：\n\
  ```\nRMAN> configure encryption for database on;\n```\n你现在制作的任何备份都将被加密。如果你需要从备份中恢复，它会自动解密（假设与你加密备份时相同的安全钱包仍在位）。要禁用加密，请使用\
  \ `CONFIGURE` 命令：\n```\nRMAN> configure encryption for database off;\n```\n你也可以使用\
  \ `CLEAR` 清除加密设置：\n```\nRMAN> configure encryption for database clear;\n```\n你可以查询\
  \ `V$RMAN_ENCRYPTION_ALGORITHMS` 以查看有关你的数据库版本可用的加密算法的详细信息。\n\n## 配置其他设置\n\nRMAN\
  \ 提供了灵活的通道配置命令。根据数据库的特殊情况和需求，你偶尔需要使用它们。以下是一些选项：\n- 最大备份集大小\n- 最大备份片大小\n- 最大速率\n\
  - 最大打开文件数\n\n默认情况下，最大备份集大小是无限的。你可以在 `CONFIGURE` 或 `BACKUP` 命令中使用 `MAXSETSIZE` 参数来指定整个备份集的最大大小。确保此参数的值至少与\
  \ RMAN 正在备份的最大数据文件一样大。以下是一个示例：\n```\nRMAN> configure maxsetsize to 2g;\n```\n\n\
  有时你可能希望由于存储设备的物理限制而限制备份片的整体大小。使用 `CONFIGURE CHANNEL` 或 `ALLOCATE CHANNEL` 命令的 `MAXPIECESIZE`\
  \ 参数来实现这一点。例如：\n```\nRMAN> configure channel device type disk maxpiecesize = 2g;\n\
  ```\n\n如果你需要设置 RMAN 每秒在通道上读取的最大字节数，可以使用 `RATE` 参数。此配置将通道 1 的最大读取速率设置为每秒 200MB：\n\
  ```\nconfigure channel 1 device type disk rate 200M;\n```\n\n\n\n# 配置 RMAN：从决策到实践\n\
  \n## 配置操作系统限制参数\n\n如果你对可以同时打开的文件数量有限制，可以通过 `MAXOPENFILES` 参数指定最大打开文件数：\n\n```sql\n\
  RMAN> configure channel 1 device type disk maxopenfiles 32;\n```\n\n你可能需要在让 RMAN\
  \ 感知到某些操作系统或硬件限制时配置这些设置。你很少需要使用这些参数，但应该了解它们。\n\n## 从决策过渡到行动\n\n既然你已经很好地理解了在实施 RMAN\
  \ 之前应该做出哪些决策，查看一个实现了其中一些组件的脚本会很有指导意义。我主要使用 Linux/Unix 服务器。在这些环境中，我使用 `shell scripts`\
  \ 来自动化 RMAN 备份。这些 `shell scripts` 通过 `cron` 这样的调度工具实现自动化。\n\n## RMAN 备份脚本示例\n\n\
  本节包含一个典型的用于 RMAN 备份的 `shell script`。该脚本在输出中带有行号，便于在讨论编写脚本时所做的架构决策时进行参考。\n\n（如果你复制该脚本，请在运行前去掉行号。）以下是脚本。表\
  \ 17–2 详细说明了本章涵盖的每个 RMAN 架构决策点，它在 `shell script` 中如何实现（或未实现），以及 `shell script` 中的对应行号。该脚本并未涵盖使用\
  \ RMAN 的所有方面。如果你使用该脚本，请务必根据你自身环境的需求和 RMAN 标准对其进行修改：\n\n```bash\n#!/bin/bash\n\n\
  HOLDSID=${1} # SID name\nPRG=`basename $0`\nUSAGE=\"Usage: ${PRG} <database name>\
  \ \"\n\nif [ -z \"${HOLDSID}\" ]; then\n    echo \"${USAGE}\"\n    exit 1\nfi\n\n\
  #----------------------------------------------\n"
- "# source environment variables (see Chapter 2 for details on oraset)\n. /var/opt/oracle/oraset\
  \ $HOLDSID\n\nBOX=`uname -a | awk '{print$2}'`\nMAILX='/bin/mailx'\nMAIL_LIST='larry@oracle.com'\n\
  NLS_DATE_FORMAT='dd-mon-yy hh24:mi:ss'\ndate\n\n#----------------------------------------------\n\
  LOCKFILE=/tmp/$PRG.lock\n\nif [ -f $LOCKFILE ]; then\n    echo \"lock file exists,\
  \ exiting...\"\n    exit 1\nelse\n    echo \"DO NOT REMOVE, $LOCKFILE\" > $LOCKFILE\n\
  fi\n\n#----------------------------------------------\nrman nocatalog <<EOF\nconnect\
  \ target /\nset echo on;\nshow all;\n\n"
- '# Synchronize RMAN with files on OS

  crosscheck backup;

  crosscheck copy;

  crosscheck archivelog all;


  '
- '# Configure environment, redundant to run each time, but ensures set correctly.

  configure controlfile autobackup on;

  configure controlfile autobackup format for device type disk to ''/oradump01/DWREP/rman/rman_ctl_%F.bk'';

  configure retention policy to redundancy 1;

  configure device type disk parallelism 5;

  configure channel 1 device type disk format ''/ora08/DWREP/rman/rman1_%U.bk'';

  configure channel 2 device type disk format ''/ora08/DWREP/rman/rman2_%U.bk'';

  configure channel 3 device type disk format ''/ora08/DWREP/rman/rman3_%U.bk'';

  configure channel 4 device type disk format ''/ora09/DWREP/rman/rman4_%U.bk'';

  configure channel 5 device type disk format ''/ora09/DWREP/rman/rman5_%U.bk'';


  '
- '# Backup datafiles, archive redo logs, and control file

  backup as compressed backupset incremental level=0 database plus archivelog;


  '
- "# Delete obsolete backups and archive logs as defined by retention policy.\ndelete\
  \ noprompt obsolete;\nEOF\n\n#----------------------------------------------\nif\
  \ [ $? -ne 0 ]; then\n    echo \"RMAN problem...\"\n    echo \"Check RMAN backups\"\
  \ | $MAILX -s \"RMAN issue: $ORACLE_SID on $BOX\" $MAIL_LIST\nelse\n    echo \"\
  RMAN ran okay...\"\nfi\n\n#----------------------------------------------\nsqlplus\
  \ -s /nolog <<EOF\nconnect / as sysdba;\nalter database backup controlfile to trace;\n\
  COL dbid NEW_VALUE hold_dbid\nSELECT dbid FROM v\\$database;\nexec dbms_system.ksdwrt(2,'DBID:\
  \ '||TO_CHAR(&hold_dbid));\nEXIT\nEOF\n\n#----------------------------------------------\n\
  if [ -f $LOCKFILE ]; then\n    rm $LOCKFILE\nfi\n\n#----------------------------------------------\n\
  date\n```\n\n\n\n# 第 17 章 ■ 配置 RMAN\n\n## 表 17–2. 架构决策的实现\n\n| 决策点 | 脚本中的实现方式 |\
  \ 脚本中的行号 |\n| :--- | :--- | :--- |\n| 1\\. 远程或本地运行 RMAN 客户端 | 在数据库服务器上本地运行脚本。 |\
  \ 第 26 行，本地连接（非网络连接）。 |\n| 2\\. 指定备份用户 | 使用 SYS 用户连接。 | 第 27 行，使用`/`连接启动 rman。 |\n\
  | 3\\. 使用联机或脱机备份 | 联机备份。 | 不适用。假设备份期间数据库处于运行状态。 |\n| 4\\. 设置归档重做日志目标位置和文件格式 | `LOG_ARCHIVE_DEST_N`和`LOG_ARCHIVE_FORMAT`初始化参数在脚本外的数据库初始化文件中设置。\
  \ | 不适用。在脚本外设置。 |\n| 5\\. 配置 RMAN 备份位置和文件格式 | 直接在脚本中使用`CONFIGURE`命令。 | 第 38 至 43\
  \ 行。 |\n| 6\\. 设置控制文件的自动备份 | 在脚本中启用。 | 第 35 行。 |\n| 7\\. 指定控制文件自动备份的位置 | 放置在与备份相同的目录中。\
  \ | 第 36 行。 |\n| 8\\. 备份归档重做日志 | 与其他数据库一起备份。具体来说，使用`PLUS ARCHIVELOG`子句。 | 第 45 行。\
  \ |\n| 9\\. 确定快照控制文件的位置 | 使用默认位置。 | 不适用 |\n| 10\\. 使用恢复目录 | 未使用。 | 第 26 行，以`nocatalog`模式连接。\
  \ |\n| 11\\. 使用介质管理器 | 未使用。 | 第 38 至 43 行，`device type disk`。 |\n| 12\\. 设置`CONTROL_FILE_RECORD_KEEP_TIME`初始化参数\
  \ | 使用默认值。 | 不适用 |\n| 13\\. 配置 RMAN 的备份保留策略 | 配置为冗余度为 1，进行交叉检查，并删除过时的备份和归档重做日志文件。\
  \ | 第 37 行，配置。<br> 第 47 行，使用 RMAN 删除旧文件。 |\n| 14\\. 配置归档重做日志的删除策略 | 使用与备份相同的保留策略。\
  \ | 不适用 |\n| 15\\. 设置并行度 | 设置并行度为 5。 | 第 38 至 43 行。 |\n| 16\\. 使用备份集或映像副本 | 使用备份集。\
  \ | 第 45 行。 |\n| 17\\. 使用增量备份 | 增量级别 0，等同于完全备份。 | 第 45 行。 |\n| 18\\. 使用增量更新备份 |\
  \ 未使用。 | 不适用 |\n| 19\\. 使用块变更跟踪 | 未使用。 | 不适用 |\n| 20\\. 配置压缩 | 使用基本压缩。 | 第 45 行。\
  \ |\n| 21\\. 配置加密 | 未使用。 | 不适用 |\n| 22\\. 配置其他设置 | 未使用。 | 不适用 |\n\n关于此脚本的几个方面需要进一步讨论（除表中已包含的内容外）。\n\
  \n第 11 行通过运行名为`oraset`的脚本来设置所需的 OS 变量。有关运行`oraset`和获取 OS 变量的详细信息，请参见第 2 章。许多 DBA\
  \ 选择将 OS 变量（如`ORACLE_HOME`和`ORACLE_SID`）硬编码到脚本中。但是，您应避免硬编码变量，而应使用脚本来获取所需变量。运行脚本要灵活得多，尤其是在一台服务器上有许多安装了不同版本\
  \ Oracle 的数据库时。\n\n第 15 行将`NLS_DATE_FORMAT` OS 变量设置为一个包含小时、分钟和秒的值。这确保了当 RMAN 运行适当的命令时，其显示的日期输出包含时间成分。这在调试和诊断问题时非常有用。默认情况下，RMAN\
  \ 只显示日期部分。仅知道命令运行的日期，很少足以确定命令执行的具体时间。至少，您需要看到小时和分钟（连同日期）。\n\n第 18 至 24 行检查锁文件是否存在。如果此脚本已经在运行，则不希望再次运行它。脚本检查锁文件，如果存在，则脚本退出。备份完成后，锁文件会被删除（第\
  \ 66 至 68 行）。\n\n第 28 行将`ECHO`参数设置为`on`。这指示 RMAN 在输出中显示即将执行的命令。这对于调试问题非常有用。第 29\
  \ 行显示所有可配置变量。这对于故障排查也很方便，因为您可以在执行任何命令之前看到 RMAN 变量被设置成了什么。\n\n第 35 至 43 行使用了`CONFIGURE`命令。这些命令在脚本每次执行时都会运行。为什么要这样做？`CONFIGURE`命令只需要运行一次，它会存储在控制文件中——您不需要再次运行它，对吗？这是正确的。然而，我曾偶尔因此吃亏，当一个习惯不好的\
  \ DBA 为数据库配置了某个设置却没告诉任何人，而我直到尝试进行另一次备份时才发现配置错误。我强烈建议将`CONFIGURE`命令放在脚本中，这样无论其他 DBA\
  \ 在脚本外做了什么，脚本的行为都能保持一致。脚本中的`CONFIGURE`设置也充当了一种文档形式：我可以轻松查看脚本来确定各项设置是如何配置的。\n\n第\
  \ 31 至 33 行运行了`CROSSCHECK`命令。为什么要这样做？有时文件会丢失，或者一个鲁莽的 DBA 可能使用 RMAN 之外的操作系统命令从磁盘上删除了归档重做日志文件。当\
  \ RMAN 运行时，如果它找不到它认为应该存在的文件，就会抛出错误并停止备份。我更倾向于运行`CROSSCHECK`命令，让 RMAN 协调它认为应该在磁盘上的文件与实际在磁盘上的文件。这能使\
  \ RMAN 顺利运行。\n\n在第 47 行，您运行了`DELETE NOPROMPT OBSOLETE`。这将删除所有被 RMAN 根据保留策略标记为`OBSOLETE`的备份文件和归档重做日志文件。这使得\
  \ RMAN 能够管理磁盘上应保留哪些文件。我倾向于在备份完成后运行`DELETE`命令（而不是在备份前运行）。保留策略被定义为 1，因此如果在备份后运行`DELETE`，磁盘上会保留一份备份副本。如果在备份前运行`DELETE`，磁盘上会保留一份备份副本。备份运行后，磁盘上就会有两份备份副本，而我的服务器上没有足够的空间。\n\
  \n第 59 行创建了一个跟踪文件，其中包含在此数据库需要重新创建控制文件时所需的`CREATE CONTROLFILE` SQL 语句。第 62 行将数据库标识符（`DBID`）写入警报日志文件。在某些需要数据库\
  \ ID 才能执行的控制文件恢复类型中，这可能会派上用场。\n\n您可以从 Linux/Unix 调度工具`cron`执行此 shell 脚本，如下所示：\n\
  ```\n0 16 * * * $HOME/bin/rmanback.bsh INVPRD >$HOME/bin/log/INVPRDRMAN.log 2>&1\n\
  ```\n该脚本在数据库服务器上每天按军用时间 1600 小时运行。会创建一个日志文件（`INVPRDRMAN.log`）来捕获 RMAN 作业的任何输出和错误。有关通过`cron`自动化作业的详细信息，请参见第\
  \ 21 章。\n\n再次说明，本节中的脚本是基础性的；您无疑需要根据您的需求对其进行增强和修改。此脚本为您提供了一个起点，包含具体的 RMAN 建议以及如何实施它们。\n\
  \n### 使用恢复目录\n\n当您使用恢复目录时，可以在与目标数据库相同的服务器上的同一数据库中创建恢复目录用户。但是，不建议采用这种方法，因为您不希望目标数据库的可用性或目标数据库所在服务器的可用性影响恢复目录。因此，您应该在不同于目标数据库的服务器上创建恢复目录数据库。\n\
  \n## 创建恢复目录\n\n\n\n当我使用恢复目录时，我倾向于使用一个专用的、仅用于恢复目录的数据库。这确保了恢复目录不受其他应用程序所需的任何维护或停机时间的影响（反之亦然）。\n\
  \n接下来列出的是创建恢复目录的步骤：\n\n1.  在与你的目标数据库不同的服务器上创建一个数据库，用于恢复目录。确保数据库大小合适。我发现 Oracle 推荐的大小通常都太小了。以下是一些合适的建议：\n\
  \n## 第 17 章 ■ 配置 RMAN\n\n*   `SYSTEM` 表空间：500MB\n*   `SYSAUX` 表空间：500MB\n*   `TEMP`\
  \ 表空间：500MB\n*   `UNDO` 表空间：500MB\n*   在线重做日志：每个 25MB，3 组，每组多路复用 2 个成员\n*   `RECCAT`\
  \ 表空间：500MB\n\n2.  创建一个供恢复目录用户使用的表空间。我建议将表空间命名为类似 `RECCAT` 的名称，以便易于识别为包含恢复目录元数据的表空间：\n\
  \n```sql\nCREATE TABLESPACE reccat\nDATAFILE '/ora01/dbfile/O11R2/reccat01.dbf'\n\
  SIZE 500M\nEXTENT MANAGEMENT LOCAL\nUNIFORM SIZE 128k\nSEGMENT SPACE MANAGEMENT\
  \ AUTO;\n```\n\n3.  创建一个用户，该用户将拥有用于存储目标数据库元数据的表和其他对象。我建议你将恢复目录用户命名为类似 `RCAT` 的名称，以便易于识别其为恢复目录对象的拥有者。同时，将\
  \ `RECOVERY_CATALOG_OWNER` 角色以及 `CREATE SESSION` 权限授予 `RCAT` 用户：\n\n```sql\nCREATE\
  \ USER rcat IDENTIFIED BY foo\nTEMPORARY TABLESPACE temp\nDEFAULT TABLESPACE reccat\n\
  QUOTA UNLIMITED ON reccat;\n\nGRANT RECOVERY_CATALOG_OWNER TO rcat;\nGRANT CREATE\
  \ SESSION TO rcat;\n```\n\n4.  通过 `RMAN` 以 `RCAT` 身份连接，并创建恢复目录对象：\n\n```\n$ rman\
  \ catalog rcat/foo\n```\n\n5.  现在，运行 `CREATE CATALOG` 命令：\n\n```\nRMAN> create catalog;\n\
  RMAN> exit;\n```\n\n6.  此命令可能需要运行几分钟。完成后，你可以通过以下查询验证表是否已创建：\n\n```\n$ sqlplus rcat/foo\n\
  SQL> select table_name from user_tables;\n```\n\n7.  以下是一些示例输出：\n\n## 第 17 章 ■ 配置\
  \ RMAN\n\nTABLE\\_NAME\nDB\nNODE\nCONF\nDBINC\nBRDSTN\nCKP\nTS\n\n## 注册目标数据库\n\n\
  现在，你可以将目标数据库注册到恢复目录。登录到目标数据库服务器。\n\n确保你可以建立到恢复目录数据库的 Oracle Net 连接。例如，一种方法是在 `TNS_ADMIN/tnsnames.ora`\
  \ 文件中填入一个指向远程数据库的条目。在目标数据库服务器上，按如下方式注册恢复目录：\n\n```\n$ rman target / catalog rcat/foo@rcat\n\
  ```\n\n当你连接时，应该会看到连接到目标数据库和恢复目录的验证信息：\n\nconnected to target database: `O11R2` (DBID=3457609395)\n\
  connected to recovery catalog database\n\n接下来，运行 `REGISTER DATABASE` 命令：\n\n```\n\
  RMAN> register database;\n```\n\n现在，你可以运行备份操作，并将有关备份任务的元数据同时写入控制文件和恢复目录。确保每次运行 `RMAN`\
  \ 命令时都连接到恢复目录和目标数据库：\n\n```\n$ rman target / catalog rcat/foo@rcat\n```\n\n## 备份恢复目录\n\
  \n确保你包含备份和恢复恢复目录数据库的策略。为了获得最大程度的保护，请确保恢复目录数据库处于归档日志模式，并使用 `RMAN` 备份该数据库。\n\n你也可以使用像\
  \ Data Pump 这样的工具来获取数据库快照。使用 Data Pump 的缺点是，你可能会丢失在 Data Pump 导出之后创建的、恢复目录中的某些信息。\n\
  \n请记住，如果你的恢复目录数据库服务器发生完全故障，你仍然可以使用 `RMAN` 备份你的目标数据库。你只是无法连接到恢复目录。因此，任何指示 `RMAN`\
  \ 连接到目标和恢复目录的脚本都必须修改。\n\n另外，如果你完全丢失了恢复目录并且没有备份，一个选择是从头重新创建它。一旦重新创建，你需要重新将目标数据库注册到恢复目录。\n\
  \n你会丢失任何长期的历史恢复目录元数据。\n\n## 第 17 章 ■ 配置 RMAN\n\n## 同步恢复目录\n\n你可能遇到网络问题，导致恢复目录无法访问。在此期间，你连接到目标数据库并执行备份操作。一段时间后，网络问题解决，你又可以连接到恢复目录了。\n\
  \n在这种情况下，你需要将恢复目录与目标数据库重新同步，以便恢复目录知晓那些未存储在恢复目录中的任何备份操作。运行以下命令以确保恢复目录拥有最新的备份信息：\n\
  \n```\n$ rman target / catalog rcat/foo@rcat\nRMAN> resync catalog;\n```\n\n请记住，仅当由于某些原因你在未连接到目录的情况下执行备份操作时，才需要重新同步目录。在正常情况下，你无需运行\
  \ `RESYNC` 命令。\n\n## 恢复目录版本\n\n我建议你为每个正在备份的目标数据库版本创建一个恢复目录。这样做可以为你节省一些因兼容性和升级问题带来的麻烦。我发现，当\
  \ `rman` 客户端的数据库版本与创建目录时使用的数据库版本相同时，使用恢复目录会更容易。\n\n是的，拥有多个版本的恢复目录可能会引起一些混淆。但是，如果你处于一个拥有多个不同版本\
  \ Oracle 数据库的环境中，那么多个恢复目录可能更方便。\n\n## 删除恢复目录\n\n如果你确定不再使用恢复目录并且不再需要其中的数据，可以将其删除。为此，以目录所有者身份连接到目录数据库，并发出\
  \ `DROP CATALOG` 命令：\n\n```\n$ rman catalog rcat/foo\nRMAN> drop catalog;\n```\n\
  \n系统会提示你：\n\nrecovery catalog owner is `RCAT`\nenter `DROP CATALOG` command again\
  \ to confirm catalog removal\n\n如果你再次输入 `DROP CATALOG` 命令，恢复目录中的所有对象都将从目录数据库中删除。\n\
  \n另一种删除目录的方法是删除其所有者。为此，以具有 `DBA` 权限的用户身份连接到恢复目录，并发出 `DROP USER` 语句：\n\n```\n$ sqlplus\
  \ system/manager\nSQL> drop user rcat cascade;\n```\n\n`SQL*Plus` 不会提示你两次。它会按照你的指示操作，删除该用户及其对象。\n\
  \n再次强调，执行此操作的唯一原因是你确定不再需要恢复目录或其数据。删除用户或恢复目录时请谨慎：我建议你在删除恢复目录所有者之前，使用 Data Pump 导出其数据。\n\
  \n## 第 17 章 ■ 配置 RMAN\n\n## 总结\n\n`RMAN` 是 Oracle 的旗舰级 B&R（备份与恢复）工具。如果你仍在使用较旧的用户管理备份技术，那么我强烈建议你切换到\
  \ `RMAN`。`RMAN` 包含一组强大的功能，是任何其他可用备份工具所无法比拟的。它易于使用和配置。`RMAN` 将在你实施稳健的 B&R 策略时，为你节省时间和精力，并让你高枕无忧。\n\
  \n如果你是 `RMAN` 的新手，可能并不清楚哪些功能应该始终启用和实施，同样，哪些方面你很少需要。本章包含一个供你遵循的检查清单，引导你完成每个架构决策点。你可能不同意我的某些结论，或者某些建议可能不符合你的业务需求——这没关系。关键在于，你应该仔细考虑每个组件以及如何实施那些有意义的功能。\n\
  \n\n\n本章以一个在生产环境中实施 RMAN 的实际脚本示例结束。既然你已经对 RMAN 的功能及其使用方法有了清晰的了解，现在可以开始进行备份了。下一章将讨论\
  \ RMAN 备份场景。\n\n![](img/index-521_1.png)\n\n# 第 18 章 ■ RMAN 备份与报告\n\n以下各节将讨论列举的各项内容。\n\
  \n#### 设置 NLS_DATE_FORMAT\n\n在运行任何 RMAN 作业之前，我会将操作系统变量 `NLS_DATE_FORMAT` 设置为包含时间（小时、分钟和秒）部分。例如：\n\
  \n`$ export NLS_DATE_FORMAT='dd-mon-yyyy hh24:mi:ss'`\n\n此外，如果我有一个调用 RMAN 的 shell\
  \ 脚本，我会将上述行直接放入 shell 脚本中（有关示例，请参见第 17 章末尾的 shell 脚本）：\n\n`NLS_DATE_FORMAT='dd-mon-yyyy\
  \ hh24:mi:ss'`\n\n这样可以确保当 RMAN 显示日期时，输出中始终包含小时、分钟和秒。默认情况下，RMAN 的输出中只包含日期部分 (`DD-MON-YYYY`)。\n\
  \n例如，启动备份时，RMAN 显示如下：\n\n`Starting backup at 15-sep-2010`\n\n当你将 `NLS_DATE_FORMAT`\
  \ 操作系统变量设置为包含时间部分时，输出将变为：\n\n`Starting backup at 15-sep-2010 03:20:17`\n\n在进行故障排除时，拥有时间部分至关重要，这样你才能确定命令运行了多长时间，或者命令在失败前运行了多久。Oracle\
  \ 支持几乎总是会要求你在捕获输出并发送给他们之前，将此变量设置为包含时间部分。\n\n设置 `NLS_DATE_FORMAT` 的唯一缺点是，如果你将其设置为\
  \ RMAN 无法识别的值，可能会导致连接问题。例如，这里 `NLS_DATE_FORMAT` 被设置为一个无效值：\n\n`$ export NLS_DATE_FORMAT='dd-mon-yyyy\
  \ hh24:mi:sd'`\n`$ rman target /`\n\n当设置为无效值时，登录 RMAN 时会出现此错误：`RMAN-03999: Oracle\
  \ error occurred while converting a date: ORA-01821:`\n\n要取消设置 `NLS_DATE_FORMAT`\
  \ 变量，请将其设置为空值，如下所示：\n\n`$ export NLS_DATE_FORMAT=''`\n\n#### 设置 ECHO\n\n我在任何 RMAN\
  \ 脚本中总是设置的另一个值是 `ECHO` 命令，如下所示：\n\n`RMAN> set echo on;`\n\n这指示 RMAN 在输出中显示它正在运行的命令，这样你就可以看到正在运行的\
  \ RMAN 命令以及与该命令相关的任何错误或输出消息。当你在脚本中运行 RMAN 命令时，这一点尤其重要，因为你并不是直接输入命令（并且可能不知道 shell\
  \ 脚本中发出了什么命令）。例如，如果没有 `SET ECHO ON`，命令的输出会显示为：\n\n`Starting backup at 15-sep-2010\
  \ 03:49:55`\n`using target database control file instead of recovery catalog`\n\n\
  使用 `SET ECHO ON`，此输出会显示实际运行的命令：\n\n`backup datafile 4;`\n`Starting backup at 15-sep-2010\
  \ 03:49:55`\n`using target database control file instead of recovery catalog`\n\n\
  从前面的输出中，你可以看到运行了哪个命令、何时开始等等。\n\n#### 显示变量\n\n另一个好的做法是在任何脚本中运行 `SHOW ALL` 命令，如下所示：\n\
  \n`RMAN> show all;`\n\n这会显示所有 RMAN 可配置变量。在进行故障排除时，你可能不知道其他 DBA 已经配置了某些内容。这让你可以查看\
  \ RMAN 会话执行时设置的快照。\n\n### 运行备份\n\n在运行 RMAN 备份之前，请确保阅读第 17 章，了解如何为生产环境配置 RMAN 设置。对于生产数据库，我主要从类似于第\
  \ 17 章末尾所示脚本的 shell 脚本运行 RMAN。在 shell 脚本中，我配置了我想用于特定数据库的 RMAN 的每个方面。如果你使用其默认设置开箱即用地运行\
  \ RMAN，你将能够备份数据库。然而，这些设置对于大多数生产数据库应用程序来说是不够的。\n\n#### 备份整个数据库\n\n如果你不确定 RMAN 会将数据库文件备份到哪里，你需要阅读第\
  \ 17 章，因为它描述了如何配置 RMAN 以在你选择的位置创建备份文件。\n\n以下是我通常配置 RMAN 写入磁盘上特定位置的方法（请注意，`CONFIGURE`\
  \ 命令必须在运行 `BACKUP` 命令之前执行）：\n\n`RMAN> configure channel 1 device type disk format\
  \ '/ora01/O11R2/rman/rman1_%U.bk';`\n\n配置好备份位置后，我几乎总是使用类似于下面显示的命令来备份整个数据库：\n\n`RMAN>\
  \ backup incremental level=0 database plus archivelog;`\n\n此命令确保 RMAN 将备份数据库中的所有数据文件、备份之前生成的所有归档重做日志以及备份期间生成的所有归档重做日志。此命令还确保你拥有恢复和还原数据库所需的所有数据文件和归档重做日志。\n\
  \n如果你启用了控制文件的自动备份功能（详见第 17 章），RMAN 作为备份一部分完成的最后一项任务是生成一个包含控制文件备份的备份集。此控制文件将包含有关所发生备份以及备份期间生成的任何归档重做日志的所有信息。\n\
  \n> **提示** 始终启用控制文件的自动备份功能。\n\n`RMAN BACKUP` 命令有许多细微差别。对于生产数据库，我通常使用 `BACKUP INCREMENTAL\
  \ LEVEL=0 DATABASE PLUS ARCHIVELOG` 命令备份数据库。这通常就足够了。然而，你会遇到许多情况，需要运行使用特定 RMAN 功能的备份，或者你可能在进行故障排除时需要意识到调用\
  \ RMAN 备份的其他方式。本章接下来的几节将讨论这些方面。\n\n### 完全备份与增量级别=0\n\n术语 “RMAN 完全备份” 有时会引起混淆。更贴切地描述完全备份所做的事情的方式是\
  \ “RMAN 备份一个或多个数据文件中所有已修改的块”。术语 “完全” 并不意味着备份所有块或所有数据文件。它仅仅指的是备份了重建数据文件（在发生故障时）所需的所有块。你可以对单个数据文件进行完全备份，而该备份片的内容可能比数据文件本身小得多。\n\
  \n术语 “RMAN 级别 0 增量备份” 自身描述得也不是很准确。级别 0 增量备份备份的块与完全备份完全相同。换句话说，以下两个命令备份数据库中完全相同的块：\n\
  \n`RMAN> backup as backupset full database;`\n`RMAN> backup as backupset incremental\
  \ level=0 database;`\n\n前述两个命令之间的唯一区别是，增量级别 0 备份可以与其他增量备份结合使用，而完全备份不能参与增量备份策略。\n\
  \n因此，我几乎总是更喜欢使用 `INCREMENTAL LEVEL=0` 语法（而不是完全备份）。这是因为这让我可以灵活地将级别 0 增量备份与不同的增量级别备份一起使用。\n\
  \n### 备份集与映像副本\n\n\n\n# RMAN 备份与报告\n\n## RMAN 备份类型\n\nRMAN 的默认备份模式指示其仅备份数据文件中已使用的块；这些被称为**备份集**。RMAN\
  \ 也可以对数据文件进行逐字节复制；这些被称为**映像副本**。创建备份集是 RMAN 创建的默认备份类型。以下命令创建数据库的备份集备份：\n\n```\n\
  RMAN> backup database;\n```\n\n如果你愿意，可以在创建备份时显式指定 `AS BACKUPSET` 命令：\n\n```\nRMAN>\
  \ backup as backupset database;\n```\n\n你可以通过使用 `AS COPY` 命令指示 RMAN 创建映像副本。以下命令为数据库中的每个数据文件创建映像副本：\n\
  \n```\nRMAN> backup as copy database;\n```\n\n由于映像副本是数据文件的完全相同副本，数据库管理员可以直接通过操作系统命令访问它们。例如，假设发生了介质故障，而你不想使用\
  \ RMAN 来恢复映像副本。你可以使用操作系统命令将数据文件的映像副本复制到数据库可以使用的位置，而备份集由二进制文件组成，只有 RMAN 工具可以写入或读取。\n\
  \n我更喜欢在使用 RMAN 时使用备份集。备份集往往比数据文件小，并且可以应用真正的二进制压缩。此外，我不觉得使用 RMAN 作为创建只有 RMAN 才能恢复的备份文件的机制有什么不便。使用\
  \ RMAN 和备份集既高效又非常可靠。\n\n#### 备份表空间\n\nRMAN 能够在数据库级别（如前面的示例所示）、表空间级别，甚至更精细地在数据文件级别进行备份。当你备份表空间时，RMAN\
  \ 会备份与你指定的表空间相关联的任何数据文件。例如，以下命令将备份与 `SYSTEM` 和 `SYSAUX` 表空间相关联的所有数据文件：\n\n```\n\
  RMAN> backup tablespace system, sysaux;\n```\n\n我备份表空间的一个场景是，如果我最近创建了一个新的表空间，并且只想备份（与新添加的表空间相关的）数据文件。请注意，在排查备份和恢复问题时，使用一个表空间进行操作通常更有效（因为备份一个表空间通常比备份整个数据库快得多）。\n\
  \n#### 备份数据文件\n\n你可能偶尔需要备份单个数据文件。例如，在排查备份问题时，尝试成功备份一个数据文件通常很有帮助。你可以通过文件名或文件号指定数据文件，如下所示：\n\
  \n```\nRMAN> backup datafile '/ora01/dbfile/O11R2/system01.dbf';\n```\n\n这是一个指定文件号的示例：\n\
  \n```\nRMAN> backup datafile 1,3;\n```\n\n以下是使用各种功能备份数据文件的其他示例：\n\n```\nRMAN> backup\
  \ as copy datafile 3;\n```\n\n```\nRMAN> backup incremental level 1 datafile 4;\n\
  ```\n\n> **提示** 使用 `REPORT SCHEMA` 命令列出表空间、数据文件名和数据文件编号信息。\n\n#### 备份控制文件\n\n备份控制文件最可靠的方法是配置自动备份功能：\n\
  \n```\nRMAN> configure controlfile autobackup on;\n```\n\n此命令确保在发出 `BACKUP` 或 `COPY`\
  \ 命令时自动备份控制文件。我通常启用控制文件的自动备份功能，然后就再也不用担心显式发出单独命令来备份控制文件了。在此模式下，控制文件总是在数据文件备份片段创建完成后，在其自己的备份集和备份片段中创建。\n\
  \n如果你需要手动备份控制文件，可以这样做：\n\n```\nRMAN> backup current controlfile;\n```\n\n备份的位置可以是默认的操作系统位置、快速恢复区（如果使用），或者手动配置的位置。如第\
  \ 17 章所示，我更喜欢将控制文件备份片段的位置设置为与数据文件备份相同的位置：\n\n```\nRMAN> configure controlfile autobackup\
  \ format for device type disk to '/ora01/O11R2/rman/rman_ctl_%F.bk';\n```\n\n####\
  \ 备份 Spfile\n\n如果你启用了控制文件的自动备份功能，那么每当发出 `BACKUP` 或 `COPY` 命令时，spfile 也会（与控制文件一起）被自动备份。如果你需要手动备份\
  \ spfile，请使用以下命令：\n\n```\nRMAN> backup spfile;\n```\n\n包含 spfile 备份的文件的位置取决于你的配置。默认情况下，如果你没有使用快速恢复区，并且没有通过通道显式配置位置，那么对于\
  \ Linux/Unix 服务器，备份会进入 `$ORACLE_HOME/dbs` 目录。\n\n> **注意** 只有实例是使用 spfile 启动时，RMAN\
  \ 才能备份 spfile。\n\n#### 备份归档重做日志\n\n我通常不会将归档重做日志与数据库备份分开备份。如前所述，我通常使用以下命令备份数据库文件和归档重做日志文件：\n\
  \n```\nRMAN> backup incremental level=0 database plus archivelog;\n```\n\n然而，你偶尔会发现自己处于需要对归档重做日志进行特殊的一次性备份的情况。你可以发出以下命令来备份归档重做日志文件：\n\
  \n```\nRMAN> backup archivelog all;\n```\n\n如果你有一个几乎满的挂载点，并且你决定要备份归档重做日志（以便它们存在于备份文件中），但随后又想立即将刚备份过的归档重做日志文件从磁盘上删除，你可以使用以下语法来备份归档重做日志，然后让\
  \ RMAN 将它们从存储介质中删除：\n\n```\nRMAN> backup archivelog all delete input;\n```\n\n接下来列出了一些其他可以用来备份归档重做日志文件的方法：\n\
  \n```\nRMAN> backup archivelog sequence 300;\n```\n\n```\nRMAN> backup archivelog\
  \ sequence between 300 and 400 thread 1;\n```\n\n```\nRMAN> backup archivelog from\
  \ time \"sysdate-7\" until time \"sysdate-1\";\n```\n\n如果一个归档重做日志已通过操作系统删除命令手动从磁盘中移除，RMAN\
  \ 在尝试备份不存在的归档重做日志文件时将抛出以下错误：\n\n```\nRMAN-06059: expected archived log not found,\
  \ loss of archived log compromises recoverability\n```\n\n在这种情况下，首先运行一个 `CROSSCHECK`\
  \ 命令，让 RMAN 知道哪些文件在磁盘上物理可用：\n\n```\nRMAN> crosscheck archivelog all;\n```\n\n####\
  \ 备份快速恢复区\n\n如果你使用快速恢复区，RMAN 的一个很好的功能是，你可以用一条命令备份该位置的所有文件。如果你使用介质管理器并启用了磁带备份通道，你可以像这样将快速恢复区中的所有内容备份到磁带：\n\
  \n```\nRMAN> configure channel device type sbt_tape parms 'ENV=(OB_MEDIA_FAMILY=RMAN-DB11R2)';\n\
  ```\n\n```\nRMAN> backup device type sbt_tape recovery area;\n```\n\n你也可以将快速恢复区备份到磁盘上的某个位置。使用\
  \ `TO DESTINATION` 命令来实现这一点：\n\n```\nRMAN> backup recovery area to destination '/ora01/O11R1/fra_back';\n\
  ```\n\nRMAN 会根据需要，在 `TO DESTINATION` 命令指定的目录下自动创建目录。\n\n> **注意** `<TO_DESTINATION>`\
  \ 目录下的子目录格式为 `<SID>/backupset_<YYYY_MM_DD>`。RMAN 将备份完全备份、增量备份、控制文件自动备份和归档重做日志文件。请注意，闪回日志、联机重做日志文件和当前控制文件不会被备份。\n\
  \n#### 从备份中排除表空间\n\n假设你有一个包含非关键数据的表空间，并且你永远不想备份它。\n\n\n\n# RMAN 备份配置与报告\n\n## 排除表空间备份\n\
  RMAN 可被配置为从备份中排除特定表空间。要检查 RMAN 当前是否配置了排除任何表空间，请运行此命令：\n`RMAN> show exclude;`\n\n\
  该命令输出显示数据库的 RMAN 配置参数（数据库唯一名为`O11R2`），示例中 RMAN 未配置任何存储或默认参数。\n\n使用`EXCLUDE`命令来指示\
  \ RMAN 不要备份哪些表空间：\n`RMAN> configure exclude for tablespace users;`\n\n配置后，对于任何数据库级别的备份，RMAN\
  \ 将排除与`USERS`表空间关联的数据文件。你可以使用以下命令指示 RMAN 备份任何被排除的表空间：\n`RMAN> backup database noexclude;`\n\
  \n你可以通过以下命令清除排除设置：\n`RMAN> configure exclude for tablespace users clear;`\n\n####\
  \ 备份未备份的数据文件\n假设你刚向数据库添加了几个数据文件，并想确保它们已被备份。你可以执行以下命令来指示 Oracle 备份那些尚未备份的数据文件：\n\
  `RMAN> backup database not backed up;`\n\n你还可以指定一个时间范围，以备份该范围内尚未备份的文件。假设你发现过去几天备份未运行，并且想要备份过去\
  \ 24 小时内所有未备份的内容。以下命令将备份过去一天内未备份的所有数据文件：\n`RMAN> backup database not backed up since\
  \ time='sysdate-1';`\n\n如果你的备份因某些原因（如数据中心断电或备份目录在备份期间已满）而中止，此命令也很有用。在解决导致备份作业失败的问题后，你可以执行前面的命令，RMAN\
  \ 将仅备份指定时间段内未备份的数据文件。\n\n#### 跳过只读表空间\n由于只读表空间中的数据在只读模式下无法更改，你可能希望只备份只读表空间一次，然后在后续备份中跳过它们。使用`SKIP\
  \ READONLY`命令实现这一点：\n`RMAN> backup database skip readonly;`\n\n请记住，当你跳过只读表空间时，需要保留一个包含这些表空间的有效备份。避免陷入这样的情况：一个只读表空间六个月没有备份，然后发生了介质故障。\n\
  \n#### 跳过离线或不可访问的文件\n有时数据文件会损坏。假设你已知该数据文件不再需要，并将其离线，如下所示：\n`SQL> alter database\
  \ datafile '/ora01/INVDEV/sysaux01.dbf' offline for drop;`\n\n现在，假设你尝试运行 RMAN 备份：\n\
  `RMAN> backup database;`\n\n当 RMAN 遇到无法备份的数据文件时，会抛出以下错误：\n`RMAN-03002: failure of\
  \ backup command at 09/14/2010 13:24:04`\n`RMAN-06056: could not access datafile\
  \ 3`\n\n在这种情况下，你必须指示 RMAN 将离线数据文件排除在备份之外。`SKIP OFFLINE`命令指示 RMAN 忽略状态为离线的数据文件：\n\
  `RMAN> backup database skip offline;`\n\n如果一个文件完全丢失，请使用`SKIP INACCESSIBLE`来指示 RMAN\
  \ 忽略磁盘上不可访问的文件。如果使用操作系统命令删除了数据文件，可能会发生这种情况。以下是将不可访问的数据文件排除在 RMAN 备份之外的示例：\n`RMAN>\
  \ backup database skip inaccessible;`\n\n你可以用一个命令跳过只读、离线和不可访问的数据文件：\n`RMAN> backup\
  \ database skip readonly skip offline skip inaccessible;`\n\n在处理离线和不可访问的文件时，你应该查明文件离线或不可访问的原因，并尝试解决任何问题。\n\
  \n## 并行备份大文件\n通常，RMAN 只使用一个通道来备份单个数据文件。当你启用并行性时，它允许 RMAN 生成多个进程来备份多个文件。然而，即使启用了并行性，RMAN\
  \ 通常也不会同时使用多个并行通道来备份一个数据文件，但从 Oracle Database 11g 开始，你可以指示 RMAN 使用多个通道并行备份一个数据文件。\n\
  \n这被称为**多节备份**。此功能可以加快非常大的数据文件的备份速度。\n\n使用`SECTION SIZE`参数进行多节备份。以下示例配置两个并行通道来备份一个文件：\n\
  ```\nRMAN> configure device type disk parallelism 2;\nRMAN> configure channel 1\
  \ device type disk format '/ora01/O11R2/rman/r1%U.bk';\nRMAN> configure channel\
  \ 2 device type disk format '/ora02/O11R2/rman/r2%U.bk';\nRMAN> backup section size\
  \ 2500M datafile 10;\n```\n当此代码运行时，RMAN 将分配两个通道来并行备份数据文件`10`。\n\n**注意：** 如果你指定的节大小大于数据文件的大小，RMAN\
  \ 将不会并行备份该文件。\n\n## 将 RMAN 备份信息添加到存储库\n另一种场景是当你需要向控制文件填充有关 RMAN 备份的信息时。例如，假设你必须重建控制文件，现在控制文件不再包含任何关于\
  \ RMAN 的信息。在这种情况下，使用`CATALOG`命令向控制文件填充 RMAN 元数据。例如，如果所有 RMAN 备份文件都保存在`/ora01/O11R2/rman`目录中，你可以让控制文件识别该目录中的这些备份文件，如下所示：\n\
  `RMAN> catalog start with '/ora01/O11R2/rman';`\n\n这导致 RMAN 在指定目录中查找任何备份片、映像副本、控制文件副本或归档重做日志，如果找到，则将适当的元数据填充到控制文件中。对于此示例，在给定目录中找到了两个备份片文件：\n\
  ```\nsearching for all files that match the pattern /ora01/O11R2/rman\n\nList of\
  \ Files Unknown to the Database\n=====================================\nFile Name:\
  \ /ora01/O11R2/rman/r1otlns90o_1_1.bk\nFile Name: /ora01/O11R2/rman/r1xyklnrveg_1_1.bk\n\
  \nDo you really want to catalog the above files (enter YES or NO)?\n```\n如果你输入`YES`，则有关备份文件的元数据将被添加到控制文件中。这样，`CATALOG`命令允许你让\
  \ RMAN 存储库（控制文件和恢复目录）识别 RMAN 可用于备份和恢复的文件。\n\n你还可以指示 RMAN 编录恢复区域中控制文件当前未知的任何文件：\n\
  `RMAN> catalog recovery area;`\n\n你也可以编录特定的文件。此示例指示 RMAN 为特定的备份片文件向控制文件添加元数据：\n\
  `RMAN> catalog backuppiece '/ora01/O11R2/rman/r1xyklnrveg_1_1.bk';`\n\n### 创建增量备份\n\
  RMAN 有三种独立且不同的增量备份功能：\n- 增量级别备份\n- 增量更新备份\n- 块更改跟踪\n\n使用增量级别备份，RMAN 只备份自上次备份以来已修改的块。增量备份可应用于整个数据库、表空间或数据文件。这是\
  \ RMAN 最常用的增量功能。\n\n增量更新备份与增量级别备份是完全不同的功能。这些备份获取数据文件的映像副本，然后使用增量备份来更新这些映像副本。这为你提供了一种高效的方法，将映像副本作为备份策略的一部分进行实施和维护。你只需进行一次映像副本备份，然后使用增量备份来保持映像副本更新为最新的事务。\n\
  \n\n# RMAN 备份与报告\n\n## 块改变跟踪\n\n块改变跟踪是另一项旨在提升增量备份性能的功能。其核心思想是使用一个操作系统文件来记录自上次备份以来发生更改的数据块。在执行增量备份时，RMAN\
  \ 可以利用块改变跟踪文件快速识别出需要备份的数据块。此功能可以极大提升增量备份的性能。\n\n## 采用增量级别备份\n\nRMAN 通过级别来实现增量备份。从\
  \ Oracle Database 10*g* 开始，文档化的增量备份级别只有两种：级别 0 和级别 1。早期版本的 Oracle 提供 0 到 4 共五个级别。这些级别（0\
  \ 到 4）在 Oracle Database 10g 和 11g 中仍然可用，但未在 Oracle 文档中指定。你必须首先执行一个增量级别 0 备份来建立基线，之后才能执行级别\
  \ 1 增量备份。\n\n**注意**：完全备份备份的数据块与级别 0 备份完全相同。然而，你不能将完全备份用于增量备份。你必须以级别 0 备份开始增量备份。如果你尝试执行级别\
  \ 1 备份但不存在级别 0 备份，RMAN 会自动执行一个级别 0 备份。\n\n以下是一个执行增量级别 0 备份的示例：\n\n```\nRMAN> backup\
  \ incremental level=0 database;\n```\n\n假设接下来的几次备份，你只想备份自上次级别 0 基线备份以来发生更改的数据块。下面这行代码执行一个级别\
  \ 1 备份：\n\n```\nRMAN> backup incremental level=1 database;\n```\n\n增量备份有两种不同的类型：差异备份和累积备份。使用哪种类型的增量备份（差异或累积）取决于你的要求。差异备份（默认）较小，但恢复所需时间更长。累积备份比差异备份大，但恢复所需时间更短。\n\
  \n差异增量级别 1 备份指示 RMAN 备份自上次级别 1 或级别 0 备份以来发生更改的数据块，而累积增量级别 1 备份则指示 RMAN 备份自上次级别 0\
  \ 备份以来发生更改的数据块。累积增量备份实际上会忽略任何级别 1 增量备份。\n\n**注意**：RMAN 增量级别 0 备份用于还原数据文件，而 RMAN\
  \ 增量级别 1 备份用于恢复数据文件。\n\n在使用增量备份时，我几乎总是使用默认的差异备份。通常我不太担心差异备份和累积备份之间的区别。如果你需要累积备份，必须指定关键字\
  \ `CUMULATIVE`。以下是一个执行累积级别 1 备份的示例：\n\n```\nRMAN> backup incremental level=1 cumulative\
  \ database;\n```\n\n以下是一些在比数据库更细粒度级别上执行增量备份的其他示例：\n\n```\nRMAN> backup incremental\
  \ level=0 tablespace sysaux;\nRMAN> backup incremental level=1 tablespace sysaux\
  \ plus archivelog;\nRMAN> backup incremental level=1 datafile 3;\n```\n\n## 执行增量更新备份\n\
  \n增量更新备份的基本思想是创建数据文件的映像副本，然后使用增量备份来更新这些映像副本。这样，你就拥有了一份数据库的映像副本，通过应用增量备份使其保持某种程度的最新状态。这可以是一种将映像副本备份与增量备份相结合的高效方式。\n\
  \n要理解这种备份技术的工作原理，你需要检查执行增量更新备份的命令。你需要两行 RMAN 代码来启用此功能：\n\n```\nRMAN> recover copy\
  \ of database with tag 'incupdate';\nRMAN> backup incremental level 1 for recover\
  \ of copy with tag 'incupdate' database;\n```\n\n在第一行中，指定了一个标签（此示例使用 `incupdate`）。你可以使用任何你想要的标签名称；该标签名称让\
  \ RMAN 能够关联每次运行命令时使用的备份文件。然后，此代码在你第一次运行脚本时会执行以下操作：\n\n- `RECOVER COPY` 生成一条消息，表示没有需要操作的内容。\n\
  - 如果不存在映像副本，`BACKUP INCREMENTAL` 会创建数据库数据文件的映像副本。\n\n当 `RECOVER COPY` 命令首次运行时，你应该会在输出中看到类似这样的消息：\n\
  \n```\nno parent backup or copy of datafile ... found\n```\n\n在 `BACKUP INCREMENTAL`\
  \ 的输出中，你应该会看到类似这样的文本，表明正在创建映像副本：\n\n```\nchannel ORA_DISK_1: datafile copy complete,\
  \ elapsed time: 00:00:25\n```\n\n第二次运行增量更新备份时，它执行以下操作：\n\n- `RECOVER COPY` 仍然没有需要操作的内容。\n\
  - `BACKUP INCREMENTAL` 执行一个增量级别 1 备份并为其分配指定的标签名称；此备份随后将被 `RECOVER COPY` 命令使用。\n\n\
  第三次运行增量更新备份时，它执行以下操作：\n\n- 既然已经创建了一个增量备份，`RECOVER COPY` 会将该增量备份应用到映像副本上。\n- `BACKUP\
  \ INCREMENTAL` 执行一个增量级别 1 备份并为其分配指定的标签名称；此备份随后将被 `RECOVER COPY` 命令使用。\n\n此后，每次你运行这两行代码，你都将拥有一个定期重复的备份模式。如果你使用映像副本进行备份，可以考虑使用增量更新备份策略，因为这样可以避免每次备份运行时都创建完整的映像副本。\n\
  \n每次备份运行时，映像副本都会根据上一次备份的增量更改进行更新。\n\n## 使用块改变跟踪\n\n块改变跟踪是指使用一个二进制文件来记录数据库数据文件块的更改。其目的是提升增量备份性能，因为\
  \ RMAN 可以使用块改变跟踪文件来精确定位自上次备份以来发生更改的数据块。这节省了大量时间，否则 RMAN 将必须扫描所有已备份的数据块以确定它们自上次备份以来是否已更改。你可以通过以下步骤启用块改变跟踪：\n\
  \n1.  如果尚未启用，将 `DB_CREATE_FILE_DEST` 参数设置为一个位置。例如：\n    ```\n    SQL> alter system\
  \ set db_create_file_dest='/ora01/O11R2/bct' scope=both;\n    ```\n2.  通过 `ALTER\
  \ DATABASE` 命令启用块改变跟踪：\n    ```\n    SQL> alter database enable block change tracking;\n\
  \    ```\n\n此示例在 `DB_CREATE_FILE_DEST` 指定的目录中创建一个使用 OMF 名称的文件。在此示例中，创建的文件名为：\n\n\
  ```\n/ora01/O11R2/bct/O11R2/changetracking/o1_mf_68wxc16g_.chg\n```\n\n你也可以通过直接指定文件名来启用块改变跟踪，这不需要设置\
  \ `DB_CREATE_FILE_DEST`。例如：\n\n```\nSQL> alter database enable block change tracking\
  \ using file '/ora01/O11R2/bct/btc.bt';\n```\n\n你可以通过运行以下查询来验证块改变跟踪的详细信息：\n\n```\n\
  SQL> select * from v$block_change_tracking;\n```\n\n出于空间规划目的，块改变跟踪文件的大小大约是数据库中被跟踪块总大小的\
  \ 1/30,000。因此，块改变跟踪文件的大小与数据库大小成正比，而不是与生成的日志量成正比。\n\n要禁用块改变跟踪，请运行以下命令：\n\n```\nSQL>\
  \ alter database disable block change tracking;\n```\n\n**注意**：当你禁用块改变跟踪时，Oracle\
  \ 会自动删除块改变跟踪文件。\n\n## 检查数据文件和备份中的损坏情况\n\n\n# 第 18 章 ■ RMAN 备份与报告\n\n你可以使用`RMAN`来检查数据文件、归档重做日志和控制文件中的损坏情况。你还可以验证备份集是否可恢复。`RMAN\
  \ VALIDATE`命令用于执行这类完整性检查。运行`VALIDATE`命令有三种方式：\n\n- `VALIDATE`\n- `BACKUP...VALIDATE`\n\
  - `RESTORE...VALIDATE`\n\n■ `注意` 独立的`VALIDATE`命令在 Oracle Database 11g 或更高版本中可用。`BACKUP...VALIDATE`和`RESTORE...VALIDATE`命令在\
  \ Oracle Database 10g 或更高版本中可用。\n\n#### 使用 VALIDATE\n\n`VALIDATE`命令可以单独使用（无需`BACKUP`或`RESTORE`）来检查数据库数据文件、归档重做日志文件、控制文件、`spfile`和备份集片段中的缺失文件或物理损坏。例如，以下命令将验证所有数据文件和控制文件：`RMAN>\
  \ validate database;`\n\n你也可以仅验证控制文件，如下所示：`RMAN> validate current controlfile;`\n\
  \n你可以像这样验证归档重做日志文件：`RMAN> validate archivelog all;`\n\n你可以将前述三个完整性检查合并为一个命令，如下所示：`RMAN>\
  \ validate database include current controlfile plus archivelog;` 在正常操作下，`VALIDATE`命令仅检查物理损坏。你可以通过使用`CHECK\
  \ LOGICAL`子句来指定还要检查逻辑损坏，如下所示：`RMAN> validate check logical database include current\
  \ controlfile plus archivelog;` 你可以以多种方式使用`VALIDATE`。以下是其他一些示例：\n`RMAN> validate\
  \ database skip offline;`\n\n`RMAN> validate copy of database;`\n\n`RMAN> validate\
  \ tablespace system;`\n\n`RMAN> validate datafile 3 block 20 to 30;`\n\n`RMAN> validate\
  \ spfile;`\n\n`RMAN> validate backupset <primary_key_value>;`\n\n`RMAN> validate\
  \ recovery area;`\n\n如果`RMAN`检测到任何损坏的数据块，`V$DATABASE_BLOCK_CORRUPTION`视图会被填充。该视图包含有关文件号、数据块号和受影响的数据块数量的信息。你可以使用此信息执行数据块级别的恢复。有关数据块级别恢复的详细信息，请参见第\
  \ 19 章。\n\n■ `注意` 物理损坏是指数据块内容与 Oracle 预期的物理格式不匹配。默认情况下，`RMAN`在备份、恢复或验证数据文件时会检查物理损坏。逻辑损坏是指数据块格式正确但其内容与\
  \ Oracle 预期不一致。逻辑损坏可能是诸如行片段或索引条目损坏等问题。\n\n#### 使用 BACKUP...VALIDATE\n\n`BACKUP VALIDATE`命令与`VALIDATE`命令非常相似，它可以检查数据文件是否可用以及数据文件是否包含任何损坏的数据块。例如：\n\
  `RMAN> backup validate database;`\n\n此命令实际上不执行任何类型的备份，也不创建任何文件。它只扫描数据文件并检查损坏情况。与`VALIDATE`命令类似，`BACKUP\
  \ VALIDATE`默认只检查物理损坏。你可以指示它同时检查逻辑损坏，如下所示：\n`RMAN> backup validate check logical\
  \ database;`\n\n以下是`BACKUP...VALIDATE`命令的其他一些变体：\n\n`RMAN> backup validate database\
  \ current controlfile;`\n\n`RMAN> backup validate check logical database current\
  \ controlfile plus archivelog;` 与`VALIDATE`命令类似，如果`BACKUP...VALIDATE`检测到任何损坏的数据块，它也会填充`V$DATABASE_BLOCK_CORRUPTION`视图。该视图中的信息可用于确定哪些数据块可能通过数据块级别的恢复来修复。有关数据块级别恢复的更多详细信息，请参见第\
  \ 19 章。\n\n#### 使用 RESTORE...VALIDATE\n\n`RESTORE...VALIDATE`命令用于验证将用于恢复的备份文件。此命令验证备份集、数据文件副本和归档重做日志文件：\n\
  `RMAN> restore validate database;`\n\n使用`RESTORE...VALIDATE`时，不会恢复任何实际文件。这意味着你可以在数据库处于联机和可用状态时运行该命令。\n\
  \n\n### 记录 RMAN 输出\n\n在排查 RMAN 输出问题或检查备份作业状态时，记录 RMAN 的执行内容和每条命令的状态至关重要。有多种方法可以记录\
  \ RMAN 输出：其中一些是 Linux/Unix 操作系统的内置功能，另一些则是 RMAN 特有的功能：\n\n*   Linux/Unix 重定向输出到文件\n\
  *   Linux/Unix 日志记录命令\n*   RMAN `LOG` 命令\n*   `V$RMAN_OUTPUT` 视图\n\n这些日志功能将在后续章节中讨论。\n\
  \n#### 将输出重定向到文件\n\n我几乎所有的 RMAN 备份作业都从 Shell 脚本运行。这些 Shell 脚本通常由`cron`等调度工具自动执行。当以此方式运行\
  \ RMAN 命令时，我总是通过让 Shell 命令将标准输出消息和标准错误消息重定向到日志文件来捕获输出。这是通过重定向字符`>`完成的。此示例运行一个 Shell\
  \ 脚本（`rmanback.bsh`），并将标准输出和标准错误输出都重定向到一个名为`rmanback.log`的日志文件：\n\n```\n$ rmanback.bsh\
  \ 1>/home/oracle/bin/log/rmanback.log 2>&1\n```\n\n此处，`1>`指示标准输出被重定向到指定文件。`2>&1`指示\
  \ Shell 脚本将标准错误输出发送到与标准输出相同的位置。\n\n**提示：** 有关 DBA 如何使用 Shell 脚本和 Linux 功能的完整细节，请参阅《Linux\
  \ Recipes for Oracle DBAs》（Apress, 2008）。\n\n#### 使用 Unix/Linux 日志命令捕获输出\n\n你可以指示\
  \ Unix/Linux 创建一个日志文件，以捕获同时显示在屏幕上的任何输出。这可以通过以下两种方式之一完成：\n\n*   `tee`\n*   `script`\n\
  \n### 使用`tee`捕获输出\n\n当你启动 RMAN 时，可以使用`tee`命令将屏幕上看到的输出发送到操作系统文本文件：\n\n```\n$ rman\
  \ | tee /tmp/rman.log\n```\n\n现在你可以连接到目标数据库并运行命令。屏幕上看到的所有输出都将被记录到`/tmp/rman.log`文件中：\n\
  \n```\nRMAN> connect target /\nRMAN> backup database;\nRMAN> exit;\n```\n\n当你退出\
  \ RMAN 时，`tee`会话停止写入日志文件。\n\n### 使用`script`命令捕获输出\n\n`script`命令非常有用，因为它指示操作系统将终端上出现的任何输出记录到日志文件中。要捕获所有输出，请在连接到\
  \ RMAN 之前运行`script`命令：\n\n```\n$ script /tmp/rman.log\nScript started, file is /tmp/rman.log\n\
  $ rman target /\nRMAN> backup database;\nRMAN> exit;\n```\n\n要结束`script`会话，输入`Ctrl+D`或输入`exit`。`/tmp/rman.log`文件将包含显示在屏幕上的所有输出。当你需要捕获从一个时间点到另一个时间点的所有输出时，`script`命令很有用。例如，你可能正在运行\
  \ RMAN 命令、退出 RMAN、运行 SQL*Plus 命令等等。`script`会话从你启动`script`开始，直到你输入`Ctrl+D`结束。\n\n\
  #### 将输出记录到文件\n\n捕获 RMAN 输出的一种简单方法是使用`SPOOL LOG`命令将输出发送到文件。此示例在 RMAN 内部假脱机一个日志文件：\n\
  \n```\nRMAN> spool log to '/tmp/rmanout.log'\nRMAN> set echo on;\nRMAN> <run RMAN\
  \ commands>\nRMAN> spool log off;\n```\n\n默认情况下，`SPOOL LOG`命令会覆盖现有文件。如果要追加到日志文件，请使用关键字`APPEND`：\n\
  \n```\nRMAN> spool log to '/tmp/rmanout.log' append\n```\n\n你也可以在命令行启动 RMAN 时将输出定向到日志文件，这会覆盖现有文件：\n\
  \n```\n$ rman target / log /tmp/rmanout.log\n```\n\n你也可以追加到日志文件，如下所示：\n\n```\n$\
  \ rman target / log /tmp/rmanout.log append\n```\n\n当你按前面示例所示使用`SPOOL LOG`时，输出会进入文件而不是你的终端。因此，我在交互式运行\
  \ R 曼时很少使用`SPOOL LOG`。它主要是一个在从脚本运行 RMAN 时捕获输出的工具。\n\n#### 在数据字典中查询输出\n\n\n# RMAN\
  \ 备份与报告\n\n## 查看最近的 RMAN 输出\n\n如果你没有捕获任何 RMAN 输出，仍然可以通过查询数据字典来查看最近的 RMAN 输出。`V$RMAN_OUTPUT`\
  \ 视图包含了 RMAN 最近报告的消息：\n\n```\nselect\nsid\n,recid\n,output\nfrom v$rman_output\n\
  order by recid;\n```\n\n以下是一些示例输出：\n\n```\n173 1108 Starting backup at 13-SEP-10\n\
  173 1109 using channel ORA_DISK_1\n173 1110 using channel ORA_DISK_2\n```\n\n`V$RMAN_OUTPUT`\
  \ 是一个内存中的对象，最多可容纳 32,768 行。当你停止并重启数据库时，此视图中的信息会被清除。当你使用 RMAN 的 `SPOOL LOG` 命令将输出假脱机到文件，并且无法在终端查看当前情况时，这个视图非常方便。\n\
  \n### RMAN 报告\n\n有几种不同的方法可以报告 RMAN 环境的信息：\n- `LIST` 命令\n- `REPORT` 命令\n- 通过数据字典视图查询元数据\n\
  \n初次学习 RMAN 时，`LIST` 和 `REPORT` 命令之间的区别可能令人困惑，因为两者的界限并不清晰。一般来说，我使用 `LIST` 命令查看现有备份的信息，而\
  \ `REPORT` 命令用于确定需要备份哪些文件，或显示关于过期或失效备份的信息。\n\n我使用 SQL 查询来生成专门的报告（无法通过 `LIST` 或 `REPORT`\
  \ 获得）或自动化报告。例如，我通常通过 shell 脚本和 SQL 实现自动检查，报告 RMAN 备份在过去一天内是否运行过。\n\n### 使用 `LIST`\n\
  \n在调查 RMAN 备份问题时，我通常首先要做的是连接到目标数据库并运行 `LIST BACKUP` 命令。此命令显示备份集、备份片以及备份中包含的文件：\n\
  \n```\nRMAN> list backup;\n```\n\n它显示了存储库中记录的所有 RMAN 备份。你可能希望将输出假脱机到一个文件，以便保存输出，然后使用操作系统编辑器在其中搜索并查找特定的字符串。\n\
  \n要获取备份信息的汇总视图，请使用 `LIST BACKUP SUMMARY` 命令：\n\n```\nRMAN> list backup summary;\n\
  ```\n\n你也可以使用 `LIST` 命令仅报告映像副本信息：\n\n```\nRMAN> list copy;\n```\n\n下一个命令报告归档重做日志备份：\n\
  \n```\nRMAN> list archivelog all;\n```\n\n运行 `LIST` 命令（同样，`REPORT` 命令将在下一节介绍）的方式非常多。上面列出的方法是你最常使用的。有关可用选项的完整列表，请参阅\
  \ Oracle 数据库的《备份与恢复参考》指南（可在 Oracle 的 OTN 网站上获取）。\n\n### 使用 `REPORT`\n\nRMAN `REPORT`\
  \ 命令可用于报告各种详细信息。你可以通过以下命令快速查看与数据库关联的所有数据文件：\n\n```\nRMAN> report schema;\n```\n\n\
  `REPORT` 命令提供有关通过 RMAN 保留策略标记为过时的备份的详细信息。例如：\n\n```\nRMAN> report obsolete;\n```\n\
  \n你可以根据保留策略报告需要备份的数据文件，如下所示：\n\n```\nRMAN> report need backup;\n```\n\n有几种方法可以报告需要备份的数据文件。以下是其他一些变体：\n\
  \n```\nRMAN> report need backup redundancy 2;\nRMAN> report need backup redundancy\
  \ 2 datafile 2;\n```\n\n`REPORT` 命令的另一种用法是用于报告从未备份过或可能包含通过 `NOLOGGING` 操作创建的数据的数据文件。例如，假设你直接路径加载数据到一个表中，并且该表所在的数据文件尚未备份。以下命令将检测这些情况：\n\
  \n```\nRMAN> report unrecoverable;\n```\n\n#### 使用 SQL\n\n有许多数据字典视图可用于查询备份信息。`表\
  \ 18–1` 描述了与 RMAN 相关的数据字典视图。无论你是否使用恢复目录，这些视图都是可用的（这些视图中的信息源自控制文件）。\n\n\n\n# 第 18\
  \ 章 RMAN 备份与报告\n\n## 表 18–1. RMAN 备份数据字典视图描述\n\n| 视图名称 | 关于...的信息 |\n| :--- | :---\
  \ |\n| `V$RMAN_BACKUP_JOB_DETAILS` | RMAN 备份作业。 |\n| `V$BACKUP` | 在线数据文件的备份状态。 |\n\
  | `V$BACKUP_ARCHIVELOG_DETAILS` | 已备份的归档日志。 |\n| `V$BACKUP_CONTROLFILE_DETAILS`\
  \ | 已备份的控制文件。 |\n| `V$BACKUP_COPY_DETAILS` | 控制文件和数据文件副本。 |\n| `V$BACKUP_DATAFILE`\
  \ | 控制文件和数据文件备份。 |\n| `V$BACKUP_DATAFILE_DETAILS` | 在备份集、映像副本和代理副本中备份的数据文件。 |\n\
  | `V$BACKUP_FILES` | 已备份的数据文件、控制文件、spfile 和归档重做日志。 |\n| `V$BACKUP_PIECE` | 备份片文件。\
  \ |\n| `V$BACKUP_PIECE_DETAILS` | 备份片的详细信息。 |\n| `V$BACKUP_SET` | 备份集。 |\n| `V$BACKUP_SET_DETAILS`\
  \ | 备份集的详细信息。 |\n\n有时，刚接触 RMAN 的 DBA 会难以理解备份、备份集、备份片、数据文件这些概念以及它们之间的关系。在讨论 RMAN\
  \ 备份组件时，我发现下面的查询很有用。这个查询将显示备份集、备份集内的备份片以及备份片内备份的数据文件：\n\n```sql\nSET LINES 132 PAGESIZE\
  \ 100\nBREAK ON REPORT ON bs_key ON completion_time ON bp_name ON file_name\nCOL\
  \ bs_key FORM 99999 HEAD \"BS Key\"\nCOL bp_name FORM a40 HEAD \"BP Name\"\nCOL\
  \ file_name FORM a40 HEAD \"Datafile\"\n--\nSELECT\n    s.recid bs_key\n    ,TRUNC(s.completion_time)\
  \ completion_time\n    ,p.handle bp_name\n    ,f.name file_name\nFROM v$backup_set\
  \ s\n    ,v$backup_piece p\n    ,v$backup_datafile d\n    ,v$datafile f\nWHERE p.set_stamp\
  \ = s.set_stamp\nAND p.set_count = s.set_count\nAND d.set_stamp = s.set_stamp\n\
  AND d.set_count = s.set_count\nAND d.file# = f.file#\nORDER BY\n    s.recid\n  \
  \  ,p.handle\n    ,f.name;\n```\n\n此处的输出经过缩短以适合页面显示：\n\n```\nBS Key COMPLET BP Name\
  \                                          Datafile\n------ ------- ------------------------------------------------\
  \ -----------------------------------------\n   414 14-SEP /ora01/O11R2/rman/r1j_1_1.bk\
  \                     /ora01/dbfile/O11R2/mvindex01.dbf\n                      \
  \                                        /ora01/dbfile/O11R2/sysaux01.dbf\n    \
  \                                                          /ora01/dbfile/O11R2/system01.dbf\n\
  \                                                              /ora02/dbfile/O11R2/users01.dbf\n\
  ```\n\n有时，对 RMAN 备份的性能进行报告很有用。下面的查询报告了每个会话的 RMAN 备份耗时。\n\n```sql\nCOL hours FORM\
  \ 9999.99\nCOL time_taken_display FORM a20\nSET LINESIZE 132\n--\nSELECT\n    session_recid\n\
  \    ,compression_ratio\n    ,time_taken_display\n    ,(end_time - start_time) *\
  \ 24 as hours\n    ,TO_CHAR(end_time,'dd-mon-yy hh24:mi') as end_time\nFROM v$rman_backup_job_details\n\
  ORDER BY end_time;\n```\n\n这是一些示例输出：\n\n```\nSESSION_RECID COMPRESSION_RATIO TIME_TAKEN_DISPLAY\
  \      HOURS END_TIME\n------------- ----------------- -------------------- -------\
  \ -----------------\n         7509        4.55050595 03:20:48                3.35\
  \ 04-sep-10 19:23\n         7515        4.51185084 03:23:04                3.38\
  \ 05-sep-10 19:25\n         7521        4.43947443 03:31:48                3.53\
  \ 06-sep-10 19:34\n         7527        4.35619748 03:45:03                3.75\
  \ 07-sep-10 19:47\n         7533        4.2773889  04:20:04                4.33\
  \ 08-sep-10 20:23\n         7547        4.51488    03:22:21                3.37\
  \ 09-sep-10 19:24\n         7554        4.49303627 03:28:06                3.47\
  \ 10-sep-10 19:31\n         7561        4.51925905 03:17:00                3.28\
  \ 11-sep-10 19:19\n         7568        4.54671383 03:14:03                3.23\
  \ 12-sep-10 19:16\n         7575        4.52995677 03:17:07                3.29\
  \ 13-sep-10 19:19\n```\n\n`V$RMAN_BACKUP_JOB_DETAILS` 的内容是按连接到 RMAN 的会话汇总的。因此，如果你连接到\
  \ RMAN（建立一个会话），然后在备份作业完成后退出 RMAN，报告输出会更准确。如果你在连接到 RMAN 的同时运行多个备份作业，查询输出会报告该会话连接期间的所有备份活动。\n\
  \n你应该有一个自动化的方法来检测 RMAN 备份是否在运行以及数据文件是否正在被备份。实现此任务的一种可靠方法是将 SQL 嵌入到 shell 脚本中，然后使用诸如\
  \ `cron` 之类的调度工具定期运行该脚本。\n\n我通常对 RMAN 备份运行两种基本类型的检查：\n*   RMAN 备份最近是否运行过？\n*   是否有任何数据文件最近没有被备份？\n\
  \n下面的 shell 脚本检查上述条件。你需要修改脚本，并为能够查询脚本中引用的数据字典对象的用户提供用户名和密码（在此脚本中用户名/密码是 `darl/foobar`）。运行脚本时，你需要传入两个变量：Oracle\
  \ SID 以及你希望回溯检查备份最近一次运行时间或数据文件最近一次备份时间的天数阈值。\n\n```bash\n#!/bin/bash\n#\nif [ $#\
  \ -ne 2 ]; then\n    echo \"Usage: $0 SID threshold\"\n    exit 1\nfi\n```\n\n\n\
  \n# 源 Oracle OS 变量\n\n`. /var/opt/oracle/oraset $1`\n\n`crit_var=$(sqlplus -s <<EOF\n\
  darl/foobar\nSET HEAD OFF FEEDBACK OFF\nSELECT COUNT(*) FROM\n(SELECT (sysdate -\
  \ MAX(end_time)) delta\nFROM v\\$rman_backup_job_details) a\nWHERE a.delta > $2;\n\
  EOF)`\n\n#\n\n`if [ $crit_var -ne 0 ]; then`\n    `echo \"rman backups not running\
  \ on $1\" | mailx -s \"rman problem\" dkuhn@oracle.com`\n`else`\n    `echo \"rman\
  \ backups ran ok\"`\n`fi`\n\n`#--------------------------------------------`\n\n\
  `crit_var2=$(sqlplus -s <<EOF\ndarl/foobar\nSET HEAD OFF FEEDBACK OFF\nSELECT COUNT(*)\n\
  FROM\n(\n    SELECT name\n    FROM v\\$datafile\n    MINUS\n    SELECT DISTINCT\n\
  \    f.name\n    FROM v\\$backup_datafile d\n        ,v\\$datafile f\n    WHERE\
  \ d.file# = f.file#\n    AND d.completion_time > sysdate - $2);\nEOF)`\n\n#\n\n\
  `if [ $crit_var2 -ne 0 ]; then`\n    `echo \"datafile not backed up on $1\" | mailx\
  \ -s \"rman problem\" dkuhn@oracle.com`\n`else`\n    `echo \"datafiles are backed\
  \ up...\"`\n`fi`\n\n#\n\n`exit 0`\n\n例如，要检查备份是否在最近两天内成功运行，请如下运行该脚本（名为 `rman_chk.bsh`）：\n\
  \n`$ rman_chk.bsh INVPRD 2`\n\n上述脚本虽然基础但很有效。您可以根据您的 RMAN 环境需求对其进行增强和补充。\n\n## 总结\n\
  \nRMAN 为备份提供了许多灵活且功能丰富的选项。默认情况下，RMAN 仅备份数据库中已修改的数据块。增量备份功能还允许您仅备份自上次备份以来修改过的数据块。这些增量功能在大型数据库环境中特别有用，因为在这种环境中，从一次备份到下一次备份，只有很小比例的数据会发生变化。\n\
  \n您可以通过映像副本（`BACKUP AS COPY` 命令生成）指示 RMAN 备份每个数据文件中的每个数据块。映像副本是数据文件的逐块相同副本。映像副本的优势在于可以直接从备份中还原备份文件（无需使用\
  \ RMAN）。您可以使用增量更新备份功能来实现映像副本备份和增量备份的高效混合。\n\nRMAN 包含用于报告备份多个方面的内置命令。`LIST` 命令报告备份活动。`REPORT`\
  \ 命令对于确定根据保留策略需要备份哪些文件非常有用。\n\n在成功配置 RMAN 并创建备份后，您就具备了在发生介质故障时还原和恢复数据库的能力。还原和恢复主题将在下一章详细讨论。\n\
  \n![](img/index-543_1.png)\n\n# 第 19 章 ■ RMAN 还原与恢复\n\n（另一台服务器上的备份是完好的。我能够从这些备份中还原和恢复生产数据库。\n\
  \n我们丢失了大约一天的数据（介于归档日志损坏和不允许传入事务的停机时间之间），但我们能够在最初接到电话后大约 20 小时内完成数据库的还原和恢复。那真是漫长的一天。\n\
  \n大多数需要进行还原和恢复的情况都不会像刚才描述的那样糟糕。然而，前面的场景确实突显了以下几点的必要性：\n\n*   备份策略。\n*   具备备份与恢复技能的\
  \ DBA。\n*   还原和恢复策略，包括定期测试还原和恢复的要求。\n\n本章将引导您使用 RMAN 进行还原和恢复。它涵盖了处理介质故障时必须执行的许多常见任务。\n\
  \n## 确定是否需要介质恢复\n\n术语“介质恢复”指的是需要还原由于底层存储介质（通常是某种磁盘）故障而丢失或损坏的文件。通常，您会通过某种错误得知需要进行介质恢复，例如：\n\
  \n```\nORA-01157: cannot identify/lock data file 1 - see DBWR trace file\nORA-01110:\
  \ data file 1: '/u02/oracle/oradata/E64208/system01.dbf'\n```\n\n在执行停止和启动数据库等 DBA\
  \ 任务时，该错误可能会显示在屏幕上。或者您可能在跟踪文件或 `alert.log` 文件中看到此类错误。如果您没有立即注意到问题，在严重的介质故障情况下，数据库将停止处理事务，用户会开始给您打电话。\n\
  \n要了解 Oracle 如何确定需要介质恢复，您必须了解 Oracle 如何确定一切正常。当 Oracle 正常关闭时（`IMMEDIATE`、`TRANSACTIONAL`、`NORMAL`），关闭过程的一部分是将所有已修改的块刷新到磁盘，在每个数据文件的头部标记当前\
  \ SCN，并用当前 SCN 信息更新控制文件。\n\n启动时，Oracle 会检查控制文件中的 SCN 是否与数据文件头中的 SCN 匹配。如果匹配，Oracle\
  \ 尝试打开数据文件和在线重做日志文件。如果所有文件都可用且可以打开，Oracle 则正常启动。以下查询比较控制文件中的 SCN（对于每个数据文件）与数据文件头中的\
  \ SCN：\n\n```\nSET LINES 132\nCOL name FORM a40\nCOL status FORM A8\nCOL file# FORM\
  \ 9999\nCOL control_file_SCN FORM 999999999999999\nCOL datafile_SCN FORM 999999999999999\n\
  --\nSELECT\n    a.name\n    ,a.status\n    ,a.file#\n    ,a.checkpoint_change# control_file_SCN\n\
  \    ,b.checkpoint_change# datafile_SCN\n    ,CASE\n        WHEN ((a.checkpoint_change#\
  \ - b.checkpoint_change#) = 0) THEN 'Startup Normal'\n        WHEN ((b.checkpoint_change#)\
  \ = 0) THEN 'File Missing?'\n        WHEN ((a.checkpoint_change# - b.checkpoint_change#)\
  \ > 0) THEN 'Media Rec. Req.'\n        WHEN ((a.checkpoint_change# - b.checkpoint_change#)\
  \ < 0) THEN 'Old Control File'\n        ELSE 'what the ?'\n    END datafile_status\n\
  FROM v$datafile a -- control file SCN for datafile\n    ,v$datafile_header b --\
  \ datafile header SCN\nWHERE a.file# = b.file#\nORDER BY a.file#;\n```\n\n如果控制文件的\
  \ SCN 值大于数据文件的 SCN 值，则很可能需要介质恢复。\n\n### 确定要还原的内容\n\n介质恢复需要您执行手动任务以使数据库恢复完整。这些任务通常涉及\
  \ `RESTORE` 和 `RECOVER` 命令的组合。如果您的数据文件经历了介质故障，您将必须发出 RMAN `RESTORE` 命令。这可能是由于有人意外删除了文件或磁盘故障。\n\
  \n## 流程如何工作\n\n当您发出 `RESTORE` 命令时，RMAN 会自动确定如何从以下任何可用备份中提取数据文件：\n\n*   全数据库备份\n\
  *   增量级别 0 备份\n*   由 `BACKUP AS COPY` 命令生成的映像副本备份\n\n文件从备份中还原后，您需要通过 `RECOVER` 命令将重做日志应用于它们。当您发出\
  \ `RECOVER` 命令时，Oracle 将检查受影响数据文件中的 SCN，并确定其中是否需要恢复。如果数据文件中的 SCN 小于控制文件中相应的 SCN，则需要介质恢复。\n\
  \nOracle 将检索数据文件的 SCN，然后在重做流中查找相应的 SCN，以确定从何处开始恢复过程。如果起始恢复 SCN 位于在线重做日志文件中，则不需要归档重做日志文件进行恢复。\n\
  \n在恢复过程中，RMAN 会自动确定如何应用重做日志。首先，RMAN 将应用任何可用的增量备份（大于零级别，例如增量级别 1）。接下来，将应用磁盘上任何归档重做日志文件。如果归档重做日志文件在磁盘上不存在，RMAN\
  \ 将尝试从备份集中检索它们。\n\n要能够执行完全恢复，需要满足以下所有条件：\n\n*   您的数据库处于归档日志模式。\n*   您拥有良好的数据库基线备份。\n\
  \n\n\n# 第十九章 ■ RMAN 恢复与修复\n\n恢复与修复的场景多种多样。如何恢复和修复直接取决于您的备份策略以及哪些文件受到了损坏。面对介质故障时，通常遵循以下一般步骤：\n\
  \n1.  确定需要恢复哪些文件。\n2.  根据损坏情况，将数据库模式设置为 `nomount`、`mount` 或 `open`。\n3.  使用 `RESTORE`\
  \ 命令从 RMAN 备份中检索文件。\n4.  对需要修复的数据文件使用 `RECOVER` 命令。\n5.  打开数据库。\n\n您特定的恢复和修复场景可能不需要执行上述所有步骤。例如，您可能只想恢复\
  \ `spfile`，这就不需要修复步骤。\n\n恢复与修复过程的第一步是确定哪些文件发生了介质故障。通常可以从以下来源判断需要恢复的文件：\n\n*   屏幕上显示的错误信息（来自\
  \ RMAN 或 SQL*Plus）\n*   `Alert.log` 文件及相应的跟踪文件\n*   数据字典视图\n\n如果您使用的是 Oracle Database\
  \ 11 *g* 或更高版本，除了前述方法，您还应考虑使用数据恢复指导工具来获取故障范围信息和相应的纠正措施。\n\n## 使用数据恢复指导工具\n\n数据恢复指导工具是在\
  \ Oracle Database 11 *g* 中引入的。当发生介质故障时，此工具将显示故障详情、建议纠正措施，并且如果您指定，它还会执行建议的措施。这就像在恢复和修复情况下多了一双眼睛来提供反馈。数据恢复指导工具具有三种模式：\n\
  \n*   列出故障。\n*   建议纠正措施。\n*   运行命令以修复故障。\n\n数据恢复指导工具从 RMAN 中调用。您可以将数据恢复指导工具视为一组在处理介质故障时能为您提供帮助的\
  \ RMAN 命令。\n\n### 列出故障\n\n使用数据恢复指导工具时，`LIST FAILURE` 命令用于显示数据文件、控制文件或在线重做日志的任何问题：\n\
  \n```\nRMAN> list failure;\n```\n\n如果没有检测到故障，您将看到一条消息，指示没有故障。以下是一些示例输出，表明某个数据文件可能存在问题：\n\
  \n```\nList of Database Failures\n=========================\n\nFailure ID Priority\
  \ Status Time Detected Summary\n---------- -------- --------- ------------- -------\n\
  662 HIGH OPEN 16-SEP-10 One or more non-system datafiles are missing\n```\n\n前面的消息并未指出具体哪个文件可能出现了故障。要深入探究，请使用\
  \ `DETAIL` 子句：\n\n```\nRMAN> list failure 662 detail;\n\nList of Database Failures\n\
  =========================\n\nFailure ID Priority Status Time Detected Summary\n\
  ---------- -------- --------- ------------- -------\n662 HIGH OPEN 16-SEP-10\nOne\
  \ or more non-system datafiles are missing\nImpact: See impact for individual child\
  \ failures\n\nList of child failures for parent failure ID 662\nFailure ID Priority\
  \ Status Time Detected Summary\n---------- -------- --------- ------------- -------\n\
  665 HIGH OPEN 16-SEP-10 Datafile 7:\n'/ora01/dbfile/O11R2/users02.dbf' is missing\n\
  Impact: Some objects in tablespace USERS might be unavailable\n```\n\n此输出详细说明了哪个文件出现了故障以及问题的性质（文件丢失）。\n\
  \n### 建议纠正措施\n\n`ADVISE FAILURE` 命令就如何从数据恢复指导工具检测到的潜在问题中恢复提供建议。如果您的数据库存在多个故障，您可以直接指定故障\
  \ ID 以获取针对特定故障的建议，如下所示：\n\n```\nRMAN> advise failure 665;\n```\n\n以下是针对此特定问题的一些示例输出：\n\
  \n```\n=======================\n1. If file /ora01/dbfile/O11R2/users02.dbf was unintentionally\
  \ renamed or moved, restore it\n\nAutomated Repair Options\n========================\n\
  \nOption Repair Description\n------ ------------------\n1 Restore and recover datafile\
  \ 7\nStrategy: The repair includes complete media recovery with no data loss\nRepair\
  \ script: /ora01/app/oracle/diag/rdbms/o11r2/O11R2/hm/reco_1184243250.hm\n```\n\n\
  在此情况下，数据恢复指导工具创建了一个可能用于解决问题的脚本。可以使用操作系统编辑器查看修复脚本的内容。例如：\n\n```\n$ vi /ora01/app/oracle/diag/rdbms/o11r2/O11R2/hm/reco_1184243250.hm\n\
  ```\n\n以下是此脚本的内容（针对此特定示例）：\n\n\n\n# 还原和恢复数据文件\n\nsql 'alter database datafile 7\
  \ offline';\n\nrestore datafile 7;\n\nrecover datafile 7;\n\nsql 'alter database\
  \ datafile 7 online';\n\n在检查脚本后，你可以决定手动运行建议的命令，或者让数据恢复顾问通过 `REPAIR` 命令运行脚本（详见下一节）。\n\
  \n## 修复故障\n\n如果你已经识别出一个故障并查看了建议，就可以继续实际修复故障。如果你想在不实际运行命令的情况下检查 `REPAIR FAILURE`\
  \ 命令将要执行的操作，请使用 `PREVIEW` 子句。在运行该命令之前，请确保首先从同一连接会话中运行 `LIST FAILURE` 和 `ADVISE FAILURE`\
  \ 命令。换句话说，你所在的 RMAN 会话必须在运行 `REPAIR` 命令之前，在同一会话中运行过 `LIST` 和 `ADVISE` 命令。\n\n```\n\
  RMAN> repair failure preview;\n```\n\n如果你对修复建议满意，那么就运行 `REPAIR FAILURE` 命令。\n\n\
  ```\nRMAN> repair failure;\n```\n\n此时，系统会提示你进行确认。\n\n```\nDo you really want to\
  \ execute the above repair (enter YES or NO)?\n```\n\n输入 `YES` 继续。\n\n```\nYES\n\
  ```\n\n如果一切顺利，你应该会看到类似这样的最终消息：\n\n```\nmedia recovery complete, elapsed time: 00:00:02\n\
  Finished recover at 16-SEP-10\nsql statement: alter database datafile 7 online\n\
  repair failure complete\n```\n\n■ **注意** 你可以从 RMAN 命令提示符或 Enterprise Manager 运行数据恢复顾问命令。\n\
  \n通过这种方式，你可以使用 RMAN 的 `LIST FAILURE`、`ADVISE FAILURE` 和 `REPAIR FAILURE` 命令来解决介质故障。数据恢复顾问可以协助处理你将遇到的大多数问题。我确实遇到过几次这样的情况，系统提供了如下建议：\n\
  \n```\nMandatory Manual Actions\n========================\n1. Please contact Oracle\
  \ Support Services to resolve failure 149165...\n\nOptional Manual Actions\n=======================\n\
  no manual actions available\n\nAutomated Repair Options\n========================\n\
  no automatic repair options available\n```\n\n这个输出表明你（DBA）还没有完全失业。;)\n\n### 使用 RMAN\
  \ 停止/启动 Oracle\n\n你可以使用 RMAN 以几乎与 SQL*Plus 相同的方法来停止和启动数据库。在执行还原和恢复操作时，通常从 RMAN 内部停止和启动数据库更为方便。以下\
  \ RMAN 命令可用于停止和启动数据库：\n\n- `SHUTDOWN`\n- `STARTUP`\n- `ALTER DATABASE`\n\n### 关闭数据库\n\
  \nRMAN 中的 `SHUTDOWN` 命令与在 SQL*Plus 中的工作方式相同。有四种关闭类型：`ABORT`、`IMMEDIATE`、`NORMAL`\
  \ 和 `TRANSACTIONAL`。我通常首先尝试使用 `SHUTDOWN IMMEDIATE` 来停止数据库。如果这不起作用，不要犹豫，使用 `SHUTDOWN\
  \ ABORT`。以下是一些示例：\n\n```\nRMAN> shutdown immediate;\nRMAN> shutdown abort;\n```\n\
  \n如果你不指定关闭选项，则默认为 `NORMAL`。使用 `NORMAL` 关闭数据库很少可行，因为此模式会等待当前连接的用户在闲暇时断开连接。我在关闭数据库时从不使用\
  \ `NORMAL`。\n\n### 启动数据库\n\n与 SQL*Plus 一样，你可以结合使用 `STARTUP` 和 `ALTER DATABASE` 命令，通过\
  \ RMAN 分步启动数据库，如下所示：\n\n```\nRMAN> startup nomount;\nRMAN> alter database mount;\n\
  RMAN> alter database open;\n```\n\n这是另一个示例：\n\n```\nRMAN> startup mount;\nRMAN>\
  \ alter database open;\n```\n\n如果你想以受限访问模式启动数据库，请使用 `DBA` 选项：\n\n```\nRMAN> startup\
  \ dba;\n```\n\n### 完全恢复\n\n完全恢复意味着你可以还原在故障发生前已提交的所有事务。完全恢复并不意味着你要还原和恢复数据库中的所有数据文件。例如，如果你有一个数据文件发生介质故障，你可以还原和恢复那一个数据文件来执行完全恢复。对于完全恢复，以下条件必须成立：\n\
  \n- 你的数据库处于归档日志模式。\n- 你有一个良好的数据库基线备份。\n- 你拥有自上次备份以来生成的任何所需的重做日志。\n- 所有归档重做日志都从上次联机备份开始时就存在。\n\
  - 如果使用了增量备份，那么 RMAN 可用于恢复的任何增量备份都必须可用。\n- 包含尚未归档的事务的联机重做日志必须可用。\n\n如果你遇到了介质故障，并且拥有执行完全恢复所需的文件，那么你就可以还原和恢复数据库。\n\
  \n#### 测试还原和恢复\n\n在实际执行还原和恢复之前，你可以确定 RMAN 将使用哪些文件进行还原和恢复。你还可以指示 RMAN 验证将用于还原和恢复的备份文件的完整性。\n\
  \n### 预览用于恢复的备份\n\n使用 `RESTORE...PREVIEW` 命令列出 RMAN 将用于还原和恢复数据库数据文件的备份和归档重做日志文件。`RESTORE...PREVIEW`\
  \ 并不实际还原任何文件；相反，它列出将用于还原操作的备份文件。此示例详细预览了整个数据库还原和恢复所需的备份：\n\n```\nRMAN> restore database\
  \ preview;\n```\n\n你也可以以汇总的详细程度预览所需的备份文件：\n\n```\nRMAN> restore database preview\
  \ summary;\n```\n\n这是输出片段：\n\n```\nList of Backups\n===============\nKey     TY\
  \ LV S Device Type Completion Time #Pieces #Copies Com Tag\n------- -- -- - -----------\
  \ --------------- ------- ------- --- ---\n571     B  F  A DISK        22-SEP-10\
  \       1       1       YES TAG20100922T141215\n570     B  F  A DISK        22-SEP-10\
  \       1       1       YES TAG20100922T141215\n\nList of Archived Log Copies for\
  \ database with db_unique_name O11R2\n=====================================================================\n\
  \nKey     Thrd     Seq     S Low Time\n------- ---- ------- - ---------\n878   \
  \  1    878     A 22-SEP-10\n\nMedia recovery start SCN is 19993679\nRecovery must\
  \ be done beyond SCN 19993680 to clear datafile fuzziness\n```\n\n以下是如何预览还原和恢复所需备份的其他一些示例：\n\
  \n```\nRMAN> restore tablespace system preview;\nRMAN> restore archivelog from time\
  \ 'sysdate -1' preview;\nRMAN> restore datafile 1, 2, 3 preview;\n```\n\n### 在还原前验证备份文件\n\
  \n你可以对备份文件执行多个级别的验证，而无需实际还原任何内容。如果你只想让 RMAN 验证文件是否存在并检查文件头，请使用 `RESTORE...VALIDATE\
  \ HEADER` 命令，如下所示：\n\n```\nRMAN> restore database validate header;\n```\n\n此命令仅验证文件的存在性和文件头。你可以通过\
  \ `RESTORE...VALIDATE` 命令（不带 `HEADER` 子句）进一步指示 RMAN 验证还原数据库数据文件所需的备份文件内的块的完整性。同样，RMAN\
  \ 在此模式下不会还原任何数据文件：\n\n```\nRMAN> restore database validate;\n```\n\n此命令仅检查备份文件内的物理损坏。你还可以如下检查逻辑损坏（以及物理损坏）：\n\
  \n```\nRMAN> restore database validate check logical;\n```\n\n以下是一些使用 `RESTORE...VALIDATE`\
  \ 的其他示例：\n\n```\nRMAN> restore datafile 1,2,3 validate;\nRMAN> restore archivelog\
  \ all validate;\nRMAN> restore controlfile validate;\nRMAN> restore tablespace system\
  \ validate;\n```\n\n### 测试介质恢复\n\n前面的部分介绍了报告和验证还原操作。你还可以通过 `RECOVER...TEST` 命令指示\
  \ RMAN 验证恢复过程。在执行测试恢复之前，你需要确保正在恢复的数据文件处于离线状态。对于在测试模式下恢复的任何联机数据文件，Oracle 都会抛出错误。\n\
  \n在此示例中，首先还原了 `USERS` 表空间，然后执行了试运行恢复：\n\n```\nRMAN> connect target /\nRMAN> startup\
  \ mount;\nRMAN> restore tablespace users;\nRMAN> recover tablespace users test;\n\
  ```\n\n如果缺少恢复所需的归档重做日志，则会抛出以下错误：\n\n```\nRMAN-06053: unable to perform media recovery\
  \ because of missing log\nRMAN-06025: no backup of archived log for thread 1 with\
  \ sequence 10 and starting SCN...\n```\n\n如果恢复测试成功，你将看到类似以下的消息，表明重做的应用已进行测试但未实际应用：\n\
  \n```\nORA-10574: Test recovery did not corrupt any data block\nORA-10573: Test\
  \ recovery tested redo from change 19993679 to 19993861\nORA-10572: Test recovery\
  \ canceled due to errors\nORA-10585: Test recovery can not apply redo that may modify\
  \ control file\n```\n\n以下是一些测试恢复过程的其他示例：\n\n```\nRMAN> recover database test;\n\
  RMAN> recover tablespace users, tools test;\nRMAN> recover datafile 1,2,3 test;\n\
  ```\n\n#### 还原整个数据库\n\n`RESTORE DATABASE` 命令将还原数据库中的每个数据文件。例外情况是当 RMAN 检测到数据文件已经还原；在这种情况下，它不会再次还原它们。\n\
  \n如果你想覆盖该行为，请使用 `FORCE` 命令。\n\n当你发出 `RECOVER DATABASE` 命令时，RMAN 会自动将重做应用于需要恢复的任何数据文件。恢复过程包括应用在以下位置找到的更改：\n\
  \n- 增量备份片（仅在使用增量备份时适用）\n- 归档重做日志文件（自上次备份或上次应用的增量备份以来生成）\n- 联机重做日志文件（当前且未归档）\n\n\
  在还原和恢复过程完成后，你可以打开数据库。只有当你拥有良好的数据库备份并有权访问备份后生成的所有重做日志时，完全数据库恢复才有效。你需要所有恢复数据库数据文件所需的重做日志。如果你没有所有所需的重做日志，那么你很可能必须执行不完全恢复（本章稍后介绍）。\n\
  \n■ **注意** 你的数据库至少必须处于加载（MOUNT）模式才能使用 RMAN 还原数据文件。这是因为在还原和恢复过程中，RMAN 从控制文件中读取信息。\n\
  \n你可以使用当前控制文件或备份控制文件执行数据库级别的完全恢复。\n\n### 使用当前控制文件\n\n你必须首先将数据库置于加载模式以执行数据库范围的还原和恢复。这是因为\
  \ `SYSTEM` 表空间数据文件在还原和恢复时必须处于离线状态。Oracle 不允许你在数据库打开状态下操作与 `SYSTEM` 表空间关联但处于离线状态的数据文件。在这种情况下，以加载模式启动数据库，发出\
  \ `RESTORE` 和 `RECOVER` 命令，然后打开数据库，如下所示：\n\n```\nRMAN> connect target /\nRMAN> startup\
  \ mount;\nRMAN> restore database;\nRMAN> recover database;\nRMAN> alter database\
  \ open;\n```\n\n如果一切按预期进行，你最后应该看到这条消息：\n\n```\ndatabase opened\n```\n\n### 使用备份控制文件\n\
  \n此解决方案使用从快速恢复区检索的控制文件备份。有关如何还原控制文件的更多示例，请参阅本章的“还原控制文件”部分。在此场景中，首先从备份中检索控制文件，然后再还原和恢复数据库：\n\
  \n```\nRMAN> connect target /\nRMAN> startup nomount;\nRMAN> restore controlfile\
  \ from autobackup;\nRMAN> alter database mount;\nRMAN> restore database;\nRMAN>\
  \ recover database;\nRMAN> alter database open resetlogs;\n```\n\n如果一切按预期进行，你最后应该看到这条消息：\n\
  \n```\ndatabase opened\n```\n\n■ **注意** 任何时候在恢复操作中使用备份控制文件，你都需要使用 `OPEN RESETLOGS`\
  \ 命令打开数据库。\n\n#### 还原表空间\n\n有时，你遇到的介质故障仅限于特定表空间或一组表空间。在这些情况下，在表空间级别的粒度进行还原和恢复是合适的。RMAN\
  \ 的 `RESTORE TABLESPACE` 和 `RECOVER TABLESPACE` 命令将还原和恢复与指定表空间关联的所有数据文件。\n\n###\
  \ 在数据库打开时还原表空间\n\n如果你的数据库已打开，那么你必须将要还原和恢复的表空间脱机。你可以对任何表空间执行此操作，但 `SYSTEM` 和 `UNDO`\
  \ 表空间除外。此示例在数据库打开时还原和恢复 `USERS` 表空间：\n\n```\nRMAN> connect target /\nRMAN> sql 'alter\
  \ tablespace users offline immediate';\nRMAN> restore tablespace users;\nRMAN> recover\
  \ tablespace users;\nRMAN> sql 'alter tablespace users online';\n```\n\n在表空间联机后，你应该会看到类似这样的消息：\n\
  \n```\nsql statement: alter tablespace users online\n```\n\n### 在数据库处于加载模式时还原表空间\n\
  \n通常在执行还原和恢复时，DBA 会关闭数据库并重新启动数据库进入加载模式，为执行恢复做准备。当数据库处于加载模式时，这确保没有用户连接到数据库，并且没有事务正在发生。下一个示例在数据库处于加载模式时还原\
  \ `SYSTEM` 表空间：\n\n```\nRMAN> connect target /\nRMAN> shutdown immediate;\nRMAN>\
  \ startup mount;\nRMAN> restore tablespace system;\nRMAN> recover tablespace system;\n\
  RMAN> alter database open;\n```\n\n如果一切成功，你最后应该看到这条消息：\n\n```\ndatabase opened\n\
  ```\n\n#### 还原只读表空间\n\n当你发出 `RESTORE DATABASE` 命令时，RMAN 会随数据库的其余部分一起还原只读表空间。例如，以下命令将还原所有数据文件（包括只读模式下的文件）：\n\
  \n```\nRMAN> restore database;\n```\n\n在 Oracle Database 11*g* 之前，你需要发出 `RESTORE\
  \ DATABASE CHECK READONLY` 来指示 RMAN 同时还原只读表空间和读写模式的表空间。在 Oracle Database 11*g* 或更高版本中，这不再是必需的。\n\
  \n■ **注意** 如果你使用的备份是在只读表空间被置为只读模式之后创建的，那么只读数据文件就不需要恢复。在这种情况下，自备份以来没有为只读表空间生成重做日志。\n\
  \n#### 还原临时表空间\n\n从 Oracle Database 10*g* 开始，你不必还原或重新创建缺失的本地管理临时表空间临时文件。当你打开数据库供使用时，Oracle\
  \ 会自动检测并重新创建本地管理临时表空间临时文件。\n\n当 Oracle 自动重新创建临时表空间时，它会将一条类似以下内容的消息记录到你的目标数据库 `alert.log`\
  \ 中：\n\n```\nRe-creating tempfile <your temporary tablespace filename>\n```\n\n\
  如果由于任何原因你的临时表空间变得不可用，你也可以自己重新创建它。由于临时表空间中永远不会有永久对象，你可以根据需要简单地重新创建它们。以下是如何创建本地管理临时表空间的示例：\n\
  \n```\nCREATE TEMPORARY TABLESPACE temp TEMPFILE\n'/ora03/oradata/BRDSTN/temp01.dbf'\
  \ SIZE 5000M REUSE\nEXTENT MANAGEMENT LOCAL UNIFORM SIZE 512K;\n```\n\n如果你的临时表空间存在但临时数据文件缺失，你可以如这里所示简单地添加临时数据文件：\n\
  \n```\nalter tablespace temp\nadd tempfile '/ora03/oradata/BRDSTN/temp01.dbf' SIZE\
  \ 5000M REUSE;\n```\n\n### 还原数据文件\n\n当介质故障仅限于一小部分数据文件时，数据文件级别的还原和恢复效果很好。通过数据文件级别的恢复，你可以指示\
  \ RMAN 使用数据文件编号或数据文件名称进行还原和恢复。对于与 `SYSTEM` 或 `UNDO` 表空间无关的数据文件，你可以选择在数据库保持打开状态时进行还原和恢复。在数据库打开时，你必须首先将任何正在还原和恢复的数据文件脱机。\n\
  \n### 在数据库打开时还原数据文件\n\n使用 `RESTORE DATAFILE` 和 `RECOVER DATAFILE` 命令在数据文件级别进行还原和恢复。当你的数据库打开时，你必须首先将要还原和恢复的任何数据文件脱机。此示例在数据库打开时还原和恢复数据文件\
  \ 32 和 33：\n\n```\nRMAN> sql 'alter database datafile 32, 33 offline';\nRMAN> restore\
  \ datafile 32, 33;\nRMAN> recover datafile 32, 33;\nRMAN> sql 'alter database datafile\
  \ 32, 33 online';\n```\n\n■ **提示** 使用 RMAN 的 `REPORT SCHEMA` 命令列出数据文件名称和文件编号。你也可以查询\
  \ `V$DATAFILE` 的 `NAME` 和 `FILE#` 列来获取名称和编号。\n\n你也可以指定要还原和恢复的数据文件的名称。在此示例中，还原并恢复了\
  \ `mvdata01.dbf` 数据文件：\n\n```\nRMAN> sql \"alter database datafile ''/ora01/dbfile/O11R2/mvdata01.dbf''\
  \ offline\";\nRMAN> restore datafile '/ora01/dbfile/O11R2/mvdata01.dbf';\nRMAN>\
  \ recover datafile '/ora01/dbfile/O11R2/mvdata01.dbf';\nRMAN> sql \"alter database\
  \ datafile ''/ora01/dbfile/O11R2/mvdata01.dbf'' online\";\n```\n\n■ **注意** 当使用 RMAN\
  \ 的 `SQL` 命令时，如果 SQL 语句中有单引号，则你需要使用双引号括起整个 SQL 语句，并在通常只使用一个引号的地方使用两个单引号。\n\n###\
  \ 在数据库未打开时还原数据文件\n\n在此场景中，首先关闭数据库，然后启动到加载模式。在数据库未打开时，你可以还原和恢复数据库中的任何数据文件。此示例显示了还原与\
  \ `SYSTEM` 表空间关联的数据文件 1：\n\n```\nRMAN> connect target /\nRMAN> shutdown abort;\n\
  RMAN> startup mount;\nRMAN> restore datafile 1;\nRMAN> recover datafile 1;\nRMAN>\
  \ alter database open;\n```\n\n你也可以在执行数据文件恢复时指定文件名：\n\n```\nRMAN> connect target\
  \ /\nRMAN> shutdown abort;\nRMAN> startup mount;\nRMAN> restore datafile '/ora01/dbfile/O11R2/system01.dbf';\n\
  RMAN> recover datafile '/ora01/dbfile/O11R2/system01.dbf';\nRMAN> alter database\
  \ open;\n```\n\n### 将数据文件还原到非默认位置\n\n有时会发生故障，导致与挂载点关联的磁盘无法操作。在这种情况下，你需要将数据文件还原和恢复到与原来不同的位置。另一个将数据文件还原到非默认位置的典型需求是你正在还原到不同的数据库服务器，该服务器的挂载点与备份来源服务器完全不同。\n\
  \n使用 `SET NEWNAME` 和 `SWITCH` 命令将数据文件还原到非默认位置。这两个命令都必须在 RMAN 的 `run{}` 块内运行。你可以将使用\
  \ `SET NEWNAME` 和 `SWITCH` 视为重命名数据文件的一种方式（类似于 SQL*Plus 的 `ALTER DATABASE RENAME\
  \ FILE` 语句）。\n\n此示例更改了数据文件 32 和 33 的位置：\n\n```\nRMAN> connect target /\nRMAN> startup\
  \ mount;\nRMAN> run{\n2> set newname for datafile 32 to '/ora02/dbfile/O11R2/mvdata01.dbf';\n\
  3> set newname for datafile 33 to '/ora02/dbfile/O11R2/mvindex01.dbf';\n4> restore\
  \ datafile 32, 33;\n5> switch datafile all; # 使用新数据文件位置更新存储库。\n6> recover datafile\
  \ 32, 33;\n7> alter database open;\n8> }\n```\n\n这是输出的部分列表：\n\n```\nchannel ORA_DISK_2:\
  \ restore complete, elapsed time: 00:00:01\nFinished restore at 22-SEP-10\n...\n\
  datafile 32 switched to datafile copy\ninput datafile copy RECID=92 STAMP=730375692\
  \ file name=/ora02/dbfile/O11R2/mvdata01.dbf\ndatafile 33 switched to datafile copy\n\
  input datafile copy RECID=93 STAMP=730375692 file name=/ora02/dbfile/O11R2/mvindex01.dbf\n\
  ...\nStarting recover at 22-SEP-10\nmedia recovery complete, elapsed time: 00:00:05\n\
  Finished recover at 22-SEP-10\ndatabase opened\n```\n\n如果数据库已打开，你可以将数据文件脱机，然后为还原和恢复设置它们的新名称，如下所示：\n\
  \n```\nRMAN> run{\n2> sql 'alter database datafile 32, 33 offline';\n3> set newname\
  \ for datafile 32 to '/ora02/dbfile/O11R2/mvdata01.dbf';\n4> set newname for datafile\
  \ 33 to '/ora02/dbfile/O11R2/mvindex01.dbf';\n5> restore datafile 32, 33;\n6> switch\
  \ datafile all; # 使用新数据文件位置更新存储库。\n7> recover datafile 32, 33;\n8> sql 'alter database\
  \ datafile 32, 33 online';\n9> }\n```\n\n你现在应该会看到类似以下的消息：\n\n```\nstarting media\
  \ recovery\nFinished recover at 22-SEP-10\nsql statement: alter database datafile\
  \ 32, 33 online\n```\n\n### 执行块级别恢复\n\n块级别损坏很少见，通常是由某种 I/O 错误引起的。但是，如果你在大型数据文件中确实有一个孤立的损坏块，那么可以选择执行块级别恢复是很好的。当数据文件中只有少量块损坏时，块级别恢复很有用。如果整个数据文件需要介质恢复，则块恢复就不合适。\n\
  \n每当运行 `BACKUP`、`VALIDATE` 或 `BACKUP VALIDATE` 命令时，RMAN 都会自动检测损坏的块。有关损坏块的详细信息可以在\
  \ `V$DATABASE_BLOCK_CORRUPTION` 视图中查看。在以下示例中，常规备份作业在输出中报告了一个损坏块：\n\n```\nORA-19566:\
  \ exceeded limit of 0 corrupt blocks for file...\n```\n\n查询 `V$DATABASE_BLOCK_CORRUPTION`\
  \ 视图可以指示哪个文件包含损坏：\n\n```\nSQL> select * from v$database_block_corruption;\n\nFILE#\
  \ BLOCK# BLOCKS CORRUPTION_CHANGE# CORRUPTIO\n---------- ---------- ---------- ------------------\
  \ ---------\n5    20        1                 0 ALL ZERO\n```\n\n执行块级别恢复时，你的数据库可以处于加载或打开状态。你不必将正在恢复的数据文件脱机。你可以指示\
  \ RMAN 恢复在 `V$DATABASE_BLOCK_CORRUPTION` 中报告的所有块，如下所示：\n\n```\nRMAN> recover corruption\
  \ list;\n```\n\n如果成功，将显示以下消息：\n\n```\nmedia recovery complete...\n```\n\n恢复块的另一种方法是指定数据文件和块号，如下所示：\n\
  \n```\nRMAN> recover datafile 5 block 20;\n```\n\n最好使用 `RECOVER CORRUPTION LIST`\
  \ 语法，因为它会从 `V$DATABASE_BLOCK_CORRUPTION` 视图中清除任何已恢复的块。\n\n■ **注意** RMAN 无法对数据文件的块\
  \ 1（数据文件头）执行块级别恢复。\n\n块级别介质恢复允许你保持数据库可用，并且由于只有损坏的块在恢复期间处于离线状态，从而减少了平均恢复时间（MTTR）。执行块级别恢复时，你的数据库必须处于归档日志模式。在\
  \ Oracle Database 11*g* 中，RMAN 可以从闪回日志（如果可用）中还原块。如果闪回日志不可用，则 RMAN 将尝试从完整备份、级别 0\
  \ 备份或 `BACKUP AS COPY` 命令生成的映像副本备份中还原块。块被还原后，任何所需的归档重做日志必须可用才能恢复该块。RMAN 不能使用增量级别\
  \ 1（或更高）备份执行块介质恢复。\n\n■ **注意** 如果你使用的是 Oracle Database 10g 或 Oracle9i Database，请使用\
  \ `BLOCKRECOVER` 命令执行块介质恢复。Oracle 版本 8 不支持块级别恢复。\n\n### 还原归档重做日志文件\n\nRMAN 会在恢复过程中自动还原其所需的任何归档重做日志文件。你通常不需要手动还原归档重做日志文件。但是，在以下任何一种情况下，你可能希望手动还原归档重做日志文件：\n\
  \n- 你需要还原归档重做日志文件以备以后执行恢复；想法是如果归档重做日志文件已经还原，将加快恢复操作。\n- 由于介质故障或存储空间问题，你需要将归档重做日志文件还原到非默认位置。\n\
  - 你需要还原特定的归档重做日志文件，因为你希望通过 LogMiner 检查它们。\n\n如果你启用了闪回恢复区，那么 RMAN 默认会将归档重做日志文件还原到初始化参数\
  \ `DB_RECOVERY_FILE_DEST` 定义的目标位置。否则，RMAN 使用 `LOG_ARCHIVE_DEST_1` 初始化参数来确定还原归档重做日志文件的位置。\n\
  \n如果你将归档重做日志文件还原到非默认位置，RMAN 知道它们被还原到的位置，并在你发出任何后续的 `RECOVER` 命令时自动找到这些文件。\n\nRMAN\
  \ 不会还原它确定已在磁盘上的归档重做日志文件。即使你指定了非默认位置，如果文件已存在，RMAN 也不会将归档重做日志文件还原到磁盘。在这种情况下，RMAN 只会返回一条消息，说明归档重做日志文件已经还原。使用\
  \ `FORCE` 选项可覆盖此行为。\n\n如果在还原日志文件时不确定要使用哪个序列号，可以查询 `V$LOG_HISTORY` 视图或发出 RMAN 的 `LIST\
  \ BACKUP` 命令以获取更多信息。\n\n■ **注意** 还原归档重做日志文件时，你的数据库可以处于加载或打开状态。\n\n### 还原到默认位置\n\n\
  以下命令将还原 RMAN 已备份的所有归档重做日志文件：\n\n```\nRMAN> restore archivelog all;\n```\n\n如果你想从指定的序列开始还原，请使用\
  \ `FROM SEQUENCE` 子句。你可能希望先运行此查询以确定最近生成的日志文件和序列号：\n\n```\nSQL> select sequence#,\
  \ first_time from v$log_history order by 2;\n```\n\n此示例从序列 68 还原所有归档重做日志文件：\n\n\
  ```\nRMAN> restore archivelog from sequence 68;\n```\n\n如果你想还原一系列归档重做日志文件，请使用 `FROM\
  \ SEQUENCE` 和 `UNTIL SEQUENCE` 子句或 `SEQUENCE BETWEEN` 子句，如此处所示。以下命令使用线程 1 还原从序列\
  \ 68 到序列 78（包括序列 78）的归档重做日志文件：\n\n```\nRMAN> restore archivelog from sequence 68\
  \ until sequence 78 thread 1;\nRMAN> restore archivelog sequence between 68 and\
  \ 78 thread 1;\n```\n\n默认情况下，如果归档重做日志文件已在磁盘上，RMAN 不会还原它。如果你使用 `FORCE`，可以覆盖此行为，如下所示：\n\
  \n```\nRMAN> restore archivelog from sequence 1 force;\n```\n\n### 还原到非默认位置\n\n\
  如果你想将归档重做日志文件还原到不同于默认位置的位置，请使用 `SET ARCHIVELOG DESTINATION` 子句。以下示例还原到 `/ora01/archtemp`\
  \ 这个非默认位置。`SET` 命令的此选项必须在 RMAN 的 `run{}` 块内执行。\n\n```\nRMAN> run{\n2> set archivelog\
  \ destination to '/ora01/archtemp';\n3> restore archivelog from sequence 68 force;\n\
  4> }\n```\n\n### 还原 Spfile\n\n出于以下几个不同的原因，你可能需要还原 spfile：\n\n- 你不小心在 spfile 中设置了一个值，导致实例无法启动。\n\
  - 你不小心删除了 spfile。\n- 你需要查看它在过去某个时间点的样子。\n\n一种情况（这种情况我遇到过不止一次）是你正在使用 spfile，而你团队中的一位\
  \ DBA 做了一些莫名其妙的事情，比如这样：\n\n```\nSQL> alter system set processes=1000000 scope=spfile;\n\
  ```\n\n该参数在磁盘上的 pfile 中被更改，但不在内存中。几个月后，数据库因某些维护而停止。当尝试启动数据库时，你甚至无法让实例进入 `NOMOUNT`\
  \ 状态。这是因为某个参数被设置为一个荒谬的值，将消耗机器上的所有内存。在这种情况下，实例可能会挂起，或者你可能会看到此消息：\n\n```\nORA-01078:\
  \ failure in processing system parameters\nLRM-00109: could not open parameter file\n\
  ```\n\n如果你使用的是恢复目录，还原 spfile 是一个相当简单的过程：\n\n```\nRMAN> connect target /\nRMAN> connect\
  \ catalog rmancat/foo@rcat\nRMAN> startup nomount;\nRMAN> restore spfile;\n```\n\
  \n如果你没有使用恢复目录，有多种方法可以还原 spfile。你所采取的方法取决于几个变量，例如：\n\n- 你是否使用了 FRA（快速恢复区）\n- 你是否为自动备份配置了通道备份位置\n\
  - 你是否使用了自动备份的默认位置\n\n我不会展示所有这些场景的每个细节。通常，我会确定包含 spfile 备份的备份片的位置，并像这样进行还原：\n\n```\n\
  RMAN> startup nomount force;\nRMAN> restore spfile from\n'/ora01/fra/O11R2/autobackup/2010_09_18/o1_mf_s_730048900_69bcc8h2_.bkp';\n\
  ```\n\n你应该会看到类似这样的消息：\n\n```\nchannel ORA_DISK_1: SPFILE restore from AUTOBACKUP\
  \ complete\n```\n\n在此示例中，我知道使用了 FRA，在自动备份目录中找到了最新的备份文件并使用了它。\n\n■ **注意** 有关所有可能的\
  \ spfile 和控制文件还原场景的完整描述，请参阅 *RMAN Recipes for Oracle Database 11g* (Apress, 2007)。\n\
  \n### 还原控制文件\n\n如果你缺少一个控制文件，并且你有多个副本，那么你可以关闭数据库，然后通过将一个好的控制文件复制到缺失控制文件的正确位置和名称来简单地还原缺失或损坏的控制文件（详见第\
  \ 5 章）。\n\n还原控制文件时，以下部分涵盖这些特定场景：\n\n- 使用恢复目录。\n- 使用自动备份。\n- 指定备份文件名。\n\n### 使用恢复目录\n\
  \n当你连接到恢复目录时，即使你的目标数据库处于 `NOMOUNT` 模式，你也可以查看有关控制文件的备份信息。要列出控制文件的备份，请使用 `LIST` 命令，如下所示：\n\
  \n```\nRMAN> connect target /\nRMAN> connect catalog rcat/rcat@recov\nRMAN> startup\
  \ nomount;\nRMAN> list backup of controlfile;\n```\n\n如果你丢失了所有控制文件并且你正在使用恢复目录，那么发出\
  \ `STARTUP NOMOUNT` 并发出 `RESTORE CONTROLFILE` 命令。在此示例中，恢复目录所有者和密码都是 `rcat`，恢复目录的名称是\
  \ `recov`。你必须更改这些值以匹配你环境中的 用户名/密码@服务。\n\n```\nRMAN> connect target /\nRMAN> connect\
  \ catalog rcat/rcat@recov\nRMAN> startup nomount;\nRMAN> restore controlfile;\n\
  ```\n\nRMAN 将控制文件还原到由你的 `CONTROL_FILES` 初始化参数定义的位置。你应该会看到一条消息，表明你的控制文件已成功从 RMAN\
  \ 备份片复制回来。以下是成功还原控制文件后 RMAN 消息堆栈的部分列表：\n\n```\nallocated channel: ORA_DISK_1\nchannel\
  \ ORA_DISK_1: sid=156 devtype=DISK\nchannel ORA_DISK_1: restoring control file\n\
  channel ORA_DISK_1: reading from backup piece\nchannel ORA_DISK_1: restore complete,\
  \ elapsed time: 00:00:05\n```\n\n你现在可以将数据库更改为加载模式，并执行数据库所需的任何其他还原和恢复命令。\n\n■ **注意**\
  \ 当你从备份还原控制文件时，你必须对整个数据库执行介质恢复，并使用 `OPEN RESETLOGS` 命令打开数据库，即使你没有还原任何数据文件。\n\n你可以通过查询\
  \ `V$DATABASE` 视图的 `CONTROLFILE_TYPE` 列来确定你的控制文件是否是备份。\n\n### 使用自动备份进行还原\n\n当你启用控制文件的自动备份并使用快速恢复区时，还原控制文件相当简单。首先，连接到你的目标数据库，然后发出\
  \ `STARTUP NOMOUNT` 命令，最后发出 `RESTORE CONTROLFILE FROM AUTOBACKUP` 命令，如下所示：\n\n```\n\
  RMAN> connect target /\nRMAN> startup nomount;\nRMAN> restore controlfile from autobackup;\n\
  ```\n\nRMAN 将控制文件还原到由你的 `CONTROL_FILES` 初始化参数定义的位置。你应该会看到一条消息，表明你的控制文件已成功从 RMAN\
  \ 备份片复制回来。这是输出的部分片段：\n\n```\nallocated channel: ORA_DISK_1\nchannel ORA_DISK_1:\
  \ sid=156 devtype=DISK\ndatabase name (or database unique name) used for search:\
  \ ORCL\nchannel ORA_DISK_1: autobackup found in the recovery area\n```\n\n你现在可以将数据库更改为加载模式，并执行数据库所需的任何其他还原和恢复命令。\n\
  \n### 指定文件名\n\n当将数据库还原到不同的服务器时，该过程的前几步通常是：对目标数据库进行备份，复制到远程服务器，然后从 RMAN 备份中还原控制文件。在这些场景中，我通常知道包含控制文件的备份片的名称。以下是一个示例，你指示\
  \ RMAN 从特定的备份片文件还原控制文件：\n\n```\nRMAN> startup nomount;\nRMAN> restore controlfile\
  \ from '/ora01/O11R2/rman/c-3453199553-20100923-07.bk';\n```\n\n控制文件将被还原到 `CONTROL_FILES`\
  \ 初始化参数定义的位置。\n\n### 不完全恢复\n\n*不完全数据库恢复* 意味着你无法恢复所有已提交的事务。不完全意味着你不应用所有重做来恢复到数据库中发生的最后一个已提交事务的点。换句话说，你正在还原并恢复到过去的某个时间点。因此，不完全数据库恢复也称为\
  \ *数据库时间点恢复* (DBPITR)。通常你执行不完全数据库恢复是由于以下原因之一：\n\n- 你没有执行完全恢复所需的所有重做日志。你缺少执行完全恢复所需的归档重做日志文件或联机重做日志文件。这种情况可能是因为所需的重做日志文件损坏或丢失。\n\
  - 你故意希望将数据库回滚到某个时间点。例如，如果有人意外截断了表，而你希望故意将数据库回滚到发出截断表命令之前的时间点，你就会这样做。\n\n■ **提示**\
  \ 为了尽量减少联机重做日志文件故障的可能性，我建议你对它们进行多路复用，每组至少有两个成员，并且每个成员位于由单独控制器管理的独立物理设备上。\n\n不完全数据库恢复包括两个步骤：还原和恢复。还原步骤将重新创建数据文件，恢复步骤将应用重做直到指定的时间点。可以通过几种方式从\
  \ RMAN 启动还原过程：\n\n- `RESTORE DATABASE UNTIL`\n- `RESTORE TABLESPACE UNTIL`\n- `FLASHBACK\
  \ DATABASE`\n\n对于大多数不完全数据库恢复情况，你使用 `RESTORE DATABASE UNTIL` 命令指示 RMAN 从 RMAN 备份文件中检索数据文件。这种类型的不完全数据库恢复是本章的主要焦点。`RESTORE\
  \ DATABASE` 命令的 `UNTIL` 部分指示 RMAN 基于以下方法之一从过去的某个点检索数据文件：\n\n- 时间\n- 变更（有时称为 *系统变更号*\
  \ 或 SCN）\n- 日志序列号\n- 还原点\n\nRMAN 的 `RESTORE DATABASE UNTIL` 命令将从最近的备份集或映像副本中检索所有数据文件。RMAN\
  \ 会自动从 `UTIL` 子句确定哪个备份集包含所需的数据文件。如果你省略 `RESTORE DATABASE` 命令的 `UTIL` 子句，RMAN 将从最新可用的备份集或映像副本中检索数据文件。在某些情况下，这可能是你想要的行为。我建议你使用\
  \ `UTIL` 子句来确保 RMAN 从正确的备份集中还原。当你发出 `RESTORE DATABASE UNTIL` 命令时，RMAN 将确定如何从以下任一项中提取数据文件：\n\
  \n- 完整数据库备份\n- 增量级别 0 备份\n- 由 `BACKUP AS COPY` 命令生成的映像副本备份\n\n你不能在数据库在线数据文件的子集上执行不完全数据库恢复。执行不完全数据库恢复时，所有在线数据文件的检查点\
  \ SCN 必须同步，然后你才能使用 `alter database open resetlogs` 命令打开数据库。你可以通过以下 SQL 查询查看数据文件头\
  \ SCN 和每个数据文件的状态：\n\n```\nselect\n  file#\n  ,status\n  ,fuzzy\n  ,error\n  ,checkpoint_change#,\n\
  \  to_char(checkpoint_time,'dd-mon-rrrr hh24:mi:ss') as checkpoint_time\nfrom v$datafile_header;\n\
  ```\n\n■ **注意** `V$DATAFILE_HEADER` 的 `FUZZY` 列指的是包含一个或多个 SCN 值大于或等于数据文件头中检查点 SCN\
  \ 的块的数据文件。如果数据文件被还原且 `FUZZY` 值为 `YES`，则需要介质恢复。\n\n此规则（不在数据库在线文件的子集上执行不完全恢复）的唯一例外是表空间时间点恢复\
  \ (TSPITR)，它使用 `RECOVER TABLESPACE UNTIL` 命令。TSPITR 用于罕见的情况；它只还原和恢复你指定的表空间。\n\n\
  不完全数据库恢复的恢复部分总是使用 `RECOVER DATABASE UNTIL` 命令启动。RMAN 将使用 `UTIL` 子句指定的点自动恢复你的数据库。就像\
  \ `RESTORE` 命令一样，你可以恢复到时间、变更/SCN、日志序列号或还原点。当 RMAN 到达指定的点时，它将自动终止恢复过程。\n\n■ **注意**\
  \ 无论你在 `UTIL` 子句中指定什么，RMAN 都会将其转换为相应的 `UTIL SCN` 子句并分配适当的 SCN。这是为了避免任何时序问题，特别是由夏令时引起的问题。\n\
  \n在恢复期间，RMAN 会自动确定如何应用重做。首先，RMAN 将应用任何可用的增量备份。接下来，将应用磁盘上任何归档重做日志文件。如果归档重做日志文件不在磁盘上，则\
  \ RMAN 将尝试从备份集中检索它们。如果你想作为不完全数据库恢复的一部分应用重做，则以下条件必须成立：\n\n- 你的数据库必须处于归档日志模式。\n- 你必须拥有所有数据文件的良好备份。\n\
  - 你必须拥有恢复到指定点所需的所有重做日志。\n\n■ **提示** 从 Oracle Database 10g 开始，你可以使用 `RECOVER DATABASE\
  \ PARALLEL` 命令执行并行介质恢复。\n\n使用 RMAN 执行不完全数据库恢复时，必须将数据库置于加载模式。RMAN 需要数据库处于加载模式才能读写控制文件。此外，对于不完全数据库恢复，系统数据文件始终是要恢复的数据文件之一。`SYSTEM`\
  \ 表空间的数据文件在恢复期间必须处于离线状态。Oracle 不允许你的数据库在此时处于打开状态。\n\n■ **注意** 执行不完全数据库恢复后，你需要使用\
  \ `ALTER DATABASE OPEN RESETLOGS` 命令打开数据库。\n\n根据你的场景，你可以使用 RMAN 执行各种不完全恢复方法。下一节讨论如何确定要执行哪种类型的不完全恢复。\n\
  \n#### 确定不完全恢复的类型\n\n当你知道要恢复数据库的大致日期和时间时，通常使用基于时间的还原和恢复。例如，你可能知道希望停止恢复过程的大致时间，但不知道特定的\
  \ SCN。\n\n基于日志序列的恢复和基于取消的恢复在缺少或损坏日志文件的情况下效果很好。在这种情况下，你只能恢复到最后一个良好的归档重做日志文件。\n\n\
  基于 SCN 的恢复在你能精确定位希望停止恢复过程的 SCN 时效果很好。你可以从诸如 `V$LOG` 和 `V$LOG_HISTORY` 之类的视图中检索 SCN\
  \ 信息。你也可以使用 LogMiner 等工具来检索特定 SQL 语句的 SCN。\n\n还原点恢复仅在你已建立还原点的情况下才有效。在这些情况下，你可以还原和恢复到与指定还原点关联的\
  \ SCN。\n\n表空间时间点恢复用于你可以仅还原和恢复少数几个表空间的情况。你可以使用 RMAN 自动化与此类不完全恢复相关的许多任务。\n\n■ **注意**\
  \ 闪回数据库仅在你启用了闪回数据库功能时有效（详见第 16 章）。\n\n#### 执行基于时间的恢复\n\n要将数据库还原和恢复到某个时间点，你可以使用 `RESTORE`\
  \ 和 `RECOVER` 命令的 `UNTIL TIME` 子句，或者使用 `run{}` 块内的 `SET UNTIL TIME` 子句。RMAN 将还原和恢复数据库到但不包括指定时间点。换句话说，RMAN\
  \ 将还原在该时间点之前提交的任何事务。当到达你指定的时间时，RMAN 会自动停止恢复过程。\n\nRMAN 期望的默认日期格式是 `YYYY-MM-DD:HH24:MI:SS`。但是，我建议使用\
  \ `TO_DATE` 函数并指定格式掩码。这消除了不同国家日期格式的歧义以及设置操作系统 `NLS_DATE_FORMAT` 变量的需要。以下示例在发出还原和恢复命令时指定了时间：\n\
  \n```\nRMAN> connect target /\nRMAN> startup mount;\nRMAN> restore database until\
  \ time\n2> \"to_date('04-sep-2010 14:00:00', 'dd-mon-rrrr hh24:mi:ss')\";\nRMAN>\
  \ recover database until time\n2> \"to_date('04-sep-2010 14:00:00', 'dd-mon-rrrr\
  \ hh24:mi:ss')\";\nRMAN> alter database open resetlogs;\n```\n\n如果一切顺利，你现在应该看到类似这样的输出：\n\
  \n```\nDatabase altered\n```\n\n#### 执行基于日志序列的恢复\n\n通常，启动这种类型的不完全数据库恢复是因为你缺少或损坏了一个归档重做日志文件。如果是这种情况，你只能恢复到最后一个良好的归档重做日志文件，因为你不能跳过一个缺失的归档重做日志文件。\n\
  \n你如何确定要还原到（但不包括）哪个归档重做日志文件会因情况而异。例如，如果你在物理上缺失了一个归档重做日志文件，并且 RMAN 无法在备份集中找到它，那么当尝试应用缺失的文件时，你会收到以下消息：\n\
  \n```\nRMAN-06053: unable to perform media recovery because of missing log\nRMAN-06025:\
  \ no backup of log thread 1 seq 45 lowscn 2149069 found to restore\n```\n\n根据前面的错误消息，你将还原到（但不包括）日志序列\
  \ 45。\n\n```\nRMAN> connect target /\nRMAN> startup mount;\nRMAN> restore database\
  \ until sequence 45;\nRMAN> recover database until sequence 45;\nRMAN> alter database\
  \ open resetlogs;\n```\n\n如果一切顺利，你现在应该看到类似这样的输出：\n\n```\nDatabase altered\n```\n\
  \n■ **注意** 基于日志序列的恢复类似于用户管理的基于取消的恢复。有关用户管理的基于取消的恢复的详细信息，请参见第 16 章。\n\n#### 执行基于变更/SCN\
  \ 的恢复\n\n当你知道希望结束还原和恢复会话的 SCN 值时，基于 SCN 的不完全数据库恢复有效。RMAN 将恢复到但不包括指定的 SCN。当到达指定的\
  \ SCN 时，RMAN 会自动终止恢复过程。\n\n你可以通过多种方式查看数据库 SCN 信息：\n\n- 使用 LogMiner 确定与 DDL 或 DML\
  \ 语句关联的 SCN。\n- 查看 `alert.log` 文件。\n- 查看跟踪文件。\n- 查询 `V$LOG`、`V$LOG_HISTORY` 和 `V$ARCHIVED_LOG`\
  \ 的 `FIRST_CHANGE#` 列。\n\n确定要恢复到的 SCN 后，使用 `UNTIL SCN` 子句还原到但不包括指定的 SCN。以下示例还原所有\
  \ SCN 小于 950 的事务：\n\n```\nRMAN> connect target /\nRMAN> startup mount;\nRMAN> restore\
  \ database until scn 95019865425;\nRMAN> recover database until scn 95019865425;\n\
  RMAN> alter database open resetlogs;\n```\n\n如果一切顺利，你现在应该看到类似这样的输出：\n\n```\nDatabase\
  \ altered\n```\n\n### 还原到还原点\n\n有两种类型的还原点：普通和保证。保证还原点要求你启用闪回数据库功能。你可以使用 SQL*Plus\
  \ 创建普通还原点，如下所示：\n\n```\nSQL> create restore point MY_RP;\n```\n\n此命令创建一个名为 `MY_RP`\
  \ 的还原点，该还原点与发出命令时数据库的 SCN 相关联。你可以查看数据库的当前 SCN，如下所示：\n\n```\nSQL> select current_scn\
  \ from v$database;\n```\n\n你可以在 `V$RESTORE_POINT` 视图中查看还原点信息，如下所示：\n\n```\nSQL>\
  \ select name, scn from v$restore_point;\n```\n\n还原点就像特定 SCN 的同义词。它允许你还原和恢复到某个 SCN，而不必指定一个数字。RMAN\
  \ 将还原和恢复到但不包括与还原点关联的 SCN。\n\n此示例还原并恢复到 `MY_RP` 还原点：\n\n```\nRMAN> connect target\
  \ /\nRMAN> startup mount;\nRMAN> restore database until restore point MY_RP;\nRMAN>\
  \ recover database until restore point MY_RP;\nRMAN> alter database open resetlogs;\n\
  ```\n\n## 还原和恢复到不同的服务器\n\n当你考虑备份时，你必须同时考虑还原和恢复。你的备份的好坏取决于你上次测试还原和恢复的结果。如果没有一个好的还原和恢复策略，备份策略可能会变得毫无价值。你最不希望发生的事情是遇到介质故障，去还原数据库，然后发现缺少关键部分，没有足够的空间进行还原，发现某些东西损坏了，等等。\n\
  \n测试 RMAN 备份的最佳方法之一是将其还原和恢复到不同的数据库服务器。这将锻炼你所有的备份、还原和恢复 DBA 技能。如果你能在不同的服务器上还原和恢复\
  \ RMAN 备份，当真正的灾难发生时，这会给你信心。你可以将本书前面的所有内容视为执行技术挑战性任务的构建块。使用 RMAN 备份将数据库从一个服务器移动到另一个服务器需要专家级的\
  \ Oracle 架构以及备份和恢复工作原理的理解。\n\n■ **注意** RMAN 确实有一个 `DUPLICATE DATABASE` 命令，它对于将数据库从一个服务器复制到另一个服务器非常有效。如果你要经常执行此类任务，我建议你使用\
  \ RMAN 的复制数据库功能。但是，你可能仍然需要手动将数据库备份从一个服务器复制到另一个服务器，特别是在安全性要求你无法直接将生产服务器连接到开发环境的情况下。我处理过许多生产数据库，无法直接访问生产服务器，因此复制数据库的唯一方法是手动将\
  \ RMAN 备份从生产环境复制到测试环境。\n\n在此示例中，源服务器和目标服务器具有完全不同的挂载点和磁盘布局。下面列出了使用 RMAN 备份在单独的服务器上重新创建数据库所需的高级步骤：\n\
  \n1.  在源数据库上创建 RMAN 备份。\n2.  将 RMAN 备份复制到目标服务器。此步骤之后的所有步骤都在目标数据库服务器上执行。\n3.  确保已安装\
  \ Oracle。\n4.  源所需的 OS 变量。\n5.  为要还原的数据库创建 `init.ora` 文件。\n6.  为数据文件、控制文件和转储/跟踪文件创建任何所需的目录。\n\
  7.  以 `NOMOUNT` 模式启动数据库。\n8.  从 RMAN 备份中还原控制文件。\n9.  以 `MOUNT` 模式启动数据库。\n10. 使控制文件知道\
  \ RMAN 备份的位置。\n11. 重命名并还原数据文件以反映新的目录位置。\n12. 恢复数据库。\n13. 为联机重做日志设置新位置。\n14. 打开数据库。\n\
  15. 添加临时文件。\n16. 重命名数据库。\n\n前面的每个步骤都将在接下来的几个小节中详细介绍。步骤 1 和 2 在源数据库服务器上执行。所有其他步骤都在目标服务器上执行。在此示例中，源数据库名为\
  \ `E64202`，目标数据库将命名为 `O11DEV`。\n\n在源数据库上，数据文件、控制文件和联机重做日志的位置都在此目录中：\n\n```\n/u02/oracle/oradata/E64202\n\
  ```\n\n源数据库归档重做日志文件位置在此处：\n\n```\n/u02/oracle/product/11.2.0/dbhome_1/dbs/arch\n\
  ```\n\nRMAN 备份位置由以下配置确定：\n\n```\nCONFIGURE CONTROLFILE AUTOBACKUP ON;\nCONFIGURE\
  \ CONTROLFILE AUTOBACKUP FORMAT FOR DEVICE TYPE DISK TO '/u02/rman/%F.bk';\nCONFIGURE\
  \ CHANNEL 1 DEVICE TYPE DISK FORMAT '/u02/rman/rman1_%U.bk';\n```\n\n在目标数据库上，数据文件和控制文件将被重命名并还原到此目录：\n\
  \n```\n/ora02/dbfile/O11DEV\n```\n\n目标数据库联机重做日志将在此目录中重新创建：\n\n```\n/ora02/oraredo/O11DEV\n\
  ```\n\n目标数据库归档重做日志文件位置将设置如下：\n\n```\n/ora02/oraarch/O11DEV\n```\n\n### 步骤 1：在源数据库上创建\
  \ RMAN 备份\n\n备份数据库时，请确保开启了自动备份控制文件功能。还要将归档重做日志作为备份的一部分包括在内，如下所示：\n\n```\nRMAN> backup\
  \ database plus archivelog;\n```\n\n我通常配置一个通道，并将备份片和控制文件自动备份都放到同一个目录中。例如，源数据库的备份片如下所示：\n\
  \n```\nrman1_03lol0i0_1_1.bk\nrman1_04lol0i1_1_1.bk\nrman1_05lol0j5_1_1.bk\nc-1984315547-20100923-00.bk\n\
  ```\n\n### 步骤 2：将 RMAN 备份复制到目标服务器\n\n对于此步骤，我通常使用 `rsync` 或 `scp` 等实用程序将备份片从一个服务器复制到另一个服务器。此示例使用\
  \ `scp` 命令：\n\n```\n$ scp *.bk oracle@ora03:/ora02/rman/O11DEV\n```\n\n在此示例中，在复制备份文件之前，必须在目标服务器上创建\
  \ `/ora02/rman/O11DEV` 目录。\n\n■ **注意** 如果 RMAN 备份在磁带上而不是磁盘上，则必须在目标服务器上安装/配置相同的介质管理器软件。此外，该服务器必须能够直接访问磁带上的\
  \ RMAN 备份。\n\n### 步骤 3：确保已安装 Oracle\n\n确保在目标服务器上安装了与源数据库相同版本的 Oracle 二进制文件。在此示例中，源和目标数据库都使用\
  \ Oracle Database 11*g* 第 2 版。\n\n### 步骤 4：源所需的 OS 变量\n\n你需要设置操作系统变量，例如 `ORACLE_SID`、`ORACLE_HOME`\
  \ 和 `PATH`。我通常将 `ORACLE_SID` 变量设置为与原始数据库上的值匹配。数据库名称将作为本节最后一步的一部分进行更改。以下是目标服务器上 `ORACLE_SID`\
  \ 和 `ORACLE_HOME` 的设置：\n\n```\n$ echo $ORACLE_SID\nE64202\n$ echo $ORACLE_HOME\n\
  /oracle/app/oracle/product/11.2.0/db_1\n```\n\n### 步骤 5：为要还原的数据库创建 init.ora 文件\n\
  \n将 `init.ora` 文件从原始服务器复制到目标服务器，并修改它，使其在目录路径方面与目标机器匹配。例如，确保修改 `CONTROL_FILES` 参数，使路径名反映控制文件在新服务器上的存放位置。\n\
  \n目前，`init.ora` 文件的名称是 `ORACLE_HOME/dbs/initE64202.ora`。当数据库在后面的步骤中被重命名为 `O11DEV`\
  \ 时，此文件将被重命名。目前，数据库名称是 `E64202`；这将在后面的步骤中重命名。\n\n以下是 `init.ora` 文件的内容：\n\n```\n\
  db_name='E64202'\ncontrol_files='/ora02/dbfile/O11DEV/control01.ctl'\n,'/ora02/dbfile/O11DEV/control02.ctl'\n\
  diagnostic_dest='/oracle/app/oracle'\nlog_archive_dest_1='location=/ora02/oraarch/O11DEV'\n\
  log_archive_format='%t_%s_%r.arc'\ndb_block_size=8192\nmemory_target=408944640\n\
  open_cursors=300\nprocesses=100\nremote_login_passwordfile='EXCLUSIVE'\nsessions=115\n\
  undo_tablespace='UNDOTBS1'\n```\n\n请注意，`CONTROL_FILES`、`DIAGNOSTIC_DEST` 和 `LOG_ARCHIVE_DEST_1`\
  \ 反映了目标服务器上的新路径目录。\n\n■ **注意** 如果这是 Oracle Database 10g 的示例，则需要设置参数：`BACKGROUND_DUMP_DEST`、`USER_DUMP_DEST`、`CORE_DUMP_DEST`。\n\
  \n### 步骤 6：为数据文件、控制文件和转储/跟踪文件创建任何所需的目录\n\n对于此示例，创建目录 `/ora02/dbfile/O11DEV`、`/oracle/app/oracle`\
  \ 和 `/ora02/oraarch/O11DEV`：\n\n```\n$ mkdir -p /ora02/dbfile/O11DEV\n$ mkdir -p\
  \ /oracle/app/oracle\n$ mkdir -p /ora02/oraarch/O11DEV\n```\n\n### 步骤 7：以 NOMOUNT\
  \ 模式启动数据库\n\n你现在应该能够以 `NOMOUNT` 模式启动数据库：\n\n```\n$ rman target /\nRMAN> startup\
  \ nomount;\n```\n\n### 步骤 8：从 RMAN 备份中还原控制文件\n\n现在从先前复制的备份中还原控制文件。在此示例中，包含控制文件备份的备份片是\
  \ `c-1984315547-20100923-00.bk`：\n\n```\nRMAN> restore controlfile from '/ora02/rman/O11DEV/c-1984315547-20100923-00.bk';\n\
  ```\n\n控制文件将被还原到 `CONTROL_FILES` 初始化参数指定的所有位置。以下是一些示例输出：\n\n```\nchannel ORA_DISK_1:\
  \ restoring control file\nchannel ORA_DISK_1: restore complete, elapsed time: 00:00:01\n\
  output file name=/ora02/dbfile/O11DEV/control01.ctl\noutput file name=/ora02/dbfile/O11DEV/control02.ctl\n\
  ```\n\n### 步骤 9：以 MOUNT 模式启动数据库\n\n你现在应该能够以加载模式启动数据库：\n\n```\nRMAN> alter database\
  \ mount;\n```\n\n### 步骤 10：使控制文件知道 RMAN 备份的位置\n\n首先，使用 `CROSSCHECK` 命令让控制文件知道没有任何备份或归档重做日志位于它们在原始服务器上的相同位置：\n\
  \n```\nRMAN> crosscheck backup;\nRMAN> crosscheck copy;\nRMAN> crosscheck archivelog\
  \ all;\n```\n\n现在使用 `CATALOG` 命令使控制文件知道复制到目标服务器的备份片的位置和名称。在此示例中，位于 `/ora02/rman/O11DEV`\
  \ 目录中的任何 RMAN 文件都将在控制文件中编录：\n\n```\nRMAN> catalog start with '/ora02/rman/O11DEV';\n\
  ```\n\n以下是一些示例输出：\n\n```\nsearching for all files that match the pattern /ora02/rman/O11DEV\n\
  \nList of Files Unknown to the Database\n=====================================\n\
  File Name: /ora02/rman/O11DEV/rman1_05lol0j5_1_1.bk\nFile Name: /ora02/rman/O11DEV/c-1984315547-20100923-00.bk\n\
  File Name: /ora02/rman/O11DEV/rman1_04lol0i1_1_1.bk\nFile Name: /ora02/rman/O11DEV/rman1_03lol0i0_1_1.bk\n\
  Do you really want to catalog the above files (enter YES or NO)?\n```\n\n现在，输入 `YES`（如果一切看起来正常）。你现在应该能够使用\
  \ RMAN 的 `LIST BACKUP` 命令查看新编录的备份片：\n\n```\nRMAN> list backup;\n```\n\n### 步骤 11：重命名并还原数据文件以反映新的目录位置\n\
  \n如果你的目标服务器具有与原始服务器目录完全相同的目录结构，你可以直接发出 `RESTORE` 命令：\n\n```\nRMAN> restore database;\n\
  ```\n\n但是，当将数据文件还原到与原始目录不同的位置时，你将必须使用 `SET NEWNAME` 命令。创建一个文件，使用包含适当 `SET NEWNAME`\
  \ 和 `RESTORE` 命令的 RMAN `run{}` 块。我喜欢使用生成 SQL 的 SQL 脚本来作为起点。这是一个示例脚本：\n\n```\nset\
  \ head off feed off verify off pages 0 trimspool on\nset lines 132 pagesize 0\n\
  spo newname.sql\n--\nselect 'run{' from dual;\n--\nselect\n'set newname for datafile\
  \ ' || file# || ' to ' || '''' || name || '''' || ';'\nfrom v$datafile;\n--\nselect\n\
  'restore database;' || chr(10) ||\n'switch datafile all;' || chr(10) ||\n'}'\nfrom\
  \ dual;\n--\nspo off;\n```\n\n运行脚本后，生成的 `newname.sql` 脚本的内容如下：\n\n```\nrun{\nset\
  \ newname for datafile 1 to '/u02/oracle/oradata/E64202/system01.dbf';\nset newname\
  \ for datafile 2 to '/u02/oracle/oradata/E64202/sysaux01.dbf';\nset newname for\
  \ datafile 3 to '/u02/oracle/oradata/E64202/undotbs01.dbf';\nset newname for datafile\
  \ 4 to '/u02/oracle/oradata/E64202/users01.dbf';\nrestore database;\nswitch datafile\
  \ all;\n}\n```\n\n现在，修改 `newname.sql` 脚本的内容以反映目标数据库服务器上的目录。以下是此示例最终 `newname.sql`\
  \ 脚本的样子：\n\n```\nrun{\nset newname for datafile 1 to '/ora02/dbfile/O11DEV/system01.dbf';\n\
  set newname for datafile 2 to '/ora02/dbfile/O11DEV/sysaux01.dbf';\nset newname\
  \ for datafile 3 to '/ora02/dbfile/O11DEV/undotbs01.dbf';\nset newname for datafile\
  \ 4 to '/ora02/dbfile/O11DEV/users01.dbf';\nrestore database;\nswitch datafile all;\n\
  }\n```\n\n现在，连接到 RMAN 并运行前面的脚本以将数据文件还原到新位置：\n\n```\n$ rman target /\nRMAN> @newname.sql\n\
  ```\n\n以下是此示例的输出片段：\n\n```\nchannel ORA_DISK_1: restore complete, elapsed time:\
  \ 00:01:05\nFinished restore at 24-SEP-10\ndatafile 1 switched to datafile copy\n\
  input datafile copy RECID=5 STAMP=730527824 file name=/ora02/dbfile/O11DEV/system01.dbf\n\
  datafile 2 switched to datafile copy\ninput datafile copy RECID=6 STAMP=730527824\
  \ file name=/ora02/dbfile/O11DEV/sysaux01.dbf\ndatafile 3 switched to datafile copy\n\
  input datafile copy RECID=7 STAMP=730527824 file name=/ora02/dbfile/O11DEV/undotbs01.dbf\n\
  datafile 4 switched to datafile copy\ninput datafile copy RECID=8 STAMP=730527824\
  \ file name=/ora02/dbfile/O11DEV/users01.dbf\nRMAN> end-of-file\n```\n\n所有数据文件都已还原到新的数据库服务器。你可以使用\
  \ RMAN 的 `REPORT SCHEMA` 命令来验证文件是否已还原并位于正确的位置：\n\n```\nRMAN> report schema;\n```\n\
  \n以下是一些示例输出：\n\n```\nRMAN-06139: WARNING: control file is not current for REPORT\
  \ SCHEMA\nReport of database schema for database with db_unique_name E64202\n\n\
  List of Permanent Datafiles\n===========================\nFile Size(MB) Tablespace\
  \ RB segs Datafile Name\n---- -------- -------------------- ------- ------------------------\n\
  1    670      SYSTEM       ***     /ora02/dbfile/O11DEV/system01.dbf\n2    470 \
  \     SYSAUX       ***     /ora02/dbfile/O11DEV/sysaux01.dbf\n3    30       UNDOTBS1\
  \     ***     /ora02/dbfile/O11DEV/undotbs01.dbf\n4    5        USERS        ***\
  \     /ora02/dbfile/O11DEV/users01.dbf\n\nList of Temporary Files\n=======================\n\
  File Size(MB) Tablespace Maxsize(MB) Tempfile Name\n---- -------- --------------------\
  \ ----------- --------------------\n1    0        TEMP         32767       /u02/oracle/oradata/E64202/temp01.dbf\n\
  ```\n\n从前面的输出来看，数据库名称和临时表空间数据文件仍未反映目标数据库。这些将在后续步骤中进行修改。\n\n### 步骤 12：恢复数据库\n\n接下来，你需要应用在备份期间生成的任何归档重做文件。由于备份时使用了\
  \ `ARCHIVELOG ALL` 子句，这些文件应包含在备份中。通过 `RECOVER DATABASE` 命令启动重做的应用：\n\n```\nRMAN>\
  \ recover database;\n```\n\nRMAN 将还原并应用备份片中尽可能多的归档重做日志，当到达不存在的归档重做日志时会抛出错误：\n\n\
  ```\nchannel ORA_DISK_1: starting archived log restore to default destination\n\
  channel ORA_DISK_1: restoring archived log\narchived log thread=1 sequence=4\nchannel\
  \ ORA_DISK_1: reading from backup piece /ora02/rman/O11DEV/rman1_05lol0j5_1_1.bk\n\
  channel ORA_DISK_1: piece handle=/ora02/rman/O11DEV/rman1_05lol0j5_1_1.bk tag=TAG20100923T200037\n\
  channel ORA_DISK_1: restored backup piece 1\nchannel ORA_DISK_1: restore complete,\
  \ elapsed time: 00:00:01\narchived log file name=/ora02/oraarch/O11DEV/1_4_729167134.arc\
  \ thread=1 sequence=4\nunable to find archived log\narchived log thread=1 sequence=5\n\
  RMAN-00571: ===========================================================\nRMAN-00569:\
  \ =============== ERROR MESSAGE STACK FOLLOWS ===============\nRMAN-00571: ===========================================================\n\
  RMAN-03002: failure of recover command at 09/24/2010 04:35:09\nRMAN-06054: media\
  \ recovery requesting unknown archived log\nfor thread 1 with sequence 5 and starting\
  \ SCN of 977214\n```\n\n现在是验证数据文件是否在线且不处于模糊状态的好时机。运行以下查询：\n\n```\nselect\n  file#\n\
  \  ,status\n  ,fuzzy\n  ,error\n  ,checkpoint_change#,\n  to_char(checkpoint_time,'dd-mon-rrrr\
  \ hh24:mi:ss') as checkpoint_time\nfrom v$datafile_header;\n```\n\n### 步骤 13：为联机重做日志设置新位置\n\
  \n设置联机重做日志的名称以反映目标数据库服务器上的新目录结构。我有时使用生成 SQL 的 SQL 脚本来协助此步骤：\n\n```\nset head off\
  \ lines 132 pages 0 trimspoo on\nspo renlog.sql\nselect\n'alter database rename\
  \ file ' || chr(10)\n|| '''' || member || '''' || ' to ' || chr(10) || '''' || member\
  \ || '''' ||';'\nfrom v$logfile;\nspo off;\n```\n\n对于此示例，生成的 `renlog.sql` 文件的内容如下：\n\
  \n```\nalter database rename file\n'/u02/oracle/oradata/E64202/redo03.log' to\n\
  '/u02/oracle/oradata/E64202/redo03.log';\n\nalter database rename file\n'/u02/oracle/oradata/E64202/redo02.log'\
  \ to\n'/u02/oracle/oradata/E64202/redo02.log';\n\nalter database rename file\n'/u02/oracle/oradata/E64202/redo01.log'\
  \ to\n'/u02/oracle/oradata/E64202/redo01.log';\n```\n\n`renlog.sql` 的内容需要进行修改以反映目标服务器上的目录结构。以下是为此示例编辑后的\
  \ `renlog.sql`：\n\n```\nalter database rename file\n'/u02/oracle/oradata/E64202/redo03.log'\
  \ to\n'/ora02/oraredo/O11DEV/redo03.log';\n\nalter database rename file\n'/u02/oracle/oradata/E64202/redo02.log'\
  \ to\n'/ora02/oraredo/O11DEV/redo02.log';\n\nalter database rename file\n'/u02/oracle/oradata/E64202/redo01.log'\
  \ to\n'/ora02/oraredo/O11DEV/redo01.log';\n```\n\n通过运行前面的脚本来更新控制文件：\n\n```\nSQL>\
  \ @renlog.sql\n```\n\n你可以从 `V$LOGFILE` 中选择以验证联机重做日志名称是否正确：\n\n```\nSQL> select member\
  \ from v$logfile;\n```\n\n这是此示例的输出：\n\n```\n/ora02/oraredo/O11DEV/redo03.log\n/ora02/oraredo/O11DEV/redo02.log\n\
  /ora02/oraredo/O11DEV/redo01.log\n```\n\n确保新服务器上包含联机重做日志的目录存在。对于此示例，`mkdir` 命令如下：\n\
  \n```\n$ mkdir -p /ora02/oraredo/O11DEV\n```\n\n### 步骤 14：打开数据库\n\n你必须使用 `OPEN RESETLOGS`\
  \ 命令打开数据库（因为此时没有重做日志，必须重新创建）：\n\n```\nSQL> alter database open resetlogs;\n```\n\
  \n如果成功，你应该会看到此消息：\n\n```\nDatabase altered.\n```\n\n### 步骤 15：添加临时文件\n\n当你启动数据库时，Oracle\
  \ 会自动尝试向数据库添加任何缺失的临时文件。如果目标服务器上的目录结构与源服务器不同，Oracle 将无法执行此操作。在这种情况下，你将必须手动添加任何缺失的临时文件。为此，首先将临时表空间的临时文件脱机。来自源数据库的文件定义如下脱机：\n\
  \n```\nSQL> alter database tempfile '/u02/oracle/oradata/E64202/temp01.dbf' offline;\n\
  ```\n\n接下来，向 `TEMP` 表空间添加一个与目标数据库服务器目录结构匹配的临时表空间文件：\n\n```\nSQL> alter tablespace\
  \ temp add tempfile '/ora02/dbfile/O11DEV/temp01.dbf' size 100m;\n```\n\n### 步骤\
  \ 16：重命名数据库\n\n如果你需要将数据库重命名为开发或测试数据库的名称，请创建包含 `CREATE CONTROLFILE` 语句的跟踪文件，并使用它来重命名数据库。这些步骤在第\
  \ 4 章中有详细介绍。涉及的基本步骤是：\n\n1.  生成跟踪文件。\n\n    ```\n    SQL> oradebug setmypid\n  \
  \  SQL> alter database backup controlfile to trace resetlogs;\n    SQL> oradebug\
  \ tracefile_name\n    ```\n2.  修改跟踪文件以包含 `SET DATABASE`。\n\n    ```\n    CREATE\
  \ CONTROLFILE SET DATABASE \"O11DEV\" RESETLOGS...\n    ```\n3.  创建一个与新名称匹配的 `init.ora`\
  \ 文件。\n4.  `ORACLE_HOME/dbs/init<newSID>.ora`。\n5.  在新的 `init.ora` 文件中修改 `DB_NAME`\
  \ 变量（在此示例中，将其设置为 `O11DEV`）。\n6.  将 `ORACLE_SID` 设置为新的 SID 名称（在此示例中，将其设置为 `O11DEV`）。\n\
  7.  `SQL> startup nomount;`\n8.  运行跟踪文件以重新创建控制文件（来自步骤 2 的跟踪文件）。\n9.  `SQL> alter\
  \ database open resetlogs;`\n\n如果成功，你将拥有一个复制自原始数据库的数据库。所有数据文件、控制文件、归档重做日志和联机重做日志都位于新位置，并且数据库具有新名称。\n\
  \n■ **提示** 你也可以使用 `NID` 实用程序来更改数据库名称和 DBID。有关更多信息，请参阅 My Oracle Support 说明 863800.1。\n\
  \n## 总结\n\nRMAN 是 Recovery Manager 的缩写。值得注意的是，Oracle 并未将此工具命名为 Backup Manager。Oracle\
  \ 团队认识到，虽然备份很重要，但 B&R 工具的真正价值在于其还原和恢复数据库的能力。能够管理恢复过程是关键技能。当数据库损坏需要恢复时，每个人都指望 DBA\
  \ 执行平稳快速的数据库恢复。Oracle DBA 应使用 RMAN 来保护、确保公司数据资产的安全性和可用性。\n\n还原和恢复类似于骨折后的愈合过程。还原类似于将骨头设置回其原始位置的过程。这就像从备份中还原数据文件并将其放回其原始目录。恢复数据文件类似于骨折的愈合过程——将骨头恢复到其断裂前的状态。当你恢复数据文件时，你应用事务（从归档重做和联机重做中获得）将还原的数据文件转换回介质故障发生前的状态。\n\
  \nRMAN 可用于任何类型的还原和恢复场景。根据情况，RMAN 可用于还原整个数据库、特定数据文件、控制文件、服务器参数文件、归档重做日志，或者只是特定的数据块。你可以指示\
  \ RMAN 执行完全恢复或不完全恢复。\n\n本章的最后一节详细介绍了如何使用 RMAN 将数据库还原和恢复到远程服务器。我建议你定期尝试测试此类恢复。这将全面检验你的备份和恢复策略。一旦你能成功地将数据库还原到与原始服务器不同的服务器上，你将获得很大的信心，并充分理解备份和恢复的内部机制。\n\
  \n# ORACLE 安全备份\n\n-   与 Oracle Enterprise Manager Grid Control 集成（需要 Oracle Database\
  \ 10g Release 2 或更高版本）\n-   支持多个磁带驱动器\n-   加密磁带备份\n-   光纤连接设备支持\n-   快速备份压缩（需要 Oracle\
  \ Database 11g Release 1 或更高版本）\n-   RMAN 中级压缩（需要 Oracle Database 11g Release 2\
  \ 或更高版本）\n-   分布式主机和磁带设备的网络备份\n-   自动磁带库系统软件（ACSLS）和磁带在多个位置（库）之间的自动轮换\n\n如果你是一个只有一个生产数据库服务器的小型机构，那么\
  \ Oracle Secure Backup Express 可能满足你的业务需求，而功能齐全的 Oracle Secure Backup 版本则更适用于需要高级数据保护需求的具有多个分布式主机的环境。\n\
  \n■ **注意** OSB 在大多数 Linux 和 Unix 平台以及 Windows 上可用。请查看 My Oracle Support 的认证矩阵以获取最新列表（https://support.oracle.com）。\n\
  \n## OSB 术语\n\n花些时间熟悉与 OSB 相关的架构术语。本节简要描述了 OSB 的主要组成部分，从管理域开始。\n\n### OSB 管理域和服务器\n\
  \n管理域是一组服务器（主机）的集合，你将其作为一个组进行管理以执行备份和还原操作。在 OSB 管理域中，每个服务器可以分配以下一个或多个角色：\n\n-  \
  \ 管理（admin）服务器\n-   媒体服务器\n-   客户端服务器（或客户端主机）\n\n对于每个管理域，如图 20–1 所示，只有一个管理服务器控制备份、还原和调度操作。一个管理服务器管理一个或多个媒体服务器以及一个或多个客户端。\n\
  \n■ **提示** 有关所有 OSB 接口的完整详细信息，请参阅 *Oracle Secure Backup Administrator's Guide* 和\
  \ *Oracle Secure Backup Reference*，网址为 www.oracle.com/technetwork/database/secure-backup/documentation/。\n\
  \n### OSB 用户和类\n\nOracle Secure Backup 用户是在 OSB 管理域内定义的帐户。这些用户与操作系统用户是分开的。OSB 用户信息存储在\
  \ OSB 管理域服务器中。当你通过其接口（如 `obtool` 或 OSB Web 工具）访问 OSB 时，需要输入用户名和密码。\n\nOSB 类是一组授予用户的权限和权利。每个用户只能分配给一个\
  \ OSB 类。OSB 类有助于在管理域中的所有服务器上保持一致的用户体。\n\n### OSB 守护进程\n\nOracle Secure Backup 使用七个不同的后台进程（守护进程）来管理配置、备份和还原操作。启动守护进程的可执行文件位于每个服务器上的\
  \ `OSB_HOME/etc` 目录中。这些进程在此列表中描述：\n\n-   **调度守护进程** 仅在管理服务器上运行，管理计划的备份。\n-   **索引守护进程**\
  \ 仅在管理服务器上运行，管理每个客户端的备份目录。\n-   **Apache Web 服务器守护进程** 仅在管理服务器上运行，服务于 OSB Web 工具。\n\
  -   **服务守护进程** 在管理、媒体和客户端服务器上运行。在管理服务器上，它根据调度守护进程的请求运行作业。在媒体或客户端服务器上运行时，它允许对主机进行远程管理。\n\
  -   **网络数据管理协议 (NDMP) 守护进程** 在管理、媒体和客户端服务器上运行；它提供管理域内服务器之间的数据通信。\n-   **机器人守护进程**\
  \ 仅在媒体服务器上运行，帮助管理与磁带设备的通信。\n-   **代理守护进程** 仅在客户端服务器上运行，验证 SBT 备份和还原操作的用户访问权限。\n\n\
  现在你已基本了解 OSB 架构，可以下载并安装 OSB 软件了。\n\n## 下载和安装\n\n你可以从 Oracle 技术网络 (OTN) 网站 www.oracle.com/technetwork/database/secure-backup/downloads/\
  \ 下载 OSB 软件。\n\n对于本章的示例，我下载了 OSB 版本 10.3.0.3.0，并将 zip 文件 `osb-10.3.0.3.0_linux32.zip`\
