  例如，要将一个名为 `backup.bsh` 的脚本安排在每晚 11:05 运行，请在文件中输入以下内容：\n```\n#---------------------------------------------------------------------------------\n\
  \n\n\n"
- "# 文件备份，dk：2010 年 10 月 20 日，已插入。\n\n`5 23 * * * /home/oracle/bin/backup.bsh`\n\n\
  4. 编辑完成后，如图所示加载回 crontab：`$ crontab mycron.txt`\n\n如果你的文件不符合 cron 语法，你会收到类似以下的错误信息：\n\
  \n```\n\"mycron.txt\":6: bad day-of-week\nerrors in crontab file, can't install.\n\
  ```\n\n遇到这种情况，要么修正语法错误，要么重新加载 cron 表的原始副本。\n\n## 重定向 cron 输出\n\n每当运行 Linux Shell\
  \ 命令时，默认情况下命令的标准输出会显示在屏幕上。同样，如果产生任何错误信息，默认也会显示在你的终端上。你可以使用 `>` 或 `1>`（它们是同义的）将任何标准输出重定向到操作系统文件。此外，你可以使用\
  \ `2>` 将任何错误信息重定向到文件。`2>&1` 这种记法指示 Shell 将任何错误信息发送到与标准输出相同的位置。\n\n当你创建一个 cron 任务时，可以使用这些重定向功能将\
  \ Shell 脚本的输出发送到日志文件。例如，在以下的 cron 表条目中，由 `backup.bsh` Shell 脚本生成的任何标准输出和错误信息都被捕获到名为\
  \ `bck.log` 的文件中：`11 12 * * * /home/oracle/bin/backup.bsh 1>/home/oracle/bin/log/bck.log\
  \ 2>&1`\n\n如果你不重定向 cron 任务的输出，那么任何输出都会以电子邮件形式发送给拥有该 cron 任务的用户。你可以通过直接在 cron 表中指定\
  \ `MAILTO` 变量来覆盖此行为。\n\n在下一个示例中，你想\"烦扰\"系统管理员，将 cron 输出发送给 root 用户：\n\n```\nMAILTO=root\n\
  11 12 * * * /home/oracle/bin/backup.bsh\n```\n\n如果你不希望输出发送到任何地方，那么将其重定向到众所周知的\"\
  位桶\"。以下条目将标准输出和标准错误发送到 `/dev/null` 设备：`11 12 * * * /home/oracle/bin/backup.bsh 1>/dev/null\
  \ 2>&1`\n\n## 疑难解答 cron\n\n如果你的某个 cron 任务运行不正确，请按照以下步骤排查问题：\n\n1.  复制你的 `cron` 条目，粘贴到操作系统命令行，并手动运行该命令。通常，目录或文件名中的轻微拼写错误可能是问题的根源。手动运行命令会突出显示此类错误。\n\
  \n2.  如果脚本运行 Oracle 实用程序，请确保你在脚本内部 `source`（设置）了所需的操作系统变量，例如 `ORACLE_HOME` 和 `ORACLE_SID`。通常，这些变量在你登录时由启动脚本（如\
  \ `HOME/.bashrc`）设置。由于 cron 不运行用户的启动脚本，任何必需的变量都必须在脚本内显式设置。\n\n3.  确保任何从 cron 调用的\
  \ Shell 脚本的第一行指定了用于解释脚本内命令的程序名称。例如，`#!/bin/bash` 应该是 Bash Shell 脚本的第一行。\n\n    由于\
  \ cron 不运行用户的启动脚本（如 `HOME/.bashrc`），你不能假设你的操作系统用户的默认 Shell 将用于运行从 cron 调用的命令或脚本。\n\
  \n4.  确保 cron 后台进程正在运行。在操作系统中执行以下命令进行验证：\n\n    ```\n    $ ps -ef | grep cron\n\
  \    ```\n\n5.  如果 cron 守护进程（后台进程）正在运行，你应该看到类似以下内容：\n\n    ```\n    root 2969 1\
  \ 0 Mar23 ? 00:00:00 crond\n    ```\n\n6.  检查服务器上的电子邮件。当有行为异常的 cron 任务出现问题时，cron\
  \ 实用程序通常会向操作系统账户发送电子邮件。\n\n7.  检查 `/var/log/cron` 文件的内容是否有任何错误。有时这个文件包含关于未能运行的 cron\
  \ 任务的相关信息。\n\n## 自动化 DBA 任务示例\n\n在当今通常混乱的商业环境中，自动化任务几乎是强制性的。如果不进行自动化，你可能会忘记执行某项任务，或者在手动执行工作时引入错误。如果不进行自动化，你可能会发现自己被一组更高效或更便宜的\
  \ DBA 取代或外包。\n\n当我自动化任务时，脚本通常只在失败的情况下才发送电子邮件。\n\n在成功时生成电子邮件通常会导致邮箱爆满。有些 DBA 喜欢看到成功消息。我通常不喜欢。\n\
  \nDBA 自动化各种各样的任务和工作。几乎任何类型的环境都要求你创建某种操作系统脚本，该脚本封装了操作系统命令、SQL 语句和 PL/SQL 块的组合。\n\n\
  本章中的以下脚本是 DBA 将自动化的各种不同类型任务的示例。这套脚本绝非完整。其中许多脚本在你的环境中可能不需要。关键是要给你提供一个良好的采样，展示自动化的任务类型以及用于完成特定任务的技术。\n\
  \n**注意** 第 3 章包含了一些 DBA 所需的核心脚本的基础示例。本节提供了 DBA 常自动化的任务和脚本的高级示例。\n\n## 启动和停止数据库与监听器\n\
  \n在许多环境中，希望 Oracle 数据库和监听器在服务器重启时自动关闭和启动。如果你有此要求，那么请按照以下步骤自动化你的数据库和监听器的关闭和启动：\n\n\
  1.  编辑 `/etc/oratab` 文件，并在你希望系统重启时自动重启的数据库条目末尾放置一个 `Y`。你可能需要 `root` 权限来编辑该文件：\n\n\
  \    ```\n    # vi /etc/oratab\n    ```\n\n2.  在文件中为你的环境添加一行类似以下的内容：`O11R2:/oracle/app/oracle/product/11.2.0/db_1:Y`\n\
  \n3.  在上一行中，`O11R2` 是数据库名称，`/oracle/app/oracle/product/11.2.0/db_1` 指定了 `ORACLE_HOME`\
  \ 目录。\n\n    末尾的 `Y` 表示该数据库可以由 `ORACLE_HOME/bin/dbstart` 和 `ORACLE_HOME/bin/dbshut`\
  \ 脚本启动和停止。\n\n    如果你不希望数据库自动停止和重启，可以将 `Y` 替换为 `N`。\n\n    **注意** 在某些 Unix 系统（如\
  \ Solaris）中，oratab 文件通常位于 `/var/opt/oracle` 目录。\n\n4.  以 `root` 身份导航到 `/etc/init.d`\
  \ 目录，并创建一个名为 `dbora` 的文件：\n\n    ```\n    # cd /etc/init.d\n    # vi dbora\n   \
  \ ```\n\n5.  将以下行放入 `dbora` 文件中。确保将变量 `ORA_HOME` 和 `ORA_OWNER` 的值更改为匹配你的环境。这是一个用于停止和启动数据库及监听器的最简骨架脚本：\n\
  \n    ```\n    #!/bin/bash\n    # chkconfig: 35 99 10\n    # description: Starts\
  \ and stops Oracle processes\n    ORA_HOME=/oracle/app/oracle/product/11.2.0/db_1\n\
  \    ORA_OWNER=oracle\n    case \"$1\" in\n    'start')\n        su - $ORA_OWNER\
  \ -c \"$ORA_HOME/bin/lsnrctl start\"\n        su - $ORA_OWNER -c $ORA_HOME/bin/dbstart\n\
  \        ;;\n    'stop')\n        su - $ORA_OWNER -c \"$ORA_HOME/bin/lsnrctl stop\"\
  \n        su - $ORA_OWNER -c $ORA_HOME/bin/dbshut\n        ;;\n    esac\n    ```\n\
  \n这些行在 `dbora` 文件中看起来像注释，但实际上是必需的行：\n\n```\n# chkconfig: 35 99 10\n```\n\n\n\n"
- "# 描述：启动和停止 Oracle 进程\n\n这些行描述了脚本的服务特性。数字 35 表示服务将在运行级别 3 和 5 启动。数字 99 表示该服务将在 init\
  \ 处理接近尾声时启动。\n\n数字 10 表示该服务将在 init 处理开始时停止。还需要提供一个描述，用以给出关于该服务的文本信息。\n\n**注意** Linux\
  \ 运行级别是一个逻辑容器，用于指定系统启动时将运行哪些服务。\n\n1.  将 `dbora` 文件的组更改为与 Oracle 软件的操作系统所有者所分配的组（通常是\
  \ `oinstall` 或 `dba`）相匹配：\n    ```bash\n    # chgrp dba dbora\n    ```\n2.  将 `dbora`\
  \ 文件的权限更改为 750：\n    ```bash\n    # chmod 750 dbora\n    ```\n3.  运行以下 `chkconfig`\
  \ 命令：\n    ```bash\n    # /sbin/chkconfig --add dbora\n    ```\n\n这里的 `chkconfig`\
  \ 命令注册了服务脚本。这还会在 `/etc/rc.d` 目录下创建指向相应文件的符号链接。使用 `--list` 选项可以显示服务在每个运行级别是开启还是关闭：\n\
  ```bash\n# chkconfig --list | grep dbora\ndbora 0:off 1:off 2:off 3:on 4:off 5:on\
  \ 6:off\n```\n此输出表明 `dbora` 服务在运行级别 3 和 5 是开启的。如果需要删除服务，请使用 `chkconfig` 的 `--del`\
  \ 选项。\n\n**提示** 如果你希望自动停止和启动（在系统重启时）其他进程，如智能代理、管理服务器和 HTTP 服务器，请参阅 My Oracle Support\
  \ 说明 222813.1 以获取详细信息。\n\n自动化 Oracle 数据库的关闭和启动将根据你是否使用集群软件或 ASM 等工具而有所不同。本节中的解决方案演示了在没有其他管理此任务的软件的情况下，实现数据库关闭和启动的典型步骤。\n\
  \n![](img/index-619_1.png)\n\n## 第 21 章 ■ 自动化作业\n\n要设置默认运行级别，请在 `/etc/inittab` 文件的\
  \ `id:<N>:initdefault` 行中指定 `N`。以下示例将默认运行级别设置为 5：\n```\nid:5:initdefault:\n```\n\
  \n运行级别 1 由系统管理员 (SA) 在执行维护和修复时使用。运行级别 5 将启动 Linux 服务器，在控制台提供图形登录屏幕以及网络功能。但是，如果你在控制台运行显示管理器时出现问题（例如由于视频驱动程序问题），那么你可以改为启动到运行级别\
  \ 3，这是基于命令行的，但仍然具有网络服务。\n\n大多数具有安全意识的 SA 在运行级别 3 上运行他们的服务器。随着 VNC 的广泛接受，SA 通常看不到在运行级别\
  \ 5 上运行的好处。如果 SA 想要利用图形实用程序，他们会直接使用 VNC（或类似的工具）。顺便说一下，不要尝试将 `initdefault` 设置为 0\
  \ 或 6，因为你的 Linux 服务器将永远不会启动。\n\n要确定当前运行级别，你可以运行 `who -r` 或 `runlevel`，如下所示：\n```bash\n\
  # runlevel\nN 5\n# who -r\nrun-level 5 Jun 17 00:29 last=S\n```\n\n给定的运行级别管理着 Linux\
  \ 在启动时将运行哪些脚本。这些脚本位于目录 `/etc/rc.d/rc<N>.d` 中，其中 `<N>` 对应于运行级别。对于运行级别 5，脚本位于 `/etc/rc.d/rc5.d`\
  \ 目录中。例如，当 Linux 在运行级别 5 启动时，它将运行的脚本之一是 `/etc/rc.d/rc5.d/S55sshd`，这实际上是指向 `/etc/rc.d/init.d/sshd`\
  \ 的软链接。\n\n## 检查归档重做目标位置是否已满\n\n有时，数据库管理员和系统管理员没有充分规划并实施用于在磁盘上存储归档重做日志文件的位置。在这些情况下，如果有一个脚本可以在主位置检查空间并在归档重做目标位置变满之前发出警告，通常会很方便。此外，你可能希望在脚本中实现自动将归档重做日志位置切换到具有足够磁盘空间的备用位置的功能。\n\
  \n我只在那些归档重做日志目标位置会以不可预测的频率填满的混乱环境中使用过类似的脚本。如果归档重做日志目标位置填满，数据库将挂起。在某些环境中，这是非常不可接受的。你可能会争辩说，数据库管理员应该做好规划，永远不要让自己陷入这种情况。然而，如果你被请来维护一个不可预测的环境，而且你是那个在凌晨\
  \ 2:00 接到电话的人，你可能需要考虑实现一个如本节所列的脚本。\n\n在使用清单 21-4 中的脚本之前，请更改脚本内的变量以匹配你的环境。例如，`SWITCH_DIR`\
  \ 应该指向磁盘上的一个备用位置，以便在主要目标位置变满时可以安全地切换归档重做日志目标。当空间使用量低于 `THRESH_GET_WORRIED` 变量指定的数量时，脚本将发送警告电子邮件。如果归档重做日志空间低于\
  \ `THRESH_SPACE_CRIT` 变量中包含的值，则目标位置将自动切换到 `SWITCH_DIR` 变量中包含的目录。\n\n## 第 21 章 ■\
  \ 自动化作业\n\n**清单 21–4.** 归档重做目标位置空间调查脚本\n```bash\n#!/bin/bash\n\nPRG=`basename $0`\n\
  DB=$1\nUSAGE=\"Usage: ${PRG} <sid>\"\n\nif [ -z \"$DB\" ]; then\n    echo \"${USAGE}\"\
  \n    exit 1\nfi\n\n# source OS variables\n. /var/opt/oracle/oraset ${DB}\n\n# Set\
  \ an alternative location, make sure it exists and has space.\nSWITCH_DIR=/oradump01/${DB}/archivelog\n\
  \n# Set thresholds for getting concerned and switching.\nTHRESH_GET_WORRIED=2000000\
  \ # 2Gig from df -k\nTHRESH_SPACE_CRIT=1000000 # 1Gig from df -k\n\nMAILX=\"/bin/mailx\"\
  \nMAIL_LIST=\"dkuhn@sun.com \"\nBOX=`uname -a | awk '{print$2}'`\n\n#\nloc=`sqlplus\
  \ -s <<EOF\nCONNECT / AS sysdba\nSET HEAD OFF FEEDBACK OFF\nSELECT SUBSTR(destination,1,INSTR(destination,'/',1,2)-1)\n\
  FROM v\\$archive_dest WHERE dest_name='LOG_ARCHIVE_DEST_1';\nEOF`\n\n#\nfree_space=`df\
  \ -k | grep ${loc} | awk '{print $4}'`\necho box = ${BOX}, sid = ${DB}, Arch Log\
  \ Mnt Pnt = ${loc}\necho \"free_space = ${free_space} K\"\necho \"THRESH_GET_WORRIED=\
  \ ${THRESH_GET_WORRIED} K\"\necho \"THRESH_SPACE_CRIT = ${THRESH_SPACE_CRIT} K\"\
  \n\n#\nif [ $free_space -le $THRESH_GET_WORRIED ]; then\n    $MAILX -s \"Arch Redo\
  \ Space Low ${DB} on $BOX\" $MAIL_LIST <<EOF\nArchive log dest space low, box: $BOX,\
  \ sid: ${DB}, free space: $free_space\nEOF\nfi\n\n#\nif [ $free_space -le $THRESH_SPACE_CRIT\
  \ ]; then\n    sqlplus -s << EOF\nCONNECT / AS sysdba\nALTER SYSTEM SET log_archive_dest_1='location=${SWITCH_DIR}';\n\
  ALTER SYSTEM SWITCH LOGFILE;\nEOF\n    $MAILX -s \"Archive Switch ${DB} on $BOX\"\
  \ $MAIL_LIST <<EOF\nArchive log dest, box: $BOX, sid: ${DB} has switched.\nThen\
  \ ALTER SYSTEM SET LOG_ARCHIVE_DEST_1='location=<Normal Location>';\nEOF\nelse\n\
  \    echo no need to switch, ${free_space} KB free on ${loc}\nfi\n\n#\nexit 0\n\
  ```\n\n前面的脚本假设你已经将 `LOG_ARCHIVE_DEST_1` 初始化参数设置为你归档重做位置。如果你使用闪回恢复区 (FRA) 作为归档重做日志文件的位置，你可以从\
  \ `V$ARCHIVED_LOG` 视图中推导出归档位置，例如：\n```sql\nselect\nsubstr(name,1,instr(name,'/',1,2)-1)\n\
  from v$archived_log\nwhere first_time =\n    (select max(first_time) from v$archived_log);\n\
  ```\n\n通常我会每小时运行一个脚本来检查一次归档重做日志目标位置。以下是一个典型的 `cron` 条目：\n```\n#---------------------------------------------------\n\
  ```\n\n\n\n"
