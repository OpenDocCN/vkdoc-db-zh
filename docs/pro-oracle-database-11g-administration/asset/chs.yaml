  \ 建议在 Unix 和 Linux 平台的目录 `/usr/local/oracle/backup` 下安装 OSB 软件，在 Windows 平台的目录 `C:\\\
  Program Files\\Oracle\\Backup` 下安装。一旦你下载了 OSB zip 文件并将其复制到适当的目录，就可以继续执行安装步骤，如下所示：\n\
