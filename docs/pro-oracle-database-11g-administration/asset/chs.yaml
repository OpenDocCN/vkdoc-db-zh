- "# 文件系统检查\n7 * * * * /orahome/bin/filesp.bsh 1>/orahome/bin/log/filesp.log 2>&1\n\
  \n### login.sql\n\n使用此脚本来定制您的 SQL*Plus 环境的某些方面。在 Linux/Unix 中登录 SQL*Plus 时，如果 `login.sql`\
  \ 脚本存在于 `SQLPATH` 变量包含的目录中，则会自动执行该脚本。如果 `SQLPATH` 变量未定义，则 SQL*Plus 会在调用 SQL*Plus\
  \ 时所在的工作目录中查找 `login.sql`。例如，以下是我环境中 `SQLPATH` 变量的定义方式：\n\n$ echo $SQLPATH\n/home/oracle/scripts\n\
  \n在 `/home/oracle/scripts` 目录中创建 `login.sql` 脚本。其内容如下：\n\n-- 设置 SQL 提示符\nSET SQLPROMPT\
  \ '&_USER.@&_CONNECT_IDENTIFIER.> '\n\n现在，当我登录 SQL*Plus 时，提示符会自动设置：\n\n$ sqlplus\
  \ / as sysdba\nSYS@O11R2>\n\n### top.sql\n\n以下脚本列出消耗 CPU 最多的 SQL 进程。这对于识别问题 SQL\
  \ 语句非常有用。将此脚本放置在 `HOME/scripts` 等目录中：\n\n```sql\nselect * from(\nselect\n    sql_text\n\
  \   ,buffer_gets\n   ,disk_reads\n   ,sorts\n   ,cpu_time/1000000 cpu_sec\n   ,executions\n\
  \   ,rows_processed\nfrom v$sqlstats\norder by cpu_time DESC)\nwhere rownum < 11;\n\
  ```\n\n执行此脚本的方法如下：\n\nSQL> @top\n\n以下是一小段输出，显示了一条消耗大量数据库资源的 SQL 语句：\n\nSQL_TEXT\n\
  insert into reg_queue (registration_urn,registration_data,client_ip_addr, relay_\n\
  BUFFER_GETS DISK_READS SORTS CPU_SEC EXECUTIONS ROWS_PROCESSED\n----------- ----------\
  \ ---------- ---------- ---------- --------------\n6079221 2482 28309 986.704467\
  \ 697494 997467\n\n### lock.sql\n\n此脚本显示对表持有锁并阻止其他会话完成工作的会话。该脚本显示有关阻塞和等待会话的详细信息。您应将此脚本放置在\
  \ `HOME/scripts` 等目录中。`lock.sql` 的内容如下：\n\n```sql\nselect s1.username blkg_user,\
  \ s1.machine blkg_ws, s1.sid blkg_sid,\n       s2.username wait_user, s2.machine\
  \ wait_ws, s2.sid wait_sid,\n       lo.object_id blkd_obj_id, do.owner, do.object_name\n\
  from v$lock l1, v$session s1, v$lock l2, v$session s2,\n     v$locked_object lo,\
  \ dba_objects do\nwhere s1.sid = l1.sid\n  and s2.sid = l2.sid\n  and l1.id1 = l2.id1\n\
  \  and s1.sid = lo.session_id\n  and lo.object_id = do.object_id\n  and l1.block\
  \ = 1\n  and l2.request > 0;\n```\n\n`lock.sql` 脚本对于确定哪个会话持有对象的锁以及显示被阻塞的会话非常有用。您可以从\
  \ SQL*Plus 运行此脚本，如下所示：\n\nSQL> @lock.sql\n\n以下是部分输出列表（已截断以适应单页）：\n\nBLKG_USER BLKG_WS\
  \ BLKG_SID WAIT_USER WAIT_WS\n---------- -------------------- ---------- ----------\
  \ --------------------\nMV ora03.regis.local 88 INV_APP ora03.regis.local\n\n###\
  \ users.sql\n\n此脚本显示有关用户创建时间及其账户是否被锁定的信息。当您对连接问题进行故障排除时，此脚本非常有用。将其放置在 `HOME/scripts`\
  \ 等目录中。以下是一个典型的用于显示用户账户信息的 `users.sql` 脚本：\n\n```sql\nSELECT\n    username\n   ,account_status\n\
  \   ,lock_date\n   ,created\nFROM dba_users\nORDER BY username;\n```\n\n您可以从 SQL*Plus\
  \ 执行此脚本，如下所示：\n\nSQL> @users.sql\n\n以下是一些示例输出：\n\nUSERNAME ACCOUNT_STATUS LOCK_DATE\
  \ CREATED\n-------------------- -------------------------------- --------- ---------\n\
  CLUSTERUSER OPEN 09-MAY-10\nDIP EXPIRED & LOCKED 09-MAY-10 09-MAY-10\nDP122764 LOCKED\
  \ 07-JAN-10 09-JUL-10\n\n## 组织脚本\n\n当您拥有一组脚本和实用程序时，应对其进行组织，以便在每个数据库服务器上都能一致地实施。请按照以下步骤为环境中的每个数据库服务器实施前述\
  \ DBA 实用程序：\n\n1.  创建用于存储脚本的操作系统目录。\n2.  将您的脚本和实用程序复制到步骤 1 创建的目录中。\n3.  配置您的启动文件以初始化环境。\n\
  \n前面的步骤将在以下小节中详细说明。\n\n### 步骤 1：创建目录\n\n在每个数据库服务器上创建一套标准目录来存储您的自定义脚本。`oracle` 用户的\
  \ `HOME` 目录下的目录通常是一个不错的位置。我通常创建以下三个目录：\n\n*   `HOME/bin`。以自动方式（如从 `cron`）运行的 shell\
  \ 脚本的标准位置。\n*   `HOME/bin/log`。由计划的 shell 脚本生成的日志文件的标准位置。\n*   `HOME/scripts`。存储\
  \ SQL 脚本的标准位置。\n\n您可以使用 `mkdir` 命令创建上述目录，如下所示：\n\n$ mkdir -p $HOME/bin/log\n$ mkdir\
  \ $HOME/scripts\n\n脚本放置在何处或目录如何命名并不重要，只要您有一个标准位置，这样当您在服务器间导航时，总能在相同位置找到相同的文件。换句话说，标准是什么并不重要，重要的是您有一个标准。\n\
  \n### 步骤 2：将文件复制到目录\n\n将您的实用程序和脚本放入相应的目录。将以下文件复制到 `HOME/bin` 目录：\n\n*   `dba_setup`\n\
  *   `dba_fcns`\n*   `tbsp_chk.bsh`\n*   `conn.bsh`\n*   `filesp.bsh`\n\n将以下 SQL\
  \ 脚本放入 `HOME/scripts` 目录：\n\n*   `login.sql`\n*   `top.sql`\n*   `lock.sql`\n* \
  \  `users.sql`\n\n### 步骤 3：配置启动文件\n\n将以下代码放入 `.bashrc` 文件或您使用的 shell 的等效启动文件中（Korn\
  \ shell 为 `.profile`）。以下是如何配置 `.bashrc` 文件的示例：\n\n```bash\n# 引入全局定义\nif [ -f /etc/bashrc\
  \ ]; then\n    . /etc/bashrc\nfi\n#\n# 引入 Oracle 操作系统变量\n. /var/opt/oracle/oraset\
  \ <default_database>\n#\n```\n\n"
