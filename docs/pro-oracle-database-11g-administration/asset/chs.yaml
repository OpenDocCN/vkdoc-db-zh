  \n### 实现虚拟列\n\n从 Oracle Database 11g 开始，你可以在表定义中创建*虚拟列*。虚拟列基于同一表中的一个或多个现有列和/或常量、SQL\
  \ 函数以及用户定义的 PL/SQL 函数的组合。虚拟列不存储在磁盘上；它们在 SQL 查询运行时执行时进行评估。虚拟列可以被索引，并且可以存储统计信息。\n\n\
  在 Oracle Database 11g 之前，你可以通过`SELECT`语句或在视图定义中模拟虚拟列。例如，以下 SQL `SELECT`语句在查询执行时生成一个虚拟值：\n\
  \n```sql\nselect inv_id, inv_count,\n  case when inv_count <= 100 then 'GETTING\
  \ LOW'\n       when inv_count > 100 then 'OKAY'\n  end\nfrom inv;\n```\n\n为什么要使用虚拟列？这样做有以下优势：\n\
  \n- 你可以在虚拟列上创建索引。在内部，Oracle 会创建一个基于函数的索引。\n- 你可以在虚拟列中存储可供成本基优化器（CBO）使用的统计信息。\n-\
  \ 虚拟列可以在`WHERE`子句中引用。\n- 虚拟列在数据库中永久定义。这样的列有一个中央定义。\n\n以下是一个创建包含虚拟列的表的示例：\n\n```sql\n\
  create table inv(\n  inv_id number\n  ,inv_count number\n  ,inv_status generated\
  \ always as (\n      case when inv_count <= 100 then 'GETTING LOW'\n           when\
  \ inv_count > 100 then 'OKAY'\n      end)\n);\n```\n\n在前面的代码清单中，指定`GENERATED ALWAYS`是可选的。例如，以下清单等同于前一个：\n\
  \n```sql\ncreate table inv(\n  inv_id number\n  ,inv_count number\n  ,inv_status\
  \ as (\n      case when inv_count <= 100 then 'GETTING LOW'\n           when inv_count\
  \ > 100 then 'OKAY'\n      end)\n);\n```\n\n我更喜欢添加`GENERATED ALWAYS`，因为它在我脑海中强化了该列始终是虚拟的这一概念。\n\
  \n`GENERATED ALWAYS`有助于内联记录你所做的事情。这有助于其他 DBA 在你之后很久进行维护。\n\n要查看虚拟列生成的值，首先向表中插入一些数据：\n\
  \n```sql\nSQL> insert into inv (inv_id, inv_count) values (1,100);\n```\n\n接下来，从表中选择以查看生成的值：\n\
  \n```sql\nSQL> select * from inv;\n```\n\n以下是一些示例输出：\n\n```\nINV_ID INV_COUNT INV_STATUS\n\
  ---------- ---------- -----------\n1        100      GETTING LOW\n```\n\n**注意：**\
  \ 如果你向表中插入数据，`GENERATED ALWAYS AS`列中不会存储任何内容。虚拟值在你从表中选择时生成。\n\n你也可以修改表以包含虚拟列：\n\n\
  ```sql\nalter table inv add(\n  inv_comm generated always as(inv_count * 0.1) virtual\n\
  );\n```\n\n第 7 章 ■ 表与约束\n\n并且可以更改现有虚拟列的定义：\n\n```sql\nalter table inv modify inv_status\
  \ generated always as(\n  case when inv_count <= 50 then 'NEED MORE'\n       when\
  \ inv_count >50 and inv_count <=200 then 'GETTING LOW'\n       when inv_count >\
  \ 200 then 'OKAY'\n  end);\n```\n\n你可以在 SQL 查询（DML 或 DDL）中访问虚拟列。例如，假设你想根据虚拟列中的值更新永久列：\n\
  \n```sql\nSQL> update inv set inv_count=100 where inv_status='OKAY';\n```\n\n虚拟列本身不能通过`UPDATE`语句的`SET`子句进行更新。但是，你可以在`UPDATE`或`DELETE`语句的`WHERE`子句中引用虚拟列。\n\
  \n你可以选择指定虚拟列的数据类型。如果省略数据类型，Oracle 会根据用于定义虚拟列的表达式推导数据类型。\n\n虚拟列有几个注意事项：\n\n- 你只能在常规堆组织表上定义虚拟列。不能在索引组织表、外部表、临时表、对象表或簇表上定义虚拟列。\n\
  - 虚拟列不能引用其他虚拟列。\n- 虚拟列只能引用定义该虚拟列的表中的列。\n- 虚拟列的输出必须是标量值（单个值，而不是一组值）。\n\n要查看虚拟列的定义，请使用`DBMS_METADATA`包查看与表关联的\
  \ DDL。如果你在 SQL*Plus 中进行选择，需要将`LONG`变量设置为足够大的值以显示所有返回的数据：\n\n```sql\nSQL> set long\
  \ 10000;\nSQL> select dbms_metadata.get_ddl('TABLE','INV') from dual;\n```\n\n以下是输出的片段：\n\
  \n```\nCREATE TABLE \"INV_MGMT\".\"INV\"\n(  \"INV_ID\" NUMBER,\n  \"INV_COUNT\"\
  \ NUMBER,\n  \"INV_STATUS\" VARCHAR2(11) GENERATED ALWAYS AS (CASE WHEN \"INV_COUNT\"\
  <=50 THEN\n'NEED MORE' WHEN (\"INV_COUNT\">50 AND \"INV_COUNT\"<=200) THEN 'GETTING\
  \ LOW' WHEN \"\nINV_COUNT\">200 THEN 'OKAY' END) VIRTUAL VISIBLE ...\n```\n\n###\
  \ 制作只读表\n\n从 Oracle Database 11g 开始，你可以将单个表置于只读模式。这样做可以防止任何`INSERT`、`UPDATE`或`DELETE`语句在表上运行。在\
  \ Oracle Database 11g 之前的版本中，使表只读的唯一方法是将整个数据库置于只读模式或将表空间置于只读模式（使表空间中的所有表变为只读）。\n\
  \n第 7 章 ■ 表与约束\n\n在表级别需要只读功能有几个原因：\n\n- 表中的数据是历史数据，在正常情况下不应更新。\n- 你正在对表进行一些维护，并希望确保在更新过程中它不会更改。\n\
  - 你想要删除该表，但在删除之前，你想将其置于只读模式，以更好地确定是否有任何用户正在尝试更新该表。\n\n使用`ALTER TABLE`语句将表置于只读模式：\n\
  \n```sql\nSQL> alter table inv read only;\n```\n\n你可以通过发出以下查询来验证只读表的状态：\n\n```sql\n\
  SQL> select table_name, read_only from user_tables where read_only='YES';\n```\n\
  \n要将只读表修改为读写，请发出以下 SQL：\n\n```sql\nSQL> alter table inv read write;\n```\n\n**注意：**\
  \ 只读表功能要求数据库初始化`COMPATIBLE`参数设置为 11.1.0 或更高。\n\n### 理解延迟段创建\n\n从 Oracle Database\
  \ 11g Release 2 开始，当你创建表时，关联段的创建会延迟到第一行插入表中。此功能有一些有趣的影响。例如，如果你有数千个最初为应用程序创建的对象（例如首次安装时），那么在数据插入应用程序表之前，任何表（或关联索引）都不会消耗空间。这意味着初始\
  \ DDL 在创建表时运行得更快，但第一个`INSERT`语句运行得稍慢。\n\n为了说明延迟段的概念，首先创建一个表：\n\n```sql\nSQL> create\
  \ table inv(inv_id number, inv_desc varchar2(30));\n```\n\n你可以通过检查`USER_TABLES`来验证表是否已创建：\n\
  \n```sql\nselect\n  table_name\n  ,segment_created\nfrom user_tables\nwhere table_name='INV';\n\
  ```\n\n以下是一些示例输出：\n\n```\nTABLE_NAME                     SEG\n------------------------------\
  \ ---\nINV                            NO\n```\n\n接下来，查询`USER_SEGMENTS`以验证尚未为此表分配段：\n\
  \n```sql\nselect\n  segment_name\n  ,segment_type\n  ,bytes\nfrom user_segments\n\
  where segment_name='INV'\nand segment_type='TABLE';\n```\n\n此示例的相应输出为：\n\n```\n\
  no rows selected\n```\n\n现在，向表中插入一行：\n\n```sql\nSQL> insert into inv values(1,'BOOK');\n\
  ```\n\n重新运行查询，从`USER_SEGMENTS`中选择，并注意已创建了一个段：\n\n```\nSEGMENT_NAME             \
  \      SEGMENT_TYPE       BYTES\n------------------------------ ------------------\
  \ ----------\nINV                            TABLE              65536\n```\n\n如果你习惯使用旧版本的\
  \ Oracle，延迟段创建功能可能会导致混淆。例如，如果你有查询`DBA_SEGMENTS`或`DBA_EXTENTS`的空间相关监控报告，请注意，在将第一行插入表之前，这些视图不会填充表或与表关联的任何索引的信息。\n\
  \n**注意：** 你可以通过将数据库初始化参数`DEFERRED_SEGMENT_CREATION`设置为`FALSE`来禁用延迟段创建功能。此参数的默认值为`TRUE`。\n\
  \n### 允许并行 SQL 执行\n\n如果你处理大表，可以考虑将表创建为`PARALLEL`。这指示 Oracle 为后续的任何`INSERT`、`UPDATE`、`DELETE`、`MERGE`和查询语句设置并行度。此示例创建了一个并行度为\
  \ 2 的表：\n\n```sql\ncreate table inv_apr_10\nparallel 2\nas select * from inv\nwhere\
  \ create_dtt >= '01-apr-10' and create_dtt < '01-may-10';\n```\n\n你可以指定`PARALLEL`、`NOPARALLEL`或`PARALLEL\
  \ N`。如果未指定`N`，Oracle 会根据`PARALLEL_THREADS_PER_CPU`初始化参数设置并行度。\n\n第 7 章 ■ 表与约束\n\n\
  **提示：** 请记住，`PARALLEL_THREADS_PER_CPU`在开发环境与生产环境之间可能有很大差异。你的开发机器可能只有 2 个 CPU，而生产服务器可能有\
  \ 32 个 CPU。因此，如果不指定并行度，并行操作的行为会因环境而异。\n\n### 压缩表数据\n\nOracle 的表压缩功能已经存在相当长一段时间。在\
  \ Oracle Database 11g 之前，可用的压缩仅适用于数据仓库环境，主要是因为表级压缩是 CPU 密集型的，并且会降低 DML 语句的性能。这种类型的压缩通常不适用于联机事务处理（OLTP）环境。\n\
  \n**注意：** OLTP 表压缩是 Oracle 高级压缩选项的一项功能。Oracle 高级压缩选项需要从 Oracle 获得额外许可。\n\n从 Oracle\
  \ Database 11g 开始，你可以这样做：\n\n```sql\ncreate table inv(\n  inv_id number\n  ,inv_name\
  \ varchar2(64)\n) compress for oltp;\n```\n\n`COMPRESS FOR OLTP`子句为所有 DML 操作启用压缩（在早期版本的\
  \ Oracle 中，压缩功能仅限于直接路径`INSERT`操作）。OLTP 压缩不会在数据插入和更新表时立即压缩数据。相反，当块达到某个内部定义的阈值时，压缩以批处理模式发生。当达到阈值时，所有未压缩的行会同时被压缩。发生压缩的阈值由内部算法确定。\n\
  \n**注意：** Oracle 还具有混合列压缩功能，可在 Oracle Exadata 产品中使用。有关更多详细信息，请参阅 Oracle 的技术网站（http://otn.oracle.com）。\n\
  \n第 7 章 ■ 表与约束\n\n你可以通过以下`SELECT`语句验证表的压缩情况：\n\n```sql\nselect\n  table_name\n \
  \ ,compression\n  ,compress_for\nfrom user_tables where table_name='INV';\n```\n\
  \n以下是一些示例输出：\n\n```\nTABLE_NAME                     COMPRESS COMPRESS_FOR\n------------------------------\
  \ -------- ------------\nINV                            ENABLED  OLTP\n```\n\n###\
  \ 避免重做日志生成\n\n创建表时，你可以选择指定`NOLOGGING`子句。`NOLOGGING`功能可以大大减少某些类型操作的重做日志生成量。有时，当你处理大量数据时，为了性能原因，在初始创建表并向表中插入数据时减少重做日志生成是可取的。\n\
  \n消除重做日志生成的缺点是，如果在数据加载后（并且在你可以备份表之前）发生故障，你无法通过`NOLOGGING`恢复创建的数据。如果你能容忍一些数据丢失的风险，那么使用`NOLOGGING`，但在数据加载后备份该表。如果你的数据很关键，那么不要使用`NOLOGGING`。如果你的数据可以轻松重新创建，那么在尝试提高大数据加载的性能时，`NOLOGGING`是可取的。\n\
  \n一种看法是`NOLOGGING`会为表的所有 DML 操作消除重做日志生成。这是不正确的。`NOLOGGING`功能从不影响常规 DML 语句（常规的`INSERT`、`UPDATE`和`DELETE`）的重做日志生成。\n\
  \n`NOLOGGING`功能可以显著减少以下类型操作的重做日志生成：\n\n- SQL*Loader 直接路径加载\n- 直接路径`INSERT /*+ append\
  \ */`\n- `CREATE TABLE AS SELECT`\n- `ALTER TABLE MOVE`\n- 创建或重建索引\n\n使用`NOLOGGING`时需要注意一些怪癖（特性）。如果你的数据库处于`FORCE\
  \ LOGGING`模式，则无论你是否指定`NOLOGGING`，都会为所有操作生成重做日志。\n\n加载表时，如果表定义了引用外键约束，则无论是否指定`NOLOGGING`，都会生成重做日志。\n\
  \n你可以在以下级别之一指定`NOLOGGING`：\n\n- 语句级：`CREATE TABLE`或`ALTER TABLE`\n- `CREATE TABLESPACE`或`ALTER\
  \ TABLESPACE`\n\n我更喜欢在语句或表级指定`NOLOGGING`子句。在这些情况下，执行该语句或 DDL 的 DBA 可以清楚地看到使用了`NOLOGGING`。如果你在表空间级别指定`NOLOGGING`，那么在该表空间内创建对象的每个\
  \ DBA 都必须知道此表空间级别的设置。\n\n在拥有多个 DBA 的团队中，一个 DBA 很容易不知道另一个 DBA 创建了带有`NOLOGGING`的表空间。\n\
  \n此示例首先使用`NOLOGGING`选项创建表：\n\n```sql\ncreate table inv(inv_id number)\ntablespace\
  \ users\nnologging;\n```\n\n接下来，通过从包含历史数据的表中进行选择来进行直接路径插入：\n\n```sql\nSQL> insert\
  \ /*+ append */ into inv select inv_id from inv_mar_2010;\nSQL> commit;\n```\n\n\
  如果在将表填充到`NOLOGGING`模式后（并且在你备份该表之前）发生介质故障，会发生什么情况？在恢复和恢复操作之后，看起来表已被恢复：\n\n```sql\n\
  SQL> desc inv\nName Null? Type\n----------------------------------------- --------\
  \ ----------------------------\nINV_ID NUMBER\n```\n\n但是，尝试执行扫描表中每个块的查询：\n\n```sql\n\
  SQL> select * from inv;\n```\n\n会抛出一个错误，指出数据文件中存在逻辑损坏：\n\n```\nORA-01578: ORACLE\
  \ data block corrupted (file # 4, block # 11057)\nORA-01110: data file 4: '/ora02/dbfile/O11R2/users01.dbf'\n\
  ORA-26040: Data block was loaded using the NOLOGGING option\n```\n\n如果在语句级别指定日志记录子句，它会覆盖任何表或表空间设置。如果在表级别指定日志记录子句，它将为任何未指定日志记录子句的语句设置默认模式，并覆盖表空间的日志记录设置。如果在表空间级别指定日志记录子句，它将为任何未指定日志记录子句的`CREATE\
  \ TABLE`语句设置默认日志记录。\n\n你可以如下验证数据库的日志记录模式：\n\n```sql\nSQL> select name, log_mode,\
  \ force_logging from v$database;\n```\n\n下一条语句验证表空间的日志记录模式：\n\n```sql\nSQL> select\
  \ tablespace_name, logging from dba_tablespaces;\n```\n\n此示例验证表的日志记录模式：\n\n```sql\n\
  SQL> select owner, table_name, logging from dba_tables where logging = 'NO';\n```\n\
  \n如何判断 Oracle 是否为操作记录了重做日志？一种方法是在启用日志记录与在`NOLOGGING`模式下操作时，测量操作生成的重做日志量。如果你有一个可以进行测试的开发环境，你可以在操作进行时监控重做日志切换的频率。另一个简单的测试是计时操作在启用和未启用日志记录时所需的时间。在`NOLOGGING`模式下执行的操作应该更快（因为生成的重做日志量最少）。\n\
  \n第 7 章 ■ 表与约束\n\n### 根据查询创建表\n\n有时根据现有表的定义创建表很方便。例如，假设你希望在修改表结构或数据之前快速备份表。使用`CREATE\
  \ TABLE AS SELECT`语句（通常称为 CTAS）来实现这一点。例如：\n\n```sql\ncreate table cwp_user_profile_101910\n\
  as select * from cwp_user_profile;\n```\n\n前面的语句创建了一个包含数据的相同表。如果你不希望包含数据，只希望复制表的结构，那么提供一个始终评估为\
  \ false 的`WHERE`子句（在此示例中，1 永远不等于 2）：\n\n```sql\ncreate table cwp_user_profile_test\n\
  as select * from cwp_user_profile\nwhere 1=2;\n```\n\n你还可以指定在创建 CTAS 表时不记录重做日志。对于大型数据集，这可以减少创建表所需的时间：\n\
  \n```sql\ncreate table cwp_user_profile_101910\nnologging\nas select * from cwp_user_profile;\n\
  ```\n\n请注意，使用带有`NOLOGGING`子句的 CTAS 技术会将表创建为`NOLOGGING`，并且不会生成恢复由`SELECT`语句结果填充数据所需的重做日志。此外，如果表空间被定义为`NOLOGGING`（CTAS\
  \ 表将在其中创建），则不会生成重做日志。在这些情况下，如果你无法在发生故障后备份表，则无法恢复表。如果你的数据很关键，那么不要使用`NOLOGGING`子句。\n\
  \n你还可以指定并行度和存储参数。根据 CPU 数量，你可能会看到一些性能提升：\n\n```sql\ncreate table cwp_user_profile_101910\n\
  nologging\ntablespace staging_data\nparallel 2\nas select * from cwp_user_profile_tab;\n\
  ```\n\n**注意：** CTAS 技术不会创建任何索引或触发器。如果你需要原始表的这些对象，则必须单独创建索引和触发器。\n\n## 修改表\n\n修改表是一项常见任务。新需求通常意味着你需要重命名、添加、删除或更改列数据类型。在开发环境中，更改表通常是一项微不足道的任务：你通常没有大量数据或数百个用户同时访问表。\n\
  \n但是，对于活跃的生产系统，你需要了解尝试更改当前正在被访问和/或已经填充数据的表所带来的影响。\n\n第 7 章 ■ 表与约束\n\n### 获取所需的锁\n\
  \n修改表时，必须具有对该表的排他锁。一个问题是，如果一个 DML 事务对该表持有锁，你将无法更改表。在这种情况下，你会收到此错误：\n\n```\nORA-00054:\
  \ resource busy and acquire with NOWAIT specified or timeout expired\n```\n\n前面的错误消息有点令人困惑，因为它让你认为可以通过使用`NOWAIT`获取锁来解决该问题。然而，这是一个通用消息，当你发出的\
  \ DDL 无法获取表的排他锁时生成。在这种情况下，你有几个选择：\n\n- 发出 DDL 命令并收到`ORA-00054`错误后，快速反复按`/`（正斜杠）键，希望在事务之间修改表。\n\
  - 关闭数据库并以受限模式启动，修改表，然后打开数据库以供正常使用。\n- 在 Oracle Database 11g 及更高版本中，设置`DDL_LOCK_TIMEOUT`参数。\n\
  \n前面列表中的最后一项指示 Oracle 重复尝试运行 DDL 语句，直到它获取表上所需的锁。你可以在系统或会话级别设置`DDL_LOCK_TIMEOUT`参数。下一个示例指示\
  \ Oracle 重试获取锁 100 秒：\n\n```sql\nSQL> alter session set ddl_lock_timeout=100;\n\
  ```\n\n系统级`DDL_LOCK_TIMEOUT`初始化参数的默认值为 0。如果你想修改系统中每个会话的默认行为，请发出`ALTER SYSTEM SET`语句。以下命令为系统设置默认超时值为\
  \ 10 秒：\n\n```sql\nSQL> alter system set ddl_lock_timeout=10 scope=both;\n```\n\n\
  ### 重命名表\n\n重命名表有几个原因：\n\n- 使表符合标准\n- 在删除表之前更好地确定表是否正在被使用\n\n此示例将表从`INV_MGMT`重命名为`INV_MGMT_OLD`：\n\
  \n```sql\nSQL> rename inv_mgmt to inv_mgmt_old;\n```\n\n如果成功，你应该看到此消息：\n\n```\n\
  Table renamed.\n```\n\n### 添加列\n\n使用`ALTER TABLE ... ADD`语句向表添加列。此示例向`INV`表添加一列：\n\
  \n```sql\nSQL> alter table inv add(inv_count number);\n```\n\n如果成功，你应该看到此消息：\n\n\
  第 7 章 ■ 表与约束\n\n```\nTable altered.\n```\n\n### 更改列\n\n有时，你需要更改列以调整其大小或更改其数据类型。使用`ALTER\
  \ TABLE ... MODIFY`语句调整列的大小。此示例将列的大小更改为 256 个字符：\n\n```sql\nSQL> alter table inv\
  \ modify inv_desc varchar2(256);\n```\n\n如果要减小列的大小，请首先确保不存在大于减小后的大小值的值：\n\n```sql\n\
  SQL> select max(length(<column_name>)) from <table_name>;\n```\n\n当你将列更改为`NOT NULL`时，则每列必须具有有效值。首先，验证没有`NULL`值：\n\
  \n```sql\nSQL> select <column_name> from <table_name> where <column_name> is null;\n\
  ```\n\n如果任何行在你修改为`NOT NULL`的列中具有`NULL`值，则必须首先更新该列以包含值。以下是将列修改为`NOT NULL`的示例：\n\n\
  ```sql\nSQL> alter table inv modify(inv_desc not null);\n```\n\n你也可以将列更改为具有默认值。当向表中插入记录但未为列提供值时，将使用默认值：\n\
  \n```sql\nSQL> alter table inv modify(inv_desc default 'No Desc');\n```\n\n如果要删除列的默认值，则将其设置为`NULL`：\n\
  \n```sql\nSQL> alter table inv modify(inv_desc default NULL);\n```\n\n有时你需要更改表的数据类型：例如，原本错误地定义为`VARCHAR2`的列需要更改为`NUMBER`。在更改列的数据类型之前，首先验证现有列的所有值是否仅包含有效的数字值。以下是一个简单的\
  \ PL/SQL 脚本来执行此操作：\n\n```sql\ncreate or replace function isnum(v_in varchar2)\n\
  return varchar is\n  val_err exception;\n  pragma exception_init(val_err, -6502);\
  \ -- 字符到数字转换错误\n  scrub_num number;\nbegin\n  scrub_num := to_number(v_in);\n  return\
  \ 'Y';\nexception\n  when val_err then\n    return 'N';\nend;\n/\n```\n\n你可以使用`ISNUM`函数检测列中的数据是否为数字。该函数为`ORA-06502`字符到数字转换错误定义了一个\
  \ PL/SQL pragma 异常。当遇到此错误时，异常处理程序捕获它并返回`N`。如果传递给`ISNUM`函数的值是数字，则返回`Y`。如果该值无法转换为数字，则返回`N`。定义函数后，你可以如下运行它：\n\
  \n148\n\n第 7 章 ■ 表与约束\n\n```sql\nSQL> select hold_col from stage where isnum(hold_col)='N';\n\
  ```\n\n同样，当你将字符列修改为`DATE`或`TIMESTAMP`数据类型时，首先检查数据是否可以成功转换是谨慎的做法。以下是一个执行此操作的函数：\n\
  \n```sql\ncreate or replace function isdate(p_in varchar2, f_in varchar2)\nreturn\
  \ varchar is\n  scrub_dt date;\nbegin\n  scrub_dt := to_date(p_in, f_in);\n  return\
  \ 'Y';\nexception\n  when others then\n    return 'N';\nend;\n/\n```\n\n调用`ISDATE`函数时，需要传递一个有效的日期格式掩码：\n\
  \n```sql\nSQL> select hold_col from stage where isdate(hold_col,'YYYYMMDD')='N';\n\
  ```\n\n### 重命名列\n\n重命名列有几个原因：\n\n- 有时需求发生变化，你希望修改列名以更好地反映该列的用途。\n- 如果你计划删除列，首先重命名该列以更好地确定是否有任何用户或应用程序正在访问该列，这并无害处。\n\
  \n使用`ALTER TABLE ... RENAME`语句重命名列：\n\n```sql\nSQL> alter table inv rename column\
  \ inv_count to inv_amt;\n```\n\n### 删除列\n\n表有时最终会包含从未使用过的列。这可能是因为最初的需求发生变化或不准确。如果你的表包含未使用的列，你应该考虑删除它。如果在表中保留未使用的列，你可能会遇到未来的\
  \ DBA 不知道该列用途的问题，并且该列可能会不必要地消耗空间。\n\n在删除列之前，我建议你首先重命名它。这样做让你有机会发现是否有任何用户或应用程序正在使用该列。在你确信该列未被使用后，首先使用\
  \ Data Pump 导出备份表，然后删除该列。\n\n前面的策略为你提供了如果删除列后又意识到需要它时的选择。\n\n要删除列，请使用`ALTER TABLE\
  \ ... DROP`语句：\n\n```sql\nSQL> alter table inv drop (inv_name);\n```\n\n请注意，如果从中删除列的表包含大量数据，`DROP`操作可能需要一些时间。这种时间延迟可能导致在表被修改期间事务被延迟（因为`ALTER\
  \ TABLE`语句会锁定表）。在类似情况下，你可能希望首先将列标记为未使用，然后在维护窗口期间再删除它：\n\n第 7 章 ■ 表与约束\n\n```sql\n\
  SQL> alter table inv set unused (inv_name);\n```\n\n将列标记为未使用后，它不再出现在表描述中。`SET UNUSED`子句不会产生与删除列相关的开销。此技术使你可以快速停止\
  \ SQL 查询或应用程序看到或使用该列。任何尝试访问未使用列的查询都会收到以下错误：\n\n```\nORA-00904: ... invalid identifier\n\
  ```\n\n你可以在为应用程序安排一些停机时间后删除任何未使用的列。\n\n使用`DROP UNUSED`子句删除任何标记为`UNUSED`的列。\n\n```sql\n\
  SQL> alter table inv drop unused columns;\n```\n\n### 显示表 DDL\n\n有时 DBA 在记录创建或修改表时使用的\
  \ DDL 方面做得不好。通常，你应该在源代码控制存储库或某种建模工具中维护数据库 DDL 代码。如果你的商店没有 DDL 源代码，那么有几种方法可以手动重现\
  \ DDL：\n\n- 查询数据字典\n- 使用`exp`和`imp`实用程序\n- 使用 Data Pump\n- 使用`DBMS_METADATA`包\n\n\
  在早期版本中，例如版本 7 及更早版本，DBA 通常编写查询数据字典的 SQL，以尝试提取重新创建对象所需的 DDL。尽管这种方法比没有好，但它通常容易出错，因为\
  \ SQL 没有考虑每个对象创建特性。\n\n`exp`和`imp`实用程序对于生成 DDL 很有用。基本思想是导出有问题的对象，然后使用带有`SCRIPT`或`SHOW`选项的`imp`实用程序来显示\
  \ DDL。这是一个好方法，但你通常必须手动编辑`imp`实用程序的输出以生成所需的 DDL。\n\nData Pump 实用程序是生成用于创建数据库对象的 DDL\
  \ 的绝佳方法。使用 Data Pump 生成 DDL 在第 13 章中有详细介绍。\n\n`DBMS_METADATA`包的`GET_DDL`函数通常是显示创建对象所需\
  \ DDL 的最快方法。此示例显示如何生成名为`INV`的表的 DDL：\n\n```sql\nSQL> set long 10000\nSQL> select\
  \ dbms_metadata.get_ddl('TABLE','INV') from dual;\n```\n\n以下是一些示例输出：\n\n```\nDBMS_METADATA.GET_DDL('TABLE','INV')\n\
  --------------------------------------------------------------------------------\n\
  CREATE TABLE \"DARL\".\"INV\"\n(  \"INV_ID\" NUMBER,\n  \"INV_DESC\" VARCHAR2(30),\n\
  \  \"INV_COUNT\" NUMBER\n) SEGMENT CREATION DEFERRED\n  PCTFREE 10 PCTUSED 40 INITRANS\
  \ 1 MAXTRANS 255 NOCOMPRESS LOGGING\n  TABLESPACE \"USERS\"\n```\n\n以下 SQL 语句显示模式中所有表的\
  \ DDL：\n\n```sql\nselect\n  dbms_metadata.get_ddl('TABLE',table_name)\nfrom user_tables;\n\
  ```\n\n如果你想显示另一个用户拥有的表的 DDL，请向`GET_DDL`过程添加`SCHEMA`参数。\n\n```sql\nselect\n  dbms_metadata.get_ddl(object_type=>'TABLE',\
  \ name=>'INVENTORY', schema=>'INV_APP') from dual;\n```\n\n**注意：** 你可以显示几乎所有数据库对象类型的\
  \ DDL，例如`INDEX`、`FUNCTION`、`ROLE`、`PACKAGE`、`MATERIALIZED VIEW`、`PROFILE`、`CONSTRAINT`、`SEQUENCE`、`SYNONYM`等。\n\
  \n## 删除表\n\n如果要从用户中删除对象（例如表），请使用`DROP TABLE`语句。此示例删除名为`INVENTORY`的表：\n\n```sql\n\
  SQL> drop table inventory;\n```\n\n你应该看到以下确认信息：\n\n```\nTable dropped.\n```\n\n\
  如果你尝试删除在子表中被引用为主键或唯一键的父表，你会看到如下错误\n\n```\nORA-02449: unique/primary keys in table\
  \ referenced by foreign keys\n```\n\n你需要删除引用的外键约束，或者在删除父表时使用`CASCADE CONSTRAINTS`选项：\n\
  \n```sql\nSQL> drop table inventory cascade constraints;\n```\n\n你必须是表的所有者或具有`DROP\
  \ ANY TABLE`系统权限才能删除表。如果你具有`DROP ANY TABLE`权限，则可以通过在表名前加上模式名来删除不同模式中的表：\n\n```sql\n\
  SQL> drop table inv_mgmt.inventory;\n```\n\n如果你不在表名前加上用户名，Oracle 会假定你正在删除当前用户中的表。\n\
  \n**提示：** 如果你使用的是 Oracle Database 10g 或更高版本，请记住可以取消删除意外删除的表。\n\n第 7 章 ■ 表与约束\n\n\
  ### 取消删除表\n\n假设你意外删除了一个表，并且想要恢复它。首先，验证要恢复的表是否在回收站中：\n\n```sql\nSQL> show recyclebin;\n\
  ```\n\n以下是一些示例输出：\n\n```\nORIGINAL NAME    RECYCLEBIN NAME                OBJECT\
  \ TYPE  DROP TIME\n---------------- ------------------------------ ------------\
  \ -------------------\nPURCHASES        BIN$YzqK0hN3Fh/gQHdAPLFgMA==$0 TABLE   \
  \    2009-02-18:17:23:15\n```\n\n接下来，使用`FLASHBACK TABLE...TO BEFORE DROP`语句恢复已删除的表：\n\
  \n```sql\nSQL> flashback table purchases to before drop;\n```\n\n**注意：** 你不能对在`SYSTEM`表空间中创建的表执行`FLASHBACK\
  \ TABLE...TO BEFORE DROP`。\n\n在 Oracle Database 10g 及更高版本中，当你发出`DROP TABLE`语句时，表会被重命名为（以`BIN$`开头的名称）并放入回收站。回收站是一种机制，允许你查看与已删除对象关联的一些元数据。你可以通过查询`DBA_SEGMENTS`查看有关重命名对象的完整元数据：\n\
  \n```sql\nselect\n  owner\n  ,segment_name\n  ,segment_type\n  ,tablespace_name\n\
  from dba_segments\nwhere segment_name like 'BIN$%';\n```\n\n以下是一些示例输出：\n\n```\n\
  OWNER      SEGMENT_NAME                   SEGMENT_TYPE       TABLESPACE_NAME\n----------\
  \ ------------------------------ ------------------ ---------------\nINV       \
  \ BIN$kptXkzzMdFrgQAB/AQBsFw==$0 TABLE              USERS\nINV        BIN$kptXkzzNdFrgQAB/AQBsFw==$0\
  \ TABLE              USERS\n```\n\n`FLASHBACK TABLE`语句只是将表重命名回其原始名称。默认情况下，`RECYCLEBIN`功能在\
  \ Oracle Database 10g 及更高版本中启用。你可以通过将`RECYCLEBIN`初始化参数设置为`OFF`来更改默认值。\n\n我建议你不要禁用`RECYCLEBIN`功能。最好保持此功能启用，并清除`RECYCLEBIN`以删除你希望永久删除的对象。这意味着与已删除表关联的空间在清除`RECYCLEBIN`之前不会被释放。如果你想清除当前连接用户的回收站的全部内容，请使用`PURGE\
  \ RECYCLEBIN`语句：\n\n```sql\nSQL> purge recyclebin;\n```\n\n如果你想清除数据库中所有用户的回收站，请以具有\
  \ DBA 权限的用户身份执行以下操作：\n\n```sql\nSQL> purge dba_recyclebin;\n```\n\n第 7 章 ■ 表与约束\n\
  \n如果你想绕过`RECYCLEBIN`功能并永久删除表，请使用`DROP TABLE`语句的`PURGE`选项：\n\n```sql\nSQL> drop table\
  \ dept purge;\n```\n\n你无法使用`FLASHBACK TABLE`语句检索使用`PURGE`选项删除的表。表使用的所有空间都会被释放，任何关联的索引和触发器也会被删除。\n\
  \n### 从表中删除数据\n\n你可以使用`DELETE`语句或`TRUNCATE`语句从表中删除记录。你需要意识到这两种方法之间的一些重要区别。表 7–3\
  \ 总结了`DELETE`和`TRUNCATE`语句的属性。\n\n***表 7–3.** `DELETE`和`TRUNCATE`的特性*\n\n| **特性**\
  \                             | **DELETE** | **TRUNCATE** |\n| :-----------------------------------\
  \ | :--------- | :----------- |\n| 选择`COMMIT`或`ROLLBACK`             | 是       \
  \  | 否           |\n| 生成撤销（undo）                     | 是         | 否           |\n\
  | 将高水位线重置为零                   | 否         | 是           |\n| 受引用和启用的外键约束影响     \
  \      | 否         | 是           |\n| 处理大量数据时的性能表现             | 差         | 优 \
  \          |\n\n#### 使用`DELETE`\n\n一个很大的区别是`DELETE`语句可以提交（commit）或回滚（rollback）。提交`DELETE`语句会使更改永久化：\n\
  \n```sql\nSQL> delete from inv;\nSQL> commit;\n```\n\n如果你发出`ROLLBACK`语句而不是`COMMIT`，则表包含发出`DELETE`之前的数据。\n\
  \n#### 使用`TRUNCATE`\n\n`TRUNCATE`是一条 DDL 语句。这意味着 Oracle 在它运行后自动提交该语句（和当前事务），因此无法回滚`TRUNCATE`语句。如果你需要在删除数据时选择回滚（而不是提交）的选项，则应使用`DELETE`语句。然而，`DELETE`语句的缺点是它会生成大量的撤销（undo）和重做（redo）信息。因此对于大表来说，`TRUNCATE`语句通常是删除数据最有效的方式。\n\
  \n第 7 章 ■ 表与约束\n\n此示例使用`TRUNCATE`语句从`COMPUTER_SYSTEMS`表中删除所有数据：\n\n```sql\nSQL>\
  \ truncate table computer_systems;\n```\n\n默认情况下，Oracle 会释放表使用的所有空间，除了由`MINEXTENTS`表存储参数定义的空间。如果你不希望`TRUNCATE`语句释放区，请使用`REUSE\
  \ STORAGE`参数：\n\n```sql\nSQL> truncate table computer_systems reuse storage;\n```\n\
  \n`TRUNCATE`语句将表的高水位线重置为零。当你使用`DELETE`语句从表中删除数据时，高水位线不会改变。使用`TRUNCATE`语句并重置高水位线的一个优点是，全表扫描只搜索高水位线以下的块中的行。这可能对性能产生重大影响。\n\
  \n你无法截断一个定义了主键且被子表中启用的外键约束引用的表——即使子表包含零行。Oracle 阻止你这样做，因为在多用户系统中，存在另一种会话可能在你截断子表之后、截断父表之前向子表填充行的可能性。在这种情况下，你必须暂时禁用引用的外键约束，发出`TRUNCATE`语句，然后重新启用约束。\n\
  \n由于`TRUNCATE`语句是 DDL，你不能将两个独立的表的截断作为一个事务处理。\n\n将此`TRUNCATE`行为与`DELETE`进行比较。Oracle\
  \ 确实允许你使用`DELETE`语句从父表中删除行，同时约束保持启用状态以引用子表。这是因为`DELETE`生成撤销（undo），是读一致的，并且可以回滚。\n\
  \n**注意：** 从表中删除数据的另一种方法是删除并重新创建表。然而，这意味着你还必须重新创建属于该表的任何索引、约束、授权和触发器。此外，当你删除表时，在重新创建它和重新发出任何所需的授权之前，它暂时不可用。通常，删除并重新创建表仅在开发或测试环境中可以接受。\n\
  \n### 查看和调整高水位线\n\nOracle 将表的高水位线定义为段中已使用空间和未使用空间之间的边界。创建表时，Oracle 会向表分配一定数量的区，该数量由`MINEXTENTS`表存储参数定义。每个区包含一定数量的块。在数据插入表之前，没有块被使用，高水位线为零。\n\
  \n随着数据插入到表中，随着区的分配，高水位线边界会升高。`DELETE`语句不会重置高水位线。\n\n关于高水位线，你需要意识到几个与性能相关的问题：\n\n\
  - SQL 查询全表扫描\n- 直接路径加载空间使用\n\nOracle 在执行查询时有时需要扫描表（在高水位线以下）的每个块。这被称为*全表扫描*。如果从表中删除了大量数据，即使是对于零行的表，全表扫描也可能需要很长时间才能完成。\n\
  \n第 7 章 ■ 表与约束\n\n此外，在进行直接路径加载时，Oracle 会在高水位线之上插入数据。潜在地，你最终可能会在经常删除并通过直接路径机制加载的表中出现大量未使用的空间。\n\
  \n你可以使用几种方法来检测高水位线以下的空间：\n\n- Autotrace 工具\n- `DBMS_SPACE`包\n\nAutotrace 工具提供了一种检测高水位线问题的简单方法。Autotrace\
  \ 的优势在于它易于使用且输出易于解释。\n\n你可以使用`DBMS_SPACE`包来确定在使用自动空间段管理的表空间中创建的对象的高水位线。`DBMS_SPACE`允许你以编程方式检查高水位线问题。这种方法的缺点是输出有些晦涩，有时难以得出具体的答案。\n\
  \n#### 跟踪检测高水位线以下的空间\n\n你可以运行这个简单的测试来检测高水位线以下未使用的空间是否存在问题：\n\n1.  `SQL> set autotrace\
  \ trace statistics`\n2.  运行执行全表扫描的查询。\n3.  比较处理的行数与逻辑 I/O（内存和磁盘访问）次数。\n\n如果处理的行数少但逻辑\
  \ I/O 次数高，则高水位线以下可能存在空闲块问题。以下是一个说明此技术的简单示例：\n\n```sql\nSQL> set autotrace trace\
  \ statistics\n```\n\n下一个查询在`INV`表上生成全表扫描：\n\n```sql\nSQL> select * from inv;\n```\n\
  \n以下是 AUTOTRACE 输出的片段：\n\n```\nno rows selected\n\nStatistics\n----------------------------------------------------------\n\
  \       1405  consistent gets\n          0  physical reads\n```\n\n返回的行数为零，但一致性读（内存访问）为\
  \ 1405。这表明高水位线下有空闲空间。\n\n接下来，截断该表并再次运行查询：\n\n```sql\nSQL> truncate table inv;\n\
  SQL> select * from inv;\n```\n\n以下是 AUTOTRACE 输出的片段：\n\n```\nno rows selected\n\n\
  Statistics\n----------------------------------------------------------\n       \
  \   3  consistent gets\n          0  physical reads\n```\n\n注意，内存访问次数已减少到 3。\n\n\
  #### 使用`DBMS_SPACE`检测高水位线以下的空间\n\n你可以使用`DBMS_SPACE`包来检测高水位线以下的空闲块。以下是一个可以从 SQL*Plus\
  \ 调用的匿名 PL/SQL 块：\n\n```sql\nset serverout on size 1000000\ndeclare\n  p_fs1_bytes\
  \ number;\n  p_fs2_bytes number;\n  p_fs3_bytes number;\n  p_fs4_bytes number;\n\
  \  p_fs1_blocks number;\n  p_fs2_blocks number;\n  p_fs3_blocks number;\n  p_fs4_blocks\
  \ number;\n  p_full_bytes number;\n  p_full_blocks number;\n  p_unformatted_bytes\
  \ number;\n  p_unformatted_blocks number;\nbegin\n  dbms_space.space_usage(\n  \
  \  segment_owner => user,\n    segment_name => 'INV',\n    segment_type => 'TABLE',\n\
  \    fs1_bytes => p_fs1_bytes,\n    fs1_blocks => p_fs1_blocks,\n    fs2_bytes =>\
  \ p_fs2_bytes,\n    fs2_blocks => p_fs2_blocks,\n    fs3_bytes => p_fs3_bytes,\n\
  \    fs3_blocks => p_fs3_blocks,\n    fs4_bytes => p_fs4_bytes,\n    fs4_blocks\
  \ => p_fs4_blocks,\n    full_bytes => p_full_bytes,\n    full_blocks => p_full_blocks,\n\
  \    unformatted_blocks => p_unformatted_blocks,\n    unformatted_bytes => p_unformatted_bytes\n\
  \  );\n  dbms_output.put_line('FS1: blocks = '||p_fs1_blocks);\n  dbms_output.put_line('FS2:\
  \ blocks = '||p_fs2_blocks);\n  dbms_output.put_line('FS3: blocks = '||p_fs3_blocks);\n\
  \  dbms_output.put_line('FS4: blocks = '||p_fs4_blocks);\n  dbms_output.put_line('Full\
  \ blocks = '||p_full_blocks);\nend;\n/\n```\n\n第 7 章 ■ 表与约束\n\n在这种情况下，你要检查`INV`表高水位线以下的空闲空间。以下是前面\
  \ PL/SQL 的输出：\n\n```\nFS1: blocks = 0\nFS2: blocks = 0\nFS3: blocks = 0\nFS4: blocks\
  \ = 1394\nFull blocks = 0\n```\n\n在之前的输出中，`FS1`参数显示有 0 个块具有 0%到 25%的空闲空间。`FS2`参数显示有\
  \ 0 个块具有 25%到 50%的空闲空间。`FS3`参数显示有 0 个块具有 50%到 75%的空闲空间。`FS4`参数显示有 1394 个块具有 75%到\
  \ 100%的空闲空间。\n\n最后，有 0 个满块。因为没有满块，并且大量块几乎是空的，这表明高水位线以下存在空闲空间。\n\n如何降低表的高水位线？你可以使用几种技术将高水位线重置回零：\n\
  \n- 使用`TRUNCATE`语句\n- 使用`ALTER TABLE ... SHRINK SPACE`\n- 使用`ALTER TABLE ... MOVE`\n\
  \n本章前面讨论了使用`TRUNCATE`语句。缩小表和移动表将在以下小节中讨论。\n\n### 缩小表\n\n要重新调整高水位线，你必须为表启用行移动，然后使用`ALTER\
  \ TABLE...SHRINK SPACE`语句。创建表的表空间必须构建时启用了自动段空间管理。你可以通过以下查询确定表空间空间段管理类型：\n\n```sql\n\
  SQL> select tablespace_name, segment_space_management from dba_tablespaces;\n```\n\
  \n创建表的表空间的`SEGMENT_SPACE_MANAGEMENT`值必须为`AUTO`。\n\n接下来，你需要为要缩小的表启用行移动。此示例为`INV`表启用行移动：\n\
  \n```sql\nSQL> alter table inv enable row movement;\n```\n\n现在你可以缩小表使用的空间：\n\n```sql\n\
  SQL> alter table inv shrink space;\n```\n\n你也可以通过`CASCADE`子句缩小与任何索引段相关的空间：\n\n```sql\n\
  SQL> alter table inv shrink space cascade;\n```\n\n如果由于某些原因，你不希望在缩小表时移动高水位线，请使用`COMPACT`子句：\n\
  \n```sql\nSQL> alter table inv shrink space compact;\n```\n\n![](img/index-192_1.png)\n\
  \n第 7 章 ■ 表与约束\n\n以下是一些示例输出：\n\n```\nROWID              EMP_ID\n------------------\
  \ ----------\nAAAFWXAAFAAAAlWAAA 1\n```\n\n`ROWID`伪列值并不物理存储在数据库中。当你查询它时，Oracle 会计算其值。`ROWID`内容显示为可以包含字符\
  \ A–Z、a–z、0–9、+和/的 base 64 值。你可以通过`DMBS_ROWID`包将`ROWID`值转换为有意义的信息。例如，要显示存储行的相对文件号，请发出此语句：\n\
  \n```sql\nSQL> select dbms_rowid.rowid_relative_fno(rowid), emp_id from emp;\n```\n\
  \n以下是一些示例输出：\n\n```\nDBMS_ROWID.ROWID_RELATIVE_FNO(ROWID) EMP_ID\n------------------------------------\
  \ ----------\n5                                    1\n```\n\n你可以在 SQL 语句的`SELECT`和`WHERE`子句中使用`ROWID`值。在大多数情况下，`ROWID`唯一标识一行。但是，不同表中的行可能存储在同一簇中，因此包含具有相同`ROWID`的行。\n\
  \n## 创建临时表\n\n使用`CREATE GLOBAL TEMPORARY TABLE`语句创建仅临时存储数据的表。你可以指定临时表是在会话期间还是在事务提交前保留数据。使用`ON\
  \ COMMIT PRESERVE ROWS`指定数据在用户会话结束时删除。在此示例中，行将被保留，直到用户显式删除数据或终止会话：\n\n```sql\ncreate\
  \ global temporary table today_regs\non commit preserve rows\nas select * from f_registrations\n\
  where create_dtt > sysdate - 1;\n```\n\n指定`ON COMMIT DELETE ROWS`表示数据应在事务结束时删除。以下示例创建一个名为`TEMP_OUTPUT`的临时表，并指定记录应在每个提交的事务结束时删除：\n\
  \n```sql\ncreate global temporary table temp_output(\n  temp_row varchar2(30))\n\
  on commit delete rows;\n```\n\n**注意：** 如果你没有为全局临时表指定提交方法，则默认为`ON COMMIT DELETE ROWS`。\n\
  \n![](img/index-194_1.png)\n\n第 7 章 ■ 表与约束\n\n## 创建索引组织表\n\n当表数据通常通过查询主键访问时，索引组织表（IOT）是高效的对象。使用`ORGANIZATION\
  \ INDEX`子句创建 IOT：\n\n```sql\ncreate table prod_sku\n(prod_sku_id number,\n sku varchar2(256),\n\
  \ create_dtt timestamp(5),\n constraint prod_sku_pk primary key(prod_sku_id)\n)\n\
  organization index\nincluding sku\npctthreshold 30\ntablespace inv_mgmt_data\noverflow\n\
  tablespace mts;\n```\n\nIOT 将表行的整个内容存储在 B 树索引结构中。IOT 为在主键上具有精确匹配和/或范围搜索的查询提供快速访问。\n\
  \n`INCLUDING`子句中指定的列（包括该列）之前的所有列都与`PROD_SKU_ID`主键列存储在同一个块中。换句话说，`INCLUDING`子句指定保留在表段中的最后一列。`INCLUDING`子句中指定列之后的列存储在溢出数据段中。在前面的示例中，`CREATE_DTT`列存储在溢出段中。\n\
  \n`PCTTHRESHOLD`指定为 IOT 行保留在索引块中的空间百分比。该值可以是 1 到 50，如果未指定值，则默认为 50。索引块中必须有足够空间来存储主键。\n\
  \n`OVERFLOW`子句详细说明了应使用哪个表空间来存储溢出数据段。\n\n注意，`DBA/ALL/USER_TABLES`包含创建 IOT 时使用的表名的条目。此外，`DBA/ALL/USER_INDEXES`包含指定主键约束名称的记录。对于\
  \ IOT，`INDEX_TYPE`列包含`IOT - TOP`值：\n\n```sql\nSQL> select index_name,table_name,index_type\
  \ from user_indexes;\n```\n\n## 管理约束\n\n本章接下来的几节将讨论约束。约束提供了一种确保数据符合某些业务规则的机制。你必须了解可用的约束类型以及何时适合使用它们。Oracle\
  \ 提供了几种类型的约束：\n\n- 主键\n- 唯一键\n- 外键\n- 检查\n- `NOT NULL`\n\n实现和管理这些约束将在接下来的几个小节中讨论。\n\
  \n第 7 章 ■ 表与约束\n\n### 创建主键约束\n\n实现数据库时，你创建的大多数表都需要主键约束，以保证表中的每条记录都可以唯一标识。有多种技术可以向表添加主键约束。第一个示例在列定义中内联创建主键：\n\
  \n```sql\ncreate table dept(\n  dept_id number primary key\n  ,dept_desc varchar2(30));\n\
  ```\n\n如果你从`USER_CONSTRAINTS`中选择`CONSTRAINT_NAME`，注意 Oracle 为约束生成了一个晦涩的名称（如`SYS_C003682`）。使用以下语法显式为主键约束命名：\n\
  \n```sql\ncreate table dept(\n  dept_id number constraint dept_pk primary key using\
  \ index tablespace users,\n  dept_desc varchar2(30));\n```\n\n**注意：** 创建主键约束时，Oracle\
  \ 还会创建一个与该约束同名的唯一索引。\n\n你也可以在定义列之后指定主键约束定义。这样做的好处是可以在多个列上定义约束。下一个示例在创建表时创建主键，但不在列定义中内联：\n\
  \n```sql\ncreate table dept(\n  dept_id number,\n  dept_desc varchar2(30),\n  constraint\
  \ dept_pk primary key (dept_id)\n    using index tablespace prod_index);\n```\n\n\
  如果表已创建，并且你想添加主键约束，请使用`ALTER TABLE`语句。此示例在`DEPT`表的`DEPT_ID`列上放置主键约束：\n\n```sql\n\
  alter table dept\nadd constraint dept_pk primary key (dept_id)\nusing index tablespace\
  \ users;\n```\n\n启用主键约束时，Oracle 会自动创建一个与主键约束关联的唯一索引。一些 DBA 更喜欢首先在主键列上创建一个非唯一索引，然后定义主键约束：\n\
  \n```sql\nSQL> create index dept_pk on dept(dept_id);\nSQL> alter table dept add\
  \ constraint dept_pk primary key (dept_id);\n```\n\n这种方法的好处是，你可以独立于索引删除或禁用主键约束。当你处理大型数据集时，你可能需要那种灵活性。如果你在创建主键约束之前没有创建索引，那么每当你删除或禁用主键约束时，索引会自动被删除。\n\
  \n第 7 章 ■ 表与约束\n\n对使用哪种方法创建主键感到困惑？所有方法都有效且有其优点。表 7–4 总结了主键和唯一键约束创建方法。我使用过所有这些方法来创建主键约束。通常，我使用`ALTER\
  \ TABLE`语句在表创建后添加约束。\n\n***表 7–4.** 主键和唯一键约束创建方法*\n\n| **约束创建方法**              \
  \        | **优点**                                                              \
  \   | **缺点**                                                                   \
  \                           |\n| :------------------------------------ | :-----------------------------------------------------------------------\
  \ | :----------------------------------------------------------------------------------------------------\
  \ |\n| 内联，无名称                          | 非常简单                                  \
  \                               | Oracle 生成的名称使故障排除更困难；对存储属性的控制较少；仅应用于单列       \
  \                           |\n| 内联，有名称                          | 简单；用户定义的名称使故障排除更容易\
  \                                     | 比内联无名称需要更多思考                           \
  \                                                   |\n| 内联，有名称和表空间定义          \
  \    | 用户定义的名称和表空间；使故障排除更容易                                 | 较不简单             \
  \                                                                              \
  \   |\n| 在列定义之后（外联）                  | 用户定义的名称和表空间；可以在多个列上操作                   \
  \            | 较不简单                                                            \
  \                                  |\n| `ALTER TABLE` 仅添加约束              | 允许你将约束与表创建脚本分开管理（和文件）；可以在多个列上操作\
  \           | 更复杂                                                              \
  \                                  |\n| `CREATE INDEX`, `ALTER TABLE` 添加约束 | 将索引和约束分开，因此可以在不影响索引的情况下删除/禁用约束；可以在多个列上操作\
  \ | 最复杂，需要维护的内容更多，需要移动的部分更多                                                    \
  \    |\n\n### 强制唯一键值\n\n除了创建主键约束外，你还应该在任何应始终在表中唯一的列组合上创建唯一约束。例如，对于表的主键，通常使用通过序列填充的数字键（有时称为*代理键*）。除了代理主键之外，有时用户有业务用于唯一标识记录的列（也称为*逻辑键*）。同时使用代理键和逻辑键\n\
  \n- 允许你在单个数字列上高效地连接父表和子表\n- 允许更新逻辑键列而无需更改代理键\n\n唯一键保证表中定义列的唯一性。主键约束和唯一键约束之间存在一些细微差别。例如，每个表只能定义一个主键，但可以有多个唯一键。此外，主键不允许其任何列中出现`NULL`值，而唯一键允许`NULL`值。\n\
  \n163\n\n第 7 章 ■ 表与约束\n\n与主键约束一样，你可以使用多种方法来创建唯一列约束。此方法在列中内联使用`UNIQUE`关键字：\n\n```sql\n\
  create table dept(\n  dept_id number\n  ,dept_desc varchar2(30) unique);\n```\n\n\
  如果要显式命名约束，请使用`CONSTRAINT`关键字：\n\n```sql\ncreate table dept(\n  dept_id number\n\
  \  ,dept_desc varchar2(30) constraint dept_desc_uk1 unique);\n```\n\n与主键一样，Oracle\
  \ 会自动创建一个与唯一键约束关联的索引。你可以在内联指定用于关联唯一索引的表空间信息：\n\n```sql\ncreate table dept(\n  dept_id\
  \ number\n  ,dept_desc varchar2(30) constraint dept_desc_uk1\n    unique using index\
  \ tablespace prod_index);\n```\n\n你也可以修改表以包含唯一约束：\n\n```sql\nSQL> alter table dept\
  \ add constraint dept_desc_uk1 unique (dept_desc);\n```\n\n并且你可以在定义唯一键约束之前，在感兴趣的列上创建索引：\n\
  \n```sql\nSQL> create index dept_desc_uk1 on dept(dept_desc);\nSQL> alter table\
  \ dept add constraint dept_desc_uk1 unique(dept_desc);\n```\n\n这在处理大型数据集并且希望能够在不删除关联索引的情况下禁用或删除唯一约束时很有帮助。\n\
  \n**注意：** 有关各种唯一键和主键约束创建方法的优缺点描述，请参见表 7–4。\n\n### 创建外键约束\n\n外键约束用于确保列值包含在定义的值列表中。使用外键约束是强制数据在允许插入或更新之前必须是预定义值的有效方法。此技术适用于以下情况：\n\
  \n- 值列表包含许多条目。\n- 需要存储有关查找值的其他信息。\n- 通过 SQL 可以轻松选择、插入、更新或删除值。\n\n例如，假设`EMP`表是使用`DEPT_ID`列创建的。为确保每个员工都被分配到一个有效的部门，你可以创建一个外键约束，强制执行`EMP`表中的每个`DEPT_ID`必须存在于`DEPT`表中的规则。\n\
  \n第 7 章 ■ 表与约束\n\n**提示：** 如果要检查的条件是一个不经常更改的小列表，请考虑使用检查约束而不是外键约束。例如，如果有一个列将始终定义为包含\
  \ 0 或 1，则检查约束是一个高效的解决方案。\n\n你可以使用几种方法来创建外键约束。以下示例在`EMP`表的`DEPT_ID`列上创建外键约束：\n\n\
  ```sql\ncreate table emp(\n  emp_id number,\n  name varchar2(30),\n  dept_id constraint\
  \ emp_dept_fk references dept(dept_id));\n```\n\n注意，`DEPT_ID`数据类型没有显式定义。它从引用的`DEPT`表的`DEPT_ID`列派生数据类型。你也可以在定义列时显式指定数据类型（无论是否定义外键）：\n\
  \n```sql\ncreate table emp(\n  emp_id number,\n  name varchar2(30),\n  dept_id number\
  \ constraint emp_dept_fk references dept(dept_id));\n```\n\n你也可以在`CREATE TABLE`语句中的列定义之外指定外键定义：\n\
  \n```sql\ncreate table emp(\n  emp_id number,\n  name varchar2(30),\n  dept_id number,\n\
  \  constraint emp_dept_fk foreign key (dept_id) references dept(dept_id)\n);\n```\n\
  \n你还可以修改现有表以添加外键约束：\n\n```sql\nalter table emp\nadd constraint emp_dept_fk foreign\
  \ key (dept_id)\nreferences dept(dept_id);\n```\n\n**注意：** 与主键和唯一键约束不同，Oracle 不会自动为外键列添加索引。你必须显式在外键列上创建索引。\n\
  \n### 检查特定数据条件\n\n检查约束在你有一个相当静态的短值列表时（例如，一个列可以是`Y`或`N`）非常有效。在这种情况下，值列表很可能不会更改，并且除了`Y`或`N`之外不需要存储其他信息，因此检查约束是合适的解决方案。\n\
  \n如果你有一个需要定期更新的长值列表，那么表和外键约束是更好的解决方案。\n\n第 7 章 ■ 表与约束\n\n此外，检查约束对于必须始终强制执行并且可以用简单的\
  \ SQL 表达式编写的业务规则非常有效。如果你有必须验证的复杂业务逻辑，那么应用程序代码更合适。\n\n你可以在创建表时定义检查约束。以下定义`ST_FLG`列必须为\
  \ 0 或 1：\n\n```sql\ncreate table emp(\n  emp_id number,\n  emp_name varchar2(30),\n\
  \  st_flg number(1) CHECK (st_flg in (0,1))\n);\n```\n\n稍好一点的方法是给检查约束一个名称：\n\n```sql\n\
  create table emp(\n  emp_id number,\n  emp_name varchar2(30),\n  st_flg number(1)\
  \ constraint st_flg_chk CHECK (st_flg in (0,1))\n);\n```\n\n一个更具描述性的命名约束的方法是将描述违反条件的信息嵌入到约束名称中。例如：\n\
  \n```sql\nCREATE table emp(\n  emp_id number,\n  emp_name varchar2(30),\n  st_flg\
  \ number(1) constraint \"st_flg must be 0 or 1\" check (st_flg in (0,1))\n);\n```\n\
  \n你也可以修改现有列以包含约束。该列不得包含任何违反正在启用的约束的值：\n\n```sql\nSQL> alter table emp add constraint\
  \ \"st_flg must be 0 or 1\" check (st_flg in (0,1));\n```\n\n**注意：** 检查约束必须在插入或更新的行中评估为真或未知（`NULL`）值。你不能在检查约束中使用子查询或序列。此外，不能引用\
  \ SQL 函数`UID`、`USER`、`SYSDATE`和`USERENV`，或伪列`LEVEL`或`ROWNUM`。\n\n### 强制非空条件\n\n\
  另一个常见的检查条件是列是否为空；你使用`NOT NULL`约束来实现这一点。`NOT NULL`约束可以通过多种方式定义。最简单的技术如下所示：\n\n```sql\n\
  create table emp(\n  emp_id number,\n  emp_name varchar2(30) not null);\n```\n\n\
  稍好一点的方法是给`NOT NULL`约束一个对你有意义的名称：\n\n```sql\ncreate table emp(\n  emp_id number,\n\
  \  emp_name varchar2(30) constraint emp_name_nn not null);\n```\n\n第 7 章 ■ 表与约束\n\
  \n如果需要修改现有表的列，请使用`ALTER TABLE`命令。要使以下命令生效，正在定义为`NOT NULL`的列中不得存在任何`NULL`值：\n\n```sql\n\
  SQL> alter table emp modify(emp_name not null);\n```\n\n**注意：** 如果正在定义为`NOT NULL`的列中当前存在`NULL`值，则必须首先更新表，以便该列在每行中都有一个值。\n\
  \n### 禁用约束\n\nOracle 的一个很好的特性是，你可以在不删除和重新创建约束的情况下禁用和启用约束。这意味着你避免了必须知道重新创建已删除约束所需的\
  \ DDL 语句。\n\n有时，你需要禁用约束。例如，你可能正在尝试截断表，但收到以下错误消息：\n\n```\nORA-02266: unique/primary\
  \ keys in table referenced by enabled foreign keys\n```\n\nOracle 不允许在父表的主键被子表中启用的外键引用的情况下对父表执行截断操作。如果需要截断父表，首先必须禁用所有引用父表主键的已启用外键约束。运行此查询以确定需要禁用的约束的名称：\n\
  \n```sql\nselect\n  b.table_name primary_key_table\n  ,a.table_name fk_child_table\n\
  \  ,a.constraint_name fk_child_table_constraint\nfrom dba_constraints a\n  ,dba_constraints\
  \ b\nwhere a.r_constraint_name = b.constraint_name\n  and a.r_owner = b.owner\n\
  \  and a.constraint_type = 'R'\n  and b.owner = upper('&table_owner')\n  and b.table_name\
  \ = upper('&table_name');\n```\n\n在此示例中，只有一个外键依赖项：\n\n```\nPRIMARY_KEY_TABLE   \
  \ FK_CHILD_TABLE       FK_CHILD_TABLE_CONST\n-------------------- --------------------\
  \ --------------------\nD_DATES              F_SALES              F_SALES_FK1\n\
  ```\n\n使用`ALTER TABLE`语句禁用表上的约束。在这种情况下，只有一个外键需要禁用：\n\n```sql\nSQL> alter table f_sales\
  \ disable constraint f_sales_fk1;\n```\n\n你现在可以截断父表：\n\n```sql\nSQL> truncate table\
  \ d_dates;\n```\n\n截断操作完成后，不要忘记重新启用外键约束，如下所示：\n\n第 7 章 ■ 表与约束\n\n```sql\nSQL> alter\
  \ table f_sales enable constraint f_sales_fk1;\n```\n\n你可以使用`DISABLE`子句的`CASCADE`选项禁用主键和所有相关的外键约束。例如，下一行代码禁用与`D_DATES_PK`主键约束相关的所有外键约束：\n\
  \n```sql\nSQL> alter table d_dates disable constraint d_dates_pk cascade;\n```\n\
  \n此语句不会级联通过所有级别的依赖关系；它只禁用直接依赖于`D_DATES_PK`的外键约束。另外请记住，没有`ENABLE...CASCADE`语句。要重新启用约束，你必须查询数据字典以确定哪些约束已被禁用，然后单独重新启用它们。\n\
  \n有时在加载数据时会遇到一些情况，在加载数据之前禁用所有外键很方便（也许使用`imp`实用程序进行模式级导入）。在这些情况下，`imp`实用程序按字母顺序导入表，并不确保在父表之前导入子表。你可能还希望并行运行多个导入作业以利用并行硬件。在这种情况下，你可以禁用外键，执行导入，然后重新启用外键。\n\
  \n以下是一个使用 SQL 生成 SQL 的脚本，用于禁用用户的所有外键约束：\n\n```sql\nset lines 132 trimsp on head\
  \ off feed off verify off echo off pagesize 0\nspo dis_dyn.sql\nselect 'alter table\
  \ ' || a.table_name\n  || ' disable constraint ' || a.constraint_name || ';'\nfrom\
  \ dba_constraints a\n  ,dba_constraints b\nwhere a.r_constraint_name = b.constraint_name\n\
  \  and a.r_owner = b.owner\n  and a.constraint_type = 'R'\n  and b.owner = upper('&table_owner');\n\
  spo off;\n```\n\n此脚本生成一个名为`dis_dyn.sql`的文件，其中包含禁用指定用户的所有外键约束所需的 SQL 语句。\n\n### 启用约束\n\
  \n本节包含一些脚本，以帮助你启用已禁用的约束。下面列出了一个脚本，该脚本创建一个包含重新启用指定用户拥有的表的任何外键约束所需的 SQL 语句的文件：\n\n\
  ```sql\nset lines 132 trimsp on head off feed off verify off echo off pagesize 0\n\
  spo enable_dyn.sql\nselect 'alter table ' || a.table_name\n  || ' enable constraint\
  \ ' || a.constraint_name || ';'\nfrom dba_constraints a\n  ,dba_constraints b\n\
  where a.r_constraint_name = b.constraint_name\n  and a.r_owner = b.owner\n  and\
  \ a.constraint_type = 'R'\n  and b.owner = upper('&table_owner');\nspo off;\n```\n\
  \n启用约束时，默认情况下 Oracle 会检查以确保数据不违反约束定义。如果你相当确定数据完整性良好，并且不需要重新验证约束带来的性能影响，则可以在重新启用约束时使用`NOVALIDATE`子句。这是一个例子：\n\
  \n```sql\nselect 'alter table ' || a.table_name\n  || ' modify constraint ' || a.constraint_name\
  \ || ' enable novalidate;'\nfrom dba_constraints a\n  ,dba_constraints b\nwhere\
  \ a.r_constraint_name = b.constraint_name\n  and a.r_owner = b.owner\n  and a.constraint_type\
  \ = 'R'\n  and b.owner = upper('&table_owner');\n```\n\n`NOVALIDATE`子句指示 Oracle\
  \ 不验证正在启用的约束，但它确实强制任何新的 DML 活动遵守约束定义。\n\n在多用户系统中，存在另一种会话可能在外键约束被禁用期间向子表插入数据的可能性。如果发生这种情况，当你尝试重新启用外键时会看到以下错误：\n\
  \n```\nORA-02298: cannot validate (<owner>.<constraint>) - parent keys not found\n\
  ```\n\n在这种情况下，你可以使用`ENABLE NOVALIDATE`子句：\n\n```sql\nSQL> alter table f_sales enable\
  \ novalidate constraint f_sales_fk1;\n```\n\n要清理违反约束的行，首先确保你的用户中已创建`EXCEPTIONS`表。如果你没有`EXCEPTIONS`表，请使用此脚本创建一个：\n\
  \n```sql\nSQL> @?/rdbms/admin/utlexcpt.sql\n```\n\n接下来，使用`EXCEPTIONS INTO`子句将违反约束的行填充到`EXCEPTIONS`表中：\n\
  \n```sql\nSQL> alter table f_sales modify constraint f_sales_fk1 validate\n  exceptions\
  \ into exceptions;\n```\n\n只要存在违反约束的行，此语句仍会抛出`ORA-02298`错误。该语句还会将任何违规行的记录插入到`EXCEPTIONS`表中。你现在可以使用`EXCEPTIONS`表的`ROW_ID`列删除任何违反约束的记录。\n\
  \n在这里，你看到有一行需要从`F_SALES`表中删除：\n\n```sql\nSQL> select * from exceptions;\nROW_ID\
  \              OWNER      TABLE_NAME   CONSTRAINT\n------------------ ----------\
  \ ------------ ---------------\nAAAFVmAAFAAAAihAAA INV_MMGT   F_SALES      F_SALES_FK1\n\
  ```\n\n要删除违规记录，请发出`DELETE`语句：\n\n```sql\nSQL> delete from f_sales where rowid =\
  \ 'AAAFVmAAFAAAAihAAA';\n```\n\n如果`EXCEPTIONS`表包含许多记录，你可以运行如下所示的查询以按`OWNER`和`TABLE_NAME`删除：\n\
  \n```sql\ndelete from f_sales where rowid in\n(select row_id\nfrom exceptions\n\
  where owner=upper('&owner') and table_name = upper('&table_name'));\n```\n\n你也可能遇到需要禁用主键或唯一键约束的情况。\n\
  \n例如，你可能希望执行大型数据加载，并且出于性能原因希望禁用\n\n169\n\n第 7 章 ■ 表与约束\n\n主键和唯一键约束。你不想产生每行插入时检查的开销。\n\
  \n用于禁用外键的相同通用技术适用于禁用主键或唯一键。运行此查询以显示用户的主键和唯一键约束：\n\n```sql\nselect\n  a.table_name\n\
  \  ,a.constraint_name\n  ,a.constraint_type\nfrom dba_constraints a\nwhere a.owner\
  \ = upper('&table_owner')\n  and a.constraint_type in ('P','U')\norder by a.table_name;\n\
  ```\n\n以下是一些示例输出：\n\n```\nTABLE_NAME                     CONSTRAINT_NAME       \
  \         C\n------------------------------ ------------------------------ -\nDEPT\
  \                           SYS_C006507                    P\nD_DATES          \
  \              D_DATES_UK1                    U\nD_DATES                       \
  \ D_DATES_PK                     P\n```\n\n识别表名和约束名后，使用`ALTER TABLE`语句禁用约束：\n\n\
  ```sql\nSQL> alter table d_dates disable constraint d_dates_pk;\n```\n\n**注意：**\
  \ Oracle 不允许你禁用被启用的外键约束引用的主键或唯一键约束。你必须首先禁用外键约束。\n\n## 总结\n\n本章重点介绍了与创建和维护表相关的基本活动。表是存储数据库中数据的容器。关键的表管理任务包括修改、移动、删除、缩小和删除表。你还必须熟悉如何实现和使用特殊表类型，如临时表、索引组织表和只读表。\n\
  \nOracle 还提供各种约束来帮助你管理表中的数据。约束构成了数据完整性的基石。在大多数情况下，每个表都应包含一个主键约束，以确保每一行都是唯一可标识的。此外，任何父/子关系都应通过外键约束强制执行。你可以使用唯一约束来实现要求列或列组合唯一的业务规则。检查约束和`NOT\
  \ NULL`约束确保列包含业务指定的数据要求。\n\n创建表后，下一个逻辑活动是在适当的地方创建索引。索引是可选的数据库对象，有助于提高性能。索引创建和维护任务将在下一章中介绍。\n\
  \n![](img/index-205_1.png)\n\n第 8 章 ■ 索引\n\n必须确保得到改进的语句值得对其他语句施加的惩罚。\n\n你应该只在确定索引会提高性能时添加索引。并且在实现索引后，你应该监视它以确保\
  \ Oracle 优化器正在使用它来加速查询。\n\n## 需要考虑的事项\n\nOracle 提供了广泛的索引功能和选项。作为 DBA 或开发人员，你需要了解各种功能以及如何使用它们。如果你选择了错误的索引类型或错误地使用了某个功能，可能会产生严重的性能损害。在创建索引之前，应考虑以下方面：\n\
  \n- 索引类型\n- 要包含的表列\n- 是使用单列还是列组合\n- 特殊功能，如`PARALLEL`子句、`NOLOGGING`、压缩、不可见索引等\n-\
  \ 唯一性\n- 命名约定\n- 表空间位置\n- 初始大小要求和增长\n- 对`SELECT`语句性能的影响（改进）\n- 对`INSERT`、`UPDATE`和`DELETE`语句性能的影响\n\
  - 如果基础表是分区的，则考虑全局或本地索引\n\n创建索引时，你应该仔细考虑前面列表中的每一个方面。你需要做的第一个决定是索引类型和要包含的列。Oracle\
  \ 提供了强大的索引类型。对于大多数场景，你可以使用默认的 B 树（平衡树）索引类型。其他常用类型是位图索引和基于函数的索引。表 8–1 描述了 Oracle\
  \ 可用的索引类型。\n\n第 8 章 ■ 索引\n\n***表 8–1.** Oracle 索引类型描述*\n\n| **索引类型**         | **用途**\
