  $ cd $ORACLE_HOME

  $ cd ..

  $ tar -cvf orahome.tar db_1

  ```


  现在，将 `orahome.tar` 文件复制到您想要安装 Oracle 软件的服务器。在此示例中，tar 文件被复制到另一台服务器上的 `/oracle/app/oracle/product/11.2.0.1`
