  “鲍勃，什么是云？” 我清晰地记得，我美丽而才华横溢的妻子金杰有天晚上走进厨房时这样问我。我停顿了一下，准备给出一个精妙而周全的回答，然后说道：“嗯，你看，云就是……”
  十五分钟后（根据金杰的回忆——我觉得才几分钟），金杰礼貌地打断我说：“呃……我想要的是那种简明扼要的答案？” 我愣住了。云是一个如此复杂的话题，并且提供了这么多功能，怎么能用如此简单的东西来定义呢？我不能就此作罢，于是花了几天时间研究一个更简单但仍能定义云的答案。但我也想确保金杰知道“什么是
  Azure？”这个问题的答案。


  结果微软在文档中给出了答案，网址是 `https://azure.microsoft.com/overview/what-is-azure/`。Azure 被定义为“……一套不断扩展的云服务，帮助您的组织应对业务挑战。它提供了一个广阔、全球性的网络，让您能使用喜爱的工具和框架自由地构建、管理和部署应用程序。”
  我自豪地向妻子展示了这段文字，以为我已经提供了她想要的简单答案。她眼中闪着光芒（她经常这样），说道：“这当然令人印象深刻，但是什么呢？” 还得是我的 CEO，萨提亚·纳德拉来救场。他简单地说道：“Azure
  是世界计算机”（参见他在 Build 2018 主题演讲中的原话，网址：`https://news.microsoft.com/speeches/satya-nadella-build-2018/`）。


  然后我把这句引述给妻子看。她回应道：“对了。我懂了。如果你没有自己的电脑，就用 Azure。直接用云就好了”（也许我们该雇用她）。这就是 Azure 的简而言之。Azure
  定义了并提供了云计算的承诺，包括以下方面：


  *   横向扩展，而非只能纵向扩展

  *   按需增减容量

  *   按使用量付费

  *   大力投入自动化以降低成本


