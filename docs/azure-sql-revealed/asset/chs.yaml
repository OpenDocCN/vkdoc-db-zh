  '
- "# SQL Server 设置\n\n到目前为止，所有的配置选项都与 SQL Server 无关。此屏幕提供了针对 SQL Server 特定部署的配置选项。如果您熟悉\
  \ SQL Server 的安装体验，我们在最新版本中提供了“在安装时配置”的选项。这意味着我们将通常在安装后配置的选项整合到了安装过程本身。我们现在正尝试在\
  \ Azure 虚拟机中提供相同的体验，同时也包含允许为 Azure 进行优化配置的选项。\n\n让我们更详细地了解这些选项。图 3-14 显示了网络、安全和存储的选择。\n\
  \n![](img/496204_2_En_3_Fig14_HTML.jpg)\n\n图 3-14\n网络、安全和存储的 SQL Server 设置\n\n注意\n\
  截至撰写本书时，SQL Server Linux 镜像在部署期间不支持 SQL Server 设置。\n\n#### 网络\n\n**网络** 提供了如何暴露\
  \ SQL Server 实例默认 TCP 端口 1433 的选择。可以将此选择视为使用防火墙。*专用* 意味着虚拟机虚拟网络内的任何 Azure 源都可以访问此端口。这是默认设置，也是我推荐您使用的选项。*本地*\
  \ 意味着只允许在虚拟机内部访问。*公共* 意味着 TCP 端口在 Internet 上暴露。尽管使用公共选项以便您可以通过 SSMS 等工具从笔记本电脑连接到此部署的虚拟机可能很诱人，但我\
  \ **不建议** 使用此选项。\n\n注意\n我第一次使用公共选项在 Azure 虚拟机中部署 SQL Server 时，立即遭到了外部入侵者的攻击，他们尝试使用\
  \ `sa` 账户登录并猜测密码。当我在 `ERRORLOG` 中看到大量的登录失败消息时，我才发现这一点。这几乎是在部署虚拟机后立即发生的。\n\n## SQL\
  \ 身份验证\n\n**SQL 身份验证** 的选择与为 SQL Server 启用混合模式安全相同。即使默认情况下 `sa` 登录是禁用的，如果您选择启用此选项，系统将提示您输入一个\
  \ SQL 登录名，该登录名将被授予部署的 SQL Server `sysadmin` 权限。\n\n## Azure 密钥保管库集成\n\n**Azure 密钥保管库集成**\
  \ 是一个您可能想要启用的选项，但别担心，您可以在部署后启用它。Azure 密钥保管库集成可能有助于简化您在诸如透明数据加密 (`TDE`) 等场景中使用 Azure\
  \ Key Value。您可以在 `https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/azure-key-vault-integration-configure`\
  \ 阅读更多关于 Azure 虚拟机中 SQL Server 与 Azure 密钥保管库集成的信息。\n\n## 存储配置\n\n**存储配置** 可能是您为\
  \ Azure 虚拟机中的 SQL Server 所做的最重要选择之一，尤其是对于性能而言。让我们看看您可以做出哪些选择，以及我们如何提供引导式体验来为您的数据库配置存储。\n\
  \n注意\n目前有一个预览版的新体验可以使用 Azure 高级 SSD v2 存储。我将在本章后面的“最大化存储性能”一节中更多地讨论此选项。\n\n如果您点击\
  \ **更改配置**，您将看到如图 3-15 所示的选项。\n\n![](img/496204_2_En_3_Fig15_HTML.jpg)\n\n图 3-15\n\
  为 Azure 虚拟机中的 SQL Server 配置存储\n\n此屏幕分为三个部分：(1) 数据库文件存储，(2) 事务日志文件存储，和 (3) `tempdb`\
  \ 存储。\n\n对于数据库和事务日志文件，您有位置、托管磁盘类型、磁盘大小类型和磁盘数量的选项。对于数据库，您还可以选择将系统数据库 (`master`、`model`\
  \ 和 `msdb`) 从操作系统驱动器移动到放置数据库文件的驱动器。除非您只是做一些基本测试，否则我总是建议：\n\n*   选择将数据和日志放在单独的驱动器上。\n\
  *   使用高级 SSD 磁盘类型。\n*   选择足够大的磁盘大小类型，以处理您的应用程序 SQL Server I/O 所需的容量、IOPS 和吞吐量。\n\
  \n高级 SSD 磁盘类型有各种大小，从 4GB (`P1`) 到 32TB (`P80`) 标记为 `P<n>`。IOPS 和吞吐量方面的性能随着尺寸的增大而提高。您可能面临的一个问题是尝试将您需要的\
  \ IOPS 和吞吐量与您的最小尺寸要求对齐。这可能需要您 *超额配置* 尺寸（或多个磁盘）以获得所需的性能（如前所述，有一个名为高级 SSD v2 的新磁盘类型正在预览中，可以帮助解决此问题；您将在本章后面的“最大化存储性能”一节中了解它）。您可以在\
  \ `https://learn.microsoft.com/azure/virtual-machines/disks-types#premium-ssds`\
  \ 阅读更多关于各种高级 SSD 磁盘类型的信息。\n\n对于 `tempdb`，请注意建议将其放置在本地 SSD 驱动器上，并建议数据和日志的文件数量和大小，这与\
  \ SQL Server 当前的安装程序非常相似。\n\n请注意屏幕底部的警告。它说配置的磁盘的性能向量超出了虚拟机大小的支持范围。这是一个重要的警告，因为它意味着您选择的虚拟机大小不支持足够的\
  \ IOPS 和/或吞吐量，即使您选择了满足您要求的存储。当它发生时，这是一个很难检测到的问题，因此现在正确设置虚拟机大小以满足您的存储性能要求非常重要。您需要先返回到“基础”屏幕更改虚拟机大小，然后返回此屏幕以确保警告消失。\n\
  \n## SQL Server 实例设置\n\n在存储配置下方是能够更改 **SQL Server 实例设置**，如图 3-16 所示。\n\n![](img/496204_2_En_3_Fig16_HTML.jpg)\n\
