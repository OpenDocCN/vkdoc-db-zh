  \    CREATE USER [bwadwidentity] FROM EXTERNAL PROVIDER;\n    ALTER ROLE db_datareader\
  \ ADD MEMBER [bwadwidentity];\n    GO\n    ```\n\n4.  现在我需要将该标识分配给我的 Azure 虚拟机。使用\
  \ Azure 门户，我可以导航到名为 `bwsql2022` 的虚拟机并分配该标识，如图 6-9 所示。\n\n    > **注意**：您还可以将托管标识分配给应用程序（如\
  \ Azure 应用服务）以连接到 Azure SQL Database。\n\n![](img/496204_2_En_6_Fig10_HTML.jpg)\n\
  *图 6-10：托管标识概览*\n\n5.  现在让我们尝试使用 SSMS 连接。SSMS 界面使用此方法比较棘手，因为您不能只提供标识名称。现在在 Azure\
  \ 中找到 `bwidentity` 资源（您只需单击图 6-9 中的标识名称）。您应该在“概览”屏幕上看到类似图 6-10 的内容。\n\n    您需要复制客户端\
  \ ID 的值。这就是您将用于通过 SSMS 登录的内容。\n\n![](img/496204_2_En_6_Fig11_HTML.jpg)\n*图 6-11：在\
  \ SSMS 中使用托管标识连接*\n\n6.  在 VM 内，启动 SSMS 并像图 6-11 那样选择您的连接。\n\n    用户分配的标识是上一步中标识的客户端\
  \ ID。**在单击“连接”之前**，您必须选择“连接属性”选项卡，并在“连接到数据库”字段中输入您的数据库名称（我的是 `bwhyperscale`）。\n\n\
  \    您现在可以像使用任何其他 Azure SQL Database 一样使用此连接。相同的概念适用于 Azure SQL 托管实例，只是您需要为该实例创建一个登录名。\n\
  \n应用程序开发人员不必使用此特殊 ID。他们拥有来自 Azure 的 API，可根据分配给应用程序或虚拟机的标识来获取令牌。\n\n#### 设置和配置访问\n\
  \n既然您已经创建了登录名和用户，接下来该做什么呢？就像您为 SQL Server 所做的那样，您需要根据应用程序要求，为数据库内的对象授予访问权限和权限。\n\
  \n这可能涉及创建架构、角色，以及授予或撤销特定权限。如需了解 SQL Server 权限的入门知识，请参阅文档 [`https://learn.microsoft.com/sql/relational-databases/security/permissions-database-engine`](https://learn.microsoft.com/sql/relational-databases/security/permissions-database-engine)。\n\
  \n自本书第一版以来，SQL 访问方面的一个很好的补充是一组**粒度更细**的服务器角色。这些新的固定服务器角色有特定的命名约定 `##MS_<role>##`。它们允许您使用**最低权限**原则，而不必为用户过度分配角色。例如，角色\
  \ `##MS_ServerStateReader##` 拥有查看逻辑服务器或任何数据库的系统目录状态的权限，但除此之外没有其他权限。您可以在 [`https://learn.microsoft.com/azure/azure-sql/database/security-server-roles`](https://learn.microsoft.com/azure/azure-sql/database/security-server-roles)\
  \ 查看所有新的固定服务器角色。\n\n别忘了，Azure SQL 和 SQL Server 一样支持行级安全性 (RLS)。请在 [`https://learn.microsoft.com/sql/relational-databases/security/row-level-security`](https://learn.microsoft.com/sql/relational-databases/security/row-level-security)\
  \ 阅读有关 RLS 的内容。您可以在 [`https://learn.microsoft.com/azure/azure-sql/database/logins-create-manage`](https://learn.microsoft.com/azure/azure-sql/database/logins-create-manage)\
  \ 阅读更多关于 Azure SQL 数据库身份验证和访问控制的内容。\n\n### Microsoft Purview\n\n考虑这样一种场景：您正试图为跨多个托管实例或数据库的登录和访问**大规模**设置权限。如果有一个集中控制和管理访问权限的地方就太好了。**Microsoft\
  \ Purview DevOps** 策略正是为了应对这种场景而生。\n\n考虑这种情况：您需要组织内有人负责在您众多的 Azure SQL 数据库和逻辑服务器上执行所有性能监控。与其为此创建一个单独的登录名并授予其执行此任务的权限（请记住，我们有新的服务器固定角色用于此目的），您可以通过\
  \ Purview 来管理您的逻辑服务器，然后设置一个策略，指定哪些 Microsoft Entra 帐户将拥有性能监控角色的访问权限（我们还支持 SQL 安全审计角色），这一切都可以*在一个位置*完成。\n\
  \n现在，这些 Microsoft Entra 帐户将能够登录这些逻辑服务器并执行“性能监控”任务。此角色的实际权限可以在 [`https://learn.microsoft.com/purview/how-to-policies-devops-authoring-generic#role-definition-detail`](https://learn.microsoft.com/purview/how-to-policies-devops-authoring-generic#role-definition-detail)\
  \ 找到。如果您想撤销此访问权限，可以在 Purview 中通过策略完成，而不必逐台登录逻辑服务器进行操作。请在 [`https://learn.microsoft.com/purview/how-to-policies-devops-azure-sql-db`](https://learn.microsoft.com/purview/how-to-policies-devops-azure-sql-db)\
  \ 阅读入门指南。\n\n> **注意**\n>\n> Purview DevOps 策略也支持 Azure SQL 托管实例和 SQL Server 2022。\n\
  \n## 数据保护\n\n确保已为连接和数据访问设置适当的授权只是第一步。您需要从部署的各个方面保护数据，包括连接、静态数据、端到端数据，并确保只有合适的人员才能查看重要数据。Azure\
  \ SQL 拥有与 SQL Server 一样的数据保护能力。\n\n### 加密连接\n\n与 SQL Server 类似，Azure SQL 支持通过传输层安全性\
  \ (TLS) 协议加密连接（您可以在 [`https://en.wikipedia.org/wiki/Transport_Layer_Security`](https://en.wikipedia.org/wiki/Transport_Layer_Security)\
  \ 阅读关于 TLS 的内容）。\n\n默认情况下，Azure SQL 托管实例强制要求连接加密。工具和应用程序应为托管实例启用加密连接，以避免客户端/服务器协商。此外，您可以强制客户端连接使用最低\
  \ TLS 版本。最新的 TLS 1.2 版本修复了一些已知的安全漏洞，因此您可以考虑要求使用此版本。您可以通过 Azure 门户、PowerShell (`Set-AzInstance`)\
  \ 或 az CLI (`az sql mi update`) 设置最低版本。您可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/minimal-tls-version-configure`](https://learn.microsoft.com/azure/azure-sql/managed-instance/minimal-tls-version-configure)\
  \ 阅读更多关于 TLS 和托管实例的内容。\n\nAzure SQL 数据库强制要求加密连接，无论客户端或应用程序是否启用。您可以通过检查 `sys.dm_exec_connections`\
  \ 的 `encrypt_option` 列来验证这一点，您会发现对于任何用户 TCP 连接，该列值始终为 TRUE。Azure SQL 数据库还提供通过 Azure\
  \ 门户、PowerShell (`Set-AzSqlServer`) 和 az CLI (`az sql server update`) 强制执行最低 TLS\
  \ 版本（1.0、1.1 和 1.2）的功能。您可以在 [`https://learn.microsoft.com/azure/azure-sql/database/connectivity-settings?view=azuresql&tabs=azure-portal#minimal-tls-versio`](https://learn.microsoft.com/azure/azure-sql/database/connectivity-settings?view=azuresql&tabs=azure-portal#minimal-tls-versio)\
  \ 阅读更多内容。\n\n> **提示**\n>\n> 因为 Azure SQL 数据库强制要求加密连接，最佳实践是为您的客户端工具或应用程序启用此功能。如果客户端未设置加密，服务器必须与客户端协商设置加密，这会加快连接速度。\n\
  \nSQL Server 2022 现在支持 TLS 1.3。我预计 Azure SQL 很快也会支持此 TLS 版本。\n\n### 透明数据加密 (TDE)\n\
  \n透明数据加密 (TDE) 是一种**静态数据加密**技术，已在 SQL Server 的多个版本中使用。其概念是 SQL Server 引擎在数据写入和读取磁盘时，对数据库文件进行加密和解密。这样，文件中的数据被加密，以保护任何**离线**访问数据库文件的企图。Azure\
  \ SQL 托管实例和数据库**默认**启用此选项。\n\n您可能想知道为什么需要此加密选项，因为您或任何人都无法访问 Azure SQL 底层虚拟机中的文件。默认启用\
  \ TDE 只是 Azure 为保护您的数据而致力于**纵深防御**方法的另一种机制。许多人使用 TDE 来保护其自有数据中心的 SQL Server 部署，以防止意外入侵导致引擎外部访问数据库文件。即使\
  \ Azure 生态系统已为数据中心部署了许多保护机制，这一点在 Azure 中同样适用。\n\n对于 Azure SQL 托管实例，TDE 默认为实例开启，这意味着为该实例创建的所有数据库都启用了\
  \ TDE。您无法为实例禁用此选项，但可以通过 `ALTER DATABASE` 或 SSMS 等工具单独为数据库禁用 TDE。对于托管实例，您有一个选项是可以控制用于\
  \ TDE 加密的密钥。默认情况下，Azure SQL 托管实例使用服务托管密钥，这意味着 Azure SQL 管理密钥的证书（轮换密钥并使用 Azure 内的根密钥对其进行保护）。\n\
  \nAzure SQL 数据库也支持通过 `ALTER DATABASE` (`ENCRYPTION` 选项) 为数据库配置 TDE，同时还允许通过 Azure\
  \ 门户、PowerShell (`Set-AzSqlDatabaseTransparentDataEncryption`) 和 az CLI (`az sql\
  \ db tde set`) 启用和禁用 TDE。默认密钥管理也是在逻辑服务器级别的服务托管密钥。\n\n#### 自带密钥（BYOK）\n\n许多客户希望完全控制用于加密的密钥（例如出于合规性和信任考虑）。SQL\
  \ Server 提供了一种使用可扩展密钥管理（EKM）提供程序来保护数据库加密密钥（DEK）的方法，该密钥用于通过 TDE 加密数据。允许的 EKM 提供程序之一是\
  \ Azure Key Vault。这允许用于加密的密钥存储在 SQL Server 之外。\n\nAzure SQL 提供了一种类似的机制，亲切地称为*自带密钥*（BYOK）。您可能也会看到它被称为*客户管理密钥*（CMK）。使用\
  \ Azure Key Vault 实现 BYOK 的机制被称为 `TDE protector`。Azure Key Vault 是 Azure 中的一项服务，可帮助您集中存储和管理机密与密钥。正如\
  \ Azure Key Vault 入门文档所述（位于 [`https://learn.microsoft.com/azure/key-vault/general/overview`](https://learn.microsoft.com/azure/key-vault/general/overview)），“机密和密钥由\
  \ Azure 保护，使用行业标准算法、密钥长度和硬件安全模块（HSM）。使用的 HSM 符合联邦信息处理标准（FIPS）140-2 Level 2 验证。”\n\
  \n授权以创建密钥库以及创建和管理密钥是通过 Microsoft Entra 完成的。Azure Key Vault 密钥可以在实例或逻辑服务器级别设置，并应用于该实例或逻辑服务器中的所有数据库。此外，Azure\
  \ SQL 数据库现在支持在数据库级别设置密钥。我喜欢这篇博客文章中的图表（位于 [`https://azure.microsoft.com/blog/announcing-transparent-data-encryption-tde-with-customer-managed-keys-for-managed-instance`](https://azure.microsoft.com/blog/announcing-transparent-data-encryption-tde-with-customer-managed-keys-for-managed-instance)），它展示了\
  \ Azure Key Vault BYOK 的工作原理，如图 6-12 所示。\n\n![](img/496204_2_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12\n\n使用 Azure Key Vault 为 TDE 实现 BYOK\n\n让我向您展示如何轻松地在 Azure SQL 数据库中使用 BYOK。我将在\
  \ Azure 门户中导航到名为 `bwhyperscale` 的数据库，然后从“服务”菜单的“安全”选项中选择“数据加密”，如图 6-13 所示。\n\n![](img/496204_2_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13\n\n为 Azure SQL 数据库的 TDE 配置 BYOK\n\n您可以看到我已选择“数据库级别的客户管理密钥（CMK）”。我现在可以选择“更改密钥”，使用一个屏幕在\
  \ Azure Key Vault 中创建一个新密钥并将其应用于我的数据库加密。我甚至可以使用托管标识来管理密钥，该密钥可用于多个 Azure 资源。\n\n\
  这看起来很简单，但在将 BYOK 与 Azure SQL 一起使用时有几个注意事项：\n\n*   仅当使用 BYOK 时，才支持托管实例的 `COPY_ONLY`\
  \ 备份（因为您拥有用于还原的密钥），这与使用服务托管的 TDE 加密的备份不同，因为后者证书无法访问。\n\n*   您的密钥保管库和 Azure SQL 部署必须属于同一个\
  \ Microsoft Entra 租户。\n\n*   与您管理密钥的任何场景一样，您应定期备份它们。了解有关 Azure Key Vault 备份的更多信息，请访问\
  \ [`https://learn.microsoft.com/azure/key-vault/general/backup`](https://learn.microsoft.com/azure/key-vault/general/backup)。\n\
  \n*   对于高可用性下的 BYOK 存在一些考虑因素。请阅读更多信息，网址为 [`https://learn.microsoft.com/azure/azure-sql/database/transparent-data-encryption-byok-overview?view=azuresql&viewFallbackFrom=sql-server-ver15#high-availability-with-customer-managed-tde`](https://learn.microsoft.com/azure/azure-sql/database/transparent-data-encryption-byok-overview?view=azuresql&viewFallbackFrom=sql-server-ver15#high-availability-with-customer-managed-tde)。\n\
  \n### Always Encrypted\n\nAlways Encrypted 是一项基于微软研究成果的技术，用于为 SQL 应用程序提供端到端加密。它在\
  \ SQL Server 2016 中引入，并在 Azure SQL 中拥有所有相同的功能。与 SQL Server 一样，Always Encrypted 的密钥可以存储在\
  \ Azure Key Vault 中。请阅读有关 Always Encrypted 工作原理以及如何设置的完整说明，网址为 [`https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine`](https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine)。\n\
  \nAlways Encrypted 的一个独特方面（自本书第一版以来是新的）是对 Azure SQL 数据库的 `secure enclaves` 的支持。此选项为\
  \ Always Encrypted 场景提供了更快、更强大的选择。这是因为 SQL Server 的许多解密操作都在引擎内部使用安全区域完成。这也是为什么我们现在有\
  \ Azure SQL 数据库的 DC 系列硬件选项，因为它在后台使用 Intel SGX 芯片架构。阅读更多信息，请访问 [`https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves`](https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves)。\n\
  \n### 动态数据屏蔽（DDM）\n\n另一种保护数据的方法是控制哪些用户有权查看*敏感*数据。许多应用程序通过*屏蔽*其应用程序显示层中的数据来提供此类保护。例如，Web\
  \ 应用程序可能对某些用户显示电话号码为 XXX-XXX，而对其他用户显示完整的电话号码。这种方法的问题在于，如果使用的掩码规则或哪些用户可以看到数据或屏蔽数据的规则发生变化，则必须修改应用程序。\n\
  \nSQL Server 提供了一种在数据库层而不是应用程序层控制数据屏蔽的方法。然后，*任何*应用程序或工具都将仅根据使用 T-SQL 定义的屏蔽规则看到数据。此功能称为动态数据屏蔽（DDM），在\
  \ SQL Server 2016 中引入。您可以在 [`https://learn.microsoft.com/sql/relational-databases/security/dynamic-data-masking`](https://learn.microsoft.com/sql/relational-databases/security/dynamic-data-masking)\
  \ 阅读 DDM 的完整文档。Azure SQL 通过 T-SQL 语句支持 DDM，如文档中所述。此外，Azure SQL 数据库允许您通过 Azure 门户管理屏蔽和权限，如图\
  \ 6-14 所示，这是我基于示例 AdventureWorksLT 创建的数据库。\n\n![](img/496204_2_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14\n\n通过 Azure 门户进行动态数据屏蔽\n\n您可以看到，使用 Azure 门户将根据数据库中的列名（例如 `LastName` 或 `EmailAddress`）提供有关要屏蔽列的建议。\n\
  \n\n"
- '# SQL 账本


  如果你阅读过 *SQL Server 2022 揭秘*，我在书中介绍了 SQL Server 中的一个新功能，即在数据库内部实现的区块链。这里的核心概念是，账本提供了数据库变更的防篡改记录。


  描述 SQL 账本最好的方式是通过图表，如图 6-15 所示。


  ![](img/496204_2_En_6_Fig15_HTML.jpg)


  图 6-15 SQL 账本


  SQL 账本允许你使用 T-SQL 创建一个表，通过附加语法 `WITH LEDGER = ON`，系统将自动使用时态表的技术来跟踪该表的所有变更。系统将构建一个变更历史表和一个视图，使你能够查看当前表以及历史变更。


  这与时态表有何不同？关键在于数据库账本，这是一系列系统内部表，用于跟踪：

  - 哪个 SQL 主体进行了变更

  - 实际变更的加密哈希值


  现在，你可以跟踪变更内容、变更时间、变更执行者，并确保没有人从内部篡改数据。例如，如果有人试图入侵系统，并“伪造”一条 `UPDATE` 操作使其看起来像是原始值以隐藏变更。


  数据库账本以链式结构记录这些哈希值，因此构成一个区块链。这比传统的区块链系统更有优势，因为所有数据都保留在 SQL Server 数据库内部。这里不需要应用程序逻辑，因为所有功能都内置在
  SQL 中。


  此外，可以存储一个独立的摘要，这是在数据库账本之上独立计算的哈希值。这提供了一种独立的方法来验证数据库账本本身的有效性。


  图 6-15 中未显示的一个额外选项是，你可以将账本表设置为 `APPEND_ONLY`，这意味着只允许 `T-SQL INSERT` 语句。这几乎类似于“日志”，同时具备账本的其他优势。


  Azure SQL Database 提供了一些独特的选项，如图 6-16 所示。


  ![](img/496204_2_En_6_Fig16_HTML.jpg)


  图 6-16 Azure SQL Database 账本选项


  你可以通过 Azure 门户默认启用所有表使用账本功能，为所有账本表验证数据库账本，并启用自动将摘要存储到 Azure 存储或 Azure Confidential
  Ledger 中。


  账本功能在 Azure SQL Database、Azure SQL 托管实例以及 SQL Server 2022（包括 Azure 虚拟机和本地部署）中均可用。请访问
  [`https://aka.ms/sqlledger`](https://aka.ms/sqlledger) 了解关于 SQL 账本的所有信息。


  ## 安全管理


  在为身份验证、访问和数据保护配置好安全设置后，你将需要管理和审计安全的特定方面。这包括监控活动、使用 SQL 审计以及使用 Microsoft Defender
  for Cloud 检查安全问题。


  ### SQL 外部的活动监控


  当你在 Windows 和 Linux 上部署和管理 SQL Server 时，操作系统提供了多种不同的方法来审计 SQL Server 外部的活动。你的数据中心内可能还有其他方法来审计此类活动。


  Azure 生态系统提供了相同类型的审计能力。你可能在第 4 章中看到过，在部署 Azure SQL 托管实例和数据库后，针对此类活动的 **活动日志**。可以将其视为审计
  Azure RBAC 的一种方式。


  活动日志是 Azure 生态系统为所有订阅提供的平台日志。实际上，活动日志是 Azure 订阅所有事件的记录，包括针对 Azure SQL 托管实例和数据库的特定事件。基本上，任何在
  SQL Server 外部针对 Azure SQL 资源执行的操作都会记录在活动日志中。我使用 Windows 事件日志多年，我喜欢将活动日志视为 Azure
  的事件日志。


  Azure 门户提供了一种绝佳的方式来查看特定 Azure 资源的活动日志条目。例如，如果我在 Azure 门户中导航到我的逻辑服务器 `bwsqllogicalserver`，然后从资源菜单中选择“活动日志”，并将时间范围更改为一周，我会看到类似图
  6-17 中的条目。


  ![](img/496204_2_En_6_Fig17_HTML.jpg)


  图 6-17 Azure SQL Database 逻辑服务器的活动日志


  你可以看到一些日志条目显示了更新防火墙规则或设置专用端点等活动。


  默认情况下，Azure 活动日志条目会保留 90 天（之后会滚动更新）。如果你想将活动日志条目保留更长时间，可以创建一个 Log Analytics 工作区。Log
  Analytics 工作区还为你提供了更强大的查询和可视化活动日志条目的能力。在此屏幕上，顶部有一个“诊断设置”选项。这允许你创建一个 Log Analytics
  工作区并将活动日志条目添加到其中。你还可以选择将活动日志条目发送到 Event Hub 进行流式传输。要详细了解活动日志的一般用法，请访问 [`https://learn.microsoft.com/azure/azure-monitor/essentials/activity-log`](https://learn.microsoft.com/azure/azure-monitor/essentials/activity-log)。


  ### 审计 Azure SQL 托管实例


  由于 Azure SQL 托管实例非常类似于完整的 SQL Server 实例，许多熟悉的审计工具和功能都可供你使用。


  #### 跟踪登录


  据我所知，几乎每个 SQL Server 版本都会在 SQL Server 的 `ERRORLOG` 中跟踪失败的登录。托管实例的 `ERRORLOG` 中，失败的登录如下所示：

  ```

  Error: 18456, Severity: 14, State: 7.

  Login failed for user ''sa''. Reason: An error occurred while evaluating the password.
  [CLIENT: 10.1.0.4]

  ```

  SQL Server 提供了关闭此跟踪或同时跟踪成功登录的能力。此功能不适用于托管实例（即使 SSMS 给你一种它允许的印象），因为它需要重启 SQL Server，而你没有权限执行此操作。


  由于 Azure SQL 托管实例为你提供了对 Extended Events 的完全访问权限，你可以使用以下事件来跟踪登录：`process_login_finish`、`login_event`
  和 `login`。Azure SQL 托管实例的 Extended Events 支持所有事件、操作和目标。文件目标必须使用 Azure Blob 存储，因为你无权访问底层操作系统文件系统。




  ### SQL Server 审核


  SQL Server 审核是一项存在于多个 SQL Server 版本中的功能，用于审核和跟踪实例及数据库活动。Azure SQL 托管实例完全支持 SQL Server
  审核，但有几个例外：


  *   审核文件存储在 Azure Blob 存储中。请阅读以下链接了解如何操作：`https://learn.microsoft.com/azure/azure-sql/managed-instance/auditing-configure?view=azuresql#set-up-auditing-for-your-server-to-azure-storage`。

  *   不支持在审核失败时关闭 SQL Server 的选项（但支持“继续”和“失败”选项）。


  如果您从未使用过 SQL Server 审核，请查阅以下文档：`https://learn.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine`。


  SQL Server 审核生成文件以基于扩展事件格式跟踪活动（SQL Server 审核在底层使用扩展事件会话）。Azure SQL 托管实例还允许您将审核事件生成到
  Azure Monitor 日志和事件中心。`TO EXTERNAL MONITOR` 选项已添加到 `CREATE SERVER AUDIT` T-SQL 语句中。


  请参阅以下示例，了解如何配置 SQL Server 审核以将数据发送到 Azure 日志或事件中心：`https://learn.microsoft.com/azure/azure-sql/managed-instance/auditing-configure?view=azuresql#set-up-auditing-for-your-server-to-event-hubs-or-azure-monitor-logs`。


  ### 审核 Azure SQL Database


  Azure SQL Database 的审核活动通过动态管理视图 (DMVs) 中的指标和 Azure Metrics 提供。此外，SQL Server 审核功能以
  **SQL 数据库审核** 的形式提供。


  #### 跟踪连接


  Azure SQL Database 提供了一个名为 `sys.event_log` 的 DMV，可以在逻辑服务器的逻辑主数据库的上下文中查询。此 DMV 以五分钟的聚合时间间隔显示连接指标的信息。此
  DMV 不跟踪单个成功或失败的连接，而是跟踪逻辑服务器所有数据库（包括逻辑主数据库）的连接指标。此 DMV 在 Azure SQL 托管实例中不支持。


  您可以查看此 DMV 的示例包括：


  *   成功连接数

  *   由于登录名无效导致的失败连接数

  *   由于防火墙规则阻止导致的失败连接数


  虽然此信息存储在所有数据库中，但您可以使用 Azure Metrics 和 Logs 来捕获失败连接、被防火墙规则阻止的连接以及成功连接的聚合数字。


  图 6-18 显示了我如何为其中一个 Azure SQL Database 添加成功连接数。


  ![](img/496204_2_En_6_Fig18_HTML.jpg)


  图 6-18 使用 Azure Metrics 跟踪成功连接


  #### SQL 数据库审核


  由于您无法访问 Azure SQL Database 底层的 SQL Server 实例，因此无法使用 T-SQL 语句 `CREATE SERVER AUDIT`
  来使用 SQL Server 审核功能。


  因此，我们在 Azure SQL Database *外部* 创建了接口来审核数据库和逻辑服务器活动。我们称之为 **SQL 数据库审核**。请阅读完整文档：`https://learn.microsoft.com/azure/azure-sql/database/auditing-overview`。SQL
  数据库审核可以通过 Azure 门户、PowerShell（`Set-AzSqlDatabaseAudit` 和 `Set-AzSqlServerAudit`）以及
  az CLI（`az sql db audit-policy`）启用。


  您可以将 SQL 数据库审核定向到 Azure 存储帐户、Log Analytics 工作区或用于流式传输的事件中心。


  让我们看一个为逻辑服务器创建审核并将审核定向到存储帐户 **和** Log Analytics 工作区的示例（并解释为什么您可能希望使用其中一个或两者）。审核逻辑服务器将审核所有数据库的所有活动。


  注意

  您也可以为每个数据库创建单独的审核，但当您审核逻辑服务器时，所有数据库的所有活动也会进入该审核。


  我首先按照以下步骤创建了一个新的 Log Analytics 工作区：`https://learn.microsoft.com/azure/azure-monitor/logs/quick-create-workspace`。我将其命名为
  `bwsqldbloganalytics`。


  我通过导航到我的逻辑服务器 `bwsqllogicalserver` 开始了这个过程，从服务菜单中选择了“审核”，并看到了如图 6-19 所示的顶部屏幕。


  ![](img/496204_2_En_6_Fig19_HTML.jpg)


  图 6-19 配置 Azure SQL Database 审核的第一部分


  我选择了“启用审核”选项，然后选择了“新建”以创建一个新的 Azure 存储帐户来存储审核数据。我还选择了“托管标识”用于身份验证，以创建对审核存储更安全的访问。


  向下滚动，我有更多选项可以选择，如图 6-20 所示。


  ![](img/496204_2_En_6_Fig20_HTML.jpg)


  图 6-20 配置 Azure SQL 数据库 SQL 审核的第二部分


  我添加了之前创建的 Log Analytics 工作区。此外，我还配置了一个选项，将 Microsoft 支持操作审核到同一个 Log Analytics 工作区（它可以是不同的工作区，甚至是不同的
  Azure 存储）。此选项真正显示了 Microsoft 对透明度的重视程度。这意味着如果您因任何问题联系 Microsoft 支持，您可以审核他们对您的部署采取的任何操作。您可以在以下链接中阅读有关此选项的更多信息：`https://learn.microsoft.com/azure/azure-sql/database/auditing-microsoft-support-operations`。我点击了
  **保存** 来持久化我的选择。


  注意

  我还可以选择在数据库级别启用审核。如果我为逻辑服务器启用了审核，则所有数据库都启用了审核。


  SQL Server 审核有一个称为操作组的概念，用于定义要审核的活动。SQL 数据库审核默认启用以下操作组：


  *   `BATCH_COMPLETED_GROUP` – 审核所有成功的 SQL 语句

  *   `SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP` – 审核成功的数据库登录

  *   `FAILED_DATABASE_AUTHENTICATION_GROUP` – 审核失败的数据库连接



  所有可用的操作组可在 [`https://learn.microsoft.com/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions`](https://learn.microsoft.com/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions)
  找到。您可以使用 PowerShell cmdlet `Set-AzSqlDatabaseAudit` 来启用其他操作组。


  对于 SQL Server，通常可以通过 SSMS 或使用系统函数 `sys.fn_get_audit_file` 查看审计。事实证明，对于逻辑服务器上的每个数据库，您也可以执行相同的操作。


