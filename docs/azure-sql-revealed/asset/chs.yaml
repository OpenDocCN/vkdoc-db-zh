  从这些结果中，您可以看到我不同的连接。请注意托管标识以及我的 Microsoft Entra 管理员帐户的 GUID 值。您可以单击查询编辑器中的“运行”以查看这些结果背后的
  SQL 查询，该查询使用 `sys.fn_get_audit_file` 系统过程从我为审计配置的 Azure 存储帐户中读取数据，其结果与上一个屏幕中的审计记录相同。您还可以使用命令菜单中的“Log
  Analytics”选项，通过不同技术查看审计结果。此选项可为您的安全审计提供更直观的表示。更多信息请访问 [`https://learn.microsoft.com/azure/azure-sql/database/auditing-analyze-audit-logs?view=azuresql#analyze-logs-using-log-analytics`](https://learn.microsoft.com/azure/azure-sql/database/auditing-analyze-audit-logs?view=azuresql#analyze-logs-using-log-analytics)。


