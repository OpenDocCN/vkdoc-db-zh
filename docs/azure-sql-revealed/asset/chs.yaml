  ### 漏洞评估


  保护数据的另一个方面是主动监控和检查任何已知的安全漏洞。但什么是已知漏洞？Azure SQL 拥有一个我们构建的规则知识库（基于来自 [`https://www.cisecurity.org/cis-benchmarks/`](https://www.cisecurity.org/cis-benchmarks/)
  的行业标准），用于扫描您的 Azure SQL 托管实例和数据库，以查找可能被视为脆弱的配置。我喜欢把漏洞评估看作像病毒扫描程序，它使用*扫描*方法来查找可能的问题。我正在为漏洞评估使用一种名为
  `快速配置` 的方法。这种新方法现在是默认方法，不需要任何存储来存储结果（经典配置则需要）。


  图 6-25 显示了我的逻辑服务器上的漏洞评估。


  ![](img/496204_2_En_6_Fig25_HTML.jpg)

  图 6-25 逻辑服务器上的漏洞评估


  在此屏幕上，我可以看到发现结果、基本检查信息、它们关联的基准以及严重性。请注意，在命令菜单上，我可以启动手动扫描（漏洞评估通常每周安排一次）并查看扫描历史记录。扫描是轻量级且安全的。它需要几秒钟运行，并且完全是只读的。它不会对您的数据库进行任何更改。


