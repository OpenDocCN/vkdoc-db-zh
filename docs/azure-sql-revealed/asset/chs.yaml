  \ – 这是我最近构建的一个研讨会，用于关于 `Azure SQL`（包括 `Azure VM`、`托管实例` 和 `Azure SQL Database`）的现场全天研讨会。它包含自主进度实验和完整的\
  \ PowerPoint 幻灯片。\n- Anna 还主持了一个名为 `Data Exposed` 的视频系列，其中工程团队成员讨论了 `Azure SQL`\
  \ 和 `SQL Server` 的各个方面。在 [`https://aka.ms/dataexposed`](https://aka.ms/dataexposed)\
  \ 查看这个系列。\n\n## 总结\n\n在本章中，你通过查看与 `SQL Server` 相比的功能（如链接服务器和 `Database Mail`）、理解作业管理的选项、探索支持部署的方法以及回顾使用\
  \ `Azure SQL` 的最佳实践，扩展了你对 `Azure SQL` 的知识。\n\n那么，关于 `Azure SQL` 还有什么需要学习的呢？如果你还记得，我在第\
  \ 1 章和第 2 章提到了 `Azure SQL` 中超越传统 `关系数据库管理系统` (`RDBMS`) 的新能力。继续阅读本书的最后一章，*超越 RDBMS*。\n\
  \n\n\n"
- "# 10. 超越关系数据库管理系统\n\n2023 年夏天，我试图想出一种方法来描述我们在 Azure SQL 中所拥有的一些强大功能，这些功能是“开箱即用”的，但同时也是传统关系数据库管理系统通常不具备的特性。“超越”这个词自然而然地浮现在我脑海中，用以描述这种情况。于是，我（还是老派作风）开始在纸上勾画出两栏：\n\
  \n*   哪些功能是内置于数据库中的，而在许多情况下可能需要插件或其他产品？我将它们列在了左侧。\n*   哪些功能超出了许多人对传统关系数据库管理系统的认知？这些列在右侧。\n\
  \n勾画完这些之后，我制作了一张幻灯片，如图 10-1 所示，来描述所有内容。\n\n![](img/496204_2_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1\n\nAzure SQL 超越关系数据库管理系统\n\n本章将更详细地描述你在此图中看到的内容。左侧列出的一些功能我们在本书中已经讨论过，但对它们进行一次总结会很有益。\n\
  \n本章将包含供你尝试和阅读时使用的示例。要尝试本章中使用的任何技术、命令或示例，你需要：\n\n*   一个 Azure 订阅。\n*   至少拥有该 Azure\
  \ 订阅的“贡献者”角色访问权限。你可以在 [`learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles)\
  \ 了解更多关于 Azure 内置角色的信息。\n*   访问 Azure 门户的权限。\n*   在本章中，我将使用 Azure SQL Database，因为许多这些功能已为该服务启用，但其中许多功能现在已经或将作为\
  \ Azure SQL Managed Instance 的一部分。\n*   要连接到 Azure SQL Database，我将使用我在第 3 章部署的名为\
  \ `bwsql2022` 的 Azure 虚拟机，并在第 6 章为其配置了专用终结点（你可以使用其他方法，只要能连接到 Azure SQL Database\
  \ 即可）。你可以使用任何你喜欢的方法，只要能连接到 Azure SQL Database。\n*   本章中你会看到一些 T-SQL，因此请安装一个工具，如\
  \ SQL Server Management Studio (SSMS)，下载地址为 [`aka.ms/ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms%253Fview%253Dsql-server-ver15)。\n\
  *   在本书撰写时，我将在此展示的一些功能处于预览状态且未公开提供。但未来它们会公开，因此我在本章中列出了资源供你了解我们的最新进展，以便你将来可以访问它们。\n\
  \n## “这是‘箱中自带’的功能吗？”\n\n图 10-1 的左侧代表内置于 Azure SQL 服务中的功能，所有这些功能都集成到数据库引擎和 T-SQL\
  \ 语言中。\n\n让我们通过一些示例，逐一了解图 10-1 左侧的每个功能。\n\n### JSON\n\nJSON 是一种非常流行的数据存储格式，适用于各种类型的应用程序。过去，我们提供了一系列\
  \ T-SQL 函数来处理和查看 JSON 格式的数据，包括以下能力：\n\n*   解析 JSON 文本并读取或修改值。\n*   将 JSON 对象数组转换为表格格式。\n\
  *   对转换后的 JSON 对象运行任何 Transact-SQL 查询。\n*   将 Transact-SQL 查询的结果格式化为 JSON 格式。\n\n\
  例如，你可以使用 T-SQL 提取 JSON，如下例所示：\n\n```sql\nDECLARE @jsonInfo NVARCHAR(MAX)\nDECLARE\
  \ @town NVARCHAR(32)\nSET @jsonInfo=N'{\"info\":{\"address\":[{\"town\":\"Paris\"\
  },{\"town\":\"London\"}]}}';\nSET @town=JSON_VALUE(@jsonInfo,'$.info.address[0].town');\
  \ -- Paris\nSET @town=JSON_VALUE(@jsonInfo,'$.info.address[1].town'); -- London\n\
  ```\n\n在这些示例中，使用的数据类型是局部变量的字符数据类型，但它也可以是基于字符的列。我们提供了大量用于 JSON 数据的 T-SQL 函数，你可以在\
  \ [`aka.ms/jsonsqlfunctions`](https://aka.ms/jsonsqlfunctions) 查看完整列表。\n\n新出现的是一个\
  \ *原生* JSON 数据类型，在本书撰写时处于预览状态，现在允许你使用相同的 JSON T-SQL 函数集，但使用一种更适用于 JSON 文档的类型。\n\n\
  这种原生 JSON 类型，称为 `json`，比使用字符列更高效，因为它提供：\n\n*   更高效的读取，因为文档已被解析。\n*   更高效的写入，因为查询可以更新单个值而无需访问整个文档。\n\
  *   更高效的存储，针对压缩进行了优化。\n*   与现有代码的兼容性无变化。\n\nJSON 类型内部使用 UTF-8 编码 `Latin1_General_100_BIN2_UTF8`\
  \ 存储数据。此行为符合 JSON 规范。\n\n一个在表中使用的示例如下所示。假设你正在存储从应用程序捕获的、以 JSON 格式记录的订单常规信息。最初，你的表定义可能如下（此示例的功劳归于我的同事\
  \ Umachandar Jayachandran（我们称他为 UC））：\n\n```sql\nCREATE TABLE dbo.Orders(\norder_id\
  \ int NOT NULL IDENTITY,\norder_info nvarchar(max) NOT NULL\n)\n```\n\n现在它可以是这样：\n\
  \n```sql\nCREATE TABLE dbo.Orders(\norder_id int NOT NULL IDENTITY,\norder_info\
  \ json NOT NULL\n)\n```\n\n现在，任何描述日志的 JSON 文档都可以原生地直接存储在表中，如下所示：\n\n```sql\nINSERT\
  \ INTO dbo.Orders(order_info)\nVALUES\n(\n'{\n\"OrderNumber\": \"S043659\",\n\"\
  Date\": \"2024-05-24T08:01:00\",\n\"AccountNumber\": \"AW29825\",\n\"Price\": 59.99,\n\
  \"Quantity\": 1}'\n),\n(\n'{\n\"OrderNumber\": \"S043661\",\n\"Date\": \"2024-05-20T12:20:00\"\
  ,\n\"AccountNumber\": \"AW7365\",\n\"Price\": 24.99,\n\"Quantity\": 3}'\n)\n```\n\
  \n如果你查询这些数据，你将看到类似图 10-2 所示的结果。\n\n![](img/496204_2_En_10_Fig2_HTML.jpg)\n\n图 10-2\n\
  \n使用新 JSON 数据类型的结果\n\n现在，你可以使用 JSON 函数从 JSON 格式中提取字段，形成关系型结果，如下列查询所示：\n\n```sql\n\
  SELECT o.order_id, JSON_VALUE(o.order_info, '$.AccountNumber') AS account_number\n\
  FROM dbo.Orders o;\n```\n\n除了帮助构建 JSON 文档外，我们还有两个新的 T-SQL 函数。\n\n#### JSON_ARRAYAGG\n\
  \n根据值的聚合生成一个 JSON 数组。基本上，就是获取多行数据并生成一个包含这些值的单一 JSON 数组。例如，基于上述数据的查询：\n\n```sql\n\
  SELECT JSON_ARRAYAGG(JSON_ARRAY(o.order_info))\nFROM dbo.Orders o;\n```\n\n生成一个单一数组，结果如下：\n\
  \n```json\n[[{\"OrderNumber\":\"S043659\",\"Date\":\"2024-05-24T08:01:00\",\"AccountNumber\"\
  :\"AW29825\",\"Price\":59.99,\"Quantity\":1}],[{\"OrderNumber\":\"S043661\",\"Date\"\
  :\"2024-05-20T12:20:00\",\"AccountNumber\":\"AW7365\",\"Price\":24.99,\"Quantity\"\
  :3}]]\n```\n\n#### JSON_OBJECTAGG\n\n这个函数类似，但在生成作为键/值对的 JSON 文档对象时非常有价值。例如，基于上述数据的查询：\n\
  \n```sql\nSELECT JSON_OBJECTAGG(o.order_id:JSON_OBJECT('AccountNumber':o.order_info))\n\
  FROM dbo.Orders o;\n```\n\n生成如下键/值对：\n\n```json\n{\"1\":{\"AccountNumber\":{\"OrderNumber\"\
  :\"S043659\",\"Date\":\"2024-05-24T08:01:00\",\"AccountNumber\":\"AW29825\",\"Price\"\
  :59.99,\"Quantity\":1}},\"2\":{\"AccountNumber\":{\"OrderNumber\":\"S043661\",\"\
  Date\":\"2024-05-20T12:20:00\",\"AccountNumber\":\"AW7365\",\"Price\":24.99,\"Quantity\"\
  :3}}}\n```\n\n请亲自尝试并访问 [`aka.ms/jsonsql`](https://aka.ms/jsonsql) 了解更多信息。\n\n\n\n\
  ### 正则表达式\n\nSQL Server 自带了诸如 `LIKE` 之类的 T-SQL 运算符以及一系列 T-SQL “字符串”函数。但多年来，社区一直呼吁我们将正则表达式（RegEx）直接内置到\
  \ T-SQL 语言中。\n\n注意\n关于正则表达式的入门知识，我建议你阅读这篇文档文章：[`https://learn.microsoft.com/dotnet/standard/base-types/regular-expression-language-quick-reference`](https://learn.microsoft.com/dotnet/standard/base-types/regular-expression-language-quick-reference)。\n\
  \n我很高兴看到我们在 2024 年春季宣布了这项功能。截至本书撰写时，它仍处于预览版，因此除了我们在以下博客中宣布此新功能的文章外，没有其他文档参考：[`https://devblogs.microsoft.com/azure-sql/introducing-regular-expression-regex-support-in-azure-sql-db`](https://devblogs.microsoft.com/azure-sql/introducing-regular-expression-regex-support-in-azure-sql-db)。\n\
  \n注意\n这些示例仅在你于本书撰写时参与了预览计划的情况下才有效。\n\n以下是你可以从该博客中看到的一个很好的例子：\n\n```sql\n-- 创建包含一些记录以及针对\
  \ Email 和 Phone_Number 列的检查约束的 Employees 表\nDROP TABLE IF EXISTS Employees\nCREATE\
  \ TABLE Employees (\nID INT IDENTITY(101,1),\n[Name] VARCHAR(150),\nEmail VARCHAR(320)\n\
  CHECK (`REGEXP_LIKE`(Email, '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$')),\n\
  Phone_Number VARCHAR(20)\nCHECK (`REGEXP_LIKE` (Phone_Number, '^(\\d{3})-(\\d{3})-(\\\
  d{4})$'))\n);\n-- 插入一些示例数据\nINSERT INTO Employees ([Name], Email, Phone_Number)\
  \ VALUES\n('John Doe', 'john@contoso.com', '123-456-7890'),\n('Alice Smith', 'alice@fabrikam.com',\
  \ '234-567-8901'),\n('Bob Johnson', 'bob@fabrikam.net','345-678-9012'),\n('Eve Jones',\
  \ 'eve@contoso.com', '456-789-0123'),\n('Charlie Brown', 'charlie@contoso.co.in',\
  \ '567-890-1234');\n-- 查找所有邮箱地址以 .com 结尾的员工\nSELECT [Name], Email\nFROM Employees\n\
  WHERE `REGEXP_LIKE`(Email, '\\.com$');\n```\n\n`REGEXP_LIKE`()` 可以取代传统的 `LIKE` 运算符，以提供更丰富的模式匹配体验。此查询的结果如图\
  \ 10-3 所示。\n\n![](img/496204_2_En_10_Fig3_HTML.jpg)\n*图 10-3：正则表达式搜索的结果*\n\n同时请注意在\
  \ `CREATE TABLE` 语句中，使用了 `REGEXP_LIKE` 来强制规定电话号码和电子邮件的格式。\n\n### 空间与图形\n\n空间数据类型已在\
  \ SQL Server 中存在多个版本。但我发现很多用户常常不知道它们的存在。空间数据类型内部基于 SQLCLR，并支持以下数据类型：\n*   `geometry`\
  \ 类型在欧几里得（平面）坐标系中表示数据。\n*   `geography` 类型在球面坐标系中表示数据。\n\n因此，无需使用其他产品与 SQL 集成，这些类型本身就具备空间智能，并内置于引擎和\
  \ T-SQL 语言中。\n\n这些类型是*对象*，这意味着它们包含值以及可对值执行的方法。例如，`geography` 类型具有诸如 `STDistance`\
  \ 之类的方法，可用于查找一个 `geography` 实例中的点与另一个 `geography` 实例中的点之间的最短距离。\n\n通过 [`https://aka.ms/sqlspatial`](https://aka.ms/sqlspatial)\
  \ 了解更多关于 SQL 空间数据类型的所有细节。\n\n并非所有数据都能整齐地放入关系型表集合中。实际上，有一种数据模式是图。考虑一个包含人员、他们喜欢特定城市餐馆的数据网络。表示此数据并*遍历*网络的一种简单方法是使用如图\
  \ 10-4 所示的图。\n\n![](img/496204_2_En_10_Fig4_HTML.jpg)\n*图 10-4：表示为图的数据网络*\n\n图数据库是一种专用数据库，用于处理以此方式表示的数据。对于\
  \ Azure SQL，我们已将图功能内置到引擎和 T-SQL 语言中。\n\nT-SQL 已被扩展，可将表定义为 `nodes`（节点）和 `edges`（边）。在图\
  \ 10-4 中，`Person`、`City` 和 `Restaurant` 是节点表。`LivesIn`、`Likes`、`LocatedIn` 和 `Friends`\
  \ 是边表。有了此数据存储，你现在可以使用新的语法通过 `MATCH` 关键字进行搜索，如以下示例所示：\n\n```sql\n-- 查找 John 喜欢的餐馆\n\
  SELECT Restaurant.name\nFROM Person, likes, Restaurant\nWHERE MATCH (Person-(likes)->Restaurant)\n\
  AND Person.name = 'John';\n```\n\n通过 [`https://aka.ms/sqlgraph`](https://aka.ms/sqlgraph)\
  \ 了解如何开始使用图数据。\n\n### 列存储与内存优化\n\n我在本书第 7 章中提到过列存储索引，但绝对值得重申，因为我看到这项技术被严重低估。列存储索引的效果简直令人惊叹。我仍然不断看到客户未能充分利用这项功能。对于合适的工作负载，列存储索引可以将读取查询性能提升\
  \ 100 倍。你选择的任何 Azure SQL 部署选项都支持列存储索引。关于列存储的一个误解是它*只*是一种内存中技术。事实是，当列存储索引适合内存并使用压缩时，其性能最佳，因此更多数据可以容纳在内存限制内。然而，列存储索引并不要求全部数据都必须装入内存。这里有一个证明这项技术重要性的例子：我们在所有的\
  \ TPC-H 基准测试中都使用了列存储索引（[`https://www.tpc.org/tpch/results/tpch_perf_results5.asp?resulttype=noncluster&version=3`](https://www.tpc.org/tpch/results/tpch_perf_results5.asp%253Fresulttype%253Dnoncluster%2526version%253D3)）。要开始使用列存储索引，请参阅\
  \ [`https://aka.ms/sqlcolumnstore`](https://aka.ms/sqlcolumnstore) 的文档。\n\n我还在本书第\
  \ 7 章中提到了内存中 OLTP 的内存优化功能。这也值得重申，因为这项技术有许多用例，并且它已内置于 Azure SQL 的数据库引擎中。内存中 OLTP\
  \ 通过内存优化表来体现。内存优化表仅在业务关键型服务层中可用。但是，Azure SQL 数据库的超大规模层确实允许使用内存优化表变量，这对存储过程很有用。通过\
  \ [`https://aka.ms/sqlmemoryoptimized`](https://aka.ms/sqlmemoryoptimized) 了解更多信息。\n\
  \n### 总账本\n\n我在本书第 6 章中介绍了总账本（Ledger）主题，官方称为 SQL 总账本。SQL 总账本允许你使用 T-SQL 创建一个带有额外语法\
  \ `WITH LEDGER = ON` 的表，然后我们将自动使用时态表技术来跟踪该表的所有更改。我们将为你构建一个更改历史记录表和一个视图，该视图允许你查看当前表以及历史更改。这与时态表不同，因为我们还包括一个数据库总账本和一个摘要，通过加密哈希值为你提供对谁进行了更改的审核以及验证数据是否被篡改的方法。通过\
  \ [`https://aka.ms/sqlledger`](https://aka.ms/sqlledger) 了解更多信息。\n\n\n### 查询智能\n\
  \n查询智能包含内置于数据库引擎中以使您的应用程序运行更快的功能，称为**智能查询处理** (`IQP`)，以及利用引擎的功能，如 `Automatic Tuning`。\n\
  \n我在本书的第 7 章中广泛介绍了这个主题。请在 [`https://aka.ms/iqp`](https://aka.ms/iqp) 了解更多关于 `IQP`\
  \ 的信息。请在 [`https://aka.ms/sqlautotuning`](https://aka.ms/sqlautotuning) 了解更多关于 `Automatic\
  \ Tuning` 的信息。\n\n本书第一版以来新增的一个尚未涉及的增强功能是优化的锁定。`Azure SQL Database` 现在拥有一个改进的锁管理系统，称为**优化锁定**。通过使用加速数据库恢复（版本控制）和**已提交读快照隔离**\
  \ (`RCSI`) 等功能，优化锁定减少了大型事务所需的锁数量，从而减少了锁内存和锁升级。任何受到锁升级困扰的开发人员都会欣赏现在内置于引擎中以消除它们的功能。请在\
  \ [`https://learn.microsoft.com/sql/relational-databases/performance/optimized-locking`](https://learn.microsoft.com/sql/relational-databases/performance/optimized-locking)\
  \ 阅读更多信息。\n\n## REST API 集成\n\n在引擎内部连接您的 SQL 数据有很多优势：\n\n*   您可以利用引擎的安全性，使用您所熟知的所有标准安全原则和访问控制。\n\
  *   像存储过程一样，您减少了应用程序流量，并使用服务器端编程模型使数据集成更加高效。\n\n我觉得 `Polybase` 具有类似的优势。借助 `Azure\
  \ SQL`，我们构建了一个新功能来对接任何 `REST API` 端点。代号为 Project Solaria，我们现在有一个名为 `sp_invoke_external_rest_endpoint`\
  \ 的系统存储过程，用于向 `REST API` 端点发送有效负载并接收响应（输出）。下面是我同事 Davide Mauri 在 2022 年我们首次发布此功能的公开预览版时制作的图\
  \ 10-5 中的图表。\n\n![](img/496204_2_En_10_Fig5_HTML.jpg)\n\n图 10-5\n\n最初的 Solaria 项目\n\
  \n该解决方案是通用的，因为您可以将 `JSON`、`XML` 或 `TEXT`（取决于端点的协议）发送到任何 `REST API` 以实现特定目的。`REST\
  \ API` 可以处理输入，并可选择以字符数据形式返回答案（或响应/输出）。根据协议或 `REST API` 端点，字符数据可能是 `JSON`、`XML` 或仅仅是\
  \ `TEXT`。\n\n以下是一个代码片段，用于从数据库表中检索数据，并将数据作为消息发送到 Azure Event Hub（然后可以处理该消息以执行某种操作）：\n\
  \n```sql\nDECLARE @Id UNIQUEIDENTIFIER = NEWID();\nDECLARE @payload NVARCHAR(MAX)\
  \ = (\n    SELECT *\n    FROM (\n        VALUES (@Id, 'John', 'Doe')\n    ) AS UserTable(UserId,\
  \ FirstName, LastName)\n    FOR JSON AUTO,\n    WITHOUT_ARRAY_WRAPPER\n)\nDECLARE\
  \ @url NVARCHAR(4000) = 'https://.servicebus.windows.net/from-sql/messages';\nDECLARE\
  \ @headers NVARCHAR(4000) = N'{\"BrokerProperties\": \"' + STRING_ESCAPE('{\"PartitionKey\"\
  : \"' + CAST(@Id AS NVARCHAR(36)) + '\"}', 'json') + '\"}'\nDECLARE @ret INT, @response\
  \ NVARCHAR(MAX);\nEXEC @ret = sp_invoke_external_rest_endpoint @url = @url,\n  \
  \  @headers = @headers,\n    @credential = [https://.servicebus.windows.net],\n\
  \    @payload = @payload,\n    @response = @response OUTPUT;\nSELECT @ret AS ReturnCode,\
  \ @response AS Response;\n```\n\n输入是可选的，因为一些 `REST API` 端点可用于“获取”数据。以下是从 Azure 存储文件中检索数据的示例：\n\
  \n```sql\nDECLARE @ret INT, @response NVARCHAR(MAX);\nEXEC @ret = sp_invoke_external_rest_endpoint\n\
  \    @url = N'https://blobby.blob.core.windows.net/datafiles/my_favorite_blobs.txt?sp=r&st=2023-07-28T19:56:07Z&se=2023-07-29T03:56:07Z&spr=https&sv=2022-11-02&sr=b&sig=XXXXXX1234XXXXXX6789XXXXX',\n\
  \    @headers = N'{\"Accept\":\"application/xml\"}',\n    @method = 'GET',\n   \
  \ @response = @response OUTPUT;\nSELECT @ret AS ReturnCode, @response AS Response;\n\
  ```\n\n我们支持一组已知的端点，但完整的列表请见 [`https://learn.microsoft.com/sql/relational-databases/system-stored-procedures/sp-invoke-external-rest-endpoint-transact-sql?view=azuresqldb-current&tabs=request-headers#allowed-endpoints`](https://learn.microsoft.com/sql/relational-databases/system-stored-procedures/sp-invoke-external-rest-endpoint-transact-sql?view=azuresqldb-current&tabs=request-headers#allowed-endpoints)。\n\
  \n当我们最初构建此功能时，我们并未像今天这样专注于 GenAI 应用程序。然而，您可以想象现在一个巨大的焦点是 AI。幸运的是，许多 AI 托管引擎或推理端点都支持\
  \ `REST`。您将在本章后面的“SQL 和 AI”部分看到如何使用此功能在 `Azure SQL` 内部构建任何 AI 应用程序。\n\n在撰写本书时，`sp_invoke_external_rest_endpoint`\
  \ 对于 `Azure SQL Database` 已正式发布，对于 `Azure SQL Managed Instance` 处于预览阶段。我的同事 Brian\
  \ Spendolini 是此功能的首席产品经理，请关注他的博客以查看更多示例：[`https://devblogs.microsoft.com/azure-sql/author/bspendolini`](https://devblogs.microsoft.com/azure-sql/author/bspendolini)。\n\
  \n\n## 数据 API 生成器与 GraphQL\n\n任何需要编写代码与数据库交互的开发者都知道，无论你使用哪种编程语言，连接和查询数据库总会有一些额外的工作。使用数据库通常涉及*身份验证*和运行*查询*（或存储过程）。使这一切得以实现的代码有时被称为*样板*代码。\n\
  \n如果有一种更简单的方法来构建应用程序，并减少甚至消除这些样板代码呢？**数据 API 生成器**（DAB）应运而生。DAB 是跨平台的、开源的，并且独立于语言、技术和框架。它需要零代码和单个配置文件。最重要的是，它是免费的（你可以在\
  \ [`https://github.com/Azure/data-api-builder`](https://github.com/Azure/data-api-builder)\
  \ 查看开源的 GitHub 仓库）。\n\n展示其工作原理的最佳方式是通过图表，文档在图 10-6 中提供了一个非常好的示意图。\n\n![](img/496204_2_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6\n\n数据 API 生成器 (DAB) 架构\n\n虽然 DAB 可以与其他数据库配合使用，但我将重点介绍它如何与 Azure SQL 协同工作。\n\
  \nDAB 是一个软件运行时（可以作为独立服务运行，也可以在 Azure 静态 Web 应用等应用程序内运行），它有效地将你对连接和架构的配置转换为支持 GraphQL\
  \ 或 REST 的端点。你可能听说过 REST，但如果不熟悉 GraphQL，可以在 [`https://graphql.org`](https://graphql.org)\
  \ 学习基础知识。你也可以选择在容器中运行 DAB。\n\n作为应用程序开发者，你现在可以编写 REST 或 GraphQL 格式的文本或命令，DAB 会通过驱动程序将其转换为实际的后端数据库调用，以连接并执行查询。\n\
  \n我喜欢文档中的这个例子来展示一些基础知识：[`https://learn.microsoft.com/azure/data-api-builder/database-objects#stored-procedures`](https://learn.microsoft.com/azure/data-api-builder/database-objects%2523stored-procedures)。\n\
  \n在这个示例中，有一个包含 books 和 authors 表的数据库（完整架构可以在 [`https://github.com/Azure/data-api-builder/tree/main/samples/getting-started/azure-sql-db`](https://github.com/Azure/data-api-builder/tree/main/samples/getting-started/azure-sql-db)\
  \ 找到）。假设你有一个选择某位作者所著书籍的存储过程。使用 DAB 和 REST，你可以组合出如下字符串：\n\n```\nGET http:///api/GetCowrittenBooksByAuthor?author=isaac%20asimov\n\
  ```\n\n这将调用参数为“Isaac Asimov”的存储过程，并通过端点将结果返回给调用应用程序。\n\n我认为 DAB 对开发者来说是一个游戏规则的改变者。我相信它可以为你节省时间并提高应用程序质量，因为它减少了你需要编写和维护的代码行数。在\
  \ [`https://aka.ms/dab`](https://aka.ms/dab) 开始你的旅程吧。同时，请观看我的同事、该功能的首席产品经理 Jerry\
  \ Nixon 参与的这期 Data Exposed 节目：[`https://learn.microsoft.com/shows/data-exposed/data-api-builder-is-now-generally-available-data-exposed`](https://learn.microsoft.com/shows/data-exposed/data-api-builder-is-now-generally-available-data-exposed)。\n\
  \n## DevOps、GitHub 与容器\n\n开发者需要具备高效的工具和能力，以构建数据驱动的应用程序。Azure SQL 有三个特性在这些领域为开发者提供支持。\n\
  \n### 数据库项目\n\n开发者需要能够构建数据库项目、创建新数据库、新的数据层应用程序（DAC）以及更新现有数据库和数据层应用程序。这些项目使用诸如 `sqlpackage.exe`、Visual\
  \ Studio 中的 SQL Server 数据工具（SSDT）、DACPAC 和 BACPAC 文件等工具。我们拥有这些技术已有一段时间，以帮助开发者构建包含数据库对象和数据的应用程序。\n\
  \n我们在这个领域取得的一项进步是 **SDK 风格的 SQL 项目**。SDK 风格的 SQL 项目对于通过流水线交付或在跨平台环境中构建的应用程序尤其有利。\n\
  \n我的同事 Drew Skwiers-Koballa 在这篇精彩的博文 [`https://techcommunity.microsoft.com/t5/azure-sql-blog/microsoft-build-sql-the-next-frontier-of-sql-projects/ba-p/3290628`](https://techcommunity.microsoft.com/t5/azure-sql-blog/microsoft-build-sql-the-next-frontier-of-sql-projects/ba-p/3290628)\
  \ 中解释了 SDK 风格 SQL 项目的区别。总而言之，其优势包括：\n\n*   项目使用“通配符”文件选择（globbing）来选取 .sql 文件。这大大减小了项目定义的规模。\n\
  *   项目可以使用 `dotnet build`，这提供了跨平台兼容性和更简单的体验，包括在 CI/CD 流水线中。\n*   与 GitHub Actions\
  \ 无缝集成，适用于 DevOps 场景。\n\nSDK 风格项目的初始版本随 Visual Studio Code 发布，但我相信未来它会被集成到 Visual\
  \ Studio 中。\n\n### GitHub Actions\n\n任何新的 DevOps 项目都必须有一种通过 CI/CD 流水线进行代码开发、测试和发布到生产的高效方法。\n\
  \n我们目前通过 Azure DevOps 和 Azure Pipelines 支持这一过程，你可以在 [`https://learn.microsoft.com/azure/devops/pipelines/targets/azure-sqldb`](https://learn.microsoft.com/azure/devops/pipelines/targets/azure-sqldb)\
  \ 阅读相关内容。\n\nGitHub 已经成为开发的行业标准，因此我们觉得有必要支持相同类型的 DevOps 能力。因此，我们构建了一个与 GitHub Actions（[`https://docs.github.com/actions`](https://docs.github.com/actions)）集成的功能，称为\
  \ **sql-action**。\n\n`sql-action` 允许你通过 YAML 文件（`.yml`）声明一组步骤，以使用 SDK 风格的 SQL 项目、容器和\
  \ `sqlcmd` 来帮助运行测试，从而构建和测试你的数据库项目。\n\n注意\n\n`sql-action` 使用 `go-sqlcmd` 来获得 `sqlcmd`\
  \ 功能。`go-sqlcmd`（也被称为 `sqlcmd`——我知道这很令人困惑）是基于 Go 语言构建的新版本 `sqlcmd`，并且是完全开源的。完整故事请见\
  \ [`https://github.com/microsoft/go-sqlcmd`](https://github.com/microsoft/go-sqlcmd)。\n\
  \n我想测试一下这里可以实现什么，因此构建了一个示例，你可以在 [`https://github.com/microsoft/bobsql/tree/master/demos/devops_sqlcontainers/githubactions`](https://github.com/microsoft/bobsql/tree/master/demos/devops_sqlcontainers/githubactions)\
  \ 亲自尝试。\n\n我在这里的想法是使用 GitHub Actions 在 Azure SQL 数据库中创建数据库和所有数据库对象。但我首先使用 GitHub\
  \ Actions 在 SQL Server 2002 容器中进行了测试。而最神奇的部分是：GitHub 支持一个称为 *运行器* 的概念。这允许我在虚拟机或容器中免费测试我的代码和\
  \ SQL 数据库！（如果你需要更大的规模，你可以升级到付费版本。）\n\n在我的场景中，我期望我的 GitHub Action 运行一个“冒烟测试”，以确保特定查询的性能是可接受的，并且没有遇到任何警告，例如检测到反模式查询。\n\
  \n对数据库对象（如存储过程）的任何更改，当提交到 GitHub 仓库时都会被自动检测到。该操作自动启动并运行我的“冒烟测试”。如果检测到问题，操作会失败，提交也会失败。Drew\
  \ 在 [`https://github.com/Azure/sql-action`](https://github.com/Azure/sql-action)\
  \ 创建了一套很好的文档来说明这一点。\n\n\n"
- "# 容器\n\n在过去几年里，容器是我所见过最出色的开发者创新之一。SQL Server 已作为容器得到完全支持，我在 *Pro SQL Server Linux*、*SQL\
  \ Server 2019 Revealed* 和 *SQL Server 2022 Revealed* 这几本书中广泛讨论了这个主题。容器使得打包 *解决方案*\
  \ 变得如此简单，包括那些与 SQL Server 集成的解决方案。\n\n对于 Azure SQL，我们最近发布了一个名为 `Azure SQL 数据库的开发容器模板`\
  \ 的概念，这是一个由我的同事 Carlos Robles 主导的项目。在上面列出的书中，我谈到 SQL 容器的一个主要优势是 *一致性*。我可以部署一个具有一致版本的\
  \ SQL 容器，甚至可以包含特定的数据库脚本或任何我想要的工具，这样环境就能跨平台（Linux、MacOS、Windows）或多云环境下，始终如一地满足我的要求。\n\
  \n开发容器模板扩展了这个概念，确保我拥有一个完全一致的开发环境，包括 SQL Server、开发者框架，甚至允许使用 SDK 风格 SQL 项目的开发者工具。此外，它们还与我们的\
  \ GitHub `sql-action` 实现了无缝集成。\n\n请阅读 Carlos 的这篇博客来了解该主题：[`https://devblogs.microsoft.com/azure-sql/azure-sql-dev-containers`](https://devblogs.microsoft.com/azure-sql/azure-sql-dev-containers)。\n\
  \n> **注意**\n>\n> 当我上次与 Carlos 交流时，我们正在考虑的一个想法是打造一个*行为*类似 Azure SQL 数据库的 SQL 容器。换句话说，该容器将是一个无版本之分的数据库引擎，其功能和限制与\
  \ Azure SQL 数据库相匹配，从而为您提供与云极佳的兼容性。\n\n## SQL 与 AI\n\n我在本书第 7 章中讲述了我们在 Azure SQL\
  \ 数据库中设计和构建 Microsoft Copilot 技能的故事。同样在 2023 年夏天，我们的团队深知需要在 Azure SQL 上进行投资，以支持生成式\
  \ AI (GenAI) 应用程序。我们的 Copilot 是一个 AI 助手，也是 GenAI 应用程序的一个好例子。实际上，这个应用程序使用了检索增强生成\
  \ (RAG) 模式。RAG 模式是指应用程序*增强*发送给语言模型的提示。\n\n我们也知道，GenAI 应用程序的一个常用技术是使用 `embeddings`\
  \ 的概念来执行 `向量搜索`（有时也称为相似性搜索）。嵌入是由 AI 模型生成的向量，并由 AI 模型理解。它们对于对数据执行*更智能*的搜索非常强大。用于此目的的大多数\
  \ AI 模型被称为语言模型，其规模从大型语言模型 (LLM) 到小型语言模型 (SLM) 不等。\n\n图 10-7 是我经常展示如何将这个故事组合在一起的示意图。\n\
  \n![](img/496204_2_En_10_Fig7_HTML.jpg)\n\n*图 10-7. 结合数据库的 GenAI 应用程序基础*\n\n这个示意图主要需要关注两个概念：\n\
  \n*   您可以使用标准的 SQL 搜索技术来获取数据上下文，并用这些数据结果增强提示，然后发送给语言模型，从而构建 RAG 模式应用程序。\n*   或者，您可以使用语言模型根据数据库中的文本数据生成嵌入，并将其作为向量存储在表的列中。这使得\
  \ SQL 现在成为一个支持*原生向量*的*向量存储*。然后，您可以获取应用程序的提示来生成该文本的嵌入。接着，您可以使用向量搜索将提示的嵌入与数据库中的嵌入进行比较。有些模型是专门为此目的设计的，称为嵌入模型（许多通用语言模型也可以生成嵌入，但嵌入模型通常更精确）。使用\
  \ SQL 来实现这种方法有优势，因为您可以将向量搜索与标准的 SQL 搜索技术结合起来。我称之为 `混合搜索`。\n\n您可以更进一步，将混合搜索的结果用来增强发送给语言模型的提示，从而创建更精确的\
  \ RAG 模式。\n\n现在，让我们看看如何使用这些技术通过 SQL 构建 GenAI 应用程序的具体方法。此外，我们还将探讨一种使用 Copilot 体验来生成\
  \ SQL 查询的不同方式。\n\n### GenAI 与 SQL\n\n要开始使用 GenAI 和 SQL，让我们看一个简单的例子，它与 SQL 引擎内的 AI\
  \ 模型进行交互。此示例使用了我在本章前面描述过的 REST API 支持，它来源于我的同事 Brian Spendolini 的一篇博客文章：[`https://devblogs.microsoft.com/azure-sql/using-openai-rest-endpoints-with-azure-sql-database`](https://devblogs.microsoft.com/azure-sql/using-openai-rest-endpoints-with-azure-sql-database)：\n\
  \n```sql\n-- 声明一个变量来存储 API 端点\ndeclare @url nvarchar(4000)\n= N'https://skynetbeta.openai.azure.com/openai/deployments/chattykathy/chat/completions?api-version=2023-07-01-preview';\n\
  declare @headers nvarchar(102) = N'{\"api-key\":\"1001001sos1001001indistress\"\
  }'\n-- 声明一个变量来存储 POST 请求的有效负载（请求体）。\ndeclare @payload nvarchar(max) = N'{\"messages\"\
  :[[{\"role\":\"system\",\"content\":\"You are an AI assistant that helps people\
  \ find information.\"},\n{\"role\":\"system\",\"content\":\"Why is the sky blue?\"\
  }]}'\n-- 声明用于存储过程返回状态和 API 响应内容的变量\ndeclare @ret int, @response nvarchar(max);\n\
  exec @ret = sp_invoke_external_rest_endpoint\n@url = @url,\n@method = 'POST',\n\
  @headers = @headers,\n@payload = @payload,\n@timeout = 230,\n@response = @response\
  \ output;\n-- 显示存储过程的返回代码和 API 的响应\nselect @ret as ReturnCode, @response as Response;\n\
  ```\n\n在这个例子中，AI 模型的 URL 是虚构的。在本节后面，您将看到一个 Azure 中 OpenAI 模型的例子。这里的一个关键点是，您可以通过\
  \ REST 端点向任何 AI 模型发送*提示*。在这个案例中，我们只是向一个*语言模型*提出一个问题。请注意，输入或有效负载包含一个提供行为指令的系统消息和一个问题。\n\
  \n以下是 JSON 格式的响应片段：\n\n```json\n\"choices\": \n{\n\"index\": 0,\n\"finish_reason\"\
  : \"stop\",\n\"message\": {\n\"role\": \"assistant\",\n\"content\": \"The sky appears\
  \ blue because when the sun's light enters Earth's atmosphere,\nit is scattered\
  \ by the gases and particles in the air. This scattering causes the shorter\nblue\
  \ wavelengths of light to be dispersed more than the other colors in the spectrum.\n\
  This is known as Rayleigh scattering. As a result, when we look up at the sky during\n\
  the day, we see it as blue.\"\n},\n```\n\n这个例子可能并不代表您会如何使用 SQL 与语言模型交互，所以让我们看看您可以用于\
  \ Azure SQL 上 GenAI 应用程序的三种类型方法，如图 [10-8 所示。\n\n![](img/496204_2_En_10_Fig8_HTML.jpg)\n\
  \n*图 10-8. Azure SQL 的 AI 场景*\n\n让我们进一步探讨图中的场景和其他概念。\n\n\n#### 使用 AI 服务\n\n第一个场景常用于构建\"\
  与你的数据聊天\"的体验，其组件位于 SQL 之外。图 10-9 展示了这些组件如何协同工作的示意图。\n\n![](img/496204_2_En_10_Fig9_HTML.jpg)\n\
  \n图 10-9：将 Azure AI 服务与你的数据结合使用\n\nAzure OpenAI 服务与 Azure AI 搜索索引紧密集成。在此场景中，你可以基于\
  \ Azure SQL 数据库表构建 Azure AI 搜索索引。在构建索引时，可以对该索引应用`技能`。其中一项技能是根据表中的列在索引中生成嵌入。你还可以应用其他技能，包括内容审核，以剔除任何个人身份信息（PII）。\n\
  \n构建好此索引后，你现在可以构建一个生成式 AI 应用程序，使用带有嵌入的向量搜索或 RAG（检索增强生成）模式来查询索引。一个简单的方法是使用 Azure\
  \ AI Studio。该工具允许你测试各种类型的提示，这些提示会被转换为针对索引的向量和/或混合搜索。你可以使用`聊天演练场`，如图 10-10 所示。\n\n\
  ![](img/496204_2_En_10_Fig10_HTML.jpg)\n\n图 10-10：测试 Azure 搜索索引的聊天演练场示例\n\n注意，提示是一个使用了诸如“紧预算”和“吸引人”等词语的不精确问题。这正是语言模型大放异彩的地方，因为它们能理解这些词语，并可以使用嵌入找到正确的结果，并以非常易于理解的方式进行格式化。你甚至可以在演练场中进行测试，并构建一个简单的应用程序或在你数据上构建你自己的`Copilot`。\n\
  \n同时请注意，在图 10-10 中，Azure AI 搜索索引可以使用 Azure SQL 支持的变更数据捕获（CDC）等功能，从底层 SQL 数据中自动更新。\n\
  \n有关如何亲自尝试的端到端步骤，请参阅[`https://aka.ms/sqlaisamples`](https://aka.ms/sqlaisamples)。\n\
  \n#### 使用 T-SQL 进行混合搜索\n\n利用我在图 10-7 及本章前面描述的概念，你可以使用 T-SQL 中的新功能在 SQL 内部执行混合搜索，包括使用\
  \ REST API 和新的 T-SQL 函数来处理嵌入。\n\n我的同事 Pooja Kamath 和 Davide Mauri 撰写了一篇博客文章，宣布了`原生向量支持`的私人预览版，你可以在[`https://devblogs.microsoft.com/azure-sql/announcing-eap-native-vector-support-in-azure-sql-database`](https://devblogs.microsoft.com/azure-sql/announcing-eap-native-vector-support-in-azure-sql-database)阅读。\n\
  \n在此示例中，概念是：\n\n- 使用 REST API 调用 Azure OpenAI 的嵌入模型，根据数据库中的文本（对食物的客户评论）生成嵌入。嵌入以\
  \ JSON 格式返回。\n- 使用新的 T-SQL 支持将 JSON 中的嵌入转换为二进制格式，并将其存储在`varbinary`列中。\n- 从应用程序获取提示，使用\
  \ REST API 获取提示的嵌入并将其转换为二进制。\n- 使用称为`向量距离`的概念，对提示和数据库中的评论进行向量搜索比较，如下所示：\n\n```\n\
  --假设你有一个存储过程，用于获取给定文本的嵌入\nDECLARE @e VARBINARY(8000);\nEXEC dbo.GET_EMBEDDINGS @model\
  \ = '', @text = 'healthy options instead of coke', @embedding = @e OUTPUT;\nSELECT\
  \ TOP(10) ProductId,\nSummary,\nText,\nVECTOR_DISTANCE('cosine',@e, VectorBinary)\
  \ AS Distance\nFROM dbo.FineFoodReviews\nORDER BY Distance;\n```\n\n距离数值越小，搜索结果越`相似`。在此示例中，我们构建了一个\
  \ SQL 存储过程`GET_EMBEDDINGS`，它在后台使用 REST API 和语言模型，如下所示：\n\n```\nCREATE PROCEDURE\
  \ [dbo].[GET_EMBEDDINGS]\n(\n@model VARCHAR(MAX),\n@text NVARCHAR(MAX),\n@embedding\
  \ VARBINARY(8000) OUTPUT\n)\nAS\nBEGIN\nDECLARE @retval INT, @response NVARCHAR(MAX);\n\
  DECLARE @url VARCHAR(MAX);\nDECLARE @payload NVARCHAR(MAX) = JSON_OBJECT('input':\
  \ @text);\n-- 在 EXEC 语句之前，使用正确的连接设置@url 变量\nSET @url = 'https://.openai.azure.com/openai/deployments/'\
  \ + @model + '/embeddings?api-version=2023-03-15-preview';\nEXEC dbo.sp_invoke_external_rest_endpoint\n\
  @url = @url,\n@method = 'POST',\n@payload = @payload,\n@headers = '{\"Content-Type\"\
  :\"application/json\", \"api-key\":\"\"}',\n@response = @response OUTPUT;\n-- 使用\
  \ JSON_QUERY 直接提取嵌入数组\nDECLARE @jsonArray NVARCHAR(MAX) = JSON_QUERY(@response,\
  \ '$.result.data[0].embedding');\nSET @embedding = JSON_ARRAY_TO_VECTOR(@jsonArray);\n\
  END\nGO\n```\n\n既然你能获取向量距离，就可以将其与其他 SQL 搜索方法或混合搜索结合使用，如下所示：\n\n```\n-- 假设你有一个存储过程，用于获取给定文本的嵌入\n\
  DECLARE @e VARBINARY(8000);\nEXEC dbo.GET_EMBEDDINGS @model = '', @text = 'quick\
  \ fix breakfast option for toddlers', @embedding = @e OUTPUT;\n-- 包含多个过滤器的综合查询。\n\
  SELECT TOP(10)\nf.Id,\nf.ProductId,\nf.UserId,\nf.Score,\nf.Summary,\nf.Text,\n\
  VECTOR_DISTANCE('cosine', @e, VectorBinary) AS Distance,\nCASE\nWHEN LEN(f.Text)\
  \ > 100 THEN '详细评论'\nELSE '简短评论'\nEND AS ReviewLength,\nCASE\nWHEN f.Score >= 4\
  \ THEN '高分'\nWHEN f.Score BETWEEN 2 AND 3 THEN '中等分数'\nELSE '低分'\nEND AS ScoreCategory\n\
  FROM FineFoodReviews f\nWHERE\nf.UserId NOT LIKE 'Anonymous%' -- 基于用户的过滤器，排除匿名用户\n\
  AND f.Score >= 2 -- 分数阈值过滤器\nAND LEN(f.Text) > 50 -- 用于筛选详细评论的文本长度过滤器\nAND (f.Text\
  \ LIKE '%gluten%' OR f.Text LIKE '%dairy%') -- 包含特定词语\nORDER BY\nDistance,  -- 按距离排序\n\
  f.Score DESC, -- 次要按评论分数排序\nReviewLength DESC; -- 第三按评论长度排序\n```\n\n现在想象一下，结合使用\
  \ JSON、正则表达式、空间、不等式和等式运算符以及向量距离，利用 SQL 的强大功能真正执行更智能的搜索。这超越了传统关系型数据库管理系统（RDBMS）的能力！\n\
  \n请记住，你还可以像 Davide Mauri 在这篇博文中展示的那样，将混合搜索的结果*与 RAG 模式结合使用*：[`https://devblogs.microsoft.com/azure-sql/rag-with-azure-sql`](https://devblogs.microsoft.com/azure-sql/rag-with-azure-sql)。\n\
  \n**注意**\n\n这个故事只会越来越好。这包括对向量数据类型、索引以及其他 T-SQL 内置功能的支持，以使整个混合搜索方案变得更简单、更精简，并与你的应用程序无缝集成。我将把这些内容留给下一本书。\n\
  \n使用 SQL 引擎来驱动你的生成式 AI 应用程序有许多好处，包括：\n\n- T-SQL 语言的熟悉度\n- 集成到查询处理器和数据类型中\n- 受益于引擎的扩展性，包括\
  \ Azure SQL 超大规模\n- 使用你信任的安全边界，包括引擎内的身份验证和访问控制\n\n\n## SQL 与生成式 AI 集成：关键考量\n\n####\
  \ 使用框架\n\n虽然利用 SQL 引擎有优势，但您仍需要使用驱动程序或提供程序来连接和执行查询。一个可用的例子是用于 Entity Framework Core\
  \ 的，您可以在 [`https://github.com/Azure-Samples/azure-sql-db-vector-search/tree/main/EFCoreVectors`](https://github.com/Azure-Samples/azure-sql-db-vector-search/tree/main/EFCoreVectors)\
  \ 找到。\n\n此外，拥有一套能够*协调*为生成式 AI 应用程序使用 SQL 活动的库（框架）会很有帮助。\n\n当今两个流行的框架是 `LangChain`\
  \ 和 `Semantic Kernel`，它们都是开源库。`LangChain` 和 `Semantic Kernel` 都内置了对 SQL 的支持，并且随着我们进一步构建向量存储方案，也会将\
  \ SQL 作为向量存储包括进来。`LangChain` 还提供了一个库，帮助您根据自然语言提示从您的数据库架构生成 SQL 查询。\n\n您可以在 [`https://github.com/microsoft/semantic-kernel/tree/main/dotnet/src/Connectors/Connectors.Memory.SqlServer`](https://github.com/microsoft/semantic-kernel/tree/main/dotnet/src/Connectors/Connectors.Memory.SqlServer)\
  \ 了解更多关于 `Semantic Kernel` 对 SQL 的支持。\n\n您可以在 [`https://python.langchain.com/v0.2/docs/integrations/tools/sql_database`](https://python.langchain.com/v0.2/docs/integrations/tools/sql_database)\
  \ 了解更多关于 `LangChain` 对 SQL 的支持。\n\n#### 聊天历史如何处理？\n\n当今许多生成式 AI 应用程序都是使用提示的聊天体验。我们观察到，大多数此类聊天体验除了需要用户对聊天体验的反馈外，还需要存储聊天历史（并带有用户权限）。数据库似乎是存储此类数据的天然选择，因此\
  \ Azure SQL 可能是一个很好的候选方案。目前这个领域还没有很多标准，但我预计未来会出现。\n\n一个可用于聊天历史和反馈的架构示例来自开源项目 `ChainLit`（用于构建聊天机器人），网址为\
  \ [`https://docs.chainlit.io/data-persistence/custom`](https://docs.chainlit.io/data-persistence/custom)。\n\
  \n#### 您的文本数据存储在哪里？\n\n所有生成式 AI 示例都提供对文本数据的智能搜索，因为这类数据是语言模型的天然适配对象（尽管也存在支持视频、音频、图像等的语言模型）。\n\
  \n虽然 SQL 可以在许多情况下用于存储文本以及作为其他列的文本属性，但我见过许多客户将他们想要用于生成式 AI 的文本数据存储在其他存储系统中，包括文件系统、Azure\
  \ Storage、S3 等。这些可能是 JSON 文档、文本文件、CSV 文件，以及更突出的 PDF 文档。\n\n因此，在您审视生成式 AI 时，您应该考虑将此文本数据存储在\
  \ Azure SQL 中是否合理，并将文本与其他属性一起在列中分类，以证明与 AI 模型的混合搜索是可行的。\n\n一个值得考虑的资源是使用 Python 库（如\
  \ [`https://pypi.org/project/pypdf`](https://pypi.org/project/pypdf)）来帮助您将 PDF 提取为文本以插入\
  \ SQL。PDF 文件非常普遍，我认为这将是未来需要关注的一个场景。\n\n#### 资源\n\n收藏以下资源，以随时了解我们关于 SQL 和 AI 的所有最新内容：\n\
  \n[`https://aka.ms/sqlai`](https://aka.ms/sqlai) – 这是我们文档中所有关于 SQL 和 AI 主题的一站式中心。\n\
  \n[`https://aka.ms/sqlaisamples`](https://aka.ms/sqlaisamples) – 这是一个包含代码示例的 GitHub\
  \ 仓库。\n\n[`https://aka.ms/sqlaiworkshop`](https://aka.ms/sqlaiworkshop) – 这是我的同事\
  \ Muazma Zahid、我以及我们团队的其他成员构建的一个研讨会，可以全面了解 SQL 和 AI。\n\n另一个关于我们能力的良好总结可以在我的博客文章中找到：[`https://www.microsoft.com/sql-server/blog/2024/06/26/getting-started-with-delivering-generative-ai-capabilities-in-sql-server-and-azure-sql`](https://www.microsoft.com/sql-server/blog/2024/06/26/getting-started-with-delivering-generative-ai-capabilities-in-sql-server-and-azure-sql)。在这篇博客文章中，我还引用了一个我与著名的\
  \ Microsoft Mechanics 团队录制的视频，您可以在 `https://aka.ms/SQLAIMechanics` 观看。\n\n### 自然语言转\
  \ SQL 查询\n\n你已经在整本书中看到了 Microsoft Copilot 技能在 Azure SQL Database 中的应用示例，这些技能可帮助你管理和排查\
  \ Azure SQL 的问题。我们开发了另一种 AI 辅助体验，称为 **自然语言转 SQL 查询**。\n\n此体验现已通过 Azure 门户中的查询编辑器在数据库上下文中可用。此功能使用\
  \ RAG 模式，将你的架构（包括表名、列名和键）传递给语言模型以生成 SQL 查询。\n\n了解其工作原理的最佳方式是亲眼看看实际操作。我导航到了在本书中创建的名为\
  \ **bwadw** 的数据库，该数据库在部署时使用了示例 AdventureWorksLT。\n\n我从“服务”菜单中选择了查询编辑器并登录。现在，查询编辑器中有一个新选项\
  \ **Open Copilot**。当我点击它时，会出现一个新的编辑框，用于输入与我的数据库上下文相关的自然语言语句，如图 10-11 所示。\n\n![](img/496204_2_En_10_Fig11_HTML.jpg)\n\
  \n图 10-11\n使用自然语言为多连接场景生成 SQL\n\n从我使用的文本可以看出，查询可能需要使用多个表，这通常需要几次连接。**表选择**选项允许我在编辑器中建议\
  \ Copilot 使用哪些表来为模型的 RAG 模式提供信息。此功能不使用你的数据，仅使用你的架构。默认是使用所有表。\n\n如果我选择 **生成查询**，然后选择\
  \ **接受**，我将得到如图 10-12 所示的生成查询。\n\n![](img/496204_2_En_10_Fig12_HTML.jpg)\n\n图 10-12\n\
  为多连接场景生成的查询\n\n这里没有显示完整的查询，但我想向你展示生成的注释，它解释了查询的生成内容。你可以在代码片段中看到连接多个表所需的 T-SQL。完整的查询如下：\n\
  \n```sql\nSELECT\nc.FirstName + ' ' + c.LastName AS CustomerName,\na.StateProvince\
  \ AS State,\np.Name AS ProductName,\nSUM(od.LineTotal) AS TotalSales\nFROM\nSalesLT.Customer\
  \ AS c\nJOIN SalesLT.CustomerAddress AS ca ON c.CustomerID = ca.CustomerID\nJOIN\
  \ SalesLT.Address AS a ON ca.AddressID = a.AddressID\nJOIN SalesLT.SalesOrderHeader\
  \ AS oh ON c.CustomerID = oh.CustomerID\nJOIN SalesLT.SalesOrderDetail AS od ON\
  \ oh.SalesOrderID = od.SalesOrderID\nJOIN SalesLT.Product AS p ON od.ProductID =\
  \ p.ProductID\nJOIN SalesLT.ProductCategory AS pc ON p.ProductCategoryID = pc.ProductCategoryID\n\
  WHERE\npc.Name = 'Mountain Bikes'\nGROUP BY\nc.FirstName + ' ' + c.LastName,\na.StateProvince,\n\
  p.Name\nORDER BY\nTotalSales DESC;\n```\n\n你可以看到，为了支持像“按州”和“按...排序”这样的自然语言语句，生成了所有必需的连接和聚合。\n\
  \n我现在可以通过选择“运行”来获取并执行该查询，或者将生成的查询放到我喜欢的 SQL 工具中运行。\n\n另一个我觉得很有趣的例子是生成一个允许你在关系表中导航层次结构的查询。所以，我在编辑器中向\
  \ Copilot 提供了以下提示：\n\n```text\nFind the heirarchy of product categories at any level\n\
  ```\n\n> 注意\n> 我故意拼错了 hierarchy（层次结构）这个词，看看它是否仍然有效。\n\n编辑器中的 Copilot 生成了以下查询：\n\n\
  ```sql\nWITH RecursiveCTE AS (\nSELECT\nProductCategoryID,\nName,\nParentProductCategoryID,\n\
  0 AS Level\nFROM\nSalesLT.ProductCategory\nWHERE\nParentProductCategoryID IS NULL\n\
  UNION ALL\nSELECT\npc.ProductCategoryID,\npc.Name,\npc.ParentProductCategoryID,\n\
  rc.Level + 1\nFROM\nSalesLT.ProductCategory pc\nINNER JOIN\nRecursiveCTE rc ON pc.ParentProductCategoryID\
  \ = rc.ProductCategoryID\n)\nSELECT\nProductCategoryID,\nName,\nParentProductCategoryID,\n\
  Level\nFROM\nRecursiveCTE\nORDER BY\nLevel, ProductCategoryID;\n```\n\n太棒了。生成的查询是递归公用表表达式（CTE）的一个例子。你可以在\
  \ [`https://learn.microsoft.com/sql/t-sql/queries/with-common-table-expression-transact-sql?view=sql-server-ver16#guidelines-for-defining-and-using-recursive-common-table-expressions`](https://learn.microsoft.com/sql/t-sql/queries/with-common-table-expression-transact-sql?view=sql-server-ver16#guidelines-for-defining-and-using-recursive-common-table-expressions)\
  \ 了解更多关于此查询技术的信息。我相信此功能将帮助许多人构建从最简单到最复杂的 SQL 查询，为你节省时间和精力。\n\n我与负责该项目的产品经理 Joe Sack（他也恰好是本书的技术编辑）讨论了这个功能。他对我说：“Bob，你知道这个\
  \ Copilot 可以为系统目录视图和 DMV 生成查询吗？” 我回答：“呃，不知道。” 我们知道所有系统目录视图和 DMV 的架构，因此我们可以轻松地将任何这些元数据传递给语言模型。所以，我尝试了两个例子：\n\
  \n**显示此数据库中占用空间最多的表**\n\n生成的查询如下：\n\n```sql\nSELECT\nt.NAME AS TableName,\ns.Name\
  \ AS SchemaName,\np.rows AS RowCounts,\nSUM(a.total_pages) * 8 AS TotalSpaceKB,\n\
  SUM(a.used_pages) * 8 AS UsedSpaceKB,\n(SUM(a.total_pages) - SUM(a.used_pages))\
  \ * 8 AS UnusedSpaceKB\nFROM\nsys.tables t\nINNER JOIN\nsys.indexes i ON t.OBJECT_ID\
  \ = i.object_id\nINNER JOIN\nsys.partitions p ON i.object_id = p.OBJECT_ID AND i.index_id\
  \ = p.index_id\nINNER JOIN\nsys.allocation_units a ON p.partition_id = a.container_id\n\
  LEFT OUTER JOIN\nsys.schemas s ON t.schema_id = s.schema_id\nWHERE\nt.NAME NOT LIKE\
  \ 'dt%'\nAND t.is_ms_shipped = 0\nAND i.OBJECT_ID > 255\nGROUP BY\nt.Name, s.Name,\
  \ p.Rows\nORDER BY\nTotalSpaceKB DESC;\n```\n\n这是对目录视图的一个很好的测试。\n\n那么 DMV 呢？我尝试了这个提示：\n\
  \n**显示此数据库中排名靠前的抢占式等待**\n\n生成的查询正是我想要的：\n\n```sql\nSELECT TOP 10 wait_type, wait_time_ms,\
  \ signal_wait_time_ms\nFROM sys.dm_os_wait_stats\nWHERE wait_type LIKE 'PREEMPTIVE%'\n\
  ORDER BY wait_time_ms DESC;\n```\n\n我知道 Joe 和团队正在测试在此功能中可以实现的各种选项，所以我非常期待看到它的未来。\n\
  \n\n## SQL 与 Microsoft Fabric\n\n在《SQL Server 2022 揭秘》一书中，我介绍了一项名为 `Synapse Link`\
  \ 的功能。其概念是将数据从 Azure SQL 或 SQL Server 同步到 Azure Synapse，然后捕获更改并将其输送到 Synapse，以实现实时分析解决方案。\n\
  \n2023 年，我们发布了一个名为 Microsoft Fabric 的新数据平台，它包含了所有类型的数据解决方案，包括分析。图 10-13 展示了 Microsoft\
  \ Fabric 的直观图景。\n\n![](img/496204_2_En_10_Fig13_HTML.jpg)\n\n图 10-13\n\nMicrosoft\
  \ Fabric\n\n你可以看到 Synapse 现在是 Fabric 大家庭的一部分。但更重要的是，一个名为 `OneLake` 的概念是这个故事的关键部分。\n\
  \nOneLake 在文档中被定义为“OneLake 是适用于整个组织的单一、统一、逻辑数据湖。数据湖处理来自各种来源的大量数据。”我最喜欢的是 OneLake\
  \ 主要文档页面的标题，它写着 **OneLake，数据的 OneDrive** ([`https://learn.microsoft.com/fabric/onelake/onelake-overview`](https://learn.microsoft.com/fabric/onelake/onelake-overview))。我喜欢这个描述，因为我将我的\
  \ OneDrive 视为一个可以随时存储任何类型文件的地方。\n\n但我认为 OneLake 的一个关键区别在于，其通用数据格式是 `Delta`。Delta\
  \ 是一种基于 Parquet 的文件格式，非常容易像查询表一样查询数据。这意味着 Fabric 团队可以为你提供一个 `SQL endpoint`，来查询 OneLake\
  \ 中任何采用 Delta 格式的数据。\n\n现在回到 Synapse Link 的故事。**带有 Synapse Link 的 Azure SQL** 使用\
  \ parquet 文件将表初始同步到暂存区。Synapse 然后获取这些数据并创建 Synapse 池表。Azure SQL 随后使用基于事务日志的新更改反馈架构将更改发送到暂存区，这些更改由\
  \ Synapse 消费并提交到池表中。\n\nFabric 使用了一个称为 `mirroring` 的概念。图 10-14 展示了 Fabric 的数据库镜像功能。\n\
  \n![](img/496204_2_En_10_Fig14_HTML.jpg)\n\n图 10-14\n\nFabric mirroring\n\n**用于\
  \ SQL 的 Fabric mirroring** 与 SQL 的 Synapse Link 功能基本相同，只是数据存储在 Fabric OneLake 中，如图\
  \ 10-15 所示。\n\n![](img/496204_2_En_10_Fig15_HTML.jpg)\n\n图 10-15\n\n用于 SQL 的 Fabric\
  \ mirroring\n\n在幕后，我们的 SQL 代码与用于 Azure SQL 和 SQL Server 的 Synapse Link 几乎相同，只是暂存区位于\
  \ Fabric 中。Fabric 现在自动将该数据以 Delta 格式复制到 OneLake 中。\n\n既然数据已经在 OneLake 中，整个 Fabric\
  \ 生态系统就对你的 SQL 数据可用。图 10-16 展示了一个使用 SQL Analytics 端点针对 SQL 镜像数据运行 SQL 查询的示例。\n\n\
  ![](img/496204_2_En_10_Fig16_HTML.jpg)\n\n图 10-16\n\n在 Fabric 中使用 SQL Analytics\
  \ 端点\n\n现在想象一下，可以将此数据与 OneLake 中的任何其他数据连接，或使用此数据构建 Power BI 报表。\n\nSynapse Link\
  \ 目前仍然受支持，但我们在该领域的未来方向是镜像。以下是一些显著区别：\n\n*   镜像支持 DDL 更改，例如添加/删除列。\n*   即使在 Fabric\
  \ 中，你的数据也不会发送到 Synapse。它存储在 OneLake 中，所有针对此数据的查询都使用无服务器查询。\n\n我们已经为 Azure SQL Managed\
  \ Instance 提供了镜像预览版，我预计很快也会为 VM 中和本地的 SQL Server 提供镜像。请访问 [`https://aka.ms/sqldbmirroring`](https://aka.ms/sqldbmirroring)\
  \ 获取开始使用的所有详细信息。你可以在 [`https://aka.ms/sqlaisamples`](https://aka.ms/sqlaisamples)\
  \ 查看在 Fabric 中将 SQL 镜像与 AI 结合使用的示例。\n\n## Azure Arc\n\n本章最后一个不属于图 10-1 中“超越 RDBMS”范畴的主题是\
  \ **Azure Arc**。我将 Azure Arc 纳入本章是因为我在本书第一版中简要提到过它，并且值得再次重点介绍。我还在《SQL Server 2022\
  \ 揭秘》一书中广泛涉及了这个主题。\n\nAzure Arc 是一个简单而强大的概念。这不是在 Azure 中部署 SQL，而是将你现有的本地或其他云中的 SQL\
  \ Server *连接*到 Azure。\n\n连接意味着在你的 VM 内或安装 SQL Server 的机器上运行轻量级代理。这些代理将你连接到 Azure，为你提供额外功能，并使其*感觉*像在\
  \ Azure 中运行。我们称之为 Azure Arc 启用的 SQL Server。\n\nArc 的一个强大方面是，我们可以在不更改 SQL Server\
  \ 的情况下持续添加功能，同时也可以利用新主要版本带来的新功能。Azure Arc 启用的 SQL Server 每月更新一次。截至本书撰写时，以下是 Arc\
  \ 为你提供的功能列表：\n\n*   从 Azure 门户**大规模管理你的 SQL Server 实例**\n*   **最佳实践评估**，查看服务器和数据库当前配置可能存在的问题\n\
  *   为 SQL Server 2022 提供的**Microsoft Entra 身份验证**支持\n*   我们在本书第 6 章详细介绍的**Microsoft\
  \ Defender for Cloud**\n*   我们在本书第 6 章介绍的、针对 SQL Server 2022 的**Microsoft Purview**\
  \ 支持\n*   SQL Server 的**按需付费许可**，特别是对于不常使用的 SQL Server 实例，可以节省许可成本\n*   针对旧版 SQL\
  \ Server 的**扩展安全更新**\n*   **性能仪表板**，为你提供 SQL Server 性能的轻量级可视化\n*   **迁移评估**，持续检查你迁移到\
  \ Azure SQL 选项的能力\n\n请访问 [`https://aka.ms/arcsqlserver`](https://aka.ms/arcsqlserver)\
  \ 了解有关 Azure Arc 启用的 SQL Server 的更多信息。\n\n\n## 前景展望\n\n我认为 Azure SQL 的前景非常光明，尤其是在本章描述的领域。我对此有一些未来的思考。这些都不是来自\
  \ Microsoft 的承诺或功能保证，但我认为分享我的见解很重要。在接下来的一年左右，我们将看看我的直觉是否正确。\n\n### 小型语言模型 (SLM)\
  \ 的使用\n\n我认为如今许多人正在为 AI 应用程序*过度配置*大型语言模型，因为没有人真正知道如何为语言模型“确定合适的规模”。我认为 `SLM` 的使用将会变得流行，因为它们成本更低，消耗的资源更少。然而，找到合适的模型和规模将成为\
  \ AI 领域的下一组挑战。\n\n### NL2SQL 框架\n\n向量搜索对于文本数据效果很好，你可以将其与混合搜索结合。但考虑一下希望由 AI 生成所有\
  \ SQL 的开发人员。因此，我认为你可能会看到更多框架被用于生成 `NL2SQL`，并且这些 SQL 可能包含混合搜索。\n\n### 生成式人工智能从本地到云端\n\
  \n如果我们遵循我们如何承担其他重大投资的模式，我预计 `SQL Server` 将会出现支持 `GenAI` 应用程序的功能。我在 2024 年看到像 Dell、HPE、Nvidia、AMD\
  \ 和 Red Hat 这样的公司强调 AI 应用程序不需要在公共云中运行。Microsoft 恰好拥有地球上最流行的数据库之一 `SQL Server`，所以……\n\
  \n### 更多且增强的 Copilot 体验\n\nCopilot 已经存在；这只是优化它们并确保它们以合适的速度运行并提供价值的问题。我认为 Microsoft\
  \ 将继续投资于这个领域，包括我们运行 `Azure SQL`、`SQL Server` 和我们的工具的团队。\n\n### JSON 和向量的增强功能\n\n\
  我们在 SQL 中的 `JSON` 和向量方面有一个良好的开端，但我们还需要更多，我预计你将看到我们更多的投入。\n\n### 持续投资 Microsoft Fabric\n\
  \n在 2024 年，`Microsoft Fabric` 大受欢迎！它继续是一个流行的数据平台，我预计它将继续增长。我期望在未来能看到 `Microsoft\
  \ Fabric` 带来新的、更深入的数据体验。\n\n## 总结\n\n我认为在本书最后一章的总结中，看看 Microsoft Word 中的 Copilot\
  \ 是否能构建一个好的摘要是合适的。我觉得它相当不错，因此我将其原封不动地放在这里并用引号引用。\n\n> “Azure SQL 提供了超越传统关系数据库管理系统\
  \ (RDBMS) 的高级功能。这些功能包括广泛的 `JSON` 支持，允许对 `JSON` 数据进行高效解析、转换、查询和格式化。此外，`Azure SQL`\
  \ 支持正则表达式 (`RegEx`) 用于高级模式匹配和验证，增强了传统的 `T-SQL` 字符串函数。该平台还包括空间和图形数据类型，能够使用节点和边来建模和查询类似网络的数据结构。\n\
  >\n> 此外，`Azure SQL` 提供列存储索引和内存优化，以显著提升查询性能。`SQL Ledger` 功能使用时间表来自动跟踪更改，通过加密哈希确保可审计性和数据完整性。智能查询处理\
  \ (`IQP`) 和自动调优功能可优化查询性能和应用程序效率。`Azure SQL` 还与 `REST` API 集成，允许直接从数据库引擎与外部服务进行无缝数据交换和交互。\n\
  >\n> 最后，`Azure SQL` 支持 AI 应用程序和 DevOps 实践，包括 `GenAI` 和自然语言到 `SQL` 查询生成。该平台与 `GitHub\
  \ Actions` 和容器集成，促进了现代开发工作流。数据 API 生成器 (`DAB`) 通过将数据库连接和架构转换为 `REST` 或 `GraphQL`\
  \ 端点，简化了应用程序开发，减少了对大量连接代码的需求。这些高级功能使 `Azure SQL` 成为现代数据管理和应用程序开发的强大工具。”\n\n"
