  请注意，“读/写故障转移策略”显示为“客户管理”。有两种类型的故障转移策略：




  '
- "# Azure SQL 故障转移组与托管实例链接\n\n## 故障转移组策略\n\n*   **客户管理（推荐且默认）** – 当客户发现影响故障转移组中一个或多个数据库的意外中断时，可以执行故障转移。使用\
  \ PowerShell、Azure CLI 或 REST API 等命令行工具时，客户管理策略的值为 `manual`。\n*   **Microsoft 管理**\
  \ – 当发生影响主要区域的大范围中断时，Microsoft 会启动所有配置为 Microsoft 管理策略的受影响故障转移组的故障转移。Microsoft 管理的故障转移不会针对单个故障转移组或某个区域内的部分故障转移组启动。使用\
  \ PowerShell、Azure CLI 或 REST API 等命令行工具时，Microsoft 管理策略的值为 `automatic`。\n\n> **注意**\n\
  > 此功能在本书第一版中称为自动故障转移组，因为默认策略是自动故障转移。过去几年我们了解到，通过管理故障转移流程能为客户提供最佳保护，因此名称和策略类型有所更改。\n\
  >\n> 你可以在 [Microsoft 文档](https://learn.microsoft.com/azure/azure-sql/managed-instance/failover-group-sql-mi?view=azuresql#failover-policy)\
  \ 阅读有关故障转移组策略的所有详细信息。\n\n如果你点击故障转移组，会看到一个非常漂亮的全局地图可视化界面，其中包含管理故障转移组的选项以及主服务器和只读副本的连接信息，如图\
  \ 8-24 所示。\n\n![](img/496204_2_En_8_Fig24_HTML.jpg)\n\n**图 8-24**\n\n在 Azure 门户中配置和管理故障转移组\n\
  \n从这个屏幕中，你可以看到故障转移组逻辑服务器位置的可视化地图以及主副本和辅助副本的详细信息。下方是新的端点（这些将成为你的新逻辑服务器名称），用于连接读写或只读工作负载。\n\
  \n在顶部，你可以向组中添加或删除数据库，或启动计划内或强制故障转移。\n\n以下是有关 Azure SQL 故障转移组的其他几个要点：\n\n*   故障转移组也可以使用\
  \ PowerShell（`Add-AzSqlDatabaseToFailoverGroup` 和 `Switch-AzSqlDatabaseFailoverGroup`）进行管理。\n\
  *   因为故障转移组在使用异步复制数据时发生自动故障转移，所以可能发生数据丢失。因此，如果你要求故障转移组零数据丢失，应用程序可以在提交事务后调用 `sp_wait_for_database_copy_sync`\
  \ 存储过程以确保所有数据已同步。更多信息请访问 [Microsoft 文档](https://learn.microsoft.com/azure/azure-sql/database/failover-group-sql-db?view=azuresql&tabs=azure-powershell#preventing-the-loss-of-critical-data)。\n\
  *   你可以为 Microsoft 管理的故障转移策略配置的一个选项称为宽限期，使用 `GracePeriodWithDataLossHours` 参数（默认值为一小时）。此参数定义了当主节点宕机且我们相信可能发生数据丢失时，执行自动故障转移前的等待时间。如果未发生数据丢失，则会立即执行自动故障转移。\n\
  \n故障转移组的一个重要限制涉及系统数据库。系统数据库不会被复制。因此，任何实例级数据，如 SQL Server Agent 作业，都必须在辅助实例上手动创建。\n\
  \n## 使用托管实例链接进行灾难恢复\n\n随着 SQL Server 2022 的发布，我们宣布了一种利用云进行灾难恢复的新方法。我称之为托管的灾难恢复。我记得在\
  \ 2022 年秋天与达拉斯的一位客户交谈。他们向我讲述了一个悲伤的故事：一位管理其 DR 站点的员工已离职。不幸的是，他们没有关于该站点以及如何管理的文档或详细信息。在我解释了我们的托管灾难恢复方案后，这位客户对我说：“给我报名！”\n\
  \n此功能包含在一个名为使用托管实例链接进行灾难恢复的能力中。你已在本书前面了解到如何使用托管实例链接进行迁移。\n\n图 8-25 展示了如何将其用于离线和在线灾难恢复。\n\
  \n![](img/496204_2_En_8_Fig25_HTML.jpg)\n\n**图 8-25**\n\n使用托管实例链接进行灾难恢复\n\n让我们更详细地看一下这两种场景及其工作方式。\n\
  \n### 离线灾难恢复\n\n利用版本化的 Azure SQL 托管实例，你可以在 SQL Server 2022 和该实例之间创建链接。在后台，使用了可用性组技术（即使你在\
  \ SQL Server 2022 上没有 AG，包括标准版），类似于分布式可用性组（DAG）。创建链接会将数据库从 SQL Server 2022 种子化到已部署的托管实例。\n\
  \n更改现在会自动（异步）从 SQL Server 发送到托管实例。如果你想故障转移到托管实例，可以选择计划内故障转移（必须确保数据已同步）或强制故障转移。一旦故障转移，托管实例将成为“读写”主副本。如果你想回退，可以在托管实例上执行\
  \ `COPY_ONLY` 备份到 Azure Storage，然后将其还原回 SQL Server 2022。现在 SQL Server 可以再次成为主副本。此技术被认为是离线的，因为\
  \ SQL Server 2022 重新上线所需的时间就是还原完整数据库备份所需的时间。\n\n### 在线灾难恢复\n\n离线场景是 SQL Server 2022\
  \ 发布时作为公共预览版发布的内容，现已正式发布。在本书撰写时，一个预览版新方法可以将 SQL Server 2022 和托管实例设置为故障转移伙伴，就像真正的分布式可用性组（DAG）一样。在此场景中，你可以像在离线场景中一样故障转移到托管实例。但故障转移更像是“角色切换”。这样，任何切换都是在线操作，因为切换操作发生前只需将很少的更改同步到辅助副本。一旦切换到托管实例，你可以再切换回\
  \ SQL Server 2022。\n\n在这两种场景中，如果主节点离线，你总是可以强制故障转移到辅助副本，但需知道可能会发生数据丢失。为什么我在本节开始时称此功能为托管灾难恢复？因为你的灾难恢复站点（即\
  \ Azure SQL 托管实例）由 Microsoft 管理。你有可用性的 SLA 以及自动备份。没有人需要灾难恢复站点直到……灾难发生，但知道它总是在需要时可用并准备好，这难道不是很好吗？\n\
  \n请访问 [Microsoft 文档](https://learn.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-feature-overview?view=azuresql#disaster-recovery)\
  \ 开始使用托管实例链接进行灾难恢复。\n\n\n\n### Azure SQL SLA（服务级别协议）\n\n部署 Azure SQL 托管实例和数据库的 SQL\
  \ Server 的优势之一是其高可用性保证。我在本章描述的架构有助于实现这一承诺。该承诺以**服务级别协议 (SLA)** 的形式为您提供。您可以查看 Azure\
  \ SQL 的官方 SLA：[`https://azure.microsoft.com/support/legal/sla/sql-database`](https://azure.microsoft.com/support/legal/sla/sql-database)。\n\
  \nAzure SLA 意味着微软将确保我们维持一定的**服务级别**，否则您的账户将有资格获得信用额度。服务级别以“九”的形式表示，即您部署的可用性保证百分比。\n\
  \n例如，如果您部署具有“业务关键型”或“高级”服务层级的 Azure SQL 数据库并使用区域冗余，您的 SLA 为 99.995%。如果查看像 [`https://en.wikipedia.org/wiki/High_availability`](https://en.wikipedia.org/wiki/High_availability)\
  \ 这样的表格，您会看到 99.995% 被定义为“四个九”，意味着您每年最多可能经历 26.30 分钟或每月 2.19 分钟的*停机时间*。其他部署选项具有不同的服务级别承诺。\n\
  \n如果查看我们的 SLA 文档，停机时间定义为“…在给定的 Microsoft Azure 订阅中，所有数据库累积的部署分钟总数，在此期间数据库不可用。如果在一分钟内，客户尝试建立到该数据库的所有连续连接尝试均失败，则该分钟被视为对给定数据库不可用。”\n\
  \nAzure SQL 的某些特性使我们能够做出这些 SLA 承诺，包括但不限于：\n\n*   内置可用性及与 Azure Service Fabric 的集成\n\
  *   强制实施资源限制，例如日志治理\n    > **注意**\n    >\n    > 有多种原因说明 PaaS 服务需要日志治理。这包括数据库可恢复性、高可用性、灾难恢复和可预测的性能。了解更多：[`https://azure.microsoft.com/blog/resource-governance-in-azure-sql-database/`](https://azure.microsoft.com/blog/resource-governance-in-azure-sql-database/)。\n\
  *   启用数据库选项，如加速数据库恢复 (Accelerated Database Recovery)。\n\n我们在 Azure SQL 中用于最大化可用性的一项创新技术是**热修补\
  \ (hot patching)**。热修补允许我们在不重启 SQL Server 的情况下修补 SQL Server 引擎代码。阅读关于热修补的精彩故事：[`https://azure.microsoft.com/blog/hot-patching-sql-server-engine-in-azure-sql-database/`](https://azure.microsoft.com/blog/hot-patching-sql-server-engine-in-azure-sql-database/)。\n\
  \n## 数据库可用性与一致性\n\n对于 SQL Server，您可能熟悉用于实现或限制数据库可用性或执行高级恢复场景的功能和工具。此外，SQL Server\
  \ 提供了工具来确保数据库从物理和逻辑角度保持一致。\n\n通常，Azure SQL 在这方面不提供相同水平的高级功能，主要是因为服务内置的高冗余和可用性水平使得这些功能并非必需。\n\
  \n让我们研究一下其中的几个领域，以便在与 SQL Server 比较时，您的知识更加完整。\n\n### 数据库可用性\n\n您可能曾需要在 SQL Server\
  \ 中使用 `ALTER DATABASE` 将数据库状态更改为 `OFFLINE` 或 `EMERGENCY` 以进行高级恢复场景。您无权使用这些选项，但在了解了\
  \ Azure SQL 的所有内置功能和我们的 SLA 之后，您不禁要问，这重要吗？在我看来（相信我，多年来我在支持工作中曾使用这些选项帮助过客户），答案是否定的。\n\
  \n对于 Azure SQL 数据库和托管实例，虽然您不能将数据置于单用户模式，但 Azure SQL 数据库允许您使用 `RESTRICTED_USER` 选项。了解更多：[`https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options)。\n\
  \n在 SQL Server 2005 年，我和我的同事 Robert Dorr 在微软支持部门工作，我们说服了工程团队创建一种连接到“挂起服务器”的简单方法。结果就是专用管理员连接\
  \ (DAC) 功能。Azure SQL *支持* DAC。了解更多：[`https://learn.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators`](https://learn.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators)。\n\
  \n### 加速数据库恢复 (ADR)\n\n在我的书《SQL Server 2019 Revealed》中，我介绍了加速数据库恢复 (ADR) 的精彩故事。SQL\
  \ Server 管理员再也不必担心长时间的数据库恢复或失控的事务日志。ADR 不仅仅是一个功能；它是 Azure SQL 可用性故事的一部分！事实上，对于 Azure\
  \ SQL，它只是引擎的一部分，并非真正需要您开启或关闭的东西。您可以在我们的文档 [`https://learn.microsoft.com/azure/azure-sql/accelerated-database-recovery`](https://learn.microsoft.com/azure/azure-sql/accelerated-database-recovery)\
  \ 或我们工程团队撰写的白皮书 [`https://aka.ms/sqladr`](https://aka.ms/sqladr) 中了解更多关于 ADR 工作原理的信息。\n\
  \n### 数据库一致性\n\n所有 Azure SQL 数据库都使用 `CHECKSUM` 选项进行配置以确保数据库一致性。使用 PaaS 服务的好处之一是，我们的工程团队拥有自动化流程来检查因校验和问题等问题导致的任何不一致，并采取纠正措施。例如，如果您部署的是“业务关键型”服务层级，我们可以发出在线自动页面修复（了解更多关于其工作原理的信息：[`https://learn.microsoft.com/sql/sql-server/failover-clusters/automatic-page-repair-availability-groups-database-mirroring`](https://learn.microsoft.com/sql/sql-server/failover-clusters/automatic-page-repair-availability-groups-database-mirroring)）。\n\
  \n此外，如果您担心任何数据库一致性问题，请记住以下事实：\n\n*   “常规用途”和“超大规模”层级将数据库和日志文件存储在 Azure 存储上，默认情况下有三个副本进行镜像。\n\
  *   “业务关键型”层级始终有三个其他副本可用，并拥有自己的存储。\n*   我们的工程团队在我们的服务中内置了数据完整性和一致性警报监控。如果自动化无法解决问题，我们将直接通知客户并采取必要步骤以确保数据恢复和一致性。如果我们认为可以在无数据丢失的情况下修复问题，我们可能会采取此操作，而您可能永远无需被通知。\n\
  *   Azure SQL 支持 `DBCC CHECKDB`（但不支持修复选项），以便您随时手动检查数据库一致性。\n*   我们增加了针对数据库的“丢失写入”和“过时读取”检测的检查，我们在某些情况下发现这可能是由于底层\
  \ I/O 系统问题造成的。\n\n我在第 1 章作为 Azure SQL 历史一部分提到的微软副总裁 Peter Carlin，有一篇很好的博文概述了我们在\
  \ Azure 中为管理数据库数据完整性所做的一切。阅读他的文章：[`https://azure.microsoft.com/blog/data-integrity-in-azure-sql-database`](https://azure.microsoft.com/blog/data-integrity-in-azure-sql-database/)。\n\
  \n\n\n## 监控可用性\n\n与任何功能集一样，您无疑会希望监控 Azure SQL 各方面的可用性。这包括服务器和实例可用性、数据库可用性、备份/恢复历史记录、副本状态以及故障转移原因。此外，由于\
  \ Azure SQL 运行在 Azure 生态系统中，了解区域和数据中心中 Azure 服务的状态和健康状况也可能很重要。\n\nAzure SQL 为您提供了与\
  \ SQL Server 类似的监控可用性的接口，包括目录视图、动态管理视图和扩展事件。此外，Azure 门户、`az` CLI、PowerShell、数据库监视器和\
  \ Copilot 等 Azure 接口还提供了额外的功能来监控您部署的可用性。\n\n让我们深入了解使用这些接口和监控功能的几个示例。\n\n### 实例、服务器和数据库可用性\n\
  \n除了影响 Azure 服务的事件外，您可以通过 Azure 门户查看 Azure SQL 托管实例或 Azure SQL 数据库的可用性。查看托管实例或数据库不可用的一个可能原因的主要方法之一是通过\
  \ Azure 门户检查 `资源运行状况`。您将在本章的这一主要部分稍后看到此场景的示例。\n\n您始终可以使用标准的 SQL Server 工具，如 SQL\
  \ Server Management Studio，连接到托管实例或数据库服务器，并通过该工具或 T-SQL 查询检查这些资源的状态。\n\n此外，`az`\
  \ CLI 等接口可以显示 Azure SQL 的状态，例如\n\n*   `az sql mi list` – 列出托管实例的状态\n*   `az sql\
  \ db list` – 列出 Azure SQL 数据库的状态\n\n也可以使用 PowerShell 命令来查明 Azure SQL 数据库的可用性，例如\n\
  \n*   `Get-AzSQLDatabase` – 获取服务器上的所有数据库及其详细信息，包括状态\n\n**注意**\n\n对于 SQL Server，我经常查看过去的\
  \ `ERRORLOG` 文件或 `system_health` XEvent 会话文件，以了解服务可用性和运行状况。Azure SQL 托管实例支持这些工具。但是，这些文件不会复制到副本，因此如果发生故障转移，这些文件的历史记录将会丢失。\n\
  \n### 备份和恢复历史记录\n\nAzure SQL 会自动备份数据库和事务日志。对于 SQL Server，使用 `msdb` 系统表查看备份历史记录是非常常见的做法。您也可以在\
  \ Azure SQL 托管实例中执行此操作，使用如下查询：\n\n```sql\nSELECT database_name, case when type =\
  \ 'D' then 'Full' when type = 'I' then 'Differential' when type = 'L' then 'Log'\
  \ end as type,\nhas_backup_checksums, backup_size, compressed_backup_size, backup_start_date,\
  \ backup_finish_date\nFROM msdb.dbo.backupset\nORDER BY backup_finish_date DESC;\n\
  GO\n```\n\n我的实例已经运行了一段时间，所以我向下滚动以查看较早的结果，这些结果如图 8-26 所示。\n\n![](img/496204_2_En_8_Fig26_HTML.jpg)\n\
  \n图 8-26\n\n托管实例自动备份的较早结果\n\n这些结果显示了我创建的一个用户数据库，但它会显示为该实例创建的任何用户数据库（它不显示系统数据库备份）。请注意，第一个结果是完整备份，然后是一系列日志备份。滚动到结果顶部，您可以看到其他类型的备份，如图\
  \ 8-27 所示。\n\n![](img/496204_2_En_8_Fig27_HTML.jpg)\n\n图 8-27\n\n托管实例自动备份的最新结果\n\
  \n可以通过 Azure 门户或 CLI 接口查看长期备份保留历史记录。了解更多信息，请访问 [`https://learn.microsoft.com/azure/azure-sql/database/long-term-backup-retention-configure`](https://learn.microsoft.com/azure/azure-sql/database/long-term-backup-retention-configure)。\n\
  \n此外，Azure SQL 托管实例支持使用 XEvents 来跟踪备份历史记录。有关如何执行此操作的博客文章，请参阅 [`https://techcommunity.microsoft.com/t5/azure-database-support-blog/lesson-learned-128-how-to-track-the-automated-backup-for-an/ba-p/1442355`](https://techcommunity.microsoft.com/t5/azure-database-support-blog/lesson-learned-128-how-to-track-the-automated-backup-for-an/ba-p/1442355)。\n\
  \n使用时间点恢复恢复的任何数据库都会创建一个新数据库，因此恢复历史记录可以视为查看新数据库的创建。所有创建新数据库的操作都可以通过 Azure 活动日志查看。\n\
  \n`msdb` 备份历史记录不适用于 Azure SQL 数据库，但有一个名为 `sys.dm_database_backups` 的 DMV 可用。我在我的一个\
  \ Azure SQL 数据库上运行了此查询（不提供备份大小详细信息）：\n\n```sql\nSELECT logical_database_name, case\
  \ when backup_type = 'D' then 'Full' when backup_type = 'I' then 'Differential'\
  \ when backup_type = 'L' then 'Log' end as backup_type_desc, backup_start_date,\
  \ backup_finish_date, in_retention\nFROM sys.dm_database_backups\nORDER BY backup_finish_date\
  \ DESC;\nGO\n```\n\n对于我的业务关键服务层数据库，较早的结果如图 8-28 所示。\n\n![](img/496204_2_En_8_Fig28_HTML.jpg)\n\
  \n图 8-28\n\nAzure SQL 数据库自动备份的较早结果\n\n在备份历史记录视图中保留和显示的备份取决于配置的备份保留期。保留期之前的备份（`in_retention\
  \ = 0`）也会显示在 `sys.dm_database_backups` 视图中。它们是在配置的保留期内进行时间点恢复所必需的。\n\n向上滚动，我可以看到最新的结果，如图\
  \ 8-29 所示，其中包括日志和差异备份。\n\n![](img/496204_2_En_8_Fig29_HTML.jpg)\n\n图 8-29\n\nAzure\
  \ SQL 数据库自动备份的顶部结果\n\n**提示**\n\n我们新的 `Copilot` 也可以用于查找有关备份的信息，例如使用提示 \"`我的数据库最近一次备份是什么时候创建的？`\"\
  \n\n\n\n## 区域、数据中心和服务可用性\n\n要获取 Azure 区域和数据中心的全局状态视图，可以使用 `Azure 状态` 仪表板，您可以在 [`https://status.azure.com`](https://status.azure.com)\
  \ 找到它。图 8-30 展示了一个带有“当前影响”默认视图的 Azure 状态仪表板示例。\n\n![](img/496204_2_En_8_Fig30_HTML.jpg)\n\
  \n图 8-30\n\n当前影响的 Azure 状态仪表板\n\nAzure 状态可以显示任何 Azure 区域中所有 Azure 服务的状态。此状态显示了所有服务，与您是否使用特定服务无关。在此视图中我选择了“美洲”，您可以在图\
  \ 8-31 中看到结果。\n\n![](img/496204_2_En_8_Fig31_HTML.jpg)\n\n图 8-31\n\n美洲地区的 Azure\
  \ 服务状态\n\n这是一个很长的表格，您可以向下滚动查看任何服务的状态。任何标有“–”的服务意味着该服务在该区域不可用。\n\n要获取 Azure 状态通知，您可以使用页面顶部的\
  \ RSS 源。此外，您可以通过 Azure 状态历史记录（[`https://status.azure.com/status/history`](https://status.azure.com/status/history)）查看\
  \ Azure 状态的完整历史。\n\n您还可以通过 Azure 门户中名为 `Azure 服务运行状况` 的功能，获取与您的订阅特定的 Azure 服务运行状况的更多信息。通过\
  \ `服务运行状况`，您可以查看 Azure 服务的当前问题、可能影响可用性的计划维护以及运行状况历史记录。在您的门户顶部搜索 `服务运行状况` 或在仪表板上找到它。当我选择此项并选择“运行状况历史记录”时，您可以在图\
  \ 8-32 中看到我的结果。\n\n![](img/496204_2_En_8_Fig32_HTML.jpg)\n\n图 8-32\n\nAzure 服务运行状况历史记录\n\
  \n这里的事件包括可能解决未来问题的建议和计划的维护操作。在服务菜单上，您可以看到查看当前服务问题或为计划维护等主题设置警报的选项。\n\n## 可用性指标\n\
  \n假设您希望以更精细的级别跟踪 Azure SQL 数据库的可用性，以查看其是否符合承诺的 SLA。如您在图 8-33 中所见，门户中的 Azure 指标提供了一种新方法。\n\
  \n![](img/496204_2_En_8_Fig33_HTML.jpg)\n\n图 8-33\n\nAzure 门户中的可用性指标\n\n我将时间间隔更改为过去\
  \ 30 天，但此值也可以通过日志检索更长时间的历史记录。此外，与其他 Azure 指标一样，您可以设置警报以查看此值是否从 100% 发生变化。我们的计算基于详细连接指标的平均值组合。更多信息请访问\
  \ [`https://learn.microsoft.com/azure/azure-sql/database/monitoring-metrics-alerts?view=azuresql#availability-metric`](https://learn.microsoft.com/azure/azure-sql/database/monitoring-metrics-alerts?view=azuresql#availability-metric)。\n\
  \n如果我不了解这个新指标，并想看看我们新的 Copilot 是否能提供帮助，该怎么办呢？我使用了提示词“过去 30 天内这个数据库的可用性如何？”，并得到了如图\
  \ 8-34 所示的回复。\n\n![](img/496204_2_En_8_Fig34_HTML.jpg)\n\n图 8-34\n\nCopilot 显示我的数据库的可用性指标\n\
  \n## 副本状态\n\n要监控 Azure SQL 中副本的状态，您可以使用 DMV `sys.dm_database_replica_states`。例如，此\
  \ DMV 可用于查看业务关键服务层的副本状态。您也可以使用此 DMV 来检查具有异地复制或故障转移组的部署的副本状态。\n\n对于本章中我部署的名为 `bwsqlbc`\
  \ 的数据库，我可以使用 SSMS 连接到此数据库并运行以下 T-SQL 语句：\n\n```\nSELECT is_primary_replica, synchronization_state_desc,\
  \ synchronization_health_desc, last_received_time, last_redone_time\nFROM sys.dm_database_replica_states;\n\
  GO\n```\n\n我从此数据库中得到了结果，如图 8-35 所示。\n\n![](img/496204_2_En_8_Fig35_HTML.jpg)\n\n\
  图 8-35\n\n使用业务关键层的 Azure SQL 数据库的副本状态\n\n对于异地复制和故障转移组，还有其他 DMV 可用于检查逻辑服务器和实例之间的复制状态。这包括\
  \ `sys.geo_replication_links`（在逻辑主数据库上下文中运行）和 `sys.dm_geo_replication_link_status`（在用户数据库上下文中运行）。使用这些\
  \ DMV 的一个例子是种子设定（地理辅助数据库的初始同步）。`sys.geo_replication_links` 可以显示种子设定进程在进行中及完成时的状态。\n\
  \n在本章中，我配置了一个故障转移组。让我们连接到故障转移组服务器，看看这些 DMV 的样子：\n\n我在其中一个数据库的上下文中连接到故障转移组服务器 `bwazuresql.database.windows.net`，并运行了以下\
  \ T-SQL 语句：\n\n```\nSELECT partner_server, partner_database, replication_lag_sec,\
  \ replication_state_desc, role_desc\nFROM sys.dm_geo_replication_link_status;\n\
  GO\n```\n\n我得到了如图 8-36 所示的结果。\n\n![](img/496204_2_En_8_Fig36_HTML.jpg)\n\n图 8-36\n\
  \n故障转移组副本状态\n\n`replication_state_desc` = CATCHUP 表示服务器已同步。\n\n您可以在 [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-geo-replication-link-status-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-geo-replication-link-status-azure-sql-database)\
  \ 查看 `sys.dm_geo_replication_link_status` 的完整文档。\n\n所有这些用于检查副本状态的 DMV 都适用于 Azure\
  \ SQL 托管实例和数据库。az CLI 可用于检查副本状态 (`az sql db replica`)。PowerShell cmdlet 支持检查副本状态，例如\
  \ `Get-AzSqlDatabaseReplicationLink`。\n\n查看异地复制数据库状态的另一种方法是使用数据库监视器。我在第 7 章中设置了数据库监视器来跟踪数据库\
  \ `bwadw`。我还在本章中为此数据库设置了异地复制。我可以使用数据库监视器获取有关异地复制状态的更多详细信息，如图 8-37 所示。\n\n![](img/496204_2_En_8_Fig37_HTML.jpg)\n\
  \n图 8-37\n\n使用数据库监视器查看异地复制数据库状态\n\n\n\n### 故障转移原因\n\n对于 Azure SQL 托管实例和数据库，发生故障转移的原因多种多样，包括计划内和计划外的。由于故障转移的原因可能各不相同，跟踪数据库是否发生故障转移的最佳方法是使用托管实例或数据库的\
  \ `资源运行状况`。图 8-38 展示了我的一个 Azure SQL 数据库部署的 `资源运行状况` 示例以及一个导致故障转移的运行状况事件。\n\n![](img/496204_2_En_8_Fig38_HTML.jpg)\n\
  图 8-38\nAzure SQL 数据库的 `资源运行状况`\n\n`不可用` 事件与我手动执行数据库故障转移的时间点吻合。请注意它标明这是一个 `计划外`\
  \ 事件。我如何知道这是由手动故障转移引起的呢？我查看了此数据库的 `活动日志`，并找到了如图 8-39 所示的详细信息。\n\n![](img/496204_2_En_8_Fig39_HTML.jpg)\n\
  图 8-39\n使用 `活动日志` 跟踪手动故障转移\n\n注意\n对于 Azure SQL 托管实例和数据库部署，`资源运行状况` 都是在数据库级别报告的。\n\
  \n### 小结\n\n在本章中，你了解了 Azure SQL 惊人的内置可用性功能，包括自动备份、时间点还原，以及 `常规用途`、`业务关键` 和 `超大规模`\
  \ 的内置可用性架构。\n\n你还学习了如何利用 Azure 的功能通过区域冗余、异地复制和故障转移组实现进一步的冗余。你了解了 Azure 如何提供内置的数据完整性和流程，以及如何监控\
  \ Azure SQL 部署的可用性。\n\n你可以使用一些额外的实验（这些是免费的——你只需要一个 Azure 订阅）来了解更多关于 Azure SQL 可用性的信息，网址为：\n\
  [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/06_Manage_and_Optimize_AzureSQLMI`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/06_Manage_and_Optimize_AzureSQLMI)\n\
  [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB)\n\
  \n可用性是 Azure SQL 核心内容的最后一部分。在下一章中，你将扩展对 Azure SQL 的了解，学习与安全性、性能或可用性无直接关系的功能。\n\n"
- "# 9. 扩展 Azure SQL 知识\n\n你已经经历了部署和配置 Azure SQL 托管实例和数据库的旅程。然后，你了解了所有用于保护部署、使 Azure\
  \ SQL 快速运行并保持高速，以及确保数据高可用性的功能和任务。在本章中，我们将通过更仔细地研究与 SQL Server 的功能对比、理解作业管理的选项、了解可用于支持部署的方法以及回顾使用\
  \ Azure SQL 的最佳实践，来扩展你对 Azure SQL 的知识。\n\n本章将包含供你边读边尝试和使用的示例。要尝试本章中使用的任何技术、命令或示例，你将需要：\n\
  *   一个 Azure 订阅。\n*   对 Azure 订阅至少具有 `参与者` 角色访问权限。你可以在 [`https://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles)\
  \ 阅读更多关于 Azure 内置角色的信息。\n*   访问 Azure 门户。\n*   我将使用本书前面部署的几个 Azure SQL 数据库和一个托管实例。\n\
  *   要连接到托管实例，你需要 Azure 中的一个 `跳板机` 或虚拟机。我在本书的第 4 章向你展示了如何操作。一个简单的方法是创建一个新的 Azure\
  \ 虚拟机，并将其部署到与托管实例相同的虚拟网络中（你将使用与托管实例不同的子网）。\n*   要连接到 Azure SQL 数据库，我将使用我在第 3 章部署的\
  \ Azure VM，称为 `bwsql2022`，并在第 6 章配置了专用端点（只要能连接到 Azure SQL 数据库，你也可以使用其他方法）。\n*  \
  \ 你将在本章中运行一些 T-SQL，因此请安装一个工具，如 SQL Server Management Studio (`SSMS`)，下载地址：[`https://aka.ms/ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms?view=sql-server-ver15)。\n\
  \n## Azure SQL 的功能范围\n\n在整本书中，我比较了 SQL Server 与 Azure SQL 托管实例和数据库的功能。让我们回顾几个我经常被问到的、与安全性、性能和可用性无直接关系的功能。\n\
  \n在阅读本节时，请参考以下文档：\n*   托管实例与 SQL Server 的 T-SQL 差异：[`https://aka.ms/azuresqlmitsqldiff`](https://aka.ms/azuresqlmitsqldiff)。\n\
  *   Azure SQL 数据库与 SQL Server 的 T-SQL 差异：[`https://aka.ms/azuresqldbtsqldiff`](https://aka.ms/azuresqldbtsqldiff)。\n\
  *   Azure SQL 托管实例与 Azure SQL 数据库的功能对比：[`https://aka.ms/azuresqlfeatures`](https://aka.ms/azuresqlfeatures)。\n\
  \n### 链接服务器和跨数据库查询\n\nSQL Server 用户可以对位于同一 SQL Server 实例的其他数据库（跨数据库查询）或另一个实例（链接服务器查询）中的对象执行查询（并进行联接）。SQL\
  \ Server 的链接服务器还允许查询其他数据提供程序（通过 OLE-DB），例如 Oracle。跨数据库查询和链接服务器允许读取查询（`SELECT`），也（如果提供程序支持的话）允许分布式事务。\n\
  \nAzure SQL 托管实例支持 **`跨数据库查询`**，但 Azure SQL 数据库不支持。\n\n注意\nAzure SQL 数据库支持弹性数据库查询（预览版）的概念，该功能可以跨数据库联接数据。了解更多信息请访问\
  \ [`https://learn.microsoft.com/azure/azure-sql/database/elastic-query-getting-started-vertical`](https://learn.microsoft.com/azure/azure-sql/database/elastic-query-getting-started-vertical)。\n\
  \nAzure SQL 托管实例支持 **`链接服务器`**，但 Azure SQL 数据库不支持。不过，Azure SQL 托管实例使用 `链接服务器` 有一些限制。例如，仅支持基于\
  \ SQL Server 的提供程序。有关托管实例上 `链接服务器` 的完整差异列表，请参阅 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#linked-servers`](https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#linked-servers)。托管实例的\
  \ `链接服务器` 支持 Microsoft Entra 身份验证。\n\n注意\n你可以从本地 SQL Server、Azure 虚拟机或托管实例创建 `链接服务器`，其中*远程服务器*是\
  \ Azure 数据库逻辑服务器。\n\n\n\n### 外部表\n\n在 SQL Server 2016 中，我们引入了一项名为 `Polybase` 的功能，它使用\
  \ `T-SQL` 对象 `EXTERNAL TABLE` 来指向 Hadoop 文件系统。在 SQL Server 2019 中，我们将此功能扩展到包括其他数据源，例如\
  \ SQL Server、Oracle、MongoDB、Teradata 以及其他支持 ODBC 驱动程序的源。我们将此功能称为 `数据虚拟化`，因为数据访问是远程的，但通过外部表，它*感觉就像*数据是本地的一样。\n\
  \n在 SQL Server 2022 中，我们引入了一种新的 `Polybase` 方法，通过支持使用 `REST API` 而不是之前的 ODBC 方法来访问\
  \ `Azure 存储`的外部数据源。`REST` 提供了一种更轻量级的方法，因为它是在 SQL 引擎内部执行的。此外，外部表可用于将数据读取或写入 `Parquet`、`CSV`\
  \ 和 `Delta`（仅限读取）等文件格式。\n\n使用 `Polybase` 与 Azure SQL 托管实例的过程与 SQL Server 2022 类似，如图\
  \ 9-1 所示。\n\n![](img/496204_2_En_9_Fig1_HTML.jpg)\n\n图 9-1\n使用 `REST API` 为 SQL\
  \ Server 2022 实现数据虚拟化\n\n对于 Azure SQL 托管实例，有一种更易于管理的方法可用。虽然你仍然拥有外部数据源、文件格式和外部表，但与图\
  \ 9-1 相比有以下不同：\n\n*   无需安装 `Polybase` 功能，因为它已经为托管实例“安装”好了。\n*   无需使用 `sp_configure`\
  \ 配置 `Polybase`，因为它已经启用。\n*   在撰写本书时，尚不支持 `S3`，因此仅支持 `Azure Blob 存储 (abs)` 和 `Azure\
  \ 数据湖存储 (adls)` 数据源。\n\n你仍然需要一个 `数据库范围凭据` 来访问任何私有存储账户，但 Azure SQL 托管实例相对于 SQL Server\
  \ 2022 的一个优点是它也支持 `托管标识`。\n\n开始使用此功能的最佳方法是连接到你的 Azure SQL 托管实例，并针对已知的公共数据集尝试以下查询：\n\
  \n```sql\nSELECT *\nFROM OPENROWSET(\n    BULK 'abs://nyctlc@azureopendatastorage.blob.core.windows.net/yellow/puYear=2001/puMonth=1',\n\
  \    FORMAT = 'parquet'\n) AS taxidata;\nGO\n```\n\n你可以看到，对于你的托管实例，开始使用 `数据虚拟化`\
  \ 是多么容易，且*无需任何配置*。\n\n`数据虚拟化` 的另一个强大功能是能够同时创建外部表并导出数据。我们称之为 `CREATE TABLE AS SELECT\
  \ (CETAS)`。此功能的好处之一是，可以将此数据的结果作为 `Parquet` 文件，并创建一个与 `Microsoft Fabric` 集成的“冷数据”解决方案。该场景如图\
  \ 9-2 所示。\n\n![](img/496204_2_En_9_Fig2_HTML.jpg)\n\n图 9-2\n使用 `数据虚拟化` 与 `Microsoft\
  \ Fabric` 进行集成\n\n这里的核心概念是，将被认为是“冷”的 SQL 分区切换到单独的表中。然后使用 `CETAS` 概念将此表作为 `Parquet`\
  \ 导出到 Azure 存储。由于这是一个外部表，你可以将 parquet 数据作为表进行查询。此外，你可以利用 `Microsoft Fabric` 中的快捷方式概念，轻松地将此数据集成到\
  \ `Microsoft Fabric` 中。你可以在 Anna Hoffman 主持的 `Data Exposed` 节目中看到实际操作，链接为 [`https://learn.microsoft.com/shows/data-exposed/sql-integration-with-microsoft-fabric-data-exposed`](https://learn.microsoft.com/shows/data-exposed/sql-integration-with-microsoft-fabric-data-exposed)。你将在下一章中看到一种更高效的方法，使用称为\
  \ `镜像` 的概念将你的 SQL 数据与 `Microsoft Fabric` 同步。\n\n在 [`https://aka.ms/midatavirt`](https://aka.ms/midatavirt)\
  \ 了解更多关于 Azure SQL 托管实例的 `数据虚拟化` 信息。\n\n虽然 Azure SQL 数据库不以这种方式支持 `Polybase`，但它确实支持外部表用于\
  \ `弹性缩放查询`。这意味着，从技术上讲，你可以设置一个指向另一个 Azure SQL 数据库逻辑服务器和数据库的 `外部数据源`，并使用该数据源定义一个外部表。因此，你现在可以将远程数据库作为外部表进行查询，甚至可以将本地表与远程数据库表进行联接。你可以在\
  \ [`https://learn.microsoft.com/sql/t-sql/statements/create-external-data-source-transact-sql?view=azuresqldb-current&tabs=dedicated#overview-azure-sql-database`](https://learn.microsoft.com/sql/t-sql/statements/create-external-data-source-transact-sql?view=azuresqldb-current&tabs=dedicated#overview-azure-sql-database)\
  \ 查阅 Azure SQL 数据库外部数据源的 `T-SQL` 参考。\n\n看看我的同事 Dimitri Furman 使用此功能的一个很酷的例子，他使用外部表来查看\
  \ `Hyperscale` `读取副本监控`。你可以在 [`https://github.com/dimitri-furman/samples/tree/master/azure-sql-readscale-monitoring`](https://github.com/dimitri-furman/samples/tree/master/azure-sql-readscale-monitoring)\
  \ 找到源代码。\n\n## 数据库邮件\n\n自 SQL Server 4.21 for Windows NT 时代起，SQL Server 就支持内置的 `邮件`\
  \ 功能。此功能的最新版本称为 `数据库邮件`。其概念是，你可以使用 `T-SQL` 基于简单邮件传输协议 (`SMTP`) 发送邮件消息。如果你以前从未使用过\
  \ `数据库邮件`，可以在 [`https://learn.microsoft.com/sql/relational-databases/database-mail/database-mail`](https://learn.microsoft.com/sql/relational-databases/database-mail/database-mail)\
  \ 了解更多信息。\n\n我们将 `数据库邮件` 作为一项功能引入 Azure SQL 托管实例，因为许多尝试使用 Azure SQL 数据库的客户在迁移过程中都希望拥有此功能。`数据库邮件`\
  \ 是一项*实例*级功能，这解释了它为何是 Azure SQL 托管实例的一部分。\n\n使用 `数据库邮件` 的常见场景之一是用于 SQL Server 代理作业的警报。为\
  \ SQL Server 代理作业使用 `数据库邮件` 有一些配置上的差异。请在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#sql-server-agent`](https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#sql-server-agent)\
  \ 阅读更多信息。在 Azure SQL 托管实例上使用 `数据库邮件`，除了文档中指出的这两点不同外，其他几乎所有方面都是相同的：\n\n*   `sp_send_dbmail`\
  \ 不能使用 `@file_attachments` 参数发送附件。此存储过程无法访问本地文件系统、外部共享或 Azure Blob 存储。\n*   `sp_send_db_mail`\
  \ 存储过程中的 `@query` 参数不起作用。\n\n\n\n"
- '# Service Broker


  早在 SQL Server 2005 时代，我们就从客户那里了解到，他们希望使用异步消息传递技术构建面向服务的应用程序。我们设计并构建了一个名为 `Service
  Broker` 的系统，它利用 SQL Server 表、编程和通信的威力，在 SQL Server 引擎内部实现了一个消息传递系统。如果你从未使用过 `Service
  Broker`，可以从这里开始：[`https://learn.microsoft.com/sql/database-engine/configure-windows/sql-server-service-broker`](https://learn.microsoft.com/sql/database-engine/configure-windows/sql-server-service-broker)。


  `Service Broker` 是实例级功能的又一个例子，我们在 Azure SQL Database 中不支持此功能。`CloudLifter` 再次来帮忙。我们在
  Azure SQL 托管实例中支持 `Service Broker` 应用程序。一个主要的限制是我们仅支持在托管实例之间使用 `Service Broker`。完整的差异列表请参阅：[`https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#service-broker`](https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#service-broker)。


  '
- '# 全文搜索


  全文搜索在过去的多个 SQL Server 版本中一直是引擎的集成组件。全文搜索通过 T-SQL 提供针对数据库中存储的 `text` 数据的搜索功能。尽管全文搜索在技术上是
  SQL Server 的实例级功能，但我们在 Azure SQL 托管实例和数据库中均支持此功能。你可以在这里阅读如何开始使用全文搜索：[`https://learn.microsoft.com/sql/relational-databases/search/full-text-search`](https://learn.microsoft.com/sql/relational-databases/search/full-text-search)。


  在 Azure SQL 方面，全文搜索有几个限制：


  *   不支持"第三方过滤器"（例如 Office 和 .pdf 过滤器）。

  *   你无法管理支持全文的服务（如 `fdhost`）。

  *   不支持语义搜索。


  '
- '# 机器学习服务


  在 SQL Server 2016 中，我们为 SQL Server 引入了 `R Services`。其概念是采用一种新架构，让你能够以安全、隔离和可扩展的方式，在
  `与 SQL Server 同一台计算机` 上运行 R 程序。在 SQL Server 2017 中，我们增加了 Python 支持，并将此功能重新命名为 `Machine
  Learning Services`。


  我们最终在 Azure SQL 托管实例中启用了此功能（在 Azure SQL Database 中不可用），但有几点注意事项：


  *   你需要使用 `sp_configure` 的 `external scripts enabled` 选项来启用该功能。

  *   Java 作为可扩展语言在 SQL Server 2019 中被添加，但在 Azure SQL 托管实例中不可用。

  *   虽然预装了 R 和 Python 包，但如果你需要不同的包，可能需要使用一个名为 `sqlmlutils` 的工具。更多信息请参阅：[`https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences?view=azuresql#python-and-r-packages`](https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences?view=azuresql#python-and-r-packages)。

  *   你无法对 R 和 Python 的执行使用自定义资源治理。


  完整的差异列表请阅读：[`https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences`](https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences)。


  '
- '# 分布式事务 (DTC)


  自本书第一版发布以来，`DTC` 支持已成为 Azure SQL 托管实例的一项新功能。此功能常被客户视为从 SQL Server 迁移的阻碍，因此托管实例工程团队在云端启用了它。


  首先需要明确在什么情况下为托管实例使用 `DTC` 功能，以及在什么情况下支持跨 Azure 云服务的分布式数据库事务。


  你可以执行跨 Azure SQL Database 或 Azure SQL 托管实例内数据库的分布式事务（使用 `.Net` 库），这通过一种称为分布式事务的
  `原生支持` 概念实现。你无法跨 Azure SQL Database 和 Azure SQL 托管实例使用此功能。关于原生支持的更多信息请参阅：[`https://learn.microsoft.com/azure/azure-sql/database/elastic-transactions-overview`](https://learn.microsoft.com/azure/azure-sql/database/elastic-transactions-overview)。


  Azure SQL 托管实例的 `DTC` 支持提供了在 `混合` 环境或 Azure SQL 托管实例之间（包括使用 T-SQL）运行分布式事务的能力。混合环境可以是任何支持分布式事务协议（如
  `XA`）的系统，包括本地 SQL Server 实例。在这种情况下，Azure SQL 托管实例管理 `DTC` 的所有方面，就像由 Windows Server
  本地管理的 `DTC` 服务一样。对于跨托管实例的分布式事务，你还需要利用一种称为 `服务器信任组` 的安全模型。这为使用 Microsoft Entra 的
  `DTC`、`Service Broker` 和链接服务器等场景提供了跨实例的身份验证模型。了解更多关于服务器信任组的信息：[`https://learn.microsoft.com/azure/azure-sql/managed-instance/server-trust-group-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/server-trust-group-overview)。为托管实例配置
  `DTC` 需要考虑网络连接问题。了解更多：[`https://learn.microsoft.com/azure/azure-sql/managed-instance/distributed-transaction-coordinator-dtc`](https://learn.microsoft.com/azure/azure-sql/managed-instance/distributed-transaction-coordinator-dtc)。


  '
- '# xp_cmdshell


  `xp_cmdshell` 是 SQL Server 中一个系统支持的扩展存储过程 (`xproc`)。此 `xproc` 作为 `DLL` 在 SQL Server
  的进程空间中运行，但会在 SQL Server 计算机上创建一个新进程来执行你作为参数提供的命令。尽管多年来这一直是 SQL Server 的一个便捷功能，但一些管理员会禁用此过程，因为它被认为是一个安全漏洞。因此，我们在
  Azure SQL 中不支持 `xp_cmdshell`。


  在 Azure SQL 中，确实没有任何等效功能可以从由引擎调用的 T-SQL 过程中运行命令。你需要将此代码从服务器端编程逻辑中移出，放到脚本或应用程序中。


