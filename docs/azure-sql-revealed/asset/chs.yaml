  首先，我需要为组提供一个名称。这成为组的逻辑名称，用于读写和只读连接（非常类似于 Always On 可用性组的监听器）。


  我还提供了在新区域中定义新逻辑服务器的信息（它也可以是现有的逻辑服务器，但必须在另一个区域）。


