  `Azure VM` 的高级选项


  `扩展` 是在虚拟机内部运行的应用程序，可以提供部署后和自动化任务。`SQL Server` 库映像有一个扩展，如果你使用库映像（正如我这里做的），可用于自动配置
  `SQL Server`。在以下网址可能有你想探索的其他扩展：`https://learn.microsoft.com/azure/virtual-machines/extensions/features-windows`。


