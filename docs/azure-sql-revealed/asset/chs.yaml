- '# 7. Azure SQL 的性能监控与调优


  您现在已经了解了如何保护 Azure SQL 部署的安全。另一个确保为您的应用程序提供最佳数据库的方面是了解如何扩展、配置、监控和调优性能。如果您熟悉 SQL
  Server，这里有个好消息：驱动 Azure SQL 的引擎与 SQL Server 的是同一个！这意味着 Azure SQL 几乎拥有您所需的任何性能功能。这也意味着您用于
  SQL Server 的许多相同任务和技能同样适用于 Azure SQL。在本章中，我们将探讨您通常用于监控和调优 SQL Server 性能的所有功能和任务，并与
  Azure SQL 进行比较。您还将学习一些 Azure 特有的功能和技术，以帮助您获得最佳性能。


  本章将包含一些示例，供您在阅读时尝试和使用。要尝试本章中使用的任何技术、命令或示例，您需要：


  *   一个 `Azure 订阅`。

  *   对 `Azure 订阅` 拥有至少 `参与者` 角色访问权限。您可以在 [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles)
  阅读更多关于 Azure 内置角色的信息。

  *   访问 `Azure 门户`。

  *   一个 `Azure SQL 托管实例` 和/或 `Azure SQL 数据库` 的部署，如我在第 4 章中所做。我部署的 `Azure SQL 数据库`
  使用了 `AdventureWorks` 示例数据库，这在部分示例中将会用到。

  *   要连接到 `托管实例`，您需要一个 `Azure` 中的 `跳板机` 或虚拟机。我在本书第 4 章中展示了如何操作。一个简单的方法是创建一个新的 `Azure
  虚拟机`，并将其部署到与 `托管实例` 相同的虚拟网络中（您将使用与 `托管实例` 不同的子网）。

  *   要连接到 `Azure SQL 数据库`，我将使用我在第 3 章部署的名为 `bwsql2022` 的 `Azure 虚拟机`，该虚拟机在第 6 章中配置了专用终结点（只要您能连接到
  `Azure SQL 数据库`，也可以使用其他方法）。

  *   安装 `az` CLI（更多详情请参见 [`https://learn.microsoft.com/cli/azure/install-azure-cli`](https://learn.microsoft.com/cli/azure/install-azure-cli)）。您也可以使用
  `Azure Cloud Shell` 代替，因为 `az` 已预装其中。您可以在 [`https://azure.microsoft.com/features/cloud-shell/`](https://azure.microsoft.com/features/cloud-shell/)
  阅读更多关于 `Azure Cloud Shell` 的信息。

  *   本章将运行一些 `T-SQL`，因此请安装一个工具，如 `SQL Server Management Studio` (`SSMS`)，下载地址为 [`https://aka.ms/ssms`](https://aka.ms/ssms)。我在第
  3 章部署的 `bwsql2022` `Azure 虚拟机` 中安装了 `SSMS`。

  *   本章提供了脚本文件，您可以在本书源文件的 `ch7_performance` 文件夹中找到这些脚本。本章练习中，我还将使用非常流行的工具 `ostress.exe`，它包含在
  `Replay Markup Language` (`RML`) Utilities 中。您可以从 [`https://aka.ms/ostress`](https://aka.ms/ostress)
  下载 `RML`。请确保将 `RML` 的安装文件夹添加到系统路径中（默认为 `C:\Program Files\Microsoft Corporation\RMLUtils`）。


  > **提示**

  >

  > 自本书第一版以来，我制作了一些新的性能故障排除视频和示例实验室，专门针对 `Azure SQL 数据库`。您可以在 [`https://aka.ms/performanceseries`](https://aka.ms/performanceseries)
  找到视频，在 [`https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting`](https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting)
  找到示例实验室。我认为这些资源是本章示例（包含更多性能场景）的一个很好的补充。


  ## 性能功能


  由于驱动 `Azure SQL` 的引擎与 `SQL Server` 相同，因此几乎所有性能功能都可供您使用。话虽如此，了解一些重要领域（包括相似点和不同点）至关重要，因为这些领域会影响您为
  `Azure SQL` 部署确保最大性能的能力。这些领域包括最大容量、索引、`内存中 OLTP`、分区、`SQL Server 2022` 性能增强以及新的 `Azure
  SQL` 智能性能功能。



  ### 最大容量


  当你选择安装 SQL Server 的平台时，通常会`预估`所需的资源规模。在许多情况下，你会规划 CPU、内存和磁盘空间等资源所需的最大容量。你可能还需要确保在
  IOPS 和延迟方面具备正确的 I/O 性能能力。


  在本书第 4 章和第 5 章中，我向你展示了选择、部署和配置 Azure SQL 托管实例与 Azure SQL 数据库部署的所有选项。为确保获得最佳性能，你需要牢记
  Azure SQL 的这些容量限制：


  *   Azure SQL 托管实例最多可支持 128 个 vCore、约 870GB 内存，以及最高 32TB 的存储空间，具体取决于你选择的服务层级和硬件配置。

  *   Azure SQL 数据库最多可支持 128 个 vCore、830GB 内存，以及最高 4TB 的数据库大小，具体取决于你选择的服务层级和硬件配置。Azure
  SQL 数据库的超大规模部署选项可支持最高 100TB 的数据库和无限制的事务日志空间。

  *   你对部署选项（如 vCore 数量）的决策会影响其他资源容量，无论是托管实例还是数据库部署。例如，通用业务型 Azure SQL 数据库的 vCore
  数量会影响最大内存、最大数据库大小、最大事务日志大小以及最大日志速率等。


  让我们在此暂停，以帮助你理清思路。如何查看图表或表格来弄清所有这些选择的限制呢？


  对于托管实例，请从这个显示硬件配置差异的文档页面开始：[`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#hardware-configuration-characteristics`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#hardware-configuration-characteristics)。然后继续向下滚动此页面，查看按服务层级组织的其他限制，如
  vCore、内存、存储等。


  Azure SQL 数据库呢？你可以查看基于 vCore 的容量和限制表格：[`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-vcore-single-databases`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-vcore-single-databases)。如果你选择无服务器计算层，会发现存在一些差异。请收藏这些文档链接。我一直在使用它们。


  请记住，某些限制（如内存）是由 Windows 作业对象强制执行的。我在本书第 4 章中提到过此实现。使用动态管理视图 `sys.dm_os_job_object`
  可以查看部署的真实内存和其他资源限制。


  提示：部署后，你可以通过 `sys.dm_user_db_resource_governance` 等动态管理视图查看你的资源限制。


  如果你做出了错误的选择，需要更多容量怎么办？好消息是，你可以对 Azure SQL 托管实例和数据库进行更改以获得更多（或更少）资源，而无需进行任何数据库迁移。本章后面你将看到一个这样的示例。只需记住，托管实例的更改可能需要相当长的时间。


  此外，对于 Azure SQL 数据库，你可以在通用业务型和业务关键型服务层级之间来回切换（注意，数据库播种可能需要一些时间）。如果你从通用业务型迁移到超大规模，可以再迁移回来一次。但是，如果你从超大规模开始，则无法迁移回通用业务型（并且永远无法迁移到业务关键型）。


  '
- "# 索引\n\n任何与 SQL Server 打交道的人都知道，如果没有合适的索引，很难获得所需的查询性能。\n\n你在 SQL Server 中可以使用的每种索引选项，在\
  \ Azure SQL 中都可用，包括聚集索引、非聚集索引、联机索引和可恢复索引。你可以在 [`https://learn.microsoft.com/sql/relational-databases/indexes/clustered-and-nonclustered-indexes-described`](https://learn.microsoft.com/sql/relational-databases/indexes/clustered-and-nonclustered-indexes-described)\
  \ 阅读索引入门，在 [`https://learn.microsoft.com/sql/relational-databases/indexes/perform-index-operations-online`](https://learn.microsoft.com/sql/relational-databases/indexes/perform-index-operations-online)\
  \ 了解联机索引的详细信息，在 [`https://learn.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations?view=sql-server-ver16#resumable-index-considerations`](https://learn.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations?view=sql-server-ver16#resumable-index-considerations)\
  \ 了解可恢复联机索引的详细信息。可恢复联机索引非常引人注目，因为你可以暂停和恢复大型索引构建，甚至可以在失败点继续索引构建或重建。\n\n`列存储索引`简直令人惊叹。我不断看到客户未能充分利用这一功能。对于合适的工作负载，列存储索引可以将读取查询性能提升\
  \ 100 倍。列存储索引在你选择的 Azure SQL 任何部署选项中都受支持。关于列存储的一个误解是它是一种内存技术。事实是，当列存储索引加载到内存中并使用压缩时，其性能最佳，这样更多数据可以容纳在你的内存限制内。然而，列存储索引并不需要全部加载到内存中。要开始了解列存储索引，请参阅文档：[`https://learn.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview`](https://learn.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview)。\n\
  \n### 内存中 OLTP\n\n在 SQL Server 2014 中（在 SQL Server 2016 中得到了极大增强），我们引入了一项用于高速事务的革命性功能，称为内存中\
  \ OLTP（代号 Hekaton）。如果你选择业务关键型服务层级，内存中 OLTP 可用于 Azure SQL 托管实例和数据库。\n\n内存优化表是使用内存中\
  \ OLTP 的机制。内存优化表是真正的内存驻留表，因为它们必须完全加载到内存中。可用于存储内存优化表的内存是业务关键型服务层级内存限制的一个子集。部署的 vCore\
  \ 数量决定了可用于内存优化表的内存百分比。超大规模支持一部分内存中 OLTP 对象，包括内存优化表类型、表变量和本机编译模块，但不支持内存优化表。\n\n注意：内存优化表需要一个内存优化文件组。Azure\
  \ SQL 会为任何数据库创建此文件组，即使它不是业务关键型（BC）服务层级。这样，如果你迁移到 BC，文件组已经为内存优化表设置好了。\n\n刚接触内存中 OLTP？请从我们的文档开始：[`https://learn.microsoft.com/sql/relational-databases/in-memory-oltp/overview-and-usage-scenarios`](https://learn.microsoft.com/sql/relational-databases/in-memory-oltp/overview-and-usage-scenarios)。\n\
  \n## 分区\n\n分区常与 SQL Server 配合用于包含大量行的表，通过按表中的列细分数据来提升性能。关于分区和 Azure SQL，请考虑以下几点：\n\
  \n*   Azure SQL Database 和托管实例均支持分区。\n*   对于 Azure SQL 托管实例，您只能将文件组与分区结合使用。（请记住，Azure\
  \ SQL Database 仅具有主分区和文件组，而托管实例支持用户定义的文件组）。\n\n需要分区入门知识吗？请从此文档页面开始：[`https://learn.microsoft.com/sql/relational-databases/partitions/partitioned-tables-and-indexes`](https://learn.microsoft.com/sql/relational-databases/partitions/partitioned-tables-and-indexes)。\n\
  \n注意\n作为开发者，您可能想了解 Azure SQL Database 中一些与 SQL 分区无关的有趣 `分区化` 技术。更多信息请阅读：[`https://learn.microsoft.com/azure/architecture/best-practices/data-partitioning-strategies#partitioning-azure-sql-database`](https://learn.microsoft.com/azure/architecture/best-practices/data-partitioning-strategies#partitioning-azure-sql-database)。\n\
  \n## SQL Server 2022 增强功能\n\nSQL Server 2022 包含多项与性能相关的增强功能，这些功能在 Azure SQL 托管实例和\
  \ Azure SQL Database 中同样可用：\n\n*   `智能查询处理` (IQP) 改进\n\n    IQP ([`https://aka.ms/iqp`](https://aka.ms/iqp))\
  \ 是一系列内置于查询处理器中的功能，旨在让您的 T-SQL 查询运行更快或在无需更改代码的情况下保持性能。\n\n    Azure SQL 托管实例和数据库包含来自\
  \ SQL Server 2017 和 2019 的所有 IQP 功能。此外，SQL Server 2022 的 IQP 功能也已在 Azure SQL 中可用。更多详情请参阅本章最后一节“智能性能”。\n\
  \n*   `查询存储提示`\n\n    计划指南一直是强制或塑造独立于应用程序所发送查询的查询计划的有效方法。但此功能存在限制，且使用起来可能较为复杂。\n\
  \n    查询存储提示允许您向应用程序发出的任何传入查询“添加”查询提示，以塑造或更改查询计划。这些提示持久存储在查询存储中，使您能够基于一系列提示强制执行某个查询计划。一些新的\
  \ IQP 功能在后台使用了查询存储提示。了解更多：[`https://aka.ms/querystorehints`](https://aka.ms/querystorehints)。\n\
  \n注意\n重要的是要知道，一些“隐藏瑰宝”功能，如循环扫描和缓冲池加速，都在后台用于 Azure SQL 的所有版本。更多信息请访问：[`https://learn.microsoft.com/sql/relational-databases/reading-page`](https://learn.microsoft.com/sql/relational-databases/reading-page)。\n\
  \n### 智能性能\n\n在过去几个 SQL Server 版本中，我们一直致力于提供内置功能，以增强性能而无需您更改应用程序。我们的目标是利用数据和自动化做出明智决策，使您的查询运行更快。我们将此称为\
  \ `智能性能`。这些功能存在于 Azure SQL 中，但我们在云端走得更远。我们利用云的力量提供更多功能。您可以在本章最后一节（IQP 是其中的一部分）了解更多关于\
  \ Azure SQL 智能性能的细节。\n\n## 性能配置与维护\n\n在本书第 5 章中，我介绍了配置 Azure SQL 托管实例和数据库的许多选项。有一些可能影响性能的配置选项值得深入探讨。这包括\
  \ `tempdb` 数据库、数据库选项配置、文件和文件组、`最大并行度` 以及 `资源调控器`。此外，值得比较一下与 SQL Server 相比，为 Azure\
  \ SQL 数据库维护索引和统计信息所需执行的各项任务。\n\n### Tempdb\n\n`tempdb` 数据库是应用程序使用的重要共享资源。确保 `tempdb`\
  \ 配置正确会影响您提供一致性能的能力。Azure SQL 中 `tempdb` 的使用方式与 SQL Server 相同，但您配置 `tempdb` 的能力有所不同，包括文件放置位置、文件数量和大小、`tempdb`\
  \ 大小以及 `tempdb` 配置选项。\n\n在 Azure SQL Database 中，`tempdb` 文件始终自动存储在本地 SSD 驱动器上，因此\
  \ I/O 性能不应成为问题。\n\nSQL Server 专业人员通常使用多个数据库文件来为 `tempdb` 表分区分配。对于 Azure SQL Database，文件数量随\
  \ vCore 数量扩展（例如，2 vCore = 4 个文件），最多为 16 个。文件数量无法通过针对 `tempdb` 的 T-SQL 进行配置，而需通过\
  \ `更改部署选项` 来设置。`tempdb` 数据库的最大大小也随 vCore 数量扩展。\n\n我在第 5 章中提到，在 Azure SQL 托管实例中，您可以对\
  \ `tempdb` 进行一些配置选项，包括扩展文件数量、文件的逻辑名称以及自动增长增量大小值。\n\n`tempdb` 数据库选项 `MIXED_PAGE_ALLOCATION`\
  \ 设置为 `OFF`，`AUTOGROW_ALL_FILES` 设置为 `ON`。这无法配置，但与 SQL Server 一样，它们是推荐的默认设置。\n\n\
  ### 数据库配置\n\n正如我在第 5 章所述，通过 `ALTER DATABASE` 和 `ALTER DATABASE SCOPED CONFIGURATION`，Azure\
  \ SQL 几乎提供了与 SQL Server 相同的所有数据库配置选项。请查阅文档：[`https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql)\
  \ 和 [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql)。您将在本章后面看到\
  \ `ALTER DATABASE` 中针对 Azure SQL 的新选项。\n\n对于性能而言，有一个无法更改的数据库选项是数据库的 `恢复模式`。默认为完整恢复，且无法修改。我经常看到社区比较\
  \ SQL Server 和 Azure SQL 的 OLTP 性能，但没有使用完整恢复，这可能会对批量插入等场景的性能产生影响。这确保您的数据库能够满足 Azure\
  \ 服务级别协议 (SLA)。因此，不支持批量操作的最小日志记录。`tempdb` 支持批量操作的最小日志记录。\n\n### 文件与文件组\n\nSQL Server\
  \ 专业人员通常使用文件和文件组，通过物理文件放置来提升 I/O 性能。Azure SQL 不允许用户将文件放置在特定的磁盘系统上。然而，Azure SQL 在\
  \ I/O 速率、IOPS 和延迟方面有性能保障，因此将用户与物理文件放置相隔离也可能是一种优势。\n\nAzure SQL 数据库通常只有一个数据库文件（Hyperscale\
  \ 可能有多个），其大小通过 Azure 界面进行配置。没有创建额外文件的功能，但同样地，考虑到 IOPS 和 I/O 延迟的保障，你无需为此担心。\n\n**注意**\n\
  > Hyperscale 拥有独特的架构，初始部署时可能会根据你的 vCore 选择创建一个或多个文件。例如，对于一个 8 vCore 的部署，我见过 Hyperscale\
  \ 创建了总计 40GB 的多个文件。此实现方式可能会改变，你不应依赖于此。Hyperscale 只是简单地根据需要创建文件和分配大小以满足你的要求。\n\n\
  Azure SQL 托管实例支持添加数据库文件和配置大小，但不支持文件的物理放置。托管实例的文件数量和文件大小可以用来提升 I/O 性能。然而，正如我在本书第\
  \ 4 章中提到的，下一代通用服务层使用了不同的 I/O 架构，让你无需添加文件或更改大小即可控制 I/O 性能。此外，为了管理性目的（例如与分区结合使用，或使用像\
  \ `DBCC CHECKFILEGROUP` 这样的命令），Azure SQL 托管实例支持用户定义的文件组。\n\n### 最大并行度\n\n最大并行度（`MAXDOP`）会影响单个查询的性能，其在\
  \ Azure SQL 引擎中的工作方式与 SQL Server 相同。在 Azure SQL 中配置 `MAXDOP` 对于提供一致的性能可能非常重要。你可以像在\
  \ SQL Server 中一样，使用以下技术在 Azure SQL 中配置 `MAXDOP`：\n\n*   支持在 Azure SQL 中使用 `ALTER\
  \ DATABASE SCOPED CONFIGURATION` 来配置 `MAXDOP`。\n*   支持在托管实例中使用 `sp_configure` 配置\
  \ “max degree of parallelism”。\n*   完全支持 `MAXDOP` 查询提示，包括查询存储提示。\n*   支持在托管实例中使用资源调控器配置\
  \ `MAXDOP`。\n\n阅读更多关于 `MAXDOP` 的信息，请访问 [`https://learn.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option`](https://learn.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option)。\n\
  \n你将在本章名为“智能性能”的部分了解到更多关于智能查询处理（IQP）的一个名为 `DOP feedback` 的功能，它可以动态地辅助 SQL 引擎调整查询的\
  \ `DOP`。\n\n### 资源调控器\n\n资源调控器是 SQL Server 中的一项功能，可通过 I/O、CPU 和内存来控制工作负载的资源使用。虽然资源调控器在\
  \ Azure SQL 数据库中是在后台使用的，但对于 Azure SQL 托管实例，它支持用户自定义的工作负载组和池。如果你希望在 Azure SQL 托管实例中使用资源调控器，请查阅我们的文档：[`https://learn.microsoft.com/sql/relational-databases/resource-governor/resource-governor`](https://learn.microsoft.com/sql/relational-databases/resource-governor/resource-governor)。\n\
  \n### 维护索引\n\n不幸的是，SQL 的索引不会自我维护，它们偶尔确实需要维护。公平地说，索引维护（具体指重建或重组）没有一个单一的答案。我见过很多客户在非必要时过于频繁地执行重建或重组。同样，也有很多时候这些操作可以提升性能。你可以考虑查看我们关于索引碎片的文档，作为索引维护有意义的一个原因：[`https://learn.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes`](https://learn.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes)。\n\
  \n**注意**\n> 我并没有说出全部真相。对于 Azure SQL，这里有一个解决方案可以帮助决定是创建还是删除索引。但我不会提前透露太多。这个故事的结局在本章末尾。\n\
  \nSQL Server 的索引偶尔需要重组，有时需要重建。Azure SQL 支持 SQL Server 中用于重组和重建索引的所有选项，包括联机和可恢复索引操作。\n\
  \n联机和可恢复索引操作对于维护最大的应用程序可用性极为重要。阅读有关这些功能的全部信息，请访问 [`https://learn.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations`](https://learn.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations)。\n\
  \n### 维护统计信息\n\n正确的统计信息是查询性能的生命线。SQL Server 提供了基于数据库修改自动保持统计信息最新的选项，Azure SQL 支持所有这些选项。我们的文档对统计信息如何用于查询性能有非常详细的解释：[`https://learn.microsoft.com/sql/relational-databases/statistics/statistics`](https://learn.microsoft.com/sql/relational-databases/statistics/statistics)。\n\
  \n自动统计信息更新的一个有趣方面是我们专门为 Azure SQL 引入的一个数据库范围配置，旨在帮助提高应用程序可用性。你可以从我的同事 Dimitri Furman\
  \ 的博客文章中阅读关于此功能的详细信息：[`https://techcommunity.microsoft.com/t5/azure-sql-database/improving-concurrency-of-asynchronous-statistics-update/ba-p/1441687`](https://techcommunity.microsoft.com/t5/azure-sql-database/improving-concurrency-of-asynchronous-statistics-update/ba-p/1441687)。\n\
  \n## 监控与故障排除性能\n\n如果你想确保 SQL 应用程序获得最佳性能，你需要学习如何监控和故障排除性能场景。Azure SQL 随附了 SQL Server\
  \ 的性能工具和功能来协助你完成此任务。这包括来自 Azure 生态系统的工具以及驱动 Azure SQL 的 SQL Server 引擎内置的功能。\n\n\
  在本章的这一部分，你将不仅学习到监控功能，还将学习如何将它们应用于 Azure SQL 的性能场景，包括示例。\n\n### 监控工具与功能\n\nAzure\
  \ 提供了与 SQL 集成但位于 Azure 生态系统之外的工具，称为 Azure Monitor。\n\n你习惯于使用动态管理视图（`DMV`）和扩展事件吗？Azure\
  \ SQL 拥有你需要的功能。你需要调试查询计划吗？Azure SQL 拥有 SQL Server 的所有功能，包括轻量级查询分析和 `showplan` 详细信息。\n\
  \n查询存储已成为性能调优的基石，它在 Azure SQL 中默认是开启的。Azure 门户包含可视化效果，例如查询性能见解，无需像 SSMS 这样的工具即可查看查询存储数据。\n\
  \n此外，自从本书第一版以来，出现了两个突破性的新工具，可以显著节省你的时间和精力：Database Watcher 和 Azure SQL Database\
  \ 中的 Microsoft Copilot 技能。\n\n所有这些汇聚成一套强大的工具和功能，帮助你监控和故障排除 Azure SQL 的性能。\n\n\n"
- '# Azure SQL 性能监控与诊断工具


  Azure SQL 提供了丰富的内置工具，用于监控、诊断和优化性能，这些工具与 SQL Server 中的工具相似，但也存在一些云环境特有的差异。


  ## Azure Monitor


  `Azure Monitor` 是 Azure 生态系统的一部分，`Azure SQL` 已与之集成，以支持指标、警报和日志功能。`Azure Monitor`
  数据可在 `Azure 门户` 中可视化，或通过应用程序通过 `Azure Event Hub` 或 `API` 访问。`Azure Monitor` 重要性的一个例子是，可以像使用
  `Windows 性能监视器` 一样，在 `SQL Server` 工具之外访问 `Azure SQL` 的资源使用指标。在 `Azure 门户` 中，通过 [`https://learn.microsoft.com/azure/azure-sql/database/monitor-tune-overview?view=azuresql#monitoring-and-tuning-capabilities-in-the-azure-portal`](https://learn.microsoft.com/azure/azure-sql/database/monitor-tune-overview?view=azuresql#monitoring-and-tuning-capabilities-in-the-azure-portal)
  阅读有关如何将 `Azure Monitor` 与 `Azure SQL` 配合使用的更多信息。


  ## 动态管理视图 (DMVs)


  `Azure SQL` 提供了与 `SQL Server` 相同的 `DMV` 基础结构，但存在一些差异。`DMV` 是性能监控的关键方面，因为您可以使用标准的
  `T-SQL` 查询来查看关键的 `SQL Server` 性能数据。诸如活动查询、资源使用情况、查询计划和资源等待类型等信息都可以通过 `DMV` 获得。本章后续将详细介绍
  `Azure SQL` 中的 `DMV`。


  ## 扩展事件 (XEvent)


  `Azure SQL` 提供了与 `SQL Server` 相同的 `Extended Events` 基础结构。`Extended Events` 是一种跟踪
  `SQL Server` 内关键执行事件的方法，它为 `Azure SQL` 提供支持。出于性能考虑，`Extended Events` 允许您跟踪单个查询的执行情况。本章后续将详细介绍
  `Azure SQL` 中的 `Extended Events`。


  ## 轻量级查询分析


  `轻量级查询分析` 是一种检查活动查询的查询计划和运行状态的功能。这是在长时间运行的语句执行时调试其查询性能的关键功能。与使用像 `Extended Events`
  这样的工具来跟踪查询性能相比，此功能减少了您解决性能问题所需的时间。`轻量级查询分析` 通过 `DMV` 访问，并且对于 `Azure SQL` 默认是开启的，就像
  `SQL Server 2022` 一样。在 [`https://learn.microsoft.com/sql/relational-databases/performance/query-profiling-infrastructure?view=sql-server-ver15#lwp`](https://learn.microsoft.com/sql/relational-databases/performance/query-profiling-infrastructure?view=sql-server-ver15#lwp)
  阅读有关 `轻量级查询分析` 的更多信息。


  ## 查询计划调试


  在某些情况下，您可能需要关于单个 `T-SQL` 语句查询性能的更多详细信息。诸如 `SHOWPLAN` 和 `STATISTICS` 之类的 `T-SQL SET`
  语句可以提供这些详细信息，并且在 `Azure SQL` 中与在 `SQL Server` 中一样完全受支持。一个使用 `SET` 语句进行查询计划调试的好例子可以在
  [`https://learn.microsoft.com/sql/t-sql/statements/set-statistics-profile-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/set-statistics-profile-transact-sql)
  找到。此外，以图形或 `XML` 格式查看计划总是很有帮助的，并且在 `Azure SQL` 中完全有效。在 [`https://learn.microsoft.com/sql/relational-databases/performance/display-the-estimated-execution-plan`](https://learn.microsoft.com/sql/relational-databases/performance/display-the-estimated-execution-plan)
  了解更多信息。


  ### 查询存储


  `查询存储` 是存储在用户数据库中的查询执行性能的历史记录。对于 `Azure SQL`，`查询存储` 默认是开启的，并用于提供诸如 `自动计划修正` 和 `自动调优`
  之类的功能。`SQL Server Management Studio (SSMS)` 中的 `查询存储` 报告适用于 `Azure SQL`。这些报告可用于查找资源消耗最高的查询，包括查询计划差异和顶级等待类型，以分析资源等待场景。


  `查询存储` 现在也用于某些 `智能查询处理 (IQP)` 场景中，以存储用于提高性能的反馈信息。


  本章我将向您展示一个在 `Azure SQL` 中使用 `查询存储` 的示例。如果您从未见过或使用过 `查询存储`，可以从阅读 [`https://learn.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store`](https://learn.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store)
  开始。


  ## Azure 门户中的性能可视化


  对于 `Azure SQL 数据库`，我们已通过可视化效果将 `查询存储` 性能信息集成到 `Azure 门户` 中。这样，您就可以使用一个名为 **查询性能见解**
  的选项，在 `Azure 门户` 中看到与使用 `SSMS` 等客户端工具查看 `查询存储` 时相同的一些信息。本章稍后我将向您展示在门户中使用这些可视化效果的示例。现在，要开始使用它，请查阅我们的文档：[`https://learn.microsoft.com/azure/azure-sql/database/query-performance-insight-use`](https://learn.microsoft.com/azure/azure-sql/database/query-performance-insight-use)。


  ## 数据库监视器


  坦率地说，我们在 `Azure` 中曾多次尝试提供一种监控解决方案，以提供丰富且可视化的体验来监控 `Azure SQL`，但都没有成功。


  我相信 `数据库监视器`，这个用于监控 `SQL` 的新云服务（在撰写本书时处于预览版），将会有所不同，原因如下：


  *   该服务与 `SQL` 是分离的，它通过 `DMV` 和 `查询存储` 等元数据使用内置遥测，并将信息持久化存储在 `Kusto` 群集中。

  *   该服务默认附带一组丰富的可视化效果，几乎可以提供 `SQL` 专业人员所需的任何内容。这就是为什么我称它为“云中的 `perfmon`”。

  *   该服务允许您跨多个 `Azure SQL 托管实例` 和 `数据库` 收集数据。并且一些可视化效果允许您跨这些对象查看。例如，您可以查看跨数据库（实际上是跨
  `查询存储`）的顶级查询。

  *   该服务的发布由我的同事 `Dimitri Furman` 负责管理，我认为他是微软内部 `SQL` 领域的顶级专家之一。在本章中，您将看到它的卓越之处。


  图 7-1 展示了 `数据库监视器` 的整体架构。


  ![](img/496204_2_En_7_Fig1_HTML.jpg)


  图 7-1

  数据库监视器架构


  该服务连接到目标（即您的 `Azure SQL 托管实例` 和 `数据库`）。它从这些目标收集数据并存储在 `Kusto` 群集中。该服务附带了一些非常丰富的可视化效果，但您也可以使用
  `K-SQL` 或 `T-SQL` 来查询该群集。此外，您可以将遥测数据存储在 `Microsoft Fabric` 实时分析中，以构建像 `Power BI`
  报表这样的解决方案。


  您可以在 [`https://aka.ms/dbwatcher`](https://aka.ms/dbwatcher) 开始使用 `数据库监视器`，也可以在安娜·霍夫曼（`Anna
  Hoffman`）著名的 `Data Exposed` 节目中看到她和我对此的讨论：[`https://learn.microsoft.com/shows/data-exposed/database-watcher-your-perfmon-in-the-cloud-data-exposed`](https://learn.microsoft.com/shows/data-exposed/database-watcher-your-perfmon-in-the-cloud-data-exposed)。




