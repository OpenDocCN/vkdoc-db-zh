  \ 和 SQL Server 应用非关键更新。我将在本章后面标题为“配置”的部分更详细地描述此功能。\n\n`自动备份`使用作为 SQL Server 2016\
  \ 一部分发布的托管备份到 Azure 功能。您的需求可能有所不同，但许多用户可能会发现此选项对于为 SQL Server 提供简单的自动化备份解决方案非常有用。启用此选项后，您有多个选择来配置如何执行备份。\n\
