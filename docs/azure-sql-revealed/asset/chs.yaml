  Apress 继续给予我机会分享我的知识。


  我还要感谢微软 Azure SQL 领导层、产品管理、工程、市场和销售团队的所有成员，他们都帮助赋能了这个“世界的数据库”。在微软幕后，有无数的人让这项不可思议的服务每一天都变得更好。




  最后，感谢你们——这些支持并帮助我们推广`SQL Server`和`Azure SQL`精彩故事的社区成员。你们中的许多人已经踏上了迁移到`Azure`的旅程，还有一些人仍在进行中或正在考虑。感谢所有`#sqlfamily`，你们为与`SQL`相关的一切投入了热情和精力。


