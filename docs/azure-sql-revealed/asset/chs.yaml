- '# 8. Azure SQL 的可用性


  至此，你已经经历了从部署、配置、安全到扩展、监控和性能调优的旅程。Azure SQL *核心* 的最后一个环节是**可用性**。多年来，我与 SQL Server
  客户交流时，几乎没人不需要其数据库具备高可用性。我也几乎从未遇到过不关心灾难恢复能力的客户。因此，本章实际上讲述的是 Azure SQL 的**高可用性和灾难恢复
  (HADR)**。我想告诉你的是，在我过去一年评估和使用 Azure SQL 之后，我认为其内置的 HADR 功能是该服务的一大亮点。事实上，我相信在你学完本章后，会确信仅凭其
  HADR 功能，就值得将 Azure SQL 作为你的部署目标。


  在本章中，我们将大部分时间深入探讨 HADR 功能的细节，包括备份与还原、内置可用性、通过 Azure 扩展 HADR，以及数据库可用性和一致性。最后，我将介绍如何监控你的部署的
  HADR。


  本章包含供你边阅读边尝试和使用的示例。要尝试本章中使用的任何技术、命令或示例，你需要具备：


