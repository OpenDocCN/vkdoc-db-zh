  \ 3-20\n\n创建虚拟机前的验证\n\n在此屏幕顶部，您可以看到您选择的虚拟机大小以及每小时的估计成本。另请注意`使用条款`和`隐私政策`。随 SQL Server\
  \ 提供的最终用户许可协议（EULA）仍然适用于 Azure 虚拟机，因为这是一个完全许可的 SQL Server。但是，由于您在 Azure 中部署虚拟机，有一些条款和隐私政策您应该审阅。您可以在[`https://azure.microsoft.com/support/legal`](https://azure.microsoft.com/support/legal)阅读更多关于\
  \ Azure 使用条款的信息。隐私是一个非常重要的话题，由于 Microsoft 在云中托管您的虚拟机，您需要了解 Microsoft 收集的所有信息的详细信息。在[`https://privacy.microsoft.com/privacystatement`](https://privacy.microsoft.com/privacystatement)阅读更多。您对操作系统和/或\
  \ SQL Server 的库映像的使用也有称为 Azure Marketplace 条款的条款。您可以在[`https://azure.microsoft.com/support/legal/marketplace-terms/`](https://azure.microsoft.com/support/legal/marketplace-terms/)阅读更多信息。\n\
  \n您还会在此屏幕上注意到关于允许 RDP 端口暴露于互联网的警告。您将在下面标题为“连接到您的虚拟机”的部分了解更多关于如何控制访问和限制任何问题的信息。如果您在此屏幕上向下滚动，您将看到您选择部署虚拟机的所有选项的详细信息。另请注意屏幕底部的`下载自动化模板`选项。我将在本章后面标题为“使用\
  \ CLI 与 ARM 模板、Bison 和 Terraform”的部分讨论使用模板进行自动化。\n\n点击`创建`按钮准备启动！虚拟机的部署是异步的，因此您甚至可以退出门户，部署在后台完成。但是，如果您保持门户屏幕打开，您可以实时跟踪进度。在点击创建后几秒钟内，我的屏幕如图\
  \ 3-21 所示，以跟踪部署进度。\n\n![](img/496204_2_En_3_Fig21_HTML.jpg)\n\n图 3-21\n\nAzure 虚拟机部署进行中\n\
  \n不仅主屏幕在虚拟机创建时刷新，您还可以点击门户标题栏上的`通知`图标来跟踪进度。在我的示例中，大约十分钟后部署完成。图 3-22 显示了所有详细信息，包括来自`通知`图标的状态。\n\
  \n![](img/496204_2_En_3_Fig22_HTML.jpg)\n\n图 3-22\n\nAzure 虚拟机中 SQL Server 的部署完成\n\
  \n您会注意到对于部署详细信息，部署的不仅是一个虚拟机，而是许多不同的资源，包括网络接口、磁盘、存储帐户、虚拟网络和安全性组。如果您想要更多关于部署的详细信息，可以点击`活动日志中的更多事件`。\n\
  \n如果您点击`转到资源`，您将看到虚拟机的概述屏幕。从 SQL Server 的角度，还有另一个视图我稍后将介绍。让我们参观一下如何导航 Azure 虚拟机的`概述`屏幕。\n\
  \n\n\n### 在门户中导航 Azure 虚拟机\n\n在本书中，你会发现自己经常使用 Azure 虚拟机概述屏幕的多个方面。让我们来检查一下概述屏幕的主要区域，如图\
  \ 3-23 所示。\n\n![](img/496204_2_En_3_Fig23_HTML.jpg)\n\n**图 3-23** Azure 虚拟机的概述屏幕\n\
  \n1.  **服务菜单**\n    每个 Azure 资源都提供一系列选项来管理该资源。服务菜单的顶部对所有资源都是相同的。如果你在深入查看虚拟机的`blades\
  \ or sections`详细信息时想要“找回方向”，你会需要使用`概述`选项。这一点非常重要，因为我经常点击屏幕右上角的 X，然后完全丢失了虚拟机的上下文。通过点击服务菜单上的`概述`，我可以保持该上下文。\n\
  \    在`概述`下方，我们将看到查看与此特定虚拟机相关的活动日志条目的选项，能够使用 RBAC 控制*外部*对虚拟机的访问，设置新标签，或诊断问题。其下是一系列可展开的类别选项，例如`连接`以连接到虚拟机，`网络`以配置网络选项，或`设置`以配置虚拟机的特定方面。还有其他选项你可以探索。我不会在这里逐一介绍每个选项，但会在本章剩余部分使用其中几个选项。\n\
  \n2.  **命令栏**\n    这些是允许你操作虚拟机的按钮。每个 Azure 资源都有其独特的按钮。你将使用最常见的按钮是`连接`、`启动`、`重新启动`和`停止`。我将在本章后面题为“停止与解除分配”的小节中更详细地介绍使用此选项停止虚拟机的意义。\n\
  \n3.  **基本信息**\n    严格来说，这是工作窗格的一部分。此区域显示关于你虚拟机的关键信息，包括资源组、区域、状态、操作系统版本和虚拟机大小，但也能让你导航到虚拟机的某些方面，例如虚拟网络。\n\
  \n4.  **工作窗格**\n    工作窗格包含用于查看虚拟机详细属性、通过运行状况事件、警报和性能指标进行监控、启用 Windows 管理中心等功能、建议和培训教程的部分。\n\
  \n在 [`https://learn.microsoft.com/azure/azure-portal/azure-portal-overview#getting-around-the-portal`](https://learn.microsoft.com/azure/azure-portal/azure-portal-overview%2523getting-around-the-portal)\
  \ 探索更多关于如何在门户中导航的信息。\n\n### 连接到你的虚拟机\n\n现在你已经部署了虚拟机，首先要做的事情之一就是连接到它。对于 Windows 虚拟机，最流行的连接和使用方式是使用`远程桌面协议\
  \ (RDP)`。在虚拟机部署示例中你看到，我选择了向互联网开放 RDP 端口(`3389`)的选项。\n要使用 RDP，请点击命令栏中的`连接`按钮并选择`连接`。你将看到如图\
  \ 3-24 所示的连接选项。\n\n![](img/496204_2_En_3_Fig24_HTML.jpg)\n\n**图 3-24** 通过 RDP 连接到\
  \ Azure 虚拟机\n\n你可以通过选择`下载 RDP 文件`来通过 RDP 连接。RDP 文件将被复制到你客户端机器的`下载`文件夹中。虚拟机的公共 IP\
  \ 地址也显示在这里，如果你只想使用任何有效的 RDP 客户端直接连接到虚拟机。一旦连接，就像任何虚拟机或 Windows 计算机一样，系统会提示你输入凭据（你在部署时提供的），默认情况下是管理员组的成员。\n\
  注意：如果你注意到在`下载 RDP 文件`下方，有一些选项可以帮助你排查任何 RDP 连接问题，如果你遇到任何问题，我强烈建议你查看一下。\n\n如果你使用`选择`，你还可以在此屏幕上看到一个建议，启用虚拟机的`即时访问`以提高安全性。即时访问是一种“按需”获取虚拟机\
  \ RDP 访问权限的方法，这样当你不使用虚拟机时，RDP 端口不会向互联网开放。这是一种允许你从任何客户端连接到虚拟机，同时限制 RDP 端口对所有人暴露的方法。你可以在\
  \ [`https://learn.microsoft.com/azure/defender-for-cloud/just-in-time-access-usage`](https://learn.microsoft.com/azure/defender-for-cloud/just-in-time-access-usage)\
  \ 了解更多关于即时访问的信息。\n你在此屏幕上看到的另一种方法是使用一种更安全的方法，称为`Azure Bastion`，你可以在 [`https://azure.microsoft.com/services/azure-bastion/`](https://azure.microsoft.com/services/azure-bastion/)\
  \ 了解更多。我遇到过一些客户，他们的公司禁止在笔记本电脑上使用 RDP，因此这种基于浏览器的方法是一个极好的、更安全的选项，可用于连接到虚拟机。\n你也可以使用标准的\
  \ SQL 工具（如`SSMS`）从你在同一 Azure 虚拟网络中部署的另一台 Azure 虚拟机进行连接。我经常会在同一虚拟网络中部署另一台“客户端”Azure\
  \ 虚拟机，这样我就可以使用 SQL 工具私下连接到我的 SQL Server 部署。\n\n### 探索 SQL Server 安装\n\n我想你可能有兴趣了解当我们使用\
  \ SQL Server 库映像进行部署时，我们具体安装和配置 SQL Server 实例的内容。\n\n#### 安装内容\n\nSQL Server 库映像安装整个数据库引擎、`SQL\
  \ Server Analysis Services`、`SQL Server Integration Services (SSIS)`、`MDS`和`DQS`。此外，我们还安装以下引擎功能：\n\
  * `SQL Server Agent`\n* `SQL Server Replication`\n* `全文搜索`\n我们还安装客户端、工具、SDK 和`SQL\
  \ Server Management Studio`。默认情况下，我们不安装`Polybase`。正如我在本章前面所述，你可以根据你选择的选项，在部署过程中安装`R\
  \ Services`。\n注意：你的许可证包括部署`SQL Server Reporting Services`的权限，但像 SQL Server 一样，我们不安装它。你可以使用\
  \ [`https://learn.microsoft.com/sql/reporting-services/install-windows/install-reporting-services`](https://learn.microsoft.com/sql/reporting-services/install-windows/install-reporting-services)\
  \ 自行部署。此外，拥有 SA 协议的企业版客户有权安装`Power BI Report Server` ([`https://www.microsoft.com/power-platform/products/power-bi/report-server`](https://www.microsoft.com/power-platform/products/power-bi/report-server))。\n\
  对于 SQL Server 库映像，我们会复制 SQL Server 介质，因此你可以安装或删除任何你想要的功能。你可以在虚拟机中的`C:\\SQLServerFull`文件夹中找到所有安装文件。图\
  \ 3-25 展示了使用 SQL Server 2022 库映像默认安装的功能示例。\n\n![](img/496204_2_En_3_Fig25_HTML.jpg)\n\
  \n**图 3-25** 默认安装的 SQL Server 功能\n\n\n#### 配置内容\n\n以下是我们作为 SQL Server 库安装镜像过程的一部分所做出的配置选择列表：\n\
  \n*   `SQL Server`、`SQL Server Agent`、全文检索和 `SSIS` 服务设置为自动启动，并在部署后处于运行状态。所有服务均使用服务\
  \ SID。\n*   您在部署期间指定的虚拟机管理员帐户将成为 SQL 系统管理员。\n*   默认禁用文件流功能（但可以启用并支持）。\n*   默认禁用始终启用可用性组（但可以启用并支持）。\n\
  *   为 SQL Server 启用了 TCP/IP 协议（即使开发版也是如此）。\n*   我们通常会安装最新的累积更新（和/或安全更新），但可能并非确切的最新累积更新。您可以在\
  \ [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-on-azure-vm-iaas-what-is-overview?view=azuresql#lifecycle`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-on-azure-vm-iaas-what-is-overview?view=azuresql#lifecycle)\
  \ 阅读更多关于我们如何保持镜像更新的信息。\n*   默认启用 CEIP，但您可以将其禁用。请在 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-on-azure-vm-iaas-what-is-overview?view=azuresql#customer-experience-improvement-program-ceip`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-on-azure-vm-iaas-what-is-overview?view=azuresql#customer-experience-improvement-program-ceip)\
  \ 阅读更多信息。\n*   默认安装 Microsoft SQL Server VSS Writer。\n\n### 自行部署\n\n如今，当我在 Hyper-V\
  \ 虚拟机（通常只是在我的笔记本电脑上）中部署 SQL Server 实例时，我会经历为虚拟机选择某些选项（如逻辑 CPU 数量、内存、磁盘位置）的过程，然后安装操作系统，如\
  \ Windows Server 或 Linux（通常从 .ISO 文件安装）。完成后，我通常使用远程桌面（Windows）或 ssh（Linux）连接到虚拟机。对于\
  \ Windows，我会将 SQL Server 安装介质下载到本地驱动器，然后“复制并粘贴”到虚拟机中的文件夹。然后运行安装程序，开始部署 SQL Server。对于\
  \ Linux，我只需确保我的虚拟机连接到互联网，并运行 SQL Server on Linux 安装程序，该安装程序在安装过程中会下载软件包。\n\n此过程与\
  \ SQL Server on Azure 虚拟机的“自行部署”选项几乎完全相同，只有一个例外。您将使用专为操作系统设计的库镜像之一来配置虚拟机并部署操作系统。您可以使用门户、az\
  \ CLI 或 PowerShell 来选择虚拟机大小和操作系统，这与使用 SQL Server 库镜像非常相似，只是整个过程中不会包含 SQL Server\
  \ 的所有选项。\n\n我有时会使用这种技术，因为我可以完全控制 SQL Server 的安装方式和内容，而不是由库镜像决定。如果您使用此方法，有一个缺点。您无法立即利用\
  \ SQL 库镜像附带的选项，例如自动备份和安全更新。幸运的是，有一种解决方案可以使用这种自定义方法进行部署，同时又能利用自动化功能和许可选项。此解决方案称为\
  \ SQL Server IaaS 代理扩展（使用库镜像时默认安装）。我将在下一节中详细讨论此功能。\n\n## SQL Server IaaS 代理扩展\n\n\
  使用 SQL Server 库镜像时，默认会安装 SQL Server IaaS 代理扩展。此扩展为您的 SQL Server 虚拟机提供自动化功能和许可选项。\n\
  \n### 使用 CLI 与 ARM 模板、Bison 和 Terraform\n\n除了使用 Azure 门户，Azure 还提供了其他方式通过命令行界面（CLI）在\
  \ Azure 虚拟机上部署 SQL Server，例如使用 `az sql vm` 或 `az vm` CLI。此外还有 PowerShell 命令 `New-AzVM`\
  \ 和 `New-AzSqlVM`。问题在于，所有这些方法都不支持像门户那样配置最优存储设置的方式。部署后您必须手动配置此设置。\n\nAzure 提供了一种机制，通过称为\
  \ ARM 模板的概念，为任何 Azure 资源自动化使用 Azure CLI 工具。ARM 模板是一个 JSON 文件，以声明性方式描述了部署的配置和基础结构。\n\
  \n虽然您可以尝试从头学习构建模板，但我建议您获取一个示例。您可以从 [`https://learn.microsoft.com/samples/azure/azure-quickstart-templates/sql-vm-new-storage`](https://learn.microsoft.com/samples/azure/azure-quickstart-templates/sql-vm-new-storage)\
  \ 下载并编辑一个 Azure 模板示例，以创建具有可配置存储设置的新的 Azure 虚拟机 SQL Server。Azure 模板不仅配置了创建虚拟机的所有属性，还支持参数，因此您可以使用模板，然后在运行时提供参数来自定义部署。此模板的链接还包括一个支持使用\
  \ Bison 在 Azure 上部署 SQL Server 虚拟机的文件。\n\nTerraform 也可用于在 Azure VM 上部署 SQL Server。您可以在\
  \ [`https://registry.terraform.io/providers/hashicorp/azurerm/latest/docs/resources/mssql_virtual_machine`](https://registry.terraform.io/providers/hashicorp/azurerm/latest/docs/resources/mssql_virtual_machine)\
  \ 阅读更多信息。\n\n\n### 预留实例、专用主机和容量预留\n\n为了节省 Azure 虚拟机的费用，你可以预付一段时间（一到三年）的费用，从而在部署时节省\
  \ Azure 虚拟机的计算成本。此选项称为 `Azure 预留虚拟机实例`。如果你计划部署许多 SQL Server Azure 虚拟机，可能应该研究此选项。在\
  \ [`https://azure.microsoft.com/pricing/reserved-vm-instances/`](https://azure.microsoft.com/pricing/reserved-vm-instances/)\
  \ 了解更多关于预留实例的信息。\n\n`容量预留` 允许你在 Azure 区域或可用区中预留计算容量，时长不限。这对于确保即使在高峰期也拥有关键工作负载所需的资源特别有用。`容量预留`\
  \ 比 `预留实例` 更灵活，因为没有重大的长期承诺。它们几乎立即可用，并且你可以完全控制如何将预留目标用于关键工作负载。然而，`预留实例` 由于其长期承诺，比\
  \ `容量预留` 更便宜。你可以在 [`https://learn.microsoft.com/azure/virtual-machines/capacity-reservation-overview`](https://learn.microsoft.com/azure/virtual-machines/capacity-reservation-overview)\
  \ 了解更多关于 `容量预留` 的信息。\n\n你可能还记得在门户的部署示例中有一个名为 `专用主机` 的选项。`Azure 专用主机` 允许你为你和你的组织预留专用的物理服务器。虽然普通虚拟机专用于你的部署，但你通常与其它用户共享底层主机。专用主机可能会为你提供满足特定合规性要求所需的选项。此外，你对托管你的\
  \ VM 部署的基础设施的维护事件有更多控制权。你可以在 [`https://learn.microsoft.com/azure/virtual-machines/dedicated-hosts`](https://learn.microsoft.com/azure/virtual-machines/dedicated-hosts)\
  \ 阅读更多关于专用主机的信息。此组中最大的虚拟机是 `Standard_E104ids_v5`，它提供 104 个 vCore 和 672 GiB 内存。此虚拟机之所以引人注目，是因为它是隔离的，这意味着它保证是主机上运行的唯一虚拟机，因此与其他客户工作负载隔离。\n\
  \n### 迁移至 Azure\n\n你可能正在考虑将现有的 SQL Server 安装迁移到 Azure 虚拟机。以下选项可能有助于你的迁移计划。\n\n####\
  \ Azure Arc 迁移评估\n\n我在第 1 章中简要提到了将 SQL Server 连接到云的 Azure Arc 概念。虽然我将在本书第 10 章中更多讨论\
  \ Azure Arc，但我要在此提及，目前（在本书撰写时处于预览阶段）有一项创新可以帮助你评估当前的 SQL Server 部署，以查看其是否兼容迁移到云端，包括什么是正确的部署决策和资源选择。在\
  \ [`https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment`](https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment)\
  \ 了解更多关于如何使用此功能。\n\n#### 还原数据库\n\n由于 Azure 虚拟机中的 SQL Server 是一个完整的 SQL Server 引擎，迁移现有\
  \ SQL Server 的一个简单方法就是直接还原现有数据库的备份。\n\n由于目标 SQL Server 位于 Azure 基础设施中，你有几种方法可以执行此操作：\n\
  \n*   通过 RDP “复制和粘贴”备份文件。RDP 客户端允许你复制和粘贴文件，我已经为 Azure VM 做过很多次了。当然，这只对小的备份文件有意义（尽管我也处理过\
  \ 1GB 大小的备份文件）。\n*   使用 SQL Server 内的 `备份到 URL` 功能将数据库备份到 Azure 存储。然后在 Azure VM\
  \ 中，从同一个 Azure 存储帐户还原备份。你可以在 [`https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`](https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url)\
  \ 阅读更多关于 SQL Server 备份到 URL 的信息。\n*   使用 `Azure 文件`。可以将其视作在云端创建你自己的文件共享。你可以使用 `az`\
  \ CLI 或工具将你的备份文件复制到 Azure 文件共享。然后你可以在 Azure VM 中挂载 Azure 文件共享（即，它在 VM 中看起来像网络共享）。在\
  \ [`https://learn.microsoft.com/azure/storage/files/storage-files-introduction`](https://learn.microsoft.com/azure/storage/files/storage-files-introduction)\
  \ 阅读更多关于如何执行此操作的信息。我已多次对 Windows 和 Linux 的 Azure VM 使用此方法。\n*   对于大型备份文件，请考虑 `Azure\
  \ 导入/导出服务`。你实际上需要将硬盘安全地运送给微软（我们可以通过 Azure Data Box 磁盘为你提供方法），然后我们会将其导入 Azure 存储或\
  \ Azure 文件。你可以在 [`https://learn.microsoft.com/azure/import-export/storage-import-export-service`](https://learn.microsoft.com/azure/import-export/storage-import-export-service)\
  \ 阅读更多相关信息。\n\n#### Azure Migrate 和 Azure 数据库迁移服务\n\n假设你想要更在线的迁移体验到 Azure 虚拟机。你可以使用\
  \ `Azure 数据库迁移服务` (DMS) 来实现此选项。DMS 是 Azure 中的一项托管服务，可协调迁移到 Azure SQL，包括 Azure 虚拟机。此迁移的选项之一是对\
  \ SQL Server 到 Azure VM 执行在线迁移。DMS 将使用日志传送技术来获取一系列连续的数据库完整备份和事务日志备份，并将其还原到已部署在 Azure\
  \ VM 上的 SQL Server。在 [`https://learn.microsoft.com/data-migration/sql-server/virtual-machines/database-migration-service?tabs=online-with-extension`](https://learn.microsoft.com/data-migration/sql-server/virtual-machines/database-migration-service%253Ftabs%253Donline-with-extension)\
  \ 查看如何使用此服务的示例。\n\n如果你想评估和迁移 SQL Server ``大规模地``，请考虑使用 `Azure Migrate`。`Azure Migrate`\
  \ 是一项 Azure 服务和一组客户端软件代理，用于评估和迁移在虚拟机和裸机服务器中运行的 SQL Server 到 Azure。`Azure Migrate`\
  \ 可以与 `Azure 数据库迁移服务` 协调，以帮助你执行离线和/或在线迁移。在 [`https://learn.microsoft.com/azure/migrate/how-to-create-azure-sql-assessment`](https://learn.microsoft.com/azure/migrate/how-to-create-azure-sql-assessment)\
  \ 开始使用。\n\n#### 使用 Azure Migrate 服务器迁移\n\n如果你想迁移整个物理服务器或虚拟机的安装，而不仅仅是数据，该怎么办？Azure\
  \ 通过名为 `Azure Migrate 服务器迁移` 的服务支持此概念。这是一个真正的 `直接迁移` 操作。可以将其视作对你的机器或 VM 进行快照，然后从快照创建整个\
  \ VM。之后你再进行配置和优化。你可以在 [`https://learn.microsoft.com/azure/migrate/migrate-services-overview#azure-migrate-server-migration-tool`](https://learn.microsoft.com/azure/migrate/migrate-services-overview%2523azure-migrate-server-migration-tool)\
  \ 阅读更多关于 `服务器迁移` 的信息。在 [`https://aka.ms/mechanicsazuremigrate`](https://aka.ms/mechanicsazuremigrate)\
  \ 可以看到 Windows 传奇专家 Jeff Woolsey 展示的关于 VMware 安装如何工作的绝佳示例。\n\n## SQL Server IaaS\
  \ 代理扩展\n\n到目前为止，我的示例和讨论都围绕着在基于 Windows Server 的 Azure 虚拟机中部署 SQL Server。\n\n对于在\
  \ Linux 上运行的 SQL Server，选项和部署过程非常相似，但有一些显著差异：\n\n*   镜像市场提供了适用于 Linux 发行版 Ubuntu、Red\
  \ Hat Enterprise Server 和 SUSE 的镜像。如果 Linux 发行版要求，您需要为其许可证付费（Ubuntu 是免费许可证）。\n*\
  \   我们在部署过程中不支持配置 SQL Server 设置。`SQL Server IaaS 代理扩展` 支持 Ubuntu 发行版，但在许可证方面提供有限支持。更多信息请访问\
  \ [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-server-iaas-agent-extension-linux`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-server-iaas-agent-extension-linux)。\n\
  \n使用 SQL Linux 镜像后，您会发现 `mssql-server`、`mssql-tools` 和 `mssql-ha` 包已安装。\n\nSQL Agent\
  \ 默认未启用，但您可以自行启用。您可以使用 `mssql-conf` 脚本在 Linux 上启用 SQL Server Agent，详细信息请访问 [`https://learn.microsoft.com/sql/linux/sql-server-linux-setup-sql-agent`](https://learn.microsoft.com/sql/linux/sql-server-linux-setup-sql-agent)。\n\
  \n部署后，您可以使用文档记录的方法安装其他 SQL Server Linux 包。例如，您可以阅读 [`https://learn.microsoft.com/sql/linux/sql-server-linux-setup-machine-learning`](https://learn.microsoft.com/sql/linux/sql-server-linux-setup-machine-learning)\
  \ 来了解如何为 Linux 安装 SQL Server 机器学习服务。\n\n### 部署 SQL Server 容器\n\n在 Azure 虚拟机中部署 SQL\
  \ Server 容器没有特殊的镜像或流程。您将使用与今天在虚拟机中部署 SQL Server 容器相同的流程。有关此过程的更多信息，请访问 [`https://aka.ms/sqlcontainers`](https://aka.ms/sqlcontainers)。\n\
  \n`Azure Kubernetes 服务` (AKS) 提供了一种利用 Kubernetes 的强大功能大规模部署容器的方法。您可以在 [`https://learn.microsoft.com/sql/linux/quickstart-sql-server-containers-azure`](https://learn.microsoft.com/sql/linux/quickstart-sql-server-containers-azure)\
  \ 查看如何执行此操作的教程。\n\n您在本章中已经看到了使用镜像在 Azure 虚拟机中部署 SQL Server 的特殊选项和优势的示例，包括许可、配置和自动化。这一切都是通过\
  \ `SQL 虚拟机资源提供程序` 使用 `SQL Server IaaS 代理扩展` 实现的。资源提供程序是在 Azure 中运行的软件，它启用了与 Azure\
  \ 资源管理器集成的特定 SQL 功能。该扩展是在您的虚拟机中运行的一组代理，它们使用资源提供程序。\n\n如果您使用 SQL Server 镜像进行部署，您只需利用资源提供程序所提供的功能，无需您进行任何操作。但是，如果您自行部署并希望获得这些优势（包括许可），则需要将您的\
  \ VM 注册为 SQL Azure VM。\n\n首先，您需要确保您的 Azure 订阅已注册 `Microsoft.SqlVirtualMachine` 资源提供程序。您可以从\
  \ Azure 门户的订阅设置中完成此操作。或者，您可以使用以下 PowerShell 命令：\n\n```\nRegister-AzureRmResourceProvider\
  \ -ProviderNamespace Microsoft.SqlVirtualMachine\n```\n\n接下来，您需要使用资源提供程序注册您的虚拟机。注册\
  \ VM 会安装 `SQL Server IaaS 代理扩展`。您可以阅读 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-agent-extension-manually-register-single-vm`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-agent-extension-manually-register-single-vm)\
  \ 了解所有步骤。\n\n一旦您的 VM 被注册或如果您使用了 SQL 镜像，您的 VM 现在就被视为既是 Azure 虚拟机资源，也是一个 `SQL 虚拟机`。这意味着搜索\
  \ `Azure SQL` 资源时，您的 VM 会出现。此外，根据本章前面所做的部署，门户将显示如图 3-26 所示的附加属性。\n\n![](img/496204_2_En_3_Fig26_HTML.jpg)\n\
  \n图 3-26：已注册的 SQL Azure 虚拟机\n\n> **注意**\n>\n> 一个访问此概览页面的简便方法是：转到虚拟机的命令菜单，在 `设置`\
  \ 下选择 `SQL Server 配置`。然后点击 `SQL Server 配置`。\n\n您可以看到此屏幕看起来像一个 Azure 虚拟机，但包含特定于 SQL\
  \ Server 的信息和选项。\n\n您可以看到 `基本信息` 窗格包含有关 VM 的信息，也包含 SQL Server 的信息，包括版本、版本、许可类型和操作系统详细信息。在\
  \ `工作窗格` 下方是一个图表，显示数据库和日志文件的存储空间，以及您可以为 Azure VM 中的 SQL Server 启用的功能。`命令栏` 有一个选项可以删除（取消注册）SQL\
  \ Server Azure 虚拟机并删除底层 VM。\n\n`服务菜单`（在图 3-26 中展开）包含特定于在 Azure 虚拟机上运行的 SQL Server\
  \ 的选项，包括以下两个主要类别。我认为您会发现其中许多选项对于帮助您管理 Azure 虚拟机上的 SQL Server 极其有价值。\n\n### 设置\n\n\
  在 `设置` 下，您有以下选项。\n\n#### 配置\n\n此选项允许您指定 SQL 的许可证（`即用即付`、`Azure 混合权益` 或 `灾难恢复`）。\n\
  \n我在本章前面已经介绍过 `Azure 混合权益`。`即用即付` 是默认的计费方式，按月支付 SQL 许可证费用。`灾难恢复` 是一个新选项，如果 VM 中的\
  \ SQL Server 仅用于灾难恢复目的，则提供免费的 SQL Server 许可证。\n\n此外，您可以指定 VM 使用的 SQL Server 版本。\n\
  \n#### 存储\n\n此选项值得关注，因为它提供与 VM 上 SQL Server 相关的存储的分析、指标、评估和配置，如图 3-27 所示。\n\n![](img/496204_2_En_3_Fig27_HTML.jpg)\n\
  \n图 3-27：Azure VM 中 SQL Server 的存储辅助工具\n\n#### 更新\n\n这是另一个很好的选项，不仅可以管理安全更新，还可以管理\
  \ Windows 的其他更新和 SQL Server 的累积更新。您甚至可以大规模管理和安排更新。此功能基于 `Azure 更新管理器`。更多信息请访问 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/azure-update-manager-sql-vm`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/azure-update-manager-sql-vm)。\n\
  \n### 备份\n\n此功能允许您为 VM 中的 SQL Server 启用和禁用自动备份。此功能使用产品中已存在多个版本的功能，利用 SQL Server\
  \ Agent 和备份到 URL。您可以了解更多： [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/automated-backup`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/automated-backup)。虽然我确实建议您查看此功能，但我发现在云端，客户通常会构建自己的自动备份系统（但使用\
  \ Azure 存储进行备份到 URL）或使用 `Azure 备份` 服务。\n\n#### 高可用性\n\n此选项帮助您为 Azure VM 上的 SQL Server\
  \ 配置 Always On 可用性组。有关此选项的更多信息，请参阅本章后面的“高可用性与灾难恢复”部分。\n\n\n"
- "# SQL 最佳实践评估\n\n此选项是一个工具，允许你扫描 SQL Server 部署的配置，并根据 SQL 社区和 Microsoft 的通用知识，为可能非最优或未遵循最佳实践的设置提供建议。你可以按需或按计划运行评估。该工具提供了一些非常棒的建议，因此我推荐你试一试，看看它能如何帮助你。你可以在\
  \ [`https://github.com/microsoft/sql-server-samples/blob/master/samples/manage/sql-assessment-api`](https://github.com/microsoft/sql-server-samples/blob/master/samples/manage/sql-assessment-api)\
  \ 查看它使用的完整规则集，并在 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-assessment-for-sql-vm`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-assessment-for-sql-vm)\
  \ 了解更多关于此功能的信息。\n\n### 安全性\n\n安全性选项包括与 Microsoft Entra 和 Microsoft Defender for\
  \ Cloud 等服务的集成。\n\n### 安全性配置\n\n此选项允许你启用与 `Azure Key Vault` 的集成，这对于使用透明数据加密（自带密钥）等功能来说是一个非常不错的选择。\n\
  \n你还可以启用与 `Microsoft Entra`（前身为 Azure Active Directory）的集成。此选项需要 SQL Server 2022，是为身份验证提供替代方案（替代基本或\
  \ SQL 身份验证）的绝佳解决方案，特别是因为你不需要像 Windows 身份验证那样需要域控制器。此功能的一个重要用途是使用托管身份，从而可以构建连接到 SQL\
  \ Server 的 `无密码` 应用程序。在 [`https://learn.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-overview`](https://learn.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-overview)\
  \ 了解更多。\n\n### Microsoft Defender for Cloud\n\n此功能以前称为高级数据安全，但现在已归入 Microsoft Defender\
  \ 旗下。此处的能力保持不变：\n\n*   漏洞评估\n    根据已知的行业标准（例如 FedRAMP），扫描可能导致潜在安全漏洞的任何配置设置（例如，启用了\
  \ sa 帐户）。\n\n*   高级威胁防护\n    对检测到的任何威胁发出警报，例如暴力登录攻击（启用了 SQL 身份验证且有人试图破解 sa 密码）和\
  \ SQL 注入攻击。\n\n你可以在 [`https://learn.microsoft.com/azure/defender-for-cloud/defender-for-sql-usage`](https://learn.microsoft.com/azure/defender-for-cloud/defender-for-sql-usage)\
  \ 了解更多关于 Microsoft Defender for Cloud 和 Azure VM 上 SQL 的信息。\n\n**提示**\n\nDefender\
  \ 团队有两个值得关注的新功能，包括 `数据安全仪表板`（[`https://learn.microsoft.com/azure/defender-for-cloud/data-aware-security-dashboard-overview`](https://learn.microsoft.com/azure/defender-for-cloud/data-aware-security-dashboard-overview)）和\
  \ `Copilot 体验`（[`https://learn.microsoft.com/azure/defender-for-cloud/copilot-security-in-defender-for-cloud`](https://learn.microsoft.com/azure/defender-for-cloud/copilot-security-in-defender-for-cloud)）。\n\
  \n服务菜单上还有另一个值得关注的选项叫做 `SQL Server IaaS 代理扩展设置`。这可以帮助你修复扩展的任何问题，并设置自动升级。\n\n除了使用门户，你还可以使用\
  \ `az sql vm` CLI。这允许你注册你的 VM 或更改 SQL Server 属性。你可以在 [`https://learn.microsoft.com/cli/azure/sql/vm`](https://learn.microsoft.com/cli/azure/sql/vm)\
  \ 阅读所有这些选项。\n\n"
- '# 配置 Azure 虚拟机


  在虚拟机内部，你的 SQL Server 配置与你在数据中心部署的虚拟机完全相同。从 Azure 基础架构的角度来看，虚拟机的配置有一些方面值得关注。


  ## 停止与解除分配


  关闭 Azure 中的虚拟机可能有几个原因。如果你在虚拟机内部关闭虚拟机（例如，Windows 关机），虚拟机将停止，但计算资源仍为该虚拟机保留，这意味着你仍需为计算付费。虚拟机状态在门户和
  CLI 界面中将显示为 `已停止`。要关闭虚拟机并确保不为计算付费，你需要使用虚拟机外部的界面（例如 Azure 门户中的“停止”命令菜单或 az CLI）来停止虚拟机。在这种情况下，虚拟机的状态列为
  `已停止（已解除分配）`。根据你的要求，你甚至可以使用 Azure 界面自动化虚拟机的启动和停止过程。在 [`https://techcommunity.microsoft.com/t5/educator-developer-blog/azure-virtual-machine-auto-shutdown/ba-p/379342`](https://techcommunity.microsoft.com/t5/educator-developer-blog/azure-virtual-machine-auto-shutdown/ba-p/379342)
  阅读更多。


  一个相关的主题是托管虚拟机的基础架构的维护窗口。在 [`https://learn.microsoft.com/azure/virtual-machines/maintenance-and-updates`](https://learn.microsoft.com/azure/virtual-machines/maintenance-and-updates)
  阅读更多关于 Azure 虚拟机主机更新和维护的信息。


  ## 调整大小


  如果在部署时没有选择合适的 Azure 虚拟机大小怎么办？你可以使用 Azure 门户（从服务菜单中选择大小）或 CLI 界面来更改虚拟机的大小。此过程称为 Azure
  虚拟机的 `调整大小`。调整大小非常类似于在你的数据中心内为虚拟机更改可用资源（CPU、存储、内存等）。虽然你可以在 Azure 虚拟机运行时调整其大小，但调整大小操作需要重新启动虚拟机。可用于调整大小的选项取决于你的虚拟机是正在运行还是已停止（已解除分配）。这种差异是因为当前虚拟机主机上可能只有某些大小可用（运行情况）。要查看完整的虚拟机大小列表，我建议你首先停止（解除分配）你的虚拟机。在
  [`https://azure.microsoft.com/blog/resize-virtual-machines/`](https://azure.microsoft.com/blog/resize-virtual-machines/)
  阅读 Azure 虚拟机调整大小的整体说明。


  你可以使用 Azure Migrate 将 Azure 虚拟机迁移到其他区域。在 [`https://learn.microsoft.com/azure/site-recovery/azure-to-azure-tutorial-migrate`](https://learn.microsoft.com/azure/site-recovery/azure-to-azure-tutorial-migrate)
  阅读更多。此外，要更改虚拟机的资源组或订阅，请阅读 [`https://learn.microsoft.com/azure/azure-resource-manager/management/move-resource-group-and-subscription`](https://learn.microsoft.com/azure/azure-resource-manager/management/move-resource-group-and-subscription)
  的文档。


  ## 安全性 (RBAC)


  基于角色的访问控制 (RBAC) 允许你向其他 Azure 帐户分配权限，以管理 Azure 虚拟机。可以将其视为如何控制 `虚拟机外部` 的安全性。你通过服务菜单上的
  `访问控制 (IAM)` 选项进行管理。这是许多 Azure 资源的常见选项。在 [`https://learn.microsoft.com/azure/role-based-access-control/quickstart-assign-role-user-portal`](https://learn.microsoft.com/azure/role-based-access-control/quickstart-assign-role-user-portal)
  了解更多。



  ### 其他配置选项


  除了通过门户或 CLI 界面从服务菜单配置 Azure 虚拟机外，还有其他选项可用。


  例如重置管理员用户密码、查看安全建议以及将虚拟机重新部署到其他主机。有关其中一些选项的更多信息，请参阅 [`https://learn.microsoft.com/azure/virtual-machines/windows/tutorial-config-management`](https://learn.microsoft.com/azure/virtual-machines/windows/tutorial-config-management)。


  ## 最大化存储性能


  根据我们与客户合作的经验，为 Azure 虚拟机选择合适的大小是确保 SQL Server 获得所需性能的首要因素（标准的 SQL Server 性能优化实践除外）。让我们更详细地探讨为何这一选择如此重要。


  ### 最佳实践


  你在本章前面已经看到了 SQL Server 库映像将如何基于 Azure 高级存储创建额外的托管 `数据磁盘`。为了在 Azure 虚拟机上为 SQL Server
  实现最佳 I/O 性能和可用性，你应该牢记以下原则，其中一些在我演示如何在 Azure 门户中配置存储时已经提到：


  *   使用 Azure 门户来指导你的选择，因为它会在虚拟机大小不支持你的 I/O 选择时发出警告。它还能帮助你轻松配置多个磁盘（底层使用 Windows 存储空间）、分离数据和日志存储、将系统数据库移出操作系统驱动器以及配置
  `tempdb` 存储。


  *   不要在操作系统磁盘上创建任何用户数据库。


  *   将 `tempdb` 放在本地 SSD 驱动器上，该驱动器也称为临时存储。如果您的虚拟机因任何原因故障转移到不同的主机，`tempdb` 的内容将会丢失，但没关系，因为
  `tempdb` 在启动时会重新创建。


  *   将数据库文件和日志文件放在不同的 `托管` 磁盘上，就像任何 SQL Server 生产部署一样。


  *   至少使用高级托管磁盘（也称为高级 SSD）。对于极端低延迟的一个选项是超级磁盘。超级磁盘更昂贵，但对于 SQL 生产工作负载，如果事务日志的延迟很重要，对于繁重的写入工作负载来说可能是一个必要的选择。有关如何配置此功能的更多信息，请访问
  [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/storage-migrate-to-ultradisk`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/storage-migrate-to-ultradisk)。


  ### 高级 SSD v2


  正如你从通过 Azure 门户配置存储的示例中所看到的，可能需要过度配置存储以满足你的 IOPS 和吞吐量需求。这是因为这些资源数量与高级托管磁盘的大小相关联。


  用于 SQL 的高级 SSD v2（目前处于预览状态）提供了一种新的方法来独立于磁盘大小控制你的 IOPS 和吞吐量。


  我们有一个新的 Azure 门户体验来使用此新选项。但是，在本书撰写时，它要求你使用可用性区域部署虚拟机，即使对于单个 SQL 实例也是如此。虽然这不会给你带来任何特定问题，但在单个可用性区域中部署
  Azure 虚拟机并不会真正为你带来额外的可用性。可用性区域通常仅适用于高可用性场景（如 Always On 可用性组）的虚拟机。


  如果你在门户的“基础”屏幕（在“可用性选项”下）做出此选择，你会在 SQL Server 设置下的“存储配置”中看到一个新选项，如图 3-28 所示。


  ![](img/496204_2_En_3_Fig28_HTML.jpg)


  图 3-28

  为 SQL 选择新的高级 SSD v2 存储


  当你选择 `更改配置` 时，现在会看到一个新的门户体验，可以独立控制大小、IOPS 和吞吐量，如图 3-29 所示。


  ![](img/496204_2_En_3_Fig29_HTML.jpg)


  图 3-29

  新的高级 SSD v2 存储体验


  更多详情请访问 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/storage-configuration-premium-ssd-v2`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/storage-configuration-premium-ssd-v2)。


  ### 了解更多


  当然，你必须在这些选择与成本之间取得平衡。所有托管磁盘都基于 Azure Blob 存储。要向你介绍 Azure Blob 存储和托管磁盘的工作原理，需要一整章的篇幅。现在，请查看这些资源：


  *   有关 Azure 托管磁盘类型的详细信息，请访问 [`https://learn.microsoft.com/azure/virtual-machines/disks-types`](https://learn.microsoft.com/azure/virtual-machines/disks-types)。在这些表格中，你将看到每种类型支持的尺寸、IOPS
  和吞吐量。


  *   我们的文档中有针对为 Azure 虚拟机上的 SQL Server 选择合适存储的指南，请访问 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist)。


  *   该文档提供了关于如何为 Azure 高级存储以及虚拟机大小选择合适尺寸的良好指南。你可以在此阅读 [`https://learn.microsoft.com/azure/virtual-machines/premium-storage-performance`](https://learn.microsoft.com/azure/virtual-machines/premium-storage-performance)。


  *   GigaOm 发布了一项关于 Azure 虚拟机上 SQL Server 性能的独立研究。更多信息请访问 [`https://techcommunity.microsoft.com/t5/sql-server-blog/sql-server-on-azure-vms-the-best-price-performance-gets-even/ba-p/3727091`](https://techcommunity.microsoft.com/t5/sql-server-blog/sql-server-on-azure-vms-the-best-price-performance-gets-even/ba-p/3727091)。


  我之前提到过一个主要关键点，但值得重复：`匹配正确的虚拟机大小以满足你的存储需求`，因为虚拟机大小对数据磁盘数量、总 IOPS 以及所有磁盘的总吞吐量有限制。然后，在该总
  IOPS 范围内，为你数据库和事务日志文件所需的数据磁盘进行配置。


  ## 性能监控


  由于 SQL Server 部署在虚拟机内部，你应该使用所有可用的常规技术来监控性能，包括 SQL 工具（如动态管理视图 `DMVs`）和操作系统工具（如 Windows
  性能监视器或 Linux 工具）。


  话虽如此，Azure Monitor 为虚拟机提供了集成的性能指标，包括 SQL Server 性能计数器（仅适用于 Windows）。



  '
- '# Azure 指标


  您可以通过服务菜单中的“监控”选项获取 Azure 提供的丰富指标。默认情况下，您获得的是虚拟机主机的指标。但很可能，您需要的是虚拟机*内部*（即来宾）的指标。为此，您需要从虚拟机的服务菜单（而非
  SQL 虚拟机）中选择“诊断设置”，在虚拟机所在的同一区域预配一个新的 Azure 存储账户（有关如何快速创建一个的说明，请参阅以下指南：[`https://learn.microsoft.com/azure/storage/common/storage-account-create`](https://learn.microsoft.com/azure/storage/common/storage-account-create)），然后选择
  `启用来宾级监控`。


  启用来宾级监控后，系统会显示各种选项，包括为来宾 VM 添加特定计数器的功能。在“性能计数器”选项下，您可以选择 SQL Server 计数器。应用此设置后，您现在就可以使用门户服务菜单中的“指标”选项来查看基本指标，就像在虚拟机内使用
  Windows 性能监视器一样。以下是我虚拟机的示例，如图 3-30 所示。


  ![](img/496204_2_En_3_Fig30_HTML.jpg)


  图 3-30：虚拟机的 Azure 来宾 VM 指标


  您还可以从服务菜单中选择 `日志` 选项，通过使用 Kusto 查询语言 (KQL) 查询来查看 Azure 指标。这使您可以查看来自 Log Analytics
  的指标，这些指标的跨度可以超过门户中使用 Azure 指标默认的 14 天期限。了解更多，请访问 [`https://learn.microsoft.com/azure/azure-monitor/vm/tutorial-monitor-vm-guest#view-logs`](https://learn.microsoft.com/azure/azure-monitor/vm/tutorial-monitor-vm-guest%2523view-logs)。


  '
- '# 洞察


  当您选择了 `启用来宾级监控` 后，Azure Monitor 便开始在 Log Analytics 工作区中收集指标。通过从服务菜单中选择 `洞察` 选项，您可以查看这些指标的另一种可视化形式。您可以在图
  3-31 中看到这些指标的示例。


  ![](img/496204_2_En_3_Fig31_HTML.jpg)


  图 3-31：使用 Log Analytics 查看 Azure 虚拟机的洞察


  您可以更进一步，使用一个称为“工作簿”的概念，您可以在 [`https://learn.microsoft.com/azure/azure-monitor/vm/vminsights-workbooks`](https://learn.microsoft.com/azure/azure-monitor/vm/vminsights-workbooks)
  阅读更多相关内容。


  #### 网络


  当我在本章前面部署 Azure 虚拟机时，在资源组中创建了多种类型的网络资源，包括虚拟网络、网络接口、公共 IP 地址和网络安全组。


  公共 IP 地址非常重要，因为它允许您使用远程桌面等工具连接到虚拟机。网络接口是 VM 与虚拟网络之间的互连。网络安全组 (NSG) 提供访问控制列表 (ACL)
  规则，用于允许或拒绝流向 VM 的网络流量（类似于防火墙）。您可以在 [`https://learn.microsoft.com/azure/virtual-network/network-overview#network-security-groups`](https://learn.microsoft.com/azure/virtual-network/network-overview%2523network-security-groups)
  阅读关于网络和 Azure 虚拟机的完整信息。


  之前，我使用远程桌面客户端 (RDP) 连接到虚拟机，该客户端使用了公共 IP 地址并访问了 RDP 端口 (3389)。您可能还想使用其他方法连接到虚拟机。


  我建议不要将 SQL Server 端口 1433 开放到公共 Internet。然而，这是将 SQL Server 客户端应用程序或工具（如 SSMS）连接到
  Azure 虚拟机中 SQL Server 实例的唯一方法，除非您在连接到 VM 虚拟网络的计算机上运行该应用程序或工具。一种实现方法是将该应用程序或另一个 VM
  部署在 Azure 中，并加入同一个 Azure 虚拟网络。您也可以部署在另一个 Azure 虚拟网络中，并设置一种称为虚拟网络对等互连的配置，您可以在 [`https://learn.microsoft.com/azure/virtual-network/virtual-network-peering-overview`](https://learn.microsoft.com/azure/virtual-network/virtual-network-peering-overview)
  阅读相关信息。


  最后，您可能会发现需要将本地资源（如应用程序或其他计算机或虚拟机）连接到 Azure VM 的虚拟网络。您可以在 [`https://learn.microsoft.com/azure/architecture/reference-architectures/hybrid-networking`](https://learn.microsoft.com/azure/architecture/reference-architectures/hybrid-networking)
  阅读有关设置此类配置的更多详细信息。


  '
- '# 高可用性与灾难恢复


  无论您在何处部署 SQL Server，几乎所有人都会在某种程度上需要高可用性以及在必要时执行灾难恢复技术的能力。Azure 提供了多种方法来交付高可用性与灾难恢复的选择。


  ## Azure 存储


  在本章向您展示如何在 Azure 虚拟机中部署 SQL Server 的示例中，我使用了基于 Azure 存储的高级托管磁盘的 `数据磁盘`。默认情况下，托管磁盘具有内置的冗余功能，称为
  `本地冗余存储 (LRS)`。LRS 在数据中心区域内维护数据的三个副本。您可以在 [`https://learn.microsoft.com/azure/storage/common/storage-redundancy`](https://learn.microsoft.com/azure/storage/common/storage-redundancy)
  阅读更多关于 Azure 存储冗余的信息。您实际上可以使您的磁盘区域冗余，但由于数据不会跨区域复制，您可能会看到性能影响。




  ### 备份


  由于您在 Azure 基础设施中运行 SQL Server，您无疑会希望将 SQL Server 数据库和事务日志的备份存储在 Azure 中。您可以使用 T-SQL
  将备份存储到使用托管磁盘的独立数据磁盘上。然而，另一个选项是利用 SQL Server 的 `backup to URL` 功能将备份存储到 Azure 存储帐户。您可以在
  [`https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`](https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url)
  阅读更多关于 SQL Server 备份到 URL 的信息。我之前提到过使用 Azure 门户的自动备份选项，该功能就使用了备份到 URL。使用 URL 备份的一个优势是，您可以将
  Azure 存储帐户配置为使用更高级别的可用性，称为 `geo-redundant storage (GRS)`。查看 Azure 存储帐户的服务级别协议 (SLA)
  请访问 [`https://www.microsoft.com/licensing/docs/view/Service-Level-Agreements-SLA-for-Online-Services`](https://www.microsoft.com/licensing/docs/view/Service-Level-Agreements-SLA-for-Online-Services%253Flang%253D1)。


  另一个选项是将 SQL Server 备份与 `Azure Backup` 服务集成。Azure Backup 提供基于流的服务，将 SQL Server 备份到
  Azure 存储。Azure Backup 涉及一个虚拟机扩展，该扩展将使用虚拟设备接口 (VDI) API 与 SQL Server 进行备份。在 [`https://learn.microsoft.com/azure/backup/backup-azure-sql-database`](https://learn.microsoft.com/azure/backup/backup-azure-sql-database)
  阅读更多关于将 Azure Backup 与 SQL Server 配合使用的信息。


  Azure 中备份的最后一个选项使用 `file snapshot backups`。文件快照备份可以非常快。它们要求将 SQL Server 数据文件直接存储到
  Azure 存储帐户，而不是托管磁盘。您可以在 [`https://learn.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure`](https://learn.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure)
  阅读更多关于 Azure 中 SQL Server 文件快照备份的信息。


  另一个需要考虑的概念是 `Azure File Share`。Azure 文件共享就像您组织中可能有的网络文件共享，但可供任何虚拟机使用（想象一个基于 SMB
  的网络文件共享）。存储在此文件共享上的任何文件都是可用的，即使虚拟机不可用。Azure 文件共享的一个选项称为 `premium file share`，最多可支持
  100TB。


  提示


  由于您有连接到虚拟机的托管高性能磁盘，您也可以将数据库本地备份到其中一个磁盘（例如备份到 G: 盘）。但是，这些磁盘仅在连接到虚拟机时才可用。使用本节列出的其他方法，您可以独立于虚拟机的可用性来访问备份。


  ### 提升 Azure 可用性


  Azure 虚拟机是 Azure 基础设施的一部分，可在计划外和计划事件中提供可用性。例如，如果发生计划外硬件问题，Azure 可以使用实时迁移技术将您的虚拟机故障转移到健康的主机。Azure
  还可能更新您的虚拟机底层主机，这可能需要也可能不需要重启。您可以在 [`https://docs.microsoft.com/azure/virtual-machines/windows/manage-availability#understand-vm-reboots---maintenance-vs-downtime`](https://docs.microsoft.com/azure/virtual-machines/windows/manage-availability%2523understand-vm-reboots%252D%252D-maintenance-vs-downtime)
  阅读更多关于 Azure 虚拟机计划外和计划内停机时间的信息。


  Azure 提供了更多选项来进一步提高 Azure 虚拟机的高可用性，我在本书前面提到过，但值得重复一下：


  1.  `Availability Set` – 将您的虚拟机分散在同一数据中心内的多个故障域和更新域中。基本上，这确保您的虚拟机分布在不同的机架和交换机上。SLA
  为 99.95%。


  2.  `Availability Zone` – 可以将其视为在区域内的数据中心之间扩展一个可用性集。SLA 为 99.99%，但成本可能更高。


  不幸的是，您需要在部署时做出此选择。以后可以更改，但必须迁移您的虚拟机才能完成。


  如果您计划使用 HADR 解决方案（例如 Always On 故障转移群集实例或可用性组），则需要这些选择。对于单个虚拟机部署，使用这两种选项都没有意义。


  ### Always On 故障转移群集实例


  Always On 故障转移群集实例 (FCI) 通过共享存储为 SQL Server 提供高可用性。由于这是一个虚拟机，使用 FCI 将非常类似于正常的 SQL
  Server。话虽如此，请考虑这些重要概念，以使 FCI 在 Azure 中的成功部署：


  *   您需要使用可用性集或可用性区部署群集中的任何虚拟机。


  *   对于群集的共享存储，请考虑 `Azure Shared Disks`。Azure 共享磁盘专为跨虚拟机共享托管磁盘（如群集场景）而设计。更多信息请参见
  [`https://learn.microsoft.com/azure/virtual-machines/disks-shared`](https://learn.microsoft.com/azure/virtual-machines/disks-shared)。


  *   每个 Windows 故障转移群集解决方案 (WFCS) 都需要一个见证人来仲裁。Azure 为云提供了一种特定类型的见证人，称为 `cloud witness`。可以将云见证视为一个托管的见证人。您创建云见证，它会处理您需要的一切。在后台，它使用一个虚拟机和
  Azure 存储。更多信息请访问 [`https://learn.microsoft.com/windows-server/failover-clustering/deploy-cloud-witness?tabs=windows#what-is-cloud-witness`](https://learn.microsoft.com/windows-server/failover-clustering/deploy-cloud-witness%253Ftabs%253Dwindows%2523what-is-cloud-witness)。


  *   您需要某种类型的网络抽象来处理侦听器。Azure 能够让您创建 `multi-subnet virtual network` 以避免对负载均衡器或分布式网络名称的需求。更多信息请访问
  [`https://learn.microsoft.com/sql/sql-server/failover-clusters/windows/sql-server-multi-subnet-clustering-sql-server`](https://learn.microsoft.com/sql/sql-server/failover-clusters/windows/sql-server-multi-subnet-clustering-sql-server)。


  要构建 FCI 的完整教程，请从这里开始，然后按照下一步操作每篇文章：[`https://learn.microsoft.com/sql/sql-server/failover-clusters/install/before-installing-failover-clustering`](https://learn.microsoft.com/sql/sql-server/failover-clusters/install/before-installing-failover-clustering)。



  ### Always On 可用性组


  `Always On 可用性组` (AG) 通过使用副本提高了您的高可用性 `RPO`（恢复点目标）和 `RTO`（恢复时间目标）。它是 SQL Server
  旗舰级的 `HADR` 功能，采用非共享存储概念与副本。


  我们知道在 Azure 上设置 AG 可能是一个艰巨的过程。事实上，在 Windows 上设置带有自动故障转移的 AG 的完整教程记录在 [`《在 Windows
  上手动配置 Always On 可用性组（单子网）教程》`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-manually-configure-tutorial-single-subnet)。


  幸运的是，我们的团队在 Azure 门户中构建了一种新体验来简化此过程。假设您首先设置了一个 Windows 域控制器和虚拟网络，然后使用新的 Azure 门户体验来部署解决方案的其余部分，包括故障转移群集和
  AG。


  如果您还记得本章前面的内容，我向您展示了选择 Azure SQL 解决方案的体验，如图 3-32 所示。


  ![](img/496204_2_En_3_Fig32_HTML.jpg)


  图 3-32


  部署 SQL Azure 虚拟机时选择 HA 选项


  请注意这里的高可用性选择。选择您的映像并单击“创建”后，您将拥有与本章前面类似的体验，不同之处在于您现在可以选择部署`多个虚拟机`并配置您的集群和 AG。


  例如，如图 3-33 所示，您可以在“基础”屏幕中选择部署多个虚拟机。


  ![](img/496204_2_En_3_Fig33_HTML.jpg)


  图 3-33


  部署 SQL HA 的基础配置


  在“网络”屏幕中，您可以设置多子网，包括侦听器 IP 地址。还请注意 `WSFC` 和凭据的选项。当您选择“SQL Server 设置”时，您现在可以选择配置要部署的
  AG，如图 3-34 所示。


  ![](img/496204_2_En_3_Fig34_HTML.jpg)


  图 3-34


  用于为 SQL Server Azure 虚拟机配置 AG 的 SQL Server 设置


  要了解完整的体验，请参阅 [`《在 Azure 门户中配置 Always On 可用性组》`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-azure-portal-configure)。


  另一个要考虑的场景是从本地 AG 主副本设置 Azure 中的 AG 辅助副本。您可以在 [`《从本地配置 Azure 虚拟机 SQL Server 可用性组》`](https://learn.microsoft.com/previous-versions/azure/virtual-machines/windows/sqlclassic/virtual-machines-windows-classic-sql-onprem-availability)
  获取有关如何设置此场景的更多指导。如果您将异步辅助副本设置为*被动*，则可以将此虚拟机标记为 `HA` 目的并避免 SQL 许可成本。


  ### SQL Server 与 Linux 高可用性


  Linux 上的 SQL Server 通过数据库引擎支持 `Always On 故障转移群集实例` 和 `可用性组` 功能。自动故障转移功能通常通过 `Pacemaker`、`DH2i`
  或 `HPE ServiceGuard` 等 Linux 包来支持。


  要了解在 Linux 上部署 `Always On 可用性组` 的完整说明，请参阅 [`《在 Linux 上为 SQL Server 配置高可用性可用性组》`](https://learn.microsoft.com/sql/linux/sql-server-linux-availability-group-ha)。


  ## Microsoft 创新与 Azure Boost


  Microsoft 一直在致力于改进托管 Azure 虚拟机的基础结构。其中一项创新被称为 **Azure Boost**。


  `Azure Boost` 是由 Microsoft 设计的系统，它将传统上由虚拟机监控程序和主机操作系统执行的服务器虚拟化过程卸载到专用的软件和硬件上。


  `Azure Boost` 的一大优点是，您只需要选择支持 Boost 的虚拟机大小（可以在 [`《Azure Boost 概述 - 当前可用性》`](https://learn.microsoft.com/azure/azure-boost/overview%2523current-availability)
  找到），所有优势都会在主机上自动交付。


  使用支持 `Boost` 的虚拟机大小的主要好处包括更快的网络、延迟更低的更快存储、更高的 `IOPS/`吞吐量、更安全的主机，以及由于 `CPU` 资源可以更专用于来宾虚拟机而带来的更高性能。所有详细信息请访问
  [`https://aka.ms/azureboost`](https://aka.ms/azureboost)。


  ## 本章摘要


  在本章中，您学习了如何使用 Azure 虚拟机部署和配置 SQL Server，了解了部署过程中的许多不同选项。您还学习了与 SQL Server 和 Azure
  虚拟机相关的安全性、性能和 `HADR` 的独特方面。Azure 虚拟机为运行 SQL Server 提供了出色的基础结构，是将 SQL Server 迁移到云端的最简单方式。


  通过完成我的 SQL 专业人员云 workshop GitHub 仓库 ([`https://aka.ms/cloudsqlworkshop`](https://aka.ms/cloudsqlworkshop))
  中的以下实验，检验您对本章所学知识的掌握程度：


  [`《实验 03：在 Azure 虚拟机上部署 SQL Server》`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/03_Deploy_SQL_AzureVM)


  [`《实验 04：管理与优化 Azure 虚拟机上的 SQL Server》`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/04_Manage_and_Optimize_SQL_AzureVM)


  现在您已经学习了 Azure 虚拟机上的 SQL Server，接下来将向您展示如何部署和配置 Azure SQL Database 和 Managed Instance。


  '
- "# 4. 部署 Azure SQL\n\n部署 Azure SQL Managed Instance 或 Database 与部署 SQL Server on\
  \ Azure Virtual Machine 的体验不同但相似。相同之处在于您可以使用 Azure 门户和 `CLI`。不同之处在于 Azure *管理着虚拟机*和基础结构，因此您不必担心为虚拟机选择的几个选项。\n\
  \n在本章中，您将学习部署和连接到 Azure SQL Managed Instance 和 Database 的选项与过程。您还将学习将现有数据库迁移到 Azure\
  \ SQL 的选项。此外，您将了解用于托管 Azure SQL Managed Instance 和 Database 的架构的一些实现细节。\n\n您可以选择跟随本章中的示例操作。完成这些示例需要满足以下条件：\n\
  \n*   一个 Azure 订阅。\n*   至少具有该 Azure 订阅的“参与者”角色访问权限。您可以在 [`《Azure 内置角色》`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles)\
  \ 阅读有关 Azure 内置角色的更多信息。\n*   访问 Azure 门户（Web 或 Windows 应用程序）。\n*   安装 `az` `CLI`（有关更多详细信息，请参阅\
  \ [`《安装 Azure CLI》`](https://learn.microsoft.com/cli/azure/install-azure-cli)）。您也可以使用\
  \ Azure Cloud Shell，因为 `az` 已经安装。您可以在 [`《Azure Cloud Shell 入门》`](https://azure.microsoft.com/get-started/azure-portal/cloud-shell)\
  \ 阅读有关 Azure Cloud Shell 的更多信息。\n*   您将在本章中运行一些 `T-SQL`，因此请安装一个工具，例如 `SQL Server\
  \ Management Studio` (`SSMS`)，地址为 [`https://aka.ms/ssms`](https://aka.ms/ssms)。\n\
  \n在本章末尾，我还提供了您可以进行的自学实验链接。\n\n## 部署前规划\n\n在您开始部署 Azure SQL 数据库或托管实例之前，我建议您花些时间做一些部署前规划。审视您的选择并做出几个明智的决定，将为您节省时间和精力。\n\
  \n### 新部署还是迁移\n\n首先要做的决定之一，是计划迁移现有的数据库或实例，还是部署新的数据库或实例。部署的过程将是相同的，但迁移意味着您需要在部署前评估当前的\
  \ SQL Server 实例、数据库或其他数据库环境。您的评估将根据当前需求，为您需要做出何种部署选择提供指导。您必须决定需要对当前的 SQL Server\
  \ 或其他数据库平台上的应用程序、架构、脚本或其他方面做出哪些必要的更改。您还必须考虑如何将实际数据迁移到新的部署中。本章将包含专门讨论迁移到 Azure SQL\
  \ 托管实例和数据库时可以使用的注意事项和工具的部分。以下是一些您在考虑迁移时可以参考的优秀资源：\n\n*   `Azure 云迁移和现代化中心` – 这是一个集中的信息资源，您可以访问\
  \ Microsoft 专家，将任何资源迁移到 Azure。请访问 [`https://azure.microsoft.com/solutions/migration`](https://azure.microsoft.com/solutions/migration)。\n\
  \n*   `Microsoft 数据迁移指南` – 获取针对任何类型数据迁移到 Azure 的分步指导。了解更多信息，请访问 [`https://aka.ms/datamigration`](https://aka.ms/datamigration)。\n\
  \n*   `由 Azure Arc 启用的 SQL Server 迁移评估` – 在撰写本书时此功能处于预览版，它允许您通过 Arc 将现有的 SQL Server\
  \ 连接到 Azure，并获得关于迁移到 Azure 的最佳解决方案的 `持续` 评估，包括资源（规模）建议。了解更多信息，请访问 [`https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment`](https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment)。\n\
  \n*   `Azure 数据库迁移服务 (DMS)` – 这项 Azure 服务允许您执行到 Azure SQL 托管实例和数据库的离线及在线迁移（仅限离线迁移数据库）。了解更多信息，请访问\
  \ [`https://learn.microsoft.com/azure/dms/dms-overview`](https://learn.microsoft.com/azure/dms/dms-overview)。\n\
  \n*   `Azure Migrate` – 使用此服务进行 `大规模` 评估和迁移（使用 DMS）。了解更多信息，请访问 [`https://aka.ms/azuremigrate`](https://aka.ms/azuremigrate)。\n\
  \n*   `托管实例链接` – 虽然 DMS 提供了在线迁移解决方案，但它使用的是日志传送方法。一个可能更好的在线迁移路径是 Azure SQL 托管实例链接。它允许您使用\
  \ Always On 可用性组的强大功能，将 SQL Server 2016、2019 或 2022 实例迁移到 Azure SQL 托管实例。了解更多信息，请访问\
  \ [`https://learn.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-feature-overview?view=azuresql#migrate-to-azure`](https://learn.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-feature-overview%253Fview%253Dazuresql%2523migrate-to-azure)。\n\
  \n### 做出部署选择\n\n无论您是迁移还是创建新的部署，都有几个值得花时间去规划的选择。本书第 2 章非常值得回顾阅读，因为它描述了 Azure SQL\
  \ 托管实例和 Azure SQL 数据库之间的选择与差异。\n\n话虽如此，让我们从高层次回顾一些可能影响您决策的重要选择：\n\n*   如果您需要 SQL\
  \ Server 代理、数据库邮件和跨数据库查询等 SQL Server 实例功能，那么托管实例是您需要做出的选择。\n\n*   如果您的数据库大小超过 32TB，在撰写本书时\
  \ `您唯一的选择` 就是 Azure SQL 数据库超大规模。\n\n除了这两个选择之外，Azure SQL 托管实例或数据库都可能满足您的需求。然而，正如我在本书第\
  \ 2 章中指出的，使用 Azure SQL 数据库可能有优势，因为 Microsoft 将同时管理基础设施和 SQL Server 实例，让您能专注于数据库本身。此外，Azure\
  \ SQL 数据库可以为您提供更多选项，例如无服务器计算和弹性池。\n\n在部署托管实例或数据库时您将做出的选择，可以参考图 4-1 所列内容（感谢我的同事 Anna\
  \ Hoffman 提供此图）。\n\n![](img/49604_2_En_4_Fig1_HTML.jpg)\n\n图 4-1\n\nAzure SQL 的部署选择\n\
  \n#### 免费部署\n\n如果您正在寻找用于开发或概念验证 (POC) 场景的免费部署 Azure SQL 的方法，请考虑以下选项：\n\n##### Azure\
  \ SQL 托管实例免费试用版\n\n我听过很多客户问我，他们如何在不必花费大量资金的情况下，对 Azure SQL 托管实例进行测试以迁移 SQL Server。我们现在为\
  \ Azure SQL 托管实例提供免费的 12 个月试用版，让您具备这种能力。此优惠适用于任何 Azure 订阅。了解更多信息，请访问 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/free-offer`](https://learn.microsoft.com/azure/azure-sql/managed-instance/free-offer)。\n\
  \n##### Azure SQL 数据库免费优惠\n\nSQL Server 开发人员版非常受欢迎，因为开发人员可以免费开发和测试他们的应用程序。我们现在为\
  \ Azure SQL 数据库提供了类似的选项，而且这不是试用版。只要您的 Azure 订阅有效，您现在就可以部署一个免费的 Azure SQL 数据库。了解更多信息，请访问\
  \ [`https://aka.ms/freedboffer`](https://aka.ms/freedboffer)。\n\n### 部署方法\n\n你可以通过\
  \ Azure 门户或使用 CLI 工具（如 `az` 命令行工具）、PowerShell 甚至 REST API（`az rest` 可以提供帮助）来部署 Azure\
  \ 托管实例或数据库。\n\n如果你只是试用 Azure SQL 或进行概念验证，可以轻松使用 Azure 门户。然而，如果需要一个可重复的部署流程（想象一下，如果你需要完全按照原始配置重新部署一个托管实例），那么使用\
  \ CLI 脚本是更好的选择。请记住，你也可以使用 Azure 模板来帮助自动化部署。你可以在以下链接中阅读更多关于为 Azure SQL 使用 Azure 模板的信息：[`https://learn.microsoft.com/azure/azure-sql/database/arm-templates-content-guide?view=azuresql&tabs=single-database`](https://learn.microsoft.com/azure/azure-sql/database/arm-templates-content-guide%253Fview%253Dazuresql%2526tabs%253Dsingle-database)\
  \ 和 [`https://learn.microsoft.com/azure/azure-sql/database/arm-templates-content-guide?view=azuresql&tabs=managed-instance`](https://learn.microsoft.com/azure/azure-sql/database/arm-templates-content-guide%253Fview%253Dazuresql%2526tabs%253Dmanaged-instance)。\n\
  \n你还可以选择使用 `Bicep` 来部署 Azure SQL 托管实例（[`https://learn.microsoft.com/azure/azure-sql/managed-instance/create-bicep-quickstart`](https://learn.microsoft.com/azure/azure-sql/managed-instance/create-bicep-quickstart)）或\
  \ Azure SQL 数据库（[`https://learn.microsoft.com/azure/azure-sql/database/single-database-create-bicep-quickstart`](https://learn.microsoft.com/azure/azure-sql/database/single-database-create-bicep-quickstart)）。\n\
  \n`Terraform` 同样支持部署 Azure SQL 托管实例（[`https://learn.microsoft.com/azure/azure-sql/managed-instance/instance-create-terraform`](https://learn.microsoft.com/azure/azure-sql/managed-instance/instance-create-terraform)）和\
  \ Azure SQL 数据库（[`https://learn.microsoft.com/azure/azure-sql/database/single-database-create-terraform-quickstart`](https://learn.microsoft.com/azure/azure-sql/database/single-database-create-terraform-quickstart)）。\n\
  \n让我再为你介绍一种方法。我在本书的第 2 章提到了 Azure 中的 Copilot 体验。图 4-2 展示了一个示例，说明如何请求 Copilot 提供一个使用\
  \ `az` CLI 部署 Azure SQL 数据库的示例。\n\n![](img/496204_2_En_4_Fig2_HTML.jpg)\n\n图 4-2\n\
  \n在 Azure 中使用 Copilot 帮助部署 Azure SQL 数据库\n\n注意\n\n你可以看到，在提供响应后，Copilot 还会为你可能想做的其他事情提供建议。此时，我尚未部署数据库，因此\
  \ Copilot 没有 `上下文`。在本书后面，你将看到部署数据库后更复杂的体验。然而，在你阅读本章时，可以就章节中看到的主题向 Copilot 提出不同的问题。它可以在文档中查找概念，并在许多情况下比你自己搜索更快地提供示例。\n\
  \n### 部署选项\n\n我之前已经讨论过是选择 Azure SQL 托管实例还是数据库。在这两种选项中，都有使用 `池` 的选择。正如我在本书第 2 章中提到的，Azure\
  \ SQL 托管实例提供了 `托管实例池`，这可能更适合规模较小、成本效益更高的托管实例。使用池的部署时间也要快得多。你可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/instance-pools-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/instance-pools-overview)\
  \ 阅读更多关于托管实例池的信息。我将在本章后面几处讨论托管实例池的使用。\n\n注意\n\n在撰写本书时，托管实例池经历了一次公开预览版的 `刷新`。它曾长期处于公开预览阶段，所以很多人认为它永远不会达到正式发布阶段，但在我看来，它现在正走在正确的道路上。\n\
  \n正如我在本书第 1 章和第 2 章中都提到的，Azure SQL 数据库提供了一个称为 `弹性池` 的选项。如果你计划使用 Azure SQL 数据库来托管许多数据库，弹性池可能是一个不错的选择。独立软件供应商和软件即服务开发者通常会选择它来节省成本并更高效地管理数据库。我将在本章后面几处更详细地讨论弹性池。\n\
  \n### 区域\n\n选择特定的 Azure 区域可能很重要，正如我在关于虚拟机的第 3 章中所描述的那样。你需要确保你的部署选项在你选择的 Azure 区域中可用。\n\
  \n你可能有特定的合规性和安全要求，这些要求也决定了你选择哪个区域。\n\n你可能正在实施特定的高可用性与灾难恢复选项，如可用性区域、异地复制或自动故障转移组，并且心中有特定的区域来确保这些部署成功。请记住，我在本书第\
  \ 2 章中谈到过一个叫做 `配对区域` 的概念，这对于做出这些地理区域选择非常重要。\n\n如果你需要将 Azure SQL 托管实例或数据库移动到另一个区域，请阅读我们文档中的检查清单：[`https://learn.microsoft.com/azure/azure-sql/database/move-resources-across-regions`](https://learn.microsoft.com/azure/azure-sql/database/move-resources-across-regions)。\n\
  \nAzure SQL 数据库是一项“Ring 0”服务，这意味着它默认部署在每个区域。托管实例尚未完全达到该状态，但它已在所有区域普遍可用。\n\n此外，你还需要考虑你的应用程序将托管在何处，以及应用程序托管位置与你的\
  \ Azure SQL 部署之间的延迟要求。考虑性能以及与其他服务的接近程度。我曾与我的同事 Anna Hoffman 就此话题聊天。她说：“……但我认为这不仅仅是应用程序在哪里的问题——用户在哪里？应用程序应该放在哪里？如果你有异地复制或自动故障转移组，你如何构建一个全局可用的解决方案？”\n\
  \n### 购买模型\n\n仅适用于 Azure SQL 数据库，你需要选择一个 `购买模型`。选项有 `DTU` 或 `vCore`。我在本书的第 1 章和第\
  \ 2 章中解释了这些模型及其背后的历史。虽然 `DTU` 模型对你来说可能是一个选择，但我推荐 `vCore` 模型。使用 `vCore`，你可以有更多的选择以及许可选项，例如\
  \ Azure 混合权益（`AHB`）。`vCore` 模型让你对底层资源（CPU、内存、存储）有更高的透明度和控制权，更容易匹配你数据库的性能需求。\n\n\
  如果你选择了 `DTU` 模型并希望在以后迁移到 `vCore` 模型，请查阅文档：[`https://learn.microsoft.com/azure/azure-sql/database/migrate-dtu-to-vcore`](https://learn.microsoft.com/azure/azure-sql/database/migrate-dtu-to-vcore)。\n\
  \n\n### 服务层级 (SLO)\n\n如果你的部署选项是 Azure SQL 托管实例，那么你需要选择一个*服务层级*（我们也称之为服务级别目标或 SLO），即\
  \ `通用型 (GP)` 或 `业务关键型 (BC)`。我在本书的第 2 章中描述了这些服务层级选项。虽然资源限制和性能可能有所不同，但这些层级的一个主要区别在于其可用性工作方式，你将在本书的第\
  \ 8 章中了解更多相关内容。`业务关键型`的一个显著区别是它支持内存中 OLTP 功能。还记得在第 2 章中，我谈到了托管实例 `GP` 的“下一代”版本。请务必查看该选项，因为它提供了更多选项和更强大的存储性能。托管实例\
  \ `GP` 和 `BC` 的比较可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits)\
  \ 找到。\n\n**提示**\n\n你将在本章后面看到，部署一个托管实例通常需要时间。在 `GP` 和 `BC` 之间进行更改是可能的，但可能会导致显著的停机时间。你可以在\
  \ [`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview)\
  \ 了解更多关于具体时间的信息。托管实例确实支持一个称为快速预配的概念，适用于某些配置下的 `GP` 服务层级。你甚至可以在 30 分钟内完成预配。在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview?view=azuresql#fast-provisioning`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview?view=azuresql#fast-provisioning)\
  \ 了解更多。\n\n如果你的部署选项是 Azure SQL 数据库，那么你同样可以选择 `通用型 (GP)` 与 `业务关键型 (BC)` 服务层级。此外，你还有\
  \ `超大规模` 的选择。如果你选择 `通用型` 或 `超大规模`，你还可以选择 `预配型` 与 `无服务器型`。这也被称为*计算模型* *或层级*。我在本书的第\
  \ 2 章中介绍了所有这些选项，但在本章中我也会涵盖这个主题。\n\n**Azure SQL 数据库超大规模**我相信将成为你的数据库的 `默认` 选择。我在本书的第\
  \ 1 章中谈到了 `超大规模`（Project Socrates）的历史。如果你读过本书的第一版，你可能会留下这样的印象：`超大规模` 仅适用于最大的数据库部署。而这是我们造成的印象，不是你的问题。自\
  \ 2020 年以来，`超大规模` 发生了一些变化：\n\n*   `超大规模` 现在支持 `无服务器`。\n*   `超大规模` 现在支持弹性池。\n*  \
  \ 2023 年底，`超大规模` 的价格 `显著降低`。在 [`https://azure.microsoft.com/updates/general-availability-lower-simplified-pricing-for-azure-sql-database-hyperscale-expected-in-december-2023`](https://azure.microsoft.com/updates/general-availability-lower-simplified-pricing-for-azure-sql-database-hyperscale-expected-in-december-2023)\
  \ 了解更多关于此的信息。\n\n关于 `超大规模` 的一个关键点是，其存储是自动扩展的！你无需指定需要多少数据库空间。我们会根据你的需求自动增长。\n\n**我相信超大规模现在成为任何人的起点**，只需让计算（`无服务器`）和存储的自动扩展随着应用程序需求的增长或变化而灵活调整。在\
  \ [`https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale`](https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale)\
  \ 阅读关于 `超大规模` 的所有细节。\n\n说到 `无服务器`（我在本书的第 1 章中谈过），这是我们为自动扩展以及你的数据库可能并不总是被充分利用的场景创建的一个独特选项。它提供了一种部署和使用\
  \ Azure SQL 数据库的新的、经济高效的方式。在 [`https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview`](https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview)\
  \ 阅读更多关于 `无服务器` 的信息。\n\n对于 Azure SQL 数据库，在 `GP` 和 `BC` 之间切换通常比托管实例快得多。你也可以轻松地在 `无服务器`\
  \ 和 `预配型` 之间切换。对于 `超大规模`，你可以切换回 `GP` 服务层级。在 [`https://learn.microsoft.com/azure/azure-sql/database/manage-hyperscale-database`](https://learn.microsoft.com/azure/azure-sql/database/manage-hyperscale-database)\
  \ 了解更多。\n\n### 硬件\n\n尽管对于 Azure SQL，我们为你抽象了部署所使用的基础设施和虚拟化，但我们提供了*硬件代系*的选项。\n\n对于\
  \ Azure SQL 托管实例，你有三种选择：\n\n*   标准系列称为 `Gen5`（它曾是 `Gen4`，因为我们持续改进我们的硬件代系）。它在 vCore\
  \ 数量和每个 vCore 的内存方面有很好的选择。\n*   `高级系列` 使用了新一代的处理器，并提供更多的 vCore 和更高的每个 vCore 内存。\n\
  *   `内存优化高级系列` 类似于 `高级系列`，但提供了更高的每个 vCore 内存。`通用型` 的这个选项不支持像 `高级系列` 那么多的 vCore。\n\
  \n在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#hardware-configuration-characteristics`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#hardware-configuration-characteristics)\
  \ 保持关注所有细节。\n\n对于 Azure SQL 数据库，你有以下选择：\n\n*   标准系列也称为 `Gen5`（它曾是 `Gen4`，因为我们持续改进我们的硬件代系）。它在\
  \ vCore 数量和每个 vCore 的内存方面有很好的选择。\n*   `Fsv2 系列` 具有最快的 CPU 速度，但你无法像 `Gen5` 那样预配同样多的\
  \ vCore。此选择仅适用于 `通用型` 服务层级。\n*   `DC 系列` 仅支持 8 个 vCore，但对于安全性至关重要，因为它支持用于 Always\
  \ Encrypted 安全飞地的 Intel 软件防护扩展 (Intel SGX)。\n*   `超大规模` 支持 `高级` 和 `高级内存优化` 选择，以获得更多的\
  \ vCore 和更高的内存与 vCore 比率。\n\n在 [`https://learn.microsoft.com/azure/azure-sql/database/service-tiers-sql-database-vcore?view=azuresql&tabs=azure-portal#hardware-configuration`](https://learn.microsoft.com/azure/azure-sql/database/service-tiers-sql-database-vcore?view=azuresql&tabs=azure-portal#hardware-configuration)\
  \ 保持关注这些选择的所有细节。\n\n### vCore 和存储大小\n\n一旦你确定了这些选项，你就可以选择存储大小。Azure SQL 数据库的 DTU\
  \ 模式有一个你可以选择的 DTU 数量（以及数据大小）。对于 vCore 购买模型，你需要选择 vCore 数量和数据库存储最大大小（记住 `超大规模` 不需要此选项）。根据你的其他选择，这些选项的工作方式有一些不同。在本章剩余部分带你完成部署过程时，我将描述这些差异。\n\
  \n\n\n#### 价格\n\n与 Azure 虚拟机类似，您可以利用 Azure 定价计算器，输入其中一些选项来预估成本。这包括使用 `Azure 混合权益`。您可以在\
  \ [`https://azure.microsoft.com/pricing/details/azure-sql/sql-managed-instance/single/`](https://azure.microsoft.com/pricing/details/azure-sql/sql-managed-instance/single/)\
  \ 找到 Azure SQL 托管实例的定价计算器，在 [`https://azure.microsoft.com/pricing/calculator/?service=sql-database`](https://azure.microsoft.com/pricing/calculator/?service=sql-database)\
  \ 找到 Azure SQL 数据库的定价计算器。\n\n> **提示**\n>\n> 为确保找到 Azure SQL 数据库和托管实例，请搜索 Azure SQL\
  \ 数据库。从那里，您可以更改类型以查看托管实例。\n\n图 4-3 展示了 Azure SQL 数据库定价计算器的示例。\n\n![images/496204_2_En_4_Chapter/496204_2_En_4_Fig3_HTML.jpg](img/496204_2_En_4_Fig3_HTML.jpg)\n\
  **图 4-3**\nAzure SQL 数据库的定价计算器\n\n### 考虑资源限制\n\n您在部署选项、服务层级和大小方面的选择会影响您的资源限制。以下是您在做这些选择时需要考虑的资源限制。我特别指出这些，是因为当您通过\
  \ `Azure 门户`进行部署时，这些限制可能并不显而易见：\n\n*   最大内存\n*   最大日志大小\n*   日志速率调控\n*   IOPS 和\
  \ I/O 延迟\n*   `tempdb` 的最大大小\n*   最大并发工作线程数\n*   备份保留期\n\n我将在本书的第 7 章中更详细地讨论日志速率调控以及\
  \ IOPS 和 I/O 延迟。现在，请牢记这些概念，因为它们可能影响应用程序的性能，例如那些事务日志工作负载繁重的应用程序。\n\n要查看 Azure SQL\
  \ 托管实例的具体限制，请参阅 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits)\
  \ 上这些记录完善的表格。要查看 Azure SQL 数据库的具体限制，请参阅 [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-vcore-single-databases`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-vcore-single-databases)\
  \ 上的表格。\n\n您还应该知道，每个订阅在每个区域都有整体的 Azure SQL 限制。您可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits)\
  \ 和 [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server)\
  \ 查看这些限制是什么。\n\n可以向 Microsoft 提出增加订阅限制的请求。这被称为 *配额增加请求*。请在 [`https://learn.microsoft.com/azure/azure-sql/database/quota-increase-request`](https://learn.microsoft.com/azure/azure-sql/database/quota-increase-request)\
  \ 阅读更多信息。\n\n## 部署 Azure SQL 托管实例\n\n与我在第 3 章中为虚拟机记录的过程类似，通过 `Azure 门户`部署 Azure\
  \ SQL 托管实例，首先从 Azure 市场使用 Azure SQL 选项开始（我在图 3-1 中向您展示了此视图）。\n\n使用三个 Azure SQL 选项，您需要选择\
  \ SQL 托管实例和单实例，然后单击**创建**。\n\n### 部署过程演练\n\n让我们逐步演练托管实例部署选项的每个屏幕，然后通过 `Azure 门户`进行部署。我将以新的\
  \ `NextGen 通用型` 服务层级为例，带您走一遍部署体验。您将看到与第 3 章中关于 Azure 虚拟机上 SQL Server 所见相似但略有不同的体验。\n\
  \n正如我在本章前面关于预部署规划所提到的，我强烈建议您花时间查看我将要展示的所有选项。这是因为您将要做出的一些选择只能在部署时进行，并且之后无法修改（这需要您进行迁移）。此外，一些选择可以修改（如服务层级），但可能会导致一些停机时间。\n\
  \n\n\n### 基础配置\n\n图 4-4 展示了你在 `Basics`（基础配置）屏幕顶部需要填写的字段，包括选择 `Subscription`（订阅）、`Resource\
  \ Group`（资源组）、`Instance Name`（实例名称，这将成为服务器名称的一部分以及实例的 `@@SERVERNAME`）、`Region`（区域）、`Pool`（池）以及\
  \ `Compute+Storage`（计算+存储）。\n\n![](img/496204_2_En_4_Fig4_HTML.jpg)\n\n图 4-4\n\n\
  用于部署 Azure SQL 托管实例的基础配置屏幕顶部\n\n我喜欢在我做出所有选择时，估算费用会列在右侧。这是我们为 Azure SQL 提供的一种常见体验。\n\
  \n请注意名为 `Compute + Storage` 的选项。在这里，你将选择 `Service Tier`（服务层级）和 `Size`（大小）（`vCores`\
  \ + `Storage`）。请注意，默认设置是 `General Purpose`（通用型），具有 8 个 `vCores` 和 256GB 最大存储空间。点击\
  \ `Configure Managed Instance`（配置托管实例）查看你的选项，应该如图 4-5 所示。\n\n![](img/496204_2_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5\n\nAzure SQL 托管实例的计算+存储配置屏幕顶部\n\n这是一个为部署做出重要选择的屏幕，所以我们来看看这些选项。\n\n在此屏幕顶部，你可以看到可以选择默认的\
  \ `General Purpose` (`GP`)，或 `Business Critical` (`BC`)，并且列出了每种选择的一些资源限制和性能预期。根据部署前的规划，请记住选择\
  \ `BC` 还有其他重要原因，包括：\n\n*   可使用 `In-Memory OLTP`（内存中 OLTP）功能\n*   更高的可用性，因为 `BC`\
  \ 使用本地存储和副本架构\n\n接下来，你会注意到我启用了 `NextGen GP`（下一代通用型）选项。随着此功能全面上市，我预计这将成为默认的 `GP`\
  \ 行为。\n\n现在我可以选择硬件代系，我在本章前面已经描述过这些选择了。\n\n现在我可以选择“大小”选项，包括 `vCores`、最大存储空间和 `IOPS`（这是\
  \ `NextGen` 的新功能之一）。\n\n你选择的硬件代系决定了你可能的最大 `vCore` 值，最高可达 128。\n\n最大存储值称为*最大实例大小*，是允许与托管实例的数据库关联的*所有*数据库和事务日志文件的最大总大小。你应该将其视为数据库的最大存储驱动器。最大存储空间因你的\
  \ `vCore` 选择以及 `GP` 和 `BC` 的选择而异。`GP` 允许最大 32TB，`BC` 允许最大 16TB。\n\n注意\n\n我在本书的第\
  \ 2 章讨论了业务关键型部署的架构，并将在第 8 章详细阐述此架构。`BC` 存储限制较低的原因是数据库存储在本地 SSD 驱动器上，而非 Azure 存储中。\n\
  \n`Tempdb` 的最大大小取决于 `vCore` 选择，但会计入整体最大存储限制。实际上，所有数据库，包括系统数据库，都会计入整体最大实例存储空间。\n\n\
  部署托管实例后，你可以运行以下查询（在任何数据库上下文中）以查看你的数据库相对于实例最大存储空间占用了多少空间：\n\n```sql\nSELECT TOP 1\
  \ used_storage_gb = storage_space_used_mb/1024,\nmax_storage_size_gb = reserved_storage_mb/1024\n\
  FROM sys.server_resource_stats ORDER BY start_time DESC;\n```\n\n向下滚动，你可以在图 4-6\
  \ 中看到其余选项。\n\n![](img/496204_2_En_4_Fig6_HTML.jpg)\n\n图 4-6\n\nAzure SQL 托管实例计算+存储的其他选项\n\
  \n你的第一个选择是 `zone redundancy`（区域冗余）。该选项在 `NextGen GP` 预览期间被禁用，但一旦全面上市即可用。区域冗余使用 `Availability\
  \ Zones`（可用区）使你的部署具有更高的可用性。我强烈建议你在部署时考虑此选项。我将在本书的第 8 章详细讨论这个概念。\n\n你还可以选择使用你现有的\
  \ SQL Server 许可证通过 `Azure Hybrid Benefit` (`AHB`)（Azure 混合权益）来节省成本。我需要说明一下，混合故障转移权益适用于用于灾难恢复的托管实例。更多内容请参阅本书的第\
  \ 8 章。\n\n你还可以选择备份的冗余选项。除非你有特定的数据驻留要求，否则我推荐 `geo-redundant backups`（异地冗余备份），它会将你的备份复制到\
  \ Azure 存储中的已知配对区域。我将在第 8 章详细讨论备份冗余和成本。\n\n进行任何更改后，点击 `Apply`（应用）（仅当你更改了默认设置时 `Apply`\
  \ 才可用；你可以点击右上角的 `X` 返回到 `Basics` 屏幕）。\n\n提示\n\n点击 `Apply` 不会立即部署托管实例，但请花时间在此处尽可能准确地做出选择。为什么？你以后可以更改它们，但托管实例对层级和大小的更改可能是一个漫长的操作。\n\
  \n正如你在图 4-7 中看到的，我们在 `Basics` 屏幕上还有一个选择要做。\n\n![](img/496204_2_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7\n\nAzure SQL 托管实例部署期间的身份验证选择\n\n此选项允许你选择 `Microsoft Entra authentication\
  \ only`（仅 Microsoft Entra 身份验证）、`mixed`（混合）或仅 `SQL Authentication`（SQL 身份验证）。如果你选择任何\
  \ `Entra` 选项，则必须指定一个 `Entra` 帐户。这些选择将成为实例的 `sysadmin` 角色成员。如果你从未使用过 `Microsoft Entra`\
  \ 身份验证，这将需要你进行一些学习。它与在 SQL Server 上使用 `Windows Authentication`（Windows 身份验证）非常相似，但也有一些差异。此功能是最安全的方法，甚至支持无密码应用程序。\n\
  \n然而，为 Azure SQL 托管实例设置此功能可能存在一个障碍（这就是我在此处未使用它的原因）。你必须在你的 `Microsoft Entra` 系统中拥有特殊权限才能使用此选项（我在\
  \ Microsoft 默认没有此权限，因此需要特殊流程来申请）。请阅读 [`https://learn.microsoft.com/azure/azure-sql/database/authentication-aad-configure?view=azuresql&tabs=azure-powershell#provision-microsoft-entra-admin-sql-managed-instance`](https://learn.microsoft.com/azure/azure-sql/database/authentication-aad-configure%253Fview%253Dazuresql%2526tabs%253Dazure-powershell%2523provision-microsoft-entra-admin-sql-managed-instance)\
  \ 了解更多信息。\n\n## 网络配置\n\n点击 `Next: Networking >`（下一步：网络配置 >）以查看你的网络配置选择。你的屏幕应如图 4-8\
  \ 所示。\n\n![](img/496204_2_En_4_Fig8_HTML.jpg)\n\n图 4-8\n\nAzure SQL 托管实例网络配置选项\n\
  \n#### 虚拟网络\n\n在屏幕顶部，你可以看到将创建一个新的虚拟网络来托管 Azure SQL 托管实例。托管实例的优势之一是它部署在私有虚拟网络中。你可以先部署你自己的\
  \ Azure 虚拟网络（可以使用 Azure 门户或 CLI），然后在此部署屏幕上选择该虚拟网络。如果选择使用自己的虚拟网络，则必须以特定方式进行配置，你可以在\
  \ [`https://learn.microsoft.com/azure/azure-sql/managed-instance/vnet-existing-add-subnet`](https://learn.microsoft.com/azure/azure-sql/managed-instance/vnet-existing-add-subnet)`.`\
  \ 阅读相关信息。\n\n提示\n\n你知道可以在同一虚拟网络中部署多个实例吗？这样做将加快后续部署速度，但请确保这符合你的安全和网络需求。\n\n\n\n###\
  \ 连接类型\n\n请注意，在我的屏幕上，我选择的连接类型是 `Redirect`。默认值是 `proxy`。代理连接要求工具或应用程序到托管实例的任何连接（连接到\
  \ TDS 端口 `1433`）都必须始终通过 `gateway`。重定向连接类型使用网关来查找包含托管实例的节点的直接虚拟私有 IP 地址。所有后续流量直接流向该节点。你可以在\
  \ [`https://learn.microsoft.com/azure/azure-sql/managed-instance/connection-types-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/connection-types-overview)\
  \ 阅读更多关于这些连接类型的信息。代理可能更安全，但重定向可能更快。如果你选择在此部署步骤中创建虚拟网络，虚拟网络和包含的子网将应用所有适当的网络安全组（`NSG`）规则。\n\
  \n### 公共端点\n\n你可以选择在公共端点上启用 TDS 流量。公共端点将在端口 `3342` 上启用（并在虚拟网络中重定向到节点实例端口 `1433`）。虽然我不建议在生产环境中使用此选项，但它是连接到托管实例的最快方法之一。你可以在\
  \ [`https://learn.microsoft.com/azure/azure-sql/managed-instance/public-endpoint-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/public-endpoint-overview)\
  \ 阅读更多关于托管实例公共端点的信息。\n\n你还可以控制实例的最低 `TLS` 连接加密。我始终建议使用最新的 `TLS` 版本。你可能想使用不同版本的唯一原因是针对不支持该版本的旧应用程序。在\
  \ [`https://learn.microsoft.com/azure/azure-sql/managed-instance/minimal-tls-version-configure`](https://learn.microsoft.com.com/azure/azure-sql/managed-instance/minimal-tls-version-configure)\
  \ 了解更多信息。\n\n请注意，托管实例会自动启用加速网络。\n\n### 安全性\n\n点击 `Next: Security >` 进行进一步的安全选择，如图\
  \ 4-9 所示。\n\n![](img/496204_2_En_4_Fig9_HTML.jpg)\n\n图 4-9\n\nAzure SQL 托管实例的安全选择\n\
  \n我在前面的章节中提到过 `Microsoft Defender`，相同的功能（但为托管实例定制）可用于漏洞评估和高级威胁保护。\n\n你可以为无密码应用程序设置自己的用户定义的\
  \ `managed identity`。默认情况下，你会获得一个系统定义的托管身份。\n\n如果你想在你的应用程序中对 Azure SQL 托管实例使用 `Windows\
  \ Authentication`，可以启用服务主体（`Service Principal`）的选项。如果你希望避免更改应用程序以使用 Microsoft Entra\
  \ 身份验证，请考虑此选项。在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-overview)\
  \ 了解更多信息。\n\n`Transparent Data Encryption`（`TDE`），即数据库和事务日志存储的静态加密，默认是启用的（你需要为每个单独的数据库启用此功能）。此选项允许你设置自己的加密密钥。\n\
  \n#### 附加设置\n\n点击 `Next: Additional settings >` 以启用部署的一些附加选项，如图 4-10 所示。\n\n![](img/496204_2_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10\n\n托管实例的附加设置\n\n这里的 `collation` 类似于为 SQL Server 设置排序规则。重要的是要知道，在此处提供之后，你无法更改实例排序规则。\n\
  \n注意：在部署后，你*可以*在托管实例上设置和更改*数据库*排序规则。只需记住，不同的数据库排序规则可能会导致跨数据库查询或临时表操作出现问题。\n\n`time\
  \ zone` 是托管实例节点上 SQL Server 引擎识别的时区。我已将其更改为我的本地时区，但也可以是 `UTC` 或你想要选择的任何时区。部署后无法更改此设置。\n\
  \n托管实例可以是 `failover group` 的一部分，我们将在本书的第 8 章中详细讨论。当你稍后复习那些主题时，你将使用该选项。现在，保留其默认值\
  \ `No`。\n\n`Maintenance window` 允许你定义一个不同的时间段，以便将计划更新应用到你的部署。默认是基于你所在时区的下午 5 点到上午\
  \ 8 点之间的任何时间，或者你可以将其配置为周一至周四或周五至周日的晚上 10 点到早上 6 点。部署后你可以更改维护窗口。\n\n`Update policy`\
  \ 是一个相对较新的概念。你可以选择将你的托管实例保持在与 SQL Server 2022 兼容的版本。我将在第 8 章向你展示如何利用这一点来实现在线灾难恢复功能。但是，如果你选择此选项，你将无法获得通常来自无版本部署的新功能（但累积更新会自动应用）。第一个选项确保你始终是最新的，但你将无法还原备份或参与与\
  \ SQL Server 2022 的在线灾难恢复场景。\n\n我将选择 SQL Server 2022 更新策略，以便我可以在本书后面向你展示这些新的兼容性功能。\n\
  \n### 标签\n\n点击 `Next: Tags >` 来定义一个标签，就像我在第 3 章中关于 Azure 虚拟机描述的那样。\n\n### 部署！\n\n\
  点击 `Next: Review + create >` 查看部署前的最终屏幕。就像 Azure 虚拟机的部署一样，此屏幕显示估计成本、使用条款、隐私政策、你选择的所有选项的审查，以及下载描述这些部署选项的\
  \ Azure 模板的选项。\n\n你还会看到一个警告，根据我的选择，部署可能需要长达 6 小时才能完成。对于我的部署，它在大约 1 小时 45 分钟内完成。如果你想在部署期间跟踪更多信息，可以使用\
  \ Azure 门户（[`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-monitor`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-monitor)）。\n\
  \n所以，点击 `Create` 进行部署，保持此屏幕打开以查看进度，并继续阅读下一节关于使用 `CLI` 部署的内容，然后是一些你可能会感兴趣的架构和实现细节，解释为什么部署需要运行。\n\
  \n```\nif (condVar > someVal) {console.log(\"xxx\")}\n```\n\n\n\n### 使用 CLI 部署\n\
  \nAzure 托管实例可以通过命令行界面 (CLI) 使用 `az sql mi`（[`learn.microsoft.com/cli/azure/sql/mi`](https://learn.microsoft.com/cli/azure/sql/mi)）命令接口或通过\
  \ `New-AzSQLInstance` PowerShell cmdlet（[`learn.microsoft.com/powershell/module/az.sql/new-azsqlinstance`](https://learn.microsoft.com/powershell/module/az.sql/new-azsqlinstance)）进行部署。\n\
  \n我尝试使用 `az sql mi` 构建一个示例，发现需要运行多个 `az` CLI 命令来创建虚拟网络、子网以及所有关联设置。因此，我只建议你在使用 *Azure\
  \ 模板* 时配合使用 `az sql mi` CLI。可以在 [`learn.microsoft.com/azure/azure-sql/managed-instance/create-template-quickstart?view=azuresql&tabs=azure-cli`](https://learn.microsoft.com/azure/azure-sql/managed-instance/create-template-quickstart%3Fview%3Dazuresql%26tabs%3Dazure-cli)\
  \ 找到一个示例模板。\n\n**提示**\n\n就像我之前向你展示如何使用 Azure 中的 Copilot 通过 `az` CLI 创建数据库一样，它也可以为你提供关于如何为\
  \ Azure SQL 托管实例执行此操作的提示和示例。它还提供选项来帮助你配置虚拟网络和子网。\n\nPowerShell 要求你在执行 `New-AzSQLInstance`\
  \ 之前设置虚拟网络和其他上下文。在 [`learn.microsoft.com/azure/azure-sql/managed-instance/scripts/create-configure-managed-instance-powershell`](https://learn.microsoft.com/azure/azure-sql/managed-instance/scripts/create-configure-managed-instance-powershell)\
  \ 有一个关于使用 PowerShell 的优质教程。\n\n正如我在本章前面提到的，你还可以选择使用 Bicep 和 Terraform 来部署 Azure\
  \ SQL 托管实例。\n\n### 实现细节\n\n**注意**\n\n随着我们对服务的更改和改进，这些实现细节可能会随时间而变化。我提供其中一些细节，是为了让你了解我们如何构建、管理和运行该服务。\n\
  \nAzure SQL 托管实例部署在由 Azure Service Fabric 提供支持的节点（虚拟机）上，采用一种称为*环*或*虚拟集群*的概念。虚拟集群是在虚拟网络子网中运行的一组专用的隔离虚拟机。\n\
  \n正如我在示例中所做的那样，当你在新虚拟网络（子网）中部署第一个托管实例时，实际上是在部署一个完整的虚拟集群。这就解释了为什么初始部署可能需要很长时间才能完成。你可以在*同一虚拟网络子网*中部署其他托管实例，部署速度会稍快一些。更多关于预期时间的具体信息，请访问\
  \ [`learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview)。\n\
  \n托管实例是一个完整的 SQL Server 引擎数据库实例，部署在虚拟集群中的一台专用虚拟机上。Microsoft 将决定如何在集群的各个节点上部署这些虚拟机。一个节点可能有一台装有实例的虚拟机，也可能是多台虚拟机。根据平台即服务\
  \ (PaaS) 的承诺，Microsoft 将这些细节抽象化，使你无需关心。你与托管实例的交互是通过标准的 SQL Server 接口（如 T-SQL）或 Azure\
  \ 接口（如门户、CLI 或 REST API）进行的。你永远不会直接访问底层虚拟机。\n\n这种架构也解释了为什么某些管理操作（例如扩展 vCores）也可能需要很长时间，因为其中一些操作需要部署一个新的虚拟集群，可能涉及从\
  \ Azure Storage 附加文件或重新设定副本。\n\n我在本书第 2 章中描述了通用型 (GP) 与业务关键型 (BC) 层的一些架构。我将在本书第\
  \ 8 章中进一步描述它们。这两种服务层都使用相同的虚拟集群架构，只是存储和高可用性实现方式不同。\n\n托管实例的 `资源限制`（如内存限制、最大存储大小等）通过多种机制强制执行，具体取决于你的部署选择。例如，内存限制是通过\
  \ Windows 作业对象强制执行的（并且你无法配置 `\"最大服务器内存\"`）。你可以在 [`learn.microsoft.com/en-us/windows/win32/procthread/job-objects`](https://learn.microsoft.com/en-us/windows/win32/procthread/job-objects)\
  \ 阅读更多关于 *Windows 作业对象* 的信息。存储容量（或最大大小）由文件服务器资源管理器 (FSRM) 强制执行，你可以在 [`learn.microsoft.com/windows-server/storage/fsrm/fsrm-overview`](https://learn.microsoft.com/windows-server/storage/fsrm/fsrm-overview)\
  \ 阅读更多相关信息。\n\n*托管实例池部署* 可以快得多，因为实例池可以是一组在同一虚拟机中运行的 SQL Server 实例。隔离和资源限制通过 Windows\
  \ 作业对象应用。图 4-11 展示了托管实例与池的架构对比图。此图源自文档 [`learn.microsoft.com/en-us/azure/azure-sql/managed-instance/instance-pools-overview?view=azuresql#architecture`](https://learn.microsoft.com/en-us/azure/azure-sql/managed-instance/instance-pools-overview%3Fview%3Dazuresql%23architecture)。\n\
  \n![](img/496204_2_En_4_Fig11_HTML.jpg)\n图 4-11: 托管实例与池的架构\n\n### 连接并验证部署\n\n部署完成后，你的屏幕应如图\
  \ 4-12 所示。\n\n![](img/496204_2_En_4_Fig12_HTML.jpg)\n图 4-12: 托管实例部署完成\n\n让我们看一下屏幕上的几个细节：\n\
  \n1.  如果你想要部署摘要，可以选择 `操作详细信息`，除其他信息外，它还可以显示部署的持续时间。\n2.  你可以通过在活动日志中选择 `更多事件` 来获取有关部署每个步骤的更多详细信息。\n\
  3.  你可以选择 `转到资源` 在 Azure 门户中查看已完成的部署。\n\n如果你点击 `转到资源`，你将看到一个类似于图 4-13 的屏幕。\n\n![](img/496204_2_En_4_Fig13_HTML.jpg)\n\
  图 4-13: Azure SQL 托管实例的“概述”屏幕\n\n此时，你可能想要采取的第一步是尝试连接到新实例并验证部署。我喜欢使用一组简单的 T-SQL 查询来验证我的\
  \ SQL Server 安装。\n\n\n## 连接到托管实例\n\n有多种不同的方法可以连接到你的托管实例，你可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/connect-application-instance`](https://learn.microsoft.com/azure/azure-sql/managed-instance/connect-application-instance)\
  \ 查看所有这些方法。\n\n我个人喜欢做的是，通过部署过程中创建的虚拟网络*内部*的一台 Azure 虚拟机进行连接，这样我就不必启用公共端点。我将这台虚拟机称为***跳转盒***。我会使用\
  \ RDP（远程桌面协议）连接到该虚拟机，然后在虚拟机内部，使用 SSMS 等工具通过实例的私有网络进行连接。\n\n我会在与我的托管实例相同的资源组中创建一个新的\
  \ Azure 虚拟机（我直接从市场中使用 SQL Server Developer Edition）。在部署虚拟机期间，我会选择为托管实例创建的虚拟网络（通常是\
  \ vnet-<MI 名称>，因此这里的名称是 vnet-bwsqlnextgeni）。在这个屏幕上，我选择管理子网配置。这允许我创建一个名为“default”的新子网（并使用默认选项）。这成为我的\
  \ VM 等应用程序用于连接到托管实例虚拟网络的私有子网。\n\n我的网络设置如图 4-14 所示。\n\n![](img/496204_2_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14\n\n用于连接跳转盒 VM 到托管实例的网络设置\n\n随着我的跳转盒部署完毕，我将使用 VM 内部的 SSMS 连接到托管实例。当你连接到一个托管实例时，服务器名称会变成这样一个\
  \ URL（你可以在托管实例门户的“概述”屏幕上找到它）。\n\n### bwsqlminextgen.b243ea7f888c.database.windows.net\n\
  \n图 4-15 展示了一个 SSMS 连接到 Azure SQL 托管实例的示例。\n\n![](img/496204_2_En_4_Fig15_HTML.jpg)\n\
  \n图 4-15\n\n通过跳转盒连接到 Azure SQL 托管实例的 SSMS\n\n#### 验证部署\n\n请注意，SSMS 中的“对象资源管理器”看起来与\
  \ SQL Server 几乎完全相同，只是服务器名称是完全限定域名（FQDN）。\n\n要验证 SQL Server 的安装，我通常会使用几种技术，包括对系统目录视图和\
  \ DMV 运行查询，以及查看 ERRORLOG。\n\n### 检查 ERRORLOG\n\n你无权访问托管托管实例的虚拟机的文件系统。要查看 ERRORLOG，我们需要像\
  \ SSMS 或 T-SQL 这样的工具。\n\n你可以使用 SSMS 中的对象资源管理器来查看 ERRORLOG，但我更喜欢直接使用 T-SQL，这样我可以执行\
  \ `sp_readerrorlog` 来查看当前的 ERRORLOG 文件。我必须提醒你，我们在托管实例的 ERRORLOG 中转储了各种额外的信息（是的，甚至比\
  \ SQL Server 还要多），执行可能需要几秒钟的时间。我的同事 Dimitri Furman 写了一篇博客文章，其中包含一些用于过滤托管实例 ERRORLOG\
  \ 的示例代码。你可以在 [`https://techcommunity.microsoft.com/t5/datacat/azure-sql-db-managed-instance-sp-readmierrorlog/ba-p/305506`](https://techcommunity.microsoft.com/t5/datacat/azure-sql-db-managed-instance-sp-readmierrorlog/ba-p/305506)\
  \ 查看。\n\n我在启动时关注 ERRORLOG 中的几个关键消息，并在我的托管实例中找到了这些：\n\n```\nSQL Server detected 1\
  \ sockets with 4 cores per socket and 8 logical processors per socket, 8 total logical\
  \ processors; using 8 logical processors based on SQL Server licensing. This is\
  \ an informational message; no user action is required.\nSQL Server is starting\
  \ at normal priority base (=7). This is an informational message only. No user action\
  \ is required.\nDetected 44645 MB of RAM. This is an informational message; no user\
  \ action is required.\n```\n\n我可以看到检测到了八个逻辑处理器，这与我部署了一个 8 vCore 实例的预期相符。\n\n检测到的内存是\
  \ SQL Server 引擎从主机或 VM 检测到的内存量。你将在本书的多个地方看到 Azure 如何使用 Windows 作业对象来限制 SQL Server\
  \ 可见的内存，以强制执行每个服务层和 vCore 的资源限制。你会发现，对于此托管实例，作业对象将不允许 SQL Server 访问 ERRORLOG 中显示的所有内存。事实上，你不应该依赖\
  \ ERRORLOG 显示的内容，而应该依赖 DMV `sys.dm_os_job_object`，我将在下一节向你展示如何使用它。\n\n### 验证查询\n\
  \n每当安装 SQL Server 时，我通常会使用一些 T-SQL 查询作为完整性检查。让我们看看这些查询以及它们在托管实例与 SQL Server 上的结果：\n\
  \n```\nSELECT @@version\nMicrosoft SQL Azure (RTM) - 12.0.2000.8   May 28 2024 14:55:16\
  \   Copyright (C) 2022 Microsoft Corporation\n```\n\n我在本书描述 Azure SQL 历史的第 1 章中解释了为什么\
  \ v12 是该服务的一个里程碑式时刻。从那时起，我们就没有更改过主版本号 12。\n\n基本上，Azure SQL 托管实例的主版本号没有意义。它与 SQL\
  \ Server 的任何主版本都不对应，因为 Azure SQL 托管实例是*无版本*的。我将在本书第 5 章中进一步讨论无版本的概念。只需知道，Microsoft\
  \ 致力于使用所有正确的更改和修复使 Azure SQL 的实例和数据库保持最新状态，因此您无需担心应用更新。\n\n注意\n尽管版本不改变，但 `@@VERSION`\
  \ 中的时间戳是我们上次更新实例的时间。这不是一个保证，但我从未见过它不是这种情况。\n\n```\nSELECT database_id, name, compatibility_level\
  \ FROM sys.databases;\ndatabase_id    name        compatibility_level\n1       \
  \       master      160\n2              tempdb      160\n3              model  \
  \     160\n4              msdb        160\n```\n\n这看起来很正常（我没有创建任何用户数据库），除了 `mssqlsystemresource`\
  \ 数据库没有像在 SQL Server 中那样被列出（它确实存在，正如您在 `ERRORLOG` 中可以看到的）。请注意，兼容性级别设置为 160，这是 SQL\
  \ Server 2022 的 `dbcompat`。\n\n```\nSELECT name, object_id, type_desc FROM sys.objects;\n\
  ```\n\n此查询的结果与您在 SQL Server 的 `master` 数据库中通常看到的一样，系统表位于列表顶部。\n\n```\nSELECT * FROM\
  \ sys.dm_os_schedulers;\n```\n\n由于我们部署了一个 8-vCore 托管实例，我预计会有八个 `VISIBLE ONLINE`\
  \ 调度器，情况确实如此。我还预计会看到几个 `HIDDEN ONLINE` 调度器，它们也出现在此查询的结果中。\n\n```\nSELECT * FROM\
  \ sys.dm_os_sys_info;\n```\n\n这是一个提供有关 SQL Server 系统信息的 DMV。从这个 DMV 的输出中，我可以看到检测到的\
  \ CPU 数量、检测到的内存量、目标（最大服务器内存）、引擎使用的总内存以及实际的工作线程最大值（8 vCores 对应 1640），并且使用了传统内存模型。我将在本书第\
  \ 5 章中进一步讨论锁定页面。\n\n```\nSELECT * FROM sys.dm_os_process_memory;\n```\n\n此 DMV 显示与操作系统相关的内存信息，包括是否使用了锁定或大页面（对于\
  \ Azure SQL 托管实例或数据库，它们未被使用）。我通常只将此作为在虚拟机或服务器中为 SQL Server 提供足够内存的完整性检查。\n\n```\n\
  SELECT * FROM sys.dm_exec_requests;\n```\n\n这是世界上最常见的用于检查 SQL Server 上运行状态的 DMV\
  \ 之一。我运行它只是为了确保所有正常的后台进程都在运行，包括 `LAZY WRITER`、`RECOVERY WRITER`、`LOCK MONITOR` 等，并且我可以看到活动查询。\n\
  \n```\nSELECT SERVERPROPERTY('EngineEdition');\n```\n\n根据文档 [`https://learn.microsoft.com/sql/t-sql/functions/serverproperty-transact-sql`](https://learn.microsoft.com/sql/t-sql/functions/serverproperty-transact-sql)，值\
  \ 8 表示托管实例。\n\n还有两个特定于 Azure 的新 DMV，在 SQL Server 中找不到：\n\n```\nSELECT * FROM sys.dm_user_db_resource_governance;\n\
  ```\n\n此 DMV 确实旨在显示特定 Azure SQL 数据库的资源限制，但它也适用于托管实例（您将看到除 `tempdb` 外所有数据库（包括系统数据库）的一行）。您可以查看诸如内存、最大存储、日志速率等限制。您可以在\
  \ [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database)\
  \ 阅读此 DMV 的文档。请注意，文档说这主要供内部使用，这意味着将来可能会更改。\n\n注意\n有一个名为 `sys.dm_instance_resource_governance`\
  \ 的未记录 DMV，它显示实例级别的资源限制。\n\n```\nSELECT * FROM sys.dm_os_job_object;\n```\n\n这是一个特定于\
  \ Azure 的 DMV，显示 Azure 使用 Windows 作业对象应用于托管实例的资源限制。我特别查看的列是 `memory_limit_mb`，它向我显示了托管实例可访问的真正内存量。我在“实现细节”一节中讨论了\
  \ Windows 作业对象。\n\n此时您可能要问，托管实例有什么特别之处，因为从使用 SSMS 等工具的角度来看，它感觉就像在 Azure 虚拟机中运行的\
  \ SQL Server。这正是托管实例的意义所在。我们希望您拥有 SQL Server 实例的体验，但无需担心虚拟机可能需要考虑的细节。而且由于 Azure\
  \ SQL 托管实例（MI）是一项 PaaS 服务，您将看到使用 MI 的好处，特别是在无版本 SQL Server、可预测的性能、内置高可用性和灾难恢复方面。\n\
  \n## 迁移到 Azure SQL 托管实例\n\n我在本章前面讨论了迁移到 Azure SQL 托管实例的一些考虑因素和工具。\n\n让我添加一些迁移时应考虑的其他注意事项的细节：\n\
  \n*   当您将受透明数据加密保护的数据库迁移到使用原生还原选项的托管实例时，*必须在* 数据库还原*之前*迁移来自本地或 Azure VM SQL Server\
  \ 的相应证书。\n*   不支持还原系统数据库。要迁移实例级对象（存储在 `master` 或 `msdb` 数据库中），我们建议将它们编写为脚本，然后在目标实例上运行\
  \ T-SQL 脚本。例如，您可以使用 SSMS 将 SQL Server 代理作业编写为 T-SQL。\n*   数据库兼容性完全受 Azure SQL 托管实例支持，包括所有当前支持的\
  \ SQL Server 版本。我的许多客户在迁移到 Azure 时选择保留其当前的 `dbcompat`，然后进行测试并在以后更新。有关 `dbcompat`\
  \ 的更多信息，请阅读 [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat)。\n*   虽然您始终可以将完整备份（离线）还原到\
  \ Azure SQL 托管实例，但您也有在线选项可选，包括使用 Azure 数据库迁移服务 (DMS) 的日志传送方法以及使用 Always On 可用性组的托管实例链接进行更精细的方法。即使您在本地未部署\
  \ AG，托管实例链接也适用。有关如何使用托管实例链接的更多信息，请访问 [`https://aka.ms/milink`](https://aka.ms/milink)。\n\
  *   对于迁移到托管实例，应用程序更改应该最小，除了使用新的服务器名称（您在本章前面关于如何连接的部分中看到了）以及可能的身份验证方法。现在提供了一项新功能，可以使用\
  \ Windows 身份验证并减轻应用程序为身份验证所需的更改。了解更多请访问 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup`](https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup)。\n\
  \n\n## 部署 Azure SQL 数据库\n\n部署 Azure SQL 数据库与部署 Azure SQL 托管实例既有相似之处，也有不同之处。体验相似之处在于，你将使用\
  \ Azure 门户或 CLI（甚至 T-SQL）来部署一个数据库；不同之处则在于，你部署的是……嗯，一个数据库，而不是一个 SQL Server 实例。既然你只部署一个数据库，正如我在本书中所描述的，你会获得更多选项，包括\
  \ `Serverless`、`弹性池` 和 `Hyperscale`。\n\n部署 Azure SQL 数据库的基本流程是：\n\n*   ✓ 决定部署单个数据库还是弹性池\n\
  *   ✓ 选择资源组和区域\n*   ✓ 选择现有或新建逻辑数据库服务器\n*   ✓ 选择你的购买模型、计算模型、服务层级、硬件配置和大小\n*   ✓ （可选）提供其他配置选项\n\
  *   ✓ 部署它！\n\n### 部署与选项\n\n首先，我将使用 `Azure SQL` 界面进行部署。方法是在市场中搜索 Azure SQL，就像我在第\
  \ 3 章演示在 Azure 虚拟机上部署 SQL Server 时那样，但这次在左侧选择**单一数据库**，然后点击**创建**。我将向你展示如何部署一个单一数据库，这也将允许我部署一个数据库服务器（并且我会描述你需要数据库服务器的原因以及它是什么）。\n\
  \n就像我们为 Azure SQL 托管实例所做的那样，让我们逐步了解通过 Azure 门户部署数据库的所有选项。\n\n#### 基本\n\n如果你选择单一数据库，你会看到一个类似于\
  \ Azure SQL 托管实例的“基本”屏幕，如图 4-16 所示。\n\n![](img/496204_2_En_4_Fig16_HTML.jpg)\n\n\
  图 4-16\n部署 Azure SQL 数据库的“基本”屏幕\n\n从我的屏幕中可以看到，我已经创建了一个新的资源组，定义了一个数据库名称，并可以选择首先创建一个新的数据库（或逻辑）服务器。\n\
  \n注意\n\n请注意此屏幕顶部的选项，可以选择免费的数据库优惠，地址是 [`https://aka.ms/freedboffer`](https://aka.ms/freedboffer)。\n\
  \n你可能想知道为什么需要数据库服务器，毕竟 Azure SQL 数据库的承诺是“你拥有数据库；Azure 管理其他一切”。\n\n`数据库服务器`，也称为 `逻辑服务器`，是存储在\
  \ Azure 基础结构中的元数据集合，用于组织一个或多个 Azure SQL 数据库。它*不是*物理服务器上的单一 SQL Server 实例。数据库服务器包含一个\
  \ `逻辑 master 数据库`，就像真正的 SQL Server 实例一样。请注意，区域与逻辑服务器关联，而不是与数据库关联。为逻辑服务器创建的任何数据库都将托管在该服务器的区域中。所有连接和网络都将与逻辑服务器关联。实际上，你可以先创建一个逻辑服务器，连接到该服务器，然后使用\
  \ `T-SQL CREATE DATABASE` 来创建 Azure SQL 数据库。你为逻辑服务器提供的登录名和密码将成为逻辑 master 数据库中的一个登录名，该用户是服务器级别的主体，实际上相当于所有数据库的\
  \ `服务器管理员`。\n\n你可以在图 4-17 中看到我创建逻辑服务器的选择，包括你的区域和首选的身份验证方法。在本例中，我将同时设置 Microsoft\
  \ Entra 和 SQL 身份验证，并为两者分别提供管理员。\n\n![](img/496204_2_En_4_Fig17_HTML.jpg)\n\n图 4-17\n\
  为 Azure SQL 数据库创建逻辑服务器\n\n一旦你为逻辑服务器点击**确定**（它将作为部署的一部分创建），你可以选择是否希望将其作为弹性池的一部分，但在此我不会这样做。你可以先单独创建一个逻辑服务器，然后再为其创建数据库。在此场景中，我正在创建一个新的数据库以及一个逻辑服务器，并将该数据库与这个新服务器放在一起。\n\
  \n现在，我有更多选项来完成“基本”屏幕，如图 4-18 所示。\n\n![](img/496204_2_En_4_Fig18_HTML.jpg)\n\n图 4-18\n\
  完成 Azure SQL 数据库的“基本”屏幕选择\n\n“工作负载环境”是一个便捷的方法，用于为开发环境选择较低的服务层级和 vCore 大小，或者选择生产选项，该选项将默认为\
  \ `Hyperscale`。我将选择**生产**。\n\n然后，你可以选择配置部署的多个方面，包括服务层级和其他资源选择。你可以选择**配置数据库**来进行这些选择。在我向你展示这些选项之前，你还可以选择备份存储冗余选项。这与\
  \ Azure SQL 托管实例的选择类似。除非你有数据驻留要求，否则我建议你选择地域冗余选项。地域-区域冗余具有最高级别的冗余和成本，但如果你将区域冗余选择为部署选项，则需要区域冗余选项。实际上，我将为部署选择一个区域冗余选项，我的备份选项也会相应更改。\n\
  \n图 4-19 显示了当你选择**配置数据库**时的选项。\n\n![](img/496204_2_En_4_Fig19_HTML.jpg)\n\n图 4-19\n\
  Azure SQL 数据库的计算和存储选项\n\n让我们逐一了解这些选项。\n\n##### 服务层级\n\n我之前提到了你的选择：`通用型 (GP)`、`业务关键型\
  \ (BC)` 和 `Hyperscale`。\n\n##### 计算层级\n\n对于 `GP` 和 `Hyperscale`，你可以选择 `Serverless`\
  \ 或 `预配型`。我将在本章后面向你详细介绍 `Serverless`。\n\n##### 硬件配置\n\n在这里你可以选择 `Gen5`、`FSv2`、`DC`\
  \ 或 `高级硬件`。\n\n##### vCores\n\n根据你的服务层级和硬件配置，你可以选择所需的 `vCores` 数量（以后可以放大或缩小）。最多可拥有\
  \ 128 个 `vCores`。\n\n##### HA 副本和区域冗余\n\n`Hyperscale` 允许最多 30 个命名副本，因此你可以在此处选择副本数量。我将在本书的第\
  \ 8 章详细介绍 `Hyperscale` 的可用性。你不必为 `Hyperscale` 设置任何副本，但如果你选择区域冗余，则需要至少有一个副本。\n\n\
  ##### 其他选择\n\n*   如果你选择了 `GP` 或 `BC` 层级，你需要选择最大存储大小。对于 `GP` 和 `BC`，最大可达 4TB。对于 `Hyperscale`，没有最大存储限制，因此你无需做出选择。\n\
  *   对于 `GP` 和 `BC` 服务层级，你可以选择 `Azure 混合权益` 进行许可。`Hyperscale` 的新定价结构不需要此选项。\n\n我意识到这里的选择太多了，很难跟上。我为之前的一次演示创建了这张幻灯片，你可能会觉得有用，如图\
  \ 4-20 所示。\n\n![](img/496204_2_En_4_Fig20_HTML.jpg)\n\n图 4-20\nAzure SQL 数据库部署选项\n\
  \n\n\n#### 网络\n\n点击`Next: Networking >`查看连接性和网络安全选项，如图 4-21 所示。\n\n![](img/496204_2_En_4_Fig21_HTML.jpg)\n\
  \n图 4-21\n\n部署 Azure SQL Database 时的网络选项\n\n与 Azure SQL 托管实例不同，Azure SQL Database\
  \ 本身并非私有虚拟网络的一部分。在部署时，你有三种选择：\n\n*   **无访问权限** – 部署数据库，但在你准备好做出选择之前不允许任何连接。\n* \
  \  **公共终结点** – 向 Azure 内或 Internet（或两者）公开逻辑服务器和/或数据库的连接。\n*   **专用终结点** – 这是 Azure\
  \ SQL Database 的一项新功能，使其非常安全。这允许你拒绝公共访问服务器和/或数据库，只允许在 Azure 内外定义的虚拟网络内进行专用连接。\n\n\
  目前，我将选择公共端点，并将`Allow Azure services and resources access this server`设置为`Yes`。这允许我部署一个\
  \ Azure 虚拟机（无论是什么虚拟网络）并连接到此数据库，或者在我当前部署浏览器的客户端计算机上使用 SQL 客户端工具进行连接。我将在本书的第 6 章向你展示如何加强此模型的安全性。\n\
  \n这里还有一些与 Azure SQL 托管实例类似的连接策略（`Proxy` 或 `Redirect`）和最低 TLS 版本选项。\n\n#### 安全\n\n\
  点击`Next: Security >`设置几个安全相关选项，如图 4-22 所示。\n\n![](img/496204_2_En_4_Fig22_HTML.jpg)\n\
  \n图 4-22\n\nAzure SQL Database 的安全选项\n\n与 Azure SQL 托管实例类似，你可以为 SQL 启用`Microsoft\
  \ Defender`，并获得漏洞评估和高级威胁防护等功能。\n\n`Ledger` 是一项提供数据库更改防篡改记录的功能，类似于 SQL 内部的区块链。你将在本书的第\
  \ 10 章了解更多关于 Ledger 的信息。\n\n服务器身份允许你为使用 Microsoft Entra 的*无密码*应用程序配置`托管身份`。\n\n\
  `透明数据加密`（TDE），即静态加密，默认对 Azure SQL Database 开启。此选项为你提供了`自带密钥`（BYOK）的能力。\n\n最后一个选项是为`Always\
  \ Encrypted`配置`安全飞地`。Always Encrypted 是 SQL 的端到端加密功能。在 [`https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves`](https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves)\
  \ 了解更多关于安全飞地的信息。\n\n#### 附加设置\n\n点击`Next: Additional settings >`查看部署的更多选项。图 4-23\
  \ 显示了这些附加选项。\n\n![](img/496204_2_En_4_Fig23_HTML.jpg)\n\n图 4-23\n\nAzure SQL Database\
  \ 部署的附加设置\n\n你的第一个选择是创建一个空白数据库，或者基于地理复制的 Azure SQL Database 备份或示例 `AdventureWorksLT`（LT\
  \ 代表轻量版）创建一个数据库。你可以在 [`https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups`](https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups)\
  \ 了解更多关于如何从地理复制备份中还原的信息。\n\n下一个选择是*数据库排序规则*。由于我选择了示例数据库，排序规则已经确定。对于新的空白数据库，在部署期间选择此选项非常重要，因为以后无法更改。\n\
  \n#### 标记\n\n点击`Next: Tags >`为部署定义一个可选标记。\n\n#### 开始部署！\n\n点击`Next: Review + create\
  \ >`查看最终的验证屏幕，就像任何 Azure 资源部署一样。与托管实例一样，你可以看到预估费用、使用条款、隐私政策、你的选择回顾以及下载 Azure 模板的能力。\n\
  \n点击`Create`开始部署。与托管实例一样，如果你不离开此屏幕，你将在门户的通知区域和主屏幕上看到部署进度。\n\n在我的示例中，部署仅用了几分钟，如图\
  \ 4-24 所示。\n\n![](img/496204_2_En_4_Fig24_HTML.jpg)\n\n图 4-24\n\nAzure SQL Database\
  \ 的已完成部署\n\n与托管实例部署一样，你可以点击活动日志中的`More events`查看所有资源的部署顺序。\n\n点击`Go to resource`查看数据库的概述屏幕，如图\
  \ 4-25。\n\n![](img/496204_2_En_4_Fig25_HTML.jpg)\n\n图 4-25\n\nAzure SQL Database\
  \ 的概述屏幕\n\n与虚拟机和托管实例类似，门户显示了服务菜单、命令栏、工作窗格和监控窗格。虽然这看起来像其他 Azure 资源，但其中大部分信息是 Azure\
  \ SQL Database 特有的。在你探索安全、性能、可用性和其他功能时，我们将在本书的剩余部分使用这些选项中的许多。我将在本书的第 5 章讨论数据库的一些具体配置选择。\n\
  \n### 部署无服务器版\n\n让我们首先通过查看指定 vCore 方面的独特差异，了解如何为超大规模部署无服务器数据库。\n\n在你刚刚部署的数据库的概述屏幕上，点击服务器名称。这将带你进入如图\
  \ 4-26 所示的屏幕。\n\n![](img/496204_2_En_4_Fig26_HTML.jpg)\n\n图 4-26\n\nAzure SQL Database\
  \ 逻辑服务器的概述\n\n点击命令菜单中的`+ Create Database`为该逻辑服务器创建一个新数据库。\n\n在这个新数据库的“基础”屏幕上，我将使用名称`bwsqldbserverless`，然后选择`Configure\
  \ database`。然后我将使用如图 4-27 的选择来选择无服务器部署。\n\n![](img/496204_2_En_4_Fig27_HTML.jpg)\n\
  \n图 4-27\n\n部署无服务器超大规模数据库\n\n请注意，对于无服务器，我现在可以选择最小和最大 vCore 范围。我的数据库可以根据我的资源需求自动向上和向下扩展。无服务器的关键因素是，我只需为每秒使用的\
  \ vCore 付费，最小 vCore 作为最低固定成本。\n\n我的所有其他选项都与我的第一次数据库部署相同。就像我可以更改预配数据库的固定 vCore 数量一样，我以后也可以更改无服务器的最小和最大值。我将在本书的第\
  \ 5 章讨论配置无服务器数据库。\n\n注意\n\n通用服务层的无服务器数据库也有一个自动暂停选项，但在本书撰写时，超大规模尚不可用。\n\n\n\n###\
  \ 部署弹性池\n\n让我们通过查看部署弹性池及池中每个数据库的不同选项，来一起探讨如何部署一个包含两个超大规模数据库的弹性池。\n\n使用与之前部署无服务器数据库相同的方法，我将为同一个逻辑服务器创建一个新数据库。但如你在图\
  \ 4-28 中所见，需要选择将新数据库放入新弹性池的选项。\n\n![](img/496204_2_En_4_Fig28_HTML.jpg)\n图 4-28：在弹性池中创建数据库\n\
  \n你也可以选择先单独创建池。在本场景中，我同时创建了一个数据库和一个池，并将这个新数据库放入了该池中。\n\n现在我的池中已有一个数据库，让我们再添加一个——这次是一个资源分配不同的数据库（因为这正是我会使用池的原因之一）。\n\
  \n在我刚刚部署的数据库 `sqldb1` 的概览页上，你会看到名为 `bwsqldbpool` 的弹性池被列出。点击它，你将看到如图 4-29 所示的弹性池概览屏幕。\n\
  \n![](img/496204_2_En_4_Fig29_HTML.jpg)\n图 4-29：弹性池概览\n\n使用命令窗口中的“创建”按钮，我可以创建另一个数据库。在该体验中，你会发现无需指定服务层、vCPU\
  \ 或其他选项。这是因为这些选择是在 `池级别` 定义的，而非数据库级别。\n\n你可以在 Azure 门户中查看哪些数据库属于该池。在如图 4-29 所示的同一概览屏幕上，点击“概要”窗格中“弹性数据库”下的数据库，你将获得一个类似图\
  \ 4-30 的屏幕。\n\n![](img/496204_2_En_4_Fig30_HTML.jpg)\n图 4-30：列出弹性池的数据库\n\n你还可以使用目录视图\
  \ `sys.database_service_objectives()` 来查找哪些数据库属于特定的弹性池。我将在本书第 5 章向你展示如何为弹性池配置资源选择。\n\
  \n以下是一些值得查阅的弹性池相关参考资料：\n\n*   阅读弹性池概述：[`https://learn.microsoft.com/azure/azure-sql/database/elastic-pool-overview`](https://learn.microsoft.com/azure/azure-sql/database/elastic-pool-overview)。\n\
  *   阅读有关为池选择合适大小的指导：[`https://learn.microsoft.com/azure/azure-sql/database/elastic-pool-overview?view=azuresql#how-do-i-choose-the-correct-pool-size`](https://learn.microsoft.com/azure/azure-sql/database/elastic-pool-overview%253Fview%253Dazuresql%2523how-do-i-choose-the-correct-pool-size)。\n\
  \n### 使用 CLI 部署\n\nAzure SQL 数据库可通过命令行接口（CLI），使用 `az sql db` ([`https://learn.microsoft.com/cli/azure/sql/db`](https://learn.microsoft.com/cli/azure/sql/db))\
  \ 命令接口或 `New-AzSQLDatabase` PowerShell cmdlet ([`https://learn.microsoft.com/powershell/module/az.sql/new-azsqldatabase`](https://learn.microsoft.com/powershell/module/az.sql/new-azsqldatabase))\
  \ 进行部署。\n\n与托管实例不同，为 Azure SQL 数据库使用 `az` CLI 更为简便，无需使用 Azure 模板，因为我只需创建逻辑服务器，然后即可创建数据库（无需先创建虚拟网络及所有组件）。\n\
  \n**提示**\n\n使用类似如下简短的 `az` CLI 命令即可轻松创建数据库：\n```\naz sql db create -n sqldbiseasy\
  \ -g bwsqldbrg -s bwsqllogicalserver\n```\n几分钟内，我便部署了一个通用型 2 vCore 数据库。这假设我已经创建了资源组和逻辑服务器，但它展示了创建新数据库可以有多简单。\n\
  \n你也可以使用 Bicep ([`https://learn.microsoft.com/azure/azure-sql/database/single-database-create-bicep-quickstart`](https://learn.microsoft.com/azure/azure-sql/database/single-database-create-bicep-quickstart))\
  \ 和 Terraform ([`https://learn.microsoft.com/azure/azure-sql/database/single-database-create-terraform-quickstart`](https://learn.microsoft.com/azure/azure-sql/database/single-database-create-terraform-quickstart))\
  \ 部署 Azure SQL 数据库。\n\n此外，正如我在本章前面所示，你可以使用 **Azure 中的 Copilot** 来获取使用 `az` CLI 部署\
  \ Azure SQL 数据库的简易安装步骤。\n\n### 实现细节\n\n**注意**\n\n随着我们对服务进行更改和改进，这些实现细节可能会随时间而变化。我提供其中一些细节，是为了让你了解我们如何构建、管理和运行该服务。\n\
  \n在本书第 1 章，我介绍了我们为 Azure SQL 数据库构建架构以支撑数百万个数据库的非凡历程。让我再为你详细说明一些我们在幕后实现 Azure SQL\
  \ 数据库的方式。\n\n**注意**\n\n即使在我撰写本章时，我采访了幕后参与 Azure SQL 数据库的许多微软工程团队成员，我们也在研究如何使我们的实现更高效。因此，甚至其中一些细节在你阅读本章时可能已略显过时。这就是云的速度和作者的噩梦！\n\
  \n#### 专用环与实例\n\n与托管实例不同，我们预部署了专用于托管 Azure SQL 数据库的环。除了少数例外情况，每个数据库都由专用的 SQL Server\
  \ 实例托管（例外情况是“低于核心”的 DTU 选项和弹性池）。这使我们能够为客户提供更好的隔离性，并保持“只需关注数据库”的模型，同时开放一些实例级别的表面区域（例如，DMV\
  \ 和列存储索引）。我们可能会在同一虚拟机或节点上配置这些实例，但只要我们遵守服务级别协议（SLA）和性能目标，这些细节对你来说是抽象的。\n\n所有这些环和实例都由\
  \ `Azure Service Fabric` 提供支持和管理。这是你可用于构建自己的微服务的相同基础结构软件。Azure Service Fabric 架构有详细文档：[`https://learn.microsoft.com/azure/service-fabric/service-fabric-architecture`](https://learn.microsoft.com/azure/service-fabric/service-fabric-architecture)。\n\
  \n#### 逻辑服务器\n\n正如我在本章前面所述，数据库或逻辑服务器只是一个元数据概念。我们为服务器和 `master` 数据库提供了一个接口。但是，当你查询\
  \ `master` 数据库的各个方面时，我们可能从服务内的其他存储或文件中提取数据来向你展示信息。我记得在构建我们如今著名的 Azure SQL 入门系列 ([`https://aka.ms/azuresql4beginners`](https://aka.ms/azuresql4beginners))\
  \ 时，Anna Hoffman 向我提出了这个问题。我告诉 Anna，在 SQL Server 中，`master` 数据库拥有自己的元数据以及服务器上其他数据库的物理位置，这就是为什么你可以非常轻松地“切换”数据库上下文（即\
  \ `USE <database>`）。而在 Azure SQL 数据库和逻辑服务器的情况下，`master` 包含存储在网关服务器上的元数据以及用户数据库所在节点的位置。使用\
  \ `USE` 语句轻松切换上下文到另一个服务器是有点困难的。\n\n\n## 存储、计算与网关\n\n在第 8 章中，您将看到更多关于通用版、商业关键版和超大规模服务层级背后实现高可用性\
  \ (HA) 的架构细节。我们通过使用 Azure 存储或结合诸如始终可用性组等技术的本地存储来实现某些 HA 能力。\n\n在所有情况下，连接性的一个关键组件是\
  \ `网关`。网关是基本上负责将流量路由到托管 SQL Server 数据库节点的节点。本章前文提到了托管实例中重定向与代理连接类型的使用。相同的概念也适用于\
  \ Azure SQL 数据库。网关对于连接性至关重要，因为它们为应用程序提供连接抽象，无论数据库节点位于何处，这将在第 6 章（关于安全性）和第 8 章（关于可用性）中进一步阐述。\n\
  \n## 无服务器\n\n无服务器计算涉及我们在 SQL Server 标准部署中实现的几项有趣技术。许多细节已在我们的文档 [`https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview`](https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview)\
  \ 中描述。\n\n由于无服务器部署中存储和计算是分离的，因此 `暂停` 数据库并不困难，因为没有应用程序连接。我们只需要保留足够的状态信息，以便在新的登录发生时，可以将数据库连接到实例并“预热”应用程序。\n\
  \n自动缩放则更有趣。我们需要在不中断应用程序的情况下向上或向下扩展数据库 CPU 资源。如果我们可以满足新扩展需求的节点上进行扩展，则不会发生中断。但是，如果我们无法满足该需求，我们可能需要使用\
  \ Azure 负载均衡器，在可能的情况下保持应用程序连接，直到找到满足需求的新节点，但在新节点启动时可能会发生断开连接。\n\n内存管理也有所不同，我们必须部署内存策略，在\
  \ CPU 或缓存利用率低时回收 SQL Server 实例的内存。可以将这个概念理解为，我们正在向 SQL Server 发出存在外部内存压力的信号，并降低内存目标。无服务器的自动缩放和内存管理在\
  \ [`https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview?view=azuresql&tabs=general-purpose#autoscaling`](https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview%253Fview%253Dazuresql%2526tabs%253Dgeneral-purpose%2523autoscaling)\
  \ 中有更详细的描述。\n\n## 超大规模\n\n超大规模是针对数据库的一种独特实现，其架构（专用环和节点）与通用版或商业关键服务层级有显著不同。\n\n超大规模部署涉及一系列用于计算、日志记录和缓存的节点，并结合\
  \ Azure 存储。我在本书第 1 章中讨论过此架构，但值得再次展示给您，如图 4-31 所示（该图直接来自文档 [`https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale?view=azuresql#distributed-functions-architecture`](https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale%253Fview%253Dazuresql%2523distributed-functions-architecture)）。\n\
  \n![](img/496204_2_En_4_Fig31_HTML.jpg)\n\n图 4-31：超大规模架构\n\n我将在本书第 8 章向您展示此架构的更多工作部分，但请允许我停下来指出几个关键组件：\n\
  \n*   计算与存储分离\n\n    与通用版类似，我们将数据库文件存储在 Azure 存储上。但请注意，这里我们使用的是 Azure 标准存储。由于缓存系统的存在，访问数据库文件的速度并非首要考量。\n\
  \n*   `缓存` 系统\n\n    我们在页面服务器（实际托管数据库页面的节点）和计算节点上，结合使用页面服务器和缓冲池缓存（可视为扩展缓冲池的 SSD\
  \ 驱动器）。\n\n*   日志服务\n\n    对于超大规模，任何记录的更改最初仍位于主计算节点的日志缓存中。然而，当日志更改必须刷新到磁盘（提交）时，这些\
  \ I/O 请求会被 `重定向` 到运行着一个名为日志服务（也称为 Xlog）组件的另一个节点。日志服务负责确保更改被本地存储（称为 `着陆区`）并刷新到缓存系统、辅助副本，并最终到\
  \ Azure 存储。\n\n*   解耦的副本\n\n    在某种程度上，超大规模为您提供了通用版和商业关键版的最佳组合。实际的数据库和事务日志文件存储在\
  \ Azure 存储中（具有其自身的冗余），但我们也有副本以实现极快速的高可用性。\n\n    然而，辅助副本系统不使用始终可用性组。实际上，主副本和辅助副本彼此并不知晓。辅助副本使用日志更改方法，但其更改来源于日志服务。一旦日志服务固化了更改，主副本上的提交即可进行。\n\
  \n    即使没有辅助副本，也被允许实现高可用性。如何实现？如果主节点出现问题，我们可以在新节点上部署一个新的主副本，并使用页面服务器甚至 Azure 存储中的数据库文件，因为它已被解耦。话虽如此，有辅助副本存在时，恢复时间目标要快得多。辅助副本系统（因为您最多可以拥有四个）为\
  \ Azure SQL 数据库提供了最佳的读取扩展选项。\n\n*   `超快速` 备份与恢复\n\n    由于大多数数据访问来自缓存系统，在 `预热` 的系统中很少需要从数据库文件中读取数据库页面。这使我们能够对数据库文件使用快照备份。快照备份速度极快，因为我们只需将文件复制到另一个存储位置。另一个惊人的地方是恢复。恢复数据库快照的速度快得惊人！\n\
  \n## 资源治理\n\n为了满足 Azure SQL 数据库的服务级别协议要求，我们必须对数据库的使用设置一些资源限制。本章中已描述了其中一些限制。在幕后，我们使用这些技术来执行这些限制。\n\
  \n### SQL Server 资源治理器\n\nAzure SQL 托管实例允许用户定义工作负载组和池。Azure SQL 数据库在后台使用资源治理器来强制执行某些限制。迁移到专用\
  \ SQL Server 实例是允许我们使用资源治理器的关键驱动因素。\n\n### 引擎增强\n\n引擎在 Azure 中得到了增强，可以检测特定大小和速率的事务日志记录生成，并在必要时对应用程序进行治理。观察到等待类型为\
  \ `LOG_RATE_GOVERNOR` 是此治理正在发生的主要信号。您可以在 [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance)\
  \ 阅读更多关于日志速率治理的信息。\n\n### Windows 作业对象\n\n本章前面提到过这种技术。Windows 作业对象允许我们控制 SQL Server\
  \ 引擎进程上的资源使用，以确保我们正确执行诸如内存之类的资源限制。\n\n\n##### 文件源资源管理器 (FSRM)\n\nFSRM 提供了一种机制，因此我们可以妥善实施超出\
  \ SQL Server 文件大小限制控制范围的存储上限。\n\n我们在一篇详细的博客文章中讨论了如何使用这些技术来实施资源限制以及我们为何使用它们：[`azure.microsoft.com/blog/resource-governance-in-azure-sql-database/`](https://azure.microsoft.com/blog/resource-governance-in-azure-sql-database/)。\n\
  \n### 连接并验证部署\n\n部署 Azure SQL 数据库后，您可能希望快速连接并验证部署的各个方面。\n\n#### 连接到 Azure SQL 数据库\n\
  \n在本章前面，我部署了我的逻辑服务器和 Azure SQL 数据库，允许通过公共终结点访问，并设置了选项以允许 Azure 服务访问，同时为我通过门户部署时所用的客户端\
  \ IP 地址添加了防火墙规则。我将向您展示如何使用这两种技术进行连接。\n\n由于我在部署数据库的逻辑服务器时使用了\"允许 Azure 服务和资源访问此服务器\"\
  选项，因此我可以使用 Azure 虚拟机，甚至使用 Azure Cloud Shell 中的 `sqlcmd` 来连接到此服务器和数据库。\n\n要使用 Azure\
  \ Cloud Shell 连接，您需要找到部署的逻辑服务器的名称。通过门户有很多方法可以做到这一点。您可以直接在门户主页查看您的资源组或资源，并找到服务器 `bwsqllogicalserver`（或您命名的服务器）。\n\
  \n图 4-32 显示了服务器的工作窗格，其中包含使用 SQL Server 工具或应用程序连接时应使用的服务器名称。\n\n![](img/496204_2_En_4_Fig32_HTML.jpg)\n\
  \n图 4-32\n查找要连接的服务器名称\n\n请注意，我点击了服务器名称旁边以将完全限定域名 (FQDN) 复制到剪贴板。您会发现 FQDN 是逻辑服务器名称和\
  \ `.database.windows.net` 的组合。\n\n注意\n\nAzure SQL 数据库还支持 DNS 别名的概念，您可以在 [`learn.microsoft.com/azure/azure-sql/database/dns-alias-overview`](https://learn.microsoft.com/azure/azure-sql/database/dns-alias-overview)\
  \ 阅读相关内容。\n\n我现在可以打开 Azure Cloud Shell（您可以使用门户主页或 [`shell.azure.com`](https://shell.azure.com)）。\n\
  \n由于 `sqlcmd` 已安装在云 shell 中，我可以使用类似于图 4-33 的语法。\n\n![](img/496204_2_En_4_Fig33_HTML.jpg)\n\
  \n图 4-33\n在 Azure Cloud Shell 中使用 `sqlcmd`\n\n我也可以在 Azure 中的虚拟机内使用 SSMS 等工具连接，但让我向您展示另一种方法。\n\
  \n我在使用 Azure 门户时，还为逻辑服务器配置了针对当时计算机 IP 地址的防火墙规则。在逻辑服务器的工作窗格中，我可以选择 **显示防火墙设置** 以查看以下信息。图\
  \ 4-34 显示了此防火墙设置以及其他网络选项。\n\n![](img/496204_2_En_4_Fig34_HTML.jpg)\n\n图 4-34\n为\
  \ Azure SQL 数据库配置防火墙规则\n\n防火墙规则与您在 Windows Server 或 Linux 中配置的防火墙规则非常相似。如果您以前使用过\
  \ SQL Server，您会知道默认情况下，我们不会在操作系统中为端口 1433 打开防火墙规则。上面的防火墙规则正在为这个特定 IP 地址打开对此逻辑服务器网关的访问权限。防火墙规则可以在逻辑服务器级别或数据库级别指定。您可以在\
  \ [`learn.microsoft.com/azure/azure-sql/database/firewall-configure`](https://learn.microsoft.com/azure/azure-sql/database/firewall-configure)\
  \ 阅读有关 Azure SQL 数据库防火墙规则的更多信息。我将在本书的第 6 章中更详细地讨论使用一种更安全的方法连接到 Azure SQL 数据库，称为\
  \ `专用链接`。\n\n由于我的客户端 IP 地址在防火墙规则中，因此我可以使用 SQL Server Management Studio 等工具从我的客户端笔记本电脑连接到逻辑服务器，如图\
  \ 4-35 所示。\n\n![](img/496204_2_En_4_Fig35_HTML.jpg)\n\n图 4-35\n使用 SSMS 连接到 Azure\
  \ SQL 数据库\n\n您可以看到这里我使用了 Microsoft Entra 身份验证，因为在部署逻辑服务器时，我已将我的 Microsoft Entra\
  \ 帐户添加为管理员。\n\n点击连接后，我得到了熟悉的对象资源管理器，展开数据库列表，我看到了本章中部署的所有数据库。我可以右键单击服务器，选择\"新建查询\"\
  ，并尝试将数据库上下文切换到我的一个数据库，如图 4-36 所示。\n\n![](img/496204_2_En_4_Fig36_HTML.jpg)\n\n图\
  \ 4-36\n尝试切换 Azure SQL 数据库的数据库上下文\n\n您可以首先看到对象资源管理器 (OE) 的一些差异，包括服务器名称的图标颜色（Azure\
  \ 蓝色）。另请注意，OE 中的选项没有 SQL Server 或托管实例那么多（因为这不是一个完整的 SQL Server 实例）。\n\n当我使用 SSMS\
  \ 指定无选项进行连接时，我被置于逻辑服务器的逻辑主数据库上下文中。我尝试使用熟悉的 T-SQL `USE` 语句更改数据库上下文，但失败了。为什么？\n\n\
  如果您考虑在 SQL Server 上使用 T-SQL `USE`，引擎会将上下文切换到存储在实例上的数据库。对于 Azure SQL 数据库逻辑服务器，数据库位于单独的\
  \ SQL Server 实例上，这些实例可以分布在 Azure 区域的不同区域中。`USE` 语句并非设计用于将连接重定向到不同的服务器。\n\n因此，对于\
  \ SSMS，您可以在点击\"连接\"按钮之前指定要连接到的数据库（使用\"选项\"按钮），或者使用下拉框切换数据库上下文（这确实会更改连接上下文）。\n\n\n\
  #### 验证部署\n\n虽然可以使用活动日志来验证数据库的部署，但没有直接的方法来查看 SQL Server 实例背后的 `ERRORLOG`。因此，可以使用一些\
  \ T-SQL 查询来检查部署情况。\n\n##### 注意\n\n尽管有些查询在逻辑主数据库的上下文中运行是有意义的，但我是在我的数据库 `bwsqldb`\
  \ 的上下文中运行这些查询的。\n\n```sql\nSELECT @@version;\n```\n```\nMicrosoft SQL Azure (RTM)\
  \ - 12.0.2000.8   Jun 19 2024 16:01:48   Copyright (C) 2022 Microsoft Corporation\n\
  ```\n\n这个结果与在 Azure SQL Managed Instance 中得到的结果完全相同，表明这是一个无版本的 SQL Server。\n\n```sql\n\
  SELECT database_id, name, compatibility_level FROM sys.databases;\n```\n```\ndatabase_id\
  \    name                compatibility_level\n1              master            \
  \  160\n5              bwsqldb             160\n6              bwsqldbserverless\
  \   160\n7              bwsqldb1            160\n8              bwsqldb2       \
  \     160\n9              sqldbiseasy         160\n```\n\n在用户数据库的上下文中，你总是会看到 `master`\
  \ 数据库和你自己的数据库。但请注意，这仍然是逻辑主数据库，而不是托管数据库的 SQL Server 实例上的物理主数据库。注意，对于 Azure SQL Database，我们已经默认使用\
  \ `dbcompat` 160（但你也可以根据需要改回旧的兼容级别）。\n\n```sql\nSELECT name, object_id, type_desc\
  \ FROM sys.objects;\n```\n\n由于这个数据库是基于示例 `AdventureWorksLT` 构建的，我从这个目录视图中得到了大约 233\
  \ 行数据，包括系统表。\n\n```sql\nSELECT * FROM sys.dm_os_schedulers;\n```\n\n这是我们能够暴露的一个\
  \ DMV，因为我们运行在一个专用的 SQL Server 实例上。我部署了一个 8-vCore 的 Hyperscale 数据库，正如我所预期的，我得到了八个\
  \ `ONLINE` 的调度器。\n\n##### 注意\n\n`sys.dm_os_sys_info` 是支持的，但 `sys.dm_os_process_memory`\
  \ 在 Azure SQL Database 中不支持。\n\n```sql\nSELECT * FROM sys.dm_exec_requests;\n```\n\
  \n这是世界上最常见的用于检查 SQL Server 上运行状态的 DMV 之一。我运行它只是为了确保所有正常的后台进程都在运行，包括 `LAZY WRITER`、`RECOVERY\
  \ WRITER`、`LOCK MONITOR` 等。\n\n这个 DMV 在 Azure SQL Database 上有一个有趣的转折点。它将显示你数据库所在实例的请求，而不是你逻辑服务器上其他数据库的请求（因为它们部署在其他实例上）。\n\
  \n```sql\nSELECT SERVERPROPERTY('EngineEdition');\n```\n\n根据 [`learn.microsoft.com/sql/t-sql/functions/serverproperty-transact-sql`](https://learn.microsoft.com/sql/t-sql/functions/serverproperty-transact-sql)\
  \ 的文档，值 5 表示 SQL Database。\n\n还有两个 Azure 特有的新 DMV，在 SQL Server 中找不到：\n\n```sql\n\
  SELECT * FROM sys.dm_user_db_resource_governance;\n```\n\n这个 DMV 的设计目的就是显示特定 Azure\
  \ SQL Database 的资源限制。你可以查看诸如内存、最大存储、日志速率等限制。你可以在 [`learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database)\
  \ 阅读关于这个 DMV 的文档。\n\n```sql\nSELECT * FROM sys.dm_os_job_object;\n```\n\n这是一个 Azure\
  \ 特有的 DMV，显示 Azure 使用 Windows 作业对象（Job Objects）施加给数据库的资源限制。我特别关注的列是 `memory_limit_mb`，它显示了数据库可以访问的真实内存量。我在“实现细节”一节中讨论过\
  \ Windows 作业对象。\n\n##### 注意\n\n我不建议你依赖在逻辑主数据库上下文中运行这些查询的任何结果。即使你可能看到结果，它们也没有任何意义，因为逻辑主数据库并不是一个真正的物理主数据库。\n\
  \n## 迁移到 Azure SQL Database\n\n迁移到 Azure SQL Database 涉及与迁移到托管实例相同的过程：评估与规划、迁移、应用更改和迁移后步骤。\n\
  \n虽然步骤相同，但你会发现几个重要的区别：\n\n*   首先也是最重要的，你无法将 SQL Server 备份还原到 Azure SQL Database，因此你所有的选择都会感觉像是一种“导出/导入”类型的体验。\n\
  \n*   Azure SQL Database 对功能有更多的限制，因此你可能会发现评估会找出更多需要在迁移前解决的问题。一个例子是像 `Service Broker`\
  \ 这样的功能，它在托管实例中支持，但在 Azure SQL Database 中不支持。让我给你一个简单的例子。当我第一次尝试将示例 `WideWorldImporters`\
  \ ([`github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0))\
  \ 迁移到 Azure SQL Database 时，我遇到了一堆问题，因为该示例中使用的某些功能在 Azure SQL Database 中不起作用。因此，我需要使用在\
  \ [`github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bacpac`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bacpac)\
  \ 找到的标准版 `WideWorldImporters`。\n\n*   迁移到 Azure SQL Database 需要先迁移你的架构（所有定义），然后是数据。你可以使用\
  \ Azure 数据库迁移服务（DMS）来完成此操作。在 [`learn.microsoft.com/data-migration/sql-server/database/database-migration-service`](https://learn.microsoft.com/data-migration/sql-server/database/database-migration-service)\
  \ 阅读更多关于如何执行此操作的信息。像托管实例一样，考虑使用与你当前 SQL Server 安装匹配的数据库兼容级别，然后再迁移到最新的 `dbcompat`\
  \ 级别。在 [`aka.ms/dbcompat`](https://aka.ms/dbcompat) 了解更多关于 `dbcompat` 的信息。\n\n \
  \   你还可以使用 SSIS 包、Azure 数据工厂、`bcp` 或 `BACPAC` 文件将数据加载到 Azure SQL Database 中。你应该知道，Azure\
  \ SQL Database 不支持批量导入的最小日志记录。\n\n*   由 Azure Arc 评估的 SQL Server ([`learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment`](https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment))\
  \ 以及 Azure Migrate 评估 ([`aka.ms/azuremigrate`](https://aka.ms/azuremigrate)) 可以帮助你查看你的数据库配置是否与迁移到\
  \ Azure SQL Database 兼容，或者是否需要考虑更改。我经常看到的一个常见例子是跨数据库查询，这在 Azure SQL Database 中是不支持的。\n\
  \n像托管实例一样，应用程序需要更改连接字符串，可能还需要更改身份验证方法。根据所使用的 T-SQL 功能和语言构造，可能需要进行进一步的应用程序更改。为了更彻底，请查阅这份关于\
  \ T-SQL 差异的文档：[`docs.microsoft.com/en-us/azure/azure-sql/database/transact-sql-tsql-differences-sql-server`](https://docs.microsoft.com/en-us/azure/azure-sql/database/transact-sql-tsql-differences-sql-server)。\n\
  \n使用本书的其余章节来指导你在迁移后需要进行的任何更改，以充分利用 Azure 中的安全、性能和可用性。\n\n## 总结\n\n在本章中，你学习了如何通过执行一次部署演练，来做出最佳选择以部署\
  \ Azure SQL 托管实例或数据库。你了解了托管实例和数据库两者的部署细节，以及一些有趣的实现细节。\n\n你学习了如何连接到托管实例和数据库部署并运行验证查询。你还学习了迁移技术和工具，用于将现有的\
  \ SQL Server 迁移到 Azure SQL 托管实例和数据库。\n\n针对 SQL 专业人员的云 workshop ([`https://aka.ms/cloudsqlworkshop`](https://aka.ms/cloudsqlworkshop))\
  \ 提供了一些很棒的实践实验，可用于尝试部署 Azure SQL 托管实例和 Azure SQL 数据库。试试这些以获得分步体验：\n\n[`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/05_Deploy_AzureSQLMI`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/05_Deploy_AzureSQLMI)\n\
  \n[`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB)\n\
  \n既然你已经完成了部署，可以在下一章中了解更多关于如何做出配置选择，并将这些选择与配置 SQL Server 实例或数据库进行比较的内容。\n\n"
- "# 5. 配置 Azure SQL\n\n既然你已经部署了 Azure SQL 托管实例或数据库，在进入生产环境之前或之后，可能还需要进行一些配置更改。\n\n\
  在本章中，我们将探讨 Azure SQL 托管实例和数据库的配置选项，并将其与 SQL Server 的配置选项进行比较。此外，我将讨论一些通常可以为 SQL\
  \ Server 做出但在 Azure SQL 中受到限制的配置选择及其原因。在本章最后，我还将花时间解释空间管理、加载数据的各种技术，以及为什么 Azure\
  \ SQL 被称为无版本。\n\n你可以尝试本章描述的一些方法。在讨论配置选择和限制时，我将使用本书第 4 章中已完成的现有部署。要尝试本章中我使用的任何技术或命令，你将需要：\n\
  \n*   一个 Azure 订阅。\n*   对该 Azure 订阅具有最低限度的参与者角色访问权限。你可以在 [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles)\
  \ 了解更多关于 Azure 内置角色的信息。\n*   访问 Azure 门户的权限。\n*   一个 Azure SQL 托管实例和一个 Azure SQL\
  \ 数据库的部署。\n*   安装 `az` CLI（更多详情参见 [`https://learn.microsoft.com/cli/azure/install-azure-cli`](https://learn.microsoft.com/cli/azure/install-azure-cli)）。你也可以使用\
  \ Azure Cloud Shell，因为其中已预装 `az`。你可以在 [`https://azure.microsoft.com/features/cloud-shell/`](https://azure.microsoft.com/features/cloud-shell/)\
  \ 了解更多关于 Azure Cloud Shell 的信息。\n*   本章将运行一些 T-SQL，因此请安装一个工具，如 SQL Server Management\
  \ Studio (SSMS)：[`https://aka.ms/ssms`](https://aka.ms/ssms)。\n\n## 配置 Azure SQL\
  \ 托管实例\n\n有几种选项可用于配置 SQL Server 的实例。让我们看看其中一些与配置 Azure SQL 托管实例的比较。\n\n### sp_configure\n\
  \n在实例级别配置 SQL Server 的一种方法是使用系统存储过程 `sp_configure`。此存储过程支持在 Azure SQL 托管实例中使用，但有以下例外：\n\
  \n*   任何需要重启服务器的配置值都不受支持（因为我们不提供重启实例的接口）。例如，如果尝试更改 `scan for startup procs` 配置选项，将会收到错误：\n\
  \n    ```\n    Msg 5869\n    对服务器配置选项 scan for startup procs 的更改在 SQL 数据库托管实例中不受支持。\n\
  \    ```\n\n*   高级配置值是受支持的。\n*   某些选项不受支持，因为我们不允许该级别的配置，或者通过资源限制以不同方式强制执行。例如，如果尝试更改\
  \ `max server memory` 值，会收到以下错误：\n\n    ```\n    Msg 5870\n    对服务器配置选项 max server\
  \ memory (MB) 的更改在此版本的 SQL Server 中不受支持。\n    ```\n\n### 跟踪标志\n\nAzure SQL 托管实例将一组预定的全局跟踪标志设置为\
  \ ON，你可以使用 `DBCC TRACESTATUS` 查看（截至本书撰写时，设置了大约 31 个跟踪标志）。\n\n我们设置的一些标志无法关闭，例如跟踪标志\
  \ 1800（用于磁盘扇区大小对齐），而有些则可以关闭和开启。要查看可以开启和关闭的跟踪标志列表，请参阅 [`https://learn.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-transact-sql?view=sql-server-ver15#remarks`](https://learn.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-transact-sql%3Fview%3Dsql-server-ver15%23remarks)。\n\
  \n不支持会话级别的跟踪标志。\n\n注意\n\n我们一直在努力消除对跟踪标志的需求，但显然有些仍然是必需的。像 `ALTER DATABASE SCOPED\
  \ CONFIGURATION` 这样的命令的引入，就是替代跟踪标志的配置方法的一个例子。\n\n### Tempdb\n\nTempdb 的大小上限可通过更改部署选项或大小进行配置。对于通用型部署，每个\
  \ vCore 分配 24GB，但最大限制约为 2TB。对于业务关键型部署，其大小受实例的最大存储大小限制。事务日志上限为 120GB，但由于默认启用了加速数据库恢复，并且我们会定期备份事务日志，因此我预计你不会遇到空间不足的问题。\n\
  \n你还可以在 Azure SQL 托管实例中配置 tempdb 的以下属性：\n\n*   tempdb 数据文件的数量（最多 128 个）。新实例默认部署有\
  \ 12 个数据文件和 1 个事务日志文件。\n*   数据文件和日志文件的自动增长增量（与 SQL Server 一样，所有数据文件的大小应相同）。\n* \
  \  可以更改 tempdb 文件的逻辑名称。\n\n虽然所有这些更改都是持久化的，但唯一的注意事项是所有文件的初始大小为 16MB。你可以更改文件的大小，但每次发生重启或故障转移时，初始大小将重置为\
  \ 16MB，因此不要依赖对文件大小的更改。\n\n### Master 和 Model\n\n与 SQL Server 类似，你可以配置 master 数据库的大小，甚至可以向其添加对象（尽管这在\
  \ SQL Server 上通常也不推荐）。\n\n同样的概念也适用于 model。你可以配置 model 数据库的大小，以便新数据库采用该大小。此外，你可以向\
  \ model 添加对象，这些对象将被新的用户数据库继承。\n\n### 配置版本\n\n你可以使用 SQL Server 安装程序（或在 Linux 上使用\
  \ `mssql-conf`）来更改 SQL Server 的版本（例如，从标准版到企业版）。\n\n对于 Azure SQL 托管实例，你可以使用 Azure\
  \ 门户或 CLI 接口（如 `az sql mi update` 或 PowerShell `Set-AzSqlInstance`）来更改部署服务层级（通用型或业务关键型）或大小（vCore\
  \ 数或最大存储）。\n\n注意\n\n正如我在本书前面所提到的，部署或更改托管实例的部署可能是一个耗时的操作。\n\n### 计算与存储\n\n你在本书的第\
  \ 4 章中，已经了解了根据所选服务层级而异的各种计算和存储选项。\n\n请记住，对于`托管实例`，对`vCores`、硬件配置和/或最大存储的更改，可能会导致一个需要一些时间才能完成的管理操作。例如，为`通用型`服务层级扩展存储最快可能只需五分钟。然而，为任何服务层级扩展`vCores`都可能需要一个小时。此外，许多影响`业务关键型`服务层级的操作，可能需要将数据库重新分配到另一个节点。由于任何更改在“切换”完成前都不会影响你的应用程序，因此停机时间是最少的。请记住，`通用型`服务层级的`下一代`版本包含了将`IOPS`与计算和存储分开配置的能力。\n\
  \n所有操作及其预期时长的完整列表可在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview)\
  \ 找到。\n\n## 网络配置\n\n一旦你部署了`托管实例`，你可能需要对该实例的网络配置进行一些调整。\n\n你可以选择`将托管实例移动到另一个子网`，这可以在当前虚拟网络内进行，也可以移动到不同的虚拟网络。你可以将此过程想象成：使用你的实例和所有已移动的数据库来预配一个新的虚拟集群，然后移除现有的集群。与其他管理操作一样，这可能是一个漫长的过程，但你的停机时间是最少的。所有详细信息请参阅\
  \ [`https://learn.microsoft.com/azure/azure-sql/managed-instance/vnet-subnet-move-instance`](https://learn.microsoft.com/azure/azure-sql/managed-instance/vnet-subnet-move-instance)。\n\
  \n你可以`启用公共端点`（我在部署时将其保持为禁用状态）并`将连接类型`更改为`代理`（这是默认设置，但我在部署时选择了`重定向`）。\n\n此外，部署期间还提供了另一个选项，即`最低\
  \ TLS 版本`。传输层安全协议 (`TLS`) 是一种用于加密连接的协议，受到 `SQL Server` 和 Azure SQL 的支持。`TLS 1.2`\
  \ 是目前推荐的最低支持版本，因为它修复了早期版本中发现的一些漏洞。但是，请谨慎使用此设置，因为它可能会导致使用不支持该 `TLS` 版本驱动程序的应用程序无法连接。你可以在\
  \ [`https://learn.microsoft.com/azure/azure-sql/database/connectivity-settings?view=azuresql&tabs=azure-portal#minimum-tls-version`](https://learn.microsoft.com/azure/azure-sql/database/connectivity-settings%253Fview%253Dazuresql%2526tabs%253Dazure-portal%2523minimum-tls-version)\
  \ 阅读更多关于最低 `TLS` 版本的信息。\n\n`托管实例`的网络选项也可以使用 `az sql mi update` 和 PowerShell 命令 `Set-AzSqlInstance`\
  \ 进行配置。\n\n我将在本书的第 6 章讨论添加专用端点连接的功能。\n\n### 维护\n\n你可以使用`“设置和维护更新”`选项来配置维护窗口、设置维护活动的警报以及控制更新策略。\n\
  \n正如我在本书第 4 章中所描述的，Azure SQL `托管实例`支持`维护窗口`。这允许你为已部署实例的计划维护定义一个不同的时间段。你可以选择不同的日期范围和时间段，而不是默认设置（即每周任何一天的下午\
  \ 5 点到早上 8 点）。\n\n此外，你可以设置`警报`，以便在需要进行计划维护活动时提前通知你。\n\n最后，你可以配置我在本书第 4 章中描述过的`更新策略`。这使你可以保持与\
  \ `SQL Server 2022` 的兼容性（允许你将备份恢复到 `SQL Server 2022` 并设置在线灾难恢复），或者选择“始终保持最新”选项，该选项是用于持续更新的无版本引擎。\n\
  \n无论配置的更新策略如何，所有实例都将继续接收那些不需要更改 `SQL` 引擎的更新和功能，例如以下功能：区域冗余、实例启停和快速预配。\n\n重要提示\n\n\
  如果你选择了`始终保持最新`策略，则无法回退到 `SQL Server 2022` 策略。\n\n### 启动和停止\n\n自本书第一版以来，Azure SQL\
  \ `托管实例`团队构建的一个很酷的功能就是能够启动和停止实例，包括按计划进行。\n\n你可以在 Azure 门户中按图 5-1 所示的方式进行配置。\n\n\
  ![](img/496204_2_En_5_Fig1_HTML.jpg)\n\n图 5-1\n\n启动和停止 Azure SQL 托管实例\n\n此功能可以节省大量成本，因为当实例停止时，你无需为计算资源付费（但仍需支付存储费用）。但是，启动一个已停止的实例可能需要长达\
  \ 20 分钟。\n\n### 配置数据库\n\n部署 Azure SQL 托管实例后，您现在可以通过 Azure 门户、SSMS 等工具或 T-SQL `CREATE\
  \ DATABASE` 或 `ALTER DATABASE` 语句来添加数据库或配置现有数据库。\n\n`CREATE DATABASE` T-SQL 语法非常简单，因为您无需指定文件或任何\
  \ `WITH` 选项。例如，对于我部署的托管实例，我可以运行以下 T-SQL 语句来创建一个新数据库：\n\n```sql\nCREATE DATABASE\
  \ gocowboys;\n```\n\n新数据库将继承 `model` 数据库的属性，就像 SQL Server 一样。其中一个区别是，我们会自动创建一个名为\
  \ `XTP` 的内存优化文件组，如果您查询 `sys.filesgroups` 目录视图，就可以看到它。即使您使用的是不支持内存 OLTP 的常规用途服务层级，我们也会创建\
  \ `XTP` 文件组。这使得如果您未来升级到业务关键层级，支持此功能会更加容易。\n\n该数据库也将继承由 `model` 设置的属性，与 SQL Server\
  \ 类似，但有两个默认开启的关键选项例外：`查询存储` 和 `加速数据库恢复`。\n\n数据库创建后，您可以使用 `ALTER DATABASE` 语句对选项进行各种更改，或添加/删除文件和文件组。我们在\
  \ T-SQL 文档中做的一件很棒的事情是，允许您选择一个产品来查看像 `ALTER DATABASE` 这类语句的确切语法支持。图 5-2 显示了在选择了托管实例后，`ALTER\
  \ DATABASE` 的文档参考（位于 [`https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql?view=azuresqldb-mi-current`](https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql?view=azuresqldb-mi-current)）：\n\
  \n![图 5-2](img/496204_2_En_5_Fig2_HTML.jpg)\n\n您通常在 SQL Server 中看到的大多数 `SET` 选项在托管实例中也可用。一个值得注意的例外是\
  \ `ACCELERATED_DATABASE_RECOVERY`。我们默认为您的数据库开启此选项，并且不允许您禁用它。为什么呢？为了满足 SLA 要求并确保您不会遇到事务日志空间耗尽的问题，保持此选项开启对我们来说非常重要。\n\
  \n自本书第一版以来，托管实例最显著的进步之一是允许每个实例包含 500 个数据库。\n\n数据库的一个关键选项是数据库兼容性级别，托管实例支持使用 `ALTER\
  \ DATABASE` 设置 `dbcompat`。目前托管实例数据库支持 `90` 到 `160` 的兼容级别。有关 `dbcompat` 的更多信息，请参阅\
  \ [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat)。\n\n**注意**\n\n如果您从现有的 SQL\
  \ Server 数据库或托管实例还原备份，我们将保留该数据库备份时的 `dbcompat` 级别。\n\n尽管您无需担心物理文件放置，但您确实有能力添加数据库文件并在达到最大实例存储限制之前更改文件大小。您还可以创建文件组。您可能希望增加文件数量或大小的一个很好例子是为了提高\
  \ I/O 性能。我的同事 Jovan Popovic 在一篇非常棒的博客文章中描述了如何执行此操作：[`https://medium.com/azure-sqldb-managed-instance/increasing-data-files-might-improve-performance-on-general-purpose-managed-instance-tier-6e90bad2ae4b`](https://medium.com/azure-sqldb-managed-instance/increasing-data-files-might-improve-performance-on-general-purpose-managed-instance-tier-6e90bad2ae4b)。\n\
  \n话虽如此，新一代 Azure SQL 托管实例不再需要您使用多个文件来提高 I/O 性能，因为您可以单独控制 IOPS。新一代实例还能提供更低的 I/O 延迟、更高的\
  \ IOPS 和更好的 I/O 吞吐量。请查看此博文了解更多信息：[`https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-azure-sql-managed-instance-next-gen-gp/ba-p/4092647`](https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-azure-sql-managed-instance-next-gen-gp/ba-p/4092647)。\n\
  \n**注意**\n\nSQL Server Management Studio (SSMS) 也支持像操作 SQL Server 一样更改数据库选项和文件选项。\n\
  \n同样重要的是要知道，Azure SQL 托管实例支持 `ALTER DATABASE SCOPED CONFIGURATION` T-SQL 语句，就像 SQL\
  \ Server 一样。您可以在此处阅读更多信息：[`https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql)。\n\
  \n## 配置 Azure SQL 数据库\n\n由于部署 Azure SQL 数据库实际上就是创建一个数据库，您可能希望在部署时就配置一些关于数据库的设置。您可能还希望对与数据库关联的逻辑服务器执行一些配置，包括在该逻辑服务器上创建新数据库。\n\
  \n\n"
- "# Azure SQL 数据库管理\n\n## 创建新数据库\n\n在连接到逻辑服务器时（任何数据库上下文中），支持 T-SQL 的 `CREATE DATABASE`\
  \ 语句。你可以在 [`https://learn.microsoft.com/sql/t-sql/statements/create-database-transact-sql?view=azuresqldb-current`](https://learn.microsoft.com/sql/t-sql/statements/create-database-transact-sql?view=azuresqldb-current)\
  \ 查看 Azure SQL 数据库 `CREATE DATABASE` 的完整语法。\n\n上方的文档参考展示了 `EDITION` 和 `SERVICE_OBJECTIVE`\
  \ 可使用的所有可能选项。在此，`EDITION` 用于决定是 DTU 模型、通用型、业务关键型还是超大规模。`SERVICE_OBJECTIVE` 用于选择诸如无服务器、硬件代系和\
  \ vCore 数量等选项。\n\n**注意**\n\n请记住，使用 `CREATE DATABASE` 为 Azure SQL 数据库创建数据库是一个部署过程。对于\
  \ SQL Server，我们是创建新文件并向 master 数据库添加元数据。而对于 Azure SQL 数据库，我们是在构建一个新的部署（即数据库的专用实例）来托管数据库，并将信息存储在我们的控制平面中（例如，网关）。这意味着\
  \ `CREATE DATABASE` 是一个异步操作，但可以通过 DMV `sys.dm_operation_status` 进行跟踪。你必须从逻辑 master\
  \ 查询此 DMV，并且我们保留一小时的历史记录。\n\n你会注意到，在创建新数据库时只有两个选项：排序规则和部署选项。部署选项允许你选择购买模型、服务层、计算模型和大小。\n\
  \n如果你还记得，在第 4 章中，我使用不同的部署选项部署了多个数据库。连接到第 4 章示例中使用的逻辑服务器 `bwsqllogicalserver`，我可以使用以下\
  \ T-SQL 语法创建一个新的超大规模、8 vCore 数据库：\n\n```sql\nCREATE DATABASE bwhyperscale\n(EDITION\
  \ = 'Hyperscale', SERVICE_OBJECTIVE = 'HS_Gen5_8');\n```\n\n请记住这是一个部署过程，因此可能比你习惯的\
  \ SQL Server 数据库创建时间更长。在此示例中，此 T-SQL 语句完成大约需要四分钟。并且请注意，由于我们使用的是超大规模，因此无需指定最大存储选项。\n\
  \nAzure SQL 数据库的 `CREATE DATABASE` 语句还支持 `AS COPY OF` 选项，以创建一个数据库作为另一个数据库的副本，甚至可以来自另一个逻辑服务器。\n\
  \n创建的任何数据库都默认开启以下选项：\n*   `SNAPSHOT_ISOLATION_STATE`\n*   `READ_COMMITTED_SNAPSHOT`\n\
  *   `AUTO_CREATE_STATISTICS`\n*   `AUTO_UPDATE_STATISTICS`\n*   `FULL RECOVERY`\n\
  *   `CHECKSUM`\n*   `TDE`\n*   `QUERY_STORE`\n*   `ACCELERATED_DATABASE_RECOVERY`\n\
  \n如果你检查 `sys.databases`，可能会注意到一个已启用的选项是*过时页面检测*。过时页面检测帮助 Azure SQL 数据库查找因基础架构 I/O\
  \ 问题可能导致的数据完整性问题。我将在本书第 8 章中讨论更多 Azure SQL 提供的数据完整性检查。\n\n## 修改数据库\n\n对于创建的任何数据库，你可以使用\
  \ T-SQL `ALTER DATABASE` 语句来修改某些 `SET` 选项。你可以使用此文档参考 [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options?view=azuresqldb-current`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options?view=azuresqldb-current)\
  \ 查看可以开启和关闭的选项。你无法更改此数据库背后文件的任何属性。要更改数据库的最大大小，你可以使用 `MAXSIZE` 参数。你还可以使用 `ALTER DATABASE`\
  \ 或 Azure 门户更改 `EDITION` 或 `SERVICE_OBJECTIVE`。任何 `ALTER DATABASE` 的执行也是异步的，可以通过\
  \ `sys.dm_operation_status` 跟踪。\n\n数据库的一个关键选项是*数据库兼容性级别*，Azure SQL 数据库支持使用 `ALTER\
  \ DATABASE` 设置“dbcompat”。目前 Azure SQL 数据库支持从 90 到 160 的兼容级别。在 [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat)\
  \ 阅读更多关于 dbcompat 的信息。\n\n同样重要的是要了解，与 SQL Server 一样，Azure SQL 数据库也支持 `ALTER DATABASE\
  \ SCOPED CONFIGURATION` T-SQL 语句。这是一个非常重要的选项，用于控制各种方法以调节数据库行为。你可以在 [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql)\
  \ 阅读更多内容。\n\n`az sql db` CLI 也支持更改数据库部署选项的能力，如文档 [`https://learn.microsoft.com/cli/azure/sql/db?view=azure-cli-latest#az-sql-db-update`](https://learn.microsoft.com/cli/azure/sql/db?view=azure-cli-latest#az-sql-db-update)\
  \ 所述。PowerShell 也提供了 `Set-AzSQLDatabase`，其文档位于 [`https://learn.microsoft.com/powershell/module/az.sql/set-azsqldatabase`](https://learn.microsoft.com/powershell/module/az.sql/set-azsqldatabase)。\n\
  \nAzure 门户支持通过服务菜单、命令栏和工作窗格更改有关数据库部署的几个选项。\n\n## 网络配置\n\n当我们在本书第 4 章部署 Azure SQL\
  \ 数据库时，我们能够为逻辑服务器指定一些网络选项，包括公共终结点访问、允许 Azure 服务、连接类型和防火墙规则。这里的关键词是逻辑服务器。尽管从技术上讲你可以在数据库级别设置防火墙规则，但你的大多数网络配置都发生在逻辑服务器上下文中。\n\
  \n正如你从图 5-3 所见，对于现有的逻辑服务器，你可以配置公共访问、专用访问和连接性的设置。\n\n![](img/496204_2_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3**\n配置逻辑服务器的网络\n\n**公共访问** 允许你配置虚拟网络和防火墙设置。\n\n我们将在本书第 6 章中更详细地介绍**专用访问**，包括专用终结点。\n\
  \n**连接性** 允许你更改出站连接、连接类型和 TLS 等设置。\n\n**出站连接** 允许你为服务器到其他源（如 Azure 存储或其他逻辑服务器）的任何连接创建防火墙规则。受此选项影响的功能包括审核、`OPENROWSET`\
  \ 和 REST API（你将在本书第 10 章中了解更多）。\n\n连接策略类似于托管实例的连接类型：代理或重定向。请注意，对于 Azure SQL 数据库，这里可以选择默认值。默认使用一种策略：如果连接源自\
  \ Azure 外部则使用代理连接类型，如果连接在 Azure 内部则使用重定向。\n\n重定向连接策略可以显著降低应用程序延迟，因为网关用于将流量重定向到 Azure\
  \ SQL 数据库的直接节点。我的同事 Anna Hoffman 有一个很好的示例，展示了重定向比代理快多少：[`https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/02-DeployAndConfigure`](https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/02-DeployAndConfigure)。\n\
  \n最低 TLS 版本与本章前面为托管实例描述的 TLS 要求完全相同。\n\n\n### 配置无服务器\n\n我在本书第 4 章向你们展示了部署无服务器 Azure\
  \ SQL 数据库的概念。图 5-4 展示了一个通用型无服务器数据库的 vCore 配置选项。\n\n![](img/496204_2_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4 配置无服务器数据库\n\n从这些选项中你可以看到，你可以控制一个 vCore 范围，包括最小值和最大值。最小值可以低至 0.5，最大值可达 80。你将按每秒使用的\
  \ vCore 付费（有最低 vCore 设置的最低费用）。对于通用型服务层级，你还可以选择自动暂停。如果我们检测到你对数据库的使用处于空闲状态，我们可以暂停你的计算，在空闲时间你将不会为任何计算付费（仅需支付存储费用）。然后，当你再次连接到数据库时，我们会将你的数据库附加到一个新的\
  \ SQL Server 实例并将其启动。\n\n### 配置弹性池\n\n我在本书第 4 章向你们展示了如何在弹性池中部署数据库。你可以像配置数据库一样配置弹性池，*在池级别*，包括设置\
  \ vCore、存储和冗余。\n\n弹性池的承诺之一是在多个数据库之间共享资源，因此你不必担心跨它们管理最小和最大资源。然而，你可能希望确保在池内没有哪个数据库试图占用过多资源。\n\
  \n图 5-5 展示了你如何为池中的每个数据库配置最小和最大 vCore。\n\n![](img/496204_2_En_5_Fig5_HTML.jpg)\n\n\
  图 5-5 为弹性池配置每个数据库的资源\n\n## 配置限制\n\n虽然有几种选项可以配置 Azure SQL 托管实例和数据库，但我认为重要的是指出一些你可以在\
  \ SQL Server 实例和数据库级别进行但在 Azure SQL 中*受到限制*的配置选项。在可能的情况下，我会说明为什么某些选项在 PaaS 环境中受到限制或不需要。\n\
  \n### Azure SQL 托管实例限制\n\n许多 SQL Server 级别的配置选项是使用 SQL Server 配置管理器（Windows）或 `mssql-conf`（Linux）、T-SQL\
  \ 或 SSMS 等工具完成的。由于我使用 SQL Server 已有多年，我认为让你了解这些工具和接口中存在哪些选项以及为什么它们对 Azure SQL 托管实例和数据库是受限的会很有趣。\n\
  \n#### 启动和停止服务\n\n你可以停止和启动托管 SQL 实例，但无法对 Azure SQL 数据库执行此操作（请记住，无服务器数据库确实具有自动暂停功能）。\n\
  \n> **注意**\n>\n> 你将在本书第 8 章学习如何使用 PowerShell 命令 `Invoke-AzSqlDatabaseFailover` 手动故障转移\
  \ Azure SQL 数据库。\n\n#### 即时文件初始化\n\n没有用于启用即时文件初始化（IFI）的接口，你可以在 [`https://learn.microsoft.com/sql/relational-databases/databases/database-instant-file-initialization`](https://learn.microsoft.com/sql/relational-databases/databases/database-instant-file-initialization)\
  \ 阅读相关信息。然而，我认为这不是一个主要因素，有两个重要原因：\n\n*   当数据库启用了透明数据加密（TDE）时，不支持或不使用 IFI。TDE 在 Azure\
  \ SQL 托管实例和数据库的数据库中默认启用。\n*   我对“自动增长”场景进行了一些测试，从未引起任何重大的性能瓶颈。\n\n#### 锁定页面\n\n\
  没有像 SQL Server 那样的接口来启用锁定页面（或大页面）。但是，我们可能会在某些部署中选择启用此功能。关键是你不必为此担心。如果需要使用此设置，我们将控制操作系统和此设置的内存。\n\
  \n#### FILESTREAM 和可用性组\n\nSQL Server 配置管理器允许你启用 FILESTREAM 和 Always On 可用性组功能。Azure\
  \ SQL 不支持 FILESTREAM。Always On 可用性组（AG）在商业关键服务层级的幕后使用，但你无法自行设置或配置 AG。\n\n#### 服务器排序规则\n\
  \n你可以在部署托管实例期间设置 SQL Server 实例的排序规则，但之后无法更改它。你仍然可以像 SQL Server 一样为数据库或表中的列设置排序规则。\n\
  \nAzure SQL 数据库允许你在部署期间指定数据库排序规则，但之后无法更改它。你也可以在列级别定义排序规则。\n\n#### 启动参数\n\nSQL Server\
  \ 配置管理器允许你为 SQL Server 引擎设置某些启动参数，如 [`https://learn.microsoft.com/sql/database-engine/configure-windows/database-engine-service-startup-options`](https://learn.microsoft.com/sql/database-engine/configure-windows/database-engine-service-startup-options)\
  \ 所述。这些选项均未暴露给 Azure SQL 进行修改。根据我的经验，大多数这些选项用于某些“边缘”场景，你不需要或无法使用（例如以单用户模式启动 SQL\
  \ Server）。尽管如此，正如我在本章前面提到的，你可以为 Azure SQL 托管实例设置一些跟踪标志。\n\n#### ERRORLOG 配置\n\n\
  SSMS 允许你配置 ERRORLOG 文件的数量和最大大小。这些选项不受支持用于配置 Azure SQL 托管实例，因为它需要重启实例。此外，虽然拥有超过默认六个\
  \ ERRORLOG 文件可能很好，但 ERRORLOG 最大值通常用于控制磁盘空间，这对于托管实例来说不是问题。\n\n> **注意**\n>\n> 系统过程\
  \ `sp_cycle_errorlog` 在托管实例上受支持。但是，ERRORLOG 文件存储在本地节点上，因此在故障转移时不会保存。\n\n#### 错误报告和客户反馈\n\
  \nSQL Server 提供了一种配置错误报告和客户反馈的方法，如 [`https://learn.microsoft.com/sql/sql-server/usage-and-diagnostic-data-configuration-for-sql-server`](https://learn.microsoft.com/sql/sql-server/usage-and-diagnostic-data-configuration-for-sql-server)\
  \ 所述。此配置对于 Azure SQL 是不可能的，但也不适用。\n\n> **注意**\n>\n> 我们确实使用遥测技术来改进 Azure SQL。请查看这篇传奇人物\
  \ Conor Cunningham 更详细解释的文章：[`https://redmondmag.com/articles/2018/02/14/qa-lead-sql-architect-part-1.aspx`](https://redmondmag.com/articles/2018/02/14/qa-lead-sql-architect-part-1.aspx)。\n\
  >\n> 如果你对 Microsoft 收集或使用有关你部署的任何信息有任何疑虑，我建议你仔细阅读 [`https://azure.microsoft.com/support/legal/`](https://azure.microsoft.com/support/legal/)\
  \ 上的隐私和其他法律文件。\n\n#### ALTER SERVER CONFIGURATION\n\n`ALTER SERVER CONFIGURATION`\
  \ 是在 SQL Server 几个版本前引入的，作为一种与 `sp_configure` 不同的新配置实例方式。\n\n`ALTER SERVER CONFIGURATION`\
  \ 不支持用于 Azure SQL，但没有适合为 Azure SQL 实例配置的选项，因为大多数这些选项是自动完成或不适用的。\n\n\n### “混合模式”安全\n\
  \nAzure SQL 托管实例和数据库都支持与 SQL Server 中“混合模式”安全类似的概念。你可以将实例或数据库的身份验证设置为：\n\n*   仅限\
  \ Microsoft Entra 身份验证\n*   同时支持 SQL 和 Microsoft Entra 身份验证\n*   仅限 SQL 身份验证\n\n\
  关于这些选项的几点说明：\n\n*   如果你已经允许 SQL 身份验证，然后更改为仅限 Microsoft Entra 身份验证，现有的 SQL 登录名不会被删除，只是会被禁用。\n\
  *   Azure SQL 托管实例确实支持 Windows 身份验证，以帮助提高应用程序兼容性。\n\n### 登录审核\n\n多年来，SQL Server\
  \ 引擎一直支持跟踪成功、失败或两者（或均不跟踪）的登录尝试。此跟踪信息会写入 ERRORLOG，通常通过 SSMS 进行配置。对于托管实例，虽然存在配置此登录跟踪的选项，但它们不会生效，因为它需要重启\
  \ SQL Server。默认情况下，失败的登录会被跟踪并记录在 ERRORLOG 中。\n\n你可以使用扩展事件或 Azure SQL 的 SQL 审核功能自行审核登录情况。我将在本书第\
  \ 6 章中向你详细介绍 Azure SQL 的审核功能。\n\n### 服务器代理帐户\n\nSSMS 支持为系统存储过程 `xp_cmdshell` 配置服务器代理帐户。此配置对于托管实例不受支持，因为\
  \ `xp_cmdshell` 在 Azure SQL 托管实例或数据库中不受支持。\n\n### 数据库限制\n\n与 SQL Server 类似，许多通过\
  \ `ALTER DATABASE` 配置数据库的常用选项在托管实例上是允许的。一个显著的例外是，你无法禁用 `ACCELERATE_DATABASE_RECOVERY`（加速数据库恢复）。这是因为我们依赖\
  \ ADR 技术来确保兑现所承诺的可用性 SLA。\n\n### Azure SQL 数据库限制\n\n上一节列出的托管实例的所有限制同样适用于 Azure SQL\
  \ 数据库。\n\n其他一些值得注意的限制你可能已经猜到，因为 Azure SQL Database 并未暴露完整的 SQL Server 实例：\n\n* \
  \  `sp_configure` 不受支持。\n*   `DBCC TRACEON` 不受支持。事实上，如果你运行此命令，它会因 Msg 2571（即无权限）而失败。\n\
  *   你可以使用 `DBCC TRACESTATUS` 查看我们启用了哪些跟踪标志，即使你无法开启或关闭它们（启用的标志列表与托管实例基本相同）。\n\n`ACCELERATED_DATABASE_RECOVERY`\
  \ 默认也是启用的，并且无法禁用。查询存储的情况也类似，但你可以禁用查询存储写入数据，使其变为只读。\n\n## Azure SQL 空间管理\n\n另一个与\
  \ Azure SQL 配置相关的话题是空间管理。虽然我们为 Azure SQL 托管实例和数据库都抽象了数据库和事务日志文件的物理放置位置，但*大小*仍然是你必须管理和考虑的一个因素。由于\
  \ Azure SQL 托管实例和数据库提供不同的部署覆盖范围，空间管理在这两种选项之间可能有所不同。\n\n### Azure SQL 托管实例空间管理\n\n\
  正如我在第 4 章关于部署的描述中所说，托管实例的数据最大大小是所有数据库存储的总大小。你对 vCore 的选择以及“业务关键型”等选项会影响实例的最大存储大小。\n\
  \n在 SQL Server 中，当数据库文件大小达到限制时，你可能会遇到 Msg 1105，表明空间已用尽。如果你托管数据库的文件系统磁盘空间用尽，也可能发生此错误。对于托管实例，如果你的数据库大小达到了其最大值限制，也可能会遇到\
  \ Msg 1105。然而，由于我们对所有数据库强制执行最大存储限制，你也可能在数据库空间用尽之前遇到类似以下的错误：\n\n```\nMsg 1133\n托管实例已达到其存储限制。托管实例的存储使用量不能超过\
  \ (%d) MB。\n```\n\n需要明确的是，这种情况意味着，在达到单个数据库的最大大小之前，你就可能遇到此错误，因为所有数据库（包括系统数据库）的总量已达到限制。\n\
  \n### Azure SQL 数据库空间管理\n\nAzure SQL 数据库管理空间的方式与托管实例不同。部署时指定的最大大小是单个数据库文件的*可能*最大大小。\n\
  \n如果你部署一个 Azure SQL 数据库，最大大小通常反映在单个数据文件的 `sys.database_files` 表的 `max_size` 列中。但是，对于较大的最大数据库大小值（例如\
  \ 1TB），我们可能不会将 `max_size` 设置为该值，而是随着数据添加逐渐增长到最终的 `max_size`。\n\n如果你的数据库空间用尽，你将获得配额错误，而不是传统的\
  \ 1105 错误，如下所示：\n\n```\nMsg 40544, Level 17, State 2, Line 12\n数据库 '' 已达到其大小配额。请分区或删除数据、删除索引，或查阅文档以获取可能的解决方案。\n\
  ```\n\n事务日志的处理方式不同。虽然你配置了最大数据存储大小，但我们自动为此大小额外增加 30% 用于事务日志。请注意，在某些情况下我们可以增加这个数字，但你永远不会被收取超过日志\
  \ 30% 额外空间的费用。不要使用 `sys.database_files` 中的 `max_size` 作为事务日志的最大大小。它不能准确反映配额。在我所有的测试中，我从未用完事务日志空间，原因有二：\n\
  \n*   我们定期且频繁地备份事务日志（记住我们使用完整恢复模式）。\n*   我们默认启用了加速数据库恢复 (ADR)，并且你无法禁用它。借助 ADR，即使存在活动事务，日志也可以被截断。\n\
  \nAzure SQL 数据库空间管理的一个例外是超大规模服务层级。超大规模数据库有 100TB 的限制，但从理论上讲，我们认为它可以是无限的。当你部署超大规模数据库时，我们会创建多个总大小约为\
  \ 40GB 的数据库文件。然后，随着你添加数据，我们会自动增长数据库。事务日志的限制是 1TB，但我们定期备份日志并且也依赖 ADR，因此我认为你不会用完空间。\n\
  \n## 加载数据\n\n无论你是部署了新的托管实例或数据库，还是从现有实例或数据库迁移过来，你都不可避免地需要加载数据。就像 SQL Server 安装一样，你有几种工具和选项可以加载数据。此外，你在\
  \ Azure 中还有可用的新服务。\n\n\n\n### 请牢记这些要点\n\n就像 SQL Server 一样，在导入大量数据时，你可能需要 `额外的资源`。对于\
  \ Azure SQL 托管实例或数据库，请牢记导入数据可能需要额外的 vCore 或空间要求。我已经描述过托管实例的扩展可能需要多长时间，因此在部署时请记住这一点。\n\
  \n有几种数据加载技术涉及加载 `文件`。虽然你始终可以使用这些技术从本地环境加载文件，但在 Azure 基础设施中运行的任何工具或命令都应使用 Azure 存储或\
  \ Azure 文件来完成。你的部分数据可能不是 `原生云` 数据，因此请考虑使用 `AzCopy` 之类的工具将文件加载到 Azure 存储或 Azure 文件中。你可以在\
  \ [`https://learn.microsoft.com/azure/storage/common/storage-use-azcopy-files`](https://learn.microsoft.com/azure/storage/common/storage-use-azcopy-files)\
  \ 了解更多关于 AzCopy 的信息。如果你的文件非常大，请查看我们关于指导和工具的文档：[`https://learn.microsoft.com/azure/storage/common/storage-solution-large-dataset-moderate-high-network`](https://learn.microsoft.com/azure/storage/common/storage-solution-large-dataset-moderate-high-network)。\n\
  \n我在书中已经提到，Azure SQL 托管实例和数据库都使用 `FULL`（完整）恢复模型，并且无法更改（我们需要这样做以满足 SLA 要求）。这意味着对于批量操作，`不支持最小化日志记录`（`tempdb`\
  \ 除外）。因此，你应该确保使用某些技术，例如 `批处理大小`。批量导入的一个批次是一个定义的事务单位。批处理大小为 10,000 意味着一个事务导入 10,000\
  \ 行。通常，使用较大的批处理大小可以提高批量性能，并且应该用于 Azure SQL。但是，你还应记住，如果使用的批处理大小过大，可能会受到 `日志速率调控`\
  \ 的限制。你可以在 [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance)\
  \ 了解更多关于日志速率调控的信息。如果你的数据目标是列存储，你应该考虑直接导入到聚集列存储索引中。你可以在 [`https://learn.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-data-loading-guidance`](https://learn.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-data-loading-guidance)\
  \ 了解更多关于列存储的数据加载指南。\n\nAzure 会对某些类型的网络流量收费，称为 `入站` 和 `出站`。任何入站流量（例如，从本地环境批量导入数据到\
  \ Azure）都是免费的。\n\n如果出站流量在 Azure 区域之间传输，则可能产生费用。如果你使用 Azure 虚拟机或 Azure 数据工厂服务从一个区域进行批量导入，而目标\
  \ Azure SQL 数据库在另一个区域，则可能会产生出站网络费用。你可以在 [`https://azure.microsoft.com/pricing/details/bandwidth`](https://azure.microsoft.com/pricing/details/bandwidth)\
  \ 了解更多信息。\n\n### bcp\n\n批量复制程序 (`bcp`) 可能是 SQL Server 历史上最传统、最流行的数据导出和导入工具。`bcp`\
  \ 程序可在 Windows、Linux 和 MacOS 计算机上运行。你可以在 [`https://learn.microsoft.com/en-us/sql/tools/bcp-utility`](https://learn.microsoft.com/en-us/sql/tools/bcp-utility)\
  \ 获取有关 `bcp` 的所有最新信息。\n\n由于 `bcp` 是一个读取文件并将数据 `批量导入` 到 SQL Server 或 Azure SQL 的程序，因此你必须在可以访问该文件并能连接到\
  \ Azure SQL 的计算机上运行 `bcp` 程序。这可能是本地计算机或 Azure 虚拟机。在任何这些场景中，你都可以针对托管在你的本地环境、Azure\
  \ 虚拟机本地存储（可能是 Azure 存储中的数据磁盘）或 Azure 存储中的文件使用 `bcp`。由于 `bcp` 不支持直接访问 Azure 存储的路径（即\
  \ URL），因此你可以使用 Azure 文件。\n\n另一个选项是从 Azure Cloud Shell 使用 `bcp`。Azure Cloud Shell\
  \ 中的 `bcp` 在 Azure 基础设施中运行（可以将其想象成在一个临时的 VM 中运行），因此只要你正确设置了网络连接，就可以批量导入到 Azure SQL\
  \ 托管实例或数据库。唯一的限制是 Cloud Shell 无法加入虚拟网络，因此你必须设置公共终结点访问。Azure Cloud Shell 通过一个称为 `clouddrive`\
  \ 的概念支持文件持久化，你可以在 [`https://learn.microsoft.com/azure/cloud-shell/persisting-shell-storage`](https://learn.microsoft.com/azure/cloud-shell/persisting-shell-storage)\
  \ 了解更多信息。你可以将文件复制到你的 `clouddrive`，然后使用 `bcp` 将文件导入 Azure SQL。\n\n`bcp` 在后台使用 `批量\
  \ API`，因此你也可以编写使用 `批量 API` 的应用程序。这里有一个关于 ODBC 批量 API 的示例：[`https://learn.microsoft.com/sql/relational-databases/native-client-odbc-extensions-bulk-copy-functions/sql-server-driver-extensions-bulk-copy-functions`](https://learn.microsoft.com/sql/relational-databases/native-client-odbc-extensions-bulk-copy-functions/sql-server-driver-extensions-bulk-copy-functions)。\n\
  \n\n### BULK INSERT 与 OPENROWSET\n\nT-SQL 的 `BULK INSERT` 和 `OPENROWSET`（使用 `BULK`\
  \ 选项）语句支持从文件批量导入数据。这些命令的一个显著优势是它们在 SQL Server 引擎的上下文中运行。\n\n对于 SQL Server，常见的做法是将文件复制到托管\
  \ SQL Server 的计算机可以访问的驱动器或网络共享中。然后使用 `BULK INSERT` 引用该文件进行导入。但问题是，对于 Azure SQL 托管实例和数据库，你无法访问底层节点的文件系统。因此，`BULK\
  \ INSERT` 和 `OPENROWSET` 语句已得到增强，以支持 Azure Blob 存储（甚至可以从本地 SQL Server 访问）。\n\n其工作原理如下。你创建一个\
  \ `EXTERNAL DATA SOURCE`（类似于 Polybase）来引用一个 Azure 存储账户。`BULK INSERT` 和 `OPENROWSET`\
  \ 语句已增强支持 `DATA_SOURCE` 参数。我将在本书的第 9 章更详细地讨论外部数据源。\n\n现在，你可以使用你最喜欢的 SQL 工具（请记住，在\
  \ Azure 云 Shell 中可以是 `sqlcmd`）直接连接到你的 Azure SQL 托管实例或数据库，并让 SQL Server 引擎完成工作，从而批量导入数据。\n\
  \n以下是使用 `BULK INSERT` 的语法示例，摘自文档 [`https://learn.microsoft.com/sql/t-sql/statements/bulk-insert-transact-sql?view=sql-server-ver15#f-importing-data-from-a-file-in-azure-blob-storage`](https://learn.microsoft.com/sql/t-sql/statements/bulk-insert-transact-sql?view=sql-server-ver15#f-importing-data-from-a-file-in-azure-blob-storage)。这要求你首先创建一个\
  \ Azure 存储账户和容器。\n\n```\nCREATE MASTER KEY ENCRYPTION BY PASSWORD = 'YourStrongPassword1';\n\
  GO\n--> 可选 - 无需数据库作用域凭据，因为 Blob 配置为公共（匿名）访问！\nCREATE DATABASE SCOPED CREDENTIAL\
  \ MyAzureBlobStorageCredential\nWITH IDENTITY = 'SHARED ACCESS SIGNATURE',\nSECRET\
  \ = '******srt=sco&sp=rwac&se=2017-02-01T00:55:34Z&st=2016-12-29T16:55:34Z***************';\n\
  -- 注意：确保 SAS 令牌前没有 ?，\n-- 并且你至少对要加载的对象拥有读取权限 (srt=o&sp=r)，\n-- 且有效期有效（所有日期均为 UTC\
  \ 时间）\nCREATE EXTERNAL DATA SOURCE MyAzureBlobStorage\nWITH ( TYPE = BLOB_STORAGE,\n\
  LOCATION = 'https://****************.blob.core.windows.net/invoices'\n, CREDENTIAL=\
  \ MyAzureBlobStorageCredential --> 如果 Blob 配置为公共（匿名）访问，则不需要 CREDENTIAL！\n);\nBULK\
  \ INSERT Sales.Invoices\nFROM 'inv-2017-12-08.csv'\nWITH (DATA_SOURCE = 'MyAzureBlobStorage');\n\
  ```\n\n### SQL Server Integration Services (SSIS)\n\nSSIS 包是当今与 SQL Server 一起用于提取、转换和加载（ETL）应用程序的最流行方法之一。\n\
  \n无论 SSIS 包在何处通过 SSIS 运行时运行，Azure SQL 托管实例和数据库始终可以作为数据加载的目标。这意味着你可以构建 SSIS 包，并在本地数据中心或\
  \ Azure 虚拟机中运行它们。以下是一个关于如何使用 SSIS 将数据加载到 Azure SQL 数据库的简单教程：[`https://learn.microsoft.com/sql/integration-services/load-data-to-sql-database-with-ssis`](https://learn.microsoft.com/sql/integration-services/load-data-to-sql-database-with-ssis)。\n\
  \n还有其他方法可以在 Azure SQL 本身执行 SSIS 包（你可以使用这些方法来运行将数据导入 Azure SQL 托管实例或数据库的包）。\n\n####\
  \ Azure SSIS\n\n没有专门称为 Azure SSIS 的服务，但我创造了这个术语来指代 Azure 中用于托管和执行 SSIS 包的服务。有两个组件使\
  \ Azure SSIS 成为现实：\n\n*   **Azure SSIS Integration Runtime (SSIS IR)**\n\nAzure\
  \ Data Factory (ADF) 是 Azure 中的一项服务，提供 ETL 功能。ADF 支持一个 *集成运行时* 计算环境。集成运行时环境的其中一个选择就是\
  \ SSIS。实际上，ADF 将托管计算节点，允许你运行 SSIS 包。此计算环境也可以连接到虚拟网络，为连接到 Azure SQL 资源铺平道路。部署 SSIS\
  \ IR 的步骤可在 [`https://learn.microsoft.com/azure/data-factory/create-azure-ssis-integration-runtime`](https://learn.microsoft.com/azure/data-factory/create-azure-ssis-integration-runtime)\
  \ 找到。\n\n*   **Azure 中的 SSIS 目录数据库 (SSISDB)**\n\n虽然不一定要使用 SSIS IR，但你可以在 Azure SQL\
  \ 数据库或托管实例中托管 SSIS 的目录数据库 *SSISDB*。这样，你就可以执行存储在 Azure SQL 数据库或托管实例中的包，将你所有的 ETL\
  \ 包管理和执行放在云端。这些包可以访问普通 SSIS 包所能访问的任何数据源，包括本地数据源。可以将此视为在 Azure 中执行所有操作并从本地 *拉取* 数据的一种方式。在\
  \ Azure SQL 中创建 SSISDB 目录的最简单方法是在部署 SSIS IR 时预配它。你需要先部署一个 Azure SQL 数据库逻辑服务器或托管实例，才能在\
  \ Azure 中部署 SSISDB。请查看 [`https://learn.microsoft.com/azure/data-factory/tutorial-deploy-ssis-packages-azure`](https://learn.microsoft.com/azure/data-factory/tutorial-deploy-ssis-packages-azure)\
  \ 上的教程。\n\n一旦你为 Azure 部署了 SSIS IR 和 SSISDB，你基本上就拥有了一个运行包的计算结构和一个托管它们的目录（无需你自己预配虚拟机）。\n\
  \n注意\n\n你仍然可以执行存储在文件系统（例如 Azure 文件）中的包。\n\n你现在有多种方法可以执行这些包：\n\n*   使用 `SQL Server\
  \ Data Tools (SSDT)` 执行包。更多信息请访问 [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-ssdt`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-ssdt)。\n\
  *   在托管实例上使用 `SQL Server Agent` 执行包。更多信息请访问 [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-managed-instance-agent`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-managed-instance-agent)。\n\
  *   使用支持 Azure 的 `dtexec` 版本（称为 `AzureDTExec`，仅限 Windows）执行包。更多信息请访问 [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-azure-enabled-dtexec`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-azure-enabled-dtexec)。\n\
  *   作为 Azure Data Factory (ADF) 管道的一部分，执行一个 `Execute SSIS Package activity`。更多信息请访问\
  \ [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-ssis-activity`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-ssis-activity)。你也可以使用\
  \ ADF 运行存储过程活动。更多信息请访问 [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-stored-procedure-activity`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-stored-procedure-activity)。\n\
  \n在 Azure 中使用 SSIS IR 和 SSISDB 本身就足以写一章！要了解有关其他选项（包括将现有 SSIS 包迁移到 Azure）的更多详细信息，请阅读以下文档：[`https://learn.microsoft.com/sql/integration-services/lift-shift/ssis-azure-lift-shift-ssis-packages-overview`](https://learn.microsoft.com/sql/integration-services/lift-shift/ssis-azure-lift-shift-ssis-packages-overview)。\n\
  \n\n## BACPAC\n\nBACPAC 文件（扩展名为 `bacpac`）是一种包含数据库架构和数据的文件。你可以使用通过 SSMS、SqlPackage\
  \ 或 PowerShell 等工具生成的 BACPAC 文件，将其导入到 Azure SQL 中。在这种情况下，导入过程会创建一个包含文件中架构和数据的完整数据库。根据所使用的工具和导入位置，可以将\
  \ BACPAC 文件存储在 Azure 存储中或本地文件中。\n\nAzure SQL Database 支持使用 Azure 门户（BACPAC 文件需在\
  \ Azure 存储中）、SqlPackage 工具、SSMS 或 PowerShell 导入到新数据库。图 5-6 展示了从逻辑服务器的命令栏导入包含 BACPAC\
  \ 文件的数据库的选项。\n\n![Figure 5-6](img/496204_2_En_5_Fig6_HTML.jpg)\n\n图 5-6：通过 Azure\
  \ 门户导入数据库\n\n对于 Azure SQL 托管实例，你可以使用 SSMS 或 SqlPackage，但也可以对备份执行 T-SQL `RESTORE`。BACPAC\
  \ 文件大小限制为 200GB，因此如果需要更大的尺寸，你将需要使用批量复制选项。完整的数据库迁移可以使用 Azure 数据库迁移服务完成。\n\n要了解更多关于使用\
  \ BACPAC 文件在 Azure SQL 中导入新数据库的信息，请查阅我们的文档：[`https://learn.microsoft.com/azure/azure-sql/database/database-import`](https://learn.microsoft.com/azure/azure-sql/database/database-import)。\n\
  \n## 数据库复制\n\nAzure SQL Database 支持通过从事先部署的数据库进行事务一致复制来创建新数据库。你可以使用 Azure 门户、PowerShell、`az`\
  \ CLI 或 `CREATE DATABASE` T-SQL 语句。此功能的一个好处是可以将数据库复制到不同的逻辑服务器。门户还允许你为目标数据库配置部署选项。\n\
  \n图 5-7 显示，可以从 Azure 门户中现有数据库的上下文中的命令栏访问复制数据库功能。\n\n![Figure 5-7](img/496204_2_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7：使用 Azure 门户复制数据库\n\n这与本章前面提到的 `CREATE DATABASE...AS COPY` 选项相同。你可以在以下链接中了解更多关于如何为\
  \ Azure SQL Database 复制数据库的信息：[`https://learn.microsoft.com/azure/azure-sql/database/database-copy`](https://learn.microsoft.com/azure/azure-sql/database/database-copy)。\n\
  \n## 还原到托管实例\n\n由于 Azure SQL 托管实例是一个完整的 SQL Server 实例，几乎提供了包括 T-SQL 在内的所有功能，因此你可以对\
  \ SQL Server 备份执行原生还原。\n\n这意味着你可以从 SQL Server 备份数据库，将备份文件复制到 Azure 存储，然后使用 `RESTORE\
  \ DATABASE` 语句将数据库还原到 Azure 托管实例。\n\n目前，只能还原完整数据库备份。托管实例中的 `RESTORE` 与 SQL Server\
  \ 有一个关键区别。`RESTORE` 是一个异步操作。你可以断开连接，还原操作会在后台完成。你可以使用动态管理视图 `sys.dm_operation_status`\
  \ 来检查部署状态。\n\n要了解如何在 Azure SQL 托管实例中使用 `RESTORE`，请查阅文档：[`https://learn.microsoft.com/sql/t-sql/statements/restore-statements-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/restore-statements-transact-sql)。\n\
  \n## Spark 连接器\n\nSpark 是一种常用于 ETL 操作的技术。微软支持一个 Spark 连接器，允许你在 Azure SQL Database\
  \ 和托管实例之间导入和导出数据。它支持可以非常快速甚至使用 Microsoft Entra 身份验证的批量操作。\n\n在任何可以运行 Spark 并连接到\
  \ Azure SQL 的地方，你都可以使用此连接器。了解更多：[`https://learn.microsoft.com/azure/azure-sql/database/spark-connector`](https://learn.microsoft.com/azure/azure-sql/database/spark-connector)。在\
  \ GitHub 上获取示例：[`https://github.com/microsoft/sql-spark-connector`](https://github.com/microsoft/sql-spark-connector)。\n\
  \n## Azure Data Factory (ADF)\n\n正如本章前面提到的，Azure Data Factory (ADF) 是为数据集成构建的云服务。你可以构建流水线来编排数据集成活动，很像\
  \ SSIS。ADF 的复杂度可以根据你的需要而定。你可以在以下链接看到一个使用 ADF 将数据从 Azure Blob 存储复制到 Azure SQL Database\
  \ 的简单示例：[`https://learn.microsoft.com/en-us/azure/data-factory/tutorial-copy-data-portal`](https://learn.microsoft.com/en-us/azure/data-factory/tutorial-copy-data-portal)。\n\
  \n虽然 ADF 使用计算集成运行时环境执行，但你应该将 ADF 视为用于数据集成的 PaaS 服务（它包含 SLA）。ADF 团队喜欢将他们的服务视为 **无代码的\
  \ ETL 即服务**。\n\n如果你在 SSIS 包上还没有大量投资，并且需要持续在 Azure 上执行 ETL 或仅数据移动操作，我强烈建议你考虑 ADF。请从阅读介绍开始：[`https://learn.microsoft.com/azure/data-factory/introduction`](https://learn.microsoft.com/azure/data-factory/introduction)。\n\
  \n## 更新 Azure SQL\n\n我在本书中提到过，Azure SQL 托管实例和 Azure SQL Database 是无版本的。无版本意味着我们不会在\
  \ Azure SQL 中发布主要版本的 SQL Server 然后让你去采用。我们持续更新驱动 Azure SQL 的软件，为你提供最新的更新和增强功能。你完全无需操心并更新操作系统和\
  \ SQL Server。\n\n\n\n### Azure SQL 的维护\n\n那么，与 SQL Server 相比，最新的更新究竟意味着什么？对于 SQL\
  \ Server（截至 SQL Server 2017），我们发布主要版本、累积更新 (`CU`) 和通用分发版本 (`GDR`)。客户可以下载并应用他们希望使用的更新。\n\
  \n当我们发布一个新的主要版本时，例如 SQL Server 2019，它不仅包含新功能和特性，还包括一系列错误修复，这些修复包含了上一个主要版本所有 `CU`\
  \ 和 `GDR` 版本的修复，以及我们根据判断认为有必要包含在主要版本中的一组修复。\n\n对于错误修复（以及一些不一定算作功能的微小增强），我们持续在代码主分支中保持这些修复的最新状态。这些更改会频繁地推送到\
  \ Azure SQL 中，通常我们的客户能比等待下一个 `CU`、`GDR` 甚至主要版本发布更早地获得它们。这是在 Azure 中运行的一大优势。我们不断测试这些修复和更改，但实际上，你获得的错误修复流通常只出现在主要版本发布中。\n\
  \n我们不会记录或公布我们向为 Azure SQL 提供支持的 SQL Server 及其他组件推送更新的频率。推送这些更新的过程称为一个 `更新通道`。一个\
  \ `更新通道` 包含了支持 Azure SQL 的所有组件的更新，包括操作系统、SQL Server、Service Fabric 组件以及我们用于驱动 Azure\
  \ SQL 的其他软件。我们不会一次性将 `更新通道` 推送到每个 Azure 区域。相反，这些 `更新通道` 会跨区域逐步推出。如果我们在早期阶段检测到推送\
  \ `更新通道` 出现任何问题，可以轻松回滚。由于每个 Azure SQL 部署都具有内置的可用性，当我们更新节点和实例时，可以故障转移部署，并根据与你的部署相关联的\
  \ `SLA` 协议确保你的数据可用。可用性区域等概念也有助于提供进一步的可用性。我将在本书的第 8 章中进一步讨论可用性区域。Azure 门户中的资源运行状况选项或通过\
  \ `REST` API 可以为你提供有关是否因 `部署` 而发生故障转移的信息。`部署` 是计划内可能影响可用性的维护事件。\n\n注意\nSQL Server\
  \ 的累积更新时间安排可能导致某个修复先出现在 `CU` 中，然后才通过 Azure SQL 的 `更新通道` 推出。除非该 `CU` 中的修复引入了回退问题，否则该修复最终会在部署\
  \ `更新通道` 中出现。\n\n正如你在本书中所见，你还可以选择维护窗口来控制更新计划时间，并设置警报以提前通知这些可能影响正常运行时间的维护操作。\n\n\
  注意\n如果我们遇到重大的影响客户的问题，我们可能会通知特定客户其部署可能受到影响，以便我们纠正他们的问题。\n\n我们正在努力进行的部分改进将为客户提供预先的维护通知，以便他们能为这些事件做计划。此外，我们也在研究让客户能够为维护事件选择自定义时间表的能力。\n\
  \n我们在云端的工作常常催生创新。我们推出的一项非常酷的能力是 `热补丁`，旨在减少 Azure SQL 维护需要重启 SQL Server（从而导致故障转移）的场景数量。你可以通过我的同事\
  \ Hans Olav Norheim 在这篇博文 [`https://azure.microsoft.com/blog/hot-patching-sql-server-engine-in-azure-sql-database/`](https://azure.microsoft.com/blog/hot-patching-sql-server-engine-in-azure-sql-database/)\
  \ 中了解 `热补丁` 如何提升 Azure SQL 的可用性。\n\n### Azure SQL 托管实例的更新策略\n\n我在本书中介绍了 Azure SQL\
  \ 托管实例的更新策略概念，有两种选择：\n\n*   **始终保持最新**\n    此选择允许托管实例接收持续更新，包括新功能。为此选择备份的任何数据库无法还原到\
  \ SQL Server 2022（但可以还原到其他始终保持最新的托管实例）。\n\n*   **SQL Server 2022**\n    如果你希望能够将备份还原到\
  \ SQL Server 2022 或与 SQL Server 2022 一起使用在线灾难恢复（将在本书第 8 章进一步讨论），请选择此项。选择此项后，你的实例仍会自动应用适用于\
  \ SQL Server 2022 的累积更新，但不会获得仅适用于始终保持最新实例的新功能。你可以从此托管实例将备份还原到另一个 SQL Server 2022\
  \ 或始终保持最新的托管实例（当你使用后者选择时，无法还原回去）。\n\n### Azure SQL 中的新功能和特性\n\n总的来说，在过去几年中，我们一直尝试为\
  \ SQL Server 采用 `云优先理念`。我们构建新功能，并首先通过私有（有限客户，通常需要注册）和公共预览（尚未完全正式发布，但客户可以试用）计划在 Azure\
  \ SQL 中推出。最终，该功能会进入正式发布 (`GA`) 阶段。\n\n然后根据 SQL Server 新主要版本的发布时间，该功能会被包含在该主要版本中。这方面的一个很好的例子是智能查询处理\
  \ (`IQP`)，你可以在 [`https://learn.microsoft.com/sql/relational-databases/performance/intelligent-query-processing`](https://learn.microsoft.com/sql/relational-databases/performance/intelligent-query-processing)\
  \ 阅读相关内容。我们在 `IQP` 随 SQL Server 2019 和 2022 发布之前，就先为 Azure SQL 客户推出了。\n\n我为你创建了两个快捷方式，以便随时了解\
  \ Azure SQL 数据库和托管实例的所有最新消息：\n\n[`https://aka.ms/whatsnewsqldb`](https://aka.ms/whatsnewsqldb)\n\
  \n[`https://aka.ms/whatsnewsqlmi`](https://aka.ms/whatsnewsqlmi)\n\n## 总结\n\n在本章中，你学习了在部署后配置\
  \ Azure SQL 托管实例和数据库的各种方法、能力、技巧和限制。你既了解了 Azure SQL 特有的配置选项，也学习了使用熟悉的技术（如 `T-SQL`）配置数据库引擎和数据库的选项。\n\
  \n你还了解了空间管理的一些有趣方面，这在管理 Azure SQL 中的数据库时可能很重要。\n\n在本章中，我们介绍了从本地和 Azure 环境向 Azure\
  \ SQL 加载数据的各种方法。最后，你了解了 Azure SQL 如何更新的细节，以及它为何被称为无版本数据库。\n\n既然你已经学习了如何部署和配置 Azure\
  \ SQL，现在是时候深入探讨 Azure SQL 的第一大类核心内容：安全性了。下一章，我们将介绍 Azure SQL 与 SQL Server 相比的安全特性。\n\
  \n\n\n"
- "# 6. 保障 Azure SQL 的安全\n\n既然您已经部署并配置了 Azure SQL 托管实例或数据库，您会希望确保自己采取了所有正确的措施来全面保障\
  \ Azure SQL 部署的安全。Azure SQL 不仅具备 SQL Server 所附带的所有安全功能，还提供了更多。\n\n我的同事 Anna Hoffman\
  \ 曾问我，为何我一直将安全性、性能和可用性称为 SQL Server 和 Azure SQL 的*主食*。这个说法并非我的原创。它源自我长期以来的同事、著名的\
  \ Conor Cunningham。Conor 和我曾在 PASS Summit 主旨演讲中一起做过几次演示。有一次，我考虑做一些相当前沿的演示，Conor\
  \ 阻止了我说：“Bob，演示固然不错，但我们的客户期望你我展示引擎的核心创新。比如安全性、性能和可用性。你知道的，这些才是 SQL Server 的主食。”从那以后，这个说法就一直沿用下来。哦，顺便说一句，我仍然会尝试构建那些前沿的演示。\n\
  \n**注意**\n\n对于不了解这个短语的人，它是我们德克萨斯州常用的说法，意指某件事物的基础或核心。一顿基本的饭包括肉和土豆。这对我不是问题，因为我两者都爱。\n\
  \n在本章中，我们将探讨您通常用于保护 SQL Server 的所有功能，并将其与 Azure SQL 进行比较。您还将学习用于保障 Azure SQL 托管实例和数据库部署安全的独特能力和方法。\n\
  \n本章按以下安全类别组织：\n\n## 网络安全\n\n在本节中，了解通过各种网络选项（包括防火墙、虚拟网络和专用终结点）提供最安全连接的几种方法。\n\n\
  ## 身份验证与访问\n\n在本节中，您将学习提供身份验证和访问的最安全方法，包括基于 Azure 角色的访问控制 (RBAC)、Microsoft Entra、行级安全和\
  \ Microsoft Purview。\n\n## 数据保护\n\n在本节中，您将学习如何保护您的数据，包括加密方法、数据屏蔽和账本（SQL 内部的一种区块链）。\n\
  \n## 安全管理\n\n在本节中，您将了解审核、Microsoft Defender 和数据分类等概念。\n\n在讨论安全性时，我将使用本书第 4 章中所做的部署。要试用我在本章中使用的任何技术或命令，您将需要：\n\
  \n*   一个 Azure 订阅。\n*   对该 Azure 订阅至少具有“参与者”角色访问权限。您可以在 [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles)\
  \ 详细了解 Azure 内置角色。\n*   访问 Azure 门户。\n*   部署一个与我在第 4 章中所做类似的 Azure SQL 托管实例和一个 Azure\
  \ SQL 数据库。\n*   要连接到托管实例，您将需要一个 Azure 中的 `jumpbox` 或虚拟机来进行连接。我在本书第 4 章中展示了如何操作。一个简单的方法是创建一个新的\
  \ Azure 虚拟机，并将其部署到与托管实例相同的虚拟网络中（您将使用与托管实例不同的子网）。\n*   要连接到 Azure SQL 数据库，您可以使用防火墙规则从本地客户端连接，但本章还展示了如何在虚拟网络中使用专用终结点（并结合\
  \ Microsoft Entra 托管标识）进行连接，因此您需要一个 Azure 虚拟机。在我的示例中，我将使用本书第 3 章中创建的名为 `bwsql2022`\
  \ 的虚拟机。\n*   安装 `az` CLI（有关更多详细信息，请参阅 [`https://learn.microsoft.com/cli/azure/install-azure-cli`](https://learn.microsoft.com/cli/azure/install-azure-cli)）。您也可以使用\
  \ Azure Cloud Shell，因为其中已预装 az。您可以在 [`https://azure.microsoft.com/features/cloud-shell/`](https://azure.microsoft.com/features/cloud-shell/)\
  \ 详细了解 Azure Cloud Shell。\n*   您将在本章中运行一些 T-SQL，因此请安装一个工具，如 SQL Server Management\
  \ Studio (SSMS)，下载地址为 [`https://aka.ms/ssms`](https://aka.ms/ssms)。\n\n## 网络安全\n\
  \n大多数安装 SQL Server 的管理员都使用公司基础设施内的私有网络。防火墙会阻止该网络内的传入流量。此外，操作系统提供防火墙来保护 SQL Server\
  \ 等应用程序的端口。事实上，如果您之前安装过 SQL Server，您会知道默认情况下，Windows 和 Linux 上的 1433 端口防火墙都是阻止的。您通常必须采取操作，为远程连接到\
  \ SQL Server 的此端口添加一个例外。\n\nAzure SQL 也不例外，不同之处在于您可以选择允许连接到其后的 SQL Server 实例，既可以作为互联网上的公共终结点，也可以作为虚拟网络内的私有终结点。\n\
  \n在您阅读本章此部分信息时，我需要向您坦言：您绝对应该咨询您所在组织的网络专家，以根据您所需的要求来配置 Azure SQL 托管实例或数据库。\n\n###\
  \ Azure SQL 托管实例网络安全\n\n正如您在第 4 章部署 Azure SQL 托管实例时所见，虚拟网络、公共终结点和私有连接已内置于托管实例体验中。\n\
  \n图 6-1（直接来自文档 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/connectivity-architecture-overview?view=azuresql#communication-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/connectivity-architecture-overview?view=azuresql#communication-overview)）很好地可视化了连接选项。\n\
  \n![](img/496204_2_En_6_Fig1_HTML.jpg)\n\n图 6-1：Azure SQL 托管实例的网络连接选项\n\n让我们更详细地探讨这些选项中的每一个。\n\
  \n### 公共终结点\n\n您可以为 Azure SQL 托管实例启用公共终结点，但这是最不安全的方式。这种方法的最大优点是，任何 SQL 客户端只需很少的配置即可连接到该终结点。如果您决定这样做，该终结点位于端口\
  \ 3342 上（此端口无法更改，不是 1433）。此外，您可以使用网络安全组 (`NSG`) 规则来有效地在该端口上设置防火墙。请阅读 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/public-endpoint-configure`](https://learn.microsoft.com/azure/azure-sql/managed-instance/public-endpoint-configure)\
  \ 以获取更多信息。\n\n\n\n### VNet-本地端点\n\n这是连接托管实例最常见的选项。我向你展示过我首选的一种方法：在与托管实例相同的虚拟网络中（但位于不同的子网），设置一台\
  \ Azure 虚拟机（或云应用程序）。这是我在第 4 章中用于跳板机的示例。\n\n但是，也可以使用 Azure 内部或外部的另一虚拟网络进行连接。**VNet\
  \ 对等互连**允许你从已与另一虚拟网络对等互连的虚拟网络中的资源进行连接。请查看此博客文章，了解如何通过 VNet 对等互连连接到托管实例： [`https://techcommunity.microsoft.com/t5/azure-database-support-blog/connect-to-azure-sql-database-managed-instance-with-virtual/ba-p/369077`](https://techcommunity.microsoft.com/t5/azure-database-support-blog/connect-to-azure-sql-database-managed-instance-with-virtual/ba-p/369077)。你可以在\
  \ [`https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-peering-overview`](https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-peering-overview)\
  \ 阅读更多关于虚拟网络对等互连的内容。虚拟网络对等互连可以在同一区域内或跨区域进行。\n\n如果你想从本地连接到托管实例，则需要使用**Azure 虚拟网络网关**。有几种选项可以将本地环境与虚拟网络网关连接：点到站点\
  \ (P2S)、站点到站点 (S2S) 和 ExpressRoute。ExpressRoute 绝对是通过网关连接最快（但也是最昂贵）的方式。你可以在 [`https://learn.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-about-vpngateways`](https://learn.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-about-vpngateways)\
  \ 了解所有这些网关选项。正如我在本章前面提到的，如果网络不是你的专长（也不是我的），那么我会建议咨询你所在组织的网络工程师以选择最佳方案。\n\n### 专用端点\n\
  \n最安全的连接选项是专用端点。专用端点可在服务与多个虚拟网络之间建立安全、隔离的连接，而无需暴露服务的整个网络基础设施。我喜欢文档中的类比：“...就像将一根物理网络电缆从运行\
  \ Azure SQL 托管实例的计算机延伸到另一个虚拟网络。”\n\n设置这个需要多一点配置，并且存在一些限制，例如不能将其用于故障转移组、分布式事务和托管实例链接。\n\
  \n你可以在 Azure 门户中，通过托管实例的“安全”部分下的“专用端点连接”选项来设置专用链接。请参阅完整的步骤： [`https://learn.microsoft.com/azure/azure-sql/managed-instance/private-endpoint-overview?view=azuresql&tabs=separate-vnets#create-a-private-endpoint-in-a-virtual-network`](https://learn.microsoft.com/azure/azure-sql/managed-instance/private-endpoint-overview?view=azuresql&tabs=separate-vnets#create-a-private-endpoint-in-a-virtual-network)。\n\
  \n我将在本章下一节关于 Azure SQL 数据库的部分，详细介绍如何使用专用端点的示例。\n\n### 其他注意事项\n\n重要的是要知道，除了 SQL Server\
  \ 端点（用于连接和运行查询的标准 TCP 端口）外，Azure SQL 托管实例还有一个*管理端点*。由于托管实例部署在其自己的虚拟集群中，集群外但在 Azure\
  \ 内的各种服务（例如 Resource Manager 中的部署）必须能够访问该集群。这种访问是通过管理端点进行的。管理端点是一个受防火墙保护的公共端点。这意味着当你使用门户或\
  \ CLI 来管理托管实例（例如，缩放操作）时，你正在连接到此端点。请阅读有关管理端点如何受保护的更多信息： [`https://docs.microsoft.com/en-us/azure/azure-sql/managed-instance/connectivity-architecture-overview#management-endpoint`](https://docs.microsoft.com/en-us/azure/azure-sql/managed-instance/connectivity-architecture-overview#management-endpoint)。\n\
  \n我在第 4 章部署期间展示了连接类型`Proxy`与`Redirect`。即使 SQL Server 端点位于私有虚拟网络中，从技术上讲，`Proxy`连接更安全，因为所有流量都通过*网关*路由。使用`Redirect`连接时，连接首先建立到网关，然后所有后续流量直接发送到托管实例节点。`Redirect`可以快得多，并且由于使用了专用端点，我推荐此选项。任何公共端点的使用都始终使用代理连接。你可以在\
  \ [`https://docs.microsoft.com/en-us/azure/azure-sql/database/connectivity-architecture#connection-policy`](https://docs.microsoft.com/en-us/azure/azure-sql/database/connectivity-architecture#connection-policy)\
  \ 了解有关这些策略的更多信息。\n\n### Azure SQL 数据库网络安全\n\nAzure SQL 数据库（任何部署选项）的网络安全与托管实例有点不同，因为当你部署数据库时，我们没有专用的私有虚拟集群。相反，所有数据库部署都共享\
  \ Azure 区域中的虚拟集群（环）。请记住，当我谈到这些网络安全选项时，它们适用于所有数据库的逻辑服务器。此规则的唯一例外是，你可以配置特定于数据库的防火墙规则，该规则与逻辑服务器不同。\n\
  \n这并不意味着你无法受到保护，因为你可以在你的数据库部署上拥有一个专用端点，正如你将在本章本节中看到的那样。\n\n\n### 使用公共端点\n\n在第 4\
  \ 章关于部署的内容中，我向您展示了一些数据库部署的连接选项，其中包括：\n\n*   `Allow access to Azure services` – 此选项允许任何\
  \ Azure 资源（例如，VM、应用程序或 cloud shell）访问数据库部署的公共端点。\n\n*   `Firewall rules` – 此选项允许您为\
  \ Azure 外部的客户端计算机创建特定的防火墙规则。我在第 4 章中使用了此技术，通过我的笔记本电脑和 SQL Server Management Studio\
  \ (SSMS) 连接到我部署的逻辑服务器。\n\n图 6-2 展示了 Azure 资源和本地计算机如何连接到具有公共端点的逻辑服务器的网络连接图。\n\n![](img/496204_2_En_6_Fig2_HTML.jpg)\n\
  图 6-2 连接到具有公共端点的逻辑服务器\n\n在此图中，您可以看到通过 `Allow access to Azure services` 连接的 Azure\
  \ VM 资源，以及通过防火墙规则连接的本地计算机。请注意，Azure 虚拟机使用的是它们的公共 IP 地址，因为即使在 Azure 内部，它们也是通过公共端点连接进行连接的。\n\
  \n> **注意**\n> 需要明确的是，您可以使用 `Allow access to Azure services` 并关闭所有其他防火墙规则。虽然这不是私有端点的场景，但它确实阻止了任何来自\
  \ Azure *外部* 连接到逻辑服务器的连接。\n\n注意在此图中，逻辑服务器的名称是 [mysqldbsrv.​database.​windows.​net](http://mysqldbsrv.database.windows.net)（这是一个示例，并非我使用的逻辑服务器）。这是逻辑服务器的名称，但公共端点如何在互联网上被解析呢？注意在此名称下方是一个公共\
  \ IP 地址和一个网络名称 [westus1-a.​control.​database.​windows.​net](http://westus1-a.control.database.windows.net)。此名称是连接到逻辑服务器时，网关节点的\
  \ DNS 名称的一部分。\n\n由于启用了 `Allow access to Azure services`，让我们使用我在第 3 章创建的 Azure 虚拟机\
  \ `bwsql2022`，来检查连接到我在第 4 章部署的逻辑服务器的连接属性。\n\n我使用 RDP 连接到该虚拟机（我在本章前面提到过在 VM 中安装了\
  \ SSMS 和 Azure Data Studio）。然后，我使用 SSMS 连接到我在第 4 章部署的名为 [**bwsqllogicalserver.database.windows.net**](http://bwsqllogicalserver.database.windows.net)\
  \ 的 Azure 逻辑服务器。`dm_exec_connections` 是 SQL Server 的一个 DMV，可以提供有关到服务器连接的关键信息。因此，我从\
  \ SSMS 运行了以下 T-SQL 语句：\n\n```\nSELECT client_net_address FROM sys.dm_exec_connections\n\
  WHERE session_id = @@SPID;\n```\n\n返回的结果是：\n\n```\n52.173.38.9\n```\n\n这个 IP 地址是\
  \ Azure 虚拟机 `bwsql2012` 的*公共 IP 地址*。这证明了 VM 正在通过公共端点连接到逻辑服务器。然而，VM 有权访问（无需通过防火墙允许连接），因为我使用了\
  \ `Allow access to Azure services` 选项。\n\n另一种查看 Azure SQL Database 公共端点方面的有趣方法是检查逻辑服务器的\
  \ DNS 基础结构。您可以使用 `nslookup` 命令来完成此操作（`nslookup` 在 Windows 和 Linux 操作系统上默认可用；更多信息请参见\
  \ [`https://learn.microsoft.com/windows-server/administration/windows-commands/nslookup`](https://learn.microsoft.com/windows-server/administration/windows-commands/nslookup)）。\n\
  \n从我的 Azure 虚拟机中，我随后在 PowerShell 中运行了如下命令：\n\n```\nnslookup bwsqllogical.database.windows.net\n\
  ```\n\n我收到了以下结果：\n\n```\nServer:  UnKnown\nAddress:  168.63.129.16\nNon-authoritative\
  \ answer:\nName:    cr8.cEntralus1-a.control.database.windows.net\nAddress:  13.89.169.20\n\
  Aliases:  bwsqllogicalserver.database.windows.net\ndataslice7.cEntralus.database.windows.net\n\
  dataslice7cEntralus.trafficmanager.net\n```\n\n顶部的结果是 IP 地址 `168.63.129.16`。事实证明，这个地址是用于\
  \ Azure 通信的特殊虚拟 IP 地址，因此在 Azure 内部，您的地址始终会显示这个（更多信息请参见 [`https://learn.microsoft.com/en-us/azure/virtual-network/what-is-ip-address-168-63-129-16`](https://learn.microsoft.com/en-us/azure/virtual-network/what-is-ip-address-168-63-129-16)）。\n\
  \n底部的结果显示了逻辑服务器的 DNS 层次结构，其中包括 Azure *控制环*（网关）内的 DNS 服务器。\n\n另外，请注意 ping 是被阻止的，但它显示了如何尝试访问公共端点：\n\
  \n```\nping bwsqllogicalserver.database.windows.net\nPinging cr8.cEntralus1-a.control.database.windows.net\
  \ [13.89.169.20] with 32 bytes of data:\nRequest timed out\n```\n\n还有第三种选项可以保护连接逻辑服务器的安全性。假设您想关闭\
  \ `Allow access to Azure services`，但又不想为防火墙规则使用固定 IP 地址。您可以使用 `virtual network service\
  \ endpoint` 来允许仅来自虚拟网络（可能包括本地连接）的特定 Azure 资源连接到逻辑服务器。这仍然是一个公共端点连接，但严格限制来自特定 Azure\
  \ 虚拟网络的资源。有关如何使用虚拟网络服务终结点的更多信息，请参阅 [`https://learn.microsoft.com/azure/azure-sql/database/vnet-service-endpoint-rule-overview`](https://learn.microsoft.com/azure/azure-sql/database/vnet-service-endpoint-rule-overview)。\n\
  \n让我们使用一种不同的技术来加强 Azure 逻辑服务器网络连接的安全性，即专用链接。\n\n\n### 使用专用链接\n\n假设你不想让任何公共端点访问你的\
  \ Azure SQL 数据库，无论连接是来自 Azure 内部还是外部。Azure 团队创建了一个名为 `专用链接` 的概念，允许像 Azure SQL 数据库这样的\
  \ PaaS 服务仅通过专用终结点限制访问。你可以在以下网址阅读有关专用链接的概述：[`https://learn.microsoft.com/azure/private-link/private-link-overview`](https://learn.microsoft.com/azure/private-link/private-link-overview)。\n\
  \n让我们看看使用专用链接的图 6-2 的一个新变体。图 6-3 展示了专用链接如何为 Azure SQL 数据库提供专用终结点。\n\n![](img/496204_2_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3 使用专用链接的 Azure SQL 数据库\n\n专用链接将在现有的 Azure 虚拟网络中公开一个专用终结点。请注意，在此图中，逻辑服务器的\
  \ DNS 名称不再位于公共 DNS 层次结构中。\n\n让我们看看如何使用第 4 章中的现有 Azure SQL 数据库部署和 Azure 门户实现专用链接连接。从我的逻辑服务器（我的是\
  \ `bwsqllogicalserver`）中，我可以在 Azure 门户中创建一个专用终结点，如图 6-4 所示。\n\n![](img/496204_2_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4 为 Azure SQL 数据库创建专用终结点\n\n系统会提供一系列屏幕，让你为终结点命名、选择虚拟网络（在此案例中，虚拟网络是我第 3 章部署的\
  \ Azure 虚拟机 `bwsql2022` 所使用的网络）以及 DNS（我直接使用了默认值）。此链接的部署需要几分钟时间。\n\n注意\n\n专用终结点必须与你选择的\
  \ Azure 虚拟网络位于同一区域。请记住，终结点现在成为该 VNet 中的一个资源。但是，你的客户端连接可以通过如图 6-3 所示的 VNet 对等互连或\
  \ VNet 网关位于另一个虚拟网络中。\n\n图 6-5 显示了我已部署的、与此逻辑服务器关联的专用终结点。\n\n![](img/496204_2_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5 已部署的 Azure SQL 数据库专用终结点\n\n该终结点是其自身的资源，与我的 Azure 虚拟机的虚拟网络以及此逻辑服务器都相关联（它也可以与其他逻辑服务器一起使用）。如果你选择该专用终结点，可以深入了解网络接口并查看其专用\
  \ IP 地址。为了展示我如何仅使用此终结点，我还可以通过此逻辑服务器的“服务”菜单中相同的网络选项，在 Azure 门户中禁用任何公共终结点。\n\n现在，我将回到我的\
  \ Azure 虚拟机 `bwsql2022`，并再次尝试使用 SSMS 进行连接。我的连接现在成功了。如果我运行以下 T-SQL 语句：\n\n```\nSELECT\
  \ client_net_address FROM sys.dm_exec_connections\nWHERE session_id = @@SPID;\n\
  ```\n\n结果如下：\n\n```\n10.0.0.4\n```\n\n这是 Azure 虚拟机 `bwsql2022` 的 `专用 IP 地址`（之前是公共\
  \ IP 地址）。这次让我们尝试 ping 逻辑服务器：\n\n```\nping bwsqllogicalserver.database.windows.net\n\
  Pinging bwsqllogicalserver.privatelink.database.windows.net [10.0.0.5] with 32 bytes\
  \ of data:\nRequest timed out\n```\n\n请注意服务器的专用 IP 地址以及不在公共层次结构中的新 DNS 名称。\n\n同时，注意\
  \ `nslookup` 的输出：\n\n```\nnslookup bwsqllogical.database.windows.net\nServer:  UnKnown\n\
  Address:  168.63.129.16\nNon-authoritative answer:\nName:    bwsqllogicalserver.privatelink.database.windows.net\n\
  Address:  10.0.0.5\nAliases:  bwsqllogicalserver.database.windows.net\n```\n\n在以下文档中阅读更多关于为\
  \ Azure SQL 数据库使用 Azure 专用链接的内容：[`https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview`](https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview)。对于任何希望将其本地环境集成的用户，请特别关注此文档页面：[`https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview?view=azuresql#on-premises-connectivity-over-private-peering`](https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview?view=azuresql#on-premises-connectivity-over-private-peering)。\n\
  \n提示\n\nAzure SQL 数据库的专用链接连接目前仅支持代理连接类型。我们将 Azure SQL 数据库的连接策略保留为默认设置，因此，如果连接使用位于\
  \ Azure 内部的专用链接，它将不会使用重定向，而是使用代理。\n\n通过观看 Anna Hoffman 和 Rohit Nayak 作为 Data Exposed\
  \ 频道一部分的视频，在你的 Azure SQL 和网络安全知识基础上更进一步：[`https://www.youtube.com/playlist?list=PL3EZ3A8mHh0xtbf4Cr2yR4-xsUtELwPjw`](https://www.youtube.com/playlist?list=PL3EZ3A8mHh0xtbf4Cr2yR4-xsUtELwPjw)。\n\
  \n## 身份验证与访问\n\n你现在已经成功部署了 Azure SQL 托管实例和数据库，并使用安全的网络架构进行了连接。在部署这两个 Azure SQL 服务时，你指定了一个\
  \ `管理员`，即一个 SQL 登录名和密码，可能还有一个 Microsoft Entra 管理员。接下来的步骤是设置和配置其他登录名和用户，就像你会在 SQL\
  \ Server 部署中所做的那样。我将此过程称为设置 `身份验证`。然后，你将根据你的应用程序和业务需求，授予用户访问他们所需对象的权限。\n\n在我们讨论\
  \ Azure SQL 身份验证和访问的细节之前，让我们首先回顾一下 SQL *之外*、但在名为 Azure 基于角色的访问控制 (RBAC) 的 Azure\
  \ 基础结构中的 Azure SQL 资源的身份验证和访问。\n\n### Azure 基于角色的访问控制 (RBAC)\n\n我在本书前面的章节中提到过 Azure\
  \ RBAC 的概念。今天，当你在 Windows 或 Linux 上部署 SQL Server 时，你必须拥有某些权限和特权才能安装 SQL Server。例如，在\
  \ Windows 上，大多数人在安装 SQL Server 时使用本地管理员帐户。\n\n在本书的这个阶段，我已经在几个章节中列出了部署 Azure SQL\
  \ 的要求，例如 `参与者角色`。属于参与者角色的 Azure 帐户用户拥有管理所有内容的权限，但无法向其他帐户授予对资源的访问权限（该访问权限保留给所有者或用户访问管理员角色的成员）。\n\
  \n因此，如果你被分配了你的 Azure 订阅的参与者角色，你应该拥有部署 Azure SQL 托管实例和数据库的权利。\n\n你可能希望为你的组织设置一个系统，让一些\
  \ Azure 用户拥有部署或管理 Azure SQL 托管实例和数据库的权利，但无法访问这些资源。想象一个只部署或管理资源但无法访问底层 SQL Server\
  \ 的管理员。\n\nAzure 为此提供了以下内置角色。\n\n### SQL DB 参与者\n\n此角色的成员可以部署和管理 Azure SQL 数据库，但无法访问它们。\n\
  \n### SQL Server 参与者\n\n此角色的成员可以部署和管理 Azure SQL 逻辑服务器和数据库，但无法访问它们。\n\n### SQL 安全管理器\n\
  \n此角色的成员可以管理 Azure SQL 逻辑服务器和数据库的安全策略，但无法访问它们。\n\n### SQL 托管实例参与者\n\n此角色的成员可以部署和管理\
  \ Azure SQL 托管实例，但无法访问它们。\n\n你可以在以下网址阅读更多关于 Azure 内置角色的信息：[`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles/databases`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles/databases)。\n\
  \n\n\n### Azure SQL 托管实例的身份验证\n\n在 Windows 上部署 SQL Server 时，默认的身份验证`模式`是“仅限 Windows”。这意味着只有\
  \ Windows 用户可以登录 SQL Server。`混合模式安全性`则允许 SQL 和 Windows 登录（Linux 需要混合模式）。Azure SQL\
  \ 托管实例强制使用混合模式安全性，您无法更改此设置。\n\n部署 Azure SQL 托管实例时，您需要指定一个`管理员帐户`，如本书第 4 章所示。这可以是一个\
  \ SQL 身份验证帐户、Microsoft Entra 帐户，或两者兼有。此帐户将被添加为 `sysadmin` 角色的成员。`sa` 登录默认是禁用的，但您可以启用并使用它（不过我不推荐这样做）。\n\
  \n通过此 `sysadmin` 登录，您可以像使用 SQL Server 一样添加其他 SQL 登录，并将它们分配给角色（甚至是 `sysadmin` 角色）。您还可以在数据库中创建用户并将其映射到登录名，就像在\
  \ SQL Server 中一样。\n\n> **注意**\n>\n> 一旦部署，您就无法更改 SQL 管理员。您可以通过 `Azure 门户`、`az CLI`\
  \ 或 `PowerShell` 重置管理员的密码。\n\n### Microsoft Entra 身份验证\n\n我们为您提供了将 `Microsoft Entra\
  \ 登录`添加到托管实例的功能。当您对 SQL Server 使用 Windows 或域身份验证时，您实际上是在使用 Active Directory 域服务。Linux\
  \ 上的 SQL Server 也支持此概念。Azure 通过 Microsoft Entra 提供相同类型的服务。\n\n对托管实例使用 Microsoft\
  \ Entra (Entra) 身份验证的第一步是从一个 Entra 用户中为托管实例预配一个管理员。要在托管实例上使用 Entra，您首先需要创建一个 Entra\
  \ 目录。当您登录 Azure 门户时，您可能已经属于您组织的 Entra 目录。对我来说，在微软就是这种情况。\n\n要为托管实例设置 Entra 管理员，您必须拥有\
  \ Entra 的“管理员”权限以授予读取权限。我在微软没有这些权限。配置此 Entra 管理员的流程记录在 [`https://learn.microsoft.com/azure/azure-sql/database/authentication-aad-configure`](https://learn.microsoft.com/azure/azure-sql/database/authentication-aad-configure)。其中涵盖了为托管实例配置\
  \ Entra 管理员的门户和 CLI 选项。\n\n新的 Entra 管理员将成为托管实例的 `sysadmin` 服务器角色的成员。现在，您可以使用 `CREATE\
  \ LOGIN` T-SQL 语句基于 Entra 用户创建新的登录名。`FROM EXTERNAL PROVIDER` 子句提供了此功能。文档在 [`https://learn.microsoft.com/sql/t-sql/statements/create-login-transact-sql?view=azuresqldb-mi-current`](https://learn.microsoft.com/sql/t-sql/statements/create-login-transact-sql?view=azuresqldb-mi-current)\
  \ 展示了此语法的示例，如下 T-SQL 语句所示：\n\n```sql\nCREATE LOGIN [bob@contoso.com] FROM EXTERNAL\
  \ PROVIDER;\n```\n\n#### Windows 身份验证\n\n许多 SQL 应用程序使用 Windows 身份验证连接到 SQL Server。我们现在为这些应用程序提供了一个选项，使它们在使用\
  \ Azure SQL 托管实例时，仍然可以使用 Windows 身份验证，从而无需更改身份验证方法。\n\n此过程在后台仍使用 Microsoft Entra\
  \ 和服务主体来帮助实现 Kerberos 身份验证。\n\n托管实例上针对 Microsoft Entra 主体的 Windows 身份验证，适用于加入到 Active\
  \ Directory、Microsoft Entra ID 或混合 Microsoft Entra ID 的虚拟机——混合 Microsoft Entra 用户标识同时存在于\
  \ Microsoft Entra ID 和 Active Directory 中，并且可以使用 Microsoft Entra Kerberos 访问 Azure\
  \ 中的托管实例。\n\n使用此方法可能遇到的唯一问题是，登录名仍然需要在引擎中使用 `CREATE LOGIN FROM EXTERNAL PROVIDER`\
  \ 创建，就像对 Microsoft Entra 所做的那样。请在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup`](https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup)\
  \ 了解如何进行设置。\n\n> **注意**\n>\n> 在撰写本书时，一个名为 `原生 Windows 主体` 的新功能已发布预览。我强烈建议您了解此功能，因为它可以为您提供一种使用熟悉的\
  \ `CREATE LOGIN FROM WINDOWS` T-SQL 语句的方式。此功能使用了一个称为身份验证元数据模式的新概念。请在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/native-windows-principals`](https://learn.microsoft.com/azure/azure-sql/managed-instance/native-windows-principals)\
  \ 查看详细信息。\n\n### Azure SQL 数据库的身份验证\n\n当我在本书第 4 章向您展示如何部署 Azure SQL 数据库时，我同时通过 SQL\
  \ 身份验证和 Microsoft Entra 提供了`服务器管理员登录名`。我使用了 SQL 身份验证登录名连接到逻辑服务器。此管理员帐户是逻辑服务器的`服务器级别主体`，并在所有数据库中映射为\
  \ `dbo`。\n\n> **注意**\n>\n> 一旦部署，您就无法更改 SQL 身份验证管理员。您可以通过 `Azure 门户`、`az CLI` 或 `PowerShell`\
  \ 重置管理员的密码。部署后，您可以更改 Microsoft Entra 管理员。\n\n如果您想创建其他具有管理员能力（但不是完整的服务器管理员）的登录名，您应该使用\
  \ `CREATE LOGIN` T-SQL 语句，在逻辑主数据库的上下文中为逻辑服务器创建标准 SQL 登录名。然后，您可以在逻辑主数据库的上下文中创建一个用户，并使用\
  \ `ALTER ROLE` 将此用户分配给 Azure SQL 数据库的两个特殊角色：\n\n- `dbmanager` – 分配给此角色的用户可以创建和管理数据库，并将映射到该数据库的\
  \ `dbo`，因此拥有完整的数据库所有者权限。\n- `loginmanager` – 分配给此角色的用户可以在逻辑主数据库的上下文中创建新的登录名，但不会映射到数据库的\
  \ `dbo` 角色。\n\n现在，您可以使用 SQL Server 的标准流程来创建 SQL 登录名，并将其映射到它们需要访问的任何数据库中的用户。您可以将用户分配给角色，甚至可以像在\
  \ SQL Server 中一样创建新角色。\n\n> **注意**\n>\n> 使用登录名的一个复杂之处在于，当您选择像异地复制这样的故障转移选项时，您必须手动在辅助服务器上创建登录名。\n\
  \n#### 使用包含用户\n\n您还可以创建不需要登录名的包含数据库用户。这个概念在 SQL Server 使用包含数据库时已经存在一段时间了。Azure SQL\
  \ 数据库在某种程度上就是一个包含数据库。包含用户也称为`用户帐户`。\n\n`CREATE USER` T-SQL 语句支持使用 `WITH PASSWORD`\
  \ 子句创建包含用户。包含用户的一个优势是信息存储在数据库中，因此作为异地复制故障转移部署的一部分被复制。\n\n\n### Microsoft Entra 身份验证\n\
  \n与托管实例类似，Azure SQL Database 也支持 Microsoft Entra 身份验证。就像在 SQL Server 中使用 Windows\
  \ 身份验证一样，Entra 身份验证可能是与 Azure SQL Database 一起使用的最安全且最佳的方法。您可以为逻辑服务器创建一个 Entra 服务器管理员（在部署期间创建的\
  \ SQL 服务器管理员之外）。然后，您可以基于 Entra 帐户创建包含用户。您甚至可以基于 Entra 组创建用户。\n\n对于身份验证，您可以设置的一个选项是仅使用\
  \ Microsoft Entra 身份验证，正如我在这里为已部署的数据库所做的那样，如图 6-6 所示。\n\n![](img/496204_2_En_6_Fig6_HTML.jpg)\n\
  *图 6-6：逻辑服务器的 Microsoft Entra 选项*\n\n这与在 SQL Server 中仅使用 Windows 身份验证非常相似。与 SQL\
  \ 身份验证一样，我可以使用 Microsoft Entra 帐户创建其他登录名和包含用户。您应该知道，PowerShell 也支持使用 `Set-AzSqlServerActiveDirectoryAdministrator`\
  \ cmdlet 创建 Entra 管理员，而 az CLI 支持 `az sql server ad-admin create`。\n\n以 Entra 管理员身份连接到此用户数据库后，我可以基于另一个\
  \ Entra 帐户创建包含用户，如下所示（这是 Microsoft Entra 中的一个假设帐户）：\n\n```sql\nCREATE USER [troyward@microsoft.com]\
  \ FROM EXTERNAL PROVIDER;\nGO\n```\n\n然后，我将通过将此用户添加到 `db_datareader` 角色来授予其读取数据的权限：\n\
  \n```sql\nALTER ROLE db_datareader ADD MEMBER [troyward@microsoft.com];\nGO\n```\n\
  \n> **提示**：如果您想知道在应用程序中使用 Microsoft Entra 身份验证的各种连接字符串选项，请参阅我们文档中的此表：[`https://learn.microsoft.com/en-us/sql/connect/ado-net/sql/azure-active-directory-authentication`](https://learn.microsoft.com/en-us/sql/connect/ado-net/sql/azure-active-directory-authentication)。您会注意到\
  \ Azure Active Directory 这个旧名称仍然存在。\n\n### 托管标识\n\n使用 Microsoft Entra 身份验证的一个有趣选项是托管标识。托管标识是\
  \ Microsoft Entra 目录中的一个对象，它可以像用户一样“行动”，但不需要密码。因此，使用此选项进行身份验证通常被称为无密码身份验证。\n\n假设您将在\
  \ Azure 虚拟机中使用 SSMS 连接到 Azure SQL Database。您现在可以在 Entra 中创建一个托管标识，并将该标识分配给虚拟机。您还可以使用相同的标识启用\
  \ Azure SQL Database，并基于该标识创建一个登录名。\n\n现在，SSMS 可以在 VM 中使用该标识登录而无需密码。事实上，任何应用程序都可以使用令牌来获取\
  \ VM 中基于标识的登录访问权限。这是因为该标识被分配给了 VM 本身的边界。\n\n图 6-7 展示了其工作原理的可视化。\n\n![](img/496204_2_En_6_Fig7_HTML.jpg)\n\
  *图 6-7：使用无密码托管标识连接到 Azure SQL Database*\n\n让我展示一下这如何使用我部署的 Azure VM `bwsql2022`\
  \ 和我的逻辑服务器 `bwsqllogicalserver` 来工作：\n\n![](img/496204_2_En_6_Fig8_HTML.jpg)\n*图\
  \ 6-8：为逻辑服务器启用托管标识*\n\n1.  我使用以下文档步骤创建了一个用户分配的托管标识：[`https://learn.microsoft.com/entra/identity/managed-identities-azure-resources/how-manage-user-assigned-managed-identities`](https://learn.microsoft.com/entra/identity/managed-identities-azure-resources/how-manage-user-assigned-managed-identities)。我将此托管标识命名为\
  \ `bwadwidentity`。\n\n    > **注意**：还有一个系统分配的托管标识的概念，您可以直接为逻辑服务器启用。但是，它仅限于该服务器使用。我喜欢用户定义的托管标识，因为我可以将它们用于所有类型的\
  \ Azure 资源。\n\n2.  我现在可以为我的逻辑服务器启用此托管标识，正如您在图 6-8 中从 Azure 门户看到的那样，方法是选择“添加”，然后选择我已创建的标识。我还必须将此设置为服务器的主要标识并单击“保存”。\n\
  \n![](img/496204_2_En_6_Fig9_HTML.jpg)\n*图 6-9：为 Azure VM 分配托管标识*\n\n3.  现在我需要为此标识创建一个登录名。我将改为使此标识成为特定数据库的用户。因此，我将使用我的\
