  Entra ID 笔记本电脑上进行连接。要查看审计日志，我将导航到我的数据库 `bwhyperscale`，然后从服务菜单的“安全性”部分选择“审计”。接着在屏幕顶部选择“查看审计日志”。我的结果如图
  6-21 所示。


