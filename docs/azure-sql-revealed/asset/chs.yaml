  `主机组` 定义了一个用于你的虚拟机的 *Azure 专用主机*。`Azure 专用主机` 的主要好处是 *专用物理服务器*：该服务器由你的组织独占使用，确保没有其他客户共享相同的硬件。`容量预留`
  允许你在不长期承诺的情况下，在特定的 `Azure` 区域或可用性区域预留计算容量。我将在本章后面题为“预留实例、专用主机和容量预留”的一节中更详细地讨论这些主题。


  `邻近放置组` 是 `Azure` 中一个有趣的概念，它允许你请求多个 `Azure` 资源在 `Azure` 数据中心内尽可能靠近地放置，以提供尽可能低的网络延迟。如果连接到
  `Azure Virtual Machine` 中 `SQL Server` 的应用程序将托管在 `Azure` 中，这可能是一个值得考虑的选项。


  注意


  我不建议为 `Azure Virtual Machine` 中的 `SQL Server`（例如可用性组）使用邻近放置组作为高可用性解决方案。在这种情况下，你将使用称为可用性集或可用性区域的概念。我将在本章后面题为“HADR”的一节中讨论这些概念。


