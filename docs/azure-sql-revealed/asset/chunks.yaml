  trans: '

    对于团队而言，Sterling 实质上是在保留面向客户的数据库服务原则的前提下，对服务架构的一次重写。下一代 Azure SQL Database 也进行了一次“版本升级”，以突显这个被称为`v12`的新架构。`v12`还包含了
    SQL Server 代码库的合并。代码修复和新功能都可以在单个分支中完成，该分支将同时用于 SQL Server 和 Azure SQL Database。`v12`这个名称对客户来说有些令人困惑，因为它并未与某个特定的
    SQL Server 版本对应。我们将其命名为`v12`，是因为通过这个新架构，我们开放了更多 SQL Server 功能，如列存储和实例级诊断。我们不想破坏现有应用程序，因此将主版本号改为了`v12`（这对应于
    SQL Server 2014 的版本号`12.x`）。自那时起，Azure SQL Database 就变成了一个`无版本`的 SQL Server，我将在本书的第
    5 章中更详细地描述这一点。


    ## Rohan Kumar 与代码库合并


    Rohan Kumar，前 Azure 数据工程副总裁，在这一时期领导着 Azure SQL 的工程工作。关于代码库合并，他说：“从技术角度讲，我们做出的最重要的决定可能就是统一代码库。”事实上，Rohan
    被指派领导这个项目，该项目耗时约 18 个月，期间我们同时在维护和运行服务，并高质量地交付 SQL Server 的发布版本。


    ## Sterling 部署架构


    Sterling 架构涉及将 SQL Server 实例（及其他所需程序）作为一个`WinFab`应用程序来运行，或者实际上就是 Windows Azure
    术语中的工作角色。Azure SQL Database 部署到 Sterling 的一个有趣之处在于，每台主机只使用一台虚拟机，上面运行一个或多个 SQL
    Server 实例，每个实例承载一个租户数据库。


    注意


    你将在本书第 4 章中看到，Azure 托管实例可以在每台主机上组合使用多台虚拟机。


    图 1-7 源自 Peter Carlin 绘制的一张图表，用于从 SQL Server 实例、逻辑服务器和数据库的角度，展示 SAWA（及 AutoPilot）与
    Sterling 架构之间的主要区别。


    ![](img/496204_2_En_1_Fig7_HTML.jpg)


    图 1-7


    Sterling 架构的数据库隔离


    在此图中，节点是指虚拟机或服务器。实例是指一个`SQLSERVR.EXE`实例。集群是托管虚拟机的机器的逻辑集合。逻辑服务器实际上是一组描述数据库集合的元数据。


    请注意，在“旧服务”（SAWA 和 AutoPilot）中，来自两个不同逻辑服务器的数据库可以部署在同一个 SQL 实例上。而在 Sterling 架构下，每个实例都专用于一个逻辑服务器，但多个实例可以（但不必须）部署在同一台虚拟机（或节点）上。


    注意


    如今，除了少数例外情况（我将在第 4 章中介绍），几乎每个 Azure SQL Database 都有自己专用的 SQL 实例。


    ## Windows Fabric 的优势


    使用`Windows Fabric`还使我们能够在更靠近操作系统的层面提供更好的资源治理，提供到后端 SQL Server 的直接连接，并利用 Azure
    Storage 进行数据库和备份存储。`Windows Fabric`还以`集群`、`节点`和`环`的形式提供了容错和网络架构。在本书的后续章节中，你将了解更多关于这些概念以及
    Azure SQL Database 架构的其他方面。在本章及本书的其余部分，你还将了解我们如何基于 Sterling 架构创建了其他部署选项，包括弹性数据库、托管实例、超大规模和无服务器。经过漫长的旅程，Azure
    SQL Database `V12`于 2015 年春季正式发布。


    ## 新的 Azure 门户


    除了 Sterling 方面的工作，Microsoft Azure 也转向了基于 HTML（摆脱了 Silverlight）的`新门户体验`，用于所有 Azure
    服务，包括 Azure SQL Database。图 1-8 是 Scott Guthrie 在其博客文章存档中展示新门户的一张截图。


    ![](img/496204_2_En_1_Fig8_HTML.jpg)


    图 1-8


    Windows Azure 管理门户


    提示


    鉴于 Scott Guthrie 在 Azure 的长期任职，他的博客存档是了解 Azure 历史的绝佳途径！你可以在 `https://weblogs.asp.net/scottgu/archive`
    找到它们。

    '
- fmt: '### New Editions, the DTU, and Previews


    Independent of the new V12 architecture, we also realized the current editions
    of Azure SQL Database – Web and Business – were outdated both from a payment model
    and a predictable performance and choice perspective.


    The SLO work that had started before Sterling ultimately led to a preview of a
    new edition called `Premium`. In some cases, Premium customers were isolated to
    a single node to provide maximum performance. Along with the Sterling architecture,
    the concept of resource reservations and node isolation paves the way for a new
    edition suite and a self-service method to choose `sizes`.


    In April of 2014, we announced a new pricing model based on new editions, `Basic`,
    `Standard`, and `Premium`, and concept to materialize sizes called `performance
    tiers`. Performance tiers offered granularity within an edition for maximum database
    size and a SLO. To support a SLO, we introduced a new concept called a `Database
    Transaction Unit (DTU)`. We started this new model with a preview of these editions
    and tiers in April 2014. By this time, we allowed up to a 500GB for Premium editions.


    See the blog post and video of Scott Guthrie talking about these new models at
    [`https://weblogs.asp.net/scottgu/azure-99-95-sql-database-sla-500-gb-db-size-improved-performance-self-service-restore-and-business-continuity`](https://weblogs.asp.net/scottgu/azure-99-95-sql-database-sla-500-gb-db-size-improved-performance-self-service-restore-and-business-continuity).


    A DTU was a logical concept of measurement for a combined resource usage of CPU,
    I/O, and memory. The idea was to provide a metric to obtain more predictable performance
    and pay for resource usage. You will learn more details about SLO, tiers, and
    DTU throughout the rest of the book. By spring of 2015, we had also announced
    the retirement of Web and Business editions and had fully rolled out Basic, Standard,
    and Premium editions.


    With these new editions, we also introduced the concept of self-service database
    restore (point-in-time restore or PITR) and active geo-replication (our way of
    introducing Always On Availability Group replicas in the cloud).


    Another concept introduced during these years (and across all of Azure) was `private`
    and `public preview`. The SQL Server team had already shifted to the term Community
    Technology Preview (CTP) vs. “beta” builds before they released a version of SQL
    Server. New Azure services and enhancements to existing services started rolling
    out in previews. Since Microsoft hosted the software in the public cloud, they
    had the ability to `provision` specific customer subscriptions to use specific
    services and even features for services. A private preview required a customer
    to sign up to gain access to a new service or enhancement. A private preview was
    often free, limited in availability, and involved direct interaction between engineering
    and a customer (and the customer was in a non-disclosure agreement with us). A
    public preview was often open to the public. For a new service, it was sometimes
    free but most often involved a significantly discounted price. In most cases for
    a new feature for a service, public preview was free. Previews allowed Azure teams
    to move agile and fast, gain customer adoption and feedback very quickly, and
    eventually move to `General Availability (GA)`. You will learn in this book as
    a customer how to keep up with previews and announcements for Azure services and
    enhancements.


    Note

    You will read terms in the book like “went GA” or “went public preview” in the
    book to note when a service or feature was released.


    The preview system was also a great example of a new approach for the SQL team,
    namely, a `cloud-first` approach. Cloud first means that the SQL team could build
    out a new service or feature first in the cloud and then eventually allow that
    feature to appear in the next major release of SQL Server. Previews combined with
    a merged SQL codebase allowed for these types of motions to happen.


    As Peter Carlin tells it, with the cloud-first approach, “…we use service telemetry
    to learn what is wrong and needs to be improved, use that telemetry as we build
    and refine it via iterative deployments and then when we know it works well for
    the scenarios.”


    ### Intelligent Performance and the MDCS


    By the 2013 timeframe, the SQL engineering team had hired resources outside of
    Redmond. Microsoft had built a development center in Serbia called the Microsoft
    Developer Center Serbia (MDCS). You can read more about MDCS at [`https://www.microsoft.com/sr-latn-rs/mdcs`](https://www.microsoft.com/sr-latn-rs/mdcs).
    Our Azure SQL Database team assigned engineers from MDCS to form a data science
    team. One of the first tasks for this team was to investigate how to provide `value-added
    services` for Azure. Azure SQL Database was launched as a true PaaS service. Abstracting
    the developer from the details of SQL Server was important, and providing built-in
    HA and predictable performance were critical. However, our team wanted to see
    what type of additional services we could offer customers as part of the platform.


    Performance is perhaps one of the toughest problems within SQL Server to solve
    given how vague an issue can be (ever heard of “it is just slow”). Add to that
    the open nature of T-SQL and databases (bad indexes + bad queries = poor performance).
    Engineers Vladimir Ivanovic and Miroslav Grbic embarked on a project to see how
    machine learning at scale could improve performance for Azure SQL Database. As
    Miodrag Radulovic tells it, “The original intention was to leverage data science
    and ML at Azure scale to find a way to improve customer experience of using Azure
    SQL Database. Performance optimization was identified as one of the areas where
    the team could deliver pretty impactful improvements, especially for those novice
    users who are not that skilled in perf optimizing SQL Server engine.” Vladimir
    specifically said that index recommendations for performance were an area the
    team felt important to tackle. SQL Server had technologies to assist with index
    recommendations, namely, Dynamic Management Views and a tool called Database Tuning
    Advisor (DTA). Vladimir says, “We picked index recommendations since the technology
    was already partially available via missing indexes DMV and also DTA, and our
    initial analyses showed that a significant number of SQL DB customers could benefit
    from this.”


    The work for this project took some time to get it right. The work started in
    2014 and was released for public preview in July of 2015 known as `Database Tuning
    Advisor`. The functionality would use machine learning combined with existing
    SQL Server resources (including the Query Store) to recommend and even auto create/drop
    indexes. In January of 2016, the experience went GA and was named Automatic Tuning.
    You will learn more about the details of Automatic Tuning in Chapter 7 of this
    book.'
