  trans: '### 自动调优


    从技术上讲，**自动计划修正**是一套旨在通过自动化提升查询性能且无需修改代码的服务的一部分，这套服务称为 `自动调优`。自动计划修正适用于 SQL Server、Azure
    SQL 托管实例和 Azure SQL 数据库。


    在本书的第 1 章中，我讲述了自动调优功能的创建历史。Azure SQL 数据库提供了一项独特的自动调优功能，可帮助自动创建和删除索引，称为 `自动索引`。


    注意


    目前，自动索引功能不适用于 Azure SQL 托管实例。


    此功能被称为 `Azure SQL 数据库自动调优`（在部分文档中也称为 SQL 数据库顾问）。这些服务作为后台程序运行，分析来自 Azure SQL 数据库的性能数据，并包含在任何数据库订阅的价格中。自动调优将分析来自数据库遥测的数据，包括查询存储和动态管理视图，以推荐可提高应用程序性能的待建索引。此外，您可以启用自动调优服务，使其自动创建它认为能改善查询性能的索引。自动调优还将监控索引变更，并推荐或自动删除那些未能改善查询性能的索引。Azure
    SQL 数据库的自动调优采取保守的方法来推荐索引。这意味着，某些可能出现在 `sys.dm_db_missing_index_details` 等 DMV
    或查询执行计划中的建议，不一定会立即作为自动调优的推荐出现。自动调优服务会持续监控查询，并使用机器学习算法来做出真正影响查询性能的推荐。


    自动调优在索引推荐方面的一个缺点是，它没有考虑索引可能对插入、更新或删除操作造成的任何性能开销。


    注意


    您可以在 [`https://www.microsoft.com/research/uploads/prod/2019/02/autoindexing_azuredb.pdf`](https://www.microsoft.com/research/uploads/prod/2019/02/autoindexing_azuredb.pdf)
    阅读一篇关于我们的工程团队如何构建自动索引功能的优秀论文。


    Azure SQL 数据库自动调优的另一个预览版应用场景是参数化查询。使用非参数化值的查询可能导致性能开销，因为每次非参数化值不同时，执行计划都会重新编译。在许多情况下，具有不同参数值的相同查询会生成相同的执行计划。然而，这些计划仍会分别添加到计划缓存中。重新编译执行计划的过程会消耗数据库资源，增加查询持续时间，并导致计划缓存溢出。这些事件进而导致计划从缓存中被清除。可以通过在数据库上设置强制参数化选项来改变
    SQL Server 的此行为（通过执行带有 `PARAMETERIZATION FORCED` 选项的 `ALTER DATABASE` T-SQL 语句完成）。自动调优可以分析数据库上随时间推移的查询性能工作负载，并推荐对数据库启用强制参数化。如果随着时间的推移观察到性能下降，该选项将被禁用。


    让我们看一个自动索引实际运作的示例。我将在本章中使用一个基于 AdventureWorks 示例部署的数据库 `bwadw`（现在是一个超大规模 16 vCore
    数据库，但进行此示例并不需要 16 个 vCore）来展示此功能。您可以使用 `ch7_performance\tuning_recommendations`
    中的脚本自己尝试。此演示还需要 `ostress` 实用工具。


    连接到数据库后运行以下步骤：


    *   运行 `order_rating_ddl.sql` 脚本以创建表。

    *   编辑 `order_rating_insert.cmd` 文件，填入您的逻辑服务器、数据库、管理员登录名和密码。执行此脚本。此脚本使用 `order_rating_insert.sql`
    脚本向表中插入行。

    *   现在编辑 `query_order_rating.cmd` 脚本，填入您的逻辑服务器、数据库、管理员登录名和密码。执行此脚本。**注意：** 此脚本设计为至少运行
    12 小时。它使用 `query_order_rating.sql` 脚本针对一个没有索引的表反复执行查询。


    使用这些脚本时的主要问题是：这需要时间和耐心。为什么？我们的算法不仅仅根据单个查询和单次执行来推荐索引。我们会查看一段时间内的查询工作负载以及执行频率，以决定某个索引是否有意义。因此，当您自己尝试时，需要让此脚本运行完成（它会运行数千次迭代）。当我在
    12 小时内完成此操作时，我从 Azure 门户中看到了即将向您展示的信息。


    运行工作负载并等待 12 小时后，我可以在 Azure 门户的 `性能概述` 中看到我的性能图表和高亮显示的推荐，类似于图 7-31。


    ![](img/496204_2_En_7_Fig31_HTML.jpg)


    图 7-31


    Azure SQL 数据库的性能概述


    现在，让我们通过选择 `查询性能见解` 来仔细查看高 CPU 利用率背后的查询，如图 7-32 所示。


    ![](img/496204_2_En_7_Fig32_HTML.jpg)


    图 7-32


    Azure SQL 数据库的查询性能见解


    第一个查询消耗了所有 CPU，因此我可以选择它，然后会得到一个如图 7-33 所示的屏幕。


    ![](img/496204_2_En_7_Fig33_HTML.jpg)


    图 7-33


    来自性能见解的查询详细信息


    这为我提供了历史性能和查询文本。我可以点击此屏幕顶部的“建议”，但不如让我们返回 Azure 门户。在这里，我可以选择 `性能建议`，如图 7-34 所示。


    ![](img/496204_2_En_7_Fig34_HTML.jpg)


    图 7-34


    Azure SQL 数据库的性能建议


    在此屏幕上，您可以看到其中一条建议是创建新索引，且影响为“高”（这意味着它可能对提高性能有显著的积极影响）。


    我可以点击“创建索引”操作，获取有关推荐索引的更多详细信息，如图 7-35 所示。


    ![](img/496204_2_En_7_Fig35_HTML.jpg)


    图 7-35


    创建索引建议


    在此屏幕上，我可以获取有关如何构建索引、其对性能的影响以及构建它所需预计存储空间的详细信息。此时，我可以选择屏幕顶部的“应用”来创建索引。我也可以选择“查看脚本”以获取
    T-SQL 命令的详细信息，如图 7-36 所示。


    ![](img/496204_2_En_7_Fig36_HTML.jpg)


    图 7-36


    创建索引脚本


    您可以看到，在线索引是自动索引使用的默认方法。


    假设您喜欢这些建议，甚至希望考虑让 Azure 自动查找并创建它们。您可以从 Azure 门户选择 `自动调优` 来更改这些选项，如图 7-37 所示。


    ![](img/496204_2_En_7_Fig37_HTML.jpg)


    图 7-37


    Azure SQL 数据库的自动调优选项'
- fmt: 'You have options to force plan (automatic plan correction), create, and drop
    indexes. You can set these options at the subscription, logical server, or database
    level. The `DROP` index is a nice feature here because it could be that data changes
    in such a way that an index is no longer needed and could be hurting performance.


    You also have another way to see recommendations for indexes on the Overview screen
    for the database (or even across databases on the logical server overview) just
    like Figure [7-38](#496204_2_En_7_Chapter.xhtml#Fig38).


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig38_HTML.jpg)


    Figure 7-38


    Database notifications


    You can also view Automatic Tuning options through the catalog view `sys.database_automatic_tuning_options`.
    You can view all the columns for this catalog view at [`https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-database-automatic-tuning-options-transact-sql`](https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-database-automatic-tuning-options-transact-sql).


    ## Summary


    To deliver the best performance for your application, you need the capabilities
    and monitor tools that are tried and proven from SQL Server. Azure SQL gives you
    that and more, including capabilities and tools specific to Azure.


    Azure SQL gives you the controls and options to accelerate and tune performance,
    including the ability to scale easily with no database migration required or deploy
    a Serverless Hyperscale database for autoscale compute and storage.


    Finally, Azure SQL comes with intelligent performance capabilities built into
    the query processor and services that leverage the power of Query Store from your
    database.


    In the next chapter, we will explore and dive deep into the final core engine
    capability of Azure SQL: availability.


    # 8. Availability for Azure SQL


    You have now made the journey from deploy to configure to security and then to
    scale, monitor, and tune performance. The final piece of the *core* of Azure SQL
    is **availability**. I have rarely talked to a SQL Server customer over the years
    that didn’t need their database to be highly available. I also almost never talk
    to a customer who doesn’t care about being able to recover from a disaster. Therefore,
    this chapter is really about **High Availability and Disaster Recovery (HADR)**
    for Azure SQL. I will tell you that in my opinion after now assessing and using
    Azure SQL over this last year, the built-in capabilities for HADR for Azure SQL
    are one of the great stories of the service. In fact, I believe after you go through
    this chapter you will be convinced that looking at Azure SQL as a target for your
    deployment is worth it just on the HADR capabilities alone.


    In this chapter, we will spend the majority of time diving into the details of
    HADR capabilities, including backup and restore, built-in availability, extending
    HADR with Azure, and database availability and consistency. Then I’ll finish the
    chapter on how to monitor HADR for your deployment.


    This chapter will contain examples for you to try out and use as you read along.
    For you to try out any of the techniques, commands, or examples I use in this
    chapter, you will need


    *   An Azure subscription.

    *   A minimum of Contributor role access to the Azure subscription. You can read
    more about Azure built-in roles at [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles).

    *   Access to the Azure Portal.

    *   I will use several Azure SQL Databases and a Managed Instance I deployed earlier
    in this book. I also deployed a new Azure SQL Business Critical service tier database
    that uses the AdventureWorksLT sample for one of the examples.

    *   To connect to Managed Instance, you will need a *jumpbox* or virtual machine
    in Azure to connect. I showed you how to do this in Chapter [4](#496204_2_En_4_Chapter.xhtml)
    of the book. One simple way to do this is to create a new Azure Virtual Machine
    and deploy it to the same virtual network as the Managed Instance (you will use
    a different subnet than the Managed Instance).

    *   To connect to Azure SQL Database, I’m going to use the Azure VM I deployed
    in Chapter [3](#496204_2_En_3_Chapter.xhtml), called `bwsql2022`, and configured
    for a private endpoint in Chapter [6](#496204_2_En_6_Chapter.xhtml) (you could
    use another method as long as you can connect to the Azure SQL Database).

    *   Installation of the `az` CLI (see [`https://learn.microsoft.com/cli/azure/install-azure-cli`](https://learn.microsoft.com/cli/azure/install-azure-cli)
    or more details). You can also use the Azure Cloud Shell instead since `az` is
    already installed. You can read more about the Azure Cloud Shell at [`https://azure.microsoft.com/features/cloud-shell/`](https://azure.microsoft.com/features/cloud-shell/).

    *   Installation of Azure PowerShell. Use the following documentation on how to
    install Azure PowerShell for your client: [`https://learn.microsoft.com/powershell/azure/install-azure-powershell`](https://learn.microsoft.com/powershell/azure/install-azure-powershell).
    I installed Azure PowerShell in my Azure VM and any client where I might do examples
    from this chapter.

    *   You will run some T-SQL in this chapter, so install a tool like SQL Server
    Management Studio (SSMS) at [`https://aka.ms/ssms`](https://aka.ms/ssms). I installed
    both SSMS in the `bwsql2022` Azure Virtual Machine.

    *   For this chapter, I have script files you can use for some of the examples.
    You can find these scripts in the `ch8_availability` folder for the source files
    included for the book. I will also use the very popular tool `ostress.exe` for
    exercises in this chapter which comes with the RML Utilities. You can download
    RML from [`https://aka.ms/ostress.exe`](https://aka.ms/ostress.exe). Make sure
    to put the folder where RML gets installed in your system path (which is by default
    `C:\Program Files\Microsoft Corporation\RMLUtils`).

    *   I also use Database Watcher and Microsoft Copilot skills in Azure SQL Database
    in this chapter, but this is optional for you to use.


    ## HADR Capabilities


    I want to first review with you the amazing HADR capabilities that come with Azure
    SQL before we dive deeper with examples into each topic.


    ### Automatic Backups and Point-in-Time Restore


    Azure SQL is SQL Server, so the full complement of `BACKUP` and `RESTORE` functionality
    is possible. However, the promise of PaaS is to provide **managed capabilities**.
    Therefore, Azure SQL provides an automated backup system for both Managed Instance
    and Databases to meet your Recovery Point Object (RPO) and historical data needs.
    In fact, for Azure SQL Database, you are completely abstracted from the `BACKUP`
    T-SQL statement. Managed Instance will allow a `COPY_ONLY` backup to Azure Storage.


    All backups from Azure SQL are kept on separate storage from your database and
    log files with automated geo-redundant mirrors. Azure SQL also offers a long-term
    backup retention option.


    Azure SQL will use full, differential, and log backups supporting a complete point-in-time
    restore interface. In addition, you have these restore capabilities:


    *   Restore deleted databases.

    *   Managed Instance supports the `RESTORE` T-SQL statement from Azure Blob Storage
    which could be from an on-premises SQL Server backup or a `COPY_ONLY` backup from
    a Managed Instance.

    *   Remember as mentioned earlier in the book, a versioned Managed Instance allows
    you to restore a backup to SQL Server 2022.'
