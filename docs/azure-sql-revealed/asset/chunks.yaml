- fmt: 'And finally, thanks to you, the community who support and help us promote
    the amazing story of `SQL Server` and `Azure SQL`. Many of you have made the journey
    to migrate to `Azure`, and some are still in that process or thinking about it.
    Thank you all `#sqlfamily` for putting your passion and energy into everything
    that is `SQL`.


    **About the Author** **About the Technical Reviewer**


    # 1. SQL Server Rises to the Clouds


    In late 2005, Microsoft as a company was humming (I’m a little biased here) in
    the enterprise space and so was the `SQL Server` product. In October of 2005,
    we were close to releasing `SQL Server 2005` (codename `Yukon`) which was unfortunately
    five years in the making (that is a story for another book – just ask Paul Randal).
    I was in Microsoft support in those days, and despite the delay in getting `SQL
    Server 2005` to market, I was very proud of the release. Windows, Windows Server,
    Office, and Xbox 360 were all popular products from Microsoft.


    In October of 2005, an architect new to Microsoft named Ray Ozzie sent an internal
    email to several executives at Microsoft (which eventually was sent to all employees,
    including a 12-year veteran named Bob Ward) called *The Internet Services Disruption*
    (the email leaked to the Web fairly quickly, which you can read at [`https://www.cnet.com/news/ozzie-memo-internet-services-disruption/`](https://www.cnet.com/news/ozzie-memo-internet-services-disruption/)).
    I remember hearing about the email leak and some of its contents as an employee
    but didn’t pay much attention. Wasn’t the Internet just for email and web browsing?
    In that email, Ray Ozzie painted a picture of Microsoft becoming a `cloud provider`
    vs. just a “traditional software company.” Microsoft only really had a few “Internet
    services” offerings at the time which included the legendary Hotmail email service
    (which had existed since 1997), the Bing search service, and Xbox Live. The email
    from Ray Ozzie painted a picture for something far bigger.


    One of the key statements from this email was “…All Business Groups have been
    asked to develop their plans to embrace this mission and create new service offerings
    that deliver value to customers and utilize the platform capabilities that we
    have today and are building for the future.” Little did I know how much behind
    the scenes work would kick in within the `SQL Server` team to develop plans for
    this statement.


    Ray Ozzie became the Chief Software Architect of Microsoft in the summer of 2006
    (taking the role held by Bill Gates), and this email would set the stage for what
    would become known as `Azure`. `SQL Server` was destined to become a huge part
    of it.


    ## CloudDB


    In early 2006, Paul Flessner, Vice President of the Data Storage and Platform
    division of Microsoft, decided to step down as the leader of `SQL Server` and
    turn over the reins to Ted Kummert. When Ted took over to lead `SQL Server`, a
    project was already underway to look at cloud services led by Technical Fellow
    Peter Spiro, who was a chief architect for several `SQL Server` releases, including
    `SQL Server 7.0`, `2000`, and `2005`. Peter formed a team which included several
    engineers. Among them was an architect still at Microsoft today: Ajay Kalhan.
    The team embarked on a project to build a cloud-based service to host databases.
    They called it `CloudDB`. As Ted tells it, “We needed to build a cloud version
    of `SQL`. Our goal was to build a `serverless` or Platform as a Service (`PaaS`)
    `SQL`. A customer wouldn’t worry about a server or VM, just a database.”


    To build a cloud-based database service, the team needed to build out a robust
    design to support the concept of hosting multiple customers or “databases” isolated
    from each other using shared resources. This concept is called `multi-tenant`.


    Note


    The term `tenant` can mean many things in the cloud. For `CloudDB` in the beginning,
    a tenant referred to a database owned by a customer. You will see throughout this
    book the word tenant, but I’ll be clear about the scope of what I mean when using
    the term.


    According to Ajay Kalhan, from the beginning the `CloudDB` team started working
    out designs to incorporate concepts such as failure detection, logical master
    (think of a “metadata” master not physical), load balancing, and deployment. Early
    designs even looked at the idea of a “key value store” instead of traditional
    relational database concepts. Not long after the team was building out the design
    for `CloudDB`, Ted assigned David Campbell to also work on the project and lead
    the team toward a true mission of “`SQL Server` in the Cloud.”


    The team believe it needed an internal customer to help `dogfood` the project
    and prove they could host customers. That internal customer would become a public-facing
    cloud service called `Exchange Hosted Archive (EHA)` (an email archive solution
    in the cloud predating Office 365). For this internal customer, early designs
    to support multi-tenants (which in this case even though there was one internal
    customer, that customer serviced the needs of multiple customers) used a concept
    called `silos` where a `SQL Server` could host multiple databases, but tenants
    were partitioned within the database itself. `EHA` became one of the first `Software
    as a Service` (`SaaS`) services at Microsoft to use our cloud-based database service.
    Think of `SaaS` as purchasing software on a subscription basis and using the software
    from a hosted solution, like in `Azure`. You just focus on using an application
    hosted somewhere other than your computers. Since `SQL Server` hosted the back-end
    databases, the team forked the codebase of `SQL Server 2005` to use for the service.


    While the `CloudDB` team was working on their project with a goal to support `EHA`
    and other customers, another team at Microsoft was chartered by Ray Ozzie to look
    at how to host `compute services` in the cloud.'
