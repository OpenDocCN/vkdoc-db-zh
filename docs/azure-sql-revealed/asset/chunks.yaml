    来自 Azure SQL 的 SQL Server 2022 库映像


    出于本示例的目的，我将选择 SQL Server 2022 Enterprise。这使我能够在本章剩余部分向你展示一些配置选择。你本可以轻松选择 Free
    SQL Server 2022 Developer on Windows Server 2022。对于此映像选择，SQL Server 许可是免费的，但你只能将该
