- fmt: '### Accounts, Port, and OS Licensing


    To finish off the default screen to deploy SQL Server in a virtual machine, you
    must provide an administrator account and password. For Windows, this becomes
    the local admin account and for Linux a root user. For a SQL Server gallery image
    deployment on Windows, this local admin account is automatically added to the
    `sysadmin` role (just like you would add yourself during SQL Server setup). The
    password for the admin account can be between 12 and 123 characters and must be
    a strong password with at least 3 of the following characters: 1 lower case, 1
    upper case, 1 number, and 1 special character.


    The next choice is to decide whether any ports for the virtual machine will be
    opened and available for inbound traffic. By default, port 3389 which is used
    by the Remote Desktop Connection (`RDP`) protocol is selected (for Linux, this
    would be port 22 which is the default port for the `ssh` protocol). Using this
    option is the most flexible but not the most secure option. I will leave this
    option for now, but later in this chapter in the section called “Connecting to
    Your VM,” I will talk about using different security options.


    The final choice involves licensing for Windows deployments. When you choose a
    SQL Server gallery image with Windows, your license will be a `pay as you go`
    subscription for both SQL Server and Windows. This basically means you pay each
    month for a fixed cost of using Windows and SQL Server. You also pay cost for
    resource usage based on CPU usage and storage. If you own existing licenses for
    Windows Server, you can apply those licenses to your Azure Virtual Machine cost.
    You can read more about using Azure Hybrid Benefit for Windows Server at [`https://aka.ms/azurehybridbenefit`](https://aka.ms/azurehybridbenefit).


    Figure [3-7](#496204_2_En_3_Chapter.xhtml#Fig7) shows the rest of the portal screen
    to fill out these options.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig7_HTML.jpg)


    Figure 3-7: Choosing account, port, and license


    At this point in the deployment process, you can click `Review+Create` and deploy
    your VM with other default options. However, let’s look at some of the other sections
    and why you might want to use them, especially the SQL Server Settings.


    ### Making Configuration Choices As Part of Deploy


    Let us look at the other options you can select as part of deploying SQL Server
    for Azure Virtual Machine.


    #### OS Disks


    Select `Next: Disks >` to see the options as seen in Figure [3-8](#496204_2_En_3_Chapter.xhtml#Fig8).


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig8_HTML.jpg)


    Figure 3-8: Disk options for Azure Virtual Machine during deployment


    The disk options presented here are for encryption at the host level and options
    for the disk supporting the operating system and other system files. While for
    all SQL Server deployments I recommend you choose the default options provided
    here, including premium managed disks, it is worth investigating the option called
    `Encryption at Host`, which will encrypt all disks at rest on the host. I will
    talk more about different types of managed disks you can use with SQL Server for
    Azure Virtual Machine in the section called “Maximizing Storage Performance.”
    I will recommend you take advantage of managed disks with SQL Server for the simple
    advantage of fault tolerance, but you may want to read more about unmanaged and
    ephemeral disks. You can read more about managed disks at [`https://learn.microsoft.com/azure/virtual-machines/managed-disks-overview`](https://learn.microsoft.com/azure/virtual-machines/managed-disks-overview).


    **Note:** If you install just an operating system image from the marketplace (e.g.,
    Windows Server), you would get options here to add data disks. For SQL Server
    marketplace images, you will be able to add data disks in the configuration section
    below called “SQL Server Settings” or after you have deployed.


    #### Networking


    Now click `Next: Networking >`. Here, you are going to be presented with a set
    of choices to configure various aspects of networking for your virtual machine
    as seen in Figure [3-9](#496204_2_En_3_Chapter.xhtml#Fig9).


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig9_HTML.jpg)


    Figure 3-9: Networking options during deploy for Azure Virtual Machine


    The two options you may want to consider changing are the virtual network and
    subnet if this virtual machine needs to be included in an `existing` Azure virtual
    network. Notice in this example, a new virtual network will be created, including
    a name that contains my new VM. If you would have selected an existing resource
    group on the first screen to deploy, the virtual network associated with that
    resource group (if one exists) would be selected. I will discuss more about networking
    options for Azure Virtual Machine in the section later in this chapter called
    “Networking.”


    The only other option I want to call out on this screen that I believe applies
    to your SQL Server on Azure Virtual Machine deployments is `accelerated networking`.
    Accelerated networking can be extremely beneficial for SQL Server deployments
    where client applications must communicate across a virtual network to SQL Server.
    Therefore, you may want to choose a VM size (or a VM size with the required number
    of CPUs) that supports accelerated networking. If you plan to just deploy SQL
    Server in a virtual machine and do everything inside the virtual machine, you
    do not need to worry about this option. You can read more about the benefits of
    accelerated networking at [`https://learn.microsoft.com/azure/virtual-network/accelerated-networking-overview`](https://learn.microsoft.com/azure/virtual-network/accelerated-networking-overview).


    **Note:** You can later change the size of the virtual machine and then enable
    accelerated networking using PowerShell. You can read more about how to do this
    at [`https://learn.microsoft.com/azure/virtual-network/create-vm-accelerated-networking-powershell`](https://learn.microsoft.com/azure/virtual-network/create-vm-accelerated-networking-powershell).


    There is one other option I’ve not shown here called `Load Balancing options`.
    While this option may be helpful for some application scenarios, for SQL Server
    a load balancer is not needed even for Always On Availability Groups (AG). I’ll
    discuss more about how to set up connectivity for an AG in the section titled
    “HADR” later in this chapter.'
