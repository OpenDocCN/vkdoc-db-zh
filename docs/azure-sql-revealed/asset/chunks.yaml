- fmt: '### Deploying with a CLI


    An Azure Managed Instance can be deployed with command-line interfaces (CLI) through
    the `az sql mi` ([https://learn.microsoft.com/cli/azure/sql/mi](https://learn.microsoft.com/cli/azure/sql/mi))
    command interfaces or through the `New-AzSQLInstance` PowerShell cmdlet ([https://learn.microsoft.com/powershell/module/az.sql/new-azsqlinstance](https://learn.microsoft.com/powershell/module/az.sql/new-azsqlinstance)).


    I went down the path to build an example with `az sql mi` and found that I needed
    to run several `az` CLI commands to create the virtual network, subnet, and all
    associated settings. Therefore, I only recommend you use the `az sql mi` CLI with
    *Azure templates*. An example template can be found at [https://learn.microsoft.com/azure/azure-sql/managed-instance/create-template-quickstart?view=azuresql&tabs=azure-cli](https://learn.microsoft.com/azure/azure-sql/managed-instance/create-template-quickstart%3Fview%3Dazuresql%26tabs%3Dazure-cli).


    **Tip**


    Just like I showed you how to use Copilot in Azure to create a database using
    the `az` CLI, it can also give you tips and examples on how to do this for Azure
    SQL Managed Instance. It also offers options to help you configure a virtual network
    and subnets.


    PowerShell requires you to set up the virtual network and other context before
    executing `New-AzSQLInstance`. There is a good tutorial on using PowerShell at
    [https://learn.microsoft.com/azure/azure-sql/managed-instance/scripts/create-configure-managed-instance-powershell](https://learn.microsoft.com/azure/azure-sql/managed-instance/scripts/create-configure-managed-instance-powershell).


    As I mentioned earlier in this chapter, you have options to deploy an Azure SQL
    Managed Instance with both Bicep and Terraform.


    ### Implementation Details


    **Note**


    These implementation details may change over time as we change and improve the
    service. I offer up some of these details, so you can understand how we build,
    manage, and run the service.


    Azure SQL Managed Instances are deployed on nodes (virtual machines) powered by
    Azure Service Fabric in a concept called a *ring* or *virtual cluster*. A virtual
    cluster is a dedicated set of isolated virtual machines that run in a virtual
    network subnet.


    When you deploy your first managed instance in a new virtual network (subnet)
    as I did in my example, you are in fact deploying an entire virtual cluster. This
    explains why the initial deployment can take so long to complete. You can deploy
    other managed instances in the *same virtual network subnet*, and the deployment
    is slightly faster. Read more about specific expected times at [https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview).


    A managed instance is a full SQL Server engine database instance deployed in a
    dedicated virtual machine in the virtual cluster. Microsoft will decide how to
    deploy these virtual machines on various nodes of the cluster. It is possible
    that a node may have one virtual machine with an instance or multiple virtual
    machines. As per the promise of Platform as a Service (PaaS), Microsoft abstracts
    you from those details. Your interface with the Managed Instance is through either
    standard SQL Server interfaces such as T-SQL or Azure interfaces such as the portal,
    CLI, or REST API. You will never directly access the underlying virtual machines.


    This architecture also explains why certain management operations such as scaling
    vCores can also take a long period of time as some of these operations require
    a deployment of a new virtual cluster with either attaching files from Azure Storage
    or reseeding a replica.


    I described some of the architecture of General Purpose (GP) vs. Business Critical
    (BC) tiers in Chapter [2](#496204_2_En_2_Chapter.xhtml) of the book. I will describe
    them further in Chapter [8](#496204_2_En_8_Chapter.xhtml) of the book. Either
    of these service tiers use the same virtual cluster architecture just with different
    storage and HA implementations.


    `Resource limits` for a Managed Instance such as memory limits, max storage size,
    and others are enforced through several mechanisms depending on your choices for
    deployment. For example, memory limits are enforced with Windows Job Objects (and
    you cannot configure `“max server memory”`). You can read more about *Windows
    Job Objects* at [https://learn.microsoft.com/en-us/windows/win32/procthread/job-objects](https://learn.microsoft.com/en-us/windows/win32/procthread/job-objects).
    Storage capacity (or max size) is enforced by the File Server Resource Manager
    (FSRM), which you can read more about at [https://learn.microsoft.com/windows-server/storage/fsrm/fsrm-overview](https://learn.microsoft.com/windows-server/storage/fsrm/fsrm-overview).


    A *Managed Instance pool deployment* can be far faster because an instance pool
    can be a set of SQL Server instances running in the same virtual machine. Isolation
    and resource limits are applied using Windows Job Objects. Figure [4-11](#496204_2_En_4_Chapter.xhtml#Fig11)
    represents a visual comparing managed instance and pools. This figure comes from
    the documentation at [https://learn.microsoft.com/en-us/azure/azure-sql/managed-instance/instance-pools-overview?view=azuresql#architecture](https://learn.microsoft.com/en-us/azure/azure-sql/managed-instance/instance-pools-overview%3Fview%3Dazuresql%23architecture).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig11_HTML.jpg)

    Figure 4-11: The Managed Instance and pool architecture


    ### Connecting and Verifying Deployment


    Once your deployment is complete, your screen should look like Figure [4-12](#496204_2_En_4_Chapter.xhtml#Fig12).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig12_HTML.jpg)

    Figure 4-12: Deployment complete for Managed Instance


    Let’s look at a few details on this screen:


    1. If you want a summary of the deployment, you can select `Operation Details`,
    which among other things can show you the duration of the deployment.

    2. You can get more details about each step of the deployment by selecting `More
    events` in the Activity Log.

    3. You can select `Go to Resource` to see your completed deployment in the Azure
    Portal.


    If you click `Go to Resource`, you will see a screen like in Figure [4-13](#496204_2_En_4_Chapter.xhtml#Fig13).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig13_HTML.jpg)

    Figure 4-13: The Overview screen for Azure SQL Managed Instance


    One of the first steps you will want to take at this point is try and connect
    to the new instance and verify the deployment. I like to verify my SQL Server
    installations with a set of simple T-SQL queries.'
