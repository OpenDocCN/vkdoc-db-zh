  trans: '

    ## 故障转移测试


    系统会提示输入微软身份验证所需的 MFA 验证码。随后会显示订阅列表以设置上下文。选择正确的序号并回车。


    1.  编辑脚本，为测试做准备。


    编辑脚本 `querybase_bc.cmd`，填入你的服务器、数据库、登录名和密码。编辑脚本 `failoverbase_bc.ps1`，填入你的资源组、服务器和数据库。如果不确定资源组，可以在逻辑服务器或数据库的“概览”屏幕中查找。


    2.  在一个命令窗口中，执行 `querybase_bc.cmd` 来启动测试。命令应类似于以下内容：


    ```cmd

    ostress.exe -Sbwsqllogicalserver.database.windows.net -Q"SELECT COUNT(*) FROM
    SalesLT.Customer" -Usqladmin -dbwsqlbc -P -n1 -r50000 -T146

    ```


    这将循环显示表中的行数。


    3.  在另一个命令窗口中，执行 `failoverbasedb.cmd` 脚本。脚本应类似于以下内容：


    ```powershell

    $resourceGroup = "bwsqldbrg"

    $server = "bwsqllogicalserver"

    $database = "bwsqlbc"

    Invoke-AzSqlDatabaseFailover -ResourceGroupName $resourceGroup -ServerName $server
    -DatabaseName $database

    ```


    命令成功执行后，会直接返回到命令行界面。请注意，此命令在数据库上下文*之外*执行故障转移，并需要适当的 Azure RBAC 权限（例如，贡献者级别可执行此操作）。


    在你运行 `ostress` 的另一个命令窗口中，应开始看到连接故障转移错误。几秒钟内，你应该会看到 `ostress` 程序重新连接并再次开始显示行数。


    现在，你可以观察到在部署的 Azure SQL Database 发生故障转移时，应用程序的重新连接速度有多快。


    关于这次故障转移测试，有几点值得注意：


    *   通用用途服务层级的故障转移耗时会更长，因为它使用共享存储，并且需要启动一个新节点。

    *   针对 Azure SQL 托管实例有一个等效的命令：`Invoke-AzSqlInstanceFailover`。

    *   每 15 分钟只能执行一次手动故障转移。


    ## Hyperscale 可用性


    到目前为止，我已经在本书的几个章节中描述了 Azure SQL Database 的 Hyperscale 服务层级的独特特性。让我们进一步深入探讨 Hyperscale
    架构的各个部分，包括其处理可用性的有趣方式。


    让我们看一下图 8-10 中 Hyperscale 架构的可视化示意图，并更详细地描述其可用性相关的组件。


    ![](img/496204_2_En_8_Fig10_HTML.jpg)


    图 8-10. Hyperscale 可用性


    `主计算节点` 是 Hyperscale 部署的主副本。Hyperscale 有零到四个辅助高可用性副本，表示为 `辅助计算节点`。我稍后会讨论副本的工作方式。主计算节点承载着你的数据库的
    SQL Server 实例。这个 SQL Server 拥有标准组件，如用于托管数据库页面的缓冲池。此外，在这个主计算节点上，还有位于本地存储上的 `tempdb`
    数据库以及一个 RBEX *缓存*。Hyperscale 中的缓存都是位于本地 SSD 存储上的文件。RBEX 代表弹性缓冲池扩展。它与缓冲池扩展相似，但并不完全相同（你可以在
    [`https://learn.microsoft.com/sql/database-engine/configure-windows/buffer-pool-extension`](https://learn.microsoft.com/sql/database-engine/configure-windows/buffer-pool-extension)
    阅读更多内容）。其概念是，如果一个查询需要一个数据库页面，而该页面不在缓冲池中，它将首先尝试从 RBEX 读取该页面。


    如果一个页面在计算节点缓冲池或 RBEX 缓存中都不可用怎么办？我们部署了一组 `页面服务器`。页面服务器是装有 SQL Server 的节点，这些服务器在内存中托管数据库页面，并由另一个
    RBEX 缓存覆盖。页面服务器是*成对*部署的，以实现冗余和高可用性。Azure SQL 会确定适当的页面服务器数量来支持部署和数据库大小。请记住，对于 Hyperscale，你无需选择最大的数据库大小。我们只是通过页面服务器和
    Azure 存储来持续增长和扩展系统，以满足你的数据库大小需求。


    提示


    我们现在支持一种方法来收缩你的 Hyperscale 数据库以节省空间和成本。详情请见：[`https://techcommunity.microsoft.com/t5/azure-sql-blog/public-preview-shrink-for-azure-sql-database-hyperscale/ba-p/4181976`](https://techcommunity.microsoft.com/t5/azure-sql-blog/public-preview-shrink-for-azure-sql-database-hyperscale/ba-p/4181976)。


    如果查询所需的数据库页面既不在计算节点上，也不在页面服务器上怎么办？支持你数据库的数据库文件存储在 Azure 标准存储中。为了最大化性能，这种架构在极少需要前往
    Azure 存储检索数据库页面时效果最佳。当页面服务器首次启动时，它们会从 Azure 存储上的数据库文件中播种页面。然后，页面服务器将填充主节点（以及存在的辅助节点）上的
    RBEX 缓存。如果一个页面不在主计算节点的缓冲池中，但我们在节点的 RBEX 缓存中找到了它，这被视为*缓存命中*。如果页面不在 RBEX 中，我们会尝试从页面服务器（或其
    RBEX 缓存）获取页面，但这被视为*缓存未命中*。

    '
- fmt: '## Azure SQL Hyperscale架构


    将数据库文件存放在Azure Storage上，对于Hyperscale的自动备份和时间点恢复有一个主要优势。由于数据文件在Hyperscale缓存系统预热后很少被访问，我们可以使用`snapshot
    backups`来备份数据库。此功能非常类似于使用Azure虚拟机的文件快照备份，详见[`https://learn.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure`](https://learn.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure)。快照备份对Hyperscale来说是一个巨大的优势，因为它们不影响应用程序操作，并且数据库的恢复速度极快。与其他Azure
    SQL选项一样，备份存储在与数据和日志文件分离的冗余存储上。


    这个模型还有另一个部分尚未讨论。事务日志怎么办？Hyperscale将事务日志I/O从主节点重定向到`Log Service`。计算节点仍然有日志缓存，但当需要I/O刷新日志记录时，它们会由SQL
    Server引擎引导到`Log Service`。`Log Service`在不同的节点上运行。它有自己的日志缓存（本地SSD存储）、使用Azure Premium
    Storage的日志存储（称为`landing zone`），以及使用Azure Standard Storage的冗余存储（称为`long-term log
    storage`）。我们永远不需要备份事务日志。快照备份和长期日志存储的结合可以用来恢复到某个时间点。


    `Log Service`接收日志更改，然后将这些更改反馈给页面服务器和副本（如果存在）。这意味着，虽然Hyperscale使用日志更改来更新副本，但它并不使用`Always
    On Availability Groups`的底层技术来保持副本同步。


    Hyperscale的一个有趣方面是数据库页面I/O。对于计算节点，脏页不会写入数据库文件。计算节点上的热页被写入`RBEX cache`，因此它们随时可用。页面服务器通过`Log
    Service`的日志更改进行更新。因此，任何类型的检查点I/O都从页面服务器发生到Azure Storage上的数据库文件。这非常好，因为它从计算节点卸载了任何数据库文件I/O。


    我之前提到过可以有零到四个辅助HA副本的概念。你可能想知道，零副本的架构如何支持内置高可用性？因为底层数据库和事务日志文件位于Azure Storage上（而不是本地存储），如果我们需要执行故障转移，只需预配一个新节点，数据将从底层页面服务器（由Azure
    Storage支持）同步。此外，与所有Azure SQL一样，启用了`Accelerated Database Recovery (ADR)`，因此当新的计算节点上线或辅助副本成为主节点时，恢复到一致状态的速度极快。Hyperscale分布式架构的每个方面都是容错的。


    如果我们预置了辅助副本，故障转移（与其他Azure SQL架构一样，与Azure Service Fabric集成）当然会更快，因为我们只需切换到其中一个节点成为新的主节点。此外，如果您的应用程序以只读意向连接数据库，Azure
    SQL会在所有可用的辅助副本之间进行负载均衡。


    除了四个HA副本，您最多还可以有30个`named replicas`。HA副本可以使用`ApplicationIntent`连接字符串的`ReadOnly`属性用于读取工作负载。`Named
    replicas`专为读取扩展而设计（但不用于故障转移）。它们有自己唯一的数据库名称，并且是严格只读的，因此不需要特殊的连接字符串属性。您可以在[`https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale-replicas?view=azuresql#named-replica`](https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale-replicas?view=azuresql#named-replica)阅读更多关于如何使用命名副本的信息。


    关于Hyperscale的一站式指南可以在[`https://aka.ms/hyperscale`](https://aka.ms/hyperscale)找到。


    **提示**


    请记住，由于Hyperscale的独特架构，部署后无法将服务层级更改为通用型或商业关键型。您必须导出数据并导入到新层级。如果您从通用型迁移到Hyperscale，可以回退一次。这是一个“数据规模”操作，因此数据库越大，回退所需的时间就越长。


    ## 使用Azure扩展HADR


    虽然Azure SQL的内置可用性确实是您考虑迁移到云端的一个主要优势，但还有更进一步的方法，可以使用Azure构建更多的可用性和灾难恢复解决方案。


    这包括区域冗余、异地复制、故障转移组和使用托管实例链接进行灾难恢复。此外，了解Azure SQL服务级别协议如何满足您的需求非常重要。这包括我们如何管理和限制某些活动，以及部署创新技术（如热修补）以最大化正常运行时间。'
  raw: 'Having database files on Azure Storage has one major advantage for automated
    backups and point-in-time restore for Hyperscale. Because the data files are infrequently
    accessed once the Hyperscale caching system is *warm*, we can back up the database
    using **snapshot backups**. This capability is very similar to using file-snapshot
    backups with Azure Virtual Machine as documented at [`https://learn.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure`](https://learn.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure).
    Snapshot backups are a huge advantage for Hyperscale because they don’t affect
    application operations and the restore of a database is extremely fast. Just like
    other Azure SQL options, backups are stored on redundant storage separate from
    the data and log files.


    There is another piece I haven’t discussed yet from this model. What about the
    transaction log? Hyperscale redirects a transaction log I/O from the primary node
    to a **Log Service**. Compute nodes still have a log cache, but when an I/O is
    needed to flush log records, they are directed by the SQL Server engine to the
    Log Service. The Log Service runs on a different node. It has its own log cache
    (local SSD storage), log storage with Azure Premium Storage called the *landing
    zone*, and redundant storage with Azure Standard Storage called long-term log
    storage. We never have to back up the transaction log. A combination of snapshot
    backups and long-term log storage can be used to restore to a point in time.


    The Log Service receives logged changes and then feeds these changes to update
    page servers and replicas (if they exist). This means that while Hyperscale uses
    logged changes to feed replicas, it doesn’t use the exact underlying technology
    of Always On Availability Groups to keep replicas in sync.


    One interesting aspect to Hyperscale is database page I/O. For the compute node,
    dirty pages are not written to a database file. Hot pages on the compute node
    are written to RBEX cache, so they are readily available. Page servers are updated
    through logged changes with the Log Service. Therefore, any type of checkpoint
    I/O happens from a page server to database files on Azure Storage. This is very
    nice as it offloads any database file I/O from the compute node.


    I mentioned earlier the concept that you can have zero to four secondary HA replicas.
    You may be asking how can this architecture support built-in high availability
    with zero replicas? Because the underlying database and transaction log files
    are on Azure Storage (and not on local storage), if we need to execute a failover,
    we simply provision a new node, and data will be synchronized from underlying
    page servers (which are backed by Azure Storage). Furthermore, like all of Azure
    SQL, Accelerated Database Recovery (ADR) is enabled, so when the new compute node
    comes online or a secondary replica becomes the primary, recovery to get to a
    consistent state is extremely fast. Every aspect of the Hyperscale distributed
    architecture is fault tolerant.


    If we have secondary replicas provisioned, failover (which like other Azure SQL
    architectures is integrated with Azure Service Fabric) is of course much faster
    because we can just switch to one of those nodes to become the new primary node.
    In addition, if your application connects to the database with read intent, Azure
    SQL will load-balance across all available secondary replicas.


    In addition to four HA replicas, you can have up to an additional 30 **named replicas**.
    HA replicas can be used for read workloads using an ApplicationIntent connection
    string for ReadOnly. Named replicas are specifically designed for read scale (but
    are not used for failover). They have their own unique database name and are strictly
    read-only, so do not need a special connection string attribute. You can read
    more about how to use named replicas at [`https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale-replicas?view=azuresql#named-replica`](https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale-replicas?view=azuresql#named-replica).


    Your one-stop guide to Hyperscale can be found at [`https://aka.ms/hyperscale`](https://aka.ms/hyperscale).


    Tip


    Remember, because of the unique architecture of Hyperscale, you cannot change
    the service tier to General Purpose or Business Critical once you deploy. You
    would have to export out your data and import into the new tier. You can go back
    one time if you move from General Purpose to Hyperscale. This is a “size of data”
    operation, so the larger the database, the longer it takes to revert back.


    ## Extend HADR with Azure


    While the built-in availability of Azure SQL is really a major advantage for you
    to consider moving to the cloud, there are ways to go even further and build in
    more availability and disaster recovery solutions with Azure.


    This includes zone redundancy, geo-replication, failover groups, and disaster
    recovery with managed instance link. In addition, it is important to understand
    how the promise of the Azure SQL Service-Level Agreement meets your needs. This
    includes how we govern and limit certain activity and deploy innovative technologies
    like hot patching to maximize uptime.'
  trans: '## Azure SQL Hyperscale 架构


    将数据库文件存放在 Azure Storage 上，对于 Hyperscale 的自动备份和时间点恢复有一个主要优势。由于数据文件在 Hyperscale
    缓存系统预热后很少被访问，我们可以使用`snapshot backups`来备份数据库。此功能非常类似于使用 Azure 虚拟机的文件快照备份，详见[`https://learn.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure`](https://learn.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure)。快照备份对
    Hyperscale 来说是一个巨大的优势，因为它们不影响应用程序操作，并且数据库的恢复速度极快。与其他 Azure SQL 选项一样，备份存储在与数据和日志文件分离的冗余存储上。


    这个模型还有另一个部分尚未讨论。事务日志怎么办？Hyperscale 将事务日志 I/O 从主节点重定向到`Log Service`。计算节点仍然有日志缓存，但当需要
    I/O 刷新日志记录时，它们会由 SQL Server 引擎引导到`Log Service`。`Log Service`在不同的节点上运行。它有自己的日志缓存（本地
    SSD 存储）、使用 Azure Premium Storage 的日志存储（称为`landing zone`），以及使用 Azure Standard Storage
    的冗余存储（称为`long-term log storage`）。我们永远不需要备份事务日志。快照备份和长期日志存储的结合可以用来恢复到某个时间点。


    `Log Service`接收日志更改，然后将这些更改反馈给页面服务器和副本（如果存在）。这意味着，虽然 Hyperscale 使用日志更改来更新副本，但它并不使用`Always
    On Availability Groups`的底层技术来保持副本同步。


    Hyperscale 的一个有趣方面是数据库页面 I/O。对于计算节点，脏页不会写入数据库文件。计算节点上的热页被写入`RBEX cache`，因此它们随时可用。页面服务器通过`Log
    Service`的日志更改进行更新。因此，任何类型的检查点 I/O 都从页面服务器发生到 Azure Storage 上的数据库文件。这非常好，因为它从计算节点卸载了任何数据库文件
    I/O。


    我之前提到过可以有零到四个辅助 HA 副本的概念。你可能想知道，零副本的架构如何支持内置高可用性？因为底层数据库和事务日志文件位于 Azure Storage
    上（而不是本地存储），如果我们需要执行故障转移，只需预配一个新节点，数据将从底层页面服务器（由 Azure Storage 支持）同步。此外，与所有 Azure
    SQL 一样，启用了`Accelerated Database Recovery (ADR)`，因此当新的计算节点上线或辅助副本成为主节点时，恢复到一致状态的速度极快。Hyperscale
    分布式架构的每个方面都是容错的。


    如果我们预置了辅助副本，故障转移（与其他 Azure SQL 架构一样，与 Azure Service Fabric 集成）当然会更快，因为我们只需切换到其中一个节点成为新的主节点。此外，如果您的应用程序以只读意向连接数据库，Azure
    SQL 会在所有可用的辅助副本之间进行负载均衡。


    除了四个 HA 副本，您最多还可以有 30 个`named replicas`。HA 副本可以使用`ApplicationIntent`连接字符串的`ReadOnly`属性用于读取工作负载。`Named
    replicas`专为读取扩展而设计（但不用于故障转移）。它们有自己唯一的数据库名称，并且是严格只读的，因此不需要特殊的连接字符串属性。您可以在[`https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale-replicas?view=azuresql#named-replica`](https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale-replicas?view=azuresql#named-replica)阅读更多关于如何使用命名副本的信息。


    关于 Hyperscale 的一站式指南可以在[`https://aka.ms/hyperscale`](https://aka.ms/hyperscale)找到。


    **提示**


    请记住，由于 Hyperscale 的独特架构，部署后无法将服务层级更改为通用型或商业关键型。您必须导出数据并导入到新层级。如果您从通用型迁移到 Hyperscale，可以回退一次。这是一个“数据规模”操作，因此数据库越大，回退所需的时间就越长。


    ## 使用 Azure 扩展 HADR


    虽然 Azure SQL 的内置可用性确实是您考虑迁移到云端的一个主要优势，但还有更进一步的方法，可以使用 Azure 构建更多的可用性和灾难恢复解决方案。


    这包括区域冗余、异地复制、故障转移组和使用托管实例链接进行灾难恢复。此外，了解 Azure SQL 服务级别协议如何满足您的需求非常重要。这包括我们如何管理和限制某些活动，以及部署创新技术（如热修补）以最大化正常运行时间。'
- fmt: '## Zone Redundancy


    I mentioned in Chapter [2](#496204_2_En_2_Chapter.xhtml) of the book features
    of the Azure ecosystem, including regions and data centers. One of the capabilities
    you can take advantage of to infuse `high availability` is to deploy with `Azure
    Availability Zones`. We call this capability for Azure SQL `zone redundancy`.
    `Availability Zones` are a collection of unique physical locations within a region.
    Each zone in the collection is made up of multiple data centers. Zone redundancy
    is available for `General Purpose` (with an extra charge) and `Business Critical`
    service tiers (included) for both `Azure SQL Managed Instance` and `Azure SQL
    Database`. Check on region availability for these options because they may not
    be available in all Azure regions. In addition, you can also enable zone redundancy
    for `Hyperscale`. Earlier in this chapter, I talked about backup redundancy, including
    zones. In this section, the focus is on redundancy of the storage of your database
    and log files and compute.


    Let’s look at each service tier architecture and see how it looks after enabling
    zone redundancy. Figure [8-11](#496204_2_En_8_Chapter.xhtml#Fig11) shows the `General
    Purpose` service tier with zone redundancy.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig11_HTML.jpg)


    *Figure 8-11. General Purpose service tier with zone redundancy*


    First, notice that data and log files now use `Zone Redundant Storage (ZRS)` with
    Azure. This means these files are synchronized across all three zones (which means
    there can be a small performance degradation for this operation). At any given
    time, the primary replica or compute for `SQL Server` for the database is in a
    specific zone. Zone redundancy allows Azure to use a new node in a different zone
    should a failover occur. Notice at the top of the figure, gateways used to connect
    are also zone redundant routed through a traffic manager.


    `Business Critical` service tier deployments now look like Figure [8-12](#496204_2_En_8_Chapter.xhtml#Fig12).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig12_HTML.jpg)


    *Figure 8-12. Business Critical service tier with zone redundancy*


    You can see in this figure the replicas for the BC tier are distributed across
    zones, so any failover can occur in a different zone should it be necessary. Storage
    is local to each replica. Like the GP tier, gateways are distributed across zones
    supported by a traffic manager.


    Finally, Figure [8-13](#496204_2_En_8_Chapter.xhtml#Fig13) shows the `Hyperscale`
    architecture with zone redundancy.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig13_HTML.jpg)


    *Figure 8-13. Hyperscale with zone redundancy*


    You can see in Figure [8-13](#496204_2_En_8_Chapter.xhtml#Fig13) that replicas,
    page servers, the log service, and data files are all zone redundant. In order
    to use zone redundancy, you must have at least one `HA` replica. Figure [8-14](#496204_2_En_8_Chapter.xhtml#Fig14)
    shows how to enable zone redundancy for a `Hyperscale` database during deployment.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig14_HTML.jpg)


    *Figure 8-14. Enabling zone redundancy for Hyperscale*


    > **Note**

    > You can only choose zone redundancy for `Hyperscale` at database creation time.
    Your backup redundancy must be zone redundant (or geo-zone-redundant) if you choose
    this option for `Hyperscale`.


    ## Geo-replication


    Let’s say you want to go even further and make your database resilient *across*
    Azure regions. Azure SQL Database supports a concept called `geo-replication`.
    Geo-replication uses `Always On Availability Group` technology to *asynchronously*
    transmit log changes to another Azure SQL Database deployment on a different logical
    server. The secondary database can be in a different Azure region or the same
    Azure region. Secondary databases can be used for replica purposes.


    > **Note**

    > Using a geo-replicated database in the same region can give a `General Purpose`
    service tier a read replica or expand the number of replicas for a `Business Critical`
    service tier (which by default gets one).


    Geo-replicated databases can be used for failover purposes which include unexpected
    Azure region events or to support an application upgrade with minimal downtime.
    However, failover is a manual process initiated by an administrator through Azure
    interfaces or through `T-SQL` (`ALTER DATABASE`).


    Let’s see how to create a geo-replicated database in another region for a database
    I’ve deployed and used in the book called `bwadw`, which is a `Hyperscale` database.


    I’ll navigate to my database in the Azure portal and select `Replicas` under `Data
    Management` like in Figure [8-15](#496204_2_En_8_Chapter.xhtml#Fig15).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig15_HTML.jpg)


    *Figure 8-15. Creating a geo-replica of a Hyperscale database*


    Notice at the top of the screen that, as mentioned earlier in this chapter, I
    can create a standby replica if I use the `General Purpose` or `Business Critical`
    service tier on my source database which can provide cost savings if the replica
    is passive.


    I can on this screen select `Create Replica` and am presented with a screen very
    much like deploying a new database. You can see some of my choices in Figure [8-16](#496204_2_En_8_Chapter.xhtml#Fig16).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig16_HTML.jpg)


    *Figure 8-16. Deployment geo-replica details*


    I can use this same experience to create a named replica as I mentioned earlier
    in this chapter. Notice I’m choosing a different logical server in a different
    region as the deployment location, but the database name is the same. One of the
    nice features for geo-replication is that the database can be in the same region
    and even with the same logical server. This is an example of extending out a read
    scale-out scenario for `General Purpose` service tier deployments or giving you
    an additional read replica for `Business Critical` service tier deployments (or
    even a `Hyperscale` database with zero replicas).


    The deployment creates a new database of the same name as the primary on the new
    logical server and then performs an initial synchronization called `seeding`.
    When this operation is complete, you can see the status of the new secondary like
    Figure [8-17](#496204_2_En_8_Chapter.xhtml#Fig17).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig17_HTML.jpg)


    *Figure 8-17. A geo-replicated secondary database after seeding*


    Any changes from my primary are asynchronously sent to the secondary (to avoid
    blocking primary workload transactions). In addition, I can now connect to `bwadwserver.database.windows.net`
    and perform read operations against the `bwadw` database. The database is read
    only, so any modification operations would fail. When I connect to the geo-replicated
    secondary database, I don’t need any special connection string option. Azure SQL
    supports up to four secondary databases configured with geo-replication.


    > **Tip**

    > You are allowed to create geo-secondary databases based on a geo-replicated
    secondary database, thus giving you even more read replica. This is called *chaining*,
    but know that these chained secondaries will likely have a lag of data synchronization
    the further you build the chain.'
