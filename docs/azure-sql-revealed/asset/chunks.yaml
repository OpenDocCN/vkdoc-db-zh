- fmt: "### Azure SQL SLA\n\n部署 Azure SQL 托管实例和数据库的 SQL Server 的优势之一是其高可用性保证。我在本章描述的架构有助于实现这一承诺。该承诺以**服务级别协议\
    \ (SLA)** 的形式为您提供。您可以查看 Azure SQL 的官方 SLA：[`https://azure.microsoft.com/support/legal/sla/sql-database`](https://azure.microsoft.com/support/legal/sla/sql-database)。\n\
    \nAzure SLA 意味着微软将确保我们维持一定的**服务级别**，否则您的账户将有资格获得信用额度。服务级别以“九”的形式表示，即您部署的可用性保证百分比。\n\
    \n例如，如果您部署具有“业务关键型”或“高级”服务层级的 Azure SQL 数据库并使用区域冗余，您的 SLA 为 99.995%。如果查看像 [`https://en.wikipedia.org/wiki/High_availability`](https://en.wikipedia.org/wiki/High_availability)\
    \ 这样的表格，您会看到 99.995% 被定义为“四个九”，意味着您每年最多可能经历 26.30 分钟或每月 2.19 分钟的*停机时间*。其他部署选项具有不同的服务级别承诺。\n\
    \n如果查看我们的 SLA 文档，停机时间定义为“…在给定的 Microsoft Azure 订阅中，所有数据库累积的部署分钟总数，在此期间数据库不可用。如果在一分钟内，客户尝试建立到该数据库的所有连续连接尝试均失败，则该分钟被视为对给定数据库不可用。”\n\
    \nAzure SQL 的某些特性使我们能够做出这些 SLA 承诺，包括但不限于：\n\n*   内置可用性及与 Azure Service Fabric\
    \ 的集成\n*   强制实施资源限制，例如日志治理\n    > **Note**\n    >\n    > 有多种原因说明 PaaS 服务需要日志治理。这包括数据库可恢复性、高可用性、灾难恢复和可预测的性能。了解更多：[`https://azure.microsoft.com/blog/resource-governance-in-azure-sql-database/`](https://azure.microsoft.com/blog/resource-governance-in-azure-sql-database/)。\n\
    *   启用数据库选项，如加速数据库恢复 (Accelerated Database Recovery)。\n\n我们在 Azure SQL 中用于最大化可用性的一项创新技术是**热修补\
    \ (hot patching)**。热修补允许我们在不重启 SQL Server 的情况下修补 SQL Server 引擎代码。阅读关于热修补的精彩故事：[`https://azure.microsoft.com/blog/hot-patching-sql-server-engine-in-azure-sql-database/`](https://azure.microsoft.com/blog/hot-patching-sql-server-engine-in-azure-sql-database/)。\n\
    \n## 数据库可用性与一致性\n\n对于 SQL Server，您可能熟悉用于实现或限制数据库可用性或执行高级恢复场景的功能和工具。此外，SQL Server\
    \ 提供了工具来确保数据库从物理和逻辑角度保持一致。\n\n通常，Azure SQL 在这方面不提供相同水平的高级功能，主要是因为服务内置的高冗余和可用性水平使得这些功能并非必需。\n\
    \n让我们研究一下其中的几个领域，以便在与 SQL Server 比较时，您的知识更加完整。\n\n### 数据库可用性\n\n您可能曾需要在 SQL Server\
    \ 中使用 `ALTER DATABASE` 将数据库状态更改为 `OFFLINE` 或 `EMERGENCY` 以进行高级恢复场景。您无权使用这些选项，但在了解了\
    \ Azure SQL 的所有内置功能和我们的 SLA 之后，您不禁要问，这重要吗？在我看来（相信我，多年来我在支持工作中曾使用这些选项帮助过客户），答案是否定的。\n\
    \n对于 Azure SQL 数据库和托管实例，虽然您不能将数据置于单用户模式，但 Azure SQL 数据库允许您使用 `RESTRICTED_USER`\
    \ 选项。了解更多：[`https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options)。\n\
    \n在 SQL Server 2005 年，我和我的同事 Robert Dorr 在微软支持部门工作，我们说服了工程团队创建一种连接到“挂起服务器”的简单方法。结果就是专用管理员连接\
    \ (DAC) 功能。Azure SQL *支持* DAC。了解更多：[`https://learn.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators`](https://learn.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators)。\n\
    \n### 加速数据库恢复 (ADR)\n\n在我的书《SQL Server 2019 Revealed》中，我介绍了加速数据库恢复 (ADR) 的精彩故事。SQL\
    \ Server 管理员再也不必担心长时间的数据库恢复或失控的事务日志。ADR 不仅仅是一个功能；它是 Azure SQL 可用性故事的一部分！事实上，对于\
    \ Azure SQL，它只是引擎的一部分，并非真正需要您开启或关闭的东西。您可以在我们的文档 [`https://learn.microsoft.com/azure/azure-sql/accelerated-database-recovery`](https://learn.microsoft.com/azure/azure-sql/accelerated-database-recovery)\
    \ 或我们工程团队撰写的白皮书 [`https://aka.ms/sqladr`](https://aka.ms/sqladr) 中了解更多关于 ADR 工作原理的信息。\n\
    \n### 数据库一致性\n\n所有 Azure SQL 数据库都使用 `CHECKSUM` 选项进行配置以确保数据库一致性。使用 PaaS 服务的好处之一是，我们的工程团队拥有自动化流程来检查因校验和问题等问题导致的任何不一致，并采取纠正措施。例如，如果您部署的是“业务关键型”服务层级，我们可以发出在线自动页面修复（了解更多关于其工作原理的信息：[`https://learn.microsoft.com/sql/sql-server/failover-clusters/automatic-page-repair-availability-groups-database-mirroring`](https://learn.microsoft.com/sql/sql-server/failover-clusters/automatic-page-repair-availability-groups-database-mirroring)）。\n\
    \n此外，如果您担心任何数据库一致性问题，请记住以下事实：\n\n*   “常规用途”和“超大规模”层级将数据库和日志文件存储在 Azure 存储上，默认情况下有三个副本进行镜像。\n\
    *   “业务关键型”层级始终有三个其他副本可用，并拥有自己的存储。\n*   我们的工程团队在我们的服务中内置了数据完整性和一致性警报监控。如果自动化无法解决问题，我们将直接通知客户并采取必要步骤以确保数据恢复和一致性。如果我们认为可以在无数据丢失的情况下修复问题，我们可能会采取此操作，而您可能永远无需被通知。\n\
    *   Azure SQL 支持 `DBCC CHECKDB`（但不支持修复选项），以便您随时手动检查数据库一致性。\n*   我们增加了针对数据库的“丢失写入”和“过时读取”检测的检查，我们在某些情况下发现这可能是由于底层\
    \ I/O 系统问题造成的。\n\n我在第 1 章作为 Azure SQL 历史一部分提到的微软副总裁 Peter Carlin，有一篇很好的博文概述了我们在\
    \ Azure 中为管理数据库数据完整性所做的一切。阅读他的文章：[`https://azure.microsoft.com/blog/data-integrity-in-azure-sql-database`](https://azure.microsoft.com/blog/data-integrity-in-azure-sql-database/)。"
  raw: '### Azure SQL SLA


    One of the advantages to deploy SQL Server with Azure SQL Managed Instance and
    Database is the promise of availability. Our architecture which I’ve described
    in this chapter helps us achieve this promise. The promise for you is in the form
    of a **Service-Level Agreement (SLA)**. You can view the official SLA for Azure
    SQL at [`https://azure.microsoft.com/support/legal/sla/sql-database`](https://azure.microsoft.com/support/legal/sla/sql-database).


    The Azure SQL SLA means that Microsoft will ensure we maintain a **service level**,
    or you will be eligible for a credit for your account. Service levels are stated
    in terms of *nines*. Nines are a percentage of uptime or availability you are
    guaranteed for your deployment.


    As an example, if you deploy an Azure SQL Database with the Business Critical
    or Premium service tier and use zone redundancy, your SLA is 99.995%. If you look
    at a table like [`https://en.wikipedia.org/wiki/High_availability`](https://en.wikipedia.org/wiki/High_availability),
    you can see that 99.995% is defined as “four and a half nines” and means you could
    experience at maximum 26.30 minutes per year or 2.19 minutes per month of *downtime*.
    Other deployment options have different service-level promises.


    If you look at our SLA documentation, downtime is defined as “…the total accumulated
    Deployment Minutes across all Databases in a given Microsoft Azure subscription
    during which the Database is unavailable. A minute is considered unavailable for
    a given Database if all continuous attempts by Customer to establish a connection
    to the Database within the minute fail.”


    There are certain aspects to Azure SQL which allow us to make these SLA promises,
    including but not limited to


    *   Built-in availability and integration with the Azure Service Fabric


    *   Enforcing resource limits such as log governance


    Note


    There are several reasons why log governance is needed to manage PaaS services.
    This includes database recoverability, high availability, disaster recovery, and
    predictable performance. Learn more at [`https://azure.microsoft.com/blog/resource-governance-in-azure-sql-database/`](https://azure.microsoft.com/blog/resource-governance-in-azure-sql-database/).


    *   Enabling database options such as Accelerated Database Recovery.


    One innovative technology we use in Azure SQL to maximize availability is **hot
    patching**. Hot patching allows us to patch the SQL Server engine code without
    restarting SQL Server. Read the amazing story of hot patching at [`https://azure.microsoft.com/blog/hot-patching-sql-server-engine-in-azure-sql-database/`](https://azure.microsoft.com/blog/hot-patching-sql-server-engine-in-azure-sql-database/).


    ## Database Availability and Consistency


    For SQL Server, you may be familiar with features and tools to make or restrict
    the availability of your database or perform advanced recovery scenarios. In addition,
    SQL Server provides tools to ensure the database is consistent, both from a physical
    and logical perspective.


    Azure SQL in general does not provide the same level of advanced capabilities
    in this area mainly because they are not needed given the high level of redundancy
    and availability built into the service.


    Let’s examine a few of these areas, so your knowledge can be more complete when
    comparing to SQL Server.


    ### Database Availability


    You may have needed with a SQL Server to change the database state with ALTER
    DATABASE to OFFLINE or EMERGENCY for advanced recovery scenarios. You don’t have
    access to use these options, but after reading about all of the built-in capabilities
    of Azure SQL and our SLA, you have to ask, does it matter? In my opinion (and
    believe me I’ve used these options to help customers over the years in support),
    the answer is no.


    With Azure SQL Database and Managed Instance, while you cannot put the data in
    single-user mode, Azure SQL Database allows you to use the option RESTRICTED_USER.
    Learn more at [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options).


    In SQL Server 2005, my colleague Robert Dorr and I were in Microsoft support and
    convinced the engineering team to create a simple method to connect into a “hung
    server.” The result was a feature called Dedicated Admin Connection (DAC). DAC
    *is supported* for Azure SQL. Learn more at [`https://learn.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators`](https://learn.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators).


    ### Accelerated Database Recovery (ADR)


    In my book, *SQL Server 2019 Revealed*, I covered the amazing story of Accelerated
    Database Recovery (ADR). No longer will a SQL Server administrator worry about
    long-running database recovery times or out-of-control transaction logs. ADR is
    not just a feature; it is part of the Azure SQL availability story! In fact, for
    Azure SQL it is just part of the engine and not really something you turn on or
    off. You can learn more about how ADR works in our documentation at [`https://learn.microsoft.com/azure/azure-sql/accelerated-database-recovery`](https://learn.microsoft.com/azure/azure-sql/accelerated-database-recovery)
    or in the whitepaper written by our engineering team at [`https://aka.ms/sqladr`](https://aka.ms/sqladr).


    ### Database Consistency


    All Azure SQL databases are configured using the CHECKSUM option for database
    consistency. One of the benefits of using a PaaS service is that our engineering
    team has automation to check for any inconsistencies due to issues like a checksum
    problem and take correction action. For example, if you are deploying a Business
    Critical service tier, we can issue an online automatic page repair (learn more
    about how this works at [`https://learn.microsoft.com/sql/sql-server/failover-clusters/automatic-page-repair-availability-groups-database-mirroring`](https://learn.microsoft.com/sql/sql-server/failover-clusters/automatic-page-repair-availability-groups-database-mirroring)).


    In addition, keep in mind these facts if you are concerned about any database
    inconsistency issue:


    *   General Purpose and Hyperscale store database and log files on Azure Storage
    which is mirrored by default with three copies.


    *   Business Critical tiers have three other replicas always available with their
    own storage.


    *   Our engineering team has built-in data integrity and consistency alert monitoring
    in our service. If automation can’t solve the problem, we will directly notify
    a customer and take necessary steps to ensure data is restored and consistent.
    If we think we can repair a problem with no data loss, we might take this action,
    and you never have to be notified.


    *   Azure SQL does support DBCC CHECKDB (but not repair option) for you to manually
    check your database consistency at any time.


    *   We’ve added checks for databases for “lost write” and “stale read” detection
    which we have seen in some situations occur due to an underlying I/O system issue.


    Peter Carlin, Vice President at Microsoft, who I mentioned as part of Azure SQL
    history in Chapter [1](#496204_2_En_1_Chapter.xhtml), has a very nice blog post
    outlining all the things we do to manage data integrity for your database in Azure.
    Read his post at [`https://azure.microsoft.com/blog/data-integrity-in-azure-sql-database`](https://azure.microsoft.com/blog/data-integrity-in-azure-sql-database/)[`/`](https://azure.microsoft.com/blog/data-integrity-in-azure-sql-database/).'
