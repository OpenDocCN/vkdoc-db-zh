    SQL Server 数据库和日志文件的持久存储，称为 *数据磁盘*。尽管选择有限，但有各种虚拟机 *大小* 供客户选择部署 SQL Server，包括 CPU
    数量、内存、磁盘数量和最大容量。除了为虚拟机配置提供这些选择外，Windows Azure 团队还提供了一个系统，使得像 SQL Server 这样的团队能够通过
    *库映像* 或 *市场* 的概念，为预装了 SQL Server 的完整部署虚拟机提供客户选择。现在，用户可以选择一个虚拟机配置和一个 SQL Server
    版本，再做一些其他选择，点击一个按钮，即可在 10-15 分钟内在 Azure 中托管的虚拟机中访问一个完整部署的 SQL Server。然后，你可以使用远程桌面等程序连接到
    VM，然后开始使用。此外，Azure 虚拟机服务还包括 SLA 和可用性集（更新域和故障域）。


    Azure 虚拟机的初始发布使用了托管云服务的相同 Windows Fabric。SQL Server 团队实际上是 Windows Azure 部署虚拟机的“内部客户”。SQL
    团队部署的主要接口和系统称为 `RDFE` (Red Dog Front End)。该系统后来被亲切地称为 *经典* 虚拟机。如今，经典系统已被 Azure
    资源管理器 (ARM) 系统取代，你将在本书的其他地方了解更多相关信息。


    虽然最初的 Azure 虚拟机经典系统受到客户欢迎，但它给 SQL Server 团队带来了问题。磁盘性能是一个突出问题，我记得在 Azure VM 的早期，作为一名微软支持工程师，我与客户一起努力解决这些问题。此外，使用
    RDFE 在部署带有 SQL Server 的虚拟机以及提供健壮的编程接口来部署和管理虚拟机方面也带来了一些挑战。


    尽管如此，该服务很受欢迎，并且对于 SQL Server 在 Azure 中的成功至关重要。现在，那些认为 SQL Azure 无法满足其需求的客户有了另一个选择。他们仍然可以在
    Azure 中使用虚拟机在公有云中托管 SQL Server。正如 Guy 告诉我的那样，“Azure VM 上的 SQL Server 产品在 Azure
    VM 发布后，被证明是最受欢迎和最成功的产品之一。”'
- fmt: "# Becoming Azure SQL Database\n\nBy the summer of 2012, Microsoft started\
    \ branding SQL Azure as `Windows Azure SQL Database`. There was no official branding\
    \ news that I could ever find. My research and internal discussions on our teams\
    \ were that we just decided to start calling the service `SQL Database` to highlight\
    \ the fact that the service is all about “Database as a Service” abstracting the\
    \ details of SQL Server instance from the user.\n\nIn 2014, Microsoft changed\
    \ the branding of Windows Azure to `Microsoft Azure`, or just Azure, so the current\
    \ name of Azure SQL Database came to life.\n\n> **Note**\n> \n> The branding of\
    \ Microsoft Azure was significant to the future of Azure. Windows was and still\
    \ is a dominant force for operating systems. However, since the launch of Azure\
    \ Virtual Machine, Linux virtual machines have become incredibly popular. With\
    \ the branding of Microsoft Azure or just Azure, we were sending a signal to the\
    \ industry that Azure is more than just a Windows cloud.\n\nAs SQL Azure started\
    \ to mature, other engineers from the “traditional” SQL Server team started to\
    \ come onboard, including Conor Cunningham. One of Conor’s goals was to work directly\
    \ with customers to make them successful with SQL Azure. This included internal\
    \ customers such as `Team Foundation Services` (TFS). Conor to this day still\
    \ works with TFS (which has morphed into Azure DevOps) and their success with\
    \ Azure SQL. According to Conor, “They are one of our best ISVs using the platform\
    \ and they help us make SQL Azure better every day.”\n\nThere were also important\
    \ external customers who wanted to harness the power of Azure. One of the largest\
    \ and most notable customers Conor and many on the team worked with was `Pottermore`.\
    \ Around 2012, all the `Harry Potter` movies had been released, but the popularity\
    \ of the books and movies was massive. Therefore, the Pottermore company decided\
    \ to build a website experience for fans. And they chose Windows Azure and SQL\
    \ Azure to power the website experience (see the full story at [`https://news.microsoft.com/2012/06/06/pottermore-new-website-based-on-the-hugely-popular-harry-potter-books-uses-windows-azure-to-scale-up-to-1-billion-page-views-in-first-two-weeks/`](https://news.microsoft.com/2012/06/06/pottermore-new-website-based-on-the-hugely-popular-harry-potter-books-uses-windows-azure-to-scale-up-to-1-billion-page-views-in-first-two-weeks/)).\n\
    \n> **Note**\n> \n> Pottermore (see [`https://en.wikipedia.org/wiki/Pottermore`](https://en.wikipedia.org/wiki/Pottermore))\
    \ is actually a company, and the previous Pottermore website is now officially\
    \ wizardingworld.com.\n\nPottermore was an interesting test for the SQL Azure\
    \ team. This project involved many databases and concurrent users. As Conor tells\
    \ it, “We clearly didn’t want to disappoint all the Harry Potter fans of the world,\
    \ but we also learned a lot about how to design things that scale.” As with any\
    \ innovation, projects like these were ambitious but also became a foundation\
    \ of knowledge to improve the future.\n\nMicrosoft support also experienced big\
    \ shifts to deal with the cloud. My longtime colleague and friend Keith Elmore\
    \ (the famous author of the popular ostress tool), formerly in CSS but now in\
    \ the engineering team with me, was involved in Azure support from the beginning.\
    \ He told me that supporting Azure had some interesting challenges but also opened\
    \ new possibilities. Keith said, “There was a major shift in how we could troubleshoot.\
    \ We no longer had to ask customers to capture a lot of troubleshooting data as\
    \ we did in the on-premises environment but could immediately access a large set\
    \ of Azure telemetry to assess the general nature of their problem, and often\
    \ narrow down the specific issue.” Supporting the cloud presented a new expectation\
    \ from customers to deliver a solution fast. Microsoft now owned the “back end”\
    \ so data that customers normally had completely control over obtaining was not\
    \ possible for them in Azure. According to Keith, “the expectation of resolving\
    \ a large percentage of your support cases in a day or less was radical. The team\
    \ rallied around how we could organize ourselves and leverage this Azure telemetry\
    \ to resolve most issues in one day.” You will learn about some of the resources\
    \ Azure provides customers for support and troubleshooting later in this book.\n\
    \n## The Sterling (SAWAv2) Project\n\nBy 2013 and 2014 timeframe, Azure SQL Database\
    \ had many different successful customers, but the legacy architecture even running\
    \ on SAWA was starting to show its age through different problems and customer\
    \ experiences like TFS and Pottermore:\n\n*   As much as we made changes in the\
    \ infrastructure, one thorny problem cropped up all the time, called the `noisy\
    \ neighbor` problem. A customer could consume resources for one database that\
    \ could adversely affect another. We needed a solution where each tenant (database)\
    \ had their own SQL Server instance. This would allow us to use features like\
    \ SQL Server Resource Governor.\n*   We also felt a lot of pressure to open more\
    \ of the T-SQL surface area for SQL Azure customers. Since multiple tenants shared\
    \ a SQL Server instance, this was a major problem. For example, how do we present\
    \ a Dynamic Management View (`DMV`) of just your database when they by design\
    \ show anything on the underlying instance?\n*   We also needed a model where\
    \ customers would expect more predicable performance since they had no way of\
    \ choosing things like the number of CPUs, memory, or I/O speed.\n*   Our codebase\
    \ for Azure SQL Database was still forked from `SQL Server 2005` (yikes!). For\
    \ the SQL team to become truly `cloud first`, we needed to merge the codebase\
    \ of SQL Azure and SQL Server.\n*   We still used local disks for everything (including\
    \ user databases, telemetry, etc.) with our own custom replication system. Even\
    \ with SAWA, we were using custom hardware to support large disk needs as all\
    \ our storage was local using spindles (non-SSD drives). We needed to move toward\
    \ hardware generations that were aligned with all of Windows Azure. However, the\
    \ generation of hardware at this time only supported very small local SSD drives.\
    \ Therefore, we needed a strategy that allowed for “remote” databases using Azure\
    \ Storage.\n*   `Windows Fabric` which hosts and powers most Azure services internally\
    \ has many built-in capabilities to support deployment, scaling, networking, storage,\
    \ high availability, and fault tolerance. We knew to enable new models and options\
    \ like Azure Storage for databases, Azure SQL Database needed to become a `WinFab\
    \ application` (or Windows Fabric application).\n\nAs early as 2011, team members,\
    \ including Morgan Oslake, were looking to solve the noisy neighbor problem with\
    \ concepts like `resource reservations` and `node isolation`. Resource reservations\
    \ were implemented with a concept called a `Service-Level Objective (SLO)`. Even\
    \ today, you can see the term `SLO` in some of the diagnostics for Azure SQL.\
    \ This work led to several innovations which would shape the future. As Morgan\
    \ tells it, “The initial solution also set the stage for enabling true scaling\
    \ elasticity. Incidentally, this project is also where IO Resource Governor was\
    \ born in partnership with Microsoft Research and the solution was eventually\
    \ integrated into the SQL Server boxed product.”\n\nAs `SQL Server 2014` was being\
    \ developed and launched, the Azure SQL Database team internally started working\
    \ on a project called `Sterling` (also known as project Dearborn or SAWAv2). At\
    \ this time, SQL Azure was known as `v11` (the `@@VERSION` string had `11.x` in\
    \ it).\n\n> **Note**\n> \n> The name of Sterling comes from an interesting source.\
    \ As Peter Carlin tells it, “The name of the project was supposed to be after\
    \ Stirling, a well-known efficient heat engine invented by Robert Stirling in\
    \ the 1800s. Ironically, the project name got misspelled to Sterling, but the\
    \ name stuck.”"
  raw: '## Becoming Azure SQL Database


    By the summer of 2012, Microsoft started branding SQL Azure as **Windows Azure
    SQL Database**. There was no official branding news that I could ever find. My
    research and internal discussions on our teams were that we just decided to start
    calling the service **SQL Database** to highlight the fact that the service is
    all about “Database as a Service” abstracting the details of SQL Server instance
    from the user.


    In 2014, Microsoft changed the branding of Windows Azure to **Microsoft Azure**,
    or just Azure, so the current name of Azure SQL Database came to life.


    Note


    The branding of Microsoft Azure was significant to the future of Azure. Windows
    was and still is a dominant force for operating systems. However, since the launch
    of Azure Virtual Machine, Linux virtual machines have become incredibly popular.
    With the branding of Microsoft Azure or just Azure, we were sending a signal to
    the industry that Azure is more than just a Windows cloud.


    As SQL Azure started to mature, other engineers from the “traditional” SQL Server
    team started to come onboard, including Conor Cunningham. One of Conor’s goals
    was to work directly with customers to make them successful with SQL Azure. This
    included internal customers such as **Team Foundation Services** (TFS). Conor
    to this day still works with TFS (which has morphed into Azure DevOps) and their
    success with Azure SQL. According to Conor, “They are one of our best ISVs using
    the platform and they help us make SQL Azure better every day.”


    There were also important external customers who wanted to harness the power of
    Azure. One of the largest and most notable customers Conor and many on the team
    worked with was **Pottermore**. Around 2012, all the *Harry Potter* movies had
    been released, but the popularity of the books and movies was massive. Therefore,
    the Pottermore company decided to build a website experience for fans. And they
    chose Windows Azure and SQL Azure to power the website experience (see the full
    story at [`https://news.microsoft.com/2012/06/06/pottermore-new-website-based-on-the-hugely-popular-harry-potter-books-uses-windows-azure-to-scale-up-to-1-billion-page-views-in-first-two-weeks/`](https://news.microsoft.com/2012/06/06/pottermore-new-website-based-on-the-hugely-popular-harry-potter-books-uses-windows-azure-to-scale-up-to-1-billion-page-views-in-first-two-weeks/)).


    Note


    Pottermore (see [`https://en.wikipedia.org/wiki/Pottermore`](https://en.wikipedia.org/wiki/Pottermore))
    is actually a company, and the previous Pottermore website is now officially wizardingworld.com.


    Pottermore was an interesting test for the SQL Azure team. This project involved
    many databases and concurrent users. As Conor tells it, “We clearly didn’t want
    to disappoint all the Harry Potter fans of the world, but we also learned a lot
    about how to design things that scale.” As with any innovation, projects like
    these were ambitious but also became a foundation of knowledge to improve the
    future.


    Microsoft support also experienced big shifts to deal with the cloud. My longtime
    colleague and friend Keith Elmore (the famous author of the popular ostress tool),
    formerly in CSS but now in the engineering team with me, was involved in Azure
    support from the beginning. He told me that supporting Azure had some interesting
    challenges but also opened new possibilities. Keith said, “There was a major shift
    in how we could troubleshoot. We no longer had to ask customers to capture a lot
    of troubleshooting data as we did in the on-premises environment but could immediately
    access a large set of Azure telemetry to assess the general nature of their problem,
    and often narrow down the specific issue.” Supporting the cloud presented a new
    expectation from customers to deliver a solution fast. Microsoft now owned the
    “back end” so data that customers normally had completely control over obtaining
    was not possible for them in Azure. According to Keith, “the expectation of resolving
    a large percentage of your support cases in a day or less was radical. The team
    rallied around how we could organize ourselves and leverage this Azure telemetry
    to resolve most issues in one day.” You will learn about some of the resources
    Azure provides customers for support and troubleshooting later in this book.


    ### The Sterling (SAWAv2) Project


    By 2013 and 2014 timeframe, Azure SQL Database had many different successful customers,
    but the legacy architecture even running on SAWA was starting to show its age
    through different problems and customer experiences like TFS and Pottermore:


    *   As much as we made changes in the infrastructure, one thorny problem cropped
    up all the time, called the *noisy neighbor* problem. A customer could consume
    resources for one database that could adversely affect another. We needed a solution
    where each tenant (database) had their own SQL Server instance. This would allow
    us to use features like SQL Server Resource Governor.


    *   We also felt a lot of pressure to open more of the T-SQL surface area for
    SQL Azure customers. Since multiple tenants shared a SQL Server instance, this
    was a major problem. For example, how do we present a Dynamic Management View
    (DMV) of just your database when they by design show anything on the underlying
    instance?


    *   We also needed a model where customers would expect more predicable performance
    since they had no way of choosing things like the number of CPUs, memory, or I/O
    speed.


    *   Our codebase for Azure SQL Database was still forked from SQL Server 2005
    (yikes!). For the SQL team to become truly *cloud first*, we needed to merge the
    codebase of SQL Azure and SQL Server.


    *   We still used local disks for everything (including user databases, telemetry,
    etc.) with our own custom replication system. Even with SAWA, we were using custom
    hardware to support large disk needs as all our storage was local using spindles
    (non-SSD drives). We needed to move toward hardware generations that were aligned
    with all of Windows Azure. However, the generation of hardware at this time only
    supported very small local SSD drives. Therefore, we needed a strategy that allowed
    for “remote” databases using Azure Storage.


    *   *Windows Fabric* which hosts and powers most Azure services internally has
    many built-in capabilities to support deployment, scaling, networking, storage,
    high availability, and fault tolerance. We knew to enable new models and options
    like Azure Storage for databases, Azure SQL Database needed to become a *WinFab
    application* (or Windows Fabric application).


    As early as 2011, team members, including Morgan Oslake, were looking to solve
    the noisy neighbor problem with concepts like *resource reservations* and *node
    isolation*. Resource reservations were implemented with a concept called a **Service-Level
    Objective (SLO)**. Even today, you can see the term SLO in some of the diagnostics
    for Azure SQL. This work led to several innovations which would shape the future.
    As Morgan tells it, “The initial solution also set the stage for enabling true
    scaling elasticity. Incidentally, this project is also where IO Resource Governor
    was born in partnership with Microsoft Research and the solution was eventually
    integrated into the SQL Server boxed product.”


    As SQL Server 2014 was being developed and launched, the Azure SQL Database team
    internally started working on a project called **Sterling** (also known as project
    Dearborn or SAWAv2). At this time, SQL Azure was known as *v11* (the @@VERSION
    string had 11.x in it).


    Note


    The name of Sterling comes from an interesting source. As Peter Carlin tells it,
    “The name of the project was supposed to be after Stirling, a well-known efficient
    heat engine invented by Robert Stirling in the 1800s. Ironically, the project
    name got misspelled to Sterling, but the name stuck.”'
  trans: '

    # 演进中的 Azure SQL 数据库


    到 2012 年夏天之前，微软开始将 SQL Azure 品牌化为 `Windows Azure SQL Database`。我从未找到过任何官方的品牌公告。根据我在团队内的研究和内部讨论，我们只是决定开始将该服务称为
    `SQL Database`，以强调这项服务完全关乎“数据库即服务”，旨在将 SQL Server 实例的细节从用户端抽象出来。


    2014 年，微软将 Windows Azure 的品牌更名为 `Microsoft Azure`，或简称 Azure，于是 Azure SQL Database
    的当前名称应运而生。


    > **注意**

    >

    > Microsoft Azure 的品牌重塑对 Azure 的未来意义重大。Windows 在过去和现在都是操作系统的主导力量。然而，自从 Azure 虚拟机推出以来，Linux
    虚拟机变得异常流行。通过使用 Microsoft Azure 或简称 Azure 这个品牌，我们向业界发出了一个信号：Azure 不仅仅是一个 Windows
    云。


    随着 SQL Azure 逐渐成熟，来自“传统” SQL Server 团队的其他工程师也开始加入，包括 Conor Cunningham。Conor 的目标之一是直接与客户合作，帮助他们成功使用
    SQL Azure。这包括像 `Team Foundation Services` (TFS) 这样的内部客户。直至今日，Conor 仍然与 TFS（现已演变为
    Azure DevOps）合作，致力于他们在 Azure SQL 上的成功。用 Conor 的话说，“他们是我们使用该平台的最佳独立软件供应商之一，他们帮助我们每天改进
    SQL Azure。”


    还有一些重要的外部客户希望利用 Azure 的力量。Conor 和团队许多人合作过的最大、最著名的客户之一就是 `Pottermore`。大约在 2012
    年，所有的 `Harry Potter` 电影都已上映，但书籍和电影的热度依然巨大。因此，Pottermore 公司决定为粉丝们构建一个网站体验。他们选择了
    Windows Azure 和 SQL Azure 来驱动这个网站体验（完整故事请见 [`https://news.microsoft.com/2012/06/06/pottermore-new-website-based-on-the-hugely-popular-harry-potter-books-uses-windows-azure-to-scale-up-to-1-billion-page-views-in-first-two-weeks/`](https://news.microsoft.com/2012/06/06/pottermore-new-website-based-on-the-hugely-popular-harry-potter-books-uses-windows-azure-to-scale-up-to-1-billion-page-views-in-first-two-weeks/)）。


    > **注意**

    >

    > Pottermore（参见 [`https://en.wikipedia.org/wiki/Pottermore`](https://en.wikipedia.org/wiki/Pottermore)）实际上是一家公司，之前的
    Pottermore 网站现在官方网址是 wizardingworld.com。


    Pottermore 对 SQL Azure 团队来说是一次有趣的考验。这个项目涉及众多数据库和并发用户。正如 Conor 所言，“我们显然不想让全世界的哈利·波特粉丝失望，但我们也学到了很多关于如何设计可扩展系统的东西。”
    像任何创新一样，这类项目既雄心勃勃，也为改进未来奠定了知识基础。


    微软支持部门也经历了重大转变以应对云端需求。我的长期同事兼好友 Keith Elmore（著名的 ostress 工具作者），以前在 CSS（客户服务与支持）部门，现在与我同在工程团队，从一开始就参与了
    Azure 支持。他告诉我，支持 Azure 虽有一些有趣的挑战，但也开启了新的可能性。Keith 说：“我们在故障排除方式上发生了重大转变。我们不再需要像在本地环境中那样要求客户捕获大量故障排除数据，而是可以立即访问大量
    Azure 遥测数据来评估他们问题的普遍性质，并且通常能缩小到具体问题。” 支持云服务意味着客户期望快速提供解决方案。微软现在拥有“后端”，因此客户通常能完全控制获取的数据在
    Azure 中对他们来说是不可能的。根据 Keith 的说法，“期望在一天或更短时间内解决大部分支持案例是革命性的。团队团结一致，思考如何组织自己并利用 Azure
    遥测数据在一天内解决大多数问题。” 本书后续将介绍 Azure 为客户提供的一些支持和故障排除资源。


    ## Sterling (SAWAv2) 项目


    到 2013 至 2014 年期间，Azure SQL Database 已经拥有了许多不同的成功客户，但即使在 SAWA 上运行的旧有架构也开始通过像 TFS
    和 Pottermore 这样的不同问题和客户体验显现出其年代感：


    *   尽管我们在基础设施上做了许多改变，但一个棘手的问题总是不断出现，即所谓的 `noisy neighbor`（吵闹的邻居）问题。一个客户消耗的某个数据库资源可能会对另一个数据库产生不利影响。我们需要一种解决方案，让每个租户（数据库）拥有自己的
    SQL Server 实例。这将允许我们使用诸如 SQL Server 资源调控器之类的功能。

    *   我们也感受到了很大的压力，需要为 SQL Azure 客户开放更多的 T-SQL 表面区域。由于多个租户共享一个 SQL Server 实例，这是一个主要问题。例如，当动态管理视图
    (`DMV`) 设计为显示底层实例上的任何内容时，我们如何仅展示你的数据库的视图？

    *   我们还需要一种模型，让客户期望获得更可预测的性能，因为他们无法选择 CPU 数量、内存或 I/O 速度等参数。

    *   我们的 Azure SQL Database 代码库仍然是从 `SQL Server 2005` 分叉出来的（天啊！）。为了让 SQL 团队真正实现
    `云优先`，我们需要合并 SQL Azure 和 SQL Server 的代码库。

    *   我们仍然使用本地磁盘处理所有事务（包括用户数据库、遥测数据等），并配备我们自己的定制复制系统。即使使用 SAWA，我们也在使用定制硬件来支持巨大的磁盘需求，因为我们所有的存储都是使用
    spindle（非 SSD 驱动器）的本地存储。我们需要转向与整个 Windows Azure 对齐的硬件代次。然而，当时的硬件代次仅支持非常小的本地 SSD
    驱动器。因此，我们需要一种策略来允许使用 Azure 存储的“远程”数据库。

    *   `Windows Fabric` 在内部托管并驱动着大多数 Azure 服务，它具有许多内置功能来支持部署、扩展、网络、存储、高可用性和容错。我们知道，要启用如数据库使用
    Azure 存储等新模型和选项，Azure SQL Database 需要成为一个 `WinFab 应用程序`（或 Windows Fabric 应用程序）。


    早在 2011 年，包括 Morgan Oslake 在内的团队成员就开始寻求使用 `资源预留` 和 `节点隔离` 等概念来解决吵闹的邻居问题。资源预留是通过一个称为
    `服务级别目标 (Service-Level Objective, SLO)` 的概念实现的。即使在今天，你仍然可以在 Azure SQL 的一些诊断信息中看到
    `SLO` 这个术语。这项工作催生了几项将塑造未来的创新。用 Morgan 的话说，“最初的解决方案也为实现真正的弹性扩展奠定了基础。顺便提一下，这个项目也是在
    Microsoft Research 合作下诞生了 IO 资源调控器的地方，该解决方案最终被集成到了 SQL Server 的盒装产品中。”


    在 `SQL Server 2014` 开发和发布的同时，Azure SQL Database 团队内部开始了一个名为 `Sterling`（也称为 Dearborn
    项目或 SAWAv2）的项目。此时，SQL Azure 被称为 `v11`（其 `@@VERSION` 字符串中包含 `11.x`）。


    > **注意**

    >

    > Sterling 这个名字来源有趣。据 Peter Carlin 说，“项目本应以斯特林（Stirling）命名，这是 19 世纪由罗伯特·斯特林发明的一种著名的高效热机。具有讽刺意味的是，项目名称被误拼为
    Sterling，但这个名字就沿用下来了。”

