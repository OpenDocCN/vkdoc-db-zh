    # SQL 威胁防护


    我个人不太喜欢这里的“威胁防护”这个说法，因为 SQL 威胁防护并不能预防问题，它只是 `检测` 问题。例如暴力登录攻击、来自异常位置的登录或潜在的 SQL
    注入攻击。


    SQL 威胁防护利用扩展事件和机器学习技术，来检测并提醒您某些类型的可疑活动。可疑活动的一个例子是专为 `SQL 注入` 设计的代码。您可以在 [`https://learn.microsoft.com/azure/defender-for-cloud/alerts-sql-database-and-azure-synapse-analytics`](https://learn.microsoft.com/azure/defender-for-cloud/alerts-sql-database-and-azure-synapse-analytics)
    阅读所有检测到的不同规则和警报。


    虽然我们没有记录我们如何检测所有规则的细节，但我可以向您展示如何使用 SSMS 模拟一次 SQL 注入以查看警报。


    我将使用笔记本电脑上的 SSMS，通过 SSMS 创建一个新的查询连接，但我会使用 SSMS 的“其他连接参数”（通过“选项”按钮）来输入这个字符串：


    ```

    Application Name=webappname

    ```


    我还使用了“连接到数据库”选项来连接到 `bwadw` 数据库（此数据库使用了示例数据库 AdventureWorksLT）。在查询编辑器窗口中，我输入了以下查询并执行了它：


    ```

    SELECT * FROM SalesLT.Customer WHERE CustomerID like '''' or 1 = 1 --'' and family
    = ''test1'';

    ```


    > **注意**

    >

    > 我们会将 SSMS 作为一个应用程序过滤掉，因为没有人会从 SSMS 这样的工具发送注入。因此，我使用了不同的应用程序名称来模拟一个真实应用程序发送看起来像是
    SQL 注入攻击的查询。


    几秒钟内，我就可以导航到 Azure 门户中的我的数据库，从服务菜单的“安全性”部分选择“Microsoft Defender for Cloud”，然后选择“在
    Microsoft Defender for Cloud 中检查此资源的警报”；您将看到一个类似于图 6-27 的屏幕。


    ![](img/496204_2_En_6_Fig27_HTML.jpg)

    *图 6-27：检测到一次 SQL 注入攻击*


    您可以单击“查看完整详细信息”以了解更多关于攻击来源以及为何这被视为注入攻击的详细信息。


    如果您想知道为什么这是一次攻击，请仔细看看我使用的 SQL 查询：


    ```

    SELECT * FROM SalesLT.Customer WHERE CustomerID like '''' or 1 = 1 --'' and family
    = ''test1'';

    ```


    在这种情况下，解析器在看到注释符号 `--` 时会停止处理查询。因此，构造此查询的人试图查看所有客户。想象一下，如果 WHERE 子句的输入来自一个应用程序的
    Web 输入字段。如果开发人员动态拼接查询和输入字符串，黑客就可以尝试使用这种技术来查看他们本不该看到的数据（情况可能会糟糕得多）。SQL 注入是一个有趣的安全主题，我们在
    [`https://docs.microsoft.com/sql/relational-databases/security/sql-injection`](https://docs.microsoft.com/sql/relational-databases/security/sql-injection)
    提供了文档来解释这有多危险以及如何避免它们。


    与漏洞评估类似，您可以配置您的系统，以便在检测到任何威胁时接收电子邮件。微软对此非常重视；每当我尝试这样的测试时，我都会收到公司安全团队的电子邮件，确保我已经看到此警报并且我的数据库一切正常！


    SQL 威胁检测还提供了 PowerShell（例如，`Set-AzSqlDatabaseThreatDetectionPolicy`）和 az CLI（例如，`az
    sql db threat-policy`）的接口。


    # 数据分类


    假设您希望将数据库中的表分类，以查找符合通用数据保护条例（GDPR）或个人身份信息（PII）等策略的数据访问。Azure SQL 的数据分类提供了一种基于检测到的名称模式匹配对列进行分类的方法，或者允许您手动标记它们。


    我可以从 Azure 门户中完成此操作，如图 6-28 所示。


    ![](img/496204_2_En_6_Fig28_HTML.jpg)

    *图 6-28：Azure SQL 的数据分类*


    如果我选择所有这些建议并单击“接受选定的建议”，我可以使用“概述”窗格来获取数据分类的报告，如图 6-29 所示。


    ![](img/496204_2_En_6_Fig29_HTML.jpg)

    *图 6-29：数据分类概述*


    此功能的一个优点是，对标记为已分类数据的访问可以在 SQL 审核中看到。现在，您可以跟踪谁尝试访问您已标记为具有这些信息类型和标签的已分类数据。


    展示完这些之后，此功能现在可以与 Microsoft Purview 集成。要了解更多关于如何使用 Microsoft Purview 进行数据分类的信息，请参阅文档
    [`https://learn.microsoft.com/azure/azure-sql/database/data-discovery-and-classification-overview?view=azuresql#enabling-access-control-for-sensitive-data-using-microsoft-purview-information-protection-policies-public-preview`](https://learn.microsoft.com/azure/azure-sql/database/data-discovery-and-classification-overview?view=azuresql#enabling-access-control-for-sensitive-data-using-microsoft-purview-information-protection-policies-public-preview)。


    # 总结


    在本章中，您了解到 Azure SQL 安全在许多方面与 SQL Server 类似。您学习了如何保护网络并验证登录和用户的身份，包括使用 Microsoft
    Entra。您学习了如何使用各种加密技术保护数据。您了解了可以在 Azure 内外使用的所有审核功能。此外，您还学习了如何使用 Microsoft Defender
    for Cloud 和数据分类在云端更进一步。


    您在本书中学到，云的速度帮助我们快速创新和适应。安全始终是这种创新的一部分。根据安全首席组项目经理 Joachim Hammer 的说法：“我们继续投资于三管齐下的方法，以确保
    Azure SQL 满足最严格的安全要求以及行业的监管合规性。这些领域包括先进的内置安全控制、信任与合规性以及威胁检测与评估。”


    您可以在云 workshop 的 [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB)
    尝试一些关于 Azure SQL 数据库的 Microsoft Entra 身份验证的自主进度实验。


    在下一章中，我们将探索并深入研究 Azure SQL 核心的第二个主要方面：性能。

    '
- fmt: '# 7. Monitoring and Tuning Performance for Azure SQL


    You now have seen how to secure your Azure SQL deployment. Another aspect to ensure
    you have the best possible database for your application is understanding how
    to scale, configure, monitor, and tune performance. If you know SQL Server, here
    is some good news. The engine that powers Azure SQL is the same one for SQL Server!
    This means that about any performance capability you need exists for Azure SQL.
    It also means that many of the same tasks and skills you use for SQL Server apply
    to Azure SQL. In this chapter, we will explore all the capabilities and tasks
    you normally use to monitor and tune performance for a SQL Server and compare
    it with Azure SQL. You will also learn some specific capabilities and techniques
    unique to Azure to give you the best possible performance.


    This chapter will contain examples for you to try out and use as you read along.
    For you to try out any of the techniques, commands, or examples I use in this
    chapter, you will need:


    *   An `Azure subscription`.

    *   A minimum of `Contributor` role access to the `Azure subscription`. You can
    read more about Azure built-in roles at [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles).

    *   Access to the `Azure Portal`.

    *   A deployment of an `Azure SQL Managed Instance` and/or an `Azure SQL Database`
    as I did in Chapter [4](#496204_2_En_4_Chapter.xhtml). The `Azure SQL Database`
    I deployed uses the `AdventureWorks` sample which will be required to use for
    some of the examples.

    *   To connect to `Managed Instance`, you will need a `jumpbox` or virtual machine
    in `Azure` to connect. I showed you how to do this in Chapter [4](#496204_2_En_4_Chapter.xhtml)
    of the book. One simple way to do this is to create a new `Azure Virtual Machine`
    and deploy it to the same virtual network as the `Managed Instance` (you will
    use a different subnet than the `Managed Instance`).

    *   To connect to `Azure SQL Database`, I am going to use the `Azure VM` I deployed
    in Chapter [3](#496204_2_En_3_Chapter.xhtml), called `bwsql2022`, and configured
    for a private endpoint in Chapter [6](#496204_2_En_6_Chapter.xhtml) (you could
    use another method as long as you can connect to the `Azure SQL Database`).

    *   Installation of the `az` CLI (see [`https://learn.microsoft.com/cli/azure/install-azure-cli`](https://learn.microsoft.com/cli/azure/install-azure-cli)
    for more details). You can also use the `Azure Cloud Shell` instead since `az`
    is already installed. You can read more about the `Azure Cloud Shell` at [`https://azure.microsoft.com/features/cloud-shell/`](https://azure.microsoft.com/features/cloud-shell/).

    *   You will run some `T-SQL` in this chapter, so install a tool like `SQL Server
    Management Studio` (`SSMS`) at [`https://aka.ms/ssms`](https://aka.ms/ssms). I
    installed `SSMS` in the `bwsql2022` `Azure Virtual Machine` I deployed in Chapter
    [3](#496204_2_En_3_Chapter.xhtml).

    *   For this chapter, I have script files you can use for several of the examples.
    You can find these scripts in the `ch7_performance` folder for the source files
    included for the book. I will also use the very popular tool `ostress.exe` for
    exercises in this chapter which comes with the `Replay Markup Language` (`RML`)
    Utilities. You can download `RML` from [`https://aka.ms/ostress`](https://aka.ms/ostress).
    Make sure to put the folder where `RML` gets installed in your system path (which
    is by default `C:\Program Files\Microsoft Corporation\RMLUtils`).


    > **Tip**

    >

    > Since the first edition of this book, I built some new performance troubleshooting
    videos and example labs specifically targeted for `Azure SQL Database`. You can
    find the videos at [`https://aka.ms/performanceseries`](https://aka.ms/performanceseries)
    and the example labs at [`https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting`](https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting).
    I think you will find these a nice complement to the examples in this chapter
    (with even more performance scenarios).


    ## Performance Capabilities


    Since the engine that powers `Azure SQL` is the same as `SQL Server`, about any
    performance capability is available to you. Having said that, it is important
    to cover a few important areas that are similar and different that can affect
    your ability to ensure maximum performance for your `Azure SQL` deployment. This
    includes maximum capacities, indexes, `In-Memory OLTP`, partitions, `SQL Server
    2022` performance enhancements, and new `Azure SQL` intelligent performance capabilities.'
