    选择此选项并点击 **Create** 按钮。你现在会看到一个屏幕，其中包含部署 VM 所需的一系列必填字段和选项，如图 3-3 所示。


    ![](img/496204_2_En_3_Fig3_HTML.jpg)


    图 3-3

    创建 SQL VM 屏幕的“基础”部分顶部


    注意屏幕顶部的 Copilot for Azure 选项。此外，还有一系列名称（或部分），指示了你在部署过程中可以做出的几个选择。第一个屏幕被称为 **Basics**。并非所有部分中的所有字段都是必填的。“基础”屏幕拥有最多的必填字段。你可以点击这些部分中的任何一个，或使用底部的按钮在一系列选择中导航。


    你的一些默认值会有所不同（例如，你的 Azure 订阅将被列为默认值；如果你有多个订阅，请在此处更改为 VM 部署所需的目标订阅），并且你将做出各种选择。让我们在部署过程和创建屏幕中逐步完成你的所有选择。


    ### 资源组、区域和可用性


    你的前几个选项是需要提供的必填字段，包括资源组、名称和 Azure 区域。此外，你还可以选择一个可用性选项。


    #### 资源组


    正如我在本书第 2 章所述，资源组是组织和集中管理 Azure 资源的好方法。你将在本章中看到，默认情况下，会为你指定的新资源组创建一个虚拟网络，并且 VM
    会自动添加到该虚拟网络中。出于本练习的目的，请选择 **Create New** 并为其命名。我将我的 VM 命名为 **bwsqlvmsrg**。


    #### 虚拟机名称


    这既是 Azure 资源的名称，也是 VM 内部客户机的主机名（你可以在部署后更改 VM 中的主机名）。请注意，不允许使用某些特殊字符，且名称长度不能超过
    15 个字符。此名称在资源组内必须是唯一的。在本练习中，我输入名称 **bwsql2022**。


    #### 区域


    这是 Azure 数据中心所在的区域。我在本书第 2 章介绍了 Azure 区域和数据中心。你选择的区域有几个因素需要考虑，包括可用的 VM 大小、合规性、价格以及到用户和应用程序的延迟。你可以在
    [`https://www.cloudelicious.net/azure-region-and-datacenter-find-your-best-match/`](https://www.cloudelicious.net/azure-region-and-datacenter-find-your-best-match/)
    阅读更多关于选择正确区域的信息。请注意，你的订阅也可能不支持某些 Azure 区域。如果你没有看到需要的选项，请咨询你的订阅所有者。我将选择 Central
    US 作为我的区域。


    #### 可用性选项


    这是部署期间的可选字段。只有当你计划将 SQL VM 连接到其他 VM 以实现高可用性和灾难恢复目的（如可用性组、故障转移集群实例等）时，才需要选择此选项。不幸的是，最好在部署期间决定要使用哪个选项。出于本示例的目的，请将此项保留为“不需要基础结构冗余”。我将在本章后面的“高可用性和灾难恢复”标题下讨论何时使用此处的某些选项。


    注意

    这并不意味着 *独立* SQL Server 没有基本的高可用性。Azure 可以处理在数据中心内因故障将你的 VM 迁移到主机（使用实时迁移）。此外，你的数据库的
    Azure 存储还具有内置冗余。


    #### 安全类型


    Azure 虚拟机提供了新选项，可为 VM 提供更高级别的安全性。这对于 SQL Server 尤为重要，因为它可以为 VM 内部的 SQL 提供静态数据和内存中数据的安全级别。此安全性类型称为
    **机密虚拟机**，由 AMD 处理器支持。另一种安全性类型是 **可信启动虚拟机**，它通过安全启动等功能保护虚拟机。出于本示例的目的，我不会使用这些选择，因此我将选择
    **Standard**。


    #### 映像


    这里将填写你从 Azure SQL 屏幕所做的选择。在部署之前，你此时可以更改它。暂时保留 SQL Server 2022 Enterprise Windows
    Server 2022 的选择。


    注意

    你可以使用以下 PowerShell 命令获取特定区域中可用的 SQL Server 库映像的完整列表（用你选择的区域名称替换）：

    `Get-AzVMImageOffer -Location ‘Central US’ -Publisher ‘MicrosoftSQLServer’`


    #### VM 架构


    Azure 虚拟机支持 x64 和 Arm64 架构。目前的 SQL Server 仅支持 x64。'
- fmt: '### Spot Instance


    An Azure Spot Instance is a concept to save you money on virtual machines that
    are not used consistently. This is a great concept but probably not applicable
    to your use of SQL Server in Azure Virtual Machine.


    After making these choices, my screen looks like Figure [3-4](#496204_2_En_3_Chapter.xhtml#Fig4).

    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig4_HTML.jpg)

    Figure 3-4

    Specifying resource group, region, availability, and other choices for Basics


    You will notice in my selection that the image includes the words **`Gen2`**.
    Generation 2 (`Gen2`) virtual machines are the default selection for our SQL Server
    images. I highly recommend you stay with `Gen2` images as it provides capabilities
    that are not possible with `Gen1` VMs. You can read more at [`https://learn.microsoft.com/azure/virtual-machines/generation-2`](https://learn.microsoft.com/azure/virtual-machines/generation-2).


    ### Virtual Machine Sizes


    One of the most important decisions you will make is what size to make the virtual
    machine for SQL Server in Azure. Size is effectively a combination of CPU, memory,
    and I/O choices. You make these choices today in your data center when you deploy
    SQL Server to a virtual machine or bare metal. You select how many CPUs, CPU speed,
    RAM, size of disks, and disk speed. So you need to be able to do the same thing
    with Azure.


    Azure Virtual Machine sizes are categorized by Family and are known with a letter
    designation (`B`, `D`, `E`, …). If you are just trying to get started with SQL
    Server on Azure Virtual Machine, my recommendation is to pick a reasonable size
    to test out SQL Server vs. cost. If you are choosing a size for production, you
    need to carefully review size options. As you can imagine, the higher the horsepower,
    the higher the cost.


    As Azure data centers bring in new models of computers to support virtual machine
    and Azure resources, new sizes support different hardware generations. Therefore,
    you will see virtual machine sizes like `Ev4` or `Ev5`. VM sizes are comprised
    of several options in the form of a series of letters and numbers that make up
    the characteristics of VM performance and resources. I call it the “alphabet of
    virtual machine choices.” Let me show you through an example. Using the portal
    screen I’ve shown above for Basics, you can scroll down to see the size chosen
    by default. I will then use the **Select size** option as seen in Figure [3-5](#496204_2_En_3_Chapter.xhtml#Fig5)
    to bring up a list of choices.

    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig5_HTML.jpg)

    Figure 3-5

    Choosing a VM size


    You should now be presented with a screen that gives you choices on VM sizes.
    These tables can look daunting, but it gives you a feel of why you would pick
    a specific size because it dictates the number of CPUs, RAM, disks, IOPS, etc.,
    you get for your VM deployment. Figure [3-6](#496204_2_En_3_Chapter.xhtml#Fig6)
    shows results after I have typed in the “Search by VM size…” the string `v5` which
    shows me some of the latest hardware for VMs.

    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig6_HTML.jpg)

    Figure 3-6

    VM size choices for Azure


    I scrolled down after using this search and pointed out the choice I’ll use for
    this VM deployment called `E4bds_v5`. Let me use this example to point out what
    this screen shows about my selection and what some of the letter options mean.


    First, you can see at the top columns that show for your choice a Type and then
    the maximum resources you get for `vCPU`, `RAM`, `Data Disks`, `Max IOPS`, `Local
    Storage`, `Premium Disk Support`, and estimated cost. The Type of **Memory Optimized**
    refers to a category of VM Size families that have the best memory to `vCPU` ratio
    because the number of `vCPU`s can affect how much `RAM` you get. For SQL Server,
    `RAM` is an important resource so the more memory per `vCPU` can benefit SQL Server
    workloads. You can see all the VM types available at [`https://aka.ms/azurevmsizes`](https://aka.ms/azurevmsizes).


    I am going to choose `E4bds_v5` because it has plenty of CPUs and `RAM` for my
    purposes and enables a few options I need which I will describe shortly. If you
    look at the VM size choice, here is what each option means:


    *   `E` = `E` is the E-series family which is one of the recommended VM sizes
    for SQL production workloads. The E-series has some of the latest innovations,
    latest processors, and optimized workloads that need memory like SQL Server.

    *   `4` = Number of `vCPU`s for this choice.

    *   `b` = Choosing the `b` option gives you a higher I/O to core ratio in the
    form of IOPS. If you look at the VM choice `E4ds_v5`, you can see it has a max
    IOPS of 6400 where the `b` option bumps this to 12100 with only a slightly higher
    cost.

    *   `d` = The VM supports local storage. Local storage is a fast, local SSD drive
    for the VM. This is a critical choice for SQL Server since you can place `tempdb`
    on this drive and not have to worry about I/O performance. The local SSD drive
    is also known as a “scratch” drive since if a failover occurs for the VM to another
    host, any data is lost on this drive, but for `tempdb` that doesn’t matter since
    we recreate it on SQL Server startup. The amount of local storage you get is defined
    by the number of `vCPU`s you choose.

    *   `s` = Premium managed disks are supported. You will learn more about why premium
    managed disks are important for SQL Server in the section later in this chapter
    titled “Maximizing Storage Performance.”

    *   `v5` = This is the family version. Microsoft is always innovating on VM choices,
    so any new major innovation (usually a choice for the latest hardware) comes in
    the form of a new family version. At the time of the writing of this book, the
    `v6` for the E-series was in preview. Read more at [`https://learn.microsoft.com/azure/virtual-machines/esv6-edsv6-series`](https://learn.microsoft.com/azure/virtual-machines/esv6-edsv6-series).


    Tip

    If you are looking for VM choices that use AMD processors, look for the letter
    `a` in the VM size. For example, the equivalent AMD choice for my above selection
    is `E4ads_v5`. It is important to note that the `b` option for higher I/O to core
    ratio is not available today for AMD.


    You can learn more about the latest Microsoft recommendations for VM sizes for
    SQL Server at [`https://aka.ms/sqlIaaSSizing`](https://aka.ms/sqlIaaSSizing).


    Note

    You can change the VM size after you have deployed it without having to delete
    and recreate it. This is called resizing a VM. There are limits here, and it will
    require some downtime, but you can read more about resizing VMs at [`https://learn.microsoft.com/azure/virtual-machines/sizes/resize-vm`](https://learn.microsoft.com/azure/virtual-machines/sizes/resize-vm).'
