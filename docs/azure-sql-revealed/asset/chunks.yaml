    \ size of the tempdb database is scaled per number of vCores.\n\nI described in\
    \ Chapter [5](#496204_2_En_5_Chapter.xhtml) that you get some configuration options\
    \ for tempdb in Azure SQL Managed Instance, including expanding the number of\
    \ files, the logical name of the files, and the autogrow increment size value.\n\
    \nTempdb database option MIXED_PAGE_ALLOCATION is set to OFF and AUTOGROW_ALL_FILES\
    \ is set to ON. This cannot be configured, but they are the recommended defaults\
    \ as with SQL Server.\n\n### Database Configuration\n\nAs I described in Chapter\
    \ [5](#496204_2_En_5_Chapter.xhtml), about every database configuration option\
