- fmt: '## SQL and Microsoft Fabric


    在《SQL Server 2022 Revealed》一书中，我介绍了一项名为 `Synapse Link` 的功能。其概念是将数据从 Azure SQL
    或 SQL Server 同步到 Azure Synapse，然后捕获更改并将其输送到 Synapse，以实现近实时分析解决方案。


    2023年，我们发布了一个名为 Microsoft Fabric 的新数据平台，它包含了所有类型的数据解决方案，包括分析。图 [10-13](#496204_2_En_10_Chapter.xhtml#Fig13)
    展示了 Microsoft Fabric 的直观图景。


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig13_HTML.jpg)


    图 10-13


    Microsoft Fabric


    你可以看到 Synapse 现在是 Fabric 大家庭的一部分。但更重要的是，一个名为 `OneLake` 的概念是这个故事的关键部分。


    OneLake 在文档中被定义为“OneLake 是适用于整个组织的单一、统一、逻辑数据湖。数据湖处理来自各种来源的大量数据。”我最喜欢的是 OneLake
    主要文档页面的标题，它写着 **OneLake, the OneDrive for data** ([`https://learn.microsoft.com/fabric/onelake/onelake-overview`](https://learn.microsoft.com/fabric/onelake/onelake-overview))。我喜欢这个描述，因为我将我的
    OneDrive 视为一个可以随时存储任何类型文件的地方。


    但我认为 OneLake 的一个关键区别在于，其通用数据格式是 `Delta`。Delta 是一种基于 Parquet 的文件格式，非常容易像查询表一样查询数据。这意味着
    Fabric 团队可以为你提供一个 `SQL endpoint`，来查询 OneLake 中任何采用 Delta 格式的数据。


    现在回到 Synapse Link 的故事。**Azure SQL with Synapse Link** 使用 parquet 文件将表初始同步到暂存区。Synapse
    然后获取这些数据并创建 Synapse 池表。Azure SQL 随后使用基于事务日志的新更改反馈架构将更改发送到暂存区，这些更改由 Synapse 消费并提交到池表中。


    Fabric 使用了一个称为 `mirroring` 的概念。图 [10-14](#496204_2_En_10_Chapter.xhtml#Fig14)
    展示了 Fabric 的数据库镜像功能。


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig14_HTML.jpg)


    图 10-14


    Fabric mirroring


    **Fabric mirroring for SQL** 与 SQL 的 Synapse Link 功能基本相同，只是数据存储在 Fabric OneLake
    中，如图 [10-15](#496204_2_En_10_Chapter.xhtml#Fig15) 所示。


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig15_HTML.jpg)


    图 10-15


    Fabric mirroring for SQL


    在幕后，我们的 SQL 代码与用于 Azure SQL 和 SQL Server 的 Synapse Link 几乎相同，只是暂存区位于 Fabric 中。Fabric
    现在自动将该数据以 Delta 格式复制到 OneLake 中。


    既然数据已经在 OneLake 中，整个 Fabric 生态系统就对你的 SQL 数据可用。图 [10-16](#496204_2_En_10_Chapter.xhtml#Fig16)
    展示了一个使用 SQL Analytics 端点针对 SQL 镜像数据运行 SQL 查询的示例。


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig16_HTML.jpg)


    图 10-16


    在 Fabric 中使用 SQL Analytics 端点


    现在想象一下，可以将此数据与 OneLake 中的任何其他数据连接，或使用此数据构建 Power BI 报表。


    Synapse Link 目前仍然受支持，但我们在该领域的未来方向是镜像。以下是一些显著区别：


    *   镜像支持 DDL 更改，例如添加/删除列。

    *   即使在 Fabric 中，你的数据也不会发送到 Synapse。它存储在 OneLake 中，所有针对此数据的查询都使用无服务器查询。


    我们已经为 Azure SQL Managed Instance 提供了镜像预览版，我预计很快也会为 VM 中和本地的 SQL Server 提供镜像。请访问
    [`https://aka.ms/sqldbmirroring`](https://aka.ms/sqldbmirroring) 获取开始使用的所有详细信息。你可以在
    [`https://aka.ms/sqlaisamples`](https://aka.ms/sqlaisamples) 查看在 Fabric 中将 SQL
    镜像与 AI 结合使用的示例。


    ## Azure Arc


    本章最后一个不属于图 [10-1](#496204_2_En_10_Chapter.xhtml#Fig1) 中“超越 RDBMS”范畴的主题是 **Azure
    Arc**。我将 Azure Arc 纳入本章是因为我在本书第一版中简要提到过它，并且值得再次重点介绍。我还在《SQL Server 2022 Revealed》一书中广泛涉及了这个主题。


    Azure Arc 是一个简单而强大的概念。这不是在 Azure 中部署 SQL，而是将你现有的本地或其他云中的 SQL Server *连接*到 Azure。


    连接意味着在你的 VM 内或安装 SQL Server 的机器上运行轻量级代理。这些代理将你连接到 Azure，为你提供额外功能，并使其*感觉*像在 Azure
    中运行。我们称之为 Azure Arc 启用的 SQL Server。


    Arc 的一个强大方面是，我们可以在不更改 SQL Server 的情况下持续添加功能，同时也可以利用新主要版本带来的新功能。Azure Arc 启用的 SQL
    Server 每月更新一次。截至本书撰写时，以下是 Arc 为你提供的功能列表：


    *   从 Azure 门户**大规模管理你的 SQL Server 实例**

    *   **最佳实践评估**，查看服务器和数据库当前配置可能存在的问题

    *   为 SQL Server 2022 提供的**Microsoft Entra 身份验证**支持

    *   我们在本书第 [6](#496204_2_En_6_Chapter.xhtml) 章详细介绍的**Microsoft Defender for Cloud**

    *   我们在本书第 [6](#496204_2_En_6_Chapter.xhtml) 章介绍的、针对 SQL Server 2022 的**Microsoft
    Purview** 支持

    *   SQL Server 的**按需付费许可**，特别是对于不常使用的 SQL Server 实例，可以节省许可成本

    *   针对旧版 SQL Server 的**扩展安全更新**

    *   **性能仪表板**，为你提供 SQL Server 性能的轻量级可视化

    *   **迁移评估**，持续检查你迁移到 Azure SQL 选项的能力


    请访问 [`https://aka.ms/arcsqlserver`](https://aka.ms/arcsqlserver) 了解有关 Azure Arc
    启用的 SQL Server 的更多信息。'
  raw: '## SQL and Microsoft Fabric


    In the book *SQL Server 2022 Revealed*, I talked about a capability called **Synapse
    Link**. The concept is to sync data from Azure SQL or SQL Server to Azure Synapse,
    and then changes are captured and fed to Synapse for a near real-time analytics
    solution.


    In 2023, we released a new data platform called Microsoft Fabric which includes
    all types of data solutions, including analytics. Figure [10-13](#496204_2_En_10_Chapter.xhtml#Fig13)
    shows a visual picture of Microsoft Fabric.


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig13_HTML.jpg)


    Figure 10-13


    Microsoft Fabric


    You can see that Synapse is now part of the Fabric family. But more importantly,
    a concept called **OneLake** is a critical part of this story.


    OneLake is defined in the documentation as “OneLake is a single, unified, logical
    data lake for your whole organization. A data lake processes large volumes of
    data from various sources.” What I like is the title of the main documentation
    page for OneLake which says **OneLake, the OneDrive for data** ([`https://learn.microsoft.com/fabric/onelake/onelake-overview`](https://learn.microsoft.com/fabric/onelake/onelake-overview)).
    I like this description because I think of my OneDrive as a place to store any
    file of any type anytime I want.


    But a key difference for OneLake in my opinion is that a common data format is
    **Delta**. Delta is a file format based on Parquet that lends itself very easily
    to querying data like a table. This means the Fabric team can provide a **SQL
    endpoint** for you to query anything in OneLake that is in Delta format.


    Now back to the story of Synapse Link. **Azure SQL with Synapse Link** uses parquet
    files to initially sync tables into a landing zone. Synapse then takes this data
    and creates Synapse pool tables. Azure SQL then uses a new change feed architecture
    based on the transaction log to send changes to the landing zone, where they are
    consumed by Synapse to submit changes to pool tables.


    Fabric uses a concept called **mirroring**. Figure [10-14](#496204_2_En_10_Chapter.xhtml#Fig14)
    shows Fabric mirroring for databases.


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig14_HTML.jpg)


    Figure 10-14


    Fabric mirroring


    **Fabric mirroring** **for SQL** is effectively the same capability as Synapse
    Link for SQL except the data is stored in Fabric OneLake as you see in Figure
    [10-15](#496204_2_En_10_Chapter.xhtml#Fig15).


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig15_HTML.jpg)


    Figure 10-15


    Fabric mirroring for SQL


    Behind the scenes, our SQL code is pretty much the same as with Synapse Link for
    Azure SQL and SQL Server except the landing zone is in the Fabric. Fabric now
    replicates that data into OneLake automatically in Delta format.


    Now that the data is in OneLake, the entire Fabric ecosystem is available to your
    SQL data. Figure [10-16](#496204_2_En_10_Chapter.xhtml#Fig16) shows an example
    query using the SQL Analytics endpoint against SQL mirrored data to run a SQL
    query.


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig16_HTML.jpg)


    Figure 10-16


    Using the SQL Analytics endpoint in Fabric


    Imagine now getting to join this data with any other data in OneLake or using
    this data to build Power BI reports.


    Synapse Link is still supported today, but our future in this area will be mirroring.
    Here are some notable differences:


    *   Mirroring supports DDL changes like add/drop column.


    *   Your data does not go to Synapse even in Fabric. It is stored in OneLake and
    any query against this data using serverless queries.


    We already have a preview for Azure SQL Managed Instance for mirroring, and I
    expect mirroring for SQL Server in VM and on-premises to be available soon. Learn
    all the details to get started at [`https://aka.ms/sqldbmirroring`](https://aka.ms/sqldbmirroring).
    You can see an example of using SQL mirroring with AI in Fabric at [`https://aka.ms/sqlaisamples`](https://aka.ms/sqlaisamples).


    ## Azure Arc


    One final topic for the chapter not in the Beyond RDBMS in Figure [10-1](#496204_2_En_10_Chapter.xhtml#Fig1)
    is **Azure Arc**. I’ve included Azure Arc in this chapter because I did briefly
    mention this in the first edition of the book, and it is worth calling it out
    again. I also covered this topic extensively in the book *SQL Server 2022 Revealed*.


    Azure Arc is a simple but powerful concept. This is not deploying SQL in Azure
    but rather *connecting* your existing SQL Server on-premises or in other clouds
    ***to Azure***.


    Connecting means running lightweight agents inside your VM or on the machine where
    SQL Server is installed. These agents connect you to Azure to give you additional
    capabilities and make it *feel like* you are running in Azure. We call this SQL
    Server enabled by Azure Arc.


    One of the powerful aspects to Arc is that we can keep adding capabilities without
    a change to SQL Server but also take advantage of new features with a new major
    version. SQL Server enabled by Azure Arc is updated on a monthly basis. As of
    the time of the writing of this book, here is a list of features Arc provides
    you:


    *   **Manage your SQL Server instances at scale** from the Azure portal


    *   **Best practices assessment** to see any possible issues from your current
    configuration of your server and databases


    *   **Microsoft Entra authentication** support for SQL Server 2022


    *   **Microsoft Defender for Cloud** which we have covered extensively in Chapter
    [6](#496204_2_En_6_Chapter.xhtml) of this book


    *   **Microsoft Purview** support for SQL Server 2022 which we covered in Chapter
    [6](#496204_2_En_6_Chapter.xhtml) of this book


    *   **Pay-as-you-go licensing** for SQL Server to save licensing costs especially
    for infrequently used SQL Server instances


    *   **Extended Security Updates (ESU)** for older versions of SQL Server


    *   **Performance dashboards** to give you lightweight visualizations of your
    SQL Server performance


    *   **Migration assessment** to continuously check your ability to migrate to
    Azure SQL options


    Learn more about SQL Server enabled by Azure Arc at [`https://aka.ms/arcsqlserver`](https://aka.ms/arcsqlserver).'
  trans: '

    ## SQL 与 Microsoft Fabric


    在《SQL Server 2022 揭秘》一书中，我介绍了一项名为 `Synapse Link` 的功能。其概念是将数据从 Azure SQL 或 SQL
    Server 同步到 Azure Synapse，然后捕获更改并将其输送到 Synapse，以实现实时分析解决方案。


    2023 年，我们发布了一个名为 Microsoft Fabric 的新数据平台，它包含了所有类型的数据解决方案，包括分析。图 10-13 展示了 Microsoft
    Fabric 的直观图景。


    ![](img/496204_2_En_10_Fig13_HTML.jpg)


    图 10-13


    Microsoft Fabric


    你可以看到 Synapse 现在是 Fabric 大家庭的一部分。但更重要的是，一个名为 `OneLake` 的概念是这个故事的关键部分。


    OneLake 在文档中被定义为“OneLake 是适用于整个组织的单一、统一、逻辑数据湖。数据湖处理来自各种来源的大量数据。”我最喜欢的是 OneLake
    主要文档页面的标题，它写着 **OneLake，数据的 OneDrive** ([`https://learn.microsoft.com/fabric/onelake/onelake-overview`](https://learn.microsoft.com/fabric/onelake/onelake-overview))。我喜欢这个描述，因为我将我的
    OneDrive 视为一个可以随时存储任何类型文件的地方。


    但我认为 OneLake 的一个关键区别在于，其通用数据格式是 `Delta`。Delta 是一种基于 Parquet 的文件格式，非常容易像查询表一样查询数据。这意味着
    Fabric 团队可以为你提供一个 `SQL endpoint`，来查询 OneLake 中任何采用 Delta 格式的数据。


    现在回到 Synapse Link 的故事。**带有 Synapse Link 的 Azure SQL** 使用 parquet 文件将表初始同步到暂存区。Synapse
    然后获取这些数据并创建 Synapse 池表。Azure SQL 随后使用基于事务日志的新更改反馈架构将更改发送到暂存区，这些更改由 Synapse 消费并提交到池表中。


    Fabric 使用了一个称为 `mirroring` 的概念。图 10-14 展示了 Fabric 的数据库镜像功能。


    ![](img/496204_2_En_10_Fig14_HTML.jpg)


    图 10-14


    Fabric mirroring


    **用于 SQL 的 Fabric mirroring** 与 SQL 的 Synapse Link 功能基本相同，只是数据存储在 Fabric OneLake
    中，如图 10-15 所示。


    ![](img/496204_2_En_10_Fig15_HTML.jpg)


    图 10-15


    用于 SQL 的 Fabric mirroring


    在幕后，我们的 SQL 代码与用于 Azure SQL 和 SQL Server 的 Synapse Link 几乎相同，只是暂存区位于 Fabric 中。Fabric
    现在自动将该数据以 Delta 格式复制到 OneLake 中。


    既然数据已经在 OneLake 中，整个 Fabric 生态系统就对你的 SQL 数据可用。图 10-16 展示了一个使用 SQL Analytics 端点针对
    SQL 镜像数据运行 SQL 查询的示例。


    ![](img/496204_2_En_10_Fig16_HTML.jpg)


    图 10-16


    在 Fabric 中使用 SQL Analytics 端点


    现在想象一下，可以将此数据与 OneLake 中的任何其他数据连接，或使用此数据构建 Power BI 报表。


    Synapse Link 目前仍然受支持，但我们在该领域的未来方向是镜像。以下是一些显著区别：


    *   镜像支持 DDL 更改，例如添加/删除列。

    *   即使在 Fabric 中，你的数据也不会发送到 Synapse。它存储在 OneLake 中，所有针对此数据的查询都使用无服务器查询。


    我们已经为 Azure SQL Managed Instance 提供了镜像预览版，我预计很快也会为 VM 中和本地的 SQL Server 提供镜像。请访问
    [`https://aka.ms/sqldbmirroring`](https://aka.ms/sqldbmirroring) 获取开始使用的所有详细信息。你可以在
    [`https://aka.ms/sqlaisamples`](https://aka.ms/sqlaisamples) 查看在 Fabric 中将 SQL
    镜像与 AI 结合使用的示例。


    ## Azure Arc


    本章最后一个不属于图 10-1 中“超越 RDBMS”范畴的主题是 **Azure Arc**。我将 Azure Arc 纳入本章是因为我在本书第一版中简要提到过它，并且值得再次重点介绍。我还在《SQL
    Server 2022 揭秘》一书中广泛涉及了这个主题。


    Azure Arc 是一个简单而强大的概念。这不是在 Azure 中部署 SQL，而是将你现有的本地或其他云中的 SQL Server *连接*到 Azure。


    连接意味着在你的 VM 内或安装 SQL Server 的机器上运行轻量级代理。这些代理将你连接到 Azure，为你提供额外功能，并使其*感觉*像在 Azure
    中运行。我们称之为 Azure Arc 启用的 SQL Server。


    Arc 的一个强大方面是，我们可以在不更改 SQL Server 的情况下持续添加功能，同时也可以利用新主要版本带来的新功能。Azure Arc 启用的 SQL
    Server 每月更新一次。截至本书撰写时，以下是 Arc 为你提供的功能列表：


    *   从 Azure 门户**大规模管理你的 SQL Server 实例**

    *   **最佳实践评估**，查看服务器和数据库当前配置可能存在的问题

    *   为 SQL Server 2022 提供的**Microsoft Entra 身份验证**支持

    *   我们在本书第 6 章详细介绍的**Microsoft Defender for Cloud**

    *   我们在本书第 6 章介绍的、针对 SQL Server 2022 的**Microsoft Purview** 支持

    *   SQL Server 的**按需付费许可**，特别是对于不常使用的 SQL Server 实例，可以节省许可成本

    *   针对旧版 SQL Server 的**扩展安全更新**

    *   **性能仪表板**，为你提供 SQL Server 性能的轻量级可视化

    *   **迁移评估**，持续检查你迁移到 Azure SQL 选项的能力


    请访问 [`https://aka.ms/arcsqlserver`](https://aka.ms/arcsqlserver) 了解有关 Azure Arc
    启用的 SQL Server 的更多信息。

    '
- fmt: '## Futures


    我认为 Azure SQL 的前景非常光明，尤其是在本章描述的领域。我对此有一些未来的思考。这些都不是来自 Microsoft 的承诺或功能保证，但我认为分享我的见解很重要。在接下来的一年左右，我们将看到我的直觉是否正确。


    ### Small Language Models (SLM) 的使用


    我认为如今许多人正在为 AI 应用程序*过度配置*大型语言模型，因为没有人真正知道如何为语言模型“确定合适的规模”。我认为 `SLM` 的使用将会变得流行，因为它们成本更低，消耗的资源更少。然而，找到合适的模型和规模将成为
    AI 领域的下一组挑战。


    ### NL2SQL 框架


    向量搜索对于文本数据效果很好，你可以将其与混合搜索结合。但考虑一下希望由 AI 生成所有 SQL 的开发人员。因此，我认为你可能会看到更多框架被用于生成 `NL2SQL`，并且这些
    SQL 可能包含混合搜索。


    ### GenAI 从本地到云端


    如果我们遵循我们如何承担其他重大投资的模式，我预计 `SQL Server` 将会出现支持 `GenAI` 应用程序的功能。我在 2024 年看到像 Dell、HPE、Nvidia、AMD
    和 Red Hat 这样的公司强调 AI 应用程序不需要在公共云中运行。Microsoft 恰好拥有地球上最流行的数据库之一 `SQL Server`，所以……


    ### 更多且增强的 Copilot 体验


    Copilot 已经存在；这只是优化它们并确保它们以合适的速度运行并提供价值的问题。我认为 Microsoft 将继续投资于这个领域，包括我们运行 `Azure
    SQL`、`SQL Server` 和我们的工具的团队。


    ### JSON 和向量的增强功能


    我们在 SQL 中的 `JSON` 和向量方面有一个良好的开端，但我们还需要更多，我预计你将看到我们更多的投入。


    ### 持续投资 Microsoft Fabric


    在 2024 年，`Microsoft Fabric` 大受欢迎！它继续是一个流行的数据平台，我预计它将继续增长。我期望在未来能看到 `Microsoft
    Fabric` 带来新的、更深入的数据体验。


    ## 总结


    我认为在本书最后一章的总结中，看看 Microsoft Word 中的 Copilot 是否能构建一个好的摘要是合适的。我觉得它相当不错，因此我将其原封不动地放在这里并用引号引用。


    > “Azure SQL 提供了超越传统关系数据库管理系统 (RDBMS) 的高级功能。这些功能包括广泛的 `JSON` 支持，允许对 `JSON` 数据进行高效解析、转换、查询和格式化。此外，`Azure
    SQL` 支持正则表达式 (`RegEx`) 用于高级模式匹配和验证，增强了传统的 `T-SQL` 字符串函数。该平台还包括空间和图形数据类型，能够使用节点和边来建模和查询类似网络的数据结构。

    >

    > 此外，`Azure SQL` 提供列存储索引和内存优化，以显著提升查询性能。`SQL Ledger` 功能使用时间表来自动跟踪更改，通过加密哈希确保可审计性和数据完整性。智能查询处理
    (`IQP`) 和自动调优功能可优化查询性能和应用程序效率。`Azure SQL` 还与 `REST` API 集成，允许直接从数据库引擎与外部服务进行无缝数据交换和交互。

    >

    > 最后，`Azure SQL` 支持 AI 应用程序和 DevOps 实践，包括 `GenAI` 和自然语言到 `SQL` 查询生成。该平台与 `GitHub
    Actions` 和容器集成，促进了现代开发工作流。数据 API 生成器 (`DAB`) 通过将数据库连接和架构转换为 `REST` 或 `GraphQL`
    端点，简化了应用程序开发，减少了对大量连接代码的需求。这些高级功能使 `Azure SQL` 成为现代数据管理和应用程序开发的强大工具。”'
  raw: "## Futures\n\nThe future is very bright in my opinion for Azure SQL especially\
    \ in the areas that I described in this chapter. I have some thoughts here for\
    \ the future. None of these are a promise from Microsoft or guarantee of a feature,\
    \ but I thought it to be important to give you my insights. We will see over the\
    \ next year or so whether my instincts were right.\n\n*   **Use of** **Small Language\
    \ Models (SLM)**\n\n    I think many people today are *overprovisioning* AI applications\
    \ with Large Language Models because no one really knows how to “right size” with\
    \ a language model. I think the use of SLMs will become popular as they are less\
    \ expensive and consume less resources. However, finding the right model and right\
    \ size will become the next set of challenges in AI.\n\n*   **NL2SQL frameworks**\n\
    \n    Vector search works fine for text data, and you can combine this with hybrid\
    \ search. But consider developers who want the SQL to do all of this generated\
    \ by AI. Therefore, I think you may see more frameworks are used to generate NL2SQL\
    \ and that SQL could include hybrid searching.\n\n*   **GenAI ground to cloud**\n\
    \n    If we follow suit on how we have taken on other big investments, I expect\
    \ SQL Server to see features that will support GenAI applications. I have seen\
    \ in 2024 companies like Dell, HPE, Nvidia, AMD, and Red Hat emphasize the need\
    \ for AI applications not running in public clouds. Microsoft just happens to\
    \ have one of the most popular databases in the planet in SQL Server so….\n\n\
    *   **More and enhanced Copilot experiences**\n\n    Copilots are here to stay;\
    \ it is just a matter of refining them and making sure they operate at the right\
    \ speed and provide value. I think Microsoft will continue to invest in this space\
    \ including our team that runs Azure SQL, SQL Server, and our tools.\n\n*   **Enhancements\
    \ for JSON and vectors**\n\n    We have a good start with JSON and vectors in\
    \ SQL, but we need more, and I expect you will see more investments from us.\n\
    \n*   **Keep investing in Microsoft Fabric**\n\n    In 2024, Microsoft Fabric\
    \ was on fire! It continues to be a popular data platform, and I expect that it\
    \ will continue to grow. I expect to see new and deeper experiences with data\
    \ with Microsoft Fabric in the future.\n\n## Summary\n\nI thought it would be\
    \ fitting in the summary of the last chapter of this book to see if Copilot in\
    \ Microsoft Word could build a good summary. I thought it was pretty good, so\
    \ I put it here in quotes unedited.\n\n> “Azure SQL offers advanced features that\
    \ extend beyond traditional Relational Database Management Systems (RDBMS). These\
    \ capabilities include extensive JSON support, allowing for efficient parsing,\
    \ transforming, querying, and formatting of JSON data. Additionally, Azure SQL\
    \ supports Regular Expressions (RegEx) for advanced pattern matching and validation,\
    \ enhancing traditional T-SQL string functions. The platform also includes spatial\
    \ and graph data types, enabling the modeling and querying of network-like data\
    \ structures using nodes and edges.\n> \n> Furthermore, Azure SQL provides columnstore\
    \ indexing and memory optimization to significantly enhance query performance.\
    \ The SQL Ledger feature uses temporal tables to automatically track changes,\
    \ ensuring auditability and data integrity through cryptographic hashes. Intelligent\
    \ Query Processing (IQP) and Automatic Tuning features optimize query performance\
    \ and application efficiency. Azure SQL also integrates with REST APIs, allowing\
    \ seamless data exchange and interaction with external services directly from\
    \ the database engine.\n> \n> Lastly, Azure SQL supports AI applications and DevOps\
    \ practices, including GenAI and natural language to SQL query generation. The\
    \ platform integrates with GitHub Actions and containers, facilitating modern\
    \ development workflows. Data API Builder (DAB) simplifies app development by\
    \ translating database connections and schemas into REST or GraphQL endpoints,\
    \ reducing the need for extensive plumbing code. These advanced features make\
    \ Azure SQL a powerful tool for modern data management and application development.”"
  trans: '## 前景展望


    我认为 Azure SQL 的前景非常光明，尤其是在本章描述的领域。我对此有一些未来的思考。这些都不是来自 Microsoft 的承诺或功能保证，但我认为分享我的见解很重要。在接下来的一年左右，我们将看看我的直觉是否正确。


    ### 小型语言模型 (SLM) 的使用


    我认为如今许多人正在为 AI 应用程序*过度配置*大型语言模型，因为没有人真正知道如何为语言模型“确定合适的规模”。我认为 `SLM` 的使用将会变得流行，因为它们成本更低，消耗的资源更少。然而，找到合适的模型和规模将成为
    AI 领域的下一组挑战。


    ### NL2SQL 框架


    向量搜索对于文本数据效果很好，你可以将其与混合搜索结合。但考虑一下希望由 AI 生成所有 SQL 的开发人员。因此，我认为你可能会看到更多框架被用于生成 `NL2SQL`，并且这些
    SQL 可能包含混合搜索。


    ### 生成式人工智能从本地到云端


    如果我们遵循我们如何承担其他重大投资的模式，我预计 `SQL Server` 将会出现支持 `GenAI` 应用程序的功能。我在 2024 年看到像 Dell、HPE、Nvidia、AMD
    和 Red Hat 这样的公司强调 AI 应用程序不需要在公共云中运行。Microsoft 恰好拥有地球上最流行的数据库之一 `SQL Server`，所以……


    ### 更多且增强的 Copilot 体验


    Copilot 已经存在；这只是优化它们并确保它们以合适的速度运行并提供价值的问题。我认为 Microsoft 将继续投资于这个领域，包括我们运行 `Azure
    SQL`、`SQL Server` 和我们的工具的团队。


    ### JSON 和向量的增强功能


    我们在 SQL 中的 `JSON` 和向量方面有一个良好的开端，但我们还需要更多，我预计你将看到我们更多的投入。


    ### 持续投资 Microsoft Fabric


    在 2024 年，`Microsoft Fabric` 大受欢迎！它继续是一个流行的数据平台，我预计它将继续增长。我期望在未来能看到 `Microsoft
    Fabric` 带来新的、更深入的数据体验。


    ## 总结


    我认为在本书最后一章的总结中，看看 Microsoft Word 中的 Copilot 是否能构建一个好的摘要是合适的。我觉得它相当不错，因此我将其原封不动地放在这里并用引号引用。


    > “Azure SQL 提供了超越传统关系数据库管理系统 (RDBMS) 的高级功能。这些功能包括广泛的 `JSON` 支持，允许对 `JSON` 数据进行高效解析、转换、查询和格式化。此外，`Azure
    SQL` 支持正则表达式 (`RegEx`) 用于高级模式匹配和验证，增强了传统的 `T-SQL` 字符串函数。该平台还包括空间和图形数据类型，能够使用节点和边来建模和查询类似网络的数据结构。

    >

    > 此外，`Azure SQL` 提供列存储索引和内存优化，以显著提升查询性能。`SQL Ledger` 功能使用时间表来自动跟踪更改，通过加密哈希确保可审计性和数据完整性。智能查询处理
    (`IQP`) 和自动调优功能可优化查询性能和应用程序效率。`Azure SQL` 还与 `REST` API 集成，允许直接从数据库引擎与外部服务进行无缝数据交换和交互。

    >

    > 最后，`Azure SQL` 支持 AI 应用程序和 DevOps 实践，包括 `GenAI` 和自然语言到 `SQL` 查询生成。该平台与 `GitHub
    Actions` 和容器集成，促进了现代开发工作流。数据 API 生成器 (`DAB`) 通过将数据库连接和架构转换为 `REST` 或 `GraphQL`
    端点，简化了应用程序开发，减少了对大量连接代码的需求。这些高级功能使 `Azure SQL` 成为现代数据管理和应用程序开发的强大工具。”'
