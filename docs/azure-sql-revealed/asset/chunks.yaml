- fmt: '# Microsoft Copilot Skills in Azure SQL Database


    Around the later summer of 2023, I found myself involved in a new project at Microsoft
    for an AI Assistant for SQL under the umbrella of Copilot for Azure. The concept
    was to provide a `sidecar` chat experience in the Azure Portal. Around this time,
    Microsoft had already launched several Copilot experiences, including Microsoft
    Edge, mobile apps, and Microsoft 365. A Copilot is an example of a GenAI application
    in the form of a prompt application using language models such as GPT.


    For our time, I remember being in early meetings on the project, and one of the
    goals was to build a rich experience `using the context` of an Azure SQL Database.
    If you navigated in the Azure Portal to your database, you could chat with Copilot
    using `skills` that were `specific to your database`. I remember telling our team
    that SQL has such rich built-in telemetry, including catalog views, DMVs, Extended
    Events, and Query Store, that we could build something truly industry differentiating.


    In one of our first meetings, they asked me about some scenarios we should try
    to solve. Performance was at the top of my list. Why? Because performance troubleshooting
    involves precision for something that is normally imprecise. In fact, I distinctly
    remember telling the team I should be able to say to Copilot “My database is slow,”
    and it would use our engine telemetry based on the permissions of the user to
    narrow down the problem quickly. I showed them the “Running vs. Waiting” concept
    that I used in the Special Edition: Performance Troubleshooting Azure SQL for
    Beginners (`https://aka.ms/performanceseries`). I told the team to go through
    all the examples in the videos (for which the code can be found at `https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting`).
    I said that if I can chat with Copilot to solve these types of scenarios, we will
    have built something no one else has inside or outside of Microsoft.


    The first look at this project was when Anna Hoffman and I had one of our famous
    duels in the PASS Summit Keynote in 2023 (she always seems to win?), which you
    can view at `https://youtu.be/M80Ze7nyvVc`. And the project accelerated when the
    famous Joe Sack rejoined Microsoft and took the lead PM role for the project (who
    just happens to also be the tech reviewer for this book). The entire development
    team, led by the incredible Katherine Lin, pushed hard to get to a preview of
    the product which we unveiled at SQLBits in March 2024 (you can watch Joe and
    I present this at SQLBits at `https://sqlbits.com/sessions/event2024/Welcome_to_the_world_of_SQL_Copilots`).


    Joe has built a very nice architecture diagram, showing how this technology works
    as seen in Figure 7-2.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig2_HTML.jpg)


    Figure 7-2


    The “SQL Copilot” architecture


    You can get started with Microsoft Copilot skills in Azure SQL Database at `https://aka.ms/sqlcopilot`.


    Copilot can do more than just help you with performance. To first show you how
    Copilot understands your database context, I used a prompt like in Figure 7-3.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig3_HTML.jpg)


    Figure 7-3


    SQL Copilot database context


    Figure 7-4 shows the results.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig4_HTML.jpg)


    Figure 7-4


    SQL Copilot database context results


    You can see that Copilot “understands” your current database context. Notice it
    also provides suggestions for other possible related prompts you may want to use.
    Figure 7-5 shows what types of possible skills “SQL Copilot” can do in the Azure
    Portal.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig5_HTML.jpg)


    Figure 7-5


    SQL Copilot skills


    You can see many capabilities exist more than just performance, but that is an
    area where this capability shines.


    Note


    Copilot in Azure “understands” SQL even if you are not in the context of your
    database, but its responses will be more from documentation searches. As you can
    see from Figure 7-5, you can also use Copilot to help you search Microsoft documentation
    even in the database context.


    I’ll show you some examples of using both Database Watcher and Microsoft Copilot
    skills in Azure SQL Database to solve some performance problems later in this
    chapter. I’ll also show you another part of the Copilot story in Chapter 10 of
    the book, which is natural language to SQL (NL2SQL).


    ## Dive into DMVs and Extended Events


    Dynamic Management Views (DMVs) and Extended Events (XEvent) have been the `bedrock`
    of diagnostics, including performance monitoring and troubleshooting for SQL Server
    for many years. I can truthfully tell you that DMV and XEvent technology all started
    with the brains of folks like Slava Oks and Conor Cunningham so many years ago.
    Many on the engineering team have worked, molded, and shaped these technologies,
    but I remember being there from the beginning with Slava and my colleague for
    many years Robert Dorr and Keith Elmore working on these technologies when we
    were in Microsoft support together. DMVs and XEvent are very important technologies
    to support performance monitoring and troubleshooting for Azure SQL because Azure
    SQL is powered by the SQL Server engine, and the SQL Server engine powers Azure
    SQL Managed Instance and Database.


    Let’s dive a bit deeper into what DMV and XEvent capabilities are the same and
    new for Azure SQL vs. SQL Server.


    ### DMVs Deep Dive


    Let’s dive deeper into DMV for Azure SQL vs. SQL Server across Azure SQL Managed
    Instance and Database.


    #### Azure SQL Managed Instance


    All DMVs for SQL Server are available for Managed Instance. Key DMVs like `sys.dm_exec_requests`
    and `sys.dm_os_wait_stats` are commonly used to examine query performance.


    One DMV is specific to Azure called `sys.server_resource_stats` and shows historical
    resource usage for the Managed Instance. This is an important DMV to see resource
    usage since you do not have direct access to OS tools like Performance Monitor.
    You can learn more about `sys.server_resource_stats` at `https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-server-resource-stats-azure-sql-database`.


    #### Azure SQL Database


    `Most` of the common DMVs you need for performance, including `sys.dm_exec_requests`
    and `sys.dm_os_wait_stats`, are available. It is important to know that these
    DMVs only provide information specific to the database and not across all databases
    for a logical server.


    `sys.dm_db_resource_stats` is a DMV specific to Azure SQL Database and can be
    used to view a history of resource usage for the database. Use this DMV similar
    to how you would use `sys.server_resource_stats` for a Managed Instance. I will
    show you how to use this DMV in an example later in this chapter. For now, you
    can read more at `https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-resource-stats-azure-sql-database`.


    `sys.elastic_pool_resource_stats` is like `sys.dm_db_resource_stats` but can be
    used to view resource usage for elastic pool databases.'
