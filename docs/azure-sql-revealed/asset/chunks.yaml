- fmt: "#### Verifying Deployment\n\n虽然可以使用活动日志来验证数据库的部署，但没有直接方法来查看 SQL Server 实例背后的\
    \ `ERRORLOG`。因此，可以使用一些 T-SQL 查询来检查部署情况。\n\n##### Note\n\n尽管有些查询在逻辑主数据库的上下文中运行是有意义的，但我是在我的数据库\
    \ `bwsqldb` 的上下文中运行这些查询的。\n\n```sql\nSELECT @@version;\n```\n```\nMicrosoft SQL\
    \ Azure (RTM) - 12.0.2000.8   Jun 19 2024 16:01:48   Copyright (C) 2022 Microsoft\
    \ Corporation\n```\n\n这个结果与在 Azure SQL Managed Instance 中得到的结果完全相同，表明这是一个无版本的\
    \ SQL Server。\n\n```sql\nSELECT database_id, name, compatibility_level FROM sys.databases;\n\
    ```\n```\ndatabase_id    name                compatibility_level\n1          \
    \    master              160\n5              bwsqldb             160\n6      \
    \        bwsqldbserverless   160\n7              bwsqldb1            160\n8  \
    \            bwsqldb2            160\n9              sqldbiseasy         160\n\
    ```\n\n在用户数据库的上下文中，你总是会看到 `master` 数据库和你自己的数据库。但请注意，这仍然是逻辑主数据库，而不是托管数据库的 SQL Server\
    \ 实例上的物理主数据库。注意，对于 Azure SQL Database，我们已经默认使用 `dbcompat` 160（但你也可以根据需要改回旧的兼容级别）。\n\
    \n```sql\nSELECT name, object_id, type_desc FROM sys.objects;\n```\n\n由于这个数据库是基于示例\
    \ `AdventureWorksLT` 构建的，我从这个目录视图中得到了大约 233 行数据，包括系统表。\n\n```sql\nSELECT * FROM\
    \ sys.dm_os_schedulers;\n```\n\n这是我们能够暴露的一个 DMV，因为我们运行在一个专用的 SQL Server 实例上。我部署了一个\
    \ 8-vCore 的 Hyperscale 数据库，正如我所预期的，我得到了八个 `ONLINE` 的调度器。\n\n##### Note\n\n`sys.dm_os_sys_info`\
    \ 是支持的，但 `sys.dm_os_process_memory` 在 Azure SQL Database 中不支持。\n\n```sql\nSELECT\
    \ * FROM sys.dm_exec_requests;\n```\n\n这是世界上最常见的用于检查 SQL Server 上运行状态的 DMV 之一。我运行它只是为了确保所有正常的后台进程都在运行，包括\
    \ `LAZY WRITER`、`RECOVERY WRITER`、`LOCK MONITOR` 等。\n\n这个 DMV 在 Azure SQL Database\
    \ 上有一个有趣的转折点。它将显示你数据库所在实例的请求，而不是你逻辑服务器上其他数据库的请求（因为它们部署在其他实例上）。\n\n```sql\nSELECT\
    \ SERVERPROPERTY('EngineEdition');\n```\n\n根据 [https://learn.microsoft.com/sql/t-sql/functions/serverproperty-transact-sql](https://learn.microsoft.com/sql/t-sql/functions/serverproperty-transact-sql)\
    \ 的文档，值 5 表示 SQL Database。\n\n还有两个 Azure 特有的新 DMV，在 SQL Server 中找不到：\n\n```sql\n\
    SELECT * FROM sys.dm_user_db_resource_governance;\n```\n\n这个 DMV 的设计目的就是显示特定 Azure\
    \ SQL Database 的资源限制。你可以查看诸如内存、最大存储、日志速率等限制。你可以在 [https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database)\
    \ 阅读关于这个 DMV 的文档。\n\n```sql\nSELECT * FROM sys.dm_os_job_object;\n```\n\n这是一个\
    \ Azure 特有的 DMV，显示 Azure 使用 Windows 作业对象（Job Objects）施加给数据库的资源限制。我特别关注的列是 `memory_limit_mb`，它显示了数据库可以访问的真实内存量。我在“实现细节”一节中讨论过\
    \ Windows 作业对象。\n\n##### Note\n\n我不建议你依赖在逻辑主数据库上下文中运行这些查询的任何结果。即使你可能看到结果，它们也没有任何意义，因为逻辑主数据库并不是一个真正的物理主数据库。\n\
    \n## Migrating to Azure SQL Database\n\n迁移到 Azure SQL Database 涉及与迁移到托管实例相同的过程：评估与规划、迁移、应用更改和迁移后步骤。\n\
    \n虽然步骤相同，但你会发现几个重要的区别：\n\n*   首先也是最重要的，你无法将 SQL Server 备份还原到 Azure SQL Database，因此你所有的选择都会感觉像是一种“导出/导入”类型的体验。\n\
    \n*   Azure SQL Database 对功能有更多的限制，因此你可能会发现评估会找出更多需要在迁移前解决的问题。一个例子是像 `Service\
    \ Broker` 这样的功能，它在托管实例中支持，但在 Azure SQL Database 中不支持。让我给你一个简单的例子。当我第一次尝试将示例 `WideWorldImporters`\
    \ ([https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0))\
    \ 迁移到 Azure SQL Database 时，我遇到了一堆问题，因为该示例中使用的某些功能在 Azure SQL Database 中不起作用。因此，我需要使用在\
    \ [https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bacpac](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bacpac)\
    \ 找到的标准版 `WideWorldImporters`。\n\n*   迁移到 Azure SQL Database 需要先迁移你的架构（所有定义），然后是数据。你可以使用\
    \ Azure 数据库迁移服务（DMS）来完成此操作。在 [https://learn.microsoft.com/data-migration/sql-server/database/database-migration-service](https://learn.microsoft.com/data-migration/sql-server/database/database-migration-service)\
    \ 阅读更多关于如何执行此操作的信息。像托管实例一样，考虑使用与你当前 SQL Server 安装匹配的数据库兼容级别，然后再迁移到最新的 `dbcompat`\
    \ 级别。在 [https://aka.ms/dbcompat](https://aka.ms/dbcompat) 了解更多关于 `dbcompat` 的信息。\n\
    \n    你还可以使用 SSIS 包、Azure 数据工厂、`bcp` 或 `BACPAC` 文件将数据加载到 Azure SQL Database 中。你应该知道，Azure\
    \ SQL Database 不支持批量导入的最小日志记录。\n\n*   由 Azure Arc 评估的 SQL Server ([https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment](https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment))\
    \ 以及 Azure Migrate 评估 ([https://aka.ms/azuremigrate](https://aka.ms/azuremigrate))\
    \ 可以帮助你查看你的数据库配置是否与迁移到 Azure SQL Database 兼容，或者是否需要考虑更改。我经常看到的一个常见例子是跨数据库查询，这在\
    \ Azure SQL Database 中是不支持的。\n\n像托管实例一样，应用程序需要更改连接字符串，可能还需要更改身份验证方法。根据所使用的 T-SQL\
    \ 功能和语言构造，可能需要进行进一步的应用程序更改。为了更彻底，请查阅这份关于 T-SQL 差异的文档：[https://docs.microsoft.com/en-us/azure/azure-sql/database/transact-sql-tsql-differences-sql-server](https://docs.microsoft.com/en-us/azure/azure-sql/database/transact-sql-tsql-differences-sql-server)。\n\
    \n使用本书的其余章节来指导你在迁移后需要进行的任何更改，以充分利用 Azure 中的安全、性能和可用性。"
  raw: "#### Verifying Deployment\n\nWhile you can use the Activity Log to verify\
    \ the deployment of the database, there is no method to see the ERRORLOG behind\
    \ the SQL Server instance. Therefore, you can use several T-SQL queries to examine\
    \ the deployment.\n\nNote\n\nEven though there are some queries that make sense\
    \ to run in the context of the logical master, I ran these queries in the context\
    \ of my database bwsqldb.\n\n```\nSELECT @@version;\nMicrosoft SQL Azure (RTM)\
    \ - 12.0.2000.8   Jun 19 2024 16:01:48   Copyright (C) 2022 Microsoft Corporation\n\
    ```\n\nThis is the exact same result as with Azure SQL Managed Instance indicating\
    \ a versionless SQL Server.\n\n```\nSELECT database_id, name, compatibility_level\
    \ FROM sys.databases;\ndatabase_id    name                compatibility_level\n\
    1              master              160\n5              bwsqldb             160\n\
    6              bwsqldbserverless   160\n7              bwsqldb1            160\n\
    8              bwsqldb2            160\n9              sqldbiseasy         160\n\
    ```\n\nYou will always see master and only your database from the context of a\
    \ user database. But note that this is still the logical master not the physical\
    \ master on the SQL Server instance hosting the database. Notice for Azure SQL\
    \ Database we have moved to a default dbcompat of 160 (but you can change back\
    \ if you want to).\n\n```\nSELECT name, object_id, type_desc FROM sys.objects;\n\
    ```\n\nSince this database was built on the sample AdventureWorksLT, I have ~233\
    \ rows from this catalog view, including system tables.\n\n```\nSELECT * FROM\
    \ sys.dm_os_schedulers;\n```\n\nThis is one of the DMVs we can expose since we\
    \ are running on a dedicated SQL Server instance. I deployed an 8-vCore Hyperscale\
    \ database, so as I would expect, I get eight ONLINE schedulers.\n\nNote\n\n**sys.dm_os_sys_info**\
    \ is supported, but **sys.dm_os_process_memory** is not with Azure SQL Database.\n\
    \n```\nSELECT * FROM sys.dm_exec_requests;\n```\n\nThis is one of the most common\
    \ DMVs in the world to check the state of what is running on a SQL Server. I run\
    \ this just to make sure all the normal background processes are running, including\
    \ LAZY WRITER, RECOVERY WRITER, LOCK MONITOR, etc.\n\nHere is the interesting\
    \ twist on this DMV for Azure SQL Database. This will show you requests for the\
    \ instance for your database, not requests for other databases on your logical\
    \ server (because they are deployed on other instances).\n\n```\nSELECT SERVERPROPERTY('EngineEdition');\n\
    ```\n\nPer the documentation at [`https://learn.microsoft.com/sql/t-sql/functions/serverproperty-transact-sql`](https://learn.microsoft.com/sql/t-sql/functions/serverproperty-transact-sql),\
    \ the value of five is a SQL Database.\n\nThere are also two new DMVs specific\
    \ to Azure not found in SQL Server:\n\n```\nSELECT * FROM sys.dm_user_db_resource_governance;\n\
    ```\n\nThis DMV is really intended to show you resource limits for a specific\
    \ Azure SQL Database. You can view limits like memory, max storage, log rates,\
    \ etc. You can read the documentation for this DMV at [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database).\n\
    \n```\nSELECT * FROM sys.dm_os_job_object;\n```\n\nThis is a DMV specific to Azure\
    \ that shows resource limits Azure applies to the database using Windows Job Objects.\
    \ The specific column I look at is **memory_limit_mb** which shows me the true\
    \ amount of memory the database has access to. I talked about Windows Job Objects\
    \ in the section “Implementation Details.”\n\nNote\n\nI do not recommend you rely\
    \ on any results of running these queries in the context of the logical master.\
    \ Even though you might see results, they do not mean anything since the logical\
    \ master is not a true physical master database.\n\n## Migrating to Azure SQL\
    \ Database\n\nMigrating to Azure SQL Database involves the same process as with\
    \ a Managed Instance of assessment and planning, migration, application changes,\
    \ and post-migration.\n\nWhile the steps are the same, you will find several differences\
    \ that are important:\n\n*   First and foremost, you cannot restore a SQL Server\
    \ backup to Azure SQL Database, so all your choices will feel like an “export/import”\
    \ type of experience.\n\n*   Azure SQL Database has more restrictions on features,\
    \ so you may find your assessment is going to find more problems you need to take\
    \ care of before migrating. An example is a feature like Service Broker which\
    \ is supported in Managed Instance but not in Azure SQL Database. Let me give\
    \ you a simple example. When I first tried to migrate the example WideWorldImporters\
    \ ([`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0))\
    \ to Azure SQL Database, I ran into a bunch of problems because certain features\
    \ used in the sample didn’t work in Azure SQL Database. Therefore, I needed to\
    \ use the Standard WideWorldImporters found at [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bacpac`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bacpac).\n\
    \n*   Migrating to Azure SQL Database involves migrating your schema (all your\
    \ definitions) first and then the data. You can use Azure Database Migration Service\
    \ (DMS) to do this. Read more about how to do this at [`https://learn.microsoft.com/data-migration/sql-server/database/database-migration-service`](https://learn.microsoft.com/data-migration/sql-server/database/database-migration-service).\
    \ Like Managed Instance, consider using a database compatibility level that matches\
    \ your current SQL Server installation and then move later to the latest dbcompat\
    \ level. Learn more about dbcompat at [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat).\n\
    \n    You can also load your data into Azure SQL Database using SSIS packages,\
    \ Azure Data Factory, bcp, or a BACPAC file. You should know that minimal logging\
    \ for bulk import is not supported in Azure SQL Database.\n\n*   The SQL Server\
    \ enabled by Azure Arc Assessment ([`https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment`](https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment))\
    \ along with Azure Migrate assessments ([`https://aka.ms/azuremigrate`](https://aka.ms/azuremigrate))\
    \ can be helpful to see if your database configuration is compatible to migrate\
    \ to Azure SQL Database or whether you will need to consider changes. One common\
    \ example I see often is cross-database queries, which are not supported in Azure\
    \ SQL Database.\n\nLike Managed Instance, the application needs to change the\
    \ connection string and possibly authentication method. Depending on what T-SQL\
    \ features and language constructs are used, further application changes may be\
    \ needed. To be more thorough, please look over this documentation for T-SQL differences:\
    \ [`https://docs.microsoft.com/en-us/azure/azure-sql/database/transact-sql-tsql-differences-sql-server`](https://docs.microsoft.com/en-us/azure/azure-sql/database/transact-sql-tsql-differences-sql-server).\n\
    \nUse the rest of the chapters in the book to guide you on any post-migration\
    \ changes you need to make to fully take advantage of security, performance, and\
    \ availability in Azure."
  trans: "#### 验证部署\n\n虽然可以使用活动日志来验证数据库的部署，但没有直接的方法来查看 SQL Server 实例背后的 `ERRORLOG`。因此，可以使用一些\
    \ T-SQL 查询来检查部署情况。\n\n##### 注意\n\n尽管有些查询在逻辑主数据库的上下文中运行是有意义的，但我是在我的数据库 `bwsqldb`\
    \ 的上下文中运行这些查询的。\n\n```sql\nSELECT @@version;\n```\n```\nMicrosoft SQL Azure (RTM)\
    \ - 12.0.2000.8   Jun 19 2024 16:01:48   Copyright (C) 2022 Microsoft Corporation\n\
    ```\n\n这个结果与在 Azure SQL Managed Instance 中得到的结果完全相同，表明这是一个无版本的 SQL Server。\n\n\
    ```sql\nSELECT database_id, name, compatibility_level FROM sys.databases;\n```\n\
    ```\ndatabase_id    name                compatibility_level\n1              master\
    \              160\n5              bwsqldb             160\n6              bwsqldbserverless\
    \   160\n7              bwsqldb1            160\n8              bwsqldb2     \
    \       160\n9              sqldbiseasy         160\n```\n\n在用户数据库的上下文中，你总是会看到\
    \ `master` 数据库和你自己的数据库。但请注意，这仍然是逻辑主数据库，而不是托管数据库的 SQL Server 实例上的物理主数据库。注意，对于 Azure\
    \ SQL Database，我们已经默认使用 `dbcompat` 160（但你也可以根据需要改回旧的兼容级别）。\n\n```sql\nSELECT name,\
    \ object_id, type_desc FROM sys.objects;\n```\n\n由于这个数据库是基于示例 `AdventureWorksLT`\
    \ 构建的，我从这个目录视图中得到了大约 233 行数据，包括系统表。\n\n```sql\nSELECT * FROM sys.dm_os_schedulers;\n\
    ```\n\n这是我们能够暴露的一个 DMV，因为我们运行在一个专用的 SQL Server 实例上。我部署了一个 8-vCore 的 Hyperscale\
    \ 数据库，正如我所预期的，我得到了八个 `ONLINE` 的调度器。\n\n##### 注意\n\n`sys.dm_os_sys_info` 是支持的，但\
    \ `sys.dm_os_process_memory` 在 Azure SQL Database 中不支持。\n\n```sql\nSELECT * FROM\
    \ sys.dm_exec_requests;\n```\n\n这是世界上最常见的用于检查 SQL Server 上运行状态的 DMV 之一。我运行它只是为了确保所有正常的后台进程都在运行，包括\
    \ `LAZY WRITER`、`RECOVERY WRITER`、`LOCK MONITOR` 等。\n\n这个 DMV 在 Azure SQL Database\
    \ 上有一个有趣的转折点。它将显示你数据库所在实例的请求，而不是你逻辑服务器上其他数据库的请求（因为它们部署在其他实例上）。\n\n```sql\nSELECT\
    \ SERVERPROPERTY('EngineEdition');\n```\n\n根据 [`learn.microsoft.com/sql/t-sql/functions/serverproperty-transact-sql`](https://learn.microsoft.com/sql/t-sql/functions/serverproperty-transact-sql)\
    \ 的文档，值 5 表示 SQL Database。\n\n还有两个 Azure 特有的新 DMV，在 SQL Server 中找不到：\n\n```sql\n\
    SELECT * FROM sys.dm_user_db_resource_governance;\n```\n\n这个 DMV 的设计目的就是显示特定 Azure\
    \ SQL Database 的资源限制。你可以查看诸如内存、最大存储、日志速率等限制。你可以在 [`learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database)\
    \ 阅读关于这个 DMV 的文档。\n\n```sql\nSELECT * FROM sys.dm_os_job_object;\n```\n\n这是一个\
    \ Azure 特有的 DMV，显示 Azure 使用 Windows 作业对象（Job Objects）施加给数据库的资源限制。我特别关注的列是 `memory_limit_mb`，它显示了数据库可以访问的真实内存量。我在“实现细节”一节中讨论过\
    \ Windows 作业对象。\n\n##### 注意\n\n我不建议你依赖在逻辑主数据库上下文中运行这些查询的任何结果。即使你可能看到结果，它们也没有任何意义，因为逻辑主数据库并不是一个真正的物理主数据库。\n\
    \n## 迁移到 Azure SQL Database\n\n迁移到 Azure SQL Database 涉及与迁移到托管实例相同的过程：评估与规划、迁移、应用更改和迁移后步骤。\n\
    \n虽然步骤相同，但你会发现几个重要的区别：\n\n*   首先也是最重要的，你无法将 SQL Server 备份还原到 Azure SQL Database，因此你所有的选择都会感觉像是一种“导出/导入”类型的体验。\n\
    \n*   Azure SQL Database 对功能有更多的限制，因此你可能会发现评估会找出更多需要在迁移前解决的问题。一个例子是像 `Service\
    \ Broker` 这样的功能，它在托管实例中支持，但在 Azure SQL Database 中不支持。让我给你一个简单的例子。当我第一次尝试将示例 `WideWorldImporters`\
    \ ([`github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0))\
    \ 迁移到 Azure SQL Database 时，我遇到了一堆问题，因为该示例中使用的某些功能在 Azure SQL Database 中不起作用。因此，我需要使用在\
    \ [`github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bacpac`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bacpac)\
    \ 找到的标准版 `WideWorldImporters`。\n\n*   迁移到 Azure SQL Database 需要先迁移你的架构（所有定义），然后是数据。你可以使用\
    \ Azure 数据库迁移服务（DMS）来完成此操作。在 [`learn.microsoft.com/data-migration/sql-server/database/database-migration-service`](https://learn.microsoft.com/data-migration/sql-server/database/database-migration-service)\
    \ 阅读更多关于如何执行此操作的信息。像托管实例一样，考虑使用与你当前 SQL Server 安装匹配的数据库兼容级别，然后再迁移到最新的 `dbcompat`\
    \ 级别。在 [`aka.ms/dbcompat`](https://aka.ms/dbcompat) 了解更多关于 `dbcompat` 的信息。\n\n\
    \    你还可以使用 SSIS 包、Azure 数据工厂、`bcp` 或 `BACPAC` 文件将数据加载到 Azure SQL Database 中。你应该知道，Azure\
    \ SQL Database 不支持批量导入的最小日志记录。\n\n*   由 Azure Arc 评估的 SQL Server ([`learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment`](https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment))\
    \ 以及 Azure Migrate 评估 ([`aka.ms/azuremigrate`](https://aka.ms/azuremigrate)) 可以帮助你查看你的数据库配置是否与迁移到\
    \ Azure SQL Database 兼容，或者是否需要考虑更改。我经常看到的一个常见例子是跨数据库查询，这在 Azure SQL Database 中是不支持的。\n\
    \n像托管实例一样，应用程序需要更改连接字符串，可能还需要更改身份验证方法。根据所使用的 T-SQL 功能和语言构造，可能需要进行进一步的应用程序更改。为了更彻底，请查阅这份关于\
    \ T-SQL 差异的文档：[`docs.microsoft.com/en-us/azure/azure-sql/database/transact-sql-tsql-differences-sql-server`](https://docs.microsoft.com/en-us/azure/azure-sql/database/transact-sql-tsql-differences-sql-server)。\n\
    \n使用本书的其余章节来指导你在迁移后需要进行的任何更改，以充分利用 Azure 中的安全、性能和可用性。"
- fmt: "## Summary\n\nIn this chapter, you learned how to go through a deployment\
    \ exercise to make the best choices possible to deploy Azure SQL Managed Instance\
    \ or Database. You learned the details of deployment for both a Managed Instance\
    \ and Database along with some interesting implementation details.\n\nYou learned\
    \ how to connect and run verification queries against a Managed Instance and Database\
    \ deployment. You also learned migration techniques and tools to migrate an existing\
    \ SQL Server to Azure SQL Managed Instance and Database.\n\nThe Cloud Workshop\
    \ for the SQL Professional ([`https://aka.ms/cloudsqlworkshop`](https://aka.ms/cloudsqlworkshop))\
    \ has some great hands-on labs to try out deployment for Azure SQL Managed Instance\
    \ and Azure SQL Database. Give these a spin for a step-by-step experience:\n\n\
    [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/05_Deploy_AzureSQLMI`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/05_Deploy_AzureSQLMI)\n\
    \n[`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB)\n\
    \nNow that you have deployed, learn more in the next chapter about how to make\
    \ configuration choices and compare these choices to configuring a SQL Server\
    \ instance or database.\n\n# 5. Configuring Azure SQL\n\nNow that you have deployed\
    \ your Azure SQL Managed Instance or Database, there could be some configuration\
    \ changes you may want to make before or after moving into production.\n\nIn this\
    \ chapter, we will explore configuration options for Azure SQL Managed Instance\
    \ and Database as it compares to configuration options for SQL Server. In addition,\
    \ I will discuss some of the configuration choices you could normally make for\
    \ SQL Server that are restricted for Azure SQL and why. I will also spend time\
    \ toward the end of the chapter explaining space management, various techniques\
    \ to load data, and why Azure SQL is referred to as versionless.\n\nYou can try\
    \ out some of the methods I describe in the chapter. I will use the existing deployment\
    \ I did in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the book when discussing\
    \ configuration choices and restrictions. For you to try out any of the techniques\
    \ or commands I use in this chapter, you will need\n\n*   An Azure subscription.\n\
    *   A minimum of Contributor role access to the Azure subscription. You can read\
    \ more about Azure built-in roles at [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles).\n\
    *   Access to the Azure Portal.\n*   A deployment of an Azure SQL Managed Instance\
    \ and an Azure SQL Database.\n*   Installation of the `az` CLI (see [`https://learn.microsoft.com/cli/azure/install-azure-cli`](https://learn.microsoft.com/cli/azure/install-azure-cli)\
    \ for more details). You can also use the Azure Cloud Shell instead since `az`\
    \ is already installed. You can read more about the Azure Cloud Shell at [`https://azure.microsoft.com/features/cloud-shell/`](https://azure.microsoft.com/features/cloud-shell/).\n\
    *   You will run some T-SQL in this chapter, so install a tool like SQL Server\
    \ Management Studio (SSMS) at [`https://aka.ms/ssms`](https://aka.ms/ssms).\n\n\
    ## Configuring Azure SQL Managed Instance\n\nThere are several options you can\
    \ choose from to configure the instance of a SQL Server. Let us look at a few\
    \ of these compared to configuring an Azure SQL Managed Instance.\n\n### sp_configure\n\
    \nOne of the ways to configure SQL Server at the instance level is with the system\
    \ procedure `sp_configure`. This stored procedure is supported to use with Azure\
    \ SQL Managed Instance with these exceptions:\n\n*   Any configuration value that\
    \ requires a server restart is not supported (since we do not offer an interface\
    \ for you to restart the instance). For example, if you try to change the `scan\
    \ for startup procs` configuration option, you will get an error:\n\n    ```\n\
    \    Msg 5869\n    Changes to server configuration option scan for startup procs\
    \ are not supported in SQL Database Managed Instances\n    ```\n\n*   Advanced\
    \ configuration values are supported.\n*   Some options are not supported because\
    \ we do not allow that level of configuration or are enforced in a different manner\
    \ through resource limits. For example, if I try to change the `max server memory`\
    \ value, I get the following error:\n\n    ```\n    Msg 5870\n    Changes to server\
    \ configuration option max server memory (MB) are not supported in this edition\
    \ of SQL Server.\n    ```\n\n### Trace Flags\n\nAzure SQL Managed Instance sets\
    \ a predetermined set of global trace flags ON which you can see with `DBCC TRACESTATUS`\
    \ (there are some 31g trace flags set as of the time of the writing of this book).\n\
    \nSome flags we set cannot be turned of, such as trace flag 1800 (which is used\
    \ for disk sector size alignments), and some you can turn off and on. To see a\
    \ list of trace flags you can turn on and off, please see [`https://learn.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-transact-sql?view=sql-server-ver15#remarks`](https://learn.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-transact-sql%253Fview%253Dsql-server-ver15%2523remarks).\n\
    \nSession-level trace flags are not supported.\n\nNote\n\nWe have been striving\
    \ for some time to eliminate the need for trace flags, but clearly some are still\
    \ needed. The addition of commands like `ALTER DATABASE SCOPED CONFIGURATION`\
    \ is an example of configuration methods to use instead of trace flags.\n\n###\
    \ Tempdb\n\nThe max size limit of tempdb is configurable by changing your deployment\
    \ option or size. For a General Purpose deployment, you get 24GB per vCore but\
    \ limited to a max of ~2TB. For a Business Critical deployment, you are limited\
    \ by the maximum storage size of the instance. The transaction log is capped at\
    \ 120GB, but since Accelerated Database Recovery is ON by default and we regularly\
    \ back up the transaction log, I do not foresee a problem with you running out\
    \ of space.\n\nYou can also configure the following properties of tempdb in Azure\
    \ SQL Managed Instance:\n\n*   The number of tempdb data files (max of 128). A\
    \ new instance is deployed by default with 12 data files and 1 transaction log\
    \ file.\n*   The autogrow increment for data and log files (as with SQL Server,\
    \ this should be the same size for all data files).\n*   The logical names of\
    \ the tempdb files can be changed.\n\nWhile all these changes are persisted, the\
    \ only caveat here is that the initial size of all files is 16MB. You could change\
    \ the size of the files, but anytime a restart or failover occurs, the initial\
    \ size will be reset to 16MB, so don’t rely on changes to file size.\n\n### Master\
    \ and Model\n\nLike SQL Server, you can configure the size of the master database\
    \ and even add objects to it (but that is usually not recommended on SQL Server\
    \ anyway).\n\nThe same concept applies to model. You can configure the model database\
    \ size so that new databases will take on that size. Furthermore, you can add\
    \ objects to model which will be picked up by new user databases.\n\n### Configuring\
    \ Edition\n\nYou can use the SQL Server setup program (or `mssql-conf` with Linux)\
    \ to change the edition of SQL Server (e.g., Standard to Enterprise).\n\nFor Azure\
    \ SQL Managed Instance, you can change the deployment service tier (General Purpose\
    \ or Business Critical) or size (vCores or max storage) using the Azure Portal\
    \ or CLI interfaces such as `az sql mi update` or PowerShell `Set-AzSqlInstance`.\n\
    \nNote\n\nAs I have mentioned to this point in the book, deploying or changing\
    \ the deployment for a Managed Instance can be a time-consuming operation."
  raw: "## Summary\n\nIn this chapter, you learned how to go through a deployment\
    \ exercise to make the best choices possible to deploy Azure SQL Managed Instance\
    \ or Database. You learned the details of deployment for both a Managed Instance\
    \ and Database along with some interesting implementation details.\n\nYou learned\
    \ how to connect and run verification queries against a Managed Instance and Database\
    \ deployment. You also learned migration techniques and tools to migrate an existing\
    \ SQL Server to Azure SQL Managed Instance and Database.\n\nThe Cloud Workshop\
    \ for the SQL Professional ([`https://aka.ms/cloudsqlworkshop`](https://aka.ms/cloudsqlworkshop))\
    \ has some great hands-on labs to try out deployment for Azure SQL Managed Instance\
    \ and Azure SQL Database. Give these a spin for a step-by-step experience:\n\n\
    [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/05_Deploy_AzureSQLMI`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/05_Deploy_AzureSQLMI)\n\
    \n[`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB)\n\
    \nNow that you have deployed, learn more in the next chapter about how to make\
    \ configuration choices and compare these choices to configuring a SQL Server\
    \ instance or database.\n\n# 5. Configuring Azure SQL\n\nNow that you have deployed\
    \ your Azure SQL Managed Instance or Database, there could be some configuration\
    \ changes you may want to make before or after moving into production.\n\nIn this\
    \ chapter, we will explore configuration options for Azure SQL Managed Instance\
    \ and Database as it compares to configuration options for SQL Server. In addition,\
    \ I will discuss some of the configuration choices you could normally make for\
    \ SQL Server that are restricted for Azure SQL and why. I will also spend time\
    \ toward the end of the chapter explaining space management, various techniques\
    \ to load data, and why Azure SQL is referred to as versionless.\n\nYou can try\
    \ out some of the methods I describe in the chapter. I will use the existing deployment\
    \ I did in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the book when discussing\
    \ configuration choices and restrictions. For you to try out any of the techniques\
    \ or commands I use in this chapter, you will need\n\n*   An Azure subscription.\n\
    \n*   A minimum of Contributor role access to the Azure subscription. You can\
    \ read more about Azure built-in roles at [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles).\n\
    \n*   Access to the Azure Portal.\n\n*   A deployment of an Azure SQL Managed\
    \ Instance and an Azure SQL Database.\n\n*   Installation of the **az** CLI (see\
    \ [`https://learn.microsoft.com/cli/azure/install-azure-cli`](https://learn.microsoft.com/cli/azure/install-azure-cli)\
    \ for more details). You can also use the Azure Cloud Shell instead since az is\
    \ already installed. You can read more about the Azure Cloud Shell at [`https://azure.microsoft.com/features/cloud-shell/`](https://azure.microsoft.com/features/cloud-shell/).\n\
    \n*   You will run some T-SQL in this chapter, so install a tool like SQL Server\
    \ Management Studio (SSMS) at [`https://aka.ms/ssms`](https://aka.ms/ssms).\n\n\
    ## Configuring Azure SQL Managed Instance\n\nThere are several options you can\
    \ choose from to configure the instance of a SQL Server. Let us look at a few\
    \ of these compared to configuring an Azure SQL Managed Instance.\n\n### sp_configure\n\
    \nOne of the ways to configure SQL Server at the instance level is with the system\
    \ procedure **sp_configure**. This stored procedure is supported to use with Azure\
    \ SQL Managed Instance with these exceptions:\n\n*   Any configuration value that\
    \ requires a server restart is not supported (since we do not offer an interface\
    \ for you to restart the instance). For example, if you try to change the **scan\
    \ for startup procs** configuration option, you will get an error:\n\n    ```\n\
    \    Msg 5869\n    Changes to server configuration option scan for startup procs\
    \ are not supported in SQL Database Managed Instances\n    ```\n\n*   Advanced\
    \ configuration values are supported.\n\n*   Some options are not supported because\
    \ we do not allow that level of configuration or are enforced in a different manner\
    \ through resource limits. For example, if I try to change the **max server memory**\
    \ value, I get the following error:\n\n    ```\n    Msg 5870\n    Changes to server\
    \ configuration option max server memory (MB) are not supported in this edition\
    \ of SQL Server.\n    ```\n\n### Trace Flags\n\nAzure SQL Managed Instance sets\
    \ a predetermined set of global trace flags ON which you can see with **DBCC TRACESTATUS**\
    \ (there are some 31g trace flags set as of the time of the writing of this book).\n\
    \nSome flags we set cannot be turned of, such as trace flag 1800 (which is used\
    \ for disk sector size alignments), and some you can turn off and on. To see a\
    \ list of trace flags you can turn on and off, please see [`https://learn.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-transact-sql?view=sql-server-ver15#remarks`](https://learn.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-transact-sql%253Fview%253Dsql-server-ver15%2523remarks).\n\
    \nSession-level trace flags are not supported.\n\nNote\n\nWe have been striving\
    \ for some time to eliminate the need for trace flags, but clearly some are still\
    \ needed. The addition of commands like ALTER DATABASE SCOPED CONFIGURATION is\
    \ an example of configuration methods to use instead of trace flags.\n\n### Tempdb\n\
    \nThe max size limit of tempdb is configurable by changing your deployment option\
    \ or size. For a General Purpose deployment, you get 24GB per vCore but limited\
    \ to a max of ~2TB. For a Business Critical deployment, you are limited by the\
    \ maximum storage size of the instance. The transaction log is capped at 120GB,\
    \ but since Accelerated Database Recovery is ON by default and we regularly back\
    \ up the transaction log, I do not foresee a problem with you running out of space.\n\
    \nYou can also configure the following properties of tempdb in Azure SQL Managed\
    \ Instance:\n\n*   The number of tempdb data files (max of 128). A new instance\
    \ is deployed by default with 12 data files and 1 transaction log file.\n\n* \
    \  The autogrow increment for data and log files (as with SQL Server, this should\
    \ be the same size for all data files).\n\n*   The logical names of the tempdb\
    \ files can be changed.\n\nWhile all these changes are persisted, the only caveat\
    \ here is that the initial size of all files is 16MB. You could change the size\
    \ of the files, but anytime a restart or failover occurs, the initial size will\
    \ be reset to 16MB, so don’t rely on changes to file size.\n\n### Master and Model\n\
    \nLike SQL Server, you can configure the size of the master database and even\
    \ add objects to it (but that is usually not recommended on SQL Server anyway).\n\
    \nThe same concept applies to model. You can configure the model database size\
    \ so that new databases will take on that size. Furthermore, you can add objects\
    \ to model which will be picked up by new user databases.\n\n### Configuring Edition\n\
    \nYou can use the SQL Server setup program (or mssql-conf with Linux) to change\
    \ the edition of SQL Server (e.g., Standard to Enterprise).\n\nFor Azure SQL Managed\
    \ Instance, you can change the deployment service tier (General Purpose or Business\
    \ Critical) or size (vCores or max storage) using the Azure Portal or CLI interfaces\
    \ such as **az sql mi update** or PowerShell **Set-AzSqlInstance**.\n\nNote\n\n\
    As I have mentioned to this point in the book, deploying or changing the deployment\
    \ for a Managed Instance can be a time-consuming operation."
  trans: "## 总结\n\n在本章中，你学习了如何通过执行一次部署演练，来做出最佳选择以部署 Azure SQL 托管实例或数据库。你了解了托管实例和数据库两者的部署细节，以及一些有趣的实现细节。\n\
    \n你学习了如何连接到托管实例和数据库部署并运行验证查询。你还学习了迁移技术和工具，用于将现有的 SQL Server 迁移到 Azure SQL 托管实例和数据库。\n\
    \n针对 SQL 专业人员的云 workshop ([`https://aka.ms/cloudsqlworkshop`](https://aka.ms/cloudsqlworkshop))\
    \ 提供了一些很棒的实践实验，可用于尝试部署 Azure SQL 托管实例和 Azure SQL 数据库。试试这些以获得分步体验：\n\n[`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/05_Deploy_AzureSQLMI`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/05_Deploy_AzureSQLMI)\n\
    \n[`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB)\n\
    \n既然你已经完成了部署，可以在下一章中了解更多关于如何做出配置选择，并将这些选择与配置 SQL Server 实例或数据库进行比较的内容。\n\n# 5.\
    \ 配置 Azure SQL\n\n既然你已经部署了 Azure SQL 托管实例或数据库，在进入生产环境之前或之后，可能还需要进行一些配置更改。\n\n\
    在本章中，我们将探讨 Azure SQL 托管实例和数据库的配置选项，并将其与 SQL Server 的配置选项进行比较。此外，我将讨论一些通常可以为 SQL\
    \ Server 做出但在 Azure SQL 中受到限制的配置选择及其原因。在本章最后，我还将花时间解释空间管理、加载数据的各种技术，以及为什么 Azure\
    \ SQL 被称为无版本。\n\n你可以尝试本章描述的一些方法。在讨论配置选择和限制时，我将使用本书第 4 章中已完成的现有部署。要尝试本章中我使用的任何技术或命令，你将需要：\n\
    \n*   一个 Azure 订阅。\n*   对该 Azure 订阅具有最低限度的参与者角色访问权限。你可以在 [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles)\
    \ 了解更多关于 Azure 内置角色的信息。\n*   访问 Azure 门户的权限。\n*   一个 Azure SQL 托管实例和一个 Azure SQL\
    \ 数据库的部署。\n*   安装 `az` CLI（更多详情参见 [`https://learn.microsoft.com/cli/azure/install-azure-cli`](https://learn.microsoft.com/cli/azure/install-azure-cli)）。你也可以使用\
    \ Azure Cloud Shell，因为其中已预装 `az`。你可以在 [`https://azure.microsoft.com/features/cloud-shell/`](https://azure.microsoft.com/features/cloud-shell/)\
    \ 了解更多关于 Azure Cloud Shell 的信息。\n*   本章将运行一些 T-SQL，因此请安装一个工具，如 SQL Server Management\
    \ Studio (SSMS)：[`https://aka.ms/ssms`](https://aka.ms/ssms)。\n\n## 配置 Azure SQL\
    \ 托管实例\n\n有几种选项可用于配置 SQL Server 的实例。让我们看看其中一些与配置 Azure SQL 托管实例的比较。\n\n### sp_configure\n\
    \n在实例级别配置 SQL Server 的一种方法是使用系统存储过程 `sp_configure`。此存储过程支持在 Azure SQL 托管实例中使用，但有以下例外：\n\
    \n*   任何需要重启服务器的配置值都不受支持（因为我们不提供重启实例的接口）。例如，如果尝试更改 `scan for startup procs` 配置选项，将会收到错误：\n\
    \n    ```\n    Msg 5869\n    对服务器配置选项 scan for startup procs 的更改在 SQL 数据库托管实例中不受支持。\n\
    \    ```\n\n*   高级配置值是受支持的。\n*   某些选项不受支持，因为我们不允许该级别的配置，或者通过资源限制以不同方式强制执行。例如，如果尝试更改\
    \ `max server memory` 值，会收到以下错误：\n\n    ```\n    Msg 5870\n    对服务器配置选项 max server\
    \ memory (MB) 的更改在此版本的 SQL Server 中不受支持。\n    ```\n\n### 跟踪标志\n\nAzure SQL 托管实例将一组预定的全局跟踪标志设置为\
    \ ON，你可以使用 `DBCC TRACESTATUS` 查看（截至本书撰写时，设置了大约 31 个跟踪标志）。\n\n我们设置的一些标志无法关闭，例如跟踪标志\
    \ 1800（用于磁盘扇区大小对齐），而有些则可以关闭和开启。要查看可以开启和关闭的跟踪标志列表，请参阅 [`https://learn.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-transact-sql?view=sql-server-ver15#remarks`](https://learn.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-transact-sql%3Fview%3Dsql-server-ver15%23remarks)。\n\
    \n不支持会话级别的跟踪标志。\n\n注意\n\n我们一直在努力消除对跟踪标志的需求，但显然有些仍然是必需的。像 `ALTER DATABASE SCOPED\
    \ CONFIGURATION` 这样的命令的引入，就是替代跟踪标志的配置方法的一个例子。\n\n### Tempdb\n\nTempdb 的大小上限可通过更改部署选项或大小进行配置。对于通用型部署，每个\
    \ vCore 分配 24GB，但最大限制约为 2TB。对于业务关键型部署，其大小受实例的最大存储大小限制。事务日志上限为 120GB，但由于默认启用了加速数据库恢复，并且我们会定期备份事务日志，因此我预计你不会遇到空间不足的问题。\n\
    \n你还可以在 Azure SQL 托管实例中配置 tempdb 的以下属性：\n\n*   tempdb 数据文件的数量（最多 128 个）。新实例默认部署有\
    \ 12 个数据文件和 1 个事务日志文件。\n*   数据文件和日志文件的自动增长增量（与 SQL Server 一样，所有数据文件的大小应相同）。\n\
    *   可以更改 tempdb 文件的逻辑名称。\n\n虽然所有这些更改都是持久化的，但唯一的注意事项是所有文件的初始大小为 16MB。你可以更改文件的大小，但每次发生重启或故障转移时，初始大小将重置为\
    \ 16MB，因此不要依赖对文件大小的更改。\n\n### Master 和 Model\n\n与 SQL Server 类似，你可以配置 master 数据库的大小，甚至可以向其添加对象（尽管这在\
    \ SQL Server 上通常也不推荐）。\n\n同样的概念也适用于 model。你可以配置 model 数据库的大小，以便新数据库采用该大小。此外，你可以向\
    \ model 添加对象，这些对象将被新的用户数据库继承。\n\n### 配置版本\n\n你可以使用 SQL Server 安装程序（或在 Linux 上使用\
    \ `mssql-conf`）来更改 SQL Server 的版本（例如，从标准版到企业版）。\n\n对于 Azure SQL 托管实例，你可以使用 Azure\
    \ 门户或 CLI 接口（如 `az sql mi update` 或 PowerShell `Set-AzSqlInstance`）来更改部署服务层级（通用型或业务关键型）或大小（vCore\
    \ 数或最大存储）。\n\n注意\n\n正如我在本书前面所提到的，部署或更改托管实例的部署可能是一个耗时的操作。"
- fmt: '### Compute and Storage


    You learned about the various options for compute and storage that come with your
    choice of service tier in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the book.


    Just remember that for `Managed Instance`, changes to `vCores`, hardware configuration,
    and/or max storage could result in a management operation that takes some time.
    For example, scaling storage for a `General Purpose` service tier can take as
    fast as five minutes. However, scaling `vCores` for any service tier can take
    an hour. In addition, many operations that affect a `Business Critical` service
    tier may require a reseeding of the database to another node. Downtime is minimal
    since any change doesn’t affect your application until a “cutover” takes place.
    Remember the `NextGen` for the `General Purpose` service tiers includes the ability
    to configure `IOPS` separate from compute and storage.


    The complete list of all operations and expected durations can be found at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview).


    ### Networking Configuration


    Once you have deployed a `Managed Instance`, you may need to make some adjustments
    to the network configuration for the instance.


    You have the option to `move the Managed Instance to another subnet`, either within
    the current virtual network or to a different one. Think of this like provisioning
    a new virtual cluster with your instance and all databases moved and then removing
    the existing cluster. Like other management operations, this could be a lengthy
    process, but your downtime is minimal. Learn all the details at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/vnet-subnet-move-instance`](https://learn.microsoft.com/azure/azure-sql/managed-instance/vnet-subnet-move-instance).


    You can `enable the public endpoint` (which I left disabled during deploy) and
    `change the connection type` to `Proxy` (which is the default, but I chose `Redirect`
    during deployment).


    In addition, there is another option that was offered during deployment, which
    is the `minimum TLS version`. Transport Layer Security (`TLS`) is a protocol for
    encrypting connections and is supported by `SQL Server` and Azure SQL. `TLS 1.2`
    is the minimal supported version recommended today as it includes fixes for some
    vulnerabilities found in previous versions. However, be careful with this setting
    as it could break an application using drivers that can’t use that `TLS` version.
    You can read more about minimal `TLS` version at [`https://learn.microsoft.com/azure/azure-sql/database/connectivity-settings?view=azuresql&tabs=azure-portal#minimum-tls-version`](https://learn.microsoft.com/azure/azure-sql/database/connectivity-settings%253Fview%253Dazuresql%2526tabs%253Dazure-portal%2523minimum-tls-version).


    Networking options for `Managed Instance` can also be configured using `az sql
    mi update` and PowerShell `Set-AzSqlInstance`.


    I will discuss the ability to add private endpoint connections in Chapter [6](#496204_2_En_6_Chapter.xhtml)
    of the book.


    ### Maintenance


    You can use the `Settings and Maintenance Updates` option to configure maintenance
    windows, set up alerts for maintenance activities, and control the update policy.


    As I described in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the book, Azure
    SQL `Managed Instance` supports a `maintenance window`. This allows you to define
    a different timeframe when scheduled maintenance is required on your deployed
    instance. Instead of the default, which is 5pm to 8am on any day of the week,
    you can choose different day ranges and timeframes.


    In addition, you can set up `alerts` to notify you in advance when scheduled maintenance
    activities are required.


    Finally, you can configure the `update policy`, which I described in Chapter [4](#496204_2_En_4_Chapter.xhtml)
    of the book. This allows you to maintain compatibility with `SQL Server 2022`
    (allowing you to restore backups to `SQL Server 2022` and set up online disaster
    recovery) or use the option for “Always-up-to-date” which is the versionless engine
    for continuous updates.


    Regardless of the configured update policy, all instances will continue receiving
    updates and features that don’t require changes to the `SQL` engine, such as the
    following features: zone redundancy, instance stop and start, and fast provisioning.


    Important


    If you choose the `Always-up-to-date` policy, you cannot go back to the `SQL Server
    2022` policy.


    ### Start and Stop


    One of the cool features that the Azure SQL `Managed Instance` team built since
    the first edition of this book is the ability to start and stop the instance,
    including on a schedule.


    You can see how to configure this in the Azure Portal as in Figure [5-1](#496204_2_En_5_Chapter.xhtml#Fig1).


    ![](images/496204_2_En_5_Chapter/496204_2_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Starting and stopping an Azure SQL `Managed Instance`


    This feature can be a huge cost savings because you do not pay for compute when
    the instance is stopped (but you still pay for storage). However, starting a stopped
    instance could take up to 20 minutes.'
