  trans: "\n# SQL 最佳实践评估\n\n此选项是一个工具，允许你扫描 SQL Server 部署的配置，并根据 SQL 社区和 Microsoft\
    \ 的通用知识，为可能非最优或未遵循最佳实践的设置提供建议。你可以按需或按计划运行评估。该工具提供了一些非常棒的建议，因此我推荐你试一试，看看它能如何帮助你。你可以在\
    \ [`https://github.com/microsoft/sql-server-samples/blob/master/samples/manage/sql-assessment-api`](https://github.com/microsoft/sql-server-samples/blob/master/samples/manage/sql-assessment-api)\
    \ 查看它使用的完整规则集，并在 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-assessment-for-sql-vm`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-assessment-for-sql-vm)\
    \ 了解更多关于此功能的信息。\n\n## 安全性\n\n安全性选项包括与 Microsoft Entra 和 Microsoft Defender for\
    \ Cloud 等服务的集成。\n\n### 安全性配置\n\n此选项允许你启用与 `Azure Key Vault` 的集成，这对于使用透明数据加密（自带密钥）等功能来说是一个非常不错的选择。\n\
    \n你还可以启用与 `Microsoft Entra`（前身为 Azure Active Directory）的集成。此选项需要 SQL Server 2022，是为身份验证提供替代方案（替代基本或\
    \ SQL 身份验证）的绝佳解决方案，特别是因为你不需要像 Windows 身份验证那样需要域控制器。此功能的一个重要用途是使用托管身份，从而可以构建连接到\
    \ SQL Server 的 `无密码` 应用程序。在 [`https://learn.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-overview`](https://learn.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-overview)\
    \ 了解更多。\n\n### Microsoft Defender for Cloud\n\n此功能以前称为高级数据安全，但现在已归入 Microsoft\
    \ Defender 旗下。此处的能力保持不变：\n\n*   漏洞评估\n    根据已知的行业标准（例如 FedRAMP），扫描可能导致潜在安全漏洞的任何配置设置（例如，启用了\
    \ sa 帐户）。\n\n*   高级威胁防护\n    对检测到的任何威胁发出警报，例如暴力登录攻击（启用了 SQL 身份验证且有人试图破解 sa 密码）和\
    \ SQL 注入攻击。\n\n你可以在 [`https://learn.microsoft.com/azure/defender-for-cloud/defender-for-sql-usage`](https://learn.microsoft.com/azure/defender-for-cloud/defender-for-sql-usage)\
    \ 了解更多关于 Microsoft Defender for Cloud 和 Azure VM 上 SQL 的信息。\n\n**提示**\n\nDefender\
    \ 团队有两个值得关注的新功能，包括 `数据安全仪表板`（[`https://learn.microsoft.com/azure/defender-for-cloud/data-aware-security-dashboard-overview`](https://learn.microsoft.com/azure/defender-for-cloud/data-aware-security-dashboard-overview)）和\
    \ `Copilot 体验`（[`https://learn.microsoft.com/azure/defender-for-cloud/copilot-security-in-defender-for-cloud`](https://learn.microsoft.com/azure/defender-for-cloud/copilot-security-in-defender-for-cloud)）。\n\
    \n服务菜单上还有另一个值得关注的选项叫做 `SQL Server IaaS 代理扩展设置`。这可以帮助你修复扩展的任何问题，并设置自动升级。\n\n除了使用门户，你还可以使用\
    \ `az sql vm` CLI。这允许你注册你的 VM 或更改 SQL Server 属性。你可以在 [`https://learn.microsoft.com/cli/azure/sql/vm`](https://learn.microsoft.com/cli/azure/sql/vm)\
    \ 阅读所有这些选项。\n\n# 配置 Azure 虚拟机\n\n在虚拟机内部，你的 SQL Server 配置与你在数据中心部署的虚拟机完全相同。从 Azure\
    \ 基础架构的角度来看，虚拟机的配置有一些方面值得关注。\n\n## 停止与解除分配\n\n关闭 Azure 中的虚拟机可能有几个原因。如果你在虚拟机内部关闭虚拟机（例如，Windows\
    \ 关机），虚拟机将停止，但计算资源仍为该虚拟机保留，这意味着你仍需为计算付费。虚拟机状态在门户和 CLI 界面中将显示为 `已停止`。要关闭虚拟机并确保不为计算付费，你需要使用虚拟机外部的界面（例如\
    \ Azure 门户中的“停止”命令菜单或 az CLI）来停止虚拟机。在这种情况下，虚拟机的状态列为 `已停止（已解除分配）`。根据你的要求，你甚至可以使用\
    \ Azure 界面自动化虚拟机的启动和停止过程。在 [`https://techcommunity.microsoft.com/t5/educator-developer-blog/azure-virtual-machine-auto-shutdown/ba-p/379342`](https://techcommunity.microsoft.com/t5/educator-developer-blog/azure-virtual-machine-auto-shutdown/ba-p/379342)\
    \ 阅读更多。\n\n一个相关的主题是托管虚拟机的基础架构的维护窗口。在 [`https://learn.microsoft.com/azure/virtual-machines/maintenance-and-updates`](https://learn.microsoft.com/azure/virtual-machines/maintenance-and-updates)\
    \ 阅读更多关于 Azure 虚拟机主机更新和维护的信息。\n\n## 调整大小\n\n如果在部署时没有选择合适的 Azure 虚拟机大小怎么办？你可以使用\
    \ Azure 门户（从服务菜单中选择大小）或 CLI 界面来更改虚拟机的大小。此过程称为 Azure 虚拟机的 `调整大小`。调整大小非常类似于在你的数据中心内为虚拟机更改可用资源（CPU、存储、内存等）。虽然你可以在\
    \ Azure 虚拟机运行时调整其大小，但调整大小操作需要重新启动虚拟机。可用于调整大小的选项取决于你的虚拟机是正在运行还是已停止（已解除分配）。这种差异是因为当前虚拟机主机上可能只有某些大小可用（运行情况）。要查看完整的虚拟机大小列表，我建议你首先停止（解除分配）你的虚拟机。在\
    \ [`https://azure.microsoft.com/blog/resize-virtual-machines/`](https://azure.microsoft.com/blog/resize-virtual-machines/)\
    \ 阅读 Azure 虚拟机调整大小的整体说明。\n\n你可以使用 Azure Migrate 将 Azure 虚拟机迁移到其他区域。在 [`https://learn.microsoft.com/azure/site-recovery/azure-to-azure-tutorial-migrate`](https://learn.microsoft.com/azure/site-recovery/azure-to-azure-tutorial-migrate)\
    \ 阅读更多。此外，要更改虚拟机的资源组或订阅，请阅读 [`https://learn.microsoft.com/azure/azure-resource-manager/management/move-resource-group-and-subscription`](https://learn.microsoft.com/azure/azure-resource-manager/management/move-resource-group-and-subscription)\
    \ 的文档。\n\n## 安全性 (RBAC)\n\n基于角色的访问控制 (RBAC) 允许你向其他 Azure 帐户分配权限，以管理 Azure 虚拟机。可以将其视为如何控制\
    \ `虚拟机外部` 的安全性。你通过服务菜单上的 `访问控制 (IAM)` 选项进行管理。这是许多 Azure 资源的常见选项。在 [`https://learn.microsoft.com/azure/role-based-access-control/quickstart-assign-role-user-portal`](https://learn.microsoft.com/azure/role-based-access-control/quickstart-assign-role-user-portal)\
    \ 了解更多。\n"
- fmt: '### Other Config Options


    There are other options to configure your Azure Virtual Machine using the portal
    from the Service Menu or CLI interfaces.


    Examples include resetting the password for the admin user, viewing security recommendations,
    and redeploying the VM to another host. Read more about some of these options
    at [`https://learn.microsoft.com/azure/virtual-machines/windows/tutorial-config-management`](https://learn.microsoft.com/azure/virtual-machines/windows/tutorial-config-management).


    ## Maximizing Storage Performance


    Based on our experience with customers, getting the right size for your Azure
    Virtual Machine is the number one factor in ensuring you have the right performance
    you need for SQL Server (except for standard SQL Server performance optimization
    practices). Let’s go into more detail as why this choice is so important.


    ### Best Practices


    You saw earlier in this chapter the example of how a SQL Server gallery image
    will create additional managed `data disks` based on Azure Premium Storage. To
    achieve your best I/O performance and availability for SQL Server on Azure Virtual
    Machine, you should keep these principles in mind, some of which I have mentioned
    as I showed you how to configure storage in the Azure Portal:


    *   Use the Azure Portal to help guide your choices as it includes warnings if
    the VM size doesn’t support your I/O choices. It also helps you easily configure
    multiple disks (which use Windows Storage Spaces behind the scenes), separate
    your data and log storage, move system databases off the OS drive, and configure
    `tempdb` storage.


    *   Do not create any user databases on the OS disk.


    *   Put `tempdb` on the local SSD drive which is also called temporary storage.
    If your VM fails over for any reason to a different host, the contents of `tempdb`
    are lost, but who cares since `tempdb` is recreated at startup time.


    *   Separate your database and log files on different `managed` disks as you would
    with any SQL Server production deployment.


    *   Use premium managed disks at minimum (also called Premium SSD). One option
    for extreme low latency is Ultra disks. Ultra disks are more expensive but for
    SQL production workload could be a needed choice for heavy write workloads where
    the latency of the transaction log is important. Learn more about how to configure
    this at [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/storage-migrate-to-ultradisk`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/storage-migrate-to-ultradisk).


    ### Premium SSD v2


    As you saw from the examples of configuring storage via the Azure Portal, it is
    possible you need to overprovision storage to achieve your IOPS and throughput
    needs. This is because these resource numbers are tied to the size of premium
    managed disks.


    Premium SSD v2 for SQL (now in preview) provides a new method to control your
    IOPS and throughput independent of the size of disks.


    We have a new Azure portal experience to use this new option. However, as of the
    time of the writing of this book, it requires you to deploy your VM with an Availability
    Zone, even for a single SQL instance. While this will not cause any specific issue
    for you, deploying an Azure VM in a single Availability Zone does not really gain
    you any extra availability. Availability Zones are typically only needed for virtual
    machines for HA scenarios like Always On Availability Groups.


    If you make this choice on the Basics screen of the portal (under Availability
    Options), you will see a new option under the Storage Configuration under SQL
    Server Setting that looks like Figure [3-28](#496204_2_En_3_Chapter.xhtml#Fig28).


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig28_HTML.jpg)


    Figure 3-28

    Choosing the new Premium SSD v2 storage for SQL


    When you select `Change configuration`, you now see a new portal experience to
    control size, IOPS, and throughput independently as seen in Figure [3-29](#496204_2_En_3_Chapter.xhtml#Fig29).


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig29_HTML.jpg)


    Figure 3-29

    The new Premium SSD v2 storage experience


    Learn more details at [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/storage-configuration-premium-ssd-v2`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/storage-configuration-premium-ssd-v2).


    ### Learn More


    You of course must balance these choices with cost. All the managed disks are
    based on Azure Blob Storage. An entire chapter would be needed to give you all
    the internals of how Azure Blob Storage and managed disks work. For now, look
    at these resources:


    *   Details on Azure managed disk types can be found at [`https://learn.microsoft.com/azure/virtual-machines/disks-types`](https://learn.microsoft.com/azure/virtual-machines/disks-types).
    You will see in these tables what sizes, IOPS, and throughput each type supports.


    *   We have guidance in our documentation specific to choosing the right storage
    for SQL Server for Azure VM at [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist).


    *   This documentation provides nice guidance on choosing the right sizes for
    Azure Premium Storage along with VM size. You can read this at [`https://learn.microsoft.com/azure/virtual-machines/premium-storage-performance`](https://learn.microsoft.com/azure/virtual-machines/premium-storage-performance).


    *   An independent study on performance for SQL Server on Azure Virtual Machine
    was published by GigaOm. Learn more at [`https://techcommunity.microsoft.com/t5/sql-server-blog/sql-server-on-azure-vms-the-best-price-performance-gets-even/ba-p/3727091`](https://techcommunity.microsoft.com/t5/sql-server-blog/sql-server-on-azure-vms-the-best-price-performance-gets-even/ba-p/3727091).


    One major key point I’ve mentioned before but worth repeating is to `match the
    right VM size to meet your storage needs` as VM sizes have limits on the number
    of data disk, total IOPS, and throughput across all disks. Then provision the
    data disks you need for database and transaction log files within that total IOPS.


    ## Performance Monitoring


    Since SQL Server is deployed inside a virtual machine, you should use all the
    normal techniques available to you to monitor performance, including SQL tools
    such as Dynamic Management Views (`DMVS`) and operating system tools such as Windows
    Performance Monitor or Linux tools.


    Having said that, Azure Monitor provides integrated performance metrics for virtual
    machines, including SQL Server performance counters (for Windows only).'
