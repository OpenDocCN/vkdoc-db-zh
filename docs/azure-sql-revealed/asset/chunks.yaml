    even supports this concept. Azure provides the same type of service through Microsoft
    Entra.


    The first step in using Microsoft Entra (Entra) authentication for a Managed Instance
    is to provision an administrator for the Managed Instance from an Entra user.
    To use Entra with Managed Instance, you first need to create an Entra directory.
    It is possible when you sign in to the Azure Portal you are already part of an
    Entra directory for your organization. For me, that is the case at Microsoft.


    To set up an Entra admin for a Managed Instance, you must have “Administrator”
    rights for your Entra to grant read permissions. I don’t have these at Microsoft.
    The documentation shows the process to configure this Entra admin at [`https://learn.microsoft.com/azure/azure-sql/database/authentication-aad-configure`](https://learn.microsoft.com/azure/azure-sql/database/authentication-aad-configure).
    This covers both the portal and CLI options to configure an Entra admin for Managed
    Instance.


    The new Entra admin will become a member of the sysadmin server role for the Managed
    Instance. Now you can use the T-SQL CREATE LOGIN statement to create new logins
    based on Entra users. The FROM EXTERNAL PROVIDER clause provides this capability.
    The documentation shows an example of this syntax at [`https://learn.microsoft.com/sql/t-sql/statements/create-login-transact-sql?view=azuresqldb-mi-current`](https://learn.microsoft.com/sql/t-sql/statements/create-login-transact-sql?view=azuresqldb-mi-current)
    like the following T-SQL statement:


    ```

    CREATE LOGIN [bob@contoso.com] FROM EXTERNAL PROVIDER;

    ```


    #### Windows Authentication


    Many SQL applications use Windows Authentication to connect to SQL Server. We
    now have an option for those applications to still use Windows Authentication,
    so they will not have to change that authentication method with Azure SQL Managed
    Instance.


    This process still uses Microsoft Entra behind the scenes along with service principals
    to help implement Kerberos authentication.


    Windows Authentication for Microsoft Entra principals on managed instances is
    available for virtual machines joined to Active Directory, Microsoft Entra ID,
    or hybrid Microsoft Entra ID – a hybrid Microsoft Entra user identity exists both
    in Microsoft Entra ID and Active Directory and can access a managed instance in
    Azure using Microsoft Entra Kerberos.


    The only issue you might run into with this method is that logins are still created
    in the engine with the CREATE LOGIN FROM EXTERNAL PROVIDER as you would with Microsoft
    Entra. Learn how to set this up at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup`](https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup).


    Note


    At the time of the writing of this book, a new feature has been released for preview
    called **Native Windows Principals**. I highly encourage you to take a look at
    this feature because it can provide a way for you to use the familiar CREATE LOGIN
    FROM WINDOWS T-SQL statement. This feature uses a new concept called an authentication
    metadata mode. Take a look at the details at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/native-windows-principals`](https://learn.microsoft.com/azure/azure-sql/managed-instance/native-windows-principals).


    ### Authentication for Azure SQL Database


    When I showed you how to deploy an Azure SQL Database in Chapter [4](#496204_2_En_4_Chapter.xhtml)
    of the book, I supplied a **server admin login** through both SQL Authentication
    and Microsoft Entra. I used the SQL Authentication login to connect to the logical
    server. This admin account is a *server-level principal* for the logical server
    and is mapped as **dbo** in all databases.


    Note


    You cannot change the SQL Authentication admin once you deploy. You can reset
    the password for the admin through the Azure portal, az CLI, or PowerShell. You
    can change the Microsoft Entra admin after you deploy.


    If you would like to create other logins that have admin capabilities (but not
    full server admin), you should use the CREATE LOGIN T-SQL statement to create
    standard SQL logins for the logical server in the context of the logical master
    database. You can then create a user in context of the logical master database
    and assign this user to two special roles for Azure SQL Database using ALTER ROLE:


    *   **dbmanager** – Users assigned to this role can create and manage databases
    and will be mapped to the dbo of that database, so has full database owner permissions.


    *   **loginmanager** – Users assigned to this role can create new logins in the
    context of the logical master but are not mapped to the dbo role of databases.


    You can now use the standard process with SQL Server to create SQL logins and
    map them to users in any database they need access. You can assign users to roles
    and even create new roles just like SQL Server.


    Note


    One complexity with using logins is that when you choose a failover option like
    geo-replication, you must create the login on the secondary server manually.


    #### Using Contained Users


    You can also create contained database users that don’t require a login. This
    concept has been around for a while with SQL Server using contained databases.
    Azure SQL Database is in a way a contained database. Contained users are also
    called **user accounts**.


    The CREATE USER T-SQL statement supports contained users using the WITH PASSWORD
    clause. One advantage of a contained user is that the information is stored in
    the database and therefore replicated as part of a geo-replication failover deployment.'
  trans: '

    ### Azure SQL 托管实例的身份验证


    在 Windows 上部署 SQL Server 时，默认的身份验证`模式`是“仅限 Windows”。这意味着只有 Windows 用户可以登录 SQL
    Server。`混合模式安全性`则允许 SQL 和 Windows 登录（Linux 需要混合模式）。Azure SQL 托管实例强制使用混合模式安全性，您无法更改此设置。


    部署 Azure SQL 托管实例时，您需要指定一个`管理员帐户`，如本书第 4 章所示。这可以是一个 SQL 身份验证帐户、Microsoft Entra
    帐户，或两者兼有。此帐户将被添加为 `sysadmin` 角色的成员。`sa` 登录默认是禁用的，但您可以启用并使用它（不过我不推荐这样做）。


    通过此 `sysadmin` 登录，您可以像使用 SQL Server 一样添加其他 SQL 登录，并将它们分配给角色（甚至是 `sysadmin` 角色）。您还可以在数据库中创建用户并将其映射到登录名，就像在
    SQL Server 中一样。


    > **注意**

    >

    > 一旦部署，您就无法更改 SQL 管理员。您可以通过 `Azure 门户`、`az CLI` 或 `PowerShell` 重置管理员的密码。


    #### Microsoft Entra 身份验证


    我们为您提供了将 `Microsoft Entra 登录`添加到托管实例的功能。当您对 SQL Server 使用 Windows 或域身份验证时，您实际上是在使用
    Active Directory 域服务。Linux 上的 SQL Server 也支持此概念。Azure 通过 Microsoft Entra 提供相同类型的服务。


    对托管实例使用 Microsoft Entra (Entra) 身份验证的第一步是从一个 Entra 用户中为托管实例预配一个管理员。要在托管实例上使用 Entra，您首先需要创建一个
    Entra 目录。当您登录 Azure 门户时，您可能已经属于您组织的 Entra 目录。对我来说，在微软就是这种情况。


    要为托管实例设置 Entra 管理员，您必须拥有 Entra 的“管理员”权限以授予读取权限。我在微软没有这些权限。配置此 Entra 管理员的流程记录在
    [`https://learn.microsoft.com/azure/azure-sql/database/authentication-aad-configure`](https://learn.microsoft.com/azure/azure-sql/database/authentication-aad-configure)。其中涵盖了为托管实例配置
    Entra 管理员的门户和 CLI 选项。


    新的 Entra 管理员将成为托管实例的 `sysadmin` 服务器角色的成员。现在，您可以使用 `CREATE LOGIN` T-SQL 语句基于 Entra
    用户创建新的登录名。`FROM EXTERNAL PROVIDER` 子句提供了此功能。文档在 [`https://learn.microsoft.com/sql/t-sql/statements/create-login-transact-sql?view=azuresqldb-mi-current`](https://learn.microsoft.com/sql/t-sql/statements/create-login-transact-sql?view=azuresqldb-mi-current)
    展示了此语法的示例，如下 T-SQL 语句所示：


    ```sql

    CREATE LOGIN [bob@contoso.com] FROM EXTERNAL PROVIDER;

    ```


    #### Windows 身份验证


    许多 SQL 应用程序使用 Windows 身份验证连接到 SQL Server。我们现在为这些应用程序提供了一个选项，使它们在使用 Azure SQL 托管实例时，仍然可以使用
    Windows 身份验证，从而无需更改身份验证方法。


    此过程在后台仍使用 Microsoft Entra 和服务主体来帮助实现 Kerberos 身份验证。


    托管实例上针对 Microsoft Entra 主体的 Windows 身份验证，适用于加入到 Active Directory、Microsoft Entra
    ID 或混合 Microsoft Entra ID 的虚拟机——混合 Microsoft Entra 用户标识同时存在于 Microsoft Entra ID
    和 Active Directory 中，并且可以使用 Microsoft Entra Kerberos 访问 Azure 中的托管实例。


    使用此方法可能遇到的唯一问题是，登录名仍然需要在引擎中使用 `CREATE LOGIN FROM EXTERNAL PROVIDER` 创建，就像对 Microsoft
    Entra 所做的那样。请在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup`](https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup)
    了解如何进行设置。


    > **注意**

    >

    > 在撰写本书时，一个名为 `原生 Windows 主体` 的新功能已发布预览。我强烈建议您了解此功能，因为它可以为您提供一种使用熟悉的 `CREATE LOGIN
    FROM WINDOWS` T-SQL 语句的方式。此功能使用了一个称为身份验证元数据模式的新概念。请在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/native-windows-principals`](https://learn.microsoft.com/azure/azure-sql/managed-instance/native-windows-principals)
    查看详细信息。


    ### Azure SQL 数据库的身份验证


    当我在本书第 4 章向您展示如何部署 Azure SQL 数据库时，我同时通过 SQL 身份验证和 Microsoft Entra 提供了`服务器管理员登录名`。我使用了
    SQL 身份验证登录名连接到逻辑服务器。此管理员帐户是逻辑服务器的`服务器级别主体`，并在所有数据库中映射为 `dbo`。


    > **注意**

    >

    > 一旦部署，您就无法更改 SQL 身份验证管理员。您可以通过 `Azure 门户`、`az CLI` 或 `PowerShell` 重置管理员的密码。部署后，您可以更改
    Microsoft Entra 管理员。


    如果您想创建其他具有管理员能力（但不是完整的服务器管理员）的登录名，您应该使用 `CREATE LOGIN` T-SQL 语句，在逻辑主数据库的上下文中为逻辑服务器创建标准
    SQL 登录名。然后，您可以在逻辑主数据库的上下文中创建一个用户，并使用 `ALTER ROLE` 将此用户分配给 Azure SQL 数据库的两个特殊角色：


    - `dbmanager` – 分配给此角色的用户可以创建和管理数据库，并将映射到该数据库的 `dbo`，因此拥有完整的数据库所有者权限。

    - `loginmanager` – 分配给此角色的用户可以在逻辑主数据库的上下文中创建新的登录名，但不会映射到数据库的 `dbo` 角色。


    现在，您可以使用 SQL Server 的标准流程来创建 SQL 登录名，并将其映射到它们需要访问的任何数据库中的用户。您可以将用户分配给角色，甚至可以像在
    SQL Server 中一样创建新角色。


    > **注意**

    >

    > 使用登录名的一个复杂之处在于，当您选择像异地复制这样的故障转移选项时，您必须手动在辅助服务器上创建登录名。


    #### 使用包含用户


    您还可以创建不需要登录名的包含数据库用户。这个概念在 SQL Server 使用包含数据库时已经存在一段时间了。Azure SQL 数据库在某种程度上就是一个包含数据库。包含用户也称为`用户帐户`。


    `CREATE USER` T-SQL 语句支持使用 `WITH PASSWORD` 子句创建包含用户。包含用户的一个优势是信息存储在数据库中，因此作为异地复制故障转移部署的一部分被复制。

    '
- fmt: "## Microsoft Entra Authentication\n\n与托管实例类似，Azure SQL Database 也支持 Microsoft\
    \ Entra 身份验证。就像在 SQL Server 中使用 Windows 身份验证一样，Entra 身份验证可能是与 Azure SQL Database\
    \ 一起使用的最安全且最佳的方法。您可以为逻辑服务器创建一个 Entra 服务器管理员（在部署期间创建的 SQL 服务器管理员之外）。然后，您可以基于 Entra\
    \ 帐户创建包含用户。您甚至可以基于 Entra 组创建用户。\n\n对于身份验证，您可以设置的一个选项是仅使用 Microsoft Entra 身份验证，正如我在这里为已部署的数据库所做的那样，如图\
    \ [6-6](#496204_2_En_6_Chapter.xhtml#Fig6) 所示。\n\n![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig6_HTML.jpg)\n\
    *图 6-6：逻辑服务器的 Microsoft Entra 选项*\n\n这与在 SQL Server 中仅使用 Windows 身份验证非常相似。与 SQL\
    \ 身份验证一样，我可以使用 Microsoft Entra 帐户创建其他登录名和包含用户。您应该知道，PowerShell 也支持使用 `Set-AzSqlServerActiveDirectoryAdministrator`\
    \ cmdlet 创建 Entra 管理员，而 az CLI 支持 `az sql server ad-admin create`。\n\n以 Entra\
    \ 管理员身份连接到此用户数据库后，我可以基于另一个 Entra 帐户创建包含用户，如下所示（这是 Microsoft Entra 中的一个假设帐户）：\n\
    \n```sql\nCREATE USER [troyward@microsoft.com] FROM EXTERNAL PROVIDER;\nGO\n```\n\
    \n然后，我将通过将此用户添加到 `db_datareader` 角色来授予其读取数据的权限：\n\n```sql\nALTER ROLE db_datareader\
    \ ADD MEMBER [troyward@microsoft.com];\nGO\n```\n\n> **提示**：如果您想知道在应用程序中使用 Microsoft\
    \ Entra 身份验证的各种连接字符串选项，请参阅我们文档中的此表：[`https://learn.microsoft.com/en-us/sql/connect/ado-net/sql/azure-active-directory-authentication`](https://learn.microsoft.com/en-us/sql/connect/ado-net/sql/azure-active-directory-authentication)。您会注意到\
    \ Azure Active Directory 这个旧名称仍然存在。\n\n## Managed Identities\n\n使用 Microsoft Entra\
    \ 身份验证的一个有趣选项是托管标识。托管标识是 Microsoft Entra 目录中的一个对象，它可以像用户一样“行动”，但不需要密码。因此，使用此选项进行身份验证通常被称为无密码身份验证。\n\
    \n假设您将在 Azure 虚拟机中使用 SSMS 连接到 Azure SQL Database。您现在可以在 Entra 中创建一个托管标识，并将该标识分配给虚拟机。您还可以使用相同的标识启用\
    \ Azure SQL Database，并基于该标识创建一个登录名。\n\n现在，SSMS 可以在 VM 中使用该标识登录而无需密码。事实上，任何应用程序都可以使用令牌来获取\
    \ VM 中基于标识的登录访问权限。这是因为该标识被分配给了 VM 本身的边界。\n\n图 [6-7](#496204_2_En_6_Chapter.xhtml#Fig7)\
    \ 展示了其工作原理的可视化。\n\n![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig7_HTML.jpg)\n\
    *图 6-7：使用无密码托管标识连接到 Azure SQL Database*\n\n让我展示一下这如何使用我部署的 Azure VM `bwsql2022`\
    \ 和我的逻辑服务器 `bwsqllogicalserver` 来工作：\n\n![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig8_HTML.jpg)\n\
    *图 6-8：为逻辑服务器启用托管标识*\n\n1.  我使用以下文档步骤创建了一个用户分配的托管标识：[`https://learn.microsoft.com/entra/identity/managed-identities-azure-resources/how-manage-user-assigned-managed-identities`](https://learn.microsoft.com/entra/identity/managed-identities-azure-resources/how-manage-user-assigned-managed-identities)。我将此托管标识命名为\
    \ `bwadwidentity`。\n\n    > **注意**：还有一个系统分配的托管标识的概念，您可以直接为逻辑服务器启用。但是，它仅限于该服务器使用。我喜欢用户定义的托管标识，因为我可以将它们用于所有类型的\
    \ Azure 资源。\n\n2.  我现在可以为我的逻辑服务器启用此托管标识，正如您在图 [6-8](#496204_2_En_6_Chapter.xhtml#Fig8)\
    \ 中从 Azure 门户看到的那样，方法是选择“添加”，然后选择我已创建的标识。我还必须将此设置为服务器的主要标识并单击“保存”。\n\n![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig9_HTML.jpg)\n\
    *图 6-9：为 Azure VM 分配托管标识*\n\n3.  现在我需要为此标识创建一个登录名。我将改为使此标识成为特定数据库的用户。因此，我将使用我的\
    \ Entra 管理员帐户通过 SSMS 连接，并在 `bwhyperscale` 数据库的上下文中运行以下 T-SQL 语句：\n\n    ```sql\n\
    \    CREATE USER [bwadwidentity] FROM EXTERNAL PROVIDER;\n    ALTER ROLE db_datareader\
    \ ADD MEMBER [bwadwidentity];\n    GO\n    ```\n\n4.  现在我需要将该标识分配给我的 Azure 虚拟机。使用\
    \ Azure 门户，我可以导航到名为 `bwsql2022` 的虚拟机并分配该标识，如图 [6-9](#496204_2_En_6_Chapter.xhtml#Fig9)\
    \ 所示。\n\n    > **注意**：您还可以将托管标识分配给应用程序（如 Azure 应用服务）以连接到 Azure SQL Database。\n\
    \n![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig10_HTML.jpg)\n*图 6-10：托管标识概览*\n\
    \n5.  现在让我们尝试使用 SSMS 连接。SSMS 界面使用此方法比较棘手，因为您不能只提供标识名称。现在在 Azure 中找到 `bwidentity`\
    \ 资源（您只需单击图 [6-9](#496204_2_En_6_Chapter.xhtml#Fig9) 中的标识名称）。您应该在“概览”屏幕上看到类似图\
    \ [6-10](#496204_2_En_6_Chapter.xhtml#Fig10) 的内容。\n\n    您需要复制客户端 ID 的值。这就是您将用于通过\
    \ SSMS 登录的内容。\n\n![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig11_HTML.jpg)\n\
    *图 6-11：在 SSMS 中使用托管标识连接*\n\n6.  在 VM 内，启动 SSMS 并像图 [6-11](#496204_2_En_6_Chapter.xhtml#Fig11)\
    \ 那样选择您的连接。\n\n    用户分配的标识是上一步中标识的客户端 ID。**在单击“连接”之前**，您必须选择“连接属性”选项卡，并在“连接到数据库”字段中输入您的数据库名称（我的是\
    \ `bwhyperscale`）。\n\n    您现在可以像使用任何其他 Azure SQL Database 一样使用此连接。相同的概念适用于 Azure\
    \ SQL 托管实例，只是您需要为该实例创建一个登录名。\n\n应用程序开发人员不必使用此特殊 ID。他们拥有来自 Azure 的 API，可根据分配给应用程序或虚拟机的标识来获取令牌。"
  raw: "#### Microsoft Entra Authentication\n\nLike Managed Instance, Azure SQL Database\
    \ supports Microsoft Entra authentication. Like using Windows Authentication for\
    \ SQL Server, Entra authentication can be the most secure and best method to use\
    \ with Azure SQL Database. You can create an Entra server admin (in addition to\
    \ the SQL server admin you created during deployment) for the logical server.\
    \ You can then create contained users based on an Entra account. You can even\
    \ create users based on Entra groups.\n\nOne option you can set for authentication\
    \ is Microsoft Entra authentication only as I’ve done here in Figure [6-6](#496204_2_En_6_Chapter.xhtml#Fig6)\
    \ for the database I deployed.\n\n![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6\n\nMicrosoft Entra options for a logical server\n\nThis is very similar\
    \ to using Windows Authentication only with SQL Server. Like SQL Authentication,\
    \ I can create other logins and contained users using Microsoft Entra accounts.\
    \ You should know that PowerShell also supports creating an Entra admin using\
    \ the **Set-AzSqlServerActiveDirectoryAdministrator** cmdlet, and az CLI supports\
    \ **az sql server ad-admin create**.\n\nConnected as the Entra admin to this user\
    \ database, I could then create a contained user based on another Entra account\
    \ like the following (this is a hypothetical account in Microsoft Entra):\n\n\
    ```\nCREATE USER [troyward@microsoft.com] FROM EXTERNAL PROVIDER;\nGO\n```\n\n\
    I will then give this user access to read data by adding them to the db_datareader\
    \ role:\n\n```\nALTER ROLE db_datareader ADD MEMBER [troyward@microsoft.com];\n\
    GO\n```\n\nTip\n\nIf you want to know the various connection string options to\
    \ use Microsoft Entra authentication in your application, see this table in our\
    \ documentation: [`https://learn.microsoft.com/en-us/sql/connect/ado-net/sql/azure-active-directory-authentication`](https://learn.microsoft.com/en-us/sql/connect/ado-net/sql/azure-active-directory-authentication).\
    \ You will notice the legacy of the name Azure Active Directory still exists.\n\
    \n#### Managed Identities\n\nOne interesting option for using Microsoft Entra\
    \ authentication is **managed identities**. A managed identity is an object in\
    \ the Microsoft Entra directory that can “act” like a user but doesn’t require\
    \ a password. Therefore, using this option to authenticate is often called *passwordless*\
    \ authentication.\n\nLet’s say, for example, you will use SSMS in an Azure Virtual\
    \ Machine to connect to an Azure SQL Database. You can now create a managed identity\
    \ in Entra and assign that identity to the virtual machine. You can also enable\
    \ an Azure SQL Database with the same identity and create a login based on the\
    \ identity.\n\nNow SSMS can be used in the VM to log in with the identity without\
    \ a password. In fact, any application can use a token to gain access to the identity-based\
    \ login in the VM. This is because the identity is assigned to the boundary of\
    \ the VM itself.\n\nFigure [6-7](#496204_2_En_6_Chapter.xhtml#Fig7) shows a visualization\
    \ of how this can work.\n\n![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig7_HTML.jpg)\n\
    \nFigure 6-7\n\nUsing a passwordless managed identity to connect to Azure SQL\
    \ Database\n\nLet me show how this works using my deployed Azure VM bwsql2022\
    \ and my logical server bwsqllogicalserver:\n\n![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig8_HTML.jpg)\n\
    \nFigure 6-8\n\nEnabling a managed identity for a logical server\n\n1.  I used\
    \ the following documentation steps to create a user-assigned managed identity:\
    \ [`https://learn.microsoft.com/entra/identity/managed-identities-azure-resources/how-manage-user-assigned-managed-identities`](https://learn.microsoft.com/entra/identity/managed-identities-azure-resources/how-manage-user-assigned-managed-identities).\
    \ I called this managed identity **bwadwidentity**.\n\n**Note** There is also\
    \ a concept of a system-assigned managed identity which you can enable directly\
    \ with a logical server. However, it is confined to use of just that server. I\
    \ like user-defined managed identities because I can use them with all types of\
    \ Azure resources.\n\n2.  I can now enable this managed identity for my logical\
    \ server as you see in Figure [6-8](#496204_2_En_6_Chapter.xhtml#Fig8) from the\
    \ Azure Portal by selecting Add and then choosing my already created identity.\
    \ I also had to make this the primary identity of the server and click Save.\n\
    \n![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig9_HTML.jpg)\n\nFigure 6-9\n\
    \nAssigning a managed identity to an Azure VM\n\n1.  Now I need to create a login\
    \ for this identity. What I’ll do instead is make this identity a user of a specific\
    \ database. So, I’ll connect with SSMS using my Entra admin account and run the\
    \ following T-SQL statement in the context of the bwhyperscale database:\n\n```\n\
    \    CREATE USER [bwadwidentity] FROM EXTERNAL PROVIDER;\n    ALTER ROLE db_datareader\
    \ ADD MEMBER [bwadwidentity];\n    GO\n    ```\n\n2.  Now I need to assign the\
    \ identity to my Azure Virtual Machine. Using the Azure Portal, I can navigate\
    \ to the virtual machine called bwsql2022 and assign the identity as you see in\
    \ Figure [6-9](#496204_2_En_6_Chapter.xhtml#Fig9).\n\nNote\n\nYou can also assign\
    \ a managed identity to an application such as Azure App Services to connect to\
    \ the Azure SQL Database*.*\n\n![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig10_HTML.jpg)\n\
    \nFigure 6-10\n\nOverview of a managed identity\n\n1.  Now let’s try to connect\
    \ with SSMS. The SSMS interface is trickier to use this method as you can’t just\
    \ supply the identity name. Now find the bwidentity resource in Azure (you can\
    \ just click the identity name like in Figure [6-9](#496204_2_En_6_Chapter.xhtml#Fig9)).\
    \ You should see on the Overview screen something like Figure [6-10](#496204_2_En_6_Chapter.xhtml#Fig10).\n\
    \nYou need to copy the value of the client ID. That is what you will use to log\
    \ in with SSMS.\n\n![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig11_HTML.jpg)\n\
    \nFigure 6-11\n\nConnect with a managed identity in SSMS\n\n1.  Inside the VM,\
    \ launch SSMS and select your connection like the one in Figure [6-11](#496204_2_En_6_Chapter.xhtml#Fig11).\n\
    \nThe user-assigned identity is the client ID of the identity from the previous\
    \ step. **Before you hit connect**, you must select the Connection Properties\
    \ tab and put in your database name (mine is bwhyperscale) in the Connect to database\
    \ field.\n\nYou can now just use this like any other Azure SQL Database. The same\
    \ concept applies for Azure SQL Managed Instance except you would be creating\
    \ a login for the instance.\n\nApplication developers don’t have to use this special\
    \ ID. They have APIs from Azure to obtain tokens based on the identity assignment\
    \ to the application or virtual machine."
  trans: "## Microsoft Entra 身份验证\n\n与托管实例类似，Azure SQL Database 也支持 Microsoft Entra\
    \ 身份验证。就像在 SQL Server 中使用 Windows 身份验证一样，Entra 身份验证可能是与 Azure SQL Database 一起使用的最安全且最佳的方法。您可以为逻辑服务器创建一个\
    \ Entra 服务器管理员（在部署期间创建的 SQL 服务器管理员之外）。然后，您可以基于 Entra 帐户创建包含用户。您甚至可以基于 Entra 组创建用户。\n\
    \n对于身份验证，您可以设置的一个选项是仅使用 Microsoft Entra 身份验证，正如我在这里为已部署的数据库所做的那样，如图 6-6 所示。\n\n\
    ![](img/496204_2_En_6_Fig6_HTML.jpg)\n*图 6-6：逻辑服务器的 Microsoft Entra 选项*\n\n这与在\
    \ SQL Server 中仅使用 Windows 身份验证非常相似。与 SQL 身份验证一样，我可以使用 Microsoft Entra 帐户创建其他登录名和包含用户。您应该知道，PowerShell\
    \ 也支持使用 `Set-AzSqlServerActiveDirectoryAdministrator` cmdlet 创建 Entra 管理员，而 az\
    \ CLI 支持 `az sql server ad-admin create`。\n\n以 Entra 管理员身份连接到此用户数据库后，我可以基于另一个\
    \ Entra 帐户创建包含用户，如下所示（这是 Microsoft Entra 中的一个假设帐户）：\n\n```sql\nCREATE USER [troyward@microsoft.com]\
    \ FROM EXTERNAL PROVIDER;\nGO\n```\n\n然后，我将通过将此用户添加到 `db_datareader` 角色来授予其读取数据的权限：\n\
    \n```sql\nALTER ROLE db_datareader ADD MEMBER [troyward@microsoft.com];\nGO\n\
    ```\n\n> **提示**：如果您想知道在应用程序中使用 Microsoft Entra 身份验证的各种连接字符串选项，请参阅我们文档中的此表：[`https://learn.microsoft.com/en-us/sql/connect/ado-net/sql/azure-active-directory-authentication`](https://learn.microsoft.com/en-us/sql/connect/ado-net/sql/azure-active-directory-authentication)。您会注意到\
    \ Azure Active Directory 这个旧名称仍然存在。\n\n## 托管标识\n\n使用 Microsoft Entra 身份验证的一个有趣选项是托管标识。托管标识是\
    \ Microsoft Entra 目录中的一个对象，它可以像用户一样“行动”，但不需要密码。因此，使用此选项进行身份验证通常被称为无密码身份验证。\n\n\
    假设您将在 Azure 虚拟机中使用 SSMS 连接到 Azure SQL Database。您现在可以在 Entra 中创建一个托管标识，并将该标识分配给虚拟机。您还可以使用相同的标识启用\
    \ Azure SQL Database，并基于该标识创建一个登录名。\n\n现在，SSMS 可以在 VM 中使用该标识登录而无需密码。事实上，任何应用程序都可以使用令牌来获取\
    \ VM 中基于标识的登录访问权限。这是因为该标识被分配给了 VM 本身的边界。\n\n图 6-7 展示了其工作原理的可视化。\n\n![](img/496204_2_En_6_Fig7_HTML.jpg)\n\
    *图 6-7：使用无密码托管标识连接到 Azure SQL Database*\n\n让我展示一下这如何使用我部署的 Azure VM `bwsql2022`\
    \ 和我的逻辑服务器 `bwsqllogicalserver` 来工作：\n\n![](img/496204_2_En_6_Fig8_HTML.jpg)\n\
    *图 6-8：为逻辑服务器启用托管标识*\n\n1.  我使用以下文档步骤创建了一个用户分配的托管标识：[`https://learn.microsoft.com/entra/identity/managed-identities-azure-resources/how-manage-user-assigned-managed-identities`](https://learn.microsoft.com/entra/identity/managed-identities-azure-resources/how-manage-user-assigned-managed-identities)。我将此托管标识命名为\
    \ `bwadwidentity`。\n\n    > **注意**：还有一个系统分配的托管标识的概念，您可以直接为逻辑服务器启用。但是，它仅限于该服务器使用。我喜欢用户定义的托管标识，因为我可以将它们用于所有类型的\
    \ Azure 资源。\n\n2.  我现在可以为我的逻辑服务器启用此托管标识，正如您在图 6-8 中从 Azure 门户看到的那样，方法是选择“添加”，然后选择我已创建的标识。我还必须将此设置为服务器的主要标识并单击“保存”。\n\
    \n![](img/496204_2_En_6_Fig9_HTML.jpg)\n*图 6-9：为 Azure VM 分配托管标识*\n\n3.  现在我需要为此标识创建一个登录名。我将改为使此标识成为特定数据库的用户。因此，我将使用我的\
    \ Entra 管理员帐户通过 SSMS 连接，并在 `bwhyperscale` 数据库的上下文中运行以下 T-SQL 语句：\n\n    ```sql\n\
    \    CREATE USER [bwadwidentity] FROM EXTERNAL PROVIDER;\n    ALTER ROLE db_datareader\
    \ ADD MEMBER [bwadwidentity];\n    GO\n    ```\n\n4.  现在我需要将该标识分配给我的 Azure 虚拟机。使用\
    \ Azure 门户，我可以导航到名为 `bwsql2022` 的虚拟机并分配该标识，如图 6-9 所示。\n\n    > **注意**：您还可以将托管标识分配给应用程序（如\
    \ Azure 应用服务）以连接到 Azure SQL Database。\n\n![](img/496204_2_En_6_Fig10_HTML.jpg)\n\
    *图 6-10：托管标识概览*\n\n5.  现在让我们尝试使用 SSMS 连接。SSMS 界面使用此方法比较棘手，因为您不能只提供标识名称。现在在 Azure\
    \ 中找到 `bwidentity` 资源（您只需单击图 6-9 中的标识名称）。您应该在“概览”屏幕上看到类似图 6-10 的内容。\n\n    您需要复制客户端\
    \ ID 的值。这就是您将用于通过 SSMS 登录的内容。\n\n![](img/496204_2_En_6_Fig11_HTML.jpg)\n*图 6-11：在\
    \ SSMS 中使用托管标识连接*\n\n6.  在 VM 内，启动 SSMS 并像图 6-11 那样选择您的连接。\n\n    用户分配的标识是上一步中标识的客户端\
    \ ID。**在单击“连接”之前**，您必须选择“连接属性”选项卡，并在“连接到数据库”字段中输入您的数据库名称（我的是 `bwhyperscale`）。\n\
    \n    您现在可以像使用任何其他 Azure SQL Database 一样使用此连接。相同的概念适用于 Azure SQL 托管实例，只是您需要为该实例创建一个登录名。\n\
    \n应用程序开发人员不必使用此特殊 ID。他们拥有来自 Azure 的 API，可根据分配给应用程序或虚拟机的标识来获取令牌。"
- fmt: '### Set Up and Configure Access


    Now that you have created logins and users, what do you do now? You do what you
    do for SQL Server. You grant access and permissions to objects within your database
    to meet your application requirements.


    This could involve creating schemas, roles, and grant or revoking specific permissions.
    To get a primer on permissions for SQL Server, refer to the docs at [`https://learn.microsoft.com/sql/relational-databases/security/permissions-database-engine`](https://learn.microsoft.com/sql/relational-databases/security/permissions-database-engine).


    One of the nice additions to SQL access since the first edition of this book is
    a set of more **granular** server roles. These new fixed server roles have a specific
    naming convention of `##MS_<role>##`. They allow you to use the concept of **least
    privilege** instead of having to overprovision a user to a role. For example,
    the role `##MS_ServerStateReader##` has permissions to view system catalog states
    from the logical server or any database but has no other permissions than this.
    You can see all the new fixed server roles at [`https://learn.microsoft.com/azure/azure-sql/database/security-server-roles`](https://learn.microsoft.com/azure/azure-sql/database/security-server-roles).


    Don’t forget that Row-Level Security (RLS) is supported in Azure SQL just like
    SQL Server. Read about RLS at [`https://learn.microsoft.com/sql/relational-databases/security/row-level-security`](https://learn.microsoft.com/sql/relational-databases/security/row-level-security).
    You can read more about authentication and access for Azure SQL Database at [`https://learn.microsoft.com/azure/azure-sql/database/logins-create-manage`](https://learn.microsoft.com/azure/azure-sql/database/logins-create-manage).


    ### Microsoft Purview


    Consider this scenario. You are trying to set up access for logins and access
    to data across multiple Managed Instances or databases at **scale**. It would
    be nice to use a central place to control and manage this access. Along come **Microsoft
    Purview DevOps** policies to help address this scenario.


    Consider this situation. You need to have someone in your organization lead all
    your performance monitoring across many of your Azure SQL Databases and across
    many logical servers. Instead of creating a separate login and granting them access
    to perform this task (remember we have new server fixed roles for this), you can
    enable Purview to govern your logical server(s) and then set up a policy for which
    Microsoft Entra accounts will have access to a Performance Monitoring role (we
    also support a SQL Security Audit role) **in one place**.


    Now these Microsoft Entra accounts will be able to log in to these logical servers
    and perform the tasks of “performance monitoring.” The actual permissions of this
    role can be found at [`https://learn.microsoft.com/purview/how-to-policies-devops-authoring-generic#role-definition-detail`](https://learn.microsoft.com/purview/how-to-policies-devops-authoring-generic#role-definition-detail).
    And if you want to remove this access, you can do this in Purview through the
    policy vs. having to go to each logical server. Read about how to get started
    at [`https://learn.microsoft.com/purview/how-to-policies-devops-azure-sql-db`](https://learn.microsoft.com/purview/how-to-policies-devops-azure-sql-db).


    > **Note**

    >

    > Purview DevOps policies are also supported for Azure SQL Managed Instance and
    SQL Server 2022.


    ## Data Protection


    Ensuring you have set up proper authorization to connect and access data is just
    the first step. You need to protect your data for all aspects of your deployment,
    including connections, data at rest, data end-to-end, and ensuring only the right
    people can view important data. Azure SQL has all the capabilities to protect
    data just like SQL Server.


    ### Encrypting Connections


    Like SQL Server, Azure SQL supports encryption of connections through the Transparent
    Layer Security (TLS) protocol (you can read about TLS at [`https://en.wikipedia.org/wiki/Transport_Layer_Security`](https://en.wikipedia.org/wiki/Transport_Layer_Security)).


    By default, Azure SQL Managed Instance enforces encryption for connections. Tools
    and applications should enable an encrypted connection for a Managed Instance
    to avoid client/server negotiation. In addition, you can force a minimal TLS version
    for a client connection. The latest TLS version, 1.2, fixes some known security
    vulnerability, so you may consider requiring this version. You can set the minimal
    version through the Azure portal, through PowerShell (`Set-AzInstance`), or the
    az CLI (`az sql mi update`). You can read more about TLS and Managed Instance
    at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/minimal-tls-version-configure`](https://learn.microsoft.com/azure/azure-sql/managed-instance/minimal-tls-version-configure).


    Azure SQL Database forces encrypted connections whether the client or application
    enables it. You can verify this by examining the `encrypt_option` column for `sys.dm_exec_connections`,
    and seeing it will always be a value of TRUE for any user TCP connection. Azure
    SQL Database also offers enforcement of a minimal TLS version (1.0, 1.1, and 1.2)
    through the Azure portal, PowerShell (`Set-AzSqlServer`), and az CLI (`az sql
    server update`). You can read more at [`https://learn.microsoft.com/azure/azure-sql/database/connectivity-settings?view=azuresql&tabs=azure-portal#minimal-tls-versio`](https://learn.microsoft.com/azure/azure-sql/database/connectivity-settings?view=azuresql&tabs=azure-portal#minimal-tls-versio).


    > **Tip**

    >

    > Because Azure SQL Database forces an encrypted connection, the best practice
    is to enable this for your client tool or application. This speeds up connection
    time since the server must negotiate with the client to set the encryption if
    not set by the client.


    SQL Server 2022 now supports TLS 1.3. I anticipate this TLS version to be supported
    for Azure SQL soon.


    ### Transparent Data Encryption (TDE)


    Transparent Data Encryption (TDE) is an **encryption at rest** technology that
    has been in use with SQL Server for many releases. The concept is that the SQL
    Server engine will encrypt and decrypt data to the files for the database as data
    is written and read from disk. This way, the data in the file is encrypted to
    protect any **offline** attempt to access the files of the database. Azure SQL
    Managed Instance and Database enable this option **by default**.


    You might wonder why you would need this encryption option since you or anyone
    doesn’t have access to files in the underlying virtual machines of Azure SQL.
    Enabling TDE by default is just another mechanism in Azure’s commitment to a **defense
    in depth** methodology to protect your data. Many use TDE with SQL Server deployments
    in their own data center to protect from an unexpected intrusion to access database
    files outside the engine. The same holds true for Azure even though the Azure
    ecosystem has many protection mechanisms in place for data centers.


    For Azure SQL Managed Instance, TDE is on by default for the instance, which means
    all databases created for the instance are enabled by TDE. You cannot disable
    this option for the instance, but you can individually disable TDE through `ALTER
    DATABASE` or tools like SSMS. One option you do have for a Managed Instance is
    to control what keys are used for encryption for TDE. By default, Azure SQL Managed
    Instance uses a service-managed key, which means Azure SQL manages a certificate
    for the key (rotates the key and protects it with a root key within Azure).


    Azure SQL Database also supports configuring TDE for databases with `ALTER DATABASE`
    (`ENCRYPTION` option) but also allows you to enable and disable TDE through the
    Azure portal, PowerShell (`Set-AzSqlDatabaseTransparentDataEncryption`), and az
    CLI (`az sql db tde set`). The default key management is also a service-managed
    key at the logical server level.'
