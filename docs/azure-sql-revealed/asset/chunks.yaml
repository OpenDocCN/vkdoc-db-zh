    Read the complete list of differences at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences`](https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences).


    ### Distributed Transactions (DTC)


    DTC support was a new feature enabled for Azure SQL Managed Instance since the
    first edition of the release of this book. This feature was often seen as a blocker
    by customers to migrate from SQL Server, so the Managed Instance engineering team
    enabled this for the cloud.


    It is important first to call out when to use the DTC feature for Managed Instance
    vs. supporting a distributed database transaction across Azure cloud services.


    You can execute distributed transactions (with .Net libraries) across Azure SQL
    Database or across databases for Azure SQL Managed Instance with a concept called
    *native support* for distributed transactions. You cannot use this across Azure
    SQL Database and Azure SQL Managed Instance. Read more about native support at
    [`https://learn.microsoft.com/azure/azure-sql/database/elastic-transactions-overview`](https://learn.microsoft.com/azure/azure-sql/database/elastic-transactions-overview).


    DTC support for Azure SQL Managed Instance provides the ability to run distributed
    transactions in *mixed* environments or Azure SQL Managed Instances (including
    with T-SQL). Mixed environment can be any system that supports distributed transaction
    protocols like XA, including on-premises SQL Server instances. In this scenario,
    Azure SQL Managed Instance manages all aspects of DTC like the DTC Service that
    is managed by Windows Server on-premises. For distributed transactions across
    Managed Instances, you will also want to take advantage of a security model called
    a *server trust group*. This provides authentication models across instances for
    scenarios like DTC, Service Broker, and linked servers using Microsoft Entra.
    Learn more about server trust groups at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/server-trust-group-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/server-trust-group-overview).
    There are network connectivity considerations to configure for DTC with Managed
    Instance. Learn more at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/distributed-transaction-coordinator-dtc`](https://learn.microsoft.com/azure/azure-sql/managed-instance/distributed-transaction-coordinator-dtc).


    ### xp_cmdshell


    xp_cmdshell is a system-supported extended stored procedure (xproc) in SQL Server.
    This xproc runs as a DLL in the process space of SQL Server but creates a new
    process on the SQL Server computer to run the command you provide as a parameter.
    While a nifty feature of SQL Server for years, some administrators disable the
    use of this procedure because it is considered a security vulnerability. For that
    reason, we don’t support xp_cmdshell in Azure SQL.


    There really isn’t anything equivalent for Azure SQL to run commands from a T-SQL
    procedure that is invoked by the engine. You would need to bring this code outside
    of your server-side programming logic into a script or application.


    ## Job Management


    As part of managing a SQL Server environment, you will no doubt want to schedule
    *jobs* to execute various tasks related to your SQL Server. Let’s review what
    options you have to perform various aspects for job management with your Azure
    SQL deployment.'
  trans: '

    # Service Broker


    早在 SQL Server 2005 时代，我们就从客户那里了解到，他们希望使用异步消息传递技术构建面向服务的应用程序。我们设计并构建了一个名为 `Service
    Broker` 的系统，它利用 SQL Server 表、编程和通信的威力，在 SQL Server 引擎内部实现了一个消息传递系统。如果你从未使用过 `Service
    Broker`，可以从这里开始：[`https://learn.microsoft.com/sql/database-engine/configure-windows/sql-server-service-broker`](https://learn.microsoft.com/sql/database-engine/configure-windows/sql-server-service-broker)。


    `Service Broker` 是实例级功能的又一个例子，我们在 Azure SQL Database 中不支持此功能。`CloudLifter` 再次来帮忙。我们在
    Azure SQL 托管实例中支持 `Service Broker` 应用程序。一个主要的限制是我们仅支持在托管实例之间使用 `Service Broker`。完整的差异列表请参阅：[`https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#service-broker`](https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#service-broker)。


    # 全文搜索


    全文搜索在过去的多个 SQL Server 版本中一直是引擎的集成组件。全文搜索通过 T-SQL 提供针对数据库中存储的 `text` 数据的搜索功能。尽管全文搜索在技术上是
    SQL Server 的实例级功能，但我们在 Azure SQL 托管实例和数据库中均支持此功能。你可以在这里阅读如何开始使用全文搜索：[`https://learn.microsoft.com/sql/relational-databases/search/full-text-search`](https://learn.microsoft.com/sql/relational-databases/search/full-text-search)。


    在 Azure SQL 方面，全文搜索有几个限制：


    *   不支持"第三方过滤器"（例如 Office 和 .pdf 过滤器）。

    *   你无法管理支持全文的服务（如 `fdhost`）。

    *   不支持语义搜索。


    # 机器学习服务


    在 SQL Server 2016 中，我们为 SQL Server 引入了 `R Services`。其概念是采用一种新架构，让你能够以安全、隔离和可扩展的方式，在
    `与 SQL Server 同一台计算机` 上运行 R 程序。在 SQL Server 2017 中，我们增加了 Python 支持，并将此功能重新命名为
    `Machine Learning Services`。


    我们最终在 Azure SQL 托管实例中启用了此功能（在 Azure SQL Database 中不可用），但有几点注意事项：


    *   你需要使用 `sp_configure` 的 `external scripts enabled` 选项来启用该功能。

    *   Java 作为可扩展语言在 SQL Server 2019 中被添加，但在 Azure SQL 托管实例中不可用。

    *   虽然预装了 R 和 Python 包，但如果你需要不同的包，可能需要使用一个名为 `sqlmlutils` 的工具。更多信息请参阅：[`https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences?view=azuresql#python-and-r-packages`](https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences?view=azuresql#python-and-r-packages)。

    *   你无法对 R 和 Python 的执行使用自定义资源治理。


    完整的差异列表请阅读：[`https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences`](https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences)。


    # 分布式事务 (DTC)


    自本书第一版发布以来，`DTC` 支持已成为 Azure SQL 托管实例的一项新功能。此功能常被客户视为从 SQL Server 迁移的阻碍，因此托管实例工程团队在云端启用了它。


    首先需要明确在什么情况下为托管实例使用 `DTC` 功能，以及在什么情况下支持跨 Azure 云服务的分布式数据库事务。


    你可以执行跨 Azure SQL Database 或 Azure SQL 托管实例内数据库的分布式事务（使用 `.Net` 库），这通过一种称为分布式事务的
    `原生支持` 概念实现。你无法跨 Azure SQL Database 和 Azure SQL 托管实例使用此功能。关于原生支持的更多信息请参阅：[`https://learn.microsoft.com/azure/azure-sql/database/elastic-transactions-overview`](https://learn.microsoft.com/azure/azure-sql/database/elastic-transactions-overview)。


    Azure SQL 托管实例的 `DTC` 支持提供了在 `混合` 环境或 Azure SQL 托管实例之间（包括使用 T-SQL）运行分布式事务的能力。混合环境可以是任何支持分布式事务协议（如
    `XA`）的系统，包括本地 SQL Server 实例。在这种情况下，Azure SQL 托管实例管理 `DTC` 的所有方面，就像由 Windows Server
    本地管理的 `DTC` 服务一样。对于跨托管实例的分布式事务，你还需要利用一种称为 `服务器信任组` 的安全模型。这为使用 Microsoft Entra
    的 `DTC`、`Service Broker` 和链接服务器等场景提供了跨实例的身份验证模型。了解更多关于服务器信任组的信息：[`https://learn.microsoft.com/azure/azure-sql/managed-instance/server-trust-group-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/server-trust-group-overview)。为托管实例配置
    `DTC` 需要考虑网络连接问题。了解更多：[`https://learn.microsoft.com/azure/azure-sql/managed-instance/distributed-transaction-coordinator-dtc`](https://learn.microsoft.com/azure/azure-sql/managed-instance/distributed-transaction-coordinator-dtc)。


    # xp_cmdshell


    `xp_cmdshell` 是 SQL Server 中一个系统支持的扩展存储过程 (`xproc`)。此 `xproc` 作为 `DLL` 在 SQL Server
    的进程空间中运行，但会在 SQL Server 计算机上创建一个新进程来执行你作为参数提供的命令。尽管多年来这一直是 SQL Server 的一个便捷功能，但一些管理员会禁用此过程，因为它被认为是一个安全漏洞。因此，我们在
    Azure SQL 中不支持 `xp_cmdshell`。


    在 Azure SQL 中，确实没有任何等效功能可以从由引擎调用的 T-SQL 过程中运行命令。你需要将此代码从服务器端编程逻辑中移出，放到脚本或应用程序中。


    # 作业管理


    作为管理 SQL Server 环境的一部分，你无疑会希望安排 `作业` 来执行与 SQL Server 相关的各种任务。让我们回顾一下，在 Azure SQL
    部署中，你可以使用哪些选项来执行作业管理的各个方面。

    '
- fmt: '### SQL Server Agent


    多年来，SQL Server 的用户一直使用其内置的 `SQL Server Agent` 功能。`SQL Server Agent` 是一个与 SQL Server
    集成的作业调度系统。`SQL Server Agent` 是另一个实例级功能的例子，我们之前在 Azure SQL Database 中未予支持，但现在已通过
    Azure SQL Managed Instance 提供支持。


    图 [9-3](#496204_2_En_9_Chapter.xhtml#Fig3) 展示了我在第 [4](#496204_2_En_4_Chapter.xhtml)
    章部署的跳板机 VM 中的 `SSMS`，连接到我的 Azure SQL Managed Instance。


    ![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig3_HTML.jpg)


    图 9-3


    Azure SQL Managed Instance 中的 SQL Server Agent


    您将开始使用 `SQL Server Agent`，它的体验与在 SQL Server 中管理作业非常相似。存在一些限制，我们已在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#sql-server-agent`](https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#sql-server-agent)
    中进行了记录。


    可能您会看到的最大区别是我们不支持 `CmdExec` 或 `PowerShell` 作业步骤类型。Managed Instance 的 `SQL Agent`
    主要用于 `T-SQL` 作业、`SSIS` 作业和支持复制的作业。


    ### Elastic Jobs


    如果 Azure SQL Database 是您首选且最佳的部署选项，您确实有一个替代方案来调度执行 `T-SQL` 语句的作业，即使用 **Azure Elastic
    Jobs**。在本书第一版中，`Elastic Jobs` 处于预览状态，并且这种情况持续了几年，这让客户对其未来感到困惑是完全可以理解的。我很高兴看到我们在
    2024 年 4 月刷新了预览版并宣布了 `Elastic Jobs` 的正式发布。您可以通过阅读 [`https://learn.microsoft.com/azure/azure-sql/database/elastic-jobs-overview`](https://learn.microsoft.com/azure/azure-sql/database/elastic-jobs-overview)
    来开始使用。


    自最初的预览版以来添加的一些新功能如下：


    *   支持 `Microsoft Entra ID`（前身为 `Azure Active Directory`）以集中管理身份验证和权限。

    *   支持服务管理的专用链接，以安全地连接到目标数据库。

    *   与 `Azure Alerts` 集成，用于作业执行状态通知。

    *   轻松扩展作业代理的层级，以在 `Azure` 中并发连接到数百个目标数据库。

    *   在目标服务器和弹性池中动态枚举目标数据库。

    *   作业可以由多个步骤组成，以自定义执行顺序。


    `Elastic Jobs` 的一个很酷的功能是，我可以并行运行作业，例如跨多个 Azure SQL Database 调度索引维护。


    `Elastic Jobs` 本质上是一个*独立的* Azure 服务，其形式是一个*作业代理*，允许您针对目标（即 Azure SQL Database，包括弹性池）运行
    `T-SQL` 作业。`Elastic Job` 服务使用自己的 Azure SQL Database（称为作业数据库）来记录调度信息和作业输出。


    图 [9-4](#496204_2_En_9_Chapter.xhtml#Fig4) 展示了整体架构。


    ![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig4_HTML.jpg)


    图 9-4


    Elastic Jobs 架构


    `Elastic Job` 代理基于服务层级计费，该层级定义了作业的最大并发数。此外，作业数据库的计算和存储适用标准计费。以下是关于 `Elastic Jobs`
    的几个重要点：


    *   目标可以按服务器组和/或数据库组定义。

    *   您可以为作业数据库使用成本非常低的 Azure SQL Database 服务层级，但如果您安排了大量作业同时针对大量目标运行，作业代理的性能可能会受到影响。这里没有真正的指标来指导您，因此我建议您从小规模开始，甚至使用
    `Serverless` 并监控使用情况。

    *   您可以使用专用端点将作业代理与目标 Azure SQL Database 连接。

    *   `Elastic Jobs` 支持动态枚举。这非常酷。您可以在逻辑服务器级别定义一个目标。服务器中的每个数据库现在都将成为该作业目标的一部分。作业代理会在每次运行时选择数据库，因此随着数据库的添加和删除，它可以智能地只选择任何适用的数据库。


    请使用 [`https://learn.microsoft.com/azure/azure-sql/database/elastic-jobs-tsql-create-manage`](https://learn.microsoft.com/azure/azure-sql/database/elastic-jobs-tsql-create-manage)
    上的教程来了解更多关于创建和使用 `Elastic Jobs` 的信息。


    ### Azure Automation


    `Azure automation` 是一项 Azure 服务，允许您自动化云管理任务，其中可以包括与 Azure SQL 的集成。这包括使用诸如 `PowerShell`
    之类的语言执行任务，其概念称为 `runbook`。请访问 [`https://learn.microsoft.com/azure/automation/overview#process-automation`](https://learn.microsoft.com/azure/automation/overview#process-automation)
    了解更多关于 `Azure automation` 的信息。


    查看我们在 [`https://learn.microsoft.com/azure/azure-sql/database/automation-manage`](https://learn.microsoft.com/azure/azure-sql/database/automation-manage)
    上的文档，了解有关如何将 `Azure automation` 与 Azure SQL Database 结合使用的具体信息。可以将此视为比 `Elastic
    Jobs` 更高级的使用 `PowerShell` 针对 Azure SQL Database 自动化任务的方式。


    ## Supporting Azure SQL


    我在微软职业生涯的早期大部分时间都在技术支持部门工作，我在本书中比较的许多 SQL Server 细节都基于我在支持部门获得的知识。


    关于支持您的 Azure SQL 部署，有几个与 SQL Server 不同的主题值得在本章中指出，包括错误处理、堆栈转储、使用 Azure 门户中的资源辅助故障排除、使用
    `Copilot` 以及通过 `UserVoice` 提供反馈。'
  raw: '### SQL Server Agent


    For years, users of SQL Server have used the built-in capabilities of SQL Server
    Agent. SQL Server Agent is a job scheduling system that is integrated with SQL
    Server. SQL Server Agent is another example of an instance-level feature we have
    not supported with Azure SQL Database but now support with Azure SQL Managed Instance.


    Figure [9-3](#496204_2_En_9_Chapter.xhtml#Fig3) shows SSMS within my jumpbox VM
    I deployed in Chapter [4](#496204_2_En_4_Chapter.xhtml) connected to my Azure
    SQL Managed Instance.


    ![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig3_HTML.jpg)


    Figure 9-3


    SQL Server Agent with Azure SQL Managed Instance


    You will start using SQL Server Agent, and it will feel very much like job management
    with SQL Server. There are a few limitations, and we document these at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#sql-server-agent`](https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#sql-server-agent).


    Probably the biggest difference you will see is that we do not support CmdExec
    or PowerShell job step types. SQL Agent for Managed Instance is mostly used for
    T-SQL jobs, SSIS jobs, and jobs used to support Replication.


    ### Elastic Jobs


    If Azure SQL Database is your preferred and best deployment option, you do have
    an alternative to schedule jobs that execute T-SQL statements using **Azure**
    **Elastic Jobs**. In the first edition of this book, Elastic Jobs was in preview
    and it stayed that way for a few years, leaving customers understandably wondering
    about its future. I was excited to see us refresh the preview and announce General
    Availability of Elastic Jobs in April 2024\. You can get started by reading at
    [`https://learn.microsoft.com/azure/azure-sql/database/elastic-jobs-overview`](https://learn.microsoft.com/azure/azure-sql/database/elastic-jobs-overview).


    Some of the nice new features added since the original preview are as follows:


    *   Microsoft Entra ID (formerly Azure Active Directory) support for central administration
    of authentication and permissions.


    *   Service-managed private link support to securely connect to target databases.


    *   Integration with Azure Alerts for job execution status notification.


    *   Easily scale job agent’s tier to connect to hundreds of target databases concurrently
    across Azure.


    *   Dynamic enumeration target databases in target servers and elastic pools.


    *   Jobs can be composed of multiple steps to customize the execution sequence.


    One of the cool features of Elastic Jobs is that I can run jobs in parallel, such
    as scheduling index maintenance across many Azure SQL Databases in parallel.


    Elastic Jobs are essentially a *separate* Azure service in the form of a *job
    agent* that allows you to run T-SQL jobs against targets, which are Azure SQL
    Databases (including elastic pools). The Elastic Job service uses its own Azure
    SQL Database, known as the job database, to record scheduling information and
    job output.


    Figure [9-4](#496204_2_En_9_Chapter.xhtml#Fig4) shows the overall architecture.


    ![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig4_HTML.jpg)


    Figure 9-4


    The Elastic Jobs architecture


    The Elastic Job agent is billed based on a service tier which defines a max concurrency
    for your jobs. In addition, standard billing applies to the compute and storage
    of the Azure SQL Database job database. Here are a few important points about
    Elastic Jobs:


    *   Targets can be defined in groups of servers and/or databases.


    *   You can use a very low-cost Azure SQL Database service tier for your job database,
    but the performance on the job agent could be impacted if you have scheduled a
    larger number of jobs concurrently against a large number of targets. There is
    no real metric to guide you here, so I recommend you start small or even use Serverless
    and monitor usage.


    *   You can use private endpoints to connect the job agent with target Azure SQL
    Databases.


    *   Elastic Jobs support dynamic enumeration. This is very cool. You could define
    a target at the logical server level. Every database in the server would now be
    part of the target for the job. The job agent would choose databases each time
    it runs, so as databases are removed and added, it can intelligently just pick
    any applicable database.


    Use the tutorial at [`https://learn.microsoft.com/azure/azure-sql/database/elastic-jobs-tsql-create-manage`](https://learn.microsoft.com/azure/azure-sql/database/elastic-jobs-tsql-create-manage)
    to learn more about creating and using Elastic Jobs.


    ### Azure Automation


    Azure automation is an Azure service that allows you to automate cloud management
    tasks which can include integration with Azure SQL. This includes executing tasks
    using languages like PowerShell with a concept called a *runbook*. Learn more
    about Azure automation at [`https://learn.microsoft.com/azure/automation/overview#process-automation`](https://learn.microsoft.com/azure/automation/overview#process-automation).


    Check out our documentation for specific information on how to use Azure automation
    with Azure SQL Database at [`https://learn.microsoft.com/azure/azure-sql/database/automation-manage`](https://learn.microsoft.com/azure/azure-sql/database/automation-manage).
    Think of this as a more advanced way to automate tasks using PowerShell against
    Azure SQL Database than Elastic Jobs.


    ## Supporting Azure SQL


    I have spent much of my early career at Microsoft in technical support, and many
    of the details of SQL Server I have compared in this book are based on knowledge
    I gained while in support.


    There are a few topics regarding supporting your Azure SQL deployment that are
    different than SQL Server worth calling out in this chapter, including error handling,
    stack dumps, using resources in the Azure portal to assist in troubleshooting,
    using Copilot, and providing feedback with UserVoice.'
