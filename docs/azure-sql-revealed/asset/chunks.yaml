    \ customer that their deployment may be affected, so we can correct their problem.\n\
    \nPart of the improvements we are working on will provide advance maintenance\
    \ notification to customers, so they can plan for these events. Furthermore, we\
    \ are also investigating the ability for customers to select a custom schedule\
    \ for a maintenance event.\n\nOur work in the cloud often generates innovation.\
    \ One very cool capability we have rolled out to reduce the number of scenarios\
    \ where maintenance of Azure SQL requires a restart of SQL Server (and therefore\
    \ a failover) is called **hot patching**. You can read more about how hot patching\
    \ improves availability in Azure SQL in this blog post by my colleague Hans Olav\
    \ Norheim at [`https://azure.microsoft.com/blog/hot-patching-sql-server-engine-in-azure-sql-database/`](https://azure.microsoft.com/blog/hot-patching-sql-server-engine-in-azure-sql-database/).\n\
    \n### Update Policy for Azure SQL Managed Instance\n\nI’ve described in the book\
    \ the concept of an update policy for Azure SQL Managed Instance with two choices:\n\
    \n*   Always up to date\n\n    This is the possibility to receive continuous updates\
    \ to Managed Instance, including new features. Any database you back up for this\
    \ choice cannot be restored to SQL Server 2022 (but can be restored to other always-up-to-date\
    \ managed instances).\n\n*   SQL Server 2022\n\n    This is the choice to use\
    \ if you want to be able to restore a backup to SQL Server 2022 or use online\
    \ disaster recovery with SQL Server 2022 (which is discussed further in Chapter\
    \ [8](#496204_2_En_8_Chapter.xhtml) of the book). With this choice, your instance\
    \ will still have cumulative updates automatically applied as they are available\
    \ for SQL Server 2022 but not new features that are only available for an always-up-to-date\
    \ instance. You can restore a backup from this Managed Instance to another SQL\
    \ Server 2022 or always-up-to-date Managed Instance (when you use this latter\
    \ choice, you cannot restore back).\n\n### New Features and Capabilities in Azure\
    \ SQL\n\nIn general, over the last few years, we have tried to adopt a *cloud-first\
    \ mentality* for SQL Server. We build a new capability and roll it out in Azure\
    \ SQL first through a private (limited customers and usually requires a sign-up)\
    \ and public preview (not fully generally available, but customers can try it\
    \ out) program. Eventually, this capability goes into General Availability (GA).\n\
    \nThen based on the timing of a new major version of SQL Server, that capability\
    \ is included in that major version. A great example of this is Intelligent Query\
    \ Processing (IQP), which you can read about at [`https://learn.microsoft.com/sql/relational-databases/performance/intelligent-query-processing`](https://learn.microsoft.com/sql/relational-databases/performance/intelligent-query-processing).\
    \ We rolled out IQP for Azure SQL customers before it was released in SQL Server\
    \ 2019 and 2022.\n\nI’ve created two shortcuts for you to keep up to date with\
    \ all the latest news for Azure SQL Database and Managed Instance:\n\n[`https://aka.ms/whatsnewsqldb`](https://aka.ms/whatsnewsqldb)\n\
    \n[`https://aka.ms/whatsnewsqlmi`](https://aka.ms/whatsnewsqlmi)\n\n## Summary\n\
    \nIn this chapter, you learned the various methods, capabilities, techniques,\
    \ and restrictions for configuring Azure SQL Managed Instance and Database after\
    \ you deploy. You learned both configuration options specific to Azure SQL and\
    \ ones for the database engine and databases using familiar techniques like T-SQL.\n\
    \nYou also learned some interesting aspects of space management which can be important\
    \ as you manage the database in Azure SQL.\n\nIn this chapter, we covered the\
    \ various methods to load data from both on-premises and in Azure to Azure SQL.\
    \ Finally, you learned the details of how Azure SQL is updated and why it is referred\
    \ to as a versionless database.\n\nNow that you have learned how to deploy and\
    \ configure Azure SQL, it is time to jump into the first category of the *meat\
    \ and potatoes* of Azure SQL: security. In the next chapter, we will cover the\
    \ security capabilities for Azure SQL as it compares to SQL Server."
  trans: "\n### Azure SQL 的维护\n\n那么，与 SQL Server 相比，最新的更新究竟意味着什么？对于 SQL Server（截至\
    \ SQL Server 2017），我们发布主要版本、累积更新 (`CU`) 和通用分发版本 (`GDR`)。客户可以下载并应用他们希望使用的更新。\n\n\
    当我们发布一个新的主要版本时，例如 SQL Server 2019，它不仅包含新功能和特性，还包括一系列错误修复，这些修复包含了上一个主要版本所有 `CU`\
    \ 和 `GDR` 版本的修复，以及我们根据判断认为有必要包含在主要版本中的一组修复。\n\n对于错误修复（以及一些不一定算作功能的微小增强），我们持续在代码主分支中保持这些修复的最新状态。这些更改会频繁地推送到\
    \ Azure SQL 中，通常我们的客户能比等待下一个 `CU`、`GDR` 甚至主要版本发布更早地获得它们。这是在 Azure 中运行的一大优势。我们不断测试这些修复和更改，但实际上，你获得的错误修复流通常只出现在主要版本发布中。\n\
    \n我们不会记录或公布我们向为 Azure SQL 提供支持的 SQL Server 及其他组件推送更新的频率。推送这些更新的过程称为一个 `更新通道`。一个\
    \ `更新通道` 包含了支持 Azure SQL 的所有组件的更新，包括操作系统、SQL Server、Service Fabric 组件以及我们用于驱动\
    \ Azure SQL 的其他软件。我们不会一次性将 `更新通道` 推送到每个 Azure 区域。相反，这些 `更新通道` 会跨区域逐步推出。如果我们在早期阶段检测到推送\
    \ `更新通道` 出现任何问题，可以轻松回滚。由于每个 Azure SQL 部署都具有内置的可用性，当我们更新节点和实例时，可以故障转移部署，并根据与你的部署相关联的\
    \ `SLA` 协议确保你的数据可用。可用性区域等概念也有助于提供进一步的可用性。我将在本书的第 8 章中进一步讨论可用性区域。Azure 门户中的资源运行状况选项或通过\
    \ `REST` API 可以为你提供有关是否因 `部署` 而发生故障转移的信息。`部署` 是计划内可能影响可用性的维护事件。\n\n注意\nSQL Server\
    \ 的累积更新时间安排可能导致某个修复先出现在 `CU` 中，然后才通过 Azure SQL 的 `更新通道` 推出。除非该 `CU` 中的修复引入了回退问题，否则该修复最终会在部署\
    \ `更新通道` 中出现。\n\n正如你在本书中所见，你还可以选择维护窗口来控制更新计划时间，并设置警报以提前通知这些可能影响正常运行时间的维护操作。\n\n\
    注意\n如果我们遇到重大的影响客户的问题，我们可能会通知特定客户其部署可能受到影响，以便我们纠正他们的问题。\n\n我们正在努力进行的部分改进将为客户提供预先的维护通知，以便他们能为这些事件做计划。此外，我们也在研究让客户能够为维护事件选择自定义时间表的能力。\n\
    \n我们在云端的工作常常催生创新。我们推出的一项非常酷的能力是 `热补丁`，旨在减少 Azure SQL 维护需要重启 SQL Server（从而导致故障转移）的场景数量。你可以通过我的同事\
    \ Hans Olav Norheim 在这篇博文 [`https://azure.microsoft.com/blog/hot-patching-sql-server-engine-in-azure-sql-database/`](https://azure.microsoft.com/blog/hot-patching-sql-server-engine-in-azure-sql-database/)\
    \ 中了解 `热补丁` 如何提升 Azure SQL 的可用性。\n\n### Azure SQL 托管实例的更新策略\n\n我在本书中介绍了 Azure\
    \ SQL 托管实例的更新策略概念，有两种选择：\n\n*   **始终保持最新**\n    此选择允许托管实例接收持续更新，包括新功能。为此选择备份的任何数据库无法还原到\
    \ SQL Server 2022（但可以还原到其他始终保持最新的托管实例）。\n\n*   **SQL Server 2022**\n    如果你希望能够将备份还原到\
    \ SQL Server 2022 或与 SQL Server 2022 一起使用在线灾难恢复（将在本书第 8 章进一步讨论），请选择此项。选择此项后，你的实例仍会自动应用适用于\
    \ SQL Server 2022 的累积更新，但不会获得仅适用于始终保持最新实例的新功能。你可以从此托管实例将备份还原到另一个 SQL Server 2022\
    \ 或始终保持最新的托管实例（当你使用后者选择时，无法还原回去）。\n\n### Azure SQL 中的新功能和特性\n\n总的来说，在过去几年中，我们一直尝试为\
    \ SQL Server 采用 `云优先理念`。我们构建新功能，并首先通过私有（有限客户，通常需要注册）和公共预览（尚未完全正式发布，但客户可以试用）计划在\
    \ Azure SQL 中推出。最终，该功能会进入正式发布 (`GA`) 阶段。\n\n然后根据 SQL Server 新主要版本的发布时间，该功能会被包含在该主要版本中。这方面的一个很好的例子是智能查询处理\
    \ (`IQP`)，你可以在 [`https://learn.microsoft.com/sql/relational-databases/performance/intelligent-query-processing`](https://learn.microsoft.com/sql/relational-databases/performance/intelligent-query-processing)\
    \ 阅读相关内容。我们在 `IQP` 随 SQL Server 2019 和 2022 发布之前，就先为 Azure SQL 客户推出了。\n\n我为你创建了两个快捷方式，以便随时了解\
    \ Azure SQL 数据库和托管实例的所有最新消息：\n\n[`https://aka.ms/whatsnewsqldb`](https://aka.ms/whatsnewsqldb)\n\
    \n[`https://aka.ms/whatsnewsqlmi`](https://aka.ms/whatsnewsqlmi)\n\n#### 总结\n\n\
    在本章中，你学习了在部署后配置 Azure SQL 托管实例和数据库的各种方法、能力、技巧和限制。你既了解了 Azure SQL 特有的配置选项，也学习了使用熟悉的技术（如\
    \ `T-SQL`）配置数据库引擎和数据库的选项。\n\n你还了解了空间管理的一些有趣方面，这在管理 Azure SQL 中的数据库时可能很重要。\n\n\
    在本章中，我们介绍了从本地和 Azure 环境向 Azure SQL 加载数据的各种方法。最后，你了解了 Azure SQL 如何更新的细节，以及它为何被称为无版本数据库。\n\
    \n既然你已经学习了如何部署和配置 Azure SQL，现在是时候深入探讨 Azure SQL 的第一大类核心内容：安全性了。下一章，我们将介绍 Azure\
    \ SQL 与 SQL Server 相比的安全特性。\n"
- fmt: '# 6. Securing Azure SQL


    Now that you have deployed and configured your Azure SQL Managed Instance or Database,
    you will want to ensure you have done all the right things to fully secure your
    Azure SQL deployment. Azure SQL has all the capabilities that come with SQL Server
    for security plus more.


    My colleague Anna Hoffman asked me why I keep calling security, performance, and
    availability the *meat and potatoes* of SQL Server and Azure SQL. I can’t take
    credit. This phrase comes from my longtime colleague, the famous Conor Cunningham.
    Conor and I have together presented several demos at the PASS Summit Keynote.
    One time I was thinking of doing some pretty leading edge demos, and Conor stopped
    me and said “Bob, who is nice, but our customers expect you and I to showcase
    the core innovation of the engine. Things like security, performance, and availability.
    You know, the meat and potatoes of SQL Server.” The phrase has stuck ever since.
    Oh, by the way, I still also look to build those leading edge demos.


    **Note**


    For those who don’t know the phrase, it is one we use in Texas to mean something
    fundamental or core. A basic meal consists of meat and potatoes. Not a problem
    for me since I love both.


    In this chapter, we will explore all the capabilities that you normally use to
    secure a SQL Server and compare it with Azure SQL. You will also learn about unique
    capabilities and methods you will use to secure your Azure SQL Managed Instance
    and Database deployments.


    This chapter is organized into the following categories for security:


    ## Networking Security


    In this section, learn the several ways to provide the most secure connections
    over various network options, including firewalls, virtual networks, and private
    endpoints.


    ## Authentication and Access


    In this section, you will learn the most secure methods to provide authentication
    and access, including Azure Role-Based Access Control (RBAC), Microsoft Entra,
    Row-Level Security, and Microsoft Purview.


    ## Data Protection


    In this section, you will learn how to protect your data, including encryption
    methods, data masking, and Ledger (a blockchain inside of SQL).


    ## Security Management


    In this section, you will learn about concepts like auditing, Microsoft Defender,
    and data classification.


    I will use the deployments I did in Chapter [4](#496204_2_En_4_Chapter.xhtml)
    of the book when discussing security. For you to try out any of the techniques
    or commands I use in this chapter, you will need


    *   An Azure subscription.

    *   A minimum of Contributor role access to the Azure subscription. You can read
    more about Azure built-in roles at [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles).

    *   Access to the Azure Portal.

    *   The deployment of an Azure SQL Managed Instance and an Azure SQL Database
    similar as I did in Chapter [4](#496204_2_En_4_Chapter.xhtml).

    *   To connect to Managed Instance, you will need a `jumpbox` or virtual machine
    in Azure to connect. I showed you how to do this in Chapter [4](#496204_2_En_4_Chapter.xhtml)
    of the book. One simple way to do this is to create a new Azure Virtual Machine
    and deploy it to the same virtual network as the Managed Instance (you will use
    a different subnet than the Managed Instance).

    *   To connect to Azure SQL Database, you can use your on-premises client using
    firewall rules, but this chapter also shows you how to connect using a private
    endpoint in a virtual network (and with a Microsoft Entra managed identity), so
    you will need an Azure Virtual Machine. For my example, I will use the virtual
    machine I created in Chapter [3](#496204_2_En_3_Chapter.xhtml) of the book, called
    `bwsql2022`.

    *   Installation of the `az` CLI (see [`https://learn.microsoft.com/cli/azure/install-azure-cli`](https://learn.microsoft.com/cli/azure/install-azure-cli)
    for more details). You can also use the Azure Cloud Shell instead since az is
    already installed. You can read more about the Azure Cloud Shell at [`https://azure.microsoft.com/features/cloud-shell/`](https://azure.microsoft.com/features/cloud-shell/).

    *   You will run some T-SQL in this chapter, so install a tool like SQL Server
    Management Studio (SSMS) at [`https://aka.ms/ssms`](https://aka.ms/ssms).


    ## Network Security


    Most administrators who install SQL Server use a private network within a company
    infrastructure. Firewalls block incoming traffic within this network. In addition,
    operating systems provide firewalls to protect ports for applications like SQL
    Server. In fact, if you have installed SQL Server before, you know that by default
    the firewall for port 1433 is blocked for both Windows and Linux. You generally
    must take action to add an exception for this port for remote connectivity to
    SQL Server.


    Azure SQL is no different except that you have options to allow connectivity to
    the SQL Server instance behind the scenes as a public endpoint on the Internet
    or private within a virtual network.


    I will admit to you as you review the information in this section of the chapter
    that you should absolutely consult networking experts in your organization to
    configure Azure SQL Managed Instance or Database for the requirements you need.


    ### Azure SQL Managed Instance Network Security


    As you saw in Chapter [4](#496204_2_En_4_Chapter.xhtml) to deploy Azure SQL Managed
    Instance, a virtual network, a public endpoint, and private connectivity are baked
    into the Managed Instance experience.


    Figure [6-1](#496204_2_En_6_Chapter.xhtml#Fig1) (this comes right from the documentation
    at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/connectivity-architecture-overview?view=azuresql#communication-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/connectivity-architecture-overview?view=azuresql#communication-overview))
    is a great visualization of the options to connect.


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig1_HTML.jpg)


    Figure 6-1: Networking options for Azure SQL Managed Instance


    Let’s explore each of these options in more detail.


    ### Public Endpoint


    You can enable a public endpoint for an Azure SQL Managed Instance, but it is
    the least secure. The big advantage of this method is that any SQL client can
    connect to the endpoint with little configuration required. If you decide to do
    this, the endpoint is on port 3342, which cannot be changed, not 1433. Additionally,
    you can use Network Security Group (`NSG`) rules to effectively set up a firewall
    on the port. Read more at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/public-endpoint-configure`](https://learn.microsoft.com/azure/azure-sql/managed-instance/public-endpoint-configure).'
