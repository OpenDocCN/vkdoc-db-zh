    *图 8-22 选择数据库和故障转移组*


    我选择了两个已部署的数据库加入该组。这里是故障转移组很酷的部分。这些数据库无需配置相同即可加入组。在此示例中，我选择了“业务关键”服务层级和一个“超大规模”数据库。请注意，我可以选择使这些成为备用副本，当你做出此选择时，可以看到你的成本估算会减少。我将此项保留为“否”并单击“选择”。


    我选择了“创建”，这会触发故障转移组的新部署。当部署完成（包括类似异地复制的初始化）后，图 8-23 显示了更新后的故障转移组状态屏幕。


    ![](img/496204_2_En_8_Fig23_HTML.jpg)

    *图 8-23 部署后的故障转移组*


    请注意，“读/写故障转移策略”显示为“客户管理”。有两种类型的故障转移策略：

    '
- fmt: '# Azure SQL 故障转移组与托管实例链接


    ## 故障转移组策略


    *   **客户管理（推荐且默认）** – 当客户发现影响故障转移组中一个或多个数据库的意外中断时，可以执行故障转移。使用 PowerShell、Azure
    CLI 或 REST API 等命令行工具时，客户管理策略的值为 `manual`。

    *   **Microsoft 管理** – 当发生影响主要区域的大范围中断时，Microsoft 会启动所有配置为 Microsoft 管理策略的受影响故障转移组的故障转移。Microsoft
    管理的故障转移不会针对单个故障转移组或某个区域内的部分故障转移组启动。使用 PowerShell、Azure CLI 或 REST API 等命令行工具时，Microsoft
    管理策略的值为 `automatic`。


    > **注意**

    > 此功能在本书第一版中称为自动故障转移组，因为默认策略是自动故障转移。过去几年我们了解到，通过管理故障转移流程能为客户提供最佳保护，因此名称和策略类型有所更改。

    >

    > 你可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/failover-group-sql-mi?view=azuresql#failover-policy`](https://learn.microsoft.com/azure/azure-sql/managed-instance/failover-group-sql-mi?view=azuresql#failover-policy)
    阅读有关故障转移组策略的所有详细信息。


    如果你点击故障转移组，会看到一个非常漂亮的全局地图可视化界面，其中包含管理故障转移组的选项以及主服务器和只读副本的连接信息，如图 [8-24](#496204_2_En_8_Chapter.xhtml#Fig24)
    所示。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig24_HTML.jpg)


    **图 8-24**


    在 Azure 门户中配置和管理故障转移组


    从这个屏幕中，你可以看到故障转移组逻辑服务器位置的可视化地图以及主副本和辅助副本的详细信息。下方是新的端点（这些将成为你的新逻辑服务器名称），用于连接读写或只读工作负载。


    在顶部，你可以向组中添加或删除数据库，或启动计划内或强制故障转移。


    以下是有关 Azure SQL 故障转移组的其他几个要点：


    *   故障转移组也可以使用 PowerShell（`Add-AzSqlDatabaseToFailoverGroup` 和 `Switch-AzSqlDatabaseFailoverGroup`）进行管理。

    *   因为故障转移组在使用异步复制数据时发生自动故障转移，所以可能发生数据丢失。因此，如果你要求故障转移组零数据丢失，应用程序可以在提交事务后调用 `sp_wait_for_database_copy_sync`
    存储过程以确保所有数据已同步。更多信息请访问 [`https://learn.microsoft.com/azure/azure-sql/database/failover-group-sql-db?view=azuresql&tabs=azure-powershell#preventing-the-loss-of-critical-data`](https://learn.microsoft.com/azure/azure-sql/database/failover-group-sql-db?view=azuresql&tabs=azure-powershell#preventing-the-loss-of-critical-data)。

    *   你可以为 Microsoft 管理的故障转移策略配置的一个选项称为宽限期，使用 `GracePeriodWithDataLossHours` 参数（默认值为一小时）。此参数定义了当主节点宕机且我们相信可能发生数据丢失时，执行自动故障转移前的等待时间。如果未发生数据丢失，则会立即执行自动故障转移。


    故障转移组的一个重要限制涉及系统数据库。系统数据库不会被复制。因此，任何实例级数据，如 SQL Server Agent 作业，都必须在辅助实例上手动创建。


    ## 使用托管实例链接进行灾难恢复


    随着 SQL Server 2022 的发布，我们宣布了一种利用云进行灾难恢复的新方法。我称之为托管的灾难恢复。我记得在 2022 年秋天与达拉斯的一位客户交谈。他们向我讲述了一个悲伤的故事：一位管理其
    DR 站点的员工已离职。不幸的是，他们没有关于该站点以及如何管理的文档或详细信息。在我解释了我们的托管灾难恢复方案后，这位客户对我说：“给我报名！”


    此功能包含在一个名为使用托管实例链接进行灾难恢复的能力中。你已在本书前面了解到如何使用托管实例链接进行迁移。


    图 [8-25](#496204_2_En_8_Chapter.xhtml#Fig25) 展示了如何将其用于离线和在线灾难恢复。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig25_HTML.jpg)


    **图 8-25**


    使用托管实例链接进行灾难恢复


    让我们更详细地看一下这两种场景及其工作方式。


    ### 离线灾难恢复


    利用版本化的 Azure SQL 托管实例，你可以在 SQL Server 2022 和该实例之间创建链接。在后台，使用了可用性组技术（即使你在 SQL Server
    2022 上没有 AG，包括标准版），类似于分布式可用性组（DAG）。创建链接会将数据库从 SQL Server 2022 种子化到已部署的托管实例。


    更改现在会自动（异步）从 SQL Server 发送到托管实例。如果你想故障转移到托管实例，可以选择计划内故障转移（必须确保数据已同步）或强制故障转移。一旦故障转移，托管实例将成为“读写”主副本。如果你想回退，可以在托管实例上执行
    `COPY_ONLY` 备份到 Azure Storage，然后将其还原回 SQL Server 2022。现在 SQL Server 可以再次成为主副本。此技术被认为是离线的，因为
    SQL Server 2022 重新上线所需的时间就是还原完整数据库备份所需的时间。


    ### 在线灾难恢复


    离线场景是 SQL Server 2022 发布时作为公共预览版发布的内容，现已正式发布。在本书撰写时，一个预览版新方法可以将 SQL Server 2022
    和托管实例设置为故障转移伙伴，就像真正的分布式可用性组（DAG）一样。在此场景中，你可以像在离线场景中一样故障转移到托管实例。但故障转移更像是“角色切换”。这样，任何切换都是在线操作，因为切换操作发生前只需将很少的更改同步到辅助副本。一旦切换到托管实例，你可以再切换回
    SQL Server 2022。


    在这两种场景中，如果主节点离线，你总是可以强制故障转移到辅助副本，但需知道可能会发生数据丢失。为什么我在本节开始时称此功能为托管灾难恢复？因为你的灾难恢复站点（即
    Azure SQL 托管实例）由 Microsoft 管理。你有可用性的 SLA 以及自动备份。没有人需要灾难恢复站点直到……灾难发生，但知道它总是在需要时可用并准备好，这难道不是很好吗？


    请访问 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-feature-overview?view=azuresql#disaster-recovery`](https://learn.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-feature-overview?view=azuresql#disaster-recovery)
    开始使用托管实例链接进行灾难恢复。'
  raw: '*   **Customer managed (recommended and default)** – Customers can perform
    a failover of a group when they notice an unexpected outage impacting one or more
    databases in the failover group. When using command-line tools such as PowerShell,
    the Azure CLI, or the REST API, the failover policy value for customer managed
    is manual.


    *   **Microsoft managed** – In the event of a widespread outage that impacts a
    primary region, Microsoft initiates failover of all impacted failover groups that
    have their failover policy configured to be Microsoft managed. Microsoft-managed
    failover won’t be initiated for individual failover groups or a subset of failover
    groups in a region. When using command-line tools such as PowerShell, the Azure
    CLI, or the REST API, the failover policy value for Microsoft managed is automatic.


    Note


    This feature was known in the first edition of the book as auto-failover groups
    because the default policy was to automatically fail over. We have learned over
    the last few years that customers are best protected by managing the failover
    process, hence the name change and adoption of these new policy types.


    You can read all the details of failover group policies at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/failover-group-sql-mi?view=azuresql#failover-policy`](https://learn.microsoft.com/azure/azure-sql/managed-instance/failover-group-sql-mi?view=azuresql#failover-policy).


    If you click the failover group, you get a very nice global map visual with options
    to manage the failover group and connection information for both the primary server
    and read-only replicas like Figure [8-24](#496204_2_En_8_Chapter.xhtml#Fig24).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig24_HTML.jpg)


    Figure 8-24


    Configuration and managing a failover group in the Azure portal


    You can see from this screen you get a visual map of the locations of the failover
    group logical server and details of both primary and secondary replicas. Below
    are the new endpoints (these become your new logical server names) to connect
    for read-write or read-only workloads.


    At the top, you can add or remove databases from the group or initiate a planned
    or forced failover.


    Here are a few other important points about failover groups for Azure SQL:


    *   Failover groups can also be managed using the PowerShell (**Add-AzSqlDatabaseToFailoverGroup**
    and **Switch-AzSqlDatabaseFailoverGroup**).


    *   Because failover groups use asynchronous replication data when a failover
    occurs automatically, *data loss could occur*. Therefore, if you require no data
    loss with failover groups, applications can call the **sp_wait_for_database_copy_sync**
    procedure after committing a transaction to ensure all data is synchronized. Learn
    more at [`https://learn.microsoft.com/azure/azure-sql/database/failover-group-sql-db?view=azuresql&tabs=azure-powershell#preventing-the-loss-of-critical-data`](https://learn.microsoft.com/azure/azure-sql/database/failover-group-sql-db?view=azuresql&tabs=azure-powershell#preventing-the-loss-of-critical-data).


    *   One of the options you can configure for Microsoft-managed failover policy
    is called a *grace period* using the **GracePeriodWithDataLossHours** parameter
    (the default is one hour). This parameter defines the time we will wait to do
    an automatic failover should the primary be down, and we believe data loss may
    occur. If no data loss occurs, the automatic failover takes place immediately.


    One important limitation for failover groups involves system databases. System
    databases are **not** replicated. Therefore, any instance-level data, such as
    SQL Server Agent jobs, must be manually created on the secondary instance.


    ### Disaster Recovery with Managed Instance Link


    We announced with SQL Server 2022 a new way to use the cloud for disaster recovery.
    I call it ***managed*** disaster recovery. I remember in the fall of 2022 speaking
    with a customer in Dallas. They told me the sad tale of an employee that had left
    the company that managed their DR site. Unfortunately, they had no documentation
    or details on the site and how to manage it. After I explained our managed disaster
    recovery story, this customer said to me, “Sign me up!”


    This feature is encompassed into a capability called disaster recovery with Managed
    Instance link. You learned earlier in the book how to use Managed Instance link
    for migration.


    Figure [8-25](#496204_2_En_8_Chapter.xhtml#Fig25) shows how to use it for both
    offline and online disaster recovery.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig25_HTML.jpg)


    Figure 8-25


    Disaster recovery with Managed Instance link


    Let’s look at both scenarios and how they work in more detail.


    #### Offline Disaster Recovery


    Taking advantage of a *versioned* Azure SQL Managed Instance, you can create a
    link between SQL Server 2022 and the instance. Behind the scenes, Availability
    Group technology is used (even if you don’t have an AG on SQL Server 2022, including
    Standard Edition) akin to a Distributed Availability Group (DAG). Creating the
    link seeds the database from SQL Server 2022 to the already deployed Managed Instance.


    Changes are now automatically sent (asynchronously) from SQL Server to Managed
    Instance. If you want to fail over to the Managed Instance, you can choose a planned
    (you must ensure the data is synched) or forced failover. Once you fail over,
    the Managed Instance become the “read-write” primary. If you want to fall back,
    you can execute a COPY_ONLY backup on the Managed Instance to Azure Storage and
    restore it back to SQL Server 2022\. Now SQL Server can become the primary replica
    again. This technique is considered offline because the time it takes to get back
    online for SQL Server 2022 is the time it takes to restore a full database backup.


    #### Online Disaster Recovery


    The offline scenario is what we shipped as a public preview when SQL Server 2022
    shipped and is now generally available. In preview now at the time of the writing
    of this book is a new method to set up SQL Server 2022 and Managed Instance as
    *failover partners*, much like a true Distributed Availability Group (DAG). In
    this scenario, you can fail over to the Managed Instance just as you did in the
    offline scenario. But a failover is more like “switching roles.” This way, any
    switch is an online operation since very few changes would have to be synchronized
    to the secondary before the switch operation takes place. Once you switch to Managed
    Instance, you can switch back to SQL Server 2022.


    In both scenarios, if the primary is offline, you can always force a failover
    to the secondary with the knowledge that you might have data loss. Why did I start
    this section calling this feature managed disaster recovery? Because your disaster
    recovery site, which is an Azure SQL Managed Instance, is managed by Microsoft.
    You have an SLA for availability as well as automated backups. No one needs a
    disaster recovery site until well…a disaster happens, but wouldn’t it be nice
    to know it is always there and ready when needed?


    Get started with disaster recovery with Managed Instance link at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-feature-overview?view=azuresql#disaster-recovery`](https://learn.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-feature-overview?view=azuresql#disaster-recovery).'
