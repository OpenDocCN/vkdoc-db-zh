    \ IQP capabilities from SQL Server 2022 are available in Azure SQL. Learn more\
    \ in the last section of the chapter titled “Intelligent Performance.”\n\n*  \
    \ **Query Store hints**\n\n    Plan guides have been an effective way to force\
    \ or shape a query plan independent of the query sent from an application. But\
    \ there are limits to this feature, and it can be complex to use.\n\n    Query\
    \ Store hints allow you to “add” query hints to any incoming query from an application\
