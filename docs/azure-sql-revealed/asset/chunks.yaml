    ## 时间点恢复 (PITR)


    既然你已经了解了我们使用的自动备份策略，你可能会有使用备份进行恢复的需求。在某些情况下，对于 SQL Server，你可能会遇到影响可用性的事件，例如数据库所有者删除了某张表。


    由于我们部署了完整备份、差异备份和日志备份的组合，我们允许你选择一个*时间点*，并使用这些备份恢复到该状态。这个概念被称为 `时间点恢复 (PITR)`，在
    SQL Server 中可用（前提是你部署了正确的备份策略）。


    如果你查看 SQL Server 文档 [`https://learn.microsoft.com/sql/relational-databases/backup-restore/restore-a-sql-server-database-to-a-point-in-time-full-recovery-model`](https://learn.microsoft.com/sql/relational-databases/backup-restore/restore-a-sql-server-database-to-a-point-in-time-full-recovery-model)，恢复到某个时间点的方法是使用一系列备份，通过
    T-SQL `RESTORE` 语句从日志备份进行恢复。对于 Azure SQL，PITR 支持我们为 Azure SQL 托管实例和数据库创建的自动备份。因此，要执行时间点恢复，你必须使用
    Azure 界面，例如门户、`az` CLI 或 PowerShell。


    注意


    尽管托管实例支持 `RESTORE` 语句，但其语法受限，你无法执行时间点恢复。这只能用于从带有 `COPY_ONLY` 选项的备份或从 SQL Server
    还原完整备份。


    Azure SQL 托管实例通过 Azure 门户（在门户中导航到数据库并从命令栏选择“恢复”选项）、`az` CLI (`az sql midb restore`)
    和 PowerShell (`Restore-AzSqlInstanceDatabase`) 支持 PITR。PITR 操作是异步的，并基于你选择的恢复日期和时间创建一个*新数据库（实际上，是一个新部署）*。你的日期和时间选择取决于你的备份保留天数。


    Azure SQL 数据库也通过 Azure 门户、`az` CLI (`az-sql-db-restore`) 和 PowerShell (`Restore-AzSqlDatabase`)
    支持 PITR。


    Azure SQL 的 `关键概念` 是，你永远不会在现有数据库上直接恢复，而是通过从自动备份恢复来启动一个新的数据库部署。


    让我们来看一个如何对本书前面部署的名为 `bwadw` 的数据库使用 PITR 的示例。我在撰写本书章节时创建了这个数据库，所以到现在为止，至少已经过去了七天，产生了一系列备份。让我们进行一个练习：我不小心在数据库中删除了一个表，然后使用
    PITR 将数据库恢复到删除操作之前的一个新数据库名称，这样我就可以将这些数据合并回当前的数据库。


    ### 删除表


    我将使用在第 3 章部署并在最近两章中使用的 Azure VM `bwsql2022`，通过 SSMS 连接，并以部署时使用的服务器管理员身份（记住它是基于
    AdventureWorksLT 示例的）针对 `bwadw` 数据库运行以下 T-SQL 语句：


    ```

    DROP TABLE SalesLT.OrderRating;

    GO

    ```


    注意 这是我作为第 7 章示例的一部分创建的表。我在删除表之前保留了大约 125,000 行数据。因此，如果我们正确恢复它，我们应该能找回包含 125,000
    行数据的表。


    ### 将数据库恢复到删除操作之前的时间点


    我刚刚删除了表，所以我应该能够回到该表存在且数据存在的更早时间点。我可以选择恢复到这个时间点之前一个小时。


    提示 在不知道表何时被删除的真实场景中，你可以使用 SQL 审计来查找 `DROP TABLE` 语句。


    你可以使用 Azure 门户选择开始恢复过程，如图 8-5 所示。


    ![](img/496204_2_En_8_Fig5_HTML.jpg)


    图 8-5


    启动 Azure SQL 数据库的 PITR 过程


    请注意，“概述”屏幕上列出了最早的恢复点。


    注意


    最早的时间点是基于数据库创建后的第一个事务日志备份。在执行日志备份之前，必须先完成一个完整备份。**这里有个提示。** 使用我们新的 `Copilot`，并使用此提示词：“我可以恢复到多久之前的时间点？”


    在我选择“恢复”之后，会出现一个屏幕，我可以在其中填写想要恢复到的时间，如图 8-6 所示。


    ![](img/496204_2_En_8_Fig6_HTML.jpg)


    图 8-6


    基于 PITR 创建新数据库


    你会注意到我可以选择恢复的日期和时间，这实际上是在我执行 `DROP` 语句之前一小时。屏幕的其余部分，如果向下滚动，允许你像部署新数据库时一样选择数据库名称和其他选项（例如，服务层）。创建的默认数据库名称（你可以更改）是原始数据库名称，包括恢复点的详细信息。对我来说，我的数据库名称是
    `bwadw_2024-08-25T20-28Z`。


    你需要对此处的部署时间设定期望。这不仅仅是一个新数据库。我们必须执行部署新数据库的所有操作，**并且**恢复一个完整数据库备份以及一系列差异备份和日志备份，直到你选择的时间点。对我来说，这次恢复大约花了十分钟。我可以执行本书第
    4 章中讨论的所有活动，查看活动日志，了解恢复如何部署新数据库。我建议客户在这里尝试各种场景，以了解其工作负载的预期恢复时间。请记住，更高的 RTO 和 RPO
    目标可以通过地理复制和故障转移群集等概念实现，这些将在本章后面讨论。


    注意


    你的恢复时间将取决于我们需要恢复什么才能使你到达所需的时间点。在 [`https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups?view=azuresql&tabs=azure-portal#recovery-time`](https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups?view=azuresql&tabs=azure-portal#recovery-time)
    了解更多信息，包括并发恢复数量的限制。


    ![](img/496204_2_En_8_Fig7_HTML.jpg)


    图 8-7


    从 PITR 查询已删除的表


    ### 验证新数据库已恢复被删除的表


    我回到了我的 Azure VM `bwsql2022`，在那里我以管理员身份连接到逻辑主数据库。如果我导航到这个数据库并运行以下 T-SQL 语句：


    ```

    SELECT COUNT(*) FROM SalesLT.OrderRating;

    GO

    ```


    我得到了 125,000 行数据，如图 8-7 所示。


    我现在有两个选择：


    *   删除当前的 `bwadw` 数据库并重命名这个新数据库，这样我的应用程序将丢失自 PITR 时间点以来的所有更改。


    *   将这个新数据库中 `SalesLT.OrderRating` 的数据合并到我的原始数据库中。我意识到如果存在外键，这可能不是一个简单的操作。

    '
- fmt: '# Geo-restore and Restore Operations for Azure SQL


    ### Geo-restore of Databases


    Let’s say that your database from Azure SQL Database or Managed Instance is unavailable
    due to a data center outage. While these situations are rare, it would be nice
    to be able to restore a backup from a geo-redundant backup from another region
    that does not have an outage.


    The process is called `geo-restore` and is outlined at [`https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups?view=azuresql&tabs=azure-portal#geo-restore`](https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups?view=azuresql&tabs=azure-portal#geo-restore).
    The concept is that you will deploy a new Azure SQL Database or create a new database
    for a Managed Instance based on a backup. When you select this option, you will
    be presented with all the known backups that exist for your existing Azure SQL
    deployments. If the data center is down where your backups are normally stored,
    we will retrieve the geo-redundant copy of the backup from a different region.


    ### Restore Backups from Deleted Databases


    The built-in HADR options just keep coming with Azure SQL. Let’s say you accidentally
    deleted a database for an Azure SQL Database or Managed Instance.


    Note: Deleting a database for Azure SQL Database or Managed Instance does more
    behind the scenes than a traditional SQL Server given we have all types of services
    and operations tied to the database. This is why you can delete a database through
    Azure interfaces or the `DROP DATABASE` T-SQL statement.


    I realize this may not be something you almost never see, but one of the great
    stories for built-in HADR is that when you delete a database, you can restore
    from backups associated with the deleted database using PITR based on the retention
    period you configured. If your retention period is seven days and you delete a
    database, we can’t perform any more backups, but you can restore to a point in
    time from the earliest backup point to the time of database deletion.


    Note: You cannot recover from a deleted logical server or Managed Instance. However,
    if you have configured LTR backup retention, you can create new databases based
    on these backups. You may be asking since LTR backups are not free, how do I ever
    remove LTR backups? You can use the PowerShell cmdlet `Remove-AzSqlDatabaseLongTermRetentionBackup`
    or `Remove-AzSqlInstanceDatabaseLongTermRetentionBackup` even if the logical server
    or Managed Instance has been deleted.


    You can restore deleted databases through the Azure portal, `az` CLI, or PowerShell.
    Read more about how to do this at [`https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups?view=azuresql&tabs=azure-portal#deleted-database-restore`](https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups?view=azuresql&tabs=azure-portal#deleted-database-restore).


    ### Restore in Azure SQL Managed Instance


    I’ve mentioned that it is possible to execute a `BACKUP` T-SQL statement for an
    Azure SQL Managed Instance earlier in this chapter. We have referred to this capability
    as a native database backup. The term native is used because you can perform a
    full database backup using the `BACKUP` T-SQL statement to disk storage. This
    disk storage must be an Azure Storage account and uses the "backup to URL" capability
    that SQL Server has supported for several releases.


    You must use the `WITH COPY_ONLY` option to back up a database for a Managed Instance.
    SQL Server has supported a copy-only backup for several releases. A copy-only
    backup does not affect the backup sequence of full, differential, and log backups.
    Our team has posted a nice blog about how to set up a native backup with Managed
    Instance at [`https://techcommunity.microsoft.com/t5/azure-sql-database/native-database-backup-in-azure-sql-managed-instance/ba-p/386154`](https://techcommunity.microsoft.com/t5/azure-sql-database/native-database-backup-in-azure-sql-managed-instance/ba-p/386154).


    Since you can perform a native backup with a Managed Instance, you can also restore
    these backups using the T-SQL `RESTORE` statement. You can only restore copy-only
    backups from a Managed Instance to an existing or new Managed Instance. Just remember
    it is a new database. For example, you will get an error (Mg 41901) if you try
    to use the `WITH REPLACE` syntax of `RESTORE`.


    In addition, you can take any full database backup from any supported version
    of SQL Server and restore it to a Managed Instance. This is actually a method
    you use to perform a simple offline migration from SQL Server to a Managed Instance.
    Learn more at [`https://learn.microsoft.com/data-migration/sql-server/managed-instance/database-migration-service?toc=%2Fazure%2Fdms%2Ftoc.json&tabs=online-with-extension`](https://learn.microsoft.com/data-migration/sql-server/managed-instance/database-migration-service?toc=%2Fazure%2Fdms%2Ftoc.json&tabs=online-with-extension).


    The following documentation page walks you through the process of performing a
    native restore with a Managed Instance: [`https://learn.microsoft.com/azure/azure-sql/managed-instance/restore-sample-database-quickstart`](https://learn.microsoft.com/azure/azure-sql/managed-instance/restore-sample-database-quickstart).


    ## Built-In Availability


    SQL Server has a great tradition of providing the necessary capabilities and software
    to keep your database highly available. The tradition started with Always On Failover
    Cluster Instance (FCI) using shared storage and integrating with technologies
    such as Windows Server Failover Clustering (WSFC) for automated failover. In SQL
    Server 2012, we introduced Always On Availability Groups to allow a non-shared
    storage approach, read replicas, and still integrated with WSFC for automatic
    failover decisions. SQL Server Linux also supports these capabilities but is integrated
    with Linux technologies such as Pacemaker.


    One of the aspects of Azure SQL the engineering team wanted to provide was a public
    commitment to a Service-Level Agreement (SLA), including availability. They also
    wanted the deployment process for a database or Managed Instance to "just do it"
    when it came to configuring and setting up availability. Finally, since Azure
    SQL was deployed with Azure Service Fabric (SF), we needed to integrate with SF
    for failover decisions.


    The result is truly an amazing story. Every Azure SQL deployment option you choose
    has a built-in availability. Let’s take a look at each deployment option and the
    architecture of availability that makes it all happen. You can also use the following
    documentation page as a reference: [`https://learn.microsoft.com/en-us/azure/azure-sql/database/business-continuity-high-availability-disaster-recover-hadr-overview`](https://learn.microsoft.com/en-us/azure/azure-sql/database/business-continuity-high-availability-disaster-recover-hadr-overview).
    Even though the details of this chapter for General Purpose and Business Critical
    service tiers apply to both Azure SQL Managed Instance and Database, there are
    a few differences worth noting for Azure SQL Managed Instance as you can see at
    [`https://learn.microsoft.com/azure/azure-sql/managed-instance/high-availability-sla-local-zone-redundancy`](https://learn.microsoft.com/azure/azure-sql/managed-instance/high-availability-sla-local-zone-redundancy).'
