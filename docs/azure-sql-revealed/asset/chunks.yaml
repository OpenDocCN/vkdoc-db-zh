- fmt: 'All the possible action groups to use can be found at [`https://learn.microsoft.com/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions`](https://learn.microsoft.com/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions).
    You can use the PowerShell cmdlet `Set-AzSqlDatabaseAudit` to enable other action
    groups.


    With SQL Server, you typically can view an audit through SSMS or using the system
    function `sys.fn_get_audit_file`. Turns out you can do the same thing for each
    database as part of the logical server.


    I just turned on auditing, so I don’t expect much activity. I’ll connect with
    SSMS as I showed you earlier in this chapter with the managed identity I enabled
    and created a login, and I’ll connect on my laptop with the Microsoft Entra ID
    I set up as the admin. To view audit logs, I’ll navigate to my database `bwhyperscale`,
    then select Auditing from the Security section of the Service menu. And then select
    View Audit Logs at the top of the screen. My results are in Figure [6-21](#496204_2_En_6_Chapter.xhtml#Fig21).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig21_HTML.jpg)

    Figure 6-21 SQL Audit records for an Azure SQL Database


    You can see from these results my different connections. Notice the GUID values
    for the managed identity as well as my Microsoft Entra admin account. You can
    click Run in Query Editor to see the SQL query behind these results which uses
    the `sys.fn_get_audit_file` system procedure to read from the Azure Storage account
    I configured for auditing and is the same result as the Audit records in the previous
    screen. You can also use the Log Analytics option in the Command Menu to use different
    techniques to view audit results. This option can provide a more visual representation
    for your security audit. Learn more at [`https://learn.microsoft.com/azure/azure-sql/database/auditing-analyze-audit-logs?view=azuresql#analyze-logs-using-log-analytics`](https://learn.microsoft.com/azure/azure-sql/database/auditing-analyze-audit-logs?view=azuresql#analyze-logs-using-log-analytics).


    ## Microsoft Defender for SQL


    I’ve mentioned earlier in this book a few times about `Microsoft Defender for
    SQL` (which is technically under the umbrella of `Microsoft Defender for Cloud`).
    `Microsoft Defender for Cloud` provides insights into security vulnerabilities
    and possible attacks against all your Azure resources (and for other clouds which
    is why this service was rebranded Microsoft vs. Azure). `Microsoft Defender for
    Cloud` is a paid service and can be enabled per resource or at the subscription
    level. Once it is enabled, you can get an overview of all possible insights from
    the `Microsoft Defender for Cloud` dashboard (in the first edition of this book,
    this was called the Azure Security Center) as you see in Figure [6-22](#496204_2_En_6_Chapter.xhtml#Fig22).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig22_HTML.jpg)

    Figure 6-22 Microsoft Defender for Cloud Overview


    It looks like a daunting amount of information which is why I like to first focus
    on Recommendations and Security Alerts. In addition, there is a new Copilot experience
    to analyze details like Recommendations and Alerts as you can see in Figures [6-23](#496204_2_En_6_Chapter.xhtml#Fig23)
    and [6-24](#496204_2_En_6_Chapter.xhtml#Fig24).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig24_HTML.jpg)

    Figure 6-24 Using Copilot for Azure with Microsoft Defender


