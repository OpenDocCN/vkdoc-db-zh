  trans: '### 其他配置选项


    除了通过门户或 CLI 界面从服务菜单配置 Azure 虚拟机外，还有其他选项可用。


    例如重置管理员用户密码、查看安全建议以及将虚拟机重新部署到其他主机。有关其中一些选项的更多信息，请参阅 [`https://learn.microsoft.com/azure/virtual-machines/windows/tutorial-config-management`](https://learn.microsoft.com/azure/virtual-machines/windows/tutorial-config-management)。


    ## 最大化存储性能


    根据我们与客户合作的经验，为 Azure 虚拟机选择合适的大小是确保 SQL Server 获得所需性能的首要因素（标准的 SQL Server 性能优化实践除外）。让我们更详细地探讨为何这一选择如此重要。


    ### 最佳实践


    你在本章前面已经看到了 SQL Server 库映像将如何基于 Azure 高级存储创建额外的托管 `数据磁盘`。为了在 Azure 虚拟机上为 SQL Server
    实现最佳 I/O 性能和可用性，你应该牢记以下原则，其中一些在我演示如何在 Azure 门户中配置存储时已经提到：


    *   使用 Azure 门户来指导你的选择，因为它会在虚拟机大小不支持你的 I/O 选择时发出警告。它还能帮助你轻松配置多个磁盘（底层使用 Windows
    存储空间）、分离数据和日志存储、将系统数据库移出操作系统驱动器以及配置 `tempdb` 存储。


    *   不要在操作系统磁盘上创建任何用户数据库。


    *   将 `tempdb` 放在本地 SSD 驱动器上，该驱动器也称为临时存储。如果您的虚拟机因任何原因故障转移到不同的主机，`tempdb` 的内容将会丢失，但没关系，因为
    `tempdb` 在启动时会重新创建。


    *   将数据库文件和日志文件放在不同的 `托管` 磁盘上，就像任何 SQL Server 生产部署一样。


    *   至少使用高级托管磁盘（也称为高级 SSD）。对于极端低延迟的一个选项是超级磁盘。超级磁盘更昂贵，但对于 SQL 生产工作负载，如果事务日志的延迟很重要，对于繁重的写入工作负载来说可能是一个必要的选择。有关如何配置此功能的更多信息，请访问
    [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/storage-migrate-to-ultradisk`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/storage-migrate-to-ultradisk)。


    ### 高级 SSD v2


    正如你从通过 Azure 门户配置存储的示例中所看到的，可能需要过度配置存储以满足你的 IOPS 和吞吐量需求。这是因为这些资源数量与高级托管磁盘的大小相关联。


    用于 SQL 的高级 SSD v2（目前处于预览状态）提供了一种新的方法来独立于磁盘大小控制你的 IOPS 和吞吐量。


    我们有一个新的 Azure 门户体验来使用此新选项。但是，在本书撰写时，它要求你使用可用性区域部署虚拟机，即使对于单个 SQL 实例也是如此。虽然这不会给你带来任何特定问题，但在单个可用性区域中部署
    Azure 虚拟机并不会真正为你带来额外的可用性。可用性区域通常仅适用于高可用性场景（如 Always On 可用性组）的虚拟机。


    如果你在门户的“基础”屏幕（在“可用性选项”下）做出此选择，你会在 SQL Server 设置下的“存储配置”中看到一个新选项，如图 3-28 所示。


    ![](img/496204_2_En_3_Fig28_HTML.jpg)


    图 3-28

    为 SQL 选择新的高级 SSD v2 存储


    当你选择 `更改配置` 时，现在会看到一个新的门户体验，可以独立控制大小、IOPS 和吞吐量，如图 3-29 所示。


    ![](img/496204_2_En_3_Fig29_HTML.jpg)


    图 3-29

    新的高级 SSD v2 存储体验


    更多详情请访问 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/storage-configuration-premium-ssd-v2`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/storage-configuration-premium-ssd-v2)。


    ### 了解更多


    当然，你必须在这些选择与成本之间取得平衡。所有托管磁盘都基于 Azure Blob 存储。要向你介绍 Azure Blob 存储和托管磁盘的工作原理，需要一整章的篇幅。现在，请查看这些资源：


    *   有关 Azure 托管磁盘类型的详细信息，请访问 [`https://learn.microsoft.com/azure/virtual-machines/disks-types`](https://learn.microsoft.com/azure/virtual-machines/disks-types)。在这些表格中，你将看到每种类型支持的尺寸、IOPS
    和吞吐量。


    *   我们的文档中有针对为 Azure 虚拟机上的 SQL Server 选择合适存储的指南，请访问 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist)。


    *   该文档提供了关于如何为 Azure 高级存储以及虚拟机大小选择合适尺寸的良好指南。你可以在此阅读 [`https://learn.microsoft.com/azure/virtual-machines/premium-storage-performance`](https://learn.microsoft.com/azure/virtual-machines/premium-storage-performance)。


    *   GigaOm 发布了一项关于 Azure 虚拟机上 SQL Server 性能的独立研究。更多信息请访问 [`https://techcommunity.microsoft.com/t5/sql-server-blog/sql-server-on-azure-vms-the-best-price-performance-gets-even/ba-p/3727091`](https://techcommunity.microsoft.com/t5/sql-server-blog/sql-server-on-azure-vms-the-best-price-performance-gets-even/ba-p/3727091)。


    我之前提到过一个主要关键点，但值得重复：`匹配正确的虚拟机大小以满足你的存储需求`，因为虚拟机大小对数据磁盘数量、总 IOPS 以及所有磁盘的总吞吐量有限制。然后，在该总
    IOPS 范围内，为你数据库和事务日志文件所需的数据磁盘进行配置。


    ## 性能监控


    由于 SQL Server 部署在虚拟机内部，你应该使用所有可用的常规技术来监控性能，包括 SQL 工具（如动态管理视图 `DMVs`）和操作系统工具（如
    Windows 性能监视器或 Linux 工具）。


    话虽如此，Azure Monitor 为虚拟机提供了集成的性能指标，包括 SQL Server 性能计数器（仅适用于 Windows）。'
- fmt: '# Azure Metrics


    You can get rich metrics from Azure available in the Monitoring option in the
    Service Menu. By default, you get metrics for the host of the VM. Most likely
    though, you will want metrics for *inside* (a.k.a. guest) the VM. In order to
    enable this, you will need to select Diagnostic Settings from the Service Menu
    of the VM (not the SQL Virtual Machine), provision a new Azure Storage account
    in the same region as the VM (see these instructions on how to create one quickly:
    [`https://learn.microsoft.com/azure/storage/common/storage-account-create`](https://learn.microsoft.com/azure/storage/common/storage-account-create)),
    and then select `Enable guest-level monitoring`.


    After you enable guest-level monitoring, you will be presented with various options,
    including the ability to add specific counters for the guest VM. Under the Performance
    Counters option, you can select SQL Server counters. Once you have applied this,
    you can now use the Metric option in the Service Menu in the portal to see fundamental
    metrics like you would inside the VM with Windows Performance Monitor. Here is
    an example from my VM as seen in Figure [3-30](#496204_2_En_3_Chapter.xhtml#Fig30).


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig30_HTML.jpg)


    Figure 3-30: Azure guest VM metrics for a virtual machine


    You can also select the `Logs` option from the Service Menu to view Azure Metrics
    by using Kusto Query Language (KQL) queries. This allows you to view metrics from
    Log Analytics that can span more than the 14-day default of using Azure Metrics
    from the portal. Learn more at [`https://learn.microsoft.com/azure/azure-monitor/vm/tutorial-monitor-vm-guest#view-logs`](https://learn.microsoft.com/azure/azure-monitor/vm/tutorial-monitor-vm-guest%2523view-logs).


    # Insights


    When you selected `Enabled guest-level monitoring`, Azure Monitor started collecting
    metrics in a Log Analytics workspace. By choosing the `Insights` option from the
    Service Menu, you can look at another visualization of these metrics. You can
    see an example of these metrics in Figure [3-31](#496204_2_En_3_Chapter.xhtml#Fig31).


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig31_HTML.jpg)


    Figure 3-31: Insights for Azure Virtual Machine using Log Analytics


    You can go even farther using a concept called Workbooks, which you can read more
    about at [`https://learn.microsoft.com/azure/azure-monitor/vm/vminsights-workbooks`](https://learn.microsoft.com/azure/azure-monitor/vm/vminsights-workbooks).


    # Networking


    When I deployed the Azure Virtual Machine earlier in this chapter, several types
    of network resources were created in the resource group, including a virtual network,
    network interface, public IP address, and network security group.


    The public IP address is important as it allows you to use tools like Remote Desktop
    to connect to the virtual machine. The network interface is the interconnection
    between the VM and the virtual network. The network security group (NSG) provides
    an Access Control List (ACL) for rules to allow or deny network traffic to the
    VM (like a firewall). You can read the complete picture of networks and Azure
    Virtual Machines at [`https://learn.microsoft.com/azure/virtual-network/network-overview#network-security-groups`](https://learn.microsoft.com/azure/virtual-network/network-overview%2523network-security-groups).


    Previously, I connected to the virtual machine using the Remote Desktop Client
    (RDP) which used the public IP address and access to the RDP port (3389). There
    could be other methods you want to use to connect to the virtual machine.


    I recommend against enabling the SQL Server port 1433 to be open to the public
    Internet. However, that is the only method for you to connect a SQL Server client
    application or tool (like SSMS) to the SQL Server instance in the Azure Virtual
    Machine unless you run the application or tool in a computer that is connected
    to the virtual network of the VM. One method to do this is to deploy the application
    or another VM in Azure and join the same Azure virtual network. You can also deploy
    in another Azure virtual network and set up a configuration called virtual network
    peering, which you can read about at [`https://learn.microsoft.com/azure/virtual-network/virtual-network-peering-overview`](https://learn.microsoft.com/azure/virtual-network/virtual-network-peering-overview).


    Finally, you may find yourself wanting to connect on-premises resources such as
    applications or other computer or virtual machines to the virtual network for
    the Azure VM. You can read more about the details of setting up a configuration
    like this at [`https://learn.microsoft.com/azure/architecture/reference-architectures/hybrid-networking`](https://learn.microsoft.com/azure/architecture/reference-architectures/hybrid-networking).


    # HADR


    No matter where you deploy SQL Server, almost everyone wants high availability
    at some level and the ability to execute, when necessary, disaster recovery techniques.
    Azure provides methods to deliver several choices for HADR.


    ## Azure Storage


    In the example in this chapter where I showed you how to deploy SQL Server in
    Azure Virtual Machine, I used `data disks` based on premium managed disks from
    Azure Storage. By default, managed disks have built-in redundancy called `Locally
    Redundant Storage (LRS)`. LRS maintains three copies of data within the data center
    region. You can read more about Azure Storage redundancy at [`https://learn.microsoft.com/azure/storage/common/storage-redundancy`](https://learn.microsoft.com/azure/storage/common/storage-redundancy).
    You can actually make your disk zone redundant, but because the data is not replicated
    across zones, you could see a performance impact.'
