    ### Azure Database Fleet Manager（数据库舰队管理器）


    虽然弹性池有助于为大量数据库提供简化的成本和性能管理，但您可能还需要更多功能。Microsoft 已宣布一种名为 **fleet manager（舰队管理器）**
    的新方法，用于以*非常大的*规模部署和管理数据库和弹性池。


    Fleet manager 是 Microsoft 内部为需要大规模部署和管理数据库的团队（如 Dynamics 365）而诞生的概念。Fleet managers
    使用称为 **fleetspace（舰队空间）**、**fleet（舰队）** 和 **tier（层级）** 的概念，使您能够使用策略方法跨多个区域部署和管理大量数据库或弹性池。这种方法使您能够以一致且灵活的方式管理您的舰队，包括安全性、架构更改、智能资源重新平衡、HADR
    配置和“智能”默认值。


    在编写本书时，fleet manager 处于预览阶段，需要注册参与。您可以在 [`https://aka.ms/azuresqlfleet`](https://aka.ms/azuresqlfleet)
    阅读博客公告。请关注 Azure SQL Database 的所有最新公告，了解此功能进入公共预览版并最终进入正式版的进展，网址为 [`https://aka.ms/whatsnewsqldb`](https://aka.ms/whatsnewsqldb)。


    ### Azure SQL Database 与 Azure SQL Managed Instance


    在阅读并了解了 Azure SQL Managed Instance 和 Azure SQL Database 的所有选项后，您可能有足够的信息开始做出选择。许多客户根据其应用程序需求选择这些选项的组合。


    在做出此决策时，请考虑 Azure Managed Instance 和 Azure SQL Database 之间的这些主要因素作为差异：


    *   如果您的数据库大小需要超过 **32TB**，那么目前 **Hyperscale（超大规模）** 是您唯一的选择。

    *   如果您的部署需要**数据库引擎实例功能**，例如 SQL Server Agent 作业、Database Mail、Resource Governor
    或事务复制，那么 **Azure Managed Instance** 是您唯一的选择。

    *   如果您的应用程序对 **I/O 延迟非常敏感**，那么 **Business Critical（业务关键型）** 服务层级或 **Hyperscale（超大规模）**
    可能是您的最佳选择。

    *   如果您需要**最高级别的可用性和弹性**，那么 **Business Critical（业务关键型）** 服务层级或 Azure SQL Database
    **Hyperscale（超大规模）** 是您的最佳选择。

    *   如果您的应用程序具有非常**间歇性的使用模式**，包括几乎完全空闲的时期，那么 **Serverless（无服务器）** 对您来说可能是一个非常好的选择。


    在考虑这些因素后，如果仍不确定 Azure SQL Managed Instance 还是 Azure SQL Database 更符合您的要求，那么我首先建议您查看
    Azure SQL Database。Azure SQL Database 拥有您可能需要的大多数核心数据库引擎功能，并提供最高级别的托管服务功能。我还发现，Azure
    SQL Database 在各种部署选项中具有最快的部署和扩展操作。


    您仍然可能发现 Azure SQL Database 没有您需要的功能集。因此，我强烈建议您查看文档中的此功能比较（我们始终在更新），网址为 [`https://learn.microsoft.com/azure/azure-sql/database/features-comparison`](https://learn.microsoft.com/azure/azure-sql/database/features-comparison)。


    在 Azure SQL Database General Purpose、Business Critical、Hyperscale 和 Azure SQL
    Managed Instance 的服务层级之间进行真正很好的比较，可以在 [`https://aka.ms/azuresqlservicetiers`](https://aka.ms/azuresqlservicetiers)
    找到。


    ### 使用 Azure SQL Database 的客户


    Azure SQL Database 在单个数据库、Hyperscale、Serverless 和弹性池方面一直是客户的热门选择。


    **BKW Energie** 在为其能源生产电网构建数字地理信息系统 (GIS) 平台时很快意识到，**Hyperscale（超大规模）** 是唯一能为他们提供所需规模以及
    SQL 功能（包括内置图形数据库功能）的云数据库平台。您可以在 [`https://customers.microsoft.com/story/825080-bkw-energie-energy-azure`](https://customers.microsoft.com/story/825080-bkw-energie-energy-azure)
    阅读关于 BKW Energie 的完整故事。


    **Serverless（无服务器）** 的真正威力在于为不需要 24/7 高计算使用率的应用程序节省成本。**CampBrain** 是一家软件公司，提供帮助营地运营的服务。当
    CampBrain 发现 Microsoft Azure SQL Database **serverless（无服务器）**（一种针对具有间歇性、不可预测使用模式的数据库的计算层级）时，它清除了最大的障碍之一：尽管存在极端使用带来的高低波动，仍能管理计算成本，同时降低了性能管理的复杂性和风险。您可以在
    [`https://customers.microsoft.com/story/779861-campbrain_professionalservices_azure_canada`](https://customers.microsoft.com/story/779861-campbrain_professionalservices_azure_canada)
    阅读完整的 CampBrain 客户故事。


    ## Azure SQL 的接口


    在本章开头，我描述了 Azure 生态系统中的各种接口：门户、API 和 CLI。Azure SQL 与所有这些接口集成，同时也与传统的 SQL Server
    接口集成。


    ### Azure 门户


    我们在 Azure 门户中创建了 Azure SQL 体验，以适应 Azure SQL 产品线。图 2-9 显示了在门户中使用搜索后的 Azure SQL
    选项。


    ![](img/496204_2_En_2_Fig9_HTML.jpg)


    图 2-9


    Azure SQL 服务和市场


    如果您选择 Azure SQL 服务，您将看到为 Azure SQL 创建的资源列表（包括已注册的虚拟机）。如果您选择 Azure SQL 市场选项，您将看到创建
    Azure SQL 服务的选项，如图 2-10 所示。


    ![](img/496204_2_En_2_Fig10_HTML.jpg)


    图 2-10


    Azure SQL 部署选项


    您还将看到，在部署 Azure SQL 资源后，虚拟机、实例和数据库都有特定的集成。您将在本书的其余部分看到这些示例。


    如前所述，Azure 门户有一个新的 Copilot 体验来帮助您部署和管理 Azure 资源。我们的团队在该框架中引入了一种新的上下文感知 Copilot
    体验，称为 **Microsoft Copilot skills in Azure SQL Database（Azure SQL Database 中的 Microsoft
    Copilot 技能）**。在我看来，这种体验在行业中是与众不同的。例如，通过这种新的 “SQL Copilot”，您可以使用自然语言提示在数据库上下文中快速解决复杂的性能问题。图
    2-11 展示了此体验的一个示例。


    ![](img/496204_2_En_2_Fig11_HTML.jpg)


    图 2-11


    Azure SQL Database 中的 Microsoft Copilot 技能


    您将在本书其余部分的几个章节中看到如何使用此 Copilot 体验的示例。您可以在 [`https://aka.ms/sqlcopilot`](https://aka.ms/sqlcopilot)
    快速开始。


    此外，我们现在在 Azure 门户中的 **Query Editor（查询编辑器）** 中也有了一种新体验，可帮助使用自然语言提示生成 T-SQL 语句。图
    2-12 显示了使用此新体验的示例。


    ![](img/496204_2_En_2_Fig12_HTML.jpg)


    图 2-12


    使用自然语言转 SQL 的查询编辑器


    我将在本书的第 10 章向您展示如何使用此 AI 辅助体验的示例。


    注意


    在编写本书时，Azure 门户**查询编辑器**中的**自然语言转 SQL**功能处于预览阶段。到其正式可用时，查询编辑器中的最终界面可能会发生变化。

