  trans: '## 连接到托管实例


    有多种不同的方法可以连接到你的托管实例，你可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/connect-application-instance`](https://learn.microsoft.com/azure/azure-sql/managed-instance/connect-application-instance)
    查看所有这些方法。


    我个人喜欢做的是，通过部署过程中创建的虚拟网络*内部*的一台 Azure 虚拟机进行连接，这样我就不必启用公共端点。我将这台虚拟机称为***跳转盒***。我会使用
    RDP（远程桌面协议）连接到该虚拟机，然后在虚拟机内部，使用 SSMS 等工具通过实例的私有网络进行连接。


    我会在与我的托管实例相同的资源组中创建一个新的 Azure 虚拟机（我直接从市场中使用 SQL Server Developer Edition）。在部署虚拟机期间，我会选择为托管实例创建的虚拟网络（通常是
    vnet-<MI 名称>，因此这里的名称是 vnet-bwsqlnextgeni）。在这个屏幕上，我选择管理子网配置。这允许我创建一个名为“default”的新子网（并使用默认选项）。这成为我的
    VM 等应用程序用于连接到托管实例虚拟网络的私有子网。


    我的网络设置如图 4-14 所示。


    ![](img/496204_2_En_4_Fig14_HTML.jpg)


    图 4-14


    用于连接跳转盒 VM 到托管实例的网络设置


    随着我的跳转盒部署完毕，我将使用 VM 内部的 SSMS 连接到托管实例。当你连接到一个托管实例时，服务器名称会变成这样一个 URL（你可以在托管实例门户的“概述”屏幕上找到它）。


    ### bwsqlminextgen.b243ea7f888c.database.windows.net


    图 4-15 展示了一个 SSMS 连接到 Azure SQL 托管实例的示例。


    ![](img/496204_2_En_4_Fig15_HTML.jpg)


    图 4-15


    通过跳转盒连接到 Azure SQL 托管实例的 SSMS


    ## 验证部署


    请注意，SSMS 中的“对象资源管理器”看起来与 SQL Server 几乎完全相同，只是服务器名称是完全限定域名（FQDN）。


    要验证 SQL Server 的安装，我通常会使用几种技术，包括对系统目录视图和 DMV 运行查询，以及查看 ERRORLOG。


    ### 检查 ERRORLOG


    你无权访问托管托管实例的虚拟机的文件系统。要查看 ERRORLOG，我们需要像 SSMS 或 T-SQL 这样的工具。


    你可以使用 SSMS 中的对象资源管理器来查看 ERRORLOG，但我更喜欢直接使用 T-SQL，这样我可以执行 `sp_readerrorlog` 来查看当前的
    ERRORLOG 文件。我必须提醒你，我们在托管实例的 ERRORLOG 中转储了各种额外的信息（是的，甚至比 SQL Server 还要多），执行可能需要几秒钟的时间。我的同事
    Dimitri Furman 写了一篇博客文章，其中包含一些用于过滤托管实例 ERRORLOG 的示例代码。你可以在 [`https://techcommunity.microsoft.com/t5/datacat/azure-sql-db-managed-instance-sp-readmierrorlog/ba-p/305506`](https://techcommunity.microsoft.com/t5/datacat/azure-sql-db-managed-instance-sp-readmierrorlog/ba-p/305506)
    查看。


    我在启动时关注 ERRORLOG 中的几个关键消息，并在我的托管实例中找到了这些：


    ```

    SQL Server detected 1 sockets with 4 cores per socket and 8 logical processors
    per socket, 8 total logical processors; using 8 logical processors based on SQL
    Server licensing. This is an informational message; no user action is required.

    SQL Server is starting at normal priority base (=7). This is an informational
    message only. No user action is required.

    Detected 44645 MB of RAM. This is an informational message; no user action is
    required.

    ```


    我可以看到检测到了八个逻辑处理器，这与我部署了一个 8 vCore 实例的预期相符。


    检测到的内存是 SQL Server 引擎从主机或 VM 检测到的内存量。你将在本书的多个地方看到 Azure 如何使用 Windows 作业对象来限制 SQL
    Server 可见的内存，以强制执行每个服务层和 vCore 的资源限制。你会发现，对于此托管实例，作业对象将不允许 SQL Server 访问 ERRORLOG
    中显示的所有内存。事实上，你不应该依赖 ERRORLOG 显示的内容，而应该依赖 DMV `sys.dm_os_job_object`，我将在下一节向你展示如何使用它。'
- fmt: '# Verification Queries


    Whenever I install a SQL Server, I typically use a few T-SQL queries as a sanity
    check. Let us look at these and the results from the Managed Instance compared
    to SQL Server:


    ```

    SELECT @@version

    Microsoft SQL Azure (RTM) - 12.0.2000.8   May 28 2024 14:55:16   Copyright (C)
    2022 Microsoft Corporation

    ```


    I explained in Chapter [1](#496204_2_En_1_Chapter.xhtml) of the book describing
    the history of Azure SQL why v12 was a monumental moment for the service. Since
    that time, we have not changed the major version of 12.


    Basically, the major version of Azure SQL Managed Instance has no meaning. It
    does not line up with any major version of SQL Server since Azure SQL Managed
    Instance is versionless. I will discuss more the concept of versionless in Chapter
    [5](#496204_2_En_5_Chapter.xhtml) of the book. Just know that Microsoft strives
    to keep instances and databases of Azure SQL up to date with all the right changes
    and fixes, so you do not worry about applying updates.


    Note

    Even though the version doesn’t change, the timestamp of `@@VERSION` is when we
    have last updated the instance. It is not a guarantee, but I’ve never seen this
    not be the case.


    ```

    SELECT database_id, name, compatibility_level FROM sys.databases;

    database_id    name        compatibility_level

    1              master      160

    2              tempdb      160

    3              model       160

    4              msdb        160

    ```


    This looks normal (I have not created any user databases) except the `mssqlsystemresource`
    database is not listed as with SQL Server (it does exist as you can see in the
    `ERRORLOG`). Notice the compatibility level is set to 160 which is the `dbcompat`
    for SQL Server 2022.


    ```

    SELECT name, object_id, type_desc FROM sys.objects;

    ```


    The results from this query are what you would normally think from a `master`
    database on a SQL Server with system tables at the top of the list.


    ```

    SELECT * FROM sys.dm_os_schedulers;

    ```


    Since we have deployed an 8-vCore Managed Instance, I would expect eight `VISIBLE
    ONLINE` schedulers, which is the case. I also expect to see a few `HIDDEN ONLINE`
    schedulers which are in the result of this query.


    ```

    SELECT * FROM sys.dm_os_sys_info;

    ```


    This is a DMV that provides system information about SQL Server. I can see from
    the output of this DMV the number of CPUs detected, the amount of memory detected,
    the target (max server memory), the total memory used by the engine, and the actual
    worker thread max (1640 for 8 vCores) and that the conventional memory model is
    used. I will talk more about locked pages in Chapter [5](#496204_2_En_5_Chapter.xhtml)
    of the book.


    ```

    SELECT * FROM sys.dm_os_process_memory;

    ```


    This DMV shows OS-related memory information, including whether locked or large
    pages are used (they are not for Azure SQL Managed Instance or Database). I normally
    just use this as a sanity check that enough memory is available for SQL Server
    in a VM or server.


    ```

    SELECT * FROM sys.dm_exec_requests;

    ```


    This is one of the most common DMVs in the world to check the state of what is
    running on a SQL Server. I run this just to make sure all the normal background
    processes are running, including `LAZY WRITER`, `RECOVERY WRITER`, `LOCK MONITOR`,
    etc., and that I can see active queries.


    ```

    SELECT SERVERPROPERTY(''EngineEdition'');

    ```


    Per the documentation at [`https://learn.microsoft.com/sql/t-sql/functions/serverproperty-transact-sql`](https://learn.microsoft.com/sql/t-sql/functions/serverproperty-transact-sql),
    the value of eight is for a Managed Instance.


    There are also two new DMVs specific to Azure not found in SQL Server:


    ```

    SELECT * FROM sys.dm_user_db_resource_governance;

    ```


    This DMV is really intended to show you resource limits for a specific Azure SQL
    Database, but it also works for Managed Instance (you will see a row for all databases,
    including system databases except for `tempdb`). You can view limits like memory,
    max storage, log rates, etc. You can read the documentation for this DMV at [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database).
    Note that the docs say this is mostly for internal use, which means it might change
    in the future.


    Note

    There is an undocumented DMV called `sys.dm_instance_resource_governance` which
    shows resource limits at the instance level.


    ```

    SELECT * FROM sys.dm_os_job_object;

    ```


    This is a DMV specific to Azure that shows resource limits Azure applies to a
    Managed Instance using Windows Job Objects. The specific column I look at is `memory_limit_mb`
    which shows me the true amount of memory the Managed Instance has access to. I
    talked about Windows Job Objects in the section “Implementation Details.”


    You may be asking at this point what is so special about Managed Instance since
    from the perspective of using a tool like SSMS it feels like a SQL Server running
    in an Azure Virtual Machine. This is the point of a Managed Instance. We want
    you to have the feel of a SQL Server instance, but not worry about the details
    you might have to consider with a virtual machine. And since Azure SQL Managed
    Instance (MI) is a PaaS service, you will see the benefits of using MI especially
    when it comes to a versionless SQL Server, predictable performance, built-in high
    availability, and disaster recovery.


    # Migrating to Azure SQL Managed Instance


    I discussed earlier in this chapter some of the considerations and tools for migrating
    to Azure SQL Managed Instance.


    Let me add more details on some considerations should you consider when migrating:


    *   When you are migrating a database protected by Transparent Data Encryption
    to a managed instance using native restore option, the corresponding certificate
    from the on-premises or Azure VM SQL Server needs to be migrated *before* database
    restore.


    *   Restore of system databases is not supported. To migrate instance-level objects
    (stored in `master` or `msdb` databases), we recommend scripting them out and
    run T-SQL scripts on the destination instance. For example, you can use SSMS to
    script out SQL Server Agent jobs to T-SQL.


    *   Database compatibility is fully supported by Azure SQL Managed Instance, including
    all current supported versions of SQL Server. I have many customers that choose
    to keep their current `dbcompat` when migrating to Azure and then test and update
    it later. Read more about `dbcompat` at [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat).


    *   While you can always restore a full backup (offline) to Azure SQL Managed
    Instance, you have online choices as well, including a log-shipping approach with
    Azure Database Migration Service (DMS) and a more granular approach using Managed
    Instance Link using Always On Availability Groups. Managed Instance link works
    even if you don’t have an AG deployed on-premises. Learn more about how to use
    Managed Instance link at [`https://aka.ms/milink`](https://aka.ms/milink).


    *   Application changes should be minimal for a migration to Managed Instance
    except using the new server name (which you saw in the previous part of this chapter
    on how to connect) and possibly the authentication method. A new capability to
    use Windows Authentication and mitigate changes you need in your application for
    authentication is now available. Learn more at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup`](https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup).'
