  trans: '

    为了托管 PaaS 云服务，必须构建一个*底层托管系统*。Windows Azure 团队借鉴了 Red Dog 项目的设计方案来构建这个托管系统，以支持部署、网络、高可用性、扩展和安全性，因为云服务将这些细节从开发者那里完全抽象了出来。这个软件托管系统被称为`Windows
    Fabric`。为用户所使用的服务提供底层托管系统，正是*云的力量*。我在 PDC 2008 大会的一次演讲中发现了这张有趣的幻灯片，它详细阐述了某人在数据中心运行自己的`结构`所需的所有细节，如图
    1-2 所示。


    ![](img/496204_2_En_1_Fig2_HTML.jpg)


    图 1-2


    在数据中心构建你自己的结构


    这张幻灯片充分说明了一个`结构`为了支持大规模云服务所必须具备的功能。一个高可用的*结构控制器*（`FC`）是系统的关键。`FC`维护着它所管理的资源清单的拓扑图：计算机、虚拟机、负载均衡器和交换机，边则是网络电缆等对象。`结构`系统的一个关键点是采用了声明式模型，因此`FC`会获取你声明的内容并实现它。在
    Azure 的`Windows Fabric`中，很早就有了高可用性的概念，比如故障域和更新域（我将在本书的第 2 章和第 3 章中描述这些概念的重要性）。


    `Windows Fabric`现在被称为`Service Fabric`。`Service Fabric`的使用也被开放给应用程序，以便在`Service
    Fabric`集群中托管它们自己的服务。你可以在 [`https://azure.microsoft.com/services/service-fabric/`](https://azure.microsoft.com/services/service-fabric/)
    阅读更多关于 Azure `Service Fabric`的信息。


    注意


    当你在本书本章中了解更多关于`Service Fabric`的内容时，你可能会看到它与另一个名为 Kubernetes 的`结构系统`有相似之处。如果你想了解更多关于这两个系统之间的区别，这篇博客文章是一个很好的起点：[`https://techcommunity.microsoft.com/t5/azure-developer-community-blog/service-fabric-and-kubernetes-community-comparison-part-1-8211/ba-p/337421`](https://techcommunity.microsoft.com/t5/azure-developer-community-blog/service-fabric-and-kubernetes-community-comparison-part-1-8211/ba-p/337421)。


    为了完善`Azure 服务`的版图，微软宣布了数据平台或`SQL 服务`，从而开始了最终成为 Azure SQL 的旅程的首次公开宣告。


    ## 走向 SQL Azure 之路


    2008 年 PDC 大会上关于 Windows Azure 的宣布中，很大一部分内容涉及数据。自 2006 年的 CloudDB 项目以来，Peter Spiro、David
    Campbell、Ajay Kalhan、Tomas Talius 和团队的其他成员已经为 SQL Server 构建了一套云服务，以托管`多租户数据库`（或在一组共享的
    SQL Server 中托管多个客户）。


    在 PDC 2008 上宣布的第一个名称是`SQL 数据服务（SDS）`。虽然这项服务的消息在行业内引起了轰动，但当时许多客户关注的是本地企业部署，而我们的团队整体上也把主要精力放在了
    SQL Server 上（例如，发布代号为 Katmai 的 SQL Server 2008）。但在公司内部，领导层正在大力推动云计算，而这不仅仅是因为他们“被要求这样做”。Ted
    Kummert 说：“我们是信仰者。我们相信 PaaS 是未来，但对于这样的服务来说，我们在行业中还处于早期阶段。”


    ### SQL 数据服务


    SQL 数据服务被宣布为更广泛的`SQL 服务`套件的一部分，该套件还包括 DataSync、Reference Data、Reporting、Data Mining
    和 ETL，如图 1-3 所示。


    ![](img/496204_2_En_1_Fig3_HTML.jpg)


    图 1-3


    2008 年 PDC 大会上的 SQL 服务


    这张图片来源于 David Campbell 在 2008 年 PDC 大会上演讲的幻灯片。


    注意


    有趣的是，我们当时的意图也包括提供“数据仓库”服务（我们现在通过 Azure Synapse（和 Microsoft Fabric）来实现）以及“ETL”服务（现在是
    Azure Data Factory）。“Reporting”在 SQL 服务中从未真正取得成功（尽管有过尝试），但微软最终创建了一个非常强大的 Reporting
    服务，叫做 Power BI。


    SQL 数据服务体现了开发者为其应用程序托管数据库的能力，并将计算机、虚拟机和 SQL Server 本身的细节完全抽象化。基本上，你创建一个数据库；用表、数据和索引填充它；然后就可以直接开始使用了。不需要机器、操作系统或机器安装。


    `SDS`提供的另一个概念是“数据库即公用事业”或“按需付费服务”。这实际上是整个 Windows Azure 的相同理念。它代表了客户使用模式的转变：从购买
    SQL Server 许可证转向使用订阅服务来支付数据库使用（以及背后的计算和存储）费用。


    当团队将编程接口作为`REST API`而不是`T-SQL`引入时，他们很快吸取了一个教训。REST 代表**表述性状态转移**，是 Web 服务常用的协议。客户的反馈很快改变了这个模式（但`REST
    API`接口至今仍在 Azure SQL 的许多方面存在，你将在本书中看到）。你可以从这篇 2009 年 3 月的博客文章（[`https://web.archive.org/web/20140411144147/http://blogs.msdn.com/b/sqlazure/archive/2009/03/10/9469228.aspx`](https://web.archive.org/web/20140411144147/http://blogs.msdn.com/b/sqlazure/archive/2009/03/10/9469228.aspx)）看出，`SDS`团队需要为开发者和用户提供“关系数据体验”，其中包括通过`表格数据流（TDS）`的编程接口。换句话说：`T-SQL`。客户期望从
    SQL Server 数据库获得的其他基本功能也必须具备，包括索引、存储过程、触发器、视图等。


    由于`SDS`和 Windows Azure 团队当时在同时进行创新，`SDS`团队必须为数据库和 SQL Server 找出一个托管系统。当`SDS`团队在创新时，`Windows
    Fabric`正在构建中。最终的决定是使用微软已有的托管系统，而不是使用 Windows Azure。那个平台叫做`AutoPilot`（你可以在 `https://www.microsoft.com/en-us/research/publication/autopilot-automatic-data-center-management/?from=http%3A%2F%2Fresearch.microsoft.com%2Fapps%2Fpubs%2Fdefault.aspx%3Fid%3D64604`
    阅读更多关于`AutoPilot`系统的信息），它由运行 Bing 搜索服务的团队构建。`AutoPilot`实际上是一个以规模化方式配置“裸机”计算机的平台。`SDS`
    `集群`在物理上与 Windows Azure 集群共置，但`SDS`管理着自己的系统。


    `AutoPilot`只提供软件服务来在规模化裸机服务器上部署和维护应用程序。`SDS`团队必须构建自己的一套服务来实现容错、高可用性和连接性。`SDS`团队构建了自己的`结构`来部署、运行、扩展和维护
    SQL Server 实例以托管客户数据库。最初的设计是“孤岛”式，后来被“每个租户一个数据库”的模型所取代，称为`分区`（与 SQL Server 分区不同），但多个数据库可以托管在一个
    SQL Server 实例上。每台裸机服务器也可以托管多个 SQL Server 实例。

    '
- fmt: '该设计的另一部分是为了支持“数据库服务”的概念，将用户与SQL Server实例本身抽象开（尽管SQL Server实例被用来托管数据库）。因此，“主节点”的概念被内置到服务中，用于承载关于“数据节点”的元数据。这些数据节点具有副本和结构控制器的概念。此外，还构建了一个前端服务，应用程序将连接到此服务，而不是连接到后端SQL
    Server。这便是现在被称为`Gateway Server`的Azure SQL的早期设计。


    图[1-4](#496204_2_En_1_Chapter.xhtml#Fig4)展示了SDS托管系统的原始设计。


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig4_HTML.jpg)


    图 1-4


    SQL服务数据库的原始SDS托管设计


    结构（Fabric）进程有助于与整个集群协调以实现故障转移。因此，早期我们需要提供：


    *   通过我们的分区（`partition`）概念隔离客户，但共享SQL Server以实现密度

    *   结构（`fabric`）内部的故障转移逻辑

    *   数据的副本集。听起来很熟悉？（有点像可用性组（`Availability Group`））

    *   我们的数据库访问底层存储和跨数据中心网络的能力，但对用户是抽象的

    *   一个逻辑上的“主”数据库，用于应用程序数据库以支持登录并存储其他元数据

    *   收集指标以深入了解遥测和运行状况的能力

    *   用于健康检测的`Watchdog`进程


    团队在这些早期学到了很多。Ted Kummert描述了当时的挑战，即不仅仅是增强和构建软件，还要拥有“实时服务”的所有方面，包括强化、质量、可用性、开发速度、遥测、中断、安全性，甚至包括销售成本（`COGS`）和容量规划之类的事情。这些早期的学习最终使微软能够扩展到原始团队梦想的水平。正如Ted所描述的，“……我们现在不仅是在演进一个代码库，同时也在作为一个团队以及我们的能力一起演进。这是一种既令人振奋又令人谦卑的经历。”


    微软公司历史上的另一个重要事件发生在2008年。当时Steve Ballmer要求公司内的一位领导者重新打造另一项云服务，即Bing搜索服务。那位领导者就是Satya
    Nadella。根据Satya在他的书*Hit Refresh*中所说，“最终，Bing将被证明是构建当今遍布微软的超大规模、云优先服务的绝佳训练场。”


    ### SQL Azure诞生


    向市场发布版本是一项巨大的努力。在此过程中，SQL Data Services对许多人来说并不是一个合适的名字。因此，在2009年夏天，当该服务仍处于社区技术预览（`Community
    Technology Preview`，`CTP`）阶段时，品牌名称从SQL Data Services更改为`SQL Azure`。`SQL Azure`这个名称至今仍被许多人用来称呼Azure
    SQL（可以问问Conor Cunningham）。编程和使用模型与SDS相同（只不过采用了T-SQL和TDS协议而不是REST），托管方式也相同，但`SQL
    Azure`这个名称是推向市场的品牌。


    2010年2月1日，一切正式生效。Windows Azure正式发布，随之而来的是业界第一个真正的PaaS关系数据库服务——`SQL Azure`（您可以在
    [`https://blogs.microsoft.com/blog/2010/02/01/windows-azure-general-availability/`](https://blogs.microsoft.com/blog/2010/02/01/windows-azure-general-availability/)
    阅读官方博客公告）。与公告一同发布的还有一个新徽标（将当时的SQL Server 2008徽标从红色改为蓝色），如图[1-5](#496204_2_En_1_Chapter.xhtml#Fig5)所示。


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig5_HTML.jpg)


    图 1-5


    原始的SQL Azure徽标


    为了与Windows Azure交互，团队还必须接入一个称为`portal`的用户界面体验。第一版Windows Azure门户使用了HTML，但此后不久，采用了基于Microsoft
    Silverlight的新门户体验。这也包括一个单独的基于Silverlight的SQL Azure“管理”体验。


    图[1-6](#496204_2_En_1_Chapter.xhtml#Fig6)展示了一个基于Silverlight的SQL Azure管理门户示例。


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig6_HTML.jpg)


    图 1-6


    SQL Azure管理门户


    当Windows Azure发布时，`Azure data center`的概念被介绍给我们的客户。数据中心是位于特定地理位置的一组物理建筑，微软在此托管Azure服务。数据中心的名称基于地理区域（我们后来转向了`region`和数据中心的概念，我将在本章后面和其他地方解释）。在SQL
    Azure最初发布时，客户可以在名为North Central US、South Central US、East Asia和North Europe的数据中心部署数据库。


    最初的SQL Azure有一些有趣的特点：


    *   我们发布时的业务模型有两种`edition`：Web版和商业版。主要区别在于最大数据库大小：Web版为1GB，商业版为10GB（正如您将在本书中看到的，现在您可以创建远大于此的大小）。我们在2010年6月迅速将此上限提高到了50GB。

    *   为了部署数据库，您需要首先部署一个`logical database server`。多个数据库可以关联到一个逻辑服务器。逻辑服务器还包含其他元数据，例如用于安全性的登录名和防火墙规则。

    *   数据库中的任何表都必须具有聚簇索引（`clustered index`）。

    *   我们使用了自己的内部“副本系统”，但确保始终保留三个可用副本。我们还自动化了备份等过程并保留了多个副本。

    *   我们通过称为服务更新（`Service Update`，`SU`）的概念来更新SQL Server软件，并通过博客公告这些更新（服务更新的示例博客文章可在
    [`https://web.archive.org/web/20140420195848/http://blogs.msdn.com/b/sqlazure/archive/2010/02/17/9965464.aspx`](https://web.archive.org/web/20140420195848/http:/blogs.msdn.com/b/sqlazure/archive/2010/02/17/9965464.aspx)
    找到）。

    *   我们引入了服务级别协议（`Service-Level Agreement`，`SLA`）的概念，以确保一定级别的数据库可用性。

    *   早期，我们与流行工具`SQL Server Management Studio`（`SSMS`）开发了集成体验。

    *   客户在诸如应用程序重试逻辑、新的错误消息、逻辑主库（`logical master`）、限流（`throttling`）以及与SQL Server的T-SQL表面区域不一致等概念上遇到了困难。


    注意


    如果您想回顾一下，查看一些关于SQL Azure的早期博客，请访问 [`https://web.archive.org/web/20140410165353/http://blogs.msdn.com/b/sqlazure/default.aspx?PageIndex=1`](https://web.archive.org/web/20140410165353/http:/blogs.msdn.com/b/sqlazure/default.aspx%253FPageIndex%253D1)
    并浏览页面底部的链接。


    在Windows和SQL Azure的这些早期，即使在微软内部，这也是一个全新的世界。Buck Woody曾在最初的Windows Azure团队工作。他告诉我，在Azure工作属于微软内部一个名为“Incubation”的小组——一种类似初创公司的文化。“其中最有趣的部分之一，”他说，“是见证技术和业务方面所有东西的构建过程。这可能是我上过的最好的MBA课程。”在Incubation部门，你被“隔离”在微软其他部门之外，拥有自己的工程师、销售、市场等。当产品显示利润并且所有业务流程都建立起来后，它就“毕业”并入微软的其他领域。有些产品毕业了，有些则没有——因此成功压力很大。'
  raw: 'The other piece of this design to support the concept of a “database service”
    was to abstract users from the SQL Server instance itself (even though SQL Server
    instances were used to host databases). Thus, the concept of a “master node” was
    built into the service to host metadata about the “data nodes.” These data nodes
    had the concept of replicas and fabric controllers. In addition, a front-end service
    was built where applications would connect instead of connecting to the back-end
    SQL Server. This would be the early design of what is now known as *Gateway Server*
    for Azure SQL.


    Figure [1-4](#496204_2_En_1_Chapter.xhtml#Fig4) shows the original design of the
    SDS hosting system.


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Original SDS hosting design for SQL service databases


    Fabric processes help coordinate with the overall cluster for failover purposes.
    So early on, we needed to provide


    *   The ability to isolate customers with our partition concept but share SQL
    Servers for density


    *   Failover logic within the fabric


    *   Replica sets of data. Sound familiar? (Kind of like an Availability Group)


    *   Access for our databases to underlying storage and networking across the data
    center but abstracted from users


    *   A logical “master” database for application databases to support logins and
    store other metadata


    *   The ability to collect metrics to gain insight into telemetry and health


    *   *Watchdog* processes for health detection


    The team learned a lot in these early days. Ted Kummert described the challenges
    of now not just enhancing and building the software but owning all aspects of
    a “live service,” including hardening, quality, availability, development velocity,
    telemetry, outages, security, and even things like Cost of Goods Sold (COGS) and
    capacity planning. These early learnings would eventually allow Microsoft to scale
    to the levels the original team had dreamed about. As Ted described it “…we were
    now not just evolving a codebase, but we were evolving as a team and our capabilities
    all at the same time. It was both an exhilarating and humbling experience.”


    Another important event in Microsoft’s company history happened in 2008\. Steve
    Ballmer then asked a leader within the company to reinvent another cloud service,
    the Bing Search Service. That leader was a man named Satya Nadella. According
    to Satya in his book *Hit Refresh*, “Ultimately, Bing would prove to be a great
    training ground for building the hyper-scale, cloud-first services that permeate
    Microsoft today.”


    ### SQL Azure Is Born


    It was a massive effort to move to a market release. Along the way, SQL Data Services
    just didn’t have the right name for many. Therefore, in the summer of 2009, while
    the service was still in Community Technology Preview (CTP), a brand name change
    was made from SQL Data Services to **SQL Azure**. The SQL Azure name is still
    what many call Azure SQL today (just ask Conor Cunningham). The programming and
    usage model were the same as SDS (except T-SQL and the TDS protocol were adopted
    instead of REST), the hosting was the same, but the name SQL Azure was the go-to
    market brand.


    On February 1, 2010, it all became official. Windows Azure was officially launched
    and, along with it, the first truly PaaS relational database service in the industry,
    SQL Azure (you can read the official blog announcement at [`https://blogs.microsoft.com/blog/2010/02/01/windows-azure-general-availability/`](https://blogs.microsoft.com/blog/2010/02/01/windows-azure-general-availability/)).
    Along with the announcement was a new logo (changing the current SQL Server 2008
    logo from red to blue) as seen in Figure [1-5](#496204_2_En_1_Chapter.xhtml#Fig5).


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig5_HTML.jpg)


    Figure 1-5


    The original SQL Azure logo


    In order to interact with Windows Azure, the team had to also snap into a user
    interface experience called a *portal*. The first version of the Windows Azure
    portal used HTML, but quickly after this, a new portal experience based on Microsoft
    Silverlight was adopted. This also included a separate Silverlight “administration”
    experience for SQL Azure.


    Figure [1-6](#496204_2_En_1_Chapter.xhtml#Fig6) shows an example SQL Azure management
    portal based on Silverlight.


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig6_HTML.jpg)


    Figure 1-6


    The SQL Azure Management Portal


    When Windows Azure was launched, the concept of an *Azure data center* was introduced
    to our customers. A data center is a physical set of buildings in a specific geographic
    location where Microsoft hosted Azure services. The names of the data centers
    were based on a geographical region (we have since shifted to a concept of *regions*
    and data centers which I’ll explain later in this chapter and in other places
    in the book). At the original launch of SQL Azure, customers could deploy databases
    in data centers with names of North Central US, South Central US, East Asia, and
    North Europe.


    The original SQL Azure had some interesting characteristics:


    *   We launched with a business model that had two *editions*: Web and Business.
    The basic difference was the maximum database size: 1GB for Web and 10GB for Business
    (as you will see in this book, you can create sizes much larger than this now).
    We quickly bumped this up to 50GB by June 2010.


    *   In order to deploy a database, you would deploy first a *logical database
    server*. Multiple databases could be associated with a logical server. The logical
    server also contained other metadata such as logins and firewall rules for security.


    *   Any table in a database was required to have a clustered index.


    *   We used our own internal “replica system” but ensured that we always kept
    three replicas available. We also automated processes like backups and kept multiple
    copies.


    *   We updated the software for SQL Server through a concept called a Service
    Update (SU) and made announcement about these updates in blog posts (an example
    blog post for a service update can be found at [`https://web.archive.org/web/20140420195848/http://blogs.msdn.com/b/sqlazure/archive/2010/02/17/9965464.aspx`](https://web.archive.org/web/20140420195848/http:/blogs.msdn.com/b/sqlazure/archive/2010/02/17/9965464.aspx)).


    *   We introduced the concept of a Service-Level Agreement (SLA) to ensure a level
    of database availability.


    *   Early on, we developed an integrated experience with the popular tool, SQL
    Server Management Studio (SSMS).


    *   Customers struggled with concepts like application retry logic, new error
    messages, logical master, throttling, and inequality with the T-SQL surface area
    of SQL Server.


    Note


    If you want to step back in time and see some older blogs about SQL Azure, visit
    [`https://web.archive.org/web/20140410165353/http://blogs.msdn.com/b/sqlazure/default.aspx?PageIndex=1`](https://web.archive.org/web/20140410165353/http:/blogs.msdn.com/b/sqlazure/default.aspx%253FPageIndex%253D1)
    and traverse the links at the bottom of the page.


    In these early days for both Windows and SQL Azure, it was even a new world within
    Microsoft. Buck Woody worked on the original Windows Azure teams. He told me that
    working on Azure was in a group at Microsoft called “Incubation” – a startup-like
    culture. “One of the most interesting parts of that,” he said, “was seeing everything
    getting built in the technology, and in the business side. It was probably the
    best MBA I ever got.” In Incubation, you were “walled off” from the rest of Microsoft,
    having your own engineers, sales, marketing, and the like. When the product showed
    a profit and all the business processes were established, it “graduated” to the
    rest of the field at Microsoft. Some products graduated, and others didn’t – so
    there was a lot of pressure to succeed.'
