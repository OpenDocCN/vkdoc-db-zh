  trans: '

    # 10. 超越关系数据库管理系统


    2023 年夏天，我试图想出一种方法来描述我们在 Azure SQL 中所拥有的一些强大功能，这些功能是“开箱即用”的，但同时也是传统关系数据库管理系统通常不具备的特性。“超越”这个词自然而然地浮现在我脑海中，用以描述这种情况。于是，我（还是老派作风）开始在纸上勾画出两栏：


    *   哪些功能是内置于数据库中的，而在许多情况下可能需要插件或其他产品？我将它们列在了左侧。

    *   哪些功能超出了许多人对传统关系数据库管理系统的认知？这些列在右侧。


    勾画完这些之后，我制作了一张幻灯片，如图 10-1 所示，来描述所有内容。


    ![](img/496204_2_En_10_Fig1_HTML.jpg)


    图 10-1


    Azure SQL 超越关系数据库管理系统


    本章将更详细地描述你在此图中看到的内容。左侧列出的一些功能我们在本书中已经讨论过，但对它们进行一次总结会很有益。


    本章将包含供你尝试和阅读时使用的示例。要尝试本章中使用的任何技术、命令或示例，你需要：


    *   一个 Azure 订阅。

    *   至少拥有该 Azure 订阅的“贡献者”角色访问权限。你可以在 [`learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles)
    了解更多关于 Azure 内置角色的信息。

    *   访问 Azure 门户的权限。

    *   在本章中，我将使用 Azure SQL Database，因为许多这些功能已为该服务启用，但其中许多功能现在已经或将作为 Azure SQL Managed
    Instance 的一部分。

    *   要连接到 Azure SQL Database，我将使用我在第 3 章部署的名为 `bwsql2022` 的 Azure 虚拟机，并在第 6 章为其配置了专用终结点（你可以使用其他方法，只要能连接到
    Azure SQL Database 即可）。你可以使用任何你喜欢的方法，只要能连接到 Azure SQL Database。

    *   本章中你会看到一些 T-SQL，因此请安装一个工具，如 SQL Server Management Studio (SSMS)，下载地址为 [`aka.ms/ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms%253Fview%253Dsql-server-ver15)。

    *   在本书撰写时，我将在此展示的一些功能处于预览状态且未公开提供。但未来它们会公开，因此我在本章中列出了资源供你了解我们的最新进展，以便你将来可以访问它们。


    ## “这是‘箱中自带’的功能吗？”


    图 10-1 的左侧代表内置于 Azure SQL 服务中的功能，所有这些功能都集成到数据库引擎和 T-SQL 语言中。


    让我们通过一些示例，逐一了解图 10-1 左侧的每个功能。


    ### JSON


    JSON 是一种非常流行的数据存储格式，适用于各种类型的应用程序。过去，我们提供了一系列 T-SQL 函数来处理和查看 JSON 格式的数据，包括以下能力：


    *   解析 JSON 文本并读取或修改值。

    *   将 JSON 对象数组转换为表格格式。

    *   对转换后的 JSON 对象运行任何 Transact-SQL 查询。

    *   将 Transact-SQL 查询的结果格式化为 JSON 格式。


    例如，你可以使用 T-SQL 提取 JSON，如下例所示：


    ```sql

    DECLARE @jsonInfo NVARCHAR(MAX)

    DECLARE @town NVARCHAR(32)

    SET @jsonInfo=N''{"info":{"address":[{"town":"Paris"},{"town":"London"}]}}'';

    SET @town=JSON_VALUE(@jsonInfo,''$.info.address[0].town''); -- Paris

    SET @town=JSON_VALUE(@jsonInfo,''$.info.address[1].town''); -- London

    ```


    在这些示例中，使用的数据类型是局部变量的字符数据类型，但它也可以是基于字符的列。我们提供了大量用于 JSON 数据的 T-SQL 函数，你可以在 [`aka.ms/jsonsqlfunctions`](https://aka.ms/jsonsqlfunctions)
    查看完整列表。


    新出现的是一个 *原生* JSON 数据类型，在本书撰写时处于预览状态，现在允许你使用相同的 JSON T-SQL 函数集，但使用一种更适用于 JSON 文档的类型。


    这种原生 JSON 类型，称为 `json`，比使用字符列更高效，因为它提供：


    *   更高效的读取，因为文档已被解析。

    *   更高效的写入，因为查询可以更新单个值而无需访问整个文档。

    *   更高效的存储，针对压缩进行了优化。

    *   与现有代码的兼容性无变化。


    JSON 类型内部使用 UTF-8 编码 `Latin1_General_100_BIN2_UTF8` 存储数据。此行为符合 JSON 规范。


    一个在表中使用的示例如下所示。假设你正在存储从应用程序捕获的、以 JSON 格式记录的订单常规信息。最初，你的表定义可能如下（此示例的功劳归于我的同事 Umachandar
    Jayachandran（我们称他为 UC））：


    ```sql

    CREATE TABLE dbo.Orders(

    order_id int NOT NULL IDENTITY,

    order_info nvarchar(max) NOT NULL

    )

    ```


    现在它可以是这样：


    ```sql

    CREATE TABLE dbo.Orders(

    order_id int NOT NULL IDENTITY,

    order_info json NOT NULL

    )

    ```


    现在，任何描述日志的 JSON 文档都可以原生地直接存储在表中，如下所示：


    ```sql

    INSERT INTO dbo.Orders(order_info)

    VALUES

    (

    ''{

    "OrderNumber": "S043659",

    "Date": "2024-05-24T08:01:00",

    "AccountNumber": "AW29825",

    "Price": 59.99,

    "Quantity": 1}''

    ),

    (

    ''{

    "OrderNumber": "S043661",

    "Date": "2024-05-20T12:20:00",

    "AccountNumber": "AW7365",

    "Price": 24.99,

    "Quantity": 3}''

    )

    ```


    如果你查询这些数据，你将看到类似图 10-2 所示的结果。


    ![](img/496204_2_En_10_Fig2_HTML.jpg)


    图 10-2


    使用新 JSON 数据类型的结果


    现在，你可以使用 JSON 函数从 JSON 格式中提取字段，形成关系型结果，如下列查询所示：


    ```sql

    SELECT o.order_id, JSON_VALUE(o.order_info, ''$.AccountNumber'') AS account_number

    FROM dbo.Orders o;

    ```


    除了帮助构建 JSON 文档外，我们还有两个新的 T-SQL 函数。


    #### JSON_ARRAYAGG


    根据值的聚合生成一个 JSON 数组。基本上，就是获取多行数据并生成一个包含这些值的单一 JSON 数组。例如，基于上述数据的查询：


    ```sql

    SELECT JSON_ARRAYAGG(JSON_ARRAY(o.order_info))

    FROM dbo.Orders o;

    ```


    生成一个单一数组，结果如下：


    ```json

    [[{"OrderNumber":"S043659","Date":"2024-05-24T08:01:00","AccountNumber":"AW29825","Price":59.99,"Quantity":1}],[{"OrderNumber":"S043661","Date":"2024-05-20T12:20:00","AccountNumber":"AW7365","Price":24.99,"Quantity":3}]]

    ```


    #### JSON_OBJECTAGG


    这个函数类似，但在生成作为键/值对的 JSON 文档对象时非常有价值。例如，基于上述数据的查询：


    ```sql

    SELECT JSON_OBJECTAGG(o.order_id:JSON_OBJECT(''AccountNumber'':o.order_info))

    FROM dbo.Orders o;

    ```


    生成如下键/值对：


    ```json

    {"1":{"AccountNumber":{"OrderNumber":"S043659","Date":"2024-05-24T08:01:00","AccountNumber":"AW29825","Price":59.99,"Quantity":1}},"2":{"AccountNumber":{"OrderNumber":"S043661","Date":"2024-05-20T12:20:00","AccountNumber":"AW7365","Price":24.99,"Quantity":3}}}

    ```


    请亲自尝试并访问 [`aka.ms/jsonsql`](https://aka.ms/jsonsql) 了解更多信息。

    '
- fmt: '### RegEx


    SQL Server comes with T-SQL operators such as `LIKE` and a series of T-SQL “string”
    functions. But for years, our community has asked us to provide built into the
    T-SQL language Regular Expressions or RegEx.


    Note

    For a primer on RegEx, I suggest you read this documentation article: [`https://learn.microsoft.com/dotnet/standard/base-types/regular-expression-language-quick-reference`](https://learn.microsoft.com/dotnet/standard/base-types/regular-expression-language-quick-reference).


    I was excited to see us announce this capability in the spring of 2024\. It is
    still under preview as of the writing of this book, so there are no documentation
    references except for the announcement we made in the following blog about this
    new functionality at [`https://devblogs.microsoft.com/azure-sql/introducing-regular-expression-regex-support-in-azure-sql-db`](https://devblogs.microsoft.com/azure-sql/introducing-regular-expression-regex-support-in-azure-sql-db).


    Note

    These examples only work if you are involved in the preview program at the time
    of the writing of this book.


    Here is a good example you can see from the blog:


    ```sql

    -- Create Employees table with some records and check constraints for Email and
    Phone_Number columns

    DROP TABLE IF EXISTS Employees

    CREATE TABLE Employees (

    ID INT IDENTITY(101,1),

    [Name] VARCHAR(150),

    Email VARCHAR(320)

    CHECK (`REGEXP_LIKE`(Email, ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$'')),

    Phone_Number VARCHAR(20)

    CHECK (`REGEXP_LIKE` (Phone_Number, ''^(\d{3})-(\d{3})-(\d{4})$''))

    );

    -- Insert some sample data

    INSERT INTO Employees ([Name], Email, Phone_Number) VALUES

    (''John Doe'', ''john@contoso.com'', ''123-456-7890''),

    (''Alice Smith'', ''alice@fabrikam.com'', ''234-567-8901''),

    (''Bob Johnson'', ''bob@fabrikam.net'',''345-678-9012''),

    (''Eve Jones'', ''eve@contoso.com'', ''456-789-0123''),

    (''Charlie Brown'', ''charlie@contoso.co.in'', ''567-890-1234'');

    -- find all the employees whose email addresses end with .com

    SELECT [Name], Email

    FROM Employees

    WHERE `REGEXP_LIKE`(Email, ''\.com$'');

    ```


    The `REGEXP_LIKE`()` can replace the traditional `LIKE` operator to provide a
    richer pattern matching experience. The result from this query is the one from
    Figure [10-3](#496204_2_En_10_Chapter.xhtml#Fig3).


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig3_HTML.jpg)

    *Figure 10-3: Results from a Regular Expression search*


    Notice also in the `CREATE TABLE` statement the use of `REGEXP_LIKE` to enforce
    the format of a phone number and email.


    ### Spatial and Graph


    Spatial data types have been in the SQL Server for many releases. But I often
    find many users don’t know its existence. Spatial data types are based internally
    on SQLCLR and support the following types of data:

    *   The `geometry` type represents data in a Euclidean (flat) coordinate system.

    *   The `geography` type represents data in a round-earth coordinate system.


    So instead of having to use another product to integrate with SQL, these types
    have spatial intelligence and are built into the engine and T-SQL language.


    These types are *objects*, which means that they contain values and methods to
    use against the values. So, for example, the `geography` type has methods like
    `STDistance` which can be used to find the shortest distance between a point in
    a `geography` instance and a point in another `geography` instance.


    Learn more about all the details of spatial data types for SQL at [`https://aka.ms/sqlspatial`](https://aka.ms/sqlspatial).


    Not every data fits nicely into a relational set of tables. In fact, one data
    pattern is a graph. Consider a network of data with people that like restaurants
    in certain cities. One easy way to represent this data and *traverse* the network
    is with a graph like in Figure [10-4](#496204_2_En_10_Chapter.xhtml#Fig4).


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig4_HTML.jpg)

    *Figure 10-4: A network of data represented as a graph*


    A graph database is a special purpose database to use data represented in this
    fashion. For Azure SQL, we have built graph capabilities into the engine and the
    T-SQL language.


    T-SQL has been extended to define tables as `nodes` and `edges`. In Figure [10-4](#496204_2_En_10_Chapter.xhtml#Fig4),
    `Person`, `City`, and `Restaurant` are node tables. `LivesIn`, `Likes`, `LocatedIn`,
    and `Friends` are edge tables. With this data stored, you can now use a new syntax
    for searching using the `MATCH` keyword like the following example:


    ```sql

    -- Find Restaurants that John likes

    SELECT Restaurant.name

    FROM Person, likes, Restaurant

    WHERE MATCH (Person-(likes)->Restaurant)

    AND Person.name = ''John'';

    ```


    Learn how to get started with graph data at [`https://aka.ms/sqlgraph`](https://aka.ms/sqlgraph).


    ### Columnstore and Memory Optimized


    I mentioned columnstore indexes in Chapter [7](#496204_2_En_7_Chapter.xhtml) of
    the book, but it is absolutely worth repeating because I see this technology so
    underused. Columnstore indexes are nothing short of amazing. I continue to see
    customers who just do not take advantage of this capability. Columnstore index
    can accelerate read query performance by 100x for the right workload. Columnstore
    indexes are supported in every deployment option you choose with Azure SQL. One
    myth about columnstore is that it is *only* an in-memory technology. The truth
    is that columnstore indexes perform best when they fit in memory and use compression,
    so more will fit in your memory limits. However, a columnstore index does not
    have to all fit in memory. One proof point for you on how important this technology
    is. We use columnstore indexes in all of our TPC-H benchmarks ([`https://www.tpc.org/tpch/results/tpch_perf_results5.asp?resulttype=noncluster&version=3`](https://www.tpc.org/tpch/results/tpch_perf_results5.asp%253Fresulttype%253Dnoncluster%2526version%253D3)).
    To get started with columnstore indexes, see the documentation at [`https://aka.ms/sqlcolumnstore`](https://aka.ms/sqlcolumnstore).


    I also mentioned memory-optimized capabilities with In-Memory OLTP in Chapter
    [7](#496204_2_En_7_Chapter.xhtml). This is also worth repeating since there are
    many use cases for this technology, and it is built into the database engine for
    Azure SQL. In-Memory OLTP is surfaced through memory-optimized tables. Memory-optimized
    tables are only available in Business Critical service tiers. However, Hyperscale
    for Azure SQL Database does allow memory-optimized table variables which can be
    useful for stored procedures. Learn more at [`https://aka.ms/sqlmemoryoptimized`](https://aka.ms/sqlmemoryoptimized).


    ### Ledger


    I covered the topic of Ledger, officially known as SQL Ledger, in Chapter [6](#496204_2_En_6_Chapter.xhtml)
    of the book. SQL Ledger allows you to create a table using T-SQL with an additional
    syntax `WITH LEDGER = ON`, and now automatically we will track all changes to
    the table using the technology of temporal tables. We will build a history table
    of your changes and a view that allows you to see the current table along with
    the historical changes. This is different than temporal tables because we also
    include a database ledger and a digest providing you auditing of who made the
    changes and methods to verify the data has been tampered with through crypto hashes.
    Learn more at [`https://aka.ms/sqlledger`](https://aka.ms/sqlledger).'
