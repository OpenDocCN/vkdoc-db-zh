    Enterprise Dev/Test, Pay-As-You-Go Dev/Test, and Monthly Azure Credits for Visual
    Studio subscribers. You can learn about all these options at [`https://azure.microsoft.com/pricing/purchase-options`](https://azure.microsoft.com/pricing/purchase-options).


    Note


    I wrote a blog post covering various ways to save costs with Azure SQL at [`https://www.microsoft.com/en-us/sql-server/blog/2024/02/15/how-sql-developers-can-maximize-savings`](https://www.microsoft.com/en-us/sql-server/blog/2024/02/15/how-sql-developers-can-maximize-savings).


    Azure also has the concept of **Management Groups** which allow you to organize
    and set policies and access to a group of subscriptions in your organization.


    One important security concept in the Azure ecosystem that applies to accounts,
    management groups, and subscriptions is Azure *Policy*. **Azure** **Policy** is
    a system that allows you or your organization to establish policies for management
    groups and subscriptions (or at a lower level like resource groups, which you
    will read about in the section below called “Azure Resource Manager (ARM)”). Example
    policies are built into Azure, and others can be created by you. An example of
    a built-in policy is to require all Azure SQL Databases to enable Transparent
    Data Encryption (TDE). You can read more about Azure policies at [`https://learn.microsoft.com/azure/governance/policy/overview`](https://learn.microsoft.com/azure/governance/policy/overview).'
  trans: '

    # 2. 什么是 Azure SQL？


    “鲍勃，什么是云？” 我清晰地记得，我美丽而才华横溢的妻子金杰有天晚上走进厨房时这样问我。我停顿了一下，准备给出一个精妙而周全的回答，然后说道：“嗯，你看，云就是……”
    十五分钟后（根据金杰的回忆——我觉得才几分钟），金杰礼貌地打断我说：“呃……我想要的是那种简明扼要的答案？” 我愣住了。云是一个如此复杂的话题，并且提供了这么多功能，怎么能用如此简单的东西来定义呢？我不能就此作罢，于是花了几天时间研究一个更简单但仍能定义云的答案。但我也想确保金杰知道“什么是
    Azure？”这个问题的答案。


    结果微软在文档中给出了答案，网址是 `https://azure.microsoft.com/overview/what-is-azure/`。Azure
    被定义为“……一套不断扩展的云服务，帮助您的组织应对业务挑战。它提供了一个广阔、全球性的网络，让您能使用喜爱的工具和框架自由地构建、管理和部署应用程序。”
    我自豪地向妻子展示了这段文字，以为我已经提供了她想要的简单答案。她眼中闪着光芒（她经常这样），说道：“这当然令人印象深刻，但是什么呢？” 还得是我的 CEO，萨提亚·纳德拉来救场。他简单地说道：“Azure
    是世界计算机”（参见他在 Build 2018 主题演讲中的原话，网址：`https://news.microsoft.com/speeches/satya-nadella-build-2018/`）。


    然后我把这句引述给妻子看。她回应道：“对了。我懂了。如果你没有自己的电脑，就用 Azure。直接用云就好了”（也许我们该雇用她）。这就是 Azure 的简而言之。Azure
    定义了并提供了云计算的承诺，包括以下方面：


    *   横向扩展，而非只能纵向扩展

    *   按需增减容量

    *   按使用量付费

    *   大力投入自动化以降低成本


    注意

    微软在 `https://learn.microsoft.com/training/paths/microsoft-azure-fundamentals-describe-cloud-concepts/?WT.mc_id=azureportalcard_Category_overview_-inproduct-azureportal`
    提供了一门关于云计算概念的免费培训课程。您还应该知道，这门课程是您在 `https://learn.microsoft.com/training/browse/?products=azure`
    可以找到的 400 多门免费 Azure 培训课程套件的一部分。


    在定义“什么是 Azure SQL？”之前，我认为让您了解更多 Azure 的基本要素很重要，因为我在本书的其余部分会使用本节中的术语。


    ## Azure 生态系统


    为了正确理解 Azure SQL 的所有要素并完成本书中的示例，了解与 Azure SQL 无关的 Azure 的某些方面至关重要。我称之为 Azure 生态系统。这包括
    Azure 帐户和订阅、Azure 门户和 API 等接口、资源管理、区域以及服务级别协议 (SLA)。本节并非对该主题的全面讨论。我将为您提供足够的信息（附带参考资料），以便您在部署和使用
    Azure SQL 服务时，能够理解 Azure 提供的术语和系统。


    ### Azure 帐户、租户和订阅


    要开始使用 Azure SQL，您需要了解的最基本概念之一是 Azure 帐户。使用 Azure 做任何事情都需要 Azure 帐户。您可能为一家已经基于您的组织为您创建了帐户的公司工作。如果没有，您可以按照
    `https://azure.microsoft.com/free` 上的文档自行创建一个。


    注意

    虽然您可以使用免费试用帐户部署 Azure SQL 资源，但该帐户的额度可能不足以完成本书中的所有示例。好消息是，我们有专门针对 Azure SQL 的免费优惠和试用。


    帐户是用于分配一个或多个订阅所有者或成员的身份。Azure 帐户是 Azure 租户的成员。租户通常由组织创建，并以 Microsoft Entra（前身为
    Azure Active Directory）目录的形式呈现。每个帐户在一个租户中是唯一的，但可以是该租户内多个订阅的成员或所有者。


    订阅用于管理计费和 Azure 资源。在本书中，我不会重点讨论 Azure 中的计费细节，但我会谈论 Azure SQL 服务各种计费方式。您可以在 `https://learn.microsoft.com/azure/cost-management-billing/cost-management-billing-overview`
    阅读更多关于 Azure 管理成本和计费的信息。


    订阅是 Azure 中一个非常重要的概念。Azure 资源和对资源的访问权限是通过订阅管理的。您将在本书中学习如何访问资源和使用 Azure 订阅。在您的组织中，您可能是许多不同订阅的成员，但在每个订阅中拥有不同级别的访问权限。您会发现，某些
    Azure 资源名称在订阅范围内是唯一的（而其他名称在 Azure 资源组范围内是唯一的，或者在整个 Azure 系统中是全局唯一的）。


    订阅还提供了一种在组织内组织资源的便捷方法（例如生产环境与非生产环境）。还有各种订阅优惠，决定了您如何为 Azure 服务付费。最基本的订阅优惠是“即用即付”，这意味着您按月或有时按小时支付订阅中资源的费用。还有其他优惠，包括免费试用、企业协议
    (EA)、云服务提供商 (CSP)、企业开发/测试、即用即付开发/测试以及 Visual Studio 订阅者的每月 Azure 额度。您可以在 `https://azure.microsoft.com/pricing/purchase-options`
    了解所有这些选项。


    注意

    我写了一篇博文，涵盖了通过 Azure SQL 节省成本的各种方法，网址是 `https://www.microsoft.com/en-us/sql-server/blog/2024/02/15/how-sql-developers-can-maximize-savings`。


    Azure 还有一个管理组的概念，它允许您组织和设置策略，并对组织中的一组订阅进行访问控制。


    Azure 生态系统中一个适用于帐户、管理组和订阅的重要安全概念是 Azure Policy。Azure Policy 是一个系统，允许您或您的组织为管理组和订阅（或在更低层级，如资源组，您将在下面名为“Azure
    资源管理器 (ARM)”的部分中读到）制定策略。Azure 中内置了一些策略示例，其他的可以由您创建。一个内置策略的示例是要求所有 Azure SQL 数据库启用透明数据加密
    (TDE)。您可以在 `https://learn.microsoft.com/azure/governance/policy/overview` 阅读更多关于
    Azure Policy 的信息。

