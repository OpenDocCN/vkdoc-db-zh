  trans: '

    # SQL Server 设置


    到目前为止，所有的配置选项都与 SQL Server 无关。此屏幕提供了针对 SQL Server 特定部署的配置选项。如果您熟悉 SQL Server 的安装体验，我们在最新版本中提供了“在安装时配置”的选项。这意味着我们将通常在安装后配置的选项整合到了安装过程本身。我们现在正尝试在
    Azure 虚拟机中提供相同的体验，同时也包含允许为 Azure 进行优化配置的选项。


    让我们更详细地了解这些选项。图 3-14 显示了网络、安全和存储的选择。


    ![](img/496204_2_En_3_Fig14_HTML.jpg)


    图 3-14

    网络、安全和存储的 SQL Server 设置


    注意

    截至撰写本书时，SQL Server Linux 镜像在部署期间不支持 SQL Server 设置。


    ## 网络


    **网络** 提供了如何暴露 SQL Server 实例默认 TCP 端口 1433 的选择。可以将此选择视为使用防火墙。*专用* 意味着虚拟机虚拟网络内的任何
    Azure 源都可以访问此端口。这是默认设置，也是我推荐您使用的选项。*本地* 意味着只允许在虚拟机内部访问。*公共* 意味着 TCP 端口在 Internet
    上暴露。尽管使用公共选项以便您可以通过 SSMS 等工具从笔记本电脑连接到此部署的虚拟机可能很诱人，但我 **不建议** 使用此选项。


    注意

    我第一次使用公共选项在 Azure 虚拟机中部署 SQL Server 时，立即遭到了外部入侵者的攻击，他们尝试使用 `sa` 账户登录并猜测密码。当我在
    `ERRORLOG` 中看到大量的登录失败消息时，我才发现这一点。这几乎是在部署虚拟机后立即发生的。


    ## SQL 身份验证


    **SQL 身份验证** 的选择与为 SQL Server 启用混合模式安全相同。即使默认情况下 `sa` 登录是禁用的，如果您选择启用此选项，系统将提示您输入一个
    SQL 登录名，该登录名将被授予部署的 SQL Server `sysadmin` 权限。


    ## Azure 密钥保管库集成


    **Azure 密钥保管库集成** 是一个您可能想要启用的选项，但别担心，您可以在部署后启用它。Azure 密钥保管库集成可能有助于简化您在诸如透明数据加密
    (`TDE`) 等场景中使用 Azure Key Value。您可以在 `https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/azure-key-vault-integration-configure`
    阅读更多关于 Azure 虚拟机中 SQL Server 与 Azure 密钥保管库集成的信息。


    ## 存储配置


    **存储配置** 可能是您为 Azure 虚拟机中的 SQL Server 所做的最重要选择之一，尤其是对于性能而言。让我们看看您可以做出哪些选择，以及我们如何提供引导式体验来为您的数据库配置存储。


    注意

    目前有一个预览版的新体验可以使用 Azure 高级 SSD v2 存储。我将在本章后面的“最大化存储性能”一节中更多地讨论此选项。


    如果您点击 **更改配置**，您将看到如图 3-15 所示的选项。


    ![](img/496204_2_En_3_Fig15_HTML.jpg)


    图 3-15

    为 Azure 虚拟机中的 SQL Server 配置存储


    此屏幕分为三个部分：(1) 数据库文件存储，(2) 事务日志文件存储，和 (3) `tempdb` 存储。


    对于数据库和事务日志文件，您有位置、托管磁盘类型、磁盘大小类型和磁盘数量的选项。对于数据库，您还可以选择将系统数据库 (`master`、`model` 和
    `msdb`) 从操作系统驱动器移动到放置数据库文件的驱动器。除非您只是做一些基本测试，否则我总是建议：


    *   选择将数据和日志放在单独的驱动器上。

    *   使用高级 SSD 磁盘类型。

    *   选择足够大的磁盘大小类型，以处理您的应用程序 SQL Server I/O 所需的容量、IOPS 和吞吐量。


    高级 SSD 磁盘类型有各种大小，从 4GB (`P1`) 到 32TB (`P80`) 标记为 `P<n>`。IOPS 和吞吐量方面的性能随着尺寸的增大而提高。您可能面临的一个问题是尝试将您需要的
    IOPS 和吞吐量与您的最小尺寸要求对齐。这可能需要您 *超额配置* 尺寸（或多个磁盘）以获得所需的性能（如前所述，有一个名为高级 SSD v2 的新磁盘类型正在预览中，可以帮助解决此问题；您将在本章后面的“最大化存储性能”一节中了解它）。您可以在
    `https://learn.microsoft.com/azure/virtual-machines/disks-types#premium-ssds`
    阅读更多关于各种高级 SSD 磁盘类型的信息。


    对于 `tempdb`，请注意建议将其放置在本地 SSD 驱动器上，并建议数据和日志的文件数量和大小，这与 SQL Server 当前的安装程序非常相似。


    请注意屏幕底部的警告。它说配置的磁盘的性能向量超出了虚拟机大小的支持范围。这是一个重要的警告，因为它意味着您选择的虚拟机大小不支持足够的 IOPS 和/或吞吐量，即使您选择了满足您要求的存储。当它发生时，这是一个很难检测到的问题，因此现在正确设置虚拟机大小以满足您的存储性能要求非常重要。您需要先返回到“基础”屏幕更改虚拟机大小，然后返回此屏幕以确保警告消失。


    ## SQL Server 实例设置


    在存储配置下方是能够更改 **SQL Server 实例设置**，如图 3-16 所示。


    ![](img/496204_2_En_3_Fig16_HTML.jpg)


    图 3-16

    选择 SQL Server 实例设置


    单击 **更改 SQL 实例设置**，您将获得如图 3-17 的屏幕。


    ![](img/496204_2_En_3_Fig17_HTML.jpg)


    图 3-17

    SQL Server 设置的附加选项


    在此屏幕上，您可以看到在 SQL Server 安装过程中可以选择的各种选项（请记住，当您使用门户在 Azure 虚拟机中部署 SQL Server 时，我们会自动为您运行安装程序以安装所有内容！），例如服务器排序规则、`MAXDOP`、最大和最小内存，以及针对即席工作负载进行优化的设置。此外，我们还为您提供了两个流行的性能优化选项：**在内存中锁定页面**
    和 **即时文件初始化**。您可以在部署后配置所有这些，但现在有机会进行设置可以节省您的时间和精力。


    选择 **确定** 后，您还有其他选择，如图 3-18 所示。


    ![](img/496204_2_En_3_Fig18_HTML.jpg)


    图 3-18

    附加的 SQL Server 设置


    ## SQL Server 许可证


    **SQL Server 许可证** 允许您证明您拥有现有的 SQL Server 许可证，可以将其用于 Azure 混合权益 (`AHB`)，就像 Windows
    的选择一样。在将 SQL Server 用于 Azure 虚拟机时，这可以为您节省大量成本。


    注意

    如果您没有看到此选项可用，那是因为您选择了无法应用或已经选择了此选项的 SQL Server 镜像选择。例如，标题以 `BYOL`（这意味着自带许可证）开头的镜像已经意味着您只是在使用我们自己的许可证。开发人员版是免费的，因此不适用许可证。

    '
- fmt: '

    我们还在2019年宣布了针对使用Azure虚拟机时的高可用性和灾难恢复场景的新许可权益。您可以在[`https://cloudblogs.microsoft.com/sqlserver/2019/10/30/new-high-availability-and-disaster-recovery-benefits-for-sql-server/`](https://cloudblogs.microsoft.com/sqlserver/2019/10/30/new-high-availability-and-disaster-recovery-benefits-for-sql-server/)阅读更多信息。


    `Automated patching`提供了针对何时部署Windows和SQL Server重要和关键更新的特定配置。Windows和SQL Server的其他更新将取决于您如何在虚拟机内部配置Windows
    Update。正如我之前提到的，有一个名为Azure Update Manager的新选项您应该考虑，因为它允许您为Windows Server和SQL Server应用非关键更新。我将在本章后面标题为“配置”的部分更详细地描述此功能。


    `Automated backup`使用作为SQL Server 2016一部分发布的托管备份到Azure功能。您的需求可能有所不同，但许多用户可能会发现此选项对于为SQL
    Server提供简单的自动化备份解决方案非常有用。启用此选项后，您有多个选择来配置如何执行备份。


    注意

    自动修补和自动备份选项可能在部署后不会立即显示为已启用。SQL IaaS扩展在部署后在后台运行。


    `R Services (Advanced Analytics)`是一个选项，用于在部署时安装SQL Server机器学习服务功能。我将在下一节“部署！”中描述通过SQL
    Server库映像安装的内容。


    点击`Next: Tags >`查看最后一个选项。


    ## Tags


    在部署虚拟机之前的最后一个选项是可能使用一个`tag`，如图[3-19](#496204_2_En_3_Chapter.xhtml#Fig19)所示。标签是Azure生态系统支持的一个概念，用于将字符串值分配给Azure中的资源，例如虚拟机，以组织您的资源。


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig19_HTML.jpg)


    图3-19


    为Azure资源分配标签


    点击`Next: Review + create >`以验证和部署虚拟机。


    ## Deploy!


    门户将获取您的所有选项，执行验证步骤，然后向您提供创建虚拟机的能力。图[3-20](#496204_2_En_3_Chapter.xhtml#Fig20)显示了在您点击创建之前最终验证屏幕上的一些有趣信息。


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig20_HTML.jpg)


    图3-20


    创建虚拟机前的验证


    在此屏幕顶部，您可以看到您选择的虚拟机大小以及每小时的估计成本。另请注意`Terms of use`和`Privacy policy`。随SQL Server提供的最终用户许可协议（EULA）仍然适用于Azure虚拟机，因为这是一个完全许可的SQL
    Server。但是，由于您在Azure中部署虚拟机，有一些条款和隐私政策您应该审阅。您可以在[`https://azure.microsoft.com/support/legal`](https://azure.microsoft.com/support/legal)阅读更多关于Azure使用条款的信息。隐私是一个非常重要的话题，由于Microsoft在云中托管您的虚拟机，您需要了解Microsoft收集的所有信息的详细信息。在[`https://privacy.microsoft.com/privacystatement`](https://privacy.microsoft.com/privacystatement)阅读更多。您对操作系统和/或SQL
    Server的库映像的使用也有称为Azure Marketplace条款的条款。您可以在[`https://azure.microsoft.com/support/legal/marketplace-terms/`](https://azure.microsoft.com/support/legal/marketplace-terms/)阅读更多信息。


    您还会在此屏幕上注意到关于允许RDP端口暴露于互联网的警告。您将在下面标题为“连接到您的虚拟机”的部分了解更多关于如何控制访问和限制任何问题的信息。如果您在此屏幕上向下滚动，您将看到您选择部署虚拟机的所有选项的详细信息。另请注意屏幕底部的`Download
    a template for automation`选项。我将在本章后面标题为“使用CLI与ARM模板、Bison和Terraform”的部分讨论使用模板进行自动化。


    点击`Create`按钮准备启动！虚拟机的部署是异步的，因此您甚至可以退出门户，部署在后台完成。但是，如果您保持门户屏幕打开，您可以实时跟踪进度。在点击创建后几秒钟内，我的屏幕如图[3-21](#496204_2_En_3_Chapter.xhtml#Fig21)所示，以跟踪部署进度。


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig21_HTML.jpg)


    图3-21


    Azure虚拟机部署进行中


    不仅主屏幕在虚拟机创建时刷新，您还可以点击门户标题栏上的`Notifications`图标来跟踪进度。在我的示例中，大约十分钟后部署完成。图[3-22](#496204_2_En_3_Chapter.xhtml#Fig22)显示了所有详细信息，包括来自`Notifications`图标的状态。


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig22_HTML.jpg)


    图3-22


    Azure虚拟机中SQL Server的部署完成


    您会注意到对于部署详细信息，部署的不仅是一个虚拟机，而是许多不同的资源，包括网络接口、磁盘、存储帐户、虚拟网络和安全性组。如果您想要更多关于部署的详细信息，可以点击`More
    events in the Activity Log`。


    如果您点击`Go to resource`，您将看到虚拟机的概述屏幕。从SQL Server的角度，还有另一个视图我稍后将介绍。让我们参观一下如何导航Azure虚拟机的`overview`屏幕。

    '
  raw: 'We also announced in 2019 new licensing benefits for HA and DR scenarios when
    using Azure Virtual Machine. You can read more at [`https://cloudblogs.microsoft.com/sqlserver/2019/10/30/new-high-availability-and-disaster-recovery-benefits-for-sql-server/`](https://cloudblogs.microsoft.com/sqlserver/2019/10/30/new-high-availability-and-disaster-recovery-benefits-for-sql-server/).


    **Automated patching** provides specific configurations on when to deploy important
    and critical updates for Windows and SQL Server. Other updates for Windows and
    SQL Server will depend on how you configure Windows Update inside the VM. As I
    mentioned earlier, there is a new option called Azure Update Manager you should
    consider because it allows you to apply even noncritical updates for both Windows
    Server and SQL Server. I’ll describe this capability more in the section titled
    “Configuration” later in this chapter.


    **Automated backup** uses the managed backups to Azure capability that was shipped
    as part of SQL Server 2016. Your needs may vary, but many users might find this
    option very useful to provide a simple automated backup solution for SQL Server.
    When you enable this option, you have several choices to configure how backups
    are executed.


    Note


    Automated patching and automated backup options may not show up as enabled immediately
    after deployment. The SQL IaaS extension runs in the background after deployment.


    **R Services (Advanced Analytics)** is an option to install the SQL Server Machine
    Learning services feature as part of deployment. I will describe in the next section
    called “Deploy!” what exactly is installed with the SQL Server gallery image.


    Click **Next: Tags >** to see the last option.


    #### Tags


    The last option before you deploy your virtual machine is to potentially use a
    *tag* as seen in Figure [3-19](#496204_2_En_3_Chapter.xhtml#Fig19). Tags are a
    concept supported by the Azure ecosystem to assign a string value to a resource
    in Azure, like a virtual machine, to organize your resources.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig19_HTML.jpg)


    Figure 3-19


    Assigning tags to an Azure resource


    Click **Next: Review + create >** to validate and deploy the virtual machine.


    ### Deploy!


    The portal will take all your options, perform validation steps, and then present
    you the ability to create the virtual machine. Figure [3-20](#496204_2_En_3_Chapter.xhtml#Fig20)
    shows some interesting information on the final validation screen before you click
    Create.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig20_HTML.jpg)


    Figure 3-20


    Validation before creating the virtual machine


    At the top of this screen, you can see the size of the VM you chose plus estimated
    costs per hour. Also, notice *Terms of use* and *Privacy policy*. The End User
    Licensing Agreement (EULA) that comes with SQL Server still applies to Azure Virtual
    Machine since this is a fully licensed SQL Server. However, since you are deploying
    the virtual machine in Azure, there are terms and privacy policies you should
    review. You can read more about Azure terms of use at [`https://azure.microsoft.com/support/legal`](https://azure.microsoft.com/support/legal).
    Privacy is a very important topic, and since Microsoft is hosting your virtual
    machine in the cloud, you need to understand all the details of what information
    Microsoft collects. Read more at [`https://privacy.microsoft.com/privacystatement`](https://privacy.microsoft.com/privacystatement).
    Your usage of a gallery image for the operating system and/or SQL Server also
    has terms called Azure Marketplace Terms. You can read more at [`https://azure.microsoft.com/support/legal/marketplace-terms/`](https://azure.microsoft.com/support/legal/marketplace-terms/).


    You will also notice on this screen a warning about allowing the RDP port to be
    exposed to the Internet. You will learn more about how to control access and limit
    any issues in the section below titled “Connecting to Your VM.” If you scroll
    down on this screen, you will see all the details of the options you chose to
    deploy the virtual machine. Notice also at the bottom of the screen the option
    to **Download a template for automation**. I will discuss using an option for
    automation with a template in a section later in this chapter called “Using a
    CLI with ARM Templates, Bison, and Terraform.”


    Click the **Create** button when you are ready to launch! The deployment of the
    virtual machine is asynchronous, so you can even exit the portal, and the deployment
    is done in the background. However, if you leave the portal screen open, you can
    track progress live. Within seconds of clicking create, my screen looks like Figure
    [3-21](#496204_2_En_3_Chapter.xhtml#Fig21) to track the progress of the deployment.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig21_HTML.jpg)


    Figure 3-21


    Azure Virtual Machine deployment in progress


    Not only does the main screen refresh as the virtual machine is being created,
    but you can click the Notifications icon on the title bar of the portal to also
    track progress. In my example, in about ten minutes my deployment was complete.
    Figure [3-22](#496204_2_En_3_Chapter.xhtml#Fig22) shows all the details, including
    status from the Notifications icon.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig22_HTML.jpg)


    Figure 3-22


    Deployment complete for SQL Server in Azure Virtual Machine


    You will notice for Deployment details that it is not just a virtual machine deployed
    but many different resources, including network interfaces, disks, storage accounts,
    virtual networks, and security groups. If you want more details about the deployment,
    you can click **More events in the Activity Log**.


    If you click **Go to resource**, you will be presented with the overview screen
    for the virtual machine. There is another view of this virtual machine from a
    SQL Server perspective I’ll cover later. Let’s take a tour on how to navigate
    the *overview* screen for an Azure Virtual Machine.'
