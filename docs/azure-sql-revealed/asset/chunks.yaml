  trans: '

    # 6. 保障 Azure SQL 的安全


    既然您已经部署并配置了 Azure SQL 托管实例或数据库，您会希望确保自己采取了所有正确的措施来全面保障 Azure SQL 部署的安全。Azure SQL
    不仅具备 SQL Server 所附带的所有安全功能，还提供了更多。


    我的同事 Anna Hoffman 曾问我，为何我一直将安全性、性能和可用性称为 SQL Server 和 Azure SQL 的*主食*。这个说法并非我的原创。它源自我长期以来的同事、著名的
    Conor Cunningham。Conor 和我曾在 PASS Summit 主旨演讲中一起做过几次演示。有一次，我考虑做一些相当前沿的演示，Conor
    阻止了我说：“Bob，演示固然不错，但我们的客户期望你我展示引擎的核心创新。比如安全性、性能和可用性。你知道的，这些才是 SQL Server 的主食。”从那以后，这个说法就一直沿用下来。哦，顺便说一句，我仍然会尝试构建那些前沿的演示。


    **注意**


    对于不了解这个短语的人，它是我们德克萨斯州常用的说法，意指某件事物的基础或核心。一顿基本的饭包括肉和土豆。这对我不是问题，因为我两者都爱。


    在本章中，我们将探讨您通常用于保护 SQL Server 的所有功能，并将其与 Azure SQL 进行比较。您还将学习用于保障 Azure SQL 托管实例和数据库部署安全的独特能力和方法。


    本章按以下安全类别组织：


    ## 网络安全


    在本节中，了解通过各种网络选项（包括防火墙、虚拟网络和专用终结点）提供最安全连接的几种方法。


    ## 身份验证与访问


    在本节中，您将学习提供身份验证和访问的最安全方法，包括基于 Azure 角色的访问控制 (RBAC)、Microsoft Entra、行级安全和 Microsoft
    Purview。


    ## 数据保护


    在本节中，您将学习如何保护您的数据，包括加密方法、数据屏蔽和账本（SQL 内部的一种区块链）。


    ## 安全管理


    在本节中，您将了解审核、Microsoft Defender 和数据分类等概念。


    在讨论安全性时，我将使用本书第 4 章中所做的部署。要试用我在本章中使用的任何技术或命令，您将需要：


    *   一个 Azure 订阅。

    *   对该 Azure 订阅至少具有“参与者”角色访问权限。您可以在 [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles)
    详细了解 Azure 内置角色。

    *   访问 Azure 门户。

    *   部署一个与我在第 4 章中所做类似的 Azure SQL 托管实例和一个 Azure SQL 数据库。

    *   要连接到托管实例，您将需要一个 Azure 中的 `jumpbox` 或虚拟机来进行连接。我在本书第 4 章中展示了如何操作。一个简单的方法是创建一个新的
    Azure 虚拟机，并将其部署到与托管实例相同的虚拟网络中（您将使用与托管实例不同的子网）。

    *   要连接到 Azure SQL 数据库，您可以使用防火墙规则从本地客户端连接，但本章还展示了如何在虚拟网络中使用专用终结点（并结合 Microsoft
    Entra 托管标识）进行连接，因此您需要一个 Azure 虚拟机。在我的示例中，我将使用本书第 3 章中创建的名为 `bwsql2022` 的虚拟机。

    *   安装 `az` CLI（有关更多详细信息，请参阅 [`https://learn.microsoft.com/cli/azure/install-azure-cli`](https://learn.microsoft.com/cli/azure/install-azure-cli)）。您也可以使用
    Azure Cloud Shell，因为其中已预装 az。您可以在 [`https://azure.microsoft.com/features/cloud-shell/`](https://azure.microsoft.com/features/cloud-shell/)
    详细了解 Azure Cloud Shell。

    *   您将在本章中运行一些 T-SQL，因此请安装一个工具，如 SQL Server Management Studio (SSMS)，下载地址为 [`https://aka.ms/ssms`](https://aka.ms/ssms)。


    ## 网络安全


    大多数安装 SQL Server 的管理员都使用公司基础设施内的私有网络。防火墙会阻止该网络内的传入流量。此外，操作系统提供防火墙来保护 SQL Server
    等应用程序的端口。事实上，如果您之前安装过 SQL Server，您会知道默认情况下，Windows 和 Linux 上的 1433 端口防火墙都是阻止的。您通常必须采取操作，为远程连接到
    SQL Server 的此端口添加一个例外。


    Azure SQL 也不例外，不同之处在于您可以选择允许连接到其后的 SQL Server 实例，既可以作为互联网上的公共终结点，也可以作为虚拟网络内的私有终结点。


    在您阅读本章此部分信息时，我需要向您坦言：您绝对应该咨询您所在组织的网络专家，以根据您所需的要求来配置 Azure SQL 托管实例或数据库。


    ### Azure SQL 托管实例网络安全


    正如您在第 4 章部署 Azure SQL 托管实例时所见，虚拟网络、公共终结点和私有连接已内置于托管实例体验中。


    图 6-1（直接来自文档 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/connectivity-architecture-overview?view=azuresql#communication-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/connectivity-architecture-overview?view=azuresql#communication-overview)）很好地可视化了连接选项。


    ![](img/496204_2_En_6_Fig1_HTML.jpg)


    图 6-1：Azure SQL 托管实例的网络连接选项


    让我们更详细地探讨这些选项中的每一个。


    ### 公共终结点


    您可以为 Azure SQL 托管实例启用公共终结点，但这是最不安全的方式。这种方法的最大优点是，任何 SQL 客户端只需很少的配置即可连接到该终结点。如果您决定这样做，该终结点位于端口
    3342 上（此端口无法更改，不是 1433）。此外，您可以使用网络安全组 (`NSG`) 规则来有效地在该端口上设置防火墙。请阅读 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/public-endpoint-configure`](https://learn.microsoft.com/azure/azure-sql/managed-instance/public-endpoint-configure)
    以获取更多信息。

    '
- fmt: '### VNet-Local Endpoint


    这是连接托管实例最常见的选项。我向你展示过我首选的一种方法：在与托管实例相同的虚拟网络中（但位于不同的子网），设置一台Azure虚拟机（或云应用程序）。这是我在第[4](#496204_2_En_4_Chapter.xhtml)章中用于跳板机的示例。


    但是，也可以使用Azure内部或外部的另一虚拟网络进行连接。**VNet 对等互连**允许你从已与另一虚拟网络对等互连的虚拟网络中的资源进行连接。请查看此博客文章，了解如何通过VNet对等互连连接到托管实例：
    [`https://techcommunity.microsoft.com/t5/azure-database-support-blog/connect-to-azure-sql-database-managed-instance-with-virtual/ba-p/369077`](https://techcommunity.microsoft.com/t5/azure-database-support-blog/connect-to-azure-sql-database-managed-instance-with-virtual/ba-p/369077)。你可以在
    [`https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-peering-overview`](https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-peering-overview)
    阅读更多关于虚拟网络对等互连的内容。虚拟网络对等互连可以在同一区域内或跨区域进行。


    如果你想从本地连接到托管实例，则需要使用**Azure 虚拟网络网关**。有几种选项可以将本地环境与虚拟网络网关连接：点到站点 (P2S)、站点到站点 (S2S)
    和 ExpressRoute。ExpressRoute 绝对是通过网关连接最快（但也是最昂贵）的方式。你可以在 [`https://learn.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-about-vpngateways`](https://learn.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-about-vpngateways)
    了解所有这些网关选项。正如我在本章前面提到的，如果网络不是你的专长（也不是我的），那么我会建议咨询你所在组织的网络工程师以选择最佳方案。


    ### Private Endpoint


    最安全的连接选项是专用端点。专用端点可在服务与多个虚拟网络之间建立安全、隔离的连接，而无需暴露服务的整个网络基础设施。我喜欢文档中的类比：“...就像将一根物理网络电缆从运行
    Azure SQL 托管实例的计算机延伸到另一个虚拟网络。”


    设置这个需要多一点配置，并且存在一些限制，例如不能将其用于故障转移组、分布式事务和托管实例链接。


    你可以在 Azure 门户中，通过托管实例的“安全”部分下的“专用端点连接”选项来设置专用链接。请参阅完整的步骤： [`https://learn.microsoft.com/azure/azure-sql/managed-instance/private-endpoint-overview?view=azuresql&tabs=separate-vnets#create-a-private-endpoint-in-a-virtual-network`](https://learn.microsoft.com/azure/azure-sql/managed-instance/private-endpoint-overview?view=azuresql&tabs=separate-vnets#create-a-private-endpoint-in-a-virtual-network)。


    我将在本章下一节关于 Azure SQL 数据库的部分，详细介绍如何使用专用端点的示例。


    ### Other Considerations


    重要的是要知道，除了 SQL Server 端点（用于连接和运行查询的标准 TCP 端口）外，Azure SQL 托管实例还有一个*管理端点*。由于托管实例部署在其自己的虚拟集群中，集群外但在
    Azure 内的各种服务（例如 Resource Manager 中的部署）必须能够访问该集群。这种访问是通过管理端点进行的。管理端点是一个受防火墙保护的公共端点。这意味着当你使用门户或
    CLI 来管理托管实例（例如，缩放操作）时，你正在连接到此端点。请阅读有关管理端点如何受保护的更多信息： [`https://docs.microsoft.com/en-us/azure/azure-sql/managed-instance/connectivity-architecture-overview#management-endpoint`](https://docs.microsoft.com/en-us/azure/azure-sql/managed-instance/connectivity-architecture-overview#management-endpoint)。


    我在第[4](#496204_2_En_4_Chapter.xhtml)章部署期间展示了连接类型`Proxy`与`Redirect`。即使 SQL Server
    端点位于私有虚拟网络中，从技术上讲，`Proxy`连接更安全，因为所有流量都通过*网关*路由。使用`Redirect`连接时，连接首先建立到网关，然后所有后续流量直接发送到托管实例节点。`Redirect`可以快得多，并且由于使用了专用端点，我推荐此选项。任何公共端点的使用都始终使用代理连接。你可以在
    [`https://docs.microsoft.com/en-us/azure/azure-sql/database/connectivity-architecture#connection-policy`](https://docs.microsoft.com/en-us/azure/azure-sql/database/connectivity-architecture#connection-policy)
    了解有关这些策略的更多信息。


    ### Azure SQL Database Network Security


    Azure SQL 数据库（任何部署选项）的网络安全与托管实例有点不同，因为当你部署数据库时，我们没有专用的私有虚拟集群。相反，所有数据库部署都共享 Azure
    区域中的虚拟集群（环）。请记住，当我谈到这些网络安全选项时，它们适用于所有数据库的逻辑服务器。此规则的唯一例外是，你可以配置特定于数据库的防火墙规则，该规则与逻辑服务器不同。


    这并不意味着你无法受到保护，因为你可以在你的数据库部署上拥有一个专用端点，正如你将在本章本节中看到的那样。'
  raw: '#### VNet-Local Endpoint


    This is the most common option to connect to Managed Instance. I showed you one
    method I prefer is to set up an Azure Virtual Machine (or it could be a cloud
    application) in the same virtual network as the Managed Instance but in a different
    subnet. This was the example I used in Chapter [4](#496204_2_En_4_Chapter.xhtml)
    to use a jumpbox.


    However, it is also possible to connect using a different virtual network, inside
    or outside of Azure. **VNet peering** allows you to connect from a resource in
    one virtual network that is peered to another. Check out this blog post for instructions
    to connect to a Managed Instance with VNet peering: [`https://techcommunity.microsoft.com/t5/azure-database-support-blog/connect-to-azure-sql-database-managed-instance-with-virtual/ba-p/369077`](https://techcommunity.microsoft.com/t5/azure-database-support-blog/connect-to-azure-sql-database-managed-instance-with-virtual/ba-p/369077).
    You can read more about virtual network peering at [`https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-peering-overview`](https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-peering-overview).
    Virtual network peering can occur within a region or across regions.


    If you would like to connect to the Managed Instance from on-premises, you will
    need to use an **Azure Virtual Network Gateway**. There are several options to
    connect your on-premises environment with a virtual network gateway: Point-to-Site
    (P2S), Site-to-Site (S2S), and ExpressRoute. ExpressRoute is by far the fastest
    (but the most expensive) way to connect with a gateway. You can learn about all
    of these gateway options at [`https://learn.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-about-vpngateways`](https://learn.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-about-vpngateways).
    As I’ve said earlier in this chapter, if networking is not your area of expertise
    (it is not mine), then I would consult networking engineers in your organization
    on the best option.


    #### Private Endpoint


    The most secure option to connect is a private endpoint. Private endpoints establish
    secure, isolated connectivity between a service and multiple virtual networks
    without exposing your service’s entire network infrastructure. I like the documentation’s
    analogy when it says “…is like extending a physical network cable from a computer
    running Azure SQL Managed Instance to another virtual network.”


    There is a bit more configuration to set this up, and there are some limitations
    such as you cannot use this for failover groups, distributed transactions, and
    Managed Instance link.


    You can set up a private link using the Private endpoint connections option in
    the Service Menu under Security in the context of the Azure SQL Managed Instance
    in the Azure Portal. See the complete steps at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/private-endpoint-overview?view=azuresql&tabs=separate-vnets#create-a-private-endpoint-in-a-virtual-network`](https://learn.microsoft.com/azure/azure-sql/managed-instance/private-endpoint-overview?view=azuresql&tabs=separate-vnets#create-a-private-endpoint-in-a-virtual-network).


    I’ll walk through a detailed example of how to use a private endpoint in the next
    section of the chapter for Azure SQL Database.


    #### Other Considerations


    It is important to know that besides the SQL Server endpoint (the standard TCP
    port to connect and run queries), an Azure SQL Managed Instance has a *management
    endpoint*. Since a Managed Instance is deployed in its own virtual cluster, various
    services outside the cluster but within Azure (such as deployment within Resource
    Manager) must be able to access the cluster. That access is through the management
    endpoint. The management endpoint is a public endpoint protected by firewalls.
    This means when you use the portal or CLIs to manage the Managed Instance (e.g.,
    scaling operations), you are connecting to this endpoint. Read more about how
    the management endpoint is protected at [`https://docs.microsoft.com/en-us/azure/azure-sql/managed-instance/connectivity-architecture-overview#management-endpoint`](https://docs.microsoft.com/en-us/azure/azure-sql/managed-instance/connectivity-architecture-overview#management-endpoint).


    I showed during deployment in Chapter [4](#496204_2_En_4_Chapter.xhtml) the connection
    type of Proxy vs. Redirect. Even though the SQL Server endpoint is in a private
    virtual network, technically a Proxy connection is more secure because all traffic
    is routed through a *gateway*. With a redirect connection, the connection is first
    made to the gateway, and then all subsequent traffic goes directly to the Managed
    Instance node. Redirect can be much faster, and since a private endpoint is being
    used, I recommend this option. Any use of a public endpoint always uses a proxy
    connection. You can learn more about these policies at [`https://docs.microsoft.com/en-us/azure/azure-sql/database/connectivity-architecture#connection-policy`](https://docs.microsoft.com/en-us/azure/azure-sql/database/connectivity-architecture#connection-policy).


    ### Azure SQL Database Network Security


    Network security for Azure SQL Database (any deployment option) is a bit different
    than Managed Instance because when you deploy a database, we do not have a dedicated
    private virtual cluster. Rather, all database deployments share virtual clusters
    (rings) in Azure regions. Remember that when I talk about these network security
    options, they apply to the logical server for all databases. The only exception
    to this rule is that you can configure firewall rules specific to a database different
    than the logical server.


    This doesn’t mean you can’t be protected because you can have a private endpoint
    to your database deployment as you will see in this section of the chapter.'
