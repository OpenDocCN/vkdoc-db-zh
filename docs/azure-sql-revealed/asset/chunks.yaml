    \ number and size of files, tempdb size, and tempdb configuration options.\n\n\
    In Azure SQL Database, tempdb files are always automatically stored on local SSD\
    \ drives, so I/O performance should not be an issue.\n\nSQL Server professionals\
    \ often use more than one database file to partition allocations for tempdb tables.\
