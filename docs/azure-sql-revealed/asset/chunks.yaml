  trans: '

    ### 通用型可用性


    我在本书中多次描述了通用型（GP）服务层级的整体概念。您的数据库存储在 `Azure Storage` 上，而 `tempdb` 则存储在本地的 `SSD`
    存储上。让我们用一张图来详细描述通用型架构以及可用性和故障转移的工作原理。（这些图基于文档 [`https://learn.microsoft.com/azure/azure-sql/database/high-availability-sla-local-zone-redundancy?view=azuresql&tabs=azure-powershell#basic-standard-and-general-purpose-service-tier-availability`](https://learn.microsoft.com/azure/azure-sql/database/high-availability-sla-local-zone-redundancy?view=azuresql&tabs=azure-powershell#basic-standard-and-general-purpose-service-tier-availability)
    中的示意图。）


    图 8-8 展示了 GP 可用性的架构。


    ![](img/496204_2_En_8_Fig8_HTML.jpg)


    图 8-8


    通用型服务层级可用性


    应用程序将通过 Azure 区域内控制环中的 `gateways`（网关）连接到主副本（对于通用型，只有一个副本）。如果您还记得，我们在本书第 4 章和第
    6 章讨论过网关的 `proxy`（代理）和 `redirect`（重定向）连接类型。无论哪种情况，`gateways` 都为应用程序提供了一个连接抽象层。请注意，部署的本地
    `SSD` 存储是 `tempdb` 的存储位置。


    数据库和事务日志文件被放置在使用 `LRS`（本地冗余存储）的 `Azure Premium Storage` 上。这意味着您的数据库和事务日志文件会在数据中心物理位置内复制三份。


    正如本章前面所述，您的备份文件存储在一个不同的存储位置，并支持 `LRS`、`ZRS` 和 `GRS` 等冗余选项。


    注意


    即使部署不是区域冗余的，Azure SQL 托管实例也支持 GP 服务层级的 `geo-zone-redundant`（地域区域冗余）备份。


    Azure SQL 部署与 `Service Fabric (SF)` 集成，以检测问题（例如节点故障），并在必要时启动 `failover`（故障转移）。如果需要故障转移，系统将找到一个具有足够容量的新节点来承载您的部署。


    新节点的本地存储托管 `SQL Server`，包括 `tempdb`。新的 `SQL Server` 将被定向到您位于 `Azure Storage` 上的数据库和日志文件。这种架构类型与
    `SQL Server` 的 `FCI`（故障转移群集实例）工作方式非常相似。您的停机时间取决于我们找到具有足够容量的新节点来承载您的部署选择（`vCores`
    等）的速度。此外，新节点上托管您数据库的 `SQL Server` 刚刚启动，其缓冲池和计划缓存都是冷的，因此正常的启动活动会影响您的性能（但由于我们使用了
    `Accelerated Database Recovery`（加速数据库恢复），数据库恢复将极其迅速）。


    您可能想知道故障转移后应用程序如何连接到新节点？答案就是 `gateways`。应用程序无需更改任何名称来连接新节点。`gateways` 负责处理该逻辑。应用程序只需简单地重试连接，即可继续运行。


    ### 业务关键型可用性


    业务关键型（BC）部署依赖于本地存储和一系列副本，非常类似于 `Always On 可用性组 (AG)`。让我们将 BC 架构与通用型进行比较。图 8-9
    展示了一个具有可用性的 BC 部署架构。


    ![](img/496204_2_En_8_Fig9_HTML.jpg)


    图 8-9


    业务关键型服务层级可用性


    从图中可以看出，`gateways` 仍然是连接的重要组成部分，并且存在一个主副本。本地存储不仅用于 `tempdb`，也用于数据库和日志文件。此外，与 `Always
    On 可用性组` 类似，存在辅助副本。对于 BC 部署，我们始终保持四个副本处于运行状态（一个主副本和三个辅助副本）。从事务的角度来看，在*至少一个*辅助副本确认更改已固化之前，主副本上的提交无法进行。


    您还可以看到，备份文件存储在 `Azure Storage` 中，支持如本章前面所述的冗余选项。


    注意


    即使部署不是区域冗余的，Azure SQL 托管实例也支持 BC 服务层级的 `geo-zone-redundant`（地域区域冗余）备份。


    如果需要进行故障转移，我们只需选择一个已同步的辅助副本，使其成为主副本，就像 `AG` 一样。与通用型相比，停机时间显著减少，因为新的主副本只需运行撤销恢复即可变为可用。由于启用了
    `Accelerated Database Recovery (ADR)`（加速数据库恢复），撤销恢复可以非常快。我将在本章后面详细讨论 `ADR` 的重要性。如果旧的主副本不可用，我们将需要启动一个新的辅助副本（并同步它）以保持四个可用副本。


    与通用型服务层级一样，由于使用了 `gateways`，应用程序只需重新连接即可重新开始运行。此外，作为使用 BC 的每月免费福利的一部分，BC 部署将允许您使用*一个*辅助副本作为
    `read-only replica`（只读副本）。我们的 `gateways` 有助于提供重定向逻辑。您只需确保应用程序提供了正确的 “`read intent`”（读取意向）选项。您可以在
    [`https://learn.microsoft.com/azure/azure-sql/database/read-scale-out`](https://learn.microsoft.com/azure/azure-sql/database/read-scale-out)
    了解更多信息。


    注意


    读取横向扩展支持会话级别的一致性。这意味着，如果 `read-only`（只读）会话在由于副本不可用导致的连接错误后重新连接，它可能会被重定向到一个与 `read-write`（读写）副本不是
    100% 同步的副本。同样，如果应用程序使用 `read-write` 会话写入数据，并立即使用 `read-only` 会话读取它，则最新更新可能不会立即在该副本上可见（延迟从毫秒到个位数秒不等）。这种延迟是由异步事务日志重做操作引起的。


    让我们看一个示例，您可以测试 `Azure SQL Database` 的内置可用性和故障转移场景。在此示例中，我使用本书中一直在使用的同一逻辑服务器 `bwsqllogicalserver`，部署了一个新的业务关键型服务层级数据库
    `bwsqlbc`。该数据库使用示例 `AdventureWorksLT` 部署，并使用 2 个 `vCores`。


    要尝试此示例，您还需要本章开头前提条件中描述的、我在前面章节中使用过的 `ostress.exe` 程序。您将在此练习中使用 `Azure PowerShell`，我在
    `ch8_availability` 文件夹中也提供了您将用到的脚本。


    您可以使用任何需要的客户端。对我来说，我将使用我自己的笔记本电脑，因为我想使用带有 `MFA` 的 Microsoft 帐户通过 Azure 进行身份验证：


    1.  **使用 PowerShell 登录 Azure 并设置订阅上下文。** 我首先必须使用以下命令通过 `PowerShell` 登录 Azure：


    ```

    Connect-AzAccount

    ```

    '
- fmt: '## Failover Test


    This prompts me for MFA which is required at Microsoft. I also get a list of subscriptions
    to set as the context. Choose the right number and hit enter.


    1.  Edit the scripts to prepare for the test.


    Edit the script `querybase_bc.cmd` to put in your server, database, login, and
    password. Edit the `failoverbase_bc.ps1` script to put in your resource group,
    server, and database. If you are unsure about your resource group, you can find
    it on the Overview screen of your logical server or database.


    2.  In one command window, start the test by executing `querybase_bc.cmd` which
    should look similar to the following:


    ```cmd

    ostress.exe -Sbwsqllogicalserver.database.windows.net -Q"SELECT COUNT(*) FROM
    SalesLT.Customer" -Usqladmin -dbwsqlbc -P -n1 -r50000 -T146

    ```


    This will display a repeating output of the count of rows in a table.


    3.  In another command window, execute the `failoverbasedb.cmd` script which should
    look similar to the following:


    ```powershell

    $resourceGroup = "bwsqldbrg"

    $server = "bwsqllogicalserver"

    $database = "bwsqlbc"

    Invoke-AzSqlDatabaseFailover -ResourceGroupName $resourceGroup -ServerName $server
    -DatabaseName $database

    ```


    When this command is successful, you are just brought back to the command window.
    Notice this command executes a failover *outside* of the context of the database
    and requires proper Azure RBAC permissions (e.g., Contributor level can perform
    this operation).


    In other command window where you ran `ostress`, you should start to see connection
    failover errors. In seconds, you should see the `ostress` program reconnect and
    start to display row counts again.


    You can now see how fast an application can reconnect when a failover occurs with
    your deployed Azure SQL Database.


    A few comments are worth noting about this failover test:


    *   A failover for a General Purpose service tier will take longer because it
    uses shared storage and requires a new node to spin up.

    *   There is an equivalent command for Azure SQL Managed Instance called `Invoke-AzSqlInstanceFailover`.

    *   You can only execute a manual failover every 15 minutes.


    ## Hyperscale Availability


    I’ve described the unique characteristics of the Hyperscale service tier for Azure
    SQL Database in several chapters of the book so far. Let’s dive further into the
    pieces of the Hyperscale architecture, including the interesting way availability
    is handled.


    Let’s look at a visual of the Hyperscale architecture in Figure [8-10](#496204_2_En_8_Chapter.xhtml#Fig10)
    and describe in more details the components when it comes to availability.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig10_HTML.jpg)


    Figure 8-10. Hyperscale availability


    The `primary compute node` is a primary replica for a Hyperscale deployment. Hyperscale
    has zero to four secondary HA replicas which are represented as `secondary compute
    nodes`. I’ll discuss more about how replicas work shortly. The primary compute
    node hosts a SQL Server for your database. This SQL Server has the standard components
    like a buffer pool to host database pages. Additionally on this primary compute
    node is your `tempdb` databases on local storage plus an RBEX *cache*. Caches
    in Hyperscale are all files on local SSD storage. RBEX stands for resilient buffer
    pool extension. It is similar but not exactly the same as the buffer pool extension
    (which you can read more about at [`https://learn.microsoft.com/sql/database-engine/configure-windows/buffer-pool-extension`](https://learn.microsoft.com/sql/database-engine/configure-windows/buffer-pool-extension)).
    The concept is that if a query needs a database page and it is not in buffer pool,
    it will first try to read that page from RBEX.


    What if a page is not available in either the compute buffer pool or RBEX cache?
    We deploy a set of `page servers`. Page servers are nodes with SQL Servers that
    host database pages in memory and are covered by another RBEX cache. Page servers
    are *paired* for redundancy and high availability. Azure SQL determines the proper
    number of page servers to support the deployment and database size. Remember,
    for Hyperscale you don’t choose a maximum database size. We just keep growing
    and scaling the system through page server and Azure Storage to meet your database
    size.


    Tip


    We now support a way to shrink your Hyperscale database to save space and costs.
    See more at [`https://techcommunity.microsoft.com/t5/azure-sql-blog/public-preview-shrink-for-azure-sql-database-hyperscale/ba-p/4181976`](https://techcommunity.microsoft.com/t5/azure-sql-blog/public-preview-shrink-for-azure-sql-database-hyperscale/ba-p/4181976).


    What if the database page the query needs is not on the compute node or a page
    server? Database files that back your database are stored in Azure standard storage.
    In order to maximize performance, this architecture works best when we rarely
    have to go to Azure Storage to retrieve a page for a database. When page servers
    first start up, they are seeded with pages from database files on Azure Storage.
    Page servers then will populate RBEX caches on the primary node (and secondaries
    if they exist). If a page is not on the primary compute buffer pool but we find
    it in the RBEX cache of the node, that is considered a *cache hit*. If the page
    is not in RBEX, we attempt to get the page from a page server (or its RBEX cache),
    but it is considered a *cache miss*.'
