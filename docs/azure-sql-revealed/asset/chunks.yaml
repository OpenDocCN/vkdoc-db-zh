  trans: '### 调优 I/O 性能


    I/O 性能对于 SQL Server 应用程序和查询至关重要。Azure SQL 将物理文件放置的细节抽象化了，但仍有方法可以确保您获得所需的 I/O 性能。


    `每秒输入/输出操作次数 (IOPS)` 对您的应用程序可能很重要。请确保您已为 IOPS 需求选择了合适的服务层级和 vCore 数量。如果您要迁移到 Azure，请了解如何在本地测量查询的
    IOPS（提示：查看性能监视器中的 `磁盘传输次数/秒`）。如果 IOPS 受限，您可能会遇到较长的 I/O 等待时间。如果 IOPS 不足，请增加 vCore
    数量或转到 `业务关键型` 或 `超大规模` 层级。请记住，对于 Azure SQL 托管实例，您已在本书中了解到新的 `新一代通用型` 服务层级允许您独立于
    vCore 选择来控制 IOPS。


    `I/O 延迟` 是影响 I/O 性能的另一个关键因素。对于 Azure SQL 数据库更快的 I/O 延迟，请考虑使用 `业务关键型` 或 `超大规模`。对于托管实例更快的
    I/O 延迟，请转到 `业务关键型` 或使用我在本章及本书前面章节中提到的新一代 `新一代通用型` 服务层级： [`https://learn.microsoft.com/azure/azure-sql/managed-instance/service-tiers-next-gen-general-purpose-use`](https://learn.microsoft.com/azure/azure-sql/managed-instance/service-tiers-next-gen-general-purpose-use)。


    配置并非唯一的选择。改善事务日志延迟可能需要您使用多语句事务。了解更多信息请访问：[`https://learn.microsoft.com/azure/azure-sql/performance-improve-use-batching`](https://learn.microsoft.com/azure/azure-sql/performance-improve-use-batching)。


    在本书第一版中，我有一个实验向您展示了 Azure SQL 数据库 `通用型` 服务层级的 I/O 延迟。由于 `超大规模` 的价格下调，您可以看到我在本书中使用了该服务层级。当我使用
    `超大规模` 尝试第一版的实验时，没有出现我在 `通用型` 中看到的 I/O 延迟或问题，因此我直接删除了这些示例。**Cloud SQL Workshop**
    确实有一个关于 Azure SQL 托管实例 I/O 延迟的示例，您可以在此处尝试：[`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/06_Manage_and_Optimize_AzureSQLMI`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/06_Manage_and_Optimize_AzureSQLMI)。


    ### 增加内存或工作线程数


    内存也是 SQL Server 性能的重要资源，Azure SQL 也不例外。您可用于缓冲池、计划缓存、列存储和内存中 OLTP 的总内存容量取决于您的部署选择。正如本章前面所述，使用新的内存优化高级系列的
    Azure SQL 数据库 `超大规模` 服务层级可提供最高的内存容量，约为 830GB。对于托管实例，使用内存优化高级系列可获得约 870GB 的内存。另外，请记住，`内存中
    OLTP`（仅适用于 `业务关键型` 服务层级）的最大内存是总最大内存的一个子集。


    关于内存的一个关键陈述对于 SQL Server 或 Azure SQL 都是成立的：如果您认为内存不足，请确保您的数据库和查询设计是最优的。在扫描大型表后，您可能认为缓冲池即将耗尽。也许应该部署索引来增强查询性能并减少内存使用。列存储索引是压缩的，因此它们比传统索引使用的内存少得多。


    注意

    `超大规模` 的 vCore 选择不仅影响计算节点可用的内存量，还会影响 `RBEX` 缓存的大小，这同样可能影响性能。


    我已在本章中描述了工作线程限制，该限制针对 Azure SQL 数据库和托管实例设置为最大值。与 SQL Server 一样，耗尽工作线程可能是应用程序问题。所有用户都遇到严重的阻塞问题可能导致错误或
    `THREADPOOL` 等待，而真正的解决方案是解决阻塞问题。


    ### 改善应用程序延迟


    即使您根据所有资源需求配置了部署，应用程序也可能引入延迟性能问题。请务必遵循以下针对 Azure SQL 应用程序的最佳实践：

    - 使用重定向连接类型而非代理。

    - 通过使用存储过程或通过批处理等技术限制查询往返次数来优化“聊天式”应用程序。

    - 通过将事务分组来优化事务，而非使用单例事务。


    请查看此文档页面，了解如何为 Azure SQL 数据库调优应用程序：[`https://learn.microsoft.com/azure/azure-sql/database/performance-guidance`](https://learn.microsoft.com/azure/azure-sql/database/performance-guidance)。


    ### 像调优 SQL Server 一样调优


    Azure SQL 仍然是 SQL Server。因此，除了您在本节和下一节中看到的所有内容外，确保调优 SQL Server 查询并关注以下方面几乎总是无可替代的：

    - 合适的索引设计

    - 使用批处理

    - 使用存储过程

    - 合适的查询设计（例如，真的需要扫描一百万行吗？）

    - 参数化查询以避免过多的缓存即席查询

    - 在应用程序中快速、正确地处理结果（避免可怕的 `ASYNC_NETWORK_IO` 等待）


    ### 智能性能


    我在本章前面提到过，我们的目标是基于数据和您的应用程序工作负载，在数据库引擎中内置智能功能，让您能够 **无需更改代码** 即可获得更快的性能。


    让我们更详细地了解智能查询处理、自动计划校正和自动调优这些领域。'
- fmt: '## 智能查询处理


    在 SQL Server 2017 中，我们增强了查询处理器，使其能够适应查询工作负载，并在使用最新数据库兼容级别时提升性能。我们称之为自适应查询处理。在
    SQL Server 2019 中，我们更进一步，将其重新命名为**智能查询处理**。`IQP` 是内置于查询处理器中的一套新功能，需使用最新的数据库兼容级别启用。在
    SQL Server 2022 中，我们进一步扩展了这些功能，在某些情况下还增强了先前的 `IQP` 功能。我将 SQL Server 2022 的下一波
    `IQP` 功能称为 "NextGen"。这些功能的一大优点是它们都是累积的。图 7-30 展示了最新的 `IQP` 功能集以及先前功能的列表。


    ![7-30](images/496204_2_En_7_Chapter/496204_2_En_7_Fig30_HTML.jpg)


    图 7-30 Azure SQL `IQP`


    你可以看到，其中两个功能，即近似百分比和优化计划强制，在 SQL Server 2022 或 Azure SQL 中对任何应用程序都可用，与 `dbcompat`
    级别无关。如果你使用 `dbcompat` 140 或更高版本，我们还提供了针对内存授予反馈的增强功能。然后，`dbcompat` 160 会启用新功能，以帮助你解决诸如参数嗅探、基数估计和“失控”
    `DOP` 查询等常见问题。


    此外，与之前的版本一样，如果你启用了 `dbcompat` 160（现在是 Azure SQL 数据库的默认设置），则所有优化器修补程序都会被汇总。然后，在图形底部中间是我们在
    SQL Server 2017 和 2019 中根据你的 `dbcompat` 级别启用的功能列表。


    没有专门的功能“复选框”来启用这些功能。它们都内置于查询处理器中，但有些需要特定的 `dbcompat` 级别或 `ALTER DATABASE` 语句（例如，`DOP`
    反馈两者都需要）。你还会在图中看到查询存储的图标。这表示查询存储也是启用该功能所必需的。因为在某些情况下，我们需要查询存储来持久化诸如内存授予、`CE` 或
    `DOP` 反馈等反馈。


    我在 *SQL Server 2019 Revealed* 和 *SQL Server 2022 Revealed* 这两本书中广泛涵盖了这个主题。你可以通过这些书中的示例亲自试用其中的几个功能。这些功能包括以下内容：


    *   你可以试用在 SQL Server 2019 中引入的 `IQP` 功能，例如适用于行存储的内存授予反馈、表变量延迟编译、行存储的批处理模式、标量
    `UDF` 内联和近似 `COUNT DISTINCT`，地址为 [`https://github.com/microsoft/bobsql/tree/master/sql2019book/ch2_intelligent_performance/iqp`](https://github.com/microsoft/bobsql/tree/master/sql2019book/ch2_intelligent_performance/iqp)。


    *   你可以试用在 SQL Server 2022 中引入的 `IQP` 功能，例如优化计划强制、持久化内存授予反馈和百分比，地址为 [`https://github.com/microsoft/bobsql/tree/master/sql2022book/ch04_builtinqueryintelligence`](https://github.com/microsoft/bobsql/tree/master/sql2022book/ch04_builtinqueryintelligence)。


    *   你可以试用在 SQL Server 2022 中引入的其他 `IQP` 功能，例如参数敏感计划优化、`CE` 反馈和 `DOP` 反馈，地址为 [`https://github.com/microsoft/bobsql/tree/master/sql2022book/ch04_builtinqueryintelligence.`](https://github.com/microsoft/bobsql/tree/master/sql2022book/ch04_builtinqueryintelligence)


    此外，文档在 [`https://aka.ms/iqp`](https://aka.ms/iqp) 对该主题有广泛介绍。以下是 Joe Sack 的说法，他不仅是本书的技术评审，也是
    `IQP` 的组长，他在第一版中谈到了 `IQP` 对于 Azure SQL 的重要性。他当时说：


    > “在过去四年中，查询处理团队交付了两波智能查询处理功能——所有这些功能的目标都是在最小化应用程序代码更改的情况下自动提升工作负载性能。今天，我们已经看到数百万个数据库和数十亿个查询在使用
    `IQP` 功能。仅举一例，我们已经有数百万个唯一的查询执行计划每天被使用内存授予反馈功能执行数亿次。在 Azure SQL 中，每天这最终防止了数万亿字节的查询溢出和数千万亿字节的用户查询高估。最终结果是改进了查询执行性能和工作负载并发性。”


    这个改进查询处理器以帮助你的应用程序的领域对 Azure SQL 至关重要。正如 Joe 所说，展望未来，“我们有一个长期计划和积极的工程投资，以持续缓解客户面临的大规模最棘手的查询处理问题。我们观察无数的信号来确定功能的优先级——包括遥测数据、客户支持案例数量、客户互动和
    SQL 社区成员的反馈……” 这一说法后来被证明是真实的，从我们在 SQL Server 2022 中引入的新功能中就可以看出。


    ## 自动计划纠正


    2017 年，我与 Conor Cunningham 在 PASS 峰会上同台，展示了 SQL Server 2017 中一项惊人的技术，用于通过使用查询存储的自动化来解决性能问题。查询存储拥有如此丰富的数据；为什么不将其用于自动化呢？


    我在台上展示的是一个可以自动修复的**查询计划回归**问题的演示。


    注意


    你可以在 [`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver/autotune`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver/autotune)
    查看我用于此演示的代码。


    当同一个查询被重新编译并且新计划导致性能变差时，就会发生查询计划回归。查询计划回归的一个常见场景是*参数敏感计划*，也称为参数嗅探。


    SQL Server 2017 和 Azure SQL 数据库通过分析查询存储中的数据引入了**自动计划纠正**的概念。当在 SQL Server 2017（或更高版本）和
    Azure SQL 数据库中为数据库启用查询存储时，SQL Server 引擎将查找查询计划回归并提供建议。你可以在动态管理视图 `sys.dm_db_tuning_recommendations`
    中看到这些建议。这些建议将包括在性能“处于良好状态”时手动强制查询计划的 `T-SQL` 语句。


    如果你对这些 recommendations 建立了信心，你可以让 SQL Server 在遇到回归时自动强制计划。自动计划纠正可以使用带有 `AUTOMATIC_TUNING`
    参数的 `ALTER DATABASE` 来启用。


    对于 Azure SQL 数据库，你还可以通过 Azure 门户或 `REST API` 中的*自动调整选项*来启用自动计划纠正。你可以在文档中阅读有关这些技术的更多信息。自动计划纠正建议对于任何启用了查询存储的数据库始终是启用的（这是
    Azure SQL 数据库和托管实例的默认设置）。截至 2020 年 3 月，自动计划纠正对于**新**的 Azure SQL 数据库默认启用。


    你可以在 [`https://learn.microsoft.com/sql/relational-databases/automatic-tuning/automatic-tuning?view=sql-server-ver16#automatic-plan-correction`](https://learn.microsoft.com/sql/relational-databases/automatic-tuning/automatic-tuning?view=sql-server-ver16#automatic-plan-correction)
    阅读有关自动计划纠正的更多信息。'
  raw: '### Intelligent Query Processing


    In SQL Server 2017, we enhanced the query processor to adapt to query workloads
    and improve performance when you used the latest database compatibility level.
    We called this Adaptive Query Processing (AQP). We went a step further in SQL
    Server 2019 and rebranded it as **Intelligent Query Processing (IQP)**. IQP is
    a suite of new capabilities built into the query processor and enabled using the
    latest database compatibility level. In SQL Server 2022, we expanded these capabilities
    even further, in some cases enhancing previous IQP capabilities. I called the
    next wave of features for SQL Server 2022 IQP “NextGen.” One of the great aspects
    of these features is that they are all cumulative. Figure [7-30](#496204_2_En_7_Chapter.xhtml#Fig30)
    shows the latest set of IQP capabilities along with a list of the previous features.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig30_HTML.jpg)


    Figure 7-30


    Azure SQL IQP


    You can see that two of the features Approximate Percentile and Optimized Plan
    Forcing are available to any application in SQL Server 2022 or Azure SQL independent
    of the dbcompat level. If you are using dbcompat 140 or higher, we have enhancements
    available for Memory Grant feedback. And then dbcompat 160 lights up new features
    to help you with common problems like parameter sniffing, cardinality estimation,
    and “out of control” DOP queries.


    In addition, like in previous releases, all optimizer hotfixes are rolled up if
    you enable dbcompat 160 (which is now the default for Azure SQL Database). And
    then at the bottom middle of the figure is a list of features we enabled in SQL
    Server 2017 and 2019 based on your dbcompat level.


    There is no feature “checkbox” to enable these capabilities. They all come built-in
    to the query processor, but some require a specific dbcompat level or ALTER DATABASE
    statement (e.g., DOP feedback requires both). You will also see in the figure
    an icon for the Query Store. This indicates that the Query Store is required to
    also enable the feature. This is because in some cases we need the Query Store
    to persist feedback like Memory Grant, CE, or DOP feedback.


    I covered this topic extensively in the books *SQL Server 2019 Revealed* and *SQL
    Server 2022 Revealed*. You can try out several of these features yourself with
    examples from these books. These include the following:


    *   You can try out IQP features introduced in SQL Server 2019, such as Memory
    Grant Feedback for Row Store, Table Variable Deferred Compilation, Batch Mode
    for Row Store, Scalar UDF Inlining, and Approximate Count Distinct at [`https://github.com/microsoft/bobsql/tree/master/sql2019book/ch2_intelligent_performance/iqp`](https://github.com/microsoft/bobsql/tree/master/sql2019book/ch2_intelligent_performance/iqp).


    *   You can try out IQP features introduced in SQL Server 2022, such as Optimized
    Plan Forcing, Persisted Memory Grant Feedback, and Percentiles at [`https://github.com/microsoft/bobsql/tree/master/sql2022book/ch04_builtinqueryintelligence`](https://github.com/microsoft/bobsql/tree/master/sql2022book/ch04_builtinqueryintelligence).


    *   You can try out other IQP features introduced in SQL Server 2022, such as
    Parameter Sensitive Plan Optimization, CE Feedback, and DOP Feedback at [`https://github.com/microsoft/bobsql/tree/master/sql2022book/ch04_builtinqueryintelligence.`](https://github.com/microsoft/bobsql/tree/master/sql2022book/ch04_builtinqueryintelligence)


    In addition, the documentation covers this topic extensively at [`https://aka.ms/iqp`](https://aka.ms/iqp).
    Here is what Joe Sack said, who is not only the technical reviewer of this book
    but also the Group Lead for IQP, back in the first edition about the significance
    of IQP for Azure SQL. He said back then


    > *“Over the last four years, the query processing team delivered two waves of
    Intelligent QP features – all with the objective to improve workload performance
    automatically with minimal changes to application code. Today we’re already seeing
    millions of databases and billions of queries using IQP features. Just as one
    example, we already have millions of unique query execution plans being executed
    hundreds of millions of times per day that use the memory grant feedback feature.
    In Azure SQL on a daily basis, this ends up preventing terabytes of query spills
    and petabytes worth of overestimations for user queries. The end result is improved
    query execution performance and workload concurrency”.*


    This area of improving our query processor to help your application is significant
    for Azure SQL. As Joe tells it for the future “We have a long-term plan and active
    engineering investments to keep alleviating the hardest query processing problems
    that customers face at-scale. We look at a myriad of signals in order to prioritize
    features – including telemetry, customer support case volume, customer engagements
    and SQL community member feedback….” This statement back then proved to be true
    as you can see from the new capabilities we introduced in SQL Server 2022.


    ### Automatic Plan Correction


    In 2017, I stood on stage with Conor Cunningham at the PASS Summit and showed
    off an amazing piece of technology for SQL Server 2017 to solve a performance
    problem using automation with Query Store. Query Store has such rich data; why
    not use it with automation?


    What I showed on stage was a demonstration of a **query plan regression** problem
    that can be automatically fixed.


    Note


    You can see the code I used for this demonstration at [`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver/autotune`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver/autotune).


    A query plan regression occurs when the same query is recompiled and a new plan
    results in worse performance. A common scenario for query plan regression is *parameter-sensitive
    plans* (PSP), also known as parameter sniffing.


    SQL Server 2017 and Azure SQL Database introduced the concept of **Automatic Plan
    Correction** (APC) by analyzing data in the Query Store. When the Query Store
    is enabled with a database in SQL Server 2017 (or later) and in Azure SQL Database,
    the SQL Server engine will look for query plan regressions and provide recommendations.
    You can see these recommendations in the DMV **sys.dm_db_tuning_recommendations**.
    These recommendations will include T-SQL statements to manually force a query
    plan when performance was "in a good state."


    If you gain confidence in these recommendations, you can enable SQL Server to
    force plans automatically when regressions are encountered. Automatic Plan Correction
    can be enabled using ALTER DATABASE using the AUTOMATIC_TUNING argument.


    For Azure SQL Database, you can also enable Automatic Plan Correction through
    *Automatic Tuning options* in the Azure Portal or REST APIs. You can read more
    about these techniques in the documentation. Automatic Plan Correction recommendations
    are always enabled for any database where Query Store is enabled (which is the
    default for Azure SQL Database and Managed Instance). Automatic Plan Correction
    (FORCE_PLAN) is enabled by default for Azure SQL Database as of March 2020 for
    **new** databases.


    You can read more about Automatic Plan Correction at [`https://learn.microsoft.com/sql/relational-databases/automatic-tuning/automatic-tuning?view=sql-server-ver16#automatic-plan-correction`](https://learn.microsoft.com/sql/relational-databases/automatic-tuning/automatic-tuning?view=sql-server-ver16#automatic-plan-correction).'
