    , CREDENTIAL= MyAzureBlobStorageCredential --> CREDENTIAL is not required if a
    blob is configured for public (anonymous) access!

    );

    BULK INSERT Sales.Invoices

    FROM ''inv-2017-12-08.csv''

    WITH (DATA_SOURCE = ''MyAzureBlobStorage'');

    ```


