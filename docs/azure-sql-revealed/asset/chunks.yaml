    \ the power of the cloud to offer even more. You learn more details about intelligent\
    \ performance for Azure SQL in the final section of this chapter (IQP is part\
    \ of that story).\n\n## Configuring and Maintaining for Performance\n\nIn Chapter\
    \ [5](#496204_2_En_5_Chapter.xhtml) of this book, I described many of the options\
    \ to configure an Azure SQL Managed Instance and Database. There are some configuration\
    \ options that can affect performance worth diving deeper into. This includes\
    \ the tempdb database, configuring database options, files and filegroups, max\
    \ degree of parallelism, and Resource Governor. In addition, it is worth reviewing\
    \ the various tasks you would go through to maintain indexes and statistics for\
    \ database for Azure SQL as compared to SQL Server.\n\n### Tempdb\n\nThe tempdb\
    \ database is an important shared resource used by applications. Ensuring the\
