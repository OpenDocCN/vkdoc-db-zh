    # 什么是 Azure SQL？


    ## Azure 区域和数据中心


    世界的计算机存在于哪里？虽然想象 Azure literally 存在于“云端”可能很有趣，但 Azure 服务实际托管在名为`数据中心`的物理位置中。你可能还记得，在本书第一章中提到，Azure
    最初拥有四个数据中心。


    如今，数据中心并非你部署 Azure 资源时的选择。相反，数据中心在全球范围内被组织成`区域`。区域是通过低延迟网络连接的一组数据中心。在本书中你将看到，在部署
    Azure SQL 服务时，你会选择一个区域作为部署目标。在撰写本书时，Azure 在全球 140 个国家拥有 60 多个可用区域。一些区域为特定客户设有特殊用途，例如`政府`或`国家`区域。例如，Azure
    在美国境内提供了名为 Azure 政府区域（你可以在[`https://azure.microsoft.com/global-infrastructure/government/`](https://azure.microsoft.com/global-infrastructure/government/)深入了解
    Azure 政府版）的特殊区域。


    `地理区域`是由两个或多个区域组成的市场，旨在保留`数据驻留`和合规边界。为确保更高的弹性，区域有时会被设置得足够近以形成`配对`，但又保持足够的距离以应对自然灾害等场景。


    此外，在某些区域内部，一个或多个数据中心被分组到一个`可用性区域`中，以便为 Azure 资源提供更高的可用性。每个区域拥有独立的电源、冷却和网络。你可以在[`https://azure.microsoft.com/global-infrastructure/regions/`](https://azure.microsoft.com/global-infrastructure/regions/)了解更多关于区域、地理区域和可用性区域的信息。`可用性区域`是使你在云中的
    SQL 部署实现`高可用性`的关键组成部分。你将在本书第 8 章中详细了解这方面的内容。


    ## Azure 的信任、隐私与合规性


    如果你正在考虑迁移到云端，毫无疑问，你会考虑信任、隐私和合规性问题。我能信任 Azure 上的我的数据吗？Azure 是否符合我所在地方政府和行业的合规要求？


    Azure 拥有超过 100 项合规认证，涵盖政府法规和行业标准。请从[`https://azure.microsoft.com/overview/trusted-cloud/compliance/`](https://azure.microsoft.com/overview/trusted-cloud/compliance/)开始阅读，以了解
    Azure 的所有合规标准。


    假设你关注隐私。Azure 不仅提供功能来帮助你维护隐私和保护（在本书第 6 章中了解更多关于 Azure SQL 的产品），而且我们微软也致力于维护隐私标准以满足你的要求。


    如果你的组织担心在 Azure 上信任你的数据，我建议你从[`https://azure.microsoft.com/overview/trusted-cloud/`](https://azure.microsoft.com/overview/trusted-cloud/)开始，深入了解微软如何在数据中心保护你的资产，以及你如何使用
    Azure 工具和功能来保护你的部署。


    ## Azure 服务级别协议（SLA）


    名为`服务级别协议`（`SLA`）的正式文件规定了适用于 Azure 的具体性能标准条款。`SLA`描述了微软向 Azure 客户承诺的具体性能和可用性标准。Azure
    的各个产品和服务都有对应的`SLA`。`SLA`也规定了如果某项服务或产品未能达到其所遵循的`SLA`规范时的处理方式。Azure SQL 有特定的`SLA`，涉及可用性和性能，你将在本书中了解到这些内容。`SLA`是考虑使用
    Azure 的主要原因之一，因为它是微软承诺保持你数据可用的保证。你可以在[`https://azure.microsoft.com/blog/understanding-and-leveraging-azure-sql-database-sla`](https://azure.microsoft.com/blog/understanding-and-leveraging-azure-sql-database-sla)阅读更多关于
    Azure `SLA`的信息。


    ## IaaS 与 PaaS


    我在本书第 1 章提到过`SaaS`、`PaaS`和`IaaS`等概念，但它们值得在此再次回顾。


    `基础设施即服务`（`IaaS`）是一种由像 Microsoft Azure 这样的云服务提供商托管的计算系统。`IaaS`用户部署和管理虚拟机，而 Azure
    则为硬件（包括主机服务器、存储和网络）提供托管基础设施。Azure `IaaS`服务通过 Azure 虚拟机呈现。Azure SQL 为`IaaS`客户提供了特定的选项。


    `平台即服务`（`PaaS`）提供了`IaaS`的所有好处，并附加了通常抽象自底层操作系统或虚拟机的云服务优势。其理念是让开发人员或用户专注于应用程序，或者对于
    Azure SQL 而言，专注于数据库或实例，而不是操作系统或虚拟机的细节。通常，`PaaS`服务为用户提供其他优势，包括内置的可扩展性、高可用性和安全性。Azure
    SQL 提供两种`PaaS`服务，包括托管实例和数据库。


    云服务模型的另一个支柱是`软件即服务`（`SaaS`）。`SaaS`用户利用由云服务提供商托管的应用程序软件。许多`SaaS`提供商使用`IaaS`、`PaaS`或某种组合的云服务来支持其服务。Azure
    `IaaS`或`PaaS`服务是许多`SaaS`供应商的理想系统基础。`SaaS`应用程序是云服务的早期先驱，例如像 Hotmail 这样的电子邮件系统。如今，微软的`SaaS`应用程序包括著名的
    Microsoft 365 应用程序套件。


    ## Azure SQL 产品线


    了解了 Azure 生态系统以及`IaaS`/`PaaS`的概念后，Azure SQL 包含以下 Azure 服务：Azure 虚拟机上的 SQL Server、Azure
    SQL 托管实例和 Azure SQL 数据库。图 2-7 展示了 Azure SQL `产品线`的可视化图示。


    ![](img/496204_2_En_2_Fig7_HTML.jpg)


    图 2-7 Azure SQL 产品线


    > **注意**

    > 云端生活变化迅速。微软正在寻求更新云端 SQL 服务的方法，包括新的品牌和运行 SQL 的形式。请通过我们的博客[`https://devblogs.microsoft.com/azure-sql`](https://devblogs.microsoft.com/azure-sql)随时了解
    Azure SQL 的最新消息。


    Azure SQL 产品线从左到右的排列顺序有其用意。从左向右移动时，将现有 SQL Server 应用程序迁移到 Azure 的`摩擦`更高，而你对底层
    SQL Server 所有方面的`控制`则更少。然而，这并非负面。向右移动，你会`增加数据库的 PaaS 或托管功能`。抽象掉 SQL Server 的细节是有好处的，正如你在详细了解
    Azure SQL 数据库时将会看到的那样。在阅读 Azure SQL 的这些选项时，请牢记这些共同点：


    *   相同的 SQL Server 引擎驱动着这些选项中的每一个。

    *   你熟悉和喜爱的相同`T-SQL`语言适用于所有这些选项。

    *   你今天用于 SQL Server 的工具和 API 都适用于所有这些选项。

    '
- fmt: '# SQL Virtual Machines


    Officially called `SQL Server on Azure Virtual Machines`, this is your IaaS option
    to deploy SQL Server in Azure. You should think of this option as the same as
    you are using SQL Server in a virtual machine today except Azure hosts your virtual
    machine. Azure manages the host servers and hardware system. It provides interfaces
    for you to deploy a complete virtual machine running Windows or Linux and your
    choice of SQL Server. SQL Server is a complete edition (Enterprise, etc.) as you
    would deploy in a virtual machine in Hyper-V or VMware. Your responsibility is
    to manage all aspects of the guest operating system and SQL Server environment.
    However, because the virtual machine runs in Azure, there are benefits to assist
    you in managing SQL Server and the virtual machine. Chapter [3](#496204_2_En_3_Chapter.xhtml)
    is a complete discussion of SQL Server on Azure Virtual Machines.


    # Managed Instances


    Officially called `Azure SQL Managed Instance`, this is an Azure service one level
    up from Azure Virtual Machine. Managed Instance is a full SQL Server database
    engine instance deployed as a PaaS service, hence the term managed. Azure provides
    the host server, hardware system, and virtual machines, allowing you to focus
    on deploying and managing a SQL Server instance and set of databases. You will
    see throughout the rest of this book the benefits of Azure PaaS for Managed Instance
    especially in the areas of security, scale, and high availability.


    # Databases


    Officially known as `Azure SQL Database`, this is an Azure PaaS service up another
    level from managed instance. Azure provides a method to deploy one or more databases
    and takes care of the host, hardware system, virtual machine, and SQL Server instance.
    You will see that Azure SQL Database provides many different deployment options
    to meet unique database application scenarios. Azure SQL Database provides PaaS
    benefits in the areas of security, scale, intelligent performance, and high availability.


    # Azure SQL Managed Instance


    I described the history and purpose behind Azure SQL Managed Instance, or `Managed
    Instance`, in Chapter [1](#496204_2_En_1_Chapter.xhtml) of the book: make it easier
    to lift SQL Server applications to Azure (a.k.a. CloudLifter). You should absolutely
    think of a Managed Instance like a SQL Server `Database Engine instance` today
    you install on-premises. The install or deploy experience will be completely different
    as you will learn in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the book. The
    experience of setting up the infrastructure to connect and network with the instance
    will also be different. However, once you have completed these tasks, your experience
    with Managed Instance will feel like a SQL Server instance today.


    Today, when you install SQL Server, you have a single `database engine instance`
    of SQL Server running. You can deploy multiple databases in the instance or deploy
    multiple instances.


    For a Managed Instance, you also will have a database engine instance running
    in the Azure infrastructure after a successful deployment. You then are free to
    perform instance-level configuration tasks, create databases, load data, and start
    connecting and use the instance. You are abstracted from the infrastructure details
    of how a managed instance is deployed. However, it can be important to know some
    aspects of how a managed instance is deployed in the Azure infrastructure. You
    will learn more about the architecture of a managed instance deployment in Chapter
    [4](#496204_2_En_4_Chapter.xhtml) of the book.


    ## Managed Instance Capabilities


    Since a managed instance is like a `database engine instance` of SQL Server, the
    surface area of the database engine is almost 100% like SQL Server. If these capabilities
    of SQL Server are important to you, then a Managed Instance may be the best choice:


    *   SQL Server Agent jobs

    *   Database Mail

    *   Cross-database transactions

    *   SQL Server Replication

    *   Linked servers

    *   SQL CLR

    *   DTC transactions

    *   Resource Governor

    *   Service Broker


    These capabilities are not exposed with Azure SQL Database.


    That is not the complete list, and we are constantly adding new features to get
    Managed Instance as close to a complete 100% SQL Server database engine instance
    as possible. You can see the latest complete list of differences between Managed
    Instance and SQL Server at [`https://aka.ms/azuresqlmitsqldiff`](https://aka.ms/azuresqlmitsqldiff).


    Note


    This is an exhaustive list of T-SQL differences. Consider in some cases it may
    not matter. For example, the T-SQL syntax to create and manage Availability Groups
    doesn’t exist for managed instance. However, this may be fine for your requirements
    since managed instance can automatically deploy and manage an Availability Group
    for you.


    There are major benefits in using a managed instance because it is a PaaS service:


    *   Built-in high availability (including Availability Groups), automated backups,
    point-in-time restore, and recovery of deleted databases. But you also can perform
    your own native backup (`COPY_ONLY`) and restore.

    *   A 99.99% uptime SLA.

    *   HADR across Azure regions with auto-failover groups.

    *   Zone redundancy.

    *   Free licensing for disaster recovery.

    *   Security isolation with virtual network integration and private link networks.

    *   Microsoft Entra Integration.

    *   Windows Authentication.

    *   Simple and easy-to-use scaling options for resources.

    *   A versionless SQL Server constantly updated with the latest updates and features
    but also a versioned instance to maintain compatibility with SQL Server 2022.


    Note


    You will learn more details on what a versionless and versioned SQL Server means
    in Chapter [5](#496204_2_En_5_Chapter.xhtml) of this book.


    *   Abstraction from the details and maintenance of the host and virtual machine
    environment.

    *   A free trial offer for Managed Instance.

    *   Integration with Azure Monitor and Database Watcher.

    *   Set up an online migration strategy or compatibility with SQL Server 2002
    using a Managed Instance link.

    *   PaaS security capabilities such as Microsoft Defender for Azure SQL. You will
    learn more about Microsoft Defender for Azure SQL in Chapter [6](#496204_2_En_6_Chapter.xhtml)
    of this book.


    As you go throughout this book, you will be learning in more detail about many
    capabilities of a managed instance.


    ## Managed Instance Options and Limits


    When you install a SQL Server in a virtual machine or bare-metal server, you typically
    are provided preconfigured CPUs, memory, and storage resources (size and speed).


    When you deploy a managed instance, you will have similar choices to make to meet
    your resource needs. These choices start with a concept called a `service tier`.
    For Managed Instance, the two service tier choices are `General Purpose` and `Business
    Critical`.


    These tier choices will dictate your performance capabilities, resource limits,
    and in some cases feature capabilities. You will see more details about how to
    pick these tiers in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the book (and
    you will also see the same service tier names, plus more, with Azure SQL Database).
    Here is a quick tour of each of these service tiers for an Azure SQL Managed Instance.'
