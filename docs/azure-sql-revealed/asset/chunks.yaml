- fmt: '### Failover Reasons


    There are various reasons why a failover can occur, planned and unplanned, for
    Azure SQL Managed Instance and Database. Because the reasons for failover could
    vary, the best method to track if a failover occurred for your database is to
    use `Resource Health` for your Managed Instance or Database. Figure [8-38](#496204_2_En_8_Chapter.xhtml#Fig38)
    shows an example of `Resource Health` for one of my Azure SQL Database deployments
    and a health event which resulted in a failover.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig38_HTML.jpg)

    Figure 8-38

    `Resource Health` for an Azure SQL Database


    The `Unavailable` event lines up when I performed a manual failover of the database.
    Notice it says it was an `Unplanned` event. How could I know whether this was
    caused by a manual failover? I looked at the `Activity Log` for this database
    and found these details as you see in Figure [8-39](#496204_2_En_8_Chapter.xhtml#Fig39).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig39_HTML.jpg)

    Figure 8-39

    Using the `Activity Log` to track a manual failover


    Note

    `Resource Health` is reported at the database level for both Azure SQL Managed
    Instance and Database deployments.


    ### Summary


    In this chapter, you learned the amazing built-in availability capabilities for
    Azure SQL, including automatic backups, point-in-time restore, and built-in availability
    architectures of `General Purpose`, `Business Critical`, and `Hyperscale`.


    You also learned how to use the power of Azure for further redundancy with zone
    redundancy, geo-replication, and failover groups. You learned how Azure provides
    built-in data integrity capabilities and processes and how to monitor the availability
    of your Azure SQL deployments.


    There are some additional labs you can use (these are free – you just need your
    Azure subscription) to learn more about availability for Azure SQL at

    [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/06_Manage_and_Optimize_AzureSQLMI`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/06_Manage_and_Optimize_AzureSQLMI)

    [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB)


    Availability is the last part of the meat and potatoes of Azure SQL. In the next
    chapter, you will extend your knowledge of Azure SQL to learn capabilities not
    specifically related to security, performance, or availability.


    # 9. Extending Your Knowledge of Azure SQL


    You have been through the journey of deploying and configuring Azure SQL Managed
    Instance and Databases. You have then seen all the capabilities and tasks you
    need to secure your deployments, make and keep Azure SQL fast, and ensure your
    data is highly available. In this chapter, we will extend your knowledge for Azure
    SQL by looking closer at a feature comparison with SQL Server, understanding options
    for job management, see methods you can use to help support your deployments,
    and review best practices for using Azure SQL.


    This chapter will contain examples for you to try out and use as you read along.
    For you to try out any of the techniques, commands, or examples I use in this
    chapter, you will need

    *   An Azure subscription.

    *   A minimum of `Contributor` role access to the Azure subscription. You can
    read more about Azure built-in roles at [`https://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles).

    *   Access to the Azure Portal.

    *   I will use several Azure SQL Databases and a Managed Instance I deployed earlier
    in this book.

    *   To connect to Managed Instance, you will need a `jumpbox` or virtual machine
    in Azure to connect. I showed you how to do this in Chapter [4](#496204_2_En_4_Chapter.xhtml)
    of the book. One simple way to do this is to create a new Azure Virtual Machine
    and deploy it to the same virtual network as the Managed Instance (you will use
    a different subnet than the Managed Instance).

    *   To connect to Azure SQL Database, I’m going to use the Azure VM I deployed
    in Chapter [3](#496204_2_En_3_Chapter.xhtml), called `bwsql2022`, and configured
    for a private endpoint in Chapter [6](#496204_2_En_6_Chapter.xhtml) (you could
    use another method as long as you can connect to the Azure SQL Database).

    *   You will run some T-SQL in this chapter, so install a tool like SQL Server
    Management Studio (`SSMS`) at [`https://aka.ms/ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms?view=sql-server-ver15).


    ## Surface Area of Azure SQL


    Throughout this book, I have compared the features and capabilities of SQL Server
    with Azure SQL Managed Instance and Database. Let’s review a few capabilities
    I often get asked that are not specifically related to security, performance,
    and availability.


    As you read through this section, consider these documentation references:

    *   T-SQL differences between Managed Instance and SQL Server at [`https://aka.ms/azuresqlmitsqldiff`](https://aka.ms/azuresqlmitsqldiff).

    *   T-SQL differences between Azure SQL Database and SQL Server at [`https://aka.ms/azuresqldbtsqldiff`](https://aka.ms/azuresqldbtsqldiff).

    *   Feature comparison between Azure SQL Managed Instance and Azure SQL Database
    at [`https://aka.ms/azuresqlfeatures`](https://aka.ms/azuresqlfeatures).


    ### Linked Servers and Cross-Database Queries


    SQL Server users can execute queries for objects (and joining them) that reside
    in other databases on the same SQL Server instance (cross-database query) or another
    instance (linked server query). Linked servers for SQL Server also allow queries
    against other data providers (through OLE-DB) such as Oracle. Cross-database queries
    and linked servers allow read queries (`SELECT`) but also (assuming the provider
    supports it) distributed transactions.


    **`Cross-database queries`** are supported in Azure SQL Managed Instance but not
    with Azure SQL Database.


    Note

    Azure SQL Database does support the concept of elastic database query (in preview)
    which can allow joining data across databases. Learn more at [`https://learn.microsoft.com/azure/azure-sql/database/elastic-query-getting-started-vertical`](https://learn.microsoft.com/azure/azure-sql/database/elastic-query-getting-started-vertical).


    **`Linked Servers`** are supported for Azure SQL Managed Instance but not with
    Azure SQL Database. There are limitations though for how you can use `Linked Servers`
    with Azure SQL Managed Instance. For example, only SQL Server–based providers
    are supported. See the full list of differences for `Linked Servers` on Managed
    Instance at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#linked-servers`](https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#linked-servers).
    `Linked Servers` for Managed Instance support Microsoft Entra authentication.


    Note

    You can create a `Linked Server` from a SQL Server on-premises, in Azure Virtual
    Machine, or Managed Instance, where the *remote server* is an Azure Database Logical
    Server.'
