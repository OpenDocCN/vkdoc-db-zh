    journey to migrate to Azure.


    # Foreword


    If you told me in late 2018 that I would one day write the foreword of a book
    written by Bob Ward, I would have laughed and probably added a “Yeah, right.”
    At the time, I was reading Bob’s book, `Pro SQL Server on Linux`. Actually, I
    was pouring over the book, trying to learn as much about SQL Server as I could.
    I tried all the exercises, sometimes multiple times to make sure I really grasped
    both the *problem* and the *solution*, which is fortunately a way of storytelling
    that Bob often employs. Understanding the scenarios was critical for me to understand
    why and how the SQL team has built various aspects of the product.


    Why was I pouring over `Pro SQL Server on Linux`? In 2018, I transferred internally
    at Microsoft to join the SQL Server and Azure SQL product group. I didn’t know
    anything about SQL Server or managing databases. Nothing. Asad Khan, Vice President
    of SQL at Microsoft, took a chance on me. Bob’s `Pro SQL Server on Linux` book
    was amazing because Bob “read the room.” He took the extra time to explain the
    fundamental concepts of SQL Server, because Linux folks don’t necessarily know
    SQL Server. I learned so much from using the book as a tool. It set me up for
    success.


    It was no surprise in 2019 when Asad’s charter grew to include not just SQL Server
    but also Azure SQL and migrations. It was then that Asad asked me to look at migrations
    to Azure SQL. Bob, Buck Woody, and I together built SQL Ground to Cloud, which
    was a set of resources (slides, labs) meant to help you understand all things
    SQL Server 2019, Azure SQL, and migrations. We did a global “tour” where we attended
    many SQL Saturdays, events, and Microsoft offices, to enable both internals at
    Microsoft and customers. Between July and December of 2019, we were never home
    for more than three days at a time. During all this, Bob wrote `SQL Server 2019
    Revealed`.


    For anyone who has done any presentation before, you know that practice helps
    immensely. I think something that makes Bob’s books both informative and digestible
    is how much experience Bob has delivering the messages. For example, prior to
    the launch of his `SQL Server 2019 Revealed` book, Bob had, no exaggeration, likely
    presented the content over 50 times to over 100,000 people. This gave Bob the
    opportunity to observe what resonates, hear all questions, and tune his message
    accordingly. The impact is that any book you pick up and read by Bob, including
    this one, is easily consumable and often directly relevant for the problems you
    are likely facing today.


    By the end of 2019, I realized that we needed a way to bring SQL Server people
    *with us* to the cloud and Azure SQL. I had a hope that we could deliver a similar
    roadshow to SQL Ground to Cloud but more focused on translating SQL Server knowledge
    to Azure. I remember having an old-fashioned cocktail (a Bob staple) with Bob
    after the SQL Server 2019 product release, and he told me he was going to start
    looking at Azure SQL. It was a dream come true. Bob Ward, a trusted SQL Server
    guru in the community, was going to study Azure SQL. So I asked Bob if he would
    be willing to take the results of his close examination of Azure SQL and partner
    with me on the effort of building something called “Azure SQL fundamentals.” Bob
    took a chance on this with me, though I’m not sure he knew exactly what he signed
    up for. Together, we produced a 61-episode video series with over 500K views,
    a learning path with six modules (`https://aka.ms/azuresqlfundamentals`) with
    over 1M views, and a highly polished deck that we (or anyone, we made it public)
    could use to present one module at a time, or a one-day workshop.


    During this time, I got to work very closely with Bob. Bob was always hyper-focused
    on understanding the exact details and reasons around any differences between
    Azure SQL and SQL Server. There were hundreds of emails, meetings, and Teams messages
    that Bob drove with program managers, engineers, ex-SQL team members, and the
    field to understand every difference and every nuance. He also used this phrase
    “Trust, but verify,” and I think that actually landed in this book. Bob has immense
    respect and rapport, and it was very cool to witness how he professionally and
    respectfully gets to understanding both the *why* and the *how*. Bob then translates
    that into relatable *problems* and *solutions*.


    During all this, similar to with the craziness of his `SQL Server 2019 Revealed`
    efforts, Bob wrote `Azure SQL Revealed`, which you are now reading the second
    edition of. This is where Bob has captured and distilled all the conversations
    and learnings into one comprehensive piece. If you have any history of working
    with SQL Server, Azure SQL, or Azure in general, I promise this will be an easy-to-read
    book and an actually entertaining and interesting read. If you read the first
    edition, you can be sure that Bob has made sure every detail was verified or updated,
    and every new capability up to the very last day that Bob could submit edits has
    been added (we move at the speed of the cloud!).


    I mentioned how Asad and Bob have taken chances on me, but I think it’s even more
    important that we take chances on ourselves – that we believe in ourselves. My
    call to action is to take a chance on yourself with this book. Treat it as a tool,
    not a book. Do the exercises, make sure you understand the “meat and potatoes”
    (if you don’t recognize this phrase from Bob, you will soon). If you do, the opportunities
    and doors that will open for you professionally and even personally may surprise
    you. This is just the beginning.


    Anna Hoffman


    Principal Group PM Manager and Host of Data Exposed, Microsoft


