- fmt: '### The Azure Portal


    If Azure is the world’s computer, then the `Azure Portal` is the *user interface*
    for the world’s computer. You may have read in Chapter [1](#496204_2_En_1_Chapter.xhtml)
    the interesting evolution of the Azure Portal over the years. Today, the Azure
    Portal is available through a web browser (`https://portal.azure.com`), which
    is available on all popular web browsers, or a mobile application (`https://azure.microsoft.com/features/azure-portal/mobile-app/`).


    Figure [2-1](#496204_2_En_2_Chapter.xhtml#Fig1) shows the `Home` page from the
    latest Azure Portal experience for my account.


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig1_HTML.jpg)

    Figure 2-1

    The Azure Portal home page


    Note

    In this book, I’ll be showing various screenshots of the Azure Portal. Microsoft
    employees by default use a *preview* of the Azure Portal to help test the latest
    updates. For the most part, your view of the Azure Portal should look similar,
    but there could be some differences.


    There are several features of the Azure Portal I think you will find important
    as you see it used in this book and in your own experiences. Figure [2-2](#496204_2_En_2_Chapter.xhtml#Fig2)
    highlights some of these.


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig2_HTML.jpg)

    Figure 2-2

    Highlights to use the Azure Portal


    Following the number sequences in Figure [2-2](#496204_2_En_2_Chapter.xhtml#Fig2),
    consider these Azure Portal features:


    1.  `Dashboard` – Select the dashboard to see important resources you have *pinned*
    (you can pin almost anything in Azure to your dashboard).


    2.  `Customize` your dashboard – Select `Edit` to move your pinned resources around
    and organize them in your dashboard. You can have multiple dashboards.


    3.  `Search` – You will use this often to search for and find resources and Azure
    services.


    4.  `Notifications` – As deploy and manage Azure resources, notifications are
    provided for progress, failures, and completion events.


    5.  `Copilot` – Use this to launch the Microsoft Copilot in Azure.


    6.  `Quick create` an Azure resource – Choose this to quickly create a resource
    from a popular Azure service.


    7.  `Azure Cloud Shell` – Open a command prompt for PowerShell or bash within
    the portal experience.


    I’m a “command line” person by nature (most of us who worked in computers from
    the 1980s are). The Azure Cloud Shell is simply amazing! The Azure Cloud Shell
    comes with your subscription, accessible via the portal, has many tools preinstalled
    (e.g., `sqlcmd`), and comes with free storage for a personal “hard drive” for
    your files. Figure [2-3](#496204_2_En_2_Chapter.xhtml#Fig3) shows an example Azure
    Cloud Shell for my account using PowerShell.


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig3_HTML.jpg)

    Figure 2-3

    The Azure Cloud Shell


    You can read and learn more about the Azure Cloud Shell at `https://azure.microsoft.com/features/cloud-shell/`.


    Note

    Microsoft offers a free online training course on how to use the Azure Portal
    at `https://learn.microsoft.com/training/modules/tour-azure-portal/?WT.mc_id=azureportalcard_Category_Overview_-inproduct-azureportal`.


    ### The Azure Marketplace


    To deploy or consume an Azure service, you use the `Azure Marketplace`. The marketplace
    is a collection of services you can deploy and consume. Microsoft provides many
    of the services in the marketplace as a *publisher* (not all but many Microsoft
    services start with the word Azure). The marketplace also has solutions provided
    by other publishers, known as partners.


    To see a list of services in the Azure Marketplace provided by Microsoft, you
    can choose the `QuickStart` Create Resource option in the portal as seen in Figure
    [2-4](#496204_2_En_2_Chapter.xhtml#Fig4).


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig4_HTML.jpg)

    Figure 2-4

    The Azure Marketplace in the portal


    At this point, you can search the marketplace with keywords, pick from categories,
    or choose from popular services. If you select `See All`, you will get a list
    of all Azure services in the marketplace by all publishers organized by categories.


    Azure services published by Microsoft are also known as `products`. You can see
    a list of Azure products on the Azure documentation site from `https://azure.microsoft.com/`
    as seen in Figure [2-5](#496204_2_En_2_Chapter.xhtml#Fig5).


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig5_HTML.jpg)

    Figure 2-5

    Azure products


    Notice the new AI-powered assistant at the bottom of this page to help you find
    answers about Azure*.*


    ### Azure API and CLI


    Almost every Azure service has its own Application Programming Interface (API),
    protocol (TDS, for example, for Azure SQL), and tools (`sqlcmd` or `SSMS` for
    Azure SQL).


    However, a common thread across all Microsoft Azure services is a Representational
    State Transfer (REST) API. `Azure REST APIs` are service endpoints that support
    sets of HTTP operations (methods), which provide create, retrieve, update, or
    delete access to the service’s resources. You can think of REST APIs as a *low-level
    core layer* of API across different Azure services and base functionality (like
    Azure Resource Manager). You can find more information about the fundamentals
    of Azure REST API at `https://learn.microsoft.com/rest/api/azure`.


    Note

    You will see later in this book Azure SQL provides a unique method to integrate
    with REST API in Azure Services.


    Your API usage with Azure services most likely will be at a higher layer using
    programming languages such as .NET, Java, or Python. Or you may use the Azure
    Command-Line Interface (CLI) called `az` CLI. The `az` CLI is a cross-platform
    program used for many different types of operations across a wide variety of Azure
    services and core operations such as accounts and subscriptions. You can get all
    the latest information on the `az` CLI at `https://learn.microsoft.com/cli/azure/?view=azure-cli-latest`.
    The `az` CLI uses Azure REST APIs under the covers.


    Tip

    You can see a trace of Azure REST API from the `az` CLI by using the `--debug`
    option for any `az` CLI command.


    Azure also provides a series of `PowerShell` cmdlets for managing Azure services.
    You can go to the central hub for Azure PowerShell at `https://learn.microsoft.com/powershell/azure`.'
