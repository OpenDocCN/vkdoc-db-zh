  trans: '

    # Azure 指标


    您可以通过服务菜单中的“监控”选项获取 Azure 提供的丰富指标。默认情况下，您获得的是虚拟机主机的指标。但很可能，您需要的是虚拟机*内部*（即来宾）的指标。为此，您需要从虚拟机的服务菜单（而非
    SQL 虚拟机）中选择“诊断设置”，在虚拟机所在的同一区域预配一个新的 Azure 存储账户（有关如何快速创建一个的说明，请参阅以下指南：[`https://learn.microsoft.com/azure/storage/common/storage-account-create`](https://learn.microsoft.com/azure/storage/common/storage-account-create)），然后选择
    `启用来宾级监控`。


    启用来宾级监控后，系统会显示各种选项，包括为来宾 VM 添加特定计数器的功能。在“性能计数器”选项下，您可以选择 SQL Server 计数器。应用此设置后，您现在就可以使用门户服务菜单中的“指标”选项来查看基本指标，就像在虚拟机内使用
    Windows 性能监视器一样。以下是我虚拟机的示例，如图 3-30 所示。


    ![](img/496204_2_En_3_Fig30_HTML.jpg)


    图 3-30：虚拟机的 Azure 来宾 VM 指标


    您还可以从服务菜单中选择 `日志` 选项，通过使用 Kusto 查询语言 (KQL) 查询来查看 Azure 指标。这使您可以查看来自 Log Analytics
    的指标，这些指标的跨度可以超过门户中使用 Azure 指标默认的 14 天期限。了解更多，请访问 [`https://learn.microsoft.com/azure/azure-monitor/vm/tutorial-monitor-vm-guest#view-logs`](https://learn.microsoft.com/azure/azure-monitor/vm/tutorial-monitor-vm-guest%2523view-logs)。


    # 洞察


    当您选择了 `启用来宾级监控` 后，Azure Monitor 便开始在 Log Analytics 工作区中收集指标。通过从服务菜单中选择 `洞察` 选项，您可以查看这些指标的另一种可视化形式。您可以在图
    3-31 中看到这些指标的示例。


    ![](img/496204_2_En_3_Fig31_HTML.jpg)


    图 3-31：使用 Log Analytics 查看 Azure 虚拟机的洞察


    您可以更进一步，使用一个称为“工作簿”的概念，您可以在 [`https://learn.microsoft.com/azure/azure-monitor/vm/vminsights-workbooks`](https://learn.microsoft.com/azure/azure-monitor/vm/vminsights-workbooks)
    阅读更多相关内容。


    # 网络


    当我在本章前面部署 Azure 虚拟机时，在资源组中创建了多种类型的网络资源，包括虚拟网络、网络接口、公共 IP 地址和网络安全组。


    公共 IP 地址非常重要，因为它允许您使用远程桌面等工具连接到虚拟机。网络接口是 VM 与虚拟网络之间的互连。网络安全组 (NSG) 提供访问控制列表 (ACL)
    规则，用于允许或拒绝流向 VM 的网络流量（类似于防火墙）。您可以在 [`https://learn.microsoft.com/azure/virtual-network/network-overview#network-security-groups`](https://learn.microsoft.com/azure/virtual-network/network-overview%2523network-security-groups)
    阅读关于网络和 Azure 虚拟机的完整信息。


    之前，我使用远程桌面客户端 (RDP) 连接到虚拟机，该客户端使用了公共 IP 地址并访问了 RDP 端口 (3389)。您可能还想使用其他方法连接到虚拟机。


    我建议不要将 SQL Server 端口 1433 开放到公共 Internet。然而，这是将 SQL Server 客户端应用程序或工具（如 SSMS）连接到
    Azure 虚拟机中 SQL Server 实例的唯一方法，除非您在连接到 VM 虚拟网络的计算机上运行该应用程序或工具。一种实现方法是将该应用程序或另一个
    VM 部署在 Azure 中，并加入同一个 Azure 虚拟网络。您也可以部署在另一个 Azure 虚拟网络中，并设置一种称为虚拟网络对等互连的配置，您可以在
    [`https://learn.microsoft.com/azure/virtual-network/virtual-network-peering-overview`](https://learn.microsoft.com/azure/virtual-network/virtual-network-peering-overview)
    阅读相关信息。


    最后，您可能会发现需要将本地资源（如应用程序或其他计算机或虚拟机）连接到 Azure VM 的虚拟网络。您可以在 [`https://learn.microsoft.com/azure/architecture/reference-architectures/hybrid-networking`](https://learn.microsoft.com/azure/architecture/reference-architectures/hybrid-networking)
    阅读有关设置此类配置的更多详细信息。


    # 高可用性与灾难恢复


    无论您在何处部署 SQL Server，几乎所有人都会在某种程度上需要高可用性以及在必要时执行灾难恢复技术的能力。Azure 提供了多种方法来交付高可用性与灾难恢复的选择。


    ## Azure 存储


    在本章向您展示如何在 Azure 虚拟机中部署 SQL Server 的示例中，我使用了基于 Azure 存储的高级托管磁盘的 `数据磁盘`。默认情况下，托管磁盘具有内置的冗余功能，称为
    `本地冗余存储 (LRS)`。LRS 在数据中心区域内维护数据的三个副本。您可以在 [`https://learn.microsoft.com/azure/storage/common/storage-redundancy`](https://learn.microsoft.com/azure/storage/common/storage-redundancy)
    阅读更多关于 Azure 存储冗余的信息。您实际上可以使您的磁盘区域冗余，但由于数据不会跨区域复制，您可能会看到性能影响。

    '
- fmt: '### 备份


    由于您在 Azure 基础设施中运行 SQL Server，您无疑会希望将 SQL Server 数据库和事务日志的备份存储在 Azure 中。您可以使用
    T-SQL 将备份存储到使用托管磁盘的独立数据磁盘上。然而，另一个选项是利用 SQL Server 的 `backup to URL` 功能将备份存储到 Azure
    存储帐户。您可以在 [`https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`](https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url)
    阅读更多关于 SQL Server 备份到 URL 的信息。我之前提到过使用 Azure 门户的自动备份选项，该功能就使用了备份到 URL。使用 URL 备份的一个优势是，您可以将
    Azure 存储帐户配置为使用更高级别的可用性，称为 `geo-redundant storage (GRS)`。查看 Azure 存储帐户的服务级别协议
    (SLA) 请访问 [`https://www.microsoft.com/licensing/docs/view/Service-Level-Agreements-SLA-for-Online-Services`](https://www.microsoft.com/licensing/docs/view/Service-Level-Agreements-SLA-for-Online-Services%253Flang%253D1)。


    另一个选项是将 SQL Server 备份与 `Azure Backup` 服务集成。Azure Backup 提供基于流的服务，将 SQL Server
    备份到 Azure 存储。Azure Backup 涉及一个虚拟机扩展，该扩展将使用虚拟设备接口 (VDI) API 与 SQL Server 进行备份。在
    [`https://learn.microsoft.com/azure/backup/backup-azure-sql-database`](https://learn.microsoft.com/azure/backup/backup-azure-sql-database)
    阅读更多关于将 Azure Backup 与 SQL Server 配合使用的信息。


    Azure 中备份的最后一个选项使用 `file snapshot backups`。文件快照备份可以非常快。它们要求将 SQL Server 数据文件直接存储到
    Azure 存储帐户，而不是托管磁盘。您可以在 [`https://learn.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure`](https://learn.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure)
    阅读更多关于 Azure 中 SQL Server 文件快照备份的信息。


    另一个需要考虑的概念是 `Azure File Share`。Azure 文件共享就像您组织中可能有的网络文件共享，但可供任何虚拟机使用（想象一个基于 SMB
    的网络文件共享）。存储在此文件共享上的任何文件都是可用的，即使虚拟机不可用。Azure 文件共享的一个选项称为 `premium file share`，最多可支持
    100TB。


    提示


    由于您有连接到虚拟机的托管高性能磁盘，您也可以将数据库本地备份到其中一个磁盘（例如备份到 G: 盘）。但是，这些磁盘仅在连接到虚拟机时才可用。使用本节列出的其他方法，您可以独立于虚拟机的可用性来访问备份。


    ### 提升 Azure 可用性


    Azure 虚拟机是 Azure 基础设施的一部分，可在计划外和计划事件中提供可用性。例如，如果发生计划外硬件问题，Azure 可以使用实时迁移技术将您的虚拟机故障转移到健康的主机。Azure
    还可能更新您的虚拟机底层主机，这可能需要也可能不需要重启。您可以在 [`https://docs.microsoft.com/azure/virtual-machines/windows/manage-availability#understand-vm-reboots---maintenance-vs-downtime`](https://docs.microsoft.com/azure/virtual-machines/windows/manage-availability%2523understand-vm-reboots%252D%252D-maintenance-vs-downtime)
    阅读更多关于 Azure 虚拟机计划外和计划内停机时间的信息。


    Azure 提供了更多选项来进一步提高 Azure 虚拟机的高可用性，我在本书前面提到过，但值得重复一下：


    1.  `Availability Set` – 将您的虚拟机分散在同一数据中心内的多个故障域和更新域中。基本上，这确保您的虚拟机分布在不同的机架和交换机上。SLA
    为 99.95%。


    2.  `Availability Zone` – 可以将其视为在区域内的数据中心之间扩展一个可用性集。SLA 为 99.99%，但成本可能更高。


    不幸的是，您需要在部署时做出此选择。以后可以更改，但必须迁移您的虚拟机才能完成。


    如果您计划使用 HADR 解决方案（例如 Always On 故障转移群集实例或可用性组），则需要这些选择。对于单个虚拟机部署，使用这两种选项都没有意义。


    ### Always On 故障转移群集实例


    Always On 故障转移群集实例 (FCI) 通过共享存储为 SQL Server 提供高可用性。由于这是一个虚拟机，使用 FCI 将非常类似于正常的
    SQL Server。话虽如此，请考虑这些重要概念，以使 FCI 在 Azure 中的成功部署：


    *   您需要使用可用性集或可用性区部署群集中的任何虚拟机。


    *   对于群集的共享存储，请考虑 `Azure Shared Disks`。Azure 共享磁盘专为跨虚拟机共享托管磁盘（如群集场景）而设计。更多信息请参见
    [`https://learn.microsoft.com/azure/virtual-machines/disks-shared`](https://learn.microsoft.com/azure/virtual-machines/disks-shared)。


    *   每个 Windows 故障转移群集解决方案 (WFCS) 都需要一个见证人来仲裁。Azure 为云提供了一种特定类型的见证人，称为 `cloud witness`。可以将云见证视为一个托管的见证人。您创建云见证，它会处理您需要的一切。在后台，它使用一个虚拟机和
    Azure 存储。更多信息请访问 [`https://learn.microsoft.com/windows-server/failover-clustering/deploy-cloud-witness?tabs=windows#what-is-cloud-witness`](https://learn.microsoft.com/windows-server/failover-clustering/deploy-cloud-witness%253Ftabs%253Dwindows%2523what-is-cloud-witness)。


    *   您需要某种类型的网络抽象来处理侦听器。Azure 能够让您创建 `multi-subnet virtual network` 以避免对负载均衡器或分布式网络名称的需求。更多信息请访问
    [`https://learn.microsoft.com/sql/sql-server/failover-clusters/windows/sql-server-multi-subnet-clustering-sql-server`](https://learn.microsoft.com/sql/sql-server/failover-clusters/windows/sql-server-multi-subnet-clustering-sql-server)。


    要构建 FCI 的完整教程，请从这里开始，然后按照下一步操作每篇文章：[`https://learn.microsoft.com/sql/sql-server/failover-clusters/install/before-installing-failover-clustering`](https://learn.microsoft.com/sql/sql-server/failover-clusters/install/before-installing-failover-clustering)。'
  raw: '### Backups


    Since you are running SQL Server in the Azure infrastructure, you will no doubt
    want to store backups of SQL Server database and transaction logs within Azure.
    You could store your backups using T-SQL to a separate data disk using managed
    disks. However, another option is to store your backups to Azure Storage accounts
    using the *backup to URL* capability of SQL Server. You can read more about SQL
    Server backup to URL at [`https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`](https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url).
    I mentioned earlier the option of using automatic backups from the Azure Portal
    which uses backup to URL. An advantage of using URL backups is you can configure
    your Azure Storage account to use a higher level of availability called **geo-redundant
    storage (GRS)**. View the Service-Level Agreement (SLA) for Azure Storage accounts
    at [`https://www.microsoft.com/licensing/docs/view/Service-Level-Agreements-SLA-for-Online-Services`](https://www.microsoft.com/licensing/docs/view/Service-Level-Agreements-SLA-for-Online-Services%253Flang%253D1).


    Another option is to integrate backups for SQL Server with the **Azure Backup**
    service. Azure Backup offers a streaming-based service to back up SQL Server to
    Azure Storage. Azure Backup involves a VM extension that will use the Virtual
    Device Interface (VDI) APIs with SQL Server for backups. Read more about using
    Azure Backup with SQL Server at [`https://learn.microsoft.com/azure/backup/backup-azure-sql-database`](https://learn.microsoft.com/azure/backup/backup-azure-sql-database).


    The final option for backups in Azure uses **file snapshot backups**. File snapshot
    backups can be extremely fast. They require storing SQL Server data files directly
    to an Azure Storage account vs. a managed disk. You can read more about SQL Server
    file snapshot backups in Azure at [`https://learn.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure`](https://learn.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure).


    One other concept to consider is **Azure File Share**. Azure File Shares are like
    a network file share you might have in your organization but available to any
    virtual machine (think of an SMB-based network file share). Any file stored on
    this file share is available even if the VM is not available. An option with Azure
    File Shares is called a **premium file share**, which can support up to 100TB.


    Tip


    Since you have premium managed disk attached to the VM, you could also back up
    your databases to one of those disks locally (like backup to the G: drive). However,
    these disks are only available when attached to a VM. Using the other methods
    listed in this section allows you to access your backups independent of the VM
    being available.


    ### Go Further with Azure Availability


    Azure Virtual Machine is part of the Azure infrastructure that provides for availability
    during unplanned and planned events. For example, if an unplanned hardware problem
    occurs, Azure can use live migration technologies to failover your virtual machine
    to a healthy host. Azure also may update the underlying hosts of your virtual
    machine which may or may not require a reboot. You can read more about unplanned
    and planned downtime for Azure Virtual Machines at [`https://docs.microsoft.com/azure/virtual-machines/windows/manage-availability#understand-vm-reboots---maintenance-vs-downtime`](https://docs.microsoft.com/azure/virtual-machines/windows/manage-availability%2523understand-vm-reboots%252D%252D-maintenance-vs-downtime).


    Azure offers more options to go further with high availability for Azure Virtual
    Machines which I’ve mentioned earlier in this book but worth repeating:


    1.  **Availability Set** – Spreads your VMs across multiple fault and update domains
    in the same data center. Basically, this makes sure your VMs are spread across
    different racks and switches. The SLA is 99.95%.


    2.  **Availability Zone** – Think of this as spreading an Availability Set across
    data centers within a region. The SLA is 99.99% but can cost more.


    Unfortunately, you need to make this choice when you deploy. You can change it
    later, but you must migrate your VM to do it.


    These choices are required if you plan to use an HADR solution such as an Always
    On Failover Cluster Instance or Availability Group. It does not make sense to
    use either of these options for a single VM deployment.


    ### Always On Failover Cluster Instance


    An Always On Failover Cluster Instance (FCI) provides high availability for SQL
    Server through shared storage. Since this is a virtual machine, using an FCI will
    be very much like a normal SQL Server. Having said that, consider these important
    concepts to use to make the deployment of an FCI successful in Azure:


    *   You will need to deploy any VM in the cluster using an Availability Set or
    Availability Zone.


    *   For shared storage for the cluster, consider **Azure Shared Disks**. Azure
    Shared Disks are specifically designed to share managed disks across virtual machines
    for scenarios like clusters. See more at [`https://learn.microsoft.com/azure/virtual-machines/disks-shared`](https://learn.microsoft.com/azure/virtual-machines/disks-shared).


    *   Every Windows Failover Cluster Solution (WFCS) needs a witness for quorum.
    Azure provides a specific type of witness for the cloud called a **cloud witness**.
    Think of a cloud witness as a *managed witness*. You create the cloud witness,
    and it handles everything you need. Behind the scenes, it uses a VM and Azure
    Storage. Learn more at [`https://learn.microsoft.com/windows-server/failover-clustering/deploy-cloud-witness?tabs=windows#what-is-cloud-witness`](https://learn.microsoft.com/windows-server/failover-clustering/deploy-cloud-witness%253Ftabs%253Dwindows%2523what-is-cloud-witness).


    *   You need some type of network abstraction for listeners. Azure has the ability
    for you to create a **multi-subnet virtual network** to avoid the need for load
    balancers or distributed network names. Learn more at [`https://learn.microsoft.com/sql/sql-server/failover-clusters/windows/sql-server-multi-subnet-clustering-sql-server`](https://learn.microsoft.com/sql/sql-server/failover-clusters/windows/sql-server-multi-subnet-clustering-sql-server).


    For a complete tutorial to build an FCI, start here and then follow the next step
    with each article: [`https://learn.microsoft.com/sql/sql-server/failover-clusters/install/before-installing-failover-clustering`](https://learn.microsoft.com/sql/sql-server/failover-clusters/install/before-installing-failover-clustering).'
  trans: '

    ### 备份


    由于您在 Azure 基础设施中运行 SQL Server，您无疑会希望将 SQL Server 数据库和事务日志的备份存储在 Azure 中。您可以使用
    T-SQL 将备份存储到使用托管磁盘的独立数据磁盘上。然而，另一个选项是利用 SQL Server 的 `backup to URL` 功能将备份存储到 Azure
    存储帐户。您可以在 [`https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`](https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url)
    阅读更多关于 SQL Server 备份到 URL 的信息。我之前提到过使用 Azure 门户的自动备份选项，该功能就使用了备份到 URL。使用 URL 备份的一个优势是，您可以将
    Azure 存储帐户配置为使用更高级别的可用性，称为 `geo-redundant storage (GRS)`。查看 Azure 存储帐户的服务级别协议
    (SLA) 请访问 [`https://www.microsoft.com/licensing/docs/view/Service-Level-Agreements-SLA-for-Online-Services`](https://www.microsoft.com/licensing/docs/view/Service-Level-Agreements-SLA-for-Online-Services%253Flang%253D1)。


    另一个选项是将 SQL Server 备份与 `Azure Backup` 服务集成。Azure Backup 提供基于流的服务，将 SQL Server
    备份到 Azure 存储。Azure Backup 涉及一个虚拟机扩展，该扩展将使用虚拟设备接口 (VDI) API 与 SQL Server 进行备份。在
    [`https://learn.microsoft.com/azure/backup/backup-azure-sql-database`](https://learn.microsoft.com/azure/backup/backup-azure-sql-database)
    阅读更多关于将 Azure Backup 与 SQL Server 配合使用的信息。


    Azure 中备份的最后一个选项使用 `file snapshot backups`。文件快照备份可以非常快。它们要求将 SQL Server 数据文件直接存储到
    Azure 存储帐户，而不是托管磁盘。您可以在 [`https://learn.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure`](https://learn.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure)
    阅读更多关于 Azure 中 SQL Server 文件快照备份的信息。


    另一个需要考虑的概念是 `Azure File Share`。Azure 文件共享就像您组织中可能有的网络文件共享，但可供任何虚拟机使用（想象一个基于 SMB
    的网络文件共享）。存储在此文件共享上的任何文件都是可用的，即使虚拟机不可用。Azure 文件共享的一个选项称为 `premium file share`，最多可支持
    100TB。


    提示


    由于您有连接到虚拟机的托管高性能磁盘，您也可以将数据库本地备份到其中一个磁盘（例如备份到 G: 盘）。但是，这些磁盘仅在连接到虚拟机时才可用。使用本节列出的其他方法，您可以独立于虚拟机的可用性来访问备份。


    ### 提升 Azure 可用性


    Azure 虚拟机是 Azure 基础设施的一部分，可在计划外和计划事件中提供可用性。例如，如果发生计划外硬件问题，Azure 可以使用实时迁移技术将您的虚拟机故障转移到健康的主机。Azure
    还可能更新您的虚拟机底层主机，这可能需要也可能不需要重启。您可以在 [`https://docs.microsoft.com/azure/virtual-machines/windows/manage-availability#understand-vm-reboots---maintenance-vs-downtime`](https://docs.microsoft.com/azure/virtual-machines/windows/manage-availability%2523understand-vm-reboots%252D%252D-maintenance-vs-downtime)
    阅读更多关于 Azure 虚拟机计划外和计划内停机时间的信息。


    Azure 提供了更多选项来进一步提高 Azure 虚拟机的高可用性，我在本书前面提到过，但值得重复一下：


    1.  `Availability Set` – 将您的虚拟机分散在同一数据中心内的多个故障域和更新域中。基本上，这确保您的虚拟机分布在不同的机架和交换机上。SLA
    为 99.95%。


    2.  `Availability Zone` – 可以将其视为在区域内的数据中心之间扩展一个可用性集。SLA 为 99.99%，但成本可能更高。


    不幸的是，您需要在部署时做出此选择。以后可以更改，但必须迁移您的虚拟机才能完成。


    如果您计划使用 HADR 解决方案（例如 Always On 故障转移群集实例或可用性组），则需要这些选择。对于单个虚拟机部署，使用这两种选项都没有意义。


    ### Always On 故障转移群集实例


    Always On 故障转移群集实例 (FCI) 通过共享存储为 SQL Server 提供高可用性。由于这是一个虚拟机，使用 FCI 将非常类似于正常的
    SQL Server。话虽如此，请考虑这些重要概念，以使 FCI 在 Azure 中的成功部署：


    *   您需要使用可用性集或可用性区部署群集中的任何虚拟机。


    *   对于群集的共享存储，请考虑 `Azure Shared Disks`。Azure 共享磁盘专为跨虚拟机共享托管磁盘（如群集场景）而设计。更多信息请参见
    [`https://learn.microsoft.com/azure/virtual-machines/disks-shared`](https://learn.microsoft.com/azure/virtual-machines/disks-shared)。


    *   每个 Windows 故障转移群集解决方案 (WFCS) 都需要一个见证人来仲裁。Azure 为云提供了一种特定类型的见证人，称为 `cloud witness`。可以将云见证视为一个托管的见证人。您创建云见证，它会处理您需要的一切。在后台，它使用一个虚拟机和
    Azure 存储。更多信息请访问 [`https://learn.microsoft.com/windows-server/failover-clustering/deploy-cloud-witness?tabs=windows#what-is-cloud-witness`](https://learn.microsoft.com/windows-server/failover-clustering/deploy-cloud-witness%253Ftabs%253Dwindows%2523what-is-cloud-witness)。


    *   您需要某种类型的网络抽象来处理侦听器。Azure 能够让您创建 `multi-subnet virtual network` 以避免对负载均衡器或分布式网络名称的需求。更多信息请访问
    [`https://learn.microsoft.com/sql/sql-server/failover-clusters/windows/sql-server-multi-subnet-clustering-sql-server`](https://learn.microsoft.com/sql/sql-server/failover-clusters/windows/sql-server-multi-subnet-clustering-sql-server)。


    要构建 FCI 的完整教程，请从这里开始，然后按照下一步操作每篇文章：[`https://learn.microsoft.com/sql/sql-server/failover-clusters/install/before-installing-failover-clustering`](https://learn.microsoft.com/sql/sql-server/failover-clusters/install/before-installing-failover-clustering)。

    '
- fmt: '### Always On Availability Groups


    `Always On Availability Groups` (AG) 通过使用副本提高了您的高可用性 `RPO`（恢复点目标）和 `RTO`（恢复时间目标）。它是
    SQL Server 的旗舰级 `HADR` 功能，采用非共享存储概念与副本。


    我们知道在 Azure 上设置 AG 可能是一个艰巨的过程。事实上，在 Windows 上设置带有自动故障转移的 AG 的完整教程记录在 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-manually-configure-tutorial-single-subnet`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-manually-configure-tutorial-single-subnet)。


    幸运的是，我们的团队在 Azure 门户中构建了一种新体验来简化此过程。假设您首先设置了一个 Windows 域控制器和虚拟网络，然后使用新的 Azure
    门户体验来部署解决方案的其余部分，包括故障转移群集和 AG。


    如果您还记得本章前面的内容，我向您展示了选择 Azure SQL 解决方案的体验，如图 [3-32](#496204_2_En_3_Chapter.xhtml#Fig32)
    所示。


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig32_HTML.jpg)


    图 3-32


    部署 SQL Azure 虚拟机时选择 HA 选项


    请注意这里的高可用性选择。选择您的映像并单击“创建”后，您将拥有与本章前面类似的体验，不同之处在于您现在可以选择部署`多个虚拟机`并配置您的集群和 AG。


    例如，如图 [3-33](#496204_2_En_3_Chapter.xhtml#Fig33) 所示，您可以在“基础”屏幕中选择部署多个虚拟机。


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig33_HTML.jpg)


    图 3-33


    部署 SQL HA 的基础配置


    在“网络”屏幕中，您可以设置多子网，包括侦听器 IP 地址。还请注意 `WSFC` 和凭据的选项。当您选择“SQL Server 设置”时，您现在可以选择配置要部署的
    AG，如图 [3-34](#496204_2_En_3_Chapter.xhtml#Fig34) 所示。


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig34_HTML.jpg)


    图 3-34


    用于为 SQL Server Azure 虚拟机配置 AG 的 SQL Server 设置


    要了解完整的体验，请参阅 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-azure-portal-configure`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-azure-portal-configure)。


    另一个要考虑的场景是从本地 AG 主副本设置 Azure 中的 AG 辅助副本。您可以在 [`https://learn.microsoft.com/previous-versions/azure/virtual-machines/windows/sqlclassic/virtual-machines-windows-classic-sql-onprem-availability`](https://learn.microsoft.com/previous-versions/azure/virtual-machines/windows/sqlclassic/virtual-machines-windows-classic-sql-onprem-availability)
    获取有关如何设置此场景的更多指导。如果您将异步辅助副本设置为*被动*，则可以将此虚拟机标记为 `HA` 目的并避免 SQL 许可成本。


    ### SQL Server and Linux High Availability


    SQL Server on Linux 通过数据库引擎支持 `Always On Failover Cluster Instance` 和 `Availability
    Groups` 功能。自动故障转移功能通常通过 `Pacemaker`、`DH2i` 或 `HPE ServiceGuard` 等 Linux 包来支持。


    要了解在 Linux 上部署 `Always On Availability Group` 的完整说明，请参阅 [`https://learn.microsoft.com/sql/linux/sql-server-linux-availability-group-ha`](https://learn.microsoft.com/sql/linux/sql-server-linux-availability-group-ha)。


    ## Microsoft Innovations and Azure Boost


    Microsoft 一直在致力于改进托管 Azure 虚拟机的基础结构。其中一项创新被称为 **Azure Boost**。


    `Azure Boost` 是由 Microsoft 设计的系统，它将传统上由虚拟机监控程序和主机操作系统执行的服务器虚拟化过程卸载到专用的软件和硬件上。


    `Azure Boost` 的一大优点是，您只需要选择支持 Boost 的虚拟机大小（可以在 [`https://learn.microsoft.com/azure/azure-boost/overview#current-availability`](https://learn.microsoft.com/azure/azure-boost/overview%2523current-availability)
    找到），所有优势都会在主机上自动交付。


    使用支持 `Boost` 的虚拟机大小的主要好处包括更快的网络、延迟更低的更快存储、更高的 `IOPS/`吞吐量、更安全的主机，以及由于 `CPU` 资源可以更专用于来宾虚拟机而带来的更高性能。所有详细信息请访问
    [`https://aka.ms/azureboost`](https://aka.ms/azureboost)。


    ## Summary


    在本章中，您学习了如何使用 Azure 虚拟机部署和配置 SQL Server，了解了部署过程中的许多不同选项。您还学习了与 SQL Server 和 Azure
    虚拟机相关的安全性、性能和 `HADR` 的独特方面。Azure 虚拟机为运行 SQL Server 提供了出色的基础结构，是将 SQL Server 迁移到云端的最简单方式。


    通过完成我的 SQL 专业人员云 workshop GitHub 仓库 ([`https://aka.ms/cloudsqlworkshop`](https://aka.ms/cloudsqlworkshop))
    中的以下实验，检验您对本章所学知识的掌握程度：


    [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/03_Deploy_SQL_AzureVM`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/03_Deploy_SQL_AzureVM)


    [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/04_Manage_and_Optimize_SQL_AzureVM`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/04_Manage_and_Optimize_SQL_AzureVM)


    现在您已经学习了 Azure 虚拟机上的 SQL Server，接下来将向您展示如何部署和配置 Azure SQL Database 和 Managed Instance。


    # 4. Deploying Azure SQL


    部署 Azure SQL Managed Instance 或 Database 与部署 SQL Server on Azure Virtual Machine
    的体验不同但相似。相同之处在于您可以使用 Azure 门户和 `CLI`。不同之处在于 Azure *管理着虚拟机*和基础结构，因此您不必担心为虚拟机选择的几个选项。


    在本章中，您将学习部署和连接到 Azure SQL Managed Instance 和 Database 的选项与过程。您还将学习将现有数据库迁移到 Azure
    SQL 的选项。此外，您将了解用于托管 Azure SQL Managed Instance 和 Database 的架构的一些实现细节。


    您可以选择跟随本章中的示例操作。完成这些示例需要满足以下条件：


    *   一个 Azure 订阅。

    *   至少具有该 Azure 订阅的“参与者”角色访问权限。您可以在 [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles)
    阅读有关 Azure 内置角色的更多信息。

    *   访问 Azure 门户（Web 或 Windows 应用程序）。

    *   安装 `az` `CLI`（有关更多详细信息，请参阅 [`https://learn.microsoft.com/cli/azure/install-azure-cli`](https://learn.microsoft.com/cli/azure/install-azure-cli)）。您也可以使用
    Azure Cloud Shell，因为 `az` 已经安装。您可以在 [`https://azure.microsoft.com/get-started/azure-portal/cloud-shell`](https://azure.microsoft.com/get-started/azure-portal/cloud-shell)
    阅读有关 Azure Cloud Shell 的更多信息。

    *   您将在本章中运行一些 `T-SQL`，因此请安装一个工具，例如 `SQL Server Management Studio` (`SSMS`)，地址为
    [`https://aka.ms/ssms`](https://aka.ms/ssms)。


    在本章末尾，我还提供了您可以进行的自学实验链接。'
  raw: '### Always On Availability Groups


    Always On Availability Groups (AG) increase your high availability RPO (Recovery
    Point Objective) and RTO (Recovery Time Object) using replicas. It is the flagship
    HADR capability for SQL Server using a non-shared storage concept with replicas.


    We know that setting up an AG on Azure can be a daunting process. In fact, the
    complete tutorial to set up an AG with auto failover on Windows is documented
    at [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-manually-configure-tutorial-single-subnet`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-manually-configure-tutorial-single-subnet).


    Fortunately, our team built a new experience in the Azure Portal to make this
    easier. Assuming you first set up a Windows Domain Controller and a virtual network
    and then use a new Azure portal experience to deploy the rest of the solution,
    including failover clustering and an AG.


    If you can remember earlier in the chapter, I showed you the experience to pick
    an Azure SQL solution like in Figure [3-32](#496204_2_En_3_Chapter.xhtml#Fig32).


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig32_HTML.jpg)


    Figure 3-32


    Choosing the HA option when deploying a SQL Azure VM


    Notice the selection of high availability here. After picking your image choice
    and selecting Create, you will have a similar experience as I have shown you earlier
    in this chapter, except now you have choices to deploy *multiple VMs* and configure
    your cluster and AG.


    For example, as you can see in Figure [3-33](#496204_2_En_3_Chapter.xhtml#Fig33),
    you have choices in the Basics screen to deploy multiple VMs.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig33_HTML.jpg)


    Figure 3-33


    Basics for deploying a SQL HA deployment


    In the Networking screen, you have options to set up a multi-subnet, including
    Listener IP addresses. Notice also an option for WSFC and Credentials. When you
    select SQL Server Settings, you now have options to configure the AG to deploy
    as you see in Figure [3-34](#496204_2_En_3_Chapter.xhtml#Fig34).


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig34_HTML.jpg)


    Figure 3-34


    SQL Server Settings to configure an AG for SQL Server Azure VM


    To go through this complete experience, see [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-azure-portal-configure`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-azure-portal-configure).


    One other scenario to consider is to set up a secondary replica for an AG in Azure
    from an on-premises AG primary replica. You can get more guidance on how to set
    this up at [`https://learn.microsoft.com/previous-versions/azure/virtual-machines/windows/sqlclassic/virtual-machines-windows-classic-sql-onprem-availability`](https://learn.microsoft.com/previous-versions/azure/virtual-machines/windows/sqlclassic/virtual-machines-windows-classic-sql-onprem-availability).
    And if you set up an async secondary replica to be *passive*, you can tag this
    VM for HA purposes and avoid SQL licensing costs.


    ### SQL Server and Linux High Availability


    SQL Server on Linux supports Always On Failover Cluster Instance and Availability
    Groups functionality through the database engine. Automatic failover capabilities
    are often supported through Linux packages like Pacemaker, DH2i, or HPE ServiceGuard.


    To see the complete story of deploying an Always On Availability Group on Linux,
    see [`https://learn.microsoft.com/sql/linux/sql-server-linux-availability-group-ha`](https://learn.microsoft.com/sql/linux/sql-server-linux-availability-group-ha).


    ## Microsoft Innovations and Azure Boost


    Microsoft is always looking to improve the infrastructure that hosts Azure Virtual
    Machines. One of these innovations is called **Azure Boost**.


    Azure Boost is a system designed by Microsoft that offloads server virtualization
    processes traditionally performed by the hypervisor and host OS onto purpose-built
    software and hardware.


    The great thing about Azure Boost is that you just need to choose a virtual machine
    size that supports Boost (which you can find at [`https://learn.microsoft.com/azure/azure-boost/overview#current-availability`](https://learn.microsoft.com/azure/azure-boost/overview%2523current-availability)),
    and all the goodness is delivered behind the scenes on hosts.


    The main benefits of using a virtual machine size that supports Boost are faster
    networking, faster storage with lower latency, higher IOPS/throughput, a more
    secure host, and higher performance because CPU resources can be more dedicated
    to the guest virtual machines. Geek out on all the details at [`https://aka.ms/azureboost`](https://aka.ms/azureboost).


    ## Summary


    You have learned in this chapter how to deploy and configure SQL Server with Azure
    Virtual Machine looking at many different options as part of deployment. You have
    also learned unique aspects of security, performance, and HADR related to SQL
    Server and Azure VM. Azure VM provides a great infrastructure for running SQL
    Server and is the easiest way to migrate your SQL Server to the cloud.


    Try out your knowledge of what you have learned in this chapter by going through
    the following labs in my Cloud Workshop for the SQL Professional GitHub repo ([`https://aka.ms/cloudsqlworkshop`](https://aka.ms/cloudsqlworkshop)):


    [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/03_Deploy_SQL_AzureVM`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/03_Deploy_SQL_AzureVM)


    [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/04_Manage_and_Optimize_SQL_AzureVM`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/04_Manage_and_Optimize_SQL_AzureVM)


    Now that you have studied SQL Server on Azure VM, it is time to show you how to
    deploy and configure Azure SQL Database and Managed Instance.


    # 4. Deploying Azure SQL


    Deploying an Azure SQL Managed Instance or Database is a different but similar
    experience than deploying SQL Server on Azure Virtual Machine. The experience
    is the same because you can use the Azure portal and CLI. The difference is that
    Azure is *managing the virtual machine* and infrastructure, so there are several
    of the options you pick for a virtual machine you do not have to worry about.


    In this chapter, you will learn the options and process to deploy and connect
    to an Azure SQL Managed Instance and Database. You will also learn the options
    to migrate existing databases into Azure SQL. In addition, you will learn some
    implementation details of the architecture used to host Azure SQL Managed Instances
    and Databases.


    You have the option to follow along with the examples in this chapter. You will
    need the following to complete these examples:


    *   An Azure subscription.


    *   A minimum of Contributor role access to the Azure subscription. You can read
    more about Azure built-in roles at [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles).


    *   Access to the Azure Portal (web or Windows application).


    *   Installation of the **az** CLI (see [`https://learn.microsoft.com/cli/azure/install-azure-cli`](https://learn.microsoft.com/cli/azure/install-azure-cli)
    for more details). You can also use the Azure Cloud Shell instead since az is
    already installed. You can read more about the Azure Cloud Shell at [`https://azure.microsoft.com/get-started/azure-portal/cloud-shell`](https://azure.microsoft.com/get-started/azure-portal/cloud-shell).


    *   You will run some T-SQL in this chapter, so install a tool like SQL Server
    Management Studio (SSMS) at [`https://aka.ms/ssms`](https://aka.ms/ssms).


    I also have a link to self-paced labs you can go through at the end of this chapter.'
  trans: '### Always On 可用性组


    `Always On 可用性组` (AG) 通过使用副本提高了您的高可用性 `RPO`（恢复点目标）和 `RTO`（恢复时间目标）。它是 SQL Server
    旗舰级的 `HADR` 功能，采用非共享存储概念与副本。


    我们知道在 Azure 上设置 AG 可能是一个艰巨的过程。事实上，在 Windows 上设置带有自动故障转移的 AG 的完整教程记录在 [`《在 Windows
    上手动配置 Always On 可用性组（单子网）教程》`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-manually-configure-tutorial-single-subnet)。


    幸运的是，我们的团队在 Azure 门户中构建了一种新体验来简化此过程。假设您首先设置了一个 Windows 域控制器和虚拟网络，然后使用新的 Azure
    门户体验来部署解决方案的其余部分，包括故障转移群集和 AG。


    如果您还记得本章前面的内容，我向您展示了选择 Azure SQL 解决方案的体验，如图 3-32 所示。


    ![](img/496204_2_En_3_Fig32_HTML.jpg)


    图 3-32


    部署 SQL Azure 虚拟机时选择 HA 选项


    请注意这里的高可用性选择。选择您的映像并单击“创建”后，您将拥有与本章前面类似的体验，不同之处在于您现在可以选择部署`多个虚拟机`并配置您的集群和 AG。


    例如，如图 3-33 所示，您可以在“基础”屏幕中选择部署多个虚拟机。


    ![](img/496204_2_En_3_Fig33_HTML.jpg)


    图 3-33


    部署 SQL HA 的基础配置


    在“网络”屏幕中，您可以设置多子网，包括侦听器 IP 地址。还请注意 `WSFC` 和凭据的选项。当您选择“SQL Server 设置”时，您现在可以选择配置要部署的
    AG，如图 3-34 所示。


    ![](img/496204_2_En_3_Fig34_HTML.jpg)


    图 3-34


    用于为 SQL Server Azure 虚拟机配置 AG 的 SQL Server 设置


    要了解完整的体验，请参阅 [`《在 Azure 门户中配置 Always On 可用性组》`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-azure-portal-configure)。


    另一个要考虑的场景是从本地 AG 主副本设置 Azure 中的 AG 辅助副本。您可以在 [`《从本地配置 Azure 虚拟机 SQL Server 可用性组》`](https://learn.microsoft.com/previous-versions/azure/virtual-machines/windows/sqlclassic/virtual-machines-windows-classic-sql-onprem-availability)
    获取有关如何设置此场景的更多指导。如果您将异步辅助副本设置为*被动*，则可以将此虚拟机标记为 `HA` 目的并避免 SQL 许可成本。


    ### SQL Server 与 Linux 高可用性


    Linux 上的 SQL Server 通过数据库引擎支持 `Always On 故障转移群集实例` 和 `可用性组` 功能。自动故障转移功能通常通过 `Pacemaker`、`DH2i`
    或 `HPE ServiceGuard` 等 Linux 包来支持。


    要了解在 Linux 上部署 `Always On 可用性组` 的完整说明，请参阅 [`《在 Linux 上为 SQL Server 配置高可用性可用性组》`](https://learn.microsoft.com/sql/linux/sql-server-linux-availability-group-ha)。


    ## Microsoft 创新与 Azure Boost


    Microsoft 一直在致力于改进托管 Azure 虚拟机的基础结构。其中一项创新被称为 **Azure Boost**。


    `Azure Boost` 是由 Microsoft 设计的系统，它将传统上由虚拟机监控程序和主机操作系统执行的服务器虚拟化过程卸载到专用的软件和硬件上。


    `Azure Boost` 的一大优点是，您只需要选择支持 Boost 的虚拟机大小（可以在 [`《Azure Boost 概述 - 当前可用性》`](https://learn.microsoft.com/azure/azure-boost/overview%2523current-availability)
    找到），所有优势都会在主机上自动交付。


    使用支持 `Boost` 的虚拟机大小的主要好处包括更快的网络、延迟更低的更快存储、更高的 `IOPS/`吞吐量、更安全的主机，以及由于 `CPU` 资源可以更专用于来宾虚拟机而带来的更高性能。所有详细信息请访问
    [`https://aka.ms/azureboost`](https://aka.ms/azureboost)。


    ## 本章摘要


    在本章中，您学习了如何使用 Azure 虚拟机部署和配置 SQL Server，了解了部署过程中的许多不同选项。您还学习了与 SQL Server 和 Azure
    虚拟机相关的安全性、性能和 `HADR` 的独特方面。Azure 虚拟机为运行 SQL Server 提供了出色的基础结构，是将 SQL Server 迁移到云端的最简单方式。


    通过完成我的 SQL 专业人员云 workshop GitHub 仓库 ([`https://aka.ms/cloudsqlworkshop`](https://aka.ms/cloudsqlworkshop))
    中的以下实验，检验您对本章所学知识的掌握程度：


    [`《实验 03：在 Azure 虚拟机上部署 SQL Server》`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/03_Deploy_SQL_AzureVM)


    [`《实验 04：管理与优化 Azure 虚拟机上的 SQL Server》`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/04_Manage_and_Optimize_SQL_AzureVM)


    现在您已经学习了 Azure 虚拟机上的 SQL Server，接下来将向您展示如何部署和配置 Azure SQL Database 和 Managed Instance。


    # 4. 部署 Azure SQL


    部署 Azure SQL Managed Instance 或 Database 与部署 SQL Server on Azure Virtual Machine
    的体验不同但相似。相同之处在于您可以使用 Azure 门户和 `CLI`。不同之处在于 Azure *管理着虚拟机*和基础结构，因此您不必担心为虚拟机选择的几个选项。


    在本章中，您将学习部署和连接到 Azure SQL Managed Instance 和 Database 的选项与过程。您还将学习将现有数据库迁移到 Azure
    SQL 的选项。此外，您将了解用于托管 Azure SQL Managed Instance 和 Database 的架构的一些实现细节。


    您可以选择跟随本章中的示例操作。完成这些示例需要满足以下条件：


    *   一个 Azure 订阅。

    *   至少具有该 Azure 订阅的“参与者”角色访问权限。您可以在 [`《Azure 内置角色》`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles)
    阅读有关 Azure 内置角色的更多信息。

    *   访问 Azure 门户（Web 或 Windows 应用程序）。

    *   安装 `az` `CLI`（有关更多详细信息，请参阅 [`《安装 Azure CLI》`](https://learn.microsoft.com/cli/azure/install-azure-cli)）。您也可以使用
    Azure Cloud Shell，因为 `az` 已经安装。您可以在 [`《Azure Cloud Shell 入门》`](https://azure.microsoft.com/get-started/azure-portal/cloud-shell)
    阅读有关 Azure Cloud Shell 的更多信息。

    *   您将在本章中运行一些 `T-SQL`，因此请安装一个工具，例如 `SQL Server Management Studio` (`SSMS`)，地址为
    [`https://aka.ms/ssms`](https://aka.ms/ssms)。


    在本章末尾，我还提供了您可以进行的自学实验链接。'
- fmt: '## Pre-deployment Planning


    Before you jump into deploying an Azure SQL Database or Managed Instance, I recommend
    you spend some time doing some pre-deployment planning. Reviewing your choices
    and making a few informed decisions will save you time and effort.


    ### New Deployment or Migration


    One of the first decisions to make is whether you plan to migrate an existing
    database or instance or deploy a new database or instance. The process of deploying
    will be the same, but migrating implies you need to assess your current SQL Server
    instance, database, or other database environments before you deploy. Your assessment
    will give you guidance on what type of deployment choice you need to make based
    on your current requirements. You must decide what possible changes must be made
    to your application, schema, scripts, or other aspects to your current deployment
    with SQL Server or other database platforms. You also must consider how to migrate
    your actual data into the new deployment. This chapter will include sections specifically
    geared around what consideration and tools you can use to migrate to Azure SQL
    Managed Instance and Database. Here are some great resources for you to consider
    as you think about migration:


    *   `Azure cloud migration and modernization center` – Here is a central resource
    of information and access to Microsoft experts to migrate any resources to Azure.
    Check out [`https://azure.microsoft.com/solutions/migration`](https://azure.microsoft.com/solutions/migration).


    *   `The Microsoft Data Migration Guide` – Get step-by-step guidance on migrating
    to Azure for any type of data. Learn more at [`https://aka.ms/datamigration`](https://aka.ms/datamigration).


    *   `SQL Server enabled by Azure Arc migration assessment` – In preview at the
    time of the writing of this book, this capability allows you to connect your existing
    SQL Server to Azure with Arc and get a `continuous` assessment on what is the
    best solution to migrate to Azure, including resource (sizing) recommendations.
    Learn more at [`https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment`](https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment).


    *   `Azure Database Migration Service (DMS)` – This Azure service will allow to
    perform both offline and online migrations to Azure SQL Managed Instance and Database
    (offline only). Learn more at [`https://learn.microsoft.com/azure/dms/dms-overview`](https://learn.microsoft.com/azure/dms/dms-overview).


    *   `Azure Migrate` – Use this service to assess and migrate (using DMS) at `scale`.
    Learn more at [`https://aka.ms/azuremigrate`](https://aka.ms/azuremigrate).


    *   `Managed Instance link` – While DMS provides an online migration solution,
    it uses a log shipping approach. A possible better online migration path is Azure
    SQL Managed Instance link. This allows you to migrate a SQL Server 2016, 2019,
    or 2022 instance to Azure SQL Managed Instance using the power of Always On Availability
    Groups. Learn more at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-feature-overview?view=azuresql#migrate-to-azure`](https://learn.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-feature-overview%253Fview%253Dazuresql%2523migrate-to-azure).


    ### Making Deployment Choices


    Whether you are migrating or creating a new deployment, you have several choices
    to make that are worth the time to plan out. Chapter [2](#496204_2_En_2_Chapter.xhtml)
    of this book is invaluable to go back and read as it describes choices and differences
    between Azure SQL Managed Instance and Azure SQL Database.


    Having said that, let us review some important choices at a high level that can
    affect your decision-making:


    *   If you need SQL Server instance features like SQL Server Agent, Database Mail,
    and cross-database queries, Managed Instance is the choice you need to make.


    *   If your database size is > 32TB, `your only choice` as of the time of writing
    this book is Azure SQL Database Hyperscale.


    Past these two choices, either Azure SQL Managed Instance or Database likely meets
    your needs. However, as I called out in Chapter [2](#496204_2_En_2_Chapter.xhtml)
    of the book, there can be advantages in using Azure SQL Database because Microsoft
    will manage both the infrastructure and the SQL Server instance to let you focus
    on the database. Furthermore, Azure SQL Database can offer you more options such
    as Serverless compute and elastic pools.


    The options you will pick as you deploy a Managed Instance or Database can be
    thought of the following as listed in Figure [4-1](#496204_2_En_4_Chapter.xhtml#Fig1)
    (credits to my colleague Anna Hoffman for this diagram).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Deployment choices for Azure SQL


    #### Deploying for Free


    If you are looking for ways to deploy Azure SQL for free for development or proof
    of concept (POC) scenarios, consider the following options:


    ##### The Azure SQL Managed Instance Free Trial


    I have heard so many customers ask me how they can do tests for Azure SQL Managed
    Instance to migrate a SQL Server without having to spend a lot of money. We now
    have a free 12-month trial for Azure SQL Managed Instance to now give you this
    capability. This is available for any Azure subscription. Learn more at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/free-offer`](https://learn.microsoft.com/azure/azure-sql/managed-instance/free-offer).


    ##### The Azure SQL Database Free Offer


    SQL Server Developer Edition is so popular because developers can develop and
    test their application for free. We now have a similar option for Azure SQL Database,
    and it is not a trial. For the lifetime of your Azure subscription, you can now
    deploy a free Azure SQL Database. Learn more at [`https://aka.ms/freedboffer`](https://aka.ms/freedboffer).'
