  trans: '

    ### 新版本、DTU 与预览版


    独立于新的 V12 架构，我们也意识到 Azure SQL Database 当前的版本——Web 版和商业版——无论从计费模式，还是从可预测性能与选择的角度来看，都已过时。


    在 Sterling 项目启动之前就已开始的服务等级目标（SLO）工作，最终催生了一个名为 `高级版（Premium）` 的新版预览。在某些情况下，高级版客户会被隔离到单个节点，以提供最大性能。结合
    Sterling 架构，资源预留和节点隔离的概念为新版本套件以及一种可自主选择 `规模（sizes）` 的自助方法铺平了道路。


    2014 年 4 月，我们宣布了一种基于新版本的定价模型，包括 `基础版（Basic）`、`标准版（Standard）` 和 `高级版（Premium）`，以及一个用于具体化规模的概念，称为
    `性能层级（performance tiers）`。性能层级在版本内提供了粒度，以定义最大的数据库大小和 SLO。为了支持 SLO，我们引入了一个新概念，即
    `数据库事务单元（DTU）`。我们在 2014 年 4 月以这些版本和层级的预览启动了这个新模型。到那时，我们已允许高级版最大达到 500GB。


    请参阅 Scott Guthrie 介绍这些新模型的博文和视频：[`https://weblogs.asp.net/scottgu/azure-99-95-sql-database-sla-500-gb-db-size-improved-performance-self-service-restore-and-business-continuity`](https://weblogs.asp.net/scottgu/azure-99-95-sql-database-sla-500-gb-db-size-improved-performance-self-service-restore-and-business-continuity)。


    DTU 是一个用于衡量 CPU、I/O 和内存综合资源用量的逻辑测量概念。其目的是提供一个指标，以获得更可预测的性能并为资源使用付费。在本书后续章节中，您将了解更多关于
    SLO、层级和 DTU 的细节。到 2015 年春季，我们也宣布了 Web 版和商业版的退役，并已全面推出基础版、标准版和高级版。


    伴随着这些新版本，我们还引入了自助数据库恢复（时间点恢复或 PITR）和活动地域复制（我们在云中引入 Always On 可用性组副本的方式）的概念。


    这些年间（以及整个 Azure）引入的另一个概念是 `私有（private）` 和 `公开（public）` 预览版。SQL Server 团队在发布 SQL
    Server 版本之前，已经从“测试版”转向使用社区技术预览版（CTP）这一术语。新的 Azure 服务和现有服务的增强功能开始以预览版形式推出。由于 Microsoft
    在公共云中托管软件，他们有能力为特定客户订阅 `配置（provision）` 特定的服务，甚至是服务的特定功能。私有预览需要客户注册才能获得访问新服务或增强功能的权限。私有预览通常是免费的，可用性有限，并且涉及工程团队与客户之间的直接互动（客户与我们签有保密协议）。公开预览通常面向公众开放。对于一项新服务，它有时是免费的，但最常见的是涉及大幅折扣的价格。对于服务的新功能，大多数情况下公开预览是免费的。预览版使
    Azure 团队能够敏捷快速地推进，快速获得客户采纳和反馈，并最终进入 `正式发布（GA）`。作为客户，您将在本书中学习如何跟上 Azure 服务和增强功能的预览与公告。


    注意

    在本书中，您会读到诸如“正式发布（went GA）”或“进入公开预览（went public preview）”这样的术语，用以说明某项服务或功能何时发布。


    预览系统也是 SQL 团队新方法的一个很好示例，即 `云优先（cloud-first）` 方法。云优先意味着 SQL 团队可以先在云中构建新服务或功能，然后最终让该功能出现在
    SQL Server 的下一个主要版本中。预览版与合并的 SQL 代码库相结合，使得这类推进成为可能。


    正如 Peter Carlin 所述，通过云优先方法，“……我们利用服务遥测来了解问题所在以及需要改进之处，在构建和通过迭代部署进行完善的过程中使用该遥测数据，然后当我们知道它在各种场景下运行良好时。”


    ### 智能性能与 MDCS


    到 2013 年左右，SQL 工程团队已在雷德蒙德之外招募人才。Microsoft 在塞尔维亚建立了一个开发中心，称为 Microsoft Developer
    Center Serbia（MDCS）。您可以在 [`https://www.microsoft.com/sr-latn-rs/mdcs`](https://www.microsoft.com/sr-latn-rs/mdcs)
    阅读更多关于 MDCS 的信息。我们的 Azure SQL Database 团队指派了来自 MDCS 的工程师组建了一个数据科学团队。该团队的首批任务之一是研究如何为
    Azure 提供 `增值服务（value-added services）`。Azure SQL Database 是作为真正的 PaaS 服务推出的。将开发人员与
    SQL Server 的细节抽象开很重要，提供内置的高可用性（HA）和可预测性能也至关重要。然而，我们的团队希望研究我们能作为平台的一部分向客户提供哪些额外服务。


    性能也许是 SQL Server 中最难解决的问题之一，因为问题可能非常模糊（听说过“它就是慢”吗）。再加上 T-SQL 和数据库的开放性质（糟糕的索引 +
    糟糕的查询 = 糟糕的性能）。工程师 Vladimir Ivanovic 和 Miroslav Grbic 投入了一个项目，研究大规模机器学习如何改善 Azure
    SQL Database 的性能。正如 Miodrag Radulovic 所说，“最初的意图是利用数据科学和 Azure 规模的机器学习，找到改善客户使用
    Azure SQL Database 体验的方法。性能优化被确定为团队可以提供相当重大改进的领域之一，特别是对于那些在 SQL Server 引擎性能优化方面不太熟练的新手用户。”Vladimir
    特别提到，用于性能的索引建议是团队认为需要解决的一个重要领域。SQL Server 已有技术可协助索引建议，即动态管理视图（DMV）和称为数据库优化顾问（DTA）的工具。Vladimir
    说，“我们选择索引建议是因为该技术已经通过缺失索引 DMV 和 DTA 部分可用，而且我们最初的分析表明，相当数量的 SQL DB 客户可以从中受益。”


    这项工作花费了一些时间才完成。工作始于 2014 年，并于 2015 年 7 月以 `数据库优化顾问（Database Tuning Advisor）` 的名称发布公开预览。该功能将结合机器学习和现有的
    SQL Server 资源（包括查询存储）来推荐甚至自动创建/删除索引。2016 年 1 月，该功能正式发布（GA），并命名为自动优化（Automatic
    Tuning）。您将在本书第 7 章了解更多关于自动优化的细节。

    '
- fmt: '# Azure SQL：安全演进与工程创新


    ## 高级数据安全与 ILDC 团队


    除了为 Azure SQL Database 添加性能服务外，该团队还希望为安全创建新体验。Microsoft 于 1991 年在以色列成立了美国本土以外的第一个研发中心，称为
    Microsoft 以色列开发中心（ILDC）。您可以在 [`https://www.microsoftrnd.co.il/`](https://www.microsoftrnd.co.il/)
    了解更多关于 ILDC 的信息。


    2014 年，Azure SQL 团队转向 ILDC，以更深入地研究安全问题，组建了一个名为 *Azure Security Center for SQL*
    的团队。据原始成员之一 Ron Matchoro 称，该团队成立之初的职责是研究审计、数据屏蔽、漏洞评估和威胁防护技术等安全主题。


    这项工作为 Azure SQL 和 SQL Server 带来了多项创新。该团队于 2015 年率先在 Azure SQL 中实现了 *Dynamic Data
    Masking* 的概念，并在 SQL Server 2016 版本中发布（有关 Dynamic Data Masking 的更多信息，请访问 [`https://learn.microsoft.com/sql/relational-databases/security/dynamic-data-masking`](https://learn.microsoft.com/sql/relational-databases/security/dynamic-data-masking)）。


    随后，团队通过增强审计功能（SQL Server 已有一个名为 SQL Server Audit 的概念）以用于 Azure SQL，以及提供执行漏洞评估的方法（这也被引入
    SQL Server Management Studio），从而进一步加速发展。ILDC 还投资研究了数据分类的概念，该功能现已存在于 Azure SQL
    和 SQL Server 中。


    或许最大的投资领域是 *threat protection*。其概念是利用云的力量来检测对 Azure SQL 部署的潜在威胁并提醒管理员。这包括检测 *SQL
    injection* 攻击等概念。此功能于 2017 年随 Azure SQL 正式发布（GA），作为 **Advanced Threat Protection
    (ATP)**。2019 年，团队将一系列功能组合在一起，包括 ATP、漏洞评估和数据分类，称为 **Advanced Data Security (ADS)**。这些功能后来被重新命名并扩展到
    **Microsoft Defender for Cloud** 中，后者涵盖了从本地到云的 SQL 保护。您将在本书的第 [6](#496204_2_En_6_Chapter.xhtml)
    章了解更多关于 Microsoft Defender 的信息。如今，ILDC 继续与我们在雷德蒙德的团队合作，为 Azure SQL 提供新的安全功能。


    ## 一个名为 Ibiza 的未来之窗


    大约在 2014 年，Microsoft 也决定当前的 Azure 门户体验需要新面貌（是的，又一次）。项目 **Ibiza** 是一个全新外观和设计的 Azure
    门户。这实际上是 Azure 门户的第四代。Ibiza 门户早期也被称为“预览门户”。这个新门户使用了一个称为 *blades* 的概念作为用户体验界面。用户很早就报告说，这个门户更可靠、速度更快，并且整体用户体验更好，包括一个仪表板、固定项并支持各种
    Azure 服务。


    图 [1-9](#496204_2_En_1_Chapter.xhtml#Fig9) 展示了 2015 年发布时的 Ibiza 门户。如今它简单地被称为 **Azure
    Portal**（几乎任何人都可以通过 portal.azure.com 访问）。


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig9_HTML.jpg)


    图 1-9


    原始的 Ibiza 门户


    此门户是当前 Azure 门户的 *foundation*，但经过了许多增强和不同的外观与感觉，您将在本书的各章节中看到。


    ## Azure 的新工程模型


    自 SQL Azure 推出以来，Microsoft 内部就存在一种独特的体验。对于 SQL Server，工程团队主要专注于设计和构建新版本。他们在构建新功能或解决问题时绝对会采纳客户反馈，但他们的视角主要来自反馈论坛或
    Microsoft 技术支持。


    随着服务的推出，工程团队现在负责 SQL Server 在云端的运维。他们构建软件，同时也管理数据中心的运营。虽然其他团队负责数据中心的整体运营，但 SQL
    Azure 工程团队负责 Azure SQL Database 服务的运行状况、成本和运营。这涉及所有类型的主动监控以确保健康和可靠性。但这也意味着团队负责更新驱动服务的所有幕后软件。


    SQL Azure 工程师现在参与了 *Live Site* 体验，这在今天可以被视为一种 *DevOps model*。如果发生中断，SQL Azure
    工程团队会直接参与解决问题。随着时间的推移，这些经验推动了创新和自动化。Azure SQL Database 生态系统背后大部分的功能都是为了避免问题的手动干预而构建的。甚至为
    Azure SQL Database 和 SQL Server 引入的新功能也源于团队的 Live Site 经验，这些经验确保了服务的健康、应用程序的性能以及数据库的可靠性和可用性。Peter
    Carlin 描述了 Live Site 的好处：“……基本上我们过去 5 年所构建的一切都是由 live site 的经验教训驱动的。在很多方面，我们一开始并不知道如何运行我们自己的产品，一旦我们意识到我们让它变得多么困难，就可以做出改变使其更容易运维——从而使所有
    SQL DBA 受益。”


    正如 Rohan Kumar 所说，“我们最大的挑战之一是团队文化。我们需要创建一个不仅能构建出色软件，还能在运维上运行它的团队。”


    到 2015 年，Azure SQL Database 已凭借 v12 拥有了面向未来的稳健架构，并通过创新为性能和安全增加了价值。随着新客户使用该服务构建应用程序，反馈和
    Live Site 经验推动了未来的创新，无论是对于架构还是新的部署模型。'
  raw: '### Advanced Data Security and the ILDC Team


    In addition to adding services for Azure SQL Database for performance, the team
    wanted to create new experiences for security. Microsoft had formed the first
    Research and Development Center outside the United States in 1991 in Israel called
    the Microsoft Israel Development Center (ILDC). You can read more about the ILDC
    at [`https://www.microsoftrnd.co.il/`](https://www.microsoftrnd.co.il/).


    In 2014, the Azure SQL team turned to the ILDC to look more into security to form
    a group called the *Azure Security Center for SQL*. When first formed, this group,
    according to one of the original members Ron Matchoro, was chartered to look at
    security topics like auditing, data masking, vulnerability assessments, and threat
    protection techniques.


    This work led to several innovations for both Azure SQL and SQL Server. The team
    first landed the concept of *Dynamic Data Masking* in Azure SQL in 2015 and in
    the SQL Server 2016 release (read more about Dynamic Data Masking today at [`https://learn.microsoft.com/sql/relational-databases/security/dynamic-data-masking`](https://learn.microsoft.com/sql/relational-databases/security/dynamic-data-masking)).


    The team then accelerated further by enhancing auditing (SQL Server already had
    a concept called SQL Server Audit) for Azure SQL, delivering on a method to perform
    vulnerability assessments (which would also land in SQL Server Management Studio).
    The ILDC also invested in a concept for data classification which now exists in
    Azure SQL and SQL Server.


    Perhaps the biggest area of investment was in *threat protection*. The concept
    was to use the power of the cloud to detect possible threats to an Azure SQL deployment
    and alert administrators. This included concepts like detecting *SQL injection*
    attacks. This capability went GA with Azure SQL in 2017 as **Advanced Threat Protection
    (ATP)**. In 2019, the team grouped together a series of capabilities, including
    ATP, vulnerability assessment, and data classification called **Advanced Data
    Security (ADS)**. These capabilities would get rebranded and expanded into **Microsoft
    Defender for Cloud** which includes coverage for SQL, ground to cloud. You will
    learn more about Microsoft Defender in Chapter [6](#496204_2_En_6_Chapter.xhtml)
    of this book. Today, the ILDC continues to work with our teams in Redmond to deliver
    new security capabilities for Azure SQL.


    ### A Pane for the Future Called Ibiza


    Microsoft also decided around the 2014 timeframe the current Azure portal experience
    needed a new look (yes, again). Project **Ibiza** was a new Azure portal with
    a completely new look and design. This was effectively the fourth generation of
    the Azure portal. The Ibiza portal was also known early on as the “Preview Portal.”
    This new portal used a concept called *blades* as a user interface experience.
    Users reported very early on this portal was more reliable, faster, and an overall
    better user experience that included a dashboard and pins and supported all the
    various Azure services.


    Figure [1-9](#496204_2_En_1_Chapter.xhtml#Fig9) shows the Ibiza portal at launch
    in 2015\. Today it is simply known as the **Azure Portal** (accessed by almost
    anyone from portal.azure.com).


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig9_HTML.jpg)


    Figure 1-9


    The original Ibiza portal


    This portal serves as the *foundation* of the current Azure portal but with many
    enhancements and a different look and feel which you will see throughout the chapters
    of this book.


    ### A New Engineering Model for Azure


    Even since the launch of SQL Azure, a unique experience existed within Microsoft.
    For SQL Server, the engineering team mostly focused on designing and building
    a new release. They absolutely take in customer feedback as they build new features
    or resolve problems, but their lenses mostly come from feedback forums or Microsoft
    technical support.


    With the launch of a service, the engineering team now owned the operation of
    SQL Server in the cloud. They built the software but also managed the operation
    of a data center. While other teams owned the overall operation of data centers,
    the SQL Azure engineering team owned the health, cost, and operations of the Azure
    SQL Database service. This involved all types of proactive monitoring for health
    and reliability. But it also meant the team owned updating all the software behind
    the scenes that powered the service.


    SQL Azure engineers were now involved in *Live Site* experiences, which today
    can be thought of as a *DevOps model*. If an outage occurred, the SQL Azure engineering
    team was directly involved in resolving the problem. These experiences over time
    drove innovation and automation. Much of the functionality behind the scenes that
    are part of the Azure SQL Database ecosystem were built to avoid manual intervention
    of problems. Even new features introduced both for Azure SQL Database and SQL
    Server came from Live Site experiences for the team ensuring the service was healthy,
    applications were performant, and databases were reliable and available. Peter
    Carlin describes the benefits of Live Site: “...basically everything we have built
    in the last 5 years are driven by learnings from live site. In many ways, we didn’t
    know how to run our own product, and once we realized how hard we had made it,
    could make the changes to make it much easier to operate – benefiting all SQL
    DBAs.”


    As Rohan Kumar tells it, “One of our biggest challenges was team culture. We needed
    to create a team that could not only build great software but also operationally
    run it.”


    By 2015, Azure SQL Database had a robust architecture for the future with v12
    and innovation to add value for both performance and security. As new customers
    built applications with the service, feedback and Live Site experiences drove
    future innovation, both for the architecture and new deployment models.'
