    shows resource limits at the instance level.


    ```

    SELECT * FROM sys.dm_os_job_object;

    ```


    This is a DMV specific to Azure that shows resource limits Azure applies to a
    Managed Instance using Windows Job Objects. The specific column I look at is **memory_limit_mb**
    which shows me the true amount of memory the Managed Instance has access to. I
    talked about Windows Job Objects in the section “Implementation Details.”


    You may be asking at this point what is so special about Managed Instance since
    from the perspective of using a tool like SSMS it feels like a SQL Server running
    in an Azure Virtual Machine. This is the point of a Managed Instance. We want
    you to have the feel of a SQL Server instance, but not worry about the details
    you might have to consider with a virtual machine. And since Azure SQL Managed
    Instance (MI) is a PaaS service, you will see the benefits of using MI especially
    when it comes to a versionless SQL Server, predictable performance, built-in high
    availability, and disaster recovery.


    ## Migrating to Azure SQL Managed Instance


    I discussed earlier in this chapter some of the considerations and tools for migrating
    to Azure SQL Managed Instance.


    Let me add more details on some considerations should you consider when migrating:


    *   When you are migrating a database protected by Transparent Data Encryption
    to a managed instance using native restore option, the corresponding certificate
    from the on-premises or Azure VM SQL Server needs to be migrated *before* database
    restore.


    *   Restore of system databases is not supported. **To migrate instance-level
    objects** (stored in master or msdb databases), we recommend scripting them out
    and run T-SQL scripts on the destination instance. For example, you can use SSMS
    to script out SQL Server Agent jobs to T-SQL.


    *   Database compatibility is fully supported by Azure SQL Managed Instance, including
    all current supported versions of SQL Server. I have many customers that choose
    to keep their current dbcompat when migrating to Azure and then test and update
    it later. Read more about dbcompat at [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat).


    *   While you can always restore a full backup (offline) to Azure SQL Managed
    Instance, you have online choices as well, including a log-shipping approach with
    **Azure Database Migration Service** (DMS) and a more granular approach using
    **Managed Instance Link** using Always On Availability Groups. Managed Instance
    link works even if you don’t have an AG deployed on-premises. Learn more about
    how to use Managed Instance link at [`https://aka.ms/milink`](https://aka.ms/milink).


    *   Application changes should be minimal for a migration to Managed Instance
    except using the new server name (which you saw in the previous part of this chapter
    on how to connect) and possibly the authentication method. A new capability to
    use Windows Authentication and mitigate changes you need in your application for
    authentication is now available. Learn more at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup`](https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup).'
  trans: '# 验证查询


    每当安装 SQL Server 时，我通常会使用一些 T-SQL 查询作为完整性检查。让我们看看这些查询以及它们在托管实例与 SQL Server 上的结果：


    ```

    SELECT @@version

    Microsoft SQL Azure (RTM) - 12.0.2000.8   May 28 2024 14:55:16   Copyright (C)
    2022 Microsoft Corporation

    ```


    我在本书描述 Azure SQL 历史的第 1 章中解释了为什么 v12 是该服务的一个里程碑式时刻。从那时起，我们就没有更改过主版本号 12。


    基本上，Azure SQL 托管实例的主版本号没有意义。它与 SQL Server 的任何主版本都不对应，因为 Azure SQL 托管实例是*无版本*的。我将在本书第
    5 章中进一步讨论无版本的概念。只需知道，Microsoft 致力于使用所有正确的更改和修复使 Azure SQL 的实例和数据库保持最新状态，因此您无需担心应用更新。


    注意

    尽管版本不改变，但 `@@VERSION` 中的时间戳是我们上次更新实例的时间。这不是一个保证，但我从未见过它不是这种情况。


    ```

    SELECT database_id, name, compatibility_level FROM sys.databases;

    database_id    name        compatibility_level

    1              master      160

    2              tempdb      160

    3              model       160

    4              msdb        160

    ```


    这看起来很正常（我没有创建任何用户数据库），除了 `mssqlsystemresource` 数据库没有像在 SQL Server 中那样被列出（它确实存在，正如您在
    `ERRORLOG` 中可以看到的）。请注意，兼容性级别设置为 160，这是 SQL Server 2022 的 `dbcompat`。


    ```

    SELECT name, object_id, type_desc FROM sys.objects;

    ```


    此查询的结果与您在 SQL Server 的 `master` 数据库中通常看到的一样，系统表位于列表顶部。


    ```

    SELECT * FROM sys.dm_os_schedulers;

    ```


    由于我们部署了一个 8-vCore 托管实例，我预计会有八个 `VISIBLE ONLINE` 调度器，情况确实如此。我还预计会看到几个 `HIDDEN ONLINE`
    调度器，它们也出现在此查询的结果中。


    ```

    SELECT * FROM sys.dm_os_sys_info;

    ```


    这是一个提供有关 SQL Server 系统信息的 DMV。从这个 DMV 的输出中，我可以看到检测到的 CPU 数量、检测到的内存量、目标（最大服务器内存）、引擎使用的总内存以及实际的工作线程最大值（8
    vCores 对应 1640），并且使用了传统内存模型。我将在本书第 5 章中进一步讨论锁定页面。


    ```

    SELECT * FROM sys.dm_os_process_memory;

    ```


    此 DMV 显示与操作系统相关的内存信息，包括是否使用了锁定或大页面（对于 Azure SQL 托管实例或数据库，它们未被使用）。我通常只将此作为在虚拟机或服务器中为
    SQL Server 提供足够内存的完整性检查。


    ```

    SELECT * FROM sys.dm_exec_requests;

    ```


    这是世界上最常见的用于检查 SQL Server 上运行状态的 DMV 之一。我运行它只是为了确保所有正常的后台进程都在运行，包括 `LAZY WRITER`、`RECOVERY
    WRITER`、`LOCK MONITOR` 等，并且我可以看到活动查询。


    ```

    SELECT SERVERPROPERTY(''EngineEdition'');

    ```


    根据文档 [`https://learn.microsoft.com/sql/t-sql/functions/serverproperty-transact-sql`](https://learn.microsoft.com/sql/t-sql/functions/serverproperty-transact-sql)，值
    8 表示托管实例。


    还有两个特定于 Azure 的新 DMV，在 SQL Server 中找不到：


    ```

    SELECT * FROM sys.dm_user_db_resource_governance;

    ```


    此 DMV 确实旨在显示特定 Azure SQL 数据库的资源限制，但它也适用于托管实例（您将看到除 `tempdb` 外所有数据库（包括系统数据库）的一行）。您可以查看诸如内存、最大存储、日志速率等限制。您可以在
    [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database)
    阅读此 DMV 的文档。请注意，文档说这主要供内部使用，这意味着将来可能会更改。


    注意

    有一个名为 `sys.dm_instance_resource_governance` 的未记录 DMV，它显示实例级别的资源限制。


    ```

    SELECT * FROM sys.dm_os_job_object;

    ```


    这是一个特定于 Azure 的 DMV，显示 Azure 使用 Windows 作业对象应用于托管实例的资源限制。我特别查看的列是 `memory_limit_mb`，它向我显示了托管实例可访问的真正内存量。我在“实现细节”一节中讨论了
    Windows 作业对象。


    此时您可能要问，托管实例有什么特别之处，因为从使用 SSMS 等工具的角度来看，它感觉就像在 Azure 虚拟机中运行的 SQL Server。这正是托管实例的意义所在。我们希望您拥有
    SQL Server 实例的体验，但无需担心虚拟机可能需要考虑的细节。而且由于 Azure SQL 托管实例（MI）是一项 PaaS 服务，您将看到使用 MI
    的好处，特别是在无版本 SQL Server、可预测的性能、内置高可用性和灾难恢复方面。


    # 迁移到 Azure SQL 托管实例


    我在本章前面讨论了迁移到 Azure SQL 托管实例的一些考虑因素和工具。


    让我添加一些迁移时应考虑的其他注意事项的细节：


    *   当您将受透明数据加密保护的数据库迁移到使用原生还原选项的托管实例时，*必须在* 数据库还原*之前*迁移来自本地或 Azure VM SQL Server
    的相应证书。

    *   不支持还原系统数据库。要迁移实例级对象（存储在 `master` 或 `msdb` 数据库中），我们建议将它们编写为脚本，然后在目标实例上运行 T-SQL
    脚本。例如，您可以使用 SSMS 将 SQL Server 代理作业编写为 T-SQL。

    *   数据库兼容性完全受 Azure SQL 托管实例支持，包括所有当前支持的 SQL Server 版本。我的许多客户在迁移到 Azure 时选择保留其当前的
    `dbcompat`，然后进行测试并在以后更新。有关 `dbcompat` 的更多信息，请阅读 [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat)。

    *   虽然您始终可以将完整备份（离线）还原到 Azure SQL 托管实例，但您也有在线选项可选，包括使用 Azure 数据库迁移服务 (DMS) 的日志传送方法以及使用
    Always On 可用性组的托管实例链接进行更精细的方法。即使您在本地未部署 AG，托管实例链接也适用。有关如何使用托管实例链接的更多信息，请访问 [`https://aka.ms/milink`](https://aka.ms/milink)。

    *   对于迁移到托管实例，应用程序更改应该最小，除了使用新的服务器名称（您在本章前面关于如何连接的部分中看到了）以及可能的身份验证方法。现在提供了一项新功能，可以使用
    Windows 身份验证并减轻应用程序为身份验证所需的更改。了解更多请访问 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup`](https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup)。'
- fmt: '## Deploying an Azure SQL Database


    Deploying an Azure SQL Database is both different and like Azure SQL Managed Instance.
    The experience is similar as you will use the Azure Portal or CLI (or even T-SQL)
    to deploy a database but different since you are…well deploying a database, not
    an instance of SQL Server. Since you are deploying just a database, you get more
    options as I have described in this book, including `Serverless`, `elastic pools`,
    and `Hyperscale`.


    The basic process to deploy Azure SQL Database is


    *   ✓ Decide to deploy a single database or elastic pool

    *   ✓ Choose a resource group and region

    *   ✓ Choose an existing or new logical database server

    *   ✓ Choose your purchasing model, compute model, service tier, hardware configuration,
    and sizes

    *   ✓ Optionally supply other configuration choices

    *   ✓ Deploy it!


    ### Deployment and Options


    To get started, I will use the `Azure SQL` screen to deploy by searching for Azure
    SQL in the marketplace as I showed you in Chapter [3](#496204_2_En_3_Chapter.xhtml)
    with SQL Server on Azure Virtual Machine but the single database on the left-hand
    side and click **Create**. I will show you how to deploy a single database which
    will allow me to also deploy a database server (and I will describe what and why
    you need a database server).


    As we did for Azure SQL Managed Instance, let’s walk through all the options to
    deploy the database through the Azure Portal.


    #### Basics


    If you choose a single database, you are presented with a Basics screen like Azure
    SQL Managed Instance as seen in Figure [4-16](#496204_2_En_4_Chapter.xhtml#Fig16).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig16_HTML.jpg)


    Figure 4-16

    Basics screen to deploy an Azure SQL Database


    You can see from my screen that I have already created a new resource group, defined
    a database name, and have the option to first create a new database (or logical)
    server.


    Note


    Notice the option at the top of this screen to choose the free database offer
    at [`https://aka.ms/freedboffer`](https://aka.ms/freedboffer).


    You may be wondering why you need a database server when the promise of Azure
    SQL Database is “you own the database; Azure will manage everything else.”


    A `database server`, also known as a `logical server`, is a collection of metadata
    stored in the Azure infrastructure used to organize one more Azure SQL Databases.
    It is *not* a single SQL Server instance on a physical server. A database server
    contains a `logical master database` just like a true SQL Server instance. Notice
    the region is associated with the logical server, not the database. Any database
    created for the logical server will be hosted in the region of the server. All
    connectivity and networking will be associated with the logical server. In fact,
    you could create a logical server first, connect to that server, and use `T-SQL
    CREATE DATABASE` to create Azure SQL Databases. The login and password you supply
    for the logical server becomes a login in the logical master database, which is
    a server-level principal who is effectively a `server admin` for all databases.


    You can see my choices in Figure [4-17](#496204_2_En_4_Chapter.xhtml#Fig17) to
    create the logical server, including your region and preferred authentication
    method. In this case, I’m going to set up both Microsoft Entra and SQL Authentication
    and supply an admin for each.


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig17_HTML.jpg)


    Figure 4-17

    Creating a logical server for Azure SQL Database


    Once you click **OK** for the logical server (it will be created as part of the
    deployment), you can choose if you want to make this part of an elastic pool,
    but I won’t do that here. You can create a logical server on its own first and
    then create databases for it. In this scenario, I’m creating a new database along
    with a logical server and have the database placed with that new server.


    Now I have more choices to complete the Basics screen as seen in Figure [4-18](#496204_2_En_4_Chapter.xhtml#Fig18).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig18_HTML.jpg)


    Figure 4-18

    Completing Basics screen choices for Azure SQL Database


    The Workload environment is a convenient method to choose a lower service tier
    and vCore size for Development or choose the Production option which will default
    to `Hyperscale`. I’ll choose **Production**.


    You then have a choice to configure several aspects of your deployment, including
    service tier and other resource choices. You can select **Configure database**
    to make these choices. Before I show you those options, you also have a choice
    on backup storage redundancy options. This is like the choice for Azure SQL Managed
    Instance. Unless you have data residency requirements, I recommend you pick a
    geo-redundant option. Geo-zone redundancy has the highest level of redundancy
    and cost, but a zone redundant option is required if you choose zone redundancy
    as a deployment option. In fact, I’ll choose a zone redundant option for the deployment,
    and this option will change for my backup option.


    Figure [4-19](#496204_2_En_4_Chapter.xhtml#Fig19) shows the options when you select
    **Configure database**.


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig19_HTML.jpg)


    Figure 4-19

    Compute and storage options for Azure SQL Database


    Let’s go through each of these options.


    ##### Service Tier


    I mentioned earlier your choices of `General Purpose (GP)`, `Business Critical
    (BC)`, and `Hyperscale`.


    ##### Compute Tier


    For `GP` and `Hyperscale`, you can choose `Serverless` or `Provisioned`. I’ll
    show you more about `Serverless` later in the chapter.


    ##### Hardware Configuration


    This is where you can choose `Gen5`, `FSv2`, `DC`, or `Premium Hardware` choices.


    ##### vCores


    Based on your service tier and hardware configuration, you can choose how many
    `vCores` you need (which you can scale up or down later). You can have as many
    as 128 `vCores`.


    ##### HA Replicas and Zone Redundancy


    `Hyperscale` allows up to 30 named replicas, so you can choose your number of
    replicas here. I’ll cover more about `Hyperscale` Availability in Chapter [8](#496204_2_En_8_Chapter.xhtml)
    of the book. You don’t have to have any replicas for `Hyperscale`, but if you
    choose zone redundancy, you need to have at least one replica.


    ##### Other Choices


    *   If you have selected `GP` or `BC` tiers, you need to choose a max storage
    size. You can have up to 4TB for `GP` and for `BC`. For `Hyperscale`, there is
    no maximum storage, so you don’t need to make a choice.

    *   For `GP` and `BC` service tiers, you can choose `Azure Hybrid Benefit` for
    licensing. `Hyperscale`’s new pricing structure doesn’t need this choice.


    I realize there are so many choices here; it is hard to keep up. I created this
    slide for a presentation I did that you might find useful as seen in Figure [4-20](#496204_2_En_4_Chapter.xhtml#Fig20).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig20_HTML.jpg)


    Figure 4-20

    Azure SQL Database deployment choices'
