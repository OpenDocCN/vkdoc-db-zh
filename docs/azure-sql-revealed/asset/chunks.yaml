    this capability with Azure SQL Database. CloudLifter to the rescue again. We support
    Service Broker applications with Azure SQL Managed Instance. One major exception
    is that we only support Service Broker between Managed Instances. See the full
    set of differences at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#service-broker`](https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#service-broker).


