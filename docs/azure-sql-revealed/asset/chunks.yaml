    *   “Third-party filters” are not supported (examples are Office and .pdf filters).


    *   You cannot manage aspects to the services that support full-text like fdhost.


    *   Semantic search is not supported.


    ### Machine Learning Services


    In SQL Server 2016, we introduced R Services for SQL Server. The concept is that
    we would use a new architecture to allow you to run R programs in a secure, isolated,
    and scalable manner *on the same computer* as SQL Server. In SQL Server 2017,
    we added Python support and rebranded this capability as **Machine Learning Services**.


    We eventually enabled this capability in Azure SQL Managed Instance (it is not
    available in Azure SQL Database) with a few caveats:


    *   You need to enable the feature using sp_configure with the “external scripts
    enabled” option.


    *   Java was added as an extensibility language in SQL Server 2019 but is not
    available in Azure SQL Managed Instance.


    *   There are R and Python packages installed, but if you need something different,
    you may need to use a tool called sqlmlutils. Read more at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences?view=azuresql#python-and-r-packages`](https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences?view=azuresql#python-and-r-packages).


