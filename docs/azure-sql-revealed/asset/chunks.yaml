  trans: "\n## Azure Advisor\n\n既然在 Azure 生态系统中，关于你的部署（但不涉及你的数据）有大量的遥测数据，为什么不内置一些自动化来提供建议呢？这就是\
    \ `Azure Advisor`。`Azure Advisor` 汇集了整个 Azure 工程团队的集体知识，就成本、安全性、可靠性、操作卓越性和性能等方面为你的部署提供建议。你可以在\
    \ [`https://learn.microsoft.com/azure/advisor/advisor-overview`](https://learn.microsoft.com/azure/advisor/advisor-overview)\
    \ 阅读更多关于 `Azure Advisor` 的信息。图 9-11 展示了我的订阅的 `Azure Advisor` 示例。\n\n![](img/496204_2_En_9_Fig11_HTML.jpg)\n\
    \n图 9-11：Azure Advisor\n\n这里有一篇很好的博文，概述了 `Azure Advisor` 能为你做什么：[`https://azure.microsoft.com/blog/your-single-source-for-azure-best-practices/`](https://azure.microsoft.com/blog/your-single-source-for-azure-best-practices/)。从我的顾问概览中可以看到，我还有一些安全方面的工作需要处理！\n\
    \n请注意 `Azure Advisor` 中的*节省成本*领域。我们的文档在 [`https://learn.microsoft.com/azure/advisor/advisor-cost-recommendations`](https://learn.microsoft.com/azure/advisor/advisor-cost-recommendations)\
    \ 指出了一些这样的节省成本的想法。对我来说，在满足应用程序对安全性、性能和可用性的需求的同时，节省成本非常重要。请记住以下 `Azure SQL` 的省钱技巧：\n\
    - 监控 `Azure SQL Database` 的性能，并随着时间推移调整你的 `vCore` 和存储选择，使其规模合适。你在本书第 7 章已经看到扩展数据库是多么容易。\n\
    - 仔细评估 `无服务器` 计算层。`无服务器` 具有自动缩放、按秒计费以及在空闲时暂停计算的功能。\n- 当 `Azure SQL 托管实例` 在某段时间内未被使用时，使用其启动/停止功能。\n\
    - 利用 `Azure 混合权益` 来使用你现有的许可证。\n- 阅读我的关于如何最大化 SQL 节省的博文：[`https://www.microsoft.com/sql-server/blog/2024/02/15/how-sql-developers-can-maximize-savings`](https://www.microsoft.com/sql-server/blog/2024/02/15/how-sql-developers-can-maximize-savings)。\n\
    - 如果你只需要一个用于灾难恢复的副本，请将其标记为*被动*以节省成本。这个概念在 `Azure SQL Database` 中称为待机副本。\n- 在不使用时关闭\
    \ `Azure 虚拟机`。\n- 另一种分析成本的方法是使用 `Azure 门户` 中的成本分析选项。这可以很好地细分成本并帮助预测未来成本。在 [`https://learn.microsoft.com/azure/cost-management-billing/costs/quick-acm-cost-analysis`](https://learn.microsoft.com/azure/cost-management-billing/costs/quick-acm-cost-analysis)\
    \ 了解更多信息。\n\n## 了解新功能\n\n我们的团队为你创建了资源，以便你随时了解 `Azure SQL`（包括预览版和正式版的 `Azure SQL\
    \ 托管实例` 和 `Azure SQL Database`）的所有新内容。我建议你收藏这些链接：\n- [`https://aka.ms/whatsnewsqldb`](https://aka.ms/whatsnewsqldb)\n\
    - [`https://aka.ms/whatsnewsqlmi`](https://aka.ms/whatsnewsqlmi)\n\n## 与我们的团队保持联系\n\
