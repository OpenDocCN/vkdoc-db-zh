    \ In SSMS in the Object Explorer, load the Top Resource Consuming Queries as seen\
    \ in Figure [7-18](#496204_2_En_7_Chapter.xhtml#Fig18).\n\n    The default metric\
    \ is Total Duration, so I changed this to CPU. You can see the query I ran for\
    \ this example is the one consuming all the CPU.\n\n![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig19_HTML.jpg)\n\
    \nFigure 7-19\n\nQuery Wait Statistics report from SSMS\n\n1.  Query Store reports\
    \ in SSMS also include top queries by waits. In this case, the CPU problem *is\
    \ also a waiting problem* on CPU resources as I mentioned earlier. Figure [7-19](#496204_2_En_7_Chapter.xhtml#Fig19)\
    \ shows this.\n\n    Now consider the evidence. The workload consumes CPU resources\
    \ for the database at 100% (in reality, it is more than 100%, but we are capped).\
    \ The status of many requests is RUNNABLE, and the top wait type for the workload\
    \ is SOS_SCHEDULER_YIELD. If the query cannot be changed, then the most likely\
    \ scenario is that you don’t have enough CPU resources for your workload. Later\
    \ in this chapter, we will use Azure interfaces to make this query run faster.\n\
    \n![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig23_HTML.jpg)\n\nFigure 7-23\n\
    \nWait statistics for a query in Database Watcher\n\n![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig22_HTML.jpg)\n\
    \nFigure 7-22\n\nQuery details in Database Watcher\n\n![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig21_HTML.jpg)\n\
    \nFigure 7-21\n\nTop queries from Database Watcher\n\n![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig20_HTML.jpg)\n\
    \nFigure 7-20\n\nDatabase Watcher resource utilization\n\n1.  Let’s look now at\
    \ what Database Watcher shows.\n\n    What does Database Watcher show for this\
    \ situation, and can it also help me narrow down the problem?\n\n    The heatmap\
    \ that you have seen earlier in this chapter looked green for this database over\
    \ the last hour, and the CPU only showed < 50%. That is because the workload only\
    \ hit 100% CPU for a 13-minute window. If I select the database from the heatmap,\
    \ I see a screen like Figure [7-20](#496204_2_En_7_Chapter.xhtml#Fig20).\n\n \
    \   I like this view because I see the same information as I see in Azure Monitor\
    \ metrics, but I get all in the same chart information about other resources like\
    \ Workers and I/O. And even though I could see a chart like this in Azure Metrics,\
    \ I wasn’t able to drill down to top queries. You can see I can select Top Queries\
    \ from this screen and see results like in Figure [7-21](#496204_2_En_7_Chapter.xhtml#Fig21).\n\
    \n    I see that one query is marked red (which indicates it is taking up a high\
    \ amount of CPU).\n\n    I can click this query and see the details as in Figure\
    \ [7-22](#496204_2_En_7_Chapter.xhtml#Fig22).\n\n    If I scroll down from here,\
    \ I get wait statistics specific to this query like in Figure [7-23](#496204_2_En_7_Chapter.xhtml#Fig23).\n\
    \n    Notice the majority of wait time for the query is for the CPU just like\
    \ Query Store reports revealed.\n\n![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig25_HTML.jpg)\n\
    \nFigure 7-25\n\nSQL Copilot detects resource limits\n\n![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig24_HTML.jpg)\n\
    \nFigure 7-24\n\nSQL Copilot analyzing slow performance\n\n1.  What about Copilot?\
    \ Can it help?\n\n    You have seen some of the capabilities of “SQL Copilot.”\
    \ What did it respond to in this situation with the prompt “My database is slow”?\
    \ Figure [7-24](#496204_2_En_7_Chapter.xhtml#Fig24) shows the answer.\n\n    Copilot\
    \ has detected a high CPU situation with a known query, but there are no scenarios\
    \ like missing indexes to explain any problem.\n\n    I then responded (yes, you\
    \ can have a conversation with Copilot!) with “Am I hitting any resource limits?”\
    \ (Notice the phrase “hitting” here. Language models just get this.) Figure [7-25](#496204_2_En_7_Chapter.xhtml#Fig25)\
    \ shows the response.\n\n    You can see the response is that the problem is not\
    \ a query tuning issue but that I just don’t have enough resources for the workload.\
    \ Notice part of the suggestion is to use Serverless."
  trans: "\n## 性能示例\n\n让我们来看一个性能场景的示例，展示如何使用我在本节中讨论的工具和功能来识别一个性能场景。我将在本练习中使用以下资源：\n\
    \n*   之前部署的逻辑服务器 `bwsqllogicalserver` 以及数据库 `bwadw`。该数据库部署为超大规模（Hyperscale）、Gen5、2\
    \ vCore 数据库。\n\n*   名为 `bwsql2022` 的 Azure 虚拟机。我沿用了第 6 章的安全设置，因此这台虚拟机可以访问该逻辑服务器和数据库。\n\
    \n*   我将使用 SQL Server Management Studio (SSMS) 运行一些查询并查看查询存储报告。\n\n    提示：如果你使用\
    \ SSMS 连接到 Azure SQL 数据库逻辑服务器，并在 SSMS 中选择特定数据库，对象资源管理器将只显示逻辑主数据库和你的数据库。如果你使用服务器管理员账户连接到逻辑主数据库，对象资源管理器将显示所有数据库。\n\
    \n*   我将使用 Azure 门户查看 Azure 指标。\n\n*   我还将为此目标数据库设置数据库监视器（可在 [`https://learn.microsoft.com/azure/azure-sql/database-watcher-quickstart`](https://learn.microsoft.com/azure/azure-sql/database-watcher-quickstart)\
    \ 快速入门），并使用 Azure SQL 数据库中默认启用的 Microsoft Copilot 功能（如果你未看到其启用，请查阅以下文档：[`https://learn.microsoft.com/azure/azure-sql/copilot/copilot-azure-sql-overview?view=azuresql#enable-microsoft-copilot-in-your-azure-tenant`](https://learn.microsoft.com/azure/azure-sql/copilot/copilot-azure-sql-overview?view=azuresql#enable-microsoft-copilot-in-your-azure-tenant)）。\n\
    \n*   本章提供了脚本文件，可供你在多个示例中使用。你可以在本书源文件的 `ch7_performance\\monitor_and_scale` 文件夹中找到此示例的脚本。我还将在本章练习中使用非常流行的工具\
    \ `ostress.exe`，该工具随 RML 工具附带。你可以从 [`https://www.microsoft.com/en-us/download/details.aspx?id=4511`](https://www.microsoft.com/en-us/download/details.aspx?id=4511)\
    \ 下载 RML。请确保将 RML 安装文件夹添加到你的系统路径中（默认为 `C:\\Program Files\\Microsoft Corporation\\\
    RMLUtils`）。\n\n让我们逐步完成一个示例：\n\n1.  使用 DMV 查询设置以监控 Azure SQL 数据库。\n\n    提示：要在\
    \ SSMS 中数据库上下文打开脚本文件，请在对象资源管理器中点击数据库，然后使用 SSMS 中的“文件/打开”菜单。\n\n2.  启动 SQL Server\
    \ Management Studio (SSMS)，并在数据库上下文中加载一个查询，以从脚本 `dmexecrequests.sql` 监控动态管理视图\
    \ (DMV) `sys.dm_exec_requests`，其内容如下：\n\n    ```sql\n    SELECT er.session_id,\
    \ er.status, er.command, er.wait_type, er.last_wait_type, er.wait_resource, er.wait_time\n\
    \    FROM sys.dm_exec_requests er\n    INNER JOIN sys.dm_exec_sessions es\n  \
    \  ON er.session_id = es.session_id\n    AND es.is_user_process = 1;\n    ```\n\
    \n3.  加载另一个查询以观察资源使用情况。\n\n    在数据库上下文的另一个 SSMS 会话中，加载一个查询来监控 Azure SQL 数据库特有的动态管理视图\
    \ (DMV) `sys.dm_db_resource_stats`，该查询来自名为 `dmdbresourcestats.sql` 的脚本：\n\n  \
    \  ```sql\n    SELECT * FROM sys.dm_db_resource_stats;\n    ```\n\n    此 DMV 将跟踪你的工作负载针对\
    \ Azure SQL 数据库的整体资源使用情况，例如 CPU、I/O 和内存。\n\n    ![](img/496204_2_En_7_Fig17_HTML.jpg)\n\
    \    图 7-17：从 Azure 指标查看 CPU 利用率\n\n4.  编辑工作负载脚本。\n\n    编辑脚本 `sqlworkload.cmd`（该脚本将使用\
    \ `ostress.exe` 程序）。\n\n    我将替换我的服务器、数据库和密码。脚本将如下所示（包含你的密码）：\n\n    ```cmd\n\
    \    ostress.exe -Sbwsqllogicalserver.database.windows.net -itopcustomersales.sql\
    \ -Usqladmin -dbwadw -P -n10 -r20 -q -T146\n    ```\n\n5.  检查我们将用于工作负载的 T-SQL\
    \ 查询。你可以在脚本 `topcustomersales.sql` 中找到此 T-SQL 批处理：\n\n    ```sql\n    DECLARE\
    \ @x int\n    DECLARE @y float\n    SET @x = 0;\n    WHILE (@x < 10000)\n    BEGIN\n\
    \    SELECT @y = sum(cast((soh.SubTotal*soh.TaxAmt*soh.TotalDue) as float))\n\
    \    FROM SalesLT.Customer c\n    INNER JOIN SalesLT.SalesOrderHeader soh\n  \
    \  ON c.CustomerID = soh.CustomerID\n    INNER JOIN SalesLT.SalesOrderDetail sod\n\
    \    ON soh.SalesOrderID = sod.SalesOrderID\n    INNER JOIN SalesLT.Product p\n\
    \    ON p.ProductID = sod.ProductID\n    GROUP BY c.CompanyName\n    ORDER BY\
    \ c.CompanyName;\n    SET @x = @x + 1;\n    END\n    GO\n    ```\n\n    这个数据库不大，因此检索客户及其关联的销售信息并按销售额最高的客户排序的查询应该不会产生大的结果集。可以通过减少结果集中的列数来优化此查询，但这些列是此活动演示目的所必需的。你会注意到在此查询中，我未将任何结果返回给客户端，而是赋值给一个局部变量。这将把所有用于运行查询的\
    \ CPU 资源都放在服务器端。\n\n6.  现在让我们运行工作负载，并观察其性能以及我们之前加载的查询结果。从命令 shell 或 PowerShell\
    \ 执行 `sqlworkload.cmd` 脚本来运行工作负载。该脚本使用 `ostress` 模拟十个并发用户运行 T-SQL 批处理。\n\n7. \
    \ 现在使用你加载的 DMV 在运行时观察性能。首先，在 SSMS 的查询窗口中运行 `dmexecrequests.sql` 中的查询五到六次。你会看到多个用户的状态为\
    \ `RUNNABLE`，且 `last_wait_type` 为 `SOS_SCHEDULER_YIELD`。这是工作负载 CPU 资源不足的典型特征。\n\
    \n8.  观察 `dmdbresourcestats.sql` 查询的结果。运行此查询几次并观察结果。你会看到几行数据的 `avg_cpu_percent`\
    \ 值接近 100%。`sys.dm_db_resource_stats` 每 15 秒对资源使用情况进行一次快照。\n\n9.  让工作负载完成并记录其持续时间。对我来说，完成大约需要\
    \ 12-13 分钟。\n\n10. 使用 Azure Monitor 和指标。\n\n    让我们通过 Azure Monitor 和指标的视角来看这个性能场景。我将通过\
    \ Azure 门户导航到我的数据库。在“监控”窗格中，有一个名为“监视和关键指标”的区域。工作负载运行后，我的图表看起来如图 7-17 所示。\n\n \
    \   你可以在屏幕上看到蓝线显示高 CPU（持续高 CPU 左侧的线是我在此示例之前进行的另一个简短测试）。请注意，红线显示低于 100%。这是托管数据库实例的\
    \ CPU。这个数字表明我的数据库有扩展空间，这表明我可能没有足够的资源来运行此工作负载。\n\n    ![](img/496204_2_En_7_Fig18_HTML.jpg)\n\
    \    图 7-18：SSMS 查询存储的耗用资源最多的查询\n\n11. 现在让我们使用查询存储来更深入地研究此工作负载中查询的性能。在 SSMS 的对象资源管理器中，加载“资源消耗最多的查询”，如图\
    \ 7-18 所示。\n\n    默认指标是“总持续时间”，因此我将其更改为 CPU。你可以看到我在此示例中运行的查询正是消耗所有 CPU 的那个。\n\n\
    \    ![](img/496204_2_En_7_Fig19_HTML.jpg)\n    图 7-19：来自 SSMS 的查询等待统计信息报告\n\n\
    12. SSMS 中的查询存储报告还包括按等待排序的顶部查询。在这种情况下，正如我之前提到的，CPU 问题*也是一个等待 CPU 资源的问题*。图 7-19\
    \ 显示了这一点。\n\n    现在考虑这些证据：工作负载消耗数据库的 CPU 资源达到 100%（实际上超过了 100%，但我们有上限）。许多请求的状态是\
    \ `RUNNABLE`，工作负载的主要等待类型是 `SOS_SCHEDULER_YIELD`。如果无法更改查询，那么最可能的情况就是你的工作负载没有足够的\
    \ CPU 资源。本章稍后，我们将使用 Azure 接口使此查询运行得更快。\n\n    ![](img/496204_2_En_7_Fig23_HTML.jpg)\n\
    \    图 7-23：数据库监视器中查询的等待统计信息\n\n    ![](img/496204_2_En_7_Fig22_HTML.jpg)\n  \
    \  图 7-22：数据库监视器中的查询详细信息\n\n    ![](img/496204_2_En_7_Fig21_HTML.jpg)\n    图 7-21：数据库监视器中的顶部查询\n\
    \n    ![](img/496204_2_En_7_Fig20_HTML.jpg)\n    图 7-20：数据库监视器资源利用率\n\n13. 现在让我们看看数据库监视器显示了什么。\n\
    \n    数据监视器对于这种情况显示了什么？它能否帮助我缩小问题范围？\n\n    本章前面看到的热图显示，过去一小时该数据库看起来是绿色的，CPU 仅显示\
    \ < 50%。这是因为工作负载只在 13 分钟的时间窗口内达到 100% CPU。如果我从热图中选择该数据库，会看到一个类似图 7-20 的屏幕。\n\n\
    \    我喜欢这个视图，因为我看到的信息与在 Azure Monitor 指标中看到的相同，但我在同一个图表中获得了所有其他资源（如工作线程和 I/O）的信息。尽管我可以在\
    \ Azure 指标中看到类似的图表，但我无法深入查看顶部查询。你可以看到我可以从这个屏幕选择“顶部查询”，并看到如图 7-21 所示的结果。\n\n  \
    \  我看到一个查询被标记为红色（表示它占用了大量 CPU）。\n\n    我可以点击此查询并查看详细信息，如图 7-22 所示。\n\n    如果我从这里向下滚动，会获得特定于此查询的等待统计信息，如图\
    \ 7-23 所示。\n\n    请注意，查询的大部分等待时间是 CPU，正如查询存储报告所揭示的那样。\n\n    ![](img/496204_2_En_7_Fig25_HTML.jpg)\n\
    \    图 7-25：SQL Copilot 检测到资源限制\n\n    ![](img/496204_2_En_7_Fig24_HTML.jpg)\n\
    \    图 7-24：SQL Copilot 正在分析性能缓慢问题\n\n14. Copilot 怎么样？它能帮忙吗？\n\n    你已经看到了“SQL\
    \ Copilot”的一些功能。对于提示“我的数据库很慢”这种情况，它是如何回应的？图 7-24 显示了答案。\n\n    Copilot 检测到了一个已知查询的高\
    \ CPU 情况，但没有发现如缺失索引等可以解释任何问题的场景。\n\n    然后我回应道（是的，你可以与 Copilot 对话！）：“我是否触及了任何资源限制？”（注意这里使用了“触及”一词。语言模型能理解这个。）图\
    \ 7-25 显示了回应。\n\n    你可以看到回应是：问题不是查询调优问题，而是我没有足够的资源来运行此工作负载。请注意，建议的一部分是使用无服务器（Serverless）。\n"
- fmt: "### Azure SQL–Specific Performance Scenarios\n\nBased on the Running vs. Waiting\
    \ scenario, there are some scenarios which are specific to Azure SQL.\n\n####\
    \ Log Governance\n\nAzure SQL can enforce resource limits on transaction log usage\
    \ called `log rate governance`. This enforcement is often needed to ensure resource\
    \ limits and to meet promised SLA. Log governance may be seen from the following\
    \ `wait types`:\n\n- `LOG_RATE_GOVERNOR` – Waits for Azure SQL Database\n- `POOL_LOG_RATE_GOVERNOR`\
    \ – Waits for elastic pools\n- `INSTANCE_LOG_GOVERNOR` – Waits for Azure SQL Managed\
    \ Instance\n- `HADR_THROTTLE_LOG_RATE` – Waits for Business Critical and geo-replication\
    \ latency\n\nLog rate governance is enforced inside the SQL Server engine before\
    \ transaction log blocks are submitted for I/O. The documentation has a good description\
    \ of how this works at [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance).\
    \ Scaling your deployment to a different service tier or vCore choice can give\
    \ you more log rate for your application.\n\n#### Worker Limits\n\nSQL Server\
    \ uses a worker pool of threads but has limits on the maximum number of workers.\
    \ Applications with a large number of concurrent users may need a certain number\
    \ of workers. Keep these points in mind on how worker limits are enforced for\
    \ Azure SQL Database and Managed Instance:\n\n- Azure SQL Database has limits\
    \ based on service tier and size. If you exceed this limit, a new query will receive\
    \ an error like:\n  ```\n  Msg 10928\n  The request limit for the database is\
    \  and has been reached.\n  ```\n\n- Azure SQL Managed Instance worker pool limit\
    \ is based on the number of vCores (`(105 * vCores) + 800`). Since this is a full\
    \ SQL Server instance, this behaves like the `max worker thread` setting for SQL\
    \ Server (you can see the calculated value in the DMV `sys.dm_os_sys_info`). If\
    \ you run out of worker threads, you might see `THREADPOOL` waits. At the time\
    \ of the writing of this book, we are discussing about not letting users change\
    \ this configuration value via `sp_configure`, so I don’t recommend you try to\
    \ change this. We have not seen a customer at this time where this default value\
    \ doesn’t meet the needs of an application workload.\n\n#### Business Critical\
    \ (BC) HADR Waits\n\nLet’s say you deploy a Business Critical service tier for\
    \ Azure SQL Managed Instance or Azure SQL Database. Now you start running transactions\
    \ that modify data and therefore require logged changes.\n\nYou look at a DMV\
    \ like `sys.dm_exec_requests` and see wait types like `HADR_SYNC_COMMIT`. What?\
    \ This wait type is only seen when you deploy a sync replica for an Always On\
    \ Availability Group (AG).\n\nTurns out Business Critical service tiers use an\
    \ AG behind the scenes. Therefore, it is not surprising to see these wait types\
    \ normally, but it may surprise you if you are monitoring wait types.\n\nYou can\
    \ also see `HADR_DATABASE_FLOW_CONTROL` and `HADR_THROTTLE_LOG_RATE_SEND_RECV`\
    \ waits as part of Log Governance to ensure we can meet your promised SLA.\n\n\
    #### Hyperscale Scenarios\n\nI’ve talked about the Hyperscale architecture briefly\
    \ in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the book. I’ll go even deeper\
    \ in Chapter [8](#496204_2_En_8_Chapter.xhtml). While Hyperscale has log rate\
    \ limits just like other deployment options, there are cases where we must govern\
    \ transaction log generation due to a page server or replica getting significantly\
    \ behind (which would then affect our ability to deliver our SLA). When this occurs,\
    \ you may see wait types that start with the word `RBIO_`.\n\nEven though we don’t\
    \ dive into the details of how to diagnose various aspects of the Hyperscale architecture\
    \ in this book, there are interesting capabilities for you to take advantage of.\
    \ For example, reads from page servers are now available in DMVs like `sys.dm_exec_query_stats`,\
    \ `sys.dm_io_virtual_file_stats`, and `sys.query_store_runtime_stats`. In addition,\
    \ the I/O statistics in `sys.dm_io_virtual_file_stats` apply to RBEX cache and\
    \ page servers since these are the I/O files that mostly affect Hyperscale performance.\n\
    \nGet all the details for Hyperscale performance diagnostics at [`https://learn.microsoft.com/azure/azure-sql/database/hyperscale-performance-diagnostics`](https://learn.microsoft.com/azure/azure-sql/database/hyperscale-performance-diagnostics).\n\
    \n### Accelerating and Tuning Performance\n\nYou have seen performance capabilities\
    \ for Azure SQL, including monitoring tools. You have also seen an example of\
    \ how to apply your knowledge of monitoring and a performance scenario to recognize\
    \ a possible performance bottleneck. Let’s apply that knowledge to learn how to\
    \ accelerate and tune performance in the areas of scaling CPU capacity, I/O performance,\
    \ memory, application latency, and SQL Server performance tuning best practices."
  raw: "### Azure SQL–Specific Performance Scenarios\n\nBased on the Running vs. Waiting\
    \ scenario, there are some scenarios which are specific to Azure SQL.\n\n####\
    \ Log Governance\n\nAzure SQL can enforce resource limits on transaction log usage\
    \ called *log rate governance*. This enforcement is often needed to ensure resource\
    \ limits and to meet promised SLA. Log governance may be seen from the following\
    \ **wait types**:\n\n*   LOG_RATE_GOVERNOR – Waits for Azure SQL Database\n\n\
    *   POOL_LOG_RATE_GOVERNOR – Waits for elastic pools\n\n*   INSTANCE_LOG_GOVERNOR\
    \ – Waits for Azure SQL Managed Instance\n\n*   HADR_THROTTLE_LOG_RATE* – Waits\
    \ for Business Critical and geo-replication latency\n\nLog rate governance is\
    \ enforced inside the SQL Server engine before transaction log blocks are submitted\
    \ for I/O. The documentation has a good description of how this works at [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance).\
    \ Scaling your deployment to a different service tier or vCore choice can give\
    \ you more log rate for your application.\n\n#### Worker Limits\n\nSQL Server\
    \ uses a worker pool of threads but has limits on the maximum number of workers.\
    \ Applications with a large number of concurrent users may need a certain number\
    \ of workers. Keep these points in mind on how worker limits are enforced for\
    \ Azure SQL Database and Managed Instance:\n\n*   Azure SQL Database has limits\
    \ based on service tier and size. If you exceed this limit, a new query will receive\
    \ an error like\n\n    ```\n    Msg 10928\n    The request limit for the database\
    \ is  and has been reached.\n    ```\n\n*   Azure SQL Managed Instance worker\
    \ pool limit is based on the number of vCores ((105 * vCores) + 800). Since this\
    \ is a full SQL Server instance, this behaves like the “max worker thread” setting\
    \ for SQL Server (you can see the calculated value in the DMV **sys.dm_os_sys_info**).\
    \ If you run out of worker threads, you might see THREADPOOL waits. At the time\
    \ of the writing of this book, we are discussing about not letting users change\
    \ this configuration value via sp_configure, so I don’t recommend you try to change\
    \ this. We have not seen a customer at this time where this default value doesn’t\
    \ meet the needs of an application workload.\n\n#### Business Critical (BC) HADR\
    \ Waits\n\nLet’s say you deploy a Business Critical service tier for Azure SQL\
    \ Managed Instance or Azure SQL Database. Now you start running transactions that\
    \ modify data and therefore require logged changes.\n\nYou look at a DMV like\
    \ sys.dm_exec_requests and see wait types like HADR_SYNC_COMMIT. What? This wait\
    \ type is only seen when you deploy a sync replica for an Always On Availability\
    \ Group (AG).\n\nTurns out Business Critical service tiers use an AG behind the\
    \ scenes. Therefore, it is not surprising to see these wait types normally, but\
    \ it may surprise you if you are monitoring wait types.\n\nYou can also see HADR_DATABASE_FLOW_CONTROL\
    \ and HADR_THROTTLE_LOG_RATE_SEND_RECV waits as part of Log Governance to ensure\
    \ we can meet your promised SLA.\n\n#### Hyperscale Scenarios\n\nI’ve talked about\
    \ the Hyperscale architecture briefly in Chapter [4](#496204_2_En_4_Chapter.xhtml)\
    \ of the book. I’ll go even deeper in Chapter [8](#496204_2_En_8_Chapter.xhtml).\
    \ While Hyperscale has log rate limits just like other deployment options, there\
    \ are cases where we must govern transaction log generation due to a page server\
    \ or replica getting significantly behind (which would then affect our ability\
    \ to deliver our SLA). When this occurs, you may see wait types that start with\
    \ the word **RBIO_**.\n\nEven though we don’t dive into the details of how to\
    \ diagnose various aspects of the Hyperscale architecture in this book, there\
    \ are interesting capabilities for you to take advantage of. For example, reads\
    \ from page servers are now available in DMVs like **sys.dm_exec_query_stats**,\
    \ **sys.dm_io_virtual_file_stats**, and **sys.query_store_runtime_stats**. In\
    \ addition, the I/O statistics in sys.dm_io_virtual_file_stats apply to RBEX cache\
    \ and page servers since these are the I/O files that mostly affect Hyperscale\
    \ performance.\n\nGet all the details for Hyperscale performance diagnostics at\
    \ [`https://learn.microsoft.com/azure/azure-sql/database/hyperscale-performance-diagnostics`](https://learn.microsoft.com/azure/azure-sql/database/hyperscale-performance-diagnostics).\n\
    \n## Accelerating and Tuning Performance\n\nYou have seen performance capabilities\
    \ for Azure SQL, including monitoring tools. You have also seen an example of\
    \ how to apply your knowledge of monitoring and a performance scenario to recognize\
    \ a possible performance bottleneck. Let’s apply that knowledge to learn how to\
    \ accelerate and tune performance in the areas of scaling CPU capacity, I/O performance,\
    \ memory, application latency, and SQL Server performance tuning best practices."
  trans: "\n### Azure SQL 特定性能场景\n\n基于运行中与等待中场景的区分，Azure SQL 还有一些其特有的场景。\n\n#### 日志治理\n\
    \nAzure SQL 可以对事务日志使用实施称为 `log rate governance`（日志速率治理）的资源限制。这种强制实施通常是为了确保资源限制并满足所承诺的服务级别协议（SLA）。日志治理可能通过以下\
    \ `等待类型` 体现：\n\n-   `LOG_RATE_GOVERNOR` – 等待 Azure SQL 数据库\n-   `POOL_LOG_RATE_GOVERNOR`\
    \ – 等待弹性池\n-   `INSTANCE_LOG_GOVERNOR` – 等待 Azure SQL 托管实例\n-   `HADR_THROTTLE_LOG_RATE`\
    \ – 等待业务关键版和异地复制延迟\n\n日志速率治理是在 SQL Server 引擎内部、事务日志块提交进行 I/O 之前实施的。官方文档对此工作方式有很好的描述，请参阅\
    \ [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance)。将你的部署扩展到不同的服务层级或\
    \ vCore 选择，可以为你的应用程序提供更高的日志速率。\n\n#### 工作线程限制\n\nSQL Server 使用一个线程工作池，但对最大工作线程数有限制。具有大量并发用户的应用程序可能需要一定数量的工作线程。关于\
    \ Azure SQL 数据库和托管实例如何强制执行工作线程限制，请牢记以下几点：\n\n-   Azure SQL 数据库的限制基于服务层级和大小。如果你超出此限制，新查询将收到类似以下的错误：\n\
    \    ```\n    Msg 10928\n    The request limit for the database is  and has been\
    \ reached.\n    ```\n\n-   Azure SQL 托管实例的工作池限制基于 vCore 数量（`(105 * vCores) + 800`）。由于这是一个完整的\
    \ SQL Server 实例，其行为类似于 SQL Server 的 `max worker thread`（最大工作线程）设置（你可以在 DMV `sys.dm_os_sys_info`\
    \ 中看到计算出的值）。如果你用完了工作线程，可能会看到 `THREADPOOL` 等待。在撰写本书时，我们正在讨论是否允许用户通过 `sp_configure`\
    \ 更改此配置值，因此我不建议你尝试更改它。截至目前，我们尚未遇到默认值无法满足应用程序工作负载需求的客户。\n\n#### 业务关键版 (BC) HADR\
    \ 等待\n\n假设你为 Azure SQL 托管实例或 Azure SQL 数据库部署了业务关键服务层级。现在你开始运行修改数据的事务，因此需要记录更改。\n\
    \n你查看像 `sys.dm_exec_requests` 这样的 DMV，会看到像 `HADR_SYNC_COMMIT` 这样的等待类型。什么？这种等待类型只在为\
    \ Always On 可用性组 (AG) 部署同步副本时才会看到。\n\n事实证明，业务关键服务层级在底层使用了一个 AG。因此，正常看到这些等待类型并不奇怪，但如果你正在监控等待类型，可能会感到意外。\n\
    \n作为日志治理的一部分，以确保我们能履行承诺的 SLA，你可能还会看到 `HADR_DATABASE_FLOW_CONTROL` 和 `HADR_THROTTLE_LOG_RATE_SEND_RECV`\
    \ 等待。\n\n#### 超大规模场景\n\n我在本书的第 4 章简要介绍过超大规模架构。在第 8 章我将更深入探讨。虽然超大规模与其他部署选项一样有日志速率限制，但在某些情况下，由于页面服务器或副本严重滞后（这将影响我们履行\
    \ SLA 的能力），我们必须治理事务日志生成。发生这种情况时，你可能会看到以 `RBIO_` 开头的等待类型。\n\n尽管本书不会深入探讨如何诊断超大规模架构的各个方面，但有一些有趣的功能可供你利用。例如，来自页面服务器的读取现在可在\
    \ DMV 中获取，如 `sys.dm_exec_query_stats`、`sys.dm_io_virtual_file_stats` 和 `sys.query_store_runtime_stats`。此外，`sys.dm_io_virtual_file_stats`\
    \ 中的 I/O 统计信息适用于 RBEX 缓存和页面服务器，因为这些是主要影响超大规模性能的 I/O 文件。\n\n有关超大规模性能诊断的所有详细信息，请访问\
    \ [`https://learn.microsoft.com/azure/azure-sql/database/hyperscale-performance-diagnostics`](https://learn.microsoft.com/azure/azure-sql/database/hyperscale-performance-diagnostics)。\n\
    \n### 加速与性能调优\n\n你已经了解了 Azure SQL 的性能功能，包括监控工具。你也看到了一个如何应用监控知识和性能场景来识别潜在性能瓶颈的示例。现在，让我们应用这些知识来学习如何在扩展\
    \ CPU 容量、I/O 性能、内存、应用程序延迟以及 SQL Server 性能调优最佳实践等方面加速和调优性能。\n"
- fmt: '# Scaling CPU Capacity


    Let’s say you ran into the performance problem with high CPU as I showed you in
    the previous exercise *in your data center*. What would you do? If you were running
    SQL Server on a bare-metal server, you would have to potentially acquire more
    CPUs or even move to another server. For a virtual machine, you may be able to
    reconfigure the VM to get more vCPUs, but what if the host server didn’t support
    that? You are possibly facing a scenario to migrate your database to another VM
    on another host. Ouch.


    For Azure SQL, you have the ability to *scale* your CPU resources with very simple
    operations from the `Azure portal`, `az CLI`, `PowerShell`, and even `T-SQL`.
    And you can do all of this with no database migration required.


    For Azure SQL Database, there will be some small downtime to scale up your CPU
    resources. It is possible with larger database sizes, this downtime could be longer
    especially if we need to move your deployment to another host with enough resources
    for your request. We also have to ensure your replicas have the same new resources
    for Business Critical service tiers. Hyperscale provides a more constant scaling
    motion regardless of database size.


    Azure SQL Managed Instance can be a concern for duration of scaling. We may need
    to build a new virtual cluster, so scaling operations can be significantly longer.
    This is something to keep in mind and is why deploying with the right resources
    for Managed Instance can be important. Managed Instance pools are much faster
    but still significantly longer than Azure SQL Database in most cases.


    Azure SQL Database Serverless compute tier provides the concept of autoscaling
    as I described in Chapter 4 of the book.


    Let’s go back where we left off in our exercise where we determined it is likely
    we didn’t have enough CPU resources for our workload (remember Copilot helped
    us determine that is the problem). Let’s scale it up and see if workload performance
    improves.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig27_HTML.jpg)


    *Figure 7-27: Scaling vCores for an Azure SQL Database*


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig26_HTML.jpg)


    *Figure 7-26: Changing the pricing tier for an Azure SQL Database*


    ## Look at scaling options in the Azure portal


    I’ll navigate to my database in the `Azure portal` and select Pricing tier as
    seen in Figure 7-26.


    You are now presented with a screen to make changes to your deployment. I showed
    you a screen like this in Chapter 4 as I described all the options after you deploy.
    My options look like Figure 7-27 where I can use a slider bar to increase the
    number of vCores for my deployment.


    > **Tip**

    >

    > There are other methods to scale the database besides the `Azure Portal`, including
    `PowerShell`, `az CLI`, and even `T-SQL` using `ALTER DATABASE`. To use these
    options though you need to learn more about the concept called a Service Level
    Objective (`SLO`) or `ServiceObjective` for short. I’ve mentioned this concept
    earlier in the book. This is because to change vCores you need to choose the combination
    of service tier and vCore. You can use the `T-SQL` `ALTER DATABASE` documentation
    to see all possible values for the service objective at [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql?view=azuresqldb-current&preserve-view=true&tabs=sqlpool`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql?view=azuresqldb-current&preserve-view=true&tabs=sqlpool).


    In my scenario, I would need to use the `HS_Gen5_16` option for the `SERVICE_OBJECT`
    argument for `ALTER DATABASE`.


    In this case, the scaling should only take a few minutes, and the portal will
    show a message “Scaling is completed.”


    ## Let’s run the workload again


    Let’s run the workload again to see if there are any performance differences.
    I’ll use the same scripts, queries, and `SSMS` reports as I did in the previous
    example in the chapter.


    Run the script `sqlworkload.cmd` again from the command prompt.


    ## Observe resource usage with `sys.dm_db_resource_stats`


    Just as you did before, running this query several times should show a lower overall
    CPU usage for the database. This is a pure CPU-driven workload, so you could still
    see numbers in the 90% but for a far less sustained period of time. The key here
    is that with 16 vCores you should be able to run other queries since more CPU
    will be available.


    ## Observe active queries with `sys.dm_exec_requests`


    You should see more `RUNNING` requests and less `SOS_SCHEDULER_YIELD` waits.


    ## Observe the overall workload duration


    The overall duration dropped now from 12–13 minutes to less than 2 minutes.


    ## Let’s take a brief look at Azure Metrics


    Instead of just looking at the Monitoring graph on the Overview screen, I clicked
    it, which allows me to dive deeper into metrics and even change the time interval.
    My metrics now looks like Figure 7-28.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig28_HTML.jpg)


    *Figure 7-28: Azure Metrics after scaling database*


    You can see here that even after moving to 16 vCores the workload uses a lot of
    CPU. However, it is not at 100% completely, so there is room for other workloads
    to use CPU. In the example with 2 vCores, our workload was technically using more
    than 100%, which meant it had to wait for CPU resources.


    What would happen if we were to use the `Serverless` compute tier option for our
    workload? Remember Serverless offers the ability to autoscale workloads and also
    pause idle compute.


    I deployed a new Serverless database with a min vCore = 2 and max vCore = 16.
    Turns out in most cases (not guaranteed), a Serverless database is deployed with
    the number of `SQL Schedulers` = max vCores. So provided the Serverless database
    is not paused, running the same workload as in this example gives you approximately
    the same performance as the scaled Hyperscale 16 vCore deployment. Here is the
    big advantage of Serverless over the Provisioned deployment. Let’s say over a
    period of two hours, this workload only consumes compute for 15 minutes of the
    120 minutes. For the Provisioned, you will pay for compute for the entire 120
    minutes. For a Serverless deployment, you would pay for the 15 minutes of compute
    usage for 8 vCores, and for the remaining 90 minutes, you would pay for the equivalent
    compute usage for the min vCores. In addition, if you have `AutoPause` enabled,
    you will not pay for any compute costs for the last 60 minutes of that two-hour
    period (this is because the smallest time before a Serverless deployment is paused
    if idle is one hour).


    Figure 7-29 shows an example of CPU utilization for a Serverless deployment and
    below it a graph of actual compute billed. Notice the highest average CPU billed
    is during high compute utilization. The rest of the billing is for the min vCore
    (2 vCore) when the database is idle.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig29_HTML.jpg)


    *Figure 7-29: Azure Metrics for Serverless for CPU and billing*


    > **Note**

    >

    > General Purpose service tier supports auto-pause when the database is idle after
    a period. When the database is paused, you are not billed for any compute. At
    the time of the writing of this book, Hyperscale does not support auto-pause.


    **The Cloud SQL Workshop** also has labs to show you how to scale with serverless,
    which you can try at [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB).'
