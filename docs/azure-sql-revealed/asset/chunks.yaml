  trans: '### Azure 门户中的故障排除资源


    我的前同事与我们的工程团队合作，构建了一些工具，帮助您在 Azure 门户中自行排查问题。


    我提到过使用服务菜单中的`资源运行状况`选项来查找可能影响可用性的故障转移。图 9-5 显示了我 Azure SQL 数据库的此屏幕，其中包含选择`故障排除工具`的参考（您也可以从服务菜单的`支持+故障排除`选项访问故障排除工具）。


    ![](img/496204_2_En_9_Fig5_HTML.jpg)


    **图 9-5** 通过资源运行状况访问故障排除工具


    如果选择`故障排除工具`，您将看到一组基于 Microsoft 支持从客户支持请求中看到的高发问题的常见问题，如图 9-6 所示。


    ![](img/496204_2_En_9_Fig6_HTML.jpg)


    **图 9-6** 诊断并解决 Azure SQL 的常见问题


    我可以搜索常见问题类型，也可以选择一个类别并使用特定的一组屏幕来排查问题。假设我无法连接到我的 Azure SQL 数据库，并收到了本节前面提到的错误`Msg
    40613`。


    我可以从`连接性：排查数据库可用性和连接错误`中选择“故障排除”链接。我可以选择我的问题是`Msg 40613`，向下滚动可以看到更多细节，帮助我排查我的特定问题，如图
    9-7 所示。


    ![](img/496204_2_En_9_Fig7_HTML.jpg)


    **图 9-7** 排查连接错误 40613


    我可以选择问题发生的时间范围并运行诊断。诊断可能会利用 Azure 中的内置遥测数据来帮助确定原因。如果这对我没有帮助，我可以像图 9-8 那样向下滚动。


    ![](img/496204_2_En_9_Fig8_HTML.jpg)


    **图 9-8** 用于排查错误 40613 的更多信息


    这包括常见解决方案、网页搜索结果，以及搜索社区论坛甚至创建新的支持请求的能力。使用此方法创建支持请求的一个巨大优势是，Microsoft 的支持工程师拥有您在此处选择的所有有关问题、您的数据库上下文以及已运行诊断的上下文信息，从而节省您的时间和精力。


    Microsoft 提供各种支持计划来帮助您进行 Azure 部署。所有 Azure 客户都可以免费获得一组基本的支持选项。但是，也有付费支持选项，可提高您的可用性级别，让
    Microsoft 支持全天候（24/7）处理关键业务问题。在 `https://azure.microsoft.com/support/plans/` 了解所有
    Azure 支持计划。


    那么`Copilot`呢？我提到过它是一个帮助您管理和配置 Azure SQL 数据库的新工具。假设我无法登录 Azure SQL 数据库，并收到`错误 40615`，这表明存在防火墙问题。假设我不知道该消息的细节，并且我发现有人抱怨无法登录。我可以像图
    9-9 所示那样使用`Copilot`寻求帮助。


    ![](img/496204_2_En_9_Fig9_HTML.jpg)


    **图 9-9** Copilot 帮助解决登录 Azure SQL 数据库失败的问题


    我喜欢这里的上下文信息。我知道时间范围、服务器和数据库，并且知道这是一个防火墙问题。系统还提供了提示来帮助我解决问题。


    如果我选择“您能帮我将 IP 添加到防火墙规则吗”，我会得到如何执行此操作的具体说明，如图 9-10 所示。


    ![](img/496204_2_En_9_Fig10_HTML.jpg)


    **图 9-10** Copilot 提供的添加防火墙规则的解决方案


    我仍然必须找出是哪台客户端出了问题并设置规则。如果我启用了`SQL 审核`，我可以轻松获取该信息。


    ### UserVoice


    您可能正在使用 Azure SQL 并有一个建议，不一定是一个需要支持的问题。Microsoft 通过一个名为`Azure 创意`的概念，为 Azure SQL
    提供了一个反馈论坛。您可以在 `https://aka.ms/sqlfeedback` 访问 Azure SQL 和 SQL Server 的反馈。


    我可以向您保证，作为一个工程团队，我们确实会查看这些请求以及客户如何对它们进行投票，因此请找到您热衷的事情，并让其他人投票支持您的想法。


    ## Azure SQL 最佳实践


    为了总结本章，让我们看看可以帮助您了解 Azure SQL 部署最佳实践的资源。


    ### 安全手册


    大约一年前，我们团队中专门负责安全的首席项目经理 Jakub Szymaszek（您将遇到的最好的人之一）向我提出了团队正在研究的一个想法。他说“Bob，你使用
    SQL Server 很多年了。你能看看我们正在研究的`安全手册`吗？”我给了他一些反馈，并期待着项目的进展。


    这项工作的成果已融入我们的文档中，网址为 `https://learn.microsoft.com/azure/azure-sql/database/security-best-practice`。本文档涵盖了我们团队关于保护
    Azure SQL 最佳实践的集体知识。这包括身份验证、访问管理、数据保护、网络安全、监控和审核、常见安全威胁以及可用性的安全方面。这是您在部署和保护 Azure
    SQL 时阅读和学习的“事实”指南。您会发现本书第 6 章学到的许多概念与这些最佳实践相符。


    ### 性能最佳实践


    在本书第 7 章中，您看到了对 Azure SQL 性能的全面了解。正如您在该章中所见，有一些最佳实践需要遵循。我们在 `https://learn.microsoft.com/azure/azure-sql/database/performance-guidance`
    也为您准备了一份非常好的性能最佳实践摘要供您阅读。这包括监控、查询设计和应用程序开发的指导。


    另一个极好的资源来自我长期的同事 Jack Li，他现在在我们的工程团队工作。在 `https://learn.microsoft.com/azure/azure-sql/identify-query-performance-issues`
    了解更多信息。'
- fmt: "## Azure Advisor\n\nGiven that in the Azure ecosystem there is a great deal\
    \ of telemetry about your deployments (but not your data), why not build in some\
    \ automation to give you advice? That is `Azure Advisor`. `Azure Advisor` is the\
    \ collective knowledge of the Azure engineering team all up to give you advice\
    \ about your deployments in the topics of cost, security, reliability, operational\
    \ excellence, and performance. You can read more about `Azure Advisor` at [`https://learn.microsoft.com/azure/advisor/advisor-overview`](https://learn.microsoft.com/azure/advisor/advisor-overview).\
    \ Figure 9-11 shows an example of `Azure Advisor` for my subscription.\n\n![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig11_HTML.jpg)\n\
    \nFigure 9-11: Azure Advisor\n\nHere is a nice blog post outlining what `Azure\
    \ Advisor` can do for you: [`https://azure.microsoft.com/blog/your-single-source-for-azure-best-practices/`](https://azure.microsoft.com/blog/your-single-source-for-azure-best-practices/).\
    \ You can see from my advisor overview, I have some work to go look at security!\n\
    \nNotice in `Azure Advisor` the area of *saving costs*. Our documentation calls\
    \ out some of these cost saving ideas at [`https://learn.microsoft.com/azure/advisor/advisor-cost-recommendations`](https://learn.microsoft.com/azure/advisor/advisor-cost-recommendations).\
    \ For me, savings costs are very important balanced with the needs of your application\
    \ for security, performance, and availability. Keep these cost saving ideas in\
    \ mind for `Azure SQL`:\n- Monitor your performance for `Azure SQL Database` and\
    \ right-size your `vCore` and storage choices over time. You saw in Chapter 7\
    \ of the book how easy it is to scale databases.\n- Take a hard look at the `Serverless`\
    \ compute tier. `Serverless` comes with auto-scaling, pay per second, and pause\
    \ for compute when idle.\n- Use the start/stop feature of `Azure SQL Managed Instance`\
    \ when there are periods where the instance is not being used.\n- Take advantage\
    \ of using your existing licenses with `Azure Hybrid Benefit`.\n- Read my blog\
    \ on how to maximize savings with SQL at [`https://www.microsoft.com/sql-server/blog/2024/02/15/how-sql-developers-can-maximize-savings`](https://www.microsoft.com/sql-server/blog/2024/02/15/how-sql-developers-can-maximize-savings).\n\
    - If you only need a replica for disaster recovery, mark it as *passive* and saving\
    \ on costs. This concept is called standby replicas in `Azure SQL Database`.\n\
    - Shut down `Azure Virtual Machines` when you don’t need them.\n- Another way\
    \ to analyze costs is to use the cost analysis option in the `Azure portal`. This\
    \ provides a nice breakdown of costs and helps forecast future costs. Learn more\
    \ at [`https://learn.microsoft.com/azure/cost-management-billing/costs/quick-acm-cost-analysis`](https://learn.microsoft.com/azure/cost-management-billing/costs/quick-acm-cost-analysis).\n\
    \n## Keep Up to Date with New Features\n\nOur team creates resources for you to\
    \ stay in touch with everything that is new about `Azure SQL`, including `Azure\
    \ SQL Managed Instance` and `Azure SQL Database` for both preview and generally\
    \ available features. I advise you bookmark these links:\n- [`https://aka.ms/whatsnewsqldb`](https://aka.ms/whatsnewsqldb)\n\
    - [`https://aka.ms/whatsnewsqlmi`](https://aka.ms/whatsnewsqlmi)\n\n## Stay in\
    \ Touch with Our Team\n\nI have some resources for you to use to keep track of\
    \ various aspects of `Azure SQL`, gain more knowledge, and learn more best practices.\n\
    - Follow the `X` handle `@AzureSQL`. This is the official handle for our `Azure\
    \ SQL` engineering team. Also, we often use `#azuresql` to post interesting announcements,\
    \ presentations, and facts about `Azure SQL`. My colleague Marisa Brasile does\
    \ an amazing job of keeping the community and industry up to date with these resources.\
    \ You can also follow my handle at `@bobwardms`.\n- I often post important news\
    \ and announcements for `Azure SQL` on `LinkedIn` at [`linkedin.com/in/bobwardms`](https://www.linkedin.com/in/bobwardms).\n\
    - There are several blogs our team engages in I think you will find helpful:\n\
    \    - Our `main SQL Server blog` at [`https://www.microsoft.com/sql-server/blog`](https://www.microsoft.com/sql-server/blog)\n\
    \    - The `Tech Community Blog` at [`https://techcommunity.microsoft.com/t5/azure-sql-database/bg-p/Azure-SQL-Database`](https://techcommunity.microsoft.com/t5/azure-sql-database/bg-p/Azure-SQL-Database)\n\
    \    - Our `Azure SQL Devs’ Corner` at [`https://devblogs.microsoft.com/azure-sql`](https://devblogs.microsoft.com/azure-sql)\n\
    - My colleague Anna Hoffman and I built a series of training materials for self-paced\
    \ study and hands-on learning. The content for these materials spans labs, videos,\
    \ and open source. All of these are completely free! Check out these links:\n\
    \    - [`https://aka.ms/azuresqlfundamentals`](https://aka.ms/azuresqlfundamentals)\
    \ – This is a self-paced course you can take on `Microsoft Learn`. The cool part\
    \ of this course is that you don’t need an `Azure` subscription. A free sandbox\
    \ is provided for you to try out `Azure SQL`!\n    - [`https://aka.ms/azuresql4beginners`](https://aka.ms/azuresql4beginners)\
    \ – This is a series of short videos on `YouTube` (some 60+ videos) for you to\
    \ learn `Azure SQL` at your own pace. The videos line up with the `Azure SQL Fundamentals`\
    \ labs (but there is even more here).\n    - [`https://aka.ms/azuresqlworkshop`](https://aka.ms/azuresqlworkshop)\
    \ – A great introductory workshop that we built to complement `Azure SQL for Beginners`\
    \ and `Azure SQL Fundamentals`.\n    - [`https://aka.ms/cloudsqlworkshop`](https://aka.ms/cloudsqlworkshop)\
    \ – This is a recent workshop I built to be used for an in-person day-long workshop\
    \ on `Azure SQL`, including `Azure VM`, `Managed Instance`, and `Azure SQL Database`.\
    \ It comes with self-paced labs and a full PowerPoint deck.\n- Anna also hosts\
    \ a video series called `Data Exposed` where members of the engineering team talk\
    \ about various aspects of `Azure SQL` and `SQL Server`. Take a look at this series\
    \ at [`https://aka.ms/dataexposed`](https://aka.ms/dataexposed).\n\n## Summary\n\
    \nIn this chapter, you extended your knowledge of `Azure SQL` by looking at features\
    \ compared to `SQL Server` such as linked servers and `Database Mail`, understanding\
    \ options for job management, exploring ways to support your deployments, and\
    \ reviewing best practices for using `Azure SQL`.\n\nSo what else is there to\
    \ learn about `Azure SQL`? If you recall, I mentioned in Chapters 1 and 2 new\
    \ capabilities in `Azure SQL` that go beyond the traditional `Relational Database\
    \ Management System` (`RDBMS`). Move on to the last chapter of the book to go\
    \ *Beyond RDBMS*."
