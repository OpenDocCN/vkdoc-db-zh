- fmt: '## 灾难恢复与异地复制


    异地复制数据库也可用于灾难恢复的故障转移目的。所有故障转移操作都是手动的。数据丢失情况取决于数据是否已同步到副本以及源数据库的可用性。有几种方法可以启动故障转移，包括
    Azure 门户、az CLI、PowerShell 和 `ALTER DATABASE`。“计划内故障转移”（`FAILOVER`）要求源数据库可用，并且主副本和次要副本之间会发生数据同步。“强制故障转移”（`FORCED
    FAILOVER`）不会等待任何同步，也不要求源数据库可用。动态管理视图 `sys.dm_geo_replication_link_status` 可用于检查主副本和次要副本之间的数据同步状态。


    应用程序可以使用 Azure 技术（如 Azure 流量管理器）来设置抽象层，以便在故障转移后仍能连接到主数据库。请从我们的文档中了解更多关于为全局 Azure
    SQL 数据库部署构建应用程序的信息：[`https://learn.microsoft.com/azure/azure-sql/database/designing-cloud-solutions-for-disaster-recovery`](https://learn.microsoft.com/azure/azure-sql/database/designing-cloud-solutions-for-disaster-recovery)。我们的文档
    [`https://learn.microsoft.com/azure/azure-sql/database/active-geo-replication-overview`](https://learn.microsoft.com/azure/azure-sql/database/active-geo-replication-overview)
    提供了一个很好的可视化示例，展示了完全部署了异地复制的 Azure SQL 数据库可能的样子，如图 [8-18](#496204_2_En_8_Chapter.xhtml#Fig18)
    所示。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig18_HTML.jpg)

    *图 8-18 使用异地复制完全部署的 Azure SQL 数据库*


    使用异地复制时需要考虑的一些要点：

    *   你可以稍作设置，将异地复制数据库部署到另一个 Azure 订阅中。了解更多：[`https://learn.microsoft.com/azure/azure-sql/database/active-geo-replication-overview?view=azuresql#cross-subscription-geo-replication`](https://learn.microsoft.com/azure/azure-sql/database/active-geo-replication-overview?view=azuresql#cross-subscription-geo-replication)。

    *   主服务器上的服务器级防火墙规则不会被复制，因此请考虑使用数据库防火墙规则或其他方法连接到次要副本。

    *   使用包含数据库用户（即使使用 Microsoft Entra）具有巨大优势，因为它们会被复制。

    *   异地复制使用数据的异步复制。因此，如果你故障转移到次要副本，可能会遇到数据丢失（但不会不一致）。但是，如果你要求次要副本在故障转移前完全同步，可以使用存储过程
    `sp_wait_for_database_copy_sync`。了解更多：[`https://learn.microsoft.com/azure/azure-sql/database/active-geo-replication-overview?view=azuresql#preventing-the-loss-of-critical-data`](https://learn.microsoft.com/azure/azure-sql/database/active-geo-replication-overview?view=azuresql#preventing-the-loss-of-critical-data)。

    *   az CLI 支持创建和配置异地复制（例如 `az sql db replica`），并且存在支持异地复制的 PowerShell cmdlet（例如
    `New-AzSqlDatabaseSecondary`）。


    ### 故障转移组


    SQL Server 中的 Always On 可用性组支持*组*的概念，该组是数据库的集合，作为故障转移的单位。**故障转移组**在 Azure SQL（包括
    Azure SQL 托管实例和 Azure SQL 数据库）中提供了相同的概念。


    图 [8-19](#496204_2_En_8_Chapter.xhtml#Fig19) 展示了 Azure SQL 数据库故障转移组的架构（你也可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/failover-group-sql-mi?view=azuresql#failover-group-architecture`](https://learn.microsoft.com/azure/azure-sql/managed-instance/failover-group-sql-mi?view=azuresql#failover-group-architecture)
    查看 Azure SQL 托管实例故障转移组的架构）。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig19_HTML.jpg)

    *图 8-19 Azure SQL 数据库的故障转移组*


    请注意，与异地复制不同，故障转移组在逻辑服务器级别操作（然后你将数据库放入故障转移组中）。


    在此图中请注意，异地复制用于将组中的任何数据库复制到次要副本。此外，提供了两个监听器，用于将应用程序与连接到主副本（读写）和次要副本（只读）抽象开。在此架构中，你可以将应用程序构建为容错的，并使用
    Azure 流量管理器来平衡工作负载（你需要实现 Azure 流量管理器解决方案）。


    让我们为 Azure SQL 数据库在另一个区域构建一个故障转移组，使用本书中一直使用的逻辑服务器 `bwsqllogicalserver`。我将首先在 Azure
    门户中导航到我的逻辑服务器，并从服务菜单中选择“故障转移组”，如图 [8-20](#496204_2_En_8_Chapter.xhtml#Fig20) 所示。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig20_HTML.jpg)

    *图 8-20 为逻辑服务器创建故障转移组*


    现在我将选择“添加组”来创建故障转移组。你可以在图 [8-21](#496204_2_En_8_Chapter.xhtml#Fig21) 中看到我创建新组的选项。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig21_HTML.jpg)

    *图 8-21 创建故障转移组的详细信息*


    首先，我需要为组提供一个名称。这成为组的逻辑名称，用于读写和只读连接（非常类似于 Always On 可用性组的监听器）。


    我还提供了在新区域中定义新逻辑服务器的信息（它也可以是现有的逻辑服务器，但必须在另一个区域）。


    现在我可以通过单击“配置数据库”来选择要添加到组中的数据库。我现在会得到一个如图 [8-22](#496204_2_En_8_Chapter.xhtml#Fig22)
    所示的屏幕。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig22_HTML.jpg)

    *图 8-22 选择数据库和故障转移组*


    我选择了两个已部署的数据库加入该组。这里是故障转移组很酷的部分。这些数据库无需配置相同即可加入组。在此示例中，我选择了“业务关键”服务层级和一个“超大规模”数据库。请注意，我可以选择使这些成为备用副本，当你做出此选择时，可以看到你的成本估算会减少。我将此项保留为“否”并单击“选择”。


    我选择了“创建”，这会触发故障转移组的新部署。当部署完成（包括类似异地复制的初始化）后，图 [8-23](#496204_2_En_8_Chapter.xhtml#Fig23)
    显示了更新后的故障转移组状态屏幕。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig23_HTML.jpg)

    *图 8-23 部署后的故障转移组*


    请注意，“读/写故障转移策略”显示为“客户管理”。有两种类型的故障转移策略：'
  raw: 'A geo-replicated database can also be used for failover purposes for disaster
    recovery. All failover operations are manual. Your data loss depends on whether
    data is synchronized to the replica and the availability of the source database.
    There are several methods to initiate a failover, including the Azure Portal,
    az CLI, PowerShell, and ALTER DATABASE. A “planned failover” or FAILOVER requires
    the source database to be available and a data synchronization to occur between
    the primary and secondary replicas. A FORCED FAILOVER does not wait for any synchronization
    and doesn’t require the source database to be available. The DMV **sys.dm_geo_replication_link_status**
    can be used to check the status of data synchronization between primary and secondary
    replicas.


    Applications can use Azure technology like Azure Traffic Manager to set up an
    abstraction to connect to a primary even after failover. Learn more from our documentation
    about building applications for global Azure SQL Database deployments at [`https://learn.microsoft.com/azure/azure-sql/database/designing-cloud-solutions-for-disaster-recovery`](https://learn.microsoft.com/azure/azure-sql/database/designing-cloud-solutions-for-disaster-recovery).
    Our documentation at [`https://learn.microsoft.com/azure/azure-sql/database/active-geo-replication-overview`](https://learn.microsoft.com/azure/azure-sql/database/active-geo-replication-overview)
    has a nice visual showing what a fully deployed Azure SQL Database with geo-replication
    can look like as seen in Figure [8-18](#496204_2_En_8_Chapter.xhtml#Fig18).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig18_HTML.jpg)


    Figure 8-18


    A fully deployed Azure SQL Database using geo-replication


    Here are some important points to consider when using geo-replication:


    *   You can set up a geo-replicated database on another Azure subscription with
    a little work. Learn more at [`https://learn.microsoft.com/azure/azure-sql/database/active-geo-replication-overview?view=azuresql#cross-subscription-geo-replication`](https://learn.microsoft.com/azure/azure-sql/database/active-geo-replication-overview?view=azuresql#cross-subscription-geo-replication).


    *   Server-level firewall rules on the primary are not replicated, so consider
    using database firewall rules or other methods to connect to the secondary.


    *   Using contained database users (even with Microsoft Entra) has a huge advantage
    as they are replicated.


    *   Geo-replication uses asynchronous replication of data. Therefore, if you fail
    over to a secondary, you might experience data loss (but not consistency). However,
    if you require a secondary to be completely in sync before a failover, you can
    use the **sp_wait_for_database_copy_sync** stored procedure. Learn more at [`https://learn.microsoft.com/azure/azure-sql/database/active-geo-replication-overview?view=azuresql#preventing-the-loss-of-critical-data`](https://learn.microsoft.com/azure/azure-sql/database/active-geo-replication-overview?view=azuresql#preventing-the-loss-of-critical-data).


    *   The az CLI supports creating and configuring geo-replication (e.g., **az sql
    db replica**), and PowerShell cmdlets exist to support geo-replication (e.g.,
    **New-AzSqlDatabaseSecondary**).


    ### Failover Group


    Always On Availability Groups in SQL Server support the concept of a *group*,
    which is a collection of databases that are the unit of failover. **Failover groups**
    provide this same concept in Azure SQL both for Azure SQL Managed Instance and
    Azure SQL Database.


    Figure [8-19](#496204_2_En_8_Chapter.xhtml#Fig19) shows the architecture of a
    failover group for Azure SQL Database (you can also see an architecture of failover
    groups for Azure SQL Managed Instance at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/failover-group-sql-mi?view=azuresql#failover-group-architecture`](https://learn.microsoft.com/azure/azure-sql/managed-instance/failover-group-sql-mi?view=azuresql#failover-group-architecture)).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig19_HTML.jpg)


    Figure 8-19


    Failover group for Azure SQL Database


    Notice here that unlike geo-replication, failover groups operate at the logical
    server level (and then you place databases in the failover group).


    Notice in this diagram that geo-replication is used to replicate any database
    in the group to the secondary. In addition, two listeners are provided to abstract
    the application from connecting to the primary replicas (read-write) and secondaries
    (read-only). And in this architecture, you can build your application as fault-tolerant
    and use Azure Traffic Manager to load-balance the workload (you would implement
    the Azure Traffic Manager solution).


    Let’s go build a failover group in another region for the Azure SQL Database using
    the logical server I’ve been using in the book, **bwsqllogicalserver**. I’ll first
    navigate to my logical server in the Azure portal and select Failover groups from
    the Service Menu like in Figure [8-20](#496204_2_En_8_Chapter.xhtml#Fig20).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig20_HTML.jpg)


    Figure 8-20


    Creating a failover group for a logical server


    Now I’ll select **Add group** to create the failover group. You can see in Figure
    [8-21](#496204_2_En_8_Chapter.xhtml#Fig21) my choices to create the new group.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig21_HTML.jpg)


    Figure 8-21


    Creating the details of a failover group


    First, I need to provide the group a name. This becomes the logical name of the
    group to connect for both read-write and read-only (very much like a listener
    for an Always On Availability Group).


    I also provided the definition of a new logical server in a new region (it could
    be an existing logical server but must be in another region).


    Now I can choose which databases to add to the group by clicking Configure database.
    I now get a screen like Figure [8-22](#496204_2_En_8_Chapter.xhtml#Fig22).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig22_HTML.jpg)


    Figure 8-22


    Choosing databases and a failover group


    I’ve chosen two databases I’ve already deployed to be in the group. Here is the
    cool part of failover groups. The databases do not have to be configured the same
    to be in the group. In this example, I’ve chosen a Business Critical service tier
    and a Hyperscale database. Notice I can choose to make these standby replicas,
    and when you make this choice, you can see your cost estimate decrease. I’ll leave
    this as No and click **Select**.


    I selected **Create** which fires off a new deployment for the failover group.
    When the deployment finished (which includes seeding like geo-replication), Figure
    [8-23](#496204_2_En_8_Chapter.xhtml#Fig23) shows the updated screen for the status
    of the failover group.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig23_HTML.jpg)


    Figure 8-23


    Failover group after deployment


    Notice the Read/Write failover policy says **Customer Managed**. There are two
    types of failover policies:'
