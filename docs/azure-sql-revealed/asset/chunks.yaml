- fmt: '### Using the Public Endpoint


    在第 [4](#496204_2_En_4_Chapter.xhtml) 章关于部署的内容中，我向您展示了一些数据库部署的连接选项，其中包括：


    *   `Allow access to Azure services` – 此选项允许任何 Azure 资源（例如，VM、应用程序或 cloud shell）访问数据库部署的公共端点。


    *   `Firewall rules` – 此选项允许您为 Azure 外部的客户端计算机创建特定的防火墙规则。我在第 [4](#496204_2_En_4_Chapter.xhtml)
    章中使用了此技术，通过我的笔记本电脑和 SQL Server Management Studio (SSMS) 连接到我部署的逻辑服务器。


    图 [6-2](#496204_2_En_6_Chapter.xhtml#Fig2) 展示了 Azure 资源和本地计算机如何连接到具有公共端点的逻辑服务器的网络连接图。


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig2_HTML.jpg)

    图 6-2 连接到具有公共端点的逻辑服务器


    在此图中，您可以看到通过 `Allow access to Azure services` 连接的 Azure VM 资源，以及通过防火墙规则连接的本地计算机。请注意，Azure
    虚拟机使用的是它们的公共 IP 地址，因为即使在 Azure 内部，它们也是通过公共端点连接进行连接的。


    > **注意**

    > 需要明确的是，您可以使用 `Allow access to Azure services` 并关闭所有其他防火墙规则。虽然这不是私有端点的场景，但它确实阻止了任何来自
    Azure *外部* 连接到逻辑服务器的连接。


    注意在此图中，逻辑服务器的名称是 [mysqldbsrv.​database.​windows.​net](http://mysqldbsrv.database.windows.net)（这是一个示例，并非我使用的逻辑服务器）。这是逻辑服务器的名称，但公共端点如何在互联网上被解析呢？注意在此名称下方是一个公共
    IP 地址和一个网络名称 [westus1-a.​control.​database.​windows.​net](http://westus1-a.control.database.windows.net)。此名称是连接到逻辑服务器时，网关节点的
    DNS 名称的一部分。


    由于启用了 `Allow access to Azure services`，让我们使用我在第 [3](#496204_2_En_3_Chapter.xhtml)
    章创建的 Azure 虚拟机 `bwsql2022`，来检查连接到我在第 [4](#496204_2_En_4_Chapter.xhtml) 章部署的逻辑服务器的连接属性。


    我使用 RDP 连接到该虚拟机（我在本章前面提到过在 VM 中安装了 SSMS 和 Azure Data Studio）。然后，我使用 SSMS 连接到我在第
    [4](#496204_2_En_4_Chapter.xhtml) 章部署的名为 [**bwsqllogicalserver.database.windows.net**](http://bwsqllogicalserver.database.windows.net)
    的 Azure 逻辑服务器。`dm_exec_connections` 是 SQL Server 的一个 DMV，可以提供有关到服务器连接的关键信息。因此，我从
    SSMS 运行了以下 T-SQL 语句：


    ```

    SELECT client_net_address FROM sys.dm_exec_connections

    WHERE session_id = @@SPID;

    ```


    返回的结果是：


    ```

    52.173.38.9

    ```


    这个 IP 地址是 Azure 虚拟机 `bwsql2012` 的*公共 IP地址*。这证明了 VM 正在通过公共端点连接到逻辑服务器。然而，VM 有权访问（无需通过防火墙允许连接），因为我使用了
    `Allow access to Azure services` 选项。


    另一种查看 Azure SQL Database 公共端点方面的有趣方法是检查逻辑服务器的 DNS 基础结构。您可以使用 `nslookup` 命令来完成此操作（`nslookup`
    在 Windows 和 Linux 操作系统上默认可用；更多信息请参见 [`https://learn.microsoft.com/windows-server/administration/windows-commands/nslookup`](https://learn.microsoft.com/windows-server/administration/windows-commands/nslookup)）。


    从我的 Azure 虚拟机中，我随后在 PowerShell 中运行了如下命令：


    ```

    nslookup bwsqllogical.database.windows.net

    ```


    我收到了以下结果：


    ```

    Server:  UnKnown

    Address:  168.63.129.16

    Non-authoritative answer:

    Name:    cr8.cEntralus1-a.control.database.windows.net

    Address:  13.89.169.20

    Aliases:  bwsqllogicalserver.database.windows.net

    dataslice7.cEntralus.database.windows.net

    dataslice7cEntralus.trafficmanager.net

    ```


    顶部的结果是 IP 地址 `168.63.129.16`。事实证明，这个地址是用于 Azure 通信的特殊虚拟 IP 地址，因此在 Azure 内部，您的地址始终会显示这个（更多信息请参见
    [`https://learn.microsoft.com/en-us/azure/virtual-network/what-is-ip-address-168-63-129-16`](https://learn.microsoft.com/en-us/azure/virtual-network/what-is-ip-address-168-63-129-16)）。


    底部的结果显示了逻辑服务器的 DNS 层次结构，其中包括 Azure *控制环*（网关）内的 DNS 服务器。


    另外，请注意 ping 是被阻止的，但它显示了如何尝试访问公共端点：


    ```

    ping bwsqllogicalserver.database.windows.net

    Pinging cr8.cEntralus1-a.control.database.windows.net [13.89.169.20] with 32 bytes
    of data:

    Request timed out

    ```


    还有第三种选项可以保护连接逻辑服务器的安全性。假设您想关闭 `Allow access to Azure services`，但又不想为防火墙规则使用固定
    IP 地址。您可以使用 `virtual network service endpoint` 来允许仅来自虚拟网络（可能包括本地连接）的特定 Azure 资源连接到逻辑服务器。这仍然是一个公共端点连接，但严格限制来自特定
    Azure 虚拟网络的资源。有关如何使用虚拟网络服务终结点的更多信息，请参阅 [`https://learn.microsoft.com/azure/azure-sql/database/vnet-service-endpoint-rule-overview`](https://learn.microsoft.com/azure/azure-sql/database/vnet-service-endpoint-rule-overview)。


    让我们使用一种不同的技术来加强 Azure 逻辑服务器网络连接的安全性，即专用链接。'
  raw: '#### Using the Public Endpoint


    In Chapter [4](#496204_2_En_4_Chapter.xhtml) for deployment, I showed you some
    of the connection options for a database deployment, which includes


    *   **Allow access to Azure services** – This option allows any Azure resource
    (e.g., VM, application, or cloud shell) to access the public endpoint for the
    database deployment.


    *   **Firewall rules** – This option allows you to create specific firewall rules
    for client computers outside of Azure. I used this technique in Chapter [4](#496204_2_En_4_Chapter.xhtml)
    to connect to the logical server I deployed with my laptop and SQL Server Management
    Studio (SSMS).


    Figure [6-2](#496204_2_En_6_Chapter.xhtml#Fig2) shows a network connectivity diagram
    of how both Azure resource and on-premises computers can be connected to the logical
    server with a public endpoint.


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Connecting to a logical server with a public endpoint


    You can see in this figure Azure VM resources that are connected through the Allow
    access to Azure services and on-premises computers connecting through a firewall
    rule. Notice the IP addresses of the Azure Virtual Machines are using their public
    IP address because even they are using a public endpoint connection within Azure.


    Note


    To be clear, you could use Allow access to Azure services and turn OFF all other
    firewall rules. While this is not a private endpoint scenario, it does prevent
    any connection unless it comes *within* Azure to connect to the logical server.


    Notice in this figure the name of the logical server is [mysqldbsrv.​database.​windows.​net](http://mysqldbsrv.database.windows.net)
    (this is from an example that is not the logical server I used). That is the name
    of the logical server, but how does the public endpoint get resolved on the Internet?
    Notice underneath this name in the figure is a public IP address and a network
    name of [westus1-a.​control.​database.​windows.​net](http://westus1-a.control.database.windows.net).
    This name is part of the DNS name of the node for the gateways when connecting
    to the logical server.


    Since Allow access to Azure services is enabled, let’s use the Azure Virtual Machine
    I created in Chapter [3](#496204_2_En_3_Chapter.xhtml), **bwsql2022**, to examine
    connectivity properties to the logical server I deployed in Chapter [4](#496204_2_En_4_Chapter.xhtml).


    I used RDP to connect into the virtual machine (I noted earlier in the chapter
    I installed SSMS and Azure Data Studio in the VM). I then connected using SSMS
    to the Azure Logical Server I deployed in Chapter [4](#496204_2_En_4_Chapter.xhtml)
    called [**bwsqllogicalserver.database.windows.net**](http://bwsqllogicalserver.database.windows.net).
    **dm_exec_connections** is a DMV for SQL Server that can provide key information
    about connections to the server. Therefore, I ran the following T-SQL statement
    from SSMS:


    ```

    SELECT client_net_address FROM sys.dm_exec_connections

    WHERE session_id = @@SPID;

    ```


    And the returned result is the following:


    ```

    52.173.38.9

    ```


    This IP address is the *public IP address* of the Azure Virtual Machine, bwsql2012\.
    This proves that the VM is connecting to the logical server over a public endpoint.
    However, the VM has access (without allowing the connection through a firewall)
    because I used the option **Allow access to Azure services**.


    Another interesting way to look at the public endpoint aspect to Azure SQL Database
    is to examine the DNS infrastructure of the logical server. You can use the **nslookup**
    command to do this (nslookup is available by default on Windows and Linux operating
    systems; see more at [`https://learn.microsoft.com/windows-server/administration/windows-commands/nslookup`](https://learn.microsoft.com/windows-server/administration/windows-commands/nslookup)).


    From my Azure Virtual Machine, I then ran nslookup from PowerShell like the following:


    ```

    nslookup bwsqllogical.database.windows.net

    ```


    I received the following results:


    ```

    Server:  UnKnown

    Address:  168.63.129.16

    Non-authoritative answer:

    Name:    cr8.cEntralus1-a.control.database.windows.net

    Address:  13.89.169.20

    Aliases:  bwsqllogicalserver.database.windows.net

    dataslice7.cEntralus.database.windows.net

    dataslice7cEntralus.trafficmanager.net

    ```


    The top result is IP address 168.63.129.16\. It turns out this address is a special
    virtual IP address used for Azure communications, so within Azure your address
    will always say this (see more information at [`https://learn.microsoft.com/en-us/azure/virtual-network/what-is-ip-address-168-63-129-16`](https://learn.microsoft.com/en-us/azure/virtual-network/what-is-ip-address-168-63-129-16)).


    The results at the bottom show the DNS hierarchy of the logical server which includes
    a DNS server within the *control ring* (gateways) of Azure.


    Also, note that a ping is blocked, but it shows how a public endpoint is attempted
    to be accessed:


    ```

    ping bwsqllogicalserver.database.windows.net

    Pinging cr8.cEntralus1-a.control.database.windows.net [13.89.169.20] with 32 bytes
    of data:

    Request timed out

    ```


    There is a third option to secure the connectivity to access the logical server.
    Let’s say you want to turn off Allow access to Azure services but don’t want to
    have to use a fixed IP address for a firewall rule. You can use a **virtual network
    service endpoint** to allow only specific Azure sources in a virtual network (which
    could include on-premises connections) to connect to the logical server. This
    is still a public endpoint connection but strictly limited to resources from a
    specific Azure virtual network. Read more about how to use a virtual network service
    endpoint at [`https://learn.microsoft.com/azure/azure-sql/database/vnet-service-endpoint-rule-overview`](https://learn.microsoft.com/azure/azure-sql/database/vnet-service-endpoint-rule-overview).


    Let’s use a different technique to tighten up the security of the network connectivity
    to the Azure logical server, a private link.'
