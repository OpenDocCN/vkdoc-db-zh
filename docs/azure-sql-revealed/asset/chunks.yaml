- fmt: '## Using Private Link


    Let’s say you do not want to allow any public endpoint access to your Azure SQL
    Databases regardless of whether connections come from within or outside of Azure.
    The Azure team has created a concept called `private link` to allow PaaS services
    like Azure SQL Database to restrict access only through a private endpoint. You
    can read an overview about private link at [`https://learn.microsoft.com/azure/private-link/private-link-overview`](https://learn.microsoft.com/azure/private-link/private-link-overview).


    Let’s look at a new variation of Figure [6-2](#496204_2_En_6_Chapter.xhtml#Fig2)
    using a private link. Figure [6-3](#496204_2_En_6_Chapter.xhtml#Fig3) shows how
    a private link provides a private endpoint for Azure SQL Database.


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig3_HTML.jpg)


    Figure 6-3 Private link with Azure SQL Database


    A private link will expose a private endpoint in an existing Azure virtual network.
    Notice in this diagram the DNS name for the logical server is no longer in a public
    DNS hierarchy.


    Let’s see how to implement a private link connection using the existing deployment
    of Azure SQL Database from Chapter [4](#496204_2_En_4_Chapter.xhtml) and the Azure
    portal. From my logical server (mine is called `bwsqllogicalserver`), I can create
    a private endpoint in the Azure Portal as you see in Figure [6-4](#496204_2_En_6_Chapter.xhtml#Fig4).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig4_HTML.jpg)


    Figure 6-4 Creating a private endpoint for Azure SQL Database


    You will be given a series of screens to give the endpoint a name, pick the virtual
    network (in this case, the virtual network is the one for the Azure VM `bwsql2022`
    I deployed in Chapter [3](#496204_2_En_3_Chapter.xhtml)), and DNS (which I just
    used the defaults). The deployment for this link will take a few minutes.


    Note


    The private endpoint must be in the same region as the Azure virtual network you
    choose. Remember the endpoint now becomes a resource in that VNet. However, your
    client connection could be in another virtual network using VNet peering or VNet
    gateways as seen in Figure [6-3](#496204_2_En_6_Chapter.xhtml#Fig3).


    Figure [6-5](#496204_2_En_6_Chapter.xhtml#Fig5) shows my deployed private endpoint
    associated with this logical server.


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig5_HTML.jpg)


    Figure 6-5 A deployed private endpoint for Azure SQL Database


    The endpoint is its own resource and is associated both with the virtual network
    for my Azure VM and this logical server (it can be used with other logical servers
    as well). If you select the private endpoint, you can drill into the network interface
    and see the private IP address. To show how I can use just this endpoint, I can
    also use the Azure Portal to disable any public endpoint through the same networking
    option off the Service Menu for this logical server.


    Now I’ll go back to my Azure VM `bwsql2022` and try to connect again with SSMS.
    My connection now works. If I run the following T-SQL statement:


    ```

    SELECT client_net_address FROM sys.dm_exec_connections

    WHERE session_id = @@SPID;

    ```


    the result is the following:


    ```

    10.0.0.4

    ```


    This is the `private IP address` (before it was the public IP address) of the
    Azure Virtual Machine `bwsql2022`. Let’s try to ping the logical server this time:


    ```

    ping bwsqllogicalserver.database.windows.net

    Pinging bwsqllogicalserver.privatelink.database.windows.net [10.0.0.5] with 32
    bytes of data:

    Request timed out

    ```


    Notice the private IP address of the server and the new DNS name which is not
    in the public hierarchy.


    Also, note the output for `nslookup`:


    ```

    nslookup bwsqllogical.database.windows.net

    Server:  UnKnown

    Address:  168.63.129.16

    Non-authoritative answer:

    Name:    bwsqllogicalserver.privatelink.database.windows.net

    Address:  10.0.0.5

    Aliases:  bwsqllogicalserver.database.windows.net

    ```


    Read more in our documentation at using Azure Private Link for Azure SQL Database
    at [`https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview`](https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview).
    For anyone wanting to integrate their on-premises environment, pay special attention
    to this documentation page: [`https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview?view=azuresql#on-premises-connectivity-over-private-peering`](https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview?view=azuresql#on-premises-connectivity-over-private-peering).


    Tip


    Private link connections for Azure SQL Database currently only support Proxy connection
    types. We had left the connection policy for our Azure SQL Database as default,
    so if a connection uses a private link which is inside of Azure, it will not use
    Redirect but Proxy.


    Go further with your knowledge of Azure SQL and Network Security by watching videos
    from Anna Hoffman and Rohit Nayak as part of the Data Exposed Channel at [`https://www.youtube.com/playlist?list=PL3EZ3A8mHh0xtbf4Cr2yR4-xsUtELwPjw`](https://www.youtube.com/playlist?list=PL3EZ3A8mHh0xtbf4Cr2yR4-xsUtELwPjw).


    ## Authentication and Access


    You have now successfully deployed an Azure SQL Managed Instance and Database(s)
    and connected using a secure network architecture. When you deployed both Azure
    SQL services, you specified an `admin`, which is a SQL login and password and
    possibly a Microsoft Entra Admin. The next steps are to set up and configure other
    logins and users just like you would a SQL Server deployment. I call this process
    setting up `authentication`. Then you will want to grant access to users to the
    objects they need based on the requirements of your application and business.


    Before we talk about the details of authentication and access for Azure SQL, let’s
    review first the authentication and access for Azure SQL resources *outside* of
    SQL but in the Azure infrastructure called Azure Role-Based Access Control (RBAC).


    ### Azure Role-Based Access Control (RBAC)


    I’ve mentioned the concept of Azure RBAC in previous chapters in the book. Today
    when you deploy SQL Server on Windows or Linux, you must have certain rights and
    privileges to install SQL Server. For example, on Windows, most people use local
    administrator accounts when installing SQL Server.


    At this point in the book, I’ve listed in several chapters the requirements to
    deploy Azure SQL such as the `Contributor role`. An Azure account user that is
    part of the Contributor role has the permissions to manage everything except grant
    access to resources to other accounts (that access is reserved for members of
    the Owner or User Access Administrator roles).


    Therefore, if you are assigned the Contributor role for your Azure subscription,
    you should have the rights to deploy Azure SQL Managed Instances and Databases.


    It is possible you want to set up a system for your organization so that some
    Azure users have the right to deploy or manage Azure SQL Managed Instances and
    Databases but not access the resources. Think of an administrator that only deploys
    or manages resources but doesn’t have access to the underlying SQL Server.


    Azure provides the following built-in roles for these purposes.


    ### SQL DB Contributor


    Members of this role can deploy and manage Azure SQL Databases but not access
    them.


    ### SQL Server Contributor


    Members of this role can deploy and manage Azure SQL logical servers and databases
    but not access them.


    ### SQL Security Manager


    Members of this role can manage security policies of Azure SQL logical servers
    and databases but not access them.


    ### SQL Managed Instance Contributor


    Members of this role can deploy and manage Azure SQL Managed Instances but not
    access them.


    You can read more about Azure built-in roles at [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles/databases`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles/databases).'
  raw: '#### Using Private Link


    Let’s say you do not want to allow any public endpoint access to your Azure SQL
    Databases regardless of whether connections come from within or outside of Azure.
    The Azure team has created a concept called **private link** to allow PaaS services
    like Azure SQL Database to restrict access only through a private endpoint. You
    can read an overview about private link at [`https://learn.microsoft.com/azure/private-link/private-link-overview`](https://learn.microsoft.com/azure/private-link/private-link-overview).


    Let’s look at a new variation of Figure [6-2](#496204_2_En_6_Chapter.xhtml#Fig2)
    using a private link. Figure [6-3](#496204_2_En_6_Chapter.xhtml#Fig3) shows how
    a private link provides a private endpoint for Azure SQL Database.


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Private link with Azure SQL Database


    A private link will expose a private endpoint in an existing Azure virtual network.
    Notice in this diagram the DNS name for the logical server is no longer in a public
    DNS hierarchy.


    Let’s see how to implement a private link connection using the existing deployment
    of Azure SQL Database from Chapter [4](#496204_2_En_4_Chapter.xhtml) and the Azure
    portal. From my logical server (mine is called **bwsqllogicalserver**), I can
    create a private endpoint in the Azure Portal as you see in Figure [6-4](#496204_2_En_6_Chapter.xhtml#Fig4).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Creating a private endpoint for Azure SQL Database


    You will be given a series of screens to give the endpoint a name, pick the virtual
    network (in this case, the virtual network is the one for the Azure VM **bwsql2022**
    I deployed in Chapter [3](#496204_2_En_3_Chapter.xhtml)), and DNS (which I just
    used the defaults). The deployment for this link will take a few minutes.


    Note


    The private endpoint must be in the same region as the Azure virtual network you
    choose. Remember the endpoint now becomes a resource in that VNet. However, your
    client connection could be in another virtual network using VNet peering or VNet
    gateways as seen in Figure [6-3](#496204_2_En_6_Chapter.xhtml#Fig3).


    Figure [6-5](#496204_2_En_6_Chapter.xhtml#Fig5) shows my deployed private endpoint
    associated with this logical server.


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig5_HTML.jpg)


    Figure 6-5


    A deployed private endpoint for Azure SQL Database


    The endpoint is its own resource and is associated both with the virtual network
    for my Azure VM and this logical server (it can be used with other logical servers
    as well). If you select the private endpoint, you can drill into the network interface
    and see the private IP address. To show how I can use just this endpoint, I can
    also use the Azure Portal to disable any public endpoint through the same networking
    option off the Service Menu for this logical server.


    Now I’ll go back to my Azure VM bwsql2022 and try to connect again with SSMS.
    My connection now works. If I run the following T-SQL statement:


    ```

    SELECT client_net_address FROM sys.dm_exec_connections

    WHERE session_id = @@SPID;

    ```


    the result is the following:


    ```

    10.0.0.4

    ```


    This is the ***private IP address*** (before it was the public IP address) of
    the Azure Virtual Machine bwsql2022\. Let’s try to ping the logical server this
    time:


    ```

    ping bwsqllogicalserver.database.windows.net

    Pinging bwsqllogicalserver.privatelink.database.windows.net [10.0.0.5] with 32
    bytes of data:

    Request timed out

    ```


    Notice the private IP address of the server and the new DNS name which is not
    in the public hierarchy.


    Also, note the output for nslookup:


    ```

    nslookup bwsqllogical.database.windows.net

    Server:  UnKnown

    Address:  168.63.129.16

    Non-authoritative answer:

    Name:    bwsqllogicalserver.privatelink.database.windows.net

    Address:  10.0.0.5

    Aliases:  bwsqllogicalserver.database.windows.net

    ```


    Read more in our documentation at using Azure Private Link for Azure SQL Database
    at [`https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview`](https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview).
    For anyone wanting to integrate their on-premises environment, pay special attention
    to this documentation page: [`https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview?view=azuresql#on-premises-connectivity-over-private-peering`](https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview?view=azuresql#on-premises-connectivity-over-private-peering).


    Tip


    Private link connections for Azure SQL Database currently only support Proxy connection
    types. We had left the connection policy for our Azure SQL Database as default,
    so if a connection uses a private link which is inside of Azure, it will not use
    Redirect but Proxy.


    Go further with your knowledge of Azure SQL and Network Security by watching videos
    from Anna Hoffman and Rohit Nayak as part of the Data Exposed Channel at [`https://www.youtube.com/playlist?list=PL3EZ3A8mHh0xtbf4Cr2yR4-xsUtELwPjw`](https://www.youtube.com/playlist?list=PL3EZ3A8mHh0xtbf4Cr2yR4-xsUtELwPjw).


    ## Authentication and Access


    You have now successfully deployed an Azure SQL Managed Instance and Database(s)
    and connected using a secure network architecture. When you deployed both Azure
    SQL services, you specified an *admin*, which is a SQL login and password and
    possibly a Microsoft Entra Admin. The next steps are to set up and configure other
    logins and users just like you would a SQL Server deployment. I call this process
    setting up *authentication*. Then you will want to grant access to users to the
    objects they need based on the requirements of your application and business.


    Before we talk about the details of authentication and access for Azure SQL, let’s
    review first the authentication and access for Azure SQL resources *outside* of
    SQL but in the Azure infrastructure called Azure Role-Based Access Control (RBAC).


    ### Azure Role-Based Access Control (RBAC)


    I’ve mentioned the concept of Azure RBAC in previous chapters in the book. Today
    when you deploy SQL Server on Windows or Linux, you must have certain rights and
    privileges to install SQL Server. For example, on Windows, most people use local
    administrator accounts when installing SQL Server.


    At this point in the book, I’ve listed in several chapters the requirements to
    deploy Azure SQL such as the *Contributor role*. An Azure account user that is
    part of the Contributor role has the permissions to manage everything except grant
    access to resources to other accounts (that access is reserved for members of
    the Owner or User Access Administrator roles).


    Therefore, if you are assigned the Contributor role for your Azure subscription,
    you should have the rights to deploy Azure SQL Managed Instances and Databases.


    It is possible you want to set up a system for your organization so that some
    Azure users have the right to deploy or manage Azure SQL Managed Instances and
    Databases but not access the resources. Think of an administrator that only deploys
    or manages resources but doesn’t have access to the underlying SQL Server.


    Azure provides the following built-in roles for these purposes.


    #### SQL DB Contributor


    Members of this role can deploy and manage Azure SQL Databases but not access
    them.


    #### SQL Server Contributor


    Members of this role can deploy and manage Azure SQL logical servers and databases
    but not access them.


    #### SQL Security Manager


    Members of this role can manage security policies of Azure SQL logical servers
    and databases but not access them.


    #### SQL Managed Instance Contributor


    Members of this role can deploy and manage Azure SQL Managed Instances but not
    access them.


    You can read more about Azure built-in roles at [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles/databases`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles/databases).'
  trans: '

    ## 使用专用链接


    假设你不想让任何公共端点访问你的 Azure SQL 数据库，无论连接是来自 Azure 内部还是外部。Azure 团队创建了一个名为 `专用链接` 的概念，允许像
    Azure SQL 数据库这样的 PaaS 服务仅通过专用终结点限制访问。你可以在以下网址阅读有关专用链接的概述：[`https://learn.microsoft.com/azure/private-link/private-link-overview`](https://learn.microsoft.com/azure/private-link/private-link-overview)。


    让我们看看使用专用链接的图 6-2 的一个新变体。图 6-3 展示了专用链接如何为 Azure SQL 数据库提供专用终结点。


    ![](img/496204_2_En_6_Fig3_HTML.jpg)


    图 6-3 使用专用链接的 Azure SQL 数据库


    专用链接将在现有的 Azure 虚拟网络中公开一个专用终结点。请注意，在此图中，逻辑服务器的 DNS 名称不再位于公共 DNS 层次结构中。


    让我们看看如何使用第 4 章中的现有 Azure SQL 数据库部署和 Azure 门户实现专用链接连接。从我的逻辑服务器（我的是 `bwsqllogicalserver`）中，我可以在
    Azure 门户中创建一个专用终结点，如图 6-4 所示。


    ![](img/496204_2_En_6_Fig4_HTML.jpg)


    图 6-4 为 Azure SQL 数据库创建专用终结点


    系统会提供一系列屏幕，让你为终结点命名、选择虚拟网络（在此案例中，虚拟网络是我第 3 章部署的 Azure 虚拟机 `bwsql2022` 所使用的网络）以及
    DNS（我直接使用了默认值）。此链接的部署需要几分钟时间。


    注意


    专用终结点必须与你选择的 Azure 虚拟网络位于同一区域。请记住，终结点现在成为该 VNet 中的一个资源。但是，你的客户端连接可以通过如图 6-3 所示的
    VNet 对等互连或 VNet 网关位于另一个虚拟网络中。


    图 6-5 显示了我已部署的、与此逻辑服务器关联的专用终结点。


    ![](img/496204_2_En_6_Fig5_HTML.jpg)


    图 6-5 已部署的 Azure SQL 数据库专用终结点


    该终结点是其自身的资源，与我的 Azure 虚拟机的虚拟网络以及此逻辑服务器都相关联（它也可以与其他逻辑服务器一起使用）。如果你选择该专用终结点，可以深入了解网络接口并查看其专用
    IP 地址。为了展示我如何仅使用此终结点，我还可以通过此逻辑服务器的“服务”菜单中相同的网络选项，在 Azure 门户中禁用任何公共终结点。


    现在，我将回到我的 Azure 虚拟机 `bwsql2022`，并再次尝试使用 SSMS 进行连接。我的连接现在成功了。如果我运行以下 T-SQL 语句：


    ```

    SELECT client_net_address FROM sys.dm_exec_connections

    WHERE session_id = @@SPID;

    ```


    结果如下：


    ```

    10.0.0.4

    ```


    这是 Azure 虚拟机 `bwsql2022` 的 `专用 IP 地址`（之前是公共 IP 地址）。这次让我们尝试 ping 逻辑服务器：


    ```

    ping bwsqllogicalserver.database.windows.net

    Pinging bwsqllogicalserver.privatelink.database.windows.net [10.0.0.5] with 32
    bytes of data:

    Request timed out

    ```


    请注意服务器的专用 IP 地址以及不在公共层次结构中的新 DNS 名称。


    同时，注意 `nslookup` 的输出：


    ```

    nslookup bwsqllogical.database.windows.net

    Server:  UnKnown

    Address:  168.63.129.16

    Non-authoritative answer:

    Name:    bwsqllogicalserver.privatelink.database.windows.net

    Address:  10.0.0.5

    Aliases:  bwsqllogicalserver.database.windows.net

    ```


    在以下文档中阅读更多关于为 Azure SQL 数据库使用 Azure 专用链接的内容：[`https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview`](https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview)。对于任何希望将其本地环境集成的用户，请特别关注此文档页面：[`https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview?view=azuresql#on-premises-connectivity-over-private-peering`](https://learn.microsoft.com/azure/azure-sql/database/private-endpoint-overview?view=azuresql#on-premises-connectivity-over-private-peering)。


    提示


    Azure SQL 数据库的专用链接连接目前仅支持代理连接类型。我们将 Azure SQL 数据库的连接策略保留为默认设置，因此，如果连接使用位于 Azure
    内部的专用链接，它将不会使用重定向，而是使用代理。


    通过观看 Anna Hoffman 和 Rohit Nayak 作为 Data Exposed 频道一部分的视频，在你的 Azure SQL 和网络安全知识基础上更进一步：[`https://www.youtube.com/playlist?list=PL3EZ3A8mHh0xtbf4Cr2yR4-xsUtELwPjw`](https://www.youtube.com/playlist?list=PL3EZ3A8mHh0xtbf4Cr2yR4-xsUtELwPjw)。


    ## 身份验证与访问


    你现在已经成功部署了 Azure SQL 托管实例和数据库，并使用安全的网络架构进行了连接。在部署这两个 Azure SQL 服务时，你指定了一个 `管理员`，即一个
    SQL 登录名和密码，可能还有一个 Microsoft Entra 管理员。接下来的步骤是设置和配置其他登录名和用户，就像你会在 SQL Server 部署中所做的那样。我将此过程称为设置
    `身份验证`。然后，你将根据你的应用程序和业务需求，授予用户访问他们所需对象的权限。


    在我们讨论 Azure SQL 身份验证和访问的细节之前，让我们首先回顾一下 SQL *之外*、但在名为 Azure 基于角色的访问控制 (RBAC) 的
    Azure 基础结构中的 Azure SQL 资源的身份验证和访问。


    ### Azure 基于角色的访问控制 (RBAC)


    我在本书前面的章节中提到过 Azure RBAC 的概念。今天，当你在 Windows 或 Linux 上部署 SQL Server 时，你必须拥有某些权限和特权才能安装
    SQL Server。例如，在 Windows 上，大多数人在安装 SQL Server 时使用本地管理员帐户。


    在本书的这个阶段，我已经在几个章节中列出了部署 Azure SQL 的要求，例如 `参与者角色`。属于参与者角色的 Azure 帐户用户拥有管理所有内容的权限，但无法向其他帐户授予对资源的访问权限（该访问权限保留给所有者或用户访问管理员角色的成员）。


    因此，如果你被分配了你的 Azure 订阅的参与者角色，你应该拥有部署 Azure SQL 托管实例和数据库的权利。


    你可能希望为你的组织设置一个系统，让一些 Azure 用户拥有部署或管理 Azure SQL 托管实例和数据库的权利，但无法访问这些资源。想象一个只部署或管理资源但无法访问底层
    SQL Server 的管理员。


    Azure 为此提供了以下内置角色。


    ### SQL DB 参与者


    此角色的成员可以部署和管理 Azure SQL 数据库，但无法访问它们。


    ### SQL Server 参与者


    此角色的成员可以部署和管理 Azure SQL 逻辑服务器和数据库，但无法访问它们。


    ### SQL 安全管理器


    此角色的成员可以管理 Azure SQL 逻辑服务器和数据库的安全策略，但无法访问它们。


    ### SQL 托管实例参与者


    此角色的成员可以部署和管理 Azure SQL 托管实例，但无法访问它们。


    你可以在以下网址阅读更多关于 Azure 内置角色的信息：[`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles/databases`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles/databases)。

    '
- fmt: '### Authentication for Azure SQL Managed Instance


    When you deploy SQL Server on Windows, the default authentication `mode` is Windows
    Only. This means only Windows users can log in to SQL Server. `Mixed mode security`
    allows both SQL and Windows logins (Linux requires mixed mode). Azure SQL Managed
    Instance forces mixed mode security, and you cannot change this.


    When you deploy an Azure SQL Managed Instance, you specify an `Administrator Account`
    as I showed you in Chapter [4](#496204_2_En_4_Chapter.xhtml). This can be a SQL
    Authentication account, Microsoft Entra account, or both. This account will be
    added as a member of the `sysadmin` role. The `sa` login is disabled by default,
    but you can enable and use it (but I don’t recommend it).


    With this `sysadmin` login, you can add other SQL logins, assign them to roles
    (even `sysadmin`) just like SQL Server. You can also create users in the database
    and map them to logins just like SQL Server.


    > **Note**

    >

    > You cannot change the SQL admin once you deploy. You can reset the password
    for the admin through the `Azure portal`, `az CLI`, or `PowerShell`.


    #### Microsoft Entra Authentication


    We provide the ability for you to add `Microsoft Entra logins` to your Managed
    Instance. When you use Windows or domain authentication with SQL Server, you are
    using behind the scenes Active Directory Domain Services. SQL Server on Linux
    even supports this concept. Azure provides the same type of service through Microsoft
    Entra.


    The first step in using Microsoft Entra (Entra) authentication for a Managed Instance
    is to provision an administrator for the Managed Instance from an Entra user.
    To use Entra with Managed Instance, you first need to create an Entra directory.
    It is possible when you sign in to the Azure Portal you are already part of an
    Entra directory for your organization. For me, that is the case at Microsoft.


    To set up an Entra admin for a Managed Instance, you must have “Administrator”
    rights for your Entra to grant read permissions. I don’t have these at Microsoft.
    The documentation shows the process to configure this Entra admin at [`https://learn.microsoft.com/azure/azure-sql/database/authentication-aad-configure`](https://learn.microsoft.com/azure/azure-sql/database/authentication-aad-configure).
    This covers both the portal and CLI options to configure an Entra admin for Managed
    Instance.


    The new Entra admin will become a member of the `sysadmin` server role for the
    Managed Instance. Now you can use the `CREATE LOGIN` T-SQL statement to create
    new logins based on Entra users. The `FROM EXTERNAL PROVIDER` clause provides
    this capability. The documentation shows an example of this syntax at [`https://learn.microsoft.com/sql/t-sql/statements/create-login-transact-sql?view=azuresqldb-mi-current`](https://learn.microsoft.com/sql/t-sql/statements/create-login-transact-sql?view=azuresqldb-mi-current)
    like the following T-SQL statement:


    ```sql

    CREATE LOGIN [bob@contoso.com] FROM EXTERNAL PROVIDER;

    ```


    #### Windows Authentication


    Many SQL applications use Windows Authentication to connect to SQL Server. We
    now have an option for those applications to still use Windows Authentication,
    so they will not have to change that authentication method with Azure SQL Managed
    Instance.


    This process still uses Microsoft Entra behind the scenes along with service principals
    to help implement Kerberos authentication.


    Windows Authentication for Microsoft Entra principals on managed instances is
    available for virtual machines joined to Active Directory, Microsoft Entra ID,
    or hybrid Microsoft Entra ID – a hybrid Microsoft Entra user identity exists both
    in Microsoft Entra ID and Active Directory and can access a managed instance in
    Azure using Microsoft Entra Kerberos.


    The only issue you might run into with this method is that logins are still created
    in the engine with the `CREATE LOGIN FROM EXTERNAL PROVIDER` as you would with
    Microsoft Entra. Learn how to set this up at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup`](https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-setup).


    > **Note**

    >

    > At the time of the writing of this book, a new feature has been released for
    preview called `Native Windows Principals`. I highly encourage you to take a look
    at this feature because it can provide a way for you to use the familiar `CREATE
    LOGIN FROM WINDOWS` T-SQL statement. This feature uses a new concept called an
    authentication metadata mode. Take a look at the details at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/native-windows-principals`](https://learn.microsoft.com/azure/azure-sql/managed-instance/native-windows-principals).


    ### Authentication for Azure SQL Database


    When I showed you how to deploy an Azure SQL Database in Chapter [4](#496204_2_En_4_Chapter.xhtml)
    of the book, I supplied a `server admin login` through both SQL Authentication
    and Microsoft Entra. I used the SQL Authentication login to connect to the logical
    server. This admin account is a `server-level principal` for the logical server
    and is mapped as `dbo` in all databases.


    > **Note**

    >

    > You cannot change the SQL Authentication admin once you deploy. You can reset
    the password for the admin through the `Azure portal`, `az CLI`, or `PowerShell`.
    You can change the Microsoft Entra admin after you deploy.


    If you would like to create other logins that have admin capabilities (but not
    full server admin), you should use the `CREATE LOGIN` T-SQL statement to create
    standard SQL logins for the logical server in the context of the logical master
    database. You can then create a user in context of the logical master database
    and assign this user to two special roles for Azure SQL SQL Database using `ALTER
    ROLE`:


    - `dbmanager` – Users assigned to this role can create and manage databases and
    will be mapped to the `dbo` of that database, so has full database owner permissions.

    - `loginmanager` – Users assigned to this role can create new logins in the context
    of the logical master but are not mapped to the `dbo` role of databases.


    You can now use the standard process with SQL Server to create SQL logins and
    map them to users in any database they need access. You can assign users to roles
    and even create new roles just like SQL Server.


    > **Note**

    >

    > One complexity with using logins is that when you choose a failover option like
    geo-replication, you must create the login on the secondary server manually.


    #### Using Contained Users


    You can also create contained database users that don’t require a login. This
    concept has been around for a while with SQL Server using contained databases.
    Azure SQL Database is in a way a contained database. Contained users are also
    called `user accounts`.


    The `CREATE USER` T-SQL statement supports contained users using the `WITH PASSWORD`
    clause. One advantage of a contained user is that the information is stored in
    the database and therefore replicated as part of a geo-replication failover deployment.'
