    separately. NextGen also just gives you lower I/O latency, higher IOPS, and better
    I/O throughput. Check out this blog post to learn more: [`https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-azure-sql-managed-instance-next-gen-gp/ba-p/4092647`](https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-azure-sql-managed-instance-next-gen-gp/ba-p/4092647).


