  trans: '

    ### 账户、端口和操作系统许可


    要完成在虚拟机中部署 SQL Server 的默认屏幕设置，你必须提供一个管理员账户和密码。对于 Windows，这将是本地管理员账户；对于 Linux，则是
    root 用户。对于在 Windows 上部署的 SQL Server 库镜像，此本地管理员账户会自动添加到 `sysadmin` 角色（就像你在 SQL
    Server 安装过程中将自己添加进去一样）。管理员账户的密码长度应在 12 到 123 个字符之间，并且必须是强密码，包含以下字符类型中的至少 3 种：1
    个小写字母、1 个大写字母、1 个数字和 1 个特殊字符。


    下一个选择是决定是否为虚拟机打开任何端口以供入站流量访问。默认情况下，会选中由远程桌面连接（`RDP`）协议使用的端口 3389（对于 Linux，则是 `ssh`
    协议的默认端口 22）。使用此选项最为灵活，但并非最安全的选择。我暂时先不选择此选项，但本章后面的“连接到你的虚拟机”一节中，我将讨论使用不同的安全选项。


    最后一个选择涉及 Windows 部署的许可。当你选择带有 Windows 的 SQL Server 库镜像时，你的许可将是 SQL Server 和 Windows
    的 `按需付费` 订阅。这基本上意味着你每月支付固定的 Windows 和 SQL Server 使用费。此外，你还需要根据 CPU 使用率和存储情况支付资源使用费。如果你已拥有
    Windows Server 的现有许可，可以将这些许可应用于你的 Azure 虚拟机成本。你可以在 [`https://aka.ms/azurehybridbenefit`](https://aka.ms/azurehybridbenefit)
    阅读更多关于将 Azure 混合权益用于 Windows Server 的信息。


    图 3-7 显示了填写这些选项的门户屏幕的其余部分。


    ![](img/496204_2_En_3_Fig7_HTML.jpg)


    图 3-7：选择账户、端口和许可


    在部署过程的这个阶段，你可以单击 `审阅+创建` 并使用其他默认选项部署你的虚拟机。但是，让我们看看其他一些部分以及你为何可能想使用它们，特别是 SQL Server
    设置部分。


    ### 作为部署一部分进行配置选择


    让我们看看在为 Azure 虚拟机部署 SQL Server 时可以选择的其他选项。


    #### 操作系统磁盘


    选择 `下一步: 磁盘 >` 以查看如图 3-8 所示的选项。


    ![](img/496204_2_En_3_Fig8_HTML.jpg)


    图 3-8：部署期间 Azure 虚拟机的磁盘选项


    此处提供的磁盘选项涉及主机级别的加密以及支持操作系统和其他系统文件的磁盘选项。虽然对于所有 SQL Server 部署，我建议你选择此处提供的默认选项，包括高级托管磁盘，但值得研究一下名为
    `主机加密` 的选项，它将加密主机上所有处于静态的磁盘。我将在本章后面的“最大化存储性能”一节中更多地讨论可用于 SQL Server Azure 虚拟机的不同类型的托管磁盘。我建议你为
    SQL Server 使用托管磁盘，一个简单的优点是容错性，但你可能想阅读更多关于非托管磁盘和临时磁盘的信息。你可以在 [`https://learn.microsoft.com/azure/virtual-machines/managed-disks-overview`](https://learn.microsoft.com/azure/virtual-machines/managed-disks-overview)
    阅读更多关于托管磁盘的信息。


    **注意：** 如果你仅从市场安装操作系统镜像（例如，Windows Server），你将在此处获得添加数据磁盘的选项。对于 SQL Server 市场镜像，你将能够在下面的“SQL
    Server 设置”配置部分或部署完成后添加数据磁盘。


    #### 网络


    现在单击 `下一步: 网络 >`。在这里，你将看到一组选项来为虚拟机配置网络的各个方面，如图 3-9 所示。


    ![](img/496204_2_En_3_Fig9_HTML.jpg)


    图 3-9：Azure 虚拟机部署期间的网络选项


    你可能想考虑更改的两个选项是虚拟网络和子网，前提是此虚拟机需要包含在 `现有` 的 Azure 虚拟网络中。请注意，在此示例中，将创建一个新的虚拟网络，其名称包含我的新虚拟机。如果你在第一个部署屏幕上选择了现有的资源组，则将选择与该资源组关联的虚拟网络（如果存在）。我将在本章后面题为“网络”的一节中更详细地讨论
    Azure 虚拟机的网络选项。


    在此屏幕上，我想指出的另一个适用于你的 Azure 虚拟机 SQL Server 部署的选项是 `加速网络`。对于客户端应用程序必须通过虚拟网络与 SQL
    Server 通信的 SQL Server 部署，加速网络非常有益。因此，你可能想选择一个支持加速网络的 VM 大小（或具备所需 CPU 数量的 VM 大小）。如果你计划仅在虚拟机中部署
    SQL Server 并在虚拟机内完成所有操作，则无需担心此选项。你可以在 [`https://learn.microsoft.com/azure/virtual-network/accelerated-networking-overview`](https://learn.microsoft.com/azure/virtual-network/accelerated-networking-overview)
    阅读更多关于加速网络优势的信息。


    **注意：** 你可以稍后更改虚拟机的大小，然后使用 PowerShell 启用加速网络。你可以在 [`https://learn.microsoft.com/azure/virtual-network/create-vm-accelerated-networking-powershell`](https://learn.microsoft.com/azure/virtual-network/create-vm-accelerated-networking-powershell)
    阅读更多关于如何执行此操作的信息。


    我这里没有显示的另一个选项叫做 `负载均衡选项`。虽然此选项可能对某些应用场景有帮助，但对于 SQL Server，即使对于 Always On 可用性组（AG），也不需要负载均衡器。我将在本章后面题为“HADR”的一节中更详细地讨论如何为
    AG 设置连接。

    '
- fmt: '### Management


    选择`Next: Management >`。图 [3-10](#496204_2_En_3_Chapter.xhtml#Fig10) 展示了一些可能对你部署和使用
    `Azure Virtual Machine` 上的 `SQL Server` 有用的选项。


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig10_HTML.jpg)


    图 3-10


    部署 `Azure Virtual Machine` 时的管理选项


    我强烈建议你考虑 `Microsoft Defender for Cloud`。我的订阅启用了 Defender，因此它会自动为我的虚拟机启用。`Microsoft
    Defender for Cloud` 为你的虚拟机提供安全功能以及特定于 `SQL` 的功能。它提供了针对云中虚拟机潜在安全问题的高级威胁防护和漏洞评估。此外，`Microsoft
    Defender for Cloud` 还提供了针对 `Azure Virtual Machine` 上 `SQL Server` 的特定功能。我将在本章后面的“配置
    `Azure Virtual Machine`”一节中详细讨论如何配置及其优势。


    提示


    在撰写本书时，微软发布了 `Copilot for Security in Defender for Cloud`。当你在以下网址启用 Defender 时，请尝试一下：`https://learn.microsoft.com/azure/defender-for-cloud/copilot-security-in-defender-for-cloud`。


    `System-assigned managed identity` 是一个有趣的选择，它允许你在 `Microsoft Entra` 中创建一个标识用于身份验证，而无需在你的代码或应用程序中放置凭据。使用此功能与
    `Azure Virtual Machine` 的一个很好的例子是，从虚拟机连接到 `Azure SQL Database` 而无需提示输入任何密码。你可以在以下网址阅读有关托管标识的更多信息：`https://learn.microsoft.com/entra/identity/managed-identities-azure-resources/overview`。


    `Enable auto-shutdown` 提供了一个选项，虚拟机会在你选择的时间每天自动关闭。为什么你会为 `SQL Server` 部署选择这个？主要原因是你的
    `SQL Server` 部署有一些可以承受的停机时间，并且你想节省成本。当虚拟机关闭时，你只需支付许可和存储费用。我将在本章后面的“配置”一节中更多地讨论停止和启动虚拟机。


    `Guest OS updates` 提供了一个选项，可以自动将关键更新应用到虚拟机内的操作系统。你应该考虑一个名为 `Azure Update Manager`
    的新选项，因为它允许你为 `Windows Server` 和 `SQL Server` 应用甚至非关键更新。我将在本章后面的“配置”一节中更详细地描述此功能。


    ### Monitoring


    图 [3-11](#496204_2_En_3_Chapter.xhtml#Fig11) 展示了监控选项。


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig11_HTML.jpg)


    图 3-11


    部署 `Azure Virtual Machine` 时的监控选项


    `Boot diagnostics` 非常有用，可以查看主机上虚拟机的串行输出屏幕。这类似于使用像 `Hyper-V Manager` 这样的工具查看启动屏幕。你可以在以下网址阅读有关启动诊断的更多信息：`https://learn.microsoft.com/azure/virtual-machines/boot-diagnostics`。


    我个人建议你选择 `OS guest diagnostics`。这将允许你在 `Azure Monitor` 等系统中查看来自客户操作系统的性能信息，甚至获取警报。我将在本章后面的“性能监控”一节中讨论如何使用此功能。


    如果你部署了许多 `Azure Virtual Machine`，你应该考虑启用虚拟机洞察。这提供了监控虚拟机健康和性能关键信息的方法 *at scale*。在以下网址了解更多信息：`https://learn.microsoft.com/azure/azure-monitor/vm/vminsights-overview`。


    ### Advanced


    选择这些选项后，单击 `Next: Advanced >`。顾名思义，这些是可能让你感兴趣的高级选项，如图 [3-12](#496204_2_En_3_Chapter.xhtml#Fig12)
    所示。


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig12_HTML.jpg)


    图 3-12


    `Azure VM` 的高级选项


    `Extensions` 是在虚拟机内部运行的应用程序，可以提供部署后和自动化任务。`SQL Server` 库映像有一个扩展，如果你使用库映像（正如我这里做的），可用于自动配置
    `SQL Server`。在以下网址可能有你想探索的其他扩展：`https://learn.microsoft.com/azure/virtual-machines/extensions/features-windows`。


    如图 [3-13](#496204_2_En_3_Chapter.xhtml#Fig13) 所示，还有其他高级选项。


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig13_HTML.jpg)


    图 3-13


    `Azure VM` 的其他高级选项


    `Host group` 定义了一个用于你的虚拟机的 *Azure Dedicated Host*。`Azure Dedicated Host` 的主要好处是
    *Dedicated Physical Server*：该服务器由你的组织独占使用，确保没有其他客户共享相同的硬件。`Capacity reservations`
    允许你在不长期承诺的情况下，在特定的 `Azure` 区域或可用性区域预留计算容量。我将在本章后面题为“预留实例、专用主机和容量预留”的一节中更详细地讨论这些主题。


    `Proximity placement groups` 是 `Azure` 中一个有趣的概念，它允许你请求多个 `Azure` 资源在 `Azure` 数据中心内尽可能靠近地放置，以提供尽可能低的网络延迟。如果连接到
    `Azure Virtual Machine` 中 `SQL Server` 的应用程序将托管在 `Azure` 中，这可能是一个值得考虑的选项。


    注意


    我不建议为 `Azure Virtual Machine` 中的 `SQL Server`（例如可用性组）使用邻近放置组作为高可用性解决方案。在这种情况下，你将使用称为可用性集或可用性区域的概念。我将在本章后面题为“HADR”的一节中讨论这些概念。


    单击 `Next: SQL Server Settings >` 查看下一组选项。'
  raw: '#### Management


    Select **Next: Management >**. Figure [3-10](#496204_2_En_3_Chapter.xhtml#Fig10)
    shows options that may be interesting to your deployment and use of SQL Server
    with Azure Virtual Machine.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig10_HTML.jpg)


    Figure 3-10


    Management options during deploy for Azure Virtual Machine


    I highly recommend you consider **Microsoft Defender for Cloud**. My subscription
    has Defender enabled, so it is automatically enabled for my VM. Microsoft Defender
    for Cloud provides security capabilities for your virtual machine as well as SQL-specific
    features. Microsoft Defender for Cloud provides advanced threat protection and
    vulnerability assessments specific to potential security issues for a virtual
    machine in the cloud. In addition, Microsoft Defender for Cloud provides capabilities
    specific to SQL Server on Azure Virtual Machine. I’ll discuss more about how to
    configure this and its benefits in the section titled “Configuring an Azure Virtual
    Machine” later in this chapter.


    Tip


    At the time of the writing of this book, Microsoft has released a **Copilot**
    **for Security in Defender for Cloud**. Give it a try when you enable Defender
    at [`https://learn.microsoft.com/azure/defender-for-cloud/copilot-security-in-defender-for-cloud`](https://learn.microsoft.com/azure/defender-for-cloud/copilot-security-in-defender-for-cloud).


    **System-assigned managed identity** is an interesting option allowing you to
    create an identity in Microsoft Entra to use for authentication without having
    to put credentials in your code or application. One nice example to use this capability
    with Azure Virtual Machine is to connect to an Azure SQL Database from a virtual
    machine using Microsoft without prompting for any passwords. You can read more
    about managed identities at [`https://learn.microsoft.com/entra/identity/managed-identities-azure-resources/overview`](https://learn.microsoft.com/entra/identity/managed-identities-azure-resources/overview).


    **Enable auto-shutdown** provides an option where the virtual machine will be
    shut down daily on the time of your choosing. Why would you ever select this for
    a SQL Server deployment? The primary reason is that you have a SQL Server deployment,
    and you have some downtime you can afford and want to save money. When a virtual
    machine is shut down, you only pay for your licensing and storage costs. I will
    talk more about stopping and starting virtual machines in the section titled “Configuration”
    later in this chapter.


    **Guest OS updates** provides an option to have critical updates automatically
    applied to the OS inside the VM. There is a new option called Azure Update Manager
    you should consider because it allows you to apply even noncritical updates for
    both Windows Server and SQL Server. I’ll describe this capability more in the
    section titled “Configuration” later in this chapter.


    #### Monitoring


    Figure [3-11](#496204_2_En_3_Chapter.xhtml#Fig11) shows options for monitoring.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig11_HTML.jpg)


    Figure 3-11


    Monitoring options during deploy for Azure Virtual Machine


    **Boot diagnostics** are very helpful to see the serial output screen of your
    virtual machine on the host. This is like seeing the boot screen using a tool
    like Hyper-V Manager. You can read more about boot diagnostics at [`https://learn.microsoft.com/azure/virtual-machines/boot-diagnostics`](https://learn.microsoft.com/azure/virtual-machines/boot-diagnostics).


    I personally recommend you select **OS guest diagnostics**. This will allow you
    to see performance information from the guest OS in systems like Azure Monitor
    and even get alerts. I will discuss how to use this in the section titled “Performance
    Monitoring” later in this chapter.


    If you deploy many Azure Virtual Machines, you should consider enabling virtual
    machine insights. This provides methods to monitor key information about the health
    and performance of your virtual machines *at scale*. Learn more at [`https://learn.microsoft.com/azure/azure-monitor/vm/vminsights-overview`](https://learn.microsoft.com/azure/azure-monitor/vm/vminsights-overview).


    #### Advanced


    With these options selected, click **Next: Advanced >**. As the name implies,
    these are advanced options that may interest you as seen in Figure [3-12](#496204_2_En_3_Chapter.xhtml#Fig12).


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig12_HTML.jpg)


    Figure 3-12


    Advanced options for Azure VM


    **Extensions** are applications that run inside the VM that can provide post-deployment
    and automation tasks. The SQL Server gallery images have an extension used to
    configure SQL Server automatically if you use a gallery image as I’m doing here.
    There could be other extensions you want to explore at [`https://learn.microsoft.com/azure/virtual-machines/extensions/features-windows`](https://learn.microsoft.com/azure/virtual-machines/extensions/features-windows).


    There are other advanced options as you can see in Figure [3-13](#496204_2_En_3_Chapter.xhtml#Fig13).


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig13_HTML.jpg)


    Figure 3-13


    Other Advanced options for Azure VM


    **Host group** defines an *Azure Dedicated Host* used for your virtual machine.
    The major benefit of an Azure Dedicated Host is a *Dedicated Physical Server*:
    the server is exclusively used by your organization, ensuring that no other customers
    share the same hardware. **Capacity reservations** allow you to reserve compute
    capacity in a specific Azure region or Availability Zone without a long-term commitment.
    I will discuss more about these topics in a later section of this chapter titled
    “Reserved Instances, Dedicated Hosts, and Capacity Reservations.”


    **Proximity placement groups** are an interesting concept in Azure that allows
    you to request multiple Azure resources be located as close as possible within
    an Azure data center to provide the lowest network latency possible. This may
    be an option to consider if the application to connect to SQL Server in Azure
    Virtual Machine will be hosted in Azure.


    Note


    I would not recommend using proximity groups for a HA solution for SQL Server
    in Azure Virtual Machines such as Availability Groups. In this scenario, you will
    use a concept called Availability Sets or Availability Zones. I will discuss these
    concepts later in the chapter in a section titled “HADR.”


    Click **Next: SQL Server Settings >** to see the next set of options.'
  trans: '### 管理


    选择`Next: Management >`。图 3-10 展示了一些可能对你部署和使用 `Azure Virtual Machine` 上的 `SQL Server`
    有用的选项。


    ![](img/496204_2_En_3_Fig10_HTML.jpg)


    图 3-10


    部署 `Azure Virtual Machine` 时的管理选项


    我强烈建议你考虑 `Microsoft Defender for Cloud`。我的订阅启用了 Defender，因此它会自动为我的虚拟机启用。`Microsoft
    Defender for Cloud` 为你的虚拟机提供安全功能以及特定于 `SQL` 的功能。它提供了针对云中虚拟机潜在安全问题的高级威胁防护和漏洞评估。此外，`Microsoft
    Defender for Cloud` 还提供了针对 `Azure Virtual Machine` 上 `SQL Server` 的特定功能。我将在本章后面的“配置
    `Azure Virtual Machine`”一节中详细讨论如何配置及其优势。


    提示


    在撰写本书时，微软发布了 `Copilot for Security in Defender for Cloud`。当你在以下网址启用 Defender 时，请尝试一下：`https://learn.microsoft.com/azure/defender-for-cloud/copilot-security-in-defender-for-cloud`。


    `系统分配的托管标识` 是一个有趣的选择，它允许你在 `Microsoft Entra` 中创建一个标识用于身份验证，而无需在你的代码或应用程序中放置凭据。使用此功能与
    `Azure Virtual Machine` 的一个很好的例子是，从虚拟机连接到 `Azure SQL Database` 而无需提示输入任何密码。你可以在以下网址阅读有关托管标识的更多信息：`https://learn.microsoft.com/entra/identity/managed-identities-azure-resources/overview`。


    `启用自动关机` 提供了一个选项，虚拟机会在你选择的时间每天自动关闭。为什么你会为 `SQL Server` 部署选择这个？主要原因是你的 `SQL Server`
    部署有一些可以承受的停机时间，并且你想节省成本。当虚拟机关闭时，你只需支付许可和存储费用。我将在本章后面的“配置”一节中更多地讨论停止和启动虚拟机。


    `客户机操作系统更新` 提供了一个选项，可以自动将关键更新应用到虚拟机内的操作系统。你应该考虑一个名为 `Azure Update Manager` 的新选项，因为它允许你为
    `Windows Server` 和 `SQL Server` 应用甚至非关键更新。我将在本章后面的“配置”一节中更详细地描述此功能。


    ### 监控


    图 3-11 展示了监控选项。


    ![](img/496204_2_En_3_Fig11_HTML.jpg)


    图 3-11


    部署 `Azure Virtual Machine` 时的监控选项


    `启动诊断` 非常有用，可以查看主机上虚拟机的串行输出屏幕。这类似于使用像 `Hyper-V Manager` 这样的工具查看启动屏幕。你可以在以下网址阅读有关启动诊断的更多信息：`https://learn.microsoft.com/azure/virtual-machines/boot-diagnostics`。


    我个人建议你选择 `客户机操作系统诊断`。这将允许你在 `Azure Monitor` 等系统中查看来自客户操作系统的性能信息，甚至获取警报。我将在本章后面的“性能监控”一节中讨论如何使用此功能。


    如果你部署了许多 `Azure Virtual Machine`，你应该考虑启用虚拟机洞察。这提供了监控虚拟机健康和性能关键信息的方法 *大规模地*。在以下网址了解更多信息：`https://learn.microsoft.com/azure/azure-monitor/vm/vminsights-overview`。


    ### 高级


    选择这些选项后，单击 `Next: Advanced >`。顾名思义，这些是可能让你感兴趣的高级选项，如图 3-12 所示。


    ![](img/496204_2_En_3_Fig12_HTML.jpg)


    图 3-12


    `Azure VM` 的高级选项


    `扩展` 是在虚拟机内部运行的应用程序，可以提供部署后和自动化任务。`SQL Server` 库映像有一个扩展，如果你使用库映像（正如我这里做的），可用于自动配置
    `SQL Server`。在以下网址可能有你想探索的其他扩展：`https://learn.microsoft.com/azure/virtual-machines/extensions/features-windows`。


    如图 3-13 所示，还有其他高级选项。


    ![](img/496204_2_En_3_Fig13_HTML.jpg)


    图 3-13


    `Azure VM` 的其他高级选项


    `主机组` 定义了一个用于你的虚拟机的 *Azure 专用主机*。`Azure 专用主机` 的主要好处是 *专用物理服务器*：该服务器由你的组织独占使用，确保没有其他客户共享相同的硬件。`容量预留`
    允许你在不长期承诺的情况下，在特定的 `Azure` 区域或可用性区域预留计算容量。我将在本章后面题为“预留实例、专用主机和容量预留”的一节中更详细地讨论这些主题。


    `邻近放置组` 是 `Azure` 中一个有趣的概念，它允许你请求多个 `Azure` 资源在 `Azure` 数据中心内尽可能靠近地放置，以提供尽可能低的网络延迟。如果连接到
    `Azure Virtual Machine` 中 `SQL Server` 的应用程序将托管在 `Azure` 中，这可能是一个值得考虑的选项。


    注意


    我不建议为 `Azure Virtual Machine` 中的 `SQL Server`（例如可用性组）使用邻近放置组作为高可用性解决方案。在这种情况下，你将使用称为可用性集或可用性区域的概念。我将在本章后面题为“HADR”的一节中讨论这些概念。


    单击 `Next: SQL Server Settings >` 查看下一组选项。'
- fmt: '# SQL Server Settings


    Up to this point, all the configuration choices are independent of SQL Server.
    This screen provides configuration choices for deployment specific to SQL Server.
    If you know the SQL Server setup experience, we have provided in the latest releases
    the ability to “configure when you install” options. This means we have included
    options you normally configure after installation into the process itself. We
    are now trying to provide this same experience in Azure Virtual Machine but also
    include options that allow an optimal configuration for Azure.


    Let us look at these choices in more detail. Figure 3-14 shows choices for networking,
    security, and storage.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig14_HTML.jpg)


    Figure 3-14

    SQL Server Settings for network, security, and storage


    Note

    As of the time of writing this book, SQL Server Linux images do not support SQL
    Server Settings during deployment.


    ## Networking


    **Networking** provides a choice on how to expose the SQL Server instance default
    TCP port 1433. Think of this choice like using a firewall. *Private* means any
    Azure source within the virtual network of the VM can access this port. This is
    the default and one I recommend you use. *Local* means the only access is allowed
    inside the VM. *Public* means the TCP port is exposed on the Internet. As tempting
    as it may be to use the public option so you can connect with a tool like SSMS
    from your laptop to this deployed VM, I do not recommend using this option.


    Note

    The first time I deployed a SQL Server in Azure VM using the public option, I
    immediately got attacked from outside intruders trying to log in using the `sa`
    account guessing password. I found this out when I saw my `ERRORLOG` flooded with
    login failed messages. This occurred almost immediately after deploying the VM.


    ## SQL Authentication


    The choice for **SQL Authentication** is identical to enabled mixed mode security
    for SQL Server. Even though the `sa` login is disabled by default if you choose
    to enable this option, you will be prompted for a SQL login that will be granted
    SQL Server `sysadmin` rights for your deployment.


    ## Azure Key Vault Integration


    **Azure Key Vault integration** is a choice you might want to enable, but do not
    worry, you can enable this post deployment. Azure Key Vault integration may be
    helpful to ease your use of Azure Key Value for scenarios like Transparent Data
    Encryption (`TDE`). You can read more about Azure Key Vault integration with SQL
    Server in Azure Virtual Machine at `https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/azure-key-vault-integration-configure`.


    ## Storage Configuration


    **Storage configuration** is perhaps one of the most important choices you will
    make for SQL Server in Azure Virtual Machine especially for performance. Let’s
    look at what choices you can make and how we provide a guided experience to configuration
    storage for your databases.


    Note

    There is a new experience in preview to use Azure Premium SSD v2 Storage. I’ll
    discuss more about this option in the section titled “Maximizing Storage Performance”
    later in this chapter.


    If you click **Change configuration**, you will see options such as seen in Figure
    3-15.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig15_HTML.jpg)


    Figure 3-15

    Configuring storage for SQL Server in Azure Virtual Machine


    This screen is divided into three sections: (1) database file storage, (2) transaction
    file storage, and (3) `tempdb` storage.


    For database and transaction files, you are provided options for location, managed
    disk type, disk size type, and number of disks. For databases, you also have the
    option to have system databases (`master`, `model`, and `msdb`) moved off the
    OS drive and to the drive where database files are placed. Unless you are just
    doing some basic testing, I always recommend the following:


    *   Choose to have the data and log on separate drives.

    *   Use the Premium SSD disk type.

    *   Choose a disk size type that is large enough to handle the necessary size,
    IOPS, and throughput for the I/O SQL Server needs for your application.


    Premium SSD disk types come in various sizes with a designation of `P<n>` from
    sizes 4GB (`P1`) to 32TB (`P80`). The performance in terms of IOPS and throughput
    increases with larger sizes. One problem you may face is trying to align the IOPS
    and throughput you need with your minimum size requirement. This may require you
    to *overprovision* the size (or multiple disks) to get the performance you need
    (as I mentioned earlier, there is a new disk type called Premium SSD v2 in preview
    that can help here; you will learn about this in the section titled “Maximizing
    Storage Performance” later in the chapter). You can read more about the various
    Premium SSD disk types at `https://learn.microsoft.com/azure/virtual-machines/disks-types#premium-ssds`.


    For `tempdb`, notice how the recommendation is to place it on the local SSD drive
    and recommend number of files and sizes for both data and log, very much like
    SQL Server setup does today.


    Notice the warning at the bottom of the screen. It says the configured disks have
    a performance vector that is greater than what the VM size supports. This is an
    important warning because it means the VM size you have selected doesn’t support
    enough IOPS and/or throughput even though you selected storage that meets your
    requirements. This is a hard problem to detect when it occurs, so getting the
    VM size right now to meet your storage performance requirements is important.
    You will need to go back to the Basics screen first and change the VM size and
    then come back to this screen to make sure the warning is gone.


    ## SQL Server Instance Settings


    Below storage configuration is the ability to change **SQL Server instance settings**
    as seen in Figure 3-16.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig16_HTML.jpg)


    Figure 3-16

    Choosing SQL Server instance settings


    Click **Change SQL instance settings** and you will get a screen like Figure 3-17.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig17_HTML.jpg)


    Figure 3-17

    Additional options for SQL Server Settings


    You can see on this screen various options you can choose during SQL Server setup
    (remember that when you deploy SQL Server in Azure VM using the portal, we automatically
    run setup for you to install everything!), such as server collation, `MAXDOP`,
    max and min memory, and optimize for ad hoc workload settings. In addition, we
    provide you two popular options for performance optimization: **lock pages in
    memory** and **instant file initialization**. You can configure all of these after
    you deploy, but having the opportunity to do this now just saves you time and
    effort.


    After you select **OK**, you have other choices you can make as seen in Figure
    3-18.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig18_HTML.jpg)


    Figure 3-18

    Additional SQL Server Settings


    ## SQL Server License


    **SQL Server License** allows you to testify that you have an existing SQL Server
    license that allows you to apply it for Azure Hybrid Benefit (`AHB`) like the
    choice for Windows. This can be a significant cost savings to you when using SQL
    Server for Azure Virtual Machine.


    Note

    If you do not see this option available, it is because you picked a SQL Server
    image choice where this option cannot be or is already selected. For example,
    images that start with the title `BYOL` (this means Bring Your Own License) already
    imply you are just using our own license. Developer Edition is free, so no license
    applies.'
