  trans: '

    ## 监控可用性


    与任何功能集一样，您无疑会希望监控 Azure SQL 各方面的可用性。这包括服务器和实例可用性、数据库可用性、备份/恢复历史记录、副本状态以及故障转移原因。此外，由于
    Azure SQL 运行在 Azure 生态系统中，了解区域和数据中心中 Azure 服务的状态和健康状况也可能很重要。


    Azure SQL 为您提供了与 SQL Server 类似的监控可用性的接口，包括目录视图、动态管理视图和扩展事件。此外，Azure 门户、`az` CLI、PowerShell、数据库监视器和
    Copilot 等 Azure 接口还提供了额外的功能来监控您部署的可用性。


    让我们深入了解使用这些接口和监控功能的几个示例。


    ### 实例、服务器和数据库可用性


    除了影响 Azure 服务的事件外，您可以通过 Azure 门户查看 Azure SQL 托管实例或 Azure SQL 数据库的可用性。查看托管实例或数据库不可用的一个可能原因的主要方法之一是通过
    Azure 门户检查 `资源运行状况`。您将在本章的这一主要部分稍后看到此场景的示例。


    您始终可以使用标准的 SQL Server 工具，如 SQL Server Management Studio，连接到托管实例或数据库服务器，并通过该工具或
    T-SQL 查询检查这些资源的状态。


    此外，`az` CLI 等接口可以显示 Azure SQL 的状态，例如


    *   `az sql mi list` – 列出托管实例的状态

    *   `az sql db list` – 列出 Azure SQL 数据库的状态


    也可以使用 PowerShell 命令来查明 Azure SQL 数据库的可用性，例如


    *   `Get-AzSQLDatabase` – 获取服务器上的所有数据库及其详细信息，包括状态


    **注意**


    对于 SQL Server，我经常查看过去的 `ERRORLOG` 文件或 `system_health` XEvent 会话文件，以了解服务可用性和运行状况。Azure
    SQL 托管实例支持这些工具。但是，这些文件不会复制到副本，因此如果发生故障转移，这些文件的历史记录将会丢失。


    ### 备份和恢复历史记录


    Azure SQL 会自动备份数据库和事务日志。对于 SQL Server，使用 `msdb` 系统表查看备份历史记录是非常常见的做法。您也可以在 Azure
    SQL 托管实例中执行此操作，使用如下查询：


    ```sql

    SELECT database_name, case when type = ''D'' then ''Full'' when type = ''I'' then
    ''Differential'' when type = ''L'' then ''Log'' end as type,

    has_backup_checksums, backup_size, compressed_backup_size, backup_start_date,
    backup_finish_date

    FROM msdb.dbo.backupset

    ORDER BY backup_finish_date DESC;

    GO

    ```


    我的实例已经运行了一段时间，所以我向下滚动以查看较早的结果，这些结果如图 8-26 所示。


    ![](img/496204_2_En_8_Fig26_HTML.jpg)


    图 8-26


    托管实例自动备份的较早结果


    这些结果显示了我创建的一个用户数据库，但它会显示为该实例创建的任何用户数据库（它不显示系统数据库备份）。请注意，第一个结果是完整备份，然后是一系列日志备份。滚动到结果顶部，您可以看到其他类型的备份，如图
    8-27 所示。


    ![](img/496204_2_En_8_Fig27_HTML.jpg)


    图 8-27


    托管实例自动备份的最新结果


    可以通过 Azure 门户或 CLI 接口查看长期备份保留历史记录。了解更多信息，请访问 [`https://learn.microsoft.com/azure/azure-sql/database/long-term-backup-retention-configure`](https://learn.microsoft.com/azure/azure-sql/database/long-term-backup-retention-configure)。


    此外，Azure SQL 托管实例支持使用 XEvents 来跟踪备份历史记录。有关如何执行此操作的博客文章，请参阅 [`https://techcommunity.microsoft.com/t5/azure-database-support-blog/lesson-learned-128-how-to-track-the-automated-backup-for-an/ba-p/1442355`](https://techcommunity.microsoft.com/t5/azure-database-support-blog/lesson-learned-128-how-to-track-the-automated-backup-for-an/ba-p/1442355)。


    使用时间点恢复恢复的任何数据库都会创建一个新数据库，因此恢复历史记录可以视为查看新数据库的创建。所有创建新数据库的操作都可以通过 Azure 活动日志查看。


    `msdb` 备份历史记录不适用于 Azure SQL 数据库，但有一个名为 `sys.dm_database_backups` 的 DMV 可用。我在我的一个
    Azure SQL 数据库上运行了此查询（不提供备份大小详细信息）：


    ```sql

    SELECT logical_database_name, case when backup_type = ''D'' then ''Full'' when
    backup_type = ''I'' then ''Differential'' when backup_type = ''L'' then ''Log''
    end as backup_type_desc, backup_start_date, backup_finish_date, in_retention

    FROM sys.dm_database_backups

    ORDER BY backup_finish_date DESC;

    GO

    ```


    对于我的业务关键服务层数据库，较早的结果如图 8-28 所示。


    ![](img/496204_2_En_8_Fig28_HTML.jpg)


    图 8-28


    Azure SQL 数据库自动备份的较早结果


    在备份历史记录视图中保留和显示的备份取决于配置的备份保留期。保留期之前的备份（`in_retention = 0`）也会显示在 `sys.dm_database_backups`
    视图中。它们是在配置的保留期内进行时间点恢复所必需的。


    向上滚动，我可以看到最新的结果，如图 8-29 所示，其中包括日志和差异备份。


    ![](img/496204_2_En_8_Fig29_HTML.jpg)


    图 8-29


    Azure SQL 数据库自动备份的顶部结果


    **提示**


    我们新的 `Copilot` 也可以用于查找有关备份的信息，例如使用提示 "`我的数据库最近一次备份是什么时候创建的？`"

    '
- fmt: '## Region, Data Center, and Service Availability


    要获取 Azure 区域和数据中心的全局状态视图，可以使用 `Azure status` 仪表板，您可以在 [`https://status.azure.com`](https://status.azure.com)
    找到它。图 [8-30](#496204_2_En_8_Chapter.xhtml#Fig30) 展示了一个带有“当前影响”默认视图的 Azure 状态仪表板示例。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig30_HTML.jpg)


    图 8-30


    当前影响的 Azure 状态仪表板


    Azure 状态可以显示任何 Azure 区域中所有 Azure 服务的状态。此状态显示了所有服务，与您是否使用特定服务无关。在此视图中我选择了“美洲”，您可以在图
    [8-31](#496204_2_En_8_Chapter.xhtml#Fig31) 中看到结果。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig31_HTML.jpg)


    图 8-31


    美洲地区的 Azure 服务状态


    这是一个很长的表格，您可以向下滚动查看任何服务的状态。任何标有“–”的服务意味着该服务在该区域不可用。


    要获取 Azure 状态通知，您可以使用页面顶部的 RSS 源。此外，您可以通过 Azure 状态历史记录（[`https://status.azure.com/status/history`](https://status.azure.com/status/history)）查看
    Azure 状态的完整历史。


    您还可以通过 Azure 门户中名为 `Azure Service Health` 的功能，获取与您的订阅特定的 Azure 服务运行状况的更多信息。通过
    `Service Health`，您可以查看 Azure 服务的当前问题、可能影响可用性的计划维护以及运行状况历史记录。在您的门户顶部搜索 `Service
    Health` 或在仪表板上找到它。当我选择此项并选择“运行状况历史记录”时，您可以在图 [8-32](#496204_2_En_8_Chapter.xhtml#Fig32)
    中看到我的结果。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig32_HTML.jpg)


    图 8-32


    Azure Service Health 历史记录


    这里的事件包括可能解决未来问题的建议和计划的维护操作。在服务菜单上，您可以看到查看当前服务问题或为计划维护等主题设置警报的选项。


    ## Availability Metrics


    假设您希望以更精细的级别跟踪 Azure SQL 数据库的可用性，以查看其是否符合承诺的 SLA。如您在图 [8-33](#496204_2_En_8_Chapter.xhtml#Fig33)
    中所见，门户中的 Azure Metrics 提供了一种新方法。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig33_HTML.jpg)


    图 8-33


    Azure 门户中的可用性指标


    我将时间间隔更改为过去 30 天，但此值也可以通过日志检索更长时间的历史记录。此外，与其他 Azure Metrics 一样，您可以设置警报以查看此值是否从
    100% 发生变化。我们的计算基于详细连接指标的平均值组合。更多信息请访问 [`https://learn.microsoft.com/azure/azure-sql/database/monitoring-metrics-alerts?view=azuresql#availability-metric`](https://learn.microsoft.com/azure/azure-sql/database/monitoring-metrics-alerts?view=azuresql#availability-metric)。


    如果我不了解这个新指标，并想看看我们新的 Copilot 是否能提供帮助，该怎么办呢？我使用了提示词“过去 30 天内这个数据库的可用性如何？”，并得到了如图
    [8-34](#496204_2_En_8_Chapter.xhtml#Fig34) 所示的回复。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig34_HTML.jpg)


    图 8-34


    Copilot 显示我的数据库的可用性指标


    ## Replica Status


    要监控 Azure SQL 中副本的状态，您可以使用 DMV `sys.dm_database_replica_states`。例如，此 DMV 可用于查看业务关键服务层的副本状态。您也可以使用此
    DMV 来检查具有异地复制或故障转移组的部署的副本状态。


    对于本章中我部署的名为 `bwsqlbc` 的数据库，我可以使用 SSMS 连接到此数据库并运行以下 T-SQL 语句：


    ```

    SELECT is_primary_replica, synchronization_state_desc, synchronization_health_desc,
    last_received_time, last_redone_time

    FROM sys.dm_database_replica_states;

    GO

    ```


    我从此数据库中得到了结果，如图 [8-35](#496204_2_En_8_Chapter.xhtml#Fig35) 所示。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig35_HTML.jpg)


    图 8-35


    使用业务关键层的 Azure SQL 数据库的副本状态


    对于异地复制和故障转移组，还有其他 DMV 可用于检查逻辑服务器和实例之间的复制状态。这包括 `sys.geo_replication_links`（在逻辑主数据库上下文中运行）和
    `sys.dm_geo_replication_link_status`（在用户数据库上下文中运行）。使用这些 DMV 的一个例子是种子设定（地理辅助数据库的初始同步）。`sys.geo_replication_links`
    可以显示种子设定进程在进行中及完成时的状态。


    在本章中，我配置了一个故障转移组。让我们连接到故障转移组服务器，看看这些 DMV 的样子：


    我在其中一个数据库的上下文中连接到故障转移组服务器 `bwazuresql.database.windows.net`，并运行了以下 T-SQL 语句：


    ```

    SELECT partner_server, partner_database, replication_lag_sec, replication_state_desc,
    role_desc

    FROM sys.dm_geo_replication_link_status;

    GO

    ```


    我得到了如图 [8-36](#496204_2_En_8_Chapter.xhtml#Fig36) 所示的结果。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig36_HTML.jpg)


    图 8-36


    故障转移组副本状态


    `replication_state_desc` = CATCHUP 表示服务器已同步。


    您可以在 [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-geo-replication-link-status-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-geo-replication-link-status-azure-sql-database)
    查看 `sys.dm_geo_replication_link_status` 的完整文档。


    所有这些用于检查副本状态的 DMV 都适用于 Azure SQL 托管实例和数据库。az CLI 可用于检查副本状态 (`az sql db replica`)。PowerShell
    cmdlet 支持检查副本状态，例如 `Get-AzSqlDatabaseReplicationLink`。


    查看异地复制数据库状态的另一种方法是使用 Database Watcher。我在第 [7](#496204_2_En_7_Chapter.xhtml) 章中设置了
    Database Watcher 来跟踪数据库 `bwadw`。我还在本章中为此数据库设置了异地复制。我可以使用 Database Watcher 获取有关异地复制状态的更多详细信息，如图
    [8-37](#496204_2_En_8_Chapter.xhtml#Fig37) 所示。


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig37_HTML.jpg)


    图 8-37


    使用 Database Watcher 查看异地复制数据库状态'
  raw: '### Region, Data Center, and Service Availability


    To get a global view of the status of Azure regions and data centers, use the
    **Azure status** dashboard which you can find at [`https://status.azure.com`](https://status.azure.com).
    Figure [8-30](#496204_2_En_8_Chapter.xhtml#Fig30) shows an example of the Azure
    status dashboard with a default view of Current Impact.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig30_HTML.jpg)


    Figure 8-30


    The Azure status dashboard for current impact


    Azure status can show the status of all Azure services in any Azure region. The
    status shows all services independent of your use of a specific service. I selected
    Americas on this view, and you can see the results in Figure [8-31](#496204_2_En_8_Chapter.xhtml#Fig31).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig31_HTML.jpg)


    Figure 8-31


    Azure service status for Americas


    This is a long table as you can scroll down and see the status for any service.
    Any service that has a “–” means that service is not available in that region.


    To get notified of Azure status, you can use the RSS feed at the top of the page.
    In addition, you can see a complete history of Azure status through Azure status
    history at [`https://status.azure.com/status/history`](https://status.azure.com/status/history).


    You can also get more information about the health of Azure services specific
    to your subscription through the Azure portal for a capability called **Azure
    Service Health**. Through Service Health, you can see current issues for Azure
    services, planned maintenance that could affect availability, and health history.
    Search **Service Health** at the top of your portal or find it on your dashboard.
    When I selected this and selected Health History, you can see my results in Figure
    [8-32](#496204_2_En_8_Chapter.xhtml#Fig32).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig32_HTML.jpg)


    Figure 8-32


    Azure Service Health history


    The events here include advisories of possible future issues to resolve and planned
    maintenance operations. On the Service Menu, you can see options to look at things
    like current service issues or even set up alerts for topics like planned maintenance.


    ### Availability Metrics


    Let’s say you would like to track at a more granular level the availability of
    your Azure SQL Database to see how this lines up with the promised SLA. Azure
    Metrics from the portal has a new way to do this as you can see in Figure [8-33](#496204_2_En_8_Chapter.xhtml#Fig33).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig33_HTML.jpg)


    Figure 8-33


    Availability metric in the Azure Portal


    I changed the time interval for the last 30 days, but this value can also be retrieved
    for a longer history with logs. In addition, like other Azure Metrics, you can
    set up alerts to see if this value changes from 100%. Our calculation is based
    on a combination of averages from detailed connection metrics. Learn more at [`https://learn.microsoft.com/azure/azure-sql/database/monitoring-metrics-alerts?view=azuresql#availability-metric`](https://learn.microsoft.com/azure/azure-sql/database/monitoring-metrics-alerts?view=azuresql#availability-metric).


    What if I didn’t know about this new metric and wanted to see if our new Copilot
    can help. I used the prompt “What is the availability of this database over the
    last 30 days?” and got a response as you can see in Figure [8-34](#496204_2_En_8_Chapter.xhtml#Fig34).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig34_HTML.jpg)


    Figure 8-34


    Copilot showing availability metrics for my database


    ### Replica Status


    To monitor the state of replicas in Azure SQL, you can use the DMV **sys.dm_database_replica_states**.
    This DMV could be used, for example, to look at the status of replicas for a Business
    Critical service tier. You could also use this DMV to check the status for replicas
    for a deployment with geo-replication or failover groups.


    For the database I deployed in this chapter called **bwsqlbc**, I can connect
    with SSMS to this database and run the following T-SQL statement:


    ```

    SELECT is_primary_replica, synchronization_state_desc, synchronization_health_desc,
    last_received_time, last_redone_time

    FROM sys.dm_database_replica_states;

    GO

    ```


    I get the results from this database as you can see in Figure [8-35](#496204_2_En_8_Chapter.xhtml#Fig35).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig35_HTML.jpg)


    Figure 8-35


    Replica status for an Azure SQL Database using Business Critical


    For geo-replication and failover groups, there are additional DMVs to check on
    the status of replication between logical server and instances. This includes
    **sys.geo_replication_links** (run in the context of the logical master) and **sys.dm_geo_replication_link_status**
    (run in the context of the user database). One example of using these DMVs is
    seeding (the initial sync of the geo-secondary). sys.geo_replication_links can
    show the state of the seeding process as it progresses and completes.


    In this chapter, I configured a failover group. Let’s connect to the failover
    group server and see what these DMVs look like:


    I connected to the failover group server **bwazuresql.database.windows.net** in
    the context of one of the databases in the group and ran the following T-SQL statement:


    ```

    SELECT partner_server, partner_database, replication_lag_sec, replication_state_desc,
    role_desc

    FROM sys.dm_geo_replication_link_status;

    GO

    ```


    I got the results as you can see in Figure [8-36](#496204_2_En_8_Chapter.xhtml#Fig36).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig36_HTML.jpg)


    Figure 8-36


    Failover group replica status


    A **replication_state_desc** = CATCHUP means the servers are synchronized.


    You can see the full documentation of **sys.dm_geo_replication_link_status** at
    [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-geo-replication-link-status-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-geo-replication-link-status-azure-sql-database).


    All of these DMVs to check replica status work for both Azure SQL Managed Instance
    and Database. The az CLI can be used to check on replica status (**az sql db replica**).
    PowerShell cmdlets exist to support checking replica status, for example, **Get-AzSqlDatabaseReplicationLink**.


    Another way to see the status of a geo-replicated database is to use Database
    Watcher. I set up Database Watcher back in Chapter [7](#496204_2_En_7_Chapter.xhtml)
    to track the database **bwadw**. I also in this chapter set up a geo-replication
    for this database. I can use Database Watcher to get more details on the geo-replicated
    status as you can see in Figure [8-37](#496204_2_En_8_Chapter.xhtml#Fig37).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig37_HTML.jpg)


    Figure 8-37


    Using Database Watcher to see geo-replicated database status'
  trans: '

    ## 区域、数据中心和服务可用性


    要获取 Azure 区域和数据中心的全局状态视图，可以使用 `Azure 状态` 仪表板，您可以在 [`https://status.azure.com`](https://status.azure.com)
    找到它。图 8-30 展示了一个带有“当前影响”默认视图的 Azure 状态仪表板示例。


    ![](img/496204_2_En_8_Fig30_HTML.jpg)


    图 8-30


    当前影响的 Azure 状态仪表板


    Azure 状态可以显示任何 Azure 区域中所有 Azure 服务的状态。此状态显示了所有服务，与您是否使用特定服务无关。在此视图中我选择了“美洲”，您可以在图
    8-31 中看到结果。


    ![](img/496204_2_En_8_Fig31_HTML.jpg)


    图 8-31


    美洲地区的 Azure 服务状态


    这是一个很长的表格，您可以向下滚动查看任何服务的状态。任何标有“–”的服务意味着该服务在该区域不可用。


    要获取 Azure 状态通知，您可以使用页面顶部的 RSS 源。此外，您可以通过 Azure 状态历史记录（[`https://status.azure.com/status/history`](https://status.azure.com/status/history)）查看
    Azure 状态的完整历史。


    您还可以通过 Azure 门户中名为 `Azure 服务运行状况` 的功能，获取与您的订阅特定的 Azure 服务运行状况的更多信息。通过 `服务运行状况`，您可以查看
    Azure 服务的当前问题、可能影响可用性的计划维护以及运行状况历史记录。在您的门户顶部搜索 `服务运行状况` 或在仪表板上找到它。当我选择此项并选择“运行状况历史记录”时，您可以在图
    8-32 中看到我的结果。


    ![](img/496204_2_En_8_Fig32_HTML.jpg)


    图 8-32


    Azure 服务运行状况历史记录


    这里的事件包括可能解决未来问题的建议和计划的维护操作。在服务菜单上，您可以看到查看当前服务问题或为计划维护等主题设置警报的选项。


    ## 可用性指标


    假设您希望以更精细的级别跟踪 Azure SQL 数据库的可用性，以查看其是否符合承诺的 SLA。如您在图 8-33 中所见，门户中的 Azure 指标提供了一种新方法。


    ![](img/496204_2_En_8_Fig33_HTML.jpg)


    图 8-33


    Azure 门户中的可用性指标


    我将时间间隔更改为过去 30 天，但此值也可以通过日志检索更长时间的历史记录。此外，与其他 Azure 指标一样，您可以设置警报以查看此值是否从 100%
    发生变化。我们的计算基于详细连接指标的平均值组合。更多信息请访问 [`https://learn.microsoft.com/azure/azure-sql/database/monitoring-metrics-alerts?view=azuresql#availability-metric`](https://learn.microsoft.com/azure/azure-sql/database/monitoring-metrics-alerts?view=azuresql#availability-metric)。


    如果我不了解这个新指标，并想看看我们新的 Copilot 是否能提供帮助，该怎么办呢？我使用了提示词“过去 30 天内这个数据库的可用性如何？”，并得到了如图
    8-34 所示的回复。


    ![](img/496204_2_En_8_Fig34_HTML.jpg)


    图 8-34


    Copilot 显示我的数据库的可用性指标


    ## 副本状态


    要监控 Azure SQL 中副本的状态，您可以使用 DMV `sys.dm_database_replica_states`。例如，此 DMV 可用于查看业务关键服务层的副本状态。您也可以使用此
    DMV 来检查具有异地复制或故障转移组的部署的副本状态。


    对于本章中我部署的名为 `bwsqlbc` 的数据库，我可以使用 SSMS 连接到此数据库并运行以下 T-SQL 语句：


    ```

    SELECT is_primary_replica, synchronization_state_desc, synchronization_health_desc,
    last_received_time, last_redone_time

    FROM sys.dm_database_replica_states;

    GO

    ```


    我从此数据库中得到了结果，如图 8-35 所示。


    ![](img/496204_2_En_8_Fig35_HTML.jpg)


    图 8-35


    使用业务关键层的 Azure SQL 数据库的副本状态


    对于异地复制和故障转移组，还有其他 DMV 可用于检查逻辑服务器和实例之间的复制状态。这包括 `sys.geo_replication_links`（在逻辑主数据库上下文中运行）和
    `sys.dm_geo_replication_link_status`（在用户数据库上下文中运行）。使用这些 DMV 的一个例子是种子设定（地理辅助数据库的初始同步）。`sys.geo_replication_links`
    可以显示种子设定进程在进行中及完成时的状态。


    在本章中，我配置了一个故障转移组。让我们连接到故障转移组服务器，看看这些 DMV 的样子：


    我在其中一个数据库的上下文中连接到故障转移组服务器 `bwazuresql.database.windows.net`，并运行了以下 T-SQL 语句：


    ```

    SELECT partner_server, partner_database, replication_lag_sec, replication_state_desc,
    role_desc

    FROM sys.dm_geo_replication_link_status;

    GO

    ```


    我得到了如图 8-36 所示的结果。


    ![](img/496204_2_En_8_Fig36_HTML.jpg)


    图 8-36


    故障转移组副本状态


    `replication_state_desc` = CATCHUP 表示服务器已同步。


    您可以在 [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-geo-replication-link-status-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-geo-replication-link-status-azure-sql-database)
    查看 `sys.dm_geo_replication_link_status` 的完整文档。


    所有这些用于检查副本状态的 DMV 都适用于 Azure SQL 托管实例和数据库。az CLI 可用于检查副本状态 (`az sql db replica`)。PowerShell
    cmdlet 支持检查副本状态，例如 `Get-AzSqlDatabaseReplicationLink`。


    查看异地复制数据库状态的另一种方法是使用数据库监视器。我在第 7 章中设置了数据库监视器来跟踪数据库 `bwadw`。我还在本章中为此数据库设置了异地复制。我可以使用数据库监视器获取有关异地复制状态的更多详细信息，如图
    8-37 所示。


    ![](img/496204_2_En_8_Fig37_HTML.jpg)


    图 8-37


    使用数据库监视器查看异地复制数据库状态

