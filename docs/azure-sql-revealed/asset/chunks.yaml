- fmt: "## Performance Example\n\nLet’s look at an example of a performance scenario\
    \ to show how to use tools and capabilities I’ve discussed in this section to\
    \ identify a performance scenario. I’ll use the following resources for this exercise:\n\
    \n*   The logical server `bwsqllogicalserver` as well as the database `bwadw`\
    \ I’ve deployed earlier. This database was deployed as a Hyperscale, Gen5, 2 vCore\
    \ database.\n\n*   The Azure VM called `bwsql2022`. I left my security settings\
    \ from Chapter [6](#496204_2_En_6_Chapter.xhtml), so this VM has access to the\
    \ logical server and database.\n\n*   I’ll use SQL Server Management Studio (SSMS)\
    \ to run some queries and look at Query Store reports.\n\n    Tip: If you connect\
    \ with SSMS to an Azure SQL Database logical server and with SSMS choose a specific\
    \ database, Object Explorer will only show you the logical master and your database.\
    \ If you connect to the logical master with a server admin account, Object Explorer\
    \ will show you all databases.\n\n*   I’ll use the Azure portal to view Azure\
    \ Metrics.\n\n*   I’ll also set up Database Watcher for this target database (get\
    \ started quickly at [`https://learn.microsoft.com/azure/azure-sql/database-watcher-quickstart`](https://learn.microsoft.com/azure/azure-sql/database-watcher-quickstart))\
    \ and use Microsoft Copilot skills in Azure SQL Database which is enabled by default\
    \ in my subscription (if you don’t see it enabled, check the following documentation:\
    \ [`https://learn.microsoft.com/azure/azure-sql/copilot/copilot-azure-sql-overview?view=azuresql#enable-microsoft-copilot-in-your-azure-tenant`](https://learn.microsoft.com/azure/azure-sql/copilot/copilot-azure-sql-overview?view=azuresql#enable-microsoft-copilot-in-your-azure-tenant)).\n\
    \n*   For this chapter, I have script files you can use for several of the examples.\
    \ You can find scripts for this example in the `ch7_performance\\monitor_and_scale`\
    \ folder for the source files included for the book. I will also use the very\
    \ popular tool `ostress.exe` for exercises in this chapter which comes with the\
    \ RML Utilities. You can download RML from [`https://www.microsoft.com/en-us/download/details.aspx?id=4511`](https://www.microsoft.com/en-us/download/details.aspx?id=4511).\
    \ Make sure to put the folder where RML gets installed in your system path (which\
    \ is by default `C:\\Program Files\\Microsoft Corporation\\RMLUtils`).\n\nLet’s\
    \ go through an example in a step-by-step fashion:\n\n1.  Set up to monitor Azure\
    \ SQL Database with a DMV query.\n\n    Tip: To open a script file in the context\
    \ of a database in SSMS, click the database in Object Explorer and then use the\
    \ File/Open menu in SSMS.\n\n2.  Launch SQL Server Management Studio (SSMS) and\
    \ load a query in the context of the database to monitor the Dynamic Management\
    \ View (DMV) `sys.dm_exec_requests` from the script `dmexecrequests.sql` which\
    \ looks like the following:\n\n    ```sql\n    SELECT er.session_id, er.status,\
    \ er.command, er.wait_type, er.last_wait_type, er.wait_resource, er.wait_time\n\
    \    FROM sys.dm_exec_requests er\n    INNER JOIN sys.dm_exec_sessions es\n  \
    \  ON er.session_id = es.session_id\n    AND es.is_user_process = 1;\n    ```\n\
    \n3.  Load another query to observe resource usage.\n\n    In another session\
    \ for SSMS in the context of the database, load a query to monitor a Dynamic Management\
    \ View (DMV) unique to Azure SQL Database called `sys.dm_db_resource_stats` from\
    \ a script called `dmdbresourcestats.sql`:\n\n    ```sql\n    SELECT * FROM sys.dm_db_resource_stats;\n\
    \    ```\n\n    This DMV will track overall resource usage of your workload against\
    \ Azure SQL Database such as CPU, I/O, and memory.\n\n    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig17_HTML.jpg)\n\
    \    Figure 7-17: Viewing CPU utilization from Azure Metrics\n\n4.  Edit the workload\
    \ script.\n\n    Edit the script `sqlworkload.cmd` (which will use the `ostress.exe`\
    \ program).\n\n    I’ll substitute my server, database, and password. The script\
    \ will look like this (with your password):\n\n    ```cmd\n    ostress.exe -Sbwsqllogicalserver.database.windows.net\
    \ -itopcustomersales.sql -Usqladmin -dbwadw -P -n10 -r20 -q -T146\n    ```\n\n\
    5.  Examine the T-SQL query we will use for the workload. You can find this T-SQL\
    \ batch in the script `topcustomersales.sql`:\n\n    ```sql\n    DECLARE @x int\n\
    \    DECLARE @y float\n    SET @x = 0;\n    WHILE (@x < 10000)\n    BEGIN\n  \
    \  SELECT @y = sum(cast((soh.SubTotal*soh.TaxAmt*soh.TotalDue) as float))\n  \
    \  FROM SalesLT.Customer c\n    INNER JOIN SalesLT.SalesOrderHeader soh\n    ON\
    \ c.CustomerID = soh.CustomerID\n    INNER JOIN SalesLT.SalesOrderDetail sod\n\
    \    ON soh.SalesOrderID = sod.SalesOrderID\n    INNER JOIN SalesLT.Product p\n\
    \    ON p.ProductID = sod.ProductID\n    GROUP BY c.CompanyName\n    ORDER BY\
    \ c.CompanyName;\n    SET @x = @x + 1;\n    END\n    GO\n    ```\n\n    This database\
    \ is not large, so the query to retrieve customer and their associated sales information\
    \ ordered by customers with the most sales shouldn't generate a large result set.\
    \ It is possible to tune this query by reducing the number of columns from the\
    \ result set, but these are needed for demonstration purposes of this activity.\
    \ You will note in this query I don’t return any results to the client but assign\
    \ values to a local variable. This will put all the CPU resources to run the query\
    \ to the server.\n\n6.  Now let’s run the workload and observe its performance\
    \ and results from queries we loaded earlier. Run the workload by executing the\
    \ `sqlworkload.cmd` script from a command shell or PowerShell. The script uses\
    \ `ostress` to simulate ten concurrent users running the T-SQL batch.\n\n7.  Now\
    \ use the DMVs that you loaded to observe performance while this runs. First,\
    \ run the query from `dmexecrequests.sql` five or six times in the query window\
    \ from SSMS. You will see several users have status = `RUNNABLE` and `last_wait_type`\
    \ = `SOS_SCHEDULER_YIELD`. This is a classic signature of not having enough CPU\
    \ resources for a workload.\n\n8.  Observe the results from the query `dmdbresourcestats.sql`.\
    \ Run this query a few times and observe the results. You will see several rows\
    \ with a value for `avg_cpu_percent` close to 100%. `sys.dm_db_resource_stats`\
    \ takes a snapshot every 15 seconds of resource usage.\n\n9.  Let the workload\
    \ complete and take note of its duration. For me, it measured around 12–13 minutes\
    \ to complete.\n\n10. Use Azure Monitor and metrics.\n\n    Let’s look at this\
    \ performance scenario through the lens of Azure Monitor and metrics. I’ll navigate\
    \ to my database using the Azure portal. In the monitoring pane is an area called\
    \ Monitoring and Key metrics. After my workload has run, my chart looks like Figure\
    \ [7-17](#496204_2_En_7_Chapter.xhtml#Fig17).\n\n    You can see on this screen\
    \ the blue line showing high CPU (the lines to the left of the sustained high\
    \ CPU was another brief test I did before the example). Notice the red line showing\
    \ less than 100%. This is the CPU for the instance hosting the database. This\
    \ number shows there is room to scale for my database which is a sign that I might\
    \ not have enough resources to run this workload.\n\n    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig18_HTML.jpg)\n\
    \    Figure 7-18: SSMS Query Store Top Consuming Queries\n\n11. Let’s use the\
    \ Query Store now to dive deeper into the performance of the queries in this workload.\
    \ In SSMS in the Object Explorer, load the Top Resource Consuming Queries as seen\
    \ in Figure [7-18](#496204_2_En_7_Chapter.xhtml#Fig18).\n\n    The default metric\
    \ is Total Duration, so I changed this to CPU. You can see the query I ran for\
    \ this example is the one consuming all the CPU.\n\n    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig19_HTML.jpg)\n\
    \    Figure 7-19: Query Wait Statistics report from SSMS\n\n12. Query Store reports\
    \ in SSMS also include top queries by waits. In this case, the CPU problem *is\
    \ also a waiting problem* on CPU resources as I mentioned earlier. Figure [7-19](#496204_2_En_7_Chapter.xhtml#Fig19)\
    \ shows this.\n\n    Now consider the evidence. The workload consumes CPU resources\
    \ for the database at 100% (in reality, it is more than 100%, but we are capped).\
    \ The status of many requests is `RUNNABLE`, and the top wait type for the workload\
    \ is `SOS_SCHEDULER_YIELD`. If the query cannot be changed, then the most likely\
    \ scenario is that you don’t have enough CPU resources for your workload. Later\
    \ in this chapter, we will use Azure interfaces to make this query run faster.\n\
    \n    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig23_HTML.jpg)\n    Figure\
    \ 7-23: Wait statistics for a query in Database Watcher\n\n    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig22_HTML.jpg)\n\
    \    Figure 7-22: Query details in Database Watcher\n\n    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig21_HTML.jpg)\n\
    \    Figure 7-21: Top queries from Database Watcher\n\n    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig20_HTML.jpg)\n\
    \    Figure 7-20: Database Watcher resource utilization\n\n13. Let’s look now\
    \ at what Database Watcher shows.\n\n    What does Database Watcher show for this\
    \ situation, and can it also help me narrow down the problem?\n\n    The heatmap\
    \ that you have seen earlier in this chapter looked green for this database over\
    \ the last hour, and the CPU only showed < 50%. That is because the workload only\
    \ hit 100% CPU for a 13-minute window. If I select the database from the heatmap,\
    \ I see a screen like Figure [7-20](#496204_2_En_7_Chapter.xhtml#Fig20).\n\n \
    \   I like this view because I see the same information as I see in Azure Monitor\
    \ metrics, but I get all in the same chart information about other resources like\
    \ Workers and I/O. And even though I could see a chart like this in Azure Metrics,\
    \ I wasn’t able to drill down to top queries. You can see I can select Top Queries\
    \ from this screen and see results like in Figure [7-21](#496204_2_En_7_Chapter.xhtml#Fig21).\n\
    \n    I see that one query is marked red (which indicates it is taking up a high\
    \ amount of CPU).\n\n    I can click this query and see the details as in Figure\
    \ [7-22](#496204_2_En_7_Chapter.xhtml#Fig22).\n\n    If I scroll down from here,\
    \ I get wait statistics specific to this query like in Figure [7-23](#496204_2_En_7_Chapter.xhtml#Fig23).\n\
    \n    Notice the majority of wait time for the query is for the CPU just like\
    \ Query Store reports revealed.\n\n    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig25_HTML.jpg)\n\
    \    Figure 7-25: SQL Copilot detects resource limits\n\n    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig24_HTML.jpg)\n\
    \    Figure 7-24: SQL Copilot analyzing slow performance\n\n14. What about Copilot?\
    \ Can it help?\n\n    You have seen some of the capabilities of “SQL Copilot.”\
    \ What did it respond to in this situation with the prompt “My database is slow”?\
    \ Figure [7-24](#496204_2_En_7_Chapter.xhtml#Fig24) shows the answer.\n\n    Copilot\
    \ has detected a high CPU situation with a known query, but there are no scenarios\
    \ like missing indexes to explain any problem.\n\n    I then responded (yes, you\
    \ can have a conversation with Copilot!) with “Am I hitting any resource limits?”\
    \ (Notice the phrase “hitting” here. Language models just get this.) Figure [7-25](#496204_2_En_7_Chapter.xhtml#Fig25)\
    \ shows the response.\n\n    You can see the response is that the problem is not\
    \ a query tuning issue but that I just don’t have enough resources for the workload.\
    \ Notice part of the suggestion is to use Serverless."
