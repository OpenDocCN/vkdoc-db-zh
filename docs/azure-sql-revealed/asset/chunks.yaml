    *   Microsoft SQL Server VSS Writer is installed by default.


    ### Deploy on Your Own


    Today when I deploy a SQL Server instance in a Hyper-V virtual machine (often
    just on my laptop), I go through the process of choosing certain options for the
    VM (like number of logical CPUs, memory, location of disks) and then install an
    operating system like Windows Server or Linux (typically from an .ISO file). When
    this is done, I usually connect to the VM with Remote Desktop (Windows) or ssh
    (Linux). For Windows, I will download the installation media for SQL Server to
    my local drive and then “copy and paste” it into a folder in the VM. I then run
    setup and am off and running to deploy SQL Server. For Linux, I just make sure
    my VM is connected to the Internet and run the SQL Server on Linux installation
    which downloads packages as part of the installation process.


    This same process is almost identical to the “deploy on your own” option for SQL
    Server on Azure Virtual Machine, with one exception. You will configure the VM
    and deploy an operating system by *using one of the gallery images just for the
    operating system*. You can use the portal, az CLI, or PowerShell to choose your
    VM size and operating system, very similar to using a SQL Server gallery image
    except all the options for SQL Server will not be part of the process.


    This technique is one I sometimes use because I have complete control of how and
    what is installed with SQL Server vs. what Microsoft chooses from a gallery image.
    If you use this method, there is one downside. You do not immediately get to take
    advantage of the options you get with a SQL gallery image, such as automated backups
    and security updates. Fortunately, there is a solution to use this customized
    method for deployment but take advantage of automated features and licensing options.
    This solution is called the **SQL Server IaaS Agent Extension** (which is installed
    by default when using a gallery image). I will discuss more about this capability
    in the section titled “SQL Server IaaS Agent Extension” later in the chapter.


    ### Using a CLI with ARM Templates, Bison, and Terraform


    Azure provides other ways to deploy SQL Server on Azure Virtual Machine besides
    the Azure portal using a command-line interface (CLI) with the **az sql vm** or
    **az vm** CLI. There are also PowerShell commands **New-AzVM** and **New-AzSqlVM**.
    The problem is that all of these methods don’t support a way to configure optimal
    storage settings as I have described earlier with the portal. You would have to
    manually configure this after you deployed.


    Azure provides a mechanism for any Azure resource to automate the use of Azure
    CLI tools with a concept called an *ARM template*. An ARM template is a JSON file
    that describes in a declarative fashion the configuration and infrastructure of
    a deployment.


    While you can try to learn how to build templates from scratch, I recommend you
    get an example. You can download and edit an example of an Azure template to create
    a new SQL Server in Azure Virtual Machine with configurable storage settings at
    [`https://learn.microsoft.com/samples/azure/azure-quickstart-templates/sql-vm-new-storage`](https://learn.microsoft.com/samples/azure/azure-quickstart-templates/sql-vm-new-storage).
    Azure templates not only configure all the properties to create the virtual machine
    but support *parameters*, so you can use a template and then supply the parameters
    you want to customize the deployment at runtime. The link for this template also
    includes a file to support deploying a SQL Server VM on Azure with Bison.


    Terraform can also be used to deploy SQL Server on Azure VM. You can read more
    at [`https://registry.terraform.io/providers/hashicorp/azurerm/latest/docs/resources/mssql_virtual_machine`](https://registry.terraform.io/providers/hashicorp/azurerm/latest/docs/resources/mssql_virtual_machine).'
  trans: '

    #### 配置内容


    以下是我们作为 SQL Server 库安装镜像过程的一部分所做出的配置选择列表：


    *   `SQL Server`、`SQL Server Agent`、全文检索和 `SSIS` 服务设置为自动启动，并在部署后处于运行状态。所有服务均使用服务
    SID。

    *   您在部署期间指定的虚拟机管理员帐户将成为 SQL 系统管理员。

    *   默认禁用文件流功能（但可以启用并支持）。

    *   默认禁用始终启用可用性组（但可以启用并支持）。

    *   为 SQL Server 启用了 TCP/IP 协议（即使开发版也是如此）。

    *   我们通常会安装最新的累积更新（和/或安全更新），但可能并非确切的最新累积更新。您可以在 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-on-azure-vm-iaas-what-is-overview?view=azuresql#lifecycle`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-on-azure-vm-iaas-what-is-overview?view=azuresql#lifecycle)
    阅读更多关于我们如何保持镜像更新的信息。

    *   默认启用 CEIP，但您可以将其禁用。请在 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-on-azure-vm-iaas-what-is-overview?view=azuresql#customer-experience-improvement-program-ceip`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-on-azure-vm-iaas-what-is-overview?view=azuresql#customer-experience-improvement-program-ceip)
    阅读更多信息。

    *   默认安装 Microsoft SQL Server VSS Writer。


    ### 自行部署


    如今，当我在 Hyper-V 虚拟机（通常只是在我的笔记本电脑上）中部署 SQL Server 实例时，我会经历为虚拟机选择某些选项（如逻辑 CPU 数量、内存、磁盘位置）的过程，然后安装操作系统，如
    Windows Server 或 Linux（通常从 .ISO 文件安装）。完成后，我通常使用远程桌面（Windows）或 ssh（Linux）连接到虚拟机。对于
    Windows，我会将 SQL Server 安装介质下载到本地驱动器，然后“复制并粘贴”到虚拟机中的文件夹。然后运行安装程序，开始部署 SQL Server。对于
    Linux，我只需确保我的虚拟机连接到互联网，并运行 SQL Server on Linux 安装程序，该安装程序在安装过程中会下载软件包。


    此过程与 SQL Server on Azure 虚拟机的“自行部署”选项几乎完全相同，只有一个例外。您将使用专为操作系统设计的库镜像之一来配置虚拟机并部署操作系统。您可以使用门户、az
    CLI 或 PowerShell 来选择虚拟机大小和操作系统，这与使用 SQL Server 库镜像非常相似，只是整个过程中不会包含 SQL Server
    的所有选项。


    我有时会使用这种技术，因为我可以完全控制 SQL Server 的安装方式和内容，而不是由库镜像决定。如果您使用此方法，有一个缺点。您无法立即利用 SQL
    库镜像附带的选项，例如自动备份和安全更新。幸运的是，有一种解决方案可以使用这种自定义方法进行部署，同时又能利用自动化功能和许可选项。此解决方案称为 SQL
    Server IaaS 代理扩展（使用库镜像时默认安装）。我将在下一节中详细讨论此功能。


    ### SQL Server IaaS 代理扩展


    使用 SQL Server 库镜像时，默认会安装 SQL Server IaaS 代理扩展。此扩展为您的 SQL Server 虚拟机提供自动化功能和许可选项。


    ### 使用 CLI 与 ARM 模板、Bison 和 Terraform


    除了使用 Azure 门户，Azure 还提供了其他方式通过命令行界面（CLI）在 Azure 虚拟机上部署 SQL Server，例如使用 `az sql
    vm` 或 `az vm` CLI。此外还有 PowerShell 命令 `New-AzVM` 和 `New-AzSqlVM`。问题在于，所有这些方法都不支持像门户那样配置最优存储设置的方式。部署后您必须手动配置此设置。


    Azure 提供了一种机制，通过称为 ARM 模板的概念，为任何 Azure 资源自动化使用 Azure CLI 工具。ARM 模板是一个 JSON 文件，以声明性方式描述了部署的配置和基础结构。


    虽然您可以尝试从头学习构建模板，但我建议您获取一个示例。您可以从 [`https://learn.microsoft.com/samples/azure/azure-quickstart-templates/sql-vm-new-storage`](https://learn.microsoft.com/samples/azure/azure-quickstart-templates/sql-vm-new-storage)
    下载并编辑一个 Azure 模板示例，以创建具有可配置存储设置的新的 Azure 虚拟机 SQL Server。Azure 模板不仅配置了创建虚拟机的所有属性，还支持参数，因此您可以使用模板，然后在运行时提供参数来自定义部署。此模板的链接还包括一个支持使用
    Bison 在 Azure 上部署 SQL Server 虚拟机的文件。


    Terraform 也可用于在 Azure VM 上部署 SQL Server。您可以在 [`https://registry.terraform.io/providers/hashicorp/azurerm/latest/docs/resources/mssql_virtual_machine`](https://registry.terraform.io/providers/hashicorp/azurerm/latest/docs/resources/mssql_virtual_machine)
    阅读更多信息。

    '
- fmt: '### Reserved Instances, Dedicated Hosts, and Capacity Reservations


    To save money on Azure Virtual Machines, you can prepay for a period (one to three
    years) and then save on the compute costs of the Azure Virtual Machine as you
    deploy. This option is called `Azure Reserved VM Instances`. If you plan to deploy
    many SQL Server Azure Virtual Machines, you probably should investigate this option.
    Learn more about Reserved Instances at [`https://azure.microsoft.com/pricing/reserved-vm-instances/`](https://azure.microsoft.com/pricing/reserved-vm-instances/).


    `Capacity Reservations` allow you to reserve compute capacity in an Azure region
    or Availability Zone for any duration of time. This is particularly useful for
    ensuring that you have the necessary resources available for critical workloads,
    even during peak demand periods. `Capacity Reservations` are more flexible than
    `Reserved Instances` because there is no major long-term commitment. They are
    available almost immediately, and you have full control how you target your reservation
    for critical workloads. However, `Reserved Instances`, because of their long-term
    commitment, are less expensive than `Capacity Reservations`. You can learn more
    about `Capacity Reservations` at [`https://learn.microsoft.com/azure/virtual-machines/capacity-reservation-overview`](https://learn.microsoft.com/azure/virtual-machines/capacity-reservation-overview).


    You might remember there was an option during the deployment example in the portal
    called a `dedicated host`. An `Azure Dedicated Host` allows you to reserve physical
    servers dedicated to you and your organization. While normal virtual machines
    are dedicated to your deployment, you are typically sharing the underlying hosts
    with other users. A dedicated host may give you the option you need for specific
    compliance requirements. In addition, you have more control over maintenance events
    of the infrastructure hosting your VM deployment. You can read more about dedicated
    hosts at [`https://learn.microsoft.com/azure/virtual-machines/dedicated-hosts`](https://learn.microsoft.com/azure/virtual-machines/dedicated-hosts).
    The largest virtual machine in this group is the `Standard_E104ids_v5` that offers
    104 vCores and 672 GiBs of memory. This virtual machine is notable because it’s
    isolated which means it’s guaranteed to be the only virtual machine running on
    the host and therefore is isolated from other customer workloads.


    ### Migration to Azure


    You might be considering migration of an existing SQL Server installation to Azure
    Virtual Machine. Here are the options that might help your migration plans.


    #### Azure Arc Migration Assessment


    I briefly mentioned in Chapter [1](#496204_2_En_1_Chapter.xhtml) the concept of
    Azure Arc to connect a SQL Server to the cloud. While I talk more about Azure
    Arc in Chapter [10](#496204_2_En_10_Chapter.xhtml) of the book, I’ll mention here
    there is an innovation (in preview at the time of the writing of this book) to
    help you assess your current SQL Server deployment to see if it is compatible
    to migration to the cloud, including what are the right deployment decisions and
    resource choices. Learn more about how to use this capability at [`https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment`](https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment).


    #### Restoring a Database


    Since SQL Server in Azure Virtual Machine is a full SQL Server engine, one simple
    way to migrate an existing SQL Server is to just restore a backup of existing
    databases.


    Since the target SQL Server is in the Azure infrastructure, you have a few ways
    to do this:


    *   Copy the backup file with “copy and paste” over RDP. RDP clients allow you
    to copy and paste files, and I have done this a bunch of times for Azure VM. Of
    course, this only makes sense for small backup files (although I have done this
    with backup files even 1GB in size).


    *   Back up the database to Azure Storage using the `backup to URL` functionality
    within SQL Server. Then in the Azure VM, restore the backup from the same Azure
    Storage account. You can read more about SQL Server backup to URL at [`https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`](https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url).


    *   Use `Azure Files`. Think of this like creating your own file share in the
    cloud. You can use `az` CLI or tools to copy your backup file to the Azure file
    share. Then you can mount the Azure file share within the Azure VM (i.e., it will
    look like a network share in the VM). Read more about how to do this at [`https://learn.microsoft.com/azure/storage/files/storage-files-introduction`](https://learn.microsoft.com/azure/storage/files/storage-files-introduction).
    I have used this method several times for both Azure VMs for Windows and Linux.


    *   For large backup files, consider the `Azure Import/Export service`. You literally
    will securely ship a hard drive to Microsoft (we can supply you the method with
    an Azure Data Box Disk), and we will import this to Azure Storage or Azure Files.
    You can read more about this at [`https://learn.microsoft.com/azure/import-export/storage-import-export-service`](https://learn.microsoft.com/azure/import-export/storage-import-export-service).


    #### Azure Migrate and Azure Database Migration Service


    Let’s say you wanted a more online migration experience to Azure Virtual Machine.
    You have that option using the `Azure Database Migration Service` (DMS). DMS is
    a managed service in Azure that orchestrates a migration to Azure SQL, including
    Azure Virtual Machine. One of the options for this migration is to do an online
    migration for SQL Server to Azure VM. DMS will use log shipping technology to
    take a series of continuous database full and transaction log backups and restore
    them to an already deployed SQL Server on Azure VM. See an example of how to use
    this service at [`https://learn.microsoft.com/data-migration/sql-server/virtual-machines/database-migration-service?tabs=online-with-extension`](https://learn.microsoft.com/data-migration/sql-server/virtual-machines/database-migration-service%253Ftabs%253Donline-with-extension).


    If you want to assess and migrate SQL Server ``at scale``, consider using `Azure
    Migrate`. `Azure Migrate` is an Azure service and set of client software agents
    to assess and migrate SQL Server running in virtual machines and bare-metal servers
    to Azure. `Azure Migrate` can coordinate with `Azure Database Migration Service`
    to help you perform offline and/or online migrations. Get started at [`https://learn.microsoft.com/azure/migrate/how-to-create-azure-sql-assessment`](https://learn.microsoft.com/azure/migrate/how-to-create-azure-sql-assessment).


    #### Using Azure Migrate Server Migration


    What if you would like to migrate the installation of an entire physical server
    or virtual machine to Azure instead of just your data? Azure supports this concept
    with a service called `Azure Migrate Server Migration`. This is a true `lift and
    shift` operation. Think of this like taking a snapshot of your machine or VM and
    creating an entire VM from the snapshot. Then you configure and optimize after
    the fact. You can read more about `Server Migration` at [`https://learn.microsoft.com/azure/migrate/migrate-services-overview#azure-migrate-server-migration-tool`](https://learn.microsoft.com/azure/migrate/migrate-services-overview%2523azure-migrate-server-migration-tool).
    A great example of how this works for VMware installation can be seen at [`https://aka.ms/mechanicsazuremigrate`](https://aka.ms/mechanicsazuremigrate)
    with legendary Windows guru Jeff Woolsey.'
