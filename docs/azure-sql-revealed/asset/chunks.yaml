    # 7. Azure SQL 的性能监控与调优


    您现在已经了解了如何保护 Azure SQL 部署的安全。另一个确保为您的应用程序提供最佳数据库的方面是了解如何扩展、配置、监控和调优性能。如果您熟悉 SQL
    Server，这里有个好消息：驱动 Azure SQL 的引擎与 SQL Server 的是同一个！这意味着 Azure SQL 几乎拥有您所需的任何性能功能。这也意味着您用于
    SQL Server 的许多相同任务和技能同样适用于 Azure SQL。在本章中，我们将探讨您通常用于监控和调优 SQL Server 性能的所有功能和任务，并与
    Azure SQL 进行比较。您还将学习一些 Azure 特有的功能和技术，以帮助您获得最佳性能。


    本章将包含一些示例，供您在阅读时尝试和使用。要尝试本章中使用的任何技术、命令或示例，您需要：


    *   一个 `Azure 订阅`。

    *   对 `Azure 订阅` 拥有至少 `参与者` 角色访问权限。您可以在 [`https://learn.microsoft.com/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles)
    阅读更多关于 Azure 内置角色的信息。

    *   访问 `Azure 门户`。

    *   一个 `Azure SQL 托管实例` 和/或 `Azure SQL 数据库` 的部署，如我在第 4 章中所做。我部署的 `Azure SQL 数据库`
    使用了 `AdventureWorks` 示例数据库，这在部分示例中将会用到。

    *   要连接到 `托管实例`，您需要一个 `Azure` 中的 `跳板机` 或虚拟机。我在本书第 4 章中展示了如何操作。一个简单的方法是创建一个新的 `Azure
    虚拟机`，并将其部署到与 `托管实例` 相同的虚拟网络中（您将使用与 `托管实例` 不同的子网）。

    *   要连接到 `Azure SQL 数据库`，我将使用我在第 3 章部署的名为 `bwsql2022` 的 `Azure 虚拟机`，该虚拟机在第 6 章中配置了专用终结点（只要您能连接到
    `Azure SQL 数据库`，也可以使用其他方法）。

    *   安装 `az` CLI（更多详情请参见 [`https://learn.microsoft.com/cli/azure/install-azure-cli`](https://learn.microsoft.com/cli/azure/install-azure-cli)）。您也可以使用
    `Azure Cloud Shell` 代替，因为 `az` 已预装其中。您可以在 [`https://azure.microsoft.com/features/cloud-shell/`](https://azure.microsoft.com/features/cloud-shell/)
    阅读更多关于 `Azure Cloud Shell` 的信息。

    *   本章将运行一些 `T-SQL`，因此请安装一个工具，如 `SQL Server Management Studio` (`SSMS`)，下载地址为
    [`https://aka.ms/ssms`](https://aka.ms/ssms)。我在第 3 章部署的 `bwsql2022` `Azure 虚拟机`
    中安装了 `SSMS`。

    *   本章提供了脚本文件，您可以在本书源文件的 `ch7_performance` 文件夹中找到这些脚本。本章练习中，我还将使用非常流行的工具 `ostress.exe`，它包含在
    `Replay Markup Language` (`RML`) Utilities 中。您可以从 [`https://aka.ms/ostress`](https://aka.ms/ostress)
    下载 `RML`。请确保将 `RML` 的安装文件夹添加到系统路径中（默认为 `C:\Program Files\Microsoft Corporation\RMLUtils`）。


    > **提示**

    >

    > 自本书第一版以来，我制作了一些新的性能故障排除视频和示例实验室，专门针对 `Azure SQL 数据库`。您可以在 [`https://aka.ms/performanceseries`](https://aka.ms/performanceseries)
    找到视频，在 [`https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting`](https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting)
    找到示例实验室。我认为这些资源是本章示例（包含更多性能场景）的一个很好的补充。


    ## 性能功能


    由于驱动 `Azure SQL` 的引擎与 `SQL Server` 相同，因此几乎所有性能功能都可供您使用。话虽如此，了解一些重要领域（包括相似点和不同点）至关重要，因为这些领域会影响您为
    `Azure SQL` 部署确保最大性能的能力。这些领域包括最大容量、索引、`内存中 OLTP`、分区、`SQL Server 2022` 性能增强以及新的
    `Azure SQL` 智能性能功能。

    '
- fmt: '### Max Capacities


    When you choose a platform to install SQL Server, you typically `size` the resources
    you need. In many cases, you plot out the maximum capacities you will need for
    resources such as CPU, memory, and disk space. You may also ensure you have the
    correct performance capabilities for I/O with regard to IOPS and latency.


    In Chapters [4](#496204_2_En_4_Chapter.xhtml) and [5](#496204_2_En_5_Chapter.xhtml)
    of the book, I showed you all the options to choose, deploy, and configure your
    Azure SQL Managed Instance and Azure SQL Database deployments. To ensure you have
    the best performance, you need to keep these capacities in mind with Azure SQL:


    *   Azure SQL Managed Instance can support up to 128 vCores, ~870GB of memory,
    and a maximum storage of 32TB, depending on your service tier and hardware configuration
    choice.

    *   Azure SQL Database can support up to 128 vCores, 830GB memory, and a 4TB database
    depending on your service tier and hardware configuration choice. The Hyperscale
    deployment option for Azure SQL Database can support up to 100TB database and
    unlimited transaction log space.

    *   Your decision on deployment options such as number of vCores affects other
    resource capacities whether it be a Managed Instance or Database deployment. For
    example, the number of vCores for a General Purpose Azure SQL Database affects
    the maximum memory, maximum database size, maximum transaction log size, and maximum
    log rate, among others.


    Let us stop here to help you get oriented. How can you see a chart or table to
    figure out the limits for all these choices?


    For a Managed Instance, start with this documentation page which shows differences
    for hardware configurations: [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#hardware-configuration-characteristics`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#hardware-configuration-characteristics).
    Then continue to scroll down this page to see other limits such as vCores, memory,
    storage, and others organized by service tier.


    What about Azure SQL Database? You can view a table for capacities and limits
    based on vCores at [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-vcore-single-databases`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-vcore-single-databases).
    You will see there are some differences if you choose a Serverless compute tier.
    Bookmark these documentation links. I use them all the time.


    Keep in mind that some limits like memory are enforced by Windows Job Objects.
    I mentioned this implementation in Chapter [4](#496204_2_En_4_Chapter.xhtml) of
    the book. Use the DMV `sys.dm_os_job_object` to see the true limits for memory
    and other resources for your deployment.


    Tip: Once you deploy, you get to see your resource limits with DMVs like `sys.dm_user_db_resource_governance`.


    What if you make the wrong choice and need more capacity? The good news is that
    you can make changes for Azure SQL Managed Instance and Database to get more (or
    less) without any database migration required. You will see an example of this
    later in this chapter. Just remember that a change for Managed Instance can take
    a significant amount of time.


    In addition, for Azure SQL Database, you can switch back and forth between General
    Purpose and Business Critical service tiers (note that there could be some time
    required to do this for database seeding). If you move from General Purpose to
    Hyperscale, you can move back one time. However, if you start with Hyperscale,
    you cannot move back to General Purpose (and can never move to Business Critical).


    ### Indexes


    Anyone who works with SQL Server knows that without proper indexes, it is difficult
    to obtain the query performance you need.


    Every type of index option you can use in SQL Server is available to you with
    Azure SQL, including clustered, non-clustered, online, and resumable indexes.
    You can read an index primer at [`https://learn.microsoft.com/sql/relational-databases/indexes/clustered-and-nonclustered-indexes-described`](https://learn.microsoft.com/sql/relational-databases/indexes/clustered-and-nonclustered-indexes-described)
    and details on online indexes at [`https://learn.microsoft.com/sql/relational-databases/indexes/perform-index-operations-online`](https://learn.microsoft.com/sql/relational-databases/indexes/perform-index-operations-online)
    and resumable online indexes at [`https://learn.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations?view=sql-server-ver16#resumable-index-considerations`](https://learn.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations?view=sql-server-ver16#resumable-index-considerations).
    Resumable online indexes are very compelling since you can pause and resume large
    index builds and even continue an index build or rebuild at the point where it
    failed.


    `Columnstore indexes` are nothing short of amazing. I continue to see customers
    who just do not take advantage of this capability. Columnstore index can accelerate
    read query performance by 100x for the right workload. Columnstore indexes are
    supported in every deployment option you choose with Azure SQL. One myth about
    columnstore is that it is an in-memory technology. The truth is that columnstore
    indexes perform best when they fit in memory and use compression, so more will
    fit in your memory limits. However, a columnstore index does not have to all fit
    in memory. To get a start on columnstore indexes, see the documentation at [`https://learn.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview`](https://learn.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview).


    ### In-Memory OLTP


    In SQL Server 2014 (and greatly enhanced in SQL Server 2016), we introduced a
    revolutionary capability for high-speed transactions called In-Memory OLTP (codename
    Hekaton). In-Memory OLTP is available for Azure SQL Managed Instance and Databases
    if you choose the Business Critical service tier.


    Memory-optimized tables are the mechanism to use In-Memory OLTP. Memory-optimized
    tables are truly in-memory as they must completely fit in memory. The memory available
    for storing memory-optimized tables is a subset of the memory limits of your Business
    Critical service tier. The number of vCores for your deployment determines what
    percentage of memory is available for memory-optimized tables. Hyperscale supports
    a subset of In-Memory OLTP objects, including memory-optimized table types, table
    variables, and natively compiled modules but not memory-optimized tables.


    Note: Memory-optimized tables require a memory-optimized filegroup. Azure SQL
    creates this filegroup for any databases even if it is not a Business Critical
    (BC) service tier. This way, if you move to BC, the filegroup is set up for memory-optimized
    tables.


    New to In-Memory OLTP? Start with our documentation at [`https://learn.microsoft.com/sql/relational-databases/in-memory-oltp/overview-and-usage-scenarios`](https://learn.microsoft.com/sql/relational-databases/in-memory-oltp/overview-and-usage-scenarios).'
