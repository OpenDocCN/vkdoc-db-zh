- fmt: '## Monitoring Availability


    As with any set of capabilities, you will no doubt want to monitor various aspects
    of availability for Azure SQL. This includes server and instance availability,
    database availability, backup/restore history, status of replicas, and failover
    reasons. In addition, since Azure SQL runs in the Azure ecosystem, knowing the
    status and health of Azure services in regions and data centers can also be important.


    Azure SQL provides you similar interfaces to SQL Server to monitor availability,
    including catalog views, Dynamic Management Views (DMV), and Extended Events (XEvent).
    In addition, Azure interfaces such as the Azure portal, `az` CLI, PowerShell,
    Database Watcher, and Copilot provide additional capabilities to monitor the availability
    of your deployment.


    Let’s dive into a few examples of using these interfaces and monitoring capabilities.


    ### Instance, Server, and Database Availability


    Aside from Azure service impacting events, you can view the availability of your
    Azure SQL Managed Instance or Azure SQL Databases through the Azure portal. One
    of the primary methods to view a possible reason for a Managed Instance or Database
    to not be available is by examining `Resource Health` through the Azure portal.
    You will see an example of this scenario later in this major section of the chapter.


    You can always use standard SQL Server tools such as SQL Server Management Studio
    to connect to a Managed Instance or Database server and check the status of these
    resources through the tool or T-SQL queries.


    In addition, interfaces such as the `az` CLI can show the status of Azure SQL
    such as


    *   `az sql mi list` – List the status of managed instances

    *   `az sql db list` – List the status of Azure SQL Databases


    PowerShell commands can also be used to find out the availability of an Azure
    SQL Database such as


    *   `Get-AzSQLDatabase` – Get all the databases on a server and their details,
    including status


    **Note**


    For a SQL Server, I often look at past `ERRORLOG` files or the `system_health`
    XEvent session files for service availability and health. Azure SQL Managed Instance
    supports these tools. However, these files are not copied to replicas, so if a
    failover occurs, the history of these files are lost.


    ### Backup and Restore History


    Azure SQL automatically backs up databases and transaction logs. For SQL Server,
    it is very common to use the `msdb` system tables to look at backup history. You
    can also do this in Azure SQL Managed Instance with a query like the following:


    ```sql

    SELECT database_name, case when type = ''D'' then ''Full'' when type = ''I'' then
    ''Differential'' when type = ''L'' then ''Log'' end as type,

    has_backup_checksums, backup_size, compressed_backup_size, backup_start_date,
    backup_finish_date

    FROM msdb.dbo.backupset

    ORDER BY backup_finish_date DESC;

    GO

    ```


    I’ve been running my instance for a while, so I scrolled down to see the older
    results, which looked like the one in Figure [8-26](#496204_2_En_8_Chapter.xhtml#Fig26).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig26_HTML.jpg)


    Figure 8-26


    Older results for automated backups for managed instance


    These results show a user database I’ve created, but it will show any user database
    that has been created for the instance (it doesn’t show system database backups).
    Notice the first result is a full backup and then a series of log backups. Scrolling
    the top of the results, you can see other types of backups as in Figure [8-27](#496204_2_En_8_Chapter.xhtml#Fig27).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig27_HTML.jpg)


    Figure 8-27


    Recent results for automated backups for Managed Instance


    Long-term backup retention history can be viewed through the Azure portal or CLI
    interfaces. Learn more at [`https://learn.microsoft.com/azure/azure-sql/database/long-term-backup-retention-configure`](https://learn.microsoft.com/azure/azure-sql/database/long-term-backup-retention-configure).


    Additionally, Azure SQL Managed Instance supports using XEvents to track backup
    history. See a blog post describing how to do this at [`https://techcommunity.microsoft.com/t5/azure-database-support-blog/lesson-learned-128-how-to-track-the-automated-backup-for-an/ba-p/1442355`](https://techcommunity.microsoft.com/t5/azure-database-support-blog/lesson-learned-128-how-to-track-the-automated-backup-for-an/ba-p/1442355).


    Any restore of a database using point-in-time restore results in the creation
    of a new database, so the history of restore can be viewed as looking at the creation
    of a new database. All operations to create a new database can be viewed through
    Azure Activity Logs.


    `msdb` backup history is not available for Azure SQL Database, but a DMV is available
    called `sys.dm_database_backups`. I ran this query against one of my Azure SQL
    Databases (backup size details are not available):


    ```sql

    SELECT logical_database_name, case when backup_type = ''D'' then ''Full'' when
    backup_type = ''I'' then ''Differential'' when backup_type = ''L'' then ''Log''
    end as backup_type_desc, backup_start_date, backup_finish_date, in_retention

    FROM sys.dm_database_backups

    ORDER BY backup_finish_date DESC;

    GO

    ```


    For my Business Critical service tier database, the older results looked like
    Figure [8-28](#496204_2_En_8_Chapter.xhtml#Fig28).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig28_HTML.jpg)


    Figure 8-28


    Older results for automated backups from Azure SQL Database


    Backups retained and shown in the backup history view depend on configured backup
    retention. Backups older than the retention period (`in_retention = 0`) are also
    shown in the `sys.dm_database_backups` view. They’re needed to do point-in-time
    restore within the configured retention.


    Scrolling up, I can see the latest results like in Figure [8-29](#496204_2_En_8_Chapter.xhtml#Fig29)
    which include log and differential backups.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig29_HTML.jpg)


    Figure 8-29


    Top results for automated backups for Azure SQL Database


    **Tip**


    Our new `Copilot` can also be used to find information about backups with a prompt
    like "`When was the most recent backup of my database created?`"'
  raw: '## Monitoring Availability


