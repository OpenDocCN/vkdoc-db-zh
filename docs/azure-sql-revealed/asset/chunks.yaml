    当你在 Windows 和 Linux 上部署和管理 SQL Server 时，操作系统提供了多种不同的方法来审计 SQL Server 外部的活动。你的数据中心内可能还有其他方法来审计此类活动。


    Azure 生态系统提供了相同类型的审计能力。你可能在第 4 章中看到过，在部署 Azure SQL 托管实例和数据库后，针对此类活动的 **活动日志**。可以将其视为审计
    Azure RBAC 的一种方式。


    活动日志是 Azure 生态系统为所有订阅提供的平台日志。实际上，活动日志是 Azure 订阅所有事件的记录，包括针对 Azure SQL 托管实例和数据库的特定事件。基本上，任何在
    SQL Server 外部针对 Azure SQL 资源执行的操作都会记录在活动日志中。我使用 Windows 事件日志多年，我喜欢将活动日志视为 Azure
    的事件日志。


    Azure 门户提供了一种绝佳的方式来查看特定 Azure 资源的活动日志条目。例如，如果我在 Azure 门户中导航到我的逻辑服务器 `bwsqllogicalserver`，然后从资源菜单中选择“活动日志”，并将时间范围更改为一周，我会看到类似图
    6-17 中的条目。


    ![](img/496204_2_En_6_Fig17_HTML.jpg)


    图 6-17 Azure SQL Database 逻辑服务器的活动日志


    你可以看到一些日志条目显示了更新防火墙规则或设置专用端点等活动。


    默认情况下，Azure 活动日志条目会保留 90 天（之后会滚动更新）。如果你想将活动日志条目保留更长时间，可以创建一个 Log Analytics 工作区。Log
    Analytics 工作区还为你提供了更强大的查询和可视化活动日志条目的能力。在此屏幕上，顶部有一个“诊断设置”选项。这允许你创建一个 Log Analytics
    工作区并将活动日志条目添加到其中。你还可以选择将活动日志条目发送到 Event Hub 进行流式传输。要详细了解活动日志的一般用法，请访问 [`https://learn.microsoft.com/azure/azure-monitor/essentials/activity-log`](https://learn.microsoft.com/azure/azure-monitor/essentials/activity-log)。


    ### 审计 Azure SQL 托管实例


    由于 Azure SQL 托管实例非常类似于完整的 SQL Server 实例，许多熟悉的审计工具和功能都可供你使用。


    #### 跟踪登录


    据我所知，几乎每个 SQL Server 版本都会在 SQL Server 的 `ERRORLOG` 中跟踪失败的登录。托管实例的 `ERRORLOG` 中，失败的登录如下所示：

    ```

    Error: 18456, Severity: 14, State: 7.

    Login failed for user ''sa''. Reason: An error occurred while evaluating the password.
    [CLIENT: 10.1.0.4]

    ```

    SQL Server 提供了关闭此跟踪或同时跟踪成功登录的能力。此功能不适用于托管实例（即使 SSMS 给你一种它允许的印象），因为它需要重启 SQL Server，而你没有权限执行此操作。


    由于 Azure SQL 托管实例为你提供了对 Extended Events 的完全访问权限，你可以使用以下事件来跟踪登录：`process_login_finish`、`login_event`
    和 `login`。Azure SQL 托管实例的 Extended Events 支持所有事件、操作和目标。文件目标必须使用 Azure Blob 存储，因为你无权访问底层操作系统文件系统。

    '
- fmt: '## SQL Server Audit


    SQL Server Audit 是一项在多个 SQL Server 版本中存在的功能，用于审核和跟踪实例及数据库活动。Azure SQL Managed
    Instance 完全支持 SQL Server Audit，但有几个例外：


    *   审核文件存储在 Azure Blob Storage 中。请阅读以下链接了解如何操作：`https://learn.microsoft.com/azure/azure-sql/managed-instance/auditing-configure?view=azuresql#set-up-auditing-for-your-server-to-azure-storage`。

    *   不支持在审核失败时关闭 SQL Server 的选项（但支持“继续”和“失败”选项）。


    如果您从未使用过 SQL Server Audit，请查阅以下文档：`https://learn.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine`。


    SQL Server Audit 生成文件以基于扩展事件格式跟踪活动（SQL Server Audit 在底层使用扩展事件会话）。Azure SQL Managed
    Instance 还允许您将审核事件生成到 Azure Monitor Logs 和 Event Hub。`TO EXTERNAL MONITOR` 选项已添加到
    `CREATE SERVER AUDIT` T-SQL 语句中。


    请参阅以下示例，了解如何配置 SQL Server Audit 以将数据发送到 Azure 日志或 Event Hub：`https://learn.microsoft.com/azure/azure-sql/managed-instance/auditing-configure?view=azuresql#set-up-auditing-for-your-server-to-event-hubs-or-azure-monitor-logs`。


    ### 审核 Azure SQL Database


    Azure SQL Database 的审核活动通过动态管理视图 (DMVs) 中的指标和 Azure Metrics 提供。此外，SQL Server Audit
    功能以 **SQL 数据库审核** 的形式提供。


    #### 跟踪连接


    Azure SQL Database 提供了一个名为 `sys.event_log` 的 DMV，可以在逻辑服务器的逻辑主数据库的上下文中查询。此 DMV
    以五分钟的聚合时间间隔显示连接指标的信息。此 DMV 不跟踪单个成功或失败的连接，而是跟踪逻辑服务器所有数据库（包括逻辑主数据库）的连接指标。此 DMV 在
    Azure SQL Managed Instance 中不支持。


    您可以查看此 DMV 的示例包括：


    *   成功连接数

    *   由于登录名无效导致的失败连接数

    *   由于防火墙规则阻止导致的失败连接数


    虽然此信息存储在所有数据库中，但您可以使用 Azure Metrics 和 Logs 来捕获失败连接、被防火墙规则阻止的连接以及成功连接的聚合数字。


    图 6-18 显示了我如何为其中一个 Azure SQL Database 添加成功连接数。


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig18_HTML.jpg)


    图 6-18 使用 Azure Metrics 跟踪成功连接


    #### SQL 数据库审核


    由于您无法访问 Azure SQL Database 底层的 SQL Server 实例，因此无法使用 T-SQL 语句 `CREATE SERVER AUDIT`
    来使用 SQL Server Audit 功能。


    因此，我们在 Azure SQL Database *外部* 创建了接口来审核数据库和逻辑服务器活动。我们称之为 **SQL 数据库审核**。请阅读完整文档：`https://learn.microsoft.com/azure/azure-sql/database/auditing-overview`。SQL
    数据库审核可以通过 Azure 门户、PowerShell（`Set-AzSqlDatabaseAudit` 和 `Set-AzSqlServerAudit`）以及
    az CLI（`az sql db audit-policy`）启用。


    您可以将 SQL 数据库审核定向到 Azure 存储帐户、Log Analytics 工作区或用于流式传输的 Event Hub。


    让我们看一个为逻辑服务器创建审核并将审核定向到存储帐户 **和** Log Analytics 工作区的示例（并解释为什么您可能希望使用其中一个或两者）。审核逻辑服务器将审核所有数据库的所有活动。


    注意

    您也可以为每个数据库创建单独的审核，但当您审核逻辑服务器时，所有数据库的所有活动也会进入该审核。


    我首先按照以下步骤创建了一个新的 Log Analytics 工作区：`https://learn.microsoft.com/azure/azure-monitor/logs/quick-create-workspace`。我将其命名为
    `bwsqldbloganalytics`。


    我通过导航到我的逻辑服务器 `bwsqllogicalserver` 开始了这个过程，从服务菜单中选择了“审核”，并看到了如图 6-19 所示的顶部屏幕。


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig19_HTML.jpg)


    图 6-19 配置 Azure SQL Database 审核的第一部分


    我选择了“启用审核”选项，然后选择了“新建”以创建一个新的 Azure 存储帐户来存储审核数据。我还选择了“托管标识”用于身份验证，以创建对审核存储更安全的访问。


    向下滚动，我有更多选项可以选择，如图 6-20 所示。


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig20_HTML.jpg)


    图 6-20 配置 Azure SQL 数据库 SQL 审核的第二部分


    我添加了之前创建的 Log Analytics 工作区。此外，我还配置了一个选项，将 Microsoft 支持操作审核到同一个 Log Analytics
    工作区（它可以是不同的工作区，甚至是不同的 Azure 存储）。此选项真正显示了 Microsoft 对透明度的重视程度。这意味着如果您因任何问题联系 Microsoft
    支持，您可以审核他们对您的部署采取的任何操作。您可以在以下链接中阅读有关此选项的更多信息：`https://learn.microsoft.com/azure/azure-sql/database/auditing-microsoft-support-operations`。我点击了
    **保存** 来持久化我的选择。


    注意

    我还可以选择在数据库级别启用审核。如果我为逻辑服务器启用了审核，则所有数据库都启用了审核。


    SQL Server Audit 有一个称为操作组的概念，用于定义要审核的活动。SQL 数据库审核默认启用以下操作组：


    *   `BATCH_COMPLETED_GROUP` – 审核所有成功的 SQL 语句

    *   `SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP` – 审核成功的数据库登录

    *   `FAILED_DATABASE_AUTHENTICATION_GROUP` – 审核失败的数据库连接'
  raw: '#### SQL Server Audit


    SQL Server Audit is a capability that has been in SQL Server in several releases
    to audit and track instance and database activity. SQL Server Audit is fully supported
    with Azure SQL Managed Instance with a few exceptions:


    *   Audit files are stored in Azure Blob Storage. Read more about how to do this
    at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/auditing-configure?view=azuresql#set-up-auditing-for-your-server-to-azure-storage`](https://learn.microsoft.com/azure/azure-sql/managed-instance/auditing-configure?view=azuresql#set-up-auditing-for-your-server-to-azure-storage).


    *   The option to shut down SQL Server on an audit failure is not supported (but
    continue and fail options are supported).


    If you have never used SQL Server Audit, look through the documentation at [`https://learn.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine`](https://learn.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine).


    SQL Server Audit produces files to track activity based on the Extended Event
    format (SQL Server Audit uses Extended Event sessions behind the scenes). Azure
    SQL Managed Instance also allows you to produce audit events to Azure Monitor
    Logs and Event Hub. The option TO EXTERNAL MONITOR has been added to the CREATE
    SERVER AUDIT T-SQL statement.


    See an example of how to configure SQL Server Audit to Azure logs or Event Hub
    at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/auditing-configure?view=azuresql#set-up-auditing-for-your-server-to-event-hubs-or-azure-monitor-logs`](https://learn.microsoft.com/azure/azure-sql/managed-instance/auditing-configure?view=azuresql#set-up-auditing-for-your-server-to-event-hubs-or-azure-monitor-logs).


    ### Auditing Azure SQL Database


    Auditing activity for Azure SQL Database is provided through metrics in Dynamic
    Management Views (DMVs) and Azure Metrics. In addition, the SQL Server Audit capability
    is exposed as a feature called **SQL Database auditing**.


    #### Tracking Connections


    Azure SQL Database provides a DMV called **sys.event_log** that can be queried
    *in the context of the logical master database* of the logical server. This DMV
    shows information collected in five-minute aggregate intervals for connectivity
    metrics. This DMV doesn’t track individual successful or failed connection but
    rather connectivity metrics across all databases (including the logical master)
    for the logical server. This DMV is not supported in Azure SQL Managed Instance.


    Examples of what you can view for this DMV include


    *   Number of successful connections


    *   Number of failed connections due to invalid login name


    *   Number of failed connections due to blocked firewall rule


    While this information is stored across all databases, you can use Azure Metrics
    and Logs to capture aggregate numbers for failed connections, connections blocked
    by firewall rules, and successful connections.


    Figure [6-18](#496204_2_En_6_Chapter.xhtml#Fig18) shows how I’ve added the number
    of successful connections for one of my Azure SQL Databases.


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig18_HTML.jpg)


    Figure 6-18


    Tracking successful connections with Azure Metrics


    #### SQL Database Auditing


    Since you don’t have access to the underlying SQL Server instance for an Azure
    SQL Database, you don’t have access to use the T-SQL statement CREATE SERVER AUDIT
    to use SQL Server Audit capabilities.


    Therefore, we have created interfaces *outside* of Azure SQL Database to audit
    database and logical server activities. We call this **SQL Database auditing**.
    Read the complete documentation at [`https://learn.microsoft.com/azure/azure-sql/database/auditing-overview`](https://learn.microsoft.com/azure/azure-sql/database/auditing-overview).
    SQL Database Auditing can be enabled through the Azure portal, PowerShell (**Set-AzSqlDatabaseAudit**
    and **Set-AzSqlServerAudit**), and az CLI (**az sql db audit-policy**).


    You can direct SQL Database auditing to an Azure Storage account, a Log Analytics
    workspace, or Event Hub for streaming.


    Let’s look at an example of creating an audit for the logical server and direct
    the audit to a Storage Account **and** Log Analytics workspace (and explain why
    you might want to use one vs. the other or both). Auditing the logical server
    will audit all activities for all databases.


    Note


    You could also create a separate audit specific to each database, but when you
    audit a logical server, all activities for all databases go into that audit as
    well.


    I first created a new Log Analytics workspace per the steps you can do at [`https://learn.microsoft.com/azure/azure-monitor/logs/quick-create-workspace`](https://learn.microsoft.com/azure/azure-monitor/logs/quick-create-workspace).
    I called this **bwsqldbloganalytics**.


    I started the process by navigating to my logical server **bwsqllogicalserver**,
    selected Auditing from the Service Menu, and was presented with the top of the
    screen like in Figure [6-19](#496204_2_En_6_Chapter.xhtml#Fig19).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig19_HTML.jpg)


    Figure 6-19


    First part of configuring auditing for Azure SQL Database


    I selected the option to Enable auditing and then selected Create new to create
    a new Azure Storage account to store for auditing. I also chose Managed Identity
    to use for authentication to create a more secure access to audit storage.


    Scrolling down, I have more options to choose as you can see in Figure [6-20](#496204_2_En_6_Chapter.xhtml#Fig20).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig20_HTML.jpg)


    Figure 6-20


    Second part of configuring SQL Audit for Azure SQL Database


    I’ve added the Log Analytics workspace I created earlier. In addition, I’ve configured
    an option to audit Microsoft support operations to the same Log Analytics workspace
    (it can be a different workspace or even different Azure Storage). This option
    really shows how serious Microsoft is about transparency. This means you can audit
    any action taken by Microsoft support against your deployment if you should contact
    them for any issue. You can read more about this option at [`https://learn.microsoft.com/azure/azure-sql/database/auditing-microsoft-support-operations`](https://learn.microsoft.com/azure/azure-sql/database/auditing-microsoft-support-operations).
    I clicked **Save** to persist my choices.


    Note


    I also have the choice to enable auditing at the database level. If I enable auditing
    for a logical server, all databases have auditing enabled.


    SQL Server Audit has a concept called an action group which defines what activities
    are audited. SQL Database auditing has by default the following action groups
    enabled:


    *   BATCH_COMPLETED_GROUP – Audit all successful SQL statements


    *   SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP – Audit a successful login to a database


    *   FAILED_DATABASE_AUTHENTICATION_GROUP – Audit a failed connection to a database'
