    run out of disk space on the filesystem hosting your database. For a Managed Instance,
    you can also encounter Msg 1105 if you have run out of space on the maximum size
    of your database. However, since we enforce maximum storage limits for all databases,
    you may also encounter an error before you run out of space in your database like
    this:


    ```

    Msg 1133

    The managed instance has reached its storage limit. The storage usage for the
    managed instance cannot exceed (%d) MBs.

    ```


    To be clear what this means, it is possible for you to hit this error before hitting
    the maximum size of an individual database because collectively you have hit the
    limit for all databases (including system databases).


    ### Azure SQL Database Space Management


    Azure SQL Database manages space differently than Managed Instance. The maximum
    size as specified during deployment is the *possible* maximum size of a single
    database file.


    If you deploy an Azure SQL Database, the maximum size is typically reflected in
    the **max_size** column of **sys.database_files** for a single data file. However,
    for larger maximum database size values (e.g., 1TB), we may not set the max_size
    to that value but grow as data is added to the eventual max_size.


    If you run out of space in the database, you will get a quota error instead of
    the traditional 1105 error like this:


    ```

    Msg 40544, Level 17, State 2, Line 12

    The database '''' has reached its size quota. Partition or delete data, drop indexes,
    or consult the documentation for possible resolutions.

    ```


    The transaction log is handled differently. While you configure the maximum data
    storage size, we automatically add 30% above this size for the transaction log.
    Note that we can in some cases increase this number, but you will never be charged
    for more than the 30% additional space for the log. Do not use the max_size in
    sys.database_files for the maximum size of the transaction log. It does not accurately
    reflect the quota. In all my testing, I never ran out of transaction log space
    due to two factors:


    *   We regularly and often back up the transaction log (remember we use full recovery).


    *   We have Accelerated Database Recovery (ADR) enabled by default, and you cannot
    disable it. With ADR, the log can be truncated even in the presence of active
    transactions.


    The one exception to space management for Azure SQL Database is the Hyperscale
    service tier. A Hyperscale database has a 100TB limit, but theoretically we believe
    it could be unlimited. When you deploy a Hyperscale database, we create multiple
    database files that total around 40GB. Then as you add data, we automatically
    grow the database. The transaction log has a limit of 1TB, but we back up the
    log regularly and rely also on ADR, so I do not think you will run out of space.


    ## Loading Data


    Whether you deployed a new Managed Instance or Database or migrated from an existing
    instance or database, you inevitably will want to load data. Just like a SQL Server
    installation, you have several tools and options to load data. In addition, you
    have new services available to you in Azure.'
  trans: '

    ### “混合模式”安全


    Azure SQL 托管实例和数据库都支持与 SQL Server 中“混合模式”安全类似的概念。你可以将实例或数据库的身份验证设置为：


    *   仅限 Microsoft Entra 身份验证

    *   同时支持 SQL 和 Microsoft Entra 身份验证

    *   仅限 SQL 身份验证


    关于这些选项的几点说明：


    *   如果你已经允许 SQL 身份验证，然后更改为仅限 Microsoft Entra 身份验证，现有的 SQL 登录名不会被删除，只是会被禁用。

    *   Azure SQL 托管实例确实支持 Windows 身份验证，以帮助提高应用程序兼容性。


    ### 登录审核


    多年来，SQL Server 引擎一直支持跟踪成功、失败或两者（或均不跟踪）的登录尝试。此跟踪信息会写入 ERRORLOG，通常通过 SSMS 进行配置。对于托管实例，虽然存在配置此登录跟踪的选项，但它们不会生效，因为它需要重启
    SQL Server。默认情况下，失败的登录会被跟踪并记录在 ERRORLOG 中。


    你可以使用扩展事件或 Azure SQL 的 SQL 审核功能自行审核登录情况。我将在本书第 6 章中向你详细介绍 Azure SQL 的审核功能。


    ### 服务器代理帐户


    SSMS 支持为系统存储过程 `xp_cmdshell` 配置服务器代理帐户。此配置对于托管实例不受支持，因为 `xp_cmdshell` 在 Azure
    SQL 托管实例或数据库中不受支持。


    ### 数据库限制


    与 SQL Server 类似，许多通过 `ALTER DATABASE` 配置数据库的常用选项在托管实例上是允许的。一个显著的例外是，你无法禁用 `ACCELERATE_DATABASE_RECOVERY`（加速数据库恢复）。这是因为我们依赖
    ADR 技术来确保兑现所承诺的可用性 SLA。


    ### Azure SQL 数据库限制


    上一节列出的托管实例的所有限制同样适用于 Azure SQL 数据库。


    其他一些值得注意的限制你可能已经猜到，因为 Azure SQL Database 并未暴露完整的 SQL Server 实例：


    *   `sp_configure` 不受支持。

    *   `DBCC TRACEON` 不受支持。事实上，如果你运行此命令，它会因 Msg 2571（即无权限）而失败。

    *   你可以使用 `DBCC TRACESTATUS` 查看我们启用了哪些跟踪标志，即使你无法开启或关闭它们（启用的标志列表与托管实例基本相同）。


    `ACCELERATED_DATABASE_RECOVERY` 默认也是启用的，并且无法禁用。查询存储的情况也类似，但你可以禁用查询存储写入数据，使其变为只读。


    ## Azure SQL 空间管理


    另一个与 Azure SQL 配置相关的话题是空间管理。虽然我们为 Azure SQL 托管实例和数据库都抽象了数据库和事务日志文件的物理放置位置，但*大小*仍然是你必须管理和考虑的一个因素。由于
    Azure SQL 托管实例和数据库提供不同的部署覆盖范围，空间管理在这两种选项之间可能有所不同。


    ### Azure SQL 托管实例空间管理


    正如我在第 4 章关于部署的描述中所说，托管实例的数据最大大小是所有数据库存储的总大小。你对 vCore 的选择以及“业务关键型”等选项会影响实例的最大存储大小。


    在 SQL Server 中，当数据库文件大小达到限制时，你可能会遇到 Msg 1105，表明空间已用尽。如果你托管数据库的文件系统磁盘空间用尽，也可能发生此错误。对于托管实例，如果你的数据库大小达到了其最大值限制，也可能会遇到
    Msg 1105。然而，由于我们对所有数据库强制执行最大存储限制，你也可能在数据库空间用尽之前遇到类似以下的错误：


    ```

    Msg 1133

    托管实例已达到其存储限制。托管实例的存储使用量不能超过 (%d) MB。

    ```


    需要明确的是，这种情况意味着，在达到单个数据库的最大大小之前，你就可能遇到此错误，因为所有数据库（包括系统数据库）的总量已达到限制。


    ### Azure SQL 数据库空间管理


    Azure SQL 数据库管理空间的方式与托管实例不同。部署时指定的最大大小是单个数据库文件的*可能*最大大小。


    如果你部署一个 Azure SQL 数据库，最大大小通常反映在单个数据文件的 `sys.database_files` 表的 `max_size` 列中。但是，对于较大的最大数据库大小值（例如
    1TB），我们可能不会将 `max_size` 设置为该值，而是随着数据添加逐渐增长到最终的 `max_size`。


    如果你的数据库空间用尽，你将获得配额错误，而不是传统的 1105 错误，如下所示：


    ```

    Msg 40544, Level 17, State 2, Line 12

    数据库 '''' 已达到其大小配额。请分区或删除数据、删除索引，或查阅文档以获取可能的解决方案。

    ```


    事务日志的处理方式不同。虽然你配置了最大数据存储大小，但我们自动为此大小额外增加 30% 用于事务日志。请注意，在某些情况下我们可以增加这个数字，但你永远不会被收取超过日志
    30% 额外空间的费用。不要使用 `sys.database_files` 中的 `max_size` 作为事务日志的最大大小。它不能准确反映配额。在我所有的测试中，我从未用完事务日志空间，原因有二：


    *   我们定期且频繁地备份事务日志（记住我们使用完整恢复模式）。

    *   我们默认启用了加速数据库恢复 (ADR)，并且你无法禁用它。借助 ADR，即使存在活动事务，日志也可以被截断。


    Azure SQL 数据库空间管理的一个例外是超大规模服务层级。超大规模数据库有 100TB 的限制，但从理论上讲，我们认为它可以是无限的。当你部署超大规模数据库时，我们会创建多个总大小约为
    40GB 的数据库文件。然后，随着你添加数据，我们会自动增长数据库。事务日志的限制是 1TB，但我们定期备份日志并且也依赖 ADR，因此我认为你不会用完空间。


    ## 加载数据


    无论你是部署了新的托管实例或数据库，还是从现有实例或数据库迁移过来，你都不可避免地需要加载数据。就像 SQL Server 安装一样，你有几种工具和选项可以加载数据。此外，你在
    Azure 中还有可用的新服务。

    '
- fmt: '### Keep These in Mind


    Just like a SQL Server, you may need `additional resources` when importing large
    amounts of data. For Azure SQL Managed Instance or Database, keep in mind any
    additional vCore or size requirements for importing data. I have described how
    long scaling can take for Managed Instance, so keep this in mind as you deploy.


    Several of the data loading techniques involve loading a `file`. While you can
    always use these techniques to load files from on-premises environment, any tool
    or command run in the Azure infrastructure should be done using Azure Storage
    or Azure Files. Some of your data may not be `cloud-born`, so consider using tools
    like `AzCopy` to load your files into Azure Storage or Azure Files. You can read
    more about AzCopy at [`https://learn.microsoft.com/azure/storage/common/storage-use-azcopy-files`](https://learn.microsoft.com/azure/storage/common/storage-use-azcopy-files).
    If your files are very large, take a look at our documentation on guidance and
    tools at [`https://learn.microsoft.com/azure/storage/common/storage-solution-large-dataset-moderate-high-network`](https://learn.microsoft.com/azure/storage/common/storage-solution-large-dataset-moderate-high-network).


    I have mentioned already in the book that Azure SQL Managed Instance and Database
    both use the `FULL` recovery model, and this cannot be changed (we need this to
    meet SLA requirements). This means that `minimal logging is not supported` for
    bulk operations (except for `tempdb`). Therefore, you should ensure you use certain
    techniques like `batch sizes`. A batch for bulk import is a defined unit of transaction.
    A batch size of 10,000 means 10,000 rows are imported for a transaction. Typically,
    using large batch sizes can improve bulk performance and should be used for Azure
    SQL. However, you should also keep in mind that if you use too large of a batch
    size, you might be throttled by `log rate governance`. You can read more about
    log rate governance at [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance).
    If your intended target for data is columnstore, you should consider directly
    importing into a clustered columnstore index. You can read more about data loading
    guidance for columnstore at [`https://learn.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-data-loading-guidance`](https://learn.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-data-loading-guidance).


    Azure does charge on certain types of network traffic called `inbound` and `outbound`.
    Any inbound traffic (e.g., bulk import data from your on-premises environment
    into Azure) is free.


    Outbound traffic can be charged if that traffic travels between Azure regions.
    If you use bulk import from an Azure Virtual Machine or Azure Data Factory Service
    from one region into an Azure SQL Database in another region, there could be outbound
    network charges. You can read more at [`https://azure.microsoft.com/pricing/details/bandwidth`](https://azure.microsoft.com/pricing/details/bandwidth).


    ### bcp


    The bulk copy program (`bcp`) is perhaps the most traditional and most popular
    tool in the history of SQL Server to export and import data. The `bcp` program
    runs on Windows, Linux, and MacOS computers. You can get all the latest information
    about `bcp` at [`https://learn.microsoft.com/en-us/sql/tools/bcp-utility`](https://learn.microsoft.com/en-us/sql/tools/bcp-utility).


    Since `bcp` is a program that reads a file and `bulk imports` data into a SQL
    Server or Azure SQL, you must run the `bcp` program on a computer that can access
    the file and connect to Azure SQL. That could be on a computer on-premises or
    Azure Virtual Machine. In any of these scenarios, you can use `bcp` against a
    file that is hosted on your on-premises environment, local to the Azure Virtual
    Machine storage (which may be data disks in Azure Storage), or in Azure Storage.
    Since `bcp` does not support a direct path to Azure Storage (i.e., URL), you can
    use Azure Files.


    One other option is to use `bcp` from the Azure Cloud Shell. `bcp` in the Azure
    Cloud Shell runs in the Azure infrastructure (think of it like running in a temporary
    VM), so provided you have network connectivity set up correctly, you can bulk
    import into Azure SQL Managed Instance or Database. The only provision here is
    that the cloud shell cannot join a virtual network, so you would have to set up
    a public endpoint access. The Azure Cloud Shell supports persistence of files
    through a concept called a `clouddrive` which you can read more about at [`https://learn.microsoft.com/azure/cloud-shell/persisting-shell-storage`](https://learn.microsoft.com/azure/cloud-shell/persisting-shell-storage).
    You can copy files into your `clouddrive` and then use `bcp` to import the file
    into Azure SQL.


    `bcp` uses `Bulk APIs` behind the scenes, so you can also write applications that
    use the `Bulk APIs`. Here is an example of `Bulk APIs` with ODBC at [`https://learn.microsoft.com/sql/relational-databases/native-client-odbc-extensions-bulk-copy-functions/sql-server-driver-extensions-bulk-copy-functions`](https://learn.microsoft.com/sql/relational-databases/native-client-odbc-extensions-bulk-copy-functions/sql-server-driver-extensions-bulk-copy-functions).'
  raw: '### Keep These in Mind


    Just like a SQL Server, you may need **additional resources** when importing large
    amounts of data. For Azure SQL Managed Instance or Database, keep in mind any
    additional vCore or size requirements for importing data. I have described how
    long scaling can take for Managed Instance, so keep this in mind as you deploy.


    Several of the data loading techniques involve loading a *file*. While you can
    always use these techniques to load files from on-premises environment, any tool
    or command run in the Azure infrastructure should be done using Azure Storage
    or Azure Files. Some of your data may not be *cloud-born*, so consider using tools
    like **AzCopy** to load your files into Azure Storage or Azure Files. You can
    read more about AzCopy at [`https://learn.microsoft.com/azure/storage/common/storage-use-azcopy-files`](https://learn.microsoft.com/azure/storage/common/storage-use-azcopy-files).
    If your files are very large, take a look at our documentation on guidance and
    tools at [`https://learn.microsoft.com/azure/storage/common/storage-solution-large-dataset-moderate-high-network`](https://learn.microsoft.com/azure/storage/common/storage-solution-large-dataset-moderate-high-network).


    I have mentioned already in the book that Azure SQL Managed Instance and Database
    both use the FULL recovery model, and this cannot be changed (we need this to
    meet SLA requirements). This means that **minimal logging is not supported** for
    bulk operations (except for tempdb). Therefore, you should ensure you use certain
    techniques like *batch sizes*. A batch for bulk import is a defined unit of transaction.
    A batch size of 10,000 means 10,000 rows are imported for a transaction. Typically,
    using large batch sizes can improve bulk performance and should be used for Azure
    SQL. However, you should also keep in mind that if you use too large of a batch
    size, you might be throttled by *log rate governance*. You can read more about
    log rate governance at [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance).
    If your intended target for data is columnstore, you should consider directly
    importing into a clustered columnstore index. You can read more about data loading
    guidance for columnstore at [`https://learn.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-data-loading-guidance`](https://learn.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-data-loading-guidance).


    Azure does charge on certain types of network traffic called **inbound** and **outbound**.
    Any inbound traffic (e.g., bulk import data from your on-premises environment
    into Azure) is free.


    Outbound traffic can be charged if that traffic travels between Azure regions.
    If you use bulk import from an Azure Virtual Machine or Azure Data Factory Service
    from one region into an Azure SQL Database in another region, there could be outbound
    network charges. You can read more at [`https://azure.microsoft.com/pricing/details/bandwidth`](https://azure.microsoft.com/pricing/details/bandwidth).


    ### bcp


    The bulk copy program (bcp) is perhaps the most traditional and most popular tool
    in the history of SQL Server to export and import data. The bcp program runs on
    Windows, Linux, and MacOS computers. You can get all the latest information about
    bcp at [`https://learn.microsoft.com/en-us/sql/tools/bcp-utility`](https://learn.microsoft.com/en-us/sql/tools/bcp-utility).


    Since bcp is a program that reads a file and *bulk imports* data into a SQL Server
    or Azure SQL, you must run the bcp program on a computer that can access the file
    and connect to Azure SQL. That could be on a computer on-premises or Azure Virtual
    Machine. In any of these scenarios, you can use bcp against a file that is hosted
    on your on-premises environment, local to the Azure Virtual Machine storage (which
    may be data disks in Azure Storage), or in Azure Storage. Since bcp does not support
    a direct path to Azure Storage (i.e., URL), you can use Azure Files.


    One other option is to use bcp from the Azure Cloud Shell. bcp in the Azure Cloud
    Shell runs in the Azure infrastructure (think of it like running in a temporary
    VM), so provided you have network connectivity set up correctly, you can bulk
    import into Azure SQL Managed Instance or Database. The only provision here is
    that the cloud shell cannot join a virtual network, so you would have to set up
    a public endpoint access. The Azure Cloud Shell supports persistence of files
    through a concept called a *clouddrive* which you can read more about at [`https://learn.microsoft.com/azure/cloud-shell/persisting-shell-storage`](https://learn.microsoft.com/azure/cloud-shell/persisting-shell-storage).
    You can copy files into your clouddrive and then use bcp to import the file into
    Azure SQL.


    bcp uses *Bulk APIs* behind the scenes, so you can also write applications that
    use the Bulk APIs. Here is an example of Bulk APIs with ODBC at [`https://learn.microsoft.com/sql/relational-databases/native-client-odbc-extensions-bulk-copy-functions/sql-server-driver-extensions-bulk-copy-functions`](https://learn.microsoft.com/sql/relational-databases/native-client-odbc-extensions-bulk-copy-functions/sql-server-driver-extensions-bulk-copy-functions).'
  trans: '

    ### 请牢记这些要点


    就像 SQL Server 一样，在导入大量数据时，你可能需要 `额外的资源`。对于 Azure SQL 托管实例或数据库，请牢记导入数据可能需要额外的 vCore
    或空间要求。我已经描述过托管实例的扩展可能需要多长时间，因此在部署时请记住这一点。


    有几种数据加载技术涉及加载 `文件`。虽然你始终可以使用这些技术从本地环境加载文件，但在 Azure 基础设施中运行的任何工具或命令都应使用 Azure 存储或
    Azure 文件来完成。你的部分数据可能不是 `原生云` 数据，因此请考虑使用 `AzCopy` 之类的工具将文件加载到 Azure 存储或 Azure 文件中。你可以在
    [`https://learn.microsoft.com/azure/storage/common/storage-use-azcopy-files`](https://learn.microsoft.com/azure/storage/common/storage-use-azcopy-files)
    了解更多关于 AzCopy 的信息。如果你的文件非常大，请查看我们关于指导和工具的文档：[`https://learn.microsoft.com/azure/storage/common/storage-solution-large-dataset-moderate-high-network`](https://learn.microsoft.com/azure/storage/common/storage-solution-large-dataset-moderate-high-network)。


    我在书中已经提到，Azure SQL 托管实例和数据库都使用 `FULL`（完整）恢复模型，并且无法更改（我们需要这样做以满足 SLA 要求）。这意味着对于批量操作，`不支持最小化日志记录`（`tempdb`
    除外）。因此，你应该确保使用某些技术，例如 `批处理大小`。批量导入的一个批次是一个定义的事务单位。批处理大小为 10,000 意味着一个事务导入 10,000
    行。通常，使用较大的批处理大小可以提高批量性能，并且应该用于 Azure SQL。但是，你还应记住，如果使用的批处理大小过大，可能会受到 `日志速率调控`
    的限制。你可以在 [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance)
    了解更多关于日志速率调控的信息。如果你的数据目标是列存储，你应该考虑直接导入到聚集列存储索引中。你可以在 [`https://learn.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-data-loading-guidance`](https://learn.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-data-loading-guidance)
    了解更多关于列存储的数据加载指南。


    Azure 会对某些类型的网络流量收费，称为 `入站` 和 `出站`。任何入站流量（例如，从本地环境批量导入数据到 Azure）都是免费的。


    如果出站流量在 Azure 区域之间传输，则可能产生费用。如果你使用 Azure 虚拟机或 Azure 数据工厂服务从一个区域进行批量导入，而目标 Azure
    SQL 数据库在另一个区域，则可能会产生出站网络费用。你可以在 [`https://azure.microsoft.com/pricing/details/bandwidth`](https://azure.microsoft.com/pricing/details/bandwidth)
    了解更多信息。


    ### bcp


    批量复制程序 (`bcp`) 可能是 SQL Server 历史上最传统、最流行的数据导出和导入工具。`bcp` 程序可在 Windows、Linux 和
    MacOS 计算机上运行。你可以在 [`https://learn.microsoft.com/en-us/sql/tools/bcp-utility`](https://learn.microsoft.com/en-us/sql/tools/bcp-utility)
    获取有关 `bcp` 的所有最新信息。


    由于 `bcp` 是一个读取文件并将数据 `批量导入` 到 SQL Server 或 Azure SQL 的程序，因此你必须在可以访问该文件并能连接到 Azure
    SQL 的计算机上运行 `bcp` 程序。这可能是本地计算机或 Azure 虚拟机。在任何这些场景中，你都可以针对托管在你的本地环境、Azure 虚拟机本地存储（可能是
    Azure 存储中的数据磁盘）或 Azure 存储中的文件使用 `bcp`。由于 `bcp` 不支持直接访问 Azure 存储的路径（即 URL），因此你可以使用
    Azure 文件。


    另一个选项是从 Azure Cloud Shell 使用 `bcp`。Azure Cloud Shell 中的 `bcp` 在 Azure 基础设施中运行（可以将其想象成在一个临时的
    VM 中运行），因此只要你正确设置了网络连接，就可以批量导入到 Azure SQL 托管实例或数据库。唯一的限制是 Cloud Shell 无法加入虚拟网络，因此你必须设置公共终结点访问。Azure
    Cloud Shell 通过一个称为 `clouddrive` 的概念支持文件持久化，你可以在 [`https://learn.microsoft.com/azure/cloud-shell/persisting-shell-storage`](https://learn.microsoft.com/azure/cloud-shell/persisting-shell-storage)
    了解更多信息。你可以将文件复制到你的 `clouddrive`，然后使用 `bcp` 将文件导入 Azure SQL。


    `bcp` 在后台使用 `批量 API`，因此你也可以编写使用 `批量 API` 的应用程序。这里有一个关于 ODBC 批量 API 的示例：[`https://learn.microsoft.com/sql/relational-databases/native-client-odbc-extensions-bulk-copy-functions/sql-server-driver-extensions-bulk-copy-functions`](https://learn.microsoft.com/sql/relational-databases/native-client-odbc-extensions-bulk-copy-functions/sql-server-driver-extensions-bulk-copy-functions)。

    '
- fmt: '### BULK INSERT and OPENROWSET


    The T-SQL `BULK INSERT` and `OPENROWSET` (using the `BULK` option) statements
    support bulk import of data from a file. One nice advantage of these commands
    is that they run in the context of the SQL Server engine.


    For SQL Server, it is common to copy a file to drive or network share that the
    computer hosting SQL Server can access. Then you use `BULK INSERT` to reference
    that file to import. The problem is that for Azure SQL Managed Instance and Database,
    you do not have access to the underlying node file system. Therefore, `BULK INSERT`
    and `OPENROWSET` statements have been enhanced to support Azure Blob Storage (even
    from an on-premises SQL Server).


    Here is how this works. You create an `EXTERNAL DATA SOURCE` (like Polybase) to
    reference an Azure Storage account. The `BULK INSERT` and `OPENROWSET` statements
    have been enhanced to support a `DATA_SOURCE` parameter. I’ll discuss external
    data sources more in Chapter [9](#496204_2_En_9_Chapter.xhtml) of the book.


    Now you can connect directly to your Azure SQL Managed Instance or Database with
    your favorite SQL tool (remember it could be `sqlcmd` in the Azure Cloud Shell)
    and bulk import data having the SQL Server engine do the work.


    Here is an example syntax on how to do this with `BULK INSERT` from the documentation
    at [`https://learn.microsoft.com/sql/t-sql/statements/bulk-insert-transact-sql?view=sql-server-ver15#f-importing-data-from-a-file-in-azure-blob-storage`](https://learn.microsoft.com/sql/t-sql/statements/bulk-insert-transact-sql?view=sql-server-ver15#f-importing-data-from-a-file-in-azure-blob-storage).
    This requires you first to create an Azure Storage account and container.


    ```

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''YourStrongPassword1'';

    GO

    --> Optional - a DATABASE SCOPED CREDENTIAL is not required because the blob is
    configured for public (anonymous) access!

    CREATE DATABASE SCOPED CREDENTIAL MyAzureBlobStorageCredential

    WITH IDENTITY = ''SHARED ACCESS SIGNATURE'',

    SECRET = ''******srt=sco&sp=rwac&se=2017-02-01T00:55:34Z&st=2016-12-29T16:55:34Z***************'';

    -- NOTE: Make sure that you don''t have a leading ? in SAS token, and

    -- that you have at least read permission on the object that should be loaded
    srt=o&sp=r, and

    -- that expiration period is valid (all dates are in UTC time)

    CREATE EXTERNAL DATA SOURCE MyAzureBlobStorage

    WITH ( TYPE = BLOB_STORAGE,

    LOCATION = ''https://****************.blob.core.windows.net/invoices''

    , CREDENTIAL= MyAzureBlobStorageCredential --> CREDENTIAL is not required if a
    blob is configured for public (anonymous) access!

    );

    BULK INSERT Sales.Invoices

    FROM ''inv-2017-12-08.csv''

    WITH (DATA_SOURCE = ''MyAzureBlobStorage'');

    ```


    ### SQL Server Integration Services (SSIS)


    SSIS packages are one of the most popular methods today for Extract, Transform,
    and Load (ETL) applications with SQL Server.


    Azure SQL Managed Instance and Database can always be targets for data loading
    with SSIS packages no matter where you run the SSIS package with the SSIS runtime.
    This means you can build SSIS packages and run them on-premises in your data center
    or in Azure Virtual Machine. Here is a simple tutorial on how to use SSIS to load
    data into Azure SQL Database: [`https://learn.microsoft.com/sql/integration-services/load-data-to-sql-database-with-ssis`](https://learn.microsoft.com/sql/integration-services/load-data-to-sql-database-with-ssis).


    There are other methods to execute an SSIS package in Azure SQL itself (which
    you could use to have packages that import data into Azure SQL Managed Instance
    or Database).


    #### Azure SSIS


    There is no specific service called Azure SSIS, but I have coined this term to
    refer to services in Azure to host and execute SSIS packages. There are two components
    to make Azure SSIS a reality:


    *   **Azure SSIS Integration Runtime (SSIS IR)**


    Azure Data Factory (ADF) is a service in Azure that provides ETL capabilities.
    ADF supports an *integration runtime* compute environment. One of the choices
    for an integration runtime environment is SSIS. Effectively, ADF will host compute
    nodes that allow you to run SSIS packages. This compute environment can also be
    connected to a virtual network paving the way for connectivity to Azure SQL resources.
    The steps to deploy SSIS IR can be found at [`https://learn.microsoft.com/azure/data-factory/create-azure-ssis-integration-runtime`](https://learn.microsoft.com/azure/data-factory/create-azure-ssis-integration-runtime).


    *   **SSIS Catalog Database (SSISDB) in Azure**


    Although not required to use SSIS IR, you can host the catalog database for SSIS
    called *SSISDB* in Azure SQL Database or Managed Instance. This way, you can execute
    packages that are stored in Azure SQL Database or Managed Instance leaving all
    your ETL packages, managed, and execution in the cloud. These packages can access
    any data source a normal SSIS package could include on-premises. Think of this
    as a way of executing everything in Azure and *pulling* data from on-premises.
    The easiest method to create the SSISDB catalog in Azure SQL is to provision it
    when deploying SSIS IR. You will need to have already deployed an Azure SQL Database
    Logical Server or Managed Instance to deploy the SSISDB in Azure. Check out this
    tutorial at [`https://learn.microsoft.com/azure/data-factory/tutorial-deploy-ssis-packages-azure`](https://learn.microsoft.com/azure/data-factory/tutorial-deploy-ssis-packages-azure).


    Once you have deployed SSIS IR and SSISDB for Azure, you basically have a compute
    structure to run packages and a catalog to host them (without you having to provision
    your own VM).


    Note


    You still can execute packages stored in a file system such as Azure Files.


    You now have the option to execute these packages using several methods:


    *   Execute packages with `SQL Server Data Tools (SSDT)`. Learn more at [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-ssdt`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-ssdt).

    *   Execute packages using `SQL Server Agent` on a Managed Instance. Learn more
    at [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-managed-instance-agent`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-managed-instance-agent).

    *   Execute packages with the Azure-enabled version of `dtexec` called `AzureDTExec`
    (Windows only). Learn more at [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-azure-enabled-dtexec`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-azure-enabled-dtexec).

    *   Execute an `Execute SSIS Package activity` as part of an Azure Data Factory
    (ADF) pipeline. Learn more at [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-ssis-activity`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-ssis-activity).
    You can also use ADF to run a stored procedure activity. Read more at [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-stored-procedure-activity`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-stored-procedure-activity).


    Using SSIS IR and SSISDB in Azure could be a chapter in itself! To find out more
    details about other options, including migrating existing SSIS packages to Azure,
    read the following documentation at [`https://learn.microsoft.com/sql/integration-services/lift-shift/ssis-azure-lift-shift-ssis-packages-overview`](https://learn.microsoft.com/sql/integration-services/lift-shift/ssis-azure-lift-shift-ssis-packages-overview).'
