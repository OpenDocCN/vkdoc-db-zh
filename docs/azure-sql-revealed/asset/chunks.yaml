    [`https://learn.microsoft.com/azure/defender-for-cloud/data-aware-security-dashboard-overview`](https://learn.microsoft.com/azure/defender-for-cloud/data-aware-security-dashboard-overview)。'
- fmt: '# SQL Threat Protection


    I''m not a fan of the term here because SQL Threat Protection doesn''t prevent
    problems, it `detects` them. Examples include brute-force login attacks, logins
    from unusual locations, or potential SQL injection attacks.


    SQL Threat Protection uses Extended Events and machine learning technology to
    detect and alert you to certain types of suspicious activities. An example of
    a suspicious activity is code designed for a `SQL injection`. You can read all
    the various rules and alerts detected at [`https://learn.microsoft.com/azure/defender-for-cloud/alerts-sql-database-and-azure-synapse-analytics`](https://learn.microsoft.com/azure/defender-for-cloud/alerts-sql-database-and-azure-synapse-analytics).


    While we don''t document the details of how we detect all rules, I can show you
    how to simulate a SQL injection using SSMS to see an alert.


    Using SSMS from my laptop, I''ll create a new query connection using SSMS, but
    I will use the Additional Connection Parameters of SSMS (from the Options button)
    to put in this string:


    ```

    Application Name=webappname

    ```


    I also used the Connect to database to connect to the `bwadw` database (this database
    uses the sample AdventureWorksLT). In the Query Editor window, I put in this query
    and executed it:


    ```

    SELECT * FROM SalesLT.Customer WHERE CustomerID like '''' or 1 = 1 --'' and family
    = ''test1'';

    ```


    > **Note**

    >

    > We filter out SSMS as an application because no one sends in injections from
    a tool like SSMS. Therefore, I used a different application name to simulate a
    real application sending a query that looks like it could be a SQL injection attack.


    Within a matter of seconds, I can navigate to my database in the Azure Portal,
    select Microsoft Defender for Cloud from the Security section of the Service Menu,
    and then select "Check for alerts on this resource in Microsoft Defender for Cloud";
    you will see a screen like the one in Figure 6-27.


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig27_HTML.jpg)

    *Figure 6-27: A SQL injection attack detected*


    You can click View full details to see more about the source of the attack and
    more details on why this is considered an injection attack.


    If you are wondering why this is an attack, take a closer look at the SQL query
    I used:


    ```

    SELECT * FROM SalesLT.Customer WHERE CustomerID like '''' or 1 = 1 --'' and family
    = ''test1'';

    ```


    In this case, the parser stops processing the query when it sees the comment `--`.
    So, someone who crafts this query is attempting to see all customers. Imagine
    if the input for the WHERE clause came from an application web input field. If
    the developer dynamically concatenates the query and the input string, a hacker
    can try to use this technique to see data they likely should not (it can get far
    worse). SQL injection is an interesting security topic, and we have documentation
    at [`https://docs.microsoft.com/sql/relational-databases/security/sql-injection`](https://docs.microsoft.com/sql/relational-databases/security/sql-injection)
    to explain how dangerous this can be and how to avoid them.


    Like a Vulnerability Assessment, you can configure your system to receive emails
    upon any threat detected. Microsoft takes this so seriously; anytime I try a test
    like this, I get an email from our company security team making sure I''ve seen
    this and that all is OK with my database!


    SQL Threat Detection also has interfaces for PowerShell (e.g., `Set-AzSqlDatabaseThreatDetectionPolicy`)
    and az CLI (e.g., `az sql db threat-policy`).


    # Data Classification


    Let''s say you would like to classify the tables in your database into categories
    to look for access to data for policies like General Protection Data Regulation
    (GDPR) or Personally Identifiable Information (PII). Data classification for Azure
    SQL provides a method to classify your columns based on detected pattern match
    of names or allows you to tag them manually.


    I can do this from the Azure Portal as you can see in Figure 6-28.


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig28_HTML.jpg)

    *Figure 6-28: Data classification for Azure SQL*


    If I choose all these recommendations and select Accept selected recommendations,
    I can use the Overview pane to get a report for data classification as you can
    see in Figure 6-29.


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig29_HTML.jpg)

    *Figure 6-29: Data classification overview*


    One of the nice aspects to this feature is that access to data that is marked
    as classified can be seen in SQL auditing. Now you can track who has tried to
    access data that you have marked as classified with these information types and
    labels.


    Having shown you this, this capability can now be integrated with Microsoft Purview.
    To read more about how to use Microsoft Purview for data classification, see the
    documentation at [`https://learn.microsoft.com/azure/azure-sql/database/data-discovery-and-classification-overview?view=azuresql#enabling-access-control-for-sensitive-data-using-microsoft-purview-information-protection-policies-public-preview`](https://learn.microsoft.com/azure/azure-sql/database/data-discovery-and-classification-overview?view=azuresql#enabling-access-control-for-sensitive-data-using-microsoft-purview-information-protection-policies-public-preview).


    # Summary


    In this chapter, you learned how Azure SQL security is just like SQL Server in
    many ways. You learned how to secure your network and authenticate logins and
    users, including with Microsoft Entra. You learned how to protect your data with
    various encryption techniques. You learned all the audit capabilities you can
    use outside and in Azure SQL. Furthermore, you learned to go further with the
    cloud using Microsoft Defender for Cloud and data classification.


    You have learned in this book that the speed of the cloud helps us innovate and
    adapt quickly. Security is always part of that innovation. According to Joachim
    Hammer, Principal Group PM Manager for Security, "We continue to invest in a three-pronged
    approach to ensure Azure SQL meets the most stringent security requirements as
    well as regulatory compliances in the industry. These areas include State-of-the-art,
    built-in Security Controls, Trust and Compliance, and Threat detection and assessment."


    There are some self-paced labs for Microsoft Entra authentication for Azure SQL
    Database you can try yourself in the Cloud Workshop at [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB).


    In the next chapter, we will explore and dive deep into the second major aspect
    to the core of Azure SQL: performance.'
  raw: '#### SQL Threat Protection


    I’m not a fan of the term here because SQL Threat Protection doesn’t prevent problems,
    it *detects* them. Examples include brute-force login attacks, logins from unusual
    locations, or potential SQL injection attacks.


    SQL Threat Protection uses Extended Events and machine learning technology to
    detect and alert you to certain types of suspicious activities. An example of
    a suspicious activity is code designed for a *SQL injection*. You can read all
    the various rules and alerts detected at [`https://learn.microsoft.com/azure/defender-for-cloud/alerts-sql-database-and-azure-synapse-analytics`](https://learn.microsoft.com/azure/defender-for-cloud/alerts-sql-database-and-azure-synapse-analytics).


    While we don’t document the details of how we detect all rules, I can show you
    how to simulate a SQL injection using SSMS to see an alert.


    Using SSMS from my laptop, I’ll create a new query connection using SSMS, but
    I will use the Additional Connection Parameters of SSMS (from the Options button)
    to put in this string:


    ```

    Application Name=webappname

    ```


    I also used the Connect to database to connect to the **bwadw** database (this
    database uses the sample AdventureWorksLT). In the Query Editor window, I put
    in this query and executed it:


    ```

    SELECT * FROM SalesLT.Customer WHERE CustomerID like '''' or 1 = 1 --'' and family
    = ''test1'';

    ```


    Note


    We filter out SSMS as an application because no one sends in injections from a
    tool like SSMS. Therefore, I used a different application name to simulate a real
    application sending a query that looks like it could be a SQL injection attack.


    Within a matter of seconds, I can navigate to my database in the Azure Portal,
    select Microsoft Defender for Cloud from the Security section of the Service Menu,
    and then select “Check for alerts on this resource in Microsoft Defender for Cloud”;
    you will see a screen like the one in Figure [6-27](#496204_2_En_6_Chapter.xhtml#Fig27).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig27_HTML.jpg)


    Figure 6-27


    A SQL injection attack detected


    You can click View full details to see more about the source of the attack and
    more details on why this is considered an injection attack.


    If you are wondering why this is an attack, take a closer look at the SQL query
    I used:


    ```

    SELECT * FROM SalesLT.Customer WHERE CustomerID like '''' or 1 = 1 --'' and family
    = ''test1'';

    ```


    In this case, the parser stops processing the query when it sees the comment --.
    So, someone who crafts this query is attempting to see all customers. Imagine
    if the input for the WHERE clause came from an application web input field. If
    the developer dynamically concatenates the query and the input string, a hacker
    can try to use this technique to see data they likely should not (it can get far
    worse). SQL injection is an interesting security topic, and we have documentation
    at [`https://docs.microsoft.com/sql/relational-databases/security/sql-injection`](https://docs.microsoft.com/sql/relational-databases/security/sql-injection)
    to explain how dangerous this can be and how to avoid them.


    Like a Vulnerability Assessment, you can configure your system to receive emails
    upon any threat detected. Microsoft takes this so seriously; anytime I try a test
    like this, I get an email from our company security team making sure I’ve seen
    this and that all is OK with my database!


    SQL Threat Detection also has interfaces for PowerShell (e.g., **Set-AzSqlDatabaseThreatDetectionPolicy**)
    and az CLI (e.g., **az sql db threat-policy**).


    ### Data Classification


    Let’s say you would like to classify the tables in your database into categories
    to look for access to data for policies like General Protection Data Regulation
    (GDPR) or Personally Identifiable Information (PII). Data classification for Azure
    SQL provides a method to classify your columns based on detected pattern match
    of names or allows you to tag them manually.


    I can do this from the Azure Portal as you can see in Figure [6-28](#496204_2_En_6_Chapter.xhtml#Fig28).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig28_HTML.jpg)


    Figure 6-28


    Data classification for Azure SQL


    If I choose all these recommendations and select Accept selected recommendations,
    I can use the Overview pane to get a report for data classification as you can
    see in Figure [6-29](#496204_2_En_6_Chapter.xhtml#Fig29).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig29_HTML.jpg)


    Figure 6-29


    Data classification overview


    One of the nice aspects to this feature is that access to data that is marked
    as classified can be seen in SQL auditing. Now you can track who has tried to
    access data that you have marked as classified with these information types and
    labels.


    Having shown you this, this capability can now be integrated with Microsoft Purview.
    To read more about how to use Microsoft Purview for data classification, see the
    documentation at [`https://learn.microsoft.com/azure/azure-sql/database/data-discovery-and-classification-overview?view=azuresql#enabling-access-control-for-sensitive-data-using-microsoft-purview-information-protection-policies-public-preview`](https://learn.microsoft.com/azure/azure-sql/database/data-discovery-and-classification-overview?view=azuresql#enabling-access-control-for-sensitive-data-using-microsoft-purview-information-protection-policies-public-preview).


    ## Summary


    In this chapter, you learned how Azure SQL security is just like SQL Server in
    many ways. You learned how to secure your network and authenticate logins and
    users, including with Microsoft Entra. You learned how to protect your data with
    various encryption techniques. You learned all the audit capabilities you can
    use outside and in Azure SQL. Furthermore, you learned to go further with the
    cloud using Microsoft Defender for Cloud and data classification.


    You have learned in this book that the speed of the cloud helps us innovate and
    adapt quickly. Security is always part of that innovation. According to Joachim
    Hammer, Principal Group PM Manager for Security, “We continue to invest in a three-pronged
    approach to ensure Azure SQL meets the most stringent security requirements as
    well as regulatory compliances in the industry. These areas include State-of-the-art,
    built-in Security Controls, Trust and Compliance, and Threat detection and assessment.”


    There are some self-paced labs for Microsoft Entra authentication for Azure SQL
    Database you can try yourself in the Cloud Workshop at [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB).


    In the next chapter, we will explore and dive deep into the second major aspect
    to the core of Azure SQL: performance.'
