  trans: '### 部署方法


    你可以通过 Azure 门户或使用 CLI 工具（如 `az` 命令行工具）、PowerShell 甚至 REST API（`az rest` 可以提供帮助）来部署
    Azure 托管实例或数据库。


    如果你只是试用 Azure SQL 或进行概念验证，可以轻松使用 Azure 门户。然而，如果需要一个可重复的部署流程（想象一下，如果你需要完全按照原始配置重新部署一个托管实例），那么使用
    CLI 脚本是更好的选择。请记住，你也可以使用 Azure 模板来帮助自动化部署。你可以在以下链接中阅读更多关于为 Azure SQL 使用 Azure 模板的信息：[`https://learn.microsoft.com/azure/azure-sql/database/arm-templates-content-guide?view=azuresql&tabs=single-database`](https://learn.microsoft.com/azure/azure-sql/database/arm-templates-content-guide%253Fview%253Dazuresql%2526tabs%253Dsingle-database)
    和 [`https://learn.microsoft.com/azure/azure-sql/database/arm-templates-content-guide?view=azuresql&tabs=managed-instance`](https://learn.microsoft.com/azure/azure-sql/database/arm-templates-content-guide%253Fview%253Dazuresql%2526tabs%253Dmanaged-instance)。


    你还可以选择使用 `Bicep` 来部署 Azure SQL 托管实例（[`https://learn.microsoft.com/azure/azure-sql/managed-instance/create-bicep-quickstart`](https://learn.microsoft.com/azure/azure-sql/managed-instance/create-bicep-quickstart)）或
    Azure SQL 数据库（[`https://learn.microsoft.com/azure/azure-sql/database/single-database-create-bicep-quickstart`](https://learn.microsoft.com/azure/azure-sql/database/single-database-create-bicep-quickstart)）。


    `Terraform` 同样支持部署 Azure SQL 托管实例（[`https://learn.microsoft.com/azure/azure-sql/managed-instance/instance-create-terraform`](https://learn.microsoft.com/azure/azure-sql/managed-instance/instance-create-terraform)）和
    Azure SQL 数据库（[`https://learn.microsoft.com/azure/azure-sql/database/single-database-create-terraform-quickstart`](https://learn.microsoft.com/azure/azure-sql/database/single-database-create-terraform-quickstart)）。


    让我再为你介绍一种方法。我在本书的第 2 章提到了 Azure 中的 Copilot 体验。图 4-2 展示了一个示例，说明如何请求 Copilot 提供一个使用
    `az` CLI 部署 Azure SQL 数据库的示例。


    ![](img/496204_2_En_4_Fig2_HTML.jpg)


    图 4-2


    在 Azure 中使用 Copilot 帮助部署 Azure SQL 数据库


    注意


    你可以看到，在提供响应后，Copilot 还会为你可能想做的其他事情提供建议。此时，我尚未部署数据库，因此 Copilot 没有 `上下文`。在本书后面，你将看到部署数据库后更复杂的体验。然而，在你阅读本章时，可以就章节中看到的主题向
    Copilot 提出不同的问题。它可以在文档中查找概念，并在许多情况下比你自己搜索更快地提供示例。


    ### 部署选项


    我之前已经讨论过是选择 Azure SQL 托管实例还是数据库。在这两种选项中，都有使用 `池` 的选择。正如我在本书第 2 章中提到的，Azure SQL
    托管实例提供了 `托管实例池`，这可能更适合规模较小、成本效益更高的托管实例。使用池的部署时间也要快得多。你可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/instance-pools-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/instance-pools-overview)
    阅读更多关于托管实例池的信息。我将在本章后面几处讨论托管实例池的使用。


    注意


    在撰写本书时，托管实例池经历了一次公开预览版的 `刷新`。它曾长期处于公开预览阶段，所以很多人认为它永远不会达到正式发布阶段，但在我看来，它现在正走在正确的道路上。


    正如我在本书第 1 章和第 2 章中都提到的，Azure SQL 数据库提供了一个称为 `弹性池` 的选项。如果你计划使用 Azure SQL 数据库来托管许多数据库，弹性池可能是一个不错的选择。独立软件供应商和软件即服务开发者通常会选择它来节省成本并更高效地管理数据库。我将在本章后面几处更详细地讨论弹性池。


    ### 区域


    选择特定的 Azure 区域可能很重要，正如我在关于虚拟机的第 3 章中所描述的那样。你需要确保你的部署选项在你选择的 Azure 区域中可用。


    你可能有特定的合规性和安全要求，这些要求也决定了你选择哪个区域。


    你可能正在实施特定的高可用性与灾难恢复选项，如可用性区域、异地复制或自动故障转移组，并且心中有特定的区域来确保这些部署成功。请记住，我在本书第 2 章中谈到过一个叫做
    `配对区域` 的概念，这对于做出这些地理区域选择非常重要。


    如果你需要将 Azure SQL 托管实例或数据库移动到另一个区域，请阅读我们文档中的检查清单：[`https://learn.microsoft.com/azure/azure-sql/database/move-resources-across-regions`](https://learn.microsoft.com/azure/azure-sql/database/move-resources-across-regions)。


    Azure SQL 数据库是一项“Ring 0”服务，这意味着它默认部署在每个区域。托管实例尚未完全达到该状态，但它已在所有区域普遍可用。


    此外，你还需要考虑你的应用程序将托管在何处，以及应用程序托管位置与你的 Azure SQL 部署之间的延迟要求。考虑性能以及与其他服务的接近程度。我曾与我的同事
    Anna Hoffman 就此话题聊天。她说：“……但我认为这不仅仅是应用程序在哪里的问题——用户在哪里？应用程序应该放在哪里？如果你有异地复制或自动故障转移组，你如何构建一个全局可用的解决方案？”


    ### 购买模型


    仅适用于 Azure SQL 数据库，你需要选择一个 `购买模型`。选项有 `DTU` 或 `vCore`。我在本书的第 1 章和第 2 章中解释了这些模型及其背后的历史。虽然
    `DTU` 模型对你来说可能是一个选择，但我推荐 `vCore` 模型。使用 `vCore`，你可以有更多的选择以及许可选项，例如 Azure 混合权益（`AHB`）。`vCore`
    模型让你对底层资源（CPU、内存、存储）有更高的透明度和控制权，更容易匹配你数据库的性能需求。


    如果你选择了 `DTU` 模型并希望在以后迁移到 `vCore` 模型，请查阅文档：[`https://learn.microsoft.com/azure/azure-sql/database/migrate-dtu-to-vcore`](https://learn.microsoft.com/azure/azure-sql/database/migrate-dtu-to-vcore)。'
- fmt: '### Service Tier (SLO)


    If Azure SQL Managed Instance is your deployment option, then you will need to
    select a *service tier* (we also refer to this as the Service-Level Objective
    or SLO) of `General Purpose (GP)` or `Business Critical (BC)`. I described these
    service tier options in Chapter [2](#496204_2_En_2_Chapter.xhtml) of the book.
    While resource limits and performance may differ, one of the primary differences
    with these tiers is how availability works which you will learn more about in
    Chapter [8](#496204_2_En_8_Chapter.xhtml) of the book. One notable difference
    between `Business Critical` is that it supports In-Memory OLTP capabilities. Remember
    in Chapter [2](#496204_2_En_2_Chapter.xhtml) I talked about the “NextGen” of `GP`
    for Managed Instance. Be sure to look at that option because it gives you more
    options and more powerful storage performance. A comparison between `GP` and `BC`
    for Managed Instance can be found at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits).


    **Tip**


    You will see later in this chapter that it can often take time to deploy a Managed
    Instance. Changing between `GP` and `BC` is possible but could result in significant
    downtime. You can learn more about specific times at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview).
    Managed Instance does support a concept called fast provisioning for `GP` service
    tiers with certain configurations. You can even provision them in 30 minutes.
    Learn more at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview?view=azuresql#fast-provisioning`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview?view=azuresql#fast-provisioning).


    If Azure SQL Database is your deployment option, then you also have the choice
    of `General Purpose (GP)` vs. `Business Critical (BC)` service tiers. In addition,
    you have the choice of `Hyperscale`. If you choose `General Purpose` or `Hyperscale`,
    you also have the choice of `Provisioned` vs. `Serverless`. This is also called
    a *compute model* *or tier*. I covered all these options in Chapter [2](#496204_2_En_2_Chapter.xhtml)
    of the book, but I’ll also cover this topic in this chapter.


    **Azure SQL Database Hyperscale** I believe will start becoming your `default`
    choice for databases. I talked about the history of `Hyperscale` (Project Socrates)
    in Chapter [1](#496204_2_En_1_Chapter.xhtml) of the book. If you read the first
    edition of this book, you probably walked away with the impression that `Hyperscale`
    is only for the largest database deployments. And that is our fault not yours
    for that impression. Several things have changed since 2020 for `Hyperscale`:


    *   `Hyperscale` now supports `serverless`.

    *   `Hyperscale` now supports elastic pools.

    *   The price of `Hyperscale` in late 2023 was `significantly reduced`. Learn
    more about this at [`https://azure.microsoft.com/updates/general-availability-lower-simplified-pricing-for-azure-sql-database-hyperscale-expected-in-december-2023`](https://azure.microsoft.com/updates/general-availability-lower-simplified-pricing-for-azure-sql-database-hyperscale-expected-in-december-2023).


    One key point about `Hyperscale` is that storage is autoscaled! You never specify
    how much database space you need. We just auto grow per your needs.


    **I believe Hyperscale now becomes a starting point for anyone** and just let
    auto-scaling for computer (`serverless`) and storage flex as your application
    needs grow or change. Read all the details about `Hyperscale` at [`https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale`](https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale).


    And speaking of `Serverless` (which I talked about in Chapter [1](#496204_2_En_1_Chapter.xhtml)
    of the book), it is a unique option we have created for auto-scale and scenarios
    where your database may not always be utilized. It provides a new cost-effective
    way to deploy and use an Azure SQL Database. Read more about `Serverless` at [`https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview`](https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview).


    Switching between `GP` and `BC` for Azure SQL Database is typically significantly
    faster than with Managed Instance. You can also switch between `Serverless` and
    `Provisioned` easily. For `Hyperscale`, you can switch back to a `GP` service
    tier. Learn more at [`https://learn.microsoft.com/azure/azure-sql/database/manage-hyperscale-database`](https://learn.microsoft.com/azure/azure-sql/database/manage-hyperscale-database).


    ### Hardware


    Even though for Azure SQL we abstract you from the infrastructure and virtualization
    used for the deployment, we provide options for a *hardware generation*.


    For Azure SQL Managed Instance, you have three choices:


    *   The Standard series is called `Gen5` (it used to be `Gen4` as we continually
    improve our generation of hardware). It has great choices for the number of vCores
    and memory per vCore.

    *   The `premium-series` uses a newer generation of processors and offers more
    vCores and a higher memory per vCore.

    *   The `memory-optimized premium-series` is like the `premium-series` but offers
    a higher memory per vCore. This option for `General Purpose` doesn’t support as
    many vCores as the `premium-series`.


    Keep up with all the details at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#hardware-configuration-characteristics`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#hardware-configuration-characteristics).


    For Azure SQL Database, you have the following options:


    *   The Standard series is also called `Gen5` (it used to be `Gen4` as we continually
    improve our generation of hardware). It has great choices for the number of vCores
    and memory per vCore.

    *   The `Fsv2-series` has the fastest CPU speeds, but you cannot provision as
    many vCores as you can for `Gen5`. This choice is only available for the `General
    Purpose` service tier.

    *   The `DC-series` only supports 8 vCores but is critical for security as it
    supports the Intel Software Guard Extension (Intel SGX) for secure enclaves used
    with Always Encrypted.

    *   `Hyperscale` supports `premium` and `premium memory-optimized` choices for
    more vCores and a higher memory to vCore ratio.


    Keep up with all the details for these choices at [`https://learn.microsoft.com/azure/azure-sql/database/service-tiers-sql-database-vcore?view=azuresql&tabs=azure-portal#hardware-configuration`](https://learn.microsoft.com/azure/azure-sql/database/service-tiers-sql-database-vcore?view=azuresql&tabs=azure-portal#hardware-configuration).


    ### vCore and Storage Sizes


    Once you have figured these options, you have choices on storage size. The DTU
    mode for Azure SQL Database has a DTU number you can choose (and a data size).
    For the vCore purchasing model, you have both number of vCores and database storage
    max size to select (remember you don’t need this for `Hyperscale`). There are
    a few differences in how these options work depending on your other choices. I
    will describe these differences as I walk you through the deployment process in
    the rest of this chapter.'
