- fmt: '### Automatic Tuning


    Technically, Automatic Plan Correction is part of a suite of services to use automation
    to improve query performance with no code changes called `Automatic Tuning`. Automatic
    Plan Correction works in SQL Server, Azure SQL Managed Instance, and Azure SQL
    Database.


    In Chapter [1](#496204_2_En_1_Chapter.xhtml) of this book, I talked about the
    history of how Automatic Tuning was created. Azure SQL Database offers a unique
    feature of Automatic Tuning to help automate creating and dropping indexes called
    `automatic indexing`.


    Note


    Today automatic indexing is not available for Azure SQL Managed Instance.


    This capability is known as `Automatic Tuning for Azure SQL Database` (also known
    in some parts of the documentation as SQL Database Advisor). These services run
    as background programs analyzing performance data from an Azure SQL Database and
    are included in the price of any database subscription. Automatic Tuning will
    analyze data from telemetry of a database, including the Query Store and Dynamic
    Management Views, to recommend indexes to be created that can improve application
    performance. Additionally, you can enable Automatic Tuning services to automatically
    create indexes that it believes will improve query performance. Automatic Tuning
    will also monitor index changes and recommend or automatically drop indexes that
    do not improve query performance. Automatic Tuning for Azure SQL Database takes
    a conservative approach to recommend indexes. This means that recommendations
    that may show up in a DMV like `sys.dm_db_missing_index_details` or a query showplan
    may not show up immediately as recommendations for Automatic Tuning. Automatic
    Tuning services monitor queries over time and use machine learning algorithms
    to make recommendations to truly affect query performance.


    One downside to Automatic Tuning for index recommendations is that it does not
    account for any overhead performance an index could cause insert, update, or delete
    operations.


    Note


    You can read an excellent paper for how automatic indexing is built by our engineering
    team at [`https://www.microsoft.com/research/uploads/prod/2019/02/autoindexing_azuredb.pdf`](https://www.microsoft.com/research/uploads/prod/2019/02/autoindexing_azuredb.pdf).


    One additional scenario in preview for Automatic Tuning for Azure SQL Database
    is parameterized queries. Queries with non-parameterized values can lead to performance
    overhead because the execution plan is recompiled each time the non-parameterized
    values are different. In many cases, the same queries with different parameter
    values generate the same execution plans. These plans, however, are still separately
    added to the plan cache. The process of recompiling execution plans uses database
    resources, increases the query duration time, and overflows the plan cache. These
    events, in turn, cause plans to be evicted from the cache. This SQL Server behavior
    can be altered by setting the forced parameterization option on the database (this
    is done by executing the `ALTER DATABASE` T-SQL statement using the `PARAMETERIZATION
    FORCED` option). Automatic Tuning can analyze a query performance workload against
    a database over time and recommend forced parameterization for the database. If
    over time, performance degradation has been observed, the option will be disabled.


    Let’s see an example of automatic indexing in action. I’ll use a database I deployed
    based on the AdventureWorks example to show this capability in this chapter called
    `bwadw` (now a Hyperscale 16 vCore database, but you don’t have to have 16 vCores
    for this example). You can try this out yourself using the scripts found in the
    `ch7_performance\tuning_recommendations`. You will need the `ostress` utility
    again for this demo.


    Run the following steps connected to the database:


    *   Run the `order_rating_ddl.sql` script to create the table.


    *   Edit the `order_rating_insert.cmd` file to put in your logical server, database,
    admin login, and password. Execute this script. This script uses the `order_rating_insert.sql`
    script to insert rows into the table.


    *   Now edit the `query_order_rating.cmd` script to put in your logical server,
    database, admin login, and password. Execute this script. **Caution:** This script
    is designed to run for at least 12 hours. It uses the `query_order_rating.sql`
    script to execute queries repeatedly against a table with no index.


    Here is the main issue when using these scripts. It takes time and patience. Why?
    Our algorithms don’t just recommend indexes based on a single query and single
    execution. We look at query workloads over time and for frequent executions to
    decide if an index makes sense. Therefore, when you try this yourself, you will
    need to let this script run to completion (it runs thousands of iterations). When
    I did this within 12 hours, I saw the information I’m about to show you from the
    Azure portal.


    After running the workload and waiting for 12 hours, I can see a chart on my performance
    and recommendations highlighted from `Performance overview` in the Azure portal
    similar to Figure [7-31](#496204_2_En_7_Chapter.xhtml#Fig31).


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig31_HTML.jpg)


    Figure 7-31


    Performance overview for Azure SQL Database


    Let’s now get a closer look at the queries behind the high CPU utilization by
    selecting `Query Performance Insights` as you can see in Figure [7-32](#496204_2_En_7_Chapter.xhtml#Fig32).


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig32_HTML.jpg)


    Figure 7-32


    Query Performance Insights for Azure SQL Database


    The first query is consuming all the CPU, so I can select it and I will get a
    screen like Figure [7-33](#496204_2_En_7_Chapter.xhtml#Fig33).


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig33_HTML.jpg)


    Figure 7-33


    Query details from performance insights


    This provides me historical performance and the text of the query. I could click
    Recommendations at the top of this screen, but instead let’s go back to the Azure
    Portal. Here, I can select `Performance Recommendations` like in Figure [7-34](#496204_2_En_7_Chapter.xhtml#Fig34).


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig34_HTML.jpg)


    Figure 7-34


    Performance Recommendations for Azure SQL Database


    On this screen, you can see one of the recommendations is to create a new index
    and the Impact is High (which means it could have a high positive impact on improving
    performance).


    I can click the Create Index action and get more details about the recommended
    index as you see in Figure [7-35](#496204_2_En_7_Chapter.xhtml#Fig35).


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig35_HTML.jpg)


    Figure 7-35


    Create index recommendation


    On this screen, I can get details of how the index should be built, its impact
    on performance, and expected storage space required to build it. I can at this
    point select Apply at the top of the screen to create the index. I can also select
    View script to get the details of the T-SQL command as you see in Figure [7-36](#496204_2_En_7_Chapter.xhtml#Fig36).


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig36_HTML.jpg)


    Figure 7-36


    Create index script


    You can see an online index is the default method used for automatic indexing.


    Let’s say that you like these recommendations and even want to consider having
