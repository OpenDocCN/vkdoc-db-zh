- fmt: "### Query Intelligence\n\nQuery intelligence encompasses features built into\
    \ the database engine to make your applications faster called Intelligent Query\
    \ Processing (`IQP`) and capabilities that use the engine like `Automatic Tuning`.\n\
    \nI covered this topic extensively in Chapter [7](#496204_2_En_7_Chapter.xhtml)\
    \ of the book. Learn more about `IQP` at [`https://aka.ms/iqp`](https://aka.ms/iqp).\
    \ Learn more about `Automatic Tuning` at [`https://aka.ms/sqlautotuning`](https://aka.ms/sqlautotuning).\n\
    \nOne more topic not covered in the book so far was an enhancement since the first\
    \ edition of this book called optimized locking. `Azure SQL Database` now has\
    \ an improved lock management system called optimized locking. Using features\
    \ like Accelerated Database Recovery (versioning) and Read Committed Snapshot\
    \ Isolation (`RCSI`), optimized locking reduces the number of locks required for\
    \ large transactions reducing lock memory and lock escalations. Any developer\
    \ that struggles with lock escalation will appreciate what is now built into the\
    \ engine to eliminate them. Read more at [`https://learn.microsoft.com/sql/relational-databases/performance/optimized-locking`](https://learn.microsoft.com/sql/relational-databases/performance/optimized-locking).\n\
    \n## REST API Integration\n\nConnecting your data in SQL inside the engine has\
    \ many advantages:\n\n*   You can use the security of the engine with all the\
    \ standard security principles and access you know.\n*   Like stored procedures,\
    \ you are reducing application traffic and use a server-side programming model\
    \ to make your data integration more efficient.\n\nI feel like `Polybase` has\
    \ that similar type of advantage. With `Azure SQL`, we have built a new feature\
    \ to interface with any `REST API` endpoint. Codename Project Solaria, we now\
    \ have a system stored procedure, called `sp_invoke_external_rest_endpoint`, to\
    \ send a payload to a `REST API` endpoint and receive back a response (output).\
    \ Here is a diagram in Figure [10-5](#496204_2_En_10_Chapter.xhtml#Fig5) my colleague\
    \ Davide Mauri built in 2022 when we first released the public preview of this\
    \ feature.\n\n![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig5_HTML.jpg)\n\
    \nFigure 10-5\n\nThe original Solaria project\n\nThe solution is generic in the\
    \ sense that you can send `JSON`, `XML`, or `TEXT` (depending on the protocol\
    \ of the endpoint) to any `REST API` for a specific purpose. The `REST API` can\
    \ process the input and optionally respond back with an answer (or response/output)\
    \ which is in the form of character data. Based on the protocol or the `REST API`\
    \ endpoint, the character data may be `JSON`, `XML`, or just `TEXT`.\n\nHere is\
    \ a code fragment to retrieve data from a table in the database and send the data\
    \ as a message to Azure Event Hub (which can then process the message to perform\
    \ some type of action):\n\n```sql\nDECLARE @Id UNIQUEIDENTIFIER = NEWID();\nDECLARE\
    \ @payload NVARCHAR(MAX) = (\n    SELECT *\n    FROM (\n        VALUES (@Id, 'John',\
    \ 'Doe')\n    ) AS UserTable(UserId, FirstName, LastName)\n    FOR JSON AUTO,\n\
    \    WITHOUT_ARRAY_WRAPPER\n)\nDECLARE @url NVARCHAR(4000) = 'https://.servicebus.windows.net/from-sql/messages';\n\
    DECLARE @headers NVARCHAR(4000) = N'{\"BrokerProperties\": \"' + STRING_ESCAPE('{\"\
    PartitionKey\": \"' + CAST(@Id AS NVARCHAR(36)) + '\"}', 'json') + '\"}'\nDECLARE\
    \ @ret INT, @response NVARCHAR(MAX);\nEXEC @ret = sp_invoke_external_rest_endpoint\
    \ @url = @url,\n    @headers = @headers,\n    @credential = [https://.servicebus.windows.net],\n\
    \    @payload = @payload,\n    @response = @response OUTPUT;\nSELECT @ret AS ReturnCode,\
    \ @response AS Response;\n```\n\nThe input is optional as some `REST API` endpoints\
    \ can be used to “get” data. Here is an example of retrieving data in an Azure\
    \ Storage file:\n\n```sql\nDECLARE @ret INT, @response NVARCHAR(MAX);\nEXEC @ret\
    \ = sp_invoke_external_rest_endpoint\n    @url = N'https://blobby.blob.core.windows.net/datafiles/my_favorite_blobs.txt?sp=r&st=2023-07-28T19:56:07Z&se=2023-07-29T03:56:07Z&spr=https&sv=2022-11-02&sr=b&sig=XXXXXX1234XXXXXX6789XXXXX',\n\
    \    @headers = N'{\"Accept\":\"application/xml\"}',\n    @method = 'GET',\n \
    \   @response = @response OUTPUT;\nSELECT @ret AS ReturnCode, @response AS Response;\n\
    ```\n\nWe support a known set of endpoints, but the list is vast at [`https://learn.microsoft.com/sql/relational-databases/system-stored-procedures/sp-invoke-external-rest-endpoint-transact-sql?view=azuresqldb-current&tabs=request-headers#allowed-endpoints`](https://learn.microsoft.com/sql/relational-databases/system-stored-procedures/sp-invoke-external-rest-endpoint-transact-sql%3Fview%3Dazuresqldb-current%26tabs%3Drequest-headers%23allowed-endpoints).\n\
    \nWhen we first built this feature, we were not as focused on GenAI applications\
    \ as we are today. However, you can imagine now a huge focus is on AI. Fortunately,\
    \ many AI hosting engines or inference endpoints support `REST`. You will see\
    \ later in this chapter in the section called “SQL and AI” how you can use this\
    \ feature to build any AI application inside `Azure SQL`.\n\nAt the time of the\
    \ writing of this book, `sp_invoke_external_rest_endpoint` is generally available\
    \ for `Azure SQL Database` and is in preview for `Azure SQL Managed Instance`.\
    \ My colleague Brian Spendolini is the lead PM for this feature, so follow his\
    \ blogs to see more examples at [`https://devblogs.microsoft.com/azure-sql/author/bspendolini`](https://devblogs.microsoft.com/azure-sql/author/bspendolini)."
  raw: '### Query Intelligence


    Query intelligence encompasses features built into the database engine to make
    your applications faster called Intelligent Query Processing (IQP) and capabilities
    that *use* the engine like Automatic Tuning.


    I covered this topic extensively in Chapter [7](#496204_2_En_7_Chapter.xhtml)
    of the book. Learn more about IQP at [`https://aka.ms/iqp`](https://aka.ms/iqp).
    Learn more about Automatic Tuning at [`https://aka.ms/sqlautotuning`](https://aka.ms/sqlautotuning).


    One more topic not covered in the book so far was an enhancement since the first
    edition of this book called optimized locking. Azure SQL Database now has an improved
    lock management system called **optimizing locking**. Using features like Accelerated
    Database Recovery (versioning) and Read Committed Snapshot Isolation (RCSI), optimized
    locking reduces the number of locks required for large transactions reducing lock
    memory and lock escalations. Any developer that struggles with lock escalation
    will appreciate what is now built into the engine to eliminate them. Read more
    at [`https://learn.microsoft.com/sql/relational-databases/performance/optimized-locking`](https://learn.microsoft.com/sql/relational-databases/performance/optimized-locking).


    ## REST API Integration


    Connecting your data in SQL *inside* the engine has many advantages:


    *   You can use the security of the engine with all the standard security principles
    and access you know.


    *   Like stored procedures, you are reducing application traffic and use a server-side
    programming model to make your data integration more efficient.


    I feel like Polybase has that similar type of advantage. With Azure SQL, we have
    built a new feature to interface with any REST API endpoint. Codename Project
    Solaria, we now have a system stored procedure, called **sp_invoke_external_rest_endpoint**,
    to send a *payload* to a REST API endpoint and receive back a response (output).
    Here is a diagram in Figure [10-5](#496204_2_En_10_Chapter.xhtml#Fig5) my colleague
    Davide Mauri built in 2022 when we first released the public preview of this feature.


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig5_HTML.jpg)


    Figure 10-5


    The original Solaria project


    The solution is generic in the sense that you can send JSON, XML, or TEXT (depending
    on the protocol of the endpoint) to any REST API for a specific purpose. The REST
    API can process the input and optionally respond back with an answer (or response/output)
    which is in the form of character data. Based on the protocol or the REST API
    endpoint, the character data may be JSON, XML, or just TEXT.


    Here is a code fragment to retrieve data from a table in the database and send
    the data as a message to Azure Event Hub (which can then process the message to
    perform some type of action):


    ```

    DECLARE @Id UNIQUEIDENTIFIER = NEWID();

    DECLARE @payload NVARCHAR(MAX) = (

    SELECT *

    FROM (

    VALUES (@Id, ''John'', ''Doe'')

    ) AS UserTable(UserId, FirstName, LastName)

    FOR JSON AUTO,

    WITHOUT_ARRAY_WRAPPER

    )

    DECLARE @url NVARCHAR(4000) = ''https://.servicebus.windows.net/from-sql/messages'';

    DECLARE @headers NVARCHAR(4000) = N''{"BrokerProperties": "'' + STRING_ESCAPE(''{"PartitionKey":
    "'' + CAST(@Id AS NVARCHAR(36)) + ''"}'', ''json'') + ''"}''

    DECLARE @ret INT, @response NVARCHAR(MAX);

    EXEC @ret = sp_invoke_external_rest_endpoint @url = @url,

    @headers = @headers,

    @credential = [https://.servicebus.windows.net],

    @payload = @payload,

    @response = @response OUTPUT;

    SELECT @ret AS ReturnCode, @response AS Response;

    ```


    The input is optional as some REST API endpoints can be used to “get” data. Here
    is an example of retrieving data in an Azure Storage file:


    ```

    DECLARE @ret INT, @response NVARCHAR(MAX);

    EXEC @ret = sp_invoke_external_rest_endpoint

    @url = N''https://blobby.blob.core.windows.net/datafiles/my_favorite_blobs.txt?sp=r&st=2023-07-28T19:56:07Z&se=2023-07-29T03:56:07Z&spr=https&sv=2022-11-02&sr=b&sig=XXXXXX1234XXXXXX6789XXXXX'',

    @headers = N''{"Accept":"application/xml"}'',

    @method = ''GET'',

    @response = @response OUTPUT;

    SELECT @ret AS ReturnCode, @response AS Response;

    ```


    We support a known set of endpoints, but the list is vast at [`https://learn.microsoft.com/sql/relational-databases/system-stored-procedures/sp-invoke-external-rest-endpoint-transact-sql?view=azuresqldb-current&tabs=request-headers#allowed-endpoints`](https://learn.microsoft.com/sql/relational-databases/system-stored-procedures/sp-invoke-external-rest-endpoint-transact-sql%253Fview%253Dazuresqldb-current%2526tabs%253Drequest-headers%2523allowed-endpoints).


    When we first built this feature, we were not as focused on GenAI applications
    as we are today. However, you can imagine now a huge focus is on AI. Fortunately,
    many *AI hosting engines or* *inference endpoints* support REST. You will see
    later in this chapter in the section called “SQL and AI” how you can use this
    feature to build any AI application *inside* Azure SQL.


    At the time of the writing of this book, sp_invoke_external_rest_endpoint is generally
    available for Azure SQL Database and is in preview for Azure SQL Managed Instance.
    My colleague Brian Spendolini is the lead PM for this feature, so follow his blogs
    to see more examples at [`https://devblogs.microsoft.com/azure-sql/author/bspendolini`](https://devblogs.microsoft.com/azure-sql/author/bspendolini).'
  trans: "### 查询智能\n\n查询智能包含内置于数据库引擎中以使您的应用程序运行更快的功能，称为**智能查询处理** (`IQP`)，以及利用引擎的功能，如\
    \ `Automatic Tuning`。\n\n我在本书的第 7 章中广泛介绍了这个主题。请在 [`https://aka.ms/iqp`](https://aka.ms/iqp)\
    \ 了解更多关于 `IQP` 的信息。请在 [`https://aka.ms/sqlautotuning`](https://aka.ms/sqlautotuning)\
    \ 了解更多关于 `Automatic Tuning` 的信息。\n\n本书第一版以来新增的一个尚未涉及的增强功能是优化的锁定。`Azure SQL Database`\
    \ 现在拥有一个改进的锁管理系统，称为**优化锁定**。通过使用加速数据库恢复（版本控制）和**已提交读快照隔离** (`RCSI`) 等功能，优化锁定减少了大型事务所需的锁数量，从而减少了锁内存和锁升级。任何受到锁升级困扰的开发人员都会欣赏现在内置于引擎中以消除它们的功能。请在\
    \ [`https://learn.microsoft.com/sql/relational-databases/performance/optimized-locking`](https://learn.microsoft.com/sql/relational-databases/performance/optimized-locking)\
    \ 阅读更多信息。\n\n## REST API 集成\n\n在引擎内部连接您的 SQL 数据有很多优势：\n\n*   您可以利用引擎的安全性，使用您所熟知的所有标准安全原则和访问控制。\n\
    *   像存储过程一样，您减少了应用程序流量，并使用服务器端编程模型使数据集成更加高效。\n\n我觉得 `Polybase` 具有类似的优势。借助 `Azure\
    \ SQL`，我们构建了一个新功能来对接任何 `REST API` 端点。代号为 Project Solaria，我们现在有一个名为 `sp_invoke_external_rest_endpoint`\
    \ 的系统存储过程，用于向 `REST API` 端点发送有效负载并接收响应（输出）。下面是我同事 Davide Mauri 在 2022 年我们首次发布此功能的公开预览版时制作的图\
    \ 10-5 中的图表。\n\n![](img/496204_2_En_10_Fig5_HTML.jpg)\n\n图 10-5\n\n最初的 Solaria\
    \ 项目\n\n该解决方案是通用的，因为您可以将 `JSON`、`XML` 或 `TEXT`（取决于端点的协议）发送到任何 `REST API` 以实现特定目的。`REST\
    \ API` 可以处理输入，并可选择以字符数据形式返回答案（或响应/输出）。根据协议或 `REST API` 端点，字符数据可能是 `JSON`、`XML`\
    \ 或仅仅是 `TEXT`。\n\n以下是一个代码片段，用于从数据库表中检索数据，并将数据作为消息发送到 Azure Event Hub（然后可以处理该消息以执行某种操作）：\n\
    \n```sql\nDECLARE @Id UNIQUEIDENTIFIER = NEWID();\nDECLARE @payload NVARCHAR(MAX)\
    \ = (\n    SELECT *\n    FROM (\n        VALUES (@Id, 'John', 'Doe')\n    ) AS\
    \ UserTable(UserId, FirstName, LastName)\n    FOR JSON AUTO,\n    WITHOUT_ARRAY_WRAPPER\n\
    )\nDECLARE @url NVARCHAR(4000) = 'https://.servicebus.windows.net/from-sql/messages';\n\
    DECLARE @headers NVARCHAR(4000) = N'{\"BrokerProperties\": \"' + STRING_ESCAPE('{\"\
    PartitionKey\": \"' + CAST(@Id AS NVARCHAR(36)) + '\"}', 'json') + '\"}'\nDECLARE\
    \ @ret INT, @response NVARCHAR(MAX);\nEXEC @ret = sp_invoke_external_rest_endpoint\
    \ @url = @url,\n    @headers = @headers,\n    @credential = [https://.servicebus.windows.net],\n\
    \    @payload = @payload,\n    @response = @response OUTPUT;\nSELECT @ret AS ReturnCode,\
    \ @response AS Response;\n```\n\n输入是可选的，因为一些 `REST API` 端点可用于“获取”数据。以下是从 Azure\
    \ 存储文件中检索数据的示例：\n\n```sql\nDECLARE @ret INT, @response NVARCHAR(MAX);\nEXEC @ret\
    \ = sp_invoke_external_rest_endpoint\n    @url = N'https://blobby.blob.core.windows.net/datafiles/my_favorite_blobs.txt?sp=r&st=2023-07-28T19:56:07Z&se=2023-07-29T03:56:07Z&spr=https&sv=2022-11-02&sr=b&sig=XXXXXX1234XXXXXX6789XXXXX',\n\
    \    @headers = N'{\"Accept\":\"application/xml\"}',\n    @method = 'GET',\n \
    \   @response = @response OUTPUT;\nSELECT @ret AS ReturnCode, @response AS Response;\n\
    ```\n\n我们支持一组已知的端点，但完整的列表请见 [`https://learn.microsoft.com/sql/relational-databases/system-stored-procedures/sp-invoke-external-rest-endpoint-transact-sql?view=azuresqldb-current&tabs=request-headers#allowed-endpoints`](https://learn.microsoft.com/sql/relational-databases/system-stored-procedures/sp-invoke-external-rest-endpoint-transact-sql?view=azuresqldb-current&tabs=request-headers#allowed-endpoints)。\n\
    \n当我们最初构建此功能时，我们并未像今天这样专注于 GenAI 应用程序。然而，您可以想象现在一个巨大的焦点是 AI。幸运的是，许多 AI 托管引擎或推理端点都支持\
    \ `REST`。您将在本章后面的“SQL 和 AI”部分看到如何使用此功能在 `Azure SQL` 内部构建任何 AI 应用程序。\n\n在撰写本书时，`sp_invoke_external_rest_endpoint`\
    \ 对于 `Azure SQL Database` 已正式发布，对于 `Azure SQL Managed Instance` 处于预览阶段。我的同事 Brian\
    \ Spendolini 是此功能的首席产品经理，请关注他的博客以查看更多示例：[`https://devblogs.microsoft.com/azure-sql/author/bspendolini`](https://devblogs.microsoft.com/azure-sql/author/bspendolini)。"
- fmt: '## Data API Builder and GraphQL


    Any developer that must build code to interact with a database knows that no matter
    what programming language you use, there is some overhead to connecting and querying
    a database. Using a database is usually all about getting *authenticated* and
    then running *queries* (or stored procedures). The code required to make all of
    that happen is sometimes referred to as *plumbing* code.


    What if there was a simpler way to build an app and reduce or even eliminate the
    plumbing code? Along comes **Data API Builder** (DAB). DAB is cross-platform,
    open source, and independent of language, technology, and frameworks. It requires
    zero code and a single configuration file. Best of all, it''s free (you can view
    the open source GitHub repo at [`https://github.com/Azure/data-api-builder`](https://github.com/Azure/data-api-builder)).


    The best way to show how this works is with a diagram, and the documentation provides
    a very nice one in Figure [10-6](#496204_2_En_10_Chapter.xhtml#Fig6).


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig6_HTML.jpg)


    Figure 10-6


    DATA API Builder (DAB) architecture


    While DAB can work with other databases, I’ll focus on how it works with Azure
    SQL.


    DAB is a software runtime (either running as its own service or within an application
    like Azure Static Web Apps) that effectively translates your configuration of
    a connection and schema into endpoints that support GraphQL or REST. You may have
    heard of REST, but if you are not familiar with GraphQL, you can learn the basics
    at [`https://graphql.org`](https://graphql.org). You also have the ability to
    run DAB in a container.


    As an application developer, you can now compose REST or GraphQL formatted text
    or commands which DAB will turn into the actual calls using a driver to the back-end
    database to connect and execute queries.


    I like this example in the documentation to show some basics: [`https://learn.microsoft.com/azure/data-api-builder/database-objects#stored-procedures`](https://learn.microsoft.com/azure/data-api-builder/database-objects%2523stored-procedures).


    In the example, there is a database with tables for books and authors (the full
    schema can be found at [`https://github.com/Azure/data-api-builder/tree/main/samples/getting-started/azure-sql-db`](https://github.com/Azure/data-api-builder/tree/main/samples/getting-started/azure-sql-db)).
    Let’s say you have a stored procedure that selects books written by an author.
    With DAB and REST, you can compose a string like the following:


    ```

    GET http:///api/GetCowrittenBooksByAuthor?author=isaac%20asimov

    ```


    This will call the stored procedure with a parameter of “Isaac Asimov” and return
    results to the calling application through the endpoint.


    I consider DAB a game changer for developers. I believe it can save you time and
    improve the quality of your application because it is just less lines of code
    for you to write and maintain. Start your journey at [`https://aka.ms/dab`](https://aka.ms/dab).
    Also, watch this Data Exposed episode with my colleague Jerry Nixon, the lead
    PM for this feature, at [`https://learn.microsoft.com/shows/data-exposed/data-api-builder-is-now-generally-available-data-exposed`](https://learn.microsoft.com/shows/data-exposed/data-api-builder-is-now-generally-available-data-exposed).


    ## DevOps, GitHub, and Containers


    Developers need to have the tools and capabilities to be efficient for data-driven
    applications. Azure SQL has three features that support developers in these areas.


    ### Database Projects


    Developers need to be able to build database projects, create new databases, new
    data-tier applications (DACs), and update existing databases and data-tier applications.
    These projects use tools like `sqlpackage.exe`, SQL Server Data Tools in Visual
    Studio (SSDT), DACPAC, and BACPAC files. We have had these technologies for some
    time to assist developers to build out an application that includes database objects
    and data.


    One advancement in this area we have created is **SDK-style SQL projects**. SDK-style
    SQL projects are especially advantageous for applications shipped through pipelines
    or built in cross-platform environments.


    My colleague Drew Skwiers-Koballa explains SDK-style SQL project differences in
    this excellent blog post at [`https://techcommunity.microsoft.com/t5/azure-sql-blog/microsoft-build-sql-the-next-frontier-of-sql-projects/ba-p/3290628`](https://techcommunity.microsoft.com/t5/azure-sql-blog/microsoft-build-sql-the-next-frontier-of-sql-projects/ba-p/3290628).
    In summary, the advantages are


    *   The “globbing” (wildcard) file selection for the project to choose .sql files.
    This greatly reduces the size of the definition of the project.

    *   The project can use `dotnet build` which provides class-platform compatibility
    and a simpler experience, including in a CI/CD pipeline.

    *   A seamless integration with GitHub Actions for DevOps scenarios.


    The initial release of SDK-style projects comes with Visual Studio Code, but I
    believe for the future you will see this incorporated into Visual Studio.


    ### GitHub Actions


    Any new DevOps project must have an efficient method through a CI/CD pipeline
    for code to be developed, tested, and released into production.


    We support today this process with Azure DevOps and Azure Pipelines, which you
    can read about at [`https://learn.microsoft.com/azure/devops/pipelines/targets/azure-sqldb`](https://learn.microsoft.com/azure/devops/pipelines/targets/azure-sqldb).


    GitHub has become such a standard for development that we felt we needed to support
    the same type of DevOps capability. Therefore, we built a feature that integrates
    with GitHub actions ([`https://docs.github.com/actions`](https://docs.github.com/actions))
    called **sql-action**.


    `sql-action` allows you to declare a set of steps through a YAML file (`.yml`)
    to build and test your database project using SDK-style SQL projects, containers,
    and `sqlcmd` to help run tests.


    Note


    `sql-action` uses `go-sqlcmd` for `sqlcmd` capabilities. `go-sqlcmd` (which is
    called `sqlcmd` – I know confusing) is a new version of `sqlcmd` built on the
    Go language and is completely open source. See the full story at [`https://github.com/microsoft/go-sqlcmd`](https://github.com/microsoft/go-sqlcmd).


    I wanted to test out what is possible here so built an example you can try yourself
    at [`https://github.com/microsoft/bobsql/tree/master/demos/devops_sqlcontainers/githubactions`](https://github.com/microsoft/bobsql/tree/master/demos/devops_sqlcontainers/githubactions).


    My concept here was to use GitHub actions to create the database and all the database
    objects in Azure SQL Database. But I used GitHub actions to first test this in
    a SQL Server 2002 container. And here is the amazing part: GitHub supports a concept
    called a *runner*. This allows me to test out my code and my SQL Database in a
    VM or container, for free! (If you need larger sizes, you can then upgrade to
    a paid version.)


    In my scenario, I wanted my GitHub action to run a “smoke test” to ensure the
    performance of a specific query was acceptable and did not encounter any warnings,
    for example, the detection of an anti-pattern query.


    Any change to database objects like a stored procedure is automatically detected
    when a commit is done to the GitHub repo. The action automatically kicks in and
    runs my “smoke test.” The action fails if it detects an issue and the commit fails.
    Drew has created a great set of documents on this at [`https://github.com/Azure/sql-action`](https://github.com/Azure/sql-action).'
  raw: '## Data API Builder and GraphQL


    Any developer that must build code to interact with a database knows that no matter
    what programming language you use, there is some overhead to connecting and querying
    a database. Using a database is usually all about getting *authenticated* and
    then running *queries* (or stored procedures). The code required to make all of
    that happen is sometimes referred to as *plumbing* code.


    What if there was a simpler way to build an app and reduce or even eliminate the
    plumbing code? Along comes **Data API Builder** (DAB). DAB is cross-platform,
    open source, and independent of language, technology, and frameworks. It requires
    zero code and a single configuration file. Best of all, it''s free (you can view
    the open source GitHub repo at [`https://github.com/Azure/data-api-builder`](https://github.com/Azure/data-api-builder)).


    The best way to show how this works is with a diagram, and the documentation provides
    a very nice one in Figure [10-6](#496204_2_En_10_Chapter.xhtml#Fig6).


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig6_HTML.jpg)


    Figure 10-6


    DATA API Builder (DAB) architecture


    While DAB can work with other databases, I’ll focus on how it works with Azure
    SQL.


    DAB is a software runtime (either running as its own service or within an application
    like Azure Static Web Apps) that effectively translates your configuration of
    a connection and schema into endpoints that support GraphQL or REST. You may have
    heard of REST, but if you are not familiar with GraphQL, you can learn the basics
    at [`https://graphql.org`](https://graphql.org). You also have the ability to
    run DAB in a container.


    As an application developer, you can now compose REST or GraphQL formatted text
    or commands which DAB will turn into the actual calls using a driver to the back-end
    database to connect and execute queries.


    I like this example in the documentation to show some basics: [`https://learn.microsoft.com/azure/data-api-builder/database-objects#stored-procedures`](https://learn.microsoft.com/azure/data-api-builder/database-objects%2523stored-procedures).


    In the example, there is a database with tables for books and authors (the full
    schema can be found at [`https://github.com/Azure/data-api-builder/tree/main/samples/getting-started/azure-sql-db`](https://github.com/Azure/data-api-builder/tree/main/samples/getting-started/azure-sql-db)).
    Let’s say you have a stored procedure that selects books written by an author.
    With DAB and REST, you can compose a string like the following:


    ```

    GET http:///api/GetCowrittenBooksByAuthor?author=isaac%20asimov

    ```


    This will call the stored procedure with a parameter of “Isaac Asimov” and return
    results to the calling application through the endpoint.


    I consider DAB a game changer for developers. I believe it can save you time and
    improve the quality of your application because it is just less lines of code
    for you to write and maintain. Start your journey at [`https://aka.ms/dab`](https://aka.ms/dab).
    Also, watch this Data Exposed episode with my colleague Jerry Nixon, the lead
    PM for this feature, at [`https://learn.microsoft.com/shows/data-exposed/data-api-builder-is-now-generally-available-data-exposed`](https://learn.microsoft.com/shows/data-exposed/data-api-builder-is-now-generally-available-data-exposed).


    ## DevOps, GitHub, and Containers


    Developers need to have the tools and capabilities to be efficient for data-driven
    applications. Azure SQL has three features that support developers in these areas.


    ### Database Projects


    Developers need to be able to build database projects, create new databases, new
    data-tier applications (DACs), and update existing databases and data-tier applications.
    These projects use tools like sqlpackage.exe, SQL Server Data Tools in Visual
    Studio (SSDT), DACPAC, and BACPAC files. We have had these technologies for some
    time to assist developers to build out an application that includes database objects
    and data.


    One advancement in this area we have created is **SDK-style SQL projects**. SDK-style
    SQL projects are especially advantageous for applications shipped through pipelines
    or built in cross-platform environments.


    My colleague Drew Skwiers-Koballa explains SDK-style SQL project differences in
    this excellent blog post at [`https://techcommunity.microsoft.com/t5/azure-sql-blog/microsoft-build-sql-the-next-frontier-of-sql-projects/ba-p/3290628`](https://techcommunity.microsoft.com/t5/azure-sql-blog/microsoft-build-sql-the-next-frontier-of-sql-projects/ba-p/3290628).
    In summary, the advantages are


    *   The “globbing” (wildcard) file selection for the project to choose .sql files.
    This greatly reduces the size of the definition of the project.


    *   The project can use **dotnet build** which provides class-platform compatibility
    and a simpler experience, including in a CI/CD pipeline.


    *   A seamless integration with GitHub Actions for DevOps scenarios.


    The initial release of SDK-style projects comes with Visual Studio Code, but I
    believe for the future you will see this incorporated into Visual Studio.


    ### GitHub Actions


    Any new DevOps project must have an efficient method through a CI/CD pipeline
    for code to be developed, tested, and released into production.


    We support today this process with Azure DevOps and Azure Pipelines, which you
    can read about at [`https://learn.microsoft.com/azure/devops/pipelines/targets/azure-sqldb`](https://learn.microsoft.com/azure/devops/pipelines/targets/azure-sqldb).


    GitHub has become such a standard for development that we felt we needed to support
    the same type of DevOps capability. Therefore, we built a feature that integrates
    with GitHub actions ([`https://docs.github.com/actions`](https://docs.github.com/actions))
    called **sql-action**.


    sql-action allows you to declare a set of steps through a YAML file (.yml) to
    build and test your database project using SDK-style SQL projects, containers,
    and sqlcmd to help run tests.


    Note


    sql-action uses go-sqlcmd for sqlcmd capabilities. go-sqlcmd (which is called
    sqlcmd – I know confusing) is a new version of sqlcmd built on the Go language
    and is completely open source. See the full story at [`https://github.com/microsoft/go-sqlcmd`](https://github.com/microsoft/go-sqlcmd).


    I wanted to test out what is possible here so built an example you can try yourself
    at [`https://github.com/microsoft/bobsql/tree/master/demos/devops_sqlcontainers/githubactions`](https://github.com/microsoft/bobsql/tree/master/demos/devops_sqlcontainers/githubactions).


    My concept here was to use GitHub actions to create the database and all the database
    objects in Azure SQL Database. But I used GitHub actions to first test this in
    a SQL Server 2002 container. And here is the amazing part: GitHub supports a concept
    called a *runner*. This allows me to test out my code and my SQL Database in a
    VM or container, for free! (If you need larger sizes, you can then upgrade to
    a paid version.)


    In my scenario, I wanted my GitHub action to run a “smoke test” to ensure the
    performance of a specific query was acceptable and did not encounter any warnings,
    for example, the detection of an anti-pattern query.


    Any change to database objects like a stored procedure is automatically detected
    when a commit is done to the GitHub repo. The action automatically kicks in and
    runs my “smoke test.” The action fails if it detects an issue and the commit fails.
    Drew has created a great set of documents on this at [`https://github.com/Azure/sql-action`](https://github.com/Azure/sql-action).'
  trans: '

    ## 数据 API 生成器与 GraphQL


    任何需要编写代码与数据库交互的开发者都知道，无论你使用哪种编程语言，连接和查询数据库总会有一些额外的工作。使用数据库通常涉及*身份验证*和运行*查询*（或存储过程）。使这一切得以实现的代码有时被称为*样板*代码。


    如果有一种更简单的方法来构建应用程序，并减少甚至消除这些样板代码呢？**数据 API 生成器**（DAB）应运而生。DAB 是跨平台的、开源的，并且独立于语言、技术和框架。它需要零代码和单个配置文件。最重要的是，它是免费的（你可以在
    [`https://github.com/Azure/data-api-builder`](https://github.com/Azure/data-api-builder)
    查看开源的 GitHub 仓库）。


    展示其工作原理的最佳方式是通过图表，文档在图 10-6 中提供了一个非常好的示意图。


    ![](img/496204_2_En_10_Fig6_HTML.jpg)


    图 10-6


    数据 API 生成器 (DAB) 架构


    虽然 DAB 可以与其他数据库配合使用，但我将重点介绍它如何与 Azure SQL 协同工作。


    DAB 是一个软件运行时（可以作为独立服务运行，也可以在 Azure 静态 Web 应用等应用程序内运行），它有效地将你对连接和架构的配置转换为支持 GraphQL
    或 REST 的端点。你可能听说过 REST，但如果不熟悉 GraphQL，可以在 [`https://graphql.org`](https://graphql.org)
    学习基础知识。你也可以选择在容器中运行 DAB。


    作为应用程序开发者，你现在可以编写 REST 或 GraphQL 格式的文本或命令，DAB 会通过驱动程序将其转换为实际的后端数据库调用，以连接并执行查询。


    我喜欢文档中的这个例子来展示一些基础知识：[`https://learn.microsoft.com/azure/data-api-builder/database-objects#stored-procedures`](https://learn.microsoft.com/azure/data-api-builder/database-objects%2523stored-procedures)。


    在这个示例中，有一个包含 books 和 authors 表的数据库（完整架构可以在 [`https://github.com/Azure/data-api-builder/tree/main/samples/getting-started/azure-sql-db`](https://github.com/Azure/data-api-builder/tree/main/samples/getting-started/azure-sql-db)
    找到）。假设你有一个选择某位作者所著书籍的存储过程。使用 DAB 和 REST，你可以组合出如下字符串：


    ```

    GET http:///api/GetCowrittenBooksByAuthor?author=isaac%20asimov

    ```


    这将调用参数为“Isaac Asimov”的存储过程，并通过端点将结果返回给调用应用程序。


    我认为 DAB 对开发者来说是一个游戏规则的改变者。我相信它可以为你节省时间并提高应用程序质量，因为它减少了你需要编写和维护的代码行数。在 [`https://aka.ms/dab`](https://aka.ms/dab)
    开始你的旅程吧。同时，请观看我的同事、该功能的首席产品经理 Jerry Nixon 参与的这期 Data Exposed 节目：[`https://learn.microsoft.com/shows/data-exposed/data-api-builder-is-now-generally-available-data-exposed`](https://learn.microsoft.com/shows/data-exposed/data-api-builder-is-now-generally-available-data-exposed)。


    ## DevOps、GitHub 与容器


    开发者需要具备高效的工具和能力，以构建数据驱动的应用程序。Azure SQL 有三个特性在这些领域为开发者提供支持。


    ### 数据库项目


    开发者需要能够构建数据库项目、创建新数据库、新的数据层应用程序（DAC）以及更新现有数据库和数据层应用程序。这些项目使用诸如 `sqlpackage.exe`、Visual
    Studio 中的 SQL Server 数据工具（SSDT）、DACPAC 和 BACPAC 文件等工具。我们拥有这些技术已有一段时间，以帮助开发者构建包含数据库对象和数据的应用程序。


    我们在这个领域取得的一项进步是 **SDK 风格的 SQL 项目**。SDK 风格的 SQL 项目对于通过流水线交付或在跨平台环境中构建的应用程序尤其有利。


    我的同事 Drew Skwiers-Koballa 在这篇精彩的博文 [`https://techcommunity.microsoft.com/t5/azure-sql-blog/microsoft-build-sql-the-next-frontier-of-sql-projects/ba-p/3290628`](https://techcommunity.microsoft.com/t5/azure-sql-blog/microsoft-build-sql-the-next-frontier-of-sql-projects/ba-p/3290628)
    中解释了 SDK 风格 SQL 项目的区别。总而言之，其优势包括：


    *   项目使用“通配符”文件选择（globbing）来选取 .sql 文件。这大大减小了项目定义的规模。

    *   项目可以使用 `dotnet build`，这提供了跨平台兼容性和更简单的体验，包括在 CI/CD 流水线中。

    *   与 GitHub Actions 无缝集成，适用于 DevOps 场景。


    SDK 风格项目的初始版本随 Visual Studio Code 发布，但我相信未来它会被集成到 Visual Studio 中。


    ### GitHub Actions


    任何新的 DevOps 项目都必须有一种通过 CI/CD 流水线进行代码开发、测试和发布到生产的高效方法。


    我们目前通过 Azure DevOps 和 Azure Pipelines 支持这一过程，你可以在 [`https://learn.microsoft.com/azure/devops/pipelines/targets/azure-sqldb`](https://learn.microsoft.com/azure/devops/pipelines/targets/azure-sqldb)
    阅读相关内容。


    GitHub 已经成为开发的行业标准，因此我们觉得有必要支持相同类型的 DevOps 能力。因此，我们构建了一个与 GitHub Actions（[`https://docs.github.com/actions`](https://docs.github.com/actions)）集成的功能，称为
    **sql-action**。


    `sql-action` 允许你通过 YAML 文件（`.yml`）声明一组步骤，以使用 SDK 风格的 SQL 项目、容器和 `sqlcmd` 来帮助运行测试，从而构建和测试你的数据库项目。


    注意


    `sql-action` 使用 `go-sqlcmd` 来获得 `sqlcmd` 功能。`go-sqlcmd`（也被称为 `sqlcmd`——我知道这很令人困惑）是基于
    Go 语言构建的新版本 `sqlcmd`，并且是完全开源的。完整故事请见 [`https://github.com/microsoft/go-sqlcmd`](https://github.com/microsoft/go-sqlcmd)。


    我想测试一下这里可以实现什么，因此构建了一个示例，你可以在 [`https://github.com/microsoft/bobsql/tree/master/demos/devops_sqlcontainers/githubactions`](https://github.com/microsoft/bobsql/tree/master/demos/devops_sqlcontainers/githubactions)
    亲自尝试。


    我在这里的想法是使用 GitHub Actions 在 Azure SQL 数据库中创建数据库和所有数据库对象。但我首先使用 GitHub Actions
    在 SQL Server 2002 容器中进行了测试。而最神奇的部分是：GitHub 支持一个称为 *运行器* 的概念。这允许我在虚拟机或容器中免费测试我的代码和
    SQL 数据库！（如果你需要更大的规模，你可以升级到付费版本。）


    在我的场景中，我期望我的 GitHub Action 运行一个“冒烟测试”，以确保特定查询的性能是可接受的，并且没有遇到任何警告，例如检测到反模式查询。


    对数据库对象（如存储过程）的任何更改，当提交到 GitHub 仓库时都会被自动检测到。该操作自动启动并运行我的“冒烟测试”。如果检测到问题，操作会失败，提交也会失败。Drew
    在 [`https://github.com/Azure/sql-action`](https://github.com/Azure/sql-action)
    创建了一套很好的文档来说明这一点。

    '
- fmt: '# Containers


    Containers are simply one of the best innovations I’ve seen over the last several
    years for developers. SQL Server is fully supported as a container, and I covered
    this topic extensively in *Pro SQL Server Linux*, *SQL Server 2019 Revealed*,
    and *SQL Server 2022 Revealed* books. Containers just make it so easy to package
    a *solution*, including solutions that integrate with SQL Server.


    For Azure SQL, we have recently released a concept called `Dev Container templates
    for Azure SQL Database`, a project led by my colleague Carlos Robles. One of the
    major benefits I talked about SQL containers in the books listed above is *consistency*.
    I can deploy a SQL container with a consistent version and even include specific
    database scripts or whatever tools I want so that the environment is consistent
    to my requirements cross-platform (Linux, MacOS, Windows) or multiclouds.


    Dev Container templates extend that concept to ensure I have a complete consistent
    development environment, including SQL Server, developer frameworks, and even
    developer tools that allow for SDK-style SQL projects. In addition, they provide
    a seamless integration with our GitHub `sql-action`.


    Take a look at this blog by Carlos to introduce the topic at [`https://devblogs.microsoft.com/azure-sql/azure-sql-dev-containers`](https://devblogs.microsoft.com/azure-sql/azure-sql-dev-containers).


    > **Note**

    >

    > When I last talked to Carlos, one of the ideas we are considering is a SQL container
    that *behaves* like Azure SQL Database. In other words, the container would be
    a database engine that is versionless and matches the capabilities and limits
    of an Azure SQL Database giving you a great compatibility story with the cloud.


    ## SQL and AI


    I’ve told you the story in Chapter [7](#496204_2_En_7_Chapter.xhtml) of the book
    of how we designed and built the Microsoft Copilot skills in Azure SQL Database.
    At this same time in the summer of 2023, our team knew we needed to make investments
    in Azure SQL to support Generative AI (GenAI) applications. Our Copilot is an
    AI assistant and good example of a GenAI application. In fact, this application
    uses a Retrieval Augmented Generation (RAG) pattern. A RAG pattern is when an
    application *augments* a prompt to a language model.


    We also knew that a common technique for GenAI applications was to use the concept
    of `embeddings` to execute the concept of a `vector search` (or sometimes called
    a similarity search). Embeddings are vectors generated by an AI model and are
    understood by AI models. They are extremely powerful to perform *smarter* searching
    on your data. Most AI models that are used for this purpose are known as language
    models in the form of size: Large Language Models (LLM) down to Small Language
    Models (SLM).


    Figure [10-7](#496204_2_En_10_Chapter.xhtml#Fig7) is a diagram I often show how
    to put this story together.


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig7_HTML.jpg)


    *Figure 10-7. GenAI application fundamentals with databases*


    There are two main concepts to look at with this diagram:


    *   You can build RAG pattern applications by using standard SQL searching techniques
    to get data context and augment a prompt with those data results to send to a
    language model.

    *   Optionally, you can use a language model to generate embeddings based on text
    data in your database and store them as a vector in a column in a table. This
    makes SQL now a *vector store* supporting *native vectors*. Then you can take
    a prompt from an application to generate an embedding from that text. You can
    then use a vector search to compare the embedding from the prompt with embeddings
    in your database. Some models are specifically designed for this purpose and are
    called embedding models (many general-purpose language models can also generate
    embeddings, but embeddings models are generally more precise). Using SQL for this
    approach has advantages since you can combine your vector search with standard
    SQL searching techniques. I call this a `hybrid search`.


    You could take this concept a step further and take the results from the hybrid
    search and augment a prompt to a language model to create an even more precise
    RAG pattern.


    Let’s now look at specific ways you can build GenAI applications with SQL using
    these techniques. In addition, we will look at a different way to use a Copilot
    experience to generate SQL queries.


    ### GenAI and SQL


    To get started with GenAI and SQL, let’s look at a simple example to interact
    with an AI model inside the SQL engine. This example uses the REST API support
    I’ve describe earlier in the chapter and comes from a blog post from my colleague
    Brian Spendolini at [`https://devblogs.microsoft.com/azure-sql/using-openai-rest-endpoints-with-azure-sql-database`](https://devblogs.microsoft.com/azure-sql/using-openai-rest-endpoints-with-azure-sql-database):


    ```sql

    -- Declare a variable to store the API endpoint

    declare @url nvarchar(4000)

    = N''https://skynetbeta.openai.azure.com/openai/deployments/chattykathy/chat/completions?api-version=2023-07-01-preview'';

    declare @headers nvarchar(102) = N''{"api-key":"1001001sos1001001indistress"}''

    -- Declare a variable to store the payload (request body) for the POST request.

    declare @payload nvarchar(max) = N''{"messages":[[{"role":"system","content":"You
    are an AI assistant that helps people find information."},

    {"role":"system","content":"Why is the sky blue?"}]}''

    -- Declare variables for the return status of the procedure and --- the API response
    content

    declare @ret int, @response nvarchar(max);

    exec @ret = sp_invoke_external_rest_endpoint

    @url = @url,

    @method = ''POST'',

    @headers = @headers,

    @payload = @payload,

    @timeout = 230,

    @response = @response output;

    -- Display the return code of the procedure and the response from -- the API

    select @ret as ReturnCode, @response as Response;

    ```


    In this example, the URL for the AI model is fictional. You will see an example
    later in this section of an OpenAI model in Azure. One key point here is that
    you can send *prompts* to any AI model through REST endpoints. In this case, we
    are just asking a question to a *language model*. Notice the input or payload
    includes a system message to provide instructions on behavior and a question.


    Here is a fragment of the response which is in JSON format:


    ```json

    "choices": [

    {

    "index": 0,

    "finish_reason": "stop",

    "message": {

    "role": "assistant",

    "content": "The sky appears blue because when the sun''s light enters Earth''s
    atmosphere,

    it is scattered by the gases and particles in the air. This scattering causes
    the shorter

    blue wavelengths of light to be dispersed more than the other colors in the spectrum.

    This is known as Rayleigh scattering. As a result, when we look up at the sky
    during

    the day, we see it as blue."

    },

    ```


    This example probably doesn’t represent how you would use SQL to interact with
    a language model, so let’s look at three types of methods you can use for GenAI
    applications using Azure SQL, which you can see described in Figure [10-8](#496204_2_En_10_Chapter.xhtml#Fig8).


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig8_HTML.jpg)


    *Figure 10-8. AI scenarios for Azure SQL*


    Let’s look more at the scenarios in the figure and other concepts.'
