  trans: '### 设置和配置访问


    既然您已经创建了登录名和用户，接下来该做什么呢？就像您为 SQL Server 所做的那样，您需要根据应用程序要求，为数据库内的对象授予访问权限和权限。


    这可能涉及创建架构、角色，以及授予或撤销特定权限。如需了解 SQL Server 权限的入门知识，请参阅文档 [`https://learn.microsoft.com/sql/relational-databases/security/permissions-database-engine`](https://learn.microsoft.com/sql/relational-databases/security/permissions-database-engine)。


    自本书第一版以来，SQL 访问方面的一个很好的补充是一组**粒度更细**的服务器角色。这些新的固定服务器角色有特定的命名约定 `##MS_<role>##`。它们允许您使用**最低权限**原则，而不必为用户过度分配角色。例如，角色
    `##MS_ServerStateReader##` 拥有查看逻辑服务器或任何数据库的系统目录状态的权限，但除此之外没有其他权限。您可以在 [`https://learn.microsoft.com/azure/azure-sql/database/security-server-roles`](https://learn.microsoft.com/azure/azure-sql/database/security-server-roles)
    查看所有新的固定服务器角色。


    别忘了，Azure SQL 和 SQL Server 一样支持行级安全性 (RLS)。请在 [`https://learn.microsoft.com/sql/relational-databases/security/row-level-security`](https://learn.microsoft.com/sql/relational-databases/security/row-level-security)
    阅读有关 RLS 的内容。您可以在 [`https://learn.microsoft.com/azure/azure-sql/database/logins-create-manage`](https://learn.microsoft.com/azure/azure-sql/database/logins-create-manage)
    阅读更多关于 Azure SQL 数据库身份验证和访问控制的内容。


    ### Microsoft Purview


    考虑这样一种场景：您正试图为跨多个托管实例或数据库的登录和访问**大规模**设置权限。如果有一个集中控制和管理访问权限的地方就太好了。**Microsoft
    Purview DevOps** 策略正是为了应对这种场景而生。


    考虑这种情况：您需要组织内有人负责在您众多的 Azure SQL 数据库和逻辑服务器上执行所有性能监控。与其为此创建一个单独的登录名并授予其执行此任务的权限（请记住，我们有新的服务器固定角色用于此目的），您可以通过
    Purview 来管理您的逻辑服务器，然后设置一个策略，指定哪些 Microsoft Entra 帐户将拥有性能监控角色的访问权限（我们还支持 SQL 安全审计角色），这一切都可以*在一个位置*完成。


    现在，这些 Microsoft Entra 帐户将能够登录这些逻辑服务器并执行“性能监控”任务。此角色的实际权限可以在 [`https://learn.microsoft.com/purview/how-to-policies-devops-authoring-generic#role-definition-detail`](https://learn.microsoft.com/purview/how-to-policies-devops-authoring-generic#role-definition-detail)
    找到。如果您想撤销此访问权限，可以在 Purview 中通过策略完成，而不必逐台登录逻辑服务器进行操作。请在 [`https://learn.microsoft.com/purview/how-to-policies-devops-azure-sql-db`](https://learn.microsoft.com/purview/how-to-policies-devops-azure-sql-db)
    阅读入门指南。


    > **注意**

    >

    > Purview DevOps 策略也支持 Azure SQL 托管实例和 SQL Server 2022。


    ## 数据保护


    确保已为连接和数据访问设置适当的授权只是第一步。您需要从部署的各个方面保护数据，包括连接、静态数据、端到端数据，并确保只有合适的人员才能查看重要数据。Azure
    SQL 拥有与 SQL Server 一样的数据保护能力。


    ### 加密连接


    与 SQL Server 类似，Azure SQL 支持通过传输层安全性 (TLS) 协议加密连接（您可以在 [`https://en.wikipedia.org/wiki/Transport_Layer_Security`](https://en.wikipedia.org/wiki/Transport_Layer_Security)
    阅读关于 TLS 的内容）。


    默认情况下，Azure SQL 托管实例强制要求连接加密。工具和应用程序应为托管实例启用加密连接，以避免客户端/服务器协商。此外，您可以强制客户端连接使用最低
    TLS 版本。最新的 TLS 1.2 版本修复了一些已知的安全漏洞，因此您可以考虑要求使用此版本。您可以通过 Azure 门户、PowerShell (`Set-AzInstance`)
    或 az CLI (`az sql mi update`) 设置最低版本。您可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/minimal-tls-version-configure`](https://learn.microsoft.com/azure/azure-sql/managed-instance/minimal-tls-version-configure)
    阅读更多关于 TLS 和托管实例的内容。


    Azure SQL 数据库强制要求加密连接，无论客户端或应用程序是否启用。您可以通过检查 `sys.dm_exec_connections` 的 `encrypt_option`
    列来验证这一点，您会发现对于任何用户 TCP 连接，该列值始终为 TRUE。Azure SQL 数据库还提供通过 Azure 门户、PowerShell (`Set-AzSqlServer`)
    和 az CLI (`az sql server update`) 强制执行最低 TLS 版本（1.0、1.1 和 1.2）的功能。您可以在 [`https://learn.microsoft.com/azure/azure-sql/database/connectivity-settings?view=azuresql&tabs=azure-portal#minimal-tls-versio`](https://learn.microsoft.com/azure/azure-sql/database/connectivity-settings?view=azuresql&tabs=azure-portal#minimal-tls-versio)
    阅读更多内容。


    > **提示**

    >

    > 因为 Azure SQL 数据库强制要求加密连接，最佳实践是为您的客户端工具或应用程序启用此功能。如果客户端未设置加密，服务器必须与客户端协商设置加密，这会加快连接速度。


    SQL Server 2022 现在支持 TLS 1.3。我预计 Azure SQL 很快也会支持此 TLS 版本。


    ### 透明数据加密 (TDE)


    透明数据加密 (TDE) 是一种**静态数据加密**技术，已在 SQL Server 的多个版本中使用。其概念是 SQL Server 引擎在数据写入和读取磁盘时，对数据库文件进行加密和解密。这样，文件中的数据被加密，以保护任何**离线**访问数据库文件的企图。Azure
    SQL 托管实例和数据库**默认**启用此选项。


    您可能想知道为什么需要此加密选项，因为您或任何人都无法访问 Azure SQL 底层虚拟机中的文件。默认启用 TDE 只是 Azure 为保护您的数据而致力于**纵深防御**方法的另一种机制。许多人使用
    TDE 来保护其自有数据中心的 SQL Server 部署，以防止意外入侵导致引擎外部访问数据库文件。即使 Azure 生态系统已为数据中心部署了许多保护机制，这一点在
    Azure 中同样适用。


    对于 Azure SQL 托管实例，TDE 默认为实例开启，这意味着为该实例创建的所有数据库都启用了 TDE。您无法为实例禁用此选项，但可以通过 `ALTER
    DATABASE` 或 SSMS 等工具单独为数据库禁用 TDE。对于托管实例，您有一个选项是可以控制用于 TDE 加密的密钥。默认情况下，Azure SQL
    托管实例使用服务托管密钥，这意味着 Azure SQL 管理密钥的证书（轮换密钥并使用 Azure 内的根密钥对其进行保护）。


    Azure SQL 数据库也支持通过 `ALTER DATABASE` (`ENCRYPTION` 选项) 为数据库配置 TDE，同时还允许通过 Azure
    门户、PowerShell (`Set-AzSqlDatabaseTransparentDataEncryption`) 和 az CLI (`az sql
    db tde set`) 启用和禁用 TDE。默认密钥管理也是在逻辑服务器级别的服务托管密钥。'
- fmt: '#### Bring Your Own Key (BYOK)


    许多客户希望完全控制用于加密的密钥（例如出于合规性和信任考虑）。SQL Server 提供了一种使用可扩展密钥管理 (EKM) 提供程序来保护数据库加密密钥
    (DEK) 的方法，该密钥用于通过 TDE 加密数据。允许的 EKM 提供程序之一是 Azure Key Vault。这允许用于加密的密钥存储在 SQL Server
    之外。


    Azure SQL 提供了一种类似的机制，亲切地称为 *Bring Your Own Key* (BYOK)。您可能也会看到它被称为 *customer-managed
    key* (CMK)。使用 Azure Key Vault 实现 BYOK 的机制被称为 `TDE protector`。Azure Key Vault 是
    Azure 中的一项服务，可帮助您集中存储和管理机密与密钥。正如 Azure Key Vault 入门文档所述（位于 [`https://learn.microsoft.com/azure/key-vault/general/overview`](https://learn.microsoft.com/azure/key-vault/general/overview)），“机密和密钥由
    Azure 保护，使用行业标准算法、密钥长度和硬件安全模块 (HSM)。使用的 HSM 符合联邦信息处理标准 (FIPS) 140-2 Level 2 验证。”


    授权以创建密钥库以及创建和管理密钥是通过 Microsoft Entra 完成的。Azure Key Vault 密钥可以在实例或逻辑服务器级别设置，并应用于该实例或逻辑服务器中的所有数据库。此外，Azure
    SQL 数据库现在支持在数据库级别设置密钥。我喜欢这篇博客文章中的图表（位于 [`https://azure.microsoft.com/blog/announcing-transparent-data-encryption-tde-with-customer-managed-keys-for-managed-instance`](https://azure.microsoft.com/blog/announcing-transparent-data-encryption-tde-with-customer-managed-keys-for-managed-instance)），它展示了
    Azure Key Vault BYOK 的工作原理，如图 [6-12](#496204_2_En_6_Chapter.xhtml#Fig12) 所示。


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig12_HTML.jpg)


    图 6-12


    使用 Azure Key Vault 为 TDE 实现 BYOK


    让我向您展示如何轻松地在 Azure SQL 数据库中使用 BYOK。我将在 Azure 门户中导航到名为 `bwhyperscale` 的数据库，然后从“服务”菜单的“安全”选项中选择“数据加密”，如图
    [6-13](#496204_2_En_6_Chapter.xhtml#Fig13) 所示。


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig13_HTML.jpg)


    图 6-13


    为 Azure SQL 数据库的 TDE 配置 BYOK


    您可以看到我已选择“数据库级别的客户管理密钥 (CMK)”。我现在可以选择“更改密钥”，使用一个屏幕在 Azure Key Vault 中创建一个新密钥并将其应用于我的数据库加密。我甚至可以使用托管标识来管理密钥，该密钥可用于多个
    Azure 资源。


    这看起来很简单，但在将 BYOK 与 Azure SQL 一起使用时有几个注意事项：


    *   仅当使用 BYOK 时，才支持托管实例的 `COPY_ONLY` 备份（因为您拥有用于还原的密钥），这与使用服务托管的 TDE 加密的备份不同，因为后者证书无法访问。


    *   您的密钥保管库和 Azure SQL 部署必须属于同一个 Microsoft Entra 租户。


    *   与您管理密钥的任何场景一样，您应定期备份它们。了解有关 Azure Key Vault 备份的更多信息，请访问 [`https://learn.microsoft.com/azure/key-vault/general/backup`](https://learn.microsoft.com/azure/key-vault/general/backup)。


    *   对于高可用性下的 BYOK 存在一些考虑因素。请阅读更多信息，网址为 [`https://learn.microsoft.com/azure/azure-sql/database/transparent-data-encryption-byok-overview?view=azuresql&viewFallbackFrom=sql-server-ver15#high-availability-with-customer-managed-tde`](https://learn.microsoft.com/azure/azure-sql/database/transparent-data-encryption-byok-overview?view=azuresql&viewFallbackFrom=sql-server-ver15#high-availability-with-customer-managed-tde)。


    ### Always Encrypted


    Always Encrypted 是一项基于微软研究成果的技术，用于为 SQL 应用程序提供端到端加密。它在 SQL Server 2016 中引入，并在
    Azure SQL 中拥有所有相同的功能。与 SQL Server 一样，Always Encrypted 的密钥可以存储在 Azure Key Vault
    中。请阅读有关 Always Encrypted 工作原理以及如何设置的完整说明，网址为 [`https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine`](https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine)。


    Always Encrypted 的一个独特方面（自本书第一版以来是新的）是对 Azure SQL 数据库的 `secure enclaves` 的支持。此选项为
    Always Encrypted 场景提供了更快、更强大的选择。这是因为 SQL Server 的许多解密操作都在引擎内部使用安全区域完成。这也是为什么我们现在有
    Azure SQL 数据库的 DC 系列硬件选项，因为它在后台使用 Intel SGX 芯片架构。阅读更多信息，请访问 [`https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves`](https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves)。


    ### Dynamic Data Masking (DDM)


    另一种保护数据的方法是控制哪些用户有权查看 *敏感* 数据。许多应用程序通过 *屏蔽* 其应用程序显示层中的数据来提供此类保护。例如，Web 应用程序可能对某些用户显示电话号码为
    XXX-XXX，而对其他用户显示完整的电话号码。这种方法的问题在于，如果使用的掩码规则或哪些用户可以看到数据或屏蔽数据的规则发生变化，则必须修改应用程序。


    SQL Server 提供了一种在数据库层而不是应用程序层控制数据屏蔽的方法。然后，*任何* 应用程序或工具都将仅根据使用 T-SQL 定义的屏蔽规则看到数据。此功能称为动态数据屏蔽
    (DDM)，在 SQL Server 2016 中引入。您可以在 [`https://learn.microsoft.com/sql/relational-databases/security/dynamic-data-masking`](https://learn.microsoft.com/sql/relational-databases/security/dynamic-data-masking)
    阅读 DDM 的完整文档。Azure SQL 通过 T-SQL 语句支持 DDM，如文档中所述。此外，Azure SQL 数据库允许您通过 Azure 门户管理屏蔽和权限，如图
    [6-14](#496204_2_En_6_Chapter.xhtml#Fig14) 所示，这是我基于示例 AdventureWorksLT 创建的数据库。


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig14_HTML.jpg)


    图 6-14


    通过 Azure 门户进行动态数据屏蔽


    您可以看到，使用 Azure 门户将根据数据库中的列名（例如 `LastName` 或 `EmailAddress`）提供有关要屏蔽列的建议。'
  raw: '#### Bring Your Own Key (BYOK)


    Many of our customers want complete control of the keys used for encryption (compliance
    and trust are an example). SQL Server provides a method to use an Extensible Key
    Management (EKM) provider to protect the Database Encryption Key (DEK) used to
    encrypt data with TDE. One of the EKM providers allowed is Azure Key Vault. This
    allows keys used for encryption to be stored outside of SQL Server.


    Azure SQL provides a similar mechanism affectionately called *Bring Your Own Key*
    (BYOK). You may also see this referred to as *customer-managed key* (CMK). The
    mechanism to use Azure Key Vault for BYOK is referred to as a **TDE protector**.
    Azure Key Vault is a service in Azure to help you centrally store and manage secrets
    and keys. As stated in the introductory documentation for Azure Key Vault at [`https://learn.microsoft.com/azure/key-vault/general/overview`](https://learn.microsoft.com/azure/key-vault/general/overview),
    Azure Key Vault is “Secrets and keys are safeguarded by Azure, using industry-standard
    algorithms, key lengths, and hardware security modules (HSMs). The HSMs used are
    Federal Information Processing Standards (FIPS) 140-2 Level 2 validated.”


    Authorization to create a key vault and create and manage keys is done through
    Microsoft Entra. Azure Key Vault keys can be set at an instance or logical server
    level and apply to all databases in the instance or logical server. In addition,
    Azure SQL Database now supports the key to be set at the database level. I like
    the diagram in this blog post at [`https://azure.microsoft.com/blog/announcing-transparent-data-encryption-tde-with-customer-managed-keys-for-managed-instance`](https://azure.microsoft.com/blog/announcing-transparent-data-encryption-tde-with-customer-managed-keys-for-managed-instance)
    to show how Azure Key Vault BYOK works as seen in Figure [6-12](#496204_2_En_6_Chapter.xhtml#Fig12).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Using Azure Key Vault for BYOK with TDE


    Let me show you how I can easily use BYOK with an Azure SQL Database. I will navigate
    in the Azure Portal to my database called **bwhyperscale** and then select Data
    Encryption from the Security option in the Service menu as you see in Figure [6-13](#496204_2_En_6_Chapter.xhtml#Fig13).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Configure BYOK for TDE for Azure SQL Database


    You can see I’ve selected Database level customer-managed key (CMK). I can now
    select Change key to use a screen to create a new key in Azure Key Vault and apply
    that to my database encryption. I can even use a managed identity to manage the
    key which could be used across multiple Azure resources.


    This seems easy enough, but there are several considerations when you use BYOK
    with Azure SQL:


    *   COPY_ONLY backups for Managed Instance are only supported when you use BYOK
    (because you have the keys to restore) as opposed to backups encrypted by the
    service-managed TDE given the certificate is inaccessible.


    *   Your key vault and Azure SQL deployment must belong to the same Microsoft
    Entra tenant.


    *   Like any scenario where you manage keys, you should back them up regularly.
    Learn more about Azure Key Vault backups at [`https://learn.microsoft.com/azure/key-vault/general/backup`](https://learn.microsoft.com/azure/key-vault/general/backup).


    *   There are considerations for BYOK with high availability. Read more at [`https://learn.microsoft.com/azure/azure-sql/database/transparent-data-encryption-byok-overview?view=azuresql&viewFallbackFrom=sql-server-ver15#high-availability-with-customer-managed-tde`](https://learn.microsoft.com/azure/azure-sql/database/transparent-data-encryption-byok-overview?view=azuresql&viewFallbackFrom=sql-server-ver15#high-availability-with-customer-managed-tde).


    ### Always Encrypted


    Always Encrypted is a technology based on work from Microsoft research used to
    provide end-to-end encryption for SQL applications. It was introduced in SQL Server
    2016 and has all the same capabilities in Azure SQL. Just like with SQL Server,
    keys for Always Encrypted can be stored in Azure Key Vault. Read the entire story
    about how Always Encrypted works and how to set it up at [`https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine`](https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine).


    One unique aspect to Always Encrypted that is new since the first edition of this
    book is support for ***secure enclaves*** for Azure SQL Database. This option
    provides a faster and more robust option for Always Encrypted scenarios. This
    is because much of the decryption for SQL Server happens within the engine using
    the secure enclave. This is also why we now have the DC-series hardware option
    for Azure SQL Database since it behind the scenes uses the Intel SGX chip architecture.
    Read more at [`https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves`](https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves).


    ### Dynamic Data Masking (DDM)


    One other method to protect your data is to control which users have access to
    view *sensitive* data. Many applications provide this type of protection by *masking*
    data in the display layers of their application. For example, a web application
    may display a phone number as XXX-XXX for some users and the full phone number
    for others. The problem with this approach is that the application must be modified
    if any rules change on the masks used or which users can see data or masked data.


    SQL Server provides a method to control masking of data at the database layer
    instead of the application. Then *any* application or tool would only see data
    based on masking rules defined with T-SQL. This feature is called Dynamic Data
    Masking (DDM) and was introduced in SQL Server 2016\. You can read the full documentation
    of DDM at [`https://learn.microsoft.com/sql/relational-databases/security/dynamic-data-masking`](https://learn.microsoft.com/sql/relational-databases/security/dynamic-data-masking).
    Azure SQL supports DDM through T-SQL statements as referenced in the documentation.
    In addition, Azure SQL Database allows you to manage masks and permissions through
    the Azure portal as seen in Figure [6-14](#496204_2_En_6_Chapter.xhtml#Fig14)
    for a database I created based on the sample AdventureWorksLT.


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig14_HTML.jpg)


    Figure 6-14


    Dynamic data masking through the Azure portal


    You can see using the Azure portal will provide recommendations on columns to
    mask based on the column names (e.g., LastName or EmailAddress) I have in my database.'
  trans: '#### 自带密钥（BYOK）


    许多客户希望完全控制用于加密的密钥（例如出于合规性和信任考虑）。SQL Server 提供了一种使用可扩展密钥管理（EKM）提供程序来保护数据库加密密钥（DEK）的方法，该密钥用于通过
    TDE 加密数据。允许的 EKM 提供程序之一是 Azure Key Vault。这允许用于加密的密钥存储在 SQL Server 之外。


    Azure SQL 提供了一种类似的机制，亲切地称为*自带密钥*（BYOK）。您可能也会看到它被称为*客户管理密钥*（CMK）。使用 Azure Key Vault
    实现 BYOK 的机制被称为 `TDE protector`。Azure Key Vault 是 Azure 中的一项服务，可帮助您集中存储和管理机密与密钥。正如
    Azure Key Vault 入门文档所述（位于 [`https://learn.microsoft.com/azure/key-vault/general/overview`](https://learn.microsoft.com/azure/key-vault/general/overview)），“机密和密钥由
    Azure 保护，使用行业标准算法、密钥长度和硬件安全模块（HSM）。使用的 HSM 符合联邦信息处理标准（FIPS）140-2 Level 2 验证。”


    授权以创建密钥库以及创建和管理密钥是通过 Microsoft Entra 完成的。Azure Key Vault 密钥可以在实例或逻辑服务器级别设置，并应用于该实例或逻辑服务器中的所有数据库。此外，Azure
    SQL 数据库现在支持在数据库级别设置密钥。我喜欢这篇博客文章中的图表（位于 [`https://azure.microsoft.com/blog/announcing-transparent-data-encryption-tde-with-customer-managed-keys-for-managed-instance`](https://azure.microsoft.com/blog/announcing-transparent-data-encryption-tde-with-customer-managed-keys-for-managed-instance)），它展示了
    Azure Key Vault BYOK 的工作原理，如图 6-12 所示。


    ![](img/496204_2_En_6_Fig12_HTML.jpg)


    图 6-12


    使用 Azure Key Vault 为 TDE 实现 BYOK


    让我向您展示如何轻松地在 Azure SQL 数据库中使用 BYOK。我将在 Azure 门户中导航到名为 `bwhyperscale` 的数据库，然后从“服务”菜单的“安全”选项中选择“数据加密”，如图
    6-13 所示。


    ![](img/496204_2_En_6_Fig13_HTML.jpg)


    图 6-13


    为 Azure SQL 数据库的 TDE 配置 BYOK


    您可以看到我已选择“数据库级别的客户管理密钥（CMK）”。我现在可以选择“更改密钥”，使用一个屏幕在 Azure Key Vault 中创建一个新密钥并将其应用于我的数据库加密。我甚至可以使用托管标识来管理密钥，该密钥可用于多个
    Azure 资源。


    这看起来很简单，但在将 BYOK 与 Azure SQL 一起使用时有几个注意事项：


    *   仅当使用 BYOK 时，才支持托管实例的 `COPY_ONLY` 备份（因为您拥有用于还原的密钥），这与使用服务托管的 TDE 加密的备份不同，因为后者证书无法访问。


    *   您的密钥保管库和 Azure SQL 部署必须属于同一个 Microsoft Entra 租户。


    *   与您管理密钥的任何场景一样，您应定期备份它们。了解有关 Azure Key Vault 备份的更多信息，请访问 [`https://learn.microsoft.com/azure/key-vault/general/backup`](https://learn.microsoft.com/azure/key-vault/general/backup)。


    *   对于高可用性下的 BYOK 存在一些考虑因素。请阅读更多信息，网址为 [`https://learn.microsoft.com/azure/azure-sql/database/transparent-data-encryption-byok-overview?view=azuresql&viewFallbackFrom=sql-server-ver15#high-availability-with-customer-managed-tde`](https://learn.microsoft.com/azure/azure-sql/database/transparent-data-encryption-byok-overview?view=azuresql&viewFallbackFrom=sql-server-ver15#high-availability-with-customer-managed-tde)。


    ### Always Encrypted


    Always Encrypted 是一项基于微软研究成果的技术，用于为 SQL 应用程序提供端到端加密。它在 SQL Server 2016 中引入，并在
    Azure SQL 中拥有所有相同的功能。与 SQL Server 一样，Always Encrypted 的密钥可以存储在 Azure Key Vault
    中。请阅读有关 Always Encrypted 工作原理以及如何设置的完整说明，网址为 [`https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine`](https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine)。


    Always Encrypted 的一个独特方面（自本书第一版以来是新的）是对 Azure SQL 数据库的 `secure enclaves` 的支持。此选项为
    Always Encrypted 场景提供了更快、更强大的选择。这是因为 SQL Server 的许多解密操作都在引擎内部使用安全区域完成。这也是为什么我们现在有
    Azure SQL 数据库的 DC 系列硬件选项，因为它在后台使用 Intel SGX 芯片架构。阅读更多信息，请访问 [`https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves`](https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves)。


    ### 动态数据屏蔽（DDM）


    另一种保护数据的方法是控制哪些用户有权查看*敏感*数据。许多应用程序通过*屏蔽*其应用程序显示层中的数据来提供此类保护。例如，Web 应用程序可能对某些用户显示电话号码为
    XXX-XXX，而对其他用户显示完整的电话号码。这种方法的问题在于，如果使用的掩码规则或哪些用户可以看到数据或屏蔽数据的规则发生变化，则必须修改应用程序。


    SQL Server 提供了一种在数据库层而不是应用程序层控制数据屏蔽的方法。然后，*任何*应用程序或工具都将仅根据使用 T-SQL 定义的屏蔽规则看到数据。此功能称为动态数据屏蔽（DDM），在
    SQL Server 2016 中引入。您可以在 [`https://learn.microsoft.com/sql/relational-databases/security/dynamic-data-masking`](https://learn.microsoft.com/sql/relational-databases/security/dynamic-data-masking)
    阅读 DDM 的完整文档。Azure SQL 通过 T-SQL 语句支持 DDM，如文档中所述。此外，Azure SQL 数据库允许您通过 Azure 门户管理屏蔽和权限，如图
    6-14 所示，这是我基于示例 AdventureWorksLT 创建的数据库。


    ![](img/496204_2_En_6_Fig14_HTML.jpg)


    图 6-14


    通过 Azure 门户进行动态数据屏蔽


    您可以看到，使用 Azure 门户将根据数据库中的列名（例如 `LastName` 或 `EmailAddress`）提供有关要屏蔽列的建议。'
- fmt: '# SQL Ledger


    如果你阅读过 *SQL Server 2022 Revealed*，我在书中介绍了 SQL Server 中的一个新功能，即在数据库内部实现的区块链。这里的核心概念是，Ledger
    提供了数据库变更的防篡改记录。


    描述 SQL Ledger 最好的方式是通过图表，如图 [6-15](#496204_2_En_6_Chapter.xhtml#Fig15) 所示。


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig15_HTML.jpg)


    图 6-15 SQL Ledger


    SQL Ledger 允许你使用 T-SQL 创建一个表，通过附加语法 `WITH LEDGER = ON`，系统将自动使用时态表的技术来跟踪该表的所有变更。系统将构建一个变更历史表和一个视图，使你能够查看当前表以及历史变更。


    这与时态表有何不同？关键在于 Database ledger，这是一系列系统内部表，用于跟踪：

    - 哪个 SQL 主体进行了变更

    - 实际变更的加密哈希值


    现在，你可以跟踪变更内容、变更时间、变更执行者，并确保没有人从内部篡改数据。例如，如果有人试图入侵系统，并“伪造”一条 `UPDATE` 操作使其看起来像是原始值以隐藏变更。


    Database ledger 以链式结构记录这些哈希值，因此构成一个区块链。这比传统的区块链系统更有优势，因为所有数据都保留在 SQL Server 数据库内部。这里不需要应用程序逻辑，因为所有功能都内置在
    SQL 中。


    此外，可以存储一个独立的摘要，这是在 Database ledger 之上独立计算的哈希值。这提供了一种独立的方法来验证 Database ledger 本身的有效性。


    图 [6-15](#496204_2_En_6_Chapter.xhtml#Fig15) 中未显示的一个额外选项是，你可以将 ledger 表设置为 `APPEND_ONLY`，这意味着只允许
    `T-SQL INSERT` 语句。这几乎类似于“日志”，同时具备 Ledger 的其他优势。


    Azure SQL Database 提供了一些独特的选项，如图 [6-16](#496204_2_En_6_Chapter.xhtml#Fig16) 所示。


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig16_HTML.jpg)


    图 6-16 Azure SQL Database ledger 选项


    你可以通过 Azure 门户默认启用所有表使用 ledger 功能，为所有 ledger 表验证 Database ledger，并启用自动将摘要存储到 Azure
    存储或 Azure Confidential Ledger 中。


    Ledger 功能在 Azure SQL Database、Azure SQL Managed Instance 以及 SQL Server 2022（包括
    Azure 虚拟机和本地部署）中均可用。请访问 [`https://aka.ms/sqlledger`](https://aka.ms/sqlledger)
    了解关于 SQL Ledger 的所有信息。


    ## 安全管理


    在为身份验证、访问和数据保护配置好安全设置后，你将需要管理和审计安全的特定方面。这包括监控活动、使用 SQL 审计以及使用 Microsoft Defender
    for Cloud 检查安全问题。


    ### SQL 外部的活动监控


    当你在 Windows 和 Linux 上部署和管理 SQL Server 时，操作系统提供了多种不同的方法来审计 SQL Server 外部的活动。你的数据中心内可能还有其他方法来审计此类活动。


    Azure 生态系统提供了相同类型的审计能力。你可能在第 [4](#496204_2_En_4_Chapter.xhtml) 章中看到过，在部署 Azure
    SQL Managed Instance 和 Database 后，针对此类活动的 **活动日志**。可以将其视为审计 Azure RBAC 的一种方式。


    活动日志是 Azure 生态系统为所有订阅提供的平台日志。实际上，活动日志是 Azure 订阅所有事件的记录，包括针对 Azure SQL Managed
    Instance 和 Database 的特定事件。基本上，任何在 SQL Server 外部针对 Azure SQL 资源执行的操作都会记录在活动日志中。我使用
    Windows 事件日志多年，我喜欢将活动日志视为 Azure 的事件日志。


    Azure 门户提供了一种绝佳的方式来查看特定 Azure 资源的活动日志条目。例如，如果我在 Azure 门户中导航到我的逻辑服务器 `bwsqllogicalserver`，然后从资源菜单中选择“活动日志”，并将时间范围更改为一周，我会看到类似图
    [6-17](#496204_2_En_6_Chapter.xhtml#Fig17) 中的条目。


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig17_HTML.jpg)


    图 6-17 Azure SQL Database 逻辑服务器的活动日志


    你可以看到一些日志条目显示了更新防火墙规则或设置专用端点等活动。


    默认情况下，Azure 活动日志条目会保留 90 天（之后会滚动更新）。如果你想将活动日志条目保留更长时间，可以创建一个 Log Analytics 工作区。Log
    Analytics 工作区还为你提供了更强大的查询和可视化活动日志条目的能力。在此屏幕上，顶部有一个“诊断设置”选项。这允许你创建一个 Log Analytics
    工作区并将活动日志条目添加到其中。你还可以选择将活动日志条目发送到 Event Hub 进行流式传输。要详细了解活动日志的一般用法，请访问 [`https://learn.microsoft.com/azure/azure-monitor/essentials/activity-log`](https://learn.microsoft.com/azure/azure-monitor/essentials/activity-log)。


    ### 审计 Azure SQL Managed Instance


    由于 Azure SQL Managed Instance 非常类似于完整的 SQL Server 实例，许多熟悉的审计工具和功能都可供你使用。


    #### 跟踪登录


    据我所知，几乎每个 SQL Server 版本都会在 SQL Server 的 `ERRORLOG` 中跟踪失败的登录。Managed Instance 的
    `ERRORLOG` 中，失败的登录如下所示：

    ```

    Error: 18456, Severity: 14, State: 7.

    Login failed for user ''sa''. Reason: An error occurred while evaluating the password.
    [CLIENT: 10.1.0.4]

    ```

    SQL Server 提供了关闭此跟踪或同时跟踪成功登录的能力。此功能不适用于 Managed Instance（即使 SSMS 给你一种它允许的印象），因为它需要重启
    SQL Server，而你没有权限执行此操作。


    由于 Azure SQL Managed Instance 为你提供了对 Extended Events 的完全访问权限，你可以使用以下事件来跟踪登录：`process_login_finish`、`login_event`
    和 `login`。Azure SQL Managed Instance 的 Extended Events 支持所有事件、操作和目标。文件目标必须使用 Azure
    Blob 存储，因为你无权访问底层操作系统文件系统。'
  raw: '### SQL Ledger


    If you read *SQL Server 2022 Revealed*, I wrote about a new feature in SQL Server
    that is a blockchain *inside* the database. The key concept here is that Ledger
    provides a *tamper-evident record* of changes in the database.


    The best way to describe SQL Ledger is with a diagram as you see in Figure [6-15](#496204_2_En_6_Chapter.xhtml#Fig15).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig15_HTML.jpg)


    Figure 6-15


    SQL Ledger


    SQL Ledger allows you to create a table using T-SQL with an additional syntax
    WITH LEDGER = ON, and now automatically we will track all changes to the table
    using the technology of temporal tables. We will build a history table of your
    changes and a view that allows you to see the current table along with the historical
    changes.


    How is this different than temporal tables? It is the Database ledger, which is
    a series of system internal tables that track


    *   Which SQL principal made the change


    *   A crypto hash of the actual changes


    Now you can track what the change was, when the change was made, who made the
    change, and make sure no one has tampered internally with the data, for example,
    if someone tried to hack the system and “fake out” an UPDATE to look like the
    original value and hide the change.


    The Database ledger keeps track of these hashes in a chain, hence a blockchain.
    This has advantages over traditional blockchain systems since all the data is
    kept inside the SQL Server database. No application logic is required here since
    everything is built into SQL.


    In addition, a *digest* can be stored, which is an independent hash on top of
    the Database ledger. This provides an independent method to verify the Database
    ledger itself is valid.


    One additional option not shown in Figure [6-15](#496204_2_En_6_Chapter.xhtml#Fig15)
    is that you can make a ledger table APPEND_ONLY which means only T-SQL INSERT
    statements are allowed. This is almost similar to a “journal” along with the other
    benefits of Ledger.


    Azure SQL Database offers a few unique options as you can see in Figure [6-16](#496204_2_En_6_Chapter.xhtml#Fig16).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig16_HTML.jpg)


    Figure 6-16


    Azure SQL Database ledger options


    You can from the Azure Portal enable all tables to use ledger by default, verify
    the Database ledger for all ledger tables, and enable the digest to be stored
    automatically in Azure Storage or Azure Confidential Ledger.


    Ledger is available in Azure SQL Database, Azure SQL Managed Instance, and SQL
    Server 2022 both in Azure VM and on-premises. Learn everything you need to know
    about SQL Ledger at [`https://aka.ms/sqlledger`](https://aka.ms/sqlledger).


    ## Security Management


    After you have configured security for authentication, access, and data protection,
    you will want to manage and audit specific aspects of security. This includes
    monitoring activity, using SQL auditing, and checking for security issues with
    Microsoft Defender for Cloud.


    ### Monitoring Activities Outside of SQL


    When you deploy and manage SQL Server on Windows and Linux, the operating system
    provides several different methods to audit activity outside of SQL Server. You
    may have other methods within your data center to audit this type of activity.


    The Azure ecosystem provides this same type of audit capabilities. You may have
    seen in Chapter [4](#496204_2_En_4_Chapter.xhtml) after deploying Azure SQL Managed
    Instance and Database the **Activity Log** for these types of activities. Think
    of this as a way to audit Azure RBAC.


    The Activity Log is a *platform log* supported by the Azure ecosystem for all
    subscriptions. In fact, the Activity Log is a record of all events for your Azure
    subscription and includes events specific to Azure SQL Managed Instance and Database.
    Basically, any operation you perform against an Azure SQL resource that is *outside*
    of SQL Server is recorded in the Activity Log. I’ve used the Windows Event Log
    for many years, and I like to think of the Activity Log as the Event Log of Azure.


    The Azure portal provides an excellent way to view Activity Log entries specific
    to an Azure resource. For example, if I navigate to my logical server **bwsqllogicalserver**
    in the Azure portal, then select Activity log from the Resource menu, and then
    change the timeframe for a week, I see entries like in Figure [6-17](#496204_2_En_6_Chapter.xhtml#Fig17).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig17_HTML.jpg)


    Figure 6-17


    The Activity Log for Azure SQL Database logical server


    You can see some of the log entries show activities like updating firewall rules
    or setting up private endpoints.


    By default, Azure Activity Log entries are kept for 90 days (and they are rolled
    over). If you want to keep Activity Log entries longer than this, you can create
    a Log Analytics workspace. A Log Analytics workspace also gives you more capabilities
    to query and visualize Activity Log entries. On this screen, there is an option
    at the top for Diagnostic settings. This allows you to create a Log Analytics
    workspace and add Activity Log entries to it. You also have the option to send
    Activity Log entries to Event Hub for streaming. To read more about using the
    Activity Log in general, go to [`https://learn.microsoft.com/azure/azure-monitor/essentials/activity-log`](https://learn.microsoft.com/azure/azure-monitor/essentials/activity-log).


    ### Auditing Azure SQL Managed Instance


    Since Azure SQL Managed Instance is very much like a full SQL Server instance,
    many of the familiar tools and features for auditing are available to you.


    #### Tracking Logins


    Since I can remember, almost every SQL Server version tracks failed logins in
    the ERRORLOG of SQL Server. A failed login looks like this in the ERRORLOG for
    a Managed Instance:


    ```

    Error: 18456, Severity: 14, State: 7.

    Login failed for user ''sa''. Reason: An error occurred while evaluating the password.
    [CLIENT: 10.1.0.4]

    ```


    SQL Server provides the ability to turn off this tracking or also track successful
    logins. That capability is not available for a Managed Instance (even though SSMS
    gives you the appearance it is allowed) because it requires a restart of SQL Server
    which you don’t have access to do.


    Since Azure SQL Managed Instance gives you full access to Extended Events, you
    can use these events to track logins: **process_login_finish, login_event, and
    login**. Extended Events for Azure SQL Managed Instance supports all events, actions,
    and targets. File targets must use Azure Blob Storage since you don’t have access
    to the underlying OS file system.'
