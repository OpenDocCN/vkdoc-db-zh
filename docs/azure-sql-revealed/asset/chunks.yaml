  trans: '## 部署前规划


    在您开始部署 Azure SQL 数据库或托管实例之前，我建议您花些时间做一些部署前规划。审视您的选择并做出几个明智的决定，将为您节省时间和精力。


    ### 新部署还是迁移


    首先要做的决定之一，是计划迁移现有的数据库或实例，还是部署新的数据库或实例。部署的过程将是相同的，但迁移意味着您需要在部署前评估当前的 SQL Server
    实例、数据库或其他数据库环境。您的评估将根据当前需求，为您需要做出何种部署选择提供指导。您必须决定需要对当前的 SQL Server 或其他数据库平台上的应用程序、架构、脚本或其他方面做出哪些必要的更改。您还必须考虑如何将实际数据迁移到新的部署中。本章将包含专门讨论迁移到
    Azure SQL 托管实例和数据库时可以使用的注意事项和工具的部分。以下是一些您在考虑迁移时可以参考的优秀资源：


    *   `Azure 云迁移和现代化中心` – 这是一个集中的信息资源，您可以访问 Microsoft 专家，将任何资源迁移到 Azure。请访问 [`https://azure.microsoft.com/solutions/migration`](https://azure.microsoft.com/solutions/migration)。


    *   `Microsoft 数据迁移指南` – 获取针对任何类型数据迁移到 Azure 的分步指导。了解更多信息，请访问 [`https://aka.ms/datamigration`](https://aka.ms/datamigration)。


    *   `由 Azure Arc 启用的 SQL Server 迁移评估` – 在撰写本书时此功能处于预览版，它允许您通过 Arc 将现有的 SQL Server
    连接到 Azure，并获得关于迁移到 Azure 的最佳解决方案的 `持续` 评估，包括资源（规模）建议。了解更多信息，请访问 [`https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment`](https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment)。


    *   `Azure 数据库迁移服务 (DMS)` – 这项 Azure 服务允许您执行到 Azure SQL 托管实例和数据库的离线及在线迁移（仅限离线迁移数据库）。了解更多信息，请访问
    [`https://learn.microsoft.com/azure/dms/dms-overview`](https://learn.microsoft.com/azure/dms/dms-overview)。


    *   `Azure Migrate` – 使用此服务进行 `大规模` 评估和迁移（使用 DMS）。了解更多信息，请访问 [`https://aka.ms/azuremigrate`](https://aka.ms/azuremigrate)。


    *   `托管实例链接` – 虽然 DMS 提供了在线迁移解决方案，但它使用的是日志传送方法。一个可能更好的在线迁移路径是 Azure SQL 托管实例链接。它允许您使用
    Always On 可用性组的强大功能，将 SQL Server 2016、2019 或 2022 实例迁移到 Azure SQL 托管实例。了解更多信息，请访问
    [`https://learn.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-feature-overview?view=azuresql#migrate-to-azure`](https://learn.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-feature-overview%253Fview%253Dazuresql%2523migrate-to-azure)。


    ### 做出部署选择


    无论您是迁移还是创建新的部署，都有几个值得花时间去规划的选择。本书第 2 章非常值得回顾阅读，因为它描述了 Azure SQL 托管实例和 Azure SQL
    数据库之间的选择与差异。


    话虽如此，让我们从高层次回顾一些可能影响您决策的重要选择：


    *   如果您需要 SQL Server 代理、数据库邮件和跨数据库查询等 SQL Server 实例功能，那么托管实例是您需要做出的选择。


    *   如果您的数据库大小超过 32TB，在撰写本书时 `您唯一的选择` 就是 Azure SQL 数据库超大规模。


    除了这两个选择之外，Azure SQL 托管实例或数据库都可能满足您的需求。然而，正如我在本书第 2 章中指出的，使用 Azure SQL 数据库可能有优势，因为
    Microsoft 将同时管理基础设施和 SQL Server 实例，让您能专注于数据库本身。此外，Azure SQL 数据库可以为您提供更多选项，例如无服务器计算和弹性池。


    在部署托管实例或数据库时您将做出的选择，可以参考图 4-1 所列内容（感谢我的同事 Anna Hoffman 提供此图）。


    ![](img/49604_2_En_4_Fig1_HTML.jpg)


    图 4-1


    Azure SQL 的部署选择


    #### 免费部署


    如果您正在寻找用于开发或概念验证 (POC) 场景的免费部署 Azure SQL 的方法，请考虑以下选项：


    ##### Azure SQL 托管实例免费试用版


    我听过很多客户问我，他们如何在不必花费大量资金的情况下，对 Azure SQL 托管实例进行测试以迁移 SQL Server。我们现在为 Azure SQL
    托管实例提供免费的 12 个月试用版，让您具备这种能力。此优惠适用于任何 Azure 订阅。了解更多信息，请访问 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/free-offer`](https://learn.microsoft.com/azure/azure-sql/managed-instance/free-offer)。


    ##### Azure SQL 数据库免费优惠


    SQL Server 开发人员版非常受欢迎，因为开发人员可以免费开发和测试他们的应用程序。我们现在为 Azure SQL 数据库提供了类似的选项，而且这不是试用版。只要您的
    Azure 订阅有效，您现在就可以部署一个免费的 Azure SQL 数据库。了解更多信息，请访问 [`https://aka.ms/freedboffer`](https://aka.ms/freedboffer)。'
- fmt: '### Deployment Methods


    You can deploy an Azure Managed Instance or Database using the Azure Portal or
    through a CLI with the `az` utility, PowerShell, or even REST APIs (`az rest`
    can be used to help you).


    If you are just trying out Azure SQL or doing a POC, you can easily use the Azure
    Portal. However, for a repeatable process to deploy (imagine if you needed to
    redeploy a Managed Instance exactly as it was originally configured), then a script
    using a CLI is a better option. Remember you also can use Azure templates to help
    automate deployments. You can read more about using Azure templates for Azure
    SQL at [`https://learn.microsoft.com/azure/azure-sql/database/arm-templates-content-guide?view=azuresql&tabs=single-database`](https://learn.microsoft.com/azure/azure-sql/database/arm-templates-content-guide%253Fview%253Dazuresql%2526tabs%253Dsingle-database)
    and [`https://learn.microsoft.com/azure/azure-sql/database/arm-templates-content-guide?view=azuresql&tabs=managed-instance`](https://learn.microsoft.com/azure/azure-sql/database/arm-templates-content-guide%253Fview%253Dazuresql%2526tabs%253Dmanaged-instance).


    You also have the option to use `Bicep` to deploy Azure SQL Managed Instance ([`https://learn.microsoft.com/azure/azure-sql/managed-instance/create-bicep-quickstart`](https://learn.microsoft.com/azure/azure-sql/managed-instance/create-bicep-quickstart))
    or Azure SQL Database ([`https://learn.microsoft.com/azure/azure-sql/database/single-database-create-bicep-quickstart`](https://learn.microsoft.com/azure/azure-sql/database/single-database-create-bicep-quickstart)).


    `Terraform` is also supported both for Azure SQL Managed Instance ([`https://learn.microsoft.com/azure/azure-sql/managed-instance/instance-create-terraform`](https://learn.microsoft.com/azure/azure-sql/managed-instance/instance-create-terraform))
    and Azure SQL Database ([`https://learn.microsoft.com/azure/azure-sql/database/single-database-create-terraform-quickstart`](https://learn.microsoft.com/azure/azure-sql/database/single-database-create-terraform-quickstart)).


    Let me show you another method. I mentioned the Copilot for Azure experience in
    Chapter [2](#496204_2_En_2_Chapter.xhtml) of the book. Here is an example in Figure
    [4-2](#496204_2_En_4_Chapter.xhtml#Fig2) of how to ask Copilot to help provide
    an example of how to deploy an Azure SQL Database using the `az` CLI.


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Using Copilot in Azure to help deploy an Azure SQL Database


    Note


    You can see here that after providing responses Copilot provides suggestions for
    other things you may want to do. At this point, I have not deployed a database,
    so Copilot has no `context`. You will see later in the book more sophisticated
    experiences after you deploy the database. However, as you go through this chapter,
    you can ask Copilot different questions related to topics you see in the chapter.
    It can look up concepts in the documentation and provide examples in many cases
    faster than you probably can search for yourself.


    ### Deployment Option


    I discussed earlier whether you will consider Azure SQL Managed Instance or Database.
    Within each of these options, there is a choice of using a `pool`. As I mentioned
    in Chapter [2](#496204_2_En_2_Chapter.xhtml) of the book, Azure SQL Managed Instance
    offers a `Managed Instance pool` which could be a better fit for a smaller, cost-effective
    Managed Instance. Deployment times are also much faster with pools. You can read
    more about Managed Instance pools at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/instance-pools-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/instance-pools-overview).
    I’ll discuss the use of Managed Instance pools in several places later in this
    chapter.


    Note


    Managed Instance pools at the time of the writing of this book went through a
    public preview `refresh`. It was in public preview for a long time, so many thought
    it would never make General Availability, but it is on the right path now in my
    opinion.


    As I mentioned in both Chapters [1](#496204_2_En_1_Chapter.xhtml) and [2](#496204_2_En_2_Chapter.xhtml)
    of this book, Azure SQL Database provides an option called an `elastic pool`.
    An elastic pool can be a good choice if you plan to use Azure SQL Database to
    host many databases. ISVs and Software as a Service (SaaS) developers often look
    at this choice to save costs and manage databases more efficiently. I’ll discuss
    more about elastic pools in several places later in the chapter.


    ### Region


    Choosing a specific Azure region can be important just as I described in Chapter
    [3](#496204_2_En_3_Chapter.xhtml) on virtual machines. You need to make sure your
    deployment options are available in your Azure region choice.


    You may have certain compliance and security requirements which also dictate what
    region you choose.


    You may be implementing specific HADR options like Availability Zones, geo-replication,
    or auto-failover groups and have specific regions in mind to make those deployment
    successful. Remember I talked about in Chapter [2](#496204_2_En_2_Chapter.xhtml)
    of the book the concept called `paired regions`, which are important to make these
    geo-region choices.


    If you need to move an Azure SQL Managed Instance or Database to another region,
    read a checklist in our documentation at [`https://learn.microsoft.com/azure/azure-sql/database/move-resources-across-regions`](https://learn.microsoft.com/azure/azure-sql/database/move-resources-across-regions).


    Azure SQL Database is a “Ring 0” service which means it gets deployed in every
    region as a default service. Managed Instance is not exactly at that status yet,
    but it is generally available in all regions.


    In addition, you need to consider where your application will be hosted and latency
    requirements between where the application will be hosted and your Azure SQL deployment.
    Consider performance and proximity to other services. I was chatting with my colleague
    Anna Hoffman on this topic. She said “…but I feel that it’s not just where the
    application is – where are the users? Where should the application be? If you
    have geo-replication or auto failover groups, how do you build a globally available
    solution?”


    ### Purchasing Model


    For Azure SQL Database only, you will need to choose a `purchasing model`. The
    choices are `DTU` or `vCore`. I explained these models and the history behind
    them in Chapters [1](#496204_2_En_1_Chapter.xhtml) and [2](#496204_2_En_2_Chapter.xhtml)
    of the book. While the `DTU` model may be a choice for you, I recommend the `vCore`
    model. You have more choices with `vCore` and licensing options such as Azure
    Hybrid Benefit (`AHB`). The `vCore` model gives you more transparency and control
    over the underlying resources (CPU, memory, storage), making it easier to match
    your database’s performance needs.


    If you select the `DTU` model and want to move to the `vCore` model at a later
    date, consult the documentation at [`https://learn.microsoft.com/azure/azure-sql/database/migrate-dtu-to-vcore`](https://learn.microsoft.com/azure/azure-sql/database/migrate-dtu-to-vcore).'
