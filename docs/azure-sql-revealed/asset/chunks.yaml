  trans: '# Azure 资源管理器 (ARM)


    我将 Azure 服务描述为某种你消费或*部署*的东西。你已部署的 Azure 服务实例可以被视为一个*资源*。从技术上讲，某些 Azure 服务在部署时会创建多个资源。例如，你可能部署一个
    Azure 虚拟机，结果是部署了一个虚拟机资源，以及与该 VM 关联的其他资源，如网络和存储。


    支持将 Azure 服务作为资源进行管理的系统被称为 `Azure 资源管理器 (ARM)`。`ARM` 不是你消费的服务。相反，它是一个支持你在 Azure
    中部署和管理服务的系统。


    每个像 `ARM` 这样的系统都基于*接口*。`ARM` 在 Azure 内外都提供了接口。你可能还记得第 1 章中提到的 `RDFE` 接口，它以前在 Azure
    中使用（也称为*经典*模型）。`ARM` 是当今工具和 API（包括 Azure 门户）使用的主要系统。来自 Azure 文档 [`https://learn.microsoft.com/azure/azure-resource-manager/management/overview#consistent-management-layer`](https://learn.microsoft.com/azure/azure-resource-manager/management/overview%2523consistent-management-layer)
    的图 2-6 展示了 `ARM` 的接口。


    ![](img/496204_2_En_2_Fig6_HTML.jpg)


    图 2-6

    Azure 资源管理器接口


    `ARM` 为所有 Azure 服务提供了一致性和管理方面的诸多优势，包括：


    *   `资源组`


    在 Azure 生态系统中，你会经常使用的一个对象是 `资源组`。资源组是你可以作为一个单元管理的资源的逻辑集合。每个 Azure 资源（例如，虚拟机或数据库）必须存在于一个资源组中，并且只能是一个资源组的成员。资源组具有元数据，包括区域位置（但组中的资源可以位于不同的区域）。


    一个资源组总是与一个特定的 Azure 订阅相关联。请记住，我提到过 Azure 订阅与一个账户以及可能的管理组相关联。因此，你可以在账户、管理组、订阅、资源组或资源级别应用
    Azure 策略。


    在组级别管理资源的一个好处是删除操作。如果你删除一个资源组，与该组关联的所有资源也会被删除。因此，你可以将一个概念验证（`POC`）项目的所有资源关联到一个资源组中，然后在完成后删除该组，从而避免任何不必要的成本。


    *   `基于角色的访问控制 (RBAC)`


    `RBAC` 是一个授权系统，为 Azure 资源提供访问管理。`RBAC` 基于安全主体、角色和范围。安全主体是对象，例如与 Azure 订阅关联的用户。可以将安全主体视为类似于
    SQL 主体（如登录名）。角色是基于类型（如所有者或参与者）的权限集合。范围是访问级别，如管理组、订阅、资源组或资源。你将在本书中看到 `RBAC` 的示例，包括特定于
    Azure SQL 的 `RBAC` 对象。你可以在 [`https://learn.microsoft.com/azure/role-based-access-control/overview`](https://learn.microsoft.com/azure/role-based-access-control/overview)
    阅读更多关于 `RBAC` 的内容。


    *   `锁`


    Azure 锁允许你防止用户意外删除或修改关键资源。例如，你可以创建一个资源组并应用一个锁，以防止任何用户删除该组中的资源。有效的锁类型是 `不能删除` 和
    `只读`。


    我的同事 Joe Sack 向我指出的一个很好的例子是，锁可以防止用户通过 Azure 门户意外删除数据库（但不能通过像 `SSMS` 这样的工具）。


    你可以在 [`https://learn.microsoft.com/azure/azure-resource-manager/management/lock-resources`](https://learn.microsoft.com/azure/azure-resource-manager/management/lock-resources)
    阅读更多关于锁的内容。


    *   `模板`


    `ARM` 是一个*声明式*系统。你通过陈述你的意图来使用 `ARM`，`ARM` 会完成其余工作。你通过 Azure 门户或 API 等接口声明你的意图。`ARM`
    还提供了一种通过名为 `模板` 的 JSON 文件声明意图的接口机制。模板提供了一种一致、可重复且大规模部署资源的方法。我将在本书中向你展示可用于 Azure
    SQL 的模板示例。你可以在 [`https://learn.microsoft.com/azure/azure-resource-manager/templates/overview`](https://learn.microsoft.com/azure/azure-resource-manager/templates/overview)
    阅读更多关于模板的内容。


    注意

    Azure 支持其他流行的框架来大规模管理资源，例如 `Bicep` ([`https://learn.microsoft.com/azure/azure-resource-manager/bicep`](https://learn.microsoft.com/azure/azure-resource-manager/bicep))
    和 `Terraform` ([`https://learn.microsoft.com/azure/developer/terraform/overview`](https://learn.microsoft.com/azure/developer/terraform/overview))。


    *   `活动日志`


    当你使用 Azure 门户或 API 与 `ARM` 交互以部署和管理资源时，你的活动或操作会被记录在一个名为 `活动日志` 的存储中。每个订阅都有一个 `活动日志`，记录针对与该订阅关联的资源的操作。`活动日志`
    中的订阅级别事件是通用的（如 Azure 策略操作）或特定于资源的（如更新 Azure SQL 数据库）。你可以在 [`https://learn.microsoft.com/azure/azure-monitor/essentials/activity-log`](https://learn.microsoft.com/azure/azure-monitor/essentials/activity-log)
    阅读更多关于 Azure 活动日志的内容。


    # Azure Monitor


    SQL Server 专业人员习惯于在 Windows 性能监视器、Windows 事件日志、Linux systemd 日志或 Grafana 仪表板等工具中查看指标和记录的事件。在本书中，你会看到
    Azure 虚拟机将让你能够访问来宾操作系统*内部*的所有这些工具。


    然而，鉴于 Azure 是你所有 Azure 资源的托管系统，如果有一个集中式系统来托管、查看和分析你所有 Azure 资源的*指标*和事件*日志*，那将是很好的。简而言之，这就是
    `Azure Monitor` 所提供的功能。


    你将在本书中进一步了解如何将 `Azure Monitor` 与 Azure SQL 服务结合使用。你可以在 [`https://learn.microsoft.com/azure/azure-monitor/overview`](https://learn.microsoft.com/azure/azure-monitor/overview)
    阅读更多关于 `Azure Monitor` 的内容。


    注意

    在撰写本书时，一项名为 `数据库观察者` 的新服务正在公开预览中，它为 Azure SQL 数据库和 Azure SQL 托管实例提供了***大规模***的卓越监控功能。你将在本书的第
    7 章中了解更多关于 `数据库观察者` 的内容。'
- fmt: '# What Is Azure SQL?


    ## Azure Regions and Data Centers


    Where does the world’s computer exist? While it is perhaps fun to think of Azure
    existing literally in the clouds, Azure services are hosted in physical locations
    called `data centers`. You might have remembered in the first chapter of the book
    that Azure started with four data centers.


    Today, data centers are not the choice you make to deploy Azure resources. Instead,
    data centers are organized around the globe into `regions`. Regions are a group
    of data centers connected through a low-latency network. You will see in this
    book as you deploy Azure SQL services you will choose a region as the target for
    deployment. At the time of writing this book, Azure has 60+ regions worldwide
    available in 140 countries. Some regions have special purposes for specific customers,
    such as `government` or `national` regions. For example, Azure provides special
    regions throughout the United States called Azure Government regions (you can
    learn more about Azure Government at [`https://azure.microsoft.com/global-infrastructure/government/`](https://azure.microsoft.com/global-infrastructure/government/)).


    A `geography` is a market of two or more regions that preserve `data residency`
    and compliance boundaries. To ensure further resiliency, regions are sometimes
    located close enough to be `paired` but far enough in distance for scenarios like
    natural disasters.


    In addition, within some regions, one or more data centers are grouped in an `Availability
    Zone` to prove further high availability for Azure resources. Each zone has independent
    power, cooling, and networking. You can learn more about regions, geographies,
    and zones at [`https://azure.microsoft.com/global-infrastructure/regions/`](https://azure.microsoft.com/global-infrastructure/regions/).
    An `Availability Zone` is a key component to make your SQL deployment in cloud
    `highly available`. You will learn more all about this in Chapter [8](#496204_2_En_8_Chapter.xhtml).


    ## Azure Trust, Privacy, and Compliance


    If you are thinking about moving to the cloud, you are no doubt thinking about
    trust, privacy, and compliance. Can I trust my data in Azure? Does Azure meet
    compliance for my local government and industry?


    Azure has well over 100+ compliance certifications that span government regulations
    and industry standards. Start reading at [`https://azure.microsoft.com/overview/trusted-cloud/compliance/`](https://azure.microsoft.com/overview/trusted-cloud/compliance/)
    to find out all the compliance standards for Azure.


    Let’s say you are concerned about privacy. Azure not only has features to help
    you maintain privacy and protection (learn more about Azure SQL offerings in Chapter
    [6](#496204_2_En_6_Chapter.xhtml) of the book), but also we at Microsoft maintain
    privacy standards to meet your requirements.


    If your organization is concerned about trusting your data in Azure, I recommend
    you start with [`https://azure.microsoft.com/overview/trusted-cloud/`](https://azure.microsoft.com/overview/trusted-cloud/)
    and dive into how Microsoft protects your assets in our data centers and how you
    can use Azure tools and features to protect your deployments.


    ## Azure Service-Level Agreement (SLA)


    Formal documents called `Service-Level Agreements` (`SLA`s) capture the specific
    terms that define the performance standards that apply to Azure. `SLA`s describe
    Microsoft’s commitment to providing Azure customers with specific performance
    and availability standards. There are `SLA`s for individual Azure products and
    services. `SLA`s also specify what happens if a service or product fails to perform
    to a governing `SLA`’s specification. Azure SQL has specific `SLA`s that apply
    to availability and performance, which you will learn about throughout this book.
    `SLA`s are one of the major reasons to consider using Azure because it is a promise
    from Microsoft to keep your data available. You can read more about the Azure
    `SLA` at [`https://azure.microsoft.com/blog/understanding-and-leveraging-azure-sql-database-sla`](https://azure.microsoft.com/blog/understanding-and-leveraging-azure-sql-database-sla).


    ## IaaS vs. PaaS


    I mentioned concepts like `SaaS`, `PaaS`, and `IaaS` in Chapter [1](#496204_2_En_1_Chapter.xhtml)
    of the book, but they are worth reviewing here again.


    `Infrastructure as a Service` (`IaaS`) is a computing system hosted by a cloud
    service provider like Microsoft Azure. Users of `IaaS` deploy and manage a virtual
    machine, while Azure provides the hosting infrastructure for the hardware, including
    host server, storage, and networking. Azure `IaaS` services are surfaced through
    Azure Virtual Machines. Azure SQL has specific options for `IaaS` customers.


    `Platform as a Service` (`PaaS`) provides all the benefits of `IaaS` with additional
    benefits of cloud services usually abstracted from an underlying operating system
    or virtual machine. The concept is for the developer or user to focus on the application
    or in the case of Azure SQL a database or instance instead of details of the OS
    or VM. Typically, a `PaaS` service provides other benefits to the user, including
    built-in scalability, high availability, and security. Azure SQL provides two
    `PaaS` services, including Managed Instances and Databases.


    One other pivot to the cloud service model is `Software as a Service` (`SaaS`).
    A `SaaS` user takes advantage of using application software hosted by a cloud
    service provider. Many `SaaS` providers use `IaaS`, `PaaS`, or some combination
    of cloud services to support their service. Azure `IaaS` or `PaaS` services make
    the perfect system for many `SaaS` vendors. `SaaS` applications were the early
    pioneers of cloud services in the form of email systems like Hotmail. Today, Microsoft
    `SaaS` applications include the famous Microsoft 365 application suite.


    ## The Azure SQL Lineup


    With the concepts of the Azure ecosystem and `IaaS`/`PaaS` in mind, Azure SQL
    consists of the following Azure services: SQL Server on Azure Virtual Machines,
    Azure SQL Managed Instance, and Azure SQL Database. Figure [2-7](#496204_2_En_2_Chapter.xhtml#Fig7)
    shows a visual of the Azure SQL `lineup`.


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig7_HTML.jpg)


    Figure 2-7 The Azure SQL lineup


    > **Note**

    > Life in the cloud moves fast. Microsoft is looking for ways to update services
    for SQL in the cloud, including new branding and form factors to run SQL. Stay
    up to date with all the latest news for Azure SQL at our blog at [`https://devblogs.microsoft.com/azure-sql`](https://devblogs.microsoft.com/azure-sql).


    There is a purpose to the order of the Azure SQL lineup left to right. As you
    move left to right, the `friction` is higher to migrate an existing SQL Server
    application to Azure, and your `control` over all aspects to the underlying SQL
    Server is less. However, this is not a negative thing. As you move right, you
    `increase capabilities for PaaS or managed capabilities` for databases. There
    are benefits to abstracting the details of a SQL Server as you will see when you
    learn all about Azure SQL Databases. As you read about each of these options for
    Azure SQL, keep in mind these common threads:


    *   The same SQL Server engine powers each of these options.

    *   The same `T-SQL` language you know and love works with each of these options.

    *   The tools and APIs that you use today with SQL Server all work with each of
    these options.'
  raw: '### Azure Regions and Data Centers


    Where does the world’s computer exist? While it is perhaps fun to think of Azure
    existing literally in the clouds, Azure services are hosted in physical locations
    called **data centers**. You might have remembered in the first chapter of the
    book that Azure started with four data centers.


    Today, data centers are not the choice you make to deploy Azure resources. Instead,
    data centers are organized around the globe into **regions**. Regions are a group
    of data centers connected through a low-latency network. You will see in this
    book as you deploy Azure SQL services you will choose a region as the target for
    deployment. At the time of writing this book, Azure has 60+ regions worldwide
    available in 140 countries. Some regions have special purposes for specific customers,
    such as *government* or *national* regions. For example, Azure provides special
    regions throughout the United States called Azure Government regions (you can
    learn more about Azure Government at [`https://azure.microsoft.com/global-infrastructure/government/`](https://azure.microsoft.com/global-infrastructure/government/)).


    A **geography** is a market of two or more regions that preserve *data residency*
    and compliance boundaries. To ensure further resiliency, regions are sometimes
    located close enough to be *paired* but far enough in distance for scenarios like
    natural disasters.


    In addition, within some regions, one or more data centers are grouped in an **Availability
    Zone** to prove further high availability for Azure resources. Each zone has independent
    power, cooling, and networking. You can learn more about regions, geographies,
    and zones at [`https://azure.microsoft.com/global-infrastructure/regions/`](https://azure.microsoft.com/global-infrastructure/regions/).
    An Availability Zone is a key component to make your SQL deployment in cloud *highly
    available*. You will learn more all about this in Chapter [8](#496204_2_En_8_Chapter.xhtml).


    ### Azure Trust, Privacy, and Compliance


    If you are thinking about moving to the cloud, you are no doubt thinking about
    trust, privacy, and compliance. Can I trust my data in Azure? Does Azure meet
    compliance for my local government and industry?


    Azure has well over 100+ compliance certifications that span government regulations
    and industry standards. Start reading at [`https://azure.microsoft.com/overview/trusted-cloud/compliance/`](https://azure.microsoft.com/overview/trusted-cloud/compliance/)
    to find out all the compliance standards for Azure.


    Let’s say you are concerned about privacy. Azure not only has features to help
    you maintain privacy and protection (learn more about Azure SQL offerings in Chapter
    [6](#496204_2_En_6_Chapter.xhtml) of the book), but also we at Microsoft maintain
    privacy standards to meet your requirements.


    If your organization is concerned about trusting your data in Azure, I recommend
    you start with [`https://azure.microsoft.com/overview/trusted-cloud/`](https://azure.microsoft.com/overview/trusted-cloud/)
    and dive into how Microsoft protects your assets in our data centers and how you
    can use Azure tools and features to protect your deployments.


    ### Azure Service-Level Agreement (SLA)


    Formal documents called **Service-Level Agreements** (SLAs) capture the specific
    terms that define the performance standards that apply to Azure. SLAs describe
    Microsoft’s commitment to providing Azure customers with specific performance
    and availability standards. There are SLAs for individual Azure products and services.
    SLAs also specify what happens if a service or product fails to perform to a governing
    SLA’s specification. Azure SQL has specific SLAs that apply to availability and
    performance, which you will learn about throughout this book. SLAs are one of
    the major reasons to consider using Azure because it is a promise from Microsoft
    to keep your data available. You can read more about the Azure SLA at [`https://azure.microsoft.com/blog/understanding-and-leveraging-azure-sql-database-sla`](https://azure.microsoft.com/blog/understanding-and-leveraging-azure-sql-database-sla).


    ## What Is Azure SQL?


    Azure SQL represents a suite of Azure services for SQL Server in the cloud. It
    is both a collection and a *brand*, including virtual machines, managed instances,
    and database services. It spans both Infrastructure as a Service (IaaS) and Platform
    as a Service (PaaS). If Azure is the world’s computer, then **Azure SQL is the
    world’s database**.


    ### IaaS vs. PaaS


    I mentioned concepts like SaaS, PaaS, and IaaS in Chapter [1](#496204_2_En_1_Chapter.xhtml)
    of the book, but they are worth reviewing here again.


    **Infrastructure as a Service (IaaS)** is a computing system hosted by a cloud
    service provider like Microsoft Azure. Users of IaaS deploy and manage a virtual
    machine, while Azure provides the hosting infrastructure for the hardware, including
    host server, storage, and networking. Azure IaaS services are surfaced through
    Azure Virtual Machines. Azure SQL has specific options for IaaS customers.


    **Platform as a Service (PaaS)** provides all the benefits of IaaS with additional
    benefits of cloud services usually abstracted from an underlying operating system
    or virtual machine. The concept is for the developer or user to focus on the application
    or in the case of Azure SQL a database or instance instead of details of the OS
    or VM. Typically, a PaaS service provides other benefits to the user, including
    built-in scalability, high availability, and security. Azure SQL provides two
    PaaS services, including Managed Instances and Databases.


    One other pivot to the cloud service model is **Software as a Service (SaaS)**.
    A SaaS user takes advantage of using application software hosted by a cloud service
    provider. Many SaaS providers use IaaS, PaaS, or some combination of cloud services
    to support their service. Azure IaaS or PaaS services make the perfect system
    for many SaaS vendors. SaaS applications were the early pioneers of cloud services
    in the form of email systems like Hotmail. Today, Microsoft SaaS applications
    include the famous Microsoft 365 application suite.


    ### The Azure SQL Lineup


    With the concepts of the Azure ecosystem and IaaS/PaaS in mind, Azure SQL consists
    of the following Azure services: SQL Server on Azure Virtual Machines, Azure SQL
    Managed Instance, and Azure SQL Database. Figure [2-7](#496204_2_En_2_Chapter.xhtml#Fig7)
    shows a visual of the Azure SQL *lineup*.


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig7_HTML.jpg)


    Figure 2-7


    The Azure SQL lineup


    Note


    Life in the cloud moves fast. Microsoft is looking for ways to update services
    for SQL in the cloud, including new branding and form factors to run SQL. Stay
    up to date with all the latest news for Azure SQL at our blog at [`https://devblogs.microsoft.com/azure-sql`](https://devblogs.microsoft.com/azure-sql).


    There is a purpose to the order of the Azure SQL lineup left to right. As you
    move left to right, the *friction* is higher to migrate an existing SQL Server
    application to Azure, and your *control* over all aspects to the underlying SQL
    Server is less. However, this is not a negative thing. As you move right, you
    *increase capabilities for* *PaaS* *or managed capabilities* for databases. There
    are benefits to abstracting the details of a SQL Server as you will see when you
    learn all about Azure SQL Databases. As you read about each of these options for
    Azure SQL, keep in mind these common threads:


    *   The same SQL Server engine powers each of these options.


    *   The same T-SQL language you know and love works with each of these options.


    *   The tools and APIs that you use today with SQL Server all work with each of
    these options.'
