- fmt: '### Deploying an Elastic Pool


    Let’s explore also how to deploy an elastic pool of two Hyperscale databases by
    looking at the different options for deploying the pool and each database in the
    pool.


    Using the same method as I did previously to deploy a serverless database, I’ll
    create a new database for the same logical server, but as you can see in Figure
    [4-28](#496204_2_En_4_Chapter.xhtml#Fig28), choose options to put the new database
    into a new elastic pool.


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig28_HTML.jpg)

    Figure 4-28: Creating a database in an elastic pool


    You have the option to create the pool on its own first. In this scenario, I created
    a database and a pool at the same time and placed this new database in the pool.


    Now that I have one database in my pool, let’s add another one, but this time
    one that has a different resource allocation (since this is one of the reasons
    I’ll use a pool).


    On the overview page of the database I just deployed, `sqldb1`, you will see the
    elastic pool listed which is called `bwsqldbpool`. Click this and you will see
    the Overview screen for the elastic pool as you can see in Figure [4-29](#496204_2_En_4_Chapter.xhtml#Fig29).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig29_HTML.jpg)

    Figure 4-29: Overview of an elastic pool


    Using the Create button in the command window, I can create another database.
    What you will see in that experience is that you don’t specify a service tier,
    vCPUs, or other choices. This is because you define these choices at the `pool
    level`, not the database level.


    You can see what databases belong to the pool in the Azure portal. In the same
    Overview screen as you see in Figure [4-29](#496204_2_En_4_Chapter.xhtml#Fig29),
    click the databases under Elastic Databases in the Essentials pane, and you will
    get a screen like Figure [4-30](#496204_2_En_4_Chapter.xhtml#Fig30).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig30_HTML.jpg)

    Figure 4-30: Listing databases for an elastic pool


    You can also use the catalog view `sys.database_service_objectives()` to find
    which databases belong to a specific elastic pool. I’ll show you how to configure
    resource selection for elastic pools in Chapter [5](#496204_2_En_5_Chapter.xhtml)
    of the book.


    Here are some references for elastic pools worth reviewing:


    *   Read an overview of elastic pools at [`https://learn.microsoft.com/azure/azure-sql/database/elastic-pool-overview`](https://learn.microsoft.com/azure/azure-sql/database/elastic-pool-overview).

    *   Read about guidance to pick the right sizes for the pool at [`https://learn.microsoft.com/azure/azure-sql/database/elastic-pool-overview?view=azuresql#how-do-i-choose-the-correct-pool-size`](https://learn.microsoft.com/azure/azure-sql/database/elastic-pool-overview%253Fview%253Dazuresql%2523how-do-i-choose-the-correct-pool-size).


    ### Deploying with a CLI


    An Azure SQL Database can be deployed with command-line interfaces (CLI) through
    the `az sql db` ([`https://learn.microsoft.com/cli/azure/sql/db`](https://learn.microsoft.com/cli/azure/sql/db))
    command interfaces or through `New-AzSQLDatabase` PowerShell cmdlet ([`https://learn.microsoft.com/powershell/module/az.sql/new-azsqldatabase`](https://learn.microsoft.com/powershell/module/az.sql/new-azsqldatabase)).


    Unlike Managed Instance, it is easier to use the `az` CLI for Azure SQL Database
    without an Azure template because I only have to create the logical server and
    then I can create the database (I don’t have to create a virtual network and all
    the components first).


    **Tip**


    It is easy to create a database with a very small `az` CLI command like the following
    command:

    ```

    az sql db create -n sqldbiseasy -g bwsqldbrg -s bwsqllogicalserver

    ```

    and within a few minutes I have deployed a General Purpose 2 vCore database. This
    assumes I’ve already created the resource group and logical server, but it shows
    how simple it can be to create a new database.


    You can also deploy Azure SQL Database using Bicep ([`https://learn.microsoft.com/azure/azure-sql/database/single-database-create-bicep-quickstart`](https://learn.microsoft.com/azure/azure-sql/database/single-database-create-bicep-quickstart))
    and Terraform ([`https://learn.microsoft.com/azure/azure-sql/database/single-database-create-terraform-quickstart`](https://learn.microsoft.com/azure/azure-sql/database/single-database-create-terraform-quickstart)).


    In addition, as I showed earlier in this chapter, you can use **Copilot in Azure**
    to get easy install steps to deploy an Azure SQL Database using the `az` CLI.


    ### Implementation Details


    **Note**


    These implementation details may change over time as we change and improve the
    service. I offer up some of these details, so you can understand how we build,
    manage, and run the service.


    In Chapter [1](#496204_2_En_1_Chapter.xhtml) of this book, I covered the incredible
    history of how we have built architecture to power millions of databases for Azure
    SQL Database. Let me give you a few more details about how we implement Azure
    SQL Database behind the scenes.


    **Note**


    As I interviewed many people in the Microsoft engineering team behind the scenes
    about Azure SQL Database even as I write this chapter, we are looking into how
    to make our implementation more efficient. Therefore, it is possible even some
    of these details could be a bit outdated by the time you read this chapter. That
    is the speed of the cloud and an author’s nightmare!


    #### Dedicated Rings and Instances


    Unlike Managed Instance, we pre-deploy rings dedicated to hosting Azure SQL Databases.
    With only a few exceptions, each database is hosted by a dedicated SQL Server
    instance (exceptions being “subcore” DTU options and elastic pools). This allows
    us to provide better isolation for a customer and keep the “just worry about the
    database” model while opening some instance-level surface area (e.g., DMVs and
    columnstore indexes). We may provision these instances on the same VM or node,
    but those details are abstracted from you provided we keep to our Service Level
    Agreement (SLA) and objectives for performance.


    All the rings and instances are powered and managed using `Azure Service Fabric`.
    This is the same fabric software that you can build your own microservices. The
    Azure Service Fabric architecture is well documented at [`https://learn.microsoft.com/azure/service-fabric/service-fabric-architecture`](https://learn.microsoft.com/azure/service-fabric/service-fabric-architecture).


    #### The Logical Server


    As I stated earlier in this chapter, a database or logical server is just a metadata
    concept. We provide an interface to a server and a `master` database. But, when
    you query various aspects of the `master` database, we may be pulling data from
    other stores or files within the service to show you the information. I remember
    getting this question from Anna Hoffman as we built out our now famous Azure SQL
    for Beginners series ([`https://aka.ms/azuresql4beginners`](https://aka.ms/azuresql4beginners)).
    What I told Anna is that with SQL Server a `master` database has its own metadata
    and the physical location of the other databases on the server, which is why you
    can “switch” database context very easily (i.e., `USE <database>`). In this case
    of Azure SQL Database and a logical server, the `master` contains metadata stored
    on gateway servers and locations of nodes where user databases exist for the server.
    It is kind of difficult to switch context to another server easily with a `USE`
    statement.'
