    I described earlier in this chapter, your highest memory capacity comes from an
    Azure SQL Database Hyperscale service tier using the new memory-optimized premium
    series at around 830GB. For a Managed Instance, you can get around 870GB of memory
    using the memory-optimized premium-series. Also, keep in mind that In-Memory OLTP,
