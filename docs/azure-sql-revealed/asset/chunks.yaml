    了解更多关于 `Azure 自动化` 的信息。


    查看我们在 [`https://learn.microsoft.com/azure/azure-sql/database/automation-manage`](https://learn.microsoft.com/azure/azure-sql/database/automation-manage)
    上的文档，了解有关如何将 `Azure 自动化` 与 Azure SQL Database 结合使用的具体信息。可以将此视为比 `弹性作业` 更高级的使用
