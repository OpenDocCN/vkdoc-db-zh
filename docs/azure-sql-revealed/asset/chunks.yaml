    You can get started with Microsoft Copilot skills in Azure SQL Database at [`https://aka.ms/sqlcopilot`](https://aka.ms/sqlcopilot).


    Copilot can do more than just help you with performance. To first show you how
    Copilot understands your database context, I used a prompt like in Figure [7-3](#496204_2_En_7_Chapter.xhtml#Fig3).


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig3_HTML.jpg)


    Figure 7-3


    SQL Copilot database context


    Figure [7-4](#496204_2_En_7_Chapter.xhtml#Fig4) shows the results.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig4_HTML.jpg)


    Figure 7-4


    SQL Copilot database context results


    You can see that Copilot “understands” your current database context. Notice it
    also provides suggestions for other possible related prompts you may want to use.
    Figure [7-5](#496204_2_En_7_Chapter.xhtml#Fig5) shows what types of possible skills
    “SQL Copilot” can do in the Azure Portal.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig5_HTML.jpg)


    Figure 7-5


    SQL Copilot skills


    You can see many capabilities exist more than just performance, but that is an
    area where this capability shines.


    Note


    Copilot in Azure “understands” SQL even if you are not in the context of your
    database, but its responses will be more from documentation searches. As you can
    see from Figure [7-5](#496204_2_En_7_Chapter.xhtml#Fig5), you can also use Copilot
    to help you search Microsoft documentation even in the database context.


    I’ll show you some examples of using both Database Watcher and Microsoft Copilot
    skills in Azure SQL Database to solve some performance problems later in this
    chapter. I’ll also show you another part of the Copilot story in Chapter [10](#496204_2_En_10_Chapter.xhtml)
    of the book, which is natural language to SQL (NL2SQL).


    ### Dive into DMVs and Extended Events


    Dynamic Management Views (DMVs) and Extended Events (XEvent) have been the *bedrock*
    of diagnostics, including performance monitoring and troubleshooting for SQL Server
    for many years. I can truthfully tell you that DMV and XEvent technology all started
    with the brains of folks like Slava Oks and Conor Cunningham so many years ago.
    Many on the engineering team have worked, molded, and shaped these technologies,
    but I remember being there from the beginning with Slava and my colleague for
    many years Robert Dorr and Keith Elmore working on these technologies when we
    were in Microsoft support together. DMVs and XEvent are very important technologies
    to support performance monitoring and troubleshooting for Azure SQL because Azure
    SQL is powered by the SQL Server engine, and the SQL Server engine powers Azure
    SQL Managed Instance and Database.


    Let’s dive a bit deeper into what DMV and XEvent capabilities are the same and
    new for Azure SQL vs. SQL Server.


    #### DMVs Deep Dive


    Let’s dive deeper into DMV for Azure SQL vs. SQL Server across Azure SQL Managed
    Instance and Database.


    ##### Azure SQL Managed Instance


    All DMVs for SQL Server are available for Managed Instance. Key DMVs like **sys.dm_exec_requests**
    and **sys.dm_os_wait_stats** are commonly used to examine query performance.


    One DMV is specific to Azure called **sys.server_resource_stats** and shows historical
    resource usage for the Managed Instance. This is an important DMV to see resource
    usage since you do not have direct access to OS tools like Performance Monitor.
    You can learn more about sys.server_resource_stats at [`https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-server-resource-stats-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-server-resource-stats-azure-sql-database).


    ##### Azure SQL Database


    *Most* of the common DMVs you need for performance, including **sys.dm_exec_requests**
    and **sys.dm_os_wait_stats**, are available. It is important to know that these
    DMVs only provide information specific to the database and not across all databases
    for a logical server.


    **sys.dm_db_resource_stats** is a DMV specific to Azure SQL Database and can be
    used to view a history of resource usage for the database. Use this DMV similar
    to how you would use sys.server_resource_stats for a Managed Instance. I will
    show you how to use this DMV in an example later in this chapter. For now, you
    can read more at [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-resource-stats-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-resource-stats-azure-sql-database).


    **sys.elastic_pool_resource_stats** is like sys.dm_db_resource_stats but can be
    used to view resource usage for elastic pool databases.'
