    leader Naveen Prakash.


    Note


    You can see a more comprehensive list of team members and contributors from the
    whitepaper written for this project at [`https://www.microsoft.com/en-us/research/uploads/prod/2019/05/socrates.pdf`](https://www.microsoft.com/en-us/research/uploads/prod/2019/05/socrates.pdf).


    By May of 2016, the team had funding to move forward with their designs into a
    full-fledged project. They called it *Socrates* (Cristian says that “...as I was
    meeting a lot of folks with a ton more experience doing this than I, so it dawned
    on me that all I had were questions – hence Socrates”).


    The Socrates concept was to build a very scalable architecture in Azure through
    separation of services like logging and caching services (e.g., page servers).
    The original Socrates architecture can be seen in Figure [1-10](#496204_2_En_1_Chapter.xhtml#Fig10).


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig10_HTML.jpg)


    Figure 1-10


    The Socrates architecture


    The team moved quickly to turn their design into working code. By December of
    2016, they had a working prototype. However, this architecture was not a trivial
    project to get right, so it took until September of 2018 to launch a public preview.
    The name of the new offer would be called **Azure SQL Database Hyperscale** (we
    technically call this ***Hyperscale service tier***). By May of 2019, Hyperscale
    was a generally available service (you can read the announcement at [`https://azure.microsoft.com/updates/azure-sql-database-hyperscale-support-for-single-databases-is-now-available/`](https://azure.microsoft.com/updates/azure-sql-database-hyperscale-support-for-single-databases-is-now-available/)).


    Hyperscale literally put Azure SQL on the map at a new level even within Microsoft.
    Watch Rohan Kumar demonstrate Hyperscale at the keynote for the first time with
    Satya Nadella at the Microsoft Inspire 2019 conference ([`https://youtu.be/WtoU8gugP5g`](https://youtu.be/WtoU8gugP5g)).
    Hyperscale has grown in leaps and bounds since that time and has become the “default”
    choice for many developers for Azure SQL Database. You will see Hyperscale show
    up throughout the rest of this book.


    ## Azure SQL Today


    The evolution of Azure SQL from CloudDB to Hyperscale was an amazing journey for
    the SQL team and Microsoft. February 1, 2020, marked the official tenth year of
    Windows and SQL Azure.


    By this time, we had released three significant capabilities: the **vCore purchasing
    model**, **service tiers**, and the **serverless** database. The vCore purchasing
    model makes it clearer on how many CPU resources your application is using and
    being billed. Service tiers classified feature capabilities and resource limits
    and are called General Purpose, Business Critical, and Hyperscale (only for Azure
    SQL Database). The serverless database, which you will learn more about in the
    next chapter, provides a new method for *autoscale* compute and is now an important
    foundation of the future of Azure SQL Database.


    In the four years since that time, we have also delivered enhancements for Hyperscale,
    more cores, more storage, new hardware generations, new Azure Storage options
    for virtual machines, more redundancy options, and new monitoring experiences.
    You will learn about all of these as you traverse the rest of this book.


    In addition, our team during this time had to move internally off the original
    RDFE architecture to deploy our Azure SQL services to the modern ARM architecture
    or PaaS v2\. Moving to this architecture provided us the same benefits that modern
    virtual machines have, including scale sets, faster disks, load balancers, multi-NIC
    networking, and multiple Availability Zones, among others. This was a massive
    project but done all abstracted from users of Azure SQL services.


    Over the last two years, we have built an acceleration of new capabilities for
    Azure SQL, especially for developers, which includes AI and new integrations with
    Microsoft Fabric. We have also created a new method to connect to the cloud called
    Azure Arc. These are all beyond the traditional thought of a relational database,
    which is why the final chapter of the book, Chapter [10](#496204_2_En_10_Chapter.xhtml),
    is aptly named “Beyond RDBMS.”


    Azure itself has grown from a few data centers in three countries to 60 regions
    available in 140 countries worldwide (with 18 new regions in progress or planned).


    Tip


    If you want to see an interactive visual of Azure regions across the globe, visit
    [`https://datacenters.microsoft.com/globe`](https://datacenters.microsoft.com/globe).


    Azure experiences include a robust cross-platform command-line interface called
    **az** CLI (you will see the usage of az CLI throughout the rest of this book)
    and enhancements to the Azure portal.


    What started as shared databases on bare-metal servers supporting only a maximum
    of 10GB is now a powerful force in the industry and the future of data services
    in the cloud called **Azure SQL**.


    Azure and Azure SQL are poised for the future for even bigger things. Azure SQL
    can be an excellent destination for SQL Server in the cloud. I believe it, which
    is why I decided to write this book. This book is intended to help you navigate
    how to make your journey with Azure SQL successful. The first step in that road
    to success is to further understand the fundamentals of Azure and Azure SQL. What
    do I mean when I say the phrase Azure SQL? What are all the options for Azure
    SQL? When and why would I choose one over the other? Read on to get answers to
    those fundamental questions and more.


    ## Summary


    In this chapter, you learned the amazing journey of a small project at Microsoft
    to build a cloud database service to the world’s industry-leading database of
    Azure SQL today.


    You saw the history of how Azure SQL started as a database service but expanded
    into virtual machines and managed instances. You learned from the creators of
    the service how and why they built SQL for the cloud.


    Understanding the origins of Azure SQL can be fun. It is like reading a story.
    But now you need to start learning about what Azure SQL is and how to use it.
    The next chapter is your path to learning the fundamentals of Azure and Azure
    SQL.'
  trans: '## 苏格拉底项目走向超大规模


    2015 年秋季，当时实际上负责 SQL Server 和 Azure SQL 工程团队的 Rohan Kumar 正在召开一次会议，与他的许多高级员工讨论最近发生的一个涉及客户的“在线站点”事件。会上，他向在场人员提出了一个问题：“如果我们必须从头开始为
    Azure SQL Database 构建一个架构，那会是什么样子？”这并不是说当前的 Sterling 架构不好。事实上，Sterling 架构让 Azure
    SQL 得以显著发展。然而，团队认为，如果我们想真正运行非常大规模的关键任务工作负载，可能需要一些不同的东西。一些我们可以构建在现有 Sterling 架构之上的东西。“我们如何为云端的
    SQL 提供无限制的可扩展性”是 Rohan 给团队的使命。


    当时在场的人之一是 Cristian Diaconu，他是 SQL Server Hekaton 项目（内存 OLTP）的主要工程师之一，发挥了关键作用。Cristian
    谈到了那些早期与 Rohan 的会议：“Rohan 不断强调，他希望我们着眼于长期构建，要有更强的架构持久性，并且是我们能够引以为豪的东西，因为它在行业中是与众不同的。”


    那次会议引发了一系列关于可能的新架构的讨论，参与讨论的工程领导者包括 Hanuma Kodavalla、Tomas Talius、Donald Kossman、Justin
    Levandovski、Phil Bernstein、Peter Byrne、Peter Carlin 以及最终的工程负责人 Naveen Prakash。


    > 注意

    > 你可以在这个项目撰写的白皮书中看到更全面的团队成员和贡献者列表：[`https://www.microsoft.com/en-us/research/uploads/prod/2019/05/socrates.pdf`](https://www.microsoft.com/en-us/research/uploads/prod/2019/05/socrates.pdf)。


    到 2016 年 5 月，团队获得了资金，将其设计推进为一个成熟的项目。他们将其命名为 *Socrates*（Cristian 说：“...当时我遇到了许多在这方面经验远比我丰富的人，于是我意识到我所拥有的只有问题——因此得名苏格拉底”）。


    苏格拉底的概念是通过分离日志记录和缓存服务（例如页面服务器）等服务，在 Azure 中构建一个高度可扩展的架构。原始的苏格拉底架构如图 1-10 所示。


    ![](img/496204_2_En_1_Fig10_HTML.jpg)


    图 1-10：苏格拉底架构


    团队迅速行动，将他们的设计转化为可工作的代码。到 2016 年 12 月，他们已经有了一个工作原型。然而，这个架构并非一个容易实现的简单项目，因此直到 2018
    年 9 月才推出公开预览版。新产品的名称将被命名为 `Azure SQL Database Hyperscale`（我们技术上称之为 `Hyperscale
    服务层级`）。到 2019 年 5 月，Hyperscale 已成为一项正式发布的服务（你可以在 [`https://azure.microsoft.com/updates/azure-sql-database-hyperscale-support-for-single-databases-is-now-available/`](https://azure.microsoft.com/updates/azure-sql-database-hyperscale-support-for-single-databases-is-now-available/)
    阅读公告）。


    Hyperscale 堪称将 Azure SQL 的地位提升到了一个新高度，甚至在微软内部也是如此。观看 Rohan Kumar 在 Microsoft Inspire
    2019 大会上与 Satya Nadella 一起首次演示 Hyperscale 的主题演讲（[`https://youtu.be/WtoU8gugP5g`](https://youtu.be/WtoU8gugP5g)）。自那时起，Hyperscale
    已取得了突飞猛进的发展，并已成为许多开发人员为 Azure SQL Database 选择的“默认”方案。在本书的后续部分，你会看到 Hyperscale
    的身影。


    ## 当下的 Azure SQL


    Azure SQL 从 CloudDB 到 Hyperscale 的演进历程，对于 SQL 团队和微软而言是一段非凡的旅程。2020 年 2 月 1 日，标志着
    Windows 和 SQL Azure 正式运营十周年。


    到那时，我们已经发布了三个重要的功能：`vCore 购买模型`、`服务层级`和 `serverless` 数据库。`vCore 购买模型` 更清晰地展示了你的应用程序使用了多少
    CPU 资源以及相应的计费情况。`服务层级`对功能和资源限制进行了分类，分别称为通用型、业务关键型和超大规模型（仅适用于 Azure SQL Database）。`serverless`
    数据库（你将在下一章了解更多内容）提供了一种新的 `自动扩展` 计算资源的方法，现已成为 Azure SQL Database 未来的重要基础。


    自那以后的四年里，我们还为 Hyperscale 提供了增强功能、更多核心数、更大存储空间、新一代硬件、适用于虚拟机的新 Azure 存储选项、更多冗余选项以及新的监控体验。在阅读本书的剩余部分时，你将了解到所有这些内容。


    此外，在此期间，我们的团队内部必须从最初的 RDFE 架构迁移，以便将我们的 Azure SQL 服务部署到现代的 ARM 架构或 `PaaS v2` 上。迁移到这种架构为我们提供了与现代虚拟机相同的好处，包括规模集、更快的磁盘、负载均衡器、`多网卡`
    网络以及多个可用区等。这是一个庞大的项目，但所有操作都对 Azure SQL 服务的用户进行了抽象。


    在过去的两年里，我们加速为 Azure SQL 构建新功能，特别是面向开发者的功能，其中包括人工智能以及与 Microsoft Fabric 的新集成。我们还创建了一种名为
    Azure Arc 的新的云连接方法。这些都超越了传统关系型数据库的范畴，这也是为什么本书的最后一章，第十章，恰当地命名为“超越关系型数据库”。


    Azure 本身已经从仅在三个国家拥有少数几个数据中心，发展到在全球 140 个国家提供 60 个区域（另有 18 个新区域正在建设或规划中）。


    > 提示

    > 如果你想查看全球 Azure 区域的交互式可视化图表，请访问 [`https://datacenters.microsoft.com/globe`](https://datacenters.microsoft.com/globe)。


    Azure 的体验包括一个强大的跨平台命令行界面 `az` CLI（在本书的后续部分你会看到 `az` CLI 的用法）以及对 Azure 门户的增强。


    始于在裸机服务器上共享的、最大仅支持 10GB 的数据库，如今已发展成为业界一股强大的力量，以及云端数据服务的未来，这就是 `Azure SQL`。


    Azure 和 Azure SQL 已为未来更宏大的事业做好了准备。Azure SQL 可以成为 SQL Server 上云的绝佳目的地。我对此深信不疑，这也是我决定撰写本书的原因。本书旨在帮助你了解如何成功地进行
    Azure SQL 之旅。通往成功之路的第一步是进一步理解 Azure 和 Azure SQL 的基础。当我说 Azure SQL 这个短语时，指的是什么？Azure
    SQL 有哪些选项？我何时以及为何会选择其中一个而非另一个？请继续阅读，获取这些基本问题以及更多问题的答案。


    ## 本章小结


    在本章中，你了解了微软一个小项目如何发展为构建云数据库服务，并最终成为当今业界领先的 Azure SQL 数据库的非凡历程。


    你看到了 Azure SQL 如何从数据库服务起步，并扩展到虚拟机和托管实例的历史。你从该服务的创建者那里了解了他们如何以及为何为云构建 SQL。


    了解 Azure SQL 的起源可能很有趣。就像读一个故事。但现在你需要开始学习 Azure SQL 是什么以及如何使用它。下一章将是你学习 Azure 和
    Azure SQL 基础知识的路径。'
- fmt: '# 2. What Is Azure SQL?


    “Bob, what is the cloud?” I vividly remember my beautiful and talented wife Ginger
    asking me this question when I walked in our kitchen one evening. I paused for
    a second, getting ready to present my incredible and thoughtful answer, and said
    “Well, you see the cloud is….” Fifteen minutes later (as Ginger recalls – I thought
    it was just a few minutes), Ginger politely interrupted me and said “Uh…I was
    kind of looking for the CliffsNotes answer?” I was taken aback. How can anyone
    define the cloud as something so simple when it is such a complex topic and provides
    so much. I couldn’t let this go, so I spent the next few days researching a simpler
    answer that still defined the cloud. But I also wanted to make sure Ginger knew
    the answer to the question “What is Azure?”


    Turns out Microsoft has an answer for this in the documentation at `https://azure.microsoft.com/overview/what-is-azure/`.
    Azure is defined as “…an ever-expanding set of cloud services to help your organization
    meet your business challenges. It’s the freedom to build, manage, and deploy applications
    on a massive, global network using your favorite tools and frameworks.” I proudly
    showed this to my wife, thinking I have now provided the simple answer she wanted.
    With a twinkle in her eye (she does that), she said “That is impressive of course
    but what?” Leave it to my CEO, Satya Nadella, to save the day for me. He says
    simply “Azure is the world’s computer” (see the exact quote from the keynote he
    presented at Build 2018 at `https://news.microsoft.com/speeches/satya-nadella-build-2018/`).


    I then showed this quote to my wife. She responded “Yes. I got it. If you don’t
    have your own computer, just use Azure. Just use the cloud” (maybe we should hire
    her). That is what Azure is in a nutshell. Azure defines and provides the promise
    of cloud computing, including the following:


    *   Scale out instead of having to scale up


    *   Add and remove capacity on demand


    *   Pay for what you use as you go


    *   Double down on automation to reduce cost


    Note


    Microsoft provides a free training course on the concepts of cloud computing at
    `https://learn.microsoft.com/training/paths/microsoft-azure-fundamentals-describe-cloud-concepts/?WT.mc_id=azureportalcard_Category_overview_-inproduct-azureportal`.
    You should also know that this course is part of a suite of free Azure training
    (400+) you can find at `https://learn.microsoft.com/training/browse/?products=azure`.


    Before I define “What is Azure SQL?” I feel it is important for you to know more
    about some of the basic elements of Azure as I’ll use terms from this section
    throughout the rest of the book.


    ## The Azure Ecosystem


    To properly understand all the elements of Azure SQL and go through examples in
    the book, it is important to know certain aspects of Azure independent of Azure
    SQL. I call this the Azure ecosystem. This includes Azure accounts and subscriptions,
    interfaces such as the Azure Portal and APIs, resource management, regions, and
    Service-Level Agreements (SLAs). This section is not a comprehensive discussion
    on the topic. I’ll provide you enough information (with references), so you can
    understand terms and systems that Azure provides as you deploy and use Azure SQL
    services.


    ### Azure Accounts, Tenants, and Subscriptions


    One of the most fundamental concepts you need to get started with Azure SQL is
    an Azure account. An Azure account is required to do anything with Azure. You
    may be working for a company that has already created an account for you based
    on your organization. If not, you can create one yourself by following the documentation
    at `https://azure.microsoft.com/free`.


    Note


    While you can deploy Azure SQL resources with a free trial account, the credits
    for this account may not be enough to complete all examples in this book. The
    good news is that we have free offers and trial specific to Azure SQL.


    Accounts are identities used to assign owners or members of one or more subscriptions.
    Azure accounts are members of an Azure tenant. A tenant is usually created by
    an organization and is exposed as a Microsoft Entra (formerly Azure Active Directory)
    directory. Each account is unique in a tenant but can be a member or owner of
    multiple subscriptions within the tenant.


    Subscriptions are used to manage billing and Azure resources. In this book, I
    will not focus on the details of billing in Azure, but I will talk about various
    aspects of how Azure SQL services are charged. You can read more about management
    costs and billing in Azure at `https://learn.microsoft.com/azure/cost-management-billing/cost-management-billing-overview`.


    Subscriptions are a very important concept in Azure. Azure resources and access
    rights to resources are managed through a subscription. You will learn how to
    access resources and use an Azure subscription throughout this book. It is possible
    in your organization you are members of many different subscriptions but have
    different levels of access within each subscription. You will find out that some
    Azure resource names are unique within the scope of a subscription (while other
    names are unique to a scope of an Azure resource group or global to the entire
    Azure system).


    Subscriptions also provide a very convenient method to organize resources within
    an organization (such as production vs. non-production). There are also various
    subscription offers that determine how you pay for Azure services. The most basic
    subscription offer is Pay As You Go which means you pay for resources in your
    subscription on a monthly or sometimes hourly basis. There are other offers, including
    Free Trials, Enterprise Agreement (EA), Cloud Service Provider (CSP), Enterprise
    Dev/Test, Pay-As-You-Go Dev/Test, and Monthly Azure Credits for Visual Studio
    subscribers. You can learn about all these options at `https://azure.microsoft.com/pricing/purchase-options`.


    Note


    I wrote a blog post covering various ways to save costs with Azure SQL at `https://www.microsoft.com/en-us/sql-server/blog/2024/02/15/how-sql-developers-can-maximize-savings`.


    Azure also has the concept of Management Groups which allow you to organize and
    set policies and access to a group of subscriptions in your organization.


    One important security concept in the Azure ecosystem that applies to accounts,
    management groups, and subscriptions is Azure Policy. Azure Policy is a system
    that allows you or your organization to establish policies for management groups
    and subscriptions (or at a lower level like resource groups, which you will read
    about in the section below called “Azure Resource Manager (ARM)”). Example policies
    are built into Azure, and others can be created by you. An example of a built-in
    policy is to require all Azure SQL Databases to enable Transparent Data Encryption
    (TDE). You can read more about Azure policies at `https://learn.microsoft.com/azure/governance/policy/overview`.'
