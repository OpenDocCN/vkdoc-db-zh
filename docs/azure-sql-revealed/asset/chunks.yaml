  trans: '

    ## 部署 Azure SQL 数据库


    部署 Azure SQL 数据库与部署 Azure SQL 托管实例既有相似之处，也有不同之处。体验相似之处在于，你将使用 Azure 门户或 CLI（甚至
    T-SQL）来部署一个数据库；不同之处则在于，你部署的是……嗯，一个数据库，而不是一个 SQL Server 实例。既然你只部署一个数据库，正如我在本书中所描述的，你会获得更多选项，包括
    `Serverless`、`弹性池` 和 `Hyperscale`。


    部署 Azure SQL 数据库的基本流程是：


    *   ✓ 决定部署单个数据库还是弹性池

    *   ✓ 选择资源组和区域

    *   ✓ 选择现有或新建逻辑数据库服务器

    *   ✓ 选择你的购买模型、计算模型、服务层级、硬件配置和大小

    *   ✓ （可选）提供其他配置选项

    *   ✓ 部署它！


    ### 部署与选项


    首先，我将使用 `Azure SQL` 界面进行部署。方法是在市场中搜索 Azure SQL，就像我在第 3 章演示在 Azure 虚拟机上部署 SQL Server
    时那样，但这次在左侧选择**单一数据库**，然后点击**创建**。我将向你展示如何部署一个单一数据库，这也将允许我部署一个数据库服务器（并且我会描述你需要数据库服务器的原因以及它是什么）。


    就像我们为 Azure SQL 托管实例所做的那样，让我们逐步了解通过 Azure 门户部署数据库的所有选项。


    #### 基本


    如果你选择单一数据库，你会看到一个类似于 Azure SQL 托管实例的“基本”屏幕，如图 4-16 所示。


    ![](img/496204_2_En_4_Fig16_HTML.jpg)


    图 4-16

    部署 Azure SQL 数据库的“基本”屏幕


    从我的屏幕中可以看到，我已经创建了一个新的资源组，定义了一个数据库名称，并可以选择首先创建一个新的数据库（或逻辑）服务器。


    注意


    请注意此屏幕顶部的选项，可以选择免费的数据库优惠，地址是 [`https://aka.ms/freedboffer`](https://aka.ms/freedboffer)。


    你可能想知道为什么需要数据库服务器，毕竟 Azure SQL 数据库的承诺是“你拥有数据库；Azure 管理其他一切”。


    `数据库服务器`，也称为 `逻辑服务器`，是存储在 Azure 基础结构中的元数据集合，用于组织一个或多个 Azure SQL 数据库。它*不是*物理服务器上的单一
    SQL Server 实例。数据库服务器包含一个 `逻辑 master 数据库`，就像真正的 SQL Server 实例一样。请注意，区域与逻辑服务器关联，而不是与数据库关联。为逻辑服务器创建的任何数据库都将托管在该服务器的区域中。所有连接和网络都将与逻辑服务器关联。实际上，你可以先创建一个逻辑服务器，连接到该服务器，然后使用
    `T-SQL CREATE DATABASE` 来创建 Azure SQL 数据库。你为逻辑服务器提供的登录名和密码将成为逻辑 master 数据库中的一个登录名，该用户是服务器级别的主体，实际上相当于所有数据库的
    `服务器管理员`。


    你可以在图 4-17 中看到我创建逻辑服务器的选择，包括你的区域和首选的身份验证方法。在本例中，我将同时设置 Microsoft Entra 和 SQL 身份验证，并为两者分别提供管理员。


    ![](img/496204_2_En_4_Fig17_HTML.jpg)


    图 4-17

    为 Azure SQL 数据库创建逻辑服务器


    一旦你为逻辑服务器点击**确定**（它将作为部署的一部分创建），你可以选择是否希望将其作为弹性池的一部分，但在此我不会这样做。你可以先单独创建一个逻辑服务器，然后再为其创建数据库。在此场景中，我正在创建一个新的数据库以及一个逻辑服务器，并将该数据库与这个新服务器放在一起。


    现在，我有更多选项来完成“基本”屏幕，如图 4-18 所示。


    ![](img/496204_2_En_4_Fig18_HTML.jpg)


    图 4-18

    完成 Azure SQL 数据库的“基本”屏幕选择


    “工作负载环境”是一个便捷的方法，用于为开发环境选择较低的服务层级和 vCore 大小，或者选择生产选项，该选项将默认为 `Hyperscale`。我将选择**生产**。


    然后，你可以选择配置部署的多个方面，包括服务层级和其他资源选择。你可以选择**配置数据库**来进行这些选择。在我向你展示这些选项之前，你还可以选择备份存储冗余选项。这与
    Azure SQL 托管实例的选择类似。除非你有数据驻留要求，否则我建议你选择地域冗余选项。地域-区域冗余具有最高级别的冗余和成本，但如果你将区域冗余选择为部署选项，则需要区域冗余选项。实际上，我将为部署选择一个区域冗余选项，我的备份选项也会相应更改。


    图 4-19 显示了当你选择**配置数据库**时的选项。


    ![](img/496204_2_En_4_Fig19_HTML.jpg)


    图 4-19

    Azure SQL 数据库的计算和存储选项


    让我们逐一了解这些选项。


    ##### 服务层级


    我之前提到了你的选择：`通用型 (GP)`、`业务关键型 (BC)` 和 `Hyperscale`。


    ##### 计算层级


    对于 `GP` 和 `Hyperscale`，你可以选择 `Serverless` 或 `预配型`。我将在本章后面向你详细介绍 `Serverless`。


    ##### 硬件配置


    在这里你可以选择 `Gen5`、`FSv2`、`DC` 或 `高级硬件`。


    ##### vCores


    根据你的服务层级和硬件配置，你可以选择所需的 `vCores` 数量（以后可以放大或缩小）。最多可拥有 128 个 `vCores`。


    ##### HA 副本和区域冗余


    `Hyperscale` 允许最多 30 个命名副本，因此你可以在此处选择副本数量。我将在本书的第 8 章详细介绍 `Hyperscale` 的可用性。你不必为
    `Hyperscale` 设置任何副本，但如果你选择区域冗余，则需要至少有一个副本。


    ##### 其他选择


    *   如果你选择了 `GP` 或 `BC` 层级，你需要选择最大存储大小。对于 `GP` 和 `BC`，最大可达 4TB。对于 `Hyperscale`，没有最大存储限制，因此你无需做出选择。

    *   对于 `GP` 和 `BC` 服务层级，你可以选择 `Azure 混合权益` 进行许可。`Hyperscale` 的新定价结构不需要此选项。


    我意识到这里的选择太多了，很难跟上。我为之前的一次演示创建了这张幻灯片，你可能会觉得有用，如图 4-20 所示。


    ![](img/496204_2_En_4_Fig20_HTML.jpg)


    图 4-20

    Azure SQL 数据库部署选项

    '
- fmt: '#### Networking


    点击`Next: Networking >`查看连接性和网络安全选项，如图 [4-21](#496204_2_En_4_Chapter.xhtml#Fig21)
    所示。


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig21_HTML.jpg)


    图 4-21


    部署 Azure SQL Database 时的网络选项


    与 Azure SQL 托管实例不同，Azure SQL Database 不是私有虚拟网络的一部分。在部署时，你有三种选择：


    *   **无访问权限** – 部署数据库，但在你准备好做出选择之前不允许任何连接。

    *   **公共终结点** – 向 Azure 内或 Internet（或两者）公开逻辑服务器和/或数据库的连接。

    *   **专用终结点** – 这是 Azure SQL Database 的一项新功能，使其非常安全。这允许你拒绝公共访问服务器和/或数据库，只允许在 Azure
    内外定义的虚拟网络内进行专用连接。


    目前，我将选择公共端点，并将`Allow Azure services and resources access this server`设置为`Yes`。这允许我部署一个
    Azure 虚拟机（无论是什么虚拟网络）并连接到此数据库，或者在我当前部署浏览器的客户端计算机上使用 SQL 客户端工具进行连接。我将在本书的第 [6](#496204_2_En_6_Chapter.xhtml)
    章向你展示如何加强此模型的安全性。


    这里还有一些与 Azure SQL 托管实例类似的连接策略（`Proxy` 或 `Redirect`）和最低 TLS 版本选项。


    #### Security


    点击`Next: Security >`设置几个安全相关选项，如图 [4-22](#496204_2_En_4_Chapter.xhtml#Fig22) 所示。


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig22_HTML.jpg)


    图 4-22


    Azure SQL Database 的安全选项


    与 Azure SQL 托管实例类似，你可以为 SQL 启用`Microsoft Defender`，并获得漏洞评估和高级威胁防护等功能。


    `Ledger` 是一项提供数据库更改防篡改记录的功能，类似于 SQL 内部的区块链。你将在本书的第 [10](#496204_2_En_10_Chapter.xhtml)
    章了解更多关于 Ledger 的信息。


    服务器身份允许你为使用 Microsoft Entra 的*无密码*应用程序配置`托管身份`。


    `透明数据加密`（TDE），即静态加密，默认对 Azure SQL Database 开启。此选项为你提供了`自带密钥`（BYOK）的能力。


    最后一个选项是为`Always Encrypted`配置`安全飞地`。Always Encrypted 是 SQL 的端到端加密功能。在 [`https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves`](https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves)
    了解更多关于安全飞地的信息。


    #### Additional Settings


    点击`Next: Additional settings >`查看部署的更多选项。图 [4-23](#496204_2_En_4_Chapter.xhtml#Fig23)
    显示了这些附加选项。


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig23_HTML.jpg)


    图 4-23


    Azure SQL Database 部署的附加设置


    你的第一个选择是创建一个空白数据库，或者基于地理复制的 Azure SQL Database 备份或示例 `AdventureWorksLT`（LT 代表轻量版）创建一个数据库。你可以在
    [`https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups`](https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups)
    了解更多关于如何从地理复制备份中还原的信息。


    下一个选择是*数据库排序规则*。由于我选择了示例数据库，排序规则已经确定。对于新的空白数据库，在部署期间选择此选项非常重要，因为以后无法更改。


    #### Tags


    点击`Next: Tags >`为部署定义一个可选标记。


    #### Deploy It!


    点击`Next: Review + create >`查看最终的验证屏幕，就像任何 Azure 资源部署一样。与托管实例一样，你可以看到预估费用、使用条款、隐私政策、你的选择回顾以及下载
    Azure 模板的能力。


    点击`Create`开始部署。与托管实例一样，如果你不离开此屏幕，你将在门户的通知区域和主屏幕上看到部署进度。


    在我的示例中，部署仅用了几分钟，如图 [4-24](#496204_2_En_4_Chapter.xhtml#Fig24) 所示。


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig24_HTML.jpg)


    图 4-24


    Azure SQL Database 的已完成部署


    与托管实例部署一样，你可以点击活动日志中的`More events`查看所有资源的部署顺序。


    点击`Go to resource`查看数据库的概述屏幕，如图 [4-25](#496204_2_En_4_Chapter.xhtml#Fig25)。


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig25_HTML.jpg)


    图 4-25


    Azure SQL Database 的概述屏幕


    与虚拟机和托管实例类似，门户显示了服务菜单、命令栏、工作窗格和监控窗格。虽然这看起来像其他 Azure 资源，但其中大部分信息是 Azure SQL Database
    特有的。在你探索安全、性能、可用性和其他功能时，我们将在本书的剩余部分使用这些选项中的许多。我将在本书的第 [5](#496204_2_En_5_Chapter.xhtml)
    章讨论数据库的一些具体配置选择。


    ### 部署无服务器版


    让我们首先通过查看指定 vCore 方面的独特差异，了解如何为超大规模部署无服务器数据库。


    在你刚刚部署的数据库的概述屏幕上，点击服务器名称。这将带你进入如图 [4-26](#496204_2_En_4_Chapter.xhtml#Fig26) 所示的屏幕。


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig26_HTML.jpg)


    图 4-26


    Azure SQL Database 逻辑服务器的概述


    点击命令菜单中的`+ Create Database`为该逻辑服务器创建一个新数据库。


    在这个新数据库的“基础”屏幕上，我将使用名称`bwsqldbserverless`，然后选择`Configure database`。然后我将使用如图 [4-27](#496204_2_En_4_Chapter.xhtml#Fig27)
    的选择来选择无服务器部署。


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig27_HTML.jpg)


    图 4-27


    部署无服务器超大规模数据库


    请注意，对于无服务器，我现在可以选择最小和最大 vCore 范围。我的数据库可以根据我的资源需求自动向上和向下扩展。无服务器的关键因素是，我只需为每秒使用的
    vCore 付费，最小 vCore 作为最低固定成本。


    我的所有其他选项都与我的第一次数据库部署相同。就像我可以更改预配数据库的固定 vCore 数量一样，我以后也可以更改无服务器的最小和最大值。我将在本书的第
    [5](#496204_2_En_5_Chapter.xhtml) 章讨论配置无服务器数据库。


    注意


    通用服务层的无服务器数据库也有一个自动暂停选项，但在本书撰写时，超大规模尚不可用。'
  raw: '#### Networking


    Click **Next: Networking >** to see your choices for connectivity and network
    security as seen in Figure [4-21](#496204_2_En_4_Chapter.xhtml#Fig21).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig21_HTML.jpg)


    Figure 4-21


    Networking choices when deploying an Azure SQL Database


    Unlike Azure SQL Managed Instance, Azure SQL Database is not part of a private
    virtual network. You have three choices during deployment:


    *   **No access** – Deploy the database but do not allow any connectivity until
    you are ready to make your choice.


    *   **Public endpoint** – Expose connectivity of the logical server and/or database
    to the public within Azure or to the Internet (or both).


    *   **Private endpoint** – This is a new addition to Azure SQL Database to make
    it very secure. This allows you to deny public access to your server and/or database
    and only allow private connectivity within defined virtual networks in and outside
    of Azure.


    For now, I will select the public endpoint and set **Allow Azure services and
    resources access this server** to Yes. This allows me to deploy an Azure Virtual
    Machine (no matter what virtual network) and connect to this database or to connect
    with SQL client tools on the client computer where I am currently deploying the
    browser. I will show you how to tighten up the security of this model in Chapter
    [6](#496204_2_En_6_Chapter.xhtml) of the book.


    I also have choices here like an Azure SQL Managed Instance for connection policy
    (Proxy or Redirect) and a minimum TLS version.


    #### Security


    Click **Next: Security >** to set several security-related options as you can
    see in Figure [4-22](#496204_2_En_4_Chapter.xhtml#Fig22).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig22_HTML.jpg)


    Figure 4-22


    Security choices for Azure SQL Database


    Like Azure SQL Managed Instance, you can enable **Microsoft Defender** for SQL
    and get capabilities like Vulnerability Assessments and Advanced Thread Protection.


    **Ledger** is a feature that provides tamper-evident record of changes in the
    database, like a blockchain inside SQL. You will learn more about Ledger in Chapter
    [10](#496204_2_En_10_Chapter.xhtml) of the book.


    Server identity allows you to configure a **managed identity** for *passwordless*
    applications using Microsoft Entra.


    **Transparent Data Encryption** (TDE), encryption at rest, is on by default for
    Azure SQL Database. This option gives you the ability to Bring Your Own Key (BYOK).


    Your last option is to configure **Secure Enclaves** for Always Encrypted. Always
    Encrypted is an end-to-end encryption capability for SQL. Learn more about Secure
    Enclaves at [`https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves`](https://learn.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves).


    #### Additional Settings


    Click **Next: Additional settings >** to see more options for the deployment.
    Figure [4-23](#496204_2_En_4_Chapter.xhtml#Fig23) shows these additional options.


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig23_HTML.jpg)


    Figure 4-23


    Additional settings for the deployment of Azure SQL Database


    Your first choice is to either create a blank database or create a database based
    on a backup of a geo-replicated Azure SQL Database or from the sample AdventureWorksLT
    (LT stands for light). You can learn more about how to restore from a geo-replicated
    backup at [`https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups`](https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups).


    Your next choice is *database collation*. Since I chose a sample database, the
    collation is already decided. For a new blank database, it is important to choose
    this during deployment because you cannot change it later.


    #### Tags


    Click **Next: Tags >** to define an optional tag for the deployment.


    #### Deploy It!


    Click **Next: Review + create >** to see the final validation screen as you can
    see from any Azure resource deployment. Just like with Managed Instance, you can
    see estimated costs, terms of use, privacy policy, a review of your choices, and
    the ability to download an Azure template.


    Click **Create** to see the deployment take off. Just like with Managed Instance
    if you do not leave this screen, you will see the progress of your deployment
    in both the notification area of the portal and on your main screen.


    In my example, the deployment only took a matter of minutes as shown in Figure
    [4-24](#496204_2_En_4_Chapter.xhtml#Fig24).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig24_HTML.jpg)


    Figure 4-24


    A completed deployment of Azure SQL Database


    Just like a Managed Instance deployment, you can click More events in the Activity
    Log to see the sequence of deploying all resources.


    Click **Go to resource** to see the Overview screen on the database like Figure
    [4-25](#496204_2_En_4_Chapter.xhtml#Fig25).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig25_HTML.jpg)


    Figure 4-25


    The Overview screen of an Azure SQL Database


    Just like with a virtual machine and Managed Instance, the portal shows a Service
    Menu, Command Bar, Working Pane, and Monitoring Pane. While this looks like other
    Azure resources, most of this information is specific to Azure SQL Database. We
    will use many of these options throughout the rest of the book as you explore
    security, performance, availability, and other features. I’ll discuss some specific
    configuration choices for the database in Chapter [5](#496204_2_En_5_Chapter.xhtml)
    of the book.


    ### Deploying Serverless


    Let’s first look at how to deploy a Serverless database for Hyperscale by looking
    at the unique difference on specifying vCores.


    On the Overview screen of the database you just deployed, click the server name.
    This brings you to a screen like Figure [4-26](#496204_2_En_4_Chapter.xhtml#Fig26).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig26_HTML.jpg)


    Figure 4-26


    Overview of a logical server for Azure SQL Database


    Click **+ Create Database** in the Command Menu to create a new database for this
    logical server.


    On the Basics screen for this new database, I’ll use a name of **bwsqldbserverless**
    and then select Configure database. I’ll then use choices like Figure [4-27](#496204_2_En_4_Chapter.xhtml#Fig27)
    to choose a Serverless deployment.


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig27_HTML.jpg)


    Figure 4-27


    Deploying a serverless Hyperscale database


    Notice here with Serverless I can now choose a min and max vCore range. My database
    can scale up and down automatically based on my resource needs. And the key factor
    for Serverless is that I only pay for the vCores I use per second with the min
    vCore as the min fixed cost.


    All my other options are the same as my first database deployment. Just like I
    can change the number of fixed vCores for a Provisioned database, I can change
    the min and max for serverless later. I’ll discuss later about configuring a Serverless
    database in Chapter [5](#496204_2_En_5_Chapter.xhtml) of the book.


    Note


    A General Purpose service tier serverless database also has an option for auto-pause,
    but that is not available at the time of the writing of this book for Hyperscale.'
