  trans: '# Azure SQL 的地理恢复与还原操作


    ### 数据库的地理恢复


    假设你 Azure SQL 数据库或托管实例中的数据库因数据中心故障而无法使用。虽然这种情况很少见，但如果能从一个未发生故障的其他区域的地理冗余备份中恢复备份，那就太好了。


    此过程称为 `geo-restore`（地理恢复），其概述位于 [`https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups?view=azuresql&tabs=azure-portal#geo-restore`](https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups?view=azuresql&tabs=azure-portal#geo-restore)。概念是，你将基于一个备份部署一个新的
    Azure SQL 数据库或为托管实例创建一个新数据库。选择此选项时，系统将为你显示所有现有 Azure SQL 部署的已知备份。如果存储你常规备份的数据中心宕机，我们将从不同的区域检索该备份的地理冗余副本。


    ### 从已删除的数据库还原备份


    Azure SQL 内置的高可用性与灾难恢复 (HADR) 选项源源不断。假设你不小心删除了 Azure SQL 数据库或托管实例的数据库。


    注意：与传统的 SQL Server 相比，删除 Azure SQL 数据库或托管实例的数据库在幕后要执行更多操作，因为我们有各种类型的服务和操作与该数据库相关联。这就是为什么你可以通过
    Azure 界面或 `DROP DATABASE` T-SQL 语句来删除数据库。


    我意识到这或许不是你几乎从未见过的事情，但内置 HADR 的一个亮点是，当你删除数据库后，你可以基于你配置的保留期，使用点时间还原 (PITR) 从与该已删除数据库关联的备份中恢复。如果你的保留期是七天，而你删除了数据库，我们将无法再执行任何备份，但你可以从最早的备份点到数据库删除的时间点之间，还原到任意时间点。


    注意：你无法从已删除的逻辑服务器或托管实例中恢复。但是，如果你配置了长期保留 (LTR) 备份，你可以基于这些备份创建新数据库。你可能会问，既然 LTR 备份不是免费的，我该如何移除
    LTR 备份？你可以使用 PowerShell 命令 `Remove-AzSqlDatabaseLongTermRetentionBackup` 或 `Remove-AzSqlInstanceDatabaseLongTermRetentionBackup`，即使逻辑服务器或托管实例已被删除。


    你可以通过 Azure 门户、`az` CLI 或 PowerShell 还原已删除的数据库。有关如何执行此操作的更多信息，请访问 [`https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups?view=azuresql&tabs=azure-portal#deleted-database-restore`](https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups?view=azuresql&tabs=azure-portal#deleted-database-restore)。


    ### 在 Azure SQL 托管实例中还原


    本章前面我提到过，可以为 Azure SQL 托管实例执行 `BACKUP` T-SQL 语句。我们将此功能称为原生数据库备份。使用“原生”一词是因为你可以使用
    `BACKUP` T-SQL 语句执行完整数据库备份到磁盘存储。此磁盘存储必须是 Azure 存储账户，并使用 SQL Server 已支持多个版本的“备份到
    URL”功能。


    你必须使用 `WITH COPY_ONLY` 选项来备份托管实例的数据库。SQL Server 已支持仅复制备份多个版本。仅复制备份不会影响完整、差异和日志备份的备份序列。我们的团队发布了一篇关于如何在托管实例上设置原生备份的精彩博客，地址为
    [`https://techcommunity.microsoft.com/t5/azure-sql-database/native-database-backup-in-azure-sql-managed-instance/ba-p/386154`](https://techcommunity.microsoft.com/t5/azure-sql-database/native-database-backup-in-azure-sql-managed-instance/ba-p/386154)。


    既然你可以在托管实例上执行原生备份，你也可以使用 T-SQL `RESTORE` 语句还原这些备份。你只能将托管实例的仅复制备份还原到现有或新的托管实例。请记住，它是一个新数据库。例如，如果你尝试使用
    `RESTORE` 的 `WITH REPLACE` 语法，将会收到错误（错误号 41901）。


    此外，你可以获取任何受支持版本的 SQL Server 的完整数据库备份，并将其还原到托管实例。这实际上是一种执行从 SQL Server 到托管实例的简单离线迁移的方法。了解更多请访问
    [`https://learn.microsoft.com/data-migration/sql-server/managed-instance/database-migration-service?toc=%2Fazure%2Fdms%2Ftoc.json&tabs=online-with-extension`](https://learn.microsoft.com/data-migration/sql-server/managed-instance/database-migration-service?toc=%2Fazure%2Fdms%2Ftoc.json&tabs=online-with-extension)。


    以下文档页面将引导你完成在托管实例上执行原生还原的过程：[`https://learn.microsoft.com/azure/azure-sql/managed-instance/restore-sample-database-quickstart`](https://learn.microsoft.com/azure/azure-sql/managed-instance/restore-sample-database-quickstart)。


    ## 内置可用性


    SQL Server 有一个伟大的传统，即提供必要的功能和软件来保持你的数据库高度可用。这个传统始于使用共享存储的 Always On 故障转移群集实例 (FCI)，并集成了诸如
    Windows Server 故障转移群集 (WSFC) 等技术以实现自动故障转移。在 SQL Server 2012 中，我们引入了 Always On
    可用性组，以支持非共享存储方法、只读副本，并且仍然与 WSFC 集成以进行自动故障转移决策。SQL Server Linux 也支持这些功能，但集成了 Pacemaker
    等 Linux 技术。


    Azure SQL 工程团队希望提供的一个方面是公开承诺服务级别协议 (SLA)，包括可用性。他们还希望数据库或托管实例的部署过程在配置和设置可用性时能“直接完成”。最后，由于
    Azure SQL 是与 Azure Service Fabric (SF) 一起部署的，我们需要与 SF 集成以进行故障转移决策。


    结果确实是一个令人惊叹的成果。你选择的每个 Azure SQL 部署选项都具有内置的可用性。让我们看看每个部署选项以及使其成为可能的可用性架构。你也可以参考以下文档页面：[`https://learn.microsoft.com/en-us/azure/azure-sql/database/business-continuity-high-availability-disaster-recover-hadr-overview`](https://learn.microsoft.com/en-us/azure/azure-sql/database/business-continuity-high-availability-disaster-recover-hadr-overview)。尽管本章中关于通用目的和服务业务关键服务层的详细信息适用于
    Azure SQL 托管实例和数据库，但对于 Azure SQL 托管实例，有一些值得注意的差异，详见 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/high-availability-sla-local-zone-redundancy`](https://learn.microsoft.com/azure/azure-sql/managed-instance/high-availability-sla-local-zone-redundancy)。'
- fmt: '### General Purpose Availability


    I’ve described the overall concept of a General Purpose (GP) service tier several
    times in this book. Your databases are stored on `Azure Storage`, while `tempdb`
    is stored on local `SSD` storage. Let’s use a visual to describe more about the
    General Purpose architecture and how availability and failover work. (These figures
    are based on diagrams in the documentation at [`https://learn.microsoft.com/azure/azure-sql/database/high-availability-sla-local-zone-redundancy?view=azuresql&tabs=azure-powershell#basic-standard-and-general-purpose-service-tier-availability`](https://learn.microsoft.com/azure/azure-sql/database/high-availability-sla-local-zone-redundancy?view=azuresql&tabs=azure-powershell#basic-standard-and-general-purpose-service-tier-availability).)


    Figure [8-8](#496204_2_En_8_Chapter.xhtml#Fig8) shows the architecture for GP
    availability.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig8_HTML.jpg)


    Figure 8-8


    General Purpose service tier availability


    An application will connect to the primary replica (there is only one replica
    with General Purpose) by using `gateways` in the control ring in an Azure region.
    If you remember, we talked about connection types of `proxy` and `redirect` with
    gateways in Chapters [4](#496204_2_En_4_Chapter.xhtml) and [6](#496204_2_En_6_Chapter.xhtml)
    of the book. In either case, the `gateways` provide a connection abstraction for
    the application. Notice the local `SSD` storage for the deployment is where `tempdb`
    is stored.


    The database and transaction log files are put on `Azure Premium Storage` using
    `LRS` (local redundant storage). This means your database and transaction log
    files are replicated three times within the physical location of the data center.


    As I’ve described earlier in this chapter, your backup files are stored in a different
    storage location with redundancy options of `LRS`, `ZRS`, and `GRS`.


    Note


    Azure SQL Managed Instance also supports `geo-zone-redundant` backups for a GP
    service tier even if the deployment is not zone redundant.


    The Azure SQL deployment is integrated with `Service Fabric (SF)` to detect problems
    (e.g., a node failure) and initiate a `failover` if necessary. If a `failover`
    is required, we will find a new node with spare capacity to host your deployment.


    The local storage of the new node hosts `SQL Server`, including `tempdb`. The
    new `SQL Server` will be directed to your database and log files on `Azure Storage`.
    This type of architecture is very similar to how an `FCI` works for `SQL Server`.
    Your downtime is based on how fast we can find a new node with enough capacity
    to host your deployment choices (`vCores`, etc.). In addition, `SQL Server` that
    is hosting your database on the new node has just started up with a cold buffer
    and plan cache, so normal startup activities will affect your performance (recovery
    of the database will be extremely fast since we use `Accelerated Database Recovery`).


    You may be wondering how does the application connect to the new node after a
    `failover`? The `gateways` are the answer. The application never changes any names
    to connect to the new node. The `gateways` take care of that logic. The application
    must simply retry a connection and is off and running.


    ### Business Critical Availability


    A Business Critical (BC) deployment relies on local storage and a series of replicas,
    much like an `Always On Availability Group (AG)`. Let’s look at the BC architecture
    as compared to General Purpose. Figure [8-9](#496204_2_En_8_Chapter.xhtml#Fig9)
    shows the architecture of a BC deployment with availability.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Business Critical service tier availability


    You can see from this figure that `gateways` are still an important part of connectivity
    and that a primary replica exists. Local storage is used for `tempdb` but also
    for database and log files. In addition, like an `Always On Availability Group`,
    there are secondary replicas. For a BC deployment, we always keep four replicas
    up and running (one primary and three secondaries). From a transaction point of
    view, a commit cannot proceed on the primary replica until *at least one* of the
    secondary replicas has acknowledged the changes are hardened.


    You can also see that backup files are stored in `Azure Storage` with redundancy
    options as I’ve described earlier in this book.


    Note


    Azure SQL Managed Instance also supports `geo-zone-redundant` backups for a BC
    service tier even if the deployment is not zone redundant.


    If a `failover` is necessary, we simply need to choose a secondary replica that
    is synchronized and make the primary replica just like an `AG`. Downtime is significantly
    less than General Purpose since the new primary replica simply has to run undo
    recovery to become available. Since `Accelerated Database Recovery (ADR)` is enabled,
    undo recovery can be very fast. I’ll discuss more about the importance of `ADR`
    later in this chapter. If the old primary replica is not usable, we will need
    to spin up a new secondary replica (and synchronize it) to keep four available.


    Just like General Purpose service tier, applications just need to reconnect and
    start running again due to the use of `gateways`. In addition, a BC deployment
    will allow you to use `one` of the secondary replicas as a `read-only replica`
    as part of your monthly free for using BC. Our `gateways` help provide the redirection
    logic. You simply just ensure application supplied the correct “`read intent`”
    option. You can learn more at [`https://learn.microsoft.com/azure/azure-sql/database/read-scale-out`](https://learn.microsoft.com/azure/azure-sql/database/read-scale-out).


    Note


    Read scale-out supports session-level consistency. It means, if the `read-only`
    session reconnects after a connection error caused by replica unavailability,
    it may be redirected to a replica that is not 100% up to date with the `read-write`
    replica. Likewise, if an application writes data using a `read-write` session
    and immediately reads it using a `read-only` session, it is possible that the
    latest updates are not immediately visible on the replica (milliseconds up to
    single-digit seconds). The latency is caused by an asynchronous transaction log
    redo operation.


    Let’s look at an example where you can test out the built-in availability and
    a failover scenario for `Azure SQL Database`. For this example, I deployed a new
    Business Critical service tier database, `bwsqlbc`, using the same logical server
    I’ve been using in the book, `bwsqllogicalserver`. This database was deployed
    using the sample `AdventureWorksLT` and uses 2 `vCores`.


    To try this example, you will also need the `ostress.exe` program I’ve used in
    previous chapters as described and in the prerequisites in the beginning of the
    chapter. You will use `Azure PowerShell` as part of this exercise, and I also
    have scripts you will use in the `ch8_availability` folder.


    You can use any client you need. For me, I’ll use my own laptop because I want
    to authenticate with Azure using my Microsoft account with `MFA`:


    1.  **Log in to Azure with PowerShell and set your subscription context.** I first
    had to log in to Azure with `PowerShell` using the following command:


    ```

    Connect-AzAccount

    ```'
