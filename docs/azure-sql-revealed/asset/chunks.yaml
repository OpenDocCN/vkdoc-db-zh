    收藏以下资源，以随时了解我们关于 SQL 和 AI 的所有最新内容：


    [`https://aka.ms/sqlai`](https://aka.ms/sqlai) – 这是我们文档中所有关于 SQL 和 AI 主题的一站式中心。


