    Azure 工程团队负责 Azure SQL Database 服务的运行状况、成本和运营。这涉及所有类型的主动监控以确保健康和可靠性。但这也意味着团队负责更新驱动服务的所有幕后软件。


    SQL Azure 工程师现在参与了*实时站点*体验，这在今天可以被视为一种*DevOps 模式*。如果发生中断，SQL Azure 工程团队会直接参与解决问题。随着时间的推移，这些经验推动了创新和自动化。Azure
    SQL Database 生态系统背后大部分的功能都是为了避免问题的手动干预而构建的。甚至为 Azure SQL Database 和 SQL Server
    引入的新功能也源于团队的实时站点经验，这些经验确保了服务的健康、应用程序的性能以及数据库的可靠性和可用性。Peter Carlin 描述了实时站点的好处：“……基本上我们过去
    5 年所构建的一切都是由 live site 的经验教训驱动的。在很多方面，我们一开始并不知道如何运行我们自己的产品，一旦我们意识到我们让它变得多么困难，就可以做出改变使其更容易运维——从而使所有
    SQL DBA 受益。”


    正如 Rohan Kumar 所说，“我们最大的挑战之一是团队文化。我们需要创建一个不仅能构建出色软件，还能在运维上运行它的团队。”


    到 2015 年，Azure SQL Database 已凭借 v12 拥有了面向未来的稳健架构，并通过创新为性能和安全增加了价值。随着新客户使用该服务构建应用程序，反馈和
    Live Site 经验推动了未来的创新，无论是对于架构还是新的部署模型。'
- fmt: '## Bending Azure SQL Database


    As we announced the introduction of Basic, Standard, and Premium editions and
    were phasing out Web and Business editions, we had some customers, mostly ISVs,
    that brought us a dilemma. Web and Business editions charged only for storage,
    not for compute, but there was no predictable performance. Basic, Standard, and
    Premium editions were paid by DTU, not just storage. Some ISVs wanted to host
    many databases, sometimes 1000s, to support their application, many of them Software
    as a Service (SaaS) applications. The new edition model with DTUs would now become
    cost prohibitive. Not all 1000 databases needed the same DTU capacity, but more
    importantly, the needed DTU usage could vary widely across these databases. The
    only way to support all these databases to provide required performance would
    be to pay for the maximum DTU needed for any database.


    Around the 2014 timeframe, program managers Morgan Oslake and Tobias Ternstrom
    were assigned to come up with a solution where according to Morgan, “We (SQL DB)
    needed a price-perf optimized solution for SaaS ISVs with apps containing 10s,
    100s, 1000s or more databases.” Tobias proposed the project named `Malmo` (as
    Morgan recalls, “…the name was motivated by the observation that Malmo, the city
    in Sweden, was growing rapidly and bursting in population size. In any case, a
    concept of Malmo is to more efficiently accommodate bursting episodes of multi-database
    apps”). The team moved fast to a private preview of the capability for databases
    to be grouped together called an `elastic pool`. We moved to public preview in
    April of 2015 and General Availability in 2016. Read the announcement at [`https://azure.microsoft.com/updates/azure-sql-database-supports-large-numbers-of-databases-for-saas-providers/`](https://azure.microsoft.com/updates/azure-sql-database-supports-large-numbers-of-databases-for-saas-providers/).


    Elastic pools allowed a developer to group databases together in a pool and consume
    and pay for usage as an elastic DTU or `eDTU`. You will learn more about how elastic
    pools work in Chapter [2](#496204_2_En_2_Chapter.xhtml) of the book. Having elastic
    pool as an offering also helped pave the way to deprecate and remove the Web and
    Business edition model.


    With new editions, the Sterling architecture, DTUs, and elastic pools, many of
    what customers needed to adopt Azure SQL Database were in place. However, some
    customers using the SQL Server “box” product were resistant. As we polled and
    talked to these customers, we discovered the `surface area` of Azure SQL Database
    didn’t meet their core requirements. By 2016, we decided we needed to develop
    another option to enable more customers to adopt Azure SQL.


    ## Lifting Customers to the Cloud


    With the success of the MDCS team working on Automatic Tuning, our team turned
    to them to work on another project to help reduce the friction from migrating
    SQL Server instances to Azure. One of the leaders in MDCS, Drazen Sumic, told
    me the origin of the project. He said “Lindsey Allen, one or our leaders in Azure
    SQL, was on a flight back from Microsoft Ignite in 2016 after receiving tons of
    feedback on Azure SQL and came up with an idea to `lift` customers to the cloud.”
    By December of 2016, the MDCS team was working on project `CloudLifter`.


    By 2016, Azure Virtual Machine offered many choices to deploy a full instance
    of SQL Server. However, a user must still own the management and every aspect
    of the guest OS and SQL Server. No Azure service existed to provide some of the
    benefits of PaaS but also `feel` like a SQL Server instance. That is what Lindsey
    proposed to Drazen and the MDCS team. The team had to find a way to deploy and
    `expose` a SQL Server instance within the PaaS architecture of Azure, including
    integration with Service Fabric. Users would then connect to the SQL Server instance
    and use it just like a regular SQL Server on-premises or in Azure Virtual Machine.
    In addition, the new service still needed to provide the benefits of PaaS, such
    as built-in high availability and SLAs.


    The team spent almost the entire 2017 year in a private preview program for a
    new service called `Azure SQL Database Managed Instance` (or often called just
    Managed Instance). Many folks in MDCS worked on this project, including Borko
    Novakovic, Jovan Cukalovic, Branko Kokanovic, and Milan Novakovic. Public preview
    of Managed Instance landed in March of 2018, and General Availability for the
    first set of tiers was announced at the Microsoft Ignite conference in September
    2018 (you can read the announcement at [`https://azure.microsoft.com/blog/azure-sql-database-managed-instance-general-purpose-tier-general-availability/`](https://azure.microsoft.com/blog/azure-sql-database-managed-instance-general-purpose-tier-general-availability/)).


    Even though many folks in Redmond were instrumental in this project, including
    Lindsey Allen, Peter Carlin, and Alexander Vorobyov, this project was an important
    milestone for the MDCS team for SQL. According to Drazen, “Yes, this was the largest
    project to date to be driven from the Serbia team. We’re proud of it, and thankful
    for the trust. Previous efforts were also important (e.g. Query Store for the
    SQL 2016 wave) but were smaller features compared to this one.”


    Managed Instance solved another aspect for increased cloud adoption, but the ability
    to handle very large enterprise workloads was still an issue for the team.'
