    You will see in these tables what sizes, IOPS, and throughput each type supports.


    *   We have guidance in our documentation specific to choosing the right storage
    for SQL Server for Azure VM at [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist).


    *   This documentation provides nice guidance on choosing the right sizes for
    Azure Premium Storage along with VM size. You can read this at [`https://learn.microsoft.com/azure/virtual-machines/premium-storage-performance`](https://learn.microsoft.com/azure/virtual-machines/premium-storage-performance).


    *   An independent study on performance for SQL Server on Azure Virtual Machine
    was published by GigaOm. Learn more at [`https://techcommunity.microsoft.com/t5/sql-server-blog/sql-server-on-azure-vms-the-best-price-performance-gets-even/ba-p/3727091`](https://techcommunity.microsoft.com/t5/sql-server-blog/sql-server-on-azure-vms-the-best-price-performance-gets-even/ba-p/3727091).


