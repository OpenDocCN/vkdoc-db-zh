    Ray Ozzie became the Chief Software Architect of Microsoft in the summer of 2006
    (taking the role held by Bill Gates), and this email would set the stage for what
    would become known as ***Azure***. SQL Server was destined to become a huge part
    of it.


    ## CloudDB


    In early 2006, Paul Flessner, Vice President of the Data Storage and Platform
    division of Microsoft, decided to step down as the leader of SQL Server and turn
    over the reins to Ted Kummert. When Ted took over to lead SQL Server, a project
    was already underway to look at cloud services led by Technical Fellow Peter Spiro,
    who was a chief architect for several SQL Server releases, including SQL Server
    7.0, 2000, and 2005\. Peter formed a team which included several engineers. Among
    them was an architect still at Microsoft today: Ajay Kalhan. The team embarked
    on a project to build a cloud-based service to host databases. They called it
    ***CloudDB***. As Ted tells it, “We needed to build a cloud version of SQL. Our
    goal was to build a *serverless* or Platform as a Service (PaaS) SQL. A customer
    wouldn’t worry about a server or VM, just a database.”


    To build a cloud-based database service, the team needed to build out a robust
    design to support the concept of hosting multiple customers or “databases” isolated
    from each other using shared resources. This concept is called *multi-tenant*.


    Note


    The term *tenant* can mean many things in the cloud. For CloudDB in the beginning,
    a tenant referred to a database owned by a customer. You will see throughout this
    book the word tenant, but I’ll be clear about the scope of what I mean when using
    the term.


    According to Ajay Kalhan, from the beginning the CloudDB team started working
    out designs to incorporate concepts such as failure detection, logical master
    (think of a “metadata” master not physical), load balancing, and deployment. Early
    designs even looked at the idea of a “key value store” instead of traditional
    relational database concepts. Not long after the team was building out the design
    for CloudDB, Ted assigned David Campbell to also work on the project and lead
    the team toward a true mission of “SQL Server in the Cloud.”


    The team believe it needed an internal customer to help *dogfood* the project
    and prove they could host customers. That internal customer would become a public-facing
    cloud service called **Exchange Hosted Archive (EHA)** (an email archive solution
    in the cloud predating Office 365). For this internal customer, early designs
    to support multi-tenants (which in this case even though there was one internal
    customer, that customer serviced the needs of multiple customers) used a concept
    called *silos* where a SQL Server could host multiple databases, but tenants were
    partitioned within the database itself. EHA became one of the first ***Software
    as a Service*** (**SaaS**) services at Microsoft to use our cloud-based database
    service. Think of SaaS as purchasing software on a subscription basis and using
    the software from a hosted solution, like in Azure. You just focus on using an
    application hosted somewhere other than your computers. Since SQL Server hosted
    the back-end databases, the team forked the codebase of SQL Server 2005 to use
    for the service.


    While the CloudDB team was working on their project with a goal to support EHA
    and other customers, another team at Microsoft was chartered by Ray Ozzie to look
    at how to host *compute services* in the cloud.'
  trans: '

    最后，感谢你们——这些支持并帮助我们推广`SQL Server`和`Azure SQL`精彩故事的社区成员。你们中的许多人已经踏上了迁移到`Azure`的旅程，还有一些人仍在进行中或正在考虑。感谢所有`#sqlfamily`，你们为与`SQL`相关的一切投入了热情和精力。


    **关于作者** **关于技术审阅者**


    # 1. SQL Server 登陆云端


    2005 年末，微软公司（我在这里可能有点偏心）在企业级市场风生水起，`SQL Server`产品也是如此。2005 年 10 月，我们即将发布`SQL Server
    2005`（代号`Yukon`），不幸的是，它的开发耗时五年（这是另一本书的故事了——你可以去问问保罗·兰德尔）。那时我在微软技术支持部门工作，尽管`SQL
    Server 2005`上市有所延迟，我仍为这个版本感到非常自豪。Windows、Windows Server、Office 和 Xbox 360 都是微软当时广受欢迎的产品。


    2005 年 10 月，一位新加入微软的架构师雷·奥兹向公司几位高管发送了一封内部邮件（最终发送给了所有员工，包括一位在公司工作了 12 年的老将鲍勃·沃德），题为《互联网服务的中断》（这封邮件很快泄露到了网上，你可以在[`https://www.cnet.com/news/ozzie-memo-internet-services-disruption/`](https://www.cnet.com/news/ozzie-memo-internet-services-disruption/)阅读）。我记得当时作为员工听说了邮件泄露以及部分内容，但没太在意。互联网不就是用来收邮件和浏览网页的吗？在这封邮件中，雷·奥兹描绘了微软成为一家`云提供商`，而不仅仅是一家“传统软件公司”的蓝图。当时微软其实只有少数几个“互联网服务”产品，包括传奇的
    Hotmail 电子邮件服务（自 1997 年就存在了）、Bing 搜索服务和 Xbox Live。雷·奥兹的这封邮件勾勒了一个宏大得多的愿景。


    这封邮件中的一个关键陈述是：“……所有业务部门都已被要求制定计划，以拥抱这一使命，并创建新的服务产品，为客户提供价值，并利用我们今天所拥有以及正在为未来构建的平台能力。”我当时并不知道，`SQL
    Server`团队内部将为此展开多少幕后工作来制定相关计划。


    2006 年夏天，雷·奥兹成为微软的首席软件架构师（接替比尔·盖茨的职位），而这封邮件为后来被称为`Azure`的项目奠定了基础。`SQL Server`注定会成为其中的重要组成部分。


    ## CloudDB


    2006 年初，微软数据存储和平台部门副总裁保罗·弗莱斯纳决定卸任`SQL Server`的领导职务，将权杖交给泰德·库默特。当泰德接手领导`SQL Server`时，一个由技术院士彼得·斯皮罗领导的云服务研究项目已经在进行中。彼得是`SQL
    Server`多个版本（包括`SQL Server 7.0`、`2000`和`2005`）的首席架构师。他组建了一个团队，其中包括几位工程师。其中有一位至今仍在微软的架构师：阿贾伊·卡尔汉。该团队着手开展一个项目，旨在构建一个基于云的服务来托管数据库。他们称之为`CloudDB`。正如泰德所说：“我们需要构建一个云版本的`SQL`。我们的目标是构建一个`无服务器`或平台即服务（`PaaS`）的`SQL`。用户无需担心服务器或虚拟机，只需关心数据库本身。”


    要构建基于云的数据库服务，该团队需要设计一个稳健的方案，以支持使用共享资源托管多个客户或“数据库”并彼此隔离的概念。这个概念被称为`多租户`。


    注意


    在云中，`租户`一词可以有很多种含义。对于最初的`CloudDB`来说，租户指的是客户拥有的一个数据库。在本书中，你会多次看到“租户”这个词，但我在使用时会明确其范围。


    根据阿贾伊·卡尔汉的说法，从一开始，`CloudDB`团队就开始研究设计方案，以融入故障检测、逻辑主节点（请理解为“元数据”主节点，而非物理节点）、负载均衡和部署等概念。早期的设计甚至探索了“键值存储”的想法，而非传统的关系型数据库概念。在团队构建`CloudDB`设计后不久，泰德指派大卫·坎贝尔也参与该项目，并带领团队朝着真正的“云端`SQL
    Server`”使命前进。


    团队认为需要一个内部客户来帮助`试用该项目`并证明他们能够托管客户。这个内部客户后来成为一个面向公众的云服务，名为`Exchange Hosted Archive
    (EHA)`（一个早于 Office 365 出现的云端电子邮件归档解决方案）。针对这个内部客户，支持多租户的早期设计（即使只有一个内部客户，该客户也需要服务多个最终客户的需求）采用了一个称为`筒仓`的概念，即一个`SQL
    Server`可以托管多个数据库，但租户在数据库内部进行分区。`EHA`成为微软最早使用我们基于云数据库服务的`软件即服务`（`SaaS`）之一。可以把`SaaS`理解为以订阅方式购买软件，并通过托管解决方案（如在`Azure`中）使用该软件。你只需专注于使用托管在你自己计算机之外某处的应用程序。由于`SQL
    Server`托管了后端数据库，该团队便分叉了`SQL Server 2005`的代码库用于此服务。


    当`CloudDB`团队致力于他们的项目，目标是支持`EHA`和其他客户时，微软的另一个团队则受雷·奥兹委托，研究如何在云中托管`计算服务`。

