  trans: '

    ### 部署弹性池


    让我们通过查看部署弹性池及池中每个数据库的不同选项，来一起探讨如何部署一个包含两个超大规模数据库的弹性池。


    使用与之前部署无服务器数据库相同的方法，我将为同一个逻辑服务器创建一个新数据库。但如你在图 4-28 中所见，需要选择将新数据库放入新弹性池的选项。


    ![](img/496204_2_En_4_Fig28_HTML.jpg)

    图 4-28：在弹性池中创建数据库


    你也可以选择先单独创建池。在本场景中，我同时创建了一个数据库和一个池，并将这个新数据库放入了该池中。


    现在我的池中已有一个数据库，让我们再添加一个——这次是一个资源分配不同的数据库（因为这正是我会使用池的原因之一）。


    在我刚刚部署的数据库 `sqldb1` 的概览页上，你会看到名为 `bwsqldbpool` 的弹性池被列出。点击它，你将看到如图 4-29 所示的弹性池概览屏幕。


    ![](img/496204_2_En_4_Fig29_HTML.jpg)

    图 4-29：弹性池概览


    使用命令窗口中的“创建”按钮，我可以创建另一个数据库。在该体验中，你会发现无需指定服务层、vCPU 或其他选项。这是因为这些选择是在 `池级别` 定义的，而非数据库级别。


    你可以在 Azure 门户中查看哪些数据库属于该池。在如图 4-29 所示的同一概览屏幕上，点击“概要”窗格中“弹性数据库”下的数据库，你将获得一个类似图
    4-30 的屏幕。


    ![](img/496204_2_En_4_Fig30_HTML.jpg)

    图 4-30：列出弹性池的数据库


    你还可以使用目录视图 `sys.database_service_objectives()` 来查找哪些数据库属于特定的弹性池。我将在本书第 5 章向你展示如何为弹性池配置资源选择。


    以下是一些值得查阅的弹性池相关参考资料：


    *   阅读弹性池概述：[`https://learn.microsoft.com/azure/azure-sql/database/elastic-pool-overview`](https://learn.microsoft.com/azure/azure-sql/database/elastic-pool-overview)。

    *   阅读有关为池选择合适大小的指导：[`https://learn.microsoft.com/azure/azure-sql/database/elastic-pool-overview?view=azuresql#how-do-i-choose-the-correct-pool-size`](https://learn.microsoft.com/azure/azure-sql/database/elastic-pool-overview%253Fview%253Dazuresql%2523how-do-i-choose-the-correct-pool-size)。


    ### 使用 CLI 部署


    Azure SQL 数据库可通过命令行接口（CLI），使用 `az sql db` ([`https://learn.microsoft.com/cli/azure/sql/db`](https://learn.microsoft.com/cli/azure/sql/db))
    命令接口或 `New-AzSQLDatabase` PowerShell cmdlet ([`https://learn.microsoft.com/powershell/module/az.sql/new-azsqldatabase`](https://learn.microsoft.com/powershell/module/az.sql/new-azsqldatabase))
    进行部署。


    与托管实例不同，为 Azure SQL 数据库使用 `az` CLI 更为简便，无需使用 Azure 模板，因为我只需创建逻辑服务器，然后即可创建数据库（无需先创建虚拟网络及所有组件）。


    **提示**


    使用类似如下简短的 `az` CLI 命令即可轻松创建数据库：

    ```

    az sql db create -n sqldbiseasy -g bwsqldbrg -s bwsqllogicalserver

    ```

    几分钟内，我便部署了一个通用型 2 vCore 数据库。这假设我已经创建了资源组和逻辑服务器，但它展示了创建新数据库可以有多简单。


    你也可以使用 Bicep ([`https://learn.microsoft.com/azure/azure-sql/database/single-database-create-bicep-quickstart`](https://learn.microsoft.com/azure/azure-sql/database/single-database-create-bicep-quickstart))
    和 Terraform ([`https://learn.microsoft.com/azure/azure-sql/database/single-database-create-terraform-quickstart`](https://learn.microsoft.com/azure/azure-sql/database/single-database-create-terraform-quickstart))
    部署 Azure SQL 数据库。


    此外，正如我在本章前面所示，你可以使用 **Azure 中的 Copilot** 来获取使用 `az` CLI 部署 Azure SQL 数据库的简易安装步骤。


    ### 实现细节


    **注意**


    随着我们对服务进行更改和改进，这些实现细节可能会随时间而变化。我提供其中一些细节，是为了让你了解我们如何构建、管理和运行该服务。


    在本书第 1 章，我介绍了我们为 Azure SQL 数据库构建架构以支撑数百万个数据库的非凡历程。让我再为你详细说明一些我们在幕后实现 Azure SQL
    数据库的方式。


    **注意**


    即使在我撰写本章时，我采访了幕后参与 Azure SQL 数据库的许多微软工程团队成员，我们也在研究如何使我们的实现更高效。因此，甚至其中一些细节在你阅读本章时可能已略显过时。这就是云的速度和作者的噩梦！


    #### 专用环与实例


    与托管实例不同，我们预部署了专用于托管 Azure SQL 数据库的环。除了少数例外情况，每个数据库都由专用的 SQL Server 实例托管（例外情况是“低于核心”的
    DTU 选项和弹性池）。这使我们能够为客户提供更好的隔离性，并保持“只需关注数据库”的模型，同时开放一些实例级别的表面区域（例如，DMV 和列存储索引）。我们可能会在同一虚拟机或节点上配置这些实例，但只要我们遵守服务级别协议（SLA）和性能目标，这些细节对你来说是抽象的。


    所有这些环和实例都由 `Azure Service Fabric` 提供支持和管理。这是你可用于构建自己的微服务的相同基础结构软件。Azure Service
    Fabric 架构有详细文档：[`https://learn.microsoft.com/azure/service-fabric/service-fabric-architecture`](https://learn.microsoft.com/azure/service-fabric/service-fabric-architecture)。


    #### 逻辑服务器


    正如我在本章前面所述，数据库或逻辑服务器只是一个元数据概念。我们为服务器和 `master` 数据库提供了一个接口。但是，当你查询 `master` 数据库的各个方面时，我们可能从服务内的其他存储或文件中提取数据来向你展示信息。我记得在构建我们如今著名的
    Azure SQL 入门系列 ([`https://aka.ms/azuresql4beginners`](https://aka.ms/azuresql4beginners))
    时，Anna Hoffman 向我提出了这个问题。我告诉 Anna，在 SQL Server 中，`master` 数据库拥有自己的元数据以及服务器上其他数据库的物理位置，这就是为什么你可以非常轻松地“切换”数据库上下文（即
    `USE <database>`）。而在 Azure SQL 数据库和逻辑服务器的情况下，`master` 包含存储在网关服务器上的元数据以及用户数据库所在节点的位置。使用
    `USE` 语句轻松切换上下文到另一个服务器是有点困难的。

    '
- fmt: "## Storage, Compute, and Gateways\n\nYou will see in Chapter [8](#496204_2_En_8_Chapter.xhtml)\
    \ for availability more details on the architecture behind the scenes on how we\
    \ implement high availability (HA) for General Purpose, Business Critical, and\
    \ Hyperscale service tiers. We achieve certain HA capabilities by either using\
    \ Azure Storage or local storage with technologies like Always On Availability\
    \ Groups.\n\nIn each of these cases, one of the key components for connectivity\
    \ is a `gateway`. Gateways are nodes that basically route traffic to nodes hosting\
    \ SQL Server databases. I mentioned the use of redirect vs. proxy connection types\
    \ with a Managed Instance earlier in the chapter. The same concept will apply\
    \ with an Azure SQL Database. Gateways are critical to connectivity in that they\
    \ provide abstractions to an application for connectivity no matter where the\
    \ node for the database lives, which you will learn more about in Chapter [6](#496204_2_En_6_Chapter.xhtml)\
    \ on security and Chapter [8](#496204_2_En_8_Chapter.xhtml) on availability.\n\
    \n## Serverless\n\nServerless compute involves several interesting technologies\
    \ we implement within the standard deployment of a SQL Server. Many of these details\
    \ are described in our documentation at [`https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview`](https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview).\n\
    \nSince storage and compute are separated for a Serverless deployment, `pausing`\
    \ a database is not that difficult since no application is connected. We just\
    \ need to keep around enough state information that when a new login is made,\
    \ we can connect the database to an instance and “warm up” the application.\n\n\
    Autoscaling is more interesting. We need to scale up or down the database CPU\
    \ resources without application disruption. And if we can scale on a node that\
    \ can meet the new scaling demand, there is no disruption. However, if we cannot\
    \ meet that demand, we may need to use an Azure Load Balancer to keep the application\
    \ connected if possible until a new node is found to meet demand, but there can\
    \ be a disconnection when the new node is brought up.\n\nMemory management is\
    \ also different in that we must deploy memory policies to reclaim memory for\
    \ the SQL Server instance when CPU or cache utilization is low. Think of this\
    \ concept as though we are signaling SQL Server there is external memory pressure\
    \ and lowering the target for memory. Autoscaling and memory management for Serverless\
    \ is described more at [`https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview?view=azuresql&tabs=general-purpose#autoscaling`](https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview%253Fview%253Dazuresql%2526tabs%253Dgeneral-purpose%2523autoscaling).\n\
    \n## Hyperscale\n\nHyperscale is a unique implementation for a database within\
    \ the same architecture of databases (dedicated rings and nodes) implemented much\
    \ differently than General Purpose or Business Critical service tiers.\n\nA Hyperscale\
    \ deployment involves a series of nodes for compute, logging, and caching combined\
    \ with Azure Storage. I talked about this architecture in Chapter [1](#496204_2_En_1_Chapter.xhtml)\
    \ of the book, but it is worth showing you again as seen in Figure [4-31](#496204_2_En_4_Chapter.xhtml#Fig31)\
    \ (which is directly from the documentation at [`https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale?view=azuresql#distributed-functions-architecture`](https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale%253Fview%253Dazuresql%2523distributed-functions-architecture)).\n\
    \n![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig31_HTML.jpg)\n\nFigure 4-31:\
    \ The Hyperscale architecture\n\nI will show you more of the working parts of\
    \ this architecture in Chapter [8](#496204_2_En_8_Chapter.xhtml) of this book,\
    \ but let me stop and call out a few key components:\n\n*   Separate compute and\
    \ storage\n\n    Just like General Purpose, we store database files on Azure Storage.\
    \ But notice here we use Azure Standard Storage. Speed to access the database\
    \ files is not as important because of the caching system.\n\n*   The `caching`\
    \ system\n\n    We use a combination of page servers (actual nodes that host database\
    \ pages) and buffer pool caches (think SSD drives that extend the buffer pool)\
    \ on page servers and compute nodes.\n\n*   Log Service\n\n    For Hyperscale,\
    \ any logged changes are still in a log cache on the primary compute node. However,\
    \ when log changes must be flushed to disk (a commit), these I/O requests are\
    \ `redirected` to another node where a component called the Log Service runs (this\
    \ is also called Xlog). The Log Service is responsible for ensuring changes are\
    \ stored locally (called the `landing zone`) and are refreshed to the caching\
    \ system, secondary replicas, and eventually to Azure Storage.\n\n*   Decoupled\
    \ replicas\n\n    In a way, Hyperscale provides you with the best of both the\
    \ General Purpose and Business Critical tiers. The actual database and transaction\
    \ log files are stored in Azure Storage (which has its own redundancy), but we\
    \ also have replicas for extremely fast high availability.\n\n    However, the\
    \ secondary replica system does not use Always On Availability Groups. In fact,\
    \ the primary and secondary replicas are not aware of each other. Secondary replicas\
    \ use a log change methodology but are fed changes from the Log Service. Commits\
    \ on the primary replica can proceed once the Log Service has hardened the changes.\n\
    \n    High availability is even allowed with no secondary replicas. How? If the\
    \ primary node has an issue, we can deploy a new primary replica on a new node\
    \ and use page servers or even the database files on Azure Storage because it\
    \ is decoupled. Having said this, RTO is much faster with the presence of secondary\
    \ replicas. The secondary replica system (because you can have four of these)\
    \ provides the best read-scale option for Azure SQL Database.\n\n*   `Hyperfast`\
    \ backup and restore\n\n    Because most of the data access comes from the caching\
    \ system, reading database pages from the database files is rare with a `warm`\
    \ system. This allows us to use snapshot backups for database files. Snapshot\
    \ backups are extremely fast since we just copy the files to another storage location.\
    \ And the other amazing story is restore. Restoring a database snapshot is crazy\
    \ fast!\n\n## Resource Governance\n\nTo meet the SLA requirements for Azure SQL\
    \ Database, we must put some resource limits on the usage of the database. I have\
    \ described some of these limits in this chapter. Behind the scenes, we use these\
    \ technologies to enforce these limits.\n\n### SQL Server Resource Governor\n\n\
    Azure SQL Managed Instance allows user defined workload groups and pools. Azure\
    \ SQL Database uses Resource Governor behind the scenes to enforce certain limits.\
    \ Moving to a dedicated SQL Server instance was a key driver in allowing us to\
    \ use Resource Governor.\n\n### Engine enhancements\n\nThe engine has been enhanced\
    \ in Azure to detect the generation of a certain size and rate of transaction\
    \ log records and govern the application if necessary. The primary signal this\
    \ governance is happening is seeing a wait type of `LOG_RATE_GOVERNOR`. You can\
    \ read more about log rate governance at [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance).\n\
    \n### Windows Job Objects\n\nI have mentioned this technology before in this chapter.\
    \ Windows Job Objects allow us to control resource usage on the SQL Server engine\
    \ process to ensure we properly enforce resource limits like memory."
  raw: '#### Storage, Compute, and Gateways


    You will see in Chapter [8](#496204_2_En_8_Chapter.xhtml) for availability more
    details on the architecture behind the scenes on how we implement high availability
    (HA) for General Purpose, Business Critical, and Hyperscale service tiers. We
    achieve certain HA capabilities by either using Azure Storage or local storage
    with technologies like Always On Availability Groups.


    In each of these cases, one of the key components for connectivity is a *gateway*.
    Gateways are nodes that basically route traffic to nodes hosting SQL Server databases.
    I mentioned the use of redirect vs. proxy connection types with a Managed Instance
    earlier in the chapter. The same concept will apply with an Azure SQL Database.
    Gateways are critical to connectivity in that they provide abstractions to an
    application for connectivity no matter where the node for the database lives,
    which you will learn more about in Chapter [6](#496204_2_En_6_Chapter.xhtml) on
    security and Chapter [8](#496204_2_En_8_Chapter.xhtml) on availability.


    #### Serverless


    Serverless compute involves several interesting technologies we implement within
    the standard deployment of a SQL Server. Many of these details are described in
    our documentation at [`https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview`](https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview).


    Since storage and compute are separated for a Serverless deployment, *pausing*
    a database is not that difficult since no application is connected. We just need
    to keep around enough state information that when a new login is made, we can
    connect the database to an instance and “warm up” the application.


    Autoscaling is more interesting. We need to scale up or down the database CPU
    resources without application disruption. And if we can scale on a node that can
    meet the new scaling demand, there is no disruption. However, if we cannot meet
    that demand, we may need to use an Azure Load Balancer to keep the application
    connected if possible until a new node is found to meet demand, but there can
    be a disconnection when the new node is brought up.


    Memory management is also different in that we must deploy memory policies to
    reclaim memory for the SQL Server instance when CPU or cache utilization is low.
    Think of this concept as though we are signaling SQL Server there is external
    memory pressure and lowering the target for memory. Autoscaling and memory management
    for Serverless is described more at [`https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview?view=azuresql&tabs=general-purpose#autoscaling`](https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview%253Fview%253Dazuresql%2526tabs%253Dgeneral-purpose%2523autoscaling).


    #### Hyperscale


    Hyperscale is a unique implementation for a database within the same architecture
    of databases (dedicated rings and nodes) implemented much differently than General
    Purpose or Business Critical service tiers.


    A Hyperscale deployment involves a series of nodes for compute, logging, and caching
    combined with Azure Storage. I talked about this architecture in Chapter [1](#496204_2_En_1_Chapter.xhtml)
    of the book, but it is worth showing you again as seen in Figure [4-31](#496204_2_En_4_Chapter.xhtml#Fig31)
    (which is directly from the documentation at [`https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale?view=azuresql#distributed-functions-architecture`](https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale%253Fview%253Dazuresql%2523distributed-functions-architecture)).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig31_HTML.jpg)


    Figure 4-31


    The Hyperscale architecture


    I will show you more of the working parts of this architecture in Chapter [8](#496204_2_En_8_Chapter.xhtml)
    of this book, but let me stop and call out a few key components:


    *   Separate compute and storage


    Just like General Purpose, we store database files on Azure Storage. But notice
    here we use Azure Standard Storage. Speed to access the database files is not
    as important because of the caching system.


    *   The *caching* system


    We use a combination of page servers (actual nodes that host database pages) and
    buffer pool caches (think SSD drives that extend the buffer pool) on page servers
    and compute nodes.


    *   Log Service


    For Hyperscale, any logged changes are still in a log cache on the primary compute
    node. However, when log changes must be flushed to disk (a commit), these I/O
    requests are *redirected* to another node where a component called the Log Service
    runs (this is also called Xlog). The Log Service is responsible for ensuring changes
    are stored locally (called the *landing zone*) and are refreshed to the caching
    system, secondary replicas, and eventually to Azure Storage.


    *   Decoupled replicas


    In a way, Hyperscale provides you with the best of both the General Purpose and
    Business Critical tiers. The actual database and transaction log files are stored
    in Azure Storage (which has its own redundancy), but we also have replicas for
    extremely fast high availability.


    However, the secondary replica system does not use Always On Availability Groups.
    In fact, the primary and secondary replicas are not aware of each other. Secondary
    replicas use a log change methodology but are fed changes from the Log Service.
    Commits on the primary replica can proceed once the Log Service has hardened the
    changes.


    High availability is even allowed with no secondary replicas. How? If the primary
    node has an issue, we can deploy a new primary replica on a new node and use page
    servers or even the database files on Azure Storage because it is decoupled. Having
    said this, RTO is much faster with the presence of secondary replicas. The secondary
    replica system (because you can have four of these) provides the best read-scale
    option for Azure SQL Database.


    *   *Hyperfast* backup and restore


    Because most of the data access comes from the caching system, reading database
    pages from the database files is rare with a *warm* system. This allows us to
    use snapshot backups for database files. Snapshot backups are extremely fast since
    we just copy the files to another storage location. And the other amazing story
    is restore. Restoring a database snapshot is crazy fast!


    #### Resource Governance


    To meet the SLA requirements for Azure SQL Database, we must put some resource
    limits on the usage of the database. I have described some of these limits in
    this chapter. Behind the scenes, we use these technologies to enforce these limits.


    ##### SQL Server Resource Governor


    Azure SQL Managed Instance allows user defined workload groups and pools. Azure
    SQL Database uses Resource Governor behind the scenes to enforce certain limits.
    Moving to a dedicated SQL Server instance was a key driver in allowing us to use
    Resource Governor.


    ##### Engine enhancements


    The engine has been enhanced in Azure to detect the generation of a certain size
    and rate of transaction log records and govern the application if necessary. The
    primary signal this governance is happening is seeing a wait type of LOG_RATE_GOVERNOR.
    You can read more about log rate governance at [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance).


    ##### Windows Job Objects


    I have mentioned this technology before in this chapter. Windows Job Objects allow
    us to control resource usage on the SQL Server engine process to ensure we properly
    enforce resource limits like memory.'
  trans: "## 存储、计算与网关\n\n在第 8 章中，您将看到更多关于通用版、商业关键版和超大规模服务层级背后实现高可用性 (HA) 的架构细节。我们通过使用\
    \ Azure 存储或结合诸如始终可用性组等技术的本地存储来实现某些 HA 能力。\n\n在所有情况下，连接性的一个关键组件是 `网关`。网关是基本上负责将流量路由到托管\
    \ SQL Server 数据库节点的节点。本章前文提到了托管实例中重定向与代理连接类型的使用。相同的概念也适用于 Azure SQL 数据库。网关对于连接性至关重要，因为它们为应用程序提供连接抽象，无论数据库节点位于何处，这将在第\
    \ 6 章（关于安全性）和第 8 章（关于可用性）中进一步阐述。\n\n## 无服务器\n\n无服务器计算涉及我们在 SQL Server 标准部署中实现的几项有趣技术。许多细节已在我们的文档\
    \ [`https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview`](https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview)\
    \ 中描述。\n\n由于无服务器部署中存储和计算是分离的，因此 `暂停` 数据库并不困难，因为没有应用程序连接。我们只需要保留足够的状态信息，以便在新的登录发生时，可以将数据库连接到实例并“预热”应用程序。\n\
    \n自动缩放则更有趣。我们需要在不中断应用程序的情况下向上或向下扩展数据库 CPU 资源。如果我们可以满足新扩展需求的节点上进行扩展，则不会发生中断。但是，如果我们无法满足该需求，我们可能需要使用\
    \ Azure 负载均衡器，在可能的情况下保持应用程序连接，直到找到满足需求的新节点，但在新节点启动时可能会发生断开连接。\n\n内存管理也有所不同，我们必须部署内存策略，在\
    \ CPU 或缓存利用率低时回收 SQL Server 实例的内存。可以将这个概念理解为，我们正在向 SQL Server 发出存在外部内存压力的信号，并降低内存目标。无服务器的自动缩放和内存管理在\
    \ [`https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview?view=azuresql&tabs=general-purpose#autoscaling`](https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview%253Fview%253Dazuresql%2526tabs%253Dgeneral-purpose%2523autoscaling)\
    \ 中有更详细的描述。\n\n## 超大规模\n\n超大规模是针对数据库的一种独特实现，其架构（专用环和节点）与通用版或商业关键服务层级有显著不同。\n\n\
    超大规模部署涉及一系列用于计算、日志记录和缓存的节点，并结合 Azure 存储。我在本书第 1 章中讨论过此架构，但值得再次展示给您，如图 4-31 所示（该图直接来自文档\
    \ [`https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale?view=azuresql#distributed-functions-architecture`](https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale%253Fview%253Dazuresql%2523distributed-functions-architecture)）。\n\
    \n![](img/496204_2_En_4_Fig31_HTML.jpg)\n\n图 4-31：超大规模架构\n\n我将在本书第 8 章向您展示此架构的更多工作部分，但请允许我停下来指出几个关键组件：\n\
    \n*   计算与存储分离\n\n    与通用版类似，我们将数据库文件存储在 Azure 存储上。但请注意，这里我们使用的是 Azure 标准存储。由于缓存系统的存在，访问数据库文件的速度并非首要考量。\n\
    \n*   `缓存` 系统\n\n    我们在页面服务器（实际托管数据库页面的节点）和计算节点上，结合使用页面服务器和缓冲池缓存（可视为扩展缓冲池的 SSD\
    \ 驱动器）。\n\n*   日志服务\n\n    对于超大规模，任何记录的更改最初仍位于主计算节点的日志缓存中。然而，当日志更改必须刷新到磁盘（提交）时，这些\
    \ I/O 请求会被 `重定向` 到运行着一个名为日志服务（也称为 Xlog）组件的另一个节点。日志服务负责确保更改被本地存储（称为 `着陆区`）并刷新到缓存系统、辅助副本，并最终到\
    \ Azure 存储。\n\n*   解耦的副本\n\n    在某种程度上，超大规模为您提供了通用版和商业关键版的最佳组合。实际的数据库和事务日志文件存储在\
    \ Azure 存储中（具有其自身的冗余），但我们也有副本以实现极快速的高可用性。\n\n    然而，辅助副本系统不使用始终可用性组。实际上，主副本和辅助副本彼此并不知晓。辅助副本使用日志更改方法，但其更改来源于日志服务。一旦日志服务固化了更改，主副本上的提交即可进行。\n\
    \n    即使没有辅助副本，也被允许实现高可用性。如何实现？如果主节点出现问题，我们可以在新节点上部署一个新的主副本，并使用页面服务器甚至 Azure 存储中的数据库文件，因为它已被解耦。话虽如此，有辅助副本存在时，恢复时间目标要快得多。辅助副本系统（因为您最多可以拥有四个）为\
    \ Azure SQL 数据库提供了最佳的读取扩展选项。\n\n*   `超快速` 备份与恢复\n\n    由于大多数数据访问来自缓存系统，在 `预热`\
    \ 的系统中很少需要从数据库文件中读取数据库页面。这使我们能够对数据库文件使用快照备份。快照备份速度极快，因为我们只需将文件复制到另一个存储位置。另一个惊人的地方是恢复。恢复数据库快照的速度快得惊人！\n\
    \n## 资源治理\n\n为了满足 Azure SQL 数据库的服务级别协议要求，我们必须对数据库的使用设置一些资源限制。本章中已描述了其中一些限制。在幕后，我们使用这些技术来执行这些限制。\n\
    \n### SQL Server 资源治理器\n\nAzure SQL 托管实例允许用户定义工作负载组和池。Azure SQL 数据库在后台使用资源治理器来强制执行某些限制。迁移到专用\
    \ SQL Server 实例是允许我们使用资源治理器的关键驱动因素。\n\n### 引擎增强\n\n引擎在 Azure 中得到了增强，可以检测特定大小和速率的事务日志记录生成，并在必要时对应用程序进行治理。观察到等待类型为\
    \ `LOG_RATE_GOVERNOR` 是此治理正在发生的主要信号。您可以在 [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server?view=azuresql#transaction-log-rate-governance)\
    \ 阅读更多关于日志速率治理的信息。\n\n### Windows 作业对象\n\n本章前面提到过这种技术。Windows 作业对象允许我们控制 SQL Server\
    \ 引擎进程上的资源使用，以确保我们正确执行诸如内存之类的资源限制。"
- fmt: '##### File Source Resource Manager (FSRM)


    FSRM provides a mechanism, so we can properly enforce storage maximum sizes outside
    of what we control through SQL Server file size limits.


    We have created a nice blog post talking about how we enforce resource limits
    using these technologies and why we use them at [https://azure.microsoft.com/blog/resource-governance-in-azure-sql-database/](https://azure.microsoft.com/blog/resource-governance-in-azure-sql-database/).


    ### Connecting and Verifying Deployment


    Once you deploy an Azure SQL Database, you will likely want to quickly connect
    and verify aspects of the deployment.


    #### Connecting to Azure SQL Database


    Earlier in this chapter, I deployed my logical server and Azure SQL Database,
    allowing public endpoint access with options to access through Azure services
    and with a firewall rule for the client IP address where I deployed through the
    portal. I will show you how to connect using both techniques.


    Because I used the option Allow Azure services and resources to access this server
    when I deployed the logical server for the database, I can use an Azure Virtual
    Machine or even `sqlcmd` from the Azure Cloud Shell to connect to this server
    and database.


    To connect with Azure Cloud Shell, you need to find the name of the logical server
    for the deployment. There are many ways to do this through the portal. You can
    simply look at your resource groups or resources from the home of the portal and
    find the server `bwsqllogicalserver` (or your name).


    Figure [4-32](#496204_2_En_4_Chapter.xhtml#Fig32) shows the Working Pane of the
    server with the server name to use when connecting with a SQL Server tool or application.


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig32_HTML.jpg)


    Figure 4-32

    Find the server name to connect


    Notice I clicked next to the server name to copy the Fully Qualified Domain Name
    (FQDN) to the clipboard. You will find the FQDN is a combination of the logical
    server name and `.database.windows.net`.


    Note


    Azure SQL Database also supports the concept of a DNS alias, which you can read
    about at [https://learn.microsoft.com/azure/azure-sql/database/dns-alias-overview](https://learn.microsoft.com/azure/azure-sql/database/dns-alias-overview).


    I can now bring up the Azure Cloud Shell (you can use the home page of the portal
    or [https://shell.azure.com](https://shell.azure.com)).


    Since `sqlcmd` is installed in the cloud shell, I can use a syntax like Figure
    [4-33](#496204_2_En_4_Chapter.xhtml#Fig33).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig33_HTML.jpg)


    Figure 4-33

    Using `sqlcmd` from the Azure Cloud Shell


    I could also connect inside a VM in Azure with a tool like SSMS, but let me show
    you another way.


    I also configured the logical server for a firewall rule for the IP address of
    the computer when I was using the Azure Portal. In the Working Pane of the logical
    server, I can select **Show firewall settings** to see the following information.
    Figure [4-34](#496204_2_En_4_Chapter.xhtml#Fig34) shows this firewall setting
    along with other network options.


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig34_HTML.jpg)


    Figure 4-34

    Configure firewall rules for Azure SQL Database


    A firewall rule is very much like a firewall rule you would configure in Windows
    Server or Linux. If you have used SQL Server before you know that by default,
    we do not open the firewall rules in the OS for port 1433 by default. The firewall
    rule above is opening access to the gateway for this logical server for this specific
    IP address. Firewall rules can be specified at the logical server or database
    level. You can read more about firewall rules for Azure SQL Database at [https://learn.microsoft.com/azure/azure-sql/database/firewall-configure](https://learn.microsoft.com/azure/azure-sql/database/firewall-configure).
    I will talk more about using a more secure method to connect to Azure SQL Database
    called `Private Link` in Chapter [6](#496204_2_En_6_Chapter.xhtml) of the book.


    Since my client IP address is in the firewall rule, I can use a tool like SQL
    Server Management Studio to connect to the logical server from my client laptop
    as seen in Figure [4-35](#496204_2_En_4_Chapter.xhtml#Fig35).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig35_HTML.jpg)


    Figure 4-35

    Connecting to Azure SQL Database with SSMS


    You can see here I used Microsoft Entra authentication since I added my Microsoft
    Entra account as an admin when I deployed the logical server.


    Once I hit connect, I get the familiar Object Explorer, and expanding the list
    of databases, I see all the databases I have deployed in this chapter. I can right-click
    the server, select New Query, and try to switch database context to one of my
    databases as seen in Figure [4-36](#496204_2_En_4_Chapter.xhtml#Fig36).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig36_HTML.jpg)


    Figure 4-36

    Trying to switch database context for Azure SQL Database


    You can first see some differences for Object Explorer (OE), including the color
    of the icon (Azure blue) for the server name. Notice also there are not as many
    choices in OE as there are with SQL Server or Managed Instance (because this is
    not a full SQL Server instance).


    When I connected with SSMS specifying no options, I was put in the context of
    the logical master for the logical server. I tried to change the database context
    with the familiar T-SQL `USE` statement, but it failed. Why?


    If you think about T-SQL `USE` on a SQL Server, the engine switches context to
    a database stored on the instance. For an Azure SQL Database logical server, the
    databases are on separate SQL Server instances that can be spread across various
    rings in the Azure region. The `USE` statement is not built to redirect connections
    to different servers.


    Therefore, for SSMS, you can either specify the database to connect to before
    you hit the Connect button (use the Options button) or switch database context
    using the drop-down box (which does change the connection context).'
