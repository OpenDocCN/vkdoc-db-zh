    as you would deploy in a virtual machine in Hyper-V or VMware. Your responsibility
    is to manage all aspects of the guest operating system and SQL Server environment.
    However, because the virtual machine runs in Azure, there are benefits to assist
    you in managing SQL Server and the virtual machine. Chapter [3](#496204_2_En_3_Chapter.xhtml)
    is a complete discussion of SQL Server on Azure Virtual Machines.


    #### Managed Instances


    Officially called **Azure SQL** **Managed Instance**, this is an Azure service
    one level *up* from Azure Virtual Machine. Managed Instance is a *full* SQL Server
    database engine *instance* deployed as a PaaS service, hence the term *managed*.
    Azure provides the host server, hardware system, and virtual machines, allowing
    you to focus on deploying and managing a SQL Server instance and set of databases.
    You will see throughout the rest of this book the benefits of Azure PaaS for Managed
    Instance especially in the areas of security, scale, and high availability.


    #### Databases


    Officially known as **Azure SQL Database**, this is an Azure PaaS service up another
    level from managed instance. Azure provides a method to deploy one or more databases
    and takes care of the host, hardware system, virtual machine, and SQL Server instance.
    You will see that Azure SQL Database provides many different deployment options
    to meet unique database application scenarios. Azure SQL Database provides PaaS
    benefits in the areas of security, scale, intelligent performance, and high availability.


    ## Azure SQL Managed Instance


    I described the history and purpose behind Azure SQL Managed Instance, or **Managed
    Instance**, in Chapter [1](#496204_2_En_1_Chapter.xhtml) of the book: make it
    easier to lift SQL Server applications to Azure (a.k.a. CloudLifter). You should
    absolutely think of a Managed Instance like a SQL Server ***Database Engine instance***
    today you install on-premises. The install or deploy experience will be completely
    different as you will learn in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the
    book. The experience of setting up the infrastructure to connect and network with
    the instance will also be different. However, once you have completed these tasks,
    your experience with Managed Instance will *feel* like a SQL Server instance today.


    Today, when you install SQL Server, you have a single *database engine instance*
    of SQL Server running. You can deploy multiple databases in the instance or deploy
    multiple instances.


    For a Managed Instance, you also will have a database engine instance running
    in the Azure infrastructure after a successful deployment. You then are free to
    perform instance-level configuration tasks, create databases, load data, and start
    connecting and use the instance. You are abstracted from the infrastructure details
    of how a managed instance is deployed. However, it can be important to know some
    aspects of how a managed instance is deployed in the Azure infrastructure. You
    will learn more about the architecture of a managed instance deployment in Chapter
    [4](#496204_2_En_4_Chapter.xhtml) of the book.


    ### Managed Instance Capabilities


    Since a managed instance is like a **database engine instance** **of SQL Server**,
    the *surface area* of the database engine is almost 100% like SQL Server. If these
    capabilities of SQL Server are important to you, then a Managed Instance may be
    the best choice:


    *   SQL Server Agent jobs


    *   Database Mail


    *   Cross-database transactions


    *   SQL Server Replication


    *   Linked servers


    *   SQL CLR


    *   DTC transactions


    *   Resource Governor


    *   Service Broker


    These capabilities are not exposed with Azure SQL Database.


    That is not the complete list, and we are constantly adding new features to get
    Managed Instance as close to a complete 100% SQL Server database engine instance
    as possible. You can see the latest complete list of differences between Managed
    Instance and SQL Server at [`https://aka.ms/azuresqlmitsqldiff`](https://aka.ms/azuresqlmitsqldiff).


    Note


    This is an exhaustive list of T-SQL differences. Consider in some cases it may
    not matter. For example, the T-SQL syntax to create and manage Availability Groups
    doesn’t exist for managed instance. However, this may be fine for your requirements
    since managed instance can automatically deploy and manage an Availability Group
    for you.


    There are major benefits in using a managed instance because it is a PaaS service:


    *   Built-in high availability (including Availability Groups), automated backups,
    point-in-time restore, and recovery of deleted databases. But you also can perform
    your own native backup (COPY_ONLY) and restore.


    *   A 99.99% uptime SLA.


    *   HADR across Azure regions with auto-failover groups.


    *   Zone redundancy.


    *   Free licensing for disaster recovery.


    *   Security isolation with virtual network integration and private link networks.


    *   Microsoft Entra Integration.


    *   Windows Authentication.


    *   Simple and easy-to-use scaling options for resources.


    *   A *versionless* SQL Server constantly updated with the latest updates and
    features but also a *versioned* instance to maintain compatibility with SQL Server
    2022.


    Note


    You will learn more details on what a versionless and versioned SQL Server means
    in Chapter [5](#496204_2_En_5_Chapter.xhtml) of this book.


    *   Abstraction from the details and maintenance of the host and virtual machine
    environment.


    *   A free trial offer for Managed Instance.


    *   Integration with Azure Monitor and Database Watcher.


    *   Set up an online migration strategy or compatibility with SQL Server 2002
    using a Managed Instance link.


    *   PaaS security capabilities such as Microsoft Defender for Azure SQL. You will
    learn more about Microsoft Defender for Azure SQL in Chapter [6](#496204_2_En_6_Chapter.xhtml)
    of this book.


    As you go throughout this book, you will be learning in more detail about many
    capabilities of a managed instance.


    ### Managed Instance Options and Limits


    When you install a SQL Server in a virtual machine or bare-metal server, you typically
    are provided preconfigured CPUs, memory, and storage resources (size and speed).


    When you deploy a managed instance, you will have similar choices to make to meet
    your resource needs. These choices start with a concept called a **service tier**.
    For Managed Instance, the two service tier choices are **General Purpose** and
    **Business Critical**.


    These tier choices will dictate your performance capabilities, resource limits,
    and in some cases feature capabilities. You will see more details about how to
    pick these tiers in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the book (and
    you will also see the same service tier names, plus more, with Azure SQL Database).
    Here is a quick tour of each of these service tiers for an Azure SQL Managed Instance.'
  trans: '# SQL 虚拟机


    官方名称为 `SQL Server on Azure Virtual Machines`，这是您在 Azure 中部署 SQL Server 的 IaaS
    选项。您可以将其理解为与您今天在虚拟机中使用 SQL Server 相同，只是 Azure 托管了您的虚拟机。Azure 负责管理主机服务器和硬件系统。它提供了接口，供您部署一个运行
    Windows 或 Linux 的完整虚拟机以及您选择的 SQL Server。SQL Server 是一个完整的版本（企业版等），就像您在 Hyper-V
    或 VMware 虚拟机中部署的一样。您的职责是管理客户操作系统和 SQL Server 环境的所有方面。但是，由于虚拟机在 Azure 中运行，因此有一些优势可以帮助您管理
    SQL Server 和虚拟机。第 3 章完整讨论了 Azure 虚拟机上的 SQL Server。


    # 托管实例


    官方名称为 `Azure SQL Managed Instance`，这是一项比 Azure 虚拟机高一个级别的 Azure 服务。托管实例是作为 PaaS
    服务部署的完整 SQL Server 数据库引擎实例，因此称为托管。Azure 提供主机服务器、硬件系统和虚拟机，让您可以专注于部署和管理 SQL Server
    实例及一组数据库。在本书的后续内容中，您将看到 Azure PaaS 为托管实例带来的优势，尤其是在安全性、可扩展性和高可用性方面。


    # 数据库


    官方名称为 `Azure SQL Database`，这是一项比托管实例更高一级的 Azure PaaS 服务。Azure 提供了一种部署一个或多个数据库的方法，并负责处理主机、硬件系统、虚拟机和
    SQL Server 实例。您将看到 Azure SQL Database 提供了多种不同的部署选项，以满足独特的数据库应用场景。Azure SQL Database
    在安全性、可扩展性、智能性能和高可用性方面提供了 PaaS 优势。


    # Azure SQL 托管实例


    我在本书第 1 章描述了 Azure SQL 托管实例（或称 `托管实例`）背后的历史和目的：使将 SQL Server 应用程序迁移到 Azure（又名
    CloudLifter）变得更加容易。您绝对应该把托管实例视为您今天在本地安装的 SQL Server `数据库引擎实例`。安装或部署体验将完全不同，您将在本书第
    4 章中学习到。设置基础架构以连接和联网的体验也会不同。但是，一旦您完成这些任务，使用托管实例的体验就会感觉像使用今天的 SQL Server 实例一样。


    今天，当您安装 SQL Server 时，您运行的是单个 SQL Server `数据库引擎实例`。您可以在该实例中部署多个数据库，也可以部署多个实例。


    对于托管实例，在成功部署后，您同样会在 Azure 基础架构中运行一个数据库引擎实例。然后，您可以自由执行实例级配置任务、创建数据库、加载数据，并开始连接和使用该实例。您被抽象化了关于托管实例如何部署的基础架构细节。然而，了解托管实例在
    Azure 基础架构中如何部署的某些方面可能很重要。您将在本书第 4 章中了解更多关于托管实例部署的架构。


    ## 托管实例功能


    由于托管实例类似于 SQL Server 的 `数据库引擎实例`，因此数据库引擎的功能范围几乎 100% 类似于 SQL Server。如果 SQL Server
    的这些功能对您很重要，那么托管实例可能是最佳选择：


    *   SQL Server Agent 作业

    *   数据库邮件

    *   跨数据库事务

    *   SQL Server 复制

    *   链接服务器

    *   SQL CLR

    *   DTC 事务

    *   资源调控器

    *   服务代理


    这些功能不提供于 Azure SQL Database。


    这不是完整的列表，我们正在不断添加新功能，以使托管实例尽可能接近一个完整的 100% SQL Server 数据库引擎实例。您可以在 [`https://aka.ms/azuresqlmitsqldiff`](https://aka.ms/azuresqlmitsqldiff)
    查看托管实例与 SQL Server 之间差异的最新完整列表。


    注意

    这是 T-SQL 差异的详尽列表。请考虑在某些情况下这可能无关紧要。例如，创建和管理可用性组的 T-SQL 语法在托管实例中不存在。但是，如果您的要求允许，这可能没问题，因为托管实例可以自动为您部署和管理一个可用性组。


    使用托管实例有主要优势，因为它是一项 PaaS 服务：


    *   内置高可用性（包括可用性组）、自动备份、时间点恢复以及已删除数据库的恢复。但您也可以执行自己的原生备份（`COPY_ONLY`）和还原。

    *   99.99% 的正常运行时间 SLA。

    *   通过自动故障转移组实现跨 Azure 区域的 HADR。

    *   可用区冗余。

    *   灾难恢复的免费许可。

    *   通过虚拟网络集成和专用链接网络实现安全隔离。

    *   Microsoft Entra 集成。

    *   Windows 身份验证。

    *   简单易用的资源扩展选项。

    *   无版本的 SQL Server，不断更新以获得最新更新和功能，同时也提供版本化实例以保持与 SQL Server 2022 的兼容性。


    注意

    您将在本书第 5 章中了解更多关于无版本和版本化 SQL Server 的含义。


    *   抽象化主机和虚拟机环境的细节和维护。

    *   托管实例的免费试用优惠。

    *   与 Azure Monitor 和 Database Watcher 集成。

    *   使用托管实例链接设置在线迁移策略或与 SQL Server 2002 兼容。

    *   PaaS 安全功能，例如 Microsoft Defender for Azure SQL。您将在本书第 6 章中了解更多关于 Microsoft
    Defender for Azure SQL 的信息。


    随着您阅读本书，您将更详细地了解托管实例的许多功能。


    ## 托管实例选项和限制


    当您在虚拟机或裸机服务器上安装 SQL Server 时，通常会提供预配置的 CPU、内存和存储资源（大小和速度）。


    部署托管实例时，您需要做出类似的选择以满足您的资源需求。这些选择始于一个称为 `服务层级` 的概念。对于托管实例，两个服务层级选择是 `常规用途` 和 `业务关键`。


    这些层级选择将决定您的性能能力、资源限制，在某些情况下还决定功能能力。您将在本书第 4 章中看到有关如何选择这些层级的更多详细信息（您还会在 Azure SQL
    Database 中看到相同的服务层级名称，以及更多）。以下是 Azure SQL 托管实例每个服务层级的快速概览。'
- fmt: "## General Purpose\n\nGeneral Purpose 是大多数托管实例部署的服务层级选择，\"General\"（通用）一词也体现了其普适性。通用目的服务层级支持的\
    \ `vCores` 范围为 4 到 128 个（请记住，这类数字可能会随着我们为 Azure 添加更多功能而发生变化）。你可以将 `vCore` 视为托管实例的逻辑\
    \ CPU。托管实例的费用基于你选择的 `vCore` 数量（按固定小时成本计费）。\n\n`vCore` 的选择会影响通用目的层级的其他容量选择或限制，包括最大内存、实例中数据库的最大存储容量以及资源速率，例如每秒输入/输出操作次数（`IOPS`）或日志写入吞吐量。\n\
    \n> **注意**：在 2024 年初，微软推出了一种名为 *Next-gen* 的新通用目的形式。新一代通用目的服务层级采用新架构，可提供更多 `vCores`（128）、更低的\
    \ `I/O` 延迟、更大的事务 `I/O` 吞吐量、更多的最大存储、每个实例可运行更多数据库，最重要的是能够独立于 `vCore` 选择来控制 `IOPS`。你可以在\
    \ [`https://aka.ms/sqlminextgen`](https://aka.ms/sqlminextgen) 阅读关于新一代的公告。\n\n\
    通用目的层级还通过 Azure 存储提供 *基本* 的内置高可用性（类似于故障转移集群实例），你将在第 8 章关于可用性的部分了解更多内容。\n\n尽管托管实例拥有\
    \ SQL Server 几乎完整的功能集，但通用目的服务层级不支持内存中 OLTP。其原因之一是内存中 OLTP 的存储需求只能通过本地存储来满足。\n\n\
    > **注意**：列存储索引在通用目的服务层级中可用。\n\n你可以在 [`https://aka.ms/sqlmiservicetiers`](https://aka.ms/sqlmiservicetiers)\
    \ 阅读包括新一代在内的通用目的托管实例的所有容量和限制。\n\n## Business Critical\n\n业务关键层级拥有托管实例所需的全部最大容量。业务关键选择与通用目的层级具有相同数量的\
    \ `vCores`，但具有以下独特特点：\n\n*   使用 Always On 可用性组实现具有副本的内置高可用性（包含一个免费的只读副本）\n*  \
    \ 使用本地存储降低 `I/O` 延迟\n*   支持内存中 OLTP\n*   比通用目的层级更高的 `IOPS` 和 `I/O` 吞吐率（但新一代已大幅提高了其限制）\n\
    \n重要的是要知道，由于业务关键层级当前使用本地存储，其最大数据库大小小于通用目的服务层级。\n\n一个区域内给定订阅的托管实例有一些限制（例如，`vCores`\
    \ 总数）。你可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#regional-resource-limitations`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits%253Fview%253Dazuresql%2523regional-resource-limitations)\
    \ 阅读有关这些限制的信息。\n\n### 托管实例池\n\n托管实例的一个有趣方面是其部署架构，即为新建的托管实例构建的 *虚拟集群*。你将在本书第 4\
    \ 章了解更多关于托管实例架构的内容。目前只需知道，这种部署方式可能导致部署新托管实例的时间比 Azure SQL 数据库长得多（但我们通过一种称为快速预配的概念使其比过去更快）（预期时间列表请参阅我们的文档\
    \ [`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview)）。此外，由于部署性质，托管实例的最小\
    \ `CPU` 选择是 4 个 `vCores`。\n\n因此，我们允许使用 **托管实例池** 的概念，该功能在本书撰写时处于公开预览阶段。托管实例池提供了与托管实例许多相同的功能，但它允许更小的实例部署（2\
    \ 个 `vCores`）并提供了更快部署实例的方法。你将在本书第 4 章了解更多关于托管实例和托管实例池之间的架构差异。若想立即了解更多信息，可以阅读文档\
    \ [`https://aka.ms/sqlmipools`](https://aka.ms/sqlmipools)。\n\n### 托管实例与 Azure\
    \ 虚拟机上的 SQL Server\n\n在阅读了关于 Azure 虚拟机上的 SQL Server 和 Azure SQL 托管实例的内容后，你可能已经清楚这些\
    \ Azure SQL 选项之间的主要区别。不过，让我快速总结一下，以便你决定选择哪个选项。\n\n在以下情况下，Azure 虚拟机上的 SQL Server\
    \ 是你的最佳选择：\n\n*   如果你需要从现有的 SQL Server 安装**快速迁移**到 Azure。这实际上是将你的 SQL Server（很可能已经安装在某个虚拟机中）**提升并转移**到不同的虚拟机托管系统。你将在第\
    \ 3 章中了解更多关于优化此体验和配置的信息。\n*   如果你需要完整的 **SQL Server 盒装**功能，如 `filestream`、简单恢复模式数据库或\
    \ SQL Server Analysis Services（`SSAS`）。\n*   如果你想要**完全控制操作系统和 SQL Server**。这包括对\
    \ SQL Server 版本回溯到 SQL Server 2008 的选择，以及 Windows、Linux 或容器的选择。\n\n    > **提示**：在你认为绝对需要完全控制\
    \ SQL Server 版本之前，请*仔细研究托管实例的所有功能*。它可能已具备你 SQL Server 所需的一切。不再依赖特定的 SQL Server\
    \ 版本或无需管理客户操作系统可能是一件好事！\n*   **容量可能是一个因素**。如果你需要超过 128 个 `vCores`、870GB 内存或大于\
    \ 32TB 的数据库。此外，根据你的部署选择，托管实例可能会限制事务日志速率或其他 `I/O` 速率。Azure 虚拟机上的 SQL Server 在引擎内部对\
    \ `I/O` 速率没有限制。唯一的限制是适用于虚拟机存储的 `I/O` 速率。\n\n如果这些因素对你的需求不关键，那么使用 Azure SQL 托管实例有巨大的优势，因为它是一个具有完整\
    \ SQL Server 数据库引擎功能的数据库引擎实例，并结合了 `PaaS` 的能力。\n\n### 使用托管实例的客户\n\n我经常被问到关于我们技术的一个问题是：“还有谁在使用这个？”对于托管实例来说，这是一个很好的问题。是否有人在使用托管实例，为什么使用？\n\
    \n其中一位客户是 **Komatsu**。小松公司在多个国家制造建筑和工业机械，并已采纳了进行数字化转型的计划。小松公司拥有庞大的本地 SQL Server\
    \ 环境，并选择 Azure SQL 托管实例作为实现其数据平台现代化的云端方法。使用 Azure SQL 托管实例不仅符合他们利用云端进行整体数字化转型的规划，而且他们还发现了成本和性能上的改进。根据小松公司的说法，“我们确定\
    \ Azure SQL 数据库托管实例在可扩展性、成本和性能方面是我们的最佳选择。……我们看到了 49% 的成本降低和 25% 到 30% 的性能提升。”\n\
    \n你可以在 [`https://customers.microsoft.com/story/komatsu-australia-manufacturing-azure`](https://customers.microsoft.com/story/komatsu-australia-manufacturing-azure)\
    \ 阅读完整的客户案例故事。"
  raw: "#### General Purpose\n\nGeneral Purpose is a service tier choice for most\
    \ Managed Instance deployments, hence the term *general*. General Purpose service\
    \ tier supports *vCores* from 4 to 128 (remember numbers like these can change\
    \ over time as we add more capabilities for Azure). You should think of vCore\
    \ as a logical CPU for your Managed Instance. Managed Instances are charged based\
    \ on your vCore choice (at a fixed cost per hour).\n\nYour choice of vCore affects\
    \ other capacity choices or limits for General Purpose, including maximum memory,\
    \ maximum storage for databases for the instance, and resource rates, such as\
    \ Input/Output per Second (IOPS) or Log Write throughput.\n\nNote\n\nIn early\
    \ 2024, Microsoft introduced a new form of General Purpose called *Next-gen*.\
    \ The Next-gen General Purpose service tier uses a new architecture to provide\
    \ more vCores (128), lower I/O latency, larger transaction I/O throughput, more\
    \ max storage, more databases per instance, and most importantly the ability to\
    \ control IOPS separately from your vCore choices. You can read the announcement\
    \ about Next-gen at [`https://aka.ms/sqlminextgen`](https://aka.ms/sqlminextgen).\n\
    \nGeneral Purpose tiers also provide *basic* built-in high availability using\
    \ Azure Storage (think Failover Cluster Instance), which you will learn more about\
    \ in Chapter [8](#496204_2_En_8_Chapter.xhtml) on availability.\n\nEven though\
    \ a managed instance has an almost full feature set of a SQL Server, a General\
    \ Purpose service tier does not support In-Memory OLTP. One of the reasons behind\
    \ this is the storage requirements for In-Memory OLTP that can be only met on\
    \ local storage.\n\nNote\n\nColumnstore indexes are available with General Purpose\
    \ service tiers.\n\nYou can read all the capacities and limits for a General Purpose\
    \ Managed Instance, including Next-gen, at [`https://aka.ms/sqlmiservicetiers`](https://aka.ms/sqlmiservicetiers).\n\
    \n#### Business Critical\n\nBusiness Critical has all the maximum capacities you\
    \ need for a managed instance. Business Critical choices have the same number\
    \ of vCores as General Purpose but have these unique characteristics:\n\n*   Built-in\
    \ high availability with replicas using Always On Availability Groups (one free\
    \ read replica is included)\n\n*   Lower latency I/O using local storage\n\n*\
    \   In-Memory OLTP\n\n*   Higher IOPS and I/O throughput rates than General Purpose\
    \ (but Next-gen has increased its limits significantly)\n\nIt is important to\
    \ know that today since Business Critical uses local storage, your maximum database\
    \ size is less than a General Purpose service tier.\n\nThere are a few limits\
    \ for managed instances for a given subscription in a region (e.g., total number\
    \ of vCores). You can read about these limits at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#regional-resource-limitations`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits%253Fview%253Dazuresql%2523regional-resource-limitations).\n\
    \n### Managed Instance Pools\n\nOne of the interesting aspects of Managed Instances\
    \ is the deployment architecture, which is a *virtual cluster* built for a new\
    \ managed instance. You will learn more about the architecture of a Managed Instance\
    \ in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the book. For now, know that\
    \ this type of deployment can result in a much longer time (but we have made this\
    \ faster than in the past with a concept called fast provisioning) to deploy new\
    \ managed instances than an Azure SQL Database (for a list of expected times,\
    \ see our documentation at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview)).\
    \ In addition, because of the nature of deployment, the smallest CPU choice for\
    \ a Managed Instance is 4 vCores.\n\nTherefore, we allow the concept of **Managed\
    \ Instance pools** which is in public preview at the time of the writing of this\
    \ book. A Managed Instance pool provides many of the same capabilities as a Managed\
    \ Instance except they allow for smaller instance deployments (2 vCores) and provide\
    \ a method to deploy instances much faster. You will learn more about the architecture\
    \ differences between a Managed Instance and a Managed Instance pool in Chapter\
    \ [4](#496204_2_En_4_Chapter.xhtml) of the book. To read more now about a Managed\
    \ Instance pool, you can read the documentation at [`https://aka.ms/sqlmipools`](https://aka.ms/sqlmipools).\n\
    \n### Managed Instance vs. SQL Server on Azure Virtual Machine\n\nAs you have\
    \ read about SQL Server in an Azure Virtual Machine and Azure SQL Managed Instance,\
    \ it might be clear to you the main differences between these Azure SQL options.\
    \ However, let me provide a quick summary, so you can make decisions on which\
    \ option you might choose.\n\nSQL Server on Azure Virtual Machines is your best\
    \ choice:\n\n*   If you need to **migrate quickly** to Azure from an existing\
    \ SQL Server installation. This is really a *lift and shift* of your SQL Server\
    \ (which most likely is already installed in a VM) to a different VM hosting system.\
    \ You will learn more in Chapter [3](#496204_2_En_3_Chapter.xhtml) about optimizing\
    \ this experience and configuration.\n\n*   If you need **full SQL Server box**\
    \ capabilities like filestream, simple recovery databases, or SQL Server Analysis\
    \ Services (SSAS).\n\n*   If you want **complete control of the operating system\
    \ and SQL Server**. This includes SQL Server versions back to SQL Server 2008\
    \ and a choice of Windows, Linux, or Containers.\n\n    **Tip** Before you think\
    \ you absolutely need full control of the version of SQL Server, *carefully study\
    \ all the capabilities of a Managed Instance*. It may have everything you need\
    \ for your SQL Server. Moving away from having to depend on a version of SQL Server\
    \ or having to manage the guest OS can be a good thing!\n\n*   **Capacity can\
    \ be a factor.** If you need more than 128 vCores, 870GB memory, or a database\
    \ bigger than 32TB. In addition, Managed Instance may limit things like transaction\
    \ log rates or other I/O rates depending on your deployment choices. SQL Server\
    \ on Azure Virtual Machine has no limits on I/O rates within the engine. The only\
    \ limit would be the I/O rate that applies to storage for the virtual machine.\n\
    \nIf these factors are not critical for your requirements, there are big advantages\
    \ to use Azure SQL Managed Instance since this is a database engine instance with\
    \ the full SQL Server database engine capabilities combined with the power of\
    \ PaaS.\n\n### Customers Using Managed Instance\n\nOne question I often receive\
    \ about our technologies is “Who else is using this?” For Managed Instance, it\
    \ is a good question. Is anyone using Managed Instance and why?\n\nOne of these\
    \ customers is **Komatsu**. Komatsu manufactures construction and industry machines\
    \ in multiple countries and has embraced a plan to go through a digital transformation.\
    \ Komatsu has a large SQL Server on-premises footprint and chose Azure SQL Managed\
    \ Instance as a cloud approach to modernize their data platform. Not only does\
    \ using Azure SQL Managed Instance fit into their overall digital transformation\
    \ using the cloud, but they have found both cost and performance improvements.\
    \ According to Komatsu, “We determined Azure SQL Database Managed Instance was\
    \ the best choice for us in terms of scalability, cost, and performance.… We’ve\
    \ seen a 49 percent cost reduction and 25 to 30 percent performance gains.”\n\n\
    You can read the full customer story at [`https://customers.microsoft.com/story/komatsu-australia-manufacturing-azure`](https://customers.microsoft.com/story/komatsu-australia-manufacturing-azure)."
  trans: "## 通用目的\n\n通用目的是大多数托管实例部署的服务层级选择，“通用”一词也体现了其普适性。通用目的服务层级支持的 `vCores` 范围为\
    \ 4 到 128 个（请记住，这类数字可能会随着我们为 Azure 添加更多功能而发生变化）。你可以将 `vCore` 视为托管实例的逻辑 CPU。托管实例的费用基于你选择的\
    \ `vCore` 数量（按固定小时成本计费）。\n\n`vCore` 的选择会影响通用目的层级的其他容量选择或限制，包括最大内存、实例中数据库的最大存储容量以及资源速率，例如每秒输入/输出操作次数（`IOPS`）或日志写入吞吐量。\n\
    \n> **注意**：在 2024 年初，微软推出了一种名为 *新一代* 的新通用目的形式。新一代通用目的服务层级采用新架构，可提供更多 `vCores`（128）、更低的\
    \ `I/O` 延迟、更大的事务 `I/O` 吞吐量、更多的最大存储、每个实例可运行更多数据库，最重要的是能够独立于 `vCore` 选择来控制 `IOPS`。你可以在\
    \ [`https://aka.ms/sqlminextgen`](https://aka.ms/sqlminextgen) 阅读关于新一代的公告。\n\n\
    通用目的层级还通过 Azure 存储提供 *基本* 的内置高可用性（类似于故障转移集群实例），你将在第 8 章关于可用性的部分了解更多内容。\n\n尽管托管实例拥有\
    \ SQL Server 几乎完整的功能集，但通用目的服务层级不支持内存中 OLTP。其原因之一是内存中 OLTP 的存储需求只能通过本地存储来满足。\n\n\
    > **注意**：列存储索引在通用目的服务层级中可用。\n\n你可以在 [`https://aka.ms/sqlmiservicetiers`](https://aka.ms/sqlmiservicetiers)\
    \ 阅读包括新一代在内的通用目的托管实例的所有容量和限制。\n\n## 业务关键\n\n业务关键层级拥有托管实例所需的全部最大容量。业务关键选择与通用目的层级具有相同数量的\
    \ `vCores`，但具有以下独特特点：\n\n*   使用 Always On 可用性组实现具有副本的内置高可用性（包含一个免费的只读副本）\n*  \
    \ 使用本地存储降低 `I/O` 延迟\n*   支持内存中 OLTP\n*   比通用目的层级更高的 `IOPS` 和 `I/O` 吞吐率（但新一代已大幅提高了其限制）\n\
    \n重要的是要知道，由于业务关键层级当前使用本地存储，其最大数据库大小小于通用目的服务层级。\n\n一个区域内给定订阅的托管实例有一些限制（例如，`vCores`\
    \ 总数）。你可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#regional-resource-limitations`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits%253Fview%253Dazuresql%2523regional-resource-limitations)\
    \ 阅读有关这些限制的信息。\n\n### 托管实例池\n\n托管实例的一个有趣方面是其部署架构，即为新建的托管实例构建的 *虚拟集群*。你将在本书第 4\
    \ 章了解更多关于托管实例架构的内容。目前只需知道，这种部署方式可能导致部署新托管实例的时间比 Azure SQL 数据库长得多（但我们通过一种称为快速预配的概念使其比过去更快）（预期时间列表请参阅我们的文档\
    \ [`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview)）。此外，由于部署性质，托管实例的最小\
    \ `CPU` 选择是 4 个 `vCores`。\n\n因此，我们允许使用 **托管实例池** 的概念，该功能在本书撰写时处于公开预览阶段。托管实例池提供了与托管实例许多相同的功能，但它允许更小的实例部署（2\
    \ 个 `vCores`）并提供了更快部署实例的方法。你将在本书第 4 章了解更多关于托管实例和托管实例池之间的架构差异。若想立即了解更多信息，可以阅读文档\
    \ [`https://aka.ms/sqlmipools`](https://aka.ms/sqlmipools)。\n\n### 托管实例与 Azure\
    \ 虚拟机上的 SQL Server\n\n在阅读了关于 Azure 虚拟机上的 SQL Server 和 Azure SQL 托管实例的内容后，你可能已经清楚这些\
    \ Azure SQL 选项之间的主要区别。不过，让我快速总结一下，以便你决定选择哪个选项。\n\n在以下情况下，Azure 虚拟机上的 SQL Server\
    \ 是你的最佳选择：\n\n*   如果你需要从现有的 SQL Server 安装**快速迁移**到 Azure。这实际上是将你的 SQL Server（很可能已经安装在某个虚拟机中）**提升并转移**到不同的虚拟机托管系统。你将在第\
    \ 3 章中了解更多关于优化此体验和配置的信息。\n*   如果你需要完整的 **SQL Server 盒装**功能，如 `filestream`、简单恢复模式数据库或\
    \ SQL Server Analysis Services（`SSAS`）。\n*   如果你想要**完全控制操作系统和 SQL Server**。这包括对\
    \ SQL Server 版本回溯到 SQL Server 2008 的选择，以及 Windows、Linux 或容器的选择。\n\n    > **提示**：在你认为绝对需要完全控制\
    \ SQL Server 版本之前，请*仔细研究托管实例的所有功能*。它可能已具备你 SQL Server 所需的一切。不再依赖特定的 SQL Server\
    \ 版本或无需管理客户操作系统可能是一件好事！\n*   **容量可能是一个因素**。如果你需要超过 128 个 `vCores`、870GB 内存或大于\
    \ 32TB 的数据库。此外，根据你的部署选择，托管实例可能会限制事务日志速率或其他 `I/O` 速率。Azure 虚拟机上的 SQL Server 在引擎内部对\
    \ `I/O` 速率没有限制。唯一的限制是适用于虚拟机存储的 `I/O` 速率。\n\n如果这些因素对你的需求不关键，那么使用 Azure SQL 托管实例有巨大的优势，因为它是一个具有完整\
    \ SQL Server 数据库引擎功能的数据库引擎实例，并结合了 `PaaS` 的能力。\n\n### 使用托管实例的客户\n\n我经常被问到关于我们技术的一个问题是：“还有谁在使用这个？”对于托管实例来说，这是一个很好的问题。是否有人在使用托管实例，为什么使用？\n\
    \n其中一位客户是 **Komatsu**。小松公司在多个国家制造建筑和工业机械，并已采纳了进行数字化转型的计划。小松公司拥有庞大的本地 SQL Server\
    \ 环境，并选择 Azure SQL 托管实例作为实现其数据平台现代化的云端方法。使用 Azure SQL 托管实例不仅符合他们利用云端进行整体数字化转型的规划，而且他们还发现了成本和性能上的改进。根据小松公司的说法，“我们确定\
    \ Azure SQL 数据库托管实例在可扩展性、成本和性能方面是我们的最佳选择。……我们看到了 49% 的成本降低和 25% 到 30% 的性能提升。”\n\
    \n你可以在 [`https://customers.microsoft.com/story/komatsu-australia-manufacturing-azure`](https://customers.microsoft.com/story/komatsu-australia-manufacturing-azure)\
    \ 阅读完整的客户案例故事。"
- fmt: '## Azure SQL Database


    正如本书第 [1](#496204_2_En_1_Chapter.xhtml) 章所述，**Azure SQL Database**（前身为 SQL Azure）是*一切的起点*。尽管
    Azure SQL Database 的部署数据库安装在实际的 SQL Server 实例上，但其核心理念是让您从实例的细节中抽离出来，专注于数据库本身。一个
    Azure SQL Database 有时被称为**单一数据库**。这并不意味着您不会接触到 SQL Server 的感觉，正如您将在本书中看到的那样。


    ### Azure SQL Database 功能


    Azure SQL Database 为您提供了最完整的 PaaS 功能，包括*托管 Azure SQL 产品部署的最丰富选项*。与 Azure 托管实例类似，Azure
    SQL Database 使您能够访问核心 SQL Server 数据库引擎功能。然而，并非所有数据库引擎实例特性都可用。例如，列存储索引在 Azure SQL
    Database 中可用，但您无法创建 SQL Server Agent 作业。


    使用 Azure SQL Database 有诸多主要优势，因为它是一个完整的 PaaS 服务：


    *   免费的数据库优惠（非试用版，而是伴随您的订阅终身有效）。了解更多请访问 [`https://aka.ms/freedboffer`](https://aka.ms/freedboffer)。

    *   内置高可用性（包括可用性组）、自动备份、长期备份保留、时间点还原和已删除数据库的恢复。

    *   高达 99.995% 的正常运行时间 SLA（阅读更多请访问 [`https://www.microsoft.com/licensing/docs/view/Service-Level-Agreements-SLA-for-Online-Service`](https://www.microsoft.com/licensing/docs/view/Service-Level-Agreements-SLA-for-Online-Service)）。

    *   区域冗余。

    *   通过活动异地复制和自动故障转移组实现跨 Azure 区域的 HADR（高可用性与灾难恢复）。

    *   虚拟网络集成和通过专用链接支持实现的安全隔离。

    *   Microsoft Entra 集成。

    *   简单易用的资源扩展选项。

    *   *无版本*的 SQL Server，持续通过最新的更新、优化、修复和功能进行更新。


    > 注意

    >

    > 您将在本书第 [5](#496204_2_En_5_Chapter.xhtml) 章了解更多关于无版本 SQL Server 的含义。


    *   从主机、虚拟机环境和 SQL Server 实例的细节与维护中抽离。

    *   智能性能功能，如自动调优。您将在本书第 [8](#496204_2_En_8_Chapter.xhtml) 章了解更多关于自动调优的内容。

    *   与 Azure Monitor 和 Database Watcher 的集成。

    *   用于查询性能分析的 Azure 门户可视化工具。

    *   PaaS 安全功能，如 Microsoft Defender for Azure SQL。您将在本书第 [6](#496204_2_En_6_Chapter.xhtml)
    章了解更多关于 Microsoft Defender for Azure SQL 的内容。


    您将在本书的后续部分了解更多关于这些功能及其他方面的内容。


    ### Azure SQL Database 选项与限制


    部署 Azure SQL Database 比部署托管实例有相似但更多的选择，以及不同的资源限制集合。尽管您将在第 [4](#496204_2_En_4_Chapter.xhtml)
    章看到更多关于如何选择这些选项和各种资源限制的细节，但在评估 Azure SQL Database 是否适合您时，回顾这些选择是值得的。


    图 [2-8](#496204_2_En_2_Chapter.xhtml#Fig8) 展示了 Azure SQL Database 选项的高层决策流程。


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig8_HTML.jpg)


    图 2-8 Azure SQL Database 选项


    请注意，任何选项都可以是弹性池的一部分，但某些选项（如 Serverless）仅适用于 General Purpose 和 Hyperscale vCore
    服务层级。让我们来探索这些选项以及这个决策过程的每个部分。


    #### 弹性池或单一数据库


    您将决定是只需要一个单一数据库，还是将您的数据库包含在一个*弹性池*中。我将在本节后面详细讨论弹性池。请注意，Serverless 不适用于弹性池。


    #### DTU 与 vCore


    您需要做的第一个决策之一是关于 Azure SQL Database 的*购买选项*概念。尽管此选项也将决定您的资源容量和限制，但它极大地影响您为 Azure
    SQL Database 服务付费的方式。


    您可以选择的一个选项称为**数据库事务单元 (DTU)**。正如我在本书第 [1](#496204_2_En_1_Chapter.xhtml) 章所述，我们引入了
    DTU 概念，作为 CPU、I/O 和内存综合资源使用的逻辑度量概念。DTU 的资源限制和容量选择称为基本、标准和高级（每个级别又有多个层级）。DTU 模型的一个显著优势是简单性。您选择想要的性能级别，而我们则负责提供必要的核心和内存来满足您应用程序的需求。


    Microsoft 建议大多数客户使用 vCore 模型，因此我在本书中不会花时间介绍 DTU 模型。如果您想了解更多关于 DTU 模型的信息，可以在 [`https://learn.microsoft.com/azure/azure-sql/database/service-tiers-dtu`](https://learn.microsoft.com/azure/azure-sql/database/service-tiers-dtu)
    阅读更多内容。


    vCore 模型与 Azure SQL 托管实例的模型非常相似，并且是推荐的购买模型。实际上，使用 Azure 门户默认会显示 vCore 选项。vCore
    模型让您在付费资源（包括 CPU 和存储）的选择上拥有更多自主权。此外，vCore 模型允许您利用成本节约选项，如 Azure 混合权益 (AHB) 许可（您可以在
    [`https://learn.microsoft.com/azure/azure-sql/azure-hybrid-benefit`](https://learn.microsoft.com/azure/azure-sql/azure-hybrid-benefit)
    阅读更多内容）和预留容量（您可以在 [`https://learn.microsoft.com/azure/azure-sql/database/reserved-capacity-overview`](https://learn.microsoft.com/azure/azure-sql/database/reserved-capacity-overview)
    阅读更多内容）。


    vCore 模型与 Azure SQL 托管实例的不同之处在于，您现在有三个*服务层级选项*：**常规用途 (General Purpose)**、**业务关键
    (Business Critical)** 和**超大规模 (Hyperscale)**。


    #### 常规用途服务层级


    与托管实例类似，常规用途是许多 Azure SQL Database 部署的服务层级选择，因此称为*通用*。与托管实例不同，Azure SQL Database
    支持两个常规用途选项，称为*计算预置类型*：**预配型 (Provisioned)** 和**无服务器型 (Serverless)**。


    常规用途预配型服务层级支持从 2 到 128 个*虚拟核心 (vCore)*。您应该将 vCore 视为您 Azure SQL Database 的逻辑 CPU。Azure
    SQL Database 根据您选择的 vCore 进行计费（每小时固定成本）。


    您选择的预配 vCore 会影响常规用途的其他容量选择或限制，包括最大内存、数据库的最大存储以及 IOPS、I/O 延迟和事务日志写入吞吐量等资源速率。您可以在
    [`https://aka.ms/sqldbgplimits`](https://aka.ms/sqldbgplimits) 查看常规用途预配型服务层级的这些限制详情。


    常规用途预配层还有另一个选择，称为**硬件配置**。常规用途预配层的硬件配置选项包括 Gen5、Fsv2 系列和 DC 系列。此选择也会影响资源选项，如 vCore
    数量、处理器速度以及安全飞地 (secure enclaves) 等安全选项。


    常规用途层级还提供基于 Azure Storage 的*基本*内置高可用性（可类比为故障转移集群实例），您将在关于可用性的第 [8](#496204_2_En_8_Chapter.xhtml)
    章了解更多内容。


    与 Azure SQL 托管实例类似，内存中 OLTP 等引擎功能在常规用途中不可用（但支持列存储索引）。'
  raw: '## Azure SQL Database


    As you read in Chapter [1](#496204_2_En_1_Chapter.xhtml) of the book, **Azure
    SQL Database** (formerly SQL Azure) is *where it all started*. Even though a database
    for Azure SQL Database deployment is installed on an actual SQL Server instance,
    the concept is to abstract you away from details of the instance and focus on
    the database. An Azure SQL Database is sometimes called a **single database**.
    It doesn’t mean you won’t get exposed to the feel of a SQL Server as you will
    see throughout the book.


    ### Azure SQL Database Capabilities


    Azure SQL Database offers you the most complete PaaS capabilities, including the
    *most options for deployment of the managed Azure SQL offerings*. Like an Azure
    Managed Instance, an Azure SQL Database gives you access to core SQL Server database
    engine capabilities. However, not all database engine instance features are available.
    For example, columnstore indexes are available with an Azure SQL Database, but
    you cannot create SQL Server Agent jobs.


    There are major benefits in using an Azure SQL Database because it is a complete
    PaaS service:


    *   A free database offer (not a trial but for the lifetime of your subscription).
    Learn more at [`https://aka.ms/freedboffer`](https://aka.ms/freedboffer).


    *   Built-in high availability (including Availability Groups), automated backups,
    long-term backup retention, point-in-time restore, and recovery of deleted databases.


    *   Up to 99.995% uptime SLA (read more at [`https://www.microsoft.com/licensing/docs/view/Service-Level-Agreements-SLA-for-Online-Service`](https://www.microsoft.com/licensing/docs/view/Service-Level-Agreements-SLA-for-Online-Service)).


    *   Zone redundancy.


    *   HADR across Azure regions with active geo-replication and auto-failover groups.


    *   Virtual network integration and security isolation with private link support.


    *   Microsoft Entra Integration.


    *   Simple and easy-to-use scaling options for resources.


    *   A *versionless* SQL Server constantly updated with the latest updates, optimizations,
    fixes, and features.


    Note


    You will learn more details on what a versionless SQL Server means in Chapter
    [5](#496204_2_En_5_Chapter.xhtml) of this book.


    *   Abstraction from the details and maintenance of the host, virtual machine
    environment, and SQL Server instance.


    *   Intelligent performance capabilities such as Automatic Tuning. You will learn
    more about Automatic Tuning in Chapter [8](#496204_2_En_8_Chapter.xhtml) of the
    book.


    *   Integration with Azure Monitor and Database Watcher.


    *   Azure Portal visualizations for query performance analysis.


    *   PaaS security capabilities such as Microsoft Defender for Azure SQL. You will
    learn more about Microsoft Defender for Azure SQL in Chapter [6](#496204_2_En_6_Chapter.xhtml)
    of this book.


    You will learn more about these capabilities and others throughout the rest of
    the book.


    ### Azure SQL Database Options and Limits


    You have similar but more choices to deploy an Azure SQL Database than a Managed
    Instance along with different sets of resource limits. Even though you will see
    more details of how to pick these options and various resource limits in Chapter
    [4](#496204_2_En_4_Chapter.xhtml), it is worth reviewing these choices as you
    evaluate whether Azure SQL Database is the right option for you.


    Figure [2-8](#496204_2_En_2_Chapter.xhtml#Fig8) shows a high-level decision flow
    for Azure SQL Database options.


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Azure SQL Database options


    Notice that any option can be part of an elastic pool, but some options like Serverless
    only apply to General Purpose and Hyperscale vCore service tiers. Let’s explore
    the options and each part of this decision process.


    #### Elastic Pool or Single Database


    You will decide if you want just a single database or to include your database
    in an *elastic pool*. I’ll discuss more on elastic pools later in this section.
    Note that Serverless is not available for an elastic pool.


    #### DTU vs. vCore


    One of the first decisions you will make is a concept called a *purchasing option*
    for Azure SQL Database. Even though this option will also dictate your resource
    capacity and limit, it greatly affects how you pay for the Azure SQL Database
    service.


    One option you can choose is called a **Database Transaction Unit (DTU)**. As
    I described in Chapter [1](#496204_2_En_1_Chapter.xhtml) of the book, we introduced
    the DTU concept as a logical concept of measurement for a combined resource usage
    of CPU, I/O, and memory. Your choices of resource limits and capacities for the
    DTU are called Basic, Standard, and Premium (with multiple levels for each of
    these). One nice advantage of the DTU model is simplicity. You pick a level of
    performance you want, and we worry about providing you the necessary cores and
    memory to meet the needs of your application.


    Microsoft recommends for most customers to use the vCore model, so I won’t spend
    any other time in this book on the DTU model. You can read more about the DTU
    model should you want to learn more at [`https://learn.microsoft.com/azure/azure-sql/database/service-tiers-dtu`](https://learn.microsoft.com/azure/azure-sql/database/service-tiers-dtu).


    The vCore model is very similar to the model for Azure SQL Managed Instance and
    the recommended purchasing model. In fact, using the Azure Portal will show you
    the vCore options by default. The vCore model gives you more choice of choosing
    different resources you pay for, including CPU and storage. In addition, the vCore
    model allows you to take advantage of cost savings options such as Azure Hybrid
    Benefit (AHB) licensing (which you can read more about at [`https://learn.microsoft.com/azure/azure-sql/azure-hybrid-benefit`](https://learn.microsoft.com/azure/azure-sql/azure-hybrid-benefit))
    and Reserved Capacity (which you can read more about at [`https://learn.microsoft.com/azure/azure-sql/database/reserved-capacity-overview`](https://learn.microsoft.com/azure/azure-sql/database/reserved-capacity-overview)).


    What is different about the vCore model from an Azure SQL Managed Instance is
    that you now have three *service tier options*: **General Purpose**, **Business
    Critical**, and **Hyperscale**.


    #### General Purpose Service Tier


    Like a Managed Instance, General Purpose is a service tier choice for many Azure
    SQL Database deployments, hence the term *general*. Unlike a Managed Instance,
    Azure SQL Database supports two General Purpose options called *compute tiers*:
    **Provisioned and** **Serverless**.


    General Purpose provisioned service tiers support *vCores* from 2 to 128\. You
    should think of vCore as a logical CPU for your Azure SQL Database. Azure SQL
    Databases are charged based on your vCore choice (at a fixed cost per hour).


    Your choice of a provisioned vCore affects other capacity choices or limits for
    General Purpose, including maximum memory, maximum storage for the database, and
    resource rates such as IOPS, I/O latency, and Transaction Log Write throughput.
    You can see the details of these limits for a General Purpose provisioned service
    tier at [`https://aka.ms/sqldbgplimits`](https://aka.ms/sqldbgplimits).


    There is another choice for General Purpose provisioned tier called a **hardware
    configuration**. Hardware configuration options for General Purpose provisioned
    tiers are Gen5, Fsv2-series, and DC-series. This choice can also affect resource
    options such as the number of vCores, processor speed, and security options like
    secure enclaves.


    General Purpose tiers also provide *basic* built-in high availability using Azure
    Storage (think Failover Cluster Instance), which you will learn more about in
    Chapter [8](#496204_2_En_8_Chapter.xhtml) on availability.


    Like Azure SQL Managed Instance, engine features like In-Memory OLTP are not available
    for General Purpose (but columnstore indexes are supported).'
  trans: '

    ## Azure SQL Database


    正如本书第 1 章所述，**Azure SQL Database**（前身为 SQL Azure）是*一切的起点*。尽管 Azure SQL Database
    的部署数据库安装在实际的 SQL Server 实例上，但其核心理念是让您从实例的细节中抽离出来，专注于数据库本身。一个 Azure SQL Database
    有时被称为**单一数据库**。这并不意味着您不会接触到 SQL Server 的感觉，正如您将在本书中看到的那样。


    ### Azure SQL Database 功能


    Azure SQL Database 为您提供了最完整的平台即服务功能，包括*托管 Azure SQL 产品部署的最丰富选项*。与 Azure 托管实例类似，Azure
    SQL Database 使您能够访问核心 SQL Server 数据库引擎功能。然而，并非所有数据库引擎实例特性都可用。例如，列存储索引在 Azure SQL
    Database 中可用，但您无法创建 SQL Server Agent 作业。


    使用 Azure SQL Database 有诸多主要优势，因为它是一个完整的平台即服务：


    *   免费的数据库优惠（非试用版，而是伴随您的订阅终身有效）。了解更多请访问 [`https://aka.ms/freedboffer`](https://aka.ms/freedboffer)。

    *   内置高可用性（包括可用性组）、自动备份、长期备份保留、时间点还原和已删除数据库的恢复。

    *   高达 99.995% 的正常运行时间服务级别协议（阅读更多请访问 [`https://www.microsoft.com/licensing/docs/view/Service-Level-Agreements-SLA-for-Online-Service`](https://www.microsoft.com/licensing/docs/view/Service-Level-Agreements-SLA-for-Online-Service)）。

    *   区域冗余。

    *   通过活动异地复制和自动故障转移组实现跨 Azure 区域的高可用性与灾难恢复。

    *   虚拟网络集成和通过专用链接支持实现的安全隔离。

    *   Microsoft Entra 集成。

    *   简单易用的资源扩展选项。

    *   *无版本*的 SQL Server，持续通过最新的更新、优化、修复和功能进行更新。


    > 注意

    >

    > 您将在本书第 5 章了解更多关于无版本 SQL Server 的含义。


    *   从主机、虚拟机环境和 SQL Server 实例的细节与维护中抽离。

    *   智能性能功能，如自动调优。您将在本书第 8 章了解更多关于自动调优的内容。

    *   与 Azure Monitor 和 Database Watcher 的集成。

    *   用于查询性能分析的 Azure 门户可视化工具。

    *   平台即服务安全功能，如 Microsoft Defender for Azure SQL。您将在本书第 6 章了解更多关于 Microsoft Defender
    for Azure SQL 的内容。


    您将在本书的后续部分了解更多关于这些功能及其他方面的内容。


    ### Azure SQL Database 选项与限制


    部署 Azure SQL Database 比部署托管实例有相似但更多的选择，以及不同的资源限制集合。尽管您将在第 4 章看到更多关于如何选择这些选项和各种资源限制的细节，但在评估
    Azure SQL Database 是否适合您时，回顾这些选择是值得的。


    图 2-8 展示了 Azure SQL Database 选项的高层决策流程。


    ![](img/496204_2_En_2_Fig8_HTML.jpg)


    图 2-8 Azure SQL Database 选项


    请注意，任何选项都可以是弹性池的一部分，但某些选项（如 Serverless）仅适用于常规用途和超大规模 vCore 服务层级。让我们来探索这些选项以及这个决策过程的每个部分。


    #### 弹性池或单一数据库


    您将决定是只需要一个单一数据库，还是将您的数据库包含在一个*弹性池*中。我将在本节后面详细讨论弹性池。请注意，Serverless 不适用于弹性池。


    #### DTU 与 vCore


    您需要做的第一个决策之一是关于 Azure SQL Database 的*购买选项*概念。尽管此选项也将决定您的资源容量和限制，但它极大地影响您为 Azure
    SQL Database 服务付费的方式。


    您可以选择的一个选项称为**数据库事务单元**。正如我在本书第 1 章所述，我们引入了数据库事务单元概念，作为 CPU、I/O 和内存综合资源使用的逻辑度量概念。数据库事务单元的资源限制和容量选择称为基本、标准和高级（每个级别又有多个层级）。数据库事务单元模型的一个显著优势是简单性。您选择想要的性能级别，而我们则负责提供必要的核心和内存来满足您应用程序的需求。


    Microsoft 建议大多数客户使用 vCore 模型，因此我在本书中不会花时间介绍数据库事务单元模型。如果您想了解更多关于数据库事务单元模型的信息，可以在
    [`https://learn.microsoft.com/azure/azure-sql/database/service-tiers-dtu`](https://learn.microsoft.com/azure/azure-sql/database/service-tiers-dtu)
    阅读更多内容。


    vCore 模型与 Azure SQL 托管实例的模型非常相似，并且是推荐的购买模型。实际上，使用 Azure 门户默认会显示 vCore 选项。vCore
    模型让您在付费资源（包括 CPU 和存储）的选择上拥有更多自主权。此外，vCore 模型允许您利用成本节约选项，如 Azure 混合权益许可（您可以在 [`https://learn.microsoft.com/azure/azure-sql/azure-hybrid-benefit`](https://learn.microsoft.com/azure/azure-sql/azure-hybrid-benefit)
    阅读更多内容）和预留容量（您可以在 [`https://learn.microsoft.com/azure/azure-sql/database/reserved-capacity-overview`](https://learn.microsoft.com/azure/azure-sql/database/reserved-capacity-overview)
    阅读更多内容）。


    vCore 模型与 Azure SQL 托管实例的不同之处在于，您现在有三个*服务层级选项*：**常规用途**、**业务关键**和**超大规模**。


    #### 常规用途服务层级


    与托管实例类似，常规用途是许多 Azure SQL Database 部署的服务层级选择，因此称为*通用*。与托管实例不同，Azure SQL Database
    支持两个常规用途选项，称为*计算预置类型*：**预配型**和**无服务器型**。


    常规用途预配型服务层级支持从 2 到 128 个*虚拟核心*。您应该将虚拟核心视为您 Azure SQL Database 的逻辑 CPU。Azure SQL
    Database 根据您选择的虚拟核心进行计费（每小时固定成本）。


    您选择的预配虚拟核心会影响常规用途的其他容量选择或限制，包括最大内存、数据库的最大存储以及 IOPS、I/O 延迟和事务日志写入吞吐量等资源速率。您可以在
    [`https://aka.ms/sqldbgplimits`](https://aka.ms/sqldbgplimits) 查看常规用途预配型服务层级的这些限制详情。


    常规用途预配层还有另一个选择，称为**硬件配置**。常规用途预配层的硬件配置选项包括 Gen5、Fsv2 系列和 DC 系列。此选择也会影响资源选项，如虚拟核心数量、处理器速度以及安全飞地等安全选项。


    常规用途层级还提供基于 Azure Storage 的*基本*内置高可用性（可类比为故障转移集群实例），您将在关于可用性的第 8 章了解更多内容。


    与 Azure SQL 托管实例类似，内存中 OLTP 等引擎功能在常规用途中不可用（但支持列存储索引）。

    '
- fmt: '#### Serverless


    通用类型的另一个计算层级选项是 Serverless。你可能还记得本书[第 1 章](#496204_2_En_1_Chapter.xhtml)中关于 Serverless
    的背景故事。`vCore` 模型仍然适用于 `Serverless`，但方式有所不同。


    你将选择一个 `vCore` 的 *范围*，包括最小值和最大值（最小值可以小于 1 `vCore`）。Azure SQL Database 会根据应用在此范围内所需的
    `vCores` 数量，自动 *扩展* 你的应用。`Serverless` 的优势之一是，你按秒为资源计算使用付费，这与预配层级中每小时固定的 `vCore`
    成本不同。


    注意


    你可能需要更深入地了解我们如何计算 `serverless` 的账单。如果是这样，请使用我们的文档 [`https://azure.microsoft.com/pricing/details/sql-database/single/`](https://azure.microsoft.com/pricing/details/sql-database/single/)
    并查看 **How is the compute bill calculated in serverless?** 主题的常见问题解答部分。


    此外，`Serverless` 支持在数据库不使用时 *暂停* 的概念。如果在 **自动暂停延迟** 间隔（你可以配置）内数据库活动处于 *非活动* 状态，则不会产生计算费用，仅产生存储成本。这为拥有非
    24/7 使用 Azure SQL Database 的应用的用户提供了惊人的节省成本的机会。我们发现一些构建新应用的客户具有自然的完全空闲时间或不同的计算规模需求时间。`Serverless`
    为这些客户提供了天然的契合点。尽管 `Serverless` 的功能与预配层级相同，但资源容量和限制不同。我们已经看到 `Serverless` 模型成为许多使用
    Azure SQL Database 应用的流行选择。


    你可以在 [`https://aka.ms/serverlessvsprovisioned`](https://aka.ms/serverlessvsprovisioned)
    查看 `Serverless` 和预配层级的详细比较以进行决策。


    #### 业务关键型


    与托管实例类似，业务关键型服务层级专为需要最高性能和可用性的应用程序而设计。业务关键型的差异化特点包括：


    *   内置可用性，使用 `Always On Availability Groups` 的副本，包括读取横向扩展（附带一个免费的只读副本）。

    *   使用本地存储的高速低延迟 I/O。

    *   `In-Memory OLTP`。

    *   比通用型更高的 `IOPS` 和 I/O 吞吐率。


    #### 超大规模


    正如你在本书[第 1 章](#496204_2_En_1_Chapter.xhtml)中所读到的，`Socrates` 项目是 Azure SQL 工程团队创新的一个里程碑，后来以
    `Hyperscale` 的形式推出。回顾过去，`Hyperscale` 这个名字可能不是我们的最佳选择。这是因为这个名字导致人们认为 `Hyperscale`
    只适用于 Azure 中最大（也最昂贵）的数据库部署。


    注意


    你应该知道，在撰写本书时，我们一直在考虑对 `Hyperscale` 这个名称进行“重塑品牌”，以便开发人员和用户了解 `Hyperscale` 可以适用于任何应用程序。


    我相信 `Hyperscale` 的三项创新现在可以让开发人员和用户将其视为 Azure SQL Database 的默认服务层级选择：


    1.  我们已经移除了本书第一版中存在的所有针对 `Hyperscale` 的 Azure SQL 功能限制（仍有少数保留）。

    2.  我们将 `Hyperscale` 的计算定价模型更改为 *更实惠的价格*。你可以在 [`https://techcommunity.microsoft.com/t5/azure-sql-blog/azure-sql-database-hyperscale-lower-simplified-pricing/ba-p/3982209`](https://techcommunity.microsoft.com/t5/azure-sql-blog/azure-sql-database-hyperscale-lower-simplified-pricing/ba-p/3982209)
    阅读更多关于这个新定价模型的信息。

    3.  `Hyperscale` 现在支持 `Serverless` 和弹性池。


    考虑以下关于为什么 `Hyperscale` 可能比通用型或业务关键型更适合你服务层级的事实：


    *   你现在拥有具有 `Hyperscale` 的自动扩展计算和自动扩展存储。你现在可以从最小的数据库和工作负载开始，并根据需要自动扩展到所需大小，无需更改代码。

    *   `Hyperscale` 支持云中 SQL 最大的数据库大小。`Hyperscale` 数据库当前记录的上限大小是 `100TB` 和 `1TB`
    事务日志。`Hyperscale` 数据库的自动数据库尺寸调整也非常快。


    注意


    我们构建的 `Hyperscale` 架构理论上可以支持 *无限* 的数据库和事务日志大小。


    *   `Hyperscale` 现在支持你所需的最大 `vCore` 和内存大小。此外，**扩展操作所需的时间是恒定的**。我将在本书[第 7 章](#496204_2_En_7_Chapter.xhtml)中更多地讨论扩展。

    *   读取扩展是真正的 *扩展*。你可以获得 **最多 30 个命名副本**。

    *   **恢复** 操作 **无论大小都极快**。`Hyperscale` 使用数据库文件的快照备份来提供快速备份和非常快的还原。

    *   你的 **事务日志吞吐量是独立的**，不依赖于你的 `vCore` 配置或 `Hyperscale` 拥有副本的事实。这是因为副本架构不依赖于 `Always
    On Availability Group` 技术。

    *   **I/O 操作可以非常快**，特别是如果它们由 `Hyperscale` 实现的缓存系统提供服务。


    作为一名终身的 SQL Server 引擎内部原理爱好者，我相信 `Hyperscale` 是 SQL 团队历史上最具创新性的工程成果之一（与 SQL Server
    on Linux 的惊人故事并驾齐驱，你可以在 *Pro SQL Server on Linux* 中阅读更多相关内容）。仅在本节中讨论 `Hyperscale`
    并不能充分说明其价值，因此你将在本书中阅读到更多关于 `Hyperscale` 的内容。但请花几分钟观看这个视频，我在 SQL Server 工程团队的前同事（现已退休）Kevin
    Farlee 向 Microsoft Mechanics 团队展示了 `Hyperscale` 为何如此特别：[`https://youtu.be/Z9AFnKI7sfI`](https://youtu.be/Z9AFnKI7sfI)。


    #### 弹性池数据库


    正如我在本书[第 1 章](#496204_2_En_1_Chapter.xhtml)中讲述的那样，`Project Malmo` 变成了软件供应商的流行选项，称为
    **SQL 弹性池**。弹性池的概念很简单，就是将一组 Azure SQL Database 分组，以降低成本并实现大规模数据库管理。


    设想这样一个场景：你是一个软件即服务（SaaS）供应商，希望使用 Azure SQL Database。你决定为每个客户构建一个数据库，以隔离他们的性能和体验。你可能需要部署数千个数据库。


    问题来了：当客户随时间推移的使用情况不尽相同时，你如何为每个客户的每个数据库决定使用哪个定价层？你有两个选择：


    *   为所有数据库配置你认为可能需要的最大资源容量（如 `vCores`）。在这种情况下，你可能为所有数据库多付了钱。

    *   为所有数据库配置较低的资源容量，这可以省钱，但可能会导致你根据使用情况不得不上下扩展特定数据库，从而导致停机时间。


    弹性池允许你配置一个服务层级（`serverless` 不可用）、`vCore` 选择（`DTU` 也可以）和数据库大小，该配置将用于添加到池中的一组数据库。这样，你为整个池的资源付费，数据库可以在池中共享资源。


    弹性池中的数据库可以与 `DTU` 或 `vCore` 部署选项（如通用型、业务关键型和超大规模服务层级）一起使用（但不支持 `serverless`）。我将在本书[第
    4 章](#496204_2_En_4_Chapter.xhtml)中详细介绍如何部署和使用弹性池。'
  raw: '#### Serverless


    The other compute tier option for General Purpose is Serverless. You may remember
    the story behind Serverless from Chapter [1](#496204_2_En_1_Chapter.xhtml) of
    the book. The vCore model still applies to Serverless but in a different way.


    You will choose a *range* of vCores which includes a min and a max value (the
    min can be < 1 vCore). Azure SQL Database will *auto-scale* your application to
    the number of vCores required by the application within this range. One of the
    advantages of Serverless is that you pay for resource compute usage *by the second*
    vs. a fixed vCore cost per hour with provisioned.


    Note


    You may need to dive a bit more into how we calculate the billing for serverless.
    If so, use our documentation at [`https://azure.microsoft.com/pricing/details/sql-database/single/`](https://azure.microsoft.com/pricing/details/sql-database/single/)
    and look at the FAQ section for the topic **How is the compute bill calculated
    in serverless?**


    In addition, Serverless supports the concept of *pausing* the database when it
    is not in use. If activity for the database is *inactive* within an **auto-pause
    delay** interval (which you can configure), no compute charges are billed, only
    storage costs. This provides an amazing cost savings opportunity for a user who
    has an application that does not use Azure SQL Database 24/7\. We found some customers
    who are building new applications have natural complete idle times or natural
    times of different compute scale needs. Serverless provides a natural fit for
    those customers. Although the capabilities of Serverless are the same as Provisioned,
    the resource capacities and limits are different. We have seen the Serverless
    model as a popular choice for many applications using Azure SQL Database.


    You can see a nice comparison to decide between Serverless and Provisioned at
    [`https://aka.ms/serverlessvsprovisioned`](https://aka.ms/serverlessvsprovisioned).


    #### Business Critical


    Just like a Managed Instance, Business Critical service tiers are designed for
    applications that need maximum performance and availability. The differentiators
    for Business Critical are


    *   Built-in availability with replicas using Always On Availability Groups, including
    read scale-out (with free one read-only replica)


    *   High-speed low-latency I/O using local storage


    *   In-Memory OLTP


    *   Higher IOPS and I/O throughput rates than General Purpose


    #### Hyperscale


    As you read in Chapter [1](#496204_2_En_1_Chapter.xhtml) of the book, the Socrates
    project was a milestone of innovation for the Azure SQL engineering team which
    launched as Hyperscale. Looking back, the name Hyperscale may not have been our
    best choice. This is because the name has led to a perception that Hyperscale
    is only for the largest (and most expensive) database deployments in Azure.


    Note


    You should know that at the time of the writing of this book, we have been considering
    a “rebranding” of the name Hyperscale so that developers and users know Hyperscale
    can be for any application.


    There are three innovations for Hyperscale that I believe can now allow developers
    and users to consider it as the default service tier choice for Azure SQL Database:


    1.  We have removed all Azure SQL feature restrictions for Hyperscale that previously
    existed in the first edition of this book (a few remain).


    2.  We changed the pricing model for compute for Hyperscale to a much *more affordable
    price*. You can read more about this new pricing model at [`https://techcommunity.microsoft.com/t5/azure-sql-blog/azure-sql-database-hyperscale-lower-simplified-pricing/ba-p/3982209`](https://techcommunity.microsoft.com/t5/azure-sql-blog/azure-sql-database-hyperscale-lower-simplified-pricing/ba-p/3982209).


    3.  Serverless and elastic pools are now supported by Hyperscale.


    Consider these facts about why Hyperscale could be your best service tier choice
    over General Purpose or Business Critical:


    *   You now have an auto-scale compute and auto-scale storage with Hyperscale.
    You can now start with the smallest database and workload and have it auto-scaled
    to the size you need with no code changes.


    *   Hyperscale supports the largest database size for SQL in the cloud. The current
    documented maximum size of a Hyperscale database is **100TB** and **1TB** transaction
    log. Automatic database sizing for Hyperscale database is also extremely fast.


    Note


    We built the Hyperscale architecture so that it could theoretically support *limitless*
    database and transaction log sizes.


    *   Hyperscale now supports the largest vCore and memory sizes you need. Furthermore,
    the time required for **scaling operations is constant**. I’ll talk more about
    scaling in Chapter [7](#496204_2_En_7_Chapter.xhtml) of the book.


    *   Read-scale is truly *scale*. You can get **up to 30 named replicas**.


    *   **Restore** operations are **incredibly fast regardless of size**. Hyperscale
    uses snapshot backups of database files to provide fast backups and very fast
    restores.


    *   Your **transaction log throughput is independent** of your vCore configuration
    or the fact that Hyperscale has replicas. This is because the replica architecture
    doesn’t rely on Always On Availability Group technology.


    *   **I/O operations can be extremely fast** especially if they are served by
    caching systems implemented with Hyperscale.


    Being a lifelong SQL Server engine internals geek, I believe Hyperscale is one
    of the most innovative engineering efforts for the SQL Team (right along the amazing
    story of SQL Server on Linux, which you can read more about in *Pro SQL Server
    on Linux*) in its history. Talking about Hyperscale just in this section doesn’t
    give it due justice, so you will read more about Hyperscale throughout this book.
    But take a few minutes and watch this video where Kevin Farlee, my former colleague
    in the SQL Server engineering team who has now retired, shows the Microsoft Mechanics
    team why Hyperscale is so special at [`https://youtu.be/Z9AFnKI7sfI`](https://youtu.be/Z9AFnKI7sfI).


    #### Elastic Pool Databases


    As I told the story in Chapter [1](#496204_2_En_1_Chapter.xhtml) of the book,
    Project Malmo turned into the popular option for software vendors called **SQL
    elastic pools**. Elastic pools are simply the concept of grouping a collection
    of Azure SQL Databases for the purpose of lowering cost and management of databases
    at scale.


    Think of a scenario where you are a Software as a Service (SaaS) vendor and want
    to use Azure SQL Database. You decide to build a database for each customer to
    partition and isolate their performance and experience. You may need to deploy
    thousands of databases.


    Here is your problem. How do you decide which pricing tier to use for each database
    for each customer when they may not all have the same usage across time? You have
    two choices:


    *   Provision all databases with the maximum resource capacity (such as vCores)
    you think may be needed. In this scenario, you may be overpaying across all databases.


    *   Provision all the databases with a lower resource capacity which can save
    you money but might cause issues for you to have to scale up and down specific
    databases depending on their usage leading to downtime.


    Elastic pools allow you to provision (serverless is not available) a service tier
    with a vCore choice (DTU is also possible) and database size that will be used
    across a group of databases that are added to the pool. This way, you pay for
    the resources of the entire pool, and databases can share resources across the
    pool.


    Databases in an elastic pool can be used with DTU or vCore deployment options
    like General Purpose, Business Critical, and Hyperscale service tiers (but do
    not support serverless). I’ll cover more about how to deploy and use an elastic
    pool in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the book.'
  trans: '

    #### 无服务器


    通用类型的另一个计算层级选项是无服务器。你可能还记得本书第 1 章中关于无服务器的背景故事。`vCore` 模型仍然适用于 `Serverless`，但方式有所不同。


    你将选择一个 `vCore` 的 *范围*，包括最小值和最大值（最小值可以小于 1 `vCore`）。Azure SQL Database 会根据应用在此范围内所需的
    `vCores` 数量，自动 *扩展* 你的应用。`Serverless` 的优势之一是，你按秒为资源计算使用付费，这与预配层级中每小时固定的 `vCore`
    成本不同。


    注意


    你可能需要更深入地了解我们如何计算 `serverless` 的账单。如果是这样，请使用我们的文档 [`https://azure.microsoft.com/pricing/details/sql-database/single/`](https://azure.microsoft.com/pricing/details/sql-database/single/)
    并查看 **How is the compute bill calculated in serverless?** 主题的常见问题解答部分。


    此外，`Serverless` 支持在数据库不使用时 *暂停* 的概念。如果在 **自动暂停延迟** 间隔（你可以配置）内数据库活动处于 *非活动* 状态，则不会产生计算费用，仅产生存储成本。这为拥有非
    24/7 使用 Azure SQL Database 的应用的用户提供了惊人的节省成本的机会。我们发现一些构建新应用的客户具有自然的完全空闲时间或不同的计算规模需求时间。`Serverless`
    为这些客户提供了天然的契合点。尽管 `Serverless` 的功能与预配层级相同，但资源容量和限制不同。我们已经看到 `Serverless` 模型成为许多使用
    Azure SQL Database 应用的流行选择。


    你可以在 [`https://aka.ms/serverlessvsprovisioned`](https://aka.ms/serverlessvsprovisioned)
    查看 `Serverless` 和预配层级的详细比较以进行决策。


    #### 业务关键型


    与托管实例类似，业务关键型服务层级专为需要最高性能和可用性的应用程序而设计。业务关键型的差异化特点包括：


    *   内置可用性，使用 `Always On Availability Groups` 的副本，包括读取横向扩展（附带一个免费的只读副本）。

    *   使用本地存储的高速低延迟 I/O。

    *   `In-Memory OLTP`。

    *   比通用型更高的 `IOPS` 和 I/O 吞吐率。


    #### 超大规模


    正如你在本书第 1 章中所读到的，`Socrates` 项目是 Azure SQL 工程团队创新的一个里程碑，后来以 `Hyperscale` 的形式推出。回顾过去，`Hyperscale`
    这个名字可能不是我们的最佳选择。这是因为这个名字导致人们认为 `Hyperscale` 只适用于 Azure 中最大（也最昂贵）的数据库部署。


    注意


    你应该知道，在撰写本书时，我们一直在考虑对 `Hyperscale` 这个名称进行“重塑品牌”，以便开发人员和用户了解 `Hyperscale` 可以适用于任何应用程序。


    我相信 `Hyperscale` 的三项创新现在可以让开发人员和用户将其视为 Azure SQL Database 的默认服务层级选择：


    1.  我们已经移除了本书第一版中存在的所有针对 `Hyperscale` 的 Azure SQL 功能限制（仍有少数保留）。

    2.  我们将 `Hyperscale` 的计算定价模型更改为 *更实惠的价格*。你可以在 [`https://techcommunity.microsoft.com/t5/azure-sql-blog/azure-sql-database-hyperscale-lower-simplified-pricing/ba-p/3982209`](https://techcommunity.microsoft.com/t5/azure-sql-blog/azure-sql-database-hyperscale-lower-simplified-pricing/ba-p/3982209)
    阅读更多关于这个新定价模型的信息。

    3.  `Hyperscale` 现在支持 `Serverless` 和弹性池。


    考虑以下关于为什么 `Hyperscale` 可能比通用型或业务关键型更适合你服务层级的事实：


    *   你现在拥有具有 `Hyperscale` 的自动扩展计算和自动扩展存储。你现在可以从最小的数据库和工作负载开始，并根据需要自动扩展到所需大小，无需更改代码。

    *   `Hyperscale` 支持云中 SQL 最大的数据库大小。`Hyperscale` 数据库当前记录的上限大小是 `100TB` 和 `1TB`
    事务日志。`Hyperscale` 数据库的自动数据库尺寸调整也非常快。


    注意


    我们构建的 `Hyperscale` 架构理论上可以支持 *无限* 的数据库和事务日志大小。


    *   `Hyperscale` 现在支持你所需的最大 `vCore` 和内存大小。此外，**扩展操作所需的时间是恒定的**。我将在本书第 7 章中更多地讨论扩展。

    *   读取扩展是真正的 *扩展*。你可以获得 **最多 30 个命名副本**。

    *   **恢复** 操作 **无论大小都极快**。`Hyperscale` 使用数据库文件的快照备份来提供快速备份和非常快的还原。

    *   你的 **事务日志吞吐量是独立的**，不依赖于你的 `vCore` 配置或 `Hyperscale` 拥有副本的事实。这是因为副本架构不依赖于 `Always
    On Availability Group` 技术。

    *   **I/O 操作可以非常快**，特别是如果它们由 `Hyperscale` 实现的缓存系统提供服务。


    作为一名终身的 SQL Server 引擎内部原理爱好者，我相信 `Hyperscale` 是 SQL 团队历史上最具创新性的工程成果之一（与 SQL Server
    on Linux 的惊人故事并驾齐驱，你可以在 *Pro SQL Server on Linux* 中阅读更多相关内容）。仅在本节中讨论 `Hyperscale`
    并不能充分说明其价值，因此你将在本书中阅读到更多关于 `Hyperscale` 的内容。但请花几分钟观看这个视频，我在 SQL Server 工程团队的前同事（现已退休）Kevin
    Farlee 向 Microsoft Mechanics 团队展示了 `Hyperscale` 为何如此特别：[`https://youtu.be/Z9AFnKI7sfI`](https://youtu.be/Z9AFnKI7sfI)。


    #### 弹性池数据库


    正如我在本书第 1 章中讲述的那样，`Project Malmo` 变成了软件供应商的流行选项，称为 **SQL 弹性池**。弹性池的概念很简单，就是将一组
    Azure SQL Database 分组，以降低成本并实现大规模数据库管理。


    设想这样一个场景：你是一个软件即服务（SaaS）供应商，希望使用 Azure SQL Database。你决定为每个客户构建一个数据库，以隔离他们的性能和体验。你可能需要部署数千个数据库。


    问题来了：当客户随时间推移的使用情况不尽相同时，你如何为每个客户的每个数据库决定使用哪个定价层？你有两个选择：


    *   为所有数据库配置你认为可能需要的最大资源容量（如 `vCores`）。在这种情况下，你可能为所有数据库多付了钱。

    *   为所有数据库配置较低的资源容量，这可以省钱，但可能会导致你根据使用情况不得不上下扩展特定数据库，从而导致停机时间。


    弹性池允许你配置一个服务层级（`serverless` 不可用）、`vCore` 选择（`DTU` 也可以）和数据库大小，该配置将用于添加到池中的一组数据库。这样，你为整个池的资源付费，数据库可以在池中共享资源。


    弹性池中的数据库可以与 `DTU` 或 `vCore` 部署选项（如通用型、业务关键型和超大规模服务层级）一起使用（但不支持 `serverless`）。我将在本书第
    4 章中详细介绍如何部署和使用弹性池。

    '
- fmt: '### Azure Database Fleet Manager


    虽然弹性池有助于为大量数据库提供简化的成本和性能管理，但您可能还需要更多功能。Microsoft 已宣布一种名为 **fleet manager** 的新方法，用于以*非常大的*规模部署和管理数据库和弹性池。


    Fleet manager 是 Microsoft 内部为需要大规模部署和管理数据库的团队（如 Dynamics 365）而诞生的概念。Fleet managers
    使用称为 **fleetspace**、**fleet** 和 **tier** 的概念，使您能够使用策略方法跨多个区域部署和管理大量数据库或弹性池。这种方法使您能够以一致且灵活的方式管理您的舰队，包括安全性、架构更改、智能资源重新平衡、HADR
    配置和“智能”默认值。


    在编写本书时，fleet manager 处于预览阶段，需要注册参与。您可以在 [`https://aka.ms/azuresqlfleet`](https://aka.ms/azuresqlfleet)
    阅读博客公告。请关注 Azure SQL Database 的所有最新公告，了解此功能进入公共预览版并最终进入正式版的进展，网址为 [`https://aka.ms/whatsnewsqldb`](https://aka.ms/whatsnewsqldb)。


    ### Azure SQL Database 与 Azure SQL Managed Instance


    在阅读并了解了 Azure SQL Managed Instance 和 Azure SQL Database 的所有选项后，您可能有足够的信息开始做出选择。许多客户根据其应用程序需求选择这些选项的组合。


    在做出此决策时，请考虑 Azure Managed Instance 和 Azure SQL Database 之间的这些主要因素作为差异：


    *   如果您的数据库大小需要超过 **32TB**，那么目前 **Hyperscale** 是您唯一的选择。

    *   如果您的部署需要**数据库引擎实例功能**，例如 SQL Server Agent 作业、Database Mail、Resource Governor
    或事务复制，那么 **Azure Managed Instance** 是您唯一的选择。

    *   如果您的应用程序对 **I/O 延迟非常敏感**，那么 **Business Critical** 服务层级或 **Hyperscale** 可能是您的最佳选择。

    *   如果您需要**最高级别的可用性和弹性**，那么 **Business Critical** 服务层级或 Azure SQL Database **Hyperscale**
    是您的最佳选择。

    *   如果您的应用程序具有非常**间歇性的使用模式**，包括几乎完全空闲的时期，那么 **Serverless** 对您来说可能是一个非常好的选择。


    在考虑这些因素后，如果仍不确定 Azure SQL Managed Instance 还是 Azure SQL Database 更符合您的要求，那么我首先建议您查看
    Azure SQL Database。Azure SQL Database 拥有您可能需要的大多数核心数据库引擎功能，并提供最高级别的托管服务功能。我还发现，Azure
    SQL Database 在各种部署选项中具有最快的部署和扩展操作。


    您仍然可能发现 Azure SQL Database 没有您需要的功能集。因此，我强烈建议您查看文档中的此功能比较（我们始终在更新），网址为 [`https://learn.microsoft.com/azure/azure-sql/database/features-comparison`](https://learn.microsoft.com/azure/azure-sql/database/features-comparison)。


    在 Azure SQL Database General Purpose、Business Critical、Hyperscale 和 Azure SQL
    Managed Instance 的服务层级之间进行真正很好的比较，可以在 [`https://aka.ms/azuresqlservicetiers`](https://aka.ms/azuresqlservicetiers)
    找到。


    ### 使用 Azure SQL Database 的客户


    Azure SQL Database 在单个数据库、Hyperscale、Serverless 和弹性池方面一直是客户的热门选择。


    **BKW Energie** 在为其能源生产电网构建数字地理信息系统 (GIS) 平台时很快意识到，**Hyperscale** 是唯一能为他们提供所需规模以及
    SQL 功能（包括内置图形数据库功能）的云数据库平台。您可以在 [`https://customers.microsoft.com/story/825080-bkw-energie-energy-azure`](https://customers.microsoft.com/story/825080-bkw-energie-energy-azure)
    阅读关于 BKW Energie 的完整故事。


    **Serverless** 的真正威力在于为不需要 24/7 高计算使用率的应用程序节省成本。**CampBrain** 是一家软件公司，提供帮助营地运营的服务。当
    CampBrain 发现 Microsoft Azure SQL Database **serverless**（一种针对具有间歇性、不可预测使用模式的数据库的计算层级）时，它清除了最大的障碍之一：尽管存在极端使用带来的高低波动，仍能管理计算成本，同时降低了性能管理的复杂性和风险。您可以在
    [`https://customers.microsoft.com/story/779861-campbrain_professionalservices_azure_canada`](https://customers.microsoft.com/story/779861-campbrain_professionalservices_azure_canada)
    阅读完整的 CampBrain 客户故事。


    ## Azure SQL 的接口


    在本章开头，我描述了 Azure 生态系统中的各种接口：门户、API 和 CLI。Azure SQL 与所有这些接口集成，同时也与传统的 SQL Server
    接口集成。


    ### Azure 门户


    我们在 Azure 门户中创建了 Azure SQL 体验，以适应 Azure SQL 产品线。图 [2-9](#496204_2_En_2_Chapter.xhtml#Fig9)
    显示了在门户中使用搜索后的 Azure SQL 选项。


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig9_HTML.jpg)


    图 2-9


    Azure SQL 服务和市场


    如果您选择 Azure SQL 服务，您将看到为 Azure SQL 创建的资源列表（包括已注册的虚拟机）。如果您选择 Azure SQL 市场选项，您将看到创建
    Azure SQL 服务的选项，如图 [2-10](#496204_2_En_2_Chapter.xhtml#Fig10) 所示。


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig10_HTML.jpg)


    图 2-10


    Azure SQL 部署选项


    您还将看到，在部署 Azure SQL 资源后，虚拟机、实例和数据库都有特定的集成。您将在本书的其余部分看到这些示例。


    如前所述，Azure 门户有一个新的 Copilot 体验来帮助您部署和管理 Azure 资源。我们的团队在该框架中引入了一种新的上下文感知 Copilot
    体验，称为 **Microsoft Copilot skills in Azure SQL Database**。在我看来，这种体验在行业中是与众不同的。例如，通过这种新的
    “SQL Copilot”，您可以使用自然语言提示在数据库上下文中快速解决复杂的性能问题。图 [2-11](#496204_2_En_2_Chapter.xhtml#Fig11)
    展示了此体验的一个示例。


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig11_HTML.jpg)


    图 2-11


    Azure SQL Database 中的 Microsoft Copilot 技能


    您将在本书其余部分的几个章节中看到如何使用此 Copilot 体验的示例。您可以在 [`https://aka.ms/sqlcopilot`](https://aka.ms/sqlcopilot)
    快速开始。


    此外，我们现在在 Azure 门户中的 **Query Editor** 中也有了一种新体验，可帮助使用自然语言提示生成 T-SQL 语句。图 [2-12](#496204_2_En_2_Chapter.xhtml#Fig12)
    显示了使用此新体验的示例。


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig12_HTML.jpg)


    图 2-12


    使用自然语言转 SQL 的查询编辑器


    我将在本书的第 [10](#496204_2_En_10_Chapter.xhtml) 章向您展示如何使用此 AI 辅助体验的示例。


    注意


    在编写本书时，Azure 门户**查询编辑器**中的**自然语言转 SQL**功能处于预览阶段。到其正式可用时，查询编辑器中的最终界面可能会发生变化。'
  raw: '### Azure Database Fleet Manager


    While elastic pools can be helpful to provide simplified management of costs and
    performance for many databases, you may need more. Microsoft has announced a new
    method to deploy and manage databases and elastic pools at a *very large* scale
    called **fleet manager**.


    Fleet manager is a concept born within Microsoft for our groups that need to deploy
    and manage databases at scale such as Dynamics 365\. Fleet managers use concepts
    called a **fleetspace**, **fleet**, and **tier** to allow you to deploy and manage
    a large number of databases or elastic pools across multiple regions using a policy
    approach. This approach allows you to manage your fleet in a consistent and flexible
    manner, including security, schema changes, intelligent resource rebalancing,
    HADR configuration, and “smart” defaults.


    At the time of the writing of this book, fleet manager was in preview and requires
    a sign-up to participate. You can read the blog announcement at [`https://aka.ms/azuresqlfleet`](https://aka.ms/azuresqlfleet).
    Stay up to date with all the latest announcements for Azure SQL Database as this
    capability moves into public preview and eventually General Availability at [`https://aka.ms/whatsnewsqldb`](https://aka.ms/whatsnewsqldb).


    ### Azure SQL Database vs. Azure SQL Managed Instance


    As you have read and seen all the options for Azure SQL Managed Instance and Azure
    SQL Databases, you might have enough information to start making choices. Many
    customers choose a combination of these options depending on their application
    needs.


    As you make this decision, consider these major factors as differences between
    an Azure Managed Instance and Azure SQL Database:


    *   If you need a **database > 32TB**, **Hyperscale** today is your only choice.


    *   If your deployment requires **database engine instance features** such as
    SQL Server Agent jobs, Database Mail, Resource Governor, or Transactional Replication,
    **Azure Managed Instance** is your only choice.


    *   If your application is very **sensitive to I/O latency**, **Business Critical**
    service tiers or **Hyperscale** may be your best choice.


    *   If you need the **highest level of availability and resiliency**, then the
    **Business Critical** service tier or Azure SQL Database **Hyperscale** is your
    best choice.


    *   If your application has very **intermittent usage patterns**, including periods
    of almost complete idleness, then **Serverless** may be a very good choice for
    you.


    As you look at these factors and still may not be sure whether an Azure SQL Managed
    Instance or Azure SQL Database fits your requirements, then I would first recommend
    you look at Azure SQL Database. Azure SQL Database has most of the core database
    engine features you likely need and provides the highest level of managed service
    capabilities. I’ve also found that Azure SQL Database has the fastest deployment
    and scaling operations across various deployment options.


    You still may find that Azure SQL Database does not have the feature set you need.
    Therefore, I highly recommend you look at this feature comparison in the documentation
    (which we are always updating) at [`https://learn.microsoft.com/azure/azure-sql/database/features-comparison`](https://learn.microsoft.com/azure/azure-sql/database/features-comparison).


    A really nice comparison between service tiers across Azure SQL Database General
    Purpose, Business Critical, Hyperscale, and Azure SQL Managed Instance can be
    found at [`https://aka.ms/azuresqlservicetiers`](https://aka.ms/azuresqlservicetiers).


    ### Customers Using Azure SQL Database


    Azure SQL Database has been a popular customer choice across a single database,
    Hyperscale, Serverless, and elastic pools.


    **BKW Energie** quickly realized as they built a digital geographic information
    system (GIS) platform for their energy production grid that **Hyperscale** was
    the only cloud database platform that provided them with the scale they needed
    along with the power of SQL, including built-in graph database capabilities. You
    can read the full story about BKW Energie at [`https://customers.microsoft.com/story/825080-bkw-energie-energy-azure`](https://customers.microsoft.com/story/825080-bkw-energie-energy-azure).


    The true power of **Serverless** is cost savings for applications that don’t need
    a high level of compute usage 24/7\. **CampBrain** is a software company that
    offers a service to help camps run their operations. When CampBrain discovered
    Microsoft Azure SQL Database **serverless**, a compute tier for databases with
    intermittent, unpredictable usage, it cleared one of its biggest hurdles: managing
    compute costs despite the highs and lows created by extreme usage, plus reducing
    performance management complexity and risk. You can read the full CampBrain customer
    story at [`https://customers.microsoft.com/story/779861-campbrain_professionalservices_azure_canada`](https://customers.microsoft.com/story/779861-campbrain_professionalservices_azure_canada).


    ## Interfaces for Azure SQL


    At the beginning of this chapter, I described the various interfaces in the Azure
    ecosystem: portal, API, and CLI. Azure SQL integrates with all these interfaces
    but also with traditional SQL Server interfaces.


    ### Azure Portal


    We have created an Azure SQL experience in the Azure Portal to snap to the Azure
    SQL lineup. Figure [2-9](#496204_2_En_2_Chapter.xhtml#Fig9) shows the Azure SQL
    options after using search in the portal.


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Azure SQL services and marketplace


    If you choose Azure SQL services, you will see a list of resources you have created
    for Azure SQL (including registered virtual machines). If you choose the Azure
    SQL marketplace option, you will see choices to create Azure SQL services as seen
    in Figure [2-10](#496204_2_En_2_Chapter.xhtml#Fig10).


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Azure SQL deployment options


    You will also see that after you have deployed Azure SQL resources, there are
    specific integrations for virtual machines, instances, and databases. You will
    see the examples throughout the rest of the book.


    As I pointed out earlier, the Azure Portal has a new Copilot experience to help
    you deploy and manage Azure resources. Our team has introduced a new context-aware
    Copilot experience as part of that framework called **Microsoft Copilot skills
    in Azure SQL Database**. In my opinion, this experience is industry differentiating.
    For example, with this new “SQL Copilot,” you can solve complex performance problems
    quickly in the context of your database using natural language prompts. Figure
    [2-11](#496204_2_En_2_Chapter.xhtml#Fig11) shows an example of this experience.


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig11_HTML.jpg)


    Figure 2-11


    Microsoft Copilot skills in Azure SQL Database


    You will see examples of how to use this Copilot experience in several chapters
    throughout the rest of the book. You can get started quickly at [`https://aka.ms/sqlcopilot`](https://aka.ms/sqlcopilot).


    In addition, we also now have a new experience in the **Query Editor** through
    the Azure Portal to help generate T-SQL statements using natural language prompts.
    Figure [2-12](#496204_2_En_2_Chapter.xhtml#Fig12) shows an example of using this
    new experience.


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig12_HTML.jpg)


    Figure 2-12


    Query Editor with natural language to SQL


    I’ll show you examples of how to use this AI-assisted experience in Chapter [10](#496204_2_En_10_Chapter.xhtml)
    of the book.


    Note


    At the time of the writing of this book, the **natural language to SQL in the
    Azure portal** **query editor** feature was in preview. The final interface for
    how this will work in the Query Editor may change by the time it becomes generally
    available.'
