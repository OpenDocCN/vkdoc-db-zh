    # Azure SQL 数据库中的 Microsoft Copilot 技能


    大约在 2023 年夏末，我参与了微软内部一个为 SQL 数据库打造 AI 助手的新项目，该项目属于 Azure Copilot 的一部分。其理念是在 Azure
    门户中提供一种`旁加载`式聊天体验。彼时，微软已经推出了多项 Copilot 体验，包括 Microsoft Edge、移动应用和 Microsoft 365。Copilot
    是生成式 AI 应用程序（GenAI application）的一个范例，它采用 GPT 等语言模型，以提示应用程序的形式呈现。


    我记得在项目初期的会议中，我们的目标之一就是构建一个`利用 Azure SQL 数据库上下文`的丰富体验。如果你在 Azure 门户中导航到自己的数据库，就可以使用`特定于你数据库`的`技能`与
    Copilot 聊天。我记得我曾告诉团队，SQL 内置了极其丰富的遥测数据，包括目录视图、DMV、扩展事件和查询存储，我们可以借此打造出真正具有行业差异化的产品。


    在我们最初的几次会议上，他们问我应该尝试解决哪些场景。性能问题位列我清单的首位。为什么？因为性能故障排除需要对本身不精确的事物进行精确诊断。事实上，我清楚地记得告诉团队，我应该能够对
    Copilot 说“我的数据库很慢”，然后它会根据用户的权限，利用我们的引擎遥测数据来快速定位问题。我向他们展示了我在《面向初学者的 Azure SQL 性能故障排除特别版》(`https://aka.ms/performanceseries`)中使用的“运行中
    vs. 等待中”概念。我告诉团队，要仔细研究视频中的所有示例（相关代码可在`https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting`找到）。我说，如果我能通过与
    Copilot 聊天来解决这类场景，那么我们就将打造出微软内外无人能及的东西。


    这个项目的首次亮相是在 2023 年 PASS 峰会主题演讲中，我和 Anna Hoffman 进行了一场著名的“对决”（她似乎总是赢？），您可以在`https://youtu.be/M80Ze7nyvVc`观看。而当著名的
    Joe Sack 重新加入微软并担任该项目的首席产品经理（他也恰好是本书的技术审阅者）时，项目进程便加速了。整个开发团队在出色的 Katherine Lin
    带领下，奋力推进，最终在 2024 年 3 月的 SQLBits 大会上发布了产品的预览版（您可以在`https://sqlbits.com/sessions/event2024/Welcome_to_the_world_of_SQL_Copilots`观看
    Joe 和我在 SQLBits 上的演示）。


    Joe 制作了一张非常棒的架构图，展示了这项技术的工作原理，如图 7-2 所示。


    ![](img/496204_2_En_7_Fig2_HTML.jpg)


    图 7-2


    “SQL Copilot” 架构


    您可以通过 `https://aka.ms/sqlcopilot` 开始使用 Azure SQL 数据库中的 Microsoft Copilot 技能。


    Copilot 的功能远不止帮助您处理性能问题。为了首先向您展示 Copilot 如何理解您的数据库上下文，我使用了如图 7-3 所示的提示。


    ![](img/496204_2_En_7_Fig3_HTML.jpg)


    图 7-3


    SQL Copilot 数据库上下文


    图 7-4 显示了结果。


    ![](img/496204_2_En_7_Fig4_HTML.jpg)


    图 7-4


    SQL Copilot 数据库上下文结果


    您可以看到 Copilot“理解”您当前的数据库上下文。请注意，它还为您可能想使用的其他相关提示提供了建议。图 7-5 展示了“SQL Copilot”在
    Azure 门户中能够执行的可能技能类型。


    ![](img/496204_2_En_7_Fig5_HTML.jpg)


    图 7-5


    SQL Copilot 技能


    您可以看到，除了性能之外，它还具备许多其他功能，但性能无疑是这项能力大放异彩的领域。


    注意


    Azure 中的 Copilot 即使在您不在数据库上下文时也能“理解”SQL，但其回答将更多来自文档搜索。如图 7-5 所示，即使在数据库上下文中，您也可以使用
    Copilot 帮助您搜索微软文档。


    在本章后面，我将向您展示一些使用数据库监视器（Database Watcher）和 Azure SQL 数据库中的 Microsoft Copilot 技能来解决性能问题的示例。我还将在本书的第
    10 章向您展示 Copilot 的另一部分功能，即将自然语言转换为 SQL（NL2SQL）。


    ## 深入了解 DMV 和扩展事件


    动态管理视图（DMVs）和扩展事件（XEvent）多年来一直是 SQL Server 诊断（包括性能监控和故障排除）的`基石`。我可以诚实地告诉您，DMV
    和 XEvent 技术始于多年前像 Slava Oks 和 Conor Cunningham 这样的聪明才智。工程团队中的许多人都曾致力于这些技术的开发、培育和塑造，但我记得我和
    Slava 以及我的多年同事 Robert Dorr 和 Keith Elmore 在微软支持部门共事时，就从头开始参与了这些技术的研发。DMV 和 XEvent
    是支持 Azure SQL 性能监控和故障排除的非常重要的技术，因为 Azure SQL 由 SQL Server 引擎驱动，而 SQL Server 引擎又为
    Azure SQL 托管实例和数据库提供支持。


    让我们更深入地探讨一下，对于 Azure SQL 与 SQL Server，哪些 DMV 和 XEvent 功能是相同的，哪些是新的。


    ### DMV 深入探讨


    让我们更深入地探讨 Azure SQL（包括 Azure SQL 托管实例和数据库）与 SQL Server 相比的 DMV。


    #### Azure SQL 托管实例


    SQL Server 的所有 DMV 都适用于托管实例。关键 DMV 如`sys.dm_exec_requests`和`sys.dm_os_wait_stats`常用于检查查询性能。


    有一个特定于 Azure 的 DMV 叫做`sys.server_resource_stats`，它显示托管实例的历史资源使用情况。这是一个重要的 DMV，用于查看资源使用情况，因为您无法直接访问操作系统工具（如性能监视器）。您可以在`https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-server-resource-stats-azure-sql-database`了解更多关于`sys.server_resource_stats`的信息。


    #### Azure SQL 数据库


    您进行性能分析所需的`大多数`常见 DMV，包括`sys.dm_exec_requests`和`sys.dm_os_wait_stats`，都是可用的。重要的是要知道，这些
    DMV 仅提供特定于该数据库的信息，而非逻辑服务器下所有数据库的汇总信息。


    `sys.dm_db_resource_stats`是 Azure SQL 数据库特有的一个 DMV，可用于查看数据库的历史资源使用情况。使用这个 DMV
    的方式类似于在托管实例中使用`sys.server_resource_stats`。我将在本章后面的一个示例中向您展示如何使用此 DMV。现在，您可以在`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-resource-stats-azure-sql-database`阅读更多信息。


    `sys.elastic_pool_resource_stats`类似于`sys.dm_db_resource_stats`，但用于查看弹性池中数据库的资源使用情况。

    '
- fmt: '## DMVs You Will Need


    There are a few DMVs worth calling out that you will need to solve certain performance
    scenarios for Azure SQL, including the following:


    *   `sys.dm_io_virtual_file_stats` is important for Azure SQL since you don''t
    have direct access to operating system metrics for I/O performance per file.


    *   `sys.dm_os_performance_counters` is available for both Azure SQL Database
    and Managed Instance to see SQL Server common performance metrics. This can be
    used to view SQL Server performance counter information that is typically available
    in Windows Performance Monitor.


    *   `sys.dm_instance_resource_governance` can be used to view resource limits
    for a Managed Instance. You can view this information to see what your expected
    resource limits should be without using the Azure portal.


    *   `sys.dm_user_db_resource_governance` can be used to see common resource limits
    per the deployment option, service tier, and size for your Azure SQL Database
    deployment. You can view this information to see what your expected resource limits
    should be without using the Azure portal. I’ll show you an example of looking
    at this DMV in an example. For now, you can read more at [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database).


    ## DMVs for Deep Troubleshooting


    These DMVs provide deeper insight into resource limits and resource governance
    for Azure SQL. They are not meant to be used for common scenarios but might be
    helpful when looking deep into complex performance problems:


    *   `sys.dm_os_out_of_memory_events`


    *   `sys.dm_user_db_resource_governance_internal` (Managed Instance only)


    *   `sys.dm_resource_governor_resource_pools_history_ex`


    *   `sys.dm_resource_governor_workload_groups_history_ex`


    *Geek out* with these DMVs. The first DMV was introduced since the first edition
    of this book and can help to troubleshoot out of memory errors. The last three
    DMVs provide historical information across time (right now about 30 minutes).
    Be warned when using these DMVs. We kind of built these for our internal purposes
    to debug issues with Azure to look at problems like background activity vs. user
    load. So don’t be surprised if we change these to suit our needs to ensure we
    provide a great database service.


    ## XEvent at Your Service


    Extended Events (XEvent) was introduced as the new tracing mechanism for SQL Server
    in SQL Server 2005 to replace SQL Trace. XEvent today supports some 1800+ trace
    points in the SQL Server engine. XEvent powers other capabilities, including SQL
    Audit and SQL Threat Detection for Microsoft Defender.


    ### Extended Events for Azure SQL Managed Instance


    Extended Events can be used for Azure SQL Managed Instance just like SQL Server
    by creating sessions and using events, actions, and targets. Keep these important
    points in mind when creating Extended Event sessions:


    *   All events, targets, and actions are supported.


    *   File targets are supported with Azure Blob Storage since you don''t have access
    to the underlying operating system disks.


    *   Some specific events are added for Managed Instance to trace events specific
    to the management and execution of the instance.


    You can use SSMS or T-SQL to create and start sessions. You can use SSMS to view
    Extended Event session target data or the system function `sys.fn_xe_file_target_read_file`.


    ### Extended Events for Azure SQL Database


    Extended Events can be used for Azure SQL Database just like SQL Server by creating
    sessions and using events, actions, and targets. Keep these important points in
    mind when creating Extended Event sessions:


    *   Most commonly used events and actions are supported. For example, the fundamental
    event `sql_batch_completed` is available to you. Azure SQL Database offers ~400
    events vs. SQL Server (and Managed Instance) which has around 1800\. Use the DMV
    `sys.dm_xe_objects` to find out all objects available to you.


    *   File, ring_buffer, and counter targets are supported.


    *   File targets are supported with Azure Blob Storage since you don''t have access
    to the underlying operating system disks. Here is a blog from the Azure Support
    team for a step-by-step process to set up Azure Blob Storage as a file target:
    [`https://techcommunity.microsoft.com/t5/azure-database-support-blog/extended-events-capture-step-by-step-walkthrough/ba-p/369013`](https://techcommunity.microsoft.com/t5/azure-database-support-blog/extended-events-capture-step-by-step-walkthrough/ba-p/369013).


    You can use SSMS or T-SQL to create and start sessions. You can use SSMS to view
    Extended Event session target data or the system function `sys.fn_xe_file_target_read_file`.


    One of the nice additions for Extended Events since the first edition of this
    book is the ability to use XE Profiler in SSMS for Azure SQL. Figure 7-6 shows
    “live” Extended Event sessions with an Azure SQL Database.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig6_HTML.jpg)

    **Figure 7-6** XE Profiler with Azure SQL Database


    It is important to know that any Extended Events fired for your sessions are specific
    to your database and not across the logical server. Therefore, we have a new set
    of catalog views such as `sys.database_event_sessions` (definitions) and DMVs
    such as `sys.dm_xe_database_sessions` (active sessions). Take a look through our
    documentation for a complete list of differences for XEvent between Azure SQL
    Database and SQL Server: [`https://learn.microsoft.com/azure/azure-sql/database/xevent-db-diff-from-svr`](https://learn.microsoft.com/azure/azure-sql/database/xevent-db-diff-from-svr).


    ## Performance Scenarios


    In a galaxy, far, far away when I was in Microsoft Support, my longtime friend
    Keith Elmore was considered our expert on performance troubleshooting (he still
    is as far as I’m concerned). As we trained other support engineers, Keith came
    up with an idea that most SQL performance problems could be categorized as either
    `Running` or `Waiting`.


    > **Note**

    > Keith’s work led to a report called the Performance Dashboard reports. That
    report is now part of the Standard Reports for SQL Server Management Studio. Unfortunately,
    the report relies on some DMVs which are not exposed for Azure SQL Database. However,
    the reports will work for Managed Instance.


    One way to look at this concept is with Figure 7-7.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig7_HTML.jpg)

    **Figure 7-7** The Running vs. Waiting for SQL performance


    Let’s take a look at more of the details of this figure from the perspective of
    performance scenarios.


    > **Note**

    > As you look at DMVs in this section, remember that for Azure SQL Database you
    are only looking at results for a specific database, not across all databases
    for the logical server.


    ### Running vs. Waiting


    Running or waiting scenarios can often be determined by looking at overall resource
    usage. For a standard SQL Server deployment, you might use tools such as Performance
    Monitor in Windows or `top` in Linux. For Azure SQL, you can use the following
    methods.


    #### Azure Portal/PowerShell/Alerts


    Azure Monitor has integrated metrics to view resource usage for Azure SQL. You
    can also set up alerts to look for resource usage conditions such as high CPU
    percent. Since we have integrated some Azure SQL performance data with Azure Monitor,
    having alerts is a huge advantage to snapping into the ecosystem. Read more about
    how to set up alerts with Azure Metrics at [`https://learn.microsoft.com/azure/azure-monitor/alerts/alerts-create-metric-alert-rule`](https://learn.microsoft.com/azure/azure-monitor/alerts/alerts-create-metric-alert-rule).'
