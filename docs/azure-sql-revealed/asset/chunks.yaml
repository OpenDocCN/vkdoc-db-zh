    North Central US、South Central US、East Asia 和 North Europe 的数据中心部署数据库。


    最初的 SQL Azure 有一些有趣的特点：


    *   我们发布时的业务模型有两种`edition`：Web 版和商业版。主要区别在于最大数据库大小：Web 版为 1GB，商业版为 10GB（正如您将在本书中看到的，现在您可以创建远大于此的大小）。我们在
    2010 年 6 月迅速将此上限提高到了 50GB。

    *   为了部署数据库，您需要首先部署一个`logical database server`。多个数据库可以关联到一个逻辑服务器。逻辑服务器还包含其他元数据，例如用于安全性的登录名和防火墙规则。

    *   数据库中的任何表都必须具有聚簇索引（`clustered index`）。

    *   我们使用了自己的内部“副本系统”，但确保始终保留三个可用副本。我们还自动化了备份等过程并保留了多个副本。

    *   我们通过称为服务更新（`Service Update`，`SU`）的概念来更新 SQL Server 软件，并通过博客公告这些更新（服务更新的示例博客文章可在
    [`https://web.archive.org/web/20140420195848/http://blogs.msdn.com/b/sqlazure/archive/2010/02/17/9965464.aspx`](https://web.archive.org/web/20140420195848/http:/blogs.msdn.com/b/sqlazure/archive/2010/02/17/9965464.aspx)
    找到）。

    *   我们引入了服务级别协议（`Service-Level Agreement`，`SLA`）的概念，以确保一定级别的数据库可用性。

    *   早期，我们与流行工具`SQL Server Management Studio`（`SSMS`）开发了集成体验。

    *   客户在诸如应用程序重试逻辑、新的错误消息、逻辑主库（`logical master`）、限流（`throttling`）以及与 SQL Server
    的 T-SQL 表面区域不一致等概念上遇到了困难。


    注意


    如果您想回顾一下，查看一些关于 SQL Azure 的早期博客，请访问 [`https://web.archive.org/web/20140410165353/http://blogs.msdn.com/b/sqlazure/default.aspx?PageIndex=1`](https://web.archive.org/web/20140410165353/http:/blogs.msdn.com/b/sqlazure/default.aspx%253FPageIndex%253D1)
    并浏览页面底部的链接。


    在 Windows 和 SQL Azure 的这些早期，即使在微软内部，这也是一个全新的世界。Buck Woody 曾在最初的 Windows Azure
    团队工作。他告诉我，在 Azure 工作属于微软内部一个名为“Incubation”的小组——一种类似初创公司的文化。“其中最有趣的部分之一，”他说，“是见证技术和业务方面所有东西的构建过程。这可能是我上过的最好的
    MBA 课程。”在 Incubation 部门，你被“隔离”在微软其他部门之外，拥有自己的工程师、销售、市场等。当产品显示利润并且所有业务流程都建立起来后，它就“毕业”并入微软的其他领域。有些产品毕业了，有些则没有——因此成功压力很大。'
- fmt: '### The SAWA Project


    到那时为止，SQL Azure 仍然部署并运行在 AutoPilot 集群系统上，其 SQL Server 实例托管于裸金属服务器（Azure SQL 的首席工程师
    Brian Chamberlain 在内部称此为 SQL Azure v1）。


    我们作为一个团队明白，需要融入使用虚拟机来部署服务的 Windows Azure 托管系统。我们需要更多地利用 Windows Azure 在部署、网络和存储方面提供的优势，同时不对
    SQL Azure 架构进行彻底更改。因此，一个名为 **SAWA** (SQL Azure on Windows Azure) 的项目诞生了。Brian
    称此为 SQL Azure v2。为了帮助团队抽象化，使其不必同时在 AutoPilot 和 SAWA 系统上部署，我们构建了一个代号为 **Blackbird**
    的软件层。


    SAWA 项目很重要，因为它将使团队最终能够成为一个成熟的 Azure 服务，全面利用 Windows Azure 内部为服务提供的一切。但在随后的几年里，团队同时运维和管理着部署在
    AutoPilot 和 SAWA 上的 SQL Azure 数据库。用户并未察觉差异。该服务看起来和表现得依旧如常。


    在接下来的几年里，Windows Azure 通过云服务提供计算服务，通过 SQL Azure 提供数据库服务。SQL Azure 团队还吸纳了其他工程负责人，包括
    Nigel Ellis 和 Peter Carlin。这是旅程的开始，但微软领导层已经在幕后推动变革和更大的计划，以推动 Azure 在公有云领域更进一步。


    ## 虚拟机计划


    当 Windows Azure 首次发布时，其主要目标解决方案之一是云端的可扩展 Web 应用程序。因此，云服务是 Windows Azure 中的第一个计算服务。正如我在上面关于
    Windows Azure 的章节中所描述的，云服务应用程序在虚拟机中运行，并能够使用 API 将数据存储在 SQL Azure 或 Azure Blob
    存储中。但应用程序开发人员无法访问任何本地存储或获得完整的虚拟机访问权限。云中作为服务的虚拟机概念，也称为 **基础设施即服务 (IaaS)**，由亚马逊在
    2006 年推出，称为 Amazon Elastic Compute Cloud (EC2)，是其整体 Amazon Web Services (AWS)
    套件的一部分。EC2 就是一个真实的虚拟机，你可以在其中部署所选的操作系统和应用程序。


    对许多人来说，Windows Azure 中的云服务仍被视为平台即服务 (PAAS)，因为开发人员并未真正访问整个客户 VM 或本地存储等概念。我们的 Windows
    Azure 团队知道我们需要一些东西来与 EC2 竞争，并使 IaaS 成为 Azure 的重要组成部分。


    2011 年，微软决定在领导层进行一次大胆调整。Steve Ballmer 希望在云（包括 Azure）上进行重大押注。他要求 Satya Nadella
    从他当时领导的 Bing 团队调任，去运营微软一个名为服务器与业务工具 (STB) 的部门。这是微软主要的企事业软件集团，负责 Windows Server、SQL
    Server 和 Windows Azure。作为接管 STB 职责的一部分，Satya 做了几件关键的事情。首先，他聘请 Scott Guthrie 来领导
    Azure 的工程工作。Scott 现在是云与企业部 (C&E) 的负责人，该部门以前是 STB。其次，他聘请 Jason Zander 领导 Azure
    核心基础架构团队。第三，他授权 Azure CTO Mark Russinovich 制定未来路线图。而该团队首批大胆举措之一，就是推出 Azure 虚拟机
    (VM) 预览版，为 Windows Azure 提供真正的 IaaS 服务产品。


    首批用于展示 Azure 虚拟机的关键工作负载之一将是 SQL Server。我记得 Azure VM 的这些早期日子，当时我被分配在微软支持部门，负责研究
    SQL Server 在此环境中的可支持性。正是在那时，我遇到了在此项目上负责 SQL Server 的首席项目经理 Guy Bowerman。


    当 Guy 在 2010 年 6 月左右加入 SQL 团队时，他了解了具有辅助角色和 Web 角色的云服务，但也看到我们已经宣布了 *VM 角色*的概念。VM
    角色允许用户上传虚拟机映像 (VHD) 并运行其 VM。然而，VM 角色并未提供真正 IaaS 解决方案的丰富功能。例如，VM 角色不为操作系统或附加的持久化驱动器提供本地持久存储。


    在整个 2011 年和 2012 年，Windows Azure 团队与 SQL Server 等团队合作，推出了新的 Azure 虚拟机预览计划。Azure
    虚拟机于 2013 年 4 月正式发布。Azure 虚拟机是微软迈出的重要一步。“开放”虚拟机现在允许用户部署所选的操作系统，包括 Linux（此举将为你可能听说过的名为
    Helsinki 或 SQL Server on Linux 的小项目奠定基础）。


    新的 Azure 虚拟机平台为运行 SQL Server 提供了各种优势，包括专用的“操作系统磁盘”、用于存储诸如 tempdb 之类文件的临时磁盘，以及用于
    SQL Server 数据库和日志文件的持久存储，称为 *数据磁盘*。尽管选择有限，但有各种虚拟机 *大小* 供客户选择部署 SQL Server，包括 CPU
    数量、内存、磁盘数量和最大容量。除了为虚拟机配置提供这些选择外，Windows Azure 团队还提供了一个系统，使得像 SQL Server 这样的团队能够通过
    *库映像* 或 *市场* 的概念，为预装了 SQL Server 的完整部署虚拟机提供客户选择。现在，用户可以选择一个虚拟机配置和一个 SQL Server
    版本，再做一些其他选择，点击一个按钮，即可在 10-15 分钟内在 Azure 中托管的虚拟机中访问一个完整部署的 SQL Server。然后，你可以使用远程桌面等程序连接到
    VM，然后开始使用。此外，Azure 虚拟机服务还包括 SLA 和可用性集（更新域和故障域）。


    Azure 虚拟机的初始发布使用了托管云服务的相同 Windows Fabric。SQL Server 团队实际上是 Windows Azure 部署虚拟机的“内部客户”。SQL
    团队部署的主要接口和系统称为 RDFE (Red Dog Front End)。该系统后来被亲切地称为 *经典* 虚拟机。如今，经典系统已被 Azure 资源管理器
    (ARM) 系统取代，你将在本书的其他地方了解更多相关信息。


    虽然最初的 Azure 虚拟机经典系统受到客户欢迎，但它给 SQL Server 团队带来了问题。磁盘性能是一个突出问题，我记得在 Azure VM 的早期，作为一名微软支持工程师，我与客户一起努力解决这些问题。此外，使用
    RDFE 在部署带有 SQL Server 的虚拟机以及提供健壮的编程接口来部署和管理虚拟机方面也带来了一些挑战。


    尽管如此，该服务很受欢迎，并且对于 SQL Server 在 Azure 中的成功至关重要。现在，那些认为 SQL Azure 无法满足其需求的客户有了另一个选择。他们仍然可以在
    Azure 中使用虚拟机在公有云中托管 SQL Server。正如 Guy 告诉我的那样，“Azure VM 上的 SQL Server 产品在 Azure
    VM 发布后，被证明是最受欢迎和最成功的产品之一。”'
  raw: '### The SAWA Project


    To this point in time, SQL Azure still was deployed and ran using the AutoPilot
    cluster system with SQL Server instances hosted on bare-metal servers (Brian Chamberlain,
    one of the principal engineers for Azure SQL, calls this internally SQL Azure
    v1).


    We knew as a team we needed to snap into the Windows Azure hosting system which
    uses virtual machines to deploy services. We needed to take more advantage of
    what Windows Azure offers for deployment, networking, and storage without making
    wholesale changes to the SQL Azure architecture. Therefore, a project was born
    called **SAWA** (SQL Azure on Windows Azure). Brian calls this SQL Azure v2\.
    In order to help abstract the team from having to deploy on both AutoPilot and
    SAWA systems, we built a software layer code-named **Blackbird**.


    The SAWA project was important because it would allow the team to eventually become
    a full-fledged Azure service taking advantage of everything internally that Windows
    Azure provides to services. But for a few years, the team operated and managed
    SQL Azure Databases deployed on both AutoPilot and SAWA. Users didn’t see the
    difference. The service still looked and behaved the same.


    For the next few years, Windows Azure offered compute services through cloud services
    and database services through SQL Azure. The SQL Azure team had also added other
    engineering leaders to the team, including Nigel Ellis and Peter Carlin. It was
    the beginning of the journey, but Microsoft leadership was behind the scenes already
    working on changes and bigger things to push Azure further in the public cloud.


    ## The Virtual Machine Initiative


    When Windows Azure was first released, one of the primary target solutions were
    scalable web applications in the cloud. Therefore, cloud service was the first
    compute service in Windows Azure. As I described in the section above on Windows
    Azure, cloud service applications ran in virtual machines and had the ability
    to store data in SQL Azure or in Azure Blob Storage using APIs. But application
    developers did not have access to any local storage or full virtual machine access.
    The concept of a virtual machine in the cloud as a service, also called **Infrastructure
    as a Service (****IaaS****)**, had been introduced by Amazon in 2006 called Amazon
    Elastic Compute Cloud (EC2) as part of their overall Amazon Web Services (AWS)
    suite. EC2 was literally a virtual machine where you can deploy your choice of
    operating system and application.


    For many, cloud services in Windows Azure were still thought of as Platform as
    a Service (PAAS) since developers didn’t really have access to the entire guest
    VM or concepts like local storage. Our Windows Azure team knew we needed something
    to compete with EC2 and make IaaS a big part of Azure.


    In 2011, Microsoft decided to make a bold move in leadership. Steve Ballmer wanted
    to make big bets in the cloud, including Azure. He asked Satya Nadella to move
    from his current position leading the Bing team to run the division at Microsoft
    called Server Tools and Business (STB). This was the chief enterprise software
    group at Microsoft that ran Windows Server, SQL Server, and Windows Azure. As
    part of his role in taking over STB, Satya did several key things. First, he hired
    Scott Guthrie to lead the engineering efforts for Azure. Scott is now the leader
    of Cloud and Enterprises, also known as C&E, which used to be STB. Second, he
    hired Jason Zander to lead the Azure core infrastructure team. And third, he empowered
    Azure CTO Mark Russinovich to build the road map for the future. And one of the
    first bold moves of this team was to launch into preview Azure Virtual Machine
    (VM) to provide a true IaaS service offering for Windows Azure.


    One of the first key workloads to showcase Azure Virtual Machine would be SQL
    Server. I remember these early days of Azure VM as I was assigned in Microsoft
    support to look at the supportability of SQL Server in this environment. It was
    at that point I met the lead program manager for SQL Server on this effort, Guy
    Bowerman.


    When Guy joined the SQL team around June of 2010, he found out about cloud services
    with worker and web roles, but also saw we had announced the concept of a *VM
    role*. A VM role allowed a user to upload a virtual machine image (VHD) and run
    their VM. However, the VM role didn’t provide the richness of a true IaaS solution.
    The VM role, for example, did not provide local persistent storage for the operating
    system or attached persistent drives.


    Throughout 2011 and 2012, the Windows Azure team worked with groups like SQL Server
    to launch a new Azure Virtual Machine preview program. Azure Virtual Machine was
    officially launched in April of 2013\. Azure Virtual Machine was a significant
    move for Microsoft. “Opening up” the virtual machine now allowed users to deploy
    the operating system of their choice, including Linux (this move would set the
    stage for a little project you may have heard about called Helsinki or SQL Server
    on Linux).


    The new Azure Virtual Machine platform provided all types of benefits for running
    SQL Server, including a dedicated “OS disk,” a temporary disk for storing files
    like tempdb, and persistent storage for SQL Server database and log files called
    *data disks*. Even though the choices were limited, there were various virtual
    machine *sizes* customers could choose to deploy SQL Server, including the number
    of CPUs, memory, number of disks, and maximum capacity. In addition to providing
    these choices for the virtual machine configuration, the Windows Azure team provided
    a system where teams like SQL Server could provide customer choices for a fully
    deployed virtual machine with SQL Server preinstalled through a concept called
    *gallery images* or a *marketplace*. Now a user could choose a virtual machine
    configuration and a version of SQL Server, make a few other choices, click a button,
    and within 10–15 minutes have access to a fully deployed SQL Server in a virtual
    machine hosted in Azure. You could then use a program like Remote Desktop, connect
    into the VM, and off you went. In addition, Azure Virtual Machine services included
    SLAs and Availability Sets (update and fault domains).


    The initial launch of Azure Virtual Machine used the same Windows Fabric that
    hosted cloud services. The SQL Server team was effectively an “internal customer”
    of Windows Azure to deploy virtual machines. The main interface and system in
    place for the SQL team to deploy was called RDFE (Red Dog Front End). This system
    later affectionally became known as *classic* virtual machines. Today, the classic
    system has been replaced with the Azure Resource Manager (ARM) system, which you
    will learn more about in various places in the book.


    While the initial Azure Virtual Machine classic system was popular with customers,
    it presented issues for the SQL Server team. Disk performance stood out as an
    issue, and I remember in the early days of Azure VM as a Microsoft support engineer
    working with customers on trying to solve these problems. In addition, using RDFE
    presented some challenges to deploy virtual machines with SQL Server and provide
    robust programming interfaces to deploy and manage virtual machines.


    Still the service was popular and important to the success of SQL Server in Azure.
    Now customers who didn’t feel that SQL Azure could meet their requirements had
    another choice. They could still host a SQL Server in the public cloud in Azure
    with virtual machines. As Guy told me, “The SQL Server on Azure VMs offering proved
    to be one of the most popular and successful offerings after the announcement
    of Azure VM.”'
