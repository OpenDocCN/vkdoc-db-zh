  trans: '

    # 扩展 CPU 容量


    假设你在*自己的数据中心*中遇到了像我在上一个练习中向你展示的高 CPU 性能问题。你会怎么做？如果你在物理服务器上运行 SQL Server，你可能需要获取更多
    CPU，甚至迁移到另一台服务器。对于虚拟机，你或许可以通过重新配置虚拟机来获得更多 vCPU，但如果主机服务器不支持这样做呢？你可能面临将数据库迁移到另一台主机上另一个虚拟机的场景。这很麻烦。


    对于 Azure SQL，你可以通过 `Azure portal`、`az CLI`、`PowerShell` 甚至 `T-SQL` 执行非常简单的操作来*扩展*你的
    CPU 资源。并且，所有这些操作都无需进行数据库迁移。


    对于 Azure SQL Database，扩展 CPU 资源可能会造成一些短暂的停机。对于较大的数据库规模，此停机时间可能会更长，特别是如果我们需要将你的部署移动到具有足够资源以满足你请求的另一台主机时。对于业务关键型服务层，我们还必须确保你的副本具有相同的新资源。超大规模架构提供了更恒定的扩展方式，无论数据库大小如何。


    Azure SQL 托管实例的扩展持续时间可能需要关注。我们可能需要构建一个新的虚拟集群，因此扩展操作可能需要更长的时间。这是需要记住的一点，因此为托管实例部署合适的资源非常重要。托管实例池要快得多，但在大多数情况下仍比
    Azure SQL Database 耗时显著。


    Azure SQL Database 无服务器计算层提供了如我在本书第 4 章所述的自动扩展概念。


    让我们回到我们在练习中中断的地方，当时我们确定很可能是因为工作负载没有足够的 CPU 资源（记得 Copilot 帮我们确定了问题所在）。让我们将其扩大，看看工作负载性能是否会有所提升。


    ![](img/496204_2_En_7_Fig27_HTML.jpg)


    *图 7-27：为 Azure SQL Database 扩展 vCore 数量*


    ![](img/496204_2_En_7_Fig26_HTML.jpg)


    *图 7-26：更改 Azure SQL Database 的定价层*


    ## 查看 Azure 门户中的扩展选项


    我将导航到 `Azure 门户` 中的数据库，并选择定价层，如图 7-26 所示。


    现在你会看到一个可以对部署进行更改的屏幕。我在第 4 章描述过部署后的所有选项时，曾向你展示过类似的屏幕。我的选项看起来如图 7-27 所示，我可以用滑块条来增加部署的
    vCore 数量。


    > **提示**

    >

    > 除了 `Azure 门户`，还有其他方法可以扩展数据库，包括 `PowerShell`、`az CLI`，甚至使用 `ALTER DATABASE` 的
    `T-SQL`。但要使用这些选项，你需要更多地了解一个称为服务等级目标（简称 `SLO` 或 `ServiceObjective`）的概念。我在本书前面提到过这个概念。这是因为要更改
    vCore，你需要选择服务层和 vCore 的组合。你可以使用 `T-SQL` `ALTER DATABASE` 文档查看服务目标的所有可能值：[`https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql?view=azuresqldb-current&preserve-view=true&tabs=sqlpool`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql?view=azuresqldb-current&preserve-view=true&tabs=sqlpool)。


    在我的场景中，我需要为 `ALTER DATABASE` 的 `SERVICE_OBJECT` 参数使用 `HS_Gen5_16` 选项。


    在这种情况下，扩展操作应该只需要几分钟，门户会显示消息“扩展已完成”。


    ## 让我们再次运行工作负载


    让我们再次运行工作负载，看看是否有任何性能差异。我将使用与本章前一个示例中相同的脚本、查询和 `SSMS` 报告。


    从命令提示符再次运行脚本 `sqlworkload.cmd`。


    ## 使用 `sys.dm_db_resource_stats` 观察资源使用情况


    就像你之前所做的那样，多次运行此查询应显示数据库的整体 CPU 使用率更低。这是一个纯粹的 CPU 密集型工作负载，因此你可能仍然会看到 90% 左右的数字，但持续时间会短得多。这里的关键是，拥有
    16 个 vCore 后，由于有更多的 CPU 可用，你应该能够运行其他查询。


    ## 使用 `sys.dm_exec_requests` 观察活动查询


    你应该会看到更多 `RUNNING`（正在运行）的请求和更少的 `SOS_SCHEDULER_YIELD` 等待。


    ## 观察整个工作负载的持续时间


    总体持续时间现在从 12-13 分钟下降到不到 2 分钟。


    ## 让我们简要看一下 Azure 指标


    我点击了“概述”屏幕上的监控图表，而不是仅仅查看它，这让我能够更深入地研究指标，甚至可以更改时间间隔。我的指标现在看起来如图 7-28 所示。


    ![](img/496204_2_En_7_Fig28_HTML.jpg)


    *图 7-28：扩展数据库后的 Azure 指标*


    你可以看到，即使在升级到 16 个 vCore 后，工作负载仍然使用了大量 CPU。然而，它并没有完全处于 100%，因此还有空间供其他工作负载使用 CPU。在使用
    2 个 vCore 的例子中，我们的工作负载从技术上讲使用了超过 100%，这意味着它必须等待 CPU 资源。


    如果我们为工作负载使用 `无服务器` 计算层选项会发生什么？记住，无服务器提供了自动扩展工作负载以及暂停空闲计算的能力。


    我部署了一个新的无服务器数据库，最小 vCore = 2，最大 vCore = 16。结果发现在大多数情况下（不保证），无服务器数据库部署时的 `SQL 调度器`
    数量等于最大 vCore 数。因此，只要无服务器数据库没有被暂停，运行与此示例相同的工作负载，其性能大致与扩展后的超大规模 16 vCore 部署相当。这就是无服务器相比预配置部署的一大优势。假设在两个小时内，此工作负载仅在
    120 分钟中的 15 分钟消耗了计算资源。对于预配置部署，你需要为整个 120 分钟的计算付费。对于无服务器部署，你将为 8 个 vCore 的 15 分钟计算使用量付费，而在剩余的
    90 分钟内，你将为相当于最小 vCore 数的计算使用量付费。此外，如果你启用了 `自动暂停`，在该两小时时段的最后 60 分钟内，你将无需支付任何计算费用（这是因为，如果空闲，无服务器部署在暂停前的最短时间为一小时）。


    图 7-29 显示了一个无服务器部署的 CPU 利用率示例，其下方是实际计费计算的图表。注意，最高的平均 CPU 计费发生在高计算利用率期间。其余时间的计费是针对数据库空闲时的最小
    vCore（2 vCore）。


    ![](img/496204_2_En_7_Fig29_HTML.jpg)


    *图 7-29：无服务器的 Azure 指标（CPU 和计费）*


    > **注意**

    >

    > 通用业务层支持在数据库空闲一段时间后自动暂停。当数据库暂停时，你无需支付任何计算费用。在撰写本书时，超大规模尚不支持自动暂停。


    **Cloud SQL Workshop** 也提供了展示如何使用无服务器进行扩展的实验，你可以在以下网址尝试：[`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB)。

    '
- fmt: '### Tuning I/O Performance


    I/O performance can be critical to SQL Server applications and queries. Azure
    SQL abstracts you from physical file placement, but there are methods to ensure
    you get the I/O performance you need.


    `Input/Output per Second (IOPS)` may be important to your application. Be sure
    you have chosen the right service tier and vCores for your IOPS needs. Understand
    how to measure IOPS for your queries on-premises if you are migrating to Azure
    (hint: look at `Disk Transfers/sec` in Performance Monitor). If you have restrictions
    on IOPS, you may see long I/O waits. Scale up vCores or move to `Business Critical`
    or `Hyperscale` if you don''t have enough IOPS. Remember for Azure SQL Managed
    Instance, you have seen already in this book that the new `NextGen General Purpose`
    service tier allows you to control IOPS separately from your vCore selection.


    `I/O latency` is another key component for I/O performance. For faster I/O latency
    for Azure SQL Database, consider `Business Critical` or `Hyperscale`. For faster
    I/O latency for Managed Instance, move to `Business Critical` or use the new `NextGen
    General Purpose` service tier that I’ve mentioned in this chapter and previous
    chapters in this book: [`https://learn.microsoft.com/azure/azure-sql/managed-instance/service-tiers-next-gen-general-purpose-use`](https://learn.microsoft.com/azure/azure-sql/managed-instance/service-tiers-next-gen-general-purpose-use).


    Configuration isn’t your only choice. Improving transaction log latency may require
    you to use multi-statement transactions. Learn more at [`https://learn.microsoft.com/azure/azure-sql/performance-improve-use-batching`](https://learn.microsoft.com/azure/azure-sql/performance-improve-use-batching).


    In the first edition of this book, I had a lab showing you I/O latency with the
    `General Purpose` service tier for Azure SQL Database. Because of the price reduction
    of `Hyperscale`, you can see I use that service tier in this book. When I tried
    my labs from the first edition using `Hyperscale`, there was no I/O latency or
    issue as I saw with `General Purpose`, so I simply took out these examples. The
    **Cloud SQL Workshop** does have an example of I/O latency with Azure SQL Managed
    Instance you can try at [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/06_Manage_and_Optimize_AzureSQLMI`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/06_Manage_and_Optimize_AzureSQLMI).


    ### Increasing Memory or Workers


    Memory is also an important resource for SQL Server performance, and Azure SQL
    is no different. The total memory available to you for buffer pool, plan cache,
    columnstore, and In-Memory OLTP is all dependent on your deployment choice. As
    I described earlier in this chapter, your highest memory capacity comes from an
    Azure SQL Database `Hyperscale` service tier using the new memory-optimized premium
    series at around 830GB. For a Managed Instance, you can get around 870GB of memory
    using the memory-optimized premium-series. Also, keep in mind that `In-Memory
    OLTP`, which is only available for `Business Critical` service tiers, has a maximum
    memory as a subset of the overall maximum memory.


    One key statement about memory that holds true for SQL Server or Azure SQL: If
    you think you don’t have enough memory, be sure you have an optimal database and
    query design. You may think you are running out of buffer pool after you scan
    a massive table. Maybe indexes should be deployed to enhance performance of your
    query and use less memory. Columnstore indexes are compressed, so they use far
    less memory than traditional indexes.


    Note

    The `Hyperscale` vCore choice not only affects the amount of memory available
    to the compute nodes but also the size of the `RBEX` cache, which can also affect
    performance.


    I’ve described worker limits in this chapter already, which is set to a maximum
    value for Azure SQL Database and Managed Instance. As with SQL Server, running
    out of workers may be an application problem. A heavy blocking problem for all
    users may result in an error or `THREADPOOL` wait when the real solution is to
    fix the blocking problem.


    ### Improving Application Latency


    Even if you configure your deployment for all your resource needs, applications
    may introduce latency performance issues. Be sure to follow these best practices
    with Azure SQL applications:

    - Use a redirect connection type instead of proxy.

    - Optimize "chatty" applications by using stored procedures or limiting the number
    of query round trips through techniques like batches.

    - Optimize transactions by grouping them vs. singleton transactions.


    Take a look at this documentation page for tuning applications for Azure SQL Database:
    [`https://learn.microsoft.com/azure/azure-sql/database/performance-guidance`](https://learn.microsoft.com/azure/azure-sql/database/performance-guidance).


    ### Tune like It Is SQL Server


    Azure SQL is still SQL Server. So in addition to everything you have seen so far
    in this section and in the next section, there is almost never a substitute for
    ensuring you tune your SQL Server queries and look at the following:

    - Proper index design

    - Using batches

    - Using stored procedures

    - Proper query design (e.g., Do you really need to scan one million rows?)

    - Parameterize queries to avoid too many cached ad hoc queries

    - Process results in your application quickly and correctly (avoid the dreaded
    `ASYNC_NETWORK_IO` waits)


    ### Intelligent Performance


    I mentioned earlier in this chapter our intention to build into the database engine
    intelligent capabilities based on data and your application workload to get you
    faster with **no code changes**.


    Let’s take a look in more detail at the areas of Intelligent Query Processing
    (IQP), Automatic Plan Correction, and Automatic Tuning.'
