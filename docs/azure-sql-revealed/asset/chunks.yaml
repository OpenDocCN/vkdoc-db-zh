  trans: '

    ## 拓展 Azure SQL 数据库的可能性


    当我们宣布推出基本、标准和高级版本，并逐步淘汰网页版和商业版时，我们面临一些客户（主要是独立软件供应商）带来的两难困境。网页版和商业版仅对存储收费，不涉及计算资源，但性能无法预测。而基本、标准和高级版本则按
    DTU（数据库事务单位）收费，而非仅存储。一些独立软件供应商希望托管大量数据库（有时多达数千个）以支持他们的应用程序，其中许多是软件即服务（SaaS）应用。新的按
    DTU 计费的版本模式将变得成本高昂。并非所有数千个数据库都需要相同的 DTU 容量，但更重要的是，这些数据库所需的 DTU 使用量可能差异很大。支持所有这些数据库并提供所需性能的唯一方法，是为任何数据库所需的最大
    DTU 付费。


    大约在 2014 年，产品经理 Morgan Oslake 和 Tobias Ternstrom 被指派寻找解决方案，据 Morgan 回忆，“我们（SQL
    DB）需要为拥有数十、数百、数千或更多数据库的 SaaS 独立软件供应商提供一种价格性能优化的解决方案。” Tobias 提出了名为 `Malmo` 的项目（正如
    Morgan 回忆的那样，“……这个名字的灵感来源于瑞典城市马尔默的快速增长和人口激增。无论如何，Malmo 的概念旨在更高效地容纳多数据库应用的突发流量事件”）。团队迅速推进，推出了一项将数据库分组在一起的功能的私人预览，称为
    `弹性池`。我们在 2015 年 4 月转为公开预览，并于 2016 年正式发布。请阅读公告：[`https://azure.microsoft.com/updates/azure-sql-database-supports-large-numbers-of-databases-for-saas-providers/`](https://azure.microsoft.com/updates/azure-sql-database-supports-large-numbers-of-databases-for-saas-providers/)。


    弹性池允许开发人员将数据库分组到一个池中，按弹性 DTU 或 `eDTU` 消耗和付费。您将在本书的第 2 章了解更多关于弹性池工作原理的内容。提供弹性池选项也有助于逐步淘汰和移除网页版和商业版模式。


    随着新版本、Sterling 架构、DTU 和弹性池的推出，客户采用 Azure SQL 数据库所需的许多条件已经具备。然而，一些使用 SQL Server
    “盒装”产品的客户仍持保留态度。通过调查和与这些客户交流，我们发现 Azure SQL 数据库的 `功能范围` 未能满足他们的核心需求。到 2016 年，我们决定需要开发另一个选项，以使更多客户能够采用
    Azure SQL。


    ## 将客户迁移到云端


    凭借从事自动调优的 MDCS 团队的成功经验，我们的团队转向他们开展另一个项目，以帮助减少从 SQL Server 实例迁移到 Azure 的阻力。MDCS
    团队的负责人之一 Drazen Sumic 告诉了我这个项目的起源。他说：“我们 Azure SQL 的负责人之一 Lindsey Allen 在 2016
    年从 Microsoft Ignite 大会返航的航班上，收到了大量关于 Azure SQL 的反馈，随后萌生了一个 `提升` 客户上云的想法。” 到 2016
    年 12 月，MDCS 团队正在开展名为 `CloudLifter` 的项目。


    到 2016 年，Azure 虚拟机已提供多种选择来部署完整的 SQL Server 实例。然而，用户仍须自行管理客户操作系统和 SQL Server 的方方面面。当时没有
    Azure 服务能提供平台即服务（PaaS）的某些优势，同时 `感觉` 像是一个 SQL Server 实例。这正是 Lindsey 向 Drazen 和
    MDCS 团队提出的构想。团队必须找到一种方法，在 Azure 的 PaaS 架构内部署和 `暴露` 一个 SQL Server 实例，包括与 Service
    Fabric 的集成。然后，用户可以连接到该 SQL Server 实例，并像使用本地或 Azure 虚拟机中的常规 SQL Server 一样使用它。此外，新服务仍需提供
    PaaS 的优势，例如内置的高可用性和服务级别协议（SLA）。


    团队在 2017 年几乎全年都在进行一项新服务的私人预览计划，该服务名为 `Azure SQL Database 托管实例`（或常简称为托管实例）。许多 MDCS
    的成员参与了这个项目，包括 Borko Novakovic、Jovan Cukalovic、Branko Kokanovic 和 Milan Novakovic。托管实例于
    2018 年 3 月进入公开预览阶段，首批层级的正式发布公告在 2018 年 9 月的 Microsoft Ignite 大会上宣布（您可以阅读公告：[`https://azure.microsoft.com/blog/azure-sql-database-managed-instance-general-purpose-tier-general-availability/`](https://azure.microsoft.com/blog/azure-sql-database-managed-instance-general-purpose-tier-general-availability/)）。


    尽管雷德蒙德的许多成员，包括 Lindsey Allen、Peter Carlin 和 Alexander Vorobyov，在这个项目中发挥了重要作用，但这个项目对于
    MDCS 的 SQL 团队来说是一个重要的里程碑。据 Drazen 说，“是的，这是迄今为止由塞尔维亚团队主导的最大项目。我们为此感到自豪，也感谢这份信任。之前的努力（例如
    SQL 2016 版本中的查询存储）同样重要，但与这个项目相比，它们属于较小的功能。”


    托管实例解决了云采用的另一个方面的问题，但处理超大型企业级工作负载的能力对团队来说仍然是一个挑战。

    '
- fmt: '## Project Socrates Goes Hyper


    In the fall of 2015, Rohan Kumar, who effectively owned engineering teams for
    both SQL Server and Azure SQL at the time, was holding a meeting with many in
    his senior staff talking about a recent Live Site incident involving a customer
    when he asked the question to the room: “If we had to build an architecture for
    Azure SQL Database from scratch what would that look like?” It was not like the
    current Sterling architecture was not good. In fact, the Sterling architecture
    had allowed Azure SQL to grow significantly. However, if we wanted to truly run
    very large-sized mission-critical workloads, the team thought something different
    might be needed. Something we could build on top of the existing Sterling architecture.
    “How can we provide no-limits scale to SQL in the cloud” was the mission Rohan
    gave the team.


    One of the people in that room was Cristian Diaconu, one of the principal engineers
    who had been instrumental in the Hekaton project for SQL Server (In-Memory OLTP).
    Cristian talks about those early meetings with Rohan: “So Rohan kept at it saying
    that he wants us to think about building for the longer term, with more architectural
    durability and something that we’d be hanging our name to because it was differentiated
    in the industry.”


    That meeting led to a series of discussions about a possible new architecture
    with engineering leaders like Hanuma Kodavalla, Tomas Talius, Donald Kossman,
    Justin Levandovski, Phil Bernstein, Peter Byrne, Peter Carlin, and eventual engineering
    leader Naveen Prakash.


    Note

    You can see a more comprehensive list of team members and contributors from the
    whitepaper written for this project at [`https://www.microsoft.com/en-us/research/uploads/prod/2019/05/socrates.pdf`](https://www.microsoft.com/en-us/research/uploads/prod/2019/05/socrates.pdf).


    By May of 2016, the team had funding to move forward with their designs into a
    full-fledged project. They called it *Socrates* (Cristian says that “...as I was
    meeting a lot of folks with a ton more experience doing this than I, so it dawned
    on me that all I had were questions – hence Socrates”).


    The Socrates concept was to build a very scalable architecture in Azure through
    separation of services like logging and caching services (e.g., page servers).
    The original Socrates architecture can be seen in Figure 1-10.


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig10_HTML.jpg)


    Figure 1-10: The Socrates architecture


    The team moved quickly to turn their design into working code. By December of
    2016, they had a working prototype. However, this architecture was not a trivial
    project to get right, so it took until September of 2018 to launch a public preview.
    The name of the new offer would be called `Azure SQL Database Hyperscale` (we
    technically call this `Hyperscale service tier`). By May of 2019, Hyperscale was
    a generally available service (you can read the announcement at [`https://azure.microsoft.com/updates/azure-sql-database-hyperscale-support-for-single-databases-is-now-available/`](https://azure.microsoft.com/updates/azure-sql-database-hyperscale-support-for-single-databases-is-now-available/)).


    Hyperscale literally put Azure SQL on the map at a new level even within Microsoft.
    Watch Rohan Kumar demonstrate Hyperscale at the keynote for the first time with
    Satya Nadella at the Microsoft Inspire 2019 conference ([`https://youtu.be/WtoU8gugP5g`](https://youtu.be/WtoU8gugP5g)).
    Hyperscale has grown in leaps and bounds since that time and has become the “default”
    choice for many developers for Azure SQL Database. You will see Hyperscale show
    up throughout the rest of this book.


    ## Azure SQL Today


    The evolution of Azure SQL from CloudDB to Hyperscale was an amazing journey for
    the SQL team and Microsoft. February 1, 2020, marked the official tenth year of
    Windows and SQL Azure.


    By this time, we had released three significant capabilities: the `vCore purchasing
    model`, `service tiers`, and the `serverless` database. The `vCore purchasing
    model` makes it clearer on how many CPU resources your application is using and
    being billed. `Service tiers` classified feature capabilities and resource limits
    and are called General Purpose, Business Critical, and Hyperscale (only for Azure
    SQL Database). The `serverless` database, which you will learn more about in the
    next chapter, provides a new method for `autoscale` compute and is now an important
    foundation of the future of Azure SQL Database.


    In the four years since that time, we have also delivered enhancements for Hyperscale,
    more cores, more storage, new hardware generations, new Azure Storage options
    for virtual machines, more redundancy options, and new monitoring experiences.
    You will learn about all of these as you traverse the rest of this book.


    In addition, our team during this time had to move internally off the original
    RDFE architecture to deploy our Azure SQL services to the modern ARM architecture
    or `PaaS v2`. Moving to this architecture provided us the same benefits that modern
    virtual machines have, including scale sets, faster disks, load balancers, `multi-NIC`
    networking, and multiple Availability Zones, among others. This was a massive
    project but done all abstracted from users of Azure SQL services.


    Over the last two years, we have built an acceleration of new capabilities for
    Azure SQL, especially for developers, which includes AI and new integrations with
    Microsoft Fabric. We have also created a new method to connect to the cloud called
    Azure Arc. These are all beyond the traditional thought of a relational database,
    which is why the final chapter of the book, Chapter 10, is aptly named “Beyond
    RDBMS.”


    Azure itself has grown from a few data centers in three countries to 60 regions
    available in 140 countries worldwide (with 18 new regions in progress or planned).


    Tip

    If you want to see an interactive visual of Azure regions across the globe, visit
    [`https://datacenters.microsoft.com/globe`](https://datacenters.microsoft.com/globe).


    Azure experiences include a robust cross-platform command-line interface called
    `az` CLI (you will see the usage of `az` CLI throughout the rest of this book)
    and enhancements to the Azure portal.


    What started as shared databases on bare-metal servers supporting only a maximum
    of 10GB is now a powerful force in the industry and the future of data services
    in the cloud called `Azure SQL`.


    Azure and Azure SQL are poised for the future for even bigger things. Azure SQL
    can be an excellent destination for SQL Server in the cloud. I believe it, which
    is why I decided to write this book. This book is intended to help you navigate
    how to make your journey with Azure SQL successful. The first step in that road
    to success is to further understand the fundamentals of Azure and Azure SQL. What
    do I mean when I say the phrase Azure SQL? What are all the options for Azure
    SQL? When and why would I choose one over the other? Read on to get answers to
    those fundamental questions and more.


    ## Summary


    In this chapter, you learned the amazing journey of a small project at Microsoft
    to build a cloud database service to the world’s industry-leading database of
    Azure SQL today.


    You saw the history of how Azure SQL started as a database service but expanded
    into virtual machines and managed instances. You learned from the creators of
    the service how and why they built SQL for the cloud.


    Understanding the origins of Azure SQL can be fun. It is like reading a story.
    But now you need to start learning about what Azure SQL is and how to use it.
    The next chapter is your path to learning the fundamentals of Azure and Azure
    SQL.'
