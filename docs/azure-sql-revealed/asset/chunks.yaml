- fmt: '### Natural Language to SQL Query


    你已经在整本书中看到了 Microsoft Copilot 技能在 Azure SQL Database 中的应用示例，这些技能可帮助你管理和排查 Azure
    SQL 的问题。我们开发了另一种 AI 辅助体验，称为 **natural language to SQL query**（自然语言转 SQL 查询）。


    此体验现已通过 Azure 门户中的查询编辑器在数据库上下文中可用。此功能使用 RAG 模式，将你的架构（包括表名、列名和键）传递给语言模型以生成 SQL
    查询。


    了解其工作原理的最佳方式是亲眼看看实际操作。我导航到了在本书中创建的名为 **bwadw** 的数据库，该数据库在部署时使用了示例 AdventureWorksLT。


    我从“服务”菜单中选择了查询编辑器并登录。现在，查询编辑器中有一个新选项 **Open Copilot**。当我点击它时，会出现一个新的编辑框，用于输入与我的数据库上下文相关的自然语言语句，如图
    [10-11](#496204_2_En_10_Chapter.xhtml#Fig11) 所示。


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig11_HTML.jpg)


    图 10-11


    使用自然语言为多连接场景生成 SQL


    从我使用的文本可以看出，查询可能需要使用多个表，这通常需要几次连接。**Table selection**（表选择）选项允许我在编辑器中建议 Copilot
    使用哪些表来为模型的 RAG 模式提供信息。此功能不使用你的数据，仅使用你的架构。默认是使用所有表。


    如果我选择 **Generate Query**（生成查询），然后选择 **Accept**（接受），我将得到如图 [10-12](#496204_2_En_10_Chapter.xhtml#Fig12)
    所示的生成查询。


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig12_HTML.jpg)


    图 10-12


    为多连接场景生成的查询


    这里没有显示完整的查询，但我想向你展示生成的注释，它解释了查询的生成内容。你可以在代码片段中看到连接多个表所需的 T-SQL。完整的查询如下：


    ```sql

    SELECT

    c.FirstName + '' '' + c.LastName AS CustomerName,

    a.StateProvince AS State,

    p.Name AS ProductName,

    SUM(od.LineTotal) AS TotalSales

    FROM

    SalesLT.Customer AS c

    JOIN SalesLT.CustomerAddress AS ca ON c.CustomerID = ca.CustomerID

    JOIN SalesLT.Address AS a ON ca.AddressID = a.AddressID

    JOIN SalesLT.SalesOrderHeader AS oh ON c.CustomerID = oh.CustomerID

    JOIN SalesLT.SalesOrderDetail AS od ON oh.SalesOrderID = od.SalesOrderID

    JOIN SalesLT.Product AS p ON od.ProductID = p.ProductID

    JOIN SalesLT.ProductCategory AS pc ON p.ProductCategoryID = pc.ProductCategoryID

    WHERE

    pc.Name = ''Mountain Bikes''

    GROUP BY

    c.FirstName + '' '' + c.LastName,

    a.StateProvince,

    p.Name

    ORDER BY

    TotalSales DESC;

    ```


    你可以看到，为了支持像“按州”和“按...排序”这样的自然语言语句，生成了所有必需的连接和聚合。


    我现在可以通过选择“运行”来获取并执行该查询，或者将生成的查询放到我喜欢的 SQL 工具中运行。


    另一个我觉得很有趣的例子是生成一个允许你在关系表中导航层次结构的查询。所以，我在编辑器中向 Copilot 提供了以下提示：


    ```text

    Find the heirarchy of product categories at any level

    ```


    > 注意

    > 我故意拼错了 hierarchy（层次结构）这个词，看看它是否仍然有效。


    编辑器中的 Copilot 生成了以下查询：


    ```sql

    WITH RecursiveCTE AS (

    SELECT

    ProductCategoryID,

    Name,

    ParentProductCategoryID,

    0 AS Level

    FROM

    SalesLT.ProductCategory

    WHERE

    ParentProductCategoryID IS NULL

    UNION ALL

    SELECT

    pc.ProductCategoryID,

    pc.Name,

    pc.ParentProductCategoryID,

    rc.Level + 1

    FROM

    SalesLT.ProductCategory pc

    INNER JOIN

    RecursiveCTE rc ON pc.ParentProductCategoryID = rc.ProductCategoryID

    )

    SELECT

    ProductCategoryID,

    Name,

    ParentProductCategoryID,

    Level

    FROM

    RecursiveCTE

    ORDER BY

    Level, ProductCategoryID;

    ```


    太棒了。生成的查询是递归公用表表达式（CTE）的一个例子。你可以在 [`https://learn.microsoft.com/sql/t-sql/queries/with-common-table-expression-transact-sql?view=sql-server-ver16#guidelines-for-defining-and-using-recursive-common-table-expressions`](https://learn.microsoft.com/sql/t-sql/queries/with-common-table-expression-transact-sql?view=sql-server-ver16#guidelines-for-defining-and-using-recursive-common-table-expressions)
    了解更多关于此查询技术的信息。我相信此功能将帮助许多人构建从最简单到最复杂的 SQL 查询，为你节省时间和精力。


    我与负责该项目的产品经理 Joe Sack（他也恰好是本书的技术编辑）讨论了这个功能。他对我说：“Bob，你知道这个 Copilot 可以为系统目录视图和
    DMV 生成查询吗？” 我回答：“呃，不知道。” 我们知道所有系统目录视图和 DMV 的架构，因此我们可以轻松地将任何这些元数据传递给语言模型。所以，我尝试了两个例子：


    **Show me which tables have consumed the most space in this database**（显示此数据库中占用空间最多的表）


    生成的查询如下：


    ```sql

    SELECT

    t.NAME AS TableName,

    s.Name AS SchemaName,

    p.rows AS RowCounts,

    SUM(a.total_pages) * 8 AS TotalSpaceKB,

    SUM(a.used_pages) * 8 AS UsedSpaceKB,

    (SUM(a.total_pages) - SUM(a.used_pages)) * 8 AS UnusedSpaceKB

    FROM

    sys.tables t

    INNER JOIN

    sys.indexes i ON t.OBJECT_ID = i.object_id

    INNER JOIN

    sys.partitions p ON i.object_id = p.OBJECT_ID AND i.index_id = p.index_id

    INNER JOIN

    sys.allocation_units a ON p.partition_id = a.container_id

    LEFT OUTER JOIN

    sys.schemas s ON t.schema_id = s.schema_id

    WHERE

    t.NAME NOT LIKE ''dt%''

    AND t.is_ms_shipped = 0

    AND i.OBJECT_ID > 255

    GROUP BY

    t.Name, s.Name, p.Rows

    ORDER BY

    TotalSpaceKB DESC;

    ```


    这是对目录视图的一个很好的测试。


    那么 DMV 呢？我尝试了这个提示：


    **Show me the top preemptive waits for this database**（显示此数据库中排名靠前的抢占式等待）


    生成的查询正是我想要的：


    ```sql

    SELECT TOP 10 wait_type, wait_time_ms, signal_wait_time_ms

    FROM sys.dm_os_wait_stats

    WHERE wait_type LIKE ''PREEMPTIVE%''

    ORDER BY wait_time_ms DESC;

    ```


    我知道 Joe 和团队正在测试在此功能中可以实现的各种选项，所以我非常期待看到它的未来。'
  raw: '### Natural Language to SQL Query


    You have seen throughout the book examples of Microsoft Copilot skills in Azure
    SQL Database to assist you in managing and troubleshooting Azure SQL. We have
    developed another AI-assisted experience called **natural language** **to SQL
    query**.


    This experience is available today in the context of your database in the Azure
    Portal using the Query Editor. This feature uses a RAG pattern by using your schema
    (including table names, column names, and keys) to pass to a language model to
    generate a SQL query.


    The best way to see how this works is to see it in action. I navigated to a database
    I’ve created in this book called **bwadw** which uses the sample AdventureWorksLT
    during deployment.


    I selected the Query Editor from the Service menu and logged in. Now I have a
    new option in the Query Editor to **Open Copilot**. When I do this, I get a new
    edit box to type in a natural language statement that has context to my database
    like in Figure [10-11](#496204_2_En_10_Chapter.xhtml#Fig11).


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig11_HTML.jpg)


    Figure 10-11


    Using natural language to generate SQL for a multi-join scenario


    You can see from the text I used a query would need to probably use multiple tables
    which likely requires several joins. The **Table selection** option allows me
    to advise the Copilot in the editor which tables to use to feed the RAG pattern
    for the model. This does not use your data, only your schema. The default is all
    tables.


    If I select **Generate Query** and then select **Accept**, I’ll get the following
    query generated as you can see in Figure [10-12](#496204_2_En_10_Chapter.xhtml#Fig12).


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig12_HTML.jpg)


    Figure 10-12


    Generated query for multi-join scenario


    This doesn’t show the full query, but I wanted to show you the comment generated
    which explains what was generated for the query. You can see in the code fragment
    the T-SQL required to join multiple tables. The full query looks like this:


    ```

    SELECT

    c.FirstName + '' '' + c.LastName AS CustomerName,

    a.StateProvince AS State,

    p.Name AS ProductName,

    SUM(od.LineTotal) AS TotalSales

    FROM

    SalesLT.Customer AS c

    JOIN SalesLT.CustomerAddress AS ca ON c.CustomerID = ca.CustomerID

    JOIN SalesLT.Address AS a ON ca.AddressID = a.AddressID

    JOIN SalesLT.SalesOrderHeader AS oh ON c.CustomerID = oh.CustomerID

    JOIN SalesLT.SalesOrderDetail AS od ON oh.SalesOrderID = od.SalesOrderID

    JOIN SalesLT.Product AS p ON od.ProductID = p.ProductID

    JOIN SalesLT.ProductCategory AS pc ON p.ProductCategoryID = pc.ProductCategoryID

    WHERE

    pc.Name = ''Mountain Bikes''

    GROUP BY

    c.FirstName + '' '' + c.LastName,

    a.StateProvince,

    p.Name

    ORDER BY

    TotalSales DESC;

    ```


    You can see all the joins and aggregates generated required to support natural
    language statements like “by state” and “ordered by….”


    I can now take the query and run it by selecting Run or take the generated query
    and run it in my favorite SQL tool.


    Another interesting example for me is generating a query that allows you to navigate
    a hierarchy within a relational table. So, I fed Copilot in the editor this prompt:


    ```

    Find the heirarchy of product categories at any level

    ```


    Note


    I misspelled the word hierarchy on purpose just to see if it still worked.


    Copilot in the editor generated the following query:


    ```

    WITH RecursiveCTE AS (

    SELECT

    ProductCategoryID,

    Name,

    ParentProductCategoryID,

    0 AS Level

    FROM

    SalesLT.ProductCategory

    WHERE

    ParentProductCategoryID IS NULL

    UNION ALL

    SELECT

    pc.ProductCategoryID,

    pc.Name,

    pc.ParentProductCategoryID,

    rc.Level + 1

    FROM

    SalesLT.ProductCategory pc

    INNER JOIN

    RecursiveCTE rc ON pc.ParentProductCategoryID = rc.ProductCategoryID

    )

    SELECT

    ProductCategoryID,

    Name,

    ParentProductCategoryID,

    Level

    FROM

    RecursiveCTE

    ORDER BY

    Level, ProductCategoryID;

    ```


    So nice. The generated query is an example of a recursive Common Table Expression
    (CTE). You can learn more about this query technique at [`https://learn.microsoft.com/sql/t-sql/queries/with-common-table-expression-transact-sql?view=sql-server-ver16#guidelines-for-defining-and-using-recursive-common-table-expressions`](https://learn.microsoft.com/sql/t-sql/queries/with-common-table-expression-transact-sql%253Fview%253Dsql-server-ver16%2523guidelines-for-defining-and-using-recursive-common-table-expressions).
    I believe this capability will help so many to build SQL queries from the simplest
    to the most complex, saving you time and effort.


    I was chatting about this feature with Joe Sack, who is the PM leader for this
    project and just happens to be the tech editor for this book. He said to me, “Bob
    did you know that this Copilot can generate queries for system catalog views and
    DMVs, right?” I was like “Uh no.” We know the schema of all our system catalog
    view and DMVs, so we can easily feed any language model this metadata. So, I gave
    it a spin with two examples:


    **Show me which tables have consumed the most space in this database**


    The resulting generated query was the following:


    ```

    SELECT

    t.NAME AS TableName,

    s.Name AS SchemaName,

    p.rows AS RowCounts,

    SUM(a.total_pages) * 8 AS TotalSpaceKB,

    SUM(a.used_pages) * 8 AS UsedSpaceKB,

    (SUM(a.total_pages) - SUM(a.used_pages)) * 8 AS UnusedSpaceKB

    FROM

    sys.tables t

    INNER JOIN

    sys.indexes i ON t.OBJECT_ID = i.object_id

    INNER JOIN

    sys.partitions p ON i.object_id = p.OBJECT_ID AND i.index_id = p.index_id

    INNER JOIN

    sys.allocation_units a ON p.partition_id = a.container_id

    LEFT OUTER JOIN

    sys.schemas s ON t.schema_id = s.schema_id

    WHERE

    t.NAME NOT LIKE ''dt%''

    AND t.is_ms_shipped = 0

    AND i.OBJECT_ID > 255

    GROUP BY

    t.Name, s.Name, p.Rows

    ORDER BY

    TotalSpaceKB DESC;

    ```


    That was a good test for catalog views.


    What about DMVs? I tried this prompt:


    **Show me the top preemptive waits for this database**


    The generated query was exactly what I wanted:


    ```

    SELECT TOP 10 wait_type, wait_time_ms, signal_wait_time_ms

    FROM sys.dm_os_wait_stats

    WHERE wait_type LIKE ''PREEMPTIVE%''

    ORDER BY wait_time_ms DESC;

    ```


    I know Joe and the team are testing a wide range of options for what is possible
    here, so I’m so excited to see the future.'
