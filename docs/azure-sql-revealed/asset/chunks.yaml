- fmt: '# 10. Beyond RDBMS


    In the summer of 2023, I was trying to think of a way to describe some of the
    great capabilities we have in Azure SQL that is “in the box” but also features
    that are not normally in a traditional Relational Database Management System (RDBMS).
    The word “beyond” just came to me as a way to describe this. So, I started sketching
    down on paper (I’m old school) two columns:


    *   What features are built inside the database that in many cases might require
    an add-on or other products? I listed those on the left side.

    *   What capabilities are beyond what many think are part of a traditional RDBMS?
    Those were on the right side.


    After sketching this out, I built a slide to describe all of this as you see in
    Figure 10-1.


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Azure SQL is beyond RDBMS


    This chapter describes in more detail what you see on this figure. Some of the
    features you see on the left side we have talked about in the book, but it will
    be a good summary to see each of these.


    This chapter will contain examples for you to try out and use as you read along.
    For you to try out any of the techniques, commands, or examples I use in this
    chapter, you will need:


    *   An Azure subscription.

    *   A minimum of Contributor role access to the Azure subscription. You can read
    more about Azure built-in roles at [https://learn.microsoft.com/azure/role-based-access-control/built-in-roles](https://learn.microsoft.com/azure/role-based-access-control/built-in-roles).

    *   Access to the Azure Portal.

    *   In this chapter, I will use Azure SQL Database as many of these capabilities
    are enabled for that service, but many of them either are now or will be part
    of Azure SQL Managed Instance.

    *   To connect to Azure SQL Database, I’m going to use the Azure VM I deployed
    in Chapter 3, called `bwsql2022`, and configured for a private endpoint in Chapter
    6 (you could use another method as long as you can connect to the Azure SQL Database).
    You can use any method you like provided you can connect to an Azure SQL Database.

    *   You will see some T-SQL in this chapter, so install a tool like SQL Server
    Management Studio (SSMS) at [https://aka.ms/ssms](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms%253Fview%253Dsql-server-ver15).

    *   Some of the features I’ll show you here at the time of the writing of this
    book are in preview and not available publicly. But in the future, they will be
    so I’ve listed resources for you in the chapter to keep up to date with our progress,
    so you can access them.


    ## “It’s in the Box?”


    The left side of Figure 10-1 represents features that are built into the Azure
    SQL service and all of them integrated into the database engine and the T-SQL
    language.


    Let’s go through each of the features on the left side of Figure 10-1 with some
    examples.


    ### JSON


    JSON is a very popular storage format for data for all types of applications.
    In the past, we have shipped a series of T-SQL functions to process and view JSON
    formatted data, including the following capabilities:


    *   Parse JSON text and read or modify values.

    *   Transform arrays of JSON objects into table format.

    *   Run any Transact-SQL query on the converted JSON objects.

    *   Format the results of Transact-SQL queries in JSON format.


    As an example, you could use T-SQL to extract JSON like the following example:


    ```sql

    DECLARE @jsonInfo NVARCHAR(MAX)

    DECLARE @town NVARCHAR(32)

    SET @jsonInfo=N''{"info":{"address":[{"town":"Paris"},{"town":"London"}]}}'';

    SET @town=JSON_VALUE(@jsonInfo,''$.info.address[0].town''); -- Paris

    SET @town=JSON_VALUE(@jsonInfo,''$.info.address[1].town''); -- London

    ```


    In these examples, the data type used is a character data type from a local variable,
    but it could have been a character-based column. We have a wide range of T-SQL
    functions to use with JSON data, which you can see the full list at [https://aka.ms/jsonsqlfunctions](https://aka.ms/jsonsqlfunctions).


    What is new is a *native* JSON data type, which is in preview at the time of the
    writing of this book, now allows you to use the same set of JSON T-SQL functions
    but use a type that is more geared toward JSON documents.


    The native JSON type, called `json`, is more efficient than using a character
    column because it provides:


    *   More efficient reads, as the document is already parsed.

    *   More efficient writes, as the query can update individual values without accessing
    the entire document.

    *   More efficient storage, optimized for compression.

    *   No change in compatibility with existing code.


    The JSON type internally stores data using UTF-8 encoding, `Latin1_General_100_BIN2_UTF8`.
    This behavior matches the JSON specification.


    An example used in a table looks like this. Let’s say you were storing general
    information about orders that are captured from your application in JSON format.
    Originally, your table definition might look like this (credits for this example
    from my colleague Umachandar Jayachandran (we call him UC)):


    ```sql

    CREATE TABLE dbo.Orders(

    order_id int NOT NULL IDENTITY,

    order_info nvarchar(max) NOT NULL

    )

    ```


    Now it can look like this:


    ```sql

    CREATE TABLE dbo.Orders(

    order_id int NOT NULL IDENTITY,

    order_info json NOT NULL

    )

    ```


    Now any JSON document describing the log can be stored natively right into the
    table like the following:


    ```sql

    INSERT INTO dbo.Orders(order_info)

    VALUES

    (

    ''{

    "OrderNumber": "S043659",

    "Date": "2024-05-24T08:01:00",

    "AccountNumber": "AW29825",

    "Price": 59.99,

    "Quantity": 1}''

    ),

    (

    ''{

    "OrderNumber": "S043661",

    "Date": "2024-05-20T12:20:00",

    "AccountNumber": "AW7365",

    "Price": 24.99,

    "Quantity": 3}''

    )

    ```


    If you query this data, you will see a result like the one in Figure 10-2.


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Results from using the new JSON data type


    Now you can use JSON functions to extract fields out of the JSON format in a relational
    result like the following query:


    ```sql

    SELECT o.order_id, JSON_VALUE(o.order_info, ''$.AccountNumber'') AS account_number

    FROM dbo.Orders o;

    ```


    In addition to helping with the construction of JSON documents, we have two new
    T-SQL functions.


    #### JSON_ARRAYAGG


    Generate a JSON array based on the aggregation of values. So basically, take a
    number of rows of data and produce a single JSON array of values. For example,
    this query based on the above data:


    ```sql

    SELECT JSON_ARRAYAGG(JSON_ARRAY(o.order_info))

    FROM dbo.Orders o;

    ```


    produces a single array like the following result:


    ```json

    [[{"OrderNumber":"S043659","Date":"2024-05-24T08:01:00","AccountNumber":"AW29825","Price":59.99,"Quantity":1}],[{"OrderNumber":"S043661","Date":"2024-05-20T12:20:00","AccountNumber":"AW7365","Price":24.99,"Quantity":3}]]

    ```


    #### JSON_OBJECTAGG


    This function is similar except it is very valuable to produce a JSON document
    of objects as key/value pairs. For example, this query based on the above data:


    ```sql

    SELECT JSON_OBJECTAGG(o.order_id:JSON_OBJECT(''AccountNumber'':o.order_info))

    FROM dbo.Orders o;

    ```


    produces key/value pairs like the following:


    ```json

    {"1":{"AccountNumber":{"OrderNumber":"S043659","Date":"2024-05-24T08:01:00","AccountNumber":"AW29825","Price":59.99,"Quantity":1}},"2":{"AccountNumber":{"OrderNumber":"S043661","Date":"2024-05-20T12:20:00","AccountNumber":"AW7365","Price":24.99,"Quantity":3}}}

    ```


    Try it out for yourself and learn more at [https://aka.ms/jsonsql](https://aka.ms/jsonsql).'
