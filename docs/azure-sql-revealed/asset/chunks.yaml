    \ length filter for detailed reviews\nAND (f.Text LIKE '%gluten%' OR f.Text LIKE\
    \ '%dairy%') -- Inclusion of specific words\nORDER BY\nDistance,  -- Order by\
    \ distance\nf.Score DESC, -- Secondary order by review score\nReviewLength DESC;\
    \ -- Tertiary order by review length\n```\n\nImagine now combining the use of\
    \ JSON, RegEx, spatial, inequality and equality operators, and vector distance\
    \ to truly execute a smarter search using the power of SQL. That is beyond RDBMS!\n\
    \nRemember that you can additionally use the results of hybrid search *with a*\
    \ *RAG pattern* as Davide Mauri shows in this blog post: [`https://devblogs.microsoft.com/azure-sql/rag-with-azure-sql`](https://devblogs.microsoft.com/azure-sql/rag-with-azure-sql).\n\
    \nNote\n\nThis story is just going to continue to get better. This includes support\
    \ for a vector data type, index, and other T-SQL built-in features to make the\
    \ entire hybrid search story simpler and streamlined with your application. I\
    \ will leave that for the next book.\n\nUsing the SQL engine to power your GenAI\
    \ application has many benefits, including\n\n*   Familiarity of the T-SQL language\n\
    \n*   Integrated into the query processor and data types\n\n*   Benefit from the\
    \ scale of the engine, including Azure SQL Hyperscale\n\n*   Use the security\
    \ boundary you trust with authentication and access control in the engine"
  trans: '

    #### 使用 AI 服务


    第一个场景常用于构建"与你的数据聊天"的体验，其组件位于 SQL 之外。图 10-9 展示了这些组件如何协同工作的示意图。


    ![](img/496204_2_En_10_Fig9_HTML.jpg)


    图 10-9：将 Azure AI 服务与你的数据结合使用


    Azure OpenAI 服务与 Azure AI 搜索索引紧密集成。在此场景中，你可以基于 Azure SQL 数据库表构建 Azure AI 搜索索引。在构建索引时，可以对该索引应用`技能`。其中一项技能是根据表中的列在索引中生成嵌入。你还可以应用其他技能，包括内容审核，以剔除任何个人身份信息（PII）。


    构建好此索引后，你现在可以构建一个生成式 AI 应用程序，使用带有嵌入的向量搜索或 RAG（检索增强生成）模式来查询索引。一个简单的方法是使用 Azure
    AI Studio。该工具允许你测试各种类型的提示，这些提示会被转换为针对索引的向量和/或混合搜索。你可以使用`聊天演练场`，如图 10-10 所示。


    ![](img/496204_2_En_10_Fig10_HTML.jpg)


    图 10-10：测试 Azure 搜索索引的聊天演练场示例


    注意，提示是一个使用了诸如“紧预算”和“吸引人”等词语的不精确问题。这正是语言模型大放异彩的地方，因为它们能理解这些词语，并可以使用嵌入找到正确的结果，并以非常易于理解的方式进行格式化。你甚至可以在演练场中进行测试，并构建一个简单的应用程序或在你数据上构建你自己的`Copilot`。


    同时请注意，在图 10-10 中，Azure AI 搜索索引可以使用 Azure SQL 支持的变更数据捕获（CDC）等功能，从底层 SQL 数据中自动更新。


    有关如何亲自尝试的端到端步骤，请参阅[`https://aka.ms/sqlaisamples`](https://aka.ms/sqlaisamples)。


    #### 使用 T-SQL 进行混合搜索


    利用我在图 10-7 及本章前面描述的概念，你可以使用 T-SQL 中的新功能在 SQL 内部执行混合搜索，包括使用 REST API 和新的 T-SQL
    函数来处理嵌入。


    我的同事 Pooja Kamath 和 Davide Mauri 撰写了一篇博客文章，宣布了`原生向量支持`的私人预览版，你可以在[`https://devblogs.microsoft.com/azure-sql/announcing-eap-native-vector-support-in-azure-sql-database`](https://devblogs.microsoft.com/azure-sql/announcing-eap-native-vector-support-in-azure-sql-database)阅读。


    在此示例中，概念是：


    - 使用 REST API 调用 Azure OpenAI 的嵌入模型，根据数据库中的文本（对食物的客户评论）生成嵌入。嵌入以 JSON 格式返回。

    - 使用新的 T-SQL 支持将 JSON 中的嵌入转换为二进制格式，并将其存储在`varbinary`列中。

    - 从应用程序获取提示，使用 REST API 获取提示的嵌入并将其转换为二进制。

    - 使用称为`向量距离`的概念，对提示和数据库中的评论进行向量搜索比较，如下所示：


    ```

    --假设你有一个存储过程，用于获取给定文本的嵌入

    DECLARE @e VARBINARY(8000);

    EXEC dbo.GET_EMBEDDINGS @model = '''', @text = ''healthy options instead of coke'',
    @embedding = @e OUTPUT;

    SELECT TOP(10) ProductId,

    Summary,

    Text,

    VECTOR_DISTANCE(''cosine'',@e, VectorBinary) AS Distance

    FROM dbo.FineFoodReviews

    ORDER BY Distance;

    ```


    距离数值越小，搜索结果越`相似`。在此示例中，我们构建了一个 SQL 存储过程`GET_EMBEDDINGS`，它在后台使用 REST API 和语言模型，如下所示：


    ```

    CREATE PROCEDURE [dbo].[GET_EMBEDDINGS]

    (

    @model VARCHAR(MAX),

    @text NVARCHAR(MAX),

    @embedding VARBINARY(8000) OUTPUT

    )

    AS

    BEGIN

    DECLARE @retval INT, @response NVARCHAR(MAX);

    DECLARE @url VARCHAR(MAX);

    DECLARE @payload NVARCHAR(MAX) = JSON_OBJECT(''input'': @text);

    -- 在 EXEC 语句之前，使用正确的连接设置@url 变量

    SET @url = ''https://.openai.azure.com/openai/deployments/'' + @model + ''/embeddings?api-version=2023-03-15-preview'';

    EXEC dbo.sp_invoke_external_rest_endpoint

    @url = @url,

    @method = ''POST'',

    @payload = @payload,

    @headers = ''{"Content-Type":"application/json", "api-key":""}'',

    @response = @response OUTPUT;

    -- 使用 JSON_QUERY 直接提取嵌入数组

    DECLARE @jsonArray NVARCHAR(MAX) = JSON_QUERY(@response, ''$.result.data[0].embedding'');

    SET @embedding = JSON_ARRAY_TO_VECTOR(@jsonArray);

    END

    GO

    ```


    既然你能获取向量距离，就可以将其与其他 SQL 搜索方法或混合搜索结合使用，如下所示：


    ```

    -- 假设你有一个存储过程，用于获取给定文本的嵌入

    DECLARE @e VARBINARY(8000);

    EXEC dbo.GET_EMBEDDINGS @model = '''', @text = ''quick fix breakfast option for
    toddlers'', @embedding = @e OUTPUT;

    -- 包含多个过滤器的综合查询。

    SELECT TOP(10)

    f.Id,

    f.ProductId,

    f.UserId,

    f.Score,

    f.Summary,

    f.Text,

    VECTOR_DISTANCE(''cosine'', @e, VectorBinary) AS Distance,

    CASE

    WHEN LEN(f.Text) > 100 THEN ''详细评论''

    ELSE ''简短评论''

    END AS ReviewLength,

    CASE

    WHEN f.Score >= 4 THEN ''高分''

    WHEN f.Score BETWEEN 2 AND 3 THEN ''中等分数''

    ELSE ''低分''

    END AS ScoreCategory

    FROM FineFoodReviews f

    WHERE

    f.UserId NOT LIKE ''Anonymous%'' -- 基于用户的过滤器，排除匿名用户

    AND f.Score >= 2 -- 分数阈值过滤器

    AND LEN(f.Text) > 50 -- 用于筛选详细评论的文本长度过滤器

    AND (f.Text LIKE ''%gluten%'' OR f.Text LIKE ''%dairy%'') -- 包含特定词语

    ORDER BY

    Distance,  -- 按距离排序

    f.Score DESC, -- 次要按评论分数排序

    ReviewLength DESC; -- 第三按评论长度排序

    ```


    现在想象一下，结合使用 JSON、正则表达式、空间、不等式和等式运算符以及向量距离，利用 SQL 的强大功能真正执行更智能的搜索。这超越了传统关系型数据库管理系统（RDBMS）的能力！


    请记住，你还可以像 Davide Mauri 在这篇博文中展示的那样，将混合搜索的结果*与 RAG 模式结合使用*：[`https://devblogs.microsoft.com/azure-sql/rag-with-azure-sql`](https://devblogs.microsoft.com/azure-sql/rag-with-azure-sql)。


    **注意**


    这个故事只会越来越好。这包括对向量数据类型、索引以及其他 T-SQL 内置功能的支持，以使整个混合搜索方案变得更简单、更精简，并与你的应用程序无缝集成。我将把这些内容留给下一本书。


    使用 SQL 引擎来驱动你的生成式 AI 应用程序有许多好处，包括：


    - T-SQL 语言的熟悉度

    - 集成到查询处理器和数据类型中

    - 受益于引擎的扩展性，包括 Azure SQL 超大规模

    - 使用你信任的安全边界，包括引擎内的身份验证和访问控制

    '
- fmt: '## SQL 与生成式 AI 集成：关键考量


    #### 使用框架


    虽然利用 SQL 引擎有优势，但您仍需要使用驱动程序或提供程序来连接和执行查询。一个可用的例子是用于 Entity Framework Core 的，您可以在
    [`https://github.com/Azure-Samples/azure-sql-db-vector-search/tree/main/EFCoreVectors`](https://github.com/Azure-Samples/azure-sql-db-vector-search/tree/main/EFCoreVectors)
    找到。


    此外，拥有一套能够*协调*为生成式 AI 应用程序使用 SQL 活动的库（框架）会很有帮助。


    当今两个流行的框架是 `LangChain` 和 `Semantic Kernel`，它们都是开源库。`LangChain` 和 `Semantic Kernel`
    都内置了对 SQL 的支持，并且随着我们进一步构建向量存储方案，也会将 SQL 作为向量存储包括进来。`LangChain` 还提供了一个库，帮助您根据自然语言提示从您的数据库架构生成
    SQL 查询。


    您可以在 [`https://github.com/microsoft/semantic-kernel/tree/main/dotnet/src/Connectors/Connectors.Memory.SqlServer`](https://github.com/microsoft/semantic-kernel/tree/main/dotnet/src/Connectors/Connectors.Memory.SqlServer)
    了解更多关于 `Semantic Kernel` 对 SQL 的支持。


    您可以在 [`https://python.langchain.com/v0.2/docs/integrations/tools/sql_database`](https://python.langchain.com/v0.2/docs/integrations/tools/sql_database)
    了解更多关于 `LangChain` 对 SQL 的支持。


    #### 聊天历史如何处理？


    当今许多生成式 AI 应用程序都是使用提示的聊天体验。我们观察到，大多数此类聊天体验除了需要用户对聊天体验的反馈外，还需要存储聊天历史（并带有用户权限）。数据库似乎是存储此类数据的天然选择，因此
    Azure SQL 可能是一个很好的候选方案。目前这个领域还没有很多标准，但我预计未来会出现。


    一个可用于聊天历史和反馈的架构示例来自开源项目 `ChainLit`（用于构建聊天机器人），网址为 [`https://docs.chainlit.io/data-persistence/custom`](https://docs.chainlit.io/data-persistence/custom)。


    #### 您的文本数据存储在哪里？


    所有生成式 AI 示例都提供对文本数据的智能搜索，因为这类数据是语言模型的天然适配对象（尽管也存在支持视频、音频、图像等的语言模型）。


    虽然 SQL 可以在许多情况下用于存储文本以及作为其他列的文本属性，但我见过许多客户将他们想要用于生成式 AI 的文本数据存储在其他存储系统中，包括文件系统、Azure
    Storage、S3 等。这些可能是 JSON 文档、文本文件、CSV 文件，以及更突出的 PDF 文档。


    因此，在您审视生成式 AI 时，您应该考虑将此文本数据存储在 Azure SQL 中是否合理，并将文本与其他属性一起在列中分类，以证明与 AI 模型的混合搜索是可行的。


    一个值得考虑的资源是使用 Python 库（如 [`https://pypi.org/project/pypdf`](https://pypi.org/project/pypdf)）来帮助您将
    PDF 提取为文本以插入 SQL。PDF 文件非常普遍，我认为这将是未来需要关注的一个场景。


    #### 资源


    收藏以下资源，以随时了解我们关于 SQL 和 AI 的所有最新内容：


    [`https://aka.ms/sqlai`](https://aka.ms/sqlai) – 这是我们文档中所有关于 SQL 和 AI 主题的一站式中心。


    [`https://aka.ms/sqlaisamples`](https://aka.ms/sqlaisamples) – 这是一个包含代码示例的 GitHub
    仓库。


    [`https://aka.ms/sqlaiworkshop`](https://aka.ms/sqlaiworkshop) – 这是我的同事 Muazma
    Zahid、我以及我们团队的其他成员构建的一个研讨会，可以全面了解 SQL 和 AI。


    另一个关于我们能力的良好总结可以在我的博客文章中找到：[`https://www.microsoft.com/sql-server/blog/2024/06/26/getting-started-with-delivering-generative-ai-capabilities-in-sql-server-and-azure-sql`](https://www.microsoft.com/sql-server/blog/2024/06/26/getting-started-with-delivering-generative-ai-capabilities-in-sql-server-and-azure-sql)。在这篇博客文章中，我还引用了一个我与著名的
    Microsoft Mechanics 团队录制的视频，您可以在 `https://aka.ms/SQLAIMechanics` 观看。'
  raw: '#### Use Frameworks


    With the advantage of using the SQL engine, you will still need to use a driver
    or provider to connect and execute queries. One example that is available for
    you is for Entity-Framework core which you can see at [`https://github.com/Azure-Samples/azure-sql-db-vector-search/tree/main/EFCoreVectors`](https://github.com/Azure-Samples/azure-sql-db-vector-search/tree/main/EFCoreVectors).


    Furthermore, it might be nice to have a set of libraries (framework) that can
    *orchestrate* the activities of using SQL for GenAI applications.


    Two popular frameworks today are **LangChain** and **Semantic Kernel**, both open
    source libraries. LangChain and Semantic Kernel have built-in support for SQL
    and as we build out our vector story further will include SQL as a vector store.
    LangChain also has a library to help you generate SQL queries based on your schema
    from a natural language prompt.


    You can learn more about Semantic Kernel support for SQL at [`https://github.com/microsoft/semantic-kernel/tree/main/dotnet/src/Connectors/Connectors.Memory.SqlServer`](https://github.com/microsoft/semantic-kernel/tree/main/dotnet/src/Connectors/Connectors.Memory.SqlServer).


    You can learn more about LangChain support for SQL at [`https://python.langchain.com/v0.2/docs/integrations/tools/sql_database`](https://python.langchain.com/v0.2/docs/integrations/tools/sql_database).


    #### What About Chat History?


    Many GenAI applications today are chat experiences using prompts. We have seen
    most of these chat experiences require the need to store the history of the chat
    (with permissions of the user) in addition to feedback from the user about the
    chat experience. Databases seem like a natural fit to store this type of data,
    so Azure SQL could be a good candidate. There are not a lot of standards yet in
    this space, but I expect in the future there will be.


    One example of a schema that could be used for chat history and feedback comes
    from the open source project **ChainLit** (used to build chatbots) at [`https://docs.chainlit.io/data-persistence/custom`](https://docs.chainlit.io/data-persistence/custom).


    #### Where Do You Store Your Text Data?


    All the GenAI examples provide smart searching on text data because that type
    of data is natural fit for language models (even though there are language models
    that support video, audio, images, etc.).


    While SQL can be used in many situations to store text along with attributes of
    the text that are other columns, I’ve seen many customers store text data they
    want to use with GenAI in other storage systems, including file systems, Azure
    Storage, S3, and others. These could be JSON documents, text files, csv files,
    and more prominently PDF documents.


    Therefore, as you look at GenAI, you should consider whether it will make sense
    to store this text data in Azure SQL and classify the text with other attributes
    in columns to prove hybrid searching with AI models.


    One resource to consider helping you extract PDF into text to insert into SQL
    is to use a Python library such as [`https://pypi.org/project/pypdf`](https://pypi.org/project/pypdf).
    PDF files are so common I think this will be a future scenario to focus on.


    #### Resources


    Bookmark the following resources to keep up to date with all the latest we have
    on SQL and AI:


    [`https://aka.ms/sqlai`](https://aka.ms/sqlai) – This is a one-stop hub for all
    topics related to SQL and AI in our documentation.


    [`https://aka.ms/sqlaisamples`](https://aka.ms/sqlaisamples) – This is a GitHub
    repo with code examples.


    [`https://aka.ms/sqlaiworkshop`](https://aka.ms/sqlaiworkshop) – This is a workshop
    my colleague Muazma Zahid, me, and others on our team have built to get an end-to-end
    look at SQL and AI.


    Another good summary of our capabilities can be found in my blog post at [`https://www.microsoft.com/sql-server/blog/2024/06/26/getting-started-with-delivering-generative-ai-capabilities-in-sql-server-and-azure-sql`](https://www.microsoft.com/sql-server/blog/2024/06/26/getting-started-with-delivering-generative-ai-capabilities-in-sql-server-and-azure-sql).
    In this blog post, I also referenced a video I recorded with the famous Microsoft
    Mechanics team which you can see at `https://aka.ms/SQLAIMechanics`.'
