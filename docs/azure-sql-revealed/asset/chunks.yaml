- fmt: '### Geo-Zone-Redundant Storage (GZRS)


    This means that backup files are copied across three Azure Availability Zones
    in the primary region and copied asynchronously to a single physical location
    in a different region (which uses LRS in the secondary region). This option is
    only available for Azure SQL Managed Instance and (even if the instance is not
    zone redundant) for Azure SQL Database Hyperscale (when it is enabled for zone
    redundancy).


    Geo-redundant options offer you the best recovery options because you can restore
    from a backup even if the region for your instance or database is not available.
    ZRS and GZRS are the only options for a Hyperscale database that is zone redundant.
    You cannot change the backup redundancy for Hyperscale after database creation.
    Read more about geo-redundancy for Azure Storage at [`https://learn.microsoft.com/azure/storage/common/storage-redundancy#redundancy-in-a-secondary-region`](https://learn.microsoft.com/azure/storage/common/storage-redundancy#redundancy-in-a-secondary-region).


    Note

    Geo and zone redundant backup storage options can incur more costs. Learn more
    at [`https://learn.microsoft.com/azure/azure-sql/database/automated-backups-overview?view=azuresql&tabs=single-database#backup-storage-costs`](https://learn.microsoft.com/azure/azure-sql/database/automated-backups-overview?view=azuresql&tabs=single-database#backup-storage-costs).


    When you deploy or create a new database, we schedule a full database backup almost
    immediately. We perform integrity checks on your backups using `CHECKSUM` and
    restore techniques. Read the complete story of automated backups for Azure SQL
    at [`https://learn.microsoft.com/en-us/azure/azure-sql/database/automated-backups-overview`](https://learn.microsoft.com/en-us/azure/azure-sql/database/automated-backups-overview).


    ### Backup Retention


    By default, we keep enough backup files to allow you to perform a point-in-time
    restore (PITR) within the last 7 days at any point in time. For Azure SQL Database,
    you can change this retention to 1 day or up to 35 days. This is called **short-term
    backup retention**. You have the same option for any database created for a Managed
    Instance.


    Retention policies affect how far back you can restore from a point in time but
    also how much storage space your backups consume. You can configure the short-term
    retention policy for Azure SQL Database backups through the Azure portal, with
    the az CLI (`az sql db ltr-policy`), or PowerShell (`Set-AzSqlDatabaseBackupShortTermRetentionPolicy`).


    Azure SQL offers a concept called **long-term backup retention (LTR)**. This allows
    you to keep backups for up to **10 years**. All LTR backups that are kept are
    full database backups.


    Backup retention can be configured for databases for Managed Instance using the
    Azure portal as seen in Figure [8-2](#496204_2_En_8_Chapter.xhtml#Fig2) for one
    of the databases I deployed on my Managed Instance.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig2_HTML.jpg)

    Figure 8-2: Configuring backup retention for a Managed Instance database


    The portal only allows configuration on a database level, so for the instance
    you may want to use scripts for automation. Therefore, you can also manage the
    short-term retention policy for Managed Instance backups with the az CLI (`az
    sql midb short-term-retention-policy`) and PowerShell (`Set-AzSqlInstanceDatabaseBackupShortTermRetentionPolicy`).


    Figure [8-3](#496204_2_En_8_Chapter.xhtml#Fig3) shows how to configure backup
    retention for an Azure SQL Database through the logical server in the Azure Portal.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig3_HTML.jpg)

    Figure 8-3: Backup retention for Azure SQL Database


    We have a chart in our documentation that can help you sketch out a schedule for
    LTR at [`https://learn.microsoft.com/azure/azure-sql/database/long-term-retention-overview?view=azuresql#how-long-term-retention-works`](https://learn.microsoft.com/azure/azure-sql/database/long-term-retention-overview?view=azuresql#how-long-term-retention-works).


    ### Automated Backups


    You can also configure LTR for Azure SQL Database using the az CLI (`az sql db
    ltr-policy`) or PowerShell (`Set-AzSqlDatabaseBackupLongTermRetentionPolicy`).


    Note

    If you use geo-replication or failover groups, which I will discuss later in this
    chapter, you can configure LTR for those databases, but LTR backups are not taken
    unless that database becomes a primary.


    ### Backup Storage Consumption and Costs


    As part of your deployment, you get free storage for backups equivalent to the
    maximum size of your database or Managed Instance storage size. This includes
    the space for all full, differential, and log backups. Even though we compress
    all backups, the size you need will depend on the size of your data, how many
    changes you make (affects size of differential and log backups), and your number
    of backup retention days.


    If you exceed the backup storage you get for free with your managed instance maximum
    storage size or maximum Azure SQL Database size, you can incur extra costs for
    backups.


    In most cases, we have found customers that use the default retention period of
    seven days rarely incur extra charges. For Azure SQL, you can track if you are
    using extra space that is being charged on your subscription by using the Azure
    portal and viewing billing information with your subscription. Learn more at [`https://learn.microsoft.com//azure/azure-sql/database/automated-backups-overview?view=azuresql&tabs=single-database#backup-storage-costs`](https://learn.microsoft.com//azure/azure-sql/database/automated-backups-overview?view=azuresql&tabs=single-database#backup-storage-costs).
    If you look at this documentation page, you can see that geo and zone redundant
    backup options can incur more costs.


    For Azure SQL Database, Azure Metrics allow you to track and even get alerts on
    backup storage consumed for full, differential, and log backups. Figure [8-4](#496204_2_En_8_Chapter.xhtml#Fig4)
    shows an example of using Azure Metrics through the portal to see what is available.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig4_HTML.jpg)

    Figure 8-4: Metrics for backup storage consumption for Azure SQL Database


    Some tips to help you on consuming backup storage space:


    *   Reduce the retention period to the shortest possible number of days per your
    requirements.

    *   The larger modifications you make, the larger the space needed for differential
    and log backups. For example, reduce unnecessary index rebuilds to avoid large
    modifications.

    *   It is possible that you can increase your maximum storage size, so you get
    more backup space, but the increase in storage size could cost less than backup
    storage costs.'
