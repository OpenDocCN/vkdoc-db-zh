  raw: 'I can’t believe it has been four years since the first edition of *Azure SQL
    Revealed* was released. I took off writing in 2023, but at the PASS Data Community
    Summit in November 2023, I met Shaul Elson from Apress. He asked me about whether
    I was interested in writing another book. My first instinct was the second edition
    of *Azure SQL Revealed* because I had lived and breathed through four years of
    enhancements and changes. I knew it would be compelling to update it all in a
    new edition of this book.


    The first edition of this book was written during the pandemic all from my home
    in North Richland Hills, Texas, in 2020\. But 2024 was a massive travel year for
    me both professionally and personally, so it was fun to look back in all the places
    where I wrote bits and pieces of this book in planes, cars, trains, hotels, and
    convention centers in Austin, Las Vegas (multiple times), Orlando, Atlanta, Dallas,
    Farnborough (UK), London, Dublin and Cork (Ireland), Ft. Lauderdale, Monterey
    (California), Seattle, Redmond (Microsoft Campus), Washington DC, New York City,
    Belize, Chicago, Denver, and Genesee (Colorado).


    The intention of this edition of the book is the same as the first edition: I
    want SQL professionals from developers to administrators to architects who know
    SQL Server to learn Azure SQL. I always listen to feedback, positive and negative.
    I read quite a bit of feedback from reviews of the first edition. All of them
    were extremely positive with a few constructive comments that I think helped shape
    a few changes in this book.


    Keep in mind these things as you read the chapters of the book:


    *   The first chapter is “pure history.” Every book I’ve written starts with a
    history. Azure SQL has a long history, so this chapter can seem long. If you don’t
    care about that, then skip this chapter and go back to it later.


    *   The second chapter is all fundamentals. If you believe you have a good grasp
    of fundamentals of “what is Azure and Azure SQL?” then go right to the remaining
    chapters. However, I believe it is worth your time to look over. You never know
    what you might find you didn’t know.


    *   I like to include references for my books. I want my readers to have further
    material that reinforce my words. However, this may lead some to grow weary of
    seeing URL links in the book. In this edition, they are still there, but I removed
    several from the first edition that I think did not add value. For readers of
    the electronic version of the book, these links provide an easy “go-to” reference
    to get more information. If you are reading the printed copy, sometimes it may
    seem to “get in the way,” but I believe you will find these reference points helpful
    to extend the knowledge you need.


    *   I went through every chapter of the first edition and completely modified
    it to ensure all the latest details were up to date, including new figures, removing
    features that no longer exist, and adding new capabilities.


    *   There are not as many sample scripts as in my other books. Many of the samples
    are guided exercises using the Azure Portal. I do recommend a free workshop with
    labs I have built you can use at [`https://aka.ms/cloudsqlworkshop`](https://aka.ms/cloudsqlworkshop)
    to extend your hands-on experience.


    With these details in mind, here is my guide on how to best use and read this
    book.


    Chapter [3](#496204_2_En_3_Chapter.xhtml) is a complete end-to-end coverage of
    SQL Server in Azure Virtual Machine which provides a great “lift and shift” approach
    to migrate SQL Server to Azure. The rest of the book focuses on the two PaaS services:
    Azure SQL Managed Instance and Azure SQL Database.


    Chapters [4](#496204_2_En_4_Chapter.xhtml) and [5](#496204_2_En_5_Chapter.xhtml)
    are guides to deploy and configure both Azure SQL Managed Instance and Azure SQL
    Database. Even if you have already been through the deployment experience, I guarantee
    you will find hidden gems in these chapters.


    Chapters [6](#496204_2_En_6_Chapter.xhtml)–[8](#496204_2_En_8_Chapter.xhtml) are
    the core of knowledge of Azure SQL, covering security, performance, and availability.
    These are what I call the “meat and potatoes” of SQL, so I think you will like
    seeing what is both the same and different. I think you will also like the new
    scenarios in these chapters using technologies like managed identities, Copilots,
    and Database Watcher.


    Chapter [9](#496204_2_En_9_Chapter.xhtml) covers a range of topics to extend your
    knowledge not covered anywhere else in the book, like how to schedule jobs, use
    data virtualization, or support your own issues with Azure SQL.


    I completely replaced Chapter [10](#496204_2_En_10_Chapter.xhtml) from the first
    edition and included topics related to what I call *Beyond RDBMS*, including Generative
    AI applications and integration with Microsoft Fabric.


    If you want any sample scripts from the book, see any errata found after publishing,
    or keep up with any important updates, bookmark the link [`https://aka.ms/azuresqlbook2`](https://aka.ms/azuresqlbook2).


    My personal philosophy is to “empower others to make a difference,” so that is
    my ultimate goal for the readers of this book: I want to empower you with the
    knowledge to learn Azure SQL, so you can be successful in the cloud. Welcome to
    the world’s database: Azure SQL.


