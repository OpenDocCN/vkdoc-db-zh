    ### 故障转移原因


    对于 Azure SQL 托管实例和数据库，发生故障转移的原因多种多样，包括计划内和计划外的。由于故障转移的原因可能各不相同，跟踪数据库是否发生故障转移的最佳方法是使用托管实例或数据库的
    `资源运行状况`。图 8-38 展示了我的一个 Azure SQL 数据库部署的 `资源运行状况` 示例以及一个导致故障转移的运行状况事件。


    ![](img/496204_2_En_8_Fig38_HTML.jpg)

    图 8-38

    Azure SQL 数据库的 `资源运行状况`


    `不可用` 事件与我手动执行数据库故障转移的时间点吻合。请注意它标明这是一个 `计划外` 事件。我如何知道这是由手动故障转移引起的呢？我查看了此数据库的 `活动日志`，并找到了如图
    8-39 所示的详细信息。


    ![](img/496204_2_En_8_Fig39_HTML.jpg)

    图 8-39

    使用 `活动日志` 跟踪手动故障转移


    注意

    对于 Azure SQL 托管实例和数据库部署，`资源运行状况` 都是在数据库级别报告的。


    ### 小结


    在本章中，你了解了 Azure SQL 惊人的内置可用性功能，包括自动备份、时间点还原，以及 `常规用途`、`业务关键` 和 `超大规模` 的内置可用性架构。


    你还学习了如何利用 Azure 的功能通过区域冗余、异地复制和故障转移组实现进一步的冗余。你了解了 Azure 如何提供内置的数据完整性和流程，以及如何监控
    Azure SQL 部署的可用性。


    你可以使用一些额外的实验（这些是免费的——你只需要一个 Azure 订阅）来了解更多关于 Azure SQL 可用性的信息，网址为：

    [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/06_Manage_and_Optimize_AzureSQLMI`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/06_Manage_and_Optimize_AzureSQLMI)

    [`https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB`](https://github.com/microsoft/cloudsqlworkshop/tree/main/cloudsqlworkshop/07_Deploy_Manage_Optimize_AzureSQLDB)


    可用性是 Azure SQL 核心内容的最后一部分。在下一章中，你将扩展对 Azure SQL 的了解，学习与安全性、性能或可用性无直接关系的功能。


    # 9. 扩展 Azure SQL 知识


    你已经经历了部署和配置 Azure SQL 托管实例和数据库的旅程。然后，你了解了所有用于保护部署、使 Azure SQL 快速运行并保持高速，以及确保数据高可用性的功能和任务。在本章中，我们将通过更仔细地研究与
    SQL Server 的功能对比、理解作业管理的选项、了解可用于支持部署的方法以及回顾使用 Azure SQL 的最佳实践，来扩展你对 Azure SQL
    的知识。


    本章将包含供你边读边尝试和使用的示例。要尝试本章中使用的任何技术、命令或示例，你将需要：

    *   一个 Azure 订阅。

    *   对 Azure 订阅至少具有 `参与者` 角色访问权限。你可以在 [`https://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles`](https://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles)
    阅读更多关于 Azure 内置角色的信息。

    *   访问 Azure 门户。

    *   我将使用本书前面部署的几个 Azure SQL 数据库和一个托管实例。

    *   要连接到托管实例，你需要 Azure 中的一个 `跳板机` 或虚拟机。我在本书的第 4 章向你展示了如何操作。一个简单的方法是创建一个新的 Azure
    虚拟机，并将其部署到与托管实例相同的虚拟网络中（你将使用与托管实例不同的子网）。

    *   要连接到 Azure SQL 数据库，我将使用我在第 3 章部署的 Azure VM，称为 `bwsql2022`，并在第 6 章配置了专用端点（只要能连接到
    Azure SQL 数据库，你也可以使用其他方法）。

    *   你将在本章中运行一些 T-SQL，因此请安装一个工具，如 SQL Server Management Studio (`SSMS`)，下载地址：[`https://aka.ms/ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms?view=sql-server-ver15)。


    ## Azure SQL 的功能范围


    在整本书中，我比较了 SQL Server 与 Azure SQL 托管实例和数据库的功能。让我们回顾几个我经常被问到的、与安全性、性能和可用性无直接关系的功能。


    在阅读本节时，请参考以下文档：

    *   托管实例与 SQL Server 的 T-SQL 差异：[`https://aka.ms/azuresqlmitsqldiff`](https://aka.ms/azuresqlmitsqldiff)。

    *   Azure SQL 数据库与 SQL Server 的 T-SQL 差异：[`https://aka.ms/azuresqldbtsqldiff`](https://aka.ms/azuresqldbtsqldiff)。

    *   Azure SQL 托管实例与 Azure SQL 数据库的功能对比：[`https://aka.ms/azuresqlfeatures`](https://aka.ms/azuresqlfeatures)。


    ### 链接服务器和跨数据库查询


    SQL Server 用户可以对位于同一 SQL Server 实例的其他数据库（跨数据库查询）或另一个实例（链接服务器查询）中的对象执行查询（并进行联接）。SQL
    Server 的链接服务器还允许查询其他数据提供程序（通过 OLE-DB），例如 Oracle。跨数据库查询和链接服务器允许读取查询（`SELECT`），也（如果提供程序支持的话）允许分布式事务。


    Azure SQL 托管实例支持 **`跨数据库查询`**，但 Azure SQL 数据库不支持。


    注意

    Azure SQL 数据库支持弹性数据库查询（预览版）的概念，该功能可以跨数据库联接数据。了解更多信息请访问 [`https://learn.microsoft.com/azure/azure-sql/database/elastic-query-getting-started-vertical`](https://learn.microsoft.com/azure/azure-sql/database/elastic-query-getting-started-vertical)。


    Azure SQL 托管实例支持 **`链接服务器`**，但 Azure SQL 数据库不支持。不过，Azure SQL 托管实例使用 `链接服务器` 有一些限制。例如，仅支持基于
    SQL Server 的提供程序。有关托管实例上 `链接服务器` 的完整差异列表，请参阅 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#linked-servers`](https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#linked-servers)。托管实例的
    `链接服务器` 支持 Microsoft Entra 身份验证。


    注意

    你可以从本地 SQL Server、Azure 虚拟机或托管实例创建 `链接服务器`，其中*远程服务器*是 Azure 数据库逻辑服务器。

