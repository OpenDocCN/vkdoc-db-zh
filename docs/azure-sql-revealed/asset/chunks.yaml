  trans: '

    ### 服务层级 (SLO)


    如果你的部署选项是 Azure SQL 托管实例，那么你需要选择一个*服务层级*（我们也称之为服务级别目标或 SLO），即 `通用型 (GP)` 或 `业务关键型
    (BC)`。我在本书的第 2 章中描述了这些服务层级选项。虽然资源限制和性能可能有所不同，但这些层级的一个主要区别在于其可用性工作方式，你将在本书的第 8
    章中了解更多相关内容。`业务关键型`的一个显著区别是它支持内存中 OLTP 功能。还记得在第 2 章中，我谈到了托管实例 `GP` 的“下一代”版本。请务必查看该选项，因为它提供了更多选项和更强大的存储性能。托管实例
    `GP` 和 `BC` 的比较可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits)
    找到。


    **提示**


    你将在本章后面看到，部署一个托管实例通常需要时间。在 `GP` 和 `BC` 之间进行更改是可能的，但可能会导致显著的停机时间。你可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview)
    了解更多关于具体时间的信息。托管实例确实支持一个称为快速预配的概念，适用于某些配置下的 `GP` 服务层级。你甚至可以在 30 分钟内完成预配。在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview?view=azuresql#fast-provisioning`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview?view=azuresql#fast-provisioning)
    了解更多。


    如果你的部署选项是 Azure SQL 数据库，那么你同样可以选择 `通用型 (GP)` 与 `业务关键型 (BC)` 服务层级。此外，你还有 `超大规模`
    的选择。如果你选择 `通用型` 或 `超大规模`，你还可以选择 `预配型` 与 `无服务器型`。这也被称为*计算模型* *或层级*。我在本书的第 2 章中介绍了所有这些选项，但在本章中我也会涵盖这个主题。


    **Azure SQL 数据库超大规模**我相信将成为你的数据库的 `默认` 选择。我在本书的第 1 章中谈到了 `超大规模`（Project Socrates）的历史。如果你读过本书的第一版，你可能会留下这样的印象：`超大规模`
    仅适用于最大的数据库部署。而这是我们造成的印象，不是你的问题。自 2020 年以来，`超大规模` 发生了一些变化：


    *   `超大规模` 现在支持 `无服务器`。

    *   `超大规模` 现在支持弹性池。

    *   2023 年底，`超大规模` 的价格 `显著降低`。在 [`https://azure.microsoft.com/updates/general-availability-lower-simplified-pricing-for-azure-sql-database-hyperscale-expected-in-december-2023`](https://azure.microsoft.com/updates/general-availability-lower-simplified-pricing-for-azure-sql-database-hyperscale-expected-in-december-2023)
    了解更多关于此的信息。


    关于 `超大规模` 的一个关键点是，其存储是自动扩展的！你无需指定需要多少数据库空间。我们会根据你的需求自动增长。


    **我相信超大规模现在成为任何人的起点**，只需让计算（`无服务器`）和存储的自动扩展随着应用程序需求的增长或变化而灵活调整。在 [`https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale`](https://learn.microsoft.com/azure/azure-sql/database/service-tier-hyperscale)
    阅读关于 `超大规模` 的所有细节。


    说到 `无服务器`（我在本书的第 1 章中谈过），这是我们为自动扩展以及你的数据库可能并不总是被充分利用的场景创建的一个独特选项。它提供了一种部署和使用 Azure
    SQL 数据库的新的、经济高效的方式。在 [`https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview`](https://learn.microsoft.com/azure/azure-sql/database/serverless-tier-overview)
    阅读更多关于 `无服务器` 的信息。


    对于 Azure SQL 数据库，在 `GP` 和 `BC` 之间切换通常比托管实例快得多。你也可以轻松地在 `无服务器` 和 `预配型` 之间切换。对于
    `超大规模`，你可以切换回 `GP` 服务层级。在 [`https://learn.microsoft.com/azure/azure-sql/database/manage-hyperscale-database`](https://learn.microsoft.com/azure/azure-sql/database/manage-hyperscale-database)
    了解更多。


    ### 硬件


    尽管对于 Azure SQL，我们为你抽象了部署所使用的基础设施和虚拟化，但我们提供了*硬件代系*的选项。


    对于 Azure SQL 托管实例，你有三种选择：


    *   标准系列称为 `Gen5`（它曾是 `Gen4`，因为我们持续改进我们的硬件代系）。它在 vCore 数量和每个 vCore 的内存方面有很好的选择。

    *   `高级系列` 使用了新一代的处理器，并提供更多的 vCore 和更高的每个 vCore 内存。

    *   `内存优化高级系列` 类似于 `高级系列`，但提供了更高的每个 vCore 内存。`通用型` 的这个选项不支持像 `高级系列` 那么多的 vCore。


    在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#hardware-configuration-characteristics`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#hardware-configuration-characteristics)
    保持关注所有细节。


    对于 Azure SQL 数据库，你有以下选择：


    *   标准系列也称为 `Gen5`（它曾是 `Gen4`，因为我们持续改进我们的硬件代系）。它在 vCore 数量和每个 vCore 的内存方面有很好的选择。

    *   `Fsv2 系列` 具有最快的 CPU 速度，但你无法像 `Gen5` 那样预配同样多的 vCore。此选择仅适用于 `通用型` 服务层级。

    *   `DC 系列` 仅支持 8 个 vCore，但对于安全性至关重要，因为它支持用于 Always Encrypted 安全飞地的 Intel 软件防护扩展
    (Intel SGX)。

    *   `超大规模` 支持 `高级` 和 `高级内存优化` 选择，以获得更多的 vCore 和更高的内存与 vCore 比率。


    在 [`https://learn.microsoft.com/azure/azure-sql/database/service-tiers-sql-database-vcore?view=azuresql&tabs=azure-portal#hardware-configuration`](https://learn.microsoft.com/azure/azure-sql/database/service-tiers-sql-database-vcore?view=azuresql&tabs=azure-portal#hardware-configuration)
    保持关注这些选择的所有细节。


    ### vCore 和存储大小


    一旦你确定了这些选项，你就可以选择存储大小。Azure SQL 数据库的 DTU 模式有一个你可以选择的 DTU 数量（以及数据大小）。对于 vCore 购买模型，你需要选择
    vCore 数量和数据库存储最大大小（记住 `超大规模` 不需要此选项）。根据你的其他选择，这些选项的工作方式有一些不同。在本章剩余部分带你完成部署过程时，我将描述这些差异。

    '
- fmt: '#### Price


    Just like with Azure Virtual Machine, take advantage of the Azure Pricing Calculator
    to plug in some of these choices to get an idea of your costs. This includes using
    `Azure Hybrid Benefit`. You can find the pricing calculator for Azure SQL Managed
    Instance at [`https://azure.microsoft.com/pricing/details/azure-sql/sql-managed-instance/single/`](https://azure.microsoft.com/pricing/details/azure-sql/sql-managed-instance/single/)
    and Azure SQL Database at [`https://azure.microsoft.com/pricing/calculator/?service=sql-database`](https://azure.microsoft.com/pricing/calculator/?service=sql-database).


    > **Tip**

    >

    > To make sure to find Azure SQL Database and Managed Instance, search for Azure
    SQL Database. From there, you can change type for Managed Instance.


    Figure [4-3](#496204_2_En_4_Chapter.xhtml#Fig3) shows an example of the pricing
    calculator for Azure SQL Database.


    ![images/496204_2_En_4_Chapter/496204_2_En_4_Fig3_HTML.jpg](images/496204_2_En_4_Chapter/496204_2_En_4_Fig3_HTML.jpg)

    **Figure 4-3**

    The pricing calculator for Azure SQL Database


    ### Consider Resource Limits


    Your choices from deployment options, service tier, and sizes can affect your
    resource limits. These are the following resource limits to consider as you make
    these choices. I call these out because these may not be obvious as you deploy
    through the `Azure Portal`:


    *   Max memory

    *   Max log size

    *   Log rate governance

    *   IOPS and I/O latency

    *   Max size of `tempdb`

    *   Max concurrent workers

    *   Backup retention


    I will discuss more about log rate governance and IOPS and I/O latency in Chapter
    [7](#496204_2_En_7_Chapter.xhtml) of this book. For now, keep these concepts in
    mind as they can affect the performance of applications such as those that are
    heavy transaction log workloads.


    To see the specific limits for Azure SQL Managed Instance, please see these well-documented
    tables at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits).
    To see the specific limits for Azure SQL Database, please see the table at [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-vcore-single-databases`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-vcore-single-databases).


    You should also know that there are overall Azure SQL limits per subscription
    per region. You can view what these limits are at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits)
    and [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server).


    It is possible to make a request to Microsoft to increase your subscription limits.
    This is called a *quota increase request*. Read more at [`https://learn.microsoft.com/azure/azure-sql/database/quota-increase-request`](https://learn.microsoft.com/azure/azure-sql/database/quota-increase-request).


    ## Deploying Azure SQL Managed Instance


    Similar to the process I documented in Chapter [3](#496204_2_En_3_Chapter.xhtml)
    for a virtual machine, deploying an Azure SQL Managed Instance through the `Azure
    Portal` starts by using the Azure SQL option from the Azure Marketplace (I showed
    you this view in Figure 3-1).


    Using the three Azure SQL choices, you would select SQL Managed Instance and single
    instance, then click **Create**.


    ### Walking Through a Deployment


    Let us walk through each screen with deployment options of a Managed Instance
    and then deploy it through the `Azure Portal`. I’m going to use the new `NextGen
    General Purpose` service tier as an example to walk through the deployment experience.
    You will see a familiar but slightly different experience as you saw in Chapter
    [3](#496204_2_En_3_Chapter.xhtml) for SQL Server on Azure Virtual Machine.


    As I mentioned earlier in the chapter about pre-deployment planning, I highly
    recommend you take the time to review all the options I’m going to show you. This
    is because some of the choices you will make can only be made at deployment and
    cannot be modified (which would require you to migrate afterward). In addition,
    some choices can be modified (like service tier) but may require some downtime.'
