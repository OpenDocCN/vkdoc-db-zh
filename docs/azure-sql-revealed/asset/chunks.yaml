- fmt: '### Handling Errors


    大多数在 Azure SQL 托管实例和数据库中可能遇到的错误与 SQL Server 是常见的。我们的文档提供了完整的引擎错误列表，位于 [`https://learn.microsoft.com/sql/relational-databases/errors-events/database-engine-events-and-errors`](https://learn.microsoft.com/sql/relational-databases/errors-events/database-engine-events-and-errors)。


    对于 Azure SQL，你可能会遇到一些新的错误，它们通常围绕着连接性、资源治理和支持。你可以在我们的文档中找到其中一些场景的列表： [`https://learn.microsoft.com/azure/azure-sql/database/troubleshoot-common-errors-issues`](https://learn.microsoft.com/azure/azure-sql/database/troubleshoot-common-errors-issues)。


    例如，在本书的第 [8](#496204_2_En_8_Chapter.xhtml) 章中，你看到了一个场景：一个应用程序在故障转移期间无法连接，并遇到了一个需要重试连接的错误（使用
    `ostress.exe`）。


    ```

    [SQL Server]Database '''' on server '''' is not currently available.  Please retry
    the connection later.  If the problem persists, contact customer support, and
    provide them the session tracing ID of ''{CC39135B-D638-4A51-BB25-EABB8A5315A0}''.

    ```


    这是 `Msg 40613`，是一个连接性错误的例子，因为一个有效的逻辑服务器不可用，但你的网络连接是正常的。这个错误实际意味着你可以连接到我们的网关，但我们需要重定向你去的资源（你的逻辑服务器或实例）不可用。


    假设问题是你的应用程序发生了网络错误。你可能会得到一个更传统的 SQL Server 错误，例如：


    ```

    10053: A transport-level error has occurred when receiving results from the server.
    (Provider: TCP Provider, error: 0 - An established connection was aborted by the
    software in your host machine)

    ```


    一个由于防火墙规则配置不正确而导致连接失败，Azure SQL 特有的错误是：


    ```

    Error 40615:

    Cannot open server ''%.*ls'' requested by the login. Client with IP address ''%.*ls''
    is not allowed to access the server.  To enable access, use the Windows Azure
    Management Portal or run sp_set_firewall_rule on the master database to create
    a firewall rule for this IP address or address range.  It may take up to five
    minutes for this change to take effect.

    ```


    幸运的是，这里很好地说明了问题的原因（未为此客户端设置防火墙规则）。


    资源治理类错误的一个例子是超过了部署选项指定的资源限制。例如，对于 Azure SQL 数据库，如果超过了最大工作线程数，你可能会得到如下错误：


    ```

    Msg 10928

    The request limit for the database is  and has been reached.

    ```


    你可能遇到的限制可能是存储。以下是当你超过了托管实例的最大存储限制时的错误示例：


    ```

    Msg 1133

    The managed instance has reached its storage limit. The storage usage for the
    managed instance cannot exceed (%d) MBs.

    ```


    最后，你可能因为尝试使用不支持的功能或 T-SQL 语句而遇到错误。例如，如果你试图在托管实例中使用 `sp_configure` 更改“最大服务器内存”选项，你会得到如下错误：


    ```

    Msg 5870

    Changes to server configuration option max server memory (MB) are not supported
    in SQL Database Managed Instances

    ```


    错误可能不会那么明显地指出问题。如果你在连接到 Azure SQL 数据库时尝试执行 `sp_configure`，你会得到类似以下的错误，指出此系统存储过程不支持
    Azure SQL 数据库。


    ```

    Msg 2812, Level 16, State 62, Line 1

    Could not find stored procedure ''sp_configure''.

    ```


    在某些情况下，你会因为部署选项的限制而无法访问某个功能。例如，内存中 OLTP 仅在业务关键型服务层级中可用。因此，如果你尝试在通用目的服务层级中创建内存优化表，会遇到以下错误：


    ```

    Msg 40536, Level 16, State 2, Line 1

    ''MEMORY_OPTIMIZED tables'' is not supported in this service tier of the database.
    See Books Online for more details on feature support in different service tiers
    of Windows Azure SQL Database.

    ```


    ### Stack Dumps


    在某些情况下，SQL Server 引擎会遇到致命错误（例如 `ACCESS_VIOLATION`），导致应用程序连接终止，并在服务器上创建一个堆栈转储。如果这类问题持续存在，SQL
    Server 用户习惯与 Microsoft 技术支持合作检查这些转储文件以确定问题原因。以下是一篇描述此类问题示例的 Microsoft 文章： [`https://support.microsoft.com/help/4519796/fix-stack-dump-occurs-when-table-type-has-a-user-defined-constraint-in`](https://support.microsoft.com/help/4519796/fix-stack-dump-occurs-when-table-type-has-a-user-defined-constraint-in)。


    对于 Azure SQL，你无法访问底层文件系统来查看这些文件。好消息是，这无关紧要。堆栈转储是 Azure SQL 会自动处理的情况。你的应用程序可能会遇到这类问题，但我们的后端系统有警报来自动监控这类问题。我们的工程师会收到通知并立即启动调查。如果问题严重到需要重启
    SQL Server，我们可能会启动故障转移。这种监控的好处之一是，我们可能会识别出影响多个用户的此类问题的模式，并在下一个“火车”上启动代码修复——这是无版本
    SQL Server 的又一个好处示例。'
  raw: '### Handling Errors


    Most errors that you can encounter with Azure SQL Managed Instance and Database
    will be common with SQL Server. Our documentation has a complete list of engine
    errors at [`https://learn.microsoft.com/sql/relational-databases/errors-events/database-engine-events-and-errors`](https://learn.microsoft.com/sql/relational-databases/errors-events/database-engine-events-and-errors).


    For Azure SQL, you may encounter some new errors, and they usually center around
    *connectivity*, *resource governance*, and *support*. You can find a list of some
    of these scenarios in our documentation at [`https://learn.microsoft.com/azure/azure-sql/database/troubleshoot-common-errors-issues`](https://learn.microsoft.com/azure/azure-sql/database/troubleshoot-common-errors-issues).


    For example, in Chapter [8](#496204_2_En_8_Chapter.xhtml) of the book, you saw
    a scenario when an application could not connect during a failover and encountered
    an error to retry a connection (using ostress.exe).


    ```

    [SQL Server]Database '''' on server '''' is not currently available.  Please retry
    the connection later.  If the problem persists, contact customer support, and
    provide them the session tracing ID of ''{CC39135B-D638-4A51-BB25-EABB8A5315A0}''.

    ```


    This is **Msg 40613** and is an example of a connectivity error because a *valid*
    logical server is not available, but *your network connectivity is fine*. What
    this error effectively means is that your connectivity is fine to our gateways,
    but the resource we need to redirect you to (your logical server or instance)
    is not available.


    Let’s say the problem is that a network error has occurred for your application.
    You would get a more traditional SQL Server error like


    ```

    10053: A transport-level error has occurred when receiving results from the server.
    (Provider: TCP Provider, error: 0 - An established connection was aborted by the
    software in your host machine)

    ```


    One unique error to Azure SQL due to a failed connection from not having a firewall
    rule configured correctly is


    ```

    Error 40615:

    Cannot open server ''%.*ls'' requested by the login. Client with IP address ''%.*ls''
    is not allowed to access the server.  To enable access, use the Windows Azure
    Management Portal or run sp_set_firewall_rule on the master database to create
    a firewall rule for this IP address or address range.  It may take up to five
    minutes for this change to take effect.

    ```


    Fortunately, there is good context here on the cause of the problem (lack of firewall
    rule setup for this client).


    An example of a resource governance type of error is exceeding a resource limit
    as specified by your deployment option. For example, for Azure SQL Database if
    you exceeded the maximum number of workers, you might get an error like this:


    ```

    Msg 10928

    The request limit for the database is  and has been reached.

    ```


    The limit you may encounter could be storage. The following is an example of an
    error when you have exceeded the maximum storage limit for a Managed Instance:


    ```

    Msg 1133

    The managed instance has reached its storage limit. The storage usage for the
    managed instance cannot exceed (%d) MBs.

    ```


    Finally, you may encounter an error because you are trying to use a feature or
    a T-SQL statement that is not supported. For example, if you tried to change the
    “max server memory” option with sp_configure in Managed Instance, you would get
    an error like this:


    ```

    Msg 5870

    Changes to server configuration option max server memory (MB) are not supported
    in SQL Database Managed Instances

    ```


    An error may not be so obvious as to the problem. If you tried to execute sp_configure
    when connected to Azure SQL Database, you would get an error like the following,
    indicating this system procedure is not supported for Azure SQL Database.


    ```

    Msg 2812, Level 16, State 62, Line 1

    Could not find stored procedure ''sp_configure''.

    ```


    In some cases, you will encounter an error because you don’t have access to a
    feature due to your deployment option. For example, In-Memory OLTP is only available
    in Business Critical service tiers. Therefore, if you try to create a memory-optimized
    table in a General Purpose service tier, you will encounter the following error:


    ```

    Msg 40536, Level 16, State 2, Line 1

    ''MEMORY_OPTIMIZED tables'' is not supported in this service tier of the database.
    See Books Online for more details on feature support in different service tiers
    of Windows Azure SQL Database.

    ```


    ### Stack Dumps


    In some cases, the SQL Server engine encounters a fatal error (e.g., ACCESS_VIOLATION)
    that results in a termination of the connection of the application and the creation
    of a *stack dump* on the server. If this type of problem is persistent, users
    of SQL Server are used to working with Microsoft technical support to examine
    these dump files to determine the cause of the problem. The following is a Microsoft
    article that describes an example of this type of problem: [`https://support.microsoft.com/help/4519796/fix-stack-dump-occurs-when-table-type-has-a-user-defined-constraint-in`](https://support.microsoft.com/help/4519796/fix-stack-dump-occurs-when-table-type-has-a-user-defined-constraint-in).


    For Azure SQL, you don’t have access to the underlying file system to look at
    these files. The good news is that it doesn’t matter. Stack dumps are conditions
    that Azure SQL automatically handles. It is possible your application may encounter
    one of these types of problems, but our back-end systems have alerts to monitor
    these types of issues automatically. Our engineers get notified and an immediate
    investigation is initiated. If the problem is severe enough to require SQL Server
    to be restarted, we may initiate a failover. One of the benefits to this type
    of monitoring is that we may recognize a pattern to a problem like this that affects
    multiple users and initiate a code fix on the next *train* – another example of
    the benefits of a versionless SQL Server.'
  trans: '### 处理错误


    大多数在 Azure SQL 托管实例和数据库中可能遇到的错误与 SQL Server 是共通的。我们的文档提供了完整的引擎错误列表，位于 [`https://learn.microsoft.com/sql/relational-databases/errors-events/database-engine-events-and-errors`](https://learn.microsoft.com/sql/relational-databases/errors-events/database-engine-events-and-errors)。


    对于 Azure SQL，你可能会遇到一些新的错误，它们通常围绕着连接性、资源治理和支持。你可以在我们的文档中找到其中一些场景的列表： [`https://learn.microsoft.com/azure/azure-sql/database/troubleshoot-common-errors-issues`](https://learn.microsoft.com/azure/azure-sql/database/troubleshoot-common-errors-issues)。


    例如，在本书的第 8 章中，你看到了一个场景：一个应用程序在故障转移期间无法连接，并遇到了一个需要重试连接的错误（使用 `ostress.exe`）。


    ```

    [SQL Server]Database '''' on server '''' is not currently available.  Please retry
    the connection later.  If the problem persists, contact customer support, and
    provide them the session tracing ID of ''{CC39135B-D638-4A51-BB25-EABB8A5315A0}''.

    ```


    这是 `Msg 40613`，是一个连接性错误的例子，因为一个有效的逻辑服务器不可用，但你的网络连接是正常的。这个错误实际意味着你可以连接到我们的网关，但我们需要重定向你去的资源（你的逻辑服务器或实例）不可用。


    假设问题是你的应用程序发生了网络错误。你可能会得到一个更传统的 SQL Server 错误，例如：


    ```

    10053: A transport-level error has occurred when receiving results from the server.
    (Provider: TCP Provider, error: 0 - An established connection was aborted by the
    software in your host machine)

    ```


    一个由于防火墙规则配置不正确而导致连接失败、Azure SQL 特有的错误是：


    ```

    Error 40615:

    Cannot open server ''%.*ls'' requested by the login. Client with IP address ''%.*ls''
    is not allowed to access the server.  To enable access, use the Windows Azure
    Management Portal or run sp_set_firewall_rule on the master database to create
    a firewall rule for this IP address or address range.  It may take up to five
    minutes for this change to take effect.

    ```


    幸运的是，这里很好地说明了问题的原因（未为此客户端设置防火墙规则）。


    资源治理类错误的一个例子是超过了部署选项指定的资源限制。例如，对于 Azure SQL 数据库，如果超过了最大工作线程数，你可能会得到如下错误：


    ```

    Msg 10928

    The request limit for the database is  and has been reached.

    ```


    你可能遇到的限制可能是存储。以下是当你超过了托管实例的最大存储限制时的错误示例：


    ```

    Msg 1133

    The managed instance has reached its storage limit. The storage usage for the
    managed instance cannot exceed (%d) MBs.

    ```


    最后，你可能因为尝试使用不支持的功能或 T-SQL 语句而遇到错误。例如，如果你试图在托管实例中使用 `sp_configure` 更改“最大服务器内存”选项，你会得到如下错误：


    ```

    Msg 5870

    Changes to server configuration option max server memory (MB) are not supported
    in SQL Database Managed Instances

    ```


    错误可能不会那么明显地指出问题。如果你在连接到 Azure SQL 数据库时尝试执行 `sp_configure`，你会得到类似以下的错误，指出此系统存储过程不支持
    Azure SQL 数据库。


    ```

    Msg 2812, Level 16, State 62, Line 1

    Could not find stored procedure ''sp_configure''.

    ```


    在某些情况下，你会因为部署选项的限制而无法访问某个功能。例如，内存中 OLTP 仅在业务关键型服务层级中可用。因此，如果你尝试在通用目的服务层级中创建内存优化表，会遇到以下错误：


    ```

    Msg 40536, Level 16, State 2, Line 1

    ''MEMORY_OPTIMIZED tables'' is not supported in this service tier of the database.
    See Books Online for more details on feature support in different service tiers
    of Windows Azure SQL Database.

    ```


    ### 堆栈转储


    在某些情况下，SQL Server 引擎会遇到致命错误（例如 `ACCESS_VIOLATION`），导致应用程序连接终止，并在服务器上创建一个堆栈转储。如果这类问题持续存在，SQL
    Server 用户习惯与 Microsoft 技术支持合作检查这些转储文件以确定问题原因。以下是一篇描述此类问题示例的 Microsoft 文章： [`https://support.microsoft.com/help/4519796/fix-stack-dump-occurs-when-table-type-has-a-user-defined-constraint-in`](https://support.microsoft.com/help/4519796/fix-stack-dump-occurs-when-table-type-has-a-user-defined-constraint-in)。


    对于 Azure SQL，你无法访问底层文件系统来查看这些文件。好消息是，这无关紧要。堆栈转储是 Azure SQL 会自动处理的情况。你的应用程序可能会遇到这类问题，但我们的后端系统有警报来自动监控这类问题。我们的工程师会收到通知并立即启动调查。如果问题严重到需要重启
    SQL Server，我们可能会启动故障转移。这种监控的好处之一是，我们可能会识别出影响多个用户的此类问题的模式，并在下一个“火车”上启动代码修复——这是无版本
    SQL Server 的又一个好处示例。'
- fmt: '### Troubleshooting Resources in the Azure Portal


    My former colleagues worked with our engineering team to build in tools to assist
    you in troubleshooting your own problems in the Azure portal.


    I mentioned using the `Resource Health` option in the Service Menu to look for
    possible failovers that affected availability. Figure [9-5](#496204_2_En_9_Chapter.xhtml#Fig5)
    shows this screen for my Azure SQL Database with a reference to select a `Troubleshooting
    tool` (you can also access the Troubleshooting Tool from the `Support+Troubleshooting`
    option on the Services menu).


    ![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig5_HTML.jpg)


    **Figure 9-5** Accessing the troubleshooting tool from Resource Health


    If you select `Troubleshooting tool`, you will see a set of common problems based
    on the top issues Microsoft support sees from customer support requests like Figure
    [9-6](#496204_2_En_9_Chapter.xhtml#Fig6).


    ![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig6_HTML.jpg)


    **Figure 9-6** Diagnosing and solving common problems for Azure SQL


    I can either search for a common type of problem or choose a category and use
    a specific set of screens to troubleshoot an issue. Let’s say I can’t connect
    to my Azure SQL Database and am getting an error `Msg 40613` I mentioned earlier
    in this section of the chapter.


    I can select the Troubleshoot link from `Connectivity: Troubleshoot DB Availability
    and Connection Error`. I can choose my problem is `Msg 40613` as a problem and
    scrolling down I can see more details to help me troubleshoot my specific problem
    like in Figure [9-7](#496204_2_En_9_Chapter.xhtml#Fig7).


    ![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig7_HTML.jpg)


    **Figure 9-7** Troubleshooting connectivity error 40613


    I can select a time frame for the problem and run diagnostics. The diagnostics
    may use built-in telemetry in Azure to help determine the cause. If this doesn’t
    help me, I can scroll down like in Figure [9-8](#496204_2_En_9_Chapter.xhtml#Fig8).


    ![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig8_HTML.jpg)


    **Figure 9-8** More information to troubleshoot error 40613


    This includes common solutions, web search results, and the ability to search
    community forums or even create new support requests. One huge advantage of using
    this method for a support request is the support engineers at Microsoft have the
    context of everything you have selected here regarding the problem, your database
    context, and diagnostic that have been run saving you time and effort.


    Microsoft has various support plans to help you with your Azure deployments. All
    Azure customers for no charge get a fundamental set of support options. However,
    there are also options to pay for support to increase your level of availability
    for Microsoft Support to handle business-critical issues 24/7. Learn about all
    the Azure support plans at `https://azure.microsoft.com/support/plans/`.


    What about `Copilot`? I mentioned this as a new tool to help you manage and configure
    your Azure SQL Database. Let’s say I can’t log in to Azure SQL Database, and I
    get `error 40615`, which indicates a firewall problem. Let’s say I don’t know
    the details of that message, and I find out that someone complains they cannot
    log in. I can use `Copilot` for a prompt like in Figure [9-9](#496204_2_En_9_Chapter.xhtml#Fig9)
    to help.


    ![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig9_HTML.jpg)


    **Figure 9-9** Copilot helps with a login failure to Azure SQL Database


    I like the context here. I know the time frame, the server, and the database,
    and I know it is a firewall issue. And I’m given prompts to help resolve the problem.


    If I select “Can you help me add an IP to the firewall rules,” I get specific
    instructions on how to do this as you see in Figure [9-10](#496204_2_En_9_Chapter.xhtml#Fig10).


    ![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig10_HTML.jpg)


    **Figure 9-10** Copilot solution to add a firewall rule


    I still must find out what client is having the problem and set up the rule. If
    I had `SQL Auditing` turned on, I could easily get that information.


    ### UserVoice


    You may be using Azure SQL and have a suggestion, not necessarily a problem that
    needs support. Microsoft provides a forum for your feedback for Azure SQL through
    a concept called `Azure Ideas`. You can access feedback for Azure SQL and SQL
    Server at `https://aka.ms/sqlfeedback`.


    I can assure you that as an engineering team, we do look at these requests and
    how customers vote on them, so find something you are passionate about and get
    others to vote for your idea.


    ## Azure SQL Best Practices


    To wrap up this chapter, let’s take a look at resources that can help you with
    best practices for your Azure SQL deployment.


    ### Security Playbook


    About a year ago, Jakub Szymaszek, a Principal Program Manager on our team who
    specializes in security (and one of the nicest people you will ever meet), approached
    me about an idea the team was working on. He said “Bob, you have worked with SQL
    Server for many years. Can you take a look at a `security playbook` we are working
    on?” I gave him some feedback and looked forward to how the project would progress.


    The result of this effort has been infused into our documentation at `https://learn.microsoft.com/azure/azure-sql/database/security-best-practice`.
    This document covers the collective knowledge of our team for best practices for
    you to secure Azure SQL. This includes authentication, access management, data
    protection, network security, monitoring and auditing, common security threads,
    and security aspects for availability. This is your “de facto” guide to read and
    learn as you deploy and secure your Azure SQL deployments. You will find many
    of the concepts you learned in Chapter [6](#496204_2_En_6_Chapter.xhtml) of the
    book line up with these best practices.


    ### Best Practices for Performance


    In Chapter [7](#496204_2_En_7_Chapter.xhtml) of the book, you saw a comprehensive
    look at performance for Azure SQL. There are some best practices to follow as
    you saw in that chapter. We also have a very nice summary of performance best
    practices for you to read at `https://learn.microsoft.com/azure/azure-sql/database/performance-guidance`.
    This includes guidance for monitoring, query design, and application development.


    Another excellent resource comes from my longtime colleague Jack Li who now works
    in our engineering team. Learn more at `https://learn.microsoft.com/azure/azure-sql/identify-query-performance-issues`.'
