  trans: '

    ### Azure 门户


    如果 Azure 是全球的计算机，那么 `Azure 门户` 就是这台全球计算机的*用户界面*。你可能在第 1 章读到过 Azure 门户多年来有趣的演变史。如今，你可以通过网络浏览器（`https://portal.azure.com`，支持所有主流浏览器）或移动应用程序（`https://azure.microsoft.com/features/azure-portal/mobile-app/`）访问
    Azure 门户。


    图 2-1 展示了我的账户在最新版 Azure 门户体验中的 `主页`。


    ![](img/496204_2_En_2_Fig1_HTML.jpg)

    图 2-1

    Azure 门户主页


    注意

    在本书中，我将展示各种 Azure 门户的截图。微软员工默认使用 Azure 门户的*预览版*来协助测试最新更新。在大多数情况下，你看到的 Azure 门户界面应该与此类似，但也可能存在一些差异。


    我认为在本书以及你自己的使用过程中，你会看到 Azure 门户有若干重要功能。图 2-2 突出了其中一些功能。


    ![](img/496204_2_En_2_Fig2_HTML.jpg)

    图 2-2

    Azure 门户使用要点


    按照图 2-2 中的数字序列，来看这些 Azure 门户功能：


    1.  `仪表板` – 选择仪表板以查看你*固定*的重要资源（几乎可以将 Azure 中的任何内容固定到你的仪表板）。


    2.  `自定义`你的仪表板 – 选择`编辑`以移动你固定的资源，并在仪表板中进行组织。你可以拥有多个仪表板。


    3.  `搜索` – 你将经常使用此功能来搜索和查找资源及 Azure 服务。


    4.  `通知` – 在部署和管理 Azure 资源时，系统会提供关于进度、失败和完成事件的通知。


    5.  `Copilot` – 使用此功能启动 Azure 中的 Microsoft Copilot。


    6.  `快速创建` Azure 资源 – 选择此项可从流行的 Azure 服务快速创建资源。


    7.  `Azure Cloud Shell` – 在门户体验中打开 PowerShell 或 bash 的命令提示符。


    我天生是个“命令行”用户（我们这些从 20 世纪 80 年代开始从事计算机工作的人大多如此）。Azure Cloud Shell 简直太棒了！Azure Cloud
    Shell 随你的订阅提供，可通过门户访问，预装了许多工具（例如 `sqlcmd`），并提供免费存储空间，用作存放你文件的个人“硬盘”。图 2-3 展示了我账户使用
    PowerShell 的 Azure Cloud Shell 示例。


    ![](img/496204_2_En_2_Fig3_HTML.jpg)

    图 2-3

    Azure Cloud Shell


    你可以在 `https://azure.microsoft.com/features/cloud-shell/` 阅读并了解更多关于 Azure Cloud
    Shell 的信息。


    注意

    微软在 `https://learn.microsoft.com/training/modules/tour-azure-portal/?WT.mc_id=azureportalcard_Category_Overview_-inproduct-azureportal`
    提供了一个关于如何使用 Azure 门户的免费在线培训课程。


    ### Azure 市场


    要部署或使用 Azure 服务，你需要用到 `Azure 市场`。该市场是你可以部署和使用的服务集合。微软作为*发布者*提供了市场中的许多服务（并非全部，但许多微软服务以
    Azure 一词开头）。市场中还有由其他发布者（称为合作伙伴）提供的解决方案。


    要查看微软在 Azure 市场中提供的服务列表，你可以选择门户中的 `快速创建` 资源选项，如图 2-4 所示。


    ![](img/496204_2_En_2_Fig4_HTML.jpg)

    图 2-4

    门户中的 Azure 市场


    此时，你可以通过关键词搜索市场、从类别中挑选或选择热门服务。如果你选择`查看全部`，你将获得市场中所有发布者提供的所有 Azure 服务的列表，并按类别组织。


    微软发布的 Azure 服务也被称为`产品`。你可以在 Azure 文档站点 `https://azure.microsoft.com/` 上看到 Azure
    产品列表，如图 2-5 所示。


    ![](img/496204_2_En_2_Fig5_HTML.jpg)

    图 2-5

    Azure 产品


    请注意此页面底部新增的 AI 助手，它可以帮助你查找关于 Azure 的答案*。*


    ### Azure API 和 CLI


    几乎每个 Azure 服务都有自己的应用程序编程接口 (API)、协议（例如，Azure SQL 使用 TDS）和工具（Azure SQL 使用 `sqlcmd`
    或 `SSMS`）。


    然而，所有 Microsoft Azure 服务的一个共同点是表述性状态传递 (REST) API。`Azure REST API` 是服务端点，支持一组
    HTTP 操作（方法），提供对服务资源的创建、检索、更新或删除访问。你可以将 REST API 视为跨不同 Azure 服务和基础功能（如 Azure 资源管理器）的
    API 的*低级核心层*。你可以在 `https://learn.microsoft.com/rest/api/azure` 找到关于 Azure REST
    API 基础的更多信息。


    注意

    你将在本书后面看到 Azure SQL 提供了一种独特的方法来与 Azure 服务中的 REST API 集成。


    你与 Azure 服务的 API 交互很可能会在更高的层面，使用诸如 .NET、Java 或 Python 等编程语言。或者，你可能会使用名为 `az` CLI
    的 Azure 命令行界面 (CLI)。`az` CLI 是一个跨平台程序，用于对各种 Azure 服务和核心操作（如帐户和订阅）执行多种不同类型的操作。你可以在
    `https://learn.microsoft.com/cli/azure/?view=azure-cli-latest` 获取关于 `az` CLI 的所有最新信息。`az`
    CLI 在底层使用的是 Azure REST API。


    提示

    你可以通过为任何 `az` CLI 命令使用 `--debug` 选项来查看来自 `az` CLI 的 Azure REST API 调用跟踪。


    Azure 还提供了一系列用于管理 Azure 服务的 `PowerShell` cmdlet。你可以访问 Azure PowerShell 的中心枢纽 `https://learn.microsoft.com/powershell/azure`。

    '
- fmt: '# Azure Resource Manager (ARM)


    I’ve described an Azure service as something you consume or *deploy*. An instance
    of an Azure service you have deployed can be thought of as a *resource*. Technically,
    some Azure services result in multiple resources being created as part of a deployment.
    For example, you might deploy an Azure Virtual Machine, and the result is a virtual
    machine resource deployed plus other resources associated with the VM such as
    networks and storage.


    The system that supports the management of Azure services as resources is called
    the `Azure Resource Manager (ARM)`. `ARM` is not a service you consume. Rather,
    it is a system to support your deployment and management of services across Azure.


    Every system like `ARM` is based on *interfaces*. `ARM` exposes an interface both
    in and outside of Azure. You might remember the `RDFE` interface from Chapter
    [1](#496204_2_En_1_Chapter.xhtml) that was used previously in Azure (also referred
    to as the *classic* model). `ARM` is today the primary system used by tools and
    APIs, including the Azure Portal. Figure [2-6](#496204_2_En_2_Chapter.xhtml#Fig6)
    from the Azure documentation at [`https://learn.microsoft.com/azure/azure-resource-manager/management/overview#consistent-management-layer`](https://learn.microsoft.com/azure/azure-resource-manager/management/overview%2523consistent-management-layer)
    shows the interfaces of `ARM`.


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig6_HTML.jpg)


    Figure 2-6

    Azure Resource Manager interfaces


    `ARM` provides many benefits of consistency and management across all Azure services,
    including


    *   `Resource groups`


    One of the objects in the Azure ecosystem you will use often is `resource groups`.
    Resource groups are a logical collection of resources you can manage as a unit.
    Every Azure resource (e.g., a virtual machine or database) must exist in a resource
    group and can only be a member of one resource group. Resource groups have metadata,
    including a region location (but resources in a group can be in different regions).


    A resource group is always associated with a specific Azure subscription. Remember
    that I mentioned that Azure subscriptions are associated with an account and possibly
    management groups. You can therefore apply Azure policies at the account, management
    group, subscription, resource group, or resource level.


    One nice advantage of managing resources at the group level is deletion. If you
    delete a resource group, all resources associated with the group are also deleted.
    You could therefore associate all resources for a proof of concept (`POC`) project
    with a resource group and then delete the group when you are done, thereby avoiding
    any unnecessary costs.


    *   `Role-Based Access Control (RBAC)`


    `RBAC` is an authorization system that provides access management to Azure resources.
    `RBAC` is based on security principals, roles, and scope. Security principals
    are objects like users associated with an Azure subscription. Think of security
    principles like SQL principles such as logins. Roles are collections of permissions
    based on types such as owners or contributors. Scope is the level of access such
    as management groups, subscriptions, resource groups, or resources. You will see
    examples of `RBAC` throughout this book, including Azure SQL–specific `RBAC` objects.
    You can read more about `RBAC` at [`https://learn.microsoft.com/azure/role-based-access-control/overview`](https://learn.microsoft.com/azure/role-based-access-control/overview).


    *   `Locks`


    Azure locks allow you to prevent users from accidentally deleting or modifying
    critical resources. For example, you could create a resource group and apply a
    lock that prevents any user from deleting resources in the group. Valid lock types
    are `CanNotDelete` and `ReadOnly`.


    One good example my colleague Joe Sack pointed out to me is that locks can prevent
    users from accidentally dropping databases through the Azure portal (but not through
    tools like `SSMS`).


    You can read more about locks at [`https://learn.microsoft.com/azure/azure-resource-manager/management/lock-resources`](https://learn.microsoft.com/azure/azure-resource-manager/management/lock-resources).


    *   `Templates`


    `ARM` is a *declarative* system. You use `ARM` by stating your intentions, and
    `ARM` does the rest. You declare your intentions through interfaces such as the
    Azure Portal or APIs. `ARM` also provides an interface mechanism to declare your
    intentions through a JSON file called a `template`. Templates provide a method
    to deploy resources consistently, repeatedly, and at scale. I’ll show you example
    templates you can use with Azure SQL throughout the book. You can read more about
    templates at [`https://learn.microsoft.com/azure/azure-resource-manager/templates/overview`](https://learn.microsoft.com/azure/azure-resource-manager/templates/overview).


    Note

    Azure supports other popular frameworks for managing resources at scale such as
    `Bicep` ([`https://learn.microsoft.com/azure/azure-resource-manager/bicep`](https://learn.microsoft.com/azure/azure-resource-manager/bicep))
    and `Terraform` ([`https://learn.microsoft.com/azure/developer/terraform/overview`](https://learn.microsoft.com/azure/developer/terraform/overview)).


    *   `Activity Logs`


    As you use the Azure Portal or APIs to interact with `ARM` to deploy and manage
    resources, your activities or operations are logged in a store called the `Activity
    Log`. Each subscription has a single `Activity Log` that records operations against
    resources associated with the subscription. Subscription-level events in the `Activity
    Log` are general (like an Azure Policy action) or specific to a resource (like
    updating an Azure SQL Database). You can read more about Azure Activity Logs at
    [`https://learn.microsoft.com/azure/azure-monitor/essentials/activity-log`](https://learn.microsoft.com/azure/azure-monitor/essentials/activity-log).


    # Azure Monitor


    SQL Server professionals are used to looking at metrics and logged events in tools
    like Windows Performance Monitor, Windows Event Log, Linux systemd logs, or Grafana
    dashboards. You will see in this book that Azure Virtual Machine will give you
    access to all these tools *inside* the guest operating system.


    However, given Azure is the hosting system for all your Azure resources, it would
    be nice to have a centralized system for hosting, viewing, and analyzing *metrics*
    and *logs* of events for all your Azure resources. That in a nutshell is what
    `Azure Monitor` provides.


    You will learn more about how to use `Azure Monitor` with Azure SQL services throughout
    this book. You can read more about `Azure Monitor` at [`https://learn.microsoft.com/azure/azure-monitor/overview`](https://learn.microsoft.com/azure/azure-monitor/overview).


    Note

    A new service called `Database Watcher` is in public preview at the time of the
    writing of this book which provides amazing monitoring capabilities for Azure
    SQL Database and Azure SQL Managed Instance ***at scale***. You will learn more
    about `Database Watcher` in Chapter [7](#496204_2_En_7_Chapter.xhtml) of this
    book.'
