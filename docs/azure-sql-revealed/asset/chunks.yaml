    # Azure SQL 高可用性与备份


    ## 内置可用性


    您可能习惯于使用 Always On 故障转移群集实例（`FCI`）或 Always On 可用性组（`AG`）配合 `SQL Server` 来实现高可用性并达到期望的恢复时间目标（`RTO`）。


    作为**每一次** Azure `SQL` 部署的一部分，只需部署 Azure `SQL`，您就能获得一个完整的内置可用性系统。这已包含在您的 Azure
    订阅和部署费用中。


    正如您将在本章中看到的，通用目的部署的行为类似于 `FCI`，而业务关键型则类似于 `AG`。超大规模使用了一种独特的架构，感觉像是两者的结合。在所有情况下，都利用了
    Azure Service Fabric 的强大功能来实现自动故障转移能力。


    ## 区域冗余用于高可用性


    当您拥有三个数据中心时，为何还要依赖单个数据中心？Azure `SQL` 可以与一项称为**区域冗余**的功能集成。每个区域是 Azure 区域内一组一个或多个数据中心（因此实际上超过三个），拥有独立的电源、冷却和网络。Azure
    `SQL` 可以跨区域部署一个***高可用性***解决方案，以便在特定数据中心发生故障时为您提供更高的可用性。


    所有 Azure `SQL` 部署都是作为 **Azure 可用性集** 的一部分创建的，其中包括使用不同的容错域和更新域。**容错域**定义了共享公共电源和网络交换机的虚拟机组。**更新域**是可以同时重启的虚拟机和底层物理硬件组。一次只重启一个更新域。重启的更新域有
    30 分钟的恢复时间，之后才会在另一个更新域上启动维护。您可以在 [`https://learn.microsoft.com/azure/virtual-machines/availability#configure-multiple-virtual-machines-in-an-availability-set-for-redundancy`](https://learn.microsoft.com/azure/virtual-machines/availability#configure-multiple-virtual-machines-in-an-availability-set-for-redundancy)
    阅读有关此概念的更多信息。


    ## 地理复制与故障转移组


    您可能希望通过跨 Azure 区域同步部署来提供更高级别的可用性。Azure `SQL` 提供了两种实现此功能的方法，称为地理复制和故障转移组。我们将在本章中详细介绍每个选项，以及您为何可能选择其中一个而不是另一个。


    ## 数据库可用性与一致性


    对于 `SQL Server`，您习惯于使用各种技术来确保数据库可用并检查一致性。Azure `SQL` 消除了对繁重“紧急”恢复选项的需求，并提供了许多内置的一致性检查。在本章中，我将更详细地探讨
    Azure `SQL` 与 `SQL Server` 在数据库可用性、恢复和一致性方面的具体比较。


    ## 使用托管实例链接进行灾难恢复


    托管实例链接提供了使用可用性组的强大功能，从 `SQL Server 2016`、`2019` 或 `2022` 执行在线迁移到托管实例的能力。由于版本化的托管实例与
    `SQL Server 2022` 兼容，您还可以在 `SQL Server 2022` 和托管实例之间构建灾难恢复架构。这实际上是在 `SQL Server`
    和托管实例之间构建一个分布式可用性组（`DAG`）。


    ## 免费被动灾难恢复副本


    如果您使用托管实例链接、地理复制或故障转移组等技术为 Azure `SQL` 托管实例或数据库配置*副本*，您可以将辅助副本声明为*被动*。这意味着您仅将辅助副本用于灾难恢复目的。如果选择此选项，您可以节省成本，因为您只需为辅助副本的计算和存储付费。这也被称为*备用副本*。


    ## SQL Server 复制


    `SQL Server` 复制多年来一直是在许多 `SQL Server` 版本中提供可用性和数据库同步级别的流行方法。本章不会深入探讨使用 `SQL Server`
    复制的细节，但会指出这些功能：


    *   Azure `SQL` 托管实例为您提供了设置事务或快照复制系统的全部功能，包括发布者、分发者和订阅者。订阅者可以是另一个托管实例数据库、Azure
    `SQL` 数据库，甚至是 Azure `VM` 中或本地的 `SQL Server`。请在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/replication-transactional-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/replication-transactional-overview)
    阅读有关 Azure `SQL` 托管实例和复制的更多信息。


    *   Azure `SQL` 数据库可以作为本地 `SQL Server`、Azure `VM` 中的 `SQL Server` 或托管实例的订阅者，进行事务和快照复制。迁移到
    Azure `SQL` 数据库时，这可能是一个有趣的迁移选项，因为它可以提供一种“在线”迁移策略。更多信息请见 [`https://learn.microsoft.com/azure/azure-sql/database/replication-to-sql-database`](https://learn.microsoft.com/azure/azure-sql/database/replication-to-sql-database)。


    ## 备份与恢复


    假设您需要为 `SQL Server` 部署设置自动备份系统。您基本上希望构建一个系统，让其他 `DBA` 无需担心执行备份。您希望这些备份定期运行；结合使用完整、差异和日志备份；并放置在与数据库分离的存储上以实现全面保护。您还希望备份存储能在公司内跨数据中心镜像。


    猜猜怎么着？当您部署 Azure `SQL` 托管实例或 Azure `SQL` 数据库时，我们默认就完成了所有这些工作……甚至更多。让我们看看自动备份系统的各个方面以及如何使用这些备份进行恢复。


    ### 自动备份


    当您部署 Azure `SQL` 数据库或为 Azure `SQL` 托管实例部署创建新数据库时，我们会监控此活动并启动以下备份活动计划：


    *   每周进行一次完整数据库备份。


    *   每 12 或 24 小时进行一次差异备份。


    *   每 5-10 分钟进行一次事务日志备份。日志备份的实际频率基于 `vCores` 数量和数据库活动。


    注意


    我们可能会改变执行此操作的具体实现方式。核心概念是为您提供时间点恢复并满足您的 `RPO` 目标。


    所有备份都在后台使用标准 `T-SQL` 语句完成，并与您的数据和日志文件分开存储（即使它们在 Azure 存储上）。您为备份提供的选项之一是***冗余***选项。这些选项包括以下。


    #### 本地冗余存储（`LRS`）


    您的备份文件在物理数据中心内同步复制三次。虽然此选项不能提供最佳保护，但由于数据驻留要求，它对某些客户来说是一个选择。


    #### 区域冗余存储（`ZRS`）


    此选项类似于 `LRS`，不同之处在于备份文件的同步副本分布在三个可用性区域中。此选项适用于 Azure `SQL` 托管实例和 Azure `SQL` 数据库，与部署的区域冗余无关。


    #### 地理冗余存储（`GRS`）


    这是任何 Azure `SQL` 托管实例或 Azure 数据库的默认选项。您的备份文件是本地冗余的，但也会异步复制到另一个区域中的单个物理位置（该位置使用
    `LRS`）。


    图 8-1 展示了这些备份冗余的示例。


    ![](img/496204_2_En_8_Fig1_HTML.jpg)


    图 8-1


    地理冗余备份

