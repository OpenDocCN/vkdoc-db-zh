    Portal. Here, I can select **Performance Recommendations** like in Figure [7-34](#496204_2_En_7_Chapter.xhtml#Fig34).


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig34_HTML.jpg)


    Figure 7-34


    Performance Recommendations for Azure SQL Database


    On this screen, you can see one of the recommendations is to create a new index
    and the Impact is High (which means it could have a high positive impact on improving
    performance).


    I can click the Create Index action and get more details about the recommended
    index as you see in Figure [7-35](#496204_2_En_7_Chapter.xhtml#Fig35).


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig35_HTML.jpg)


    Figure 7-35


    Create index recommendation


    On this screen, I can get details of how the index should be built, its impact
    on performance, and expected storage space required to build it. I can at this
