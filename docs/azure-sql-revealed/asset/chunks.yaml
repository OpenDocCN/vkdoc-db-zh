    `Microsoft Defender`: `Vulnerability Assessment` and `SQL Threat Protection`.


    ### Vulnerability Assessment


    Another aspect to securing your data is to proactively monitor and check for any
    known security vulnerabilities. But what are known vulnerabilities? Azure SQL
    has a knowledge base of rules we have built (based on industry standards from
    [`https://www.cisecurity.org/cis-benchmarks/`](https://www.cisecurity.org/cis-benchmarks/))
    to scan your Azure SQL Managed Instances and Databases for configurations that
    might be considered vulnerable. I like to think of a vulnerability assessment
    like a virus checker which uses a *scan* method to look for possible issues. I’m
    using a method called the `express configuration` for a Vulnerability Assessment.
    This new method, which is now the default, doesn’t require any storage to store
    the results (the classic configuration requires this).


    Figure [6-25](#496204_2_En_6_Chapter.xhtml#Fig25) shows a Vulnerability Assessment
    on my logical server.


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig25_HTML.jpg)

    Figure 6-25 Vulnerability Assessment on a logical server


    On this screen, I can see findings, basic check information, what benchmark they
    were associated with, and severity. Notice on the command menu I can initiate
    a manual scan (Vulnerability Assessments are typically scheduled once a week)
    and see scan history. The scan is lightweight and safe. It takes a few seconds
    to run and is entirely read-only. It doesn’t make any changes to your database.


    If I click a specific rule, I can drill into more detail as you can see in Figure
    [6-26](#496204_2_En_6_Chapter.xhtml#Fig26).


    ![](images/496204_2_En_6_Chapter/496204_2_En_6_Fig26_HTML.jpg)

    Figure 6-26 Details of a Vulnerability Assessment finding


    This finding is based on the fact that I have exposed the public ending for this
    logical server. I’m using firewall rules but allowing any Azure resource to connect.


    On the left-hand side, you can get more information about the finding. On the
    right-hand side, you have a script to remediate the problem and the query that
    was used to detect the problem.


    Below are options to add the results as part of the `baseline` or remove them.
    If I add the results in their current state, that means it is not an issue to
    expose the public endpoint with firewall rules and allow Azure resources. So subsequent
    scans will not have this finding show up. If I want to change this later, I can
    remove this from the baseline, and it will show up again. Another nice feature
