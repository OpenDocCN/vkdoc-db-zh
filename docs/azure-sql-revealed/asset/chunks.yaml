    This feature allows you to enable and disable automatic backups for SQL Server
    in the VM. This capability uses a feature that has been in the product for several
    releases using SQL Server Agent and backup to URL. You can learn more at [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/automated-backup`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/automated-backup).
    While I do recommend you look at this feature, I found in the cloud customers
    typically build their own automated backup system (but use Azure Storage with
    backup to URL) or use the Azure Backup service.


    #### High Availability


    This option helps you configure Always On Availability Groups with SQL Server
    on Azure VM. Learn more about this option in the section titled “HADR” later in
    this chapter.'
  trans: '## SQL Server IaaS 代理扩展


    到目前为止，我的示例和讨论都围绕着在基于 Windows Server 的 Azure 虚拟机中部署 SQL Server。


    对于在 Linux 上运行的 SQL Server，选项和部署过程非常相似，但有一些显著差异：


    *   镜像市场提供了适用于 Linux 发行版 Ubuntu、Red Hat Enterprise Server 和 SUSE 的镜像。如果 Linux
    发行版要求，您需要为其许可证付费（Ubuntu 是免费许可证）。

    *   我们在部署过程中不支持配置 SQL Server 设置。`SQL Server IaaS 代理扩展` 支持 Ubuntu 发行版，但在许可证方面提供有限支持。更多信息请访问
    [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-server-iaas-agent-extension-linux`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-server-iaas-agent-extension-linux)。


    使用 SQL Linux 镜像后，您会发现 `mssql-server`、`mssql-tools` 和 `mssql-ha` 包已安装。


    SQL Agent 默认未启用，但您可以自行启用。您可以使用 `mssql-conf` 脚本在 Linux 上启用 SQL Server Agent，详细信息请访问
    [`https://learn.microsoft.com/sql/linux/sql-server-linux-setup-sql-agent`](https://learn.microsoft.com/sql/linux/sql-server-linux-setup-sql-agent)。


    部署后，您可以使用文档记录的方法安装其他 SQL Server Linux 包。例如，您可以阅读 [`https://learn.microsoft.com/sql/linux/sql-server-linux-setup-machine-learning`](https://learn.microsoft.com/sql/linux/sql-server-linux-setup-machine-learning)
    来了解如何为 Linux 安装 SQL Server 机器学习服务。


    ### 部署 SQL Server 容器


    在 Azure 虚拟机中部署 SQL Server 容器没有特殊的镜像或流程。您将使用与今天在虚拟机中部署 SQL Server 容器相同的流程。有关此过程的更多信息，请访问
    [`https://aka.ms/sqlcontainers`](https://aka.ms/sqlcontainers)。


    `Azure Kubernetes 服务` (AKS) 提供了一种利用 Kubernetes 的强大功能大规模部署容器的方法。您可以在 [`https://learn.microsoft.com/sql/linux/quickstart-sql-server-containers-azure`](https://learn.microsoft.com/sql/linux/quickstart-sql-server-containers-azure)
    查看如何执行此操作的教程。


    您在本章中已经看到了使用镜像在 Azure 虚拟机中部署 SQL Server 的特殊选项和优势的示例，包括许可、配置和自动化。这一切都是通过 `SQL 虚拟机资源提供程序`
    使用 `SQL Server IaaS 代理扩展` 实现的。资源提供程序是在 Azure 中运行的软件，它启用了与 Azure 资源管理器集成的特定 SQL
    功能。该扩展是在您的虚拟机中运行的一组代理，它们使用资源提供程序。


    如果您使用 SQL Server 镜像进行部署，您只需利用资源提供程序所提供的功能，无需您进行任何操作。但是，如果您自行部署并希望获得这些优势（包括许可），则需要将您的
    VM 注册为 SQL Azure VM。


    首先，您需要确保您的 Azure 订阅已注册 `Microsoft.SqlVirtualMachine` 资源提供程序。您可以从 Azure 门户的订阅设置中完成此操作。或者，您可以使用以下
    PowerShell 命令：


    ```

    Register-AzureRmResourceProvider -ProviderNamespace Microsoft.SqlVirtualMachine

    ```


    接下来，您需要使用资源提供程序注册您的虚拟机。注册 VM 会安装 `SQL Server IaaS 代理扩展`。您可以阅读 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-agent-extension-manually-register-single-vm`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-agent-extension-manually-register-single-vm)
    了解所有步骤。


    一旦您的 VM 被注册或如果您使用了 SQL 镜像，您的 VM 现在就被视为既是 Azure 虚拟机资源，也是一个 `SQL 虚拟机`。这意味着搜索 `Azure
    SQL` 资源时，您的 VM 会出现。此外，根据本章前面所做的部署，门户将显示如图 3-26 所示的附加属性。


    ![](img/496204_2_En_3_Fig26_HTML.jpg)


    图 3-26：已注册的 SQL Azure 虚拟机


    > **注意**

    >

    > 一个访问此概览页面的简便方法是：转到虚拟机的命令菜单，在 `设置` 下选择 `SQL Server 配置`。然后点击 `SQL Server 配置`。


    您可以看到此屏幕看起来像一个 Azure 虚拟机，但包含特定于 SQL Server 的信息和选项。


    您可以看到 `基本信息` 窗格包含有关 VM 的信息，也包含 SQL Server 的信息，包括版本、版本、许可类型和操作系统详细信息。在 `工作窗格` 下方是一个图表，显示数据库和日志文件的存储空间，以及您可以为
    Azure VM 中的 SQL Server 启用的功能。`命令栏` 有一个选项可以删除（取消注册）SQL Server Azure 虚拟机并删除底层 VM。


    `服务菜单`（在图 3-26 中展开）包含特定于在 Azure 虚拟机上运行的 SQL Server 的选项，包括以下两个主要类别。我认为您会发现其中许多选项对于帮助您管理
    Azure 虚拟机上的 SQL Server 极其有价值。


    ### 设置


    在 `设置` 下，您有以下选项。


    #### 配置


    此选项允许您指定 SQL 的许可证（`即用即付`、`Azure 混合权益` 或 `灾难恢复`）。


    我在本章前面已经介绍过 `Azure 混合权益`。`即用即付` 是默认的计费方式，按月支付 SQL 许可证费用。`灾难恢复` 是一个新选项，如果 VM 中的
    SQL Server 仅用于灾难恢复目的，则提供免费的 SQL Server 许可证。


    此外，您可以指定 VM 使用的 SQL Server 版本。


    #### 存储


    此选项值得关注，因为它提供与 VM 上 SQL Server 相关的存储的分析、指标、评估和配置，如图 3-27 所示。


    ![](img/496204_2_En_3_Fig27_HTML.jpg)


    图 3-27：Azure VM 中 SQL Server 的存储辅助工具


    #### 更新


    这是另一个很好的选项，不仅可以管理安全更新，还可以管理 Windows 的其他更新和 SQL Server 的累积更新。您甚至可以大规模管理和安排更新。此功能基于
    `Azure 更新管理器`。更多信息请访问 [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/azure-update-manager-sql-vm`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/azure-update-manager-sql-vm)。


    #### 备份


    此功能允许您为 VM 中的 SQL Server 启用和禁用自动备份。此功能使用产品中已存在多个版本的功能，利用 SQL Server Agent 和备份到
    URL。您可以了解更多： [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/automated-backup`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/automated-backup)。虽然我确实建议您查看此功能，但我发现在云端，客户通常会构建自己的自动备份系统（但使用
    Azure 存储进行备份到 URL）或使用 `Azure 备份` 服务。


    #### 高可用性


    此选项帮助您为 Azure VM 上的 SQL Server 配置 Always On 可用性组。有关此选项的更多信息，请参阅本章后面的“高可用性与灾难恢复”部分。'
- fmt: "# SQL Best Practices Assessment\n\nThis option is a tool that allows you to\
    \ scan the configuration of your SQL Server deployment and provide advice on settings\
    \ that may be not optimal or follow best practices based on the common knowledge\
    \ of the SQL community and Microsoft. You can run an assessment on demand or on\
    \ a schedule. There is some great advice from this tool, so I recommend you give\
    \ it a spin and see how it can help you. You can see the complete set of rules\
    \ it uses at [`https://github.com/microsoft/sql-server-samples/blob/master/samples/manage/sql-assessment-api`](https://github.com/microsoft/sql-server-samples/blob/master/samples/manage/sql-assessment-api)\
    \ and learn more about the feature at [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-assessment-for-sql-vm`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-assessment-for-sql-vm).\n\
    \n## Security\n\nSecurity options include integration with services like Microsoft\
    \ Entra and Microsoft Defender for Cloud.\n\n### Security Configure\n\nThis option\
    \ allows you to enable integration with `Azure Key Vault` which can be a very\
    \ nice option to use with features like Transparent Data Encryption (Bring Your\
    \ Own Key).\n\nYou can also enable integration with `Microsoft Entra` (formerly\
    \ Azure Active Directory). This option requires SQL Server 2022 and is an excellent\
    \ solution to provide an alternative for authentication instead of using basic\
    \ or SQL Authentication, especially because you don’t need a domain controller\
    \ like you do for Windows Authentication. One great use for this capability is\
    \ to use a managed identity, so you can build `passwordless` applications connecting\
    \ to SQL Server. Learn more at [`https://learn.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-overview`](https://learn.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-overview).\n\
    \n### Microsoft Defender for Cloud\n\nThis capability used to be known as Advanced\
    \ Data Security but is now wrapped under the Microsoft Defender umbrella. The\
    \ capabilities here are still the same:\n\n*   Vulnerability Assessment\n    Scan\
    \ for any configuration settings that could lead to a possible security vulnerability\
    \ (e.g., sa account enabled) based on known industry standards (e.g., FedRAMP).\n\
    \n*   Advanced Threat Protection\n    Alert to any threats detected like brute\
    \ force login attacks (SQL auth enabled and someone tries to hack the sa password)\
    \ and SQL injection attacks.\n\nYou can learn more about Microsoft Defender for\
    \ Cloud and SQL on Azure VM at [`https://learn.microsoft.com/azure/defender-for-cloud/defender-for-sql-usage`](https://learn.microsoft.com/azure/defender-for-cloud/defender-for-sql-usage).\n\
    \n**Tip**\n\nThere are two new capabilities from the Defender team worth looking\
    \ at, including the `Data Security Dashboard` ([`https://learn.microsoft.com/azure/defender-for-cloud/data-aware-security-dashboard-overview`](https://learn.microsoft.com/azure/defender-for-cloud/data-aware-security-dashboard-overview))\
    \ and a `Copilot experience` ([`https://learn.microsoft.com/azure/defender-for-cloud/copilot-security-in-defender-for-cloud`](https://learn.microsoft.com/azure/defender-for-cloud/copilot-security-in-defender-for-cloud)).\n\
    \nThere is one other option on the Service Menu worth looking at called `SQL Server\
    \ IaaS Agent Extension Settings`. This can help you repair any issues with the\
    \ extension and also set up auto upgrades.\n\nIn addition to using the portal,\
    \ you can use the `az sql vm` CLI. This allows you to register your VM or change\
    \ SQL Server properties. You can read all these options at [`https://learn.microsoft.com/cli/azure/sql/vm`](https://learn.microsoft.com/cli/azure/sql/vm).\n\
    \n# Configuring an Azure Virtual Machine\n\nInside the VM, your SQL Server configuration\
    \ is completely identical to a virtual machine you deploy in your data center.\
    \ There are some aspects to configuration of the virtual machine from the Azure\
    \ infrastructure worth looking at.\n\n## Stopping vs. Deallocating\n\nThere could\
    \ be several reasons to shut down your virtual machine in Azure. If you shut down\
    \ the virtual machine inside the VM (e.g., Windows shutdown), the VM is stopped,\
    \ but compute resources are reserved for the VM, which means you are still billed\
    \ for compute. The VM status will show as `Stopped` in the portal and CLI interfaces.\
    \ To shut down the VM and ensure you are not billed for compute, you need to use\
    \ the interfaces outside the VM (such as Stop in the Command Menu of the Azure\
    \ Portal or az CLI) to stop the VM. In this case, the status of the VM is listed\
    \ as `Stopped (deallocated)`. Depending on your requirements, you can even automate\
    \ the process of starting and stopping VMs using Azure interfaces. Read more at\
    \ [`https://techcommunity.microsoft.com/t5/educator-developer-blog/azure-virtual-machine-auto-shutdown/ba-p/379342`](https://techcommunity.microsoft.com/t5/educator-developer-blog/azure-virtual-machine-auto-shutdown/ba-p/379342).\n\
    \nA related topic is maintenance windows for the infrastructure hosting virtual\
    \ machines. Read more about updates and maintenance of Azure Virtual Machine hosts\
    \ at [`https://learn.microsoft.com/azure/virtual-machines/maintenance-and-updates`](https://learn.microsoft.com/azure/virtual-machines/maintenance-and-updates).\n\
    \n## Resizing\n\nWhat if you did not pick the right Azure Virtual Machine size\
    \ during deployment? You can use the Azure portal (choose Size from the Service\
    \ Menu) or CLI interfaces to change the size of the virtual machine. This process\
    \ is called `resizing` an Azure Virtual Machine. Resizing is much like you being\
    \ able to change the resources available (CPU, storage, memory, etc.) for a VM\
    \ within your data center. While you can resize a running Azure VM, a reboot of\
    \ the VM is required for the resize operation. The sizes available to your choice\
    \ to resize depend on whether your VM is running or stopped (deallocated). This\
    \ difference is because there may be only certain sizes available on the current\
    \ host of your VM (the running case). To see the full complete list of VM sizes,\
    \ I recommend you stop (deallocate) your VM first. Read the overall Azure Virtual\
    \ Machine resize story at [`https://azure.microsoft.com/blog/resize-virtual-machines/`](https://azure.microsoft.com/blog/resize-virtual-machines/).\n\
    \nYou can use Azure Migrate to move Azure Virtual Machines to other regions. Read\
    \ more at [`https://learn.microsoft.com/azure/site-recovery/azure-to-azure-tutorial-migrate`](https://learn.microsoft.com/azure/site-recovery/azure-to-azure-tutorial-migrate).\
    \ In addition, to change the resource group or subscription of your virtual machine,\
    \ read the documentation at [`https://learn.microsoft.com/azure/azure-resource-manager/management/move-resource-group-and-subscription`](https://learn.microsoft.com/azure/azure-resource-manager/management/move-resource-group-and-subscription).\n\
    \n## Security (RBAC)\n\nRole-Based Access Control (RBAC) allows you to assign\
    \ privileges to other Azure accounts to have permissions to manage the Azure Virtual\
    \ Machine. Think of this as how to control security `outside the VM`. You manage\
    \ this through the `Access Control (IAM)` option on the Service Menu. This is\
    \ a common option for many Azure resources. Learn more at [`https://learn.microsoft.com/azure/role-based-access-control/quickstart-assign-role-user-portal`](https://learn.microsoft.com/azure/role-based-access-control/quickstart-assign-role-user-portal)."
