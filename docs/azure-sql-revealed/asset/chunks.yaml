- fmt: "### External Tables\n\nIn SQL Server 2016, we introduced a capability called\
    \ `Polybase` using a `T-SQL` object `EXTERNAL TABLE` to be directed to Hadoop\
    \ file systems. In SQL Server 2019, we expanded this capability to include other\
    \ data sources such as SQL Server, Oracle, MongoDB, Teradata, and other sources\
    \ that support an ODBC Driver. We call this capability `data virtualization`,\
    \ because the data access is remote, but it *feels* like the data is local through\
    \ external tables.\n\nIn SQL Server 2022, we introduced a new method for `Polybase`\
    \ by supporting external data sources for `Azure Storage` using `REST APIs` instead\
    \ of the previous methods with ODBC. `REST` provides a more lightweight approach\
    \ since it executes inside the SQL engine. In addition, external tables can be\
    \ used to read or write data to file formats like `Parquet`, `CSV`, and `Delta`\
    \ (read only).\n\nThe process to use `Polybase` with Azure SQL Managed Instance\
    \ is like SQL Server 2022 as you see in Figure [9-1](#496204_2_En_9_Chapter.xhtml#Fig1).\n\
    \n![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig1_HTML.jpg)\n\nFigure 9-1\n\
    Data virtualization using `REST API` for SQL Server 2022\n\nFor Azure SQL Managed\
    \ Instance, a more managed approach is available. While you still have external\
    \ data sources, file formats, and external tables, here are the following differences\
    \ from Figure [9-1](#496204_2_En_9_Chapter.xhtml#Fig1):\n\n*   There is no need\
    \ to install the `Polybase` feature as it is already “installed” for Managed Instance.\n\
    *   There is no need to configure `Polybase` using `sp_configure` as it is already\
    \ enabled.\n*   `S3` is not supported at the time of the writing of this book,\
    \ so only `Azure Blob Storage (abs)` and `Azure Data Lake Storage (adls)` data\
    \ sources are supported.\n\nYou still need a `database scoped credential` for\
    \ any private storage account, but one nice addition for Azure SQL Managed Instance\
    \ from SQL Server 2022 is that `managed identities` are also supported.\n\nThe\
    \ best way for you to get started using this feature is to connect to your Azure\
    \ SQL Managed Instance and try the following query against a known public dataset:\n\
    \n```sql\nSELECT *\nFROM OPENROWSET(\n    BULK 'abs://nyctlc@azureopendatastorage.blob.core.windows.net/yellow/puYear=2001/puMonth=1',\n\
    \    FORMAT = 'parquet'\n) AS taxidata;\nGO\n```\n\nYou can see how easily it\
    \ is to get started with `data virtualization` *with no configuration* required\
    \ for your Managed Instance.\n\nAnother powerful feature of `data virtualization`\
    \ is the ability to create an external table and export data at the same time.\
    \ We called this `CREATE TABLE AS SELECT (CETAS)`. One of the benefits of this\
    \ capability is to take the result of this data as `Parquet` files and create\
    \ a “cold data” solution integrated with `Microsoft Fabric`. The scenario looks\
    \ like Figure [9-2](#496204_2_En_9_Chapter.xhtml#Fig2).\n\n![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2\nUsing `data virtualization` for integration with `Microsoft Fabric`\n\
    \nThe concept here is to switch a SQL partition that is considered “cold” to a\
    \ separate table. Then use the `CETAS` concept to export this table to Azure Storage\
    \ as `Parquet`. Since this is an external table, you can query the parquet data\
    \ as a table. In addition, you can use the concept of a shortcut in `Microsoft\
    \ Fabric` to easily integrate this data into `Microsoft Fabric`. You can see this\
    \ in action on an episode of `Data Exposed` I was in hosted by Anna Hoffman at\
    \ [`https://learn.microsoft.com/shows/data-exposed/sql-integration-with-microsoft-fabric-data-exposed`](https://learn.microsoft.com/shows/data-exposed/sql-integration-with-microsoft-fabric-data-exposed).\
    \ You will see in the next chapter a more efficient method to synchronize your\
    \ SQL data with the `Microsoft Fabric` with a concept called `mirroring`.\n\n\
    Learn more about `data virtualization` with Azure SQL Managed Instance at [`https://aka.ms/midatavirt`](https://aka.ms/midatavirt).\n\
    \nWhile Azure SQL Database does not support `Polybase` in this fashion, it does\
    \ support external tables to use for `elastic scale query`. This means that you\
    \ can technically set up an `external data source` to another Azure SQL Database\
    \ logical server and database and define an external table with that data source.\
    \ So, you can now query the remote database as an external table or even join\
    \ a local table with the remote database table. You can review the `T-SQL` reference\
    \ for external data source for Azure SQL Database at [`https://learn.microsoft.com/sql/t-sql/statements/create-external-data-source-transact-sql?view=azuresqldb-current&tabs=dedicated#overview-azure-sql-database`](https://learn.microsoft.com/sql/t-sql/statements/create-external-data-source-transact-sql?view=azuresqldb-current&tabs=dedicated#overview-azure-sql-database).\n\
    \nTake a look at a cool example of using this capability from my colleague Dimitri\
    \ Furman where he uses external tables to look at `Hyperscale` `read-scale monitoring`.\
    \ You can find the source at [`https://github.com/dimitri-furman/samples/tree/master/azure-sql-readscale-monitoring`](https://github.com/dimitri-furman/samples/tree/master/azure-sql-readscale-monitoring).\n\
    \n## Database Mail\n\nSQL Server has supported a built-in `mail` capability since\
    \ back in the days of SQL Server 4.21 for Windows NT. The latest version of this\
    \ feature is called `Database Mail`. The concept is that you can use `T-SQL` to\
    \ send mail messages based on the Simple Mail Transfer Protocol (`SMTP`). If you\
    \ have never used `Database Mail` before, you can learn more at [`https://learn.microsoft.com/sql/relational-databases/database-mail/database-mail`](https://learn.microsoft.com/sql/relational-databases/database-mail/database-mail).\n\
    \nWe introduced support for `Database Mail` as a feature for Azure SQL Managed\
    \ Instance as this was a capability many customers who were trying to use Azure\
    \ SQL Database desired as part of their migration. `Database Mail` is an *instance*\
    \ feature which makes sense why it is part of Azure SQL Managed Instance.\n\n\
    One of the common scenarios for using `Database Mail` is for alerts for SQL Server\
    \ Agent jobs. There are a few configuration differences to use `Database Mail`\
    \ for SQL Server Agent jobs. Read more at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#sql-server-agent`](https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#sql-server-agent).\
    \ Just about everything else is the same to use `Database Mail` with Azure SQL\
    \ Managed Instance except for these two differences as called out in the documentation:\n\
    \n*   `sp_send_dbmail` cannot send attachments using the `@file_attachments` parameter.\
    \ Local file system and external shares or Azure Blob Storage are not accessible\
    \ from this procedure.\n*   The `@query` parameter in the `sp_send_db_mail` procedure\
    \ doesn't work."
  raw: '### External Tables


    In SQL Server 2016, we introduced a capability called Polybase using a T-SQL object
    EXTERNAL TABLE to be directed to Hadoop file systems. In SQL Server 2019, we expanded
    this capability to include other data sources such as SQL Server, Oracle, MongoDB,
    Teradata, and other sources that support an ODBC Driver. We call this capability
    *data virtualization*, because the data access is remote, but it *feels* like
    the data is local through external tables.


    In SQL Server 2022, we introduced a new method for Polybase by supporting external
    data sources for Azure Storage using REST APIs instead of the previous methods
    with ODBC. REST provides a more lightweight approach since it executes inside
    the SQL engine. In addition, external tables can be used to read or write data
    to file formats like Parquet, CSV, and Delta (read only).


    The process to use Polybase with Azure SQL Managed Instance is like SQL Server
    2022 as you see in Figure [9-1](#496204_2_En_9_Chapter.xhtml#Fig1).


    ![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Data virtualization using REST API for SQL Server 2022


    For Azure SQL Managed Instance, a more managed approach is available. While you
    still have external data sources, file formats, and external tables, here are
    the following differences from Figure [9-1](#496204_2_En_9_Chapter.xhtml#Fig1):


    *   There is no need to install the Polybase feature as it is already “installed”
    for Managed Instance.


    *   There is no need to configure Polybase using sp_configure as it is already
    enabled.


    *   S3 is not supported at the time of the writing of this book, so only Azure
    Blob Storage (abs) and Azure Data Lake Storage (adls) data sources are supported.


    You still need a database scoped credential for any private storage account, but
    one nice addition for Azure SQL Managed Instance from SQL Server 2022 is that
    managed identities are also supported.


    The best way for you to get started using this feature is to connect to your Azure
    SQL Managed Instance and try the following query against a known public dataset:


    ```

    SELECT *

    FROM OPENROWSET(

    BULK ''abs://nyctlc@azureopendatastorage.blob.core.windows.net/yellow/puYear=2001/puMonth=1'',

    FORMAT = ''parquet''

    ) AS taxidata;

    GO

    ```


    You can see how easily it is to get started with data virtualization *with no
    configuration* required for your Managed Instance.


    Another powerful feature of data virtualization is the ability to create an external
    table and export data at the same time. We called this CREATE TABLE AS SELECT
    (CETAS). One of the benefits of this capability is to take the result of this
    data as Parquet files and create a “cold data” solution integrated with Microsoft
    Fabric. The scenario looks like Figure [9-2](#496204_2_En_9_Chapter.xhtml#Fig2).


    ![](images/496204_2_En_9_Chapter/496204_2_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Using data virtualization for integration with Microsoft Fabric


    The concept here is to switch a SQL partition that is considered “cold” to a separate
    table. Then use the CETAS concept to export this table to Azure Storage as Parquet.
    Since this is an external table, you can query the parquet data as a table. In
    addition, you can use the concept of a shortcut in Microsoft Fabric to easily
    integrate this data into Microsoft Fabric. You can see this in action on an episode
    of Data Exposed I was in hosted by Anna Hoffman at [`https://learn.microsoft.com/shows/data-exposed/sql-integration-with-microsoft-fabric-data-exposed`](https://learn.microsoft.com/shows/data-exposed/sql-integration-with-microsoft-fabric-data-exposed).
    You will see in the next chapter a more efficient method to synchronize your SQL
    data with the Microsoft Fabric with a concept called *mirroring*.


    Learn more about data virtualization with Azure SQL Managed Instance at [`https://aka.ms/midatavirt`](https://aka.ms/midatavirt).


    While Azure SQL Database does not support Polybase in this fashion, it does support
    external tables to use for elastic scale query. This means that you can technically
    set up an **external data source** to another Azure SQL Database logical server
    and database and define an external table with that data source. So, you can now
    query the remote database as an external table or even join a local table with
    the remote database table. You can review the T-SQL reference for external data
    source for Azure SQL Database at [`https://learn.microsoft.com/sql/t-sql/statements/create-external-data-source-transact-sql?view=azuresqldb-current&tabs=dedicated#overview-azure-sql-database`](https://learn.microsoft.com/sql/t-sql/statements/create-external-data-source-transact-sql?view=azuresqldb-current&tabs=dedicated#overview-azure-sql-database).


    Take a look at a cool example of using this capability from my colleague Dimitri
    Furman where he uses external tables to look at Hyperscale read-scale monitoring.
    You can find the source at [`https://github.com/dimitri-furman/samples/tree/master/azure-sql-readscale-monitoring`](https://github.com/dimitri-furman/samples/tree/master/azure-sql-readscale-monitoring)


    ### Database Mail


    SQL Server has supported a built-in *mail* capability since back in the days of
    SQL Server 4.21 for Windows NT. The latest version of this feature is called **Database
    Mail**. The concept is that you can use T-SQL to send mail messages based on the
    Simple Mail Transfer Protocol (SMTP). If you have never used Database Mail before,
    you can learn more at [`https://learn.microsoft.com/sql/relational-databases/database-mail/database-mail`](https://learn.microsoft.com/sql/relational-databases/database-mail/database-mail).


    We introduced support for Database Mail as a feature for Azure SQL Managed Instance
    as this was a capability many customers who were trying to use Azure SQL Database
    desired as part of their migration. Database Mail is an *instance* feature which
    makes sense why it is part of Azure SQL Managed Instance.


    One of the common scenarios for using Database Mail is for alerts for SQL Server
    Agent jobs. There are a few configuration differences to use Database Mail for
    SQL Server Agent jobs. Read more at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#sql-server-agent`](https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#sql-server-agent).
    Just about everything else is the same to use Database Mail with Azure SQL Managed
    Instance except for these two differences as called out in the documentation:


    *   sp_send_dbmail cannot send attachments using the @file_attachments parameter.
    Local file system and external shares or Azure Blob Storage are not accessible
    from this procedure.


    *   The @query parameter in the sp_send_db_mail procedure doesn''t work.'
  trans: "\n### 外部表\n\n在 SQL Server 2016 中，我们引入了一项名为 `Polybase` 的功能，它使用 `T-SQL` 对象\
    \ `EXTERNAL TABLE` 来指向 Hadoop 文件系统。在 SQL Server 2019 中，我们将此功能扩展到包括其他数据源，例如 SQL\
    \ Server、Oracle、MongoDB、Teradata 以及其他支持 ODBC 驱动程序的源。我们将此功能称为 `数据虚拟化`，因为数据访问是远程的，但通过外部表，它*感觉就像*数据是本地的一样。\n\
    \n在 SQL Server 2022 中，我们引入了一种新的 `Polybase` 方法，通过支持使用 `REST API` 而不是之前的 ODBC 方法来访问\
    \ `Azure 存储`的外部数据源。`REST` 提供了一种更轻量级的方法，因为它是在 SQL 引擎内部执行的。此外，外部表可用于将数据读取或写入 `Parquet`、`CSV`\
    \ 和 `Delta`（仅限读取）等文件格式。\n\n使用 `Polybase` 与 Azure SQL 托管实例的过程与 SQL Server 2022\
    \ 类似，如图 9-1 所示。\n\n![](img/496204_2_En_9_Fig1_HTML.jpg)\n\n图 9-1\n使用 `REST API`\
    \ 为 SQL Server 2022 实现数据虚拟化\n\n对于 Azure SQL 托管实例，有一种更易于管理的方法可用。虽然你仍然拥有外部数据源、文件格式和外部表，但与图\
    \ 9-1 相比有以下不同：\n\n*   无需安装 `Polybase` 功能，因为它已经为托管实例“安装”好了。\n*   无需使用 `sp_configure`\
    \ 配置 `Polybase`，因为它已经启用。\n*   在撰写本书时，尚不支持 `S3`，因此仅支持 `Azure Blob 存储 (abs)` 和 `Azure\
    \ 数据湖存储 (adls)` 数据源。\n\n你仍然需要一个 `数据库范围凭据` 来访问任何私有存储账户，但 Azure SQL 托管实例相对于 SQL\
    \ Server 2022 的一个优点是它也支持 `托管标识`。\n\n开始使用此功能的最佳方法是连接到你的 Azure SQL 托管实例，并针对已知的公共数据集尝试以下查询：\n\
    \n```sql\nSELECT *\nFROM OPENROWSET(\n    BULK 'abs://nyctlc@azureopendatastorage.blob.core.windows.net/yellow/puYear=2001/puMonth=1',\n\
    \    FORMAT = 'parquet'\n) AS taxidata;\nGO\n```\n\n你可以看到，对于你的托管实例，开始使用 `数据虚拟化`\
    \ 是多么容易，且*无需任何配置*。\n\n`数据虚拟化` 的另一个强大功能是能够同时创建外部表并导出数据。我们称之为 `CREATE TABLE AS SELECT\
    \ (CETAS)`。此功能的好处之一是，可以将此数据的结果作为 `Parquet` 文件，并创建一个与 `Microsoft Fabric` 集成的“冷数据”解决方案。该场景如图\
    \ 9-2 所示。\n\n![](img/496204_2_En_9_Fig2_HTML.jpg)\n\n图 9-2\n使用 `数据虚拟化` 与 `Microsoft\
    \ Fabric` 进行集成\n\n这里的核心概念是，将被认为是“冷”的 SQL 分区切换到单独的表中。然后使用 `CETAS` 概念将此表作为 `Parquet`\
    \ 导出到 Azure 存储。由于这是一个外部表，你可以将 parquet 数据作为表进行查询。此外，你可以利用 `Microsoft Fabric` 中的快捷方式概念，轻松地将此数据集成到\
    \ `Microsoft Fabric` 中。你可以在 Anna Hoffman 主持的 `Data Exposed` 节目中看到实际操作，链接为 [`https://learn.microsoft.com/shows/data-exposed/sql-integration-with-microsoft-fabric-data-exposed`](https://learn.microsoft.com/shows/data-exposed/sql-integration-with-microsoft-fabric-data-exposed)。你将在下一章中看到一种更高效的方法，使用称为\
    \ `镜像` 的概念将你的 SQL 数据与 `Microsoft Fabric` 同步。\n\n在 [`https://aka.ms/midatavirt`](https://aka.ms/midatavirt)\
    \ 了解更多关于 Azure SQL 托管实例的 `数据虚拟化` 信息。\n\n虽然 Azure SQL 数据库不以这种方式支持 `Polybase`，但它确实支持外部表用于\
    \ `弹性缩放查询`。这意味着，从技术上讲，你可以设置一个指向另一个 Azure SQL 数据库逻辑服务器和数据库的 `外部数据源`，并使用该数据源定义一个外部表。因此，你现在可以将远程数据库作为外部表进行查询，甚至可以将本地表与远程数据库表进行联接。你可以在\
    \ [`https://learn.microsoft.com/sql/t-sql/statements/create-external-data-source-transact-sql?view=azuresqldb-current&tabs=dedicated#overview-azure-sql-database`](https://learn.microsoft.com/sql/t-sql/statements/create-external-data-source-transact-sql?view=azuresqldb-current&tabs=dedicated#overview-azure-sql-database)\
    \ 查阅 Azure SQL 数据库外部数据源的 `T-SQL` 参考。\n\n看看我的同事 Dimitri Furman 使用此功能的一个很酷的例子，他使用外部表来查看\
    \ `Hyperscale` `读取副本监控`。你可以在 [`https://github.com/dimitri-furman/samples/tree/master/azure-sql-readscale-monitoring`](https://github.com/dimitri-furman/samples/tree/master/azure-sql-readscale-monitoring)\
    \ 找到源代码。\n\n## 数据库邮件\n\n自 SQL Server 4.21 for Windows NT 时代起，SQL Server 就支持内置的\
    \ `邮件` 功能。此功能的最新版本称为 `数据库邮件`。其概念是，你可以使用 `T-SQL` 基于简单邮件传输协议 (`SMTP`) 发送邮件消息。如果你以前从未使用过\
    \ `数据库邮件`，可以在 [`https://learn.microsoft.com/sql/relational-databases/database-mail/database-mail`](https://learn.microsoft.com/sql/relational-databases/database-mail/database-mail)\
    \ 了解更多信息。\n\n我们将 `数据库邮件` 作为一项功能引入 Azure SQL 托管实例，因为许多尝试使用 Azure SQL 数据库的客户在迁移过程中都希望拥有此功能。`数据库邮件`\
    \ 是一项*实例*级功能，这解释了它为何是 Azure SQL 托管实例的一部分。\n\n使用 `数据库邮件` 的常见场景之一是用于 SQL Server\
    \ 代理作业的警报。为 SQL Server 代理作业使用 `数据库邮件` 有一些配置上的差异。请在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#sql-server-agent`](https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#sql-server-agent)\
    \ 阅读更多信息。在 Azure SQL 托管实例上使用 `数据库邮件`，除了文档中指出的这两点不同外，其他几乎所有方面都是相同的：\n\n*   `sp_send_dbmail`\
    \ 不能使用 `@file_attachments` 参数发送附件。此存储过程无法访问本地文件系统、外部共享或 Azure Blob 存储。\n*   `sp_send_db_mail`\
    \ 存储过程中的 `@query` 参数不起作用。\n"
- fmt: '# Service Broker


    Back in SQL Server 2005, we heard from our customers that they wanted to build
    service-oriented applications using asynchronous messaging techniques. We designed
    and built a system called `Service Broker` that uses the power of SQL Server tables,
    programming, and communication to implement a messaging system within the SQL
    Server engine. If you have never used `Service Broker`, you can get started at
    [`https://learn.microsoft.com/sql/database-engine/configure-windows/sql-server-service-broker`](https://learn.microsoft.com/sql/database-engine/configure-windows/sql-server-service-broker).


    `Service Broker` is another example of an instance feature, and we do not support
    this capability with Azure SQL Database. `CloudLifter` to the rescue again. We
    support `Service Broker` applications with Azure SQL Managed Instance. One major
    exception is that we only support `Service Broker` between Managed Instances.
    See the full set of differences at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#service-broker`](https://learn.microsoft.com/azure/azure-sql/managed-instance/transact-sql-tsql-differences-sql-server?view=azuresql#service-broker).


    # Full-Text Search


    Full-text search has been an integrated component of the SQL Server engine for
    many releases. Full-text search provides searching capabilities through T-SQL
    against `text` data stored in the database. Even though full-text search is technically
    an instance-level feature for SQL Server, we support this for both Azure SQL Managed
    Instance and Databases. You can read about how to get started with full-text search
    at [`https://learn.microsoft.com/sql/relational-databases/search/full-text-search`](https://learn.microsoft.com/sql/relational-databases/search/full-text-search).


    There are a few limitations with full-text when it comes to Azure SQL:


    *   "Third-party filters" are not supported (examples are Office and .pdf filters).

    *   You cannot manage aspects to the services that support full-text like `fdhost`.

    *   Semantic search is not supported.


    # Machine Learning Services


    In SQL Server 2016, we introduced `R Services` for SQL Server. The concept is
    that we would use a new architecture to allow you to run R programs in a secure,
    isolated, and scalable manner `on the same computer` as SQL Server. In SQL Server
    2017, we added Python support and rebranded this capability as `Machine Learning
    Services`.


    We eventually enabled this capability in Azure SQL Managed Instance (it is not
    available in Azure SQL Database) with a few caveats:


    *   You need to enable the feature using `sp_configure` with the `external scripts
    enabled` option.

    *   Java was added as an extensibility language in SQL Server 2019 but is not
    available in Azure SQL Managed Instance.

    *   There are R and Python packages installed, but if you need something different,
    you may need to use a tool called `sqlmlutils`. Read more at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences?view=azuresql#python-and-r-packages`](https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences?view=azuresql#python-and-r-packages).

    *   You cannot use custom resource governance for the execution of R and Python.


    Read the complete list of differences at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences`](https://learn.microsoft.com/azure/azure-sql/managed-instance/machine-learning-services-differences).


    # Distributed Transactions (DTC)


    `DTC` support was a new feature enabled for Azure SQL Managed Instance since the
    first edition of the release of this book. This feature was often seen as a blocker
    by customers to migrate from SQL Server, so the Managed Instance engineering team
    enabled this for the cloud.


    It is important first to call out when to use the `DTC` feature for Managed Instance
    vs. supporting a distributed database transaction across Azure cloud services.


    You can execute distributed transactions (with `.Net` libraries) across Azure
    SQL Database or across databases for Azure SQL Managed Instance with a concept
    called `native support` for distributed transactions. You cannot use this across
    Azure SQL Database and Azure SQL Managed Instance. Read more about native support
    at [`https://learn.microsoft.com/azure/azure-sql/database/elastic-transactions-overview`](https://learn.microsoft.com/azure/azure-sql/database/elastic-transactions-overview).


    `DTC` support for Azure SQL Managed Instance provides the ability to run distributed
    transactions in `mixed` environments or Azure SQL Managed Instances (including
    with T-SQL). Mixed environment can be any system that supports distributed transaction
    protocols like `XA`, including on-premises SQL Server instances. In this scenario,
    Azure SQL Managed Instance manages all aspects of `DTC` like the `DTC` Service
    that is managed by Windows Server on-premises. For distributed transactions across
    Managed Instances, you will also want to take advantage of a security model called
    a `server trust group`. This provides authentication models across instances for
    scenarios like `DTC`, `Service Broker`, and linked servers using Microsoft Entra.
    Learn more about server trust groups at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/server-trust-group-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/server-trust-group-overview).
    There are network connectivity considerations to configure for `DTC` with Managed
    Instance. Learn more at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/distributed-transaction-coordinator-dtc`](https://learn.microsoft.com/azure/azure-sql/managed-instance/distributed-transaction-coordinator-dtc).


    # xp_cmdshell


    `xp_cmdshell` is a system-supported extended stored procedure (`xproc`) in SQL
    Server. This `xproc` runs as a `DLL` in the process space of SQL Server but creates
    a new process on the SQL Server computer to run the command you provide as a parameter.
    While a nifty feature of SQL Server for years, some administrators disable the
    use of this procedure because it is considered a security vulnerability. For that
    reason, we don’t support `xp_cmdshell` in Azure SQL.


    There really isn’t anything equivalent for Azure SQL to run commands from a T-SQL
    procedure that is invoked by the engine. You would need to bring this code outside
    of your server-side programming logic into a script or application.


    # Job Management


    As part of managing a SQL Server environment, you will no doubt want to schedule
    `jobs` to execute various tasks related to your SQL Server. Let’s review what
    options you have to perform various aspects for job management with your Azure
    SQL deployment.'
