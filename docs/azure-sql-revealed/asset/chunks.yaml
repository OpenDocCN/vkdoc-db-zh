  trans: '

    ### 使用 CLI 部署


    Azure 托管实例可以通过命令行界面 (CLI) 使用 `az sql mi`（[`learn.microsoft.com/cli/azure/sql/mi`](https://learn.microsoft.com/cli/azure/sql/mi)）命令接口或通过
    `New-AzSQLInstance` PowerShell cmdlet（[`learn.microsoft.com/powershell/module/az.sql/new-azsqlinstance`](https://learn.microsoft.com/powershell/module/az.sql/new-azsqlinstance)）进行部署。


    我尝试使用 `az sql mi` 构建一个示例，发现需要运行多个 `az` CLI 命令来创建虚拟网络、子网以及所有关联设置。因此，我只建议你在使用 *Azure
    模板* 时配合使用 `az sql mi` CLI。可以在 [`learn.microsoft.com/azure/azure-sql/managed-instance/create-template-quickstart?view=azuresql&tabs=azure-cli`](https://learn.microsoft.com/azure/azure-sql/managed-instance/create-template-quickstart%3Fview%3Dazuresql%26tabs%3Dazure-cli)
    找到一个示例模板。


    **提示**


    就像我之前向你展示如何使用 Azure 中的 Copilot 通过 `az` CLI 创建数据库一样，它也可以为你提供关于如何为 Azure SQL 托管实例执行此操作的提示和示例。它还提供选项来帮助你配置虚拟网络和子网。


    PowerShell 要求你在执行 `New-AzSQLInstance` 之前设置虚拟网络和其他上下文。在 [`learn.microsoft.com/azure/azure-sql/managed-instance/scripts/create-configure-managed-instance-powershell`](https://learn.microsoft.com/azure/azure-sql/managed-instance/scripts/create-configure-managed-instance-powershell)
    有一个关于使用 PowerShell 的优质教程。


    正如我在本章前面提到的，你还可以选择使用 Bicep 和 Terraform 来部署 Azure SQL 托管实例。


    ### 实现细节


    **注意**


    随着我们对服务的更改和改进，这些实现细节可能会随时间而变化。我提供其中一些细节，是为了让你了解我们如何构建、管理和运行该服务。


    Azure SQL 托管实例部署在由 Azure Service Fabric 提供支持的节点（虚拟机）上，采用一种称为*环*或*虚拟集群*的概念。虚拟集群是在虚拟网络子网中运行的一组专用的隔离虚拟机。


    正如我在示例中所做的那样，当你在新虚拟网络（子网）中部署第一个托管实例时，实际上是在部署一个完整的虚拟集群。这就解释了为什么初始部署可能需要很长时间才能完成。你可以在*同一虚拟网络子网*中部署其他托管实例，部署速度会稍快一些。更多关于预期时间的具体信息，请访问
    [`learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview)。


    托管实例是一个完整的 SQL Server 引擎数据库实例，部署在虚拟集群中的一台专用虚拟机上。Microsoft 将决定如何在集群的各个节点上部署这些虚拟机。一个节点可能有一台装有实例的虚拟机，也可能是多台虚拟机。根据平台即服务
    (PaaS) 的承诺，Microsoft 将这些细节抽象化，使你无需关心。你与托管实例的交互是通过标准的 SQL Server 接口（如 T-SQL）或 Azure
    接口（如门户、CLI 或 REST API）进行的。你永远不会直接访问底层虚拟机。


    这种架构也解释了为什么某些管理操作（例如扩展 vCores）也可能需要很长时间，因为其中一些操作需要部署一个新的虚拟集群，可能涉及从 Azure Storage
    附加文件或重新设定副本。


    我在本书第 2 章中描述了通用型 (GP) 与业务关键型 (BC) 层的一些架构。我将在本书第 8 章中进一步描述它们。这两种服务层都使用相同的虚拟集群架构，只是存储和高可用性实现方式不同。


    托管实例的 `资源限制`（如内存限制、最大存储大小等）通过多种机制强制执行，具体取决于你的部署选择。例如，内存限制是通过 Windows 作业对象强制执行的（并且你无法配置
    `"最大服务器内存"`）。你可以在 [`learn.microsoft.com/en-us/windows/win32/procthread/job-objects`](https://learn.microsoft.com/en-us/windows/win32/procthread/job-objects)
    阅读更多关于 *Windows 作业对象* 的信息。存储容量（或最大大小）由文件服务器资源管理器 (FSRM) 强制执行，你可以在 [`learn.microsoft.com/windows-server/storage/fsrm/fsrm-overview`](https://learn.microsoft.com/windows-server/storage/fsrm/fsrm-overview)
    阅读更多相关信息。


    *托管实例池部署* 可以快得多，因为实例池可以是一组在同一虚拟机中运行的 SQL Server 实例。隔离和资源限制通过 Windows 作业对象应用。图
    4-11 展示了托管实例与池的架构对比图。此图源自文档 [`learn.microsoft.com/en-us/azure/azure-sql/managed-instance/instance-pools-overview?view=azuresql#architecture`](https://learn.microsoft.com/en-us/azure/azure-sql/managed-instance/instance-pools-overview%3Fview%3Dazuresql%23architecture)。


    ![](img/496204_2_En_4_Fig11_HTML.jpg)

    图 4-11: 托管实例与池的架构


    ### 连接并验证部署


    部署完成后，你的屏幕应如图 4-12 所示。


    ![](img/496204_2_En_4_Fig12_HTML.jpg)

    图 4-12: 托管实例部署完成


    让我们看一下屏幕上的几个细节：


    1.  如果你想要部署摘要，可以选择 `操作详细信息`，除其他信息外，它还可以显示部署的持续时间。

    2.  你可以通过在活动日志中选择 `更多事件` 来获取有关部署每个步骤的更多详细信息。

    3.  你可以选择 `转到资源` 在 Azure 门户中查看已完成的部署。


    如果你点击 `转到资源`，你将看到一个类似于图 4-13 的屏幕。


    ![](img/496204_2_En_4_Fig13_HTML.jpg)

    图 4-13: Azure SQL 托管实例的“概述”屏幕


    此时，你可能想要采取的第一步是尝试连接到新实例并验证部署。我喜欢使用一组简单的 T-SQL 查询来验证我的 SQL Server 安装。

    '
- fmt: '## Connect to a Managed Instance


    There are several different methods to connect to your Managed Instance, and you
    can see all of them at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/connect-application-instance`](https://learn.microsoft.com/azure/azure-sql/managed-instance/connect-application-instance).


    What I personally like to do is connect with an Azure Virtual Machine *inside*
    the virtual network that was created as part of the deployment, so I don’t have
    to enable the public endpoint. I call this virtual machine a ***jumpbox***. I’ll
    use RDP to connect to the VM, but in the VM, I use tools like SSMS to connect
    to the private network for the instance.


    I’ll create a new Azure Virtual Machine (I just use a SQL Server Developer Edition
    from the marketplace) in the same resource group as my Managed Instance. During
    deployment of the VM, I’ll choose the virtual network created for the Managed
    Instance (usually vnet-<MI name>, so the name was vnet-bwsqlnextgeni). On this
    screen, I choose to manage subnet configuration. This allows me to create a new
    subnet called default (and use the default choices). This becomes the private
    subnet for applications like my VM to connect to the virtual network of the Managed
    Instance.


    My network settings look like Figure [4-14](#496204_2_En_4_Chapter.xhtml#Fig14).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig14_HTML.jpg)


    Figure 4-14


    Networking settings for VM jumpbox to Managed Instance


    With my jumpbox now deployed, I will use SSMS inside the VM to connect to the
    Managed Instance. When you connect to a Managed Instance, the server’s name becomes
    a URL like this (which you can find on the Overview screen in the portal for the
    Managed Instance).


    ### bwsqlminextgen.b243ea7f888c.database.windows.net


    Figure [4-15](#496204_2_En_4_Chapter.xhtml#Fig15) shows an example of SSMS connected
    to an Azure SQL Managed Instance.


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig15_HTML.jpg)


    Figure 4-15


    SSMS connected to Azure SQL Managed Instance through a jumpbox


    ## Verify the Deployment


    Notice that Object Explorer in SSMS looks almost identical to a SQL Server except
    for the Fully Qualified Domain Name (FQDN) for the server name.


    To verify the installation of SQL Server, I often use a few techniques, including
    running queries against system catalog views and DMVs, and look at the ERRORLOG.


    ### Examining the ERRORLOG


    You do not have access to the file system for the virtual machine hosting the
    Managed Instance. To look at the ERRORLOG, we will need a tool like SSMS or T-SQL.


    You can use Object Explorer in SSMS to view the ERRORLOG, but I prefer just T-SQL,
    so I can execute `sp_readerrorlog` to look at the current ERRORLOG file. I must
    warn you that we dump all types of extra information in the ERRORLOG for a Managed
    Instance (yes, even more than a SQL Server), and it can take several seconds to
    execute. My colleague Dimitri Furman wrote a blog post with some sample code to
    filter down the ERRORLOG for a Managed Instance. You can view this at [`https://techcommunity.microsoft.com/t5/datacat/azure-sql-db-managed-instance-sp-readmierrorlog/ba-p/305506`](https://techcommunity.microsoft.com/t5/datacat/azure-sql-db-managed-instance-sp-readmierrorlog/ba-p/305506).


    There are a few key messages I look at startup in the ERRORLOG and found these
    in my Managed Instance:


    ```

    SQL Server detected 1 sockets with 4 cores per socket and 8 logical processors
    per socket, 8 total logical processors; using 8 logical processors based on SQL
    Server licensing. This is an informational message; no user action is required.

    SQL Server is starting at normal priority base (=7). This is an informational
    message only. No user action is required.

    Detected 44645 MB of RAM. This is an informational message; no user action is
    required.

    ```


    I can see that eight logical processors were detected, which is what I expect
    given I deployed an 8-vCore instance.


    The memory detected is how much memory the SQL Server engine detects from the
    host or VM. You will see in several places in the book how Azure will use Windows
    Job Objects to limit the memory visible to SQL Server to enforce resource limits
    per service tier and vCores. You will find for this Managed Instance the job object
    will not allow SQL Server to access all the memory as shown here in the ERRORLOG.
    In fact, you should never rely on what the ERRORLOG shows but instead on the DMV
    `sys.dm_os_job_object`, which I will show you how to use in the next section.'
