    the instance is stopped (but you still pay for storage). However, starting a stopped
    instance could take up to 20 minutes.'
  trans: '### 计算与存储


    你在本书的第 4 章中，已经了解了根据所选服务层级而异的各种计算和存储选项。


    请记住，对于`托管实例`，对`vCores`、硬件配置和/或最大存储的更改，可能会导致一个需要一些时间才能完成的管理操作。例如，为`通用型`服务层级扩展存储最快可能只需五分钟。然而，为任何服务层级扩展`vCores`都可能需要一个小时。此外，许多影响`业务关键型`服务层级的操作，可能需要将数据库重新分配到另一个节点。由于任何更改在“切换”完成前都不会影响你的应用程序，因此停机时间是最少的。请记住，`通用型`服务层级的`下一代`版本包含了将`IOPS`与计算和存储分开配置的能力。


    所有操作及其预期时长的完整列表可在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-overview)
    找到。


    ### 网络配置


    一旦你部署了`托管实例`，你可能需要对该实例的网络配置进行一些调整。


    你可以选择`将托管实例移动到另一个子网`，这可以在当前虚拟网络内进行，也可以移动到不同的虚拟网络。你可以将此过程想象成：使用你的实例和所有已移动的数据库来预配一个新的虚拟集群，然后移除现有的集群。与其他管理操作一样，这可能是一个漫长的过程，但你的停机时间是最少的。所有详细信息请参阅
    [`https://learn.microsoft.com/azure/azure-sql/managed-instance/vnet-subnet-move-instance`](https://learn.microsoft.com/azure/azure-sql/managed-instance/vnet-subnet-move-instance)。


    你可以`启用公共端点`（我在部署时将其保持为禁用状态）并`将连接类型`更改为`代理`（这是默认设置，但我在部署时选择了`重定向`）。


    此外，部署期间还提供了另一个选项，即`最低 TLS 版本`。传输层安全协议 (`TLS`) 是一种用于加密连接的协议，受到 `SQL Server` 和 Azure
    SQL 的支持。`TLS 1.2` 是目前推荐的最低支持版本，因为它修复了早期版本中发现的一些漏洞。但是，请谨慎使用此设置，因为它可能会导致使用不支持该 `TLS`
    版本驱动程序的应用程序无法连接。你可以在 [`https://learn.microsoft.com/azure/azure-sql/database/connectivity-settings?view=azuresql&tabs=azure-portal#minimum-tls-version`](https://learn.microsoft.com/azure/azure-sql/database/connectivity-settings%253Fview%253Dazuresql%2526tabs%253Dazure-portal%2523minimum-tls-version)
    阅读更多关于最低 `TLS` 版本的信息。


    `托管实例`的网络选项也可以使用 `az sql mi update` 和 PowerShell 命令 `Set-AzSqlInstance` 进行配置。


    我将在本书的第 6 章讨论添加专用端点连接的功能。


    ### 维护


    你可以使用`“设置和维护更新”`选项来配置维护窗口、设置维护活动的警报以及控制更新策略。


    正如我在本书第 4 章中所描述的，Azure SQL `托管实例`支持`维护窗口`。这允许你为已部署实例的计划维护定义一个不同的时间段。你可以选择不同的日期范围和时间段，而不是默认设置（即每周任何一天的下午
    5 点到早上 8 点）。


    此外，你可以设置`警报`，以便在需要进行计划维护活动时提前通知你。


    最后，你可以配置我在本书第 4 章中描述过的`更新策略`。这使你可以保持与 `SQL Server 2022` 的兼容性（允许你将备份恢复到 `SQL Server
    2022` 并设置在线灾难恢复），或者选择“始终保持最新”选项，该选项是用于持续更新的无版本引擎。


    无论配置的更新策略如何，所有实例都将继续接收那些不需要更改 `SQL` 引擎的更新和功能，例如以下功能：区域冗余、实例启停和快速预配。


    重要提示


    如果你选择了`始终保持最新`策略，则无法回退到 `SQL Server 2022` 策略。


    ### 启动和停止


    自本书第一版以来，Azure SQL `托管实例`团队构建的一个很酷的功能就是能够启动和停止实例，包括按计划进行。


    你可以在 Azure 门户中按图 5-1 所示的方式进行配置。


    ![](img/496204_2_En_5_Fig1_HTML.jpg)


    图 5-1


    启动和停止 Azure SQL 托管实例


    此功能可以节省大量成本，因为当实例停止时，你无需为计算资源付费（但仍需支付存储费用）。但是，启动一个已停止的实例可能需要长达 20 分钟。'
- fmt: '### Configuring Databases


    Once you deploy an Azure SQL Managed Instance, you can now add databases or configure
    existing databases using the Azure Portal, tools like SSMS, or the T-SQL `CREATE
    DATABASE` or `ALTER DATABASE` statements.


    The `CREATE DATABASE` T-SQL syntax is very simple since you do not specify files
    or any `WITH` options. For example, for the Managed Instance I deployed, I can
    run the following T-SQL statement to create a new database:


    ```sql

    CREATE DATABASE gocowboys;

    ```


    The new database will take on the properties of the `model` database just like
    SQL Server. The one difference is that we automatically create a memory-optimized
    filegroup called `XTP`, which you can see if you query the `sys.filesgroups` catalog
    view. We create the `XTP` filegroup even if you are using the General Purpose
    service tier which does not support In-Memory OLTP. This makes it easier to support
    this feature if you move to Business Critical.


    This database will also take on the properties set by `model` and is like SQL
    Server except for two key options that are on by default: `Query Store` and `Accelerated
    Database Recovery`.


    Once a database is created, you can use the `ALTER DATABASE` statement to make
    various changes to options or to add/remove files and filegroups. One of the nifty
    things we have done with the T-SQL documentation is to allow you to choose a product
    to see the exact syntax support for statements like `ALTER DATABASE`. Figure 5-2
    shows the documentation reference for `ALTER DATABASE` (which is at [`https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql?view=azuresqldb-mi-current`](https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql?view=azuresqldb-mi-current))
    after I selected Managed Instance:


    ![Figure 5-2](images/496204_2_En_5_Chapter/496204_2_En_5_Fig2_HTML.jpg)


    Most of the `SET` options you normally see for SQL Server are available for Managed
    Instance. One notable exception is `ACCELERATED_DATABASE_RECOVERY`. We turn on
    this option by default for your database and do not allow you to disable it. Why?
    It is important for this option to be on for us to meet SLA requirements and ensure
    you do not have issues with running out of transaction log space.


    One of the most significant advances for Managed Instance since the first edition
    of this book is to allow 500 databases per instance.


    One of the key options for a database is the database compatibility level, and
    Managed Instance supports setting the `dbcompat` with `ALTER DATABASE`. Compat
    levels `90` through `160` are currently supported for Managed Instance databases.
    Read more about `dbcompat` at [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat).


    **Note**


    If you restore a backup from an existing SQL Server database or Managed Instance,
    we will retain the `dbcompat` level of that database when it was backed up.


    Even though you do not have to worry about physical file placement, you do have
    the ability to add database files and change file sizes up to the maximum instance
    storage limit. You can also create filegroups. A good example of why you might
    want to increase the number of files or size is to improve I/O performance. My
    colleague Jovan Popovic has a very nice blog post describing how to do this at
    [`https://medium.com/azure-sqldb-managed-instance/increasing-data-files-might-improve-performance-on-general-purpose-managed-instance-tier-6e90bad2ae4b`](https://medium.com/azure-sqldb-managed-instance/increasing-data-files-might-improve-performance-on-general-purpose-managed-instance-tier-6e90bad2ae4b).


    Having said that, the new NextGen Azure SQL Managed Instance doesn’t require you
    to use multiple files to increase I/O performance because you can control IOPS
    separately. NextGen also just gives you lower I/O latency, higher IOPS, and better
    I/O throughput. Check out this blog post to learn more: [`https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-azure-sql-managed-instance-next-gen-gp/ba-p/4092647`](https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-azure-sql-managed-instance-next-gen-gp/ba-p/4092647).


    **Note**


    SQL Server Managed Studio (SSMS) also supports changing database options and file
    options as you can with SQL Server.


    It is also important to know that the `ALTER DATABASE SCOPED CONFIGURATION` T-SQL
    statement is supported for Azure SQL Managed Instance just like SQL Server. You
    can read more at [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql).


    ## Configuring Azure SQL Database


    Since deploying an Azure SQL Database is effectively creating a database, you
    may want to configure some settings about the database from the deployment. You
    may also want to perform some configuration on the logical server associated with
    the database, including creating a new database on the logical server.'
  raw: '### Configuring Databases


    Once you deploy an Azure SQL Managed Instance, you can now add databases or configure
    existing databases using the Azure Portal, tools like SSMS, or the T-SQL CREATE
    DATABASE or ALTER DATABASE statements.


