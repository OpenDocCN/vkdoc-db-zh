    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Azure SQL Managed Instance Networking Options


    ##### Virtual Network


    You can see at the top of the screen that a new virtual network will be created
    to host the Azure SQL Managed Instance. One of the advantages of Managed Instance
    is that it is deployed in a private virtual network. You could deploy your own
    Azure virtual network first (you can use the Azure portal or CLI) and select that
    virtual network on this deployment screen. If you choose to use your own virtual
    network, you must configure it a specific way, which you can read at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/vnet-existing-add-subnet`](https://learn.microsoft.com/azure/azure-sql/managed-instance/vnet-existing-add-subnet)`.`


    Tip


    Did you know you can deploy multiple instances in the same virtual network? Doing
    this will speed up subsequent deployments, but make sure this meets your security
    and networking needs.'
