    to get data context and augment a prompt with those data results to send to a
    language model.


    *   Optionally, you can use a language model to generate embeddings based on text
    data in your database and store them as a vector in a column in a table. This
    makes SQL now a *vector store* supporting *native vectors*. Then you can take
    a prompt from an application to generate an embedding from that text. You can
    then use a vector search to compare the embedding from the prompt with embeddings
    in your database. Some models are specifically designed for this purpose and are
    called embedding models (many general-purpose language models can also generate
    embeddings, but embeddings models are generally more precise). Using SQL for this
    approach has advantages since you can combine your vector search with standard
    SQL searching techniques. I call this a **hybrid search**.


    You could take this concept a step further and take the results from the hybrid
    search and augment a prompt to a language model to create an even more precise
    RAG pattern.


    Let’s now look at specific ways you can build GenAI applications with SQL using
    these techniques. In addition, we will look at a different way to use a Copilot
    experience to generate SQL queries.


    ### GenAI and SQL


    To get started with GenAI and SQL, let’s look at a simple example to interact
    with an AI model inside the SQL engine. This example uses the REST API support
    I’ve describe earlier in the chapter and comes from a blog post from my colleague
    Brian Spendolini at [`https://devblogs.microsoft.com/azure-sql/using-openai-rest-endpoints-with-azure-sql-database`](https://devblogs.microsoft.com/azure-sql/using-openai-rest-endpoints-with-azure-sql-database):


    ```

    -- Declare a variable to store the API endpoint

    declare @url nvarchar(4000)

    = N''https://skynetbeta.openai.azure.com/openai/deployments/chattykathy/chat/completions?api-version=2023-07-01-preview'';

    declare @headers nvarchar(102) = N''{"api-key":"1001001sos1001001indistress"}''

    -- Declare a variable to store the payload (request body) for the POST request.

    declare @payload nvarchar(max) = N''{"messages":[[{"role":"system","content":"You
    are an AI assistant that helps people find information."},

    {"role":"system","content":"Why is the sky blue?"}]}''

    -- Declare variables for the return status of the procedure and --- the API response
    content

    declare @ret int, @response nvarchar(max);

    exec @ret = sp_invoke_external_rest_endpoint

    @url = @url,

    @method = ''POST'',

    @headers = @headers,

    @payload = @payload,

    @timeout = 230,

    @response = @response output;

    -- Display the return code of the procedure and the response from -- the API

    select @ret as ReturnCode, @response as Response;

    ```


    In this example, the URL for the AI model is fictional. You will see an example
    later in this section of an OpenAI model in Azure. One key point here is that
    you can send *prompts* to any AI model through REST endpoints. In this case, we
    are just asking a question to a ***language model***. Notice the input or payload
    includes a system message to provide instructions on behavior and a question.


    Here is a fragment of the response which is in JSON format:


    ```

    "choices": [

    {

    "index": 0,

    "finish_reason": "stop",

    "message": {

    "role": "assistant",

    "content": "The sky appears blue because when the sun''s light enters Earth''s
    atmosphere,

    it is scattered by the gases and particles in the air. This scattering causes
    the shorter

    blue wavelengths of light to be dispersed more than the other colors in the spectrum.

    This is known as Rayleigh scattering. As a result, when we look up at the sky
    during

    the day, we see it as blue."

    },

    ```


    This example probably doesn’t represent how you would use SQL to interact with
    a language model, so let’s look at three types of methods you can use for GenAI
    applications using Azure SQL, which you can see described in Figure [10-8](#496204_2_En_10_Chapter.xhtml#Fig8).


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig8_HTML.jpg)


    Figure 10-8


    AI scenarios for Azure SQL


    Let’s look more at the scenarios in the figure and other concepts.'
  trans: "# 容器\n\n在过去几年里，容器是我所见过最出色的开发者创新之一。SQL Server 已作为容器得到完全支持，我在 *Pro SQL Server\
    \ Linux*、*SQL Server 2019 Revealed* 和 *SQL Server 2022 Revealed* 这几本书中广泛讨论了这个主题。容器使得打包\
    \ *解决方案* 变得如此简单，包括那些与 SQL Server 集成的解决方案。\n\n对于 Azure SQL，我们最近发布了一个名为 `Azure SQL\
    \ 数据库的开发容器模板` 的概念，这是一个由我的同事 Carlos Robles 主导的项目。在上面列出的书中，我谈到 SQL 容器的一个主要优势是 *一致性*。我可以部署一个具有一致版本的\
    \ SQL 容器，甚至可以包含特定的数据库脚本或任何我想要的工具，这样环境就能跨平台（Linux、MacOS、Windows）或多云环境下，始终如一地满足我的要求。\n\
    \n开发容器模板扩展了这个概念，确保我拥有一个完全一致的开发环境，包括 SQL Server、开发者框架，甚至允许使用 SDK 风格 SQL 项目的开发者工具。此外，它们还与我们的\
    \ GitHub `sql-action` 实现了无缝集成。\n\n请阅读 Carlos 的这篇博客来了解该主题：[`https://devblogs.microsoft.com/azure-sql/azure-sql-dev-containers`](https://devblogs.microsoft.com/azure-sql/azure-sql-dev-containers)。\n\
    \n> **注意**\n>\n> 当我上次与 Carlos 交流时，我们正在考虑的一个想法是打造一个*行为*类似 Azure SQL 数据库的 SQL 容器。换句话说，该容器将是一个无版本之分的数据库引擎，其功能和限制与\
    \ Azure SQL 数据库相匹配，从而为您提供与云极佳的兼容性。\n\n## SQL 与 AI\n\n我在本书第 7 章中讲述了我们在 Azure SQL\
    \ 数据库中设计和构建 Microsoft Copilot 技能的故事。同样在 2023 年夏天，我们的团队深知需要在 Azure SQL 上进行投资，以支持生成式\
    \ AI (GenAI) 应用程序。我们的 Copilot 是一个 AI 助手，也是 GenAI 应用程序的一个好例子。实际上，这个应用程序使用了检索增强生成\
    \ (RAG) 模式。RAG 模式是指应用程序*增强*发送给语言模型的提示。\n\n我们也知道，GenAI 应用程序的一个常用技术是使用 `embeddings`\
    \ 的概念来执行 `向量搜索`（有时也称为相似性搜索）。嵌入是由 AI 模型生成的向量，并由 AI 模型理解。它们对于对数据执行*更智能*的搜索非常强大。用于此目的的大多数\
    \ AI 模型被称为语言模型，其规模从大型语言模型 (LLM) 到小型语言模型 (SLM) 不等。\n\n图 10-7 是我经常展示如何将这个故事组合在一起的示意图。\n\
    \n![](img/496204_2_En_10_Fig7_HTML.jpg)\n\n*图 10-7. 结合数据库的 GenAI 应用程序基础*\n\n这个示意图主要需要关注两个概念：\n\
    \n*   您可以使用标准的 SQL 搜索技术来获取数据上下文，并用这些数据结果增强提示，然后发送给语言模型，从而构建 RAG 模式应用程序。\n*   或者，您可以使用语言模型根据数据库中的文本数据生成嵌入，并将其作为向量存储在表的列中。这使得\
    \ SQL 现在成为一个支持*原生向量*的*向量存储*。然后，您可以获取应用程序的提示来生成该文本的嵌入。接着，您可以使用向量搜索将提示的嵌入与数据库中的嵌入进行比较。有些模型是专门为此目的设计的，称为嵌入模型（许多通用语言模型也可以生成嵌入，但嵌入模型通常更精确）。使用\
    \ SQL 来实现这种方法有优势，因为您可以将向量搜索与标准的 SQL 搜索技术结合起来。我称之为 `混合搜索`。\n\n您可以更进一步，将混合搜索的结果用来增强发送给语言模型的提示，从而创建更精确的\
    \ RAG 模式。\n\n现在，让我们看看如何使用这些技术通过 SQL 构建 GenAI 应用程序的具体方法。此外，我们还将探讨一种使用 Copilot 体验来生成\
    \ SQL 查询的不同方式。\n\n### GenAI 与 SQL\n\n要开始使用 GenAI 和 SQL，让我们看一个简单的例子，它与 SQL 引擎内的\
    \ AI 模型进行交互。此示例使用了我在本章前面描述过的 REST API 支持，它来源于我的同事 Brian Spendolini 的一篇博客文章：[`https://devblogs.microsoft.com/azure-sql/using-openai-rest-endpoints-with-azure-sql-database`](https://devblogs.microsoft.com/azure-sql/using-openai-rest-endpoints-with-azure-sql-database)：\n\
    \n```sql\n-- 声明一个变量来存储 API 端点\ndeclare @url nvarchar(4000)\n= N'https://skynetbeta.openai.azure.com/openai/deployments/chattykathy/chat/completions?api-version=2023-07-01-preview';\n\
    declare @headers nvarchar(102) = N'{\"api-key\":\"1001001sos1001001indistress\"\
    }'\n-- 声明一个变量来存储 POST 请求的有效负载（请求体）。\ndeclare @payload nvarchar(max) = N'{\"messages\"\
    :[[{\"role\":\"system\",\"content\":\"You are an AI assistant that helps people\
    \ find information.\"},\n{\"role\":\"system\",\"content\":\"Why is the sky blue?\"\
    }]}'\n-- 声明用于存储过程返回状态和 API 响应内容的变量\ndeclare @ret int, @response nvarchar(max);\n\
    exec @ret = sp_invoke_external_rest_endpoint\n@url = @url,\n@method = 'POST',\n\
    @headers = @headers,\n@payload = @payload,\n@timeout = 230,\n@response = @response\
    \ output;\n-- 显示存储过程的返回代码和 API 的响应\nselect @ret as ReturnCode, @response as Response;\n\
    ```\n\n在这个例子中，AI 模型的 URL 是虚构的。在本节后面，您将看到一个 Azure 中 OpenAI 模型的例子。这里的一个关键点是，您可以通过\
    \ REST 端点向任何 AI 模型发送*提示*。在这个案例中，我们只是向一个*语言模型*提出一个问题。请注意，输入或有效负载包含一个提供行为指令的系统消息和一个问题。\n\
    \n以下是 JSON 格式的响应片段：\n\n```json\n\"choices\": \n{\n\"index\": 0,\n\"finish_reason\"\
    : \"stop\",\n\"message\": {\n\"role\": \"assistant\",\n\"content\": \"The sky\
    \ appears blue because when the sun's light enters Earth's atmosphere,\nit is\
    \ scattered by the gases and particles in the air. This scattering causes the\
    \ shorter\nblue wavelengths of light to be dispersed more than the other colors\
    \ in the spectrum.\nThis is known as Rayleigh scattering. As a result, when we\
    \ look up at the sky during\nthe day, we see it as blue.\"\n},\n```\n\n这个例子可能并不代表您会如何使用\
    \ SQL 与语言模型交互，所以让我们看看您可以用于 Azure SQL 上 GenAI 应用程序的三种类型方法，如图 [10-8 所示。\n\n![](img/496204_2_En_10_Fig8_HTML.jpg)\n\
    \n*图 10-8. Azure SQL 的 AI 场景*\n\n让我们进一步探讨图中的场景和其他概念。"
- fmt: '#### Use AI Services


    This first scenario is common to build a "chat with your data" experience where
    the components live outside of SQL. Figure 10-9 shows a visual of how these components
    work together.


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig9_HTML.jpg)


    Figure 10-9: Using Azure AI Services with your data


    Azure OpenAI Services are well integrated with Azure AI Search indexes. In this
    scenario, you can build an Azure AI search index based on an Azure SQL Database
    table. When you build the index, you can apply `skills` to the index. One of those
    skills is to generate embeddings in the index based on a column in your table.
    You can apply other skills, including content moderation, to strip out any Personally
    Identifiable Information (PII).


    With this index built, you can now build a GenAI application using a vector search
    against the index with embeddings or a RAG pattern. A simple way to do this is
    with Azure AI Studio. This tool allows you to test your various types of prompts
    which are converted into vector and/or hybrid searches against the index. You
    can use the `chat playground` as you can see in Figure 10-10.


    ![](images/496204_2_En_10_Chapter/496204_2_En_10_Fig10_HTML.jpg)


    Figure 10-10: An example of a chat playground to test an Azure Search Index


    Notice the prompt is an imprecise question using words like "tight budget" and
    "appealing." There is a place where language models shine as they understand these
    words and can use embeddings to find the right results and format them in a very
    consumable fashion. You can even take your test in the playground and build a
    simple application or your own `Copilot` on your data.


    Notice also in Figure 10-10 that Azure AI Search indexes can be automatically
    updated from the underlying SQL data using features like change data capture (CDC)
    which is supported in Azure SQL.


    See the end-to-end steps on how to try this yourself at [`https://aka.ms/sqlaisamples`](https://aka.ms/sqlaisamples).


    #### Use T-SQL for Hybrid Search


    Using the concepts I described in Figure 10-7 and earlier in the chapter, you
    can perform a hybrid search inside SQL using new capabilities in T-SQL, including
    using REST API and new T-SQL functions to process embeddings.


    My colleagues Pooja Kamath and Davide Mauri wrote a blog post announcing the private
    preview of `native vector support` which you can read at [`https://devblogs.microsoft.com/azure-sql/announcing-eap-native-vector-support-in-azure-sql-database`](https://devblogs.microsoft.com/azure-sql/announcing-eap-native-vector-support-in-azure-sql-database).


    In this example, the concept is to


    - Use REST API to Azure OpenAI with an embedding model to generate embeddings
    based on text in the database (customer reviews of food). The embeddings are returned
    in JSON format.

    - Use new T-SQL support to convert the embeddings in JSON to a binary format and
    store this in a `varbinary` column.

    - Take a prompt from the application and use REST APIs to get an embedding for
    the prompt and convert this to binary.

    - Do a vector search comparison of the prompt and the reviews in the database
    using a concept called `vector distance` like the following:


    ```

    --Assuming you have a stored procedure to get embeddings for a given text

    DECLARE @e VARBINARY(8000);

    EXEC dbo.GET_EMBEDDINGS @model = '''', @text = ''healthy options instead of coke'',
    @embedding = @e OUTPUT;

    SELECT TOP(10) ProductId,

    Summary,

    Text,

    VECTOR_DISTANCE(''cosine'',@e, VectorBinary) AS Distance

    FROM dbo.FineFoodReviews

    ORDER BY Distance;

    ```


    The lower the distance number, the more `similar` the search. In this example,
    we built a SQL procedure `GET_EMBEDDINGS` that behind the scenes use the REST
    API and language models like the following:


    ```

    CREATE PROCEDURE [dbo].[GET_EMBEDDINGS]

    (

    @model VARCHAR(MAX),

    @text NVARCHAR(MAX),

    @embedding VARBINARY(8000) OUTPUT

    )

    AS

    BEGIN

    DECLARE @retval INT, @response NVARCHAR(MAX);

    DECLARE @url VARCHAR(MAX);

    DECLARE @payload NVARCHAR(MAX) = JSON_OBJECT(''input'': @text);

    -- Set the @url variable with proper concatenation before the EXEC statement

    SET @url = ''https://.openai.azure.com/openai/deployments/'' + @model + ''/embeddings?api-version=2023-03-15-preview'';

    EXEC dbo.sp_invoke_external_rest_endpoint

    @url = @url,

    @method = ''POST'',

    @payload = @payload,

    @headers = ''{"Content-Type":"application/json", "api-key":""}'',

    @response = @response OUTPUT;

    -- Use JSON_QUERY to extract the embedding array directly

    DECLARE @jsonArray NVARCHAR(MAX) = JSON_QUERY(@response, ''$.result.data[0].embedding'');

    SET @embedding = JSON_ARRAY_TO_VECTOR(@jsonArray);

    END

    GO

    ```


    Now that you can get vector distances, you could combine this with other SQL searching
    methods or hybrid search like the following:


    ```

    -- Assuming you have a stored procedure to get embeddings for a given text

    DECLARE @e VARBINARY(8000);

    EXEC dbo.GET_EMBEDDINGS @model = '''', @text = ''quick fix breakfast option for
    toddlers'', @embedding = @e OUTPUT;

    -- Comprehensive query with multiple filters.

    SELECT TOP(10)

    f.Id,

    f.ProductId,

    f.UserId,

    f.Score,

    f.Summary,

    f.Text,

    VECTOR_DISTANCE(''cosine'', @e, VectorBinary) AS Distance,

    CASE

    WHEN LEN(f.Text) > 100 THEN ''Detailed Review''

    ELSE ''Short Review''

    END AS ReviewLength,

    CASE

    WHEN f.Score >= 4 THEN ''High Score''

    WHEN f.Score BETWEEN 2 AND 3 THEN ''Medium Score''

    ELSE ''Low Score''

    END AS ScoreCategory

    FROM FineFoodReviews f

    WHERE

    f.UserId NOT LIKE ''Anonymous%'' -- User-based filter to exclude anonymous users

    AND f.Score >= 2 -- Score threshold filter

    AND LEN(f.Text) > 50 -- Text length filter for detailed reviews

    AND (f.Text LIKE ''%gluten%'' OR f.Text LIKE ''%dairy%'') -- Inclusion of specific
    words

    ORDER BY

    Distance,  -- Order by distance

    f.Score DESC, -- Secondary order by review score

    ReviewLength DESC; -- Tertiary order by review length

    ```


    Imagine now combining the use of JSON, RegEx, spatial, inequality and equality
    operators, and vector distance to truly execute a smarter search using the power
    of SQL. That is beyond RDBMS!


    Remember that you can additionally use the results of hybrid search *with a RAG
    pattern* as Davide Mauri shows in this blog post: [`https://devblogs.microsoft.com/azure-sql/rag-with-azure-sql`](https://devblogs.microsoft.com/azure-sql/rag-with-azure-sql).


    **Note**


    This story is just going to continue to get better. This includes support for
    a vector data type, index, and other T-SQL built-in features to make the entire
    hybrid search story simpler and streamlined with your application. I will leave
    that for the next book.


    Using the SQL engine to power your GenAI application has many benefits, including


    - Familiarity of the T-SQL language

    - Integrated into the query processor and data types

    - Benefit from the scale of the engine, including Azure SQL Hyperscale

    - Use the security boundary you trust with authentication and access control in
    the engine'
