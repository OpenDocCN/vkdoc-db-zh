- fmt: '### Connection Type


    注意，在我的屏幕上，我选择的连接类型是 `Redirect`。默认是 `proxy`。代理连接要求工具或应用程序到托管实例的任何连接（连接到 TDS 端口
    `1433`）都必须始终通过 `gateway`。重定向连接类型使用网关来查找包含托管实例的节点的直接虚拟私有 IP 地址。所有后续流量直接流向该节点。你可以在
    [`https://learn.microsoft.com/azure/azure-sql/managed-instance/connection-types-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/connection-types-overview)
    阅读更多关于这些连接类型的信息。代理可能更安全，但重定向可能更快。如果你选择在此部署步骤中创建虚拟网络，虚拟网络和包含的子网将应用所有适当的网络安全组（`NSG`）规则。


    ### Public Endpoint


    你可以选择在公共端点上启用 TDS 流量。公共端点将在端口 `3342` 上启用（并在虚拟网络中重定向到节点实例端口 `1433`）。虽然我不建议在生产环境中使用此选项，但它是连接到托管实例的最快方法之一。你可以在
    [`https://learn.microsoft.com/azure/azure-sql/managed-instance/public-endpoint-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/public-endpoint-overview)
    阅读更多关于托管实例公共端点的信息。


    你还可以控制实例的最低 `TLS` 连接加密。我始终建议使用最新的 `TLS` 版本。你可能想使用不同版本的唯一原因是针对不支持该版本的旧应用程序。在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/minimal-tls-version-configure`](https://learn.microsoft.com.com/azure/azure-sql/managed-instance/minimal-tls-version-configure)
    了解更多信息。


    请注意，托管实例会自动启用加速网络。


    ### Security


    点击 `Next: Security >` 进行进一步的安全选择，如图 [4-9](#496204_2_En_4_Chapter.xhtml#Fig9) 所示。


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig9_HTML.jpg)


    图 4-9


    Azure SQL 托管实例的安全选择


    我在前面的章节中提到过 `Microsoft Defender`，相同的功能（但为托管实例定制）可用于漏洞评估和高级威胁保护。


    你可以为无密码应用程序设置自己的用户定义的 `managed identity`。默认情况下，你会获得一个系统定义的托管身份。


    如果你想在你的应用程序中对 Azure SQL 托管实例使用 `Windows Authentication`，可以启用服务主体（`Service Principal`）的选项。如果你希望避免更改应用程序以使用
    Microsoft Entra 身份验证，请考虑此选项。在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-overview)
    了解更多信息。


    `Transparent Data Encryption`（`TDE`），即数据库和事务日志存储的静态加密，默认是启用的（你需要为每个单独的数据库启用此功能）。此选项允许你设置自己的加密密钥。


    ### Additional Settings


    点击 `Next: Additional settings >` 以启用部署的一些附加选项，如图 [4-10](#496204_2_4_Chapter.xhtml#Fig10)
    所示。


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig10_HTML.jpg)


    图 4-10


    托管实例的附加设置


    这里的 `collation` 类似于为 SQL Server 设置排序规则。重要的是要知道，在此处提供之后，你无法更改实例排序规则。


    注意：在部署后，你*可以*在托管实例上设置和更改*数据库*排序规则。只需记住，不同的数据库排序规则可能会导致跨数据库查询或临时表操作出现问题。


    `time zone` 是托管实例节点上 SQL Server 引擎识别的时区。我已将其更改为我的本地时区，但也可以是 `UTC` 或你想要选择的任何时区。部署后无法更改此设置。


    托管实例可以是 `failover group` 的一部分，我们将在本书的第 [8](#496204_2_En_8_Chapter.xhtml) 章中详细讨论。当你稍后复习那些主题时，你将使用该选项。现在，保留其默认值
    `No`。


    `Maintenance window` 允许你定义一个不同的时间段，以便将计划更新应用到你的部署。默认是基于你所在时区的下午 5 点到上午 8 点之间的任何时间，或者你可以将其配置为周一至周四或周五至周日的晚上
    10 点到早上 6 点。部署后你可以更改维护窗口。


    `Update policy` 是一个相对较新的概念。你可以选择将你的托管实例保持在与 SQL Server 2022 兼容的版本。我将在第 [8](#496204_2_En_8_Chapter.xhtml)
    章向你展示如何利用这一点来实现在线灾难恢复功能。但是，如果你选择此选项，你将无法获得通常来自无版本部署的新功能（但累积更新会自动应用）。第一个选项确保你始终是最新的，但你将无法还原备份或参与与
    SQL Server 2022 的在线灾难恢复场景。


    我将选择 SQL Server 2022 更新策略，以便我可以在本书后面向你展示这些新的兼容性功能。


    ### Tags


    点击 `Next: Tags >` 来定义一个标签，就像我在第 [3](#496204_2_En_3_Chapter.xhtml) 章中关于 Azure 虚拟机描述的那样。


    ### Deploy!


    点击 `Next: Review + create >` 查看部署前的最终屏幕。就像 Azure 虚拟机的部署一样，此屏幕显示估计成本、使用条款、隐私政策、你选择的所有选项的审查，以及下载描述这些部署选项的
    Azure 模板的选项。


    你还会看到一个警告，根据我的选择，部署可能需要长达 6 小时才能完成。对于我的部署，它在大约 1 小时 45 分钟内完成。如果你想在部署期间跟踪更多信息，可以使用
    Azure 门户（[`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-monitor`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-monitor)）。


    所以，点击 `Create` 进行部署，保持此屏幕打开以查看进度，并继续阅读下一节关于使用 `CLI` 部署的内容，然后是一些你可能会感兴趣的架构和实现细节，解释为什么部署需要运行。


    ```

    if (condVar > someVal) {console.log("xxx")}

    ```'
  raw: '##### Connection Type


    Notice on my screen I have chosen a connection type of *Redirect*. The default
    is *proxy*. A proxy connection requires that any connection to the Managed Instance
    by a tool or application (a connection to the TDS port 1433) must always go through
    a *gateway*. A redirect connection type uses the gateway to find the direct virtual
    private IP address of the node containing the Managed Instance. All subsequent
    traffic flows directly to the node. You can read more about these connection types
    at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/connection-types-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/connection-types-overview).
    Proxy can be more secure, but redirect can be faster. The virtual network and
    included subnet will have all the appropriate Network Security Group (NSG) rules
    applied for these types if you choose to create the virtual network as part of
    this deployment step.


    ##### Public Endpoint


    You have the option to enable TDS traffic on a public endpoint. The public endpoint
    will be enabled on port 3342 (and get redirected in the virtual network to the
    node instance port 1433). While I do not recommend using this option for production,
    it is one of the quickest ways to get connected to a Managed Instance. You can
    read more about the public endpoint for Managed Instance at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/public-endpoint-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/public-endpoint-overview).


    You also can control the minimum TLS connection encryption for the instance. I
    would always recommend using the latest TLS version. The only reason you may want
    to use a different one is for older applications where that version is not supported.
    Learn more at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/minimal-tls-version-configure`](https://learn.microsoft.com/azure/azure-sql/managed-instance/minimal-tls-version-configure).


    Notice that accelerated networking is automatically enabled for the Managed Instance.


    #### Security


    Click **Next: Security >** to make further security selections as seen in Figure
    [4-9](#496204_2_En_4_Chapter.xhtml#Fig9).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Security choices for Azure SQL Managed Instance


    I’ve mentioned **Microsoft Defender** in previous chapters, and the same capabilities
    (but customized for Managed Instance) are available for vulnerability assessments
    and advanced threat protection.


    You can set up your own user-defined **managed identity** for *passwordless* applications.
    By default, you get a system-defined managed identity.


    If you want to use **Windows Authentication** in your applications against Azure
    SQL Managed Instance, you can enable an option for a Service Principal. If you
    want to avoid changing our application to use Microsoft Entra authentication,
    consider this option. Learn more at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-overview`](https://learn.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-overview).


    **Transparent Data Encryption** (TDE), which is encryption at rest for the storage
    of your databases and transaction logs, is enabled by default (you need to enable
    this for each individual database). This option allows you to set up your own
    key for encryption.


    #### Additional Settings


    Click **Next: Additional settings >** to enable a few additional options for the
    deployment as seen in Figure [4-10](#496204_2_En_4_Chapter.xhtml#Fig10).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Additional settings for Managed Instance


    The **collation** here is like setting a collation for a SQL Server. It is important
    to know that you cannot change the instance collation after it is supplied here.


    Note


    You *can* set and change *database* collations on Managed Instance after deployment.
    Just keep in mind having different database collations can cause issues for cross-database
    queries or temporary table operations.


    The **time zone** is the recognized time zone by the SQL Server engine on the
    Managed Instance node. I have changed this to my local time zone, but it can be
    UTC or whatever time zone you want to choose. You cannot change this after deployment.


    The Managed Instance can be part of a **failover group** which we will talk more
    about in Chapter [8](#496204_2_En_8_Chapter.xhtml) of the book. You will use that
    option when you review those topics later. For now, leave it to the default of
    No.


    **Maintenance window** allows you to define a different timeframe when scheduled
    updates must be applied to your deployment. The default is any data between 5pm
    and 8am based on your time zone, or you can configure this for 10pm to 6am either
    Monday–Thursday or Friday–Sunday. You can change the maintenance window after
    you deploy.


    **Update policy** is a relatively new concept. You can choose to keep your Managed
    Instance at a version compatible with SQL Server 2022\. I’ll show you in Chapter
    [8](#496204_2_En_8_Chapter.xhtml) how you can take advantage of this for an online
    disaster recovery capability. However, if you choose this option, you will not
    be able to get new features that typically come from a versionless deployment
    (but you will have Cumulative Updates automatically applied). The first option
    ensures you are always up to date, but you will not be able to restore a backup
    or participate in an online disaster recovery scenario with SQL Server 2022.


    I will choose the SQL Server 2022 update policy, so I can show you these new compatibility
    features later in the book.


    #### Tags


    Click **Next: Tags >** to define a tag like how I described in Chapter [3](#496204_2_En_3_Chapter.xhtml)
    with Azure Virtual Machines.


    #### Deploy!


    Click **Next: Review + create >** to view the final screen before deploying. Like
    with the deployment for Azure Virtual Machine, this screen shows estimated costs,
    terms of use, privacy policy, a review of all the options you have chosen, and
    the option to download an Azure template that describes these deployment options.


    You will also see a warning that based on my choices the deployment could take
    as much as 6 hours to complete. For my deployment, it was completed in about 1
    hour and 45 minutes. If you want to track more information during your deployment,
    you can use the Azure Portal ([`https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-monitor`](https://learn.microsoft.com/azure/azure-sql/managed-instance/management-operations-monitor)).


    So, click **Create** to deploy, leave this screen open to see the progress, and
    read on to the next section about deploying with a CLI and then some architecture
    and implementation details you might find interesting why the deployment runs.'
