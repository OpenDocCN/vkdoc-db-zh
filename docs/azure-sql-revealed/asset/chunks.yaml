- fmt: "### Navigating an Azure Virtual Machine in the Portal\n\nYou will find yourself\
    \ often using several aspects to the overview screen for Azure Virtual Machine\
    \ and all Azure resources in this book. Let us examine the main areas of the overview\
    \ screen as seen in Figure [3-23](#496204_2_En_3_Chapter.xhtml#Fig23).\n\n![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig23_HTML.jpg)\n\
    \n**Figure 3-23** The overview screen for Azure Virtual Machine\n\n1.  **Service\
    \ Menu**\n    Each Azure resource provides a series of options to manage the resource.\
    \ The very top of the Service Menu is the same for all resources. You will want\
    \ to use the `Overview` option to “find your way back” if you are deep into using\
    \ `blades or sections` for details on the virtual machine. This is super important\
    \ as I often have hit the X at the top right of a screen and completely lost the\
    \ context of my VM. By clicking `Overview` on the Service Menu, I can keep that\
    \ context.\n    Under `Overview`, we will see options to look for Activity Log\
    \ entries specific to this VM, the ability to control access *outside* the VM\
    \ using RBAC, set new tags, or diagnose problems. Underneath this is a series\
    \ of category options that you can expand such as `Connect` to connect to the\
    \ VM, `Network` to configure network options, or `Settings` to configure specific\
    \ aspects of the VM. There are other options as well you can explore. I will not\
    \ go over each option here but will use several of these options throughout the\
    \ rest of the chapter.\n\n2.  **Command Bar**\n    These are buttons that allow\
    \ you to operate the virtual machine. Every Azure resource has buttons unique\
    \ to the resource. The most common buttons you will use are `Connect`, `Start`,\
    \ `Restart`, and `Stop`. I’ll cover more the significance of stopping the VM using\
    \ this option in the section later in this chapter titled “Stopping vs. Deallocating.”\n\
    \n3.  **Essentials**\n    Technically, this is part of the Working Pane. This\
    \ area displays key information about your virtual machine, including resource\
    \ group, region, status, OS version, and VM size, but also lets you navigate to\
    \ certain aspects of the virtual machine such as virtual network.\n\n4.  **Working\
    \ Pane**\n    The Working Pane includes sections to see detailed properties of\
    \ the VM, monitoring with health events, alerts, and performance metrics, enabling\
    \ capabilities like Windows Admin Center, recommendations, and training tutorials.\n\
    \nExplore more about how to navigate around the portal at [`https://learn.microsoft.com/azure/azure-portal/azure-portal-overview#getting-around-the-portal`](https://learn.microsoft.com/azure/azure-portal/azure-portal-overview%2523getting-around-the-portal).\n\
    \n### Connecting to Your VM\n\nNow that you have deployed, one of the first things\
    \ you will want to do is connect to the VM. For a Windows VM, the most popular\
    \ way to connect and use the VM is with the `Remote Desktop Protocol (RDP)`. You\
    \ saw in the VM deployment example that I chose the option to open the RDP port\
    \ (`3389`) to the Internet.\nTo use RDP, click the `Connect` button in the Command\
    \ Bar and choose `Connect`. You see the options to connect as in Figure [3-24](#496204_2_En_3_Chapter.xhtml#Fig24).\n\
    \n![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig24_HTML.jpg)\n\n**Figure 3-24**\
    \ Connecting with RDP to Azure Virtual Machine\n\nYou can connect via RDP by selecting\
    \ `Download RDP file`. The RDP file will be copied to your `Downloads` folder\
    \ on your client machine. The public IP address for the VM is also posted here\
    \ if you just want to take any valid RDP client and connect directly to the VM.\
    \ Once you connect, just like any VM or Windows computer you will be prompted\
    \ to enter your credentials (which you supplied as part of deployment), which\
    \ by default is a member of the Administrators group.\nNote: If you notice under\
    \ `Download RDP file`, there are options to help you troubleshoot any RDP connectivity\
    \ issues which I highly recommend you look at, should you encounter any issues.\n\
    \nIf you use `Select`, you can also see on this screen a recommendation to enable\
    \ `just-in-time access` to the VM to improve security. Just-in-time access is\
    \ a way to gain RDP access to the VM “on-demand” so that the RDP port is not opened\
    \ to the Internet when you are not using the VM. This is a way to allow you to\
    \ connect to the VM from any client yet limit the exposure of the RDP port to\
    \ everyone. You can learn more about just-in-time access at [`https://learn.microsoft.com/azure/defender-for-cloud/just-in-time-access-usage`](https://learn.microsoft.com/azure/defender-for-cloud/just-in-time-access-usage).\n\
    The other method you can see on this screen is to use a more secure method called\
    \ `Azure Bastion`, which you can learn more about at [`https://azure.microsoft.com/services/azure-bastion/`](https://azure.microsoft.com/services/azure-bastion/).\
    \ I’ve run into customers where their company blocks them from using RDP on their\
    \ laptop, so this browser-based method is an excellent, more secure option to\
    \ use to connect to the VM.\nYou may also connect with standard SQL tools like\
    \ `SSMS` from another Azure VM that you have deployed in the same Azure virtual\
    \ network. I often will deploy another “client” Azure Virtual Machine in the same\
    \ virtual network, so I can privately connect using SQL tools to my SQL Server\
    \ deployment.\n\n### Exploring the SQL Server Installation\n\nI thought you might\
    \ find it interesting to know exactly what we install and how we configure the\
    \ SQL Server instance when you deploy with SQL Server gallery images.\n\n####\
    \ What Is Installed\n\nA SQL Server gallery image installs the entire database\
    \ engine, `SQL Server Analysis Services`, `SQL Server Integration Services (SSIS)`,\
    \ `MDS`, and `DQS`. In addition, we install the following engine features:\n*\
    \ `SQL Server Agent`\n* `SQL Server Replication`\n* `Full-text search`\nWe also\
    \ install client, tools, SDK, and `SQL Server Management Studio`. We do not install\
    \ `Polybase` by default. As I have described earlier in this chapter, you can\
    \ install `R Services` as part of the deployment based on an option you choose.\n\
    Note: Your license includes the ability to deploy `SQL Server Reporting Services`,\
    \ but like SQL Server, we don’t install that. You can deploy this yourself using\
    \ [`https://learn.microsoft.com/sql/reporting-services/install-windows/install-reporting-services`](https://learn.microsoft.com/sql/reporting-services/install-windows/install-reporting-services).\
    \ In addition, customers with SA agreements using Enterprise Edition have license\
    \ rights to install `Power BI Report Server` ([`https://www.microsoft.com/power-platform/products/power-bi/report-server`](https://www.microsoft.com/power-platform/products/power-bi/report-server)).\n\
    For a SQL Server gallery image, we copy the SQL Server media, so you can install\
    \ or remove any features you want. You can find all the setup files in the `C:\\\
    SQLServerFull` folder in the VM. Figure [3-25](#496204_2_En_3_Chapter.xhtml#Fig25)\
    \ shows an example of what features are installed by default using a SQL Server\
    \ 2022 gallery image.\n\n![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig25_HTML.jpg)\n\
    \n**Figure 3-25** SQL Server features installed by default"
