    the report relies on some DMVs which are not exposed for Azure SQL Database. However,
    the reports will work for Managed Instance.


    One way to look at this concept is with Figure [7-7](#496204_2_En_7_Chapter.xhtml#Fig7).


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig7_HTML.jpg)


    Figure 7-7


    The Running vs. Waiting for SQL performance


    Let’s take a look at more of the details of this figure from the perspective of
    performance scenarios.


    Note


    As you look at DMVs in this section, remember that for Azure SQL Database you
    are only looking at results for a specific database, not across all databases
    for the logical server.


    #### Running vs. Waiting


    Running or waiting scenarios can often be determined by looking at overall resource
    usage. For a standard SQL Server deployment, you might use tools such as Performance
    Monitor in Windows or top in Linux. For Azure SQL, you can use the following methods.


    ##### Azure Portal/PowerShell/Alerts


    Azure Monitor has integrated metrics to view resource usage for Azure SQL. You
    can also set up alerts to look for resource usage conditions such as high CPU
    percent. Since we have integrated some Azure SQL performance data with Azure Monitor,
    having alerts is a huge advantage to snapping into the ecosystem. Read more about
    how to set up alerts with Azure Metrics at [`https://learn.microsoft.com/azure/azure-monitor/alerts/alerts-create-metric-alert-rule`](https://learn.microsoft.com/azure/azure-monitor/alerts/alerts-create-metric-alert-rule).'
  trans: '

    ## 你需要了解的 DMVs


    有一些值得特别说明的动态管理视图（DMVs）是你解决 Azure SQL 某些性能场景所必需的，包括以下：


    *   `sys.dm_io_virtual_file_stats` 对 Azure SQL 很重要，因为你无法直接访问操作系统来获取每个文件的 I/O 性能指标。


    *   `sys.dm_os_performance_counters` 在 Azure SQL 数据库和托管实例中均可用，用于查看 SQL Server
    的常见性能指标。可用于查看通常在 Windows 性能监视器中提供的 SQL Server 性能计数器信息。


    *   `sys.dm_instance_resource_governance` 可用于查看托管实例的资源限制。你可以查看此信息，以了解预期的资源限制，而无需使用
    Azure 门户。


    *   `sys.dm_user_db_resource_governance` 可用于根据 Azure SQL 数据库部署的部署选项、服务层和大小查看常见的资源限制。你可以查看此信息，以了解预期的资源限制，而无需使用
    Azure 门户。我将在一个示例中展示查看此 DMV 的方法。目前，你可以在 [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-user-db-resource-governor-azure-sql-database)
    阅读更多信息。


    ## 用于深度故障排除的 DMVs


    这些 DMV 提供了对 Azure SQL 资源限制和资源调控的更深入洞察。它们并非为常见场景设计，但在深入研究复杂的性能问题时可能会有所帮助：


    *   `sys.dm_os_out_of_memory_events`


    *   `sys.dm_user_db_resource_governance_internal` （仅限托管实例）


    *   `sys.dm_resource_governor_resource_pools_history_ex`


    *   `sys.dm_resource_governor_workload_groups_history_ex`


    *尽情钻研*这些 DMV 吧。第一个 DMV 是在本书第一版之后引入的，可以帮助排查内存不足错误。最后三个 DMV 提供了跨时间（目前约为 30 分钟）的历史信息。使用这些
    DMV 时请注意。我们有点像是为了内部调试 Azure 问题而构建了这些视图，以查看诸如后台活动与用户负载之类的问题。所以，如果为了满足我们确保提供优质数据库服务的需求而更改了这些视图，请不要感到惊讶。


    ## XEvent 为你服务


    扩展事件（XEvent）作为 SQL Server 2005 中引入的新跟踪机制，用于取代 SQL Trace。如今的 XEvent 支持 SQL Server
    引擎中的 1800 多个跟踪点。XEvent 为其他功能提供支持，包括 Microsoft Defender 的 SQL 审计和 SQL 威胁检测。


    ### 适用于 Azure SQL 扩展事件


    扩展事件可用于 Azure SQL 托管实例，就像用于 SQL Server 一样，通过创建会话并使用事件、操作和目标。创建扩展事件会话时请牢记以下几点：


    *   支持所有事件、目标和操作。


    *   文件目标支持 Azure Blob 存储，因为你无法访问底层操作系统磁盘。


    *   为托管实例添加了一些特定事件，以跟踪与实例管理和执行相关的事件。


    你可以使用 SSMS 或 T-SQL 创建和启动会话。可以使用 SSMS 查看扩展事件会话目标数据，或使用系统函数 `sys.fn_xe_file_target_read_file`。


    ### 适用于 Azure SQL 数据库的扩展事件


    扩展事件可用于 Azure SQL 数据库，就像用于 SQL Server 一样，通过创建会话并使用事件、操作和目标。创建扩展事件会话时请牢记以下几点：


    *   支持最常用的事件和操作。例如，基础事件 `sql_batch_completed` 对你可用。Azure SQL 数据库提供约 400 个事件，而
    SQL Server（及托管实例）则有大约 1800 个。使用 DMV `sys.dm_xe_objects` 可查找所有可用对象。


    *   支持文件、环形缓冲区（ring_buffer）和计数器目标。


    *   文件目标支持 Azure Blob 存储，因为你无法访问底层操作系统磁盘。以下是 Azure 支持团队提供的一篇关于将 Azure Blob 存储设置为文件目标的分步过程博客：[`https://techcommunity.microsoft.com/t5/azure-database-support-blog/extended-events-capture-step-by-step-walkthrough/ba-p/369013`](https://techcommunity.microsoft.com/t5/azure-database-support-blog/extended-events-capture-step-by-step-walkthrough/ba-p/369013)。


    你可以使用 SSMS 或 T-SQL 创建和启动会话。可以使用 SSMS 查看扩展事件会话目标数据，或使用系统函数 `sys.fn_xe_file_target_read_file`。


    自本书第一版以来，扩展事件的一个很好的新增功能是能够在 SSMS 中为 Azure SQL 使用 XE Profiler。图 7-6 显示了与 Azure
    SQL 数据库一起运行的“实时”扩展事件会话。


    ![](img/496204_2_En_7_Fig6_HTML.jpg)

    **图 7-6** 与 Azure SQL 数据库配合使用的 XE Profiler


    重要的是要知道，为你的会话触发的任何扩展事件都是特定于你的数据库的，而不是跨逻辑服务器的。因此，我们有一组新的目录视图，例如 `sys.database_event_sessions`（定义）和
    DMV，例如 `sys.dm_xe_database_sessions`（活动会话）。请查阅我们的文档，了解 Azure SQL 数据库与 SQL Server
    之间 XEvent 的完整差异列表：[`https://learn.microsoft.com/azure/azure-sql/database/xevent-db-diff-from-svr`](https://learn.microsoft.com/azure/azure-sql/database/xevent-db-diff-from-svr)。


    ## 性能场景


    在很久很久以前，当我在微软支持部门工作时，我的老朋友基思·埃尔莫（Keith Elmore）被认为是我们性能故障排除方面的专家（就我而言，他现在仍是）。当我们培训其他支持工程师时，基思想出了一个观点：大多数
    SQL 性能问题可以归类为 `正在运行` 或 `正在等待`。


    > **注意**

    > 基思的工作催生了一份名为“性能仪表板报告”的报表。该报告现在已成为 SQL Server 管理工具标准报告的一部分。不幸的是，该报告依赖于一些未暴露给
    Azure SQL 数据库的 DMV。不过，该报告适用于托管实例。


    理解这个概念的一种方式是通过图 7-7。


    ![](img/496204_2_En_7_Fig7_HTML.jpg)

    **图 7-7** SQL 性能的“正在运行”与“正在等待”


    让我们从性能场景的角度，更详细地看看这张图。


    > **注意**

    > 在本节中查看 DMV 时，请记住，对于 Azure SQL 数据库，你查看的只是特定数据库的结果，而不是逻辑服务器上所有数据库的结果。


    ### 正在运行 vs. 正在等待


    运行或等待场景通常可以通过查看整体资源使用情况来确定。对于标准的 SQL Server 部署，你可能会使用 Windows 中的性能监视器或 Linux 中的
    `top` 等工具。对于 Azure SQL，你可以使用以下方法。


    #### Azure 门户/PowerShell/警报


    Azure Monitor 具有集成的指标，可查看 Azure SQL 的资源使用情况。你还可以设置警报以查找资源使用情况条件，例如高 CPU 百分比。由于我们已经将一些
    Azure SQL 性能数据与 Azure Monitor 集成，设置警报是融入其生态系统的一个巨大优势。有关如何使用 Azure 指标设置警报的更多信息，请参阅
    [`https://learn.microsoft.com/azure/azure-monitor/alerts/alerts-create-metric-alert-rule`](https://learn.microsoft.com/azure/azure-monitor/alerts/alerts-create-metric-alert-rule)。

    '
- fmt: '### sys.dm_db_resource_stats


    对于 Azure SQL Database，您可以查看此 DMV 以了解数据库部署的 CPU、内存和 I/O 资源使用情况。此 DMV 每 15 秒对此数据拍摄一次快照。此
    DMV 中所有列的参考信息可在[`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-resource-stats-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-resource-stats-azure-sql-database)找到。我将在本节后面的示例中使用此
    DMV。


    注意

    一个名为`sys.resource_stats`的 DMV 在逻辑主数据库中运行，用于查看与逻辑服务器关联的所有 Azure 数据库长达 14 天的资源统计信息。更多信息请访问[`https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-resource-stats-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-resource-stats-azure-sql-database)。


    ### sys.server_resource_stats


    此 DMV 的行为与`sys.dm_db_resource_stats`类似，但用于查看托管实例的 CPU、内存和 I/O 资源使用情况。此 DMV 同样每
    15 秒拍摄一次快照。您可以在[`https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-server-resource-stats-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-server-resource-stats-azure-sql-database)找到此
    DMV 的完整参考信息。


    #### 使用 Copilot 入手


    图 7-7 中缺少的一项是 Azure SQL Database 中的 Microsoft Copilot 技能。Copilot 使用上面列出的资源，通过提示帮助您缩小“运行中与等待中”问题的范围。


    图 7-8 展示了一个使用提示来查找 Azure SQL Database 性能问题详细信息及可能原因的示例。


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig8_HTML.jpg)

    图 7-8

    使用 Copilot 缩小性能问题范围


    我将向您展示一些 Copilot 使用此类提示检测“运行中”和“等待中”问题的示例。我还将在本章后面使用 Copilot，看看它如何帮助处理一些特定场景。


    #### 运行中


    如果您确定问题是高 CPU 利用率，则称为“运行中”场景。运行中场景可能涉及通过编译或执行消耗资源的查询。可以使用以下工具进行进一步分析以确定解决方案。


    ##### Query Store


    Query Store 随 SQL Server 2016 引入，一直是性能分析方面最具变革性的功能之一。使用 SSMS 中的“资源消耗最多”报告、Query
    Store 目录视图或 Azure 门户中的“查询性能见解”（仅限 Azure SQL Database）来查找哪些查询消耗的 CPU 资源最多。您需要 Query
    Store 的入门指南吗？请从我们的文档开始：[`https://learn.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store`](https://learn.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store)。


    ##### sys.dm_exec_requests


    此 DMV 可能已成为 SQL Server 历史上最受欢迎的 DMV。此 DMV 显示所有当前活动请求的快照，可能是一个 T-SQL 查询或后台任务。在
    Azure SQL 中使用此 DMV 获取活动查询状态的快照。查找状态为`RUNNABLE`且等待类型为`SOS_SCHEDULER_YIELD`的查询，以查看您是否有足够的
    CPU 容量。请在[`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql)获取此
    DMV 的完整参考信息。


    ##### sys.dm_exec_query_stats


    此 DMV 的使用方式与 Query Store 类似，可用于查找消耗资源最多的查询，但仅适用于缓存中查询计划，而 Query Store 提供了性能的持久历史记录。此
    DMV 还允许您查找缓存查询的查询计划。请在[`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-stats-transact-sql`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-stats-transact-sql)获取完整参考信息。


    由于 Query Store 尚未可用于可读副本（我保证即将推出），此 DMV 可能对这些场景很有用。


    ##### sys.dm_exec_procedure_stats


    此 DMV 提供的信息与`sys.dm_exec_query_stats`类似，只是性能信息可以在存储过程级别查看。请在[`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-procedure-stats-transact-sql`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-procedure-stats-transact-sql)获取完整参考信息。


    一旦确定了哪个或哪些查询消耗了最多的资源，您可能需要检查工作负载是否有足够的 CPU 资源，或者使用轻量级查询分析、SET 语句、Query Store 或扩展事件跟踪等工具来调试查询计划。


    ##### Azure SQL Database 中的 Microsoft Copilot 技能


    您在本章前面看到，我展示了一个提示“我的数据库很慢”来帮助缩小性能问题范围。图 7-9 展示了此提示帮助缩小高 CPU 问题范围的示例。


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig9_HTML.jpg)

    图 7-9

    Copilot 检测到高 CPU 问题


    请注意关于长时间消耗了多少 CPU 的详细信息，以及导致大部分 CPU 消耗的查询。您还可以看到我被引导使用另一个提示来优化查询。当我选择该提示时，您可以在图
    7-10 中看到发生了什么。


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig10_HTML.jpg)

    图 7-10

    Copilot 检测到缺失索引


    Copilot 使用了内置的 SQL 遥测技术来显示缺失索引将减少 CPU 并提高性能。如果您想尝试自己的场景并查看 Copilot 检测到此问题，请使用[`https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting/highcpu_missingindex`](https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting/highcpu_missingindex)中的示例。


    我还使用 Copilot 检测过反模式查询等场景。完整的文档化场景可在[`https://aka.ms/sqlcopilot`](https://aka.ms/sqlcopilot)找到（我们一直在努力增加此
    Copilot 的技能——我们才刚刚开始！）。


    我将在本章后面展示另一个“运行中”问题的端到端场景，并了解 Copilot 如何提供帮助。'
  raw: '##### sys.dm_db_resource_stats


    For Azure SQL Database, you can look at this DMV to see CPU, memory, and I/O resource
    usage for the database deployment. This DMV takes a snapshot of this data every
    15 seconds. The reference for all columns in this DMV can be found at [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-resource-stats-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-resource-stats-azure-sql-database).
    I’ll use this DMV in an example later in this section.


    Note


    A DMV called **sys.resource_stats** works within the logical master to review
    resource stats for up to 14 days across all Azure Databases associated with the
    logical server. Learn more at [`https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-resource-stats-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-resource-stats-azure-sql-database).


    ##### sys.server_resource_stats


    This DMV behaves just like sys.dm_db_resource_stats, but it used to see resource
    usage for the Managed Instance for CPU, memory, and I/O. This DMV also takes a
    snapshot every 15 seconds. You can find the complete reference for this DMV at
    [`https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-server-resource-stats-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-server-resource-stats-azure-sql-database).


    #### Using Copilot to Get Started


    One thing missing from Figure [7-7](#496204_2_En_7_Chapter.xhtml#Fig7) is Microsoft
    Copilot skills in Azure SQL Database. Copilot uses the resources listed above
    to help you narrow down a “Running vs. Waiting” problem using prompts.


    Figure [7-8](#496204_2_En_7_Chapter.xhtml#Fig8) shows an example of using a prompt
    to find out the details of a performance problem with an Azure SQL Database and
    possible causes.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Using Copilot to narrow down a performance problem


    I’ll show you some examples of Copilot detecting both a *running* and a *waiting*
    problem with this type of prompt. I’ll also use Copilot later in this chapter
    to see how it can help with some specific scenarios.


    #### Running


    If you have determined the problem is high CPU utilization, this is called a *running
    scenario*. A running scenario can involve queries that consume resources through
    compilation or execution. Further analysis to determine a solution can be done
    by using these tools.


    ##### Query Store


    Query Store was introduced with SQL Server 2016 and has been one of the most game-changing
    capabilities for performance analysis. Use the Top Consuming Resource reports
    in SSMS, Query Store catalog views, or Query Performance Insight in the Azure
    Portal (Azure SQL Database only) to find which queries are consuming the most
    CPU resources. Do you need a primer for Query Store? Start with our documentation
    at [`https://learn.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store`](https://learn.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store).


    ##### sys.dm_exec_requests


    This DMV has become perhaps the most popular DMV to use for SQL Server in history.
    This DMV displays a snapshot of all current active requests, which could be a
    T-SQL query or background task. Use this DMV in Azure SQL to get a snapshot of
    the state of active queries. Look for queries with a state of RUNNABLE and a wait
    type of SOS_SCHEDULER_YIELD to see if you have enough CPU capacity. Get the complete
    reference for this DMV at [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql).


    ##### sys.dm_exec_query_stats


    This DMV can be used much like Query Store to find top resource consuming queries
    but is only available for query plans that are cached where Query Store provides
    a persistent historical record of performance. This DMV also allows you to find
    the query plan for a cached query. Get the complete reference at [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-stats-transact-sql`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-stats-transact-sql).


    Since Query Store is not yet available for readable secondaries (this is coming
    I promise), this DMV could be useful for those scenarios.


    ##### sys.dm_exec_procedure_stats


    This DMV provides information much like sys.dm_exec_query_stats except the performance
    information can be viewed at the stored procedure level. Get the complete reference
    at [`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-procedure-stats-transact-sql`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-procedure-stats-transact-sql).


    Once you determine what query or queries are consuming the most resources, you
    may have to examine whether you have enough CPU resources for your workload or
    debug query plans with tools like Lightweight Query Profiling, SET statements,
    Query Store, or Extended Event tracing.


    ##### Microsoft Copilot Skills in Azure SQL Database


    You saw earlier in the chapter I showed you a prompt “My database is slow” to
    help narrow down a performance problem. Figure [7-9](#496204_2_En_7_Chapter.xhtml#Fig9)
    shows an example of where this prompt helped narrow down a high CPU problem.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Copilot detects a high CPU problem


    Notice the details on how much CPU was consumed for an extended period of time
    and the query that was causing most of the CPU consumption. You can also see I
    was guided to use another prompt to optimize the query. When I selected that,
    you can see what happened in Figure [7-10](#496204_2_En_7_Chapter.xhtml#Fig10).


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig10_HTML.jpg)


    Figure 7-10


    Copilot detects a missing index


    Copilot has used built-in SQL telemetry to show a missing index would reduce CPU
    and increase performance. If you want to try out your own scenario and see Copilot
    detect this, use the example at [`https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting/highcpu_missingindex`](https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting/highcpu_missingindex).


    I’ve also used Copilot to detect scenarios like anti-pattern queries. The full
    set of documented scenarios can be found at [`https://aka.ms/sqlcopilot`](https://aka.ms/sqlcopilot)
    (we are always looking to increase the skills of this Copilot – we are just getting
    started!).


    I’ll show another *running* problem later in this chapter with an end-to-end scenario
    and see how Copilot can help.'
  trans: '

    ### sys.dm_db_resource_stats


    对于 Azure SQL Database，您可以查看此 DMV 以了解数据库部署的 CPU、内存和 I/O 资源使用情况。此 DMV 每 15 秒对此数据拍摄一次快照。此
    DMV 中所有列的参考信息可在[`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-resource-stats-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-resource-stats-azure-sql-database)找到。我将在本节后面的示例中使用此
    DMV。


    注意

    一个名为`sys.resource_stats`的 DMV 在逻辑主数据库中运行，用于查看与逻辑服务器关联的所有 Azure 数据库长达 14 天的资源统计信息。更多信息请访问[`https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-resource-stats-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-resource-stats-azure-sql-database)。


    ### sys.server_resource_stats


    此 DMV 的行为与`sys.dm_db_resource_stats`类似，但用于查看托管实例的 CPU、内存和 I/O 资源使用情况。此 DMV 同样每
    15 秒拍摄一次快照。您可以在[`https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-server-resource-stats-azure-sql-database`](https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-server-resource-stats-azure-sql-database)找到此
    DMV 的完整参考信息。


    #### 使用 Copilot 入手


    图 7-7 中缺少的一项是 Azure SQL Database 中的 Microsoft Copilot 技能。Copilot 使用上面列出的资源，通过提示帮助您缩小“运行中与等待中”问题的范围。


    图 7-8 展示了一个使用提示来查找 Azure SQL Database 性能问题详细信息及可能原因的示例。


    ![](img/496204_2_En_7_Fig8_HTML.jpg)

    图 7-8

    使用 Copilot 缩小性能问题范围


    我将向您展示一些 Copilot 使用此类提示检测“运行中”和“等待中”问题的示例。我还将在本章后面使用 Copilot，看看它如何帮助处理一些特定场景。


    #### 运行中


    如果您确定问题是高 CPU 利用率，则称为“运行中”场景。运行中场景可能涉及通过编译或执行消耗资源的查询。可以使用以下工具进行进一步分析以确定解决方案。


    ##### Query Store


    Query Store 随 SQL Server 2016 引入，一直是性能分析方面最具变革性的功能之一。使用 SSMS 中的“资源消耗最多”报告、Query
    Store 目录视图或 Azure 门户中的“查询性能见解”（仅限 Azure SQL Database）来查找哪些查询消耗的 CPU 资源最多。您需要 Query
    Store 的入门指南吗？请从我们的文档开始：[`https://learn.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store`](https://learn.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store)。


    ##### sys.dm_exec_requests


    此 DMV 可能已成为 SQL Server 历史上最受欢迎的 DMV。此 DMV 显示所有当前活动请求的快照，可能是一个 T-SQL 查询或后台任务。在
    Azure SQL 中使用此 DMV 获取活动查询状态的快照。查找状态为`RUNNABLE`且等待类型为`SOS_SCHEDULER_YIELD`的查询，以查看您是否有足够的
    CPU 容量。请在[`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql)获取此
    DMV 的完整参考信息。


    ##### sys.dm_exec_query_stats


    此 DMV 的使用方式与 Query Store 类似，可用于查找消耗资源最多的查询，但仅适用于缓存中查询计划，而 Query Store 提供了性能的持久历史记录。此
    DMV 还允许您查找缓存查询的查询计划。请在[`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-stats-transact-sql`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-stats-transact-sql)获取完整参考信息。


    由于 Query Store 尚未可用于可读副本（我保证即将推出），此 DMV 可能对这些场景很有用。


    ##### sys.dm_exec_procedure_stats


    此 DMV 提供的信息与`sys.dm_exec_query_stats`类似，只是性能信息可以在存储过程级别查看。请在[`https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-procedure-stats-transact-sql`](https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-procedure-stats-transact-sql)获取完整参考信息。


    一旦确定了哪个或哪些查询消耗了最多的资源，您可能需要检查工作负载是否有足够的 CPU 资源，或者使用轻量级查询分析、SET 语句、Query Store 或扩展事件跟踪等工具来调试查询计划。


    ##### Azure SQL Database 中的 Microsoft Copilot 技能


    您在本章前面看到，我展示了一个提示“我的数据库很慢”来帮助缩小性能问题范围。图 7-9 展示了此提示帮助缩小高 CPU 问题范围的示例。


    ![](img/496204_2_En_7_Fig9_HTML.jpg)

    图 7-9

    Copilot 检测到高 CPU 问题


    请注意关于长时间消耗了多少 CPU 的详细信息，以及导致大部分 CPU 消耗的查询。您还可以看到我被引导使用另一个提示来优化查询。当我选择该提示时，您可以在图
    7-10 中看到发生了什么。


    ![](img/496204_2_En_7_Fig10_HTML.jpg)

    图 7-10

    Copilot 检测到缺失索引


    Copilot 使用了内置的 SQL 遥测技术来显示缺失索引将减少 CPU 并提高性能。如果您想尝试自己的场景并查看 Copilot 检测到此问题，请使用[`https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting/highcpu_missingindex`](https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting/highcpu_missingindex)中的示例。


    我还使用 Copilot 检测过反模式查询等场景。完整的文档化场景可在[`https://aka.ms/sqlcopilot`](https://aka.ms/sqlcopilot)找到（我们一直在努力增加此
    Copilot 的技能——我们才刚刚开始！）。


    我将在本章后面展示另一个“运行中”问题的端到端场景，并了解 Copilot 如何提供帮助。

    '
- fmt: '## Database Watcher


    I’ve mentioned Database Watcher as a new cloud service to give you incredible
    insights into your Azure SQL workload. One capability Database Watcher can help
    you with is a high CPU scenario via a heatmap. You can see this example from Figure
    [7-11](#496204_2_En_7_Chapter.xhtml#Fig11), a heatmap of a high CPU scenario for
    a database target.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig11_HTML.jpg)


    Figure 7-11


    Database Watcher heatmap to show a high CPU scenario


    You can then drill into the “hot” database to see more details. But Database Watcher
    can also show you the query causing the problem when looking at “Top Queries”
    across all targets as you can see in Figure [7-12](#496204_2_En_7_Chapter.xhtml#Fig12).


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig12_HTML.jpg)


    Figure 7-12


    Database Watcher top queries


    Besides being able to see top queries across databases (Query Stores), you can
    see in this example the top query for the database `adw1` is “red,” indicating
    it has high CPU, and there is a suggestion that an index is missing.


    You can set up Database Watcher (`https://aka.ms/dbwatcher`) and use Copilot with
    this example to see a high CPU missing index scenario: `https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting/highcpu_missingindex`.
    You will see how to use these tools with a different high CPU scenario later in
    this chapter.


    ## Waiting


    If your problem doesn''t appear to be a high CPU resource usage, it could be the
    performance problem involves waiting on a resource. Scenarios involving waiting
    on resources include


    *   **I/O waits** – This includes wait types such as `PAGEIOLATCH` latches (wait
    on database I/O) and `WRITELOG` (wait on transaction log I/O). These waits can
    still be seen in Azure SQL just like SQL Server. Long duration for these indicates
    an I/O bottleneck (which could mean you need to make changes to a different service
    tier or increase vCores).


    *   **Lock waits** – These waits show up as standard “blocking” problems.


    *   **Latch waits** – This includes `PAGELATCH` (“hot” page) or even just `LATCH`
    (concurrency on an internal structure).


    *   **Buffer pool limits** – If you run out of buffer pool resources, you might
    run into unexpected `PAGEIOLATCH` waits.


    *   **Memory grants** – A high number of concurrent queries that need memory grants
    or large grants (could be from overestimation) could result in `RESOURCE_SEMAPHORE`
    waits.


    *   **Plan cache eviction** – If you don’t have enough plan cache and plans get
    evicted, this could lead to higher compile times (which could result in higher
    CPU) or `RUNNABLE` status with `SOS_SCHEDULER_YIELD` because there is not enough
    CPU capacity to handle compiles. You also might see them waiting on locks for
    schema to compile queries.


    To perform analysis on waiting scenarios, you typically look at the following
    tools.


    ### sys.dm_os_wait_stats


    Use this DMV to see what the top wait types for the database or instance are.
    This can guide you on what action to take next depending on the top wait types.
    Remember that for Azure SQL Database, these are just waits for the database, not
    across all database on the logical server. You can view the complete reference
    at `https://learn.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-wait-stats-transact-sql`.


    Note


    There is a DMV specific to Azure SQL Database called `sys.dm_db_wait_stats` (it
    also works with Managed Instance, but I don’t recommend using it given you are
    looking at the instance), which only shows waits specific for the database. You
    might find this useful, but `sys.dm_os_wait_stats` will show all waits for the
    dedicated instance hosting your Azure SQL Database.


    ### sys.dm_exec_requests


    Use this DMV to find specific wait types for active queries to see what resource
    they are waiting on. This could be a standard blocking scenario waiting on locks
    from other users.


    ### sys.dm_os_waiting_tasks


    Queries that use parallelism use multiple tasks for a given query, so you may
    need to use this DMV to find wait types for a given task for a specific query.


    ### Query Store


    Query Store provides reports and catalog views that show an aggregation of the
    top waits for query plan execution. The catalog view to see waits in Query Store
    is called `sys.query_store_wait_stats`, which you can read more about at `https://learn.microsoft.com/sql/relational-databases/system-catalog-views/sys-query-store-wait-stats-transact-sql`.
    It is important to know that a `wait of CPU` is equivalent to a `running` problem.


    Tip


    Extended Events can be used for any running or waiting scenarios but requires
    you to set up an Extended Event session to trace queries and can be considered
    a *heavier* method to debug a performance problem.


    ### Microsoft Copilot Skills in Azure SQL Database and Database Watcher


    Like for a high CPU (running) problem, Copilot and Database Watcher can also help
    with waiting problems. I took the example at `https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/07-PerformanceTroubleshooting/waiting_blocking`
    and prompted Copilot “My database is slow.” Figure [7-13](#496204_2_En_7_Chapter.xhtml#Fig13)
    shows the results.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig13_HTML.jpg)


    Figure 7-13


    SQL Copilot detects a blocking problem


    Here is the power of Copilot, and it is taking the “Running vs. Waiting” approach.
    I sent a prompt for a very vague request, and it was able to use built-in telemetry
    to check for high CPU. When it didn’t find this, it checked for a waiting problem
    and found this blocking chain. Many blocking problems are due to an open transaction
    left open by a session, so I sent a prompt right after this as part of a *conversation*
    with Copilot “Does session 110 have an open transaction?” and Figure [7-14](#496204_2_En_7_Chapter.xhtml#Fig14)
    shows the results.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig14_HTML.jpg)


    Figure 7-14


    SQL Copilot detects an open transaction causing blocking


    I can terminate the lead session but will also have to investigate the cause of
    the application causing blocking. What if I also want to see if there is a trend
    to this problem? This is where Database Watcher is incredible.


    Database Watcher can capture much of its insights across time. One of these is
    SQL Activity, including blocking chains. Figure [7-15](#496204_2_En_7_Chapter.xhtml#Fig15)
    shows an example.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig15_HTML.jpg)


    Figure 7-15


    Database Watcher historical SQL activity


    You can see from this chart there is a trend where blocking persists and then
    ends but comes back. I can click a bar on this chart to see the details as you
    see in Figure [7-16](#496204_2_En_7_Chapter.xhtml#Fig16).


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig16_HTML.jpg)


    Figure 7-16


    Database Watcher historical blocking chain'
