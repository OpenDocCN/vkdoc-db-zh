- fmt: "### az CLI\n\n`az CLI` 是针对虚拟机、托管实例和数据库的跨平台工具，有特定的选项。别忘了 `az` 默认安装在 Azure Cloud\
    \ Shell 中。以下是一些帮助你开始使用 `az CLI` 处理 Azure SQL 的文档资源：\n\n*   这是关于如何使用 `az` 管理虚拟机上的\
    \ SQL Server 的参考文档：[`https://learn.microsoft.com/cli/azure/sql/vm`](https://learn.microsoft.com/cli/azure/sql/vm)。\n\
    *   你可以在 [`https://learn.microsoft.com/cli/azure/sql/mi`](https://learn.microsoft.com/cli/azure/sql/mi)\
    \ 找到专门为托管实例列出的 `az` 选项。\n*   你可以在 [`https://learn.microsoft.com/cli/azure/sql`](https://learn.microsoft.com/cli/azure/sql)\
    \ 找到专门为数据库列出的 `az` 选项。\n\n别忘了 ARM 模板。你可以找到许多专门针对 Azure SQL 的 ARM 模板示例。一个很棒的资源是\
    \ *QuickStart* 模板，它们都在 GitHub 上。要查看完整的模板库，请访问 [`https://github.com/Azure/azure-quickstart-templates`](https://github.com/Azure/azure-quickstart-templates)。\n\
    \n### PowerShell\n\nAzure PowerShell `cmdlet` 套件包含针对 Azure SQL 的特定选项：\n\n*   以下链接包含如何使用\
    \ Azure PowerShell 配置虚拟机上的 SQL Server 的示例：[`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/create-sql-vm-powershell`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/create-sql-vm-powershell)。\n\
    *   你可以在 [`https://learn.microsoft.com/powershell/module/az.sql`](https://learn.microsoft.com/powershell/module/az.sql)\
    \ 找到适用于 Azure 托管实例和数据库的完整 Azure PowerShell `cmdlet` 列表。\n*   你可以在 [`https://learn.microsoft.com/azure/azure-sql/database/powershell-script-content-guide?view=azuresql&tabs=single-database`](https://learn.microsoft.com/azure/azure-sql/database/powershell-script-content-guide?view=azuresql&tabs=single-database)\
    \ 找到针对 Azure SQL Database 的 PowerShell 示例。\n\n### REST API\n\n你使用 Azure 的 REST\
    \ API 接口的情况可能比较少见。\n\n*   如果你确实需要使用，有一些针对 Azure SQL Database 的特定 REST API 操作，你可以在\
    \ [`https://learn.microsoft.com/rest/api/sql`](https://learn.microsoft.com/rest/api/sql)\
    \ 查看。\n*   你可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/api-references-create-manage-instance?view=azuresql#rest-api-create-and-manage-managed-instances`](https://learn.microsoft.com/azure/azure-sql/managed-instance/api-references-create-manage-instance?view=azuresql#rest-api-create-and-manage-managed-instances)\
    \ 找到 Azure SQL 托管实例的 REST API 参考。\n*   你也可以通过 REST 管理 Azure 虚拟机，相关文档可以在 [`https://learn.microsoft.com/rest/api/compute/virtual-machines`](https://learn.microsoft.com/rest/api/compute/virtual-machines)\
    \ 阅读。\n\n### TDS and T-SQL\n\n所有 Azure SQL 服务都由 SQL Server 引擎驱动。这意味着所有 Azure SQL\
    \ 服务都支持表格数据流（TDS）协议（完整的 TDS 规范可以在 [`https://aka.ms/tdsprotocol`](https://aka.ms/tdsprotocol)\
    \ 找到）。\n\n这也意味着所有 Azure SQL 服务都支持各种编程语言、驱动程序和提供程序。请使用网站 [`https://aka.ms/sqldev`](https://aka.ms/sqldev)\
    \ 来了解如何为 SQL Server 和 Azure SQL 开发程序。在某些情况下，某个提供程序可能提供仅适用于 Azure SQL 的特定选项。例如，.Net\
    \ 提供了用于 Azure SQL 管理的模块，你可以在 [`https://learn.microsoft.com/dotnet/api/microsoft.azure.management.sql.models`](https://learn.microsoft.com/dotnet/api/microsoft.azure.management.sql.models)\
    \ 阅读相关信息。\n\n因为所有 Azure SQL 服务都由 SQL Server 数据库引擎驱动，所以它们的引擎编程语言都是 T-SQL。正如本章通篇所述，并非所有\
    \ Azure SQL 选项都支持 SQL Server 所支持的 100% T-SQL 语句。以下是你可用的摘要指南：\n\n*   Azure 虚拟机上的\
    \ SQL Server 支持 100% 的 T-SQL。\n*   Azure SQL 托管实例接近 100% 支持 T-SQL。你可以在 [`https://aka.ms/azuresqlmitsqldiff`](https://aka.ms/azuresqlmitsqldiff)\
    \ 阅读其差异。\n*   Azure SQL Database 在 T-SQL 支持方面与 SQL Server 的差异最大，但*大多数核心数据库引擎*\
    \ T-SQL 语句都得到支持。文档在 [`https://aka.ms/azuresqldbtsqldiff`](https://aka.ms/azuresqldbtsqldiff)\
    \ 为你提供了指南。\n\n在某些情况下，存在新的 T-SQL 选项仅适用于托管实例或数据库。例如，`CREATE DATABASE` 有选项可以为 Azure\
    \ SQL 指定服务层级。\n\n> **提示**\n> \n> 微软的 T-SQL 参考文档有一个称为“适用于”的概念。这个指南将帮助你判断一个 T-SQL\
    \ 语句是适用于 SQL Server、Azure SQL Database 还是两者。你可以在 [`https://learn.microsoft.com/sql/t-sql/language-reference?view=sql-server-ver15#applies-to-references`](https://learn.microsoft.com/sql/t-sql/language-reference?view=sql-server-ver15#applies-to-references)\
    \ 阅读关于此指南的信息。\n\n### SQL CLI\n\n所有常见的 SQL Server 命令行接口（CLI）都支持 Azure SQL 的所有选项，包括\
    \ `sqlcmd` 和 `bcp`。你可以在 [`https://aka.ms/sqlcmdtools`](https://aka.ms/sqlcmdtools)\
    \ 阅读关于这些工具的信息。\n\n> **注意**\n> \n> `sqlcmd` 的一个新版本，称为 “go-sqlcmd”，现已推出预览版。请在 [`https://github.com/microsoft/go-sqlcmd`](https://github.com/microsoft/go-sqlcmd)\
    \ 查看这个新工具。\n\n### SQL Server Management Studio (SSMS)\n\n`SSMS` 可能是世界上最流行的 SQL\
    \ Server 工具。`SSMS` 完全支持 Azure SQL 的所有选项。事实上，`SSMS` 会检测特定的 Azure SQL 类型，并且只提供适用于该类型的选项。例如，如果你将\
    \ `SSMS` 连接到 Azure SQL Database，它将不会在对象资源管理器中显示不支持的功能（例如，SQL Server 代理）。请在 [`https://aka.ms/ssms`](https://aka.ms/ssms)\
    \ 下载最新的 `SSMS` 版本（通常每月更新）。\n\n当你使用 `SSMS` 连接到 Azure SQL Database 时，对象资源管理器中的图标将如图\
    \ [2-13](#496204_2_En_2_Chapter.xhtml#Fig13) 所示。\n\n![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig13_HTML.jpg)\n\
    \n图 2-13\n\n连接到 Azure SQL Database 的 `SSMS` 对象资源管理器\n\n当你使用 `SSMS` 连接到 Azure SQL\
    \ 托管实例时，对象资源管理器中的图标将如图 [2-14](#496204_2_En_2_Chapter.xhtml#Fig14) 所示。\n\n![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig14_HTML.jpg)\n\
    \n图 2-14\n\n连接到 Azure SQL 托管实例的 `SSMS` 对象资源管理器\n\n### Visual Studio Tools\n\n\
    流行的 `SQL Server Data Tools (SSDT)` 完全支持 Azure SQL Database。你可以在 [`https://visualstudio.microsoft.com/vs/features/ssdt/`](https://visualstudio.microsoft.com/vs/features/ssdt/)\
    \ 阅读更多关于 `SSDT` 的信息。`Visual Studio Code` 支持一个名为 `mssql` 的扩展，该扩展支持 Azure SQL Database\
    \ 和托管实例。你可以在 [`https://learn.microsoft.com/azure/azure-sql/database/connect-query-vscode?view=azuresql`](https://learn.microsoft.com/azure/azure-sql/database/connect-query-vscode?view=azuresql)\
    \ 看到一个在 Azure SQL Database 上使用 `mssql` 扩展的示例。"
  raw: '### az CLI


    There are specific options for the az CLI cross-platform utility for virtual machines,
    managed instances, and databases. Don’t forget az is installed by default in the
    Azure Cloud Shell. Here are some documentation resources to get you started with
    the az CLI for Azure SQL:


    *   Here is a reference for how to use the az for SQL Server on Virtual Machines:
    [`https://learn.microsoft.com/cli/azure/sql/vm`](https://learn.microsoft.com/cli/azure/sql/vm).


    *   You can find a list of az options specifically for managed instances at [`https://learn.microsoft.com/cli/azure/sql/mi`](https://learn.microsoft.com/cli/azure/sql/mi).


    *   You can find a list of az options specifically for databases at [`https://learn.microsoft.com/cli/azure/sql`](https://learn.microsoft.com/cli/azure/sql).


    Don’t forget about ARM templates. You can find many examples of ARM templates
    specific to Azure SQL. A great resource is *QuickStart* templates all found on
    GitHub. To see the complete gallery, visit [`https://github.com/Azure/azure-quickstart-templates`](https://github.com/Azure/azure-quickstart-templates).


    ### PowerShell


    The Azure PowerShell cmdlet suite includes specific options for Azure SQL:


    *   The following link contains an example of how to use Azure PowerShell to provision
    a SQL Server on Virtual Machines: [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/create-sql-vm-powershell`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/create-sql-vm-powershell).


    *   You can find a complete list of Azure PowerShell cmdlets for Azure Managed
    Instance and Databases at [`https://learn.microsoft.com/powershell/module/az.sql`](https://learn.microsoft.com/powershell/module/az.sql).


    *   You can find examples for PowerShell for Azure SQL Database at [`https://learn.microsoft.com/azure/azure-sql/database/powershell-script-content-guide?view=azuresql&tabs=single-database`](https://learn.microsoft.com/azure/azure-sql/database/powershell-script-content-guide%253Fview%253Dazuresql%2526tabs%253Dsingle-database).


    ### REST API


    It may be rare you use the REST API interfaces for Azure.


    *   If you do, there are some specific REST API operations for Azure SQL Database
    which you can see at [`https://learn.microsoft.com/rest/api/sql`](https://learn.microsoft.com/rest/api/sql).


    *   You can find REST API references for Azure SQL Managed Instance at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/api-references-create-manage-instance?view=azuresql#rest-api-create-and-manage-managed-instances`](https://learn.microsoft.com/azure/azure-sql/managed-instance/api-references-create-manage-instance%253Fview%253Dazuresql%2523rest-api-create-and-manage-managed-instances).


    *   You can also manage Azure Virtual Machines through REST which you can read
    about at [`https://learn.microsoft.com/rest/api/compute/virtual-machines`](https://learn.microsoft.com/rest/api/compute/virtual-machines).


    ### TDS and T-SQL


    All Azure SQL services are powered by the SQL Server Engine. This means all Azure
    SQL services support the Tabular Data Stream (TDS) protocol (the full TDS specification
    can be found at [`https://aka.ms/tdsprotocol`](https://aka.ms/tdsprotocol)).


    This also means that all Azure SQL services support a variety of programming languages,
    drivers, and providers. Use the website [`https://aka.ms/sqldev`](https://aka.ms/sqldev)
    to learn how to develop programs for SQL Server and Azure SQL. In some cases,
    a provider may provide specific options only applicable to Azure SQL. For example,
    the .Net provides modules for Azure SQL Management which you can read at [`https://learn.microsoft.com/dotnet/api/microsoft.azure.management.sql.models`](https://learn.microsoft.com/dotnet/api/microsoft.azure.management.sql.models).


    Because all Azure SQL services are powered by the SQL Server database engine,
    the engine programming language for all is T-SQL. As described throughout this
    chapter, not all Azure SQL options support all 100% T-SQL statements supported
    in SQL Server. Here is a summary guide for you to use:


    *   SQL Server on Azure Virtual Machine has 100% support of T-SQL.


    *   Azure SQL Managed Instance is close to 100% T-SQL support. You can read the
    differences at [`https://aka.ms/azuresqlmitsqldiff`](https://aka.ms/azuresqlmitsqldiff).


    *   Azure SQL Database has the largest difference in T-SQL support from SQL Server,
    but *most core database engine* T-SQL statements are supported. The documentation
    provides a guide for you at [`https://aka.ms/azuresqldbtsqldiff`](https://aka.ms/azuresqldbtsqldiff).


    In some cases, there are new T-SQL options only applicable to a Managed Instance
    or Database. For example, CREATE DATABASE has the option to specific service tiers
    for Azure SQL.


    Tip


    The Microsoft documentation for the T-SQL reference has a concept called “Applies
    To.” This guide will help steer you whether a T-SQL statement applies to SQL Server,
    Azure SQL Database, or both. You can read about this guidance at [`https://learn.microsoft.com/sql/t-sql/language-reference?view=sql-server-ver15#applies-to-references`](https://learn.microsoft.com/sql/t-sql/language-reference%253Fview%253Dsql-server-ver15%2523applies-to-references).


    ### SQL CLI


    All common SQL Server Command-Line Interfaces (CLIs) support all options for Azure
    SQL, including **sqlcmd** and **bcp**. You can read about these tools at [`https://aka.ms/sqlcmdtools`](https://aka.ms/sqlcmdtools).


    Note


    A new version of sqlcmd known as “go-sqlcmd” is now available in preview. Check
    out the new tool at [`https://github.com/microsoft/go-sqlcmd`](https://github.com/microsoft/go-sqlcmd).


    ### SQL Server Management Studio (SSMS)


    **SSMS** is perhaps the most popular SQL Server tool in the world. SSMS fully
    supports all options for Azure SQL. In fact, SSMS detects the specific Azure SQL
    type and only provides options that work for that type. For example, if you connect
    SSMS to Azure SQL Database, it will not show you options in Object Explorer (e.g.,
    SQL Server Agent) that are not supported for Azure SQL Database. Download the
    latest SSMS version (typically updated monthly) at [`https://aka.ms/ssms`](https://aka.ms/ssms).


    When you connect with SSMS to an Azure SQL Database, the icon in Object Explorer
    will look like Figure [2-13](#496204_2_En_2_Chapter.xhtml#Fig13).


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig13_HTML.jpg)


    Figure 2-13


    SSMS Object Explorer connected to Azure SQL Database


    When you connect with SSMS to an Azure SQL Managed Instance, the icon in Object
    Explorer will look like Figure [2-14](#496204_2_En_2_Chapter.xhtml#Fig14).


    ![](images/496204_2_En_2_Chapter/496204_2_En_2_Fig14_HTML.jpg)


    Figure 2-14


    SSMS Object Explorer connected to Azure SQL Managed Instance


    ### Visual Studio Tools


    The popular **SQL Server Data Tools (SSDT)** fully supports Azure SQL Database.
    You can read more about SSDT at [`https://visualstudio.microsoft.com/vs/features/ssdt/`](https://visualstudio.microsoft.com/vs/features/ssdt/).
    **Visual Studio Code** supports an extension called **mssql** which supports Azure
    SQL Database and Managed Instance. You can see an example of using the mssql extension
    with Azure SQL Database at [`https://learn.microsoft.com/azure/azure-sql/database/connect-query-vscode?view=azuresql`](https://learn.microsoft.com/azure/azure-sql/database/connect-query-vscode%253Fview%253Dazuresql).'
