  trans: '### 最大容量


    当你选择安装 SQL Server 的平台时，通常会`预估`所需的资源规模。在许多情况下，你会规划 CPU、内存和磁盘空间等资源所需的最大容量。你可能还需要确保在
    IOPS 和延迟方面具备正确的 I/O 性能能力。


    在本书第 4 章和第 5 章中，我向你展示了选择、部署和配置 Azure SQL 托管实例与 Azure SQL 数据库部署的所有选项。为确保获得最佳性能，你需要牢记
    Azure SQL 的这些容量限制：


    *   Azure SQL 托管实例最多可支持 128 个 vCore、约 870GB 内存，以及最高 32TB 的存储空间，具体取决于你选择的服务层级和硬件配置。

    *   Azure SQL 数据库最多可支持 128 个 vCore、830GB 内存，以及最高 4TB 的数据库大小，具体取决于你选择的服务层级和硬件配置。Azure
    SQL 数据库的超大规模部署选项可支持最高 100TB 的数据库和无限制的事务日志空间。

    *   你对部署选项（如 vCore 数量）的决策会影响其他资源容量，无论是托管实例还是数据库部署。例如，通用业务型 Azure SQL 数据库的 vCore
    数量会影响最大内存、最大数据库大小、最大事务日志大小以及最大日志速率等。


    让我们在此暂停，以帮助你理清思路。如何查看图表或表格来弄清所有这些选择的限制呢？


    对于托管实例，请从这个显示硬件配置差异的文档页面开始：[`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#hardware-configuration-characteristics`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits?view=azuresql#hardware-configuration-characteristics)。然后继续向下滚动此页面，查看按服务层级组织的其他限制，如
    vCore、内存、存储等。


    Azure SQL 数据库呢？你可以查看基于 vCore 的容量和限制表格：[`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-vcore-single-databases`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-vcore-single-databases)。如果你选择无服务器计算层，会发现存在一些差异。请收藏这些文档链接。我一直在使用它们。


    请记住，某些限制（如内存）是由 Windows 作业对象强制执行的。我在本书第 4 章中提到过此实现。使用动态管理视图 `sys.dm_os_job_object`
    可以查看部署的真实内存和其他资源限制。


    提示：部署后，你可以通过 `sys.dm_user_db_resource_governance` 等动态管理视图查看你的资源限制。


    如果你做出了错误的选择，需要更多容量怎么办？好消息是，你可以对 Azure SQL 托管实例和数据库进行更改以获得更多（或更少）资源，而无需进行任何数据库迁移。本章后面你将看到一个这样的示例。只需记住，托管实例的更改可能需要相当长的时间。


    此外，对于 Azure SQL 数据库，你可以在通用业务型和业务关键型服务层级之间来回切换（注意，数据库播种可能需要一些时间）。如果你从通用业务型迁移到超大规模，可以再迁移回来一次。但是，如果你从超大规模开始，则无法迁移回通用业务型（并且永远无法迁移到业务关键型）。


    ### 索引


    任何与 SQL Server 打交道的人都知道，如果没有合适的索引，很难获得所需的查询性能。


    你在 SQL Server 中可以使用的每种索引选项，在 Azure SQL 中都可用，包括聚集索引、非聚集索引、联机索引和可恢复索引。你可以在 [`https://learn.microsoft.com/sql/relational-databases/indexes/clustered-and-nonclustered-indexes-described`](https://learn.microsoft.com/sql/relational-databases/indexes/clustered-and-nonclustered-indexes-described)
    阅读索引入门，在 [`https://learn.microsoft.com/sql/relational-databases/indexes/perform-index-operations-online`](https://learn.microsoft.com/sql/relational-databases/indexes/perform-index-operations-online)
    了解联机索引的详细信息，在 [`https://learn.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations?view=sql-server-ver16#resumable-index-considerations`](https://learn.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations?view=sql-server-ver16#resumable-index-considerations)
    了解可恢复联机索引的详细信息。可恢复联机索引非常引人注目，因为你可以暂停和恢复大型索引构建，甚至可以在失败点继续索引构建或重建。


    `列存储索引`简直令人惊叹。我不断看到客户未能充分利用这一功能。对于合适的工作负载，列存储索引可以将读取查询性能提升 100 倍。列存储索引在你选择的 Azure
    SQL 任何部署选项中都受支持。关于列存储的一个误解是它是一种内存技术。事实是，当列存储索引加载到内存中并使用压缩时，其性能最佳，这样更多数据可以容纳在你的内存限制内。然而，列存储索引并不需要全部加载到内存中。要开始了解列存储索引，请参阅文档：[`https://learn.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview`](https://learn.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview)。


    ### 内存中 OLTP


    在 SQL Server 2014 中（在 SQL Server 2016 中得到了极大增强），我们引入了一项用于高速事务的革命性功能，称为内存中 OLTP（代号
    Hekaton）。如果你选择业务关键型服务层级，内存中 OLTP 可用于 Azure SQL 托管实例和数据库。


    内存优化表是使用内存中 OLTP 的机制。内存优化表是真正的内存驻留表，因为它们必须完全加载到内存中。可用于存储内存优化表的内存是业务关键型服务层级内存限制的一个子集。部署的
    vCore 数量决定了可用于内存优化表的内存百分比。超大规模支持一部分内存中 OLTP 对象，包括内存优化表类型、表变量和本机编译模块，但不支持内存优化表。


    注意：内存优化表需要一个内存优化文件组。Azure SQL 会为任何数据库创建此文件组，即使它不是业务关键型（BC）服务层级。这样，如果你迁移到 BC，文件组已经为内存优化表设置好了。


    刚接触内存中 OLTP？请从我们的文档开始：[`https://learn.microsoft.com/sql/relational-databases/in-memory-oltp/overview-and-usage-scenarios`](https://learn.microsoft.com/sql/relational-databases/in-memory-oltp/overview-and-usage-scenarios)。'
- fmt: "## Partitions\n\nPartitions are often used with SQL Server for tables with\
    \ many rows to improve performance by subdividing data by a column in the table.\
    \ Consider these points for partitions and Azure SQL:\n\n*   Partitions are supported\
    \ for Azure SQL Database and Managed Instance.\n*   You can only use filegroups\
    \ with partitions with Azure SQL Managed Instance. (Remember Azure SQL Database\
    \ only has a primary partition and filegroup, while Managed Instance supported\
    \ user-defined filegroups).\n\nNeed a primer for partitions? Start with this documentation\
    \ page at [`https://learn.microsoft.com/sql/relational-databases/partitions/partitioned-tables-and-indexes`](https://learn.microsoft.com/sql/relational-databases/partitions/partitioned-tables-and-indexes).\n\
    \nNote\nThere are some interesting `partitioning` techniques with Azure SQL Database\
    \ not associated with SQL partitions you may want to look at as a developer. Read\
    \ more at [`https://learn.microsoft.com/azure/architecture/best-practices/data-partitioning-strategies#partitioning-azure-sql-database`](https://learn.microsoft.com/azure/architecture/best-practices/data-partitioning-strategies#partitioning-azure-sql-database).\n\
    \n## SQL Server 2022 Enhancements\n\nSQL Server 2022 includes several enhancements\
    \ related to performance that are also available in Azure SQL Managed Instance\
    \ and Azure SQL Database:\n\n*   `Intelligent Query Processing` (IQP) improvements\n\
    \n    IQP ([`https://aka.ms/iqp`](https://aka.ms/iqp)) is a series of capabilities\
    \ built into the query processor to make your T-SQL queries run faster or maintain\
    \ performance with no code changes.\n\n    Azure SQL Managed Instance and Database\
    \ include all the features for IQP from SQL Server 2017 and 2019. In addition,\
    \ IQP capabilities from SQL Server 2022 are available in Azure SQL. Learn more\
    \ in the last section of the chapter titled “Intelligent Performance.”\n\n*  \
    \ `Query Store hints`\n\n    Plan guides have been an effective way to force or\
    \ shape a query plan independent of the query sent from an application. But there\
    \ are limits to this feature, and it can be complex to use.\n\n    Query Store\
    \ hints allow you to “add” query hints to any incoming query from an application\
    \ to shape or change the query plan. These hints are persisted in the Query Store,\
    \ allowing you to force a query plan based on a series of hints. Some new IQP\
    \ capabilities use Query Store hints behind the scenes. Learn more about [`https://aka.ms/querystorehints`](https://aka.ms/querystorehints).\n\
    \nNote\nIt is important to know that some “hidden gem” capabilities like merry-go-round\
    \ scans and buffer pool ramp-up are all used behind the scenes for all editions\
    \ for Azure SQL. Learn more at [`https://learn.microsoft.com/sql/relational-databases/reading-page`](https://learn.microsoft.com/sql/relational-databases/reading-page).\n\
    \n## Intelligent Performance\n\nOver the past few releases of SQL Server, we have\
    \ been striving to provide built-in capabilities to enhance performance without\
    \ you making application changes. Our goal is to use data and automation to make\
    \ smart decision to make your queries run faster. We call this `intelligent performance`.\
    \ These capabilities exist in Azure SQL, but we go further in the cloud. We use\
    \ the power of the cloud to offer even more. You learn more details about intelligent\
    \ performance for Azure SQL in the final section of this chapter (IQP is part\
    \ of that story).\n\n## Configuring and Maintaining for Performance\n\nIn Chapter\
    \ [5](#496204_2_En_5_Chapter.xhtml) of this book, I described many of the options\
    \ to configure an Azure SQL Managed Instance and Database. There are some configuration\
    \ options that can affect performance worth diving deeper into. This includes\
    \ the `tempdb` database, configuring database options, files and filegroups, `max\
    \ degree of parallelism`, and `Resource Governor`. In addition, it is worth reviewing\
    \ the various tasks you would go through to maintain indexes and statistics for\
    \ database for Azure SQL as compared to SQL Server.\n\n### Tempdb\n\nThe `tempdb`\
    \ database is an important shared resource used by applications. Ensuring the\
    \ right configuration of `tempdb` can affect your ability to deliver consistent\
    \ performance. `Tempdb` is used the same with Azure SQL like SQL Server, but your\
    \ ability to configure `tempdb` is different, including placement of files, the\
    \ number and size of files, `tempdb` size, and `tempdb` configuration options.\n\
    \nIn Azure SQL Database, `tempdb` files are always automatically stored on local\
    \ SSD drives, so I/O performance should not be an issue.\n\nSQL Server professionals\
    \ often use more than one database file to partition allocations for `tempdb`\
    \ tables. For Azure SQL Database, the number of files are scaled with the number\
    \ of vCores (e.g., 2 vCores = 4 files) with a max of 16. The number of files is\
    \ not configurable through T-SQL against `tempdb` but by `changing the deployment\
    \ option`. The maximum size of the `tempdb` database is scaled per number of vCores.\n\
    \nI described in Chapter [5](#496204_2_En_5_Chapter.xhtml) that you get some configuration\
    \ options for `tempdb` in Azure SQL Managed Instance, including expanding the\
    \ number of files, the logical name of the files, and the autogrow increment size\
    \ value.\n\n`Tempdb` database option `MIXED_PAGE_ALLOCATION` is set to `OFF` and\
    \ `AUTOGROW_ALL_FILES` is set to `ON`. This cannot be configured, but they are\
    \ the recommended defaults as with SQL Server.\n\n### Database Configuration\n\
    \nAs I described in Chapter [5](#496204_2_En_5_Chapter.xhtml), about every database\
    \ configuration option is available to you with Azure SQL as it is with SQL Server\
    \ through `ALTER DATABASE` and `ALTER DATABASE SCOPED configuration`. Consult\
    \ the documentation at [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql)\
    \ and [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql).\
    \ You will see later in this chapter there are new options specific to Azure SQL\
    \ from `ALTER DATABASE`.\n\nFor performance, one database option that is not available\
    \ to change is the `recovery model` of the database. The default is full recovery\
    \ and cannot be modified. I often see the community compare OLTP performance for\
    \ SQL Server and Azure SQL but don’t use full recovery which can have an impact\
    \ on performance of scenarios like bulk insert. This ensures your database can\
    \ meet Azure Service-Level Agreements (SLAs). Therefore, minimal logging for bulk\
    \ operations is not supported. Minimal logging for bulk operations is supported\
    \ for `tempdb`."
  raw: "### Partitions\n\nPartitions are often used with SQL Server for tables with\
    \ many rows to improve performance by subdividing data by a column in the table.\
    \ Consider these points for partitions and Azure SQL:\n\n*   Partitions are supported\
    \ for Azure SQL Database and Managed Instance.\n\n*   You can only use filegroups\
