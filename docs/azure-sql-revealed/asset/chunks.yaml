- fmt: "### Maintenance of Azure SQL\n\nBut what exactly do the latest updates mean\
    \ in comparison to SQL Server? For SQL Server (as of SQL Server 2017), we release\
    \ major versions, Cumulative Updates (`CU`), and General Distribution Releases\
    \ (`GDR`). Customers download and apply the updates they would like to use.\n\n\
    When we release a new major version, for example, SQL Server 2019, it includes\
    \ new features and capabilities, but it also includes a series of bug fixes that\
    \ includes fixes from all `CU` and `GDR` builds from the previous major release\
    \ plus a set of fixes we believe makes sense to include in the major release.\n\
    \nFor bug fixes (and some minor enhancements that are not necessarily features),\
    \ we are constantly keeping these fixes up to date in our main branch of the source\
    \ code. These changes are pushed into Azure SQL on a frequent basis and often\
    \ available earlier to our customers vs. having to wait for a `CU`, `GDR`, or\
    \ even major version release. This is a major advantage in running in Azure. We\
    \ are constantly testing these fixes and changes but effectively you are getting\
    \ a constant flow of bug fixes only found in a major version release.\n\nWe do\
    \ not document or publish how often we roll out updates to SQL Server and other\
    \ components that power Azure SQL. The process of rolling these updates is called\
    \ a `train`. A `train` contains updates to all the components that support Azure\
    \ SQL, including OS, SQL Server, Service Fabric components, and other software\
    \ we use to power Azure SQL. We do not roll out `trains` to every Azure Region\
    \ at one time. Rather, these `trains` roll out across regions. If we detect any\
    \ issue in rolling out a `train` in an early phase, we can easily roll it back.\
    \ Since every Azure SQL deployment has built-in availability, when we update nodes\
    \ and instances, we can fail over the deployment and ensure your data is available\
    \ by the `SLA` agreement associated with your deployment. Concepts like Availability\
    \ Zones also help provide further availability. I will discuss more about Availability\
    \ Zones in Chapter [8](#496204_2_En_8_Chapter.xhtml) of the book. Resource Health\
    \ options in the Azure Portal or through `REST` APIs can provide you with information\
    \ about whether a failover occurred because of `deployments`. `Deployments` are\
    \ planned maintenance events that affect availability.\n\nNote\n\nIt is possible\
    \ the timing of a Cumulative Update for SQL Server may result in a fix landing\
    \ in a `CU` before it rolls out in a `train` for Azure SQL. Unless the fix in\
    \ the `CU` has a regression, that fix will make it eventually in a deployment\
    \ `train`.\n\nAs you have seen in this book, you also have options on maintenance\
    \ windows to control when updates are scheduled and alerts to notify you in advance\
    \ of these maintenance operations that could affect uptime.\n\nNote\n\nIf we have\
    \ a major impacting customer problem, we may notify a specific customer that their\
    \ deployment may be affected, so we can correct their problem.\n\nPart of the\
    \ improvements we are working on will provide advance maintenance notification\
    \ to customers, so they can plan for these events. Furthermore, we are also investigating\
    \ the ability for customers to select a custom schedule for a maintenance event.\n\
    \nOur work in the cloud often generates innovation. One very cool capability we\
    \ have rolled out to reduce the number of scenarios where maintenance of Azure\
    \ SQL requires a restart of SQL Server (and therefore a failover) is called `hot\
    \ patching`. You can read more about how `hot patching` improves availability\
    \ in Azure SQL in this blog post by my colleague Hans Olav Norheim at [`https://azure.microsoft.com/blog/hot-patching-sql-server-engine-in-azure-sql-database/`](https://azure.microsoft.com/blog/hot-patching-sql-server-engine-in-azure-sql-database/).\n\
    \n### Update Policy for Azure SQL Managed Instance\n\nI’ve described in the book\
    \ the concept of an update policy for Azure SQL Managed Instance with two choices:\n\
    \n*   Always up to date\n    This is the possibility to receive continuous updates\
    \ to Managed Instance, including new features. Any database you back up for this\
    \ choice cannot be restored to SQL Server 2022 (but can be restored to other always-up-to-date\
    \ managed instances).\n\n*   SQL Server 2022\n    This is the choice to use if\
    \ you want to be able to restore a backup to SQL Server 2022 or use online disaster\
    \ recovery with SQL Server 2022 (which is discussed further in Chapter [8](#496204_2_En_8_Chapter.xhtml)\
    \ of the book). With this choice, your instance will still have cumulative updates\
    \ automatically applied as they are available for SQL Server 2022 but not new\
    \ features that are only available for an always-up-to-date instance. You can\
    \ restore a backup from this Managed Instance to another SQL Server 2022 or always-up-to-date\
    \ Managed Instance (when you use this latter choice, you cannot restore back).\n\
    \n### New Features and Capabilities in Azure SQL\n\nIn general, over the last\
    \ few years, we have tried to adopt a `cloud-first mentality` for SQL Server.\
    \ We build a new capability and roll it out in Azure SQL first through a private\
    \ (limited customers and usually requires a sign-up) and public preview (not fully\
    \ generally available, but customers can try it out) program. Eventually, this\
    \ capability goes into General Availability (`GA`).\n\nThen based on the timing\
    \ of a new major version of SQL Server, that capability is included in that major\
    \ version. A great example of this is Intelligent Query Processing (`IQP`), which\
    \ you can read about at [`https://learn.microsoft.com/sql/relational-databases/performance/intelligent-query-processing`](https://learn.microsoft.com/sql/relational-databases/performance/intelligent-query-processing).\
    \ We rolled out `IQP` for Azure SQL customers before it was released in SQL Server\
    \ 2019 and 2022.\n\nI’ve created two shortcuts for you to keep up to date with\
    \ all the latest news for Azure SQL Database and Managed Instance:\n\n[`https://aka.ms/whatsnewsqldb`](https://aka.ms/whatsnewsqldb)\n\
    \n[`https://aka.ms/whatsnewsqlmi`](https://aka.ms/whatsnewsqlmi)\n\n#### Summary\n\
    \nIn this chapter, you learned the various methods, capabilities, techniques,\
    \ and restrictions for configuring Azure SQL Managed Instance and Database after\
    \ you deploy. You learned both configuration options specific to Azure SQL and\
    \ ones for the database engine and databases using familiar techniques like `T-SQL`.\n\
    \nYou also learned some interesting aspects of space management which can be important\
    \ as you manage the database in Azure SQL.\n\nIn this chapter, we covered the\
    \ various methods to load data from both on-premises and in Azure to Azure SQL.\
    \ Finally, you learned the details of how Azure SQL is updated and why it is referred\
    \ to as a versionless database.\n\nNow that you have learned how to deploy and\
    \ configure Azure SQL, it is time to jump into the first category of the *meat\
    \ and potatoes* of Azure SQL: security. In the next chapter, we will cover the\
    \ security capabilities for Azure SQL as it compares to SQL Server."
