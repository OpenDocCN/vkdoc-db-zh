- fmt: 'For the team, Sterling effectively became a rewrite of the architecture of
    the service while still maintaining the principles of a database service for customers.
    The next generation of Azure SQL Database would also get a “version bump” to highlight
    this new architecture called `v12`. `v12` also included a merge of the SQL Server
    codebase. Code fixes and new features could be done in a single branch that would
    be used for both SQL Server and Azure SQL Database. The `v12` name was confusing
    for customers because it did not line up to a specific version of SQL Server.
    We named it `v12` because with this new architecture we opened more SQL Server
    features like columnstore and instance-level diagnostics. We didn’t want to break
    applications, so we changed the major version to `v12` (which corresponded to
    the SQL Server version number `12.x` of SQL Server 2014). Since this time, Azure
    SQL Database has become a `versionless` SQL Server, which I’ll describe more in
    Chapter [5](#496204_2_En_5_Chapter.xhtml) of the book.


    ## Rohan Kumar and the Codebase Merge


    Rohan Kumar, the former Vice President of Azure Data Engineering, was leading
    engineering efforts in Azure SQL around this period. He says about the codebase
    merge, “Probably the most important decision technically we made was to unify
    the codebase.” In fact, Rohan was assigned to lead this project, which took some
    18 months while we were maintaining and running the service and delivering releases
    of SQL Server at high quality.


    ## Sterling Deployment Architecture


    The Sterling architecture involved running the SQL Server instance (and other
    needed programs) as a `WinFab` application or effectively as worker roles in the
    Windows Azure nomenclature. One interesting aspect to the deployment of Azure
    SQL Database for Sterling was that only a single virtual machine is used per host
    with one or more SQL Server instances, each hosting a tenant database.


    Note


    You will see later in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the book that
    Azure Managed Instance can combine more than one virtual machine per host.


    Figure [1-7](#496204_2_En_1_Chapter.xhtml#Fig7) comes from a diagram Peter Carlin
    built to show the primary difference between the SAWA (and AutoPilot) and Sterling
    architectures from a SQL Server instance, logical server, and database perspective.


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Sterling architecture database isolation


    In this diagram, a node is a virtual machine or server. An instance is a `SQLSERVR.EXE`
    instance. The cluster is a logical collection of machines hosting virtual machines.
    A logical server is really a set of metadata describing the collection of databases.


    Notice in the “Old Service” (SAWA and AutoPilot) that databases from two different
    logical servers could be deployed on a single SQL instance. With Sterling, each
    instance was reserved for a single logical server, but multiple instances could
    (but doesn’t have to) be deployed on a single virtual machine (or node).


    Note


    Today, almost every Azure SQL Database has its own dedicated SQL instance with
    a few exceptions, which I’ll cover in Chapter [4](#496204_2_En_4_Chapter.xhtml).


    ## Benefits of Windows Fabric


    Using `Windows Fabric` also allowed us to provide better resource governance closer
    to the operating system, provide direct connections to the back-end SQL Servers,
    and leverage Azure Storage for databases and backups. `Windows Fabric` also provided
    architectures for fault tolerance and networking in the form of `clusters`, `nodes`,
    and `rings`. You will learn more about these concepts as well as other aspects
    of the Azure SQL Database architecture throughout the rest of this book. You will
    also learn in this chapter and the rest of the book how we have created other
    deployment options based on the Sterling architecture, including Elastic Database,
    Managed Instance, Hyperscale, and Serverless. After a long journey, Azure SQL
    Database `V12` became generally available in the spring of 2015.


    ## The New Azure Portal


    In addition to work on Sterling, Microsoft Azure had pivoted to a `new portal
    experience` based on HTML (moving away from Silverlight) for all Azure services,
    including Azure SQL Database. Figure [1-8](#496204_2_En_1_Chapter.xhtml#Fig8)
    is a snapshot of Scott Guthrie showing off the new portal in one of his blog post
    archives.


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig8_HTML.jpg)


    Figure 1-8


    The Windows Azure admin portal


    Tip


    Given Scott Guthrie’s long role in Azure, the archives of his blog are incredible
    to tour the history of Azure! You can find them at `https://weblogs.asp.net/scottgu/archive`.'
