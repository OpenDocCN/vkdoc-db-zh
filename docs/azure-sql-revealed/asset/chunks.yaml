    ## Configuring Azure SQL Database


    Since deploying an Azure SQL Database is effectively creating a database, you
    may want to configure some settings about the database from the deployment. You
    may also want to perform some configuration on the logical server associated with
    the database, including creating a new database on the logical server.'
  trans: '### 配置数据库


    部署 Azure SQL 托管实例后，您现在可以通过 Azure 门户、SSMS 等工具或 T-SQL `CREATE DATABASE` 或 `ALTER
    DATABASE` 语句来添加数据库或配置现有数据库。


    `CREATE DATABASE` T-SQL 语法非常简单，因为您无需指定文件或任何 `WITH` 选项。例如，对于我部署的托管实例，我可以运行以下 T-SQL
    语句来创建一个新数据库：


    ```sql

    CREATE DATABASE gocowboys;

    ```


    新数据库将继承 `model` 数据库的属性，就像 SQL Server 一样。其中一个区别是，我们会自动创建一个名为 `XTP` 的内存优化文件组，如果您查询
    `sys.filesgroups` 目录视图，就可以看到它。即使您使用的是不支持内存 OLTP 的常规用途服务层级，我们也会创建 `XTP` 文件组。这使得如果您未来升级到业务关键层级，支持此功能会更加容易。


    该数据库也将继承由 `model` 设置的属性，与 SQL Server 类似，但有两个默认开启的关键选项例外：`查询存储` 和 `加速数据库恢复`。


    数据库创建后，您可以使用 `ALTER DATABASE` 语句对选项进行各种更改，或添加/删除文件和文件组。我们在 T-SQL 文档中做的一件很棒的事情是，允许您选择一个产品来查看像
    `ALTER DATABASE` 这类语句的确切语法支持。图 5-2 显示了在选择了托管实例后，`ALTER DATABASE` 的文档参考（位于 [`https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql?view=azuresqldb-mi-current`](https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql?view=azuresqldb-mi-current)）：


    ![图 5-2](img/496204_2_En_5_Fig2_HTML.jpg)


    您通常在 SQL Server 中看到的大多数 `SET` 选项在托管实例中也可用。一个值得注意的例外是 `ACCELERATED_DATABASE_RECOVERY`。我们默认为您的数据库开启此选项，并且不允许您禁用它。为什么呢？为了满足
    SLA 要求并确保您不会遇到事务日志空间耗尽的问题，保持此选项开启对我们来说非常重要。


    自本书第一版以来，托管实例最显著的进步之一是允许每个实例包含 500 个数据库。


    数据库的一个关键选项是数据库兼容性级别，托管实例支持使用 `ALTER DATABASE` 设置 `dbcompat`。目前托管实例数据库支持 `90` 到
    `160` 的兼容级别。有关 `dbcompat` 的更多信息，请参阅 [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat)。


    **注意**


    如果您从现有的 SQL Server 数据库或托管实例还原备份，我们将保留该数据库备份时的 `dbcompat` 级别。


    尽管您无需担心物理文件放置，但您确实有能力添加数据库文件并在达到最大实例存储限制之前更改文件大小。您还可以创建文件组。您可能希望增加文件数量或大小的一个很好例子是为了提高
    I/O 性能。我的同事 Jovan Popovic 在一篇非常棒的博客文章中描述了如何执行此操作：[`https://medium.com/azure-sqldb-managed-instance/increasing-data-files-might-improve-performance-on-general-purpose-managed-instance-tier-6e90bad2ae4b`](https://medium.com/azure-sqldb-managed-instance/increasing-data-files-might-improve-performance-on-general-purpose-managed-instance-tier-6e90bad2ae4b)。


    话虽如此，新一代 Azure SQL 托管实例不再需要您使用多个文件来提高 I/O 性能，因为您可以单独控制 IOPS。新一代实例还能提供更低的 I/O 延迟、更高的
    IOPS 和更好的 I/O 吞吐量。请查看此博文了解更多信息：[`https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-azure-sql-managed-instance-next-gen-gp/ba-p/4092647`](https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-azure-sql-managed-instance-next-gen-gp/ba-p/4092647)。


    **注意**


    SQL Server Management Studio (SSMS) 也支持像操作 SQL Server 一样更改数据库选项和文件选项。


    同样重要的是要知道，Azure SQL 托管实例支持 `ALTER DATABASE SCOPED CONFIGURATION` T-SQL 语句，就像 SQL
    Server 一样。您可以在此处阅读更多信息：[`https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql)。


    ## 配置 Azure SQL 数据库


    由于部署 Azure SQL 数据库实际上就是创建一个数据库，您可能希望在部署时就配置一些关于数据库的设置。您可能还希望对与数据库关联的逻辑服务器执行一些配置，包括在该逻辑服务器上创建新数据库。'
- fmt: "# Azure SQL Database Management\n\n## Creating New Databases\n\nThe T-SQL\
    \ `CREATE DATABASE` statement is supported when connected to a logical server\
    \ (in any database context). You can view the full syntax of `CREATE DATABASE`\
    \ for Azure SQL Database at [`https://learn.microsoft.com/sql/t-sql/statements/create-database-transact-sql?view=azuresqldb-current`](https://learn.microsoft.com/sql/t-sql/statements/create-database-transact-sql?view=azuresqldb-current).\n\
    \nThe documentation reference above shows all the possible options you can use\
    \ for `EDITION` and `SERVICE_OBJECTIVE`. In this case, the `EDITION` is used to\
    \ decide a DTU model, General Purpose, Business Critical, or Hyperscale. The `SERVICE_OBJECTIVE`\
    \ is used to select options like Serverless, hardware generation, and number of\
    \ vCores.\n\n**Note**\n\nRemember that creating a database for Azure SQL Database\
    \ with `CREATE DATABASE` is a deployment. For SQL Server, we create new files\
    \ and add metadata to the master database. For Azure SQL Database, we are building\
    \ a new deployment (i.e., a dedicated instance for the database) to host the database\
    \ and storing information in our control plan (e.g., gateways). This means the\
    \ `CREATE DATABASE` is an asynchronous operation but can be tracked with the DMV\
    \ `sys.dm_operation_status`. You must query this DMV from the logical master,\
    \ and we retain history for one hour.\n\nYou will notice that you only have two\
    \ options when creating a new database: collation and deployment options. Deployment\
    \ options allow you to choose a purchasing model, service tier, compute model,\
    \ and size.\n\nIf you remember, in Chapter [4](#496204_2_En_4_Chapter.xhtml),\
    \ I deployed several databases using different options for the deployment. Connecting\
    \ to the logical server `bwsqllogicalserver` I used in the Chapter [4](#496204_2_En_4_Chapter.xhtml)\
    \ examples, I can create a new Hyperscale, 8-vCore database with the following\
    \ T-SQL syntax:\n\n```sql\nCREATE DATABASE bwhyperscale\n(EDITION = 'Hyperscale',\
    \ SERVICE_OBJECTIVE = 'HS_Gen5_8');\n```\n\nRemember this is a deployment, so\
    \ it can take longer than you might be used to for a SQL Server database creation.\
    \ In this example, it took about four minutes for this T-SQL statement to complete.\
    \ And notice since we are using Hyperscale, we don’t have to specify a max storage\
    \ option.\n\nThe `CREATE DATABASE` statement for Azure SQL Database also supports\
    \ the `AS COPY OF` option to create a database as a copy of another database even\
    \ from another logical server.\n\nAny database that is created has the following\
    \ options turned on by default:\n*   `SNAPSHOT_ISOLATION_STATE`\n*   `READ_COMMITTED_SNAPSHOT`\n\
    *   `AUTO_CREATE_STATISTICS`\n*   `AUTO_UPDATE_STATISTICS`\n*   `FULL RECOVERY`\n\
    *   `CHECKSUM`\n*   `TDE`\n*   `QUERY_STORE`\n*   `ACCELERATED_DATABASE_RECOVERY`\n\
    \nOne option you may not notice is set on if you examine `sys.databases` is *stale\
    \ page detection*. Stale page detection assists Azure SQL Database to find possible\
    \ data integrity problems due to I/O problems in the infrastructure. I will discuss\
    \ more data integrity checks provided by Azure SQL in Chapter [8](#496204_2_En_8_Chapter.xhtml)\
    \ of the book.\n\n## Altering Databases\n\nFor any database that is created, you\
    \ can use the T-SQL `ALTER DATABASE` statement to modify certain `SET` options.\
    \ You can use this documentation reference to see what options you can turn on\
    \ and off at [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options?view=azuresqldb-current`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options?view=azuresqldb-current).\
    \ You do not have the ability to change any properties of the files behind this\
    \ database. To change the maximum size of the database, you would use the `MAXSIZE`\
    \ parameter. You can also change the `EDITION` or `SERVICE_OBJECTIVE` with `ALTER\
    \ DATABASE` or the Azure Portal. Any execution of `ALTER DATABASE` is also asynchronous\
    \ and can be tracked with `sys.dm_operation_status`.\n\nOne of the key options\
    \ for a database is the *database compatibility level*, and Azure SQL Database\
    \ supports setting the “dbcompat” with `ALTER DATABASE`. Compat levels 90 through\
    \ 160 are currently supported for Azure SQL Database. Read more about dbcompat\
    \ at [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat).\n\nIt is also important\
    \ to know that the `ALTER DATABASE SCOPED CONFIGURATION` T-SQL statement is supported\
    \ for Azure SQL Database just like SQL Server. This is a very important option\
    \ for you to control various methods to control various database behaviors. You\
    \ can read more at [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql).\n\
    \nThe `az sql db` CLI also supports the ability to change options about the deployment\
    \ of the database as documented at [`https://learn.microsoft.com/cli/azure/sql/db?view=azure-cli-latest#az-sql-db-update`](https://learn.microsoft.com/cli/azure/sql/db?view=azure-cli-latest#az-sql-db-update).\
    \ PowerShell also provides the `Set-AzSQLDatabase`, which is documented at [`https://learn.microsoft.com/powershell/module/az.sql/set-azsqldatabase`](https://learn.microsoft.com/powershell/module/az.sql/set-azsqldatabase).\n\
    \nThe Azure Portal supports changing several options about the database deployment\
    \ from the Service Menu, Command Bar, and Working Pane.\n\n## Network Configuration\n\
    \nWhen we deployed an Azure SQL Database in Chapter [4](#496204_2_En_4_Chapter.xhtml)\
    \ of the book, we were able to specify a few networking options for the logical\
    \ server, including public endpoint access, allowing Azure services, connection\
    \ types, and firewall rules. The keyword here is logical server. Even though you\
    \ can technically set up firewall rules at the database level, most of your networking\
    \ configuration happens at the logical server context.\n\nAs you can see from\
    \ Figure [5-3](#496204_2_En_5_Chapter.xhtml#Fig3), for an existing logical server\
    \ you can configure settings for public access, private access, and connectivity.\n\
    \n![](images/496204_2_En_5_Chapter/496204_2_En_5_Fig3_HTML.jpg)\n\n**Figure 5-3**\
    \  \nConfiguring networking for a logical server\n\n**Public access** allows you\
    \ to configure virtual networks and firewall configurations.\n\nWe will cover\
    \ more about **private access**, including private endpoints, in Chapter [6](#496204_2_En_6_Chapter.xhtml)\
    \ of the book.\n\n**Connectivity** allows you to change settings like outbound\
    \ connections, connection types, and TLS.\n\n**Outbound connections** allow you\
    \ to create firewall rules for any connections from the server to other sources\
    \ like Azure Storage or other logical servers. Features impacted by this option\
    \ include auditing, `OPENROWSET`, and REST APIs (which you will learn more about\
    \ in Chapter [10](#496204_2_En_10_Chapter.xhtml) of the book).\n\nConnection policy\
    \ is like the connection type for a Managed Instance: Proxy or Redirect. Notice\
    \ here for Azure SQL Database there is the choice of default. Default uses a policy\
    \ to use a Proxy connection type if the connection originates outside of Azure\
    \ while Redirect if the connection is within Azure.\n\nThe Redirect connection\
    \ policy can be much faster for application latency because the gateway is used\
    \ to redirect traffic to the direct node for the Azure SQL Database. My colleague\
    \ Anna Hoffman has a nice example to how much faster Redirect can be over Proxy\
    \ at [`https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/02-DeployAndConfigure`](https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/02-DeployAndConfigure).\n\
    \nMinimal TLS version is exactly like the TLS requirements as I described earlier\
    \ in this chapter for a Managed Instance."
  raw: '### Creating New Databases


    The T-SQL CREATE DATABASE statement is supported when connected to a logical server
    (in any database context). You can view the full syntax of CREATE DATABASE for
    Azure SQL Database at [`https://learn.microsoft.com/sql/t-sql/statements/create-database-transact-sql?view=azuresqldb-current`](https://learn.microsoft.com/sql/t-sql/statements/create-database-transact-sql?view=azuresqldb-current).


    The documentation reference above shows all the possible options you can use for
    EDITION and SERVICE_OBJECTIVE. In this case, the EDITION is used to decide a DTU
    model, General Purpose, Business Critical, or Hyperscale. The SERVICE_OBJECTIVE
    is used to select options like Serverless, hardware generation, and number of
    vCores.


    Note


    Remember that creating a database for Azure SQL Database with CREATE DATABASE
    is a deployment. For SQL Server, we create new files and add metadata to the master
    database. For Azure SQL Database, we are building a new deployment (i.e., a dedicated
    instance for the database) to host the database and storing information in our
    control plan (e.g., gateways). This means the CREATE DATABASE is an asynchronous
    operation but can be tracked with the DMV **sys.dm_operation_status**. You must
    query this DMV from the logical master, and we retain history for one hour.


    You will notice that you only have two options when creating a new database: collation
    and deployment options. Deployment options allow you to choose a purchasing model,
    service tier, compute model, and size.


    If you remember, in Chapter [4](#496204_2_En_4_Chapter.xhtml), I deployed several
    databases using different options for the deployment. Connecting to the logical
    server **bwsqllogicalserver** I used in the Chapter [4](#496204_2_En_4_Chapter.xhtml)
    examples, I can create a new Hyperscale, 8-vCore database with the following T-SQL
    syntax:


    ```

    CREATE DATABASE bwhyperscale

    (EDITION = ''Hyperscale'', SERVICE_OBJECTIVE = ''HS_Gen5_8'');

    ```


    Remember this is a deployment, so it can take longer than you might be used to
    for a SQL Server database creation. In this example, it took about four minutes
    for this T-SQL statement to complete. And notice since we are using Hyperscale,
    we don’t have to specify a max storage option.


    The CREATE DATABASE statement for Azure SQL Database also supports the AS COPY
    OF option to create a database as a copy of another database even from another
    logical server.


    Any database that is created has the following options turned on by default:


    *   SNAPSHOT_ISOLATION_STATE


    *   READ_COMMITTED_SNAPSHOT


    *   AUTO_CREATE_STATISTICS


    *   AUTO_UPDATE_STATISTICS


    *   FULL RECOVERY


    *   CHECKSUM


    *   TDE


    *   QUERY_STORE


    *   ACCELERATED_DATABASE_RECOVERY


    One option you may not notice is set on if you examine **sys.databases** is *stale
    page detection*. Stale page detection assists Azure SQL Database to find possible
    data integrity problems due to I/O problems in the infrastructure. I will discuss
    more data integrity checks provided by Azure SQL in Chapter [8](#496204_2_En_8_Chapter.xhtml)
    of the book.


    ### Altering Databases


    For any database that is created, you can use the T-SQL ALTER DATABASE statement
    to modify certain SET options. You can use this documentation reference to see
    what options you can turn on and off at [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options?view=azuresqldb-current`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options?view=azuresqldb-current).
    You do not have the ability to change any properties of the files behind this
    database. To change the maximum size of the database, you would use the MAXSIZE
    parameter. You can also change the EDITION or SERVICE_OBJECTIVE with ALTER DATABASE
    or the Azure Portal. Any execution of ALTER DATABASE is also asynchronous and
    can be tracked with **sys.dm_operation_status**.


    One of the key options for a database is the *database compatibility level*, and
    Azure SQL Database supports setting the “dbcompat” with ALTER DATABASE. Compat
    levels 90 through 160 are currently supported for Azure SQL Database. Read more
    about dbcompat at [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat).


    It is also important to know that the ALTER DATABASE SCOPED CONFIGURATION T-SQL
    statement is supported for Azure SQL Database just like SQL Server. This is a
    very important option for you to control various methods to control various database
    behaviors. You can read more at [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql).


    The **az sql db** CLI also supports the ability to change options about the deployment
    of the database as documented at [`https://learn.microsoft.com/cli/azure/sql/db?view=azure-cli-latest#az-sql-db-update`](https://learn.microsoft.com/cli/azure/sql/db?view=azure-cli-latest#az-sql-db-update).
    PowerShell also provides the **Set-AzSQLDatabase**, which is documented at [`https://learn.microsoft.com/powershell/module/az.sql/set-azsqldatabase`](https://learn.microsoft.com/powershell/module/az.sql/set-azsqldatabase).


    The Azure Portal supports changing several options about the database deployment
    from the Service Menu, Command Bar, and Working Pane.


    ### Network Configuration


    When we deployed an Azure SQL Database in Chapter [4](#496204_2_En_4_Chapter.xhtml)
    of the book, we were able to specify a few networking options for the logical
    server, including public endpoint access, allowing Azure services, connection
    types, and firewall rules. The keyword here is logical server. Even though you
    can technically set up firewall rules at the database level, most of your networking
    configuration happens at the logical server context.


    As you can see from Figure [5-3](#496204_2_En_5_Chapter.xhtml#Fig3), for an existing
    logical server you can configure settings for public access, private access, and
    connectivity.


    ![](images/496204_2_En_5_Chapter/496204_2_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Configuring networking for a logical server


    **Public access** allows you to configure virtual networks and firewall configurations.


    We will cover more about **private access**, including private endpoints, in Chapter
    [6](#496204_2_En_6_Chapter.xhtml) of the book.


    **Connectivity** allows you to change settings like outbound connections, connection
    types, and TLS.


    **Outbound connections** allow you to create firewall rules for any connections
    from the server to other sources like Azure Storage or other logical servers.
    Features impacted by this option include auditing, OPENROWSET, and REST APIs (which
    you will learn more about in Chapter [10](#496204_2_En_10_Chapter.xhtml) of the
    book).


    Connection policy is like the connection type for a Managed Instance: Proxy or
    Redirect. Notice here for Azure SQL Database there is the choice of default. Default
    uses a policy to use a Proxy connection type if the connection originates outside
    of Azure while Redirect if the connection is within Azure.


    The Redirect connection policy can be much faster for application latency because
    the gateway is used to redirect traffic to the direct node for the Azure SQL Database.
    My colleague Anna Hoffman has a nice example to how much faster Redirect can be
    over Proxy at [`https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/02-DeployAndConfigure`](https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/02-DeployAndConfigure).


    Minimal TLS version is exactly like the TLS requirements as I described earlier
    in this chapter for a Managed Instance.'
  trans: '

    # Azure SQL 数据库管理


    ## 创建新数据库


    在连接到逻辑服务器时（任何数据库上下文中），支持 T-SQL 的 `CREATE DATABASE` 语句。你可以在 [`https://learn.microsoft.com/sql/t-sql/statements/create-database-transact-sql?view=azuresqldb-current`](https://learn.microsoft.com/sql/t-sql/statements/create-database-transact-sql?view=azuresqldb-current)
    查看 Azure SQL 数据库 `CREATE DATABASE` 的完整语法。


    上方的文档参考展示了 `EDITION` 和 `SERVICE_OBJECTIVE` 可使用的所有可能选项。在此，`EDITION` 用于决定是 DTU 模型、通用型、业务关键型还是超大规模。`SERVICE_OBJECTIVE`
    用于选择诸如无服务器、硬件代系和 vCore 数量等选项。


    **注意**


    请记住，使用 `CREATE DATABASE` 为 Azure SQL 数据库创建数据库是一个部署过程。对于 SQL Server，我们是创建新文件并向
    master 数据库添加元数据。而对于 Azure SQL 数据库，我们是在构建一个新的部署（即数据库的专用实例）来托管数据库，并将信息存储在我们的控制平面中（例如，网关）。这意味着
    `CREATE DATABASE` 是一个异步操作，但可以通过 DMV `sys.dm_operation_status` 进行跟踪。你必须从逻辑 master
    查询此 DMV，并且我们保留一小时的历史记录。


    你会注意到，在创建新数据库时只有两个选项：排序规则和部署选项。部署选项允许你选择购买模型、服务层、计算模型和大小。


    如果你还记得，在第 4 章中，我使用不同的部署选项部署了多个数据库。连接到第 4 章示例中使用的逻辑服务器 `bwsqllogicalserver`，我可以使用以下
    T-SQL 语法创建一个新的超大规模、8 vCore 数据库：


    ```sql

    CREATE DATABASE bwhyperscale

    (EDITION = ''Hyperscale'', SERVICE_OBJECTIVE = ''HS_Gen5_8'');

    ```


    请记住这是一个部署过程，因此可能比你习惯的 SQL Server 数据库创建时间更长。在此示例中，此 T-SQL 语句完成大约需要四分钟。并且请注意，由于我们使用的是超大规模，因此无需指定最大存储选项。


    Azure SQL 数据库的 `CREATE DATABASE` 语句还支持 `AS COPY OF` 选项，以创建一个数据库作为另一个数据库的副本，甚至可以来自另一个逻辑服务器。


    创建的任何数据库都默认开启以下选项：

    *   `SNAPSHOT_ISOLATION_STATE`

    *   `READ_COMMITTED_SNAPSHOT`

    *   `AUTO_CREATE_STATISTICS`

    *   `AUTO_UPDATE_STATISTICS`

    *   `FULL RECOVERY`

    *   `CHECKSUM`

    *   `TDE`

    *   `QUERY_STORE`

    *   `ACCELERATED_DATABASE_RECOVERY`


    如果你检查 `sys.databases`，可能会注意到一个已启用的选项是*过时页面检测*。过时页面检测帮助 Azure SQL 数据库查找因基础架构 I/O
    问题可能导致的数据完整性问题。我将在本书第 8 章中讨论更多 Azure SQL 提供的数据完整性检查。


    ## 修改数据库


    对于创建的任何数据库，你可以使用 T-SQL `ALTER DATABASE` 语句来修改某些 `SET` 选项。你可以使用此文档参考 [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options?view=azuresqldb-current`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options?view=azuresqldb-current)
    查看可以开启和关闭的选项。你无法更改此数据库背后文件的任何属性。要更改数据库的最大大小，你可以使用 `MAXSIZE` 参数。你还可以使用 `ALTER DATABASE`
    或 Azure 门户更改 `EDITION` 或 `SERVICE_OBJECTIVE`。任何 `ALTER DATABASE` 的执行也是异步的，可以通过
    `sys.dm_operation_status` 跟踪。


    数据库的一个关键选项是*数据库兼容性级别*，Azure SQL 数据库支持使用 `ALTER DATABASE` 设置“dbcompat”。目前 Azure
    SQL 数据库支持从 90 到 160 的兼容级别。在 [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat)
    阅读更多关于 dbcompat 的信息。


    同样重要的是要了解，与 SQL Server 一样，Azure SQL 数据库也支持 `ALTER DATABASE SCOPED CONFIGURATION`
    T-SQL 语句。这是一个非常重要的选项，用于控制各种方法以调节数据库行为。你可以在 [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql)
    阅读更多内容。


    `az sql db` CLI 也支持更改数据库部署选项的能力，如文档 [`https://learn.microsoft.com/cli/azure/sql/db?view=azure-cli-latest#az-sql-db-update`](https://learn.microsoft.com/cli/azure/sql/db?view=azure-cli-latest#az-sql-db-update)
    所述。PowerShell 也提供了 `Set-AzSQLDatabase`，其文档位于 [`https://learn.microsoft.com/powershell/module/az.sql/set-azsqldatabase`](https://learn.microsoft.com/powershell/module/az.sql/set-azsqldatabase)。


    Azure 门户支持通过服务菜单、命令栏和工作窗格更改有关数据库部署的几个选项。


    ## 网络配置


    当我们在本书第 4 章部署 Azure SQL 数据库时，我们能够为逻辑服务器指定一些网络选项，包括公共终结点访问、允许 Azure 服务、连接类型和防火墙规则。这里的关键词是逻辑服务器。尽管从技术上讲你可以在数据库级别设置防火墙规则，但你的大多数网络配置都发生在逻辑服务器上下文中。


    正如你从图 5-3 所见，对于现有的逻辑服务器，你可以配置公共访问、专用访问和连接性的设置。


    ![](img/496204_2_En_5_Fig3_HTML.jpg)


    **图 5-3**

    配置逻辑服务器的网络


    **公共访问** 允许你配置虚拟网络和防火墙设置。


    我们将在本书第 6 章中更详细地介绍**专用访问**，包括专用终结点。


    **连接性** 允许你更改出站连接、连接类型和 TLS 等设置。


    **出站连接** 允许你为服务器到其他源（如 Azure 存储或其他逻辑服务器）的任何连接创建防火墙规则。受此选项影响的功能包括审核、`OPENROWSET`
    和 REST API（你将在本书第 10 章中了解更多）。


    连接策略类似于托管实例的连接类型：代理或重定向。请注意，对于 Azure SQL 数据库，这里可以选择默认值。默认使用一种策略：如果连接源自 Azure 外部则使用代理连接类型，如果连接在
    Azure 内部则使用重定向。


    重定向连接策略可以显著降低应用程序延迟，因为网关用于将流量重定向到 Azure SQL 数据库的直接节点。我的同事 Anna Hoffman 有一个很好的示例，展示了重定向比代理快多少：[`https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/02-DeployAndConfigure`](https://github.com/microsoft/sqlworkshops-azuresqlworkshop/tree/master/azuresqlworkshop/02-DeployAndConfigure)。


    最低 TLS 版本与本章前面为托管实例描述的 TLS 要求完全相同。

    '
- fmt: '### Configuring Serverless


    我在本书第[4](#496204_2_En_4_Chapter.xhtml)章向你们展示了部署无服务器 Azure SQL 数据库的概念。图[5-4](#496204_2_En_5_Chapter.xhtml#Fig4)展示了一个通用型无服务器数据库的
    vCore 配置选项。


    ![](images/496204_2_En_5_Chapter/496204_2_En_5_Fig4_HTML.jpg)


    图 5-4 配置无服务器数据库


    从这些选项中你可以看到，你可以控制一个 vCore 范围，包括最小值和最大值。最小值可以低至 0.5，最大值可达 80。你将按每秒使用的 vCore 付费（有最低
    vCore 设置的最低费用）。对于通用型服务层级，你还可以选择自动暂停。如果我们检测到你对数据库的使用处于空闲状态，我们可以暂停你的计算，在空闲时间你将不会为任何计算付费（仅需支付存储费用）。然后，当你再次连接到数据库时，我们会将你的数据库附加到一个新的
    SQL Server 实例并将其启动。


    ### Configuring Elastic Pools


    我在本书第[4](#496204_2_En_4_Chapter.xhtml)章向你们展示了如何在弹性池中部署数据库。你可以像配置数据库一样配置弹性池，*在池级别*，包括设置
    vCore、存储和冗余。


    弹性池的承诺之一是在多个数据库之间共享资源，因此你不必担心跨它们管理最小和最大资源。然而，你可能希望确保在池内没有哪个数据库试图占用过多资源。


    图[5-5](#496204_2_En_5_Chapter.xhtml#Fig5)展示了你如何为池中的每个数据库配置最小和最大 vCore。


    ![](images/496204_2_En_5_Chapter/496204_2_En_5_Fig5_HTML.jpg)


    图 5-5 为弹性池配置每个数据库的资源


    ## Configuration Restrictions


    虽然有几种选项可以配置 Azure SQL 托管实例和数据库，但我认为重要的是指出一些你可以在 SQL Server 实例和数据库级别进行但在 Azure
    SQL 中*受到限制*的配置选项。在可能的情况下，我会说明为什么某些选项在 PaaS 环境中受到限制或不需要。


    ### Azure SQL Managed Instance Restrictions


    许多 SQL Server 级别的配置选项是使用 SQL Server 配置管理器（Windows）或 `mssql-conf`（Linux）、T-SQL
    或 SSMS 等工具完成的。由于我使用 SQL Server 已有多年，我认为让你了解这些工具和接口中存在哪些选项以及为什么它们对 Azure SQL 托管实例和数据库是受限的会很有趣。


    #### Start and Stop Services


    你可以停止和启动托管 SQL 实例，但无法对 Azure SQL 数据库执行此操作（请记住，无服务器数据库确实具有自动暂停功能）。


    > **Note**

    >

    > 你将在本书第[8](#496204_2_En_8_Chapter.xhtml)章学习如何使用 PowerShell 命令 `Invoke-AzSqlDatabaseFailover`
    手动故障转移 Azure SQL 数据库。


    #### Instant File Initialization


    没有用于启用即时文件初始化（IFI）的接口，你可以在 [`https://learn.microsoft.com/sql/relational-databases/databases/database-instant-file-initialization`](https://learn.microsoft.com/sql/relational-databases/databases/database-instant-file-initialization)
    阅读相关信息。然而，我认为这不是一个主要因素，有两个重要原因：


    *   当数据库启用了透明数据加密（TDE）时，不支持或不使用 IFI。TDE 在 Azure SQL 托管实例和数据库的数据库中默认启用。

    *   我对“自动增长”场景进行了一些测试，从未引起任何重大的性能瓶颈。


    #### Locked Pages


    没有像 SQL Server 那样的接口来启用锁定页面（或大页面）。但是，我们可能会在某些部署中选择启用此功能。关键是你不必为此担心。如果需要使用此设置，我们将控制操作系统和此设置的内存。


    #### FILESTREAM and Availability Groups


    SQL Server 配置管理器允许你启用 FILESTREAM 和 Always On 可用性组功能。Azure SQL 不支持 FILESTREAM。Always
    On 可用性组（AG）在商业关键服务层级的幕后使用，但你无法自行设置或配置 AG。


    #### Server Collation


    你可以在部署托管实例期间设置 SQL Server 实例的排序规则，但之后无法更改它。你仍然可以像 SQL Server 一样为数据库或表中的列设置排序规则。


    Azure SQL 数据库允许你在部署期间指定数据库排序规则，但之后无法更改它。你也可以在列级别定义排序规则。


    #### Startup Parameters


    SQL Server 配置管理器允许你为 SQL Server 引擎设置某些启动参数，如 [`https://learn.microsoft.com/sql/database-engine/configure-windows/database-engine-service-startup-options`](https://learn.microsoft.com/sql/database-engine/configure-windows/database-engine-service-startup-options)
    所述。这些选项均未暴露给 Azure SQL 进行修改。根据我的经验，大多数这些选项用于某些“边缘”场景，你不需要或无法使用（例如以单用户模式启动 SQL
    Server）。尽管如此，正如我在本章前面提到的，你可以为 Azure SQL 托管实例设置一些跟踪标志。


    #### ERRORLOG Configuration


    SSMS 允许你配置 ERRORLOG 文件的数量和最大大小。这些选项不受支持用于配置 Azure SQL 托管实例，因为它需要重启实例。此外，虽然拥有超过默认六个
    ERRORLOG 文件可能很好，但 ERRORLOG 最大值通常用于控制磁盘空间，这对于托管实例来说不是问题。


    > **Note**

    >

    > 系统过程 `sp_cycle_errorlog` 在托管实例上受支持。但是，ERRORLOG 文件存储在本地节点上，因此在故障转移时不会保存。


    #### Error Reporting and Customer Feedback


    SQL Server 提供了一种配置错误报告和客户反馈的方法，如 [`https://learn.microsoft.com/sql/sql-server/usage-and-diagnostic-data-configuration-for-sql-server`](https://learn.microsoft.com/sql/sql-server/usage-and-diagnostic-data-configuration-for-sql-server)
    所述。此配置对于 Azure SQL 是不可能的，但也不适用。


    > **Note**

    >

    > 我们确实使用遥测技术来改进 Azure SQL。请查看这篇传奇人物 Conor Cunningham 更详细解释的文章：[`https://redmondmag.com/articles/2018/02/14/qa-lead-sql-architect-part-1.aspx`](https://redmondmag.com/articles/2018/02/14/qa-lead-sql-architect-part-1.aspx)。

    >

    > 如果你对 Microsoft 收集或使用有关你部署的任何信息有任何疑虑，我建议你仔细阅读 [`https://azure.microsoft.com/support/legal/`](https://azure.microsoft.com/support/legal/)
    上的隐私和其他法律文件。


    #### ALTER SERVER CONFIGURATION


    `ALTER SERVER CONFIGURATION` 是在 SQL Server 几个版本前引入的，作为一种与 `sp_configure` 不同的新配置实例方式。


    `ALTER SERVER CONFIGURATION` 不支持用于 Azure SQL，但没有适合为 Azure SQL 实例配置的选项，因为大多数这些选项是自动完成或不适用的。'
  raw: '### Configuring Serverless


    I showed you in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the book the concept
    of deploying a Serverless Azure SQL Database. Figure [5-4](#496204_2_En_5_Chapter.xhtml#Fig4)
    shows the configuration choices for vCores for a General Purpose Serverless database.


    ![](images/496204_2_En_5_Chapter/496204_2_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Configure a serverless database


    You can see from your choices you can control a range of vCores, including a minimum
    and maximum. The minimum can be as low as 0.5 and the maximum can be 80\. You
    will be only charged for the vCores you use per second (with a minimum charge
    for the min vCore setting). For General Purpose service tier, you also have the
    choice of auto-pause. If we detect your use of the database is idle, we can pause
    your compute, and you won’t be charged for any compute during idle time (just
    storage). Then when you connect to the database again, we will attach your database
    to a new SQL Server instance and start it up.


    ### Configuring Elastic Pools


    I showed you how to deploy a database in an elastic pool in Chapter [4](#496204_2_En_4_Chapter.xhtml)
    of the book. You can configure an elastic pool like a database, *at the pool level*,
    including setting vCores, storage, and redundancy.


    One of the promises of elastic pool is to share resources across many databases,
    so you don’t have to worry about managing minimum and maximum resources across
    them. However, it could be that you want to make sure within the pool that no
    one database tries to maximize too many resources.


    Figure [5-5](#496204_2_En_5_Chapter.xhtml#Fig5) shows how you can configure the
    minimum and maximum vCores for each database in the pool.


    ![](images/496204_2_En_5_Chapter/496204_2_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Configuring per database resources for an elastic pool


    ## Configuration Restrictions


    While there are several options to configure an Azure SQL Managed Instance and
    Database, I thought it is important to call out some of the configuration options
    you can make for SQL Server both at the instance and database levels *but are
    restricted* in Azure SQL. When possible, I will call out why certain options are
    restricted or are not needed in a PaaS environment.


    ### Azure SQL Managed Instance Restrictions


    Many of the configuration choices at a SQL Server level are done using the SQL
    Server Configuration Manager (Windows) or mssql-conf (Linux), T-SQL, or tools
    like SSMS. Since I have worked with SQL Server for many years, I thought it would
    be interesting for you to know what options exist in these tools and interfaces
    and why they are restricted for Azure SQL Managed Instance and Databases.


    #### Start and Stop Services


    You can stop and start a Managed SQL Instance, but you cannot do this for an Azure
    SQL Database (remember a serverless database does have an auto-pause feature).


    Note


    You will learn in Chapter [8](#496204_2_En_8_Chapter.xhtml) of the book how to
    manually fail over an Azure SQL Database using the PowerShell command **Invoke-AzSqlDatabaseFailover**.


    #### Instant File Initialization


    There is no interface for you to enable Instant File Initialization (IFI), which
    you can read about at [`https://learn.microsoft.com/sql/relational-databases/databases/database-instant-file-initialization`](https://learn.microsoft.com/sql/relational-databases/databases/database-instant-file-initialization).
    However, there are two important points why I do not think this is a big factor:


    *   IFI is not supported or used when the database has Transparent Data Encryption
    (TDE) enabled. TDE is enabled by default for databases for Azure SQL Managed Instance
    and Database.


    *   I did some testing for “autogrow” scenarios and could never cause any major
    performance bottlenecks.


    #### Locked Pages


    There is no interface to enable locked pages (or large pages) as with SQL Server.
    However, we may choose to enable this in some situations in our deployments. The
    key for you is you shouldn’t have to worry about this. We will control memory
    for the OS and this setting in coordination if we need to use it.


    #### FILESTREAM and Availability Groups


    SQL Server Configuration Manager allows you to enable the FILESTREAM and Always
    On Availability Group features. FILESTREAM is not supported by Azure SQL. Always
    On Availability Groups (AG) are used behind the scenes for Business Critical service
    tiers, but you cannot set up or configure an AG on your own.


    #### Server Collation


    You can set the collation for the SQL Server instance during deployment of a Managed
    Instance but cannot change it after that. You can still set collations for databases
    or columns in tables like SQL Server.


    Azure SQL Database allows you to specify a database collation during deployment,
    but you cannot change it later. You can also define collations at the column level.


    #### Startup Parameters


    SQL Server Configuration Manager allows you to set certain startup parameters
    for the SQL Server engine as documented at [`https://learn.microsoft.com/sql/database-engine/configure-windows/database-engine-service-startup-options`](https://learn.microsoft.com/sql/database-engine/configure-windows/database-engine-service-startup-options).
    None of these options are exposed to modify for Azure SQL. In my experience, most
    of these options are used for certain “edge” scenarios that you won’t need or
    can’t use (like starting SQL Server in single user mode). Having said that as
    I said earlier in this chapter, you can set some trace flags for Azure SQL Managed
    Instance.


    #### ERRORLOG Configuration


    SSMS allows you to configure the number of ERRORLOG files and maximum size. These
    options are not supported to configure for Azure SQL Managed Instance because
    it requires a restart of the instance. Furthermore, while it might be nice to
    have more than the default of six ERRORLOG files, the maximum size of the ERRORLOG
    value is generally used to control disk space, but that is not a concern with
    Managed Instance.


    Note


    The system procedure sp_cycle_errorlog is supported on Managed Instance. However,
    ERRORLOG files are stored on the local node, so they are not saved on a failover.


    #### Error Reporting and Customer Feedback


    SQL Server provides a way to configure error reporting and customer feedback as
    documented at [`https://learn.microsoft.com/sql/sql-server/usage-and-diagnostic-data-configuration-for-sql-server`](https://learn.microsoft.com/sql/sql-server/usage-and-diagnostic-data-configuration-for-sql-server).
    This configuration is not possible for Azure SQL but does not apply.


    Note


    We do use telemetry to improve Azure SQL. Take a look at this article where the
    legendary Conor Cunningham explains in more detail: [`https://redmondmag.com/articles/2018/02/14/qa-lead-sql-architect-part-1.aspx`](https://redmondmag.com/articles/2018/02/14/qa-lead-sql-architect-part-1.aspx).


    If you have any concerns about what information about your deployment is collected
    or used by Microsoft, I recommend you read over privacy and other legal documents
    at [`https://azure.microsoft.com/support/legal/`](https://azure.microsoft.com/support/legal/).


    #### ALTER SERVER CONFIGURATION


    ALTER SERVER CONFIGURATION was introduced several releases ago with SQL Server
    as a new way to configure the instance vs. sp_configure.


    ALTER SERVER CONFIGURATION is not supported with Azure SQL, but there are no options
    where it makes sense to configure an instance for Azure SQL given most of these
    options are done automatically or do not apply.'
  trans: '### 配置无服务器


    我在本书第 4 章向你们展示了部署无服务器 Azure SQL 数据库的概念。图 5-4 展示了一个通用型无服务器数据库的 vCore 配置选项。


    ![](img/496204_2_En_5_Fig4_HTML.jpg)


    图 5-4 配置无服务器数据库


    从这些选项中你可以看到，你可以控制一个 vCore 范围，包括最小值和最大值。最小值可以低至 0.5，最大值可达 80。你将按每秒使用的 vCore 付费（有最低
    vCore 设置的最低费用）。对于通用型服务层级，你还可以选择自动暂停。如果我们检测到你对数据库的使用处于空闲状态，我们可以暂停你的计算，在空闲时间你将不会为任何计算付费（仅需支付存储费用）。然后，当你再次连接到数据库时，我们会将你的数据库附加到一个新的
    SQL Server 实例并将其启动。


    ### 配置弹性池


    我在本书第 4 章向你们展示了如何在弹性池中部署数据库。你可以像配置数据库一样配置弹性池，*在池级别*，包括设置 vCore、存储和冗余。


    弹性池的承诺之一是在多个数据库之间共享资源，因此你不必担心跨它们管理最小和最大资源。然而，你可能希望确保在池内没有哪个数据库试图占用过多资源。


    图 5-5 展示了你如何为池中的每个数据库配置最小和最大 vCore。


    ![](img/496204_2_En_5_Fig5_HTML.jpg)


    图 5-5 为弹性池配置每个数据库的资源


    ## 配置限制


    虽然有几种选项可以配置 Azure SQL 托管实例和数据库，但我认为重要的是指出一些你可以在 SQL Server 实例和数据库级别进行但在 Azure
    SQL 中*受到限制*的配置选项。在可能的情况下，我会说明为什么某些选项在 PaaS 环境中受到限制或不需要。


    ### Azure SQL 托管实例限制


    许多 SQL Server 级别的配置选项是使用 SQL Server 配置管理器（Windows）或 `mssql-conf`（Linux）、T-SQL
    或 SSMS 等工具完成的。由于我使用 SQL Server 已有多年，我认为让你了解这些工具和接口中存在哪些选项以及为什么它们对 Azure SQL 托管实例和数据库是受限的会很有趣。


    #### 启动和停止服务


    你可以停止和启动托管 SQL 实例，但无法对 Azure SQL 数据库执行此操作（请记住，无服务器数据库确实具有自动暂停功能）。


    > **注意**

    >

    > 你将在本书第 8 章学习如何使用 PowerShell 命令 `Invoke-AzSqlDatabaseFailover` 手动故障转移 Azure SQL
    数据库。


    #### 即时文件初始化


    没有用于启用即时文件初始化（IFI）的接口，你可以在 [`https://learn.microsoft.com/sql/relational-databases/databases/database-instant-file-initialization`](https://learn.microsoft.com/sql/relational-databases/databases/database-instant-file-initialization)
    阅读相关信息。然而，我认为这不是一个主要因素，有两个重要原因：


    *   当数据库启用了透明数据加密（TDE）时，不支持或不使用 IFI。TDE 在 Azure SQL 托管实例和数据库的数据库中默认启用。

    *   我对“自动增长”场景进行了一些测试，从未引起任何重大的性能瓶颈。


    #### 锁定页面


    没有像 SQL Server 那样的接口来启用锁定页面（或大页面）。但是，我们可能会在某些部署中选择启用此功能。关键是你不必为此担心。如果需要使用此设置，我们将控制操作系统和此设置的内存。


    #### FILESTREAM 和可用性组


    SQL Server 配置管理器允许你启用 FILESTREAM 和 Always On 可用性组功能。Azure SQL 不支持 FILESTREAM。Always
    On 可用性组（AG）在商业关键服务层级的幕后使用，但你无法自行设置或配置 AG。


    #### 服务器排序规则


    你可以在部署托管实例期间设置 SQL Server 实例的排序规则，但之后无法更改它。你仍然可以像 SQL Server 一样为数据库或表中的列设置排序规则。


    Azure SQL 数据库允许你在部署期间指定数据库排序规则，但之后无法更改它。你也可以在列级别定义排序规则。


    #### 启动参数


    SQL Server 配置管理器允许你为 SQL Server 引擎设置某些启动参数，如 [`https://learn.microsoft.com/sql/database-engine/configure-windows/database-engine-service-startup-options`](https://learn.microsoft.com/sql/database-engine/configure-windows/database-engine-service-startup-options)
    所述。这些选项均未暴露给 Azure SQL 进行修改。根据我的经验，大多数这些选项用于某些“边缘”场景，你不需要或无法使用（例如以单用户模式启动 SQL
    Server）。尽管如此，正如我在本章前面提到的，你可以为 Azure SQL 托管实例设置一些跟踪标志。


    #### ERRORLOG 配置


    SSMS 允许你配置 ERRORLOG 文件的数量和最大大小。这些选项不受支持用于配置 Azure SQL 托管实例，因为它需要重启实例。此外，虽然拥有超过默认六个
    ERRORLOG 文件可能很好，但 ERRORLOG 最大值通常用于控制磁盘空间，这对于托管实例来说不是问题。


    > **注意**

    >

    > 系统过程 `sp_cycle_errorlog` 在托管实例上受支持。但是，ERRORLOG 文件存储在本地节点上，因此在故障转移时不会保存。


    #### 错误报告和客户反馈


    SQL Server 提供了一种配置错误报告和客户反馈的方法，如 [`https://learn.microsoft.com/sql/sql-server/usage-and-diagnostic-data-configuration-for-sql-server`](https://learn.microsoft.com/sql/sql-server/usage-and-diagnostic-data-configuration-for-sql-server)
    所述。此配置对于 Azure SQL 是不可能的，但也不适用。


    > **注意**

    >

    > 我们确实使用遥测技术来改进 Azure SQL。请查看这篇传奇人物 Conor Cunningham 更详细解释的文章：[`https://redmondmag.com/articles/2018/02/14/qa-lead-sql-architect-part-1.aspx`](https://redmondmag.com/articles/2018/02/14/qa-lead-sql-architect-part-1.aspx)。

    >

    > 如果你对 Microsoft 收集或使用有关你部署的任何信息有任何疑虑，我建议你仔细阅读 [`https://azure.microsoft.com/support/legal/`](https://azure.microsoft.com/support/legal/)
    上的隐私和其他法律文件。


    #### ALTER SERVER CONFIGURATION


    `ALTER SERVER CONFIGURATION` 是在 SQL Server 几个版本前引入的，作为一种与 `sp_configure` 不同的新配置实例方式。


    `ALTER SERVER CONFIGURATION` 不支持用于 Azure SQL，但没有适合为 Azure SQL 实例配置的选项，因为大多数这些选项是自动完成或不适用的。'
- fmt: '### “Mixed Mode” Security


    Azure SQL Managed Instance and Database both support a similar concept to “mixed
    mode” security from SQL Server. You can set up authentication for your instance
    or database to be


    *   Microsoft Entra authentication only

    *   Both SQL and Microsoft Entra authentication

    *   SQL Authentication only


    Here are a few notes about these options:


    *   If you have already allowed SQL Authentication and change to Microsoft Entra
    authentication only, no SQL logins are removed, just disabled.

    *   Azure SQL Managed Instance does allow Windows Authentication to help with
    application compatibility.


    ### Logon Auditing


    The SQL Server engine for years has supported the ability to track successful,
    failed, both (and none) login attempts. This tracking is written to the ERRORLOG
    and is configured typically through SSMS. While for Managed Instance, the options
    exist to configure this tracking of logins, they do not take effect because it
    requires a restart of SQL Server. Failed logins, which is the default, is tracked
    in the ERRORLOG.


    You can perform your own audit of logins with Extended Events or SQL Audit for
    Azure SQL. I will show you more about auditing for Azure SQL in Chapter [6](#496204_2_En_6_Chapter.xhtml)
    of the book.


    ### Server Proxy Account


    SSMS supports the configuration of a server proxy account for the system procedure
    `xp_cmdshell`. This configuration is not supported for Managed Instance since
    `xp_cmdshell` is not supported for Azure SQL Managed Instance or Database.


    ### Database Restrictions


    Many of the common options to configure a database through `ALTER DATABASE` are
    allowed for Managed Instance just like SQL Server. One notable exception is that
    you cannot disable `ACCELERATE_DATABASE_RECOVERY`. That is because we rely on
    ADR technology to ensure the promised SLA for availability.


    ### Azure SQL Database Restrictions


    All the restrictions listed in the previous section for Managed Instance also
    apply to Azure SQL Database.


    A few other notable restrictions you may have guessed since Azure SQL Database
    does not expose a full SQL Server instance:


    *   `sp_configure` is not supported.

    *   `DBCC TRACEON` is not supported. In fact, if you run this command, it fails
    with Msg 2571 (i.e., no permissions).

    *   You can use `DBCC TRACESTATUS` to see what trace flags we enable even if you
    cannot turn them on or off (the list is pretty much the same as is used with Managed
    Instance).


    `ACCELERATED_DATABASE_RECOVERY` is also enabled by default and cannot be disabled.
    The same applies to Query Store, but you can disable Query Store from writing
    data and make it read only.


    ## Azure SQL Space Management


    One other topic related to Azure SQL configuration is space management. While
    we have abstracted the physical placement of database and transaction log files
    for both Azure SQL Managed Instance and Database, *sizes* are still a factor you
    must manage and consider. Because Azure SQL Managed Instance and Database provide
    different deployment surface areas, space management can be different between
    each option.


    ### Azure SQL Managed Instance Space Management


    As I have described in Chapter [4](#496204_2_En_4_Chapter.xhtml) for deployment,
    the maximum size for data for a Managed Instance is the overall size for all database
    storage. Your choice of vCores and options like Business Critical affect the maximum
    storage size for the instance.


    With SQL Server, when a database file has a limit on size, you may encounter Msg
    1105 to indicate you have run out of space. This error could occur if you also
    run out of disk space on the filesystem hosting your database. For a Managed Instance,
    you can also encounter Msg 1105 if you have run out of space on the maximum size
    of your database. However, since we enforce maximum storage limits for all databases,
    you may also encounter an error before you run out of space in your database like
    this:


    ```

    Msg 1133

    The managed instance has reached its storage limit. The storage usage for the
    managed instance cannot exceed (%d) MBs.

    ```


    To be clear what this means, it is possible for you to hit this error before hitting
    the maximum size of an individual database because collectively you have hit the
    limit for all databases (including system databases).


    ### Azure SQL Database Space Management


    Azure SQL Database manages space differently than Managed Instance. The maximum
    size as specified during deployment is the *possible* maximum size of a single
    database file.


    If you deploy an Azure SQL Database, the maximum size is typically reflected in
    the `max_size` column of `sys.database_files` for a single data file. However,
    for larger maximum database size values (e.g., 1TB), we may not set the `max_size`
    to that value but grow as data is added to the eventual `max_size`.


    If you run out of space in the database, you will get a quota error instead of
    the traditional 1105 error like this:


    ```

    Msg 40544, Level 17, State 2, Line 12

    The database '''' has reached its size quota. Partition or delete data, drop indexes,
    or consult the documentation for possible resolutions.

    ```


    The transaction log is handled differently. While you configure the maximum data
    storage size, we automatically add 30% above this size for the transaction log.
    Note that we can in some cases increase this number, but you will never be charged
    for more than the 30% additional space for the log. Do not use the `max_size`
    in `sys.database_files` for the maximum size of the transaction log. It does not
    accurately reflect the quota. In all my testing, I never ran out of transaction
    log space due to two factors:


    *   We regularly and often back up the transaction log (remember we use full recovery).

    *   We have Accelerated Database Recovery (ADR) enabled by default, and you cannot
    disable it. With ADR, the log can be truncated even in the presence of active
    transactions.


    The one exception to space management for Azure SQL Database is the Hyperscale
    service tier. A Hyperscale database has a 100TB limit, but theoretically we believe
    it could be unlimited. When you deploy a Hyperscale database, we create multiple
    database files that total around 40GB. Then as you add data, we automatically
    grow the database. The transaction log has a limit of 1TB, but we back up the
    log regularly and rely also on ADR, so I do not think you will run out of space.


    ## Loading Data


    Whether you deployed a new Managed Instance or Database or migrated from an existing
    instance or database, you inevitably will want to load data. Just like a SQL Server
    installation, you have several tools and options to load data. In addition, you
    have new services available to you in Azure.'
