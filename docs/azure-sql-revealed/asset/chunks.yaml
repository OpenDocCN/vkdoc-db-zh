- fmt: '## Beyond RDBMS


    在 2023 年，我意识到 `Azure SQL Database` 已远不止是一个传统的关系型数据库管理系统（RDBMS）。我为此创造了一个品牌来描述这些能力，称之为
    `Beyond RDBMS`。


    第 [10](#496204_2_En_10_Chapter.xhtml) 章将更详细地描述所有这些功能，但请考虑 `Azure SQL Database`（以及虚拟机中的
    `SQL Server` 和 `Azure SQL Managed Instance`）已内置到数据库中（无需附加组件）：


    *   原生 JSON 数据类型和 T-SQL 函数

    *   图数据库

    *   空间数据类型

    *   列存储索引

    *   智能查询处理

    *   基于账本的内置区块链

    *   一套新的正则表达式（RegEx）T-SQL 函数

    *   内存优化表


    此外，还构建了一套在 SQL 内外的新功能，包括


    *   在 SQL 引擎内部调用 `REST API`

    *   通过 `GraphQL` 连接和执行 SQL

    *   与 `Azure Functions` 的深度集成

    *   使用容器、数据库项目和 `GitHub actions` 的完整 `DevOps` 开发框架

    *   构建新的生成式 `AI` 应用程序的能力

    *   与 `Microsoft Fabric` 的集成


    在第 [10](#496204_2_En_10_Chapter.xhtml) 章中，您将读到更多关于如何使用和利用这些新功能来用 SQL 做一些您可能从未想过的事情。


    ## 摘要


    `Azure SQL` 是世界的数据库。凭借用于虚拟机、托管实例和数据库的服务，它几乎提供了您需要的所有选项，所有这些都由世界上最受欢迎的数据库产品 `SQL
    Server` 的同一数据库引擎提供支持。


    `Azure SQL` 与 `Azure` 生态系统完全集成，包括 `Azure Portal` 以及流行的接口和工具。


    `Azure` 虚拟机上的 `SQL Server` 在利用 `Azure` 系统优势的同时，为您提供了终极控制级别。`Azure SQL Managed
    Instances` 为您提供了数据库引擎实例与 `PaaS` 服务功能的结合，包括内置的高可用性。`Azure SQL Database` 为现代云应用程序提供了最多的部署选项，包括无服务器和超大规模。`Azure
    SQL Database` 为您提供了最大的 `PaaS` 功能，包括内置的 `HADR` 和自动调优。


    本书的其余部分是对 `Azure SQL` 产品线的深入探讨。您在这段旅程中的第一站是 `Azure` 虚拟机上的 `SQL Server`。


    ## 3. Azure 虚拟机上的 SQL Server


    在第 [2](#496204_2_En_2_Chapter.xhtml) 章中，我描述了 `Azure SQL` 产品线，其中包括 `Azure` 虚拟机（`VM`）上的
    `SQL Server`。`Azure VM` 上的 `SQL Server` 代表了 `Azure` 中 `SQL` 的主要 `IaaS` 部署选项。


    在本章中，我将涵盖在 `Azure` 虚拟机上部署、配置、优化和管理 `SQL Server` 的所有方面。


    您将在本章中经历几个示例。您需要以下内容来完成这些示例：


    *   一个 `Azure` 订阅。

    *   对 `Azure` 订阅的最低 `Contributor` 角色访问权限。

    *   访问 `Azure Portal`（`Web` 或 `Windows` 应用程序）。

    *   安装 `az CLI`。您也可以使用 `Azure Cloud Shell`，因为 `az` 已经安装好了。


    ### 部署


    作为一名长期的 `SQL Server` 用户，我从未真正使用过 `deploy` 这个术语。我一直使用 `install` 或 `setup`。`deploy`
    是我在本书剩余部分将用来讨论在 `Azure` 虚拟机、托管实例或数据库上安装 `SQL Server` 的术语。使用 `deploy` 这个术语有一个很好的理由。当您为
    `Azure` 服务创建资源时（无论是通过 `Portal` 还是 `CLI`），`Azure Resource Manager` 都会创建一个 `deployment`。您将在本章和本书的第
    [4](#496204_2_En_4_Chapter.xhtml) 章中学习如何查看有关部署历史的信息。


    在 `Azure` 虚拟机上部署 `SQL Server` 的基本过程是


    *   ✓ 决定使用 `SQL Server` 库映像还是“自行部署”。

    *   ✓ 选择资源组、区域、可用性和其他选项。

    *   ✓ 选择虚拟机大小、管理员帐户和端口规则。

    *   ✓ 可选择提供其他配置选项，包括特定的 `SQL Server` 选项和存储。

    *   ✓ 部署它！


    #### 定价


    在我深入部署细节之前，您应该更多地了解如何为 `Azure` 虚拟机付费。由于您是在 `Azure` 中部署，因此您需要定期（按月计费）向 `Microsoft`
    支付计算和存储等资源使用的费用。这被称为 `pay as you go`。此外，您还需要为操作系统（如果该 `OS` 需要付费许可证，例如 `Windows
    Server`）和 `SQL Server` 的许可证付费。您将可以选择 `bring your own license`（`BYOL`）来利用您已经为 `OS`
    和 `SQL Server` 支付的许可证，或者将这些许可证用于称为 `Azure Hybrid Benefit`（`AHB`）的概念。在本章中，您还将了解到其他省钱的方法，例如保留实例以及在不需要时停止
    `VM`。为了帮助您，请访问这个方便的网站，称为定价计算器：[`https://azure.microsoft.com/pricing/calculator/?service=virtual-machines`](https://azure.microsoft.com/pricing/calculator/%253Fservice%253Dvirtual-machines)。'
  raw: '## Beyond RDBMS


    In 2023, I came to realize that Azure SQL Database was becoming far more than
    a traditional Relational Database Management System (RDBMS). I came up with a
    branding to describe these capabilities, calling it *Beyond RDBMS*.


    Chapter [10](#496204_2_En_10_Chapter.xhtml) will describe all these capabilities
    in more detail but consider that Azure SQL Database (as well as SQL Server in
    Virtual Machines and Azure SQL Managed Instance) has built into the database (with
    no add-ons required):


    *   A native JSON data type and T-SQL functions


    *   A graph database


    *   Spatial data types


    *   Columnstore indexes


    *   Intelligent Query Processing


    *   A built-in blockchain with Ledger


    *   A new Regular Expression (RegEx) set of T-SQL functions


    *   Memory-optimized tables


    In addition, a new set of capabilities both in and outside of SQL has been built,
    including


    *   Calling REST API inside the SQL engine


    *   Connecting and executing SQL with GraphQL


    *   Deep integration with Azure Functions


    *   A complete DevOps development framework using containers, database projects,
    and GitHub actions


    *   The ability to build new Generative AI applications


    *   Integration with Microsoft Fabric


    In Chapter [10](#496204_2_En_10_Chapter.xhtml), you will read more about how to
    use and take advantage of these new features to do things with SQL you may never
    thought possible.


    ## Summary


    Azure SQL is the world’s database. With services for virtual machines, managed
    instances, and databases, there is just about every option you need, all powered
    by the same database engine for one of the world’s most popular database products,
    SQL Server.


    Azure SQL is fully integrated with the Azure ecosystem, including the Azure Portal
    and popular interfaces and tools.


    SQL Server on Azure Virtual Machines provides you the ultimate level of control
    while taking advantage of the benefits of the Azure system. Azure SQL Managed
    Instances provide you a database engine instance combined with the power of a
    PaaS service, including built-in high availability. Azure SQL Database provides
    you the most deployment options for a modern cloud application, including serverless
    and Hyperscale. Azure SQL Database gives you maximum PaaS capabilities, including
    built-in HADR and Automatic Tuning.


    The rest of this book is a deep dive into the Azure SQL lineup. Your first stop
    in that journey is SQL Server on Azure Virtual Machines.


    # 3. SQL Server on Azure Virtual Machine


    In Chapter [2](#496204_2_En_2_Chapter.xhtml), I described the Azure SQL lineup
    which includes SQL Server on Azure Virtual Machine (VM). SQL Server on Azure VM
    represents the primary IaaS deployment option for SQL in Azure.


    In this chapter, I will cover all aspects of deploying, configuring, optimizing,
    and managing SQL Server on Azure Virtual Machine.


    You will go through several examples in this chapter. You will need the following
    to complete these examples:


    *   An Azure subscription.


    *   A minimum of Contributor role access to the Azure subscription.


    *   Access to the Azure Portal (web or Windows application).


    *   Installation of the az CLI. You can also use the Azure Cloud Shell instead
    since az is already installed.


    ## Deploying


    As a long-time SQL Server user, I have never really used the term *deploy*. I
    have always used the term install or setup. Deploy is a term I will use for the
    rest of this book to talk about installing a SQL Server on Azure Virtual Machine,
    Managed Instance, or Database. There is a good reason to snap to the term deploy.
    When you create a resource for an Azure service (whether that is through the Portal
    or CLI), Azure Resource Manager will create a **deployment**. You will learn how
    to view information about deployment history in this chapter and in Chapter [4](#496204_2_En_4_Chapter.xhtml)
    of this book.


    The basic process to deploy SQL Server on Azure Virtual Machine is


    *   ✓ Decide to use a SQL Server gallery image or “deploy on your own.”


    *   ✓ Choose a resource group, region, availability, and other options.


    *   ✓ Choose a virtual machine size, admin account, and port rule.


    *   ✓ Optionally supply other configuration choices including specific SQL Server
    choices and storage.


    *   ✓ Deploy it!


    ### Pricing


    Before I get into the details of deployment, you should understand more about
    how you pay for Azure Virtual Machines. Since you are deploying in Azure, you
    are paying Microsoft a fee on a regular basis (billed monthly) for resource usage
    such as compute and storage. This is referred to as *pay as you go*. In addition,
    you will pay for the license for the operating system (if that OS requires a paid
    license such as Windows Server) and the license for SQL Server. You will have
    options to *bring your own license* (BYOL) for both the OS and SQL Server to utilize
    licenses you have already paid for or to use those licenses for a concept called
    Azure Hybrid Benefit (AHB). You will also learn that there are other ways in this
    chapter to save money such as Reserved Instances and stopping the VM when you
    do not need it. To help you, check out this nifty website called a pricing calculator
    at [`https://azure.microsoft.com/pricing/calculator/?service=virtual-machines`](https://azure.microsoft.com/pricing/calculator/%253Fservice%253Dvirtual-machines).'
  trans: '

    ## 超越 RDBMS


    在 2023 年，我意识到 `Azure SQL Database` 已远不止是一个传统的关系型数据库管理系统（RDBMS）。我为此创造了一个品牌来描述这些能力，称之为
    `Beyond RDBMS`。


    第 10 章将更详细地描述所有这些功能，但请考虑 `Azure SQL Database`（以及虚拟机中的 `SQL Server` 和 `Azure SQL
    Managed Instance`）已内置到数据库中（无需附加组件）：


    *   原生 JSON 数据类型和 T-SQL 函数

    *   图数据库

    *   空间数据类型

    *   列存储索引

    *   智能查询处理

    *   基于账本的内置区块链

    *   一套新的正则表达式（RegEx）T-SQL 函数

    *   内存优化表


    此外，还构建了一套在 SQL 内外的新功能，包括：


    *   在 SQL 引擎内部调用 `REST API`

    *   通过 `GraphQL` 连接和执行 SQL

    *   与 `Azure Functions` 的深度集成

    *   使用容器、数据库项目和 `GitHub actions` 的完整 `DevOps` 开发框架

    *   构建新的生成式 `AI` 应用程序的能力

    *   与 `Microsoft Fabric` 的集成


    在第 10 章中，您将读到更多关于如何使用和利用这些新功能来用 SQL 做一些您可能从未想过的事情。


    ## 摘要


    `Azure SQL` 是世界的数据库。凭借用于虚拟机、托管实例和数据库的服务，它几乎提供了您需要的所有选项，所有这些都由世界上最受欢迎的数据库产品 `SQL
    Server` 的同一数据库引擎提供支持。


    `Azure SQL` 与 `Azure` 生态系统完全集成，包括 `Azure Portal` 以及流行的接口和工具。


    `Azure` 虚拟机上的 `SQL Server` 在利用 `Azure` 系统优势的同时，为您提供了终极控制级别。`Azure SQL Managed
    Instances` 为您提供了数据库引擎实例与 `PaaS` 服务功能的结合，包括内置的高可用性。`Azure SQL Database` 为现代云应用程序提供了最多的部署选项，包括无服务器和超大规模。`Azure
    SQL Database` 为您提供了最大的 `PaaS` 功能，包括内置的 `HADR` 和自动调优。


    本书的其余部分是对 `Azure SQL` 产品线的深入探讨。您在这段旅程中的第一站是 `Azure` 虚拟机上的 `SQL Server`。


    ## 3. Azure 虚拟机上的 SQL Server


    在第 2 章中，我描述了 `Azure SQL` 产品线，其中包括 `Azure` 虚拟机（`VM`）上的 `SQL Server`。`Azure VM`
    上的 `SQL Server` 代表了 `Azure` 中 `SQL` 的主要 `IaaS` 部署选项。


    在本章中，我将涵盖在 `Azure` 虚拟机上部署、配置、优化和管理 `SQL Server` 的所有方面。


    您将在本章中经历几个示例。您需要以下内容来完成这些示例：


    *   一个 `Azure` 订阅。

    *   对 `Azure` 订阅的最低 `Contributor` 角色访问权限。

    *   访问 `Azure Portal`（`Web` 或 `Windows` 应用程序）。

    *   安装 `az CLI`。您也可以使用 `Azure Cloud Shell`，因为 `az` 已经安装好了。


    ### 部署


    作为一名长期的 `SQL Server` 用户，我从未真正使用过 `deploy` 这个术语。我一直使用 `install` 或 `setup`。`deploy`
    是我在本书剩余部分将用来讨论在 `Azure` 虚拟机、托管实例或数据库上安装 `SQL Server` 的术语。使用 `deploy` 这个术语有一个很好的理由。当您为
    `Azure` 服务创建资源时（无论是通过 `Portal` 还是 `CLI`），`Azure Resource Manager` 都会创建一个 `deployment`。您将在本章和本书的第
    4 章中学习如何查看有关部署历史的信息。


    在 `Azure` 虚拟机上部署 `SQL Server` 的基本过程是：


    *   ✓ 决定使用 `SQL Server` 库映像还是“自行部署”。

    *   ✓ 选择资源组、区域、可用性和其他选项。

    *   ✓ 选择虚拟机大小、管理员帐户和端口规则。

    *   ✓ 可选择提供其他配置选项，包括特定的 `SQL Server` 选项和存储。

    *   ✓ 部署它！


    #### 定价


    在我深入部署细节之前，您应该更多地了解如何为 `Azure` 虚拟机付费。由于您是在 `Azure` 中部署，因此您需要定期（按月计费）向 `Microsoft`
    支付计算和存储等资源使用的费用。这被称为 `pay as you go`。此外，您还需要为操作系统（如果该 `OS` 需要付费许可证，例如 `Windows
    Server`）和 `SQL Server` 的许可证付费。您将可以选择 `bring your own license`（`BYOL`）来利用您已经为 `OS`
    和 `SQL Server` 支付的许可证，或者将这些许可证用于称为 `Azure Hybrid Benefit`（`AHB`）的概念。在本章中，您还将了解到其他省钱的方法，例如保留实例以及在不需要时停止
    `VM`。为了帮助您，请访问这个方便的网站，称为定价计算器：[`https://azure.microsoft.com/pricing/calculator/?service=virtual-machines`](https://azure.microsoft.com/pricing/calculator/%253Fservice%253Dvirtual-machines)。

    '
- fmt: '### SQL Server Gallery Images


    要在虚拟机上部署 SQL Server，你可以从一组预安装的操作系统/SQL Server 版本/版本组合的镜像中选择，这些镜像被称为 *gallery images*。这里提供了各种类型的选择。你可以在
    [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/frequently-asked-questions-faq?view=azuresql#images`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/frequently-asked-questions-faq%253Fview%253Dazuresql%2523images)
    阅读关于 SQL Server 镜像的优质 FAQ 资源。


    将使用 SQL Server gallery image 理解为 *sysprep 安装的 SQL Server*。你也可以选择从 gallery image
    部署带有操作系统的虚拟机，然后在 VM 的客户机操作系统中自行安装 SQL Server。我将这种方法称为“自行部署”。我将在下面标题为“自行部署”的部分讨论此选项。


    让我们探索使用 Azure 门户通过 gallery image 在 Azure 虚拟机上部署 SQL Server 2022。你可以使用自己的订阅跟着操作，或者先阅读这些示例，稍后再部署。在本章末尾，我还会向你指出一些有趣的实验。


    在你的 Azure 门户中，使用门户顶部的搜索框搜索 **Marketplace** 中的 Azure SQL，如图 [3-1](#496204_2_En_3_Chapter.xhtml#Fig1)
    所示。


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig1_HTML.jpg)


    图 3-1


    来自 Marketplace 的 Azure SQL


    现在，系统会展示要部署的 Azure 服务类型的选择。在“SQL 虚拟机”下的下拉列表中选择 **SQL Server 2022 Enterprise on
    Windows Server 2022**，如图 [3-2](#496204_2_En_3_Chapter.xhtml#Fig2) 所示。


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig2_HTML.jpg)


    图 3-2


    来自 Azure SQL 的 SQL Server 2012 gallery image


    出于本示例的目的，我将选择 SQL Server 2022 Enterprise。这使我能够在本章剩余部分向你展示一些配置选择。你本可以轻松选择 Free
    SQL Server 2022 Developer on Windows Server 2022。对于此镜像选择，SQL Server 许可是免费的，但你只能将该
    VM 用于开发目的。


    选择此选项并点击 **Create** 按钮。你现在会看到一个屏幕，其中包含部署 VM 所需的一系列必填字段和选项，如图 [3-3](#496204_2_En_3_Chapter.xhtml#Fig3)
    所示。


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig3_HTML.jpg)


    图 3-3


    创建 SQL VM 屏幕的“基础”部分顶部


    注意屏幕顶部的 Copilot for Azure 选项。此外，还有一系列名称（或部分），指示了你在部署过程中可以做出的几个选择。第一个屏幕被称为 **Basics**。并非所有部分中的所有字段都是必填的。“基础”屏幕拥有最多的必填字段。你可以点击这些部分中的任何一个，或使用底部的按钮在一系列选择中导航。


    你的一些默认值会有所不同（例如，你的 Azure 订阅将被列为默认值；如果你有多个订阅，请在此处更改为 VM 部署所需的目标订阅），并且你将做出各种选择。让我们在部署过程和创建屏幕中逐步完成你的所有选择。


    ### Resource Group, Region, and Availability


    你的前几个选项是需要提供的必填字段，包括资源组、名称和 Azure 区域。此外，你还可以选择一个可用性选项。


    #### Resource Group


    正如我在本书第 [2](#496204_2_En_2_Chapter.xhtml) 章所述，资源组是组织和集中管理 Azure 资源的好方法。你将在本章中看到，默认情况下，会为你指定的新资源组创建一个虚拟网络，并且
    VM 会自动添加到该虚拟网络中。出于本练习的目的，请选择 **Create New** 并为其命名。我将我的 VM 命名为 **bwsqlvmsrg**。


    #### Virtual Machine Name


    这既是 Azure 资源的名称，也是 VM 内部客户机的主机名（你可以在部署后更改 VM 中的主机名）。请注意，不允许使用某些特殊字符，且名称长度不能超过
    15 个字符。此名称在资源组内必须是唯一的。在本练习中，我输入名称 **bwsql2022**。


    #### Region


    这是 Azure 数据中心所在的区域。我在本书第 [2](#496204_2_En_2_Chapter.xhtml) 章介绍了 Azure 区域和数据中心。你选择的区域有几个因素需要考虑，包括可用的
    VM 大小、合规性、价格以及到用户和应用程序的延迟。你可以在 [`https://www.cloudelicious.net/azure-region-and-datacenter-find-your-best-match/`](https://www.cloudelicious.net/azure-region-and-datacenter-find-your-best-match/)
    阅读更多关于选择正确区域的信息。请注意，你的订阅也可能不支持某些 Azure 区域。如果你没有看到需要的选项，请咨询你的订阅所有者。我将选择 Central
    US 作为我的区域。


    #### Availability Options


    这是部署期间的可选字段。只有当你计划将 SQL VM 连接到其他 VM 以实现 HADR 目的（如可用性组、故障转移集群实例等）时，才需要选择此选项。不幸的是，最好在部署期间决定要使用哪个选项。出于本示例的目的，请将此项保留为“不需要基础结构冗余”。我将在本章后面的“HADR”标题下讨论何时使用此处的某些选项。


    注意


    这并不意味着 *独立* SQL Server 没有基本的高可用性。Azure 可以处理在数据中心内因故障将你的 VM 迁移到主机（使用实时迁移）。此外，你的数据库的
    Azure 存储还具有内置冗余。


    #### Security Type


    Azure 虚拟机提供了新选项，可为 VM 提供更高级别的安全性。这对于 SQL Server 尤为重要，因为它可以为 VM 内部的 SQL 提供静态数据和内存中数据的安全级别。此安全性类型称为
    **confidential virtual machine**，由 AMD 处理器支持。另一种安全性类型是 **trusted launch virtual
    machines**，它通过安全启动等功能保护虚拟机。出于本示例的目的，我不会使用这些选择，因此我将选择 **Standard**。


    #### Image


    这里将填写你从 Azure SQL 屏幕所做的选择。在部署之前，你此时可以更改它。暂时保留 SQL Server 2022 Enterprise Windows
    Server 2022 的选择。


    注意


    你可以使用以下 PowerShell 命令获取特定区域中可用的 SQL Server gallery image 的完整列表（用你选择的区域名称替换）：


    `Get-AzVMImageOffer -Location ‘Central US’ -Publisher ‘MicrosoftSQLServer’`


    #### VM Architecture


    Azure 虚拟机支持 x64 和 Arm64 架构。目前的 SQL Server 仅支持 x64。'
  raw: '### SQL Server Gallery Images


    To deploy a SQL Server on Virtual Machine, you can choose from a set of preinstalled
    images of an operating system/SQL Server version/edition combination called *gallery
    images*. There are all types of choices here. You can read a good FAQ resource
    on SQL Server images at [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/frequently-asked-questions-faq?view=azuresql#images`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/frequently-asked-questions-faq%253Fview%253Dazuresql%2523images).


    Think of using a SQL Server gallery image like a *sysprep installed SQL Server*.
    You can also choose to deploy a virtual machine with an operating system from
    a gallery image and then install SQL Server from your own media inside the guest
    OS of the VM. I call this method “deploy on your own.” I will discuss this option
    in the section below titled “Deploy on Your Own.”


    Let’s explore using the Azure Portal for a deployment of SQL Server 2022 on Azure
    Virtual Machines using a gallery image. Follow along with your own subscription
    or read through these examples and deploy later. I also have some interesting
    labs to point you to at the end of the chapter.


    In your Azure Portal, search for Azure SQL in the **Marketplace** using the Search
    box at the top of your portal as in Figure [3-1](#496204_2_En_3_Chapter.xhtml#Fig1).


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Azure SQL from the Marketplace


    You are now presented choices on the type of Azure service to deploy. Use the
    drop-down list under SQL virtual machines to choose **SQL Server 2022 Enterprise
    on Windows Server 2022** as in Figure [3-2](#496204_2_En_3_Chapter.xhtml#Fig2).


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig2_HTML.jpg)


    Figure 3-2


    SQL Server 2012 gallery image from Azure SQL


    For the purposes of this example, I am going to choose SQL Server 2022 Enterprise.
    This allows me to show you a few configuration choices in the rest of this chapter.
    You could have easily picked Free SQL Server 2022 Developer on Windows Server
    2022\. For this image choice, the SQL Server license is free, but you can only
    use the VM for development purposes.


    Choose this option and click the **Create** button. You are now presented a screen
    for a series of required fields and choices to deploy the VM as seen in Figure
    [3-3](#496204_2_En_3_Chapter.xhtml#Fig3).


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig3_HTML.jpg)


    Figure 3-3


    The initial top of the create SQL VM screen for Basics


    Notice at the top of the screen some Copilot for Azure choices. In addition, there
    are a series of names (or sections) indicating several choices you can make during
    deployment. The first screen is known as **Basics**. Not all fields in all sections
    are required. The Basics screen has the most required fields. You can click any
    of these sections or use the buttons at the bottom to navigate through a series
    of choices.


    Some of your defaults will be different (e.g., your Azure subscription will be
    listed as a default; if you have more than one subscription, change it here to
    the desired target subscription for the VM deployment), and you will be making
    various choices. Let us walk through all your choices during the deploy process
    and create screens.


    ### Resource Group, Region, and Availability


    Your first several options are required fields to provide, including a resource
    group, name, and Azure region. In addition, you have an option to choose an availability
    option.


    #### Resource Group


    As I have described in Chapter [2](#496204_2_En_2_Chapter.xhtml) of the book,
    a resource group is a great way to organize and manage Azure resources together.
    You will see in this chapter that, by default, a virtual network is created for
    a new resource group you specify, and the VM is automatically added to the virtual
    network. For the purposes of this exercise, choose **Create New** and give it
    a name. I called my VM **bwsqlvmsrg**.


    #### Virtual Machine Name


    This is both the name of the Azure resource and the guest host name inside the
    VM (you can change the host name in the VM after deployment). Note some special
    characters are not allowed, and the name must be no longer than 15 characters.
    This name must be unique within the resource group. For this exercise, I put in
    the name **bwsql2022**.


    #### Region


    This is the region where Azure data centers are located. I described Azure regions
    and data centers in Chapter [2](#496204_2_En_2_Chapter.xhtml) of the book. There
    are several factors for the region you choose, including available VM sizes, compliance,
    price, and latency to users and applications. You can read more about choosing
    the right region at [`https://www.cloudelicious.net/azure-region-and-datacenter-find-your-best-match/`](https://www.cloudelicious.net/azure-region-and-datacenter-find-your-best-match/).
    Note it is also possible that your subscription does not support certain Azure
    regions. Check with the owner of your subscription if you don’t see a choice you
    need. I will choose Central US for my region.


    #### Availability Options


    This is an optional field during deployment. This choice will only make sense
    to choose if you plan to connect your SQL VM to other VMs for HADR purposes (such
    as Availability Groups, Failover Cluster Instance, etc.). Unfortunately, it is
    best to decide which option to use here during deployment. For the purposes of
    this example, leave this as “No infrastructure redundancy required.” I will discuss
    more when to use certain options here under the section titled “HADR” later in
    this chapter.


    Note


    This does not mean you do not get basic high availability for a *stand-alone*
    SQL Server. Azure can handle migrating your VM to a host within a data center
    for failures (using live migration). In addition, there is built-in redundancy
    for Azure Storage for your databases.


    #### Security Type


    Azure Virtual Machines offer new options to provide a higher-level security for
    the VM. This can be especially important for SQL Server as it can provide a level
    of security for data at rest and in-memory for SQL inside the VM. This security
    type is known as a **confidential virtual machine**, supported by AMD processors.
    Another security type is **trusted launch virtual machines** which protects the
    virtual machines with features like secure boot. For the purposes of this example,
    I won’t use these choices, so I’ll pick **Standard**.


    #### Image


    This will be filled in with the choice you made from the Azure SQL screen. It
    is possible for you to change it at this point before you deploy. Leave the choice
    SQL Server 2022 Enterprise Windows Server 2022 for now.


    Note


    You can get a complete list of SQL Server gallery images available in a specific
    region using the following PowerShell command (substitute in your region name
    of choice):


    **Get-AzVMImageOffer -Location ‘Central US’ -Publisher ‘MicrosoftSQLServer’**


    #### VM Architecture


    Azure Virtual Machines support both x64 and Arm64 architectures. SQL Server today
    is only supported for x64.'
