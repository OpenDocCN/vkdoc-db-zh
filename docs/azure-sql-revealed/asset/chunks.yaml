    I briefly mentioned in Chapter [1](#496204_2_En_1_Chapter.xhtml) the concept of
    Azure Arc to connect a SQL Server to the cloud. While I talk more about Azure
    Arc in Chapter [10](#496204_2_En_10_Chapter.xhtml) of the book, I’ll mention here
    there is an innovation (in preview at the time of the writing of this book) to
    help you assess your current SQL Server deployment to see if it is compatible
    to migration to the cloud, including what are the right deployment decisions and
    resource choices. Learn more about how to use this capability at [`https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment`](https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment).


    #### Restoring a Database


    Since SQL Server in Azure Virtual Machine is a full SQL Server engine, one simple
    way to migrate an existing SQL Server is to just restore a backup of existing
    databases.


    Since the target SQL Server is in the Azure infrastructure, you have a few ways
    to do this:


    *   Copy the backup file with “copy and paste” over RDP. RDP clients allow you
    to copy and paste files, and I have done this a bunch of times for Azure VM. Of
    course, this only makes sense for small backup files (although I have done this
    with backup files even 1GB in size).


    *   Back up the database to Azure Storage using the **backup to URL** functionality
    within SQL Server. Then in the Azure VM, restore the backup from the same Azure
    Storage account. You can read more about SQL Server backup to URL at [`https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`](https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url).


    *   Use **Azure Files**. Think of this like creating your own file share in the
    cloud. You can use az CLI or tools to copy your backup file to the Azure file
    share. Then you can mount the Azure file share within the Azure VM (i.e., it will
    look like a network share in the VM). Read more about how to do this at [`https://learn.microsoft.com/azure/storage/files/storage-files-introduction`](https://learn.microsoft.com/azure/storage/files/storage-files-introduction).
    I have used this method several times for both Azure VMs for Windows and Linux.


    *   For large backup files, consider the **Azure Import/Export service**. You
    literally will securely ship a hard drive to Microsoft (we can supply you the
    method with an Azure Data Box Disk), and we will import this to Azure Storage
    or Azure Files. You can read more about this at [`https://learn.microsoft.com/azure/import-export/storage-import-export-service`](https://learn.microsoft.com/azure/import-export/storage-import-export-service).


    #### Azure Migrate and Azure Database Migration Service


    Let’s say you wanted a more online migration experience to Azure Virtual Machine.
    You have that option using the **Azure Database Migration Service** (DMS). DMS
    is a managed service in Azure that orchestrates a migration to Azure SQL, including
    Azure Virtual Machine. One of the options for this migration is to do an online
    migration for SQL Server to Azure VM. DMS will use log shipping technology to
    take a series of continuous database full and transaction log backups and restore
    them to an already deployed SQL Server on Azure VM. See an example of how to use
    this service at [`https://learn.microsoft.com/data-migration/sql-server/virtual-machines/database-migration-service?tabs=online-with-extension`](https://learn.microsoft.com/data-migration/sql-server/virtual-machines/database-migration-service%253Ftabs%253Donline-with-extension).


    If you want to assess and migrate SQL Server ***at scale***, consider using **Azure
    Migrate**. Azure Migrate is an Azure service and set of client software agents
    to assess and migrate SQL Server running in virtual machines and bare-metal servers
    to Azure. Azure Migrate can coordinate with Azure Database Migration Service to
    help you perform offline and/or online migrations. Get started at [`https://learn.microsoft.com/azure/migrate/how-to-create-azure-sql-assessment`](https://learn.microsoft.com/azure/migrate/how-to-create-azure-sql-assessment).


    #### Using Azure Migrate Server Migration


    What if you would like to migrate the installation of an entire physical server
    or virtual machine to Azure instead of just your data? Azure supports this concept
    with a service called **Azure Migrate Server Migration**. This is a true *lift
    and shift* operation. Think of this like taking a snapshot of your machine or
    VM and creating an entire VM from the snapshot. Then you configure and optimize
    after the fact. You can read more about Server Migration at [`https://learn.microsoft.com/azure/migrate/migrate-services-overview#azure-migrate-server-migration-tool`](https://learn.microsoft.com/azure/migrate/migrate-services-overview%2523azure-migrate-server-migration-tool).
    A great example of how this works for VMware installation can be seen at [`https://aka.ms/mechanicsazuremigrate`](https://aka.ms/mechanicsazuremigrate)
    with legendary Windows guru Jeff Woolsey.'
  trans: '### 预留实例、专用主机和容量预留


    为了节省 Azure 虚拟机的费用，你可以预付一段时间（一到三年）的费用，从而在部署时节省 Azure 虚拟机的计算成本。此选项称为 `Azure 预留虚拟机实例`。如果你计划部署许多
    SQL Server Azure 虚拟机，可能应该研究此选项。在 [`https://azure.microsoft.com/pricing/reserved-vm-instances/`](https://azure.microsoft.com/pricing/reserved-vm-instances/)
    了解更多关于预留实例的信息。


    `容量预留` 允许你在 Azure 区域或可用区中预留计算容量，时长不限。这对于确保即使在高峰期也拥有关键工作负载所需的资源特别有用。`容量预留` 比 `预留实例`
    更灵活，因为没有重大的长期承诺。它们几乎立即可用，并且你可以完全控制如何将预留目标用于关键工作负载。然而，`预留实例` 由于其长期承诺，比 `容量预留` 更便宜。你可以在
    [`https://learn.microsoft.com/azure/virtual-machines/capacity-reservation-overview`](https://learn.microsoft.com/azure/virtual-machines/capacity-reservation-overview)
    了解更多关于 `容量预留` 的信息。


    你可能还记得在门户的部署示例中有一个名为 `专用主机` 的选项。`Azure 专用主机` 允许你为你和你的组织预留专用的物理服务器。虽然普通虚拟机专用于你的部署，但你通常与其它用户共享底层主机。专用主机可能会为你提供满足特定合规性要求所需的选项。此外，你对托管你的
    VM 部署的基础设施的维护事件有更多控制权。你可以在 [`https://learn.microsoft.com/azure/virtual-machines/dedicated-hosts`](https://learn.microsoft.com/azure/virtual-machines/dedicated-hosts)
    阅读更多关于专用主机的信息。此组中最大的虚拟机是 `Standard_E104ids_v5`，它提供 104 个 vCore 和 672 GiB 内存。此虚拟机之所以引人注目，是因为它是隔离的，这意味着它保证是主机上运行的唯一虚拟机，因此与其他客户工作负载隔离。


    ### 迁移至 Azure


    你可能正在考虑将现有的 SQL Server 安装迁移到 Azure 虚拟机。以下选项可能有助于你的迁移计划。


    #### Azure Arc 迁移评估


    我在第 1 章中简要提到了将 SQL Server 连接到云的 Azure Arc 概念。虽然我将在本书第 10 章中更多讨论 Azure Arc，但我要在此提及，目前（在本书撰写时处于预览阶段）有一项创新可以帮助你评估当前的
    SQL Server 部署，以查看其是否兼容迁移到云端，包括什么是正确的部署决策和资源选择。在 [`https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment`](https://learn.microsoft.com/sql/sql-server/azure-arc/migration-assessment)
    了解更多关于如何使用此功能。


    #### 还原数据库


    由于 Azure 虚拟机中的 SQL Server 是一个完整的 SQL Server 引擎，迁移现有 SQL Server 的一个简单方法就是直接还原现有数据库的备份。


    由于目标 SQL Server 位于 Azure 基础设施中，你有几种方法可以执行此操作：


    *   通过 RDP “复制和粘贴”备份文件。RDP 客户端允许你复制和粘贴文件，我已经为 Azure VM 做过很多次了。当然，这只对小的备份文件有意义（尽管我也处理过
    1GB 大小的备份文件）。

    *   使用 SQL Server 内的 `备份到 URL` 功能将数据库备份到 Azure 存储。然后在 Azure VM 中，从同一个 Azure 存储帐户还原备份。你可以在
    [`https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`](https://learn.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url)
    阅读更多关于 SQL Server 备份到 URL 的信息。

    *   使用 `Azure 文件`。可以将其视作在云端创建你自己的文件共享。你可以使用 `az` CLI 或工具将你的备份文件复制到 Azure 文件共享。然后你可以在
    Azure VM 中挂载 Azure 文件共享（即，它在 VM 中看起来像网络共享）。在 [`https://learn.microsoft.com/azure/storage/files/storage-files-introduction`](https://learn.microsoft.com/azure/storage/files/storage-files-introduction)
    阅读更多关于如何执行此操作的信息。我已多次对 Windows 和 Linux 的 Azure VM 使用此方法。

    *   对于大型备份文件，请考虑 `Azure 导入/导出服务`。你实际上需要将硬盘安全地运送给微软（我们可以通过 Azure Data Box 磁盘为你提供方法），然后我们会将其导入
    Azure 存储或 Azure 文件。你可以在 [`https://learn.microsoft.com/azure/import-export/storage-import-export-service`](https://learn.microsoft.com/azure/import-export/storage-import-export-service)
    阅读更多相关信息。


    #### Azure Migrate 和 Azure 数据库迁移服务


    假设你想要更在线的迁移体验到 Azure 虚拟机。你可以使用 `Azure 数据库迁移服务` (DMS) 来实现此选项。DMS 是 Azure 中的一项托管服务，可协调迁移到
    Azure SQL，包括 Azure 虚拟机。此迁移的选项之一是对 SQL Server 到 Azure VM 执行在线迁移。DMS 将使用日志传送技术来获取一系列连续的数据库完整备份和事务日志备份，并将其还原到已部署在
    Azure VM 上的 SQL Server。在 [`https://learn.microsoft.com/data-migration/sql-server/virtual-machines/database-migration-service?tabs=online-with-extension`](https://learn.microsoft.com/data-migration/sql-server/virtual-machines/database-migration-service%253Ftabs%253Donline-with-extension)
    查看如何使用此服务的示例。


    如果你想评估和迁移 SQL Server ``大规模地``，请考虑使用 `Azure Migrate`。`Azure Migrate` 是一项 Azure
    服务和一组客户端软件代理，用于评估和迁移在虚拟机和裸机服务器中运行的 SQL Server 到 Azure。`Azure Migrate` 可以与 `Azure
    数据库迁移服务` 协调，以帮助你执行离线和/或在线迁移。在 [`https://learn.microsoft.com/azure/migrate/how-to-create-azure-sql-assessment`](https://learn.microsoft.com/azure/migrate/how-to-create-azure-sql-assessment)
    开始使用。


    #### 使用 Azure Migrate 服务器迁移


    如果你想迁移整个物理服务器或虚拟机的安装，而不仅仅是数据，该怎么办？Azure 通过名为 `Azure Migrate 服务器迁移` 的服务支持此概念。这是一个真正的
    `直接迁移` 操作。可以将其视作对你的机器或 VM 进行快照，然后从快照创建整个 VM。之后你再进行配置和优化。你可以在 [`https://learn.microsoft.com/azure/migrate/migrate-services-overview#azure-migrate-server-migration-tool`](https://learn.microsoft.com/azure/migrate/migrate-services-overview%2523azure-migrate-server-migration-tool)
    阅读更多关于 `服务器迁移` 的信息。在 [`https://aka.ms/mechanicsazuremigrate`](https://aka.ms/mechanicsazuremigrate)
    可以看到 Windows 传奇专家 Jeff Woolsey 展示的关于 VMware 安装如何工作的绝佳示例。'
- fmt: '## SQL Server IaaS Agent Extension


    Up to this point, my examples and discussion have centered around deploying SQL
    Server in Azure Virtual Machines based on Windows Server.


    The options and deployment process are very similar for SQL Server on Linux with
    some notable differences:


    *   The gallery images are offered for Linux distributions Ubuntu, Red Hat Enterprise
    Server, and SUSE. You pay for licenses if the Linux distribution requires it (Ubuntu
    is a free license).

    *   We do not support SQL Server Settings during deployment. The `SQL Server IaaS
    Agent extension` is supported on Ubuntu distributions but provides limited support
    for licensing. Learn more at [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-server-iaas-agent-extension-linux`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-server-iaas-agent-extension-linux).


    After using a SQL Linux gallery image, you will find the `mssql-server`, `mssql-tools`,
    and `mssql-ha` packages have been installed.


    SQL Agent is not enabled, but you can do this yourself. You can enable SQL Server
    Agent on Linux with the `mssql-conf` script which you can read more about at [`https://learn.microsoft.com/sql/linux/sql-server-linux-setup-sql-agent`](https://learn.microsoft.com/sql/linux/sql-server-linux-setup-sql-agent).


    Post deployment, you can use documented methods to install other SQL Server Linux
    packages. For example, you can read [`https://learn.microsoft.com/sql/linux/sql-server-linux-setup-machine-learning`](https://learn.microsoft.com/sql/linux/sql-server-linux-setup-machine-learning)
    to learn how to install SQL Server Machine Learning Services for Linux.


    ### Deploying SQL Server Containers


    There is no special gallery image or process to deploy SQL Server containers in
    Azure Virtual Machine. You will use the same process you use today to deploy a
    SQL Server container in a virtual machine. You can read more about this process
    at [`https://aka.ms/sqlcontainers`](https://aka.ms/sqlcontainers).


    `Azure Kubernetes Service` (AKS) provides a method to deploy containers at scale
    using the power of Kubernetes. You can see a tutorial of how to do this at [`https://learn.microsoft.com/sql/linux/quickstart-sql-server-containers-azure`](https://learn.microsoft.com/sql/linux/quickstart-sql-server-containers-azure).


    You have seen examples in this chapter of special options and advantages of deploying
    a SQL Server in Azure Virtual Machine with a gallery image, including licensing,
    configuration, and automation. This is all made possible through the `SQL Server
    IaaS Agent Extension` using the `SQL Virtual Machine Resource Provider`. The resource
    provider is software running in Azure that enables specific SQL capabilities integrated
    with Azure Resource Manager. The extension is a set of agents running in your
    virtual machine that use the resource provider.


    If you deploy using a SQL Server gallery image, you just take advantage of what
    the resource provider does, and no action is required from you. However, if you
    deploy on your own and want these advantages, including licensing, you will need
    to register your VM as a SQL Azure VM.


    First, you need to ensure your Azure subscription has the `Microsoft.SqlVirtualMachine`
    resource provider registered. You can do this from the Azure Portal as part of
    your Azure subscription. Or you can use the following PowerShell command:


    ```

    Register-AzureRmResourceProvider -ProviderNamespace Microsoft.SqlVirtualMachine

    ```


    Next, you need to register your virtual machine with the resource provider. Registering
    your VM installs the `SQL Server IaaS Agent Extension`. You can read about all
    of the steps at [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-agent-extension-manually-register-single-vm`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-agent-extension-manually-register-single-vm).


    Once your VM is registered or if you used a SQL gallery image, your VM is now
    considered both an Azure Virtual Machine resource and a `SQL virtual machine`.
    This means your VM will show up when searching for `Azure SQL` resources. Additionally,
    the portal will show additional properties as seen in Figure 3-26 based on the
    deployment I made earlier in this chapter.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig26_HTML.jpg)


    Figure 3-26: A registered SQL Azure Virtual Machine


    > **Note**

    >

    > One easy way to get to this overview page is to go to the Command Menu of your
    virtual machine and select `SQL Server Configuration` under `Settings`. Then click
    `SQL Server Configuration`.


    You can see this screen looks like an Azure Virtual Machine but information and
    options specific to SQL Server.


    You can see the `Essentials` pane has information about the VM but also SQL Server,
    including version, edition, license type, and OS details. Underneath the `Working
    Pane` is a graph showing storage for database and log files and features you can
    enable for SQL Server in Azure VM. The `Command Bar` has an option to delete (unregister)
    the SQL Server Azure Virtual Machine and delete the underlying VM.


    The `Service Menu` (expanded in Figure 3-26) has options specific to SQL Server
    running on Azure Virtual Machine, including the following two main categories.
    I think you will find several of these options extremely valuable in helping you
    manage SQL Server on Azure Virtual Machines.


    ### Settings


    Under `Settings`, you have the following options.


    #### Configure


    This option allows you to specify the license for SQL (`Pay As You Go`, `Azure
    Hybrid Benefit`, or `DR`).


    I’ve described `Azure Hybrid Benefit` earlier in this chapter. `Pay As You Go`
    is the default billing method to be billed for the SQL License per month. `DR`
    is a new option to offer a free SQL Server license if the SQL Server in the VM
    is used only for disaster recovery purposes.


    In addition, you can specify which edition of SQL Server you are using for the
    VM.


    #### Storage


    This option is worth looking at as it provides analysis, metrics, assessments,
    and configuration of storage as it relates to SQL Server for the VM as seen in
    Figure 3-27.


    ![](images/496204_2_En_3_Chapter/496204_2_En_3_Fig27_HTML.jpg)


    Figure 3-27: Storage assistance for SQL Server in Azure VM


    #### Updates


    This is another nice option to manage not just security updates but other updates
    for Windows and Cumulative Updates for SQL Server. You can even manage and schedule
    updates at scale. This capability is based on the `Azure Update Manager`. Learn
    more at [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/azure-update-manager-sql-vm`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/azure-update-manager-sql-vm).


    #### Backups


    This feature allows you to enable and disable automatic backups for SQL Server
    in the VM. This capability uses a feature that has been in the product for several
    releases using SQL Server Agent and backup to URL. You can learn more at [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/automated-backup`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/automated-backup).
    While I do recommend you look at this feature, I found in the cloud customers
    typically build their own automated backup system (but use Azure Storage with
    backup to URL) or use the `Azure Backup` service.


    #### High Availability


    This option helps you configure Always On Availability Groups with SQL Server
    on Azure VM. Learn more about this option in the section titled “HADR” later in
    this chapter.'
