    ![](img/496204_2_En_3_Fig20_HTML.jpg)


    图 3-20


    创建虚拟机前的验证


    在此屏幕顶部，您可以看到您选择的虚拟机大小以及每小时的估计成本。另请注意`使用条款`和`隐私政策`。随 SQL Server 提供的最终用户许可协议（EULA）仍然适用于
    Azure 虚拟机，因为这是一个完全许可的 SQL Server。但是，由于您在 Azure 中部署虚拟机，有一些条款和隐私政策您应该审阅。您可以在[`https://azure.microsoft.com/support/legal`](https://azure.microsoft.com/support/legal)阅读更多关于
    Azure 使用条款的信息。隐私是一个非常重要的话题，由于 Microsoft 在云中托管您的虚拟机，您需要了解 Microsoft 收集的所有信息的详细信息。在[`https://privacy.microsoft.com/privacystatement`](https://privacy.microsoft.com/privacystatement)阅读更多。您对操作系统和/或
    SQL Server 的库映像的使用也有称为 Azure Marketplace 条款的条款。您可以在[`https://azure.microsoft.com/support/legal/marketplace-terms/`](https://azure.microsoft.com/support/legal/marketplace-terms/)阅读更多信息。


    您还会在此屏幕上注意到关于允许 RDP 端口暴露于互联网的警告。您将在下面标题为“连接到您的虚拟机”的部分了解更多关于如何控制访问和限制任何问题的信息。如果您在此屏幕上向下滚动，您将看到您选择部署虚拟机的所有选项的详细信息。另请注意屏幕底部的`下载自动化模板`选项。我将在本章后面标题为“使用
    CLI 与 ARM 模板、Bison 和 Terraform”的部分讨论使用模板进行自动化。


    点击`创建`按钮准备启动！虚拟机的部署是异步的，因此您甚至可以退出门户，部署在后台完成。但是，如果您保持门户屏幕打开，您可以实时跟踪进度。在点击创建后几秒钟内，我的屏幕如图
    3-21 所示，以跟踪部署进度。


    ![](img/496204_2_En_3_Fig21_HTML.jpg)


    图 3-21


    Azure 虚拟机部署进行中


    不仅主屏幕在虚拟机创建时刷新，您还可以点击门户标题栏上的`通知`图标来跟踪进度。在我的示例中，大约十分钟后部署完成。图 3-22 显示了所有详细信息，包括来自`通知`图标的状态。


    ![](img/496204_2_En_3_Fig22_HTML.jpg)


    图 3-22


    Azure 虚拟机中 SQL Server 的部署完成


    您会注意到对于部署详细信息，部署的不仅是一个虚拟机，而是许多不同的资源，包括网络接口、磁盘、存储帐户、虚拟网络和安全性组。如果您想要更多关于部署的详细信息，可以点击`活动日志中的更多事件`。


    如果您点击`转到资源`，您将看到虚拟机的概述屏幕。从 SQL Server 的角度，还有另一个视图我稍后将介绍。让我们参观一下如何导航 Azure 虚拟机的`概述`屏幕。


