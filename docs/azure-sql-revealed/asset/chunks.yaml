  trans: "### 在门户中导航 Azure 虚拟机\n\n在本书中，你会发现自己经常使用 Azure 虚拟机概述屏幕的多个方面。让我们来检查一下概述屏幕的主要区域，如图\
    \ 3-23 所示。\n\n![](img/496204_2_En_3_Fig23_HTML.jpg)\n\n**图 3-23** Azure 虚拟机的概述屏幕\n\
    \n1.  **服务菜单**\n    每个 Azure 资源都提供一系列选项来管理该资源。服务菜单的顶部对所有资源都是相同的。如果你在深入查看虚拟机的`blades\
    \ or sections`详细信息时想要“找回方向”，你会需要使用`概述`选项。这一点非常重要，因为我经常点击屏幕右上角的 X，然后完全丢失了虚拟机的上下文。通过点击服务菜单上的`概述`，我可以保持该上下文。\n\
    \    在`概述`下方，我们将看到查看与此特定虚拟机相关的活动日志条目的选项，能够使用 RBAC 控制*外部*对虚拟机的访问，设置新标签，或诊断问题。其下是一系列可展开的类别选项，例如`连接`以连接到虚拟机，`网络`以配置网络选项，或`设置`以配置虚拟机的特定方面。还有其他选项你可以探索。我不会在这里逐一介绍每个选项，但会在本章剩余部分使用其中几个选项。\n\
    \n2.  **命令栏**\n    这些是允许你操作虚拟机的按钮。每个 Azure 资源都有其独特的按钮。你将使用最常见的按钮是`连接`、`启动`、`重新启动`和`停止`。我将在本章后面题为“停止与解除分配”的小节中更详细地介绍使用此选项停止虚拟机的意义。\n\
    \n3.  **基本信息**\n    严格来说，这是工作窗格的一部分。此区域显示关于你虚拟机的关键信息，包括资源组、区域、状态、操作系统版本和虚拟机大小，但也能让你导航到虚拟机的某些方面，例如虚拟网络。\n\
    \n4.  **工作窗格**\n    工作窗格包含用于查看虚拟机详细属性、通过运行状况事件、警报和性能指标进行监控、启用 Windows 管理中心等功能、建议和培训教程的部分。\n\
    \n在 [`https://learn.microsoft.com/azure/azure-portal/azure-portal-overview#getting-around-the-portal`](https://learn.microsoft.com/azure/azure-portal/azure-portal-overview%2523getting-around-the-portal)\
    \ 探索更多关于如何在门户中导航的信息。\n\n### 连接到你的虚拟机\n\n现在你已经部署了虚拟机，首先要做的事情之一就是连接到它。对于 Windows\
    \ 虚拟机，最流行的连接和使用方式是使用`远程桌面协议 (RDP)`。在虚拟机部署示例中你看到，我选择了向互联网开放 RDP 端口(`3389`)的选项。\n\
    要使用 RDP，请点击命令栏中的`连接`按钮并选择`连接`。你将看到如图 3-24 所示的连接选项。\n\n![](img/496204_2_En_3_Fig24_HTML.jpg)\n\
    \n**图 3-24** 通过 RDP 连接到 Azure 虚拟机\n\n你可以通过选择`下载 RDP 文件`来通过 RDP 连接。RDP 文件将被复制到你客户端机器的`下载`文件夹中。虚拟机的公共\
    \ IP 地址也显示在这里，如果你只想使用任何有效的 RDP 客户端直接连接到虚拟机。一旦连接，就像任何虚拟机或 Windows 计算机一样，系统会提示你输入凭据（你在部署时提供的），默认情况下是管理员组的成员。\n\
    注意：如果你注意到在`下载 RDP 文件`下方，有一些选项可以帮助你排查任何 RDP 连接问题，如果你遇到任何问题，我强烈建议你查看一下。\n\n如果你使用`选择`，你还可以在此屏幕上看到一个建议，启用虚拟机的`即时访问`以提高安全性。即时访问是一种“按需”获取虚拟机\
    \ RDP 访问权限的方法，这样当你不使用虚拟机时，RDP 端口不会向互联网开放。这是一种允许你从任何客户端连接到虚拟机，同时限制 RDP 端口对所有人暴露的方法。你可以在\
    \ [`https://learn.microsoft.com/azure/defender-for-cloud/just-in-time-access-usage`](https://learn.microsoft.com/azure/defender-for-cloud/just-in-time-access-usage)\
    \ 了解更多关于即时访问的信息。\n你在此屏幕上看到的另一种方法是使用一种更安全的方法，称为`Azure Bastion`，你可以在 [`https://azure.microsoft.com/services/azure-bastion/`](https://azure.microsoft.com/services/azure-bastion/)\
    \ 了解更多。我遇到过一些客户，他们的公司禁止在笔记本电脑上使用 RDP，因此这种基于浏览器的方法是一个极好的、更安全的选项，可用于连接到虚拟机。\n你也可以使用标准的\
    \ SQL 工具（如`SSMS`）从你在同一 Azure 虚拟网络中部署的另一台 Azure 虚拟机进行连接。我经常会在同一虚拟网络中部署另一台“客户端”Azure\
    \ 虚拟机，这样我就可以使用 SQL 工具私下连接到我的 SQL Server 部署。\n\n### 探索 SQL Server 安装\n\n我想你可能有兴趣了解当我们使用\
    \ SQL Server 库映像进行部署时，我们具体安装和配置 SQL Server 实例的内容。\n\n#### 安装内容\n\nSQL Server 库映像安装整个数据库引擎、`SQL\
    \ Server Analysis Services`、`SQL Server Integration Services (SSIS)`、`MDS`和`DQS`。此外，我们还安装以下引擎功能：\n\
    * `SQL Server Agent`\n* `SQL Server Replication`\n* `全文搜索`\n我们还安装客户端、工具、SDK 和`SQL\
    \ Server Management Studio`。默认情况下，我们不安装`Polybase`。正如我在本章前面所述，你可以根据你选择的选项，在部署过程中安装`R\
    \ Services`。\n注意：你的许可证包括部署`SQL Server Reporting Services`的权限，但像 SQL Server 一样，我们不安装它。你可以使用\
    \ [`https://learn.microsoft.com/sql/reporting-services/install-windows/install-reporting-services`](https://learn.microsoft.com/sql/reporting-services/install-windows/install-reporting-services)\
    \ 自行部署。此外，拥有 SA 协议的企业版客户有权安装`Power BI Report Server` ([`https://www.microsoft.com/power-platform/products/power-bi/report-server`](https://www.microsoft.com/power-platform/products/power-bi/report-server))。\n\
    对于 SQL Server 库映像，我们会复制 SQL Server 介质，因此你可以安装或删除任何你想要的功能。你可以在虚拟机中的`C:\\SQLServerFull`文件夹中找到所有安装文件。图\
    \ 3-25 展示了使用 SQL Server 2022 库映像默认安装的功能示例。\n\n![](img/496204_2_En_3_Fig25_HTML.jpg)\n\
    \n**图 3-25** 默认安装的 SQL Server 功能"
- fmt: '#### What Is Configured


    The following is a list of configuration choices we make as part of a SQL Server
    gallery image installation:


    *   `SQL Server`, `SQL Server Agent`, full-text, and `SSIS` services are set to
    automatic and are running after deployment. Service SIDs are used for all services.

    *   The VM admin account you specify during deployment becomes a SQL sysadmin.

    *   The filestream feature is disabled by default (but can be enabled and supported).

    *   Always On Availability Groups is disabled by default (but can be enabled and
    supported).

    *   The TCP/IP protocol is enabled for SQL Server (even for Developer Edition).

    *   We typically have a recent Cumulative Update (and/or security update) installed,
    but it may not be the exact latest Cumulative Update. You can read more about
    how we keep our images up to date at [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-on-azure-vm-iaas-what-is-overview?view=azuresql#lifecycle`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-on-azure-vm-iaas-what-is-overview?view=azuresql#lifecycle).

    *   CEIP is enabled by default, but you can disable it. Read more at [`https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-on-azure-vm-iaas-what-is-overview?view=azuresql#customer-experience-improvement-program-ceip`](https://learn.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-on-azure-vm-iaas-what-is-overview?view=azuresql#customer-experience-improvement-program-ceip).

    *   Microsoft SQL Server VSS Writer is installed by default.


    ### Deploy on Your Own


    Today when I deploy a SQL Server instance in a Hyper-V virtual machine (often
    just on my laptop), I go through the process of choosing certain options for the
    VM (like number of logical CPUs, memory, location of disks) and then install an
    operating system like Windows Server or Linux (typically from an .ISO file). When
    this is done, I usually connect to the VM with Remote Desktop (Windows) or ssh
    (Linux). For Windows, I will download the installation media for SQL Server to
    my local drive and then “copy and paste” it into a folder in the VM. I then run
    setup and am off and running to deploy SQL Server. For Linux, I just make sure
    my VM is connected to the Internet and run the SQL Server on Linux installation
    which downloads packages as part of the installation process.


    This same process is almost identical to the “deploy on your own” option for SQL
    Server on Azure Virtual Machine, with one exception. You will configure the VM
    and deploy an operating system by using one of the gallery images just for the
    operating system. You can use the portal, az CLI, or PowerShell to choose your
    VM size and operating system, very similar to using a SQL Server gallery image
    except all the options for SQL Server will not be part of the process.


    This technique is one I sometimes use because I have complete control of how and
    what is installed with SQL Server vs. what Microsoft chooses from a gallery image.
    If you use this method, there is one downside. You do not immediately get to take
    advantage of the options you get with a SQL gallery image, such as automated backups
    and security updates. Fortunately, there is a solution to use this customized
    method for deployment but take advantage of automated features and licensing options.
    This solution is called the SQL Server IaaS Agent Extension (which is installed
    by default when using a gallery image). I will discuss more about this capability
    in the next section.


    ### SQL Server IaaS Agent Extension


    The SQL Server IaaS Agent Extension is installed by default when using a SQL Server
    gallery image. This extension provides automated features and licensing options
    for your SQL Server VM.


    ### Using a CLI with ARM Templates, Bison, and Terraform


    Azure provides other ways to deploy SQL Server on Azure Virtual Machine besides
    the Azure portal using a command-line interface (CLI) with the `az sql vm` or
    `az vm` CLI. There are also PowerShell commands `New-AzVM` and `New-AzSqlVM`.
    The problem is that all of these methods don’t support a way to configure optimal
    storage settings as I have described earlier with the portal. You would have to
    manually configure this after you deployed.


    Azure provides a mechanism for any Azure resource to automate the use of Azure
    CLI tools with a concept called an ARM template. An ARM template is a JSON file
    that describes in a declarative fashion the configuration and infrastructure of
    a deployment.


    While you can try to learn how to build templates from scratch, I recommend you
    get an example. You can download and edit an example of an Azure template to create
    a new SQL Server in Azure Virtual Machine with configurable storage settings at
    [`https://learn.microsoft.com/samples/azure/azure-quickstart-templates/sql-vm-new-storage`](https://learn.microsoft.com/samples/azure/azure-quickstart-templates/sql-vm-new-storage).
    Azure templates not only configure all the properties to create the virtual machine
    but support parameters, so you can use a template and then supply the parameters
    you want to customize the deployment at runtime. The link for this template also
    includes a file to support deploying a SQL Server VM on Azure with Bison.


    Terraform can also be used to deploy SQL Server on Azure VM. You can read more
    at [`https://registry.terraform.io/providers/hashicorp/azurerm/latest/docs/resources/mssql_virtual_machine`](https://registry.terraform.io/providers/hashicorp/azurerm/latest/docs/resources/mssql_virtual_machine).'
