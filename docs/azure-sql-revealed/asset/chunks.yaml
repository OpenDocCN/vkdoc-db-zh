  trans: '## 红狗项目


    2006 年，雷·奥兹（Ray Ozzie）招募了微软资深工程师阿米塔布·斯里瓦斯塔瓦（Amitabh Srivastava），领导一个“云操作系统”项目，旨在推进他一年前提出的“互联网服务变革”。斯里瓦斯塔瓦的首批举措之一，便是请出了已退休的“DEC
    VMS 和 Windows NT 操作系统之父”戴夫·卡特勒（Dave Cutler）。作为初期项目工作的一部分，斯里瓦斯塔瓦和卡特勒走访了微软内部提供“云服务”的各个团队，包括
    Xbox Live、Hotmail 和 Bing。在一次前往加利福尼亚州圣何塞访问 Hotmail 的途中，团队路过一家名为“粉红狮子狗”（Pink Poodle）的俱乐部。正是戴夫·卡特勒那句著名的话：“也许我们应该把我们的项目命名为‘粉红狮子狗’？”团队一致认为这个名字不太合适，于是将项目命名为“红狗”（Red
    Dog）。这个名字就此定下（你可以在[`https://www.wired.com/2008/11/ff-ozzie/?currentPage=7`](https://www.wired.com/2008/11/ff-ozzie/%253FcurrentPage%253D7)和[`https://www.zdnet.com/article/how-the-red-dog-dream-team-built-a-cloud-os-from-scratch/`](https://www.zdnet.com/article/how-the-red-dog-dream-team-built-a-cloud-os-from-scratch/)阅读更多关于“红狗”项目初期的精彩历史）。


    从一开始，“红狗”团队在微软内部就以一种不同的方式来构建“云操作系统”。他们在微软园区的中心地带建立了自己的“数据中心”，甚至从邻近的建筑获取备用电力。他们的目标雄心勃勃，并且至今仍能引起共鸣。他们的主要总体目标是*为开发者构建一个用于开发可扩展
    Web 应用程序的云服务*。他们从一开始就有一个宏大的主题：*可靠性*。正如戴夫·卡特勒在 2008 年所说：“有一件事你没有问，那就是为什么我们不多谈谈
    Azure，并在此过程中向市场描绘未来的美好承诺。答案很简单，RD（红狗）小组非常保守，而且我们还远未完成。我们相信云计算对微软的未来至关重要，我们当然不希望做任何可能危及产品未来的事情。我们对丢失用户数据高度敏感。我们对操作系统或管理程序崩溃导致服务中断高度敏感。因此，我们正在一步步缓慢推进，力求在谈论各项功能之前，确保它们
    100%可运行且经过扎实的调试。这与微软过去受到批评的做法相反，希望‘红狗们’已经学会了一个新技巧。”


    “红狗”和“CloudDB”团队当时作为独立项目齐头并进（颇具讽刺意味的是，它们在同一园区，仅隔几栋楼），分别致力于支持 Web 应用程序的云服务和云端托管数据库。这两个项目计划在
    2007 年和 2008 年合并，以推出统一的云服务。


    ## Azure 服务平台


    2008 年 10 月，在加利福尼亚州洛杉矶举行的微软专业开发者大会（PDC）上，雷·奥兹宣布了 `Windows Azure`。PDC 是当今微软 //Build
    大会的前身（[`https://en.wikipedia.org/wiki/Build_(developer_conference)`](https://en.wikipedia.org/wiki/Build_%2528developer_conference%2529)）。PDC
    是微软面向开发者的盛事。


    `Windows Azure` 作为 `Azure 服务平台` 的一部分推出。图 1-1 展示了 `Azure 服务平台` 产品的概览。


    ![](img/496204_2_En_1_Fig1_HTML.jpg)


    图 1-1


    2008 年的 `Azure 服务平台`


    自 2006 年起，“红狗”团队就一直在全力以赴，目标是为开发者发布一项云服务。雷·奥兹称 `Windows Azure` 是“Web 计算层的新 Windows
    产品”（你可以在[`https://www.zdnet.com/article/ray-ozzie-announces-windows-azure/`](https://www.zdnet.com/article/ray-ozzie-announces-windows-azure/)观看视频）。他还称
    `Azure` 是“云端的 Windows”。微软现在将为客户提供笔记本电脑上的 Windows（当时是 Windows Vista）、企业服务器（Windows
    Server）以及云端的 Windows（`Azure`）。


    注意


    我曾向微软的许多人询问我们的云服务为何命名为 `Azure`。正如巴克·伍迪（Buck Woody）所讲述的那样，“`Azure` 的意思是万里无云的蔚蓝天空。这个名字似乎恰到好处，而且没有在名字中使用‘云’（cloud）这个词。”


    与 CloudDB 项目的目标类似，当 `Windows Azure` 首次发布时，其目标完全围绕以*平台即服务*（**`PaaS`**）形式面向 Web
    应用程序的可扩展性和可用性。可以将 `PaaS` 理解为通过订阅购买一个用于托管你的应用程序或数据库的平台，该平台由 `Azure` 等提供商进行*管理*。使用
    `PaaS`，你通常与主机计算机或虚拟机是抽象隔离的。因此，*云服务* 是 `Windows Azure` 中的第一项服务。这种服务在内部被称为 `PaaS
    V1`。


    注意


    云服务如今在 `Azure` 中仍提供。你可以在[`https://azure.microsoft.com/services/cloud-services/`](https://azure.microsoft.com/services/cloud-services/)阅读更多关于云服务的信息。不过，在现代应用程序中，它已被
    `Azure App Service` 所取代，你可以在[`https://azure.microsoft.com/services/app-service/`](https://azure.microsoft.com/services/app-service/)阅读更多信息。


    尽管云服务应用程序运行在一个或多个虚拟机中，但其理念是支持云端易于扩展的 Web 应用程序，让开发者不必关注虚拟机的细节，而更专注于应用程序本身。当时的 Windows
    开发者习惯于 Windows Server 的互联网信息服务（`IIS`）功能。虽然开发者不必过多担心 `IIS` 的部署和配置，但他们通常需要在其组织内有一名管理员。虽然开发者对于云服务中的虚拟机原生操作系统环境有一定的访问权限，但这种访问是受限的。直到几年后，微软才通过
    `Azure 虚拟机` 引入了*基础设施即服务*（**`IaaS`**）的概念。可以将 `IaaS` 理解为通过订阅购买用于托管你虚拟机的基础设施。你负责管理客户虚拟机（Guest
    VM），而提供商则负责管理主机、硬件、网络和存储。


    `PaaS` 和云服务的其他承诺之一，是创建易于使用的应用程序部署、配置和更新概念。此外，提供可扩展性、内置高可用性和负载均衡能力，使得云服务的概念对 Web
    开发者极具吸引力。你会发现，这些相同的概念也是 `Azure SQL` 和数据库吸引力的一部分。'
- fmt: 'To host PaaS cloud services, an *underlying hosting system* had to be built.
    The Windows Azure team took the designs from the Red Dog project to build this
    hosting system to support deployment, networking, high availability, scale, and
    security, as cloud services abstracted all these details from the developer. This
    software hosting system was known as `Windows Fabric`. Providing the underlying
    hosting system for services consumed by users is the *power of the cloud*. I found
    this interesting slide from a talk at the PDC 2008 conference that talks about
    all the details required for someone to run their own `fabric` in a data center
    as seen in Figure [1-2](#496204_2_En_1_Chapter.xhtml#Fig2).


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Building your own fabric in a data center


    This slide speaks volumes for what a `fabric` must support for cloud services
    at scale. A highly available *fabric controller* (`FC`) is key to the system.
    The `FC` maintains a graph of the inventory of what it manages: computer, virtual
    machines, load balancers, and switches with edges being objects like network cables.
    One key to the `fabric` system is the use of a declarative model, so the `FC`
    takes what you declare and implements it. Very early on, `Windows Fabric` in Azure
    had concepts of high availability such as fault and update domains (I’ll describe
    the importance of these in Chapters [2](#496204_2_En_2_Chapter.xhtml) and [3](#496204_2_En_3_Chapter.xhtml)
    of the book).


    `Windows Fabric` is today known as `Service Fabric`. The usage of `Service Fabric`
    is also exposed to applications to host their own services in a `Service Fabric`
    cluster. You can read more about Azure `Service Fabric` at [`https://azure.microsoft.com/services/service-fabric/`](https://azure.microsoft.com/services/service-fabric/).


    Note


    As you read more about `Service Fabric` in this chapter in the book, you will
    likely see some similarity to another `fabric system` called Kubernetes. If you
    want to read more about the differences between these two systems, this blog post
    is a good place to start: [`https://techcommunity.microsoft.com/t5/azure-developer-community-blog/service-fabric-and-kubernetes-community-comparison-part-1-8211/ba-p/337421`](https://techcommunity.microsoft.com/t5/azure-developer-community-blog/service-fabric-and-kubernetes-community-comparison-part-1-8211/ba-p/337421).


    To round out the set of `Azure Services`, Microsoft announced the data platform
    or `SQL services`, thus beginning the first public announcement of the journey
    that would become Azure SQL.


    ## The Road to SQL Azure


    A big part of the announcement for Windows Azure at PDC in 2008 involved data.
    Since the CloudDB project in 2006, Peter Spiro, David Campbell, Ajay Kalhan, Tomas
    Talius, and the rest of the team had built out a set of cloud services for SQL
    Server to host `multi-tenant databases` (or multiple customers in a shared set
    of SQL Servers).


    The first name announced at PDC 2008 was `SQL Data Services (SDS)`. While the
    news of this service made buzz in the industry, so many customers were focused
    on on-premises enterprise deployments, and our team overall were heavily focused
    on SQL Server (e.g., shipping SQL Server 2008 code-named Katmai). But internally,
    the leadership of the company was making a major push for the cloud but not just
    because they were “told to do this.” Ted Kummert said “We were believers. We believed
    PaaS was the future, but we were early in the industry for a service like this.”


    ### SQL Data Services


    SQL Data Services was announced as part of a broader set of services called `SQL
    services` which would include DataSync, Reference Data, Reporting, Data Mining,
    and ETL as seen in Figure [1-3](#496204_2_En_1_Chapter.xhtml#Fig3).


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig3_HTML.jpg)


    Figure 1-3


    SQL services at PDC in 2008


    This image came from a slide from a talk presented by David Campbell back at PDC
    in 2008.


    Note


    It is interesting to see our intention was to also provide “data warehouse” services
    which we do today with Azure Synapse (and Microsoft Fabric) and “ETL” which is
    now Azure Data Factory. “Reporting” never really panned out in SQL services (but
    there were attempts), but Microsoft eventually created a very powerful Reporting
    service called Power BI.


    SQL Data Services embodied the ability for developers to host databases for their
    applications and be completely abstracted from the details of computers, virtual
    machines, and SQL Server itself. Basically, you create a database; populate it
    with tables, data, and indexes; and then just start using it. No machine, operating
    system, or machine installation required.


    The other concept that `SDS` provided was “database as a utility” or “pay as you
    go service.” That was really the same concept across all of Windows Azure. It
    represented a shift for customers to use a subscription service to pay for database
    usage (and the compute and storage that went behind it) vs. a license for SQL
    Server.


    The team learned a quick lesson when it introduced the programming interface as
    `REST API` instead of `T-SQL`. REST stands for **Representational State Transfer**
    and is a common protocol used for web services. Customer feedback quickly changed
    that model (but `REST API` interfaces remain to this day for many aspects of Azure
    SQL, which you will see throughout the book). You can see from this blog post
    in March 2009 ([`https://web.archive.org/web/20140411144147/http://blogs.msdn.com/b/sqlazure/archive/2009/03/10/9469228.aspx`](https://web.archive.org/web/20140411144147/http:/blogs.msdn.com/b/sqlazure/archive/2009/03/10/9469228.aspx))
    that the `SDS` team needed to provide developers and users a “relational data
    experience” which includes programming interfaces through `Tabular Data Stream
    (TDS)`. Translation: `T-SQL`. Other basic features you expect from a SQL Server
    database had to be there, including indexes, stored procedures, triggers, views,
    etc.


    Since the `SDS` and Windows Azure teams were innovating at the same time, the
    `SDS` team had to figure out a hosting system for databases and SQL Server. `Windows
    Fabric` was being built as the `SDS` team was innovating. The decision was made
    to use a hosting system that already existed at Microsoft instead of using Windows
    Azure. That platform was called `AutoPilot` (you can read more about the `AutoPilot`
    system at `https://www.microsoft.com/en-us/research/publication/autopilot-automatic-data-center-management/?from=http%3A%2F%2Fresearch.microsoft.com%2Fapps%2Fpubs%2Fdefault.aspx%3Fid%3D64604`)
    built by the team running the Bing Search Service. `AutoPilot` was effectively
    a platform to provision “bare-metal” computers in a scaled fashion. `SDS` `clusters`
    would physically be colocated with Windows Azure clusters, but `SDS` managed their
    own systems.


    `AutoPilot` just provided software services to deploy and maintain applications
    on bare-metal servers at scale. The `SDS` team had to build their own set of services
    for fault tolerance, high availability, and connectivity. The `SDS` team built
    their own `fabric` to deploy, run, scale, and maintain SQL Server instances to
    host their customer databases. The original design of silos was replaced by “database
    per tenant” model called `partitions` (not the same as SQL Server partitions),
    but multiple databases could be hosted on a single SQL Server. Each bare-metal
    server could also host multiple SQL Server instances.'
