  trans: '### BULK INSERT 与 OPENROWSET


    T-SQL 的 `BULK INSERT` 和 `OPENROWSET`（使用 `BULK` 选项）语句支持从文件批量导入数据。这些命令的一个显著优势是它们在
    SQL Server 引擎的上下文中运行。


    对于 SQL Server，常见的做法是将文件复制到托管 SQL Server 的计算机可以访问的驱动器或网络共享中。然后使用 `BULK INSERT`
    引用该文件进行导入。但问题是，对于 Azure SQL 托管实例和数据库，你无法访问底层节点的文件系统。因此，`BULK INSERT` 和 `OPENROWSET`
    语句已得到增强，以支持 Azure Blob 存储（甚至可以从本地 SQL Server 访问）。


    其工作原理如下。你创建一个 `EXTERNAL DATA SOURCE`（类似于 Polybase）来引用一个 Azure 存储账户。`BULK INSERT`
    和 `OPENROWSET` 语句已增强支持 `DATA_SOURCE` 参数。我将在本书的第 9 章更详细地讨论外部数据源。


    现在，你可以使用你最喜欢的 SQL 工具（请记住，在 Azure 云 Shell 中可以是 `sqlcmd`）直接连接到你的 Azure SQL 托管实例或数据库，并让
    SQL Server 引擎完成工作，从而批量导入数据。


    以下是使用 `BULK INSERT` 的语法示例，摘自文档 [`https://learn.microsoft.com/sql/t-sql/statements/bulk-insert-transact-sql?view=sql-server-ver15#f-importing-data-from-a-file-in-azure-blob-storage`](https://learn.microsoft.com/sql/t-sql/statements/bulk-insert-transact-sql?view=sql-server-ver15#f-importing-data-from-a-file-in-azure-blob-storage)。这要求你首先创建一个
    Azure 存储账户和容器。


    ```

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''YourStrongPassword1'';

    GO

    --> 可选 - 无需数据库作用域凭据，因为 Blob 配置为公共（匿名）访问！

    CREATE DATABASE SCOPED CREDENTIAL MyAzureBlobStorageCredential

    WITH IDENTITY = ''SHARED ACCESS SIGNATURE'',

    SECRET = ''******srt=sco&sp=rwac&se=2017-02-01T00:55:34Z&st=2016-12-29T16:55:34Z***************'';

    -- 注意：确保 SAS 令牌前没有 ?，

    -- 并且你至少对要加载的对象拥有读取权限 (srt=o&sp=r)，

    -- 且有效期有效（所有日期均为 UTC 时间）

    CREATE EXTERNAL DATA SOURCE MyAzureBlobStorage

    WITH ( TYPE = BLOB_STORAGE,

    LOCATION = ''https://****************.blob.core.windows.net/invoices''

    , CREDENTIAL= MyAzureBlobStorageCredential --> 如果 Blob 配置为公共（匿名）访问，则不需要 CREDENTIAL！

    );

    BULK INSERT Sales.Invoices

    FROM ''inv-2017-12-08.csv''

    WITH (DATA_SOURCE = ''MyAzureBlobStorage'');

    ```


    ### SQL Server Integration Services (SSIS)


    SSIS 包是当今与 SQL Server 一起用于提取、转换和加载（ETL）应用程序的最流行方法之一。


    无论 SSIS 包在何处通过 SSIS 运行时运行，Azure SQL 托管实例和数据库始终可以作为数据加载的目标。这意味着你可以构建 SSIS 包，并在本地数据中心或
    Azure 虚拟机中运行它们。以下是一个关于如何使用 SSIS 将数据加载到 Azure SQL 数据库的简单教程：[`https://learn.microsoft.com/sql/integration-services/load-data-to-sql-database-with-ssis`](https://learn.microsoft.com/sql/integration-services/load-data-to-sql-database-with-ssis)。


    还有其他方法可以在 Azure SQL 本身执行 SSIS 包（你可以使用这些方法来运行将数据导入 Azure SQL 托管实例或数据库的包）。


    #### Azure SSIS


    没有专门称为 Azure SSIS 的服务，但我创造了这个术语来指代 Azure 中用于托管和执行 SSIS 包的服务。有两个组件使 Azure SSIS
    成为现实：


    *   **Azure SSIS Integration Runtime (SSIS IR)**


    Azure Data Factory (ADF) 是 Azure 中的一项服务，提供 ETL 功能。ADF 支持一个 *集成运行时* 计算环境。集成运行时环境的其中一个选择就是
    SSIS。实际上，ADF 将托管计算节点，允许你运行 SSIS 包。此计算环境也可以连接到虚拟网络，为连接到 Azure SQL 资源铺平道路。部署 SSIS
    IR 的步骤可在 [`https://learn.microsoft.com/azure/data-factory/create-azure-ssis-integration-runtime`](https://learn.microsoft.com/azure/data-factory/create-azure-ssis-integration-runtime)
    找到。


    *   **Azure 中的 SSIS 目录数据库 (SSISDB)**


    虽然不一定要使用 SSIS IR，但你可以在 Azure SQL 数据库或托管实例中托管 SSIS 的目录数据库 *SSISDB*。这样，你就可以执行存储在
    Azure SQL 数据库或托管实例中的包，将你所有的 ETL 包管理和执行放在云端。这些包可以访问普通 SSIS 包所能访问的任何数据源，包括本地数据源。可以将此视为在
    Azure 中执行所有操作并从本地 *拉取* 数据的一种方式。在 Azure SQL 中创建 SSISDB 目录的最简单方法是在部署 SSIS IR 时预配它。你需要先部署一个
    Azure SQL 数据库逻辑服务器或托管实例，才能在 Azure 中部署 SSISDB。请查看 [`https://learn.microsoft.com/azure/data-factory/tutorial-deploy-ssis-packages-azure`](https://learn.microsoft.com/azure/data-factory/tutorial-deploy-ssis-packages-azure)
    上的教程。


    一旦你为 Azure 部署了 SSIS IR 和 SSISDB，你基本上就拥有了一个运行包的计算结构和一个托管它们的目录（无需你自己预配虚拟机）。


    注意


    你仍然可以执行存储在文件系统（例如 Azure 文件）中的包。


    你现在有多种方法可以执行这些包：


    *   使用 `SQL Server Data Tools (SSDT)` 执行包。更多信息请访问 [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-ssdt`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-ssdt)。

    *   在托管实例上使用 `SQL Server Agent` 执行包。更多信息请访问 [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-managed-instance-agent`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-managed-instance-agent)。

    *   使用支持 Azure 的 `dtexec` 版本（称为 `AzureDTExec`，仅限 Windows）执行包。更多信息请访问 [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-azure-enabled-dtexec`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-azure-enabled-dtexec)。

    *   作为 Azure Data Factory (ADF) 管道的一部分，执行一个 `Execute SSIS Package activity`。更多信息请访问
    [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-ssis-activity`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-ssis-activity)。你也可以使用
    ADF 运行存储过程活动。更多信息请访问 [`https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-stored-procedure-activity`](https://learn.microsoft.com/azure/data-factory/how-to-invoke-ssis-package-stored-procedure-activity)。


    在 Azure 中使用 SSIS IR 和 SSISDB 本身就足以写一章！要了解有关其他选项（包括将现有 SSIS 包迁移到 Azure）的更多详细信息，请阅读以下文档：[`https://learn.microsoft.com/sql/integration-services/lift-shift/ssis-azure-lift-shift-ssis-packages-overview`](https://learn.microsoft.com/sql/integration-services/lift-shift/ssis-azure-lift-shift-ssis-packages-overview)。'
- fmt: '## BACPAC


    一个 BACPAC 文件（扩展名为 `bacpac`）是包含数据库架构和数据的文件。你可以使用通过 SSMS、SqlPackage 或 PowerShell
    等工具生成的 BACPAC 文件导入到 Azure SQL 中。在这种情况下，导入过程会创建一个包含文件中架构和数据的完整数据库。根据你使用的工具和导入位置，可以将
    BACPAC 文件存储在 Azure 存储中或本地文件中。


    Azure SQL Database 支持使用 Azure 门户（BACPAC 文件需在 Azure 存储中）、SqlPackage 工具、SSMS 或 PowerShell
    导入到新数据库。图 5-6 展示了从逻辑服务器的命令栏导入包含 BACPAC 文件的数据库的选项。


    ![Figure 5-6](images/496204_2_En_5_Chapter/496204_2_En_5_Fig6_HTML.jpg)


    图 5-6：通过 Azure 门户导入数据库


    对于 Azure SQL 托管实例，你可以使用 SSMS 或 SqlPackage，但也可以对备份执行 T-SQL `RESTORE`。BACPAC 文件大小限制为
    200GB，因此如果需要更大的尺寸，你将需要使用批量复制选项。完整的数据库迁移可以使用 Azure 数据库迁移服务完成。


    要了解更多关于使用 BACPAC 文件在 Azure SQL 中导入新数据库的信息，请查阅我们的文档：[`https://learn.microsoft.com/azure/azure-sql/database/database-import`](https://learn.microsoft.com/azure/azure-sql/database/database-import)。


    ## 数据库复制


    Azure SQL Database 支持通过从事先部署的数据库进行事务一致复制来创建新数据库。你可以使用 Azure 门户、PowerShell、`az`
    CLI 或 `CREATE DATABASE` T-SQL 语句。此功能的一个好处是可以将数据库复制到不同的逻辑服务器。门户还允许你为目标数据库配置部署选项。


    图 5-7 显示，可以从 Azure 门户中现有数据库的上下文中的命令栏访问复制数据库功能。


    ![Figure 5-7](images/496204_2_En_5_Chapter/496204_2_En_5_Fig7_HTML.jpg)


    图 5-7：使用 Azure 门户复制数据库


    这与本章前面提到的 `CREATE DATABASE...AS COPY` 选项相同。你可以在以下链接中了解更多关于如何为 Azure SQL Database
    复制数据库的信息：[`https://learn.microsoft.com/azure/azure-sql/database/database-copy`](https://learn.microsoft.com/azure/azure-sql/database/database-copy)。


    ## 还原到托管实例


    由于 Azure SQL 托管实例是一个完整的 SQL Server 实例，几乎提供了包括 T-SQL 在内的所有功能，因此你可以对 SQL Server
    备份执行原生还原。


    这意味着你可以从 SQL Server 备份数据库，将备份文件复制到 Azure 存储，然后使用 `RESTORE DATABASE` 语句将数据库还原到
    Azure 托管实例。


    目前，只能还原完整数据库备份。托管实例中的 `RESTORE` 与 SQL Server 有一个关键区别。`RESTORE` 是一个异步操作。你可以断开连接，还原操作会在后台完成。你可以使用动态管理视图
    `sys.dm_operation_status` 来检查部署状态。


    要了解如何在 Azure SQL 托管实例中使用 `RESTORE`，请查阅文档：[`https://learn.microsoft.com/sql/t-sql/statements/restore-statements-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/restore-statements-transact-sql)。


    ## Spark 连接器


    Spark 是一种常用于 ETL 操作的技术。微软支持一个 Spark 连接器，允许你在 Azure SQL Database 和托管实例之间导入和导出数据。它支持可以非常快速甚至使用
    Microsoft Entra 身份验证的批量操作。


    在任何可以运行 Spark 并连接到 Azure SQL 的地方，你都可以使用此连接器。了解更多：[`https://learn.microsoft.com/azure/azure-sql/database/spark-connector`](https://learn.microsoft.com/azure/azure-sql/database/spark-connector)。在
    GitHub 上获取示例：[`https://github.com/microsoft/sql-spark-connector`](https://github.com/microsoft/sql-spark-connector)。


    ## Azure Data Factory (ADF)


    正如本章前面提到的，Azure Data Factory (ADF) 是为数据集成构建的云服务。你可以构建流水线来编排数据集成活动，很像 SSIS。ADF
    的复杂度可以根据你的需要而定。你可以在以下链接看到一个使用 ADF 将数据从 Azure Blob 存储复制到 Azure SQL Database 的简单示例：[`https://learn.microsoft.com/en-us/azure/data-factory/tutorial-copy-data-portal`](https://learn.microsoft.com/en-us/azure/data-factory/tutorial-copy-data-portal)。


    虽然 ADF 使用计算集成运行时环境执行，但你应该将 ADF 视为用于数据集成的 PaaS 服务（它包含 SLA）。ADF 团队喜欢将他们的服务视为 **无代码的
    ETL 即服务**。


    如果你在 SSIS 包上还没有大量投资，并且需要持续在 Azure 上执行 ETL 或仅数据移动操作，我强烈建议你考虑 ADF。请从阅读介绍开始：[`https://learn.microsoft.com/azure/data-factory/introduction`](https://learn.microsoft.com/azure/data-factory/introduction)。


    ## 更新 Azure SQL


    我在本书中提到过，Azure SQL 托管实例和 Azure SQL Database 是无版本的。无版本意味着我们不会在 Azure SQL 中发布主要版本的
    SQL Server 然后让你去采用。我们持续更新驱动 Azure SQL 的软件，为你提供最新的更新和增强功能。你完全无需操心并更新操作系统和 SQL Server。'
  raw: '### BACPAC


    A BACPAC file (bacpac extension) is a file that includes schema and data for a
    database. You can use a BACPAC file generated through tools like SSMS, SqlPackage,
    or PowerShell to import into Azure SQL. The import process in this case *creates
    a full database* with the schema and data in the file. You can store your BACPAC
    file in Azure Storage or in a local file depending on what tool and where you
    are importing the data.


    Azure SQL Database supports importing to a new database using the Azure Portal
    (the BACPAC file would be in Azure Storage), the SqlPackage tools, SSMS, or PowerShell.
    Figure [5-6](#496204_2_En_5_Chapter.xhtml#Fig6) shows the option from the Command
    Bar of a logical server to import a database with a BACPAC file.


    ![](images/496204_2_En_5_Chapter/496204_2_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Importing a database from the Azure Portal


    For Azure SQL Managed Instance, you can use SSMS or SqlPackage, but you can also
    do a T-SQL RESTORE of a backup. BACPAC files are limited in 200GB, so if you need
    larger sizes you will need to use bulk copy options. A full database migration
    can be done using the Azure Database Migration Service.


    To read more about using BACPAC files to import a new database in Azure SQL, consult
    our docs at [`https://learn.microsoft.com/azure/azure-sql/database/database-import`](https://learn.microsoft.com/azure/azure-sql/database/database-import).


    ### Database Copy


    Azure SQL Database supports the ability to create a new database by making a transactional
    consistent copy from another deployed database. You can use the Azure Portal,
    PowerShell, az CLI, or the T-SQL CREATE DATABASE statement. One nice aspect to
    this capability is that you can copy a database to a different logical server.
    The portal also allows you to configure the deployment option for the target database.


    Figure [5-7](#496204_2_En_5_Chapter.xhtml#Fig7) shows that the copy database capability
    can be accessed from the Command Bar in the Azure Portal from the context of an
    existing database.


    ![](images/496204_2_En_5_Chapter/496204_2_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Copying a database using the Azure Portal


    This is the same as using the CREATE DATABASE…AS COPY option I mentioned earlier
    in the chapter. You can read more about how to copy a database for Azure SQL Database
    at [`https://learn.microsoft.com/azure/azure-sql/database/database-copy`](https://learn.microsoft.com/azure/azure-sql/database/database-copy).


    ### RESTORE to Managed Instance


    Since Azure SQL Managed Instance is a full SQL Server instance with almost all
    surface area including T-SQL available to you, you can perform a *native* restore
    of a SQL Server backup to the instance.


    This means you can back up a database from a SQL Server, copy the backup file
    to Azure Storage, and then restore the database using the RESTORE DATABASE statement
    to the Azure Managed Instance.


    At this time, only a full database backup can be restored. There is a key difference
    in RESTORE with Managed Instance from SQL Server. A RESTORE is an asynchronous
    operation. You can drop the connection and the restore option is done in the background.
    You can use the DMVs **sys.dm_operation_status** to check on the deployment.


    To learn more about how to use RESTORE with Azure SQL Managed Instance check out
    documentation at [`https://learn.microsoft.com/sql/t-sql/statements/restore-statements-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/restore-statements-transact-sql).


    ### Spark Connector


    Spark is a technology that can often be used for ETL operations. Microsoft supports
    a Spark connector that allows you to export and import data to and from Azure
    SQL Database and Managed Instance. It supports bulk operations that can be very
    fast and even use Microsoft Entra authentication.


    Anywhere you can run Spark and connect to Azure SQL, you can use this connector.
    Learn more at [`https://learn.microsoft.com/azure/azure-sql/database/spark-connector`](https://learn.microsoft.com/azure/azure-sql/database/spark-connector).
    Get examples on GitHub at [`https://github.com/microsoft/sql-spark-connector`](https://github.com/microsoft/sql-spark-connector).


    ### Azure Data Factory (ADF)


    As mentioned earlier in the chapter, Azure Data Factory (ADF) is a cloud service
    built for data integration. You can build *pipelines* to orchestrate data integration
    activities much like SSIS. ADF can be as simple or complex as you want or need.
    You can see a simple example of using ADF to copy data from Azure Blob Storage
    to Azure SQL Database at [`https://learn.microsoft.com/en-us/azure/data-factory/tutorial-copy-data-portal`](https://learn.microsoft.com/en-us/azure/data-factory/tutorial-copy-data-portal).


    While ADF uses compute integration runtime environments for execution, you should
    think of ADF as *PaaS service for data integration* (it includes an SLA). The
    ADF team likes to think of their service as **Code-free ETL as a Service**.


    If you do not have a lot of investment in SSIS packages already and need to perform
    ETL or just data movement operations in Azure on a consistent basis, I highly
    encourage you to consider ADF. Start by reading the introduction at [`https://learn.microsoft.com/azure/data-factory/introduction`](https://learn.microsoft.com/azure/data-factory/introduction).


    ## Updating Azure SQL


    I have mentioned in this book that Azure SQL Managed Instance and Azure SQL Database
    are *versionless*. Versionless means that we do not release major versions of
    SQL Server in Azure SQL and then let you adopt them. We are continuously updating
    the software that powers Azure SQL to give you the latest updates and enhancements.
    **You are completely unburdened from keeping up and updating both the operating
    system and SQL Server.**'
