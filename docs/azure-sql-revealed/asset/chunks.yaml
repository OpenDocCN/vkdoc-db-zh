  trans: '

    #### 价格


    与 Azure 虚拟机类似，您可以利用 Azure 定价计算器，输入其中一些选项来预估成本。这包括使用 `Azure 混合权益`。您可以在 [`https://azure.microsoft.com/pricing/details/azure-sql/sql-managed-instance/single/`](https://azure.microsoft.com/pricing/details/azure-sql/sql-managed-instance/single/)
    找到 Azure SQL 托管实例的定价计算器，在 [`https://azure.microsoft.com/pricing/calculator/?service=sql-database`](https://azure.microsoft.com/pricing/calculator/?service=sql-database)
    找到 Azure SQL 数据库的定价计算器。


    > **提示**

    >

    > 为确保找到 Azure SQL 数据库和托管实例，请搜索 Azure SQL 数据库。从那里，您可以更改类型以查看托管实例。


    图 4-3 展示了 Azure SQL 数据库定价计算器的示例。


    ![images/496204_2_En_4_Chapter/496204_2_En_4_Fig3_HTML.jpg](img/496204_2_En_4_Fig3_HTML.jpg)

    **图 4-3**

    Azure SQL 数据库的定价计算器


    ### 考虑资源限制


    您在部署选项、服务层级和大小方面的选择会影响您的资源限制。以下是您在做这些选择时需要考虑的资源限制。我特别指出这些，是因为当您通过 `Azure 门户`进行部署时，这些限制可能并不显而易见：


    *   最大内存

    *   最大日志大小

    *   日志速率调控

    *   IOPS 和 I/O 延迟

    *   `tempdb` 的最大大小

    *   最大并发工作线程数

    *   备份保留期


    我将在本书的第 7 章中更详细地讨论日志速率调控以及 IOPS 和 I/O 延迟。现在，请牢记这些概念，因为它们可能影响应用程序的性能，例如那些事务日志工作负载繁重的应用程序。


    要查看 Azure SQL 托管实例的具体限制，请参阅 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits)
    上这些记录完善的表格。要查看 Azure SQL 数据库的具体限制，请参阅 [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-vcore-single-databases`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-vcore-single-databases)
    上的表格。


    您还应该知道，每个订阅在每个区域都有整体的 Azure SQL 限制。您可以在 [`https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits`](https://learn.microsoft.com/azure/azure-sql/managed-instance/resource-limits)
    和 [`https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server`](https://learn.microsoft.com/azure/azure-sql/database/resource-limits-logical-server)
    查看这些限制是什么。


    可以向 Microsoft 提出增加订阅限制的请求。这被称为 *配额增加请求*。请在 [`https://learn.microsoft.com/azure/azure-sql/database/quota-increase-request`](https://learn.microsoft.com/azure/azure-sql/database/quota-increase-request)
    阅读更多信息。


    ## 部署 Azure SQL 托管实例


    与我在第 3 章中为虚拟机记录的过程类似，通过 `Azure 门户`部署 Azure SQL 托管实例，首先从 Azure 市场使用 Azure SQL 选项开始（我在图
    3-1 中向您展示了此视图）。


    使用三个 Azure SQL 选项，您需要选择 SQL 托管实例和单实例，然后单击**创建**。


    ### 部署过程演练


    让我们逐步演练托管实例部署选项的每个屏幕，然后通过 `Azure 门户`进行部署。我将以新的 `NextGen 通用型` 服务层级为例，带您走一遍部署体验。您将看到与第
    3 章中关于 Azure 虚拟机上 SQL Server 所见相似但略有不同的体验。


    正如我在本章前面关于预部署规划所提到的，我强烈建议您花时间查看我将要展示的所有选项。这是因为您将要做出的一些选择只能在部署时进行，并且之后无法修改（这需要您进行迁移）。此外，一些选择可以修改（如服务层级），但可能会导致一些停机时间。

    '
- fmt: '### Basics


    Figure [4-4](#496204_2_En_4_Chapter.xhtml#Fig4) shows the fields you complete
    on the top of the `Basics` screen, including choosing `Subscription`, `Resource
    Group`, `Instance Name` (this becomes part of the server name and `@@SERVERNAME`
    of the instance), `Region`, `Pool`, and `Compute+Storage`.


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Basics top of screen to deploy Azure SQL Managed Instance


    I like the fact that the estimated cost is listed on the right side as I make
    all my choices. This is a common experience we provide for Azure SQL.


    Notice the option called `Compute + Storage`. This is where you will choose `Service
    Tier` and `Size` (`vCores` + `Storage`). Notice for me the default is `General
    Purpose` with 8 `vCores` and 256GB max storage. Click `Configure Managed Instance`
    to see what your options are, which should look like Figure [4-5](#496204_2_En_4_Chapter.xhtml#Fig5).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Top of screen for Compute+Storage for Azure SQL Managed Instance


    This is an important screen to make choices for your deployment, so let’s look
    at these options.


    At the top of this screen, you can see you can choose `General Purpose` (`GP`),
    the default, or `Business Critical` (`BC`), and some of the resource limits and
    performance expectations are listed with each. From pre-deployment planning, remember
    there are other significant reasons to choose `BC`, including


    *   Access to the `In-Memory OLTP` feature

    *   Higher availability because `BC` uses local storage and a replica architecture


    Next, you will notice I have enabled the `NextGen GP` option. As this feature
    becomes generally available, I expect this to be the default `GP` behavior.


    Now I can choose the hardware generation which I’ve described these choices earlier
    in the chapter.


    Now I can choose my “size” options, including `vCores`, max storage, and `IOPS`
    (this is one of the new features of `NextGen`).


    Your hardware generation choice dictates your possible max `vCore` values which
    can be up to 128.


    The maximum storage value is called the *maximum instance size* and is the maximum
    size allowed for `all` database and transaction log files associated with databases
    for the managed instance. You should think of this as the maximum storage drive
    for your databases. The maximum storage size is different depending on your `vCore`
    choice and choice of `GP` and `BC`. `GP` allows for up to 32TB, and `BC` allows
    for up to 16TB.


    Note


    I discussed the architecture of Business Critical deployments in Chapter [2](#496204_2_En_2_Chapter.xhtml)
    of the book and will elaborate more on this architecture in Chapter [8](#496204_2_En_8_Chapter.xhtml).
    The reason for the lower storage limit for `BC` is the fact that databases are
    stored on local SSD drives vs. Azure Storage.


    `Tempdb` max sizes are dependent on `vCore` selections but are counted toward
    the overall maximum storage limit. In fact, all databases, including system databases,
    count toward the overall max instance storage size.


    You can run the following query after you deploy your managed instance (in any
    database context) to see how much space your databases are taking up in relation
    to the max storage for the instance:


    ```sql

    SELECT TOP 1 used_storage_gb = storage_space_used_mb/1024,

    max_storage_size_gb = reserved_storage_mb/1024

    FROM sys.server_resource_stats ORDER BY start_time DESC;

    ```


    Scrolling down, you can see the rest of the options to choose from in Figure [4-6](#496204_2_En_4_Chapter.xhtml#Fig6).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Other choices for Compute+Storage for Azure SQL Managed Instance


    Your first choice is `zone redundancy`. That option is disabled during the preview
    of `NextGen GP` but will be available once this is generally available. Zone redundancy
    uses `Availability Zones` to make your deployment more highly available. I highly
    recommend you consider this option for your deployments. I will discuss this concept
    more in Chapter [8](#496204_2_En_8_Chapter.xhtml) of the book.


    You also have a choice to save money using your existing SQL Server licenses with
    `Azure Hybrid Benefit` (`AHB`). I’ll pause and say the Hybrid failover rights
    apply to a Managed Instance that is used for disaster recovery. Learn more in
    Chapter [8](#496204_2_En_8_Chapter.xhtml) of the book.


    You also have choices for the redundancy of your backups. Unless you have specific
    data residency requirements, I recommend `geo-redundant backups` which replicate
    your backups in Azure Storage to known paired regions. I’ll discuss more about
    backup redundancy and costs in Chapter [8](#496204_2_En_8_Chapter.xhtml) of the
    book.


    Click `Apply` after you make any changes (`Apply` is only enabled if you change
    the defaults; you can click the `X` in the upper right-hand corner to get back
    to the `Basics` screen).


    Tip


    Hitting `Apply` will not deploy the Managed Instance yet, but take your time to
    get your choices here as close to correct as possible. Why? You can change them
    later, but Managed Instance changes to tiers and sizes can be a long operation.


    We still have one more choice on the `Basics` screen as you can see in Figure
    [4-7](#496204_2_En_4_Chapter.xhtml#Fig7).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Authentication choices for Azure SQL Managed Instance during deployment


    This option allows you to choose `Microsoft Entra authentication only`, `mixed`,
    or just `SQL Authentication`. If you choose any `Entra` option, you must specify
    an `Entra` account. These choices become a member of the `sysadmin` role for the
    instance. If you have never used `Microsoft Entra` authentication, it will require
    some learning for you. It is very similar to using `Windows Authentication` on
    SQL Server, but there are several differences. This capability is the most secure
    method and even supports passwordless applications.


    Setting this up though for Azure SQL Managed Instance has one possible roadblock
    (which is why I didn’t use it here). You must have special permissions in your
    `Microsoft Entra` system to use this option (I don’t at Microsoft by default have
    this permission so have a special process to request it). Read more at [`https://learn.microsoft.com/azure/azure-sql/database/authentication-aad-configure?view=azuresql&tabs=azure-powershell#provision-microsoft-entra-admin-sql-managed-instance`](https://learn.microsoft.com/azure/azure-sql/database/authentication-aad-configure%253Fview%253Dazuresql%2526tabs%253Dazure-powershell%2523provision-microsoft-entra-admin-sql-managed-instance).


    ### Networking


    Click `Next: Networking >` to review your networking choices. Your screen should
    look like Figure [4-8](#496204_2_En_4_Chapter.xhtml#Fig8).


    ![](images/496204_2_En_4_Chapter/496204_2_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Azure SQL Managed Instance Networking Options


    #### Virtual Network


    You can see at the top of the screen that a new virtual network will be created
    to host the Azure SQL Managed Instance. One of the advantages of Managed Instance
    is that it is deployed in a private virtual network. You could deploy your own
    Azure virtual network first (you can use the Azure portal or CLI) and select that
    virtual network on this deployment screen. If you choose to use your own virtual
    network, you must configure it a specific way, which you can read at [`https://learn.microsoft.com/azure/azure-sql/managed-instance/vnet-existing-add-subnet`](https://learn.microsoft.com/azure/azure-sql/managed-instance/vnet-existing-add-subnet)`.`


    Tip


    Did you know you can deploy multiple instances in the same virtual network? Doing
    this will speed up subsequent deployments, but make sure this meets your security
    and networking needs.'
