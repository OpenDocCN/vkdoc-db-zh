- fmt: '## The Red Dog


    In 2006, Ray Ozzie enlisted Microsoft veteran Amitabh Srivastava to lead a “Cloud
    OS” project in the attempt to move forward the “Internet services disruption”
    he had talked about a year ago. One of the first actions Amitabh took was to bring
    out of retirement Dave Cutler, the “father” of DEC VMS and Windows NT operating
    systems. As part of their initial project work, Srivastava and Cutler visited
    groups at Microsoft that were providing “cloud services,” including Xbox Live,
    Hotmail, and Bing. On one of the trips to visit Hotmail in San Jose, California,
    the team drove by a club called the Pink Poodle. It was Dave Cutler who famously
    said, “Maybe we should name our project the Pink Poodle?” The project team all
    agreed that would not go over well, so named the project instead “Red Dog.” The
    name stuck (you can read more about the great history of the beginning of Red
    Dog at [`https://www.wired.com/2008/11/ff-ozzie/?currentPage=7`](https://www.wired.com/2008/11/ff-ozzie/%253FcurrentPage%253D7)
    and [`https://www.zdnet.com/article/how-the-red-dog-dream-team-built-a-cloud-os-from-scratch/`](https://www.zdnet.com/article/how-the-red-dog-dream-team-built-a-cloud-os-from-scratch/)).


    From the beginning, the Red Dog team did things differently at Microsoft to build
    the “cloud OS.” They built their own “data center” in the heart of the Microsoft
    campus, even taking reserve power from neighboring buildings. Their goals were
    ambitious and still resonate today. Their main overall goal was to *build a cloud
    service for developers to build scalable web applications*. They also had a massive
    theme from the beginning: *reliability*. As Dave Cutler said back in 2008, “One
    of the things you did not ask is why aren’t we saying more about Azure and in
    the process filling the marketplace with sterling promises for the future. The
    answer to this is simply that the RD group is very conservative, and we are not
    anywhere close to being done. We believe that cloud computing will be very important
    to Microsoft’s future, and we certainly don’t want to do anything that would compromise
    the future of the product. We are hypersensitive about losing people’s data. We
    are hypersensitive about the OS or hypervisor crashing and having properties experience
    service outages. So, we are taking each step slowly and attempting to have features
    100% operational and solidly debugged before talking about them. The opposite
    is what Microsoft has been criticized for in the past and the RD dogs hopefully
    have learned a new trick.”


    The Red Dog and CloudDB teams were marching together as separate projects (ironically
    on the same campus only buildings apart) to support cloud services for web applications
    and hosted databases in the cloud. These projects were on a path to come together
    in 2007 and 2008 for the launch of a unified cloud service.


    ## The Azure Services Platform


    In October of 2008 at the Microsoft Professional Developers Conference (PDC) in
    Los Angeles, California, Ray Ozzie announced `Windows Azure`. The PDC was the
    precursor to today’s Microsoft //Build conference ([`https://en.wikipedia.org/wiki/Build_(developer_conference)`](https://en.wikipedia.org/wiki/Build_%2528developer_conference%2529).
    PDC was a huge event for Microsoft for developers.


    `Windows Azure` was launched as part of the `Azure Services Platform`. Figure
    [1-1](#496204_2_En_1_Chapter.xhtml#Fig1) shows a snapshot of the `Azure Services
    Platform` offerings.


    ![](images/496204_2_En_1_Chapter/496204_2_En_1_Fig1_HTML.jpg)


    Figure 1-1


    The `Azure Services Platform` in 2008


    The Red Dog team had been cranking away since 2006 with the goal of releasing
    a cloud service for developers. Ray Ozzie called `Windows Azure` a “new Windows
    offering at the web tier of computing” (watch the video for yourself at [`https://www.zdnet.com/article/ray-ozzie-announces-windows-azure/`](https://www.zdnet.com/article/ray-ozzie-announces-windows-azure/)).
    He also called `Azure` “Windows in the cloud.” Microsoft now would offer customers
    Windows on your laptop (at that time, it was Windows Vista), servers for your
    enterprise (Windows Server), and Windows in the cloud (`Azure`).


    Note


    I sought out many folks at Microsoft on why our cloud service was named `Azure`.
    As Buck Woody tells the story, “`Azure` means clear blue sky with no clouds. The
    name just seemed right without using the word cloud in our name.”


    Like the goal of the CloudDB project, when `Windows Azure` was first released,
    the goal was all about scalability and availability targeting web applications
    in the form of a *Platform as a Service* (**`PaaS`**). Think of `PaaS` as purchasing
    a platform to host your application or database based on a subscription where
    the platform is *managed* by a provider, like `Azure`. With `PaaS`, you are typically
    abstracted from a host computer or virtual machine. Therefore, *cloud services*
    was the first service in `Windows Azure`. This type of service was known internally
    as `PaaS V1`.


    Note


    Cloud services are still offered today in `Azure`. You can read more about cloud
    services at [`https://azure.microsoft.com/services/cloud-services/`](https://azure.microsoft.com/services/cloud-services/).
    This has been replaced though in modern apps with `Azure App Service` which you
    can read more about at [`https://azure.microsoft.com/services/app-service/`](https://azure.microsoft.com/services/app-service/).


    Even though a cloud service application ran in one or more virtual machines, the
    idea was to support easy-to-scale web applications in the cloud where developers
    didn’t focus on the details of the virtual machine but more on the application.
    Developers at this time for Windows were used to the Internet Information Server
    (`IIS`) feature of Windows Server. While developers didn’t have to worry as much
    about deploying and configuring `IIS`, they typically had to have an administrator
    within their organization. While developers had some access to the virtual machine
    native OS environment for cloud services, that access was limited. It would be
    a few years later that Microsoft would introduce the concept of *Infrastructure
    as a Service* (**`IaaS`**) through `Azure Virtual Machine`. Think of `IaaS` as
    purchasing an infrastructure to host your virtual machine based on a subscription.
    You worry about the guest VM, and the provider manages the host, hardware, networking,
    and storage.


    One of the other promises of `PaaS` and cloud services is to create an easy-to-use
    concept of application deployment, configuration, and updates. Furthermore, providing
    capabilities for scalability, built-in high availability, and load balancing made
    the concept of cloud services extremely appealing to web developers. These same
    concepts you will see are a part of the appeal as well for `Azure SQL` and databases.'
