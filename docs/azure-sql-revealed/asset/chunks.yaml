- fmt: '## Point-in-Time Restore (PITR)


    Now that you know about the automated backup strategy we use, you may have a need
    to use backups to perform a restore. In some cases, for SQL Server, you may run
    into a situation where an incident has occurred that affects availability like
    a database owner dropping a table.


    Since we deploy a combination of full, differential, and log backups, we allow
    you to pick a *point in time* and restore back to that state using these backups.
    This concept is called `point-in-time restore (PITR)` and is available in SQL
    Server (provided you deploy the right backup strategy).


    If you look at the SQL Server documentation at [`https://learn.microsoft.com/sql/relational-databases/backup-restore/restore-a-sql-server-database-to-a-point-in-time-full-recovery-model`](https://learn.microsoft.com/sql/relational-databases/backup-restore/restore-a-sql-server-database-to-a-point-in-time-full-recovery-model),
    the method to restore to a point in time is to use a series of backups to restore
    from a log backup using the T-SQL `RESTORE` statement. For Azure SQL, PITR is
    supported for the automated backups we create for Azure SQL Managed Instance and
    Databases. Therefore, to perform a point-in-time restore, you must use Azure interfaces
    such as the portal, `az` CLI, or PowerShell.


    Note


    Even though the `RESTORE` statement is supported for a Managed Instance, your
    syntax is limited and you cannot perform a point-in-time restore. This is only
    to restore full backups from the `COPY_ONLY` option or from a SQL Server.


    Azure SQL Managed Instance supports PITR through the Azure portal (navigate to
    the database in the portal and select the Restore option from the Command Bar),
    `az` CLI (`az sql midb restore`), and PowerShell (`Restore-AzSqlInstanceDatabase`).
    A PITR operation is asynchronous and creates a *new database (in fact, a new deployment)*
    based on the date and time you select for the restore. Your date and time choices
    are based on your backup day retention.


    Azure SQL Database also supports PITR through the Azure portal, `az` CLI (`az-sql-db-restore`),
    and PowerShell (`Restore-AzSqlDatabase`).


    The `key concept` for PITR for Azure SQL is you never restore on top of an existing
    database but initiate a new database deployment by restoring from an automatic
    backup.


    Let’s look at an example of how to use PITR for the database I deployed called
    `bwadw` earlier in the book. I created this database some time back as I was writing
    the chapters of the book, so by now at least seven days have gone by for a series
    of backups. Let’s go through an exercise where I accidentally drop a table in
    my database and then use PITR to restore the database to a new database name before
    the drop, so I can merge that data back into my current database.


    ### Drop the table


    I’ll use the Azure VM `bwsql2022` I deployed in Chapter [3](#496204_2_En_3_Chapter.xhtml)
    and have used in the last two chapters to connect with SSMS and run the following
    T-SQL statement against the `bwadw` database connected as the server admin I used
    during deployment (remember it is based on the AdventureWorksLT sample):


    ```

    DROP TABLE SalesLT.OrderRating;

    GO

    ```


    Note This is the table I created as part of an example in Chapter [7](#496204_2_En_7_Chapter.xhtml).
    I left around 125,000 rows in the table before I dropped it. So, if we restore
    it correctly, we should have it back with 125,000 rows.


    ### Restore the database to the time before the DROP


    I just dropped the table, so I should be able to go back to an earlier point when
    the table was created and data existed. I can just pick one hour earlier to restore
    from this point.


    Tip You can use SQL Audit to go back and find the `DROP TABLE` statement in a
    real-world scenario where you don’t know when the table was dropped.


    You can use the Azure Portal to choose to start the Restore process as seen in
    Figure [8-5](#496204_2_En_8_Chapter.xhtml#Fig5).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Starting the PITR process for an Azure SQL Database


    Notice the earliest restore point is listed on the Overview screen.


    Note


    The earliest point in time is based on the first transaction log backup after
    the database is created. A full backup must first complete before the log backup
    is taken. **Here is a tip.** Use our new `Copilot` and use this prompt “How far
    back in time can I go for a point-in-time restore?”


    After I select Restore, I’m presented with a screen where I can fill out the time
    I want to restore to as seen in Figure [8-6](#496204_2_En_8_Chapter.xhtml#Fig6).


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig6_HTML.jpg)


    Figure 8-6


    Creating a new database based on PITR


    You will notice where I can select a date and time for the restore which is effectively
    an hour before I executed the `DROP` statement. The rest of the screen if you
    scroll down allows you to choose the name of the database and other options as
    you would if you deployed a new database (e.g., service tier). The default database
    name created (which you can change) is the original database name, including the
    details of the restore point. For me, my database name was `bwadw_2024-08-25T20-28Z`.


    You need to set some expectations on time here to deploy. This is not just a new
    database. We must do all the things to deploy a new database **and** restore a
    full database backup and a series of differential and log backups up to the time
    you selected. For me, this restore took around ten minutes. I can do all the activities
    we talked about in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the book to look
    at the Activity Log and see how the restore deployed a new database. I recommend
    customers try out various scenarios here to see expected recovery times for their
    workload. Just remember that higher RTO and RPO objective can be achieved with
    concepts like geo-replication and failover groups which will be discussed later
    in this chapter.


    Note


    Your recovery time will depend on what we need to restore to get you to the desired
    point in time. Learn more at [`https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups?view=azuresql&tabs=azure-portal#recovery-time`](https://learn.microsoft.com/azure/azure-sql/database/recovery-using-backups?view=azuresql&tabs=azure-portal#recovery-time),
    including limits on the number of concurrent restores.


    ![](images/496204_2_En_8_Chapter/496204_2_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Querying the dropped table from PITR


    ### Verify the new database has the dropped table restored


    I went back to my Azure VM, `bwsql2022`, where I had connected as an admin to
    the logical master database. If I navigate to this database and run the following
    T-SQL statement:


    ```

    SELECT COUNT(*) FROM SalesLT.OrderRating;

    GO

    ```


    I get back 125,000 rows as you can see in Figure [8-7](#496204_2_En_8_Chapter.xhtml#Fig7).


    I now have two choices:


    *   Drop the current `bwadw` database and rename this new database, so my applications
    would lose any changes since the time for PITR.


    *   Merge the data from this new database from `SalesLT.OrderRating` into my original
    database. I realize this may not be a simple operation if foreign keys exist.'
