  trans: "## 分区\n\n分区常与 SQL Server 配合用于包含大量行的表，通过按表中的列细分数据来提升性能。关于分区和 Azure SQL，请考虑以下几点：\n\
    \n*   Azure SQL Database 和托管实例均支持分区。\n*   对于 Azure SQL 托管实例，您只能将文件组与分区结合使用。（请记住，Azure\
    \ SQL Database 仅具有主分区和文件组，而托管实例支持用户定义的文件组）。\n\n需要分区入门知识吗？请从此文档页面开始：[`https://learn.microsoft.com/sql/relational-databases/partitions/partitioned-tables-and-indexes`](https://learn.microsoft.com/sql/relational-databases/partitions/partitioned-tables-and-indexes)。\n\
    \n注意\n作为开发者，您可能想了解 Azure SQL Database 中一些与 SQL 分区无关的有趣 `分区化` 技术。更多信息请阅读：[`https://learn.microsoft.com/azure/architecture/best-practices/data-partitioning-strategies#partitioning-azure-sql-database`](https://learn.microsoft.com/azure/architecture/best-practices/data-partitioning-strategies#partitioning-azure-sql-database)。\n\
    \n## SQL Server 2022 增强功能\n\nSQL Server 2022 包含多项与性能相关的增强功能，这些功能在 Azure SQL 托管实例和\
    \ Azure SQL Database 中同样可用：\n\n*   `智能查询处理` (IQP) 改进\n\n    IQP ([`https://aka.ms/iqp`](https://aka.ms/iqp))\
    \ 是一系列内置于查询处理器中的功能，旨在让您的 T-SQL 查询运行更快或在无需更改代码的情况下保持性能。\n\n    Azure SQL 托管实例和数据库包含来自\
    \ SQL Server 2017 和 2019 的所有 IQP 功能。此外，SQL Server 2022 的 IQP 功能也已在 Azure SQL 中可用。更多详情请参阅本章最后一节“智能性能”。\n\
    \n*   `查询存储提示`\n\n    计划指南一直是强制或塑造独立于应用程序所发送查询的查询计划的有效方法。但此功能存在限制，且使用起来可能较为复杂。\n\
    \n    查询存储提示允许您向应用程序发出的任何传入查询“添加”查询提示，以塑造或更改查询计划。这些提示持久存储在查询存储中，使您能够基于一系列提示强制执行某个查询计划。一些新的\
    \ IQP 功能在后台使用了查询存储提示。了解更多：[`https://aka.ms/querystorehints`](https://aka.ms/querystorehints)。\n\
    \n注意\n重要的是要知道，一些“隐藏瑰宝”功能，如循环扫描和缓冲池加速，都在后台用于 Azure SQL 的所有版本。更多信息请访问：[`https://learn.microsoft.com/sql/relational-databases/reading-page`](https://learn.microsoft.com/sql/relational-databases/reading-page)。\n\
    \n## 智能性能\n\n在过去几个 SQL Server 版本中，我们一直致力于提供内置功能，以增强性能而无需您更改应用程序。我们的目标是利用数据和自动化做出明智决策，使您的查询运行更快。我们将此称为\
    \ `智能性能`。这些功能存在于 Azure SQL 中，但我们在云端走得更远。我们利用云的力量提供更多功能。您可以在本章最后一节（IQP 是其中的一部分）了解更多关于\
    \ Azure SQL 智能性能的细节。\n\n## 性能配置与维护\n\n在本书第 5 章中，我介绍了配置 Azure SQL 托管实例和数据库的许多选项。有一些可能影响性能的配置选项值得深入探讨。这包括\
    \ `tempdb` 数据库、数据库选项配置、文件和文件组、`最大并行度` 以及 `资源调控器`。此外，值得比较一下与 SQL Server 相比，为 Azure\
    \ SQL 数据库维护索引和统计信息所需执行的各项任务。\n\n### Tempdb\n\n`tempdb` 数据库是应用程序使用的重要共享资源。确保 `tempdb`\
    \ 配置正确会影响您提供一致性能的能力。Azure SQL 中 `tempdb` 的使用方式与 SQL Server 相同，但您配置 `tempdb` 的能力有所不同，包括文件放置位置、文件数量和大小、`tempdb`\
    \ 大小以及 `tempdb` 配置选项。\n\n在 Azure SQL Database 中，`tempdb` 文件始终自动存储在本地 SSD 驱动器上，因此\
    \ I/O 性能不应成为问题。\n\nSQL Server 专业人员通常使用多个数据库文件来为 `tempdb` 表分区分配。对于 Azure SQL Database，文件数量随\
    \ vCore 数量扩展（例如，2 vCore = 4 个文件），最多为 16 个。文件数量无法通过针对 `tempdb` 的 T-SQL 进行配置，而需通过\
    \ `更改部署选项` 来设置。`tempdb` 数据库的最大大小也随 vCore 数量扩展。\n\n我在第 5 章中提到，在 Azure SQL 托管实例中，您可以对\
    \ `tempdb` 进行一些配置选项，包括扩展文件数量、文件的逻辑名称以及自动增长增量大小值。\n\n`tempdb` 数据库选项 `MIXED_PAGE_ALLOCATION`\
    \ 设置为 `OFF`，`AUTOGROW_ALL_FILES` 设置为 `ON`。这无法配置，但与 SQL Server 一样，它们是推荐的默认设置。\n\
    \n### 数据库配置\n\n正如我在第 5 章所述，通过 `ALTER DATABASE` 和 `ALTER DATABASE SCOPED CONFIGURATION`，Azure\
    \ SQL 几乎提供了与 SQL Server 相同的所有数据库配置选项。请查阅文档：[`https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-transact-sql)\
    \ 和 [`https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql)。您将在本章后面看到\
    \ `ALTER DATABASE` 中针对 Azure SQL 的新选项。\n\n对于性能而言，有一个无法更改的数据库选项是数据库的 `恢复模式`。默认为完整恢复，且无法修改。我经常看到社区比较\
    \ SQL Server 和 Azure SQL 的 OLTP 性能，但没有使用完整恢复，这可能会对批量插入等场景的性能产生影响。这确保您的数据库能够满足\
    \ Azure 服务级别协议 (SLA)。因此，不支持批量操作的最小日志记录。`tempdb` 支持批量操作的最小日志记录。"
- fmt: '### 文件与文件组


    SQL Server 专业人员通常使用文件和文件组，通过物理文件放置来提升 I/O 性能。Azure SQL 不允许用户将文件放置在特定的磁盘系统上。然而，Azure
    SQL 在 I/O 速率、IOPS 和延迟方面有性能保障，因此将用户与物理文件放置相隔离也可能是一种优势。


    Azure SQL 数据库通常只有一个数据库文件（Hyperscale 可能有多个），其大小通过 Azure 界面进行配置。没有创建额外文件的功能，但同样地，考虑到
    IOPS 和 I/O 延迟的保障，你无需为此担心。


    **注意**

    > Hyperscale 拥有独特的架构，初始部署时可能会根据你的 vCore 选择创建一个或多个文件。例如，对于一个 8 vCore 的部署，我见过 Hyperscale
    创建了总计 40GB 的多个文件。此实现方式可能会改变，你不应依赖于此。Hyperscale 只是简单地根据需要创建文件和分配大小以满足你的要求。


    Azure SQL 托管实例支持添加数据库文件和配置大小，但不支持文件的物理放置。托管实例的文件数量和文件大小可以用来提升 I/O 性能。然而，正如我在本书[第
    4 章](#496204_2_En_4_Chapter.xhtml)中提到的，下一代通用服务层使用了不同的 I/O 架构，让你无需添加文件或更改大小即可控制
    I/O 性能。此外，为了管理性目的（例如与分区结合使用，或使用像 `DBCC CHECKFILEGROUP` 这样的命令），Azure SQL 托管实例支持用户定义的文件组。


    ### 最大并行度


    最大并行度（`MAXDOP`）会影响单个查询的性能，其在 Azure SQL 引擎中的工作方式与 SQL Server 相同。在 Azure SQL 中配置
    `MAXDOP` 对于提供一致的性能可能非常重要。你可以像在 SQL Server 中一样，使用以下技术在 Azure SQL 中配置 `MAXDOP`：


    *   支持在 Azure SQL 中使用 `ALTER DATABASE SCOPED CONFIGURATION` 来配置 `MAXDOP`。

    *   支持在托管实例中使用 `sp_configure` 配置 “max degree of parallelism”。

    *   完全支持 `MAXDOP` 查询提示，包括查询存储提示。

    *   支持在托管实例中使用资源调控器配置 `MAXDOP`。


    阅读更多关于 `MAXDOP` 的信息，请访问 [`https://learn.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option`](https://learn.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option)。


    你将在本章名为“智能性能”的部分了解到更多关于智能查询处理（IQP）的一个名为 `DOP feedback` 的功能，它可以动态地辅助 SQL 引擎调整查询的
    `DOP`。


    ### 资源调控器


    资源调控器是 SQL Server 中的一项功能，可通过 I/O、CPU 和内存来控制工作负载的资源使用。虽然资源调控器在 Azure SQL 数据库中是在后台使用的，但对于
    Azure SQL 托管实例，它支持用户自定义的工作负载组和池。如果你希望在 Azure SQL 托管实例中使用资源调控器，请查阅我们的文档：[`https://learn.microsoft.com/sql/relational-databases/resource-governor/resource-governor`](https://learn.microsoft.com/sql/relational-databases/resource-governor/resource-governor)。


    ### 维护索引


    不幸的是，SQL 的索引不会自我维护，它们偶尔确实需要维护。公平地说，索引维护（具体指重建或重组）没有一个单一的答案。我见过很多客户在非必要时过于频繁地执行重建或重组。同样，也有很多时候这些操作可以提升性能。你可以考虑查看我们关于索引碎片的文档，作为索引维护有意义的一个原因：[`https://learn.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes`](https://learn.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes)。


    **注意**

    > 我并没有说出全部真相。对于 Azure SQL，这里有一个解决方案可以帮助决定是创建还是删除索引。但我不会提前透露太多。这个故事的结局在本章末尾。


    SQL Server 的索引偶尔需要重组，有时需要重建。Azure SQL 支持 SQL Server 中用于重组和重建索引的所有选项，包括联机和可恢复索引操作。


    联机和可恢复索引操作对于维护最大的应用程序可用性极为重要。阅读有关这些功能的全部信息，请访问 [`https://learn.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations`](https://learn.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations)。


    ### 维护统计信息


    正确的统计信息是查询性能的生命线。SQL Server 提供了基于数据库修改自动保持统计信息最新的选项，Azure SQL 支持所有这些选项。我们的文档对统计信息如何用于查询性能有非常详细的解释：[`https://learn.microsoft.com/sql/relational-databases/statistics/statistics`](https://learn.microsoft.com/sql/relational-databases/statistics/statistics)。


    自动统计信息更新的一个有趣方面是我们专门为 Azure SQL 引入的一个数据库范围配置，旨在帮助提高应用程序可用性。你可以从我的同事 Dimitri Furman
    的博客文章中阅读关于此功能的详细信息：[`https://techcommunity.microsoft.com/t5/azure-sql-database/improving-concurrency-of-asynchronous-statistics-update/ba-p/1441687`](https://techcommunity.microsoft.com/t5/azure-sql-database/improving-concurrency-of-asynchronous-statistics-update/ba-p/1441687)。


    ## 监控与故障排除性能


    如果你想确保 SQL 应用程序获得最佳性能，你需要学习如何监控和故障排除性能场景。Azure SQL 随附了 SQL Server 的性能工具和功能来协助你完成此任务。这包括来自
    Azure 生态系统的工具以及驱动 Azure SQL 的 SQL Server 引擎内置的功能。


    在本章的这一部分，你将不仅学习到监控功能，还将学习如何将它们应用于 Azure SQL 的性能场景，包括示例。


    ### 监控工具与功能


    Azure 提供了与 SQL 集成但位于 Azure 生态系统之外的工具，称为 Azure Monitor。


    你习惯于使用动态管理视图（`DMV`）和扩展事件吗？Azure SQL 拥有你需要的功能。你需要调试查询计划吗？Azure SQL 拥有 SQL Server
    的所有功能，包括轻量级查询分析和 `showplan` 详细信息。


    查询存储已成为性能调优的基石，它在 Azure SQL 中默认是开启的。Azure 门户包含可视化效果，例如查询性能见解，无需像 SSMS 这样的工具即可查看查询存储数据。


    此外，自从本书第一版以来，出现了两个突破性的新工具，可以显著节省你的时间和精力：Database Watcher 和 Azure SQL Database
    中的 Microsoft Copilot 技能。


    所有这些汇聚成一套强大的工具和功能，帮助你监控和故障排除 Azure SQL 的性能。'
  raw: '### Files and Filegroups


    SQL Server professionals often use files and filegroups to improve I/O performance
    through physical file placement. Azure SQL does not allow users to place files
    on specific disk systems. However, Azure SQL has resource commitments for I/O
    performance with regard to rates, IOPS, and latencies, so abstracting the user
    from physical file placement can be a benefit.


    Azure SQL Database only has one database file (Hyperscale may have several), and
    the size is configured through Azure interfaces. There is no functionality to
    create additional files, but again you do not need to worry about this given IOPS
    and I/O latency commitments.


    Note


    Hyperscale has a unique architecture and may create one or more files upon initial
    deployment depending on your vCore choice. For example, for an 8-vCore deployment,
    I’ve seen Hyperscale create multiple files totaling 40GB. This implementation
    may change, and you shouldn’t rely on it. Hyperscale simply creates the files
    and size it needs to meet your requirements.


    Azure SQL Managed Instance supports adding database files and configuring sizes
    but not physical placement of files. The number of files and file sizes for Azure
    SQL Managed Instance can be used to improve I/O performance. However, as I mentioned
    in Chapter [4](#496204_2_En_4_Chapter.xhtml) of the book, the NextGen General
    Purpose service tier uses a different I/O architecture so that you have control
    over I/O performance without having to add files or change sizes. In addition,
    user-defined filegroups are supported for Azure SQL Managed Instance for manageability
    purposes such as use with partitions and using commands like DBCC CHECKFILEGROUP.


    ### Max Degree of Parallelism


    Max degree of parallelism (MAXDOP), which can affect the performance of individual
    queries, works the same in the engine for Azure SQL as SQL Server. The ability
    to configure MAXDOP may be important to deliver consistent performance in Azure
    SQL. You can configure MAXDOP in Azure SQL like SQL Server using the following
    techniques:


    *   ALTER DATABASE SCOPED CONFIGURATION to configure MAXDOP is supported for Azure
    SQL.


    *   sp_configure for “max degree of parallelism” is supported for Managed Instance.


    *   MAXDOP query hints are fully supported, including Query Store hints.


    *   Configuring MAXDOP with Resource Governor is supported for Managed Instance.


    Read more about MAXDOP at [`https://learn.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option`](https://learn.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option).


    You will learn more in the section titled “Intelligent Performance” in this chapter
    a feature of IQP called **DOP feedback** which can assist you in dynamically allowing
    the SQL engine to adjust the DOP of a query.


    ### Resource Governor


    Resource Governor is a feature in SQL Server that can be used to control resource
    usage for workloads through I/O, CPU, and memory. While Resource Governor is used
    behind the scenes for Azure SQL Database, it is supported for Azure SQL Managed
    Instance for user-defined workload groups and pools. If you would like to use
    Resource Governor in Azure SQL Managed Instance, consult our documentation at
    [`https://learn.microsoft.com/sql/relational-databases/resource-governor/resource-governor`](https://learn.microsoft.com/sql/relational-databases/resource-governor/resource-governor).


    ### Maintaining Indexes


    Unfortunately, indexes for SQL don’t just maintain themselves, and they do occasionally
    need maintenance. In fairness, index maintenance (specifically rebuild or reorganization)
    does not have a single answer. I have seen many customers perform too often a
    rebuild or reorganization when it is not necessary. Likewise, there can be many
    times where these operations can help performance. You might consider looking
    at our documentation on index fragmentation as one reason why index maintenance
    can make sense: [`https://learn.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes`](https://learn.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes).


    Note


    I’m not telling the complete truth. For Azure SQL, there is a solution here that
    can help with decisions on building or dropping indexes. But I will not get too
    far ahead. The tale of that story is at the end of the chapter.


    Indexes for SQL Server occasionally need to be reorganized and sometimes rebuilt.
    Azure SQL supports all the options you have for SQL Server to reorganize and rebuild
    indexes, including online and resumable indexes.


    Online and resumable index operations can be extremely important to maintain maximum
    application availability. Read all about these capabilities at [`https://learn.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations`](https://learn.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations).


    ### Maintaining Statistics


    Correct statistics can be the lifeblood for query performance. SQL Server offers
    options to automatically keep statistics up to date based on database modification,
    and Azure SQL supports all those options. Our documentation has a very detailed
    explanation on how statistics are used for query performance at [`https://learn.microsoft.com/sql/relational-databases/statistics/statistics`](https://learn.microsoft.com/sql/relational-databases/statistics/statistics).


    One interesting aspect to automatic statistics updates is a database scoped configuration
    we specifically introduced for Azure SQL to help improve application availability.
    You can read about this in great detail from a blog post from my colleague Dimitri
    Furman at [`https://techcommunity.microsoft.com/t5/azure-sql-database/improving-concurrency-of-asynchronous-statistics-update/ba-p/1441687`](https://techcommunity.microsoft.com/t5/azure-sql-database/improving-concurrency-of-asynchronous-statistics-update/ba-p/1441687).


    ## Monitoring and Troubleshooting Performance


    If you want to ensure you have the best performance for a SQL application, you
    need to learn how to monitor and troubleshoot performance scenarios. Azure SQL
    comes with the performance tools and capabilities of SQL Server to help you with
    this task. This includes tools from the Azure ecosystem as well as capabilities
    built into the SQL Server engine that powers Azure SQL.


    In this part of the chapter of the book, you will learn not just monitoring capabilities
    but how to apply them to performance scenarios for Azure SQL, including examples.


    ### Monitoring Tools and Capabilities


    Azure provides tools outside of SQL integrated with the Azure ecosystem called
    Azure Monitor.


    Are you used to using Dynamic Management Views (DMV) and Extended Events? Azure
    SQL has what you need. Do you need to debug query plans? Azure SQL has all the
    capabilities of SQL Server, including Lightweight Query Profiling and *showplan*
    details.


    Query Store has become the bedrock for performance tuning, and it is on by default
    in Azure SQL. The Azure portal includes visualizations, such as Query Performance
    Insight, to view Query Store data without needing tools like SSMS.


    In addition, since the first edition of this, two new breakthrough tools can make
    a dramatic difference in saving you time and effort: Database Watcher and Microsoft
    Copilot skills in Azure SQL Database.


    All this lines up to be a formidable set of tools and capabilities to help you
    monitor and troubleshoot performance for Azure SQL.'
  trans: '### 文件与文件组


    SQL Server 专业人员通常使用文件和文件组，通过物理文件放置来提升 I/O 性能。Azure SQL 不允许用户将文件放置在特定的磁盘系统上。然而，Azure
    SQL 在 I/O 速率、IOPS 和延迟方面有性能保障，因此将用户与物理文件放置相隔离也可能是一种优势。


    Azure SQL 数据库通常只有一个数据库文件（Hyperscale 可能有多个），其大小通过 Azure 界面进行配置。没有创建额外文件的功能，但同样地，考虑到
    IOPS 和 I/O 延迟的保障，你无需为此担心。


    **注意**

    > Hyperscale 拥有独特的架构，初始部署时可能会根据你的 vCore 选择创建一个或多个文件。例如，对于一个 8 vCore 的部署，我见过 Hyperscale
    创建了总计 40GB 的多个文件。此实现方式可能会改变，你不应依赖于此。Hyperscale 只是简单地根据需要创建文件和分配大小以满足你的要求。


    Azure SQL 托管实例支持添加数据库文件和配置大小，但不支持文件的物理放置。托管实例的文件数量和文件大小可以用来提升 I/O 性能。然而，正如我在本书第
    4 章中提到的，下一代通用服务层使用了不同的 I/O 架构，让你无需添加文件或更改大小即可控制 I/O 性能。此外，为了管理性目的（例如与分区结合使用，或使用像
    `DBCC CHECKFILEGROUP` 这样的命令），Azure SQL 托管实例支持用户定义的文件组。


    ### 最大并行度


    最大并行度（`MAXDOP`）会影响单个查询的性能，其在 Azure SQL 引擎中的工作方式与 SQL Server 相同。在 Azure SQL 中配置
    `MAXDOP` 对于提供一致的性能可能非常重要。你可以像在 SQL Server 中一样，使用以下技术在 Azure SQL 中配置 `MAXDOP`：


    *   支持在 Azure SQL 中使用 `ALTER DATABASE SCOPED CONFIGURATION` 来配置 `MAXDOP`。

    *   支持在托管实例中使用 `sp_configure` 配置 “max degree of parallelism”。

    *   完全支持 `MAXDOP` 查询提示，包括查询存储提示。

    *   支持在托管实例中使用资源调控器配置 `MAXDOP`。


    阅读更多关于 `MAXDOP` 的信息，请访问 [`https://learn.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option`](https://learn.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option)。


    你将在本章名为“智能性能”的部分了解到更多关于智能查询处理（IQP）的一个名为 `DOP feedback` 的功能，它可以动态地辅助 SQL 引擎调整查询的
    `DOP`。


    ### 资源调控器


    资源调控器是 SQL Server 中的一项功能，可通过 I/O、CPU 和内存来控制工作负载的资源使用。虽然资源调控器在 Azure SQL 数据库中是在后台使用的，但对于
    Azure SQL 托管实例，它支持用户自定义的工作负载组和池。如果你希望在 Azure SQL 托管实例中使用资源调控器，请查阅我们的文档：[`https://learn.microsoft.com/sql/relational-databases/resource-governor/resource-governor`](https://learn.microsoft.com/sql/relational-databases/resource-governor/resource-governor)。


    ### 维护索引


    不幸的是，SQL 的索引不会自我维护，它们偶尔确实需要维护。公平地说，索引维护（具体指重建或重组）没有一个单一的答案。我见过很多客户在非必要时过于频繁地执行重建或重组。同样，也有很多时候这些操作可以提升性能。你可以考虑查看我们关于索引碎片的文档，作为索引维护有意义的一个原因：[`https://learn.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes`](https://learn.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes)。


    **注意**

    > 我并没有说出全部真相。对于 Azure SQL，这里有一个解决方案可以帮助决定是创建还是删除索引。但我不会提前透露太多。这个故事的结局在本章末尾。


    SQL Server 的索引偶尔需要重组，有时需要重建。Azure SQL 支持 SQL Server 中用于重组和重建索引的所有选项，包括联机和可恢复索引操作。


    联机和可恢复索引操作对于维护最大的应用程序可用性极为重要。阅读有关这些功能的全部信息，请访问 [`https://learn.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations`](https://learn.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations)。


    ### 维护统计信息


    正确的统计信息是查询性能的生命线。SQL Server 提供了基于数据库修改自动保持统计信息最新的选项，Azure SQL 支持所有这些选项。我们的文档对统计信息如何用于查询性能有非常详细的解释：[`https://learn.microsoft.com/sql/relational-databases/statistics/statistics`](https://learn.microsoft.com/sql/relational-databases/statistics/statistics)。


    自动统计信息更新的一个有趣方面是我们专门为 Azure SQL 引入的一个数据库范围配置，旨在帮助提高应用程序可用性。你可以从我的同事 Dimitri Furman
    的博客文章中阅读关于此功能的详细信息：[`https://techcommunity.microsoft.com/t5/azure-sql-database/improving-concurrency-of-asynchronous-statistics-update/ba-p/1441687`](https://techcommunity.microsoft.com/t5/azure-sql-database/improving-concurrency-of-asynchronous-statistics-update/ba-p/1441687)。


    ## 监控与故障排除性能


    如果你想确保 SQL 应用程序获得最佳性能，你需要学习如何监控和故障排除性能场景。Azure SQL 随附了 SQL Server 的性能工具和功能来协助你完成此任务。这包括来自
    Azure 生态系统的工具以及驱动 Azure SQL 的 SQL Server 引擎内置的功能。


    在本章的这一部分，你将不仅学习到监控功能，还将学习如何将它们应用于 Azure SQL 的性能场景，包括示例。


    ### 监控工具与功能


    Azure 提供了与 SQL 集成但位于 Azure 生态系统之外的工具，称为 Azure Monitor。


    你习惯于使用动态管理视图（`DMV`）和扩展事件吗？Azure SQL 拥有你需要的功能。你需要调试查询计划吗？Azure SQL 拥有 SQL Server
    的所有功能，包括轻量级查询分析和 `showplan` 详细信息。


    查询存储已成为性能调优的基石，它在 Azure SQL 中默认是开启的。Azure 门户包含可视化效果，例如查询性能见解，无需像 SSMS 这样的工具即可查看查询存储数据。


    此外，自从本书第一版以来，出现了两个突破性的新工具，可以显著节省你的时间和精力：Database Watcher 和 Azure SQL Database
    中的 Microsoft Copilot 技能。


    所有这些汇聚成一套强大的工具和功能，帮助你监控和故障排除 Azure SQL 的性能。'
- fmt: '# Azure SQL 性能监控与诊断工具


    Azure SQL 提供了丰富的内置工具，用于监控、诊断和优化性能，这些工具与 SQL Server 中的工具相似，但也存在一些云环境特有的差异。


    ## Azure Monitor


    `Azure Monitor` 是 Azure 生态系统的一部分，`Azure SQL` 已与之集成，以支持指标、警报和日志功能。`Azure Monitor`
    数据可在 `Azure 门户` 中可视化，或通过应用程序通过 `Azure Event Hub` 或 `API` 访问。`Azure Monitor` 重要性的一个例子是，可以像使用
    `Windows 性能监视器` 一样，在 `SQL Server` 工具之外访问 `Azure SQL` 的资源使用指标。在 `Azure 门户` 中，通过
    [`https://learn.microsoft.com/azure/azure-sql/database/monitor-tune-overview?view=azuresql#monitoring-and-tuning-capabilities-in-the-azure-portal`](https://learn.microsoft.com/azure/azure-sql/database/monitor-tune-overview?view=azuresql#monitoring-and-tuning-capabilities-in-the-azure-portal)
    阅读有关如何将 `Azure Monitor` 与 `Azure SQL` 配合使用的更多信息。


    ## 动态管理视图 (DMVs)


    `Azure SQL` 提供了与 `SQL Server` 相同的 `DMV` 基础结构，但存在一些差异。`DMV` 是性能监控的关键方面，因为您可以使用标准的
    `T-SQL` 查询来查看关键的 `SQL Server` 性能数据。诸如活动查询、资源使用情况、查询计划和资源等待类型等信息都可以通过 `DMV` 获得。本章后续将详细介绍
    `Azure SQL` 中的 `DMV`。


    ## 扩展事件 (XEvent)


    `Azure SQL` 提供了与 `SQL Server` 相同的 `Extended Events` 基础结构。`Extended Events` 是一种跟踪
    `SQL Server` 内关键执行事件的方法，它为 `Azure SQL` 提供支持。出于性能考虑，`Extended Events` 允许您跟踪单个查询的执行情况。本章后续将详细介绍
    `Azure SQL` 中的 `Extended Events`。


    ## 轻量级查询分析


    `轻量级查询分析` 是一种检查活动查询的查询计划和运行状态的功能。这是在长时间运行的语句执行时调试其查询性能的关键功能。与使用像 `Extended Events`
    这样的工具来跟踪查询性能相比，此功能减少了您解决性能问题所需的时间。`轻量级查询分析` 通过 `DMV` 访问，并且对于 `Azure SQL` 默认是开启的，就像
    `SQL Server 2022` 一样。在 [`https://learn.microsoft.com/sql/relational-databases/performance/query-profiling-infrastructure?view=sql-server-ver15#lwp`](https://learn.microsoft.com/sql/relational-databases/performance/query-profiling-infrastructure?view=sql-server-ver15#lwp)
    阅读有关 `轻量级查询分析` 的更多信息。


    ## 查询计划调试


    在某些情况下，您可能需要关于单个 `T-SQL` 语句查询性能的更多详细信息。诸如 `SHOWPLAN` 和 `STATISTICS` 之类的 `T-SQL
    SET` 语句可以提供这些详细信息，并且在 `Azure SQL` 中与在 `SQL Server` 中一样完全受支持。一个使用 `SET` 语句进行查询计划调试的好例子可以在
    [`https://learn.microsoft.com/sql/t-sql/statements/set-statistics-profile-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/set-statistics-profile-transact-sql)
    找到。此外，以图形或 `XML` 格式查看计划总是很有帮助的，并且在 `Azure SQL` 中完全有效。在 [`https://learn.microsoft.com/sql/relational-databases/performance/display-the-estimated-execution-plan`](https://learn.microsoft.com/sql/relational-databases/performance/display-the-estimated-execution-plan)
    了解更多信息。


    ## 查询存储


    `查询存储` 是存储在用户数据库中的查询执行性能的历史记录。对于 `Azure SQL`，`查询存储` 默认是开启的，并用于提供诸如 `自动计划修正` 和
    `自动调优` 之类的功能。`SQL Server Management Studio (SSMS)` 中的 `查询存储` 报告适用于 `Azure SQL`。这些报告可用于查找资源消耗最高的查询，包括查询计划差异和顶级等待类型，以分析资源等待场景。


    `查询存储` 现在也用于某些 `智能查询处理 (IQP)` 场景中，以存储用于提高性能的反馈信息。


    本章我将向您展示一个在 `Azure SQL` 中使用 `查询存储` 的示例。如果您从未见过或使用过 `查询存储`，可以从阅读 [`https://learn.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store`](https://learn.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store)
    开始。


    ## Azure 门户中的性能可视化


    对于 `Azure SQL 数据库`，我们已通过可视化效果将 `查询存储` 性能信息集成到 `Azure 门户` 中。这样，您就可以使用一个名为 **查询性能见解**
    的选项，在 `Azure 门户` 中看到与使用 `SSMS` 等客户端工具查看 `查询存储` 时相同的一些信息。本章稍后我将向您展示在门户中使用这些可视化效果的示例。现在，要开始使用它，请查阅我们的文档：[`https://learn.microsoft.com/azure/azure-sql/database/query-performance-insight-use`](https://learn.microsoft.com/azure/azure-sql/database/query-performance-insight-use)。


    ## 数据库监视器


    坦率地说，我们在 `Azure` 中曾多次尝试提供一种监控解决方案，以提供丰富且可视化的体验来监控 `Azure SQL`，但都没有成功。


    我相信 `数据库监视器`，这个用于监控 `SQL` 的新云服务（在撰写本书时处于预览版），将会有所不同，原因如下：


    *   该服务与 `SQL` 是分离的，它通过 `DMV` 和 `查询存储` 等元数据使用内置遥测，并将信息持久化存储在 `Kusto` 群集中。

    *   该服务默认附带一组丰富的可视化效果，几乎可以提供 `SQL` 专业人员所需的任何内容。这就是为什么我称它为“云中的 `perfmon`”。

    *   该服务允许您跨多个 `Azure SQL 托管实例` 和 `数据库` 收集数据。并且一些可视化效果允许您跨这些对象查看。例如，您可以查看跨数据库（实际上是跨
    `查询存储`）的顶级查询。

    *   该服务的发布由我的同事 `Dimitri Furman` 负责管理，我认为他是微软内部 `SQL` 领域的顶级专家之一。在本章中，您将看到它的卓越之处。


    图 7-1 展示了 `数据库监视器` 的整体架构。


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig1_HTML.jpg)


    图 7-1

    数据库监视器架构


    该服务连接到目标（即您的 `Azure SQL 托管实例` 和 `数据库`）。它从这些目标收集数据并存储在 `Kusto` 群集中。该服务附带了一些非常丰富的可视化效果，但您也可以使用
    `K-SQL` 或 `T-SQL` 来查询该群集。此外，您可以将遥测数据存储在 `Microsoft Fabric` 实时分析中，以构建像 `Power BI`
    报表这样的解决方案。


    您可以在 [`https://aka.ms/dbwatcher`](https://aka.ms/dbwatcher) 开始使用 `数据库监视器`，也可以在安娜·霍夫曼（`Anna
    Hoffman`）著名的 `Data Exposed` 节目中看到她和我对此的讨论：[`https://learn.microsoft.com/shows/data-exposed/database-watcher-your-perfmon-in-the-cloud-data-exposed`](https://learn.microsoft.com/shows/data-exposed/database-watcher-your-perfmon-in-the-cloud-data-exposed)。'
  raw: '#### Azure Monitor


    Azure Monitor is part of the Azure ecosystem, and Azure SQL is integrated to support
    Azure Metrics, Alerts, and Logs. Azure Monitor data can be visualized in the Azure
    Portal or accessed by applications through Azure Event Hub or APIs. An example
    of why Azure Monitor is important is accessing resource usage metrics for Azure
    SQL outside of SQL Server tools much like Windows Performance Monitor. Read more
    about how to use Azure Monitor with Azure SQL in the Azure portal at [`https://learn.microsoft.com/azure/azure-sql/database/monitor-tune-overview?view=azuresql#monitoring-and-tuning-capabilities-in-the-azure-portal`](https://learn.microsoft.com/azure/azure-sql/database/monitor-tune-overview?view=azuresql#monitoring-and-tuning-capabilities-in-the-azure-portal).


    #### Dynamic Management Views (DMVs)


    Azure SQL provides the same DMV infrastructure as with SQL Server with a few differences.
    DMVs are a crucial aspect to performance monitoring since you can view key SQL
    Server performance data using standard T-SQL queries. Information such as active
    queries, resource usage, query plans, and resource wait types are available with
    DMVs. Learn more details about DMVs with Azure SQL later in this chapter.


    #### Extended Events (XEvent)


    Azure SQL provides the same Extended Events infrastructure as with SQL Server.
    Extended Events is a method to trace key events of execution within SQL Server
    that powers Azure SQL. For performance, Extended Events allow you to trace the
    execution of individual queries. Learn more details about Extended Events with
    Azure SQL later in this chapter.


    #### Lightweight Query Profiling


    Lightweight Query Profiling is a capability to examine the query plan and running
    state of an active query. This is a key feature to debug query performance for
    long-running statements as they are running. This capability cuts down the time
    for you to solve performance problems vs. using tools like Extended Events to
    trace query performance. Lightweight Query Profiling is accessed through DMVs
    and is on by default for Azure SQL just like SQL Server 2022\. Read more about
    Lightweight Query Profiling at [`https://learn.microsoft.com/sql/relational-databases/performance/query-profiling-infrastructure?view=sql-server-ver15#lwp`](https://learn.microsoft.com/sql/relational-databases/performance/query-profiling-infrastructure?view=sql-server-ver15#lwp).


    #### Query Plan Debugging


    In some situations, you may need additional details about query performance for
    an individual T-SQL statement. T-SQL SET statements such as SHOWPLAN and STATISTICS
    can provide these details and are fully supported for Azure SQL as they are for
    SQL Server. A good example of using SET statements for query plan debugging can
    be found at [`https://learn.microsoft.com/sql/t-sql/statements/set-statistics-profile-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/set-statistics-profile-transact-sql).
    In addition, looking at plans in a graphical or XML format is always helpful and
    completely works for Azure SQL. Learn more at [`https://learn.microsoft.com/sql/relational-databases/performance/display-the-estimated-execution-plan`](https://learn.microsoft.com/sql/relational-databases/performance/display-the-estimated-execution-plan).


    #### Query Store


    Query Store is a historical record of performance execution for queries stored
    in the user database. Query Store is on by default for Azure SQL and is used to
    provide capabilities such as Automatic Plan Correction and Automatic Tuning. SQL
    Server Management Studio (SSMS) reports for Query Store are available for Azure
    SQL. These reports can be used to find top resource consuming queries including
    query plan differences and top wait types to look at resource wait scenarios.


    Query Store is also now used in certain Intelligent Query Processing (IQP) scenarios
    to store feedback information used to improve performance.


    I will show you an example of using the Query Store in this chapter with Azure
    SQL. If you have never seen or used Query Store, start reading at [`https://learn.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store`](https://learn.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store).


    #### Performance Visualization in Azure Portal


    For Azure SQL Database, we have integrated Query Store performance information
    into the Azure Portal through visualizations. This way, you can see some of the
    same information for Query Store as you would with a client tool like SSMS by
    using the Azure Portal with an option called **Query Performance Insight**. I’ll
    show you an example of using these visuals in the portal later in the chapter.
    For now, to get started using it, check out our documentation at [`https://learn.microsoft.com/azure/azure-sql/database/query-performance-insight-use`](https://learn.microsoft.com/azure/azure-sql/database/query-performance-insight-use).


    #### Database Watcher


    In all honesty, we have made a few attempts at a monitoring solution in Azure
    that provides rich and visual experiences to monitor Azure SQL, but none of them
    have stuck.


    I believe Database Watcher, a new cloud service for monitoring SQL, will be different
    (in preview at the time of the writing of this book) because of the following:


    *   The service is separate from SQL using built-in telemetry though metadata
    like DMVs and Query Store and persisting the information a Kusto cluster.


    *   The service comes by default with a rich set of visualizations that provide
    just about anything a SQL professional will need. This is why I call it my “perfmon
    in the cloud.”


    *   The service allows you to collect data across multiple Azure SQL Managed Instances
    and Databases. And some of the visualizations allow you to look across these objects.
    For example, you can see top queries across database (effectively across Query
    Stores).


    *   The release of this service was managed by my colleague Dimitri Furman whom
    I consider one of the top experts for SQL within Microsoft. And you will see its
    qualities shine in this chapter.


    Figure [7-1](#496204_2_En_7_Chapter.xhtml#Fig1) shows the overall architecture
    of Database Watcher.


    ![](images/496204_2_En_7_Chapter/496204_2_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Database Watcher architecture


    The service connects to targets, which are your Azure SQL Managed Instances and
    Databases. It collects data from these targets and stores in a Kusto cluster.
    The service comes with some very rich visualizations, but you can also use K-SQL
    or T-SQL to query the cluster. In addition, you can store the telemetry in Microsoft
    Fabric real-time analytics to build solutions like Power BI reports.


    You can get started with Database Watcher at [`https://aka.ms/dbwatcher`](https://aka.ms/dbwatcher)
    but also see Anna Hoffman and I talk about this at one of her famous Data Exposed
    shows at [`https://learn.microsoft.com/shows/data-exposed/database-watcher-your-perfmon-in-the-cloud-data-exposed`](https://learn.microsoft.com/shows/data-exposed/database-watcher-your-perfmon-in-the-cloud-data-exposed).'
  trans: '

    # Azure SQL 性能监控与诊断工具


    Azure SQL 提供了丰富的内置工具，用于监控、诊断和优化性能，这些工具与 SQL Server 中的工具相似，但也存在一些云环境特有的差异。


    ## Azure Monitor


    `Azure Monitor` 是 Azure 生态系统的一部分，`Azure SQL` 已与之集成，以支持指标、警报和日志功能。`Azure Monitor`
    数据可在 `Azure 门户` 中可视化，或通过应用程序通过 `Azure Event Hub` 或 `API` 访问。`Azure Monitor` 重要性的一个例子是，可以像使用
    `Windows 性能监视器` 一样，在 `SQL Server` 工具之外访问 `Azure SQL` 的资源使用指标。在 `Azure 门户` 中，通过
    [`https://learn.microsoft.com/azure/azure-sql/database/monitor-tune-overview?view=azuresql#monitoring-and-tuning-capabilities-in-the-azure-portal`](https://learn.microsoft.com/azure/azure-sql/database/monitor-tune-overview?view=azuresql#monitoring-and-tuning-capabilities-in-the-azure-portal)
    阅读有关如何将 `Azure Monitor` 与 `Azure SQL` 配合使用的更多信息。


    ## 动态管理视图 (DMVs)


    `Azure SQL` 提供了与 `SQL Server` 相同的 `DMV` 基础结构，但存在一些差异。`DMV` 是性能监控的关键方面，因为您可以使用标准的
    `T-SQL` 查询来查看关键的 `SQL Server` 性能数据。诸如活动查询、资源使用情况、查询计划和资源等待类型等信息都可以通过 `DMV` 获得。本章后续将详细介绍
    `Azure SQL` 中的 `DMV`。


    ## 扩展事件 (XEvent)


    `Azure SQL` 提供了与 `SQL Server` 相同的 `Extended Events` 基础结构。`Extended Events` 是一种跟踪
    `SQL Server` 内关键执行事件的方法，它为 `Azure SQL` 提供支持。出于性能考虑，`Extended Events` 允许您跟踪单个查询的执行情况。本章后续将详细介绍
    `Azure SQL` 中的 `Extended Events`。


    ## 轻量级查询分析


    `轻量级查询分析` 是一种检查活动查询的查询计划和运行状态的功能。这是在长时间运行的语句执行时调试其查询性能的关键功能。与使用像 `Extended Events`
    这样的工具来跟踪查询性能相比，此功能减少了您解决性能问题所需的时间。`轻量级查询分析` 通过 `DMV` 访问，并且对于 `Azure SQL` 默认是开启的，就像
    `SQL Server 2022` 一样。在 [`https://learn.microsoft.com/sql/relational-databases/performance/query-profiling-infrastructure?view=sql-server-ver15#lwp`](https://learn.microsoft.com/sql/relational-databases/performance/query-profiling-infrastructure?view=sql-server-ver15#lwp)
    阅读有关 `轻量级查询分析` 的更多信息。


    ## 查询计划调试


    在某些情况下，您可能需要关于单个 `T-SQL` 语句查询性能的更多详细信息。诸如 `SHOWPLAN` 和 `STATISTICS` 之类的 `T-SQL
    SET` 语句可以提供这些详细信息，并且在 `Azure SQL` 中与在 `SQL Server` 中一样完全受支持。一个使用 `SET` 语句进行查询计划调试的好例子可以在
    [`https://learn.microsoft.com/sql/t-sql/statements/set-statistics-profile-transact-sql`](https://learn.microsoft.com/sql/t-sql/statements/set-statistics-profile-transact-sql)
    找到。此外，以图形或 `XML` 格式查看计划总是很有帮助的，并且在 `Azure SQL` 中完全有效。在 [`https://learn.microsoft.com/sql/relational-databases/performance/display-the-estimated-execution-plan`](https://learn.microsoft.com/sql/relational-databases/performance/display-the-estimated-execution-plan)
    了解更多信息。


    ## 查询存储


    `查询存储` 是存储在用户数据库中的查询执行性能的历史记录。对于 `Azure SQL`，`查询存储` 默认是开启的，并用于提供诸如 `自动计划修正` 和
    `自动调优` 之类的功能。`SQL Server Management Studio (SSMS)` 中的 `查询存储` 报告适用于 `Azure SQL`。这些报告可用于查找资源消耗最高的查询，包括查询计划差异和顶级等待类型，以分析资源等待场景。


    `查询存储` 现在也用于某些 `智能查询处理 (IQP)` 场景中，以存储用于提高性能的反馈信息。


    本章我将向您展示一个在 `Azure SQL` 中使用 `查询存储` 的示例。如果您从未见过或使用过 `查询存储`，可以从阅读 [`https://learn.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store`](https://learn.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store)
    开始。


    ## Azure 门户中的性能可视化


    对于 `Azure SQL 数据库`，我们已通过可视化效果将 `查询存储` 性能信息集成到 `Azure 门户` 中。这样，您就可以使用一个名为 **查询性能见解**
    的选项，在 `Azure 门户` 中看到与使用 `SSMS` 等客户端工具查看 `查询存储` 时相同的一些信息。本章稍后我将向您展示在门户中使用这些可视化效果的示例。现在，要开始使用它，请查阅我们的文档：[`https://learn.microsoft.com/azure/azure-sql/database/query-performance-insight-use`](https://learn.microsoft.com/azure/azure-sql/database/query-performance-insight-use)。


    ## 数据库监视器


    坦率地说，我们在 `Azure` 中曾多次尝试提供一种监控解决方案，以提供丰富且可视化的体验来监控 `Azure SQL`，但都没有成功。


    我相信 `数据库监视器`，这个用于监控 `SQL` 的新云服务（在撰写本书时处于预览版），将会有所不同，原因如下：


    *   该服务与 `SQL` 是分离的，它通过 `DMV` 和 `查询存储` 等元数据使用内置遥测，并将信息持久化存储在 `Kusto` 群集中。

    *   该服务默认附带一组丰富的可视化效果，几乎可以提供 `SQL` 专业人员所需的任何内容。这就是为什么我称它为“云中的 `perfmon`”。

    *   该服务允许您跨多个 `Azure SQL 托管实例` 和 `数据库` 收集数据。并且一些可视化效果允许您跨这些对象查看。例如，您可以查看跨数据库（实际上是跨
    `查询存储`）的顶级查询。

    *   该服务的发布由我的同事 `Dimitri Furman` 负责管理，我认为他是微软内部 `SQL` 领域的顶级专家之一。在本章中，您将看到它的卓越之处。


    图 7-1 展示了 `数据库监视器` 的整体架构。


    ![](img/496204_2_En_7_Fig1_HTML.jpg)


    图 7-1

    数据库监视器架构


    该服务连接到目标（即您的 `Azure SQL 托管实例` 和 `数据库`）。它从这些目标收集数据并存储在 `Kusto` 群集中。该服务附带了一些非常丰富的可视化效果，但您也可以使用
    `K-SQL` 或 `T-SQL` 来查询该群集。此外，您可以将遥测数据存储在 `Microsoft Fabric` 实时分析中，以构建像 `Power BI`
    报表这样的解决方案。


    您可以在 [`https://aka.ms/dbwatcher`](https://aka.ms/dbwatcher) 开始使用 `数据库监视器`，也可以在安娜·霍夫曼（`Anna
    Hoffman`）著名的 `Data Exposed` 节目中看到她和我对此的讨论：[`https://learn.microsoft.com/shows/data-exposed/database-watcher-your-perfmon-in-the-cloud-data-exposed`](https://learn.microsoft.com/shows/data-exposed/database-watcher-your-perfmon-in-the-cloud-data-exposed)。

