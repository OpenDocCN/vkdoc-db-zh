  当修改溢出列时，更新操作也会有开销。SQL Server 需要为每个受影响的列创建新的行对象。



  同样地，数据的删除操作要求 SQL Server 删除所有内部表中的行。`表 6-3` 显示了从两张表中删除所有数据的 `DELETE` 语句的执行时间。


