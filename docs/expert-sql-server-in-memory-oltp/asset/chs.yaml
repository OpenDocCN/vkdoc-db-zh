  *图 12-5. “内存优化对象的内存使用情况”报告输出*\n\n\n\n### 监控内存 OLTP 事务\n\n`sys.dm_db_xtp_transactions`\
  \ 视图提供关于系统中活动内存 OLTP 事务的信息。以下是该视图中最为重要的列：\n*   `xtp_transaction_id` 是内存 OLTP 事务管理器中事务的内部\
  \ ID。\n*   `transaction_id` 是系统中的事务 ID。您可以将其用于与其他事务管理视图（例如 `sys.dm_tran_active_transactions`）进行联接。仅涉及内存\
  \ OLTP 的事务，例如由本地编译存储过程启动的事务，其 `transaction_id` 值返回为 0。\n*   `session_id` 指示启动事务的会话。\n\
  *   `begin_tsn` 和 `end_tsn` 指示事务时间戳。\n*   `state` 和 `state_desc` 指示事务的状态。可能的值为 `(0)-ACTIVE`（活动）、`(1)-COMMITTED`（已提交）、`(2)-ABORTED`（已中止）和\
  \ `(3)-VALIDATING`（正在验证）。\n*   `result` 和 `result_desc` 指示事务的结果。可能的值为 `(0)-IN PROGRESS`（进行中）；`(1)-SUCCESS`（成功）；`(2)-ERROR`（错误）；`(3)-COMMIT\
  \ DEPENDENCY`（提交依赖）；`(4)-VALIDATION FAILED (RR)`（验证失败（RR）），表示违反可重复读取规则；`(5)-VALIDATION\
  \ FAILED (SR)`（验证失败（SR）），表示违反可序列化规则；以及 `(6)-ROLLBACK`（回滚）。\n*   `read_set_row_count`、`write_set_row_count`\
  \ 和 `scan_set_row_count` 提供关于事务的读取集、写入集和扫描集大小的信息。\n*   `commit_dependency_count`\
  \ 指示该依赖事务已接受的提交数量。\n\n您可以使用 `sys.dm_db_xtp_transactions` 视图来检测系统中运行时间长和孤立的事务。您可能还记得，这些事务会延迟垃圾回收过程并导致内存不足错误。\n\
  \n清单 12-8 展示了一个查询，该查询返回系统中五个最旧的活动内存 OLTP 事务的信息。\n\n```sql\nselect top 5\nt.session_id\n\
  ,t.transaction_id\n,t.begin_tsn\n,t.end_tsn\n,t.state_desc\n,t.result_desc\n,substring(\n\
  qt.text\n,er.statement_start_offset / 2 + 1\n,(case er.statement_end_offset\nwhen\
  \ -1 then datalength(qt.text)\nelse er.statement_end_offset\nend - er.statement_start_offset\n\
  ) / 2 +1\n) as SQL\nfrom\nsys.dm_db_xtp_transactions t\nleft outer join sys.dm_exec_requests\
  \ er on\nt.session_id = er.session_id\nouter apply\nsys.dm_exec_sql_text(er.sql_handle)\
  \ qt\nwhere\nt.state in (0,3) /* ACTIVE/VALIDATING */\norder by\nt.begin_tsn\n```\n\
  清单 12-8.\n获取关于五个最旧的活动内存 OLTP 事务的信息\n\n图 12-6 说明了该查询的输出结果。\n\n![A340879_2_En_12_Fig6_HTML.jpg](img/A340879_2_En_12_Fig6_HTML.jpg)\n\
  \n图 12-6.\n系统中五个最旧的活动内存 OLTP 事务\n\n注意\n\n您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-transactions-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-transactions-transact-sql)\
  \ 阅读更多关于 `sys.dm_db_xtp_transactions` 视图的信息。\n\n### 为本地编译存储过程收集执行统计信息\n\n在查询互操作模式下，当执行计划被缓存时，SQL\
  \ Server 会收集访问内存优化表的语句的执行统计信息。然而，由于会引入性能影响，它不会收集本地编译模块的执行统计信息。您可以使用 `sys.sp_xtp_control_proc_exec_stats`\
  \ 在模块级别启用此类收集，并使用系统存储过程 `sys.sp_xtp_control_query_exec_stats` 在语句级别启用。\n\n这两个过程都接受一个布尔参数\
  \ `@new_collection_value`，该参数指示是启用还是禁用收集。此外，`sys.sp_xtp_control_query_exec_stats`\
  \ 允许您提供 `@database_id` 和 `@xtp_object_id` 值来指定要监控的模块。同样值得注意的是，SQL Server 不会持久化收集设置，您需要在每次\
  \ SQL Server 重启后重新启用统计信息收集。\n\n重要提示\n\n收集执行统计信息会降低系统的性能。除非正在进行故障排除，否则请勿收集执行统计信息。此外，考虑将收集限制在特定的本地编译模块，以减少对系统的性能影响。\n\
  \n当统计信息收集完毕后，您可以通过 `sys.dm_exec_procedure_stats`、`sys.dm_exec_function_stats` 和\
  \ `sys.dm_exec_query_stats` 视图访问它们。\n\n清单 12-9 展示了使用 `sys.dm_exec_procedure_stats`\
  \ 视图返回存储过程执行统计信息的代码。该代码未将输出限制为本地编译存储过程；但是，您可以通过联接 `sys.dm_exec_procedure_stats`\
  \ 和 `sys.sql_modules` 视图并按 `uses_native_compliation = 1` 值进行筛选来实现这一点。\n\n```sql\n\
  select\nobject_name(ps.object_id) as [Proc Name]\n,p.query_plan\n,ps.execution_count\
  \ as [Exec Cnt]\n,ps.total_worker_time as [Total CPU]\n,convert(int,ps.total_worker_time\
  \ / ps.execution_count)\nas [Avg CPU] -- in Microseconds\n,ps.total_elapsed_time\
  \ as [Total Elps]\n,convert(int,ps.total_elapsed_time / ps.execution_count)\nas\
  \ [Avg Elps] -- in Microseconds\n,ps.cached_time as [Cached]\n,ps.last_execution_time\
  \ as [Last Exec]\n,ps.sql_handle\n,ps.plan_handle\n,ps.total_logical_reads as [Reads]\n\
  ,ps.total_logical_writes as [Writes]\nfrom\nsys.dm_exec_procedure_stats ps cross\
  \ apply\nsys.dm_exec_query_plan(ps.plan_handle) p\norder by\n[Avg CPU] desc\n```\n\
  清单 12-9.\n分析存储过程执行统计信息\n\n图 12-7 说明了清单 12-9 中代码的输出。如您所见，在 SQL Server 2016 中，`sql_handle`\
  \ 和 `plan_handle` 列都被填充，并且可用于获取存储过程文本和执行计划。同样值得注意的是，没有提供与 I/O 相关的统计信息。本地编译模块仅与内存优化表一起工作，因此不涉及\
  \ I/O。\n\n![A340879_2_En_12_Fig7_HTML.jpg](img/A340879_2_En_12_Fig7_HTML.jpg)\n\n\
  图 12-7.\n来自 `sys.dm_exec_procedure_stats` 视图的数据\n\n清单 12-10 展示了使用 `sys.dm_exec_query_stats`\
  \ 视图获取单个语句执行统计信息的代码。\n\n\n\n"
- "# 代码清单 12-10. 分析存储过程语句执行统计信息\n\n```sql\nselect\nsubstring(qt.text\n,(qs.statement_start_offset/2)\
  \ + 1\n,(case qs.statement_end_offset\nwhen -1 then datalength(qt.text)\nelse qs.statement_end_offset\n\
  end - qs.statement_start_offset) / 2 + 1\n) as SQL\n,p.query_plan\n,qs.execution_count\
  \ as [执行次数]\n,qs.total_worker_time as [总 CPU 时间]\n,convert(int,qs.total_worker_time\
  \ / qs.execution_count)\nas [平均 CPU 时间] -- 单位：微秒\n,total_elapsed_time as [总耗时]\n\
  ,convert(int,qs.total_elapsed_time / qs.execution_count)\nas [平均耗时] -- 单位：微秒\n,qs.creation_time\
  \ as [缓存时间]\n,last_execution_time as [最后执行时间]\n,qs.plan_handle\n,qs.total_logical_reads\
  \ as [逻辑读取次数]\n,qs.total_logical_writes as [逻辑写入次数]\nfrom\nsys.dm_exec_query_stats\
  \ qs\ncross apply sys.dm_exec_sql_text(qs.sql_handle) qt\ncross apply sys.dm_exec_query_plan(qs.plan_handle)\
  \ p\nwhere -- 对于本机编译存储过程，此列为空\nqs.plan_generation_num is null\norder by\n[平均 CPU\
  \ 时间] desc\n```\n\n## 数据来自 sys.dm_exec_query_stats 视图\n\n图 12-8 展示了代码清单 12-10 的输出结果。\n\
  \n![A340879_2_En_12_Fig8_HTML.jpg](img/A340879_2_En_12_Fig8_HTML.jpg)\n**图 12-8.**\
  \ 来自 `sys.dm_exec_query_stats` 视图的数据\n\n> **注意**\n> 你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sys-sp-xtp-control-proc-exec-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sys-sp-xtp-control-proc-exec-stats-transact-sql)\
  \ 阅读更多关于 `sys.sp_xtp_control_proc_exec_stats` 存储过程的信息。关于 `sys.sp_xtp_control_query_exec_stats`\
  \ 存储过程的更多信息可在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sys-sp-xtp-control-query-exec-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sys-sp-xtp-control-query-exec-stats-transact-sql)\
  \ 获取。\n\n最后，值得注意的是，无论是 `DBCC FREEPROCCACHE` 命令还是 `ALTER DATABASE SCOPED CONFIGURATION\
  \ CLEAR PROCEDURE_CACHE` 命令，都不会从计划缓存中移除本机编译模块的执行统计信息。但是，当模块被重新编译时，统计信息会被移除。\n\n\
  ## 内存 OLTP 与查询存储集成\n\n查询存储是 SQL Server 2016 的新组件，用于收集系统中查询的执行计划和运行时统计信息。这些统计信息持久化在数据库中，在数据库重启或故障转移后依然存在，这与我刚才讨论的基于计划缓存的执行统计信息不同。\n\
  \n与基于计划缓存的执行统计信息类似，查询存储默认不收集本机编译模块的执行统计信息。你需要使用 `sys.sp_xtp_control_query_exec_stats`\
  \ 系统存储过程来启用它们。请考虑这带来的性能开销，除非正在排查性能问题，否则不要启用它们。\n\n图 12-9 展示了一个查询存储报告，该报告用于处理来自本机编译存储过程的语句。如你所见，Management\
  \ Studio 提供了一套强大且便捷的工具，极大地简化了性能故障排查和调优。\n\n![A340879_2_En_12_Fig9_HTML.jpg](img/A340879_2_En_12_Fig9_HTML.jpg)\n\
  **图 12-9.** 查询存储中的“消耗资源最多的查询”报告\n\n> **注意**\n> 查询存储的覆盖范围超出了本书的讨论范围。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store)\
  \ 以及我的《Pro SQL Server Internals》一书中阅读更多相关信息。\n\n## 元数据更改与增强\n\n内存 OLTP 在目录和数据管理视图中引入了大量更改。\n\
  \n### 目录视图\n\nSQL Server 2016 中有两个与内存 OLTP 相关的目录视图。\n\n#### sys.hash_indexes\n\n\
  顾名思义，`sys.hash_indexes` 视图提供了数据库中定义的哈希索引的信息。它继承自 `sys.indexes` 视图并具有相同的列，额外增加了一个名为\
  \ `bucket_count` 的列。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-hash-indexes-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-hash-indexes-transact-sql)\
  \ 阅读关于此视图的信息。\n\n#### sys.memory_optimized_tables_internal_attributes\n\n正如你已经知道的，每个内存优化表可能包含额外的内部表来存储行外列数据、列存储索引内部结构以及少数其他对象。`sys.memory_optimized_tables_internal_attributes`\
  \ 目录视图提供了关于这些内部表的信息，它包含以下列：\n\n*   `object_id` 是用户表的 ID。对于属于该用户表的所有内部表，此 ID 相同。当你更改表时，`object_id`\
  \ 值不会改变。\n*   `xtp_object_id` 是内部表的内部对象 ID。在表更改期间重新创建表对象时，此值可能会改变。\n*   `minor_id`\
  \ 在内部表存储行外列数据时，提供表列的 `column_id` 值。在其他情况下，其值为 0。\n*   `type` 和 `type_description`\
  \ 列指示内部表的类型。可能值如下：\n    *   `(0)`: `DELETED_ROWS_TABLE` 是列存储索引中的删除位图。\n    *   `(1)`:\
  \ `USER_TABLE` 是存储行内数据的主表结构。\n    *   `(2)`: `DICTIONARIES_TABLE` 是列存储索引的字典。\n \
  \   *   `(3)`: `SEGMENTS_TABLE` 是列存储索引的压缩段。\n    *   `(4)`: `ROW_GROUPS_INFO_TABLE`\
  \ 是列存储索引中压缩行组的元数据。\n    *   `(5)`: `INTERNAL_OFF_ROW_DATA_TABLE` 是存储行外列数据的表。正如我已提到的，`minor_id`\
  \ 提供行外列的 `column_id` 值，可用于与 `sys.columns` 目录视图进行联接。\n    *   `(252)`: `INTERNAL_TEMPORAL_HISTORY_TABLE`\
  \ 是一个内存缓冲区，包含基于磁盘的历史表的热尾部。历史行首先插入到此内部表中，然后异步移动到基于磁盘的历史表。\n\n当你分析系统中内存优化表的内存消耗时，可以将\
  \ `sys.memory_optimized_tables_internal_attributes` 与 `sys.dm_db_xtp_memory_consumers`\
  \ 视图结合使用。你在本书中已经多次看到它的实际应用。\n\n你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-memory-optimized-tables-internal-attributes-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-memory-optimized-tables-internal-attributes-transact-sql)\
  \ 阅读更多关于 `sys.memory_optimized_tables_internal_attributes` 视图的信息。\n\n\n#### 其他目录视图的变更\n\
  \n其他目录视图的变更包括以下内容：\n\n*   `sys.tables` 视图新增了三列。`is_memory_optimized` 列指示表是否为内存优化表。`durability`\
  \ 和 `durability_desc` 列指示内存优化表的持久性模式。其值为 `(0)-SCHEMA_AND_DATA` 和 `(1)-SCHEMA_ONLY`。\n\
  *   `sys.indexes` 视图的 `type` 和 `type_description` 列中新增了一个可能的值，例如 `(7)-NONCLUSTERED\
  \ HASH`。非聚集 Bw-Tree 索引使用的值为 `(2)-NONCLUSTERED`，与定义在基于磁盘的表上的常规非聚集 B-Tree 索引相同。聚集列存储索引使用的值为\
  \ `(5) – CLUSTERED COLUMNSTORE`，并且 `index_id` 值为 1。\n*   `sys.sql_modules` 和 `sys.all_sql_modules`\
  \ 视图新增了一个名为 `uses_native_compilation` 的列。\n*   `sys.table_types` 视图新增了一个名为 `is_memory_optimized`\
  \ 的列，用于指示某个类型是否代表内存优化的表变量。\n*   `sys.data_spaces` 视图现在有了新的 `type` 和 `type_desc`\
  \ 值：`(FX)-MEMORY_OPTIMIZED_DATA_FILEGROUP`。\n\n### 数据管理视图\n\n内存 OLTP 提供了大量新的数据管理视图；通过它们名称中的\
  \ `xtp_` 前缀可以轻松识别。命名约定也提供了关于其作用域的信息。`sys.dm_xtp_*` 视图返回实例级别的信息，而 `sys.dm_db_xtp_*`\
  \ 视图提供数据库级别的信息。让我们按区域分组，更详细地了解它们。\n\n#### 对象与索引统计\n\n以下数据管理视图提供与索引和数据修改相关的统计信息：\n\
  \n*   `sys.dm_db_xtp_object_stats` 按对象报告数据修改影响的行数，以及写入冲突和唯一约束违规。您可以使用此视图分析内存优化表中数据的易变性，并将其与索引使用统计相关联。与基于磁盘的表一样，您可以通过删除在易变表上定义的很少使用的索引来提高数据修改性能。有关此视图的更多信息，请访问\
  \ [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-object-stats-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-object-stats-transact-sql)。\n\
  *   `sys.dm_db_xtp_index_stats` 返回有关索引使用情况的信息，包括行链扫描次数、扫描的行数 (`rows_touched`)、返回给客户端的行数\
  \ (`rows_returned`) 以及有关过期行的数据。`rows_touched` 和 `rows_returned` 之间的巨大差异可能表明索引策略效率低下，查询执行了大范围扫描。对于哈希索引，这可能还表明由于哈希表中桶的数量不足，导致索引行链过长。您可以在\
  \ [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql)\
  \ 阅读有关此视图的信息。\n*   `sys.dm_db_xtp_nonclustered_index_stats` 提供有关非聚集（范围）索引的信息，例如索引中的页数、增量页数以及页拆分和合并统计信息。您可以在\
  \ [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql)\
  \ 阅读有关此视图的信息。\n*   `sys.dm_db_xtp_hash_index_stats` 提供有关哈希索引的信息，例如索引中的桶数、空桶数以及行链长度信息。当您需要分析哈希索引的状态并微调其\
  \ `bucket_count` 分配时，此视图非常有用。您可以在 [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-hash-index-stats-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-hash-index-stats-transact-sql)\
  \ 阅读有关此视图的信息。\n\n清单 12-11 展示了可用于查找 `bucket_count` 值可能非最优的哈希索引的脚本。\n\n```sql\nselect\n\
  s.name + '.' + t.name as [Table]\n,i.name as [Index]\n,stat.total_bucket_count as\
  \ [Total Buckets]\n,stat.empty_bucket_count as [Empty Buckets]\n,floor(100. * empty_bucket_count\
  \ / total_bucket_count)\nas [Empty Bucket %]\n,stat.avg_chain_length as [Avg Chain]\n\
  ,stat.max_chain_length as [Max Chain]\nfrom\nsys.dm_db_xtp_hash_index_stats stat\n\
  join sys.tables t on\nstat.object_id = t.object_id\njoin sys.indexes i on\nstat.object_id\
  \ = i.object_id and\nstat.index_id = i.index_id\njoin sys.schemas s on\nt.schema_id\
  \ = s.schema_id\nwhere\nstat.avg_chain_length > 3 or\nstat.max_chain_length > 50\
  \ or\nfloor(100. * empty_bucket_count /\ntotal_bucket_count) > 50\n```\n*清单 12-11.\
  \ 获取关于 `bucket_count` 值可能非最优的哈希索引的信息*\n\n#### 内存使用统计\n\n我已在本章和其他章节讨论过与内存使用相关的视图。不过，作为快速概览，这些视图如下：\n\
  \n*   `sys.dm_xtp_system_memory_consumers` 报告系统中系统级内存使用者的信息。有关此视图的更多信息，请访问 [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql)。\n\
