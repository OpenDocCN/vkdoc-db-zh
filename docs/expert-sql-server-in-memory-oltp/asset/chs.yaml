  通过分析测试期间收集的等待统计信息，可以确认锁存器是瓶颈。图 2-3 展示了 `sys.dm_os_wait_stats` 视图的输出。你可以看到锁存等待位列榜首。


  ![A340879_2_En_2_Fig3_HTML.jpg](img/A340879_2_En_2_Fig3_HTML.jpg)

