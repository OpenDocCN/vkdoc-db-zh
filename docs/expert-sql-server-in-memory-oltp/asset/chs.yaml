  '
- '# 内存优化的表类型与变量


  SQL Server 允许你创建内存优化的表类型。这些类型的表变量被称为**内存优化表变量**。与常规的基于磁盘的表变量不同，内存优化表变量仅存在于内存中，不使用
  `tempdb`。


  内存优化表变量提供了卓越的性能。它们可以用来替代基于磁盘的表变量，并且在某些情况下，可以替代临时表。显然，它们与内存优化表具有相同的功能限制集合。


  与基于磁盘的表类型相反，你可以在内存优化的表类型上定义索引；然而，类似于基于磁盘的表变量，SQL Server 不会在这些索引上维护统计信息。幸运的是，正如所讨论的，由于内存优化表上索引的特性，基数估计错误所带来的负面影响要比基于磁盘的表小得多。


  **注意**


  使用 `option (recompile)` 进行语句级重编译，可以让 SQL Server 估计内存优化表变量中的行数。但是，它不会为 SQL Server
  提供关于其中数据分布的任何信息。


  SQL Server 不支持内存优化表变量的内联声明。例如，代码清单 9-15 中所示的代码将无法编译，并会引发错误。此限制背后的原因是，SQL Server
  会为每个内存优化表类型编译一个 DLL，而这种情况下的内联声明是无效的。


  ```sql

  declare

  @IDList table

  (

  ID int not null

  primary key nonclustered hash

  with (bucket_count=10000)

  )

  with (memory_optimized=on)

  Msg 319, Level 15, State 1, Line 91

  Incorrect syntax near the keyword ''with''. If this statement is a common table
  expression, an xmlnamespaces clause or a change tracking context clause, the previous
  statement must be terminated with a semicolon.

  ```


  **代码清单 9-15.**

  （无效的）内存优化表变量的内联声明


  你应该定义并使用一个内存优化的表类型，如代码清单 9-16 所示。


  ```sql

  create type dbo.mtvIDList as table

  (

  ID int not null

  primary key nonclustered hash

  with (bucket_count=16384)

  )

  with (memory_optimized=on)

  go

  declare

  @IDList dbo.mtvIDList

  ```


  **代码清单 9-16.**

  创建内存优化表类型与内存优化表变量


  你可以在本机编译的和常规的 T-SQL 模块中，将内存优化表变量用作表值参数（TVP）。与基于磁盘的表值参数一样，这是将一批行传递给 T-SQL 例程的一种高效方式。


  **注意**


  我将在第 13 章中更详细地讨论将一批行传递给 T-SQL 例程的场景，以及使用内存优化表变量作为临时表替代品的场景。


  你可以使用内存优化表变量来模拟使用游标的逐行处理，而游标在本机编译的存储过程中是不被支持的。代码清单 9-17 展示了一个使用内存优化表变量模拟静态游标的例子。显然，如果可能的话，最好避免使用游标，而是采用基于集合的逻辑。


  ```sql

  create type dbo.MODataStage as table

  (

  ID int not null

  primary key nonclustered

  hash with (bucket_count=1024),

  Value int null

  )

  with (memory_optimized=on)

  go

  create proc dbo.CursorDemo

  with native_compilation, schemabinding, execute as owner

  as

  begin atomic

  (

  transaction isolation level = snapshot

  ,language=N''English''

  )

  declare

  @tblCursor dbo.MODataStage

  ,@ID int = -1

  ,@Value int

  ,@RC int = 1

  /* 将数据暂存到临时表中以模拟静态游标 */

  insert into @tblCursor(ID, Value)

  select ID, Value

  from dbo.MOData

  while @RC = 1

  begin

  select top 1 @ID = ID, @Value = Value

  from @tblCursor

  where ID > @ID

  order by ID

  select @RC = @@rowcount

  if @RC = 1

  begin

  /* 行处理 */

  update dbo.MOData set Value = Value * 2 where ID = @ID

  end

  end

  end

  ```


  **代码清单 9-17.**

  使用内存优化表变量模拟游标


  ## 小结


  SQL Server 使用本机编译来最小化解释型 T-SQL 语言的处理开销。它为每个内存优化对象生成单独的 DLL，并将其加载到进程内存中。


  SQL Server 支持常规 T-SQL 存储过程、标量用户定义函数和触发器的本机编译。它在创建时，或者在服务器或数据库重启的情况下，在第一次调用时将它们编译成
  DLL。SQL Server 针对 `UNKNOWN` 值优化了本机编译的模块，并将执行计划嵌入到代码中。该计划永远不会改变，除非模块被重新编译——无论是显式重新编译，还是在
  SQL Server 或数据库重启后重新编译。如果初始编译后数据分布发生了显著变化，你应该重新编译该模块。


  你可以通过修改模块或调用 `sp_recompile` 存储过程来重新编译模块。修改模块会在后台执行重新编译，在繁忙的系统中对工作负载的影响较小。


  虽然本机编译的模块速度极快，但它们支持的 T-SQL 语言特性有限。你可以通过使用解释型 T-SQL 代码来规避这些限制，这种代码通过 SQL Server 的查询互操作组件访问内存优化表。在此模式下，几乎所有
  T-SQL 语言特性都受支持。


  内存优化表类型和内存优化表变量是表类型和表变量的内存版本。它们仅存在于内存中，不使用 `tempdb`。你可以使用内存优化表变量作为数据的暂存区，并用于将一批行传递给
  T-SQL 例程。内存优化表类型允许你创建类似于内存优化表的索引。


  '
- "# 10. 数据存储、日志记录与恢复\n\n本章讨论内存 OLTP 如何将持久化内存优化表的数据存储到磁盘上。它阐述了 SQL Server 用于持久化数据的检查点文件对概念，概述了内存\
  \ OLTP 中的检查点过程，并讨论了内存优化数据的恢复。本章还解释了为什么与基于磁盘的表相比，内存 OLTP 的日志记录更加高效。\n\n最后，本章演示了内存\
  \ OLTP 如何执行表更改，并将其记录在日志和检查点文件中。\n\n\n## 数据存储\n\n来自持久化内存优化表的数据与基于磁盘的表分开存储。SQL Server\
  \ 使用一种基于 `FILESTREAM` 技术的流机制来存储它。然而，内存 OLTP 和 `FILESTREAM` 是彼此分开存储数据的，当数据库同时使用这两种技术时，你应该有两个独立的文件组：一个用于内存\
  \ OLTP，另一个用于 `FILESTREAM` 数据。\n\n基于磁盘的数据和内存优化数据的存储方式存在概念上的差异。基于磁盘的表存储行的唯一、最新版本。对一行的多次更新会多次更改同一个行对象。行的删除会将其从数据库中移除。最后，在需要时总是可以在数据文件中定位到数据行。\n\
  \n内存 OLTP 采用一种完全不同的方法，它将行的多个版本持久化到磁盘上。对数据行的多次更新会生成多个行对象，每个对象具有不同的生命周期。SQL Server\
  \ 将它们追加到存储在内存 OLTP 文件组中的二进制文件中，这些文件称为检查点文件，有时也称为检查点文件对（`CFP`）。\n\n无法预测数据行存储在检查点文件中的哪个位置。也没有使用这种操作的用例。这些文件的唯一目的是提供数据持久性，并在数据库启动时提高将数据加载到内存中的性能。\n\
  \n顾名思义，每个检查点文件对由两个文件组成：一个数据文件和一个增量文件。每个 `CFP` 覆盖一定范围的全局事务时间戳值的操作，记录那些 `BeginTs`\
  \ 值在此范围内的行上的操作。每次插入一行时，它都会被保存到数据文件中。每次删除一行时，有关已删除行的信息都会保存到增量文件中。一次更新会产生两个操作，`INSERT`\
  \ 和 `DELETE`，并将此信息保存到两个文件中。本章稍后将更详细地介绍所有这些操作的工作原理。\n\n图 10-1 提供了检查点文件对结构的高级概述。\n\
  \n![A340879_2_En_10_Fig1_HTML.jpg](img/A340879_2_En_10_Fig1_HTML.jpg)\n\n图 10-1.\
  \ 检查点文件中的数据\n\n如你所记得的，内存优化表可能包含额外的内部表，用于存储溢出行列和列存储索引相关结构的数据。这些内部表被视为单独的对象（检查点文件中的行使用\
  \ `xtp_object_id` 作为引用），其中的数据与主行内数据行分开存储。\n\n来自 LOB 列（如 `(n)varchar(max)` 和 `varbinary(max)`）的数据存储在另一种类型的数据文件中，称为大容量数据文件。大容量数据文件具有与常规数据文件相似的结构；但是，它们可以在行的有效负载部分存储超过\
  \ 8,060 字节的数据。值得注意的是，来自行溢出列表的数据存储在常规数据文件中。\n\n大容量数据文件也用于存储压缩的列存储段。压缩的段数据存储在行的有效负载部分，并通过\
  \ `segment_id` 和 `column_id` 值引用。另一方面，删除位图（已删除行表）则作为常规表存储在另一个检查点文件对中。\n\n最后，还有另一种类型的检查点文件，称为根文件。根文件在每次检查点事件时生成，用于跟踪系统中的检查点文件。\n\
  \n图 10-2 展示了一个具有 15 个处于不同状态的检查点文件的数据库示例。我稍后将详细介绍检查点文件的状态。这只是一个示意图；实际数据库中至少会有 17\
  \ 个处于各种状态的检查点文件。\n\n![A340879_2_En_10_Fig2_HTML.jpg](img/A340879_2_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2. 具有多个检查点文件对的数据库\n\n使用单独的增量文件来记录删除操作，使 SQL Server 能够避免在删除行时修改数据文件和随机 I/O。所有检查点文件都是仅追加的。此外，当文件关闭时（稍后会详细介绍），它们会变为只读。\n\
  \n### 检查点文件状态\n\n每个检查点文件在其生命周期中可以处于几种状态之一，如图 10-3 所示。\n\n![A340879_2_En_10_Fig3_HTML.jpg](img/A340879_2_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3. 检查点文件状态\n\n让我们更详细地了解所有这些状态。\n\n#### PRECREATED 状态\n\n当你在数据库中创建第一个内存 OLTP\
  \ 对象时（包括内存优化表类型和非持久化内存优化表），SQL Server 会生成 17 个检查点文件：1 个根文件和 16 个空文件。这样做是为了在需要新文件时最小化等待时间。\n\
  \n文件的初始大小基于服务器内存量，如表 10-1 所示。然而，如果需要，SQL Server 有可能更改预创建文件的类型。例如，预创建的大容量数据文件可以在需要时转换并用作常规数据文件。\n\
  \n表 10-1. 检查点文件的初始大小\n\n| 服务器内存 | 数据文件大小 | 大容量数据文件大小 | 增量文件大小 | 根文件大小 |\n| --- |\
  \ --- | --- | --- | --- |\n| 小于 16GB | 16MB | 8MB | 8MB | 2MB |\n| 16GB 或以上 | 128MB\
  \ | 64MB | 8MB | 16MB |\n\nSQL Server 2016 RTM 支持大型检查点，这是检查点文件的另一种配置，当服务器满足以下要求时启用：\n\
  \n*   服务器具有 16 个或更多逻辑处理器。\n*   服务器具有 128GB 或更大内存。\n*   服务器 I/O 系统为数据库提供超过 200MB/秒的吞吐量。\n\
  \n在此模式下，SQL Server 使用 1GB/128MB 的数据和增量文件，并将自动检查点过程延迟到事务日志增长 12GB（稍后详述）。虽然此配置可能有助于提高事务日志生成率极高的系统的性能，但可能导致数据库启动时恢复时间更长。此行为已在\
  \ SQL Server 2016 CU1/SQL Server 2016 SP1 中被禁用。\n\n\n#### “构建中”状态与检查点进程\n\n如您所知，SQL\
  \ Server 使用事务日志来持久化记录数据库中数据的修改信息。在发生意外关机或崩溃时，事务日志记录可用于重做任何数据更改；然而，如果需要重放大量的日志记录，这个过程可能会非常耗时。\n\
  \nSQL Server 使用检查点来缓解这个问题。尽管基于磁盘的表和内存中 OLTP 的检查点进程彼此独立，但它们的作用是相同的：将数据更改持久化到磁盘，从而缩短数据库恢复时间。最后一个检查点标识了数据更改已持久化到哪个时点，以及哪些日志记录需要重放。\n\
  \n对于基于磁盘的表，检查点操作的频率取决于服务器级别的 `recovery interval` 和数据库级别的 `TARGET_RECOVERY_TIME`\
  \ 设置。虽然这种方法有助于 SQL Server 通过将多个随机 I/O 写入操作批处理在一起来提高写入性能，但它会在检查点发生时导致 I/O 活动出现尖峰。\n\
  \n相比之下，内存中 OLTP 实现了持续检查点。它持续扫描事务日志，将更改流式传输并附加到处于 `UNDER CONSTRUCTION` 状态的检查点文件对中。行的新增版本被附加到数据文件中，删除操作则被附加到增量文件中。持续检查点也会将删除信息附加到处于\
  \ `ACTIVE` 状态的 CFP 中，这一点我稍后会讨论。\n\n值得再次强调的是，内存中 OLTP 的检查点依赖于事务日志记录，这与存储引擎的检查点不同，后者扫描并刷新缓冲池中的脏数据页。\n\
  \n在 SQL Server 2016 中，内存中 OLTP 的持续检查点进程是多线程的，与 SQL Server 2014 中的单线程检查点相比效率显著提高。主要工作由序列化线程完成，它们以大约\
  \ 1MB 的间隔（称为 `segments`）扫描事务日志。这些线程处理这些段，并根据其中的内存中 OLTP 事务日志记录填充数据文件和增量文件。\n\n这些段由段日志记录标识，这些日志记录在事务日志自上一个段日志记录以来增长超过\
  \ 1MB 时生成。这些日志记录包含有关段内事务范围的信息。控制器线程扫描日志，识别这些段并将其传递给序列化线程。\n\n另一个线程——`timer tasks`——按计划唤醒，并检查自上一个检查点事件以来事务日志是否增长了\
  \ 1.5GB，或者上一个检查点事件是否发生在六小时之前。当这种情况发生时，内存中 OLTP 会创建另一个内部事务，该事务用一个特殊标志关闭当前打开的段，该标志表示应触发检查点。当控制器线程检测到这个段时，它会唤醒另一个关闭线程，该线程通过将所有\
  \ `UNDER CONSTRUCTION` 数据文件转换为 `ACTIVE` 状态，并生成另一个包含检查点时所有活动文件信息的根文件，来执行实际的检查点操作。值得注意的是，无论事务日志增长是由于基于磁盘的事务还是内存中\
  \ OLTP 事务引起的，都会触发检查点。\n\n在 SQL Server 2016 RTM 版本中，对于大型检查点，检查点基于 12GB 的事务日志增长来触发。\n\
  \n### ACTIVE 状态\n\n如前所述，检查点事件将所有 `UNDER CONSTRUCTION` 检查点文件的状态更改为 `ACTIVE`。SQL Server\
  \ 不会将新的数据行附加到 `ACTIVE` 数据文件中，因此它们变为只读；但是，它仍然会将从 `ACTIVE` 数据文件中删除行的信息附加到 `ACTIVE`\
  \ 增量文件中。\n\n考虑这样一种情况：数据库有两个检查点文件对——一个处于 `ACTIVE` 状态，覆盖 `BeginTs` 区间 0 到 1,000；另一个处于\
  \ `UNDER CONSTRUCTION` 状态，覆盖从 `BeginTs` 值 1,001 开始的区间。假设表中在 `ACTIVE` 数据文件中存储了三个数据行。图\
  \ 10-4 说明了这一点。\n\n![A340879_2_En_10_Fig4_HTML.jpg](img/A340879_2_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4. ACTIVE 和 UNDER CONSTRUCTION 检查点文件对\n\n假设有两个事务修改数据，如清单 10-1 所示。\n\n```sql\n\
  -- Global Transaction Timestamp: 1100\nbegin tran\ndelete from T where RowId = 1;\n\
  update T set Col = 1 where RowId = 3;\ninsert into T(RowId) values(4);\ncommit;\n\
  -- Global Transaction Timestamp: 1200\ndelete from T where RowId = 4;\n```\n\n清单\
  \ 10-1. 修改表中的数据\n\n第一个事务（全局事务时间戳值为 1,100）删除了 `RowId = 1` 的行，这会将该行添加到 `ACTIVE` CFP\
  \ 的增量文件中。它还更新了 `RowId = 2` 的行（译者注：原文为 `RowId = 2`，但清单中是 `RowId = 3`，此处按清单翻译），这会在\
  \ `ACTIVE` 增量文件中添加另一行，标记旧行版本的删除。数据行的新版本与 `INSERT` 语句中的行一起被插入到 `UNDER CONSTRUCTION`\
  \ 数据文件中。\n\n第二个事务删除了新插入的行，这会将该行添加到 `UNDER CONSTRUCTION` 增量文件中，如图 10-5 所示。\n\n![A340879_2_En_10_Fig5_HTML.jpg](img/A340879_2_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5. 数据修改后的 ACTIVE 和 UNDER CONSTRUCTION 检查点文件对\n\n通常，磁盘上 `ACTIVE` 检查点文件的总大小约为内存中持久化内存优化表大小的两倍。但在某些情况下，SQL\
  \ Server 可能需要更多空间来存储内存优化数据。\n\n### MERGE TARGET 状态与合并过程\n\n随着时间的推移，随着数据修改的进行，`ACTIVE`\
  \ 检查点文件中被删除行的比例会增加。这种情况会增加不必要的存储开销，并减慢恢复期间的数据加载过程。SQL Server 通过一个称为合并的过程来解决这种情况。\n\
  \n一个称为合并策略评估器的后台任务会定期分析相邻的 `ACTIVE` CFP 是否可以合并，以便合并后数据文件中活动的、未删除的行能够容纳进新的 16MB 或\
  \ 128MB 数据文件中。当这种情况发生时，SQL Server 会创建一个处于 `MERGE TARGET` 状态的新 CFP，并用来自多个 `ACTIVE`\
  \ CFP 的数据填充它，同时过滤掉被删除的行。\n\n尽管合并策略评估器可以识别多个可能的合并，但每个 CFP 只能参与其中一个合并。表 10-2 展示了一些可能的合并示例。\n\
  \n表 10-2. 合并示例\n\n| 相邻源文件（填充百分比） | 合并结果 |\n| --- | --- |\n| CFP0 (40%), CFP1 (45%),\
  \ CFP2 (60%) | CFP0 + CFP1 (85%)。 |\n| CFP0 (10%), CFP1 (15%), CFP2 (70%), CFP3\
  \ (10%) | CFP0 + CFP1 + CFP2 (95%)。 |\n| CFP0 (55%), CFP1 (50%) | 不进行合并。 |\n\n一旦合并过程完成并且检查点发生，`MERGE\
  \ TARGET` CFP 将转换为 `ACTIVE` 状态，而先前的 `ACTIVE` CFP 将转换为 `WAITING FOR LOG TRUNCATION`\
  \ 状态。\n\n内存中 OLTP 合并 LOB 列大型数据文件的方式与常规数据文件相同。但是，包含列存储段和根文件的大型数据文件不会被合并，并且可能在不需要合并操作的情况下转换为\
  \ `WAITING FOR LOG TRUNCATION` 状态。这种转换发生在检查点事件生成新的根文件之后，或者当列存储索引行组中 90% 的行被删除后该行组被解压缩时。\n\
  \n\n\n#### 等待日志截断状态\n\n原先处于`活跃`状态、现处于`等待日志截断`状态的文件中的数据，不再用于数据库恢复。原先的`合并目标`、现处于`活跃`状态的`检查点文件对`可以用于此目的。但是，如果您希望从备份还原数据库，则仍需要那些`等待日志截断`的文件。\n\
  \n检查点文件将保持此状态，直到日志截断点超过其`LSN`。在`完整`恢复模式下，这意味着已进行日志备份，日志记录已发送到辅助节点，并且其他读取事务日志的进程没有落后。显然，在`简单`恢复模式下，不需要日志备份，日志截断点由检查点控制。\n\
  \n一旦发生截断，`等待日志截断`的文件就不再需要。它们可以转换回`预创建`状态，或者如果系统已有足够的`预创建`文件，则可以被删除。\n\n注意：您可以使用`sys.dm_db_xtp_checkpoint_files`视图来分析检查点文件的状态。附录\
  \ C 更深入地讨论了此视图，并展示了检查点文件状态在其生命周期中如何变化。\n\n## 恢复\n\n如您所知，恢复过程可能发生在数据库或实例重启、故障转移到另一节点或从备份还原数据库之后。SQL\
  \ Server 使用`活跃`数据文件和`内存中 OLTP`数据的事务日志，并行执行基于磁盘的表和内存优化表的恢复。\n\n在恢复阶段开始时，SQL Server\
  \ 定位包含检查点文件信息的最新根文件，并将其传递给`内存中 OLTP 引擎`。引擎获取所有`活跃`检查点文件对的列表，并开始从中加载数据。它仅使用增量文件作为筛选器来加载未删除的行版本。它检查数据文件中的行是否未被删除，且未在增量文件中被引用。根据此检查的结果，行要么被加载到内存中，要么被丢弃。\n\
  \n数据加载过程具有高度可扩展性。SQL Server 为每个逻辑 CPU 创建一个线程，每个线程处理一个单独的检查点文件对。在许多情况下，I/O 子系统的性能成为数据加载性能的限制因素。这就是为什么您应该将检查点文件放在快速的、最好是基于闪存的存储上的原因。\n\
  \n与基于磁盘的表相反，内存优化表上的索引不会被持久化。您还记得，`内存中 OLTP`中的索引只是内存指针，并且行在重新加载到内存中后其内存地址会发生变化。因此，在恢复阶段必须重新创建索引。\n\
  \n图 10-6 说明了数据加载过程。\n\n![A340879_2_En_10_Fig6_HTML.jpg](img/A340879_2_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6. 将数据加载到内存\n\n从`检查点文件对`加载数据后，SQL Server 通过从事务日志尾部应用更改来完成恢复，将数据库恢复到崩溃或关闭时的状态。您已经知道，`内存中\
  \ OLTP`不记录未提交的更改；因此，恢复期间不需要`撤销`阶段。\n\n最后，必须提及`AlwaysOn 可用性组`和`故障转移群集`实例在故障转移期间恢复过程的差异。使用`AlwaysOn\
  \ 故障转移群集`时，故障转移在概念上类似于 SQL Server 重启。数据库将联机，所有内存优化数据都需要加载到内存中。而`AlwaysOn 可用性组`节点只需处理`重做`队列，重放事务日志中未应用部分的事务。内存优化表的数据已经加载到所有节点的内存中。\n\
  \n您应该记住这种行为，并在系统中存在可用性 SLA 时考虑内存优化数据的恢复时间。如果您在基础设施中使用故障转移群集，这一点尤其重要。如前所述，您可以通过将检查点文件放在快速存储上来减少此时间。\n\
  \n\n\n## 事务日志记录\n\n正如你已经知道的，与存储引擎相比，内存 OLTP 中的事务日志记录效率更高。两个引擎共享同一个事务日志并执行预写日志(WAL)；然而，日志记录的格式和算法却大不相同。\n\
  \n对于基于磁盘的表，SQL Server 按索引逐个生成事务日志记录。例如，当向一个包含聚集索引和非聚集索引的表中插入单行时，它会在每个单独的索引中分别记录插入操作。此外，它还会记录内部操作，例如区和页分配、页拆分以及其他一些操作。\n\
  \n所有日志记录都保存在事务日志中，并且几乎在创建时就同步固化到磁盘上。尽管每个数据库都有一个名为日志缓冲区的缓存来批量写入日志，但该缓存非常小，大约 60KB。此外，某些操作，如`COMMIT`和`CHECKPOINT`，无论缓存是否已满，都会刷新该缓存。\n\
  \n最后，SQL Server 必须在日志记录中包含行的更新前(UNDO)和更新后(REDO)版本。检查点过程是异步的，它不会检查修改了数据页的事务的状态。检查点完全有可能保存来自未提交事务的脏数据页，而日志记录的\
  \ UNDO 部分则用于回滚这些更改。\n\n### 内存 OLTP 日志记录\n\n内存 OLTP 中的事务日志记录解决了这些效率低下的问题。第一个主要区别是，内存\
  \ OLTP 在事务`COMMIT`时生成并保存日志记录，而不是在每次数据行修改时。因此，被回滚的事务不会产生任何日志活动。\n\n日志记录的格式也不同。日志记录不包含任何`UNDO`信息。未提交事务的脏数据永远不会持久化到磁盘上；因此，内存\
  \ OLTP 日志数据不需要支持崩溃恢复的 UNDO 阶段，也不需要记录未提交的更改。\n\n内存 OLTP 根据事务的写入集生成日志记录。所有数据修改根据写入集和插入行的大小，合并到一个或极少数几个日志记录中。\n\
  \n### 演示日志行为\n\n让我们来检验这种行为，并运行清单 10-2 中显示的代码。它启动一个事务并向内存优化表中插入 500 行数据。然后，它使用未公开的系统函数`sys.fn_dblog`检查事务日志的内容。\n\
  \n```\ncreate table dbo.HKData\n(\nID int not null,\nCol int not null,\nconstraint\
  \ PK_HKData\nprimary key nonclustered hash(ID)\nwith (bucket_count=2048),\n)\nwith\
  \ (memory_optimized=on, durability=schema_and_data);\ndeclare\n@I int = 1\nbegin\
  \ tran\nwhile @I <= 500\nbegin\ninsert into dbo.HKData with (snapshot)\n(ID, Col)\n\
  values(@I, @I);\nset @I += 1\nend\ncommit\ngo\nselect *\nfrom sys.fn_dblog(NULL,\
  \ NULL)\norder by [Current LSN];\nListing 10-2.\n内存 OLTP 中的事务日志记录：内存优化表日志记录\n```\n\
  \n图 10-7 展示了事务日志的内容。你可以看到内存 OLTP 事务的单条事务记录。\n\n![A340879_2_En_10_Fig7_HTML.jpg](img/A340879_2_En_10_Fig7_HTML.jpg)\n\
  图 10-7.\n内存 OLTP 事务后的事务日志内容\n\n### 与基于磁盘的表比较\n\n让我们使用具有类似结构的基于磁盘的表重复此测试。清单 10-3\
  \ 显示了创建表并用数据填充它的代码。\n\n```\ncreate table dbo.DiskData\n(\nID int not null,\nCol\
  \ int not null,\nconstraint PK_DiskData\nprimary key nonclustered(ID)\n);\ndeclare\n\
  @I int = 1\nbegin tran\nwhile @I <= 500\nbegin\ninsert into dbo.DiskData(ID, Col)\n\
  values(@I, @I);\nset @I += 1;\nend\ncommit\nListing 10-3.\n内存 OLTP 中的事务日志记录：基于磁盘的表日志记录\n\
  ```\n\n如图 10-8 所示，同一个事务生成了超过 1700 条日志记录。\n\n![A340879_2_En_10_Fig8_HTML.jpg](img/A340879_2_En_10_Fig8_HTML.jpg)\n\
  图 10-8.\n基于磁盘的表修改后的事务日志内容\n\n### 分析内存 OLTP 日志记录\n\n你可以使用另一个未公开的函数`sys.fn_dblog_xtp`来检查内存\
  \ OLTP 日志记录的逻辑内容。清单 10-4 显示了使用此函数的代码。你应该使用清单 10-2 输出中的`LSN_HK`日志记录的 LSN 作为该函数的参数。\n\
  \n```\nselect [Current LSN], xtp_object_id, operation_desc\n,tx_end_timestamp, total_size\n\
  from sys.fn_dblog_xtp(null, null)\n-- \nwhere [Current LSN] = '00000022:00000240:0035';\n\
  Listing 10-4.\n分析一条内存 OLTP 日志记录\n```\n\n图 10-9 显示了该代码的输出。\n\n![A340879_2_En_10_Fig9_HTML.jpg](img/A340879_2_En_10_Fig9_HTML.jpg)\n\
  图 10-9.\n内存 OLTP 事务日志记录详情\n\n最后，值得再次说明的是，对非持久化表(`DURABILITY=SCHEMA_ONLY`)的任何数据修改都不会记录在事务日志中，其数据也不会持久化到磁盘上。\n\
  \n\n\n## 表修改\n\n正如你已了解的，SQL Server 2016 支持使用 `ALTER TABLE` 语句进行表修改。这是一种离线操作，在执行期间会阻塞对表的访问。SQL\
  \ Server 会生成并编译新版本的表 DLL，然后将其加载到进程内存中。\n\n根据所需更改的不同，`ALTER TABLE` 语句在两种不同的模式下运行。\n\
  \n*   仅元数据修改：对于仅元数据修改，内存优化 OLTP 不会修改数据行的结构。这可能发生在你添加或移除 `DEFAULT`、`CHECK` 和 `FOREIGN\
  \ KEY` 约束，和/或为内存优化表启用或禁用系统版本控制（时态表）时。\n*   常规修改：此类修改要求内存优化 OLTP 更改数据行的格式或内部表对象。这发生在你添加或移除列和索引、更改列数据类型、修改哈希索引的\
  \ `bucket_count` 值，以及其他需要数据转换的情况下。\n\n在仅元数据修改期间，SQL Server 更新表元数据，并在需要时创建、删除或刷新与系统版本控制相关的对象到磁盘。数据行不会被重新创建，但添加\
  \ `CHECK` 或 `FOREIGN KEY` 约束可能要求内存优化 OLTP 扫描表中的所有数据以验证约束。\n\n另一方面，常规修改将要求内存优化 OLTP\
  \ 重新创建表。这发生在你需要更改表中的数据行格式和/或索引时。在这种情况下，SQL Server 会创建另一个具有不同 `xtp_object_id` 值的表对象，并将数据从旧对象复制到新对象，在此过程中进行转换。显然，系统需要有足够的内存来容纳数据的两个副本。\n\
  \n### 创建表并获取 xtp_object_id 值\n\n让我们看一个例子，创建两个表，并获取它们的 `xtp_object_id` 值。清单 10-5\
  \ 展示了执行此操作的代码。\n\n```\ncreate table dbo.TableA\n(\nCol1 int not null\nconstraint\
  \ PK_TableA\nprimary key nonclustered hash\nwith (bucket_count=1024),\n)\nwith (memory_optimized=on,\
  \ durability=schema_and_data);\ncreate table dbo.TableB\n(\nCol1 int not null\n\
  constraint PK_TableB\nprimary key nonclustered hash\nwith (bucket_count=1024),\n\
  )\nwith (memory_optimized=on, durability=schema_and_data);\nselect\n'dbo.TableA'\
  \ as [Table]\n,c.index_id, a.xtp_object_id, a.type_desc, a.minor_id\n,c.memory_consumer_id,\
  \ c.memory_consumer_type_desc as [mc type]\nfrom\nsys.dm_db_xtp_memory_consumers\
  \ c join\nsys.memory_optimized_tables_internal_attributes a on\na.object_id = c.object_id\
  \ and\na.xtp_object_id = c.xtp_object_id\nwhere\nc.object_id = object_id('dbo.TableA');\n\
  select\n'dbo.TableB' as [Table]\n,c.index_id, a.xtp_object_id, a.type_desc, a.minor_id\n\
  ,c.memory_consumer_id, c.memory_consumer_type_desc as [mc type]\nfrom\nsys.dm_db_xtp_memory_consumers\
  \ c join\nsys.memory_optimized_tables_internal_attributes a on\na.object_id = c.object_id\
  \ and\na.xtp_object_id = c.xtp_object_id\nwhere\nc.object_id = object_id('dbo.TableB');\n\
  ```\n\n清单 10-5. 创建两个表并获取 xtp_object_id 值\n\n图 10-10 说明了代码的输出结果。\n\n![A340879_2_En_10_Fig10_HTML.jpg](img/A340879_2_En_10_Fig10_HTML.jpg)\n\
  \n图 10-10. 创建表后的 Xtp_object_id 值\n\n### 修改表\n\n作为下一步，让我们修改这两个表，如清单 10-6 所示。该代码向\
  \ `dbo.TableA` 添加了一个 `CHECK` 约束，并向 `dbo.TableB` 添加了一个新列。最后，它再次查询表的 `xtp_object_id`\
  \ 值。\n\n```\nalter table dbo.TableA\nadd constraint CHK_Col1\ncheck (Col1 > 0);\n\
  alter table dbo.TableB\nadd Col2 int null;\nselect\n'dbo.TableA' as [Table]\n,c.index_id,\
  \ a.xtp_object_id, a.type_desc, a.minor_id\n,c.memory_consumer_id, c.memory_consumer_type_desc\
  \ as [mc type]\nfrom\nsys.dm_db_xtp_memory_consumers c join\nsys.memory_optimized_tables_internal_attributes\
  \ a on\na.object_id = c.object_id and\na.xtp_object_id = c.xtp_object_id\nwhere\n\
  c.object_id = object_id('dbo.TableA');\nselect\n'dbo.TableB' as [Table]\n,c.index_id,\
  \ a.xtp_object_id, a.type_desc, a.minor_id\n,c.memory_consumer_id, c.memory_consumer_type_desc\
  \ as [mc type]\nfrom\nsys.dm_db_xtp_memory_consumers c join\nsys.memory_optimized_tables_internal_attributes\
  \ a on\na.object_id = c.object_id and\na.xtp_object_id = c.xtp_object_id\nwhere\n\
  c.object_id = object_id('dbo.TableB');\n```\n\n清单 10-6. 修改表\n\n如图 10-11 所示，添加 `CHECK`\
  \ 约束是一种仅元数据修改，并未更改表的 `xtp_object_id` 值。另一方面，添加一个新列则要求 SQL Server 在内部创建另一个表对象。\n\n\
  ![A340879_2_En_10_Fig11_HTML.jpg](img/A340879_2_En_10_Fig11_HTML.jpg)\n\n图 10-11.\
  \ 修改后的 Xtp_object_id 值\n\n### 日志优化\n\n显然，SQL Server 必须记录并持久化表修改事件。此外，在常规修改的情况下，检查点数据文件可能以旧的、修改前的格式存储数据行，这与新的表模式和\
  \ DLL 不兼容。内存优化 OLTP 通过应用一种称为日志优化的技术来解决此问题，它将模式更改的历史记录持久化在一个内部转换表中。SQL Server 使用该表在数据库启动期间将数据行转换为新格式，同时将数据加载到内存中。\n\
  \n让我们用一个例子来说明。清单 10-7 展示了创建表并执行两次表修改的代码，在两次修改之间向表中插入了一些数据行。\n\n```\n-- Global Transaction\
  \ Timestamp = 1\n-- xtp_object_id = -2147483615\ncreate table dbo.T1\n(\nId int\
  \ not null\nconstraint PK_T1\nprimary key nonclustered hash\nwith (bucket_count=1024),\n\
  Col1 int not null;\n)\nwith (memory_optimized=on, durability=schema_and_data);\n\
  -- Global Transaction Timestamp = 100\ninsert into dbo.T1(ID,Col1) values(1,1);\n\
  -- Global Transaction Timestamp = 200\n-- xtp_object_id = -2147483612\nalter table\
  \ dbo.T1 add Col2 varchar(100);\n-- Global Transaction Timestamp = 300\ninsert into\
  \ dbo.T1(ID,Col1,Col2) values(2,2,'2');\n-- Global Transaction Timestamp = 400\n\
  -- xtp_object_id = -2147483609\nalter table dbo.T1 alter column Col1 money;\n--\
  \ Global Transaction Timestamp = 500\ninsert into dbo.T1(ID,Col1,Col2) values(3,3.33,'3');\n\
  ```\n\n清单 10-7. 日志优化\n\n表 10-3 说明了转换表的逻辑结构。\n\n表 10-3. 转换表的逻辑结构\n\n| BeginTs | xtp_object_id\
  \ | Action |\n| --- | --- | --- |\n| `200` | `-2147483612` | `ADD Coll2 int` |\n\
  | `400` | `-2147483609` | `MODIFY Col1 money` |\n\n在数据库启动期间，内存优化 OLTP 从检查点文件中读取行，并根据转换表中的数据将其转换为最新模式。图\
  \ 10-12 说明了此过程。\n\n![A340879_2_En_10_Fig12_HTML.jpg](img/A340879_2_En_10_Fig12_HTML.jpg)\n\
  \n图 10-12. 数据库启动期间的数据行转换\n\n\n\n正如你所猜测的，日志优化要求转换过程是确定性的。转换后行的列值必须与原始更改后的值相同。不幸的是，这并非总是可行。考虑一下当你向表中添加一个新列，无论是作为\
  \ `identity` 列还是带有 `DEFAULT NEWID() WITH VALUES` 约束的情况。这种修改是非确定性的。无法预测在更改和转换过程中生成的值；因此，日志优化将不起作用。\n\
  \n当日志优化不可能时，SQL Server 会使用朴素日志（naïve logging），并将表更改记录为向新表的一系列独立插入操作，如代码清单 10-8 所示。在此过程中，行会根据新表的架构进行转换。\n\
  \n```\ncreate table NewVersionOfT(..);\ninsert into NewVersionOfT(..)\nselect and\
  \ transform rows according to the new schema\nfrom T;\ndrop table T;\nListing 10-8.\n\
  朴素日志：表 T 的更改（伪代码）\n```\n\n内存优化 OLTP（In-Memory OLTP）将 `INSERT SELECT` 操作视为与常规 `INSERT`\
  \ 操作相同的方式处理。它会将其记录在事务日志中，并且持续检查点会将行写入检查点数据文件。正如你所猜测的，这种方法可能会引入显著的日志开销，尤其是在大表的情况下。此外，需要朴素日志的表更改是单线程的，可能比多线程的日志优化更改慢得多。\n\
  \n还有其他几种情况会导致朴素日志。最值得注意的是向表中添加新的 LOB（大型对象）或行溢出列。如你所知，行外列存储在单独的内部表中，主行通过人工 ID 引用它们。无法预测这些\
  \ ID 值并使用日志优化。不幸的是，行外列的更改也不支持日志优化，对行外列的任何更改，包括删除它们或将它们移回行内，都将导致朴素日志。\n\n最后，SQL Server\
  \ 对任何使用系统或用户定义函数的 `DEFAULT WITH VALUES` 约束都使用朴素日志，即使函数是确定性的。\n\n让我们看看朴素日志的开销。代码清单\
  \ 10-9 创建了新数据库和内存优化表，并用大约 8GB 的数据填充它。最后，它执行了一个 `CHECKPOINT` 操作，确保内存优化 OLTP 填充了检查点数据文件。\n\
  \n```\ncreate database [InMemoryOLTP2016_Ch10]\non primary\n(\nname = N'Ch10'\n\
  ,filename = N'C:\\Data\\Ch10.mdf'\n),\nfilegroup HKData CONTAINS MEMORY_OPTIMIZED_DATA\n\
  (\nname = N'Ch10_HKData'\n,filename = N'C:\\Data\\HKData\\Ch10'\n)\nlog on\n(\n\
  name = N'Ch10_Log'\n,filename = N'C:\\Data\\Ch10_log.ldf'\n)\ngo\ncreate table dbo.AlterLogging\n\
  (\nID int not null\nconstraint PK_AlterLogging\nprimary key nonclustered,\nIntCol\
  \ int not null,\nCharCol char(8000) not null\n)\nwith (memory_optimized = on, durability\
  \ = schema_and_data);\n;with N1(C) as (select 0 union all select 0) -- 2 rows\n\
  ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows\n,N3(C) as (select\
  \ 0 from N2 as t1 cross join N2 as t2) -- 16 rows\n,N4(C) as (select 0 from N3 as\
  \ t1 cross join N3 as t2) -- 256 rows\n,N5(C) as (select 0 from N4 as t1 cross join\
  \ N4 as t2) -- 65,536 rows\n,N6(C) as (select 0 from N5 as t1 cross join N3 as t2)\
  \ -- 1,048,576 rows\n,Ids(Id) as (select row_number() over (order by (select null))\
  \ from N6)\ninsert into dbo.AlterLogging(Id, IntCol, CharCol)\nselect Id, Id, Replicate('0',8000)\n\
  from Ids;\ncheckpoint;\nListing 10-9.\n朴素日志开销：对象创建\n```\n\n代码清单 10-10 展示了如何获取事务日志和检查点文件的文件大小及已用空间信息。\n\
  \n```\nselect\nconvert(decimal(9,3),sum(file_size_in_bytes) / 1024\\. / 1024)\n\
  as [Checkpoint Files Size MB]\n,convert(decimal(9,3),sum(file_size_used_in_bytes)\
  \ / 1024\\. / 1024)\nas [Checkpoint Files Size Used MB]\nfrom\nsys.dm_db_xtp_checkpoint_files;\n\
  select\nname as [FileName]\n,convert(decimal(9,3),size / 128.)\nas [Log Size MB]\n\
  ,convert(decimal(9,3),fileproperty(name,'SpaceUsed') / 128.)\nas [Log Size Used\
  \ MB]\nfrom sys.database_files\nwhere name = 'InMemoryOLTP2016_Ch10_log';\nListing\
  \ 10-10.\n朴素日志开销：获取事务日志和检查点文件的大小\n```\n\n图 10-13 展示了 `INSERT` 操作后事务日志和检查点文件的大小。\n\
  \n![A340879_2_En_10_Fig13_HTML.jpg](img/A340879_2_En_10_Fig13_HTML.jpg)\n*图 10-13.\
  \ INSERT 操作后的日志和检查点文件大小*\n\n下一步，让我们通过向表中添加另一个 `int` 列来执行表更改，如代码清单 10-11 所示。如你所知，此操作是日志优化的，在我的环境中耗时\
  \ 5.3 秒。\n\n```\nalter table dbo.AlterLogging add IntCol2 int;\ncheckpoint;\nListing\
  \ 10-11.\n朴素日志开销：更改表（日志优化更改）\n```\n\n如果你再次运行代码清单 10-10 中的查询，你会看到如图 10-14 所示的结果。可以看出，更改并没有显著增加日志和检查点文件的大小。\n\
  \n![A340879_2_En_10_Fig14_HTML.jpg](img/A340879_2_En_10_Fig14_HTML.jpg)\n*图 10-14.\
  \ 日志优化更改后的日志和检查点文件大小*\n\n最后，让我们运行另一个 `ALTER TABLE` 语句，向表中添加一个 LOB 列。此操作不支持日志优化，需要朴素日志。代码清单\
  \ 10-12 显示了执行此操作的代码。\n\n```\nalter table dbo.AlterLogging add LOBCol varchar(max);\n\
  checkpoint;\nListing 10-12.\n朴素日志开销：更改表（朴素日志）\n```\n\n正如我已经提到的，非日志优化的更改是单线程过程。该操作在我的环境中耗时\
  \ 47.1 秒，大约比日志优化更改慢九倍。它还增加了显著的事务日志开销，并使磁盘上的检查点文件大小翻倍，如图 10-15 所示。\n\n![A340879_2_En_10_Fig15_HTML.jpg](img/A340879_2_En_10_Fig15_HTML.jpg)\n\
  *图 10-15. 朴素日志更改后的日志和检查点文件大小*\n\n表更改开销是另一个你应该在内存优化表中极其谨慎使用行外存储和 LOB 列的原因。\n\n你可以通过将多个类似的架构更改组合到单个\
  \ `ALTER TABLE` 语句中来减少表更改的影响，如代码清单 10-13 所示。不幸的是，无法将不同的操作组合到同一个 `ALTER TABLE` 语句中；例如，你不能同时添加和删除列。\n\
  \n```\nalter table dbo.TableA add\nCol3 int\n,Col4 int\n,constraint CHK_Columns_Positive\n\
  check(Col3 > 0 and Col4 > 0);\nalter table dbo.TableB drop column Col1, Col2;\n\
  Listing 10-13.\n将多个操作组合到单个 ALTER TABLE 语句中\n```\n\n最后，SQL Server 2016 SP1 引入了几项重大的性能改进，可以显著减少表更改的时间。此外，添加列存储索引变成了日志优化操作，这在\
  \ SQL Server 2016 RTM 中并非如此。\n\n\n\n## 总结\n\n持久化内存优化表的数据，在底层被置于一个使用 `FILESTREAM`\
  \ 技术的独立文件组中。数据存储在一系列不同类型的检查点文件中。数据文件存储行版本数据。增量文件存储有关已删除行的信息。大型对象列和列存索引的数据存储在大型数据文件中。最后，根文件在系统中存储关于检查点文件的信息。\n\
  \n检查点文件中的数据永不更新。`DELETE` 操作会在增量文件中生成新条目。`UPDATE` 操作将行的新版本存储在数据文件中，并在增量文件中将旧版本标记为已删除。SQL\
  \ Server 利用顺序流式 API 将数据写入这些文件，不涉及任何随机 I/O。\n\n每个检查点文件对都覆盖一个特定的全局事务时间戳值区间，并经历一系列预定义的状态。SQL\
  \ Server 将新的行数据存储在处于 `UNDER CONSTRUCTION` 状态的 CFP 中。这些 CFP 在检查点事件时转换为 `ACTIVE` 状态。`ACTIVE`\
  \ CFP 的数据文件被关闭，不再接受新的行版本；但是，它们仍然会在增量文件中记录删除信息。\n\nSQL Server 合并来自 `ACTIVE` 检查点文件对的数据，并过滤掉已删除的行。合并完成后，且源\
  \ CFP 已备份，SQL Server 会释放它们或将其切换回 `FREE` 状态。\n\n在数据库恢复期间，`ACTIVE` 检查点文件对连同日志尾部一起使用。内存\
  \ OLTP 的恢复过程具有高度可扩展性且非常快速。内存优化表上的索引不会持久化到磁盘，而是在数据加载到内存时重新创建。\n\n与基于磁盘的表相比，内存 OLTP\
  \ 中的事务日志记录效率更高。事务在 `COMMIT` 时根据事务写入集进行日志记录。日志记录紧凑，并包含多个与行相关操作的信息。\n\n在 SQL Server\
  \ 2016 中有两种类型的表更改。当您添加或删除表约束和/或更改系统版本控制表属性时，会发生仅元数据更改。SQL Server 不会重新创建表对象；但是，它可能会扫描表中的数据以验证约束。\n\
  \n相比之下，常规更改会在后台重新创建表对象，并为其分配不同的 `xtp_object_id` 值。在确定性转换的情况下，SQL Server 执行日志优化，仅持久化模式更改信息，并在数据库启动时从检查点文件转换行。在非确定性转换的情况下，SQL\
  \ Server 使用朴素日志记录，并为表中的每一行记录 `INSERT` 事件。\n\n表更改是一个离线操作，在执行期间会阻止对表的访问。您可以通过将多个类似的操作合并到一个\
  \ `ALTER TABLE` 语句中来减少更改的影响。\n\n"
- '# 11. 垃圾回收


  本章涵盖内存 OLTP 引擎中使用的垃圾回收过程。它概述了参与垃圾回收的各种组件，并演示了它们如何相互交互。


  ## 垃圾回收过程概述


  内存 OLTP 是一个行版本控制系统。`UPDATE` 操作生成行的新版本，而不是更新行数据。`DELETE` 操作不会移除行，而是更新行的 `EndTs` 时间戳。由中止事务创建的行不会立即释放，即使在回滚后，它们仍作为索引行链的一部分保留。


  如您所知，每一行都有两个时间戳（`BeginTs` 和 `EndTs`），通过指定行的创建时间和删除时间来指示行的生命周期。事务只能看到在其启动时有效的行版本。实际上，这意味着一行仅当事务的逻辑开始时间（事务开始时的全局事务时间戳值）介于该行的
  `BeginTs` 和 `EndTs` 时间戳之间时，才对该事务可见。


  在某个时刻，当一行的 `EndTs` 时间戳早于系统中最老活动事务的全局事务时间戳时，该行过期。过期的行对活动事务不可见，最终需要被释放以回收系统内存并加速索引链导航。此过程称为垃圾回收。


  内存 OLTP 中的垃圾回收过程设计目标如下：


  *   **无阻塞**：垃圾回收过程不应阻塞用户线程，并对系统产生最小的性能影响。

  *   **响应迅速**：垃圾回收过程应对内存压力做出反应。

  *   **协作且可扩展**：垃圾回收过程不应依赖单个系统线程执行内存释放，并且应在过程中利用常规工作线程。


  垃圾回收的协作性质使其与典型的 SQL Server 后台进程大不相同。尽管有一个专门的系统垃圾回收线程（每个 NUMA 节点一个），称为空闲工作线程，但大部分工作是由常规的用户工作线程完成的。这使得该过程能够扩展并跟上系统中的工作负载。


  用户线程以两种不同的方式参与垃圾回收过程：它们从行链中解除链接旧的、过期的行，并执行实际的释放操作。正如您将看到的，这些操作是相互独立的。


  让我们详细看看这个过程。图 11-1 展示了一个表的逻辑结构，该表在 `Name` 和 `City` 列上有两个哈希索引。您在前几章中见过此图；然而，在本章中，我添加了另一个称为
  `idxLinkCount` 的元素，它指示行参与了多少个索引链。在图中以带下划线显示；请注意，所有行的值均为 2，这对应于表中的索引数量。


  ![A340879_2_En_11_Fig1_HTML.jpg](img/A340879_2_En_11_Fig1_HTML.jpg)


  图 11-1. 数据的初始状态


  假设您有一个会话，在最老活动事务时间戳为 110、全局事务时间戳为 125 时，运行了如清单 11-1 所示的两个查询。


  ```

  select * from dbo.People where Name = ''Adam'';

  select * from dbo.People where Name = ''Carl'';

  ```


  清单 11-1. 第一个批处理


  第一个 `SELECT` 扫描了 `Name` 索引行链中值为 `A` 的存储桶，并检测到 `Ann` 行，其 `EndTs` 值为 100。最老活动事务时间戳是
  110，因此该行已过期，对系统中的活动事务不可见。因此，用户线程将该行从 `Name` 索引行链中解除链接，并减少了 `idxLinkCnt` 值。


  我想重申一下，此操作是由常规用户工作线程而非系统线程完成的。这说明了垃圾回收的协作性质。




  第二个 `SELECT` 检测到了已删除的 `Carl` 行。然而，该行的 `EndTs` 值大于最旧活动事务时间戳，因此该行对于某些活动事务仍然可见。所以，该行无法从索引链中解除链接。图
  11-2 说明了执行查询后的数据状态。


  ![A340879_2_En_11_Fig2_HTML.jpg](img/A340879_2_En_11_Fig2_HTML.jpg)


  图 11-2.

  前两个查询执行后的数据状态


  现在，假设部分活动事务已完成，你在最旧活动事务时间为 120、全局事务时间为 130 时，运行了清单 11-2 中的第二批查询。


  ```

  select * from dbo.People where City = ''Cincinnat'';

  select * from dbo.People where City = ''Dallas'';

  清单 11-2.

  第二批查询

  ```


  第一个 `SELECT` 在 `City` 索引链中找到了已过期的 `Ann` 行，并将其从那里移除。此时，该行不再参与任何行链，因此可以被释放。但是，该行不会立即释放；这是在后续阶段完成的。


  `Carl` 行现在也已过期，对于活动事务不可见。第二个 `SELECT` 将其从 `City` 索引链中移除；然而，它仍然存在于 `Name` 索引链中，无法被释放。图
  11-3 显示了此时的数据状态。


  ![A340879_2_En_11_Fig3_HTML.jpg](img/A340879_2_En_11_Fig3_HTML.jpg)


  图 11-3.

  第二批两个查询执行后的数据状态


  重要提示


  你应该记住，`最旧活动事务时间戳` 值控制着过期行何时可以从索引链中移除并释放。长时间运行和已放弃的事务会延迟垃圾回收，并可能导致系统因过期行数量过多而耗尽内存。


  当事务完成时，`In-Memory OLTP` 会将有关它的信息放入由负责垃圾回收管理的空闲工作线程使用的队列中。空闲工作线程每分钟唤醒一次，或者在负载较重的情况下，当完成的事务数量超过预定义阈值时唤醒。它分析已完成事务列表和系统中的
  `最旧活动事务时间戳`，并将已完成的事务分为 16 个不同的队列，称为 `代`，并根据其 `全局事务时间戳` 值进行排序。


  *   `第 0 代` 包含在当前 `最旧活动事务时间戳` 之前完成的事务列表。这些事务生成的行立即可供垃圾回收。可以存储在此处的事务数量没有限制。

  *   `第 1-14 代` 存储在当前 `最旧活动事务时间戳` 之后完成的事务列表。每代最多可容纳约 16 个事务的信息。你可以猜到，系统可以在 `第 1-14
  代` 队列中最多保存 224 个事务。

  *   `第 15 代` 存储有关在当前 `最旧活动事务时间戳` 之后完成的其余事务的信息。可以存储在此处的事务数量没有限制。


  队列中的每个事务都会向空闲工作线程公开其写入集，该线程为每个待释放的行构建 16 行的工作项集。这些工作项分布在另一组工作线程队列中——每个调度器一个队列——然后由用户线程拾取并处理。用户线程拾取这些项，并在完成其他用户事务的工作后执行释放。


  图 11-4 说明了在一个 `最旧活动事务时间戳` 为 10,000 的系统中垃圾回收工作流的示例。


  ![A340879_2_En_11_Fig4_HTML.jpg](img/A340879_2_En_11_Fig4_HTML.jpg)


  图 11-4.

  垃圾回收工作流


  用户线程通常从与其运行在相同调度器的队列中获取工作项。但是，如果该队列为空，线程会检查属于同一 `NUMA` 节点的其他 CPU 的队列。最后，在系统负载较重的情况下，线程可以从任何队列中拾取工作项，无论其所属的
  `NUMA` 节点是哪个。


  对于热点数据和频繁使用的索引，用户线程能相对较快地检测到过期行。然而，对于很少使用的索引和/或很少访问的数据，过期行可能无法被及时检测到。


  这个问题由空闲工作线程解决，它们会定期扫描索引并检测其中的过期行。空闲工作线程可以立即释放这些行，或者在它们从所有索引链中解除链接后，将它们添加到工作项中。这个过程称为
  **尘埃角落扫描**，有时也称为 **清理扫描**。


  如你所见，`In-Memory OLTP` 中的垃圾回收过程是异步完成的。已删除的行和来自中止事务的行会继续使用系统内存，直到它们被释放。你需要记住这一点，并在系统中预留足够的内存来容纳这些行。




  ## 与垃圾回收相关的数据管理视图


  SQL Server 提供了多个可用于监控和分析垃圾回收过程的数据管理视图。


  *   `sys.dm_xtp_gc_stats` 视图提供有关垃圾回收过程的统计信息。它包括垃圾回收子系统检查的行数、用户和空闲工作线程处理的行数等信息，以及其他一些属性。你可以在
  [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-stats-transact-sql)
  阅读关于此视图的更多信息。

  *   `sys.dm_xtp_gc_queue_stats` 视图提供有关垃圾回收器工作队列的信息。它提供关于已排队和出队的工作项总数、当前队列长度、队列上次访问时间以及队列所见过的最大深度等信息。你可以监控当前队列长度，确保垃圾回收器能跟上进度。更多信息可在
  [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-queue-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-queue-stats-transact-sql)
  获取。

  *   `sys.dm_db_xtp_gc_cycle_stats` 视图提供有关最近（最多 1,024 个）垃圾回收执行周期的信息，包括周期的时间和持续时间，以及事务在代际间的分布。你可以使用此视图查找垃圾回收活动中的峰值，并在排查长时间运行的事务问题时使用。你可以在
  [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-gc-cycle-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-gc-cycle-stats-transact-sql)
  阅读关于此视图的更多信息。

  *   最后，`sys.dm_db_xtp_index_stats` 视图包含若干与垃圾回收相关的指标。`rows_expired` 列指示有多少行已过期。`rows_expired_removed`
  值指示从索引链中取消链接的行数。Phantom row 列提供有关由中止事务插入的行的信息。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql)
  阅读关于此视图的更多信息。


  ## 探索垃圾回收过程


  让我们来检查一下垃圾回收过程及其异步特性。第一步，创建一个内存优化表并用 65,536 行数据填充它，如代码清单 11-3 所示。


  ```

  create table dbo.GCDemo

  (

  ID int not null,

  Placeholder char(8000) not null,

  constraint PK_GCDemo primary key nonclustered(ID)

  )

  with (memory_optimized=on, durability=schema_only)

  go

  ;with N1(C) as (select 0 union all select 0) -- 2 行

  ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 行

  ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 行

  ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 行

  ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 行

  ,Ids(Id) as (select row_number() over (order by (select null)) from N5)

  insert into dbo.GCDemo(Id, Placeholder)

  select Id, Replicate(''0'',8000)

  from ids;

  Listing 11-3.

  创建表

  ```


  让我们使用代码清单 11-4 中的代码查看表中使用的内存量、索引统计信息和垃圾回收工作队列统计信息。


  ```

  select

  convert(decimal(7,2),memory_allocated_for_table_kb / 1024.)

  as [为表分配的内存]

  ,convert(decimal(7,2),memory_used_by_table_kb / 1024.)

  as [表使用的内存]

  from

  sys.dm_db_xtp_table_memory_stats

  where

  object_id = object_id(N''dbo.GCDemo'');

  select

  s.index_id, i.name, s.rows_touched

  ,s.rows_expired, s.rows_expired_removed

  from

  sys.dm_db_xtp_index_stats s left join sys.indexes i on

  s.object_id = i.object_id and

  s.index_id = i.index_id

  where

  s.object_id = object_id(N''dbo.GCDemo'');

  select

  sum(total_enqueues) as [总入队数]

  ,sum(total_dequeues) as [总出队数]

  from

  sys.dm_xtp_gc_queue_stats;

  select sweep_scans_started, sweep_rows_touched

  ,sweep_rows_expired, sweep_rows_expired_removed

  from sys.dm_xtp_gc_stats;

  Listing 11-4.

  分析表内存使用情况、索引和工作队列统计信息

  ```


