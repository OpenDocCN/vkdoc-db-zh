  ## 12. 部署与管理


  本章讨论利用内存 OLTP 的系统的部署与管理方面。它提供了一套关于硬件与服务器配置的指南，并涵盖了与内存 OLTP 相关的数据库管理任务。最后，本章概述了与内存
  OLTP 相关的目录和数据管理对象的变更和增强。


  ### 硬件考量


  内存 OLTP 以不同于 SQL Server 存储引擎的方式使用硬件，并且通常更高效。即使使用中端服务器，通常也能实现高 OLTP 吞吐量。此外，内存 OLTP
  具有高度可扩展性，随着系统负载和数据量的增加，可以通过向服务器添加更多 CPU 和内存，以及向磁盘阵列添加更多驱动器来提高事务吞吐量。


  显然，你不应忘记内存 OLTP 与其他 SQL Server 组件在同一个“沙箱”中运行，并与它们共享资源。内存成为内存 OLTP 和存储引擎竞争的最关键的资源之一。内存优化数据使用的内存对于存储引擎是不可访问的，因此不能用于缓冲池。完全有可能，在内存量不足的服务器上使用内存
  OLTP 会对基于磁盘的表的查询性能造成影响，如果需要过多的物理 I/O。在设计系统时应记住这一点，避免将不必要的数据放入内存优化的表中。


  > **提示**

  > 考虑将热门的当前数据和很少访问的历史数据分别放在内存优化的表和基于磁盘的表中。我将在下一章更深入地讨论这种场景。


  让我们讨论内存 OLTP 对不同硬件组件的要求。显然，在构建利用内存 OLTP 的服务器时，你需要考虑来自其他 SQL Server 组件的工作负载。


  ### CPU


  系统中的 CPU 数量很大程度上取决于所需的 OLTP 吞吐量。然而，如前所述，即使使用中端服务器，也完全有可能实现高事务吞吐量。如果不进行一些测试和分析，就无法预测需要多少个
  CPU；但是，使用合适的硬件是有益的，它允许你随着负载增长进行扩展并添加更多 CPU。


  在可能的情况下，你应该选择基础时钟速度更高的处理器。使用 SQL Server 按核心许可，与速度较慢、核心较多的 CPU 相比，使用高端 CPU（核心较少但单线程性能更高）通常可以获得更好的
  OLTP 性能/成本比。这在 SQL Server 标准版的情况下也极为关键，其限制为 4 个插槽或 24 个核心中的较小值。你将无法将 CPU 扩展到此限制之外，而更快的
  CPU 将允许你在 SQL Server 的非企业版中实现更好的事务吞吐量。


  最后，你应该在服务器上启用超线程。




  ### I/O 子系统


  一般规则是，应将内存优化 OLTP 文件组放置在专为顺序 I/O 性能优化的专用磁盘阵列上。在可能的情况下，最好使用基于闪存的存储。尽管基于 HDD 的磁盘阵列可以提供足够好的顺序
  I/O 性能来处理常规的内存优化 OLTP 工作负载，但它们在数据库启动期间可能成为瓶颈。如您所知，内存优化 OLTP 恢复过程具有高度的可扩展性，多个调度器并行地从不同的检查点文件加载数据。通常，I/O
  性能成为 SQL Server 恢复内存优化数据的速度限制因素。


  如果数据库在其服务级别协议（SLA）中具有较低的恢复时间目标（RTO）指标，则恢复性能变得更加重要。尽管包含内存优化 OLTP 文件组的数据库支持企业版的分段恢复，但
  SQL Server 必须将所有内存优化 OLTP 数据与 `PRIMARY` 文件组一起联机。您无法将内存优化 OLTP 文件组的恢复推迟到恢复过程的后期阶段。


  提高恢复性能的方法之一是在内存优化 OLTP 文件组中创建多个容器，将它们放置在使用不同 HBA 适配器的不同磁盘阵列中，如果是网络存储，则使用不同的访问路径。SQL
  Server 将检查点文件分布在各个容器上，并将从多个驱动器并行加载它们。


  清单 12-1 展示了如何创建一个在内存优化 OLTP 文件组中包含两个容器的数据库，分别将它们放置在 `H:\HKData` 和 `K:\HKData` 文件夹中。


  ```

  create database HKMultiContainers

  on primary

  (

  name = N''HKMultiContainers''

  ,filename = N''M:\HKMultiContainers.mdf''

  ),

  filegroup HKData CONTAINS MEMORY_OPTIMIZED_DATA

  (

  name = N''HKMultiContainers_HKData1''

  ,filename = N''H:\HKData\HKMultiContainers''

  ),

  (

  name = N''HKMultiContainers_HKData2''

  ,filename = N''K:\HKData\HKMultiContainers''

  )

  log on

  (

  name = N''HKMultiContainers_Log''

  ,filename = N''L:\KMultiContainers_log.ldf''

  );

  ```

  清单 12-1. 在内存优化 OLTP 文件组中创建带有两个容器的数据库


  持续检查点通常不会给磁盘子系统带来极端负载。该过程利用流式 API，并使用有限数量的线程将数据写入磁盘。显然，实际需求将取决于内存优化 OLTP 事务的日志生成速率。


  然而，磁盘子系统应提供足够的带宽来并行处理合并过程和持续检查点。通常，如果检查点以给定的 IOPS 填充数据和差异文件，则 I/O 子系统应能处理三倍于该 IOPS
  的负载，以同时满足检查点和合并过程的需求。


  至于磁盘空间，Microsoft 建议您有足够的空间来容纳来自持久内存优化表的数据大小的四倍空间。显然，您需要将未来的数据增长纳入您的分析考量。


  ### 内存


  系统中需要有足够的内存来容纳所有内存优化表的数据。当 SQL Server 无法为新的行对象分配内存时，它会失败一个事务。通常，SQL Server 在 `INSERT`
  和 `UPDATE` 操作期间执行内存分配；但是，如果表包含非聚集索引，并且没有足够的内存来容纳新的差异记录或执行页面合并操作，`DELETE` 操作也可能失败。此外，如果表包含聚集列存储索引，`DELETE`
  操作可能需要为删除位图内部表中的新行分配内存。


  图 12-1 显示了一条指示内存不足情况的错误消息。


  ![A340879_2_En_12_Fig1_HTML.jpg](img/A340879_2_En_12_Fig1_HTML.jpg)

  图 12-1. 内存不足错误


  内存不足的情况本质上使内存优化 OLTP 数据变为只读。您仍然可以查询数据；但是，在问题解决之前，您无法执行任何数据修改操作。当发生这种情况时，检查垃圾回收过程的状态以确保它没有被旧的活动事务延迟是很有益的。我将在本章后面讨论如何检测此类事务。


  在许多情况下，解决内存不足情况的唯一选择是增加可供 SQL Server 和内存优化 OLTP 引擎使用的内存量。当这不可能时，特别是对于 SQL Server
  的标准版，您应该检测内存优化 OLTP 中最大的内存消耗者，并通过重构或将它们迁移到基于磁盘的表来减少其内存占用。我将在本章后面讨论如何检测它们。


  注意

  SQL Server 的标准版每个数据库的内存优化数据限制为 32GB。



  '
- "# 估算内存 OLTP 所需内存量\n\n估算内存优化表所需的内存量并非一项简单的任务。作为经验法则，如果表没有溢出存储列，你可以将表中数据的大小翻倍作为估算基础。然而，若要进行更精确的估算，你应综合考虑以下几个不同组件的内存需求。\n\
  \n*   数据行由 24 字节的头部、一个索引指针数组（每个索引 8 字节）和有效负载（实际行数据）组成。例如，如果你的表有 1 亿行、3 个索引，且每行平均约\
  \ 200 字节，那么存储这些行数据（此数字中未包含任何版本控制开销）将需要 `(24 + 3 * 8 + 200) * 100,000,000 = ∼23.1GB`\
  \ 的内存。\n*   哈希索引每个存储桶使用 8 字节。如果一个表定义了两个哈希索引，每个有 1.5 亿个存储桶，SQL Server 将创建具有 268,435,456\
  \ 个存储桶的索引（将索引属性中指定的存储桶数向上舍入到下一个 2 的幂）。这两个索引将占用 `268,435,456 * 2 * 8 = 4GB` 的内存。\n\
  *   非聚集索引的内存使用量基于唯一索引键的数量和索引键的大小。如果一个表有一个非聚集索引，包含 2500 万个唯一键值，且每个键值平均占用 30 字节，则它将使用\
  \ `(30 + 8(指针)) * 25,000,000 = ∼906MB` 的内存。在你的估算中可以忽略页头和非叶级页，因为它们的大小与叶级行大小相比微不足道。\n\
  *   溢出存储开销取决于存储在溢出存储内部表中的非空值数量。每个行溢出值增加 64 字节开销，包括一个 24 字节的内部表行结构、两个 8 字节的范围索引指针（在叶级和行内）以及用于存储人工溢出存储\
  \ ID 的 24 字节（行内、溢出存储以及内部表范围索引的叶级）。此外，LOB `max` 列会引入 16 个额外字节，用于指向存储数据的 `LOB PAGE\
  \ ALLOCATOR` 可变堆，并且在那里每 8KB 数据还有额外的 32 字节开销。还有额外的内存用于存储内部范围索引数据页和一个映射表，但与实际数据相比，这部分开销很小。举例来说，如果一个内存优化表在一个行溢出\
  \ `varchar(8000)` 列中有 1000 万个非空值，这将需要 `64 * 10,000,000 = ∼610MB` 的内存来将这些数据存储在内部溢出存储表中。\n\
  *   列存储索引的内存需求难以估算。数据通常会被高度压缩，并且根据经验法则，其消耗的内存通常仅为表中未压缩数据大小的 10% 到 15%。但请记住，内存 OLTP\
  \ 直到压缩行组中约 90% 的行过期后，才会释放这些行的旧版本。你应在分析中考虑数据的波动性，并微调 `compression_delay` 索引选项，将压缩推迟到数据变为静态时进行。\n\
  *   行版本控制内存估算取决于最长事务的持续时间和每秒平均数据修改（插入和更新）次数。例如，如果系统中的某些进程有持续 10 秒的事务，并且系统平均每秒处理\
  \ 10,000 次数据修改，你可以估算行版本控制存储需要 `10 * 10,000 * 248(行大小) = ∼24MB` 的内存。\n\n显然，以上数字概述了最低限度的内存量。你应该考虑未来的增长和工作负载的变化，并预留一些额外的内存以确保安全。\n\
  \n如前所述，同样重要的是要记住，内存 OLTP 并非在真空中运行；SQL Server 需要为其他组件提供足够的可用内存。请务必将此纳入你的分析。\n\n在系统中设计高可用性或灾难恢复策略时，你也应牢记内存\
  \ OLTP 的内存需求。常见的配置是，辅助或备用服务器使用比主服务器性能更低的硬件。这种方法有助于通过在灾难发生时允许系统以降级的性能运行来降低硬件成本。\n\
  \n如果你的数据库使用了内存 OLTP 技术，你必须极其谨慎地使用这种方法。辅助服务器上内存量不足可能会破坏节点间的同步，或导致你在灾难发生时无法恢复数据库。后一种情况也可能发生在你想将生产数据库的副本迁移到开发或测试环境时，而这些环境中的\
  \ SQL Server 没有足够的内存来容纳来自生产环境的内存 OLTP 数据。\n\n## 管理与监控任务\n\n让我们看看几个常见的与内存 OLTP 相关的数据库管理和监控任务。\n\
  \n### 限制可用于内存中 OLTP 的内存量\n\nSQL Server 的企业版允许你通过使用资源调控器来管理工作负载和系统资源消耗。在内部，资源调控器使用资源池，这些资源池代表可供\
  \ SQL Server 使用的物理资源的子集。你可以将每个资源池视为 SQL Server 内部的一个虚拟实例，并通过指定其参数来控制该资源池可用的资源。最后，你可以通过分类过程将工作负载分配到资源池之间，或更准确地说，分配到资源池的工作组之间。分类是基于用户定义的函数完成的，这允许你为此目的定义复杂的算法。\n\
  \n注意：你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/resource-governor`](https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/resource-governor)\
  \ 以及我的《Pro SQL Server Internal》一书中阅读更多关于资源调控器的信息。\n\n每个资源调控器配置都会创建两个预定义的资源池：`internal`\
  \ 和 `default`。顾名思义，`internal` 池处理 SQL Server 的内部工作负载，而 `default` 池处理未分类的工作负载，即所有未被分类到其他资源池的用户工作负载。你可以根据需要创建其他资源池。\n\
  \n如前所述，你可以通过指定参数来控制资源池之间的 CPU、内存和 I/O 分配，例如 `MIN_CPU_PERCENT` 和 `MAX_CPU_PERCENT`、`MIN_MEMORY_PERCENT`\
  \ 和 `MAX_MEMORY_PERCENT`、`AFFINITY` 以及其他一些参数。你可以将数据库绑定到资源池，对于内存中 OLTP 而言，这将允许你限制数据库中用于内存优化数据的内存量。每个数据库只能绑定到一个资源池；但是，多个数据库可以共享同一个池。在这种情况下，限制将适用于所有这些数据库。\n\
  \n一个资源池最多可以利用系统内存的 80%，这为可用于内存中 OLTP 的内存量设定了限制。该阈值保证了其他 SQL Server 组件有足够的系统内存可以工作，并确保系统在内存压力下保持稳定。\n\
  \n清单 12-2 说明了如何创建和配置资源池，允许其使用 40% 的系统内存。\n\n```sql\ncreate resource pool InMemoryDataPool\n\
  with\n(\nmin_memory_percent=40\n,max_memory_percent=40\n);\nalter resource governor\
  \ reconfigure;\n```\n\n清单 12-2. 创建一个资源池\n\n创建资源池后，你可以使用 `sys.sp_xtp_bind_db_resource_pool`\
  \ 存储过程将数据库绑定到它，如清单 12-3 所示。正如我提到的，这将允许内存中 OLTP 使用资源池内存的 80%。在我们的示例中，资源池内存使用被限制为\
  \ 40%，这允许内存中 OLTP 最多利用 40 * 0.80 = 32% 的系统内存。\n\n```sql\nexec sys.sp_xtp_bind_db_resource_pool\n\
  @database_name = 'InMemoryOLTPDemo'\n,@pool_name = 'InMemoryDataPool';\n-- 你需要将数据库脱机然后再联机\n\
  -- 以使更改生效\nalter database InMemoryOLTPDemo set offline;\nalter database InMemoryOLTPDemo\
  \ set online;\n```\n\n清单 12-3. 将数据库绑定到资源池\n\n不幸的是，将数据库绑定到资源池并不会自动将先前分配的内存转移到新池，你需要将数据库脱机然后再联机以实现这一点。请记住，这将导致一个恢复过程，对于大量的内存中\
  \ OLTP 数据，这个过程可能非常耗时。\n\n类似地，你可以通过调用 `sys.sp_xtp_unbind_db_resource_pool` 存储过程来移除绑定，如清单\
  \ 12-4 所示。调用后，数据库将绑定回默认资源池。\n\n```sql\nexec sys.sp_xtp_unbind_db_resource_pool\n\
  @database_name = 'InMemoryOLTPDemo';\n-- 你需要将数据库脱机然后再联机\n-- 以使更改生效\nalter database\
  \ InMemoryOLTPDemo set offline;\nalter database InMemoryOLTPDemo set online;\n```\n\
  \n清单 12-4. 移除数据库与资源池之间的绑定\n\n你应该记住，资源池的内存将在内存中 OLTP 数据和已分类到该资源池工作组的用户会话之间共享。如果池没有足够的工作空间内存来为查询分配内存授权，查询可能会因内存不足错误而失败，或者被阻塞并必须等待可用内存。将用于限制内存中\
  \ OLTP 内存的资源池与处理用户工作负载的池分开更安全。\n\n提示：你可以监控 `RESOURCE_SEMAPHORE` 等待、**内存授权挂起**性能计数器以及\
  \ `sys.dm_exec_query_resource_semaphores` 和 `sys.dm_exec_query_memory_grants` 视图，以排查与工作空间内存相关的问题。\n\
  \n\n### 监控内存优化表的内存使用情况\n\n您可以使用一组数据库管理视图，结合 SQL Server Management Studio 中的 **“内存优化对象的内存使用情况”**\
  \ 报告，来监控各种内存 OLTP 对象的内存使用情况。\n\n`sys.dm_db_xtp_table_memory_stats` 视图提供了当前数据库中用户和系统内存优化表的高层内存使用统计信息。代码清单\
  \ 12-5 展示了使用此视图的查询。\n\n```sql\nselect\n    ms.object_id\n    ,s.name + '.' + t.name\
  \ as [table]\n    ,ms.memory_allocated_for_table_kb\n    ,ms.memory_used_by_table_kb\n\
  \    ,ms.memory_allocated_for_indexes_kb\n    ,ms.memory_used_by_indexes_kb\nfrom\n\
  \    sys.dm_db_xtp_table_memory_stats ms\n    left outer join sys.tables t on\n\
  \        ms.object_id = t.object_id\n    left outer join sys.schemas s on\n    \
  \    t.schema_id = s.schema_id\norder by\n    ms.memory_allocated_for_table_kb desc\n\
  -- 代码清单 12-5.\n-- 使用 sys.dm_db_xtp_table_memory_stats 视图\n```\n\n图 12-2 展示了我在某个数据库上运行该查询时的输出结果。负的\
  \ `object_id` 值将表示系统表（未在输出中显示）。\n\n![A340879_2_En_12_Fig2_HTML.jpg](img/A340879_2_En_12_Fig2_HTML.jpg)\n\
  *图 12-2. sys.dm_db_xtp_table_memory_stats 视图的输出结果*\n\n**注意**\n您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-table-memory-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-table-memory-stats-transact-sql)\
  \ 阅读更多关于 `sys.dm_db_xtp_table_memory_stats` 视图的信息。\n\n`sys.dm_db_xtp_memory_consumers`\
  \ 视图提供了数据库级别内存使用者的详细信息。您已在第 6 章和第 7 章中见过此视图的实际应用，当时您用它来获取表内存使用者的信息。您可以对该视图的输出进行分组，以获取所需详细程度的内存使用信息。\n\
  \n代码清单 12-6 展示了提供每个内部对象 (`xtp_object_id`) 级别内存使用信息的查询。\n\n```sql\n;with MemConsumers(object_id,\
  \ xtp_object_id, alloc_mb, used_mb, allocs)\nas\n(\n    select\n        mc.object_id,\
  \ mc.xtp_object_id\n        ,convert(decimal(9,3),sum(mc.allocated_bytes) / 1024.\
  \ / 1024.)\n            as [allocated (MB)]\n        ,convert(decimal(9,3),sum(mc.used_bytes)\
  \ / 1024. / 1024.)\n            as [used (MB)]\n        ,sum(mc.allocation_count)\
  \ as [allocs]\n    from\n        sys.dm_db_xtp_memory_consumers mc\n    group by\n\
  \        mc.object_id, mc.xtp_object_id\n)\nselect\n    mc.object_id, mc.xtp_object_id\n\
  \    ,a.minor_id, a.type_desc\n    ,s.name + '.' + t.name  +\n        iif(a.minor_id\
  \ = 0,'','.' + col.Name)\n        as [Table/Column]\n    ,mc.allocs as [Allocations]\n\
  \    ,mc.alloc_mb as [Allocated (MB)]\n    ,mc.used_mb as [Used (MB)]\nfrom\n  \
  \  MemConsumers mc\n    join sys.memory_optimized_tables_internal_attributes a on\n\
  \        a.object_id = mc.object_id and\n        a.xtp_object_id = mc.xtp_object_id\n\
  \    left outer join sys.columns col on\n        a.object_id = col.object_id and\n\
  \        a.minor_id > 0 and\n        a.minor_id = col.column_id\n    left outer\
  \ join sys.tables t on\n        a.object_id = t.object_id\n    left outer join sys.schemas\
  \ s on\n        s.schema_id = t.schema_id\norder by\n    [Allocated (MB)] desc\n\
  -- 代码清单 12-6.\n-- 使用 sys.dm_db_xtp_memory_consumers 视图\n```\n\n图 12-3 展示了该查询的输出。如您所见，输出包含了为\
  \ LOB 列 `Delivery.Orders.Notes` 存储数据的内部表的一个单独行。\n\n![A340879_2_En_12_Fig3_HTML.jpg](img/A340879_2_En_12_Fig3_HTML.jpg)\n\
