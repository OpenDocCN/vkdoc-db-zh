  当我使用 `dbo.InsertRequestInfo_Memory` 存储过程重复测试时，情况发生了变化。该存储过程通过 **Interop Engine**（互操作引擎）向内存优化表插入数据。在
  300 个并发会话下，我将吞吐量推至极限，这比之前的测试会话数翻了一番。在此场景下，SQL Server 能够处理约每秒 74,000 个批处理/调用，吞吐量提升了超过
  16 倍。进一步增加并发会话数并未改变吞吐量；然而，随着会话数增加，每次调用的持续时间线性增长。


