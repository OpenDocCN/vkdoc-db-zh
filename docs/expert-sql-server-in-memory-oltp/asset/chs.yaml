  |

  | `begin tran` `select ID, Col` `from dbo.HKData` `with (snapshot)` | | |

  | | `begin tran` `update dbo.HKData` `with (snapshot)` `set Col = -3` `where ID
  = 2` | |

  | `update dbo.HKData` `with (snapshot)` `set Col = -2` `where ID = 2` | | 消息 41302，级别
