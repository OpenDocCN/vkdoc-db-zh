- "# 表 4-3. SELECT 语句执行时间（空桶开销）\n\n表 4-3 显示了我的环境中的执行时间。如你所见，扫描额外桶的开销并不显著；然而，它仍然存在。\n\
  \n| dbo.HashIndex_HighBucketCount (1,048,576 个桶) | dbo.HashIndex_LowBucketCount\
  \ (1,024 个桶) |\n| --- | --- |\n| 51 ms | 62 ms |\n\n同样值得注意的是，在大多数情况下，SQL Server\
  \ 2016 不会扫描哈希索引，而是使用表扫描操作符扫描表堆。我将在第 6 章更详细地讨论这一点。\n\n### 选择合适的桶计数\n\n在哈希索引中选择合适的桶数量是一个棘手但重要的主题。更糟糕的是，你必须在设计阶段做出正确的决定；一旦表创建完成后，更改`bucket_count`值的唯一方法是修改表，这会在后台创建新的表对象。\n\
  \n在理想情况下，你应该拥有超过索引基数（唯一键的数量）的桶数。显然，你还应该考虑未来的系统增长和预期的工作负载变化。如果你预计系统未来将处理更多数据，那么仅基于当前数据基数创建索引并不是一个好主意。\n\
  \n> **注意**\n> \n> 微软建议将`bucket_count`设置为索引中不同值数量的一到两倍。你可以在[此处](https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp/hash-indexes-for-memory-optimized-tables#configuring_bucket_count)阅读更多内容。\n\
  \n具有大量重复值的低基数列通常是哈希索引的糟糕候选者。相同的数据值会产生相同的哈希值；因此，行将被链接到长行链中。显然，总有例外，你应该分析系统中的查询和工作负载，并考虑长行链引入的数据修改开销。\n\
  \n在现有索引中，你可以分析`sys.dm_db_xpt_hash_index_stats`视图的输出以及清单 4-2 中的代码，以确定索引中的桶数是否足够。如果空桶的数量少于索引中桶总数的\
  \ 10%，那么桶计数可能太低。理想情况下，索引中至少 33%的桶应该是空的。\n\n尽管如此，谨慎起见，高估数量通常比低估要好。即使高估会影响索引扫描操作的性能，这种影响也远低于长行链带来的影响。显然，你需要记住，每个桶无论是否为空，都会使用\
  \ 8 字节的内存。\n\n> **注意**\n> \n> 我将在下一章讨论内存中 OLTP 索引的设计考虑因素以及哈希索引和非聚集索引之间的选择。\n\n##\
  \ 哈希索引与可搜索性\n\n在数据库领域，当谓词允许数据库引擎在查询执行期间利用索引查找操作时，它们被视为可搜索的。\n\n哈希索引与基于磁盘表上定义的 B-Tree\
  \ 索引具有不同的可搜索性规则。它们仅在点查找等值搜索的情况下是高效的，这允许 SQL Server 计算索引键（或多个键）的相应哈希值，并找到引用所需行链的桶。在任何其他场景中，例如使用`<`、`>`和`BETWEEN`谓词时，SQL\
  \ Server 都无法使用哈希索引的索引查找操作。这些谓词的评估需要比较索引键值，而这无法基于哈希值完成。\n\n对于复合哈希索引，SQL Server 会为所有键列组合的值计算哈希值。基于键列子集计算的哈希值将不同，因此，查询应对所有键列具有等值谓词，索引才有用。\n\
  \n此行为与基于磁盘表上的索引不同。考虑在`(LastName, FirstName)`列上定义索引的情况。对于基于磁盘的表，无论查询的`where`子句中是否指定了`FirstName`列上的谓词，该索引都可用于索引查找操作。或者，内存优化表上的复合哈希索引要求查询在`LastName`和`FirstName`上都有等值谓词，以便计算哈希值，从而选择索引中正确的哈希桶。\n\
  \n让我们创建基于磁盘和内存优化的表，它们在`(LastName, FirstName)`列上具有复合索引，并使用清单 4-5 中的相同数据进行填充。\n\n\
  ```sql\ncreate table dbo.CustomersOnDisk\n(\nCustomerId int not null identity(1,1),\n\
  FirstName varchar(64) not null,\nLastName varchar(64) not null,\nPlaceholder char(100)\
  \ null,\nconstraint PK_CustomersOnDisk\nprimary key clustered(CustomerId)\n);\n\
  create nonclustered index IDX_CustomersOnDisk_LastName_FirstName\non dbo.CustomersOnDisk(LastName,\
  \ FirstName)\ngo\ncreate table dbo.CustomersMemoryOptimized\n(\nCustomerId int not\
  \ null identity(1,1)\nconstraint PK_CustomersMemoryOptimized\nprimary key nonclustered\n\
  hash with (bucket_count = 32768),\nFirstName varchar(64) not null,\nLastName varchar(64)\
  \ not null,\nPlaceholder char(100) null,\nindex IDX_CustomersMemoryOptimized_LastName_FirstName\n\
  nonclustered hash(LastName, FirstName)\nwith (bucket_count = 1024),\n)\nwith (memory_optimized\
  \ = on, durability = schema_only)\ngo\n-- Inserting cross-joined data for all first\
  \ and last names 50 times\n-- using GO 50 command in Management Studio\n;with FirstNames(FirstName)\n\
  as\n(\nselect Names.Name\nfrom\n(\nvalues('Andrew'),('Andy'),('Anton'),('Ashley'),('Boris'),\n\
  ('Brian'),('Cristopher'),('Cathy'),('Daniel'),('Donny'),\n('Edward'),('Eddy'),('Emy'),('Frank'),('George'),('Harry'),\n\
  ('Henry'),('Ida'),('John'),('Jimmy'),('Jenny'),('Jack'),\n('Kathy'),('Kim'),('Larry'),('Mary'),('Max'),('Nancy'),\n\
  ('Olivia'),('Paul'),('Peter'),('Patrick'),('Robert'),\n('Ron'),('Steve'),('Shawn'),('Tom'),('Timothy'),\n\
  ('Uri'),('Vincent')\n) Names(Name)\n)\n,LastNames(LastName)\nas\n(\nselect Names.Name\n\
  from\n(\nvalues('Smith'),('Johnson'),('Williams'),('Jones'),('Brown'),\n('Davis'),('Miller'),('Wilson'),('Moore'),('Taylor'),\n\
  ('Anderson'),('Jackson'),('White'),('Harris')\n) Names(Name)\n)\ninsert into dbo.CustomersOnDisk(LastName,\
  \ FirstName)\nselect LastName, FirstName\nfrom FirstNames cross join LastNames\n\
  go 50\ninsert into dbo.CustomersMemoryOptimized(LastName, FirstName)\nselect LastName,\
  \ FirstName\nfrom dbo.CustomersOnDisk;\n```\n\n清单 4-5. 复合哈希索引：测试表创建\n\n\n对于第一次测试，让我们对两个表运行\
  \ `SELECT` 语句，在查询中同时指定 `LastName` 和 `FirstName` 作为谓词，如清单 4-6 所示。\n\n```\nselect\
  \ CustomerId, FirstName, LastName\nfrom dbo.CustomersOnDisk\nwhere FirstName = 'Paul'\
  \ and LastName = 'White';\nselect CustomerId, FirstName, LastName\nfrom dbo.CustomersMemoryOptimized\n\
  where FirstName = 'Paul' and LastName = 'White';\nListing 4-6.\n复合哈希索引：使用两个索引列作为谓词来选择数据\n\
  ```\n\n如图 4-6 所示，SQL Server 在两种情况下都能够使用索引查找操作。\n\n![A340879_2_En_4_Fig6_HTML.jpg](img/A340879_2_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6.\n\n复合哈希索引：当查询使用两个索引列作为谓词时的执行计划\n\n在下一步中，让我们检查一下，如果从查询中移除对 `FirstName` 的筛选会发生什么。清单\
  \ 4-7 显示了代码。\n\n```\nselect CustomerId, FirstName, LastName\nfrom dbo.CustomersOnDisk\n\
  where LastName = 'White';\nselect CustomerId, FirstName, LastName\nfrom dbo.CustomersMemoryOptimized\n\
  where LastName = 'White';\nListing 4-7.\n复合哈希索引：仅使用最左侧索引列选择数据\n```\n\n对于基于磁盘的索引，SQL\
  \ Server 仍然能够利用索引查找操作。但对于在内存优化表上定义的复合哈希索引，情况则不同。你可以在图 4-7 中看到查询的执行计划。\n\n![A340879_2_En_4_Fig7_HTML.jpg](img/A340879_2_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7.\n\n复合哈希索引：当查询仅使用最左侧索引列时的执行计划\n\n## 内存优化表的统计信息\n\nSQL Server 2016 会在内存优化表上创建并自动更新索引级和列级统计信息。但是，在兼容级别低于\
  \ 130（SQL Server 2016）的数据库下创建的表，其统计信息会启用 `NORECOMPUTE` 选项，这将阻止统计信息的自动更新。\n\n这种情况可能在两种情形下发生：内存优化表是在\
  \ SQL Server 2014 中创建的，后来迁移到了 SQL Server 2016；或者 SQL Server 2016 数据库在低于 130 的兼容级别下运行。\n\
  \n让我们来看看这种行为，并运行清单 4-8 中的代码。这段代码将数据库兼容级别更改为 120 并创建表 `dbo.Stats120`。接下来，它将兼容级别切换回\
  \ 130 并创建另一个表 `dbo.Stats130`。最后，代码查看表索引的统计信息属性。\n\n```\nalter database current set\
  \ compatibility_level=120;\ngo\ncreate table dbo.Stats120\n(\nId int not null\n\
  constraint PK_Stats120\nprimary key nonclustered\nhash with (bucket_count=1024),\n\
  Value int not null\n)\nwith (memory_optimized=on, durability=schema_only);\ngo\n\
  alter database current set compatibility_level=130;\ngo\ncreate table dbo.Stats130\n\
  (\nId int not null\nconstraint PK_Stats130\nprimary key nonclustered\nhash with\
  \ (bucket_count=1024),\nValue int not null\n)\nwith (memory_optimized=on, durability=schema_only);\n\
  go\nselect\nsc.name + '.' + t.name as [Table]\n,s.name as [Statistics]\n,s.no_recompute\n\
  from\nsys.stats s join sys.tables t on\ns.object_id = t.object_id\njoin sys.schemas\
  \ sc on\nt.schema_id = sc.schema_id\nwhere\nt.name like 'Stats%';\nListing 4-8.\n\
  统计信息 NORECOMPUTE 与兼容级别\n```\n\n如图 4-8 所示，`dbo.Stats120.PK_Stats120` 统计信息启用了 `NORECOMPUTE`\
  \ 选项，这将阻止该统计信息的自动更新。而 `dbo.Stats130.PK_Stats130` 统计信息则不同，它是在数据库兼容级别为 130 下创建的。\n\
  \n![A340879_2_En_4_Fig8_HTML.jpg](img/A340879_2_En_4_Fig8_HTML.jpg)\n\n图 4-8.\n\n\
  统计信息 NORECOMPUTE 选项\n\n你可以通过使用 `UPDATE STATISTICS` 语句手动更新受影响的统计信息来更改 `NORECOMPUTE`\
  \ 选项的值并启用统计信息自动更新。值得再次强调的是，统计信息的 `NORECOMPUTE` 选项是由创建表时的数据库兼容级别控制的，而不是由自动统计信息更新设置控制。具有\
  \ `NORECOMPUTE=OFF` 选项的统计信息将被自动更新，无论兼容级别如何，前提是启用了“自动更新统计信息”数据库选项。\n\n在将数据库从 SQL\
  \ Server 2014 迁移后，你应该手动更新内存优化表上的所有统计信息并启用统计信息自动更新。你可以通过运行清单 4-9 所示的代码来实现这一点。它为所有具有\
  \ `NORECOMPUTE=ON` 选项的统计信息生成 `UPDATE STATISTICS` 命令，并使用动态 SQL 运行它们。\n\n```\ndeclare\n\
  @SQL nvarchar(max)\nselect\n@SQL = convert(nvarchar(max),\n(\nselect\nN'update statistics\
  \ ' as [text()]\n,sc.name + N'.' + t.name as [text()]\n,N'(' + s.name + N'); ' as\
  \ [text()]\nfrom\nsys.stats s join sys.tables t on\ns.object_id = t.object_id\n\
  join sys.schemas sc on\nt.schema_id = sc.schema_id\nwhere\nt.is_memory_optimized\
  \ = 1 and\ns.no_recompute = 1\nfor xml path('')\n));\nexec sp_executesql @SQL;\n\
  Listing 4-9.\n更新所有具有 NORECOMPUTE=ON 的统计信息\n```\n\n\n\n与基于磁盘的表相比，内存优化表上统计信息缺失或不准确的影响可能稍小。内存优化表上的索引引用实际的数据行，并且本质上覆盖了查询。无论选择哪个索引，内存\
  \ OLTP 都不需要键查找操作来访问行数据。然而，当查询通过 Interop 引擎运行时，不正确的基数估计可能会影响查询内存授予的大小以及连接类型的选择。所有这些都可能导致次优的执行计划和糟糕的性能。\n\
  \n还有另一个不太明显的问题。当 SQL Server 为运算符选择内部和外部输入时，不准确的统计信息可能会在嵌套循环连接中引入次优的执行计划。如你所知，嵌套循环连接算法会为外部输入的每一行处理内部输入，并且将较小的输入放在外部更高效。列表\
  \ 4-10 展示了内部嵌套循环连接算法作为参考。\n\n```\nfor each row R1 in outer table\nfor each row R2\
  \ in inner table\nif R1 joins with R2\nreturn join (R1, R2)\nListing 4-10.\n内部嵌套循环连接算法\n\
  ```\n\n统计信息缺失可能导致 SQL Server 错误地选择内部和外部输入，从而产生效率极低的计划。\n\n让我们在数据库兼容级别为 120 的情况下创建两个表，并填充一些数据，如列表\
  \ 4-11 所示。如你所知，将使用`NORECOMPUTE=ON`选项创建统计信息，这会阻止统计信息自动更新。\n\n```\nalter database\
  \ current set compatibility_level=120;\ngo\ncreate table dbo.T1\n(\nID int not null\
  \ identity(1,1)\nprimary key nonclustered hash\nwith (bucket_count = 8192),\nT1Col\
  \ int not null,\nPlaceholder char(100) not null\nconstraint DEF_T1_Placeholder\n\
  default('1'),\nindex IDX_T1Col\nnonclustered hash(T1Col)\nwith (bucket_count = 1024)\n\
  )\nwith (memory_optimized = on, durability = schema_only);\ncreate table dbo.T2\n\
  (\nID int not null identity(1,1)\nprimary key nonclustered hash\nwith (bucket_count\
  \ = 8192),\nT2Col int not null,\nPlaceholder char(100) not null\nconstraint DEF_T2_Placeholder\n\
  default('2'),\nindex IDX_T2Col\nnonclustered hash(T2Col)\nwith (bucket_count = 1024)\n\
  )\nwith (memory_optimized = on, durability = schema_only);\n;with N1(C) as (select\
  \ 0 union all select 0) -- 2 rows\n,N2(C) as (select 0 from N1 as t1 cross join\
  \ N1 as t2) -- 4 rows\n,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) --\
  \ 16 rows\n,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows\n\
  ,N5(C) as (select 0 from N4 as t1 cross join N3 as t2) -- 4,096 rows\n,Ids(Id) as\
  \ (select row_number() over (order by (select null)) from N5)\ninsert into dbo.T1(T1Col)\n\
  select 1 from Ids;\ninsert into dbo.T2(T2Col)\nselect -1 from dbo.T1;\nupdate dbo.T1\
  \ set T1Col = 2 where ID = 4096;\nupdate dbo.T2 set T2Col = -2 where ID = 1;\nListing\
  \ 4-11.\n统计信息缺失与低效执行计划：表创建\n```\n\n两个表中的数据分布不均。你可以通过运行列表 4-12 中的查询来确认这一点。图 4-9 说明了表中的数据分布。\n\
  \n![A340879_2_En_4_Fig9_HTML.jpg](img/A340879_2_En_4_Fig9_HTML.jpg)\n\n图 4-9.\n\
  统计信息缺失与低效执行计划：数据分布\n\n```\nselect 'T1' as [Table], T1Col as [Value], count(*) as\
  \ [Count]\nfrom dbo.T1\ngroup by T1Col\nunion all\nselect 'T2' as [Table], T2Col\
  \ as [Value], count(*) as [Count]\nfrom dbo.T2\ngroup by T2Col;\nListing 4-12.\n\
  统计信息缺失与低效执行计划：检查表中的数据分布\n```\n\n接下来，让我们运行两个连接表中数据的查询，如列表 4-13 所示。两个查询都将只返回一行。\n\n\
  ```\nselect *\nfrom dbo.T1 t1 join dbo.T2 t2 on\nt1.ID = t2.ID\nwhere\nt1.T1Col\
  \ = 2 and\nt2.T2Col = -1;\nselect *\nfrom dbo.T1 t1 join dbo.T2 t2 on\nt1.ID = t2.ID\n\
  where\nt1.T1Col = 1 and\nt2.T2Col = -2\nListing 4-13.\n统计信息缺失与低效执行计划：测试查询\n```\n\
  \n如你在图 4-10 中所见，SQL Server 为两个查询生成了相同的执行计划，都使用`dbo.T1`表作为连接的外部部分。这个计划对第一个查询非常高效；只有一行`T1Col\
