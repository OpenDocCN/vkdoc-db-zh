- '# 代码清单 4-2. 获取哈希索引信息


  代码清单 4-2 展示了使用 `sys.dm_db_xtp_hash_index_stats` 视图返回桶计数和行链信息的查询。请记住，此视图会扫描整个表，当表很大时，这非常耗时。


  ```sql

  select

  s.name + ''.'' + t.name as [Table]

  ,i.name as [Index]

  ,stat.total_bucket_count as [Total Buckets]

  ,stat.empty_bucket_count as [Empty Buckets]

  ,floor(100\. * empty_bucket_count / total_bucket_count)

  as [Empty Bucket %]

  ,stat.avg_chain_length as [Avg Chain]

  ,stat.max_chain_length as [Max Chain]

  from

  sys.dm_db_xtp_hash_index_stats stat

  join sys.tables t on

  stat.object_id = t.object_id

  join sys.indexes i on

  stat.object_id = i.object_id and

  stat.index_id = i.index_id

  join sys.schemas s on

  t.schema_id = s.schema_id

  ```


  '
- '# 图 4-4. sys.dm_db_xtp_hash_index_stats 输出


  图 4-4 展示了该查询的输出。如你所见，`dbo.HashIndex_HighBucketCount` 表的行链中平均每行只有一行，而 `dbo.HashIndex_LowBucketCount`
  表的每个链中几乎有 1,000 行。值得注意的是，尽管内存中 OLTP 使用的哈希函数提供了相对良好的随机数据分布，但仍存在一定水平的哈希冲突。


  ![A340879_2_En_4_Fig4_HTML.jpg](img/A340879_2_En_4_Fig4_HTML.jpg)


  不正确的桶计数估算和过长的行链会显著影响读取和写入查询的性能。你已经看到了插入操作的性能影响。现在让我们看一个 `SELECT` 查询。


  '
- '# 代码清单 4-3. 桶计数与性能：在表中选择数据


  代码清单 4-3 展示了在每个内存优化表中触发 65,536 次索引查找操作的代码。我以一种效率非常低的方式编写了这个查询，只是为了演示长行链的影响。


  ```sql

  declare

  @T table(Id int not null primary key)

  ;with N1(C) as (select 0 union all select 0) -- 2 rows

  ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

  ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

  ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

  ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

  ,Ids(Id) as (select row_number() over (order by (select null)) from N5)

  insert into @T(Id)

  select Id from Ids;

  select t.id, c.Cnt

  from @T t

  cross apply

  (

  select count(*) as Cnt

  from dbo.HashIndex_HighBucketCount h

  where h.Id = t.Id

  ) c;

  select t.id, c.Cnt

  from @T t

  cross apply

  (

  select count(*) as Cnt

  from dbo.HashIndex_LowBucketCount h

  where h.Id = t.Id

  ) c;

  ```


  你可以通过分析图 4-5 中所示的执行计划来确认，这些查询遍历了 65,536 次行链。


