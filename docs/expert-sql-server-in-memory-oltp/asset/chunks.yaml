  trans: '

    ### 清单 8-3. 数据修改操作


    ```sql

    insert into dbo.HKData with (snapshot) (ID, Col) values(10,10);

    update dbo.HKData with (snapshot) set Col = -2 where ID = 2;

    delete from dbo.HKData with (snapshot) where ID = 4;

    ```


    ### 图 8-3. 修改后 dbo.HKData 表中的数据


    图 8-3 展示了数据修改后的状态。一条 `INSERT` 语句创建了一个新行，一条 `DELETE` 语句更新了 `ID=4` 的行中的 `EndTs`
    值，而一条 `UPDATE` 语句更改了 `ID=2` 的行的 `EndTs` 值，并创建了一个具有相同 `ID` 的新版本行。


    ![A340879_2_En_8_Fig3_HTML.jpg](img/A340879_2_En_8_Fig3_HTML.jpg)


    需要注意的是，事务维护一个**写入集**，即指向事务插入和删除的行的指针，用于生成事务日志记录。


    除了写入集，在 `REPEATABLE READ`（可重复读）和 `SERIALIZABLE`（可序列化）隔离级别下，事务还维护一个**读取集**，其中包含事务读取的行，并用其进行可重复读验证。最后，在
    `SERIALIZABLE` 隔离级别下，事务维护一个**扫描集**，其中包含事务中查询所使用的谓词信息。扫描集用于进行可序列化验证。


    当发出 `COMMIT`（提交）请求时，事务开始验证阶段。首先，它会自动递增当前的全局事务时间戳值，该值成为事务的逻辑结束时间。图 8-4 展示了此状态，假设新的全局事务时间戳值为
    11。请注意，在此阶段，行中的 `BeginTs` 和 `EndTs` 时间戳仍然具有 `TransactionId`（事务 ID）。


    ### 图 8-4. 验证阶段开始


    ![A340879_2_En_8_Fig4_HTML.jpg](img/A340879_2_En_8_Fig4_HTML.jpg)


    此时，即使事务尚未提交，被事务修改的行也对系统中的其他事务可见，这可能导致提交依赖。稍后我将再次讨论它们。


    作为下一步，SQL Server 根据事务的隔离级别执行若干验证，如表 8-9 所示。


    ### 表 8-9. 在不同事务隔离级别执行的验证


    |   | 快照验证 | 可重复读验证 | 可序列化验证 |

    | --- | --- | --- | --- |

    |   | 检查主键冲突 | 检查不可重复读 | 检查幻读 |

    | `SNAPSHOT` | 是 | 否 | 否 |

    | `REPEATABLE READ` | 是 | 是 | 否 |

    | `SERIALIZABLE` | 是 | 是 | 是 |


    **重要提示：** 可重复读和可序列化验证会给系统增加开销。除非您有合理的用例需要此类数据一致性，否则不要使用 `REPEATABLE READ` 和 `SERIALIZABLE`
    隔离级别。


    在完成所需规则的验证后，事务会等待其提交依赖清除以及它所依赖的事务提交。如果那些事务因任何原因未能提交（例如，违反了验证规则），则依赖事务也会回滚，并生成错误
    41301。


    ### 图 8-5. 提交依赖：成功提交


    图 8-5 展示了一个提交依赖场景。事务 `Tx2` 可以在 `Tx1` 的验证和提交阶段访问 `Tx1` 的未提交行；因此，`Tx2` 对 `Tx1` 存在提交依赖。`Tx2`
    的验证阶段完成后，`Tx2` 必须等待 `Tx1` 提交且提交依赖清除，才能进入提交阶段。


    ![A340879_2_En_8_Fig5_HTML.jpg](img/A340879_2_En_8_Fig5_HTML.jpg)


    如果 `Tx1` 因可序列化验证违规而未能提交，`Tx2` 将随错误 41301 一起回滚，如图 8-6 所示。


    ### 图 8-6. 提交依赖：验证错误


    ![A340879_2_En_8_Fig6_HTML.jpg](img/A340879_2_En_8_Fig6_HTML.jpg)


    **注意：** 从技术上讲，提交依赖是内存中 OLTP 中的一种阻塞情况。但是，事务的验证和提交阶段相对较短，这种阻塞不应过度。


    SQL Server 允许单个事务最多有八个提交依赖。当达到此数量时，其他尝试获取依赖的事务将失败，并出现错误 41839。


    **注意：** 您可以使用 `dependency_acquiredtx_event` 和 `waiting_for_dependenciestx_event`
    扩展事件来跟踪提交依赖。


    当所有提交依赖都清除后，事务进入提交阶段，生成一个或多个日志记录，并将它们保存到事务日志，随后进入提交后阶段。我将在第 10 章更详细地讨论事务日志记录。


    在提交后阶段，事务用逻辑结束时间值替换 `BeginTs` 和 `EndTs` 时间戳，并递减依赖事务中的提交依赖计数器。图 8-7 展示了事务的最终状态。


    ### 图 8-7. 已完成的事务


    ![A340879_2_En_8_Fig7_HTML.jpg](img/A340879_2_En_8_Fig7_HTML.jpg)


    最后，当事务因显式的 `ROLLBACK` 命令或验证违规而回滚时，内存中 OLTP 会将被删除行的 `EndTs` 时间戳重置为无穷大。由事务插入的行的新版本将成为**幽灵行**。它们将通过常规的垃圾回收过程来释放，我将在第
    11 章讨论这个过程。

    '
- fmt: '# Referential Integrity Enforcement


    It is impossible to enforce referential integrity in a pure `SNAPSHOT` isolation
    level because transactions are completely isolated from each other. Consider the
    situation when a transaction deletes a row that is referenced by a newly inserted
    row in another transaction that started after the original one. `SNAPSHOT` isolation
    level would prevent transactions to see the changes, which would violate referential
    integrity.


    In-Memory OLTP addresses this problem by maintaining read and/or scan sets in
    the `SNAPSHOT` isolation level for the tables and queries that were affected by
    referential integrity validation. In contrast to `REPEATABLE READ` and `SERIALIZABLE`
    transactions, those sets are maintained only for affected tables rather than for
    entire transactions. They, however, would include all rows that were read and
    predicates that were applied during the referential integrity check.


    This behavior can lead to issues when the referencing table does not have an index
    on the foreign key column (or columns). Similar to disk-based tables, SQL Server
    will have to scan the entire referencing (detail) table when you delete a row
    in the referenced (master) table. In addition to a performance impact, the transaction
    will maintain the read set, which includes all rows it read during the scan, regardless
    of whether those rows referenced a deleted row or not. If any other transactions
    update or delete any rows from the read set, the original transaction would fail
    with a repeatable read rule violation error.


    Let’s look at the example and create two tables with the code in Listing 8-4.


    ```sql

    create table dbo.Branches

    (

    BranchId int not null

    constraint PK_Branches

    primary key nonclustered hash with (bucket_count = 4)

    )

    with (memory_optimized = on, durability = schema_only);

    create table dbo.Transactions

    (

    TransactionId int not null

    constraint PK_Transactions

    primary key nonclustered hash with (bucket_count = 4),

    BranchId int not null

    constraint FK_Transactions_Branches

    foreign key references dbo.Branches(BranchId),

    Amount money not null

    )

    with (memory_optimized = on, durability = schema_only);

    insert into dbo.Branches(BranchId) values(1),(10);

    insert into dbo.Transactions(TransactionId,BranchId,Amount)

    values(1,1,10),(2,1,20);

    ```

    Listing 8-4.

    Referential Integrity Validation: Tables Creation


    The `dbo.Transactions` table has a foreign key constraint referencing the `dbo.Branches`
    table. There are no rows, however, referencing the row with `BranchId = 10`. As
    the next step, let’s run the code shown in Listing 8-5, deleting this row and
    leaving the transaction active.


    ```sql

    begin tran

    delete from dbo.Branches with (snapshot) where BranchId = 10;

    ```

    Listing 8-5.

    Referential Integrity Validation: First Session Code


    The `DELETE` statement would validate the foreign key constraint and would complete
    successfully. The `dbo.Transactions` table, however, does not have an index on
    the `BranchId` column, and the validation will require you to scan the entire
    table, as you can see in Figure 8-8.


    ![A340879_2_En_8_Fig8_HTML.jpg](A340879_2_En_8_Fig8_HTML.jpg)


    Figure 8-8.

    Referential integrity validation: execution plan of DELETE statement


    At this time, all rows from the `dbo.Transactions` table would be included to
    the transaction read set. If another session updated one of the rows from the
    read set with the code shown in Listing 8-6, it would succeed, and the first session
    would fail to commit with a repeatable read rule violation error.


    ```sql

    update dbo.Transactions with (snapshot)

    set Amount = 30

    where TransactionId = 2;

    ```

    Listing 8-6.

    Referential Integrity Validation: Second Session Code


    Important


    Similar to disk-based tables, you should always create an index on the foreign
    key columns in the referencing table to avoid this problem.


    ## Summary


    In-Memory OLTP supports three transaction isolation levels, `SNAPSHOT`, `REPEATABLE
    READ`, and `SERIALIZABLE`. In contrast to disk-based tables, where nonrepeatable
    and phantom reads are addressed by acquiring and holding the locks, In-Memory
    OLTP validates data consistency rules at the transaction commit phase. An exception
    will be raised and the transaction will be rolled back if rules are violated.


    Repeatable read and serializable validations add overhead to transaction processing.
    It is recommended that you use the `SNAPSHOT` isolation level during a regular
    workload unless you require `REPEATABLE READ` or `SERIALIZABLE` data consistency.


    SQL Server performs repeatable read and serializable validations to enforce referential
    integrity in the system. Always create an index on the foreign key columns in
    the referencing tables to improve performance and avoid validation errors.


    You can use different transaction isolation levels for disk-based and memory-optimized
    tables in cross-container transactions; however, not all combinations are supported.
    The recommended practice is to use the `READ COMMITTED` isolation level for disk-based
    tables and the `SNAPSHOT` isolation level for memory-optimized tables.


    SQL Server does not require you to specify the transaction isolation level when
    you access memory-optimized tables through the Interop Engine in autocommitted
    (single statement) transactions. SQL Server automatically promotes such transactions
    to the `SNAPSHOT` isolation level. However, you should specify an isolation level
    hint when a transaction is explicitly started with the `BEGIN TRAN` statement.
    You can avoid this by enabling the `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT` database
    option. This option is useful when you port the existing system to use In-Memory
    OLTP.


    ## 9. In-Memory OLTP Programmability


    This chapter focuses on the programmability aspects of the In-Memory OLTP Engine
    in SQL Server. It describes the process of native compilation, and it provides
    an overview of the natively compiled modules and T-SQL features that are supported
    in In-Memory OLTP. Finally, this chapter compares the performance of several use
    cases that work with the data in memory-optimized tables using natively compiled
    modules and interpreted T-SQL with the Interop Engine.'
