    the page pointer in the mapping table, which avoids changing internal pages that
    reference an old (obsolete) page.


    Every time SQL Server needs to change a leaf-level index page, it creates one
    or two delta records that represent the changes. `INSERT` and `DELETE` operations
    generate a single insert or delete delta record, while an `UPDATE` operation generates
    two delta records, deleting old value and inserting new value. Delta records for
    the same index page are linked through a chain of memory pointers with the last
    pointer to the actual index page. SQL Server also replaces a pointer in the mapping
    table with the address of the first delta record in the chain.


    Figure [5-4](#A340879_2_En_5_Chapter.html#Fig4) shows an example of a leaf-level
    page and delta records if the following actions occurred in this sequence: the
    R1 index row is updated, the R2 row is deleted, and the R3 row is inserted.


    ![A340879_2_En_5_Fig4_HTML.jpg](A340879_2_En_5_Fig4_HTML.jpg)


    Figure 5-4.


    Delta records and nonclustered index leaf page Note


    The internal implementation of the In-Memory OLTP Engine guarantees that multiple
    sessions cannot simultaneously update memory pointers in the various In-Memory
    OLTP objects, thereby overwriting each other’s changes. I will cover this process
    in detail in Appendix A.


    The internal and leaf pages of nonclustered indexes consist of two areas: a header
    and data. The header area includes information about the page such as the following:


    *   PID: The position (offset) in the mapping table

    *   Page type: The type of page, such as leaf, internal, delta, or special

    *   Right-page PID: The position (offset) of the next page in the mapping table

    *   Height: The number of levels from the current page to the leaf level of the
    index

    *   Key values: The number of key values (index rows) stored on the page

    *   Delta record statistics: The number of delta records and space used by the
    delta key values

    *   Max key value: The max value of a key on the page


    The data area of the page includes either two or three arrays depending on the
    index key data types. The arrays are as follows:


    *   Values: An array of 8-byte pointers. Internal pages store the PID of next-level
    pages. Leaf-level pages store pointers to the first row in the row chain with
    the corresponding key value. It is worth noting that even though the PID requires
    4 bytes to store a value, SQL Server uses 8-byte elements to preserve the same
    page structure between internal and leaf pages.

    *   Keys: An array of key values stored on the page.

    *   Offsets: An array of 2-byte offsets where the individual key values in the
    keys array start. Offsets are stored only if the keys have variable-length data.


    Delta records, in a nutshell, are one-record index data pages. The structure of
    delta data pages is similar to the structure of internal and leaf pages. However,
    instead of arrays of values and keys, delta data pages store operation code (insert
    or delete) and a single key value and pointer to the first data row in a row chain.


    Figure [5-5](#A340879_2_En_5_Chapter.html#Fig5) shows an example of a leaf-level
    index page with an insert delta record for `Bob`. The delta record points to the
    leaf-level index page to which the value `Bob` logically belongs, and it also
    has the pointer to the row chain of the data rows with the index key values of
    `Bob`. Conceptually, you can think about an insert delta record as the leaf-level
    index row, which is physically separated from the leaf-level index page. A delete
    delta record, on the other hand, indicates that the leaf-level index row has been
    deleted.


    ![A340879_2_En_5_Fig5_HTML.jpg](A340879_2_En_5_Fig5_HTML.jpg)


    Figure 5-5.


    A leaf-level index page with an insert delta record


    SQL Server needs to traverse and analyze all delta records when accessing an index
    page. As you can guess, a long chain of delta records affects performance. When
    this is the case, SQL Server consolidates delta records and rebuilds an index
    page, creating a new one. The newly created page has the same PID and replaces
    the old page, which is marked for garbage collection. Replacement of the page
    is accomplished by changing a pointer in the mapping table. SQL Server does not
    need to change internal pages because they use the mapping table to reference
    leaf-level pages.


    The process of rebuilding is triggered at the moment a new delta record is created
    for pages that already have 16 delta records in a chain. The action described
    by the delta record, which triggers the rebuild, is incorporated into the newly
    created page.


    Two other processes can create new or delete existing index pages, in addition
    to delta records consolidation. The first process, page splitting , occurs when
    a page does not have enough free space to accommodate a new data row. Another
    process, page merging, occurs when a delete operation leaves an index page less
    than 10 percent from the maximum page size, which is 8KB now, or when an index
    page contains just a single row.


    Note


    I will cover the page splitting and page merging processes in depth in Appendix
    B.'
  trans: '

    ### 索引页与增量记录


    如前所述，非聚集索引中的页面一旦构建完成就是不可变的。当需要更新时，SQL Server 会构建一个该页面的新版本，并替换映射表中的页面指针，这样就避免了更改引用旧（已废弃）页面的内部页面。


    每当 SQL Server 需要更改一个叶级索引页时，它会创建一到两个表示该更改的增量记录。`INSERT` 和 `DELETE` 操作会生成单个插入或删除增量记录，而
    `UPDATE` 操作会生成两个增量记录：一个删除旧值，另一个插入新值。同一索引页的增量记录通过一个内存指针链链接起来，链中的最后一个指针指向实际的索引页。SQL
    Server 还会用链中第一个增量记录的地址替换映射表中的指针。


    图 5-4 展示了一个叶级页面和增量记录的示例，该示例基于以下按顺序发生的操作：更新了 R1 索引行，删除了 R2 行，并插入了 R3 行。


    ![A340879_2_En_5_Fig4_HTML.jpg](img/A340879_2_En_5_Fig4_HTML.jpg)


    图 5-4.

    增量记录与非聚集索引叶级页面


    > 注意

    > 内存 OLTP 引擎的内部实现保证了多个会话不能同时更新各种内存 OLTP 对象中的内存指针，从而避免彼此覆盖对方的更改。我将在附录 A 中详细讨论此过程。


    非聚集索引的内部页和叶级页由两个区域组成：头部和数据。头部区域包含有关页面的信息，例如：


    *   `PID`：在映射表中的位置（偏移量）

    *   `Page type`：页面类型，如叶级、内部、增量或特殊页面

    *   `Right-page PID`：映射表中下一个页面的位置（偏移量）

    *   `Height`：从当前页面到索引叶级的层数

    *   `Key values`：页面上存储的键值（索引行）数量

    *   `Delta record statistics`：增量记录的数量及增量键值所使用的空间

    *   `Max key value`：页面上键的最大值


    页面的数据区域根据索引键数据类型的不同，包含两个或三个数组。这些数组如下：


    *   `Values`：一个 8 字节指针数组。内部页存储下一级页面的 PID。叶级页存储指向具有相应键值的行链中第一行的指针。值得注意的是，尽管 PID
    需要 4 字节来存储一个值，但 SQL Server 使用 8 字节元素以保持内部页和叶级页之间页面结构的一致。

    *   `Keys`：页面上存储的键值数组。

    *   `Offsets`：一个 2 字节数组，包含 `Keys` 数组中各个键值的起始偏移量。只有当键包含可变长度数据时才会存储偏移量。


    简而言之，增量记录是单记录的索引数据页。增量数据页的结构与内部页和叶级页的结构相似。但是，增量数据页不存储 `Values` 和 `Keys` 数组，而是存储操作码（`insert`
    或 `delete`）、单个键值以及指向行链中第一行数据的指针。


    图 5-5 展示了一个叶级索引页的示例，其中包含一个针对 `Bob` 的插入增量记录。该增量记录指向 `Bob` 值在逻辑上所属的叶级索引页，并且它还具有指向索引键值为
    `Bob` 的数据行链的指针。从概念上讲，您可以将插入增量记录视为叶级索引行，但它在物理上与叶级索引页是分离的。另一方面，删除增量记录则表明该叶级索引行已被删除。


    ![A340879_2_En_5_Fig5_HTML.jpg](img/A340879_2_En_5_Fig5_HTML.jpg)


    图 5-5.

    带有一个插入增量记录的叶级索引页


    当访问索引页时，SQL Server 需要遍历并分析所有增量记录。可以想见，过长的增量记录链会影响性能。在这种情况下，SQL Server 会合并增量记录并重建索引页，创建一个新的页面。新创建的页面具有相同的
    `PID` 并替换旧页面，旧页面则被标记为待垃圾回收。页面的替换通过更改映射表中的指针来完成。SQL Server 不需要更改内部页，因为它们使用映射表来引用叶级页。


    重建过程在以下时刻触发：当一个页面链中已有 16 个增量记录时，又为该页面创建了一个新的增量记录。触发重建的增量记录所描述的操作会被合并到新创建的页面中。


    除了增量记录合并外，还有两个其他过程可以创建新的或删除现有的索引页。第一个过程是 `page splitting`，当页面没有足够的空闲空间来容纳新的数据行时发生。另一个过程是
    `page merging`，当删除操作导致索引页的占用空间低于最大页面大小（目前为 8KB）的 10%，或者当索引页仅包含单个行时发生。


    > 注意

    > 我将在附录 B 中深入讨论 `page splitting` 和 `page merging` 过程。

    '
- fmt: "# Obtaining Information About Nonclustered Indexes\n\nIn addition to the `sys.dm_db_xtp_hash_index_stats`\
    \ view, which was discussed in Chapter 4, SQL Server provides two other views\
    \ to obtain information about indexes on memory-optimized tables. Those views\
    \ provide the data collected since the memory-optimized tables were loaded into\
    \ memory, which occurs at database startup.\n\n## Using `sys.dm_db_xtp_index_stats`\n\
    \nYou can obtain information about index access methods and ghost rows in both\
    \ hash and nonclustered indexes with the `sys.dm_db_xtp_index_stats` view. The\
    \ notable columns in the view are the following:\n\n*   `xtp_object_id` corresponds\
    \ to the internal ID of the In-Memory OLTP object. This value may change when\
    \ you alter the table, which rebuilds the table in the background.\n*   `scans_started`\
    \ shows the number of times that row chains in the index were scanned. Because\
    \ of the nature of the index, every operation, such as `SELECT`, `INSERT`, `UPDATE`,\
    \ and `DELETE`, requires SQL Server to scan a row chain and increment this column.\n\
    *   `rows_returned` represents the cumulative number of rows returned to the next\
    \ operator in the execution plan. It does not necessarily match the number of\
    \ rows returned to a client because further operators in the execution plan can\
    \ change it.\n*   `rows_touched` represents the cumulative number of rows accessed\
    \ in the index.\n*   `rows_expired` shows the number of detected stale rows. I\
    \ will discuss this in greater detail when I talk about the garbage collection\
    \ process in Chapter 11.\n*   `rows_expired_removed` returns the number of stale\
    \ rows that have been unlinked from the index row chains. I will also discuss\
    \ this in more detail when I talk about garbage collection.\n\nListing 5-7 shows\
    \ the query that returns the information about indexes defined on the `dbo.Customers`\
    \ table.\n\n```sql\nselect\n    s.name + '.' + t.name as [table],\n    i.index_id,\n\
    \    i.name as [index],\n    i.type_desc as [type],\n    st.scans_started,\n \
    \   st.rows_returned,\n    iif(st.scans_started = 0, 0, floor(st.rows_returned\
    \ / st.scans_started)) as [rows per scan]\nfrom\n    sys.dm_db_xtp_index_stats\
    \ st\n    join sys.tables t on st.object_id = t.object_id\n    join sys.indexes\
    \ i on st.object_id = i.object_id and st.index_id = i.index_id\n    join sys.schemas\
    \ s on s.schema_id = t.schema_id\nwhere\n    s.name = 'dbo' and t.name = 'Customers'\n\
    ```\n\n**Listing 5-7.** Querying the `sys.dm_db_xtp_index_stats` View\n\nFigure\
    \ 5-6 illustrates the output of the query. A large number of rows per scan can\
    \ indicate heavy index scans, which can be the sign of a suboptimal indexing strategy\
    \ and/or poorly written queries.\n\n![Output from the sys.dm_db_xtp_index_stats\
    \ view](A340879_2_En_5_Fig6_HTML.jpg)\n\nIt is also important to note that the\
    \ view returns the row for the table heap object (`index_id=0`). This heap allocates\
    \ the memory for data rows in the table. In-Memory OLTP accesses this heap at\
    \ the time of Table Scan operations. I will discuss it in detail in the next chapter.\n\
    \n> **Note**\n> You can read more about the `sys.dm_db_xtp_index_stats` view at\
    \ [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql).\n\
    \n## Using `sys.dm_db_xtp_nonclustered_index_stats`\n\nThe `sys.dm_db_xtp_nonclustered_index_stats`\
    \ view returns information about nonclustered indexes. It includes information\
    \ about the total number of pages in the index along with page splits, merges,\
    \ and consolidation-related statistics.\n\nListing 5-8 shows information about\
    \ nonclustered indexes defined on the `dbo.Customers` table. Figure 5-7 shows\
    \ the output of the query.\n\n![Output from the sys.dm_db_xtp_nonclustered_index_stats\
    \ view](A340879_2_En_5_Fig7_HTML.jpg)\n\n```sql\nselect\n    s.name + '.' + t.name\
    \ as [table],\n    i.index_id,\n    i.name as [index],\n    i.type_desc as [type],\n\
    \    st.delta_pages,\n    st.leaf_pages,\n    st.internal_pages,\n    st.leaf_pages\
    \ + st.delta_pages + st.internal_pages as [total pages]\nfrom\n    sys.dm_db_xtp_nonclustered_index_stats\
    \ st\n    join sys.tables t on st.object_id = t.object_id\n    join sys.indexes\
    \ i on st.object_id = i.object_id and st.index_id = i.index_id\n    join sys.schemas\
    \ s on s.schema_id = t.schema_id\nwhere\n    s.name = 'dbo' and t.name = 'Customers'\n\
    ```\n\n**Listing 5-8.** Querying the `sys.dm_db_xtp_nonclustered_index_stats`\
    \ View\n\n> **Note**\n> You can read more about the `sys.dm_db_xtp_nonclustered_index_stats`\
    \ view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql).\n\
    \n## Index Design Considerations\n\nWith the exception of the unidirectional nature\
    \ of Bw-Tree indexes, nonclustered indexes on memory-optimized tables behave similarly\
    \ to the indexes on disk-based tables. They also cover all in-row columns in the\
    \ table, which simplifies the indexing process.\n\nThere are a couple of aspects\
    \ of their behavior, however, that I want to mention."
  raw: '## Obtaining Information About Nonclustered Indexes


    In addition to the `sys.dm_db_xtp_hash_index_stats` view, which was discussed
    in Chapter [4](#A340879_2_En_4_Chapter.html), SQL Server provides two other views
    to obtain information about indexes on memory-optimized tables. Those views provide
    the data collected since the memory-optimized tables were loaded into memory,
    which occurs at database startup.


    You can obtain information about index access methods and ghost rows in both hash
    and nonclustered indexes with the `sys.dm_db_xtp_index_stats` view. The notable
    columns in the view are the following:


    *   `xtp_object_id` corresponds to the internal ID of the In-Memory OLTP object.
    This value may change when you alter the table, which rebuilds the table in the
    background.

    *   `scans_started` shows the number of times that row chains in the index were
    scanned. Because of the nature of the index, every operation, such as `SELECT`,
    `INSERT`, `UPDATE`, and `DELETE`, requires SQL Server to scan a row chain and
    increment this column.

    *   `rows_returned` represents the cumulative number of rows returned to the next
    operator in the execution plan. It does not necessarily match the number of rows
    returned to a client because further operators in the execution plan can change
    it.

    *   `rows_touched` represents the cumulative number of rows accessed in the index.

    *   `rows_expired` shows the number of detected stale rows. I will discuss this
    in greater detail when I talk about the garbage collection process in Chapter
    [11](#A340879_2_En_11_Chapter.html).

    *   `rows_expired_removed` returns the number of stale rows that have been unlinked
    from the index row chains. I will also discuss this in more detail when I talk
    about garbage collection.


    Listing [5-7](#A340879_2_En_5_Chapter.html#Par65) shows the query that returns
    the information about indexes defined on the `dbo.Customers` table.


    ```

    select

    s.name + ''.'' + t.name as [table]

    ,i.index_id

    ,i.name as [index]

    ,i.type_desc as [type]

    ,st.scans_started

    ,st.rows_returned

    ,iif(st.scans_started = 0, 0,

    floor(st.rows_returned / st.scans_started))

    as [rows per scan]

    from

    sys.dm_db_xtp_index_stats st join sys.tables t on

    st.object_id = t.object_id

    join sys.indexes i on

    st.object_id = i.object_id and

    st.index_id = i.index_id

    join sys.schemas s on

    s.schema_id = t.schema_id

    where

    s.name = ''dbo'' and t.name = ''Customers''

    Listing 5-7.

    Querying the sys.dm_db_xtp_index_stats View

    ```


    Figure [5-6](#A340879_2_En_5_Chapter.html#Fig6) illustrates the output of the
    query. A large number of rows per scan can indicate heavy index scans, which can
    be the sign of a suboptimal indexing strategy and/or poorly written queries.


    ![A340879_2_En_5_Fig6_HTML.jpg](A340879_2_En_5_Fig6_HTML.jpg)


    Figure 5-6.


    Output from the sys.dm_db_xtp_index_stats view


    It is also important to note that the view returns the row for the table heap
    object (`index_id=0`). This heap allocates the memory for data rows in the table.
    In-Memory OLTP accesses this heap at the time of Table Scan operations. I will
    discuss it in detail in the next chapter.


    Note


    You can read more about the `sys.dm_db_xtp_index_stats` view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql)
    .


    The `sys.dm_db_xtp_nonclustered_index_stats` view returns information about nonclustered
    indexes. It includes information about the total number of pages in the index
    along with page splits, merges, and consolidation-related statistics.


    Listing [5-8](#A340879_2_En_5_Chapter.html#Par71) shows information about nonclustered
    indexes defined on the `dbo.Customers` table. Figure [5-7](#A340879_2_En_5_Chapter.html#Fig7)
    shows the output of the query.


    ![A340879_2_En_5_Fig7_HTML.jpg](A340879_2_En_5_Fig7_HTML.jpg)


    Figure 5-7.


    Output from the sys.dm_db_xtp_nonclustered_index_stats view


    ```

    select

    s.name + ''.'' + t.name as [table]

    ,i.index_id

    ,i.name as [index]

    ,i.type_desc as [type]

    ,st.delta_pages

    ,st.leaf_pages

    ,st.internal_pages

    ,st.leaf_pages + st.delta_pages + st.internal_pages

    as [total pages]

    from

    sys.dm_db_xtp_nonclustered_index_stats st

    join sys.tables t on

    st.object_id = t.object_id

    join sys.indexes i on

    st.object_id = i.object_id and

    st.index_id = i.index_id

    join sys.schemas s on

    s.schema_id = t.schema_id

    where

    s.name = ''dbo'' and t.name = ''Customers''

    Listing 5-8.

    Querying the sys.dm_db_xtp_nonclustered_index_stats View

    ```


    Note


    You can read more about the `sys.dm_db_xtp_nonclustered_index_stats` view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql)
    .


    ## Index Design Considerations


    With the exception of the unidirectional nature of Bw-Tree indexes, nonclustered
    indexes on memory-optimized tables behave similarly to the indexes on disk-based
    tables. They also cover all in-row columns in the table, which simplifies the
    indexing process.


    There are a couple of aspects of their behavior, however, that I want to mention.'
  trans: "\n# 获取非聚集索引信息\n\n除了第 4 章讨论的`sys.dm_db_xtp_hash_index_stats`视图外，SQL Server\
    \ 还提供了另外两个视图来获取内存优化表上的索引信息。这些视图提供的数据是自内存优化表加载到内存以来收集的，该加载过程在数据库启动时发生。\n\n## 使用\
    \ `sys.dm_db_xtp_index_stats`\n\n你可以使用`sys.dm_db_xtp_index_stats`视图获取有关哈希索引和非聚集索引的索引访问方法以及幽灵行的信息。该视图中值得注意的列如下：\n\
    \n*   `xtp_object_id` 对应于内存 OLTP 对象的内部 ID。当你修改表（这会在后台重建表）时，此值可能会更改。\n*   `scans_started`\
    \ 显示索引中行链被扫描的次数。由于索引的特性，每次操作（如`SELECT`、`INSERT`、`UPDATE`和`DELETE`）都要求 SQL Server\
    \ 扫描一个行链并递增此列。\n*   `rows_returned` 表示返回到执行计划中下一个运算符的累计行数。它不一定与返回到客户端的行数匹配，因为执行计划中的后续运算符可能会改变它。\n\
    *   `rows_touched` 表示在索引中访问的累计行数。\n*   `rows_expired` 显示检测到的过期行数。我将在第 11 章讨论垃圾回收过程时更详细地讨论这一点。\n\
    *   `rows_expired_removed` 返回已从索引行链中解除链接的过期行数。在讨论垃圾回收时，我也会更详细地讨论这一点。\n\n代码清单 5-7\
    \ 显示了返回有关`dbo.Customers`表上定义索引信息的查询。\n\n```sql\nselect\n    s.name + '.' + t.name\
    \ as [table],\n    i.index_id,\n    i.name as [index],\n    i.type_desc as [type],\n\
    \    st.scans_started,\n    st.rows_returned,\n    iif(st.scans_started = 0, 0,\
    \ floor(st.rows_returned / st.scans_started)) as [rows per scan]\nfrom\n    sys.dm_db_xtp_index_stats\
    \ st\n    join sys.tables t on st.object_id = t.object_id\n    join sys.indexes\
    \ i on st.object_id = i.object_id and st.index_id = i.index_id\n    join sys.schemas\
    \ s on s.schema_id = t.schema_id\nwhere\n    s.name = 'dbo' and t.name = 'Customers'\n\
    ```\n\n**代码清单 5-7.** 查询 `sys.dm_db_xtp_index_stats` 视图\n\n图 5-6 展示了查询的输出结果。每次扫描返回大量行可能表明索引扫描繁重，这可能是索引策略不佳和/或查询编写不良的标志。\n\
    \n![sys.dm_db_xtp_index_stats 视图的输出](img/A340879_2_En_5_Fig6_HTML.jpg)\n\n同样重要的是要注意，该视图会返回表堆对象（`index_id=0`）的行。此堆为表中的数据行分配内存。在执行表扫描操作时，内存\
    \ OLTP 会访问此堆。我将在下一章详细讨论它。\n\n> **注意**\n> 你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql)\
    \ 阅读更多关于 `sys.dm_db_xtp_index_stats` 视图的信息。\n\n## 使用 `sys.dm_db_xtp_nonclustered_index_stats`\n\
    \n`sys.dm_db_xtp_nonclustered_index_stats` 视图返回有关非聚集索引的信息。它包括有关索引中页面总数以及页面拆分、合并和整合相关统计信息。\n\
    \n代码清单 5-8 显示了有关`dbo.Customers`表上定义的非聚集索引的信息。图 5-7 显示了查询的输出。\n\n![sys.dm_db_xtp_nonclustered_index_stats\
    \ 视图的输出](img/A340879_2_En_5_Fig7_HTML.jpg)\n\n```sql\nselect\n    s.name + '.'\
    \ + t.name as [table],\n    i.index_id,\n    i.name as [index],\n    i.type_desc\
    \ as [type],\n    st.delta_pages,\n    st.leaf_pages,\n    st.internal_pages,\n\
    \    st.leaf_pages + st.delta_pages + st.internal_pages as [total pages]\nfrom\n\
    \    sys.dm_db_xtp_nonclustered_index_stats st\n    join sys.tables t on st.object_id\
    \ = t.object_id\n    join sys.indexes i on st.object_id = i.object_id and st.index_id\
    \ = i.index_id\n    join sys.schemas s on s.schema_id = t.schema_id\nwhere\n \
    \   s.name = 'dbo' and t.name = 'Customers'\n```\n\n**代码清单 5-8.** 查询 `sys.dm_db_xtp_nonclustered_index_stats`\
    \ 视图\n\n> **注意**\n> 你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql)\
    \ 阅读更多关于 `sys.dm_db_xtp_nonclustered_index_stats` 视图的信息。\n\n## 索引设计注意事项\n\n除了\
    \ Bw-Tree 索引的单向性质外，内存优化表上的非聚集索引与基于磁盘的表上的索引行为类似。它们也覆盖表中的所有行内列，这简化了索引过程。\n\n然而，它们的行为有几个方面我想提一下。\n"
- fmt: '### Data Modification Overhead


    Indexes on `memory-optimized tables` introduce data modification overhead similar
    to indexes on disk-based tables. `In-Memory OLTP` needs to maintain multiple index
    row chains along with internal index structures, such as hash and mapping tables
    and internal and leaf nonclustered index pages.


    Let’s look at this overhead in detail. The code in `Listing 5-9` creates a disk-based
    table and populates it with 65,536 rows. Next, it creates two memory-optimized
    tables, with two and eight indexes, respectively.


    ```sql

    create table dbo.UpdateOverheadDisk

    (

    Id int not null,

    IndexedCol int not null,

    NonIndexedCol int not null,

    Col3 int not null,

    Col4 int not null,

    Col5 int not null,

    Col6 int not null,

    Col7 int not null,

    Col8 int not null,

    constraint PK_UpdateOverheadDisk

    primary key clustered(ID)

    );

    create nonclustered index IDX_UpdateOverheadDisk_IndexedCol

    on dbo.UpdateOverheadDisk(IndexedCol);

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N5)

    insert into dbo.UpdateOverheadDisk(ID,IndexedCol,NonIndexedCol,Col3

    ,Col4,Col5,Col6,Col7,Col8)

    select Id, Id, Id, Id, Id, Id, Id, Id, Id from Ids;

    go

    create table dbo.UpdateOverheadMemory

    (

    Id int not null

    constraint PK_UpdateOverheadMemory

    primary key nonclustered

    hash with (bucket_count=2097152),

    IndexedCol int not null,

    NonIndexedCol int not null,

    Col3 int not null,

    Col4 int not null,

    Col5 int not null,

    Col6 int not null,

    Col7 int not null,

    Col8 int not null,

    index IDX_IndexedCol nonclustered(IndexedCol)

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.UpdateOverhead8Idx

    (

    Id int not null

    constraint PK_UpdateOverhead8Idx

    primary key nonclustered

    hash with (bucket_count=2097152),

    IndexedCol int not null,

    NonIndexedCol int not null,

    Col3 int not null,

    Col4 int not null,

    Col5 int not null,

    Col6 int not null,

    Col7 int not null,

    Col8 int not null,

    index IDX_IndexedCol nonclustered(IndexedCol),

    index IDX_Col3 nonclustered(Col3),

    index IDX_Col4 nonclustered(Col4),

    index IDX_Col5 nonclustered(Col5),

    index IDX_Col6 nonclustered(Col6),

    index IDX_Col7 nonclustered(Col7),

    index IDX_Col8 nonclustered(Col8)

    )

    with (memory_optimized=on, durability=schema_only);

    ```

    `Listing 5-9. Insert Overhead: Table Creations`


    Let’s insert the data into both memory-optimized tables using the code from `Listing
    5-10`.


    ```sql

    insert into dbo.UpdateOverheadMemory(ID,IndexedCol,NonIndexedCol,Col3

    ,Col4,Col5,Col6,Col7,Col8)

    select ID,IndexedCol,NonIndexedCol,Col3,Col4,Col5,Col6,Col7,Col8

    from dbo.UpdateOverheadDisk;

    insert into dbo.UpdateOverhead8Idx(ID,IndexedCol,NonIndexedCol,Col3

    ,Col4,Col5,Col6,Col7,Col8)

    select ID,IndexedCol,NonIndexedCol,Col3,Col4,Col5,Col6,Col7,Col8

    from dbo.UpdateOverheadDisk;

    ```

    `Listing 5-10. Insert Overhead: Inserting Data into Memory-Optimized Tables`


    The execution times of the `INSERT` statements in my environment are 138 ms and
    613 ms, respectively. As you can see, maintenance of the six extra indexes in
    the `dbo.UpdateOverhead8Idx` table added significant overhead to the operation.


    There is also overhead during `UPDATE` operations; however, it is different compared
    to disk-based tables. `Nonclustered indexes` on disk-based tables are the separate
    data structures that store the copy of the data from the table. `SQL Server` maintains
    all those copies; therefore, the update operation modifies all indexes where updated
    columns were present. There is no overhead, however, when you update the columns
    that were not present in nonclustered indexes.


    `In-Memory OLTP`, on the other hand, always generates the new row objects regardless
    of what columns were updated. `SQL Server` maintains all index row chains, which
    leads to overhead even when nonindexed columns were modified.


    Let’s look at an example and perform two updates of the disk-based `dbo.UpdateOverheadDisk`
    table, modifying indexed and nonindexed columns there. Both operations change
    the value of integer fixed-length columns and do not lead to page splits. `Listing
    5-11` shows the code.


    ```sql

    update dbo.UpdateOverheadDisk

    set IndexedCol += 1;

    update dbo.UpdateOverheadDisk

    set NonIndexedCol += 1;

    ```

    `Listing 5-11. Update Overhead: Disk-Based Table Update`


    `Figure 5-8` illustrates the execution plan and execution time of both statements.
    As you can see, updating the indexed column forced `SQL Server` to modify both
    indexes, and it took significantly longer than updating the nonindexed column.


    ![A340879_2_En_5_Fig8_HTML.jpg](A340879_2_En_5_Fig8_HTML.jpg)


    `Figure 5-8. Execution plans and times for disk-based table update`


    `Listing 5-12` shows the same `UPDATE` statements for the memory-optimized table.
    Both statements generated the new data row objects and had to maintain both indexes
    on the table. That overhead always exists regardless of what columns were updated.


    ```sql

    update dbo.UpdateOverheadMemory

    set IndexedCol += 1;

    update dbo.UpdateOverheadMemory

    set NonIndexedCol += 1;

    ```

    `Listing 5-12. Update Overhead: Memory-Optimized Table Update`


    `Figure 5-9` illustrates the execution plan and execution time of the statements.


    ![A340879_2_En_5_Fig9_HTML.jpg](A340879_2_En_5_Fig9_HTML.jpg)


    `Figure 5-9. Execution plans and times for memory-optimized table update`


    Indexes on memory-optimized tables can also delay the garbage collection. `In-Memory
    OLTP` needs to unlink old stale rows from all the index chains, which may take
    longer when a row is included into the multiple indexes.


    **Note**

    I will discuss the garbage collection process in depth in `Chapter 11`.


    As you can see, unnecessary indexes introduce overhead into the system. You should
    avoid them and create the minimally required set of indexes to support your workload.'
