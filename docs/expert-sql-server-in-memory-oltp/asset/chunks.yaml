  trans: '

    ### 原子块


    原生编译模块以原子块的形式执行，这是一种“全有或全无”的方法；模块中的所有语句要么全部成功，要么全部失败。


    当在活动事务的上下文之外调用原生编译模块时，它会启动一个新事务，并在执行结束时提交或回滚该事务。


    如果模块是在活动事务的上下文中被调用的，SQL Server 会在模块执行开始时创建一个保存点。如果模块中出现错误，SQL Server 会将事务回滚到创建的保存点。根据错误的严重程度和类型，事务要么能够继续并提交，要么会变得“受损”且无法提交。


    让我们创建一个内存优化表和原生编译存储过程，如代码清单 9-5 所示。


    ```sql

    create table dbo.MOData

    (

    ID int not null

    primary key nonclustered

    hash with (bucket_count=16),

    Value int null

    )

    with (memory_optimized=on, durability=schema_only);

    insert into dbo.MOData(ID, Value)

    values(1,1), (2,2);

    go

    create proc dbo.AtomicBlockDemo

    (

    @ID1 int not null

    ,@Value1 bigint not null

    ,@ID2 int

    ,@Value2 bigint

    )

    with native_compilation, schemabinding, execute as owner

    as

    begin atomic

    with

    (

    transaction isolation level = snapshot

    ,language=N''English''

    )

    update dbo.MOData set Value = @Value1 where ID = @ID1;

    if @ID2 is not null

    update dbo.MOData set Value = @Value2 where ID = @ID2;

    end;

    ```

    代码清单 9-5.

    原子块与事务：对象创建


    此时，`dbo.MOData`表有两行数据，值分别为`(1,1)`和`(2,2)`。第一步，让我们启动事务并调用存储过程两次，如代码清单 9-6 所示。


    ```sql

    begin tran

    exec dbo.AtomicBlockDemo 1, -1, 2, -2;

    exec dbo.AtomicBlockDemo 1, 0, 2, 999999999999999;

    ```

    代码清单 9-6.

    原子块与事务：调用存储过程


    存储过程的第一次调用成功，而第二次调用则触发了一个算术溢出错误，如下所示：


    ```

    Msg 8115, Level 16, State 0, Procedure AtomicBlockDemo, Line 49

    Arithmetic overflow error converting bigint to data type int.

    ```


    你可以通过这个 select 语句来检查事务是否仍处于活动且可提交状态：`SELECT @@TRANCOUNT as [@@TRANCOUNT], XACT_STATE()
    as [XACT_STATE()]`。它返回以下结果：


    ```

    @@TRANCOUNT XACT_STATE()

    ----------- ------------

    1           1

    ```


    如果你提交事务并检查表的内容，你会看到数据反映了由第一次存储过程调用所做的更改。尽管第二次调用中的第一条更新语句成功了，但 SQL Server 将其回滚了，因为原生编译存储过程是作为原子块执行的。你可以在`dbo.MOData`表中看到数据。


    ```

    ID          Value

    ----------- -----------

    1           -1

    2           -2

    ```


    作为第二个例子，让我们触发一个严重错误，这会使事务“受损”，使其无法提交。一种这样的情况是写/写冲突，即多个会话试图更新相同的行。你可以在两个不同的会话中执行代码清单
    9-7 中的代码来触发它。


    ```sql

    begin tran

    exec dbo.AtomicBlockDemo 1, 0, null, null;

    ```

    代码清单 9-7.

    原子块与事务：写/写冲突


    当你在第二个会话中运行代码时，会触发以下异常：


    ```

    Msg 41302, Level 16, State 110, Procedure AtomicBlockDemo, Line 13

    The current transaction attempted to update a record that has been updated since
    this transaction started. The transaction was aborted.

    Msg 3998, Level 16, State 1, Line 1

    Uncommittable transaction is detected at the end of the batch. The transaction
    is rolled back.

    ```


    如果你在第二个会话中检查`@@TRANCOUNT`，你会看到 SQL Server 终止了该事务。


    ```

    @@TRANCOUNT


    ```


    如你所见，当原子块在活动事务的上下文中执行时，原子块中的严重错误会回滚整个事务，而非关键错误则将事务回滚到对应于块开始时的保存点。


    最后，值得一提的是，原子块是内存 OLTP 的一项功能，在 T-SQL 存储过程中不支持。


    ## 原生编译模块的优化


    解释型 T-SQL 存储过程和其他模块在第一次执行时编译。此外，当它们被清除出计划缓存后，或者在少数其他情况下，例如统计信息过时、数据库架构更改或代码中明确请求的重新编译，它们可能会被重新编译。


    这种行为与原生编译模块不同，后者在创建时编译。它们从不自动重新编译，唯一的例外是 SQL Server 或数据库重启。在这些情况下，重新编译发生在第一次调用时。同样值得注意的是，`DBCC
    FREEPROCCACHE`命令不会强制重新编译原生编译模块。


    SQL Server 在编译时不“窥探”参数，而是针对`UNKNOWN`值优化语句。它在优化过程中使用内存优化表的统计信息，这些信息可能已更新，也可能未更新。执行计划在模块重新编译（无论是显式重新编译还是数据库重启后重新编译）之前不会改变。


    幸运的是，在原生编译模块的情况下，基数估算错误对性能的影响较小。与基于磁盘的表相反（在后者中，此类错误可能导致由于索引选择不正确而产生的效率极低的计划，从而导致大量的键或
    RID 查找操作），内存优化表中的所有索引都引用相同的数据行，简而言之，它们都是行内列的覆盖索引。此外，错误不会影响连接策略的选择——嵌套循环是原生编译模块中唯一支持的连接类型。


    然而，编译时的过时统计信息仍然可能导致效率低下的计划。一个例子是在索引列上有多个谓词的查询。SQL Server 需要知道索引的选择性以选择最有效的索引。另一个例子是嵌套循环连接的内外输入选择错误，正如你在第
    4 章中看到的那样。


    如果表中的数据发生了显著变化，最好重新编译原生编译模块。你可以通过两种不同的方式来做到这一点——要么通过修改模块，要么使用`sp_recompile`存储过程。


    这些方法的内部实现和影响是不同的。`sp_recompile`存储过程只是将原生编译模块标记为过时。模块的第一次调用将触发重新编译，类似于数据库启动后发生的情况。触发重新编译的会话以及所有在重新编译期间调用该模块的其他会话都将被阻塞，直到编译完成。


    另一方面，模块修改的工作方式不同。SQL Server 在后台重新编译模块，允许其他会话在此期间使用旧版本的代码。编译完成后，SQL Server 会等待所有运行旧代码的会话完成，然后替换内存中的代码。尽管在最终的模块替换阶段仍然存在阻塞，但在编译期间（这通常需要大量时间）没有阻塞。因此，与调用`sp_recompile`相比，模块修改对工作负载的影响更小，并且是在繁忙系统中修改模块的推荐方法。


    **提示**


    在重新编译或修改原生编译模块之前，请考虑更新其引用表中的统计信息。

    '
- fmt: 'Finally, it is worth mentioning that the presence of natively compiled modules
    requires you to adjust the deployment process in the system. It is common to create
    all database schema objects, including tables and modules, at the beginning of
    deployment. While the time of deployment does not matter for T-SQL modules, such
    a strategy compiles natively compiled modules when the database tables are empty.
    You should recompile (re-create) natively compiled modules later, after the tables
    are populated with data and statistics are up-to-date.


    ## Interpreted T-SQL and Memory-Optimized Tables


    The Query Interop component provides transparent, memory-optimized table access
    to interpreted T-SQL code. In interpreted mode, SQL Server treats memory-optimized
    tables pretty much the same way as disk-based tables. It optimizes queries and
    caches execution plans, regardless of where the table is located. The same set
    of operators is used during query execution. From a high level, when the operator’s
    `GetRow()` method is called, it is routed either to the Storage Engine or to the
    In-Memory OLTP Engine, depending on the underlying table type.


    Most T-SQL features are supported in interpreted mode. There are still a few exceptions,
    however.


    *   `TRUNCATE TABLE`.

    *   The `MERGE` operator with memory-optimized table as the target.

    *   Context connection from CLR code.

    *   Referencing memory-optimized tables in indexed views. You can reference memory-optimized
    tables in partitioned views, combining data from memory-optimized and disk-based
    tables.

    *   `DYNAMIC` and `KEYSET` cursors, which are automatically downgraded to `STATIC`.

    *   Cross-database queries and transactions.

    *   Linked servers.


    As you can see, the list of limitations is pretty small. However, the flexibility
    of query interop access comes at a cost. Natively compiled modules are usually
    more efficient compared to their interpreted T-SQL counterparts. In some cases,
    such as joins between memory-optimized and disk-based tables, query interop is
    the only choice; however, it is usually preferable to use natively compiled modules
    when possible.


    ## Performance Comparison


    Let’s run several tests comparing the performance of several use cases that work
    with memory-optimized tables using natively compiled and T-SQL modules.


    ### Stored Procedures Performance


    As the first step, we will compare the performance of T-SQL and natively compiled
    stored procedures. Let’s create two memory-optimized tables using a `schema_only`
    durability option to avoid any I/O and transaction logging overhead during the
    tests. You can see the code in Listing [9-8](#A340879_2_En_9_Chapter.html#Par137),
    which also creates a numbers table and populates it with the values.


    ```

    create table dbo.Customers

    (

    CustomerId int not null

    primary key nonclustered

    hash with (bucket_count=262144),

    Name nvarchar(255) not null,

    CreatedOn datetime2(0) not null

    constraint DEF_Customers_CreatedOn

    default sysutcdatetime(),

    Placeholder char(200) not null,

    index IDX_Name nonclustered(Name)

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.Orders

    (

    OrderId int not null

    primary key nonclustered

    hash with (bucket_count=2097152),

    CustomerId int not null,

    OrderNum varchar(32) not null,

    OrderDate datetime2(0) not null

    constraint DEF_Orders_OrderDate

    default sysutcdatetime(),

    Amount money not null,

    Placeholder char(200) not null,

    index IDX_CustomerId

    nonclustered hash(CustomerId)

    with (bucket_count=262144),

    index IDX_OrderNum nonclustered(OrderNum)

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.Numbers

    (

    Num int not null

    constraint PK_Numbers

    primary key clustered

    );

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N3 as t2) -- 1,048,576 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.Numbers(Num)

    select Id from Ids;

    ```

    Listing 9-8. Creating Test Tables


    As the first step, you will measure the `INSERT` performance using three different
    approaches and batches of different sizes. The first two stored procedures, `InsertCustomers_Row`
    and `InsertCustomers_NativelyCompiled`, will run `INSERT` statements on per-row
    basis using the Interop Engine and native compilation, respectively. The third
    stored procedure, `InsertCustomers_Batch`, will insert all rows in the single
    batch through the Interop Engine. Listing [9-9](#A340879_2_En_9_Chapter.html#Par139)
    shows the implementation of the stored procedures.


    ```

    create proc dbo.InsertCustomers_Row

    (

    @NumCustomers int

    )

    as

    begin

    set nocount on

    set xact_abort on

    declare

    @I int = 1;

    begin tran

    while @I  1048576

    begin

    raiserror(''@NumCustomers should not exceed 1,048,576'',10,1);

    return;

    end;

    begin tran

    insert into dbo.Customers(CustomerId,Name,Placeholder)

    select Num, N''Customer '' + convert(nvarchar(10),Num),''Data''

    from dbo.Numbers

    where Num <= @NumCustomers

    commit

    end

    go

    create proc dbo.InsertCustomers_NativelyCompiled

    (

    @NumCustomers int not null

    )

    with native_compilation, schemabinding, execute as owner

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''English''

    )

    declare

    @I int = 1;

    while @I <= @NumCustomers

    begin

    insert into dbo.Customers(CustomerId,Name,Placeholder)

    values(@I,N''Customer '' + convert(nvarchar(10),@I), ''Data'');

    set @I += 1;

    end;

    end;

    ```

    Listing 9-9. Inserting Data into the dbo.Customers Table


    Table [9-1](#A340879_2_En_9_Chapter.html#Tab1) shows the execution time of each
    stored procedure for the batches of 10,000; 50,000; and 100,000 rows in my environment.
    As you can see, the natively compiled stored procedure is almost three times faster
    at row-by-row inserts and about 30 to 40 percent faster compared to batch inserts
    through the Interop Engine.


    Table 9-1. Execution Times of InsertCustomers Stored Procedures'
