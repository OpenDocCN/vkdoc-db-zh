- fmt: 'Missing or inaccurate statistics on memory-optimized tables can have a somewhat
    smaller impact compared to disk-based tables. Indexes on memory-optimized tables
    reference the actual data rows and, in the nutshell, are covering the queries.
    In-Memory OLTP does not require Key Lookup operations to access the row data regardless
    of which index is chosen. Nevertheless, incorrect cardinality estimations could
    affect the size of the query memory grant and the choice of join type when a query
    is running through the Interop Engine. All of that may lead to suboptimal execution
    plans and bad performance.


    There is another, less obvious issue. Inaccurate statistics can introduce suboptimal
    execution plans with the nested loop joins when SQL Server chooses inner and outer
    inputs for the operator. As you know, the nested loop join algorithm processes
    the inner input for every row from the outer input, and it is more efficient to
    put smaller input on the outer side. Listing [4-10](#A340879_2_En_4_Chapter.html#Par61)
    shows the algorithm for the inner nested loop join as a reference.


    ```

    for each row R1 in outer table

    for each row R2 in inner table

    if R1 joins with R2

    return join (R1, R2)

    Listing 4-10.

    Inner Nested Loop Join Algorithm

    ```


    Missing statistics can lead to a situation where SQL Server chooses the inner
    and outer inputs incorrectly, which can lead to highly inefficient plans.


    Let’s create two tables under a database compatibility level of 120, populating
    them with some data, as shown in Listing [4-11](#A340879_2_En_4_Chapter.html#Par64).
    As you know, statistics will be created with the `NORECOMPUTE=ON` option, which
    prevents automatic statistics update.


    ```

    alter database current set compatibility_level=120;

    go

    create table dbo.T1

    (

    ID int not null identity(1,1)

    primary key nonclustered hash

    with (bucket_count = 8192),

    T1Col int not null,

    Placeholder char(100) not null

    constraint DEF_T1_Placeholder

    default(''1''),

    index IDX_T1Col

    nonclustered hash(T1Col)

    with (bucket_count = 1024)

    )

    with (memory_optimized = on, durability = schema_only);

    create table dbo.T2

    (

    ID int not null identity(1,1)

    primary key nonclustered hash

    with (bucket_count = 8192),

    T2Col int not null,

    Placeholder char(100) not null

    constraint DEF_T2_Placeholder

    default(''2''),

    index IDX_T2Col

    nonclustered hash(T2Col)

    with (bucket_count = 1024)

    )

    with (memory_optimized = on, durability = schema_only);

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N3 as t2) -- 4,096 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N5)

    insert into dbo.T1(T1Col)

    select 1 from Ids;

    insert into dbo.T2(T2Col)

    select -1 from dbo.T1;

    update dbo.T1 set T1Col = 2 where ID = 4096;

    update dbo.T2 set T2Col = -2 where ID = 1;

    Listing 4-11.

    Missing Statistics and Inefficient Execution Plans: Table Creation

    ```


    The data in both tables is distributed unevenly. You can confirm this by running
    the query in Listing [4-12](#A340879_2_En_4_Chapter.html#Par66). Figure [4-9](#A340879_2_En_4_Chapter.html#Fig9)
    illustrates the data distribution in the tables.


    ![A340879_2_En_4_Fig9_HTML.jpg](A340879_2_En_4_Fig9_HTML.jpg)


    Figure 4-9.


    Missing statistics and inefficient execution plans: data distribution


    ```

    select ''T1'' as [Table], T1Col as [Value], count(*) as [Count]

    from dbo.T1

    group by T1Col

    union all

    select ''T2'' as [Table], T2Col as [Value], count(*) as [Count]

    from dbo.T2

    group by T2Col;

    Listing 4-12.

    Missing Statistics and Inefficient Execution Plans: Checking Data Distribution
    in the Tables

    ```


    As the next step, let’s run two queries that join the data from the tables, as
    shown in Listing [4-13](#A340879_2_En_4_Chapter.html#Par68). Both queries will
    return just a single row.


    ```

    select *

    from dbo.T1 t1 join dbo.T2 t2 on

    t1.ID = t2.ID

    where

    t1.T1Col = 2 and

    t2.T2Col = -1;

    select *

    from dbo.T1 t1 join dbo.T2 t2 on

    t1.ID = t2.ID

    where

    t1.T1Col = 1 and

    t2.T2Col = -2

    Listing 4-13.

    Missing Statistics and Inefficient Execution Plans: Test Queries

    ```


    As you can see in Figure [4-10](#A340879_2_En_4_Chapter.html#Fig10), SQL Server
    generates identical execution plans for both queries using the `dbo.T1` table
    in the outer part of the join. This plan is very efficient for the first query;
    there is only one row with `T1Col = 2`. Therefore, SQL Server had to perform an
    inner input lookup just once. Unfortunately, this is not the case for the second
    query, which leads to 4,095 Index Seek operations on the `dbo.T2` table.


    ![A340879_2_En_4_Fig10_HTML.jpg](A340879_2_En_4_Fig10_HTML.jpg)


    Figure 4-10.


    Missing statistics and inefficient execution plans: execution plans


    Let’s update the statistics on both tables, as shown in Listing [4-14](#A340879_2_En_4_Chapter.html#Par71).


    ```

    update statistics dbo.T1;

    update statistics dbo.T2;

    dbcc show_statistics(''dbo.T1'',''IDX_T1Col'');

    dbcc show_statistics(''dbo.T2'',''IDX_T2Col'');

    Listing 4-14.

    Missing Statistics and Inefficient Execution Plans: Updating Statistics

    ```


    Figure [4-11](#A340879_2_En_4_Chapter.html#Fig11) illustrates that the statistics
    have been updated .


    ![A340879_2_En_4_Fig11_HTML.jpg](A340879_2_En_4_Fig11_HTML.jpg)


    Figure 4-11.


    Missing statistics and inefficient execution plans: index statistics after update


    Now, if you run the queries from Listing [4-13](#A340879_2_En_4_Chapter.html#Par68)
    again, SQL Server can generate an efficient execution plan for the second query,
    as shown in Figure [4-12](#A340879_2_En_4_Chapter.html#Fig12).


    ![A340879_2_En_4_Fig12_HTML.jpg](A340879_2_En_4_Fig12_HTML.jpg)


    Figure 4-12.


    Missing statistics and inefficient execution plans: execution plans after statistics
    update


    You should remember this behavior when you use natively compiled modules, which
    have the queries’ execution plans embedded into the code. SQL Server does not
    recompile the modules when the statistics are updated, and you should manually
    recompile them either by altering them or by using the `sp_recompile` stored procedure
    when the data distribution has significantly changed.


    ## Note


    I will talk about native compilation and the optimization of natively compiled
    modules in Chapter [9](#A340879_2_En_9_Chapter.html).


    ## Summary


    Hash indexes consist of an array of hash buckets, each of which stores the pointer
    to the chain of rows with the same index key column hash. Hash indexes help to
    optimize point-lookup operations when queries search for the rows using equality
    predicates. In the case of composite hash indexes, the query should have equality
    predicates on all key columns for the index to be useful.


    Choosing the right bucket count is extremely important. Underestimations lead
    to long row chains, which could seriously degrade the performance of the queries.
    Overestimations increase memory consumption and decrease the performance of the
    index scans. Nevertheless, in many cases, it is better to slightly overestimate
    rather than to underestimate the value.


    Low-cardinality columns lead to the long row chains and are usually bad candidates
    for hash indexes.


    You should analyze index cardinality and consider future system growth when choosing
    the right bucket count. Ideally, you should have at least 33 percent of buckets
    empty. You can get information about buckets and row chains with the `sys.dm_db_xtp_hash_index_stats`
    view.


    SQL Server 2016 creates and automatically updates statistics on the indexes on
    memory-optimized tables; however, statistics created in databases with a compatibility
    level less than 130 have the `NORECOMPUTE=ON` option enabled. You should update
    statistics manually with the `UPDATE STATISTICS` statement to enable automatic
    statistics update for such tables.'
