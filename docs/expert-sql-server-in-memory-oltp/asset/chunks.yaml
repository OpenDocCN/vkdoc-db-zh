  trans: '

    每个经过内存优化的表都至少有一个行链索引来链接行；因此，每个表都必须至少定义一个索引。对于持久化的内存优化表，则要求创建一个主键约束，这也可以起到这个作用。


    为了说明行链的概念，我们来创建如代码清单 3-1 所示的内存优化表。


    ```sql

    create table dbo.People

    (

    Name varchar(64) not null

    constraint PK_People

    primary key nonclustered

    hash with (bucket_count = 1024),

    City varchar(64) not null,

    index IDX_City nonclustered hash(City)

    with (bucket_count = 1024),

    )

    with (memory_optimized = on, durability = schema_only);

    ```


    代码清单 3-1. 创建内存优化表


    此表在 `Name` 和 `City` 列上定义了两个哈希索引。本章不会深入讨论哈希索引，但作为概述，它们由一个哈希表组成，该表是一个哈希桶的数组，每个桶包含一个指向数据行的内存指针。SQL
    Server 对索引键列应用哈希函数，函数的结果决定一行属于哪个桶。所有具有相同哈希值并属于同一个桶的行都链接在一个行链中；每一行都有一个指向链中下一行的指针。


    **注意**：我将在第 4 章详细讨论哈希索引。


    图 3-3 对此进行了说明。实线箭头表示 `Name` 列索引中的指针。虚线箭头表示 `City` 列索引中的指针。为简单起见，我们假设哈希函数根据字符串的第一个字母生成哈希值。每行中显示的两个数字表示行的生存期，我将在本章的下一节中解释。


    ![A340879_2_En_3_Fig3_HTML.jpg](img/A340879_2_En_3_Fig3_HTML.jpg)


    图 3-3. 具有两个哈希索引的内存优化表


    与基于磁盘的表不同，内存优化表上的索引不是作为单独的数据结构创建的，而是作为指针嵌入在数据行中，简而言之，这使得每个索引都覆盖行内列。然而，索引不覆盖行外列数据，这些数据存储在单独的内部表中。我将在第
    6 章深入讨论它们。


    **注意**：准确地说，内存优化表上的非聚集索引和聚集列存储索引会在内存中引入额外的数据结构。我将在第 5 章详细讨论非聚集索引，在第 8 章讨论聚集列存储索引。


    ## 多版本并发控制简介


    正如你在图 3-3 中已经注意到的，内存优化表中的每一行都有两个值，称为 `BeginTs` 和 `EndTs`，它们定义了行的生存期。SQL Server
    实例维护全局事务时间戳值，该值在事务提交时自动递增，并且对于每个已提交的事务是唯一的。`BeginTs` 存储插入该行的事务的全局事务时间戳，`EndTs`
    存储删除该行的事务的时间戳。对于尚未删除的行，使用一个称为 `Infinity` 的特殊值作为 `EndTs`。


    内存优化表中的行永远不会被更新。更新操作会创建行的新版本，将新的全局事务时间戳设置为 `BeginTs`，并通过用相同的值填充 `EndTs` 时间戳来将旧行版本标记为已删除。


    当一个新事务启动时，内存 OLTP 会为该事务分配一个逻辑开始时间，这代表了事务启动时的全局事务时间戳值。它决定了该事务可以看到哪些版本的行。事务只有在其逻辑开始时间（事务启动时的全局事务时间戳值）介于行的
    `BeginTs` 和 `EndTs` 时间戳之间时，才能看到该行。


    为了说明这一点，假设你运行了代码清单 3-2 所示的语句，并在全局事务时间戳值为 100 时提交了该事务。


    ```sql

    update dbo.People

    set City = ''Cincinnati''

    where Name = ''Ann''

    ```


    代码清单 3-2. 在 dbo.People 表中更新数据


    图 3-4 说明了更新事务提交后的表中数据。如图所示，你现在有两行 `Name=''Ann''` 但具有不同的生存期。新行被附加到 `Name` 列索引中值
    `A` 对应的哈希桶所引用的行链中。`City` 列的哈希索引中 `C` 桶没有引用任何行；因此，新行成为该桶引用的行链中的第一行。


    ![A340879_2_En_3_Fig4_HTML.jpg](img/A340879_2_En_3_Fig4_HTML.jpg)


    图 3-4. 更新后的表中数据


    假设你需要在逻辑开始时间（事务启动时的全局事务时间戳）为 110 的事务中运行一个查询，该查询选择所有 `Name=''Ann''` 的行。SQL Server
    计算 `Ann` 的哈希值，即 `A`，并在 `Name` 列的哈希索引中找到对应的桶。它跟随从该桶出发的指针，该指针指向一个 `Name=''Adam''`
    的行。该行的 `BeginTs` 值为 10，`EndTs` 值为 `Infinity`；因此，它对该事务可见。但是，`Name` 值不匹配谓词，因此该行被忽略。


    接下来，SQL Server 跟随来自 `Adam` 索引指针数组的指针，该指针指向第一个 `Ann` 行。该行的 `BeginTs` 值为 100，`EndTs`
    值为 `Infinity`；因此，它对该事务可见并需要被选中。


    作为最后一步，SQL Server 跟随索引中的下一个指针。尽管最后一行也有 `Name=''Ann''`，但其 `EndTs` 值为 100，因此对该事务不可见。

