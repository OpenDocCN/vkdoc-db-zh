    checkpoint

    go

    select

    data.checkpoint_file_id

    ,data.state_desc

    ,data.lower_bound_tsn

    ,data.upper_bound_tsn

    ,data.file_size_in_bytes

    ,data.file_size_used_in_bytes

    ,data.logical_row_count

    ,delta.logical_row_count

    ,convert(decimal(5,2),

    iif(data.logical_row_count = 0,0,

    100\. - 100\. * delta.logical_row_count /

    data.logical_row_count))

    as [% Full]

    from

    sys.dm_db_xtp_checkpoint_files data join

    sys.dm_db_xtp_checkpoint_files delta on

    data.checkpoint_pair_file_id = delta.checkpoint_file_id

    where

    data.file_type_desc = ''DATA'' and

    data.state_desc  ''PRECREATED''

    order by

    data.lower_bound_tsn

    Listing C-7.

    Deleting 99 Percent of the Rows from the Table

    ```


    As you can see in Figure [C-9](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig18)
    , the data files are almost empty, and they are perfect candidates for the merge.


    ![A340879_2_En_BookBackmatter_Fig18_HTML.jpg](A340879_2_En_BookBackmatter_Fig18_HTML.jpg)


    Figure C-9.


    File states after deletion


    As the next step, let’s turn on the automatic merge process by switching off trace
    flag `T9851` with the `DBCC TRACEOFF(9851,-1)` command. After that, you will issue
    another `CHECKPOINT` command to trigger the merge process.


    Figure [C-10](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig19) illustrates the
    state of the checkpoint file pairs after the merge was initiated. As you can see,
    SQL Server created the new checkpoint file pair in the `MERGE TARGET` state and
    merged data from four `ACTIVE` file pairs that cover a transaction range from
    0 to 9.


    ![A340879_2_En_BookBackmatter_Fig19_HTML.jpg](A340879_2_En_BookBackmatter_Fig19_HTML.jpg)


    Figure C-10.


    The state of checkpoint files after the merge is initiated


    The next `CHECKPOINT` will transition the checkpoint files that participated in
    the merge from `ACTIVE` to `WAITING FOR LOG TRUNCATION` and from `MERGE TARGET`
    to `ACTIVE` . Figure [C-11](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig20)
    demonstrates this. As you can see, the new `ACTIVE` (formerly `MERGE TARGET` )
    data file covers a range from 0 to 9 and now has only 20 data rows. The delta
    file in the pair is empty.


    ![A340879_2_En_BookBackmatter_Fig20_HTML.jpg](A340879_2_En_BookBackmatter_Fig20_HTML.jpg)


    Figure C-11.


    The state of the checkpoint files after the merge is completed


    After the transaction log backup is taken, the log records are transmitted to
    secondary nodes, and the checkpoint event occurs, then the files in a `WAITING
    FOR LOG TRUNCATION` state will be deleted or recycled back to a `FREE` state.
    Listing [C-8](#A340879_2_En_BookBackmatter_OnlinePDF.html#Par43) performs a transaction
    log backup along with `CHECKPOINT` .


    ```

    backup log [InMemoryOLTP2016_AppendixC]

    to disk = N''C:\Data\Backups\AppendixC.bak''

    with noformat, noinit, name = ''AppendixC - Log'', compression

    go

    checkpoint;

    Listing C-8.

    Performing Log Backup and Forcing Garbage Collection

    ```


    Note


    In reality, it could take more than one log backup and checkpoint event to deallocate
    files in the `WAITING FOR LOG TRUNCATION` state. You can execute the code from
    Listing [C-8](#A340879_2_En_BookBackmatter_OnlinePDF.html#Par43) multiple times
    if this happens on your system.


    Figure [C-12](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig21) illustrates that
    some of the files were deleted.


    ![A340879_2_En_BookBackmatter_Fig21_HTML.jpg](A340879_2_En_BookBackmatter_Fig21_HTML.jpg)


    Figure C-12.


    Checkpoint files after backup/log truncation


    ### Summary


    Every checkpoint file transitions through various states during its lifetime.
    You can analyze these states using the `sys.dm_db_xtp_checkpoint_files` data management
    view. This view returns information about individual checkpoint files, including
    their type, size, state, transaction interval they cover, number of rows there,
    and quite a few other properties.


    The merge process merges information from the `ACTIVE` checkpoint files that have
    a large percent of deleted rows, creating a new checkpoint file pair. This helps
    to reduce the size of the data on disk and speed up the database recovery process.


    Merged checkpoint files should be included in the log backup before they are deallocated.
    Regular transaction log backups will reduce the size of the In-Memory OLTP data
    on disk. Make sure to design a database backup strategy in a way that accounts
    for such behavior.


    ## Appendix D: In-Memory OLTP Migration Tools


    This appendix discusses several SQL Server 2016 tools that help with In-Memory
    OLTP migration .'
  trans: "\n图 C-7.\n\n第二次 INSERT 操作后的文件状态\n\n另一次 `CHECKPOINT` 会将 `正在构建` 的文件转换为 `活动`\
    \ 状态，如图 C-8 所示。你可以通过再次运行清单 C-5 中的代码来强制执行此操作。此时，你拥有两个 `活动` 状态的检查点文件对，它们覆盖了不同的事务时间戳范围。\n\
    \n![A340879_2_En_BookBackmatter_Fig17_HTML.jpg](img/A340879_2_En_BookBackmatter_Fig17_HTML.jpg)\n\
    \n图 C-8.\n\n第二次 CHECKPOINT 后的文件状态\n\n接下来，让我们从表中删除 99% 的行，如清单 C-7 所示。在此清单中，你还运行了合并数据文件和增量文件信息的查询，该查询演示了两个检查点文件对基本都为空。你还需要执行\
    \ `CHECKPOINT` 来更新增量文件中的 `logical_row_count` 列，这将生成另一个处于 `活动` 状态的空检查点文件对。\n\n\
    ```sql\ndelete from dbo.HKData\nwhere ID % 100 = 0;\ncheckpoint\ngo\nselect\n\
    \    data.checkpoint_file_id\n    ,data.state_desc\n    ,data.lower_bound_tsn\n\
    \    ,data.upper_bound_tsn\n    ,data.file_size_in_bytes\n    ,data.file_size_used_in_bytes\n\
    \    ,data.logical_row_count\n    ,delta.logical_row_count\n    ,convert(decimal(5,2),\n\
    \        iif(data.logical_row_count = 0,0,\n            100. - 100. * delta.logical_row_count\
    \ /\n            data.logical_row_count))\n        as [% Full]\nfrom\n    sys.dm_db_xtp_checkpoint_files\
    \ data join\n    sys.dm_db_xtp_checkpoint_files delta on\n        data.checkpoint_pair_file_id\
    \ = delta.checkpoint_file_id\nwhere\n    data.file_type_desc = 'DATA' and\n  \
    \  data.state_desc <> 'PRECREATED'\norder by\n    data.lower_bound_tsn\n```\n\n\
    清单 C-7.\n从表中删除 99% 的行\n\n如图 C-9 所示，数据文件几乎为空，它们是合并操作的绝佳候选对象。\n\n![A340879_2_En_BookBackmatter_Fig18_HTML.jpg](img/A340879_2_En_BookBackmatter_Fig18_HTML.jpg)\n\
    \n图 C-9.\n\n删除操作后的文件状态\n\n接下来，让我们通过执行 `DBCC TRACEOFF(9851,-1)` 命令关闭跟踪标志 `T9851`\
    \ 来开启自动合并进程。之后，你将发出另一个 `CHECKPOINT` 命令来触发合并进程。\n\n图 C-10 说明了合并启动后检查点文件对的状态。如你所见，SQL\
    \ Server 创建了处于 `合并目标` 状态的新检查点文件对，并合并了四个覆盖事务范围从 0 到 9 的 `活动` 文件对中的数据。\n\n![A340879_2_En_BookBackmatter_Fig19_HTML.jpg](img/A340879_2_En_BookBackmatter_Fig19_HTML.jpg)\n\
    \n图 C-10.\n\n合并启动后的检查点文件状态\n\n下一次 `CHECKPOINT` 会将参与合并的检查点文件从 `活动` 转换为 `等待日志截断`，并将\
    \ `合并目标` 转换为 `活动`。图 C-11 展示了这一点。如你所见，新的 `活动`（原 `合并目标`）数据文件覆盖范围从 0 到 9，并且现在只有 20\
    \ 行数据。该对中的增量文件为空。\n\n![A340879_2_En_BookBackmatter_Fig20_HTML.jpg](img/A340879_2_En_BookBackmatter_Fig20_HTML.jpg)\n\
    \n图 C-11.\n\n合并完成后的检查点文件状态\n\n在执行事务日志备份后，日志记录会被传输到辅助节点，并且发生检查点事件，之后处于 `等待日志截断`\
    \ 状态的文件将被删除或回收回 `空闲` 状态。清单 C-8 执行了事务日志备份以及 `CHECKPOINT`。\n\n```sql\nbackup log\
    \ [InMemoryOLTP2016_AppendixC]\nto disk = N'C:\\Data\\Backups\\AppendixC.bak'\n\
    with noformat, noinit, name = 'AppendixC - Log', compression\ngo\ncheckpoint;\n\
    ```\n\n清单 C-8.\n执行日志备份并强制垃圾回收\n\n注意\n\n实际上，可能需要多次日志备份和检查点事件才能释放处于 `等待日志截断` 状态的文件。如果这种情况发生在你的系统上，你可以多次执行清单\
    \ C-8 中的代码。\n\n图 C-12 说明了一些文件已被删除。\n\n![A340879_2_En_BookBackmatter_Fig21_HTML.jpg](img/A340879_2_En_BookBackmatter_Fig21_HTML.jpg)\n\
    \n图 C-12.\n\n备份/日志截断后的检查点文件\n\n## 总结\n\n每个检查点文件在其生命周期中都会经历各种状态。你可以使用 `sys.dm_db_xtp_checkpoint_files`\
    \ 数据管理视图来分析这些状态。此视图返回有关各个检查点文件的信息，包括其类型、大小、状态、覆盖的事务间隔、行数以及许多其他属性。\n\n合并进程会合并那些有大量已删除行的\
    \ `活动` 检查点文件中的信息，创建一个新的检查点文件对。这有助于减少磁盘上的数据大小并加速数据库恢复过程。\n\n合并后的检查点文件在释放之前应包含在日志备份中。定期的事务日志备份将减少磁盘上的内存优化表数据量。请确保设计数据库备份策略时考虑到这种行为。\n\
    \n# 附录 D：内存优化表迁移工具\n\n本附录讨论了几个有助于内存优化表迁移的 SQL Server 2016 工具。\n"
- fmt: '### “Transaction Performance Analysis Overview” Report


    One of the challenges during In-Memory OLTP migration is determining the list
    of objects that will benefit the most from it. The Pareto principle can be easily
    applied here: if the migration targets are identified correctly, you can achieve
    80 percent of possible gains by spending 20 percent of your time.


    SQL Server 2016 provides you with a “Transaction Performance Analysis Overview”
    report, which can help you to identify migration targets in the system. It shows
    the tables that suffer from lock and latch contention along with frequently executed
    stored procedures that consume the most CPU resources on the server. This report
    is similar to the SQL Server 2014 version; however, it does not require you to
    set up a management data warehouse. All the work is done by SQL Server automatically.


    Let’s look at the information provided by the “Transaction Performance Analysis
    Overview” report. In this appendix, I am using the demo application and the `WebRequests*_Disk`
    tables from Chapter [2](#A340879_2_En_2_Chapter.html) of this book. I also added
    several unsupported constructs to the tables and stored procedure to illustrate
    how tools provide information about them.


    You can access the report from the Standard Reports pop-up menu item in the database
    you are analyzing, as shown in Figure [D-1](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig22).
    As you can guess, this report works on a per-database basis.


    ![A340879_2_En_BookBackmatter_Fig22_HTML.jpg](A340879_2_En_BookBackmatter_Fig22_HTML.jpg)


    Figure D-1. Accessing the “Transaction Performance Analysis Overview” report


    Figure [D-2](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig23) shows the report.


    ![A340879_2_En_BookBackmatter_Fig23_HTML.jpg](A340879_2_En_BookBackmatter_Fig23_HTML.jpg)


    Figure D-2. The “Transaction Performance Analysis Overview” report


    From this page, you have access to two drill-down reports. “Tables Analysis” provides
    table-related statistics based on how often tables are accessed and how much they
    suffer from lock and latch contention.


    Figure [D-3](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig24) illustrates the
    output of the “Table Analysis” report. As you can see, it displays the output
    in four quadrants based on the amount of work required for the migration and the
    estimated performance gain it will provide. Migrating the objects in the upper-right
    quadrant will provide the most performance gain with the lowest amount of work
    involved.


    ![A340879_2_En_BookBackmatter_Fig24_HTML.jpg](A340879_2_En_BookBackmatter_Fig24_HTML.jpg)


    Figure D-3. The “Table Analysis” report


    You can see the statistics on the table level by clicking the object in the graph.
    Figure [D-4](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig25) shows the details
    for the `WebRequestHeaders_Disk` table in the system. The first output shows lock-
    and latch-related statistics for the table. The table suffers from a large number
    of page latches, as you saw in Chapter [2](#A340879_2_En_2_Chapter.html).


    ![A340879_2_En_BookBackmatter_Fig25_HTML.jpg](A340879_2_En_BookBackmatter_Fig25_HTML.jpg)


    Figure D-4. Table-level statistics


    The second output illustrates access method–related statistics. The demo application
    does not read the data from the table, which affects the numbers you see in the
    output.


    Finally, the third output illustrates the number of migration blockers and issues
    that need to be addressed before migration. The table does not have any incompatibilities
    and can be migrated into memory without any schema changes.


    Similarly, the “Stored Procedure Analysis” report shows stored procedure usage
    based on the amount of CPU time they consumed. Figure [D-5](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig26)
    illustrates the output of the report. The demo application called just a single
    procedure, which is displayed here.


    ![A340879_2_En_BookBackmatter_Fig26_HTML.jpg](A340879_2_En_BookBackmatter_Fig26_HTML.jpg)


    Figure D-5. The “Procedure Usage Analysis” report


    You can drill down to the procedure-level statistics, which displays the execution
    count, execution time metrics, and tables that are referenced by the stored procedure.
    Figure [D-6](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig27) illustrates this
    page.


    ![A340879_2_En_BookBackmatter_Fig27_HTML.jpg](A340879_2_En_BookBackmatter_Fig27_HTML.jpg)


    Figure D-6. Procedure-level statistics


    The “Transaction Performance Analysis Overview” report is a great tool that can
    help you identify objects that will benefit from migration. However, you should
    not rely solely on its results. Look and analyze the entire system before making
    any decisions.


    Finally, it is worth mentioning that, as with any tool, the quality of output
    greatly depends on the quality of input. You need to run this report either on
    the production server or in a test environment with a workload similar to production
    to get accurate results.'
