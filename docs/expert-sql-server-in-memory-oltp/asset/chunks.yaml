    清单 9-9. 向 dbo.Customers 表插入数据


    表 9-1 显示了我的环境中，每个存储过程针对 10,000、50,000 和 100,000 行批次的执行时间。如你所见，在逐行插入时，本地编译存储过程几乎快了三倍；与通过互操作引擎进行批量插入相比，大约快了
    30% 到 40%。


