    In the tests, I compared the insert throughput of disk-based and memory-optimized
    tables using the `dbo.InsertRequestInfo_Disk`, `dbo.InsertRequestInfo_Memory`,
    and `dbo.InsertRequestInfo_NativelyCompiled` stored procedures, calling them simultaneously
    from the multiple sessions in the loop. Each call inserted one row into the `dbo.WebRequests`
    table, five rows into the `dbo.WebRequestHeaders` table, and from one to five
    rows into the `dbo.WebRequestDisks` table, which makes nine rows total on average
    in the single transaction.


    Note


    The test application and scripts are included in the companion materials of the
    book.


