    ### 监控内存 OLTP 事务


    `sys.dm_db_xtp_transactions` 视图提供关于系统中活动内存 OLTP 事务的信息。以下是该视图中最为重要的列：

    *   `xtp_transaction_id` 是内存 OLTP 事务管理器中事务的内部 ID。

    *   `transaction_id` 是系统中的事务 ID。您可以将其用于与其他事务管理视图（例如 `sys.dm_tran_active_transactions`）进行联接。仅涉及内存
    OLTP 的事务，例如由本地编译存储过程启动的事务，其 `transaction_id` 值返回为 0。

    *   `session_id` 指示启动事务的会话。

    *   `begin_tsn` 和 `end_tsn` 指示事务时间戳。

    *   `state` 和 `state_desc` 指示事务的状态。可能的值为 `(0)-ACTIVE`（活动）、`(1)-COMMITTED`（已提交）、`(2)-ABORTED`（已中止）和
    `(3)-VALIDATING`（正在验证）。

    *   `result` 和 `result_desc` 指示事务的结果。可能的值为 `(0)-IN PROGRESS`（进行中）；`(1)-SUCCESS`（成功）；`(2)-ERROR`（错误）；`(3)-COMMIT
    DEPENDENCY`（提交依赖）；`(4)-VALIDATION FAILED (RR)`（验证失败（RR）），表示违反可重复读取规则；`(5)-VALIDATION
    FAILED (SR)`（验证失败（SR）），表示违反可序列化规则；以及 `(6)-ROLLBACK`（回滚）。

    *   `read_set_row_count`、`write_set_row_count` 和 `scan_set_row_count` 提供关于事务的读取集、写入集和扫描集大小的信息。

    *   `commit_dependency_count` 指示该依赖事务已接受的提交数量。


    您可以使用 `sys.dm_db_xtp_transactions` 视图来检测系统中运行时间长和孤立的事务。您可能还记得，这些事务会延迟垃圾回收过程并导致内存不足错误。


    清单 12-8 展示了一个查询，该查询返回系统中五个最旧的活动内存 OLTP 事务的信息。


    ```sql

