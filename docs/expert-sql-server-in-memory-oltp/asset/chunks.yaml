  trans: '最后，值得一提的是，本地编译模块的存在要求你调整系统中的部署流程。通常的做法是在部署开始时创建所有数据库架构对象，包括表和模块。对于 T-SQL
    模块而言，部署时机并不重要，但这种策略会在数据库表为空时编译本地编译模块。你应该在表填充了数据且统计信息更新后，稍后重新编译（重新创建）本地编译模块。


    ## 解释型 T-SQL 与内存优化表


    查询互操作（Query Interop）组件为解释型 T-SQL 代码提供了透明的内存优化表访问。在解释模式下，SQL Server 处理内存优化表的方式与处理基于磁盘的表几乎相同。它会优化查询并缓存执行计划，而不管表位于何处。查询执行期间使用的是相同的操作符集。从高层来看，当调用操作符的
    `GetRow()` 方法时，根据底层表类型的不同，该调用会被路由到存储引擎或内存 OLTP 引擎。


    大多数 T-SQL 功能在解释模式下都受到支持。不过，仍然存在一些例外情况。


    *   `TRUNCATE TABLE`。

    *   以内存优化表为目标的 `MERGE` 操作符。

    *   从 CLR 代码发出的上下文连接。

    *   在索引视图中引用内存优化表。你可以在分区视图中引用内存优化表，将来自内存优化表和基于磁盘表的数据组合起来。

    *   `DYNAMIC` 和 `KEYSET` 游标，它们会自动降级为 `STATIC`。

    *   跨数据库查询和事务。

    *   链接服务器。


    如你所见，限制列表相当短。然而，查询互操作访问的灵活性是有代价的。本地编译模块通常比其解释型 T-SQL 对应物更高效。在某些情况下，例如内存优化表与基于磁盘表之间的联接，查询互操作是唯一的选择；但是，在可能的情况下，通常更倾向于使用本地编译模块。


    ## 性能比较


    让我们运行几个测试，比较使用本地编译模块和 T-SQL 模块操作内存优化表的几种用例的性能。


    ### 存储过程性能


    作为第一步，我们将比较 T-SQL 和本地编译存储过程的性能。让我们使用 `schema_only` 持久性选项创建两个内存优化表，以避免测试期间的任何 I/O
    和事务日志记录开销。你可以在清单 9-8 中看到代码，该清单还创建了一个数字表并填充了值。


    ```

    create table dbo.Customers

    (

    CustomerId int not null

    primary key nonclustered

    hash with (bucket_count=262144),

    Name nvarchar(255) not null,

    CreatedOn datetime2(0) not null

    constraint DEF_Customers_CreatedOn

    default sysutcdatetime(),

    Placeholder char(200) not null,

    index IDX_Name nonclustered(Name)

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.Orders

    (

    OrderId int not null

    primary key nonclustered

    hash with (bucket_count=2097152),

    CustomerId int not null,

    OrderNum varchar(32) not null,

    OrderDate datetime2(0) not null

    constraint DEF_Orders_OrderDate

    default sysutcdatetime(),

    Amount money not null,

    Placeholder char(200) not null,

    index IDX_CustomerId

    nonclustered hash(CustomerId)

    with (bucket_count=262144),

    index IDX_OrderNum nonclustered(OrderNum)

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.Numbers

    (

    Num int not null

    constraint PK_Numbers

    primary key clustered

    );

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N3 as t2) -- 1,048,576 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.Numbers(Num)

    select Id from Ids;

    ```

    清单 9-8. 创建测试表


    作为第一步，你将使用三种不同的方法和不同大小的批次来衡量 `INSERT` 性能。前两个存储过程 `InsertCustomers_Row` 和 `InsertCustomers_NativelyCompiled`
    将分别使用互操作引擎和本地编译在逐行基础上运行 `INSERT` 语句。第三个存储过程 `InsertCustomers_Batch` 将通过互操作引擎在单个批次中插入所有行。清单
    9-9 显示了存储过程的实现。


    ```

