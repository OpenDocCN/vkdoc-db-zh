- fmt: 'As you should have already noticed, this concurrency behavior and data consistency
    corresponds to the `SNAPSHOT` transaction isolation level when every transaction
    sees the data as of the time the transaction started. `SNAPSHOT` is the default
    transaction isolation level in the In-Memory OLTP Engine, which also supports
    the `REPEATABLE READ` and `SERIALIZABLE` isolation levels. However, the `REPEATABLE
    READ` and `SERIALIZABLE` transactions in In-Memory OLTP behave differently than
    with disk-based tables. In-Memory OLTP raises an exception and rolls back a transaction
    if `REPEATABLE READ` or `SERIALIZABLE` data consistency rules were violated instead
    of blocking a transaction as with disk-based tables.


    The In-Memory OLTP documentation also indicates that autocommitted (single-statement)
    transactions can run in the `READ COMMITTED` isolation level. However, this is
    a bit misleading. SQL Server promotes and executes such transactions in the `SNAPSHOT`
    isolation level and does not require you to explicitly specify the isolation level
    in your code. Similarly to `SNAPSHOT` transactions, the autocommitted `READ COMMITTED`
    transaction would not see the changes committed after the transaction started,
    which is a different behavior compared to the `READ COMMITTED` transactions against
    disk-based tables.


    Note

    I will discuss the concurrency model in In-Memory OLTP in Chapter [7](#A340879_2_En_7_Chapter.html).


    SQL Server keeps track of the active transactions in the system and detects stale
    rows when their `EndTs` of stake rows is older than the logical start time of
    the oldest active transaction in the system. Stale rows are invisible for active
    transactions in the system, and eventually they are removed from the index row
    chains and deallocated by the garbage collection process.


    Note

    I will cover the garbage collection process in more detail in Chapter [11](#A340879_2_En_11_Chapter.html).


    ## Data Row Format

    As you can guess, the format of the data rows in memory-optimized tables is entirely
    different from disk-based tables and consists of two different sections, the row
    header and the payload, as shown in Figure [3-5](#A340879_2_En_3_Chapter.html#Fig5).


    ![A340879_2_En_3_Fig5_HTML.jpg](A340879_2_En_3_Fig5_HTML.jpg)


    Figure 3-5.

    The structure of a data row in a memory-optimized table


    You are already familiar with the `BeginTs` and `EndTs` timestamps in the row
    header. The next element there is `StmtId`, which references the statement that
    inserted that row. Every statement in a transaction has a unique 4-byte `StmtId`
    value, which works as a Halloween protection technique and allows the statement
    to skip rows it just inserted.


    Halloween Protection

    The Halloween effect is a known problem in the relational database world. It was
    discovered by IBM researchers in 1976 around Halloween, which gave the name to
    phenomena. In a nutshell, it refers to the situation when the execution of a data
    modification query is affected by the previous modifications it performed.


    You can think of the following statement as a classic example of the Halloween
    problem:


    ```

    insert into T

    select * from T

    ```


    Without Halloween protection, this query would fall into an infinitive loop, reading
    the data it just inserted and inserting it over and over again.


    With disk-based tables, SQL Server implements Halloween protection by adding Spool
    operators to the execution plan. These operators create a temporary copy of the
    data before processing it. In this example, all data from the table is cached
    in the Table Spool first, which will work as the source of the data for the insert.


    `StmtId` helps to avoid the Halloween problem in memory-optimized tables. Statements
    check the `StmtId` value of the rows and skip those they just inserted.


    The next element in the header, the 2-byte `IdxLinkCount`, indicates how many
    indexes (pointers) reference the row (or, in the other words, in how many index
    chains this row is participating). SQL Server uses it to detect rows that can
    be deallocated by the garbage collection process. SQL Server also adds empty 2-byte
    padding after `IdxLinkCount` to align the row header with 8-byte boundaries.


    An array of 8-byte index pointers is the last element of the row header. As you
    already know, every memory-optimized table should have at least one index to link
    data rows together. In SQL Server 2016, you can define up to eight indexes per
    memory-optimized table, including the primary key constraint. This restriction
    has been removed in SQL Server 2017.


    The actual row data is stored in the payload section of the row. The payload format
    may vary depending on the table schema. SQL Server works with the payload through
    a DLL that is generated and compiled for the table (more on that in the next section
    of this chapter).


    I would like to reiterate that a key principle of In-Memory OLTP is that payload
    data is never updated. When a table row needs to be updated, In-Memory OLTP deletes
    the version of the row by setting the `EndTs` timestamp of the original row and
    inserts the new data row version with the new `BeginTs` value and an `EndTs` value
    of `Infinity`.'
