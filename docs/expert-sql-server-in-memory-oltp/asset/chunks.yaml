- fmt: '## Summary


    The data from durable memory-optimized tables is placed into a separate filegroup
    utilizing `FILESTREAM` technology under the hood. The data is stored in a set
    of checkpoint files of different types. Data files store the row version data.
    Delta files store the information about deleted rows. The data from LOB columns
    and columnstore indexes is stored in large data files. Finally, root files store
    the information about checkpoint files in the system.


    The data in checkpoint files is never updated. A `DELETE` operation generates
    the new entry in the delta file. An `UPDATE` operation stores the new version
    of the row in the data file, marking the old version as deleted in the delta file.
    SQL Server utilizes the sequential streaming API to write data to those files
    without any random I/O involved.


    Every checkpoint file pair covers a particular interval of Global Transaction
    Timestamp values and goes through a set of predefined states. SQL Server stores
    the new row data in CFPs in the `UNDER CONSTRUCTION` state. These CFPs are converted
    to the `ACTIVE` state at a checkpoint event. Data files of `ACTIVE` CFPs are closed,
    and they do not accept the new row versions; however, they still log information
    about deletions in the delta files.


    SQL Server merges the data from the `ACTIVE` checkpoint file pairs, filtering
    out deleted rows. After the merge is completed and the source CFPs are backed
    up, SQL Server either deallocates them or switches them back to the `FREE` state.


    `ACTIVE` checkpoint file pairs are used during database recovery along with the
    tail of the log. The In-Memory OLTP recovery process is highly scalable and very
    fast. Indexes on memory-optimized tables are not persisted on disk and re-created
    when data is loaded into the memory.


    Transaction logging in In-Memory OLTP is more efficient compared to disk-based
    tables. Transactions are logged at the time of `COMMIT` based on the transaction
    write set. Log records are compact and contain information about multiple row-related
    operations.


    There are two types of table alterations in SQL Server 2016. Metadata-only alteration
    occurs when you add or remove table constraints and/or change system-versioning
    table properties. SQL Server does not re-create the table object; however, it
    may scan the data in the table to validate the constraints.


    By contrast, a regular alteration re-creates a table object in the background,
    assigning it a different `xtp_object_id` value. In the case of deterministic transformations,
    SQL Server performs log optimization and persists only schema-change information,
    transforming the rows from checkpoint files on database startup. In the case of
    nondeterministic transformation, SQL Server uses naïve logging and logs `INSERT`
    events for every row from the table.


    Table alteration is an offline operation that blocks access to the table during
    the execution. You can reduce the impact of alteration by combining multiple similar
    actions into a single `ALTER TABLE` statement.


    # 11. Garbage Collection


    This chapter covers the garbage collection process used in the In-Memory OLTP
    Engine. It provides an overview of the various components involved in garbage
    collection and demonstrates how they interact with each other.


    ## Garbage Collection Process Overview


    In-Memory OLTP is a row-versioning system. `UPDATE` operations generate new versions
    of rows rather than updating row data. `DELETE` operations do not remove the rows
    but rather update the `EndTs` row timestamp. Rows created by aborted transactions
    are not deallocated immediately, and they stay as part of the index row chains
    even after rollback.


    As you know, every row has two timestamps (`BeginTs` and `EndTs`) that indicate
    row lifetime by specifying when the row was created and when it was deleted. Transactions
    can see only the versions of rows that were valid when the transaction started.
    In practice, this means that a row is visible for a transaction only if the transaction
    logical start time (the Global Transaction Timestamp value at the start of the
    transaction) is between the `BeginTs` and `EndTs` timestamps of the row.


    At some point, when the `EndTs` timestamp of a row is older than the Global Transaction
    Timestamp of the oldest active transaction in the system, the row expires. Expired
    rows are invisible for active transactions, and eventually they need to be deallocated
    to reclaim system memory and speed up index chain navigation. This process is
    called garbage collection.


    The garbage collection process in In-Memory OLTP has been designed with the following
    goals:


    *   Nonblocking: The garbage collection process should not block user threads
    and should produce minimal performance impact on the system.

    *   Responsive: The garbage collection process should react to memory pressure.

    *   Cooperative and scalable: The garbage collection process should not rely on
    a single system thread to perform memory deallocation and should also utilize
    regular worker threads during the process.


    The cooperative nature of garbage collection makes it quite different from the
    typical SQL Server background processes. Even though there is a dedicated system
    garbage collection thread (one per NUMA node) called the idle worker thread, the
    major part of the work is done by the regular user worker threads. This allows
    the process to scale and keep up with the workload in the system.


    User threads participate in the garbage collection process in two different ways.
    They unlink old, expired rows from the row chains and perform actual deallocation.
    These actions are separate from each other, as you will see shortly.


    Let’s look at the process in detail. Figure 11-1 illustrates the logical structure
    of a table with two hash indexes on the `Name` and `City` columns. You saw this
    figure in previous chapters; however, in this chapter I’ve added another element
    called `idxLinkCount`, which indicates in how many index chains the rows are participating.
    It is displayed with an underline in the figure; note that all the rows have a
    value of 2, which corresponds to the number of indexes in the table.


    ![A340879_2_En_11_Fig1_HTML.jpg](A340879_2_En_11_Fig1_HTML.jpg)


    Figure 11-1. Initial state of the data


    Assume that you have a session that runs two queries, as shown in Listing 11-1,
    at a time when the Oldest Active Transaction Timestamp is 110 and the Global Transaction
    Timestamp is 125.


    ```

    select * from dbo.People where Name = ''Adam'';

    select * from dbo.People where Name = ''Carl'';

    ```


    Listing 11-1. First Batch


    The first `SELECT` scanned the `Name` index row chain for the bucket with the
    value `A` and detected the `Ann` row with an `EndTs` value of 100. The Oldest
    Active Transaction Timestamp is 110, so this row is expired and invisible for
    the active transactions in the system. As result, the user thread unlinked the
    row from the `Name` index row chain and decreased the `idxLinkCnt` value.


    I would like to reiterate that this operation has been done by the regular user
    worker thread rather than the system thread. This illustrates the cooperative
    nature of garbage collection.'
