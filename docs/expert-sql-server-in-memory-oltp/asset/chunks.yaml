- fmt: '# Summary


    Nonclustered indexes are the second type of indexes supported by the In-Memory
    OLTP Engine. They have similar SARGability rules, with the B-Tree indexes defined
    on disk-based tables with exception of the scans in the opposite order to the
    index sorting order.


    Internally, nonclustered indexes use a lock- and latch-free variation of a B-Tree,
    called a Bw-Tree, which consists of internal and leaf data pages referencing each
    other through the mapping table. Leaf data pages store one row per each individual
    key value, with a pointer to the chain of data rows with the same key.


    SQL Server never updates index pages. Any changes are referenced through the delta
    records that correspond to individual `INSERT` and `DELETE` operations on the
    page. SQL Server consolidates the large chains of delta records and performs splitting
    and merging of the data pages when needed. All of those processes create the new
    data pages, marking the old ones for garbage collection.


    Indexes on memory-optimized tables introduce data modification overhead like indexes
    on disk-based tables. SQL Server must maintain multiple index row chains when
    you insert or update the data. You should avoid defining an excessive number of
    indexes and create a minimally required set of indexes to support the workload.


    The performance of hash indexes greatly depends on the `bucket_count` value. With
    a correct `bucket_count` value, hash indexes would outperform nonclustered indexes
    in point-lookup scenarios. They are a good choice for catalog entities where data
    is relatively static. Nonclustered indexes, on the other hand, are a good choice
    in scenarios when point-lookup is not an option and/or when it is hard to estimate
    the number of buckets in the hash index.


    # 6. Memory Consumers and Off-Row Storage


    This chapter provides an overview of how In-Memory OLTP allocates the memory for
    different objects and explains how off-row column data is stored. It also illustrates
    the performance impact of having off-row columns in a table and explains how SQL
    Server chooses columns that need to be stored off-row .


    ## Varheaps


    In-Memory OLTP database objects allocate memory from separate memory heaps called
    varheaps. Varheaps are the data structures that respond to and track memory allocation
    requests from various database objects, and they can grow and shrink in size when
    needed. All database objects that consume memory are called memory consumers.


    Internally, varheaps allocate memory in pages of various size, with 64KB pages
    being the most common. Each page provides the memory for allocation requests of
    a predefined size. For example, a varheap can have two 64KB pages; one handles
    64-byte allocations, and the other one handles 256-byte allocations.


    Let’s look at the example shown in Listing [6-1](#A340879_2_En_6_Chapter.html#Par5).
    The code creates the table with the hash index and analyzes the table’s memory
    consumers using the `sys.dm_db_xtp_memory_consumers` view. As you can guess by
    the name, this view provides information about memory consumers in the database.
    You will look at several memory-optimized table-related consumers in this and
    the next chapter, and I will discuss this view in detail in Chapter [12](#A340879_2_En_12_Chapter.html).


    ```sql

    create table dbo.Varheaps

    (

    Col varchar(8000) not null

    constraint PK_Varheaps

    primary key nonclustered hash

    with (bucket_count=16384)

    )

    with (memory_optimized = on, durability = schema_only);

    select

    i.name as [Index], i.index_id, c.memory_consumer_id

    ,c.memory_consumer_type_desc as [mc type]

    ,c.memory_consumer_desc as [description], c.allocation_count as [allocs]

    ,c.allocated_bytes, c.used_bytes

    from

    sys.dm_db_xtp_memory_consumers c

    left outer join sys.indexes i on

    c.object_id = i.object_id and c.index_id = i.index_id

    where

    c.object_id = object_id(''dbo.Varheaps'');

    ```


    Listing 6-1. Analyzing Varheaps: Table Creation


    As you can see in Figure [6-1](#A340879_2_En_6_Chapter.html#Fig1), the table has
    two memory consumers /varheaps. The first varheap with type `HASH` provides memory
    for the hash table in the hash index. The hash index has 16,384 buckets and uses
    131,072 bytes of memory, which was allocated at table creation time. The second
    varheap with type `VARHEAP` and the description “Table heap” is providing the
    memory for the data rows. It did not allocate any memory because the table was
    empty.


    ![A340879_2_En_6_Fig1_HTML.jpg](A340879_2_En_6_Fig1_HTML.jpg)


    Figure 6-1. Memory consumers after table creation


    Let’s insert a row into the table with the `INSERT INTO dbo.Varheaps(Col) VALUES(''a'')`
    statement. If you check the memory consumers with the `SELECT` statement from
    Listing [6-1](#A340879_2_En_6_Chapter.html#Par5) again, you would see the results
    shown in Figure [6-2](#A340879_2_En_6_Chapter.html#Fig2). As you can see, the
    table varheap allocated one 64KB memory page and provided 40 bytes to store the
    data row object.


    ![A340879_2_En_6_Fig2_HTML.jpg](A340879_2_En_6_Fig2_HTML.jpg)


    Figure 6-2. Memory consumers after inserting the first row


    Let’s insert another row of the same size with the `INSERT INTO dbo.Varheaps(Col)
    VALUES(''b'')` statement. Figure [6-3](#A340879_2_En_6_Chapter.html#Fig3) illustrates
    the memory consumer state after the second insert. The size of both rows was the
    same, and, therefore, the table heap provided memory from the same, already allocated,
    memory page to the second row.


    ![A340879_2_En_6_Fig3_HTML.jpg](A340879_2_En_6_Fig3_HTML.jpg)


    Figure 6-3. Memory consumers after inserting the second row


    Finally, let’s insert another row of a different size using the `INSERT INTO dbo.Varheaps(Col)
    VALUES(''ccccc'')` statement. This row requires allocation of a different size,
    and the table varheap allocated another 64KB memory page to handle those allocations.
    Figure [6-4](#A340879_2_En_6_Chapter.html#Fig4) illustrates that.


    ![A340879_2_En_6_Fig4_HTML.jpg](A340879_2_En_6_Fig4_HTML.jpg)


    Figure 6-4. Memory consumers after inserting the third row


    Obviously, it is inefficient to allocate the separate memory pages for every possible
    allocation size request. In some cases, the varheap provides the memory from a
    page that serves allocations of the greater size. For example, a 62-byte memory
    allocation could come from a page that serves 64-byte allocations. The page would
    still reserve and use 64 bytes of memory for this allocation even though the memory
    consumer requested a smaller memory allocation.


    Let’s see that in action and run the code in Listing [6-2](#A340879_2_En_6_Chapter.html#Par12).
    It inserts the data rows with `Col` values varying from 2 to 8,000 characters.


    ```sql

    declare

    @I int = 2

    while @I <= 8000

    begin

    insert into dbo.Varheaps(Col) values(replicate(''0'',@I));

    set @I += 1;

    end;

    ```


    Listing 6-2. Analyzing Varheaps: Inserting Rows of Various Sizes


    Figure [6-5](#A340879_2_En_6_Chapter.html#Fig5) illustrates the state of the varheap.
    It allocated 39,452,673 bytes, which correspond to 602 64KB memory pages despite
    that the table stores 8,000 possible combinations of the data row sizes.


    ![A340879_2_En_6_Fig5_HTML.jpg](A340879_2_En_6_Fig5_HTML.jpg)


    Figure 6-5. Memory consumers after populating table with the data


    Per-varheap memory consumer separation allows you to track memory usage on a per-object
    basis. It also helps SQL Server to optimize some internal operations. For example,
    it allows the garbage collection process to more quickly deallocate the memory
    when you drop or alter the table.


    This architecture also allows SQL Server to perform a Table Scan operation that
    scans the varheap pages in a very efficient way. Each varheap page serves allocation
    requests of the same size, and it is easy to calculate the location of each object
    stored on the page. It makes the Table (Varheap) Scan operation more efficient
    compared to the Index Scan operation.'
