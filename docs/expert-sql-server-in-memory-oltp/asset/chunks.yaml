- fmt: '# Page Merging


    Page merging occurs when a delete operation leaves an index page less than 10
    percent from the maximum page size, which is 8KB now, or when an index page contains
    just a single row. During this operation, SQL Server merges the data from two
    adjacent index pages, replacing them with the new, combined data page.


    Assume you have the page layout shown in Figure [B-3](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig6)
    and you want to delete the index key value `Bob` , which means that all data rows
    with the name `Bob` have been already deleted. This leaves an index page with
    the single value `Boris` , which triggers page merging.


    In the first step, SQL Server creates a delete delta record for `Bob` and another
    special kind of delta record called a merge delta . Figure [B-4](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig7)
    illustrates the layout after the first step.


    ![A340879_2_En_BookBackmatter_Fig7_HTML.jpg](A340879_2_En_BookBackmatter_Fig7_HTML.jpg)

    Figure B-4. Page merging: first step


    During the second step of page merging, SQL Server creates a new internal page
    that does not reference the leaf-level page that it is about to be merged. After
    that, SQL Server switches the mapping table to point to the newly created internal
    page and marks the old page for garbage collection. Figure [B-5](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig8)
    illustrates this action.


    ![A340879_2_En_BookBackmatter_Fig8_HTML.jpg](A340879_2_En_BookBackmatter_Fig8_HTML.jpg)

    Figure B-5. Page merging: second step


    Finally, SQL Server builds a new leaf-level page, copying the `Boris` value there.
    After the new page is created, it updates the mapping table and marks the old
    pages and delta records for garbage collection.


    Figure [B-6](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig9) shows the final
    data layout after page merging is completed.


    ![A340879_2_En_BookBackmatter_Fig9_HTML.jpg](A340879_2_En_BookBackmatter_Fig9_HTML.jpg)

    Figure B-6. Page merging: third (final) step


    You can get page consolidation, merging, and splitting statistics from the `sys.dm_db_xtp_nonclustered_index_stats`
    view.


    **Note**

    You can read documentation about the `sys.dm_db_xtp_nonclustered_index_stats`
    view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql).


    ## Summary


    The In-Memory OLTP Engine uses several internal operations to maintain the structure
    of nonclustered indexes. Page consolidation rebuilds the index page, combining
    page data with the delta records. It helps avoid the performance impact introduced
    by long delta records chains.


    Page splitting occurs when the index page does not have enough space to accommodate
    the new rows. In contrast to page splitting in disk-based B-Tree indexes, which
    moves part of the data to the new page, Bw-Tree page splitting replaces the old
    data page with new pages that contain the data.


    Page merging occurs when an index page is less than 10 percent of the maximum
    page size or when it has just a single row. SQL Server merges the data from adjacent
    data pages and replaces them with the new page with the merged data.


    # Appendix C: Analyzing the States of Checkpoint Files


    SQL Server persists data from durable memory-optimized tables in checkpoint files
    . This appendix demonstrates how to analyze the states of checkpoint files using
    the `sys.dm_db_xtp_checkpoint_files` view and shows how the state transitions
    throughout a file’s lifetime.


    ## sys.dm_db_xtp_checkpoint_files View


    The `sys.dm_db_xtp_checkpoint_files` view provides information about database
    checkpoint files, including their state, size, and physical location. You will
    use this view extensively in this appendix. Let’s look at the most important columns:


    *   The `container_id` and `container_guid` columns provide information about
    the `FILESTREAM` container to which a checkpoint file belongs. The `container_id`
    column corresponds to the `file_id` column in the `sys.database_files` view.

    *   `checkpoint_file_id` is a GUID that represents the ID of the file.

    *   `checkpoint_pair_file_id` is the ID of the second, data or delta, file in
    the pair.

    *   `relative_file_path` shows the relative file path in the container.

    *   `state` and `state_desc` describe the state of the file. As you already know
    from Chapter [10](#A340879_2_En_10_Chapter.html) , the checkpoint files can be
    in one of the following states (the number represents the `state` column value):
    `0` for `PRECREATED` , `1` for `UNDER CONSTRUCTION` , `2` for `ACTIVE` , `3` for
    `MERGE TARGET` , and `8` for `WAITING FOR LOG TRUNCATION` .

    *   `file_type` and `file_type_desc` describe the type of file: `-1` for `FREE`
    , `0` for `DATA` , `1` for `DELTA` , `2` for `ROOT` , and `3` for `LARGE_DATA`
    .

    *   `lower_bound_tsn` and `upper_bound_tsn` indicate the timestamp of the earliest
    and latest transactions covered by the file. These columns are populated only
    for the `ACTIVE` and `MERGE TARGET` states.

    *   `file_size_in_bytes` and `file_size_used_in_bytes` provide information about
    the file size and space used in the file. The `file_size_used_in_bytes` value
    is updated at the time of the checkpoint event.

    *   `logical_row_count` provides the number of rows in the data and delta files.


    It is worth noting that in some cases, especially with early SQL Server 2016 builds,
    the view may provide slightly outdated data. For example, the SQL Server 2016
    RTM build may omit information about some of `PRECREATED` files in the database.


    Let’s use this view to analyze the state transitions of the checkpoint files.'
  raw: '#### Page Merging


    Page merging occurs when a delete operation leaves an index page less than 10
    percent from the maximum page size, which is 8KB now, or when an index page contains
    just a single row. During this operation, SQL Server merges the data from two
    adjacent index pages, replacing them with the new, combined data page.


    Assume you have the page layout shown in Figure [B-3](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig6)
    and you want to delete the index key value `Bob` , which means that all data rows
    with the name `Bob` have been already deleted. This leaves an index page with
    the single value `Boris` , which triggers page merging.


    In the first step, SQL Server creates a delete delta record for `Bob` and another
    special kind of delta record called a merge delta . Figure [B-4](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig7)
    illustrates the layout after the first step.


    ![A340879_2_En_BookBackmatter_Fig7_HTML.jpg](A340879_2_En_BookBackmatter_Fig7_HTML.jpg)


    Figure B-4.


    Page merging: first step


    During the second step of page merging, SQL Server creates a new internal page
    that does not reference the leaf-level page that it is about to be merged. After
    that, SQL Server switches the mapping table to point to the newly created internal
    page and marks the old page for garbage collection. Figure [B-5](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig8)
    illustrates this action.


    ![A340879_2_En_BookBackmatter_Fig8_HTML.jpg](A340879_2_En_BookBackmatter_Fig8_HTML.jpg)


    Figure B-5.


    Page merging: second step


    Finally, SQL Server builds a new leaf-level page, copying the `Boris` value there.
    After the new page is created, it updates the mapping table and marks the old
    pages and delta records for garbage collection.


    Figure [B-6](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig9) shows the final
    data layout after page merging is completed.


    ![A340879_2_En_BookBackmatter_Fig9_HTML.jpg](A340879_2_En_BookBackmatter_Fig9_HTML.jpg)


    Figure B-6.


    Page merging: third (final) step


    You can get page consolidation, merging, and splitting statistics from the `sys.dm_db_xtp_nonclustered_index_stats`
    view.


    Note


    You can read documentation about the `sys.dm_db_xtp_nonclustered_index_stats`
    view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql)
    .


    ### Summary


    The In-Memory OLTP Engine uses several internal operations to maintain the structure
    of nonclustered indexes. Page consolidation rebuilds the index page, combining
    page data with the delta records. It helps avoid the performance impact introduced
    by long delta records chains.


    Page splitting occurs when the index page does not have enough space to accommodate
    the new rows. In contrast to page splitting in disk-based B-Tree indexes, which
    moves part of the data to the new page, Bw-Tree page splitting replaces the old
    data page with new pages that contain the data.


    Page merging occurs when an index page is less than 10 percent of the maximum
    page size or when it has just a single row. SQL Server merges the data from adjacent
    data pages and replaces them with the new page with the merged data.


    ## Appendix C: Analyzing the States of Checkpoint Files


    SQL Server persists data from durable memory-optimized tables in checkpoint files
    . This appendix demonstrates how to analyze the states of checkpoint files using
    the `sys.dm_db_xtp_checkpoint_files` view and shows how the state transitions
    throughout a file’s lifetime.


    ### sys.dm_db_xtp_checkpoint_files View


    The `sys.dm_db_xtp_checkpoint_files` view provides information about database
    checkpoint files, including their state, size, and physical location. You will
    use this view extensively in this appendix. Let’s look at the most important columns:


    *   The `container_id` and `container_guid` columns provide information about
    the `FILESTREAM` container to which a checkpoint file belongs. The `container_id`
    column corresponds to the `file_id` column in the `sys.database_files` view.

    *   `checkpoint_file_id` is a GUID that represents the ID of the file.

    *   `checkpoint_pair_file_id` is the ID of the second, data or delta, file in
    the pair.

    *   `relative_file_path` shows the relative file path in the container.

    *   `state` and `state_desc` describe the state of the file. As you already know
    from Chapter [10](#A340879_2_En_10_Chapter.html) , the checkpoint files can be
    in one of the following states (the number represents the `state` column value):
    `0` for `PRECREATED` , `1` for `UNDER CONSTRUCTION` , `2` for `ACTIVE` , `3` for
    `MERGE TARGET` , and `8` for `WAITING FOR LOG TRUNCATION` .

    *   `file_type` and `file_type_desc` describe the type of file: `-1` for `FREE`
    , `0` for `DATA` , `1` for `DELTA` , `2` for `ROOT` , and `3` for `LARGE_DATA`
    .

    *   `lower_bound_tsn` and `upper_bound_tsn` indicate the timestamp of the earliest
    and latest transactions covered by the file. These columns are populated only
    for the `ACTIVE` and `MERGE TARGET` states.

    *   `file_size_in_bytes` and `file_size_used_in_bytes` provide information about
    the file size and space used in the file. The `file_size_used_in_bytes` value
    is updated at the time of the checkpoint event.

    *   `logical_row_count` provides the number of rows in the data and delta files.


    It is worth noting that in some cases, especially with early SQL Server 2016 builds,
    the view may provide slightly outdated data. For example, the SQL Server 2016
    RTM build may omit information about some of `PRECREATED` files in the database.


    Let’s use this view to analyze the state transitions of the checkpoint files.'
  trans: '# 页面合并


    页面合并发生在删除操作导致索引页大小低于最大页面大小（当前为 8KB）的 10%，或者索引页仅包含单行数据时。在此操作期间，SQL Server 会合并两个相邻索引页的数据，用新的合并数据页替换它们。


    假设您有如图 B-3 所示的页面布局，并且您想要删除索引键值`Bob`，这意味着所有名称为`Bob`的数据行都已被删除。这会留下一个仅包含`Boris`值的索引页，从而触发页面合并。


    第一步，SQL Server 为`Bob`创建一个删除增量记录，以及另一种称为合并增量的特殊增量记录。图 B-4 展示了第一步之后的布局。


    ![A340879_2_En_BookBackmatter_Fig7_HTML.jpg](img/A340879_2_En_BookBackmatter_Fig7_HTML.jpg)

    图 B-4. 页面合并：第一步


    在页面合并的第二步中，SQL Server 创建一个新的内部页面，该页面不引用即将被合并的叶级页面。之后，SQL Server 将映射表切换为指向新创建的内部页面，并将旧页面标记为待垃圾回收。图
    B-5 说明了此操作。


    ![A340879_2_En_BookBackmatter_Fig8_HTML.jpg](img/A340879_2_En_BookBackmatter_Fig8_HTML.jpg)

    图 B-5. 页面合并：第二步


    最后，SQL Server 构建一个新的叶级页面，将`Boris`值复制到该页面。新页面创建后，它会更新映射表，并将旧页面和增量记录标记为待垃圾回收。


    图 B-6 展示了页面合并完成后的最终数据布局。


    ![A340879_2_En_BookBackmatter_Fig9_HTML.jpg](img/A340879_2_En_BookBackmatter_Fig9_HTML.jpg)

    图 B-6. 页面合并：第三步（最终步骤）


    您可以从`sys.dm_db_xtp_nonclustered_index_stats`视图获取页面整合、合并和拆分的统计信息。


    **注意**

    您可以在[`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql)阅读关于`sys.dm_db_xtp_nonclustered_index_stats`视图的文档。


    ## 总结


    内存中 OLTP 引擎使用几种内部操作来维护非聚集索引的结构。页面整合重建索引页，将页面数据与增量记录合并。它有助于避免由长增量记录链引入的性能影响。


    页面拆分发生在索引页没有足够空间容纳新行时。与基于磁盘的 B 树索引中的页面拆分（它将部分数据移动到新页）不同，Bw-Tree 页面拆分用包含数据的新页面替换旧数据页面。


    页面合并发生在索引页大小低于最大页面大小的 10%或仅包含单行数据时。SQL Server 合并相邻数据页的数据，并用包含合并数据的新页面替换它们。


    # 附录 C：分析检查点文件的状态


    SQL Server 将持久化内存优化表的数据持久化在检查点文件中。本附录演示了如何使用`sys.dm_db_xtp_checkpoint_files`视图分析检查点文件的状态，并展示了文件在其生命周期内的状态转换过程。


    ## sys.dm_db_xtp_checkpoint_files 视图


    `sys.dm_db_xtp_checkpoint_files`视图提供了关于数据库检查点文件的信息，包括其状态、大小和物理位置。您将在本附录中广泛使用此视图。让我们看看最重要的列：


    *   `container_id`和`container_guid`列提供了关于检查点文件所属的`FILESTREAM`容器的信息。`container_id`列对应于`sys.database_files`视图中的`file_id`列。

    *   `checkpoint_file_id`是一个 GUID，表示文件的 ID。

    *   `checkpoint_pair_file_id`是配对中的第二个文件（数据或增量文件）的 ID。

    *   `relative_file_path`显示容器中的相对文件路径。

    *   `state`和`state_desc`描述文件的状态。正如您从第 10 章已经了解到的，检查点文件可以处于以下状态之一（数字表示`state`列值）：`0`代表`PRECREATED`，`1`代表`UNDER
    CONSTRUCTION`，`2`代表`ACTIVE`，`3`代表`MERGE TARGET`，`8`代表`WAITING FOR LOG TRUNCATION`。

    *   `file_type`和`file_type_desc`描述文件类型：`-1`代表`FREE`，`0`代表`DATA`，`1`代表`DELTA`，`2`代表`ROOT`，`3`代表`LARGE_DATA`。

    *   `lower_bound_tsn`和`upper_bound_tsn`指示文件所覆盖的最早和最晚事务的时间戳。这些列仅在`ACTIVE`和`MERGE
    TARGET`状态下才会填充。

    *   `file_size_in_bytes`和`file_size_used_in_bytes`提供关于文件大小和文件中已用空间的信息。`file_size_used_in_bytes`值在检查点事件时更新。

    *   `logical_row_count`提供数据文件和增量文件中的行数。


    值得注意的是，在某些情况下，尤其是早期的 SQL Server 2016 版本中，该视图可能提供稍显过时的数据。例如，SQL Server 2016 RTM
    版本可能会忽略数据库中一些`PRECREATED`文件的信息。


    让我们使用此视图来分析检查点文件的状态转换。'
- fmt: '# The Lifetime of Checkpoint Files


    作为此测试的第一步，让我们使用 `DBCC TRACEON(9851,-1)` 命令启用未公开的跟踪标志 `T9851`。此跟踪标志会禁用自动合并过程，从而使您可以更好地控制测试环境。


    重要提示：请勿在生产环境中设置 `T9851`。


    让我们创建一个包含内存优化（In-Memory OLTP）文件组的数据库并执行完整备份，从而启动备份链，如代码清单 [C-1](#A340879_2_En_BookBackmatter_OnlinePDF.html#Par17)
    所示。我在测试环境中执行此操作，并未遵循最佳实践（例如将内存优化数据和基于磁盘的数据放在不同的驱动器上、为基于磁盘的数据创建辅助文件组等）。显然，在设计真实数据库时，您应记得遵循最佳实践。


    ```sql

    create database [InMemoryOLTP2016_AppendixC]

    on primary

    (

    name = N''AppendixC'',

    filename = N''C:\Data\AppendixC.mdf''

    ),

    filegroup HKData CONTAINS MEMORY_OPTIMIZED_DATA

    (

    name = N''AppendixC_HKData'',

    filename = N''C:\Data\HKData\AppendixC''

    )

    log on

    (

    name = N''AppendixC_Log'',

    filename = N''C:\Data\AppendixC_log.ldf''

    )

    go

    create table InMemoryOLTP2016_AppendixC.dbo.T(ID int);

    go

    backup database [InMemoryOLTP2016_AppendixC]

    to disk = N''C:\Data\Backups\AppendixC.bak''

    with noformat, init, name = ''AppendixC - Full'', compression;

    ```

    代码清单 C-1. 创建数据库并执行备份


    数据库当前为空，因此未创建任何检查点文件。您可以通过查询 `sys.dm_db_xtp_checkpoint_files` 视图来确认这一点，如代码清单 [C-2](#A340879_2_En_BookBackmatter_OnlinePDF.html#Par19)
    所示。


    ```sql

    use [InMemoryOLTP2016_AppendixC]

    go

    select

    checkpoint_file_id

    ,checkpoint_pair_file_id

    ,file_type_desc

    ,state_desc

    ,file_size_in_bytes / 1024 / 1024 as [size MB]

    ,relative_file_path

    from

    sys.dm_db_xtp_checkpoint_files;

    ```

    代码清单 C-2. 检查检查点文件


    图 [C-1](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig10) 显示结果集为空，并且 `sys.dm_db_xtp_checkpoint_files`
    视图未返回任何数据。


    ![A340879_2_En_BookBackmatter_Fig10_HTML.jpg](A340879_2_En_BookBackmatter_Fig10_HTML.jpg)


    图 C-1. 数据库创建后的检查点文件状态


    接下来，让我们创建一个持久化的内存优化表，如代码清单 [C-3](#A340879_2_En_BookBackmatter_OnlinePDF.html#Par22)
    所示。


    ```sql

    create table dbo.HKData

    (

    ID int not null,

    Placeholder char(8000) not null,

    constraint PK_HKData

    primary key nonclustered hash(ID)

    with (bucket_count=8192),

    )

    with (memory_optimized=on, durability=schema_and_data);

    ```

    代码清单 C-3. 创建持久化内存优化表


    如果您现在检查检查点文件的状态并再次运行代码清单 [C-2](#A340879_2_En_BookBackmatter_OnlinePDF.html#Par19)
    中的代码，您将看到如图 [C-2](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig11) 所示的输出。文件大小在您的环境中可能不同，并取决于硬件。我的测试机有
    16 个 CPU 和 256GB RAM，因此 SQL Server 为数据预分配了 128MB，为大数据预分配了 64MB，为增量文件预分配了 8MB，为根文件预分配了
    16MB。根文件以 `ACTIVE` 状态创建；所有其他文件类型为空且处于 `PRECREATED` 状态。


    ![A340879_2_En_BookBackmatter_Fig11_HTML.jpg](A340879_2_En_BookBackmatter_Fig11_HTML.jpg)


    图 C-2. 创建持久化内存优化表后的检查点文件状态


    让我们放大显示其中一些文件，如图 [C-3](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig12) 所示。


    ![A340879_2_En_BookBackmatter_Fig12_HTML.jpg](A340879_2_En_BookBackmatter_Fig12_HTML.jpg)


    图 C-3. 检查点文件（放大视图）


    `relative_file_path` 列提供相对于内存优化文件组中 `FILESTREAM` 容器的文件路径。图 [C-4](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig13)
    显示了磁盘上文件夹中的检查点文件。'
  raw: '### The Lifetime of Checkpoint Files


    As the first step in this test, let’s enable the undocumented trace flag `T9851`
    using the `DBCC TRACEON(9851,-1)` command. This trace flag disables the automatic
    merge process, which will allow you to have more control over your test environment.


    Important


    Do not set `T9851` in production.


    Let’s create a database with an In-Memory OLTP filegroup and perform a full backup,
    starting the backup chain, as shown in Listing [C-1](#A340879_2_En_BookBackmatter_OnlinePDF.html#Par17)
    . I am doing this in a test environment and not following best practices (such
    as placing In-Memory OLTP and disk-based data on different drives, creating secondary
    filegroups for disk-based data, and a few others). Obviously, you should remember
    to follow best practices when you design your real databases.


    ```

    create database [InMemoryOLTP2016_AppendixC]

    on primary

    (

    name = N''AppendixC''

    ,filename = N''C:\Data\AppendixC.mdf''

    ),

    filegroup HKData CONTAINS MEMORY_OPTIMIZED_DATA

    (

    name = N''AppendixC_HKData''

    ,filename = N''C:\Data\HKData\AppendixC''

    )

    log on

    (

    name = N''AppendixC_Log''

    ,filename = N''C:\Data\AppendixC_log.ldf''

    )

    go

    create table InMemoryOLTP2016_AppendixC.dbo.T(ID int);

    go

    backup database [InMemoryOLTP2016_AppendixC]

    to disk = N''C:\Data\Backups\AppendixC.bak''

    with noformat, init, name = ''AppendixC - Full'', compression;

    Listing C-1.

    Creating a Database and Performing a Backup

    ```


    The database is currently empty; therefore, it does not have any checkpoint files
    created. You can confirm this by querying the `sys.dm_db_xtp_checkpoint_files`
    view, as shown in Listing [C-2](#A340879_2_En_BookBackmatter_OnlinePDF.html#Par19)
    .


    ```

    use [InMemoryOLTP2016_AppendixC]

    go

    select

    checkpoint_file_id

    ,checkpoint_pair_file_id

    ,file_type_desc

    ,state_desc

    ,file_size_in_bytes / 1024 / 1024 as [size MB]

    ,relative_file_path

    from

    sys.dm_db_xtp_checkpoint_files;

    Listing C-2.

    Checking Checkpoint Files

    ```


    Figure [C-1](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig10) shows that the
    resultset is empty and that the `sys.dm_db_xtp_checkpoint_files` view does not
    return any data.


    ![A340879_2_En_BookBackmatter_Fig10_HTML.jpg](A340879_2_En_BookBackmatter_Fig10_HTML.jpg)


    Figure C-1.


    State of checkpoint files after database creation


    As the next step, let’s create a durable memory-optimized table, as shown in Listing
    [C-3](#A340879_2_En_BookBackmatter_OnlinePDF.html#Par22) .


    ```

    create table dbo.HKData

    (

    ID int not null,

    Placeholder char(8000) not null,

    constraint PK_HKData

    primary key nonclustered hash(ID)

    with (bucket_count=8192),

    )

    with (memory_optimized=on, durability=schema_and_data);

    Listing C-3.

    Creating a Durable Memory-Optimized Table

    ```


    If you check the state of the checkpoint files now and run the code from Listing
    [C-2](#A340879_2_En_BookBackmatter_OnlinePDF.html#Par19) again, you will see the
    output shown in Figure [C-2](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig11)
    . The size of the files may be different in your environment and will depend on
    the hardware. My test machine has 16 CPUs and 256GB of RAM, so SQL Server preallocated
    128MB for data, 64MB for large data, 8MB for delta files, and 16MB for root files.
    The root file was created in `ACTIVE` state; all other file types were empty and
    in a `PRECREATED` state.


    ![A340879_2_En_BookBackmatter_Fig11_HTML.jpg](A340879_2_En_BookBackmatter_Fig11_HTML.jpg)


    Figure C-2.


    State of checkpoint files after creating the durable memory-optimized table


    Let’s enlarge the output for some of the files, as shown in Figure [C-3](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig12)
    .


    ![A340879_2_En_BookBackmatter_Fig12_HTML.jpg](A340879_2_En_BookBackmatter_Fig12_HTML.jpg)


    Figure C-3.


    Checkpoint files (enlarged)


    The `relative_file_path` column provides the path to the file relative to the
    `FILESTREAM` container in the In-Memory OLTP filegroup. Figure [C-4](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig13)
    shows the checkpoint files in the folder on the disk.'
  trans: '

    # 检查点文件的生命周期


    作为此测试的第一步，让我们使用 `DBCC TRACEON(9851,-1)` 命令启用未公开的跟踪标志 `T9851`。此跟踪标志会禁用自动合并过程，从而使您可以更好地控制测试环境。


    重要提示：请勿在生产环境中设置 `T9851`。


    让我们创建一个包含内存优化（In-Memory OLTP）文件组的数据库并执行完整备份，从而启动备份链，如代码清单 C-1 所示。我在测试环境中执行此操作，并未遵循最佳实践（例如将内存优化数据和基于磁盘的数据放在不同的驱动器上、为基于磁盘的数据创建辅助文件组等）。显然，在设计真实数据库时，您应记得遵循最佳实践。


    ```sql

    create database [InMemoryOLTP2016_AppendixC]

    on primary

    (

    name = N''AppendixC'',

    filename = N''C:\Data\AppendixC.mdf''

    ),

    filegroup HKData CONTAINS MEMORY_OPTIMIZED_DATA

    (

    name = N''AppendixC_HKData'',

    filename = N''C:\Data\HKData\AppendixC''

    )

    log on

    (

    name = N''AppendixC_Log'',

    filename = N''C:\Data\AppendixC_log.ldf''

    )

    go

    create table InMemoryOLTP2016_AppendixC.dbo.T(ID int);

    go

    backup database [InMemoryOLTP2016_AppendixC]

    to disk = N''C:\Data\Backups\AppendixC.bak''

    with noformat, init, name = ''AppendixC - Full'', compression;

    ```

    代码清单 C-1. 创建数据库并执行备份


