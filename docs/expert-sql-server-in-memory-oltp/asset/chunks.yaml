- fmt: '# Table 4-1. Execution Time of INSERT Statements


    Table [4-1](#A340879_2_En_4_Chapter.html#Tab1) shows the execution time of the
    `INSERT` statements in my test environment. As you can see, inserting data into
    the `dbo.HashIndex_HighBucketCount` table is about 35 times faster compared to
    the `dbo.HashIndex_LowBucketCount` counterpart.


    | dbo.HashIndex_HighBucketCount (1,048,576 Buckets) | dbo.HashIndex_LowBucketCount
    (1,024 Buckets) |

    | --- | --- |

    | 1,122 ms | 39,955 ms |


    # Listing 4-2. Obtaining Information About Hash Indexes


    Listing [4-2](#A340879_2_En_4_Chapter.html#Par20) shows the query that returns
    the bucket count and row chains information using the `sys.dm_db_xtp_hash_index_stats`
    view. Keep in mind that this view scans the entire table, which is time-consuming
    when the tables are large.


    ```sql

    select

    s.name + ''.'' + t.name as [Table]

    ,i.name as [Index]

    ,stat.total_bucket_count as [Total Buckets]

    ,stat.empty_bucket_count as [Empty Buckets]

    ,floor(100\. * empty_bucket_count / total_bucket_count)

    as [Empty Bucket %]

    ,stat.avg_chain_length as [Avg Chain]

    ,stat.max_chain_length as [Max Chain]

    from

    sys.dm_db_xtp_hash_index_stats stat

    join sys.tables t on

    stat.object_id = t.object_id

    join sys.indexes i on

    stat.object_id = i.object_id and

    stat.index_id = i.index_id

    join sys.schemas s on

    t.schema_id = s.schema_id

    ```


    # Figure 4-4. sys.dm_db_xtp_hash_index_stats output


    Figure [4-4](#A340879_2_En_4_Chapter.html#Fig4) shows the output of the query.
    As you can see, the `dbo.HashIndex_HighBucketCount` table has on average one row
    in the row chains, while the `dbo.HashIndex_LowBucketCount` table has almost 1,000
    rows per chain. It is worth noting that even though the hash function used by
    In-Memory OLTP provides relatively good random data distribution, some level of
    hash collision is still present.


    ![A340879_2_En_4_Fig4_HTML.jpg](A340879_2_En_4_Fig4_HTML.jpg)


    The incorrect bucket count estimation and long row chains can significantly affect
    the performance of both reader and writer queries. You have already seen the performance
    impact for the insert operation. Now let’s look at a `SELECT` query.


    # Listing 4-3. Bucket_count and Performance: Selecting Data in the Tables


    Listing [4-3](#A340879_2_En_4_Chapter.html#Par24) shows the code that triggers
    65,536 Index Seek operations in each memory-optimized table. I wrote this query
    in a very inefficient way just to demonstrate the impact of the long row chains.


    ```sql

    declare

    @T table(Id int not null primary key)

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N5)

    insert into @T(Id)

    select Id from Ids;

    select t.id, c.Cnt

    from @T t

    cross apply

    (

    select count(*) as Cnt

    from dbo.HashIndex_HighBucketCount h

    where h.Id = t.Id

    ) c;

    select t.id, c.Cnt

    from @T t

    cross apply

    (

    select count(*) as Cnt

    from dbo.HashIndex_LowBucketCount h

    where h.Id = t.Id

    ) c;

    ```


    You can confirm that the queries traversed the row chains 65,536 times by analyzing
    the execution plan shown in Figure [4-5](#A340879_2_En_4_Chapter.html#Fig5).


    ![A340879_2_En_4_Fig5_HTML.jpg](A340879_2_En_4_Fig5_HTML.jpg)


    # Figure 4-5. Execution plan of the queries


    # Table 4-2. Execution Time of SELECT Statements


    Table [4-2](#A340879_2_En_4_Chapter.html#Tab2) shows the queries’ execution time
    in my environment where the query against the `dbo.HashIndex_LowBucketCount` table
    was about 20 times slower.


    | dbo.HashIndex_HighBucketCount (1,048,576 Buckets) | dbo.HashIndex_LowBucketCount
    (1,024 Buckets) |

    | --- | --- |

    | 301 ms | 6,259 ms |


    While you can clearly see that underestimation of the bucket counts can degrade
    system performance, overestimation is not good either. First, every bucket uses
    8 bytes to store the memory pointer, and a large number of unused buckets is a
    waste of system memory. For example, defining the index with `bucket_count=100000000`
    will introduce 134,217,728 buckets, which will require 128MB of RAM. This does
    not seem much in the scope of a single index; however, it could become an issue
    as the number of indexes increase.


    Moreover, SQL Server needs to scan all buckets in the index when it performs an
    Index Scan operation, and extra buckets add some overhead to the process. Listing
    [4-4](#A340879_2_En_4_Chapter.html#Par29) shows the queries that demonstrate this
    kind of overhead.


    # Listing 4-4. Bucket_count and Performance: Index Scan Queries


    ```sql

    select count(*)

    from dbo.HashIndex_HighBucketCount

    with (index= PK_HashIndex_HighBucketCount)

    option (maxdop 1);

    select count(*)

    from dbo.HashIndex_LowBucketCount

    with (index= PK_HashIndex_LowBucketCount)

    option (maxdop 1);

    ```


    # Table 4-3. Execution Time of SELECT Statements (Empty Buckets Overhead)


    Table [4-3](#A340879_2_En_4_Chapter.html#Tab3) shows the execution time in my
    environment. As you see, the overhead of scanning extra buckets is not significant;
    however, it still exists.


    | dbo.HashIndex_HighBucketCount (1,048,576 Buckets) | dbo.HashIndex_LowBucketCount
    (1,024 Buckets) |

    | --- | --- |

    | 51 ms | 62 ms |


    It is also worth noting that in the majority of cases, SQL Server 2016 will not
    scan the hash index but rather scan the table heap with the Table Scan operator.
    I will discuss this in more detail in Chapter [6](#A340879_2_En_6_Chapter.html).'
