    Obviously, different scenarios will lead to different results, and performance
    improvements would greatly depend on the hardware, database schema, and use case
    and workload in the system. However, with OLTP workloads, it is not uncommon to
    see an improvement of 3 to 5 times when you access memory-optimized tables through
    the Interop Engine and an improvement of 10 to 40 times with natively compiled
    stored procedures.


    More importantly, In-Memory OLTP allows you to improve the performance of the
    system by scaling up and upgrading hardware. For example, in this scenario, you
    can achieve better throughput by adding more CPUs and/or increasing I/O performance.
    This would be impossible to do with disk-based tables where latch contention becomes
    a bottleneck.'
  trans: '

    尽管我已将插入吞吐量推至极限，服务器上的 CPU 负载仍然非常低，这清楚地表明在测试期间 CPU 并非瓶颈。与此同时，服务器却因大量的 **latch**（锁存器）而受到影响，这些锁存器用于序列化对缓冲池中数据页的访问。虽然单个锁存器的等待时间相对较短，但由于每秒获取的锁存器数量过多，总的锁存等待时间仍然很高。


    进一步增加会话数并无助益，实际上甚至略微降低了吞吐量。图 2-2 展示了 300 个并发会话下的性能计数器。如你所见，平均锁存等待时间随负载增加而持续上升。


    ![A340879_2_En_2_Fig2_HTML.jpg](img/A340879_2_En_2_Fig2_HTML.jpg)

    **图 2-2.** 向基于磁盘的表插入数据时的性能计数器（300 个并发会话）


    通过分析测试期间收集的等待统计信息，可以确认锁存器是瓶颈。图 2-3 展示了 `sys.dm_os_wait_stats` 视图的输出。你可以看到锁存等待位列榜首。


    ![A340879_2_En_2_Fig3_HTML.jpg](img/A340879_2_En_2_Fig3_HTML.jpg)

    **图 2-3.** 测试期间收集的等待统计信息（向基于磁盘的表插入）


    当我使用 `dbo.InsertRequestInfo_Memory` 存储过程重复测试时，情况发生了变化。该存储过程通过 **Interop Engine**（互操作引擎）向内存优化表插入数据。在
    300 个并发会话下，我将吞吐量推至极限，这比之前的测试会话数翻了一番。在此场景下，SQL Server 能够处理约每秒 74,000 个批处理/调用，吞吐量提升了超过
    16 倍。进一步增加并发会话数并未改变吞吐量；然而，随着会话数增加，每次调用的持续时间线性增长。


    图 2-4 展示了测试期间的性能计数器。如你所见，使用内存优化表时不存在锁存器，且 CPU 得到了充分利用。


    ![A340879_2_En_2_Fig4_HTML.jpg](img/A340879_2_En_2_Fig4_HTML.jpg)

    **图 2-4.** 通过互操作引擎向内存优化表插入数据时的性能计数器


    如图 2-5 所示，系统中唯一显著的等待是 `WRITELOG`，这与事务日志的写入性能相关。


    ![A340879_2_En_2_Fig5_HTML.jpg](img/A340879_2_En_2_Fig5_HTML.jpg)

    **图 2-5.** 测试期间收集的等待统计信息（通过互操作引擎向内存优化表插入）


    原生存储过程 `dbo.InsertRequestInfo_NativelyCompiled` 进一步改善了状况。在 400 个并发会话下，SQL Server
    能够处理约每秒 106,000 个批处理/调用，相当于约每秒 950,000 次单独插入。


    图 2-6 展示了测试执行期间的性能计数器。即使吞吐量有所增加，原生存储过程对 CPU 的负载也低于互操作引擎，并且在此配置下，磁盘性能成为了明显的瓶颈。


    ![A340879_2_En_2_Fig6_HTML.jpg](img/A340879_2_En_2_Fig6_HTML.jpg)

    **图 2-6.** 使用原生存储过程向内存优化表插入数据时的性能计数器


    等待统计中的等待情况与之前的测试类似，`WRITELOG` 是系统中唯一显著的等待（见图 2-7）。


    ![A340879_2_En_2_Fig7_HTML.jpg](img/A340879_2_En_2_Fig7_HTML.jpg)

    **图 2-7.** 测试期间收集的等待统计信息（使用原生存储过程向内存优化表插入）


    通过使用**非持久化**内存优化表运行相同的测试，可以确认磁盘性能是此配置下的限制因素。你可以通过删除并重新创建数据库，并使用 `DURABILITY=SCHEMA_ONLY`
    选项创建相同的内存优化表集来实现这一点。无需其他代码更改。


    图 2-8 展示了测试期间收集的性能计数器，其中 400 个并发会话调用 `dbo.InsertRequestInfo_NativelyCompiled`
    存储过程向非持久化表插入数据。如你所见，在此场景下，在移除 I/O 瓶颈后，我能够完全利用系统上的 CPU，与持久化内存优化表相比，吞吐量又提升了 50%。


    ![A340879_2_En_2_Fig8_HTML.jpg](img/A340879_2_En_2_Fig8_HTML.jpg)

    **图 2-8.** 使用原生存储过程向非持久化内存优化表插入数据时的性能计数器


    最后值得注意的是，内存 OLTP 使用了不同且更高效的日志记录方式，这导致事务日志占用空间小得多。图 2-9 展示了使用 `sys.dm_io_virtual_file_stats`
    DMF 在一分钟的测试执行期间收集的日志文件写入统计信息。图中的输出顺序对应于测试运行的顺序：基于磁盘的表插入、通过互操作引擎向内存优化表插入、以及原生存储过程插入。


    ![A340879_2_En_2_Fig9_HTML.jpg](img/A340879_2_En_2_Fig9_HTML.jpg)

    **图 2-9.** 测试期间的事务日志写入统计信息


    如你所见，在互操作模式下，内存 OLTP 插入的数据量是原来的 16 倍以上；然而，它在事务日志中占用的空间仅比基于磁盘的表多 7.6 倍。使用原生存储过程的情况甚至更好。尽管它写入日志的数据量比互操作模式多了约
    12%，但插入的数据量却多了约 30%。


    **注意：** 我将在第 10 章更深入地讨论内存 OLTP 事务日志记录。


    显然，不同的场景会导致不同的结果，性能提升在很大程度上取决于硬件、数据库架构、系统用例和工作负载。然而，对于 OLTP 工作负载，通过互操作引擎访问内存优化表时，通常能看到
    3 到 5 倍的性能提升；而使用原生存储过程时，可获得 10 到 40 倍的提升。


    更重要的是，内存 OLTP 允许你通过向上扩展和升级硬件来提升系统性能。例如，在此场景下，你可以通过增加更多 CPU 和/或提高 I/O 性能来实现更好的吞吐量。这对于基于磁盘的表来说是不可能的，因为锁存争用会成为瓶颈。

