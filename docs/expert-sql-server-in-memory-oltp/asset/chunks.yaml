  trans: '

    对于第一次测试，让我们对两个表运行 `SELECT` 语句，在查询中同时指定 `LastName` 和 `FirstName` 作为谓词，如清单 4-6 所示。


    ```

    select CustomerId, FirstName, LastName

    from dbo.CustomersOnDisk

    where FirstName = ''Paul'' and LastName = ''White'';

    select CustomerId, FirstName, LastName

    from dbo.CustomersMemoryOptimized

    where FirstName = ''Paul'' and LastName = ''White'';

    Listing 4-6.

    复合哈希索引：使用两个索引列作为谓词来选择数据

    ```


    如图 4-6 所示，SQL Server 在两种情况下都能够使用索引查找操作。


    ![A340879_2_En_4_Fig6_HTML.jpg](img/A340879_2_En_4_Fig6_HTML.jpg)


    图 4-6.


    复合哈希索引：当查询使用两个索引列作为谓词时的执行计划


    在下一步中，让我们检查一下，如果从查询中移除对 `FirstName` 的筛选会发生什么。清单 4-7 显示了代码。


    ```

    select CustomerId, FirstName, LastName

    from dbo.CustomersOnDisk

    where LastName = ''White'';

    select CustomerId, FirstName, LastName

    from dbo.CustomersMemoryOptimized

    where LastName = ''White'';

    Listing 4-7.

    复合哈希索引：仅使用最左侧索引列选择数据

    ```


    对于基于磁盘的索引，SQL Server 仍然能够利用索引查找操作。但对于在内存优化表上定义的复合哈希索引，情况则不同。你可以在图 4-7 中看到查询的执行计划。


    ![A340879_2_En_4_Fig7_HTML.jpg](img/A340879_2_En_4_Fig7_HTML.jpg)


    图 4-7.


    复合哈希索引：当查询仅使用最左侧索引列时的执行计划


    ## 内存优化表的统计信息


    SQL Server 2016 会在内存优化表上创建并自动更新索引级和列级统计信息。但是，在兼容级别低于 130（SQL Server 2016）的数据库下创建的表，其统计信息会启用
    `NORECOMPUTE` 选项，这将阻止统计信息的自动更新。


    这种情况可能在两种情形下发生：内存优化表是在 SQL Server 2014 中创建的，后来迁移到了 SQL Server 2016；或者 SQL Server
    2016 数据库在低于 130 的兼容级别下运行。


    让我们来看看这种行为，并运行清单 4-8 中的代码。这段代码将数据库兼容级别更改为 120 并创建表 `dbo.Stats120`。接下来，它将兼容级别切换回
    130 并创建另一个表 `dbo.Stats130`。最后，代码查看表索引的统计信息属性。


    ```

    alter database current set compatibility_level=120;

    go

    create table dbo.Stats120

    (

    Id int not null

    constraint PK_Stats120

    primary key nonclustered

    hash with (bucket_count=1024),

    Value int not null

    )

    with (memory_optimized=on, durability=schema_only);

    go

    alter database current set compatibility_level=130;

    go

    create table dbo.Stats130

    (

    Id int not null

    constraint PK_Stats130

    primary key nonclustered

    hash with (bucket_count=1024),

    Value int not null

    )

    with (memory_optimized=on, durability=schema_only);

    go

    select

    sc.name + ''.'' + t.name as [Table]

    ,s.name as [Statistics]

    ,s.no_recompute

    from

    sys.stats s join sys.tables t on

    s.object_id = t.object_id

    join sys.schemas sc on

    t.schema_id = sc.schema_id

    where

    t.name like ''Stats%'';

    Listing 4-8.

    统计信息 NORECOMPUTE 与兼容级别

    ```


    如图 4-8 所示，`dbo.Stats120.PK_Stats120` 统计信息启用了 `NORECOMPUTE` 选项，这将阻止该统计信息的自动更新。而
    `dbo.Stats130.PK_Stats130` 统计信息则不同，它是在数据库兼容级别为 130 下创建的。


    ![A340879_2_En_4_Fig8_HTML.jpg](img/A340879_2_En_4_Fig8_HTML.jpg)


    图 4-8.


    统计信息 NORECOMPUTE 选项


    你可以通过使用 `UPDATE STATISTICS` 语句手动更新受影响的统计信息来更改 `NORECOMPUTE` 选项的值并启用统计信息自动更新。值得再次强调的是，统计信息的
    `NORECOMPUTE` 选项是由创建表时的数据库兼容级别控制的，而不是由自动统计信息更新设置控制。具有 `NORECOMPUTE=OFF` 选项的统计信息将被自动更新，无论兼容级别如何，前提是启用了“自动更新统计信息”数据库选项。


    在将数据库从 SQL Server 2014 迁移后，你应该手动更新内存优化表上的所有统计信息并启用统计信息自动更新。你可以通过运行清单 4-9 所示的代码来实现这一点。它为所有具有
    `NORECOMPUTE=ON` 选项的统计信息生成 `UPDATE STATISTICS` 命令，并使用动态 SQL 运行它们。


    ```

    declare

    @SQL nvarchar(max)

    select

    @SQL = convert(nvarchar(max),

    (

    select

    N''update statistics '' as [text()]

    ,sc.name + N''.'' + t.name as [text()]

    ,N''('' + s.name + N''); '' as [text()]

    from

    sys.stats s join sys.tables t on

    s.object_id = t.object_id

    join sys.schemas sc on

    t.schema_id = sc.schema_id

    where

    t.is_memory_optimized = 1 and

    s.no_recompute = 1

    for xml path('''')

    ));

    exec sp_executesql @SQL;

    Listing 4-9.

    更新所有具有 NORECOMPUTE=ON 的统计信息

    ```

