    ### 垃圾回收


    以下视图提供系统中垃圾回收过程的信息：


    *   `sys.dm_xtp_gc_stats` 报告关于垃圾回收过程的整体统计信息。更多详细信息请访问 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-stats-transact-sql)。

    *   `sys.dm_xtp_gc_queue_stats` 提供有关垃圾回收工作项队列状态的信息。您可以使用此视图来监视垃圾回收解除分配过程是否跟得上系统负载。您可以在
    [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-queue-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-queue-stats-transact-sql)
    阅读关于此视图的更多信息。

    *   `sys.dm_db_xtp_gc_cycle_stats` 提供有关空闲工作线程生成队列的信息。我在第 11 章讨论了此视图，您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-gc-cycle-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-gc-cycle-stats-transact-sql)
    阅读更多相关内容。


    ### 检查点


    以下视图提供有关当前数据库中检查点操作的信息：


    *   `sys.dm_db_xtp_checkpoint_stats` 报告关于数据库检查点操作的整体统计信息。它包含日志文件 I/O 统计信息、连续检查点期间处理的数据量、自上次检查点操作以来的时间以及许多其他指标。有关此视图的更多信息，请访问
    [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-checkpoint-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-checkpoint-stats-transact-sql)。

    *   `sys.dm_db_xtp_checkpoint_files` 提供有关数据库中检查点文件对的信息。附录 C 展示了此视图的实际应用，您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-checkpoint-files-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-checkpoint-files-transact-sql)
    阅读更多相关内容。


    ### 扩展事件和性能计数器


    SQL Server 拥有大量可用于监视和诊断内存优化表相关操作的扩展事件和性能计数器。您可以使用清单 12-12 中的代码来获取内存优化表扩展事件列表。


    ```sql

    select

    xp.name as [package]

    ,xo.name as [event]

    ,xo.description as [description]

    from

    sys.dm_xe_packages xp

    join sys.dm_xe_objects xo on

    xp.guid = xo.package_guid

    where

    xp.name like ''XTP%'' or xo.name like ''%XTP%''

    order by

    xp.name, xo.name

    -- 清单 12-12. 分析内存优化表扩展事件

    ```


    图 12-10 展示了该查询的部分输出。我建议您分析查询的完整输出，并熟悉那些可能对监视和诊断有用的事件。


    ![A340879_2_En_12_Fig10_HTML.jpg](img/A340879_2_En_12_Fig10_HTML.jpg)


    图 12-10. 内存优化表扩展事件


    类似地，您可以使用清单 12-13 中所示的查询来查看内存优化表性能计数器。


    ```sql

    select object_name, counter_name

    from sys.dm_os_performance_counters

    where object_name like ''%XTP%''

    order by object_name, counter_name

    -- 清单 12-13. 分析内存优化表性能计数器

    ```


    图 12-11 展示了该查询的部分输出。与扩展事件一样，熟悉性能计数器并使用它们来基线化系统工作负载，并在监视和诊断性能问题时使用它们，是非常有益的。


    ![A340879_2_En_12_Fig11_HTML.jpg](img/A340879_2_En_12_Fig11_HTML.jpg)


    图 12-11. 内存优化表性能计数器


    > **注意**

    >

    > 您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/performance-monitor/sql-server-xtp-in-memory-oltp-performance-counters`](https://docs.microsoft.com/en-us/sql/relational-databases/performance-monitor/sql-server-xtp-in-memory-oltp-performance-counters)
    阅读关于内存优化表性能计数器的信息。


    ## 总结


    选择正确的硬件是实现良好内存优化表性能和事务吞吐量的关键部分。内存优化表使用硬件的方式与存储引擎不同，当系统使用内存优化表时，您需要仔细规划部署和服务器配置。


    内存优化表受益于单线程 CPU 性能。您应选择基础时钟频率高的 CPU，并在系统中启用超线程。


    您应该将内存优化表检查点文件存储在针对顺序 I/O 性能优化的磁盘阵列中，最好使用基于 SSD 的驱动器。如果数据库恢复时间至关重要，您可以考虑在内存优化表文件组中使用多个容器，将它们放置在不同的驱动器上。


    显然，系统中应有足够的内存来容纳内存优化表数据，同时为其他 SQL Server 组件留出足够的内存。在 SQL Server 企业版中，您可以通过在 Resource
    Governor 资源池中配置内存并将数据库绑定到该池来限制内存优化表内存使用量。在标准版中，内存优化表每个数据库限于 32GB 的内存优化数据。


    内存优化表提供了大量的数据管理视图、性能计数器和扩展事件，您可以用它们来进行系统监控。


    # 13. 利用内存优化表


    本章讨论了利用内存优化表的系统的一些设计考虑事项，并演示了在迁移现有系统成本过高时如何从该技术中获益。它还讨论了实现数据分区的方法，这对于拥有大量数据和混合工作负载的系统可能很有帮助。

    '
- fmt: '## Design Considerations for Systems Utilizing In-Memory OLTP


    Two years ago, when I worked on the first edition of the book, about half of this
    chapter focused on the techniques that helped to address technology limitations.
    Those limitations positioned `in-memory OLTP` as a niche technology in `SQL Server
    2014` and prevented its widespread adoption because of the high implementation
    and refactoring cost.


    Fortunately, the majority of the limitations have been removed in `SQL Server
    2016`. Moreover, starting with `SQL Server 2016 SP1`, `in-memory OLTP` is available
    in the `Standard Edition` of `SQL Server`, which allows you to benefit from the
    technology and maintain a single system architecture and code base across multiple
    editions of the product.


    Note


    Remember that non-`Enterprise` editions limit the amount of memory they can utilize.
    For example, the `Standard Edition` is limited to `32GB` of memory-optimized data
    per database.


    Nevertheless, the adoption of `in-memory OLTP` comes at a cost. You will need
    to acquire or upgrade to `SQL Server 2016`, spend time learning the technology,
    and, if you are migrating an existing system, refactor code and test the changes.
    It is important to perform a cost-benefits analysis to determine whether `in-memory
    OLTP` provides you with adequate benefits to outweigh the costs.


    `in-memory OLTP` is hardly a magical solution that will improve server performance
    by simply flipping a switch and moving data into memory. It is designed to address
    a specific set of problems, such as latch and lock contentions on very active
    OLTP systems. Moreover, it helps improve the performance of the small and frequently
    executed OLTP queries that perform point-lookups and small-range scans.


    `in-memory OLTP` is less beneficial in the case of data warehouse systems with
    low concurrent activity, large amounts of data, and queries that require large
    scans and complex aggregations. In some cases, it is still possible to achieve
    performance improvements by moving data into memory or creating `columnstore`
    indexes on memory-optimized tables; however, you will often obtain better results
    by using `columnstore` indexes with disk-based tables, especially with dedicated
    data warehouse implementations.


    You should remember that memory-optimized `columnstore` indexes are targeted toward
    operational analytics scenarios when you need to run infrequent reporting and
    analysis queries against hot OLTP data. Their implementation is limited compared
    to disk-based column-based storage. Memory-optimized `columnstore` indexes cannot
    be partitioned nor can they become the main copy of the data in the table like
    disk-based clustered `columnstore` indexes do. Also, `in-memory OLTP` does not
    allow you to `rebuild` or `reorganize` `columnstore` indexes, reducing the size
    of the delta store and delete bitmap.


    You should also remember that memory-optimized tables live completely in-memory
    and out-of-memory conditions would lead to system downtime. This is especially
    important in the case of non-`Enterprise` editions where you cannot scale the
    system with the data growth by adding extra memory to the server. In many cases,
    it may be beneficial to design the system utilizing data partitioning, keeping
    hot recent data in memory-optimized and cold historical data in disk-based tables.
    I will discuss such an implementation later in this chapter.


    As you already know, `SQL Server 2016` removes the majority of the limitations
    of the technology that existed in `SQL Server 2014`. In many cases, you can migrate
    disk-based tables into memory without any schema and code changes in the system.
    There are, however, a few important considerations and behavior differences you
    need to remember and factor into the decision. Let’s talk about the most important
    ones.


    ### Off-Row Storage


    Even though `in-memory OLTP` supports `LOB` and row-overflow columns, it works
    with them in a different way than the Storage Engine. With disk-based tables,
    the decision of which columns are stored off-row is made on a per-row basis based
    on the row size; all data will be stored in-row when it fits into the 8,060-byte
    limit. By contrast, with memory-optimized tables, the decision is made strictly
    based on the table schema; the off-row column data will be stored in separate
    internal tables for all rows, regardless of the amount of data you store there.


    As you will remember from Chapter [6](#A340879_2_En_6_Chapter.html), an excessive
    number of off-row columns leads to serious performance implications because of
    the internal tables management that `in-memory OLTP` has to perform. Moreover,
    off-row columns increase the memory usage; each not null off-row value adds `64+`
    bytes of overhead. You should be extremely careful with off-row columns and avoid
    using them in memory-optimized tables unless they are absolutely necessary.


    It is common to see systems in which many text columns are defined as `(n)varchar(max)`
    just in case. This is a bad practice that increases query memory grants, introduces
    concurrency issues in the system, and complicates index management. This overhead,
    however, is not always noticeable, or, perhaps, it is not always correlated with
    the existence of off-row data.


    The situation will change if you migrate those tables to `in-memory OLTP`, keeping
    off-row columns intact. This decision could significantly increase the memory
    usage and slow down the queries against the table. After all, querying data from
    or modifying data in multiple internal tables will always be slower than working
    with a single table. You need to remember this behavior and analyze off-row column
    usage before migration. In many cases, you can change the data types to `(n)varchar(N)`
    and store those columns in-row.


    You can also consider implementing vertical partitioning and storing some off-row
    columns in disk-based tables, as shown in Listing [13-1](#A340879_2_En_13_Chapter.html#Par16).
    The `Description` column is stored in a disk-based table, while all other columns
    are stored in a memory-optimized table. The majority of the use cases in the system
    would not work with the product description, and therefore, you can utilize native
    compilation while working with the `dbo.ProductsInMem` table. Moreover, moving
    a product description to a disk-based table will allow you to utilize the `Full-Text
    Search` feature, which is not supported for memory-optimized tables.


    ```

    create table dbo.ProductsInMem

    (

    ProductId int not null identity(1,1)

    constraint PK_ ProductsInMem

    primary key nonclustered hash

    with (bucket_count = 65536),

    ProductName nvarchar(64) not null,

    ShortDescription nvarchar(256) not null,

    index IDX_ProductsInMem_ProductName

    nonclustered(ProductName)

    )

    with (memory_optimized = on, durability = schema_and_data);

    create table dbo.ProductDescriptions

    (

    ProductId int not null,

    Description nvarchar(max) not null,

    constraint PK_ ProductDescriptions

    primary key clustered(ProductId)

    );

    Listing 13-1.

    Vertical Partitioning

    ```


    You can hide some of the implementation details from the interop `SELECT` queries
    by defining a view, as shown in Listing [13-2](#A340879_2_En_13_Chapter.html#Par18).
    You can also define `INSTEAD OF` triggers on the view and use them as the target
    for data modifications; however, it is more efficient to update the data in the
    tables directly.


    ```

    create view dbo.Products(ProductId, ProductName,

    ShortDescription, Description)

    as

    select

    p.ProductId, p.ProductName, p.ShortDescription

    ,pd.Description

    from

    dbo.ProductsInMem p left outer join

    dbo.ProductDescriptions pd on

    p.ProductId = pd.ProductId

    Listing 13-2.

    Creating a View That Combines Data from Both Tables

    ```'
