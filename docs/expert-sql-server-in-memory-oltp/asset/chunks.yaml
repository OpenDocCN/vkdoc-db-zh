- fmt: '# Indexing Considerations


    正如我在本书中已经讨论过的，In-Memory OLTP 索引策略以及在非聚集（范围）索引和哈希索引之间的选择，在很大程度上取决于使用它们的数据和查询。非聚集（范围）索引提供了与常规
    B-Tree 索引类似的体验。它们可用于相同的使用场景，并提供一套相当的 SARGability 规则。唯一的例外是反向扫描索引。非聚集（范围）索引是单向的，In-Memory
    OLTP 无法利用它们进行此类扫描。


    另一方面，哈希索引仅对点查找搜索和等值连接有用，前提是查询在所有索引键列上使用了等值谓词。假设哈希表中有足够的桶数，它们在那些场景下可能优于范围索引。然而，不充分的
    `bucket_count` 值会极大地影响其性能，并使索引变得低效。


    对于数据量相对静态且能正确估计索引桶数的目录实体，可以使用哈希索引作为主键。这些实体经常用于等值连接，哈希索引在这些场景下可能非常高效。然而，作为一般规则，使用范围索引是更安全的选择，它简化了
    In-Memory OLTP 迁移，也减少了系统中的维护开销。


    还需要考虑其他几个因素。首先，应该记住，内存优化表上的索引指向实际的数据行对象，并且覆盖行内列。它们不覆盖溢出列，In-Memory OLTP 需要执行类似于
    Key Lookup 操作的动作来获取溢出列的值。在将基于磁盘的表迁移到内存时，应该分析表结构，并将经常选择的列保持在行内。


    其次，应尝试最小化表中的索引数量，这与基于磁盘的表类似。索引会在 `INSERT` 操作期间增加开销，并减慢数据库恢复和垃圾回收过程。此外，In-Memory
    OLTP 使用行版本控制，每次更新行时都会创建一个新版本。每个额外的索引都会增加更新开销；无论索引键列是否被更新，In-Memory OLTP 都必须维护索引行链。这与基于磁盘的
    B-Tree 索引不同，后者除非更新索引列，否则保持不变。


    让我们看一个例子，创建具有相同结构的内存优化表和基于磁盘的表，并插入一些数据。如清单 [13-10](#A340879_2_En_13_Chapter.html#Par45)
    所示，两个表都有两个索引和四列。


    ```sql

    create table dbo.MOTable

    (

    Id int not null,

    IdxCol int not null,

    IntCol int not null,

    VarCharCol varchar(128) null,

    constraint PK_MOTable

    primary key nonclustered hash(Id)

    with (bucket_count = 2097152),

    index IDX_IdxCol nonclustered hash(IdxCol)

    with (bucket_count = 2097152),

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.DBTable

    (

    Id int not null,

    IdxCol int not null,

    IntCol int not null,

    VarCharCol varchar(128) null,

    constraint PK_DBTable

    primary key clustered(Id)

    );

    create index IDX_DBTable_IdxCol on dbo.DBTable(IdxCol);

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N3 as t2) -- 1,048,576 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.MOTable(ID,IdxCol,IntCol)

    select Id, Id, Id from Ids;

    insert into DBTable(Id, IdxCol, IntCol)

    select Id, IdxCol, IntCol from dbo.MOTable;

    ```


    **清单 13-10. 更新开销：表创建**


    接下来，让我们对每个表运行三个 `UPDATE` 语句，如清单 [13-11](#A340879_2_En_13_Chapter.html#Par47) 所示。第一条语句修改未索引的固定长度列。第二条更改已索引的固定长度列的值。最后一条语句用一个值填充空的变长列，这会增加行大小并在基于磁盘的表中触发大量的页拆分。


    ```sql

    update dbo.MOTable set IntCol += 1;

    update dbo.MOTable set IdxCol += 1;

    update dbo.MOTable set VarCharCol = replicate(''a'',128);

    update dbo.DBTable set IntCol += 1;

    update dbo.DBTable set IdxCol += 1;

    update dbo.DBTable set VarCharCol = replicate(''a'',128);

    ```


    **清单 13-11. 更新开销：Update 语句**


    表 [13-1](#A340879_2_En_13_Chapter.html#Tab1) 显示了在我的环境下这些语句的执行时间。如你所见，在内存优化表的情况下，执行时间几乎保持不变，它取决于表中的索引数量。在更新索引键列时，仍然存在与索引维护相关的索引更新开销。In-Memory
    OLTP 需要计算哈希索引中新的索引键值的哈希桶，或者在非聚集索引中找到新的索引键行链。然而，这个开销相对较小。


    **表 13-1. Update 语句的执行时间**


    | 操作 | 内存优化表 | 基于磁盘的表 |

    | --- | --- | --- |

    | 更新未索引列 | 1,016 ms | 1,879 ms |

    | 更新已索引列 | 1,036 ms | 4,586 ms |

    | 增加行大小的更新 | 1,045 ms | 3,906 ms |


    对于基于磁盘的表则不是这种情况，更新索引键列会导致非聚集索引 B-Tree 结构的更新。类似地，增加行的大小会导致页拆分。当行的新版本不适合原始页时，存储引擎必须分配新的数据页并将数据移过去。这是一个非常昂贵的操作，它会更新分配映射页并导致显著的事务日志开销。


    为了说明内存优化表的更新开销取决于索引数量，让我们使用清单 [13-12](#A340879_2_En_13_Chapter.html#Par51) 中的代码向表中添加另一个索引。


    ```sql

    alter table dbo.MOTable

    add index IDX_VarCharCol nonclustered(VarCharCol);

    ```


    **清单 13-12. 更新开销：向内存优化表添加额外索引**


    表 [13-2](#A340879_2_En_13_Chapter.html#Tab2) 说明了创建索引后更新语句的执行时间。如你所见，添加一个额外索引会给操作增加开销；然而，所有三条语句花费的时间都相似。


    **表 13-2.**'
  raw: '### Indexing Considerations


    As I have already discussed in the book, an In-Memory OLTP indexing strategy and
    the choice between nonclustered (range) and hash indexes both greatly depend on
    the data and queries that utilize them. Nonclustered (range) indexes provide you
    with a similar experience as regular B-Tree indexes. They can be used in the same
    use cases, and they provide a comparable set of SARGability rules. The only exception
    is scanning an index in the opposite direction to the index sorting order. Nonclustered
    (range) indexes are unidirectional, and In-Memory OLTP is unable to utilize them
    for such scans.


    Hash indexes, on the other hand, are useful only for point-lookup searches and
    equality joins when queries use the equality predicate on all index key columns.
    They may outperform range indexes in those scenarios assuming that they have a
    sufficient number of buckets in the hash table. However, an insufficient `bucket_count`
    value greatly affects their performance and makes the indexes inefficient.


    You can use hash indexes as the primary keys in the catalog entities where the
    amount of data is relatively static and you can correctly estimate the number
    of bucket for the index. Those entities are often used in the equality joins,
    and a hash index can be very efficient in those scenarios. However, as the general
    rule, using range indexes is the safer choice, which simplifies In-Memory OLTP
    migration and also reduces maintenance overhead in the system.


    There are a few other factors to consider. First, you should remember that indexes
    on memory-optimized tables point to the actual data row objects and are covering
    for in-row columns. They do not cover off-row columns, and In-Memory OLTP needs
    to perform actions conceptually similar to a Key Lookup operation to obtain off-row
    values. You should analyze the table structure and keep frequently selected columns
    in-row when you migrate a disk-based table into memory.


    Second, you should try to minimize the number of indexes in the table similar
    to disk-based tables. Indexes add overhead during `INSERT` operations and slow
    down database recovery and the garbage collection processes. Moreover, In-Memory
    OLTP is using row versioning, and it creates a new version of the row every time
    you update it. Every extra index adds update overhead; In-Memory OLTP has to maintain
    the index row chains regardless of whether the index key columns were updated.
    This is different from disk-based B-Tree indexes, which stay intact unless you
    update index columns.


    Let’s look at the example and create memory-optimized and disk-based tables of
    the same structure and insert some data there. Both tables have two indexes and
    four columns, as shown in Listing [13-10](#A340879_2_En_13_Chapter.html#Par45).


    ```

    create table dbo.MOTable

    (

    Id int not null,

    IdxCol int not null,

    IntCol int not null,

    VarCharCol varchar(128) null,

    constraint PK_MOTable

    primary key nonclustered hash(Id)

    with (bucket_count = 2097152),

    index IDX_IdxCol nonclustered hash(IdxCol)

    with (bucket_count = 2097152),

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.DBTable

    (

    Id int not null,

    IdxCol int not null,

    IntCol int not null,

    VarCharCol varchar(128) null,

    constraint PK_DBTable

    primary key clustered(Id)

    );

    create index IDX_DBTable_IdxCol on dbo.DBTable(IdxCol);

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N3 as t2) -- 1,048,576 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.MOTable(ID,IdxCol,IntCol)

    select Id, Id, Id from Ids;

    insert into DBTable(Id, IdxCol, IntCol)

    select Id, IdxCol, IntCol from dbo.MOTable;

    Listing 13-10.

    Update Overhead: Tables Creation

    ```


    As the next step, let’s run three `UPDATE` statements against each table, as shown
    in Listing [13-11](#A340879_2_En_13_Chapter.html#Par47). The first statement modifies
    the nonindexed fixed-length column. The second changes the value of the indexed
    fixed-length column. The last statement populates the empty variable-length column
    with a value, which increases the row size and triggers a large number of page
    splits in the disk-based table.


    ```

    update dbo.MOTable set IntCol += 1;

    update dbo.MOTable set IdxCol += 1;

    update dbo.MOTable set VarCharCol = replicate(''a'',128);

    update dbo.DBTable set IntCol += 1;

    update dbo.DBTable set IdxCol += 1;

    update dbo.DBTable set VarCharCol = replicate(''a'',128);

    Listing 13-11.

    Update Overhead: Update Statements

    ```


    Table [13-1](#A340879_2_En_13_Chapter.html#Tab1) shows the execution time of the
    statements in my environment. As you can see, the execution time stays pretty
    much the same in the case of the memory-optimized table, and it depends on the
    number of indexes in the table. There is still index update overhead associated
    with index maintenance during the update of the index key column. In-Memory OLTP
    needs to calculate the hash bucket for the new index key value in hash indexes
    or find the new index key row chain in nonclustered indexes. This overhead, however,
    is relatively insignificant.


    Table 13-1.


    Execution Time of Update Statements


    |   | Memory-Optimized Table | Disk-Based Table |

    | --- | --- | --- |

    | Update of nonindexed column | 1,016 ms | 1,879 ms |

    | Update of indexed column | 1,036 ms | 4,586 ms |

    | Update with row size increase | 1,045 ms | 3,906 ms |


    This is not the case with the disk-based tables where the update of the index
    key column leads to the update of the nonclustered index B-Tree structure. Similarly,
    increasing the size of the row leads to page splits. The Storage Engine has to
    allocate new data pages and move data there when the new versions of the rows
    do not fit into the original pages. This is a very expensive operation, which
    updates allocation map pages and leads to significant transaction log overhead.


    Just to illustrate that update overhead depends on the number of indexes in a
    memory-optimized table, let’s add another index to the table with the code from
    Listing [13-12](#A340879_2_En_13_Chapter.html#Par51).


    ```

    alter table dbo.MOTable

    add index IDX_VarCharCol nonclustered(VarCharCol);

    Listing 13-12.

    Update Overhead: Adding Extra Index to Memory-Optimized Table

    ```


    Table [13-2](#A340879_2_En_13_Chapter.html#Tab2) illustrates the execution time
    of the update statements after creating the index. As you can see, adding an extra
    index adds overhead to the operation; however, all three statements take a similar
    amount of time.


    Table 13-2.'
