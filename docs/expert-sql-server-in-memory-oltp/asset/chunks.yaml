    清单 2-5.

    创建基于磁盘的表和存储过程


    在测试中，我使用 `dbo.InsertRequestInfo_Disk`、`dbo.InsertRequestInfo_Memory` 和 `dbo.InsertRequestInfo_NativelyCompiled`
    存储过程，在循环中同时从多个会话调用它们，比较了基于磁盘的表和内存优化表的插入吞吐量。每次调用向 `dbo.WebRequests` 表插入一行，向 `dbo.WebRequestHeaders`
    表插入五行，并向 `dbo.WebRequestDisks` 表插入一到五行，这使得单个事务中平均插入九行。


    > 注意

    >

    > 测试应用程序和脚本包含在本书的附带材料中。


    对于 `dbo.InsertRequestInfo_Disk` 存储过程和基于磁盘的表，我的测试服务器在 150 个并发会话时达到了约每秒 4,500 批次/调用的最大吞吐量。图
    2-1 显示了测试时的几个性能计数器。


