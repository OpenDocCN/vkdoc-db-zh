    *   SQL Server 2016 不支持计算列。然而，它们在 SQL Server 2017 中得到支持。

    *   不支持稀疏列。

    *   `IDENTITY`列的`SEED`和`INCREMENT`值应为(1,1)。

    *   内存优化表不能与基于磁盘的表参与`FOREIGN KEY`约束。你可以在内存优化表之间定义外键；但是，它们应该总是引用主键而不是`UNIQUE`约束。

    *   不支持对内存优化表创建全文索引。

    *   内存优化表不能定义为`FILETABLE`或使用`FILESTREAM`存储。


    在 SQL Server 2016 中，每个内存优化表（无论是否持久化）应至少有一个、最多八个索引。此外，持久化的内存优化表应定义一个唯一的主键约束。该约束计入八个索引限制中的一个。SQL
    Server 2017 移除了八个索引的限制。


    同样值得注意的是，参与主键约束的列是不可更新的。你可以作为变通方法，删除旧行并插入新行。


    ### 数据库级别的限制


    内存优化 OLTP 有一些限制影响某些数据库设置和操作。它们包括：


    *   你无法在使用内存优化 OLTP 的数据库上创建数据库快照。

    *   `AUTO_CLOSE`数据库选项必须设置为`OFF`。

    *   不支持`CREATE DATABASE FOR ATTACH_REBUILD_LOG`。

    *   `DBCC CHECKDB`会跳过内存优化表。

    *   如果调用来检查内存优化表，`DBCC CHECKTABLE`会失败。


    注意


    你可以在[`https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp`](https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp)看到完整的限制列表。

    '
- fmt: '## High Availability Technologies Support


    Memory-optimized tables are fully supported in AlwaysOn Failover Clusters and
    Availability Groups and with Log Shipping. However, in the case of a failover
    cluster, data from durable memory-optimized tables must be loaded into memory
    in the case of a failover, which could increase failover time and reduce database
    availability.


    In the case of AlwaysOn Availability Groups, only durable memory-optimized tables
    are replicated to secondary nodes. You can access and query those tables on the
    readable secondary nodes if needed.


    Data from nondurable memory-optimized tables, on the other hand, is not replicated
    and will be lost in the case of a failover. You should remember this behavior
    when you use In-Memory OLTP in Microsoft Azure SQL Database. Transient database
    failovers in Azure will erase the data from nondurable memory-optimized tables.


    Memory-optimized tables can participate in transactional replication. All other
    replication types, including peer-to-peer replication, are not supported.


    In-Memory OLTP is not supported in database mirroring sessions. This does not
    appear to be a big limitation, however. Database mirroring is a deprecated feature,
    and you should use AlwaysOn Availability Groups as the replacement for the technology.


    ## SQL Server 2016 Features Support


    In-Memory OLTP is fully integrated with many new SQL Server 2016 features. Let’s
    list a few of them.


    In-Memory OLTP workloads can be captured by Query Store. It automatically collects
    queries, plans, and optimization statistics for In-Memory OLTP objects without
    any additional configuration changes required. However, runtime statistics are
    not collected by default, and you need to explicitly enable them with the `sys.sp_xtp_control_query_exec_stats`
    stored procedure.


    Keep in mind that the collection of runtime statistics adds overhead, which can
    degrade the performance of In-Memory OLTP workloads.


    **Note**

    I will talk about In-Memory OLTP Query Store integration in more detail in Chapter
    [12](#A340879_2_En_12_Chapter.html).


    You can use system-versioned temporal tables with memory-optimized tables using
    disk-based history tables to store old row versions. When you enable system versioning
    in a memory-optimized table, SQL Server creates a staging memory-optimized table
    and synchronously populates it during `UPDATE` and `DELETE` operations. The data
    from the staging table is asynchronously moved to a disk-based history table by
    a background process called the data flush task. This task wakes up every minute
    with the light workload and can adjust its schedule to run every five seconds
    under a heavy workload.


    By default, the data flush task moves the data from the staging table when it
    reaches 8 percent of the size of the current memory-optimized table. You can also
    force data movement manually by calling the `sys.sp_xtp_flush_temporal_history`
    stored procedure.


    **Note**

    You can read more about temporal tables support at [`https://docs.microsoft.com/en-us/sql/relational-databases/tables/system-versioned-temporal-tables-with-memory-optimized-tables`](https://docs.microsoft.com/en-us/sql/relational-databases/tables/system-versioned-temporal-tables-with-memory-optimized-tables).


    Memory-optimized tables can be configured for row-level security. The configuration
    process is essentially the same with on-disk tables; however, an inline table-valued
    function that is used as a security predicate must be natively compiled. I will
    discuss native compilation in Chapter [9](#A340879_2_En_9_Chapter.html).


    **Note**

    You can read more about row-level security at [`https://docs.microsoft.com/en-us/sql/relational-databases/security/row-level-security`](https://docs.microsoft.com/en-us/sql/relational-databases/security/row-level-security).


    It is also worth noting that starting with SQL Server 2016, the data from memory-optimized
    tables is encrypted on disk when Transparent Data Encryption (TDE) is enabled
    in the database. I will discuss how In-Memory OLTP persists data on disk in Chapter
    [10](#A340879_2_En_10_Chapter.html).


    ## Summary


    As the opposite of disk-based tables, where data is stored in 8KB data pages,
    memory-optimized tables link data rows into the index row chains using regular
    memory pointers. Every row has multiple pointers, one per index row chain. In
    SQL Server 2016, every table must have at least one and at most eight indexes
    defined.


    A SQL Server instance maintains the Global Transaction Timestamp value, which
    is auto-incremented when the transaction commits and is unique for every committed
    transaction. Every data row has `BeginTs` and `EndTs` timestamps that define the
    row lifetime. A transaction can see a row only when its logical start time (the
    Global Transaction Timestamp value when the transaction starts) is between the
    `BeginTs` and `EndTs` timestamps of the row.


    The row data in memory-optimized tables is never updated. When a table row needs
    to be updated, In-Memory OLTP creates the new version of the row with a new `BeginTs`
    value and deletes the old version of the row by populating its `EndTs` timestamp.


    SQL Server generates and compiles native DLLs for every memory-optimized table
    in the system. Those DLLs are loaded into the SQL Server process, and they are
    responsible for accessing and manipulating the row data.


    The In-Memory OLTP engine is fully supported in AlwaysOn Failover Clusters, Availability
    Groups, and with Log Shipping. Memory-optimized tables can also participate in
    transactional replication.


    In-Memory OLTP is integrated with many new SQL Server 2016 features. Memory-optimized
    tables can be configured as system-versioned temporal tables, and they also support
    row-level security. Query Store can capture optimization and execution statistics
    for In-Memory OLTP workloads; however, capturing execution statistics introduces
    noticeable performance overhead to the system.


    ## 4. Hash Indexes


    This chapter discusses hash indexes, the new type of index introduced in the In-Memory
    OLTP Engine. It will show their internal structure and explain how SQL Server
    works with them. You will learn about the most critical property of hash indexes,
    `bucket_count`, which defines the number of hash buckets in the index hash array.
    You will see how incorrect bucket count estimations affect system performance.


    Finally, this chapter talks about the SARGability of hash indexes and statistics
    on memory-optimized tables.'
