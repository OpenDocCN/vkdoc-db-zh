  trans: '

    ## 可维护性与管理开销


    在 `SQL Server 2014` 和 `SQL Server 2016 RTM` 中，`内存 OLTP` 仅包含在产品的 `企业版` 中。从 `SQL
    Server 2016 SP1` 开始，您可以在 `SQL Server` 的每一个版本中使用 `内存 OLTP`。它在 `Microsoft Azure
    SQL 数据库` 的高级层级中也可用。虽然这使您能够在多个 `SQL Server` 版本间维护单一的架构和代码，但这种方法中存在隐藏的风险。


    `内存 OLTP` 几乎不是一种“一劳永逸”的技术。数据库专业人员应在部署后积极参与系统监控和维护。他们需要监控系统内存使用情况、分析数据、在需要调整存储桶计数时重新创建哈希索引、重新编译
    `本机编译模块` 以应对数据分布和统计信息的变化，以及执行其他任务。


    内存使用情况的监控可能是最重要的任务。`内存 OLTP` 会消耗系统内存，这可能会影响其他 `SQL Server` 组件的性能。例如，`内存优化表` 中的大量数据可能会减少
    `缓冲池` 的大小，这将增加物理 `I/O` 并降低针对基于磁盘表的查询性能。同样，它也可能减少 `计划缓存` 的大小，这将导致重新编译并增加系统中的 `CPU`
    负载。具有讽刺意味的是，在 `标准版` 中，当服务器拥有足够的 `RAM` 来容纳两者时，`32GB` 的 `内存优化数据` 不会影响 `缓冲池` 内存。


    您还应该记住，如果 `内存 OLTP` 没有足够的内存继续运行，`内存优化表` 中的数据将变为只读。这可能导致长时间的系统中断，尤其是在非 `企业版` 的
    `SQL Server` 实例中。您无法通过添加更多内存并超过版本限制来解决此问题。唯一的选项是减少 `内存优化表` 中的数据量。


    **重要提示**


    未提交的已丢弃事务可能会延迟垃圾回收过程，并导致系统出现内存不足的情况。


    在为系统设计高可用性策略时，您还应考虑 `内存 OLTP` 的内存使用情况。备用节点配置低于主节点的实现方式并不少见。这降低了解决方案的实施成本，并且即使系统在故障转移后性能有所下降，也可能提供所需的高可用性。


    如果备用节点没有足够的内存来容纳 `内存 OLTP` 数据，情况就会发生变化。这将破坏节点间的同步，并可能影响系统的可用性。


    `SQL Server 2016 SP1` 及以上版本对该技术的跨版本支持允许您进行一次系统架构设计，然后随着数据量和负载的增加而升级版本。其目标并非面向独立软件供应商，这些供应商开发的产品需要部署给大量客户，而这些客户可能有也可能没有
    `DBA` 团队来支持系统。在这种情况下，`内存 OLTP` 不是最佳选择。

    '
- fmt: '# Using In-Memory OLTP in Systems with Mixed Workloads


    ## 混合工作负载的挑战


    `In-Memory OLTP` 可以为 `OLTP` 系统带来显著的性能提升。然而，对于数据仓库工作负载，结果可能有所不同。内存优化的列存储索引可能有助于提高某些数据仓库和操作型分析查询的性能；但是，与基于磁盘的列存储相比，内存优化列存储索引仍然存在许多限制。


    当针对内存优化列存储索引运行查询时，`In-Memory OLTP` 必须扫描所有索引行组。尽管 `SQL Server` 可能会基于段元数据跳过某些行组，但你不应依赖这种行为。


    相比之下，基于磁盘的列存储索引可以进行分区，并且可以从扫描中排除整个分区。当系统具有长期数据保留策略且查询仅处理数据的子集时，这可以显著减少需要处理的数据量。


    将旧数据保留在内存优化表中也会对 `OLTP` 查询的性能产生负面影响。它会增加索引行链的扫描长度并减慢扫描速度。更重要的是，它将消耗 `SQL Server`
    内存。尽管如今内存相对便宜，但 `NUMA` 服务器按插座划分内存，在某些情况下，你必须添加更多 `CPU` 才能利用内存。这可能需要你为这些 `CPU`
    购买许可，代价高昂。


    最后，这个问题还有另一个不那么明显的方面。系统中的不同数据可能有不同的可用性要求。例如，在关键任务系统中，当前的热数据可能有 `99.99%` 或更高的 `SLA`，而旧的冷数据的可用性要求可能显著降低。


    `SQL Server` 企业版允许你利用逐段还原，按文件组将数据库联机。这可以在灾难情况下显著减少停机时间。然而，逐段还原要求 `In-Memory OLTP`
    文件组在线，数据库才能部分可用。将大量旧的冷数据保留在内存中会减慢恢复过程。


    ## 分区解决方案


    构建独立的数据仓库环境来处理系统的分析和报告通常是有益的。然而，在许多情况下，系统需要长时间保留数据，并支持针对相同数据的混合 `OLTP` 和数据仓库工作负载。将数据完全移入内存通常不是最佳选择，尤其是当你预期数据量随时间增长时。


    此场景中的一种解决方案是在内存优化表和基于磁盘的表之间对数据进行分区。你可以将最近的 **热数据** 放入内存优化表，将旧的 **冷数据** 保留在基于磁盘的表中。这使你可以根据工作负载创建不同的索引并利用不同的技术，从而获得最大的性能提升并减少磁盘上的数据大小。


    图 13-2 展示了一个在系统中分区数据的架构示例。显然，分区标准应取决于系统工作负载和其他要求。


    ![A340879_2_En_13_Fig2_HTML.jpg](A340879_2_En_13_Fig2_HTML.jpg)


    图 13-2：数据分区示例


    热操作数据存储在内存优化表中。这些数据面向客户，并处理系统中大部分的 `OLTP` 活动。前几个操作期间的暖数据可以存储在基于磁盘的 `B-Tree` 表中。通常，对此类数据会有一定程度的
    `OLTP` 和数据仓库工作负载。


    冷历史数据主要处理数据仓库工作负载。它可以存储在包含聚集列存储索引的表中，可能使用 `COLUMNSTORE_ARCHIVE` 压缩。如果需要支持 `OLTP`
    用例，也可以在此类表上创建非聚集 `B-Tree` 索引。最后，如果数据是静态的，将其放在只读文件组中并从常规的 `FULL` 数据库备份中排除是有益的。


    让我们看一个此类实现的例子，假设你有一个虚构的订单录入系统，其中大部分 `OLTP` 事务发生在当月的数据上。图 13-3 显示了截至 2017 年 6 月系统中存在的可能的数据分区。


    ![A340879_2_En_13_Fig3_HTML.jpg](A340879_2_En_13_Fig3_HTML.jpg)


    图 13-3：订单录入系统 - 数据分区


    当前（2017年6月）、前一个（2017年5月）和下一个（2017年7月）操作期间的热数据存储在内存优化表中。2017年1月至4月的暖数据存储在 `FG2017`
    文件组上的 `B-Tree` 表中。最后，2016年的冷数据存储在 `FG2016` 文件组上包含聚集列存储索引的表中。目录实体，如 `Articles`
    和 `Customers`，被实现为内存优化表，这将允许你在处理热订单时利用原生编译。


    根据操作期间对基于磁盘的表进行分区也是有益的。这将有助于在期间变化时管理表之间的数据移动。你稍后会看到这一点。


    清单 13-15 说明了此实现。为了节省本书篇幅，我省略了 `dbo.Orders2017_07` 表。但是，你应该始终为下一个（未来）操作期间准备好表，以避免系统停机。


    ```sql

    create table dbo.Customers

    (

    CustomerId int not null

    constraint PK_Customers

    primary key nonclustered hash

    with (bucket_count=65536),

    Name nvarchar(256) not null,

    index IDX_Customers_Name nonclustered(Name)

    )

    with (memory_optimized=on, durability=schema_and_data);

    -- Storing data for 2017_06

    create table dbo.Orders2017_06

    (

    OrderId bigint identity(1,1) not null,

    OrderDate datetime2(0) not null,

    CustomerId int not null,

    Amount money not null,

    Status tinyint not null,

    /* Other columns */

    constraint PK_Orders2017_06

    primary key nonclustered (OrderId),

    index IDX_Orders2017_06_CustomerId

    nonclustered hash(CustomerId)

    with (bucket_count=65536),

    constraint CHK_Orders2017_06

    check (OrderDate >= ''2017-06-01'' and OrderDate < ''2017-07-01'')

    )

    on ps2017(OrderDate);

    -- Storing data for 2017_05

    create table dbo.Orders2017_05

    (

    OrderId bigint identity(1,1) not null,

    OrderDate datetime2(0) not null,

    CustomerId int not null,

    Amount money not null,

    Status tinyint not null,

    /* Other columns */

    constraint PK_Orders2017_05

    primary key nonclustered (OrderId),

    index IDX_Orders2017_05_CustomerId

    nonclustered hash(CustomerId)

    with (bucket_count=65536),

    constraint CHK_Orders2017_05

    check (OrderDate >= ''2017-05-01'' and OrderDate < ''2017-06-01'')

    )

    on ps2017(OrderDate);

    -- Storing data for 2017_01 - 2017_04

    create table dbo.Orders2017

    (

    OrderId bigint not null,

    OrderDate datetime2(0) not null,

    CustomerId int not null,

    Amount money not null,

    Status tinyint not null,

    /* Other columns */

    constraint PK_Orders2017

    primary key nonclustered (OrderDate, OrderId),

    index IDX_Orders2017_CustomerId

    nonclustered (CustomerId) include (Amount),

    constraint CHK_Orders2017_01

    check (OrderDate >= ''2017-01-01'' and OrderDate < ''2017-02-01''),

    constraint CHK_Orders2017_02

    check (OrderDate >= ''2017-02-01'' and OrderDate < ''2017-03-01''),

    constraint CHK_Orders2017_03

    check (OrderDate >= ''2017-03-01'' and OrderDate < ''2017-04-01''),

    constraint CHK_Orders2017_04

    check (OrderDate >= ''2017-04-01'' and OrderDate < ''2017-05-01''),

    constraint CHK_Orders2017_05

    check (OrderDate >= ''2017-05-01'' and OrderDate < ''2017-06-01'')

    )

    on ps2017(OrderDate);

    -- Storing data for 2016

    create table dbo.Orders2016

    (

    OrderId bigint not null,

    OrderDate datetime2(0) not null,

    CustomerId int not null,

    Amount money not null,

    Status tinyint not null,

    /* Other columns */

    constraint CHK_Orders2016

    check (OrderDate >= ''2016-01-01'' and OrderDate < ''2017-01-01''),

    )

    on ps2016(OrderDate);

    create clustered columnstore index CCI_Orders2016

    on dbo.Orders2016

    with (data_compression=columnstore_archive)

    on ps2016(OrderDate);

    create nonclustered index IDX_Orders2016_CustomerId

    on  dbo.Orders2016(CustomerId)

    include(Amount)

    with (data_compression=row)

    on ps2016(OrderDate);

    go

    create view dbo.Orders(OrderDate, OrderId, CustomerId, Amount, Status)

    as

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017_06

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017_05

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2016;

    ```


    清单 13-15：数据分区：对象创建


    ## 查询分区视图


    你可以通过实现一个组合所有表中数据的分区视图，向只读报告查询隐藏实现细节。每个表都应具有指示表中存储了什么数据的 `CHECK` 约束。这将允许 `SQL
    Server` 在查询中引用视图时跳过处理不必要的表。现在不要关注 `dbo.Orders2017` 表中的多个 `CHECK` 约束；我稍后会解释需要它们的原因。


    清单 13-16 说明了针对分区视图的几个查询。


    ```sql

    select count(*)

    from dbo.Orders

    where OrderDate between ''2017-06-02'' and ''2017-06-03'';

    select count(*)

    from dbo.Orders

    where OrderDate >= ''2017-01-01'';

    select count(*) from dbo.Orders;

    ```


    清单 13-16：数据分区：查询分区视图


    图 13-4 显示了查询的执行计划。如你所见，`SQL Server` 能够在查询执行期间消除对不必要表的扫描。


    ![A340879_2_En_13_Fig4_HTML.jpg](A340879_2_En_13_Fig4_HTML.jpg)


    图 13-4：查询的执行计划


    ## 处理标识列


    你可能已经注意到，内存优化表将 `OrderId` 列定义为 `identity(1,1)`。`In-Memory OLTP` 要求在定义标识列时使用 `SEED`
    值 1。幸运的是，你可以通过在表创建后立即对虚拟行执行 `identity_insert` 来重新设定种子并强制实施键的唯一性。


    清单 13-17 展示了这种方法。它假设系统每月处理少于 `100,000,000` 个新订单。


    ```sql

    set identity_insert dbo.Orders2017_06 on

    insert into dbo.Orders2017_06(OrderDate, OrderId, CustomerId, Amount, Status)

    values(''2017-06-01'',201706000000000,1,1,1);

    delete from dbo.Orders2017_06;

    set identity_insert dbo.Orders2017_06 off;

    ```


    清单 13-17：数据分区：更改标识 SEED 属性


    ## 数据迁移


    与任何多表数据分区实现一样，你应该支持表之间的数据迁移。随着时间的推移，订单需要从内存优化表移动到基于磁盘的表。


    可以使用 `INSERT..SELECT` 方法；但是，该语句将移动事务开始时拍摄的数据快照。随后，你将需要移动在语句执行期间和之后发生的数据更改。你可以通过在内存优化表上定义触发器来捕获这些更改。


    让我们看一个数据移动的例子，假设你希望将上个月（2017年5月）的数据移动到基于磁盘的表中。清单 13-18 显示了该过程的第一步，该步骤将数据插入单独的基于磁盘的暂存表中，以避免系统中的数据重复。这还会创建两个表来保存已更新和已删除行的
    `OrderId` 值，并使用触发器填充它们（我假设没有向上月表中插入数据）。


    ```sql

    create table dbo.Orders2017_05_Tmp

    (

    OrderId bigint not null,

    OrderDate datetime2(0) not null,

    CustomerId int not null,

    Amount money not null,

    Status tinyint not null,

    check (OrderDate >= ''2017-05-01'' and OrderDate < ''2017-06-01'')

    )

    on [FG2017];

    create unique clustered index IDX_Orders2017_05_Tmp_OrderDate_OrderId

    on dbo.Orders2017_05_Tmp(OrderDate, OrderId)

    with (data_compression=row)

    on [FG2017];

    create nonclustered index IDX_Orders2017_05_Tmp_CustomerId

    on  dbo.Orders2017_05_Tmp(CustomerId)

    with (data_compression=row)

    on [FG2017];

    create nonclustered index IDX_Orders2017_05_Tmp_OrderId

    on  dbo.Orders2017_05_Tmp(OrderId)

    with (data_compression=row)

    on [FG2017]

    go

    create table dbo.OrdersUpdateQueue

    (

    ID int not null identity(1,1)

    constraint PK_OrdersUpdateQueue

    primary key nonclustered hash

    with (bucket_count=262144),

    OrderId bigint not null,

    )

    with (memory_optimized=on, durability=schema_and_data)

    go

    create table dbo.OrdersDeleteQueue

    (

    ID int not null identity(1,1)

    constraint PK_OrdersDeleteQueue

    primary key nonclustered hash

    with (bucket_count=262144),

    OrderId bigint not null

    )

    with (memory_optimized=on, durability=schema_and_data)

    go

    create trigger trgAfterUpdate on dbo.Orders2017_05

    with native_compilation, schemabinding

    after update

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''English''

    )

    insert into dbo.OrdersUpdateQueue(OrderId)

    select OrderId from inserted;

    end

    go

    create trigger trgAfterDelete on dbo.Orders2017_05

    with native_compilation, schemabinding

    after delete

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''English''

    )

    insert into dbo.OrdersDeleteQueue(OrderId)

    select OrderId from deleted;

    end

    go

    -- Step 1: Copy data to the staging table

    insert into dbo.Orders2017_05_Tmp(OrderDate, OrderId, CustomerId, Amount, Status)

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017_05 with (snapshot);

    ```


    清单 13-18：数据移动：步骤 1


    在 `INSERT..SELECT` 执行期间更新和删除的行的 `OrderId` 存储在 `dbo.OrdersUpdateQueue` 和 `dbo.OrdersDeleteQueue`
    表中。你可以使用清单 13-19 中的代码将这些数据修改应用到暂存表。根据系统中数据的易变性，你可能需要运行它几次，直到表几乎为空。


    ```sql

    declare

    @MaxUpdateId int

    ,@MaxDeleteId int

    select @MaxUpdateId = max(ID)

    from dbo.OrdersUpdateQueue with (snapshot);

    select @MaxDeleteId = max(ID)

    from dbo.OrdersDeleteQueue with (snapshot);

    begin tran

    if @MaxUpdateId is not null

    begin

    update t

    set t.Amount = s.Amount, t.Status = s.Status

    from

    dbo.OrdersUpdateQueue q with (snapshot) join

    dbo.Orders2017_05 s with (snapshot) on

    q.OrderId = s.OrderId

    join dbo.Orders2017_05_Tmp t on

    t.OrderId = s.OrderId

    where

    q.ID <= @MaxUpdateId;

    delete from dbo.OrdersUpdateQueue with (snapshot)

    where ID <= @MaxUpdateId;

    end;

    if @MaxDeleteId is not null

    begin

    delete from t

    from

    dbo.OrdersDeleteQueue q with (snapshot) join

    dbo.Orders2017_05_Tmp t on

    t.OrderId = q.OrderId

    where

    q.ID <= @MaxDeleteId;

    delete from dbo.OrdersDeleteQueue with (snapshot)

    where ID <= @MaxDeleteId;

    end

    commit;

    ```


    清单 13-19：数据移动：步骤 2


    最后，你需要删除 `dbo.Orders2017_05` 表，将暂存表作为分区切换到 `dbo.Orders2017` 表，并更改分区视图。在这些操作期间，你应该阻止客户端访问
    2017年5月的数据。幸运的是，停机时间将非常短；更新和删除队列表几乎为空，其他操作将在元数据级别完成，如清单 13-20 所示。


    > 注意

    >

    > 如果你通过 `T-SQL`（互操作）存储过程访问 `dbo.Orders2017_05` 表中的数据，你可以在事务开始时更改它们并获取其架构修改 (`Sch-M`)
    锁。这将阻止客户端调用存储过程，直到事务提交。


    ```sql

    -- Disconnect clients before running those steps.

    -- Alternatively, if the Data Access Tier uses Interop

    -- stored procedures, you can start the transaction and

    -- alter SPs before the updates. This will block clients

    -- from calling those SPs.

    update t

    set t.Amount = s.Amount, t.Status = s.Status

    from

    dbo.OrdersUpdateQueue q with (snapshot)

    join dbo.Orders2017_05 s with (snapshot) on

    q.OrderId = s.OrderId

    join dbo.Orders2017_05_Tmp t on

    t.OrderId = s.OrderId;

    delete from t

    from

    dbo.OrdersDeleteQueue q with (snapshot) join

    dbo.Orders2017_05_Tmp t on

    t.OrderId = q.OrderId;

    alter table dbo.Orders2017

    drop constraint CHK_Order2017_01_05

    go

    alter table dbo.Orders2017_05_Tmp

    switch to dbo.Orders2017 partition 5

    go

    alter view dbo.Orders(OrderDate, OrderId, CustomerId, Amount, Status)

    as

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017_06

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2016

    go

    drop table dbo.Orders2017_05;

    ```


    清单 13-20：数据移动：最后一步


    ## 优化 CHECK 约束


    在此过程中你需要做的一件事是更改 `dbo.Orders2017` 表上的 `CHECK` 约束，以指示该表现在存储了 2017年5月的数据。不幸的是，`SQL
    Server` 总是扫描表中的一个索引来验证新的 `CHECK` 约束，持有架构修改 (`SCH-M`) 锁并在扫描期间阻止对表的访问。


    解决此类问题的一种方法是在 `CREATE TABLE` 语句中创建多个 `CHECK` 约束——每月一个约束。每次将另一个月的数据移入表时，你都是删除一个约束（这是一个元数据操作），而不是创建一个新的。`SQL
    Server` 在优化期间评估所有约束并选择限制性最强的约束。这就是为什么你在清单 13-15 的 `dbo.Orders2017` 表中创建了九个 `CHECK`
    约束的原因。


    > 注意

    >

    > 你可以在本书的配套材料中查看更全面和详细的代码版本。


    ## 结论


    虽然实现数据分区需要额外的努力，但从长远来看是值得的。它允许你为每个工作负载利用最佳技术，简化数据库管理和维护，提高系统可用性，并有助于降低硬件和存储成本。当你预期要在系统中存储大量数据时，请考虑实现它。


    > 注意

    >

    > 我的《Pro SQL Server Internals》一书包含关于数据分区的详细章节。它展示了如何实现分层存储并在不同的表和文件组之间移动数据，同时对用户保持透明。'
  raw: '## Using In-Memory OLTP in Systems with Mixed Workloads


    In-Memory OLTP can provide significant performance improvements in OLTP systems.
    However, with data warehouse workloads, the results may vary. The memory-optimized
    columnstore indexes may help to improve the performance of some data warehouse
    and operational analytics queries; however, memory-optimized columnstore indexes
    still have plenty of limitations compared to disk-based column-based storage.


    When you run a query against a memory-optimized columnstore index, In-Memory OLTP
    has to perform a scan of all the index row groups. Even though SQL Server may
    skip some of the row groups based on segment metadata, you should not rely on
    that behavior.


    By contrast, disk-based columnstore indexes may be partitioned, and entire partitions
    can be eliminated from the scan. This may significantly reduce the amount of data
    to process when a system has a long data retention policy and queries work with
    just subset of the data.


    Keeping the old data in memory-optimized tables also negatively affects the performance
    of OLTP queries. It increases the length and slows down the scans of the index
    row chains. More importantly, it will consume SQL Server memory. Even though memory
    is relatively cheap nowadays, NUMA servers partition the memory on a per-socket
    basis, and in some cases, you will have to add more CPUs to utilize the memory.
    This may require you to license them, which is expensive.


    Finally, there is another, less obvious aspect of the problem. Different data
    in the system may have different availability requirements. For example, current
    hot data may have a 99.99 percent or higher SLA in the mission-critical systems,
    while the availability requirements for the old cold data may be significantly
    lower.


    The Enterprise Edition of SQL Server allows you to utilize piecemeal restore,
    bringing the database online on a per-filegroup basis. This can significantly
    reduce the downtime in the case of a disaster. However, a piecemeal restore requires
    the In-Memory OLTP filegroup to be online for the database to become partially
    available. Keeping a large amount of old cold data in-memory would slow down the
    recovery process.


    It is often beneficial to build separate data warehouse environments to handle
    analysis and reporting for the system. However, there are still many cases when
    systems need to retain data for a long time and support mixed OLTP and data warehouse
    workloads against the same data. Moving the data completely into memory is usually
    not the best option, especially when you expect the amount of data grow over time.


    One of the solutions in this scenario is to partition the data between memory-optimized
    and disk-based tables. You can put recent hot data into memory-optimized tables,
    keeping old cold data disk-based. This allows you to create a different set of
    indexes and utilize different technologies based on workload, obtaining the biggest
    performance gain and reducing the size of the data on disk .


    Figure [13-2](#A340879_2_En_13_Chapter.html#Fig2) shows an example of the architecture
    that partitions data in the system. Obviously, the criteria for partitioning should
    depend on the system workload and other requirements.


    ![A340879_2_En_13_Fig2_HTML.jpg](A340879_2_En_13_Fig2_HTML.jpg)


    Figure 13-2.


    Example of data partitioning


    The hot operational data is stored in memory-optimized tables. This data is customer-facing,
    and it handles the majority of OLTP activity in the system. The warm data for
    several previous operational periods could be stored in disk-based B-Tree tables.
    There is usually some degree of OLTP and data warehouse workload against such
    data.


    The cold historical data mainly handles data warehouse workloads. It may be stored
    in the tables with clustered columnstore indexes, potentially with `COLUMNSTORE_ARCHIVE`
    compression. It is also possible to create nonclustered B-Tree indexes on such
    tables if you need to support OLTP use cases. Finally, if the data is static,
    it is beneficial to put it in a read-only filegroup and exclude it from the regular
    FULL database backups.


    Let’s look at an example of such an implementation and assume that you have an
    imaginary order entry system where the majority of OLTP transactions occur for
    the current month’s data. Figure [13-3](#A340879_2_En_13_Chapter.html#Fig3) shows
    the data partitioning that may exist in the system as of June 2017.


    ![A340879_2_En_13_Fig3_HTML.jpg](A340879_2_En_13_Fig3_HTML.jpg)


    Figure 13-3.


    Order entry system : data partitioning


    The hot data for the current (June 2017), previous (May 2017), and next (July
    2017) operation periods are stored in the memory-optimized tables. The warm data
    from January to April 2017 is stored in a B-Tree table on the `FG2017` filegroup.
    Lastly, the cold data for 2016 is stored in the table with the clustered columnstore
    index on the `FG2016` filegroup. The catalog entities, such as Articles and Customers,
    are implemented as memory-optimized tables, which will allow you to utilize native
    compilation when you are working with the hot orders.


    It is also beneficial to partition disk-based tables according to operational
    periods. This will help to manage data movement between the tables when the period
    changes. You will see this shortly.


    Listing [13-15](#A340879_2_En_13_Chapter.html#Par86) illustrates this implementation.
    I am omitting the `dbo.Orders2017_07` table to save the space in the book. However,
    you should always have the table for the next (future) operational period to avoid
    downtime in the system.


    ```

    create table dbo.Customers

    (

    CustomerId int not null

    constraint PK_Customers

    primary key nonclustered hash

    with (bucket_count=65536),

    Name nvarchar(256) not null,

    index IDX_Customers_Name nonclustered(Name)

    )

    with (memory_optimized=on, durability=schema_and_data);

    -- Storing data for 2017_06

    create table dbo.Orders2017_06

    (

    OrderId bigint identity(1,1) not null,

    OrderDate datetime2(0) not null,

    CustomerId int not null,

    Amount money not null,

    Status tinyint not null,

    /* Other columns */

    constraint PK_Orders2017_06

    primary key nonclustered (OrderId),

    index IDX_Orders2017_06_CustomerId

    nonclustered hash(CustomerId)

    with (bucket_count=65536),

    constraint CHK_Orders2017_06

    check (OrderDate >= ''2017-06-01'' and OrderDate = ''2017-05-01'' and OrderDate
    = ''2017-01-01'' and OrderDate = ''2017-01-01'' and OrderDate = ''2017-01-01''
    and OrderDate = ''2017-01-01'' and OrderDate = ''2017-01-01'' and OrderDate =
    ''2017-01-01'' and OrderDate = ''2017-01-01'' and OrderDate = ''2017-01-01'' and
    OrderDate = ''2017-01-01'' and OrderDate = ''2016-01-01'' and OrderDate < ''2017-01-01''),

    )

    on ps2016(OrderDate);

    create clustered columnstore index CCI_Orders2016

    on dbo.Orders2016

    with (data_compression=columnstore_archive)

    on ps2016(OrderDate);

    create nonclustered index IDX_Orders2016_CustomerId

    on  dbo.Orders2016(CustomerId)

    include(Amount)

    with (data_compression=row)

    on ps2016(OrderDate);

    go

    create view dbo.Orders(OrderDate, OrderId, CustomerId, Amount, Status)

    as

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017_06

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017_05

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2016;

    Listing 13-15.

    Data Partitioning: Object Creation

    ```


    You can hide implementation details from read-only reporting queries by implementing
    a partitioned view that combines data from all the tables there. Each table should
    have the `CHECK` constraint that indicates what data is stored in the table. This
    will allow SQL Server to skip processing unnecessary tables when you reference
    a view in the queries. Do not focus on multiple `CHECK` constraints in the `dbo.Orders2017`
    table now; I will explain the need for them later.


    Listing [13-16](#A340879_2_En_13_Chapter.html#Par89) illustrates several queries
    against a partition view.


    ```

    select count(*)

    from dbo.Orders

    where OrderDate between ''2017-06-02'' and ''2017-06-03'';

    select count(*)

    from dbo.Orders

    where OrderDate >= ''2017-01-01'';

    select count(*) from dbo.Orders;

    Listing 13-16.

    Data Partitioning: Querying Partitioned View

    ```


    Figure [13-4](#A340879_2_En_13_Chapter.html#Fig4) shows the execution plans for
    the queries. As you can see, SQL Server is able to eliminate the scan of unnecessary
    tables during query execution.


    ![A340879_2_En_13_Fig4_HTML.jpg](A340879_2_En_13_Fig4_HTML.jpg)


    Figure 13-4.


    Execution plan of the query


    As you have probably noticed, the memory-optimized tables define an `OrderId`
    column as `identity(1,1)`. In-Memory OLTP requires you to use a `SEED` value of
    1 when you define the identity column. Fortunately, you can re-seed it and enforce
    key uniqueness by implementing `identity_insert` of the dummy row immediately
    after table creation.


    Listing [13-17](#A340879_2_En_13_Chapter.html#Par93) shows this approach. It assumes
    that the system handles fewer than 100,000,000 new orders per month.


    ```

    set identity_insert dbo.Orders2017_06 on

    insert into dbo.Orders2017_06(OrderDate, OrderId, CustomerId, Amount, Status)

    values(''2017-06-01'',201706000000000,1,1,1);

    delete from dbo.Orders2017_06;

    set identity_insert dbo.Orders2017_06 off;

    Listing 13-17.

    Data Partitioning: Changing Identity SEED Property

    ```


    As with any multitable data partitioning implementation, you should support the
    data migration across the tables. As time goes on, the orders need to be moved
    from memory-optimized to disk-based tables.


    It is possible to use an `INSERT..SELECT` approach; however, the statement would
    move the snapshot of the data taken when the transaction started. You will subsequently
    need to move the data changes that occur during and after the statement execution.
    You can capture those changes by defining triggers on the memory-optimized tables.


    Let’s look at an example of data movement assuming that you want to move the last-month
    (May 2017) data to a disk-based table. Listing [13-18](#A340879_2_En_13_Chapter.html#Par97)
    shows the first step in the process, which inserts data into the separate disk-based
    staging table to avoid data duplication in the system. This also creates two tables
    to keep the `OrderId` values of updated and deleted rows using the triggers to
    populate them (I am assuming that there are no inserts into the last-month table).


    ```

    create table dbo.Orders2017_05_Tmp

    (

    OrderId bigint not null,

    OrderDate datetime2(0) not null,

    CustomerId int not null,

    Amount money not null,

    Status tinyint not null,

    check (OrderDate >= ''2017-05-01'' and OrderDate < ''2017-06-01'')

    )

    on [FG2017];

    create unique clustered index IDX_Orders2017_05_Tmp_OrderDate_OrderId

    on dbo.Orders2017_05_Tmp(OrderDate, OrderId)

    with (data_compression=row)

    on [FG2017];

    create nonclustered index IDX_Orders2017_05_Tmp_CustomerId

    on  dbo.Orders2017_05_Tmp(CustomerId)

    with (data_compression=row)

    on [FG2017];

    create nonclustered index IDX_Orders2017_05_Tmp_OrderId

    on  dbo.Orders2017_05_Tmp(OrderId)

    with (data_compression=row)

    on [FG2017]

    go

    create table dbo.OrdersUpdateQueue

    (

    ID int not null identity(1,1)

    constraint PK_OrdersUpdateQueue

    primary key nonclustered hash

    with (bucket_count=262144),

    OrderId bigint not null,

    )

    with (memory_optimized=on, durability=schema_and_data)

    go

    create table dbo.OrdersDeleteQueue

    (

    ID int not null identity(1,1)

    constraint PK_OrdersDeleteQueue

    primary key nonclustered hash

    with (bucket_count=262144),

    OrderId bigint not null

    )

    with (memory_optimized=on, durability=schema_and_data)

    go

    create trigger trgAfterUpdate on dbo.Orders2017_05

    with native_compilation, schemabinding

    after update

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''English''

    )

    insert into dbo.OrdersUpdateQueue(OrderId)

    select OrderId from inserted;

    end

    go

    create trigger trgAfterDelete on dbo.Orders2017_05

    with native_compilation, schemabinding

    after delete

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''English''

    )

    insert into dbo.OrdersDeleteQueue(OrderId)

    select OrderId from deleted;

    end

    go

    -- Step 1: Copy data to the staging table

    insert into dbo.Orders2017_05_Tmp(OrderDate, OrderId, CustomerId, Amount, Status)

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017_05 with (snapshot);

    Listing 13-18.

    Data Movement : Step 1

    ```


    The `OrderId` of the rows that were updated and deleted during the `INSERT..SELECT`
    execution are stored in the `dbo.OrdersUpdateQueue` and `dbo.OrdersDeleteQueue`
    tables. You can apply those data modifications to the staging table by using the
    code from Listing [13-19](#A340879_2_En_13_Chapter.html#Par99). Depending on the
    volatility of the data in your system, you may need to run it several times until
    the tables are almost empty.


    ```

    declare

    @MaxUpdateId int

    ,@MaxDeleteId int

    select @MaxUpdateId = max(ID)

    from dbo.OrdersUpdateQueue with (snapshot);

    select @MaxDeleteId = max(ID)

    from dbo.OrdersDeleteQueue with (snapshot);

    begin tran

    if @MaxUpdateId is not null

    begin

    update t

    set t.Amount = s.Amount, t.Status = s.Status

    from

    dbo.OrdersUpdateQueue q with (snapshot) join

    dbo.Orders2017_05 s with (snapshot) on

    q.OrderId = s.OrderId

    join dbo.Orders2017_05_Tmp t on

    t.OrderId = s.OrderId

    where

    q.ID <= @MaxUpdateId;

    delete from dbo.OrdersUpdateQueue with (snapshot)

    where ID <= @MaxUpdateId;

    end;

    if @MaxDeleteId is not null

    begin

    delete from t

    from

    dbo.OrdersDeleteQueue q with (snapshot) join

    dbo.Orders2017_05_Tmp t on

    t.OrderId = q.OrderId

    where

    q.ID <= @MaxDeleteId;

    delete from dbo.OrdersDeleteQueue with (snapshot)

    where ID <= @MaxDeleteId;

    end

    commit;

    Listing 13-19.

    Data Movement: Step 2

    ```


    Finally, you need to drop the `dbo.Orders2017_05` table, switch the staging table
    as the partition to the `dbo.Orders2017` table, and change the partition view.
    You should prevent client access to the May 2017 data during those operations.
    Fortunately, the duration of the downtime will be very short; both update and
    delete queue tables are almost empty, and other operations will be done on the
    metadata level, as shown in Listing [13-20](#A340879_2_En_13_Chapter.html#Par102).


    Note


    If you access the data in the `dbo.Orders2017_05` table through the T-SQL (interop)
    stored procedures, you can alter them at the beginning of the transaction and
    obtain a schema modification (Sch-M) lock on them. This will block clients from
    calling stored procedures until a transaction is committed.


    ```

    -- Disconnect clients before running those steps.

    -- Alternatively, if the Data Access Tier uses Interop

    -- stored procedures, you can start the transaction and

    -- alter SPs before the updates. This will block clients

    -- from calling those SPs.

    update t

    set t.Amount = s.Amount, t.Status = s.Status

    from

    dbo.OrdersUpdateQueue q with (snapshot)

    join dbo.Orders2017_05 s with (snapshot) on

    q.OrderId = s.OrderId

    join dbo.Orders2017_05_Tmp t on

    t.OrderId = s.OrderId;

    delete from t

    from

    dbo.OrdersDeleteQueue q with (snapshot) join

    dbo.Orders2017_05_Tmp t on

    t.OrderId = q.OrderId;

    alter table dbo.Orders2017

    drop constraint CHK_Order2017_01_05

    go

    alter table dbo.Orders2017_05_Tmp

    switch to dbo.Orders2017 partition 5

    go

    alter view dbo.Orders(OrderDate, OrderId, CustomerId, Amount, Status)

    as

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017_06

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2016

    go

    drop table dbo.Orders2017_05;

    Listing 13-20.

    Data Movement: Final Step

    ```


    One of the things you need to do during this process is change the `CHECK` constraints
    on the `dbo.Orders2017` table indicating that the table stores May 2017 data now.
    Unfortunately, SQL Server always scans one of the indexes in the table to validate
    new `CHECK` constraints, holding the schema modification (SCH-M) lock and preventing
    access to the table during the scan.


    One of the ways to address such a problem is by creating multiple `CHECK` constraints—one
    constraint per month—as part of the `CREATE TABLE` statement. Every time you move
    another month data into the table, you are dropping a constraint, which is a metadata
    operation, rather than creating a new one. SQL Server evaluates all constraints
    during optimization and picks the most restrictive one. This is the reason why
    you created nine `CHECK` constraints in the `dbo.Orders2017` table in Listing
    [13-15](#A340879_2_En_13_Chapter.html#Par86).


    Note


    You can look at a more comprehensive and detailed version of the code in the companion
    materials of the book.


    While implementing data partitioning requires additional effort, it pays off in
    the long run. It allows you to utilize the best technologies for each workload,
    simplifies database administration and maintenance, improves system availability,
    and helps to reduce the hardware and storage costs. Consider implementing it when
    you expect to store a large amount of data in the system.


    Note


    My Pro SQL Server Internals book includes a detailed chapter about data partitioning.
    It shows how to implement tiered storage and move data between different tables
    and filegroups while keeping it transparent to the users.'
  trans: '

    # 在混合工作负载系统中使用内存 OLTP


    ## 混合工作负载的挑战


    `In-Memory OLTP` 可以为 `OLTP` 系统带来显著的性能提升。然而，对于数据仓库工作负载，结果可能有所不同。内存优化的列存储索引可能有助于提高某些数据仓库和操作型分析查询的性能；但是，与基于磁盘的列存储相比，内存优化列存储索引仍然存在许多限制。


    当针对内存优化列存储索引运行查询时，`In-Memory OLTP` 必须扫描所有索引行组。尽管 `SQL Server` 可能会基于段元数据跳过某些行组，但你不应依赖这种行为。


    相比之下，基于磁盘的列存储索引可以进行分区，并且可以从扫描中排除整个分区。当系统具有长期数据保留策略且查询仅处理数据的子集时，这可以显著减少需要处理的数据量。


    将旧数据保留在内存优化表中也会对 `OLTP` 查询的性能产生负面影响。它会增加索引行链的扫描长度并减慢扫描速度。更重要的是，它将消耗 `SQL Server`
    内存。尽管如今内存相对便宜，但 `NUMA` 服务器按插座划分内存，在某些情况下，你必须添加更多 `CPU` 才能利用内存。这可能需要你为这些 `CPU`
    购买许可，代价高昂。


    最后，这个问题还有另一个不那么明显的方面。系统中的不同数据可能有不同的可用性要求。例如，在关键任务系统中，当前的热数据可能有 `99.99%` 或更高的 `SLA`，而旧的冷数据的可用性要求可能显著降低。


    `SQL Server` 企业版允许你利用逐段还原，按文件组将数据库联机。这可以在灾难情况下显著减少停机时间。然而，逐段还原要求 `In-Memory OLTP`
    文件组在线，数据库才能部分可用。将大量旧的冷数据保留在内存中会减慢恢复过程。


    ## 分区解决方案


    构建独立的数据仓库环境来处理系统的分析和报告通常是有益的。然而，在许多情况下，系统需要长时间保留数据，并支持针对相同数据的混合 `OLTP` 和数据仓库工作负载。将数据完全移入内存通常不是最佳选择，尤其是当你预期数据量随时间增长时。


    此场景中的一种解决方案是在内存优化表和基于磁盘的表之间对数据进行分区。你可以将最近的 **热数据** 放入内存优化表，将旧的 **冷数据** 保留在基于磁盘的表中。这使你可以根据工作负载创建不同的索引并利用不同的技术，从而获得最大的性能提升并减少磁盘上的数据大小。


    图 13-2 展示了一个在系统中分区数据的架构示例。显然，分区标准应取决于系统工作负载和其他要求。


    ![A340879_2_En_13_Fig2_HTML.jpg](img/A340879_2_En_13_Fig2_HTML.jpg)


    图 13-2：数据分区示例


    热操作数据存储在内存优化表中。这些数据面向客户，并处理系统中大部分的 `OLTP` 活动。前几个操作期间的暖数据可以存储在基于磁盘的 `B-Tree` 表中。通常，对此类数据会有一定程度的
    `OLTP` 和数据仓库工作负载。


    冷历史数据主要处理数据仓库工作负载。它可以存储在包含聚集列存储索引的表中，可能使用 `COLUMNSTORE_ARCHIVE` 压缩。如果需要支持 `OLTP`
    用例，也可以在此类表上创建非聚集 `B-Tree` 索引。最后，如果数据是静态的，将其放在只读文件组中并从常规的 `FULL` 数据库备份中排除是有益的。


    让我们看一个此类实现的例子，假设你有一个虚构的订单录入系统，其中大部分 `OLTP` 事务发生在当月的数据上。图 13-3 显示了截至 2017 年 6 月系统中存在的可能的数据分区。


    ![A340879_2_En_13_Fig3_HTML.jpg](img/A340879_2_En_13_Fig3_HTML.jpg)


    图 13-3：订单录入系统 - 数据分区


    当前（2017 年 6 月）、前一个（2017 年 5 月）和下一个（2017 年 7 月）操作期间的热数据存储在内存优化表中。2017 年 1 月至 4
    月的暖数据存储在 `FG2017` 文件组上的 `B-Tree` 表中。最后，2016 年的冷数据存储在 `FG2016` 文件组上包含聚集列存储索引的表中。目录实体，如
    `Articles` 和 `Customers`，被实现为内存优化表，这将允许你在处理热订单时利用原生编译。


    根据操作期间对基于磁盘的表进行分区也是有益的。这将有助于在期间变化时管理表之间的数据移动。你稍后会看到这一点。


    清单 13-15 说明了此实现。为了节省本书篇幅，我省略了 `dbo.Orders2017_07` 表。但是，你应该始终为下一个（未来）操作期间准备好表，以避免系统停机。


    ```sql

    create table dbo.Customers

    (

    CustomerId int not null

    constraint PK_Customers

    primary key nonclustered hash

    with (bucket_count=65536),

    Name nvarchar(256) not null,

    index IDX_Customers_Name nonclustered(Name)

    )

    with (memory_optimized=on, durability=schema_and_data);

    -- Storing data for 2017_06

    create table dbo.Orders2017_06

    (

    OrderId bigint identity(1,1) not null,

    OrderDate datetime2(0) not null,

    CustomerId int not null,

    Amount money not null,

    Status tinyint not null,

    /* Other columns */

    constraint PK_Orders2017_06

    primary key nonclustered (OrderId),

    index IDX_Orders2017_06_CustomerId

    nonclustered hash(CustomerId)

    with (bucket_count=65536),

    constraint CHK_Orders2017_06

    check (OrderDate >= ''2017-06-01'' and OrderDate < ''2017-07-01'')

    )

    on ps2017(OrderDate);

    -- Storing data for 2017_05

    create table dbo.Orders2017_05

    (

    OrderId bigint identity(1,1) not null,

    OrderDate datetime2(0) not null,

    CustomerId int not null,

    Amount money not null,

    Status tinyint not null,

    /* Other columns */

    constraint PK_Orders2017_05

    primary key nonclustered (OrderId),

    index IDX_Orders2017_05_CustomerId

    nonclustered hash(CustomerId)

    with (bucket_count=65536),

    constraint CHK_Orders2017_05

    check (OrderDate >= ''2017-05-01'' and OrderDate < ''2017-06-01'')

    )

    on ps2017(OrderDate);

    -- Storing data for 2017_01 - 2017_04

    create table dbo.Orders2017

    (

    OrderId bigint not null,

    OrderDate datetime2(0) not null,

    CustomerId int not null,

    Amount money not null,

    Status tinyint not null,

    /* Other columns */

    constraint PK_Orders2017

    primary key nonclustered (OrderDate, OrderId),

    index IDX_Orders2017_CustomerId

    nonclustered (CustomerId) include (Amount),

    constraint CHK_Orders2017_01

    check (OrderDate >= ''2017-01-01'' and OrderDate < ''2017-02-01''),

    constraint CHK_Orders2017_02

    check (OrderDate >= ''2017-02-01'' and OrderDate < ''2017-03-01''),

    constraint CHK_Orders2017_03

    check (OrderDate >= ''2017-03-01'' and OrderDate < ''2017-04-01''),

    constraint CHK_Orders2017_04

    check (OrderDate >= ''2017-04-01'' and OrderDate < ''2017-05-01''),

    constraint CHK_Orders2017_05

    check (OrderDate >= ''2017-05-01'' and OrderDate < ''2017-06-01'')

    )

    on ps2017(OrderDate);

    -- Storing data for 2016

    create table dbo.Orders2016

    (

    OrderId bigint not null,

    OrderDate datetime2(0) not null,

    CustomerId int not null,

    Amount money not null,

    Status tinyint not null,

    /* Other columns */

    constraint CHK_Orders2016

    check (OrderDate >= ''2016-01-01'' and OrderDate < ''2017-01-01''),

    )

    on ps2016(OrderDate);

    create clustered columnstore index CCI_Orders2016

    on dbo.Orders2016

    with (data_compression=columnstore_archive)

    on ps2016(OrderDate);

    create nonclustered index IDX_Orders2016_CustomerId

    on  dbo.Orders2016(CustomerId)

    include(Amount)

    with (data_compression=row)

    on ps2016(OrderDate);

    go

    create view dbo.Orders(OrderDate, OrderId, CustomerId, Amount, Status)

    as

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017_06

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017_05

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2016;

    ```


    清单 13-15：数据分区：对象创建


    ## 查询分区视图


    你可以通过实现一个组合所有表中数据的分区视图，向只读报告查询隐藏实现细节。每个表都应具有指示表中存储了什么数据的 `CHECK` 约束。这将允许 `SQL
    Server` 在查询中引用视图时跳过处理不必要的表。现在不要关注 `dbo.Orders2017` 表中的多个 `CHECK` 约束；我稍后会解释需要它们的原因。


    清单 13-16 说明了针对分区视图的几个查询。


    ```sql

    select count(*)

    from dbo.Orders

    where OrderDate between ''2017-06-02'' and ''2017-06-03'';

    select count(*)

    from dbo.Orders

    where OrderDate >= ''2017-01-01'';

    select count(*) from dbo.Orders;

    ```


    清单 13-16：数据分区：查询分区视图


    图 13-4 显示了查询的执行计划。如你所见，`SQL Server` 能够在查询执行期间消除对不必要表的扫描。


    ![A340879_2_En_13_Fig4_HTML.jpg](img/A340879_2_En_13_Fig4_HTML.jpg)


    图 13-4：查询的执行计划


    ## 处理标识列


    你可能已经注意到，内存优化表将 `OrderId` 列定义为 `identity(1,1)`。`In-Memory OLTP` 要求在定义标识列时使用 `SEED`
    值 1。幸运的是，你可以通过在表创建后立即对虚拟行执行 `identity_insert` 来重新设定种子并强制实施键的唯一性。


    清单 13-17 展示了这种方法。它假设系统每月处理少于 `100,000,000` 个新订单。


    ```sql

    set identity_insert dbo.Orders2017_06 on

    insert into dbo.Orders2017_06(OrderDate, OrderId, CustomerId, Amount, Status)

    values(''2017-06-01'',201706000000000,1,1,1);

    delete from dbo.Orders2017_06;

    set identity_insert dbo.Orders2017_06 off;

    ```


    清单 13-17：数据分区：更改标识 SEED 属性


    ## 数据迁移


    与任何多表数据分区实现一样，你应该支持表之间的数据迁移。随着时间的推移，订单需要从内存优化表移动到基于磁盘的表。


    可以使用 `INSERT..SELECT` 方法；但是，该语句将移动事务开始时拍摄的数据快照。随后，你将需要移动在语句执行期间和之后发生的数据更改。你可以通过在内存优化表上定义触发器来捕获这些更改。


    让我们看一个数据移动的例子，假设你希望将上个月（2017 年 5 月）的数据移动到基于磁盘的表中。清单 13-18 显示了该过程的第一步，该步骤将数据插入单独的基于磁盘的暂存表中，以避免系统中的数据重复。这还会创建两个表来保存已更新和已删除行的
    `OrderId` 值，并使用触发器填充它们（我假设没有向上月表中插入数据）。


    ```sql

    create table dbo.Orders2017_05_Tmp

    (

    OrderId bigint not null,

    OrderDate datetime2(0) not null,

    CustomerId int not null,

    Amount money not null,

    Status tinyint not null,

    check (OrderDate >= ''2017-05-01'' and OrderDate < ''2017-06-01'')

    )

    on [FG2017];

    create unique clustered index IDX_Orders2017_05_Tmp_OrderDate_OrderId

    on dbo.Orders2017_05_Tmp(OrderDate, OrderId)

    with (data_compression=row)

    on [FG2017];

    create nonclustered index IDX_Orders2017_05_Tmp_CustomerId

    on  dbo.Orders2017_05_Tmp(CustomerId)

    with (data_compression=row)

    on [FG2017];

    create nonclustered index IDX_Orders2017_05_Tmp_OrderId

    on  dbo.Orders2017_05_Tmp(OrderId)

    with (data_compression=row)

    on [FG2017]

    go

    create table dbo.OrdersUpdateQueue

    (

    ID int not null identity(1,1)

    constraint PK_OrdersUpdateQueue

    primary key nonclustered hash

    with (bucket_count=262144),

    OrderId bigint not null,

    )

    with (memory_optimized=on, durability=schema_and_data)

    go

    create table dbo.OrdersDeleteQueue

    (

    ID int not null identity(1,1)

    constraint PK_OrdersDeleteQueue

    primary key nonclustered hash

    with (bucket_count=262144),

    OrderId bigint not null

    )

    with (memory_optimized=on, durability=schema_and_data)

    go

    create trigger trgAfterUpdate on dbo.Orders2017_05

    with native_compilation, schemabinding

    after update

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''English''

    )

    insert into dbo.OrdersUpdateQueue(OrderId)

    select OrderId from inserted;

    end

    go

    create trigger trgAfterDelete on dbo.Orders2017_05

    with native_compilation, schemabinding

    after delete

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''English''

    )

    insert into dbo.OrdersDeleteQueue(OrderId)

    select OrderId from deleted;

    end

    go

    -- Step 1: Copy data to the staging table

    insert into dbo.Orders2017_05_Tmp(OrderDate, OrderId, CustomerId, Amount, Status)

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017_05 with (snapshot);

    ```


    清单 13-18：数据移动：步骤 1


    在 `INSERT..SELECT` 执行期间更新和删除的行的 `OrderId` 存储在 `dbo.OrdersUpdateQueue` 和 `dbo.OrdersDeleteQueue`
    表中。你可以使用清单 13-19 中的代码将这些数据修改应用到暂存表。根据系统中数据的易变性，你可能需要运行它几次，直到表几乎为空。


    ```sql

    declare

    @MaxUpdateId int

    ,@MaxDeleteId int

    select @MaxUpdateId = max(ID)

    from dbo.OrdersUpdateQueue with (snapshot);

    select @MaxDeleteId = max(ID)

    from dbo.OrdersDeleteQueue with (snapshot);

    begin tran

    if @MaxUpdateId is not null

    begin

    update t

    set t.Amount = s.Amount, t.Status = s.Status

    from

    dbo.OrdersUpdateQueue q with (snapshot) join

    dbo.Orders2017_05 s with (snapshot) on

    q.OrderId = s.OrderId

    join dbo.Orders2017_05_Tmp t on

    t.OrderId = s.OrderId

    where

    q.ID <= @MaxUpdateId;

    delete from dbo.OrdersUpdateQueue with (snapshot)

    where ID <= @MaxUpdateId;

    end;

    if @MaxDeleteId is not null

    begin

    delete from t

    from

    dbo.OrdersDeleteQueue q with (snapshot) join

    dbo.Orders2017_05_Tmp t on

    t.OrderId = q.OrderId

    where

    q.ID <= @MaxDeleteId;

    delete from dbo.OrdersDeleteQueue with (snapshot)

    where ID <= @MaxDeleteId;

    end

    commit;

    ```


    清单 13-19：数据移动：步骤 2


    最后，你需要删除 `dbo.Orders2017_05` 表，将暂存表作为分区切换到 `dbo.Orders2017` 表，并更改分区视图。在这些操作期间，你应该阻止客户端访问
    2017 年 5 月的数据。幸运的是，停机时间将非常短；更新和删除队列表几乎为空，其他操作将在元数据级别完成，如清单 13-20 所示。


    > 注意

    >

    > 如果你通过 `T-SQL`（互操作）存储过程访问 `dbo.Orders2017_05` 表中的数据，你可以在事务开始时更改它们并获取其架构修改 (`Sch-M`)
    锁。这将阻止客户端调用存储过程，直到事务提交。


    ```sql

    -- Disconnect clients before running those steps.

    -- Alternatively, if the Data Access Tier uses Interop

    -- stored procedures, you can start the transaction and

    -- alter SPs before the updates. This will block clients

    -- from calling those SPs.

    update t

    set t.Amount = s.Amount, t.Status = s.Status

    from

    dbo.OrdersUpdateQueue q with (snapshot)

    join dbo.Orders2017_05 s with (snapshot) on

    q.OrderId = s.OrderId

    join dbo.Orders2017_05_Tmp t on

    t.OrderId = s.OrderId;

    delete from t

    from

    dbo.OrdersDeleteQueue q with (snapshot) join

    dbo.Orders2017_05_Tmp t on

    t.OrderId = q.OrderId;

    alter table dbo.Orders2017

    drop constraint CHK_Order2017_01_05

    go

    alter table dbo.Orders2017_05_Tmp

    switch to dbo.Orders2017 partition 5

    go

    alter view dbo.Orders(OrderDate, OrderId, CustomerId, Amount, Status)

    as

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017_06

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2017

    union all

    select OrderDate, OrderId, CustomerId, Amount, Status

    from dbo.Orders2016

    go

    drop table dbo.Orders2017_05;

    ```


    清单 13-20：数据移动：最后一步


    ## 优化 CHECK 约束


    在此过程中你需要做的一件事是更改 `dbo.Orders2017` 表上的 `CHECK` 约束，以指示该表现在存储了 2017 年 5 月的数据。不幸的是，`SQL
    Server` 总是扫描表中的一个索引来验证新的 `CHECK` 约束，持有架构修改 (`SCH-M`) 锁并在扫描期间阻止对表的访问。


    解决此类问题的一种方法是在 `CREATE TABLE` 语句中创建多个 `CHECK` 约束——每月一个约束。每次将另一个月的数据移入表时，你都是删除一个约束（这是一个元数据操作），而不是创建一个新的。`SQL
    Server` 在优化期间评估所有约束并选择限制性最强的约束。这就是为什么你在清单 13-15 的 `dbo.Orders2017` 表中创建了九个 `CHECK`
    约束的原因。


    > 注意

    >

    > 你可以在本书的配套材料中查看更全面和详细的代码版本。


    ## 结论


    虽然实现数据分区需要额外的努力，但从长远来看是值得的。它允许你为每个工作负载利用最佳技术，简化数据库管理和维护，提高系统可用性，并有助于降低硬件和存储成本。当你预期要在系统中存储大量数据时，请考虑实现它。


    > 注意

    >

    > 我的《Pro SQL Server Internals》一书包含关于数据分区的详细章节。它展示了如何实现分层存储并在不同的表和文件组之间移动数据，同时对用户保持透明。

