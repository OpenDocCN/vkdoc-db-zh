  raw: '## Hashing Overview


    Hashing is a widely known concept in computer science that performs the transformation
    of the data into short, usually fixed-length values. Hashing is often used in
    scenarios when you need to optimize point-lookup operations that search within
    a set of large strings or binary data using equality predicates. Hashing significantly
    reduces an index key size, making the index compact, which, in turn, improves
    the performance of point-lookup operations.


    A properly defined hashing algorithm, often called a hash function, provides a
    relatively random hash distribution. A hash function is always deterministic,
    which means that the same input always generates the same hash value. However,
    a hash function does not necessarily guarantee uniqueness, and different input
    values can generate the same hashes. That situation is called a collision , and
    the chance of it greatly depends on the quality of the hash algorithm and the
    range of allowed hash keys. For example, a hash function that generates a 2-byte
    hash has a significantly higher chance of collision compared to a function that
    generates a 4-byte hash.


    Hash tables, often called hash maps , are the data structures that store hash
    keys, mapping them to the original data. The hash keys are assigned to buckets,
    in which the original data can be found. Ideally, each unique hash key is stored
    in the individual bucket; however, when the number of buckets in the table is
    not big enough, it is entirely possible that multiple unique hash keys would be
    placed into the same bucket. Such a situation is called a hash collision .


    Tip


    The `HASHBYTES` function allows you to generate hashes in T-SQL using one of the
    industry-standard algorithms such as MD5, SHA2_512, and a few others. However,
    the output of the `HASHBYTES` function is not ideal for point-lookup optimization
    because of the large size of the output. You can use a `CHECKSUM` function that
    generates a 4-byte hash instead.


    You can index the hash generated by the `CHECKSUM` function and use it as the
    replacement for the indexes on `uniqueidentifier` columns. It is also useful when
    you need to perform point-lookup operations on large (greater than 900/1,700 bytes)
    strings or binary data, which cannot be indexed. I discussed this scenario in
    Chapter [7](#A340879_2_En_7_Chapter.html) of my book Pro SQL Server Internals.


    ## Much Ado About Bucket Count


    In the In-Memory OLTP Engine, hash indexes are, in a nutshell, hash tables with
    buckets implemented as an array of a predefined size. Each bucket contains a pointer
    to a data row. SQL Server applies a hash function to the index key values, and
    the result of the function determines to which bucket a row belongs. All rows
    that have the same hash value and belong to the same bucket are linked together
    through a chain of index pointers in the data rows.


    Figure [4-1](#A340879_2_En_4_Chapter.html#Fig1) illustrates an example of a memory-optimized
    table with two hash indexes defined. You saw this diagram in the previous chapter;
    it’s displayed here for reference purposes. Remember that in this example you
    are assuming that a hash function generates a hash value based on the first letter
    of the string. Obviously, a real hash function used in In-Memory OLTP is much
    more random and does not use character-based hashes.


    ![A340879_2_En_4_Fig1_HTML.jpg](A340879_2_En_4_Fig1_HTML.jpg)


    Figure 4-1.


    A memory-optimized table with two hash indexes


    The number of buckets is the critical element for hash index performance. An efficient
    hash function allows you to avoid most collisions during hash key generation;
    however, you will have collisions in the hash table when the number of buckets
    is not big enough and SQL Server has to store different hashes together in the
    same buckets. Those collisions lead to longer row chains; this requires SQL Server
    to scan more rows through those links during the query processing.


    ### Bucket Count and Performance


    Let’s consider a hash function that generates a hash based on the first two letters
    of the string and can return 26 * 26 = 676 different hash keys. This is a purely
    hypothetical example that I am using just for illustration purposes.


    Assuming that the hash table can accommodate all 676 different hash buckets and
    you have the data shown in Figure [4-2](#A340879_2_En_4_Chapter.html#Fig2), you
    will need to traverse at most two rows in the chain when you run a query that
    looks for a specific value.


    ![A340879_2_En_4_Fig2_HTML.jpg](A340879_2_En_4_Fig2_HTML.jpg)


    Figure 4-2.


    Hash table lookup : 676 buckets


    The dotted arrows in Figure [4-2](#A340879_2_En_4_Chapter.html#Fig2) illustrate
    the steps needed to look up the rows for `Ann`. The process requires you to traverse
    two rows after you find the right hash bucket in the table.


    However, the situation changes if your hash table does not have enough buckets
    to separate unique hash keys from each other. Figure [4-3](#A340879_2_En_4_Chapter.html#Fig3)
    illustrates the situation when a hash table has only 26 buckets and each of them
    stores multiple different hash keys. Now the same lookup of the `Ann` row requires
    you to traverse the chain of nine rows total.


    ![A340879_2_En_4_Fig3_HTML.jpg](A340879_2_En_4_Fig3_HTML.jpg)


    Figure 4-3.


    Hash table lookup: 26 buckets


    The same principle applies to the hash indexes where choosing an incorrect number
    of buckets can lead to serious performance issues.


    Let’s create two nondurable memory-optimized tables and populate them with 1,000,000
    rows each, as shown in Listing [4-1](#A340879_2_En_4_Chapter.html#Par17). Both
    tables have the same schema with a primary key constraint defined as the hash
    index. The number of buckets in the index is controlled by the `bucket_count`
    property. Internally, however, SQL Server rounds the provided value to the next
    power of 2, so the `dbo.HashIndex_HighBucketCount` table would have 1,048,576
    buckets in the index, and the `dbo.HashIndex_LowBucketCount` table would have
    1,024 buckets.


    ```

    create table dbo.HashIndex_LowBucketCount

    (

    Id int not null

    constraint PK_HashIndex_LowBucketCount

    primary key nonclustered

    hash with (bucket_count=1000),

    Value int not null

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.HashIndex_HighBucketCount

    (

    Id int not null

    constraint PK_HashIndex_HighBucketCount

    primary key nonclustered

    hash with (bucket_count=1000000),

    Value int not null

    )

    with (memory_optimized=on, durability=schema_only);

    go

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N3 as t2) -- 1,048,576 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.HashIndex_HighBucketCount(Id, Value)

    select Id, Id

    from ids

    where Id <= 1000000;

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N3 as t2) -- 1,048,576 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.HashIndex_LowBucketCount(Id, Value)

    select Id, Id

    from ids

    where Id <= 1000000;

    Listing 4-1.

    Bucket_count and Performance: Creating Memory-Optimized Tables

    ```'
  trans: '

    ## 哈希概述


    哈希是计算机科学中一个广为人知的概念，它将数据转换为短小的、通常是固定长度的值。当你需要优化在大量字符串或二进制数据集中使用等式谓词进行点查找操作时，哈希经常被用到。哈希显著减小了索引键的大小，使索引变得紧凑，这反过来又提升了点查找操作的性能。


    一个正确定义的哈希算法，通常称为哈希函数，能提供相对随机的哈希分布。哈希函数总是确定性的，这意味着相同的输入总是生成相同的哈希值。然而，哈希函数不一定保证唯一性，不同的输入值可能生成相同的哈希。这种情况被称为
    `冲突`，其发生的可能性很大程度上取决于哈希算法的质量和允许的哈希键范围。例如，一个生成 2 字节哈希的函数，比生成 4 字节哈希的函数，发生冲突的几率要高得多。


    哈希表，通常称为哈希映射，是存储哈希键并将其映射回原始数据的数据结构。哈希键被分配到存储桶中，原始数据可以在其中找到。理想情况下，每个唯一的哈希键都存储在一个独立的存储桶中；但是，当表中存储桶的数量不够大时，多个唯一的哈希键完全有可能被放入同一个存储桶中。这种情况被称为哈希冲突。


    提示


    `HASHBYTES` 函数允许你使用行业标准算法（如 `MD5`、`SHA2_512` 等）在 T-SQL 中生成哈希。然而，由于输出尺寸过大，`HASHBYTES`
    函数的输出并不适合用于点查找优化。你可以改用生成 4 字节哈希的 `CHECKSUM` 函数。


    你可以为 `CHECKSUM` 函数生成的哈希创建索引，并用它来替代 `uniqueidentifier` 列上的索引。当你需要在大型（超过 900/1,700
    字节）字符串或二进制数据上执行点查找操作（这些数据本身无法被索引）时，它也很有用。我在我的书《Pro SQL Server Internals》的第 7 章中讨论了这个场景。


    ## 关于存储桶数量的深入探讨


    在内存 OLTP 引擎中，哈希索引简而言之就是哈希表，其存储桶被实现为预定义大小的数组。每个存储桶包含一个指向数据行的指针。SQL Server 对索引键值应用哈希函数，函数的结果决定了一行属于哪个存储桶。所有具有相同哈希值并属于同一存储桶的行，通过数据行中的索引指针链链接在一起。


    图 4-1 展示了一个定义了两个哈希索引的内存优化表示例。你在上一章见过这个图；这里再次显示以供参考。请记住，在这个例子中，你假设一个哈希函数根据字符串的第一个字母生成哈希值。显然，内存
    OLTP 中实际使用的哈希函数要随机得多，并且不使用基于字符的哈希。


    ![A340879_2_En_4_Fig1_HTML.jpg](img/A340879_2_En_4_Fig1_HTML.jpg)


    图 4-1.

    带有两个哈希索引的内存优化表


    存储桶的数量是决定哈希索引性能的关键因素。一个高效的哈希函数可以让你避免在生成哈希键时发生大多数冲突；然而，当存储桶数量不足且 SQL Server 不得不将不同的哈希值存储在同一个存储桶中时，哈希表中仍然会出现冲突。这些冲突会导致更长的行链；这要求
    SQL Server 在查询处理过程中需要通过这些链接扫描更多的行。


    ### 存储桶数量与性能


    让我们考虑一个基于字符串前两个字母生成哈希的哈希函数，它可以返回 26 * 26 = 676 个不同的哈希键。这是一个纯粹的假设性示例，仅用于说明目的。


    假设哈希表可以容纳所有 676 个不同的哈希存储桶，并且你拥有图 4-2 所示的数据，那么当你运行一个查找特定值的查询时，最多需要在链中遍历两行。


    ![A340879_2_En_4_Fig2_HTML.jpg](img/A340879_2_En_4_Fig2_HTML.jpg)


    图 4-2.

    哈希表查找：676 个存储桶


    图 4-2 中的虚线箭头说明了查找 `Ann` 相关行所需的步骤。该过程需要你在表中找到正确的哈希存储桶后，遍历两行。


    但是，如果你的哈希表没有足够的存储桶来分离唯一的哈希键，情况就会发生变化。图 4-3 说明了当哈希表只有 26 个存储桶且每个存储桶存储多个不同哈希键时的情形。现在，同样的
    `Ann` 行查找需要你遍历总共九行的链。


    ![A340879_2_En_4_Fig3_HTML.jpg](img/A340879_2_En_4_Fig3_HTML.jpg)


    图 4-3.

    哈希表查找：26 个存储桶


    同样的原则适用于哈希索引，选择错误的存储桶数量可能导致严重的性能问题。


    让我们创建两个非持久化的内存优化表，并如清单 4-1 所示，分别填充 1,000,000 行数据。这两个表具有相同的架构，其主键约束定义为哈希索引。索引中的存储桶数量由
    `bucket_count` 属性控制。然而，在内部，SQL Server 会将提供的值向上取整到 2 的下一个幂，因此 `dbo.HashIndex_HighBucketCount`
    表的索引将具有 1,048,576 个存储桶，而 `dbo.HashIndex_LowBucketCount` 表将具有 1,024 个存储桶。


    ```

    create table dbo.HashIndex_LowBucketCount

    (

    Id int not null

    constraint PK_HashIndex_LowBucketCount

    primary key nonclustered

    hash with (bucket_count=1000),

    Value int not null

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.HashIndex_HighBucketCount

    (

    Id int not null

    constraint PK_HashIndex_HighBucketCount

    primary key nonclustered

    hash with (bucket_count=1000000),

    Value int not null

    )

    with (memory_optimized=on, durability=schema_only);

    go

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N3 as t2) -- 1,048,576 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.HashIndex_HighBucketCount(Id, Value)

    select Id, Id

    from ids

    where Id <= 1000000;

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N3 as t2) -- 1,048,576 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.HashIndex_LowBucketCount(Id, Value)

    select Id, Id

    from ids

    where Id <= 1000000;

    Listing 4-1.

    bucket_count 与性能：创建内存优化表

    ```

