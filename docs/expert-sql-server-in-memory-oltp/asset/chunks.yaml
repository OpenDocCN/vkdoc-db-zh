    ## Statistics on Memory-Optimized Tables


    SQL Server 2016 creates and automatically updates index- and column-level statistics
    on memory-optimized tables. However, the tables created under database compatibility
    levels lower than 130 (SQL Server 2016) would have the statistics `NORECOMPUTE`
    option enabled, which prevents automatic statistics updates.


    This situation may happen in two cases: either when memory-optimized tables were
    created in SQL Server 2014 and later migrated to SQL Server 2016 or when SQL Server
    2016 databases run under a lower compatibility level than 130.


    Let’s look at this behavior and run the code from Listing [4-8](#A340879_2_En_4_Chapter.html#Par54).
    This code changes the database compatibility level to 120 and creates the table
    `dbo.Stats120`. As the next step, it switches the compatibility level back to
    130 and creates another table, `dbo.Stats130`. Finally, the code looks at the
    statistics properties for the table indexes.


    ```

    alter database current set compatibility_level=120;

    go

    create table dbo.Stats120

    (

    Id int not null

    constraint PK_Stats120

    primary key nonclustered

    hash with (bucket_count=1024),

    Value int not null

    )

    with (memory_optimized=on, durability=schema_only);

    go

    alter database current set compatibility_level=130;

    go

    create table dbo.Stats130

    (

    Id int not null

    constraint PK_Stats130

    primary key nonclustered

    hash with (bucket_count=1024),

    Value int not null

    )

    with (memory_optimized=on, durability=schema_only);

    go

    select

    sc.name + ''.'' + t.name as [Table]

    ,s.name as [Statistics]

    ,s.no_recompute

    from

    sys.stats s join sys.tables t on

    s.object_id = t.object_id

    join sys.schemas sc on

    t.schema_id = sc.schema_id

    where

    t.name like ''Stats%'';

    Listing 4-8.

    Statistics NORECOMPUTE and Compatibility Level

    ```


    As you can see in Figure [4-8](#A340879_2_En_4_Chapter.html#Fig8), the `dbo.Stats120.PK_Stats120`
    statistics has the `NORECOMPUTE` option enabled, which will prevent automatic
    statistics update for the statistics. This is not the case for the `dbo.Stats130.PK_Stats130`
    statistics, which has been created under a database compatibility level of 130.


    ![A340879_2_En_4_Fig8_HTML.jpg](A340879_2_En_4_Fig8_HTML.jpg)


    Figure 4-8.


    Statistics NORECOMPUTE option


    You can change the value of the `NORECOMPUTE` option and enable automatic statistics
    update by manually updating the affected statistics with an `UPDATE STATISTICS`
    statement. It is worth repeating that the statistics `NORECOMPUTE` option is controlled
    by the database compatibility level at the time of table creation rather than
    by the automatic statistics update setting. Statistics with the `NORECOMPUTE=OFF`
    option will be updated automatically regardless of the compatibility level, assuming
    the Auto Update Statistics database option is enabled.


    You should manually update all statistics on memory-optimized tables and enable
    automatic statistics update after you migrate the database from SQL Server 2014.
    You can achieve that by running the code shown in Listing [4-9](#A340879_2_En_4_Chapter.html#Par58).
    It generates `UPDATE STATISTICS` commands for all statistics with the `NORECOMPUTE=ON`
    option and runs them using dynamic SQL.


    ```

    declare

    @SQL nvarchar(max)

    select

    @SQL = convert(nvarchar(max),

    (

    select

    N''update statistics '' as [text()]

    ,sc.name + N''.'' + t.name as [text()]

    ,N''('' + s.name + N''); '' as [text()]

    from

    sys.stats s join sys.tables t on

    s.object_id = t.object_id

    join sys.schemas sc on

    t.schema_id = sc.schema_id

    where

    t.is_memory_optimized = 1 and

    s.no_recompute = 1

    for xml path('''')

    ));

    exec sp_executesql @SQL;

    Listing 4-9.

    Updating All Statistics with NORECOMPUTE=ON

    ```'
