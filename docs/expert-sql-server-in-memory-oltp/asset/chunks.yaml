  raw: '## Memory-Optimized Table Types and Variables


    SQL Server allows you to create memory-optimized table types. Table variables
    of these types are called memory-optimized table variables. In contrast to regular
    disk-based table variables, memory-optimized table variables live in memory only
    and do not utilize `tempdb`.


    Memory-optimized table variables provide great performance. They can be used as
    a replacement for disk-based table variables and, in some cases, temporary tables.
    Obviously, they have the same set of functional limitations as memory-optimized
    tables.


    Contrary to disk-based table types, you can define indexes on memory-optimized
    table types; however, similar to disk-based table variables, SQL Server does not
    maintain statistics on the indexes. Fortunately, as discussed, because of the
    nature of indexes on memory-optimized tables, cardinality estimation errors yield
    a much lower negative impact compared to those of disk-based tables.


    Note


    A statement-level recompile with `option (recompile)` allows SQL Server to estimate
    the number of rows in memory-optimized table variables. However, it does not provide
    SQL Server any information about data distribution there.


    SQL Server does not support the inline declaration of memory-optimized table variables.
    For example, the code shown in Listing [9-15](#A340879_2_En_9_Chapter.html#Par162)
    will not compile, and it will raise an error. The reason behind this limitation
    is that SQL Server compiles a DLL for every memory-optimized table type, which
    will not work in the case of inline declaration.


    ```

    declare

    @IDList table

    (

    ID int not null

    primary key nonclustered hash

    with (bucket_count=10000)

    )

    with (memory_optimized=on)

    Msg 319, Level 15, State 1, Line 91

    Incorrect syntax near the keyword ''with''. If this statement is a common table
    expression, an xmlnamespaces clause or a change tracking context clause, the previous
    statement must be terminated with a semicolon.

    Listing 9-15.

    (Nonfunctional) Inline Declaration of Memory-Optimized Table Variables

    ```


    You should define and use a memory-optimized table type instead, as shown in Listing
    [9-16](#A340879_2_En_9_Chapter.html#Par164).


    ```

    create type dbo.mtvIDList as table

    (

    ID int not null

    primary key nonclustered hash

    with (bucket_count=16384)

    )

    with (memory_optimized=on)

    go

    declare

    @IDList dbo.mtvIDList

    Listing 9-16.

    Creating a Memory-Optimized Table Type and Memory-Optimized Table Variable

    ```


    You can use memory-optimized table variables as table-valued parameters (TVP)
    in natively compiled and regular T-SQL modules. As with disk-based table-valued
    parameters, it is an efficient way to pass a batch of rows to a T-SQL routine.


    Note


    I will discuss the scenarios of passing a batch of rows to T-SQL routines and
    using memory-optimized table variables as the replacement of temporary tables
    in greater detail in Chapter [13](#A340879_2_En_13_Chapter.html).


    You can use memory-optimized table variables to imitate row-by-row processing
    using cursors, which are not supported in natively compiled stored procedures.
    Listing [9-17](#A340879_2_En_9_Chapter.html#Par168) illustrates an example of
    using a memory-optimized table variable to imitate a static cursor. Obviously,
    it is better to avoid cursors and use set-based logic if at all possible.


    ```

    create type dbo.MODataStage as table

    (

    ID int not null

    primary key nonclustered

    hash with (bucket_count=1024),

    Value int null

    )

    with (memory_optimized=on)

    go

    create proc dbo.CursorDemo

    with native_compilation, schemabinding, execute as owner

    as

    begin atomic

    with

    (

    transaction isolation level = snapshot

    ,language=N''English''

    )

    declare

    @tblCursor dbo.MODataStage

    ,@ID int = -1

    ,@Value int

    ,@RC int = 1

    /* Staging data in temporary table to imitate STATIC cursor */

    insert into @tblCursor(ID, Value)

    select ID, Value

    from dbo.MOData

    while @RC = 1

    begin

    select top 1 @ID = ID, @Value = Value

    from @tblCursor

    where ID > @ID

    order by ID

    select @RC = @@rowcount

    if @RC = 1

    begin

    /* Row processing */

    update dbo.MOData set Value = Value * 2 where ID = @ID

    end

    end

    end

    Listing 9-17.

    Using a Memory-Optimized Table Variable to Imitate a Cursor

    ```


    ## Summary


    SQL Server uses native compilation to minimize the processing overhead of the
    interpreted T-SQL language. It generates separate DLLs for every memory-optimized
    object and loads it into process memory.


    SQL Server supports native compilation of regular T-SQL stored procedures, scalar
    user-defined functions, and triggers. It compiles them into DLLs at creation time
    or, in the case of a server or database restart, at the time of the first call.
    SQL Server optimizes natively compiled modules for `UNKNOWN` values and embeds
    an execution plan into the code. That plan never changes unless the module is
    recompiled—either explicitly or after a SQL Server or database restart. You should
    recompile the module if data distribution has been significantly changed after
    initial compilation.


    You can recompile the module either by altering it or by calling the `sp_recompile`
    stored procedure. Altering the module performs recompilation in background, and
    it introduces less impact on the workload in the busy systems.


    While natively compiled modules are incredibly fast, they support a limited set
    of T-SQL language features. You can avoid such limitations by using interpreted
    T-SQL code that accesses memory-optimized tables through the Query Interop component
    of SQL Server. Almost all T-SQL language features are supported in this mode.


    Memory-optimized table types and memory-optimized table variables are the in-memory
    analog of table types and table variables. They live in memory only, and they
    do not use `tempdb`. You can use memory-optimized table variables as a staging
    area for the data and to pass a batch of rows to a T-SQL routine. Memory-optimized
    table types allow you to create indexes similar to memory-optimized tables.


    # 10. Data Storage, Logging, and Recovery


    This chapter discusses how In-Memory OLTP stores the data from durable memory-optimized
    tables on disk. It illustrates the concept of checkpoint file pairs used by SQL
    Server to persist the data, provides an overview of the checkpoint process in
    In-Memory OLTP, and discusses the recovery of memory-optimized data. It also explains
    why In-Memory OLTP logging is more efficient compared to disk-based tables.


    Finally, this chapter demonstrates how In-Memory OLTP performs table alteration
    and logs it in the log and checkpoint files.'
  trans: '

    # 内存优化的表类型与变量


    SQL Server 允许你创建内存优化的表类型。这些类型的表变量被称为**内存优化表变量**。与常规的基于磁盘的表变量不同，内存优化表变量仅存在于内存中，不使用
    `tempdb`。


    内存优化表变量提供了卓越的性能。它们可以用来替代基于磁盘的表变量，并且在某些情况下，可以替代临时表。显然，它们与内存优化表具有相同的功能限制集合。


    与基于磁盘的表类型相反，你可以在内存优化的表类型上定义索引；然而，类似于基于磁盘的表变量，SQL Server 不会在这些索引上维护统计信息。幸运的是，正如所讨论的，由于内存优化表上索引的特性，基数估计错误所带来的负面影响要比基于磁盘的表小得多。


    **注意**


    使用 `option (recompile)` 进行语句级重编译，可以让 SQL Server 估计内存优化表变量中的行数。但是，它不会为 SQL Server
    提供关于其中数据分布的任何信息。


    SQL Server 不支持内存优化表变量的内联声明。例如，代码清单 9-15 中所示的代码将无法编译，并会引发错误。此限制背后的原因是，SQL Server
    会为每个内存优化表类型编译一个 DLL，而这种情况下的内联声明是无效的。


    ```sql

    declare

    @IDList table

    (

    ID int not null

    primary key nonclustered hash

    with (bucket_count=10000)

    )

    with (memory_optimized=on)

    Msg 319, Level 15, State 1, Line 91

    Incorrect syntax near the keyword ''with''. If this statement is a common table
    expression, an xmlnamespaces clause or a change tracking context clause, the previous
    statement must be terminated with a semicolon.

    ```


    **代码清单 9-15.**

    （无效的）内存优化表变量的内联声明


    你应该定义并使用一个内存优化的表类型，如代码清单 9-16 所示。


    ```sql

    create type dbo.mtvIDList as table

    (

    ID int not null

    primary key nonclustered hash

    with (bucket_count=16384)

    )

    with (memory_optimized=on)

    go

    declare

    @IDList dbo.mtvIDList

    ```


    **代码清单 9-16.**

    创建内存优化表类型与内存优化表变量


    你可以在本机编译的和常规的 T-SQL 模块中，将内存优化表变量用作表值参数（TVP）。与基于磁盘的表值参数一样，这是将一批行传递给 T-SQL 例程的一种高效方式。


    **注意**


    我将在第 13 章中更详细地讨论将一批行传递给 T-SQL 例程的场景，以及使用内存优化表变量作为临时表替代品的场景。


    你可以使用内存优化表变量来模拟使用游标的逐行处理，而游标在本机编译的存储过程中是不被支持的。代码清单 9-17 展示了一个使用内存优化表变量模拟静态游标的例子。显然，如果可能的话，最好避免使用游标，而是采用基于集合的逻辑。


    ```sql

    create type dbo.MODataStage as table

    (

    ID int not null

    primary key nonclustered

    hash with (bucket_count=1024),

    Value int null

    )

    with (memory_optimized=on)

    go

    create proc dbo.CursorDemo

    with native_compilation, schemabinding, execute as owner

    as

    begin atomic

    (

    transaction isolation level = snapshot

    ,language=N''English''

    )

    declare

    @tblCursor dbo.MODataStage

    ,@ID int = -1

    ,@Value int

    ,@RC int = 1

    /* 将数据暂存到临时表中以模拟静态游标 */

    insert into @tblCursor(ID, Value)

    select ID, Value

    from dbo.MOData

    while @RC = 1

    begin

    select top 1 @ID = ID, @Value = Value

    from @tblCursor

    where ID > @ID

    order by ID

    select @RC = @@rowcount

    if @RC = 1

    begin

    /* 行处理 */

    update dbo.MOData set Value = Value * 2 where ID = @ID

    end

    end

    end

    ```


    **代码清单 9-17.**

    使用内存优化表变量模拟游标


    ## 小结


    SQL Server 使用本机编译来最小化解释型 T-SQL 语言的处理开销。它为每个内存优化对象生成单独的 DLL，并将其加载到进程内存中。


    SQL Server 支持常规 T-SQL 存储过程、标量用户定义函数和触发器的本机编译。它在创建时，或者在服务器或数据库重启的情况下，在第一次调用时将它们编译成
    DLL。SQL Server 针对 `UNKNOWN` 值优化了本机编译的模块，并将执行计划嵌入到代码中。该计划永远不会改变，除非模块被重新编译——无论是显式重新编译，还是在
    SQL Server 或数据库重启后重新编译。如果初始编译后数据分布发生了显著变化，你应该重新编译该模块。


    你可以通过修改模块或调用 `sp_recompile` 存储过程来重新编译模块。修改模块会在后台执行重新编译，在繁忙的系统中对工作负载的影响较小。


    虽然本机编译的模块速度极快，但它们支持的 T-SQL 语言特性有限。你可以通过使用解释型 T-SQL 代码来规避这些限制，这种代码通过 SQL Server
    的查询互操作组件访问内存优化表。在此模式下，几乎所有 T-SQL 语言特性都受支持。


    内存优化表类型和内存优化表变量是表类型和表变量的内存版本。它们仅存在于内存中，不使用 `tempdb`。你可以使用内存优化表变量作为数据的暂存区，并用于将一批行传递给
    T-SQL 例程。内存优化表类型允许你创建类似于内存优化表的索引。


    # 10. 数据存储、日志记录与恢复


    本章讨论内存 OLTP 如何将持久化内存优化表的数据存储到磁盘上。它阐述了 SQL Server 用于持久化数据的检查点文件对概念，概述了内存 OLTP 中的检查点过程，并讨论了内存优化数据的恢复。本章还解释了为什么与基于磁盘的表相比，内存
    OLTP 的日志记录更加高效。


    最后，本章演示了内存 OLTP 如何执行表更改，并将其记录在日志和检查点文件中。

    '
- fmt: '## Data Storage


    The data from durable memory-optimized tables is stored separately from disk-based
    tables. SQL Server uses a streaming mechanism to store it, which is based on the
    `FILESTREAM` technology. In-Memory OLTP and `FILESTREAM`, however, store data
    separately from each other, and you should have two separate filegroups: one for
    In-Memory OLTP and another for `FILESTREAM` data when the database uses both technologies.


    There is a conceptual difference between how disk-based data and memory-optimized
    data are stored. Disk-based tables store the single, most recent version of the
    row. Multiple updates of the row change the same row object multiple times. Deletion
    of the row removes it from the database. Finally, it is always possible to locate
    a data row in a data file when needed.


    In-Memory OLTP uses a completely different approach and persists multiple versions
    of the row on disk. Multiple updates of the data row generate multiple row objects,
    each of which has a different lifetime. SQL Server appends them to binary files
    stored in the In-Memory OLTP filegroup, which are called checkpoint files or,
    sometimes, checkpoint file pairs (`CFP`).


    It is impossible to predict where a data row is stored in checkpoint files. Nor
    are there use cases for such an operation. The only purposes these files serve
    are to provide data durability and to improve the performance of loading data
    into memory on database startup.


    As you can guess by the name, each checkpoint file pair consists of two files:
    a data file and a delta file. Each `CFP` covers operations for a range of Global
    Transaction Timestamp values, logging operations on the rows that have `BeginTs`
    values in this range. Every time you insert a row, it is saved into a data file.
    Every time you delete a row, the information about the deleted row is saved into
    a delta file. An update generates two operations, `INSERT` and `DELETE`, and it
    saves this information to both files. You will see how all those operations work
    in more detail later in the chapter.


    Figure [10-1](#A340879_2_En_10_Chapter.html#Fig1) provides a high-level overview
    of the structure of checkpoint file pairs.


    ![A340879_2_En_10_Fig1_HTML.jpg](A340879_2_En_10_Fig1_HTML.jpg)


    Figure 10-1. Data in checkpoint files


    As you will remember, memory-optimized tables may include additional internal
    tables that store data from off-row columns and columnstore index-related structures.
    Those internal tables are treated as separate objects (the rows in checkpoint
    files use `xtp_object_id` as the reference), and data from there is stored separately
    from the main in-row data rows.


    The data from LOB columns, such as `(n)varchar(max)` and `varbinary(max)`, is
    stored in another type of data file, called large data. The large data files have
    a similar structure as the regular data files; however, they can store more than
    8,060 bytes in the payload section of the rows. It is worth noting that the data
    from the row-overflow column tables is stored in the regular data files.


    The large data files are also used to store compressed columnstore segments. Compressed
    segment data is stored in the payload section of the row and referenced by the
    `segment_id` and `column_id` values. The delete bitmap (the deleted rows table),
    on the other hand, is stored separately, as the regular table in another checkpoint
    file pair.


    Finally, there is another type of checkpoint file called the root file. Root files
    are generated at each checkpoint event and are used to keep track of checkpoint
    files in the system.


    Figure [10-2](#A340879_2_En_10_Chapter.html#Fig2) shows an example of a database
    with 15 checkpoint files in different states. I will cover the states of checkpoint
    files in detail shortly. This is just an illustration; the actual databases will
    have at least 17 checkpoint files in various states.


    ![A340879_2_En_10_Fig2_HTML.jpg](A340879_2_En_10_Fig2_HTML.jpg)


    Figure 10-2. A database with multiple checkpoint file pairs


    Using a separate delta file to log deletions allows SQL Server to avoid modifications
    in data files and random I/O when rows are deleted. All checkpoint files are append-only.
    Moreover, when files are closed (again, more on this shortly), they become read-only.


    ### Checkpoint Files States


    Each checkpoint file can be in one of several states during its lifetime, as illustrated
    in Figure [10-3](#A340879_2_En_10_Chapter.html#Fig3).


    ![A340879_2_En_10_Fig3_HTML.jpg](A340879_2_En_10_Fig3_HTML.jpg)


    Figure 10-3. Checkpoint file states


    Let’s look at all of these states in more detail.


    #### PRECREATED State


    When you create the first In-Memory OLTP object in the database, including memory-optimized
    table types and nondurable memory-optimized tables, SQL Server generates 17 checkpoint
    files: 1 root and 16 empty files. This is done to minimize wait time when new
    files are needed.


    The initial size of the files is based on the amount of server memory, as shown
    in Table [10-1](#A340879_2_En_10_Chapter.html#Tab1). It is possible, however,
    that SQL Server changes the type of precreated file if needed. For example, a
    precreated large data file can be converted and used as a regular data file when
    required.


    Table 10-1. Initial Size of Checkpoint Files


    | Server Memory | Data File Size | Large Data File Size | Delta File Size | Root
    File Size |

    | --- | --- | --- | --- | --- |

    | Less than 16GB | 16MB | 8MB | 8MB | 2MB |

    | 16GB or more | 128MB | 64MB | 8MB | 16MB |


    SQL Server 2016 RTM supports large checkpoints, which is another configuration
    of checkpoint files and enables it when the server meets the following requirements:


    *   The server has 16 or more logical processors.

    *   The server has 128GB or greater memory.

    *   The server I/O system provides more than 200MB/sec throughput for the database.


    In this mode, SQL Server used 1GB/128MB data and delta files and defers the automatic
    checkpoint process to 12GB of log growth (more on this later). While this configuration
    may help to improve the performance of systems with a very high transaction log
    generation rate, it may lead to a longer recovery time on database startup. This
    behavior has been disabled in SQL Server 2016 CU1/SQL Server 2016 SP1.'
