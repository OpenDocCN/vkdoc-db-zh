    # 总结


    非聚集索引是内存 OLTP 引擎支持的第二类索引。它们具有相似的 SARGability 规则，与在基于磁盘的表上定义的 B-Tree 索引类似，但扫描方向与索引排序顺序相反的情况除外。


    在内部，非聚集索引使用一种无锁、无闩锁的 B-Tree 变体，称为 Bw-Tree。它由内部数据页和叶数据页组成，通过映射表相互引用。叶数据页为每个独立的键值存储一行数据，并包含一个指向具有相同键值的数据行链的指针。


    SQL Server 永远不会更新索引页。所有更改都通过与页面上单个 `INSERT` 和 `DELETE` 操作相对应的增量记录来引用。SQL Server
    会在需要时整合长的增量链，并对数据页进行拆分和合并。所有这些过程都会创建新的数据页，并将旧页标记为待垃圾回收。


    与基于磁盘的表上的索引一样，内存优化表上的索引也会引入数据修改开销。当你插入或更新数据时，SQL Server 必须维护多个索引行链。你应该避免定义过多的索引，并创建支持工作负载所需的最小索引集。


    哈希索引的性能在很大程度上取决于 `bucket_count` 值。在正确的 `bucket_count` 值下，哈希索引在点查找场景中的性能会优于非聚集索引。对于数据相对静态的目录实体，它们是一个不错的选择。另一方面，当点查找不可行和/或难以估计哈希索引中的桶数量时，非聚集索引是一个好的选择。


    # 6. 内存使用者与行外存储


    本章概述了内存 OLTP 如何为不同对象分配内存，并解释了行外列数据是如何存储的。它还说明了表中存在行外列对性能的影响，并解释了 SQL Server 如何选择需要存储在行外的列。


    ## 变量堆


    内存 OLTP 数据库对象从称为变量堆的独立内存堆中分配内存。变量堆是响应并跟踪来自各种数据库对象的内存分配请求的数据结构，它们可以在需要时增长或缩小大小。所有消耗内存的数据库对象都称为内存使用者。


    在内部，变量堆以不同大小的页面分配内存，其中 64KB 页面最为常见。每个页面为预定义大小的分配请求提供内存。例如，一个变量堆可以有两个 64KB 页面；一个处理
    64 字节分配，另一个处理 256 字节分配。


    让我们看一下代码清单 6-1 中所示的例子。该代码创建了带哈希索引的表，并使用 `sys.dm_db_xtp_memory_consumers` 视图分析了表的内存使用者。顾名思义，此视图提供有关数据库中内存使用者的信息。在本章和下一章中，你将看到几个与内存优化表相关的使用者，我将在第
    12 章详细讨论此视图。


    ```sql

    create table dbo.Varheaps

    (

    Col varchar(8000) not null

    constraint PK_Varheaps

    primary key nonclustered hash

    with (bucket_count=16384)

    )

    with (memory_optimized = on, durability = schema_only);

    select

    i.name as [Index], i.index_id, c.memory_consumer_id

    ,c.memory_consumer_type_desc as [mc type]

    ,c.memory_consumer_desc as [description], c.allocation_count as [allocs]

    ,c.allocated_bytes, c.used_bytes

    from

    sys.dm_db_xtp_memory_consumers c

    left outer join sys.indexes i on

    c.object_id = i.object_id and c.index_id = i.index_id

    where

    c.object_id = object_id(''dbo.Varheaps'');

    ```


    代码清单 6-1. 分析变量堆：表创建


    如图 6-1 所示，该表有两个内存使用者/变量堆。第一个类型为 `HASH` 的变量堆为哈希索引中的哈希表提供内存。该哈希索引有 16,384 个桶，使用了
    131,072 字节的内存，这些内存是在表创建时分配的。第二个类型为 `VARHEAP`、描述为“Table heap”的变量堆为数据行提供内存。由于表为空，它尚未分配任何内存。


    ![A340879_2_En_6_Fig1_HTML.jpg](img/A340879_2_En_6_Fig1_HTML.jpg)


    图 6-1. 创建表后的内存使用者


    让我们使用 `INSERT INTO dbo.Varheaps(Col) VALUES(''a'')` 语句向表中插入一行。如果你再次使用代码清单 6-1
    中的 `SELECT` 语句检查内存使用者，你将看到图 6-2 所示的结果。如图所示，表变量堆分配了一个 64KB 内存页，并提供了 40 字节来存储数据行对象。


    ![A340879_2_En_6_Fig2_HTML.jpg](img/A340879_2_En_6_Fig2_HTML.jpg)


    图 6-2. 插入第一行后的内存使用者


    现在，使用 `INSERT INTO dbo.Varheaps(Col) VALUES(''b'')` 语句插入另一行大小相同的数据。图 6-3 说明了第二次插入后的内存使用者状态。两行数据大小相同，因此表堆从同一个已分配的内存页为第二行提供了内存。


    ![A340879_2_En_6_Fig3_HTML.jpg](img/A340879_2_En_6_Fig3_HTML.jpg)


    图 6-3. 插入第二行后的内存使用者


    最后，使用 `INSERT INTO dbo.Varheaps(Col) VALUES(''ccccc'')` 语句插入另一行不同大小的数据。这行数据需要分配不同大小的内存，表变量堆分配了另一个
    64KB 内存页来处理这些分配。图 6-4 说明了这一点。


    ![A340879_2_En_6_Fig4_HTML.jpg](img/A340879_2_En_6_Fig4_HTML.jpg)


    图 6-4. 插入第三行后的内存使用者


    显然，为每一个可能的分配大小请求分配单独的内存页是低效的。在某些情况下，变量堆会从一个服务于更大尺寸分配的页面提供内存。例如，62 字节的内存分配可能来自一个服务
    64 字节分配的页面。即使内存使用者请求了更小的内存分配，该页面仍会为此分配保留并使用 64 字节内存。


    让我们看看实际运行情况，执行代码清单 6-2 中的代码。它插入了 `Col` 值从 2 个字符到 8000 个字符不等的数据行。


    ```sql

    declare

    @I int = 2

    while @I <= 8000

    begin

    insert into dbo.Varheaps(Col) values(replicate(''0'',@I));

    set @I += 1;

    end;

    ```


    代码清单 6-2. 分析变量堆：插入各种大小的行


    图 6-5 说明了变量堆的状态。它分配了 39,452,673 字节内存，相当于 602 个 64KB 内存页，尽管表中只存储了 8,000 种可能的数据行大小组合。


    ![A340879_2_En_6_Fig5_HTML.jpg](img/A340879_2_En_6_Fig5_HTML.jpg)


    图 6-5. 用数据填充表后的内存使用者


    按变量堆分离内存使用者允许你在每个对象的基础上跟踪内存使用情况。它还有助于 SQL Server 优化一些内部操作。例如，当你删除或更改表时，它允许垃圾回收过程更快地释放内存。


    这种架构还允许 SQL Server 以非常高效的方式执行表扫描操作来扫描变量堆页面。每个变量堆页面服务于相同大小的分配请求，因此很容易计算存储在页面上的每个对象的位置。与索引扫描操作相比，这使得表（变量堆）扫描操作更加高效。

    '
- fmt: '# In-Row and Off-Row Storage


    As you have already seen in this chapter, In-Memory OLTP uses separate `varheap`s
    for a hash table in hash indexes and data rows. Let’s look what happens when you
    add the nonclustered (range) index to the picture.


    ## 行内存储


    Listing 6-3 creates a table with one hash and one nonclustered index and provides
    the information about memory consumers afterward. It is using a slightly modified
    version of the `SELECT` statement you ran before, utilizing another view, `sys.memory_optimized_tables_internal_attributes`.
    This view returns the information about internal structures that are used by some
    table columns and indexes.


    ```sql

    create table dbo.MemoryConsumers

    (

    ID int not null

    constraint PK_MemoryConsumers

    primary key nonclustered hash with (bucket_count=1024),

    Name varchar(256) not null,

    index IDX_Name nonclustered(Name)

    )

    with (memory_optimized=on, durability=schema_only);

    select

    i.name as [Index], i.index_id, a.xtp_object_id, a.type_desc, a.minor_id

    ,c.memory_consumer_id, c.memory_consumer_type_desc as [mc type]

    ,c.memory_consumer_desc as [description], c.allocation_count as [allocs]

    ,c.allocated_bytes, c.used_bytes

    from

    sys.dm_db_xtp_memory_consumers c join

    sys.memory_optimized_tables_internal_attributes a on

    a.object_id = c.object_id and a.xtp_object_id = c.xtp_object_id

    left outer join sys.indexes i on

    c.object_id = i.object_id and

    c.index_id = i.index_id and

    a.minor_id = 0

    where

    c.object_id = object_id(''dbo.MemoryConsumers'');

    ```


    **Listing 6-3.**

    Analyzing Memory Consumers: In-Row Storage


    Figure 6-6 shows the output of the query. The `xtp_object_id` column represents
    the internal In-Memory OLTP `object_id`, which is different from the SQL Server
    `object_id`. The type of `USER_TABLE` indicates that the `varheap` belongs to
    the main table object.


    ![A340879_2_En_6_Fig6_HTML.jpg](A340879_2_En_6_Fig6_HTML.jpg)


    **Figure 6-6.**

    Memory consumer information (in-row storage)


    As you can see in Figure 6-6, the table has three memory consumers that have the
    same `xtp_object_id` value as the main table. The range index heap stores internal
    and leaf pages of nonclustered index. The hash index heap stores the hash table
    of the index. Finally, the table heap stores actual table rows. Figure 6-7 illustrates
    that.


    ![A340879_2_En_6_Fig7_HTML.jpg](A340879_2_En_6_Fig7_HTML.jpg)


    **Figure 6-7.**

    Table memory consumers


    ## 行外存储


    Let’s alter the table and add off-row storage columns, as shown in Listing 6-4.
    `RowOverflowCol` pushes the size of the row beyond 8,060 bytes, and it will be
    stored off-row.


    ```sql

    alter table dbo.MemoryConsumers add

    RowOverflowCol varchar(8000),

    LOBCol varchar(max);

    ```


    **Listing 6-4.**

    Adding Off-Row Columns


    Now, if you get the list of memory consumers using the query from Listing 6-3
    again, you would see the output shown in Figure 6-8. It is worth noting that the
    `xtp_object_id` column of the `USER_TABLE` objects has changed because the `ALTER
    TABLE` operation rebuilt the table and created the new table object internally.


    ![A340879_2_En_6_Fig8_HTML.jpg](A340879_2_En_6_Fig8_HTML.jpg)


    **Figure 6-8.**

    Memory consumers with off-row storage


    As you can see, both off-row columns introduce their own range index heap and
    table heap memory consumers. In addition, the LOB column adds a LOB page allocator
    memory consumer (more about that later). The `minor_id` column provides the `column_id`
    value in the table to which memory consumers belong. `varheap`s from both off-row
    columns have their own `xtp_object_id` values, which indicate that internally
    those columns are stored as the different objects.


    As you can guess from the output, SQL Server stores both row-overflow and LOB
    columns in the separate internal tables. The rows in those tables consist of an
    8-byte artificial primary key implemented as a nonclustered index and off-row
    column value. The main row references an off-row column through that artificial
    key, which is generated when a row is created. It is worth repeating that this
    reference is done though the artificial value rather than the memory pointer.


    This approach allows In-Memory OLTP to decouple off-row columns from the main
    row using a different lifetime for them. For example, if you update the main row
    data without touching off-row columns, SQL Server would not generate new versions
    of off-row column rows. Vice versa, when only off-row data is modified, the main
    row stays intact.


    ## LOB 存储


    In-Memory OLTP stores LOB data in the memory provided by the LOB page allocator.
    That consumer is not limited to 8,060-byte row allocations and can allocate a
    large amount of memory to store the data. The rows in the table heap of LOB columns
    contain pointers to the row data in the LOB page allocator.


    Let’s assume that you run several DML statements with the Global Transaction Timestamp
    values shown in Listing 6-5.


    ```sql

    -- Global Transaction Timestamp: 100

    insert into dbo.MemoryConsumers(ID, Name, RowOverflowCol, LobCol)

    values

    (1,''Ann'',''A1'',replicate(convert(varchar(max),''1''),100000))

    ,(2,''Bob'',''B1'',replicate(convert(varchar(max),''2''),100000));

    -- Global Transaction Timestamp: 110

    update dbo.MemoryConsumers set RowOverflowCol = ''B2'' where ID = 2;

    -- Global Transaction Timestamp: 120

    update dbo.MemoryConsumers set Name= ''Greg'' where ID = 2;

    -- Global Transaction Timestamp: 130

    update dbo.MemoryConsumers

    set LobCol = replicate(convert(varchar(max),''3''),100000)

    where ID = 1;

    -- Global Transaction Timestamp: 140

    delete from dbo.MemoryConsumers where ID = 1;

    ```


    **Listing 6-5.**

    Modifying Data in the Table


    Figure 6-9 illustrates the state of the data and links between the rows. For simplicity’s
    sake, it is omitting the hash table and nonclustered index structures in the main
    table along with internal pages of nonclustered indexes for off-row columns.


    ![A340879_2_En_6_Fig9_HTML.jpg](A340879_2_En_6_Fig9_HTML.jpg)


    **Figure 6-9.**

    In-row and off-row storage


    ## 总结


    SQL Server decides what columns should be stored off-row in the table creation
    phase based on the table schema. The `(n)varchar(max)` and `varbinary(max)` columns
    are always stored off-row as LOB columns. Moreover, the largest non-`(max)` variable-length
    column (or columns) will be stored as a row-overflow column (or columns) off-row
    when the data row size in the table definition exceeds 8,060 bytes.


    This behavior is different from disk-based tables where such a decision is made
    on a per-row basis based on the data row size. With disk-based tables, the data
    from LOB and large variable-length columns will be stored in-row when it fits
    into the data page. This is not the case with memory-optimized tables. Off-row
    columns are always stored off-row regardless of the size of the data. For example,
    a one-character string in the `varchar(max)` column will be stored as LOB data
    off-row even when the total row size is less than 8,060 bytes.'
