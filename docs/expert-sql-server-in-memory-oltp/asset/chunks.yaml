- fmt: 'Even though I maxed out the insert throughput, the CPU load on the server
    was very low, which clearly indicated that the CPU was not the bottleneck during
    the test. At the same time, the server suffered from the large number of latches,
    which were used to serialize access to the data pages in the buffer pool. Even
    though the wait time of each individual latch was relatively low, the total latch
    wait time was high because of the excessive number of them acquired every second.


    A further increase in the number of sessions did not help and, in fact, even slightly
    reduced the throughput. Figure [2-2](#A340879_2_En_2_Chapter.html#Fig2) illustrates
    performance counters with 300 concurrent sessions. As you can see, the average
    latch wait time has been increasing with the load.


    ![A340879_2_En_2_Fig2_HTML.jpg](A340879_2_En_2_Fig2_HTML.jpg)

    **Figure 2-2.** Performance counters when data was inserted into disk-based tables
    (300 concurrent sessions)


    You can confirm that latches were the bottleneck by analyzing the wait statistics
    collected during the test. Figure [2-3](#A340879_2_En_2_Chapter.html#Fig3) illustrates
    the output from the `sys.dm_os_wait_stats` view. You can see that latch waits
    are at the top of the list.


    ![A340879_2_En_2_Fig3_HTML.jpg](A340879_2_En_2_Fig3_HTML.jpg)

    **Figure 2-3.** Wait statistics collected during the test (insert into disk-based
    tables)


    The situation changed when I repeated the tests with the `dbo.InsertRequestInfo_Memory`
    stored procedure, which inserted data into memory-optimized tables through the
    Interop Engine. I maxed out the throughput with 300 concurrent sessions, which
    doubled the number of sessions from the previous test. In this scenario, SQL Server
    was able to handle about 74,000 batches/calls per second, which is more than a
    16 times increase in the throughput. A further increase in the number of concurrent
    sessions did not change the throughput; however, the duration of each call linearly
    increased as more sessions were added.


    Figure [2-4](#A340879_2_En_2_Chapter.html#Fig4) illustrates the performance counters
    during the test. As you see, there were no latches with memory-optimized tables,
    and the CPUs were fully utilized.


    ![A340879_2_En_2_Fig4_HTML.jpg](A340879_2_En_2_Fig4_HTML.jpg)

    **Figure 2-4.** Performance counters when data was inserted into memory-optimized
    tables through the Interop Engine


    As you can see in Figure [2-5](#A340879_2_En_2_Chapter.html#Fig5), the only significant
    wait in the system was `WRITELOG`, which is related to the transaction log write
    performance.


    ![A340879_2_En_2_Fig5_HTML.jpg](A340879_2_En_2_Fig5_HTML.jpg)

    **Figure 2-5.** Wait statistics collected during the test (insert into memory-optimized
    tables through the Interop Engine)


    The natively compiled `dbo.InsertRequestInfo_NativelyCompiled` stored procedure
    improved the situation even further. With 400 concurrent sessions, SQL Server
    was able to handle about 106,000 batches/calls per second, which translates to
    about 950,000 individual inserts per second.


    Figure [2-6](#A340879_2_En_2_Chapter.html#Fig6) illustrates the performance counters
    during test execution. Even with the increase in throughput, the natively compiled
    stored procedure put less load on the CPU than the Interop Engine, and disk performance
    became the clear bottleneck in this setup.


    ![A340879_2_En_2_Fig6_HTML.jpg](A340879_2_En_2_Fig6_HTML.jpg)

    **Figure 2-6.** Performance counters when data was inserted into memory-optimized
    tables using natively compiled stored procedure


    Waits in the wait statistics were similar to the previous test, with `WRITELOG`
    as the only significant wait in the system (see Figure [2-7](#A340879_2_En_2_Chapter.html#Fig7)).


    ![A340879_2_En_2_Fig7_HTML.jpg](A340879_2_En_2_Fig7_HTML.jpg)

    **Figure 2-7.** Wait statistics collected during the test (insert into memory-optimized
    tables using natively compiled stored procedure)


    You can confirm that disk performance was the limiting factor in this setup by
    running the same test with nondurable memory-optimized tables. You can do this
    by dropping and re-creating the database and creating the same set of memory-optimized
    tables using the `DURABILITY=SCHEMA_ONLY` option. No other code changes are required.


    Figure [2-8](#A340879_2_En_2_Chapter.html#Fig8) shows the performance counters
    collected during the test, with 400 concurrent sessions calling the `dbo.InsertRequestInfo_NativelyCompiled`
    stored procedure to insert data into nondurable tables. As you can see, in that
    scenario, I was able to fully utilize the CPU on the system after I removed the
    I/O bottleneck, which improved throughput by another 50 percent compared to the
    durable memory-optimized tables.


    ![A340879_2_En_2_Fig8_HTML.jpg](A340879_2_En_2_Fig8_HTML.jpg)

    **Figure 2-8.** Performance counters when data was inserted into nondurable memory-optimized
    tables using a natively compiled stored procedure


    Finally, it is worth noting that In-Memory OLTP uses different and more efficient
    logging, which leads to a much smaller transaction log footprint. Figure [2-9](#A340879_2_En_2_Chapter.html#Fig9)
    illustrates the log file write statistics collected during one minute of test
    execution using the `sys.dm_io_virtual_file_stats` DMF. The order of outputs in
    the figure corresponds to the order in which the tests were run: disk-based table
    inserts, inserts into memory-optimized tables through the Interop Engine, and
    natively compiled stored procedures.


    ![A340879_2_En_2_Fig9_HTML.jpg](A340879_2_En_2_Fig9_HTML.jpg)

    **Figure 2-9.** Transaction log write statistics during the tests


    As you see, in interop mode In-Memory OLTP inserted more than 16 times more data;
    however, it used just 7.6 times more space in the transaction log than with disk-based
    tables. The situation is even better with natively compiled stored procedures.
    Even though it wrote about 12 percent more to the log, it inserted about 30 percent
    more data compared to interop mode.


    **Note:** I will discuss In-Memory OLTP transaction logging in greater depth in
    Chapter [10](#A340879_2_En_10_Chapter.html).


    Obviously, different scenarios will lead to different results, and performance
    improvements would greatly depend on the hardware, database schema, and use case
    and workload in the system. However, with OLTP workloads, it is not uncommon to
    see an improvement of 3 to 5 times when you access memory-optimized tables through
    the Interop Engine and an improvement of 10 to 40 times with natively compiled
    stored procedures.


    More importantly, In-Memory OLTP allows you to improve the performance of the
    system by scaling up and upgrading hardware. For example, in this scenario, you
    can achieve better throughput by adding more CPUs and/or increasing I/O performance.
    This would be impossible to do with disk-based tables where latch contention becomes
    a bottleneck.'
