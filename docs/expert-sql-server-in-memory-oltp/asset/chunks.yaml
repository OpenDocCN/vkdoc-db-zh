  trans: '## 概述


    内存 OLTP 引擎已完全集成到 SQL Server 中，并随产品一起安装。在 SQL Server 2016 RTM 版本中，它是企业版的功能；然而，从
    SQL Server 2016 SP1 开始，它在所有版本中均可用。它在 Microsoft Azure SQL Database 的高级层中也可用。不过，您需要记住
    SQL Server 非企业版中存在的资源限制。


    每个使用内存 OLTP 对象的数据库都应创建一个独立的内存 OLTP 文件组。此文件组应放置在针对顺序 I/O 性能优化的磁盘阵列中。Microsoft Azure
    SQL Database 不需要也不允许您创建该文件组。


    您可以使用常规的 `CREATE TABLE` 语句创建内存优化表，通过将表标记为 `MEMORY_OPTIMIZED` 并指定表持久性选项。具有 `SCHEMA_AND_DATA`
    持久性的表中的数据会持久存储在磁盘上。具有 `SCHEMA_ONLY` 持久性的表不会持久存储数据，它们可用作内存中的临时表，提供极快的性能。


    您可以通过 `Interop Engine` 从解释型 T-SQL 访问内存优化表，或者从本地编译的模块访问。几乎所有 T-SQL 功能在解释模式下都受支持。另一方面，本地编译模块具有大量的限制。然而，与互操作引擎相比，它们可以带来显著的性能提升。


    ## 3. 内存优化表


    本章详细讨论内存优化表。它展示了内存优化表如何存储其数据以及 SQL Server 如何访问它们。它涵盖了内存优化表中数据行的格式，并讨论了本地编译的过程。


    最后，本章概述了 SQL Server 2016 中存在的内存优化表的限制。


    ### 基于磁盘的表与内存优化表


    内存优化表中的数据和索引结构与基于磁盘的表不同。在基于磁盘的表中，数据存储在 8KB 的数据页中，这些页按索引或堆的基准分组在八页的区中。每一页存储一个或多个数据行的数据。此外，当变长列或
    LOB 列的数据无法容纳在一个行内页上时，这些数据可以存储在行外的 `ROW_OVERFLOW` 和 `LOB` 数据页上。


    基于磁盘的表中的所有页和行都通过文件内偏移量引用，这是 `file_id`、数据页在文件中的偏移量/位置，以及在数据行的情况下，数据行在数据页上的行偏移量/位置的组合。


    最后，每个非聚集索引存储其索引键列数据的自己副本，通过行 ID（即聚集索引键值或堆表中行的物理地址（偏移量））引用主行。


    图 3-1 和 3-2 说明了这些概念。它们显示了在表上定义的聚集和非聚集索引 B 树。如您所见，页通过文件内偏移量链接。非聚集索引保留数据的单独副本，并通过聚集索引键值引用聚集索引。


    ![A340879_2_En_3_Fig2_HTML.jpg](img/A340879_2_En_3_Fig2_HTML.jpg)

    图 3-2. 基于磁盘的表上的非聚集索引


    ![A340879_2_En_3_Fig1_HTML.jpg](img/A340879_2_En_3_Fig1_HTML.jpg)

    图 3-1. 基于磁盘的表上的聚集索引


    每次需要访问页中的数据时，SQL Server 都会将该页的副本加载到内存中，缓存在缓冲池中。然而，缓冲池中数据页的格式和结构不会改变，页仍然使用文件内偏移量相互引用。称为
    `Buffer Manager` 的 SQL Server 组件管理缓冲池，它跟踪数据页在内存中的位置，将文件内偏移量转换为页结构的相应内存地址。


    考虑 SQL Server 需要扫描索引中多个数据页的情况。工作线程使用 `file_id` 和 `page_id` 从 `Buffer Manager`
    请求该页。`Buffer Manager` 则检查该页是否已缓存，并在必要时从磁盘读取。当页被读取和处理后，SQL Server 获取索引中下一页的地址并重复该过程。


    SQL Server 也可能需要访问多个页面才能读取单个数据行。这发生在行外存储的情况下，和/或当执行计划使用非聚集索引并发出键或 RID 查找操作，从聚集索引或堆获取数据时。


    在缓冲池中定位一个页的过程非常快；但是，它仍然会引入影响查询性能的开销。当数据页不在内存中且需要物理 I/O 操作时，性能影响要大得多。


    如您所知，SQL Server 通过闩锁保护数据页的内部一致性，防止多个会话同时修改数据页上的数据。获取和管理这些闩锁也会给系统增加开销。


    最后，SQL Server 使用锁来保护数据的事务一致性，在数据行、页和对象级别获取锁。这些锁可能会在系统中引入阻塞，并且它们也会增加与其管理相关的开销。


    内存 OLTP 引擎对内存优化表使用了一种完全不同的方法。除了非聚集索引中的 `B-Trees`（我将在第 5 章讨论），内存中的对象不使用数据页。数据行通过内存指针相互引用。每一行都知道链中下一行的内存地址，SQL
    Server 无需执行任何额外步骤即可定位它。'
- fmt: 'Every memory-optimized table has at least one index row chain to link rows
    together; therefore, every table must have at least one index defined. In the
    case of durable memory-optimized tables, there is the requirement of creating
    a primary key constraint, which can serve this purpose.


    To illustrate the concepts of row chains, let’s create the memory-optimized table
    shown in Listing [3-1](#A340879_2_En_3_Chapter.html#Par16).


    ```sql

    create table dbo.People

    (

    Name varchar(64) not null

    constraint PK_People

    primary key nonclustered

    hash with (bucket_count = 1024),

    City varchar(64) not null,

    index IDX_City nonclustered hash(City)

    with (bucket_count = 1024),

    )

    with (memory_optimized = on, durability = schema_only);

    ```


    Listing 3-1. Creating the Memory-Optimized Table


    This table has two hash indexes defined on the `Name` and `City` columns. I will
    not discuss hash indexes in depth in this chapter, but as a general overview,
    they consist of a hash table, which is an array of hash buckets, each of which
    contains a memory pointer to the data row. SQL Server applies a hash function
    to the index key columns, and the result of the function determines to which bucket
    a row belongs. All rows that have the same hash value and belong to the same bucket
    are linked together in a row chain; every row has a pointer to the next row in
    a chain.


    **Note**: I will discuss hash indexes in detail in Chapter [4](#A340879_2_En_4_Chapter.html).


    Figure [3-3](#A340879_2_En_3_Chapter.html#Fig3) illustrates this. Solid arrows
    represent pointers in the index on the `Name` column. Dotted arrows represent
    pointers in the index on the `City` column. For simplicity’s sake, let’s assume
    that the hash function generates a hash value based on the first letter of the
    string. Two numbers, displayed in each row, indicate the row lifetime, which I
    will explain in the next section of this chapter.


    ![A340879_2_En_3_Fig3_HTML.jpg](A340879_2_En_3_Fig3_HTML.jpg)


    Figure 3-3. Memory-optimized table with two hash indexes


    In contrast to disk-based tables, indexes on memory-optimized tables are not created
    as separate data structures but rather embedded as pointers in the data rows,
    which, in a nutshell, makes every index covering for in-row columns. The indexes,
    however, do not cover off-row column data, where data is stored in the separate
    internal tables. I will discuss them in depth in Chapter [6](#A340879_2_En_6_Chapter.html).


    **Note**: To be precise, nonclustered indexes and clustered columnstore indexes
    on memory-optimized tables introduce additional data structures in memory. I will
    discuss nonclustered indexes in detail in Chapter [5](#A340879_2_En_5_Chapter.html)
    and clustered columnstore indexes in Chapter [8](#A340879_2_En_8_Chapter.html).


    ## Introduction to Multiversion Concurrency Control


    As you already noticed in Figure [3-3](#A340879_2_En_3_Chapter.html#Fig3), every
    row in a memory-optimized table has two values, called `BeginTs` and `EndTs`,
    which define the lifetime of the row. A SQL Server instance maintains the Global
    Transaction Timestamp value, which is auto-incremented when the transaction commits
    and is unique for every committed transaction. `BeginTs` stores the Global Transaction
    Timestamp of the transaction that inserted a row, and `EndTs` stores the timestamp
    of the transaction that deleted a row. A special value called `Infinity` is used
    as `EndTs` for the rows that have not been deleted.


    The rows in memory-optimized tables are never updated. The update operation creates
    the new version of the row with the new Global Transaction Timestamp set as `BeginTs`
    and marks the old version of the row as deleted by populating the `EndTs` timestamp
    with the same value.


    When a new transaction starts, In-Memory OLTP assigns the logical start time for
    the transaction, which represents the Global Transaction Timestamp value when
    a transaction starts. It dictates what version of the rows is visible to the transaction.
    A transaction can see a row only when its logical start time (the Global Transaction
    Timestamp value when the transaction starts) is between the `BeginTs` and `EndTs`
    timestamps of the row.


    To illustrate this, let’s assume you ran the statement shown in Listing [3-2](#A340879_2_En_3_Chapter.html#Par26)
    and committed the transaction when the Global Transaction Timestamp value was
    100.


    ```sql

    update dbo.People

    set City = ''Cincinnati''

    where Name = ''Ann''

    ```


    Listing 3-2. Updating Data in the dbo.People Table


    Figure [3-4](#A340879_2_En_3_Chapter.html#Fig4) illustrates the data in the table
    after an update transaction has been committed. As you can see, you now have two
    rows with `Name=''Ann''` and different lifetimes. The new row has been appended
    to the row chain referenced by the hash bucket for the value of `A` in the index
    on the `Name` column. The hash index on the `City` column did not have any rows
    referenced by the `C` bucket; therefore, the new row becomes the first in the
    row chain referenced from that bucket.


    ![A340879_2_En_3_Fig4_HTML.jpg](A340879_2_En_3_Fig4_HTML.jpg)


    Figure 3-4. Data in the table after update


    Let’s assume you need to run a query that selects all the rows with `Name=''Ann''`
    in the transaction with the logical start time (Global Transaction Timestamp when
    the transaction started) of 110. SQL Server calculates the hash value for `Ann`,
    which is `A`, and finds the corresponding bucket in the hash index on the `Name`
    column. It follows the pointer from that bucket, which references a row with `Name=''Adam''`.
    This row has a `BeginTs` value of 10 and an `EndTs` value of `Infinity`; therefore,
    it is visible to the transaction. However, the `Name` value does not match the
    predicate, and the row is ignored.


    In the next step, SQL Server follows the pointer from the `Adam` index pointer
    array, which references the first `Ann` row. This row has a `BeginTs` value of
    100 and an `EndTs` value of `Infinity`; therefore, it is visible to the transaction
    and needs to be selected.


    As a final step, SQL Server follows the next pointer in the index. Even though
    the last row also has `Name=''Ann''`, it has an `EndTs` value of 100 and is invisible
    to the transaction.'
