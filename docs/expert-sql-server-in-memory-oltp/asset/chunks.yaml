    often leads to better I/O performance. However, it did not affect the test scenarios
    where I did not mix disk-based and In-Memory OLTP workloads in the same tests.


    As the first step, I created a set of disk-based tables that mimics the structure
    of memory-optimized tables created earlier in the chapter, and I created the stored
    procedure that inserts data into those tables. Listing [2-5](#A340879_2_En_2_Chapter.html#Par55)
    shows the code to accomplish this.


