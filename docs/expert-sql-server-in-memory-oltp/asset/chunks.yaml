  trans: '

    ### 支持的 T-SQL 功能


    原生编译模块最大的限制之一是它们只能访问内存优化表。若要联接来自内存优化表和磁盘表的数据，唯一的选择是使用解释型 T-SQL 和互操作引擎。


    还有一些其他限制需要牢记。原生编译代码不支持并行处理，并且始终具有串行执行计划。它也无法使用 `varheap Table Scan` 操作符访问和扫描表。表扫描是通过扫描其中一个索引的方式来实现的。


    SQL Server 2016 支持以下 T-SQL 功能和结构，可用于原生编译。


    #### 控制流


    支持以下控制流选项：


    *   `IF` 和 `WHILE`。

    *   使用 `SELECT` 和 `SET` 操作符为变量赋值。

    *   `RETURN`。

    *   `TRY`/`CATCH`/`THROW`（不支持 `RAISERROR`）。为获得更好的性能，建议为整个存储过程使用单个 `TRY`/`CATCH`
    块。

    *   只要 `DECLARE` 语句中包含初始化程序，就可以将变量声明为 `NOT NULL`。

    *   支持嵌套执行。例如，原生编译存储过程可以调用另一个原生编译过程或函数。

    *   SQL Server 2016 不支持 `CASE` 语句。但是，它将在 SQL Server 2017 中得到支持。


    #### 操作符


    支持以下操作符：


    *   比较运算符，例如 `=`、`<`、`<=`、`>`、`>=`、`<>` 和 `BETWEEN`。

    *   一元和二元运算符，例如 `+`、`-`、`*`、`/` 和 `%`。请注意，`+` 运算符同时支持数字和字符串。

    *   位运算符，例如 `&`、`|`、`∼`、`^`。

    *   逻辑运算符，例如 `AND`、`OR` 和 `NOT`。

    *   `IN`、`BETWEEN` 和 `EXISTS` 运算符。


    #### 查询功能区域


    支持以下查询功能区域函数：


    *   `SELECT`、`INSERT`、`UPDATE` 和 `DELETE` 操作符。

    *   `SELECT DISTINCT` 操作符。

    *   与 `INSERT`、`UPDATE` 和 `DELETE` 操作符一起使用的 `OUTPUT` 子句。

    *   支持 `CROSS JOIN`、`INNER JOIN`、`LEFT OUTER JOIN` 和 `RIGHT OUTER JOIN`。所有联接在内部都实现为
    `LOOP JOIN`。既不支持 `MERGE JOIN` 也不支持 `HASH JOIN`。最后，只能对 `SELECT` 操作符使用联接。

    *   `SELECT` 列表以及 `WHERE` 和 `HAVING` 子句中的表达式，只要它们使用支持的运算符，就得到支持。

    *   可以在 `FROM` 和 `WHERE` 子句中使用子查询，在 `SELECT` 子句中使用标量子查询。

    *   `IS NULL` 和 `IS NOT NULL`。

    *   支持 `GROUP BY`，但按字符串或二进制数据分组除外。

    *   `TOP` 和 `ORDER BY`。但是，不能在 `TOP` 子句中使用 `WITH TIES` 和 `PERCENT`。此外，当使用 `TOP
    <constant>` 时，`TOP` 操作符限制为 8,192 行，在联接的情况下甚至可能更少。你可以通过使用 `TOP <变量>` 方法来解决后一个限制。然而，就性能而言，它的效率较低。值得一提的是，`TOP
    (N) WITH TIES` 将在 SQL Server 2017 中得到支持。

    *   `INDEX`、`FORCESCAN`、`FORCESEEK`、`FORCE ORDER`、`INNER LOOP JOIN` 和 `OPTIMIZE
    FOR` 提示。


    #### 内置函数


    支持以下内置函数：


    *   支持所有数学函数。

    *   日期/时间函数：`CURRENT_TIMESTAMP`、`DATEADD`、`DATEDIFF`、`DATEFROMPARTS`、`DATEPART`、`DATETIME2FROMPARTS`、`DATETIMEFROMPARTS`、`DAY`、`EOMONTH`、`GETDATE`、`GETUTCDATE`、`MONTH`、`SMALLDATETIMEFROMPARTS`、`SYSDATETIME`、`SYSUTCDATETIME`
    和 `YEAR`。

    *   字符串函数：`LEN`、`LTRIM`、`RTRIM` 和 `SUBSTRING`。SQL Server 2017 还将支持 `TRIM`、`TRANSLATE`
    和 `CONCAT_WS`。

    *   错误函数：`ERROR_LINE`、`ERROR_MESSAGE`、`ERROR_NUMBER`、`ERROR_PROCEDURE`、`ERROR_SEVERITY`
    和 `ERROR_STATE`。

    *   安全函数：`IS_MEMBER`、`IS_ROLEMEMBER`、`IS_SRVROLEMEMBER`、`ORIGINAL_LOGIN`、`SESSION_USER`、`CURRENT_USER`、`SUSER_ID`、`SUSER_SID`、`SUSER_SNAME`、`SYSTEM_USER`、`SUSER_NAME`、`USER`、`USER_ID`、`USER_NAME`
    和 `CONTEXT_INFO`。

    *   `NEWID` 和 `NEWSEQUENTIALID`。

    *   `CAST` 和 `CONVERT`。但是，无法在非 Unicode 字符串和 Unicode 字符串之间进行转换。

    *   `ISNULL`。

    *   `SCOPE_IDENTITY`。

    *   `@@SPID`。

    *   可以在原生编译模块内使用 `@@ROWCOUNT`；但是，它的值在模块的开头和结尾都会重置为 0。

    '
- fmt: '### Atomic Blocks


    Natively compiled modules execute as atomic blocks, which is an “all or nothing”
    approach; either all statements in the module succeed or all of them fail.


    When a natively compiled module is called outside of the context of an active
    transaction, it starts a new transaction and either commits or rolls it back at
    the end of the execution.


    In cases where a module is called in the context of an active transaction, SQL
    Server creates a savepoint at the beginning of the module’s execution. In the
    case of an error in the module, SQL Server rolls back the transaction to the created
    savepoint. Based on the severity and type of the error, the transaction is either
    going to be able to continue and commit or become doomed and uncommittable.


    Let’s create a memory-optimized table and natively compiled stored procedure,
    as shown in Listing [9-5](#A340879_2_En_9_Chapter.html#Par98).


    ```sql

    create table dbo.MOData

    (

    ID int not null

    primary key nonclustered

    hash with (bucket_count=16),

    Value int null

    )

    with (memory_optimized=on, durability=schema_only);

    insert into dbo.MOData(ID, Value)

    values(1,1), (2,2);

    go

    create proc dbo.AtomicBlockDemo

    (

    @ID1 int not null

    ,@Value1 bigint not null

    ,@ID2 int

    ,@Value2 bigint

    )

    with native_compilation, schemabinding, execute as owner

    as

    begin atomic

    with

    (

    transaction isolation level = snapshot

    ,language=N''English''

    )

    update dbo.MOData set Value = @Value1 where ID = @ID1;

    if @ID2 is not null

    update dbo.MOData set Value = @Value2 where ID = @ID2;

    end;

    ```

    Listing 9-5.

    Atomic Blocks and Transactions: Object Creation


    At this point, the `dbo.MOData` table has two rows with the values `(1,1)` and
    `(2,2)`. As a first step, let’s start the transaction and call a stored procedure
    twice, as shown in Listing [9-6](#A340879_2_En_9_Chapter.html#Par100).


    ```sql

    begin tran

    exec dbo.AtomicBlockDemo 1, -1, 2, -2;

    exec dbo.AtomicBlockDemo 1, 0, 2, 999999999999999;

    ```

    Listing 9-6.

    Atomic Blocks and Transactions: Calling a Stored Procedure


    The first call of the stored procedure succeeds, while the second call triggers
    an arithmetic overflow error, as shown here:


    ```

    Msg 8115, Level 16, State 0, Procedure AtomicBlockDemo, Line 49

    Arithmetic overflow error converting bigint to data type int.

    ```


    You can check that the transaction is still active and committable with this select:
    `SELECT @@TRANCOUNT as [@@TRANCOUNT], XACT_STATE() as [XACT_STATE()]`. It returns
    the following results:


    ```

    @@TRANCOUNT XACT_STATE()

    ----------- ------------

    1           1

    ```


    If you commit the transaction and check the content of the table, you will see
    that the data reflects the changes caused by the first stored procedure call.
    Even though the first update statement from the second call succeeded, SQL Server
    rolled it back because the natively compiled stored procedure executed as an atomic
    block. You can see the data in the `dbo.MOData` table.


    ```

    ID          Value

    ----------- -----------

    1           -1

    2           -2

    ```


    As a second example, let’s trigger a critical error, which dooms the transaction,
    making it uncommittable. One such situation is a write/write conflict, when multiple
    sessions are trying to update the same rows. You can trigger it by executing the
    code in Listing [9-7](#A340879_2_En_9_Chapter.html#Par108) in two different sessions.


    ```sql

    begin tran

    exec dbo.AtomicBlockDemo 1, 0, null, null;

    ```

    Listing 9-7.

    Atomic Blocks and Transactions: Write/Write Conflict


    When you run the code in the second session, it triggers the following exception:


    ```

    Msg 41302, Level 16, State 110, Procedure AtomicBlockDemo, Line 13

    The current transaction attempted to update a record that has been updated since
    this transaction started. The transaction was aborted.

    Msg 3998, Level 16, State 1, Line 1

    Uncommittable transaction is detected at the end of the batch. The transaction
    is rolled back.

    ```


    If you check `@@TRANCOUNT` in the second session, you will see that SQL Server
    terminates the transaction.


    ```

    @@TRANCOUNT


    ```


    As you can see, when the atomic block executes in the context of the active transaction,
    severe errors in the atomic block roll back the entire transaction while noncritical
    errors roll back transaction to the savepoint that corresponds to the beginning
    of the block.


    Finally, it is worth mentioning that atomic blocks are an In-Memory OLTP feature
    and are not supported in T-SQL stored procedures.


    ## Optimization of Natively Compiled Modules


    Interpreted T-SQL stored procedures and other modules are compiled at the time
    of the first execution. Additionally, they can be recompiled after they are evicted
    from the plan cache and in a few other cases, such as outdated statistics, changes
    in database schema, or recompilations, which are explicitly requested in the code.


    This behavior is different from natively compiled modules, which are compiled
    at creation time. They are never automatically recompiled, only with the exception
    of a SQL Server or database restart. In these cases, recompilation occurs at the
    time of the first call. It is also worth noting that the `DBCC FREEPROCCACHE`
    command does not force recompilation of natively compiled modules.


    SQL Server does not sniff parameters at the time of compilation, optimizing statements
    for `UNKNOWN` values. It uses memory-optimized table statistics during optimization,
    which may or may not be up-to-date. The execution plan will not change until the
    module is recompiled, either explicitly or the after database restart.


    Fortunately, cardinality estimation errors have a smaller impact on the performance
    in the case of natively compiled modules. Contrary to disk-based tables, where
    such errors can lead to highly inefficient plans because of an incorrect index
    choice and, therefore, a high number of Key or RID Lookup operations, all indexes
    in memory-optimized tables reference the same data row and, in a nutshell, are
    covering indexes for in-row columns. Moreover, errors will not affect the choice
    of join strategy—the nested loop is the only join type supported in natively compiled
    modules.


    Outdated statistics at the time of compilation, however, can still lead to inefficient
    plans. One such example is a query with multiple predicates on indexed columns.
    SQL Server needs to know the index’s selectivity to choose the most efficient
    one. Another example is the incorrect choice of inner and outer input for the
    nested loop join, which you saw in Chapter [4](#A340879_2_En_4_Chapter.html).


    It is better to recompile natively compiled modules if the data in the table has
    significantly changed. You can do it in two different ways—either by altering
    the module or by using the `sp_recompile` stored procedure.


    The internal implementation and impact of those methods are different. The `sp_recompile`
    stored procedure just marks the natively compiled module as obsolete. The first
    call of the module will trigger the recompilation, similarly to what happens after
    database startup. The session that triggers recompilation and all other sessions
    calling the module during recompilation will be blocked until the compilation
    is completed.


    The module alteration, on the other hand, works differently. SQL Server recompiles
    the module in the background, allowing other sessions to use the old version of
    the code during this time. After compilation is completed, SQL Server waits for
    all sessions that are running the old code to finish and replaces the code in
    memory afterward. Even though there is still blocking during the final module
    replacement phase, there is no blocking during the compilation, which typically
    takes a significant amount of time. Therefore, module alteration introduces less
    impact on the workload compared to the `sp_recompile` call, and it is the recommended
    approach to alter the modules in busy systems.


    **Tip**


    Consider updating the statistics in the tables referenced from natively compiled
    modules before module recompile or alteration.'
