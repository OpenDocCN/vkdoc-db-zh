    \ Query Store Integration\n\nQuery Store is new SQL Server 2016 component that\
    \ collects execution plans and runtime statistics for the queries in the system.\
    \ Those statistics are persisted in the database, and they would survive database\
    \ restart or failover, which is different from the plan cache–based execution\
    \ statistics I just discussed.\n\nSimilarly to plan cache–based execution statistics,\
    \ Query Store does not collect the execution statistics of natively compiled modules\
    \ by default. You need to enable them with the `sys.sp_xtp_control_query_exec_stats`\
    \ system stored procedure. Consider the performance overhead this introduces,\
    \ and do not enable them unless you troubleshoot performance issues.\n\nFigure\
    \ [12-9](#A340879_2_En_12_Chapter.html#Fig9) shows a Query Store report that works\
    \ with the statements from natively compiled stored procedures. As you can see,\
    \ Management Studio provides a powerful and convenient set of tools that dramatically\
    \ simplify performance troubleshooting and tuning.\n\n![A340879_2_En_12_Fig9_HTML.jpg](A340879_2_En_12_Fig9_HTML.jpg)\n\
    \nFigure 12-9.\n\nThe “Top Resource Consuming Queries” report in Query Store Note\n\
    \nThe coverage of Query Store is outside the scope of this book. You can read\
    \ more about it at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store)\
    \ and in my Pro SQL Server Internals book.\n\n## Metadata Changes and Enhancements\n\
    \nIn-Memory OLTP introduces a large number of changes in catalog and data management\
    \ views.\n\n### Catalog Views\n\nThere are two In-Memory OLTP–related catalog\
    \ views in SQL Server 2016.\n\n#### sys.hash_indexes\n\nAs you can guess by the\
    \ name, the `sys.hash_indexes` view provides information about hash indexes defined\
    \ in the database. It is inherited from and has the same columns as the `sys.indexes`\
    \ view, adding one extra column called `bucket_count`. You can read about this\
    \ view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-hash-indexes-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-hash-indexes-transact-sql)\
    \ .\n\n#### sys.memory_optimized_tables_internal_attributes\n\nAs you already\
    \ know, every memory-optimized table may include additional internal tables to\
    \ store off-row column data, columnstore index internal structures, and a few\
    \ other objects. The `sys.memory_optimized_tables_internal_attributes` catalog\
    \ view provides information about those internal tables, and it consists of the\
    \ following columns:\n\n*   `object_id` is the ID of the user table. It is the\
    \ same for all internal tables that belong to the user table. The `object_id`\
    \ value does not change when you alter the table.\n*   `xtp_object_id` is internal\
    \ object ID of an internal table. This value may change when you re-create the\
    \ table object during table alteration.\n*   `minor_id` provides the `column_id`\
    \ value of the table column when the internal table stores off-row column data.\
    \ It is 0 in other cases.\n*   The `type` and `type_description` columns indicate\
    \ the type of internal table. The possible values are as follows:\n    *   `(0)`:\
    \ `DELETED_ROWS_TABLE` is the delete bitmap in a columnstore index.\n    *   `(1)`:\
    \ `USER_TABLE` is the main table structure that stores in-row data.\n    *   `(2)`:\
    \ `DICTIONARIES_TABLE` is the dictionaries for a columnstore index.\n    *   `(3)`:\
    \ `SEGMENTS_TABLE` is the compressed segments for a columnstore index.\n    *\
    \   `(4)`: `ROW_GROUPS_INFO_TABLE` is the metadata about compressed rowgroups\
    \ in a columnstore index.\n    *   `(5)`: `INTERNAL_OFF_ROW_DATA_TABLE` is a table\
    \ that stores off-row column data. As I already mentioned, `minor_id` provides\
    \ the `column_id` value of the off-row column, and it can be used in joins with\
    \ the `sys.columns` catalog view.\n    *   `(252)`: `INTERNAL_TEMPORAL_HISTORY_TABLE`\
    \ is an in-memory buffer that contains the hot tail of the disk-based history\
    \ table. The history rows are inserted into this internal table first, and then\
    \ they asynchronously move to the disk-based history table.\n\nYou can use `sys.memory_optimized_tables_internal_attributes`\
    \ with the `sys.dm_db_xtp_memory_consumers` view when you are analyzing memory\
    \ consumption of the memory-optimized tables in the system. You have already seen\
    \ this in action many times in the book.\n\nYou can read more about the `sys.memory_optimized_tables_internal_attributes`\
    \ view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-memory-optimized-tables-internal-attributes-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-memory-optimized-tables-internal-attributes-transact-sql)\
    \ ."
  trans: "\n# 代码清单 12-10. 分析存储过程语句执行统计信息\n\n```sql\nselect\nsubstring(qt.text\n,(qs.statement_start_offset/2)\
    \ + 1\n,(case qs.statement_end_offset\nwhen -1 then datalength(qt.text)\nelse\
    \ qs.statement_end_offset\nend - qs.statement_start_offset) / 2 + 1\n) as SQL\n\
    ,p.query_plan\n,qs.execution_count as [执行次数]\n,qs.total_worker_time as [总 CPU\
    \ 时间]\n,convert(int,qs.total_worker_time / qs.execution_count)\nas [平均 CPU 时间]\
    \ -- 单位：微秒\n,total_elapsed_time as [总耗时]\n,convert(int,qs.total_elapsed_time /\
    \ qs.execution_count)\nas [平均耗时] -- 单位：微秒\n,qs.creation_time as [缓存时间]\n,last_execution_time\
    \ as [最后执行时间]\n,qs.plan_handle\n,qs.total_logical_reads as [逻辑读取次数]\n,qs.total_logical_writes\
    \ as [逻辑写入次数]\nfrom\nsys.dm_exec_query_stats qs\ncross apply sys.dm_exec_sql_text(qs.sql_handle)\
    \ qt\ncross apply sys.dm_exec_query_plan(qs.plan_handle) p\nwhere -- 对于本机编译存储过程，此列为空\n\
    qs.plan_generation_num is null\norder by\n[平均 CPU 时间] desc\n```\n\n## 数据来自 sys.dm_exec_query_stats\
    \ 视图\n\n图 12-8 展示了代码清单 12-10 的输出结果。\n\n![A340879_2_En_12_Fig8_HTML.jpg](img/A340879_2_En_12_Fig8_HTML.jpg)\n\
    **图 12-8.** 来自 `sys.dm_exec_query_stats` 视图的数据\n\n> **注意**\n> 你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sys-sp-xtp-control-proc-exec-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sys-sp-xtp-control-proc-exec-stats-transact-sql)\
    \ 阅读更多关于 `sys.sp_xtp_control_proc_exec_stats` 存储过程的信息。关于 `sys.sp_xtp_control_query_exec_stats`\
    \ 存储过程的更多信息可在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sys-sp-xtp-control-query-exec-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sys-sp-xtp-control-query-exec-stats-transact-sql)\
    \ 获取。\n\n最后，值得注意的是，无论是 `DBCC FREEPROCCACHE` 命令还是 `ALTER DATABASE SCOPED CONFIGURATION\
    \ CLEAR PROCEDURE_CACHE` 命令，都不会从计划缓存中移除本机编译模块的执行统计信息。但是，当模块被重新编译时，统计信息会被移除。\n\n\
    ## 内存 OLTP 与查询存储集成\n\n查询存储是 SQL Server 2016 的新组件，用于收集系统中查询的执行计划和运行时统计信息。这些统计信息持久化在数据库中，在数据库重启或故障转移后依然存在，这与我刚才讨论的基于计划缓存的执行统计信息不同。\n\
    \n与基于计划缓存的执行统计信息类似，查询存储默认不收集本机编译模块的执行统计信息。你需要使用 `sys.sp_xtp_control_query_exec_stats`\
    \ 系统存储过程来启用它们。请考虑这带来的性能开销，除非正在排查性能问题，否则不要启用它们。\n\n图 12-9 展示了一个查询存储报告，该报告用于处理来自本机编译存储过程的语句。如你所见，Management\
    \ Studio 提供了一套强大且便捷的工具，极大地简化了性能故障排查和调优。\n\n![A340879_2_En_12_Fig9_HTML.jpg](img/A340879_2_En_12_Fig9_HTML.jpg)\n\
    **图 12-9.** 查询存储中的“消耗资源最多的查询”报告\n\n> **注意**\n> 查询存储的覆盖范围超出了本书的讨论范围。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store)\
    \ 以及我的《Pro SQL Server Internals》一书中阅读更多相关信息。\n\n## 元数据更改与增强\n\n内存 OLTP 在目录和数据管理视图中引入了大量更改。\n\
    \n### 目录视图\n\nSQL Server 2016 中有两个与内存 OLTP 相关的目录视图。\n\n#### sys.hash_indexes\n\
    \n顾名思义，`sys.hash_indexes` 视图提供了数据库中定义的哈希索引的信息。它继承自 `sys.indexes` 视图并具有相同的列，额外增加了一个名为\
    \ `bucket_count` 的列。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-hash-indexes-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-hash-indexes-transact-sql)\
    \ 阅读关于此视图的信息。\n\n#### sys.memory_optimized_tables_internal_attributes\n\n正如你已经知道的，每个内存优化表可能包含额外的内部表来存储行外列数据、列存储索引内部结构以及少数其他对象。`sys.memory_optimized_tables_internal_attributes`\
    \ 目录视图提供了关于这些内部表的信息，它包含以下列：\n\n*   `object_id` 是用户表的 ID。对于属于该用户表的所有内部表，此 ID 相同。当你更改表时，`object_id`\
    \ 值不会改变。\n*   `xtp_object_id` 是内部表的内部对象 ID。在表更改期间重新创建表对象时，此值可能会改变。\n*   `minor_id`\
    \ 在内部表存储行外列数据时，提供表列的 `column_id` 值。在其他情况下，其值为 0。\n*   `type` 和 `type_description`\
    \ 列指示内部表的类型。可能值如下：\n    *   `(0)`: `DELETED_ROWS_TABLE` 是列存储索引中的删除位图。\n    * \
    \  `(1)`: `USER_TABLE` 是存储行内数据的主表结构。\n    *   `(2)`: `DICTIONARIES_TABLE` 是列存储索引的字典。\n\
    \    *   `(3)`: `SEGMENTS_TABLE` 是列存储索引的压缩段。\n    *   `(4)`: `ROW_GROUPS_INFO_TABLE`\
    \ 是列存储索引中压缩行组的元数据。\n    *   `(5)`: `INTERNAL_OFF_ROW_DATA_TABLE` 是存储行外列数据的表。正如我已提到的，`minor_id`\
    \ 提供行外列的 `column_id` 值，可用于与 `sys.columns` 目录视图进行联接。\n    *   `(252)`: `INTERNAL_TEMPORAL_HISTORY_TABLE`\
    \ 是一个内存缓冲区，包含基于磁盘的历史表的热尾部。历史行首先插入到此内部表中，然后异步移动到基于磁盘的历史表。\n\n当你分析系统中内存优化表的内存消耗时，可以将\
    \ `sys.memory_optimized_tables_internal_attributes` 与 `sys.dm_db_xtp_memory_consumers`\
    \ 视图结合使用。你在本书中已经多次看到它的实际应用。\n\n你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-memory-optimized-tables-internal-attributes-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-memory-optimized-tables-internal-attributes-transact-sql)\
    \ 阅读更多关于 `sys.memory_optimized_tables_internal_attributes` 视图的信息。\n"
- fmt: '#### Changes in Other Catalog Views


    Other catalog view changes include the following:


    *   The `sys.tables` view has three new columns. The `is_memory_optimized` column
    indicates whether a table is memory-optimized. The `durability` and `durability_desc`
    columns indicate a durability mode for memory-optimized tables. The values are
    `(0)-SCHEMA_AND_DATA` and `(1)-SCHEMA_ONLY`.

    *   The `sys.indexes` view has a new possible value in the `type` and `type_description`
    columns, such as `(7)-NONCLUSTERED HASH`. Nonclustered Bw-Tree indexes use a value
    of `(2)-NONCLUSTERED` as the regular nonclustered B-Tree indexes defined on disk-based
    tables. Clustered columnstore indexes use a value of `(5) – CLUSTERED COLUMNSTORE`
    and an `index_id` value of 1.

    *   The `sys.sql_modules` and `sys.all_sql_modules` views have a new column called
    `uses_native_compilation`.

    *   The `sys.table_types` view has a new column called `is_memory_optimized`,
    which indicates whether a type represents a memory-optimized table variable.

    *   The `sys.data_spaces` view now has new `type` and `type_desc` values of `(FX)-MEMORY_OPTIMIZED_DATA_FILEGROUP`.


    ### Data Management Views


    In-Memory OLTP provides a large set of new data management views; they can be
    easily detected by the `xtp_` prefix in their names. The naming convention also
    provides information about their scope. The `sys.dm_xtp_*` views return instance-level
    information, and the `sys.dm_db_xtp_*` views provide database-level information.
    Let’s look at them in more detail, grouping them by area.


    #### Object and Index Statistics


    The following data management views provide index-related and data modification–related
    statistics:


    *   `sys.dm_db_xtp_object_stats` reports the number of rows affected by data modifications
    along with write conflicts and unique constraint violations on a per-object basis.
    You can use this view to analyze the volatility of the data from memory-optimized
    tables, correlating it with index usage statistics. As with disk-based tables,
    you can improve data modification performance by removing rarely used indexes
    defined on volatile tables. More information about this view is available at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-object-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-object-stats-transact-sql).

    *   `sys.dm_db_xtp_index_stats` returns information about index usage, including
    the number of row-chain scans, the number of rows scanned (`rows_touched`), the
    number of rows returned to the client (`rows_returned`), and data about expired
    rows. The large discrepancy between `rows_touched` and `rows_returned` may indicate
    an inefficient indexing strategy with queries performing the large range scans.
    For hash indexes, it may also indicate the large index row chains because of an
    insufficient number of buckets in the hash table. You can read about this view
    at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql).

    *   `sys.dm_db_xtp_nonclustered_index_stats` provides information about nonclustered
    (range) indexes, such as the number of pages in the index, the number of delta
    pages, and page split and merge statistics. You can read about this view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql).

    *   `sys.dm_db_xtp_hash_index_stats` provides information about hash indexes,
    such as the number of buckets in the index, the number of empty buckets, and row
    chain length information. This view is useful when you need to analyze the state
    of hash indexes and fine-tune their `bucket_count` allocations. You can read about
    this view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-hash-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-hash-index-stats-transact-sql).


    Listing [12-11](#A340879_2_En_12_Chapter.html#Par122) shows the script that you
    can use to find hash indexes with a potentially suboptimal `bucket_count` value.


    ```sql

    select

    s.name + ''.'' + t.name as [Table]

    ,i.name as [Index]

    ,stat.total_bucket_count as [Total Buckets]

    ,stat.empty_bucket_count as [Empty Buckets]

    ,floor(100. * empty_bucket_count / total_bucket_count)

    as [Empty Bucket %]

    ,stat.avg_chain_length as [Avg Chain]

    ,stat.max_chain_length as [Max Chain]

    from

    sys.dm_db_xtp_hash_index_stats stat

    join sys.tables t on

    stat.object_id = t.object_id

    join sys.indexes i on

    stat.object_id = i.object_id and

    stat.index_id = i.index_id

    join sys.schemas s on

    t.schema_id = s.schema_id

    where

    stat.avg_chain_length > 3 or

    stat.max_chain_length > 50 or

    floor(100. * empty_bucket_count /

    total_bucket_count) > 50

    ```

    *Listing 12-11. Obtaining Information About Hash Indexes with a Potentially Suboptimal
    bucket_count Value*


    #### Memory Usage Statistics


    I already discussed memory usage–related views in this and other chapters. However,
    as a quick overview, the views are as follows:


    *   `sys.dm_xtp_system_memory_consumers` reports information about system-level
    memory consumers in the system. More information about this view is available
    at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql).

    *   `sys.dm_db_xtp_table_memory_stats` provides memory usage statistics on a per-object
    level. You can read more at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-table-memory-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-table-memory-stats-transact-sql).

    *   `sys.dm_db_xtp_memory_consumers` provides information about database-level
    memory consumers. You can use this view to analyze per-index memory allocation
    in the system along with the memory consumed by internal tables. The documentation
    is available at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql).


    #### Transaction Management


    The following views provide transaction-related statistics in the system:


    *   `sys.dm_xtp_transaction_stats` reports statistics about transactional activity
    in the system since the last server restart. It includes the number of transactions,
    information about transaction log activity, and quite a few other metrics. More
    information about this view is available at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-transaction-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-transaction-stats-transact-sql).

    *   `sys.dm_db_xtp_transactions` provides information about currently active transactions
    in the system. We discussed this view in this chapter, and you can read more about
    it at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-transactions-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-transactions-transact-sql).'
