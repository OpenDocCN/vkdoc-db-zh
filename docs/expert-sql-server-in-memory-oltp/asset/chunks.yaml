- fmt: '## Thinking Outside the In-Memory Box


    You can benefit from In-Memory OLTP even without fully utilizing the technology
    and migrating the data into memory. Let’s look at several examples.


    ### Importing Batches of Rows from Client Applications


    In Chapter [13](#A340879_2_En_13_Chapter.html) of my book Pro SQL Server Internals,
    I compare the performance of several methods that inserted a batch of rows from
    the client application into the database. I looked at the performance of calling
    individual `INSERT` statements, encoding the data into XML and JSON and passing
    it to a stored procedure, using the .NET `SqlBulkCopy` class, and passing the
    data to a stored procedure utilizing table-valued parameters. Table-valued parameters
    became the clear winner of the tests, providing performance on par with the `SqlBulkCopy`
    implementation plus the flexibility of using stored procedures during the import.


    Listing [13-21](#A340879_2_En_13_Chapter.html#Par111) illustrates the database
    schema and stored procedure I used in the tests.


    ```sql

    create table dbo.Data

    (

    ID int not null,

    Col1 varchar(20) not null,

    Col2 varchar(20) not null,

    /* Seventeen more columns Col3 - Col19*/

    Col20 varchar(20) not null,

    constraint PK_DataRecords

    primary key clustered(ID)

    )

    go

    create type dbo.tvpData as table

    (

    ID int not null,

    Col1 varchar(20) not null,

    Col2 varchar(20) not null,

    /* Seventeen more columns: Col3 - Col19 */

    Col20 varchar(20) not null,

    primary key(ID)

    )

    go

    create proc dbo.InsertDataTVP

    (

    @Data dbo.tvpData readonly

    )

    as

    insert into dbo.Data

    (

    ID,Col1,Col2,Col3,Col4,Col5,Col6,Col7

    ,Col8,Col9,Col10,Col11,Col12,Col13,Col14

    ,Col15,Col16,Col17,Col18,Col19,Col20

    )

    select ID,Col1,Col2,Col3,Col4,Col5,Col6

    ,Col7,Col8,Col9,Col10,Col11,Col12

    ,Col13,Col14,Col15,Col16,Col17,Col18

    ,Col19,Col20

    from @Data;

    ```

    Listing 13-21.

    Importing a Batch of Rows: Table, TVP, and Stored Procedure


    Listing [13-22](#A340879_2_En_13_Chapter.html#Par113) shows the ADO.NET code that
    performed the import in the case of a table-valued parameter.


    ```csharp

    using (SqlConnection conn = GetConnection())

    {

    /* Creating and populating DataTable object with dummy data */

    DataTable table = new DataTable();

    table.Columns.Add("ID", typeof(Int32));

    for (int i = 1; i <= 20; i++)

    table.Columns.Add("Col" + i.ToString(), typeof(string));

    for (int i = 0; i < packetSize; i++)

    table.Rows.Add(i, "Parameter: 1"

    ,"Parameter: 2"

    /* Other columns */

    ,"Parameter: 20");

    /* Calling SP with TVP parameter */

    SqlCommand insertCmd =

    new SqlCommand("dbo.InsertDataTVP", conn);

    insertCmd.Parameters.Add("@Data", SqlDbType.Structured);

    insertCmd.Parameters[0].TypeName = "dbo.tvpData";

    insertCmd.Parameters[0].Value = table;

    insertCmd.ExecuteNonQuery();

    }

    ```

    Listing 13-22.

    Importing a Batch of Rows: Client Code


    You can improve performance even further by making the `dbo.tvpData` table type
    memory-optimized, which is transparent to the stored procedure and client code.
    Listing [13-23](#A340879_2_En_13_Chapter.html#Par115) shows the new type definition.


    ```sql

    create type dbo.tvpData as table

    (

    ID int not null,

    Col1 varchar(20) not null,

    Col2 varchar(20) not null,

    /* Seventeen more columns: Col3 - Col19 */

    Col20 varchar(20) not null,

    primary key nonclustered hash(ID)

    with (bucket_count=65536)

    )

    with (memory_optimized=on);

    ```

    Listing 13-23.

    Importing a Batch of Rows: Defining a Memory-Optimized Table Type


    The degree of performance improvement depends on the table schema, and it grows
    with the size of the batch. In my test environment, I got about 5 to 10 percent
    improvement on the small 5,000-row batches, 20 to 25 percent improvement on the
    50,000-row batches, and 45 to 50 percent improvement on the 500,000-row batches.


    Moreover, memory-optimized tables do not utilize `tempdb`, which may reduce `tempdb`
    page allocation contention (`PAGELATCH` waits) on very busy systems and improve
    performance even further. They, however, cannot spill to `tempdb`, which can be
    dangerous in the case of very large batches and with servers with an insufficient
    amount of memory. You should also define the `bucket_count` value for the indexes
    based on a typical batch size, as discussed in Chapter [4](#A340879_2_En_4_Chapter.html)
    of this book.


    **Note**


    You can download the test application from this book’s companion materials and
    compare the performance of the various import methods.'
  raw: '## Thinking Outside the In-Memory Box


    You can benefit from In-Memory OLTP even without fully utilizing the technology
    and migrating the data into memory. Let’s look at several examples.


    ### Importing Batches of Rows from Client Applications


    In Chapter [13](#A340879_2_En_13_Chapter.html) of my book Pro SQL Server Internals,
    I compare the performance of several methods that inserted a batch of rows from
    the client application into the database.I looked at the performance of calling
    individual `INSERT` statements, encoding the data into XML and JSON and passing
    it to a stored procedure, using the .NET `SqlBulkCopy` class, and passing the
    data to a stored procedure utilizing table-valued parameters. Table-valued parameters
    became the clear winner of the tests, providing performance on par with the `SqlBulkCopy`
    implementation plus the flexibility of using stored procedures during the import.


    Listing [13-21](#A340879_2_En_13_Chapter.html#Par111) illustrates the database
    schema and stored procedure I used in the tests.


    ```

    create table dbo.Data

    (

    ID int not null,

    Col1 varchar(20) not null,

    Col2 varchar(20) not null,

    /* Seventeen more columns Col3 - Col19*/

    Col20 varchar(20) not null,

    constraint PK_DataRecords

    primary key clustered(ID)

    )

    go

    create type dbo.tvpData as table

    (

    ID int not null,

    Col1 varchar(20) not null,

    Col2 varchar(20) not null,

    /* Seventeen more columns: Col3 - Col19 */

    Col20 varchar(20) not null,

    primary key(ID)

    )

    go

    create proc dbo.InsertDataTVP

    (

    @Data dbo.tvpData readonly

    )

    as

    insert into dbo.Data

    (

    ID,Col1,Col2,Col3,Col4,Col5,Col6,Col7

    ,Col8,Col9,Col10,Col11,Col12,Col13,Col14

    ,Col15,Col16,Col17,Col18,Col19,Col20

    )

    select ID,Col1,Col2,Col3,Col4,Col5,Col6

    ,Col7,Col8,Col9,Col10,Col11,Col12

    ,Col13,Col14,Col15,Col16,Col17,Col18

    ,Col19,Col20

    from @Data;

    Listing 13-21.

    Importing a Batch of Rows: Table, TVP, and Stored Procedure

    ```


    Listing [13-22](#A340879_2_En_13_Chapter.html#Par113) shows the ADO.NET code that
    performed the import in the case of a table-valued parameter.


    ```

    using (SqlConnection conn = GetConnection())

    {

    /* Creating and populating DataTable object with dummy data */

    DataTable table = new DataTable();

    table.Columns.Add("ID", typeof(Int32));

    for (int i = 1; i <= 20; i++)

    table.Columns.Add("Col" + i.ToString(), typeof(string));

    for (int i = 0; i < packetSize; i++)

    table.Rows.Add(i, "Parameter: 1"

    ,"Parameter: 2"

    /* Other columns */

    ,"Parameter: 20");

    /* Calling SP with TVP parameter */

    SqlCommand insertCmd =

    new SqlCommand("dbo.InsertDataTVP", conn);

    insertCmd.Parameters.Add("@Data", SqlDbType.Structured);

    insertCmd.Parameters[0].TypeName = "dbo.tvpData";

    insertCmd.Parameters[0].Value = table;

    insertCmd.ExecuteNonQuery();

    }

    Listing 13-22.

    Importing a Batch of Rows: Client Code

    ```


    You can improve performance even further by making the `dbo.tvpData` table type
    memory-optimized, which is transparent to the stored procedure and client code.
    Listing [13-23](#A340879_2_En_13_Chapter.html#Par115) shows the new type definition.


    ```

    create type dbo.tvpData as table

    (

    ID int not null,

    Col1 varchar(20) not null,

    Col2 varchar(20) not null,

    /* Seventeen more columns: Col3 - Col19 */

    Col20 varchar(20) not null,

    primary key nonclustered hash(ID)

    with (bucket_count=65536)

    )

    with (memory_optimized=on);

    Listing 13-23.

    Importing a Batch of Rows: Defining a Memory-Optimized Table Type

    ```


    The degree of performance improvement depends on the table schema, and it grows
    with the size of the batch. In my test environment, I got about 5 to 10 percent
    improvement on the small 5,000-row batches, 20 to 25 percent improvement on the
    50,000-row batches, and 45 to 50 percent improvement on the 500,000-row batches.


    Moreover, memory-optimized tables do not utilize `tempdb`, which may reduce `tempdb`
    page allocation contention (`PAGELATCH` waits) on very busy systems and improve
    performance even further. They, however, cannot spill to `tempdb`, which can be
    dangerous in the case of very large batches and with servers with an insufficient
    amount of memory. You should also define the `bucket_count` value for the indexes
    based on a typical batch size, as discussed in Chapter [4](#A340879_2_En_4_Chapter.html)
    of this book.


    Note


    You can download the test application from this book’s companion materials and
    compare the performance of the various import methods.'
  trans: '## 跳出内存局限思考


    即使没有充分利用该技术并将数据迁移到内存中，你仍然可以从内存 OLTP 中获益。让我们看几个示例。


    ### 从客户端应用程序批量导入行


    在我的《Pro SQL Server Internals》一书的第 13 章中，我比较了将客户端应用程序中的一批行插入数据库的几种方法的性能。我考察了调用单独的`INSERT`语句、将数据编码为
    XML 和 JSON 并传递给存储过程、使用.NET 的`SqlBulkCopy`类以及将数据传递给利用表值参数的存储过程的性能。表值参数成为测试中明显的赢家，提供了与`SqlBulkCopy`实现相当的性能，外加在导入过程中使用存储过程的灵活性。


    清单 13-21 展示了我在测试中使用的数据库模式和存储过程。


    ```sql

    create table dbo.Data

    (

    ID int not null,

    Col1 varchar(20) not null,

    Col2 varchar(20) not null,

    /* Seventeen more columns Col3 - Col19*/

    Col20 varchar(20) not null,

    constraint PK_DataRecords

    primary key clustered(ID)

    )

    go

    create type dbo.tvpData as table

    (

    ID int not null,

    Col1 varchar(20) not null,

    Col2 varchar(20) not null,

    /* Seventeen more columns: Col3 - Col19 */

    Col20 varchar(20) not null,

    primary key(ID)

    )

    go

    create proc dbo.InsertDataTVP

    (

    @Data dbo.tvpData readonly

    )

    as

    insert into dbo.Data

    (

    ID,Col1,Col2,Col3,Col4,Col5,Col6,Col7

    ,Col8,Col9,Col10,Col11,Col12,Col13,Col14

    ,Col15,Col16,Col17,Col18,Col19,Col20

    )

    select ID,Col1,Col2,Col3,Col4,Col5,Col6

    ,Col7,Col8,Col9,Col10,Col11,Col12

    ,Col13,Col14,Col15,Col16,Col17,Col18

    ,Col19,Col20

    from @Data;

    ```

    清单 13-21.

    批量导入行：表、TVP 和存储过程


    清单 13-22 展示了在使用表值参数的情况下执行导入的 ADO.NET 代码。


    ```csharp

    using (SqlConnection conn = GetConnection())

    {

    /* Creating and populating DataTable object with dummy data */

    DataTable table = new DataTable();

    table.Columns.Add("ID", typeof(Int32));

    for (int i = 1; i <= 20; i++)

    table.Columns.Add("Col" + i.ToString(), typeof(string));

    for (int i = 0; i < packetSize; i++)

    table.Rows.Add(i, "Parameter: 1"

    ,"Parameter: 2"

    /* Other columns */

    ,"Parameter: 20");

    /* Calling SP with TVP parameter */

    SqlCommand insertCmd =

    new SqlCommand("dbo.InsertDataTVP", conn);

    insertCmd.Parameters.Add("@Data", SqlDbType.Structured);

    insertCmd.Parameters[0].TypeName = "dbo.tvpData";

    insertCmd.Parameters[0].Value = table;

    insertCmd.ExecuteNonQuery();

    }

    ```

    清单 13-22.

    批量导入行：客户端代码


    通过将`dbo.tvpData`表类型设置为内存优化的，你可以进一步提升性能，这对存储过程和客户端代码是透明的。清单 13-23 展示了新的类型定义。


    ```sql

    create type dbo.tvpData as table

    (

    ID int not null,

    Col1 varchar(20) not null,

    Col2 varchar(20) not null,

    /* Seventeen more columns: Col3 - Col19 */

    Col20 varchar(20) not null,

    primary key nonclustered hash(ID)

    with (bucket_count=65536)

    )

    with (memory_optimized=on);

    ```

    清单 13-23.

    批量导入行：定义内存优化的表类型


    性能提升的程度取决于表模式，并且随着批量大小的增加而增长。在我的测试环境中，对于小批量的 5,000 行，我获得了大约 5%到 10%的提升；对于 50,000
    行的批量，提升了 20%到 25%；对于 500,000 行的批量，提升了 45%到 50%。


    此外，内存优化表不使用`tempdb`，这可以减少非常繁忙的系统上`tempdb`页面分配争用（`PAGELATCH`等待），并可能进一步提升性能。然而，它们不能溢出到`tempdb`，这在处理非常大的批量以及服务器内存不足的情况下可能是危险的。你还应该根据典型的批量大小为索引定义`bucket_count`值，如本书第
    4 章所述。


    **注意**


    你可以从本书的配套资料中下载测试应用程序，并比较各种导入方法的性能。'
- fmt: '### Using Memory-Optimized Objects as Replacements for Temporary and Staging
    Tables


    Memory-optimized tables and table variables can be used as replacements for disk-based
    temporary and staging tables. However, the level of performance improvement may
    vary, and it greatly depends on the table schema, workload patterns, and amount
    of data in the table.


    Let’s look at a few examples and first compare the performance of a memory-optimized
    table variable with disk-based temporary objects in a simple scenario that you
    will often encounter in OLTP systems. Listing [13-24](#A340879_2_En_13_Chapter.html#Par121)
    shows stored procedures that insert up to 256 rows into an object, scanning it
    afterward.


    ```sql

    create table dbo.TestRows

    (

    Id int not null

    primary key nonclustered hash

    with (bucket_count=512),

    )

    with (memory_optimized=on, durability=schema_only)

    go

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N4)

    insert into dbo.TestRows(Id)

    select Id from Ids;

    go

    create type dbo.InMemTV as table

    (

    Id int not null

    primary key nonclustered hash

    with (bucket_count=512),

    Placeholder char(255)

    )

    with (memory_optimized=on)

    go

    create proc dbo.TestInMemTempTables(@Rows int)

    as

    declare

    @ttTemp dbo.InMemTV

    ,@Cnt int

    insert into @ttTemp(Id)

    select Id

    from dbo.TestRows with (snapshot)

    where Id <= @Rows;

    select @Cnt = count(*) from @ttTemp;

    go

    create proc dbo.TestTempTables(@Rows int)

    as

    declare

    @Cnt int

    create table #TTTemp

    (

    Id int not null primary key,

    Placeholder char(255)

    )

    insert into #TTTemp    (Id)

    select Id

    from dbo.TestRows with (snapshot)

    where Id <= @Rows;

    select @Cnt = count(*) from #TTTemp;

    go

    create proc dbo.TestTempVars(@Rows int)

    as

    declare

    @Cnt int

    declare

    @ttTemp table

    (

    Id int not null primary key,

    Placeholder char(255)

    )

    insert into @ttTemp(Id)

    select Id

    from dbo.TestRows with (snapshot)

    where Id <= @Rows;

    select @Cnt = count(*) from @ttTemp;

    ```


    Listing 13-24.

    Comparing Performance of a Memory-Optimized Table Variable with Disk-Based Temporary
    Objects


    Table [13-4](#A340879_2_En_13_Chapter.html#Tab4) illustrates the execution time
    of the stored procedures called 10,000 times in the loop. I ran the tests in two
    environments, using Intel i7-4770HQ and AMD Opteron 6328 CPUs. As you can see,
    the memory-optimized table variable outperformed disk-based objects even in the
    system with a very fast PCI-e SSD drive. The level of performance improvements
    grew with the amount of data when the disk-based tables needed to allocate more
    data pages to store the data. This is also a good example that demonstrates that
    In-Memory OLTP is usually CPU-bound and benefits from the faster single-threaded
    performance provided by an Intel CPU.


    #### Performance Improvements with Memory-Optimized Table Variables


    Table 13-4.

    Execution Time of Stored Procedures (10,000 Executions)


    |   | 16 Rows | 64 Rows | 256 Rows |

    | --- | --- | --- | --- |

    | Memory-Optimized Table Variable (i7-4770HQ) | 843 ms | 1,016 ms | 1,850 ms |

    | Memory-Optimized Table Variable (AMD Opteron 6328) | 980 ms | 1,360 ms | 2,617
    ms |

    | Table Variable | 1,450 ms | 3,054 ms | 8,390 ms |

    | Temporary Table | 6,267 ms | 8,020 ms | 12,546 ms |


    It is also worth mentioning that performance improvements can be even more significant
    in systems with heavy concurrent `tempdb` loads because of the possible allocation
    maps contention.


    #### Cardinality Estimation Considerations


    You should remember that memory-optimized table variables do not keep index statistics,
    similar to disk-based table variables. The Query Optimizer generates execution
    plans with the assumption that they store just a single row. This cardinality
    estimation error can lead to highly inefficient plans, especially when with a
    large amount of data and joins.


    Similar to disk-based table variables, the statement-level recompile with `OPTION
    (RECOMPILE)` allows the Query Optimizer to obtain a number of rows in memory-optimized
    table variables. It does not provide the information about data distribution,
    however, because of the missing statistics histogram. This behavior may lead to
    inefficient execution plans even with a statement-level recompile involved.


    Let’s look at an example of cardinality estimations with and without a statement-level
    recompile by using the code from Listing [13-25](#A340879_2_En_13_Chapter.html#Par127).


    ```sql

    declare

    @InMemTV dbo.InMemTV;

    insert into @InMemTV(Id)

    select Id from dbo.TestRows with (snapshot);

    select count(*) from @InMemTV;

    select count(*) from @InMemTV option (recompile);

    select count(*) from @InMemTV where ID > 0 option (recompile);

    ```


    Listing 13-25.

    Memory-Optimized Table Variables and Statement-Level Recompile


    You can see the cardinality estimations for the Index Scan and Filter operators
    in Figure [13-5](#A340879_2_En_13_Chapter.html#Fig5). Without a statement-level
    recompile, SQL Server assumed that the memory-optimized table variable has just
    a single row. The statement-level recompile allowed SQL Server to obtain the information
    about the number of rows in the table. However, there is no information about
    data distribution in the table, and adding the `where` clause led to the cardinality
    estimation error. This behavior matches the behavior of disk-based table variables.


    ![A340879_2_En_13_Fig5_HTML.jpg](A340879_2_En_13_Fig5_HTML.jpg)


    Figure 13-5.

    Memory-optimized table variables and cardinality estimations


    #### Using Memory-Optimized Tables as ETL Staging Areas


    Memory-optimized tables can be used as the staging area for ETL processes. As
    a general rule, they outperform disk-based tables in `INSERT` performance, especially
    if the process imports the data from the multiple sources in parallel. The lock-
    and latch-free nature of memory-optimized tables will eliminate latch contention
    and will provide a significant increase of insert throughput. You already saw
    a similar example in Chapter [2](#A340879_2_En_2_Chapter.html) of the book.


    In-Memory OLTP will also reduce I/O and transaction log overhead. Moreover, in
    the case of nondurable memory-optimized tables, it will eliminate all disk and
    transaction log activity generated by the staging tables.


    The data modification overhead is different between technologies. As you already
    know, with memory-optimized tables, the `UPDATE` overhead depends on the number
    of indexes in the table. With disk-based tables, it depends on what columns were
    updated and the number of page splits it generated.


    Scan performance, on the other hand, greatly depends on the use case. In SQL Server
    2014, In-Memory OLTP did not support parallelism and varheap scans, which greatly
    affected scan performance. Traversing memory pointers is a fast operation, and
    it is significantly faster compared to getting a page from the buffer pool. However,
    on-page row access could be faster than traversing long memory pointer chains.
    In SQL Server 2014, it was possible that with the small data rows and large number
    of rows per page, disk-based tables outperformed memory-optimized tables during
    the scans, especially with the parallel execution plans for the queries.


    Fortunately, both limitations have been removed in SQL Server 2016, and in the
    majority of the cases, memory-optimized table scans would outperform B-Tree disk-based
    tables. Nevertheless, the results may vary based on the data, hardware, and ETL
    logic.


    You should also remember that parallelism and varheaps scans are supported only
    in query interop mode. You should compare the performance of natively compiled
    code responsible for ETL logic with the interop T-SQL implementation. Those limitations
    may offset the performance benefits provided by native compilation and make the
    interop approach more efficient in the case of large scans and complex ETL transformations.'
