    | `InsertCustomers_Row` | 77 ms | 333 ms | 640 ms |

    | `InsertCustomers_Batch` | 40 ms | 170 ms | 340 ms |

    | `InsertCustomers_NativelyCompiled` | 24 ms | 120 ms | 222 ms |


    ## Update 操作性能对比


    接下来，让我们比较`UPDATE`操作的性能。Listing [9-10](#A340879_2_En_9_Chapter.html#Par142)展示了一个本机编译存储过程，该过程更新`dbo.Customers`表中50%的行。


    ```sql

    create proc dbo.UpdateCustomers

    (

    @Placeholder char(100) not null

    )

    with native_compilation, schemabinding, execute as owner

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''English''

    )

    update dbo.Customers

    set Placeholder = @Placeholder

    where CustomerId % 2 = 0;

    end;

    ```

    Listing 9-10.

    本机编译存储过程，用于更新`dbo.Customers`表中的数据


    Table [9-2](#A340879_2_En_9_Chapter.html#Tab2)显示了`UpdateCustomers`存储过程和通过互操作引擎执行的相同`UPDATE`语句的执行时间。如你所见，本机编译存储过程几乎比互操作方法快五倍。


    Table 9-2.

    更新操作的执行时间


    | dbo.UpdateCustomers 本机编译存储过程 | 通过互操作引擎执行的 UPDATE 语句 |

    | --- | --- |

    | 33 ms | 154 ms |


    ## Delete 操作性能对比


    最后，让我们比较`DELETE`操作的性能。Listing [9-11](#A340879_2_En_9_Chapter.html#Par145)展示了一个从两个表中删除数据的本机编译存储过程。


    ```sql

    create proc dbo.DeleteCustomersAndOrders

    with native_compilation, schemabinding, execute as owner

