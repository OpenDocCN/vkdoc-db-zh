    ## Introduction


    The year 2016 was delightful for the SQL Server community—we put our hands on
    the new SQL Server build. This was quite a unique release; for the first time
    in more than ten years, the new version did not focus on specific technologies.
    In `SQL Server 2016`, you can find enhancements in all product areas, such as
    programmability, high availability, administration, and BI.


    I, personally, was quite excited about all the enhancements in `In-Memory OLTP`.
    I really enjoyed this technology in `SQL Server 2014`; however, it had way too
    many limitations. This made it a niche technology and prevented its widespread
    adoption. In many cases, the cost of the required system refactoring put the first
    release of `In-Memory OLTP` in the “it’s not worth it” category.


    I was incredibly happy that the majority of those limitations were removed in
    `SQL Server 2016`. There are still some, but they are not anywhere near as severe
    as in the first release. It is now possible to migrate systems into memory and
    start using the technology without significant code and database schema changes.


    I would consider this simplicity, however, a double-edged sword. While it can
    significantly reduce the time and cost of adopting the technology, it can also
    open the door to incorrect decisions and suboptimal implementations. As with any
    other technology, `In-Memory OLTP` has been designed for a specific set of tasks,
    and it can hurt the performance of the systems when implemented incorrectly. Neither
    is it a “set it and forget it” type of solution; you have to carefully plan for
    it before implementing it and maintain it after the deployment.


    `In-Memory OLTP` is a great tool, and it can dramatically improve the performance
    of systems. Nevertheless, you need to understand how it works under the hood to
    get the most from it. The goal for this book is to provide you with such an understanding.
    I will explain the internals of the `In-Memory OLTP` Engine and its components.
    I believe that knowledge is the cornerstone of a successful `In-Memory OLTP` implementation,
    and this book will help you make educated decisions on how and when to use the
    technology.


    If you read my Pro SQL Server Internals book (Apress, 2016), you will notice some
    familiar content from there. However, this book is a much deeper dive into `In-Memory
    OLTP`, and you will find plenty of new topics covered. You will also learn how
    to address some of `In-Memory OLTP`’s limitations and how to benefit from it in
    existing systems when full in-memory migration is cost-ineffective.


    Even though this book covers `In-Memory OLTP` in `SQL Server 2016`, the content
    should also be valid for the `SQL Server 2017` implementation. Obviously, check
    what technology limitations were lifted there.


    Finally, I would like to thank you for choosing this book and for your trust in
    me. I hope that you will enjoy reading it as much as I enjoyed writing it.


    ## How This Book Is Structured


    This book consists of 13 chapters and is structured in the following way:


    ### Chapters 1-2


    Chapter [1](#A340879_2_En_1_Chapter.html) and Chapter [2](#A340879_2_En_2_Chapter.html)
    are the introductory chapters, which will provide you with an overview of the
    technology and show how `In-Memory OLTP` objects work together.


    ### Chapters 3-5


    Chapter [3](#A340879_2_En_3_Chapter.html), Chapter [4](#A340879_2_En_4_Chapter.html),
    and Chapter [5](#A340879_2_En_5_Chapter.html) explain how `In-Memory OLTP` stores
    and works with data in memory.


    ### Chapter 6


    Chapter [6](#A340879_2_En_6_Chapter.html) shows how `In-Memory OLTP` allocates
    memory for internal objects and works with off-row columns. I consider this as
    one of the most important topics for successful in-memory OLTP migrations.


    ### Chapter 7


    Chapter [7](#A340879_2_En_7_Chapter.html) covers columnstore indexes that help
    you to support operational analytics workloads.


    ### Chapter 8


    Chapter [8](#A340879_2_En_8_Chapter.html) explains how `In-Memory OLTP` handles
    concurrency in a multi-user environment.


    ### Chapter 9


    Chapter [9](#A340879_2_En_9_Chapter.html) talks about native compilation and the
    programmability aspect of the technology.


    ### Chapter 10


    Chapter [10](#A340879_2_En_10_Chapter.html) demonstrates how `In-Memory OLTP`
    persists data on disk and how it works with the transaction log.


    ### Chapter 11


    Chapter [11](#A340879_2_En_11_Chapter.html) covers the `In-Memory OLTP` garbage
    collection process.


    ### Chapter 12


    Chapter [12](#A340879_2_En_12_Chapter.html) discusses best practices for `In-Memory
    OLTP` deployments and shows how to perform common database administration tasks
    related to `In-Memory OLTP`.


    ### Chapter 13


    Chapter [13](#A340879_2_En_13_Chapter.html) demonstrates how to address some of
    the `In-Memory OLTP` surface area limitations and how to benefit from `In-Memory
    OLTP` components without moving all the data into memory.


    ## Appendices


    The book also includes four appendixes.


    ### Appendix A


    Appendix A explains how `In-Memory OLTP` works with memory pointers in a multi-user
    environment.


    ### Appendix B


    Appendix B covers how the page splitting and merging processes are implemented.


    ### Appendix C


    Appendix C shows you how to analyze the state of checkpoint file pairs and navigates
    you through their lifetime.


    ### Appendix D


    Appendix D discusses SQL Server tools and wizards that can simplify `In-Memory
    OLTP` migration.'
