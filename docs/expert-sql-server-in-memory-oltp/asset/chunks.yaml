  trans: '

    ## 内存 OLTP 系统的设计考量


    两年前，我参与本书第一版的撰写时，本章约有一半内容专注于介绍那些有助于克服技术局限性的技术。这些局限性使得`内存 OLTP`在`SQL Server 2014`中仅能作为一种小众技术，因其高昂的实施和重构成本而未能被广泛采用。


    幸运的是，`SQL Server 2016`已移除了大部分限制。此外，从`SQL Server 2016 SP1`开始，`内存 OLTP`技术在`SQL Server`的`标准版`中也可用，这使您能够从该技术中获益，并在产品的多个版本间保持统一的系统架构和代码库。


    > **注意**

    > 请记住，非`企业版`的版本对其可利用的内存数量有所限制。例如，`标准版`每个数据库最多只能使用`32GB`的内存优化数据。


    尽管如此，采纳`内存 OLTP`技术是有成本的。您需要购买或升级到`SQL Server 2016`，花费时间学习该技术，并且如果是在迁移现有系统，还需要重构代码并测试变更。进行成本效益分析以确定`内存
    OLTP`带来的收益是否足以抵消其成本，这很重要。


    `内存 OLTP`绝非某种通过简单地切换开关并将数据移入内存就能提升服务器性能的神奇解决方案。它旨在解决一系列特定问题，例如在非常活跃的 OLTP 系统上的闩锁和锁争用。此外，它还有助于提升那些执行点查找和小范围扫描的小型、频繁执行的
    OLTP 查询的性能。


    对于并发活动少、数据量大、且查询需要执行大型扫描和复杂聚合的数据仓库系统，`内存 OLTP`的益处则较为有限。在某些情况下，通过将数据移入内存或在内存优化表上创建`列存储索引`，仍然可能实现性能提升；但是，通常使用基于磁盘的表配合`列存储索引`会获得更好的效果，尤其是在专用的数据仓库实现中。


    请记住，内存优化的`列存储索引`主要面向操作型分析场景，即需要针对热的 OLTP 数据运行不频繁的报告和分析查询。与基于磁盘的列式存储相比，其功能实现有所限制。内存优化的`列存储索引`无法进行分区，也不能像基于磁盘的聚集`列存储索引`那样成为表中的数据主副本。此外，`内存
    OLTP`不允许您`重建`或`重组``列存储索引`来减少增量存储区和删除位图的大小。


    您还应记住，内存优化表完全驻留在内存中，内存不足的情况将导致系统停机。对于非`企业版`而言，这一点尤其重要，因为您无法通过向服务器添加额外内存来随数据增长扩展系统。在许多情况下，通过采用数据分区策略来设计系统可能是有益的，即将近期的热数据保存在内存优化表中，而将历史冷数据保存在基于磁盘的表中。我将在本章后面讨论这种实现方式。


    正如您所知，`SQL Server 2016`已移除了`SQL Server 2014`中该技术存在的大部分限制。在许多情况下，您可以在无需更改系统模式和代码的情况下，将基于磁盘的表迁移到内存中。然而，有一些重要的注意事项和行为差异您需要牢记，并纳入决策考量。让我们来谈谈最重要的几个。


    ### 行外存储


    尽管`内存 OLTP`支持`LOB`和行溢出列，但其处理方式与存储引擎不同。对于基于磁盘的表，哪些列存储在行外是基于每行数据的行大小决定的；只要数据能装入
    8,060 字节的限制内，所有数据都会存储在行内。相比之下，对于内存优化表，该决定严格基于表模式做出；行外列数据将存储在独立的内部表中，无论您在那里存储多少数据，所有行都是如此。


    正如您从第[6]章所回忆的，过多的行外列会因`内存 OLTP`必须执行的内部表管理而导致严重的性能影响。此外，行外列会增加内存使用量；每个非空的行外值会增加`64+`字节的开销。您应极其谨慎地使用行外列，除非绝对必要，否则应避免在内存优化表中使用它们。


    常见的情况是，许多系统中的文本列被定义为`(n)varchar(max)`以防万一。这是一种不良实践，它会增加查询内存 grant，在系统中引入并发问题，并使索引管理复杂化。然而，这种开销并非总是显而易见，或者也许并非总是与行外数据的存在直接相关。


    如果您将这些表迁移到`内存 OLTP`，同时保持行外列不变，情况将会改变。这一决定可能会显著增加内存使用量，并减慢对这些表的查询速度。毕竟，从多个内部表查询或修改数据总是比处理单个表要慢。在迁移前，您需要牢记此行为并分析行外列的使用情况。在许多情况下，您可以将数据类型更改为`(n)varchar(N)`，并将这些列存储在行内。


    您还可以考虑实施垂直分区，将一些行外列存储在基于磁盘的表中，如代码清单[13-1]所示。`Description`列存储在基于磁盘的表中，而所有其他列则存储在内存优化表中。系统中的大多数用例不会处理产品描述，因此，在处理`dbo.ProductsInMem`表时，您可以利用原生编译。此外，将产品描述移至基于磁盘的表将允许您利用`全文搜索`功能，而该功能不支持内存优化表。


    ```

    create table dbo.ProductsInMem

    (

    ProductId int not null identity(1,1)

    constraint PK_ ProductsInMem

    primary key nonclustered hash

    with (bucket_count = 65536),

    ProductName nvarchar(64) not null,

    ShortDescription nvarchar(256) not null,

    index IDX_ProductsInMem_ProductName

    nonclustered(ProductName)

    )

    with (memory_optimized = on, durability = schema_and_data);

    create table dbo.ProductDescriptions

    (

    ProductId int not null,

    Description nvarchar(max) not null,

    constraint PK_ ProductDescriptions

    primary key clustered(ProductId)

    );

    代码清单 13-1.

    垂直分区

    ```


    您可以通过定义视图来向互操作`SELECT`查询隐藏某些实现细节，如代码清单[13-2]所示。您还可以在视图上定义`INSTEAD OF`触发器，并将其用作数据修改的目标；不过，直接更新表中的数据效率更高。


    ```

    create view dbo.Products(ProductId, ProductName,

    ShortDescription, Description)

    as

    select

    p.ProductId, p.ProductName, p.ShortDescription

    ,pd.Description

    from

    dbo.ProductsInMem p left outer join

    dbo.ProductDescriptions pd on

    p.ProductId = pd.ProductId

    代码清单 13-2.

    创建组合来自两个表数据的视图

    ```

    '
- fmt: 'As you should notice, the view is using an outer join. This allows SQL Server
    to perform join elimination when the client application does not reference any
    columns from the `dbo.ProductDescriptions` table while querying the view. For
    example, if you ran the query from Listing [13-3](#A340879_2_En_13_Chapter.html#Par20),
    you would see the execution plan shown in Figure [13-1](#A340879_2_En_13_Chapter.html#Fig1).
    As you can see, there are no joins in the plan, and the `dbo.ProductDescriptions`
    table is not accessed.


    ![A340879_2_En_13_Fig1_HTML.jpg](A340879_2_En_13_Fig1_HTML.jpg)


    Figure 13-1.

    Execution plan of the query


    ```

    select ProductId, ProductName

    from dbo.Products

    Listing 13-3.

    Query Against the View

    ```


    Unfortunately, it is impossible to define a `FOREIGN KEY` constraint for a disk-based
    table referencing a memory-optimized table; furthermore, you should support referential
    integrity in your code.


    Listing [13-4](#A340879_2_En_13_Chapter.html#Par23) shows the stored procedure
    that inserts a row into the `dbo.ProductDescriptions` table. The implementation
    looks trivial; however, there is one very important detail. The code checks for
    the existence of the `dbo.ProductsInMem` row using the `REPEATABLE READ` transaction
    isolation level. This forces In-Memory OLTP to build the read set for the transaction
    and validate that the selected `dbo.ProductsInMem` row exists at the time of transaction
    commit. The transaction would fail with a repeatable read validation failure if
    the other session deleted the product row in between the `SELECT` and `INSERT`
    statements.


    ```

    create proc dbo.InsertProductDescription

    (

    @ProductId int

    ,@Description nvarchar(max)

    )

    as

    begin

    set nocount on

    declare

    @Exists int

    set transaction isolation level read committed

    begin tran

    -- using REPEATABLE READ isolation level

    -- to build transaction read set

    select @Exists = ProductId

    from dbo.ProductsInMem with (repeatableread)

    where ProductId = @ProductId;

    if @Exists is null

    raiserror(''ProductId %d not found'',16,1,@ProductId);

    else

    insert into dbo.ProductDescriptions

    (ProductId, Description)

    values(1,@Description);

    commit;

    end

    Listing 13-4.

    Enforcing Referential Integrity Between Disk-Based and Memory-Optimized Tables:
    Inserting the Row into the Referencing Table

    ```


    Listing [13-5](#A340879_2_En_13_Chapter.html#Par25) shows how to perform the deletion
    of the `dbo.ProductsInMem` row. As you can see, the `SELECT` statement checks
    for the existence of the `dbo.ProductDescriptions` rows using the `SERIALIZABLE`
    isolation level, which places a key range shared lock and prevents other sessions
    from inserting a product description with the same `ProductId` value.


    ```

    declare

    @Cnt int

    ,@ProductId int = 1

    begin tran

    -- using SERIALIZABLE level to acquire the range lock

    select @Cnt = count(*)

    from dbo.ProductDescriptions with (serializable)

    where ProductId = @ProductId;

    if @Cnt > 0

    raiserror(''Referential Integrity Violation'',16,1);

    else

    delete from dbo.ProductsInMem with (snapshot)

    where ProductId = @ProductId;

    commit;

    Listing 13-5.

    Enforcing Referential Integrity Between Disk-Based and Memory-Optimized Tables:
    Deleting the Row from the Referenced Table

    ```


    You can use a similar approach when you need to enforce referential integrity
    in the opposite direction with memory-optimized tables referencing disk-based
    ones. In this case, however, the latter example (checking for the existence of
    the referencing rows in memory-optimized tables) would depend on serializable
    validation at the time of transaction commit rather than on locking.


    With all that being said, splitting the data into memory-optimized and disk-based
    tables would increase the complexity of the system along as well as its development
    cost. It may be beneficial when a table has a large number of off-row columns
    that may not be moved in-row and/or when you want to utilize technologies not
    supported by In-Memory OLTP (Full-Text Search, for example). However, in many
    cases, it may be more cost-effective to keep off-row columns in memory-optimized
    tables, especially if you have just a handful of them.


    ### Unsupported Data Types


    Even though In-Memory OLTP in SQL Server 2016 supports the majority of data types,
    there are still a few unsupported types, such as `xml`, `geometry`, `geography`,
    `hierarchyid`, `datetimeoffset`, `rowversion`, and `sql_variant`. Moreover, user-defined
    data types are not supported either.


    As the simplest workaround, you can store them either in binary or text format
    or, in some cases, shred them into relational data types when it is possible.


    Let’s look at an example. Listing [13-6](#A340879_2_En_13_Chapter.html#Par31)
    shows a disk-based table that stores event information from devices along with
    the locations where the events occurred.


    ```

    create table dbo.DeviceEvents

    (

    DeviceId int not null,

    EventTime datetime2(0) not null,

    Location geography not null,

    EventInfo xml not null,

    );

    create unique clustered index

    IDX_DeviceEvents_DeviceId_EventTime

    on dbo.DeviceEvents(DeviceId, EventTime);

    Listing 13-6.

    DeviceEvents Disk-Based Table

    ```


    Neither the `geography` nor `xml` data type is supported in In-Memory OLTP. You
    can address this by storing location information in a pair of `decimal` columns
    and using the `varbinary` column to store the `xml` data, as shown in Listing
    [13-7](#A340879_2_En_13_Chapter.html#Par33).


    ```

    create table dbo.DeviceEvents

    (

    DeviceId int not null,

    EventTime datetime2(0) not null,

    Lat decimal(9,6) not null,

    Long decimal(9,6) not null,

    EventInfo varbinary(max) not null,

    constraint PK_DeviceEvents

    primary key nonclustered(DeviceId, EventTime)

    )

    with (memory_optimized = on, durability = schema_and_data);

    Listing 13-7.

    DeviceEvents Memory-Optimized Table

    ```


    You can cast the data back to the `geometry` and `xml` data types and utilize
    the `XQuery` and geospatial methods when you access the table through the Interop
    Engine, as shown in Listing [13-8](#A340879_2_En_13_Chapter.html#Par35).


    ```

    declare

    @Loc geography =

    geography::Point(47.65600,-122.36000, 4326);

    ;with DeviceData(DeviceId, EventTime, Location, EventInfo)

    as

    (

    select

    DeviceId, EventTime

    ,geography::Point(Lat, Long, 4326) as Location

    ,convert(xml,EventInfo) as EventInfo

    from dbo.DeviceEvents

    )

    select

    DeviceId, EventTime

    ,Location.STDistance(@Loc) as Distance

    ,EventInfo.value(''/Event[1]/@Code'',''int'') as [Code]

    ,EventInfo.value(''/Event[1]/@Sensor1'',''varchar(3)'')

    as [Status]

    from DeviceData;

    Listing 13-8.

    Working with DeviceEvents Data

    ```


    Obviously, you can also split the data between memory-optimized and disk-based
    tables similarly to the `dbo.ProductsInMem` and `dbo.ProductDescriptions` tables
    from Listing [13-1](#A340879_2_En_13_Chapter.html#Par16). This may be beneficial
    if you need to utilize spatial or XML indexes for the data.


    Unfortunately, there is no built-in support for `rowversion` data type behavior.
    Fortunately, it is easy to implement this manually. Listing [13-9](#A340879_2_En_13_Chapter.html#Par38)
    shows how you can implement optimistic concurrency in the code similarly to a
    disk-based implementation that relies on the `rowversion` column.


    ```

    create table dbo.OptimisticConcurrency

    (

    ID int not null

    constraint PK_OptimisticConcurrency

    primary key nonclustered,

    Data int not null,

    RowVer uniqueidentifier not null

    constraint DEF_OptimisticConcurrency_RowVer

    default newid()

    )

    with (memory_optimized = on, durability = schema_only);

    -- Reading data from the client

    declare

    @Data int

    ,@OldRowVer uniqueidentifier

    select @Data = Data, @OldRowVer = RowVer

    from dbo.OptimisticConcurrency

    where ID = @ID;

    -- Saving data to the database

    update dbo.OptimisticConcurrency

    set

    Data = @NewData

    ,RowVer = newid()

    where ID = @ID and RowVer = @OldRowVer;

    if @@rowcount = 0

    raiserror(''Row with ID: %d has been modified by other session'',

    16,1,@ID);

    Listing 13-9.

    Implementing Optimistic Concurrency

    ```'
