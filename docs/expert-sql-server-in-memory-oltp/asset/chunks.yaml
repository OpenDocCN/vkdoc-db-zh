- fmt: 'As you can guess, log optimization requires transformation to be deterministic.
    The column values in the rows after the transformation should be the same as after
    the original alteration. Unfortunately, this is not always possible. Consider
    the situation when you add a new column to the table either as `identity` or with
    the `DEFAULT NEWID() WITH VALUES` constraint. This modification is nondeterministic.
    It is impossible to predict the values that are generated during alteration and
    transformation; therefore, log optimization would not work.


    When log optimization is impossible, SQL Server uses naïve logging and logs the
    table alteration as the set of individual inserts into the new table, as shown
    in Listing 10-8. The rows are transformed according to the new table schema during
    the process.


    ```

    create table NewVersionOfT(..);

    insert into NewVersionOfT(..)

    select and transform rows according to the new schema

    from T;

    drop table T;

    Listing 10-8.

    Naïve Logging: Alteration of Table T (Pseudocode)

    ```


    In-Memory OLTP treats that `INSERT SELECT` actions the same way as regular `INSERT`
    operations. It logs them in the transaction log, and the continuous checkpoint
    writes the rows to the checkpoint data files. As you can guess, this approach
    can introduce significant log overhead, especially in the case of the large tables.
    Moreover, table alterations that require naïve logging are single-threaded and
    can be significantly slower than multithreaded log-optimized alterations.


    Several other cases lead to naïve logging. The most notable is adding new LOB
    or row-overflow columns to the table. As you will know, off-row columns are stored
    in the separate internal tables, with the main rows referencing them through the
    artificial IDs. It is impossible to predict those ID values and use log optimization.
    Unfortunately, the alteration of off-row columns is also not log-optimized and
    any changes of off-row columns, including dropping them or bringing them back
    in-row, will lead to naïve logging.


    Finally, SQL Server uses naïve logging with any `DEFAULT WITH VALUES` constraint
    that uses system or user-defined functions even when functions are deterministic.


    Let’s look at the overhead of naïve logging. Listing 10-9 creates the new database
    and memory-optimized table and populates it with about 8GB of data. Finally, it
    performs a `CHECKPOINT` operation making sure that In-Memory OLTP populates checkpoint
    data files.


    ```

    create database [InMemoryOLTP2016_Ch10]

    on primary

    (

    name = N''Ch10''

    ,filename = N''C:\Data\Ch10.mdf''

    ),

    filegroup HKData CONTAINS MEMORY_OPTIMIZED_DATA

    (

    name = N''Ch10_HKData''

    ,filename = N''C:\Data\HKData\Ch10''

    )

    log on

    (

    name = N''Ch10_Log''

    ,filename = N''C:\Data\Ch10_log.ldf''

    )

    go

    create table dbo.AlterLogging

    (

    ID int not null

    constraint PK_AlterLogging

    primary key nonclustered,

    IntCol int not null,

    CharCol char(8000) not null

    )

    with (memory_optimized = on, durability = schema_and_data);

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N3 as t2) -- 1,048,576 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.AlterLogging(Id, IntCol, CharCol)

    select Id, Id, Replicate(''0'',8000)

    from Ids;

    checkpoint;

    Listing 10-9.

    Naïve Logging Overhead: Object Creation

    ```


    Listing 10-10 shows how to obtain the information about the file size and the
    used space in transaction log and checkpoint files.


    ```

    select

    convert(decimal(9,3),sum(file_size_in_bytes) / 1024\. / 1024)

    as [Checkpoint Files Size MB]

    ,convert(decimal(9,3),sum(file_size_used_in_bytes) / 1024\. / 1024)

    as [Checkpoint Files Size Used MB]

    from

    sys.dm_db_xtp_checkpoint_files;

    select

    name as [FileName]

    ,convert(decimal(9,3),size / 128.)

    as [Log Size MB]

    ,convert(decimal(9,3),fileproperty(name,''SpaceUsed'') / 128.)

    as [Log Size Used MB]

    from sys.database_files

    where name = ''InMemoryOLTP2016_Ch10_log'';

    Listing 10-10.

    Naïve Logging Overhead: Obtaining the Size of Transaction Log and Checkpoint Files

    ```


    Figure 10-13 illustrates the size of the transaction log and checkpoint files
    after the `INSERT` operation.


    ![A340879_2_En_10_Fig13_HTML.jpg](A340879_2_En_10_Fig13_HTML.jpg)

    *Figure 10-13. The size of the log and checkpoint files after INSERT*


    As the next step, let’s perform a table alteration by adding another `int` column
    to the table, as shown in Listing 10-11. As you know, this operation is log optimized,
    and it took 5.3 seconds in my environment.


    ```

    alter table dbo.AlterLogging add IntCol2 int;

    checkpoint;

    Listing 10-11.

    Naïve Logging Overhead: Altering the Table (Log Optimized Alteration)

    ```


    If you ran the queries from Listing 10-10 again, you would see the results shown
    in Figure 10-14. As you can see, the alteration does not significantly increase
    the size of the log and checkpoint files.


    ![A340879_2_En_10_Fig14_HTML.jpg](A340879_2_En_10_Fig14_HTML.jpg)

    *Figure 10-14. The size of the log and checkpoint files after log-optimized alteration*


    Finally, let’s run another `ALTER TABLE` statement adding a LOB column to the
    table. This operation does not support log optimization, and it requires naïve
    logging. Listing 10-12 shows the code to perform the action.


    ```

    alter table dbo.AlterLogging add LOBCol varchar(max);

    checkpoint;

    Listing 10-12.

    Naïve Logging Overhead: Altering the Table (Naïve Logging)

    ```


    As I already mentioned, a non-log-optimized alteration is the single-threaded
    process. The operation took 47.1 seconds in my environment, which is about nine
    times slower than the log-optimized alteration. It also adds significant transaction
    log overhead and doubles the size of checkpoint files on disk, as shown in Figure
    10-15.


    ![A340879_2_En_10_Fig15_HTML.jpg](A340879_2_En_10_Fig15_HTML.jpg)

    *Figure 10-15. The size of the log and checkpoint files after naïve logging alteration*


    Table alteration overhead is another reason why you should be extremely careful
    with off-row storage and LOB columns in memory-optimized tables.


    You can reduce the impact of table alterations by combining multiple similar schema
    changes into a single `ALTER TABLE` statement, as shown in Listing 10-13. Unfortunately,
    it is impossible to combine different actions in the same `ALTER TABLE` statement;
    for example, you cannot add and drop columns simultaneously.


    ```

    alter table dbo.TableA add

    Col3 int

    ,Col4 int

    ,constraint CHK_Columns_Positive

    check(Col3 > 0 and Col4 > 0);

    alter table dbo.TableB drop column Col1, Col2;

    Listing 10-13.

    Combining Multiple Actions into a Single ALTER TABLE Statement

    ```


    Finally, SQL Server 2016 SP1 introduces several major performance improvements
    that can dramatically reduce the time of table alteration. Moreover, adding the
    columnstore index becomes log optimized, which was not the case in SQL Server
    2016 RTM.'
