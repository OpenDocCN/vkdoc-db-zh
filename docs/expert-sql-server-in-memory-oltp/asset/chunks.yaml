    a similar example in Chapter [2](#A340879_2_En_2_Chapter.html) of the book.


    In-Memory OLTP will also reduce I/O and transaction log overhead. Moreover, in
    the case of nondurable memory-optimized tables, it will eliminate all disk and
    transaction log activity generated by the staging tables.


    The data modification overhead is different between technologies. As you already
    know, with memory-optimized tables, the `UPDATE` overhead depends on the number
    of indexes in the table. With disk-based tables, it depends on what columns were
    updated and the number of page splits it generated.


    Scan performance, on the other hand, greatly depends on the use case. In SQL Server
    2014, In-Memory OLTP did not support parallelism and varheap scans, which greatly
    affected scan performance. Traversing memory pointers is a fast operation, and
    it is significantly faster compared to getting a page from the buffer pool. However,
    on-page row access could be faster than traversing long memory pointer chains.
    In SQL Server 2014, it was possible that with the small data rows and large number
    of rows per page, disk-based tables outperformed memory-optimized tables during
    the scans, especially with the parallel execution plans for the queries.


    Fortunately, both limitations have been removed in SQL Server 2016, and in the
    majority of the cases, memory-optimized table scans would outperform B-Tree disk-based
    tables. Nevertheless, the results may vary based on the data, hardware, and ETL
    logic.


    You should also remember that parallelism and varheaps scans are supported only
    in query interop mode. You should compare the performance of natively compiled
    code responsible for ETL logic with the interop T-SQL implementation. Those limitations
    may offset the performance benefits provided by native compilation and make the
    interop approach more efficient in the case of large scans and complex ETL transformations.'
  trans: '

    ### 使用内存优化对象作为临时表和暂存表的替代方案


    内存优化表和表变量可以用作基于磁盘的临时表和暂存表的替代品。然而，性能提升的程度可能各不相同，这在很大程度上取决于表结构、工作负载模式以及表中的数据量。


    让我们看几个例子，首先在一个你经常在 OLTP 系统中遇到的简单场景中，比较内存优化表变量与基于磁盘的临时对象的性能。代码清单 13-24 展示了向对象插入最多
    256 行数据，然后扫描该对象的存储过程。


    ```sql

    create table dbo.TestRows

    (

    Id int not null

    primary key nonclustered hash

    with (bucket_count=512),

    )

    with (memory_optimized=on, durability=schema_only)

    go

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N4)

    insert into dbo.TestRows(Id)

    select Id from Ids;

    go

    create type dbo.InMemTV as table

    (

    Id int not null

    primary key nonclustered hash

    with (bucket_count=512),

    Placeholder char(255)

    )

    with (memory_optimized=on)

    go

    create proc dbo.TestInMemTempTables(@Rows int)

    as

    declare

    @ttTemp dbo.InMemTV

    ,@Cnt int

    insert into @ttTemp(Id)

    select Id

    from dbo.TestRows with (snapshot)

    where Id <= @Rows;

    select @Cnt = count(*) from @ttTemp;

    go

    create proc dbo.TestTempTables(@Rows int)

    as

    declare

    @Cnt int

    create table #TTTemp

    (

    Id int not null primary key,

    Placeholder char(255)

    )

    insert into #TTTemp    (Id)

    select Id

    from dbo.TestRows with (snapshot)

    where Id <= @Rows;

    select @Cnt = count(*) from #TTTemp;

    go

    create proc dbo.TestTempVars(@Rows int)

    as

    declare

    @Cnt int

    declare

    @ttTemp table

    (

    Id int not null primary key,

    Placeholder char(255)

    )

    insert into @ttTemp(Id)

    select Id

    from dbo.TestRows with (snapshot)

    where Id <= @Rows;

    select @Cnt = count(*) from @ttTemp;

    ```


    代码清单 13-24.

    比较内存优化表变量与基于磁盘的临时对象的性能


    表 13-4 展示了这些存储过程在循环中执行 10,000 次的运行时间。我在两种环境下进行了测试，分别使用 Intel i7-4770HQ 和 AMD Opteron
    6328 CPU。如你所见，即使在使用了非常快速的 PCI-e SSD 驱动器的系统中，内存优化表变量的性能也优于基于磁盘的对象。当基于磁盘的表需要分配更多数据页来存储数据时，性能提升的程度会随着数据量的增加而增大。这也是一个很好的例子，说明
    In-Memory OLTP 通常是受 CPU 限制的，并且受益于 Intel CPU 提供的更快的单线程性能。


    #### 内存优化表变量的性能提升


    表 13-4.

    存储过程的执行时间（10,000 次执行）


    |   | 16 行 | 64 行 | 256 行 |

    | --- | --- | --- | --- |

    | 内存优化表变量 (i7-4770HQ) | 843 毫秒 | 1,016 毫秒 | 1,850 毫秒 |

    | 内存优化表变量 (AMD Opteron 6328) | 980 毫秒 | 1,360 毫秒 | 2,617 毫秒 |

    | 表变量 | 1,450 毫秒 | 3,054 毫秒 | 8,390 毫秒 |

    | 临时表 | 6,267 毫秒 | 8,020 毫秒 | 12,546 毫秒 |


    同样值得一提的是，在 `tempdb` 负载很重的系统中，由于可能存在分配映射争用，性能提升可能会更加显著。


    #### 基数估算注意事项


    你需要记住，与基于磁盘的表变量类似，内存优化表变量不保留索引统计信息。查询优化器在生成执行计划时，会假设它们只存储单行数据。这种基数估算错误可能导致效率极低的计划，尤其是在涉及大量数据和连接时。


    与基于磁盘的表变量类似，使用 `OPTION (RECOMPILE)` 进行语句级重新编译，允许查询优化器获取内存优化表变量中的行数。然而，由于缺少统计信息直方图，它无法提供有关数据分布的信息。即使涉及语句级重新编译，这种行为也可能导致低效的执行计划。


    让我们通过代码清单 13-25 中的代码，看一下使用和不使用语句级重新编译时基数估算的例子。


    ```sql

    declare

    @InMemTV dbo.InMemTV;

    insert into @InMemTV(Id)

    select Id from dbo.TestRows with (snapshot);

    select count(*) from @InMemTV;

    select count(*) from @InMemTV option (recompile);

    select count(*) from @InMemTV where ID > 0 option (recompile);

    ```


    代码清单 13-25.

    内存优化表变量和语句级重新编译


    你可以在图 13-5 中看到索引扫描和筛选器操作的基数估算。如果没有语句级重新编译，SQL Server 会假设内存优化表变量只有一行。语句级重新编译允许
    SQL Server 获取表中行数的信息。但是，表中没有关于数据分布的信息，添加 `where` 子句导致了基数估算错误。这种行为与基于磁盘的表变量的行为一致。


    ![A340879_2_En_13_Fig5_HTML.jpg](img/A340879_2_En_13_Fig5_HTML.jpg)


    图 13-5.

    内存优化表变量和基数估算


    #### 使用内存优化表作为 ETL 暂存区


    内存优化表可用作 ETL 过程的暂存区。一般来说，它们在 `INSERT` 性能上优于基于磁盘的表，特别是当该过程从多个来源并行导入数据时。内存优化表的无锁和无闩锁特性将消除闩锁争用，并提供插入吞吐量的显著增加。你在本书第
    2 章中已经看到了类似的例子。


    In-Memory OLTP 还将减少 I/O 和事务日志开销。此外，对于非持久性内存优化表，它将消除暂存表产生的所有磁盘和事务日志活动。


    不同技术之间的数据修改开销有所不同。如你所知，对于内存优化表，`UPDATE` 开销取决于表中的索引数量。而对于基于磁盘的表，则取决于更新了哪些列以及由此产生的页拆分数量。


    另一方面，扫描性能在很大程度上取决于用例。在 SQL Server 2014 中，In-Memory OLTP 不支持并行度和可变堆扫描，这极大地影响了扫描性能。遍历内存指针是一项快速操作，与从缓冲池获取页面相比要快得多。然而，页面上的行访问可能比遍历长的内存指针链更快。在
    SQL Server 2014 中，对于较小的数据行和每页较多的行数，在扫描期间基于磁盘的表可能优于内存优化表，特别是在查询使用并行执行计划时。


    幸运的是，这两个限制在 SQL Server 2016 中已被移除，在大多数情况下，内存优化表扫描的性能将优于 B-Tree 磁盘表。尽管如此，结果可能因数据、硬件和
    ETL 逻辑而异。


    你还应该记住，并行度和可变堆扫描仅在查询互操作模式下受支持。你需要比较负责 ETL 逻辑的原生编译代码与互操作 T-SQL 实现的性能。这些限制可能会抵消原生编译带来的性能优势，并在涉及大型扫描和复杂
    ETL 转换的情况下使互操作方法更有效率。

    '
- fmt: 'With all that being said, you can achieve the best results by adjusting ETL
    processes to In-Memory OLTP. Consider the situation when you need to import data
    to a data warehouse using many flat files as the source. In-Memory OLTP will allow
    you to perform the import from multiple files in parallel without any latch contention
    overhead. Moreover, you can achieve better results by performing the processing
    and transformation of the data using large batches rather than doing it on per-file
    basis.


    Tip

    Consider using a separate staging database when you utilize In-Memory OLTP for
    ETL processes. This will allow you to avoid creating an In-Memory OLTP filegroup
    with checkpoint files in the main database.


    ## Using In-Memory OLTP as Session or Object State Store


    Modern software systems have become extremely complex. They consist of a large
    number of components and services responsible for various tasks, such as interaction
    with users, data processing, integration with other systems, reporting, and quite
    a few others. They must be scalable and redundant, they need to be able to handle
    load growth, and they need to be able to survive hardware failures and crashes.


    A common approach to solving scalability and redundancy issues is to design the
    systems in a way that permits you to deploy and run multiple instances of individual
    services. This allows you to add more servers and instances as the load grows
    and helps you survive hardware failures by distributing the load across other
    active servers. The services are usually implemented in a stateless way, and they
    don’t store or rely on any local data.


    Most systems, however, have data that needs to be shared across instances. For
    example, front-end web servers usually need to maintain web session states. Back-end
    processing services often need to have a shared cache with some data.


    ### Traditional Solutions and Their Limitations


    Historically, there were two approaches to address this issue. The first one was
    to use a dedicated storage/cache and host it somewhere in the system. Remember
    the old ASP.NET model that used either a SQL Server database or a separate web
    server to store session data? The problem with this approach was limited scalability
    and redundancy. Storing session data in web server memory is fast, but it is not
    redundant. A SQL Server database, on the other hand, can be protected, but it
    does not scale well under the load because of page latch contention and other
    issues.


    Another approach was to replicate the content of the cache across multiple servers.
    Each instance worked with a local copy of the cache, while another background
    process distributed the changes to the other servers. Several solutions on the
    market provide such a capability; some are open source, and others are commercial
    products.


    ### In-Memory OLTP as a Session Store


    If your system is using SQL Server as the database back end, you have an option
    of utilizing In-Memory OLTP as the session or object store in your system. This
    may not necessarily be the best option because of the extra load it adds to SQL
    Server; however, it may be one of the simplest approaches, especially if SQL Server
    has enough extra bandwidth to handle the load.


    In the nutshell, it looks similar to the ASP.NET SQL Server session-store model;
    however, In-Memory OLTP throughput and performance improvements address the scalability
    issues of the old disk-based solution. You can improve the performance even further
    by using nondurable memory-optimized tables. Even though the data will be lost
    when there is failover, this is acceptable in many cases.


    Listing 13-26 shows the table and natively compiled stored procedures that you
    can use to store and manipulate the data in the database. The client application
    calls the `LoadObjectFromStore` and `SaveObjectToStore` stored procedures to load
    and save the data. The `PurgeExpiredObjects` stored procedure removes expired
    rows from the table, and it can be called from a SQL Agent or other process based
    on the schedule.


    ### Implementation Considerations


    The serialized object data is stored in a `varbinary(max)` column. You can achieve
    slightly better performance by using an in-row `varbinary(8000)` data type if
    your objects will not exceed 8,000 bytes. Alternatively, you can use separate
    tables for large and small objects if needed. Consider, however, the development
    and maintenance overhead and the possibility of future object growth; it is entirely
    possible that the small performance improvements gained by eliminating the off-row
    internal table is not worth the effort.'
