  trans: '

    ### I/O 子系统


    一般规则是，应将内存优化 OLTP 文件组放置在专为顺序 I/O 性能优化的专用磁盘阵列上。在可能的情况下，最好使用基于闪存的存储。尽管基于 HDD 的磁盘阵列可以提供足够好的顺序
    I/O 性能来处理常规的内存优化 OLTP 工作负载，但它们在数据库启动期间可能成为瓶颈。如您所知，内存优化 OLTP 恢复过程具有高度的可扩展性，多个调度器并行地从不同的检查点文件加载数据。通常，I/O
    性能成为 SQL Server 恢复内存优化数据的速度限制因素。


    如果数据库在其服务级别协议（SLA）中具有较低的恢复时间目标（RTO）指标，则恢复性能变得更加重要。尽管包含内存优化 OLTP 文件组的数据库支持企业版的分段恢复，但
    SQL Server 必须将所有内存优化 OLTP 数据与 `PRIMARY` 文件组一起联机。您无法将内存优化 OLTP 文件组的恢复推迟到恢复过程的后期阶段。


    提高恢复性能的方法之一是在内存优化 OLTP 文件组中创建多个容器，将它们放置在使用不同 HBA 适配器的不同磁盘阵列中，如果是网络存储，则使用不同的访问路径。SQL
    Server 将检查点文件分布在各个容器上，并将从多个驱动器并行加载它们。


    清单 12-1 展示了如何创建一个在内存优化 OLTP 文件组中包含两个容器的数据库，分别将它们放置在 `H:\HKData` 和 `K:\HKData`
    文件夹中。


    ```

    create database HKMultiContainers

    on primary

    (

    name = N''HKMultiContainers''

    ,filename = N''M:\HKMultiContainers.mdf''

    ),

    filegroup HKData CONTAINS MEMORY_OPTIMIZED_DATA

    (

    name = N''HKMultiContainers_HKData1''

    ,filename = N''H:\HKData\HKMultiContainers''

    ),

    (

    name = N''HKMultiContainers_HKData2''

    ,filename = N''K:\HKData\HKMultiContainers''

    )

    log on

    (

    name = N''HKMultiContainers_Log''

    ,filename = N''L:\KMultiContainers_log.ldf''

    );

    ```

    清单 12-1. 在内存优化 OLTP 文件组中创建带有两个容器的数据库


    持续检查点通常不会给磁盘子系统带来极端负载。该过程利用流式 API，并使用有限数量的线程将数据写入磁盘。显然，实际需求将取决于内存优化 OLTP 事务的日志生成速率。


    然而，磁盘子系统应提供足够的带宽来并行处理合并过程和持续检查点。通常，如果检查点以给定的 IOPS 填充数据和差异文件，则 I/O 子系统应能处理三倍于该
    IOPS 的负载，以同时满足检查点和合并过程的需求。


    至于磁盘空间，Microsoft 建议您有足够的空间来容纳来自持久内存优化表的数据大小的四倍空间。显然，您需要将未来的数据增长纳入您的分析考量。


    ### 内存


    系统中需要有足够的内存来容纳所有内存优化表的数据。当 SQL Server 无法为新的行对象分配内存时，它会失败一个事务。通常，SQL Server 在 `INSERT`
    和 `UPDATE` 操作期间执行内存分配；但是，如果表包含非聚集索引，并且没有足够的内存来容纳新的差异记录或执行页面合并操作，`DELETE` 操作也可能失败。此外，如果表包含聚集列存储索引，`DELETE`
    操作可能需要为删除位图内部表中的新行分配内存。


    图 12-1 显示了一条指示内存不足情况的错误消息。


    ![A340879_2_En_12_Fig1_HTML.jpg](img/A340879_2_En_12_Fig1_HTML.jpg)

    图 12-1. 内存不足错误


    内存不足的情况本质上使内存优化 OLTP 数据变为只读。您仍然可以查询数据；但是，在问题解决之前，您无法执行任何数据修改操作。当发生这种情况时，检查垃圾回收过程的状态以确保它没有被旧的活动事务延迟是很有益的。我将在本章后面讨论如何检测此类事务。


    在许多情况下，解决内存不足情况的唯一选择是增加可供 SQL Server 和内存优化 OLTP 引擎使用的内存量。当这不可能时，特别是对于 SQL Server
    的标准版，您应该检测内存优化 OLTP 中最大的内存消耗者，并通过重构或将它们迁移到基于磁盘的表来减少其内存占用。我将在本章后面讨论如何检测它们。


    注意

    SQL Server 的标准版每个数据库的内存优化数据限制为 32GB。

    '
- fmt: '# Estimating the Amount of Memory for In-Memory OLTP


    Estimating the amount of memory required for memory-optimized tables is not a
    trivial task. As a rule of thumb, you can double the size of the data in the table
    as a basis for the estimation if the table does not have off-row columns. For
    a more accurate estimate, however, you should factor the memory requirements for
    several different components.


    *   Data rows consist of a 24-byte header, an index pointer array (which is 8
    bytes per index), and the payload (actual row data). For example, if your table
    has 100,000,000 rows and 3 indexes and each row is about 200 bytes on average,
    you will need `(24 + 3 * 8 + 200) * 100,000,000 = ∼23.1GB` of memory to store
    the row data without any versioning overhead included in this number.

    *   Hash indexes use 8 bytes per bucket. If a table has two hash indexes defined
    with 150,000,000 buckets each, SQL Server will create indexes with 268,435,456
    buckets, rounding the number of buckets specified in the index properties to the
    next power of 2. Those two indexes will use `268,435,456 * 2 * 8 = 4GB` of memory.

    *   Nonclustered index memory usage is based on the number of unique index keys
    and index key size. If a table has a nonclustered index with 25,000,000 unique
    key values and each key value on average uses 30 bytes, it would use `(30 + 8(pointer))
    * 25,000,000 = ∼906MB` of memory. You can ignore the page header and nonleaf pages
    in your estimation as their sizes are insignificant compared to the leaf-level
    row size.

    *   Off-row storage overhead depends on the number of not-null values stored in
    off-row internal tables. Each row-overflow value adds 64 bytes overhead, which
    consists of a 24-byte internal table row structure, two 8-byte range index pointers
    (on the leaf level and in-row), and 24 bytes to store the artificial off-row ID
    three times (in-row, off-row, and in the leaf level of internal table range index).
    In addition, LOB `max` columns introduce 16 extra bytes for the pointers to the
    `LOB PAGE ALLOCATOR` varheap where data is stored, and they have additional overhead
    of 32 bytes per every 8KB of data there. There is also additional memory to store
    internal range index data pages and a mapping table, but it is insignificant compared
    to the actual data. As the example, if a memory-optimized table has 10,000,000
    not-null values in a row-overflow `varchar(8000)` column, this will require `64
    * 10,000,000 = ∼610MB` of memory to store the data in an internal off-row table.

    *   Columnstore index memory requirements are hard to estimate. The data is usually
    heavily compressed and, as the rule of thumb, will consume just 10 to 15 percent
    of the uncompressed data size in the table. Remember, however, that In-Memory
    OLTP does not deallocate old versions of the rows from compressed rowgroups until
    about 90 percent of the rows there have expired. You should factor the volatility
    of the data into your analysis and fine-tune the `compression_delay` index option,
    deferring compression until the data becomes static.

    *   Row versioning memory estimation depends on the duration of the longest transactions
    and the average number of data modifications (inserts and updates) per second.
    For example, if some processes in a system have 10-second transactions and, on
    average, the system handles 10,000 data modifications per second, you can estimate
    `10 * 10,000 * 248(row size) = ∼24MB` of memory for row versioning storage.


    Obviously, these numbers outline the minimally required amount of memory. You
    should factor in future growth and changes in workload and reserve some additional
    memory just to be safe.


    As mentioned, it is also important to remember that In-Memory OLTP does not work
    in a vacuum; SQL Server needs to have enough memory available to the other components.
    Make sure to include this in your analysis.


    You should also remember In-Memory OLTP memory requirements when you design high
    availability or disaster recovery strategies in your system. It is not uncommon
    to see configurations where secondary or standby servers use less powerful hardware
    than the primary one. This approach helps to reduce hardware costs by allowing
    the system to operate with degraded performance in the event of a disaster.


    You should be extremely careful with such an approach if your database is using
    the In-Memory OLTP technology. An insufficient amount of memory on secondary servers
    could break synchronization between nodes or prevent you from restoring the database
    in the event of a disaster. The latter can also happen in scenarios when you want
    to bring the copy of the production database to development or testing environments
    where SQL Server does not have enough memory to accommodate In-Memory OLTP data
    from production.


    ## Administration and Monitoring Tasks


    Let''s look at several common In-Memory OLTP–related database administration and
    monitoring tasks.'
