    *   `sys.dm_db_xtp_nonclustered_index_stats` provides information about nonclustered
    (range) indexes, such as the number of pages in the index, the number of delta
    pages, and page split and merge statistics. You can read about this view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql)
    .

    *   `sys.dm_db_xtp_hash_index_stats` provides information about hash indexes,
    such as the number of buckets in the index, the number of empty buckets, and row
    chain length information. This view is useful when you need to analyze the state
    of hash indexes and fine-tune their `bucket_count` allocations. You can read about
    this view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-hash-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-hash-index-stats-transact-sql)
    .


    Listing [12-11](#A340879_2_En_12_Chapter.html#Par122) shows the script that you
    can use to find hash indexes with a potentially suboptimal `bucket_count` value.


    ```

    select

    s.name + ''.'' + t.name as [Table]

    ,i.name as [Index]

    ,stat.total_bucket_count as [Total Buckets]

    ,stat.empty_bucket_count as [Empty Buckets]

    ,floor(100\. * empty_bucket_count / total_bucket_count)

    as [Empty Bucket %]

    ,stat.avg_chain_length as [Avg Chain]

    ,stat.max_chain_length as [Max Chain]

    from

    sys.dm_db_xtp_hash_index_stats stat

    join sys.tables t on

    stat.object_id = t.object_id

    join sys.indexes i on

    stat.object_id = i.object_id and

    stat.index_id = i.index_id

    join sys.schemas s on

    t.schema_id = s.schema_id

    where

    stat.avg_chain_length > 3 or

    stat.max_chain_length > 50 or

    floor(100\. * empty_bucket_count /

    total_bucket_count) > 50

    Listing 12-11.

    Obtaining Information About Hash Indexes with a Potentially Suboptimal bucket_count
    Value

    ```


    #### Memory Usage Statistics


    I already discussed memory usage–related views in this and other chapters. However,
    as a quick overview, the views are as follows:


    *   `sys.dm_xtp_system_memory_consumers` reports information about system-level
    memory consumers in the system. More information about this view is available
    at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql)
    .

    *   `sys.dm_db_xtp_table_memory_stats` provides memory usage statistics on a per-object
    level. You can read more at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-table-memory-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-table-memory-stats-transact-sql)
    .

    *   `sys.dm_db_xtp_memory_consumers` provides information about database-level
    memory consumers. You can use this view to analyze per-index memory allocation
    in the system along with the memory consumed by internal tables. The documentation
    is available at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql)
    .


    #### Transaction Management


    The following views provide transaction-related statistics in the system:


    *   `sys.dm_xtp_transaction_stats` reports statistics about transactional activity
    in the system since the last server restart. It includes the number of transactions,
    information about transaction log activity, and quite a few other metrics. More
    information about this view is available at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-transaction-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-transaction-stats-transact-sql)
    .

    *   `sys.dm_db_xtp_transactions` provides information about currently active transactions
    in the system. We discussed this view in this chapter, and you can read more about
    it at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-transactions-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-transactions-transact-sql)
    .'
  trans: '#### 其他目录视图的变更


    其他目录视图的变更包括以下内容：


    *   `sys.tables` 视图新增了三列。`is_memory_optimized` 列指示表是否为内存优化表。`durability` 和 `durability_desc`
    列指示内存优化表的持久性模式。其值为 `(0)-SCHEMA_AND_DATA` 和 `(1)-SCHEMA_ONLY`。

    *   `sys.indexes` 视图的 `type` 和 `type_description` 列中新增了一个可能的值，例如 `(7)-NONCLUSTERED
    HASH`。非聚集 Bw-Tree 索引使用的值为 `(2)-NONCLUSTERED`，与定义在基于磁盘的表上的常规非聚集 B-Tree 索引相同。聚集列存储索引使用的值为
    `(5) – CLUSTERED COLUMNSTORE`，并且 `index_id` 值为 1。

    *   `sys.sql_modules` 和 `sys.all_sql_modules` 视图新增了一个名为 `uses_native_compilation`
    的列。

    *   `sys.table_types` 视图新增了一个名为 `is_memory_optimized` 的列，用于指示某个类型是否代表内存优化的表变量。

    *   `sys.data_spaces` 视图现在有了新的 `type` 和 `type_desc` 值：`(FX)-MEMORY_OPTIMIZED_DATA_FILEGROUP`。


    ### 数据管理视图


    内存 OLTP 提供了大量新的数据管理视图；通过它们名称中的 `xtp_` 前缀可以轻松识别。命名约定也提供了关于其作用域的信息。`sys.dm_xtp_*`
    视图返回实例级别的信息，而 `sys.dm_db_xtp_*` 视图提供数据库级别的信息。让我们按区域分组，更详细地了解它们。


    #### 对象与索引统计


    以下数据管理视图提供与索引和数据修改相关的统计信息：


    *   `sys.dm_db_xtp_object_stats` 按对象报告数据修改影响的行数，以及写入冲突和唯一约束违规。您可以使用此视图分析内存优化表中数据的易变性，并将其与索引使用统计相关联。与基于磁盘的表一样，您可以通过删除在易变表上定义的很少使用的索引来提高数据修改性能。有关此视图的更多信息，请访问
    [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-object-stats-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-object-stats-transact-sql)。

    *   `sys.dm_db_xtp_index_stats` 返回有关索引使用情况的信息，包括行链扫描次数、扫描的行数 (`rows_touched`)、返回给客户端的行数
    (`rows_returned`) 以及有关过期行的数据。`rows_touched` 和 `rows_returned` 之间的巨大差异可能表明索引策略效率低下，查询执行了大范围扫描。对于哈希索引，这可能还表明由于哈希表中桶的数量不足，导致索引行链过长。您可以在
    [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql)
    阅读有关此视图的信息。

    *   `sys.dm_db_xtp_nonclustered_index_stats` 提供有关非聚集（范围）索引的信息，例如索引中的页数、增量页数以及页拆分和合并统计信息。您可以在
    [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-nonclustered-index-stats-transact-sql)
    阅读有关此视图的信息。

    *   `sys.dm_db_xtp_hash_index_stats` 提供有关哈希索引的信息，例如索引中的桶数、空桶数以及行链长度信息。当您需要分析哈希索引的状态并微调其
    `bucket_count` 分配时，此视图非常有用。您可以在 [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-hash-index-stats-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-hash-index-stats-transact-sql)
    阅读有关此视图的信息。


    清单 12-11 展示了可用于查找 `bucket_count` 值可能非最优的哈希索引的脚本。


    ```sql

    select

    s.name + ''.'' + t.name as [Table]

    ,i.name as [Index]

    ,stat.total_bucket_count as [Total Buckets]

    ,stat.empty_bucket_count as [Empty Buckets]

    ,floor(100. * empty_bucket_count / total_bucket_count)

    as [Empty Bucket %]

    ,stat.avg_chain_length as [Avg Chain]

    ,stat.max_chain_length as [Max Chain]

    from

    sys.dm_db_xtp_hash_index_stats stat

    join sys.tables t on

    stat.object_id = t.object_id

    join sys.indexes i on

    stat.object_id = i.object_id and

    stat.index_id = i.index_id

    join sys.schemas s on

    t.schema_id = s.schema_id

    where

    stat.avg_chain_length > 3 or

    stat.max_chain_length > 50 or

    floor(100. * empty_bucket_count /

    total_bucket_count) > 50

    ```

    *清单 12-11. 获取关于 `bucket_count` 值可能非最优的哈希索引的信息*


    #### 内存使用统计


    我已在本章和其他章节讨论过与内存使用相关的视图。不过，作为快速概览，这些视图如下：


    *   `sys.dm_xtp_system_memory_consumers` 报告系统中系统级内存使用者的信息。有关此视图的更多信息，请访问 [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql)。

    *   `sys.dm_db_xtp_table_memory_stats` 提供每个对象级别的内存使用统计信息。您可以在 [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-table-memory-stats-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-table-memory-stats-transact-sql)
    阅读更多信息。

    *   `sys.dm_db_xtp_memory_consumers` 提供有关数据库级别内存使用者的信息。您可以使用此视图分析系统中每个索引的内存分配以及内部表消耗的内存。文档可在
    [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql)
    获取。


    #### 事务管理


    以下视图提供系统中与事务相关的统计信息：


    *   `sys.dm_xtp_transaction_stats` 报告自上次服务器重启以来系统中事务活动的统计信息。它包括事务数量、事务日志活动信息以及许多其他指标。有关此视图的更多信息，请访问
    [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-transaction-stats-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-transaction-stats-transact-sql)。

    *   `sys.dm_db_xtp_transactions` 提供系统中当前活动事务的信息。我们在本章中讨论过此视图，您可以在 [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-transactions-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-transactions-transact-sql)
    阅读更多信息。'
- fmt: '### Garbage Collection


    以下视图提供系统中垃圾回收过程的信息：


    *   `sys.dm_xtp_gc_stats` 报告关于垃圾回收过程的整体统计信息。更多详细信息请访问 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-stats-transact-sql)。

    *   `sys.dm_xtp_gc_queue_stats` 提供有关垃圾回收工作项队列状态的信息。您可以使用此视图来监视垃圾回收解除分配过程是否跟得上系统负载。您可以在
    [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-queue-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-queue-stats-transact-sql)
    阅读关于此视图的更多信息。

    *   `sys.dm_db_xtp_gc_cycle_stats` 提供有关空闲工作线程生成队列的信息。我在第 [11](#A340879_2_En_11_Chapter.html)
    章讨论了此视图，您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-gc-cycle-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-gc-cycle-stats-transact-sql)
    阅读更多相关内容。


    ### Checkpoint


    以下视图提供有关当前数据库中检查点操作的信息：


    *   `sys.dm_db_xtp_checkpoint_stats` 报告关于数据库检查点操作的整体统计信息。它包含日志文件 I/O 统计信息、连续检查点期间处理的数据量、自上次检查点操作以来的时间以及许多其他指标。有关此视图的更多信息，请访问
    [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-checkpoint-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-checkpoint-stats-transact-sql)。

    *   `sys.dm_db_xtp_checkpoint_files` 提供有关数据库中检查点文件对的信息。附录 C 展示了此视图的实际应用，您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-checkpoint-files-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-checkpoint-files-transact-sql)
    阅读更多相关内容。


    ### Extended Events and Performance Counters


    SQL Server 拥有大量可用于监视和诊断 In-Memory OLTP 相关操作的扩展事件和性能计数器。您可以使用清单 [12-12](#A340879_2_En_12_Chapter.html#Par138)
    中的代码来获取 In-Memory OLTP 扩展事件列表。


    ```sql

    select

    xp.name as [package]

    ,xo.name as [event]

    ,xo.description as [description]

    from

    sys.dm_xe_packages xp

    join sys.dm_xe_objects xo on

    xp.guid = xo.package_guid

    where

    xp.name like ''XTP%'' or xo.name like ''%XTP%''

    order by

    xp.name, xo.name

    -- Listing 12-12. Analyzing In-Memory OLTP Extended Events

    ```


    图 [12-10](#A340879_2_En_12_Chapter.html#Fig10) 展示了该查询的部分输出。我建议您分析查询的完整输出，并熟悉那些可能对监视和诊断有用的事件。


    ![A340879_2_En_12_Fig10_HTML.jpg](A340879_2_En_12_Fig10_HTML.jpg)


    图 12-10. In-Memory OLTP 扩展事件


    类似地，您可以使用清单 [12-13](#A340879_2_En_12_Chapter.html#Par141) 中所示的查询来查看 In-Memory
    OLTP 性能计数器。


    ```sql

    select object_name, counter_name

    from sys.dm_os_performance_counters

    where object_name like ''%XTP%''

    order by object_name, counter_name

    -- Listing 12-13. Analyzing In-Memory OLTP Performance Counters

    ```


    图 [12-11](#A340879_2_En_12_Chapter.html#Fig11) 展示了该查询的部分输出。与扩展事件一样，熟悉性能计数器并使用它们来基线化系统工作负载，并在监视和诊断性能问题时使用它们，是非常有益的。


    ![A340879_2_En_12_Fig11_HTML.jpg](A340879_2_En_12_Fig11_HTML.jpg)


    图 12-11. In-Memory OLTP 性能计数器


    > **注意**

    >

    > 您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/performance-monitor/sql-server-xtp-in-memory-oltp-performance-counters`](https://docs.microsoft.com/en-us/sql/relational-databases/performance-monitor/sql-server-xtp-in-memory-oltp-performance-counters)
    阅读关于 In-Memory OLTP 性能计数器的信息。


    ## Summary


    选择正确的硬件是实现良好 In-Memory OLTP 性能和事务吞吐量的关键部分。In-Memory OLTP 使用硬件的方式与存储引擎不同，当系统使用
    In-Memory OLTP 时，您需要仔细规划部署和服务器配置。


    In-Memory OLTP 受益于单线程 CPU 性能。您应选择基础时钟频率高的 CPU，并在系统中启用超线程。


    您应该将 In-Memory OLTP 检查点文件存储在针对顺序 I/O 性能优化的磁盘阵列中，最好使用基于 SSD 的驱动器。如果数据库恢复时间至关重要，您可以考虑在
    In-Memory OLTP 文件组中使用多个容器，将它们放置在不同的驱动器上。


    显然，系统中应有足够的内存来容纳 In-Memory OLTP 数据，同时为其他 SQL Server 组件留出足够的内存。在 SQL Server 企业版中，您可以通过在
    Resource Governor 资源池中配置内存并将数据库绑定到该池来限制 In-Memory OLTP 内存使用量。在标准版中，In-Memory OLTP
    每个数据库限于 32GB 的内存优化数据。


    In-Memory OLTP 提供了大量的数据管理视图、性能计数器和扩展事件，您可以用它们来进行系统监控。


    # 13. Utilizing In-Memory OLTP


    本章讨论了利用 In-Memory OLTP 的系统的一些设计考虑事项，并演示了在迁移现有系统成本过高时如何从该技术中获益。它还讨论了实现数据分区的方法，这对于拥有大量数据和混合工作负载的系统可能很有帮助。'
  raw: '#### Garbage Collection


    The following views provide information about the garbage collection process in
    the system:


    *   `sys.dm_xtp_gc_stats` reports the overall statistics about the garbage collection
    process. More information is available at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-stats-transact-sq`l](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-stats-transact-sql).

    *   `sys.dm_xtp_gc_queue_stats` provides information about the state of garbage
    collection worker item queues. You can use this view to monitor whether the garbage
    collection deallocation process is keeping up with the system load. You can read
    more about this view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-queue-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-queue-stats-transact-sql)
    .

    *   `sys.dm_db_xtp_gc_cycle_stats` provides information about idle worker thread
    generation queues. I discussed this view in Chapter [11](#A340879_2_En_11_Chapter.html),
    and you can read more about it at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-gc-cycle-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-gc-cycle-stats-transact-sql)
    .


    #### Checkpoint


    The following views provide information about checkpoint operations in the current
    database:


    *   `sys.dm_db_xtp_checkpoint_stats` reports the overall statistics about database
    checkpoint operations. It includes log file I/O statistics, the amount of data
    processed during a continuous checkpoint, the time since the last checkpoint operation,
    and quite a few other metrics. More information about this view is available at
    [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-checkpoint-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-checkpoint-stats-transact-sql)
    .

    *   `sys.dm_db_xtp_checkpoint_files` provides information about checkpoint file
    pairs in the database. Appendix C shows this view in action, and you can read
    more about it at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-checkpoint-files-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-checkpoint-files-transact-sql)
    .


    ### Extended Events and Performance Counters


    SQL Server has the large number of extended events and performance counters that
    can be used to monitor and troubleshoot In-Memory OLTP–related actions. You can
    use the code from Listing [12-12](#A340879_2_En_12_Chapter.html#Par138) to get
    the list of In-Memory OLTP extended events.


    ```

    select

    xp.name as [package]

    ,xo.name as [event]

    ,xo.description as [description]

    from

    sys.dm_xe_packages xp

    join sys.dm_xe_objects xo on

    xp.guid = xo.package_guid

    where

    xp.name like ''XTP%'' or xo.name like ''%XTP%''

    order by

    xp.name, xo.name

    Listing 12-12.

    Analyzing In-Memory OLTP Extended Events

    ```


    Figure [12-10](#A340879_2_En_12_Chapter.html#Fig10) shows the partial output from
    the query. I recommend you analyze the full output from the query and get familiar
    with the events that may be useful for monitoring and troubleshooting purposes.


    ![A340879_2_En_12_Fig10_HTML.jpg](A340879_2_En_12_Fig10_HTML.jpg)


    Figure 12-10.


    In-Memory OLTP extended events


    Similarly, you can see In-Memory OLTP performance counters with the query shown
    in Listing [12-13](#A340879_2_En_12_Chapter.html#Par141).


    ```

    select object_name, counter_name

    from sys.dm_os_performance_counters

    where object_name like ''%XTP%''

    order by object_name, counter_name

    Listing 12-13.

    Analyzing In-Memory OLTP Performance Counters

    ```


    Figure [12-11](#A340879_2_En_12_Chapter.html#Fig11) shows a partial output of
    the query. As with extended events, it is beneficial to get familiar with performance
    counters and use them to baseline the system workload and use them while monitoring
    and troubleshooting performance issues.


    ![A340879_2_En_12_Fig11_HTML.jpg](A340879_2_En_12_Fig11_HTML.jpg)


    Figure 12-11.


    In-Memory OLTP performance counters Note


    You can read about In-Memory OLTP performance counters at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance-monitor/sql-server-xtp-in-memory-oltp-performance-counters`](https://docs.microsoft.com/en-us/sql/relational-databases/performance-monitor/sql-server-xtp-in-memory-oltp-performance-counters)
    .


    ## Summary


    Choosing the right hardware is a crucial part of achieving good In-Memory OLTP
    performance and transactional throughput. In-Memory OLTP uses hardware in a different
    manner than the Storage Engine, and you need to carefully plan the deployment
    and server configuration when a system uses In-Memory OLTP.


    In-Memory OLTP benefits from single-threaded CPU performance. You should choose
    CPUs with a high base clock speed and have hyperthreading enabled in the system.


    You should store In-Memory OLTP checkpoint files in the disk array, which is optimized
    for sequential I/O performance, preferably using SSD-based drives. You can consider
    using multiple containers in an In-Memory OLTP filegroup, placing them on different
    drives if the database recovery time is critical.


    Obviously, you should have enough memory in the system to accommodate the In-Memory
    OLTP data, while leaving enough memory for other SQL Server components. In the
    Enterprise Edition of SQL Server, you can restrict In-Memory OLTP memory usage
    by configuring memory in the Resource Governor resource pool and binding the database
    there. In the Standard Edition, In-Memory OLTP is limited to 32GB of memory-optimized
    data per database.


    In-Memory OLTP provides a large set of data management views, performance counters,
    and extended events that you can use for system monitoring.


    # 13. Utilizing In-Memory OLTP


    This chapter discusses several design considerations for systems utilizing In-Memory
    OLTP and demonstrates how to benefit from the technology when migrating the existing
    systems is cost-ineffective. It also talks about implementing data partitioning,
    which can be helpful in a system with a large amount of data and mixed workload.'
