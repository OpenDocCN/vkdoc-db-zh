- fmt: '### Monitoring In-Memory OLTP Transactions


    The `sys.dm_db_xtp_transactions` view provides information about active In-Memory
    OLTP transactions in the system. The following are the most notable columns in
    the view:

    *   `xtp_transaction_id` is the internal ID of the transaction in the In-Memory
    OLTP Transaction Manager.

    *   `transaction_id` is the transaction ID in the system. You can use it in joins
    with other transaction management views, such as `sys.dm_tran_active_transactions`.
    In-Memory OLTP–only transactions, such as transactions started by natively compiled
    stored procedures, return a `transaction_id` value of 0.

    *   `session_id` indicates the session that started a transaction.

    *   `begin_tsn` and `end_tsn` indicate transaction timestamps.

    *   `state` and `state_desc` indicate the state of a transaction. The possible
    values are `(0)-ACTIVE`, `(1)-COMMITTED`, `(2)-ABORTED`, and `(3)-VALIDATING`.

    *   `result` and `result_desc` indicate the result of a transaction. The possible
    values are `(0)-IN PROGRESS`; `(1)-SUCCESS`; `(2)-ERROR`, `(3)-COMMIT DEPENDENCY`;
    `(4)-VALIDATION FAILED (RR)`, which indicates repeatable read rules violation;
    `(5)-VALIDATION FAILED (SR)`, which indicates serializable rules violation; and
    `(6)-ROLLBACK`.

    *   `read_set_row_count`, `write_set_row_count`, and `scan_set_row_count` provide
    information about size of read, write, and scan sets of the transaction.

    *   `commit_dependency_count` indicates how many commits the dependency transaction
    has taken.


    You can use the `sys.dm_db_xtp_transactions` view to detect long-running and orphan
    transactions in the system. As you probably remember, these transactions can defer
    the garbage collection process and lead to out-of-memory errors.


    Listing [12-8](#A340879_2_En_12_Chapter.html#Par74) shows a query that returns
    information about the five oldest active In-Memory OLTP transactions in the system.


    ```sql

    select top 5

    t.session_id

    ,t.transaction_id

    ,t.begin_tsn

    ,t.end_tsn

    ,t.state_desc

    ,t.result_desc

    ,substring(

    qt.text

    ,er.statement_start_offset / 2 + 1

    ,(case er.statement_end_offset

    when -1 then datalength(qt.text)

    else er.statement_end_offset

    end - er.statement_start_offset

    ) / 2 +1

    ) as SQL

    from

    sys.dm_db_xtp_transactions t

    left outer join sys.dm_exec_requests er on

    t.session_id = er.session_id

    outer apply

    sys.dm_exec_sql_text(er.sql_handle) qt

    where

    t.state in (0,3) /* ACTIVE/VALIDATING */

    order by

    t.begin_tsn

    ```

    Listing 12-8.

    Getting Information About the Five Oldest Active In-Memory OLTP Transactions


    Figure [12-6](#A340879_2_En_12_Chapter.html#Fig6) illustrates the output of the
    query.


    ![A340879_2_En_12_Fig6_HTML.jpg](A340879_2_En_12_Fig6_HTML.jpg)


    Figure 12-6.

    The five oldest active In-Memory OLTP transactions in the system


    Note


    You can read more about the `sys.dm_db_xtp_transactions` view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-transactions-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-transactions-transact-sql).


    ### Collecting Execution Statistics for Natively Compiled Stored Procedures


    In query interop mode, SQL Server collects execution statistics of the statements
    that access memory-optimized tables when their execution plans are cached. However,
    it does not collect execution statistics for natively compiled modules because
    of the performance impact this introduces. You can enable such a collection at
    the module level with `sys.sp_xtp_control_proc_exec_stats` and at the statement
    level with the `sys.sp_xtp_control_query_exec_stats` system stored procedures.


    Both procedures accept a Boolean `@new_collection_value` parameter, which indicates
    whether the collection needs to be enabled or disabled. In addition, `sys.sp_xtp_control_query_exec_stats`
    allows you to provide `@database_id` and `@xtp_object_id` values to specify a
    module to monitor. It is also worth noting that SQL Server does not persist collection
    settings, and you will need to reenable statistics collection after each SQL Server
    restart.


    Important


    Collecting execution statistics degrades the performance of the system. Do not
    collect execution statistics unless you are performing troubleshooting. Moreover,
    consider limiting collection to specific natively compiled modules to reduce the
    performance impact on the system.


    When statistics have been collected, you can access them through the `sys.dm_exec_procedure_stats`,
    `sys.dm_exec_function_stats`, and `sys.dm_exec_query_stats` views.


    Listing [12-9](#A340879_2_En_12_Chapter.html#Par81) shows the code that returns
    execution statistics for stored procedures using the `sys.dm_exec_procedure_stats`
    view. The code does not limit the output to natively compiled stored procedures;
    however, you can do it by joining the `sys.dm_exec_procedure_stats` and `sys.sql_modules`
    views and filtering by the `uses_native_compliation = 1` value.


    ```sql

    select

    object_name(ps.object_id) as [Proc Name]

    ,p.query_plan

    ,ps.execution_count as [Exec Cnt]

    ,ps.total_worker_time as [Total CPU]

    ,convert(int,ps.total_worker_time / ps.execution_count)

    as [Avg CPU] -- in Microseconds

    ,ps.total_elapsed_time as [Total Elps]

    ,convert(int,ps.total_elapsed_time / ps.execution_count)

    as [Avg Elps] -- in Microseconds

    ,ps.cached_time as [Cached]

    ,ps.last_execution_time as [Last Exec]

    ,ps.sql_handle

    ,ps.plan_handle

    ,ps.total_logical_reads as [Reads]

    ,ps.total_logical_writes as [Writes]

    from

    sys.dm_exec_procedure_stats ps cross apply

    sys.dm_exec_query_plan(ps.plan_handle) p

    order by

    [Avg CPU] desc

    ```

    Listing 12-9.

    Analyzing Stored Procedures Execution Statistics


    Figure [12-7](#A340879_2_En_12_Chapter.html#Fig7) illustrates the output of the
    code from Listing [12-9](#A340879_2_En_12_Chapter.html#Par81). As you can see,
    in SQL Server 2016, both the `sql_handle` and `plan_handle` columns are populated
    and can be used to obtain the stored procedure text and execution plan. It is
    also worth noting that there is no I/O-related statistics provided. Natively compiled
    modules work with memory-optimized tables only, and therefore there is no I/O
    involved.


    ![A340879_2_En_12_Fig7_HTML.jpg](A340879_2_En_12_Fig7_HTML.jpg)


    Figure 12-7.

    Data from `sys.dm_exec_procedure_stats` view


    Listing [12-10](#A340879_2_En_12_Chapter.html#Par84) shows the code that obtains
    execution statistics for individual statements using the `sys.dm_exec_query_stats`
    view.'
