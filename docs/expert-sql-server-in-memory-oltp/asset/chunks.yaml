  trans: '

    #### 等待日志截断状态


    原先处于`活跃`状态、现处于`等待日志截断`状态的文件中的数据，不再用于数据库恢复。原先的`合并目标`、现处于`活跃`状态的`检查点文件对`可以用于此目的。但是，如果您希望从备份还原数据库，则仍需要那些`等待日志截断`的文件。


    检查点文件将保持此状态，直到日志截断点超过其`LSN`。在`完整`恢复模式下，这意味着已进行日志备份，日志记录已发送到辅助节点，并且其他读取事务日志的进程没有落后。显然，在`简单`恢复模式下，不需要日志备份，日志截断点由检查点控制。


    一旦发生截断，`等待日志截断`的文件就不再需要。它们可以转换回`预创建`状态，或者如果系统已有足够的`预创建`文件，则可以被删除。


    注意：您可以使用`sys.dm_db_xtp_checkpoint_files`视图来分析检查点文件的状态。附录 C 更深入地讨论了此视图，并展示了检查点文件状态在其生命周期中如何变化。


    ## 恢复


    如您所知，恢复过程可能发生在数据库或实例重启、故障转移到另一节点或从备份还原数据库之后。SQL Server 使用`活跃`数据文件和`内存中 OLTP`数据的事务日志，并行执行基于磁盘的表和内存优化表的恢复。


    在恢复阶段开始时，SQL Server 定位包含检查点文件信息的最新根文件，并将其传递给`内存中 OLTP 引擎`。引擎获取所有`活跃`检查点文件对的列表，并开始从中加载数据。它仅使用增量文件作为筛选器来加载未删除的行版本。它检查数据文件中的行是否未被删除，且未在增量文件中被引用。根据此检查的结果，行要么被加载到内存中，要么被丢弃。


    数据加载过程具有高度可扩展性。SQL Server 为每个逻辑 CPU 创建一个线程，每个线程处理一个单独的检查点文件对。在许多情况下，I/O 子系统的性能成为数据加载性能的限制因素。这就是为什么您应该将检查点文件放在快速的、最好是基于闪存的存储上的原因。


    与基于磁盘的表相反，内存优化表上的索引不会被持久化。您还记得，`内存中 OLTP`中的索引只是内存指针，并且行在重新加载到内存中后其内存地址会发生变化。因此，在恢复阶段必须重新创建索引。


    图 10-6 说明了数据加载过程。


    ![A340879_2_En_10_Fig6_HTML.jpg](img/A340879_2_En_10_Fig6_HTML.jpg)


    图 10-6. 将数据加载到内存


    从`检查点文件对`加载数据后，SQL Server 通过从事务日志尾部应用更改来完成恢复，将数据库恢复到崩溃或关闭时的状态。您已经知道，`内存中 OLTP`不记录未提交的更改；因此，恢复期间不需要`撤销`阶段。


    最后，必须提及`AlwaysOn 可用性组`和`故障转移群集`实例在故障转移期间恢复过程的差异。使用`AlwaysOn 故障转移群集`时，故障转移在概念上类似于
    SQL Server 重启。数据库将联机，所有内存优化数据都需要加载到内存中。而`AlwaysOn 可用性组`节点只需处理`重做`队列，重放事务日志中未应用部分的事务。内存优化表的数据已经加载到所有节点的内存中。


    您应该记住这种行为，并在系统中存在可用性 SLA 时考虑内存优化数据的恢复时间。如果您在基础设施中使用故障转移群集，这一点尤其重要。如前所述，您可以通过将检查点文件放在快速存储上来减少此时间。

    '
- fmt: "## Transaction Logging\n\nAs you already know, transaction logging in In-Memory\
    \ OLTP is more efficient compared to the Storage Engine. Both engines share the\
    \ same transaction log and perform write-ahead logging (WAL) ; however, the log\
    \ records format and algorithms are very different.\n\nWith disk-based tables,\
    \ SQL Server generates transaction log records on a per-index basis. For example,\
    \ when you insert a single row into a table with clustered and nonclustered indexes,\
    \ it will log insert operations in every individual index separately. Moreover,\
    \ it will log internal operations, such as extent and page allocations, page splits,\
    \ and a few others.\n\nAll log records are saved in a transaction log and hardened\
    \ on disk pretty much synchronously at the time when they were created. Even though\
    \ every database has a cache called Log Buffer to batch log writes, that cache\
    \ is very small, about 60KB. Moreover, some operations, such as `COMMIT` and `CHECKPOINT`,\
    \ flush that cache whether it is full or not.\n\nFinally, SQL Server has to include\
    \ before-update (`UNDO`) and after-update (`REDO`) versions of the row to the\
    \ log records. The checkpoint process is asynchronous, and it does not check the\
    \ state of transaction that modified the page. It is entirely possible for the\
    \ checkpoint to save the dirty data pages from uncommitted transactions, and the\
    \ `UNDO` part of the log records are required to roll back the changes.\n\n###\
    \ In-Memory OLTP Logging\n\nTransaction logging in In-Memory OLTP addresses these\
    \ inefficiencies. The first major difference is that In-Memory OLTP generates\
    \ and saves log records at the time of the transaction `COMMIT` rather than during\
    \ each data row modification. Therefore, rolled-back transactions do not generate\
    \ any log activity.\n\nThe format of a log record is also different. Log records\
    \ do not include any `UNDO` information. Dirty data from uncommitted transactions\
    \ will never materialize on disk; therefore, In-Memory OLTP log data does not\
    \ need to support the `UNDO` stage of crash recovery or log uncommitted changes.\n\
    \nIn-Memory OLTP generates log records based on the transactions write set. All\
    \ data modifications are combined in one or very few log records based on the\
    \ write set and inserted rows’ size.\n\n### Demonstrating Logging Behavior\n\n\
    Let’s examine this behavior and run the code shown in Listing 10-2. It starts\
    \ a transaction and inserts 500 rows into a memory-optimized table. Then it examines\
    \ the content of the transaction log using the undocumented `sys.fn_dblog` system\
    \ function.\n\n```\ncreate table dbo.HKData\n(\nID int not null,\nCol int not\
    \ null,\nconstraint PK_HKData\nprimary key nonclustered hash(ID)\nwith (bucket_count=2048),\n\
    )\nwith (memory_optimized=on, durability=schema_and_data);\ndeclare\n@I int =\
    \ 1\nbegin tran\nwhile @I <= 500\nbegin\ninsert into dbo.HKData with (snapshot)\n\
    (ID, Col)\nvalues(@I, @I);\nset @I += 1\nend\ncommit\ngo\nselect *\nfrom sys.fn_dblog(NULL,\
    \ NULL)\norder by [Current LSN];\nListing 10-2.\nTransaction Logging in In-Memory\
    \ OLTP: Memory-Optimized Table Logging\n```\n\nFigure 10-7 illustrates the content\
    \ of the transaction log. You can see the single transaction record for the In-Memory\
    \ OLTP transaction.\n\n![A340879_2_En_10_Fig7_HTML.jpg](A340879_2_En_10_Fig7_HTML.jpg)\n\
    Figure 10-7.\nTransaction log content after the In-Memory OLTP transaction\n\n\
    ### Comparison with Disk-Based Tables\n\nLet’s repeat this test with a disk-based\
    \ table of a similar structure. Listing 10-3 shows the code that creates a table\
    \ and populates it with data.\n\n```\ncreate table dbo.DiskData\n(\nID int not\
    \ null,\nCol int not null,\nconstraint PK_DiskData\nprimary key nonclustered(ID)\n\
    );\ndeclare\n@I int = 1\nbegin tran\nwhile @I <= 500\nbegin\ninsert into dbo.DiskData(ID,\
    \ Col)\nvalues(@I, @I);\nset @I += 1;\nend\ncommit\nListing 10-3.\nTransaction\
    \ Logging in In-Memory OLTP: Disk-Based Table Logging\n```\n\nAs you can see in\
    \ Figure 10-8, the same transaction generated more than 1,700 log records.\n\n\
    ![A340879_2_En_10_Fig8_HTML.jpg](A340879_2_En_10_Fig8_HTML.jpg)\nFigure 10-8.\n\
    Transaction log content after disk-based table modification\n\n### Analyzing In-Memory\
    \ OLTP Log Records\n\nYou can use another undocumented function, `sys.fn_dblog_xtp`,\
    \ to examine the logical content of an In-Memory OLTP log record. Listing 10-4\
    \ shows the code that utilizes this function. You should use the LSN of the `LSN_HK`\
    \ log record from the Listing 10-2 output as the parameter of the function.\n\n\
    ```\nselect [Current LSN], xtp_object_id, operation_desc\n,tx_end_timestamp, total_size\n\
    from sys.fn_dblog_xtp(null, null)\n-- \nwhere [Current LSN] = '00000022:00000240:0035';\n\
    Listing 10-4.\nAnalyzing an In-Memory OLTP Log Record\n```\n\nFigure 10-9 shows\
    \ the output of that code.\n\n![A340879_2_En_10_Fig9_HTML.jpg](A340879_2_En_10_Fig9_HTML.jpg)\n\
    Figure 10-9.\nIn-Memory OLTP transaction log record details\n\nFinally, it is\
    \ worth stating again that any data modification on nondurable tables (`DURABILITY=SCHEMA_ONLY`)\
    \ is not logged in the transaction log or is its data persisted on disk."
