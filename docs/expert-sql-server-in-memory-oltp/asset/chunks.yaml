- fmt: '# Downloading the Code


    You can download the code used in this book from the Source Code section of the
    Apress web site (`www.apress.com`) or from the Publications section of my blog
    (`http://aboutsqlserver.com`). The source code consists of a `SQL Server Management
    Studio` solution, which includes a set of projects (one per chapter). Moreover,
    it includes several .NET `C#` projects, which provide the client application code
    used in the examples in Chapters [2](#A340879_2_En_2_Chapter.html) and [13](#A340879_2_En_13_Chapter.html).


    I have tested all the scripts in an environment with 8GB of RAM available to `SQL
    Server`. In some cases, if you have less memory available, you will need to reduce
    the amount of test data generated by some of the scripts. You can also consider
    dropping some of the unused test tables to free up more memory.


    # Acknowledgments


    I would like to thank my family for their patience, understanding, and continuous
    support. It would have been impossible for me to write this book without them!


    It would also have been impossible to write this book without help from my friend
    and eternal technical reviewer Victor Isakov. I just don’t understand why Victor
    still talks to me after all my books he has reviewed!


    On the same note, I would like to thank Nazanin Mashayekh, who read the manuscript
    and provided many great advices and suggestions. Nazanin lives in Tehran and has
    years of experience working with `SQL Server` in various roles.


    I am enormously grateful to Jos de Bruijn from `Microsoft` who generously answered
    a never-ending stream of my questions. Jos is one of the few people who shaped
    In-Memory OLTP into its current form. I cannot understate his contribution to
    this book—it would never cover the technology in such depth without his help.
    Thank you, Jos!


    Finally, I would like to thank the entire Apress team, especially Jill Balzano,
    Kim Wimpsett, and Jonathan Gennick. It is always a pleasure to work with all of
    you!


    Thank you very much!'
  raw: '## Downloading the Code


    You can download the code used in this book from the Source Code section of the
    Apress web site ( [`www.apress.com`](http://www.apress.com) ) or from the Publications
    section of my blog ( [`http://aboutsqlserver.com`](http://aboutsqlserver.com)
    ). The source code consists of a SQL Server Management Studio solution, which
    includes a set of projects (one per chapter). Moreover, it includes several .NET
    C# projects, which provide the client application code used in the examples in
    Chapters [2](#A340879_2_En_2_Chapter.html) and [13](#A340879_2_En_13_Chapter.html)
    .


    I have tested all the scripts in an environment with 8GB of RAM available to SQL
    Server. In some cases, if you have less memory available, you will need to reduce
    the amount of test data generated by some of the scripts. You can also consider
    dropping some of the unused test tables to free up more memory.


    Acknowledgments


    I would like to thank my family for their patience, understanding, and continuous
    support. It would have been impossible for me to write this book without them!


    It would also have been impossible to write this book without help from my friend
    and eternal technical reviewer Victor Isakov. I just don’t understand why Victor
    still talks to me after all my books he has reviewed!


    On the same note, I would like to thank Nazanin Mashayekh, who read the manuscript
    and provided many great advices and suggestions. Nazanin lives in Tehran and has
    years of experience working with SQL Server in various roles.


    I am enormously grateful to Jos de Bruijn from Microsoft who generously answered
    a never-ending stream of my questions. Jos is one of the few people who shaped
    In-Memory OLTP into its current form. I cannot understate his contribution to
    this book—it would never cover the technology in such depth without his help.
    Thank you, Jos!


    Finally, I would like to thank the entire Apress team, especially Jill Balzano,
    Kim Wimpsett, and Jonathan Gennick. It is always a pleasure to work with all of
    you!


    Thank you very much!'
  trans: '

    # 下载代码


    您可以从 Apress 网站（`www.apress.com`）的源代码部分，或从我博客的出版物部分（`http://aboutsqlserver.com`）下载本书使用的代码。源代码包含一个
    `SQL Server Management Studio` 解决方案，其中包含一组项目（每章一个）。此外，它还包括若干 .NET `C#` 项目，这些项目提供了第
    2 章和第 13 章示例中使用的客户端应用程序代码。


    我已在为 `SQL Server` 提供 8GB 内存的环境中测试了所有脚本。在某些情况下，如果您的可用内存较少，您将需要减少某些脚本生成的测试数据量。您也可以考虑删除一些未使用的测试表以释放更多内存。


    # 致谢


    我要感谢我的家人，感谢他们的耐心、理解和持续的支持。没有他们，我根本不可能写出这本书！


    如果没有我的朋友和长期的技术评审员 Victor Isakov 的帮助，这本书也不可能完成。我只是不明白，为什么 Victor 在评审了我所有这些书之后，仍然愿意和我说话！


    同样地，我要感谢 Nazanin Mashayekh，他通读了手稿并提供了许多很好的建议。Nazanin 居住在德黑兰，多年来在不同岗位上与 `SQL Server`
    打交道，经验丰富。


    我非常感谢来自 `Microsoft` 的 Jos de Bruijn，他慷慨地回答了我一个接一个没完没了的问题。Jos 是将内存中 OLTP 塑造成目前形态的少数人之一。我对他对本书的贡献再怎么强调也不为过——没有他的帮助，本书绝不可能如此深入地涵盖这项技术。谢谢你，Jos！


    最后，我要感谢整个 Apress 团队，特别是 Jill Balzano、Kim Wimpsett 和 Jonathan Gennick。与你们所有人一起工作总是很愉快！


    非常感谢！

    '
