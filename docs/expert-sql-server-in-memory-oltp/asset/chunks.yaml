  trans: '### 数据修改开销


    `内存优化表`上的索引会引入类似于磁盘基表上索引的数据修改开销。`内存中 OLTP`需要维护多个索引行链以及内部索引结构，例如哈希表和映射表，以及内部和叶非聚集索引页。


    让我们详细看看这个开销。`清单 5-9`中的代码创建了一个磁盘基表并填充了 65,536 行数据。接着，它创建了两个内存优化表，分别包含两个和八个索引。


    ```sql

    create table dbo.UpdateOverheadDisk

    (

    Id int not null,

    IndexedCol int not null,

    NonIndexedCol int not null,

    Col3 int not null,

    Col4 int not null,

    Col5 int not null,

    Col6 int not null,

    Col7 int not null,

    Col8 int not null,

    constraint PK_UpdateOverheadDisk

    primary key clustered(ID)

    );

    create nonclustered index IDX_UpdateOverheadDisk_IndexedCol

    on dbo.UpdateOverheadDisk(IndexedCol);

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N5)

    insert into dbo.UpdateOverheadDisk(ID,IndexedCol,NonIndexedCol,Col3

    ,Col4,Col5,Col6,Col7,Col8)

    select Id, Id, Id, Id, Id, Id, Id, Id, Id from Ids;

    go

    create table dbo.UpdateOverheadMemory

    (

    Id int not null

    constraint PK_UpdateOverheadMemory

    primary key nonclustered

    hash with (bucket_count=2097152),

    IndexedCol int not null,

    NonIndexedCol int not null,

    Col3 int not null,

    Col4 int not null,

    Col5 int not null,

    Col6 int not null,

    Col7 int not null,

    Col8 int not null,

    index IDX_IndexedCol nonclustered(IndexedCol)

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.UpdateOverhead8Idx

    (

    Id int not null

    constraint PK_UpdateOverhead8Idx

    primary key nonclustered

    hash with (bucket_count=2097152),

    IndexedCol int not null,

    NonIndexedCol int not null,

    Col3 int not null,

    Col4 int not null,

    Col5 int not null,

    Col6 int not null,

    Col7 int not null,

    Col8 int not null,

    index IDX_IndexedCol nonclustered(IndexedCol),

    index IDX_Col3 nonclustered(Col3),

    index IDX_Col4 nonclustered(Col4),

    index IDX_Col5 nonclustered(Col5),

    index IDX_Col6 nonclustered(Col6),

    index IDX_Col7 nonclustered(Col7),

    index IDX_Col8 nonclustered(Col8)

    )

    with (memory_optimized=on, durability=schema_only);

    ```

    `清单 5-9. 插入开销：表创建`


    让我们使用`清单 5-10`中的代码将数据插入两个内存优化表。


    ```sql

    insert into dbo.UpdateOverheadMemory(ID,IndexedCol,NonIndexedCol,Col3

    ,Col4,Col5,Col6,Col7,Col8)

    select ID,IndexedCol,NonIndexedCol,Col3,Col4,Col5,Col6,Col7,Col8

    from dbo.UpdateOverheadDisk;

    insert into dbo.UpdateOverhead8Idx(ID,IndexedCol,NonIndexedCol,Col3

    ,Col4,Col5,Col6,Col7,Col8)

    select ID,IndexedCol,NonIndexedCol,Col3,Col4,Col5,Col6,Col7,Col8

    from dbo.UpdateOverheadDisk;

    ```

    `清单 5-10. 插入开销：向内存优化表插入数据`


    在我的环境中，`INSERT`语句的执行时间分别为 138 毫秒和 613 毫秒。如您所见，在`dbo.UpdateOverhead8Idx`表中维护六个额外的索引为该操作增加了显著开销。


    在`UPDATE`操作期间也有开销；然而，这与磁盘基表不同。磁盘基表上的`非聚集索引`是存储表中数据副本的独立数据结构。`SQL Server`维护所有这些副本；因此，更新操作会修改所有包含已更新列的索引。但是，当您更新的列未出现在非聚集索引中时，则没有开销。


    另一方面，`内存中 OLTP`总是生成新的行对象，无论更新了哪些列。`SQL Server`维护所有索引行链，这导致即使修改的是非索引列也会产生开销。


    让我们看一个例子，对磁盘基表`dbo.UpdateOverheadDisk`执行两次更新，分别修改其中的索引列和非索引列。这两个操作都更改了整数定长列的值，不会导致页拆分。`清单
    5-11`展示了代码。


    ```sql

    update dbo.UpdateOverheadDisk

    set IndexedCol += 1;

    update dbo.UpdateOverheadDisk

    set NonIndexedCol += 1;

    ```

    `清单 5-11. 更新开销：磁盘基表更新`


    `图 5-8`说明了两个语句的执行计划和执行时间。如您所见，更新索引列迫使`SQL Server`修改了两个索引，这比更新非索引列花费的时间显著更长。


    ![A340879_2_En_5_Fig8_HTML.jpg](img/A340879_2_En_5_Fig8_HTML.jpg)


    `图 5-8. 磁盘基表更新的执行计划和时间`


    `清单 5-12`显示了针对内存优化表的相同`UPDATE`语句。两个语句都生成了新的数据行对象，并且必须维护表上的两个索引。无论更新了哪些列，这种开销总是存在。


    ```sql

    update dbo.UpdateOverheadMemory

    set IndexedCol += 1;

    update dbo.UpdateOverheadMemory

    set NonIndexedCol += 1;

    ```

    `清单 5-12. 更新开销：内存优化表更新`


    `图 5-9`说明了这些语句的执行计划和执行时间。


    ![A340879_2_En_5_Fig9_HTML.jpg](img/A340879_2_En_5_Fig9_HTML.jpg)


    `图 5-9. 内存优化表更新的执行计划和时间`


    内存优化表上的索引也会延迟垃圾回收。`内存中 OLTP`需要从所有索引链中解除链接旧的过时行，当一行被包含在多个索引中时，这可能需要更长时间。


    **注意**

    我将在`第 11 章`深入讨论垃圾回收过程。


    如您所见，不必要的索引会给系统带来开销。您应避免创建它们，并创建支持工作负载所需的最小索引集。'
- fmt: '## Hash Indexes vs. Nonclustered Indexes


    As you already know, hash indexes are useful only for point-lookup searches in
    cases when queries use equality predicates on all index columns. Nonclustered
    indexes, on the other hand, can be used in a much wider scope, which often makes
    the choice obvious. You should use nonclustered indexes when your queries benefit
    from scenarios other than point-lookups.


    The situation is less obvious in the case of point-lookups. With the hash indexes,
    SQL Server can locate the hash bucket, which is the entry point to the data row
    chain, in a single step by calling the hash function and calculating the hash
    value. With nonclustered indexes, SQL Server must traverse the Bw-Tree to find
    a leaf page, and the number of steps depends on the height of the index and the
    number of delta records there.


    Even though nonclustered indexes require more steps to find an entry point to
    the data row chain, the chain can be smaller compared to hash indexes. Row chains
    in nonclustered indexes are built based on unique index key values. In hash indexes,
    row chains are built based on a nonunique hash key and can be larger because of
    hash collisions, especially when the `bucket_count` value is insufficient.


    Let’s compare hash and nonclustered index performance in a point-lookup scenario.
    Listing [5-13](#A340879_2_En_5_Chapter.html#Par96) creates four tables of the
    same structure. Three of them have hash indexes defined on the `Value` column
    using a different `bucket_count` value. The fourth table has a nonclustered index
    defined on the same column instead. Finally, the code populates all tables with
    the same data.


    ```sql

    create table dbo.Hash_131072

    (

    Id int not null

    constraint PK_Hash_131072

    primary key nonclustered

    hash with (bucket_count=131072),

    Value int not null,

    index IDX_Value hash(Value)

    with (bucket_count=131072)

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.Hash_16384

    (

    Id int not null

    constraint PK_Hash_16384

    primary key nonclustered

    hash with (bucket_count=16384),

    Value int not null,

    index IDX_Value hash(Value)

    with (bucket_count=16384)

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.Hash_1024

    (

    Id int not null

    constraint PK_Hash_1014

    primary key nonclustered

    hash with (bucket_count=1024),

    Value int not null,

    index IDX_Value hash(Value)

    with (bucket_count=1024)

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.NonClusteredIdx

    (

    Id int not null

    constraint PK_NonClusteredIdx

    primary key nonclustered

    hash with (bucket_count=131072),

    Value int not null,

    index IDX_Value nonclustered(Value)

    )

    with (memory_optimized=on, durability=schema_only);

    go

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N1 as t2) -- 131,072 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.Hash_131072(Id,Value)

    select Id, Id

    from ids

    where Id <= 75000;

    insert into dbo.Hash_16384(Id,Value)

    select Id, Value

    from dbo.Hash_131072;

    insert into dbo.Hash_1024(Id,Value)

    select Id, Value

    from dbo.Hash_131072;

    insert into dbo.NonClusteredIdx(Id,Value)

    select Id, Value

    from dbo.Hash_131072;

    ```


    *Listing 5-13. Hash and Nonclustered Indexes’ Point Lookup Performance: Tables
    Creation*


    Different numbers of buckets led to the different index row chain sizes in the
    indexes. In this case, the `dbo.Hash_131072`, `dbo.Hash_16384`, and `dbo.Hash_1024`
    tables have on average 1, 4, and 73 rows per chain, respectively.


    **Tip**

    You can analyze the hash index properties using the `sys.dm_db_xtp_hash_index_stats`
    view and the code from Listing [4-2](#A340879_2_En_5_Chapter.html#Par100) in Chapter
    [4](#A340879_2_En_4_Chapter.html).


    As the next step, let’s compare point-lookup performance using the code from Listing
    [5-14](#A340879_2_En_5_Chapter.html#Par100). This code triggers 75,000 point-lookup
    selects against each table.


    ```sql

    declare

    @T table(Value int not null primary key)

    insert into @T(Value)

    select Id from dbo.Hash_131072;

    select count(*)

    from @T t

    cross apply

    (

    select count(*) as Cnt

    from dbo.Hash_131072 h

    where h.Value = t.Value

    ) c

    where c.Cnt > 0;

    select count(*)

    from @T t

    cross apply

    (

    select count(*) as Cnt

    from dbo.Hash_16384 h

    where h.Value = t.Value

    ) c

    where c.Cnt > 0;

    select count(*)

    from @T t

    cross apply

    (

    select count(*) as Cnt

    from dbo.Hash_1024 h

    where h.Value = t.Value

    ) c

    where c.Cnt > 0;

    select count(*)

    from @T t

    cross apply

    (

    select count(*) as Cnt

    from dbo.NonClusteredIdx h

    where h.Value = t.Value

    ) c

    where c.Cnt > 0;

    ```


    *Listing 5-14. Hash and Nonclustered Indexes’ Point Lookup Performance: Selecting
    Data*


    Table [5-1](#A340879_2_En_5_Chapter.html#Tab1) shows the execution time of the
    queries in my environment. With a sufficient number of buckets, hash indexes outperform
    nonclustered indexes. However, an insufficient number of buckets and long row
    chains significantly degrade their performance, making them less efficient than
    nonclustered indexes.


    **Table 5-1. Execution Time of Queries**


    | | `Hash_131072` | `Hash_16384` | `Hash_1024` | `NonClusteredIdx` |

    | :--- | :--- | :--- | :--- | :--- |

    | Average Index Row Chain Size | 1 | 4 | 73 | N/A |

    | Execution Time | 62 ms | 74 ms | 129 ms | 78 ms |


    In the end, it all depends on a correct `bucket_count` estimation. Unfortunately,
    the volatility of the data makes this task complicated and requires you to factor
    the future data growth into analysis.


    In some cases, when data is relatively static, you can create hash indexes, overestimating
    the number of buckets there. Consider the catalog entities, for example, the `Customers`
    table and the `CustomerId` and `Phone` columns in it. Hash indexes on those columns
    would improve the performance of point-lookup searches and joins. Even though
    the customer base is growing over time, that growth rate is usually not excessive,
    and reserving one million empty buckets could be sufficient for a long time. It
    will use about 8MB of memory per index, which could be acceptable in most cases.


    Choosing the hash index for the `OrderId` column in the `Orders` table, on the
    other hand, is more dangerous. Load growth and changes in data retention rules
    can make the original `bucket_count` value insufficient. This still can be acceptable
    if you are planning to monitor the system and can afford the downtime while rebuilding
    the index; however, nonclustered index would be the safer choice in this scenario.


    Memory requirements are another factor to consider. With the hash indexes, memory
    usage depends on the number of buckets. The amount of memory required for the
    nonclustered indexes depends on the size of the index key and index cardinality
    (uniqueness of index key values). For example, if a table has a `varchar` column
    with 1,000,000 unique values of 100 bytes each, the nonclustered index on that
    column would require about 800MB to support a Bw-Tree structure and store key
    values on internal and leaf index pages. Alternatively, a hash index with 2,097,152
    buckets will use just 16MB of memory.


    To summarize, for point-lookup and equality joins, create the hash indexes only
    when you can correctly estimate the number of buckets, factoring future data growth
    into the analysis. You should also monitor them and can afford the downtime rebuilding
    the indexes when `bucket_count` becomes insufficient. Otherwise, use nonclustered
    indexes, which are the safer choice and do not depend on the bucket count.'
