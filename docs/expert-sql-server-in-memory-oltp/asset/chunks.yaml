- fmt: '# 列存储索引的数据修改与内部结构


    从概念上讲，每个可更新的列存储索引都包含两个额外的元素以支持数据修改。第一个是删除位图，它指明了表中哪些行已被删除。第二个结构是增量存储，它包含了新插入的行。在常规的数据修改过程中，`SQL
    Server` 不会更新压缩行组中的数据。每次删除存储在压缩行组中的一行时，`SQL Server` 都会将有关该已删除行的信息添加到删除位图中。原始行不会发生任何变化，它仍然存储在行组中。然而，`SQL
    Server` 会在查询执行期间检查删除位图，从而将已删除的行排除在处理之外。


    类似地，当你向列存储索引插入数据时，数据会进入增量存储。更新存储在压缩行组中的行也不会更改行数据。这种更新会触发一行的删除，这实际上是在删除位图中插入一条记录，并将该行的新版本插入到增量存储中。但是，对增量存储中未压缩行的任何数据修改都会在增量存储中就地完成。


    增量存储和删除位图的内部实现因不同技术而异。对于基于磁盘的表，增量存储和删除位图都是作为一组内部 `B-Tree` 表来实现的。每个表分区可以有一个删除位图表和多个增量存储表，如图
    7-4 所示。内存中 `OLTP` 的实现则略有不同，本章稍后将看到。


    ![A340879_2_En_7_Fig4_HTML.jpg](A340879_2_En_7_Fig4_HTML.jpg)

    *图 7-4。基于磁盘的聚集列存储索引结构*


    > 注意：内存中 `OLTP` 的文档通常将增量存储称为“尾部”，将删除位图称为“已删除行表”。然而，在本书中，我将使用经典术语。


    在某个时间点，`SQL Server` 会压缩增量存储中的数据，创建另一个压缩行组。最常见的情况是当增量存储达到 `1,048,576` 行时发生；然而，对于基于磁盘的表，也可以通过重新组织索引来强制进行此压缩。对于内存优化表，仅当增量存储填满时才会触发增量存储压缩。


    让我们详细看看内存中 `OLTP` 的列存储索引实现。


    ## 聚集列存储索引


    从 `SQL Server 2016` 开始，您可以在内存优化表上创建聚集列存储索引。但是，不要因为列存储索引被定义为聚集而感到困惑。与基于磁盘的表相反，内存优化表上的聚集列存储索引是保存数据副本的独立数据结构。在此上下文中，“聚集”意味着这些索引包含表中的所有列。


    具有聚集列存储索引的内存优化表包含隐藏列 `columnstore RID`，该列用作列存储索引中的行定位符。与基于磁盘的列存储索引一样，它由行组 `ID`
    和行在行组中的位置组成。内存中 `OLTP` 使用此列作为删除位图中的行定位符，该删除位图是作为具有非聚集范围索引的内部表实现的。


    内存优化列存储索引没有专用的增量存储。内存优化表中最近的行成为增量存储。当您创建聚集列存储索引时，内存中 `OLTP` 为增量存储中的行使用另一个内存使用者。来自
    `INSERT` 或 `UPDATE` 操作的所有新行对象都从这个 `varheap` 中分配。图 7-5 说明了这一点。


    ![A340879_2_En_7_Fig5_HTML.jpg](A340879_2_En_7_Fig5_HTML.jpg)

    *图 7-5。内存优化表上的聚集列存储索引*


    表中的索引行链可以链接来自主表堆和增量存储 `varheap` 的行。


    让我们看一个例子，并创建一个带有聚集列存储索引的表，如清单 7-2 所示。表创建后，让我们使用 `sys.indexes` 目录视图查看表上定义的索引。


    ```

    create table dbo.OrderItems

    (

    OrderItemID int identity(1,1) not null

    constraint PK_OrderItems

    primary key nonclustered hash

    with (bucket_count = 4194329)

    ,OrderId int not null

    ,ArticleId int not null

    ,SalesPrice money not null

    ,index CCI_OrderItems clustered columnstore

    )

    with (memory_optimized = on, durability = schema_and_data);

    select index_id, name, type, type_desc, compression_delay

    from sys.indexes

    where object_id = object_id(''dbo.OrderItems'');

    ```

    *清单 7-2。创建带有列存储索引的内存优化表*


    如图 7-6 所示，该表有两个索引：一个实现为哈希索引的主键和一个聚集列存储索引。我想重申一下，尽管索引定义和 `index_id=1` 中有“聚集”一词，但聚集列存储索引并不代表表数据的主要存储格式。它仅表示所有表列都包含在索引中。


    ![A340879_2_En_7_Fig6_HTML.jpg](A340879_2_En_7_Fig6_HTML.jpg)

    *图 7-6。内存优化表上的索引*


    与哈希索引和非聚集索引相反（这些索引在数据加载到内存时会重新创建），`SQL Server` 将列存储索引持久保存在磁盘上。我将在第 10 章更深入地讨论内存中
    `OLTP` 的数据存储。


    让我们用 `3,200,000` 行填充该表，如清单 7-3 所示。


    ```

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N4 as t2) -- 16,777,316 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.OrderItems(OrderId, ArticleId, SalesPrice)

    select ID / 3 + 1, ID % 50000, 49.99

    from Ids

    where ID <= 3200000;

    ```

    *清单 7-3。用数据填充表并分析内存使用者*'
  raw: 'Conceptually, each updatable columnstore index includes two additional elements
    to support data modifications. The first is the delete bitmap, which indicates
    what rows were deleted from a table. The second structure is the delta store,
    which includes newly inserted rows. SQL Server does not update the data in compressed
    row groups during regular data modifications. Every time you delete a row that
    is stored in a compressed row group, SQL Server adds information about the deleted
    row to the delete bitmap. Nothing happens to the original row. It is still stored
    in a row group. However, SQL Server checks the delete bitmap during query execution,
    excluding deleted rows from the processing.


    Similarly, when you insert data into a columnstore index, it goes into a delta
    store. Updating a row that is stored in a compressed row group does not change
    the row data either. Such an update triggers the deletion of a row, which is,
    in fact, insertion to a delete bitmap and insertion of a new version of a row
    to a delta store. However, any data modifications of the uncompressed rows in
    a delta store are done in place in the delta store.


    The internal implementation of the delta store and the delete bitmap varies depending
    on the different technologies. With disk-based tables, both the delta store and
    delete bitmap are implemented as the set of internal B-Tree tables . Each table
    partition can have one delete bitmap table and multiple delta store tables, as
    shown in Figure [7-4](#A340879_2_En_7_Chapter.html#Fig4). The In-Memory OLTP implementation
    is a bit different, as you will see later in the chapter.


    ![A340879_2_En_7_Fig4_HTML.jpg](A340879_2_En_7_Fig4_HTML.jpg)


    Figure 7-4.


    Disk-based clustered columnstore index structure Note


    The In-Memory OLTP documentation often references the delta store as the tail
    and the delete bitmap as the deleted rows table. In this book, however, I will
    use classic terminology.


    At some point, SQL Server compresses the data in the delta store, creating another
    compressed row group. Most often it happens when the delta store reaches 1,048,576
    rows; however, with disk-based tables, this compression can also be forced by
    reorganizing the index. With memory-optimized tables, delta store compression
    is triggered only when the delta store fills up.


    Let’s look at the In-Memory OLTP implementation of columnstore indexes in detail.


    ## Clustered Columnstore Indexes


    Starting with SQL Server 2016, you can create clustered columnstore indexes on
    memory-optimized tables. Do not be confused by the definition of columnstore indexes
    as clustered, however. As the opposite of disk-based tables, clustered columnstore
    indexes on memory-optimized tables are separate data structures that keep copies
    of the data. In this context, clustered means that those indexes include all columns
    from the table.


    The memory-optimized tables with clustered columnstore indexes have the hidden
    column columnstore RID, which is used as the row locator in the columnstore index.
    As with disk-based columnstore indexes, it consists of the row group ID and position
    of the row in the row group. In-Memory OLTP uses this column as the row locator
    in the delete bitmap, which is implemented as an internal table with a nonclustered
    range index.


    Memory-optimized columnstore indexes do not have a dedicated delta store. The
    most recent rows in the memory-optimized table become the delta store. When you
    create a clustered columnstore index, In-Memory OLTP uses another memory consumer
    for the rows in the delta store. All new row objects from `INSERT` or `UPDATE`
    operations are allocated from this varheap. Figure [7-5](#A340879_2_En_7_Chapter.html#Fig5)
    illustrates that.


    ![A340879_2_En_7_Fig5_HTML.jpg](A340879_2_En_7_Fig5_HTML.jpg)


    Figure 7-5.


    Clustered columnstore index on memory-optimized table


    The index row chains in the table can link the rows from both, main table heap
    and the delta store varheaps.


    Let’s look at an example and create a table with a clustered columnstore index,
    as shown in Listing [7-2](#A340879_2_En_7_Chapter.html#Par40). After the table
    is created, let’s look at the indexes defined on the table using the `sys.indexes`
    catalog view.


    ```

    create table dbo.OrderItems

    (

    OrderItemID int identity(1,1) not null

    constraint PK_OrderItems

    primary key nonclustered hash

    with (bucket_count = 4194329)

    ,OrderId int not null

    ,ArticleId int not null

    ,SalesPrice money not null

    ,index CCI_OrderItems clustered columnstore

    )

    with (memory_optimized = on, durability = schema_and_data);

    select index_id, name, type, type_desc, compression_delay

    from sys.indexes

    where object_id = object_id(''dbo.OrderItems'');

    Listing 7-2.

    Creating Memory-Optimized Table with Columnstore Index

    ```


    As you can see in Figure [7-6](#A340879_2_En_7_Chapter.html#Fig6), the table has
    two indexes: a primary key implemented as the hash index and a clustered columnstore
    index. I would like to reiterate that despite the term clustered in the index
    definition and `index_id=1`, the clustered columnstore index does not represent
    the main storage format for the table data. It just indicates that all table columns
    are included in the index.


    ![A340879_2_En_7_Fig6_HTML.jpg](A340879_2_En_7_Fig6_HTML.jpg)


    Figure 7-6.


    Indexes on memory-optimized table


    As the opposite of hash and nonclustered indexes, which are re-created when data
    is loaded into memory, SQL Server persists columnstore indexes on disk. I will
    talk about In-Memory OLTP data storage in greater depth in Chapter [10](#A340879_2_En_10_Chapter.html).


    Let’s populate the table with 3,200,000 rows, as shown in Listing [7-3](#A340879_2_En_7_Chapter.html#Par44).


    ```

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N4 as t2) -- 16,777,316 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.OrderItems(OrderId, ArticleId, SalesPrice)

    select ID / 3 + 1, ID % 50000, 49.99

    from Ids

    where ID <= 3200000;

    Listing 7-3.

    Populating the Table with Data and Analyzing Memory Consumers

    ```'
  trans: '# 列存储索引的数据修改与内部结构


    从概念上讲，每个可更新的列存储索引都包含两个额外的元素以支持数据修改。第一个是**删除位图**，它指明了表中哪些行已被删除。第二个结构是**增量存储**，它包含了新插入的行。在常规的数据修改过程中，`SQL
    Server` 不会更新压缩行组中的数据。每次删除存储在压缩行组中的一行时，`SQL Server` 都会将有关该已删除行的信息添加到删除位图中。原始行不会发生任何变化，它仍然存储在行组中。然而，`SQL
    Server` 会在查询执行期间检查删除位图，从而将已删除的行排除在处理之外。


    类似地，当你向列存储索引插入数据时，数据会进入增量存储。更新存储在压缩行组中的行也不会更改行数据。这种更新会触发一行的删除，这实际上是在删除位图中插入一条记录，并将该行的新版本插入到增量存储中。但是，对增量存储中未压缩行的任何数据修改都会在增量存储中就地完成。


    增量存储和删除位图的内部实现因不同技术而异。对于基于磁盘的表，增量存储和删除位图都是作为一组内部 `B-Tree` 表来实现的。每个表分区可以有一个删除位图表和多个增量存储表，如图
    7-4 所示。内存中 `OLTP` 的实现则略有不同，本章稍后将看到。


    ![A340879_2_En_7_Fig4_HTML.jpg](img/A340879_2_En_7_Fig4_HTML.jpg)

    *图 7-4。基于磁盘的聚集列存储索引结构*


    > 注意：内存中 `OLTP` 的文档通常将增量存储称为“尾部”，将删除位图称为“已删除行表”。然而，在本书中，我将使用经典术语。


    在某个时间点，`SQL Server` 会压缩增量存储中的数据，创建另一个压缩行组。最常见的情况是当增量存储达到 `1,048,576` 行时发生；然而，对于基于磁盘的表，也可以通过重新组织索引来强制进行此压缩。对于内存优化表，仅当增量存储填满时才会触发增量存储压缩。


    让我们详细看看内存中 `OLTP` 的列存储索引实现。


    ## 聚集列存储索引


    从 `SQL Server 2016` 开始，您可以在内存优化表上创建聚集列存储索引。但是，不要因为列存储索引被定义为聚集而感到困惑。与基于磁盘的表相反，内存优化表上的聚集列存储索引是保存数据副本的独立数据结构。在此上下文中，“聚集”意味着这些索引包含表中的所有列。


    具有聚集列存储索引的内存优化表包含隐藏列 `columnstore RID`，该列用作列存储索引中的行定位符。与基于磁盘的列存储索引一样，它由行组 `ID`
    和行在行组中的位置组成。内存中 `OLTP` 使用此列作为删除位图中的行定位符，该删除位图是作为具有非聚集范围索引的内部表实现的。


    内存优化列存储索引没有专用的增量存储。内存优化表中最近的行成为增量存储。当您创建聚集列存储索引时，内存中 `OLTP` 为增量存储中的行使用另一个内存使用者。来自
    `INSERT` 或 `UPDATE` 操作的所有新行对象都从这个 `varheap` 中分配。图 7-5 说明了这一点。


    ![A340879_2_En_7_Fig5_HTML.jpg](img/A340879_2_En_7_Fig5_HTML.jpg)

    *图 7-5。内存优化表上的聚集列存储索引*


    表中的索引行链可以链接来自主表堆和增量存储 `varheap` 的行。


    让我们看一个例子，并创建一个带有聚集列存储索引的表，如清单 7-2 所示。表创建后，让我们使用 `sys.indexes` 目录视图查看表上定义的索引。


    ```

    create table dbo.OrderItems

    (

    OrderItemID int identity(1,1) not null

    constraint PK_OrderItems

    primary key nonclustered hash

    with (bucket_count = 4194329)

    ,OrderId int not null

    ,ArticleId int not null

    ,SalesPrice money not null

    ,index CCI_OrderItems clustered columnstore

    )

    with (memory_optimized = on, durability = schema_and_data);

    select index_id, name, type, type_desc, compression_delay

    from sys.indexes

    where object_id = object_id(''dbo.OrderItems'');

    ```

    *清单 7-2。创建带有列存储索引的内存优化表*


    如图 7-6 所示，该表有两个索引：一个实现为哈希索引的主键和一个聚集列存储索引。我想重申一下，尽管索引定义和 `index_id=1` 中有“聚集”一词，但聚集列存储索引并不代表表数据的主要存储格式。它仅表示所有表列都包含在索引中。


    ![A340879_2_En_7_Fig6_HTML.jpg](img/A340879_2_En_7_Fig6_HTML.jpg)

    *图 7-6。内存优化表上的索引*


    与哈希索引和非聚集索引相反（这些索引在数据加载到内存时会重新创建），`SQL Server` 将列存储索引持久保存在磁盘上。我将在第 10 章更深入地讨论内存中
    `OLTP` 的数据存储。


    让我们用 `3,200,000` 行填充该表，如清单 7-3 所示。


    ```

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N4 as t2) -- 16,777,316 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.OrderItems(OrderId, ArticleId, SalesPrice)

    select ID / 3 + 1, ID % 50000, 49.99

    from Ids

    where ID <= 3200000;

    ```

    *清单 7-3。用数据填充表并分析内存使用者*'
- fmt: 'Listing [7-4](#A340879_2_En_7_Chapter.html#Par46) shows the code that analyzes
    memory consumers for the `dbo.OrderItems` table.


    ```sql

    select

    a.xtp_object_id, a.type_desc, a.minor_id

    ,c.memory_consumer_id as [mc id]

    ,c.memory_consumer_type_desc as [mc type]

    ,c.memory_consumer_desc as [description]

    ,c.allocation_count as [allocs]

    ,c.allocated_bytes / 1024 as [Allocated KB]

    ,c.used_bytes / 1024 as [Used KB]

    from

    sys.dm_db_xtp_memory_consumers c join

    sys.memory_optimized_tables_internal_attributes a on

    a.object_id = c.object_id and a.xtp_object_id = c.xtp_object_id

    where

    c.object_id = object_id(''dbo.OrderItems'');

    Listing 7-4.

    Populating the Table with Data and Analyzing Memory Consumers

    ```


    Figure [7-7](#A340879_2_En_7_Chapter.html#Fig7) shows the output from Listing
    [7-4](#A340879_2_En_7_Chapter.html#Par46). As you can see, the main table object
    (the first four rows in the output) has four memory consumers. The `HKCS_COMPRESSED`
    consumer stores compressed row groups. The table heap consumer with `id=74` is
    providing memory for the delta store. All new data rows in the table are allocated
    there. Another table heap with `id=75` is the main table heap, and it is storing
    the rows that were already compressed in the columnstore index. The data has not
    been compressed yet, and therefore this consumer does not use any memory.


    ![A340879_2_En_7_Fig7_HTML.jpg](A340879_2_En_7_Fig7_HTML.jpg)

    Figure 7-7.

    Memory consumers after table has been populated with the data


    Columnstore indexes have several other internal objects .


    *   `DELETED_ROWS_TABLE` is an internal table that stores the delete bitmap, which
    is the information about the deleted rows. It is implemented as a nonclustered
    (range) index and contains a columnstore locator (RID) of the deleted rows.

    *   `ROW_GROUPS_INFO_TABLE` stores the information about row groups in columnstore
    indexes.

    *   `SEGMENTS_TABLE` stores the information about column segments in the row groups.

    *   `DICTIONARIES_TABLE` stores columnstore index dictionaries.


    There is the background process called the tuple mover, which wakes up about every
    two minutes and estimates the number of rows in the delta store. In the case,
    when it estimates that the delta store has at least 1,048,576 rows, the tuple
    mover creates the new row group (or groups) by compressing and encoding the rows
    from the delta store. During compression, the tuple mover updates the row locator
    RID column in the rows from the delta store, which generates the new versions
    of the rows. The memory for the new row objects are allocated from the main table
    heap.


    Finally, the tuple mover deletes (populates the `EndTs` timestamp) the compressed
    rows from the delta store, which will be eventually deallocated by the garbage
    collector process.


    Figure [7-8](#A340879_2_En_7_Chapter.html#Fig8) illustrates the memory consumers
    after the tuple mover has compressed the data. As you can see, rows have been
    moved from the delta store to the main table heaps, and compressed data is also
    stored in the `HKCS_COMPRESSED` allocator.


    ![A340879_2_En_7_Fig8_HTML.jpg](A340879_2_En_7_Fig8_HTML.jpg)

    Figure 7-8.

    Memory consumers after delta store is compressed


    Let’s look what happens when you delete some data. Listing [7-5](#A340879_2_En_7_Chapter.html#Par57)
    shows the statement that deletes every 100th row in the table.


    ```sql

    delete from dbo.OrderItems where OrderItemId % 100 = 0;

    Listing 7-5.

    Deleting 1 Percent of the Rows

    ```


    As I already mentioned, SQL Server does not remove deleted rows from columnstore
    indexes. The information (RID) of deleted rows is inserted into the delete bitmap,
    which is displayed as `DELETED_ROWS_TABLE` in Figure [7-9](#A340879_2_En_7_Chapter.html#Fig9).


    ![A340879_2_En_7_Fig9_HTML.jpg](A340879_2_En_7_Fig9_HTML.jpg)

    Figure 7-9.

    Memory consumers after rows were deleted


    You can obtain detailed information about columnstore index row groups from the
    `sys.dm_db_column_store_row_group_physical_stats` view, as shown in Listing [7-6](#A340879_2_En_7_Chapter.html#Par60).


    ```sql

    select row_group_id, state_desc, total_rows, deleted_rows

    ,size_in_bytes, trim_reason_desc

    from sys.dm_db_column_store_row_group_physical_stats

    where object_id = object_id(''dbo.OrderItems'')

    order by row_group_id

    Listing 7-6.

    Analyzing Row Groups

    ```


    Figure [7-10](#A340879_2_En_7_Chapter.html#Fig10) shows the output of the view.
    The row group with `row_group_id=-1` corresponds to the delta store.


    ![A340879_2_En_7_Fig10_HTML.jpg](A340879_2_En_7_Fig10_HTML.jpg)

    Figure 7-10.

    Row group statistics


    The `trim_reason_desc` column indicates why the compressed row group has less
    than 1,048,476 rows. For memory-optimized tables, it can contain one of the following
    values:


    *   `NO_TRIM` indicates that the row group is fully populated.

    *   `STATS_MISMATCH` indicates an incorrect estimation of the delta store size.

    *   `SPILLOVER` indicates that the row group contains leftover rows after all
    full row groups were created. SQL Server compresses those rows into the smaller
    row group if there are more than 102,500 rows in the delta store. Otherwise, the
    rows remain in the delta store, as shown in Figure [7-10](#A340879_2_En_7_Chapter.html#Fig10).

    *   `MEMORY_LIMITATION` indicates that the system did not have enough memory to
    compress all the rows together.

    *   `DICTIONARY_SIZE` indicates that the dictionary grew too big to compress all
    the rows together.'
