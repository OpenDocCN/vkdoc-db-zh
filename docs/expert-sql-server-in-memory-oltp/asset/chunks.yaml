- fmt: '# 1. Why In-Memory OLTP?


    This introductory chapter explains the importance of in-memory databases and the
    problems they address. It provides an overview of the Microsoft In-Memory OLTP
    implementation (code name `Hekaton`) and its design goals. It discusses the high-level
    architecture of the In-Memory OLTP Engine and how it is integrated into `SQL Server`.


    Finally, this chapter compares the `SQL Server` in-memory database product with
    several other solutions available.


    ## Background


    Way back when `SQL Server` and other major databases were originally designed,
    hardware was expensive. Servers at that time had just one or very few CPUs and
    a small amount of installed memory. Database servers had to work with data that
    resided on disk, loading it into memory on demand.


    The situation has changed dramatically since then. During the last 30 years, memory
    prices have dropped by a factor of 10 every 5 years. Hardware has become more
    affordable. It is now entirely possible to buy a server with 32 cores and 1TB
    of RAM for less than $50,000. While it is also true that databases have become
    larger, it is often possible for active operational data to fit into the memory.


    Obviously, it is beneficial to have data cached in the buffer pool. It reduces
    the load on the I/O subsystem and improves system performance. However, when systems
    work under a heavy concurrent load, this is often not enough to obtain the required
    throughput. `SQL Server` manages and protects page structures in memory, which
    introduces large overhead and does not scale well. Even with row-level locking,
    multiple sessions cannot modify data on the same data page simultaneously and
    must wait for each other.


    Perhaps the last sentence needs to be clarified. Obviously, multiple sessions
    can modify data rows on the same data page, holding exclusive (`X`) locks on different
    rows simultaneously. However, they cannot update physical data page and row objects
    simultaneously because this could corrupt the in-memory page structure. `SQL Server`
    addresses this problem by protecting pages with latches. Latches work in a similar
    manner to locks, protecting internal `SQL Server` data structures on the physical
    level by serializing access to them, so only one thread can update data on the
    data page in memory at any given point of time.


    In the end, this limits the improvements that can be achieved with the current
    database engine’s architecture. Although you can scale hardware by adding more
    CPUs and cores, that serialization quickly becomes a bottleneck and a limiting
    factor in improving system scalability. Likewise, you cannot improve performance
    by increasing the CPU clock speed because the silicon chips would melt down. Therefore,
    the only feasible way to improve database system performance is by reducing the
    number of CPU instructions that need to be executed to perform an action.


    Unfortunately, code optimization is not enough by itself. Consider the situation
    where you need to update a row in a table. Even when you know the clustered index
    key value, that operation needs to traverse the index tree, obtaining latches
    and locks on the data pages and a row. In some cases, it needs to update nonclustered
    indexes, obtaining the latches and locks there. All of that generates log records
    and requires writing them and the dirty data pages to disk.


    All of those actions can lead to a hundred thousand or even millions of CPU instructions
    to execute. Code optimization can help reduce this number to some degree, but
    it is impossible to reduce it dramatically without changing the system architecture
    and the way the system stores and works with data.


    These trends and architectural limitations led the Microsoft team to the conclusion
    that a true in-memory solution should be built using different design principles
    and architecture than the classic `SQL Server` Database Engine. The original concept
    was proposed at the end of 2008, serious planning and design started in 2010,
    actual development began in 2011, and the technology was finally released to the
    public in `SQL Server 2014`.


    The main goal of the project was to build a solution that would be 100 times faster
    than the existing `SQL Server` Database Engine, which explains the code name `Hekaton`
    (Greek for “100”). This goal has yet to be achieved; however, it is not uncommon
    for In-Memory OLTP to provide 20 to 40 times faster performance in certain scenarios.


    It is also worth mentioning that the `Hekaton` design has been targeted toward
    OLTP workloads. As we all know, specialized solutions designed for particular
    tasks and workloads usually outperform general-purpose systems in the targeted
    areas. The same is true for In-Memory OLTP. It shines with large and busy OLTP
    systems that support hundreds or even thousands of concurrent transactions. At
    the same time, the original release of In-Memory OLTP in `SQL Server 2014` did
    not work well for a data warehouse workload, where other `SQL Server` technologies
    outperformed it.


    The situation changes with the `SQL Server 2016` release. The second release of
    In-Memory OLTP supports columnstore indexes, which allow you to run real-time
    operation analytics queries against hot OLTP data. Nevertheless, the technology
    is not as mature as disk-based column-based storage, and you should not consider
    it an in-memory data warehouse solution.


    In-Memory OLTP has been designed with the following goals :


    *   Optimize data storage for main memory: Data in In-Memory OLTP is not stored
    on disk-based data pages, and it does not mimic a disk-based storage structure
    when loaded into memory. This permits the elimination of the complex buffer pool
    structure and the code that manages it. Moreover, regular (non-columnstore) indexes
    are not persisted on disk, and they are ­re-created upon startup when the data
    from memory-resident tables is loaded into memory.

    *   Eliminate latches and locks: All In-Memory OLTP internal data structures are
    latch- and lock-free. In-Memory OLTP uses a multiversion concurrency control to
    provide transaction consistency. From a user standpoint, it behaves like the regular
    `SNAPSHOT` transaction isolation level; however, it does not use a locking or
    `tempdb` version store under the hood. This schema allows multiple sessions to
    work with the same data without locking and blocking each other and provides near-linear
    scalability of the system, allowing it to fully utilize modern multi-CPU/multicore
    hardware.

    *   Use native compilation: `T-SQL` is an interpreted language that provides great
    flexibility at the cost of CPU overhead. Even a simple statement requires hundreds
    of thousands of CPU instructions to execute. The In-Memory OLTP Engine addresses
    this by compiling row-access logic, stored procedures, and user-defined functions
    into native machine code.


    The In-Memory OLTP Engine is fully integrated in the `SQL Server` Database Engine.
    You do not need to perform complex system refactoring, splitting data between
    in-memory and conventional database servers or moving all of the data from the
    database into memory. You can separate in-memory and disk data on a table-by-table
    basis, which allows you to move active operational data into memory, keeping other
    tables and historical data on disk. In some cases, that migration can even be
    done transparently to client applications.


    This sounds too good to be true, and, unfortunately, there are still plenty of
    roadblocks that you may encounter when working with this technology. In `SQL Server
    2014`, In-Memory OLTP supported just a subset of the `SQL Server` data types and
    features, which often required you to perform costly code and schema refactoring
    to utilize it. Even though many of those limitations have been removed in `SQL
    Server 2016`, there are still incompatibilities and restrictions you need to address.


    You should also design the system considering In-Memory OLTP behavior and internal
    implementation to get the most performance improvements from the technology.'
