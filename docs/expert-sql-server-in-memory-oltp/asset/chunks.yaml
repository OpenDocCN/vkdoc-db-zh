    | `begin tran` `select ID, Col` `from dbo.HKData` `with (snapshot)` |   |   |

    |   | `update dbo.HKData` `set Col = -2` `where ID = 2` |   |

    | `select ID, Col` `from dbo.HKData` `with (snapshot)` |   | Return old version
    of a row (`Col = 2`). |

    | `commit` |   | Success. |

    | `begin tran` `select ID, Col` `from dbo.HKData` `with (snapshot)` |   |   |

    |   | `insert into dbo.HKData` `values(10,10)` |   |

    | `select ID, Col` `from dbo.HKData` `with (snapshot)` |   | Does not return new
    row (`10,10`). |

    | `commit` |   | Success. |


    The `SNAPSHOT` isolation level behaves in a similar manner to disk-based tables,
    and it protects from the nonrepeatable reads and phantom reads phenomena. As you
    can guess, it does not need to perform repeatable read and serializable validations
    at the commit stage; therefore, it reduces the load on SQL Server. However, there
    is still snapshot validation, which checks for primary key violations and is done
    in any transaction isolation level.


    Table [8-6](#A340879_2_En_8_Chapter.html#Tab6) shows the code that leads to the
    primary key violation condition. In contrast to disk-based tables, the exception
    is raised at the commit stage rather than at the time of the second `INSERT` operation.


    Table 8-6.


    Primary Key Violation


    | Session 1 | Session 2 | Results |

    | --- | --- | --- |

    | `begin tran` `insert into dbo.HKData` `with (snapshot)` `(ID, Col)` `values(100,100)`
    |   |   |

    |   | `begin tran` `insert into dbo.HKData` `with (snapshot)` `(ID, Col)` `values(100,100)`
    |   |

    | `commit` |   | Successfully commit the first session. |

    |   | `commit` | Msg 41325, Level 16, State 1, Line 0. The current transaction
    failed to commit because of a serializable validation failure. |


    It is worth mentioning that the error number and message are the same with the
    serializable validation failure even though SQL Server validated the different
    rule.


    Write/write conflicts work the same way regardless of the transaction isolation
    level in In-Memory OLTP . SQL Server does not allow a transaction to modify a
    row that has been modified by other uncommitted transactions. Table [8-7](#A340879_2_En_8_Chapter.html#Tab7)
    illustrates this behavior. It uses the `SNAPSHOT` isolation level; however, the
    behavior does not change with different isolation levels.


    Table 8-7.


    Write/Write Conflicts in In-Memory OLTP


    | Session 1 | Session 2 | Results |

    | --- | --- | --- |

    | `begin tran` `select ID, Col` `from dbo.HKData` `with (snapshot)` |   |   |

    |   | `begin tran` `update dbo.HKData` `with (snapshot)` `set Col = -3` `where
    ID = 2` `commit` |   |

    | `update dbo.HKData` `with (snapshot)` `set Col = -2` `where ID = 2` |   | Msg
    41302, Level 16, State 110, Line 1. The current transaction attempted to update
    a record that has been updated since this transaction started. The transaction
    was aborted. Msg 3998, Level 16, State 1, Line 1. The uncommittable transaction
    is detected at the end of the batch. The transaction is rolled back. The statement
    has been terminated. |

    | `begin tran` `select ID, Col` `from dbo.HKData` `with (snapshot)` |   |   |

    |   | `begin tran` `update dbo.HKData` `with (snapshot)` `set Col = -3` `where
    ID = 2` |   |

    | `update dbo.HKData` `with (snapshot)` `set Col = -2` `where ID = 2` |   | Msg
    41302, Level 16, State 110, Line 1. The current transaction attempted to update
    a record that has been updated since this transaction started. The transaction
    was aborted. Msg 3998, Level 16, State 1, Line 1. The uncommittable transaction
    is detected at the end of the batch. The transaction is rolled back. The statement
    has been terminated. |

    |   | `commit` | Successful commit of Session 2 transaction. |'
  trans: '

    同样值得注意的是，在内存优化表的情况下，`REPEATABLE READ`（可重复读）隔离级别可以保护你免受**幻读**现象的影响，而这对于基于磁盘的表来说并非如此。新插入行的
    `BeginTs` 值将超过活动事务的逻辑开始时间（稍后详述），这使得这些行对该事务不可见。


    接下来，让我们在 `SERIALIZABLE`（可序列化）隔离级别中重复这些测试。你可以在表 8-4 中查看代码和执行结果。


    表 8-4. 可序列化事务隔离级别下的并发情况


    | 会话 1 | 会话 2 | 结果 |

    | --- | --- | --- |

    | `begin tran` `select ID, Col` `from dbo.HKData` `with (serializable)` | | |

    | | `update dbo.HKData` `set Col = -2` `where ID = 2` | |

    | `select ID, Col` `from dbo.HKData` `with (serializable)` | | 返回旧行版本 (`Col =
    2`)。 |

    | `commit` | | 消息 41305，级别 16，状态 0，第 0 行。当前事务因可重复读验证失败而未能提交。 |

    | `begin tran` `select ID, Col` `from dbo.HKData` `with (serializable)` | | |

    | | `insert into dbo.HKData` `values(10,10)` | |

    | `select ID, Col` `from dbo.HKData` `with (serializable)` | | 不返回新行 (`10,10`)。
    |

    | `commit` | | 消息 41325，级别 16，状态 0，第 0 行。当前事务因可序列化验证失败而未能提交。 |


    如你所见，`SERIALIZABLE` 隔离级别会阻止会话提交事务，前提是另一个会话插入了新行并违反了可序列化验证。与 `REPEATABLE READ`
    隔离级别类似，这种行为不同于基于磁盘的表，在后者的 `SERIALIZABLE` 事务会成功阻塞其他会话，直到事务完成。


    最后，让我们在 `SNAPSHOT`（快照）隔离级别中重复测试。表 8-5 显示了代码和结果。


    表 8-5. 快照事务隔离级别下的并发情况


    | 会话 1 | 会话 2 | 结果 |

    | --- | --- | --- |

    | `begin tran` `select ID, Col` `from dbo.HKData` `with (snapshot)` | | |

    | | `update dbo.HKData` `set Col = -2` `where ID = 2` | |

    | `select ID, Col` `from dbo.HKData` `with (snapshot)` | | 返回旧行版本 (`Col = 2`)。
    |

    | `commit` | | 成功。 |

    | `begin tran` `select ID, Col` `from dbo.HKData` `with (snapshot)` | | |

    | | `insert into dbo.HKData` `values(10,10)` | |

    | `select ID, Col` `from dbo.HKData` `with (snapshot)` | | 不返回新行 (`10,10`)。 |

    | `commit` | | 成功。 |


    `SNAPSHOT` 隔离级别的行为与基于磁盘的表类似，它可以防止不可重复读和幻读现象。正如你所猜想的，它不需要在提交阶段执行可重复读和可序列化验证；因此，它减轻了
    SQL Server 的负载。但是，仍然存在快照验证，它会检查主键违规，并且在任何事务隔离级别下都会进行。


    表 8-6 显示了导致主键违规条件的代码。与基于磁盘的表相反，异常是在提交阶段而非第二次 `INSERT` 操作时抛出的。


    表 8-6. 主键违规


    | 会话 1 | 会话 2 | 结果 |

    | --- | --- | --- |

    | `begin tran` `insert into dbo.HKData` `with (snapshot)` `(ID, Col)` `values(100,100)`
    | | |

    | | `begin tran` `insert into dbo.HKData` `with (snapshot)` `(ID, Col)` `values(100,100)`
    | |

    | `commit` | | 成功提交第一个会话。 |

    | | `commit` | 消息 41325，级别 16，状态 1，第 0 行。当前事务因可序列化验证失败而未能提交。 |


    值得一提的是，即使 SQL Server 验证的是不同的规则，错误编号和消息也与可序列化验证失败相同。


    在内存 OLTP 中，无论事务隔离级别如何，写/写冲突的工作方式都是相同的。SQL Server 不允许事务修改已被其他未提交事务修改的行。表 8-7 说明了这一行为。它使用了
    `SNAPSHOT` 隔离级别；然而，使用不同的隔离级别时行为不会改变。


    表 8-7. 内存 OLTP 中的写/写冲突


    | 会话 1 | 会话 2 | 结果 |

    | --- | --- | --- |

    | `begin tran` `select ID, Col` `from dbo.HKData` `with (snapshot)` | | |

    | | `begin tran` `update dbo.HKData` `with (snapshot)` `set Col = -3` `where ID
    = 2` `commit` | |

    | `update dbo.HKData` `with (snapshot)` `set Col = -2` `where ID = 2` | | 消息 41302，级别
    16，状态 110，第 1 行。当前事务尝试更新一条记录，但该记录自本事务启动以来已被更新。事务已中止。消息 3998，级别 16，状态 1，第 1 行。在批处理结束时检测到无法提交的事务。事务已回滚。语句已终止。
    |

    | `begin tran` `select ID, Col` `from dbo.HKData` `with (snapshot)` | | |

    | | `begin tran` `update dbo.HKData` `with (snapshot)` `set Col = -3` `where ID
    = 2` | |

    | `update dbo.HKData` `with (snapshot)` `set Col = -2` `where ID = 2` | | 消息 41302，级别
    16，状态 110，第 1 行。当前事务尝试更新一条记录，但该记录自本事务启动以来已被更新。事务已中止。消息 3998，级别 16，状态 1，第 1 行。在批处理结束时检测到无法提交的事务。事务已回滚。语句已终止。
    |

    | | `commit` | 会话 2 的事务成功提交。 |

