    ### 为本地编译存储过程收集执行统计信息


    在查询互操作模式下，当执行计划被缓存时，SQL Server 会收集访问内存优化表的语句的执行统计信息。然而，由于会引入性能影响，它不会收集本地编译模块的执行统计信息。您可以使用
    `sys.sp_xtp_control_proc_exec_stats` 在模块级别启用此类收集，并使用系统存储过程 `sys.sp_xtp_control_query_exec_stats`
    在语句级别启用。


    这两个过程都接受一个布尔参数 `@new_collection_value`，该参数指示是启用还是禁用收集。此外，`sys.sp_xtp_control_query_exec_stats`
    允许您提供 `@database_id` 和 `@xtp_object_id` 值来指定要监控的模块。同样值得注意的是，SQL Server 不会持久化收集设置，您需要在每次
    SQL Server 重启后重新启用统计信息收集。


    重要提示


    收集执行统计信息会降低系统的性能。除非正在进行故障排除，否则请勿收集执行统计信息。此外，考虑将收集限制在特定的本地编译模块，以减少对系统的性能影响。


    当统计信息收集完毕后，您可以通过 `sys.dm_exec_procedure_stats`、`sys.dm_exec_function_stats` 和
    `sys.dm_exec_query_stats` 视图访问它们。


    清单 12-9 展示了使用 `sys.dm_exec_procedure_stats` 视图返回存储过程执行统计信息的代码。该代码未将输出限制为本地编译存储过程；但是，您可以通过联接
    `sys.dm_exec_procedure_stats` 和 `sys.sql_modules` 视图并按 `uses_native_compliation
    = 1` 值进行筛选来实现这一点。


    ```sql

    select

    object_name(ps.object_id) as [Proc Name]

    ,p.query_plan

    ,ps.execution_count as [Exec Cnt]

    ,ps.total_worker_time as [Total CPU]

    ,convert(int,ps.total_worker_time / ps.execution_count)

    as [Avg CPU] -- in Microseconds

    ,ps.total_elapsed_time as [Total Elps]

    ,convert(int,ps.total_elapsed_time / ps.execution_count)

    as [Avg Elps] -- in Microseconds

    ,ps.cached_time as [Cached]

    ,ps.last_execution_time as [Last Exec]

    ,ps.sql_handle

    ,ps.plan_handle

    ,ps.total_logical_reads as [Reads]

    ,ps.total_logical_writes as [Writes]

    from

    sys.dm_exec_procedure_stats ps cross apply

    sys.dm_exec_query_plan(ps.plan_handle) p

    order by

    [Avg CPU] desc

    ```

    清单 12-9.

    分析存储过程执行统计信息


    图 12-7 说明了清单 12-9 中代码的输出。如您所见，在 SQL Server 2016 中，`sql_handle` 和 `plan_handle`
    列都被填充，并且可用于获取存储过程文本和执行计划。同样值得注意的是，没有提供与 I/O 相关的统计信息。本地编译模块仅与内存优化表一起工作，因此不涉及 I/O。


