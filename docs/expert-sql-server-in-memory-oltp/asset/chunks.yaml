  trans: '# 引用完整性强制执行


    在纯 `SNAPSHOT`（快照）隔离级别中不可能强制执行引用完整性，因为事务彼此完全隔离。考虑这样一种情况：一个事务删除了一行，而另一个在原始事务之后启动的事务中，新插入的行引用了该行。`SNAPSHOT`
    隔离级别将阻止事务看到更改，从而违反引用完整性。


    内存中 OLTP 通过为受引用完整性验证影响的表和查询在 `SNAPSHOT` 隔离级别下维护读取和/或扫描集来解决此问题。与 `REPEATABLE READ`（可重复读）和
    `SERIALIZABLE`（可序列化）事务相比，这些集仅为受影响的表维护，而非整个事务。但是，它们会包含在引用完整性检查期间读取的所有行以及应用的谓词。


    当引用表在外键列上没有索引时，这种行为可能会导致问题。类似于基于磁盘的表，当您在被引用的（主）表中删除一行时，SQL Server 将不得不扫描整个引用的（详细）表。除了性能影响外，事务还将维护读取集，该集包含它在扫描期间读取的所有行，无论这些行是否引用了被删除的行。如果任何其他事务更新或删除了读取集中的任何行，原始事务将因违反可重复读取规则的错误而失败。


    让我们看一个例子，并使用清单 8-4 中的代码创建两个表。


    ```sql

    create table dbo.Branches

    (

    BranchId int not null

    constraint PK_Branches

    primary key nonclustered hash with (bucket_count = 4)

    )

    with (memory_optimized = on, durability = schema_only);

    create table dbo.Transactions

    (

    TransactionId int not null

    constraint PK_Transactions

    primary key nonclustered hash with (bucket_count = 4),

    BranchId int not null

    constraint FK_Transactions_Branches

    foreign key references dbo.Branches(BranchId),

    Amount money not null

    )

    with (memory_optimized = on, durability = schema_only);

    insert into dbo.Branches(BranchId) values(1),(10);

    insert into dbo.Transactions(TransactionId,BranchId,Amount)

    values(1,1,10),(2,1,20);

    ```

    清单 8-4.

    引用完整性验证：表创建


    `dbo.Transactions` 表有一个外键约束引用 `dbo.Branches` 表。然而，目前没有行引用 `BranchId = 10` 的行。接下来，让我们运行清单
    8-5 所示的代码，删除此行并保持事务活动状态。


    ```sql

    begin tran

    delete from dbo.Branches with (snapshot) where BranchId = 10;

    ```

    清单 8-5.

    引用完整性验证：第一个会话代码


    `DELETE` 语句将验证外键约束并成功完成。但是，`dbo.Transactions` 表在 `BranchId` 列上没有索引，验证将需要扫描整个表，如图
    8-8 所示。


    ![A340879_2_En_8_Fig8_HTML.jpg](img/A340879_2_En_8_Fig8_HTML.jpg)


    图 8-8.

    引用完整性验证：DELETE 语句的执行计划


    此时，`dbo.Transactions` 表中的所有行都将包含在事务读取集中。如果另一个会话使用清单 8-6 中的代码更新了读取集中的某一行，它将成功，而第一个会话将因违反可重复读取规则的错误而无法提交。


    ```sql

    update dbo.Transactions with (snapshot)

    set Amount = 30

    where TransactionId = 2;

    ```

    清单 8-6.

    引用完整性验证：第二个会话代码


    **重要提示**


    类似于基于磁盘的表，您应该始终在引用表的外键列上创建索引，以避免此问题。


    ## 总结


    内存中 OLTP 支持三种事务隔离级别：`SNAPSHOT`、`REPEATABLE READ` 和 `SERIALIZABLE`。与基于磁盘的表通过获取和保持锁来处理不可重复读和幻读不同，内存中
    OLTP 在事务提交阶段验证数据一致性规则。如果违反规则，将引发异常并且回滚事务。


    可重复读和可序列化验证会给事务处理增加开销。建议您在常规工作负载期间使用 `SNAPSHOT` 隔离级别，除非您需要 `REPEATABLE READ` 或
    `SERIALIZABLE` 的数据一致性。


    SQL Server 执行可重复读和可序列化验证以在系统中强制执行引用完整性。请始终在引用表的外键列上创建索引以提高性能并避免验证错误。


    您可以在跨容器事务中为基于磁盘的表和内存优化表使用不同的事务隔离级别；但是，并非所有组合都受支持。推荐做法是对基于磁盘的表使用 `READ COMMITTED`
    隔离级别，对内存优化表使用 `SNAPSHOT` 隔离级别。


    当您通过互操作引擎在自动提交（单条语句）事务中访问内存优化表时，SQL Server 不需要您指定事务隔离级别。SQL Server 会自动将此类事务提升到
    `SNAPSHOT` 隔离级别。但是，当使用 `BEGIN TRAN` 语句显式启动事务时，您应该指定隔离级别提示。您可以通过启用 `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`
    数据库选项来避免这种情况。在将现有系统移植到使用内存中 OLTP 时，此选项非常有用。


    ## 9. 内存中 OLTP 可编程性


    本章重点介绍 SQL Server 中内存中 OLTP 引擎的可编程性方面。它描述了本机编译的过程，并概述了本机编译模块以及内存中 OLTP 中支持的 T-SQL
    功能。最后，本章比较了几种使用案例的性能，这些案例使用本机编译模块和通过互操作引擎使用解释型 T-SQL 来处理内存优化表中的数据。'
- fmt: '## Native Compilation Overview


    As you already know, memory-optimized tables can be accessed from regular T-SQL
    code using the `Query Interop Engine`. This approach is very flexible. As long
    as you work within the supported feature set, the location of the data is transparent.
    The code does not need to know, nor does it need to worry about, whether it works
    with disk-based or with memory-optimized tables.


    Unfortunately, this flexibility comes at a cost. T-SQL is an interpreted and CPU-intensive
    language. Even a simple T-SQL statement requires thousands, and sometimes millions,
    of CPU instructions to execute. Even though the in-memory data location speeds
    up data access and eliminates latching and locking contentions, the overhead of
    T-SQL interpretation sets limits on the level of performance improvements achievable
    with `In-Memory OLTP`.


    Note

    The native compilation does not help in operational analytics scenarios. `Columnstore`
    indexes can be utilized only in query interop mode.


    ### Performance and Native Compilation


    In practice, it is common to see a system throughput increase of two to four times
    when memory-optimized data is accessed through the `Interop Engine`. To improve
    performance even further, `In-Memory OLTP` utilizes native compilation. As a first
    step, it converts any row-data manipulation and access logic into C code, which
    is compiled into `DLLs` and loaded into SQL Server’s process memory. These `DLLs`
    (one per table) consist of native CPU instructions, and they execute without any
    further code interpretation overhead of T-SQL statements.


    Consider the simple situation where you need to read the value of a fixed-length
    column from a data row. In the case of disk-based tables, SQL Server obtains the
    starting offset and length of the column from the system catalogs, and it performs
    the required manipulations to convert the sequence of bytes to the required data
    type. With memory-optimized tables, the `DLL` already knows the column offset
    and data type. SQL Server can read data from a predefined offset in a row using
    a pointer of the correct data type without any further overhead involved. As you
    can guess, this approach dramatically reduces the number of CPU instructions required
    for the operation.


    ### Limitations and Challenges


    On the flip side, this approach brings some limitations. You cannot change the
    format of a row after the `DLL` is generated. The compiled code would not know
    anything about the changes. This problem is more complicated than it seems, and
    a simple recompilation of the `DLL` does not address it.


    Again, consider the situation where you need to add another nullable column to
    a table. This is a metadata-level operation for disk-based tables, which does
    not change the data in existing table rows. T-SQL would be able to detect that
    column data is not present by analyzing the various data row properties at runtime.


    The situation is far more complicated in the case of memory-optimized tables and
    natively compiled code. It is easy to generate a new version of the `DLL` that
    knows about the new data column; however, that is not enough. The `DLL` needs
    to handle different versions of rows and different data formats depending on the
    presence of column data. While this is technically possible, it adds extra logic
    to the `DLL`, which leads to additional processing instructions, which slows data
    access. Moreover, the logic to support multiple data formats remains in the code
    forever, degrading performance even further with each table alteration.


    As you already know, SQL Server addresses it by rebuilding the table in the background.
    Table alteration generates the new version of the `DLL` and the new table objects,
    converting the data rows to the new format. I will talk more about this process
    in the next chapter.


    ### Native Compilation of T-SQL Modules


    To reduce the overhead of the T-SQL interpretation even further, the `In-Memory
    OLTP Engine` allows you to perform native compilation of T-SQL modules, such as
    the stored procedures, scalar user-defined functions, and triggers. These modules
    are compiled in the same way as table-related `DLLs` and are also loaded into
    the SQL Server process memory.


    Native compilation utilizes both the SQL Server and `In-Memory OLTP` engines.
    As a first step, SQL Server parses the T-SQL code and, in the case of T-SQL modules
    , generates an execution plan using the `Query Optimizer` . At the end of this
    stage, SQL Server generates a structure called a mixed abstract tree (`MAT`),
    which represents metadata, imperative logic, expressions, and query plans. I will
    discuss how SQL Server optimizes natively compiled modules later in this chapter.


    As a next step, `In-Memory OLTP` transforms `MAT` to another structure called
    a pure imperative tree (`PAT`), which is used to generate source code that is
    compiled and linked into the `DLL`.


    ![A340879_2_En_9_Fig1_HTML.jpg](A340879_2_En_9_Fig1_HTML.jpg)

    Figure 9-1. Native compilation in SQL Server


    The code generated for native compilation uses the plain C language and is very
    efficient. It is hard to read, however. For example, every method is implemented
    as a single function, which does not call other functions but rather implements
    its code inline using `GOTO` as a control flow statement. The intention has never
    been to generate human-readable code; it is used as the source for native compilation
    only.


    ### DLL Management and Security


    Binary `DLL` files are not persisted in a database backup. SQL Server re-creates
    table-related `DLL s` on database startup and module-related `DLLs` at the time
    of the first call. This approach mitigates security risks from hackers, who can
    substitute `DLLs` with malicious copies. It is important to remember this behavior
    because it can add overhead at database startup time and change the execution
    plans of natively compiled modules after a database restart.


    Tip

    Natively compiled modules are usually faster than interpreted T-SQL ones. However,
    their compilation time can be significantly longer compared to T-SQL modules.
    You should remember this behavior and avoid using extremely short timeouts in
    natively compiled module calls.


    ### File Storage and Structure


    SQL Server places binary `DLLs` and all other native compilation-related files
    in an `XTP` subfolder under the main SQL Server data directory. It groups files
    on a per-database basis by creating another level of subfolders. Figure 9-2 shows
    the content of the folder for the database (with an ID of 9), which contains several
    `In-Memory OLTP` objects.


    ![A340879_2_En_9_Fig2_HTML.jpg](A340879_2_En_9_Fig2_HTML.jpg)

    Figure 9-2. Folder with natively compiled objects


    All the file names start with the prefix `xtp_` followed either by a `p` (stored
    procedure, scalar function, or trigger) or by a `t` (table), which indicates the
    object type. The two last parts of the name include the database and object IDs
    for the object.


    File extensions determine the type of the file , as shown here:


    *   `*.mat.xml` files store an XML representation of the `MAT` structure.

    *   `*.c` files are the source file generated by the C code generator.

    *   `*.obj` are the object files generated by the C compiler.

    *   `*.pub` are symbol files produced by the C compiler.

    *   `*.out` are log files from the C compiler.

    *   `*.dll` are natively compiled `DLLs` generated by the C linker. Those files
    are loaded into SQL Server memory and used by the `In-Memory OLTP` engine.


    Tip

    You can open and analyze the C source code and XML `MAT` in the text editor application
    to get a sense of the native compilation process.'
  raw: '## Native Compilation Overview


    As you already know, memory-optimized tables can be accessed from regular T-SQL
    code using the Query Interop Engine. This approach is very flexible. As long as
    you work within the supported feature set, the location of the data is transparent.
    The code does not need to know, nor does it need to worry about, whether it works
    with disk-based or with memory-optimized tables.


    Unfortunately, this flexibility comes at a cost. T-SQL is an interpreted and CPU-intensive
    language. Even a simple T-SQL statement requires thousands, and sometimes millions,
    of CPU instructions to execute. Even though the in-memory data location speeds
    up data access and eliminates latching and locking contentions, the overhead of
    T-SQL interpretation sets limits on the level of performance improvements achievable
    with In-Memory OLTP.


    Note


    The native compilation does not help in operational analytics scenarios. Columnstore
    indexes can be utilized only in query interop mode.


    In practice, it is common to see a system throughput increase of two to four times
    when memory-optimized data is accessed through the Interop Engine. To improve
    performance even further, In-Memory OLTP utilizes native compilation. As a first
    step, it converts any row-data manipulation and access logic into C code, which
    is compiled into DLLs and loaded into SQL Server’s process memory. These DLLs
    (one per table) consist of native CPU instructions, and they execute without any
    further code interpretation overhead of T-SQL statements.


    Consider the simple situation where you need to read the value of a fixed-length
    column from a data row. In the case of disk-based tables, SQL Server obtains the
    starting offset and length of the column from the system catalogs, and it performs
    the required manipulations to convert the sequence of bytes to the required data
    type. With memory-optimized tables, the DLL already knows the column offset and
    data type. SQL Server can read data from a predefined offset in a row using a
    pointer of the correct data type without any further overhead involved. As you
    can guess, this approach dramatically reduces the number of CPU instructions required
    for the operation.


    On the flip side, this approach brings some limitations. You cannot change the
    format of a row after the DLL is generated. The compiled code would not know anything
    about the changes. This problem is more complicated than it seems, and a simple
    recompilation of the DLL does not address it.


    Again, consider the situation where you need to add another nullable column to
    a table. This is a metadata-level operation for disk-based tables, which does
    not change the data in existing table rows. T-SQL would be able to detect that
    column data is not present by analyzing the various data row properties at runtime.


    The situation is far more complicated in the case of memory-optimized tables and
    natively compiled code. It is easy to generate a new version of the DLL that knows
    about the new data column; however, that is not enough. The DLL needs to handle
    different versions of rows and different data formats depending on the presence
    of column data. While this is technically possible, it adds extra logic to the
    DLL, which leads to additional processing instructions, which slows data access.
    Moreover, the logic to support multiple data formats remains in the code forever,
    degrading performance even further with each table alteration.


    As you already know, SQL Server addresses it by rebuilding the table in the background.
    Table alteration generates the new version of the DLL and the new table objects,
    converting the data rows to the new format. I will talk more about this process
    in the next chapter.


    To reduce the overhead of the T-SQL interpretation even further, the In-Memory
    OLTP Engine allows you to perform native compilation of T-SQL modules, such as
    the stored procedures, scalar user-defined functions, and triggers. These modules
    are compiled in the same way as table-related DLLs and are also loaded into the
    SQL Server process memory.


    Native compilation utilizes both the SQL Server and In-Memory OLTP engines. As
    a first step, SQL Server parses the T-SQL code and, in the case of T-SQL modules
    , generates an execution plan using the Query Optimizer . At the end of this stage,
    SQL Server generates a structure called a mixed abstract tree (MAT), which represents
    metadata, imperative logic, expressions, and query plans. I will discuss how SQL
    Server optimizes natively compiled modules later in this chapter.


    As a next step, In-Memory OLTP transforms MAT to another structure called a pure
    imperative tree (PAT), which is used to generate source code that is compiled
    and linked into the DLL.


    Figure [9-1](#A340879_2_En_9_Chapter.html#Fig1) illustrates the process of native
    compilation in SQL Server.


    ![A340879_2_En_9_Fig1_HTML.jpg](A340879_2_En_9_Fig1_HTML.jpg)


    Figure 9-1.


    Native compilation in SQL Server


    The code generated for native compilation uses the plain C language and is very
    efficient. It is hard to read, however. For example, every method is implemented
    as a single function, which does not call other functions but rather implements
    its code inline using `GOTO` as a control flow statement. The intention has never
    been to generate human-readable code; it is used as the source for native compilation
    only.


    Binary DLL files are not persisted in a database backup. SQL Server re-creates
    table-related DLL s on database startup and module-related DLLs at the time of
    the first call. This approach mitigates security risks from hackers, who can substitute
    DLLs with malicious copies. It is important to remember this behavior because
    it can add overhead at database startup time and change the execution plans of
    natively compiled modules after a database restart.


    Tip


    Natively compiled modules are usually faster than interpreted T-SQL ones. However,
    their compilation time can be significantly longer compared to T-SQL modules.
    You should remember this behavior and avoid using extremely short timeouts in
    natively compiled module calls.


    SQL Server places binary DLLs and all other native compilation-related files in
    an `XTP` subfolder under the main SQL Server data directory. It groups files on
    a per-database basis by creating another level of subfolders. Figure [9-2](#A340879_2_En_9_Chapter.html#Fig2)
    shows the content of the folder for the database (with an ID of 9), which contains
    several In-Memory OLTP objects.


    ![A340879_2_En_9_Fig2_HTML.jpg](A340879_2_En_9_Fig2_HTML.jpg)


    Figure 9-2.


    Folder with natively compiled objects


    All the file names start with the prefix `xtp_` followed either by a `p` (stored
    procedure, scalar function, or trigger) or by a `t` (table), which indicates the
    object type. The two last parts of the name include the database and object IDs
    for the object.


    File extensions determine the type of the file , as shown here:


    *   `*.mat.xml` files store an XML representation of the MAT structure.

    *   `*.c` files are the source file generated by the C code generator.

    *   `*.obj` are the object files generated by the C compiler.

    *   `*.pub` are symbol files produced by the C compiler.

    *   `*.out` are log files from the C compiler.

    *   `*.dll` are natively compiled DLLs generated by the C linker. Those files
    are loaded into SQL Server memory and used by the In-Memory OLTP engine.


    Tip


    You can open and analyze the C source code and XML MAT in the text editor application
    to get a sense of the native compilation process.'
  trans: '

    ## 原生编译概述


    正如您已经了解的，通过 `查询互操作引擎`，可以使用常规的 T-SQL 代码访问内存优化表。这种方法非常灵活。只要您使用的是受支持的功能集，数据的位置就是透明的。代码无需知道也无需担心它操作的是基于磁盘的表还是内存优化表。


    不幸的是，这种灵活性是有代价的。T-SQL 是一种解释型且 CPU 密集型的语言。即使是一个简单的 T-SQL 语句，执行时也可能需要数千甚至数百万条 CPU
    指令。尽管内存中的数据位置加快了数据访问速度，并消除了闩锁和锁争用，但 T-SQL 解释的开销限制了 `In-Memory OLTP` 可实现的性能提升水平。


    注意

    原生编译在操作型分析场景中并无帮助。`列存储`索引只能在查询互操作模式下使用。


    ### 性能与原生编译


    在实践中，当通过 `互操作引擎` 访问内存优化数据时，系统吞吐量增加两到四倍是常见的。为了进一步提升性能，`In-Memory OLTP` 利用了原生编译。作为第一步，它将任何行数据操作和访问逻辑转换为
    C 代码，该代码被编译成 `DLL` 并加载到 SQL Server 的进程内存中。这些 `DLL`（每个表一个）由原生的 CPU 指令组成，它们执行时无需
    T-SQL 语句的任何进一步代码解释开销。


    考虑一个简单的情况：您需要从数据行中读取一个定长列的值。对于基于磁盘的表，SQL Server 从系统目录中获取该列的起始偏移量和长度，并执行所需的操作将字节序列转换为所需的数据类型。对于内存优化表，`DLL`
    已经知道了列偏移量和数据类型。SQL Server 可以使用正确数据类型的指针，从行中预定义的偏移量读取数据，而无需任何额外的开销。正如您可以猜到的，这种方法极大地减少了该操作所需的
    CPU 指令数量。


    ### 限制与挑战


    另一方面，这种方法带来了一些限制。在 `DLL` 生成后，您无法更改行的格式。编译后的代码对更改一无所知。这个问题比看起来要复杂，简单地重新编译 `DLL`
    并不能解决它。


    再次考虑需要向表中添加另一个可空列的情况。对于基于磁盘的表，这是一个元数据级别的操作，不会更改现有表行中的数据。T-SQL 能够在运行时通过分析各种数据行属性来检测到列数据不存在。


    在内存优化表和原生编译代码的情况下，情况要复杂得多。生成一个知晓新数据列的新版本 `DLL` 很容易；然而，这还不够。`DLL` 需要根据列数据是否存在来处理不同版本的行和不同的数据格式。虽然这在技术上是可行的，但它为
    `DLL` 增加了额外的逻辑，导致更多的处理指令，从而减慢了数据访问速度。此外，支持多种数据格式的逻辑会永久保留在代码中，每次表更改都会进一步降低性能。


    正如您已经了解的，SQL Server 通过在后台重建表来解决这个问题。表更改会生成新版本的 `DLL` 和新的表对象，并将数据行转换为新格式。我将在下一章详细讨论这个过程。


    ### T-SQL 模块的原生编译


    为了进一步降低 T-SQL 解释的开销，`In-Memory OLTP 引擎` 允许您对 T-SQL 模块（如存储过程、标量用户定义函数和触发器）执行原生编译。这些模块的编译方式与表相关的
    `DLL` 相同，也会被加载到 SQL Server 进程内存中。


    原生编译同时利用 SQL Server 和 `In-Memory OLTP` 引擎。第一步，SQL Server 解析 T-SQL 代码，对于 T-SQL
    模块，使用 `查询优化器` 生成执行计划。在此阶段结束时，SQL Server 生成一个称为混合抽象树（`MAT`）的结构，它表示元数据、命令式逻辑、表达式和查询计划。我将在本章后面讨论
    SQL Server 如何优化原生编译模块。


    下一步，`In-Memory OLTP` 将 `MAT` 转换为另一个称为纯命令式树（`PAT`）的结构，该结构用于生成源代码，然后被编译并链接到 `DLL`
    中。


    ![A340879_2_En_9_Fig1_HTML.jpg](img/A340879_2_En_9_Fig1_HTML.jpg)

    图 9-1. SQL Server 中的原生编译


    为原生编译生成的代码使用纯 C 语言，效率非常高。然而，它难以阅读。例如，每个方法都被实现为一个单一的函数，该函数不调用其他函数，而是使用 `GOTO` 作为控制流语句内联实现其代码。其意图从来不是生成人类可读的代码；它仅用作原生编译的源代码。


    ### DLL 管理与安全


    二进制 `DLL` 文件不会持久存储在数据库备份中。SQL Server 在数据库启动时重新创建表相关的 `DLL`，在首次调用时重新创建模块相关的 `DLL`。这种方法减轻了黑客用恶意副本替换
    `DLL` 的安全风险。记住这种行为很重要，因为它可能在数据库启动时增加开销，并在数据库重启后更改原生编译模块的执行计划。


    提示

    原生编译模块通常比解释型 T-SQL 模块更快。然而，与 T-SQL 模块相比，它们的编译时间可能显著更长。您应该记住这种行为，并避免在原生编译模块调用中使用极短的超时时间。


    ### 文件存储与结构


    SQL Server 将二进制 `DLL` 文件和所有其他与原生编译相关的文件放在主 SQL Server 数据目录下的 `XTP` 子文件夹中。它通过创建另一级子文件夹按数据库对文件进行分组。图
    9-2 显示了数据库（ID 为 9）的文件夹内容，该数据库包含多个 `In-Memory OLTP` 对象。


    ![A340879_2_En_9_Fig2_HTML.jpg](img/A340879_2_En_9_Fig2_HTML.jpg)

    图 9-2. 包含原生编译对象的文件夹


    所有文件名都以 `xtp_` 前缀开头，后跟 `p`（存储过程、标量函数或触发器）或 `t`（表），以指示对象类型。名称的最后两部分包含该对象的数据库 ID
    和对象 ID。


    文件扩展名决定了文件的类型，如下所示：

    *   `*.mat.xml` 文件存储 `MAT` 结构的 XML 表示形式。

    *   `*.c` 文件是 C 代码生成器生成的源文件。

    *   `*.obj` 文件是 C 编译器生成的目标文件。

    *   `*.pub` 文件是 C 编译器生成的符号文件。

    *   `*.out` 文件是 C 编译器的日志文件。

    *   `*.dll` 文件是 C 链接器生成的原生编译 `DLL`。这些文件被加载到 SQL Server 内存中，并由 `In-Memory OLTP`
    引擎使用。


    提示

    您可以在文本编辑器应用程序中打开并分析 C 源代码和 XML `MAT`，以了解原生编译过程。

    '
- fmt: '# Natively Compiled Modules


    ## Introduction to Natively Compiled Objects


    `Listing 9-1` shows how to obtain a list of natively compiled objects loaded into
    SQL Server memory. It also returns the list of tables and stored procedures from
    the database to show the correlation between a DLL file name and object IDs.


    ```sql

    select

    s.name + ''.'' + o.name as [Object Name]

    ,o.object_id

    from

    (

    select schema_id, name, object_id

    from sys.tables

    where is_memory_optimized = 1

    union all

    select schema_id, name, object_id

    from sys.procedures

    ) o join sys.schemas s on

    o.schema_id = s.schema_id;

    select base_address, file_version, language, description, name

    from sys.dm_os_loaded_modules

    where description = ''XTP Native DLL'';

    ```

    `Listing 9-1. Obtaining a List of Natively Compiled Objects Loaded into SQL Server
    Memory`


    `Figure 9-3` illustrates the output of the code.


    ![A340879_2_En_9_Fig3_HTML.jpg](A340879_2_En_9_Fig3_HTML.jpg)

    `Figure 9-3. Natively compiled objects loaded into SQL Server memory`


    Natively compiled modules are the stored procedures, scalar user-defined functions,
    and triggers that are compiled into native code. They are extremely efficient,
    and they can provide major performance improvements when working with memory-optimized
    tables, compared to interpreted T-SQL statements, which access those tables through
    the query interop component.


    > **Note**

    > In this chapter, I will reference regular interpreted (non-natively compiled)
    modules as `T-SQL modules`.


    ## Natively Compiled Stored Procedures


    You can create natively compiled stored procedures using the regular `CREATE PROCEDURE`
    statement and T-SQL language. However, those procedures have several additional
    options that need to be specified. `Listing 9-2` shows the structure of natively
    compiled stored procedures along with those options.


    ```sql

    create proc dbo.NativelyCompiledProc

    (

    /* Parameters */

    @Param1 int not null = 1

    ,@Param2 int

    )

    with

    native_compilation    -- Indicates natively compiled SP

    ,schemabinding        -- Required

    ,execute as owner     -- Optional security context

    as

    -- Natively compiled SPs are executed as atomic blocks

    -- (all or nothing)

    begin atomic with

    (

    transaction isolation level = snapshot  -- Required

    ,language = N''English''                  -- Required

    ,delayed_durability = off               -- Optional

    ,datefirst = 7                          -- Optional

    ,dateformat = ''mdy''                     -- Optional

    )

    /* Stored Procedure Body */

    end

    ```

    `Listing 9-2. Natively Compiled Stored Procedure Structure`


    You can define the parameters of natively compiled stored procedures the same
    way as with `T-SQL` procedures. However, natively compiled stored procedures allow
    you to specify whether parameters are required and must be provided at the time
    of a call using the `NOT NULL` construct in the definition. SQL Server raises
    an error if you do not provide their values at the time of the call.


    > **Important**

    > It is recommended that you avoid type conversion and do not use named parameters
    when you call natively compiled stored procedures. It is more efficient to use
    the `exec Proc value [..,value]` calling format rather than the `exec Proc @Param=value
    [..,@Param=value]` calling format.

    > You can detect inefficient parameterization with the `hekaton_slow_parameter_parsing`
    extended event.


    All natively compiled modules must be schema bound and could have an optional
    security context specified. It is better to avoid the `EXECUTE AS CALLER` context
    because it adds the overhead of per-statement permission checks during the execution.


    > **Note**

    > You can read about execution context at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/execute-as-clause-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/execute-as-clause-transact-sql).


    Two other required options include the transaction isolation level and the language
    setting, which controls a message’s language and default date format. Natively
    compiled modules do not use the runtime `SET LANGUAGE` session option, relying
    on the `LANGUAGE` setting instead.


    You can control the date format, first day of the week, and delayed durability
    of a stored procedure using the `DATEFORMAT`, `DATEFIRST`, and `DELAYED_DURABILITY`
    settings, respectively.


    > **Note**

    > Delayed durability is a SQL Server feature that controls how SQL Server hardens
    log records, flushing them from the log buffer to the transaction log. Enabling
    delayed durability can help to improve transaction throughput in very busy OLTP
    systems at the cost of a possible small data loss in the event of an unexpected
    SQL Server shutdown or crash.

    > You can read more about delayed durability at [`https://docs.microsoft.com/en-us/sql/relational-databases/logs/control-transaction-durability`](https://docs.microsoft.com/en-us/sql/relational-databases/logs/control-transaction-durability).
    You can also read about it in Chapter 30 of my Pro SQL Server Internals book.


    Natively compiled modules are executed as atomic blocks, which is an “all or nothing”
    approach; either all statements in the procedure succeed or all of them fail.
    I will discuss how atomic blocks work later in the chapter.


    ## Natively Compiled Triggers and User-Defined Functions


    SQL Server allows you to create natively compiled DML triggers on memory-optimized
    tables and scalar user-defined functions. As with natively compiled stored procedures,
    these modules cannot access disk-based objects.


    `Listing 9-3` shows the code that creates both types of objects.


    ```sql

    create trigger NativelyCompiledTrigger on dbo.MemoryOptimizedTable

    with native_compilation, schemabinding

    after insert

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''English''

    )

    if @@rowcount = 0

    return;

    /* Trigger Body */

    end

    go

    create function dbo.NativelyCompiledScalarFunction(@Param1 int not null)

    returns int

    with native_compilation, schemabinding

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''us_english''

    )

    declare

    @Result int = 0

    /* Function Body */

    return @Result;

    end

    ```

    `Listing 9-3. Natively Compiled Trigger and User-Defined Function`


    As with `T-SQL` triggers and scalar user-defined functions, you should consider
    the overhead those modules introduce. You will look at performance overhead of
    user-defined functions later in the chapter.


    You can also mark inline table-valued functions as natively compiled. However,
    they behave differently than other modules. When you mark those functions as natively
    compiled, SQL Server just validates that they are using the language constructs
    supported by native compilation. The functions are not actually compiled but rather
    embedded into the other natively compiled modules that reference them.


    When you call natively compiled inline table-valued functions from `T-SQL` via
    Query Interop, SQL Server treats them as the regular `T-SQL` inline table-valued
    functions, embedding their statement to the referenced query.


    `Listing 9-4` illustrates a natively compiled inline table-valued function. As
    you can guess, you do not need to specify that the function executes as the atomic
    block.


    ```sql

    create function dbo.NativeCompiledInlineTVF(@Param datetime)

    returns table

    with native_compilation, schemabinding

    as

    return

    (

    select count(*) as Result

    from dbo.MemoryOptimizedTable

    where DateCol >= @Param

    )

    ```

    `Listing 9-4. Natively Compiled Inline Table-Valued Function`


    You can define the natively compiled module body pretty much the same way as regular
    `T-SQL` modules. However, the natively compiled modules support only a limited
    set of `T-SQL` constructs. Let’s look at the supported features and limitations
    in different `T-SQL` areas in detail.'
