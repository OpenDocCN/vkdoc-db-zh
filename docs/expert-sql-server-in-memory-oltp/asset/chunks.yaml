    # 索引注意事项


    正如我在本书中已经讨论过的，内存中事务处理（In-Memory OLTP）的索引策略以及在非聚集（范围）索引和哈希索引之间的选择，很大程度上取决于使用它们的数据和查询。非聚集（范围）索引提供了与常规
    B-Tree 索引类似的体验。它们可用于相同的使用场景，并提供一套相当的 SARGability 规则。唯一的例外是反向扫描索引。非聚集（范围）索引是单向的，内存中事务处理无法利用它们进行此类扫描。


    另一方面，哈希索引仅对点查找搜索和等值连接有用，前提是查询在所有索引键列上使用了等值谓词。假设哈希表中有足够的桶数，它们在那些场景下可能优于范围索引。然而，不充分的
    `bucket_count` 值会极大地影响其性能，并使索引变得低效。


    对于数据量相对静态且能正确估计索引桶数的目录实体，可以使用哈希索引作为主键。这些实体经常用于等值连接，哈希索引在这些场景下可能非常高效。然而，作为一般规则，使用范围索引是更安全的选择，它简化了内存中事务处理迁移，也减少了系统中的维护开销。


    还需要考虑其他几个因素。首先，应该记住，内存优化表上的索引指向实际的数据行对象，并且覆盖行内列。它们不覆盖溢出列，内存中事务处理需要执行类似于 Key Lookup
    操作的动作来获取溢出列的值。在将基于磁盘的表迁移到内存时，应该分析表结构，并将经常选择的列保持在行内。


    其次，应尝试最小化表中的索引数量，这与基于磁盘的表类似。索引会在 `INSERT` 操作期间增加开销，并减慢数据库恢复和垃圾回收过程。此外，内存中事务处理使用行版本控制，每次更新行时都会创建一个新版本。每个额外的索引都会增加更新开销；无论索引键列是否被更新，内存中事务处理都必须维护索引行链。这与基于磁盘的
    B-Tree 索引不同，后者除非更新索引列，否则保持不变。


    让我们看一个例子，创建具有相同结构的内存优化表和基于磁盘的表，并插入一些数据。如清单 13-10 所示，两个表都有两个索引和四列。


    ```sql

    create table dbo.MOTable

    (

    Id int not null,

    IdxCol int not null,

    IntCol int not null,

    VarCharCol varchar(128) null,

    constraint PK_MOTable

    primary key nonclustered hash(Id)

    with (bucket_count = 2097152),

    index IDX_IdxCol nonclustered hash(IdxCol)

    with (bucket_count = 2097152),

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.DBTable

    (

    Id int not null,

    IdxCol int not null,

    IntCol int not null,

    VarCharCol varchar(128) null,

    constraint PK_DBTable

    primary key clustered(Id)

    );

    create index IDX_DBTable_IdxCol on dbo.DBTable(IdxCol);

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N3 as t2) -- 1,048,576 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.MOTable(ID,IdxCol,IntCol)

    select Id, Id, Id from Ids;

    insert into DBTable(Id, IdxCol, IntCol)

    select Id, IdxCol, IntCol from dbo.MOTable;

    ```


    **清单 13-10. 更新开销：表创建**


    接下来，让我们对每个表运行三个 `UPDATE` 语句，如清单 13-11 所示。第一条语句修改未索引的固定长度列。第二条更改已索引的固定长度列的值。最后一条语句用一个值填充空的变长列，这会增加行大小并在基于磁盘的表中触发大量的页拆分。


    ```sql

    update dbo.MOTable set IntCol += 1;

    update dbo.MOTable set IdxCol += 1;

    update dbo.MOTable set VarCharCol = replicate(''a'',128);

    update dbo.DBTable set IntCol += 1;

    update dbo.DBTable set IdxCol += 1;

    update dbo.DBTable set VarCharCol = replicate(''a'',128);

    ```


    **清单 13-11. 更新开销：Update 语句**


    表 13-1 显示了在我的环境下这些语句的执行时间。如你所见，在内存优化表的情况下，执行时间几乎保持不变，它取决于表中的索引数量。在更新索引键列时，仍然存在与索引维护相关的索引更新开销。内存中事务处理需要计算哈希索引中新的索引键值的哈希桶，或者在非聚集索引中找到新的索引键行链。然而，这个开销相对较小。


    **表 13-1. Update 语句的执行时间**


    | 操作 | 内存优化表 | 基于磁盘的表 |

    | --- | --- | --- |

    | 更新未索引列 | 1,016 ms | 1,879 ms |

    | 更新已索引列 | 1,036 ms | 4,586 ms |

    | 增加行大小的更新 | 1,045 ms | 3,906 ms |


    对于基于磁盘的表则不是这种情况，更新索引键列会导致非聚集索引 B-Tree 结构的更新。类似地，增加行的大小会导致页拆分。当行的新版本不适合原始页时，存储引擎必须分配新的数据页并将数据移过去。这是一个非常昂贵的操作，它会更新分配映射页并导致显著的事务日志开销。


    为了说明内存优化表的更新开销取决于索引数量，让我们使用清单 13-12 中的代码向表中添加另一个索引。


    ```sql

    alter table dbo.MOTable

    add index IDX_VarCharCol nonclustered(VarCharCol);

    ```


    **清单 13-12. 更新开销：向内存优化表添加额外索引**


    表 13-2 说明了创建索引后更新语句的执行时间。如你所见，添加一个额外索引会给操作增加开销；然而，所有三条语句花费的时间都相似。


    **表 13-2.**

    '
- fmt: '# 排序规则性能与索引策略


    ## 更新语句执行时间（含新索引）


    | 操作 | 内存优化表 |

    | :--- | :--- |

    | 更新非索引列 | 1,840 ms |

    | 更新索引列 | 1,900 ms |

    | 行大小增加时的更新 | 1,921 ms |


    在系统迁移期间，分析并调整索引策略是有益的。您可以使用 `sys.dm_db_index_usage_stats` 和 `sys.dm_db_index_operational_stats`
    数据管理视图来获取系统中的索引使用统计信息。请记住，SQL Server 在重启时不会持久化这些统计信息。此外，某些版本可能在索引重建时清除它们。


    ## SQL Server 2014 的二进制排序规则限制


    最后，我将讨论另一个在 SQL Server 2016 中被移除的 SQL Server 2014 限制。正如您可能记得的，In-Memory OLTP 的第一个版本要求您为索引键列使用二进制排序规则。在
    SQL Server 2014 中，这可能会由于排序规则区分大小写而导致系统行为发生破坏性更改。然而，从大局来看，二进制排序规则是有益的。与非二进制对应物相比，对存储二进制排序规则数据的列进行比较操作要高效得多。当需要处理大量行时，您可以获得显著的性能改进。


    一个这样的例子是在大表中进行子字符串搜索。考虑这样一种情况：您需要在大型 `Products` 表中按产品名称的一部分进行搜索。不幸的是，子字符串搜索将导致以下谓词：`WHERE
    ProductName LIKE ''%'' + @Param + ''%''`。这不是 SARGable 的，SQL Server 在这种情况下无法使用
    Index Seek 操作。唯一的选择是扫描数据，评估表中的每一行，而使用二进制排序规则时这一过程要快得多。


    ## 二进制排序规则性能测试：表创建


    让我们看一个例子，创建如代码清单 [13-13](#A340879_2_En_13_Chapter.html#Par57) 所示的表。该表有四个文本列，分别以二进制和非二进制格式存储
    Unicode 和非 Unicode 数据。最后，您用 65,536 行随机数据填充它。


    ```sql

    create table dbo.CollationTest

    (

    ID int not null,

    VarCol varchar(108) not null,

    NVarCol nvarchar(108) not null,

    VarColBin varchar(108)

    collate Latin1_General_100_BIN2 not null,

    NVarColBin nvarchar(108)

    collate Latin1_General_100_BIN2 not null,

    constraint PK_CollationTest

    primary key nonclustered hash(ID)

    with (bucket_count=131072)

    )

    with (memory_optimized=on, durability=schema_only);

    create table #CollData

    (

    ID int not null,

    Col1 uniqueidentifier not null

    default NEWID(),

    Col2 uniqueidentifier not null

    default NEWID(),

    Col3 uniqueidentifier not null

    default NEWID()

    );

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows

    ,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows

    ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows

    ,N5(C) as (select 0 from N4 as T1 cross join N4 as T2) -- 65,536 rows

    ,IDs(ID) as (select row_number() over (order by (select NULL)) from N5)

    insert into #CollData(ID)

    select ID from IDs;

    insert into dbo.CollationTest(ID,VarCol,NVarCol,VarColBin,NVarColBin)

    select

    ID

    /* VarCol */

    ,convert(varchar(36),Col1) + convert(varchar(36),Col2) +

    convert(varchar(36),Col3)

    /* NVarCol */

    ,convert(nvarchar(36),Col1) + convert(nvarchar(36),Col2) +

    convert(nvarchar(36),Col3)

    /* VarColBin */

    ,convert(varchar(36),Col1) + convert(varchar(36),Col2) +

    convert(varchar(36),Col3)

    /* NVarColBin */

    ,convert(nvarchar(36),Col1) + convert(nvarchar(36),Col2) +

    convert(nvarchar(36),Col3)

    from

    #CollData

    ```

    代码清单 13-13。二进制排序规则性能：表创建


    ## 二进制排序规则性能测试：测试查询


    作为下一步，运行代码清单 [13-14](#A340879_2_En_13_Chapter.html#Par59) 中的查询，比较不同场景下的搜索性能。所有查询都会扫描表，为表中的每一行评估谓词。


    ```sql

    declare

    @Param varchar(16)

    ,@NParam varchar(16)

    -- Getting substring for the search

    select

    @Param = substring(VarCol,43,6)

    ,@NParam = substring(NVarCol,43,6)

    from

    dbo.CollationTest

    where

    ID = 1000;

    select count(*)

    from dbo.CollationTest

    where VarCol like ''%'' + @Param + ''%'';

    select count(*)

    from dbo.CollationTest

    where NVarCol like ''%'' + @NParam + N''%'';

    select count(*)

    from dbo.CollationTest

    where VarColBin like ''%'' + upper(@Param) + ''%''

    collate Latin1_General_100_Bin2;

    select count(*)

    from dbo.CollationTest

    where NVarColBin like ''%'' + upper(@NParam) + N''%''

    collate Latin1_General_100_Bin2;

    ```

    代码清单 13-14。二进制排序规则性能：测试查询


    ## 二进制排序规则性能：测试结果


    表 [13-3](#A340879_2_En_13_Chapter.html#Tab3) 显示了我系统中所有查询的执行时间。如您所见，针对二进制排序规则列的查询明显更快，尤其是在
    Unicode 数据的情况下。


    表 13-3。二进制排序规则性能：测试结果


    | 非二进制排序规则的 Varchar 列 | 二进制排序规则的 Varchar 列 | 非二进制排序规则的 Nvarchar 列 | 二进制排序规则的 Nvarchar
    列 |

    | :--- | :--- | :--- | :--- |

    | 135 ms | 75 ms | 624 ms | 34 ms |


    请记住，二进制排序规则是区分大小写的。您可能需要创建另一个二进制排序规则列，并在那里存储数据的副本，在需要时将其转换为大写或小写。


    最后，值得注意的是，这种行为不仅限于内存优化表。当使用二进制排序规则时，基于磁盘的表也会获得类似水平的性能改进。'
  raw: 'Execution Time of Update Statements with New Index


    |   | Memory-Optimized Table |

    | --- | --- |

    | Update of nonindexed column | 1,840 ms |

    | Update of indexed column | 1,900 ms |

    | Update with row size increase | 1,921 ms |


    It is beneficial to analyze the indexing strategy in a system, adjusting and redesigning
    it during migration. You can use the `sys.dm_db_index_usage_stats` and `sys.dm_db_index_operational_stats`
    data management views to obtain index usage statistics in the system. Remember
    that SQL Server does not persist these statistics at the time of restart. Moreover,
    some versions may clear them at the time of an index rebuild.


    Finally, I will to discuss another SQL Server 2014 limitation, which has been
    removed in SQL Server 2016\. As you may remember, the first release of In-Memory
    OLTP required you to use binary collations for the index key columns. In SQL Server
    2014, this may become a breaking change in the system behavior because of the
    case-sensitiveness of the collation. However, in the grand scheme of things, binary
    collations have benefits. The comparison operations on the columns that store
    data in binary collations are much more efficient compared to nonbinary counterparts.
    You can achieve significant performance improvements when a large number of rows
    need to be processed.


    One such example is a substring search in large tables. Consider the situation
    when you need to search by part of the product name in a large `Products` table.
    Unfortunately, a substring search will lead to the following predicate: `WHERE
    ProductName LIKE ''%'' + @Param + ''%''`. This is not SARGable, and SQL Server
    cannot use an Index Seek operation in such a scenario. The only option is to scan
    the data, evaluating every row in the table, which is significantly faster with
    binary collation.


    Let’s look at an example and create the table shown in Listing [13-13](#A340879_2_En_13_Chapter.html#Par57).
    The table has four text columns that store Unicode and non-Unicode data in binary
    and nonbinary formats. Finally, you populate it with 65,536 rows of random data.


    ```

    create table dbo.CollationTest

    (

    ID int not null,

    VarCol varchar(108) not null,

    NVarCol nvarchar(108) not null,

    VarColBin varchar(108)

    collate Latin1_General_100_BIN2 not null,

    NVarColBin nvarchar(108)

    collate Latin1_General_100_BIN2 not null,

    constraint PK_CollationTest

    primary key nonclustered hash(ID)

    with (bucket_count=131072)

    )

    with (memory_optimized=on, durability=schema_only);

    create table #CollData

    (

    ID int not null,

    Col1 uniqueidentifier not null

    default NEWID(),

    Col2 uniqueidentifier not null

    default NEWID(),

    Col3 uniqueidentifier not null

    default NEWID()

    );

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows

    ,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows

    ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows

    ,N5(C) as (select 0 from N4 as T1 cross join N4 as T2) -- 65,536 rows

    ,IDs(ID) as (select row_number() over (order by (select NULL)) from N5)

    insert into #CollData(ID)

    select ID from IDs;

    insert into dbo.CollationTest(ID,VarCol,NVarCol,VarColBin,NVarColBin)

    select

    ID

    /* VarCol */

    ,convert(varchar(36),Col1) + convert(varchar(36),Col2) +

    convert(varchar(36),Col3)

    /* NVarCol */

    ,convert(nvarchar(36),Col1) + convert(nvarchar(36),Col2) +

    convert(nvarchar(36),Col3)

    /* VarColBin */

    ,convert(varchar(36),Col1) + convert(varchar(36),Col2) +

    convert(varchar(36),Col3)

    /* NVarColBin */

    ,convert(nvarchar(36),Col1) + convert(nvarchar(36),Col2) +

    convert(nvarchar(36),Col3)

    from

    #CollData

    Listing 13-13.

    Binary Collation Performance : Table Creation

    ```


    As the next step, run the queries from Listing [13-14](#A340879_2_En_13_Chapter.html#Par59),
    comparing the performance of a search in different scenarios. All the queries
    scan the table varheap, evaluating the predicate for every row in the table.


    ```

    declare

    @Param varchar(16)

    ,@NParam varchar(16)

    -- Getting substring for the search

    select

    @Param = substring(VarCol,43,6)

    ,@NParam = substring(NVarCol,43,6)

    from

    dbo.CollationTest

    where

    ID = 1000;

    select count(*)

    from dbo.CollationTest

    where VarCol like ''%'' + @Param + ''%'';

    select count(*)

    from dbo.CollationTest

    where NVarCol like ''%'' + @NParam + N''%'';

    select count(*)

    from dbo.CollationTest

    where VarColBin like ''%'' + upper(@Param) + ''%''

    collate Latin1_General_100_Bin2;

    select count(*)

    from dbo.CollationTest

    where NVarColBin like ''%'' + upper(@NParam) + N''%''

    collate Latin1_General_100_Bin2;

    Listing 13-14.

    Binary Collation Performance: Test Queries

    ```


    Table [13-3](#A340879_2_En_13_Chapter.html#Tab3) shows the execution time of all
    queries in my system. As you can see, the queries against the binary collation
    columns are significantly faster, especially in the case of Unicode data.


    Table 13-3.


    Binary Collation Performace: Test Results


    | Varchar Column with Nonbinary Collation | Varchar Column with Binary Collation
    | Nvarchar Column with Nonbinary Collation | Nvarchar Column with Binary Collation
    |

    | --- | --- | --- | --- |

    | 135 ms | 75 ms | 624 ms | 34 ms |


    Remember that binary collations are case-sensitive. You may want to create another
    binary collation column and store the copy of the data there, converting it to
    uppercase or lowercase when needed.


    Finally, it is worth noting that this behavior is not limited to memory-optimized
    tables. You will get a similar level of performance improvement with disk-based
    tables when binary collations are used.'
