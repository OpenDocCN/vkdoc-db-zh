- fmt: '## Summary


    The In-Memory OLTP engine is fully integrated into SQL Server and is installed
    with the product. It is an Enterprise edition feature in SQL Server 2016 RTM;
    however, it is available in all editions starting with SQL Server 2016 SP1\. It
    is also available in the Premium tiers of Microsoft Azure SQL Database. You should
    remember, however, about the resource limitations that exist in non-Enterprise
    editions of SQL Server.


    Every database that uses In-Memory OLTP objects should have the separate In-Memory
    OLTP filegroup created. This filegroup should be placed in the disk array optimized
    for sequential I/O performance. Microsoft Azure SQL Database does not require
    or allow you to create that filegroup.


    You can create memory-optimized tables with the regular `CREATE TABLE` statement,
    marking tables as `MEMORY_OPTIMIZED` and specifying the table durability option.
    The data in the tables with `SCHEMA_AND_DATA` durability is persisted on disk.
    Tables with the `SCHEMA_ONLY` durability do not persist the data, and they can
    be used as in-memory temporary tables that provide extremely fast performance.


    You can access memory-optimized tables either from interpreted T-SQL through the
    `Interop Engine` or from natively compiled modules. Almost all T-SQL features
    are supported in interpreted mode. Natively compiled modules, on the other hand,
    have the large set of limitations. Nevertheless, they can introduce significant
    performance improvements compared to the interop engine.


    ## 3. Memory-Optimized Tables


    This chapter discusses memory-optimized tables in detail. It shows how memory-optimized
    tables store their data and how SQL Server accesses them. It covers the format
    of the data rows in memory-optimized tables and talks about the process of native
    compilation.


    Finally, the chapter provides an overview of the limitations of memory-optimized
    tables that exist in SQL Server 2016.


    ### Disk-Based vs. Memory-Optimized Tables


    Data and index structures in memory-optimized tables are different from those
    in disk-based tables. In disk-based tables, the data is stored in the 8KB data
    pages grouped together in eight-page extents on a per-index or per-heap basis.
    Every page stores the data from one or multiple data rows. Moreover, the data
    from variable-length or LOB columns can be stored off-row on `ROW_OVERFLOW` and
    `LOB` data pages when it does not fit on one in-row page.


    All pages and rows in disk-based tables are referenced by in-file offsets, which
    are a combination of `file_id`, data page offset/position in the file, and, in
    the case of a data row, row offset/position on the data page.


    Finally, every nonclustered index stores its own copy of the data from the index
    key columns, referencing the main row by row ID, which is either the clustered
    index key value or a physical address (offset) of the row in the heap table.


    Figures [3-1](#A340879_2_En_3_Chapter.html#Fig1) and [3-2](#A340879_2_En_3_Chapter.html#Fig2)
    illustrate these concepts. They show clustered and nonclustered index B-Trees
    defined on a table. As you see, pages are linked through in-file offsets. The
    nonclustered index persists the separate copy of the data and references the clustered
    index through clustered index key values.


    ![A340879_2_En_3_Fig2_HTML.jpg](A340879_2_En_3_Fig2_HTML.jpg)

    Figure 3-2. Nonclustered index on disk-based table


    ![A340879_2_En_3_Fig1_HTML.jpg](A340879_2_En_3_Fig1_HTML.jpg)

    Figure 3-1. Clustered index on disk-based table


    Every time you need to access the data from the page, SQL Server loads the copy
    of the page to the memory, caching it in the buffer pool. However, the format
    and structure of the data page in the buffer pool does not change, and pages there
    still use in-file offsets to reference each other. The SQL Server component called
    the `Buffer Manager` manages the buffer pool, and it tracks the data page’s in-memory
    locations, translating in-file offsets to the corresponding memory addresses of
    the page structures.


    Consider the situation when SQL Server needs to scan several data pages in the
    index. The worker thread requests the page from the `Buffer Manager`, using `file_id`
    and `page_id` to identify it. The `Buffer Manager`, in turn, checks whether the
    page is already cached, reading it from disk when necessary. When the page is
    read and processed, SQL Server obtains the address of the next page in the index
    and repeats the process.


    It is also entirely possible that SQL Server needs to access multiple pages in
    order to read a single row. This happens in case of off-row storage and/or when
    the execution plan uses nonclustered indexes and issues Key or RID Lookup operations,
    obtaining the data from the clustered index or heap.


    The process of locating a page in the buffer pool is very fast; however, it still
    introduces overhead that affects the performance of the queries. The performance
    hit is much worse when the data page is not in memory and a physical I/O operation
    is required.


    As you already know, SQL Server protects the internal consistency of the data
    pages, with latches preventing multiple sessions from modifying the data on the
    data page simultaneously. Acquiring and managing those latches also adds overhead
    to the system.


    Finally, SQL Server uses locking to protect the transactional consistency of the
    data acquiring locks on the data row- and page- and object- levels. Those locks
    may introduce blocking in the system, and they also add the overhead associated
    with their management.


    The In-Memory OLTP engine uses a completely different approach with memory-optimized
    tables. With the exception of `Bw-Trees` in nonclustered indexes, which I will
    discuss in Chapter [5](#A340879_2_En_5_Chapter.html), in-memory objects do not
    use data pages. Data rows reference each other through the memory pointers. Every
    row knows the memory address of the next row in the chain, and SQL Server does
    not need to do any extra steps to locate it.'
