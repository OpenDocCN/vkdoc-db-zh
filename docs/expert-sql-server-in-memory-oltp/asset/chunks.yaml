- fmt: '## Performance Considerations


    As you can guess, large delta store and delete bitmaps would add overhead during
    query execution. SQL Server needs to scan noncompressed rows in the delta store,
    which is significantly slower compared to compressed row groups. Similarly, a
    large number of rows in the delete bitmap adds overhead of validation if compressed
    rows were deleted.


    Let’s look at this overhead in detail and add 1,500,000 rows to the table using
    the code from Listing 7-7.


    ```

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N4 as t2) -- 16,777,316 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.OrderItems(OrderId, ArticleId, SalesPrice)

    select 4000000 + ID / 3 + 1, ID % 50000, 49.99

    from Ids

    where ID <= 1500000;

    Listing 7-7.

    Inserting 1.5 Million Rows into Delta Store

    ```


    If you run the code from Listing 7-6 again after the data was inserted, you would
    see the output shown in Figure 7-11. The new rows have not been compressed, and
    they stay in the delta store.


    ![A340879_2_En_7_Fig11_HTML.jpg](A340879_2_En_7_Fig11_HTML.jpg)


    Figure 7-11.

    Row group status after insert


    If you run the query from Listing 7-6 again after the tuple mover executes, you
    would see that the new rows have been compressed into two new row groups. Figure
    7-12 shows the status of the row groups when it happens.


    ![A340879_2_En_7_Fig12_HTML.jpg](A340879_2_En_7_Fig12_HTML.jpg)


    Figure 7-12.

    Status of row groups after data is compressed


    Listing 7-8 shows the test query that benefits from the columnstore index. I’ve
    executed this query twice, before and after the rows from the delta store were
    compressed. The execution times in my environment were 343 ms and 160 ms, respectively.
    As you can see, scanning of large number of uncompressed rows in the delta store
    affects the performance of the query. It is worth noting, however, that this overhead
    is significantly smaller compared to the delta store scan in disk-based columnstore
    indexes because of the in-memory data access and efficiency of varheap scans.


    ```

    select top 10 ArticleId, avg(SalesPrice)

    from dbo.OrderItems

    group by ArticleId

    order by avg(SalesPrice) desc;

    Listing 7-8.

    Test Query

    ```


    As the next step, let’s look at the overhead introduced by the large number of
    deleted rows. Listing 7-9 shows the query, which deletes half the rows from the
    table. Figure 7-13 illustrates row group statistics after deletion.


    ![A340879_2_En_7_Fig13_HTML.jpg](A340879_2_En_7_Fig13_HTML.jpg)


    Figure 7-13.

    Status of row groups after data was deleted


    ```

    delete from dbo.OrderItems where OrderItemId % 2 = 0;

    Listing 7-9.

    Deleting 50 Percent of the Data

    ```


    The execution time of the test query from Listing 7-8 in my environment was 516
    ms. SQL Server should check whether the RID of compressed rows were present in
    `DELETED_ROWS_TABLE` and exclude deleted rows from the processing. All of that
    added significant overhead during query execution.


    There is another implication of the large number of deleted rows and large delete
    bitmaps. They reduce the amount of memory available to In-Memory OLTP and other
    SQL Server components.


    Unfortunately, it is common to have a large number of deleted rows in memory-optimized
    columnstore indexes. The data in OLTP systems is usually highly volatile, and
    data rows may be updated multiple times. If data rows are updated after they were
    compressed, each obsolete row version would be referenced in the delete bitmap
    of the index.


    Fortunately, it is also common that data rows become static after some time. SQL
    Server allows you to delay compression of the delta store rows by specifying the
    `COMPRESSION_DELAY` columnstore index option. This property indicates how long
    the rows should stay in the delta store before they can be compressed into row
    groups. You should set `COMPRESSION_DELAY` to the value that exceeds the typical
    post-processing time in the system.


    Consider an online shopping cart system as an example. In this scenario, the status
    of individual orders may be updated multiple times during the fulfillment process.
    It could be beneficial to set `COMPRESSION_DELAY` to the value that exceeds the
    typical fulfillment time and avoid compressing old versions of order rows until
    the order is fulfilled.


    Listing 7-10 shows an example of a table with a columnstore index that has the
    compression delay set to 1,440 minutes, which is 24 hours. Even though this increases
    the size of the delta store, it would also prevent compressions of the versions
    of the rows that have yet to be deleted. As the general rule, it is better to
    have a slightly larger delta store than increase the size of the delete bitmap.


    ```

    create table dbo.OrdersCCI

    (

    OrderId int not null

    constraint PK_OrdersCCI

    primary key nonclustered,

    OrderDate datetime2(0) not null,

    OrderNum varchar(32) not null,

    Amount money not null,

    CustomerId int not null,

    OrderStatus tinyint not null,

    FulfillmentDate datetime2(0) not null,

    index CCI_OrdersCCI clustered columnstore

    with (compression_delay=1440)

    )

    with (memory_optimized=on, durability=schema_and_data);

    Listing 7-10.

    Creating Columnstore Index with Compression Delay

    ```


    You can monitor the percent of deleted rows in the row groups and fine-tune the
    index `COMPRESSION_DELAY` value to minimize it. Unfortunately, changing the property
    will require you to drop and re-create the columnstore index. This is an offline
    operation, which will lead to two table rebuilds and can take a significant amount
    of time and memory in the case of large tables. Neither can you rebuild columnstore
    indexes, reducing the size of the delete bitmap. Dropping and re-creating the
    index is the only option available.


    There is one case, however, when In-Memory OLTP rebuilds row groups internally.
    SQL Server decompresses the row groups, moving rows back to the delta store when
    the row group has 90 percent or more rows deleted.


    Listing 7-11 illustrates the code that deletes 99 percent of the data from the
    table. Figure 7-14 shows the status of the row groups right after deletion.


    ![A340879_2_En_7_Fig14_HTML.jpg](A340879_2_En_7_Fig14_HTML.jpg)


    Figure 7-14.

    Status of row groups after 99 percent of the rows were deleted


    ```

    delete from dbo.OrderItems where OrderId % 100 < 98;

    Listing 7-11.

    Deleting 99 Percent of the Data

    ```


    If you look at the row groups after a few minutes, you would see that the tuple
    mover process moved all nondeleted rows back to the delta store, deallocating
    all compressed row groups in the system. Figure 7-15 illustrates that condition.


    ![A340879_2_En_7_Fig15_HTML.jpg](A340879_2_En_7_Fig15_HTML.jpg)


    Figure 7-15.

    Status of row groups after tuple mover run'
