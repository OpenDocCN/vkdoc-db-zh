    ## Natively Compiled Modules


    Natively compiled modules are the stored procedures, scalar user-defined functions,
    and triggers that are compiled into native code. They are extremely efficient,
    and they can provide major performance improvements when working with memory-optimized
    tables, compared to interpreted T-SQL statements, which access those tables through
    the query interop component.


    Note


    In this chapter, I will reference regular interpreted (non-natively compiled)
    modules as T-SQL modules.


    ### Natively Compiled Stored Procedures


    You can create natively compiled stored procedures using the regular `CREATE PROCEDURE`
    statement and T-SQL language. However, those procedures have several additional
    options that need to be specified. Listing [9-2](#A340879_2_En_9_Chapter.html#Par34)
    shows the structure of natively compiled stored procedures along with those options.


    ```

    create proc dbo.NativelyCompiledProc

    (

    /* Parameters */

    @Param1 int not null = 1

    ,@Param2 int

    )

    with

    native_compilation    -- Indicates natively compiled SP

    ,schemabinding        -- Required

    ,execute as owner     -- Optional security context

    as

    -- Natively compiled SPs are executed as atomic blocks

    -- (all or nothing)

    begin atomic with

    (

    transaction isolation level = snapshot  -- Required

    ,language = N''English''                  -- Required

    ,delayed_durability = off               -- Optional

    ,datefirst = 7                          -- Optional

    ,dateformat = ''mdy''                     -- Optional

    )

    /* Stored Procedure Body */

    end

    Listing 9-2.

    Natively Compiled Stored Procedure Structure

    ```


    You can define the parameters of natively compiled stored procedures the same
    way as with T-SQL procedures. However, natively compiled stored procedures allow
    you to specify whether parameters are required and must be provided at the time
    of a call using the `NOT NULL` construct in the definition. SQL Server raises
    an error if you do not provide their values at the time of the call.


    Important


    It is recommended that you avoid type conversion and do not use named parameters
    when you call natively compiled stored procedures. It is more efficient to use
    the `exec Proc value [..,value]` calling format rather than the `exec Proc @Param=value
    [..,@Param=value]` calling format.


    You can detect inefficient parameterization with the `hekaton_slow_parameter_parsing`
    extended event.


    All natively compiled modules must be schema bound and could have an optional
    security context specified. It is better to avoid the `EXECUTE AS CALLER` context
    because it adds the overhead of per-statement permission checks during the execution.


    Note


    You can read about execution context at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/execute-as-clause-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/execute-as-clause-transact-sql)
    .


    Two other required options include the transaction isolation level and the language
    setting, which controls a message’s language and default date format. Natively
    compiled modules do not use the runtime `SET LANGUAGE` session option, relying
    on the `LANGUAGE` setting instead.


    You can control the date format, first day of the week, and delayed durability
    of a stored procedure using the `DATEFORMAT`, `DATEFIRST`, and `DELAYED_DURABILITY`
    settings, respectively.


    Note


    Delayed durability is a SQL Server feature that controls how SQL Server hardens
    log records, flushing them from the log buffer to the transaction log. Enabling
    delayed durability can help to improve transaction throughput in very busy OLTP
    systems at the cost of a possible small data loss in the event of an unexpected
    SQL Server shutdown or crash.


    You can read more about delayed durability at [`https://docs.microsoft.com/en-us/sql/relational-databases/logs/control-transaction-durability`](https://docs.microsoft.com/en-us/sql/relational-databases/logs/control-transaction-durability)
    . You can also read about it in Chapter 30 of my Pro SQL Server Internals book.


    Natively compiled modules are executed as atomic blocks, which is an “all or nothing”
    approach; either all statements in the procedure succeed or all of them fail.
    I will discuss how atomic blocks work later in the chapter.


    ### Natively Compiled Triggers and User-Defined Functions


    SQL Server allows you to create natively compiled DML triggers on memory-optimized
    tables and scalar user-defined functions. As with natively compiled stored procedures,
    these modules cannot access disk-based objects.


    Listing [9-3](#A340879_2_En_9_Chapter.html#Par47) shows the code that creates
    both types of objects.


    ```

    create trigger NativelyCompiledTrigger on dbo.MemoryOptimizedTable

    with native_compilation, schemabinding

    after insert

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''English''

    )

    if @@rowcount = 0

    return;

    /* Trigger Body */

    end

    go

    create function dbo.NativelyCompiledScalarFunction(@Param1 int not null)

    returns int

    with native_compilation, schemabinding

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''us_english''

    )

    declare

    @Result int = 0

    /* Function Body */

    return @Result;

    end

    Listing 9-3.

    Natively Compiled Trigger and User-Defined Function

    ```


    As with T-SQL triggers and scalar user-defined functions, you should consider
    the overhead those modules introduce. You will look at performance overhead of
    user-defined functions later in the chapter.


    You can also mark inline table-valued functions as natively compiled. However,
    they behave differently than other modules. When you mark those functions as natively
    compiled, SQL Server just validates that they are using the language constructs
    supported by native compilation. The functions are not actually compiled but rather
    embedded into the other natively compiled modules that reference them.


    When you call natively compiled inline table-valued functions from T-SQL via Query
    Interop, SQL Server treats them as the regular T-SQL inline table-valued functions,
    embedding their statement to the referenced query.


    Listing [9-4](#A340879_2_En_9_Chapter.html#Par52) illustrates a natively compiled
    inline table-valued function. As you can guess, you do not need to specify that
    the function executes as the atomic block.


    ```

    create function dbo.NativeCompiledInlineTVF(@Param datetime)

    returns table

    with native_compilation, schemabinding

    as

    return

    (

    select count(*) as Result

    from dbo.MemoryOptimizedTable

    where DateCol >= @Param

    )

    Listing 9-4.

    Natively Compiled Inline Table-Valued Function

    ```


    You can define the natively compiled module body pretty much the same way as regular
    T-SQL modules. However, the natively compiled modules support only a limited set
    of T-SQL constructs. Let’s look at the supported features and limitations in different
    T-SQL areas in detail.'
  trans: '

    # 原生编译模块


    ## 原生编译对象简介


    `Listing 9-1` 展示了如何获取加载到 SQL Server 内存中的原生编译对象列表。它同时从数据库中返回表和存储过程的列表，以显示 DLL 文件名与对象
    ID 之间的关联性。


    ```sql

    select

    s.name + ''.'' + o.name as [Object Name]

    ,o.object_id

    from

    (

    select schema_id, name, object_id

    from sys.tables

    where is_memory_optimized = 1

    union all

    select schema_id, name, object_id

    from sys.procedures

    ) o join sys.schemas s on

    o.schema_id = s.schema_id;

    select base_address, file_version, language, description, name

    from sys.dm_os_loaded_modules

    where description = ''XTP Native DLL'';

    ```

    `Listing 9-1. 获取加载到 SQL Server 内存中的原生编译对象列表`


    `Figure 9-3` 说明了上述代码的输出结果。


    ![A340879_2_En_9_Fig3_HTML.jpg](img/A340879_2_En_9_Fig3_HTML.jpg)

    `Figure 9-3. 加载到 SQL Server 内存中的原生编译对象`


    原生编译模块是指那些被编译为原生代码的存储过程、标量用户定义函数和触发器。它们极其高效，与通过查询互操作组件访问内存优化表的解释型 T-SQL 语句相比，能带来显著的性能提升。


    > **注意**

    > 在本章中，我将把常规的解释型（非原生编译）模块称为 `T-SQL 模块`。


    ## 原生编译存储过程


    你可以使用常规的 `CREATE PROCEDURE` 语句和 T-SQL 语言来创建原生编译存储过程。然而，这些过程需要指定几个额外的选项。`Listing
    9-2` 展示了原生编译存储过程的结构以及这些选项。


    ```sql

    create proc dbo.NativelyCompiledProc

    (

    /* 参数 */

    @Param1 int not null = 1

    ,@Param2 int

    )

    with

    native_compilation    -- 表示这是原生编译存储过程

    ,schemabinding        -- 必需

    ,execute as owner     -- 可选的安全上下文

    as

    -- 原生编译存储过程作为原子块执行

    -- （全部成功或全部失败）

    begin atomic with

    (

    transaction isolation level = snapshot  -- 必需

    ,language = N''English''                  -- 必需

    ,delayed_durability = off               -- 可选

    ,datefirst = 7                          -- 可选

    ,dateformat = ''mdy''                     -- 可选

    )

    /* 存储过程主体 */

    end

    ```

    `Listing 9-2. 原生编译存储过程结构`


    你可以像定义 `T-SQL` 过程一样定义原生编译存储过程的参数。但是，原生编译存储过程允许你在定义中使用 `NOT NULL` 结构来指定参数是否为必需，并且必须在调用时提供。如果你在调用时未提供其值，SQL
    Server 会引发错误。


    > **重要提示**

    > 建议你在调用原生编译存储过程时避免类型转换，并且不要使用命名参数。使用 `exec Proc value [..,value]` 的调用格式比 `exec
    Proc @Param=value [..,@Param=value]` 的调用格式效率更高。

    > 你可以使用 `hekaton_slow_parameter_parsing` 扩展事件来检测低效的参数化。


    所有原生编译模块都必须是架构绑定的，并且可以指定一个可选的安全上下文。最好避免使用 `EXECUTE AS CALLER` 上下文，因为它会在执行期间增加每条语句的权限检查开销。


    > **注意**

    > 你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/execute-as-clause-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/execute-as-clause-transact-sql)
    阅读有关执行上下文的信息。


    另外两个必需的选项包括事务隔离级别和语言设置，后者控制消息的语言和默认日期格式。原生编译模块不使用运行时的 `SET LANGUAGE` 会话选项，而是依赖
    `LANGUAGE` 设置。


    你可以分别使用 `DATEFORMAT`、`DATEFIRST` 和 `DELAYED_DURABILITY` 设置来控制存储过程的日期格式、每周第一天以及延迟持久性。


    > **注意**

    > 延迟持久性是 SQL Server 的一个功能，它控制 SQL Server 如何将日志记录硬化，即将其从日志缓冲区刷新到事务日志中。启用延迟持久性有助于在非常繁忙的
    OLTP 系统中提高事务吞吐量，但代价是在发生意外的 SQL Server 关机或崩溃时可能会有少量数据丢失。

    > 你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/logs/control-transaction-durability`](https://docs.microsoft.com/en-us/sql/relational-databases/logs/control-transaction-durability)
    阅读更多关于延迟持久性的信息。你也可以在我的《Pro SQL Server Internals》一书的第 30 章中阅读相关内容。


    原生编译模块作为原子块执行，这是一种“全部或全部不”的方法；存储过程中的所有语句要么全部成功，要么全部失败。我将在本章后面讨论原子块如何工作。


    ## 原生编译触发器和用户定义函数


    SQL Server 允许你在内存优化表上创建原生编译 DML 触发器以及标量用户定义函数。与原生编译存储过程一样，这些模块无法访问基于磁盘的对象。


    `Listing 9-3` 展示了创建这两种对象的代码。


    ```sql

    create trigger NativelyCompiledTrigger on dbo.MemoryOptimizedTable

    with native_compilation, schemabinding

    after insert

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''English''

    )

    if @@rowcount = 0

    return;

    /* 触发器主体 */

    end

    go

    create function dbo.NativelyCompiledScalarFunction(@Param1 int not null)

    returns int

    with native_compilation, schemabinding

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''us_english''

    )

    declare

    @Result int = 0

    /* 函数主体 */

    return @Result;

    end

    ```

    `Listing 9-3. 原生编译触发器和用户定义函数`


    与 `T-SQL` 触发器和标量用户定义函数一样，你应该考虑这些模块带来的开销。你将在本章后面看到用户定义函数的性能开销。


    你也可以将内联表值函数标记为原生编译。然而，它们的行为与其他模块不同。当你将这些函数标记为原生编译时，SQL Server 只是验证它们是否使用了原生编译支持的语言结构。这些函数实际上并未被编译，而是被嵌入到引用它们的其他原生编译模块中。


    当你通过查询互操作从 `T-SQL` 调用原生编译内联表值函数时，SQL Server 将它们视为常规的 `T-SQL` 内联表值函数，将其语句嵌入到引用的查询中。


    `Listing 9-4` 展示了一个原生编译内联表值函数。如你所料，你不需要指定该函数作为原子块执行。


    ```sql

    create function dbo.NativeCompiledInlineTVF(@Param datetime)

    returns table

    with native_compilation, schemabinding

    as

    return

    (

    select count(*) as Result

    from dbo.MemoryOptimizedTable

    where DateCol >= @Param

    )

    ```

    `Listing 9-4. 原生编译内联表值函数`


    你可以像定义常规 `T-SQL` 模块一样定义原生编译模块的主体。然而，原生编译模块只支持有限的 `T-SQL` 结构。让我们详细看看在不同 `T-SQL`
    领域中支持的功能和限制。

    '
- fmt: '### Supported T-SQL Features


    One of the biggest limitations of natively compiled modules is that they can access
    only memory-optimized tables. The only option to join data from memory-optimized
    and disk-based tables is to use the interpreted T-SQL and the Interop Engine.


    There are other limitations you need to remember. Natively compiled code does
    not support parallelism and always has serial execution plans. Nor can it access
    and scan the tables with the `varheap Table Scan` operator. The table scan is
    implemented as a scan of one of the indexes.


    The following T-SQL features and constructs are supported in SQL Server 2016 and
    can be used with native compilation.


    #### Control Flow


    The following control flow options are supported:


    *   `IF` and `WHILE`.

    *   Assigning a value to a variable with the `SELECT` and `SET` operators.

    *   `RETURN`.

    *   `TRY`/`CATCH`/`THROW` (`RAISERROR` is not supported). It is recommended that
    you use a single `TRY`/`CATCH` block for the entire stored procedure for better
    performance.

    *   It is possible to declare variables as `NOT NULL` as long as they have an
    initializer as part of the `DECLARE` statement.

    *   The nested execution is supported. For example, a natively compiled stored
    procedure can call another natively compiled procedure or function.

    *   The `CASE` statement is not supported in SQL Server 2016\. It will be supported,
    however, in SQL Server 2017.


    #### Operators


    The following operators are supported:


    *   Comparison operators, such as `=`, `<`, `<=`, `>`, `>=`, `<>`, and `BETWEEN`.

    *   Unary and binary operators, such as `+`, `-`, `*`, `/`, and `%`. Note that
    `+` operators are supported for both numbers and strings.

    *   Bitwise operators, such as `&`, `|`, `∼`, `^`.

    *   Logical operators, such as `AND`, `OR`, and `NOT`.

    *   `IN`, `BETWEEN`, and `EXISTS` operators.


    #### Query Surface Area


    The following query surface area functions are supported:


    *   `SELECT`, `INSERT`, `UPDATE`, and `DELETE` operators.

    *   `SELECT DISTINCT` operator.

    *   `OUTPUT` clause with `INSERT`, `UPDATE`, and `DELETE` operators.

    *   `CROSS JOIN`, `INNER JOIN`, `LEFT OUTER JOIN`, and `RIGHT OUTER JOIN` are
    supported. All joins are implemented as `LOOP JOIN` internally. Neither `MERGE
    JOIN` nor `HASH JOIN` is supported. Finally, you can use joins only with the `SELECT`
    operator.

    *   Expressions in the `SELECT` list and the `WHERE` and `HAVING` clauses are
    supported as long as they use supported operators.

    *   You can use subqueries in `FROM` and `WHERE` clauses and scalar subqueries
    in a `SELECT` clause.

    *   `IS NULL` and `IS NOT NULL`.

    *   `GROUP BY` is supported with the exception of grouping by string or binary
    data.

    *   `TOP` and `ORDER BY`. However, you cannot use `WITH TIES` and `PERCENT` in
    the `TOP` clause. Moreover, the `TOP` operator is limited to 8,192 rows when the
    `TOP <constant>` is used, or even a lesser number of rows in the case of joins.
    You can address this last limitation by using a `TOP <variable>` approach. However,
    it is less efficient in terms of performance. It is also worth mentioning that
    `TOP (N) WITH TIES` will be supported in SQL Server 2017.

    *   `INDEX`, `FORCESCAN`, `FORCESEEK`, `FORCE ORDER`, `INNER LOOP JOIN`, and `OPTIMIZE
    FOR` hints.


    #### Built-in Functions


    The following built-in functions are supported:


    *   All math functions are supported.

    *   Date/time functions : `CURRENT_TIMESTAMP`, `DATEADD`, `DATEDIFF`, `DATEFROMPARTS`,
    `DATEPART`, `DATETIME2FROMPARTS`, `DATETIMEFROMPARTS`, `DAY`, `EOMONTH`, `GETDATE`,
    `GETUTCDATE`, `MONTH`, `SMALLDATETIMEFROMPARTS`, `SYSDATETIME`, `SYSUTCDATETIME`,
    and `YEAR`.

    *   String functions : `LEN`, `LTRIM`, `RTRIM`, and `SUBSTRING`. SQL Server 2017
    will also support `TRIM`, `TRANSLATE`, and `CONCAT_WS`.

    *   Error functions : `ERROR_LINE`, `ERROR_MESSAGE`, `ERROR_NUMBER`, `ERROR_PROCEDURE`,
    `ERROR_SEVERITY`, and `ERROR_STATE`.

    *   Security functions: `IS_MEMBER`, `IS_ROLEMEMBER`, `IS_SRVROLEMEMBER`, `ORIGINAL_LOGIN`,
    `SESSION_USER`, `CURRENT_USER`, `SUSER_ID`, `SUSER_SID`, `SUSER_SNAME`, `SYSTEM_USER`,
    `SUSER_NAME`, `USER`, `USER_ID`, `USER_NAME`, and `CONTEXT_INFO`.

    *   `NEWID` and `NEWSEQUENTIALID`.

    *   `CAST` and `CONVERT`. However, it is impossible to convert between a non-Unicode
    and a Unicode string.

    *   `ISNULL`.

    *   `SCOPE_IDENTITY`.

    *   `@@SPID`.

    *   You can use `@@ROWCOUNT` within a natively compiled module; however, its value
    is reset to 0 at the beginning and end of the module.'
