- fmt: '## Garbage Collection–Related Data Management Views


    SQL Server exposes several data management views that can be used to monitor and
    analyze the garbage collection process.


    *   The `sys.dm_xtp_gc_stats` view provides statistics about the garbage collection
    process. It includes information about the number of rows examined by the garbage
    collection subsystem, the number of rows processed by user and idle worker threads,
    and quite a few other attributes. You can read more about this view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-stats-transact-sql)
    .

    *   The `sys.dm_xtp_gc_queue_stats` view provides information about garbage collector
    worker queues. It provides information about the total number of work items that
    were enqueued and dequeued, the current queue length, the last time the queue
    was accessed, and the maximum depth the queue has seen. You can monitor the current
    queue length, making sure that the garbage collector is keeping up. More information
    is available at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-queue-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-gc-queue-stats-transact-sql)
    .

    *   The `sys.dm_db_xtp_gc_cycle_stats` view provides information about the last
    (up to 1,024) garbage collection execution cycles including the time and duration
    of the cycle and the distribution of transactions between generations. You can
    use this view to find spikes in the garbage collection activity and during long-running
    transaction troubleshooting. You can read more about this view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-gc-cycle-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-gc-cycle-stats-transact-sql)
    .

    *   Finally, the `sys.dm_db_xtp_index_stats` view includes several garbage collection–related
    metrics. The `rows_expired` column indicates how many rows have expired. The `rows_expired_removed`
    value indicates the number of rows unlinked from the index chain. Phantom row
    columns provide information about rows inserted by aborted transactions. You can
    read more about this view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-index-stats-transact-sql)
    .


    ## Exploring the Garbage Collection Process


    Let’s examine the garbage collection process and its asynchronous nature. As the
    first step, create a memory-optimized table and populate it with 65,536 rows,
    as shown in Listing [11-3](#A340879_2_En_11_Chapter.html#Par38).


    ```

    create table dbo.GCDemo

    (

    ID int not null,

    Placeholder char(8000) not null,

    constraint PK_GCDemo primary key nonclustered(ID)

    )

    with (memory_optimized=on, durability=schema_only)

    go

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N5)

    insert into dbo.GCDemo(Id, Placeholder)

    select Id, Replicate(''0'',8000)

    from ids;

    Listing 11-3.

    Table Creation

    ```


    Let’s look at the amount of memory used in the table, index statistics, and garbage
    collection worker queues statistics using the code from Listing [11-4](#A340879_2_En_11_Chapter.html#Par40).


    ```

    select

    convert(decimal(7,2),memory_allocated_for_table_kb / 1024.)

    as [memory allocated for table]

    ,convert(decimal(7,2),memory_used_by_table_kb / 1024.)

    as [memory used by table]

    from

    sys.dm_db_xtp_table_memory_stats

    where

    object_id = object_id(N''dbo.GCDemo'');

    select

    s.index_id, i.name, s.rows_touched

    ,s.rows_expired, s.rows_expired_removed

    from

    sys.dm_db_xtp_index_stats s left join sys.indexes i on

    s.object_id = i.object_id and

    s.index_id = i.index_id

    where

    s.object_id = object_id(N''dbo.GCDemo'');

    select

    sum(total_enqueues) as [total enqueues]

    ,sum(total_dequeues) as [total dequeues]

    from

    sys.dm_xtp_gc_queue_stats;

    select sweep_scans_started, sweep_rows_touched

    ,sweep_rows_expired, sweep_rows_expired_removed

    from sys.dm_xtp_gc_stats;

    Listing 11-4.

    Analyzing Table Memory Usage, Index, and Worker Queues Statistics

    ```


    Figure [11-5](#A340879_2_En_11_Chapter.html#Fig5) illustrates the output of the
    queries. As you can see, the table has about 585MB allocated and 514MB of used
    space. None of the rows has been deleted or touched (scanned). I also restarted
    my test server right before the test, so the garbage collection worker queues
    are empty. As the reminder, the row in the second output with `index_id = 0` represents
    the table varheap.


    ![A340879_2_En_11_Fig5_HTML.jpg](A340879_2_En_11_Fig5_HTML.jpg)


    Figure 11-5. Memory and garbage collection statistics after table creation


    Let’s run a few queries, analyzing the statistics after each run. As the first
    step, run a script that deletes 1,500 rows in the individual transactions (see
    Listing [11-5](#A340879_2_En_11_Chapter.html#Par43)).


    ```

    declare

    @I int = 1

    while @I <= 1500

    begin

    delete from dbo.GCDemo where ID = @I;

    set @I += 1;

    end;

    Listing 11-5.

    Deleting 1,500 Rows from the Table

    ```


    Now run the code from Listing [11-4](#A340879_2_En_11_Chapter.html#Par40) again
    and look at the output. As you can see in Figure [11-6](#A340879_2_En_11_Chapter.html#Fig6),
    index statistics indicate that the deletion statement touched 1,500 rows; however,
    none of them was marked as expired even though the deletion statements ran in
    the individual autocommitted transactions.


    ![A340879_2_En_11_Fig6_HTML.jpg](A340879_2_En_11_Fig6_HTML.jpg)


    Figure 11-6. Memory and garbage collection statistics after deletion


    As the next step, run a `SELECT` query that scans the entire index, as shown in
    Listing [11-6](#A340879_2_En_11_Chapter.html#Par46). I am forcing the index rather
    than the table scan by using index hint in the query.


    ```

    select count(*) from dbo.GCDemo with (index = 2);

    Listing 11-6.

    Scanning the Table

    ```'
