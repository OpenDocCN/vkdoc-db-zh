  trans: '

    综上所述，通过将 ETL 流程调整为内存 OLTP，你可以获得最佳效果。考虑这样一种情况：你需要使用多个平面文件作为源将数据导入数据仓库。内存 OLTP 将允许你并行地从多个文件执行导入，而不会产生任何闩锁争用开销。此外，通过以大批次而非逐文件的方式执行数据处理和转换，你可以获得更好的结果。


    > **提示**

    > 当你将内存 OLTP 用于 ETL 流程时，考虑使用一个单独的**暂存数据库**。这将避免你在主数据库中创建一个包含检查点文件的内存 OLTP 文件组。


    ## 使用内存 OLTP 作为会话或对象状态存储


    现代软件系统已变得极其复杂。它们由大量负责各种任务的组件和服务组成，例如与用户交互、数据处理、与其他系统集成、报表等。它们必须具备可扩展性和冗余性，需要能够处理负载增长，并且需要能够经受硬件故障和崩溃的考验。


    解决可扩展性和冗余性问题的一个常见方法是，以允许部署和运行单个服务的多个实例的方式来设计系统。这允许你在负载增长时添加更多服务器和实例，并通过将负载分散到其他活动服务器上来帮助你经受硬件故障。这些服务通常以无状态方式实现，它们不存储或依赖任何本地数据。


    然而，大多数系统都有需要在实例间共享的数据。例如，前端 Web 服务器通常需要维护 Web 会话状态。后端处理服务通常需要有一个包含某些数据的共享缓存。


    ### 传统解决方案及其局限性


    从历史上看，有两种方法可以解决这个问题。第一种是使用专用的存储/缓存，并将其托管在系统中的某个地方。还记得旧的 ASP.NET 模型吗？它使用 SQL Server
    数据库或单独的 Web 服务器来存储会话数据。这种方法的问题在于可扩展性和冗余性有限。将会话数据存储在 Web 服务器内存中速度很快，但它不具备冗余性。另一方面，SQL
    Server 数据库可以受到保护，但由于页面闩锁争用和其他问题，它在负载下的扩展性不佳。


    另一种方法是在多个服务器之间复制缓存的内容。每个实例使用缓存的本地副本，而另一个后台进程则将更改分发到其他服务器。市场上有几种提供这种能力的解决方案；有些是开源的，有些是商业产品。


    ### 将内存 OLTP 用作会话存储


    如果你的系统使用 SQL Server 作为数据库后端，你可以选择在系统中利用内存 OLTP 作为会话或对象存储。由于它会给 SQL Server 增加额外负载，这不一定是最佳选择；然而，它可能是最简单的方法之一，特别是当
    SQL Server 有足够的额外带宽来处理负载时。


    简而言之，它类似于 ASP.NET 的 SQL Server 会话存储模型；但是，内存 OLTP 的吞吐量和性能提升解决了旧的基于磁盘解决方案的可扩展性问题。通过使用非持久性的内存优化表，你可以进一步提升性能。即使发生故障转移时数据会丢失，这在许多情况下也是可以接受的。


    清单 13-26 展示了可用于在数据库中存储和操作数据的表及本机编译存储过程。客户端应用程序调用 `LoadObjectFromStore` 和 `SaveObjectToStore`
    存储过程来加载和保存数据。`PurgeExpiredObjects` 存储过程从表中删除过期行，可以基于计划从 SQL Agent 或其他进程中调用它。


    ### 实现注意事项


    序列化的对象数据存储在 `varbinary(max)` 列中。如果你的对象不会超过 8000 字节，使用行内的 `varbinary(8000)` 数据类型可以获得稍好的性能。或者，如果需要，你可以为大型和小型对象使用单独的表。然而，请考虑开发和维护开销以及未来对象增长的可能性；消除行外内部表所带来的微小性能提升可能完全不值得付出这些努力。

    '
- fmt: "```sql\ncreate table dbo.ObjStore\n(\nObjectKey uniqueidentifier not null,\n\
    ExpirationTime datetime2(2) not null,\nData varbinary(max) not null,\nconstraint\
    \ PK_ObjStore\nprimary key nonclustered hash(ObjectKey)\nwith (bucket_count =\
    \ 131072),\n)\nwith (memory_optimized = on, durability = schema_only);\ncreate\
    \ proc dbo.SaveObjectToStore\n(\n@ObjectKey uniqueidentifier\n,@ExpirationTime\
    \ datetime2(2)\n,@Data varbinary(max)\n)\nwith native_compilation, schemabinding,\
    \ exec as owner\nas\nbegin atomic with\n(\ntransaction isolation level = snapshot\n\
    ,language = N'English'\n)\n-- @ObjectKeys are randomly generated and unique across\n\
    -- multiple sessions\nupdate dbo.ObjStore\nset Data = @Data, ExpirationTime =\
    \ @ExpirationTime\nwhere ObjectKey = @ObjectKey;\nif (@@rowcount = 0)\ninsert\
    \ into dbo.ObjStore(ObjectKey, ExpirationTime, Data)\nvalues(@ObjectKey, @ExpirationTime,\
    \ @Data)\nend;\ncreate proc dbo.LoadObjectFromStore\n(\n@ObjectKey uniqueidentifier\
    \ not null\n,@Data varbinary(max) output\n)\nwith native_compilation, schemabinding,\
    \ exec as owner\nas\nbegin atomic\nwith\n(\ntransaction isolation level = snapshot\n\
    ,language = N'English'\n)\nselect @Data = t.Data\nfrom dbo.ObjStore t\nwhere t.ObjectKey\
    \ = @ObjectKey and\nExpirationTime >= sysutcdatetime();\nend;\ncreate proc dbo.PurgeExpiredObjects\n\
    with native_compilation, schemabinding, exec as owner\nas\nbegin atomic\nwith\n\
    (\ntransaction isolation level = snapshot\n,language = N'English'\n)\ndeclare\
    \ @CurrentTime\ndatetime2(2) = sysutcdatetime();\ndelete dbo.ObjStore\nwhere ExpirationTime\
    \ < @CurrentTime\nend\n```\nListing 13-26. Implementing Session Store: Database\
    \ Schema\n\nThe client implementation includes several static classes. The `ObjStoreUtils`\
    \ class provides two methods to serialize and deserialize objects into the byte\
    \ arrays. You can see the implementation in Listing [13-27](#A340879_2_En_13_Chapter.html#Par148).\n\
    \n```csharp\npublic static class ObjStoreUtils\n{\n/// \n/// Serialize object\
    \ of type T to the byte array\n/// \npublic static byte[] Serialize(T obj)\n{\n\
    if (obj == null)\nreturn null;\nusing (var ms = new MemoryStream())\n{\nvar formatter\
    \ = new BinaryFormatter();\nformatter.Serialize(ms, obj);\nreturn ms.ToArray();\n\
    }\n}\n/// \n/// Deserialize byte array to the object\n/// \npublic static T Deserialize(byte[]\
    \ data)\n{\nif (data == null || data.Length == 0)\nreturn default(T);\nusing (var\
    \ output = new MemoryStream(data))\n{\nvar binForm = new BinaryFormatter();\n\
    return (T) binForm.Deserialize(output);\n}\n}\n}\n```\nListing 13-27. Implementing\
    \ Session Store: `ObjStoreUtils` Class\n\nThe `ObjStoreDataAccess` class shown\
    \ in Listing [13-28](#A340879_2_En_13_Chapter.html#Par150) loads and saves binary\
    \ data to and from the database. It utilizes another static class called `DBConnManager`,\
    \ which returns the `SqlConnection` object to the target database. This class\
    \ is not shown in the listing.\n\n```csharp\npublic static class ObjStoreDataAccess\n\
    {\n/// \n/// Saves serialized object to the database\n/// \npublic static void\
    \ SaveObjectData(Guid key,\nDateTime expirationTime, byte[] obj)\n{\nusing (var\
    \ cnn = DBConnManager.GetConnection())\n{\nusing (var cmd = cnn.CreateCommand())\n\
    {\ncmd.CommandText = \"dbo.SaveObjectToStore\";\ncmd.CommandType = CommandType.StoredProcedure;\n\
    cmd.Parameters.Add(\"@ObjectKey\",\nSqlDbType.UniqueIdentifier).Value = key;\n\
    cmd.Parameters.Add(\"@ExpirationTime\",\nSqlDbType.DateTime2).Value = expirationTime;\n\
    cmd.Parameters.Add(\"@Data\",\nSqlDbType.VarBinary,-1).Value = obj;\ncmd.ExecuteNonQuery();\n\
    }\n}\n}\n/// \n/// Load serialized object from the database\n/// \npublic byte[]\
    \ LoadObjectData(Guid key)\n{\nusing (var cnn = DBConnManager.GetConnection())\n\
    {\nusing (var cmd = cnn.CreateCommand())\n{\ncmd.CommandText = \"dbo.LoadObjectFromStore\"\
    ;\ncmd.CommandType = CommandType.StoredProcedure;\ncmd.Parameters.Add(\"ObjectKey\"\
    ,\nSqlDbType.UniqueIdentifier).Value = key;\ncmd.Parameters.Add(\"@Data\",\nSqlDbType.VarBinary,-1).Direction\
    \ =\nParameterDirection.Output;\ncmd.ExecuteNonQuery();\nreturn (byte[])cmd.Parameters[1].Value;\n\
    }\n}\n}\n}\n```\nListing 13-28. Implementing Session Store: `ObjStoreDataAccess`\
    \ Class\n\nFinally, the `ObjStoreService` class shown in Listing [13-29](#A340879_2_En_13_Chapter.html#Par152)\
    \ puts everything together and manages the entire process. It implements two simple\
    \ methods, `Load` and `Save`, calling the helper classes defined earlier.\n\n\
    ```csharp\npublic static class ObjStoreService\n{\n/// \n/// Saves object in the\
    \ object store\n/// \npublic static void Save(Guid key,\nDateTime expirationTime,\
    \ object obj)\n{\nvar objectBytes = ObjStoreUtils.Serialize(obj);\nObjStoreDataAccess.SaveObjectData(key,\
    \ expirationTime, objectBytes);\n}\n/// \n/// Loads object from the object store\n\
    /// \npublic static T Load(Guid key) where T: class\n{\nvar obj = ObjStoreDataAccess.LoadObjectData(key);\n\
    if (obj == null)\nreturn default(T); // Object not found\nreturn ObjStoreUtils.Deserialize(objectBytes);\n\
    }\n}\n```\nListing 13-29. Implementing Session Store: `ObjStoreService` Class\n\
    \nObviously, this is an oversimplified example, and the production implementation\
    \ could be significantly more complex, especially if there is the possibility\
    \ that multiple sessions can update the same object simultaneously. You can implement\
    \ retry logic or create some sort of object locking management in the system if\
    \ this is the case.\n\nIt is also worth mentioning that you can compress binary\
    \ data before saving it into the database. The compression will introduce unnecessary\
    \ overhead in the case of small objects; however, it could provide significant\
    \ space savings and performance improvements if the objects are large.\n\nI did\
    \ not include the compression code in the example, although you can easily implement\
    \ it with the `GZipStream` or `DeflateStream` class.\n\nNote\n\nThe code and test\
    \ application are included in the companion materials of this book.\n\n## Summary\n\
    \nSQL Server 2016 removes the majority of In-Memory OLTP limitations that existed\
    \ in the first release of the technology. However, migrating to In-Memory OLTP\
    \ still incurs an implementation cost. You should perform a cost-benefit analysis,\
    \ making sure that the cost is acceptable.\n\nIn-Memory OLTP can dramatically\
    \ improve the performance of OLTP systems. It is not necessarily the best choice\
    \ for data warehouse workloads and in-memory data warehouse implementations. You\
    \ may consider implementing data partitioning and combining the data from memory-optimized\
    \ and disk-based tables to get the most from all the SQL Server technologies.\n\
    \nYou can benefit from the technology even if you do not perform a full In-Memory\
    \ OLTP migration. To name just a few use cases, memory-optimized table variables\
    \ can be used as a replacement of disk-based temporary objects. Memory-optimized\
    \ table-valued parameters are the fastest way to pass the batch of the rows between\
    \ the client and T-SQL routines. Memory-optimized tables can be used as the staging\
    \ area for ETL processes.\n\nRemember, however, that In-Memory OLTP is not a “set\
    \ it and forget it” technology and may require administration and monitoring after\
    \ it is deployed to production.\n\n## Appendix A: Memory Pointer Management\n\n\
    This chapter explains how SQL Server works with memory pointers that link In-Memory\
    \ OLTP objects together."
