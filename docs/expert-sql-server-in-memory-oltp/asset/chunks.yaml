  trans: '### SAP HANA


    SAP HANA 是市场上相对较新的数据库解决方案；它自 2010 年起开始可用。直到最近，SAP HANA 一直作为纯粹的内存数据库实施，这限制了数据大小不能超过服务器可用内存量。


    这个问题在近期版本中已得到解决；然而，它需要单独的工具来管理数据。应用程序也需要知晓底层存储架构。例如，HANA 支持基于磁盘的扩展表；但是，应用程序需要直接查询它们，并实现数据在内存表与扩展表之间移动的逻辑。


    SAP HANA 以列式格式存储所有数据，并且不支持行式存储。数据是完全可修改的；SAP HANA 将新行存储在增量存储中，并在后台对其进行压缩。当 `UPDATE`
    操作像 SQL Server 内存中 OLTP 那样生成行的新版本时，使用多版本并发控制来处理并发问题。


    **注意**

    我将在第 8 章深入讨论内存中 OLTP 并发模型。


    SAP 声称，HANA 可以使用单份列式格式的数据，成功处理 OLTP 和数据仓库/分析工作负载。不幸的是，几乎找不到任何基准测试能证明它适用于 OLTP
    工作负载。考虑到纯粹的列式存储通常并未针对 OLTP 用例进行优化，很难向需要高 OLTP 吞吐量的系统推荐 SAP HANA。


    然而，对于专注于运营分析和商业智能并且需要支持不频繁的 OLTP 查询的系统来说，SAP HANA 可能是一个不错的选择。


    不可能涵盖市场上所有可用的内存数据库解决方案。其中许多解决方案针对特定工作负载和用例，并在这些方面表现出色。尽管如此，SQL Server 提供了一套丰富而成熟的功能和技术，可以覆盖广泛的需求范围。与市场上的其他主要供应商相比，SQL
    Server 也是一个具有成本效益的解决方案。


    ### 总结


    内存中 OLTP 的设计采用了与经典 SQL Server 数据库引擎不同的设计原则和架构。它是一个专门针对 OLTP 工作负载的产品，在某些场景下可以将性能提升
    20 到 40 倍。尽管如此，它已完全集成到 SQL Server 数据库引擎中。数据存储对于客户端应用程序是透明的，如果它们使用内存中 OLTP 支持的功能，则不需要任何代码更改。


    内存优化表的数据与缓冲池分开存储在内存中。所有内存中 OLTP 数据结构完全无锁存和无锁定，这允许你通过向服务器添加更多 CPU 来扩展系统。


    通过在内存优化表上定义聚集列存储索引，内存中 OLTP 可以支持运营分析。这些索引以列式存储格式存储来自表的数据副本。


    内存中 OLTP 对于任何行访问逻辑都使用本机编译为机器代码。此外，它允许你对存储过程、触发器和标量用户定义函数执行本机编译，这显著提高了它们的性能。


    ## 2. 内存中 OLTP 对象


    本章提供了内存中 OLTP 对象的高级概述。它展示了如何创建具有内存中 OLTP 文件组的数据库，以及如何定义内存优化表并通过互操作引擎和本机编译模块访问它们。


    最后，本章演示了当大量并发会话向数据库插入数据并且锁存争用成为瓶颈时，使用内存中 OLTP 引擎可以实现的性能改进。


    ### 准备数据库以使用内存中 OLTP


    内存中 OLTP 引擎已完全集成到 SQL Server 中，并且总是随产品一起安装。在 SQL Server 2014 和 2016 RTM 中，内存中
    OLTP 仅在企业版和开发人员版中可用。此限制在 SQL Server 2016 SP1 中已移除，你可以在每个 SQL Server 版本中使用该技术。


    然而，你应该记住，SQL Server 的非企业版在可利用的内存量方面有限制。例如，SQL Server 2016 标准版和速成版中的缓冲池内存分别限制为
    128GB 和 1,410MB 的 RAM。同样，内存优化表在每个数据库中存储的数据量在标准版中不能超过 32GB，在速成版中不能超过 352MB。如果内存中
    OLTP 没有足够内存来生成行的新版本，内存优化表中的数据将变为只读。


    **注意**

    我将在第 12 章讨论如何估算内存中 OLTP 对象所需的内存。


    内存中 OLTP 在 Microsoft Azure 的 SQL 数据库的高级层中也可用，包括高级弹性池中的数据库。但是，该技术可以利用的内存量基于服务层的
    DTU。截至撰写本文时，Microsoft 为每 125 个该层的 DTU 或 eDTU 提供了 1GB 内存。这在未来可能会改变，当你决定在 SQL 数据库中使用内存中
    OLTP 时，应查阅 Microsoft Azure 文档。


    要使用内存中 OLTP，你不需要安装任何额外的包或在 SQL Server 级别执行任何配置更改。但是，任何利用内存中 OLTP 对象的数据库都应该有一个单独的文件组来存储内存优化数据。


    对于本地 SQL Server 版本，你可以在创建数据库时创建此文件组，或者通过使用 `CONTAINS MEMORY_OPTIMIZED_DATA` 关键字修改现有数据库并添加文件组。然而，对于
    Microsoft Azure 中的 SQL 数据库，这并非必需，因为存储层对用户是抽象的。


    代码清单 2-1 显示了一个指定了内存中 OLTP 文件组的 `CREATE DATABASE` 语句示例。文件组的 `FILENAME` 属性指定了内存中
    OLTP 文件将位于的文件夹。


    ```sql

    create database InMemoryOLTPDemo

    on primary

    (

    name = N''InMemoryOLTPDemo''

    ,filename = N''M:\Data\InMemoryOLTPDemo.mdf''

    ),

    filegroup HKData CONTAINS MEMORY_OPTIMIZED_DATA

    (

    name = N''InMemory_OLTP_Data''

    ,filename = N''H:\HKData\InMemory_OLTP_Data''

    ),

    filegroup LOGDATA

    (name = N''LogData1'', filename = N''M:\Data\LogData1.ndf''),

    (name = N''LogData2'', filename = N''M:\Data\LogData2.ndf''),

    (name = N''LogData3'', filename = N''M:\Data\LogData3.ndf''),

    (name = N''LogData4'', filename = N''M:\Data\LogData4.ndf'')

    log on

    (

    name = N''InMemoryOLTPDemo_log''

    ,filename = N''L:\Log\InMemoryOLTPDemo_log.ldf''

    )

    ```


    代码清单 2-1.

    创建具有内存中 OLTP 文件组的数据库


    在内部，内存中 OLTP 利用基于 `FILESTREAM` 技术的流机制。虽然 `FILESTREAM` 的详细内容超出了本书范围，但我要提到它针对顺序
    I/O 访问进行了优化。事实上，内存中 OLTP 在设计上根本不使用随机 I/O 访问。在正常工作负载期间，它使用顺序仅追加写入；在数据库启动和恢复阶段，它使用顺序读取。你应该牢记这种行为，并将内存中
    OLTP 文件组放置在针对顺序性能优化的磁盘阵列中。


    与 `FILESTREAM` 文件组类似，内存中 OLTP 文件组可以包括放置在不同磁盘阵列上的多个容器，这允许你将负载分散到它们之上。'
- fmt: 'It is worth noting that In-Memory OLTP creates the set of files in the filegroup
    when you create the first In-Memory OLTP object. Unfortunately, SQL Server does
    not allow you to remove an In-Memory OLTP filegroup from the database even after
    you drop all memory-optimized tables and objects. However, you can still remove
    the In-Memory OLTP filegroup from the database while it is empty and does not
    contain any files.


    Note


    You can read more about `FILESTREAM` at [`https://docs.microsoft.com/en-us/sql/relational-databases/blob/filestream-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/blob/filestream-sql-server).


    I will discuss how In-Memory OLTP persists data on disk in Chapter [10](#A340879_2_En_10_Chapter.html)
    and cover the best practices in hardware and SQL Server configurations in Chapter
    [12](#A340879_2_En_12_Chapter.html).


    ## Database Compatibility Level


    As the general recommendation, Microsoft suggests that you set the database compatibility
    level to match the SQL Server version when you use In-Memory OLTP in the system.
    This will enable the latest T-SQL language constructs and performance improvements,
    which are disabled in the older compatibility levels.


    You should remember, however, that the database compatibility level affects the
    choice of cardinality estimation model along with Query Optimizer hotfix servicing
    model formerly controlled by the trace flag `T4199`. This may and will change
    the execution plans in the system even when you enable the `LEGACY_CARDINALITY_ESTIMATION`
    database-scoped configuration.


    You should carefully plan that change when you migrate the system from the old
    versions of SQL Server regardless if you utilize In-Memory OLTP or not. You can
    use the new SQL Server 2016 component called the Query Store to capture the execution
    plans of the queries before changing the compatibility level and force the old
    plans to the system-critical queries in case of regressions.


    ## Creating Memory-Optimized Tables


    Syntax-wise, creating memory-optimized tables is similar to disk-based tables.
    You can use the regular `CREATE TABLE` statement specifying that the table is
    memory-optimized.


    The code in Listing [2-2](#A340879_2_En_2_Chapter.html#Par21) creates three memory-optimized
    tables in the database. Please ignore all unfamiliar constructs; I will discuss
    them in detail later in the chapter.


    ```sql

    create table dbo.WebRequests_Memory

    (

    RequestId int not null identity(1,1)

    primary key nonclustered

    hash with (bucket_count=1048576),

    RequestTime datetime2(4) not null

    constraint DEF_WebRequests_Memory_RequestTime

    default sysutcdatetime(),

    URL varchar(255) not null,

    RequestType tinyint not null, -- GET/POST/PUT

    ClientIP varchar(15) not null,

    BytesReceived int not null,

    index IDX_RequestTime nonclustered(RequestTime)

    )

    with (memory_optimized=on, durability=schema_and_data);

    create table dbo.WebRequestHeaders_Memory

    (

    RequestHeaderId int not null identity(1,1)

    primary key nonclustered

    hash with (bucket_count=8388608),

    RequestId int not null,

    HeaderName varchar(64) not null,

    HeaderValue varchar(256) not null,

    index IDX_RequestID nonclustered hash(RequestID)

    with (bucket_count=1048576)

    )

    with (memory_optimized=on, durability=schema_and_data);

    create table dbo.WebRequestParams_Memory

    (

    RequestParamId int not null identity(1,1)

    primary key nonclustered

    hash with (bucket_count=8388608),

    RequestId int not null,

    ParamName varchar(64) not null,

    ParamValue nvarchar(256) not null,

    index IDX_RequestID nonclustered hash(RequestID)

    with (bucket_count=1048576)

    )

    with (memory_optimized=on, durability=schema_and_data);

    ```


    Listing 2-2. Creating Memory-Optimized Tables


    Each memory-optimized table has a `DURABILITY` setting. The default `SCHEMA_AND_DATA`
    value indicates that the data in the tables is fully durable and persists on disk
    for recovery purposes. Operations on such tables are logged in the database transaction
    log.


    `SCHEMA_ONLY` is another value, which indicates that data in memory-optimized
    tables is not durable and would be lost in the event of a SQL Server restart,
    crash, or failover to another node. Operations against nondurable memory-optimized
    tables are not logged in the transaction log. Nondurable tables are extremely
    fast and can be used if you need to store temporary data in use cases similar
    to temporary tables in `tempdb`. As the opposite to temporary tables, SQL Server
    persists the schema of nondurable memory-optimized tables, and you do not need
    to re-create them in the event of a SQL Server restart.


    The indexes of memory-optimized tables must be created inline and defined as part
    of a `CREATE TABLE` statement. You cannot add or drop an index or change an index’s
    definition after a table is created.


    SQL Server 2016 allows you to alter the table schema and indexes. This, however,
    creates the new table object in memory, copying data from the old table there.
    This is an offline operation, which is time- and resource-consuming and requires
    you to have enough memory to accommodate multiple copies of the data.


    Tip


    You can combine multiple `ADD` or `DROP` operations into a single `ALTER` statement
    to reduce the number of table rebuilds.


    In SQL Server 2016, memory-optimized tables support at most eight indexes. Durable
    memory-optimized tables should have a unique `PRIMARY KEY` constraint defined.
    Nondurable memory-optimized tables do not require the `PRIMARY KEY` constraint;
    however, they should still have at least one index to link the rows together.
    It is worth noting that the eight-index limitation will be removed in SQL Server
    2017.


    Memory-optimized tables support two main types of indexes, `HASH` and `NONCLUSTERED`.
    Hash indexes are optimized for point-lookup operations, which is the search of
    one or multiple rows with equality predicates. This is a conceptually new index
    type in SQL Server, and the Storage Engine does not have anything similar to it
    implemented. Nonclustered indexes, on the other hand, are somewhat similar to
    B-Tree indexes on disk-based tables. Finally, SQL Server 2016 allows you to create
    clustered columnstore indexes to support operational analytics queries in the
    system.


    Hash and nonclustered indexes are never persisted on disk. SQL Server re-creates
    them when it starts the database and loads memory-optimized data into memory.
    As with disk-based tables, unnecessary indexes in memory-optimized tables slow
    down data modifications and use extra memory in the system.


    Note


    I will discuss hash indexes in detail in Chapter [4](#A340879_2_En_4_Chapter.html)
    and nonclustered indexes in Chapter [5](#A340879_2_En_5_Chapter.html). I will
    cover columnstore indexes in Chapter [7](#A340879_2_En_7_Chapter.html).'
  raw: 'It is worth noting that In-Memory OLTP creates the set of files in the filegroup
    when you create the first In-Memory OLTP object. Unfortunately, SQL Server does
    not allow you to remove an In-Memory OLTP filegroup from the database even after
    you drop all memory-optimized tables and objects. However, you can still remove
    the In-Memory OLTP filegroup from the database while it is empty and does not
    contain any files.


    Note


    You can read more about `FILESTREAM` at [`https://docs.microsoft.com/en-us/sql/relational-databases/blob/filestream-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/blob/filestream-sql-server)
    .


    I will discuss how In-Memory OLTP persists data on disk in Chapter [10](#A340879_2_En_10_Chapter.html)
    and cover the best practices in hardware and SQL Server configurations in Chapter
    [12](#A340879_2_En_12_Chapter.html).


    Database Compatibility Level


    As the general recommendation, Microsoft suggests that you set the database compatibility
    level to match the SQL Server version when you use In-Memory OLTP in the system.
    This will enable the latest T-SQL language constructs and performance improvements,
    which are disabled in the older compatibility levels.


    You should remember, however, that the database compatibility level affects the
    choice of cardinality estimation model along with Query Optimizer hotfix servicing
    model formerly controlled by the trace flag `T4199`. This may and will change
    the execution plans in the system even when you enable the `LEGACY_CARDINALITY_ESTIMATION`
    database-scoped configuration.


    You should carefully plan that change when you migrate the system from the old
    versions of SQL Server regardless if you utilize In-Memory OLTP or not. You can
    use the new SQL Server 2016 component called the Query Store to capture the execution
    plans of the queries before changing the compatibility level and force the old
    plans to the system-critical queries in case of regressions.


    ## Creating Memory-Optimized Tables


    Syntax-wise, creating memory-optimized tables is similar to disk-based tables.
    You can use the regular `CREATE TABLE` statement specifying that the table is
    memory-optimized.


    The code in Listing [2-2](#A340879_2_En_2_Chapter.html#Par21) creates three memory-optimized
    tables in the database. Please ignore all unfamiliar constructs; I will discuss
    them in detail later in the chapter.


    ```

    create table dbo.WebRequests_Memory

    (

    RequestId int not null identity(1,1)

    primary key nonclustered

    hash with (bucket_count=1048576),

    RequestTime datetime2(4) not null

    constraint DEF_WebRequests_Memory_RequestTime

    default sysutcdatetime(),

    URL varchar(255) not null,

    RequestType tinyint not null, -- GET/POST/PUT

    ClientIP varchar(15) not null,

    BytesReceived int not null,

    index IDX_RequestTime nonclustered(RequestTime)

    )

    with (memory_optimized=on, durability=schema_and_data);

    create table dbo.WebRequestHeaders_Memory

    (

    RequestHeaderId int not null identity(1,1)

    primary key nonclustered

    hash with (bucket_count=8388608),

    RequestId int not null,

    HeaderName varchar(64) not null,

    HeaderValue varchar(256) not null,

    index IDX_RequestID nonclustered hash(RequestID)

    with (bucket_count=1048576)

    )

    with (memory_optimized=on, durability=schema_and_data);

    create table dbo.WebRequestParams_Memory

    (

    RequestParamId int not null identity(1,1)

    primary key nonclustered

    hash with (bucket_count=8388608),

    RequestId int not null,

    ParamName varchar(64) not null,

    ParamValue nvarchar(256) not null,

    index IDX_RequestID nonclustered hash(RequestID)

    with (bucket_count=1048576)

    )

    with (memory_optimized=on, durability=schema_and_data);

    Listing 2-2.

    Creating Memory-Optimized Tables

    ```


    Each memory-optimized table has a `DURABILITY` setting . The default `SCHEMA_AND_DATA`
    value indicates that the data in the tables is fully durable and persists on disk
    for recovery purposes. Operations on such tables are logged in the database transaction
    log.


    `SCHEMA_ONLY` is another value, which indicates that data in memory-optimized
    tables is not durable and would be lost in the event of a SQL Server restart,
    crash, or failover to another node. Operations against nondurable memory-optimized
    tables are not logged in the transaction log. Nondurable tables are extremely
    fast and can be used if you need to store temporary data in use cases similar
    to temporary tables in `tempdb`. As the opposite to temporary tables, SQL Server
    persists the schema of nondurable memory-optimized tables, and you do not need
    to re-create them in the event of a SQL Server restart.


    The indexes of memory-optimized tables must be created inline and defined as part
    of a `CREATE TABLE` statement. You cannot add or drop an index or change an index’s
    definition after a table is created.


    SQL Server 2016 allows you to alter the table schema and indexes. This, however,
    creates the new table object in memory, copying data from the old table there.
    This is an offline operation, which is time- and resource-consuming and requires
    you to have enough memory to accommodate multiple copies of the data.


    Tip


    You can combine multiple `ADD` or `DROP` operations into a single `ALTER` statement
    to reduce the number of table rebuilds.


    In SQL Server 2016, memory-optimized tables support at most eight indexes. Durable
    memory-optimized tables should have a unique `PRIMARY KEY` constraint defined.
    Nondurable memory-optimized tables do not require the `PRIMARY KEY` constraint;
    however, they should still have at least one index to link the rows together.
    It is worth noting that the eight-index limitation will be removed in SQL Server
    2017.


    Memory-optimized tables support two main types of indexes, `HASH` and `NONCLUSTERED`.
    Hash indexes are optimized for point-lookup operations, which is the search of
    one or multiple rows with equality predicates. This is a conceptually new index
    type in SQL Server, and the Storage Engine does not have anything similar to it
    implemented. Nonclustered indexes , on the other hand, are somewhat similar to
    B-Tree indexes on disk-based tables. Finally, SQL Server 2016 allows you to create
    clustered columnstore indexes to support operational analytics queries in the
    system.


    Hash and nonclustered indexes are never persisted on disk. SQL Server re-creates
    them when it starts the database and loads memory-optimized data into memory.
    As with disk-based tables, unnecessary indexes in memory-optimized tables slow
    down data modifications and use extra memory in the system.


    Note


    I will discuss hash indexes in detail in Chapter [4](#A340879_2_En_4_Chapter.html)
    and nonclustered indexes in Chapter [5](#A340879_2_En_5_Chapter.html). I will
    cover columnstore indexes in Chapter [7](#A340879_2_En_7_Chapter.html).'
  trans: '

    值得注意的是，内存中 OLTP 会在您创建第一个内存中 OLTP 对象时，在文件组中创建一组文件。可惜的是，即使您删除了所有内存优化表和对象，SQL Server
    也不允许您从数据库中移除内存中 OLTP 文件组。但是，在文件组为空且不包含任何文件时，您仍然可以从数据库中移除该内存中 OLTP 文件组。


    注意


    您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/blob/filestream-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/blob/filestream-sql-server)
    阅读更多关于 `FILESTREAM` 的内容。


    我将在第 10 章讨论内存中 OLTP 如何在磁盘上持久化数据，并在第 12 章介绍硬件和 SQL Server 配置的最佳实践。


    ## 数据库兼容级别


    作为一般建议，Microsoft 建议您在系统中使用内存中 OLTP 时，将数据库兼容级别设置为与 SQL Server 版本匹配。这将启用最新的 T-SQL
    语言构造和性能改进，而这些在旧的兼容级别中是禁用的。


    但是，您应该记住，数据库兼容级别会影响基数估算模型的选择，以及以前由跟踪标志 `T4199` 控制的查询优化器修补程序服务模型。即使您启用了 `LEGACY_CARDINALITY_ESTIMATION`
    数据库作用域配置，这也可能且将会改变系统中的执行计划。


    当您从旧版本的 SQL Server 迁移系统时，无论是否使用内存中 OLTP，都应仔细规划此更改。您可以使用 SQL Server 2016 的新组件——查询存储，在更改兼容级别之前捕获查询的执行计划，并在出现性能回退时强制系统关键查询使用旧计划。


    ## 创建内存优化表


    从语法上讲，创建内存优化表与创建基于磁盘的表类似。您可以使用常规的 `CREATE TABLE` 语句，并指定该表为内存优化。


    代码清单 2-2 在数据库中创建了三个内存优化表。请忽略所有不熟悉的构造；我将在本章后面详细讨论它们。


    ```sql

    create table dbo.WebRequests_Memory

    (

    RequestId int not null identity(1,1)

    primary key nonclustered

    hash with (bucket_count=1048576),

    RequestTime datetime2(4) not null

    constraint DEF_WebRequests_Memory_RequestTime

    default sysutcdatetime(),

    URL varchar(255) not null,

    RequestType tinyint not null, -- GET/POST/PUT

    ClientIP varchar(15) not null,

    BytesReceived int not null,

    index IDX_RequestTime nonclustered(RequestTime)

    )

    with (memory_optimized=on, durability=schema_and_data);

    create table dbo.WebRequestHeaders_Memory

    (

    RequestHeaderId int not null identity(1,1)

    primary key nonclustered

    hash with (bucket_count=8388608),

    RequestId int not null,

    HeaderName varchar(64) not null,

    HeaderValue varchar(256) not null,

    index IDX_RequestID nonclustered hash(RequestID)

    with (bucket_count=1048576)

    )

    with (memory_optimized=on, durability=schema_and_data);

    create table dbo.WebRequestParams_Memory

    (

    RequestParamId int not null identity(1,1)

    primary key nonclustered

    hash with (bucket_count=8388608),

    RequestId int not null,

    ParamName varchar(64) not null,

    ParamValue nvarchar(256) not null,

    index IDX_RequestID nonclustered hash(RequestID)

    with (bucket_count=1048576)

    )

    with (memory_optimized=on, durability=schema_and_data);

    ```


    代码清单 2-2. 创建内存优化表


    每个内存优化表都有一个 `DURABILITY` 设置。默认的 `SCHEMA_AND_DATA` 值表示表中的数据是完全持久的，为了恢复目的会持久保存在磁盘上。对这些表的操作会记录在数据库事务日志中。


    `SCHEMA_ONLY` 是另一个值，表示内存优化表中的数据是不持久的，在 SQL Server 重启、崩溃或故障转移到另一个节点时会丢失。针对非持久内存优化表的操作不会记录在事务日志中。非持久表速度极快，可以在类似于
    `tempdb` 中临时表的用例中用于存储临时数据。与临时表相反，SQL Server 会持久化非持久内存优化表的架构，您无需在 SQL Server 重启时重新创建它们。


    内存优化表的索引必须内联创建，并作为 `CREATE TABLE` 语句的一部分定义。在表创建后，您无法添加或删除索引，也无法更改索引的定义。


    SQL Server 2016 允许您更改表架构和索引。但是，这会在内存中创建新的表对象，并将数据从旧表复制过去。这是一个离线操作，耗时且消耗资源，并且需要您有足够的内存来容纳数据的多个副本。


    提示


    您可以将多个 `ADD` 或 `DROP` 操作组合到单个 `ALTER` 语句中，以减少表重建的次数。


    在 SQL Server 2016 中，内存优化表最多支持八个索引。持久的内存优化表应定义唯一的 `PRIMARY KEY` 约束。非持久的内存优化表不需要
    `PRIMARY KEY` 约束；但是，它们仍应至少有一个索引来链接行。值得注意的是，八索引限制将在 SQL Server 2017 中移除。


    内存优化表支持两种主要索引类型：`HASH` 和 `NONCLUSTERED`。哈希索引针对点查找操作（即使用等式谓词搜索一行或多行）进行了优化。这是 SQL
    Server 中一个概念上新的索引类型，存储引擎中没有实现任何类似的内容。而非聚集索引则与基于磁盘的表上的 B-Tree 索引有些相似。最后，SQL Server
    2016 允许您创建聚集列存储索引，以支持系统中的操作分析查询。


    哈希索引和非聚集索引从不持久保存在磁盘上。SQL Server 在启动数据库并将内存优化数据加载到内存中时会重新创建它们。与基于磁盘的表一样，内存优化表中不必要的索引会减慢数据修改速度并在系统中使用额外的内存。


    注意


    我将在第 4 章详细讨论哈希索引，在第 5 章讨论非聚集索引。我将在第 7 章介绍列存储索引。

    '
- fmt: '# Working with Memory-Optimized Tables


    ## 使用解释式T-SQL访问内存优化表


    在解释模式下，SQL Server 处理内存优化表的方式与处理基于磁盘的表非常相似。它会优化查询并缓存执行计划，无论表位于何处。查询执行期间使用相同的操作符集。从高层次来看，当
    SQL Server 需要从表中获取一行并调用操作符的 `GetRow()` 方法时，该调用会根据底层表类型被路由到存储引擎或内存 OLTP 引擎。


    大多数 T-SQL 功能和结构在解释模式下都得到支持。但仍存在一些限制；例如，无法截断内存优化表或将其用作 `MERGE` 语句的目标。幸运的是，此类限制的列表很小。


    [清单 2-3](#A340879_2_En_2_Chapter.html#Par34) 展示了一个 T-SQL 存储过程的示例，该过程向[清单 2-2](#A340879_2_En_2_Chapter.html#Par21)
    中创建的内存优化表插入数据。为简单起见，该过程将需要插入到 `dbo.WebRequestParams_Memory` 表中的数据作为常规参数接受，将其限制为五个值。显然，在生产代码中，最好在此类场景中使用表值参数。


    ```sql

    create proc dbo.InsertRequestInfo_Memory

    (

    @URL varchar(255)

    ,@RequestType tinyint

    ,@ClientIP varchar(15)

    ,@BytesReceived int

    -- Header fields

    ,@Authorization varchar(256)

    ,@UserAgent varchar(256)

    ,@Host varchar(256)

    ,@Connection varchar(256)

    ,@Referer varchar(256)

    -- Hardcoded parameters.. Just for the demo purposes

    ,@Param1 varchar(64) = null

    ,@Param1Value nvarchar(256) = null

    ,@Param2 varchar(64) = null

    ,@Param2Value nvarchar(256) = null

    ,@Param3 varchar(64) = null

    ,@Param3Value nvarchar(256) = null

    ,@Param4 varchar(64) = null

    ,@Param4Value nvarchar(256) = null

    ,@Param5 varchar(64) = null

    ,@Param5Value nvarchar(256) = null

    )

    as

    begin

    set nocount on

    set xact_abort on

    declare

    @RequestId int

    begin tran

    insert into dbo.WebRequests_Memory

    (URL,RequestType,ClientIP,BytesReceived)

    values

    (@URL,@RequestType,@ClientIP,@BytesReceived);

    select @RequestId = SCOPE_IDENTITY();

    insert into dbo.WebRequestHeaders_Memory

    (RequestId,HeaderName,HeaderValue)

    values

    (@RequestId,''AUTHORIZATION'',@Authorization)

    ,(@RequestId,''USERAGENT'',@UserAgent)

    ,(@RequestId,''HOST'',@Host)

    ,(@RequestId,''CONNECTION'',@Connection)

    ,(@RequestId,''REFERER'',@Referer);

    ;with Params(ParamName, ParamValue)

    as

    (

    select ParamName, ParamValue

    from (

    values

    (@Param1, @Param1Value)

    ,(@Param2, @Param2Value)

    ,(@Param3, @Param3Value)

    ,(@Param4, @Param4Value)

    ,(@Param5, @Param5Value)

    ) v(ParamName, ParamValue)

    where

    ParamName is not null and

    ParamValue is not null

    )

    insert into dbo.WebRequestParams_Memory

    (RequestID,ParamName,ParamValue)

    select @RequestID, ParamName, ParamValue

    from Params;

    commit

    end

    ```

    **清单 2-3. 通过互操作引擎将数据插入内存优化表的存储过程**


    如你所见，通过互操作引擎工作的存储过程不需要任何特定的语言结构来访问内存优化表。


    ## 使用原生编译模块访问内存优化表


    原生编译模块也是使用常规的 `CREATE` 语句定义的，并且它们使用 T-SQL 语言。然而，在创建阶段必须指定几个附加选项。


    [清单 2-4](#A340879_2_En_2_Chapter.html#Par38) 中的代码创建了原生编译存储过程，该过程实现了与[清单 2-3](#A340879_2_En_2_Chapter.html#Par34)
    中定义的 `dbo.InsertRequestInfo_Memory` 存储过程相同的逻辑。


    ```sql

    create proc dbo.InsertRequestInfo_NativelyCompiled

    (

    @URL varchar(255) not null

    ,@RequestType tinyint not null

    ,@ClientIP varchar(15) not null

    ,@BytesReceived int not null

    -- Header fields

    ,@Authorization varchar(256) not null

    ,@UserAgent varchar(256) not null

    ,@Host varchar(256) not null

    ,@Connection varchar(256) not null

    ,@Referer varchar(256) not null

    -- Parameters.. Just for the demo purposes

    ,@Param1 varchar(64) = null

    ,@Param1Value nvarchar(256) = null

    ,@Param2 varchar(64) = null

    ,@Param2Value nvarchar(256) = null

    ,@Param3 varchar(64) = null

    ,@Param3Value nvarchar(256) = null

    ,@Param4 varchar(64) = null

    ,@Param4Value nvarchar(256) = null

    ,@Param5 varchar(64) = null

    ,@Param5Value nvarchar(256) = null

    )

    with native_compilation, schemabinding, execute as owner

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''English''

    )

    declare

    @RequestId int

    insert into dbo.WebRequests_Memory

    (URL,RequestType,ClientIP,BytesReceived)

    values

    (@URL,@RequestType,@ClientIP,@BytesReceived);

    select @RequestId = SCOPE_IDENTITY();

    insert into dbo.WebRequestHeaders_Memory

    (RequestId,HeaderName,HeaderValue)

    select @RequestId,''AUTHORIZATION'',@Authorization union all

    select @RequestId,''USERAGENT'',@UserAgent union all

    select @RequestId,''HOST'',@Host union all

    select @RequestId,''CONNECTION'',@Connection union all

    select @RequestId,''REFERER'',@Referer;

    insert into dbo.WebRequestParams_Memory

    (RequestID,ParamName,ParamValue)

    select @RequestID, ParamName, ParamValue

    from

    (

    select @Param1, @Param1Value union all

    select @Param2, @Param2Value union all

    select @Param3, @Param3Value union all

    select @Param4, @Param4Value union all

    select @Param5, @Param5Value

    ) v(ParamName, ParamValue)

    where

    ParamName is not null and

    ParamValue is not null;

    end

    ```

    **清单 2-4. 原生编译的存储过程**


    你应该使用 `WITH NATIVE_COMPILATION` 子句来指定模块是原生编译的。所有原生编译模块都是架构绑定的，它们要求你指定 `SCHEMABINDING`
    选项。最后，你可以设置可选的执行安全上下文和其他几个参数。我将在[第 9 章](#A340879_2_En_9_Chapter.html)中详细讨论它们。


    原生编译存储过程作为原子块执行，由 `BEGIN ATOMIC` 关键字指示，这是一种“全有或全无”的方法。过程中的所有语句要么全部成功，要么全部失败。


    当原生编译存储过程在活动事务上下文之外被调用时，它会启动一个新事务，并在执行结束时提交或回滚该事务。


    在过程于活动事务上下文中被调用的情况下，SQL Server 会在过程执行开始时创建一个保存点。如果过程中出现错误，SQL Server 会将事务回滚到创建的保存点。根据错误的严重程度和类型，事务要么能够继续并提交，要么会变成无法提交的“已判定失败”状态。


    尽管 `dbo.InsertRequestInfo_Memory` 和 `dbo.InsertRequestInfo_NativelyCompiled` 存储过程完成相同的任务，但它们的实现略有不同。原生编译存储过程有一个广泛的限制列表和不支持的
    T-SQL 功能。在前面的示例中，你可以看到既不支持带有多个 `VALUES` 的 `INSERT` 语句，也不支持 CTE。


    > **注意**

    > 我将在[第 9 章](#A340879_2_En_9_Chapter.html)中更深入地讨论原生编译存储过程、原子事务和支持的 T-SQL 语言结构。


    最后，值得一提的是，原生编译模块只能访问内存优化表。无法查询基于磁盘的表，或者，再举一个例子，将内存优化表和基于磁盘的表连接在一起。对于此类任务，你必须使用解释式
    T-SQL 和互操作引擎。'
  raw: '## Working with Memory-Optimized Tables


    You can access data in memory-optimized tables either using interpreted T-SQL
    or from natively compiled modules. In interpreted mode, SQL Server treats memory-optimized
    tables pretty much the same way as disk-based tables. It optimizes queries and
    caches execution plans, regardless of where the table is located. The same set
    of operators is used during query execution. From a high level, when SQL Server
    needs to get a row from a table and the operator’s `GetRow()` method is called,
    it is routed either to the Storage Engine or to the In-Memory OLTP Engine, depending
    on the underlying table type.


    Most T-SQL features and constructs are supported in interpreted mode. Some limitations
    still exist; for example, you cannot truncate a memory-optimized table or use
    it as the target in a `MERGE` statement. Fortunately, the list of such limitations
    is small.


    Listing [2-3](#A340879_2_En_2_Chapter.html#Par34) shows an example of a T-SQL
    stored procedure that inserts data into the memory-optimized tables created in
    Listing [2-2](#A340879_2_En_2_Chapter.html#Par21). For simplicity’s sake, the
    procedure accepts the data that needs to be inserted into the `dbo.WebRequestParams_Memory`
    table as the regular parameters, limiting it to five values. Obviously, in production
    code it is better to use table-valued parameters in such a scenario.


    ```

    create proc dbo.InsertRequestInfo_Memory

    (

    @URL varchar(255)

    ,@RequestType tinyint

    ,@ClientIP varchar(15)

    ,@BytesReceived int

    -- Header fields

    ,@Authorization varchar(256)

    ,@UserAgent varchar(256)

    ,@Host varchar(256)

    ,@Connection varchar(256)

    ,@Referer varchar(256)

    -- Hardcoded parameters.. Just for the demo purposes

    ,@Param1 varchar(64) = null

    ,@Param1Value nvarchar(256) = null

    ,@Param2 varchar(64) = null

    ,@Param2Value nvarchar(256) = null

    ,@Param3 varchar(64) = null

    ,@Param3Value nvarchar(256) = null

    ,@Param4 varchar(64) = null

    ,@Param4Value nvarchar(256) = null

    ,@Param5 varchar(64) = null

    ,@Param5Value nvarchar(256) = null

    )

    as

    begin

    set nocount on

    set xact_abort on

    declare

    @RequestId int

    begin tran

    insert into dbo.WebRequests_Memory

    (URL,RequestType,ClientIP,BytesReceived)

    values

    (@URL,@RequestType,@ClientIP,@BytesReceived);

    select @RequestId = SCOPE_IDENTITY();

    insert into dbo.WebRequestHeaders_Memory

    (RequestId,HeaderName,HeaderValue)

    values

    (@RequestId,''AUTHORIZATION'',@Authorization)

    ,(@RequestId,''USERAGENT'',@UserAgent)

    ,(@RequestId,''HOST'',@Host)

    ,(@RequestId,''CONNECTION'',@Connection)

    ,(@RequestId,''REFERER'',@Referer);

    ;with Params(ParamName, ParamValue)

    as

    (

    select ParamName, ParamValue

    from (

    values

    (@Param1, @Param1Value)

    ,(@Param2, @Param2Value)

    ,(@Param3, @Param3Value)

    ,(@Param4, @Param4Value)

    ,(@Param5, @Param5Value)

    ) v(ParamName, ParamValue)

    where

    ParamName is not null and

    ParamValue is not null

    )

    insert into dbo.WebRequestParams_Memory

    (RequestID,ParamName,ParamValue)

    select @RequestID, ParamName, ParamValue

    from Params;

    commit

    end

    Listing 2-3.

    Stored Procedure That Inserts Data into Memory-Optimized Tables Through the Interop
    Engine

    ```


    As you can see, the stored procedure that works through the Interop Engine does
    not require any specific language constructs to access memory-optimized tables.


    Natively compiled modules are also defined with a regular `CREATE` statement,
    and they use the T-SQL language. However, there are several additional options
    that must be specified at the creation stage.


    The code in Listing [2-4](#A340879_2_En_2_Chapter.html#Par38) creates the natively
    compiled stored procedure that accomplishes the same logic as the `dbo.InsertRequestInfo_Memory`
    stored procedure defined in Listing [2-3](#A340879_2_En_2_Chapter.html#Par34).


    ```

    create proc dbo.InsertRequestInfo_NativelyCompiled

    (

    @URL varchar(255) not null

    ,@RequestType tinyint not null

    ,@ClientIP varchar(15) not null

    ,@BytesReceived int not null

    -- Header fields

    ,@Authorization varchar(256) not null

    ,@UserAgent varchar(256) not null

    ,@Host varchar(256) not null

    ,@Connection varchar(256) not null

    ,@Referer varchar(256) not null

    -- Parameters.. Just for the demo purposes

    ,@Param1 varchar(64) = null

    ,@Param1Value nvarchar(256) = null

    ,@Param2 varchar(64) = null

    ,@Param2Value nvarchar(256) = null

    ,@Param3 varchar(64) = null

    ,@Param3Value nvarchar(256) = null

    ,@Param4 varchar(64) = null

    ,@Param4Value nvarchar(256) = null

    ,@Param5 varchar(64) = null

    ,@Param5Value nvarchar(256) = null

    )

    with native_compilation, schemabinding, execute as owner

    as

    begin atomic with

    (

    transaction isolation level = snapshot

    ,language = N''English''

    )

    declare

    @RequestId int

    insert into dbo.WebRequests_Memory

    (URL,RequestType,ClientIP,BytesReceived)

    values

    (@URL,@RequestType,@ClientIP,@BytesReceived);

    select @RequestId = SCOPE_IDENTITY();

    insert into dbo.WebRequestHeaders_Memory

    (RequestId,HeaderName,HeaderValue)

    select @RequestId,''AUTHORIZATION'',@Authorization union all

    select @RequestId,''USERAGENT'',@UserAgent union all

    select @RequestId,''HOST'',@Host union all

    select @RequestId,''CONNECTION'',@Connection union all

    select @RequestId,''REFERER'',@Referer;

    insert into dbo.WebRequestParams_Memory

    (RequestID,ParamName,ParamValue)

    select @RequestID, ParamName, ParamValue

    from

    (

    select @Param1, @Param1Value union all

    select @Param2, @Param2Value union all

    select @Param3, @Param3Value union all

    select @Param4, @Param4Value union all

    select @Param5, @Param5Value

    ) v(ParamName, ParamValue)

    where

    ParamName is not null and

    ParamValue is not null;

    end

    Listing 2-4.

    Natively Complied Stored Procedure

    ```


    You should specify that the module is natively compiled using the `WITH NATIVE_COMPILATION`
    clause. All natively compiled modules are schema-bound, and they require you to
    specify the `SCHEMABINDING` option. Finally, you can set the optional execution
    security context and several other parameters. I will discuss them in detail in
    Chapter [9](#A340879_2_En_9_Chapter.html).


    Natively compiled stored procedures execute as atomic blocks indicated by the
    `BEGIN ATOMIC` keyword, which is an “all or nothing” approach. Either all of the
    statements in the procedure succeed or all of them fail.


    When a natively compiled stored procedure is called outside the context of an
    active transaction, it starts a new transaction and either commits or rolls it
    back at the end of the execution.


    In cases where a procedure is called in the context of an active transaction,
    SQL Server creates a savepoint at the beginning of the procedure’s execution.
    In case of an error in the procedure, SQL Server rolls back the transaction to
    the created savepoint. Based on the severity and type of error, the transaction
    is either going to be able to continue and commit or become doomed and uncommittable.


    Even though the `dbo.InsertRequestInfo_Memory` and `dbo.InsertRequestInfo_NativelyCompiled`
    stored procedures accomplish the same task, their implementation is slightly different.
    Natively compiled stored procedures have an extensive list of limitations and
    unsupported T-SQL features. In the previous example, you can see that neither
    the `INSERT` statement with multiple `VALUES` nor CTE were supported.


    Note


    I will discuss natively compiled stored procedures, atomic transactions, and supported
    T-SQL language constructs in greater depth in Chapter [9](#A340879_2_En_9_Chapter.html).


    Finally, it is worth mentioning that natively compiled modules can access only
    memory-optimized tables. It is impossible to query disk-based tables or, as another
    example, join memory-optimized and disk-based tables together. You have to use
    interpreted T-SQL and the Interop Engine for such tasks.'
