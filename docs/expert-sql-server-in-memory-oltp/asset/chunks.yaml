  trans: '## 数据存储


    来自持久化内存优化表的数据与基于磁盘的表分开存储。SQL Server 使用一种基于 `FILESTREAM` 技术的流机制来存储它。然而，内存 OLTP
    和 `FILESTREAM` 是彼此分开存储数据的，当数据库同时使用这两种技术时，你应该有两个独立的文件组：一个用于内存 OLTP，另一个用于 `FILESTREAM`
    数据。


    基于磁盘的数据和内存优化数据的存储方式存在概念上的差异。基于磁盘的表存储行的唯一、最新版本。对一行的多次更新会多次更改同一个行对象。行的删除会将其从数据库中移除。最后，在需要时总是可以在数据文件中定位到数据行。


    内存 OLTP 采用一种完全不同的方法，它将行的多个版本持久化到磁盘上。对数据行的多次更新会生成多个行对象，每个对象具有不同的生命周期。SQL Server
    将它们追加到存储在内存 OLTP 文件组中的二进制文件中，这些文件称为检查点文件，有时也称为检查点文件对（`CFP`）。


    无法预测数据行存储在检查点文件中的哪个位置。也没有使用这种操作的用例。这些文件的唯一目的是提供数据持久性，并在数据库启动时提高将数据加载到内存中的性能。


    顾名思义，每个检查点文件对由两个文件组成：一个数据文件和一个增量文件。每个 `CFP` 覆盖一定范围的全局事务时间戳值的操作，记录那些 `BeginTs`
    值在此范围内的行上的操作。每次插入一行时，它都会被保存到数据文件中。每次删除一行时，有关已删除行的信息都会保存到增量文件中。一次更新会产生两个操作，`INSERT`
    和 `DELETE`，并将此信息保存到两个文件中。本章稍后将更详细地介绍所有这些操作的工作原理。


    图 10-1 提供了检查点文件对结构的高级概述。


    ![A340879_2_En_10_Fig1_HTML.jpg](img/A340879_2_En_10_Fig1_HTML.jpg)


    图 10-1. 检查点文件中的数据


    如你所记得的，内存优化表可能包含额外的内部表，用于存储溢出行列和列存储索引相关结构的数据。这些内部表被视为单独的对象（检查点文件中的行使用 `xtp_object_id`
    作为引用），其中的数据与主行内数据行分开存储。


    来自 LOB 列（如 `(n)varchar(max)` 和 `varbinary(max)`）的数据存储在另一种类型的数据文件中，称为大容量数据文件。大容量数据文件具有与常规数据文件相似的结构；但是，它们可以在行的有效负载部分存储超过
    8,060 字节的数据。值得注意的是，来自行溢出列表的数据存储在常规数据文件中。


    大容量数据文件也用于存储压缩的列存储段。压缩的段数据存储在行的有效负载部分，并通过 `segment_id` 和 `column_id` 值引用。另一方面，删除位图（已删除行表）则作为常规表存储在另一个检查点文件对中。


    最后，还有另一种类型的检查点文件，称为根文件。根文件在每次检查点事件时生成，用于跟踪系统中的检查点文件。


    图 10-2 展示了一个具有 15 个处于不同状态的检查点文件的数据库示例。我稍后将详细介绍检查点文件的状态。这只是一个示意图；实际数据库中至少会有 17
    个处于各种状态的检查点文件。


    ![A340879_2_En_10_Fig2_HTML.jpg](img/A340879_2_En_10_Fig2_HTML.jpg)


    图 10-2. 具有多个检查点文件对的数据库


    使用单独的增量文件来记录删除操作，使 SQL Server 能够避免在删除行时修改数据文件和随机 I/O。所有检查点文件都是仅追加的。此外，当文件关闭时（稍后会详细介绍），它们会变为只读。


    ### 检查点文件状态


    每个检查点文件在其生命周期中可以处于几种状态之一，如图 10-3 所示。


    ![A340879_2_En_10_Fig3_HTML.jpg](img/A340879_2_En_10_Fig3_HTML.jpg)


    图 10-3. 检查点文件状态


    让我们更详细地了解所有这些状态。


    #### PRECREATED 状态


    当你在数据库中创建第一个内存 OLTP 对象时（包括内存优化表类型和非持久化内存优化表），SQL Server 会生成 17 个检查点文件：1 个根文件和
    16 个空文件。这样做是为了在需要新文件时最小化等待时间。


    文件的初始大小基于服务器内存量，如表 10-1 所示。然而，如果需要，SQL Server 有可能更改预创建文件的类型。例如，预创建的大容量数据文件可以在需要时转换并用作常规数据文件。


    表 10-1. 检查点文件的初始大小


    | 服务器内存 | 数据文件大小 | 大容量数据文件大小 | 增量文件大小 | 根文件大小 |

    | --- | --- | --- | --- | --- |

    | 小于 16GB | 16MB | 8MB | 8MB | 2MB |

    | 16GB 或以上 | 128MB | 64MB | 8MB | 16MB |


    SQL Server 2016 RTM 支持大型检查点，这是检查点文件的另一种配置，当服务器满足以下要求时启用：


    *   服务器具有 16 个或更多逻辑处理器。

    *   服务器具有 128GB 或更大内存。

    *   服务器 I/O 系统为数据库提供超过 200MB/秒的吞吐量。


    在此模式下，SQL Server 使用 1GB/128MB 的数据和增量文件，并将自动检查点过程延迟到事务日志增长 12GB（稍后详述）。虽然此配置可能有助于提高事务日志生成率极高的系统的性能，但可能导致数据库启动时恢复时间更长。此行为已在
    SQL Server 2016 CU1/SQL Server 2016 SP1 中被禁用。'
- fmt: '### UNDER CONSTRUCTION State and CHECKPOINT Process


    As you already know, SQL Server uses the transaction log to persist information
    about data modifications in the database. Transaction log records can be used
    to reconstruct any data changes in the event of an unexpected shutdown or crash;
    however, that process can be time-consuming if a large number of log records need
    to be replayed.


    SQL Server uses checkpoints to mitigate that problem. Even though disk-based and
    In-Memory OLTP checkpoint processes are independent from each other, they do the
    same thing: they persist the data changes on disk, reducing the database recovery
    time. The last checkpoint identifies up to which point the data changes have been
    persisted and which log records need to be replayed.


    With disk-based tables, the frequency of checkpoint operations depends on the
    server-level `recovery interval` and database-level `TARGET_RECOVERY_TIME` settings.
    While such an approach helps SQL Server to improve write performance by batching
    multiple random I/O writes together, it leads to spikes in I/O activity at the
    time when the checkpoint occurs.


    In contrast, In-Memory OLTP implements continuous checkpoints. It continuously
    scans the transaction log, streaming and appending the changes to checkpoint file
    pairs in the `UNDER CONSTRUCTION` state. The new versions of the rows are appended
    to the data files, and deletions are appended to delta files. The continuous checkpoint
    also appends information about deletions to CFPs in the `ACTIVE` state, which
    I will discuss shortly.


    It is worth repeating that the In-Memory OLTP checkpoint relies on transaction
    log records, which is different from the Storage Engine checkpoint that scans
    and flushes the dirty data pages from the buffer pool.


    In SQL Server 2016, the In-Memory OLTP continuous checkpoint process is multithreaded
    and significantly more efficient compared to the single-threaded checkpoint in
    SQL Server 2014. The main work is done by serializer threads that scan transaction
    logs based on about 1MB intervals called `segments`. Those threads process the
    segments and populate data and delta files based on In-Memory OLTP transaction
    log records from there.


    The segments are identified by segment log records, which are generated when a
    transaction log grows more than 1MB since the last segment log record. Those log
    records contain information about the range of transactions within the segments.
    The controller thread scans the log identifying the segments and passing them
    to the serializer threads.


    Another thread—`timer tasks`—wakes up on schedule and checks whether the transaction
    log grew 1.5GB since the last checkpoint event or whether the last checkpoint
    event occurred more than six hours ago. When this happens, In-Memory OLTP creates
    another internal transaction that closes the currently opened segment with a special
    flag that indicates that it should trigger the checkpoint. When this segment is
    detected by the controller thread, it wakes up another close thread, which performs
    the actual checkpoint operation by converting all `UNDER CONSTRUCTION` data files
    to the `ACTIVE` state and generating another root file with the information about
    all active files at the time of the checkpoint. It is worth noting that the checkpoint
    is triggered regardless if the transaction log grew because of disk-based or In-Memory
    OLTP transactions.


    With large checkpoints in SQL Server 2016 RTM, checkpoints are triggered based
    on a 12GB transaction log growth.


    ### ACTIVE State


    As already mentioned, the checkpoint event changes the state of all `UNDER CONSTRUCTION`
    checkpoint files to `ACTIVE`. SQL Server does not append new data rows into `ACTIVE`
    data files so they become read-only; however, it still appends the information
    about deleted rows from `ACTIVE` data files into the `ACTIVE` delta files.


    Consider the situation when the database has two checkpoint file pairs—one in
    `ACTIVE` state covering the `BeginTs` interval between 0 and 1,000 and another
    one in `UNDER CONSTRUCTION` state covering the interval starting with a `BeginTs`
    value of 1,001. Let’s assume you have three data rows in the table stored in the
    `ACTIVE` data file. Figure [10-4](#A340879_2_En_10_Chapter.html#Fig4) illustrates
    this.


    ![A340879_2_En_10_Fig4_HTML.jpg](A340879_2_En_10_Fig4_HTML.jpg)


    Figure 10-4. ACTIVE and UNDER CONSTRUCTION checkpoint file pairs


    Let’s assume you have two transactions that modify the data, as shown in Listing
    [10-1](#A340879_2_En_10_Chapter.html#Par36).


    ```sql

    -- Global Transaction Timestamp: 1100

    begin tran

    delete from T where RowId = 1;

    update T set Col = 1 where RowId = 3;

    insert into T(RowId) values(4);

    commit;

    -- Global Transaction Timestamp: 1200

    delete from T where RowId = 4;

    ```


    Listing 10-1. Modifying the Data in the Table


    The first transaction with a Global Transaction Timestamp value of 1,100 deletes
    the row with `RowId = 1`, which adds the row to the delta file of `ACTIVE` CFP.
    It also updates the row with `RowId = 2`, which adds another row to the `ACTIVE`
    delta file, marking deletion of the old version of the row. The new version of
    the data row is inserted into the `UNDER CONSTRUCTION` data file along with the
    row from the `INSERT` statement.


    The second transaction deletes the newly inserted row, which adds the row to the
    `UNDER CONSTRUCTION` delta file, as shown in Figure [10-5](#A340879_2_En_10_Chapter.html#Fig5).


    ![A340879_2_En_10_Fig5_HTML.jpg](A340879_2_En_10_Fig5_HTML.jpg)


    Figure 10-5. ACTIVE and UNDER CONSTRUCTION checkpoint file pairs after data modifications


    Typically, the combined size of the `ACTIVE` checkpoint files on disk is about
    twice the size of the durable memory-optimized tables in memory. However, in some
    cases, SQL Server may require more space to store memory-optimized data.


    ### MERGE TARGET State and Merge Process


    Over time, as data modifications progress, the percent of deleted rows in the
    `ACTIVE` checkpoint files increases. This condition adds unnecessary storage overhead
    and slows down the data-loading process during recovery. SQL Server addresses
    this situation with a process called merge.


    A background task called the Merge Policy Evaluator periodically analyzes whether
    adjacent `ACTIVE` CFPs can be merged in a way that active, nondeleted rows from
    the merged data files would fit into the new 16MB or 128MB data file. When this
    happens, SQL Server creates the new CFP in a `MERGE TARGET` state and populates
    it with the data from the multiple `ACTIVE` CFPs, filtering out deleted rows.


    Even though the Merge Policy Evaluator can identify multiple possible merges,
    every CFP can participate in only one of them. Table [10-2](#A340879_2_En_10_Chapter.html#Tab2)
    shows several examples of the possible merges.


    Table 10-2. Merge Examples


    | Adjacent Source Files (% Full) | Merge Results |

    | --- | --- |

    | CFP0 (40%), CFP1 (45%), CFP2 (60%) | CFP0 + CFP1 (85%). |

    | CFP0 (10%), CFP1 (15%), CFP2 (70%), CFP3 (10%) | CFP0 + CFP1 + CFP2 (95%). |

    | CFP0 (55%), CFP1 (50%) | No merge is done. |


    Once the merge process is complete and the checkpoint has occurred, the `MERGE
    TARGET` CFP is transitioned to `ACTIVE` and former `ACTIVE` CFPs to `WAITING FOR
    LOG TRUNCATION` states.


    In-Memory OLTP merges LOB-column large data files the same way as the regular
    data files. However, large data files with columnstore segments and root files
    are not merged and may transition to a `WAITING FOR LOG TRUNCATION` state without
    the need for a merge operation. This transition happens after a new root file
    is generated at the checkpoint event or when the columnstore index row group has
    been decompressed after 90 percent of the rows in the group are deleted.'
