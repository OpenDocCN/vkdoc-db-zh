  trans: '### 限制可用于内存中 OLTP 的内存量


    SQL Server 的企业版允许你通过使用资源调控器来管理工作负载和系统资源消耗。在内部，资源调控器使用资源池，这些资源池代表可供 SQL Server
    使用的物理资源的子集。你可以将每个资源池视为 SQL Server 内部的一个虚拟实例，并通过指定其参数来控制该资源池可用的资源。最后，你可以通过分类过程将工作负载分配到资源池之间，或更准确地说，分配到资源池的工作组之间。分类是基于用户定义的函数完成的，这允许你为此目的定义复杂的算法。


    注意：你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/resource-governor`](https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/resource-governor)
    以及我的《Pro SQL Server Internal》一书中阅读更多关于资源调控器的信息。


    每个资源调控器配置都会创建两个预定义的资源池：`internal` 和 `default`。顾名思义，`internal` 池处理 SQL Server 的内部工作负载，而
    `default` 池处理未分类的工作负载，即所有未被分类到其他资源池的用户工作负载。你可以根据需要创建其他资源池。


    如前所述，你可以通过指定参数来控制资源池之间的 CPU、内存和 I/O 分配，例如 `MIN_CPU_PERCENT` 和 `MAX_CPU_PERCENT`、`MIN_MEMORY_PERCENT`
    和 `MAX_MEMORY_PERCENT`、`AFFINITY` 以及其他一些参数。你可以将数据库绑定到资源池，对于内存中 OLTP 而言，这将允许你限制数据库中用于内存优化数据的内存量。每个数据库只能绑定到一个资源池；但是，多个数据库可以共享同一个池。在这种情况下，限制将适用于所有这些数据库。


    一个资源池最多可以利用系统内存的 80%，这为可用于内存中 OLTP 的内存量设定了限制。该阈值保证了其他 SQL Server 组件有足够的系统内存可以工作，并确保系统在内存压力下保持稳定。


    清单 12-2 说明了如何创建和配置资源池，允许其使用 40% 的系统内存。


    ```sql

    create resource pool InMemoryDataPool

    with

    (

    min_memory_percent=40

    ,max_memory_percent=40

    );

    alter resource governor reconfigure;

    ```


    清单 12-2. 创建一个资源池


    创建资源池后，你可以使用 `sys.sp_xtp_bind_db_resource_pool` 存储过程将数据库绑定到它，如清单 12-3 所示。正如我提到的，这将允许内存中
    OLTP 使用资源池内存的 80%。在我们的示例中，资源池内存使用被限制为 40%，这允许内存中 OLTP 最多利用 40 * 0.80 = 32% 的系统内存。


    ```sql

    exec sys.sp_xtp_bind_db_resource_pool

    @database_name = ''InMemoryOLTPDemo''

    ,@pool_name = ''InMemoryDataPool'';

    -- 你需要将数据库脱机然后再联机

    -- 以使更改生效

    alter database InMemoryOLTPDemo set offline;

    alter database InMemoryOLTPDemo set online;

    ```


    清单 12-3. 将数据库绑定到资源池


    不幸的是，将数据库绑定到资源池并不会自动将先前分配的内存转移到新池，你需要将数据库脱机然后再联机以实现这一点。请记住，这将导致一个恢复过程，对于大量的内存中
    OLTP 数据，这个过程可能非常耗时。


    类似地，你可以通过调用 `sys.sp_xtp_unbind_db_resource_pool` 存储过程来移除绑定，如清单 12-4 所示。调用后，数据库将绑定回默认资源池。


    ```sql

    exec sys.sp_xtp_unbind_db_resource_pool

    @database_name = ''InMemoryOLTPDemo'';

    -- 你需要将数据库脱机然后再联机

    -- 以使更改生效

    alter database InMemoryOLTPDemo set offline;

    alter database InMemoryOLTPDemo set online;

    ```


    清单 12-4. 移除数据库与资源池之间的绑定


    你应该记住，资源池的内存将在内存中 OLTP 数据和已分类到该资源池工作组的用户会话之间共享。如果池没有足够的工作空间内存来为查询分配内存授权，查询可能会因内存不足错误而失败，或者被阻塞并必须等待可用内存。将用于限制内存中
    OLTP 内存的资源池与处理用户工作负载的池分开更安全。


    提示：你可以监控 `RESOURCE_SEMAPHORE` 等待、**内存授权挂起**性能计数器以及 `sys.dm_exec_query_resource_semaphores`
    和 `sys.dm_exec_query_memory_grants` 视图，以排查与工作空间内存相关的问题。'
- fmt: "### Monitoring Memory Usage for Memory-Optimized Tables\n\nYou can monitor\
    \ the memory usage of the various In-Memory OLTP objects by using a set of data\
    \ management views along with the “Memory Usage by Memory Optimized Objects” report\
    \ in SQL Server Management Studio.\n\nThe `sys.dm_db_xtp_table_memory_stats` view\
    \ provides high-level memory usage statistics for the user and system memory-optimized\
    \ tables in the current database. Listing 12-5 illustrates the query that uses\
    \ this view.\n\n```sql\nselect\n    ms.object_id\n    ,s.name + '.' + t.name as\
    \ [table]\n    ,ms.memory_allocated_for_table_kb\n    ,ms.memory_used_by_table_kb\n\
    \    ,ms.memory_allocated_for_indexes_kb\n    ,ms.memory_used_by_indexes_kb\n\
    from\n    sys.dm_db_xtp_table_memory_stats ms\n    left outer join sys.tables\
    \ t on\n        ms.object_id = t.object_id\n    left outer join sys.schemas s\
    \ on\n        t.schema_id = s.schema_id\norder by\n    ms.memory_allocated_for_table_kb\
    \ desc\n-- Listing 12-5.\n-- Using the sys.dm_db_xtp_table_memory_stats View\n\
    ```\n\nFigure 12-2 shows the output of the query when I ran it against one of\
    \ the databases. A negative `object_id` value would indicate the system tables\
    \ (not present in the output).\n\n![A340879_2_En_12_Fig2_HTML.jpg](A340879_2_En_12_Fig2_HTML.jpg)\n\
    *Figure 12-2. Output from sys.dm_db_xtp_table_memory_stats view*\n\n**Note**\n\
    You can read more about the `sys.dm_db_xtp_table_memory_stats` view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-table-memory-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-table-memory-stats-transact-sql).\n\
    \nThe `sys.dm_db_xtp_memory_consumers` view provides detailed information about\
    \ database-level memory consumers. You already saw this view in action in Chapters\
    \ 6 and 7 where you used it to obtain information about table memory consumers.\
    \ You can group the output from the view to obtain memory usage information with\
    \ the required level of detail.\n\nListing 12-6 illustrates the query that provides\
    \ memory usage information on the per-internal-object (`xtp_object_id`) level.\n\
    \n```sql\n;with MemConsumers(object_id, xtp_object_id, alloc_mb, used_mb, allocs)\n\
    as\n(\n    select\n        mc.object_id, mc.xtp_object_id\n        ,convert(decimal(9,3),sum(mc.allocated_bytes)\
    \ / 1024. / 1024.)\n            as [allocated (MB)]\n        ,convert(decimal(9,3),sum(mc.used_bytes)\
    \ / 1024. / 1024.)\n            as [used (MB)]\n        ,sum(mc.allocation_count)\
    \ as [allocs]\n    from\n        sys.dm_db_xtp_memory_consumers mc\n    group\
    \ by\n        mc.object_id, mc.xtp_object_id\n)\nselect\n    mc.object_id, mc.xtp_object_id\n\
    \    ,a.minor_id, a.type_desc\n    ,s.name + '.' + t.name  +\n        iif(a.minor_id\
    \ = 0,'','.' + col.Name)\n        as [Table/Column]\n    ,mc.allocs as [Allocations]\n\
    \    ,mc.alloc_mb as [Allocated (MB)]\n    ,mc.used_mb as [Used (MB)]\nfrom\n\
    \    MemConsumers mc\n    join sys.memory_optimized_tables_internal_attributes\
    \ a on\n        a.object_id = mc.object_id and\n        a.xtp_object_id = mc.xtp_object_id\n\
    \    left outer join sys.columns col on\n        a.object_id = col.object_id and\n\
    \        a.minor_id > 0 and\n        a.minor_id = col.column_id\n    left outer\
    \ join sys.tables t on\n        a.object_id = t.object_id\n    left outer join\
    \ sys.schemas s on\n        s.schema_id = t.schema_id\norder by\n    [Allocated\
    \ (MB)] desc\n-- Listing 12-6.\n-- Using the sys.dm_db_xtp_memory_consumers View\n\
    ```\n\nFigure 12-3 shows the output of the query. As you can see, the output includes\
    \ a separate row for the internal table that stores the data for the LOB `Delivery.Orders.Notes`\
    \ column.\n\n![A340879_2_En_12_Fig3_HTML.jpg](A340879_2_En_12_Fig3_HTML.jpg)\n\
    *Figure 12-3. Output from sys.dm_db_memory_consumers view*\n\n**Note**\nYou can\
    \ read more about the `sys.dm_db_xtp_memory_consumers` view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-memory-consumers-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-memory-consumers-transact-sql).\n\
    \nThe `sys.dm_xtp_system_memory_consumers` view provides information about memory\
    \ used by internal In-Memory OLTP components. Listing 12-7 illustrates the query\
    \ that uses this view.\n\n```sql\nselect\n    memory_consumer_type_desc\n    ,memory_consumer_desc\n\
    \    ,convert(decimal(9,3),allocated_bytes / 1024. / 1024.)\n        as [allocated\
    \ (MB)]\n    ,convert(decimal(9,3),used_bytes / 1024. / 1024.)\n        as [used\
    \ (MB)]\n    ,allocation_count\nfrom\n    sys.dm_xtp_system_memory_consumers\n\
    order by\n    [allocated (MB)] desc\n-- Listing 12-7.\n-- Using the sys.dm_xtp_system_memory_consumers\
    \ View\n```\n\nFigure 12-4 shows the partial output of the query in my system.\n\
    \n![A340879_2_En_12_Fig4_HTML.jpg](A340879_2_En_12_Fig4_HTML.jpg)\n*Figure 12-4.\
    \ Output from sys.dm_xtp_system_memory_consumers view*\n\n**Note**\nYou can read\
    \ more about the `sys.dm_xtp_system_memory_consumers` view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql).\n\
    \nYou can access the “Memory Usage by Memory Optimized Objects” report in the\
    \ **Reports** > **Standard Reports** section in the database context menu of the\
    \ SQL Server Management Studio Object Explorer. Figure 12-5 illustrates the output\
    \ of the report. As you can see, this report returns similar data to the `sys.dm_db_xtp_table_memory_stats`\
    \ view.\n\n![A340879_2_En_12_Fig5_HTML.jpg](A340879_2_En_12_Fig5_HTML.jpg)\n*Figure\
    \ 12-5. “Memory Usage By Memory Optimized Objects” report output*"
  raw: '### Monitoring Memory Usage for Memory-Optimized Tables


    You can monitor the memory usage of the various In-Memory OLTP objects by using
    a set of data management views along with the “Memory Usage by Memory Optimized
    Objects” report in SQL Server Management Studio.


    The `sys.dm_db_xtp_table_memory_stats` view provides high-level memory usage statistics
    for the user and system memory-optimized tables in the current database. Listing
    [12-5](#A340879_2_En_12_Chapter.html#Par50) illustrates the query that uses this
    view.


    ```

    select

    ms.object_id

    ,s.name + ''.'' + t.name as [table]

    ,ms.memory_allocated_for_table_kb

    ,ms.memory_used_by_table_kb

    ,ms.memory_allocated_for_indexes_kb

    ,ms.memory_used_by_indexes_kb

    from

    sys.dm_db_xtp_table_memory_stats ms

    left outer join sys.tables t on

    ms.object_id = t.object_id

    left outer join sys.schemas s on

    t.schema_id = s.schema_id

    order by

    ms.memory_allocated_for_table_kb desc

    Listing 12-5.

    Using the sys.dm_db_xtp_table_memory_stats View

    ```


    Figure [12-2](#A340879_2_En_12_Chapter.html#Fig2) shows the output of the query
    when I ran it against one of the databases. A negative `object_id` value would
    indicate the system tables (not present in the output).


    ![A340879_2_En_12_Fig2_HTML.jpg](A340879_2_En_12_Fig2_HTML.jpg)


    Figure 12-2.


    Output from sys.dm_db_xtp_table_memory_stats view Note


    You can read more about the `sys.dm_db_xtp_table_memory_stats` view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-table-memory-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-table-memory-stats-transact-sql)
    .


    The `sys.dm_db_xtp_memory_consumers` view provides detailed information about
    database-level memory consumers. You already saw this view in action in Chapters
    [6](#A340879_2_En_6_Chapter.html) and [7](#A340879_2_En_7_Chapter.html) where
    you used it to obtain information about table memory consumers. You can group
    the output from the view to obtain memory usage information with the required
    level of detail.


    Listing [12-6](#A340879_2_En_12_Chapter.html#Par55) illustrates the query that
    provides memory usage information on the per-internal-object (`xtp_object_id`)
    level.


    ```

    ;with MemConsumers(object_id, xtp_object_id, alloc_mb, used_mb, allocs)

    as

    (

    select

    mc.object_id, mc.xtp_object_id

    ,convert(decimal(9,3),sum(mc.allocated_bytes) / 1024\. / 1024.)

    as [allocated (MB)]

    ,convert(decimal(9,3),sum(mc.used_bytes) / 1024\. / 1024.)

    as [used (MB)]

    ,sum(mc.allocation_count) as [allocs]

    from

    sys.dm_db_xtp_memory_consumers mc

    group by

    mc.object_id, mc.xtp_object_id

    )

    select

    mc.object_id, mc.xtp_object_id

    ,a.minor_id, a.type_desc

    ,s.name + ''.'' + t.name  +

    iif(a.minor_id = 0,'''',''.'' + col.Name)

    as [Table/Column]

    ,mc.allocs as [Allocations]

    ,mc.alloc_mb as [Allocated (MB)]

    ,mc.used_mb as [Used (MB)]

    from

    MemConsumers mc

    join sys.memory_optimized_tables_internal_attributes a on

    a.object_id = mc.object_id and

    a.xtp_object_id = mc.xtp_object_id

    left outer join sys.columns col on

    a.object_id = col.object_id and

    a.minor_id > 0 and

    a.minor_id = col.column_id

    left outer join sys.tables t on

    a.object_id = t.object_id

    left outer join sys.schemas s on

    s.schema_id = t.schema_id

    order by

    [Allocated (MB)] desc

    Listing 12-6.

    Using the sys.dm_db_xtp_memory_consumers View

    ```


    Figure [12-3](#A340879_2_En_12_Chapter.html#Fig3) shows the output of the query.
    As you can see, the output includes a separate row for the internal table that
    stores the data for the LOB `Delivery.Orders.Notes` column.


    ![A340879_2_En_12_Fig3_HTML.jpg](A340879_2_En_12_Fig3_HTML.jpg)


    Figure 12-3.


    Output from sys.dm_db_memory_consumers view Note


    You can read more about the `sys.dm_db_xtp_memory_consumers` view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-memory-consumers-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-xtp-memory-consumers-transact-sql)
    .


    The `sys.dm_xtp_system_memory_consumers` view provides information about memory
    used by internal In-Memory OLTP components. Listing [12-7](#A340879_2_En_12_Chapter.html#Par59)
    illustrates the query that uses this view.


    ```

    select

    memory_consumer_type_desc

    ,memory_consumer_desc

    ,convert(decimal(9,3),allocated_bytes / 1024\. / 1024.)

    as [allocated (MB)]

    ,convert(decimal(9,3),used_bytes / 1024\. / 1024.)

    as [used (MB)]

    ,allocation_count

    from

    sys.dm_xtp_system_memory_consumers

    order by

    [allocated (MB)] desc

    Listing 12-7.

    Using the sys.dm_xtp_system_memory_consumers View

    ```


    Figure [12-4](#A340879_2_En_12_Chapter.html#Fig4) shows the partial output of
    the query in my system.


    ![A340879_2_En_12_Fig4_HTML.jpg](A340879_2_En_12_Fig4_HTML.jpg)


    Figure 12-4.


    Output from sys.dm_xtp_system_memory_consumers view Note


    You can read more about the `sys.dm_xtp_system_memory_consumers` view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-xtp-system-memory-consumers-transact-sql)
    .


    You can access the “Memory Usage by Memory Optimized Objects” report in the Reports
    ➤ Standard Reports section in the database context menu of the SQL Server Management
    Studio Object Explorer. Figure [12-5](#A340879_2_En_12_Chapter.html#Fig5) illustrates
    the output of the report. As you can see, this report returns similar data to
    the `sys.dm_db_xtp_table_memory_stats` view.


    ![A340879_2_En_12_Fig5_HTML.jpg](A340879_2_En_12_Fig5_HTML.jpg)


    Figure 12-5.


    “Memory Usage By Memory Optimized Objects” report output'
