    #### CPU


    系统中的 CPU 数量很大程度上取决于所需的 OLTP 吞吐量。然而，如前所述，即使使用中端服务器，也完全有可能实现高事务吞吐量。如果不进行一些测试和分析，就无法预测需要多少个
    CPU；但是，使用合适的硬件是有益的，它允许你随着负载增长进行扩展并添加更多 CPU。


    在可能的情况下，你应该选择基础时钟速度更高的处理器。使用 SQL Server 按核心许可，与速度较慢、核心较多的 CPU 相比，使用高端 CPU（核心较少但单线程性能更高）通常可以获得更好的
    OLTP 性能/成本比。这在 SQL Server 标准版的情况下也极为关键，其限制为 4 个插槽或 24 个核心中的较小值。你将无法将 CPU 扩展到此限制之外，而更快的
    CPU 将允许你在 SQL Server 的非企业版中实现更好的事务吞吐量。


    最后，你应该在服务器上启用超线程。

    '
- fmt: '### I/O Sub系统


    As a general rule, you should place an In-Memory OLTP filegroup on the dedicated
    disk array optimized for sequential I/O performance. It is better to use Flash-based
    storage when possible. Even though HDD-based disk arrays can provide good enough
    sequential I/O performance to handle a regular In-Memory OLTP workload, they may
    become the bottleneck during database startup. As you know, the In-Memory OLTP
    recovery process is highly scalable, with multiple schedulers loading data from
    the different checkpoint files in parallel. Usually, I/O performance becomes the
    limiting factor in how fast SQL Server can recover memory-optimized data.


    Recovery performance becomes even more important if a database has a low recovery
    time objective (RTO) metric in its service level agreement (SLA) . Even though
    databases with an In-Memory OLTP filegroup support piecemeal restore with the
    Enterprise Edition, SQL Server must bring all In-Memory OLTP data online together
    with the `PRIMARY` filegroup. You cannot postpone In-Memory OLTP filegroup recovery
    to a later stage in the restore.


    One of the ways to improve recovery performance is to create multiple containers
    in the In-Memory OLTP filegroup, placing them in different disk arrays using different
    HBA adapters and, in the case of network storage, different access paths. SQL
    Server spreads checkpoint files across containers and will load them in parallel
    from multiple drives.


    Listing [12-1](#A340879_2_En_12_Chapter.html#Par13) shows how to create a database
    with two containers in an In-Memory OLTP filegroup, placing them into the `H:\HKData`
    and `K:\HKData` folders, respectively.


    ```

    create database HKMultiContainers

    on primary

    (

    name = N''HKMultiContainers''

    ,filename = N''M:\HKMultiContainers.mdf''

    ),

    filegroup HKData CONTAINS MEMORY_OPTIMIZED_DATA

    (

    name = N''HKMultiContainers_HKData1''

    ,filename = N''H:\HKData\HKMultiContainers''

    ),

    (

    name = N''HKMultiContainers_HKData2''

    ,filename = N''K:\HKData\HKMultiContainers''

    )

    log on

    (

    name = N''HKMultiContainers_Log''

    ,filename = N''L:\KMultiContainers_log.ldf''

    );

    ```

    Listing 12-1. Creating a Database with Two Containers in an In-Memory OLTP Filegroup


    Continuous checkpoints do not usually put an extreme load on the disk subsystem.
    The process utilizes a streaming API and uses a limited number of threads to write
    data to disk. The actual requirements, obviously, will depend on the transaction
    log generation rate for In-Memory OLTP transactions.


    The disk subsystem, however, should provide enough bandwidth to handle the merge
    process in parallel with a continuous checkpoint. Usually, if the checkpoint populates
    the data and delta files at a given IOPS, the I/O subsystem should handle three
    times that IOPS to account for both the checkpoint and merge processes.


    As for disk space, Microsoft recommends that you have enough space to accommodate
    four times the size of the data from the durable memory-optimized tables. Obviously,
    you need to factor in the future data growth to your analysis.


    ### Memory


    You need to have enough memory in the system to accommodate the data from all
    the memory-optimized tables. SQL Server fails a transaction when it cannot allocate
    memory for the new row objects. Usually, SQL Server performs memory allocation
    during `INSERT` and `UPDATE` operations; however, a `DELETE` operation could also
    fail if a table has nonclustered indexes and there is not enough memory to accommodate
    new delta records or perform page merge operations. Moreover, if a table has a
    clustered columnstore index, a `DELETE` operation could require allocating memory
    for a new row in the delete bitmap internal table.


    Figure [12-1](#A340879_2_En_12_Chapter.html#Fig1) shows an error message indicating
    an out-of-memory condition.


    ![A340879_2_En_12_Fig1_HTML.jpg](A340879_2_En_12_Fig1_HTML.jpg)

    Figure 12-1. Out-of-memory error


    An out-of-memory situation essentially makes the In-Memory OLTP data read-only.
    You can still query the data; however, you cannot perform any data modifications
    until the problem is resolved. When such conditions occur, it is beneficial to
    check the status of the garbage collection process to make sure that it has not
    been deferred by the old active transactions. I will discuss how to detect such
    transactions later in the chapter.


    In many cases, the only option to address an out-of-memory situation is to increase
    the amount of memory available to SQL Server and the In-Memory OLTP Engine. When
    this is impossible, especially with the Standard Edition of SQL Server, you should
    detect the largest memory consumers in In-Memory OLTP and reduce their memory
    footprint by either refactoring or migrating them to disk-based tables. I will
    talk about how to detect them later in the chapter.


    Note

    The Standard edition of SQL Server is limited to 32GB of memory-optimized data
    per database.'
