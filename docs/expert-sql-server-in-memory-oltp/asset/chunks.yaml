- fmt: 'The second `SELECT` detects the deleted `Carl` row. However, the `EndTs` value
    of this row is greater than the Oldest Active Transaction Timestamp, so this row
    is still visible for some of the active transactions. Therefore, this row cannot
    be unlinked from the index chain. Figure [11-2](#A340879_2_En_11_Chapter.html#Fig2)
    illustrates the state of the data after the execution of the queries.


    ![A340879_2_En_11_Fig2_HTML.jpg](A340879_2_En_11_Fig2_HTML.jpg)


    Figure 11-2.


    State of the data after the first two queries


    Now, let’s assume that some of the active transactions were completed and you
    ran the second batch of the queries from Listing [11-2](#A340879_2_En_11_Chapter.html#Par18)
    at the time when the Oldest Active Transaction Timestamp was 120 and the Global
    Transaction Timestamp was 130.


    ```

    select * from dbo.People where City = ''Cincinatti'';

    select * from dbo.People where City = ''Dallas'';

    Listing 11-2.

    Second Batch

    ```


    The first `SELECT` found the expired `Ann` row in the `City` index chain and removed
    it from there. At this point, the row is not participating in any row chains and,
    therefore, can be deallocated. However, the row is not deallocated immediately;
    this is done at a later stage.


    The `Carl` row now is also expired and invisible for the active transactions.
    The second `SELECT` removed it from the `City` index chain; however, it is still
    present in the `Name` index chain and cannot be deallocated. Figure [11-3](#A340879_2_En_11_Chapter.html#Fig3)
    shows the state of the data at this moment.


    ![A340879_2_En_11_Fig3_HTML.jpg](A340879_2_En_11_Fig3_HTML.jpg)


    Figure 11-3.


    State of the data after the second two queries


    Important


    You should remember that the `Oldest Active Transaction Timestamp` value controls
    when expired rows can be removed from the index chains and deallocated. Long-running
    and abandoned transactions can defer garbage collection and lead to a situation
    when the system runs out of memory because of an excessive number of expired rows.


    When the transaction is complete, `In-Memory OLTP` places the information about
    it in the queue used by the idle worker thread, which is responsible for garbage
    collection management. The idle worker thread wakes up every minute or, in case
    of a heavy load, when the number of completed transactions exceeds the predefined
    threshold. It analyzes the list of completed transactions and the `Oldest Active
    Transaction Timestamp` in the system and separates completed transactions to 16
    different queues called `generations`, sorting them based on their `Global Transaction
    Timestamp` values.


    *   `Generation 0` contains the list of transactions that were completed earlier
    than the current `Oldest Active Transaction Timestamp`. Rows generated by those
    transactions are immediately available for the garbage collection. There is no
    limit on the number of transactions that can be stored there.

    *   `Generations 1–14` store the list of transactions that were completed after
    the current `Oldest Active Transaction Timestamp`. Each generation can hold information
    up to about 16 transactions. As you can guess, a system can hold up to 224 transactions
    in `generations 1–14` queues.

    *   `Generation 15` stores the information about the remaining transactions completed
    after the current `Oldest Active Transaction Timestamp`. There is no limit on
    the number of transactions that can be stored there.


    Every transaction in the queue exposes its write set to the idle worker thread,
    which builds the set of 16-row work items for deallocation. Those work items are
    distributed across another set of worker queues— one queue per scheduler—and then
    they are picked up and processed by the user threads. The user threads pick up
    the items and perform deallocation after they complete their work on the other
    user transactions.


    Figure [11-4](#A340879_2_En_11_Chapter.html#Fig4) illustrates an example of the
    garbage collection workflow in a system that has an `Oldest Active Transaction
    Timestamp` of 10,000.


    ![A340879_2_En_11_Fig4_HTML.jpg](A340879_2_En_11_Fig4_HTML.jpg)


    Figure 11-4.


    Garbage collection workflow


    The user thread usually picks up the work items from the queue that belong to
    the same scheduler on which it is running. However, if the queue is empty, the
    thread checks the queues from the other CPUs that belong to the same `NUMA` node.
    Finally, in the case of a heavy load in the system, the thread can pick up a work
    item from any queue, regardless of the `NUMA` node to which it belongs.


    With the hot data and actively used indexes, user threads detect expired rows
    relatively quickly. However, with rarely used indexes and/or rarely accessed data,
    there is the possibility that expired rows may not be detected in a timely manner.


    This is addressed by the idle worker threads that periodically scan the indexes
    and detect expired rows there. The idle worker threads can either deallocate those
    rows immediately or add them to the work items after those rows have been unlinked
    from all index chains. This process is called a dusty corners scan or, sometimes,
    a sweep scan.


    As you can see, the garbage collection process in `In-Memory OLTP` is done asynchronously.
    Deleted rows and rows from aborted transactions continue to use system memory
    until they are deallocated. You need to remember this and reserve enough memory
    in the system to accommodate those rows.'
