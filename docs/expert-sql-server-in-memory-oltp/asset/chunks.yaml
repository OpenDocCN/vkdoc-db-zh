    after the scan. As you can see, the user thread correctly identified rows as expired
    and unlinked a majority of them from the index row chains. Some of the expired
    rows have not been unlinked, though, and they will be processed by either other
    user threads or the idle worker thread during the sweep scan.


    ![A340879_2_En_11_Fig7_HTML.jpg](A340879_2_En_11_Fig7_HTML.jpg)


    Figure 11-7.


    Memory and garbage collection statistics after scan


    It is also important to note that none of the work items was enqueued in the garbage
    collector worker items queues because the idle worker thread has not started yet.


    If you look at the statistics again after the idle worker thread execution, you
    will see the output shown in Figure [11-8](#A340879_2_En_11_Chapter.html#Fig8).
    As you can see, the idle worker thread put items into the garbage collection worker
    queues and deallocated them afterward. You can also see that the sweep scan detected
    and removed the remaining 94 expired rows from the index row chains.


    ![A340879_2_En_11_Fig8_HTML.jpg](A340879_2_En_11_Fig8_HTML.jpg)


    Figure 11-8.


    Memory and garbage collection statistics after the idle worker thread cycle and
    sweep scan


    As I already mentioned, garbage collection is a cooperative process, and in other
    cases, the items will be deallocated by the user threads rather than the idle
    worker threads.


    The `sys.dm_db_xtp_gc_cycle_stats` view shows that the garbage collection idle
    worker threads performed just a handful of cycles (remember, I restarted SQL Server
    in my test environment before the test) and processed all the completed transactions
    at once. You can see the partial output from the view in Figure [11-9](#A340879_2_En_11_Chapter.html#Fig9).


    ![A340879_2_En_11_Fig9_HTML.jpg](A340879_2_En_11_Fig9_HTML.jpg)


    Figure 11-9.


    Sys.dm_db_xtp_gc_cycle_stats view after the test


    The situation will change if you repeat the entire test, deleting more rows from
    the table. The garbage collection process will be triggered based on the number
    of completed transactions in the queue rather than based on the timer.


    Figure [11-10](#A340879_2_En_11_Chapter.html#Fig10) shows the summary statistics
    from my environment when I repeated the test, deleting 32,768 rows in the individual
    transactions. Note that the garbage collection process was started at the middle
    of deletions rather than based on a timer. You can also see that in this test
    some of the items were deallocated by the user thread during the first `SELECT`
    scan.


    ![A340879_2_En_11_Fig10_HTML.jpg](A340879_2_En_11_Fig10_HTML.jpg)


    Figure 11-10.


    Memory and garbage collection statistics during the second set of tests


    You can also confirm this by looking at the `sys.dm_db_xtp_gc_cycle_stats` view
    output in Figure [11-11](#A340879_2_En_11_Chapter.html#Fig11). It shows a much
    higher number of cycles with very short delays in between them.


    ![A340879_2_En_11_Fig11_HTML.jpg](A340879_2_En_11_Fig11_HTML.jpg)


    Figure 11-11.


    Sys.dm_db_xtp_gc_cycle_stats view after the second test


    ## Summary


    The garbage collection process in In-Memory OLTP is designed to be nonblocking,
    cooperative, and scalable. Even though it is managed by a dedicated system thread
    (the idle worker thread), most of the work is done by the user threads. The idle
    worker thread (one per NUMA node) wakes up every minute or when the number of
    completed transactions exceeds an internal threshold.


    Deleted rows can be deallocated only after they are expired and their `EndTs`
    timestamp is older the than the Oldest Active Transaction Timestamp in the system.
    Moreover, they need to be removed from all index row chains before deallocation.
    When the user thread encounters an expired row, the thread may unlink it from
    the row chain. In-Memory OLTP periodically scans rarely accessed parts of the
    indexes during its dusty corners (sweep) scan and processes expired rows that
    were missed by the user threads.


    User threads provide information about completed transactions to the idle worker
    threads, which build the list of work items that consist of 16-row batches to
    deallocate. The work items are distributed between garbage collector worker queues—one
    queue per scheduler in the system. In turn, user threads pick up one or several
    items from the worker queues and deallocate them. The work items can also be deallocated
    by the idle worker threads.


    Long-running and uncommitted transactions prevent rows from expiring by freezing
    the Oldest Active Transaction Timestamp in the system. This defers the garbage
    collection process and can lead to a situation where deleted rows use a large
    amount of memory.


    # 12. Deployment and Management


    This chapter discusses the deployment and management aspects of systems that utilize
    In-Memory OLTP. It provides a set of guidelines about hardware and server configurations,
    and it covers In-Memory OLTP–related database administration and management tasks.
    Finally, this chapter gives an overview of the changes and enhancements in the
    catalog and data management objects related to In-Memory OLTP.


    ## Hardware Considerations


    In-Memory OLTP uses hardware in a different, and often more efficient, way than
    the SQL Server Storage Engine. It is often possible to achieve high OLTP throughput
    even with midrange servers. Moreover, In-Memory OLTP is highly scalable, and it
    is possible to increase transaction throughput by adding more CPUs and memory
    to the server and more drives to the disk array as the load and amount of data
    in the system increases.


    Obviously, you should not forget that In-Memory OLTP plays in the same sandbox
    with other SQL Server components, sharing resources with them. Memory becomes
    one of the most critical resources for which the In-Memory OLTP and Storage Engines
    compete. The memory used by memory-optimized data is inaccessible to the Storage
    Engine and, therefore, cannot be used by the buffer pool. It is entirely possible
    that using In-Memory OLTP on servers with an insufficient amount of memory would
    degrade the performance of the queries against disk-based tables if an excessive
    amount of physical I/O was required. You should remember this when designing the
    system and avoid putting unnecessary data into memory-optimized tables.


    Tip


    Consider splitting hot current and rarely accessed historical data between memory-optimized
    and disk-based tables. I will discuss this scenario in more depth in the next
    chapter.


    Let’s discuss the In-Memory OLTP requirements for different hardware components.
    Obviously, you need to take the workload from other SQL Server components into
    consideration when you build servers that utilize In-Memory OLTP.


    ### CPU


    The number of CPUs in the system greatly depends on the required OLTP throughput.
    However, as mentioned, it is entirely possible to achieve high transactional throughput
    even with a midrange server. It is impossible to predict how many CPUs you will
    need without performing some testing and analysis; however, it is beneficial to
    use the proper hardware, which will allow you to scale and add more CPUs as load
    grows.


    When possible, you should choose processors with a higher base clock speed. With
    SQL Server per-core licensing, you can often get a better OLTP performance/cost
    ratio by using high-end CPUs with fewer cores and higher single-threaded performance
    compared to slower CPUs with more cores. This is also extremely critical in the
    case of the Standard Edition of SQL Server, which is limited to the lesser of
    4 sockets or 24 cores. You would be unable to scale the CPUs beyond this limit,
    and faster CPUs will allow you to achieve better transaction throughput in non-Enterprise
    editions of SQL Server.


    Finally, you should have hyperthreading enabled on the servers.'
