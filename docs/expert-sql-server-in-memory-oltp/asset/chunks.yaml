  trans: '## 内存 OLTP 引擎架构


    内存 OLTP 完全集成到 SQL Server 中，其他 SQL Server 功能和客户端应用程序可以透明地访问它。然而，其内部工作方式与行为与 SQL
    Server 存储引擎截然不同。图 1-1 展示了 SQL Server 数据库引擎的架构，包括内存 OLTP 组件。


    ![A340879_2_En_1_Fig1_HTML.jpg](img/A340879_2_En_1_Fig1_HTML.jpg)

    图 1-1. SQL Server 数据库引擎架构


    内存 OLTP 将数据存储在`内存优化表`中。这些表完全驻留在内存中，与经典的`基于磁盘的表`结构不同。除一个小例外，`内存优化表`不在数据页上存储数据；行通过内存指针链连接在一起。同样值得注意的是，`内存优化表`不与`基于磁盘的表`共享内存，且存在于缓冲池之外。


    注：我将在第 3 章详细讨论`内存优化表`。


    SQL Server 数据库引擎有两种方式可以与`内存优化表`交互。第一种是`查询互操作引擎`。它允许你从解释型 T-SQL 代码中引用`内存优化表`。数据位置对查询是透明的；你可以访问`内存优化表`，将它们与`基于磁盘的表`连接，并以通常的方式使用它们。在此模式下支持大多数
    T-SQL 功能和语言结构。


    你还可以使用`原生编译模块`（例如`存储过程`、`内存优化表触发器`和`标量用户定义函数`）来访问和操作`内存优化表`。你可以使用 In-Memory OLTP
    引入的一些额外语言结构，以类似于常规 T-SQL 模块的方式定义它们。


    `原生编译模块`已被编译成机器码并加载到 SQL Server 进程内存中。与`互操作引擎`相比，这些模块可以带来显著的性能提升；然而，它们仅支持有限的 T-SQL
    结构，并且只能访问`内存优化表`。


    注：我将在第 9 章讨论`原生编译模块`。


    `内存优化表`使用基于行的存储，所有列组合成数据行。也可以在这些表上定义`聚集列存储索引`。这些索引是独立的数据结构，以基于列的格式存储高度压缩的数据副本，非常适合实时操作分析查询。In-Memory
    OLTP 将这些索引持久化在磁盘上，并且在数据库重启时不会重新创建它们。


    注：我将在第 7 章讨论`聚集列存储索引`。


    ## 内存 OLTP 与其他内存数据库


    内存 OLTP 几乎是市场上唯一可用的关系型内存数据库（`IMDB`）。让我们来看看截至 2017 年存在的其他流行解决方案。


    ### Oracle


    截至撰写本文时，Oracle 提供两种独立的`IMDB`产品。主流的 Oracle 12c 数据库服务器包含`Oracle Database In-Memory
    选项`。启用后，Oracle 会以基于列的存储格式创建数据副本，并在后台维护它。数据库管理员可以选择应包含在副本中的表、分区和列。


    此方法针对分析查询和数据仓库工作负载，这些工作负载受益于基于列的存储和处理。它不会提高继续使用基于磁盘的基于行的存储的 OLTP 查询的性能。


    内存中的基于列的数据在数据修改期间增加了开销；需要更新它以反映数据更改。此外，它不会持久保存在磁盘上，并且每次服务器重启时都需要重新创建。


    同时，此实现对客户端应用程序是完全透明的。支持所有数据类型和 PL/SQL 结构，并且可以在配置级别启用或禁用此功能。Oracle 在每个查询的基础上选择要访问的数据，对分析/数据仓库使用内存数据，对
    OLTP 工作负载使用基于磁盘的数据。这与 SQL Server In-Memory OLTP 不同，在后者中你需要明确定义`内存优化表`和`列存储索引`。


    除了`Database In-Memory 选项`外，Oracle 还提供面向 OLTP 工作负载的独立产品`Oracle TimesTen`。这是一个独立的内存数据库，将所有数据加载到内存中，可以三种模式运行。

    *   `独立内存数据库`支持传统的客户端-服务器架构。

    *   `嵌入式内存数据库`允许应用程序将`Oracle TimesTen`加载到应用程序的地址空间中，并消除网络调用的延迟。当数据层响应时间至关重要时，这非常有用。

    *   `Oracle 数据库缓存（TimesTen 缓存）`允许该产品作为应用程序和 Oracle 数据库之间的附加层进行部署。缓存中的数据是可更新的，`TimesTen`和
    Oracle 数据库之间的同步是自动完成的。


    然而，在内部，`Oracle TimesTen`仍然依赖锁机制，这在高并发负载下会降低事务吞吐量。而且，它不像 In-Memory OLTP 那样支持原生编译。


    同样值得注意的是，`Oracle In-Memory 选项`和`TimesTen`都需要单独的许可证。与 In-Memory OLTP 相比，这可能会显著增加实施成本，后者即使在
    SQL Server 的非企业版中也可免费使用。


    ### IBM DB2


    与`Oracle Database In-Memory 选项`类似，`IBM DB2 10.5 with BLU Acceleration`针对数据仓库和分析工作负载。它将基于行的磁盘表的副本以基于列的格式持久化在内存中的`影子表`中，用于分析查询。`影子表`中的数据持久化在磁盘上，并且在数据库启动时不会重新创建。同样值得注意的是，`影子表`中的数据大小可能超过可用内存的大小。


    `IBM DB2`自动且异步地同步基于磁盘的表和`影子表`之间的数据，这减少了数据修改期间的开销。然而，这种方法在`影子表`更新期间引入了延迟，查询可能使用稍微过时的数据。


    `IBM DB2 BLU Acceleration`侧重于查询处理，并为数据仓库和分析工作负载提供了出色的性能。它没有任何与 OLTP 相关的优化，并使用基于磁盘的数据和锁来支持
    OLTP 工作负载。'
- fmt: '### SAP HANA


    SAP HANA is relatively new database solution on the market; it has been available
    since 2010\. Until recently, SAP HANA was implemented as a pure in-memory database,
    limiting the size of the data to the amount of memory available on the server.


    This limitation has been addressed in the recent releases; however, it requires
    separate tools to manage the data. The applications should also be aware of the
    underlying storage architecture. For example, HANA supports disk-based extended
    tables; however, applications need to query them directly and also implement the
    logic to move data between in-memory and extended tables.


    SAP HANA stores all data in a column-based format, and it does not support row-based
    storage. The data is fully modifiable; SAP HANA stores new rows in the delta stores,
    compressing them in the background. Concurrency is handled with Multiversion Concurrency
    Control (MVCC) when `UPDATE` operations generate new versions of the rows similarly
    to SQL Server In-Memory OLTP.


    **Note**

    I will discuss the In-Memory OLTP concurrency model in depth in Chapter [8](#A340879_2_En_8_Chapter.html).


    SAP claims that HANA may successfully handle both OLTP and data warehouse/analytical
    workloads using the single copy of the data in column-based format. Unfortunately,
    it is pretty much impossible to find any benchmarks that prove this for OLTP workloads.
    Considering that pure column-based storage is not generally optimized for OLTP
    use cases, it is hard to recommend SAP HANA for the systems that require high
    OLTP throughput.


    SAP HANA, however, may be a good choice for systems that are focused on operational
    analytics and BI and need to support infrequent OLTP queries.


    It is impossible to cover all the in-memory database solutions available on the
    market. Many of them are targeted to and excel in specific workloads and use cases.
    Nevertheless, SQL Server provides a rich and mature set of features and technologies
    that may cover the wide spectrum of requirements. SQL Server is also a cost-effective
    solution compared to other major vendors on the market.


    ### Summary


    In-Memory OLTP was designed using different design principles and architecture
    than the classic SQL Server Database Engine. It is a specialized product targeted
    toward OLTP workloads and can improve performance by 20 to 40 times in certain
    scenarios. Nevertheless, it is fully integrated into the SQL Server Database Engine.
    The data storage is transparent to the client applications, which do not require
    any code changes if they use the features supported by In-Memory OLTP.


    The data from memory-optimized tables is stored in memory separately from the
    buffer pool. All In-Memory OLTP data structures are completely latch- and lock-free,
    which allows you to scale the systems by adding more CPUs to the servers.


    In-Memory OLTP may support operational analytics by defining the clustered columnstore
    indexes on memory-optimized tables. Those indexes store the copy of the data from
    the table in column-based storage format.


    In-Memory OLTP uses native compilation to the machine code for any row-access
    logic. Moreover, it allows you to perform native compilation of the stored procedures,
    triggers and scalar user-defined functions, which dramatically increase their
    performance.


    ## 2. In-Memory OLTP Objects


    This chapter provides a high-level overview of In-Memory OLTP objects. It shows
    how to create databases with an In-Memory OLTP filegroup and how to define memory-optimized
    tables and access them through the Interop Engine and natively compiled modules.


    Finally, this chapter demonstrates performance improvements that can be achieved
    with the In-Memory OLTP Engine when a large number of concurrent sessions insert
    the data into the database and latch contention becomes a bottleneck.


    ### Preparing a Database to Use In-Memory OLTP


    The In-Memory OLTP Engine has been fully integrated into SQL Server and is always
    installed with the product. In SQL Server 2014 and 2016 RTM, In-Memory OLTP is
    available only in the Enterprise and Developer editions. This restriction has
    been removed in SQL Server 2016 SP1, and you can use the technology in every SQL
    Server edition.


    You should remember, however, that non-Enterprise editions of SQL Server have
    a limitation on the amount of memory they can utilize. For example, buffer pool
    memory in SQL Server 2016 Standard and Express editions is limited to 128GB and
    1,410MB of RAM, respectively. Similarly, memory-optimized tables cannot store
    more than 32GB of data per database in Standard and 352MB of data in Express editions.
    The data in memory-optimized tables will become read-only if In-Memory OLTP does
    not have enough memory to generate new versions of the rows.


    **Note**

    I will discuss how to estimate the memory required for In-Memory OLTP objects
    in Chapter [12](#A340879_2_En_12_Chapter.html).


    In-Memory OLTP is also available in the Premium tiers of the SQL Databases in
    Microsoft Azure, including the databases in the Premium Elastic Pools. However,
    the amount of memory the technology can utilize is based on DTUs of the service
    tier. As of this writing, Microsoft has provided 1GB of memory for each 125DTU
    or eDTU of the tier. This may change in the future, and you should review the
    Microsoft Azure documentation when you decide to use In-Memory OLTP with SQL Databases.


    You do not need to install any additional packages or perform any configuration
    changes on the SQL Server level to use In-Memory OLTP. However, any database that
    utilizes In-Memory OLTP objects should have a separate filegroup to store memory-optimized
    data.


    With an on-premise version of SQL Server, you can create this filegroup at database
    creation time or alter an existing database and add the filegroup using the `CONTAINS
    MEMORY_OPTIMIZED_DATA` keyword. It is not required, however, with SQL Databases
    in Microsoft Azure, where the storage level is abstracted from the users.


    Listing [2-1](#A340879_2_En_2_Chapter.html#Par10) shows an example of the `CREATE
    DATABASE` statement with the In-Memory OLTP filegroup specified. The `FILENAME`
    property of the filegroup specifies the folder in which the In-Memory OLTP files
    would be located.


    ```sql

    create database InMemoryOLTPDemo

    on primary

    (

    name = N''InMemoryOLTPDemo''

    ,filename = N''M:\Data\InMemoryOLTPDemo.mdf''

    ),

    filegroup HKData CONTAINS MEMORY_OPTIMIZED_DATA

    (

    name = N''InMemory_OLTP_Data''

    ,filename = N''H:\HKData\InMemory_OLTP_Data''

    ),

    filegroup LOGDATA

    (name = N''LogData1'', filename = N''M:\Data\LogData1.ndf''),

    (name = N''LogData2'', filename = N''M:\Data\LogData2.ndf''),

    (name = N''LogData3'', filename = N''M:\Data\LogData3.ndf''),

    (name = N''LogData4'', filename = N''M:\Data\LogData4.ndf'')

    log on

    (

    name = N''InMemoryOLTPDemo_log''

    ,filename = N''L:\Log\InMemoryOLTPDemo_log.ldf''

    )

    ```


    Listing 2-1.

    Creating a Database with the In-Memory OLTP Filegroup


    Internally, In-Memory OLTP utilizes a streaming mechanism based on the `FILESTREAM`
    technology. While coverage of `FILESTREAM` is outside the scope of this book,
    I will mention that it is optimized for sequential I/O access. In fact, In-Memory
    OLTP does not use random I/O access at all by design. It uses sequential append-only
    writes during a normal workload and sequential reads on the database startup and
    recovery stages. You should keep this behavior in mind and place In-Memory OLTP
    filegroups into the disk arrays optimized for sequential performance.


    Similar to `FILESTREAM` filegroups, the In-Memory OLTP filegroup can include multiple
    containers placed on the different disk arrays, which allows you to spread the
    load across them.'
  raw: '### SAP HANA


    SAP HANA is relatively new database solution on the market; it has been available
    since 2010\. Until recently, SAP HANA was implemented as a pure in-memory database,
    limiting the size of the data to the amount of memory available on the server.


    This limitation has been addressed in the recent releases; however, it requires
    separate tools to manage the data. The applications should also be aware of the
    underlying storage architecture. For example, HANA supports disk-based extended
    tables; however, applications need to query them directly and also implement the
    logic to move data between in-memory and extended tables.


    SAP HANA stores all data in a column-based format, and it does not support row-based
    storage. The data is fully modifiable; SAP HANA stores new rows in the delta stores,
    compressing them in the background. Concurrency is handled with Multiversion Concurrency
    Control (MVCC) when `UPDATE` operations generate new versions of the rows similarly
    to SQL Server In-Memory OLTP.


