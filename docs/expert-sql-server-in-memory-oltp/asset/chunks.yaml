  trans: '

    ### “构建中”状态与检查点进程


    如您所知，SQL Server 使用事务日志来持久化记录数据库中数据的修改信息。在发生意外关机或崩溃时，事务日志记录可用于重做任何数据更改；然而，如果需要重放大量的日志记录，这个过程可能会非常耗时。


    SQL Server 使用检查点来缓解这个问题。尽管基于磁盘的表和内存中 OLTP 的检查点进程彼此独立，但它们的作用是相同的：将数据更改持久化到磁盘，从而缩短数据库恢复时间。最后一个检查点标识了数据更改已持久化到哪个时点，以及哪些日志记录需要重放。


    对于基于磁盘的表，检查点操作的频率取决于服务器级别的 `recovery interval` 和数据库级别的 `TARGET_RECOVERY_TIME`
    设置。虽然这种方法有助于 SQL Server 通过将多个随机 I/O 写入操作批处理在一起来提高写入性能，但它会在检查点发生时导致 I/O 活动出现尖峰。


    相比之下，内存中 OLTP 实现了持续检查点。它持续扫描事务日志，将更改流式传输并附加到处于 `UNDER CONSTRUCTION` 状态的检查点文件对中。行的新增版本被附加到数据文件中，删除操作则被附加到增量文件中。持续检查点也会将删除信息附加到处于
    `ACTIVE` 状态的 CFP 中，这一点我稍后会讨论。


    值得再次强调的是，内存中 OLTP 的检查点依赖于事务日志记录，这与存储引擎的检查点不同，后者扫描并刷新缓冲池中的脏数据页。


    在 SQL Server 2016 中，内存中 OLTP 的持续检查点进程是多线程的，与 SQL Server 2014 中的单线程检查点相比效率显著提高。主要工作由序列化线程完成，它们以大约
    1MB 的间隔（称为 `segments`）扫描事务日志。这些线程处理这些段，并根据其中的内存中 OLTP 事务日志记录填充数据文件和增量文件。


    这些段由段日志记录标识，这些日志记录在事务日志自上一个段日志记录以来增长超过 1MB 时生成。这些日志记录包含有关段内事务范围的信息。控制器线程扫描日志，识别这些段并将其传递给序列化线程。


    另一个线程——`timer tasks`——按计划唤醒，并检查自上一个检查点事件以来事务日志是否增长了 1.5GB，或者上一个检查点事件是否发生在六小时之前。当这种情况发生时，内存中
    OLTP 会创建另一个内部事务，该事务用一个特殊标志关闭当前打开的段，该标志表示应触发检查点。当控制器线程检测到这个段时，它会唤醒另一个关闭线程，该线程通过将所有
    `UNDER CONSTRUCTION` 数据文件转换为 `ACTIVE` 状态，并生成另一个包含检查点时所有活动文件信息的根文件，来执行实际的检查点操作。值得注意的是，无论事务日志增长是由于基于磁盘的事务还是内存中
    OLTP 事务引起的，都会触发检查点。


    在 SQL Server 2016 RTM 版本中，对于大型检查点，检查点基于 12GB 的事务日志增长来触发。


    ### ACTIVE 状态


    如前所述，检查点事件将所有 `UNDER CONSTRUCTION` 检查点文件的状态更改为 `ACTIVE`。SQL Server 不会将新的数据行附加到
    `ACTIVE` 数据文件中，因此它们变为只读；但是，它仍然会将从 `ACTIVE` 数据文件中删除行的信息附加到 `ACTIVE` 增量文件中。


    考虑这样一种情况：数据库有两个检查点文件对——一个处于 `ACTIVE` 状态，覆盖 `BeginTs` 区间 0 到 1,000；另一个处于 `UNDER
    CONSTRUCTION` 状态，覆盖从 `BeginTs` 值 1,001 开始的区间。假设表中在 `ACTIVE` 数据文件中存储了三个数据行。图 10-4
    说明了这一点。


    ![A340879_2_En_10_Fig4_HTML.jpg](img/A340879_2_En_10_Fig4_HTML.jpg)


    图 10-4. ACTIVE 和 UNDER CONSTRUCTION 检查点文件对


    假设有两个事务修改数据，如清单 10-1 所示。


    ```sql

    -- Global Transaction Timestamp: 1100

    begin tran

    delete from T where RowId = 1;

    update T set Col = 1 where RowId = 3;

    insert into T(RowId) values(4);

    commit;

    -- Global Transaction Timestamp: 1200

    delete from T where RowId = 4;

    ```


    清单 10-1. 修改表中的数据


    第一个事务（全局事务时间戳值为 1,100）删除了 `RowId = 1` 的行，这会将该行添加到 `ACTIVE` CFP 的增量文件中。它还更新了 `RowId
    = 2` 的行（译者注：原文为 `RowId = 2`，但清单中是 `RowId = 3`，此处按清单翻译），这会在 `ACTIVE` 增量文件中添加另一行，标记旧行版本的删除。数据行的新版本与
    `INSERT` 语句中的行一起被插入到 `UNDER CONSTRUCTION` 数据文件中。


    第二个事务删除了新插入的行，这会将该行添加到 `UNDER CONSTRUCTION` 增量文件中，如图 10-5 所示。


    ![A340879_2_En_10_Fig5_HTML.jpg](img/A340879_2_En_10_Fig5_HTML.jpg)


    图 10-5. 数据修改后的 ACTIVE 和 UNDER CONSTRUCTION 检查点文件对


    通常，磁盘上 `ACTIVE` 检查点文件的总大小约为内存中持久化内存优化表大小的两倍。但在某些情况下，SQL Server 可能需要更多空间来存储内存优化数据。


    ### MERGE TARGET 状态与合并过程


    随着时间的推移，随着数据修改的进行，`ACTIVE` 检查点文件中被删除行的比例会增加。这种情况会增加不必要的存储开销，并减慢恢复期间的数据加载过程。SQL
    Server 通过一个称为合并的过程来解决这种情况。


    一个称为合并策略评估器的后台任务会定期分析相邻的 `ACTIVE` CFP 是否可以合并，以便合并后数据文件中活动的、未删除的行能够容纳进新的 16MB 或
    128MB 数据文件中。当这种情况发生时，SQL Server 会创建一个处于 `MERGE TARGET` 状态的新 CFP，并用来自多个 `ACTIVE`
    CFP 的数据填充它，同时过滤掉被删除的行。


    尽管合并策略评估器可以识别多个可能的合并，但每个 CFP 只能参与其中一个合并。表 10-2 展示了一些可能的合并示例。


    表 10-2. 合并示例


    | 相邻源文件（填充百分比） | 合并结果 |

    | --- | --- |

    | CFP0 (40%), CFP1 (45%), CFP2 (60%) | CFP0 + CFP1 (85%)。 |

    | CFP0 (10%), CFP1 (15%), CFP2 (70%), CFP3 (10%) | CFP0 + CFP1 + CFP2 (95%)。 |

    | CFP0 (55%), CFP1 (50%) | 不进行合并。 |


    一旦合并过程完成并且检查点发生，`MERGE TARGET` CFP 将转换为 `ACTIVE` 状态，而先前的 `ACTIVE` CFP 将转换为 `WAITING
    FOR LOG TRUNCATION` 状态。


    内存中 OLTP 合并 LOB 列大型数据文件的方式与常规数据文件相同。但是，包含列存储段和根文件的大型数据文件不会被合并，并且可能在不需要合并操作的情况下转换为
    `WAITING FOR LOG TRUNCATION` 状态。这种转换发生在检查点事件生成新的根文件之后，或者当列存储索引行组中 90% 的行被删除后该行组被解压缩时。

    '
- fmt: '#### WAITING FOR LOG TRUNCATION State


    The data in former `ACTIVE` and now `WAITING FOR LOG TRUNCATION` files is no longer
    needed for database recovery. Former `MERGE TARGET` and now `ACTIVE` `CFPs` can
    be used for this purpose. However, those `WAITING FOR LOG TRUNCATION` files are
    still needed if you want to restore the database from a backup.


    The checkpoint files stay in that state until the log truncation point passed
    their `LSN`s. In a `FULL` recovery model, this means that a log backup has been
    taken, log records were sent to secondary nodes, and other processes that read
    transaction log have not fallen behind. Obviously, in a `SIMPLE` recovery model,
    a log backup is not required, and the log truncation point is controlled by checkpoints.


    Once it happens, `WAITING FOR LOG TRUNCATION` files are no longer needed. They
    can be either transitioned back to a `PRECREATED` state or deleted if the system
    has already enough `PRECREATED` files.


    Note: You can analyze the state of checkpoint files using the `sys.dm_db_xtp_checkpoint_files`
    view. Appendix C talks about this view in greater depth and shows how checkpoint
    file states change through their lifetime.


    ## Recovery


    As you know, the recovery process may occur during a database or instance restart,
    failover to another node, or after restoring the database from the backup. SQL
    Server performs the recovery of disk-based and memory-optimized tables in parallel
    using `ACTIVE` data files and transaction logs for `In-Memory OLTP` data.


    At the beginning of the recovery stage, SQL Server locates the most recent root
    file that contains information about checkpoint files and passes it to the `In-Memory
    OLTP Engine`. The Engine obtains the list of all `ACTIVE` checkpoint file pairs
    and starts loading data from them. It loads only the nondeleted versions of rows
    using delta files as the filter. It checks that a row from a data file is not
    deleted and is not referenced in the delta files. Based on the results of this
    check, a row is either loaded to memory or discarded.


    The process of loading data is highly scalable. SQL Server creates one thread
    per logical CPU, and each thread processes an individual checkpoint file pair.
    In a large number of cases, the performance of the I/O subsystem becomes the limiting
    factor in data-loading performance. This is the reason why you should place checkpoint
    files on the fast, preferable flash-based, storage.


    As the opposite of disk-based tables, indexes on memory-optimized tables are not
    persisted. As you remember, indexes in `In-Memory OLTP` are just the memory pointers,
    and the memory addresses of the rows change after they are reloaded into the memory.
    Therefore, indexes must be re-created during the recovery stage.


    Figure [10-6](#A340879_2_En_10_Chapter.html#Fig6) illustrates the data-loading
    process.


    ![A340879_2_En_10_Fig6_HTML.jpg](A340879_2_En_10_Fig6_HTML.jpg)


    Figure 10-6. Loading data to memory


    After the data from `CFPs` has been loaded, SQL Server completes the recovery
    by applying the changes from the tail of the transaction log, bringing the database
    back to the state as of the time of crash or shutdown. As you already know, `In-Memory
    OLTP` does not log uncommitted changes; therefore, no `UNDO` stage is required
    during the recovery.


    Finally, it is important to mention the difference in recovery processes during
    failover in `AlwaysOn Availability Groups` and `Failover Cluster` instances. With
    an `AlwaysOn Failover Cluster`, failover is conceptually similar to a SQL Server
    restart. The databases are brought online, and all memory-optimized data needs
    to be loaded into the memory. `AlwaysOn Availability Group` nodes, on the other
    hand, just need to process `REDO` queue replaying transactions from the unapplied
    portion of transaction log. The data from memory-optimized tables is already loaded
    into the memory on all nodes.


    You should remember this behavior and consider the memory-optimized data recovery
    time when you have an availability SLA in your system. This is especially important
    if you are using failover clusters in the infrastructure. As mentioned, you can
    reduce this time by placing checkpoint files on the fast storage.'
