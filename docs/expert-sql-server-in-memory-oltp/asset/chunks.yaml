    check the `StmtId` value of the rows and skip those they just inserted.


    The next element in the header, the 2-byte `IdxLinkCount`, indicates how many
    indexes (pointers) reference the row (or, in the other words, in how many index
    chains this row is participating). SQL Server uses it to detect rows that can
    be deallocated by the garbage collection process. SQL Server also adds empty 2-byte
    padding after `IdxLinkCount` to align the row header with 8-byte boundaries.


    An array of 8-byte index pointers is the last element of the row header. As you
    already know, every memory-optimized table should have at least one index to link
    data rows together. In SQL Server 2016, you can define up to eight indexes per
    memory-optimized table, including the primary key constraint. This restriction
    has been removed in SQL Server 2017.


    The actual row data is stored in the payload section of the row. The payload format
    may vary depending on the table schema. SQL Server works with the payload through
    a DLL that is generated and compiled for the table (more on that in the next section
    of this chapter).


    I would like to reiterate that a key principle of In-Memory OLTP is that payload
    data is never updated. When a table row needs to be updated, In-Memory OLTP deletes
    the version of the row by setting the `EndTs` timestamp of the original row and
    inserts the new data row version with the new `BeginTs` value and an `EndTs` value
    of `Infinity`.'
  trans: '

    正如您应该已经注意到的，这种并发行为和数据一致性对应于 `SNAPSHOT` 事务隔离级别，即每个事务看到的数据都是事务开始时的状态。`SNAPSHOT`
    是内存 OLTP 引擎的默认事务隔离级别，该引擎也支持 `REPEATABLE READ` 和 `SERIALIZABLE` 隔离级别。然而，内存 OLTP
    中的 `REPEATABLE READ` 和 `SERIALIZABLE` 事务的行为与基于磁盘的表不同。如果违反了 `REPEATABLE READ` 或
    `SERIALIZABLE` 数据一致性规则，内存 OLTP 会引发异常并回滚事务，而不是像基于磁盘的表那样阻塞事务。


    内存 OLTP 文档还指出，自动提交的（单语句）事务可以在 `READ COMMITTED` 隔离级别下运行。但这有点误导性。SQL Server 在 `SNAPSHOT`
    隔离级别下提升并执行此类事务，并且不需要您在代码中显式指定隔离级别。与 `SNAPSHOT` 事务类似，自动提交的 `READ COMMITTED` 事务将看不到事务开始后提交的更改，这与针对基于磁盘的表的
    `READ COMMITTED` 事务的行为不同。


    > 注意

    > 我将在第 7 章讨论内存 OLTP 中的并发模型。


    SQL Server 会跟踪系统中的活动事务，并在行的 `EndTs` 早于系统中最老活动事务的逻辑开始时间时检测到过期行。过期行对于系统中的活动事务是不可见的，并最终会从索引行链中移除并由垃圾回收进程释放。


    > 注意

    > 我将在第 11 章更详细地介绍垃圾回收过程。


    ## 数据行格式

    正如您可以猜到的，内存优化表中数据行的格式与基于磁盘的表完全不同，由两个不同的部分组成：行头和有效负载，如图 3-5 所示。


    ![A340879_2_En_3_Fig5_HTML.jpg](img/A340879_2_En_3_Fig5_HTML.jpg)


    图 3-5.

    内存优化表中数据行的结构


    您已经熟悉行头中的 `BeginTs` 和 `EndTs` 时间戳。接下来的元素是 `StmtId`，它引用了插入该行的语句。事务中的每个语句都有一个唯一的
    4 字节 `StmtId` 值，它作为一种 Halloween 防护技术，允许该语句跳过它刚刚插入的行。


    Halloween 防护

    Halloween 效应是关系数据库领域中一个已知的问题。它由 IBM 研究人员在 1976 年万圣节前后发现，该现象因此得名。简而言之，它指的是数据修改查询的执行受到其先前所做修改影响的情况。


    您可以将以下语句视为 Halloween 问题的经典示例：


    ```

    insert into T

    select * from T

    ```


    如果没有 Halloween 防护，这个查询将陷入无限循环，不断读取它刚刚插入的数据并一遍又一遍地插入。


    对于基于磁盘的表，SQL Server 通过向执行计划添加 Spool 运算符来实现 Halloween 防护。这些运算符在处理数据之前创建其临时副本。在此示例中，表中的所有数据首先缓存在
    Table Spool 中，该 Spool 将作为插入操作的数据源。


    `StmtId` 有助于避免内存优化表中的 Halloween 问题。语句检查行的 `StmtId` 值并跳过它们刚刚插入的行。


    头中的下一个元素是 2 字节的 `IdxLinkCount`，它指示有多少个索引（指针）引用了该行（或者换句话说，该行参与了多少个索引链）。SQL Server
    使用它来检测可由垃圾回收进程释放的行。SQL Server 还会在 `IdxLinkCount` 之后添加 2 字节的空填充，以使行头与 8 字节边界对齐。


    8 字节索引指针数组是行头的最后一个元素。正如您已经知道的，每个内存优化表必须至少有一个索引来将数据行链接在一起。在 SQL Server 2016 中，您可以为每个内存优化表定义最多八个索引，包括主键约束。此限制已在
    SQL Server 2017 中移除。


    实际的行数据存储在行的有效负载部分中。有效负载格式可能因表模式而异。SQL Server 通过为表生成和编译的 DLL（动态链接库）来处理有效负载（本章下一节将详细介绍）。


    我想重申，内存 OLTP 的一个关键原则是有效负载数据从不更新。当需要更新表行时，内存 OLTP 通过设置原始行的 `EndTs` 时间戳来删除该行的版本，并插入带有新
    `BeginTs` 值和 `EndTs` 值为 `Infinity` 的新数据行版本。

    '
- fmt: '## Native Compilation of Memory-Optimized Tables


    存储引擎和内存优化OLTP引擎之间的关键区别之一在于引擎如何与数据行交互。基于磁盘的表中的数据始终使用三种预定义格式之一存储，这些格式不依赖于表模式，并由索引数据压缩选项控制。


    通常，这种方法有其优点和缺点。它极其灵活，允许你修改表，并将修改前后的行版本混合在一起。例如，向表中添加一个新的可空列是元数据级别的操作，不会改变现有行。存储引擎会分析表元数据和不同的行属性，并正确地处理多个行版本。


    然而，这种灵活性是有代价的。考虑查询需要访问行中变长列数据的场景。在这种情况下，SQL Server需要找到行中变长数组部分的偏移量，计算该数组中列数据的偏移量和长度，并在获取所需数据之前分析列数据是存储在行内还是行外。所有这些都可能导致需要执行大量的CPU指令。


    内存优化OLTP引擎采用了一种完全相反的方法。SQL Server为系统中的每个内存优化表创建并编译单独的DLL。这些DLL被加载到SQL Server地址空间中，它们负责访问和操作行有效载荷部分中的数据。内存优化OLTP引擎是通用的，并不了解行底层的有效载荷部分；所有数据访问都是通过这些DLL完成的，这些DLL知晓数据行格式，并经过优化以加速数据访问和操作。


    正如你所猜测的，这种方法显著减少了处理开销；然而，它是以降低灵活性为代价的。生成的表DLL要求所有行具有相同的结构。更改表会生成新版本的DLL，并且在大多数情况下，将要求内存优化OLTP重新创建表中的所有数据行，将它们转换为新格式。我将在第[10](#A340879_2_En_10_Chapter.html)章深入讨论这一点。


    如果表和索引定义不正确，这种限制可能导致可支持性和性能问题。一个这样的例子是错误的哈希索引桶计数定义，它可能导致行链中的行数量过多，从而降低索引性能。我将在第[4](#A340879_2_En_4_Chapter.html)章详细讨论这个问题。


    注意


    SQL Server将源代码和编译后的DLL放置在SQL Server `DATA` 目录的 `XTP` 子文件夹中。我将在第[9](#A340879_2_En_9_Chapter.html)章更详细地讨论这些文件和本机编译过程。


    ## Memory-Optimized Tables: Surface Area and Limitations


    SQL Server 2014中首次发布的内存优化OLTP有一份很长的限制清单。幸运的是，其中许多限制在SQL Server 2016中已被移除。


    让我们详细看看支持的功能范围和现有的限制。


    ### Supported Data Types


    SQL Server 2014中内存优化OLTP的最大限制之一是不支持行外存储。当时无法创建行大小超过8,060字节的表，也无法使用`(n)varchar(max)`和`varbinary(max)`数据类型。


    幸运的是，这一限制在第二代内存优化OLTP中已被移除。SQL Server 2016支持行外存储，并允许数据行超过8,060字节。`(n)varchar(max)`和`varbinary(max)`数据类型现在已得到支持。然而，我想重申，行外数据存储在单独的内部表中，可能会降低系统性能。我将在第[6](#A340879_2_En_6_Chapter.html)章详细讨论这一点。


    在SQL Server 2016版本的内存优化OLTP中，仍然有几种数据类型不支持。它们包括：


    *   `datetimeoffset`、`rowversion`和`sql_variant`

    *   `image`和`(n)text`

    *   基于CLR的数据类型：`geography`、`geometry`和`hierarchyid`

    *   用户定义数据类型

    *   `xml`


    尽管不支持的数据类型列表并不长，但这些限制仍然可能使现有系统迁移到内存优化OLTP变得复杂。在某些情况下，你可以将不支持的数据类型的数据存储在`varbinary(max)`列中，并在代码中将其转换为适当的数据类型。然而，这种方法将要求你使用互操作引擎，并且无法与本机编译一起使用。


    ### Table Features


    内存优化表还有其他一些要求和限制，概述如下：


    *   SQL Server 2016不支持计算列。然而，它们在SQL Server 2017中得到支持。

    *   不支持稀疏列。

    *   `IDENTITY`列的`SEED`和`INCREMENT`值应为(1,1)。

    *   内存优化表不能与基于磁盘的表参与`FOREIGN KEY`约束。你可以在内存优化表之间定义外键；但是，它们应该总是引用主键而不是`UNIQUE`约束。

    *   不支持对内存优化表创建全文索引。

    *   内存优化表不能定义为`FILETABLE`或使用`FILESTREAM`存储。


    在SQL Server 2016中，每个内存优化表（无论是否持久化）应至少有一个、最多八个索引。此外，持久化的内存优化表应定义一个唯一的主键约束。该约束计入八个索引限制中的一个。SQL
    Server 2017移除了八个索引的限制。


    同样值得注意的是，参与主键约束的列是不可更新的。你可以作为变通方法，删除旧行并插入新行。


    ### Database-Level Limitations


    内存优化OLTP有一些限制影响某些数据库设置和操作。它们包括：


    *   你无法在使用内存优化OLTP的数据库上创建数据库快照。

    *   `AUTO_CLOSE`数据库选项必须设置为`OFF`。

    *   不支持`CREATE DATABASE FOR ATTACH_REBUILD_LOG`。

    *   `DBCC CHECKDB`会跳过内存优化表。

    *   如果调用来检查内存优化表，`DBCC CHECKTABLE`会失败。


    注意


    你可以在[`https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp`](https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp)看到完整的限制列表。'
  raw: '## Native Compilation of Memory-Optimized Tables


    One of the key differences between the Storage Engine and In-Memory OLTP Engine
    resides in how engines work with the data rows. The data in disk-based tables
    is always stored using one of the three predefined formats, which do not depend
    on the table schema and are controlled by the index data compression option.


    As usual, that approach comes with benefits and downsides. It is extremely flexible
    and allows you to alter a table and mix per- and post-altered versions of the
    rows together. For example, adding a new nullable column to the table is the metadata-level
    operation, which does not change existing rows. The Storage Engine analyzes table
    metadata and different row attributes and handles multiple versions of the rows
    correctly.


    However, such flexibility comes at a cost. Consider the situation when the query
    needs to access the data from the variable-length column in the row. In this scenario,
    SQL Server needs to find the offset of the variable-length array section in the
    row, calculate an offset and length of the column data from that array, and analyze
    whether the column data is stored in-row or off-row before getting the required
    data. All of that can lead to the large number of CPU instructions to execute.


    The In-Memory OLTP Engine uses a completely opposite approach. SQL Server creates
    and compiles the separate DLLs for every memory-optimized table in the system.
    Those DLLs are loaded into the SQL Server address space, and they are responsible
    for accessing and manipulating the data in the payload section of the row. The
    In-Memory OLTP Engine is generic and does not know anything about the underlying
    payload part of the row; all data access is done through those DLLs, which are
    aware of the data row format and optimized to speed up the data access and data
    manipulation.


    As you can guess, this approach significantly reduces processing overhead; however,
    it comes at the cost of reduced flexibility. The generated table DLLs require
    all rows to have the same structure. Table alteration generates the new version
    of the DLL and, in most cases, will require In-Memory OLTP to re-create all the
    data rows in the table, transforming them to the new format. I will discuss this
    in depth in Chapter [10](#A340879_2_En_10_Chapter.html).


    This restriction can lead to supportability and performance issues when tables
    and indexes are defined incorrectly. One such example is the wrong hash index
    bucket count definition, which can lead to an excessive number of rows in the
    row chains, which reduces index performance. I will discuss this problem in detail
    in Chapter [4](#A340879_2_En_4_Chapter.html).


    Note


    SQL Server places the source code and compiled DLLs in the `XTP` subfolder of
    the SQL Server `DATA` directory. I will talk about those files and the native
    compilation process in more detail in Chapter [9](#A340879_2_En_9_Chapter.html).


    ## Memory-Optimized Tables: Surface Area and Limitations


    The first release of In-Memory OLTP in SQL Server 2014 had an extensive list of
    limitations. Fortunately, many of them have been removed in SQL Server 2016.


    Let’s look at the supported surface area and existing limitations in detail.


    ### Supported Data Types


    One of the biggest limitations of In-Memory OLTP in SQL Server 2014 was the inability
    to support off-row storage. It was impossible to create a table with a row size
    that exceeded 8,060 bytes or use the `(n)varchar(max)` and `varbinary(max)` data
    types.


    Fortunately, this limitation has been removed in the second release of In-Memory
    OLTP. SQL Server 2016 supports off-row storage and allows data rows to exceed
    8,060 bytes. The (`n)varchar(max)` and `varbinary(max)` data types are now supported.
    I would like to reiterate, however, that off-row data is stored in the separate
    internal tables and can reduce the performance of the system. I will discuss this
    in detail in Chapter [6](#A340879_2_En_6_Chapter.html).


    There are still several data types that are not supported in the SQL Server 2016
    release of In-Memory OLTP. They include the following:


    *   `datetimeoffset`, `rowversion`, and `sql_variant`

    *   `image` and `(n)text`

    *   CLR-based data types: `geography`, `geometry`, and `hierarchyid`

    *   User-defined data types

    *   `xml`


    Even though the list of unsupported data types is not very extensive, those limitations
    can still complicate In-Memory OLTP migration for existing systems. In some cases,
    you can store the data from unsupported data types in `varbinary(max)` column,
    casting it to the appropriate data type in the code. This approach, however, would
    require you to use the Interop Engine and would not work with native compilation.


    ### Table Features


    The memory-optimized tables have several other requirements and limitations, outlined
    here:


    *   Computed columns are not supported in SQL Server 2016\. They are supported,
    however, in SQL Server 2017.

    *   Sparse columns are not supported.

    *   `IDENTITY` columns should have a `SEED` and `INCREMENT` value of (1,1).

    *   Memory-optimized tables cannot participate in `FOREIGN KEY` constraints with
    disk-based tables. You can define foreign keys between memory-optimized tables;
    however, they should always reference primary keys rather than `UNIQUE` constraints.

    *   Full-text indexes on memory-optimized tables are not supported.

    *   Memory-optimized tables cannot be defined as `FILETABLE` or use `FILESTREAM`
    storage.


    In SQL Server 2016, every memory-optimized table, durable or nondurable, should
    have at least one and at most eight indexes. Moreover, the durable memory-optimized
    table should have a unique primary key constraint defined. This constraint is
    counted as one of the indexes toward the eight-index limit. The eight-index restriction
    has been removed in SQL Server 2017.


    It is also worth noting that columns participating in the primary key constraint
    are nonupdatable. You can delete the old and insert the new row as the workaround.


    ### Database-Level Limitations


    In-Memory OLTP has several limitations that affect some of the database settings
    and operations. They include the following:


    *   You cannot create a database snapshot on databases that use In-Memory OLTP.

    *   The `AUTO_CLOSE` database option must be set to `OFF`.

    *   `CREATE DATABASE FOR ATTACH_REBUILD_LOG` is not supported.

    *   `DBCC CHECKDB` skips the memory-optimized tables.

    *   `DBCC CHECKTABLE` fails if called to check the memory-optimized table.


    Note


    You can see the full list of limitations at [`https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp`](https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp)
    .'
