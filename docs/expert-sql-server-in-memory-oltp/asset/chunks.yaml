  trans: '# 估算内存 OLTP 所需内存量


    估算内存优化表所需的内存量并非一项简单的任务。作为经验法则，如果表没有溢出存储列，你可以将表中数据的大小翻倍作为估算基础。然而，若要进行更精确的估算，你应综合考虑以下几个不同组件的内存需求。


    *   数据行由 24 字节的头部、一个索引指针数组（每个索引 8 字节）和有效负载（实际行数据）组成。例如，如果你的表有 1 亿行、3 个索引，且每行平均约
    200 字节，那么存储这些行数据（此数字中未包含任何版本控制开销）将需要 `(24 + 3 * 8 + 200) * 100,000,000 = ∼23.1GB`
    的内存。

    *   哈希索引每个存储桶使用 8 字节。如果一个表定义了两个哈希索引，每个有 1.5 亿个存储桶，SQL Server 将创建具有 268,435,456
    个存储桶的索引（将索引属性中指定的存储桶数向上舍入到下一个 2 的幂）。这两个索引将占用 `268,435,456 * 2 * 8 = 4GB` 的内存。

    *   非聚集索引的内存使用量基于唯一索引键的数量和索引键的大小。如果一个表有一个非聚集索引，包含 2500 万个唯一键值，且每个键值平均占用 30 字节，则它将使用
    `(30 + 8(指针)) * 25,000,000 = ∼906MB` 的内存。在你的估算中可以忽略页头和非叶级页，因为它们的大小与叶级行大小相比微不足道。

    *   溢出存储开销取决于存储在溢出存储内部表中的非空值数量。每个行溢出值增加 64 字节开销，包括一个 24 字节的内部表行结构、两个 8 字节的范围索引指针（在叶级和行内）以及用于存储人工溢出存储
    ID 的 24 字节（行内、溢出存储以及内部表范围索引的叶级）。此外，LOB `max` 列会引入 16 个额外字节，用于指向存储数据的 `LOB PAGE
    ALLOCATOR` 可变堆，并且在那里每 8KB 数据还有额外的 32 字节开销。还有额外的内存用于存储内部范围索引数据页和一个映射表，但与实际数据相比，这部分开销很小。举例来说，如果一个内存优化表在一个行溢出
    `varchar(8000)` 列中有 1000 万个非空值，这将需要 `64 * 10,000,000 = ∼610MB` 的内存来将这些数据存储在内部溢出存储表中。

    *   列存储索引的内存需求难以估算。数据通常会被高度压缩，并且根据经验法则，其消耗的内存通常仅为表中未压缩数据大小的 10% 到 15%。但请记住，内存
    OLTP 直到压缩行组中约 90% 的行过期后，才会释放这些行的旧版本。你应在分析中考虑数据的波动性，并微调 `compression_delay` 索引选项，将压缩推迟到数据变为静态时进行。

    *   行版本控制内存估算取决于最长事务的持续时间和每秒平均数据修改（插入和更新）次数。例如，如果系统中的某些进程有持续 10 秒的事务，并且系统平均每秒处理
    10,000 次数据修改，你可以估算行版本控制存储需要 `10 * 10,000 * 248(行大小) = ∼24MB` 的内存。


    显然，以上数字概述了最低限度的内存量。你应该考虑未来的增长和工作负载的变化，并预留一些额外的内存以确保安全。


    如前所述，同样重要的是要记住，内存 OLTP 并非在真空中运行；SQL Server 需要为其他组件提供足够的可用内存。请务必将此纳入你的分析。


    在系统中设计高可用性或灾难恢复策略时，你也应牢记内存 OLTP 的内存需求。常见的配置是，辅助或备用服务器使用比主服务器性能更低的硬件。这种方法有助于通过在灾难发生时允许系统以降级的性能运行来降低硬件成本。


    如果你的数据库使用了内存 OLTP 技术，你必须极其谨慎地使用这种方法。辅助服务器上内存量不足可能会破坏节点间的同步，或导致你在灾难发生时无法恢复数据库。后一种情况也可能发生在你想将生产数据库的副本迁移到开发或测试环境时，而这些环境中的
    SQL Server 没有足够的内存来容纳来自生产环境的内存 OLTP 数据。


    ## 管理与监控任务


    让我们看看几个常见的与内存 OLTP 相关的数据库管理和监控任务。'
- fmt: '### Limiting the Amount of Memory Available to In-Memory OLTP


    The Enterprise Edition of SQL Server allows you to manage workload and system
    resource consumption by utilizing a Resource Governor. Internally, the Resource
    Governor uses resource pools, which represent a subset of the physical resources
    available to SQL Server. You can think about each resource pool as a virtual instance
    inside SQL Server, and you can control resources available to the resource pool
    by specifying its parameters. Finally, you can distribute the workload between
    resource pools or, to be precise, between resource pool workgroups using a classification
    process. Classification is done based on a user-defined function, which allows
    you to define complex algorithms for such a purpose.


    Note: You can read more about the Resource Governor at [`https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/resource-governor`](https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/resource-governor)
    and in my Pro SQL Server Internal book.


    Every Resource Governor configuration has two predefined resource pools created,
    internal and default. As you can guess by the name, the internal pool handles
    the internal SQL Server workload, and the default pool handles the unclassified
    workload, which is all of the user workload that has not been classified to the
    other resource pools. You can create other resource pools as needed.


    As mentioned, you can control CPU, memory, and I/O allocations between resource
    pools by specifying parameters, such as `MIN_CPU_PERCENT` and `MAX_CPU_PERCENT`,
    `MIN_MEMORY_PERCENT` and `MAX_MEMORY_PERCENT`, `AFFINITY`, and a few others. You
    can bind a database to the resource pool, which, in the case of In-Memory OLTP,
    will allow you to limit the amount of memory for memory-optimized data in the
    database. Each database can be bound to a single resource pool; however, multiple
    databases can share the same pool. In this case, the limit would apply to all
    of them.


    A resource pool can utilize up to 80 percent of the system memory, which sets
    the limit on the amount of memory available to In-Memory OLTP. That threshold
    guarantees that other SQL Server components have enough system memory to work
    and that the system remains stable under the memory pressure.


    Listing 12-2 illustrates how to create and configure the resource pool, allowing
    it to use 40 percent of the system memory.


    ```sql

    create resource pool InMemoryDataPool

    with

    (

    min_memory_percent=40

    ,max_memory_percent=40

    );

    alter resource governor reconfigure;

    ```


    Listing 12-2. Creating a Resource Pool


    When the resource pool is created, you can bind a database to it by using the
    `sys.sp_xtp_bind_db_resource_pool` stored procedure, as shown in Listing 12-3.
    As I already mentioned, this will allow In-Memory OLTP to use 80 percent of the
    resource pool memory. In our example, resource pool memory usage is restricted
    to 40 percent, which allows In-Memory OLTP to utilize up to 40 * 0.80 = 32 percent
    of the system memory.


    ```sql

    exec sys.sp_xtp_bind_db_resource_pool

    @database_name = ''InMemoryOLTPDemo''

    ,@pool_name = ''InMemoryDataPool'';

    -- You need to take DB offline and bring it

    -- back online for the changes to take effect

    alter database InMemoryOLTPDemo set offline;

    alter database InMemoryOLTPDemo set online;

    ```


    Listing 12-3. Binding a Database to the Resource Pool


    Unfortunately, binding the database to a resource pool does not automatically
    transfer previously allocated memory to the new pool, and you need to take the
    database offline and bring it back online to do so. Remember that this leads to
    a recovery process, which can be time-consuming in the case of large amounts of
    In-Memory OLTP data.


    Similarly, you can remove the binding by calling the `sys.sp_xtp_unbind_db_resource_pool`
    stored procedure, as shown in Listing 12-4. The database will be bound back to
    the default resource pool after the call.


    ```sql

    exec sys.sp_xtp_unbind_db_resource_pool

    @database_name = ''InMemoryOLTPDemo'';

    -- You need to take DB offline and bring it

    -- back online for the changes to take effect

    alter database InMemoryOLTPDemo set offline;

    alter database InMemoryOLTPDemo set online;

    ```


    Listing 12-4. Removing the Binding Between a Database and a Resource Pool


    You should remember that resource pool memory will be shared between In-Memory
    OLTP data and user sessions that were classified to the resource pool workgroups.
    The queries may fail with an insufficient memory error or be blocked and have
    to wait for available memory if the pool does not have enough workspace memory
    to allocate memory grants to queries. It is safer to separate resource pools that
    are used to limit In-Memory OLTP memory from the pools that handle user workloads.


    Tip: You can monitor `RESOURCE_SEMAPHORE` waits, the Memory Grants Pending performance
    counter, and the `sys.dm_exec_query_resource_semaphores` and `sys.dm_exec_query_memory_grants`
    views to troubleshoot workspace memory–related issues.'
