    select count(*)

    from dbo.CollationTest

    where NVarCol like ''%'' + @NParam + N''%'';

    select count(*)

    from dbo.CollationTest

    where VarColBin like ''%'' + upper(@Param) + ''%''

    collate Latin1_General_100_Bin2;

    select count(*)

    from dbo.CollationTest

    where NVarColBin like ''%'' + upper(@NParam) + N''%''

    collate Latin1_General_100_Bin2;

    ```

    代码清单 13-14。二进制排序规则性能：测试查询


    ## 二进制排序规则性能：测试结果


    表 13-3 显示了我系统中所有查询的执行时间。如您所见，针对二进制排序规则列的查询明显更快，尤其是在 Unicode 数据的情况下。


    表 13-3。二进制排序规则性能：测试结果


    | 非二进制排序规则的 Varchar 列 | 二进制排序规则的 Varchar 列 | 非二进制排序规则的 Nvarchar 列 | 二进制排序规则的 Nvarchar
    列 |

    | :--- | :--- | :--- | :--- |

    | 135 毫秒 | 75 毫秒 | 624 毫秒 | 34 毫秒 |


    请记住，二进制排序规则是区分大小写的。您可能需要创建另一个二进制排序规则列，并在那里存储数据的副本，在需要时将其转换为大写或小写。


    最后，值得注意的是，这种行为不仅限于内存优化表。当使用二进制排序规则时，基于磁盘的表也会获得类似水平的性能改进。'
- fmt: '## Maintainability and Management Overhead


    In `SQL Server 2014` and `SQL Server 2016 RTM`, `In-Memory OLTP` was included
    only in the `Enterprise Edition` of the product. Starting with `SQL Server 2016
    SP1`, you can use `In-Memory OLTP` in every edition of `SQL Server`. It is also
    available in the premium tiers of `Microsoft Azure SQL Databases`. While this
    allows you to maintain a single architecture and code across multiple `SQL Server`
    editions, there is the hidden danger in this approach.


    `In-Memory OLTP` is hardly a “set it and forget it” type of technology. Database
    professionals should actively participate in system monitoring and maintenance
    after deployment. They need to monitor system memory usage, analyze data, re-create
    hash indexes if the bucket counts need to be adjusted, recompile `natively compiled
    modules` to address data distribution and statistic changes, and perform other
    tasks as well.


    The memory usage monitoring is, perhaps, the most important task. `In-Memory OLTP`
    consumes system memory, which may affect the performance of the other `SQL Server`
    components. For example, a large amount of data in `memory-optimized tables` may
    reduce the size of the `buffer pool`, which will increase physical `I/O` and reduce
    query performance against disk-based tables. Similarly, it may reduce the size
    of the `plan cache`, which will lead to recompilations and increase `CPU` load
    in the system. Ironically, in the `Standard Edition`, `32GB` of `memory-optimized
    data` would not affect `buffer pool` memory when the server has enough `RAM` to
    accommodate both of them.


    You should also remember that data in `memory-optimized tables` will become read-only
    if `In-Memory OLTP` does not have enough memory to proceed. This may lead to prolonged
    system outages, especially in non-`Enterprise` instances of `SQL Server`. You
    cannot address the issue by adding more memory and exceeding the edition limit.
    The only option is to reduce the amount of data in `memory-optimized tables`.


    **Important**


    Abandoned uncommitted transactions may defer the garbage collection process and
    lead to out-of-memory conditions in the system.


    You should also consider `In-Memory OLTP` memory usage when you design a high
    availability strategy in your system. It is not uncommon to have the implementations
    with secondary nodes be less powerful than the primary ones. This decreases the
    implementation cost of the solution and may provide a required high availability
    even though the system would operate with a reduced performance after failover.


    The situation changes if secondary nodes do not have enough memory to accommodate
    `In-Memory OLTP` data. This will break the synchronization between the nodes and
    may affect the availability of the system.


    The cross-edition support of the technology in `SQL Server 2016 SP1` and above
    allows you to architect the system once and upgrade editions as the amount of
    data and the load increase. It is not targeted for independent software vendors
    who develop products that need be deployed to a large number of customers who
    may or may not have `DBA` teams to support the system. `In-Memory OLTP` is not
    the best choice in that scenario.'
