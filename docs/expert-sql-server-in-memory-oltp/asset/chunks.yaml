  trans: "\n```sql\ncreate table dbo.ObjStore\n(\nObjectKey uniqueidentifier not null,\n\
    ExpirationTime datetime2(2) not null,\nData varbinary(max) not null,\nconstraint\
    \ PK_ObjStore\nprimary key nonclustered hash(ObjectKey)\nwith (bucket_count =\
    \ 131072),\n)\nwith (memory_optimized = on, durability = schema_only);\ncreate\
    \ proc dbo.SaveObjectToStore\n(\n@ObjectKey uniqueidentifier\n,@ExpirationTime\
    \ datetime2(2)\n,@Data varbinary(max)\n)\nwith native_compilation, schemabinding,\
    \ exec as owner\nas\nbegin atomic with\n(\ntransaction isolation level = snapshot\n\
    ,language = N'English'\n)\n-- @ObjectKeys 是随机生成的，并且在多个会话中是唯一的\nupdate dbo.ObjStore\n\
    set Data = @Data, ExpirationTime = @ExpirationTime\nwhere ObjectKey = @ObjectKey;\n\
    if (@@rowcount = 0)\ninsert into dbo.ObjStore(ObjectKey, ExpirationTime, Data)\n\
    values(@ObjectKey, @ExpirationTime, @Data)\nend;\ncreate proc dbo.LoadObjectFromStore\n\
    (\n@ObjectKey uniqueidentifier not null\n,@Data varbinary(max) output\n)\nwith\
    \ native_compilation, schemabinding, exec as owner\nas\nbegin atomic\nwith\n(\n\
    transaction isolation level = snapshot\n,language = N'English'\n)\nselect @Data\
    \ = t.Data\nfrom dbo.ObjStore t\nwhere t.ObjectKey = @ObjectKey and\nExpirationTime\
    \ >= sysutcdatetime();\nend;\ncreate proc dbo.PurgeExpiredObjects\nwith native_compilation,\
    \ schemabinding, exec as owner\nas\nbegin atomic\nwith\n(\ntransaction isolation\
    \ level = snapshot\n,language = N'English'\n)\ndeclare @CurrentTime\ndatetime2(2)\
    \ = sysutcdatetime();\ndelete dbo.ObjStore\nwhere ExpirationTime < @CurrentTime\n\
    end\n```\n代码清单 13-26. 实现会话存储：数据库架构\n\n客户端实现包含几个静态类。`ObjStoreUtils` 类提供了两个方法，用于将对象序列化和反序列化为字节数组。你可以在代码清单\
    \ 13-27 中查看其实现。\n\n```csharp\npublic static class ObjStoreUtils\n{\n/// \n///\
    \ 将类型为 T 的对象序列化为字节数组\n/// \npublic static byte[] Serialize(T obj)\n{\nif (obj\
    \ == null)\nreturn null;\nusing (var ms = new MemoryStream())\n{\nvar formatter\
    \ = new BinaryFormatter();\nformatter.Serialize(ms, obj);\nreturn ms.ToArray();\n\
    }\n}\n/// \n/// 将字节数组反序列化为对象\n/// \npublic static T Deserialize(byte[] data)\n\
    {\nif (data == null || data.Length == 0)\nreturn default(T);\nusing (var output\
    \ = new MemoryStream(data))\n{\nvar binForm = new BinaryFormatter();\nreturn (T)\
    \ binForm.Deserialize(output);\n}\n}\n}\n```\n代码清单 13-27. 实现会话存储：`ObjStoreUtils`\
    \ 类\n\n代码清单 13-28 所示的 `ObjStoreDataAccess` 类负责从数据库加载和向数据库保存二进制数据。它利用了另一个名为 `DBConnManager`\
    \ 的静态类，该类返回目标数据库的 `SqlConnection` 对象。此 `DBConnManager` 类未在代码清单中展示。\n\n```csharp\n\
    public static class ObjStoreDataAccess\n{\n/// \n/// 将序列化后的对象保存到数据库\n/// \npublic\
    \ static void SaveObjectData(Guid key,\nDateTime expirationTime, byte[] obj)\n\
    {\nusing (var cnn = DBConnManager.GetConnection())\n{\nusing (var cmd = cnn.CreateCommand())\n\
    {\ncmd.CommandText = \"dbo.SaveObjectToStore\";\ncmd.CommandType = CommandType.StoredProcedure;\n\
    cmd.Parameters.Add(\"@ObjectKey\",\n SqlDbType.UniqueIdentifier).Value = key;\n\
    cmd.Parameters.Add(\"@ExpirationTime\",\n SqlDbType.DateTime2).Value = expirationTime;\n\
    cmd.Parameters.Add(\"@Data\",\n SqlDbType.VarBinary,-1).Value = obj;\ncmd.ExecuteNonQuery();\n\
    }\n}\n}\n/// \n/// 从数据库加载序列化后的对象\n/// \npublic byte[] LoadObjectData(Guid key)\n\
    {\nusing (var cnn = DBConnManager.GetConnection())\n{\nusing (var cmd = cnn.CreateCommand())\n\
    {\ncmd.CommandText = \"dbo.LoadObjectFromStore\";\ncmd.CommandType = CommandType.StoredProcedure;\n\
    cmd.Parameters.Add(\"ObjectKey\",\n SqlDbType.UniqueIdentifier).Value = key;\n\
    cmd.Parameters.Add(\"@Data\",\n SqlDbType.VarBinary,-1).Direction =\n ParameterDirection.Output;\n\
    cmd.ExecuteNonQuery();\nreturn (byte[])cmd.Parameters[1].Value;\n}\n}\n}\n}\n\
    ```\n代码清单 13-28. 实现会话存储：`ObjStoreDataAccess` 类\n\n最后，代码清单 13-29 所示的 `ObjStoreService`\
    \ 类将所有部分整合在一起，并管理整个流程。它实现了两个简单的方法，`Load` 和 `Save`，调用前面定义的辅助类。\n\n```csharp\npublic\
    \ static class ObjStoreService\n{\n/// \n/// 将对象保存到对象存储中\n/// \npublic static\
    \ void Save(Guid key,\nDateTime expirationTime, object obj)\n{\nvar objectBytes\
    \ = ObjStoreUtils.Serialize(obj);\nObjStoreDataAccess.SaveObjectData(key, expirationTime,\
    \ objectBytes);\n}\n/// \n/// 从对象存储中加载对象\n/// \npublic static T Load(Guid key)\
    \ where T: class\n{\nvar obj = ObjStoreDataAccess.LoadObjectData(key);\nif (obj\
    \ == null)\nreturn default(T); // 未找到对象\nreturn ObjStoreUtils.Deserialize(objectBytes);\n\
    }\n}\n```\n代码清单 13-29. 实现会话存储：`ObjStoreService` 类\n\n显然，这是一个过度简化的示例，生产环境中的实现可能会复杂得多，尤其是当多个会话可能同时更新同一个对象时。如果遇到这种情况，你可以在系统中实现重试逻辑或创建某种对象锁定管理机制。\n\
    \n同样值得一提的是，在将二进制数据保存到数据库之前可以对其进行压缩。对于小对象，压缩会引入不必要的开销；但是，如果对象很大，压缩可以显著节省空间并提升性能。\n\
    \n尽管你可以使用 `GZipStream` 或 `DeflateStream` 类轻松实现压缩，但我在示例中并未包含压缩代码。\n\n注意\n\n相关代码和测试应用程序包含在本书的配套资料中。\n\
    \n## 总结\n\nSQL Server 2016 消除了该技术首次发布时存在的大多数内存 OLTP 限制。然而，迁移到内存 OLTP 仍然会产生实现成本。你应该进行成本效益分析，确保这个成本是可接受的。\n\
    \n内存 OLTP 可以显著提高 OLTP 系统的性能。它不一定是数据仓库工作负载和内存中数据仓库实现的最佳选择。你可以考虑实施数据分区，并结合使用内存优化表和基于磁盘的表，以充分利用所有\
    \ SQL Server 技术的优势。\n\n即使不执行完整的内存 OLTP 迁移，你也可以从这项技术中获益。仅举几个用例：内存优化表变量可以替代基于磁盘的临时对象；内存优化表值参数是在客户端和\
    \ T-SQL 例程之间传递批处理行的最快方式；内存优化表可以用作 ETL 过程的暂存区。\n\n但请记住，内存 OLTP 并非一种“一劳永逸”的技术，在部署到生产环境后可能需要进行管理和监控。\n\
    \n## 附录 A：内存指针管理\n\n本章解释了 SQL Server 如何处理链接内存 OLTP 对象的内存指针。\n"
- fmt: '### Memory Pointer Management


    In-Memory OLTP 引擎依赖内存指针，使用它们来链接对象。例如，嵌入到数据行中的指针将它们链接成数据行链，而这些链又被哈希和非聚集索引对象引用。


    In-Memory OLTP 的无锁和无闩锁特性增加了一个挑战：如何在高度易变的环境中管理内存指针，在这些环境中，多个会话可能试图同时更改指针，覆盖彼此的更改。


    考虑多个会话试图将行插入同一个数据行链的情况。每个会话遍历该链以定位最后一行，并将其指针更新为新创建行的地址。SQL Server 必须保证即使来自不同并行线程的多个会话试图同时执行该指针更新，每一行也会被添加到链中。


    SQL Server 使用 `InterlockedCompareExchangePointer` API 函数来保证多个会话不能更新同一个指针，从而不会覆盖彼此的更改，导致丢失对彼此对象的引用。`InterlockedCompareExchangePointer`
    函数会更改指针的值，同时检查现有值（更新前）是否与作为另一个参数提供的预期值（旧值）匹配。仅当检查成功时，指针值才会更新。所有这些操作都作为单个 CPU 指令完成。


    为了说明这一点，假设有两个会话希望同时为同一个非聚集索引叶页插入新的增量记录。第一步（如图 [A-1](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig1)
    所示），会话创建增量记录，并根据映射表中的地址将其指针设置为指向一个页面。


    ![A340879_2_En_BookBackmatter_Fig1_HTML.jpg](A340879_2_En_BookBackmatter_Fig1_HTML.jpg)

    **Figure A-1.** 数据修改和并发性：步骤 1


    在下一步中，两个会话都调用 `InterlockedCompareExchangePointer` 函数，尝试通过将引用从页面更改为会话刚刚创建的增量记录来更新映射表。`InterlockedCompareExchangePointer`
    对映射表元素的更新进行序列化，仅当其当前的更新前值与作为参数提供的旧指针值（页面的地址）匹配时才更改它。第一次 `InterlockedCompareExchangePointer`
    调用成功。然而，第二次调用失败，因为映射表元素引用的是来自另一个会话的增量记录，而不是原始页面。


    图 [A-2](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig2) 展示了这种场景。


    ![A340879_2_En_BookBackmatter_Fig2_HTML.jpg](A340879_2_En_BookBackmatter_Fig2_HTML.jpg)

    **Figure A-2.** 数据修改和并发性：步骤 2 和 3


    此时，第二个会话需要重复该操作。它会从映射表中读取会话 1 增量页的地址，并将其自己的增量页重新指向该增量页。最后，它将再次调用 `InterlockedCompareExchangePointer`，在调用期间使用会话
    1 增量页的地址作为旧指针值。图 [A-3](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig3) 说明了这一点。


    ![A340879_2_En_BookBackmatter_Fig3_HTML.jpg](A340879_2_En_BookBackmatter_Fig3_HTML.jpg)

    **Figure A-3.** 数据修改和并发性：最后步骤


    如你所见，除了在 `InterlockedCompareExchangePointer` 调用期间有短暂的序列化外，在修改过程中没有对数据进行锁定或加闩锁。


    在每次需要维护指针链时，SQL Server 都会使用相同的 `InterlockedCompareExchangePointer` 方法，例如在更新期间创建行的另一个版本时，当需要更改索引映射或哈希表中的指针时，以及其他相当多的情况下。


    ### Summary


    SQL Server 使用 `InterlockedCompareExchangePointer` 机制来保证多个会话不能同时更新相同的内存指针，从而避免丢失对彼此对象的引用。


    `InterlockedCompareExchangePointer` 函数会更改指针的值，同时检查现有值（更新前）是否与作为另一个参数提供的预期值（旧值）匹配。仅当检查成功时，指针值才会更新。所有这些操作都作为单个
    CPU 指令完成。


    ## Appendix B: Page Splitting and Page Merging in Nonclustered Indexes


    本附录概述了非聚集索引的内部操作，例如页面拆分和页面合并。


    ### Internal Maintenance of Nonclustered Indexes


    In-Memory OLTP 引擎有几个维护非聚集索引结构的内部操作。正如你从第 [5](#A340879_2_En_5_Chapter.html) 章已经了解到的，页面整合会重建非聚集索引页面，整合由页面增量记录定义的所有更改。它有助于避免由长增量记录链引入的性能影响。新创建的页面在映射表中具有相同的
    PID，并替换了被标记为垃圾回收的旧页面。


    另外两个过程可以创建新的索引页面：页面拆分和页面合并。两者都是复杂的操作，值得对其内部实现进行详细解释。


    #### Page Splitting


    当页面没有足够的可用空间来容纳新数据行时，会发生页面拆分。尽管该过程类似于基于磁盘的 B-Tree 索引页面拆分，但有一个概念上的区别。在 B-Tree 索引中，页面拆分将部分数据移动到新的数据页面，从而在原始页面上释放空间。然而，在
    Bw-Tree 索引中，页面是不可修改的，SQL Server 用两个新页面替换旧页面，并将数据拆分到它们之间。


    让我们更详细地看一下这种情况。图 [B-1](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig4) 显示了一个非聚集索引的内部页和叶页。假设其中一个会话希望插入一个键值为
    `Bob` 的行。


    ![A340879_2_En_BookBackmatter_Fig4_HTML.jpg](A340879_2_En_BookBackmatter_Fig4_HTML.jpg)

    **Figure B-1.** 页面拆分：初始状态


    当创建增量记录时，SQL Server 调整索引页上的增量记录统计信息，并检测到一旦增量记录被整合，页面上没有空间容纳新的索引值。这会触发页面拆分过程，该过程以两个原子步骤完成。


    第一步，SQL Server 创建两个新的叶级页面，并将旧页面的值拆分到它们之间。之后，它将映射表重新指向第一个新创建的页面，并将旧页面和增量记录标记为垃圾回收。


    图 [B-2](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig5) 说明了这个状态。在此状态下，内部页没有对第二个新创建的叶级页的引用。然而，第一个叶级页维护着页面之间的链接（通过映射表），如果需要，SQL
    Server 能够访问和扫描第二个页面。


    ![A340879_2_En_BookBackmatter_Fig5_HTML.jpg](A340879_2_En_BookBackmatter_Fig5_HTML.jpg)

    **Figure B-2.** 页面拆分：第一步


    在第二步中，SQL Server 创建另一个内部页，其中的键值代表新的叶级页面布局。当新页面创建后，SQL Server 切换映射表中的指针，并将旧内部页标记为垃圾回收。图
    [B-3](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig6) 说明了这一动作。


    ![A340879_2_En_BookBackmatter_Fig6_HTML.jpg](A340879_2_En_BookBackmatter_Fig6_HTML.jpg)

    **Figure B-3.** 页面拆分：第二步


    最终，旧数据页面和增量记录会被垃圾回收过程释放。'
  raw: '### Memory Pointer Management


    The In-Memory OLTP Engine relies on memory pointers, using them to link objects
    together. For example, pointers embedded into data rows link them into the data
    row chains, which, in turn, are referenced by the hash and nonclustered index
    objects.


    The lock- and latch-free nature of In-Memory OLTP adds the challenge of managing
    memory pointers in highly volatile environments where multiple sessions can try
    to simultaneously change them, overwriting each other’s changes.


    Consider the situation when multiple sessions are trying to insert rows into the
    same data row chain. Each session traverses that chain to locate the last row
    and update its pointer with the address of the newly created row. SQL Server must
    guarantee that every row will be added to the chain even when multiple sessions
    from the different parallel threads are trying to perform that pointer update
    simultaneously.


    SQL Server uses `InterlockedCompareExchangePointer` API functions to guarantee
    that multiple sessions cannot update the same pointer and thus overwrite each
    other’s changes, thereby losing references to each other’s objects. `InterlockedCompareExchangePointer`
    functions change the value of the pointer, checking that the existing ( pre-update
    ) value matches the expected ( old) value provided as another parameter. Only
    when the check succeeds is the pointer value updated. All of those operations
    are completed as a single CPU instruction.


    To illustrate this, assume you have two sessions that want to simultaneously insert
    new delta records for the same nonclustered index leaf page. As a first step,
    shown in Figure [A-1](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig1) , the
    sessions create delta records and set their pointers to a page based on the address
    from the mapping table.


    ![A340879_2_En_BookBackmatter_Fig1_HTML.jpg](A340879_2_En_BookBackmatter_Fig1_HTML.jpg)


    Figure A-1.


    Data modifications and concurrency: step 1


    In the next step, both sessions call the `InterlockedCompareExchangePointer` function
    to try to update the mapping table by changing the reference from a page to the
    delta records the sessions just created. `InterlockedCompareExchangePointer` serializes
    the update of the mapping table element and changes it only if its current pre-update
    value matches the old pointer (address of the page) provided as the parameter.
    The first `InterlockedCompareExchangePointer` call succeeds. The second call,
    however, fails because the mapping table element references the delta record from
    another session rather than the page.


    Figure [A-2](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig2) illustrates such
    a scenario.


    ![A340879_2_En_BookBackmatter_Fig2_HTML.jpg](A340879_2_En_BookBackmatter_Fig2_HTML.jpg)


    Figure A-2.


    Data modifications and concurrency: steps 2 and 3


    At this time, the second session will need to repeat the action. It will read
    the address of the session 1 delta page from the mapping table and repoint its
    own delta page to reference this delta page. Finally, it will call `InterlockedCompareExchangePointer`
    again using the address of the session 1 delta page as the old pointer value during
    the call. Figure [A-3](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig3) illustrates
    that.


    ![A340879_2_En_BookBackmatter_Fig3_HTML.jpg](A340879_2_En_BookBackmatter_Fig3_HTML.jpg)


    Figure A-3.


    Data modifications and concurrency : final steps


    As you can see, with the exception of a short serialization during the `InterlockedCompareExchangePointer`
    call, there is no locking or latching of the data during the modifications.


    SQL Server uses the same approach with `InterlockedCompareExchangePointer` every
    time the pointer chain needs to be preserved, such as when it creates another
    version of a row during an update, when it needs to change a pointer in the index
    mapping or hash tables, and in quite a few other cases.


    ### Summary


    SQL Server uses an `InterlockedCompareExchangePointer` mechanism to guarantee
    that multiple sessions cannot update the same memory pointers simultaneously,
    losing references to each other’s objects.


    `InterlockedCompareExchangePointer` functions change the value of the pointer,
    checking that the existing ( pre-update ) value matches the expected ( old) value
    provided as another parameter. Only when the check succeeds is the pointer value
    updated. All of those operations are completed as a single CPU instruction.


    ## Appendix B: Page Splitting and Page Merging in Nonclustered Indexes


    This appendix provides an overview of the internal operations of nonclustered
    index, such as page splitting and page merging.


    ### Internal Maintenance of Nonclustered Indexes


    The In-Memory OLTP engine has several internal operations that maintain the structure
    of nonclustered indexes . As you already know from Chapter [5](#A340879_2_En_5_Chapter.html)
    , page consolidation rebuilds the nonclustered index page, consolidating all changes
    defined by the page delta records. It helps avoid the performance hit introduced
    by long delta record chains. The newly created page has the same PID in the mapping
    table and replaces the old page, which is marked for garbage collection.


    Two other processes can create new index pages, page splitting and page merging.
    Both are complex actions and deserve detailed explanations of their internal implementation.


    #### Page Splitting


    Page splitting occurs when a page does not have enough free space to accommodate
    a new data row. Even though the process is similar to a B-Tree disk-based index
    page split, there is one conceptual difference. In B-Tree indexes, the page split
    moves the part of the data to the new data page, freeing up space on the original
    page. In Bw-Tree indexes, however, the pages are nonmodifiable, and SQL Server
    replaces the old page with two new ones, splitting the data between them.


    Let’s look at this situation in more detail. Figure [B-1](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig4)
    shows the internal and leaf pages of a nonclustered index. Let’s assume that one
    of the sessions wants to insert a row with a key of value `Bob` .


    ![A340879_2_En_BookBackmatter_Fig4_HTML.jpg](A340879_2_En_BookBackmatter_Fig4_HTML.jpg)


    Figure B-1.


    Page splitting: initial state


    When the delta record is created, SQL Server adjusts the delta record statistics
    on the index page and detects that there is no space on the page to accommodate
    the new index value once the delta records are consolidated. It triggers a page
    split process, which is done in two atomic steps.


    In the first step, SQL Server creates two new leaf-level pages and splits the
    old page values between them. After that, it repoints the mapping table to the
    first newly created page and marks the old page and the delta records for garbage
    collection.


    Figure [B-2](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig5) illustrates this
    state. At this state, there are no references to the second newly created leaf-level
    page from the internal pages. The first leaf-level page, however, maintains the
    link between pages (through the mapping table), and SQL Server is able to access
    and scan the second page if needed.


    ![A340879_2_En_BookBackmatter_Fig5_HTML.jpg](A340879_2_En_BookBackmatter_Fig5_HTML.jpg)


    Figure B-2.


    Page splitting: first step


    During the second step, SQL Server creates another internal page with key values
    that represent the new leaf-level page layout. When the new page is created, SQL
    Server switches the pointer in the mapping table and marks the old internal page
    for garbage collection. Figure [B-3](#A340879_2_En_BookBackmatter_OnlinePDF.html#Fig6)
    illustrates this action.


    ![A340879_2_En_BookBackmatter_Fig6_HTML.jpg](A340879_2_En_BookBackmatter_Fig6_HTML.jpg)


    Figure B-3.


    Page splitting: second step


    Eventually, the old data pages and delta records are deallocated by the garbage
    collection process.'
