    你可以通过分析图 4-5 中所示的执行计划来确认，这些查询遍历了 65,536 次行链。


    ![A340879_2_En_4_Fig5_HTML.jpg](img/A340879_2_En_4_Fig5_HTML.jpg)


    # 图 4-5. 查询的执行计划


    # 表 4-2. SELECT 语句执行时间


    表 4-2 显示了在我的环境中查询的执行时间，其中针对 `dbo.HashIndex_LowBucketCount` 表的查询慢了大约 20 倍。


    | dbo.HashIndex_HighBucketCount (1,048,576 个桶) | dbo.HashIndex_LowBucketCount
    (1,024 个桶) |

    | --- | --- |

    | 301 ms | 6,259 ms |


    虽然你可以清楚地看到低估桶计数会降低系统性能，但高估同样也不好。首先，每个桶使用 8 个字节来存储内存指针，大量未使用的桶是对系统内存的浪费。例如，定义索引时使用
    `bucket_count=100000000` 将引入 134,217,728 个桶，这将需要 128MB 的 RAM。在单个索引的范围内，这似乎不多；然而，随着索引数量的增加，这可能成为一个问题。


    此外，当 SQL Server 执行索引扫描操作时，它需要扫描索引中的所有桶，额外的桶会给该过程带来一些开销。代码清单 4-4 展示了演示此类开销的查询。


    # 代码清单 4-4. 桶计数与性能：索引扫描查询


    ```sql

    select count(*)

    from dbo.HashIndex_HighBucketCount

    with (index= PK_HashIndex_HighBucketCount)

    option (maxdop 1);

    select count(*)

    from dbo.HashIndex_LowBucketCount

    with (index= PK_HashIndex_LowBucketCount)

    option (maxdop 1);

    ```


    # 表 4-3. SELECT 语句执行时间（空桶开销）


    表 4-3 显示了我的环境中的执行时间。如你所见，扫描额外桶的开销并不显著；然而，它仍然存在。


    | dbo.HashIndex_HighBucketCount (1,048,576 个桶) | dbo.HashIndex_LowBucketCount
    (1,024 个桶) |

    | --- | --- |

    | 51 ms | 62 ms |


    同样值得注意的是，在大多数情况下，SQL Server 2016 不会扫描哈希索引，而是使用表扫描操作符扫描表堆。我将在第 6 章更详细地讨论这一点。'
- fmt: "### 选择合适的桶计数\n\n在哈希索引中选择合适的桶数量是一个棘手但重要的主题。更糟糕的是，你必须在设计阶段做出正确的决定；一旦表创建完成后，更改`bucket_count`值的唯一方法是修改表，这会在后台创建新的表对象。\n\
    \n在理想情况下，你应该拥有超过索引基数（唯一键的数量）的桶数。显然，你还应该考虑未来的系统增长和预期的工作负载变化。如果你预计系统未来将处理更多数据，那么仅基于当前数据基数创建索引并不是一个好主意。\n\
    \n> **注意**\n> \n> 微软建议将`bucket_count`设置为索引中不同值数量的一到两倍。你可以在[此处](https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp/hash-indexes-for-memory-optimized-tables#configuring_bucket_count)阅读更多内容。\n\
    \n具有大量重复值的低基数列通常是哈希索引的糟糕候选者。相同的数据值会产生相同的哈希值；因此，行将被链接到长行链中。显然，总有例外，你应该分析系统中的查询和工作负载，并考虑长行链引入的数据修改开销。\n\
    \n在现有索引中，你可以分析`sys.dm_db_xpt_hash_index_stats`视图的输出以及清单[4-2](#A340879_2_En_4_Chapter.html#Par20)中的代码，以确定索引中的桶数是否足够。如果空桶的数量少于索引中桶总数的10%，那么桶计数可能太低。理想情况下，索引中至少33%的桶应该是空的。\n\
    \n尽管如此，谨慎起见，高估数量通常比低估要好。即使高估会影响索引扫描操作的性能，这种影响也远低于长行链带来的影响。显然，你需要记住，每个桶无论是否为空，都会使用8字节的内存。\n\
    \n> **注意**\n> \n> 我将在下一章讨论内存中OLTP索引的设计考虑因素以及哈希索引和非聚集索引之间的选择。\n\n## 哈希索引与可搜索性\n\
    \n在数据库领域，当谓词允许数据库引擎在查询执行期间利用索引查找操作时，它们被视为可搜索的。\n\n哈希索引与基于磁盘表上定义的B-Tree索引具有不同的可搜索性规则。它们仅在点查找等值搜索的情况下是高效的，这允许SQL\
    \ Server计算索引键（或多个键）的相应哈希值，并找到引用所需行链的桶。在任何其他场景中，例如使用`<`、`>`和`BETWEEN`谓词时，SQL Server都无法使用哈希索引的索引查找操作。这些谓词的评估需要比较索引键值，而这无法基于哈希值完成。\n\
    \n对于复合哈希索引，SQL Server会为所有键列组合的值计算哈希值。基于键列子集计算的哈希值将不同，因此，查询应对所有键列具有等值谓词，索引才有用。\n\
    \n此行为与基于磁盘表上的索引不同。考虑在`(LastName, FirstName)`列上定义索引的情况。对于基于磁盘的表，无论查询的`where`子句中是否指定了`FirstName`列上的谓词，该索引都可用于索引查找操作。或者，内存优化表上的复合哈希索引要求查询在`LastName`和`FirstName`上都有等值谓词，以便计算哈希值，从而选择索引中正确的哈希桶。\n\
    \n让我们创建基于磁盘和内存优化的表，它们在`(LastName, FirstName)`列上具有复合索引，并使用清单[4-5](#A340879_2_En_4_Chapter.html#Par44)中的相同数据进行填充。\n\
    \n```sql\ncreate table dbo.CustomersOnDisk\n(\nCustomerId int not null identity(1,1),\n\
    FirstName varchar(64) not null,\nLastName varchar(64) not null,\nPlaceholder char(100)\
    \ null,\nconstraint PK_CustomersOnDisk\nprimary key clustered(CustomerId)\n);\n\
    create nonclustered index IDX_CustomersOnDisk_LastName_FirstName\non dbo.CustomersOnDisk(LastName,\
    \ FirstName)\ngo\ncreate table dbo.CustomersMemoryOptimized\n(\nCustomerId int\
    \ not null identity(1,1)\nconstraint PK_CustomersMemoryOptimized\nprimary key\
    \ nonclustered\nhash with (bucket_count = 32768),\nFirstName varchar(64) not null,\n\
    LastName varchar(64) not null,\nPlaceholder char(100) null,\nindex IDX_CustomersMemoryOptimized_LastName_FirstName\n\
    nonclustered hash(LastName, FirstName)\nwith (bucket_count = 1024),\n)\nwith (memory_optimized\
    \ = on, durability = schema_only)\ngo\n-- Inserting cross-joined data for all\
    \ first and last names 50 times\n-- using GO 50 command in Management Studio\n\
    ;with FirstNames(FirstName)\nas\n(\nselect Names.Name\nfrom\n(\nvalues('Andrew'),('Andy'),('Anton'),('Ashley'),('Boris'),\n\
    ('Brian'),('Cristopher'),('Cathy'),('Daniel'),('Donny'),\n('Edward'),('Eddy'),('Emy'),('Frank'),('George'),('Harry'),\n\
    ('Henry'),('Ida'),('John'),('Jimmy'),('Jenny'),('Jack'),\n('Kathy'),('Kim'),('Larry'),('Mary'),('Max'),('Nancy'),\n\
    ('Olivia'),('Paul'),('Peter'),('Patrick'),('Robert'),\n('Ron'),('Steve'),('Shawn'),('Tom'),('Timothy'),\n\
    ('Uri'),('Vincent')\n) Names(Name)\n)\n,LastNames(LastName)\nas\n(\nselect Names.Name\n\
    from\n(\nvalues('Smith'),('Johnson'),('Williams'),('Jones'),('Brown'),\n('Davis'),('Miller'),('Wilson'),('Moore'),('Taylor'),\n\
    ('Anderson'),('Jackson'),('White'),('Harris')\n) Names(Name)\n)\ninsert into dbo.CustomersOnDisk(LastName,\
    \ FirstName)\nselect LastName, FirstName\nfrom FirstNames cross join LastNames\n\
    go 50\ninsert into dbo.CustomersMemoryOptimized(LastName, FirstName)\nselect LastName,\
    \ FirstName\nfrom dbo.CustomersOnDisk;\n```\n\n清单4-5. 复合哈希索引：测试表创建"
  raw: '### Choosing the Right Bucket Count


    Choosing the right number of buckets in a hash index is a tricky but important
    subject. To make matters worse, you have to make the right decision at the design
    stage; the only way to change the `bucket_count` value once a table is created
    is by altering the table, which creates the new table object in the background.


    In an ideal situation, you should have the number of buckets that would exceed
    the cardinality (the number of unique keys) of the index. Obviously, you should
    take future system growth and projected workload changes into consideration. It
    is not a good idea to create an index based on the current data cardinality if
    you expect the system to handle much more data in the future.


    Note


    Microsoft suggests setting `bucket_count` to be between one and two times the
    number of distinct values in the index. You can read more at [`https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp/hash-indexes-for-memory-optimized-tables#configuring_bucket_count`](https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp/hash-indexes-for-memory-optimized-tables%23configuring_bucket_count)
    .


    Low-cardinality columns with a large number of duplicated values are usually bad
    candidates for hash indexes. The same data values generate the same hash; therefore,
    rows will be linked to long row chains. Obviously, there are always exceptions,
    and you should analyze the queries and workload in your system, taking into consideration
    the data modification overhead introduced by the long row chains.


    In existing indexes, you can analyze the output of the `sys.dm_db_xpt_hash_index_stats`
    view and code from Listing [4-2](#A340879_2_En_4_Chapter.html#Par20) to determine
    whether the number of buckets in the index is sufficient. If the number of empty
    buckets is less than 10 percent of the total number of buckets in the index, the
    bucket count is likely to be too low. Ideally, at least 33 percent of the buckets
    in the index should be empty.


    With all that being said, it is often better to err on the side of caution and
    overestimate rather than underestimate the number. Even though overestimation
    impacts the performance of the Index Scan operation, this impact is much lower
    compared to the one introduced by long row chains. Obviously, you need to remember
    that every bucket uses 8 bytes of memory whether it is empty or not.


    Note


    I will discuss In-Memory OLTP index design considerations and choices between
    hash indexes and nonclustered indexes in the next chapter.


    ## Hash Indexes and SARGability


    In the database world, predicates are treated as SARGable (Search ARGument Able)
    when they allow the Database Engine to utilize Index Seek operations during query
    execution.


    Hash indexes have different SARGability rules than B-Tree indexes defined on disk-based
    tables. They are efficient only in the case of a point-lookup equality search,
    which allows SQL Server to calculate the corresponding hash value of the index
    key (or keys) and find a bucket that references the desired chain of rows. SQL
    Server is unable to use Index Seek operations with hash indexes in any other scenario,
    for example, with `<`, `>`, and `BETWEEN` predicates. Evaluation of those predicates
    requires comparison of the index key values, which cannot be done based on hash
    values.


    In the case of composite hash indexes, SQL Server calculates the hash value for
    the combined value of all key columns. A hash value calculated on a subset of
    the key columns would be different, and therefore, a query should have equality
    predicates on all key columns for the index to be useful.


    This behavior is different from indexes on disk-based tables. Consider the situation
    where you defined an index on `(LastName, FirstName)` columns. In the case of
    disk-based tables, that index can be used for an Index Seek operation, regardless
    of whether the predicate on the `FirstName` column is specified in the `where`
    clause of a query. Alternatively, a composite hash index on a memory-optimized
    table requires queries to have equality predicates on both `LastName` and `FirstName`
    in order to calculate a hash value that allows for choosing the right hash bucket
    in the index.


    Let’s create disk-based and memory-optimized tables with composite indexes on
    the `(LastName, FirstName)` columns, populating them with the same data as in
    Listing [4-5](#A340879_2_En_4_Chapter.html#Par44).


    ```

    create table dbo.CustomersOnDisk

    (

    CustomerId int not null identity(1,1),

    FirstName varchar(64) not null,

    LastName varchar(64) not null,

    Placeholder char(100) null,

    constraint PK_CustomersOnDisk

    primary key clustered(CustomerId)

    );

    create nonclustered index IDX_CustomersOnDisk_LastName_FirstName

    on dbo.CustomersOnDisk(LastName, FirstName)

    go

    create table dbo.CustomersMemoryOptimized

    (

    CustomerId int not null identity(1,1)

    constraint PK_CustomersMemoryOptimized

    primary key nonclustered

    hash with (bucket_count = 32768),

    FirstName varchar(64) not null,

    LastName varchar(64) not null,

    Placeholder char(100) null,

    index IDX_CustomersMemoryOptimized_LastName_FirstName

    nonclustered hash(LastName, FirstName)

    with (bucket_count = 1024),

    )

    with (memory_optimized = on, durability = schema_only)

    go

    -- Inserting cross-joined data for all first and last names 50 times

    -- using GO 50 command in Management Studio

    ;with FirstNames(FirstName)

    as

    (

    select Names.Name

    from

    (

    values(''Andrew''),(''Andy''),(''Anton''),(''Ashley''),(''Boris''),

    (''Brian''),(''Cristopher''),(''Cathy''),(''Daniel''),(''Donny''),

    (''Edward''),(''Eddy''),(''Emy''),(''Frank''),(''George''),(''Harry''),

    (''Henry''),(''Ida''),(''John''),(''Jimmy''),(''Jenny''),(''Jack''),

    (''Kathy''),(''Kim''),(''Larry''),(''Mary''),(''Max''),(''Nancy''),

