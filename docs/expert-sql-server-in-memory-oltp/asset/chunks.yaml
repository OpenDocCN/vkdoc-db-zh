  trans: '

    # 1. 为何需要内存 OLTP？


    本章作为引言，阐述了内存数据库的重要性及其所解决的问题。文中概述了微软内存 OLTP 的实现（代号 `Hekaton`）及其设计目标，探讨了内存 OLTP
    引擎的高级架构及其与 `SQL Server` 的集成方式。


    最后，本章还将 `SQL Server` 的内存数据库产品与其他几种可用的解决方案进行了比较。


    ## 背景


    追溯到 `SQL Server` 和其他主要数据库最初设计之时，硬件十分昂贵。当时的服务器仅配备一个或极少数几个 CPU，以及少量的安装内存。数据库服务器必须处理驻留在磁盘上的数据，并在需要时将其加载到内存中。


    自那时起，情况已发生翻天覆地的变化。在过去 30 年间，内存价格大约每 5 年下降 10 倍。硬件变得更加经济实惠。如今，完全有可能以低于 5 万美元的价格购买一台拥有
    32 个核心和 1TB 内存的服务器。诚然，数据库也变得愈发庞大，但活动的业务数据通常仍有可能完全装入内存。


    显然，将数据缓存在缓冲池中是有益的。它减轻了 I/O 子系统的负载并提升了系统性能。然而，当系统在高并发负载下运行时，这往往不足以获得所需的吞吐量。`SQL
    Server` 管理和保护内存中的页结构，这带来了巨大的开销且可扩展性不佳。即使采用行级锁，多个会话也无法同时修改同一数据页上的数据，而必须相互等待。


    或许需要澄清最后一点。显然，多个会话可以同时修改同一数据页上的数据行，并对不同的行持有排他锁（`X` 锁）。然而，它们无法同时更新物理数据页和行对象，因为这可能会损坏内存中的页结构。`SQL
    Server` 通过使用闩锁保护页面来解决此问题。闩锁的工作方式类似于锁，通过在物理级别序列化对内部 `SQL Server` 数据结构的访问来进行保护，因此在任何给定时间点，只有一个线程可以更新内存中数据页上的数据。


    最终，这限制了当前数据库引擎架构所能实现的性能提升。尽管您可以通过添加更多 CPU 和核心来扩展硬件，但这种序列化很快就会成为瓶颈，并限制系统可扩展性的提升。同样，您也无法通过提高
    CPU 时钟速度来改善性能，因为硅芯片可能会过热熔化。因此，提升数据库系统性能唯一可行的方法是减少执行某个操作所需的 CPU 指令数量。


    不幸的是，仅靠代码优化是不够的。考虑需要更新表中一行数据的情况。即使您知道聚集索引键值，该操作也需要遍历索引树，在数据页和行上获取闩锁和锁。在某些情况下，它还需要更新非聚集索引，并在那里获取闩锁和锁。所有这些都会生成日志记录，并要求将这些日志记录和脏数据页写入磁盘。


    所有这些操作可能需要执行数十万甚至数百万条 CPU 指令。代码优化可以在一定程度上减少这个数字，但如果不改变系统架构以及系统存储和处理数据的方式，就不可能显著地减少它。


    这些趋势和架构限制使得微软团队得出结论：一个真正的内存解决方案应该采用与经典 `SQL Server` 数据库引擎不同的设计原则和架构来构建。最初的概念在
    2008 年底提出，认真的规划和设计始于 2010 年，实际开发于 2011 年开始，该技术最终在 `SQL Server 2014` 中向公众发布。


    该项目的主要目标是构建一个比现有 `SQL Server` 数据库引擎快 100 倍的解决方案，这也解释了代号 `Hekaton`（希腊语意为“100”）的由来。这个目标尚未完全实现；然而，内存
    OLTP 在某些场景下提供 20 到 40 倍的性能提升并不罕见。


    同样值得一提的是，`Hekaton` 的设计目标是针对 OLTP 工作负载。众所周知，为特定任务和工作负载设计的专用解决方案通常在目标领域优于通用系统。内存
    OLTP 也是如此。它在支持数百甚至数千个并发事务的大型、繁忙 OLTP 系统中表现出色。与此同时，`SQL Server 2014` 中内存 OLTP 的最初版本对于数据仓库工作负载表现不佳，其他
    `SQL Server` 技术在其上表现更优。


    随着 `SQL Server 2016` 的发布，情况发生了变化。内存 OLTP 的第二个版本支持列存储索引，这允许您针对热门的 OLTP 数据运行实时操作分析查询。尽管如此，该技术尚未像基于磁盘的列式存储那样成熟，您不应将其视为内存数据仓库解决方案。


    内存 OLTP 的设计目标如下：


    *   **为内存优化数据存储**：内存 OLTP 中的数据不存储在基于磁盘的数据页上，并且在加载到内存时也不模仿基于磁盘的存储结构。这使得可以消除复杂的缓冲池结构及其管理代码。此外，常规（非列存储）索引不会持久化到磁盘，它们会在启动时，当内存驻留表的数据被加载到内存中时重新创建。

    *   **消除闩锁和锁**：所有内存 OLTP 的内部数据结构都是无闩锁和无锁的。内存 OLTP 使用多版本并发控制来提供事务一致性。从用户角度看，其行为类似于常规的
    `SNAPSHOT` 事务隔离级别；然而，其底层并不使用锁或 `tempdb` 版本存储。这种机制允许多个会话在无需锁定和阻塞的情况下处理相同的数据，提供近乎线性的系统可扩展性，使其能够充分利用现代多
    CPU/多核硬件。

    *   **使用原生编译**：`T-SQL` 是一种解释型语言，以 CPU 开销为代价提供了极大的灵活性。即使是一个简单的语句也需要执行数十万条 CPU 指令。内存
    OLTP 引擎通过将行访问逻辑、存储过程和用户定义函数编译成本地机器代码来解决此问题。


    内存 OLTP 引擎已完全集成到 `SQL Server` 数据库引擎中。您无需进行复杂的系统重构，将数据拆分到内存和传统数据库服务器之间，或将所有数据从数据库移入内存。您可以逐表分离内存数据和磁盘数据，这允许您将活动的业务数据移入内存，而将其他表和历史数据保留在磁盘上。在某些情况下，这种迁移甚至可以对客户端应用程序透明进行。


    这听起来好得令人难以置信，而且不幸的是，在使用这项技术时您可能仍然会遇到许多障碍。在 `SQL Server 2014` 中，内存 OLTP 仅支持 `SQL
    Server` 数据类型和功能的一个子集，这常常需要您进行代价高昂的代码和架构重构才能加以利用。尽管在 `SQL Server 2016` 中许多此类限制已被移除，但您仍然需要处理一些不兼容性和限制。


    为了从该技术中获得最大的性能提升，您还需要根据内存 OLTP 的行为和内部实现来设计系统。

    '
- fmt: '## In-Memory OLTP Engine Architecture


    In-Memory OLTP is fully integrated into SQL Server, and other SQL Server features
    and client applications can access it transparently. Internally, however, it works
    and behaves very differently than the SQL Server Storage Engine. Figure [1-1](#A340879_2_En_1_Chapter.html#Fig1)
    shows the architecture of the SQL Server Database Engine, including the In-Memory
    OLTP components.


    ![A340879_2_En_1_Fig1_HTML.jpg](A340879_2_En_1_Fig1_HTML.jpg)

    Figure 1-1. SQL Server Database Engine architecture


    In-Memory OLTP stores the data in `memory-optimized tables`. These tables reside
    completely in memory and have a different structure compared to the classic `disk-based
    tables`. With one small exception, `memory-optimized tables` do not store data
    on the data pages; the rows are linked together through the chains of memory pointers.
    It is also worth noting that `memory-optimized tables` do not share memory with
    `disk-based tables` and live outside of the buffer pool.


    Note: I will discuss `memory-optimized tables` in detail in Chapter [3](#A340879_2_En_3_Chapter.html).


    There are two ways the SQL Server Database Engine can work with `memory-optimized
    tables`. The first is the `Query Interop Engine`. It allows you to reference `memory-optimized
    tables` from interpreted T-SQL code. The data location is transparent to the queries;
    you can access `memory-optimized tables`, join them with `disk-based tables`,
    and work with them in the usual way. Most T-SQL features and language constructs
    are supported in this mode.


    You can also access and work with `memory-optimized tables` using `natively compiled
    modules`, such as `stored procedures`, `memory-optimized table triggers` and `scalar
    user-defined functions`. You can define them similarly to the regular T-SQL modules
    using several additional language constructs introduced by In-Memory OLTP.


    `Natively compiled modules` have been compiled into machine code and loaded into
    SQL Server process memory. Those modules can introduce significant performance
    improvements compared to the `Interop Engine`; however, they support just a limited
    set of T-SQL constructs and can access only `memory-optimized tables`.


    Note: I will discuss `natively compiled modules` in Chapter [9](#A340879_2_En_9_Chapter.html).


    The `memory-optimized tables` use row-based storage with all columns combined
    into the data rows. It is also possible to define `clustered columnstore indexes`
    on those tables. These indexes are the separate data structures that store a heavily
    compressed copy of the data in column-based format, which is perfect for real-time
    operational analytics queries. In-Memory OLTP persists those indexes on disk and
    does not re-create them on a database restart.


    Note: I will discuss `clustered columnstore indexes` in Chapter [7](#A340879_2_En_7_Chapter.html).


    ## In-Memory OLTP and Other In-Memory Databases


    In-Memory OLTP is hardly the only relational in-memory database (`IMDB`) available
    on the market. Let’s look at other popular solutions that exist as of 2017.


    ### Oracle


    As of this writing, Oracle provides two separate `IMDB` offerings. The mainstream
    Oracle 12c database server includes the `Oracle Database In-Memory option`. When
    it is enabled, Oracle creates the copy of the data in column-based storage format
    and maintains it in the background. Database administrators may choose the tables,
    partitions, and columns that should be included in the copy.


    This approach is targeted toward analytical queries and data warehouse workloads,
    which benefit from column-based storage and processing. It does not improve the
    performance of OLTP queries that continue to use disk-based row-based storage.


    In-memory column-based data adds overhead during data modifications; it needs
    to be updated to reflect the data changes. Moreover, it is not persisted on disk
    and needs to be re-created every time the server restarts.


    The same time, this implementation is fully transparent to the client applications.
    All data types and PL/SQL constructs are supported, and the feature can be enabled
    or disabled on the configuration level. Oracle chooses the data to access on a
    per-query basis using in-memory data for the analytical/data warehouse and disk-based
    data for OLTP workloads. This is different from SQL Server In-Memory OLTP where
    you should explicitly define `memory-optimized tables` and `columnstore indexes`.


    In addition to the `Database In-Memory option`, Oracle offers the separate product
    `Oracle TimesTen` targeted toward OLTP workloads. This is a separate in-memory
    database that loads all data into memory and can operate in three modes.

    *   `Standalone In-Memory Database` supports a traditional client-server architecture.

    *   `Embedded In-Memory Database` allows applications to load `Oracle TimesTen`
    into an application’s address space and eliminate the latency of network calls.
    This is extremely useful when the data-tier response time is critical.

    *   `Oracle Database Cache (TimesTen Cache)` allows the product to be deployed
    as an additional layer between the application and the Oracle database. The data
    in the cache is updatable, and synchronization between `TimesTen` and the Oracle
    database is done automatically.


    Internally, however, `Oracle TimesTen` still relies on locking, which reduces
    transaction throughput under heavy concurrent loads. Also, it does not support
    native compilation, as In-Memory OLTP does.


    It is also worth noting that both the `Oracle In-Memory option` and `TimesTen`
    require separate licenses. This may significantly increase implementation costs
    compared to In-Memory OLTP, which is available at no additional cost even in non-Enterprise
    editions of SQL Server.


    ### IBM DB2


    Like the `Oracle Database In-Memory option`, `IBM DB2 10.5 with BLU Acceleration`
    targets data warehouse and analytical workloads. It persists the copy of the row-based
    disk-based tables in column-based format in in-memory `shadow tables`, using them
    for analytical queries. The data in the `shadow tables` is persisted on disk and
    is not re-created at database startup. It is also worth noting that the size of
    the data in `shadow tables` may exceed the size of available memory.


    `IBM DB2` synchronizes the data between disk-based and `shadow tables` automatically
    and asynchronously, which reduces the overhead during data modifications. This
    approach, however, introduces latency during `shadow table` updates, and queries
    may work with slightly outdated data.


    `IBM DB2 BLU Acceleration` puts the emphasis on query processing and provides
    great performance with data warehouse and analytical workloads. It does not have
    any OLTP-related optimizations and uses disk-based data and locking to support
    OLTP workloads.'
