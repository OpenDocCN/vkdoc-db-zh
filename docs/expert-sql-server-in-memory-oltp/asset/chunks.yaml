  trans: '# 5. 非聚集索引


    本章讨论非聚集索引，这是 `In-Memory OLTP Engine` 支持的第二种索引类型。它展示了如何定义非聚集索引，讨论了它们的 `SARGability`
    规则，并解释了它们的内部结构。


    最后，本章讨论了针对内存优化表的几种索引策略和设计注意事项。


    ## 使用非聚集索引


    非聚集索引是 `In-Memory OLTP Engine` 支持的另一种索引类型。与针对点查找相等搜索进行优化的哈希索引相反，非聚集索引帮助你基于值的范围来搜索数据。它们的结构与基于磁盘的表上的常规索引有些相似。然而，它们并非完全相同，我将在本章后面深入讨论它们的内部实现。


    ### 术语问题


    非聚集索引在 `SQL Server 2014 CTP 2` 中引入，该版本的文档和白皮书使用术语 `range indexes` 来指代它们。但是，在 `SQL
    Server 2014` 的正式发布版中，Microsoft 将术语更改为 `nonclustered indexes`。尽管如此，你仍然可以在文档和数据管理视图中找到
    `range indexes` 这个术语。


    这种术语可能会令人困惑，因为哈希索引也非聚集的。事实上，聚集索引的概念不能应用于 `In-Memory OLTP`。数据行在内存中不以任何特定顺序存储。


    同样值得注意的是，`In-Memory OLTP` 索引的最小 `index_id` 值为 `2`，这对应于基于磁盘的表中的非聚集索引。


    ### 创建非聚集索引


    非聚集索引作为 `CREATE TABLE` 语句的一部分内联创建。其语法与哈希索引创建类似；但是，你应该省略关键字 `HASH`，并且不需要在索引属性中指定存储桶的数量。


    清单 5-1 中的代码创建了一个内存优化表，其中包含两个非聚集索引，一个是复合索引，另一个是单列索引。


    ```sql

    create table dbo.Customers

    (

    CustomerId int identity(1,1) not null

    constraint PK_Customers

    primary key nonclustered

    hash with (bucket_count=1024),

    FirstName varchar(32) not null,

    LastName varchar(64) not null,

    FullName varchar(97) not null,

    index IDX_LastName_FirstName

    nonclustered(LastName, FirstName),

    index IDX_FullName

    nonclustered(FullName)

    )

    with (memory_optimized=on, durability=schema_only);

    ```

    清单 5-1. 创建带有两个非聚集索引的表


    ### 使用非聚集索引


    与基于磁盘的表中的 `B-Tree` 索引类似，非聚集索引中的数据根据索引键列的值排序。因此，非聚集索引在大量用例中非常有益。当查询谓词允许 `SQL Server`
    定位并隔离一部分索引键进行处理时，它们可以导致 `Index Seek` 操作。除极少数例外情况，非聚集索引的 `SARGability` 规则与在基于磁盘的表上定义的索引规则相匹配。


    清单 5-2 展示了对 `dbo.Customers` 表的几个查询。`SQL Server` 能够对所有查询使用 `Index Seek` 操作。


    ```sql

    -- 指定索引中所有列的点查找

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where LastName = ''White'' and FirstName = ''Paul'';

    -- 使用最左侧索引列的点查找

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where LastName = ''White'';

    -- 使用 ">", ">=", "<", "<="

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where LastName > ''W'';

    -- 前缀搜索

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where LastName like ''Wh%'';

    -- IN 列表

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where LastName in (''White'',''Isakov'');

    ```

    清单 5-2. 导致 Index Seek 操作的查询


    与 `B-Tree` 索引类似，当查询谓词不允许你隔离一部分索引键进行处理时，`Index Seek` 操作是不可能的。清单 5-3 展示了此类查询的几个示例。


    ```sql

    -- 省略最左侧的索引列

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where FirstName = ''Paul'';

    -- 子串搜索

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where LastName like ''%hit%'';

    -- 使用函数

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where len(LastName) = 5;

    ```

    清单 5-3. 导致 Index Scan 操作的查询


    与基于磁盘的表上的 `B-Tree` 索引相反，非聚集索引是单向的，`SQL Server` 无法按照与排序顺序相反的方向扫描索引键。在定义索引和为列选择排序顺序时，你应该牢记此行为。


    让我们用一个例子来说明；我们将创建一个结构与 `dbo.Customers` 相同的基于磁盘的表，并用相同的数据填充这两个表。清单 5-4 展示了执行此操作的代码。


    ```sql

    create table dbo.Customers_OnDisk

    (

    CustomerId int identity(1,1) not null,

    FirstName varchar(32) not null,

    LastName varchar(64) not null,

    FullName varchar(97) not null,

    constraint PK_Customers_OnDisk

    primary key clustered(CustomerId)

    );

    create nonclustered index IDX_Customers_OnDisk_LastName_FirstName

    on dbo.Customers_OnDisk(LastName, FirstName);

    create nonclustered index IDX_Customers_OnDisk_FullName

    on dbo.Customers_OnDisk(FullName);

    go

    ;with FirstNames(FirstName)

    as

    (

    select Names.Name

    from

    (

    values(''Andrew''),(''Andy''),(''Anton''),(''Ashley'')

    ,(''Boris''),(''Brian''),(''Cristopher''),(''Cathy'')

    ,(''Daniel''),(''Don''),(''Edward''),(''Eddy''),(''Emy'')

    ,(''Frank''),(''George''),(''Harry''),(''Henry''),(''Ida'')

    ,(''John''),(''Jimmy''),(''Jenny''),(''Jack''),(''Kathy'')

    ,(''Kim''),(''Larry''),(''Mary''),(''Max''),(''Nancy''),

    (''Olivia''),(''Paul''),(''Peter''),(''Patrick''),(''Robert''),

    (''Ron''),(''Steve''),(''Shawn''),(''Tom''),(''Timothy''),

    (''Uri''),(''Victor'')

    ) Names(Name)

    )

    ,LastNames(LastName)

    as

    (

    select Names.Name

    from

    (

    values(''Smith''),(''Johnson''),(''Williams''),(''Jones'')

    ,(''Brown''),(''Davis''),(''Miller''),(''Wilson'')

    ,(''Moore''),(''Taylor''),(''Anderson''),(''Jackson'')

    ,(''White''),(''Isakov'')

    ) Names(Name)

    )

    insert into dbo.Customers(LastName, FirstName, FullName)

    select LastName, FirstName, FirstName + '' '' + LastName

    from FirstNames cross join LastNames;

    insert into dbo.Customers_OnDisk(LastName, FirstName, FullName)

    select LastName, FirstName, FullName

    from dbo.Customers;

    ```

    清单 5-4. 非聚集索引与排序顺序：基于磁盘的表创建'
- fmt: '# 索引与排序


    让我们运行一些查询，以升序选择多行数据，这与索引的排序顺序相匹配。清单 [5-5] 展示了这些查询。


    ```sql

    select top 3 CustomerId, FirstName, LastName, FullName

    from dbo.Customers_OnDisk

    order by FullName ASC;

    select top 3 CustomerId, FirstName, LastName, FullName

    from dbo.Customers

    order by FullName ASC;

    ```


    **清单 5-5.**

    非聚集索引与排序顺序：按索引键列以相同顺序选择数据


    图 [5-1] 展示了这些查询的执行计划。SQL Server 从最小的键值开始扫描索引，并在读取三行后停止。除了基于磁盘的数据需要的 Key Lookup
    操作外，两个查询的执行计划是相似的。SQL Server 使用 Key Lookup 从表的聚集索引中获取 `FirstName` 和 `LastName`
    列的值。对于内存优化表，则不需要 Key Lookup，因为其中的索引指针是实际数据行的一部分，并且索引覆盖了查询中的所有行内列。


    ![A340879_2_En_5_Fig1_HTML.jpg](A340879_2_En_5_Fig1_HTML.jpg)


    **图 5-1.**

    当 `ORDER BY` 条件与索引排序顺序匹配时的执行计划


    如果需要以降序排序输出，情况就会发生变化，如清单 [5-6] 所示。


    ```sql

    select top 3 CustomerId, FirstName, LastName, FullName

    from dbo.Customers_OnDisk

    order by FullName DESC;

    select top 3 CustomerId, FirstName, LastName, FullName

    from dbo.Customers

    order by FullName DESC;

    ```


    **清单 5-6.**

    非聚集索引与排序顺序：按索引键列以相反顺序选择数据


    如图 [5-2] 所示，由于 B-Tree 索引的双向特性，SQL Server 能够以与定义相反的顺序扫描基于磁盘表的索引。然而，对于内存优化表来说情况并非如此，因为其中的索引是单向的。SQL
    Server 决定先扫描表，然后再对数据进行排序。


    ![A340879_2_En_5_Fig2_HTML.jpg](A340879_2_En_5_Fig2_HTML.jpg)


    **图 5-2.**

    当 `ORDER BY` 条件与索引排序顺序相反时的执行计划


    最后，索引统计信息的行为（我在上一章讨论过）仍然适用于非聚集索引。SQL Server 在创建索引时创建统计信息；但是，自动更新统计信息的行为取决于创建表时的数据库兼容级别。


    ## 非聚集索引内部结构


    非聚集索引使用一种无锁且无闩锁的 B-Tree 变体，称为 Bw-Tree，它由 Microsoft Research 在 2011 年设计。让我们详细了解一下
    Bw-Tree 的结构。


    ### Bw-Tree 概述


    与 B-Tree 类似，Bw-Tree 中的索引页包含一组有序的索引键值。然而，Bw-Tree 的页面没有固定大小，并且在构建后是不可变的。不过，页面的最大尺寸为
    8KB。


    非聚集索引叶子级别的行包含指向具有相同索引键值的数据行链的指针。这与哈希索引的工作方式类似，多行和/或一行的多个版本被链接在一起。表中的每个索引都会在行中的索引指针数组中添加一个指针，无论其类型是哈希还是非聚集索引。


    非聚集索引中的根级别和中间级别被称为内部页面。与 B-Tree 索引类似，内部页面指向索引中的下一级别。但是，它们不是指向实际的数据页，而是使用一个逻辑页面
    ID (`PID`)，这是一个单独的类数组结构（称为映射表）中的位置（偏移量）。反过来，映射表中的每个元素都包含一个指向实际索引页的指针。映射表允许 In-Memory
    OLTP 在需要更改它们引用的下一级别页面时，避免重建内部页面（本章后面会详细介绍）。在这种情况下，只会更新映射表指针。


    图 [5-3] 展示了一个非聚集索引和映射表的例子。来自内部页面的每一行索引都存储了下一级别页面上的最高键值和 `PID`。这与 B-Tree 索引不同，在
    B-Tree 索引中，中间级别和根级别的索引行存储的是下一级别页面的最低键值。另一个区别是，Bw-Tree 中的页面没有链接在双链表中。每个页面都知道同一级别下一页的
    `PID`，但不知道前一页的 `PID`。尽管在图 [5-3] 中它看起来像一个指针（箭头），但该链接是通过映射表完成的，类似于指向下一级别页面的链接。


    ![A340879_2_En_5_Fig3_HTML.jpg](A340879_2_En_5_Fig3_HTML.jpg)


    **图 5-3.**

    非聚集索引结构


    尽管 Bw-Tree 看起来与 B-Tree 相似，但有一个概念上的区别：基于磁盘的 B-Tree 索引的叶子级别由索引中每个数据行的独立索引行组成。如果多个数据行具有相同的键值，则索引将存储多个具有相同索引键的叶子级别行。


    相反，内存中的非聚集索引存储一个指向行链的索引行（指针），该行链包含所有具有相同键值的数据行。索引中每个键值只存储一个索引行（指针）。你可以在图 [5-3]
    中看到这一点，其中索引的叶子级别对于键值 `Ann` 和 `Nancy` 只有单行，即使行链包含每个值的多个数据行。


    > **提示**

    > 你可以通过查看第 [3] 章中的图 [3-1] 和图 [3-2] 来比较 B-Tree 和 Bw-Tree 索引的结构，这些图展示了基于磁盘表的聚集和非聚集
    B-Tree 索引。'
  raw: 'Let’s run the queries that select several rows in ascending order, which matches
    the index sorting order. Listing [5-5](#A340879_2_En_5_Chapter.html#Par19) shows
    the queries.


    ```

    select top 3 CustomerId, FirstName, LastName, FullName

    from dbo.Customers_OnDisk

    order by FullName ASC;

    select top 3 CustomerId, FirstName, LastName, FullName

    from dbo.Customers

    order by FullName ASC;

    Listing 5-5.

    Nonclustered Indexes and Sorting Order: Selecting Data in the Same Order with
    the Index Key Column

    ```


    Figure [5-1](#A340879_2_En_5_Chapter.html#Fig1) shows the execution plans for
    the queries. SQL Server scans the indexes starting with the lowest key and stops
    after it reads three rows. The execution plans are similar for both queries with
    the exception of the required Key Lookup operation with disk-based data. SQL Server
    uses it to obtain the values of the `FirstName` and `LastName` columns from the
    clustered index of the table. Key Lookup is not required with memory-optimized
    tables where the index pointers are part of the actual data rows and the indexes
    are covering all in-row columns in the queries.


    ![A340879_2_En_5_Fig1_HTML.jpg](A340879_2_En_5_Fig1_HTML.jpg)


    Figure 5-1.


    Execution plans when ORDER BY condition matches the index sorting order


    The situation changes if you need to sort the output in descending order, as shown
    in Listing [5-6](#A340879_2_En_5_Chapter.html#Par23).


    ```

    select top 3 CustomerId, FirstName, LastName, FullName

    from dbo.Customers_OnDisk

    order by FullName DESC;

    select top 3 CustomerId, FirstName, LastName, FullName

    from dbo.Customers

    order by FullName DESC;

    Listing 5-6.

    Nonclustered Indexes and Sorting Order: Selecting Data in the Opposite Order with
    Index Key Column

    ```


    As you can see in Figure [5-2](#A340879_2_En_5_Chapter.html#Fig2), SQL Server
    is able to scan the disk-based table index in the opposite order of how it was
    defined because of the bidirectional nature of B-Tree indexes. However, this is
    not the case for memory-optimized tables where indexes are unidirectional. SQL
    Server decides to scan the table and sort the data afterward.


    ![A340879_2_En_5_Fig2_HTML.jpg](A340879_2_En_5_Fig2_HTML.jpg)


    Figure 5-2.


    Execution plans when ORDER BY condition is the opposite of the index sorting order


    Finally, index statistics behavior, which I discussed in the previous chapter,
    still applies to the nonclustered indexes. SQL Server creates statistics at the
    time of index creation; however, the automatic statistics update behavior depends
    on the database compatibility level when the tables were created.


    ## Nonclustered Index Internals


    Nonclustered indexes use a lock- and latch-free variation of the B-Tree, called
    a Bw-Tree, which was designed by Microsoft Research in 2011. Let’s look at the
    Bw-Tree structure in detail.


    ### Bw-Tree Overview


    Similar to B-Tree, index pages in a Bw-Tree contain a set of ordered index key
    values. However, Bw-Tree pages do not have a fixed size, and they are unchangeable
    after they are built. The maximum page size, however, is 8KB.


    Rows from a leaf level of the nonclustered index contain the pointers to the data
    row chains with the same index key values. This works in a similar manner to hash
    indexes, when multiple rows and/or versions of a row are linked together. Each
    index in the table adds a pointer to the index pointer array in the row, regardless
    of its type: hash or nonclustered.


    Root and intermediate levels in nonclustered indexes are called internal pages.
    Similar to B-Tree indexes, internal pages point to the next level in the index.
    However, instead of pointing to the actual data page, internal pages use a logical
    page ID (PID), which is a position (offset) in a separate array-like structure
    called a mapping table. In turn, each element in the mapping table contains a
    pointer to the actual index page. Mapping tables allow In-Memory OLTP to avoid
    rebuilding internal pages when the next-level pages they reference need to be
    changed (more about this later in the chapter). Only the mapping table pointer
    is updated in that case.


    Figure [5-3](#A340879_2_En_5_Chapter.html#Fig3) shows an example of a nonclustered
    index and a mapping table. Each index row from the internal page stores the highest
    key value on the next-level page and PID. This is different from a B-Tree index,
    where intermediate- and root-level index rows store the lowest key value of the
    next-level page instead. Another difference is that the pages in a Bw-Tree are
    not linked in a double-linked list. Each page knows the PID of the next page on
    the same level and does not know the PID of the previous page. Even though it
    appears as a pointer (arrow) in Figure [5-3](#A340879_2_En_5_Chapter.html#Fig3),
    that link is done through the mapping table, similar to links to pages on the
    next level.


    ![A340879_2_En_5_Fig3_HTML.jpg](A340879_2_En_5_Fig3_HTML.jpg)


    Figure 5-3.


    Nonclustered index structure


    Even though a Bw-Tree looks similar to a B-Tree, there is one conceptual difference:
    the leaf level of a disk-based B-Tree index consists of separate index rows for
    each data row in the index. If multiple data rows have the same key value, the
    index would have multiple leaf-level rows with the same index key stored.


    Alternatively, in-memory nonclustered indexes store one index row (pointer) to
    the row chain that includes all the data rows that have the same key value. Only
    one index row (pointer) per key value is stored in the index. You can see this
    in Figure [5-3](#A340879_2_En_5_Chapter.html#Fig3), where the leaf level of the
    index has single rows for the key values of `Ann` and `Nancy` , even though the
    row chain includes more than one data row for each value.


    Tip


    You can compare the structure of B-Tree and Bw-Tree indexes by looking at Figures
    [3-1](#A340879_2_En_3_Chapter.html#Fig1) and [3-2](#A340879_2_En_3_Chapter.html#Fig2)
    from Chapter [3](#A340879_2_En_3_Chapter.html), which show clustered and nonclustered
    B-Tree indexes on disk-based tables.'
