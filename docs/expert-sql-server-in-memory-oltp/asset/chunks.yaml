  trans: '

    ## 哈希索引与非聚集索引


    如您所知，哈希索引仅在查询对所有索引列使用相等谓词的点查询场景中有效。而非聚集索引则能在更广泛的场景中使用，这通常使得选择变得显而易见。当您的查询受益于点查询以外的场景时，应使用非聚集索引。


    在点查询的情况下，情况则不那么明显。对于哈希索引，SQL Server 可以通过调用哈希函数并计算哈希值，单步定位到哈希桶，这是数据行链的入口点。对于非聚集索引，SQL
    Server 必须遍历 Bw-Tree 以找到叶页，步骤数取决于索引的高度以及其中增量记录的数量。


    即使非聚集索引需要更多步骤来找到数据行链的入口点，但与哈希索引相比，该链可能更小。非聚集索引中的行链基于唯一的索引键值构建。在哈希索引中，行链基于非唯一的哈希键构建，并且可能由于哈希冲突而更大，尤其是在
    `bucket_count` 值不足时。


    让我们比较一下点查询场景中哈希索引和非聚集索引的性能。代码清单 5-13 创建了四个结构相同的表。其中三个表在 `Value` 列上定义了哈希索引，使用了不同的
    `bucket_count` 值。第四个表则在同一列上定义了非聚集索引。最后，代码使用相同的数据填充所有表。


    ```sql

    create table dbo.Hash_131072

    (

    Id int not null

    constraint PK_Hash_131072

    primary key nonclustered

    hash with (bucket_count=131072),

    Value int not null,

    index IDX_Value hash(Value)

    with (bucket_count=131072)

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.Hash_16384

    (

    Id int not null

    constraint PK_Hash_16384

    primary key nonclustered

    hash with (bucket_count=16384),

    Value int not null,

    index IDX_Value hash(Value)

    with (bucket_count=16384)

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.Hash_1024

    (

    Id int not null

    constraint PK_Hash_1014

    primary key nonclustered

    hash with (bucket_count=1024),

    Value int not null,

    index IDX_Value hash(Value)

    with (bucket_count=1024)

    )

    with (memory_optimized=on, durability=schema_only);

    create table dbo.NonClusteredIdx

    (

    Id int not null

    constraint PK_NonClusteredIdx

    primary key nonclustered

    hash with (bucket_count=131072),

    Value int not null,

    index IDX_Value nonclustered(Value)

    )

    with (memory_optimized=on, durability=schema_only);

    go

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as t1 cross join N1 as t2) -- 4 rows

    ,N3(C) as (select 0 from N2 as t1 cross join N2 as t2) -- 16 rows

    ,N4(C) as (select 0 from N3 as t1 cross join N3 as t2) -- 256 rows

    ,N5(C) as (select 0 from N4 as t1 cross join N4 as t2) -- 65,536 rows

    ,N6(C) as (select 0 from N5 as t1 cross join N1 as t2) -- 131,072 rows

    ,Ids(Id) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.Hash_131072(Id,Value)

    select Id, Id

    from ids

    where Id <= 75000;

    insert into dbo.Hash_16384(Id,Value)

    select Id, Value

    from dbo.Hash_131072;

    insert into dbo.Hash_1024(Id,Value)

    select Id, Value

    from dbo.Hash_131072;

    insert into dbo.NonClusteredIdx(Id,Value)

    select Id, Value

    from dbo.Hash_131072;

    ```


    *代码清单 5-13. 哈希索引与非聚集索引的点查询性能：表创建*


    不同数量的桶导致了索引中索引行链大小的不同。在此案例中，`dbo.Hash_131072`、`dbo.Hash_16384` 和 `dbo.Hash_1024`
    表的平均链长分别为 1、4 和 73 行。


    **提示**

    您可以使用 `sys.dm_db_xtp_hash_index_stats` 视图和第 4 章中的代码清单 4-2 来分析哈希索引属性。


    下一步，让我们使用代码清单 5-14 中的代码比较点查询性能。此代码对每个表触发 75,000 次点查询选择。


    ```sql

    declare

    @T table(Value int not null primary key)

    insert into @T(Value)

    select Id from dbo.Hash_131072;

    select count(*)

    from @T t

    cross apply

    (

    select count(*) as Cnt

    from dbo.Hash_131072 h

    where h.Value = t.Value

    ) c

    where c.Cnt > 0;

    select count(*)

    from @T t

    cross apply

    (

    select count(*) as Cnt

    from dbo.Hash_16384 h

    where h.Value = t.Value

    ) c

    where c.Cnt > 0;

    select count(*)

    from @T t

    cross apply

    (

    select count(*) as Cnt

    from dbo.Hash_1024 h

    where h.Value = t.Value

    ) c

    where c.Cnt > 0;

    select count(*)

    from @T t

    cross apply

    (

    select count(*) as Cnt

    from dbo.NonClusteredIdx h

    where h.Value = t.Value

    ) c

    where c.Cnt > 0;

    ```


    *代码清单 5-14. 哈希索引与非聚集索引的点查询性能：选择数据*


    表 5-1 显示了在我的环境中查询的执行时间。在桶数量充足的情况下，哈希索引的性能优于非聚集索引。然而，桶数量不足和行链过长会显著降低其性能，使其效率低于非聚集索引。


    **表 5-1. 查询执行时间**


    | | `Hash_131072` | `Hash_16384` | `Hash_1024` | `NonClusteredIdx` |

    | :--- | :--- | :--- | :--- | :--- |

    | 平均索引行链大小 | 1 | 4 | 73 | 不适用 |

    | 执行时间 | 62 ms | 74 ms | 129 ms | 78 ms |


    归根结底，这取决于对 `bucket_count` 的正确估算。不幸的是，数据的易变性使这项任务变得复杂，并要求您将未来的数据增长纳入分析。


    在某些情况下，当数据相对静态时，您可以创建哈希索引，并高估其中的桶数量。以目录实体为例，例如 `Customers` 表及其 `CustomerId` 和
    `Phone` 列。这些列上的哈希索引将提高点查询搜索和联接的性能。尽管客户群会随着时间增长，但这种增长率通常不会过高，预留一百万个空桶可能在很长一段时间内都足够用。每个索引将使用大约
    8MB 的内存在大多数情况下是可以接受的。


    另一方面，为 `Orders` 表中的 `OrderId` 列选择哈希索引则更危险。负载增长和数据保留规则的变化可能导致原始的 `bucket_count`
    值不足。如果您计划监控系统并且能够承担重建索引期间的停机时间，这仍然可以接受；然而，在这种场景下，非聚集索引将是更安全的选择。


    内存需求是另一个需要考虑的因素。对于哈希索引，内存使用取决于桶的数量。非聚集索引所需的内存量取决于索引键的大小和索引基数（索引键值的唯一性）。例如，如果一个表有一个
    `varchar` 列，包含 1,000,000 个唯一值，每个值 100 字节，那么该列上的非聚集索引将需要大约 800MB 来支持 Bw-Tree 结构并在内部和叶索引页上存储键值。或者，具有
    2,097,152 个桶的哈希索引将仅使用 16MB 的内存。


    总而言之，对于点查询和相等联接，仅当您可以正确估计桶的数量并将未来数据增长纳入分析时，才创建哈希索引。您还应该监控它们，并且在 `bucket_count`
    变得不足时能够承担重建索引的停机时间。否则，请使用非聚集索引，这是更安全的选择，并且不依赖于桶的数量。

