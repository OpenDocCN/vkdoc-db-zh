- fmt: '## In-Memory OLTP in Action: Resolving Latch Contention


    Latches are lightweight synchronization objects that SQL Server uses to protect
    the consistency of internal data structures. Multiple sessions (or, in that context,
    threads) cannot modify the same object simultaneously.


    Consider the situation when multiple sessions try to access the same data page
    in the buffer pool. While it is safe for the multiple sessions/threads to read
    the data simultaneously, data modifications must be serialized and have exclusive
    access to the page. If such a rule is not enforced, multiple threads could update
    a different part of the data page at once, overwriting each other’s changes and
    making the data inconsistent, which would lead to page corruption.


    Latches help to enforce that rule. The threads that need to read data from the
    page obtain shared (`S`) latches, which are compatible with each other. Data modification,
    on the other hand, requires an exclusive (`X`) latch, which prevents other readers
    and writers from accessing the data page.


    Note


    Even though latches are conceptually similar to locks, there is a subtle difference
    between them. Locks enforce logical consistency of the data. For example, they
    reduce or prevent concurrency phenomena, such as dirty or phantom reads. Latches,
    on the other hand, enforce physical data consistency, such as preventing corruption
    of the data page structures.


    Usually, latches have a short lifetime and are barely noticeable in the system.
    However, in busy OLTP systems, with a large number of CPUs and a high rate of
    simultaneous data modifications, latch contention can become a bottleneck. You
    can see the sign of such a bottleneck by the large percent of `PAGELATCH` waits
    in the wait statistics or by analyzing the `sys.dm_os_latch_stats` data management
    view.


    In-Memory OLTP can be extremely helpful in addressing latch contention because
    of its latch-free architecture. It can help to dramatically increase data modification
    throughput in some scenarios. In this section, you will see one such example.


    In my test environment, I used a Microsoft Azure DS15V2 virtual machine with the
    Enterprise edition of SQL Server 2016 SP1 installed. This virtual machine has
    20 cores and 140GB of RAM and disk subsystem that performs 62,500 IOPS.


    I created the database shown in Listing [2-1](#A340879_2_En_2_Chapter.html#Par10)
    with 16 data files in the `LOGDATA` filegroup to minimize allocation maps latch
    contention. The log file has been placed on the local SSD storage, while data
    and In-Memory OLTP filegroups share the main disk array. It is worth noting that
    placing disk-based and In-Memory filegroups on the different arrays in production
    often leads to better I/O performance. However, it did not affect the test scenarios
    where I did not mix disk-based and In-Memory OLTP workloads in the same tests.


    As the first step, I created a set of disk-based tables that mimics the structure
    of memory-optimized tables created earlier in the chapter, and I created the stored
    procedure that inserts data into those tables. Listing [2-5](#A340879_2_En_2_Chapter.html#Par55)
    shows the code to accomplish this.


    ```sql

    create table dbo.WebRequests_Disk

    (

    RequestId int not null identity(1,1),

    RequestTime datetime2(4) not null

    constraint DEF_WebRequests_Disk_RequestTime

    default sysutcdatetime(),

    URL varchar(255) not null,

    RequestType tinyint not null, -- GET/POST/PUT

    ClientIP varchar(15) not null,

    BytesReceived int not null,

    constraint PK_WebRequests_Disk

    primary key nonclustered(RequestID)

    on [LOGDATA]

    ) on [LOGDATA];

    create unique clustered index IDX_WebRequests_Disk_RequestTime_RequestId

    on dbo.WebRequests_Disk(RequestTime,RequestId)

    on [LOGDATA];

    create table dbo.WebRequestHeaders_Disk

    (

    RequestId int not null,

    HeaderName varchar(64) not null,

    HeaderValue varchar(256) not null,

    constraint PK_WebRequestHeaders_Disk

    primary key clustered(RequestID,HeaderName)

    on [LOGDATA]

    );

    create table dbo.WebRequestParams_Disk

    (

    RequestId int not null,

    ParamName varchar(64) not null,

    ParamValue nvarchar(256) not null,

    constraint PK_WebRequestParams_Disk

    primary key clustered(RequestID,ParamName)

    on [LOGDATA]

    );

    go

    create proc dbo.InsertRequestInfo_Disk

    (

    @URL varchar(255)

    ,@RequestType tinyint

    ,@ClientIP varchar(15)

    ,@BytesReceived int

    -- Header fields

    ,@Authorization varchar(256)

    ,@UserAgent varchar(256)

    ,@Host varchar(256)

    ,@Connection varchar(256)

    ,@Referer varchar(256)

    -- Parameters.. Just for the demo purposes

    ,@Param1 varchar(64) = null

    ,@Param1Value nvarchar(256) = null

    ,@Param2 varchar(64) = null

    ,@Param2Value nvarchar(256) = null

    ,@Param3 varchar(64) = null

    ,@Param3Value nvarchar(256) = null

    ,@Param4 varchar(64) = null

    ,@Param4Value nvarchar(256) = null

    ,@Param5 varchar(64) = null

    ,@Param5Value nvarchar(256) = null

    )

    as

    begin

    set nocount on

    set xact_abort on

    declare

    @RequestId int

    begin tran

    insert into dbo.WebRequests_Disk

    (URL,RequestType,ClientIP,BytesReceived)

    values

    (@URL,@RequestType,@ClientIP,@BytesReceived);

    select @RequestId = SCOPE_IDENTITY();

    insert into dbo.WebRequestHeaders_Disk

    (RequestId,HeaderName,HeaderValue)

    values

    (@RequestId,''AUTHORIZATION'',@Authorization)

    ,(@RequestId,''USERAGENT'',@UserAgent)

    ,(@RequestId,''HOST'',@Host)

    ,(@RequestId,''CONNECTION'',@Connection)

    ,(@RequestId,''REFERER'',@Referer);

    ;with Params(ParamName, ParamValue)

    as

    (

    select ParamName, ParamValue

    from (

    values

    (@Param1, @Param1Value)

    ,(@Param2, @Param2Value)

    ,(@Param3, @Param3Value)

    ,(@Param4, @Param4Value)

    ,(@Param5, @Param5Value)

    ) v(ParamName, ParamValue)

    where

    ParamName is not null and

    ParamValue is not null

    )

    insert into dbo.WebRequestParams_Disk

    (RequestID,ParamName,ParamValue)

    select @RequestId, ParamName, ParamValue

    from Params;

    commit

    end;

    ```

    Listing 2-5.

    Creating Disk-Based Tables and a Stored Procedure


    In the tests, I compared the insert throughput of disk-based and memory-optimized
    tables using the `dbo.InsertRequestInfo_Disk`, `dbo.InsertRequestInfo_Memory`,
    and `dbo.InsertRequestInfo_NativelyCompiled` stored procedures, calling them simultaneously
    from the multiple sessions in the loop. Each call inserted one row into the `dbo.WebRequests`
    table, five rows into the `dbo.WebRequestHeaders` table, and from one to five
    rows into the `dbo.WebRequestDisks` table, which makes nine rows total on average
    in the single transaction.


    Note


    The test application and scripts are included in the companion materials of the
    book.


    In the case of the `dbo.InsertRequestInfo_Disk` stored procedure and disk-based
    tables, my test server achieved a maximum throughput of about 4,500 batches/calls
    per second with 150 concurrent sessions. Figure [2-1](#A340879_2_En_2_Chapter.html#Fig1)
    shows several performance counters at the time of the test.


    ![A340879_2_En_2_Fig1_HTML.jpg](A340879_2_En_2_Fig1_HTML.jpg)

    Figure 2-1.

    Performance counters when data was inserted into disk-based tables (150 concurrent
    sessions)'
