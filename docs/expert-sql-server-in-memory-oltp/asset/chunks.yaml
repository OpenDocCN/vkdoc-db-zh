- fmt: '# 5. Nonclustered Indexes


    This chapter discusses nonclustered indexes, which is the second type of indexes
    supported by the `In-Memory OLTP Engine`. It shows how to define nonclustered
    indexes, talks about their `SARGability` rules, and explains their internal structure.


    Finally, the chapter discusses several indexing strategies and design considerations
    for memory-optimized tables.


    ## Working with Nonclustered Indexes


    Nonclustered indexes are another type of index supported by the `In-Memory OLTP
    Engine`. In contrast to hash indexes, which are optimized to support point-lookup
    equality searches, nonclustered indexes help you search data based on a range
    of values. They have a somewhat similar structure to regular indexes on disk-based
    tables. They are not exactly the same, however, and I will discuss their internal
    implementation in depth later in this chapter.


    ### Terminology Issue


    Nonclustered indexes were introduced in `SQL Server 2014 CTP 2`, and the documentation
    and whitepapers for that version used the term `range indexes` to reference them.
    However, in the production release of `SQL Server 2014`, Microsoft changed the
    terminology to `nonclustered indexes`. Nevertheless, you can still find the term
    `range indexes` in documentation and in data management views.


    That terminology can be confusing because hash indexes are also not clustered.
    In fact, the concepts of clustered indexes cannot be applied to `In-Memory OLTP`.
    Data rows are not stored in any particular order in memory.


    It is also worth mentioning that the minimal `index_id` value of `In-Memory OLTP`
    indexes is `2`, which corresponds to nonclustered indexes in disk-based tables.


    ### Creating Nonclustered Indexes


    Nonclustered indexes are created inline as part of the `CREATE TABLE` statement.
    The syntax is similar to hash index creation; however, you should omit the keyword
    `HASH`, and you do not need to specify the number of buckets in the index properties.


    The code in Listing [5-1](#A340879_2_En_5_Chapter.html#Par9) creates a memory-optimized
    table with two nonclustered indexes, one composite and another on the single column.


    ```sql

    create table dbo.Customers

    (

    CustomerId int identity(1,1) not null

    constraint PK_Customers

    primary key nonclustered

    hash with (bucket_count=1024),

    FirstName varchar(32) not null,

    LastName varchar(64) not null,

    FullName varchar(97) not null,

    index IDX_LastName_FirstName

    nonclustered(LastName, FirstName),

    index IDX_FullName

    nonclustered(FullName)

    )

    with (memory_optimized=on, durability=schema_only);

    ```

    Listing 5-1. Creating a Table with Two Nonclustered Indexes


    ### Using Nonclustered Indexes


    Similar to `B-Tree` indexes in disk-based tables, the data in nonclustered indexes
    is sorted according to the value of index key columns. As a result, nonclustered
    indexes are beneficial in a large number of use cases. They can lead to an `Index
    Seek` operation in scenarios when query predicates allow `SQL Server` to locate
    and isolate a subset of the index keys for processing. With very few exceptions,
    the `SARGability` rules for nonclustered indexes match the rules for indexes defined
    on disk-based tables.


    Listing [5-2](#A340879_2_En_5_Chapter.html#Par12) shows several queries against
    the `dbo.Customers` table. `SQL Server` is able to use `Index Seek` operations
    with all of them.


    ```sql

    -- Point-Lookup specifying all columns in the index

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where LastName = ''White'' and FirstName = ''Paul'';

    -- Point-lookup using leftmost index column

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where LastName = ''White'';

    -- Using ">", ">=", "<", "<="

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where LastName > ''W'';

    -- Prefix Search

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where LastName like ''Wh%'';

    -- IN list

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where LastName in (''White'',''Isakov'');

    ```

    Listing 5-2. Queries That Lead to Index Seek Operations


    Similar to `B-Tree` indexes, an `Index Seek` operation is impossible when query
    predicates do not allow you to isolate a subset of the index keys for processing.
    Listing [5-3](#A340879_2_En_5_Chapter.html#Par14) shows several examples of such
    queries.


    ```sql

    -- Omitting left-most index column(s)

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where FirstName = ''Paul'';

    -- Substring Search

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where LastName like ''%hit%'';

    -- Functions

    select CustomerId, FirstName, LastName

    from dbo.Customers

    where len(LastName) = 5;

    ```

    Listing 5-3. Queries That Lead to Index Scan Operations


    As the opposite of `B-Tree` indexes on disk-based tables, nonclustered indexes
    are unidirectional, and `SQL Server` is unable to scan index keys in the opposite
    order of how they were sorted. You should keep this behavior in mind when you
    define an index and choose the sorting order for the columns.


    Let’s illustrate that with an example; we’ll create a disk-based table with the
    same structure as `dbo.Customers` and populate both tables with the same data.
    Listing [5-4](#A340879_2_En_5_Chapter.html#Par17) shows the code to do this.


    ```sql

    create table dbo.Customers_OnDisk

    (

    CustomerId int identity(1,1) not null,

    FirstName varchar(32) not null,

    LastName varchar(64) not null,

    FullName varchar(97) not null,

    constraint PK_Customers_OnDisk

    primary key clustered(CustomerId)

    );

    create nonclustered index IDX_Customers_OnDisk_LastName_FirstName

    on dbo.Customers_OnDisk(LastName, FirstName);

    create nonclustered index IDX_Customers_OnDisk_FullName

    on dbo.Customers_OnDisk(FullName);

    go

    ;with FirstNames(FirstName)

    as

    (

    select Names.Name

    from

    (

    values(''Andrew''),(''Andy''),(''Anton''),(''Ashley'')

    ,(''Boris''),(''Brian''),(''Cristopher''),(''Cathy'')

    ,(''Daniel''),(''Don''),(''Edward''),(''Eddy''),(''Emy'')

    ,(''Frank''),(''George''),(''Harry''),(''Henry''),(''Ida'')

    ,(''John''),(''Jimmy''),(''Jenny''),(''Jack''),(''Kathy'')

    ,(''Kim''),(''Larry''),(''Mary''),(''Max''),(''Nancy''),

    (''Olivia''),(''Paul''),(''Peter''),(''Patrick''),(''Robert''),

    (''Ron''),(''Steve''),(''Shawn''),(''Tom''),(''Timothy''),

    (''Uri''),(''Victor'')

    ) Names(Name)

    )

    ,LastNames(LastName)

    as

    (

    select Names.Name

    from

    (

    values(''Smith''),(''Johnson''),(''Williams''),(''Jones'')

    ,(''Brown''),(''Davis''),(''Miller''),(''Wilson'')

    ,(''Moore''),(''Taylor''),(''Anderson''),(''Jackson'')

    ,(''White''),(''Isakov'')

    ) Names(Name)

    )

    insert into dbo.Customers(LastName, FirstName, FullName)

    select LastName, FirstName, FirstName + '' '' + LastName

    from FirstNames cross join LastNames;

    insert into dbo.Customers_OnDisk(LastName, FirstName, FullName)

    select LastName, FirstName, FullName

    from dbo.Customers;

    ```

    Listing 5-4. Nonclustered Indexes and Sorting Order: Disk-Based Table Creation'
