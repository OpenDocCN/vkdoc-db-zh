    \nYou can use another undocumented function, `sys.fn_dblog_xtp`, to examine the\
    \ logical content of an In-Memory OLTP log record. Listing [10-4](#A340879_2_En_10_Chapter.html#Par71)\
    \ shows the code that utilizes this function. You should use the LSN of the `LSN_HK`\
    \ log record from the Listing [10-2](#A340879_2_En_10_Chapter.html#Par65) output\
    \ as the parameter of the function.\n\n```\nselect [Current LSN], xtp_object_id,\
    \ operation_desc\n,tx_end_timestamp, total_size\nfrom sys.fn_dblog_xtp(null, null)\n\
    -- \nwhere [Current LSN] = '00000022:00000240:0035';\nListing 10-4.\nAnalyzing\
    \ an In-Memory OLTP Log Record\n```\n\nFigure [10-9](#A340879_2_En_10_Chapter.html#Fig9)\
    \ shows the output of that code.\n\n![A340879_2_En_10_Fig9_HTML.jpg](A340879_2_En_10_Fig9_HTML.jpg)\n\
    \nFigure 10-9.\n\nIn-Memory OLTP transaction log record details\n\nFinally, it\
    \ is worth stating again that any data modification on nondurable tables (`DURABILITY=SCHEMA_ONLY`)\
    \ is not logged in the transaction log or is its data persisted on disk."
  trans: "\n## 事务日志记录\n\n正如你已经知道的，与存储引擎相比，内存 OLTP 中的事务日志记录效率更高。两个引擎共享同一个事务日志并执行预写日志(WAL)；然而，日志记录的格式和算法却大不相同。\n\
    \n对于基于磁盘的表，SQL Server 按索引逐个生成事务日志记录。例如，当向一个包含聚集索引和非聚集索引的表中插入单行时，它会在每个单独的索引中分别记录插入操作。此外，它还会记录内部操作，例如区和页分配、页拆分以及其他一些操作。\n\
    \n所有日志记录都保存在事务日志中，并且几乎在创建时就同步固化到磁盘上。尽管每个数据库都有一个名为日志缓冲区的缓存来批量写入日志，但该缓存非常小，大约 60KB。此外，某些操作，如`COMMIT`和`CHECKPOINT`，无论缓存是否已满，都会刷新该缓存。\n\
    \n最后，SQL Server 必须在日志记录中包含行的更新前(UNDO)和更新后(REDO)版本。检查点过程是异步的，它不会检查修改了数据页的事务的状态。检查点完全有可能保存来自未提交事务的脏数据页，而日志记录的\
    \ UNDO 部分则用于回滚这些更改。\n\n### 内存 OLTP 日志记录\n\n内存 OLTP 中的事务日志记录解决了这些效率低下的问题。第一个主要区别是，内存\
    \ OLTP 在事务`COMMIT`时生成并保存日志记录，而不是在每次数据行修改时。因此，被回滚的事务不会产生任何日志活动。\n\n日志记录的格式也不同。日志记录不包含任何`UNDO`信息。未提交事务的脏数据永远不会持久化到磁盘上；因此，内存\
    \ OLTP 日志数据不需要支持崩溃恢复的 UNDO 阶段，也不需要记录未提交的更改。\n\n内存 OLTP 根据事务的写入集生成日志记录。所有数据修改根据写入集和插入行的大小，合并到一个或极少数几个日志记录中。\n\
    \n### 演示日志行为\n\n让我们来检验这种行为，并运行清单 10-2 中显示的代码。它启动一个事务并向内存优化表中插入 500 行数据。然后，它使用未公开的系统函数`sys.fn_dblog`检查事务日志的内容。\n\
    \n```\ncreate table dbo.HKData\n(\nID int not null,\nCol int not null,\nconstraint\
    \ PK_HKData\nprimary key nonclustered hash(ID)\nwith (bucket_count=2048),\n)\n\
    with (memory_optimized=on, durability=schema_and_data);\ndeclare\n@I int = 1\n\
    begin tran\nwhile @I <= 500\nbegin\ninsert into dbo.HKData with (snapshot)\n(ID,\
    \ Col)\nvalues(@I, @I);\nset @I += 1\nend\ncommit\ngo\nselect *\nfrom sys.fn_dblog(NULL,\
    \ NULL)\norder by [Current LSN];\nListing 10-2.\n内存 OLTP 中的事务日志记录：内存优化表日志记录\n\
    ```\n\n图 10-7 展示了事务日志的内容。你可以看到内存 OLTP 事务的单条事务记录。\n\n![A340879_2_En_10_Fig7_HTML.jpg](img/A340879_2_En_10_Fig7_HTML.jpg)\n\
    图 10-7.\n内存 OLTP 事务后的事务日志内容\n\n### 与基于磁盘的表比较\n\n让我们使用具有类似结构的基于磁盘的表重复此测试。清单 10-3\
    \ 显示了创建表并用数据填充它的代码。\n\n```\ncreate table dbo.DiskData\n(\nID int not null,\nCol\
    \ int not null,\nconstraint PK_DiskData\nprimary key nonclustered(ID)\n);\ndeclare\n\
    @I int = 1\nbegin tran\nwhile @I <= 500\nbegin\ninsert into dbo.DiskData(ID, Col)\n\
    values(@I, @I);\nset @I += 1;\nend\ncommit\nListing 10-3.\n内存 OLTP 中的事务日志记录：基于磁盘的表日志记录\n\
    ```\n\n如图 10-8 所示，同一个事务生成了超过 1700 条日志记录。\n\n![A340879_2_En_10_Fig8_HTML.jpg](img/A340879_2_En_10_Fig8_HTML.jpg)\n\
    图 10-8.\n基于磁盘的表修改后的事务日志内容\n\n### 分析内存 OLTP 日志记录\n\n你可以使用另一个未公开的函数`sys.fn_dblog_xtp`来检查内存\
    \ OLTP 日志记录的逻辑内容。清单 10-4 显示了使用此函数的代码。你应该使用清单 10-2 输出中的`LSN_HK`日志记录的 LSN 作为该函数的参数。\n\
    \n```\nselect [Current LSN], xtp_object_id, operation_desc\n,tx_end_timestamp,\
    \ total_size\nfrom sys.fn_dblog_xtp(null, null)\n-- \nwhere [Current LSN] = '00000022:00000240:0035';\n\
    Listing 10-4.\n分析一条内存 OLTP 日志记录\n```\n\n图 10-9 显示了该代码的输出。\n\n![A340879_2_En_10_Fig9_HTML.jpg](img/A340879_2_En_10_Fig9_HTML.jpg)\n\
    图 10-9.\n内存 OLTP 事务日志记录详情\n\n最后，值得再次说明的是，对非持久化表(`DURABILITY=SCHEMA_ONLY`)的任何数据修改都不会记录在事务日志中，其数据也不会持久化到磁盘上。\n"
- fmt: '## Table Alteration


    As you already know, SQL Server 2016 supports table alteration using the `ALTER
    TABLE` statement. This is an offline operation that blocks access to the table
    during execution. SQL Server generates and compiles the new version of the table
    DLL and loads it into the process memory.


    The `ALTER TABLE` statement runs in two different modes depending on what changes
    are required.


    *   Metadata-only alteration: With metadata-only alteration, In-Memory OLTP does
    not modify the structure of the data rows. This may occur when you add or remove
    `DEFAULT`, `CHECK`, and `FOREIGN KEY` constraints and/or enable or disable the
    system versioning (temporal tables) for memory-optimized tables.

    *   Regular alteration: That type of alteration requires In-Memory OLTP to change
    the format of the data rows or internal table objects. It occurs when you add
    or remove columns and indexes, change column data types, and modify the `bucket_count`
    value of the hash indexes, as well as in other cases that require transformation
    of the data.


    During metadata-only alteration, SQL Server updates the table metadata and creates,
    drops, or flushes system-versioning-related objects to disk if needed. The data
    rows are not re-created, but adding `CHECK` or `FOREIGN KEY` constraints may require
    In-Memory OLTP to scan all the data from the table to validate the constraint.


    Regular alteration, on the other hand, will require In-Memory OLTP to re-create
    the table. This occurs when you need to change the data row format and/or indexing
    in the table. In this case, SQL Server creates another table object with a different
    `xtp_object_id` value and copies the data from the old to the new objects, transforming
    it during the process. Obviously, the system needs to have enough memory to accommodate
    both copies of the data.


    ### Creating Tables and Obtaining xtp_object_id Values


    Let’s look at the example and create two tables, obtaining `xtp_object_id` values
    for them. Listing 10-5 shows the code that performs this.


    ```

    create table dbo.TableA

    (

    Col1 int not null

    constraint PK_TableA

    primary key nonclustered hash

    with (bucket_count=1024),

    )

    with (memory_optimized=on, durability=schema_and_data);

    create table dbo.TableB

    (

    Col1 int not null

    constraint PK_TableB

    primary key nonclustered hash

    with (bucket_count=1024),

    )

    with (memory_optimized=on, durability=schema_and_data);

    select

    ''dbo.TableA'' as [Table]

    ,c.index_id, a.xtp_object_id, a.type_desc, a.minor_id

    ,c.memory_consumer_id, c.memory_consumer_type_desc as [mc type]

    from

    sys.dm_db_xtp_memory_consumers c join

    sys.memory_optimized_tables_internal_attributes a on

    a.object_id = c.object_id and

    a.xtp_object_id = c.xtp_object_id

    where

    c.object_id = object_id(''dbo.TableA'');

    select

    ''dbo.TableB'' as [Table]

    ,c.index_id, a.xtp_object_id, a.type_desc, a.minor_id

    ,c.memory_consumer_id, c.memory_consumer_type_desc as [mc type]

    from

    sys.dm_db_xtp_memory_consumers c join

    sys.memory_optimized_tables_internal_attributes a on

    a.object_id = c.object_id and

    a.xtp_object_id = c.xtp_object_id

    where

    c.object_id = object_id(''dbo.TableB'');

    ```


    Listing 10-5. Creating Two Tables and Obtaining xtp_object_id Values


    Figure 10-10 illustrates the output of the code.


    ![A340879_2_En_10_Fig10_HTML.jpg](A340879_2_En_10_Fig10_HTML.jpg)


    Figure 10-10. Xtp_object_id values after table creation


    ### Altering the Tables


    As the next step, let’s alter two tables, as shown in Listing 10-6. The code adds
    a `CHECK` constraint to `dbo.TableA` and also adds a new column to `dbo.TableB`.
    Finally, it queries the `xtp_object_id` value of the tables again.


    ```

    alter table dbo.TableA

    add constraint CHK_Col1

    check (Col1 > 0);

    alter table dbo.TableB

    add Col2 int null;

    select

    ''dbo.TableA'' as [Table]

    ,c.index_id, a.xtp_object_id, a.type_desc, a.minor_id

    ,c.memory_consumer_id, c.memory_consumer_type_desc as [mc type]

    from

    sys.dm_db_xtp_memory_consumers c join

    sys.memory_optimized_tables_internal_attributes a on

    a.object_id = c.object_id and

    a.xtp_object_id = c.xtp_object_id

    where

    c.object_id = object_id(''dbo.TableA'');

    select

    ''dbo.TableB'' as [Table]

    ,c.index_id, a.xtp_object_id, a.type_desc, a.minor_id

    ,c.memory_consumer_id, c.memory_consumer_type_desc as [mc type]

    from

    sys.dm_db_xtp_memory_consumers c join

    sys.memory_optimized_tables_internal_attributes a on

    a.object_id = c.object_id and

    a.xtp_object_id = c.xtp_object_id

    where

    c.object_id = object_id(''dbo.TableB'');

    ```


    Listing 10-6. Altering the Tables


    As you can see in Figure 10-11, adding a `CHECK` constraint is a metadata-only
    alteration, which did not change the `xtp_object_id` value of the table. Adding
    a new column, on the other hand, required SQL Server to create another table object
    internally.


    ![A340879_2_En_10_Fig11_HTML.jpg](A340879_2_En_10_Fig11_HTML.jpg)


    Figure 10-11. Xtp_object_id values after alteration


    ### Log Optimization


    Obviously, SQL Server has to log and persist table alteration events. Moreover,
    in the case of regular alteration, checkpoint data files may store the data rows
    in an old, pre-altered format, which is incompatible with the new table schema
    and DLL. In-Memory OLTP addresses this by applying the technique called log optimization,
    persisting the history of schema changes in an internal transformation table.
    SQL Server uses that table to transform the data rows into the new format during
    database startup while loading data into the memory.


    Let’s illustrate it with the example. Listing 10-7 shows the code that creates
    the table and performs two table alterations adding some data rows to the table
    in between them.


    ```

    -- Global Transaction Timestamp = 1

    -- xtp_object_id = -2147483615

    create table dbo.T1

    (

    Id int not null

    constraint PK_T1

    primary key nonclustered hash

    with (bucket_count=1024),

    Col1 int not null;

    )

    with (memory_optimized=on, durability=schema_and_data);

    -- Global Transaction Timestamp = 100

    insert into dbo.T1(ID,Col1) values(1,1);

    -- Global Transaction Timestamp = 200

    -- xtp_object_id = -2147483612

    alter table dbo.T1 add Col2 varchar(100);

    -- Global Transaction Timestamp = 300

    insert into dbo.T1(ID,Col1,Col2) values(2,2,''2'');

    -- Global Transaction Timestamp = 400

    -- xtp_object_id = -2147483609

    alter table dbo.T1 alter column Col1 money;

    -- Global Transaction Timestamp = 500

    insert into dbo.T1(ID,Col1,Col2) values(3,3.33,''3'');

    ```


    Listing 10-7. Log Optimization


    Table 10-3 illustrates the logical structure of the transformation table.


    Table 10-3. Logical Structure of the Transformation Table


    | BeginTs | xtp_object_id | Action |

    | --- | --- | --- |

    | `200` | `-2147483612` | `ADD Coll2 int` |

    | `400` | `-2147483609` | `MODIFY Col1 money` |


    During database startup, In-Memory OLTP reads the rows from checkpoint files and
    transforms them to the latest schema based on the data from the transformation
    table. Figure 10-12 illustrates this process.


    ![A340879_2_En_10_Fig12_HTML.jpg](A340879_2_En_10_Fig12_HTML.jpg)


    Figure 10-12. Data row transformation during database startup'
