  trans: '

    ## 总结


    持久化内存优化表的数据，在底层被置于一个使用 `FILESTREAM` 技术的独立文件组中。数据存储在一系列不同类型的检查点文件中。数据文件存储行版本数据。增量文件存储有关已删除行的信息。大型对象列和列存索引的数据存储在大型数据文件中。最后，根文件在系统中存储关于检查点文件的信息。


    检查点文件中的数据永不更新。`DELETE` 操作会在增量文件中生成新条目。`UPDATE` 操作将行的新版本存储在数据文件中，并在增量文件中将旧版本标记为已删除。SQL
    Server 利用顺序流式 API 将数据写入这些文件，不涉及任何随机 I/O。


    每个检查点文件对都覆盖一个特定的全局事务时间戳值区间，并经历一系列预定义的状态。SQL Server 将新的行数据存储在处于 `UNDER CONSTRUCTION`
    状态的 CFP 中。这些 CFP 在检查点事件时转换为 `ACTIVE` 状态。`ACTIVE` CFP 的数据文件被关闭，不再接受新的行版本；但是，它们仍然会在增量文件中记录删除信息。


    SQL Server 合并来自 `ACTIVE` 检查点文件对的数据，并过滤掉已删除的行。合并完成后，且源 CFP 已备份，SQL Server 会释放它们或将其切换回
    `FREE` 状态。


    在数据库恢复期间，`ACTIVE` 检查点文件对连同日志尾部一起使用。内存 OLTP 的恢复过程具有高度可扩展性且非常快速。内存优化表上的索引不会持久化到磁盘，而是在数据加载到内存时重新创建。


    与基于磁盘的表相比，内存 OLTP 中的事务日志记录效率更高。事务在 `COMMIT` 时根据事务写入集进行日志记录。日志记录紧凑，并包含多个与行相关操作的信息。


    在 SQL Server 2016 中有两种类型的表更改。当您添加或删除表约束和/或更改系统版本控制表属性时，会发生仅元数据更改。SQL Server 不会重新创建表对象；但是，它可能会扫描表中的数据以验证约束。


    相比之下，常规更改会在后台重新创建表对象，并为其分配不同的 `xtp_object_id` 值。在确定性转换的情况下，SQL Server 执行日志优化，仅持久化模式更改信息，并在数据库启动时从检查点文件转换行。在非确定性转换的情况下，SQL
    Server 使用朴素日志记录，并为表中的每一行记录 `INSERT` 事件。


    表更改是一个离线操作，在执行期间会阻止对表的访问。您可以通过将多个类似的操作合并到一个 `ALTER TABLE` 语句中来减少更改的影响。


    # 11. 垃圾回收


    本章涵盖内存 OLTP 引擎中使用的垃圾回收过程。它概述了参与垃圾回收的各种组件，并演示了它们如何相互交互。


    ## 垃圾回收过程概述


    内存 OLTP 是一个行版本控制系统。`UPDATE` 操作生成行的新版本，而不是更新行数据。`DELETE` 操作不会移除行，而是更新行的 `EndTs`
    时间戳。由中止事务创建的行不会立即释放，即使在回滚后，它们仍作为索引行链的一部分保留。


    如您所知，每一行都有两个时间戳（`BeginTs` 和 `EndTs`），通过指定行的创建时间和删除时间来指示行的生命周期。事务只能看到在其启动时有效的行版本。实际上，这意味着一行仅当事务的逻辑开始时间（事务开始时的全局事务时间戳值）介于该行的
    `BeginTs` 和 `EndTs` 时间戳之间时，才对该事务可见。


    在某个时刻，当一行的 `EndTs` 时间戳早于系统中最老活动事务的全局事务时间戳时，该行过期。过期的行对活动事务不可见，最终需要被释放以回收系统内存并加速索引链导航。此过程称为垃圾回收。


    内存 OLTP 中的垃圾回收过程设计目标如下：


    *   **无阻塞**：垃圾回收过程不应阻塞用户线程，并对系统产生最小的性能影响。

    *   **响应迅速**：垃圾回收过程应对内存压力做出反应。

    *   **协作且可扩展**：垃圾回收过程不应依赖单个系统线程执行内存释放，并且应在过程中利用常规工作线程。


    垃圾回收的协作性质使其与典型的 SQL Server 后台进程大不相同。尽管有一个专门的系统垃圾回收线程（每个 NUMA 节点一个），称为空闲工作线程，但大部分工作是由常规的用户工作线程完成的。这使得该过程能够扩展并跟上系统中的工作负载。


    用户线程以两种不同的方式参与垃圾回收过程：它们从行链中解除链接旧的、过期的行，并执行实际的释放操作。正如您将看到的，这些操作是相互独立的。


    让我们详细看看这个过程。图 11-1 展示了一个表的逻辑结构，该表在 `Name` 和 `City` 列上有两个哈希索引。您在前几章中见过此图；然而，在本章中，我添加了另一个称为
    `idxLinkCount` 的元素，它指示行参与了多少个索引链。在图中以带下划线显示；请注意，所有行的值均为 2，这对应于表中的索引数量。


    ![A340879_2_En_11_Fig1_HTML.jpg](img/A340879_2_En_11_Fig1_HTML.jpg)


    图 11-1. 数据的初始状态


    假设您有一个会话，在最老活动事务时间戳为 110、全局事务时间戳为 125 时，运行了如清单 11-1 所示的两个查询。


    ```

    select * from dbo.People where Name = ''Adam'';

    select * from dbo.People where Name = ''Carl'';

    ```


    清单 11-1. 第一个批处理


    第一个 `SELECT` 扫描了 `Name` 索引行链中值为 `A` 的存储桶，并检测到 `Ann` 行，其 `EndTs` 值为 100。最老活动事务时间戳是
    110，因此该行已过期，对系统中的活动事务不可见。因此，用户线程将该行从 `Name` 索引行链中解除链接，并减少了 `idxLinkCnt` 值。


    我想重申一下，此操作是由常规用户工作线程而非系统线程完成的。这说明了垃圾回收的协作性质。

