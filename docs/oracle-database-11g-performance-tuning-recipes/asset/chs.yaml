  ## 第五章\n\n\n## 最小化系统竞争\n\nOracle DBA 接到用户被数据库锁定或“阻塞”的电话并不罕见。Oracle 的锁定机制极其精密，支持多用户同时使用数据库。但有时由于应用程序设计缺陷，可能会出现一个用户阻塞其他用户工作的情况。本章将解释\
  \ Oracle 如何处理锁，以及如何识别阻塞其他会话的会话。\n\nOracle 数据库可能遇到两种主要类型的资源竞争。第一种是对表行事务锁的竞争。第二种竞争是由同时请求共享内存区域（`SGA`）引起的，这会导致**门竞争**。除了向你展示如何排查典型锁定问题外，我们还将演示如何处理数据库中各种类型的门竞争。\n\
  \nOracle 等待接口是一个方便的名称，用于指代 Oracle 内部用于分类和衡量 Oracle 实例中等待不同类型资源的机制。理解 Oracle 等待事件是实例调优的关键，因为高等待会拖慢响应时间。我们将在本章解释\
  \ Oracle 等待接口，并展示如何减少那些困扰 Oracle DBA 的最常见等待事件。我们将向你展示如何使用各种 SQL 脚本来解开 Oracle 等待接口的奥秘，同时也会说明如何利用\
  \ Oracle Enterprise Manager 快速追踪导致数据库竞争的 SQL 语句和会话。\n\n### 5-1. 理解响应时间\n\n#### 问题\n\
  \n你想了解数据库响应时间是什么，以及它与等待时间的关系。\n\n#### 解决方案\n\n数据库中最关键的性能指标是响应时间。响应时间是指客户端向数据库发送查询后，从数据库获得响应所需的时间。响应时间简单来说是两个组成部分之和：\n\
  \n`响应时间 = 处理时间 + 等待时间`\n\n上述关系也常表示为 `R = S + W`，其中 `R` 是响应时间，`S` 是服务时间，`W` 代表等待时间。处理时间部分是数据库实际处理请求所花费的时间。而等待时间则是数据库实际浪费的时间——是数据库等待资源（如表行锁、库缓存门，或查询完成处理所需的众多资源之一）所花费的时间。Oracle\
  \ 有数百个官方等待事件，其中大约十几个对排查查询运行缓慢至关重要。\n\n##### 你是否存在等待问题？\n\n很容易找出数据库在等待资源而非实际执行上花费的时间比例。执行以下查询，找出数据库中等待时间与实际\
  \ CPU 处理时间的相对百分比：\n\n```sql\nSQL> select metric_name, value\n   2 from v$sysmetric\n\
  \   3 where metric_name in ('Database CPU Time Ratio',\n   4 'Database Wait Time\
  \ Ratio') and\n   5 intsize_csec =\n   6 (select max(INTSIZE_CSEC) from V$SYSMETRIC);\n\
  \nMETRIC_NAME                                     VALUE\n————————————————————------------\
  \              ————————————\nDatabase Wait Time Ratio                        11.371689\n\
  Database CPU Time Ratio                         87.831890\nSQL>\n```\n\n如果查询显示 `Database\
  \ Wait Time Ratio` 的值非常高，或者 `Database Wait Time Ratio` 远大于 `Database CPU Time Ratio`，则表明数据库花费在等待上的时间多于处理时间，你必须更深入地研究\
  \ Oracle 等待事件，以确定导致此情况的具体等待事件。\n\n##### 查找详细信息\n\n你可以使用以下 Oracle 视图来查找等待事件实际在等待什么以及每种资源等待了多长时间的详细信息。\n\
  \n> `V$SESSION`：此视图显示每个会话当前正在等待的事件以及上一次等待的事件。\n>\n> `V$SESSION_WAIT`：此视图列出每个会话当前正在等待的事件或上一次等待的事件。它还显示等待状态和等待时间。\n\
  >\n> `V$SESSION_WAIT_HISTORY`：此视图显示每个当前会话的最后十个等待事件。\n>\n> `V$SESSION_EVENT`：此视图显示每个会话累计的事件等待历史记录。此视图中的数据仅在会话处于活动状态时可用。\n\
  >\n> `V$SYSTEM_EVENT`：此视图显示自实例启动以来，整个实例为每个等待事件所等待的时间。\n>\n> `V$SYSTEM_WAIT_CLASS`：此视图按等待类别显示等待事件统计信息。\n\
  \n\n\n#### 工作原理\n\n在性能调优时，你的目标是**最小化总响应时间**。如果“`Database Wait Time Ratio`”（见“解决方案”部分的查询）较高，由于系统中的等待或瓶颈，你的响应时间也会相应较高。另一方面，“`Database\
  \ CPU Time Ratio`”值较高则表明数据库运行良好，几乎没有等待或瓶颈。“`Database CPU Time Ratio`”是通过将数据库使用的总\
  \ CPU 时间除以 Oracle 时间模型统计信息“`DB time`”来计算的。\n\nOracle 使用时间模型统计信息来按操作类型衡量在数据库中花费的时间。数据库时间，即“`DB\
  \ time`”，是最重要的时间模型统计信息——它代表了在数据库调用中花费的总时间，是衡量实例总工作负载的指标。“`DB time`”是通过将所有会话（不包括空闲事件的等待）的\
  \ CPU 时间和等待时间相加来计算的。AWR 报告会显示实例在 AWR 快照覆盖期间的总“`DB time`”（在标题为“Time Model System\
  \ Stats”的部分）。如果时间模型统计信息“`DB CPU`”占据了实例大部分的“`DB time`”，则表明数据库在大部分时间都在积极地进行处理。理解“`DB\
  \ time`”，或者说理解数据库是如何花费其时间的，是理解性能的基础。\n\n前台会话进行数据库调用所花费的总时间由 I/O 时间、CPU 时间和等待非空闲事件的时间组成。你的“`DB\
  \ time`”会随着系统负载的增加而增加——也就是说，随着更多用户登录和执行更大的查询，系统负载会更大。然而，即使系统负载没有增加，“`DB time`”也可能由于\
  \ I/O 或应用程序性能的下降而增加。随着应用程序性能下降，等待时间会增加，因此“`DB time`”（即响应时间）也会增加。\n\n“`DB time`”由内部检测工具、`ASH`、`AWR`\
  \ 和 `ADDM` 捕获，你可以通过查询各种视图或通过 Enterprise Manager 找到详细的性能信息。\n\n![images](img/square.jpg)\
  \ 注意：如果主机系统 CPU 资源紧张，你将会看到“`DB time`”增加。在那种特定情况下，你必须首先调优 CPU 使用率，然后再关注等待事件。\n\n\
  `V$SESSION_WAIT` 视图比 `V$SESSION_EVENT` 和 `V$SYSTEM_EVENT` 视图显示了更详细的信息。虽然 `V$SESSION_EVENT`\
  \ 和 `V$SESSION_WAIT` 视图都显示了诸如“`db file scattered read`”事件之类的等待，但只有 `V$SESSION_WAIT`\
  \ 视图显示了文件号 (`P1`)、读取的块号 (`P2`) 和读取的块数 (`P3`)。此视图中的 `P1` 和 `P2` 列可帮助你识别当前发生的等待事件所涉及的段。\n\
  \n![images](img/square.jpg) 注意：自动工作负载仓库 (`AWR`) 会查询 `V$SYSTEM_EVENT` 视图进行其与等待事件相关的分析。\n\
  \n你可以先查询 `V$SYSTEM_EVENT` 视图，按每个事件的总等待时间和平均等待时间对顶级等待事件进行排序。然后，你可以通过关注事件列表顶部的事件，下钻到等待事件级别。请注意，你也可以查询\
  \ `V$WAITSTAT` 视图以获得相同的信息。除了提供有关阻塞和被阻塞用户以及当前等待事件的信息外，`V$SESSION` 视图还通过提供对象的文件号和块号来显示导致问题的对象。\n\
  \n### 5-2. 识别等待最多的 SQL 语句\n\n#### 问题\n\n你希望识别出数据库中导致最多等待的 SQL 语句。\n\n#### 解决方案\n\
  \n执行以下查询，以识别数据库中经历最多等待的 SQL 语句：\n\n```sql\nSQL> select ash.user_id,\n  2  u.username,\n\
  \  3  s.sql_text,\n  4  sum(ash.wait_time +\n  5  ash.time_waited) ttl_wait_time\n\
  \  6  from v$active_session_history ash,\n  7  v$sqlarea s,\n  8  dba_users u\n\
  \  9  where ash.sample_time between sysdate - 60/2880 and sysdate\n 10  and ash.sql_id\
  \ = s.sql_id\n 11  and ash.user_id = u.user_id\n 12  group by ash.user_id,s.sql_text,\
  \ u.username\n 13* order by ttl_wait_time\nSQL>\n```\n\n前面的查询根据每个查询的总等待时间，对过去 30\
  \ 分钟内运行的查询进行排序。\n\n#### 工作原理\n\n当你遇到性能问题时，查看哪些 SQL 语句等待最多是个好主意。这些就是使用了大部分数据库资源的语句。要找出等待最多的查询，你必须为特定的\
  \ SQL 语句，对 `V$ACTIVE_SESSION_HISTORY` 中“`wait_time`”和“`time_waited`”列的值求和。为此，你必须使用\
  \ `SQL_ID` 作为连接列，将 `V$SQLAREA` 视图与 `V$ACTIVE_SESSION_HISTORY` 视图连接起来。\n\n除了 SQL\
  \ 语句的 `SQL_ID`，`V$ACTIVE_SESSION_HISTORY` 视图还包含有关 SQL 语句使用的执行计划的信息。你可以使用此信息来识别为什么某个\
  \ SQL 语句会经历大量等待。你还可以运行活动会话历史 (`ASH`) 报告（使用 SQL 脚本或通过 Oracle Enterprise Manager）以获取有关采样会话活动中顶级\
  \ SQL 语句的详细信息。`ASH` 报告的“Top SQL”部分可帮助你识别导致性能问题的高负载 SQL 语句。检查“Top SQL”报告可能会显示，例如，一个糟糕的查询导致了大部分的数据库活动。\n\
  \n### 5-3. 分析等待事件\n\n#### 问题\n\n你想要分析 Oracle 等待事件。\n\n#### 解决方案\n\n本章中的几个方法将向你展示如何分析最重要的\
  \ Oracle 等待事件。数据库中绝大多数等待时间是由于与 I/O 相关的等待引起的，例如由全表扫描或索引读取引起的等待。虽然索引读取表面上看起来可能完全正常，但过多的索引读取也会降低性能。因此，你必须调查为什么数据库会执行大量的索引读取。例如，如果你在等待事件列表顶部看到“`db\
  \ file sequential read`”事件（表示索引读取），你必须进一步查看数据库是如何累积这些读取事件的。如果你发现数据库正在执行数十万次查询执行，而每次查询只进行少量索引读取，那是没问题的。但是，如果你发现仅仅几个查询就导致了大量的逻辑读，那么很可能，这些查询读取了比必要更多的数据。你必须调优这些查询以减少“`db\
  \ file sequential read`”事件。\n\n\n#### 工作原理\n\n等待事件是服务器进程或线程在等待某个事件完成以便继续处理时递增的统计信息。例如，一条\
  \ SQL 语句可能正在修改数据，但服务器进程可能必须等待从磁盘读取一个数据块，因为它不在 SGA 中可用。尽管等待事件数量庞大，但最常见的事件包括以下这些：\n\
  *   `buffer busy waits`（缓冲区忙等待）\n*   `free buffer waits`（空闲缓冲区等待）\n*   `db file\
  \ scattered read`（数据文件分散读取）\n*   `db file sequential read`（数据文件顺序读取）\n*   `enqueue\
  \ waits`（队列锁等待）\n*   `log buffer space`（日志缓冲区空间）\n*   `log file sync`（日志文件同步）\n\n\
  分析 Oracle 等待事件是在排查运行缓慢的查询时需要执行的最重要的性能调优任务。当一个查询运行缓慢时，通常意味着存在过多某种类型的等待。有些等待可能是由于缺少索引导致\
  \ I/O 过多所致。其他等待则可能由闩锁或锁事件引起。本章中的多个方法将向您展示如何识别和修复各种与 Oracle 等待相关的性能问题。\n\n通常，占据最多等待时间的等待事件值得进一步调查。然而，重要的是要理解，等待事件只显示了潜在问题的**症状**——因此，您应将等待事件视为观察特定问题的窗口，而不是问题本身。当\
  \ Oracle 遇到诸如缓冲区争用或闩锁争用之类的问题时，它只会递增与该闩锁或缓冲区相关的特定类型的等待事件。通过这样做，数据库显示了它在哪里不得不等待特定资源，因而无法继续处理。\n\
  \n缓冲区或闩锁争用通常可追溯到有缺陷的应用程序逻辑，但有些等待事件也可能源自系统问题，例如配置错误的 RAID 系统。缺少索引、不合适的初始化参数、与内存相关的初始化参数值不足，以及重做日志文件大小不足，都只是可能导致数据库中等待过多的部分原因。分析\
  \ Oracle 等待事件的最大好处在于，它消除了性能调优中的猜测成分——您可以看到导致性能下降的确切原因，因此您可以立即着手修复问题。\n\n### 5-4.\
  \ 理解等待类别事件\n\n#### 问题\n\n您想了解 Oracle 如何将等待事件分类到不同的类别中。\n\n#### 解决方案\n\n每个 Oracle\
  \ 等待事件都属于一个特定的等待事件类别。Oracle 将等待事件分组为诸如 `Administrative`（管理）、`Application`（应用程序）、`Cluster`（集群）、`Commit`（提交）、`Concurrency`（并发）、`Configuration`（配置）、`Scheduler`（调度程序）、`System\
  \ I/O`（系统 I/O）和 `User I/O`（用户 I/O）等类别，以方便分析等待事件。以下是其中部分类别中典型等待的一些示例：\n\n> `Application`:\
  \ 与锁相关的等待信息\n> \n> `Commit`: 在提交事务后等待确认重做日志写入\n> \n> `Network`: 由于通过网络发送数据延迟导致的等待\n\
  > \n> `User I/O`: 等待从磁盘读取数据块\n\n两个关键的等待类别是 `Application` 和 `User I/O` 等待类别。`Application`\
  \ 等待类别包含由于应用程序引起的行锁和表锁导致的等待。`User I/O` 类别包括 `db file scattered read`、`db file sequential\
  \ read`、`direct path read` 和 `direct path write` 事件。`System I/O` 类别包括重做日志相关的等待事件以及其他等待。`Commit`\
  \ 类别仅包含 `log file sync` 等待信息。还有一个“空闲”类别的等待事件，例如 `SQL*Net message from client`，它们仅仅表示一个不活动的会话。您可以忽略这些空闲等待。\n\
  \n#### 工作原理\n\n等待事件的类别帮助您快速查明是哪种类型的活动影响了数据库性能。例如，`Administrative` 等待类别可能显示大量的等待，因为您正在重建索引。`Concurrency`\
  \ 等待指向对内部数据库资源（如闩锁）的等待。如果 `Cluster` 等别显示了最多的等待事件，那么您的 RAC 实例可能正在经历全局缓存资源的争用（例如 `gc\
  \ cr block busy` 事件）。请注意，`System I/O` 等待类别包括后台进程 I/O 的等待，例如 DBWR（数据库写入器）等待事件 `db\
  \ file parallel write`。\n\n`Application` 等待类别包含由用户应用程序代码导致的等待——您的大部分队列锁（enqueue）等待都属于这个等待类别。`Commit`\
  \ 类别中唯一的等待事件是 `log file sync` 事件，我们将在本章后面详细研究它。`Configuration` 类别的等待包括那些由日志文件大小过小等原因引起的等待。\n\
  \n### 5-5. 检查会话等待\n\n#### 问题\n\n您想要找出一个会话中的等待事件。\n\n#### 解决方案\n\n您可以使用 `V$SESSION_WAIT`\
  \ 视图快速了解特定会话正在等待什么，如下所示：\n\n```\nSQL> select event, count(*) from v$session_wait\n\
  \     group by event;\n\nEVENT                                                 \
  \                  COUNT(*)\n----------------------------------------------------------------\
  \ ----------\nSQL*Net message from client                                      \
  \              11\nStreams AQ: waiting for messages in the queue               \
  \                    1\nenq: TX - row lock contention                          \
  \                         1\n…\n15 rows selected.\n\nSQL>\n```\n\n该查询的输出表明，一个会话正在等待队列锁（enqueue\
  \ lock），可能是因为被另一个会话持有的阻塞锁。如果您看到大量会话正在经历行锁争用，则必须进一步调查并确定阻塞会话。\n\n以下是另一种查询 `V$SESSION_WAIT`\
  \ 视图的方法，用于找出是什么拖慢了特定会话：\n\n```\nSQL> select event, state, seconds_in_wait siw\n\
  \     from   v$session_wait\n     where  sid = 81;\n\nEVENT                    \
  \                     STATE             SIW\n----------------------------------------\
  \     -----------        ------\nenq: TX - row lock contention                 WAITING\
  \             976\n```\n\n前面的查询显示，SID 为 81 的会话一直在等待一个队列锁事件，因为它想要更新的行（或多行）被另一个事务锁定了。\n\
  \n![images](img/square.jpg) **注意** 在 Oracle Database 11g 中，数据库将每个资源等待计为仅仅一次等待，即使该会话因等待而经历了许多内部超时。例如，等待一个队列锁\
  \ 15 秒可能包含 5 次不同的、每次 3 秒长的等待调用——数据库将这些仅视为一次单独的队列锁等待。\n\n\n### 5-6. 按类别检查等待事件\n\n\
  #### 问题\n\n你希望检查 Oracle 的等待事件类别。\n\n#### 解决方案\n\n以下查询显示了不同的等待类别以及与每个类别关联的等待事件。\n\
  \n```sql\nSQL> select  wait_class, name\n  2  from v$event_name\n  3  where name\
  \ LIKE 'enq%'\n  4  and wait_class <> 'Other'\n  5* order by wait_class\nSQL> /\n\
  \nWAIT_CLASS                                  NAME\n--------------------       \
  \        --------------------------\nAdministrative                     enq: TW\
  \ - contention\nConcurrency                        enq: TX - index contention\n\
  …\nSQL>\n```\n\n要查看当前按各种等待类别分组的等待情况，请执行以下查询：\n\n```sql\nSQL> select wait_class,\
  \ sum(time_waited), sum(time_waited)/sum(total_waits)\n  2  sum_waits\n  3  from\
  \ v$system_wait_class\n  4  group by wait_class\n  5* order by 3 desc;\n\nWAIT_CLASS\
  \                         SUM(TIME_WAITED)                SUM_WAITS\n----------------\
  \ ----------               -----------------        -----------------\nIdle    \
  \                                      249659211               347.489249\nCommit\
  \                                         1318006               236.795904\nConcurrency\
  \                                     16126                 4.818046\nUser I/O \
  \                                       135279                 2.228869\nApplication\
  \                                        912                .0928055\nNetwork  \
  \                                          139                .0011209\n…\nSQL>\n\
  ```\n\n如果你看到 `Idle` 等待类别的总和非常高，不必担心——实际上，在任何健康的数据库中，你都应该期望看到这个。然而，在典型的生产环境中，你肯定会看到更多在\
  \ `User I/O` 和 `Application` 等待类别下的等待。例如，如果你注意到数据库为 `Application` 或 `User I/O` 等待类别积累了非常长的等待时间，那么就需要进一步研究这两个类别。在下面的例子中，我们深入研究了几个等待类别，以找出是哪些特定的等待事件导致了\
  \ `Application` 和 `Concurrency` 类别下的总等待时间过高。为此，除了 `V$SYSTEM_WAIT_CLASS` 视图外，我们还使用了\
  \ `V$SYSTEM_EVENT` 和 `$EVENT_NAME` 视图。关注点不仅在于总等待时间，还在于平均等待时间，以评估等待事件的影响。\n\n```sql\n\
  SQL> select a.event, a.total_waits, a.time_waited, a.average_wait\n     from v$system_event\
  \ a, v$event_name b, v$system_wait_class c\n     where a.event_id=b.event_id\n \
  \    and b.wait_class#=c.wait_class#\n     and c.wait_class in ('Application','Concurrency')\n\
  \     order by average_wait desc;\nEVENT                       TOTAL_WAITS   TIME_WAITED\
  \    AVERAGE_WAIT\n----------- ------------    -----------   -------------  -------------\n\
  enq: UL - contention                  1             499          499.19\nlatch:\
  \ shared pool                  251           10944           43.6\nlibrary cache\
  \ load lock              24             789          32.88\nSQL>\n```\n\n> ![images](img/square.jpg)\
  \ **提示** 两个最常见的 Oracle 等待事件是 `db file scattered read` 和 `db file sequential read`\
  \ 事件。`db file scattered read` 等待事件是由于对大表进行全表扫描引起的。如果你遇到这个等待事件， investigate 为表添加索引的可能性。`db\
  \ file sequential read` 等待事件是由于索引读引起的。虽然索引读看起来是好事，但大量的索引读可能表明存在需要优化的低效查询。如果 `db\
  \ file sequential read` 等待事件的高值是由大量小型索引读引起的，这并不是真正的问题——这在数据库中很常见。如果少数查询导致了大部分等待，你就应该关注了。\n\
  \n你可以看到，由行锁争用引起的入队等待是这两个类别下导致最多等待的原因。现在你确切地知道是什么拖慢了数据库中的查询！要找到性能受到行锁争用影响的会话，请使用以下查询深入到会话级别：\n\
  \n```sql\nSQL> select a.sid, a.event, a.total_waits, a.time_waited, a.average_wait\n\
  \     from v$session_event a, v$session b\n     where time_waited > 0\n     and\
  \ a.sid=b.sid\n     and b.username is not NULL\n     and a.event='enq: TX - row\
  \ lock contention';\n\n  SID               EVENT                      TOTAL_WAITS\
  \    time_waited      average_wait\n----------     ------------------------------\
  \  ------------   -----------      ------------\n        68      enq: TX - row lock\
  \ contention             24           8018              298\nSQL>\n```\n\n输出显示，SID\
  \ 为 68 的会话正在等待被另一个事务持有的行锁。\n\n#### 工作原理\n\n理解各种 Oracle 等待事件类别能增强你快速诊断 Oracle 与等待相关问题的能力。按类别分析等待事件可以让你知道是争用、用户\
  \ I/O 还是配置问题导致了高等待。“解决方案”部分中的示例展示了如何基于等待事件类别开始分析等待。这有助于识别等待的来源，例如并发问题。一旦你识别出导致大部分等待的等待事件类别，你就可以深入研究该等待事件类别，找出导致该类别下总等待时间过高的具体等待事件。然后，你可以使用“解决方案”部分中显示的最终查询，识别正在等待这些等待事件的用户会话。\n\
  \n### 5-7. 解决缓冲区忙等待\n\n#### 问题\n\n根据 AWR 报告的输出，你的数据库正在经历大量的缓冲区忙等待。你想要解决这些等待。\n\n\
  #### 解决方案\n\n...\n\n### 5-6. 按类别检查等待事件\n\n#### 工作原理\n\n“解决方案”部分中显示的第一个查询提供了一种简单的方法来查明哪些等待事件（如果有的话）正在拖慢用户会话。当你在不指定\
  \ `SID` 的情况下发出查询时，它会显示数据库中所有会话的当前和最后一次等待。例如，如果你在数据库中遇到锁定情况，你可以定期发出查询，以查看总入队等待次数是否在下降。如果整个实例的入队等待次数在增长，则意味着更多会话因被阻塞的锁而遇到性能下降。\n\
  \n`V$SESSION_WAIT` 视图显示每个会话的当前或上一次等待。该视图中的 `STATE` 列告诉你会话是否正在等待。以下是 `STATE` 列的可能值：\n\
  \n> `WAITING:` 会话当前正在等待资源。\n>\n> `WAITED UNKNOWN TIME`: 上一次等待的持续时间未知（仅在你将 `TIMED_STATISTICS`\
  \ 参数设置为 `false` 时才显示此值）。\n>\n> `WAITED SHORT TIME`: 最近一次等待少于百分之一秒。\n>\n> `WAITED\
  \ KNOWN TIME`: `WAIT_TIME` 列显示上一次等待的持续时间。\n\n请注意，该查询利用 `seconds_in_wait` 列来查明此会话已等待了多长时间。Oracle\
  \ 已弃用此列，转而使用 `wait_time_micro` 列，该列以微秒为单位显示等待时间。如果会话当前正在等待，这两列都显示当前等待已等待的时间量。如果会话当前没有等待，`wait_time_micro`\
  \ 列显示上一次等待期间已等待的时间量。\n\n\n\n## 解决方案\n\nOracle 有多种缓冲区类，例如数据块、段头、撤销头和撤销块。您如何修复缓冲区忙等待情况，取决于导致问题的缓冲区类类型。您可以通过执行以下两个查询来找出导致缓冲区等待的缓冲区类型。请注意，您需要先从第一个查询中获取\
  \ `row_wait_obj#` 的值，并将其用作第二个查询中 `data_object_id` 的值。\n\n```\nSQL> select row_wait_obj#\n\
  \     from v$session\n     where event = 'buffer busy waits';\n```\n\n```\nSQL>\
  \ select owner, object_name, subobject_name, object_type\n     from dba_objects\n\
  \     where data_object_id = &row_wait_obj;\n```\n\n上述查询将揭示导致高缓冲区等待的具体缓冲区类型。您的修复措施将取决于哪个缓冲区类导致了缓冲区等待，如下文各小节所述。\n\
  \n### 段头\n\n如果您的查询显示缓冲区等待是由段头争用引起的，那么数据库中存在空闲列表争用，这是因为多个进程试图向同一个数据块插入数据——每个进程在能向该块插入数据之前都需要获取一个空闲列表。如果您尚未使用自动段空间管理\
  \ (`ASSM`)，则必须从手动空间管理切换到 `ASSM`——在 `ASSM` 下，数据库不使用空闲列表。但是请注意，在大多数情况下，切换到 `ASSM`\
  \ 可能并不容易实现。在无法实施 `ASSM` 的情况下，您必须为相关段增加空闲列表数量。您也可以尝试同时增加空闲列表组数量。\n\n### 数据块\n\n数据块缓冲区争用可能与表或索引有关。此类争用通常由右式索引引起，即导致多个进程在同一点插入的索引，例如当您使用序列号生成器来产生键值时。同样，如果您使用的是手动段管理，请切换到\
  \ `ASSM` 或为该段增加空闲列表。\n\n### 撤销头和撤销块\n\n如果您使用的是自动撤销管理，那么很少或根本没有缓冲区等待会是由于撤销段头或撤销段块争用引起的。如果您确实看到其中一种缓冲区类是罪魁祸首，那么您可以增加撤销表空间的大小来解决缓冲区忙等待问题。\n\
  \n## 工作原理\n\n缓冲区忙等待表明有多个进程同时访问同一个数据块。导致大量缓冲区忙等待的原因之一是一个低效的查询将过多的数据块读入了缓冲区缓存，从而可能让其他想要访问其中一个或多个相同块的会话陷入等待。不仅如此，一个将过多数据读入缓冲区缓存的查询还可能导致必要的块被老化换出缓存。您必须调查涉及导致缓冲区忙等待的段的查询，以期减少它们读入缓冲区缓存的数据块数量。\n\
  \n如果您对缓冲区忙等待的调查显示大多数时候都涉及同一个块或同一组块，那么一个有效的策略是删除其中一些行并将其重新插入表中，从而强制它们位于不同的数据块上。\n\
  \n检查您当前分配给缓冲区缓存的内存，如果需要，请增加其大小。更大的缓冲区缓存可以减少会话等待从磁盘读取数据的情况，因为更多的数据已经存在于缓冲区缓存中。您还可以通过在缓冲区缓存中使用\
  \ `KEEP POOL` 将问题表放置在内存中（请参阅配方 3-7）。通过使热点块始终在内存中可用，您将避免高缓冲区忙等待。\n\n具有非常少唯一值的索引称为低基数索引。低基数索引通常会导致过多的块读取。因此，如果同时发生多个\
  \ DML 操作，某些索引块可能会成为“热点”并导致高缓冲区忙等待。作为长期解决方案，您可以尝试减少数据库中低基数索引的数量。\n\n每个 Oracle 数据段（例如表或索引）都包含一个头块，其中记录诸如可用空闲块等信息。当多个会话试图从同一段插入或删除行时，最终可能会导致对该数据段头块的争用。\n\
  \n缓冲区忙等待也是由对空闲列表的争用引起的。向段中插入数据的会话需要首先检查该段的空闲列表信息，以查找有空闲空间可以插入数据的块。如果您在数据库中使用 `ASSM`，则不应该看到任何因空闲列表争用而导致的等待。\n\
  \n### 5-8. 解决日志文件同步等待\n\n### 问题\n\n您看到大量的 `log file sync` 等待事件，它们位于数据库所有等待事件的首位。您希望减少这些等待事件。\n\
  \n### 解决方案\n\n以下是处理数据库中高 `log file sync` 等待的两种策略。\n\n*   如果您注意到等待次数非常多，但每次等待的平均等待时间很短，这表明数据库发出了太多的提交语句。您必须通过批处理提交来更改提交行为。例如，您可以指定在每\
  \ 500 行之后进行提交，而不是每行之后都提交。\n*   如果您注意到由于 `redo log file sync` 事件而累积的大量等待时间是由写入重做日志文件的长等待（该事件的高平均等待时间）引起的，那么这更多的是关于您的\
  \ I/O 子系统速度的问题。您可以将重做日志文件分布在不同的磁盘上来减少争用。您也可以查看是否可以专门为重做日志分配磁盘，而不允许其他文件放在这些磁盘上——这将减少\
  \ LGWR 将缓冲区写入磁盘时的 I/O 争用。最后，作为长期解决方案，您可以考虑将重做日志放置在更快的设备上，例如，将它们从 RAID 5 移动到 RAID\
  \ 1 设备。\n\n\n\n#### 工作原理\n\nOracle（实际上是 LGWR 后台进程）在会话发出`COMMIT`语句时，会自动将会话的重做信息刷新到重做日志文件中。数据库在将控制权返回给客户端之前，会先将提交记录写入磁盘。因此，服务器进程会等待写入重做日志完成。这是默认行为，但您也可以通过`COMMIT_WRITE`初始化参数来控制数据库提交行为。\n\
  \n![images](img/square.jpg) `注意` `COMMIT_WRITE`参数是一个高级参数，在 Oracle Database 11.2\
  \ 中已被弃用。由于它可能对性能产生不利影响，您可能希望保持该参数不变，并依赖 Oracle 的默认提交行为。\n\n会话将通知 LGWR 进程，将会话的重做信息从重做日志缓冲区写入磁盘上的重做日志文件。LGWR\
  \ 进程在完成将缓冲区内容写入磁盘后，会向用户会话发出信号。`log file sync`等待事件包括等待 LGWR 将日志缓冲区写入磁盘的时间，以及将该信息通知会话的时间。服务器进程必须等待，直到获得\
  \ LGWR 进程已完成将日志缓冲区内容写入重做日志文件的确认。\n\n`log file sync`事件是由将日志缓冲区内容写入重做日志文件时的争用引起的。检查`V$SESSION_WAIT`视图以确定\
  \ Oracle 是否在递增`SEQ#`列。如果 Oracle 在递增此列，则意味着 LGWR 进程是罪魁祸首，因为它可能被卡住了。\n\n由于`log file\
  \ sync`等待事件是由 LGWR 进程引起的争用造成的，看看您是否可以使用`NOLOGGING`选项来消除这些等待。当然，在生产系统中，当数据库正在处理用户请求时，您不能使用`NOLOGGING`选项，因此该选项在大多数情况下用途有限。\n\
  \n`log file sync`等待事件也可能是由于`LOG_BUFFER`初始化参数设置过大引起的。`LOG_BUFFER`参数值过大会导致 LGWR 进程更少地将数据写入重做日志文件。例如，如果您将`LOG\
  \ BUFFER`设置为 12 MB 左右，它会将一个内部参数`log_io_size`设置为一个较高的值。`log_io_size`参数充当 LGWR 何时写入重做日志文件的阈值。在没有提交请求或检查点的情况下，LGWR\
  \ 会等待直到达到`log_io_size`阈值。因此，当数据库发出`COMMIT`语句时，LGWR 进程将被迫立即将大量数据写入重做日志文件，导致会话在`log\
  \ file sync`等待事件上等待。这是因为每个等待的会话都在等待 LGWR 将会话的重做日志缓冲区内容刷新到重做日志文件。虽然数据库会自动计算`log_io_size`参数的值，但您可以通过发出如下命令来为其指定一个值：\n\
  \n```\nSQL> alter system set \"_log_io_size\"=1024000 scope=spfile;\n\nSystem altered.\n\
  \nSQL>\n```\n\n### 5-9. 最小化“由其他会话读取”等待事件\n\n#### 问题\n\n您的 AWR 报告显示，`read by other\
  \ session`等待事件是导致最多等待的原因。您希望减少高`read by other session`等待。\n\n#### 解决方案\n\n您看到`read\
  \ by other session`等待事件的主要原因是多个会话试图读取相同的数据块（无论是表块还是索引块），并且不得不等待当前正在读取这些块的会话。您可以通过执行以下命令找到会话正在等待的数据块：\n\
  \n```\nSQL> select p1 \"file#\", p2 \"block#\", p3 \"class#\"\n     from v$session_wait\n\
  \     where event = 'read by other session';\n```\n\n然后，您可以获取`block#`并在以下查询中使用，以识别导致`read\
  \ by other session`等待的确切段（表或索引）。\n\n```\nSQL> select relative_fno, owner, segment_name,\
  \ segment_type\n     from dba_extents\n     where file_id = &file\n     and &block\
  \ between block_id\n     and block_id + blocks - 1;\n```\n\n一旦您识别出热点块及其所属的段，就需要识别使用这些数据块和段的查询，并尽可能调整这些查询。您也可以尝试删除并重新插入热点块内的行。\n\
  \n为了减少每个热点块中的数据量从而减少此类等待，您还可以尝试创建一个具有较小块大小的新表空间，并将段移动到该表空间。检查是否使用了任何低基数索引也是一个好主意，因为这类索引会使数据库将大量数据块读入缓冲区缓存，可能导致`read\
  \ by other session`等待事件。如果可能，将任何低基数索引替换为在高基数列上的索引。\n\n#### 工作原理\n\n`read by other\
  \ session`等待事件表明一个或多个会话正在等待另一个会话将相同的数据块从磁盘读取到 SGA 中。显然，大量的此类等待会降低性能。您的首要目标应该是识别实际的数据块以及这些块所属的对象。例如，这些等待可能是由多个会话试图读取相同的索引块引起的。多个会话也可能试图同时对同一张表执行全表扫描。\n\
  \n### 5-10. 减少直接路径读取等待事件\n\n#### 问题\n\n您注意到大量的`direct path read`等待事件，以及`direct path\
  \ read temp`等待事件，并且您希望减少这些事件的发生。\n\n\n\n## 5-10. 处理直接路径读取等待\n\n### 解决方案\n\n`Direct\
  \ path read` 和 `direct path read temp` 事件是会话将数据直接读入 PGA 而不是读入 SGA 时发生的相关等待事件。将数据读入\
  \ PGA 本身并不是问题——对于某些操作（例如排序）来说，这是正常行为。`direct path read` 和 `direct path read temp`\
  \ 事件通常表明正在进行的排序非常大，PGA 无法容纳这些排序。\n\n执行以下命令以获取正在等待的块的文件 ID：\n\n```sql\nSQL> select\
  \ p1 \"file#\", p2 \"block#\", p3 \"class#\"\n     from v$session_wait\n     where\
  \ event = 'direct path read temp';\n```\n\n列 `P1` 显示读取调用的文件 ID。列 `P2` 显示起始 `BLOCK_ID`，列\
  \ `P3` 显示块的数量。然后，您可以执行以下语句来检查此文件 ID 是否对应于临时表空间临时文件：\n\n```sql\nSQL> select relative_fno,\
  \ owner, segment_name, segment_type\n     from dba_extents\n     where file_id =\
  \ &file\n     and &block between block_id and block_id + &blocks - 1;\n```\n\n直接读取类型的等待可能由过度的磁盘排序或全表扫描引起。为了查明读取的实际原因，请检查\
  \ `V$SESSION_WAIT` 视图的 `P1` 列（读取调用的文件 ID）。通过这种方式，您可以确定读取是由于从 `TEMP` 表空间读取数据进行磁盘排序引起的，还是由于并行从属进程进行全表扫描引起的。\n\
  \n如果确定磁盘排序是导致高 `direct read` 等待事件的主要原因，请增加 `PGA_AGGREGATE_TARGET` 参数的值（或者，如果您使用自动内存管理，请为其指定最小大小）。当查询执行大型哈希连接时，增加\
  \ PGA 大小也是一个很好的策略，因为如果 PGA 不足以处理大型哈希连接，可能会导致过度的磁盘 I/O。当您为表设置高度并行时，Oracle 倾向于使用并行从属进程进行全表扫描。如果您的\
  \ I/O 系统无法处理所有的并行从属进程，您会注意到大量的直接路径读取。解决方案是降低相关表或表的并行度。此外，调查是否可以通过指定适当的索引来避免全表扫描。\n\
  \n### 工作原理\n\n通常，在顺序数据库读取或分散数据库读取操作期间，数据库将数据从磁盘读入 SGA。`direct path read` 是指从磁盘进行的单块或多块读取直接到\
  \ PGA，绕过 SGA。理想情况下，数据库应在 PGA 中完成整个数据排序。当巨大的排序无法放入可用的 PGA 时，Oracle 会将部分排序数据直接写入磁盘。当服务器进程从磁盘（而不是从\
  \ PGA）读取此数据时，就会发生直接读取。\n\n当 I/O 子系统过载时，也可能发生 `direct path read` 事件，这很可能是由于为表设置高度并行而导致的，这使得数据库返回缓冲区的速度低于服务器进程处理速度所需的速度。良好的磁盘条带策略会对此有所帮助。Oracle\
  \ 的自动存储管理 (ASM) 会自动为您条带化数据。如果您尚未使用 ASM，请考虑在数据库中实施它。\n\n`Direct path write` 和 `direct\
  \ path write temp` 等待事件类似于 `direct path read` 和 `direct path read temp` 等待。通常，由\
  \ DBWR 将数据从缓冲区高速缓存写出。当进程直接从 PGA 写入数据缓冲区时，Oracle 使用 `direct path write`。如果您的数据库正在执行大量溢出到磁盘的排序或并行\
  \ DML 操作，您偶尔可能会遇到 `direct path write` 事件。当您执行直接路径加载事件（例如并行 `CTAS` (`create table\
  \ as select`) 或直接路径 `INSERT` 操作）时，您也可能看到此等待事件。与 `direct path read` 事件一样，`direct\
  \ path write` 事件的解决方案取决于导致等待的原因。如果等待主要是由于大型排序引起的，那么您可以考虑增加 `PGA_AGGREGATE_TARGET`\
  \ 参数的值。如果操作（如并行 DML）导致等待，您必须研究如何在所有磁盘上适当分散 I/O，并确保您的 I/O 子系统能够处理 DML 操作期间的高度并行性。\n\
  \n### 5-11. 最小化恢复写入器等待\n\n### 问题\n\n您已在数据库中启用了 Oracle Flashback Database 功能。由于恢复写入器\
  \ (RVWR) 进程缓慢，您现在看到大量等待事件。您想要减少恢复写入器等待。\n\n### 解决方案\n\nOracle 将所有更改的块从内存写入磁盘上的闪回日志。当数据库写入闪回日志时，您可能会遇到\
  \ `flashback buf free by RVWR` 等待事件作为首要等待事件。为了减少这些恢复写入器等待，您必须调整闪回恢复区域文件系统和存储。具体来说，您必须执行以下操作：\n\
  \n*   由于闪回日志往往相当大，您的数据库在写入这些文件时会产生一些 CPU 开销。您可以考虑的一件事是将闪回恢复区域移动到更快的文件系统。此外，Oracle\
  \ 建议您使用基于 ASM 的文件系统，因为它们不受操作系统文件缓存（往往会减慢 I/O 速度）的影响。\n*   通过为闪回恢复区域所在的文件系统配置多个磁盘主轴来增加其磁盘吞吐量。这将加快闪回日志的写入速度。\n\
  *   条带化存储卷，理想情况下使用较小的条带大小（例如，128 KB）。\n*   将 `LOG_BUFFER` 初始化参数设置为至少 8 MB 的最小值——为写入闪回数据库日志分配的内存取决于\
  \ `LOG_BUFFER` 参数的设置。\n\n### 工作原理\n\n与重做日志缓冲区的情况不同，Oracle 以不频繁的间隔将闪回缓冲区写入闪回日志，以保持\
  \ Oracle Flashback Database 的开销较低。当会话等待 RVWR 进程时，会发生 `flashback buf free by RVWR`\
  \ 等待事件。RVWR 进程将闪回缓冲区的内容写入磁盘上的闪回日志。当 RVWR 在此过程中落后时，闪回缓冲区已满，无法为通过 DML 操作更改数据的会话提供可用缓冲区。会话将继续等待，直到\
  \ RVWR 通过将其内容写入闪回日志来释放缓冲区。高 RVWR 等待表明您的 I/O 系统无法支持 RVWR 需要将闪回缓冲区刷新到磁盘上闪回日志的速率。\n\
  \n### 5-12. 查找谁持有阻塞锁\n\n### 问题\n\n您的用户抱怨他们的一些会话非常缓慢。您怀疑这些会话可能因某种原因被 Oracle 锁定，并希望找到找出谁在阻碍这些会话的最佳方法。\n\
  \n\n### 解决方案\n\n正如本章引言中所述，Oracle 使用多种锁来控制由多个会话执行的事务，以防止数据库中的破坏性行为。阻塞锁可能会“拖慢”会话——实际上，该会话只是在等待另一个持有对象锁（例如一行或一组行，甚至是一整张表）的会话。或者，在开发场景中，开发人员可能启动了多个会话，其中一些会话相互阻塞。\n\
  \n在分析 Oracle 锁时，必须检查的一些关键数据库视图是 `V$LOCK` 和 `V$SESSION` 视图。`V$LOCKED_OBJECT` 和 `DBA_OBJECTS`\
  \ 视图对于识别被锁定的对象也非常有用。要查明一个会话是否被另一个会话应用的锁阻塞，您可以执行以下查询：\n\n```sql\nSQL> select s1.username\
  \ || '@' || s1.machine\n  2  || ' ( SID=' || s1.sid || ' )  is blocking '\n  3 \
  \ || s2.username || '@' || s2.machine || ' ( SID=' || s2.sid || ' ) ' AS blocking_status\n\
  \  4  from v$lock l1, v$session s1, v$lock l2, v$session s2\n  5  where s1.sid=l1.sid\
  \ and s2.sid=l2.sid\n  6  and l1.BLOCK=1 and l2.request > 0\n  7  and l1.id1 = l2.id1\n\
  \  8  and l2.id2 = l2.id2 ;\n\nBLOCKING_STATUS\n--------------------------------------------------------------------\n\
  \nHR@MIRO\\MIROPC61 ( SID=68 )  is blocking SH@MIRO\\MIROPC61 ( SID=81 )\n\nSQL>\n\
  ```\n\n此查询的输出显示了阻塞会话以及所有被阻塞的会话。\n\n一个快速检查实例中是否存在任何用户阻塞锁的方法是简单地运行以下查询：\n\n```sql\n\
  SQL> select * from V$lock where block > 0;\n```\n\n如果您没有从该查询中获得任何返回行——很好——您的实例当前没有任何阻塞锁！我们将在解释部分更详细地说明此视图。\n\
  \n### 工作原理\n\nOracle 使用两种类型的锁来防止破坏性行为：排他锁和共享锁。只有一个事务能获得对一行或一张表的排他锁，而多个共享锁可以被获取到同一个对象上。Oracle\
  \ 在两个级别使用锁——行级和表级。行锁（由符号 `TX` 表示）对于将被 `INSERT`、`UPDATE` 和 `DELETE` 等 DML 语句修改的每一行，仅锁定表中的单个行。对于\
  \ `MERGE` 或 `SELECT … FOR UPDATE` 语句也是如此。包含这些语句之一的事务会抓取一个排他行锁以及一个行共享表锁。事务（和会话）将持有这些锁，直到它提交或回滚该语句。在它执行这两件事之一之前，所有其他打算修改该特定行的会话都将被阻塞。请注意，每当事务打算修改表中的一行或多行时，它也会在该表上持有一个表锁（`TM`），以防止数据库在事务尝试修改其某些行时允许任何\
  \ DDL 操作（如 `DROP TABLE`）。\n\n在 Oracle 数据库中，锁机制按如下方式工作：\n\n*   读取器不会阻塞另一个读取器。\n*\
  \   读取器不会阻塞写入器。\n*   写入器不会阻塞同一数据的读取器。\n*   写入器会阻塞另一个想要修改相同数据的写入器。\n\n正是列表中的最后一种情况，即两个会话打算修改表中的相同数据时，Oracle\
  \ 的自动锁定机制才会启动，以防止破坏性行为。包含更新现有行语句的第一个事务将获得该行的排他锁。当锁定行的第一个会话继续持有该锁（直到它发出 `COMMIT`\
  \ 或 `ROLLBACK` 语句）时，其他会话可以修改该表中除锁定行之外的任何其他行。第一个会话伴随持有的表锁仅仅是为了防止任何其他会话发出 DDL 语句来更改表的结构。Oracle\
  \ 使用复杂的锁定机制，其中行级锁不会自动升级到表级，甚至不会升级到数据块级别。\n\n### 5-13. 识别被阻塞和阻塞的会话\n\n### 问题\n\n\
  您注意到数据库中存在队列锁，并怀疑可能存在阻塞锁阻碍了其他会话。您希望识别出阻塞会话和被阻塞的会话。\n\n### 解决方案\n\n当您在 Oracle 数据库中看到“enqueue”等待事件时，很可能是一个锁定现象阻碍了某些会话执行其\
  \ SQL 语句。当一个会话在“enqueue”等待事件上等待时，该会话正在等待由另一个会话持有的锁。阻塞会话持有的锁模式与被阻塞会话请求的锁模式不兼容。您可以发出以下命令来查看有关被阻塞会话和阻塞会话的信息：\n\
  \n```sql\nSQL> select decode(request,0,'Holder: ','Waiter: ')||sid sess,\n     id1,\
  \ id2, lmode, request, type\n     from v$lock\n     where (id1, id2, type) in\n\
  \     (select id1, id2, type from v$lock where request>0)\n     order by id1, request;\n\
  ```\n\n`V$LOCK` 视图显示实例中是否存在任何阻塞锁。如果有阻塞锁，它还会显示阻塞会话和被阻塞会话。请注意，如果所有会话都需要同一个被阻塞的对象，一个阻塞会话可以同时阻塞多个会话。以下是一个显示存在锁的示例：\n\
  \n```sql\nSQL> select sid,type,lmode,request,ctime,block from v$lock;\n\n      \
  \ SID           TY           LMODE          REQUEST       CTIME        BLOCK\n--------------\
  \      --------      -----------    -----------   -------      -------\n       127\
  \           MR               4             0         102870          0\n       \
  \ 81           TX               0             6           778          0\n     \
  \  191           AE               4             0           758          0\n   \
  \    205           AE               4             0           579          0\n \
  \      140           AE               4             0         11655          0\n\
  \        68           TM               3             0           826          0\n\
  \        68           TX               6             0           826          1\n\
  …\nSQL>\n```\n\n需要关注的关键列是 `BLOCK` 列——阻塞会话在此列的值为 1。在我们的示例中，会话 68 是阻塞会话，因为它在 `BLOCK`\
  \ 列下显示值 1。因此，`V$LOCK` 视图证实了我们在本方案“解决方案”部分中的初步发现。SID 为 68 的阻塞会话还在 `LMODE` 列下显示了锁模式\
  \ 6，表示它以排他模式持有此锁——这就是会话 81 “挂起”无法执行其更新操作的原因。当然，被阻塞的会话是受害者——所以它在 `BLOCK` 列中显示值 0。它还在\
  \ `REQUEST` 列下显示值 6，因为它正在请求一个排他锁以执行其列更新。反过来，阻塞会话将在 `REQUEST` 列中显示值 0，因为它没有请求任何锁——它已经持有了。\n\
  \n如果您想查明阻塞会话的等待类别以及它阻塞了其他会话多长时间，可以通过查询 `V$SESSION` 视图来实现，如下所示：\n\n```sql\nSQL> select\
  \  blocking_session, sid,  wait_class,\n     seconds_in_wait\n     from     v$session\n\
  \     where blocking_session is not NULL\n     order by blocking_session;\n\nBLOCKING_SESSION\
  \        SID        WAIT_CLASS        SECONDS_IN_WAIT\n-----------------    -------\
  \       -------------    ----------------\n      68                81          Application\
  \                  7069\n\nSQL>\n```\n\n该查询显示，SID=68 的会话正在阻塞 SID=81 的会话，并且阻塞已经开始\
  \ 7,069 秒。\n\n#### 工作原理\n\n以下是 Oracle 数据库中最常见的几种入队锁：\n\n*   `TX`： 由于事务锁引起，通常由有问题的应用程序逻辑导致。\n\
  *   `TM`： 这些是表级 DML 锁，最常见的原因是子表中的外键约束未建立索引。\n\n此外，你偶尔也可能注意到 ST 入队锁。这些表示当 Oracle\
  \ 正在执行空间管理操作（例如为执行排序而分配临时段）时，会话正在等待。\n\n### 5-14. 处理阻塞锁\n\n#### 问题\n\n你已经在数据库中识别出了阻塞锁。你想知道如何处理这些锁。\n\
  \n#### 解决方案\n\n处理阻塞锁有两种基本策略——短期策略和长期策略。首先你需要做的是消除阻塞锁，这样会话就不会持续排队——一个阻塞锁导致数十甚至数百个会话全部等待被阻塞的对象，这种情况并不少见。既然你已经知道了阻塞会话的\
  \ `SID`（在我们的示例中是 68），只需先查询 `V$SESSION` 视图以获取该会话对应的 `serial#`，然后像这样杀掉该会话：\n\n```\n\
  SQL> alter system kill session '68, 1234';\n```\n\n短期解决方案是快速清除阻塞锁，以免它们损害数据库性能。清除方法就是简单地杀掉阻塞会话。如果你看到一长串被阻塞的会话在阻塞会话后面排队，就杀掉阻塞会话，这样其他会话就可以继续执行了。\n\
  \n但从长远来看，你必须调查阻塞会话为何会表现出这种行为。通常，你会在应用程序逻辑中发现缺陷。不过，你可能需要深入挖掘阻塞会话正在执行的 SQL 代码。\n\n\
  #### 工作原理\n\n在这个例子中，显然阻塞锁是一个 DML 锁。然而，即使你事先不知道这一点，也可以通过检查 `V$LOCK` 视图的 `TYPE` (`TY`)\
  \ 列来确定锁的类型。Oracle 使用几种内部“系统”锁来维护库缓存和其他与实例相关的组件，但这些锁是正常的，你在 `V$LOCK` 视图中找不到任何与这些锁相关的信息。\n\
  \n对于 DML 操作，Oracle 使用两种基本类型的锁——事务锁 (`TX`) 和 DML 锁 (`TM`)。还有第三种类型的锁，用户锁 (`UL`)，但它在解决常规锁定问题中不起作用。事务锁是你在解决\
  \ Oracle 锁定问题时最常遇到的一种锁。每次事务修改数据时，都会调用一个 `TX` 锁，这是一个行事务锁。而 DML 锁 `TM`，则是为每个被 DML\
  \ 语句更改的对象获取一次。\n\n`LMODE` 列显示锁模式，值为 6 表示排他锁。`REQUEST` 列显示请求的锁模式。第一个修改行的会话将持有 `LMODE=6`\
  \ 的排他锁。该会话的 `REQUEST` 列将显示值 0，因为它没有请求锁——它已经持有一个锁了！被阻塞的会话需要但无法在同一行上获得排他锁，因此它也以排他模式\
  \ (`MODE=6`) 请求一个 `TX` 锁。所以，被阻塞会话的 `REQUEST` 列将显示值 6，而其 `LMODE` 列显示值 0（被阻塞的会话在任何模式下都没有锁）。\n\
  \n前面的讨论适用于行锁，行锁总是以排他模式获取。`TM` 锁通常以模式 3（即 `Shared Row Exclusive` 模式）获取，而 DDL 语句将需要\
  \ `TM exclusive` 锁。\n\n### 5-15. 识别被锁定的对象\n\n#### 问题\n\n你意识到存在锁定情况，并且想找出正在被锁定的对象。\n\
  \n#### 解决方案\n\n你可以通过查看 `V$LOCK` 视图中的 `ID1` (LockIdentifier) 列的值来找到被锁定对象的标识（参见配方\
  \ 5-13）。当 `TYPE` 列为 `TM`（DML 入队）时，`ID1` 列的值标识了被锁定的对象。假设你已经确定 `ID1` 列的值是 99999。然后你可以发出以下查询来识别被锁定的表：\n\
  \n```\nSQL> select object_name from dba_objects where object_id=99999;\n\nOBJECT_NAME\n\
  ------------\nTEST\nSQL>\n```\n\n一个更简单的方法是使用 `V$LOCKED_OBJECT` 视图来找出被锁定的对象、对象类型以及对象的所有者。\n\
  \n```\nSQL> select lpad(' ',decode(l.xidusn,0,3,0)) || l.oracle_username \"User\"\
  ,\n       o.owner, o.object_name, o.object_type\n       from v$locked_object l,\
  \ dba_objects o\n       where l.object_id = o.object_id\n       order by o.object_id,\
  \ 1 desc;\nUser       OWNER      OBJECT_NAME      OBJECT_TYPE\n------     ------\
  \     ------------     ------------\nHR         HR         TEST             TABLE\n\
  SH         HR         TEST             TABLE\n\nSQL>\n```\n\n注意，此查询同时显示了阻塞用户和被阻塞用户。\n\
  \n#### 工作原理\n\n正如“解决方案”部分所示，识别被锁定的对象相当容易。你当然可以使用 Oracle Enterprise Manager 快速识别被锁定的对象、涉及锁定的\
  \ ROWID 以及导致锁定的 SQL 语句。然而，理解包含锁定信息的底层 Oracle 视图总是很重要的，而这正是本配方所演示的。使用本配方中显示的查询，你可以轻松地识别被锁定的对象，而无需借助诸如\
  \ Oracle Enterprise Manager 之类的监控工具。\n\n在解决方案显示的示例中，被锁定的对象是一个表，但它也可能是任何其他类型的对象，包括一个\
  \ PL/SQL 包。通常，查询挂起的原因正是查询所需的某个对象被锁定了。在其他用户能够访问该对象之前，你可能需要先杀掉持有该对象锁的会话。\n\n### 5-16.\
  \ 解决 enq: TM 争用\n\n#### 问题\n\n数据库中的几个会话执行一些插入语句花费了很长时间。结果，“活动”会话计数非常高，数据库无法接受新的会话连接。经检查，你发现数据库正经历大量的\
  \ `enq: TM – contention` 等待事件。\n\n#### 解决方案\n\n`enq: TM – contention` 事件通常是由于 Oracle\
  \ DML 操作所涉及的表缺少外键约束引起的。一旦你通过向相关表添加外键约束来修复问题，`enq: TM – contention` 事件就会消失。\n\n等待\
  \ `enq: TM – contention` 事件的、正等待执行插入操作的会话，几乎总是由于未索引的外键约束。当一个依赖表或子表的外键约束引用父表，但该外键相关的键上缺少索引时，就会发生这种情况。如果\
  \ Oracle 在父表中执行对主键列的修改（该主键列被子表的外键引用），它就会在子表上获取一个表锁。注意，这些是表级锁 (`TM`)，而不是行级锁 (`TX`)——因此，这些锁不限于一行，而是针对整个表。自然地，一旦获取了这个表锁，Oracle\
  \ 将阻塞所有试图修改子表数据的其他会话。一旦你在子表中为引用父表的列创建了索引，由于 `TM` 争用而导致的等待就会消失。\n\n## 工作原理\n\n如果你没有为子表中的外键约束创建索引，Oracle\
  \ 会在子表上获取一个排他锁。为了说明未索引的外键如何因锁导致争用，我们使用以下示例。创建两个表：`STORES`和`PRODUCTS`，如下所示：\n\n```sql\n\
  create table stores\n     (store_id       number(10)     not null,\n      supplier_name\
  \  varchar2(40)   not null,\n      constraint stores_pk primary key (store_id));\n\
  \ncreate table products\n    (product_id     number(10)     not null,\n     product_name\
  \   varchar2(30)   not null,\n     supplier_id    number(10)     not null,\n   \
  \  store_id       number(10)     not null,\n     constraint fk_stores\n     foreign\
  \ key (store_id)\n     references stores(store_id)\n     on delete cascade);\n```\n\
  \n如果你现在删除`STORES`表中的任何行，你将注意到由于锁导致的等待。通过简单地为`PRODUCTS`表中指定为外键的列创建索引，就可以消除这些等待：\n\
  \n```sql\ncreate index fk_stores on products(store_id);\n```\n\n你可以通过执行以下查询来查找数据库中所有未索引的外键约束：\n\
  \n```sql\nselect * from (\n     select c.table_name, co.column_name, co.position\
  \ column_position\n     from   user_constraints c, user_cons_columns co\n     where\
  \  c.constraint_name = co.constraint_name\n     and    c.constraint_type = 'R'\n\
  \     minus\n     select ui.table_name, uic.column_name, uic.column_position\n \
  \    from   user_indexes ui, user_ind_columns uic\n     where  ui.index_name = uic.index_name\n\
  \     )\n     order by table_name, column_position;\n```\n\n如果你不索引外键列，你会注意到子表经常被锁定，从而导致与争用相关的等待。Oracle\
  \ 建议你始终为外键创建索引。\n\n![Tip](img/square.jpg) `Tip` 如果子表外键匹配的唯一键或主键永远不会被更新或删除，你就不必在子表中为该外键列创建索引。\n\
  \n如果你没有为外键列创建索引，Oracle 倾向于在子表上获取表锁。如果你向父表插入一行，父表不会在子表上获取锁；但是，如果你在父表中更新或删除一行，数据库将在子表上获取一个完整的表锁。也就是说，对父表主键的任何修改都会导致子表上的完整表锁（`TM`）。在我们的例子中，`STORES`表是`PRODUCTS`表的父表，后者包含外键`STORE_ID`。`PRODUCTS`表作为依赖表，其`STORE_ID`列中的值必须与父表`STORES`的唯一键或主键的值相匹配。在这种情况下，`STORES`表中的`STORE_ID`列是该表的主键。\n\
  \n每当你修改父表（`STORES`）的主键时，数据库就会在`PRODUCTS`表上获取一个完整的表锁。其他会话无法更改`PRODUCTS`表中的任何值，包括外键列以外的列。这些会话只能查询而不能修改`PRODUCTS`表。在此期间，任何试图修改`PRODUCTS`表中任何列的会话都必须等待（`TM`：enq\
  \ 争用等待）。Oracle 只有在完成修改父表`STORES`中的主键后，才会释放对子表`PRODUCTS`的锁。如果你有一堆会话等待修改`PRODUCTS`表中的数据，它们都必须等待，如果你有一个在线事务处理类型的数据库，其中有许多执行简短\
  \ DML 操作的用户，活动会话计数自然会迅速上升。请注意，你在子表上执行的任何 DML 操作都不需要在父表上获取表锁。\n\n### 5-17. 识别最近被锁定的会话\n\
  \n#### 问题\n\n一个会话在数据库中经历了严重的等待，很可能是由于另一个会话放置了阻塞锁。你尝试使用`V$LOCK`和其他视图来更深入地研究锁定问题，但无法在锁处于活动状态时“捕获”它。你希望使用不同的视图来“查看”你可能在锁定发生时错过的较旧的锁定数据。\n\
  \n#### 解决方案\n\n你可以执行以下基于 ASH 的语句，以找出过去五分钟内数据库中持有的所有锁的信息。当然，你可以将时间间隔调整为更小或更大的周期，只要该时间段内有\
  \ ASH 数据覆盖。\n\n```sql\nselect to_char(h.sample_time, 'HH24:MI:SS') TIME,h.session_id,\n\
  \       decode(h.session_state, 'WAITING' ,h.event, h.session_state) STATE,\n  \
  \     h.sql_id,\n       h.blocking_session BLOCKER\n  from v$active_session_history\
  \ h, dba_users u\n where u.user_id = h.user_id\n   and h.sample_time > systimestamp-(2/1440);\n\
  ```\n\n```\nTIME            SID                      STATE                     \
  \   SQL_ID          BLOCKER\n------------   -----      -----------------------------------\
  \      -------------    ---------\n17:00:52        197          116 enq: TX - row\
  \ lock contention     094w6n53tnywr     191\n17:00:51        197          116 enq:\
  \ TX - row lock contention     094w6n53tnywr     191\n17:00:50        197      \
  \    116 enq: TX - row lock contention     094w6n53tnywr     191\n…\n```\n\n你可以看到，ASH\
  \ 记录了由阻塞会话（SID=191）放置的所有锁，这些锁导致了被阻塞会话（SID=197）的“挂起”情况。\n\n\n## 工作原理\n\n通常，当你的数据库用户抱怨性能问题时，你可能会查询\
  \ `V$SESSION` 或 `V$LOCK` 视图，但可能找不到任何有用的信息，因为等待问题可能在那时已经解决了。在这种情况下，你可以查询 `V$ACTIVE_SESSION_HISTORY`\
  \ 视图，以找出过去 60 分钟内数据库中发生的情况。该视图提供了访问活动会话历史（ASH）的窗口，这是一个内存缓冲区，每秒收集所有活动会话的信息。`V$ACTIVE_SESSION_HISTORY`\
  \ 为每个活动会话包含一行，并且由于 ASH 是一个循环缓冲区，更新的信息会不断覆盖旧数据。\n\n我们通过创建正在讨论的场景，然后逐步处理该场景，可以最好地演示解决方案。首先创建一个包含几列的测试表：\n\
  \n```sql\nSQL> create table test (name varchar(20), id number (4));\nTable created.\n\
  SQL>\n```\n\n向测试表中插入一些数据。\n\n```sql\nSQL> insert into test values ('alapati','9999');\n\
  1 row created.\nSQL> insert into test values ('sam', '1111');\n1 row created.\n\
  SQL> commit;\nCommit complete.\nSQL>\n```\n\n在会话 1（当前会话）中，对表 `TEST` 执行 `SELECT *\
  \ FOR UPDATE` 语句——这将锁住该表。\n\n```sql\nSQL> select * from test for update;\nSQL>\n\
  ```\n\n在另一个不同的会话，即会话 2 中，执行以下 `UPDATE` 语句：\n\n```sql\nSQL> update test set name='Jackson'\
  \ where id = '9999';\n```\n\n会话 2 现在会挂起，因为它被会话 1 发出的 `SELECT FOR UPDATE` 语句阻塞了。现在继续从会话\
  \ 1 执行 `ROLLBACK` 或 `COMMIT`：\n\n```sql\nSQL> rollback;\nRollback complete.\nSQL>\n\
  ```\n\n当你执行 `ROLLBACK` 语句时，会话 1 会释放它当前在表 `TEST` 上持有的所有锁。你会注意到，此前一直被阻塞的会话 2 立即处理了之前处于“挂起”状态、等待会话\
  \ 2 持有的锁的 `UPDATE` 语句。\n\n因此，我们确信在你的数据库中曾短暂地存在一个阻塞锁，其中会话 1 是阻塞会话，会话 2 是被阻塞会话。然而，你无法在\
  \ `V$LOCK` 视图中找到任何证据，因为该视图以及其他所有与锁相关的视图只显示当前持有的锁的详细信息。这正是活动会话历史视图大放异彩的地方——它们可以为你提供最近持有但已在你通过查询\
  \ `V$LOCK` 或 `V$SESSION` 视图查看之前就消失的锁的信息。\n\n![images](img/square.jpg)\n\n```\n注意：执行本解决方案部分中所示的活动会话历史（ASH）查询时请小心。正如第一列（`SAMPLE_TIME`）所示，ASH\
  \ 会每秒记录一次会话信息。如果你在很长的时间范围内执行此查询，可能会得到大量只是重复相同锁定信息的输出。为了处理这些输出，你可以在 SQL*Plus 中指定\
  \ `SET PAUSE ON` 选项。这将使输出在每页暂停，使你能够滚动浏览几行输出以识别问题。\n```\n\n使用以下查询找出此会话在过去一小时内等待过的等待事件。\n\
  \n```sql\nSQL> select sample_time, event, wait_time\n     from v$active_session_history\n\
  \     where session_id = 81\n     and session_serial# = 422;\n```\n\n列 `SAMPLE_TIME`\
  \ 让你精确知道此会话由于特定等待事件而遭受性能打击的时间。你可以通过结合使用 `V$SQL` 视图和 `V$ACTIVE_SESSION_HISTORY` 视图，来识别该时间段内此会话正在执行的实际\
  \ SQL 语句，如下所示：\n\n```sql\nSQL> select sql_text, application_wait_time\n     from\
  \ v$sql\n     where sql_id in ( select sql_id from v$active_session_history\n  \
  \   where sample_time = '08-MAR-11 05.00.52.00 PM'\n     and session_id = 68 and\
  \ session_serial# = 422);\n```\n\n或者，如果你已经从 `V$ACTIVE_SESSION_HISTORY` 视图中获得了 `SQL_ID`，你可以从\
  \ `V$SQLAREA` 视图中获取 `SQL_TEXT` 列的值，如下所示：\n\n```sql\nSQL> select sql_text FROM v$sqlarea\
  \ WHERE sql_id = '7zfmhtu327zm0';\n```\n\n一旦你有了 `SQL_ID`，也容易提取此 SQL 语句的 SQL 执行计划，通过执行以下基于\
  \ `DBMS_XPLAN` 包的查询：\n\n```sql\nSQL> select * FROM table(dbms_xplan.display_awr('7zfmhtu327zm0'));\n\
  ```\n\n后台进程 MMON 每小时在创建 AWR 快照时会将 ASH 数据刷新到磁盘。当 MMON 将 ASH 数据刷新到磁盘时会发生什么？嗯，你将无法再使用\
  \ `V$ACTIVE_SESSION_HISTORY` 视图查询更早的数据。不用担心，因为你仍然可以使用 `DBA_HIST_ACTIVE_SESS_HISTORY`\
  \ 视图来查询旧数据。此视图的结构与 `V$ACTIVE_SESSION_HISTORY` 视图类似。`DBA_HIST_ACTIVE_SESS_HISTORY`\
  \ 视图显示了近期系统活动的内存中活动会话历史内容的历史记录。你还可以查询 `V$SESSION_WAIT_HISTORY` 视图来检查会话仍处于活动状态时的最后十个等待事件。与只显示最近一次等待信息的\
  \ `V$SESSION` 和 `V$SESSION_WAIT` 视图相比，此视图为最近的等待事件提供了更可靠的信息。这是一个使用 `V$SESSION_WAIT_HISTORY`\
  \ 视图的典型查询。\n\n```sql\nSQL> select sid from v$session_wait_history\n     where wait_time\
  \ = (select max(wait_time) from v$session_wait_history);\n```\n\n`WAIT_TIME` 列下的任何非零值代表此会话为最后一个等待事件所等待的时间。此列值为零表示会话当前正在等待一个等待事件。\n\
  \n### 5-18. 分析数据库中最近的等待事件\n\n#### 问题\n\n你想找出最近数据库中最重要的等待，以及造成这些等待的主要用户、SQL 语句和对象。\n\
  \n#### 解决方案\n\n查询 `V$ACTIVE_SESSION_HISTORY` 视图以获取最常见的等待事件，以及造成这些等待的 SQL 语句、数据库对象和用户的信息。以下是一些有用的查询。\n\
  \n要找出过去 15 分钟内最重要的等待事件，请执行以下查询：\n\n```sql\nSQL> select event,\n     sum(wait_time\
  \ +\n     time_waited) total_wait_time\n     from v$active_session_history\n   \
  \  where sample_time between\n     sysdate – 30/2880 and sysdate\n     group by\
  \ event\n     order by total_wait_time desc\n```\n\n要找出过去 15 分钟内哪些用户经历的等待最多，请执行以下查询：\n\
  \n```sql\nSQL> select s.sid, s.username,\n     sum(a.wait_time +\n     a.time_waited)\
  \ total_wait_time\n     from v$active_session_history a,\n     v$session s\n   \
  \  where a.sample_time between sysdate – 30/2880 and sysdate\n     and a.session_id=s.sid\n\
  \     group by s.sid, s.username\n     order by total_wait_time desc;\n```\n\n执行以下查询以找出等待最多的对象。\n\
  \n```sql\nSQL> select a.current_obj#, o.object_name, o.object_type, a.event,\n \
  \    sum(a.wait_time +\n     a.time_waited) total_wait_time\n     from v$active_session_history\
  \ a,\n     dba_objects d\n     where a.sample_time between sysdate – 30/2880 and\
  \ sysdate\n     and a.current_obj# = d.object_id\n     group by a.current_obj#,\
  \ d.object_name, d.object_type, a.event\n     order by total_wait_time;\n```\n\n\
  你可以用此查询识别在过去 15 分钟内等待时间最长的 SQL 语句。\n\n```sql\nSQL> select a.user_id,u.username,s.sql_text,\n\
  \     sum(a.wait_time + a.time_waited) total_wait_time\n     from v$active_session_history\
  \ a,\n     v$sqlarea s,\n     dba_users u\n     where a.sample_time between sysdate\
  \ – 30/2880 and sysdate\n     and a.sql_id = s.sql_id\n     and a.user_id = u.user_id\n\
  \     group by a.user_id,s.sql_text, u.username;\n```\n\n\n#### 工作原理\n\n“解决方案”部分展示了如何将\
  \ `V$ACTIVE_SESSION_HISTORY` 视图与其他视图（如 `V$SESSION`、`V$SQLAREA`、`DBA_USERS` 和 `DBA_OBJECTS`）关联起来，以准确找出过去几分钟内导致等待事件数量最多的原因，或者谁等待得最久。在诊断“实时”数据库性能问题时，这些信息极具价值。\n\
  \n### 5-19. 识别因锁定导致的等待时间\n\n#### 问题\n\n你希望识别出会话因锁定问题而花费的总等待时间。\n\n#### 解决方案\n\n\
  你可以使用以下查询来识别（并量化）由于表行锁定引起的等待。由于该查询按等待时间对事件排序，你可以快速查看哪种类型的等待事件在你的实例中占据了大部分等待。\n\n\
  ```sql\nselect wait_class, event, time_waited / 100 time_secs\nfrom v$system_event\
  \ e\nwhere e.wait_class <> 'Idle' AND time_waited > 0\nunion\nselect 'Time Model',\
  \ stat_name NAME,\nround ((value / 1000000), 2) time_secs\nfrom v$sys_time_model\n\
  where stat_name NOT IN ('background elapsed time', 'background cpu time')\norder\
  \ by 3 desc;\n```\n\n```\nWAIT_CLASS                                EVENT      \
  \                      TIME_SECS\n-------------------------       ------------------------------\
  \   --------------\nSystem I/O                      log file parallel write    \
  \            45066.32\nSystem I/O                      control file sequential read\
  \           23254.41\nTime Model                      DB time                  \
  \              11083.91\nTime Model                      sql execute elapsed time\
  \                7660.04\nConcurrency                     latch: shared pool   \
  \                   5928.73\nApplication                     enq: TX - row lock\
  \ contention           3182.06\n…\nSQL>\n```\n\n在此示例中，等待事件 `enq: TX - row lock contention`\
  \ 揭示了由于行锁排队等待事件导致的总时间。请注意，共享池闩锁事件被归类在 **Concurrency**（并发）等待类下，而排队 `TX - row lock\
  \ contention` 事件则被归类为 **Application**（应用程序）类等待事件。\n\n#### 工作原理\n\n“解决方案”部分中的查询关联了\
  \ `V$SYSTEM_EVENT` 和 `V$SYS_TIME_MODEL` 视图，以向你显示因各种等待事件而导致的总等待时间。在我们的场景中，我们关注的是因排队锁定导致的总等待时间。如果你对特定会话的总等待时间感兴趣，可以使用一些不同的\
  \ `V$` 视图来找出会话处于等待状态的时间，但我们推荐使用 `V$SESSION` 视图，因为它显示了阻塞会话和被阻塞会话的各种有用属性。以下是一个示例，展示如何找出一个会话被另一个会话阻塞了多长时间。\n\
  \n```sql\nSQL> select sid, username, event, blocking_session,\n    seconds_in_wait,\
  \ wait_time\n    from v$session where state in ('WAITING');\n```\n\n该查询揭示了关于 SID\
  \ 为 81、处于 `WAITING` 状态的会话的以下信息：\n\n`SID  : 81` （这是被阻塞的会话）\n`username: SH` （当前被阻塞的用户）\n\
  `event: TX - row lock contention` （显示了确切的锁竞争类型）\n`blocking session: 68` （这是“阻塞者”）\n\
  `seconds_in_wait: 3692` （被阻塞会话在此状态下的等待时长）\n\n查询显示，SID 为 81 的用户 SH 已被阻塞了将近一个小时（3692\
  \ 秒）。用户 SH 显示正在等待一个当前被会话 68 锁定的表的锁。虽然 `V$SESSION` 视图对于识别阻塞和被阻塞会话非常有用，但它无法告诉你涉及阻塞表的\
  \ SQL 语句。通常，识别出涉及阻塞情况的 SQL 语句有助于找出该语句导致锁定行为的确切原因。要找出涉及的实际 SQL 语句，你必须关联 `V$SESSION`\
  \ 和 `V$SQL` 视图，如下所示。\n\n```sql\nSQL> select sid, sql_text\n     from v$session s,\
  \ v$sql q\n     where sid in (68,81)\n     and (\n     q.sql_id = s.sql_id or  q.sql_id\
  \ = s.prev_sql_id)\nSQL> /\n```\n\n```\n      SID                       SQL_TEXT\n\
  -------------     -----------------------------------------------------\n      68\
  \           select * from test for update\n      81           update hr.test set\
  \ name='nalapati' where user_id=1111\nSQL>\n```\n\n查询的输出显示，会话 81 被阻塞是因为它试图更新表中的一行，而该表已被会话\
  \ 68 使用 `SELECT … FOR UPDATE` 语句锁定。在这种情况下，如果你发现有很长的用户会话队列被另一个会话阻塞，你必须终止阻塞会话，以便其他会话可以继续处理它们的工作。在这些情况下，你还会在数据库中看到较高的活动用户计数——终止阻塞会话为你提供了解决由排队锁引起的争用的直接方法。之后，你可以调查阻塞发生的原因，以便预防这些情况。\n\
  \n对于任何会话，你可以通过执行以下查询来识别该会话在每个等待类上花费的总等待时间：\n\n```sql\nSQL> select wait_class_id,\
  \ wait_class,\n     total_waits, time_waited\n     from v$session_wait_class\n \
  \    where sid = <SID>;\n```\n\n如果你发现，例如，此会话在应用程序等待类（此类的等待类 ID 为 4217450380）中承受了非常高的等待次数，你可以使用\
  \ `V$SYSTEM_EVENT` 视图执行以下查询，以找出具体是哪些等待造成的：\n\n```sql\nSQL> select event, total_waits,\
  \ time_waited\n     from v$system_event e, v$event_name n\n     where n.event_id\
  \ = e.event_id\n     and e.wait_class_id = 4217450380;\n```\n\n```\nEVENT      \
  \                                    TOTAL_WAITS                 TIME_WAITED\n----------------------\
  \        ----------------------     --------------------\nenq: TM - contention \
  \                                    82                          475\n…\nSQL>\n\
  ```\n\n在我们的示例中，应用程序类（ID 4217450380）中的等待是由于锁定争用造成的，如等待事件 `enq:TM - contention` 所揭示。你可以进一步使用\
  \ `V$EVENT_HISTOGRAM` 视图，找出自实例启动以来，会话为特定等待事件等待的次数和时长。以下是找出排队锁等待模式所需的查询：\n\n```sql\n\
  SQL> select wait_time_milli bucket, wait_count\n     from v$event_histogram\n  \
  \   where event = 'enq: TX - row lock contention';\n```\n\n由于锁定行为导致的高数量排队等待通常是由有缺陷的应用程序设计引起的。当应用程序对同一行或一组行执行多次更新时，你有时会遇到这种情况。由于这种类型的高锁定等待是由设计不当的应用程序造成的，你自己能做的来减少这些等待的事情不多。告知你的应用团队这些等待发生的原因，并请他们考虑修改应用程序逻辑以避免这些等待。\n\
  \n以下四种 DML 语句中的任何一种都可能导致锁争用：`INSERT`、`UPDATE`、`DELETE` 和 `SELECT FOR UPDATE`。`INSERT`\
  \ 语句会等待锁，因为另一个会话正试图插入具有相同值的行。当你有一个具有主键或唯一约束的表，并且由应用程序生成键值时，通常会发生这种情况。请改用 Oracle\
  \ 序列来生成键值，以避免此类锁定情况。你可以在 `SELECT FOR UPDATE` 语句中指定 `NOWAIT` 选项，以消除由于锁导致的会话阻塞。你还可以使用\
  \ `SELECT FOR UPDATE NOWAIT` 语句，以避免会话在发出 `UPDATE` 或 `DELETE` 语句时等待锁。`SELECT FOR\
  \ UPDATE NOWAIT` 语句会锁定行而不等待。\n\n### 5-20. 最小化闩锁争用\n\n\n## 问题\n\n您遇到了大量的**闩锁等待**，并希望减少**闩锁争用**。\n\
  \n## 解决方案\n\n严重的**闩锁争用**会显著拖慢您的数据库。当您处理**闩锁争用**问题时，首先执行以下查询，以查明**闩锁**的具体类型以及每次等待导致的总等待时间。\n\
  \n```\nSQL> select event, sum(P3), sum(seconds_in_wait) seconds_in_wait\n     from\
  \ v$session_wait\n     where event like 'latch%'\n     group by event;\n```\n\n\
  前面的查询显示当前此会话正在等待的**闩锁**。要查明整个实例为各种**闩锁**等待的总时间，请执行以下 SQL 语句。\n\n```\nSQL> select\
  \ wait_class, event, time_waited / 100 time_secs\n     from v$system_event e\n \
  \    where e.wait_class <> 'Idle' AND time_waited > 0\n     union\n     select 'Time\
  \ Model', stat_name NAME,\n     round ((value / 1000000), 2) time_secs\n     from\
  \ v$sys_time_model\n     where stat_name not in ('background elapsed time', 'background\
  \ cpu time')\n     order by 3 desc;\n```\n\n```\nWAIT_CLASS                    \
  \                     EVENT                               TIME_SECS\n--------------------\
  \ ----------------------------- -----------------\nConcurrency              library\
  \ cache pin                           622.24\nConcurrency              latch: library\
  \ cache                        428.23\nConcurrency              latch: library cache\
  \ lock                    93.24\nConcurrency              library cache lock   \
  \                       24.20\nConcurrency              latch: library cache pin\
  \                    60.28\n-\n```\n\n查询的部分输出显示了与**闩锁**相关的等待事件，这些事件属于 `Concurrency`\
  \ 等待类。\n\n您还可以查看 AWR 报告中的前五个等待事件，以确认**闩锁争用**是否是个问题，如下所示：\n\n```\nEvent         \
  \                          Waits           Time (s)     (ms)      Time      Wait\
  \ Class\n------------------------   ------------    ----------    -------   --------\
  \   ------------\ndb file sequential read      42,005,780       232,838        \
  \  6       73.8      User I/O\nCPU time                                    124,672\
  \                  39.5      Other\nlatch free                   11,592,952    \
  \    76,746          7       24.3      Other\nwait list latch free            107,553\
  \         2,088         19        0.7      Other\nlatch: library cache         \
  \ 1,135,976         1,862          2        0.6      Concurrency\n```\n\n### 常见的闩锁等待类型及减少方法\n\
  \n以下是最常见的 Oracle **闩锁**等待类型以及您可以如何减少它们。\n\n> `Shared pool` 和 `library latches`：这些主要由数据库反复执行几乎相同但略有变化的\
  \ SQL 语句引起。例如，数据库可能执行一个 SQL 语句 10,000 次，每次为某个变量使用不同的值。所有此类情况的解决方案是使用**绑定变量**。应用程序在每次执行后显式关闭所有**游标**也可能导致这种等待。其解决方案是设置\
  \ `CURSOR_SPACE_FOR_TIME` 初始化参数。**共享池**太小也可能导致**闩锁**问题，因此请检查您的 SGA 大小。\n> \n> `Cache\
  \ buffers LRU chain`：这些**闩锁**事件通常由过度的**缓冲区缓存**使用引起，可能由过多的物理读以及逻辑读导致。要么是数据库在执行大型**全表扫描**，要么是在执行大型**索引范围扫描**。这类**闩锁**等待的常见原因是缺少索引或存在非选择性索引。另外，请检查是否需要增加**缓冲区缓存**的大小。\n\
  > \n> `Cache buffer chains`：这些等待是由于一个或多个**热点块**被反复访问造成的。应用程序代码通过更新表的行来生成序列号，而不是使用\
  \ Oracle **序列**，可能会导致此类**热点块**。当太多进程使用相似的谓词扫描一个非选择性索引时，您也可能会看到 `cache buffer chains`\
  \ 等待事件。\n\n### 优化 Oracle 序列\n\n此外，如果您正在使用 Oracle **序列**，请使用更大的 `CACHE` 设置重新创建它们，并尽量避免使用\
  \ `ORDER` 子句。序列的 `CACHE` 子句决定了数据库必须在 SGA 中缓存的序列值数量。如果您的数据库正在处理大量的插入和更新，请考虑增加缓存大小以避免对序列值的**争用**。默认情况下，缓存设置为\
  \ 20 个值。如果请求值的速度足够快以至于经常耗尽缓存，就可能导致**争用**。如果您正在处理 RAC 环境，使用 `NOORDER` 子句将防止由于强制排队序列值而导致的入队**争用**。\n\
  \n\n\n#### 工作原理\n\nOracle 使用称为锁存器（latches）的内部锁来保护各种内存结构。当服务器进程尝试获取锁存器但失败时，该尝试会被计为一次\
  \ `latch free wait event`。Oracle 并非将所有锁存器等待归为一个 `latch free wait event`。Oracle 确实使用了一个通用的\
  \ `latch free wait event`，但这仅用于次要的、与锁存器相关的等待事件。对于最常见的锁存器，Oracle 使用了各种锁存器等待事件的子组，其名称即为等待事件类型。你可以通过查看锁存器事件名称来识别确切的锁存器类型。例如，锁存器事件\
  \ `latch: library cache` 表示库缓存锁存器的争用。同样，`latch: cache buffer chains` 事件表示缓冲区缓存的争用。\n\
  \nOracle 使用各种类型的锁存器来防止多个会话同时更新 `SGA` 的相同区域。各种数据库操作要求会话读取或更新 `SGA`。例如，当会话将数据块从磁盘读入\
  \ `SGA` 时，它必须修改缓冲区缓存中最近最少使用的链。同样，当数据库解析 `SQL` 语句时，该语句必须被添加到 `SGA` 的 `library cache`\
  \ 组件中。Oracle 使用锁存器来防止数据库操作相互干扰并破坏 `SGA`。\n\n数据库操作需要获取并持有一个锁存器的时间非常短暂，通常只持续几纳秒。如果会话最初因锁存器已被占用而获取失败，它会尝试几次，然后进入“睡眠”。如果会话仍然无法获得所需的锁存器，它会再次醒来并尝试几次，然后再次进入睡眠模式。每次会话进入睡眠模式，其停留时间会变长，从而增加了后续尝试获取锁存器的时间间隔。因此，如果你的数据库中锁存器争用严重，将导致响应时间和吞吐量的严重下降。\n\
  \n即使在一个设计良好、运行在极快硬件上的数据库中看到锁存器争用，也不必感到惊讶。某种程度的锁存器争用，尤其是 `cache buffers chain` 锁存器事件，几乎是不可避免的。你只需在锁存器等待时间极高并拖慢数据库性能时才需要关注。\n\
  \n由 `library cache` 锁存器以及 `shared pool` 锁存器引起的争用，通常是因为应用程序未使用绑定变量。如果你的应用程序无法重新编码以加入绑定变量，也并非全无办法。你可以设置\
  \ `CURSOR_SHARING` 参数，以强制 Oracle 使用绑定变量，即使你的应用程序在代码中没有指定它们。你可以选择将此参数设置为 `FORCE`\
  \ 或 `SIMILAR`，以强制用绑定变量替换硬编码的变量值。此参数的默认设置为 `EXACT`，这意味着数据库不会用绑定变量替换字面值。当你将 `CURSOR_SHARING`\
  \ 参数设置为 `FORCE` 时，Oracle 会将所有字面量转换为绑定变量。`SIMILAR` 设置会导致语句仅在不会改变其执行计划的情况下使用绑定变量。因此，`SIMILAR`\
  \ 设置似乎是强制数据库使用绑定变量而非字面量更安全的方式。尽管有一些关于将 `CURSOR_SHARING` 参数设置为 `FORCE` 的安全性的担忧，但我们尚未发现使用此设置的实际问题。一旦你将\
  \ `CURSOR_SHARING` 参数设置为 `FORCE` 或 `SIMILAR`，`library cache` 争用通常就会消失。`CURSOR_SHARING`\
  \ 参数是 Oracle 的少数“银弹”之一，能通过消除锁存器争用立即提升数据库性能。在处理 `library cache` 锁存器争用时，请放心使用它。\n\n\
  `cache buffer chains` 锁存器争用通常是由于会话反复读取相同的数据块造成的。首先识别出导致最高 `cache buffers chain`\
  \ 锁存器等待的 `SQL` 语句，看看是否能对其进行优化。如果这不能减少锁存器争用，你必须识别出被反复读取的实际热点数据块。\n\n如果热点数据块属于索引段，你可以考虑对表进行分区并使用本地索引。例如，哈希分区方案可以让你将负载分散到多个分区索引上。你也可以考虑将表转换为基于索引列的哈希集群。这样，你就可以完全避免使用索引。如果热点数据块属于表段，你仍然可以考虑对表进行分区以将负载分散到各个分区中。你可能还需要重新审视应用程序设计，以了解为什么相同的块被反复访问，从而导致它们变得“热”。\n\
  \n### 5-21. 通过 Oracle Enterprise Manager 管理锁\n\n#### 问题\n\n你希望了解如何通过 Oracle Enterprise\
  \ Manager Database Control GUI 界面处理锁问题。\n\n#### 解决方案\n\n你可以使用 Oracle Enterprise\
  \ Manager (`OEM`) `DB Control` 来识别和解决锁情况，而不是执行多个 `SQL` 查询来快速消失的锁定事件。你可以找到实例中当前所有的锁，包括阻塞的和被阻塞的会话——你也可以从\
  \ `OEM` 中终止阻塞会话。\n\n以下是你可以通过 `OEM` 管理锁问题的方式：\n\n*   在 `DB Control` 的主页中，你会在“警报”表中看到锁信息。查找“用户阻塞”类别以识别阻塞会话。你需要查找的警报名称是\
  \ `Blocking Session Count`。点击此警报显示的消息链接（例如“Session 68 is blocking 12 other sessions”）将带你转到\
  \ `Blocking Session Count` 页面。在此页面的“警报历史”表中，你可以查看有关阻塞和被阻塞会话的详细信息。\n\n    同样在主页中，在“相关警报”下，你会找到“ADDM\
  \ 性能”表。锁问题通过存在 `Row Lock Waits` 链接来揭示。点击 `Row Lock Waits` 链接转到 `Row Lock Waits`\
  \ 页面。此页面（如 图 5-1 所示）让你可以查看所有被发现正在等待行锁的 `SQL` 语句。\n\n    ![images](img/0501.jpg)\n\
  \n    **图 5-1.** `OEM` 中的行锁等待页面\n\n*   你也可以通过点击主页中的“性能”选项卡来查看阻塞会话详情。点击“其他监控链接”部分下的\
  \ `Blocking Sessions` 转到 `Blocking Sessions` 页面。`Blocking Sessions` 页面包含阻塞会话以及被阻塞会话的详细信息。你可以看到确切的等待事件，当一个会话阻塞另一个时，该事件将是\
  \ `enq: TX row lock contention`。通过点击此页面上的 `SQL ID` 链接，你可以找出涉及阻塞会话的确切 `SQL` 语句。你可以通过点击页面左上角的\
  \ `Kill Session` 按钮从此页面终止阻塞会话。\n*   在“其他监控链接”部分中还有另一个名为 `Instance Locks` 的链接，它会带你转到\
  \ `Instance Locks` 页面。`Instance Locks` 页面显示阻塞和被阻塞会话的会话详细信息。你可以点击 `SQL ID` 链接来查看阻塞者和被阻塞会话当前正在执行的\
  \ `SQL`。你还可以找出被锁定对象的名称。你可以通过点击 `Kill Session` 按钮来终止阻塞会话。\n\n\n#### 工作原理\n\n你不一定需要执行多个\
  \ SQL 脚本来分析数据库中的锁行为。我们之前在各种案例中展示的 SQL 代码是为了解释 Oracle 锁机制如何工作。在日常工作中，直接使用 **Oracle\
  \ 企业管理器**（OEM）来快速找出谁在阻塞会话以及原因，通常更为实用和高效。\n\n### 5-22. 使用 Oracle 企业管理器分析等待事件\n\n\
  #### 问题\n\n你希望使用 Oracle 企业管理器来管理数据库实例中的等待事件。\n\n#### 解决方案\n\nOEM 界面让你能够快速分析数据库中的当前等待事件，而无需运行\
  \ SQL 脚本。在主页中，“活动会话”图显示了等待、I/O 和 CPU 的相对比例。点击此图中的“等待”链接，可以查看“活动会话”图。在图形右侧，你会看到诸如“并发”、“应用程序”、“集群”、“管理”、“用户\
  \ I/O”等链接。点击这些链接中的每一个，都将带你进入一个页面，显示所有正在等待该等待类别下事件的活动会话。我们在此总结了这些最重要的等待类别下的等待事件。\n\
  \n> `用户 I/O`：这显示诸如 `db file scattered read`、`db file sequential read`、`direct path\
  \ read`、`direct path write` 和 `read by other session` 等等待事件。你可以点击各种等待的链接以获取等待事件的图表。例如，点击“db\
  \ file scattered read”链接将带你进入“等待事件：db file scattered read”页面的直方图。\n> \n> `系统 I/O`：这显示由于\
  \ `db file parallel write`、`log file parallel write`、`control file parallel write`\
  \ 和 `control file sequential read` 等事件导致的等待。\n> \n> `应用程序`：这显示正在等待诸如队列锁等事件的活动会话。\n\
  \n#### 工作原理\n\n一旦你理解了 Oracle 等待接口背后的理论，就可以使用 OEM 快速分析数据库中的当前等待事件。你不仅能找出哪些等待事件正在对性能产生不利影响，还能找出涉及哪些\
  \ SQL 语句和用户。你可以从“活动会话”页面深入钻取的所有详情页，都显示了自实例启动以来特定等待事件类别的图表。这些页面还包含名为“Top SQL”和“Top\
  \ Users”的表，它们精确地显示了哪些 SQL 和用户受到了等待事件的影响。\n\n## 第 6 章 分析操作系统性能\n\n解决数据库性能问题有时需要使用操作系统（OS）实用程序。这些工具通常能提供有助于隔离数据库性能问题的信息。考虑以下情况：\n\
  \n*   你在一台服务器上运行多个数据库和多个应用程序，并希望使用操作系统实用程序来确定哪个数据库（及相应的进程）消耗了最多的操作系统资源。当一个数据库应用程序消耗资源到导致该服务器上其他数据库性能变差时，这种方法非常有价值。\n\
  *   你需要验证数据库服务器在 CPU、内存、磁盘 I/O 和网络带宽方面是否足以应对当前的应用程序工作负载。\n*   需要进行分析以确定服务器在何时将无法处理更大（未来）的工作负载。\n\
  *   你已经使用数据库工具识别了系统瓶颈，并希望通过操作系统工具再次检查分析结果。\n\n在这些场景中，为了有效地进行分析、调优和故障排除，你将需要采用操作系统工具来识别资源密集型进程。此外，如果你的服务器上运行着多个数据库和应用程序，在排查性能问题时，通常更有效的方法是首先确定哪个数据库和进程消耗了最多的资源。操作系统实用程序有助于精确定位瓶颈是\
  \ CPU、内存、磁盘 I/O 还是网络问题。在 Linux/Unix 环境中，一旦获得了操作系统标识符，你就可以查询数据库以显示任何相应的数据库进程和 SQL\
  \ 语句。\n\n看一下图 6-1。该流程图详细描述了 DBA 在诊断服务器性能缓慢时所遵循的决策过程以及相关的 Linux/Unix 操作系统工具。例如，当你遇到性能问题时，一个常见的初步任务是登录到服务器，并使用\
  \ `df` 和 `du` 等操作系统实用程序快速检查磁盘空间问题。挂载点已满是导致数据库不可用的常见原因。\n\n![images](img/0601.jpg)\n\
  \n`图 6-1. 排查性能低下问题`\n\n检查完磁盘空间问题后，下一个任务是使用 `vmstat`、`top` 或 `ps` 等操作系统实用程序来确定你遇到了哪种类型的瓶颈。例如，性能缓慢是否与磁盘\
  \ I/O、CPU、内存或网络问题有关？确定瓶颈类型后，下一步是确定是否是数据库进程导致了瓶颈。\n\n`ps` 命令对于显示消耗资源会话的进程名称和 ID 非常有用。当你在一台服务器上运行多个数据库时，你可以从进程名称确定该进程与哪个数据库相关联。一旦你有了进程\
  \ ID 和关联的数据库，就可以登录到数据库并运行 SQL 查询，以确定该进程是否与某个 SQL 查询相关。如果问题是与 SQL 相关的，那么你可以进一步确定有关该\
  \ SQL 查询的详细信息以及可能在哪里进行调优。\n\n图 6-1 总结了排查性能问题的复杂性。准确找出性能问题的原因并推荐有效的解决方案，往往说起来容易做起来难。在尝试解决问题时，有些路径会导致相对高效且成本低廉的解决方案，例如终止失控的操作系统进程或重新生成最新的统计信息。而其他决策可能会让你得出结论，需要增加昂贵的硬件或重新设计系统。你的性能调优结论可能对公司产生长期的财务影响，从而影响你保住工作的能力。显然，你希望专注于性能问题的根本原因，而不仅仅是处理症状。如果你能持续识别性能问题的根本原因并推荐有效且廉价的解决方案，这将极大地改善你的就业机会。\n\
  \n本章的重点是提供详细的示例，展示如何使用 Linux/Unix 操作系统实用程序来识别服务器性能问题。这些实用程序对于提供数据库内部工具之外的诊断信息非常宝贵。操作系统实用程序就像是额外的一双眼睛，帮助精准定位数据库性能低下的原因。\n\
  \n### 6-1. 检测磁盘空间问题\n\n#### 问题\n\n用户报告说无法连接到数据库。你登录到数据库服务器，尝试连接 SQL*Plus，收到此错误：\n\
  \n```\nORA-09817: Write to audit file failed.\nLinux Error: 28: No space left on\
  \ device\nAdditional information: 12\n```\n\n你希望快速确定是否是某个挂载点已满，以及该挂载点内最大的文件位于何处。\n\
  \n\n### 磁盘空间问题解决方案\n\n在 Linux/Unix 环境中，使用 `df` 命令来识别磁盘空间问题。此示例使用 `-h` 选项来格式化输出，以便以兆字节或千兆字节报告空间使用情况：\n\
  ```\n$ df -h\n```\n\n以下是一些示例输出：\n```\nFilesystem            Size  Used Avail Use%\
  \ Mounted on\n/dev/mapper/VolGroup00-LogVol00\n                       29G   28G\
  \     0 100% /\n/dev/sda1              99M   19M   75M  20% /boot\n```\n\n以上输出表明，此服务器上的根\
  \ (`/`) 文件系统已满。在这种情况下，一旦识别出已满的挂载点，就可以使用 `find` 命令来定位目录结构中的最大文件。此示例导航到 `ORACLE_HOME`\
  \ 目录，然后连接 `find`、`ls`、`sort` 和 `head` 命令来识别该目录下最大的文件：\n```\n$ cd $ORACLE_HOME\n\
  $ find . -ls | sort -nrk7 | head -10\n```\n\n如果您有一个已满的挂载点，还应考虑查找以下类型的可以移动或删除的文件：\n\
  \n*   删除数据库跟踪文件\n*   删除大型 Oracle Net 日志文件\n*   移动、压缩或删除旧的归档重做日志文件\n*   删除旧的安装文件或二进制文件\n\
  *   如果数据文件有大量可用空间，请考虑将其调整为更小的大小\n\n另一种识别磁盘空间使用情况的方法是查找给定目录下占用空间最大的目录。此示例结合使用 `du`、`sort`\
  \ 和 `head` 命令来显示当前工作目录下最大的十个目录：\n```\n$ du -S . | sort -nr | head -10\n```\n\n前面的命令对于识别可能没有大文件但有很多占用空间的小文件（如跟踪文件）的目录特别有用。\n\
  \n![images](img/square.jpg) **注意** 在 Solaris Unix 系统上，前面的命令需要使用带 `-o` 选项的 `du`。\n\
  \n### 工作原理\n\n当数据库因磁盘空间很少或没有剩余空间而挂起时，您应该快速找到可以安全删除而不影响数据库可用性的文件。在 Linux/Unix 服务器上，`df`、`find`\
  \ 和 `du` 命令特别有用。\n\n处理生产数据库服务器时，强烈建议主动监控磁盘空间，以便在挂载点即将满时收到警告。下面列出了一个简单的 shell 脚本，用于监控给定挂载点的磁盘空间：\n\
  ```\n#!/bin/bash\nmntlist=\"/orahome /oraredo1 /oraarch1 /ora01 /oradump01 /\"\n\
  for ml in $mntlist\ndo\necho $ml\nusedSpc=$(df -h $ml | awk '{print $5}' | grep\
  \ -v capacity | cut -d \"%\" -f1 -)\nBOX=$(uname -a | awk '{print $2}')\n#\ncase\
  \ $usedSpc in\n[0-9])\narcStat=\"relax, lots of disk space: $usedSpc\"\n;;\n[1-7][0-9])\n\
  arcStat=\"disk space okay: $usedSpc\"\n;;\n[8][0-9])\narcStat=\"space getting low:\
  \ $usedSpc\"\n;;\n[9][0-9])\narcStat=\"warning, running out of space: $usedSpc\"\
  \necho $arcStat $ml | mailx -s \"space on: $BOX\" dkuhn@oracle.com\n;;\n[1][0][0])\n\
  arcStat=\"update resume, no space left: $usedSpc\"\necho $arcStat $ml | mailx -s\
  \ \"space on: $BOX\" dkuhn@oracle.com\n;;\n*)\narcStat=\"huh?: $usedSpc\"\nesac\n\
  #\nBOX=$(uname -a | awk '{print $2}')\necho $arcStat\n#\ndone\n#\nexit 0\n```\n\n\
  您必须修改脚本以匹配您的环境。例如，脚本的第二行指定了被监控机器上的挂载点：\n```\nmntlist=\"/orahome /oraredo1 /oraarch1\
  \ /ora01 /oradump01 /\"\n```\n\n这些挂载点应与 `df -h` 命令输出中列出的挂载点匹配。对于运行此脚本的 Solaris 机器，以下是\
  \ `df` 的输出：\n```\nFilesystem             size   used  avail capacity  Mounted on\n\
  /                      35G   5.9G    30G    17%    /\n/ora01                 230G\
  \   185G    45G    81%    /ora01\n/oraarch1              100G    12G    88G    13%\
  \    /oraarch1\n/oradump01             300G    56G   244G    19%    /oradump01\n\
  /orahome                20G    15G   5.4G    73%    /orahome\n/oraredo1        \
  \       30G   4.9G    25G    17%    /oraredo1\n```\n\n另外，根据您使用的 Linux/Unix 版本，您还必须修改这一行：\n\
  ```\nusedSpc=$(df -h $ml | awk '{print $5}' | grep -v capacity | cut -d \"%\" -f1\
  \ -)\n```\n\n前面的代码行依赖于 `df` 命令的输出，该输出可能因操作系统供应商和版本而有所不同。例如，在一个 Linux 系统上，`df` 的输出可能跨越两行并报告\
  \ `Use%` 而不是 `capacity`，因此在此场景下，`usedSpc` 变量的填充方式如下所示：\n```\nusedSpc=$(for x in\
  \ `df -h $ml | grep -v \"Use%\"` ; do echo $x ; done | \\\ngrep \"%\" |  cut -d\
  \ \"%\" -f1 -)\n```\n\n前面的代码（为了适应页面而分成两行）运行几个 Linux/Unix 命令并将输出放入 `usedSpc` 变量。该命令首先运行\
  \ `df -h`，然后通过管道传递给 `awk` 命令。`awk` 命令获取输出并打印第五列。然后通过管道传递给 `grep` 命令，该命令使用 `-v` 从输出中排除单词\
  \ `Use%`。最后通过管道传递给 `cut` 命令，该命令从输出中切出“%”字符。\n\n在 Linux/Unix 系统上，像前面这样的 shell 脚本可以很容易地从\
  \ `cron` 等调度工具运行。例如，如果 shell 脚本名为 `filesp.bsh`，则是一个示例 `cron` 条目：\n```\n#-----------------------------------------------------------------\n\
  # Filesystem check\n7 * * * * /orahome/oracle/bin/filesp.bsh 1>/orahome/oracle/bin/log/filesp.log\
  \ 2>&1\n#-----------------------------------------------------------------\n```\n\
  \n前面的条目指示系统在每天每小时的第七分钟运行 `filesp.bsh` shell 脚本。\n\n### 6-2. 识别系统瓶颈 (vmstat)\n\n\
  #### 问题\n\n您想确定服务器性能问题是否特别与磁盘 I/O、CPU、内存或网络相关。\n\n![images](img/square.jpg) **注意**\
  \ 如果您在 Solaris 下运行，请参阅 Recipe 6-3 以获取适用于该操作系统的特定解决方案。\n\n#### 解决方案\n\n使用 `vmstat`\
  \ 来确定系统资源在何处受到限制。例如，以下命令在 Linux 系统上每五秒报告一次系统资源使用情况：\n```\n$ vmstat 5\n```\n\n以下是一些示例输出：\n\
  ```\nprocs -----------memory---------- ---swap-- -----io---- --system-- -----cpu------\n\
  \ r  b   swpd   free   buff  cache   si   so    bi    bo   in   cs us sy id wa st\n\
  2  0 228816 2036164  78604 3163452   0    0     1   16    0    0 29  0 70  0  0\n\
  \ 2  0 228816 2035792  78612 3163456   0    0     0   59  398  528 50  1 49  0 \
  \ 0\n 2  0 228816 2035172  78620 3163448   0    0     0   39  437  561 50  1 49\
  \  0  0\n```\n\n要在此模式下退出 `vmstat`，请按 Ctrl+C。您也可以让 `vmstat` 报告特定的运行次数。例如，这指示 `vmstat`\
  \ 每六秒运行一次，总共报告十次：\n```\n$ vmstat 6 10\n```\n\n以下是解释 `vmstat` 输出时可以使用的一些通用启发式方法：\n\
  \n*   如果 `wa`（等待 I/O 的时间）列很高，这通常表明存储子系统过载。有关识别 I/O 争用源，请参阅 Recipe 6-6。\n*   如果 `b`（正在睡眠的进程）持续大于\
  \ 0，则您可能没有足够的 CPU 处理能力。有关识别消耗最多 CPU 的 Oracle 进程和 SQL 语句，请参阅 Recipe 6-5 和 6-9。\n\
  *   如果 `so`（换出到磁盘的内存）和 `si`（从磁盘换入的内存）持续大于 0，您可能存在内存瓶颈。有关识别消耗最多内存的 Oracle 进程和 SQL\
  \ 语句的详细信息，请参阅 Recipe 6-5。\n\n\n#### 工作原理\n\n`vmstat`（虚拟内存统计）工具有助于快速识别服务器上的瓶颈。使用`vmstat`的输出可以帮助确定性能瓶颈是否与\
  \ CPU、内存或磁盘 I/O 相关。表 6-1 描述了`vmstat`输出中可用的列。这些列可能因您的操作系统和版本而有所不同。\n\n![images](img/t0601.jpg)\n\
  \n![images](img/t0601a.jpg)\n\n`OS WATCHER`\n\nOracle 提供了一套收集操作系统指标的脚本，用于收集 CPU、内存、磁盘\
  \ I/O 和网络使用情况的指标。OS Watcher 工具套件自动化了使用`top`、`vmstat`、`iostat`、`mpstat`、`netstat`等工具收集统计信息的过程。\n\
  \n您可以从 My Oracle Support 网站 (support.oracle.com) 获取 OS Watcher。导航到支持网站并搜索 OS Watcher。OS\
  \ Watcher 用户指南可在文档 ID`301137.1`下找到。此工具在大多数 Linux/Unix 系统上受支持，也有适用于 Windows 平台的版本。\n\
  \n### 6-3. 识别系统瓶颈 (Solaris)\n\n#### 问题\n\n您正在一个 Solaris 系统上工作，愤怒的用户报告数据库应用程序运行缓慢。此机器上运行着多个数据库，您希望识别哪些进程消耗了最多的\
  \ CPU 资源。一旦在操作系统层面识别出消耗资源的进程，您希望将它们（如果可能的话）映射到数据库进程。\n\n![images](img/square.jpg)\
  \ **注意** 如果您没有运行 Solaris，请参阅解决方案 6-2。\n\n#### 解决方案\n\n在大多数 Solaris 系统上，使用`prstat`实用程序来识别哪些进程消耗了最多的\
  \ CPU 资源。例如，您可以指示`prstat`每五秒报告一次系统统计信息：\n\n```\n$ prstat 5\n```\n\n以下是一些示例输出：\n\n\
  ```\n   PID USERNAME  SIZE   RSS STATE  PRI NICE      TIME  CPU PROCESS/NLWP\n 16609\
  \ oracle   2364M 1443M cpu2    60    0   3:14:45  20% oracle/11\n 27565 oracle \
  \  2367M 1590M cpu3    21    0   0:11:28  16% oracle/14\n 23632 oracle   2284M 1506M\
  \ run     46    2   0:16:18 6.1% oracle/11\n  4066 oracle   2270M 1492M sleep  \
  \ 59    0   0:02:52 1.7% oracle/35\n 15630 oracle   2274M 1482M sleep   48    0\
  \  19:40:41 1.2% oracle/11\n```\n\n输入`q`或按 Ctrl+C 退出`prstat`。在上面的输出中，进程 16609 始终显示为顶级\
  \ CPU 消耗进程。\n\n识别出顶级资源消耗进程后，您可以使用`ps`命令确定该进程关联的数据库。此示例报告与 PID 16609 关联的进程信息：\n\n\
  ```\n$ ps -ef | grep 16609\n  oracle 16609  3021  18   Mar 09 ?         196:29 ora_dw00_ENGDEV\n\
  ```\n\n在此示例中，进程名称是`ora_dw00_ENGDEV`，关联的数据库是`ENGDEV`。\n\n#### 工作原理\n\n如果您在 Solaris\
  \ 服务器上工作，通常没有安装`top`实用程序。在这些环境中，可以使用`prstat`命令来确定系统上资源消耗最高的进程。表 6-2 描述了`prstat`默认输出中显示的几列。\n\
  \n![images](img/t0602.jpg)\n\n### 6-4. 识别顶级服务器资源消耗者 (top)\n\n#### 问题\n\n您有一台托管多个数据库的\
  \ Linux 服务器。用户报告使用其中一个数据库的应用程序响应迟缓。您希望识别哪些进程在服务器上消耗了最多的资源，然后确定顶级消耗进程是否与数据库关联。\n\n\
  #### 解决方案\n\n`top`命令实时显示服务器上资源消耗最高的进程。运行`top`的最简单方法如下：\n\n```\n$ top\n```\n\n以下是输出片段：\n\
  \n```\ntop - 04:40:05 up 353 days, 15:16,  3 users,  load average: 2.84, 2.34, 2.45\n\
  Tasks: 454 total,   4 running, 450 sleeping,   0 stopped,   0 zombie\nCpu(s): 64.3%us,\
  \  3.4%sy,  0.0%ni, 20.6%id, 11.8%wa,  0.0%hi,  0.0%si,  0.0%st\nMem:   7645184k\
  \ total,  6382956k used,  1262228k free,   176480k buffers\nSwap:  4128760k total,\
  \      184k used,  4128576k free,  3953512k cached\n\n  PID USER      PR  NI  VIRT\
  \  RES  SHR S %CPU %MEM    TIME+  COMMAND\n19888 oracle    25   0  148m  13m  11m\
  \ R 100.1  0.2 313371:45 oracle\n19853 oracle    25   0  148m  13m  11m R 99.8 \
  \ 0.2 313375:41 oracle\n 9722 oracle    18   0 1095m 287m 150m R 58.6  3.8   0:41.89\
  \ oracle\n  445 root      11  -5     0    0    0 S  0.3  0.0   8:32.67 kjournald\n\
  \ 9667 oracle    15   0  954m  55m  50m S  0.3  0.7   0:01.03 oracle\n    2 root\
  \      RT  -5     0    0    0 S  0.0  0.0   2:17.99 migration/0\n```\n\n输入`q`或按\
  \ Ctrl+C 退出`top`。在上面的输出中，第一部分显示了通用系统信息，例如服务器运行了多长时间、用户数、CPU 信息等。第二部分显示了哪些进程消耗了最多的\
  \ CPU 资源（从上到下排列）。在上面的输出中，进程 ID 19888 消耗了大量 CPU。要确定此进程关联的数据库，请使用`ps`命令：\n\n```\n\
  $ ps 19888\n```\n\n相关输出如下：\n\n```\nPID TTY      STAT   TIME COMMAND\n19888 ?   \
  \     Rs   313393:32 oracleO11R2 (DESCRIPTION=(LOCAL=YES)\n```\n\n在上面的输出中，第四列显示了`oracleO11R2`的值。这表明这是一个与`O11R2`数据库关联的\
  \ Oracle 进程。如果该进程持续消耗资源，您可以进一步确定是否有关联的 SQL 语句（参见解决方案 6-9）或终止该进程（参见解决方案 6-10）。\n\n\
  ![images](img/square.jpg) **提示** 如果您在 Solaris 操作系统环境中工作，请使用`prstat`命令查看顶级 CPU 消耗进程（详情参见解决方案\
  \ 6-3）。\n\n#### 工作原理\n\n如果已安装，`top`实用程序通常是 DBA 和系统管理员用来识别服务器上资源密集型进程的第一个调查工具。如果某个进程持续消耗过多的系统资源，那么您应该进一步确定该进程是否与数据库以及特定的\
  \ SQL 语句相关联。\n\n默认情况下，`top`会重复刷新（每隔几秒）有关 CPU 最密集型进程的信息。在`top`运行时，您可以交互式地更改其输出。例如，如果您输入\
  \ `>`，这将使`top`排序的列向右移动一个位置。表 6-3 列出了最有用的热键功能，用于将`top`显示更改为您需要的格式。\n\n![images](img/t0603.jpg)\n\
  \n表 6-4 描述了`top`显示的几列。使用这些描述来帮助解释输出。\n\n![images](img/t0604.jpg)\n\n![images](img/t0604a.jpg)\n\
  \n### 6-5. 识别 CPU 和内存瓶颈 (ps)\n\n#### 问题\n\n您希望快速隔离服务器上哪些进程消耗了最多的 CPU 和内存资源。\n\n\
  #### 解决方案\n\n`ps`（进程状态）命令对于快速识别顶级资源消耗进程非常方便。例如，此命令显示本机上消耗最多的十个 CPU 资源：\n\n```\n\
  $ ps -e -o pcpu,pid,user,tty,args | sort -n -k 1 -r | head\n```\n\n以下是部分输出：\n\n\
  ```\n97.8 26902 oracle   ?        oracleO11R2 (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))\n\
  \ 0.5 27166 oracle   ?        ora_diag_O11R2\n0.0     9 root      ?        [ksoftirqd/2]\n\
  ```\n\n在上面的输出中，名为`oracleO11R2`的进程在服务器上消耗了异常多的 CPU 资源。进程名称表明这是一个与`O11R2`数据库关联的 Oracle\
  \ 进程。\n\n类似地，您也可以显示顶级内存消耗进程：\n\n```\n$ ps -e -o pmem,pid,user,tty,args | sort -n\
  \ -k 1 -r | head\n```\n\n\n"
- "# 工作原理\n\nLinux/Unix 的 `ps` 命令用于显示服务器上当前活动进程的信息。`pcpu` 开关指示进程状态命令报告每个进程的 CPU 使用率。类似地，`pmem`\
  \ 开关指示 `ps` 报告进程内存使用情况。这为你提供了一种快速简便的方法来确定哪些进程消耗了最多的资源。\n\n当在一行中使用多个命令时（如 `ps`、`sort`\
  \ 和 `head`），通常希望将命令组合与一个快捷方式（别名）关联起来。以下是创建别名的示例：\n\n```bash\n$ alias topc='ps -e\
  \ -o pcpu,pid,user,tty,args | sort -n -k 1 -r | head'\n$ alias topm='ps -e -o pmem,pid,user,tty,args\
  \ | sort -n -k 1 -r | head'\n```\n\n现在，你可以使用别名代替输入长长的命令行——例如：\n\n```bash\n$ topc\n\
  ```\n\n另外，考虑在启动文件（如 `.bashrc` 或 `.profile`）中建立这些别名，这样当你登录到数据库服务器时，命令会自动定义。\n\n###\
  \ 6-6. 识别 I/O 瓶颈\n\n### 问题\n\n你正遇到性能问题，并希望确定问题是否与缓慢的磁盘 I/O 相关。\n\n### 解决方案\n\n使用带有\
  \ `-x`（扩展）选项的 `iostat` 命令，结合 `-d`（设备）选项来生成 I/O 统计信息。下一个示例每十秒显示一次扩展的设备统计信息：\n\n```bash\n\
  $ iostat –xd 10\n```\n\n你需要一个相当宽的屏幕来查看此输出；以下是部分列表：\n\n```\nDevice:    rrqm/s wrqm/s   r/s   w/s  rsec/s  wsec/s    rkB/s    wkB/s\
  \ avgrq-sz\navgqu-sz   await  svctm  %util\nsda          0.01   3.31  0.11  0.31    5.32   28.97     2.66    14.49    83.13\n\
  0.06  138.44   1.89   0.08\n```\n\n这种周期性的扩展输出允许你实时查看哪些设备出现了读写活动的激增。要退出前面的 `iostat`\
  \ 命令，请按 `Ctrl+C`。选项和输出可能因你的操作系统而异。例如，在一些 Linux/Unix 发行版上，`iostat` 输出可能将磁盘利用率报告为\
  \ `%b`（繁忙百分比）。\n\n在尝试确定设备 I/O 是否是瓶颈时，检查 `iostat` 输出时有一些通用准则：\n\n*   查找每秒读取或写入块数异常高的设备。\n\
  *   如果任何设备的利用率接近 100%，这强烈表明 I/O 是瓶颈。\n\n### 工作原理\n\n`iostat` 命令可以帮助你确定磁盘 I/O 是否可能是性能问题的根源。表\
  \ 6-5 描述了 `iostat` 输出中显示的列。\n\n![images](img/t0605.jpg)\n\n你还可以指示 `iostat` 按指定的时间间隔显示报告。显示的第一份报告将报告自上次服务器重启以来的平均值；每份后续报告显示自上一次生成快照以来的统计信息。以下示例每三秒显示一次设备统计报告：\n\
  \n```bash\n$ iostat -d 3\n```\n\n你还可以指定要生成的有限数量的报告。这对于收集一段时间内要分析的指标很有用。此示例指示 `iostat`\
  \ 每 2 秒报告一次，总共报告 15 次：\n\n```bash\n$ iostat 2 15\n```\n\n在处理本地连接的磁盘时，`iostat` 命令的输出将清楚地显示\
  \ I/O 发生的位置。然而，在使用外部阵列进行存储的环境中，情况就不那么明确了。你在文件系统层看到的是某种虚拟磁盘，它可能也由卷管理器配置。在虚拟化存储环境中，你必须与你的系统管理员或存储管理员合作，以确定到底是哪些磁盘正经历高\
  \ I/O 活动。\n\n一旦确定了你存在磁盘 I/O 争用问题，你就可以使用诸如 AWR（如果已许可）、Statspack（无需许可）或 `V$` 视图等实用程序来确定你的数据库是否承受\
  \ I/O 压力。例如，AWR 报告包含一个 I/O 统计部分，其中包含以下小节：\n\n*   按功能统计的 IOStat 摘要\n*   按文件类型统计的\
  \ IOStat 摘要\n*   按功能/文件类型统计的 IOStat 摘要\n*   表空间 I/O 统计\n*   文件 I/O 统计\n\n你还可以直接查询数据字典视图，如\
  \ `V$SQL`，以确定哪些 SQL 语句使用了过多的 I/O——例如：\n\n```sql\nSELECT *\nFROM\n(SELECT\n  parsing_schema_name\n\
  \ ,direct_writes\n ,SUBSTR(sql_text,1,75)\n ,disk_reads\nFROM v$sql\nORDER BY disk_reads\
  \ DESC)\nWHERE rownum < 20;\n```\n\n要确定哪些会话当前正在等待 I/O 资源，请查询 `V$SESSION`：\n\n```sql\n\
  SELECT\n  username\n,program\n,machine\n,sql_id\nFROM v$session\nWHERE event LIKE\
  \ 'db file%read';\n```\n\n要查看正在等待 I/O 资源的对象，请运行如下查询：\n\n```sql\nSELECT\n  object_name\n\
  ,object_type\n,owner\nFROM v$session   a\n    ,dba_objects b\nWHERE a.event LIKE\
  \ 'db file%read'\nAND   b.data_object_id = a.row_wait_obj#;\n```\n\n一旦你确定了查询（使用本部分前面的查询），那么请考虑以下因素，这些因素可能导致\
  \ SQL 语句消耗过多的 I/O：\n\n*   编写糟糕的 SQL\n*   不当的索引\n*   并行性的不当使用（这可能导致过多的全表扫描）\n\n你必须检查每个查询，并尝试确定是否是上述某一项导致了与\
  \ I/O 相关的性能不佳。\n\n### 6-7. 识别网络密集型进程\n\n### 问题\n\n你正在调查数据库服务器上的性能问题。作为调查的一部分，你希望确定系统上是否存在网络瓶颈。\n\
  \n### 解决方案\n\n使用 `netstat`（网络统计）命令显示网络流量。也许查看 `iostat` 输出最有用的方式是使用 `-ptc` 选项。这些选项显示进程\
  \ ID 和 TCP 连接，并持续更新输出：\n\n```bash\n$ netstat -ptc\n```\n\n按 Ctrl+C 退出前面的命令。以下是输出的部分列表：\n\
  \n```\n(并非所有进程都能被识别，非属主进程的信息\n 将不会显示，你需要 root 权限才能看到全部信息。)\nActive Internet connections\
  \ (w/o servers)\nProto Recv-Q Send-Q Local Address  Foreign Address  State     \
  \  PID/Program name\ntcp        0      0 rmug.com:62386 rmug.com:1521    ESTABLISHED\
  \ 22864/ora_pmon_RMDB\ntcp        0      0 rmug.com:53930 rmug.com:1521    ESTABLISHED\
  \ 6091/sqlplus\ntcp        0      0 rmug.com:1521  rmug.com:53930   ESTABLISHED\
  \ 6093/oracleRMDB1\ntcp        0      0 rmug.com:1521  rmug.com:62386   ESTABLISHED\
  \ 10718/tnslsnr\n```\n\n如果 `Send-Q`（未被远程主机确认的字节数）列对于某个进程的值异常高，这可能表明网络过载。前述输出的有用之处在于，你可以确定与网络连接关联的操作系统进程\
  \ ID（PID）。如果你怀疑有问题的连接是一个 `oracle` 会话，可以使用“6-9 解决方案”部分中描述的技术将操作系统 PID 映射到 Oracle\
  \ 进程或 SQL 语句。\n\n### 工作原理\n\n当遇到性能问题时，网络通常不是原因。你更有可能发现性能不佳与编写糟糕的 SQL 语句、不足的磁盘 I/O\
  \ 或不够的 CPU 或内存资源有关。然而，作为 DBA，你需要了解所有性能瓶颈的来源以及如何诊断它们。在当今高度互联的世界中，你必须掌握网络故障排除和监控技能。`netstat`\
  \ 实用程序是监控服务器网络连接的一个良好起点。\n\n### 6-8. 排查数据库网络连接问题\n\n### 问题\n\n一位用户报告说他/她无法连接到数据库。你知道网络连接涉及许多组件，并希望找出问题的根本原因。\n\
  \n\n\n## 解决方案\n\n当诊断 Oracle 数据库网络连接问题时，请遵循以下步骤作为指导：\n\n1.  使用操作系统的 `ping` 工具来确定远程主机是否可访问——例如：\n\
  \    ```\n    $ ping dwdb\n    dwdb is alive\n    ```\n    如果 `ping` 不起作用，请联系您的系统或网络管理员，确保已建立服务器到服务器的连接。\n\
  2.  使用 `telnet` 查看您是否可以连接到远程服务器和端口（即监听器正在监听的端口）——例如：\n    ```\n    $ telnet ora03\
  \ 1521\n    Trying 127.0.0.1...\n    Connected to ora03.\n    Escape character is\
  \ '^]'.\n    ```\n    上述输出表明到服务器和端口的连接正常。如果上述命令挂起，请联系您的系统管理员或网络管理员以获取进一步协助。\n3.\
  \  使用 `tnsping` 来确定 Oracle Net 是否正常工作。该工具将验证是否可以通过网络建立到数据库的 Oracle Net 连接——例如：\n\
  \    ```\n    $ tnsping dwrep\n    ..........\n    Used TNSNAMES adapter to resolve\
  \ the alias\n    Attempting to contact (DESCRIPTION = (ADDRESS = (PROTOCOL = TCP)\n\
  \    (HOST = dwdb1.us.farm.com)(PORT = 1521))\n    (CONNECT_DATA = (SERVER = DEDICATED)\
  \ (SERVICE_NAME = DWREP)))\n    OK (500 msec)\n    ```\n    如果 `tnsping` 无法联系到远程数据库，请验证远程监听器和数据库是否都已启动并运行。在远程主机上，使用\
  \ `lsnrctl status` 命令来验证监听器是否已启动。通过使用非 `SYS` 帐户建立本地连接来验证远程数据库是否可用（`SYS` 帐户通常可以在其他方案无法工作时连接到有问题的数据库）。\n\
  4.  验证 `TNS` 信息是否正确。如果远程监听器和数据库工作正常，那么请确保用于确定 `TNS` 信息的机制（如 `tnsnames.ora` 文件）包含正确的信息。\n\
  \    有时客户端机器可能有多个 `TNS_ADMIN` 位置和 `tnsnames.ora` 文件。验证是否正在使用某个特定 `tnsnames.ora`\
  \ 文件的一种方法是重命名它，然后在尝试连接到远程数据库时查看是否会出现不同的错误。\n\n## 工作原理\n\n网络连接问题可能难以诊断，因为其正确运行需要多个架构组件就位。您需要确保以下各项到位：\n\
  \n*   功能正常的网络\n*   端到端开放的端口\n*   正确安装和配置的 Oracle Net\n*   目标数据库和监听器已启动并运行\n*   从客户端到目标数据库的正确导航信息\n\
  \n如果您仍然遇到问题，请检查客户端的 `sqlnet.log` 文件和远程服务器的 `listener.log` 文件。有时这些日志文件会显示能够定位问题的附加信息。\n\
  \n### 6-9. 将资源密集型进程映射到数据库进程\n\n### 问题\n\n那是一个漆黑风雨交加的夜晚，系统性能糟糕。您在主机上识别出一个操作系统级别的资源密集型进程。您希望将该操作系统进程映射回数据库进程。如果该数据库进程是一个\
  \ SQL 进程，您还想显示 SQL 语句的用户及其 SQL 文本。\n\n### 解决方案\n\n在 Linux/Unix 环境中，如果您能识别出资源密集型的操作系统进程，那么您可以轻松检查该进程是否与数据库进程相关联。该过程包括以下步骤：\n\
  \n1.  运行操作系统命令以识别资源密集型进程及关联的 ID。\n2.  确定与该进程关联的数据库。\n3.  从数据库数据字典视图中提取有关该进程的详细信息。\n\
  4.  如果是 SQL 语句，则获取这些详细信息。\n5.  为该 SQL 语句生成执行计划。\n\n例如，假设您使用 `ps` 命令识别出消耗 CPU 最多的查询：\n\
  ```\n$ ps -e -o pcpu,pid,user,tty,args|grep -i oracle|sort -n -k 1 -r|head\n```\n\
  这是一些示例输出：\n```\n16.4 11026   oracle ?       oracleDWREP (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))\n\
  \ 0.1  6448   oracle ?       oracleINVPRD (LOCAL=NO)\n 0.5  3639   oracle ?    \
  \   ora_dia0_STAGE\n 0.4 28133   oracle ?       ora_dia0_DEVSEM\n 0.4  4093   oracle\
  \ ?       ora_dia0_DWODI\n 0.4  3534   oracle ?       ora_dia0_ENGDEV\n 0.2  4111\
  \   oracle ?       ora_mmnl_DWODI\n```\n上述输出识别出一个操作系统进程消耗了过多的 CPU（16.4%）。进程 ID 是\
  \ 11026，名称是 `oracleDWREP`。从进程名称看，这是与 `DWREP` 数据库关联的一个 Oracle 进程。\n\n您可以通过查询数据字典来确定这是哪种类型的\
  \ Oracle 进程：\n```sql\nSELECT\n  'USERNAME   : ' || s.username     || CHR(10) ||\n\
  \  'SCHEMA     : ' || s.schemaname   || CHR(10) ||\n  'OSUSER     : ' || s.osuser\
  \       || CHR(10) ||\n  'PROGRAM    : ' || s.program      || CHR(10) ||\n  'SPID\
  \       : ' || p.spid         || CHR(10) ||\n  'SID        : ' || s.sid        \
  \  || CHR(10) ||\n  'SERIAL#    : ' || s.serial#      || CHR(10) ||\n  'KILL STRING:\
  \ ' || '''' || s.sid || ',' || s.serial# || ''''  || CHR(10) ||\n  'MACHINE    :\
  \ ' || s.machine      || CHR(10) ||\n  'TYPE       : ' || s.type         || CHR(10)\
  \ ||\n  'TERMINAL   : ' || s.terminal     || CHR(10) ||\n  'SQL ID     : ' || q.sql_id\
  \       || CHR(10) ||\n  'SQL TEXT   : ' || q.sql_text\nFROM v$session s\n    ,v$process\
  \ p\n    ,v$sql     q\nWHERE s.paddr  = p.addr\nAND   p.spid   = '&&PID_FROM_OS'\n\
  AND   s.sql_id = q.sql_id(+);\n```\n上述脚本会提示您输入操作系统进程 ID。这是本示例的输出：\n```\nUSERNAME\
  \   : MV_MAINT\nSCHEMA     : MV_MAINT\nOSUSER     : oracle\nPROGRAM    : sqlplus@dwdb\
  \ (TNS V1-V3)\nSPID       : 11026\nSID        : 410\nSERIAL#    : 30653\nKILL STRING:\
  \ '410,30653'\nMACHINE    : dwdb\nTYPE       : USER\nTERMINAL   : pts/2\nSQL ID\
  \     : by3c8848gyngu\nSQL TEXT   : SELECT \"A1\".\"REGISTRATION_ID\",\"A1\".\"\
  PRODUCT_INSTANCE_ID\"\n,\"A1\".\"SOA_ID\",\"A1\".\"REG_SOURCE_IP_ADDR\",\"A1\"...\n\
  ```\n输出表明这是一个 SQL*Plus 进程，其数据库 `SID` 为 410，`SERIAL#` 为 30653。如果您决定使用 `ALTER SYSTEM\
  \ KILL SESSION` 语句终止该进程（详情请参阅配方 6-10），您将需要这些信息。\n\n在此示例中，由于该进程正在运行 SQL 语句，可以通过生成执行计划来提取有关该查询的更多详细信息：\n\
  ```sql\nSQL> SELECT * FROM table(DBMS_XPLAN.DISPLAY_CURSOR(('&&sql_id')));\n```\n\
  运行上述语句时，系统将提示您输入 `sql_id`（在此示例中，`sql_id` 是 `by3c8848gyngu`）。以下是部分输出列表：\n\n\n\n"
- '# 第 7 章


  ### 6-10. 终止资源密集型进程


  ### 问题


  你已经识别出一个消耗大量系统资源的进程（参见配方 6-9），并确定它是一个需要被终止的失控 SQL 语句。


  ### 解决方案


  有三种基本方法可以终止 SQL 进程：


  *   如果你能访问正在运行 SQL 语句的终端，可以按下 `Ctrl+C` 尝试终止进程。

  *   确定会话 ID 和序列号，然后使用 SQL 的 `ALTER SYSTEM KILL SESSION` 语句。

  *   确定操作系统进程 ID，并使用 `kill` 实用程序来停止进程。


  如果你碰巧能访问运行资源密集型 SQL 语句的终端，可以尝试按下 `Ctrl+C` 来终止进程。通常你无法访问终端，必须使用 SQL 语句或操作系统命令来终止进程。


  #### 使用 SQL 杀死会话


  如果它是一个 Oracle 进程，并且你已经确定了 `SID` 和 `SERIAL#`（参见配方 6-9），你可以在 SQL*Plus 中终止进程。以下是通用语法：


  ```sql

  alter system kill session ''integer1, integer2 [,integer3]'' [immediate];

  ```


  在上面的语法语句中，`integer1` 是 `SID` 列的值，`integer2` 是 `SERIAL#` 列的值（来自 `V$SESSION`）。在 RAC
  环境中，你可以选择为 `integer3` 指定实例 ID 的值。实例 ID 可以从 `GV$SESSION` 视图中检索。


  以下是一个终止 `SID` 为 1177、`SERIAL#` 为 38583 的进程的示例：


  ```sql

  SQL> alter system kill session ''1177,38583'';

  ```


  如果成功，你应该会看到此输出：


  ```

  System altered.

  ```


  当你杀死一个会话时，这会将会话标记为已终止，回滚活动事务（在会话内），并释放任何锁（由会话持有）。会话将保持在终止状态，直到所有依赖事务被回滚。如果回滚事务需要一分钟或更长时间，Oracle
  会将该会话报告为“标记为要终止”，并将控制权返回给 SQL 提示符。如果你指定 `IMMEDIATE`（可选），Oracle 将回滚任何活动事务并立即将控制权返回给你。


  #### 使用操作系统 kill 命令


  如果你能访问数据库服务器，并且拥有可以终止 Oracle 进程的操作系统帐户权限（例如 `oracle` 操作系统帐户），你也可以直接使用 `kill` 命令终止进程。


  例如，假设你运行了 `ps` 命令，并已经完成相关工作，确定有一个已运行数小时并需要被终止的 SQL 语句。`kill` 命令直接终止操作系统进程。在此示例中，进程
  ID 6254 被终止：


  ```bash

  $ kill -9 6254

  ```


  ![images](img/square.jpg) **注意** 确保你没有杀死错误的 Oracle 进程。如果不小心杀死了必需的 Oracle 后台进程，这将导致你的实例中止。


  ### 工作原理


  有时你会发现自己处于需要终止挂起的 SQL 进程、数据库作业或消耗大量资源的 SQL 语句的情况。例如，你可能有一个测试服务器，其中一个作业已经运行了几个小时，消耗了大量服务器资源，需要被停止，以便其他作业能够及时继续处理。


  手动杀死 SQL 语句将导致事务被回滚。因此请谨慎操作。确保你正在终止正确的进程。如果你错误地终止了关键进程，这显然会对应用程序和相关数据产生不利影响。


  '
