  ```\n\n```\nFull SQL Text\n\nSQL ID         SQL Text\n------------ ------------------------------------------------------------------\n\
  5z1b3z8rhutn  /* SQL Analyze(98, 0) */ select * from emppart where empno > 12345\n\
  ```\n\n#### 工作原理\n\n利用此功能是获取给定 SQL 语句历史统计信息的一种便捷方式。对于当前语句，您可以继续使用其他机制（如 `AUTOTRACE`），但在\
  \ SQL 语句运行后，使用 `awrsqrpt.sql` 脚本提供了一种简单的机制，可帮助分析过去的运行语句，并辅助对性能不佳的 SQL 语句进行追溯性调优。\n\
  \n### 4-6. 为您的数据库创建统计基线\n\n#### 问题\n\n您希望建立能够代表数据库操作正常状态的基线统计信息。\n\n#### 解决方案\n\n\
  您可以创建 AWR 基线，以便为您的数据库建立一个保存的工作负载视图，该视图可用于后续与其他 AWR 快照进行比较。基线的目的是为预定义的时间段建立数据库的正常工作负载视图。AWR\
  \ 基线的性能统计信息保存在您的数据库中，不会被自动清除。基线有两种类型——固定基线和移动基线。\n\n##### 固定基线\n\n最常见的基线类型称为固定基线。这是一个单一的、静态的视图，旨在代表正常的系统工作负载。要手动创建\
  \ AWR 基线，您可以使用 `DBMS_WORKLOAD_REPOSITORY` PL/SQL 包的 `CREATE_BASELINE` 过程。以下示例说明了如何基于已知的开始和结束日期时间创建基线：\n\
  \n```\nSQL> exec dbms_workload_repository.create_baseline -\n    (to_date('2011-06-01:00:00:00','yyyy-mm-dd:hh24:mi:ss'),\
  \ -\n    to_date('2011-06-01:06:00:00','yyyy-mm-dd:hh24:mi:ss'),'Batch Baseline\
  \ #1');\n\nPL/SQL procedure successfully completed.\n```\n\n对于上述基线，我们希望为数据仓库批处理窗口（午夜至凌晨\
  \ 6 点之间）建立一个正常工作负载视图。除非显式删除（管理 AWR 基线请参见配方 4-7），否则此基线将无限期保留。您创建的任何固定基线在创建新基线之前一直有效。如果您希望基线有明确的过期时间，可以在创建时使用\
  \ `EXPIRATION` 参数（以天为单位指定）简单地指定基线的保留期：\n\n```\nexec dbms_workload_repository.create_baseline(\
  \ -\nstart_time=>to_date('2011-06-01:00:00:00','yyyy-mm-dd:hh24:mi:ss'), -\nend_time=>to_date('2011-06-01:06:00:00','yyyy-mm-dd:hh24:mi:ss'),\
  \ -\nbaseline_name=>'Batch Baseline #1', -\nexpiration=>30);\n```\n\n您也可以基于已创建的\
  \ AWR 快照 ID 创建基线。为此，您可以如下运行 `CREATE_BASELINE` 过程：\n\n```\nexec dbms_workload_repository.create_baseline(\
  \ -\nstart_snap_id=>258,end_snap_id=>268,baseline_name=>'Batch Baseline #1', -\n\
  expiration=>30);\n```\n\n##### 移动基线\n\n与固定基线类似，移动基线用于在一段时间内捕获指标。最大的区别在于，移动基线的指标是基于整个\
  \ AWR 保留期捕获的。例如，默认的 AWR 保留期是八天（有关更改 AWR 保留期，请参见配方 4-2）。这些指标，也称为自适应阈值，是基于整个八天的窗口捕获的。此外，随着给定数据库的\
  \ AWR 窗口逐日移动，基线也每天都在变化。因此，随着数据库的演变和性能负载随时间变化，给定时间段内的指标可能会发生变化。系统会自动创建一个默认的移动基线——`SYSTEM_MOVING_BASELINE`。建议增加默认的\
  \ AWR 保留期，因为这可以提供更完整的指标集，以更准确地分析性能。移动窗口的最大大小是 AWR 保留期。要修改移动窗口基线，请使用 `DBMS_WORKLOAD_REPOSITORY`\
  \ 包的 `MODIFY_BASELINE_WINDOW_SIZE` 过程，如下例所示：\n\n```\nSQL>  exec dbms_workload_repository.modify_baseline_window_size(30);\n\
  \nPL/SQL procedure successfully completed.\n```\n\n\n\n"
- "# 工作原理\n\n设置 AWR 保留期可能是使用移动基线时最重要的配置事项，因为所有自适应阈值指标都基于整个保留期的信息。在为移动基线设置保留期时，请再次记住它不能超过\
  \ AWR 保留期，否则可能会收到以下错误：\n\n```sql\nSQL> exec dbms_workload_repository.modify_baseline_window_size(45);\n\
  BEGIN dbms_workload_repository.modify_baseline_window_size(45); END;\n*\nERROR at\
  \ line 1:\nORA-13541: system moving window baseline size (3888000) greater than\
  \ retention\n(2592000)\nORA-06512: at \"SYS.DBMS_WORKLOAD_REPOSITORY\", line 686\n\
  ORA-06512: at line 1\n```\n\n如果你将 AWR 保留期设置为无限制值，移动基线保留期仍然有一个上限，如果你设置的移动基线保留期过高，并且\
  \ AWR 保留期被设置为无限制，你可能会收到以下错误：\n\n```sql\nexec dbms_workload_repository.modify_baseline_window_size(92);\n\
  BEGIN dbms_workload_repository.modify_baseline_window_size(92); END;\n*\nERROR at\
  \ line 1:\nORA-13539: invalid input for modify baseline window size (window_size,\
  \ 92)\nORA-06512: at \"SYS.DBMS_WORKLOAD_REPOSITORY\", line 686\nORA-06512: at line\
  \ 1\n```\n\n对于固定基线，AWR 保留期不是决定因素，它仅仅基于你希望将快照与基线进行对比的时间跨度来考虑。设置任何基线后，你可以从数据字典中获取有关基线的信息。要获取数据库中基线的信息，你可以使用如下查询，该查询将显示你已配置的任何固定基线，以及自动配置的移动基线：\n\
  \n```sql\n  SELECT baseline_name, start_snap_id start_id,\n         TO_CHAR(start_snap_time,\
  \ 'yyyy-mm-dd:hh24:mi') start_time,\n         end_snap_id end_id,\n         TO_CHAR(end_snap_time,\
  \ 'yyyy-mm-dd:hh24:mi') end_time,\n         expiration\n  FROM dba_hist_baseline\n\
  \  ORDER BY baseline_id;\n```\n\n```\nBASELINE_NAME          START_ID START_TIME\
  \           END_ID END_TIME          EXPIRATION\n-------------------- ----------\
  \ ---------------- ---------- ---------------- ----------\nSYSTEM_MOVING_WINDOW\
  \        255 2011-05-27:22:00        358 2011-06-08:22:00\nBatch Baseline #1   \
  \        258 2011-05-28:13:39        268 2011-05-29:00:00       30\n```\n\n从上述结果来看，移动基线包含了基于\
  \ AWR 保留期的整个快照范围；因此其过期时间显示为`NULL`。你可以通过使用`DBMS_WORKLOAD_REPOSITORY`包的`SELECT_BASELINE_DETAILS`函数获取类似信息。你需要提供`baseline_id`编号传入函数以获得所需结果：\n\
  \n```sql\nSELECT start_snap_id, start_snap_time, end_snap_id, end_snap_time,\n \
  \      pct_total_time pct  FROM (SELECT * FROM\n       TABLE(DBMS_WORKLOAD_REPOSITORY.select_baseline_details(12)));\n\
  ```\n\n```\nSTART_SNAP_ID START_SNAP_TIME           END_SNAP_ID END_SNAP_TIME  \
  \                  PCT\n------------- ------------------------- ----------- -------------------------\
  \ ----------\n           258 28-MAY-11 01.39.19.296 PM         268 29-MAY-11 12.00.45.211\
  \ AM     100\n```\n\n要获取数据库中关于移动基线的更具体信息，你需要深入研究自适应指标的统计信息。例如，要查看基于移动窗口的每个与“读取”相关的指标的平均值和最大值，你可以使用以下查询：\n\
  \n```sql\ncolumn metric_name format a50\nSELECT metric_name, average, maximum FROM\n\
  (SELECT * FROM TABLE\n(DBMS_WORKLOAD_REPOSITORY.select_baseline_metric('SYSTEM_MOVING_WINDOW')))\n\
  where lower(metric_name) like '%read%'\norder by metric_name;\n```\n\n```\nMETRIC_NAME\
  \                                             AVERAGE    MAXIMUM\n--------------------------------------------------\
  \ ---------- ----------\nAverage Synchronous Single-Block Read Latency      .159658155\
  \ 53.8876404\nConsistent Read Changes Per Sec                    2.99232446 3984.11246\n\
  Consistent Read Changes Per Txn                    117.812978      239485\nConsistent\
  \ Read Gets Per Sec                       202.570936  64677.436\nConsistent Read\
  \ Gets Per Txn                       3930.41373 372602.889\nLogical Reads Per Sec\
  \                              224.984307 64690.6884\nLogical Reads Per Txn    \
  \                          4512.34119      840030\nLogical Reads Per User Call \
  \                       276.745756      135804\nPhysical Read Bytes Per Sec    \
  \                    1249601.48 528672777\nPhysical Read IO Requests Per Sec   \
  \               6.44664078 2040.73828\nPhysical Read Total Bytes Per Sec       \
  \           1272159.18 528699475\nPhysical Read Total IO Requests Per Sec      \
  \      7.82238122 2042.31792\nPhysical Reads Direct Lobs Per Sec               \
  \  .006030572  4.6953047\nPhysical Reads Direct Lobs Per Txn                 .231642268\
  \        141\nPhysical Reads Direct Per Sec                      59.3280451 64535.1513\n\
  Physical Reads Direct Per Txn                      602.336945 371825.222\nPhysical\
  \ Reads Per Sec                             152.539244 64535.2511\nPhysical Reads\
  \ Per Txn                             2966.04803 371831.889\n```\n\n## 4-7. 通过企业管理器管理\
  \ AWR 基线\n\n### 问题\n\n你想使用企业管理器创建和管理 AWR 基线。\n\n### 解决方案\n\n使用企业管理器，你可以轻松配置或修改基线。在图\
  \ 4-3 中，你可以看到用于建立或修改现有基线（包括任何固定基线以及系统移动基线）的窗口。要创建一个新的固定基线，你可以点击`Create`（创建）按钮，这将导航到如图\
  \ 4-4 所示的屏幕，在那里你可以配置新的固定基线。在此屏幕中，你为基线命名，并在基于快照或基于时间的基线之间进行选择。\n\n![images](img/0403.jpg)\n\
  \n图 4-3. 在企业管理器中管理基线\n\n![images](img/0404.jpg)\n\n图 4-4. 在企业管理器中创建新的固定基线\n\n当决定修改现有基线时，屏幕选项在修改固定基线和修改系统移动基线之间有所不同。图\
  \ 4-5 显示了固定基线的可修改选项。如你所见，唯一可以实际修改的是基线名称本身。图 4-6 展示了如何在企业管理器中更改移动基线窗口。如前所述，实际屏幕可能因企业管理器工具的版本而异。\n\
  \n![images](img/0405.jpg)\n\n图 4-5. 在企业管理器中修改固定基线\n\n![images](img/0406.jpg)\n\n\
  图 4-6. 在企业管理器中修改移动基线\n\n\n\n#### 工作原理\n\n对于任何创建的固定基线或系统移动基线，您还可以简单地基于特定基线生成 AWR\
  \ 报告。图 4-1 展示了如何点击 **按快照** 按钮生成基于快照的 AWR 报告。使用同一屏幕，您也可以通过点击 **按基线** 按钮为基线生成 AWR\
  \ 报告。\n\n如果您想在 Enterprise Manager 中删除基线，只需选中要删除基线的单选按钮，然后点击 **删除** 按钮，如图 4-7 所示。图\
  \ 4-8 展示了实际删除基线的操作。您可以通过选择相应的单选按钮来决定保留或清除基线数据。\n\n![images](img/0407.jpg)\n\n**图\
  \ 4-7. 选择要删除的基线**\n\n![images](img/0408.jpg)\n\n**图 4-8. 删除基线**\n\n![images](img/square.jpg)\
  \ **注意**  您无法删除系统移动基线。\n\n### 4-8. 管理 AWR 统计信息存储库\n\n#### 问题\n\n您的数据库中已存在 AWR 快照和基线，需要对您的\
  \ AWR 信息执行定期维护活动。\n\n#### 解决方案\n\n通过使用 `DBMS_WORKLOAD_REPOSITORY` 包，您可以执行对基线的大部分维护操作，包括：\n\
  \n*   重命名基线\n*   删除基线\n*   删除快照范围\n\n要重命名基线，请使用 `DBMS_WORKLOAD_REPOSITORY` 包的 `RENAME_BASELINE`\
  \ 过程：\n\n```sql\nSQL>  exec dbms_workload_repository.rename_baseline -\n      ('Batch\
  \ Baseline #9','Batch Baseline #10');\n\nPL/SQL procedure successfully completed.\n\
  ```\n\n要删除基线，只需使用 `DROP_BASELINE` 过程：\n\n```sql\nSQL> exec dbms_workload_repository.drop_baseline('Batch\
  \ Baseline #1');\n\nPL/SQL procedure successfully completed.\n```\n\n如果您认为有些 AWR\
  \ 快照不再需要，可以通过使用 `DROP_BASELINE` 过程删除快照范围来减少数据库中保存的 AWR 快照数量：\n\n```sql\nSQL>  exec\
  \ dbms_workload_repository.drop_snapshot_range(255,256);\n\nPL/SQL procedure successfully\
  \ completed.\n```\n\n#### 工作原理\n\n除了 `DBMS_WORKLOAD_REPOSITORY` 包，您还可以采取其他措施来分析\
  \ AWR 信息，以帮助管理数据库中的所有 AWR 信息，包括：\n\n*   从数据字典中查看 AWR 信息\n*   将 AWR 信息移动到另一个数据库位置的存储库中\n\
  \n如果您希望将整个数据库网格的 AWR 信息存储在单个数据库中，Oracle 提供了可运行的脚本，用于根据快照范围从给定数据库提取 AWR 信息，然后将这些信息加载到不同的数据库。\n\
  \n要从数据库中提取给定快照范围的 AWR 信息，您需要运行 `awrextr.sql` 脚本。这是一个交互式脚本，会询问与使用 `awrrpt.sql` 脚本生成\
  \ AWR 报告时类似的信息。运行此脚本时需要回答以下问题：\n\n1.  DBID（默认为当前数据库的 DBID）\n2.  要显示以供提取的快照天数\n3.\
  \  要提取的起始快照号\n4.  要提取的结束快照号\n5.  用于存放包含指定快照范围所有 AWR 信息的结果输出文件的 Oracle 目录；目录必须以大写输入。\n\
  6.  输出文件名（默认为 `awrdat` 加上快照范围编号）\n\n请记住，此过程生成的输出文件会占用空间，其大小根据快照时活动的会话数而变化。每个需要提取的单个快照可能占用\
  \ 1 MB 或更多的存储空间，因此请仔细评估所需的快照量。如有必要，如果目标目录空间不足，可以将提取过程分成几部分进行。\n\n此外，对于生成的每个输出文件，还会生成一个小的输出日志文件，其中包含有关提取过程的信息，这有助于确定提取的信息是否与您认为已提取的信息相符。这是确保您提取了所需\
  \ AWR 信息的宝贵审计。\n\n一旦您有了提取输出文件，您需要将它们（如果需要）传输到目标服务器位置，以加载到目标数据库位置。加载过程使用 `awrload.sql`\
  \ 脚本完成。加载脚本所需的输入包括：\n\n1.  用于存放包含指定快照范围所有 AWR 信息的结果输出文件的 Oracle 目录；目录必须以大写输入。\n\
  2.  文件名（应与提取过程（即 `awrextr.sql` 脚本）第 6 步中输入的名称相同；输入文件名时，请省略 `.dmp` 后缀，因为它会自动追加）。\n\
  3.  目标模式（默认模式名为 `AWR_STAGE`）\n4.  将创建对象的目标表空间（提供选项列表）\n5.  将创建对象的目标临时表空间（提供选项列表）\n\
  \n数据加载完成后，AWR 数据将移动到目标数据库数据字典表中的 `SYS` 模式。然后，临时目标模式（例如 `AWR_STAGE`）将被删除。\n\n为了生成从一个数据库加载到另一个数据库的\
  \ AWR 报告，请使用 `DBMS_WORKLOAD_REPOSITORY` 包的 `AWR_REPORT_TEXT` 函数。例如，假设我们已将快照 300\
  \ 到 366 加载并存储到我们的独立 AWR 数据库中。如果我们想为某个数据库生成快照 365 到 366 之间信息的 AWR 报告，我们将运行以下命令，并指定源数据库的\
  \ DBID 以及起始和结束快照号：\n\n```sql\nSELECT  dbms_workload_repository.awr_report_text\n\
  \        (l_dbid=>2334201269,l_inst_num=>1,l_bid=>365,l_eid=>366)\nFROM dual;\n\
  ```\n\n### 4-9. 自动创建 AWR 基线\n\n#### 问题\n\n您希望定期在数据库中自动创建基线。\n\n#### 解决方案\n\n您可以创建一个\
  \ AWR 重复模板，这使您能够根据预定义的间隔和时间范围自动创建基线。通过使用 `DBMS_WORKLOAD_REPOSITORY` 包中的 `CREATE_BASELINE_TEMPLATE`\
  \ 过程，您可以为这个重复的间隔和时间范围自动创建一个固定基线。参见以下示例来设置 AWR 模板：\n\n```sql\nSQL> alter session\
  \ set nls_date_format = 'yyyy-mm-dd:hh24:mi:ss';\n\nSQL> exec DBMS_WORKLOAD_REPOSITORY.create_baseline_template(\
  \ -\n>    day_of_week          => 'WEDNESDAY', -\n>    hour_in_day          => 0,\
  \ -\n>    duration             => 6, -\n>    start_time           => '2011-06-14:00:00:00',\
  \ -\n>    end_time             => '2011-06-14:06:00:00', -\n>    baseline_name_prefix\
  \ => 'Batch Baseline ', -\n>    template_name        => 'Batch Template', -\n> \
  \   expiration           => 365);\n\nPL/SQL procedure successfully completed.\n\
  ```\n\n对于上述模板，将基于每周三午夜到早上 6 点的时间窗口创建一个固定基线。在这种情况下，此模板为常规的批处理窗口时间框架创建基线。\n\n如果您使用的是\
  \ Enterprise Manager，可以使用相同的参数创建模板。示例请参见图 4-9。\n\n![images](img/0409.jpg)\n\n**图\
  \ 4-9. 创建 AWR 模板**\n\n\n\n#### 工作原理\n\n如果您需要删除模板，只需使用 `DBMS_WORKLOAD_REPOSITORY`\
  \ 包中的 `DROP_BASELINE_TEMPLATE` 过程。请参见以下示例：\n\n```sql\nSQL> exec dbms_workload_repository.drop_baseline_template('Batch\
  \ Template');\n\nPL/SQL procedure successfully completed.\n```\n\n如果您希望查看您已创建的任何模板的信息，可以查询\
  \ `DBA_HIST_BASELINE_TEMPLATE` 视图。请参见以下示例查询：\n\n```sql\ncolumn template_name format\
  \ a14\ncolumn prefix format a14\ncolumn hr format 99\ncolumn dur format 999\ncolumn\
  \ exp format 999\n\nSELECT template_name, baseline_name_prefix prefix,\nto_char(start_time,'mm/dd/yy:hh24')\
  \ start_time,\nto_char(end_time,'mm/dd/yy:hh24') end_time,\nsubstr(day_of_week,1,3)\
  \ day, hour_in_day hr, duration dur, expiration exp,\nto_char(last_generated,'mm/dd/yy:hh24')\
  \ last\nFROM dba_hist_baseline_template;\n\nTEMPLATE_NAME  PREFIX         START_TIME\
  \  END_TIME    DAY  HR  DUR  EXP LAST\n-------------- -------------- -----------\
  \ ----------- --- --- ---- ---- -----------\nBatch Template Batch Baseline 06/14/11:00\
  \ 06/14/11:06 WED   0    6  365 06/14/11:00\n```\n\n### 4-10. 快速分析 AWR 输出\n\n####\
  \ 问题\n\n您已生成 AWR 报告，并希望快速解读报告的关键部分，以确定数据库是否存在性能问题。\n\n#### 解决方案\n\nAWR 报告与其前身——早期\
  \ Oracle 版本的 Statspack 和 UTLBSTAT/UTLESTAT——一样，包含大量统计信息，可帮助您确定数据库的运行和性能状况。报告包含许多部分。评估数据库性能时，首先要看的三个地方是：\n\
  \n1.  数据库时间\n2.  实例效率\n3.  前五大计时事件\n\n报告显示的第一部分是报告快照窗口的摘要，以及对经过时间（代表快照窗口）和数据库时间（代表数据库活动）的简要查看。如果数据库时间超过经过时间，则表示数据库繁忙。如果它比经过时间高出很多，可能意味着某些会话正在等待资源。虽然这不够具体，但可以让您快速查看数据库整体是否繁忙并可能已超负荷。从以下此部分的示例中，通过比较经过时间和数据库时间，我们可以看出这是一个非常繁忙的数据库：\n\
  \n```\n              快照 ID       快照时间        会话数  游标/会话\n            --------- -------------------\
  \ -------- ---------\n开始快照:    18033 11-Jun-11 00:00:43        59       2.3\n  结束快照:\
  \    18039 11-Jun-11 06:00:22        69       2.4\n   经过时间:              359.66\
  \ (分钟)\n   数据库时间:          7,713.90 (分钟)\n```\n\n实例效率部分可以让您非常快速地了解数据库上的运行是否充分。通常，此部分中的大多数百分比应高于\
  \ 90%。`Parse CPU to Parse Elapsd` 指标显示 CPU 在解析 SQL 语句上花费了多少时间。此指标越低越好。在以下示例中，它约为\
  \ 2%，非常低。如果此指标达到 5%，可能意味着需要调查以确定为什么 CPU 要花费这么多时间仅仅解析 SQL 语句。\n\n```\n实例效率百分比（目标\
  \ 100%）\n~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n            缓冲区立即获得 %: \
  \  99.64       重做无等待 %:   99.99\n            缓冲区命中率 %:   91.88    内存中排序 %:   99.87\n\
  \            库缓存命中率 %:   98.92        软解析 %:   94.30\n         执行到解析比率 %:   93.70\
  \         闩锁命中率 %:   99.89\n解析 CPU 时间与解析耗时比率 %:    2.10     % 非解析 CPU:   99.75\n\
  ```\n\n快速了解数据库性能的第三个地方是“前五大计时事件”部分。此部分让您快速了解在快照期间，数据库内资源消耗最高的具体位置。根据这些结果，它可能显示花费了过多时间执行全表扫描，或通过数据库链接获取数据。以下示例显示，使用最多资源的操作是索引扫描（由\
  \ `db file sequential read` 标明）。我们可以看到在 `local write wait`、`enq: CF – contention`\
  \ 和 `free buffer waits` 上花费了大量时间，这让我们快速了解了数据库可能存在的争用和等待事件，并为调查和分析提供了直接方向。\n\n```\n\
  前五大计时前台事件                                  平均\n~~~~~~~~~~~~~~~~~~~~~~~~~~~~~   \
  \                       等待时间   % 数据库\n事件                                 等待次数  \
  \  耗时(秒)   (毫秒)   时间 等待类别\n------------------------------ ------------ -----------\
  \ ------ ------ ----------\ndb file sequential read           3,653,606      96,468\
  \     26   20.8   用户 I/O\nlocal write wait                     94,358      67,996\
  \    721   14.7   用户 I/O\nenq: CF - contention                 18,621      46,944\
  \   2521   10.1      其他\nfree buffer waits                 3,627,548      38,249\
  \     11    8.3 配置\ndb file scattered read            2,677,267      32,400    \
  \ 12    7.0   用户 I/O\n```\n\n#### 工作原理\n\n在查看了数据库时间、实例效率和前五大计时事件部分后，如果您想更详细地查看特定\
  \ AWR 报告的部分，请参阅第 7 章中的方案 7-17 获取更多信息。由于 AWR 报告中的信息量非常庞大，强烈建议创建代表正常处理窗口的基线。然后，可以将\
  \ AWR 快照与基线进行比较，那些在给定 AWR 报告中可能只是数字的指标，当特定指标显著高于或低于正常范围时，就会凸显出来。\n\n### 4-11. 手动获取活动会话信息\n\
  \n#### 问题\n\n您需要对执行过于频繁或时间太短以至于无法在可用 AWR 快照中捕获的会话进行性能分析。AWR 快照的采样频率不足以捕捉您需要的信息。\n\
  \n\n\n## 解决方案\n\n您可以使用 Oracle 活动会话历史 (ASH) 信息来获取实时或接近实时的会话信息。虽然 AWR 信息非常有用，但它受限于报告周期（默认情况下每小时运行一次）。ASH\
  \ 信息包含活动会话信息，每秒从 `V$SESSION` 采样一次，可以显示更实时或接近实时的会话信息，以协助对数据库进行性能分析。有几种方法可以从数据库获取活动会话信息：\n\
  \n*   运行预定义的 ASH 报告\n*   在 Enterprise Manager 中运行 ASH 报告（参见配方 4-12）\n*   从数据字典中获取\
  \ ASH 信息（参见配方 4-13）\n\n获取活动会话信息最简单的方法是运行 `ashrpt.sql` 脚本，其性质类似于运行 `awrrpt.sql` 脚本来生成\
  \ AWR 报告。当您运行 `ashrpt.sql` 脚本时，它会询问以下信息：\n\n*   报告类型（文本或 HTML 格式）\n*   报告开始时间（默认为当前时间减去\
  \ 15 分钟）\n*   报告结束时间（默认为当前时间）\n*   报告名称\n\nASH 报告包含多个部分。有关每个部分的简要说明，请参见 表 4-1。以下是\
