  CPU Time (ms)                                        22,285       11,142.3     1.6\n\
  Executions                                                2            N/A     N/A\n\
  Buffer Gets                                           1,942,525      971,262.5 \
  \   12.5\nDisk Reads                                            1,940,578      970,289.0\
