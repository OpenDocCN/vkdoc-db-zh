  \ ACCESS FULL | EMPPART | 16777222 | 335544440 | 16116 | |\n| *5 | INDEX UNIQUE\
  \ SCAN | PK_DEPT | 1 | | | |\n\n## 变更后执行计划\n\n-----------------------------\n\n\
  | ID | 操作 | 名称 | 行数 | 字节数 | 代价 | 时间 |\n| :--- | :--- | :--- | :--- | :--- | :---\
  \ | :--- |\n| 0 | SELECT STATEMENT | | 16777222 | 352321662 | 16812553 | 6:02:31\
  \ |\n| 1 | NESTED LOOPS | | | | | |\n| 2 | NESTED LOOPS | | 16777222 | 352321662\
  \ | 16812553 | 56:02:31 |\n| 3 | PARTITION RANGE ALL | | 16777222 | 150994998 |\
