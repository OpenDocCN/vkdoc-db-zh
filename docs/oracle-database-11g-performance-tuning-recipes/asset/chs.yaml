  | 6 | TABLE ACCESS BY INDEX ROWID | DEPT | 1 | 12 | 1 | 00:00:01 |\n\n在上述示例输出中，我们可以看到变更前后的执行统计信息，以及变更前后的执行计划。我们还能看到估计的工作负载影响百分比和\
  \ SQL 影响百分比，这对于快速浏览所做的系统变更是否有重大影响非常有用。在此示例中，我们看到将会有 1%的变化，并且通过查看执行计划，我们发现差异可以忽略不计。因此，对于上述查询，数据库升级基本上将对我们查询的性能产生最小或没有影响。如果您看到影响百分比达到\
  \ 10%或更高，可能意味着需要在将变更应用到生产环境之前进行更多分析和调整，以主动调整查询或系统。为了获得准确的比较结果，还建议在执行使用 `DBMS_SQLPA`\
  \ 的分析之前，导出生产统计信息并将其导入到您的测试环境中。\n\n![images](img/square.jpg) **提示** 在 SQL Plus 中，记得设置\
  \ `SET LONG` 和 `SET LONG CHUNKSIZE`，以便正确显示输出内容。\n\n\n#### 工作原理\n\nSQL 性能分析器与`DBMS_SQLPA`包可用于分析\
  \ SQL 工作负载，该工作负载可定义为以下任何一种：\n\n*   一条 SQL 语句\n*   缓存中存储的 SQL ID\n*   SQL 调优集（有关\
  \ SQL 调优集的信息，请参见第 11 章）\n*   基于自动工作负载 repository (AWR) 快照的 SQL ID（更多信息，请参见第 4 章）\n\
  \n通常，收集一系列 SQL 语句的信息比收集单个语句的信息更容易。通过自动工作负载 repository (AWR) 快照或 SQL 调优集来获取信息是为一系列语句收集信息的最简单方法。AWR\
  \ 快照将包含基于特定时间段的信息，而 SQL 调优集将包含针对特定目标 SQL 语句集的信息。考虑进行“前后”性能分析的一些可能的关键原因包括：\n\n* \
  \  初始化参数更改\n*   数据库升级\n*   硬件更改\n*   操作系统更改\n*   应用程序模式对象添加或更改\n*   SQL 基线或配置文件的实施\n\
  \n有大量信息可供比较。在报告分析中收集的信息时，仅显示因系统更改而受到不利影响的 SQL 语句的输出可能是有益的。例如，您可能希望将`REPORT_ANALYSIS_TASK`函数显示的信息范围缩小，仅显示以下类型的\
  \ SQL 语句信息：\n\n*   那些性能退化的语句\n*   那些执行计划发生更改的语句\n*   那些 SQL 语句中出现错误的语句\n\n在收集每个任务的信息之前，刷新`shared_pool`和/或`buffer_cache`可能是有益的，这将有助于为比较获得最佳信息。分析任务的信息存储在数据字典中。您可以引用任何以“`DBA_ADVISOR`”为前缀的数据字典视图，以获取有关您创建的性能分析任务、执行的操作以及执行统计信息、执行计划和报告信息的信息。有关`DBMS_SQLPA`包的完整说明，请参阅适用于您数据库版本的\
  \ Oracle PL/SQL Packages and Types Reference，该包在 Oracle 11g 版本中是新增的。\n\n![images](img/square.jpg)\
  \ **注意** 执行使用`DBMS_SQLPA`的分析任务需要`ADVISOR`系统权限。\n\n## 第 10 章\n\n## 追踪 SQL 执行\n\n\
  追踪会话活动是大多数 SQL 性能调优工作的核心。Oracle 提供了一套丰富的工具来追踪 SQL 活动。本章介绍 Oracle SQL 追踪功能，并向您展示如何在您的环境中设置\
  \ SQL 追踪。Oracle 提供了许多“事件”来帮助您执行各种类型的追踪。\n\n尽管有几种追踪方法可用，但 Oracle 现在建议您对大多数类型的追踪使用`DBMS_MONITOR`包。本章包含几个说明如何使用此包生成追踪的配方。此外，我们还展示了如何通过设置各种\
  \ Oracle 事件来追踪会话，这通常是 Oracle 支持人员所要求的。您将学习如何追踪单个 SQL 语句、一个会话以及整个实例，以及如何追踪并行查询。有配方展示了如何追踪另一个用户的会话以及如何使用触发器来启动会话追踪。您还将学习如何追踪\
  \ Oracle 优化器的执行路径。\n\nOracle 提供了`TKPROF`实用程序以及可免费下载的分析器 Oracle Trace Analyzer。本章展示了如何使用这两种分析器来分析您生成的原始追踪文件。\n\
  \n### 10-1. 准备环境\n\n#### 问题\n\n您希望确保数据库已为追踪 SQL 会话正确设置。\n\n#### 解决方案\n\n在开始追踪 SQL\
  \ 语句之前，您必须做三件事：\n\n1.  启用定时统计信息收集。\n2.  指定追踪转储文件的目标位置。\n3.  调整追踪转储文件大小。\n\n您可以通过将`timed_statistics`参数设置为`true`来启用定时统计信息的收集。首先检查此参数的当前值：\n\
  \n```sql\nSQL> sho parameter statistics\nNAME                                 TYPE\
  \        VALUE\n------------------------------------ ----------- -----------\n...\n\
  statistics_level                     string      TYPICAL\ntimed_statistics     \
  \                boolean     TRUE\nSQL>\n```\n\n如果`timed_statistics`参数的值为`false`，请使用以下语句将其设置为`true`：\n\
  \n```sql\nSQL> alter system set timed_statistics=true scope=both;\nSystem altered.\n\
  SQL>\n```\n\n您也可以使用以下语句在会话级别设置此参数：\n\n```sql\nSQL> alter session set timed_statistics=true\n\
  ```\n\n您可以使用以下命令找到追踪目录的位置（在 Oracle Database 11g 之前的版本中称为用户转储目录）：\n\n```sql\nSQL>\
  \ select name,value from v$diag_info\n  2* where name='Diag Trace'\nSQL> /\nNAME\
  \                                      VALUE\n-----------------------------    ----------------------------------------\n\
  Diag Trace                       c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\trace\n\
  SQL>\n```\n\n在 Oracle Database 11g 中，`max_dump_file_size`参数的默认值为`unlimited`，您可以通过发出以下命令进行验证：\n\
  \n```sql\nSQL> sho parameter dump\nNAME                                 TYPE   \
  \     VALUE\n------------------------------------ ----------- ----------\n...\n\
  max_dump_file_size                   string      unlimited\n```\n\n无限制的转储文件大小意味着文件可以增长到操作系统允许的大小。\n\
  \n\n"
- "# SQL 跟踪技术\n\n## 概述与工作原理\n\n### 如何工作\n在追踪任何 SQL 会话之前，请确保已将 `timed_statistics` 初始化参数设置为\
  \ `true`。如果此参数的值为 `false`，SQL 跟踪将被禁用。将 `timed_statistics` 参数设置为 `true` 可使数据库收集 CPU\
  \ 和耗时等统计信息，并将其存储在各种动态性能表中。从 Oracle 11.1.0.7.0 版本开始，此参数的默认值取决于初始化参数 `statistics_level`\
  \ 的值。如果将 `statistics_level` 参数设置为 `basic`，则 `timed_statistics` 参数的默认值为 `false`。如果将\
  \ `statistics_level` 设置为 `typical` 或 `all`，则 `timed_statistics` 参数的默认值为 `true`。`timed_statistics`\
  \ 参数是动态的，这意味着您无需重启数据库即可将其打开——您可以在整个数据库上开启此参数而不会产生显著开销。您也可以仅为单个会话开启此参数。\n\n当您追踪一个\
  \ SQL 会话时，Oracle 会生成一个跟踪文件，其中包含对排查 SQL 性能问题非常有用的诊断数据。从 Oracle Database 11g 开始，数据库将所有诊断文件存储在一个专用的诊断目录中，该目录通过\
  \ `diagnostic_dest` 初始化参数指定。诊断目录的结构如下：\n\n```\n<diagnostic_dest>/diag/rdbms/<dbname>/<instance>\n\
  ```\n\n该诊断目录称为 ADR 主目录。如果您的数据库名称是 `prod1`，实例名称也是 `prod1`，那么 ADR 主目录将是：\n\n```\n\
  <diagnostic_dest>/diag/rdbms/prod1/prod1\n```\n\nADR 主目录在 `<ADR Home>/trace` 子目录中包含跟踪文件。跟踪文件通常以\
  \ `.trc` 为扩展名。您会注意到，多个跟踪文件有一个对应的跟踪映射文件，扩展名为 `.trm`。`.trm` 文件包含有关跟踪文件的结构信息，数据库使用这些信息进行搜索和导航。您可以使用以下命令查看数据库的诊断目录设置：\n\
  \n```\nSQL> sho parameter diagnostic_dest\n\nNAME                              \
  \   TYPE        VALUE\n------------------------------------ ----------- ------------------------------\n\
  diagnostic_dest                      string      C:\\APP\\ORA\nSQL>\n```\n\n`V$DIAG_INFO`\
  \ 视图显示了各个诊断目录的位置，包括跟踪目录，该目录在视图中以 Diag Trace 名称列出。尽管 Oracle Database 11g 中的新数据库可诊断性基础设施忽略了\
  \ `user_dump_dest` 初始化参数，但该参数仍然存在，并且指向与 `$ADR_BASE\\diag\\rdbms\\<database>\\<instance>\\\
  trace` 目录相同的目录，如以下命令所示：\n\n```\nSQL> show parameter user_dump_dest\n\nNAME     \
  \                            TYPE        VALUE\n------------------------------------\
  \ ----------- ------------------------------\nuser_dump_dest                   \
  \    string      c:\\app\\ora\\diag\\rdbms\\orcl1\\or\n                        \
  \                         cl1\\trace\nSQL>\n```\n\n在 Oracle Database 11g 中，您无需设置\
  \ `max_dump_file_size` 参数来指定跟踪文件的最大大小。\n\n## 追踪特定 SQL 语句\n\n### 问题\n您想要追踪特定的 SQL\
  \ 语句，以查明数据库在执行该语句期间将时间花费在了哪里。\n\n### 解决方案\n在 Oracle 11.1 或更高版本中，您可以使用增强的 SQL 跟踪接口来追踪一条或多条\
  \ SQL 语句。以下是对一组 SQL 语句进行追踪的步骤。\n\n1.  执行 `alter session set events` 语句以设置追踪，如下所示：\n\
  \    ```\n    SQL> alter session set events 'sql_trace level 12';\n    Session altered.\n\
  \    SQL>\n    ```\n2.  执行 SQL 语句：\n    ```\n    SQL> select count(*) from sales;\n\
  \    ```\n3.  关闭追踪：\n    ```\n    SQL> alter session set events 'sql_trace off';\n\
  \    Session altered.\n    SQL>\n    ```\n\n您可以通过在 `alter session set events` 语句中指定\
  \ SQL 语句的 SQL ID 来选择追踪特定的 SQL 语句。步骤如下：\n\n1.  通过执行以下语句找到 SQL 语句的 SQL ID：\n    ```\n\
  \    SQL> select sql_id,sql_text\n      2  from v$sql\n      3  where sql_text='select\
  \ sum(quantity_sold) from sales';\n\n    SQL_ID                       SQL_TEXT\n\
  ---------------------------- ------------------------------------\n    fb2yu0p1kgvhr\
  \                select sum(quantity_sold) from sales\n\n    SQL>\n    ```\n2. \
  \ 为您检索到的 SQL ID 对应的特定 SQL 语句开启追踪：\n    ```\n    SQL> alter session set events 'sql_trace\
  \ [sql:fb2yu0p1kgvhr] level 12';\n    Session altered.\n    SQL>\n    ```\n3.  执行\
  \ SQL 语句：\n    ```\n    SQL> select sum(quantity_sold) from sales;\n\n    SUM(QUANTITY_SOLD)\n\
  \    ------------------\n                918843\n    ```\n4.  关闭追踪：\n    ```\n \
  \   SQL> alter session set events 'sql_trace[sql:fb2yu0p1kgvhr] off';\n    Session\
  \ altered.\n    SQL>\n    ```\n\n您可以通过用管道符 (`|`) 分隔 SQL ID 来追踪多条 SQL 语句，如下所示：\n\n\
  ```\nSQL> alter session set events ‘sql_trace [sql: fb2yu0p1kgvhr|4v433su9vvzsw]‘;\n\
  ```\n\n您可以通过执行 `alter system set events` 语句来追踪在另一个会话中运行的特定 SQL 语句：\n\n```\nSQL>\
  \ alter system set events 'sql_trace[sql:fb2yu0p1kgvhr] level 12';\nSystem altered.\n\
  SQL>\n```\n\n您可以通过查询 `V$SQL` 视图（如本配方前面所示）来获取该语句的 SQL ID，也可以通过 Oracle Enterprise\
  \ Manager 获取。一旦另一个会话中的用户完成执行 SQL 语句，请使用以下命令关闭追踪：\n\n```\nSQL> alter system set events\
  \ 'sql_trace[sql:fb2yu0p1kgvhr] off';\nSystem altered.\nSQL>\n```\n\n### 如何工作\n\
  在 Oracle Database 11g 中，您可以设置 Oracle 事件 `SQL_TRACE` 来追踪一条或多条 SQL 语句的执行。您可以执行 `alter\
  \ session` 或 `alter system` 语句来追踪特定的 SQL 语句。命令语法如下：\n\n```\nalter session/system\
  \ set events ‘sql_trace [sql:<sql_id>|<sql_id>] … event specification‘;\n```\n\n\
  即使您在关闭追踪之前执行了多条 SQL 语句，跟踪文件也只会显示与您指定的 SQL_ID 或 SQL_ID 相关的信息。\n\n## 在自己的会话中启用追踪\n\
  \n### 问题\n您想要追踪您自己的会话。\n\n### 解决方案\n普通用户可以使用 `DBMS_SESSION` 包来追踪其会话，如下例所示：\n\n```\n\
  SQL>execute dbms_session.session_trace_enable(waits=>true, binds=> false);\n```\n\
  \n要禁用追踪，用户必须执行 `session_trace_disable` 过程，如下所示：\n\n```\nSQL> execute dbms_session.session_trace_disable();\n\
  ```\n\n### 如何工作\nOracle 推荐用于所有追踪的 `DBMS_MONITOR` 包只能由具有 DBA 角色的用户执行。如果您没有 DBA 角色，可以使用\
  \ `dbms_session.session_trace_enable` 过程来追踪您自己的会话。\n\n## 查找跟踪文件\n\n### 问题\n您希望找到一种轻松识别您的跟踪文件的方法。\n\
  \n\n#### 解决方案\n\n在开始生成跟踪之前，请执行以下语句为跟踪文件设置标识符：\n\n`SQL> alter session set tracefile_identifier='MyTune1';`\n\
  \n要查看数据库创建的最新跟踪文件（适用于 Oracle Database 11.1 及更新版本），可以通过执行以下命令查询自动诊断存储库（有关`adrci`工具的详细信息，请参见第\
  \ 5 章）：\n\n```\nadrci> show tracefile -t\n08-MAY-11 19:01:48  diag\\rdbms\\orcl1\\\
  orcl1\\trace\\orcl1_p000_8652_MyTune1.trc\n08-MAY-11 19:01:48  diag\\rdbms\\orcl1\\\
  orcl1\\trace\\orcl1_p001_6424_MyTune1.trc\n08-MAY-11 19:01:48  diag\\rdbms\\orcl1\\\
  orcl1\\trace\\orcl1_p002_5980_MyTune1.trc\nadrci>\n```\n\n要查找当前会话的跟踪文件路径，请执行以下命令：\n\
  \n```\nSQL>  select value from v$diag_info\n      where name = 'Default Trace File';\n\
  \nVALUE\n-----------------------------------------------------------------------\n\
  \nc:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\trace\\orcl1_ora_11248_My_Tune1.trc\n\
  \nSQL>\n```\n\n要查找当前实例的所有跟踪文件，请执行以下查询：\n\n`SQL> select value from v$diag_info where\
  \ name = 'Diag Trace'`\n\n#### 工作原理\n\n通常，很难找到你正在寻找的确切跟踪文件，因为跟踪目录中可能有一堆其他跟踪文件，且文件名看起来都很相似。在进行\
  \ SQL 跟踪时，一个最佳实践是将你的跟踪文件与一个唯一标识符关联起来。为即将生成的跟踪文件设置一个标识符，可以轻松地从数据库在跟踪目录中生成的众多跟踪文件中识别出\
  \ SQL 跟踪文件。\n\n你可以使用以下命令确认跟踪标识符的值：\n\n```\nSQL> sho parameter tracefile_identifier\n\
  NAME                                 TYPE        VALUE\n------------------------------------\
  \ ----------- ---------------\ntracefile_identifier                 string     \
  \ MyTune1\nSQL>\n```\n\n`V$PROCESS`视图中的`TRACEID`列也显示了`tracefile_identifier`参数的当前值。你设置的跟踪文件标识符会成为跟踪文件名的一部分，使得从跟踪目录中大量跟踪文件里轻松挑选出正确的文件名成为可能。你可以为一个会话多次修改`tracefile_identifier`参数的值。一个进程的跟踪文件名将包含表明它们都属于同一进程的信息。\n\
  \n一旦你设置了`tracefile_identifier`参数，跟踪文件将具有以下格式，其中`sid`是 Oracle SID，`pid`是进程 ID，`traceid`是你为`tracefile_identifier`初始化参数设置的值。\n\
  \n`sid_ora_pid_traceid.trc`\n\n### 10-5. 检查原始 SQL 跟踪文件\n\n#### 问题\n\n你想检查一个原始 SQL\
  \ 跟踪文件。\n\n#### 解决方案\n\n在文本编辑器中打开跟踪文件以检查跟踪信息。以下是通过执行`dbms_monitor.session_trace_enable`过程生成的原始\
  \ SQL 跟踪的部分内容：\n\n```\nPARSING IN CURSOR #3 len=490 dep=1 uid=85 oct=3 lid=85 tim=269523043683\
  \ hv=672110367 ad='7ff18986250' sqlid='bqasjasn0z5sz'\nPARSE #3:c=0,e=647,p=0,cr=0,cu=0,mis=1,r=0,dep=1,og=1,plh=0,tim=269523043680\n\
  EXEC #3:c=0,e=1749,p=0,cr=0,cu=0,mis=1,r=0,dep=1,og=1,plh=3969568374,tim=269523045613\n\
  WAIT #3: nam='Disk file operations I/O' ela= 15833 FileOperation=2 fileno=4 filetype=2\
  \ obj#=-1 tim=269523061555\nFETCH #3:c=0,e=19196,p=0,cr=46,cu=0,mis=0,r=1,dep=1,og=1,plh=3969568374,tim=269523064866\n\
  STAT #3 id=3 cnt=12 pid=2 pos=1 obj=0 op='HASH GROUP BY (cr=46 pr=0 pw=0 time=11\
  \ us cost=4 size=5317 card=409)'\nSTAT #3 id=4 cnt=3424 pid=3 pos=1 obj=89079 op='TABLE\
  \ ACCESS  FULL DEPT (cr=16 pr=0 pw=0 time=246 us cost=3 size=4251 card=327)'\n```\n\
  \n从这个原始跟踪文件的摘录中可以看出，你可以收集到有用的信息，例如解析未命中（parse misses）、等待事件以及 SQL 语句的执行计划。\n\n####\
  \ 工作原理\n\n获取会话跟踪文件后的常规做法是使用`TKPROF`等工具进行分析。但是，你也可以通过目视阅读跟踪输出内容来检查跟踪文件。原始跟踪文件捕获了\
  \ SQL 语句处理以下三个步骤的信息：\n\n`解析`：在此阶段，数据库将 SQL 语句转换为执行计划，并检查授权以及表和其他对象是否存在。\n\n`执行`：数据库在此阶段执行\
  \ SQL 语句。对于`SELECT`语句，执行阶段确定数据库必须检索的行。对于诸如插入、更新和删除之类的 DML 语句，数据库会修改数据。\n\n`获取`：此步骤仅适用于`SELECT`语句。在此阶段，数据库检索选定的行。\n\
  \n除了等待事件信息外，SQL 跟踪文件还将包含这三个执行阶段的详细统计信息。你通常使用`TKPROF`等实用程序来格式化原始跟踪文件。然而，有时通过简单地滚动浏览文件，原始跟踪文件可以非常快速地向你显示有用的信息。锁定情况就是一个很好的例子，在这种情况下你可以目视检查原始跟踪文件。`TKPROF`不会为你提供有关\
  \ latches 和 locks（enqueues）的详细信息。如果你怀疑查询正在等待锁，深入研究原始跟踪文件会准确地向你显示查询在何处以及为何等待。在`WAIT`行中，经过时间（`ela`）显示了等待的时间量（以微秒为单位）。在我们的示例中，“Disk\
  \ file operations I/O”的等待经过时间是 15,833 微秒。因为 1 秒=1,000,000 微秒，所以这不是一个显著的等待时间。原始跟踪文件清楚地显示了是\
  \ I/O 等待事件（如此例所示）还是其他类型的等待事件阻碍了查询。如果查询正在等待锁，你将看到类似以下内容：`WAIT #2: nam='enqueue ela-300….\
  \ `\n\n我们在此方法中特意将讨论保持简短，因为诸如`TKPROF`和 Oracle Trace Analyzer 之类的工具通过分析原始跟踪文件为你提供复杂的诊断信息。\n\
  \n### 10-6. 分析 Oracle 跟踪文件\n\n#### 问题\n\n你想知道如何分析 Oracle 跟踪文件。\n\n#### 解决方案\n\n\
  有多种方法可以解释 SQL 跟踪文件。以下是不同的方法：\n\n*   在文本编辑器中阅读原始 SQL 跟踪文件。\n*   使用 Oracle 提供的`TKPROF`（跟踪内核分析器）实用程序。\n\
  *   使用 Oracle Trace Analyzer，这是一个可从 Oracle 支持免费下载的产品。\n*   使用第三方工具。\n\n\n## 工作原理\n\
  \n获取 SQL 跟踪通常比较容易，而分析它当然比收集跟踪更具挑战性。有时，如果你特别擅长，可以直接查看源跟踪文件本身，但在大多数情况下，你需要一个工具来解释和分析跟踪文件可能包含的大量数据。请注意，`TKPROF`\
  \ 或其他分析工具显示的是查询执行各个阶段的耗时，但不包含锁和闩锁的信息。如果你试图找出是否有任何锁在减慢查询速度，请查看原始跟踪文件，检查原始文件的 `WAIT`\
  \ 行中是否有任何入队等待事件。\n\n你可以轻松阅读某些跟踪文件，例如事件 10053 的跟踪文件，因为该文件不包含任何 SQL 执行统计信息（如解析、执行和获取统计信息），也没有等待事件分析——它主要包含基于成本的优化器（CBO）使用的执行路径跟踪。然而，对于任何\
  \ SQL 执行跟踪文件，例如使用事件 10046 生成的文件，虽然从技术上讲可以目视检查，但这不仅耗时，而且原始数据不是摘要形式，关键事件通常以晦涩的方式描述。因此，使用像\
  \ `TKPROF` 实用程序这样的分析器确实是你的最佳选择。\n\n`TKPROF` 实用程序是 Oracle 提供的分析工具，大多数 Oracle DBA\
  \ 会例行使用。配方 10-7 和 10-8 展示了如何使用 `TKPROF`。\n\nOracle 的 Trace Analyzer 是免费的（你需要从 Oracle\
  \ Support 下载），易于安装和使用，并能生成包含大量有用诊断信息的清晰报告。你确实需要先安装该工具，但安装只需几分钟即可完成。之后，你只需将跟踪文件的名称传递给一个脚本以生成格式化输出。配方\
  \ 10-9 展示了如何安装和使用 Oracle Trace Analyzer。\n\n还有一些第三方分析工具提供 `TKPROF` 实用程序所不具备的功能。其中一些工具能生成漂亮的\
  \ HTML 跟踪报告，有些还包括图表，以帮助你目视检查你跟踪的 SQL 语句执行的详细信息。请注意，为了使用其中一些产品，你需要上传你的跟踪文件进行分析。如果你的跟踪文件包含敏感数据或安全信息，这可能不适用。\n\
  \n### 10-7. 使用 TKPROF 格式化跟踪文件\n\n#### 问题\n\n你已经跟踪了一个会话，并希望使用 `TKPROF` 来格式化跟踪文件。\n\
  \n#### 解决方案\n\n你从命令行运行 `TKPROF` 实用程序。以下是一个典型的用于格式化跟踪文件的 `tkprof` 命令示例。\n\n```\n\
  $ tkprof user_sql_001.trc user1.prf explain=hr/hr table=hr.temp_plan_table_a sys=no\n\
    sort=exeela,prsela,fchela\n```\n\n在此示例中，`tkprof` 命令接受 `user_sql_001.trc` 跟踪文件作为输入，并生成一个名为\
  \ `user1.prf` 的输出文件。本配方的“工作原理”部分解释了 `TKPROF` 实用程序的关键可选参数。\n\n#### 工作原理\n\n`TKPROF`\
  \ 是一个实用程序，可让你格式化使用事件 10046 或通过 `DBMS_MONITOR` 包生成的任何扩展跟踪文件。你可以使用此工具生成报告，用于分析本章解释的各种\
  \ SQL 跟踪结果。你可以在单个跟踪文件或使用 `trcsess` 实用程序连接的一组跟踪文件上运行 `TKPROF`。`TKPROF` 显示 SQL 语句执行各个方面的详细信息，例如以下内容：\n\
  \n*   SQL 语句文本\n*   SQL 跟踪统计信息\n*   解析和执行阶段期间库缓存未命中的次数\n*   所有 SQL 语句的执行计划\n*  \
  \ 递归 SQL 调用\n\n你可以通过不带任何参数地发出 `tkprof` 命令来查看可以指定的所有参数列表，如下所示：\n\n```\n$ tkprof\n\
  Usage: tkprof tracefile outputfile [explain= ] [table= ]\n              [print=\
  \ ] [insert= ] [sys= ] [sort= ]\n...\n```\n\n> 以下是你可以使用 `tkprof` 命令指定的重要参数的简要说明：\n\
  >\n> `filename1`：指定跟踪文件的名称\n>\n> `filename2`：指定格式化的输出文件\n>\n> `waits`：指定输出文件是否应记录等待事件的摘要；默认是`yes`。\n\
  >\n> `sort`：默认情况下，`TKPROF` 按执行顺序列出跟踪文件中的 SQL 语句。你可以使用 `sort` 参数指定各种选项来控制 `TKPROF`\
  \ 列出各个 SQL 语句的顺序。\n>\n> *   `prscpu`：解析花费的 CPU 时间\n> *   `prsela`：解析花费的耗时\n> * \
  \  `execpu`：执行花费的 CPU 时间\n> *   `exeela`：执行花费的耗时\n> *   `fchela`：获取花费的耗时\n>\n> `print`：默认情况下\
  \ `TKPROF` 会列出所有跟踪到的 SQL 语句。通过为 `print` 选项指定一个值，你可以限制输出文件中列出的 SQL 语句数量。\n>\n> `sys`：默认情况下\
  \ `TKPROF` 列出用户 SYS 发出的所有 SQL 语句以及递归语句。为 `sys` 参数指定值 `no` 可使 `TKPROF` 省略这些语句。\n\
  >\n> `explain`：将执行计划写入输出文件；`TKPROF` 连接到数据库并使用你在此参数提供的用户名和密码发出 explain plan 语句。\n\
  >\n> `table`：默认情况下，`TKPROF` 使用由 explain 参数指定的用户模式中名为 `PLAN_TABLE` 的表来存储执行计划。你可以使用\
  \ table 参数指定一个替代表。\n>\n> `width`：这是一个整数，决定了某些类型输出（如 explain plan 信息）的输出行宽。\n\n###\
  \ 10-8. 分析 TKPROF 输出\n\n#### 问题\n\n你已经使用 `TKPROF` 格式化了一个跟踪文件，现在希望分析 `TKPROF` 输出文件。\n\
  \n#### 解决方案\n\n使用 `tkprof` 命令调用 `TKPROF` 实用程序，如下所示：\n\n```\nc:\\>tkprof orcl1_ora_6448_mytrace1.trc\
  \ ora6448.prf explain=hr/hr sys=no sort=prsela,exeela,fchela\n\nTKPROF: Release\
  \ 11.2.0.1.0 - Development on Sat May 14 11:36:35 2011\n\nCopyright (c) 1982, 2009,\
  \ Oracle and/or its affiliates.  All rights reserved.\n\nc:\\app\\ora\\diag\\rdbms\\\
  orcl1\\orcl1\\trace>\n```\n\n在此示例中，`orcl1_ora_6448_mytrace1.trc` 是你想要格式化的跟踪文件。`ora6448.prf`\
  \ 文件是 `TKPROF` 输出文件。随后的“工作原理”部分展示了如何解释 `TKPROF` 输出文件。\n\n#### 工作原理\n\n在我们的示例中，只有一个\
  \ SQL 语句。因此，排序参数（`prsecla`, `exeela`, `fchela`）并不重要，因为它们仅在 `TKPROF` 需要列出多个 SQL 语句时才会起作用。以下是\
  \ `TKPROF` 输出文件中关键部分的简要说明。\n\n##### 标题\n\n标题部分显示了跟踪文件名、排序选项以及输出文件中所用术语的描述。\n\n```\n\
  Trace file: orcl1_ora_6448_mytrace1.trc\nSort options: prsela  exeela  fchela  \n\
  ********************************************************************************\n\
  count    = number of times OCI procedure was executed\ncpu      = cpu time in seconds\
  \ executing\nelapsed  = elapsed time in seconds executing\ndisk     = number of\
  \ physical reads of buffers from disk\nquery    = number of buffers gotten for consistent\
  \ read\ncurrent  = number of buffers gotten in current mode (usually for update)\n\
  rows     = number of rows processed by the fetch or execute call\n*************************************************************************\n\
  ```\n\n\n\n## 执行统计\n\n`TKPROF` 会列出跟踪文件中每条 SQL 语句的执行统计信息。`TKPROF` 列出了 SQL 语句处理过程中三个步骤的执行统计：`解析`、`执行`\
  \ 和 `获取`。\n\n```\n调用   次数      CPU 时间   耗时      磁盘读    查询(一致模式)  查询(当前模式)  行数\n\
  ------- ------  -------- -------- ---------- ---------- ---------- ----------\n\
  Parse        1      0.01       0.03          0         64          0          0\n\
  Execute      1      0.00       0.00          0          0          0          0\n\
  Fetch     5461      0.29       0.40          0       1299          0      81901\n\
  ------- ------  -------- -------- ---------- ---------- ---------- ----------\n\
  total     5463      0.31       0.43          0       1363          0      81901\n\
  ```\n\n> 下表解释了 SQL 执行统计表中各项的含义：\n>\n> `count`：数据库解析、执行或获取此语句的次数\n>\n> `cpu`：解析/执行/获取阶段所使用的\
  \ CPU 时间\n>\n> `elapsed`：解析/执行/获取阶段的总耗时（以秒为单位）\n>\n> `disk`：解析/执行/获取阶段的物理数据块读取次数\n\
  >\n> `query`：在一致模式下，通过逻辑读从缓冲区缓存中读取的数据块数量（针对 `select` 语句的解析/获取/执行阶段）\n>\n> `current`：在当前模式下，通过逻辑读从缓冲区缓存中读取和检索的数据块数量（针对\
  \ `insert`、`update`、`delete` 和 `merge` 语句）\n>\n> `rows`：对于 `select` 语句，表示获取的行数；对于\
  \ `insert`、`delete`、`update` 或 `merge` 语句，则分别表示插入、删除或更新的行数\n\n## 行源操作\n\n报告的下一部分显示了库缓存中的未命中次数、当前的优化器模式以及查询的行源操作。行源操作显示了数据库为每个操作（如连接或全表扫描）处理的行数。\n\
  \n```\n解析期间库缓存未命中次数：1\n优化器模式：ALL_ROWS\n解析用户 ID：85  (HR)\n\n行数   行源操作\n-------  ---------------------------------------------------\n\
  \  81901  HASH JOIN  (cr=1299 pr=0 pw=0 time=3682295 us cost=22 size=41029632 card=217088)\n\
  \   1728   TABLE ACCESS FULL DEPT (cr=16 pr=0 pw=0 time=246 us cost=6 size=96768\
  \ card=1728)\n   1291   TABLE ACCESS FULL EMP (cr=1283 pr=0 pw=0 time=51213 us cost=14\
  \ size=455392 card=3424)\n```\n\n`解析期间库缓存未命中次数` 表示在解析和执行数据库调用期间的硬解析次数。在 `行源操作` 列中，输出包含了每个行源操作的若干统计信息。这些统计信息量化了行源操作期间执行的各种类型的工作。以下是不同统计信息的含义（并非每个查询都会显示所有信息）：\n\
  \n> `cr`：通过一致模式逻辑读取的数据块数\n>\n> `pr`：通过物理磁盘读取的数据块数\n>\n> `pw`：通过物理写入磁盘的数据块数\n>\n\
  > `time`：处理该操作花费的总时间（以毫秒为单位）\n>\n> `cost`：该操作的估计成本\n>\n> `size`：该操作返回的数据量估计值（字节）\n\
  >\n> `card`：该操作返回的行数估计值\n\n## 执行计划\n\n如果您在发出 `tkprof` 命令时指定了 `explain` 参数，您将看到一个执行表，显示每条\
  \ SQL 语句的执行计划。\n\n```\n行数   执行计划\n-------  ---------------------------------------\n\
  \      0  SELECT STATEMENT   MODE: ALL_ROWS\n  81901   HASH JOIN\n   1728    TABLE\
  \ ACCESS (FULL) OF 'DEPT' (TABLE)\n   1291    TABLE ACCESS (FULL) OF 'EMP' (TABLE)\n\
  ```\n\n在我们的示例中，执行计划显示有两次全表扫描，随后进行了一次哈希连接。\n\n## 等待事件\n\n只有在跟踪命令中指定了 `waits=>true`\
  \ 时，您才会看到等待事件部分。等待事件表总结了跟踪期间的等待情况：\n\n```\n耗时包括等待以下事件：\n  等待的事件                \
  \          等待次数  最大等待时间  总等待时间\n  ----------------------------------------   -------\
  \  ----------  ------------\n    SQL*Net message from client                5461\
  \     112.95        462.81\n    db file sequential read                      1 \
  \      0.05          0.05\n```\n\n```\n********************************************************************************\n\
  ```\n\n在此示例中，`SQL*Net message to client` 等待占据了大部分等待，但这些属于空闲等待。如果您看到诸如 `db file sequential\
  \ read` 或 `db file scattered read` 之类的等待事件，并且等待次数（和/或总等待时间）显著，您需要进一步调查这些等待事件。\n\n\
  请注意，`TKPROF` 输出不会显示任何绑定变量的信息。它也不显示因队列锁而导致的任何等待。\n\n### 10-9. 使用 Oracle Trace Analyzer\
  \ 分析跟踪文件\n\n#### 问题\n\n您想使用 Oracle Trace Analyzer 来分析跟踪文件。\n\n\n"
- "# 10-10. 追踪并行查询\n\n## 解决方案\n\nOracle Trace Analyzer，也称为 TRCANLZR 或 TRCA，是一个 SQL\
  \ 跟踪分析工具，可作为 `TKPROF` 工具的替代方案。您必须从 Oracle Support 下载 TRCA。下载后，解压文件并通过执行 `/trca/install/trcreate.sql`\
  \ 脚本来安装 TRCA。\n\n安装 TRCA 后，您必须以具有 SYSDBA 权限的用户登录来执行 `tacreate.sql` 脚本。`tacreate.sql`\
  \ 会为任何已生成的跟踪文件生成格式化输出文件。该脚本会询问您有关跟踪文件位置、输出文件以及希望 TRCA 存储其数据的表空间等信息。\n\n以下是安装和运行\
  \ TRCA 的步骤。\n\n1.  安装 TRCA 非常简单，这里我们只展示安装摘要：\n    ```\n    SQL> @tacreate.sql\n\
  \    Uninstalling TRCA, please wait\n    TADOBJ completed.\n    SQL>\n    SQL> WHENEVER\
  \ SQLERROR EXIT SQL.SQLCODE;\n    SQL> REM If this DROP USER command fails that\
  \ means a session is connected with this user.\n    SQL> DROP USER trcanlzr CASCADE;\n\
  \    SQL> WHENEVER SQLERROR CONTINUE;\n    SQL>\n    SQL> SET ECHO OFF;\n    TADUSR\
  \ completed.\n    TADROP completed.\n\n    Creating TRCA$ INPUT/BDUMP/STAGE Server\
  \ Directories\n    ...\n\n    TACREATE completed. Installation completed successfully.\n\
  \    SQL>\n    ```\n2.  设置跟踪。\n    ```\n    SQL> alter session set events '10046\
  \ trace name context forever, level 12';\n\n    System altered.\n\n    SQL>\n  \
  \  ```\n3.  执行要跟踪的 SQL 语句。\n    ```\n    SQL> select ...\n    ```\n4.  关闭跟踪。\n \
  \   ```\n    SQL> alter session set events '10046 trace name context off';\n   \
  \ System altered.\n\n    SQL>\n    ```\n5.  运行 `/trca/run/trcanlzr` 脚本（`START trcanlzr.sql`）来分析刚刚生成的跟踪文件。您必须将跟踪文件名作为输入传递给此脚本：\n\
  \    ```\n    c:\\trace\\trca\\trca\\run>sqlplus hr/hr\n    SQL> START trcanlzr.sql\
  \ orcl1_ora_7460_mytrace7.trc\n    Parameter 1:\n    Trace Filename or control_file.txt\
  \ (required)\n    Value passed to trcanlzr.sql:\n    ~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n\
  \    TRACE_FILENAME: orcl1_ora_7460_mytrace7.trc\n    Analyzing orcl1_ora_7460_mytrace7.trc\n\
  \    ... analyzing trace(s) ...\n    Trace Analyzer completed.\n    Review first\
  \ trcanlzr_error.log file for possible fatal errors.\n    TKPROF: Release 11.2.0.1.0\
  \ - Development on Sat May 14 15:59:13 2011\n      …\n       233387  05/14/2011\
  \ 15:59   trca_e21106.html\n       115885  05/14/2011 15:59   trca_e21106.txt\n\
  \    File trca_e21106.zip has been created\n    TRCANLZR completed.\n    SQL>\n\
  \    c:\\trace\\trca\\trca\\run>\n    ```\n\n现在，您可以在文本或 HTML 格式中查看分析后的跟踪数据——TRCA\
  \ 在完成跟踪文件分析后创建的 ZIP 文件中提供了这两种格式。TRCA 将 ZIP 文件放在运行 `/trca/run/trcanlzr.sql` 脚本的目录中。\n\
  \n## 工作原理\n\nOracle Support Center of Expertise (CoE) 提供了 TRCA 诊断工具。虽然许多 DBA 知道\
  \ TRCA，但很少有人定期使用它。我们中的一些人只是在 Oracle Support 要求时才使用它。正如您在“解决方案”部分学到的，TRCA 工具接受您生成的\
  \ SQL 跟踪，并以文本和 HTML 格式输出诊断报告。TRCA 工具还为您提供 `TKPROF` 报告（它在诊断数据收集中执行 `tkprof` 命令）。由于\
  \ TRCA 提供了丰富的诊断信息，请考虑使用它来代替 `TKPROF`。\n\n除了 `TKPROF` 工具通常收集的数据外，TRCA 还会识别昂贵的 SQL\
  \ 语句并收集它们的执行计划。它还显示优化器统计信息和配置参数，这些参数对跟踪中 SQL 语句的性能有影响。\n\n![images](img/square.jpg)\
  \ **提示** 使用 TRCA 而不是 `TKPROF` 来分析您的跟踪文件——它不仅为您提供丰富的诊断信息，还附带赠送一个 `TKPROF` 输出文件。\n\
  \n在我们的示例中，我们在生成跟踪的同一系统上使用 TRCA 来格式化跟踪文件。但是，如果您无法在生产系统上安装 TRCA，不用担心。TRCA 也可以使用不同的系统分析生产环境中的跟踪。详细信息在\
  \ `trca_instructions` HTML 文档中，该文档是 TRCA 下载 ZIP 文件的一部分。\n\n以下是 TRCA 报告的主要部分，正如您已经看到的，该报告提供了比\
  \ `TKPROF` 更丰富的诊断信息。\n\n> *摘要*：提供耗时、分解为 CPU 和非空闲等待时间的响应时间以及其他与响应时间相关的信息的细分。\n>\n\
  > *非递归时间和总计*：提供解析、执行和获取步骤期间的响应时间和耗时的细分；报告还包含一个表，提供每个空闲和非空闲等待事件的总计和平均等待时间。\n>\n>\
  \ *Top SQL*：提供有关占用最多响应时间、耗时和 CPU 时间的 SQL 语句的详细信息，如下方报告摘录所示：\n> ```\n> There are\
  \ 2 SQL statements with \"Response Time Accounted-for\" larger than threshold of\
  \ 10.0% of the \"Total Response Time Accounted-for\"\n> These combined 2 SQL statements\
  \ are responsible for a total of 99.3% of the \"Total Response Time Accounted-for\"\
  .\n>\n> There are 3 SQL statements with \"Elapsed Time\" larger than threshold of\
  \ 10.0% of the \"Total Elapsed Time\".\n> These combined 3 SQL statements are responsible\
  \ for a total of 75.5% of the \"Total Elapsed Time\".\n>\n> There is only one SQL\
  \ statement with \"CPU Time\" larger than threshold of 10.0% of the \"Total CPU\
  \ Time\".\n> ```\n> *单个 SQL*：这是一个非常有用的部分，它列出了所有 SQL 语句并显示了它们的耗时、响应时间和 CPU 时间。它提供了每条语句的哈希值和\
  \ SQL ID。\n>\n> *SQL 自身时间、总计、等待、绑定和行源计划*：显示每条语句的解析、执行和获取统计信息，类似于 `TKPROF` 工具；它还显示了每条语句的等待事件细分（平均和总时间）。每条语句还有一个非常好的执行计划，显示了每个执行步骤的时间和成本。\n\
  >\n> *表和索引*：显示行数、分区状态、样本大小以及对象上次分析的时间；对于索引，它还额外显示聚簇因子和键数。\n>\n> *摘要*：显示与 I/O 相关的等待（例如\
  \ db file sequential read 事件）信息，包括表的平均和总等待时间。\n>\n> *热 I/O 块*：显示等待时间最长或等待次数最多的块列表。\n\
  >\n> *非默认初始化参数*：列出所有非默认初始化参数。\n\n正如对 TRCA 的简要回顾所示，它是一个比 `TKPROF` 优越得多的工具。此外，如果您碰巧喜欢\
  \ `TKPROF` 报告，它的 ZIP 文件中也包含了这些报告。那么，您还在等什么？下载 TRCA 并利用它对问题 SQL 语句的丰富诊断分析能力吧。\n\n\
  ## 问题\n\n您希望追踪一个并行查询。\n\n\n#### 解决方案\n\n获取并行查询的 10046 跟踪文件的方式与获取任何其他查询的方式相同。唯一的区别是，10046\
  \ 事件将生成与并行查询服务器数量一样多的跟踪文件。下面是一个示例：\n\n```sql\nSQL> alter session set tracefile_identifier='MyTrace1';\n\
  \nSQL> alter session set events '10046 trace name context forever, level 12';\n\n\
  Session altered.\n\nSQL> select /*+ full(sales) parallel (sales 6) */ count(quantity_sold)\
  \ from\n     sales;\n\nCOUNT(QUANTITY_SOLD)\n--------------------\n            \
  \  918843\n\nSQL> alter session set events '10046 trace name context off';\n\nSession\
  \ altered.\n\nSQL>\n```\n\n现在，你将在跟踪目录中看到总共七个带有跟踪文件标识符 `MyTrace1` 的跟踪文件。根据你要查找的内容，你可以分别分析每个跟踪文件，或者在用\
  \ `TKPROF` 或 Oracle Trace Analyzer 等其他分析器进行分析之前，使用 `trcsess` 工具将它们合并成一个大的跟踪文件。你还会在跟踪目录中找到一些后缀为\
  \ `.trm` 的文件——可以忽略这些文件，因为它们是供数据库使用的。\n\n#### 工作原理\n\n获取单个查询的扩展跟踪与获取并行查询的扩展跟踪之间，唯一真正的区别在于你会得到多个跟踪文件，每个并行查询服务器对应一个。当用户执行并行查询时，Oracle\
  \ 会创建多个并行查询进程来处理该查询，每个进程都有自己的会话。这就是 Oracle 为并行查询创建多个跟踪文件的原因。\n\n关闭跟踪后，转到跟踪目录并执行以下命令以查找并行查询的所有跟踪文件：\n\
  \n```bash\n$ find . -name '*MyTrace1*'\n```\n\n`find` 命令会列出你并行查询的所有跟踪文件（忽略跟踪目录中以\
  \ `.trm` 结尾的文件）。你可以将跟踪文件移动到另一个目录，并使用 `trcsess` 工具合并这些文件，如下所示：\n\n```bash\n$ trcsess\
  \ output=MyTrace1.trc clientid='px_test1' orcl1_ora_8432_mytrace1.trc orcl1_ora_8432_mytrace2.trc\n\
  ```\n\n现在，你已准备好使用 `TKPROF` 工具来分析并行查询。\n\n当你发出并行查询时，并行执行协调器/查询协调器 (`QC`) 控制查询的执行。并行执行服务器/从属进程\
  \ (`QS`) 执行实际的工作。并行执行服务器*集*是执行某个操作的所有查询服务器的集合。查询协调器和每个执行服务器都会生成自己的跟踪文件。例如，如果某个从属进程在等待资源，数据库会将由此产生的等待事件记录在该从属进程的跟踪文件中，而不是查询协调器的跟踪文件中。\n\
  \n请注意，如果你使用的是 10.2 或更早的版本，用户进程的跟踪文件将创建在用户转储目录中，而后台进程（从属进程）将在后台转储目录中生成跟踪文件。在 11.1\
  \ 及更新版本的数据库中，后台和用户进程的跟踪文件都在同一个目录（trace）中。你可以在调用 `ADRCI` 后执行 `show tracefile -t`\
  \ 命令，或者通过 SQL*Plus 查询 `V$DIAG_INFO` 视图来查找跟踪文件名。\n\n### 10-11. 跟踪特定的并行查询进程\n\n####\
  \ 问题\n\n你想要跟踪一个或多个特定的并行查询进程。\n\n#### 解决方案\n\n使用以下命令识别你想要跟踪的并行查询进程。\n\n```sql\nSQL>\
  \ select inst_id,p.server_name,\n     p.status as p_status,\n     p.pid as p_pid,\n\
  \     p.sid as p_sid\n     from  gv$px_process p\n     order by p.server_name;\n\
  ```\n\n假设你决定跟踪进程 `p002` 和 `p003`。发出以下 `alter system set events` 命令以仅跟踪这两个并行进程。\n\
  \n```sql\nSQL> alter system set events 'sql_trace  {process: pname = p002 | p003}';\n\
  ```\n\n跟踪完成后，发出以下命令关闭跟踪：\n\n```sql\nSQL> alter system set events 'sql_trace  {process:\
  \ pname = p002 | p003} off';\n```\n\n#### 工作原理\n\n跟踪并行进程总是很棘手。Oracle Database 11g\
  \ 版本对跟踪基础设施的一项改进是能够跟踪特定语句或一组语句。当某个会话正在执行大量 SQL 语句，并且你确切知道要跟踪其执行的 SQL 语句的身份时，这一功能就派上用场了。\n\
  \n### 10-12. 在 RAC 系统中跟踪并行查询\n\n#### 问题\n\n你正在 RAC 环境中跟踪一个并行查询，但不确定跟踪文件位于哪个实例中。\n\
  \n#### 解决方案\n\n在 RAC 环境中查找服务器（或线程或从属）进程的跟踪文件有时很困难，因为你不确定数据库在哪个或哪些节点上创建了跟踪文件。请按照以下步骤操作，以便更轻松地在不同节点上查找跟踪文件。\n\
  \n> 1.  使用 `alter session` 命令设置 `px_trace`，以帮助识别跟踪文件，如下所示：\n>     ```sql\n>    \
  \ SQL> alter session set tracefile_identifier='10046';\n>     SQL> alter session\
  \ set  \"_px_trace\" = low , messaging;\n>     SQL> alter session set events '10046\
  \ trace name context forever,level 12';\n>     ```\n> 2.  执行你的并行查询。\n>     ```sql\n\
  >     SQL> alter table bigsales (parallel 4);\n>     SQL> select count(*) from bigsales;\n\
  >     ```\n> 3.  关闭所有跟踪。\n>     ```sql\n>     SQL> alter session set events '10046\
  \ trace name context off';\n>     SQL> alter session set \"_px_trace\" = none;\n\
  >     ```\n\n指定 `px_trace` 将导致查询协调器的跟踪文件包含有关作为查询一部分的从属进程以及每个从属进程所属实例的信息。然后，你可以从查询协调器跟踪文件中列出的实例中检索跟踪文件。\n\
  \n#### 工作原理\n\n`_px_trace` (px trace) 参数是一个未文档化的内部 Oracle 参数，自 9.2 版本起就已存在。一旦你运行了本“解决方案”部分中所示的跟踪命令，查询协调器\
  \ (`QC`) 进程的跟踪文件将显示其中运行的每个从属进程的名称以及这些进程运行所在的实例——例如：\n\n```\nAcquired 4 slaves on\
  \ 1 instances avg height=4 in 1 set q serial:2049\n        P000 inst 1 spid 7512\n\
  \        P001 inst 1 spid 4088\n        P002 inst 1 spid 7340\n        P003 inst\
  \ 1 spid 9256\n```\n\n在这种情况下，你知道需要在实例 1 中查找从属进程 `P000`、`P001`、`P002` 和 `P003` 的跟踪文件。在实例\
  \ 1 上，在 ADR 跟踪子目录中，查找文件名中包含 `P000`（或 `P001`/`P002`/`P003`）字样的文件，以识别正确的跟踪文件。\n\n\
  ### 10-13. 合并多个跟踪文件\n\n#### 问题\n\n你已经为某个会话生成了多个跟踪文件以调整性能，并希望将这些文件合并成一个跟踪文件。\n\n\
  #### 解决方案\n\n使用 `trcsess` 命令将多个跟踪文件合并成一个跟踪文件。下面是一个简单的例子：\n\n```bash\nc:\\trace>\
  \ trcsess output=combined.trc session=196.614 orcl1_ora_8432_mytrace1.trc orcl1_ora_8432_mytrace2.trc\n\
  C:\\trace>\n```\n\n此处显示的 `trcsess` 命令将为某个会话生成的两个跟踪文件合并为一个跟踪文件。`session` 参数使用会话标识符（由会话索引和会话序列号组成）来标识会话，你可以从\
  \ `V$SESSION` 视图中获取该标识符。\n\n\n\n"
- "# 工作原理\n\n`trcsess` 实用程序是 Oracle 数据库的一部分，可在性能调优和调试过程中帮助你合并多个跟踪文件。以下是 `trcsess`\
  \ 命令的语法：\n\n```shell\ntrcsess [output=output_file_name]\n           [session=session_id]\n\
  \           [client_id=cleint_id]\n           [service=service_name]\n         \
  \  [action=action_name]\n           [module=module_name]\n           [trace_files]\n\
  ```\n\n发出 `trcsess` 命令时，必须指定以下五个选项之一：`session`、`client_id`、`service`、`action` 和\
  \ `module`。例如，如果你按如下方式发出命令，该命令会包含当前目录中某个会话的所有跟踪文件，并将其合并为一个文件：\n\n```shell\n$ trcsess\
  \ output=main.trc session=196.614\n```\n\n在我们的示例中，我们使用 `output` 选项指定了合并后跟踪文件的名称。如果未指定输出选项，`trcsess`\
  \ 会将输出打印到标准输出。一旦使用 `trcsess` 将多个跟踪文件的输出合并为一个文件，你就可以使用 `TKPROF` 实用程序来分析该文件，就像分析单个跟踪文件一样。\n\
  \n### 10-14. 查找用于跟踪的正确会话\n\n### 问题\n\n你想从你自己的会话为某个用户发起会话跟踪，并且你想找出要跟踪的正确会话。\n\n###\
  \ 解决方案\n\n你必须拥有要跟踪其会话的用户的 `SID` 和序列号。当然，一旦你知道用户名，就可以从 `V$SESSION` 视图中找到这些信息。然而，你必须获取有关该用户会话的若干其他详细信息才能识别正确的会话，因为该用户可能打开了多个会话。使用以下查询获取用户信息：\n\
  \n```sql\nSQL> select a.sid, a.serial#, b.spid, b.pid,\n     a.username, a.osuser,\
  \ a.machine\n     from\n     v$session a,\n     v$process b\n     where a.username\
  \ IS NOT NULL\n     and a.paddr=b.addr;\n```\n\n该查询提供了诸如 `USERNAME`、`OSUSER` 和 `MACHINE`\
  \ 等多个属性，这些属性可帮助你明确无误地选择正确的会话。\n\n### 工作原理\n\n你不能总是依赖为要跟踪其会话的用户找到的第一组 `SID` 和序列号。`SID`\
  \ 和序列号共同唯一标识一个会话。但是，你可能会发现同一用户有多个 `SID` 和序列号组合，因为你的数据库可能使用公共用户登录。因此，除了 `SID` 和序列号外，查询\
  \ `V$SESSION` 视图的其他信息（如 `OSUSER` 和 `MACHINE`）有助于识别正确的用户会话。\n\n`V$SESSION` 视图的列（如\
  \ `COMMAND`、`SERVER`、`LOGON_TIME`、`PROGRAM` 和 `LAST_CALL_ET`）有助于识别要跟踪的正确会话。如果仍然找不到正确的会话，你可能需要连接\
  \ `V$SESSION` 和 `V$SQLAREA` 视图来识别。\n\n### 10-15. 跟踪 SQL 会话\n\n### 问题\n\n你想为某个会话开启\
  \ SQL 跟踪以诊断性能问题。\n\n### 解决方案\n\n有多种方法可以跟踪会话，但 Oracle 推荐的方法是使用 `DBMS_MONITOR` 包来访问\
  \ SQL 跟踪功能。要跟踪会话，首先使用以下命令识别会话（假设你知道该会话的用户名或 SID）：\n\n```sql\nSQL> select sid, serial#,\
  \ username from v$session;\n```\n\n一旦从上一个查询中获取了 `SID` 和 `SERIAL#`，就调用 `DBMS_MONITOR`\
  \ 包的 `session_trace_enable` 过程，如下所示：\n\n```sql\nSQL> execute dbms_monitor.session_trace_enable(session_id=>138,serial_num=>242,\n\
  waits=>true,binds=>false);\nPL/SQL procedure successfully completed.\nSQL>\n```\n\
  \n**注意** SQL 跟踪确实会给数据库带来开销——在生产环境中跟踪会话时需要非常谨慎，因为跟踪文件可能会填满磁盘或对 CPU 使用率产生不利影响。\n\n\
  在此示例中，我们选择同时跟踪等待信息，但这是可选的。执行此命令后，让用户执行你正在测试的 SQL 语句（在开发或测试环境中）。在生产环境中，等待足够长的时间以确保捕获了\
  \ SQL 语句的执行，然后再关闭跟踪。调用 `session_trace_disable` 过程以禁用该会话的 SQL 跟踪，如下所示：\n\n```sql\n\
  SQL> execute dbms_monitor.session_trace_disable();\nPL/SQL procedure successfully\
  \ completed.\nSQL>\n```\n\n完成会话活动的跟踪后，你可以从跟踪目录中获取该会话的跟踪文件，并使用 `TKPROF` 实用程序（或其他分析器）获取报告。该跟踪文件将具有你设置为跟踪文件标识符的后缀\
  \ `mytrace1`。\n\n要跟踪当前用户会话，请使用以下命令对：\n\n```sql\nSQL> execute dbms_monitor.session_trace_enable();\n\
  SQL> execute dbms_monitor.session_trace_disable();\n```\n\n### 工作原理\n\n跟踪整个会话在资源使用方面代价高昂，只有在尚未识别出性能不佳的\
  \ SQL 语句时才应这样做。会话跟踪收集以下类型的信息：\n\n- 会话中运行的每个语句的物理读和逻辑读\n- CPU 时间和耗时\n- 每个语句处理的行数\n\
  - 库缓存中的未命中次数\n- 提交和回滚次数\n- 显示每个语句实际执行计划的行操作\n- 每个 SQL 语句的等待事件\n\n**注意** 你需要 DBA\
  \ 角色才能执行 `DBMS_MONITOR` 包中的过程和函数。\n\n> 你可以为 `session_trace_enable` 过程指定以下参数：\n>\n\
  > `session_id`：标识要跟踪的会话（`SID`）；如果省略此项，将跟踪你自己的会话。\n>\n> `serial_num`：会话的序列号\n>\n\
  > `waits`：如果要捕获等待信息，请将其设置为 true（默认 = false）。\n>\n> `binds`：如果要捕获绑定信息，请将其设置为 true（默认=false）。\n\
  >\n> `plan_stat`：确定行源统计信息（执行计划和执行统计信息）转储的频率\n>\n> `session_trace_enable` 过程的所有参数都是自解释的，除了\
  \ `plan_stat` 参数。你可以为此参数设置以下值：\n>\n> `never`：跟踪文件将不包含任何有关行源操作的信息。\n>\n> `first_execution`（等同于将\
  \ `plan_stat` 参数设置为 `null`）：行源信息在语句首次执行后写入一次。\n>\n> `all_executions`：为游标的每次执行都写入执行计划和执行统计信息，而不仅是在游标关闭时。\n\
  \n由于语句的执行计划在程序运行过程中可能会改变，如果你想捕获语句所有可能的执行计划，可能需要将 `plan_stat` 参数的值设置为 `all_executions`。\n\
  \n## 10-16. 通过进程 ID 跟踪会话\n\n### 问题\n\n你想使用操作系统进程 ID 来识别并跟踪一个会话。\n\n\n\n### 10-16.\
  \ 通过操作系统进程 ID 追踪会话\n\n#### 解决方案\n\n执行 `alter session`（或 `alter system`）`set events`\
  \ 命令，以根据操作系统的进程 ID 追踪会话，该 ID 由 `V$PROCESS` 视图中的 `SPID` 列显示。此命令的通用格式如下：\n\n`alter\
  \ session set events ‘sql_trace {process:pid}'`\n\n以下是根据操作系统进程 ID 追踪会话的步骤。\n\n>\
  \ 1.  通过查询 `V$PROCESS` 视图获取操作系统进程 ID。\n>     `SQL> select spid,pname from v$process;`\n\
  > 2.  一旦确定了用户的 `SPID`，请执行以下语句以开始对该会话的追踪：\n>     `SQL> alter session set events ‘sql_trace\
  \ {process:2714}';`\n>     `Session altered.`\n>     `SQL>`\n> 3.  通过以下方式关闭追踪：\n\
  >     `SQL> alter session set events ‘sql_trace {process:2714} off';`\n>     `Session\
  \ altered.`\n>     `SQL>`\n> 4.  您也可以通过以下方式执行 `set events` 命令，以连接两个进程：\n>     `SQL>\
  \ alter system set events ‘sql_trace {process:2714|2936}';`\n>     `System altered.`\n\
  >     `SQL> alter system set events ‘sql_trace {process:2714|2936} off';`\n>   \
  \  `System altered.`\n>     `SQL>`\n\n当您连接两个进程时，数据库会生成两个独立的跟踪文件，每个进程一个，如下所示：\n\n\
  `orcl1_ora_2714.trc`\n`orcl1_ora_2936.trc`\n\n#### 工作原理\n\n在 Oracle Database 11g\
  \ 中，`alter session set events` 命令得到了增强，允许您通过指定进程 ID（`PID`）、进程名称（`PNAME`）或 Oracle\
  \ 进程 ID（`ORAPID`）来追踪进程。您也可以使用具有相同通用语法的 `alter system` 命令。该命令的语法如下：\n\n`alter session\
  \ set events ‘sql_trace {process : pid = <pid>, pname = <pname>, orapid = <orapid>}\
  \ rest of event specification'`\n\n`V$PROCESS` 视图包含有关所有当前活动进程的信息。在 `V$PROCESS` 视图中，以下列可帮助您识别三个与进程相关的值：\n\
  \n`PID: the Oracle process identifier`\n`SPID: the Operating System process identifier`\n\
  `PNAME: name of the process`\n\n在本方法中，我们展示了如何使用操作系统进程标识符（`V$PROCESS` 视图中的 `SPID`\
  \ 列）生成跟踪文件。您可以使用此处显示的通用语法来生成使用 `PID` 或进程名称的跟踪。\n\n### 10-17. 追踪多个会话\n\n#### 问题\n\
  \n您想要追踪属于单个用户的多个 SQL 会话。\n\n#### 解决方案\n\n您可以使用 `DBMS_MONITOR` 包中的 `client_id_trace_enable`\
  \ 过程来追踪属于一个用户的多个会话。在执行 `dbms_monitor.client_id_trace_enable` 过程之前，必须使用 `DBMS_SESSION`\
  \ 包为会话设置 `client_identifier`，如下所示：\n\n`SQL> execute dbms_session.set_identifier('SH')`\n\
  \n一旦如上设置了客户端标识符，`V$SESSION` 视图中的 `client_identifier` 列就会被填充。您可以通过执行以下语句来确认 `client_identifier`\
  \ 列的值：\n\n`SQL> select sid, serial#,username from v$session where client_identifier='SH';`\n\
  \n现在您可以执行 `dbms_monitor.client_id_trace_enable` 过程：\n\n`SQL> execute dbms_monitor.client_id_trace_enable(client_id=>'SH',\
  \ waits=>true, binds=>false);`\n\n您可以使用以下命令禁用追踪：\n\n`SQL> execute dbms_monitor.client_id_trace_disable(client_id=>'SH');`\n\
  \n#### 工作原理\n\n设置 `client_identifier` 列允许您在多个用户可能作为同一 Oracle 用户连接时（尤其是在使用连接池的应用程序中）启用对多个会话的追踪。`client_id_trace_enable`\
  \ 过程为所有具有特定客户端 ID 的会话收集统计信息。\n\n请注意，您必须指定的 `client_id` 不必属于当前活动的会话。默认情况下，`waits`\
  \ 和 `binds` 参数设置为 `false`，您可以在执行 `client_id_trace_enable` 过程时添加这些参数来同时设置对等待和绑定的追踪：\n\
  \n`SQL> exec dbms_monitor.client_id_trace_enable('SH',true,true);`\n`PL/SQL procedure\
  \ successfully completed.`\n\n您可以查询 `DBA_ENABLED_TRACES` 视图以查找使用客户端标识符执行的跟踪的状态。在此视图中，`TRACE_TYPE`\
  \ 列显示值 `CLIENT_ID`，`PRIMARY_ID` 显示客户端标识符的值。\n\n`SQL> select trace_type, primary_id,waits,binds\
  \ from dba_enabled_traces;`\n`TRACE_TYPE       PRIMARY_ID        WAITS     BINDS`\n\
  `-------------    ---------------   --------  --------------`\n`CLIENT_ID        SH                TRUE      TRUE`\n\
  \n### 10-18. 追踪实例或数据库\n\n#### 问题\n\n您想要追踪整个实例或数据库中所有 SQL 语句的执行情况。\n\n#### 解决方案\n\
  \n使用 `dbms_monitor.database_trace_enable` 过程来追踪特定实例或整个数据库。执行以下命令以开始和停止对 *单个实例* 的追踪。\n\
  \n`SQL> execute dbms_monitor.database_trace_enable(instance_name=>'instance1');`\n\
  `SQL> execute dbms_monitor.database_trace_disable(instance_name=>'instance1');`\n\
  \n您可以选择指定 `waits` 和 `binds` 属性。以下命令在 *数据库级别* 启用和禁用 SQL 追踪：\n\n`SQL> execute dbms_monitor.database_trace_enable();`\n\
  `SQL> execute dbms_monitor.database_trace_disable();`\n\n您也可以将 `sql_trace` 初始化参数设置为\
  \ `true` 来打开和关闭 SQL 追踪，但此参数已不推荐使用。Oracle 建议您使用 `dbms_monitor`（或 `dbms_session`）包进行\
  \ SQL 追踪。\n\n#### 工作原理\n\n显然，实例级别和数据库级别的 SQL 追踪会带来严重的开销，并很可能成为另一个性能问题的来源！您通常不需要这样做——应使用会话级追踪来识别性能问题。如果您因为不知道查询可能从哪个会话执行而必须追踪整个实例，请尽快关闭追踪以减少开销。\n\
  \n### 10-19. 为会话生成事件 10046 跟踪\n\n#### 问题\n\n您想要获取会话的 Oracle 事件 10046 跟踪。\n\n####\
  \ 解决方案\n\n您可以按照以下步骤获取 Oracle 事件 10046 跟踪（也称为扩展跟踪）：\n\n> 1.  设置您的跟踪文件标识符。\n>    \
  \ `SQL> alter session set tracefile_identifier='10046';`\n> 2.  执行以下语句以开始跟踪。\n>\
  \     `SQL> alter session set events '10046 trace name context forever, level 12'`\n\
  > 3.  执行您想要跟踪的 SQL 语句。\n>     `SQL> select sum(amount_sold) from sales;`\n> 4. \
  \ 使用以下命令关闭跟踪：\n>     `SQL> alter session set events '10046 trace name context off';`\n\
  \n您会在由 `diagnostic_dest` 参数指定的跟踪目录（`($DIAG_HOME/rdbms/db/inst/trace`）中找到跟踪转储文件。您可以使用\
  \ `TKPROF` 或 Oracle Trace Analyzer 等其他实用程序分析此跟踪文件。\n\n\n\n## 工作原理\n\n以下是设置 10046\
  \ 跟踪语法中各个关键词的含义：\n\n`set events`：设置特定的 Oracle 事件，此处为事件 10046。\n\n`10046`：指定何时应采取操作。\n\
  \n`trace`：当事件 10046 发生时，数据库必须执行此操作。\n\n`name`：指示转储或跟踪的类型。\n\n`context`：指定 Oracle\
  \ 应生成上下文相关的跟踪；如果将 `context` 替换为 `errorstack`，数据库将不会跟踪 SQL 语句。它在遇到 10046 事件时转储错误堆栈。\n\
  \n`forever`：指定关键词 `forever` 告知数据库在每次调用事件 10046 时都调用该操作（跟踪），直到你禁用 10046 跟踪。如果省略关键词\
  \ `forever`，则该操作仅被调用一次，之后事件会自动禁用。\n\n`level 12`：指定跟踪级别——在此情况下，它捕获绑定变量和等待事件信息。\n\n\
  虽然 Oracle 事件 10046 已存在多年，但此跟踪与你可以使用 `DBMS_MONITOR` 包的 `session_trace_enable` 过程生成的跟踪完全相同：\n\
  ```sql\nSQL> execute dbms_monitor.session_trace_enable(session_id=>99, serial_num=>88,waits=>true,binds=>true);\n\
  ```\n此处显示的 10046 事件和 `dbms_monitor.session_trace_enable` 过程都生成相同的跟踪信息，称为扩展跟踪，因为它包含了等待事件和绑定变量数据。\n\
  \n如果你没有使用 Oracle Database 11g 引入的新诊断基础设施 (ADR)，请务必将转储文件大小设置为 `unlimited` 值，因为 10046\
  \ 跟踪通常会产生非常大的跟踪文件，如果跟踪转储目录中空间不足，数据库将截断转储文件。\n\n你为 10046 跟踪指定的级别决定了跟踪收集哪些类型的信息。默认级别是\
  \ 1，收集基本信息。级别 4 允许你捕获绑定变量值，这些值显示为 `:bi`、`:b2` 等。你可以看到 Oracle 为每个绑定变量替换的实际值。级别 8\
  \ 提供级别 1 跟踪的所有信息，外加在 SQL 查询执行过程中所有等待事件的详细信息。级别 12 跟踪是级别 4 和级别 8 跟踪的组合，意味着它将包含绑定变量和等待事件信息。级别\
  \ 16 在 Oracle Database 11g 中是新增的，它为查询的每次执行提供 STAT 行转储。请注意，这与在使用 `dbms_monitor.session_trace_enable`\
  \ 过程进行跟踪时为 `plan_level` 参数设置 `all_executions` 值相同。\n\n![images](img/square.jpg)\
  \ **提示** 如果在禁用跟踪之前会话没有正常关闭，你的跟踪文件可能不包含重要的跟踪信息。\n\n虽然获取 10046 跟踪并分析它确实提供了关于绑定变量使用和等待事件的宝贵信息，但你需要谨慎选择何时跟踪会话。如果实例整体性能不佳，运行跟踪产生的开销甚至可能使性能变得更差。此外，完成跟踪、通过\
  \ `TKPROF` 或其他分析器运行它，并审查报告中数十条 SQL 语句都需要时间。以下是在我们自己的工作中行之有效的通用策略：\n\n如果你正在诊断一般的性能问题，一个好的第一步是获取\
  \ AWR 报告，最好是以 1-15 分钟的间隔拍摄多个快照。通常，通过审查 AWR 报告就可以识别问题。该报告将突出显示诸如低效的 SQL 语句、各种类型的争用、内存问题、闩锁以及影响性能的全表扫描等内容。无需运行\
  \ 10046 跟踪即可获取所有这些信息。\n\n当用户报告问题而你无法通过 AWR 报告识别问题时，请运行 10046 跟踪。如果你已经明确识别出一个性能不佳的进程，可以跟踪相关的会话。你也可以在开发环境中运行此跟踪，以帮助开发人员理解查询执行细节并优化其查询。\n\
  \n### 10-20. 为实例生成事件 10046 跟踪\n\n#### 问题\n\n你想要跟踪有问题的 SQL 查询，但无法提前识别会话。你希望跟踪实例执行的所有\
  \ SQL 语句。\n\n#### 解决方案\n\n连接到你想要跟踪的实例后，可以使用以下 `alter system` 命令在实例级别开启跟踪：\n```sql\n\
  SQL> alter system set events '10046 trace name context forever,level 12';\n```\n\
  前面的命令会启用所有在执行该命令后启动的会话的跟踪——它不会跟踪已经连接的会话。\n\n通过发出以下命令来禁用跟踪：\n```sql\nSQL> alter system\
  \ set events '10046 trace name context off';\n```\n此命令会禁用所有会话的跟踪。\n\n#### 工作原理\n\
  \n当已知有问题的查询正在运行，但无法提前识别会话时，实例范围的跟踪会很有帮助。请确保仅在别无选择时才启用实例范围的跟踪，并在捕获到必要的诊断信息后立即将其关闭。在繁忙的环境中，任何实例范围的跟踪不仅会产生非常大的跟踪文件，还会显著增加系统工作负载。\n\
  \n### 10-21. 在运行中的会话中设置跟踪\n\n#### 问题\n\n你想要在一个会话中设置跟踪，但该会话已经开始。\n\n![images](img/square.jpg)\
  \ **注意** 用户打电话求助一个长时间运行的查询，就是一个你可能希望在当前执行的会话中发起跟踪的例子。例如，一些商业智能查询会运行数十分钟甚至几小时，因此有时间在查询中途发起跟踪并诊断性能问题。\n\
  \n#### 解决方案\n\n你可以使用操作系统进程 ID (PID)，在 `oradebug` 实用程序的帮助下，在一个运行中的会话中设置跟踪。一旦确定了你要跟踪的会话的\
  \ PID，就发出以下命令来跟踪该会话。\n```sql\nSQL> connect / as sysdba\nSQL> oradebug setospid <SPID>\n\
  SQL> oradebug unlimit\nSQL> oradebug event 10046 trace name context forever,level\
  \ 12\nSQL> oradebug event 10046 trace name context off\n```\n在此处的示例中，我们指定了级别 12，但与使用\
  \ `alter session` 命令设置的 10046 跟踪一样，你也可以指定较低的跟踪级别 4 或 8。\n\n\n#### 工作原理\n\n当你无法访问要跟踪的会话，或者会话在你能够设置跟踪之前已经开始时，`oradebug`\
  \ 工具就派上用场了。`oradebug` 允许你附加到会话并启动 SQL 跟踪。如果你不确定与 Oracle 会话关联的操作系统 PID（或 SPID），可以通过以下查询找到它。\n\
  \n```sql\nSQL> select p.PID,p.SPID,s.SID\n  2  from v$process p,v$session s\n  3\
  \  where s.paddr = p.addr\n  4* and s.sid = &SESSION_ID\n```\n\n`oradebug` 只是一个允许你设置跟踪的**工具**——它本身并不是一个跟踪过程。使用\
  \ `oradebug` 命令获得的 `10046` 跟踪结果与使用常规事件 `10046` 跟踪命令获得的结果是**相同的**。\n\n在“解决方案”部分显示的示例中，我们使用了\
  \ Oracle 用户的操作系统 PID。你也可以指定 Oracle 进程标识符（PID）来跟踪会话，而不是操作系统 PID。\n\n```sql\nSQL>\
  \ connect / as sysdba\nSQL> oradebug setorapid 9834\nSQL> oradebug unlimit\nSQL>\
  \ oradebug event 10046 trace name context forever,level 12\n```\n\n在 Oracle RAC\
  \ 环境中，与所有其他类型的 Oracle 跟踪一样，请确保在开始跟踪之前连接到正确的实例。作为使用 `oradebug` 的替代方法，你可以使用 `dbms_system.set_sql_trace_in_session`\
  \ 过程在正在运行的会话中设置跟踪。请注意，`DBMS_SYSTEM` 是一个较旧的软件包，从 Oracle Database `10g` 版本开始，推荐跟踪会话的方式是使用\
  \ `DBMS_MONITOR` 软件包。\n\n### 10-22. 在登录后启用会话跟踪\n\n#### 问题\n\n你想要跟踪用户的会话，但该会话在登录后立即开始执行查询。\n\
  \n#### 解决方案\n\n如果一个会话在登录后立即开始执行查询，你就没有足够的时间来获取会话信息并开始跟踪该会话。在这种情况下，你可以创建一个 `登录触发器`，在会话开始时自动开始跟踪会话。以下是创建一个登录触发器为特定用户创建的会话设置跟踪的一种方法：\n\
  \n```sql\nSQL> create or replace trigger trace_my_user\n  2    after logon on database\n\
  \  3    begin\n  4     if user='SH' then\n  5     dbms_monitor.session_trace_enable(null,null,true,true);\n\
  \  6     end if;\n  8*   end;\nSQL> /\n```\n\n```\nTrigger created.\n```\n\n```\n\
  SQL>\n```\n\n在创建登录触发器之前，请确保授予用户 `alter session` 权限，如下所示：\n\n```sql\nSQL> grant alter\
  \ session to sh,hr;\n```\n\n```\nGrant succeeded.\n```\n\n```\nSQL>\n```\n\n####\
  \ 工作原理\n\n通常，你会发现很难跟踪会话活动，因为会话在你能够设置跟踪之前就已经开始执行语句。这在 RAC 环境中尤其如此，因为 DBA 更难识别实例并快速为正在运行的会话设置跟踪。登录触发器是解决此类情况的完美方案。请注意，在\
  \ RAC 环境中，数据库会在用户连接到的实例的跟踪目录中生成跟踪文件。\n\n用于跟踪会话的登录触发器非常有用，它通过在用户登录时立即设置跟踪来跟踪特定用户发出的\
  \ SQL 语句。从那时起，数据库会跟踪该用户发出的所有 SQL 语句。请确保在完成对感兴趣的 SQL 语句的跟踪后，禁用跟踪并删除登录触发器。同时记得从用户那里撤销\
  \ `alter session` 权限。\n\n### 10-23. 跟踪优化器的执行路径\n\n#### 问题\n\n你想要跟踪基于成本的优化器（CBO）以检查\
  \ SQL 语句的执行路径。\n\n#### 解决方案\n\n你可以通过设置 Oracle 事件 `10053` 来跟踪优化器的执行路径。步骤如下。\n\n1.\
  \  为跟踪文件设置跟踪标识符。\n    ```sql\n    SQL> alter session set tracefile_identifier='10053_trace1'\n\
  \    ```\n    ```\n    Session altered.\n    ```\n    ```\n    SQL>\n    ```\n\n\
  2.  发出 `alter session set events` 语句以开始跟踪。\n    ```sql\n    SQL> alter session set\
  \ events '10053 trace name context forever,level 1';\n    ```\n    ```\n    Session\
  \ altered.\n    ```\n    ```\n    SQL>\n    ```\n\n3.  执行你想要跟踪其执行路径的 SQL 语句。\n \
  \   ```sql\n    SQL> select * from users\n      2  where user_id=88 and\n      3\
  \  account_status='OPEN'\n      4  and username='SH';\n    ```\n    ```\n    ...\n\
  \    ```\n    ```\n    SQL>\n    ```\n\n4.  关闭跟踪。\n    ```sql\n    SQL> alter session\
  \ set events '10053 trace name context off';\n    ```\n    ```\n    Session altered.\n\
  \    ```\n    ```\n    SQL>\n    ```\n\n你可以直接检查原始的跟踪文件，以了解优化器是如何为 SQL 语句选择执行计划的。\n\
  \n\n## 工作原理\n\n事件 10053 跟踪让你能够深入了解优化器在为 SQL 语句选择最优执行计划时的工作方式。例如，你可能想知道为什么在某个特定情况下优化器没有使用索引——事件\
  \ 10053 跟踪会向你展示优化器跳过该索引时所使用的逻辑。优化器会考虑查询中所有对象的可用统计信息，并评估各种连接顺序和访问路径。事件 10053 跟踪还揭示了优化器执行的所有评估过程，以及它如何得出执行查询的最佳连接顺序和最佳访问路径。\n\
  \n你可以为事件 10053 跟踪设置级别 1 或级别 2。级别 2 捕获以下类型的信息：\n\n*   列统计信息\n*   单表访问路径\n*   优化器考虑的表连接\n\
  *   连接成本\n*   优化器考虑的连接方法\n\n级别 1 的跟踪包含上述所有内容，外加优化器使用的所有默认初始化参数列表。你还会找到优化器在确定最佳执行计划时使用的详细索引统计信息。跟踪文件捕获了成本优化器考虑的大量统计信息，并解释了\
  \ CBO 如何创建执行计划。以下是你在 CBO 跟踪文件中可以找到的一些重要内容。\n\n*   所有内部优化器相关初始化参数的列表\n*   SQL 语句中绑定变量的窥探值\n\
  *   优化器转换后的最终查询\n*   系统统计信息（`CPUSPEEDNW`， `IOTFRSPEED`， `IOSEEKTIM`， `MBRC`）\n*\
  \   查询中所有对象的访问路径分析\n*   连接顺序评估\n\n与原始的 10046 事件跟踪文件不同，10053 事件跟踪文件读起来相当容易（也很有趣）。以下是我们跟踪文件中的关键摘录。该跟踪文件显示了优化器应用的基于成本的查询转换：\n\
  \n`OBYE:   Considering Order-by Elimination from view SEL$1 (#0)`\n`OBYE:     OBYE\
  \ performed.`\n\n在这个例子中，优化器消除了我们 SQL 语句中的 `order by` 子句。执行完所有转换后，优化器得到了“转换后的最终查询”，如下所示：\n\
  \n`select channel_id,count(*)`\n`from sh.sales`\n`group by channel_id`\n\n接下来，输出文件显示了对你查询中每个表的访问路径分析。\n\
  \n`Access path analysis for SALES`\n`***************************************`\n\
  `SINGLE TABLE ACCESS PATH`\n`  Single Table Cardinality Estimation for SALES[SALES]`\n\
  `  Table: SALES  Alias: SALES`\n`    Card: Original: 918843.000000  Rounded: 918843\
  \  Computed: 918843.00  Non Adjusted: 918843.00`\n`  Access Path: TableScan`\n`\
  \    Cost:  495.47  Resp: 495.47  Degree: 0`\n`      Cost_io: 481.00  Cost_cpu:\
  \ 205554857`\n`      Resp_io: 481.00  Resp_cpu: 205554857`\n`  Access Path: index\
  \ (index (FFS))`\n`    Index: SALES_CHANNEL_BIX`\n`    resc_io: 42.30  resc_cpu:\
  \ 312277`\n`    ix_sel: 0.000000  ix_sel_with_filters: 1.000000`\n`  Access Path:\
  \ index (FFS)`\n`    Cost:  42.32  Resp: 42.32  Degree: 1`\n`      Cost_io: 42.30\
  \  Cost_cpu: 312277`\n`      Resp_io: 42.30  Resp_cpu: 312277`\n`  ****** trying\
  \ bitmap/domain indexes ******`\n`  Access Path: index (FullScan)`\n`    Index:\
  \ SALES_CHANNEL_BIX`\n`    resc_io: 75.00  resc_cpu: 552508`\n`    ix_sel: 1.000000\
  \  ix_sel_with_filters: 1.000000`\n`    Cost: 75.04  Resp: 75.04  Degree: 0`\n`\
  \  Access Path: index (FullScan)`\n`    Index: SALES_CHANNEL_BIX`\n`    resc_io:\
  \ 75.00  resc_cpu: 552508`\n`    ix_sel: 1.000000  ix_sel_with_filters: 1.000000`\n\
  `    Cost: 75.04  Resp: 75.04  Degree: 0`\n`  Bitmap nodes:`\n`    Used SALES_CHANNEL_BIX`\n\
  `      Cost = 75.038890, sel = 1.000000`\n`  Access path: Bitmap index - accepted`\n\
  `    Cost: 75.038890 Cost_io: 75.000000 Cost_cpu: 552508.000000 Sel: 1.000000`\n\
  `    Believed to be index-only`\n`  ****** finished trying bitmap/domain indexes\
  \ ******`\n`******** Begin index join costing ********`\n`******** End index join\
  \ costing ********`\n`  Best:: AccessPath: IndexFFS`\n`  Index: SALES_CHANNEL_BIX`\n\
  `         Cost: 42.32  Degree: 1  Resp: 42.32  Card: 918843.00  Bytes: 0`\n\n在这个例子中，优化器评估了各种访问路径，并将最佳访问路径显示为索引快速全扫描（`IndexFFS`）。\n\
  \n然后优化器会考虑各种连接顺序的排列组合，并估算它所考虑的每个连接顺序的成本：\n\n`Considering cardinality-based initial\
  \ join order.`\n`Join order[1]:  SALES[SALES]#0`\n`GROUP BY sort`\n`GROUP BY adjustment\
  \ factor: 1.000000`\n`      Total IO sort cost: 0      Total CPU sort cost: 834280255`\n\
  `      Best so far:  Table#: 0  cost: 101.0459  card: 918843.0000  bytes: 2756529`\n\
  `Number of join permutations tried: 1`\n`GROUP BY adjustment factor: 1.000000`\n\
  `GROUP BY cardinality:  4.000000, TABLE cardinality:  918843.000000`\n`     Total\
  \ IO sort cost: 0      Total CPU sort cost: 834280255`\n`  Best join order: 1`\n\
  `  Cost: 101.0459  Degree: 1  Card: 918843.0000  Bytes: 2756529`\n\n正如我们对 10053\
  \ 跟踪输出的简要回顾所示，你可以得到一些令人困惑的问题的答案，例如优化器为何选择了特定的连接顺序或访问路径，以及它为何忽略了一个索引。答案都在那里！\n\n\
  ### 10-24. 生成自动的 Oracle 错误跟踪\n\n### 问题\n\n你希望在发生特定的 Oracle 错误时创建自动的错误转储文件。\n\n###\
  \ 解决方案\n\n你可以通过在 `hanganalyze` 或 `systemstate` 命令中指定错误号来创建错误转储，以诊断数据库中的各种问题。例如，诊断死锁的原因通常很棘手。你可以要求数据库在遇到\
  \ `ORA-00060: Deadlock detected` 错误时转储一个跟踪文件。为此，使用 `hanganalyze` 或 `systemstate`\
  \ 命令指定事件号 60：\n\n```sql\nSQL> alter session set events '60 trace name hanganalyze\
  \ level 4';\n\nSession altered.\n\nSQL> alter session set events '60 trace name\
  \ systemstate level 266';\n\nSession altered.\n\nSQL>\n```\n\n这两个命令都将在数据库下次遇到 `ORA-00060`\
  \ 错误时自动转储诊断数据。你可以在 Oracle RAC 数据库中使用相同的技术。例如，你可以执行以下命令来生成自动的 `hanganalyze` 转储：\n\
  \n```sql\nSQL>alter session set events '60 trace name hanganalyze_global level 4';\n\
  ```\n\n此 `alter session` 语句会在数据库遇到 `ORA-00060` 错误的任何实例中调用 `hanganalyze` 命令。\n\n\
  ### 工作原理\n\n为错误设置事件号将确保当指定错误下次发生时，Oracle 会自动为你转储错误信息。当你要诊断一个偶尔发生的错误，并且获取当前的 `systemstate`\
  \ 转储或 `hanganalyze` 转储没有帮助时，这就非常方便。某些事件（如死锁）具有文本别名，在这种情况下，你可以指定别名而不是错误号。对于 `ORA-00060`\
  \ 错误，文本别名是 `deadlock`，因此你可以执行以下命令来跟踪该错误：\n\n```sql\nSQL> alter session set events\
  \ 'deadlock trace name systemstate level 266';\n\nSession altered.\n\nSQL>\n```\n\
  \n同样，对于其他错误事件，你可以在可用的地方使用文本别名。\n\n### 10-25. 跟踪后台进程\n\n### 问题\n\n你想要跟踪一个后台进程。\n\n\
  \n## 解决方案\n\n如果您不确定要跟踪的后台进程的确切名称，可以通过执行以下命令列出所有后台进程的确切名称：\n\n```sql\nSQL> select\
  \ name,description from v$bgprocess;\n```\n\n假设您想要跟踪 `dbwo` 进程。请执行以下命令来启动和停止跟踪。\n\
  \n```sql\nSQL> alter system set events 'sql_trace {process:pname=dbw0}';\n系统已更改。\n\
  SQL> alter system set events 'sql_trace {process:pname=dbw0} off';\n系统已更改。\nSQL>\n\
  ```\n\n您可以通过指定管道符 (`|`) 来分隔进程名称，从而同时跟踪两个后台进程：\n\n```sql\nSQL> alter system set events\
  \ 'sql_trace {process:pname=dbw0|dbw1}';\n系统已更改。\n\nSQL> alter system set events\
  \ 'sql_trace {process:pname=dbw0|dbw1} off';\n系统已更改。\nSQL>\n```\n\n## 工作原理\n\nOracle\
  \ Database 11g 版本对 SQL 跟踪设施提供了多项改进。其中之一是新的功能，允许您执行 `alter system set events` 命令来跟踪一个进程（或一组进程）或特定的\
  \ SQL 语句（或一组语句）。本方法展示了如何通过指定进程名称来跟踪后台进程。\n\n### 10-26. 启用 Oracle 监听器跟踪\n\n### 问题\n\
  \n您希望出于诊断目的跟踪 Oracle 监听器。\n\n### 解决方案\n\n要为 Oracle 监听器生成跟踪文件，请在默认位于 `$ORACLE_HOME/network/admin`\
  \ 目录下的 `listener.ora` 文件中添加以下两行：\n\n```plaintext\ntrace_level_listener=support\n\
  trace_timestamp_listener=true\n```\n\n您还可以选择通过添加 `trace_file_listener=<file_name>`\
  \ 行来指定监听器跟踪的文件名。使用 `lsnrctl reload` 命令重新加载监听器，然后使用 `lsnrctl status` 命令检查监听器状态。您应该会在输出中看到列出的跟踪文件：\n\
  \n```bash\nC:\\>lsnrctl reload\n\n命令执行成功\n\nC:\\>lsnrctl status\n...\n\n监听器参数文件\
  \   C:\\app\\ora\\product\\11.2.0\\dbhome_1\\network\\admin\\listener.ora\n监听器日志文件\
  \     c:\\app\\ora\\diag\\tnslsnr\\MIROPC61\\listener\\alert\\log.xml\n监听器跟踪文件 \
  \    c:\\app\\ora\\diag\\tnslsnr\\MIROPC61\\listener\\trace\\ora_8640_9960.trc\n\
  ...\n  实例 \"orcl1\", 状态 READY, 有 1 个处理程序用于此服务...\n服务 \"orcl1XDB.miro.local\" 有 1\
  \ 个实例。\n  实例 \"orcl1\", 状态 READY, 有 1 个处理程序用于此服务...\n命令执行成功\n\nC:>\n```\n\n输出显示了您刚刚配置的监听器跟踪文件。\n\
  \n![images](img/square.jpg) 注意：本方法和下一个方法与 SQL 跟踪无关，后者是本章的重点。然而，我们认为这两个方法很有用，而且没有更合适的章节来放置它们！\n\
  \n### 工作原理\n\n您可以为监听器跟踪指定不同的级别。您可以指定级别 4 (`user`) 用于用户跟踪信息，级别 10 (`admin`) 用于管理跟踪信息。Oracle\
  \ 支持部门在解决 Oracle 监听器问题时可能会要求级别 16 (`support`)。\n\n如果您无法重新加载或重启监听器，可以通过执行以下命令动态配置跟踪：\n\
  \n```bash\nC:\\>lsnrctl\n\nLSNRCTL> set current_listener listener\n当前监听器为 listener\n\
  LSNRCTL> set trc_level 16\n\n连接到 (DESCRIPTION=(ADDRESS=(PROTOCOL=IPC)(KEY=EXTPROC1521)))\n\
  监听器参数 \"trc_level\" 被设置为 support\n命令执行成功\nLSNRCTL>\n```\n\n您可以通过执行命令 `set trc_level\
  \ off` 来关闭监听器跟踪，这是该参数的默认值：\n\n```bash\nLSNRCTL> set trc_level off\n连接到 (DESCRIPTION=(ADDRESS=(PROTOCOL=IPC)(KEY=EXTPROC1521)))\n\
  监听器参数 \"trc_level\" 被设置为 off\n命令执行成功\nLSNRCTL>\n```\n\n您会注意到 `lsnrctl status` 命令不再显示监听器跟踪文件。请注意，监听器的跟踪文件不会位于\
  \ `$ORACLE_HOME\\rdbms\\network\\admin` 目录中。相反，数据库会将跟踪文件存储在数据库诊断存储库 (ADR) 的 `diag`\
  \ 目录中，位于 `tnslsnr` 目录下，如下所示：\n\n```plaintext\n监听器跟踪文件      c:\\app\\ora\\diag\\\
  tnslsnr\\myhost\\listener\\trace\\ora_8640_9960.trc\n```\n\n### 10-27. 为 Data Guard\
  \ 设置归档跟踪\n\n### 问题\n\n您希望在 Data Guard 环境中跟踪归档日志的创建和传输。\n\n### 解决方案\n\n您可以通过设置 `log_archive_trace`\
  \ 初始化参数来跟踪主数据库或备用数据库上的归档日志：\n\n```sql\nlog_archive_trace=跟踪级别(整数)\n```\n\n例如，如果您想在主服务器上设置级别\
  \ 15 的跟踪，您可以如下设置此参数：\n\n```sql\nSQL> alter system set log_archive_trace=15\n```\n\
  \n默认情况下，`log_archive_trace` 参数设置为零，这意味着归档日志跟踪被禁用。\n\n### 工作原理\n\n虽然当您将 `log_archive_trace`\
  \ 参数保留为其默认级别零时归档日志跟踪被禁用，但数据库仍会在跟踪文件和警报日志中记录错误状况。当您将 `log_archive_trace` 参数设置为非零值时，Oracle\
  \ 会将归档日志进程生成的相应跟踪输出写入审计跟踪。审计跟踪与 SQL 跟踪文件所在的跟踪目录相同——即 ADR 中的 *trace* 目录（这与 `user_dump_dest`\
  \ 初始化参数指定的用户转储目录相同）。\n\n在主数据库上，`log_archive_trace` 参数控制 `ARCn`（归档器）、`FAL`（获取归档日志）和\
  \ `LGWR`（日志写入器）后台进程的输出。在备用数据库上，它跟踪 `ARCn`、`RFS`（远程文件服务器）和 `FAL` 进程的工作。\n\n您可以指定\
  \ 15 个归档日志跟踪级别中的任意一个。以下是重要跟踪级别的含义：\n\n级别 1：跟踪日志文件的归档\n级别 2：按目的地跟踪归档日志状态\n级别 4：跟踪归档操作阶段\n\
  级别 8：跟踪归档日志目的地活动\n级别 128：跟踪 LGWR 重做传输网络活动\n级别 4096：跟踪实时应用活动\n级别 8192：跟踪重做应用活动（介质恢复或物理备用）\n\
  \n当您指定更高的跟踪级别时，跟踪将包含所有较低跟踪级别的信息。例如，如果您指定级别 15，跟踪文件将包含来自级别 1、2、4 和 8 的跟踪信息。\n\n##\
  \ 第 11 章\n\n## 自动 SQL 调优\n\n在 Oracle Database 11g 之前，准确识别性能不佳的 SQL 查询并推荐解决方案，主要还是资深\
  \ SQL 调优专家的领域。通常需要懂得如何识别高资源消耗的 SQL 语句和瓶颈，生成并解读执行计划，从动态性能视图中提取数据，理解等待事件和统计数据，然后整合这些知识来写出好的\
  \ SQL 查询。正如你将在本章看到的，Oracle SQL 调优的范式已经有所转变。\n\n随着自动 SQL 调优功能的出现，从新手到专家的任何人都可以为 SQL\
  \ 性能问题生成并推荐解决方案。这为处理有问题的 SQL 打开了新的大门。例如，想象一下你的老板每天早上带着调优建议来找你，并询问实施改进的计划是什么。这很不一样。\n\
  \n自动 SQL 调优功能并非解决 SQL 性能焦虑的万能药。如果你是一位专家级 SQL 调优人员，无需担心自己的技能会过时或工作会丢失。总需要有人来验证建议并成功实施解决方案。仍然需要人工来审阅自动\
  \ SQL 调优的输出，并确认修复措施的价值。\n\n尽管如此，识别 SQL 性能问题并推荐解决方案的方式已经发生了变化。一些守旧派可能不同意，并认为不能让任何人都能生成\
  \ SQL 调优建议。无论如何，Oracle 已经让这些自动化工具对普通用户（需付费）可用且易于使用。因此，你需要理解这些功能的基础原理以及如何使用它们。\n\n\
  本章重点介绍以下自动 SQL 调优工具：\n\n*   自动 SQL 调优\n*   SQL 调优集 (`STS`)\n*   SQL 调优建议器\n*   自动数据库诊断监控器\
  \ (`ADDM`)\n\n从 Oracle Database 11g 开始，`自动 SQL 调优`是一个预设的后台数据库作业，默认每天运行。此任务会检查自动工作量仓库\
  \ (`AWR`) 中的高资源消耗语句。然后，它会调用`SQL 调优建议器`，并为每个分析的语句生成调优建议（如果有）。作为自动 SQL 调优的一部分，你可以配置一些特性，例如自动接受某些建议（如\
  \ SQL 配置文件，有关 SQL 配置文件的详细信息请参见第 12 章）。\n\n一个`SQL 调优集` (`STS`) 是一个数据库对象，包含一个或多个 SQL\
  \ 语句*以及*相关的执行统计信息。你可以从多个来源填充 SQL 调优集，例如记录在`AWR`中的 SQL、内存中的 SQL，或者提供特定的 SQL 语句。熟悉\
  \ SQL 调优集至关重要。此功能被用作 Oracle 多个性能调优和管理工具的输入，例如`SQL 调优建议器`、`SQL 计划管理`、`SQL 访问建议器`和`SQL\
  \ 性能建议器`。\n\n`SQL 调优建议器`是 Oracle `自动 SQL 调优`功能的核心。此工具定期自动运行，并为在`AWR`中发现的高资源消耗 SQL\
  \ 语句生成调优建议。你也可以手动运行`SQL 调优建议器`，并提供特定的`AWR`快照时间段、内存中的高资源消耗 SQL 或用户提供的 SQL 语句作为输入。此工具可以通过`DBMS_SQLTUNE`包、`SQL\
  \ Developer`或`Enterprise Manager`调用。\n\n`自动数据库诊断监控器` (`ADDM`) 分析`AWR`中的信息，并就数据库性能问题（包括高资源消耗\
  \ SQL 语句）提供建议。`ADDM`的主要目标是帮助你减少数据库处理用户请求所花费的总时间（`DB 时间`指标）。此工具可以通过 Oracle 提供的 SQL\
  \ 脚本、`DBMS_ADDM`包或`Enterprise Manager`调用。\n\n前面列出的所有工具都需要从 Oracle 获得额外许可。你可能没有运行这些工具的许可。即使没有，我们仍然建议你了解这些工具的功能。例如，你可能是一位经理，在询问这些自动化工具是否值得其成本；或者你可能与一位正在测试环境中研究使用这些工具的开发人员合作。作为一名\
  \ SQL 调优专家，你需要熟悉这些工具，因为你迟早会遇到这些自动化功能。\n\n在探究本章的实践方法之前，请仔细查看图 11-1。该图展示了各种自动化工具如何交互，以及在何种场景下你会使用特定功能。在完成本章的实践方法时，请参考此图。特别要注意的是，你可以轻松地将`AWR`中发现的\
  \ SQL 语句或当前内存中的 SQL 作为各种 Oracle 调优工具的输入。这使你能够系统地识别高资源 SQL 语句，并将其作为各种性能调优活动的目标。\n\
  \n![images](img/1101.jpg)\n\n**图 11-1.** Oracle 的自动 SQL 调优工具\n\n本章的前几个实践方法涉及`自动\
  \ SQL 调优`功能。你将学习如何确定自动作业是否启用以及何时运行，以及如何修改其特性。本章中间部分重点介绍如何创建和管理 SQL 调优集。SQL 调优集被广泛用作各种\
  \ Oracle 性能调优工具的输入。最后，本章向你展示如何手动运行`SQL 调优建议器`和`ADDM`，为 SQL 语句生成性能建议。\n\n![images](img/square.jpg)\
  \ **注意** 在本章的示例中，我们侧重于向你展示如何通过 SQL 和内置 PL/SQL 包来使用功能。虽然我们确实展示了一些来自`Enterprise Manager`的截图，但我们不关注图形工具的使用。无论`Enterprise\
  \ Manager`是否安装，你都应该能够使用 SQL 和 PL/SQL。此外，手动方法让你能够理解流程的每个环节，并在问题出现时帮助你进行诊断。\n\n###\
  \ 11-1. 显示自动 SQL 调优作业详细信息\n\n#### 问题\n\n你有一个 Oracle Database 11g 环境，并想确定`自动 SQL\
  \ 调优`作业是否已启用并定期运行。如果作业已启用，你想显示其他方面信息，例如它何时启动以及执行多长时间。\n\n#### 解决方案\n\n使用以下查询来确定是否有任何`自动\
  \ SQL 调优`作业已启用：\n\n```sql\nSELECT client_name, status, consumer_group, window_group\n\
  FROM dba_autotask_client\nORDER BY client_name;\n```\n\n以下输出显示有三个启用的自动作业在运行，其中一个是`SQL\
  \ 调优建议器`：\n\n```\nCLIENT_NAME                      STATUS   CONSUMER_GROUP     \
  \       WINDOW_GROUP\n------------------------------- -------- -------------------------\
  \ --------------------\nsql tuning advisor              ENABLED  ORA$AUTOTASK_SQL_GROUP\
  \    ORA$AT_WGRP_SQ\nauto space advisor              ENABLED  ORA$AUTOTASK_SPACE_GROUP\
  \  ORA$AT_WGRP_SA\nauto optimizer stats collection ENABLED  ORA$AUTOTASK_STATS_GROUP\
  \  ORA$AT_WGRP_OS\n```\n\n运行以下查询以查看`自动 SQL 调优建议器`作业最近几次的运行情况：\n\n```sql\nSELECT\
  \ task_name, status, TO_CHAR(execution_end,'DD-MON-YY HH24:MI')\nFROM dba_advisor_executions\n\
  WHERE task_name='SYS_AUTO_SQL_TUNING_TASK'\nORDER BY execution_end;\n```\n\n以下是一些示例输出：\n\
  \n```\nTASK_NAME                      STATUS     TO_CHAR(EXECUTION_END\n------------------------------\
  \ ---------- ---------------------\nSYS_AUTO_SQL_TUNING_TASK       COMPLETED   30-APR-11\
  \ 06:00\nSYS_AUTO_SQL_TUNING_TASK       COMPLETED   01-MAY-11 06:02\n```\n\n\n####\
  \ 工作原理\n\n当你在 Oracle Database 11g 或更高版本中创建数据库时，Oracle 会自动实施三个自动维护任务：\n\n*   自动 SQL\
  \ 优化建议器\n*   自动段顾问\n*   自动优化器统计信息收集\n\n这些任务被自动配置为在维护窗口中运行。维护窗口是指定任务运行的时间和持续时长。你可以使用此查询查看维护窗口的详细信息：\n\
  \n```sql\nSELECT window_name,TO_CHAR(window_next_time,'DD-MON-YY HH24:MI:SS')\n\
  ,sql_tune_advisor, optimizer_stats, segment_advisor\nFROM dba_autotask_window_clients;\n\
  ```\n\n以下是此示例的输出片段：\n\n```sql\nWINDOW_NAME      TO_CHAR(WINDOW_NEXT_TIME SQL_TUNE\
  \ OPTIMIZE SEGMENT_\n---------------- ------------------------ -------- --------\
  \ --------\nTHURSDAY_WINDOW  28-APR-11 22:00:00       ENABLED  ENABLED  ENABLED\n\
  FRIDAY_WINDOW    29-APR-11 22:00:00       ENABLED  ENABLED  ENABLED\nSATURDAY_WINDOW\
  \  30-APR-11 06:00:00       ENABLED  ENABLED  ENABLED\nSUNDAY_WINDOW    01-MAY-11\
  \ 06:00:00       ENABLED  ENABLED  ENABLED\n```\n\n有几个与自动调度任务相关的数据字典视图。有关这些视图的描述，请参见表\
  \ 11-1。\n\n![images](img/t1101.jpg)\n\n### 11-2. 显示自动 SQL 优化建议\n\n#### 问题\n\n你已知\
  \ Oracle 会自动运行一个每日任务来生成 SQL 优化建议。你希望查看该建议。\n\n#### 解决方案\n\n如果你使用的是 Oracle Database\
  \ 11g Release 2 或更高版本，以下是显示自动生成的 SQL 优化建议的最快方法：\n\n```sql\nSQL> SET LINESIZE 80\
  \ PAGESIZE 0 LONG 100000\nSQL> SELECT DBMS_AUTO_SQLTUNE.REPORT_AUTO_TUNING_TASK\
  \ FROM DUAL;\n```\n\n![images](img/square.jpg) **注意** 从 Oracle Database 11g Release\
  \ 2 开始，应使用 `DBMS_AUTO_SQLTUNE` 包（而不是 `DBMS_SQLTUNE`）来管理自动 SQL 优化功能。如果你使用的是旧版 Oracle，请使用\
  \ `DBMS_SQLTUNE.REPORT_AUTO_TUNING_TASK` 查看自动 SQL 优化建议。\n\n根据数据库的活动情况，输出内容可能会非常多。以下是一个非常活跃的数据库输出的一小部分样本：\n\
  \n```sql\nGENERAL INFORMATION SECTION\n-------------------------------------------------------------------------------\n\
  Tuning Task Name                        : SYS_AUTO_SQL_TUNING_TASK\nTuning Task\
  \ Owner                       : SYS\nWorkload Type                           : Automatic\
  \ High-Load SQL Workload\nExecution Count                         : 30\nCurrent\
  \ Execution                       : EXEC_3483\nExecution Type                  \
  \        : TUNE SQL\nScope                                   : COMPREHENSIVE\n.....\n\
  Completion Status                       : COMPLETED\nStarted at                \
  \              : 04/10/2011 06:00:01\nCompleted at                            :\
  \ 04/10/2011 06:02:41\nNumber of Candidate SQLs                : 103\nCumulative\
  \ Elapsed Time of SQL (s)      : 49124\n-------------------------------------------------------------------------------\n\
  SUMMARY SECTION\n-------------------------------------------------------------------------------\n\
  \                      Global SQL Tuning Result Statistics\n-------------------------------------------------------------------------------\n\
  Number of SQLs Analyzed                      : 103\nNumber of SQLs in the Report\
  \                 : 8\nNumber of SQLs with Findings                 : 8\nNumber\
  \ of SQLs with Alternative Plan Findings: 1\nNumber of SQLs with SQL profiles recommended\
  \ : 1\n-------------------------------------------------------------------------------\n\
  \    SQLs with Findings Ordered by Maximum (Profile/Index) Benefit, Object ID\n\
  -------------------------------------------------------------------------------\n\
  object ID  SQL ID        statistics profile(benefit) index(benefit) restructure\n\
  ---------- ------------- ---------- ---------------- -------------- -----------\n\
  \      9130 crx9h7tmwwv67                      51.44%\n```\n\n**自动通过电子邮件发送 SQL 输出**\n\
  \n在 Linux/Unix 系统上，实现 SQL 脚本输出的自动电子邮件发送相当容易。首先将 SQL 封装在 shell 脚本中，然后使用 `cron` 等实用程序来自动执行并生成电子邮件。以下是一个示例\
  \ shell 脚本：\n\n```bash\n#!/bin/bash\nif [ $# -ne 1 ]; then\n  echo \"Usage: $0 SID\"\
  \n  exit 1\nfi\n# source oracle OS variables\n. /var/opt/oracle/oraset $1\n#\nBOX=`uname\
  \ -a | awk '{print$2}'`\nOUTFILE=$HOME/bin/log/sqladvice.txt\n#\nsqlplus -s <<EOF\n\
  mv_maint/foo\nSPO $OUTFILE\nSET LINESIZE 80 PAGESIZE 0 LONG 100000\nSELECT DBMS_AUTO_SQLTUNE.REPORT_AUTO_TUNING_TASK\
  \ FROM DUAL;\nEOF\ncat $OUTFILE | mailx -s \"SQL Advice: $1 $BOX\" larry@oracle.com\n\
  exit 0\n```\n\n以下是对应的 `cron` 条目，用于每日运行该报告：\n\n```bash\n#-----------------------------------------------------------------\n\
  # SQL Advice report from SQL auto tuning\n16 11 * * * /orahome/oracle/bin/sqladvice.bsh\
  \ DWREP\n   1>/orahome/oracle/bin/log/sqladvice.log 2>&1\n#-----------------------------------------------------------------\n\
  ```\n\n在之前的 `cron` 条目中，命令被分成两行以适应本书页面的宽度。\n\n\n\n## 工作原理\n\n“解决方案”部分描述了一种简单方法，用于显示数据库中高负载查询的深度调优建议。根据数据库的活动和负载情况，报告可能不包含任何建议，也可能提供大量建议。自动\
  \ SQL 调优作业使用 AWR 中识别的高负载 SQL 语句作为报告的目标 SQL 语句。建议报告包含一个或多个以下通用小节：\n\n*   基本信息\n*\
  \   摘要\n*   详细信息\n*   调查结果\n*   执行计划\n*   备选执行计划\n*   错误\n\n基本信息部分包含有关开始和结束时间、考虑的\
  \ SQL 语句数量、SQL 语句的累计耗时等高级别信息。\n\n摘要部分包含有关已分析 SQL 语句的信息，例如：\n\n```\n            \
  \          Global SQL Tuning Result Statistics\n-------------------------------------------------------------------------------\n\
  Number of SQLs Analyzed                      : 26\nNumber of SQLs in the Report\
  \                 : 5\nNumber of SQLs with Findings                 : 5\nNumber\
  \ of SQLs with Alternative Plan Findings: 1\nNumber of SQLs with SQL profiles recommended\
  \ : 5\nNumber of SQLs with Index Findings           : 2\n-------------------------------------------------------------------------------\n\
  \    SQLs with Findings Ordered by Maximum (Profile/Index) Benefit, Object ID\n\
  -------------------------------------------------------------------------------\n\
  object ID  SQL ID        statistics profile(benefit) index(benefit) restructure\n\
  ---------- ------------- ---------- ---------------- -------------- -----------\n\
  \      1160 31q9w59vpt86t                     98.27%          99.90%\n      1167\
  \ 3u8xd0vf2pnhr                     98.64%\n```\n\n详细信息部分包含描述特定 SQL 语句的信息，例如所有者和\
  \ SQL 文本。以下是一个小示例：\n\n```\nDETAILS SECTION\n-------------------------------------------------------------------------------\n\
  Statements with Results Ordered by Maximum (Profile/Index) Benefit, Object ID\n\
  -------------------------------------------------------------------------------\n\
  Object ID  : 1160\nSchema Name: CHN_READ\nSQL ID     : 31q9w59vpt86t\nSQL Text \
  \  : SELECT \"A2\".\"UMID\",\"A2\".\"ORACLE_UNIQUE_ID\",\"A2\".\"PUBLIC_KEY\",\"\
  A2\"\n             .\"SERIAL_NUMBER\",:1||\"A1\".\"USER_NAME\",\"A1\".\"USER_NAME\"\
  ,NVL(\"A2\".\"\n             CREATE_TIME_DTT\",:2),NVL(\"A2\".\"UPDATE_TIME_DTT\"\
  ,:3) FROM\n             \"COMPUTER_SYSTEM\" \"A2\",\"USERS\" \"A1\" WHERE\n```\n\
  \n调查结果部分包含建议，例如接受 SQL 配置文件或创建索引，例如：\n\n```\nFINDINGS SECTION\n-------------------------------------------------------------------------------\n\
  1- SQL Profile Finding (see explain plans section below)\n--------------------------------------------------------\n\
  \  A potentially better execution plan was found for this statement.\n  Recommendation\
  \ (estimated benefit: 98.27%)\n  ------------------------------------------\n  -\
  \ Consider accepting the recommended SQL profile to use\nparallel execution for\
  \ this statement.\n    execute dbms_sqltune.accept_sql_profile(task_name =>\n  \
  \          'SYS_AUTO_SQL_TUNING_TASK', object_id => 1160, task_owner =>\n      \
  \      'SYS', replace => => TRUE, profile_type => DBMS_SQLTUNE.PX_PROFILE);\n.................\
  \ \n2- Index Finding (see explain plans section below)\n-------------------------------------------------\n\
  The execution plan of this statement can be improved by creating\none or more indices.\n\
  \  Recommendation (estimated benefit: 99.9%)\n  -----------------------------------------\n\
  \  - Consider running the Access Advisor to improve the physical schema design\n\
  \    or creating the recommended index.\n    create index CHAINSAW.IDX$$_90890002\
  \ on\n    CHAINSAW.COMPUTER_SYSTEM(\"UPDATE_TIME_DTT\");\n```\n\n在适当情况下，会显示查询的原始执行计划以及建议的修复方案和新的执行计划。这样你可以查看调整前后的计划差异。这对于确定调查结果（如添加索引）是否会改善性能非常有用。\n\
  \n最后，报告还有一个错误部分。对于大多数场景，报告中通常不会有错误部分。\n\n“解决方案”部分展示了如何从 SQL 语句中执行`REPORT_AUTO_TUNING_TASK`函数。此函数也可以从匿名\
  \ PL/SQL 块中调用。这是一个示例：\n\n```\nVARIABLE tune_report CLOB;\nBEGIN\n  :tune_report\
  \ := DBMS_AUTO_SQLTUNE.report_auto_tuning_task(\n    begin_exec   => NULL\n   ,end_exec\
  \     => NULL\n   ,type         => DBMS_AUTO_SQLTUNE.type_text\n   ,level      \
  \  => DBMS_AUTO_SQLTUNE.level_typical\n   ,section      => DBMS_AUTO_SQLTUNE.section_all\n\
  \   ,object_id    => NULL\n   ,result_limit => NULL);\nEND;\n/\n--\nSET LONG 1000000\n\
  PRINT :tune_report\n```\n\n`REPORT_AUTO_TUNING_TASK`函数的参数在表 11-2 中有详细描述。这些参数让你可以灵活地自定义建议输出。\n\
  \n![images](img/t1102.jpg)\n\n### 11-3. 生成用于实施自动调优建议的 SQL 脚本\n\n### 问题\n\n你已经生成了自动调优建议的报告。现在你想要生成一个可用于实施调优建议的\
  \ SQL 脚本。\n\n### 解决方案\n\n使用`DBMS_SQLTUNE.SCRIPT_TUNING_TASK`函数来生成实施调优任务建议的 SQL 语句。你需要提供自动调优任务的名称作为输入。在此示例中，任务名称为`SYS_AUTO_SQL_TUNING_TASK`：\n\
  \n```\nSET LINES 132 PAGESIZE 0 LONG 10000\nSELECT DBMS_SQLTUNE.SCRIPT_TUNING_TASK('SYS_AUTO_SQL_TUNING_TASK')\
  \ FROM dual;\n```\n\n以下是此示例输出的一小部分：\n\n```\nexecute dbms_stats.gather_index_stats(ownname\
  \ => 'STAR2', indname => 'F_CONFIG_P\nROD_INST_FK1', estimate_percent => DBMS_STATS.AUTO_SAMPLE_SIZE);\n\
  create index NSESTAR.IDX$$_17F5F0004 on NSESTAR.D_DATES(\"FISCAL_YEAR\",\"FISCAL_WE\n\
  EK_NUMBER_IN_YEAR\",\"DATE_DTT\");\n```\n\n### 工作原理\n\n`SCRIPT_TUNING_TASK`函数生成用于实施自动\
  \ SQL 调优作业所推荐建议的 SQL 语句。如果调优任务没有任何建议，那么输出中将不会生成任何 SQL 语句。`SYS_AUTO_SQL_TUNING_TASK`是自动\
  \ SQL 调优任务的默认名称。如果你不确定此任务的详细信息，可以查询`DBA_ADVISOR_LOG`视图：\n\n```\nselect task_name,\
  \ execution_start from dba_advisor_log\nwhere task_name='SYS_AUTO_SQL_TUNING_TASK'\n\
  order by 2;\n```\n\n以下是此示例的一些示例输出：\n\n```\nTASK_NAME                      EXECUTION\n\
  ------------------------------ ---------\nSYS_AUTO_SQL_TUNING_TASK       19-APR-11\n\
  ```\n\n### 11-4. 修改自动 SQL 调优功能\n\n### 问题\n\n你注意到，有时自动 SQL 调优建议作业会建议对 SQL 语句应用 SQL\
  \ 配置文件（有关 SQL 配置文件的详细信息，请参见第 12 章）。调优建议作业的默认行为是不自动接受 SQL 配置文件建议。你想要修改此行为，让自动 SQL\
  \ 调优作业自动将其推荐的任何 SQL 配置文件置于已接受状态。\n\n\n## 解决方案\n\n使用 `DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER`\
  \ 过程来修改自动 SQL 调优的默认行为。例如，如果您希望自动接受 SQL 配置文件，可以按如下方式操作：\n\n```sql\nBEGIN\n  DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER(\n\
  \    parameter => 'ACCEPT_SQL_PROFILES', value => 'TRUE');\nEND;\n/\n```\n\n您可以通过此查询验证是否启用了自动\
  \ SQL 配置文件接受：\n\n```sql\nSELECT parameter_name, parameter_value\nFROM dba_advisor_parameters\n\
  WHERE task_name = 'SYS_AUTO_SQL_TUNING_TASK'\nAND  parameter_name ='ACCEPT_SQL_PROFILES';\n\
  ```\n\n这是一些示例输出：\n\n```\nPARAMETER_NAME                 PARAMETER_VALUE\n------------------------------\
  \ ------------------------------\nACCEPT_SQL_PROFILES            TRUE\n```\n\n要禁用\
  \ SQL 配置文件的自动接受，请向过程传递一个 `FALSE` 值：\n\n```sql\nBEGIN\n  DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER(\n\
  \    parameter => 'ACCEPT_SQL_PROFILES', value => 'FALSE');\nEND;\n/\n```\n\n![images](img/square.jpg)\
  \ `Note` 从 Oracle Database 11g Release 2 开始，应使用 `DBMS_AUTO_SQLTUNE` 包（而不是 `DBMS_SQLTUNE`）来管理自动\
  \ SQL 调优功能。\n\n## 工作原理\n\n`DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER` 过程允许您修改自动\
  \ SQL 调优作业的默认行为。您可以通过此查询查看自动 SQL 调优的所有当前设置：\n\n```sql\nSELECT parameter_name ,parameter_value\n\
  FROM dba_advisor_parameters\nWHERE task_name = 'SYS_AUTO_SQL_TUNING_TASK'\nAND \
  \ parameter_name IN ('ACCEPT_SQL_PROFILES',\n                        'MAX_SQL_PROFILES_PER_EXEC',\n\
  \                        'MAX_AUTO_SQL_PROFILES',\n                        'EXECUTION_DAYS_TO_EXPIRE');\n\
  ```\n\n这是一些示例输出：\n\n```\nPARAMETER_NAME                 PARAMETER_VALUE\n------------------------------\
  \ ------------------------------\nACCEPT_SQL_PROFILES            FALSE\nEXECUTION_DAYS_TO_EXPIRE\
  \       30\nMAX_SQL_PROFILES_PER_EXEC      20\nMAX_AUTO_SQL_PROFILES          10000\n\
  ```\n\n前面的参数在 表 11-3 中描述。\n\n![images](img/t1103.jpg)\n\n您还可以使用 Enterprise Manager\
  \ 来管理自动 SQL 调优的相关功能。从主数据库页面，导航到“顾问中心”页面。接下来，单击“SQL 顾问”链接。现在单击“自动 SQL 调优结果”页面。您应该会看到一个类似于\
  \ 图 11-2 的屏幕。\n\n![images](img/1102.jpg)\n\n`图 11-2.` 使用 Enterprise Manager 管理自动\
  \ SQL 调优\n\n从这个屏幕，您可以配置、查看结果、禁用和启用自动 SQL 调优的各个方面。\n\n### 11-5. 禁用和启用自动 SQL 调优\n\n\
  #### 问题\n\n您想要完全禁用，然后重新启用自动 SQL 调优作业。\n\n#### 解决方案\n\n使用 `DBMS_AUTO_TASK_ADMIN.DISABLE`\
  \ 过程来禁用自动 SQL 调优作业。此示例禁用自动 SQL 调优顾问作业。\n\n```sql\nBEGIN\n  DBMS_AUTO_TASK_ADMIN.DISABLE(\n\
  \  client_name => 'sql tuning advisor',\n  operation => NULL,\n  window_name =>\
  \ NULL);\nEND;\n/\n```\n\n要重新启用作业，请使用 `ENABLE` 过程，如下所示：\n\n```sql\nBEGIN\n  DBMS_AUTO_TASK_ADMIN.ENABLE(\n\
  \  client_name => 'sql tuning advisor',\n  operation => NULL,\n  window_name =>\
  \ NULL);\nEND;\n/\n```\n\n您可以通过此查询报告自动调优作业的状态：\n\n```sql\nSELECT client_name ,status\
  \ ,consumer_group\nFROM dba_autotask_client\nORDER BY client_name;\n```\n\n这是一些示例输出：\n\
  \n```\nCLIENT_NAME                      STATUS          CONSUMER_GROUP\n--------------------------------\
  \ --------------- ------------------------------\nauto optimizer stats collection\
  \  ENABLED         ORA$AUTOTASK_STATS_GROUP\nauto space advisor               ENABLED\
  \         ORA$AUTOTASK_SPACE_GROUP\nsql tuning advisor               ENABLED   \
  \      ORA$AUTOTASK_SQL_GROUP\n```\n\n#### 工作原理\n\n您可能希望禁用自动 SQL 调优作业，因为您的数据库非常活跃，并希望确保此作业不会影响数据库的整体性能。`DBMS_AUTO_TASK_ADMIN.ENABLE/DISABLE`\
  \ 过程允许您打开和关闭自动 SQL 调优作业。这些过程接受三个参数（详见 表 11-4）。这些过程的行为取决于您传递的参数：\n\n*   如果提供了 `CLIENT_NAME`，并且\
  \ `OPERATION` 和 `WINDOW_NAME` 都是 `NULL`，则禁用该客户端。\n*   如果提供了 `OPERATION`，则禁用该操作。\n\
  *   如果提供了 `WINDOW_NAME`，并且 `OPERATION` 是 `NULL`，则在提供的窗口名称中禁用该客户端。\n\n前面的参数允许您以精细的细节控制自动任务的调度。根据前面的规则，您可以按如下方式在周二维护窗口期间禁用自动\
  \ SQL 调优作业：\n\n```sql\nBEGIN\n  dbms_auto_task_admin.disable(\n  client_name =>\
  \ 'sql tuning advisor',\n  operation => NULL,\n  window_name => 'TUESDAY_WINDOW');\n\
  END;\n/\n```\n\n您可以通过此查询验证窗口是否已被禁用：\n\n```sql\nSELECT window_name,TO_CHAR(window_next_time,'DD-MON-YY\
  \ HH24:MI:SS')\n,sql_tune_advisor\nFROM dba_autotask_window_clients;\n```\n\n这是输出的一个片段：\n\
  \n```\nWINDOW_NAME      TO_CHAR(WINDOW_NEXT_TIME SQL_TUNE\n---------------- ------------------------\
  \ --------\nTUESDAY_WINDOW   03-MAY-11 22:00:00       DISABLED\n```\n\n![images](img/t1104.jpg)\n\
  \n### 11-6. 修改维护窗口属性\n\n#### 问题\n\n您意识到自动任务（如自动 SQL 调优作业）在定期安排的维护窗口期间运行。您想要修改与维护窗口相关联的持续时间。\n\
  \n#### 解决方案\n\n以下示例将周日维护窗口的持续时间更改为两小时：\n\n```sql\nBEGIN\n  dbms_scheduler.set_attribute(\n\
  \  name => 'SUNDAY_WINDOW',\n  attribute => 'DURATION',\n  value => numtodsinterval(2,\
  \ 'hour'));\nEND;\n/\n```\n\n您可以通过此查询确认对维护窗口的更改：\n\n```sql\nSELECT window_name,\
  \ next_start_date, duration\nFROM dba_scheduler_windows;\n```\n\n这是输出的一个片段：\n\n\
  ```\nWINDOW_NAME      NEXT_START_DATE                                   DURATION\n\
  ---------------- ------------------------------------------------ --------\nSATURDAY_WINDOW\
  \  07-MAY-11 06.00.00.000000 AM US/MOUNTAIN         +000 20:00:00\nSUNDAY_WINDOW\
  \    08-MAY-11 06.00.00.000000 AM US/MOUNTAIN         +000 02:00:00\n```\n\n####\
  \ 工作原理\n\n理解如何修改维护窗口的关键在于，它是数据库作业调度程序的一个属性，因此必须通过 `DBMS_SCHEDULER` 包来维护。当您安装 Oracle\
  \ Database 11g 时，默认配置了三个自动维护作业：\n\n*   自动 SQL 调优\n*   统计信息收集\n*   段建议\n\n这些作业在预配置的每日维护窗口中自动执行。维护窗口由一周中的某天和作业运行的时长组成。\n\
  \n您可以通过此查询查看未来一个月的计划作业：\n\n```sql\nSELECT window_name, to_char(start_time,'dd-mon-yy\
  \ hh24:mi'), duration\nFROM dba_autotask_schedule\nORDER BY start_time;\n```\n\n\
  这是输出的一个小样本：\n\n```\nWINDOW_NAME          TO_CHAR(START_TIME,'DD DURATION\n--------------------\
  \ -------------------- --------------------\nSATURDAY_WINDOW      14-may-11 06:00\
  \     +000 20:00:00\nSUNDAY_WINDOW        15-may-11 06:00     +000 02:00:00\n```\n\
  \n![images](img/square.jpg) `Tip` 有关管理计划作业的更多详细信息，请参阅 Oracle 的 *Database Administrator's\
  \ Guide*（可在 Oracle Technology Network 网站上获取）。\n\n### 11-7. 创建 SQL 调优集对象\n\n\n##\
  \ 问题\n\n你正在处理一个需要分析一组 SQL 语句的性能问题。在将这些 SQL 语句作为一个集合处理之前，你需要创建一个 SQL 调优集对象。\n\n##\
  \ 解决方案\n\n使用 `DBMS_SQLTUNE.CREATE_SQLSET` 过程来创建一个 SQL 调优集对象——例如：\n\n```sql\nBEGIN\n\
  \  DBMS_SQLTUNE.CREATE_SQLSET(\n  sqlset_name => 'HIGH_IO',\n  description => 'High\
  \ disk read tuning set');\nEND;\n/\n```\n\n前面的代码创建了一个名为 `HIGH_IO` 的调优集。至此，你已经创建了一个命名的调优集对象。该调优集尚未包含任何\
  \ SQL 语句。\n\n## 工作原理\n\n在向调优集填充 SQL 语句之前，必须先创建一个 SQL 调优集对象（有关向 STS 添加 SQL 语句的详细信息，请参见配方\
  \ 11-9 到 11-11）。你可以通过查询 `DBA_SQLSET` 视图来查看数据库中任何已定义的 SQL 调优集：\n\n```sql\nSQL> select\
  \ id, name, created, statement_count from dba_sqlset;\n```\n\n以下是一些示例输出：\n\n```\n\
  \        ID NAME                           CREATED   STATEMENT_COUNT\n----------\
  \ ------------------------------ --------- ---------------\n         5 HIGH_IO \
  \                       26-APR-11               0\n```\n\n如果需要删除一个 SQL 调优集对象，则使用\
  \ `DBMS_SQLTUNE.DROP_SQLSET` 过程来删除调优集。以下示例删除了一个名为 `MY_TUNING_SET` 的调优集：\n\n```sql\n\
  SQL> EXEC  DBMS_SQLTUNE.DROP_SQLSET(sqlset_name => 'MY_TUNING_SET' );\n```\n\n###\
  \ 11-8. 在 AWR 中查看资源密集型 SQL\n\n## 问题\n\n在填充 SQL 调优集之前，你想查看 AWR 中的高负载 SQL 语句。你希望最终使用\
  \ AWR 中包含的 SQL 作为填充 SQL 调优集的输入。\n\n## 解决方案\n\n可以使用 `DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY`\
  \ 函数来提取存储在 AWR 中的 SQL。这个特定的查询选择了快照 8200 到 8201 之间，按磁盘读取使用类别排名前 10 的 SQL：\n\n```sql\n\
  SELECT\nsql_id\n,substr(sql_text,1,20)\n,disk_reads\n,cpu_time\n,elapsed_time\n\
  FROM table(DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY(8200,8201,\n            null,\
  \ null, 'disk_reads',null, null, null, 10))\nORDER BY disk_reads DESC;\n```\n\n\
  以下是一小段输出：\n\n```\nSQL_ID         SUBSTR(SQL_TEXT,1,20 DISK_READS      CPU_TIME \
  \ ELAPSED_TIME\n-------------- -------------------- ---------- ------------- -------------\n\
  achffburdff9j   delete from \"MVS\".\"      101145     814310000     991574249\n\
  5vku5ap6g6zh8  INSERT /*+ BYPASS_RE       98172      75350000      91527239\n```\n\
  \n## 工作原理\n\n在使用 SQL 调优集之前，理解你可以使用 `DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY` 函数从\
  \ AWR 中检索高资源使用率的 SQL 至关重要。这个 PL/SQL 函数检索的结果集可以用作填充 SQL 调优集的输入。有关 `SELECT_WORKLOAD_REPOSITORY`\
  \ 函数参数的描述，请参见表 11-5。\n\n你使用这个函数有很大的灵活性。几个例子将帮助说明这一点。假设你想从 AWR 中检索不是由 `SYS` 用户解析的\
  \ SQL。执行此操作的 SQL 如下：\n\n```sql\nSELECT sql_id, substr(sql_text,1,20)\n,disk_reads,\
  \ cpu_time, elapsed_time, parsing_schema_name\nFROM table(\nDBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY(8200,8201,\n\
  'parsing_schema_name <> ''SYS''',\nNULL, NULL,NULL,NULL, 1, NULL, 'ALL'));\n```\n\
  \n以下示例检索按缓冲区获取排名前 10 的非 `SYS` 用户查询：\n\n```sql\nSELECT\n sql_id\n,substr(sql_text,1,20)\n\
  ,disk_reads\n,cpu_time\n,elapsed_time\n,buffer_gets\n,parsing_schema_name\nFROM\
  \ table(\nDBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY(\n begin_snap => 21730\n,end_snap\
  \ => 22900\n,basic_filter => 'parsing_schema_name <> ''SYS'''\n,ranking_measure1\
  \ => 'buffer_gets'\n,result_limit => 10\n));\n```\n\n在前面的查询中，`SYS` 关键字被两个单引号括起来（换句话说，`SYS`\
  \ 周围的不是双引号）。\n\n![images](img/t1105.jpg)\n\n![images](img/t1105a.jpg)\n\n### 11-9.\
  \ 在内存中查看资源密集型 SQL\n\n## 问题\n\n在填充 SQL 调优集之前，你想查看内存中游标缓存里的高负载 SQL 语句。你希望最终使用内存中包含的\
  \ SQL 作为填充 SQL 调优集的输入。\n\n## 解决方案\n\n使用 `DBMS_SQLTUNE.SELECT_CURSOR_CACHE` 函数查看内存中当前的高资源消耗\
  \ SQL 语句。此查询选择需要超过一百万次磁盘读取的内存中 SQL 语句：\n\n```sql\nSELECT\n sql_id\n,substr(sql_text,1,20)\n\
  ,disk_reads\n,cpu_time\n,elapsed_time\nFROM table(DBMS_SQLTUNE.SELECT_CURSOR_CACHE('disk_reads\
  \ > 1000000'))\nORDER BY sql_id;\n```\n\n以下是一些示例输出：\n\n```\nSQL_ID        SUBSTR(SQL_TEXT,1,20\
  \ DISK_READS   CPU_TIME ELAPSED_TIME\n------------- -------------------- ----------\
  \ ---------- ------------\n0s6gq1c890p4s  delete from \"MVS\".\"    3325320 8756130000\
  \   1.0416E+10\nb63h4skwvpshj BEGIN dbms_mview.ref    9496353 1.4864E+10   3.3006E+10\n\
  ```\n\n## 工作原理\n\n在使用 SQL 调优集之前，理解你可以使用 `DBMS_SQLTUNE.SELECT_CURSOR_CACHE` 函数从内存中检索高资源使用率的\
  \ SQL 至关重要。这个 PL/SQL 函数检索的结果集可以用作填充 SQL 调优集的输入。有关 `SELECT_CURSOR_CACHE` 函数参数的描述，请参见表\
  \ 11-6。\n\n你使用这个函数有很大的灵活性。下面是一个例子，它选择内存中的 SQL，但排除了由 `SYS` 用户解析的语句，并且只返回经过时间大于 100,000\
  \ 的语句：\n\n```sql\nSELECT sql_id, substr(sql_text,1,20)\n,disk_reads, cpu_time, elapsed_time\n\
  FROM table(DBMS_SQLTUNE.SELECT_CURSOR_CACHE('parsing_schema_name <> ''SYS''\n  \
  \                                           AND elapsed_time > 100000'))\nORDER\
  \ BY sql_id;\n```\n\n在前面的查询中，`SYS` 关键字被两个单引号括起来（换句话说，`SYS` 周围的不是双引号）。`SQL_TEXT`\
  \ 列被截断为 20 个字符，以便输出更容易在页面上显示。以下是一些示例输出：\n\n```\nSQL_ID        SUBSTR(SQL_TEXT,1,20\
  \ DISK_READS   CPU_TIME ELAPSED_TIME\n------------- -------------------- ----------\
  \ ---------- ------------\nbyzwu34haqmh4 SELECT /* DS_SVC */           0     140000\
  \       159828\n```\n\n一旦你确定了一个资源密集型 SQL 语句的 `SQL_ID`，你可以通过这个查询查看其所有执行细节：\n\n```sql\n\
  SELECT *\nFROM table(DBMS_SQLTUNE.SELECT_CURSOR_CACHE('sql_id = ''byzwu34haqmh4'''));\n\
  ```\n\n请注意，前面语句中的 `SQL_ID` 被两个单引号括起来（不是双引号）。\n\n下一个例子选择内存中按 CPU 时间排名前 10 的非 `SYS`\
  \ 用户查询：\n\n```sql\nSELECT\n sql_id\n,substr(sql_text,1,20)\n,disk_reads\n,cpu_time\n\
  ,elapsed_time\n,buffer_gets\n,parsing_schema_name\nFROM table(\nDBMS_SQLTUNE.SELECT_CURSOR_CACHE(\n\
  \ basic_filter => 'parsing_schema_name <> ''SYS'''\n,ranking_measure1 => 'cpu_time'\n\
  ,result_limit => 10\n));\n```\n\n![images](img/t1106.jpg)\n\n### 11-10. 从 AWR 中的高资源消耗\
  \ SQL 填充 SQL 调优集\n\n## 问题\n\n你想创建一个 SQL 调优集，并用在 AWR 中找到的 I/O 消耗最高的 SQL 语句来填充它。\n\
  \n\n#### 解决方案\n\n使用以下步骤，从 AWR 中高资源消耗的语句填充 SQL 调优集：\n\n1.  创建一个 SQL 调优集对象。\n2.  确定起始和结束的\
  \ AWR 快照 ID。\n3.  使用在 AWR 中找到的高资源 SQL 填充 SQL 调优集。\n\n前述步骤将在以下小节中详细说明。\n\n##### 步骤\
  \ 1：创建 SQL 调优集对象\n\n创建一个 SQL 调优集。下面这段代码创建了一个名为 `IO_STS` 的调优集：\n\n```sql\nBEGIN\n\
  \  dbms_sqltune.create_sqlset(\n    sqlset_name => 'IO_STS'\n   ,description =>\
  \ 'STS from AWR');\nEND;\n/\n```\n\n##### 步骤 2：确定起始和结束的 AWR 快照 ID\n\n如果您不确定数据库中有哪些可用的快照，可以运行\
  \ AWR 报告或从 `DBA_HIST_SNAPSHOTS` 中查询 `SNAP_ID`：\n\n```sql\nselect snap_id, begin_interval_time\n\
  from dba_hist_snapshot order by 1;\n```\n\n##### 步骤 3：使用在 AWR 中找到的高资源 SQL 填充 SQL\
  \ 调优集\n\n现在，SQL 调优集将按磁盘读取排序，填充前 15 条 SQL 语句。起始和结束的 AWR 快照 ID 分别为 26800 和 26900：\n\
  \n```sql\nDECLARE\n  base_cur dbms_sqltune.sqlset_cursor;\nBEGIN\n  OPEN base_cur\
  \ FOR\n    SELECT value(x)\n    FROM table(dbms_sqltune.select_workload_repository(\n\
  \      26800,26900, null, null,'disk_reads',\n      null, null, null, 15)) x;\n\
  \  --\n  dbms_sqltune.load_sqlset(\n    sqlset_name => 'IO_STS',\n    populate_cursor\
  \ => base_cur);\nEND;\n/\n```\n\n上述代码填充了 AWR 中按磁盘读取排序的前 15 条 SQL 语句。`DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY`\
  \ 函数用于根据排名条件，使用 AWR 信息填充一个 PL/SQL 游标。然后，使用 `DBMS_SQLTUNE.LOAD_SQLSET` 过程，以该游标为输入来填充\
  \ SQL 调优集。\n\n#### 工作原理\n\n`DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY` 函数可以通过多种方式使用\
  \ AWR 中的查询来填充 SQL 调优集。您可以指示它按磁盘读取、耗用时间、CPU 时间、缓冲区获取等条件加载 SQL 语句。有关此函数的参数描述，请参见表\
  \ 11-5。当指定 AWR 作为输入时，可以使用以下任一方式：\n\n*   起始和结束的 AWR 快照 ID\n*   您先前创建的 AWR 基线\n\n\
  您可以通过此查询查看 SQL 调优集（在“解决方案”部分中创建）的详细信息：\n\n```sql\nSELECT\n sqlset_name\n,elapsed_time\n\
  ,cpu_time\n,buffer_gets\n,disk_reads\n,sql_text\nFROM dba_sqlset_statements\nWHERE\
  \ sqlset_name = 'IO_STS';\n```\n\n### 11-11. 从内存中的高资源消耗 SQL 填充 SQL 调优集\n\n#### 问题\n\
  \n您希望从当前在内存中的高资源消耗 SQL 语句填充一个调优集。\n\n#### 解决方案\n\n使用 `DBMS_SQLTUNE.SELECT_CURSOR_CACHE`\
  \ 函数，用当前在内存中的语句填充 SQL 调优集。此示例创建一个调优集，并用不属于 `SYS` 模式且磁盘读取大于 1,000,000 的高负载资源消耗语句填充它：\n\
  \n```sql\n-- 创建调优集\nEXEC DBMS_SQLTUNE.CREATE_SQLSET('HIGH_DISK_READS');\n-- 从游标缓存填充调优集\n\
  DECLARE\n  cur DBMS_SQLTUNE.SQLSET_CURSOR;\nBEGIN\n  OPEN cur FOR\n  SELECT VALUE(x)\n\
  \  FROM table(\n  DBMS_SQLTUNE.SELECT_CURSOR_CACHE(\n  'parsing_schema_name <> ''SYS''\
  \ AND disk_reads > 1000000',\n  NULL, NULL, NULL, NULL, 1, NULL,'ALL')) x;\n--\n\
  \  DBMS_SQLTUNE.LOAD_SQLSET(sqlset_name => 'HIGH_DISK_READS',\n    populate_cursor\
  \ => cur);\nEND;\n/\n```\n\n在上述代码中，请注意 `SYS` 用户被两组单引号（不是双引号）包围。`SELECT_CURSOR_CACHE`\
  \ 函数将 SQL 语句加载到 PL/SQL 游标中，`LOAD_SQLSET` 过程则使用这些 SQL 语句填充 SQL 调优集。\n\n#### 工作原理\n\
  \n`DBMS_SQLTUNE.SELECT_CURSOR_CACHE` 函数（有关函数参数描述，请参见表 11-6）允许您从内存中提取 SQL 语句及相关统计信息到\
  \ SQL 调优集。该过程允许您根据各种资源消耗条件过滤 SQL 语句，例如：\n\n*   `ELAPSED_TIME`（耗用时间）\n*   `CPU_TIME`（CPU\
  \ 时间）\n*   `BUFFER_GETS`（缓冲区获取）\n*   `DISK_READS`（磁盘读取）\n*   `DIRECT_WRITES`（直接写入）\n\
  *   `ROWS_PROCESSED`（处理行数）\n\n这为您如何过滤和填充 SQL 调优集提供了极大的灵活性。\n\n### 11-12. 用内存中的所有\
  \ SQL 填充 SQL 调优集\n\n#### 问题\n\n您希望创建一个 SQL 调优集，并用当前在内存中的所有 SQL 语句填充它。\n\n#### 解决方案\n\
  \n使用 `DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET` 过程，高效捕获当前存储在游标缓存（内存中）的所有 SQL。此示例创建一个名为\
  \ `PROD_WORKLOAD` 的 SQL 调优集，然后通过采样内存 3,600 秒（每次轮询事件之间等待 20 秒）进行填充：\n\n```sql\nBEGIN\n\
  \  -- 创建调优集\n  DBMS_SQLTUNE.CREATE_SQLSET(\n    sqlset_name => 'PROD_WORKLOAD'\n\
  \   ,description => 'Prod workload sample');\n  --\n  DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET(\n\
  \    sqlset_name     => 'PROD_WORKLOAD'\n   ,time_limit      => 3600\n   ,repeat_interval\
  \ => 20);\nEND;\n/\n```\n\n#### 工作原理\n\n`DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET`\
  \ 过程允许您轮询内存中的查询，并使用找到的任何查询来填充 SQL 调优集。当需要捕获所有正在执行的 SQL 语句的样本集时，这是一种强大的技术。\n\n在指示\
  \ `DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET` 捕获内存中的 SQL 语句方面，您拥有极大的灵活性（有关所有参数的详细信息，请参见表\
  \ 11-7）。例如，您可以通过指定 `CAPTURE_MODE` 为 `DBMS_SQLTUNE.MODE_ACCUMULATE_STATS`，来指示该过程捕获每条\
  \ SQL 语句的累计统计信息集。\n\n```sql\nBEGIN\n  DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET(\n\
  \    sqlset_name     => 'PROD_WORKLOAD'\n   ,time_limit      => 60\n   ,repeat_interval\
  \ => 10\n   ,capture_mode    => DBMS_SQLTUNE.MODE_ACCUMULATE_STATS);\nEND;\n/\n\
  ```\n\n这比默认设置更消耗资源，但能为每条 SQL 语句生成更准确的统计信息。\n\n![images](img/t1107.jpg)\n\n### 11-13.\
  \ 显示 SQL 调优集的内容\n\n#### 问题\n\n您已填充了一个 SQL 调优集，并希望验证其特性，例如 SQL 语句及相应的统计信息。\n\n####\
  \ 解决方案\n\n您可以通过此查询确定数据库中 SQL 调优集的名称和 SQL 语句数量：\n\n```sql\nSELECT name, created,\
  \ statement_count\nFROM dba_sqlset;\n```\n\n以下是一些示例输出：\n\n```\nNAME            \
  \               CREATED   STATEMENT_COUNT\n------------------------------ ---------\
  \ ---------------\ntest1                          19-APR-11              29\n```\n\
  \n使用以下查询显示 SQL 调优集中每个查询的 SQL 文本及相关统计信息：\n\n```sql\nSELECT sqlset_name, elapsed_time,\
  \ cpu_time, buffer_gets, disk_reads, sql_text\nFROM dba_sqlset_statements;\n```\n\
  \n下面是一小段输出。为了适应页面显示，`SQL_TEXT` 列已被截断：\n\n```\nSQLSET_NAME     ELAPSED_TIME   CPU_TIME\
  \ BUFFER_GETS DISK_READS SQL_TEXT\n--------------- ------------ ---------- -----------\
  \ ---------- ----------------------------\ntest1              235285363   45310000\
  \      112777       3050 INSERT ......\ntest1               52220149   22700000\
  \      328035      18826  delete from.....\n```\n\n#### 工作原理\n\n回想一下，一个 SQL 调优集包含一个或多个\
  \ SQL 语句及其对应的执行统计信息。这些信息可以从 `DBA_SQLSET_*` 视图中查看。表 11-8 描述了这些视图中包含的 SQL 调优集信息类型。\n\
  \n![images](img/t1108.jpg)\n\n您也可以使用 `DBMS_SQLTUNE.SELECT_SQLSET` 函数来检索关于 SQL 调优集的信息——例如：\n\
  \n```sql\nSELECT\n  sql_id\n  ,elapsed_time\n  ,cpu_time\n  ,buffer_gets\n  ,disk_reads\n\
  \  ,sql_text\nFROM TABLE(DBMS_SQLTUNE.SELECT_SQLSET('&&sqlset_name'));\n```\n\n\
  究竟是使用 `DBMS_SQLTUNE.SELECT_SQLSET` 函数还是直接查询数据字典视图，完全取决于您的个人偏好或业务需求。\n\n### 11-14.\
  \ 从 SQL 调优集中选择性删除语句\n\n#### 问题\n\n您想要从 STS 中删除那些不符合特定性能度量的 SQL 语句，例如删除磁盘读取少于 2,000,000\
  \ 次的查询。\n\n#### 解决方案\n\n首先，查看与某个 STS 关联的现有 SQL 信息：\n\n```sql\nselect sqlset_name,\
  \ disk_reads, cpu_time, elapsed_time, buffer_gets\nfrom dba_sqlset_statements;\n\
  ```\n\n以下是一些示例输出：\n\n```\nSQLSET_NAME                       DISK_READS   CPU_TIME\
  \ ELAPSED_TIME BUFFER_GETS\n------------------------------ ---------- ----------\
  \ ------------ -----------\nIO_STS                             3112941 3264960000\
  \   7805935285     2202432\nIO_STS                             2943527 3356460000\
  \   8930436466     1913415\nIO_STS                             2539642 2310610000\
  \   5869237421     1658465\nIO_STS                             1999373 2291230000\
  \   6143543429     1278601\nIO_STS                             1993973 2243180000\
  \   5461607976     1272271\nIO_STS                             1759096 1930320000\
  \   4855618689     1654252\n```\n\n现在，使用 `DBMS_SQLTUNE.DELETE_SQLSET` 过程，根据指定的条件从\
  \ STS 中移除 SQL 语句。此示例从名为 `IO_STS` 的 SQL 调优集中删除磁盘读取少于 2,000,000 次的 SQL 语句：\n\n```sql\n\
  BEGIN\n  DBMS_SQLTUNE.DELETE_SQLSET(\n    sqlset_name  => 'IO_STS'\n   ,basic_filter\
  \ => 'disk_reads < 2000000');\nEND;\n/\n```\n\n#### 工作原理\n\n理解的关键在于，一个 SQL 调优集由以下部分组成：\n\
  \n*   一个或多个 SQL 语句\n*   每个 SQL 语句的关联度量/统计信息\n\n因为度量/统计信息是 STS 的一部分，所以您可以基于关联度量/统计信息的特性，从\
  \ SQL 调优集中删除 SQL 语句。您可以使用 `DBMS_SQLTUNE.DELETE_SQLSET` 过程，基于诸如以下的统计信息来删除 STS 中的语句：\n\
  \n*   `ELAPSED_TIME`\n*   `CPU_TIME`\n*   `BUFFER_GETS`\n*   `DISK_READS`\n*   `DIRECT_WRITES`\n\
  *   `ROWS_PROCESSED`\n\n如果您想删除 SQL 调优集中的所有 SQL 语句，则不要指定过滤器——例如：\n\n```\nSQL> exec\
  \   DBMS_SQLTUNE.DELETE_SQLSET(sqlset_name  => 'IO_STS');\n```\n\n### 11-15. 传输\
  \ SQL 调优集\n\n#### 问题\n\n您已在生产环境中识别出一些资源消耗大的 SQL 语句。您希望将这些语句和相关的统计信息传输到测试环境，以便您可以在不影响生产的情况下对这些语句进行调优。\n\
  \n#### 解决方案\n\n以下步骤用于将 SQL 调优集从一个数据库复制到另一个数据库：\n\n1.  在源数据库中创建一个暂存表。\n2.  用 STS\
  \ 数据填充暂存表。\n3.  将暂存表复制到目标数据库。\n4.  在目标数据库中解包暂存表。\n\n上述步骤将在以下小节中详细阐述。\n\n##### 步骤\
  \ 1：在源数据库中创建暂存表\n\n使用 `DBMS_SQLTUNE.CREATE_STGTAB_SQLSET` 过程创建一个表，该表将用于包含 SQL 调优集元数据。此示例创建一个名为\
  \ `STS_TABLE` 的表：\n\n```sql\nBEGIN\n  dbms_sqltune.create_stgtab_sqlset(\n  table_name\
  \ => 'STS_TABLE'\n,schema_name => 'MV_MAINT');\nEND;\n/\n```\n\n##### 步骤 2：用 STS\
  \ 数据填充暂存表\n\n现在使用 `DBMS_SQLTUNE.PACK_STGTAB_SQLSET` 用 STS 元数据填充暂存表：\n\n```sql\n\
  BEGIN\n  dbms_sqltune.pack_stgtab_sqlset(\n  sqlset_name          => 'IO_STS'\n\
  \ ,sqlset_owner         => 'SYS'\n ,staging_table_name   => 'STS_TABLE'\n ,staging_schema_owner\
  \ => 'MV_MAINT');\nEND;\n/\n```\n\n如果您不确定要传输的 STS 名称，可以运行以下查询获取详细信息：\n\n```sql\n\
  SELECT name, owner, created, statement_count\nFROM dba_sqlset;\n```\n\n##### 步骤\
  \ 3：将暂存表复制到目标数据库\n\n您可以通过 Data Pump、旧的 `exp`/`imp` 实用程序或使用数据库链接将表从一个数据库复制到另一个数据库。此示例在目标数据库中创建一个数据库链接，然后从源数据库复制表：\n\
  \n```sql\ncreate database link source_db\nconnect to mv_maint\nidentified by foo\n\
  using 'source_db';\n```\n\n在目标数据库中，可以使用 `CREATE TABLE AS SELECT` 语句直接从源数据库复制表：\n\
  \n```\nSQL> create table STS_TABLE as select * from STS_TABLE@source_db;\n```\n\n\
  ##### 步骤 4：在目标数据库中解包暂存表\n\n使用 `DBMS_SQLTUNE.UNPACK_STGTAB_SQLSET` 过程，获取暂存表的内容并用\
  \ SQL 调优集元数据填充数据字典。此示例解包暂存表中包含的所有 SQL 调优集：\n\n```sql\nBEGIN\nDBMS_SQLTUNE.UNPACK_STGTAB_SQLSET(\n\
  \  sqlset_name        => '%'\n ,replace            => TRUE\n ,staging_table_name\
  \ => 'STS_TABLE');\nEND;\n/\n```\n\n#### 工作原理\n\n一个 SQL 调优集包含一个或多个查询及其对应的执行统计信息。您偶尔会需要将\
  \ SQL 调优集从一个数据库复制到另一个数据库。例如，您可能遇到了生产数据库的性能问题，但希望捕获并移动消耗资源最多的语句到一个测试数据库，在那里您可以诊断\
  \ STS 中的 SQL，而不影响生产。\n\n请记住，STS 可作为以下任何工具的输入：\n\n*   SQL 调优顾问\n*   SQL 访问顾问\n* \
  \  SQL 执行计划管理\n*   SQL 性能分析器\n\n上述工具被广泛用于故障排除和测试 SQL 性能。将 SQL 调优集从一个环境传输到另一个环境，使您可以在测试或开发环境中使用这些工具。\n\
  \n![images](img/square.jpg) **注意** SQL 调优集只能传输到 Oracle Database 10g R2 或更高版本的数据库。\n\
  \n### 11-16. 创建调优任务\n\n#### 问题\n\n您意识到，作为手动运行 SQL 调优顾问的一部分，您需要首先创建一个调优任务。\n\n![images](img/square.jpg)\
  \ **提示** 有关手动运行 SQL 调优顾问所需的过程流详情，请参阅图 11-1。\n\n## 解决方案\n\n使用 `DBMS_SQLTUNE.CREATE_TUNING_TASK`\
  \ 过程来创建 SQL 调优任务。在创建 SQL 调优任务时，可以使用以下输入：\n\n*   特定 SQL 语句的文本\n*   从内存中游标缓存获取的特定\
  \ SQL 语句的标识符\n*   给定一系列快照 ID 的 AWR 中的单个 SQL 语句\n*   SQL 调优集名称（关于如何创建 SQL 调优集的详细信息，请参见方案\
  \ 11-7 至 11-11）\n\n以下小节描述了创建 SQL 调优任务的上述技术示例。\n\n![images](img/square.jpg) 注意：创建调优任务的用户需要\
  \ `ADMINISTER SQL MANAGEMENT OBJECT` 系统权限。\n\n### 特定 SQL 语句的文本\n\n此示例在创建调优任务时提供\
  \ SQL 语句的文本：\n\n```\nDECLARE\n  tune_task VARCHAR2(30);\n  tune_sql  CLOB;\nBEGIN\n\
  \  tune_sql := 'select count(*) from mgmt_db_feature_usage_ecm';\n  tune_task :=\
  \ DBMS_SQLTUNE.CREATE_TUNING_TASK(\n    sql_text    => tune_sql\n   ,user_name \
  \  => 'MV_MAINT'\n   ,scope       => 'COMPREHENSIVE'\n   ,time_limit  => 60\n  \
  \ ,task_name   => 'tune_test'\n   ,description => 'Provide SQL text'\n);\nEND;\n\
  /\n```\n\n### 从游标缓存获取的特定 SQL 语句的 SQL ID\n\n首先通过查询 `V$SQL` 来识别 `SQL_ID`：\n\n```\n\
  SELECT sql_id, sql_text\nFROM v$sql where sql_text like '%&&mytext%';\n```\n\n一旦有了\
  \ `SQL_ID`，就可以将其作为输入提供给 `DBMS_SQLTUNE.CREATE_TUNING_TASK`：\n\n```\nDECLARE\n  tune_task\
  \ VARCHAR2(30);\n  tune_sql  CLOB;\nBEGIN\n  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n\
  \    sql_id      => '98u3gf0xzq03f'\n   ,task_name   => 'tune_test2'\n   ,description\
  \ => 'Provide SQL ID'\n);\nEND;\n/\n```\n\n### 给定一系列快照 ID 的 AWR 中的单个 SQL 语句\n\n\
  以下是一个通过提供 `SQL_ID` 和一系列 AWR 快照 ID 来创建 SQL 调优任务的示例：\n\n```\nDECLARE\n  tune_task\
  \ VARCHAR2(30);\n  tune_sql  CLOB;\nBEGIN\n  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n\
  \    sql_id      => '1tbu2jp7kv0pm'\n   ,begin_snap  => 21690\n   ,end_snap    =>\
  \ 21864\n   ,task_name   => 'tune_test3'\n);\nEND;\n/\n```\n\n如果不确定使用哪个 `SQL_ID`（及相关查询），请运行此查询：\n\
  \n```\nSQL> select sql_id, sql_text from dba_hist_sqltext;\n```\n\n如果不知道可用的快照 ID，请运行此查询：\n\
  \n```\nSQL> select snap_id from dba_hist_snapshot order by 1;\n```\n\n![images](img/square.jpg)\
  \ 提示：默认情况下，AWR 只包含高资源消耗的查询。你可以通过以下方式将特定 SQL 语句添加到 AWR（无论其资源消耗如何），从而修改此行为以确保其包含在每个快照中：\n\
  \n```\nSQL> exec dbms_workload_repository.add_colored_sql('98u3gf0xzq03f');\n```\n\
  \n### SQL 调优集名称\n\n如果需要针对多个 SQL 查询运行 SQL 调优顾问，则需要一个 SQL 调优集。要使用 SQL 调优集作为输入创建调优任务，请按如下方式操作：\n\
  \n```\nSQL> variable mytt varchar2(30);\nSQL> exec :mytt := DBMS_SQLTUNE.CREATE_TUNING_TASK(sqlset_name\
  \ => 'IO_STS');\nSQL> print :mytt\n```\n\n## 工作原理\n\n在手动执行 SQL 调优顾问之前，首先需要定义将哪些\
  \ SQL 语句用作输入。这是通过创建 SQL 调优任务来完成的。Oracle 在如何向调优任务添加 SQL 语句方面提供了极大的灵活性。如“解决方案”部分所示，你可以执行以下操作：\n\
  \n*   硬编码特定 SQL 查询的文本\n*   使用内存中的 SQL 查询\n*   使用 AWR 中的 SQL 查询\n*   在调优多个查询时定义 SQL\
  \ 调优集\n\n上述技术提供了多种方法来识别将由 SQL 调优顾问分析的 SQL 语句。创建调优任务后，可以通过此查询查看其详细信息：\n\n```\nselect\
  \ owner, task_name, advisor_name, created\nfrom dba_advisor_tasks\norder by created;\n\
  ```\n\n创建调优任务后，现在可以手动执行 SQL 调优顾问（方案 11-17）。如果需要删除调优任务，可以按如下方式操作：\n\n```\nSQL> exec\
  \ dbms_sqltune.drop_tuning_task(task_name => '&&task_name');\n```\n\n### 11-17.\
  \ 手动运行 SQL 调优顾问\n\n#### 问题\n\n你想要手动执行 SQL 调优顾问并获取针对某条 SQL 语句的调优建议。\n\n#### 解决方案\n\
  \n按照以下步骤手动运行 SQL 调优顾问：\n\n1.  创建一个调优任务（完整细节请参见方案 11-16）；这定义了哪些 SQL 语句将被调优。这可以是单个\
  \ SQL 语句，也可以是 SQL 调优集中的多个 SQL 语句。\n2.  执行调优任务。\n3.  显示调优任务的结果。\n\n此示例为单个 SQL 语句运行\
  \ SQL 调优顾问。首先创建一个调优任务。\n\n```\nDECLARE\n  tune_task VARCHAR2(30);\n  tune_sql  CLOB;\n\
  BEGIN\n  tune_sql := 'select a.emp_id, b.dept_name ' ||\n              'from emp\
  \ a, dept b ' ||\n              'where a.dept_id = b.dept_id';\n  --\n  tune_task\
  \ := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n    sql_text    => tune_sql\n   ,user_name\
  \   => 'MV_MAINT'\n   ,scope       => 'COMPREHENSIVE'\n   ,time_limit  => 60\n \
  \  ,task_name   => 'tune_test'\n   ,description => 'Tune a SQL statement.'\n);\n\
  END;\n/\n```\n\n接下来执行调优任务：\n\n```\nSQL> exec dbms_sqltune.execute_tuning_task(task_name\
  \ => 'tune_test');\n```\n\n最后，生成一份报告显示调优建议：\n\n```\nSQL> set long 10000 longchunksize\
  \ 10000\nSQL> set linesize 132 pagesize 200\nSQL> select dbms_sqltune.report_tuning_task('tune_test')\
  \ from dual;\n```\n\n以下是一些示例输出：\n\n```\n1- 统计信息查找\n---------------------\n  表 \"\
  MV_MAINT\".\"DEPT\" 未被分析。\n  建议\n  --------------\n  - 考虑为此表收集优化器统计信息。\n....\n2-\
  \ 索引查找（参见下面的执行计划部分）\n--------------------------------------------------\n  通过创建一个或多个索引，可以改进此语句的执行计划。\n\
  \  建议（预计收益：97.98%）\n  ------------------------------------------\n  - 考虑运行访问顾问以改进物理模式设计，或创建推荐的索引。\n\
  \    create index MV_MAINT.IDX$$_21E10001 on MV_MAINT.EMP(\"DEPT_ID\");\n```\n\n\
  上述输出包含关于为查询中的表生成统计信息以及添加索引的具体建议。你需要在生产环境实施这些建议之前对其进行测试，以确保性能确实有所提升。\n\n### 优化器调优模式\n\
  \n优化器在两种不同的模式下运行：常规模式和调优模式。当执行 SQL 语句时，优化器运行在常规模式下，并快速确定一个合理的执行计划。在此模式下，优化器只花费几分之一秒的时间来尝试确定最佳计划。\n\
  \n当 SQL 调优顾问分析查询时，它让优化器运行在调优模式下。在此模式下，优化器可能花费几分钟来分析执行计划的每个步骤，并生成一个可能比常规模式下生成的计划效率高得多的执行计划。\n\
  \n这有点像计算机象棋游戏。如果你允许象棋软件每步只花一秒或更少的时间，很容易击败程序。然而，如果你允许象棋游戏每步花一分钟或更长时间，在此模式下，游戏会做出更优的决策。\n\
  \n\n### 11-18. 从自动数据库诊断监视器获取 SQL 调优建议\n\n## 工作原理\n\nSQL 调优顾问有助于自动化调整性能不佳的查询任务。该工具相当易于使用，它会就如何调优查询提供建议，例如：\n\
  \n*   重写 SQL\n*   添加索引\n*   实施 SQL 概要文件或计划基线\n*   生成统计信息\n\n你还可以从 SQL Developer\
  \ 或 Enterprise Manager 手动运行 SQL 调优顾问。接下来的两个小节将简要介绍如何从这些工具运行 SQL 调优顾问。\n\n### 从 SQL\
  \ Developer 运行 SQL 调优顾问\n\n如果你可以访问 SQL Developer 3.0 或更高版本，那么为查询运行 SQL 调优顾问就非常容易了。请按照以下简单步骤操作：\n\
  \n1.  打开一个 SQL 工作表。\n2.  输入查询。\n3.  单击与 SQL 调优顾问关联的按钮。\n\n你将看到任何发现和建议。如果你可以访问 SQL\
  \ Developer（可免费下载），这是运行 SQL 调优顾问最简单的方法。\n\n![images](img/square.jpg) `注意` 在运行 SQL\
  \ 调优顾问之前，请确保你连接的用户已被授予 `ADVISOR` 系统权限。\n\n### 从 Enterprise Manager 运行 SQL 调优顾问\n\
  \n你也可以在 Enterprise Manager 中运行该顾问。登录 Enterprise Manager 并按照以下步骤操作：\n\n1.  在主数据库页面，单击\
  \ `Advisor Central` 链接（靠近底部）。\n2.  在顾问部分下，单击 `SQL Advisors` 链接。\n3.  单击 `SQL Tuning\
  \ Advisor` 链接。\n\n你应该会看到一个类似于 图 11-3 所示的页面。\n\n![images](img/1103.jpg)\n\n**图 11-3.**\
  \ 从 Enterprise Manager 安排 SQL 调优顾问作业\n\n从这里，你可以对顶级 SQL 语句或 AWR 中的 SQL 运行 SQL 调优顾问任务，或者提供一个\
  \ SQL 调优集作为输入。\n\n## 问题\n\n你想从自动数据库诊断监视器 (ADDM) 获取关于问题 SQL 语句的建议。\n\n## 解决方案\n\n\
  你可以通过以下工具查看 ADDM 报告：\n\n*   SQL*Plus 脚本\n*   `DBMS_ADDM` 包\n*   Enterprise Manager\n\
  \n以下小节详细阐述了这些技术。\n\n### SQL 方法\n\n你可以手动运行 ADDM 报告，如下所示：\n\n```\nSQL> @?/rdbms/admin/addmrpt.sql\n\
  ```\n\n系统将提示你指定开始和结束的快照。以下是一些示例输出：\n\n```\n实例     数据库名        快照 ID    快照开始时间    级别\n\
  ------------ ------------ --------- ------------------ -----\nDWREP        DWREP            26482\
  \ 2011 年 04 月 09 日 08:00      1\n                              26483 2011 年 04 月\
  \ 09 日 09:00      1\n                              26484 2011 年 04 月 09 日 10:00      1\n\
                                26485 2011 年 04 月 09 日 11:00      1\n                              26486\
  \ 2011 年 04 月 09 日 12:00      1\n\n指定开始和结束快照 ID\n~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n\
  输入 begin_snap 的值：\n```\n\n然后系统会提示你输入报告名称：\n\n```\n默认的报告文件名是 addmrpt_1_26468_26486.txt。若要使用此名称，\n\
  请按 <回车> 继续，否则请输入一个替代名称。\n输入 report_name 的值：\n```\n\n报告执行后，你可以检查输出。有一个“顶级 SQL 语句”部分，报告针对顶级资源消耗\
  \ SQL 语句的调优建议。以下是一些示例输出：\n\n```\n发现 1: 顶级 SQL 语句\n影响为 0.79 个活动会话，占总活动的 72.17%。\n\
  --------------------------------------------------------\n发现了消耗大量数据库时间的 SQL 语句。这些\n\
  语句提供了性能改进的良好机会。\n   建议 1: SQL 调优\n   预估收益为 0.58 个活动会话，占总活动的 53.07%。\n   -------------------------------------------------------------------\n\
  \   操作\n      调查 SQL_ID 为 \"2nw0mmysuma43\" 的 INSERT 语句，以\n      寻求可能的性能改进。你可以使用此\
  \ SQL_ID 的 ASH 报告\n      来补充此处提供的信息。\n      相关对象\n         SQL_ID 为 2nw0mmysuma43\
  \ 的 SQL 语句。\n         INSERT INTO bling\n         ( registration_id,company\n  \
  \       ,soa_id,product_name\n```\n\n### DBMS_ADDM 包\n\n`DBMS_ADDM` 包在 Oracle Database\
  \ 11g R2 或更高版本中可用。使用 `DBMS_ADDM` 包时，必须传入有效的开始和结束 AWR 快照 ID 范围——例如：\n\n```\nvar task_name\
  \ varchar2(30);\nexec DBMS_ADDM.ANALYZE_DB(:task_name, 8020, 8050);\nprint :task_name\n\
  ```\n\n以下是显示任务名称的一些示例输出：\n\n```\nTASK_NAME\n-------------------------------\nTASK_8676\n\
  ```\n\n如果你不确定有哪些快照可用，可以查询 `DBA_HIST_SNAPSHOT` 视图。接下来显示 ADDM 报告：\n\n```\nSET LONG\
  \ 1000000 PAGESIZE 0;\nSELECT DBMS_ADDM.GET_REPORT('TASK_8676') FROM DUAL;\n```\n\
  \n输出可能相当长。以下是一个小片段，建议你为特定 SQL 语句运行 SQL 调优顾问：\n\n```\n   操作\n      为 SQL_ID 为 \"\
  0s6gq1c890p4s\" 的 DELETE 语句\n      运行 SQL 调优顾问。\n      相关对象\n         SQL_ID 为 0s6gq1c890p4s\
  \ 的 SQL 语句。\n         delete from \"MVS\".\"MGMT_DB_FEAT_USE_ECM_LATEST\"\n   理由\n\
  \      该 SQL 语句 98% 的数据库时间花在 CPU、I/O 和集群等待上。\n      这部分数据库时间可能通过 SQL 调优顾问得到改进。\n\
  ```\n\n### Enterprise Manager\n\n首先，登录 Enterprise Manager。在主登录页面，你可以通过以下方式访问 Enterprise\
  \ Manager 中的 ADDM 报告：\n\n1.  在主数据库页面，单击 `Advisor Central` 链接（靠近底部）。\n2.  在顾问部分下，单击\
  \ `ADDM` 链接。\n\n你应该会看到一个类似于 图 11-4 所示的页面。\n\n![images](img/1104.jpg)\n\n**图 11-4.**\
  \ 从 Enterprise Manager 运行 ADDM\n\n通过此页面，你可以运行 ADDM 来分析当前性能或调查过去的性能问题。\n\n## 工作原理\n\
  \nADDM 默认每小时分析一次 AWR 快照，并生成性能建议。这些建议按照实施后预期的收益进行排名。接下来列出了你可以从 ADDM 获得的建议类型：\n\n\
  *   昂贵的 SQL 语句\n*   昂贵的 PL/SQL\n*   RAC 问题\n*   CPU 瓶颈\n*   内存大小调整建议\n*   数据库配置建议\n\
  *   I/O 瓶颈\n\n如果你遇到数据库性能问题，ADDM 报告是首先寻找数据库瓶颈和问题区域的绝佳位置。ADDM 还会详细列出顶级资源消耗 SQL 语句，并就如何调优这些查询提出建议。\n\
  \n\n\n## 执行计划优化与一致性\n\n执行计划描述了 Oracle 将如何检索数据以满足查询结果。当你提交一条 SQL 语句时，查询优化器会快速生成多个执行计划，并确定哪个计划效率最高。在大多数情况下，先前的默认行为会产生性能良好的执行计划。然而，你会遇到一些情况，即你了解环境的更多细节，并需要调整优化器对执行计划的选择。以下列出了一些功能，可用于影响优化器在选择计划时所使用的决策路径：\n\
  \n*   初始化参数\n*   统计信息\n*   提示\n*   SQL 配置文件\n*   SQL 计划管理（计划基线）\n*   存储概要（已弃用，推荐使用计划基线）\n\
  \n理解这些功能如何影响优化器对执行计划的选择至关重要。在排查 SQL 性能问题时，你必须确定上述哪些功能已启用，以及它们如何影响查询行为。根据所实施的功能以及各种功能组合的影响，SQL\
  \ 语句的性能可能会有天壤之别。\n\n（影响优化器的）初始化参数和统计信息收集在第 13 章中有详细说明。使用提示是第 14 章的重点。本章的重点是 SQL\
  \ 配置文件和计划基线。\n\n*SQL 配置文件*是对统计信息的可选修正和改进。实现 SQL 配置文件的建议（及代码）通过 SQL 调优顾问的输出体现。你可以手动启用\
  \ SQL 配置文件，或将其配置为自动接受。SQL 配置文件有助于优化器推导出更好的执行计划。\n\n*SQL 计划管理*允许你在数据库的表中存储和管理执行计划。*计划基线*由一个或多个已为某个\
  \ SQL 查询接受的、已存储的执行计划组成。当你运行一个查询时，如果该查询存在计划基线，优化器将优先考虑计划基线内的执行计划。*计划历史*是某个查询所有已接受和未接受的执行计划的超集。你可以手动将未接受计划的状态更改为已接受（这将把该计划移入计划基线）。这被称为*演化计划基线*。\n\
  \n计划基线有助于确保优化器始终选择相同的执行计划，而不受数据库环境变化的影响。计划基线提供以下好处：\n\n*   在从一种数据库版本升级到另一种时保留性能；换句话说，有助于确保升级前后对同一查询使用相同的执行计划\n\
  *   当数据变更、统计信息更新或新的 SQL 配置文件可用时，保持性能稳定和一致\n*   提供一种机制来接受新出现的更高效的执行计划（例如添加了新的索引或新的\
  \ SQL 配置文件可用时）\n\n图 12-1 展示了优化器在选择执行计划时所做的决策流程。请花几分钟分析此图，并确保你理解各种功能如何影响优化器的行为。在查看图表时，请记住以下几点：\n\
  \n*   提示是唯一需要对 SQL 查询进行物理修改的功能。所有其他技术都可以在不更改查询的情况下用于提高性能。\n*   初始化参数、统计信息、提示、SQL\
  \ 配置文件和计划基线都可以独立运行。没有任何一个功能依赖于另一个功能的存在。\n*   优化器在开箱即用的设置下也能正常工作。你不需要显式启用任何这些功能（如提示、SQL\
  \ 配置文件等）。然而，为了获得 SQL 查询的最大性能，我们强烈建议你了解何时以及如何使用这些功能来帮助查询优化器做出最优决策。\n\n当你查看这个镰刀形图表时，为了帮助理解优化器如何在低成本计划和计划基线计划之间进行选择，请考虑制定执行计划时采取的一般步骤：\n\
  \n1.  优化器首先考虑初始化参数、提示和 SQL 配置文件，以选择成本最低的计划。\n2.  无论步骤 1 得出什么计划，如果该查询存在计划基线，优化器将从计划基线中选择成本最低的计划。此外，优化器将优先考虑在计划基线中状态为“固定”的计划。\n\
  3.  如果计划基线中的已接受计划无法重现（例如，所有计划基线计划所依赖的某个索引已被删除），则优化器选择步骤 1 中生成的成本最低的计划。此处的“最低成本”意味着使用最少的数据库资源，如\
  \ CPU、I/O 和内存。\n4.  如果一个查询存在计划基线，并且低成本计划（来自步骤 1）的成本低于计划基线中的计划，则该低成本计划会自动以“未接受”状态添加到该查询的计划历史中。你可以选择将计划从计划历史移入计划基线，以便优化器在选择执行计划时考虑它们。这为你提供了灵活性，可以在出现更好的计划时使用它们（即计划的演化）。\n\
  \n![images](img/1201.jpg)\n\n**图 12-1.** 影响优化器选择执行计划的 Oracle 数据库功能\n\n初始化参数和提示等功能不需要额外许可，在所有版本的\
  \ Oracle 数据库中均可用。其他功能，如 SQL 配置文件，需要额外许可，且仅随企业版提供。表 12-1 总结了每种影响查询优化器的功能的特点。\n\n\
  ![images](img/t1201.jpg)\n\n本章第一部分重点介绍 SQL 配置文件的管理。本章其余部分涉及计划基线的实施和使用。我们描述了这些工具使用中的实际和真实示例。在适当的情况下，我们也添加了如何通过企业管理员使用特定功能的说明。\n\
  \n### 12-1. 创建并接受 SQL 配置文件\n\n#### 问题\n\n你有一个性能不佳的查询，并希望从 SQL 调优顾问那里获得建议。你意识到，作为调优建议的一部分，SQL\
  \ 调优顾问可能会建议为有问题的查询应用 SQL 配置文件。\n\n#### 解决方案\n\n针对有问题的查询运行 SQL 调优顾问。请记住，SQL 调优顾问可能会也可能不会推荐\
  \ SQL 配置文件作为性能问题的解决方案。要手动运行 SQL 调优顾问，请执行以下步骤：\n\n1.  使用 `DBMS_SQLTUNE` 创建一个调优任务。\n\
  2.  执行该调优任务。\n3.  生成调优建议报告。\n4.  如果 SQL 配置文件是调优建议输出的一部分，则创建并接受它。\n\n以下示例遵循了上述步骤。在此场景中，SQL\
  \ 调优顾问建议为给定的查询应用 SQL 配置文件。\n\n![images](img/square.jpg) **提示** 有关创建 SQL 调优任务的完整详细信息，请参阅第\
  \ 11 章。第 11 章涵盖了诸如使用 AWR、内存或 SQL 调优集作为调优任务的 SQL 来源等主题。\n\n\n### 步骤 1: 使用 DBMS_SQLTUNE\
  \ 创建调优任务\n\n第一步是创建一个与有问题的 SQL 语句相关联的调优任务。在以下代码中，SQL 文本被硬编码为输入到 `tune_sql` 变量：\n\n\
  ```sql\nDECLARE\n  tune_sql  CLOB;\n  tune_task VARCHAR2(30);\nBEGIN\n  tune_sql\
  \ := 'select count(*) from mgmt_db_feature_usage_ecm2';\n  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n\
  \    sql_text   => tune_sql\n   ,user_name  => 'STAGING'\n   ,scope      => 'COMPREHENSIVE'\n\
  \   ,time_limit => 60\n   ,task_name  => 'TUNE1'\n   ,description => 'Calling SQL\
  \ Tuning Advisor for one statement'\n);\nEND;\n/\n```\n\n上述代码被放置在一个名为 `sqltune.sql`\
  \ 的文件中，并按如下方式执行：\n\n```sql\nSQL> @sqltune.sql\n```\n\n如果你之后需要删除调优任务，可以使用 `DBMS_SQLTUNE.DROP_TUNING_TASK`\
  \ 过程。显然，此时不要删除调优任务，因为在接下来的几个步骤中你还需要它。\n\n![images](img/square.jpg) `注意` 在处理调优建议和\
  \ SQL 配置文件时，请确保你使用的数据库账户已被授予 `ADMINISTER SQL MANAGEMENT OBJECT` 系统权限。此权限包含了管理调优任务和\
  \ SQL 配置文件所需的所有权限。\n\n### 步骤 2: 执行调优任务\n\n此步骤运行 SQL 调优顾问，以生成与调优任务（在步骤 1 中创建）相关联的任何查询的建议：\n\
  \n```sql\nSQL> exec dbms_sqltune.execute_tuning_task(task_name=>'TUNE1');\n```\n\
  \n### 步骤 3: 运行调优建议报告\n\n现在使用 `DBMS_SQLTUNE` 提取在步骤 2 中生成的任何调优建议：\n\n```sql\nset long\
  \ 10000\nset longchunksize 10000\nset lines 132\nset pages 200\nselect dbms_sqltune.report_tuning_task('TUNE1')\
  \ from dual;\n```\n\n对于此示例，SQL 调优顾问建议创建一个 SQL 配置文件。以下是输出中的一段内容，包含了建议以及创建 SQL 配置文件所需的代码：\n\
  \n```\nRecommendation (estimated benefit: 86.11%)\n ------------------------------------------\n\
  \  - Consider accepting the recommended SQL profile to use parallel execution\n\
  \    for this statement.\n    execute dbms_sqltune.accept_sql_profile(task_name\
  \ => 'TUNE1', task_owner\n            => 'SYS', replace => TRUE, profile_type =>\n\
  \            DBMS_SQLTUNE.PX_PROFILE);\n-------------------------------------------\n\
  \  Executing this query parallel with DOP 8 will improve its response time\n  86.11%\
  \ over the original plan. However, there is some cost in enabling\n  parallel execution...\n\
  ```\n\n### 步骤 4: 创建并接受 SQL 配置文件\n\n要实际创建 SQL 配置文件，你需要运行 SQL 调优顾问推荐的代码（来自步骤 3）——例如：\n\
  \n```sql\nbegin\n-- This is the code from the SQL Tuning Advisor\ndbms_sqltune.accept_sql_profile(\n\
  \    task_name => 'TUNE1',\n    task_owner => 'SYS',\n    replace => TRUE,\n   \
  \ profile_type => DBMS_SQLTUNE.PX_PROFILE);\n--\nend;\n/\n```\n\n当运行上述代码时，它会创建并启用\
  \ SQL 配置文件。现在，每当执行关联的 SQL 查询时，优化器在制定执行计划时都会考虑这个 SQL 配置文件。\n\n![images](img/square.jpg)\
  \ `提示` 你如何知道优化器是否正在使用 SQL 配置文件？开启 `AUTOTRACE`，在启用配置文件和禁用配置文件两种情况下查看执行计划。你应该能看到在启用配置文件时使用了成本更低的执行计划。此外，可以考虑检查\
  \ `V$SQL` 的 `SQL_PROFILE` 列。\n\n#### 工作原理\n\nOracle 支持的创建 SQL 配置文件的唯一方法是运行 SQL 调优顾问，如果建议创建，则使用调优顾问的输出来创建\
  \ SQL 配置文件。换句话说，SQL 调优顾问会判断 SQL 配置文件是否有帮助，如果有，则会为给定查询生成创建 SQL 配置文件所需的代码。\n\n“解决方案”部分详细说明了如何手动运行\
  \ SQL 调优顾问。请记住，从 Oracle Database 11g 开始，此调优任务作业会定期自动运行。有关自动 SQL 调优功能的详细信息，请参阅 第\
  \ 11 章。你可以通过此查询轻松查看自动调优作业的输出：\n\n```sql\nSQL> SELECT DBMS_AUTO_SQLTUNE.REPORT_AUTO_TUNING_TASK\
  \ FROM DUAL;\n```\n\n我们建议你定期查看自动调优作业的输出。SQL 调优顾问会在输出中提供创建和接受 SQL 配置文件的代码。\n\n![images](img/square.jpg)\
  \ `提示` 有关如何配置自动接受 SQL 配置文件的详细信息，请参阅配方 12-2。\n\n如“解决方案”部分所述，SQL 配置文件是通过 `DBMS_SQLTUNE.ACCEPT_SQL_PROFILE`\
  \ 过程创建和接受的。使用此过程时有许多可用选项（详见 表 12-2）。\n\n![images](img/t1202.jpg)\n\n`ACCEPT_SQL_PROFILE`\
  \ 的 `FORCE_MATCH` 参数需要进一步解释。回想一下，SQL 配置文件与一个 SQL 语句相关联。该 SQL 语句是通过哈希函数（SQL 签名）来识别的。哈希函数是在转换\
  \ SQL 文本并删除多余空格后生成的。当将 `FORCE_MATCH` 设置为 `TRUE` 时，这还会将字面值规范化为绑定值。这类似于通过 `CURSOR_SHARING`\
  \ 数据库初始化参数的 `FORCE` 选项生成的算法。\n\n例如，当 `FORCE_MATCH` 设置为 `TRUE` 时，以下两个 SQL 语句将生成相同的\
  \ SQL 签名：\n\n```sql\nSQL> select value from my_table where value = 'AA';\nSQL> select\
  \ value from my_table where value = 'bb';\n```\n\n这允许使用字面值的 SQL 语句共享同一个 SQL 配置文件。如果\
  \ SQL 语句中同时存在字面值和绑定变量，则字面值不会被规范化。\n\n#### SQL 配置文件 与 数据库配置文件\n\n令人困惑的是，Oracle 会选择\
  \ “profile” 这个名称并将其应用于两个不同的数据库功能，即 SQL 配置文件和数据库配置文件。也许在未来的版本中，Oracle 会考虑将 SQL 配置文件重命名为类似\
  \ SQL 可选更智能统计信息（使查询运行更快）这样的名字。无论如何，请确保不要混淆 SQL 配置文件和数据库配置文件。\n\n简而言之，SQL 配置文件与一个\
  \ SQL 语句相关联，包含对统计信息的修正，以帮助优化器生成更高效的执行计划。SQL 调优顾问推荐并生成创建和接受 SQL 配置文件所需的代码，而数据库配置文件是一个分配给用户的对象，用于约束数据库资源使用并强制执行密码安全性。数据库配置文件是使用\
  \ `CREATE PROFILE` 语句创建的。\n\n### 12-2. 自动接受 SQL 配置文件\n\n#### 问题\n\n你了解到自动 SQL 调优作业（在\
  \ Oracle Database 11g 或更高版本中）每天都会运行。你确定自动调优作业会为有问题的查询生成合理的 SQL 配置文件，现在希望启用自动接受自动调优作业生成的\
  \ SQL 配置文件。\n\n![images](img/square.jpg) `提示` 有关修改自动 SQL 调优作业的完整详细信息，请参阅 第 11 章。\n\
  \n## 解决方案\n\n使用 `DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER` 过程来启用自动接受自动 SQL\
  \ 优化任务推荐的 SQL 配置文件——例如：\n\n```\nBEGIN\n  DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER(\n\
  \    parameter => 'ACCEPT_SQL_PROFILES', value => 'TRUE');\nEND;\n/\n```\n\n如果要禁用\
  \ SQL 配置文件的自动接受，可以按照如下方式操作（使用 `FALSE` 参数）：\n\n```\nBEGIN\n  DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER(\n\
  \    parameter => 'ACCEPT_SQL_PROFILES', value => 'FALSE');\nEND;\n/\n```\n\n![images](img/square.jpg)\
  \ **注意** `DBMS_AUTO_SQLTUNE` 包需要 DBA 角色，或者已将该包的 `EXECUTE` 权限显式授予用户。此包在 Oracle 数据库\
  \ 11g R2 或更高版本中可用。如果你使用的是更低版本的数据库，请使用 `DBMS_SQLTUNE` 包。\n\n## 工作原理\n\n在 Oracle 数据库\
  \ 11g 或更高版本中，一个自动配置的作业会定期运行 SQL 优化顾问（运行周期由配置的维护窗口决定）。该作业从 AWR 中包含的性能指标中识别高资源消耗的\
  \ SQL 语句。当自动优化作业运行时，它偶尔会建议为性能不佳的 SQL 语句实现一个 SQL 配置文件。如果满足以下条件，Oracle 将自动接受该配置文件：\n\
  \n*   已通过 `DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER` 配置了自动接受。\n*   使用该 SQL\
  \ 配置文件后，性能增益（由 SQL 优化顾问确定）至少是未使用配置文件的三倍。\n\n你可以通过此查询报告自动优化任务配置的详细信息：\n\n```\nSELECT\n\
  \  parameter_name\n ,parameter_value\nFROM dba_advisor_parameters\nWHERE task_name\
  \ = 'SYS_AUTO_SQL_TUNING_TASK'\nAND   parameter_name\n   IN ('ACCEPT_SQL_PROFILES',\n\
  \       'MAX_SQL_PROFILES_PER_EXEC',\n       'MAX_AUTO_SQL_PROFILES',\n       'EXECUTION_DAYS_TO_EXPIRE');\n\
  ```\n\n以下是一些示例输出：\n\n```\nPARAMETER_NAME            PARAMETER_VALUE\n-------------------------\
  \ --------------------\nEXECUTION_DAYS_TO_EXPIRE  30\nACCEPT_SQL_PROFILES      \
  \ TRUE\nMAX_SQL_PROFILES_PER_EXEC 20\nMAX_AUTO_SQL_PROFILES     10000\n```\n\n![images](img/square.jpg)\
  \ **提示** 自动实现的 SQL 配置文件在 `DBA_SQL_PROFILES` 视图的 `TYPE` 列中显示 `AUTO` 值。\n\n你还可以使用\
  \ Enterprise Manager 来配置 SQL 配置文件的自动接受。从主数据库页面，导航到 Advisor Central 页面。接下来，单击 SQL\
  \ Advisors 链接。现在单击 Automatic SQL Tuning Results 页面。然后单击 Automatic Implementation\
  \ of SQL Profiles 的配置按钮。你应该会看到一个类似于图 12-2 的页面。\n\n![images](img/1202.jpg)\n\n`图\
  \ 12-2.` 配置 SQL 配置文件的自动接受\n\n通过此屏幕，你可以管理诸如 SQL 配置文件的自动接受、优化会话的最长时间等功能。\n\n### 12-3.\
  \ 显示 SQL 配置文件信息\n\n#### 问题\n\n你已经创建并接受了多个 SQL 配置文件，现在想要查看与这些数据库对象相关的信息。\n\n####\
  \ 解决方案\n\n使用 `DBA_SQL_PROFILES` 视图来显示有关 SQL 配置文件的信息。以下是一个选择最有趣列的示例：\n\n```\nSQL>\
  \ select name, type, status, sql_text from dba_sql_profiles;\n```\n\n以下是部分输出片段：\n\
  \n```\nNAME                           TYPE    STATUS   SQL_TEXT\n------------------------------\
  \ ------- -------- ------------------------------\nSYS_SQLPROF_012eda58a1be0001\
  \   MANUAL  ENABLED  SELECT ecm_snapshot_id AS id...\nSYS_SQLPROF_012ea20305980000\
  \   MANUAL  ENABLED  SELECT *  FROM inv_maint...\nSYS_SQLPROF_012edf0316930003 \
  \  MANUAL  ENABLED  SELECT /* + parallel(mgmt_db_f...\n```\n\n对于此数据库，有几个手动启用的 SQL\
  \ 配置文件（如前述输出所示）。\n\n![images](img/square.jpg) **注意** 由于 SQL 配置文件与特定的 SQL 语句关联（而非用户），因此没有与\
  \ SQL 配置文件关联的 `ALL` 或 `USER` 级别视图。\n\n#### 工作原理\n\n回想一下，SQL 配置文件包含对现有统计信息的改进。`DBA_SQL_PROFILES`\
  \ 视图是查看 SQL 配置文件名称、属性和关联 SQL 文本的最佳来源。\n\n要查看内部的 SQL 配置文件提示相关信息，你还可以额外查询 `DBMSHSXP_SQL_PROFILE_ATTR`\
  \ 视图——例如：\n\n```\nSELECT\n  a.name\n ,b.comp_data\nFROM dba_sql_profiles       \
  \   a\n    ,dbmshsxp_sql_profile_attr b\nWHERE a.name = b.profile_name;\n```\n\n\
  以下是一些示例输出：\n\n```\nSYS_SQLPROF_0130520c90dc0002\n<outline_data><hint><![CDATA[OPT_ESTIMATE(@\"\
  SEL$2\",\nNLJ_INDEX_SCAN, \"FS\"@\"SEL$2\", (\"MAP\"@\"SEL$2\"), \"DB_FEAT_OPT_112_SUM_MV_IDX3\"\
  ,\nSCALE_ROWS=0.3369001041)]]></h\n```\n\n前面的输出让你了解 SQL 配置文件中提示的类型。此信息供优化器使用，以更好地估计每个执行步骤的基数。这些数据使优化器在生成执行计划时能够做出更好的决策。\n\
  \n你还可以通过查询 `SQLOBJ$` 和 `SQLOBJ$DATA` 视图来查看此内部 SQL 配置文件信息。这些视图中的数据是 XML 格式的，因此在查询时必须使用\
  \ Oracle XML 函数格式化输出——例如：\n\n```\nSELECT\n    extractvalue(value(a), '.') sqlprofile_hints\n\
  FROM sqlobj$      o\n    ,sqlobj$data d\n    ,table(xmlsequence(extract(xmltype(d.comp_data),'/outline_data/hint')))\
  \ a\nWHERE o.name      = '&&profile_name'\nAND   o. plan_id = d.plan_id\nAND   o.signature\
  \ = d.signature\nAND   o.category = d.category\nAND   o.obj_type = d.obj_type;\n\
  ```\n\n以下是输出的一个小示例：\n\n```\nOPT_ESTIMATE(@\"SEL$EF0E05FC\", INDEX_SCAN, \"MGMT_TARGETS\"\
  @\"SEL$4\",\n\"MIDX3\", SCALE_ROWS=50.68489486)\nOPT_ESTIMATE(@\"SEL$EF0E05FC\"\
  , NLJ_INDEX_FILTER,\n\"MGMT_ECM_GEN_SNAPSHOT\"@\"SEL$3\", (\"MGMT_TARGETS\"@\"SEL$4\"\
  ),\n\"IDX$$_1197C0001\", SCALE_ROWS=0.4308705)\n```\n\n同样，这些配置文件统计信息并不强制优化器使用特定的执行计划。相反，这些统计信息为优化器提供了选择更高效执行计划的灵活性。\n\
  \n![images](img/square.jpg) **注意** 如果你使用的是 Oracle 数据库 10g，则使用 `SQLPROF$` 和 `SQLPROF$ATTR`\
  \ 视图。\n\n### 12-4. 禁用 SQL 配置文件\n\n#### 问题\n\n你认为某个查询不再需要 SQL 配置文件。你希望手动禁用（而非删除）该\
  \ SQL 配置文件。\n\n#### 解决方案\n\n首先验证要禁用的 SQL 配置文件的名称：\n\n```\nSQL> select name, status\
  \ from dba_sql_profiles;\n```\n\n以下是部分输出片段：\n\n```\nNAME                       \
  \    STATUS\n------------------------------ --------\nSYS_SQLPROF_012eda58a1be0001\
  \   ENABLED\n```\n\n现在使用 `DBMS_SQLTUNE.ALTER_SQL_PROFILE` 过程将配置文件的状态修改为禁用：\n\n```\n\
  BEGIN\n  DBMS_SQLTUNE.ALTER_SQL_PROFILE(\n    name => 'SYS_SQLPROF_012eda58a1be0001',\n\
  \    attribute_name => 'STATUS',\n    value => 'DISABLED');\nEND;\n/\n```\n\n####\
  \ 工作原理\n\nSQL 配置文件的状态是几个可修改的属性之一。您还可以修改诸如名称、描述和类别等特征。有关可修改属性的描述，请参阅表 12-3。\n\n![images](img/square.jpg)\
  \ **注意** 您需要拥有 `ALTER ANY SQL PROFILE` 权限才能更改 SQL 配置文件。\n\n![images](img/t1203.jpg)\n\
  \nSQL 配置文件的类别有一些有趣的影响。类别允许您通过设置 `SQLTUNE_CATEGORY` 初始化参数（此参数可在会话或系统级别设置）来控制 SQL\
  \ 配置文件的使用。当执行查询时，如果有可用的 SQL 配置文件，优化器会检查分配给该 SQL 配置文件的类别是否与 `SQLTUNE_CATEGORY` 的系统或会话级设置相同。如果\
  \ SQL 配置文件的类别与 `SQLTUNE_CATEGORY` 的设置匹配，那么优化器将考虑使用该 SQL 配置文件。\n\nSQL 配置文件的默认类别是\
  \ `DEFAULT`。同时 `SQLTUNE_CATEGORY` 的默认值也是 `DEFAULT`。因此，除非您更改了 SQL 配置文件的类别或修改了 `SQLTUNE_CATEGORY`\
  \ 参数，否则优化器将会使用该 SQL 配置文件作为输入。\n\n您可以将类别更改为 `DEFAULT` 以外的值。这意味着只有那些会话，如果它们将 `SQLTUNE_CATEGORY`\
  \ 初始化参数修改为与 SQL 配置文件类别相匹配的值，才能使用该配置文件。例如，假设您将 SQL 配置文件修改为类别 `TEST1`：\n\n```sql\n\
  BEGIN\n  DBMS_SQLTUNE.ALTER_SQL_PROFILE(\n    name => 'SYS_SQLPROF_012eda58a1be0001',\n\
  \    attribute_name => 'CATEGORY',\n    value => 'TEST1');\nEND;\n/\n```\n\n现在，唯一能看到并使用此配置文件的会话是那些将\
  \ `SQLTUNE_CATEGORY` 设置为 `TEST1` 的会话：\n\n```sql\nSQL> alter session set sqltune_category=TEST1;\n\
  ```\n\n这允许您将配置文件的使用隔离到仅那些 `SQLTUNE_CATEGORY` 设置与该 SQL 配置文件类别相匹配的会话。这使您能够测试实施 SQL\
  \ 配置文件的影响，并可以通过简单地更改会话级或系统级的 `SQLTUNE_CATEGORY` 设置来快速回退。\n\n您还可以从 Enterprise Manager\
  \ 管理 SQL 配置文件的许多方面。从主数据库页面导航到“服务器”选项卡。在“查询优化器”部分，单击“SQL 计划控制”选项卡。您应该会看到一个类似于图 12-3\
  \ 的屏幕。\n\n![images](img/1203.jpg)\n\n**图 12-3.** 管理 SQL 配置文件\n\n从这个屏幕，您可以管理诸如启用、禁用、更改类别以及删除\
  \ SQL 配置文件等功能。\n\n### 12-5. 删除 SQL 配置文件\n\n#### 问题\n\n您已对一个查询在附加和不附加 SQL 配置文件的情况下进行了测试。您确定查询性能在使用\
  \ SQL 配置文件后并未显著提升。您想要删除该 SQL 配置文件，以免数据字典中充斥着不必要和过时的信息。\n\n#### 解决方案\n\n使用 `DBMS_SQLTUNE.DROP_SQL_PROFILE`\
  \ 过程来删除 SQL 配置文件。传入您要删除的 SQL 配置文件的名称，例如：\n\n```sql\nSQL> exec dbms_sqltune.drop_sql_profile('SYS_SQLPROF_012edef0d0a70002');\n\
  ```\n\n如果成功，您将看到以下输出：\n\n```\nPL/SQL procedure successfully completed.\n```\n\n\
  #### 工作原理\n\n删除 SQL 配置文件相当容易。如果您正在清理数据库或想要从测试环境中移除配置文件，可能需要执行此操作。如果您不确定 SQL 配置文件的名称，可以查询\
  \ `DBA_SQL_PROFILES` 以获取更多信息（详情请参阅配方 12-3）。\n\n![images](img/square.jpg) **注意**\
  \ 您需要拥有 `DROP ANY SQL PROFILE` 权限才能删除 SQL 配置文件。\n\n如果您想删除数据库中的所有配置文件，可以使用 PL/SQL\
  \ 循环遍历所有配置文件并删除它们：\n\n```sql\ndeclare\n  cursor c1 is select name from dba_sql_profiles;\n\
  begin\n  for r1 in c1 loop\n    dbms_sqltune.drop_sql_profile(r1.name);\n  end loop;\n\
  end;\n/\n```\n\n### 12-6. 迁移 SQL 配置文件\n\n#### 问题\n\n您有一个测试数据库，并希望从中提取所有 SQL 配置文件，然后将它们迁移到生产数据库。\n\
  \n#### 解决方案\n\n将 SQL 配置文件从一个数据库传输到另一个数据库涉及以下步骤：\n\n1.  创建一个暂存表。\n2.  填充该暂存表。\n3.\
  \  将表从源数据库移动到目标数据库（使用 Data Pump 或数据库链接）。\n4.  在目标数据库上，从暂存表中提取信息，以将 SQL 配置文件信息填充到数据字典中。\n\
  \n以下小节详细描述了这些步骤。\n\n##### 步骤 1：创建暂存表\n\n使用 `DBMS_SQLTUNE.CREATE_STGTAB_SQLPROF`\
  \ 过程创建暂存表。此示例创建一个由 `MV_MAINT` 用户拥有的名为 `PROF_STAGE` 的表：\n\n```sql\nBEGIN\n  dbms_sqltune.create_stgtab_sqlprof(\n\
  \    table_name => 'PROF_STAGE',\n    schema_name => 'MV_MAINT' );\nEND;\n/\n```\n\
  \n##### 步骤 2：填充暂存表\n\n使用 `DBMS_SQLTUNE.PACK_STGTAB_SQLPROF` 过程，用 SQL 配置文件信息填充步骤\
  \ 1 中创建的表。此示例用有关特定 SQL 配置文件的信息填充表：\n\n```sql\nBEGIN\n  dbms_sqltune.pack_stgtab_sqlprof(\n\
  \    profile_name => 'SYS_SQLPROF_012edf84806e0004',\n    staging_table_name =>\
  \ 'PROF_STAGE',\n    staging_schema_owner => 'MV_MAINT' );\nEND;\n/\n```\n\n![images](img/square.jpg)\
  \ **提示** `PROFILE_NAME` 参数可以包含通配符。例如，如果您想传输数据库中的所有 SQL 配置文件，可以将 `PROFILE_NAME` 设置为\
  \ `'%'`。\n\n##### 步骤 3：将暂存表复制到目标数据库\n\n您可以通过 Data Pump、旧的 `exp`/`imp` 实用程序或使用数据库链接将表从一个数据库复制到另一个数据库。此示例在目标数据库中创建一个数据库链接，然后从源数据库复制表：\n\
  \n```sql\ncreate database link source_db\nconnect to mv_maint\nidentified by foo\n\
  using 'source_db';\n```\n\n创建数据库链接后，可以使用 `CREATE TABLE...AS SELECT` 语句直接从源端复制表：\n\
  \n```sql\nSQL> create table PROF_STAGE as select * from PROF_STAGE@source_db;\n\
  ```\n\n##### 步骤 4：将暂存表的内容加载到目标数据库\n\n现在在目标数据库中，解包该表以将配置文件信息加载到数据库中：\n\n```sql\n\
  BEGIN\n  DBMS_SQLTUNE.UNPACK_STGTAB_SQLPROF(\n    replace => TRUE,\n    staging_table_name\
  \ => 'PROF_STAGE');\nEND;\n/\n```\n\n如果未指定配置文件名称，默认为 `%` 通配符（意味着表中的所有配置文件都将被加载到目标数据库中）。\n\
  \n#### 工作原理\n\n将 SQL 配置文件从一个数据库复制到另一个数据库相当容易。您只需创建一个特殊的表来保存配置文件信息，然后填充该表，将表复制到目标数据库，最后解包表的内容。表\
  \ 12-4 描述了配置文件打包过程的所有参数。\n\n![images](img/t1204.jpg)\n\n`DBMS_SQLTUNE.UNPACK_STGTAB_SQLPROF`\
  \ 过程采用与打包过程相同的参数，并额外增加了一个 `REPLACE` 参数。`REPLACE` 参数指定如果配置文件已存在是否进行替换（可以是 `TRUE`\
  \ 或 `FALSE`）。\n\n### 12-7. 自动添加计划基线\n\n#### 问题\n\n您希望为数据库中每个重复执行的 SQL 查询自动创建计划基线。\n\
  \n### 12-8. 为单个 SQL 语句创建计划基线\n\n#### 问题\n\n您希望为当前正在执行的某个特定 SQL 语句创建一个计划基线。\n\n####\
  \ 解决方案\n\n手动将计划基线与 SQL 语句关联的过程如下：\n\n1.  确定您想要为其创建计划基线的 SQL 语句。\n2.  提供一个标识符（例如\
  \ `SQL_ID`）作为 `DBMS_SPM` 包的输入，以针对该 SQL 语句创建计划基线。\n\n例如，假设您正在使用一个 SQL 语句，如下所示：\n\n\
  `SQL> select emp_id from emp where emp_id = 100;`\n\n现在查询 `V$SQL` 视图以确定该查询的 `SQL_ID`：\n\
  \n```sql\nselect\n  sql_id\n ,sql_text\nfrom v$sql\nwhere sql_text\n    like 'select\
  \ emp_id from emp where emp_id = 100';\n```\n\n以下是输出片段：\n\n```text\nSQL_ID     \
  \   SQL_TEXT\n------------- ------------------------------------------------------------\n\
  0qgmjf9krq285 select emp_id from emp where emp_id = 100\n```\n\n既然已经确定了 `SQL_ID`，就将其作为输入提供给\
  \ `DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE` 函数，为给定的查询创建计划基线——例如：\n\n```sql\nDECLARE\n\
  \  plan1 PLS_INTEGER;\nBEGIN\n  plan1 := DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE(sql_id\
  \ => '0qgmjf9krq285');\nEND;\n/\n```\n\n现在，该查询应该在 `DBA_SQL_PLAN_BASELINES` 视图中有一个条目，显示其已关联一个已启用的计划基线——例如：\n\
  \n`SQL> select sql_handle, plan_name, sql_text from dba_sql_plan_baselines;`\n\n\
  以下是输出的一小部分：\n\n```text\nSQL_HANDLE                PLAN_NAME                    \
  \             SQL_TEXT\n------------------------- ----------------------------------------\
  \ ----------------------\nSQL_f34ef255797c4713      SQL_PLAN_g6mrkapwrsjsmd8a279cc\
  \           select emp_id.....\n```\n\n#### 工作原理\n\n“解决方案”部分描述了如何使用游标缓存中的查询来确定单个\
  \ SQL 语句（基于 `SQL_ID`）以创建计划基线。为查询创建计划基线的方法有很多种，例如使用 SQL 文本、方案、模块等。例如，接下来基于部分 SQL\
  \ 字符串加载一个计划基线：\n\n```sql\nDECLARE\n  plan1 PLS_INTEGER;\nBEGIN\n  plan1 := DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE(\n\
  \               attribute_name => 'sql_text'\n              ,attribute_value =>\
  \ 'select emp_id from emp%');\nEND;\n/\n```\n\n有关 `DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE`\
  \ 函数可用输入参数的详细信息，请参见 `表 12-5`。\n\n**注意：** 有关如何为 SQL 调优集中包含的 SQL 语句创建计划基线的示例，请参见配方\
  \ 12-9。\n\n![images](img/t1205.jpg)\n\n### 12-9. 为 SQL 调优集中包含的 SQL 创建计划基线\n\n####\
  \ 问题\n\n您面临以下情况：\n\n*   您正在将数据库升级到新版本。\n*   根据以往经验，您知道升级到更新版本的 Oracle 有时可能会导致 SQL\
  \ 语句性能不佳，因为升级后的数据库优化器选择的执行计划比先前版本数据库的优化器效率更低（更差）。\n*   您希望确保升级后 SQL 语句以可接受的性能执行。\n\
  \n本质上，您正在升级，并希望优化器在升级前后选择相同的执行计划。您不希望升级导致出现可能降低性能的新计划。\n\n#### 解决方案\n\n以下是自动为执行次数超过一次的\
  \ SQL 语句创建计划基线的步骤：\n\n1.  将 `OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES` 参数设置为 `TRUE`（在会话或系统级别）。\n\
  2.  执行两次或更多次您希望捕获其计划基线的查询。\n3.  将 `OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES` 设置为 `FALSE`。\n\
  \n接下来的示例说明了使用上述步骤为查询添加计划基线的过程。首先在会话级别设置指定的初始化参数：\n\n`SQL> alter session set optimizer_capture_sql_plan_baselines=true;`\n\
  \n现在执行一个查询两次。当 `OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES` 参数设置为 `TRUE` 时，对于运行两次或更多次的查询，Oracle\
  \ 将自动为其创建计划基线：\n\n`SQL> select emp_id from emp where emp_id=3000;`\n`SQL> select\
  \ emp_id from emp where emp_id=3000;`\n\n现在将初始化参数设置回 `FALSE`。\n\n`SQL> alter session\
  \ set optimizer_capture_sql_plan_baselines=false;`\n\n现在，该查询应该在 `DBA_SQL_PLAN_BASELINES`\
  \ 视图中有一个条目，显示其已关联一个已启用的计划基线——例如：\n\n```sql\nSELECT\n  sql_handle, plan_name, enabled,\
  \ accepted,\n  created, optimizer_cost, sql_text\nFROM dba_sql_plan_baselines;\n\
  ```\n\n以下是输出的部分列表：\n\n```text\nSQL_HANDLE           PLAN_NAME                  \
  \    ENA ACC...\n-------------------- ------------------------------ --- ---...\n\
  SQL_790bd425fe4a0125 SQL_PLAN_7k2yn4rz4n095d8a279cc YES YES...\n```\n\n#### 工作原理\n\
  \n启用 `OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES` 允许您自动捕获数据库中重复运行（超过一次）的查询的计划基线。“解决方案”部分描述了如何在会话级别使用此功能。您也可以设置该参数，以便为数据库中所有重复查询生成计划基线——例如：\n\
  \n`SQL> alter system set optimizer_capture_sql_plan_baselines=true;`\n\n从此时起，数据库中任何运行超过一次的查询都将自动为其创建计划基线。我们不建议在生产环境中这样做，除非您已先仔细测试了此功能并确保不会产生任何不利的副作用（因为要为每个查询存储计划基线）。但是，您可能有一个测试环境，希望有意为每个重复运行的\
  \ SQL 语句创建计划基线。\n\n**注意：** 默认情况下，`OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES` 参数为 `FALSE`。\n\
  \n您也可以从 Enterprise Manager 管理计划基线的使用。从主数据库页面，导航到“服务器”选项卡。在“查询优化器”部分，单击“SQL 计划控制”选项卡。接下来，单击“SQL\
  \ 计划基线”选项卡。您应该会看到一个类似于 `图 12-4` 的屏幕。\n\n![images](img/1204.jpg)\n\n`图 12-4. 管理计划基线`\n\
  \n从此屏幕，您可以管理诸如启用、禁用、删除和演进计划基线等任务。\n\n\n### 12-10. 修改计划基线\n\n### 解决方案\n\n要处理此问题，请将\
  \ AWR 中资源消耗最高的 SQL 查询作为创建计划基线的候选。此方案使用了创建 AWR 基线的技术。AWR 基线是由起始/结束快照 ID 指定的 AWR 活动快照。接下来的步骤展示了如何使用在\
  \ AWR 基线中找到的高资源消耗 SQL 语句创建并填充 SQL 调优集，然后为这些查询创建计划基线：\n\n1.  创建一个 AWR 基线。\n2.  创建一个\
  \ SQL 调优集对象。\n3.  使用在 AWR 基线中找到的查询填充 SQL 调优集。\n4.  使用该调优集作为 `DBMS_SPM` 的输入，为 SQL\
  \ 调优集中包含的每个查询创建一个计划基线。\n\n![images](img/square.jpg) **注意** 在如何使用 AWR 或内存中的高资源消耗查询填充\
  \ SQL 调优集方面，您拥有很大的灵活性。有关使用 SQL 调优集的完整详细信息，请参阅第 11 章。\n\n### 步骤 1：创建 AWR 基线\n\n第一步是创建一个\
  \ AWR 基线。例如，假设您知道在数据库中两个快照之间运行着高负载查询。下面的代码使用两个快照 ID 创建一个 AWR 基线：\n\n```sql\nBEGIN\n\
  \  DBMS_WORKLOAD_REPOSITORY.create_baseline (\n    start_snap_id => 26632,\n   \
  \ end_snap_id   => 26635,\n    baseline_name => 'peak_baseline_apr15_11');\nEND;\n\
  /\n```\n\n如果您不确定数据库中有哪些可用快照，可以运行 AWR 报告或从 `DBA_HIST_SNAPSHOT` 中选择 `SNAP_ID`：\n\n\
  ```sql\nselect snap_id, begin_interval_time\nfrom dba_hist_snapshot order by 1;\n\
  ```\n\n### 步骤 2：创建 SQL 调优集对象\n\n现在创建一个 SQL 调优集。接下来的代码片段创建了一个名为 `test1` 的调优集：\n\n\
  ```sql\nBEGIN\n  dbms_sqltune.create_sqlset(\n    sqlset_name => 'test1'\n   ,description\
  \ => 'STS from AWR');\nEND;\n/\n```\n\n### 步骤 3：使用在 AWR 基线中找到的高资源消耗查询填充 SQL 调优集\n\
  \n现在，使用在 AWR 基线（步骤 1 创建）中找到的任何查询来填充 SQL 调优集（步骤 2 创建）：\n\n```sql\nDECLARE\n  base_cur\
  \ dbms_sqltune.sqlset_cursor;\nBEGIN\n  OPEN base_cur FOR\n    SELECT value(x)\n\
  \    FROM table(dbms_sqltune.select_workload_repository(\n      'peak_baseline_apr15_11',\
  \ null, null,'elapsed_time',\n      null, null, null, 15)) x;\n  --\n\n  dbms_sqltune.load_sqlset(\n\
  \    sqlset_name => 'test1',\n    populate_cursor => base_cur);\nEND;\n/\n```\n\n\
  在前面的代码行中，AWR 基线名称被传递给 `DBMS_SQLTUNE` 包。基线内的查询按 `elapsed_time`（耗时）进行选择，并指定了前 15 个。\n\
  \n### 步骤 4：使用调优集作为 `DBMS_SPM` 的输入，为 SQL 调优集中包含的每个查询创建计划基线\n\n现在，将调优集（步骤 3 填充）提供给\
  \ `DBMS_SPM` 包作为输入：\n\n```sql\nDECLARE\n  test_plan1 PLS_INTEGER;\nBEGIN\n  test_plan1\
  \ := dbms_spm.load_plans_from_sqlset(\n                  sqlset_name=>'test1');\n\
  END;\n/\n```\n\n调优集中包含的任何查询现在应该在 `DBA_SQL_PLAN_BASELINES` 视图中都有相应的条目。\n\n## 工作原理\n\
  \n“解决方案”部分展示的技术是一种非常强大的方法，用于为数据库中运行的最具资源消耗的查询创建计划基线。本方案的关键在于理解，您可以使用 SQL 调优集中包含的查询作为（`DBMS_SPM`\
  \ 包的）输入。SQL 调优集可以从在 AWR 和内存中发现的高资源消耗语句中填充。这使您可以轻松地为问题最严重的查询创建计划基线。\n\n为资源密集型查询设置计划基线有助于确保在您的系统（例如数据库升级、统计数据变化、数据集不同等）发生变化后，仍使用相同的执行计划。\n\
  \n请记住，一个计划基线中可能包含多个已接受的执行计划。如果您有一个希望优化器始终使用的特定计划，请考虑将该计划更改为 `FIXED`（固定）状态。有关将计划基线更改为\
  \ `FIXED` 状态的详细信息，请参见第 12-10 节。\n\n### 12-10. 修改计划基线\n\n### 问题\n\n您有一个查询的多个已接受计划基线执行计划。您希望明确指示优化器优先使用其中一个已接受的计划。\n\
  \n### 解决方案\n\n优化器将优先考虑状态为 `FIXED` 的计划基线。使用 `DBMS_SPM` 包和 `ALTER_SQL_PLAN_BASELINE`\
  \ 函数将当前计划基线执行计划更改为 `FIXED`。以下是一个示例：\n\n```sql\nDECLARE\n  pf PLS_INTEGER;\nBEGIN\n\
  \  pf := dbms_spm.alter_sql_plan_baseline(\n    plan_name => 'SQL_PLAN_1wskqhvrwf8g60e23be79'\n\
  \   ,attribute_name => 'fixed'\n   ,attribute_value => 'YES');\nEND;\n/\n```\n\n\
  您可以查询 `DBA_SQL_PLAN_BASELINES` 的 `FIXED` 列来验证它现在是否为基线固定状态。下面是一个这样的查询：\n\n```sql\n\
  SELECT\n  sql_handle, plan_name, enabled, accepted, fixed\nFROM dba_sql_plan_baselines;\n\
  ```\n\n以下是一些示例输出：\n\n```\nSQL_HANDLE           PLAN_NAME                      ENA\
  \ ACC FIX\n-------------------- ------------------------------ --- --- ---\nSQL_457bf2f82571bd38\
  \ SQL_PLAN_4ayzkz0kr3g9s90e466fd YES YES NO\nSQL_790bd425fe4a0125 SQL_PLAN_7k2yn4rz4n095d8a279cc\
  \ YES YES YES\n```\n\n### 工作原理\n\n您可以将固定计划基线视为一种建立优化器选择计划基线的优先级层次结构的方法。优化器将首先优先考虑任何已接受*且*固定的计划基线。如果没有可用的，则考虑已接受的非固定计划基线。添加到已包含固定计划基线的计划基线中的执行计划将被视为次要（除非您也将它们添加为固定计划）。\n\
  \n表 12-6 描述了 `ALTER_SQL_PLAN_BASELINE` 的可用参数。您可以指定 `SQL_HANDLE` 或 `PLAN_NAME` 或两者。如果\
  \ `SQL_HANDLE` 为 `NULL`，则必须指定 `PLAN_NAME`，反之亦然。\n\n![images](img/t1206.jpg)\n\n\
  `ATTRIBUTE_NAME` 和 `ATTRIBUTE_VALUE` 参数由可用于更改计划基线各种属性的名称/值对组成。有关可能配对的完整说明，请参见表 12-7。\n\
  \n![images](img/square.jpg) **提示** 使用 `ALTER_SQL_PLAN_BASELINE` 的 `ENABLED` 属性可以禁用或重新启用计划基线以供使用。\n\
  \n![images](img/t1207.jpg)\n\n### 12-11. 确定是否存在计划基线\n\n### 问题\n\n您最近为某个查询实施了计划基线。您想要验证计划基线的配置。\n\
  \n### 解决方案\n\n运行以下查询以查看有关已配置的任何计划基线的详细信息：\n\n```sql\nset pages 100\nset linesize\
  \ 132\ncol sql_handle form a20\ncol plan_name form a30\ncol sql_text form a20\n\
  col created form a20\n--\nSELECT sql_handle, plan_name, enabled\n,accepted, created,\
  \ optimizer_cost, sql_text\nFROM dba_sql_plan_baselines;\n```\n\n前面查询的输出非常宽，已被修改以适应页面宽度：\n\
  \n```\nSQL_HANDLE           PLAN_NAME                      ENA ACC\n--------------------\
  \ ------------------------------ --- ---\nSQL_b98d2ae2145eec3d SQL_PLAN_bm39aw8a5xv1xae72d2f5\
  \ YES YES\nCREATED              OPTIMIZER_COST SQL_TEXT\n-------------------- --------------\
  \ --------------------\n21-MAR-11 10.53.29.0              2 select last_name from\
  \ custs...\n```\n\n在输出中，有两个关键列：`SQL_HANDLE` 和 `PLAN_NAME`。每个查询都有一个关联的 `SQL_HANDLE`，它是查询的标识符。每个执行计划都有一个唯一的\
  \ `PLAN_NAME`。`PLAN_NAME` 在 `DBA_SQL_PLAN_BASELINES` 中是唯一的，而可能有多个行具有相同的 `SQL_HANDLE`（但具有不同的\
  \ `PLAN_NAME`）。\n\n\n\n### 12-12. 显示计划基线执行计划\n\n#### 工作原理\n\n`DBA_SQL_PLAN_BASELINES`\
  \ 视图提供了一种快速简便的方法，用于确定计划基线是否存在并正在使用。如果一个计划被启用并接受，则表明查询正在使用计划基线。\n\n![images](img/square.jpg)\
  \ **注意** 数据字典视图中没有 `ALL` 或 `USER` 级别的计划基线。这是因为计划基线与特定的 SQL 语句相关联，而不是与用户相关联。\n\n\
  如果您怀疑优化器是否正在考虑某个计划基线，请将 `AUTOTRACE` 设置为开，并查看输出，例如：\n\n```sql\nSQL> set autotrace\
  \ trace explain;\nSQL> select emp_id from emp where emp_id = 100;\n```\n\n以下是输出的一部分，表明此查询使用了\
  \ SQL 计划基线执行计划：\n\n```\nExecution Plan\n----------------------------------------------------------\n\
  Plan hash value: 2872589290\n--------------------------------------------------------------------------\n\
  ..................\n- SQL plan baseline \"SQL_PLAN_g6mrkapwrsjsmd8a279cc\" used\
  \ for this statement\n```\n\n#### 问题\n\n您希望快速查看有关现有计划基线的详细信息，例如相关的执行计划。\n\n####\
  \ 解决方案\n\n使用 `DBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE` 函数来显示执行计划和相应的计划基线详细信息。此示例报告特定计划的详细信息：\n\
  \n```sql\nSELECT *\nFROM TABLE(\nDBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE(plan_name=>'SQL_PLAN_bm39aw8a5xv1xae72d2f5'));\n\
  ```\n\n以下是一些示例输出：\n\n```\n--------------------------------------------------------------------------------\n\
  SQL handle: SQL_b98d2ae2145eec3d\nSQL text: select last_name from custs where last_name='DAVIS'\n\
  --------------------------------------------------------------------------------\n\
  --------------------------------------------------------------------------------\n\
  Plan name: SQL_PLAN_bm39aw8a5xv1xae72d2f5          Plan id: 2926760693\nEnabled:\
  \ YES     Fixed: NO      Accepted: YES     Origin: MANUAL-LOAD\n--------------------------------------------------------------------------------\n\
  Plan hash value: 1824334906\n---------------------------------------------------------------------------\n\
  | Id  | Operation         | Name  | Rows  | Bytes | Cost (%CPU)| Time     |\n---------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |       |     2 |    54 |     2   (0)| 00:00:01 |\n|*\
  \  1 |  TABLE ACCESS FULL| CUSTS |     2 |    54 |     2   (0)| 00:00:01 |\n---------------------------------------------------------------------------\n\
  ```\n\n#### 工作原理\n\n`DBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE` 函数允许您显示计划基线中的一个或多个执行计划。此函数的返回类型是\
  \ PL/SQL 表类型。此函数接受三个参数（在 表 12-8 中描述）。\n\n![images](img/t1208.jpg)\n\n如果要显示 SQL 语句的所有计划，请使用\
  \ `SQL_HANDLE` 参数作为输入，例如：\n\n```sql\nSELECT *\nFROM TABLE(\nDBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE(sql_handle=>'SQL_b98d2ae2145eec3d'));\n\
  ```\n\n以下是输出的一部分，显示此 SQL 查询的计划基线中有多个计划：\n\n```\n--------------------------------------------------------------------------------\n\
  Plan name: SQL_PLAN_bm39aw8a5xv1x519fc7bf          Plan id: 1369425855\nEnabled:\
  \ YES     Fixed: NO      Accepted: NO      Origin: AUTO-CAPTURE\n--------------------------------------------------------------------------------\n\
  Plan hash value: 16205770\n-------------------------------------------------------------------------------\n\
  | Id  | Operation        | Name       | Rows  | Bytes | Cost (%CPU)| Time     |\n\
  -------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT |            |     2 |    54 |     1   (0)| 00:00:01 |\n\
  |*  1 |  INDEX RANGE SCAN| CUSTS_IDX1 |     2 |    54 |     1   (0)| 00:00:01 |\n\
  -------------------------------------------------------------------------------\n\
  Predicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   1 - access(\"LAST_NAME\"='DAVIS')\n--------------------------------------------------------------------------------\n\
  Plan name: SQL_PLAN_bm39aw8a5xv1xae72d2f5          Plan id: 2926760693\nEnabled:\
  \ YES     Fixed: NO      Accepted: YES     Origin: MANUAL-LOAD\n--------------------------------------------------------------------------------\n\
  Plan hash value: 1824334906\n\n---------------------------------------------------------------------------\n\
  | Id  | Operation         | Name  | Rows  | Bytes | Cost (%CPU)| Time     |\n---------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |       |     2 |    54 |     2   (0)| 00:00:01 |\n|*\
  \  1 |  TABLE ACCESS FULL| CUSTS |     2 |    54 |     2   (0)| 00:00:01 |\n---------------------------------------------------------------------------\n\
  ```\n\n### 12-13. 向计划基线添加新计划（演进）\n\n#### 问题\n\n您有以下场景：\n\n*   您有一个查询的现有计划基线。\n*\
  \   您最近添加了一个查询可以使用的索引。\n*   优化器确定查询现在有一个新的低成本计划可用，并将新计划以未接受状态添加到计划历史中。\n*   您通过\
  \ SQL Tuning Advisor 的建议或查询 `DBA_SQL_PLAN_BASELINES` 视图注意到新计划。\n*   您已经检查了新的执行计划，在测试环境中运行了查询，并确信新计划将带来更好的性能。\n\
  \n您希望将历史记录中的低成本计划进行演进，使其成为基线中已接受的计划。您意识到，一旦计划在基线中被接受，优化器就会使用它（如果它是基线中成本最低的计划）。\n\
  \n\n### 解决方案\n\n首先验证相关查询是否存在未接受状态的执行计划（更多详情请参阅 配方 12-11 和 12-12）。以下是一个快速示例：\n\n\
  ```sql\nSELECT sql_handle, plan_name, enabled, accepted, optimizer_cost\nFROM dba_sql_plan_baselines\n\
  WHERE sql_text like '%select emp_id from emp where emp_id = 100%';\n```\n\n输出显示有两个计划，其中一个未被接受但成本低得多：\n\
  \n```\nSQL_HANDLE           PLAN_NAME                      ENA ACC OPTIMIZER_COST\n\
  -------------------- ------------------------------ --- --- --------------\nSQL_f34ef255797c4713\
  \ SQL_PLAN_g6mrkapwrsjsm01205c23 YES NO               1\nSQL_f34ef255797c4713 SQL_PLAN_g6mrkapwrsjsmd8a279cc\
  \ YES YES              7\n```\n\n使用 `DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE` 函数可以将计划从历史记录移动到基线中（即演进该计划）。在此示例中，使用\
  \ SQL 句柄（与 SQL 语句关联的唯一字符串）来演进计划：\n\n```sql\nSET SERVEROUT ON SIZE 1000000\nSET LONG\
  \ 100000\nDECLARE\n  rpt CLOB;\nBEGIN\n  rpt := DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE(\n\
  \    sql_handle => 'SQL_f34ef255797c4713');\n  DBMS_OUTPUT.PUT_LINE(rpt);\nEND;\n\
  /\n```\n\n如果 Oracle 确定存在一个成本更低的未接受计划，你将看到类似以下的输出，表明该计划已被移动到接受状态（已演进）：\n\n```\n-------------------------------------------------------------------------------\n\
  \                        Evolve SQL Plan Baseline\n                            \
  \  Report\n-------------------------------------------------------------------------------\n\
  \nInputs:\n-------\n  SQL_HANDLE = SQL_f34ef255797c4713\n  PLAN_NAME  =\n  TIME_LIMIT\
  \ = DBMS_SPM.AUTO_LIMIT\n  VERIFY     = YES\n  COMMIT     = YES\n\nPlan: SQL_PLAN_4fpttm0b55uwr918dd295\n\
  ------------------------------------\n  Plan was verified: Time used .09 seconds.\n\
  \  Plan passed performance criterion: 11.56 times better than baseline plan.\n \
  \ Plan was changed to an accepted plan.\n```\n\n你可以通过设置 `AUTOTRACE` 为 on 并运行查询来快速验证新的计划基线是否正在使用——例如：\n\
  \n```sql\nSQL> set autotrace trace explain;\nSQL> select emp_id from emp where emp_id\
  \ = 100;\n```\n\n以下是一个小片段输出，表明正在使用新的计划基线：\n\n```\nSQL plan baseline \"SQL_PLAN_g6mrkapwrsjsm01205c23\"\
  \ used for this statement\n```\n\n### 工作原理\n\nSQL 计划管理的一个关键特性是，当查询优化器生成一个新的低成本计划时，如果这个新计划的成本低于计划基线中已接受的计划，那么这个新低成本计划会自动被添加到该查询的计划历史中，处于未接受状态。\n\
  \n你可以选择接受这个新的低成本计划，这将使其作为已接受的计划移动到计划基线中。将未接受的执行计划从计划历史移动到计划基线（`ENABLED` 和 `ACCEPTED`）被称为\
  \ **演进计划基线**。\n\n为什么优化器会生成一个新计划？有多个因素会导致优化器创建一个与计划基线中现有计划不匹配的新执行计划：\n\n*   有新的统计信息可用。\n\
  *   为查询分配了新的 SQL 配置文件。\n*   索引被添加或删除。\n\n这为你提供了一种强大的技术，以便在有新计划可用时进行管理和使用。你可以使用 `DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE`\
  \ 函数以以下模式运行：\n\n*   指定要演进的计划名称。\n*   提供一个要演进的计划列表。\n*   不提供任何值运行，这意味着 Oracle 将演进计划基线存储库中所有未接受的计划。\n\
  \n表 12-9 描述了 `DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE` 函数中使用的参数。\n\n![images](img/t1209.jpg)\n\
  \n### 12-14. 禁用计划基线\n\n#### 问题\n\n你正在使用一个测试数据库，其中许多 SQL 语句有关联的计划基线。你想确定如果不禁用计划基线，性能差异会如何，因此希望临时禁用计划基线的使用。\n\
  \n#### 解决方案\n\n要禁用数据库中任何 SQL 计划基线的使用，请将 `OPTIMIZER_USE_SQL_PLAN_BASELINES` 初始化参数设置为\
  \ `FALSE`：\n\n```sql\nSQL> alter system set optimizer_use_sql_plan_baselines=false\
  \ scope=both;\n```\n\n前面的命令在 `SYSTEM` 级别禁用了计划基线的使用，并将该值记录在内存和服务器参数文件中。要重新启用计划基线的使用，请将该值设置回\
  \ `TRUE`。\n\n你也可以在会话级别设置 `OPTIMIZER_USE_SQL_PLAN_BASELINES`。这将为当前连接用户在其会话持续时间内禁用计划基线的使用：\n\
  \n```sql\nSQL> alter session set optimizer_use_sql_plan_baselines=false;\n```\n\n\
  #### 工作原理\n\n`OPTIMIZER_USE_SQL_PLAN_BASELINES` 的默认值是 `TRUE`，这意味着默认情况下，如果有计划基线可用，它们将被使用。启用时，优化器将为给定的\
  \ SQL 查询查找有效的计划基线执行计划，并选择成本最低的那个。这为你提供了一种快速简便的方法来在整个数据库或特定会话中禁用/启用计划基线。\n\n如果你想禁用一个特定的计划基线，那么将其状态改为\
  \ `DISABLED`：\n\n```sql\nDECLARE\n  pf PLS_INTEGER;\nBEGIN\n  pf := dbms_spm.alter_sql_plan_baseline(\n\
  \    plan_name => 'SQL_PLAN_4ayzkz0kr3g9s6afbe2b3'\n   ,attribute_name => 'ENABLED'\n\
  \   ,attribute_value => 'NO');\nEND;\n/\n```\n\n![images](img/square.jpg) **提示**\
  \ 有关如何更改计划基线的更多详细信息，请参见 配方 12-10。\n\n### 12-15. 移除计划基线信息\n\n#### 问题\n\n你有几个不再想使用的计划基线，因此希望移除它们。\n\
  \n#### 解决方案\n\n你可以删除单个计划基线。这将使用 `PLAN_NAME` 参数删除单个计划基线：\n\n```sql\nDECLARE\n  plan_name1\
  \ PLS_INTEGER;\nBEGIN\n  plan_name1 := DBMS_SPM.DROP_SQL_PLAN_BASELINE(\n      \
  \             plan_name => 'SQL_PLAN_bm39aw8a5xv1x519fc7bf');\nEND;\n/\n```\n\n\
  你也可以删除与某个 SQL 语句关联的所有计划。此示例使用 `SQL_HANDLE` 参数移除与某个 SQL 语句关联的所有计划：\n\n```sql\nDECLARE\n\
  \  sql_handle1 PLS_INTEGER;\nBEGIN\n  sql_handle1 := DBMS_SPM.DROP_SQL_PLAN_BASELINE(\n\
  \                   sql_handle => 'SQL_b98d2ae2145eec3d');\nEND;\n/\n```\n\n####\
  \ 工作原理\n\n你可能偶尔会因为以下原因想要移除 SQL 计划基线：\n\n*   你有旧的计划，因为对某个 SQL 语句来说更高效的计划（已演进）已可用而不再使用。\n\
  *   你有一些从未被接受的计划，现在想移除它们。\n*   你有为不再需要的测试环境创建的计划。\n\n如“解决方案”部分所示，你可以通过 `PLAN_NAME`\
  \ 参数移除特定的计划基线。这将移除一个特定的计划。如果一个 SQL 语句关联了多个计划，你可以通过 `SQL_HANDLE` 参数移除该 SQL 语句的所有计划基线。\n\
  \n如果你有一个数据库，想要清除所有计划，那么可以将调用 `DBMS_SPM.DROP_SQL_PLAN_BASELINE` 封装在 PL/SQL 块中，通过循环遍历在\
  \ `DBA_SQL_PLAN_BASELINES` 中找到的任何计划来删除所有计划：\n\n```sql\nSET SERVEROUT ON SIZE 1000000\n\
  DECLARE\n  sql_handle1 PLS_INTEGER;\n  CURSOR c1 IS\n    SELECT sql_handle\n   \
  \ FROM dba_sql_plan_baselines;\nBEGIN\n  FOR r1 IN c1 LOOP\n    sql_handle1 := DBMS_SPM.DROP_SQL_PLAN_BASELINE(sql_handle\
  \ => r1.sql_handle);\n    DBMS_OUTPUT.PUT_LINE('PB dropped for SH: ' || r1.sql_handle);\n\
  \  END LOOP;\nEND;\n/\n```\n\n### 12-16. 传输计划基线\n\n#### 问题\n\n你有一个测试环境，并希望确保测试系统中的所有计划基线都被移动到生产数据库。\n\
  \n### 解决方案\n\n按以下步骤传输计划基线：\n\n1.  使用 `DBMS_SPM` 软件包和 `CREATE_STGTAB_BASELINE` 过程创建一个表。\n\
  2.  使用 `DBMS_SPM.PACK_STGTAB_BASELINE` 函数向该表填充计划基线。\n3.  使用数据库链接或 Data Pump 将暂存表复制到目标数据库。\n\
  4.  使用 `DBMS_SPM.UNPACK_STGTAB_BASELINE` 函数导入计划基线信息。\n\n本示例首先使用 `DBMS_SPM` 软件包创建一个名为\
  \ `EXP_PB` 的表：\n```sql\nBEGIN\n  DBMS_SPM.CREATE_STGTAB_BASELINE(table_name => 'exp_pb');\n\
  END;\n/\n```\n\n![images](img/square.jpg) **注意** 你无法在 `SYS` 用户下创建暂存表。\n\n接下来，用数据库用户\
  \ `MV_MAINT` 创建的计划基线填充 `EXP_PB` 表：\n```sql\nDECLARE\n  pbs NUMBER;\nBEGIN\n  pbs\
  \ := DBMS_SPM.PACK_STGTAB_BASELINE(\n           table_name => 'exp_pb',\n      \
  \     enabled => 'yes',\n           creator => 'MV_MAINT');\nEND;\n/\n```\n\n前面的代码用某个用户创建的所有计划基线填充了该表。你也可以通过\
  \ `PLAN_NAME`、`SQL_HANDLE`、`SQL_TEXT` 或其他各种条件来填充该表。唯一必需的参数是要填充的表的名称。\n\n现在将暂存表复制到目标数据库。你可以使用数据库链接、Data\
  \ Pump 或旧的 `exp`/`imp` 实用程序来完成此操作。\n\n最后，在目标数据库上，使用 `DBMS_SPM.UNPACK_STGTAB_BASELINE`\
  \ 函数获取 `EXP_PB` 表的内容并创建计划基线：\n```sql\nDECLARE\n  pbs NUMBER;\nBEGIN\n  pbs := DBMS_SPM.UNPACK_STGTAB_BASELINE(\n\
  \           table_name => 'exp_pb',\n           enabled => 'yes');\nEND;\n/\n```\n\
  \n现在，你应该已将所有计划基线传输到了目标数据库。你可以查询 `DBA_SQL_PLAN_BASELINES` 来验证这一点。\n\n### 工作原理\n\n\
  创建一个表，用计划基线信息填充它，复制该表，然后将其内容导入目标数据库，这是一个相当简单的过程。如本方案“解决方案”部分的第 2 步所示，使用了 `PACK_STGTAB_BASELINE`\
  \ 函数（参见 表 12-10）。该函数在要导出的计划基线类型方面提供了相当大的灵活性。你可以将提取的计划基线限制为特定用户、或已启用的、或已接受的，等等。\n\
  \n同样，`DBMS_SPM.UNPACK_STGTAB_BASELINE` 函数在从暂存表提取并加载到目标数据库的计划基线类型方面也提供了极大的灵活性。`UNPACK_STGTAB_BASELINE`\
  \ 的输入参数与 `PACK_STGTAB_BASELINE` 使用的参数相同（在 表 12-10 中描述）。\n\n![images](img/t1210.jpg)\n\
  \n## 第 13 章\n\n## 配置优化器\n\n成本优化器为 SQL 语句确定最高效的执行计划。优化器在很大程度上依赖于你（或数据库）收集的统计信息。本章解释如何设置优化器目标以及如何控制优化器的行为。你将学习如何启用和禁用数据库的自动统计信息收集，以及何时手动收集统计信息。你将学习如何设置统计信息收集的首选项，以及如何在让优化器使用新统计信息之前对其进行验证。本章还解释了如何锁定统计信息、导出统计信息、收集系统统计信息、恢复旧版本的统计信息，以及如何处理缺失的统计信息。\n\
  \n绑定窥探行为（即优化器在解析 SQL 语句时查看绑定变量值）可能对执行计划产生不可预测的影响。本章解释了自适应游标共享，该功能旨在基于绑定变量的具体值来生成执行计划。\n\
  \n收集大表的统计信息始终是个问题，本章展示了如何使用增量统计信息收集功能来加速大型分区表的统计信息收集。你还将学习如何使用新的并发统计信息收集功能来优化大表的统计信息收集。\n\
  \n为表达式和列组收集扩展统计信息可以提高优化器性能，你将学习如何收集这些类型的统计信息。本章还解释了如何让数据库告诉你表中的哪些列是创建列组的候选列。\n\n\
  ### 13-1. 选择优化器目标\n\n#### 问题\n\n你想为数据库设置成本优化器目标。\n\n#### 解决方案\n\n你可以通过设置优化器目标来影响成本优化器的行为。优化器将根据你设置的目标收集相应的统计信息。你使用\
  \ `optimizer_mode` 初始化参数来设置优化器目标。你可以将该参数设置为 `ALL_ROWS` 或 `FIRST_ROWS_n`，如下所示：\n\
  ```sql\noptimizer_mode=all_rows\noptimizer_mode=first_rows_n          /* n 可以是 1,10,100\
  \ 或 1000 */\n```\n\n`optimizer_mode` 参数的默认值是 `ALL_ROWS`。\n\n#### 工作原理\n\n`optimizer_mode`\
  \ 参数的默认值 `ALL_ROWS` 的目标是最大化吞吐量——它最小化完成整个语句处理并获取所有请求行所需的资源使用。替代值 `FIRST_ROWS_n` 使用的目标是响应时间，即返回前\
  \ *n* 行所需的时间。\n\n如果你将 `optimizer_mode` 参数设置为 `FIRST_ROWS_n`，所有会话都将使用最佳响应时间的优化器目标。但是，你也可以仅在会话级别更改优化器目标，方法是执行如下\
  \ SQL 语句：\n```sql\nSQL> alter session set optimizer_mode=first_rows_1;\n```\n\n\
  请注意，`ALL_ROWS` 优化器模式设置偏向于全表扫描，因为其目标是最小化资源使用。另一方面，`FIRST_ROWS_n` 设置则倾向于索引访问，因为其目标是最小化响应时间，从而尽可能快地返回请求的行数。\n\
  \n除了 `optimizer_mode` 参数外，你还可以设置以下参数来影响优化器的行为：\n*   `optimizer_index_caching`\n\
  *   `optimizer_index_cost_adj`\n*   `db_file_multiblock_read_count`\n\n通常，在数据库级别更改这些参数可能会导致优化器行为出现意外情况，包括某些查询的性能可能恶化。推荐的做法是将这些参数保持在其默认级别。不过，我们确实展示了（方案\
  \ 13-11）如何在会话级别使用其中一个参数（`optimizer_index_cost_adj`）来提高长时间运行的查询的性能，方法是强制优化器使用索引。\n\
  \n### 13-2. 启用自动统计信息收集\n\n#### 问题\n\n你想在数据库中启用自动统计信息收集。\n\n![images](img/square.jpg)\
  \ **提示** Oracle 建议启用自动优化器统计信息收集。\n\n\n"
- "# 解决方案\n\n您可以通过使用 `DBMS_AUTO_TASK_ADMIN` 包中的 `enable` 过程来启用自动统计信息收集。可通过以下方式检查自动优化器统计信息收集任务的状态：\n\
  \n```sql\nSQL> select client_name,status from dba_autotask_client;\n\nCLIENT_NAME\
  \                                                          STATUS\n----------------------------------------------------------------\
  \ --------\nauto optimizer stats collection                                    \
  \ DISABLED\nauto space advisor                                                 \
  \ ENABLED\nsql tuning advisor                                                  ENABLED\n\
  SQL>\n```\n\n执行 `dbms_auto_task_admin.enable` 过程以启用自动统计信息收集任务：\n\n```sql\nSQL> begin\
  \ dbms_auto_task_admin.enable(\n  2  client_name=>'auto optimizer stats collection',\n\
  \  3  operation=>NULL,\n  4  window_name=>NULL);\n  5  end;\n  6  /\n\nPL/SQL procedure\
  \ successfully completed.\n```\n\n检查 `auto optimizer stats collection` 任务的状态：\n\n\
  ```sql\nSQL>  SELECT client_name,status from dba_autotask_client;\n\nCLIENT_NAME\
  \                                                          STATUS\n----------------------------------------------------------------\
  \ --------\nauto optimizer stats collection                                    \
  \ ENABLED\nauto space advisor                                                  ENABLED\n\
  sql tuning advisor                                                  ENABLED\n\n\
  SQL>\n```\n\n您可以使用 `dbms_auto_task_admin.disable` 过程来禁用统计信息收集任务：\n\n```sql\nSQL>\
  \ begin\n  2  dbms_auto_task_admin.disable(\n  3  client_name=> 'auto optimizer\
  \ stats collection',\n  4  operation=> NULL,\n  5  window_name=> NULL);\n  6  end;\n\
  \  7  /\n\nPL/SQL procedure successfully completed.\n\nSQL>\n```\n\n"
- '# 工作原理


  当您使用 DBCA 创建数据库时，自动优化器统计信息收集默认是启用的。如果您已禁用自动统计信息收集，可以通过执行“解决方案”部分所示的过程来重新启用它。一旦启用自动统计信息收集，数据库会在统计信息变得过时时收集它们——数据库根据对表和索引所做的更改来判断这一点。自动化统计信息收集消除了您自己收集统计信息所涉及的所有工作。


  当您启用自动优化器统计信息收集时，“auto optimizer stats collection”任务会调用 `DBMS_STATS.GATHER_DATABASE_STATS_JOB_PROC`
  过程。该过程与 `DBMS_STATS.GATHER_DATABASE_STATS` 过程几乎相同——最大的区别在于数据库仅在您指定的维护窗口内收集统计信息。如果您未指定维护窗口，数据库将使用默认的维护窗口，该窗口在每个晚上
  10 点至早上 6 点以及周末全天开放。“auto optimizer stats collection”作业首先为最需要新统计信息的对象收集统计信息。因此，自动统计信息收集作业将首先为没有任何统计信息的对象，或经历了大量修改（通常是大约
  10%的行）的对象收集统计信息。这样，如果统计信息收集作业在维护窗口结束前未能完成，数据库可以确保最过时的统计信息对应的对象一定会被刷新。


  您可以查询 `DBA_OPTSTAT_OPERATIONS` 视图以了解自动统计信息收集作业的开始和结束时间，如下所示：


  ```sql

  SQL> select operation,target,start_time,end_time from dba_optstat_operations

  2*   where operation=''gather_database_stats(auto)'';


  OPERATION                      START_TIME                       END_TIME

  ---------------------          ----------------------------     ----------------------------

  gather_database_stats          26-APR-11 10.00.02.970000 PM     26-APR-11 10.03.11.671000
  PM

  …

  SQL>

  ```


  ![提示](img/square.jpg) 提示：自动统计信息收集对于数据日常变化程度适中的 OLTP 数据库效果非常好，但对于大多数执行夜间 ETL 作业数据加载的数据仓库则不然。


  `DBA_TAB_MODIFICATIONS` 视图存储了关于表插入、删除和更新的信息。默认情况下，`GATHER_DATABASE_STATS` 过程的 `OPTIONS`
  参数被设置为 `GATHER AUTO`。这意味着一旦启用自动统计信息收集，数据库将为所有行受到 `insert`、`delete` 和 `update` 操作影响超过
  10%的表收集统计信息。


  数据库的自动统计信息收集对大多数 OLTP 数据库效果良好。然而，在数据仓库环境中，您可能会遇到问题，因为自动统计信息收集作业在夜间维护窗口运行。如果您的 ETL
  或 ELT 作业在自动作业已收集完某张表的统计信息之后才将数据加载到该表中，您最终可能得到该表不具代表性的统计信息。在数据仓库环境中，在加载过程完成后立即手动收集统计信息并禁用默认的自动统计信息收集作业是一个好主意。


  请注意，自动统计作业除了收集所有模式对象的统计信息外，还收集字典统计信息（针对 SYS 和 SYSTEM 模式）。


  '
- '# 问题


  您想要为 `DBMS_STATS` 过程使用的参数设置默认值，这些过程用于收集各种类型的统计信息。


  '
- "# 解决方案\n\n使用适当的 `DBMS_STATS.SET_*_PREFS` 过程来更改控制统计信息收集的参数的默认值。使用以下过程来更改在统计信息收集各个级别使用的参数的默认值：\n\
  \n*   `SET_TABLE_PREFS`：允许您为特定表指定 `DBMS_STATS.GATHER_*_STATS` 过程使用的默认参数\n*   `SET_SCHEMA_PREFS`：允许您更改用于特定模式中所有对象的\
  \ `DBMS_STATS.GATHER_*_STATS` 过程的默认参数\n*   `SET_DATABASE_PREFS`：允许您更改用于整个数据库（包括所有用户模式和系统模式如\
  \ SYS 和 SYSTEM）的 `DBMS_STATS.GATHER_*_STATS` 过程的默认参数\n*   `SET_GLOBAL_PREFS`：设置全局统计信息首选项；此过程允许您更改数据库中任何尚未在表级别设置首选项的对象的默认统计信息收集参数。如果您未设置表级首选项或未在\
  \ `DBMS_STATS.GATHER_*_STATS` 过程中显式设置任何参数，则参数将默认为其全局设置。\n\n以下示例展示了如何通过调用 `SET_DATABASE_PREFS`\
  \ 过程在数据库级别设置默认首选项：\n\n```sql\nSQL>  execute dbms_stats.set_database_prefs('ESTIMATE_PERCENT','20');\n\
  ```\n\n一旦您在数据库级别设置了某个参数的首选项，它将应用于数据库中的所有表。请注意，`SET_*_PREFS` 过程接受三个参数：\n\n*   `pname`\
  \ 指的是首选项的名称，例如前面示例中使用的 `ESTIMATE_PERCENT` 首选项。\n*   `pvalue` 允许您为首选项指定一个值。如果您为 `pvalue`\
  \ 参数指定 `NULL` 作为值，则首选项的值将被设置为 Oracle 默认值。\n*   `add_sys` 是一个可选参数，如果设置为 `TRUE`，则还将包括所有\
  \ Oracle 拥有的表在统计信息收集过程中。\n\n#### 工作原理\n\n所有 `DBMS_STATS.GATHER_*_STATS` 过程均使用参数的默认值。有两种方式可以为\
  \ `DBMS_STATS` 包中过程（例如 `GATHER_TABLE_STATS` 过程）的各个参数指定值。您可以在执行 `GATHER_TABLE_STATS`\
  \ 等过程来收集统计信息时指定偏好值。或者，您也可以使用适当的 `DBMS_STATS.SET_*_PREFS` 过程，在表、方案、数据库或全局级别更改偏好的默认值，如“解决方案”部分所示。如果您未为任何统计信息收集参数指定值，数据库将使用该参数的默认值。\n\
  \n您可以通过执行 `DBMS_STATS.GET_PREFS` 过程来查找任何偏好的默认值。以下示例展示了如何查找 `STALE_PERCENT` 参数的当前设置值：\n\
  \n```sql\nSQL> select dbms_stats.get_prefs ('STALE_PERCENT','SH') stale_percent\
  \ from dual;\n\nSTALE_PERCENT\n--------------------------------------------------------------------------------\n\
  \n10\n\nSQL>\n```\n\n您在表、方案或数据库级别收集统计信息时，需要指定类似的偏好。以下是您可以指定的各种偏好的描述，用于控制数据库收集统计信息的方式。\n\
  \n##### CASCADE\n\n此参数指定数据库是否应随表统计信息一起收集索引统计信息。默认情况下，数据库会自动为表的所有索引收集统计信息（`cascade=true`）。\n\
  \n##### DEGREE\n\n此参数指定数据库在收集统计信息时必须使用的并行度。Oracle 建议使用常量 `DBMS_STATS.AUTO_DEGREE`\
  \ 的默认设置。Oracle 会根据对象和与并行度相关的初始化参数选择正确的并行度。当您使用默认的 `DBMS_STATS.AUTO_DEGREE` 设置时，Oracle\
  \ 会根据对象的大小确定并行度。如果对象足够小，Oracle 会以串行方式收集统计信息；如果对象很大，Oracle 会根据 CPU 数量使用默认的并行度。请注意，默认并行度是\
  \ `NULL`，这意味着仅当您使用 `DEGREE` 子句在表级别设置了并行度，数据库才会使用并行方式收集统计信息。\n\n##### ESTIMATE_PERCENT\n\
  \n此参数指定数据库用于估算统计信息的行百分比。对于大表，估算是唯一能在合理时间内完成统计信息收集过程的方式——统计信息收集并非简单过程——它对资源密集型，且对大表消耗大量时间。您可以为\
  \ `estimate_percent` 参数设置 0 到 100 之间的值。一个经验法则是，表的数据越均匀，所需的样本量就越小。另一方面，如果表的数据高度倾斜，则应使用更大的样本量来捕获数据分布的差异。当然，将此参数设置为\
  \ 100 意味着数据库不进行估算——它将收集表中每一行的统计信息。通常，DBA 会将 `estimate_percent` 参数设置得过高，因为他们曾在设置小样本量时对某个表有过糟糕的体验。如果您认为数据分布均匀，即使\
  \ 1% 或 2% 的样本也能为您提供非常准确的统计信息，并节省大量时间和处理开销。\n\n![images](img/square.jpg) **提示** 在\
  \ Oracle Database 11g 中，通过将 `estimate_percent` 参数设置为 `DBMS_STATS.AUTO_SAMPLE_SIZE`\
  \ 计算的关键统计信息 NDV（不同值的数量），在统计学上与通过 100% 完整统计信息计算的 NDV 计数是相同的。最佳实践是从 `AUTO_SAMPLE_SIZE`\
  \ 开始，仅在必要时才设置您自己的样本大小。\n\n为 `estimate_percent` 参数选择最佳大小并不容易——如果设置得太高，收集统计信息会花费很长时间。如果设置得太低，您确实可以快速收集统计信息，但这些统计信息很可能不准确。默认情况下，数据库使用常量\
  \ `DBMS_STATS.AUTO_SAMPLE_SIZE` 来确定最佳样本大小。您可以通过以下方式为 `estimate_percent` 参数指定 `AUTO`\
  \ 值：\n\n```sql\nSQL> exec dbms_stats.gather_table_stats(NULL, 'MASSIVE_TABLE', estimate_percent=>\n\
  dbms_stats.auto_sample_size)\n```\n\n当您为 `estimate_percent` 参数设置 `AUTO` 值时，数据库不仅会自动确定采样大小，还会随着数据分布的变化调整样本大小。NDV\
  \ 是评估不同样本大小收集的统计信息准确性的一个好标准。列的 NDV 定义如下：\n\n`准确率 = 1 - (估算的 NDV - 实际的 NDV) / 实际的\
  \ NDV`\n\n准确率范围在 0% 到 100% 之间。100% 的样本大小总会给您 100% 的准确率——重要的是，在 Oracle 11g 中，自动采样提供的准确率非常接近\
  \ 100%，并且只占用为大表收集完整统计信息所需时间的一小部分。\n\n### METHOD_OPT\n\n`METHOD_OPT` 参数可以指定两件事：数据库将为其收集统计信息的列，以及数据库将在其上创建直方图的列。您还可以指定直方图中的桶数。您可以为此参数指定以下选项之一：\n\
  \n```\nFOR ALL [INDEXED  |  HIDDEN]  COLUMNS  [size_clause]\n```\n```\nFOR COLUMNS\
  \ [size_clause]  column  [size_clause]  [,COLUMN  [size_clause]…]\n```\n\n`FOR ALL`\
  \ 选项允许您指定数据库必须为所有列收集统计信息，或者仅为索引列收集。如果指定了 `INDEXED COLUMNS` 选项，数据库将只为那些有索引的列收集统计信息。请谨慎使用此选项，因为数据库不会收集表列的统计信息，而是使用基本的默认统计信息。在数据仓库环境中使用\
  \ `FOR ALL INDEXED COLUMNS` 可能尤其有问题，因为该环境中索引使用不多。\n\n`FOR COLUMNS` 选项允许您指定数据库必须在其中一列或多列上收集统计信息，而不是默认的在所有列上收集。在此上下文中指定\
  \ `column` 子句的方法如下：\n\n```\ncolumn:= column_name  |  extension name |  extension\n\
  ```\n\n`column_name` 子句指的是列的名称，`extension` 可以是列组（格式为 `column_name, column_name [,…]`）或表达式。\n\
  \n`FOR ALL` 和 `FOR COLUMNS` 选项的关键子句是 `size_clause`。`size_clause` 确定数据库是否应为某列收集直方图，以及在什么条件下收集。一个选项是提供一个整数值，指示您想要的直方图桶数——范围在\
  \ 1 到 254 之间——例如：\n\n```\nSQL> exec dbms_stats.gather_table_stats('HR','EMPLOYEES',method_opt=>\
  \ 'for columns size 254 job_id')\nPL/SQL procedure successfully completed.\nSQL>\n\
  ```\n\n执行此过程时，数据库会收集直方图，并且将有 254 个直方图桶。\n\n![images](img/square.jpg) `注意` `integer`\
  \ 子句的值为 1（例如，`'FOR ALL COLUMNS SIZE 1'`）实际上不会在列上创建任何直方图，因为所有数据都被放入一个桶中。此外，如果表上已经有直方图，将\
  \ `integer` 子句的值设置为 1 将删除这些直方图。\n\n> `size_clause` 的另一个选项是指定以下三个值之一：\n> \n> `REPEAT`：指定数据库必须仅在那些已为其收集了直方图的列上收集直方图；将值设置为\
  \ `repeat` 而不是整数值 1 可确保保留任何有用的直方图。\n> \n> `AUTO`：让数据库根据每列的数据分布（是均匀还是倾斜）和实际的列使用情况统计信息来决定应在其上收集直方图的列。\n\
  > \n> `SKEWONLY`：让数据库根据每列的数据分布来决定应在其上收集直方图的列。\n> \n> 以下示例指定了 `SKEWONLY`：\n\n```\n\
  SQL> exec dbms_stats.gather_table_stats('HR','EMPLOYEES',method_opt=> 'for all columns\
  \ size skewonly')\nPL/SQL procedure successfully completed.\nSQL>\n```\n\n当您指定 `SKEWONLY`\
  \ 时，数据库将查看每列的数据分布，以确定数据是否倾斜到足以证明创建直方图是合理的。\n\n`METHOD_OPT` 参数的默认值是 `FOR ALL COLUMNS\
  \ SIZE AUTO`。也就是说，数据库将为表中的所有列收集统计信息，并自动选择应为其创建直方图的列。\n\n### NO_INVALIDATE\n\n您可以为这个参数设置三个不同的值。值\
  \ `TRUE` 表示数据库不会使其正在收集统计信息的表的依赖游标失效。值 `FALSE` 表示数据库立即使依赖游标失效。最后，您可以将此参数设置为值 `DBMS_STATS.AUTO_INVALIDATE`，让\
  \ Oracle 决定使游标失效——这也是 `NO_INVALIDATE` 参数的默认值。\n\n### GRANULARITY\n\n此参数确定数据库如何处理分区表的统计信息收集。您可以为\
  \ `GRANULARITY` 参数指定以下各种选项：\n\n> `ALL`：收集子分区、分区和全局级别的统计信息；此设置提供了非常准确的表统计信息集，但资源消耗极大，完成时间比使用其他选项的统计信息收集作业长得多。\n\
  > \n> `GLOBAL`：仅收集表的全局统计信息。\n> \n> `PARTITION`：仅收集分区级别的统计信息——分区级别的统计信息在表级别汇总，在表级别可能不太准确。\n\
  > \n> `GLOBAL AND PARTITION`：收集全局和分区级别的统计信息，但不收集子分区级别的统计信息。\n> \n> `SUBPARTITION`：仅收集子分区统计信息。\n\
  > \n> `AUTO`：这是 `GRANULARITY` 参数的默认值，根据分区类型确定粒度。\n\n请注意，`ALL` 设置除了消耗大量资源外，完成时间可能也很长。对于复合分区表，收集子分区级别的统计信息通常并不真正必要。在大多数情况下，默认的\
  \ `AUTO` 设置效果很好。`ALL` 设置绝对是过度的，在大多数（可能所有）情况下都没有必要。\n\n### PUBLISH\n\n默认情况下，数据库在完成统计信息收集过程后立即发布所有统计信息。您可以通过将\
  \ `PUBLISH` 参数设置为 `FALSE` 来指定数据库将新收集的统计信息保留为待处理统计信息。\n\n### INCREMENTAL\n\n`INCREMENTAL`\
  \ 首选项确定数据库是否无需执行全表扫描即可维护分区表的统计信息。此参数的默认值为 `FALSE`，意味着数据库执行全表扫描来维护全局统计信息。配方 13-19\
  \ 详细讨论了增量统计信息收集。\n\n### STALE_PERCENT\n\n`STALE_PERCENT` 首选项确定表中必须更改的行的比例，然后数据库才认为该表的统计信息“过时”并开始收集新的统计信息。默认情况下，`STALE_PERCENT`\
  \ 参数设置为 10%。不要对完全没有更改或更改很少的表收集统计信息，因为您将收集不必要的统计信息。\n\n### AUTOSTATS_TARGET\n\n此首选项仅对自动统计信息收集有效，在使用\
  \ `SET_GLOBAL_STATS` 过程设置全局统计信息首选项时指定。您可以为此首选项设置以下值：\n\n> `ALL`：为数据库中的所有对象收集统计信息。\n\
  > \n> `ORACLE`：为所有 Oracle 拥有的对象收集统计信息。\n> \n> `AUTO`：数据库决定应为其收集统计信息的对象。\n> \n> `AUTOSTATS_TARGET`\
  \ 参数的默认值是 `AUTO`。请注意，目前 `ALL` 和 `AUTO`（默认）设置的工作方式相同。Oracle 建议您将 `AUTOSTATS_TARGET`\
  \ 首选项设置为值 `ORACLE`，以确保数据库收集最新的字典统计信息（针对 SYS 和 SYSTEM 拥有的对象）。\n\n我们在本配方中融入了多个 Oracle\
  \ 统计信息收集的最佳实践。除非有充分的理由不这样做，否则尽量坚持使用首选项的默认设置。请记住，如果您要创建新表，可以先加载数据并仅针对该表收集统计信息。然后再创建索引，因为数据库在索引创建时会自动计算索引的统计信息。\n\
  \n## 13-4. 手动生成统计信息\n\n#### 问题\n\n你需要判断是应该让数据库自动收集优化器统计信息，还是必须手动收集这些统计信息。\n\n####\
  \ 解决方案\n\n在大多数情况下，自动统计信息收集任务足以收集优化器统计信息。事实上，许多生产环境的数据库都如**配方 13-2**所示，实现了统计信息自动收集，并且从未使用手动统计信息收集流程。然而，在某些情况下，手动收集统计信息可能是必要的。以下是两种必须手动收集统计信息的场景。\n\
  \n##### 易变表\n\n如果你的数据库中包含在一天内经历大量删除（甚至截断）操作的**易变表**，那么在夜间维护窗口运行的自动统计信息收集作业可能就不够充分了。对于表数据在一天中持续波动的情况，你可以采用以下几种策略：\n\
  \n*   在表的行数处于其“典型”状态时收集统计信息。完成后，锁定这些统计信息，以防止自动统计信息收集作业在夜间维护窗口为该表收集新的统计信息。\n*   另一种选择是将表的统计信息设为\
  \ null。\n\n你可以先删除统计信息，然后立即锁定表的统计信息，从而将表的统计信息设为 null，如下例所示：\n\n```\nSQL> execute\
  \ dbms_stats.delete_table_stats('OE','ORDERS');\n\nPL/SQL procedure successfully\
  \ completed.\n\nSQL> execute dbms_stats.lock_table_stats('OE','ORDERS');\n\nPL/SQL\
  \ procedure successfully completed.\n\nSQL>\n```\n\n##### 批量加载表\n\n对于你进行批量数据加载的表，必须在加载数据后立即收集统计信息。如果你没有在批量加载数据后立即收集统计信息，数据库仍可以使用动态采样来估算统计信息，但这些统计信息不如你手动收集的统计信息全面。\n\
  \n#### 工作原理\n\n在 Oracle Database 10g 版本引入自动优化器统计信息收集功能之前，每位 DBA 都会使用推荐的 `DBMS_STATS`\
  \ 包（甚至更早的 `analyze table` 命令）来编写脚本收集统计信息。有了自动统计信息收集，DBA 就不必再通过调度 `DBMS_STATS` 作业来收集优化器统计信息了。然而，你仍然可能会遇到自动统计信息收集不合适的情况。“解决方案”部分描述了两种这样的情况，以及如何通过手动收集统计信息来处理它们。\n\
  \n你可以通过使用相应的 `DBMS_STATS.GATHER_*_STATS` 过程，在表、模式或数据库级别手动收集统计信息。\n\n当你手动收集优化器统计信息时，建议坚持使用控制数据库如何收集统计信息的各个参数的默认设置。通常，当恢复为默认设置时，统计信息收集作业的性能（速度）和统计信息本身的质量都会得到改善。例如，许多\
  \ DBA 通过 `estimate_percent` 参数设置了过高的采样比例，而不是让数据库基于 `DBMS_STATS.AUTO_SAMPLE_SIZE`\
  \ 常量使用适当的采样比例。\n\n### 13-5\\. 锁定统计信息\n\n#### 问题\n\n你想锁定表或模式的统计信息，以冻结这些统计信息。\n\n\
  #### 解决方案\n\n你可以通过执行相应的 `DBMS_STATS.LOCK_*` 过程来锁定表或模式的统计信息。例如，你可以使用 `DBMS_STATS`\
  \ 包中的 `LOCK_TABLE_STATS` 过程来锁定表的统计信息：\n\n```\nSQL> execute dbms_stats.lock_table_stats(ownname=>'SH',tabname=>'SALES');\n\
  \nPL/SQL procedure successfully completed.\nSQL>\n```\n\n你可以通过执行以下过程来解锁表的统计信息：\n\
  \n```\nSQL> execute dbms_stats.unlock_table_stats(ownname=>'SH',tabname=>'SALES');\n\
  \nPL/SQL procedure successfully completed.\n\nSQL>\n```\n\n你可以使用 `DBMS_STATS.LOCK_SCHEMA_STATS`\
  \ 过程来锁定模式的统计信息，如下所示：\n\n```\nSQL> execute dbms_stats.lock_schema_stats('SH');\n\n\
  PL/SQL procedure successfully completed.\nSQL>\n```\n\n使用 `UNLOCK_SCHEMA_STATS`\
  \ 过程解锁统计信息：\n\n```\nSQL> execute dbms_stats.unlock_schema_stats('SH');\n\nPL/SQL\
  \ procedure successfully completed.\n\nSQL>\n```\n\n#### 工作原理\n\n你可能希望锁定表的统计信息以冻结当前的统计信息集。你也可以先删除现有统计信息然后再锁定——在这种情况下，你是强制数据库使用动态采样来估算表的统计信息。删除表的统计信息然后锁定，在效果上等同于将表的统计信息设为\
  \ null。你可以选择在使用 `GATHER_TABLE__STATS` 过程时设置 `force` 参数来覆盖表对其统计信息的锁定。\n\n![images](img/square.jpg)\
  \ **注意** 锁定表也会锁定所有依赖于该表的统计信息，例如索引、直方图和列统计信息。\n\n### 13-6\\. 处理缺失统计信息\n\n#### 问题\n\
  \n数据库中的某些表缺失统计信息，因为这些表是在夜间批处理窗口之外加载数据的。你无法在白天数据库处理其他工作负载时收集这些表的统计信息。\n\n#### 解决方案\n\
  \nOracle 使用动态采样来弥补缺失的统计信息。当你启用动态采样时，数据库将扫描表中数据块的随机样本。你可以通过设置 `optimizer_dynamic_sampling`\
  \ 初始化参数在数据库中启用/禁用动态采样。默认情况下动态采样是启用的，如下所示：\n\n```\nSQL> sho parameter dynamic\n\n\
  NAME                                  TYPE        VALUE\n------------------------------------\
  \ ----------- -----\noptimizer_dynamic_sampling           integer     2\nSQL>\n\
  ```\n\n动态采样的默认级别是 2——将其设置为 0 将禁用动态采样。你可以通过设置不同的采样级别来修改默认值，如下所示：\n\n```\nSQL> alter\
  \ system set optimizer_dynamic_sampling=4 scope=both;\nSystem altered.\n\nSQL>\n\
  ```\n\n#### 工作原理\n\n理想情况下，您应该使用 `DBMS_STATS` 包（手动或通过自动统计信息收集）来收集优化器统计信息。在您没有机会为新创建或新加载的表收集统计信息的情况下，该表将不会有任何统计信息，直到数据库通过其自动统计信息收集作业自动生成统计信息，或者您安排了手动统计信息收集作业。即使您不收集任何统计信息，数据库也会使用一些基本统计信息（如表和索引块数）来估计查询中谓词的选择性。动态采样更进一步，通过在编译时动态收集额外的统计信息来增强这些基本统计信息。当处理涉及无统计信息表的频繁执行查询时，动态采样特别有帮助。\n\
  \n![images](img/square.jpg) **注意** Oracle 不对外部表执行动态采样。\n\n动态采样是有成本的，因为数据库在查询编译期间使用资源来收集统计信息。如果您不频繁执行这些查询，数据库每次执行涉及必须动态收集统计信息的表的查询时都会产生开销。为了使动态采样真正发挥作用，它必须帮助频繁执行的查询。\n\
  \n理解动态采样级别（范围从 0 到 10）的含义很重要。请注意，各采样级别使用的样本大小以数据块为单位，而不是行数。以下是对各种动态采样级别的简要描述。\n\n\
  > *级别 1*: 对没有统计信息的所有表使用动态采样，前提是查询中至少有一个没有统计信息的非分区表；该表还必须没有任何索引，并且必须大于 32 个块（这是此级别的样本大小）。\n\
  >\n> *级别 2*: 如果查询中至少有一个表没有统计信息，则使用动态采样；样本大小为 64 个块。\n>\n> *级别 3*: 如果查询满足级别 2 的标准，并且\
  \ `WHERE` 子句谓词中有一个或多个表达式，则使用动态采样；样本大小为 64 个块。\n>\n> *级别 4*: 如果查询满足所有级别 3 的标准，并且使用复杂谓词（例如多个谓词之间的\
  \ `OR/AND` 运算符），则使用动态采样；样本大小为 64 个块。\n>\n> *级别 5–9*: 如果语句满足级别 4 的标准，则使用动态采样；这些级别的区别仅在于样本大小，范围从\
  \ 128 到 4086 个块。\n>\n> *级别 10*: 最全面的级别——它对所有语句都使用动态采样，并且使用的样本并非真正的样本，因为它会检查所有数据块以获取统计信息。\n\
  \n动态采样是对 `DBMS_STATS` 包过程收集的统计信息的补充。Oracle 通常不期望您使用此功能，因为在生成执行计划期间收集优化器统计信息有额外开销。动态采样确实有助于获得更好的基数估计，但由于涉及的开销，它更适用于数据仓库或决策支持系统中的长运行查询，而不是\
  \ OLTP 数据库中的查询。您还必须记住，通过动态采样收集的统计信息与通过 `DBMS_STATS` 过程收集的统计信息绝不相同。动态采样仅收集基本的统计信息，例如数据块数量和列的最高/最低值。如果您必须设置动态采样级别，请使用\
  \ `alter session` 语句在会话级别进行设置，而不是在数据库范围内设置。\n\n### 13-7. 导出统计信息\n\n#### 问题\n\n您想要将一组统计信息从您的生产数据库导出到一个小得多的测试数据库。\n\
  \n#### 解决方案\n\n您可以使用 `DBMS_STATS.EXPORT_*_STATS` 过程将优化器统计信息从一个数据库导出到另一个数据库。这些过程允许您从源表、方案或数据库导出优化器统计信息。完成统计信息导出后，您必须执行一个\
  \ `DBMS_STATS.IMPORT_*_STATS` 过程，将统计信息导入不同的数据库。您可以在表、方案或数据库级别导出统计信息。以下是一个说明如何从表导出统计信息的示例。\n\
  \n1.  创建一个表来保存导出的统计信息：\n    ```sql\n    SQL> execute dbms_stats.create_stat_table(ownname=>'SH',stattab=>'mytab',\n\
  \                                             tblspace=>'USERS')\n\n    PL/SQL procedure\
  \ successfully completed.\n\n    SQL>\n    ```\n\n2.  使用 `DBMS_STATS.EXPORT_*STATS`\
  \ 过程将表 `SH.SALES` 的统计信息从数据字典导出到 `mytab` 表。\n    ```sql\n    SQL> exec dbms_stats.export_table_stats(ownname=>\
  \ 'SH',tabname=>'SALES',stattab=>\n    'mytab')\n\n    PL/SQL procedure successfully\
  \ completed.\n\n    SQL>\n    ```\n\n3.  在另一个数据库中，使用 `DBMS_STATS.IMPORT_*STATS`\
  \ 过程导入统计信息。\n    ```sql\n    SQL> exec dbms_stats.import_table_stats(ownname=>'SH',tabname=>'SALES',stattab=>\n\
  \    'MyTab',no_invalidate=>true);\n\n    PL/SQL procedure successfully completed.\n\
  \n    SQL>\n    ```\n\n#### 工作原理\n\n`EXPORT_TABLE_STATS` 过程从数据字典导出表的当前统计信息，并将它们存储在您创建的表中。请注意，此过程不会生成新的统计信息，数据库将继续使用该表（在我们的示例中是\
  \ `SH.SALES`）的当前统计信息。默认情况下，`cascade` 选项为 `true`，这意味着该过程将同时导出 `SH.SALES` 表中所有索引的统计信息以及列统计信息。\n\
  \n只有在将导出的统计信息导入到数据字典（在相同或不同的数据库中）后，才能使优化器使用这些统计信息。`IMPORT_TABLE_STATS` 过程将您之前导出的统计信息导入到数据字典中。将\
  \ `no_invalidate` 参数设置为 `true`（默认为 `false`）可确保任何依赖的游标不会失效。默认情况下，当统计信息被锁定时，您无法导入表的统计信息。您可以通过将\
  \ `force` 参数设置为 `true` 来覆盖此属性。如果您要将统计信息导入到与导出统计信息不同的数据库，则必须将存储统计信息的表导出到目标数据库。然后，您必须在执行\
  \ `IMPORT_TABLE_STATS` 过程之前将该表导入到目标数据库中。\n\n导出和导入统计信息是在测试系统中向优化器呈现与生产系统中相同的统计信息以确保执行计划一致的理想方法。当您想要保留一组已知良好的统计信息的时间超过“恢复统计信息”功能（在配方\
  \ 13-8 中解释）所允许的时间时，这也是一个很好的策略。导出和导入统计信息的功能使您可以在决定哪组参数最适合您的数据库之前，测试不同的统计信息集。\n\n\
  在此配方中，我们向您展示了如何导出和导入表级统计信息。`DBMS_STATS` 包还包含在列、索引、方案和数据库级别导出和导入统计信息的过程。此外，还有用于导出和导入字典统计信息、固定对象统计信息和系统统计信息的过程。\n\
  \n### 13-8. 恢复统计信息的先前版本\n\n#### 问题\n\n在收集新的统计信息后，某些查询的性能突然下降。您想看看是否可以使用一组您已知运行良好的旧统计信息。\n\
  \n\n\n#### 解决方案\n\n使用 `DBMS_STATS.RESTORE_STATS` 过程可以将优化器统计信息集恢复到旧版本。在恢复旧统计信息之前，请先检查可以回溯多久来恢复统计信息：\n\
  ```sql\nSQL> select dbms_stats.get_stats_history_availability from dual;\n\nGET_STATS_HISTORY_AVAILABILITY\n\
  ----------------------------------------------------------------------\n19-APR-11\
  \ 07.49.26.718000000 AM -04:00\n\nSQL>\n```\n此查询的输出显示，您可以将统计信息恢复到比所示时间戳（19-APR-11\
  \ 07.49.26.718000000 AM -04:00）更近的时间点。\n\n执行 `DBMS_STATS` 包中的 `RESTORE_*_STATS`\
  \ 过程可以将统计信息恢复到更早的时期。以下示例展示了如何在模式级别恢复统计信息。\n```sql\nSQL> exec dbms_stats.restore_schema_stats(ownname=>'SH',as_of_timestamp=>'19-MAY-11\
  \ 01.30.31.323000 PM -04:00',no_invalidate=>false)\n\nPL/SQL procedure successfully\
  \ completed.\n\nSQL>\n```\n\n#### 工作原理\n\n当数据库收集新的统计信息时，它不会丢弃前一组统计信息，而是保留旧版本一定天数。您可以通过执行\
  \ `DBMS_STATS.RESTORE_*_STATS` 过程来恢复旧统计信息，这些过程会用您指定时间的统计信息替换当前统计信息。当您希望优化器使用与访问旧统计信息集时相同的执行计划时，请恢复统计信息。默认情况下，数据库会管理历史统计信息的保留和清除。以下是找出数据库默认保留多少天统计信息的方法。\n\
  ```sql\nSQL> select dbms_stats.get_stats_history_retention from dual;\n\nGET_STATS_HISTORY_RETENTION\n\
  ---------------------------\n                          31\nSQL>\n```\n数据库会自动清除超过\
  \ 31 天前收集的统计信息（前提是存在更新的统计信息！）。您可以通过执行 `DBMS_STATS.PURGE_STATS` 过程手动清除所有旧版本的统计信息。您可以通过执行以下命令来更改数据库保留统计信息的天数：\n\
  ```sql\nSQL> exec dbms_stats.alter_stats_history_retention(retention=>60);\n\nPL/SQL\
  \ procedure successfully completed.\n\nSQL>\n```\n该命令指示数据库将历史统计信息保存 60 天。\n\n在“解决方案”部分展示的示例中，我们展示了如何为模式恢复统计信息。您可以类似地使用\
  \ `RESTORE_DATABASE_STATS` 过程为数据库恢复统计信息，或使用 `RESTORE_TABLE_STATS` 过程为表恢复统计信息。您还可以使用\
  \ `RESTORE_DICTIONARY_STATS` 过程恢复字典统计信息，使用 `RESTORE_SYSTEM_STATS` 过程恢复系统统计信息。\n\n\
  ### 13-9. 收集系统统计信息\n\n#### 问题\n\n您知道优化器在选择执行计划时会使用系统的 I/O 和 CPU 特性。您希望确保优化器正在使用准确的系统统计信息。\n\
  \n#### 解决方案\n\n您可以收集两种类型的系统统计信息来捕获系统的 I/O 和 CPU 特性。您可以收集*工作负载统计信息*或*非工作负载统计信息*，以使优化器能够更准确地估计真实的\
  \ I/O 和 CPU 成本，这对于查询优化至关重要。\n\n当数据库收集非工作负载统计信息时，它会模拟工作负载。以下是使用 `DBMS_STATS.GATHER_SYSTEM_STATS`\
  \ 过程收集非工作负载统计信息的方法：\n```sql\nSQL> execute dbms_stats.gather_system_stats()\n\nPL/SQL\
  \ procedure successfully completed.\n\nSQL>\n```\n您还可以在数据库处理典型工作负载时收集系统统计信息。这些系统统计信息称为工作负载统计信息，更能代表实际的系统\
  \ I/O 和 CPU 特性，并向优化器提供更准确的系统硬件状况。您可以通过执行带有 “start” 和 “stop” 选项的 `DBMS_STATS.GATHER_SYSTEM_STATS`\
  \ 过程来收集工作负载系统统计信息：\n```sql\nSQL> execute dbms_stats.gather_system_stats('start')\n\
  \nPL/SQL procedure successfully completed.\nSQL>\n```\n您可以在工作负载窗口开始前执行上述命令。工作负载窗口结束后，执行以下命令停止系统统计信息收集：\n\
  ```sql\nSQL> execute dbms_stats.gather_system_stats('stop')\n\nPL/SQL procedure\
  \ successfully completed.\n\nSQL>\n```\n您也可以使用 `interval` 参数执行 `GATHER_SYSTEM_STATS`\
  \ 过程，以指示数据库在您指定的时间段内收集工作负载系统统计信息，并在该时间段结束时自动停止统计信息收集过程。以下是一个示例：\n```sql\nSQL> execute\
  \ dbms_stats.gather_system_stats('interval',90);\nPL/SQL procedure successfully\
  \ completed.\nSQL>\n```\n上述命令收集 90 分钟的工作负载统计信息。\n\n一旦收集了非工作负载或工作负载系统统计信息，您可以在 `sys.aux_stats$`\
  \ 视图中查看为各种系统统计信息捕获的值，如下一节所示。\n\n![images](img/square.jpg) **提示** Oracle 强烈建议收集系统统计信息，以便为优化器提供更准确的\
  \ CPU 和 I/O 成本估算。\n\n\n\n\n## 工作原理\n\n准确的系统统计信息对于优化器评估可执行计划至关重要。正是通过估算各种系统性能特性（如\
  \ I/O 速度和 CPU 速度），优化器才能计算出全表扫描与索引读取等操作的成本。\n\n你可以通过收集系统统计信息，向优化器传递最多九个优化器系统统计信息。数据库在无负载模拟统计信息收集过程中收集前三个统计信息。在负载模式系统统计信息收集过程中，它会收集所有九个系统统计信息。以下是这九个系统统计信息的摘要：\n\
  \n> `cpuspeedNW`： 显示无负载 CPU 速度，以平均每秒 CPU 周期数为单位\n>\n> `ioseektim`： 寻道时间、延迟时间和操作系统开销时间的总和\n\
  >\n> `iotfrspeed`： 代表 I/O 传输速度，告诉优化器数据库在单次读取请求中读取数据的速度\n>\n> `cpuspeed`： 代表负载统计信息收集期间的\
  \ CPU 速度\n>\n> `maxthr`： 最大 I/O 吞吐量\n>\n> `slavethr`： 平行从属 I/O 平均吞吐量\n>\n> `sreadtim`：\
  \ 单块读取时间统计信息显示随机单块读取的平均时间。\n>\n> `mreadtim`： 多块读取时间统计信息显示顺序多块读取的平均时间（以秒为单位）。\n>\n\
  > `mbrc`： 多块读取计数统计信息显示以块为单位的平均多块读取计数。\n\n当你收集无负载系统统计信息时，数据库只捕获 `cpuspeedNW`、`ioseektim`\
  \ 和 `iotfrspeed` 系统统计信息。以下是一个查询，显示 Oracle 11g 数据库（Windows 系统上）中的默认系统统计信息。\n\n```\n\
  SQL> select pname, pval1 from sys.aux_stats$ where sname = 'SYSSTATS_MAIN';\n\n\
  PNAME                               PVAL1\n------------------------------ ----------\n\
  CPUSPEED\nCPUSPEEDNW                      1183.90219\nIOSEEKTIM                \
  \              10\nIOTFRSPEED                           4096\nMAXTHR\nMBRC\nMREADTIM\n\
  SLAVETHR\nSREADTIM\n\n9 rows selected.\n\nSQL>\n```\n\n数据库默认使用无负载系统统计信息，当你启动实例时，三个无负载统计信息—I/O\
  \ 传输速度（`IOTFRSPEED`）、I/O 寻道时间（`IOSEEKTIM`）和 CPU 速度（`CPUSPEEDNW`）—被初始化为默认值。一旦你如“解决方案”部分所示收集了无负载统计信息，这三个无负载系统统计信息中的部分或全部可能会改变。在我们的案例中，收集无负载统计信息后，`CPUSPEEDNW`\
  \ 的值变为 2039.06，`IOSEEKTIM` 统计信息的值变为 14.756。然而，`IOTFRSPEED` 统计信息的值保持 4096 不变。\n\n\
  如果你注意到即使手动收集了几次统计信息，`sys.aux_stats$` 视图仍然显示无负载统计信息的默认值，你可以使用 `DBMS_STATS.SET_SYSTEM_STATS`\
  \ 过程手动将统计信息值设置为你 I/O 或 CPU 系统的已知规格。你可以使用此过程为九个系统统计信息中的任何一个设置值。\n\n当你在负载模式下收集系统统计信息时，你会看到剩余六个系统统计信息中部分或全部的值。在我们的示例中，这些是通过运行负载模式下的\
  \ `GATHER_SYSTEM_STATS` 过程收集的系统统计信息。\n\n```\nSQL>  select pname, pval1 from sys.aux_stats$\
  \ where sname = 'SYSSTATS_MAIN';\n\nPNAME                               PVAL1\n\
  ------------------------------ ----------\nCPUSPEED                            \
  \ 2040\nCPUSPEEDNW                       2039.06\nIOSEEKTIM                    \
  \     14.756\nIOTFRSPEED                           4096\nMAXTHR\nMBRC          \
  \                         7\nMREADTIM                        46605.947\nSLAVETHR\n\
  SREADTIM                        51471.538\n\n9 rows selected.\n\nSQL>\n```\n\n如果在负载统计信息收集期间数据库执行了任何全表扫描，Oracle\
  \ 会使用 `mbrc` 和 `mreadtim` 统计信息的值来估算全表扫描的成本。如果没有这两个统计信息，数据库会使用 `db_file_multiblock_read_count`\
  \ 参数的值来估算全表扫描的成本。\n\n你可以通过执行 `DELETE_SYSTEM_STATS` 过程来删除所有系统统计信息：\n\n```\nSQL> execute\
  \ dbms_stats.delete_system_stats()\n\nPL/SQL procedure successfully completed.\n\
  \nSQL>\n```\n\n根据 Oracle 的说法，收集负载统计信息不会给你的系统带来额外的开销。但是，请确保指定特定的时间间隔或在短暂收集后停止统计信息收集，以避免潜在的开销。\n\
  \n### 13-10\\. 验证新统计信息\n\n#### 问题\n\n你正在收集新的统计信息，但在验证它们之前，不希望数据库自动使用这些统计信息。\n\n\
  #### 解决方案\n\n在这个例子中，我们将展示如何阻止数据库自动发布表的新统计信息。以下是必须遵循的步骤。\n\n1.  执行以下语句，阻止数据库自动发布为\
  \ `SH.SALES` 表收集的新统计信息。\n\n    ```\n    SQL> execute dbms_stats.set_table_prefs('SH','SALES','PUBLISH','false');\n\
  \n    PL/SQL procedure successfully completed.\n\n    SQL>\n    ```\n\n    该语句将\
  \ `SH.SALES` 表的 `PUBLISH` 参数首选项设置为 `false`（默认=`true`）。从现在开始，数据库不会自动发布为 `SH.SALES`\
  \ 表收集的统计信息。相反，它会将这些统计信息暂时搁置，等待你的批准。这些统计信息被称为待定统计信息，因为数据库尚未将其提供给优化器。\n\n2.  为 `SH.SALES`\
  \ 表收集新的统计信息：\n    ```\n    SQL> exec dbms_stats.gather_table_stats('sh','sales');\n\
  \n    PL/SQL procedure successfully completed.\n    SQL>\n    ```\n\n3.  告诉优化器使用新收集的待定统计信息，以便你可以用这些统计信息测试你的查询：\n\
  \    ```\n    SQL>  alter session set optimizer_use_pending_statistics=true;\n\n\
  \    Session altered.\n\n    SQL>\n    ```\n\n4.  通过针对 `SH.SALES` 表运行工作负载并检查性能和执行计划来进行测试。\n\
  5.  如果你对新（待定）统计信息集感到满意，通过执行以下语句使其公开：\n    ```\n    SQL> execute dbms_stats.publish_pending_stats('SH','SALES');\n\
  \n    PL/SQL procedure successfully completed.\n\n    SQL>\n    ```\n\n6.  如果你想删除新统计信息，请执行以下命令：\n\
  \    ```\n    SQL> exec dbms_stats.delete_pending_stats('SH','SALES');\n\n    PL/SQL\
  \ procedure successfully completed.\n\n    SQL>\n    ```\n\n\n\n\n### 13-10. 控制统计信息的发布\n\
  \n#### 工作原理\n\n默认情况下，数据库会立即开始使用收集到的所有统计信息。但是，您可以指定数据库不自动使用新收集的统计信息，直到您确认这些统计信息将改进或至少不会降低当前的执行计划。您可以通过将新统计信息保持在*待处理*状态来实现这一点。使统计信息对优化器可用，以便其在计算执行计划时能够使用它们，这被称为*发布*统计信息。数据库将已发布的统计信息存储在其数据字典中。如果您不确定一组新统计信息的效果，可以防止数据库自动发布统计信息，直到您先完成测试。当您将统计信息保持在待处理状态时，数据库不会将其存储在数据字典中——而是将其存储在一个私有区域中，并且只有在您将`optimizer_use_pending_statistics`参数设置为`true`时，才会使这些统计信息对优化器可用。\n\
  \n在指定数据库必须将新收集的统计信息保持在待处理状态后，您可以选择发布新统计信息或将其删除。使用`publish_pending_stats`过程发布统计信息，使用`delete_pending_stats`过程删除统计信息。如果您删除了某个对象的待处理统计信息，数据库将使用该对象的现有统计信息。\n\
  \n在此示例中，我们展示了如何更改表级别的统计信息`PUBLISH`设置。您也可以在模式级别执行此操作，但不能在数据库级别执行。如果在模式级别操作，则需要运行以下语句（模式名称为\
  \ SH）。\n\n```sql\nSQL> execute dbms_stats.set_schema_prefs('SH','PUBLISH','false');\n\
  SQL> execute dbms_stats.publish_pending_stats(null,null);\nSQL> execute dbms_stats.delete_pending_stats('SH');\n\
  ```\n\n### 13-11. 强制优化器使用索引\n\n#### 问题\n\n您知道在某个列上使用特定索引会加快查询速度，但优化器在其执行计划中并未使用该索引。您希望强制优化器使用该索引。\n\
  \n#### 解决方案\n\n当优化器没有使用索引时，您可以通过调整`optimizer_index_cost_adj`初始化参数来强制其使用。您可以在系统或会话级别设置此参数。以下示例展示了如何在会话级别设置此参数：\n\
  \n```sql\nSQL> alter session set optimizer_index_cost_adj=50;\n\nSession altered.\n\
  SQL>\n```\n\n`optimizer_index_cost_adj`参数的默认值为 100，您可以将该参数设置为介于 0 到 10000 之间的值。该参数的值越低，优化器使用索引的可能性就越大。\n\
  \n#### 工作原理\n\n`optimizer_index_cost_adj`参数允许您调整索引访问的成本。优化器对此参数使用默认值 100，这意味着它基于正常的成本模型来评估索引访问路径。根据优化器对执行索引读取成本的估计，它决定是否使用索引。这通常工作良好。然而，在某些情况下，即使使用索引能带来更好的执行计划，优化器也不会使用它，因为优化器对索引访问路径成本的估计可能不准确。由于优化器对`optimizer_index_cost_adj`参数使用默认值\
  \ 100，您可以通过将此参数设置为较小的值，使索引成本在优化器看来更低。任何小于 100 的值都会使索引使用（就索引读取的成本而言）在优化器看来更便宜。通常，当您这样做时，优化器就会开始使用您希望它使用的索引。在我们的示例中，我们将`optimizer_index_cost_adj`参数设置为\
  \ 50，使索引访问路径的成本看起来是其正常成本（100）的一半。您设置此参数的值越低，索引成本访问路径在优化器看来就越便宜，它就越倾向于选择索引访问路径而非全表扫描。\n\
  \n我们建议您仅针对特定查询在会话级别设置`optimizer_index_cost_adj`参数，因为如果在数据库级别设置，它有可能改变许多查询的执行计划。默认情况下，如果您设置了`ALL_ROWS`优化器目标，优化器会内置偏好全表扫描。通过将`optimizer_index_cost_adj`参数设置为小于\
  \ 100 的值，您就是在诱导优化器偏好索引扫描而非全表扫描。可以放心地使用`optimizer_index_cost_adj`参数，尤其是在 OLTP 环境中，您可以尝试将该参数设置为较低的值（例如\
  \ 5 或 10），以强制优化器使用索引。\n\n默认情况下，优化器假设与全表扫描相关的多块读取 I/O 成本和与索引读取相关的单块读取成本是相同的。然而，单块读取的成本可能低于多块读取。`optimizer_index_cost_adj`参数允许您更准确地调整与索引读取相关的单块读取成本，以反映索引读取相对于全表扫描的真实成本。默认值\
  \ 100 意味着单块读取是多块读取的 100%——因此它告诉优化器将索引读取的成本视为与多块 I/O 全表扫描的成本相同。当您将参数设置为 50 时，您是在告诉优化器单块\
  \ I/O（索引读取）的成本仅为多块 I/O 成本的一半。这会使优化器选择索引读取而非全表扫描。\n\n请注意，准确的系统统计信息（`mbrc`、`mreadtim`、`sreadtim`等）会影响索引与全表扫描的使用。理想情况下，您应该收集工作负载系统统计信息，而不要调整`optimizer_index_cost_adj`参数。您也可以计算单块读取和多块读取的相对成本，并基于这些计算来设置`optimizer_index_cost_adj`参数值。然而，最佳策略是简单地在会话级别针对特定语句使用该参数，而不是在数据库级别使用。只需尝试该参数的不同级别，直到优化器开始使用索引。\n\
  \n您也可以使用更“科学”的方法来确定`optimizer_index_cost_adj`参数的正确设置，即将其设置为反映单块和多块读取“真实”差异的值。您可以简单地比较`db\
  \ file sequential read`等待事件（代表单块 I/O）和`db file scattered read`等待事件（代表多块 I/O）的平均等待时间，从而得出`optimizer_index_cost_adj`参数的近似值。发出以下查询以查看两个等待事件的平均等待时间。\n\
  \n```sql\nSQL> select event, average_wait from v$system_event\n     where event\
  \ like 'db file s%read';\nEVENT                                                \
  \     AVERAGE_WAIT\n----------------------------------------------------------------\
  \ ------------\ndb file sequential read                                        \
  \      .91\ndb file scattered read                                             \
  \ 1.41\n\nSQL>\n```\n\n根据此查询的输出，单块顺序读取大约花费多块（分散）读取所需时间的 75%。这表明`optimizer_cost_index_adj`参数应设置为\
  \ 75 左右。然而，如前所述，不建议在数据库级别设置该参数——相反，应谨慎地在您希望强制使用索引的特定语句中使用此参数。\n\n### 13-12. 启用查询优化器功能\n\
  \n\n\n### 问题\n\n你升级了数据库，但你希望确保查询计划不会因新版本中的新优化器特性而发生变化。\n\n### 解决方案\n\n默认情况下，数据库会启用当前数据库版本的所有查询优化器特性。你可以通过设置\
  \ `optimizer_features_enable` 初始化参数来控制数据库中启用的优化器特性集。例如，如果你运行的是 Oracle 数据库 11g 第\
  \ 2 版，优化器特性将设置为 11.2 版本，如下所示：\n\n```sql\nSQL> show parameter optimizer_features_enable\n\
  \nNAME                                 TYPE        VALUE\n------------------------------------\
  \ ----------- ----------\noptimizer_features_enable            string      11.2.0.1\n\
  SQL>\n```\n\n你可以通过将 `optimizer_features_enable` 参数设置为与其默认值（与数据库版本相同）不同的值，将数据库的优化器特性设置为更早的版本。例如，在\
  \ 11.x 版本中，你可以这样做：\n\n```sql\nSQL> alter system set optimizer_features_enable='10.2.0.5';\n\
  \nSystem altered.\nSQL>\n```\n\n现在你可以检查该参数的当前值：\n\n```sql\nSQL> show  parameter\
  \ optimizer_features_enable\n\nNAME                                 TYPE       \
  \ VALUE\n------------------------------------ ----------- --------------\noptimizer_features_enable\
  \            string      10.2.0.5\nSQL>\n```\n\n你可以将 `optimizer_features_enable`\
  \ 参数设置为任何过去的主要版本或点版本，一直可以追溯到 Oracle 数据库 8.0 版本。\n\n### 工作原理\n\n将 `optimizer_features_enable`\
  \ 参数设置为前一个数据库版本的值，可以确保在升级数据库时，优化器的行为与升级前完全一致。这是数据库管理员常用的一种策略，以确保查询计划在升级后不会突然恶化。一旦你对新的优化器特性有了更深入的了解，你就可以将\
  \ `optimizer_features_enable` 参数的值设置为升级后数据库版本相同的值。\n\n当然，当你将 `optimizer_features_enable`\
  \ 参数设置为低于当前版本的值时，你将无法利用任何新的优化器特性——但你也不会因执行计划的突然变化而感到意外。优化器特性在不同版本之间不会发生剧烈变化，但这完全取决于数据库版本。例如，在\
  \ 11.1.0.6 版本中有六个主要的新优化器特性，在 10.2.0.2 版本中是没有的。这些特性包括增强的绑定变量窥探功能以及使用扩展统计信息来估算选择性的能力。不同的应用程序在引入新的优化器特性后会有不同的表现——这正是升级期间保留当前优化器特性集为你提供安全网的地方。你有机会在生产数据库中启用新特性之前，对它们进行全面测试并理解其影响。\n\
  \n“解决方案”部分中的示例展示了如何为整个数据库设置优化器特性级别。然而，你也可以仅在会话级别启用它（`alter session …`），以便在升级后测试执行计划的回退情况。你还可以通过提示（hint）指定版本号，从而使用特定版本的优化器特性来测试查询，如下所示（在一个\
  \ 11.2 版本的数据库中）：\n\n```sql\nSQL>  select /*+ optimizer_features_enable ('11.1.0.6')\
  \  */ sum(sales) from sales\n      order by product_id;\n```\n\n这个 `SELECT` 语句是在\
  \ 11.2 版本数据库中执行的，但使用了 11.1 版本的优化器特性。\n\n## 13-13. 防止数据库创建直方图\n\n### 问题\n\n你认为特定列上存在的直方图导致了次优的执行计划。你希望数据库不要在该列上使用任何直方图。\n\
  \n### 解决方案\n\n如果你想阻止 Oracle 使用它在列上自动收集的直方图，你需要做两件事：\n\n1.  通过执行 `DELETE_COLUMN_STATS`\
  \ 过程来删除直方图：\n    ```sql\n    SQL> begin\n      2  dbms_stats.delete_column_stats(ownname=>'SH',tabname=>'SALES',\n\
  \      3  colname=>'PROD_ID',col_stat_type=>'HISTOGRAM');\n      4  end;\n     \
  \ 5  /\n\n    PL/SQL procedure successfully completed.\n\n    SQL>\n    ```\n2.\
  \  删除直方图后，通过执行以下 `SET_TABLE_PREFS` 过程，告诉 Oracle 不要在 `PROD_ID` 列上创建直方图：\n    ```sql\n\
  \    SQL> begin\n      2  dbms_stats.set_table_prefs('SH','SALES','METHOD_OPT','FOR\
  \  ALL COLUMNS SIZE\n         AUTO,\n         FOR COLUMNS  SIZE 1 PROD_ID');\n \
  \     3  end;\n      4  /\n\n    PL/SQL procedure successfully completed.\n\n  \
  \  SQL>\n    ```\n\n#### 工作原理\n\n出于各种原因，数据库管理员有时会希望阻止优化器在列上使用直方图。如果列上已经存在直方图，你必须先将其移除，然后使用\
  \ `dbms_stats.set_table_prefs` 过程来阻止数据库在该列上创建直方图。在 Oracle 数据库 10g 版本中，你需要先删除直方图，冻结统计信息（使用\
  \ `lock_table_stats` 过程），然后手动收集表的统计信息，指定数据库不得为你删除了直方图的列收集统计信息。因为你锁定了统计信息，所以在执行 `dbms_stats.gather_table_stats`\
  \ 过程以手动收集表的统计信息时，还必须指定 `force=true` 选项。正如你所见，11g 版本中的 `dbms_stats.set_table_prefs`\
  \ 过程使事情变得简单多了。\n\n在“解决方案”部分所示的命令中，`FOR ALL COLUMNS SIZE AUTO` 选项告诉数据库在 Oracle 认为存在数据倾斜的任何列上创建直方图。然而，`FOR\
  \ COLUMNS SIZE 1 PROD_ID` 则告诉数据库不要在 `SH.SALES` 表的 `PROD_ID` 列上创建直方图。`SIZE` 列接受 1-254\
  \ 的值，你指定的整数表示直方图中的桶数。告诉数据库只使用一个桶（`N`=1）意味着所有数据都将位于一个桶中——即，数据库不会在该列上创建直方图。\n\n##\
  \ 13-14. 在未使用绑定变量时提高性能\n\n### 问题\n\n由于各种原因，你的开发人员没有在代码中指定绑定变量。你注意到由于未使用绑定变量，导致了严重的闩锁争用和糟糕的响应时间。你想在无法更改现有代码的情况下，改善数据库在这种情况下的性能。\n\
  \n### 解决方案\n\n如果你的应用程序不使用绑定变量，数据库中昂贵的硬解析将会增加。为避免这种情况，你需要将 `cursor_sharing` 初始化参数设置为非默认值。此参数的默认值为\
  \ `EXACT`。你可以将 `cursor_sharing` 参数设置为 `FORCE` 或 `SIMILAR`，以确定哪些 SQL 语句可以共享相同的游标。\n\
  \n以下是如何将 `cursor_sharing` 参数设置为 `force` 或 `similar`。\n\n```sql\nSQL> alter system\
  \ set cursor_sharing=force;\nSQL> alter system set cursor_sharing=similar;\n```\n\
  \n将 `cursor_sharing` 参数设置为非默认值会产生若干影响，下一节将对此进行解释。\n\n\n\n### 工作原理\n\n编写 SQL 代码的最佳实践是使用绑定变量，这样\
  \ SQL 语句才是可共享的。在解析阶段，优化器会将当前 SQL 语句的文本与存储在共享池中已有语句的文本进行比较。数据库仅当一条 SQL 语句在所有方面——包括每个字符、空格甚至大小写——都与另一条语句完全匹配时，才认为它们是\
  \ `完全相同` 的。当你将 `cursor_sharing` 参数保留为其默认值 `EXACT` 时，Oracle 在重新执行使用绑定变量的 SQL 语句时会重用共享\
  \ SQL 区域。无需对新语句进行硬解析，因为共享池中已经存在一个已解析的版本。这条新语句可以使用一个现有的游标（因此称为共享游标），而无需创建自己的父游标。\n\
  \n如果代码没有使用绑定变量，但数据库正在解析的新 SQL 语句与共享池中一条先前解析过的语句在所有方面都相同，则该语句被视为与之前的语句 `相似`。\n\n\
  默认情况下，数据库只在 SQL 语句完全相同时共享游标，而在相似时不共享。如果应用程序使用字面值而非绑定变量，数据库将执行大量的硬解析，在繁忙的系统中，这可能会给共享池和游标缓存带来巨大压力。你可以通过将\
  \ `cursor_sharing` 参数设置为 `FORCE` 或 `SIMILAR`，使得当新语句与已有解析语句相似（但不完全相同时），数据库也能共享游标。将\
  \ `cursor_sharing` 参数设置为 `FORCE` 或 `SIMILAR` 允许数据库用系统生成的绑定变量替换字面值。这样做的目标是减少共享池中的父游标数量。即使应用程序不使用绑定变量也能共享游标，可以通过减少游标缓存（位于共享池中）中的父游标数量来缓解共享池的压力。若将\
  \ `cursor_sharing` 参数保留为其默认值，当数据库解析的语句与共享池中已有语句不完全相同时，它将执行硬解析。然而，如果你将该参数设置为 `FORCE`\
  \ 或 `SIMILAR`，那么当在共享池中找到一个相似语句时，数据库将执行代价低得多的软解析。\n\n#### 何时将 CURSOR_SHARING 设置为非默认值\n\
  \n理想情况下，你应该将 `cursor_sharing` 参数保留为其默认值 `EXACT`。但是，如果你的响应时间因大量的库缓存未命中而受影响，并且 SQL\
  \ 语句没有使用绑定变量，那么可以考虑将 `cursor_sharing` 参数设置为 `FORCE` 或 `SIMILAR`。如果应用程序不使用绑定变量，你会束手无策——修复需要很长时间，与此同时，你将面对一个运行缓慢的数据库。在这种情况下，请立即更改\
  \ `cursor_sharing` 参数的默认设置。将 `cursor_sharing` 参数设置为非默认值实际上没有问题，只有一些微小的缺点，例如不支持星型转换等。\n\
  \n![images](img/square.jpg) 提示 Oracle 建议在 OLTP 环境中，将 `CURSOR_SHARING` 参数设置为 `FORCE`。\n\
  \nOracle 建议，如果可能，应将 `cursor_sharing` 参数保留为其默认值 `EXACT`，并通过在代码中使用绑定变量而非字面值来实现 SQL\
  \ 的可共享性。如果你确实因为共享池压力和门争用而决定将默认设置更改为 `SIMILAR` 或 `FORCE`，请注意这样做会带来一些性能影响。如果你将 `cursor_sharing`\
  \ 参数设置为 `FORCE`，数据库将使用系统生成的绑定值，对语句的每次执行使用相同的执行计划，并为每个不同的 SQL 语句使用一个父游标和一个子游标。如果你将该参数设置为\
  \ `SIMILAR`，并且数据库为其生成绑定值的列上没有直方图，那么其行为与 `FORCE` 设置相同。另一方面，如果有直方图，`SIMILAR` 设置将导致基于绑定变量值的不同执行计划，因此每次执行都会有不同的子游标。在没有直方图的情况下，在\
  \ `SIMILAR` 设置下，数据库的行为就像没有使用绑定变量一样。\n\n尽管 Oracle 历来建议将 `cursor_sharing` 参数设置为 `SIMILAR`，但在\
  \ Oracle Database 11g 中，除非你处于 DSS 环境，否则 Oracle 建议你将 `cursor_sharing` 参数设置为 `FORCE`，因为与将其设置为\
  \ `SIMILAR` 值相比，这能限制子游标的增长。\n\n\n\n"
- "# 将 CURSOR_SHARING 设置为非默认值的影响\n\n`FORCE` 和 `SIMILAR` 这两种设置都可以帮助你规避应用程序中未使用绑定变量的问题，方法是让数据库生成绑定值（即系统生成的绑定值，与用户指定的绑定值相对）。然而，你需要意识到，当将\
  \ `cursor_sharing` 参数设置为 `FORCE` 与设置为 `SIMILAR` 时，优化器的行为存在差异。这里关键要理解的是，查询性能与共享池中多次执行查询所占用的空间之间存在权衡。\n\
  \n以下是 `cursor_sharing` 参数设置为 `EXACT`、`FORCE` 和 `SIMILAR` 时的性能影响总结。我们假设存在以下包含字面量的查询：\n\
  \n`select * from employees where job = 'Clerk'`\n\n请注意，如果查询使用的是绑定变量而非字面量，其形式如下：\n\
  \n`select * from employees where job=:b`\n\n> `EXACT`：数据库不会替换任何字面量，优化器看到的查询就是其呈现给优化器的样子。优化器会根据语句中的字面量值，为每次语句执行生成不同的执行计划。因此，该计划将是最优的，但每个语句都有自己的父游标，因此执行次数多的语句可能会在共享池中占用大量空间。这可能导致闩锁争用和性能下降。\n\
  >\n> `FORCE`：无论是否存在直方图，优化器都会将字面量值替换为绑定值，并按以下形式优化此查询：\n>\n> `select * from employees\
  \ where job=:b`\n>\n> 无论字面量值如何，优化器对每个 SQL 语句都使用单一执行计划。因此，执行计划可能不是最优的，因为该计划是通用的，而非基于字面量值。如果查询使用了字面量，优化器会利用这些值来寻找最有效的执行计划。如果\
  \ SQL 语句中没有字面量，优化器很难确定最佳执行计划。通过“窥视”绑定变量的值，优化器可以更好地了解 `where` 子句条件的**选择性**——这几乎就像在\
  \ SQL 语句中使用了字面量一样。优化器在硬解析阶段窥视绑定值。由于执行计划是基于优化器碰巧窥视到的绑定变量特定值生成的，因此该计划可能对绑定变量的所有可能值并非都是最优的。\n\
  >\n> 在此示例中，优化器基于它看到的 `JOB` 列的特定值使用绑定窥视。这种情况下，优化器使用值 `Clerk` 来估算查询的基数。当执行相同语句时（`JOB`\
  \ 列使用不同值，比如 `Manager`），优化器将使用第一次生成（`JOB`=`Clerk` 时）的相同计划。由于只有一个父游标和仅为不同语句生成的子游标，对共享池的压力较小。请注意，子游标在共享池中占用的空间远少于父游标。通常，将\
  \ `cursor_sharing` 参数设置为 `FORCE` 能立即解决数据库中严重的闩锁争用，这是少数几个能帮助你快速减少闩锁争用的“灵丹妙药”之一。\n\
  >\n> `SIMILAR`（`JOB` 列上没有直方图）：数据库将使用字面量替换——它为 `JOB` 列的字面量值（`Clerk`）使用系统生成的绑定值。这是因为\
  \ `JOB` 列上缺少直方图告诉优化器该列的数据不是偏斜的，因此即使字面量值不同，优化器也会为语句的每次执行选择相同的计划。优化器认为不应为仅字面量值不同的语句更改执行计划，因为数据是均匀分布的。在查询列上没有直方图的情况下，`SIMILAR`\
  \ 设置提供的查询性能以及对共享池的影响与指定 `FORCE` 设置时相同。\n>\n> `SIMILAR`（`JOB` 列上有直方图）：当优化器看到 `JOB`\
  \ 列上的直方图时，它会意识到该列数据是偏斜的——这告诉优化器，查询结果可能因 `JOB` 列的字面量值不同而有很大差异。因此，优化器根据字面量值为每个语句生成不同的计划——因此计划非常高效，就像指定\
  \ `EXACT` 设置时一样。在有直方图的情况下使用 `SIMILAR` 选项确实会在共享池中使用更多空间，但不如使用 `EXACT` 设置时那么多。原因在于每个语句拥有自己的子游标，而不是父游标。\n\
  \n在 `cursor_sharing` 参数的各种设置之间做选择，实质上是评估什么对数据库性能更为关键：使用默认的 `EXACT` 设置或 `SIMILAR`（相关列上有直方图）确实能提供更好的查询性能，但会导致生成大量父游标（`EXACT`\
  \ 设置）或子游标（`SIMILAR` 设置）。如果共享池压力巨大，并伴随闩锁争用，整个数据库性能将变得很差。在这种情况下，你最好实施全系统解决方案，将 `cursor_sharing`\
  \ 参数设置为 `FORCE`，因为这能保证每个 SQL 语句只有一个子游标。如果你担心单个 SQL 语句的影响，只需删除该 SQL 语句所用相关列上的直方图，并将\
  \ `cursor_sharing` 参数设置为 `FORCE`——这将确保优化器为该列使用系统生成的绑定值，并确保该 SQL 语句在共享池中占用少得多的空间。正如你将在下一节看到的，如果你将\
  \ `cursor_sharing` 参数设置为 `FORCE` 并保留列上的直方图，Oracle Database 11g 的**自适应游标共享**提供了一个更好的解决方案。\n\
  \n## 13-15. 理解自适应游标共享\n\n### 问题\n\n你的数据库使用了用户定义的绑定变量。你想知道是否有任何方法可以优化数据库行为，使其不会对所有绑定变量值都“盲目地”使用相同的执行计划。\n\
  \n### 解决方案\n\n在之前的版本中，无论绑定变量的值如何，Oracle 对每次 SQL 语句的执行都使用单一执行计划。在 Oracle Database\
  \ 11g 中，名为 `自适应游标共享` 的数据库功能使带有绑定变量的 SQL 语句能够使用多个执行计划，每个执行计划基于绑定变量的值生成。自适应游标共享默认启用，且无法禁用它。\n\
  \n\n#### 自适应游标共享工作原理\n\n自适应游标共享功能旨在改进包含绑定变量的 SQL 查询的执行计划。要理解自适应游标共享如何提供帮助，首先需要理解\
  \ Oracle 的**绑定窥探**功能的工作原理。绑定窥探（在 Oracle 9i 中引入）允许优化器在数据库首次调用游标时窥探绑定变量的值。优化器使用这个“窥探到的值”来确定\
  \ `WHERE` 子句的选择性。\n\n使用用户定义绑定变量的问题在于，执行计划无法准确衡量 `WHERE` 子句的选择性。绑定窥探通过让优化器表现得像它实际在使用字面值而非绑定变量，从而帮助改善情况，进而为带有绑定变量的\
  \ SQL 语句生成更好的执行计划。当 `WHERE` 子句中的列值分布均匀时，绑定窥探效果良好。如果列值是倾斜的，优化器通过窥探用户定义的绑定变量值所选择的执行计划，可能并不一定对所有可能的绑定变量值都是最优的。因此，最终会导致一种情况：如果\
  \ SQL 语句使用的绑定变量值是优化器窥探到的那个值，执行计划会非常高效；而对于所有其他可能的绑定变量值，执行计划则效率低下。\n\n让我们通过一个涉及具有倾斜数据的列的示例，来学习自适应游标共享是如何工作的。\n\
  \n我们的测试表 `DEMO` 有 78,681 行数据。数据有三列，且都是倾斜的。因此，在收集此表的统计信息时，我们在这三列上创建了直方图，如下所示。\n\n\
  ```sql\nSQL> select column_name,table_name,histogram from user_TAB_COLUMNS\n  2\
  \      where table_name='DEMO';\n\nCOLUMN_NAME                     TABLE_NAME  \
  \                   HISTOGRAM\n------------------------------ ------------------------------\
  \ ---------------\nRNUM                            DEMO                        \
  \   HEIGHT BALANCED\nRNAME                           DEMO                      \
  \     HEIGHT BALANCED\nSTATUS                          DEMO                    \
  \       FREQUENCY\n```\n\n请注意，当优化器注意到表上有直方图时，它会将该列中的数据标记为倾斜。`STATUS` 列有两个值：`Coarse`\
  \ 和 `Fine`。只有 157 行的值是 `Coarse`，而 78,524 行的值是 `Fine`，这使得数据极度倾斜。\n\n让我们执行一系列操作来说明自适应游标共享是如何工作的。发出一个查询，绑定变量设置为值\
  \ `Coarse`。由于 `DEMO` 表中只有很少的行具有此值，我们期望数据库使用索引范围扫描，这正是优化器所做的。这是我们的查询及其执行过程：\n\n```sql\n\
  SQL> var b varchar2(6)\nSQL> exec :b:='Coarse';\n\nPL/SQL procedure successfully\
  \ completed.\n\nSQL> select /*+ ACS */ count(*) from demo where status = :b;\n \
  \ COUNT(*)\n----------\n       157\n\nSQL> select * from table(dbms_xplan.display_cursor);\n\
  \nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
  SQL_ID  cxau3vvabpzd0, child number 0\n-------------------------------------\nselect\
  \ /*+ ACS */ count(*) from demo where status = :b\n\nPlan hash value: 3478245284\n\
  --------------------------------------------------------------------------------\n\
  | Id  | Operation         | Name       | Rows  | Bytes | Cost (%CPU)| Time     |\n\
  --------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |            |       |       |     1 (100)|          |\n\
  |   1 |  SORT AGGREGATE   |            |     1 |     6 |            |          |\n\
  \nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
  |*  2 |   INDEX RANGE SCAN| IDX01_DEMO |   157 |   942 |     1   (0)| 00:00:52 |\n\
  --------------------------------------------------------------------------------\n\
  Predicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   2 - access(\"STATUS\"=:B)\n19 rows selected.\n```\n\n接下来，执行以下语句以检查数据库是否已将 `STATUS`\
  \ 列标记为**绑定敏感**或**绑定感知**，或两者兼有：\n\n```sql\nSQL> select child_number, executions,\
  \ buffer_gets, is_bind_sensitive as\n  2   \"BIND_SENSI\", is_bind_aware as \"BIND_AWARE\"\
  , is_shareable as \"BIND_SHARE\"\n  3   from v$SQL\n  4*  where sql_text like 'select\
  \ /*+ ACS */%'\nSQL> /\n\nCHILD_NUMBER EXECUTIONS BUFFER_GETS BIND_SENSI   BIND_AWARE\
  \  BIND_SHARE\n------------ ---------- ----------- -----------  ----------  -----------\n\
  \           0          1          43          Y            N            Y\n\nSQL>\n\
  ```\n\n请注意，数据库将 `STATUS` 列标记为绑定敏感，因为 `STATUS` 列上有直方图。每次使用不同的绑定变量值执行查询时，数据库都会将执行统计信息与先前执行的统计信息进行比较。如果执行统计信息差异显著，它会将该列标记为绑定感知。数据库在决定是否将语句标记为绑定感知时使用的输入之一是处理的行数。一旦游标被标记为绑定感知，优化器将根据绑定变量的值选择执行计划。这里，`IS_BIND_AWARE`\
  \ 列标记为 `N`，因为没有先前的执行统计信息可供比较。`BIND_SHAREABLE` 列标记为 `Y`。\n\n再次发出查询，绑定变量设置为值 `Fine`。由于几乎所有行的\
  \ `STATUS` 列值都是 `Fine`，我们期望优化器倾向于进行全表扫描。然而，优化器选择的执行计划与之前完全相同（`INDEX RANGE SCAN`）。原因是数据库正在使用与第一次执行相同的执行计划——例如：\n\
  \n```sql\nSQL> exec :b := 'Fine';\n\nPL/SQL procedure successfully completed.\n\n\
  SQL> select /*+ ACS */ count(*) from demo where status = :b;\n\n  COUNT(*)\n----------\n\
  \     78524\n\nSQL> select * from table(dbms_xplan.display_cursor);\n\nPLAN_TABLE_OUTPUT\n\
  --------------------------------------------------------------------------------\n\
  SQL_ID  cxau3vvabpzd0, child number 0\n-------------------------------------\nselect\
  \ /*+ ACS */ count(*) from demo where status = :b\n\nPlan hash value: 3478245284\n\
  --------------------------------------------------------------------------------\n\
  | Id  | Operation         | Name       | Rows  | Bytes | Cost (%CPU)| Time     |\n\
  --------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |            |       |       |     1 (100)|          |\n\
  |   1 |  SORT AGGREGATE   |            |     1 |     6 |            |          |\n\
  \nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
  |*  2 |   INDEX RANGE SCAN| IDX01_DEMO |   157 |   942 |     1   (0)| 00:00:52 |\n\
  \n--------------------------------------------------------------------------------\n\
  Predicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   2 - access(\"STATUS\"=:B)\n\n19 rows selected.\n```\n\n由于 SQL 语句的游标被标记为绑定敏感，优化器使用了与之前相同的执行计划（`INDEX\
  \ RANGE SCAN`）。在以下示例中请注意，`BIND_AWARE` 列仍然标记为 `N`。优化器正在使用与之前相同的游标（`child_number`\
  \ 0）。\n\n```sql\nSQL> select child_number, executions, buffer_gets, is_bind_sensitive\
  \ as\n  2   \"BIND_SENSI\", is_bind_aware as \"BIND_AWARE\", is_shareable as \"\
  BIND_SHARE\"\n  3   from v$sql\n  4   WHERE sql_text like 'select /*+ ACS */%';\n\
  \nCHILD_NUMBER EXECUTIONS BUFFER_GETS BIND_SENSI   BIND_AWARE  BIND_SHARE\n------------\
  \ ---------- ----------- -----------  ----------  -----------\n           0    \
  \      2         220           Y           N            Y\n\nSQL>\n```\n\n再次执行查询，使用的\
  \ `STATUS` 列值与上一次查询相同（'`Fine`'）。看！优化器现在使用了 `INDEX FAST FULL SCAN`，而不是 `INDEX RANGE\
  \ SCAN`。执行计划的更改是自动的——就好像优化器在不断学习，并在确信新计划更高效时修改计划。以下是执行过程和新的计划：\n\n```sql\nSQL> \
  \ exec :b := 'Fine';\nPL/SQL procedure successfully completed.\n\nSQL> select /*+\
  \ ACS */ count(*) from demo where status = :b;\n  COUNT(*)\n----------\n     78524\n\
  \nSQL> select * from table(dbms_xplan.display_cursor);\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
  SQL_ID  cxau3vvabpzd0, child number 1\n-------------------------------------\nselect\
  \ /*+ ACS */ count(*) from demo where status = :b\n\nPlan hash value: 2683512795\n\
  --------------------------------------------------------------------------------\n\
  | Id  | Operation             | Name       | Rows  | Bytes | Cost (%CPU)| Time \
  \  |\n\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT      |            |       |       |    45 (100)|      \
  \  |\n   |\n|   1 |  SORT AGGREGATE       |            |     1 |     6 |       \
  \     |        |\n   |\n|*  2 |   INDEX FAST FULL SCAN| IDX01_DEMO | 78524 |   460K|\
  \    45   (0)| 00:38:\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
  37 |\n--------------------------------------------------------------------------------\n\
  Predicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   2 - filter(\"STATUS\"=:B)\n19 rows selected.\n```\n\n请注意，`BIND_AWARE` 列现在显示值\
  \ `Y`。当我们第二次使用相同的绑定变量值（`Fine`）执行查询时，由于查询被标记为绑定敏感，数据库会评估上一次执行的执行统计信息。由于统计信息不同，它将游标标记为绑定感知。优化器随后决定新计划更优，因此执行硬解析并生成了一个使用\
  \ `INDEX FAST FULL SCAN` 而不是 `INDEX RANGE SCAN` 的新执行计划。以下查询显示了子游标的详细信息以及查询是绑定敏感还是绑定感知。\n\
  \n```sql\nSQL> select child_number, executions, buffer_gets, is_bind_sensitive as\n\
  \  2   \"BIND_SENSI\", is_bind_aware as \"BIND_AWARE\", is_shareable as \"BIND_SHARE\"\
  \n  3   from v$sql\n  4   WHERE sql_text like 'select /*+ ACS */%';\n\nCHILD_NUMBER\
  \ EXECUTIONS BUFFER_GETS BIND_SENSI   BIND_AWARE  BIND_SHARE\n------------ ----------\
  \ ----------- -----------  ----------  -----------\n           0          2    \
  \     220           Y           N            Y\n           1          1        \
  \ 184           Y           Y            Y\n\nSQL>\n```\n\n请注意，`IS_BIND_AWARE` 列现在显示值\
  \ `Y`。还要注意，出现了一个新的子游标（`child_number` 1），它代表包含 `INDEX FAST FULL SCAN` 的新执行计划——这个新游标被标记为绑定感知。\n\
  \n我们再次执行查询，但这次使用原始的绑定变量值 `Coarse`。优化器将通过执行 `INDEX RANGE SCAN` 来选择正确的执行计划。以下是有关子游标的信息，以及查询是绑定敏感还是绑定感知。\n\
  \n```sql\nSQL> select child_number, executions, buffer_gets, is_bind_sensitive as\n\
  \  2   \"BIND_SENSI\", is_bind_aware as \"BIND_AWARE\", is_shareable as \"BIND_SHARE\"\
  \n  3   from v$sql\n  4   where sql_text like 'select /*+ ACS */%';\n\nCHILD_NUMBER\
  \ EXECUTIONS BUFFER_GETS BIND_SENSI   BIND_AWARE  BIND_SHARE\n------------ ----------\
  \ ----------- -----------  ----------  -----------\n           0          2    \
  \     220           Y           N            N\n           1          1        \
  \ 184           Y           Y            Y\n           2          1           2\
  \           Y           Y            Y\n\nSQL>\n```\n\n数据库为此查询创建了一个新的子游标（`child_number`=2），并将原始游标（`child_cursor`=0）标记为非绑定感知。最终，数据库将从此游标从共享池中移除此游标。\n\
  \n在我们的示例中，我们在测试中仅使用了两个绑定变量值。如果有数十种不同的绑定变量值会怎样？Oracle 并非总是为每个不同的绑定变量值执行硬解析。最初它会对一些绑定变量值执行硬解析，在此过程中确定各种绑定变量与相关执行计划之间的关系。在建立了绑定变量值与相关执行计划的初始映射之后，Oracle\
  \ 足够智能，可以简单地从缓存中选择最优的子游标，而无需为其他绑定值执行硬解析。\n\n自适应游标共享是在 Oracle Database 11g 版本中引入的一项新功能。在更早的版本中，当\
  \ DBA 遇到数据库由于绑定窥探效应显然开始为某个 SQL 语句使用不合适的执行计划的情况时，常常会刷新共享池（更糟糕的是，有时会重启数据库）。在 11g 版本中，你无需做任何事情——优化器在遇到倾斜数据时会自动更改执行计划。借助自适应游标共享，数据库对使用绑定变量的语句使用多个执行计划，确保始终根据绑定变量的值使用最佳执行计划。自适应游标共享意味着当不同的绑定变量值表明查询需要处理的数据量不同时，Oracle\
  \ 会调整其行为，为查询使用不同的执行计划，而不是对所有绑定值坚持使用相同的计划。由于自适应游标共享仅在字面值被绑定替换的地方有效，Oracle 鼓励你对 `cursor_sharing`\
  \ 参数使用 `FORCE` 设置。如果将该参数设置为 `SIMILAR`，并且在列上有直方图，优化器不会用绑定变量执行字面替换，因此自适应游标共享不会发生。你必须将\
  \ `cursor_sharing` 参数设置为 `FORCE`，自适应游标共享才能工作，从而让优化器为不同的绑定变量值选择最优的执行计划。\n\n## 13-16.\
  \ 在表达式上创建统计信息\n\n### 问题\n\n你想在表达式（例如用户创建的函数）上创建统计信息。\n\n### 解法\n\n按以下方式执行 `DBMS_STATS`\
  \ 包中的 `GATHER_TABLE_STATS` 过程，以收集表达式上的统计信息。在此示例中，我们正在为 `lower` 函数收集统计信息，该函数转换 `cust_state_province`\
  \ 列。\n\n```sql\nSQL> execute dbms_stats.gather_table_stats('sh','customers',-\n\
  \   > method_opt =>'for all columns size skewonly -\n   > for columns(lower(cust_state_province))\
  \ size skewonly');\n\nPL/SQL 过程成功完成。\n\nSQL>\n```\n\n或者，你可以通过调用 `create_extended_stats`\
  \ 函数来收集表达式统计信息——例如：\n\n```sql\nSQL> select\n  2  dbms_stats.create_extended_stats(null,'customers','(lower(cust_state_province))')\n\
  \  3  from dual;\n```\n\n注意，`lower(cust_state_province)` 被称为一个*扩展*，因为对函数收集统计信息是\
  \ Oracle 扩展统计信息的一种类型。你为表达式和列组（参见配方 13-17）收集的任何统计信息都称为“扩展统计信息”。\n\n### 工作原理\n\n优化器了解表列的选择性，并使用选择性估计值来创建最优执行计划。然而，在查询的\
  \ `WHERE` 子句中对列应用函数会使优化器难以处理，因为它无法估计底层列的选择性。下面是一个使优化器工作更困难的函数示例：\n\n```sql\nSQL>\
  \ select count(*) from customers\n     where lower(cust_state_province) = 'CA';\n\
  ```\n\n函数上的表达式统计信息使优化器能够为涉及表达式的谓词获得更准确的选择性值。\n\n你可以发出以下查询以查找表列上表达式统计信息的详细信息：\n\n\
  ```sql\nSQL> select extension_name, extension\n     from user_stat_extensions\n\
  \     where table_name='CUSTOMERS';\n\nEXTENSION_NAME                          \
  \            EXTENSION\n--------------------------------------------------  ------------------------------\n\
  SYS_STUBPHJSBRKOIK9O2YV3W8HOUE                      (LOWER(\"CUST_STATE_PROVINCE\"\
  ))\nSQL>\n```\n\n你可以使用 `drop_extended_stats` 函数删除已在表上收集的表达式统计信息：\n\n```sql\nSQL>\
  \ exec dbms_stats.drop_extended_stats(null,'customers','(lower(cust_state_province))');\n\
  \nPL/SQL 过程成功完成。\n\nSQL>\n```\n\n注意，扩展统计信息既包括函数等表达式上的统计信息，也包括为由两个或多个相关列组成的列组收集的统计信息。配方\
  \ 13-17 展示了如何收集列组的统计信息。\n\n## 13-17. 为相关列创建统计信息\n\n### 问题\n\n你意识到作为连接条件一部分的表中的某些列是相关的。你希望让优化器知道这种关系。\n\
  \n### 解法\n\n为了为两个或多个相关列生成统计信息，你必须首先创建一个*列组*，然后为表收集新的统计信息，以便优化器可以使用新生成的“扩展统计信息”。使用\
  \ `DBMS_STATS.CREATE_EXTENDED_STATS` 函数来定义一个由表中两个或多个列组成的列组。以下是执行此函数以在表 `SH.CUSTOMERS`\
  \ 中创建包含 `COUNTRY_ID` 和 `CUST_STATE_PROVINCE` 列的列组的方法。\n\n```sql\nSQL> select dbms_stats.create_extended_stats(null,'CUSTOMERS',\
  \ '(country_id,cust_state_province)') from dual;\n\nDBMS_STATS.CREATE_EXTENDED_STATS(NULL,'CUSTOMERS','(COUNTRY_ID,CUST_STATE_PROVINCE)')\n\
  --------------------------------------------------------------------------------\n\
  SYS_STUJGVLRVH5USVDU$XNV4_IR#4\nSQL>\n```\n\n创建列组后，收集 `CUSTOMERS` 表的新统计信息，以为新列组生成统计信息。\n\
  \n```sql\nSQL> exec dbms_stats.gather_table_stats(null,'customers');\n\nPL/SQL 过程成功完成。\n\
  \nSQL>\n```\n\n### 工作原理\n\n通常，表中一列中的值会影响该表中另一列的值，这是由于存储在这两列中的数据之间存在的自然关系。例如，`SH.CUSTOMERS`\
  \ 表中的 `CUST_STATE_PROVINCE` 列的值受到 `COUNTRY_ID` 列值的影响。你只会在美国找到 `CUST_STATE_PROVINCE`\
  \ 值为 `Florida` 的记录。优化器不了解现实生活中的关系，因此当多个相关列出现在查询的 `WHERE` 子句或 `group_by` 键中时，往往会对至关重要的基数统计信息产生错误的估计。列组统计信息有助于优化器捕获表列之间的相关性。如果查询包含谓词\
  \ `CUST_STATE_PROVINCE ='Florida'` 和 `COUNTRY_ID=U.S.`，Oracle 可以通过查找列组的统计信息而不是使用两个列的单独统计信息，来推导出这两个谓词组合选择性的更好估计值。\n\
  \n数据库为你在创建的列组上收集的统计信息称为扩展统计信息。这些统计信息为优化器提供了更准确的基数估计，这有助于优化器生成更高效的执行计划。当你创建扩展统计信息时，Oracle\
  \ 会维护你创建的列组的统计信息子集，包括不同值的数量、空值以及组的直方图。即使查询包含除了列组中列之外的列，优化器也会利用可用的扩展统计信息。例如，假设你已如本配方所示，使用\
  \ `CUST_STATE_PROVINCE` 和 `COUNTRY_ID` 列创建了一个列组。如果查询的 `WHERE` 子句除了这两个列之外还包含 `CUST_CITY`\
  \ 列，Oracle 仍将利用 `CUST_STATE_PROVINCE` 和 `COUNTRY_ID` 列上的扩展统计信息。\n\n## 13-18. 自动创建列组\n\
  \n### 问题\n\n你知道通过在相关表列上生成统计信息来创建扩展统计信息有助于生成更好的执行计划。你想了解如何选择候选列组来创建扩展统计信息。\n\n\n\
  ### 13-18. 自动列组创建\n\n#### 解决方案\n\n在 Oracle Database 11.2.0.2 及更高版本中，您可以使用 *自动列组创建功能*，让数据库告诉您必须创建哪些列组。此功能仅用于创建列组，不能用于为包含表达式的列收集扩展统计信息（参见配方\
  \ 13-16）。\n\n要使用自动列组创建功能并让数据库提供建议，您必须让数据库监控其工作负载。首先执行 `DBMS_STATS.SEED_COL_USAGE`\
  \ 过程来确定需要创建的适当列组：\n\n```\nSQL> begin\n      dbms_stats.seed_col_usage(null,null,900);\n\
  \      end;\n      /\n```\n\n通过执行此过程，您告知数据库监控工作负载 15 分钟（900 秒），以确定是否需要创建任何列组。该过程捕获列使用信息并存储在\
  \ `sys.col_group_usage$` 视图中。\n\n接下来运行一些查询以创建工作负载。如果查询运行时间很长，您可以仅运行这些查询的执行计划，以便数据库捕获列组信息。监控期（15\
  \ 分钟）结束后，使用以下查询查看捕获的列使用信息：\n\n```\nSQL> select dbms_stats.report_col_usage(user,'customers')\
  \ from dual;\n```\n\n`REPORT_COL_USAGE` 过程显示 `CUSTOMERS` 表的列使用情况报告，基于您已执行的查询和运行的执行计划。列使用情况显示了数据库如何使用\
  \ `CUSTOMERS` 表的每一列，并以以下格式列出：\n\n*   `Equality predicates (EQ)`：如果某列用于等式谓词，例如在子句\
  \ `where COUNTRY_ID='US'` 中，则该列是独立使用的。在这种情况下不需要扩展统计信息。\n*   `FILTER`：如果一组列用于 `SELECT`\
  \ 语句，并且这些列中的一个或多个出现在该语句的 `GROUP BY` 子句中，则 `SELECT` 语句中的所有列都被记录为一个列组过滤器。\n*   `GROUP_BY`：在\
  \ `GROUP_BY` 子句中一起使用的所有列。\n\n查看列使用情况报告后，您可以允许 Oracle 自动为过滤器谓词中使用的列和 `GROUP_BY` 子句中使用的列创建列组。通过执行以下过程完成：\n\
  \n```\nSQL> select dbms_stats.create_extended_stats(user,'customers') from dual;\n\
  ```\n\n或者，您可以只为指定的列创建列组，通过发出以下命令：\n\n```\nSQL> select dbms_stats.create_extended_stats(null,'CUSTOMERS',\
  \ '(cust_city,cust_state_province,country_id)') from dual\nSQL> /\nSYS_STUMZ$C3AIHLPBROI#SKA58H_N\n\
  SQL>\n```\n\n此时，您已经创建了列组，但列组上没有统计信息。重新收集 `CUSTOMERS` 表的统计信息以为新列组生成统计信息——例如：\n\n\
  ```\nSQL> exec dbms_stats.gather_table_stats(user,'customers')\nPL/SQL procedure\
  \ successfully completed.\nSQL>\n```\n\n#### 工作原理\n\n让 Oracle 根据工作负载期间的实际列使用情况指出潜在的列组，比您尝试为每个表确定适当的列组要高效得多。一旦运行了工作负载，您可以查看列使用情况报告，并通过执行\
  \ `dbms_stats.create_extended_stats` 函数并将 `table_name` 参数的值传递为 `NULL`，来要求数据库同时为整个模式创建所有提议的列组。\n\
  \n### 13-19. 维护分区表上的统计信息\n\n#### 问题\n\n您频繁地向一个或多个分区加载数据，维护全局统计信息成了问题。您希望在不经历耗时耗资源的过程的情况下收集新的全局统计信息。\n\
  \n#### 解决方案\n\n您可以使用 Oracle 11g 版本中的 *增量统计信息维护* 功能，在每次加载新分区后维护全局统计信息。例如，如果您想维护 `SH.SALES`\
  \ 表的全局统计信息，请遵循以下步骤：\n\n1.  为 `SH.SALES` 表启用增量统计信息收集：\n    ```\n    SQL> exec dbms_stats.set_table_prefs('SH','SALES','INCREMENTAL','TRUE');\n\
  \    PL/SQL procedure successfully completed.\n    SQL>\n    ```\n2.  在向分区加载数据后，收集全局表级统计信息，如下所示：\n\
  \    ```\n    SQL> exec dbms_stats.gather_table_stats('SH','SALES');\n    PL/SQL\
  \ procedure successfully completed.\n    SQL>\n    ```\n\n要为分区表设置增量统计信息收集功能，必须为\
  \ `ESTIMATE_PERCENT` 参数指定 `AUTO_SAMPLE_SIZE` 值，并为 `GRANULARITY` 参数指定 `AUTO` 值。\n\
  \n\n\n"
- "# Oracle 数据库统计收集优化技术\n\n## 增量统计收集工作原理\n\n增量统计收集功能默认是禁用的。您可以通过设置 `INCREMENTAL` 首选项来启用该功能。在我们的示例中，展示了如何在表级别设置\
  \ `INCREMENTAL` 首选项，但您也可以在模式（schema）或数据库级别进行设置。\n\n在处理分区表时，优化器会同时使用全局统计信息（整个表的统计信息）和单个分区的统计信息来选择最优的执行计划。默认情况下，当分区的数据发生变化后，数据库会使用一种两阶段扫描技术来维护准确的表统计信息。在这种两阶段技术下，数据库将执行以下操作：\n\
  \n*   在第一阶段，扫描整个表以收集全局统计信息。\n*   在第二阶段，扫描发生变更的分区，以收集分区统计信息。\n\n例如，当您作为夜间批处理作业的一部分向分区加载（或从中删除）数据时，数据库将扫描该分区以收集分区级别的统计信息。此外，它还会扫描整个表以收集表级别的全局统计信息。数据库不仅扫描发生变更的分区，还会扫描表中的所有其他分区。可以看出，每次分区数据变更都进行全表扫描是一个开销很大的过程，尤其是在处理超大型表时。\n\
  \n一旦您开启了增量统计收集功能，Oracle 将采用一种高效得多的技术来维护分区表的统计信息。当分区的数据发生变化时，数据库仅收集该分区的统计信息，并在不扫描任何其他分区的情况下推导出全局表统计信息。数据库是如何在不扫描全表的情况下维护全局统计信息的呢？Oracle\
  \ 可以从分区级统计信息推导出一些全局统计信息——例如，通过将每个分区中的行数相加来推导出行总数。对于推导不同值的数量（NDV），Oracle 使用一种称为“概要”（synopsis）的结构，它类似于列中\
  \ NDV 的样本。Oracle 通过合并所有分区概要来推导全局 NDV。总之，当您实施增量统计收集时，Oracle 会跳过默认的全表扫描来收集表统计信息，而是执行以下操作：\n\
  \n1.  收集您加载数据的分区的统计信息，并为该分区创建概要。\n2.  通过合并所有分区级别的概要来创建一个全局概要。\n3.  基于分区级别的统计信息和全局概要计算全局统计信息。\n\
  \n增量统计收集效率极高，尤其是在处理大型分区表时，特别是当您频繁向一个或多个空分区加载数据时（这在许多数据仓库中是常见情况），您必须考虑使用此功能。\n\n\
  ## 大表的并发统计收集\n\n### 问题\n\n您希望利用多处理器环境来最小化收集统计信息所需的时间。\n\n### 解决方案\n\n在 Oracle Database\
  \ 11g Release 2 (11.2.0.2) 中，您可以指定 *并发统计信息收集模式*，以便同时收集多个表以及一个表内的多个分区（和子分区）的统计信息。通过这样做，您可以充分利用多处理器环境，更快地完成统计信息收集过程。\n\
  \n默认情况下，并发统计收集是禁用的。您可以通过执行 `SET_GLOBAL_PREFS` 过程来启用它。请按照以下步骤启用并发统计收集。\n\n1.  将 `job_queue_processes`\
  \ 参数至少设置为 4。\n    ```\n    SQL> alter system set job_queue_processes=4;\n    ```\n\
  \    如果您不打算使用并行执行来收集统计信息（请参见下一节），但希望充分利用系统资源，则必须将 `job_queue_processes` 参数设置为服务器\
  \ CPU 核心数的两倍。\n\n2.  启用并发统计收集。\n    ```\n    SQL> begin\n         dbms_stats.set_global_prefs('CONCURRENT','TRUE');\n\
  \       end;\n       /\n    ```\n请确保执行此命令的用户具有 `CREATE JOB`、`MANAGE SCHEDULER` 和\
  \ `MANAGE ANY QUEUE` 权限。\n\n\n## 工作原理\n\n并发统计信息收集的目标是缩短大表和分区的统计信息收集时间。启用并发统计信息收集后，Oracle\
  \ 会利用数据库的作业调度器和高级队列功能创建多个并发统计信息收集作业。参数 `job_queue_processes` 决定了并发统计信息收集作业的最大数量。在\
  \ RAC 环境中，您必须在每个节点上设置此参数。并发统计信息收集的工作方式在某种程度上取决于统计信息收集的级别（是否在表级别），如下所述。\n\n如果您执行\
  \ `DBMS_STATS.GATHER_TABLE_STATS` 过程来收集分区表的统计信息，Oracle 将为表中的每个分区（和子分区）创建一个单独的统计信息收集作业。调度器会根据系统容量来决定并发运行的作业数量以及需要排队的作业数量。\n\
  \n![images](img/square.jpg) 注意：`job_queue_processes` 参数的值决定了并发统计信息收集作业的最大数量。\n\n\
  如果您执行 `GATHER_DATABASE_STATS`、`GATHER_SCHEMA_STATS` 或 `GATHER_DICTIONARY_STATS`\
  \ 过程，Oracle 会为每个表以及分区表中的每个分区创建一个单独的统计信息收集作业。为了防止潜在的死锁问题，Oracle 不会同时处理多个分区表。Oracle\
  \ 会为每个分区表创建一个协调器作业，以管理该分区的统计信息收集作业。每个作业要么是一个表分区级作业的协调器（如果该表是分区表），要么是一个实际的统计信息收集作业。如果您有多个分区表，数据库会将除一个以外的所有分区表放入队列；在完成对一个分区表的统计信息收集后，它会将另一个分区表的作业出队并启动。这种队列行为不适用于非分区表。\n\
  \n### 使用并行执行策略\n\n如果您正在为极大的表收集统计信息，可以启用各个统计信息收集作业的并行执行。为此，您必须禁用 `parallel_adaptive_multi_user`\
  \ 初始化参数，如下所示：\n\n```\nSQL> alter system set parallel_adaptive_multi_user=false;\n\
  ```\n\n虽然不是必需的，Oracle 还建议您通过激活资源管理器、创建一个临时资源计划，并为消费者组 `OTHER_GROUPS` 启用队列来启用并行语句排队。以下是一个简单的示例，展示了如何创建临时资源计划并启用资源管理器：\n\
  \n```\nbegin\n  dbms_resource_manager.create_pending_area();\n  dbms_resource_manager.create_plan('parallel_test',\
  \ 'parallel_test');\n  dbms_resource_manager.create_plan_directive(\n        'parallel_test',\n\
  \        'OTHER_GROUPS',\n        'OTHER_GROUPS directive for parallel test',\n\
  \        parallel_target_percentage => 90);\n  dbms_resource_manager.submit_pending_area();\n\
  end;\n/\nALTER SYSTEM SET RESOURCE_MANAGER_PLAN = 'parallel_test' SID='*';\n```\n\
  \n### 监控并发统计信息收集作业\n\n使用 `DBA_SCHEDULER_JOBS` 视图来监控并发统计信息收集作业。您可以通过执行以下语句查看数据库中的所有并发统计信息收集作业：\n\
  \n```\nSQL> select job_name,state,comments\n     from dba_scheduler_jobs\n     where\
  \ job_class like 'CONC%';\n```\n\n如果您想将输出限制为当前正在执行的作业，请在上述查询中添加 \"`and state='RUNNING'`\"\
  \ 这一行。类似地，您可以添加 \"`and state='SCHEDULED'`\" 来仅查看正在等待运行的已计划作业。您可以通过执行以下查询来检查当前正在执行的统计信息收集作业的已用时间：\n\
  \n```\nSQL> select job_name,elapsed_time\n     from dba_scheduler_running_jobs\n\
  \     where job_name like 'ST$%';\n```\n\n"
- '# 第 14 章 实现查询提示


  在 SQL 中放置提示是提高性能的一种常见且简单的方法。提示会影响 Oracle 优化器，使其采取特定的路径来完成给定任务，从而覆盖优化器可能选择的默认路径。提示也可以被视为一把双刃剑。如果实施和维护不当，从长远来看它们可能会损害性能。


  使用提示最常见的原因只是为了更快地从数据库中获取数据，许多可用的提示也是为此目的而设计的。Oracle 数据库支持超过 60 个提示，因此很明显，提示可以因多种原因被放置在
  SQL 中。本章的目的是将这些提示分类为不同的子集，然后展示一些流行且对性能影响最大的提示的具体示例。


  在 SQL 中放置提示的一些原因包括：更改数据库的访问路径、更改执行连接操作的查询的连接顺序或连接类型、用于 DML 的提示、以及用于数据仓库特定操作的提示，等等。此外，还有
  Oracle 11g 的新提示，以利用 Oracle 11g 的一些新特性。


  ## 14-1. 编写提示


  ### 问题


  您希望将一个提示放入 SQL 语句中。


  ### 解决方案


  使用 `/*+ hint */` 语法将您的提示放入语句中——例如：


  ```

  SELECT /*+ full(emp) */ * FROM emp;

  ```


  请确保在加号后面留一个空格。`/*+` 序列正好是三个字符长，没有空格。通常，您希望将提示紧跟在开始 SQL 语句的动词之后。虽然不要求将此字符序列放在 SQL
  动词之后，但这是惯例。


  ### 工作原理


  提示由放置在 SQL 语句中的特殊字符界定。每个提示以正斜杠开始，后跟星号和加号字符。它们以星号和正斜杠结束：


  ```

  SELECT /*+ full(emp) */ * FROM emp;

  ```


  表 14-1 将许多最流行的提示分解为特定类别。此表旨在使您能够根据特定需求更容易地找到合适的提示，因此请记住，其中一些提示实际上可以属于多个类别。关于提示要记住的另一点是，对于许多提示，您可以启用某个特定特性或方面，也可以禁用该特性或方面。例如，有一个
  `INDEX` 提示用于启用索引的使用。还有一个 `NO_INDEX` 提示，用于禁用索引的使用。对于 Oracle 数据库中许多可用的提示来说都是如此。


  有关提示的完整列表，请参阅您所使用的数据库版本的《Oracle 数据库性能调优指南》。


  ![image](img/t1401.jpg)

  ![image](img/t1401a.jpg)


  ## 14-2. 更改访问路径


  ### 问题


  您有一个查询，您已确定它没有采用您期望的访问路径。


  ## 解决方案


  您可以通过在查询中放置访问路径提示来更改 SQL 语句的访问路径。最常放置在查询中的两种访问路径提示是告诉 Oracle 优化器执行全表扫描或使用索引。通常，优化器在为查询选择最佳或至少合理的数据访问路径方面表现良好。但有时，由于表中数据的特定构成、对象的统计信息或特定数据库的配置，优化器不一定能做出最佳选择。在这些情况下，您可以通过在查询中放置提示来影响优化器。


  当您决定在查询中放置提示时，您应该已经知道优化器没有做出您想要的选择。假设您想在查询中放置一个提示，告诉优化器修改访问路径以执行全表扫描，或更改优化器访问表中数据的方式。如果您的查询将返回大量行，则全表扫描是合适的。例如，如果您想对您的表执行全表扫描，您的提示将如下所示：


  ```sql

  SELECT /*+ full(emp) */ empno, ename

  FROM emp

  WHERE DEPTNO = 20;

  ```


  上述提示指示优化器绕过对 `EMP` 表上任何可能索引的使用，而只是扫描整个表以检索查询所需的数据。


  反过来，假设您正在从 `EMP` 表中检索一个更小的数据子集，并且想要获取部门 20 中那些员工的平均工资。您可以告诉优化器在查询中使用给定表上的索引：


  ```sql

  SELECT /*+ index(emp emp_i2) */ avg(sal)

  FROM emp

  WHERE deptno = 20;

  ```


  ![images](img/square.jpg) 语法错误或不当的提示会被优化器忽略。


  ## 工作原理


  访问路径提示，像许多提示一样，被放置在您的查询中，因为您已经知道优化器将为您的查询采用何种访问路径，并且您相信使用您通过提示指定的方法会更有效。在您使用提示之前，非常重要的一点是验证您是否没有得到您期望的或认为应该得到的访问路径。您还可以通过分析有提示和无提示时优化器的查询成本来衡量潜在的性能提升。


  例如，您想将您的工资与公司内其他职位的工资进行比较，因此您编写了以下查询，以按职位获取最低、平均和最高工资。


  ```sql

  SELECT job, min(sal), avg(sal), max(sal)

  FROM emp

  WHERE deptno=20

  GROUP BY job;

  ```


  ```

  -----------------------------------------------

  | Id  | Operation                    | Name   |

  -----------------------------------------------

  |   0 | SELECT STATEMENT             |        |

  |   1 |  HASH GROUP BY               |        |

  |   2 |   TABLE ACCESS BY INDEX ROWID| EMP    |

  |   3 |    INDEX RANGE SCAN          | EMP_I2 |

  -----------------------------------------------

  ```


  如果您想绕过查询中索引的使用，在查询中放置 `FULL` 提示将指示优化器绕过索引的使用：


  ```sql

  SELECT /*+ full(emp) */ job, min(sal), avg(sal), max(sal)

  FROM emp

  WHERE deptno=20

  GROUP BY job;

  ```


  ```

  -----------------------------------

  | Id  | Operation         | Name  |

  -----------------------------------

  |   0 | SELECT STATEMENT  |       |

  |   1 |  HASH GROUP BY    |       |

  |   2 |   TABLE ACCESS FULL| EMP  |

  -----------------------------------

  ```


  另一种告诉优化器绕过索引使用的方法是告诉优化器不要使用索引来检索给定查询的数据。在这种特定情况下，它与 `FULL` 提示效果相同：


  ```sql

  SELECT /*+ no_index(emp) */ job, min(sal), avg(sal), max(sal)

  FROM emp

  WHERE deptno=20

  GROUP BY job;

  ```


  您也可以明确指定您希望绕过的索引名称：


  ```sql

  SELECT /*+ no_index(emp emp_i2) */ job, min(sal), avg(sal), max(sal)

  FROM emp

  WHERE deptno=20

  GROUP BY job;

  ```


  在上述两种情况下，结果都是全表扫描。在另一种情况下，您的查询可能可以使用不同的索引。例如，在我们的 `EMP` 表上，我们在 `DEPTNO` 列上有一个索引，在
  `HIREDATE` 列上也有一个索引。如果我们想执行一个查询来获取 1980 年入职的部门 20 的员工，我们的查询将如下所示：


  ```sql

  SELECT empno, ename

  FROM emp

  WHERE DEPTNO = 20

  AND hiredate

  BETWEEN to_date(''1980-01-01'',''yyyy-mm-dd'')

  AND to_date(''1980-12-31'',''yyyy-mm-dd'');

  ```


  ```

  ----------------------------------------------

  | Id  | Operation                   | Name   |

  ----------------------------------------------

  |   0 | SELECT STATEMENT            |        |

  |   1 |  TABLE ACCESS BY INDEX ROWID| EMP    |

  |   2 |   INDEX RANGE SCAN          | EMP_I1 |

  ----------------------------------------------

  ```


  在这种情况下，优化器选择了 `EMP_I1` 索引，这是 `HIREDATE` 列上的索引。我们可以指示优化器绕过该索引的使用：


  ```sql

  SELECT /*+ no_index(emp emp_i1) */ job, min(sal), avg(sal), max(sal)

  FROM emp

  WHERE deptno=20

  GROUP BY job;

  ```


  在这种情况下，我们不一定知道优化器接下来会做什么。它可能会决定使用我们在 `DEPTNO` 列上的另一个索引，或者它可能选择执行全表扫描。在使用提示时，尽可能具体地指示优化器该做什么是一个好的实践。因此，如果我们放置一个索引提示来告诉优化器使用
  `DEPTNO` 列上的索引，我们可以看到优化器现在使用了该索引：


  ```sql

  SELECT /*+ index(emp emp_i2) */ empno, ename

  FROM emp

  WHERE DEPTNO = 20

  AND hiredate

  BETWEEN to_date(''1980-01-01'',''yyyy-mm-dd'')

  AND to_date(''1980-12-31'',''yyyy-mm-dd'');

  ```


  ```

  ----------------------------------------------

  | Id  | Operation                   | Name   |

  ----------------------------------------------

  | 0 | SELECT STATEMENT            |        |

  | 1 |  TABLE ACCESS BY INDEX ROWID| EMP    |

  | 2 |   INDEX RANGE SCAN          | EMP_I2 |

  ----------------------------------------------

  ```


  索引提示的其他例子包括用于索引快速全扫描的 `INDEX_FFS` 和用于索引跳跃扫描的 `INDEX SS`。如果您有一个包含复合、多列索引的表，`INDEX_SS`
  提示是合适的。即使查询不使用索引的前导列，也可能让 Oracle 使用该索引。有时，即使 `WHERE` 子句中提到的列不是索引的前导列，`INDEX_SS`
  提示也可以有益于快速检索数据。例如，如果我们想获取所有获得佣金的员工的名字，我们的查询将如下所示：


  ```sql

  SELECT ename, comm FROM emp

  WHERE comm > 0;

  ```


  ```

  ----------------------------------

  | Id  | Operation        | Name  |

  ----------------------------------

  |   0 | SELECT STATEMENT |       |

  |   1 |  TABLE ACCESS FULL| EMP  |

  ----------------------------------

  ```


  如执行计划所示，没有使用索引。我们碰巧知道在我们的 `EMP` 表的 `SAL` 和 `COMM` 列上有一个复合索引。我们可以添加一个提示来使用此索引，以获得在
  `COMM` 列上拥有索引的好处，即使它不是索引的前导列：


  ```sql

  SELECT /*+ index_ss(emp emp_i3) */ ename, comm FROM emp

  WHERE comm > 0;

  ```


  ```

  ----------------------------------------------

  | Id  | Operation                   | Name   |

  ----------------------------------------------

  |   0 | SELECT STATEMENT            |        |

  |   1 |  TABLE ACCESS BY INDEX ROWID| EMP    |

  |   2 |   INDEX SKIP SCAN           | EMP_I3 |

  ----------------------------------------------

  ```


  ![images](img/square.jpg) 注意：提示会影响优化器，但优化器仍可能选择忽略查询中指定的任何提示。



  ### 14-3. 更改连接顺序


  #### 问题


  你遇到一个涉及多表连接的查询性能问题，且 Oracle 优化器没有选择你期望的连接顺序。


  #### 解决方案


  有两个提示（hint）——`ORDERED` 提示和 `LEADING` 提示——可用于影响查询中使用的连接顺序。


  ##### 使用 `ORDERED` 提示


  你正在运行一个连接两个表 `EMP` 和 `DEPT` 的查询，以获取每个员工的部门名称。通过在查询中加入 `ORDERED` 提示，你可以看到该提示如何改变执行访问路径——例如：


  ```sql

  SELECT ename, deptno

  FROM emp JOIN dept USING(deptno);

  ```


  ```

  ---------------------------------------

  | Id  | Operation          | Name     |

  ---------------------------------------

  |   0 | SELECT STATEMENT   |          |

  |   1 |  HASH JOIN         |          |

  |   2 |   INDEX FULL SCAN  | PK_DEPT  |

  |   3 |   TABLE ACCESS FULL| EMP      |

  ---------------------------------------

  ```


  ```sql

  SELECT /*+ ordered */ ename, deptno

  FROM emp JOIN dept USING(deptno);

  ```


  ```

  ---------------------------------------

  | Id  | Operation          | Name     |

  ---------------------------------------

  |   0 | SELECT STATEMENT   |          |

  |   1 |  NESTED LOOPS      |          |

  |   2 |   TABLE ACCESS FULL| EMP      |

  |   3 |   INDEX UNIQUE SCAN| PK_DEPT  |

  ---------------------------------------

  ```


  ##### 使用 `LEADING` 提示


  与使用 `ORDERED` 提示的示例类似，你同样可以控制指定查询的连接顺序。`LEADING` 提示的不同之处在于，你是在提示内部指定连接顺序，而对于 `ORDERED`
  提示，则是在查询的 `FROM` 子句中指定。以下是一个示例：


  ```sql

  SELECT /*+ leading(dept, emp) */ ename, deptno

  FROM emp JOIN dept USING(deptno);

  ```


  ```

  ---------------------------------------

  | Id  | Operation          | Name     |

  ---------------------------------------

  |   0 | SELECT STATEMENT   |          |

  |   1 |  NESTED LOOPS      |          |

  |   2 |   TABLE ACCESS FULL| EMP      |

  |   3 |   INDEX UNIQUE SCAN| PK_DEPT  |

  ---------------------------------------

  ```


  从上述查询中，我们可以看到 `FROM` 子句中指定的表顺序是无关紧要的，因为连接顺序是由 `LEADING` 提示本身指定的。


  #### 工作原理


  指定这些提示的主要目的是用于已知最优连接顺序的多表连接。这通常基于对给定查询的经验，根据数据和表的构成得知。在这些情况下，指定这些提示可以节省优化器处理所有可能连接顺序以确定最优顺序所需的时间。这可以提高查询性能，尤其是在查询中需要连接的表数量增加时。


  当使用这些提示中的任何一个时，你是在指示优化器关于表的连接顺序。因此，至关重要的是你需要知道该提示是否会提高查询的性能。Oracle 建议在可能的情况下使用 `LEADING`
  提示而非 `ORDERED` 提示，因为 `LEADING` 提示内置了更多的灵活性。指定 `ORDERED` 提示时，连接顺序是根据 `FROM` 子句中的表列表来指定的；而对于
  `LEADING` 提示，连接顺序是在提示本身内部指定的。


  ### 14-4. 更改连接方法


  #### 问题


  你的一个查询中，优化器选择了非最优的连接类型，你希望通过在查询中放置适当的提示来覆盖该连接类型。


  #### 解决方案


  有三种可能的连接类型：嵌套循环（nested loops）、哈希（hash）和排序合并（sort merge）。根据表的大小，某些连接类型比其他类型性能更好。你可以使用提示来指定你首选的连接方法。


  ##### 嵌套循环连接提示


  要调用嵌套循环连接，请使用 `USE_NL` 提示，并将需要连接的两个表放在 `USE_NL` 提示内的括号中：


  ```sql

  SELECT /*+ use_nl(emp, dept)  */ ename, dname

  FROM emp JOIN dept USING (deptno);

  ```


  ```

  -----------------------------------------------

  | Id  | Operation                    | Name   |

  -----------------------------------------------

  |   0 | SELECT STATEMENT             |        |

  |   1 |  NESTED LOOPS                |        |

  |   2 |   NESTED LOOPS               |        |

  |   3 |    TABLE ACCESS FULL         | DEPT   |

  |   4 |    INDEX RANGE SCAN          | EMP_I2 |

  |   5 |   TABLE ACCESS BY INDEX ROWID| EMP    |

  -----------------------------------------------

  ```


  嵌套循环连接在连接小表时通常效果最佳。在嵌套循环连接中，一个表被视为“驱动”表。这是连接中的外表。对于驱动外表中的每一行，都会在内表中搜索匹配的行。在上述语句的执行计划中，`EMP`
  表是驱动外表，在执行计划中它显示为计划的最外层部分。`DEPT` 表是内表，显示为执行计划的最内层部分。


  ##### 哈希连接提示


  要调用哈希连接，请使用 `USE_HASH` 提示，并将需要连接的两个表放在 `USE_HASH` 提示内的括号中：


  ```sql

  SELECT /*+ use_hash(emp_all, dept)  */ ename, dname

  FROM emp_all JOIN dept USING (deptno);

  ```


  ```

  ----------------------------------------------

  | Id  | Operation          | Name    | Rows  |

  ----------------------------------------------

  |   0 | SELECT STATEMENT   |         |  1037K|

  |   1 |  HASH JOIN         |         |  1037K|

  |   2 |   TABLE ACCESS FULL| DEPT    |     4 |

  |   3 |   TABLE ACCESS FULL| EMP_ALL |  1037K|

  ----------------------------------------------

  ```


  为了使优化器使用哈希连接，连接条件必须是等值连接（equijoin）。哈希连接最适合用于连接大量数据或需要表中大比例行的情况。优化器会使用两个表中较小的一个，根据两个表之间的连接键来构建哈希表。在上面的例子中，`DEPT`
  表是较小的表，将用于构建哈希表。为了获得最佳性能，哈希表应完全驻留在内存中。


  ##### 排序合并连接提示


  要调用排序合并连接，请使用 `USE_MERGE` 提示，并将需要连接的两个表放在 `USE_MERGE` 提示内的括号中：


  ```sql

  SELECT /*+ use_merge(emp, dept)  */ ename, dname

  FROM emp JOIN dept USING (deptno)

  WHERE deptno != 20;

  ```


  ```

  ------------------------------------------------

  | Id  | Operation                    | Name    |

  ------------------------------------------------

  |   0 | SELECT STATEMENT             |         |

  |   1 |  MERGE JOIN                  |         |

  |   2 |   TABLE ACCESS BY INDEX ROWID| DEPT    |

  |   3 |    INDEX FULL SCAN           | PK_DEPT |

  |   4 |   SORT JOIN                  |         |

  |   5 |    TABLE ACCESS FULL         | EMP     |

  ------------------------------------------------

  ```


  排序合并连接与哈希连接类似，用于连接大量数据。与哈希连接不同的是，排序合并连接用于表之间的连接条件不是等值连接的情况。通常，哈希连接的性能优于排序合并连接，除非数据在两个表上已经排序。在此操作期间，来自两个表的输入数据会根据连接键进行排序，然后合并在一起。



  '
- "# 多表查询时的联接提示\n\n如果您正在联接多个表，并希望在查询中为所有关联表调用特定的联接方法，则必须为每个联接条件添加一个提示——例如：\n\n```sql\n\
  SELECT /*+ use_hash(employees, department) use_hash(departments, locations)  */\n\
  last_name, first_name, department_name,  city, state_province\nFROM employees JOIN\
  \ departments USING (department_id)\nJOIN locations USING (location_id);\n```\n\n\
  ```\n-----------------------------------------------------\n| Id  | Operation  \
  \             | Name              |\n-----------------------------------------------------\n\
  |   0 | SELECT STATEMENT        |                   |\n|   1 |  HASH JOIN      \
  \        |                   |\n|   2 |   HASH JOIN             |              \
  \     |\n|   3 |    TABLE ACCESS FULL    | LOCATIONS         |\n|   4 |    TABLE\
  \ ACCESS FULL    | DEPARTMENTS       |\n|   5 |   VIEW                  | index$_join$_001\
  \  |\n|   6 |    HASH JOIN            |                   |\n|   7 |     INDEX FAST\
  \ FULL SCAN| EMP_NAME_IX       |\n|   8 |     INDEX FAST FULL SCAN| EMP_DEPARTMENT_IX\
  \ |\n-----------------------------------------------------\n```\n\n## 工作原理\n\n表\
  \ 14-2 总结了可用于不同联接方法的各种提示。有时，由于以下几个因素，需要使用提示来指示优化器选择联接方法：\n\n*   表上统计信息的状态\n*   PGA\
  \ 的大小\n*   数据在联接时是否已排序\n*   优化器做出了无法解释的选择\n\nOracle 建议尽可能不使用提示，因为随着时间的推移，在某一时刻、某种环境、某一数据库软件版本下最优的选择，下次可能就不再是最优的。然而，有时这些提示对于满足短期需求非常有帮助，或者可能是让优化器按照您意愿行事的唯一方法。\n\
  \n![images](img/t1402.jpg)\n\n![images](img/square.jpg) **提示** 您的 PGA 大小会影响优化器为查询选择的联接方法。\n\
  \n## 14-5. 更改优化器版本\n\n### 问题\n\n您已升级到较新版本的 Oracle，并且遇到了与较新版本 Oracle 相关的查询性能问题。该问题仅限于少数查询，因此您希望在这些查询中放置一个提示，以使用先前版本的优化器规则和功能。\n\
  \n### 解决方案\n\n为了为给定查询指定优化器版本，您需要在 `optimizer_features_enable` 提示中指定您期望的优化器版本。在括号内，用单引号括起所需的数据库版本。\n\
  \n```sql\nSELECT /*+ optimizer_features_enable('10.2') */ *\nFROM EMP JOIN DEPT\
  \ USING(DEPTNO);\n```\n\n此方法主要用作升级后立即提高性能的临时措施，直到可以进行分析并找到针对查询和升级后数据库版本的解决方案。\n\n\
  ### 工作原理\n\n您可以修改给定查询的优化器版本。这可以通过 `optimizer_features_enable` 提示完成，并且仅对给定查询生效。使用此提示的主要原因是，在某个特定\
  \ Oracle 版本下表现良好的查询，在 Oracle 数据库版本升级后性能立即下降。\n\n有一个 Oracle 初始化参数 `optimizer_features_enable`，可以为整个数据库实例更改它。如果您在升级数据库后立即遇到查询性能问题广泛发生，这是一个可选方案。然而，在数据库实例级别更改此参数通常并不可行，甚至并不理想，因为升级的主要原因是为了利用新特性。因此，除非存在重大且广泛的性能问题，否则不建议为整个数据库实例更改\
  \ `optimizer_features_enable` 参数。\n\n如果您有一个特定的查询或一小部分关键查询在升级后性能不达标，一个快速恢复到升级前性能的方法是使用\
  \ `optimizer_features_enable` 提示，为给定查询指向特定版本的优化器。\n\n## 14-6. 在快速响应与全局优化之间选择\n\n\
  ### 问题\n\n执行查询时，您可以在两个目标之间做出选择：\n\n*   *快速初始响应*：尽快开始返回部分行。\n*   *全局优化*：以牺牲前期处理时间为代价，最小化总体成本。\n\
  \n您的实例会为其配置一个默认目标。您可以按查询指定提示，以覆盖默认目标，并为特定查询获得所需的行为。\n\n### 解决方案\n\n有些提示可用于覆盖数据库实例的优化目标。在使用与\
  \ `optimizer_mode` 相关的任何提示之前，您首先需要确认数据库实例当前的设置。如果您拥有 `SELECT ANY DICTIONARY` 系统权限，可以查看\
  \ `optimizer_mode` 参数的设置值。\n\n```sql\nSQL> show parameter optimizer_mode\n\nNAME\
  \                 TYPE        VALUE\n-------------------- -------------------- --------------------\n\
  optimizer_mode       string      ALL_ROWS\n```\n\n如果我们为示例查询运行执行计划，我们可以看到使用数据库实例默认\
  \ `optimizer_mode` 设置时的执行计划。\n\n```sql\nSELECT *\nFROM employees NATURAL JOIN departments;\n\
  ```\n\n```\n------------------------------------------\n| Id  | Operation      \
  \    | Name        |\n------------------------------------------\n|   0 | SELECT\
  \ STATEMENT   |             |\n|   1 |  HASH JOIN         |             |\n|   2\
  \ |   TABLE ACCESS FULL| DEPARTMENTS |\n|   3 |   TABLE ACCESS FULL| EMPLOYEES \
  \  |\n------------------------------------------\n```\n\n由于上述查询对表进行了全表扫描，而我们希望尽快看到一些行（但不一定是完整的结果集），我们可以传入一个\
  \ `FIRST_ROWS` 提示来完成此任务。很明显，这改变了优化器的执行计划以便尽快提供结果。\n\n```sql\nSELECT /*+ first_rows\
  \ */ *\nFROM employees NATURAL JOIN departments;\n```\n\n```\n----------------------------------------------------\n\
  | Id  | Operation                    | Name        |\n----------------------------------------------------\n\
  |   0 | SELECT STATEMENT             |             |\n|   1 |  NESTED LOOPS    \
  \            |             |\n|   2 |   NESTED LOOPS               |           \
  \  |\n|   3 |    TABLE ACCESS FULL         | EMPLOYEES   |\n|   4 |    INDEX UNIQUE\
  \ SCAN         | DEPT_ID_PK  |\n|   5 |   TABLE ACCESS BY INDEX ROWID| DEPARTMENTS\
  \ |\n----------------------------------------------------\n```\n\n如果我们需要相反的情况，并且数据库的默认\
  \ `optimizer_mode` 设置为 `FIRST_ROWS`，我们可以提供一个 `ALL_ROWS` 提示来告诉优化器在确定执行计划时使用该模式：\n\
  \n```sql\nSQL> alter system set optimizer_mode=first_rows scope=both;\n\nSystem\
  \ altered.\n\nSQL> show parameter optimizer_mode\n\nNAME                 TYPE  \
  \      VALUE\n-------------------- -------------------- --------------------\noptimizer_mode\
  \       string      FIRST_ROWS\n```\n\n```sql\nSELECT /*+ all_rows */ *\nFROM employees\
  \ NATURAL JOIN departments;\n```\n\n```\n------------------------------------------\n\
  | Id  | Operation          | Name        |\n------------------------------------------\n\
  |   0 | SELECT STATEMENT   |             |\n|   1 |  HASH JOIN         |       \
  \      |\n|   2 |   TABLE ACCESS FULL| DEPARTMENTS |\n|   3 |   TABLE ACCESS FULL|\
  \ EMPLOYEES   |\n------------------------------------------\n```\n\n## 工作原理\n\n\
  通常，快速获得初始响应的目标是用户在等待结果时的良好选择。它使数据库引擎做出选择，允许行几乎立即从查询中返回。例如，为初始响应进行优化通常会产生一个嵌套循环连接，因为这样的连接可以从一开始就返回行。代价可能是更长的总体执行时间。\n\
  \n降低总体查询成本的目标通常是批处理过程的不错选择。没有真实的、人类用户在等待结果，因此可以接受在初始处理上花费更多时间以减少总体查询成本。一个例子可能是执行哈希连接，它在连接完成之前不能开始返回行，但其总执行时间可能比嵌套循环连接更短。\n\
  \n可以在查询中使用 `FIRST_ROWS` 或 `ALL_ROWS` 提示来更改优化器模式，该模式控制前述两个目标中哪一个应用于给定的查询。\n\n要检查数据库实例当前的优化器模式，请检查\
  \ `optimizer_mode` 初始化参数的值。通过指定优化器目标提示，它可以覆盖数据库实例级别设置的优化器模式，以及会话级别的任何设置。\n\n`FIRST_ROWS`\
  \ 提示非常流行，因为它可以快速从查询返回第一个可能的行。`ALL_ROWS` 提示也很常见，因为 `ALL_ROWS` 是 `optimizer_mode`\
  \ 参数的默认值。因此，通常不需要指定 `ALL_ROWS`。\n\n## 14-7. 执行直接路径插入\n\n### 问题\n\n你正在执行一个 DML `INSERT`\
  \ 语句，其执行速度比所需慢。你希望优化 `INSERT` 语句以使用直接路径插入技术。\n\n### 解决方案\n\n通过使用 `APPEND` 或 `APPEND_VALUES`\
  \ 提示，你可以显著加快在数据库上执行插入操作的过程。以下是使用 `APPEND` 提示节省性能的示例。首先，我们有一个在两个表之间执行常规插入的查询：\n\n\
  ```sql\nINSERT INTO emp_dept\nSELECT * FROM emp_ctas_new;\n```\n\n```\n19753072\
  \ rows created.\n\nElapsed: 00:01:17.86\n-------------------------------------------------\n\
  | Id  | Operation                | Name         |\n-------------------------------------------------\n\
  |   0 | INSERT STATEMENT         |              |\n|   1 |  LOAD TABLE CONVENTIONAL\
  \ | EMP_DEPT     |\n|   2 |   TABLE ACCESS FULL      | EMP_CTAS_NEW |\n-------------------------------------------------\n\
  ```\n\n如果在相同的 `INSERT` 语句中放置 `APPEND` 提示，我们会看到性能上的显著提升：\n\n```sql\nINSERT /*+ append\
  \ */ INTO emp_dept\nSELECT * FROM emp_ctas_new;\n```\n\n```\n19753072 rows created.\n\
  \nElapsed: 00:00:12.15\n-------------------------------------------\n| Id  | Operation\
  \          | Name         |\n-------------------------------------------\n|   0\
  \ | INSERT STATEMENT   |              |\n|   1 |  LOAD AS SELECT    | EMP_DEPT \
  \    |\n|   2 |   TABLE ACCESS FULL| EMP_CTAS_NEW |\n-------------------------------------------\n\
  ```\n\n`APPEND` 提示仅适用于带有子查询的 `INSERT` 语句；它不适用于带有 `VALUES` 子句的 `INSERT` 语句。对于后者，你需要使用\
  \ `APPEND_VALUES` 提示。以下是两个带有 `VALUES` 子句的 `INSERT` 语句示例，我们可以看到提示对执行计划的影响：\n\n```sql\n\
  INSERT INTO emp_dept\nVALUES (15867234,'Smith, JR','Sales',1359,'2010-01-01',200,5,20);\n\
  ```\n\n```\n---------------------------------------------\n| Id  | Operation   \
  \             | Name     |\n---------------------------------------------\n|   0\
  \ | INSERT STATEMENT         |          |\n|   1 |  LOAD TABLE CONVENTIONAL | EMP_DEPT\
  \ |\n---------------------------------------------\n```\n\n```sql\nINSERT /*+ append_values\
  \ */ INTO emp_dept\nVALUES (15867234,'Smith, JR','Sales',1359,'2010-01-01',200,5,20);\n\
  ```\n\n```\n-------------------------------------\n| Id  | Operation        | Name\
  \     |\n-------------------------------------\n|   0 | INSERT STATEMENT |     \
  \     |\n|   1 |  LOAD AS SELECT  | EMP_DEPT |\n|   2 |   BULK BINDS GET |     \
  \     |\n-------------------------------------\n```\n\n### 工作原理\n\n`APPEND` 提示在从另一个表执行\
  \ DML 插入操作的语句中工作，即，在 `INSERT INTO ... SELECT` 语句中使用子查询。这适用于需要在表之间复制大量行的情况。通过绕过 Oracle\
  \ 数据库缓冲区缓存块并将数据直接追加到段高水位标记之上，它节省了大量开销。这是一种非常流行的快速向表中插入行的方法。\n\n当你指定这些提示之一时，Oracle\
  \ 将执行直接路径插入。在直接路径插入中，数据被追加到表的末尾，而不是使用在该表当前分配块内找到的空闲空间。`APPEND` 和 `APPEND_VALUES`\
  \ 提示在使用时，会自动将常规插入操作转换为直接路径插入操作。此外，如果你在插入期间使用并行操作，默认的操作模式是使用直接路径模式。如果你想绕过直接路径操作，可以使用\
  \ `NOAPPEND` 提示。\n\n请记住，如果你正在使用这些提示运行，当多个应用程序进程向同一个表插入行时，存在争用的风险。如果两个追加操作同时插入行，性能将会下降，因为插入追加操作在段的高水位标记之上追加数据，一次只应执行一个操作。但是，如果你有分区对象，只要每个插入操作在给定表的不同分区上运行，你仍然可以运行多个并发的追加操作。\n\
  \n## 14-8. 在视图中放置提示\n\n### 问题\n\n你正在创建一个视图，并希望在该视图的查询中放置一个提示，以提高访问该视图的任何查询的性能。\n\
  \n## 解决方案\n\n提示（hints）可以置于视图（view）中，因为视图本质上是数据库中存储的查询。根据所使用的提示类型以及被查询的视图类型，您可以判断您的提示是否会被使用。理解您拥有的视图类型至关重要，这样才能确定提示会对该视图产生何种影响。要理解这一点，您首先需要判断您的视图属于以下哪种类型：\n\
  *   可合并（mergeable）或不可合并（non-mergeable）视图\n*   简单（simple）或复杂（complex）视图\n\n简单视图是仅引用一个表，且不含任何分组函数或表达式的视图：\n\
  ```\nCREATE view emp_high_sal\nAS SELECT /*+ use_index(employees) */ employee_id,\
  \ first_name, last_name, salary\nFROM employees\nWHERE salary > 10000;\n```\n\n\
  复杂视图可以引用多个表，或者包含分组子句，或者使用函数和表达式：\n```\nCREATE or replace view dept_sal\nAS SELECT\
  \ /*+ full(employees) */ department_id, department_name,\ndepartments.manager_id,\
  \ SUM(salary) total_salary, AVG(salary) avg_salary\nFROM employees JOIN departments\
  \ USING(department_id)\nGROUP BY department_id, department_name, departments.manager_id;\n\
  ```\n\n可合并视图是指优化器可以用视图定义内部的查询来替换调用该视图的查询。例如，我们只想从 `emp_high_sal` 视图中查询所有行。优化器可以直接转到\
  \ `employees` 表：\n```\nSELECT * FROM emp_high_sal;\n```\n```\n---------------------------------------\n\
  | Id  | Operation         | Name      |\n---------------------------------------\n\
  |   0 | SELECT STATEMENT  |           |\n|   1 |  TABLE ACCESS FULL| EMPLOYEES |\n\
  ---------------------------------------\n```\n优化器已简单地用定义视图的查询替换了原查询：\n```\nSELECT\
  \ /*+ full(employees) */ department_id, department_name,\ndepartments.manager_id,\
  \ SUM(salary) total_salary, AVG(salary) avg_salary\nFROM employees JOIN departments\
  \ USING(department_id)\nGROUP BY department_id, department_name, departments.manager_id;\n\
  ```\n对于可合并视图，视图内部的提示会得以保留，因为基于调用该视图的查询，视图定义的基本结构保持不变。关于可合并视图的提示使用指南，请参见表 14-3。\n\
  \n![images](img/t1403.jpg)\n\n对于不可合并视图，优化器必须将工作分解成两个部分。它必须先执行定义视图的查询，然后必须执行顶层查询。因此，视图本身内部定义的提示会得以保留。例如，我们正在查询\
  \ `dept_sal` 视图。从执行计划中可以看出，查询被分解成了若干部分：\n```\nSELECT manager_id, sum(total_salary)\n\
  FROM dept_sal\nGROUP BY manager_id;\n```\n```\n-------------------------------------------------------\n\
  | Id  | Operation                       | Name        |\n-------------------------------------------------------\n\
  |   0 | SELECT STATEMENT                |             |\n|   1 |  HASH GROUP BY\
  \                  |             |\n|   2 |   VIEW                          | DEPT_SAL\
  \    |\n|   3 |    HASH GROUP BY                |             |\n|   4 |     MERGE\
  \ JOIN                  |             |\n|   5 |      TABLE ACCESS BY INDEX ROWID|\
  \ DEPARTMENTS |\n|   6 |       INDEX FULL SCAN           | DEPT_ID_PK  |\n|   7\
  \ |      SORT JOIN                  |             |\n|   8 |       TABLE ACCESS\
  \ FULL         | EMPLOYEES   |\n-------------------------------------------------------\n\
  ```\n关于不可合并视图的提示使用指南，请参见表 14-4。\n\n![images](img/t1404.jpg)\n\n理解提示和视图所有可能的场景可能会令人困惑，因此需要谨慎使用，并且仅在其他调优手段未能满足需求时才使用。\n\
  \n## 工作原理\n\n如前所述，由于视图只是一个存储的查询，提示可以像在任何查询中一样轻松地置于视图内部。放置在视图中的提示类型将决定提示在视图内部是否以及如何被使用。就像在视图上执行\
  \ DML 操作一样，提示在何时会被使用或忽略也存在限制。\n\n根据经验，视图越简单，提示有效的可能性越大。由于每个应用程序、每个查询和每个视图都具有独特性，要知道一个提示是否会被使用的唯一真正方法，就是简单地尝试该提示并执行执行计划来验证给定的提示是否被使用。\n\
  \nOracle 不建议在视图中放置提示，因为底层对象可能随时间变化，您可能会遇到不可预测的执行计划。此外，视图可能是为某个特定用途创建的，但以后可能用于其他目的，而视图中的任何提示可能无法适用于所有场景。另外，放置在视图内部的提示的管理方式与直接执行查询本身时不同。在视图内部放置的任何提示被使用之前，优化器需要确定该视图是否可以与其调用查询合并。\n\
  \n您也可以考虑在访问视图的查询中放置提示。当在访问自身包含提示的视图的查询中放置提示时，理解优先级规则很重要。这尤其突显了在视图中放置提示之前需要谨慎的必要性。\n\
  \n![images](img/square.jpg) `提示` 在引用复杂视图的查询中放置的提示会被忽略。\n\n### 14-9\\. 缓存查询结果\n\n\
  #### 问题\n\n您希望提高一组经常使用的查询的性能，并希望使用 Oracle 的结果缓存（result cache）来存储查询结果，以便在相同查询再次执行时能快速检索以供未来使用。\n\
  \n\n### 解决方案\n\n结果缓存是 Oracle 11g 的新特性，其创建目的是将常用查询的结果存储在内存中，以便快速轻松地检索。如果你对某个查询执行执行计划，可以查看其结果是否会存储在结果缓存中：\n\
  \n```sql\nSELECT /*+ result_cache */\njob_id, min_salary, avg(salary) avg_salary,\
  \ max_salary\nFROM employees JOIN jobs USING (job_id)\nGROUP BY job_id, min_salary,\
  \ max_salary;\n```\n\n```\n---------------------------------------------------------------------\n\
  | Id  | Operation                       | Name                      |\n---------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT                |                           |\n|   1 | \
  \ RESULT CACHE                   | 5t4cc5n1gdyfh46jdhfttnhx4g|\n|   2 |   HASH GROUP\
  \ BY                 |                           |\n|   3 |    NESTED LOOPS    \
  \             |                           |\n|   4 |     NESTED LOOPS          \
