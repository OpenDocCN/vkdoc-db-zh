  \ awrdiff_1_2092_1_2134.html`\n    `SQL>`\n\n## 工作原理\n\n生成 AWR 比较时段报告的过程与生成普通 AWR\
  \ 报告的过程非常相似。最大的区别在于，该报告不显示两个快照之间发生的情况，而普通 AWR 报告会显示。AWR 比较时段报告比较两个不同时间段的性能，每个时间段涉及不同的一对快照。如果你想比较数据库今天上午\
