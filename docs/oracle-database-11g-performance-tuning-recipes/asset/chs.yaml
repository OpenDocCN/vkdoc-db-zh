  ![image](img/sam_r_alapati.jpg) ![image](img/square.jpg)**Sam R. Alapati** 是一名 Oracle
  ACE，也是一位经验丰富的 Oracle 数据库管理员（OCP Oracle Database 11g）。Sam 目前是位于新泽西州伍德布里奇的 Miro Consulting,
  Inc. 的高级技术总监，并定期为财富 500 强公司提供 Oracle Database、Oracle E-Business 和 Oracle Fusion
  Middleware 技术领域的咨询。Sam 撰写了多本关于 Oracle 数据库管理的书籍，包括 `Expert Oracle Database 11g Administration`、`Oracle
  Database 11g: New Features for DBAs and Developers`（与 Charles Kim 合著）以及 `RMAN Recipes
  for Oracle Database 11g`（与 Darl Kuhn 和 Arup Nanda 合著），均由 Apress 出版。Sam 与妻子 Valerie
  以及孩子 Shannon、Nina 和 Nicholas 一起居住在德克萨斯州的达拉斯。


  ![image](img/darl_kuhn.jpg) ![image](img/square.jpg)**Darl Kuhn** 是一名在 Oracle 公司工作的高级数据库管理员。他处理数据库管理的所有方面，从设计和开发到生产支持。他还在科罗拉多州的雷吉斯大学教授高级数据库课程。Darl
  为落基山 Oracle 用户组做志愿者 DBA 工作。他拥有科罗拉多州立大学的研究生学位，与妻子 Heidi 以及女儿 Brandi 和 Lisa 住在科罗拉多州
