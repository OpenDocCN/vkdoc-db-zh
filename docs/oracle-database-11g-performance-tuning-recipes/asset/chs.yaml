  \n![images](img/t0401.jpg)\n\n## 工作原理\n\n如果您需要比从 AWR 报告中能获取的更实时的会话信息，那么检索 ASH 信息是必要的。再次说明，AWR\
  \ 信息默认情况下是每小时生成一次。ASH 信息则从`V$SESSION`中每秒收集一次，并存储最有用的会话信息，以帮助评估数据库在任何特定时刻的性能。\n\n\
  ASH 信息存储在 SGA 的一个循环缓冲区中。Oracle 文档指出，缓冲区大小按如下方式计算：\n\n```\nMax [Min [ #CPUs * 2 MB,\
  \ 5% of Shared Pool Size, 30MB ], 1MB ]\n```\n\n信息在数据字典中存储的时间长短取决于数据库内的活动情况。如果您的数据库非常活跃，您可能需要查看`DBA_HIST_ACTIVE_SESS_HISTORY`历史视图，以便获取所需的\
  \ ASH 信息。有关查询`DBA_HIST_ACTIVE_SESS_HISTORY`视图的示例，请参阅方法 4-13。要快速查看历史视图中保存了多少数据，您可以简单地从`DBA_HIST_ACTIVE_SESS_HISTORY`视图中获取最早的`SAMPLE_TIME`：\n\
  \n```\nSELECT min(sample_time) FROM dba_hist_active_sess_history;\n```\n\n```\n\
  MIN(SAMPLE_TIME)\n---------------------------------------------------------------------------\n\
  20-MAR-11 11.00.27.433 PM\n```\n\n管理 AWR 每小时快照的 MMON 后台进程，同时也会将 ASH 信息刷新到历史视图中。如果数据库上活动频繁，并且缓冲区在小时级\
  \ AWR 快照之间填满，MMNL 后台进程将唤醒并将 ASH 数据刷新到历史视图中。\n\n`V$ACTIVE_SESSION_HISTORY`和`DBA_HIST_ACTIVE_SESS_HISTORY`视图包含的信息比本方法中展示的样本要详细得多，如果您愿意，可以深入挖掘并在会话级别获取更多信息，包括有关实际\
  \ SQL 语句、SQL 操作、阻塞会话信息以及文件 I/O 信息。\n\n### 4-12. 从 Enterprise Manager 获取 ASH 信息\n\
  \n#### 问题\n\n您希望从 Enterprise Manager 中获取 ASH 信息，因为您使用 Enterprise Manager 进行性能调优活动。\n\
  \n#### 解决方案\n\n从 Enterprise Manager 生成的 ASH 报告包含与表 4-1 中指定的相同部分（参见方法 4-11）。要从 Enterprise\
  \ Manager 生成 ASH 报告，通常需要位于“性能”选项卡中，具体取决于您使用的 Enterprise Manager 特定版本。与运行`ashrpt.sql`脚本一样，您需要指定所需报告期的开始和结束时间段。有关用于生成\
  \ ASH 报告的屏幕示例，请参见图 4-10；有关 ASH 报告输出的示例，请参见图 4-11：\n\n![images](img/0410.jpg)\n\n\
  图 4-10. 从 Enterprise Manager 生成 ASH 报告\n\n![images](img/0411.jpg)\n\n图 4-11. Enterprise\
  \ Manager 中的 ASH 报告示例\n\n#### 工作原理\n\n生成 ASH 报告时，您可以选择根据特定条件进行筛选。在图 4-12 中，请参阅“筛选器”下拉菜单。如果您的数据库非常活跃，并且希望直接关注某个特定的\
  \ SQL_ID，例如，您可以从“筛选器”下拉菜单中选择 SQL_ID 选项，并输入 SQL_ID 值。生成的报告将仅显示基于筛选条件的信息。\n\n可筛选的选项包括：\n\
  \n*   `SID`\n*   `SQL_ID`\n*   `等待类`\n*   `服务`\n*   `模块`\n*   `操作`\n*   `客户端`\n\n\
  许多前述筛选器都可以在`V$SESSION`视图中找到。要获取可能的等待类列表，您可以查询`DBA_HIST_EVENT_NAME`视图，如下例所示：\n\n\
  ```\nSELECT DISTINCT wait_class FROM dba_hist_event_name;\n```\n\n```\nWAIT_CLASS\n\
  ----------------------------------------------------------------\nConcurrency\n\
  User I/O\nAdministrative\nSystem I/O\nScheduler\nConfiguration\nOther\nApplication\n\
  Cluster\nNetwork\nIdle\nCommit\n```\n\n![images](img/0412.jpg)\n\n图 4-12. 通过筛选器自定义\
  \ ASH 报告\n\n### 4-13. 从数据字典获取 ASH 信息\n\n#### 问题\n\n您希望查看 Oracle 数据字典中保存了哪些 ASH 信息。\n\
  \n\n#### 解决方案\n\n有几个数据字典视图可用于获取 ASH 信息。第一个是 `V$ACTIVE_SESSION_HISTORY`，可用于获取数据库中当前或最近会话的信息。第二个是\
