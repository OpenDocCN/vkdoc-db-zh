  \ procedure successfully completed.\nSQL>\n```\n\n创建快照后，您可以运行`awrrpt.sql`脚本。然后选择之前的两个快照来生成最新的\
  \ AWR 报告。\n\n当用户响应时间突然增加时，例如在高峰时段从一秒增加到十秒，您可以生成 AWR 报告。如果关键批处理作业突然需要更长时间才能完成，AWR\
  \ 报告也可能有所帮助。当然，您还必须借助操作系统工具（如`sar`、`vmstat`和`iosat`）检查该时间段内的系统 CPU、I/O 和内存使用情况。\n\
  \n如果系统 CPU 使用率很高，这并不一定意味着 CPU 是罪魁祸首。CPU 使用率百分比并不总是吞吐量的真实度量，CPU 使用率也并不总是作为数据库工作负载指标有用。请确保为观察到性能恶化的精确时间段生成\
  \ AWR 报告。跨度为 24 小时的 AWR 报告对于诊断两小时前仅持续了 30 分钟的性能下降几乎没有用处。让您的报告时间范围与性能问题的发生时间段相匹配。\n\
  \n### 7-16. 比较两个时间段的数据库性能\n\n#### 问题\n\n您想要检查并比较数据库在两个不同时段内的性能表现。\n\n## 解决方案\n\n\
