  ```\n\n`DISPLAY_CURSOR` 过程还有许多其他可用选项；更完整的选项列表请参阅《Oracle PL/SQL Packages and Types\
  \ Reference Guide》。\n\n#### 工作原理\n\n`GATHER_PLAN_STATISTICS` 提示收集运行时统计信息；因此需要执行查询才能收集这些信息。如果你有一个查询的优化级别表现不佳，使用\
  \ `GATHER_PLAN_STATISTICS` 提示运行该查询可能很有用。它可以快速提供普通执行计划无法提供的信息，因为它显示了查询统计信息的估计值和实际值。由此，你可以确定优化器是否以最优方式执行\
  \ SQL，并判断是否需要任何优化。\n\n请记住，收集这些额外的运行时统计信息需要消耗一些资源，因此请谨慎使用此选项。在某些情况下，测试运行时差异可能是值得的。此提示的一个关键好处是，额外的统计信息仅针对特定查询收集。这样，范围是有限的，不会影响数据库中的其他进程，甚至不会影响特定的会话。如果你想要一个更全局的设置来收集扩展统计信息，可以在会话或实例级别设置\
  \ `STATISTICS_LEVEL=ALL`。\n\n一组需要快速查看的列是 `E-Rows` 和 `A-Rows` 列。通过查看这些列，你可以快速判断优化器是否基于准确的统计信息执行查询。如果这些列之间存在较大差异，则表明执行计划效率低下。进行准确分析所需的一个计算是针对\
  \ `E-Rows` 列的。你需要将 `Starts` 列与 `E-Rows` 相乘，才能准确地将总数与 `A-Rows` 进行比较。\n\n### 14-12.\
  \ 启用查询重写\n\n#### 问题\n\n你的数据库环境中存在物化视图，并且希望访问构成这些物化视图的源表的查询能够直接访问物化视图以检索结果。\n\n####\
  \ 解决方案\n\n可以使用 `REWRITE` 提示来指示优化器使用物化视图。物化视图必须启用查询重写功能，并且物化视图和相关对象的统计信息应是最新的，以增加查询被重写的可能性。请参见以下示例：\n\
  \n```sql\nSELECT /*+ rewrite(dept_sal_mv) */ department_id,\nsum(nvl(salary+(salary*commission_pct),salary))\
  \ total_compensation\nFROM employees\nGROUP BY department_id\nhaving sum(nvl(salary+(salary*commission_pct),salary))\
  \ > 10000\nORDER by 2;\n```\n\n在这里我们可以看到，优化器在执行计划中使用了物化视图，而不是处理整个查询并重新计算汇总：\n\n\
  ```text\n-----------------------------------------------------\n| Id  | Operation\
  \                       | Name        |\n-----------------------------------------------------\n\
  |   0 | SELECT STATEMENT                |             |\n|   1 |  SORT ORDER BY\
  \                  |             |\n|   2 |   MAT_VIEW REWRITE ACCESS FULL  | DEPT_SAL_MV\
  \ |\n-----------------------------------------------------\n```\n\n## 工作原理\n\n物化视图通常用于存储经常执行的查询的结果集。常规视图只是在数据字典中存储的查询，而物化视图本质上是存储这些查询结果的表。它们通常在查询中存在复杂的连接、汇总或聚合时创建。以下示例是一个物化视图，用于计算公司每个部门的总薪酬。假设此查询经常被公司高管用来确定其部门在向员工分配薪酬方面的表现：\n\
  \n```sql\nCREATE MATERIALIZED VIEW DEPT_SAL_MV\nENABLE QUERY REWRITE\nAS\nSELECT\
  \ department_id,\nsum(nvl(salary+(salary*commission_pct),salary)) total_compensation\n\
  FROM employees\nGROUP BY department_id;\n```\n\n由于结果存储在数据库中，优化器无需重新处理查询来检索数据。最终用户社区不必反复执行复杂的连接或聚合，因此这是一个相当大的性能优势。有些用户可能不知道你环境中的物化视图，并可能对星型模式或其他表执行原始查询。此时，`REWRITE`提示有助于提高那些可以使用物化视图的查询的性能。\n\
  \n如果你为物化视图启用了查询重写，并且执行了一个查询，其结果可以在该物化视图中找到，优化器可能会选择“重写”查询以直接针对物化视图进行，而不是处理查询本身。通常不需要提示，因为如果启用了查询重写，优化器会尝试重写查询。然而，即使这是期望的结果，优化器也可能选择不重写查询以使用物化视图。在这些情况下，你可以在查询中放置一个提示，让优化器使用物化视图，而不考虑执行成本。你可以在提示中放置实际的视图名称，或者不带视图名称地放置提示：\n\
  \n```sql\nSELECT /*+ rewrite */ department_id,\nsum(nvl(salary+(salary*commission_pct),salary))\
  \ total_compensation\nFROM employees\nGROUP BY department_id\nhaving sum(nvl(salary+(salary*commission_pct),salary))\
  \ > 10000\nORDER by 2;\n```\n\n相反，如果出于某种原因你不希望优化器使用物化视图，也可以使用`NOREWRITE`提示。一个可能的原因是物化视图中的数据与源表相比已过时，而你希望确保获取最新的数据。在这里我们可以看到，优化器绕过了物化视图的使用，直接从`EMPLOYEES`表重新汇总了数据：\n\
  \n```sql\nSELECT /*+ norewrite */ department_id,\nsum(nvl(salary+(salary*commission_pct),salary))\
  \ total_compensation\nFROM employees\nGROUP BY department_id\nhaving sum(nvl(salary+(salary*commission_pct),salary))\
  \ > 10000\nORDER by 2;\n```\n\n```\n------------------------------------------\n\
  | Id  | Operation            | Name      |\n------------------------------------------\n\
  |   0 | SELECT STATEMENT     |           |\n|   1 |  SORT ORDER BY       |     \
  \      |\n|   2 |   FILTER             |           |\n|   3 |    HASH GROUP BY \
  \    |           |\n|   4 |     TABLE ACCESS FULL| EMPLOYEES |\n------------------------------------------\n\
  ```\n\n## 14-13. 提升星型模式查询性能\n\n### 问题\n\n你工作在一个包含星型模式的数据仓库环境中，并且希望提高查询的性能。\n\n###\
  \ 解决方案\n\nOracle 有一个特定的解决方案称为“星型转换”，旨在帮助提高数据仓库环境中针对星型模式的性能。Oracle 提供了`STAR_TRANSFORMATION`和`FACT`提示来帮助使用星型模式提高查询性能。在你的查询中，你可以使用`STAR_TRANSFORMATION`或`FACT`提示，或者两者都用。以下查询是如何使用这些提示的示例：\n\
  \n```sql\nSELECT /*+ star_transformation */ pr.prod_category, c.country_id,\nt.calendar_year,\
  \ sum(s.quantity_sold), SUM(s.amount_sold)\nFROM sales s, times t, customers c,\
  \ products pr\nWHERE s.time_id = t.time_id\nAND   s.cust_id = c.cust_id\nAND   pr.prod_id\
  \ = s.prod_id\nAND   t.calendar_year = '2011'\nGROUP BY pr.prod_category, c.country_id,\
  \ t.calendar_year;\n```\n\n要仅使用`FACT`提示，只需将事实表名或别名放在提示的括号内：\n\n```sql\nSELECT /*+\
  \ fact(s) */ pr.prod_category, c.country_id,\n```\n\n有时，当两个提示都存在时，优化器更有可能执行星型转换：\n\
  \n```sql\nSELECT /*+ star_transformation fact(s) */ pr.prod_category, c.country_id,\n\
  ```\n\n以下是经过星型转换的典型执行计划：\n\n```\n-----------------------------------------------------------------------\n\
  | Id  | Operation                                      | Name                  |\n\
  -----------------------------------------------------------------------\n|   0 |\
  \ SELECT STATEMENT                               |                       |\n|  \
  \ 1 |  HASH GROUP BY                                 |                       |\n\
  |   2 |   HASH JOIN                                    |                       |\n\
  |   3 |    HASH JOIN                                   |                       |\n\
  |   4 |     HASH JOIN                                  |                       |\n\
  |   5 |      PARTITION RANGE ALL                       |                       |\n\
  |   6 |       TABLE ACCESS BY LOCAL INDEX ROWID        | SALES                 |\n\
  |   7 |        BITMAP CONVERSION TO ROWIDS             |                       |\n\
  |   8 |         BITMAP AND                             |                       |\n\
  |   9 |          BITMAP MERGE                          |                       |\n\
  |  10 |           BITMAP KEY ITERATION                 |                       |\n\
  |  11 |            BUFFER SORT                         |                       |\n\
  |  12 |             TABLE ACCESS FULL                  | CUSTOMERS             |\n\
  |  13 |            BITMAP INDEX RANGE SCAN             | SALES_CUST_BIX        |\n\
  |  14 |          BITMAP MERGE                          |                       |\n\
  |  15 |           BITMAP KEY ITERATION                 |                       |\n\
  |  16 |            BUFFER SORT                         |                       |\n\
  |  17 |             VIEW                               | index$_join$_016      |\n\
  |  18 |              HASH JOIN                         |                       |\n\
  |  19 |               INDEX FAST FULL SCAN             | PRODUCTS_PK           |\n\
  |  20 |               INDEX FAST FULL SCAN             | PRODUCTS_PROD_CAT_IX  |\n\
  |  21 |            BITMAP INDEX RANGE SCAN             | SALES_PROD_BIX        |\n\
  |  22 |      TABLE ACCESS FULL                         | TIMES                 |\n\
  |  23 |     TABLE ACCESS FULL                          | CUSTOMERS             |\n\
  |  24 |    VIEW                                        | index$_join$_004      |\n\
  |  25 |     HASH JOIN                                  |                       |\n\
  |  26 |      INDEX FAST FULL SCAN                      | PRODUCTS_PK           |\n\
  |  27 |      INDEX FAST FULL SCAN                      | PRODUCTS_PROD_CAT_IX  |\n\
  -----------------------------------------------------------------------\n\n`Note`\n\
  `-----`\n`- star transformation used for this statement`\n```\n\n\n#### 工作原理\n\n\
  在开始运行星型查询之前，有两个关键的配置要素需要在星型转换发生前处理好：\n*   确保 `star_transformation_enabled` 参数被设置为\
  \ `TRUE`。\n*   确保在事实表上，每个维度外键列都有位图索引。\n\n如果你打算在星型模式中使用提示，无论是 `FACT` 提示还是 `STAR_TRANSFORMATION`\
  \ 提示，都默认你已拥有一个配置得当的环境，否则优化器不会使用这些提示。这些提示对于星型转换并非必需，但使用其中任何一个，优化器都会尝试进行转换。然而，即使有提示，优化器也可能根据它认为的最佳执行计划来选择忽略该请求。星型查询非常高效且性能优异，因为其转换是专门为在星型模式中操作而设计的。\n\
  \n如果出于某种原因，你想避免在查询中使用星型转换，只需使用 `no_star_transformation` 提示，优化器将绕过星型转换的使用：\n```sql\n\
  SELECT /*+ no_star_transformation */ pr.prod_category, c.country_id,\nt.calendar_year,\
  \ sum(s.quantity_sold), SUM(s.amount_sold)\nFROM sales s, times t, customers c,\
  \ products pr\nWHERE s.time_id = t.time_id\nAND   s.cust_id = c.cust_id\nAND   pr.prod_id\
  \ = s.prod_id\nAND   t.calendar_year = '2011'\nGROUP BY pr.prod_category, c.country_id,\
  \ t.calendar_year;\n```\n从执行计划中，我们可以看到优化器没有转换我们的查询：\n```\n---------------------------------------------------------\n\
  | Id  | Operation                        | Name         |\n---------------------------------------------------------\n\
  |   0 | SELECT STATEMENT                 |              |\n|   1 |  HASH GROUP BY\
  \                   |              |\n|   2 |   NESTED LOOPS                   |\
  \              |\n|   3 |    NESTED LOOPS                  |              |\n| \
  \  4 |     NESTED LOOPS                 |              |\n|   5 |      NESTED LOOPS\
  \                |              |\n|   6 |       PARTITION RANGE ALL        |  \
  \            |\n|   7 |        TABLE ACCESS FULL         | SALES        |\n|   8\
  \ |       TABLE ACCESS BY INDEX ROWID| PRODUCTS     |\n|   9 |        INDEX UNIQUE\
  \ SCAN         | PRODUCTS_PK  |\n|  10 |      TABLE ACCESS BY INDEX ROWID | CUSTOMERS\
  \    |\n|  11 |       INDEX UNIQUE SCAN          | CUSTOMERS_PK |\n|  12 |     INDEX\
  \ UNIQUE SCAN            | TIMES_PK     |\n|  13 |    TABLE ACCESS BY INDEX ROWID\
  \   | TIMES        |\n---------------------------------------------------------\n\
  ```\n有时，让星型转换发生可能有些棘手。至关重要的是，你已用所有适当的位图索引正确配置了星型模式。即使缺少一个位图索引也可能影响查询发生星型转换的能力，因此，彻底验证配置非常重要，尤其是关于位图索引的配置。一些星型模式还采用事实表和维度表之间的位图连接索引来帮助实现星型转换。\n\
  \n## 第 15 章 并行执行 SQL\n\n并行性可以通过为任务分配多个资源来帮助提高特定操作的性能。并行性最好在具有多个 CPU 的系统上使用，因为所使用的多个进程（即并行进程）将利用这些额外的\
  \ CPU 资源来更快地完成给定任务。\n\n通常，并行性也最好用于大表或索引，以及具有大量数据的数据库。它非常适合在本质上就很庞大的数据仓库环境中使用。并行性不太适合\
  \ OLTP 环境，因为这些系统具有事务性质。\n\n为了正确使用并行性，有几个重要因素需要理解：\n*   系统上的 CPU 数量\n*   相关初始化参数的正确配置\n\
  *   你想要为其调优并行的关键 SQL 语句\n*   在数据库上配置的并行度（DOP）\n*   目标 SQL 操作的实际性能与预期性能\n\n并行性最常见的陷阱之一是过度使用。它有时被视为调优和加速\
  \ SQL 操作的灵丹妙药。反过来，并行性实际上可能导致性能更差而不是更好。因此，对于 DBA 来说，至关重要的是要理解其系统的物理配置，并配置与并行性相关的参数以最适合系统。向数据库的开发人员和用户普及基本知识将提高并行操作的成功率。何时适合使用并行性？如何在\
  \ SQL 操作中正确启用并行性？哪种类型的操作可以并行化？并行性是一个强大的工具，有助于显著提高数据库操作的性能，但随之而来的是责任。\n\n本章重点介绍如何为并行性正确配置数据库、可并行化的关键操作、如何在\
  \ SQL 中引发并行性，以及一些用于查看并行操作是否以最佳方式运行的工具。\n\n### 15-1. 为特定查询启用并行性\n\n#### 问题\n\n你有一个访问大表数据的慢速查询。你想看看是否可以通过指示\
  \ Oracle 使用多个进程来检索数据，从而加快查询速度。\n\n#### 解决方案\n\n有两种不同类型的提示可以放在你的 SQL 中，尝试通过使用多个进程（即并行性）来加速查询。一种提示用于数据检索本身，另一种用于帮助加速读取表上的索引的过程。\n\
  \n##### 表的并行提示\n\n首先，你需要确定查询所需的并行度（DOP）。这指示 Oracle 将使用多少个进程来检索数据。其次，在查询内放置一个并行提示，指定要在其上执行并行\
  \ SQL 的表，以及用于查询的并行度，例如：\n```sql\nSELECT /*+ parallel(emp,4) */  empno, ename\nFROM\
  \ emp;\n```\n如果你在查询中使用表别名，则必须在提示中使用它，否则 Oracle 优化器将忽略该提示。\n```sql\nSELECT/*+ parallel(e,4)\
  \ */  empno, ename\nFROM emp e;\n```\n前面两个查询中的提示导致四个进程分担从 `EMP` 表读取行的工作。四个进程一起工作，就墙钟时间而言，会比一个进程独自完成所有工作更快地完成任务。\n\
  \n或者，你可以省略在提示中指定并行度。如果提示中只指定表名或别名，Oracle 将根据数据库初始化参数推导并行度，这可能给出也可能不给出你期望的并行度：\n\
  ```sql\nSELECT/*+ parallel(e) */  empno, ename\nFROM emp e;\n```\n\n##### 索引的并行提示\n\
  \n指定 `parallel_index` 提示以控制对索引的并行访问。通常，只有当索引是本地分区索引时，你才能并行访问它。在这种情况下，你可以应用 `parallel_index`\
  \ 提示。这是一个例子：\n```sql\nSELECT /*+ parallel_index(emp, emp_i4 ,4) */ empno, ename\n\
  FROM emp\nWHERE deptno = 10;\n```\n`parallel_index` 提示有两个参数：表名和索引名。与为表指定并行度一样，如果你在索引提示中省略了并行度，数据库本身将为查询计算并行度。\n\
  \n如果你为表使用了别名，则必须在提示中使用别名。有关示例，请参阅前面关于“表的并行提示”的部分。\n\n\n## 工作原理\n\n为了有效地使用并行提示，您需要考虑以下几项：\n\
  *   您查询中涉及的表数量\n*   您查询中表的大小\n*   您系统上的 CPU 数量\n*   您`WHERE`子句中的过滤列\n*   哪些列有索引（如果有的话）\n\
  \n在查询中使用并行提示之前，您还必须分析和理解系统的三个关键组件：\n*   系统配置，例如内存和 CPU 数量，甚至磁盘配置\n*   与并行性相关的数据库配置参数\n\
  *   对象本身（表和索引）上指定的并行度\n\n并行 SQL 必须谨慎使用，因为过度使用很常见，并且可能导致系统资源过度利用，最终导致性能`变慢`而非加快。过度使用是使用并行性时一个非常常见的错误。\n\
  \n根据查询中涉及的表的数量，您可能希望对一个或多个表启用并行性——这取决于它们的大小。一个经验法则是，如果一个表包含超过 1000 万行，或大小至少为 2GB，它可能是一个适合使用并行性的候选对象。\n\
  \n并行度应直接与系统上的 CPU 数量相关。如果您使用的是单 CPU 系统，使用并行 SQL 几乎没有（如果有的话）好处，结果返回速度甚至可能比完全不使用并行性还要慢。\n\
  \n要帮助确定是否可以在任何索引上使用并行性，您需要首先确定`WHERE`子句中的任何过滤列是否被索引。如果是，请检查表是否已分区。通常，对于大型表上的查询，`parallel_index`提示可能有助于提高查询速度。总的来说，在决定是否对查询使用并行性时，执行解释计划以确定是否会使用并行性是有帮助的。此外，查询中的某个对象可能已指定了并行性，因此在检查提示中的并行度之前，检查`USER_TABLES`或`USER_INDEXES`视图中的`DEGREE`列也是一个好主意。\n\
  \n表 15-1 显示了可以使用的不同并行提示。\n\n![images](img/t1501.jpg)\n\nOracle 为您提供了许多选项来帮助您确定合适的并行度，无论您是想自己指定，还是希望\
  \ Oracle 为您的查询确定并行度。表 15-2 简要描述了这些选项。\n\n![images](img/t1502.jpg)\n\n### 表的并行提示\n\
  \n为了确定查询中是否使用了并行性，首先对您的查询执行解释计划。以下是一个简单查询及其关联的执行计划：\n\n```\nselect * from emp;\n\
  ```\n\n```\n--------------------------------------------------------------------------\n\
  | Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n--------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |      |    14 |  1218 |     3   (0)| 00:00:01 |\n|  \
  \ 1 |  TABLE ACCESS FULL| EMP  |    14 |  1218 |     3   (0)| 00:00:01 |\n--------------------------------------------------------------------------\n\
  ```\n\n如果未使用并行性，您可以插入 parallel 提示，然后重新运行解释计划以验证优化器是否会在执行计划中使用并行性——例如：\n\n```\nselect\
  \ /*+ parallel(emp,4) */ * from emp;\n```\n\n```\n----------------------------------------------------------------------\n\
  | Id  | Operation            | Name     |    TQ  |IN-OUT| PQ Distrib |\n----------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT     |          |        |      |            |\n|   1 |\
  \  PX COORDINATOR      |          |        |      |            |\n|   2 |   PX SEND\
  \ QC (RANDOM)| :TQ10000 |  Q1,00 | P->S | QC (RAND)  |\n|   3 |    PX BLOCK ITERATOR\
  \ |          |  Q1,00 | PCWC |            |\n|   4 |     TABLE ACCESS FULL| EMP\
  \      |  Q1,00 | PCWP |            |\n----------------------------------------------------------------------\n\
  ```\n\n![images](img/square.jpg) `注意` 需要正确设置适当的数据库初始化参数，才能通过使用提示启用并行性。\n\n### 索引的并行提示\n\
  \n尽管并行化基于索引的查询要少见得多，但在某些情况下可能有益。例如，您可能希望并行化针对分区表的本地索引的查询。以下是一个示例查询及其产生的执行计划：\n\n\
  ```\nSELECT /*+ parallel_index(emp, emp_i3) */ empno, ename\nFROM emp\nWHERE hiredate\
  \ between '2010-01-01' and '2010-12-31';\n```\n\n```\n------------------------------------------------------------------------------------------\n\
  | Id  | Operation                                    | Name             |    TQ\
  \  |IN-OUT| PQ Dist |\n------------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT                             |                  |      \
  \  |      |         |\n|   1 |  PX COORDINATOR                              |  \
  \                |        |      |         |\n|   2 |   PX SEND QC (RANDOM)    \
  \                    | :TQ10000         |  Q1,00 | P->S |         |\n|   3 |   \
  \ PX PARTITION RANGE ITERATOR               |                  |  Q1,00 | PCWC |\
  \         |\n|   4 |     TABLE ACCESS BY LOCAL INDEX ROWID        | EMP        \
  \      |  Q1,00 | PCWP |         |\n|   5 |      INDEX RANGE SCAN              \
  \          | EMP_I3           |  Q1,00 | PCWP |         |\n------------------------------------------------------------------------------------------\n\
  ```\n\n在格式化提示时，您可以指定所有参数，以准确告知优化器使用哪个索引以及您期望的并行度。在以下查询中，我们告诉优化器希望使用`EMP_I3`索引，并行度为\
  \ 4。\n\n```\nSELECT /*+ parallel_index(emp, emp_i3, 4) */ empno, ename\nFROM emp\n\
  WHERE hiredate between '2010-01-01' and '2010-12-31';\n```\n\n如果您在提示中省略并行度，优化器将根据初始化参数设置确定并行度。例如，在以下示例中，提示中指定了表名和索引名，但未指定并行度。Oracle\
  \ 将在这些情况下为我们计算并行度。\n\n```\nSELECT /*+ parallel_index(emp, emp_i3) */ empno, ename\n\
  FROM emp\nWHERE hiredate between '2010-01-01' and '2010-12-31';\n```\n\n您也可以简单地在提示中放置表名，优化器也将确定可以使用哪个索引（如果有的话）。如果优化器确定没有合适的索引，则不会使用任何索引。在以下示例中，提示中只使用了表名：\n\
  \n```\nSELECT /*+ parallel_index(emp) */ empno, ename\nFROM emp\nWHERE hiredate\
  \ between '2010-01-01' and '2010-12-31';\n```\n\n![images](img/square.jpg) `注意`\
  \ 从 Oracle 11g 第 2 版开始，`NOPARALLEL`和`NOPARALLEL_INDEX`提示已被弃用。请改用`NO_PARALLEL`和`NO_PARALLEL_INDEX`。\n\
  \n## 15-2. 在创建对象时启用并行性\n\n### 问题\n\n您需要在数据库中创建新的表，这些表将增长到非常大的尺寸，并且您希望加快对这些表的查询速度。\n\
  \n"
- "# 启用并行性\n\n## 15-2. 为新建对象设置并行度\n\n### 解决方案\n\n为表或索引设置一个高于默认值的并行度（DOP），是启用多进程处理的一种简单直接的方法，能提供更一致和固定的行为。对表或索引启用并行性是通过\
  \ DDL 命令完成的。你可以在创建表或索引的 `CREATE` 语句中启用并行性。\n\n对于一个新表，如果你期望有能利用多进程的稳定查询，那么为对象设置一个固定的\
  \ DOP 可能比在 SQL 中添加提示（hint）或让 Oracle 为你设置 DOP 更方便。在以下示例中，我们为 `EMP` 表指定了 DOP 为 4：\n\
  \n```sql\nCREATE TABLE EMP\n(\n EMPNO NUMBER(4) CONSTRAINT PK_EMP PRIMARY KEY,\n\
  \ ENAME VARCHAR2(10),\n JOB VARCHAR2(9),\n MGR NUMBER(4),\n HIREDATE DATE,\n SAL\
  \ NUMBER(7,2),\n COMM NUMBER(7,2),\n DEPTNO NUMBER(2) CONSTRAINT FK_DEPTNO REFERENCES\
  \ DEPT\n)\nPARALLEL(DEGREE 4);\n```\n\n通过在表上放置一个静态的 DOP 值 4，任何访问 `EMP` 表的用户执行的每个查询都将使用\
  \ DOP 为 4。\n\n```sql\nselect * from emp;\n```\n\n```\n----------------------------------------------------------------------\n\
  | Id  | Operation            | Name     |    TQ  |IN-OUT| PQ Distrib |\n----------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT     |          |        |      |            |\n|   1 |\
  \  PX COORDINATOR      |          |        |      |            |\n|   2 |   PX SEND\
  \ QC (RANDOM)| :TQ10000 |  Q1,00 | P->S | QC (RAND)  |\n|   3 |    PX BLOCK ITERATOR\
  \ |          |  Q1,00 | PCWC |            |\n|   4 |     TABLE ACCESS FULL| EMP\
  \      |  Q1,00 | PCWP |            |\n----------------------------------------------------------------------\n\
  ```\n\n在创建索引时，也可以指定默认的 DOP。在某些情况下，创建索引时使用更高的 DOP 是有益的。对于大型分区表，在 `WHERE` 子句中常用的列上创建二次本地分区索引是很常见的。使用这些索引的一些查询可能会受益于增加\
  \ DOP。在以下 DDL 中，我们以 DOP 为 4 创建了这个索引：\n\n```sql\nCREATE INDEX EMP_I1\nON EMP (HIREDATE)\n\
  LOCAL\nPARALLEL(DEGREE 4);\n```\n\n### 工作原理\n\n直接在对象上设置并行性有助于多个进程更快地完成任务——无论是加速查询，还是帮助加速索引的创建。为了能够评估为对象设置的合适\
  \ DOP，你应该了解数据的访问模式。如果对对象的信息了解越少，设置的 DOP 就应该越保守。为一系列对象设置高 DOP 可能会像它帮助性能一样轻易地损害性能，因此启用对象\
  \ DOP 需要经过仔细的规划和考虑。\n\n![images](img/square.jpg) **提示** 如果启用了自动 DOP 并且配置正确（`PARALLEL_DEGREE_POLICY=AUTO`），那么你在对象上设置的并行性将被忽略，优化器会选择要使用的并行度。有关启用自动\
  \ DOP 的详细信息，请参见配方 15-10。\n\n## 15-3. 为现有对象启用并行性\n\n### 问题\n\n你有一系列运行缓慢的查询正在访问一组现有的数据库表，并且你希望采取措施来减少查询的执行时间。\n\
  \n### 解决方案\n\n为现有表或索引设置更高的 DOP 是一种更一致和固定的启用多进程的方法。设置表或索引的 DOP 是在 DDL 命令中完成的。你可以使用\
  \ `ALTER` 语句来更改表或索引的 DOP。例如，如果你有一个现有表需要更改 DOP 以适应希望利用多进程的用户查询，可以轻松地将其添加到表上，并立即生效。以下示例更改了表的默认\
  \ DOP：\n\n```sql\nALTER TABLE EMP\nPARALLEL(DEGREE 4);\n```\n\n如果过了一段时间，你希望重置表上的\
  \ DOP，也可以使用 `ALTER` 语句来完成。查看以下两个示例，了解如何重置表的 DOP：\n\n```sql\nALTER TABLE EMP\nPARALLEL(DEGREE\
  \ 1);\n```\n\n```sql\nALTER TABLE EMP\nNOPARALLEL;\n```\n\n如果你认为一个已存在的索引会受益于更高的\
  \ DOP，也可以轻松更改。与表一样，更改会立即生效。以下示例展示了如何更改索引的默认 DOP：\n\n```sql\nALTER INDEX EMP_I1\n\
  PARALLEL(DEGREE 4);\n```\n\n与表类似，你可以通过以下两种方式之一重置索引的 DOP：\n\n```sql\nALTER INDEX\
  \ EMP_I4\nPARALLEL(DEGREE 1);\n```\n\n```sql\nALTER INDEX EMP_I4\nNOPARALLEL;\n\
  ```\n\n### 工作原理\n\n增加现有对象的 DOP 是表明你数据库中访问表的查询已经存在性能问题的标志。监控并行性能是了解为对象或一组对象设置的 DOP\
  \ 是否合适的关键因素。检查 `V$PQ_TQSTAT` 中的数据以帮助确定已使用的 DOP，或检查 `V$SYSSTAT` 以帮助了解数据库上并行性的使用程度。请参阅配方\
  \ 15-12 获取使用这些数据字典视图的一些示例。\n\n## 15-4. 实现并行 DML\n\n### 问题\n\n你希望在执行 DML 操作（`INSERT`、`UPDATE`、`MERGE`、`DELETE`）时诱导并行性，以提高性能并减少事务时间。\n\
  \n### 解决方案\n\n如果在数据仓库环境或需要高容量批量事务的大型表环境中操作，并行 DML 可以帮助加快处理速度并减少执行这些操作所需的时间。并行 DML\
  \ 在数据库中默认是禁用的，必须使用以下语句显式启用：\n\n```sql\nALTER SESSION ENABLE PARALLEL DML;\n```\n\
  \n通过指定上述语句，它确实*启用*了会话中并行 DML 的可能性，但并不保证一定会发生。并行 DML 操作只会在特定条件下发生：\n\n*   在 DML 语句中指定了提示（hint）。\n\
  *   具有并行属性的表是 DML 语句的一部分。\n*   DML 操作满足语句并行运行的适当规则。使用并行 DML 的关键限制在本配方后面部分注明。\n\n\
  在某些情况下，你可能希望强制并行行为，无论你为对象设置了什么并行度，或者无论你在 DML 中放置了什么提示。因此，或者，你可以使用以下语句强制并行 DML：\n\
  \n```sql\nALTER SESSION FORCE PARALLEL DML;\n```\n\n作为一般规则，在常规运行的 DML 中强制使用并行 DML\
  \ 不是一个好的做法，因为它会很快消耗系统资源，导致性能开始下降。最好谨慎使用，它可以帮助处理偶尔的大型 DML 操作。\n\n\n"
- "# 工作原理\n\n并行 DML 可适用于任何 DML 操作——`INSERT`、`UPDATE`、`MERGE` 和 `DELETE`。根据你运行的 DML\
  \ 操作类型，规则略有不同。例如，若想并行运行 `INSERT` 语句，首先需为会话启用并行处理，然后使用适当的机制执行 `INSERT` 语句，以使 DML\
  \ 能够并行运行：\n\n`ALTER SESSION ENABLE PARALLEL DML;`\n\n`INSERT /*+ PARALLEL(DEPT,4)\
  \ */ INTO DEPT SELECT /*+ PARALLEL(DEPT_COPY,4) */ * FROM DEPT_COPY;`\n\n通过上述语句，我们在\
  \ `INSERT` 语句中加入了一个并行提示，同时在该语句的 `SELECT` 部分也加入了一个并行提示。需要记住一个非常重要的点：即使你的 DML 语句启用了并行处理，它也不会直接影响同一语句中相关查询的并行性。例如，以下语句的\
  \ DML 操作可以并行运行，但相应的 `SELECT` 语句将以串行模式运行，因为查询本身未指定并行性。\n\n`ALTER SESSION ENABLE PARALLEL\
  \ DML;`\n\n`INSERT /*+ PARALLEL(DEPT,4) */ INTO DEPT SELECT * FROM DEPT_COPY;`\n\
  \n为了充分利用并行能力，尝试将语句的所有部分都并行化。如果你并行化了 `INSERT` 但没有并行化 `SELECT`，那么 `SELECT` 部分就成了 `INSERT`\
  \ 的瓶颈，导致 `INSERT` 性能下降。\n\n并行 DML 操作也适用于 `UPDATE`、`MERGE` 和 `DELETE` 语句。假设你的公司很慷慨，决定给会计部门的每个员工加薪\
  \ 1%：\n\n`UPDATE /*+ PARALLEL(EMP,4) */ EMP SET SAL = SAL*1.01 WHERE DEPTNO=10;`\n\
  \n然后，几个月后，你的公司决定解雇那些在会计部门加过薪的员工：\n\n`DELETE /*+ PARALLEL(EMP,4) */ FROM EMP WHERE\
  \ DEPTNO=10;`\n\n在数据库中并行化 DML 事务的另一种方法是使用 `DBMS_PARALLEL_EXECUTE` PL/SQL 包。虽然配置更复杂，但使用此包运行并行化事务有一些关键优势：\n\
  \n*   整个事务被分割成若干部分，每部分都有自己的提交点。\n*   事务可重新启动。\n*   锁定仅作用于受影响的行。\n*   减少了 Undo 空间使用。\n\
  *   你可以更精细地控制工作如何划分。你可以通过多种方式划分工作：\n    *   按列\n    *   按 ROWID\n    *   按 SQL 语句\n\
  \n使用 `DBMS_PARALLEL_EXECUTE` 包的明显好处是能更好地控制大型事务的运行方式、增加功能性以及更高效地利用数据库资源。使用此包的主要权衡取舍是它配置、设置和运行起来更为复杂——但在处理海量数据时，这可能是非常值得的。\n\
  \n`![images](img/square.jpg)` `提示` 你必须执行 `ALTER SESSION ENABLE | FORCE PARALLEL\
  \ DML` 语句，才能使并行 DML 在你的事务中生效。\n\n## 并行 DML 的限制\n\n使用并行 DML 存在许多限制，你需要了解，即使处理大量数据，在某些情况下并行\
  \ DML 也可能无法实现：\n\n*   单行插入（使用 `VALUES` 子句）无法并行运行。\n*   在一个事务中，你只能对一个表进行一次修改。\n*\
  \   无法对带有触发器的表运行。\n*   带有某些约束的表可能不符合条件。\n*   对带有对象或 LOB 列的表，并行 DML 功能有限。\n*   对临时表，并行\
  \ DML 功能有限。\n*   分布式事务无法并行化。\n\n## 并行度\n\n一旦你提交一个并行化的 DML 操作以供执行，Oracle 会根据一组优先规则，确定将用于整个提交语句的并行度。理解这些规则很重要，这样你才能获得事务所期望的并行度。\n\
  \n对于 DML 事务，Oracle 应用以下基本优先规则来确定并行度：\n\n1.  检查 `INSERT`、`UPDATE`、`MERGE` 或 `DELETE`\
  \ 语句上是否指定了提示。\n2.  检查是否存在任何会话级指令。\n3.  检查目标对象上的对象级并行性。\n4.  在语句查询部分所涉及的查询表或任何关联索引中，选择指定的最大并行度（仅适用于插入）。\n\
  \n为语句的插入和查询部分选择合适的并行度后，查询即被执行。请注意，为语句每个部分选择的并行度可以不同。\n\n## 其他注意事项\n\n使用并行 DML 可能很复杂，因为涉及的对象类型、是否是分区表、对象上指定的并行度、语句中指定的提示以及并行参数设置等，存在多种可能的排列组合。\n\
  \n以下是使用并行 DML 时需要考虑的其他一些因素：\n\n*   对于并行化的插入事务，会执行直接路径加载。\n*   在决定是否使用并行 DML 时，你必须权衡你将获得的性能提升与该操作的空间使用量。并行化的\
  \ `INSERT` 语句速度快，但占用更多空间。如果你为插入事务指定了并行度为 4，那么将为该操作分配 4 个区。你必须根据自身需求判断哪个更重要。\n* \
  \  如果对象是分区表，可能会影响并行 DML 事务的运行方式。\n\n"
- '# 15-5. 并行创建表


  ## 问题


  你需要从现有的大型表中快速创建一个新表，并希望利用多进程来帮助加速表的创建。


  ## 解决方案


  如果你正在管理超大型数据库，或者需要重建大型表，并行 DDL 速度快，并且比运行并行 DML 更有优势。速度是选择使用并行 DDL 从现有大型表创建表的最大因素。在你的特定
  DDL 命令中，有一个 `PARALLEL` 子句来决定是否并行执行操作。这是通过使用 `CREATE TABLE ... AS SELECT` 操作完成的：


  ```

  CREATE TABLE EMP_COPY

  PARALLEL(DEGREE 4)

  AS

  SELECT * FROM EMP;

  ```


  ```

  ------------------------------------------------------------------------

  | Id  | Operation              | Name     |    TQ  |IN-OUT| PQ Distrib |

  ------------------------------------------------------------------------

  |   0 | CREATE TABLE STATEMENT |          |        |      |            |

  |   1 |  PX COORDINATOR        |          |        |      |            |

  |   2 |   PX SEND QC (RANDOM)  | :TQ10000 |  Q1,00 | P->S | QC (RAND)  |

  |   3 |    LOAD AS SELECT      | EMP_COPY |  Q1,00 | PCWP |            |

  |   4 |     PX BLOCK ITERATOR  |          |  Q1,00 | PCWC |            |

  |   5 |      TABLE ACCESS FULL | EMP      |  Q1,00 | PCWP |            |

  ------------------------------------------------------------------------

  ```




  '
- "# 工作原理\n\n并行 DDL 之所以流行，是因为它是在大量数据上执行操作的一种快速方式。工作被分成若干部分并发执行。假设你刚买了一栋新房子，正在搬家过程中。如果你正在用卡车装载箱子，四个人一起装肯定比一个人快得多。此外，并行\
  \ DDL 是在 DDL 命令掩护下执行 DML 类型操作的一种有吸引力的方式。\n\n使用 `CREATE TABLE ... AS SELECT` 最常见的原因包括以下几点：\n\
  \n*   表结构已更改，需要重建表。\n*   为某些特定应用目的创建类似结构。\n*   从表中删除大量行。\n*   需要从一个大表中删除多个列。\n\n\
  上述一些操作也可以严格使用并行 DML 来处理，但使用并行 DDL 相对于并行 DML 有一个明显的优势。由于 DDL 操作无法回滚，因此不会为这些操作生成撤销（undo），这使得操作更加高效。\n\
  \n并行 DDL 操作的并行度（DOP）由对象的 DOP 决定。这也包括语句中的查询部分。如果你选择，可以通过执行以下命令来覆盖对象的 DOP：\n\n`ALTER\
  \ SESSION FORCE PARALLEL DDL;`\n\n如果你有一个非常大的表，需要从中删除许多行，请考虑使用 `CREATE TABLE ...\
  \ AS SELECT`，而不是使用 DML `DELETE` 语句。删除行是一项昂贵的操作。在大型数据仓库环境中，当需要删除大量行时，执行删除操作的成本和时间可能会变得难以控制。由于删除操作的性质，它对数据库来说非常耗费资源，因为执行该操作会产生大量的重做（redo）和撤销（undo）。一个好的经验法则是，如果你正在删除一个表中不到\
  \ 5-10% 的行，直接创建一个包含所有你想要保留的行的新表可能会更快。\n\n下面是一个示例，我们从包含 1,234,568 行的 `EMP` 表中删除大约\
  \ 20% 的行：\n\n```\n  delete /*+ parallel(emp,4) */ from emp\n  where empno > 1000000\n\
  SQL> /\n\n234568 rows deleted.\n\nElapsed: 00:00:09.94\n\n--------------------------------------------------------------------------\n\
  | Id  | Operation                | Name     |    TQ  |IN-OUT| PQ Distrib |\n--------------------------------------------------------------------------\n\
  |   0 | DELETE STATEMENT         |          |        |      |            |\n|  \
  \ 1 |  PX COORDINATOR          |          |        |      |            |\n|   2\
  \ |   PX SEND QC (RANDOM)    | :TQ10001 |  Q1,01 | P->S | QC (RAND)  |\n|   3 |\
  \    INDEX MAINTENANCE     | EMP      |  Q1,01 | PCWP |            |\n|   4 |  \
  \   PX RECEIVE           |          |  Q1,01 | PCWP |            |\n|   5 |    \
  \  PX SEND RANGE       | :TQ10000 |  Q1,00 | P->P | RANGE      |\n|   6 |      \
  \ DELETE             | EMP      |  Q1,00 | PCWP |            |\n|   7 |        PX\
  \ BLOCK ITERATOR |          |  Q1,00 | PCWC |            |\n|   8 |          TABLE\
  \ ACCESS FULL| EMP      |  Q1,00 | PCWP |            |\n--------------------------------------------------------------------------\n\
  ```\n\n这个删除操作耗时 9.94 秒。如果我们现在运行一个 `CREATE TABLE ... AS SELECT` 语句来实现相同的结果，我们可以看到性能上的差异。\n\
  \n```\ncreate table emp_ctas_new2\nparallel(degree 4)\nnologging\nas select /*+\
  \ parallel(a,4) */ * from emp_ctas\nwhere empno <= 1000000\nSQL> /\nElapsed: 00:00:01.70\n\
  \n--------------------------------------------------------------------------------------\n\
  | Id  | Operation                        | Name         |    TQ  |IN-OUT| PQ Distrib\
  \ |\n--------------------------------------------------------------------------------------\n\
  |   0 | CREATE TABLE STATEMENT           |              |        |      |      \
  \      |\n|   1 |  PX COORDINATOR                  |              |        |   \
  \   |            |\n|   2 |   PX SEND QC (RANDOM)            | :TQ10001     |  Q1,01\
  \ | P->S | QC (RAND)  |\n|   3 |    LOAD AS SELECT                | EMP_CTAS_NEW\
  \ |  Q1,01 | PCWP |            |\n|   4 |     PX RECEIVE                   |   \
  \           |  Q1,01 | PCWP |            |\n|   5 |      PX SEND ROUND-ROBIN   \
  \      | :TQ10000     |        | S->P | RND-ROBIN  |\n|   6 |       TABLE ACCESS\
  \ BY INDEX ROWID| EMP_CTAS     |        |      |            |\n|   7 |        INDEX\
  \ RANGE SCAN          | EMP_CTAS_PK  |        |      |            |\n--------------------------------------------------------------------------------\n\
  ```\n\n创建表耗时 1.7 秒，比使用 `DELETE` 语句执行相同操作快了 5 倍以上。但是，如果表上有索引，你需要在选择此方法之前考虑这个因素，因为如果你重新创建一个表，还必须为该表重新创建相关的索引。尽管如此，它仍然可能更快，因为你可以并行地重新创建任何索引。\n\
  \n请记住，尽管前面的示例在这些语句上使用了并行 DDL，但即使你以串行模式运行，这个概念同样成立。当你需要从表中删除大量行时，`CREATE TABLE ...\
  \ AS SELECT` 与并行执行的 DDL 或非并行串行执行的 DDL 下的 `DELETE` 相比，都是一个有利的选择。\n\n并行创建表的一个潜在缺点是，这些操作的空间分配可能会导致表比串行创建时更碎片化。这是在并行创建表时应该考虑的一个权衡。操作中指定的\
  \ DOP 会生成相应数量的并行线程，并为每个线程分配一个区（extent）。因此，如果你为并行操作指定了 DOP 为 4，那么该操作至少会分配 4 个区。根据表空间的\
  \ `MINIMUM EXTENT` 大小，Oracle 会尝试在操作结束时修剪未使用的空间。不过，你应该预料到，并行创建表操作的空间效率确实不如串行运行的操作。\n\
  \n### 15-6. 并行创建索引\n\n#### 问题\n\n你需要尽快为一个大表创建索引，并希望使用多个进程来帮助加速索引创建。\n\n#### 解决方案\n\
  \n任何时候拥有一个大表时，始终使用并行 DDL 创建该表的任何关联索引都是一个好主意，即使你希望索引的 DOP 在查询时是非并行化的。并行创建索引的主要好处是它确实能大大减少创建索引的时间。为一个大表并行创建索引总是有意义的，然后可以在创建操作完成后选择重置用于查询的\
  \ DOP。在以下示例中，我们使用 DOP 为 4 来创建索引，该 DOP 将在创建索引的过程中使用：\n\n```\nCREATE INDEX EMP_COPY_I1\n\
  ON EMP_COPY (HIREDATE)\nPARALLEL(DEGREE 4);\n```\n\n然后，在索引创建完成后，我们可以选择使用以下任一示例将\
  \ DOP 重置为不同的值供查询使用：\n\n`ALTER INDEX EMP_COPY_I1 NOPARALLEL;`\n`ALTER INDEX EMP_COPY_I1\
  \ PARALLEL(DEGREE 1);`\n\n\n\n## 15-7. 并行重建索引\n\n### 问题\n\n你有一个现有的索引需要快速重建，并且希望使用多个进程来加速索引重建过程。\n\
  \n### 解决方案\n\n可能会出现需要重建索引的情况，其原因与重新创建索引的许多理由相同。要并行重建索引，请使用 `ALTER INDEX` 命令：\n\n\
  ```sql\nALTER INDEX EMP_COPY_I1\nREBUILD\nPARALLEL(DEGREE 4);\n```\n\n```sql\n--------------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name        |    TQ  |IN-OUT| PQ Distrib |\n\
  --------------------------------------------------------------------------------\n\
  |   0 | ALTER INDEX STATEMENT       |             |        |      |            |\n\
  |   1 |  PX COORDINATOR             |             |        |      |            |\n\
  |   2 |   PX SEND QC (ORDER)        | :TQ10001    |  Q1,01 | P->S | QC (ORDER) |\n\
  |   3 |    INDEX BUILD NON UNIQUE   | EMP_COPY_I1 |  Q1,01 | PCWP |            |\n\
  |   4 |     SORT CREATE INDEX       |             |  Q1,01 | PCWP |            |\n\
  |   5 |      PX RECEIVE             |             |  Q1,01 | PCWP |            |\n\
  |   6 |       PX SEND RANGE         | :TQ10000    |  Q1,00 | P->P | RANGE      |\n\
  |   7 |        PX BLOCK ITERATOR    |             |  Q1,00 | PCWC |            |\n\
  |   8 |         INDEX FAST FULL SCAN| EMP_COPY_I1 |  Q1,00 | PCWP |            |\n\
  --------------------------------------------------------------------------------\n\
  ```\n\n如果你需要重建大型本地索引的一个分区，也可以使用并行来执行此操作。请参见以下示例：\n\n```sql\nALTER INDEX emppart_i1\n\
  REBUILD PARTITION emppart2001_p\nPARALLEL(DEGREE 4);\n```\n\n```sql\n--------------------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name       | Pstart| Pstop |IN-OUT| PQ Distrib\
  \ |\n--------------------------------------------------------------------------------------\n\
  |   0 | ALTER INDEX STATEMENT       |            |       |       |      |      \
  \      |\n|   1 |  PX COORDINATOR             |            |       |       |   \
  \   |            |\n|   2 |   PX SEND QC (ORDER)        | :TQ10001   |       | \
  \      | P->S | QC ORDER)  |\n|   3 |    INDEX BUILD NON UNIQUE   | EMPPART_I1 |\
  \       |       | PCWP |            |\n|   4 |     SORT CREATE INDEX       |   \
  \         |       |       | PCWP |            |\n|   5 |      PX RECEIVE       \
  \      |            |       |       | PCWP |            |\n|   6 |       PX SEND\
  \ RANGE         | :TQ10000   |       |       | P->P | RANGE      |\n|   7 |    \
  \    PX BLOCK ITERATOR    |            |     2 |     2 | PCWC |            |\n|\
  \   8 |         INDEX FAST FULL SCAN| EMPPART_I1 |     2 |     2 | PCWP |      \
  \      |\n--------------------------------------------------------------------------------------\n\
  ```\n\n### 工作原理\n\n重建索引与从头重新创建索引相比，有一个关键优势，也有一个关键劣势。重建索引的优势在于，在重建操作完成之前，现有索引仍保持原位，因此可以被与重建过程并发运行的查询所使用。索引重建过程的主要缺点是，在重建期间你需要为两个索引都准备好空间。重建索引的一些关键原因包括：\n\
  \n*   重建随时间推移而变得碎片化的索引\n*   在大量、直接路径加载数据后重建索引\n*   你希望将索引移动到不同的表空间\n*   由于关联表上的分区级操作，索引处于不可用状态。\n\
  \n## 15-8. 并行移动分区\n\n### 问题\n\n你需要将一个表分区移动到不同的表空间，并希望使用多个进程来完成此任务。\n\n### 解决方案\n\
  \n假设你想将一个表分区移动到另一个表空间。例如，你在较慢、较便宜的存储上创建了一个表空间，并希望将较旧的数据移动到那里，以降低数据库的整体存储成本。要并行移动表分区以重建分区，你会发出如下命令：\n\
  \n```sql\nALTER TABLE EMP\nMOVE PARTITION P2\nTABLESPACE EMP_S\nPARALLEL(DEGREE\
  \ 4);\n```\n\n### 工作原理\n\n用于移动分区的 `ALTER TABLE` 语句是移动分区表数据的一种简单、高效的方法。与本章中展示的其他一些并行\
  \ DDL 操作一样，需要将表分区移动到不同表空间的原因有几种：\n\n*   你正在将较旧的数据移动到更便宜、更慢的存储上。\n*   你正在将一系列分区整合到一个表空间中。\n\
  *   你正在将某些分区移动到单独的表空间，以对数据类型进行逻辑分组。\n\n表分区通常用于存储历史数据。随着时间的推移，分区表经常需要进行分区维护。通过在移动数据库中表的分区时启用并行处理，可以更简单、更快地完成操作。随着维护窗口缩小和数据访问需求增长，这有助于更快地执行必要的分区移动，同时减少数据库表的停机时间。\n\
  \n## 15-9. 并行拆分分区\n\n### 问题\n\n你有一个包含大量数据的分区，并希望将该较大的分区拆分为两个或更多较小的分区。\n\n### 解决方案\n\
  \n作为数据库管理员（DBA），有时会出现需要拆分分区的情况，此操作也可以并行完成。例如，假设你有一个分区表，其中包含一个包含大量数据的默认高端分区，并且你希望将该数据拆分为多个分区。在这种情况下，你可以并行拆分该默认分区，以加速分区拆分过程。以下是一个使用并行拆分分区的示例：\n\
  \n```sql\nALTER TABLE EMP\nSPLIT PARTITION PMAX at ('2011-04-01') INTO\n(PARTITION\
  \ P4 TABLESPACE EMP_S,\nPARTITION PMAX TABLESPACE EMP_S)\nPARALLEL(DEGREE 4);\n\
  ```\n\n\n#### 工作原理\n\n添加并行性可以加速拆分包含大量数据的分区的过程。以下是一个包含超过 1600 万行数据的分区示例，为拆分操作启用并行性减少了该操作所需的时间。首先，以并行方式执行拆分：\n\
  \n```sql\nALTER TABLE EMPPART SPLIT PARTITION emppart2000_p AT ('2000-01-01')\n\
  INTO (PARTITION emppart1990_p, PARTITION emppart2000_p)\nPARALLEL(DEGREE 4);\n```\n\
  \n`表已更改。`\n\n`已用时间: 00:00:53.61`\n\n然后，在一个类似的表上执行了相同的拆分操作，以查看串行执行拆分操作对性能的影响：\n\n\
  ```sql\nALTER TABLE EMPPART2 SPLIT PARTITION emppart2000_p AT ('2000-01-01')\nINTO\
  \ (PARTITION emppart1990_p, PARTITION emppart2000_p);\n```\n\n`表已更改。`\n\n`已用时间:\
  \ 00:01:05.36`\n\n再次提醒，对于并行操作，需要为每个并行操作分配一个区间。对于前面的分区拆分操作，使用了并行性的表分配了明显更多的区间：\n\n\
  ```sql\nSELECT segment_name, partition_name, extents\nFROM dba_segments\nWHERE segment_name\
  \ LIKE '%EMP%'\nAND owner = 'SCOTT'\nORDER BY 2,1;\n```\n\n```text\nSEGMENT_NAME\
  \          PARTITION_NAME       EXTENTS\n-------------------- --------------------\
  \ ----------\nEMPPART               EMPPART1990_P               335\nEMPPART2  \
  \            EMPPART1990_P               121\nEMPPART               EMPPART2000_P\
  \               338\nEMPPART2              EMPPART2000_P               125\n```\n\
  \n### 15-10. 启用自动并行度\n\n#### 问题\n\n你希望允许 Oracle 自动确定 SQL 语句是否应并行执行以及应使用何种并行度。\n\n\
  #### 解决方案\n\n将 `PARALLEL_DEGREE_POLICY` 设置为 `AUTO`，以允许 Oracle 决定语句是否并行运行。你可以在系统级别或会话级别进行设置。要为所有\
  \ SQL 语句设置，请运行以下命令：\n\n```sql\nalter system set parallel_degree_policy=auto scope=both;\n\
  ```\n\n要为单个 SQL 语句设置，你可以修改会话以启用自动并行度：\n\n```sql\nalter session set parallel_degree_policy=auto;\n\
  ```\n\n#### 工作原理\n\n默认情况下，Oracle 仅在表设置了并行度或使用了并行提示时才会并行执行语句。你可以通过 `PARALLEL_DEGREE_POLICY`\
  \ 初始化参数，指示 Oracle 自动考虑对语句使用并行性。当 `PARALLEL_DEGREE_POLICY` 设置为 `AUTO` 时，Oracle 在发出\
  \ SQL 语句后执行以下步骤：\n\n1.  解析语句。\n2.  检查 `PARALLEL_MIN_TIME_THRESHOLD` 参数：\n    * \
  \  如果执行时间小于设定的阈值，则该语句不使用并行性运行。\n    *   如果执行时间大于设定的阈值，则该语句将根据优化器计算出的自动并行度并行运行。\n\
  \n`PARALLEL_DEGREE_POLICY` 可设置为三个不同的值：`AUTO`、`LIMITED` 和 `MANUAL`。`MANUAL` 是默认值，会关闭自动并行度。`LIMITED`\
  \ 指示 Oracle 仅在那些显式设置了并行性的对象上使用自动并行度。`AUTO` 设置则让 Oracle 完全控制自动并行度的设置。使用自动并行度的一个先决条件是运行\
  \ `DBMS_RESOURCE_MANAGER.CALIBRATE_IO` 过程。该过程只需运行一次，它会收集系统硬件特性的信息。\n\n采用自动并行度后，Oracle\
  \ 不再基于可用的并行从属进程数量来降低并行操作的等级，而是使用 Oracle 11g R2 中的一项新特性，称为语句排队。通过语句排队，语句不会被降级，并将始终以其指定的并行度运行。如果没有足够的从属进程来满足该并行度，语句将被排队，直到有足够的资源可用。虽然看起来排队实际上可能会降低数据库中查询的性能，因为某些语句可能必须等待指定的并行度变为可用，但此设计旨在提高数据库的整体并行性能，因为以指定并行度运行较少语句的表现，通常优于运行更多但其中一些被降低了并行度的语句。还有许多其他与并行性相关的参数可以设置。表\
  \ 15-3 列出了其他一些你可能需要为应用程序考虑的并行参数。\n\n![images](img/t1503.jpg)\n\n![images](img/t1503a.jpg)\n\
  \n### 15-11. 检查并行执行计划\n\n#### 问题\n\n你想了解如何读取并行执行计划。\n\n\n### 解决方案\n\n阅读执行计划时，应从最内层到最外层、自下而上地解读。例如，这是我们使用并行提示针对\
  \ `EMP` 表执行的并行执行计划：\n\n```\nselect /*+ parallel(emp,4) */ * from emp;\n```\n\n```\n\
  ----------------------------------------------------------------------\n| Id  |\
  \ Operation            | Name     |    TQ  |IN-OUT| PQ Distrib |\n----------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT     |          |        |      |            |\n|   1 |\
  \  PX COORDINATOR      |          |        |      |            |\n|   2 |   PX SEND\
  \ QC (RANDOM)| :TQ10000 |  Q1,00 | P->S | QC (RAND)  |\n|   3 |    PX BLOCK ITERATOR\
  \ |          |  Q1,00 | PCWC |            |\n|   4 |     TABLE ACCESS FULL| EMP\
  \      |  Q1,00 | PCWP |            |\n----------------------------------------------------------------------\n\
  ```\n\n从上述计划的底部开始看，我们正在对 `EMP` 表执行全表扫描。紧接在表扫描之上的 `PX BLOCK ITERATOR` 负责接收这个全表扫描请求，并根据指定的并行度将其分解为多个块。`PX\
  \ SEND` 进程将数据传递给消费进程。最后，`PX COORDINATOR` 是查询协调器用来从特定并行进程接收数据并返回给 `SELECT` 语句的进程。\n\
  \n如果您查看执行计划中的 `IN-OUT` 列，可以看到操作的执行流程，并判断是否存在任何瓶颈，或者计划中是否存在未并行化的部分，这可能导致预期性能下降。如\
  \ 表 15-5 所示，通常表明可能存在瓶颈的操作是 `PARALLEL_FROM_SERIAL` 操作，因为它意味着并行进程是从串行操作中生成的，这表示流程中存在低效。\n\
  \n例如，您有一个按国家地区划分的系列员工表，某用户正在执行查询以从其中几个表中获取信息。然而，查询的构成方式导致了瓶颈。\n\n```\nselect /*+\
  \ parallel(emp_north,4) */ * from emp_north\nunion\nselect * from emp_south;\n```\n\
  \n```\n------------------------------------------------------------------------------------\n\
  | Id  | Operation                      | Name          |    TQ  |IN-OUT| PQ Distrib\
  \ |\n------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT               |               |        |      |       \
  \     |\n|   1 |  PX COORDINATOR                |               |        |     \
  \ |            |\n|   2 |   PX SEND QC (RANDOM)          | :TQ10002      |  Q1,02\
  \ | P->S | QC (RAND)  |\n|   3 |    SORT UNIQUE                 |              \
  \ |  Q1,02 | PCWP |            |\n|   4 |     PX RECEIVE                 |     \
  \          |  Q1,02 | PCWP |            |\n|   5 |      PX SEND HASH           \
  \   | :TQ10001      |  Q1,01 | P->P | HASH       |\n|   6 |       BUFFER SORT  \
  \            |               |  Q1,01 | PCWP |            |\n|   7 |        UNION-ALL\
  \               |               |  Q1,01 | PCWP |            |\n|   8 |        \
  \ PX BLOCK ITERATOR      |               |  Q1,01 | PCWC |            |\n|   9 |\
  \          TABLE ACCESS FULL     | EMP_NORTH     |  Q1,01 | PCWP |            |\n\
  |  10 |         BUFFER SORT            |               |  Q1,01 | PCWC |       \
  \     |\n|  11 |          PX RECEIVE            |               |  Q1,01 | PCWP\
  \ |            |\n|  12 |           PX SEND ROUND-ROBIN  | :TQ10000      |     \
  \   | S->P |RND-ROBIN   |\n|  13 |            TABLE ACCESS FULL   | EMP_SOUTH  \
  \   |        |      |            |\n------------------------------------------------------------------------------------\n\
  ```\n\n从上述执行计划输出中可以看出，`PX SEND` 进程是串行的，并且正在发送数据以馈入并行进程。这代表了此查询中的一个瓶颈。如果我们更改查询的所有方面以并行运行，可以看到执行计划有所改进：\n\
  \n```\nselect /*+ parallel(emp_north,4) */ * from emp_north\nunion\nselect /*+ parallel(emp_south,4)\
  \ */ * from emp_south;\n```\n\n```\n-------------------------------------------------------------------------------\n\
  | Id  | Operation                | Name          |    TQ  |IN-OUT| PQ Distrib |\n\
  -------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT         |               |        |      |            |\n\
  |   1 |  PX COORDINATOR          |               |        |      |            |\n\
  |   2 |   PX SEND QC (RANDOM)    | :TQ10001      |  Q1,01 | P->S | QC (RAND)  |\n\
  |   3 |    SORT UNIQUE           |               |  Q1,01 | PCWP |            |\n\
  |   4 |     PX RECEIVE           |               |  Q1,01 | PCWP |            |\n\
  |   5 |      PX SEND HASH        | :TQ10000      |  Q1,00 | P->P | HASH       |\n\
  |   6 |       UNION-ALL          |               |  Q1,00 | PCWP |            |\n\
  |   7 |        PX BLOCK ITERATOR |               |  Q1,00 | PCWC |            |\n\
  |   8 |         TABLE ACCESS FULL| EMP_NORTH     |  Q1,00 | PCWP |            |\n\
  |   9 |        PX BLOCK ITERATOR |               |  Q1,00 | PCWC |            |\n\
  |  10 |         TABLE ACCESS FULL| EMP_SOUTH     |  Q1,00 | PCWP |            |\n\
  -------------------------------------------------------------------------------\n\
  ```\n\n### 工作原理\n\n表 15-4 和 15-5 描述了可用于确定并行操作执行计划的基本信息。要理解解读执行计划输出的基础知识，您应该了解两个方面：\n\
  \n*   可能的并行执行步骤（表 15-4）\n*   每个步骤中发生的并行操作（表 15-5）\n\n执行步骤是并行化计划的各个方面，而并行执行计划中发生的操作可以帮助您判断计划是否已优化，还是需要调整和改进。\n\
  \n与非并行操作一样，执行计划工具是确定优化器计划如何完成当前任务的非常有用的工具。在并行执行操作时，执行计划有与并行性相关的特定方面。理解这些非常重要，这样您才能判断操作是否以尽可能最优的方式运行。分析并行执行计划的一个关键方面是判断计划的任何部分是否以串行方式运行，因为这种瓶颈会降低给定操作的整体性能。这就是为什么理解执行计划中与并行操作相关的方面至关重要，最终目标是使操作的所有方面都实现并行化。\n\
  \n![images](img/t1504.jpg)\n\n![images](img/t1505.jpg)\n\n## 15-12. 监控并行操作\n\n###\
  \ 问题\n\n您希望快速从数据库获取有关并行操作性能的信息。\n\n\n## 解决方案\n\n如果你查看 `V$SYSSTAT` 视图（该视图提供数据库中系统级统计信息，包括与并行相关的统计数据），你可以快速浏览到请求的并行度（DOP）是否实际被使用，以及是否有操作被降级：\n\
  \n```sql\nSELECT name , value\nFROM v$sysstat\nWHERE name LIKE '%Parallel%';\n```\n\
  \n```\n---------------------------------------------------------------- ----------\n\
  Parallel operations not downgraded                                    10331\nParallel\
  \ operations downgraded to serial                                 0\nParallel operations\
  \ downgraded 75 to 99 pct                             0\nParallel operations downgraded\
  \ 50 to 75 pct                             0\nParallel operations downgraded 25\
  \ to 50 pct                             0\nParallel operations downgraded 1 to 25\
  \ pct                              1\n\n6 rows selected.\n```\n\n如果你查看 `V$PQ_SYSSTAT`\
  \ 视图，你可以看到数据库中并行从属进程的活动情况。通过查看这些统计数据，你可以快速了解数据库上的并行是否配置得当。例如，如果你看到 `Servers Shutdown`\
  \ 和 `Servers Started` 的值很高，则可能表明 `PARALLEL_MIN_SERVERS` 参数设置得太低，因为系统需要持续启动和停止并行进程，从而产生了开销。\n\
  \n```sql\nSELECT * FROM v$pq_sysstat\nWHERE statistic LIKE 'Server%';\n```\n\n```\n\
  STATISTIC                                 VALUE\n------------------------------\
  \ --------------------\nServers Busy                                   0\nServers\
  \ Idle                                   0\nServers Highwater                  \
  \            4\nServer Sessions                                8\nServers Started\
  \                                4\nServers Shutdown                           \
  \    4\nServers Cleaned Up                             0\n\n7 rows selected.\n```\n\
  \n如果你在寻找关于某个并行操作的会话级统计信息，查看 `V$PQ_TQSTAT` 视图对于确定工作如何在并行从属进程之间拆分非常有用，同时它也能根据 `V$PQ_TQSTAT`\
  \ 中的信息提供实际使用的并行度。让我们使用提示（hint）指定并行度为 4，再次对 `EMP` 表运行并行查询。\n\n```sql\nSELECT /*+\
  \ parallel(emp,4) */ * FROM emp;\n```\n\n查询完成后（仍在同一会话中），我们可以查询 `V$PQ_TQSTAT` 来获取该查询所用并行操作的信息：\n\
  \n```sql\nSELECT dfo_number, tq_id, server_type, process, num_rows, bytes\nFROM\
  \ v$pq_tqstat\nORDER BY dfo_number DESC, tq_id, server_type DESC , process;\n```\n\
  \n```\nDFO_NUMBER        TQ_ID SERVER_TYP PROCESS        NUM_ROWS      BYTES\n----------\
  \ ---------- ---------- ---------- ---------- ----------\n         1          0\
  \ Producer   P000             298629   13211118\n         1          0 Producer\
  \   P001             302470   13372088\n         1          0 Producer   P002  \
  \           315956   13978646\n         1          0 Producer   P003           \
  \  317512   14052340\n         1          0 Consumer   QC              1234567 \
  \  54614192\n```\n\n我们可以看到，在四个生产者并行从属进程之间，工作分配得相当均匀。我们还可以确认此查询实际使用的并行度是 4，与查询提示中指定的一致。\n\
  \n## 工作原理\n\n分析数据库中并行操作性能的最快方法之一是分析动态性能视图。这些视图让你得以一窥数据库中并行处理的整体表现，从而可以指示你的数据库针对并行的调优是好是坏。它还可以提供非常具体的会话级详细信息，例如工作如何在从属进程之间拆分，以及给定操作实际使用的并行度信息。表\
  \ 15-6 概述了与并行相关的动态性能视图。\n\n![images](img/t1506.jpg)\n\n## 15-13. 查找并行进程中的瓶颈\n\n\
  ## 问题\n\n你有一些并行进程性能不佳，希望进行分析以找出瓶颈。\n\n## 解决方案\n\n有许多与并行相关的等待事件。其中许多事件被认为是“空闲”等待事件——也就是说，它们通常不表示问题。如果你查询\
  \ `V$SYSTEM_EVENT` 视图，可以了解数据库实例中发生的与并行相关的等待。以下查询结果显示了一些可能发生的常见等待事件：\n\n```sql\n\
  SELECT event, wait_class, total_waits\nFROM v$session_event\nWHERE event LIKE 'PX%';\n\
  ```\n\n```\nEVENT                                      WAIT_CLASS   TOTAL_WAITS\n\
  ------------------------------------------ ------------ -----------\nPX Deq Credit:\
  \ need buffer                 Idle               6667936\nPX Deq Credit: send blkd\
  \                   Other              8161247\nPX Deq: Execute Reply          \
  \            Idle                490827\nPX Deq: Execution Msg                 \
  \     Idle                685175\nPX Deq: Join ACK                           Idle\
  \                 26312\nPX Deq: Msg Fragment                       Idle       \
  \             67\nPX Deq: Parse Reply                        Idle              \
  \   20891\nPX Deq: Signal ACK                         Other                25729\n\
  PX Deq: Table Q Get Keys                   Other                 3141\nPX Deq: Table\
  \ Q Normal                     Idle              25120970\nPX Deq: Table Q Sample\
  \                     Idle                 11124\nPX Deq: Table Q qref         \
  \              Other              1705216\nPX Idle Wait                        \
  \       Idle                241116\nPX qref latch                              Other\
  \              1208472\n```\n\n## 工作原理\n\n表 15-7 描述了一些关键的与并行相关的等待事件。如果你遇到了严重的性能问题，浏览这些等待事件，看看是否存在过多的等待或等待时间，可能是值得的。如果存在，则可能表明并行从属进程的处理存在问题。再次强调，*通常*情况下，“空闲”事件并不表示问题。\n\
  \n![images](img/t1507.jpg)\n\n![images](img/t1507a.jpg)\n\n## 15-14. 获取并行会话的详细信息\n\
  \n## 问题\n\n你有一些性能不佳的并行进程，需要关于这些会话的更详细信息。\n\n## 解决方案\n\n通过开启会话跟踪，你可以获取关于并行会话的详细跟踪信息。这本质上是一个四步过程：\n\
  \n1.  在你的会话中设置事件。\n2.  执行你的 SQL 语句。\n3.  关闭你的会话跟踪。\n4.  分析你的跟踪文件输出。\n\n例如，你再次对 `EMP`\
  \ 表执行一个并行查询。为了收集跟踪信息，你需要执行以下操作：\n\n```sql\nalter session set events '10391 trace\
  \ name context forever, level 128';\n```\n\n```sql\nselect /*+ parallel(emp,4) */\
  \ * from emp;\n```\n\n```sql\nalter session set events '10391 trace name context\
  \ off';\n```\n\n然后，在跟踪文件中，你可以分析与并行相关的信息，例如以下内容：\n\n```\nkxfrDmpUpdSys\n        allocated\
  \ slave set: nsset:1 nbslv:4\n          Slave set 0: #nodes:1\n          Min # slaves\
  \ 4: Max # slaves:4\n            List of Slaves:\n              slv 0 nid:0\n  \
  \            slv 1 nid:0\n              slv 2 nid:0\n              slv 3 nid:0\n\
  \            List of Nodes:\n              node 0\n```\n\n#### 工作原理\n\n与其他会话跟踪一样，跟踪文件可以在\
  \ `user_dump_dest` 参数指定的目标位置找到。该跟踪文件显示了并行进程的详细信息。如果您在使用并行处理时遇到了显著的性能问题，并希望进一步调查此事件生成的跟踪文件的结果，那么直接向\
  \ Oracle 创建一个服务请求以获取最详细的信息可能是有益的。阅读和理解这些跟踪文件可能既困难又繁琐，将文件直接发送给 Oracle 支持部门进行分析可能更为便捷。另一种验证并行操作所用并行度（DOP）的方法是使用\
  \ `_px_trace` 工具，它也会生成一个跟踪文件：\n```sql\nalter session set \"_px_trace\"=\"compilation\"\
  ,\"execution\",\"messaging\";\n\nselect /*+ parallel(emp,4) */ * from emp;\n```\n\
  然后，在跟踪文件中，您可以评估请求和使用的并行度：\n```\nkkscscid_pdm_eval\n        pdml_allowed=0, cursorPdmlMode=0,\
  \                sessPdmlMode=0\n        select /*+ parallel(emp,4) */ * from emp\n\
  \nkxfrDefaultDOP\n        DOP Trace -- compute default DOP\n            # CPU  \
  \     = 2\n            Threads/CPU = 2 (\"parallel_threads_per_cpu\")\n        \
  \    default DOP = 4 (# CPU * Threads/CPU)\n\nkxfpAdaptDOP\n        Requested=4\
  \ Granted=4 Target=8 Load=2 Default=4 users=0 sets=1\n        load adapt num servers\
  \ requested to = 4 (from kxfpAdaptDOP())\n```\n\n## 索引\n\n### ![images](img/square.jpg)A\n\
