  \           0.0     N/A\nUser I/O Wait Time (ms)                              195,394\
  \            N/A     N/A\nCluster Wait Time (ms)                               \
  \     0            N/A     N/A\nApplication Wait Time (ms)                     \
  \           0            N/A     N/A\nConcurrency Wait Time (ms)               \
  \                 0            N/A     N/A\nInvalidations                      \
  \                       0            N/A     N/A\nVersion Count                \
  \                             2            N/A     N/A\nSharable Mem(KB)       \
  \                                  22            N/A     N/A\n```\n\n```\nExecution\
  \ Plan\n-----------------------------------------------------------------------------------------------\n\
  | Id  | Operation            | Name      | Rows  | Bytes | Cost (%CPU)| Time   \
  \  |PQ Dis\n-----------------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT     |           |       |       | 73425 (100)|        \
