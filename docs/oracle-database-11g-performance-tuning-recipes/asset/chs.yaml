- "# 1-7. 高效地删除表数据\n\n## 问题\n\n你在从表中删除数据时遇到了性能问题。你希望尽可能高效地移除数据。\n\n## 解决方案\n\n你可以使用\
  \ `TRUNCATE` 语句或 `DELETE` 语句来移除表中的记录。`TRUNCATE` 通常更高效，但有一些你必须注意的副作用。例如，`TRUNCATE`\
  \ 是一条 DDL 语句。这意味着 Oracle 在它运行后会自动提交该语句（以及当前的事务），因此无法回滚 `TRUNCATE` 语句。因为 `TRUNCATE`\
  \ 语句是 DDL，所以你不能将两个独立的表的截断操作作为一个事务来处理。\n\n此示例使用 `TRUNCATE` 语句移除 `COMPUTER_SYSTEMS`\
  \ 表中的所有数据：\n\n```sql\nSQL> truncate table computer_systems;\n```\n\n截断表时，默认情况下，除了由\
  \ `MINEXTENTS` 表存储参数定义的空间外，为表分配的所有空间都将被释放。如果你不希望 `TRUNCATE` 语句释放当前已分配的区段，请使用 `REUSE\
  \ STORAGE` 子句：\n\n```sql\nSQL> truncate table computer_systems reuse storage;\n\
  ```\n\n你可以查询 `DBA_EXTENTS`、`ALL_EXTENTS` 或 `USER_EXTENTS` 视图来验证区段是否已被释放（或未被释放）——例如：\n\
  \n```sql\nselect count(*)\n  from user_extents where segment_name = 'COMPUTER_SYSTEMS';\n\
  ```\n\n\n#### 工作原理\n\n如果你需要在删除数据时选择回退（而非提交），那么应该使用 `DELETE` 语句。然而，`DELETE` 语句的缺点在于它会生成大量的撤销和重做信息。因此，对于大表而言，`TRUNCATE`\
  \ 语句通常是删除数据最高效的方式。\n\n`TRUNCATE` 语句的另一个特点是它会将表的高水位线重置为零。当你使用 `DELETE` 语句从表中删除数据时，高水位线并不会改变。使用\
  \ `TRUNCATE` 语句并重置高水位线的一个优势是，全表扫描查询只会搜索高水位线以下的数据块。这对于执行全表扫描的查询可能具有显著的性能影响。\n\n`TRUNCATE`\
  \ 语句的另一个副作用是，你无法截断一个父表，即使该父表的主键被子表中一个已启用的外键约束所引用——即使子表中没有任何行。在这种情况下，当尝试截断父表时，Oracle\
  \ 会抛出此错误：\n`ORA-02266: unique/primary keys in table referenced by enabled foreign\
  \ keys`\n\nOracle 阻止你截断父表，因为在多用户系统中，在你截断子表和随后截断父表之间，有可能另一个会话向子表中填充了数据。在这种情况下，你必须暂时禁用子表引用的外键约束，发出\
  \ `TRUNCATE` 语句，然后重新启用这些约束。\n\n将 `TRUNCATE` 的行为与 `DELETE` 语句进行比较。Oracle 确实允许你在约束启用的情况下使用\
  \ `DELETE` 语句从父表中删除行（假设子表中没有行）。这是因为 `DELETE` 会生成撤销记录，具有读一致性，并且可以被回滚。表 1-4 总结了 `DELETE`\
  \ 和 `TRUNCATE` 之间的区别。\n\n如果你需要使用 `DELETE` 语句，你必须发出 `COMMIT` 或 `ROLLBACK` 来完成事务。提交\
  \ `DELETE` 语句会使数据更改永久生效：\n\n```sql\nSQL> delete from computer_systems;\nSQL> commit;\n\
  ```\n\n![images](img/square.jpg) **注意** 提交事务的其他（有时不那么明显）方式包括：发出后续的 DDL 语句（它会隐式提交会话中的活动事务），或正常退出客户端工具（如\
  \ SQL*Plus）。\n\n如果你发出的是 `ROLLBACK` 语句而非 `COMMIT`，那么表中的数据将恢复到执行 `DELETE` 之前的状态。\n\
  \n在处理 DML 语句时，你可以通过查询 `V$TRANSACTION` 视图来确认事务的详细信息。例如，假设你刚刚向表中插入了数据；在你发出 `COMMIT`\
  \ 或 `ROLLBACK` 之前，你可以查看当前连接会话的活动事务信息，如下所示：\n\n```sql\nSQL> insert into computer_systems(cs_id)\
  \ values(1);\nSQL> select xidusn, xidsqn from v$transaction;\n    XIDUSN      XIDSQN\n\
  ---------- ----------\n         3      12878\nSQL> commit;\nSQL> select xidusn,\
  \ xidsqn from v$transaction;\nno rows selected\n```\n\n![images](img/t0104.jpg)\n\
  \n![images](img/square.jpg) **注意** 另一种从表中删除数据的方法是删除并重新创建表。然而，这意味着你也必须重新创建属于该表的任何索引、约束、授权和触发器。此外，当你删除一个表时，在重新创建它并重新发出任何所需的授权之前，它会暂时不可用。通常，删除并重新创建表仅在开发或测试环境中是可以接受的。\n\
  \n### 1-8. 显示自动化段顾问建议\n\n#### 问题\n\n你有一个访问表的性能不佳的查询。经过进一步调查，你发现该表中只有几行数据。你很疑惑，当行数如此之少时，为什么查询会花费这么长时间。你想检查段顾问的输出，看看是否有任何与空间相关的建议可能有助于改善这种情况下的性能。\n\
  \n#### 解决方案\n\n使用段顾问来显示关于那些可能已分配空间（曾经被使用过）但现在空间为空（由于大量行被删除）的表的信息。具有大量未使用空间的表可能导致全表扫描查询性能低下。这是因为\
  \ Oracle 会扫描高水位线下的每个数据块，而不管这些数据块是否包含数据。\n\n此解决方案侧重于通过 `DBMS_SPACE` PL/SQL 包访问段顾问的建议。此包检索段顾问生成的关于可能适合收缩、移动或压缩的段的信息。使用\
  \ `DBMS_SPACE` 包（以获取段顾问建议）的一种简单有效的方法是通过 SQL 查询——例如：\n\n```sql\nSELECT\n 'Segment\
  \ Advice --------------------------'|| chr(10) ||\n 'TABLESPACE_NAME  : ' || tablespace_name\
  \   || chr(10) ||\n 'SEGMENT_OWNER    : ' || segment_owner     || chr(10) ||\n 'SEGMENT_NAME\
  \     : ' || segment_name      || chr(10) ||\n 'ALLOCATED_SPACE  : ' || allocated_space\
  \   || chr(10) ||\n 'RECLAIMABLE_SPACE: ' || reclaimable_space || chr(10) ||\n 'RECOMMENDATIONS\
  \  : ' || recommendations   || chr(10) ||\n 'SOLUTION 1       : ' || c1        \
  \        || chr(10) ||\n 'SOLUTION 2       : ' || c2                || chr(10) ||\n\
  \ 'SOLUTION 3       : ' || c3 Advice\nFROM\nTABLE(dbms_space.asa_recommendations('FALSE',\
  \ 'FALSE', 'FALSE'));\n```\n\n以下是一些示例输出：\n\n```\nSegment Advice --------------------------\n\
  TABLESPACE_NAME  : USERS\nSEGMENT_OWNER    : MV_MAINT\nSEGMENT_NAME     : F_REGS\n\
  ALLOCATED_SPACE  : 20971520\nRECLAIMABLE_SPACE: 18209960\nRECOMMENDATIONS  : Perform\
  \ re-org on the object F_REGS, estimated savings is 18209960 bytes.\nSOLUTION 1\
  \       : Perform Reorg\nSOLUTION 2       :\nSOLUTION 3       :\n```\n\n在前面的输出中，`F_REGS`\
  \ 表是收缩操作的候选对象。它占用了 20 MB 空间，其中 18 MB 可以被回收。\n\n## 工作原理\n\n在 Oracle Database 10g\
  \ R2 及更高版本中，Oracle 会自动调度并运行一个“段顾问”作业。此作业分析数据库中的段，并将其发现的结果存储在内部表中。段顾问的输出包含发现（可能需要解决的问题）和建议（用于解决问题的操作）。段顾问的发现分为以下几种类型：\n\
  \n*   适合执行收缩操作的段\n*   存在严重行链接的段\n*   可能受益于 OLTP 压缩的段\n\n在查看段顾问的发现和建议时，了解该工具的几个方面非常重要。首先，段顾问通过一个自动调度的\
  \ `DBMS_SCHEDULER` 作业定期计算建议。您可以通过查询 `DBA_AUTO_SEGADV_SUMMARY` 视图来确认自动作业上次运行的时间：\n\
  \n```sql\nselect\n segments_processed\n,end_time\nfrom dba_auto_segadv_summary\n\
  order by end_time;\n```\n\n以下是一些示例输出：\n\n```\nSEGMENTS_PROCESSED END_TIME\n------------------\
  \ ----------------------------\n                 9 30-JAN-11 02.02.46.414424 PM\n\
  \                11 30-JAN-11 06.03.44.500178 PM\n                17 30-JAN-11 10.04.35.688915\
  \ PM\n```\n\n您可以将 `END_TIME` 日期与当前日期进行比较，以确定段顾问是否定期运行。\n\n![images](img/square.jpg)\
  \ **注意** 除了自动生成的段建议外，您还可以选择手动执行段顾问，以针对特定的表空间、表和索引生成建议（详情请参阅配方 1-9）。\n\n当段顾问执行时，它使用自动工作负载仓库\
  \ (AWR) 作为其分析的信息来源。例如，段顾问检查 AWR 中的使用情况和增长统计信息以生成段建议。段顾问运行时，会生成建议并将输出存储在内部数据库表中。可以通过以下数据字典视图查看这些建议和推荐：\n\
  \n*   `DBA_ADVISOR_EXECUTIONS`\n*   `DBA_ADVISOR_FINDINGS`\n*   `DBA_ADVISOR_OBJECTS`\n\
  \n有三种不同的工具可用于检索段顾问的输出：\n\n*   执行 `DBMS_SPACE.ASA_RECOMMENDATIONS`\n*   手动查询 `DBA_ADVISOR_*`\
  \ 视图\n*   查看企业管理器的图形界面\n\n在“解决方案”部分，我们描述了如何使用 `DBMS_SPACE.ASA_RECOMMENDATIONS` 过程来获取段顾问建议。`ASA_RECOMMENDATIONS`\
  \ 的输出可以通过三个输入参数进行修改，这些参数在 表 1-5 中进行了描述。例如，您可以指示该过程显示在手动执行段顾问时生成的信息。\n\n![images](img/t0105.jpg)\n\
  \n您也可以直接查询数据字典视图来查看段顾问的建议。以下是一个显示过去一天内生成的段顾问建议的查询：\n\n```sql\nselect\n 'Task Name\
  \        : ' || f.task_name  || chr(10) ||\n 'Start Run Time   : ' || TO_CHAR(execution_start,\
  \ 'dd-mon-yy hh24:mi') || chr (10) ||\n 'Segment Name     : ' || o.attr2    || chr(10)\
  \ ||\n 'Segment Type     : ' || o.type       || chr(10) ||\n 'Partition Name   :\
  \ ' || o.attr3      || chr(10) ||\n 'Message          : ' || f.message    || chr(10)\
  \ ||\n 'More Info        : ' || f.more_info  || chr(10) ||\n '------------------------------------------------------'\
  \ Advice\nFROM dba_advisor_findings   f\n    ,dba_advisor_objects    o\n    ,dba_advisor_executions\
  \ e\nWHERE o.task_id   = f.task_id\nAND   o.object_id = f.object_id\nAND   f.task_id\
  \   = e.task_id\nAND   e. execution_start > sysdate - 1\nAND   e.advisor_name =\
  \ 'Segment Advisor'\nORDER BY f.task_name;\n```\n\n以下是一些示例输出：\n\n```\nTask Name\
  \        : SYS_AUTO_SPCADV_53092205022011\nStart Run Time   : 05-feb-11 22:09\n\
  Segment Name     : CWP_USER_PROFILE\nSegment Type     : TABLE\nPartition Name  \
  \ :\nMessage          : Compress object REP_MV.CWP_USER_PROFILE, estimated savings\
  \ is\n 3933208576 bytes.\nMore Info        : Allocated Space:3934257152: Used Space:10664:\
  \ Reclaimable Spa\nce :3933208576:\n------------------------------------------------------\n\
  ```\n\n前面的输出表明一个表段是压缩的候选对象。显示已分配空间、已用空间和可回收空间数字，以帮助您确定可节省的空间。\n\n您也可以从企业管理器查看段顾问建议。要查看建议，首先导航到“顾问中心”页面。接着导航到“段顾问”页面。然后导航到“段顾问建议”。此页面将显示任何最近的段顾问发现和建议。\n\
  \n### 1-9. 手动生成段顾问建议\n\n#### 问题\n\n您有一个经历了大量更新操作的表。您注意到对该表的查询性能已经下降。您怀疑该表可能由于行链接而性能不佳。因此，您想通过段顾问手动确认一个表是否存在行链接问题。\n\
  \n### 解决方案\n\n你可以手动运行段顾问，让其专门分析表空间中的所有段，或查看特定对象（如单个表或索引）。你可以通过执行以下步骤，使用 `DBMS_ADVISOR`\
  \ 包手动为特定段生成建议：\n\n1.  创建一个任务。\n2.  将对象分配给该任务。\n3.  设置任务参数。\n4.  执行任务。\n\n![images](img/square.jpg)\
  \ **注意** 执行 `DBMS_ADVISOR` 的数据库用户需要 `ADVISOR` 系统权限。此权限通过 `GRANT` 语句管理。\n\n以下示例从一个匿名\
  \ PL/SQL 块执行 `DBMS_ADVISOR` 包。被检查的表是 `F_REGS` 表。\n\n```sql\nDECLARE\n  my_task_id\
  \   number;\n  obj_id       number;\n  my_task_name varchar2(100);\n  my_task_desc\
  \ varchar2(500);\nBEGIN\n  my_task_name := 'F_REGS Advice';\n  my_task_desc := 'Manual\
  \ Segment Advisor Run';\n\n ---------\n -- 步骤 1\n ---------\n  dbms_advisor.create_task\
  \ (\n  advisor_name => 'Segment Advisor',\n  task_id      => my_task_id,\n  task_name\
  \    => my_task_name,\n  task_desc    => my_task_desc);\n ---------\n -- 步骤 2\n\
  \ ---------\n  dbms_advisor.create_object (\n  task_name   => my_task_name,\n  object_type\
  \ => 'TABLE',\n  attr1       => 'MV_MAINT',\n  attr2       => 'F_REGS',\n  attr3\
  \       => NULL,\n  attr4       => NULL,\n  attr5       => NULL,\n  object_id  \
  \ => obj_id);\n ---------\n -- 步骤 3\n ---------\n  dbms_advisor.set_task_parameter(\n\
  \  task_name => my_task_name,\n  parameter => 'recommend_all',\n  value     => 'TRUE');\n\
  \ ---------\n -- 步骤 4\n ---------\n  dbms_advisor.execute_task(my_task_name);\n\
  END;\n/\n```\n\n现在，你可以通过执行 `DBMS_SPACE` 包并指示其从手动执行的段顾问中提取信息（通过输入参数——详见表 1-6）来查看关于此表的段顾问建议，例如：\n\
  \n```sql\nSELECT\n 'Segment Advice --------------------------'|| chr(10) ||\n 'TABLESPACE_NAME\
  \  : ' || tablespace_name   || chr(10) ||\n 'SEGMENT_OWNER    : ' || segment_owner\
  \     || chr(10) ||\n 'SEGMENT_NAME     : ' || segment_name      || chr(10) ||\n\
  \ 'ALLOCATED_SPACE  : ' || allocated_space   || chr(10) ||\n 'RECLAIMABLE_SPACE:\
  \ ' || reclaimable_space || chr(10) ||\n 'RECOMMENDATIONS  : ' || recommendations\
  \   || chr(10) ||\n 'SOLUTION 1       : ' || c1                || chr(10) ||\n 'SOLUTION\
  \ 2       : ' || c2                || chr(10) ||\n 'SOLUTION 3       : ' || c3 Advice\n\
  FROM\nTABLE(dbms_space.asa_recommendations('TRUE', 'TRUE', 'FALSE'));\n```\n\n以下是一些示例输出：\n\
  \n```\nSegment Advice --------------------------\nTABLESPACE_NAME  : USERS\nSEGMENT_OWNER\
  \    : MV_MAINT\nSEGMENT_NAME     : F_REGS\nALLOCATED_SPACE  : 20971520\nRECLAIMABLE_SPACE:\
  \ 18209960\nRECOMMENDATIONS  : Perform re-org on the object F_REGS, estimated savings\
  \ is 182\n09960 bytes.\nSOLUTION 1       : Perform Reorg\nSOLUTION 2       :\nSOLUTION\
  \ 3       :\n```\n\n你也可以通过查询数据字典视图来检索段顾问建议，例如：\n\n```sql\nSELECT\n 'Task Name  \
  \      : ' || f.task_name  || chr(10) ||\n 'Segment Name     : ' || o.attr2    \
  \  || chr(10) ||\n 'Segment Type     : ' || o.type       || chr(10) ||\n 'Partition\
  \ Name   : ' || o.attr3      || chr(10) ||\n 'Message          : ' || f.message\
  \    || chr(10) ||\n 'More Info        : ' || f.more_info TASK_ADVICE\nFROM dba_advisor_findings\
  \ f\n    ,dba_advisor_objects  o\nWHERE o.task_id = f.task_id\nAND o.object_id =\
  \ f.object_id\nAND f.task_name like 'F_REGS Advice'\nORDER BY f.task_name;\n```\n\
  \n如果表存在行链接的潜在问题，那么建议输出将如下所示：\n\n```\nTASK_ADVICE\n--------------------------------------------------------------------------------\n\
  Task Name        : F_REGS Advice\nSegment Name     : F_REGS\nSegment Type     :\
  \ TABLE\nPartition Name   :\nMessage          : Perform re-org on the object F_REGS,\
  \ estimated savings is 182\n09960 bytes.\nMore Info        : Allocated Space:20971520:\
  \ Used Space:2761560: Reclaimable Spa\nce :18209960:\n```\n\n### 工作原理\n\n`DBMS_ADVISOR`\
  \ 包用于手动指示段顾问为特定表生成建议。该包包含多个过程，用于执行诸如创建和执行任务等操作。表 1-6 列出了与段顾问相关的过程。\n\n![images](img/t0106.jpg)\n\
  \n段顾问可以以各种粒度调用。例如，你可以生成表空间中所有对象的建议，或特定表、索引或分区的建议。表 1-7 列出了可以通过 `DBMS_ADVISOR.CREATE_TASK`\
  \ 过程获取段顾问建议的对象类型。\n\n![images](img/t0107.jpg)\n\n![images](img/t0107a.jpg)\n\n你还可以指定希望段顾问运行的最长时间。这是通过\
  \ `SET_TASK_PARAMETER` 过程控制的。该过程还控制生成的建议类型。表 1-8 描述了此过程的有效输入。\n\n![images](img/t0108.jpg)\n\
  \n## 1-10. 自动通过电子邮件发送段顾问输出\n\n### 问题\n\n你意识到段顾问会自动生成建议，并希望通过电子邮件自动接收段顾问输出。\n\n###\
  \ 解决方案\n\n首先将显示段顾问输出的 SQL 封装在一个 shell 脚本中，例如：\n\n```bash\n#!/bin/bash\nif [ $# -ne\
  \ 1 ]; then\n  echo \"Usage: $0 SID\"\n  exit 1\nfi\n# source oracle OS variables\n\
  . /var/opt/oracle/oraset $1\n#\n BOX=`uname -a | awk '{print$2}'`\n#\nsqlplus -s\
  \ <<EOF\nmv_maint/foo\nspo $HOME/bin/log/seg.txt\nset lines 80\nset pages 100\n\
  SELECT\n 'Segment Advice --------------------------'|| chr(10) ||\n 'TABLESPACE_NAME\
  \  : ' || tablespace_name   || chr(10) ||\n 'SEGMENT_OWNER    : ' || segment_owner\
  \     || chr(10) ||\n 'SEGMENT_NAME     : ' || segment_name      || chr(10) ||\n\
  \ 'ALLOCATED_SPACE  : ' || allocated_space   || chr(10) ||\n 'RECLAIMABLE_SPACE:\
  \ ' || reclaimable_space || chr(10) ||\n 'RECOMMENDATIONS  : ' || recommendations\
  \   || chr(10) ||\n 'SOLUTION 1       : ' || c1                || chr(10) ||\n 'SOLUTION\
  \ 2       : ' || c2                || chr(10) ||\n 'SOLUTION 3       : ' || c3 Advice\n\
  FROM\nTABLE(dbms_space.asa_recommendations('FALSE', 'FALSE', 'FALSE'));\nEOF\ncat\
  \ $HOME/bin/log/seg.txt | mailx -s \"Seg. rpt. on DB: $1 $BOX\" dkuhn@oracle.com\n\
  exit 0\n```\n\n前面的 shell 脚本可以通过 Linux/Unix 实用程序（如 `cron`）定期执行。这是一个 `cron` 条目示例：\n\
  \n```\n# Segment Advisor report\n16 11 * * * /orahome/oracle/bin/seg.bsh DWREP\n\
  ```\n\n这样，你就能自动接收段建议，并在问题演变成性能问题之前主动解决它们。\n\n### 工作原理\n\n段顾问会定期自动生成建议。有时主动向自己发送建议会很方便。这使你可以定期审阅输出，并实施有意义的建议。\n\
  \n“解决方案”部分中的 shell 脚本在靠近顶部的位置有一行，通过运行 `oraset` 脚本来设置操作系统变量。这是一个自定义脚本，等同于 Oracle\
  \ 提供的 `oraset` 脚本。你可以使用脚本来设置操作系统变量，或者将所需的行硬编码到脚本中。调用脚本来设置变量更灵活且易于维护，因为它允许你使用 `oratab`\
  \ 文件中出现的任何数据库名称作为输入。\n\n## 1-11. 重建跨多个块的行\n\n\n#### 问题\n\n您有一个表，其中的单行数据被存储在多个数据块中。这种情况会导致较高的\
  \ I/O 率，并使针对该表的查询运行缓慢。您需要重建这些跨块行，使得每行都能放入单个数据块中。\n\n例如，您正在运行以下查询，该查询显示了段顾问的建议：\n\
  \n```\nSELECT\n 'Task Name        : ' || f.task_name  || chr(10) ||\n 'Segment Name\
  \     : ' || o.attr2      || chr(10) ||\n 'Segment Type     : ' || o.type      \
  \ || chr(10) ||\n 'Partition Name   : ' || o.attr3      || chr(10) ||\n 'Message\
  \          : ' || f.message    || chr(10) ||\n 'More Info        : ' || f.more_info\
  \ TASK_ADVICE\nFROM dba_advisor_findings f\n    ,dba_advisor_objects  o\nWHERE o.task_id\
  \   = f.task_id\nAND   o.object_id = f.object_id\nORDER BY f.task_name;\n```\n\n\
  以下是此示例的输出：\n\n```\nTASK_ADVICE\n--------------------------------------------------------------------------------\n\
  Task Name        : EMP Advice\nSegment Name     : EMP\nSegment Type     : TABLE\n\
  Partition Name   :\nMessage          : The object has chained rows that can be removed\
  \ by re-org.\nMore Info        : 47 percent chained rows can be removed by re-org.\n\
  ```\n\n从之前的输出来看，`EMP` 表中有很大比例的行受到行链接的影响，并在从该表检索数据时导致性能问题。您希望消除表中的链接行。\n\n#### 解决方案\n\
  \n解决表中行链接的一种方法是使用 `MOVE` 语句。当您移动一个表时，Oracle 需要在该表上获得一个排他锁；因此，您应该在表没有关联的活动事务时执行此操作。\n\
  \n此外，作为 `MOVE` 操作的一部分，所有行都会被分配一个新的 `ROWID`。这将使与该表关联的所有索引失效。因此，作为移动操作的一部分，您应该重建与被移动表关联的所有索引。此示例移动\
  \ `EMP` 表：\n\n```\nSQL> alter table emp move;\n```\n\n移动操作完成后，重建与被移动表关联的所有索引。您可以通过查询\
  \ `DBA/ALL/USER_INDEXES` 视图来验证索引的状态：\n\n```\nselect\n owner\n,index_name\n,status\n\
  from dba_indexes\nwhere table_name='EMP';\n```\n\n以下是一些示例输出：\n\n```\nOWNER     \
  \                     INDEX_NAME                     STATUS\n------------------------------\
  \ ------------------------------ --------\nMV_MAINT                       EMP_PK\
  \                         UNUSABLE\n```\n\n重建索引将使其重新可用：\n\n```\nSQL> alter index\
  \ emp_pk rebuild;\n```\n\n您现在可以手动为该段生成段顾问建议（参见配方 1-9），并运行本配方“问题”部分列出的查询，以查看行链接是否已解决。\n\
  \n\n#### 工作原理\n\n数据块中会保留一定空间，以容纳行内数据的增长。行大小通常因 `UPDATE` 语句增大了列值而增加。如果块内没有足够的空闲空间来容纳增长后的行，Oracle\
  \ 会创建一个指向另一个有足够空间的块的指针，并将该行的一部分存储到这个额外的块中。当单行数据存储在两个或更多块中时，这被称为 **行链接**。这可能导致性能问题，因为\
  \ Oracle 在检索被链接的行时，必须从多个块（而非一个）中获取数据。\n\n少量的链接行不会对性能产生太大影响。一个粗略的指导原则是，如果一个表中超过 15%\
  \ 的行被链接，那么你应该采取纠正措施（例如移动表以重新组织它）。\n\n块中保留的空闲空间量由表的存储参数 `PCTFREE` 决定。`PCTFREE` 的默认值是\
  \ 10，意味着块的 10% 被保留为备用空间，用于那些更新后需要更多空间的行。如果你的表中有列在初始插入时为 `NULL`，之后被更新为包含较大的值，那么可以考虑将\
  \ `PCTFREE` 设置为更高的值，例如 40%。这将有助于防止行链接。\n\n相反，如果你的表在插入行后从未被更新过，那么可以考虑将 `PCTFREE`\
  \ 设置为 0。这将导致每个块存储更多的行，在检索数据时可以减少磁盘读取（从而获得更好的性能）。\n\n你可以通过查询 `DBA/ALL/USER_TABLES`\
  \ 视图来查看 `PCTFREE` 的设置，例如：\n\n```sql\nselect table_name, pct_free\nfrom user_tables;\n\
  ```\n\n移动操作会将每条记录从块中移除，并将记录重新插入到一个新块中。对于链接行，旧的链接行会被删除，并在块内重建为一个物理行。如果被移动的表的 `PCTFREE`\
  \ 设置较低，可以考虑在移动操作中将此参数重置为更高的值，例如：\n\n```sql\nSQL> alter table emp move pctfree 40;\n\
  ```\n\n另一种验证行链接的方法（除了段顾问）是使用 `ANALYZE TABLE` 语句。首先，你必须创建一个表来保存 `ANALYZE TABLE` 语句的输出：\n\
  \n```sql\nSQL> @?/rdbms/admin/utlchain.sql\n```\n\n前面的脚本会创建一个名为 `CHAINED_ROWS` 的表。现在你可以运行\
  \ `ANALYZE` 语句来填充 `CHAINED_ROWS` 表：\n\n```sql\nSQL> analyze table emp list chained\
  \ rows;\n```\n\n然后查询 `CHAINED_ROWS` 表中的行数：\n\n```sql\nSQL> select count(*) from\
  \ chained_rows where table_name='EMP';\n```\n\n如果链接行的问题已解决，前面的查询将返回零行。通过这种方式识别链接行的好处是，你可以通过以下步骤修复被链接的行，而不会影响表中的其余记录：\n\
  \n1.  创建一个临时表来存储链接行。\n2.  从原始表中删除链接行。\n3.  将临时表中的行插入回原始表。\n\n下面是一个简短的例子来演示上述步骤。首先，创建一个临时表，其中包含\
  \ `EMP` 表中那些在 `CHAINED_ROWS` 表中有对应记录的行：\n\n```sql\ncreate table temp_emp\nas select\
  \ *\nfrom emp\nwhere rowid in\n(select head_rowid from chained_rows where table_name\
  \ = 'EMP');\n```\n\n现在，从 `EMP` 表中删除那些在 `CHAINED_ROWS` 表中有对应记录的行：\n\n```sql\ndelete\
  \ from emp\nwhere rowid in\n(select head_rowid from chained_rows where table_name\
  \ = 'EMP');\n```\n\n现在将临时表中的记录插入到 `EMP` 表中：\n\n```sql\ninsert into emp select *\
  \ from temp_emp;\n```\n\n如果你重新分析该表，现在应该没有链接行了。完成后可以删除临时表。\n\n### 理解 Oracle ROWID\n\
  \n每个表中的每一行都有一个物理地址。行的地址由以下组合确定：\n\n*   数据文件号\n*   块号\n*   行在块内的位置\n*   对象号\n\n你可以通过查询\
  \ `ROWID` 伪列来显示表中行的地址，例如：\n\n```sql\nSQL> select rowid, emp_id from emp;\n```\n\n\
  这是一些示例输出：\n\n```\nROWID                  EMP_ID\n------------------ ----------\n\
  AAAFWXAAFAAAAlWAAA          1\n```\n\n`ROWID` 伪列的值并未物理存储在数据库中。Oracle 在你查询时计算它的值。`ROWID`\
  \ 的内容显示为 base-64 值，可以包含字符 A–Z, a–z, 0–9, +, 和 /。你可以通过 `DBMS_ROWID` 包将 `ROWID` 值转换为有意义的信息。例如，要显示行存储的文件号、块号和行号，可以发出以下语句：\n\
  \n```sql\nselect\n emp_id\n,dbms_rowid.rowid_relative_fno(rowid) file_num\n,dbms_rowid.rowid_block_number(rowid)\
  \ block_num\n,dbms_rowid.rowid_row_number(rowid)   row_num\nfrom emp;\n```\n\n这是一些示例输出：\n\
  \n```\n    EMP_ID   FILE_NUM  BLOCK_NUM    ROW_NUM\n---------- ---------- ----------\
  \ ----------\n      2960          4        144        126\n      2961          4\
  \        144        127\n```\n\n你可以在 SQL 语句的 `SELECT` 和 `WHERE` 子句中使用 `ROWID` 值。在大多数情况下，`ROWID`\
  \ 唯一标识一行。但是，不同表中存储在同一集群中的行可能具有相同的 `ROWID`。\n\n### 1-12. 释放未使用的表空间\n\n#### 问题\n\n\
  你已经分析了段顾问的输出，并确定一个表有大量空闲空间。你想释放未使用的空间以提高执行全表扫描的查询的性能。\n\n#### 解决方案\n\n执行以下步骤来收缩空间并重新调整表的高水位线：\n\
  \n1.  为表启用行移动。\n2.  使用 `ALTER TABLE...SHRINK SPACE` 语句释放未使用的空间。\n\n![images](img/square.jpg)\
  \ **注意** 收缩表功能要求表所在表空间使用自动段空间管理。有关如何创建启用 ASSM 的表空间的详细信息，请参阅配方 1-2。\n\n收缩表时，需要移动行（如果有）。这意味着你必须启用行移动。此示例为\
  \ `INV` 表启用行移动：\n\n```sql\nSQL> alter table inv enable row movement;\n```\n\n接下来通过\
  \ `ALTER TABLE` 语句执行表收缩操作：\n\n```sql\nSQL> alter table inv shrink space;\n```\n\n\
  你也可以通过 `CASCADE` 子句来收缩任何索引段的空间：\n\n```sql\nSQL> alter table inv shrink space cascade;\n\
  ```\n\n#### 工作原理\n\n收缩表时，Oracle 会以最节省空间的方式重新组织块。Oracle 还会重新调整表的高水位线。这对导致全表扫描的查询有性能影响。在这些场景中，Oracle\
  \ 将检查高水位线以下的每个块。如果你注意到当表中没有很多行时，查询返回结果需要很长时间，这可能表明高水位线下有许多未使用的块（因为数据被删除了）。\n\n你可以指示\
  \ Oracle 在收缩表时不重新调整高水位线。这是通过 `COMPACT` 子句完成的，例如：\n\n```sql\nSQL> alter table inv\
  \ shrink space compact;\n```\n\n当你使用 `COMPACT` 时，Oracle 会对表进行碎片整理，但不改变高水位线。你需要使用\
  \ `ALTER TABLE…SHRINK SPACE` 语句来重置高水位线。你可能想这样做是因为担心碎片整理和调整高水位线所需的时间。这允许你将表收缩分成两个较短的步骤，而不是一个较长的操作。\n\
  \n### 1-13. 为直接路径加载压缩数据\n\n\n### 问题描述\n\n您正在使用一个决策支持系统类型的数据库，并希望优化与其关联的报表应用程序的性能。此环境中包含一些大型表，这些表在加载后会频繁进行全表扫描。您希望在数据加载时进行压缩，因为这样可以将数据压缩到更少的数据库块中，从而减少后续从表中读取所需的\
  \ I/O 操作。由于压缩数据需要读取的块数更少，这将提升数据检索性能。\n\n### 解决方案\n\n使用 Oracle 的基本压缩功能来压缩通过直接路径加载到堆组织表中的数据。启用基本压缩的方法如下：\n\
  \n1.  在创建、修改或移动现有表时，使用 `COMPRESS` 子句来启用压缩。\n2.  通过直接路径机制加载数据，例如 `CREATE TABLE…AS\
  \ SELECT` 或 `INSERT /*+ APPEND */`。\n\n![images](img/square.jpg) **注意** 在 Oracle\
  \ Database 11g R2 之前，基本压缩被称为 DSS 压缩，并通过 `COMPRESS FOR DIRECT_LOAD OPERATION` 子句启用。此语法在\
  \ Oracle Database 11g R2 及更高版本中已**弃用**。\n\n下面是一个使用 `CREATE TABLE…AS SELECT` 语句创建启用基本压缩的表并通过直接路径加载数据的示例：\n\
  \n```\ncreate table regs_dss\ncompress\nas select reg_id, reg_name\nfrom regs;\n\
  ```\n\n前面的语句创建了一个包含压缩数据的表。任何后续的直接路径加载操作也将以压缩格式加载数据。\n\n![images](img/square.jpg)\
  \ **提示** 您可以使用 `COMPRESS` 子句或 `COMPRESS BASIC` 子句来启用表的基本压缩功能。`COMPRESS` 子句和 `COMPRESS\
  \ BASIC` 子句是**同义**的。\n\n您可以通过查询相应的 `DBA/ALL/USER_TABLES` 视图来验证表是否已启用压缩。此示例假设您已作为表的所有者连接到数据库：\n\
  \n```\nselect table_name, compression, compress_for\nfrom user_tables\nwhere table_name='REGS_DSS';\n\
  ```\n\n以下是一些示例输出：\n\n```\nTABLE_NAME                      COMPRESS COMPRESS_FOR\n\
  ------------------------------ -------- ------------\nREGS_DSS                 \
  \       ENABLED  BASIC\n```\n\n前面的输出显示该表已启用基本模式压缩。如果您正在处理一个已创建的表，则可以使用 `ALTER TABLE`\
  \ 语句更改其基本压缩特性——例如：\n\n```\nSQL> alter table regs_dss compress;\n```\n\n当您修改表以启用基本压缩时，这**不会**影响表中当前存在的任何数据；它只会压缩后续的直接路径数据加载操作。\n\
  \n如果您想为现有表中的数据启用基本压缩，请使用 `MOVE COMPRESS` 子句：\n\n```\nSQL> alter table regs_dss move\
  \ compress;\n```\n\n请记住，当您移动一个表时，所有相关的索引都将**失效**。您必须重建与已移动表关联的任何索引。\n\n如果您已为表启用了基本压缩，则可以通过\
  \ `NOCOMPRESS` 子句禁用它——例如：\n\n```\nSQL> alter table regs_dss nocompress;\n```\n\n\
  当您修改表以禁用基本压缩时，这**不会**解压缩表中现有的数据。相反，此操作会指示 Oracle 不压缩后续直接路径操作的数据。如果您需要解压缩现有的压缩数据，请使用\
  \ `MOVE NOCOMPRESS` 子句：\n\n```\nSQL> alter table regs_dss move nocompress;\n```\n\
  \n### 工作原理\n\n基本压缩功能作为 Oracle 企业版的一部分**免费提供**。任何创建或修改为使用基本压缩的堆组织表，都将成为后续直接路径加载操作中以压缩格式加载数据的候选对象。压缩数据会带来一些额外的\
  \ CPU 开销，但在许多情况下，您可能会发现此开销被因 I/O 减少而带来的性能提升所抵消。\n\n从性能角度来看，使用基本压缩的主要优点是，一旦数据以压缩形式加载，任何后续的\
  \ I/O 操作将使用更少的资源，因为读写数据所需的块更少。您需要为您的环境测试性能收益。一般来说，保存大量字符数据的表是基本压缩的候选对象——尤其是在数据一次性直接路径加载，之后多次被查询的场景中。\n\
  \n请记住，Oracle 的基本压缩功能对常规 DML 语句（如 `INSERT`、`UPDATE`、`MERGE` 和 `DELETE`）**没有影响**。如果您需要在所有\
  \ DML 语句上发生压缩，那么请考虑使用 OLTP 压缩（详见配方 1-14）。\n\n您还可以在分区和表空间级别指定基本压缩。在使用 `COMPRESS`\
  \ 子句创建的表空间中创建的任何表，默认情况下都将启用基本压缩。以下是一个创建带有 `COMPRESS` 子句的表空间的示例：\n\n```\nCREATE TABLESPACE\
  \ comp_data\n  DATAFILE '/ora01/dbfile/O11R2/comp_data01.dbf'\n  SIZE 500M\n  EXTENT\
  \ MANAGEMENT LOCAL\n  UNIFORM SIZE 512K\n  SEGMENT SPACE MANAGEMENT AUTO\n  DEFAULT\
  \ COMPRESS;\n```\n\n您也可以修改现有表空间以设置默认压缩级别：\n\n```\nSQL> alter tablespace comp_data\
  \ default compress;\n```\n\n运行此查询以验证表空间的基本压缩是否已启用：\n\n```\nselect tablespace_name,\
  \ def_tab_compression, compress_for\nfrom dba_tablespaces\nwhere tablespace_name\
  \ = 'COMP_DATA';\n```\n\n以下是一些示例输出：\n\n```\nTABLESPACE_NAME                DEF_TAB_\
  \ COMPRESS_FOR\n------------------------------ -------- ------------\nCOMP_DATA\
  \                      ENABLED  BASIC\n```\n\n![images](img/square.jpg) **提示** 您**无法**从启用了基本压缩创建的表中删除列。但是，您可以将列标记为未使用。\n\
  \n## 1-14. 为所有 DML 操作压缩数据\n\n### 问题描述\n\n您身处 OLTP 环境，并注意到从表中读取数据时发生大量的磁盘 I/O。您想知道是否可以通过压缩表内的数据来提高\
  \ I/O 性能。其思路是，压缩后的表数据将占用更少的物理存储空间，从而需要更少的 I/O 来从磁盘读取。\n\n\n\n#### 解决方案\n\n在创建表时使用\
  \ `COMPRESS FOR OLTP` 子句，可以在使用常规 DML 语句操作数据时启用数据压缩。此示例创建了一个启用 OLTP 压缩的表：\n\n```\n\
  create table regs\n(reg_id   number\n,reg_name varchar2(2000)\n) compress for oltp;\n\
  ```\n\n![images](img/square.jpg) **注意** 在 Oracle Database 11g R2 之前，OLTP 表压缩是通过\
  \ `COMPRESS FOR ALL OPERATIONS` 子句启用的。此语法在 Oracle Database 11g R2 及更高版本中已弃用。\n\n\
  您可以通过查询相应的 `DBA/ALL/USER_TABLES` 视图来验证表是否已启用压缩。此示例假设您以表所有者身份连接到数据库：\n\n```\nselect\
  \ table_name, compression, compress_for\nfrom user_tables\nwhere table_name='REGS';\n\
  ```\n\n以下是一些示例输出：\n\n```\nTABLE_NAME                     COMPRESS COMPRESS_FOR\n\
  ------------------------------ -------- ------------\nREGS                     \
  \      ENABLED  OLTP\n```\n\n如果您已经创建了表，可以使用 `ALTER TABLE` 语句在现有表上启用压缩，例如：\n\n```\n\
  SQL> alter table regs compress for oltp;\n```\n\n当您更改表的压缩模式时，不会影响表中当前的任何数据。后续的 DML\
  \ 操作将导致数据以压缩方式存储。\n\n如果您想对现有表中的数据启用 OLTP 压缩，请使用 `MOVE COMPRESS FOR OLTP` 子句：\n\n\
  ```\nSQL> alter table regs move compress for oltp;\n```\n\n请记住，当您移动表时，所有关联的索引都会失效。您必须重新构建与移动表相关的任何索引。\n\
  \n如果您已为表启用了 OLTP 压缩，可以通过 `NOCOMPRESS` 子句禁用它，例如：\n\n```\nSQL> alter table regs nocompress;\n\
  ```\n\n当您更改表以禁用 OLTP 压缩时，这不会解压缩表中的现有数据。相反，此操作指示 Oracle 不要压缩后续 DML 操作的数据。\n\n####\
  \ 工作原理\n\nOLTP 压缩需要 Oracle 企业版和高级压缩选项（需额外付费许可）。`COMPRESS FOR OLTP` 子句为所有 DML 操作启用压缩。OLTP\
  \ 压缩不会在数据插入或更新到表中时立即压缩数据。相反，当块内的更改程度达到某个阈值时，压缩会以批处理模式发生。当达到阈值时，所有未压缩的行会同时被压缩。发生压缩的阈值由内部算法决定（您无法控制）。\n\
  \n您还可以在表空间级别指定 OLTP 压缩。在启用 OLTP 压缩的表空间中创建的任何表默认都将继承此压缩设置。以下是一个指定 OLTP 压缩的表空间创建脚本示例：\n\
  \n```\nCREATE TABLESPACE comp_data\n  DATAFILE '/ora01/dbfile/O11R2/comp_data01.dbf'\n\
  \  SIZE 10M\n  EXTENT MANAGEMENT LOCAL\n  UNIFORM SIZE 1M\n  SEGMENT SPACE MANAGEMENT\
  \ AUTO\n  DEFAULT COMPRESS FOR OLTP;\n```\n\n您也可以更改现有表空间以设置默认压缩级别：\n\n```\nSQL>\
  \ alter tablespace comp_data default compress for oltp;\n```\n\n您可以通过此查询验证默认压缩特性：\n\
  \n```\nselect tablespace_name, def_tab_compression, compress_for\nfrom dba_tablespaces\n\
  where tablespace_name = 'COMP_DATA';\n```\n\n以下是一些示例输出：\n\n```\nTABLESPACE_NAME\
  \                DEF_TAB_ COMPRESS_FOR\n------------------------------ --------\
  \ ------------\nCOMP_DATA                      ENABLED  OLTP\n```\n\n### 1-15. 在列级别压缩数据\n\
  \n#### 问题\n\n您正在使用 Oracle Exadata 产品，并希望高效地压缩数据。您已确定压缩数据将带来更高效的 I/O 操作，尤其是在从磁盘读取数据时。思路是压缩数据将导致\
  \ `SELECT` 语句读取的块少得多。\n\n#### 解决方案\n\n要在创建表时启用混合列压缩，请使用 `COMPRESS FOR QUERY` 或 `COMPRESS\
  \ FOR ARCHIVE` 子句，例如：\n\n```\ncreate table f_regs(\n reg_id number\n,reg_desc varchar2(4000))\n\
  compress for query;\n```\n\n您还可以指定压缩级别为 `LOW` 或 `HIGH`：\n\n```\ncreate table f_regs(\n\
  \ reg_id number\n,reg_desc varchar2(4000))\ncompress for query high;\n```\n\n`QUERY`\
  \ 的默认压缩级别为 `HIGH`，`ARCHIVE` 的默认压缩级别为 `LOW`。您可以通过此查询验证启用的压缩级别：\n\n```\nselect table_name,\
  \ compression, compress_for\nfrom user_tables\nwhere table_name='F_REGS';\n```\n\
  \n以下是一些示例输出：\n\n```\nTABLE_NAME                     COMPRESS COMPRESS_FOR\n------------------------------\
  \ -------- ------------\nF_REGS                         ENABLED  QUERY HIGH\n```\n\
  \n如果您尝试在 Exadata 以外的任何环境中使用混合列压缩，您将收到以下错误：\n\n```\nERROR at line 1:\nORA-64307:\
  \ hybrid columnar compression is only supported in tablespaces\nresiding on Exadata\
  \ storage\n```\n\n#### 工作原理\n\nExadata 是 Oracle 的高性能数据库一体机。它旨在为数据仓库和 OLTP 数据库提供高性能。Exadata\
  \ 存储支持混合列压缩，并从 Oracle Database 11g R2 开始可用。\n\n混合列压缩逐列压缩数据。列级压缩比 Oracle 基本压缩（参见配方\
  \ 1-13）或 OLTP 压缩（参见配方 1-14）具有更高的压缩比。混合列压缩有四个级别。这些级别从最低压缩级别到最高级别列出如下：\n\n- `COMPRESS\
  \ FOR QUERY LOW`\n- `COMPRESS FOR QUERY HIGH`\n- `COMPRESS FOR ARCHIVE LOW`\n- `COMPRESS\
  \ FOR ARCHIVE HIGH`\n\n`COMPRESS FOR QUERY` 适用于对不经常更新的堆组织表进行批量加载操作。此类压缩针对查询性能进行了优化，因此更适用于\
  \ DSS 和数据仓库数据库，而 `COMPRESS FOR ARCHIVE` 最大化压缩程度，更适用于长期存储且不会被更新的数据。\n\n![images](img/square.jpg)\
  \ **注意** 有关混合列压缩的更多信息，请参阅 Oracle Exadata 存储服务器软件文档。\n\n### 1-16. 监控表使用情况\n\n####\
  \ 问题\n\n您最近接手了一个包含数百个表的数据库。应用程序正在经历性能问题。作为整体调整策略的一部分，您希望通过确定哪些表正在被哪些类型的 SQL 语句使用，来更好地了解应用程序。未使用的表可以被重命名并随后删除。通过移除未使用的表，您可以释放空间，减少杂乱，并将性能分析集中在活动使用的表上。\n\
  \n\n\n"
- "# 解决方案\n\n使用 Oracle 的标准审计功能来确定哪些表正在被使用。审计的启用步骤如下：\n\n1.  设置 `AUDIT_TRAIL` 参数。\n\
  2.  停止并启动数据库以使 `AUDIT_TRAIL` 设置生效。\n3.  使用 `AUDIT` 语句启用对特定数据库操作的审计。\n\nOracle 的标准审计功能通过设置\
  \ `AUDIT_TRAIL` 初始化参数来启用。当你将 `AUDIT_TRAIL` 参数设置为 `DB` 时，这指定了 Oracle 将审计记录写入名为 `AUD$`\
  \ 的内部数据库表。例如，当使用 `spfile` 时，设置 `AUDIT_TRAIL` 参数的方法如下：\n\n```\nSQL> alter system\
  \ set audit_trail=db scope=spfile;\n```\n\n如果你使用的是 `init.ora` 文件，请用文本编辑器打开它，并将 `AUDIT_TRAIL`\
  \ 值设置为 `DB`。设置 `AUDIT_TRAIL` 参数后，你需要停止并重启数据库才能使其生效。\n\n![images](img/square.jpg)\
  \ 提示：首次设置数据库时，我们建议你将 `AUDIT_TRAIL` 参数设置为 `DB`。这样，当你想要为特定操作启用审计时，无需停止并重启（弹出）数据库。\n\
  \n现在，你可以为特定的数据库操作启用审计。例如，以下语句对 `INV_MGMT` 用户拥有的 `EMP` 表上的所有 DML 语句启用审计：\n\n```\n\
  SQL> audit select, insert, update, delete on inv_mgmt.emp;\n```\n\n从此时起，对 `EMP`\
  \ 表的任何 DML 访问都将记录在 `SYS.AUD$` 表中。Oracle 基于 `AUD$` 表提供了若干审计视图，例如 `DBA_AUDIT_TRAIL`\
  \ 或 `DBA_AUDIT_OBJECT`。你可以查询这些视图来报告审计活动——例如：\n\n```\nselect\n  username\n ,obj_name\n\
  \ ,to_char(timestamp,'dd-mon-yy hh24:mi') event_time\n ,substr(ses_actions,4,1)\
  \  del\n ,substr(ses_actions,7,1)  ins\n ,substr(ses_actions,10,1) sel\n ,substr(ses_actions,11,1)\
  \ upd\nfrom dba_audit_object;\n```\n\n以下是一些示例输出：\n\n```\nUSERNAME              \
  \         OBJ_NAME   EVENT_TIME            DEL INS SEL UPD\n------------------------------\
  \ ---------- --------------------- --- --- --- ---\nINV_MGMT                   \
  \    EMP        05-feb-11 15:08       -   S   -   S\nINV_MGMT                  \
  \     EMP        05-feb-11 15:10       -   -   S   -\nINV_MGMT                 \
  \      EMP        05-feb-11 15:10       S   -   -   -\n```\n\n在前面的 SQL 语句中，请注意使用了\
  \ `SUBSTR()` 函数来引用 `DBA_AUDIT_OBJECT` 视图的 `SES_ACTIONS` 列。该列包含一个 16 字符的字符串，其中每个字符表示已发生某种操作。这\
  \ 16 个字符按以下顺序代表以下操作：`ALTER`, `AUDIT`, `COMMENT`, `DELETE`, `GRANT`, `INDEX`, `INSERT`,\
  \ `LOCK`, `RENAME`, `SELECT`, `UPDATE`, `REFERENCES`, 和 `EXECUTE`。位置 14、15 和 16\
  \ 由 Oracle 保留供将来使用。字符 `S` 代表成功，`F` 代表失败，`B` 代表成功和失败都有。\n\n要关闭对某个对象的审计，请使用 `NOAUDIT`\
  \ 语句：\n\n```\nSQL> noaudit select, insert, update, delete on inv_mgmt.emp;\n```\n\
  \n![images](img/square.jpg) 提示：如果你需要查看 `AUD$` 表的 `SQL_TEXT` 或 `SQL_BIND` 列，那么请将\
  \ `AUDIT_TRAIL` 初始化参数设置为 `DB_EXTENDED`。\n\n## 工作原理\n\n在排查磁盘空间或性能问题时，了解数据库中哪些表正被应用程序实际使用，有时会很有帮助。如果你继承了一个包含大量表的数据库，可能并不明显哪些对象正在被访问。启用审计可以让你识别哪些类型的\
  \ SQL 语句正在访问你感兴趣的表。\n\n一旦你识别出未被使用的表，你可以简单地重命名这些表，观察这是否会破坏应用程序或是否有用户投诉。如果没有投诉，那么过一段时间后，你可以考虑删除这些表。在删除任何你以后可能需要恢复的表之前，请确保使用\
  \ RMAN 和 Data Pump 对数据库进行了良好备份。\n\n如果你只是需要知道一个表是否正在被插入、更新或删除，你可以使用 `DBA/ALL/USER_TAB_MODIFICATIONS`\
  \ 视图来报告此类活动。该视图具有诸如 `INSERTS`、`UPDATES`、`DELETES` 和 `TRUNCATED` 等列，这些列将提供有关表中数据如何被修改的信息——例如：\n\
  \n```\nselect table_name, inserts, updates, deletes, truncated\nfrom user_tab_modifications;\n\
  ```\n\n在正常情况下，Oracle 不会即时更新此视图。如果你需要立即查看表的修改情况，那么可以使用 `DBMS_STATS.FLUSH_DATABASE_MONITORING_INFO()`\
  \ 过程来更新该视图：\n\n```\nSQL> exec DBMS_STATS.FLUSH_DATABASE_MONITORING_INFO();\n```\n\
  \n## 第 2 章\n\n\n\n## 选择与优化索引\n\n索引是一种数据库对象，主要用于提升 SQL 查询的性能。数据库索引的功能类似于书籍末尾的索引。书籍索引将主题与页码关联起来。当你在书中查找信息时，通常先查阅索引、找到感兴趣的主题并确定相关页码，这样会快得多。有了这些信息，你可以直接翻到书中特定的页码。在这种情况下，你需要翻阅的页数是最少的。\n\
  \n如果没有索引，你就必须翻阅书中的每一页来查找信息。这会导致大量的翻页工作，尤其是对于大部头的书。这类似于一个未使用索引的 Oracle 查询，因此必须扫描表中每个已使用的数据块。对于大表而言，这会导致大量的\
  \ I/O 操作。\n\n书籍索引的用处直接与主题在书中的唯一性相关。例如，以本书为例，为“性能”这个主题创建索引毫无用处，因为本书的每一页都在讨论性能。然而，为“位图索引”这个主题创建索引则是有效的，因为书中只有少数几页涉及此特性。\n\
  \n请记住，索引并非免费。它会占用书籍末尾的空间，而且如果书中的内容更新（如第二版），每一次修改（插入、更新、删除）都可能需要对索引进行相应的更改。重要的是要记住，索引会消耗空间，并且在发生更新时需要资源。\n\
  \n此外，为书籍创建索引的人必须考虑哪些主题会被频繁查阅。具有高选择性且被频繁访问的主题应被纳入书籍索引中。如果一本书末尾的索引从未被读者查阅过，那么它就浪费了空间。\n\
  \n就像在书末创建索引的过程一样，在创建 Oracle 索引时也必须考虑许多因素。Oracle 提供了丰富的索引特性和选项。这些对象由 DBA 或开发人员手动创建。因此，你需要了解各种特性以及如何利用它们。如果你选择了错误的索引类型或错误地使用了某个特性，可能会对性能产生不利影响。在创建索引之前，需要考虑的方面如下所列：\n\
  \n*   索引类型\n*   要包含的表列\n*   是使用单列还是列的组合\n*   特殊特性，如并行、关闭日志记录、压缩、不可见索引等\n*   唯一性\n\
  *   命名约定\n*   表空间放置\n*   初始大小要求和增长\n*   对`SELECT`语句性能的影响（提升）\n*   对`INSERT`、`UPDATE`和`DELETE`语句性能的影响\n\
  *   如果底层表是分区的，则需考虑全局索引或本地索引\n\n当你创建索引时，应该考虑前面列表中提到的每一个方面。你首先需要做的决定之一是索引类型和要包含的列。Oracle\
  \ 提供了多种强大的索引类型。对于大多数场景，你可以使用默认的 B 树（平衡树）索引。其他常用的类型包括连接索引、位图索引和基于函数的索引。表 2-1 描述了\
  \ Oracle 可用的索引类型。\n\n![images](img/t0201.jpg)\n\n![images](img/t0201a.jpg)\n\n本章重点介绍最常用的索引和特性。本书不涵盖哈希集群索引、分区索引和域索引。如果你需要了解本章或本书未涵盖的索引类型或特性的更多信息，请参阅\
  \ Oracle 的 SQL 参考指南，网址为`http://otn.oracle.com`。\n\n本章的第一个“方法”涉及 B 树索引的机制。理解这个数据库对象的工作原理至关重要。即使你已经使用\
  \ Oracle 一段时间了，我们认为通读本方法中概述的各种场景也很有用，以确保你了解优化器如何使用这种类型的索引。这将为解决许多不同类型的性能问题（尤其是 SQL\
  \ 调优）奠定基础。\n\n### 2-1. 理解 B 树索引\n\n#### 问题\n\n你想创建一个索引。你知道 Oracle 中默认的索引类型是 B 树，但不太清楚索引在物理上是如何实现的。你希望充分理解\
  \ B 树索引的内部原理，以便在构建数据库应用程序时做出明智的性能决策。\n\n#### 解决方案\n\n一个带有良好图示的示例将有助于说明 B 树索引的机制。即使你使用\
  \ B 树索引已有一段时间，一个好的示例也可能阐明使用索引的技术细节。首先，假设你创建了一个如下所示的表：\n\n```\ncreate table cust(\n\
  \ cust_id number\n,last_name varchar2(30)\n,first_name varchar2(30));\n```\n\n你确定一些\
  \ SQL 查询会经常在`WHERE`子句中使用`LAST_NAME`。这促使你创建一个索引：\n\n```\nSQL> create index cust_idx1\
  \ on cust(last_name);\n```\n\n现在向表中插入了几百行数据（此处未显示所有行）：\n\n```\ninsert into cust\
  \ values(7, 'ACER','SCOTT');\ninsert into cust values(5, 'STARK','JIM');\ninsert\
  \ into cust values(3, 'GREY','BOB');\ninsert into cust values(11,'KHAN','BRAD');\n\
  .....\ninsert into cust values(274, 'ACER','SID');\n```\n\n插入行后，我们确保表统计信息是最新的，以便为查询优化器提供足够的信息来做出关于如何检索数据的良好选择：\n\
  \n```\nSQL> exec dbms_stats.gather_table_stats(ownname=>'MV_MAINT', -\n        \
  \   tabname=>'CUST',cascade=>true);\n```\n\n随着行被插入表中，Oracle 将分配由物理数据库块组成的区。Oracle\
  \ 也会为索引分配块。对于插入表中的每条记录，Oracle 还会在索引中创建一个条目，该条目由`ROWID`和列值（本例中是`LAST_NAME`中的值）组成。每个索引条目的`ROWID`指向存储表列值的数据文件和块。图\
  \ 2-1 以图形方式展示了数据如何存储在表中以及对应的 B 树索引。在此示例中，数据文件 10 和 15 包含存储在关联块中的表数据，数据文件 22 存储索引块。\n\
  \n![images](img/0201.jpg)\n\n**图 2-1.** 表和 B 树索引的物理布局\n\n在图 2-1 中有两条虚线。这些线描绘了索引结构中的`ROWID`如何指向表中`ACER`列值的物理位置。这些特定的值将在本解决方案的后续场景中使用。\n\
  \n当从表及其对应索引中选择数据时，存在三种基本场景：\n\n*   SQL 查询所需的所有表数据都包含在索引结构中。因此只需访问索引块。永远不会读取表的块。\n\
  *   查询所需的信息并未全部包含在索引块中。因此查询优化器选择同时访问索引块和表块，以检索满足查询结果所需的数据。\n*   查询优化器选择不访问索引。因此只访问表块。\n\
  \n上述情况将在接下来的三个小节中进行介绍。\n\n\n\n##### 场景一：所有数据都位于索引块中\n\n本节将展示两种场景：\n\n*   `索引范围扫描`：当优化器确定使用索引结构来检索查询所需的多行数据是高效时，就会发生这种情况。索引范围扫描在各种情况下被广泛使用。\n\
  *   `索引快速全扫描`：当优化器确定需要检索表中的大部分行时，就会发生这种情况。然而，所需的所有信息都存储在索引中。由于索引结构通常比表结构小，优化器判定对索引进行全扫描效率更高。这种场景常见于需要统计值的查询。\n\
  \n首先演示索引范围扫描。对于本例，假设执行了这样一个查询：\n\n```sql\nSQL> select last_name from cust where\
  \ last_name='ACER';\n```\n\n在继续阅读之前，请看图 2-1，并尝试回答这个问题：“Oracle 为返回此查询的数据需要读取的最少块数是多少？”换句话说，为了满足此查询的结果，访问物理块的最有效方式是什么？优化器可以选择读取表结构中的每个块。但是，这将导致大量的\
  \ I/O，因此不是检索数据的最佳方式。\n\n对于本例，检索数据最有效的方式是使用索引结构。要返回 `LAST_NAME` 列中包含值 `ACER` 的行，Oracle\
  \ 需要读取三个块：块 20、块 30 和块 39。我们可以使用 Oracle 的 `Autotrace` 工具来验证这一点：\n\n```sql\nSQL>\
  \ set autotrace on;\nSQL> select last_name from cust where last_name='ACER';\n```\n\
  \n以下是部分输出片段：\n\n```\n------------------------------------------------------------------------------\n\
  | Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |\n\
  ------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT |           |   101 |   808 |     1   (0)| 00:00:01 |\n\
  |*  1 |  INDEX RANGE SCAN| CUST_IDX1 |   101 |   808 |     1   (0)| 00:00:01 |\n\
  ------------------------------------------------------------------------------\n\
  ```\n\n之前的输出显示，Oracle 只需要使用 `CUST_IDX1` 索引来检索数据以满足查询的结果集。表数据块未被访问；只需要索引块。对于给定的查询，这是一种特别高效的索引策略。下面是此示例由\
  \ `Autotrace` 显示的统计信息：\n\n```\nStatistics\n----------------------------------------------------------\n\
  \          1  recursive calls\n          0  db block gets\n          3  consistent\
  \ gets\n          0  physical reads\n```\n\n`consistent gets` 值表明从内存中读取了三个块（`db\
  \ block gets` 加上 `consistent gets` 等于从内存读取的总块数）。由于索引块已经在内存中，因此返回此查询的结果集不需要物理读取。\n\
  \n接下来演示一个导致索引快速全扫描的示例。考虑这个查询：\n\n```sql\nSQL> select count(last_name) from cust;\n\
  ```\n\n使用 `SET AUTOTRACE ON`，会生成一个执行计划。对应的输出如下：\n\n```\n-----------------------------------------------------------------------------------\n\
  | Id  | Operation             | Name      | Rows  | Bytes | Cost (%CPU)| Time  \
  \   |\n-----------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT      |           |     1 |     8 |     3   (0)| 00:00:01\
  \ |\n|   1 |  SORT AGGREGATE       |           |     1 |     8 |            |  \
  \        |\n|   2 |   INDEX FAST FULL SCAN| CUST_IDX1 |  1509 | 12072 |     3  \
  \ (0)| 00:00:01 |\n-----------------------------------------------------------------------------------\n\
  ```\n\n之前的输出显示，仅使用索引结构来确定表中的计数。在这种情况下，优化器判定对索引进行全扫描比对表进行全扫描更高效。\n\n##### 场景二：索引未包含所有信息\n\
  \n现在考虑这种情况：假设我们需要从 `CUST` 表中获取更多信息。这个查询额外选择了 `FIRST_NAME` 列：\n\n```sql\nSQL> select\
  \ last_name, first_name from cust where last_name = 'ACER';\n```\n\n使用 `SET AUTOTRACE\
  \ ON` 并执行上述查询，会产生以下执行计划：\n\n```\n-----------------------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name      | Rows  | Bytes | Cost (%CPU)| Time\
  \     |\n-----------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |           |   101 |  1414 |     3   (0)| 00:00:01\
  \ |\n|   1 |  TABLE ACCESS BY INDEX ROWID| CUST      |   101 |  1414 |     3   (0)|\
  \ 00:00:01 |\n|*  2 |   INDEX RANGE SCAN          | CUST_IDX1 |   101 |       |\
  \     1   (0)| 00:00:01 |\n-----------------------------------------------------------------------------------------\n\
  ```\n\n之前的输出表明，通过 `INDEX RANGE SCAN` 访问了 `CUST_IDX1` 索引。`INDEX RANGE SCAN` 识别了满足此查询结果所需的索引块。此外，通过\
  \ `TABLE ACCESS BY INDEX ROWID` 读取了表。通过索引的 `ROWID` 访问表意味着 Oracle 使用存储在索引中的 `ROWID`\
  \ 来定位表块中包含的数据。在图 2-1 中，这由映射到包含 `LAST_NAME` 列值 `ACER` 的相应表块的虚线表示。\n\n再次查看图 2-1，在此场景中需要读取多少个表块和索引块？索引要求必须读取块\
  \ 20、30 和 39。由于 `FIRST_NAME` 不包含在索引中，Oracle 必须读取表块以检索这些值。Oracle 知道表块的 `ROWID` 并直接读取块\
  \ 11 和 2500 来检索该数据。总共是五个块。以下是 `Autotrace` 生成的部分统计信息片段，确认读取的块数为五：\n\n```\nStatistics\n\
  ----------------------------------------------------------\n          1  recursive\
  \ calls\n          0  db block gets\n          5  consistent gets\n          0 \
  \ physical reads\n```\n\n\n\n##### 场景三：仅访问表块\n\n在某些情况下，即使存在索引，Oracle 也会判断仅使用表块更为高效。当\
  \ Oracle 检查表中的每一行时，这被称为*全表扫描*。例如，看下面这个查询：\n\n`SQL> select * from cust;`\n\n以下是对应的执行计划和统计信息：\n\
  \n```\n--------------------------------------------------------------------------\n\
  | Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n--------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |      |  1509 | 24144 |    12   (0)| 00:00:01 |\n|  \
  \ 1 |  TABLE ACCESS FULL| CUST |  1509 | 24144 |    12   (0)| 00:00:01 |\n--------------------------------------------------------------------------\n\
  ```\n\n```\nStatistics\n----------------------------------------------------------\n\
  \          0  recursive calls\n          0  db block gets\n        119  consistent\
  \ gets\n          0  physical reads\n```\n\n先前的输出显示总共检查了 119 个块。Oracle 搜索了表中的每一行，以取回满足查询所需的结果。在这种情况下，必须读取表的所有块，Oracle\
  \ 无法使用索引来加速数据的检索。\n\n![images](img/square.jpg) `注意` 对于本技巧中的示例，根据你最初插入表中的行数，结果可能略有不同。本例中我们使用了大约\
  \ 1,500 行。\n\n#### 工作原理\n\nB 树索引是 Oracle 中的默认索引类型。对于大多数 OLTP 类型的应用程序，此索引类型已足够。这种索引类型被称为\
  \ B 树，因为 `ROWID` 和相关的列值存储在一个*平衡*的树状结构中（参见图 2-1）。B 代表平衡。\n\nB 树索引之所以高效，是因为如果使用得当，它们能使查询检索数据的速度远快于没有索引的情况。如果索引结构本身包含了满足查询结果所需的列值，那么就无需访问表数据块。理解这些机制将指导你的索引决策过程。例如，这将帮助你决定对哪些列建立索引，以及对于某些查询，复合索引是否可能更高效，而对于其他查询则不是最优。本章后续技巧将详细讨论这些主题。\n\
  \n**估算索引所需的空间**\n\n在创建索引之前，你可以通过 `DBMS_SPACE.CREATE_INDEX_COST` 过程来估算其将占用多少空间——例如：\n\
  \n```\nSQL> set serverout on\nSQL> exec dbms_stats.gather_table_stats(user,'CUST');\n\
  SQL> variable used_bytes number\nSQL> variable alloc_bytes number\nSQL> exec dbms_space.create_index_cost(\
  \ 'create index cust_idx2 on cust(first_name)', -\n               :used_bytes, :alloc_bytes\
  \ );\nSQL> print :used_bytes\n```\n\n以下是此示例的样本输出：\n\n```\nUSED_BYTES\n----------\n\
  \    363690\n```\n\n```\nSQL> print :alloc_bytes\n```\n\n以下是此示例的样本输出：\n\n```\nALLOC_BYTES\n\
  -----------\n    2097152\n```\n\n`used_bytes` 变量为你提供索引数据所需空间大小的估算值。`alloc_bytes`\
  \ 变量则提供将在表空间内分配的空间大小的估算值。\n\n### 2-2. 决定对哪些列建立索引\n\n#### 问题\n\n你管理的一个数据库包含数百张表。每张表通常包含一打或更多的列。你想知道应该对哪些列建立索引。\n\
  \n#### 解决方案\n\n以下是一些决定对哪些列建立索引的通用准则。\n\n*   为每张表定义一个主键约束，这会导致在主键指定的列上自动创建索引（参见技巧\
  \ 2-3）。\n*   在非空且要求唯一（不同于主键列）的列值上创建唯一键约束。这会导致在唯一键约束指定的列上自动创建索引（参见技巧 2-4）。\n*   在外键列上显式创建索引（参见技巧\
  \ 2-5）。\n*   在经常作为频繁执行的 SQL 查询的 `WHERE` 子句谓词使用的列上创建索引。\n\n在决定创建索引后，我们建议你遵守有助于轻松维护的索引创建标准。具体来说，创建索引时遵循以下准则：\n\
  \n*   除非有充分理由使用其他索引类型，否则使用默认的 B 树索引。\n*   为索引创建单独的表空间。这使你能够更容易地将索引与表分开管理，例如进行备份和恢复任务。\n\
  *   让索引从其表空间继承存储属性。这允许你在创建表空间时指定存储属性，而无需管理各个索引的存储属性。\n*   如果你的索引有各种存储需求，考虑为每种索引类型创建单独的表空间——例如，分别为\
  \ `INDEX_LARGE`、`INDEX_MEDIUM` 和 `INDEX_SMALL` 表空间，每个都定义适合索引大小的存储特性。\n\n下面是一个示例脚本，它封装了上述两个要点列表中的建议：\n\
  \n```\nCREATE TABLE cust(\n cust_id    NUMBER\n,last_name  VARCHAR2(30)\n,first_name\
  \ VARCHAR2(30));\n--\nALTER TABLE cust ADD CONSTRAINT cust_pk PRIMARY KEY (cust_id)\n\
  USING INDEX TABLESPACE reporting_index;\n--\nALTER TABLE cust ADD CONSTRAINT cust_uk1\
  \ UNIQUE (last_name, first_name)\nUSING INDEX TABLESPACE reporting_index;\n--\n\
  CREATE TABLE address(\n address_id NUMBER,\n cust_id    NUMBER\n,street     VARCHAR2(30)\n\
  ,city       VARCHAR2(30)\n,state      VARCHAR2(30))\nTABLESPACE reporting_data;\n\
  --\nALTER TABLE address ADD CONSTRAINT addr_fk1\nFOREIGN KEY (cust_id) REFERENCES\
  \ cust(cust_id);\n--\nCREATE INDEX addr_fk1 ON address(cust_id)\nTABLESPACE reporting_index;\n\
  ```\n\n在前面的脚本中，创建了两张表。父表是 `CUST`，其主键是 `CUST_ID`。子表是 `ADDRESS`，其主键是 `ADDRESS_ID`。`ADDRESS`\
  \ 表中存在 `CUST_ID` 列作为外键，映射回 `CUST` 表中的 `CUST_ID` 列。\n\n\n## 工作原理\n\n仅当你确信索引能提升性能时才添加它。滥用索引可能产生严重的负面影响。错误类型或错误列上的索引只会消耗空间和处理资源。作为数据库管理员，你必须制定策略以确保索引能增强性能，而不会对应用程序产生负面影响。\n\
  \n表 2-2 总结了本章涵盖的许多索引管理概念。这些建议并非一成不变：请根据你的环境需要进行调整和修改。\n\n![images](img/t0202.jpg)\n\
  \n在数据库中创建和管理索引时，请参考这些准则。这些建议旨在帮助你正确使用索引技术。\n\n### 无段索引\n\n你可以通过 `NOSEGMENT` 子句指示\
  \ Oracle 创建一个永不会被使用且不会为其分配任何区间的索引：\n\n```sql\nSQL> create index cust_idx1 on cust(first_name)\
  \ nosegment;\n```\n\n尽管此索引永远不会被使用，但你可以通过 `_USE_NOSEGMENT_INDEXES` 初始化参数指示 Oracle\
  \ 判断优化器是否会使用该索引——例如：\n\n```sql\nSQL> alter session set \"_use_nosegment_indexes\"\
  =true;\nSQL> set autotrace trace explain;\nSQL> select first_name from cust where\
  \ first_name = 'JIM';\n```\n\n以下是一个示例执行计划，显示了优化器将使用该索引（假设你已正常删除并重新创建了它，不带 `NOSEGMENT`\
  \ 子句）：\n\n```\n-----------------------------------------------------------------------------\n\
  | Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |\n\
  -----------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT |           |     1 |    17 |     1   (0)| 00:00:01 |\n\
  |*  1 |  INDEX RANGE SCAN| CUST_IDX1 |     1 |    17 |     1   (0)| 00:00:01 |\n\
  -----------------------------------------------------------------------------\n\
  ```\n\n这就引出了一个问题：你为何要创建带 `NOSEGMENT` 的索引？如果你有一个非常大的索引，希望在不分配空间的情况下创建它，以确定优化器是否会使用该索引，那么创建带\
  \ `NOSEGMENT` 的索引可以让你测试这种情况。如果你确定该索引有用，可以删除它并重新创建，而不带 `NOSEGMENT` 子句。\n\n### 2-3.\
  \ 创建主键索引\n\n### 问题\n\n你想要强制主键列在表中唯一。此外，主键中的许多列经常在多个查询的 `WHERE` 子句中使用。你希望确保在主键列上创建索引。\n\
  \n### 解决方案\n\n当你为表定义主键约束时，Oracle 会自动为你创建一个关联的索引。有多种方法可用于创建主键约束。我们推荐的方法是使用 `ALTER\
  \ TABLE...ADD CONSTRAINT` 语句。这将同时创建索引和约束。此示例创建了一个名为 `CUST_PK` 的主键约束，并指示 Oracle 在\
  \ `USERS` 表空间中创建相应的索引（也命名为 `CUST_PK`）：\n\n```sql\nalter table cust add constraint\
  \ cust_pk primary key (cust_id)\nusing index tablespace users;\n```\n\n以下查询和输出提供了关于\
  \ Oracle 创建的约束和索引的详细信息。第一个查询显示约束信息：\n\n```sql\nselect\n  constraint_name\n,constraint_type\n\
  from user_constraints\nwhere table_name = 'CUST';\n```\n```\nCONSTRAINT_NAME   \
  \             C\n------------------------------ -\nCUST_PK                     \
  \   P\n```\n\n此查询显示索引信息：\n\n```sql\nselect\n  index_name\n,tablespace_name\n,index_type\n\
  ,uniqueness\nfrom user_indexes\nwhere table_name = 'CUST';\n```\n```\nINDEX_NAME\
  \      TABLESPACE_NAME INDEX_TYPE      UNIQUENESS\n--------------- ---------------\
  \ --------------- ---------------\nCUST_PK         USERS           NORMAL      \
  \    UNIQUE\n```\n\n### 工作原理\n\n本配方的解决方案展示了我们推荐创建主键约束及相应索引的方法。在大多数情况下，这种方法是可接受的。然而，你应该知道还有其他几种创建主键约束和索引的方法。这些方法如下所列：\n\
  \n- 先创建索引，然后使用 `ALTER TABLE...ADD CONSTRAINT`。\n- 在 `CREATE TABLE` 语句中内联（与列一起）指定约束。\n\
  - 在 `CREATE TABLE` 语句中行外（与列分开）指定约束。\n\n这些技术将在接下来的小节中描述。\n\n#### 分别创建索引和约束\n\n你可以选择先创建索引，然后通过修改表来应用主键约束。示例如下：\n\
  \n```sql\nSQL> create index cust_pk on cust(cust_id);\nSQL> alter table cust add\
  \ constraint cust_pk primary key(cust_id);\n```\n\n这种方法的优点是，你可以独立于索引删除或禁用主键约束。如果你处理大量数据，可能需要这种灵活性。这种方法允许你在不重建索引的情况下禁用/重新启用约束。\n\
  \n#### 内联创建约束\n\n你可以直接在 `CREATE TABLE` 语句中内联（与列一起）创建索引。这种方法简单，但不允许多列主键，也不能为约束命名：\n\
  \n```sql\nSQL> create table cust(cust_id number primary key);\n```\n\n如果你没有显式命名约束（如前面的语句），Oracle\
  \ 会自动生成一个类似 `SYS_C123456` 的名称。如果你想显式提供一个名称，可以按如下方式操作：\n\n```sql\ncreate table cust(cust_id\
  \ number constraint cust_pk primary key\nusing index tablespace users);\n```\n\n\
  这种方法的优点是非常简单。如果你在开发或测试环境中进行实验，这种方法快速且有效。\n\n#### 行外创建约束\n\n你也可以在 `CREATE TABLE`\
  \ 语句中行外（与列分开）定义主键约束：\n\n```sql\ncreate table cust(cust_id number\n,constraint cust_pk\
  \ primary key (cust_id)\nusing index tablespace users);\n```\n\n行外方法相对于内联方法有一个优点：你可以为主键指定多个列。\n\
  \n所有上述创建主键约束和相应索引的技术都是有效的。具体使用哪种技术通常取决于数据库管理员或开发人员的偏好。\n\n### 2-4. 创建唯一索引\n\n###\
  \ 问题\n\n你有一个列（或列的组合），其值应该始终唯一。你希望在该列（或列的组合）上创建一个索引，以强制唯一性，并在查询的 `WHERE` 子句中使用该唯一列时，提供对表的高效访问。\n\
  \n![images](img/square.jpg) **注意** 如果你想在主键列上创建唯一约束，那么你应该显式创建一个主键约束（详情参见配方 2-3）。主键和唯一键的一个区别是，每个表只能有一个主键定义，而可以有多个唯一键。此外，唯一键约束允许空值，而主键约束不允许。\n\
  \n#### 解决方案\n\n本方案重点介绍使用 `ALTER TABLE...ADD CONSTRAINT` 语句。当你创建唯一键约束时，Oracle 会自动为你创建一个索引。这是我们创建唯一键约束和索引的推荐方法。此示例在\
  \ `CUST` 表的 `LAST_NAME` 和 `FIRST_NAME` 列组合上创建了一个名为 `CUST_UX1` 的唯一约束：\n\n```sql\n\
  alter table cust add constraint cust_ux1 unique (last_name, first_name)\nusing index\
  \ tablespace users;\n```\n\n上述语句创建了唯一约束，此外 Oracle 还自动创建了一个关联的索引。以下查询显示已成功创建的约束：\n\
  \n```sql\nselect\n constraint_name\n,constraint_type\nfrom user_constraints\nwhere\
  \ table_name = 'CUST';\n```\n\n以下是输出片段：\n\n```\nCONSTRAINT_NAME                C\n\
  ------------------------------ -\nCUST_UX1                       U\n```\n\n此查询显示了随约束自动创建的索引：\n\
  \n```sql\nselect\n index_name\n,tablespace_name\n,index_type\n,uniqueness\nfrom\
  \ user_indexes\nwhere table_name = 'CUST';\n```\n\n以下是一些示例输出：\n\n```\nINDEX_NAME\
  \           TABLESPACE INDEX_TYPE UNIQUENESS\n-------------------- ---------- ----------\
  \ ---------\nCUST_UX1             USERS      NORMAL     UNIQUE\n```\n\n#### 工作原理\n\
  \n定义唯一约束可确保在插入或更新列值时，任何非空值的组合都是唯一的。除了我们在“解决方案”部分展示的方法外，还有几种其他技术可以创建唯一约束：\n\n*  \
  \ 使用 `CREATE TABLE` 语句。\n*   创建一个常规索引，然后使用 `ALTER TABLE` 添加约束。\n*   创建唯一索引但不添加约束。\n\
  \n这些技术将在接下来的几个小节中描述。\n\n##### 使用 CREATE TABLE\n\n下面列出了使用 `CREATE TABLE` 语句包含唯一约束的示例。\n\
  \n```sql\ncreate table cust(\n cust_id number\n,last_name varchar2(30)\n,first_name\
  \ varchar2(30)\n,constraint cust_ux1 unique(last_name, first_name)\n using index\
  \ tablespace users);\n```\n\n这种方法的优点是简单，并将约束和索引创建封装在一个语句中。\n\n##### 先创建索引，然后添加约束\n\
  \n你可以选择先创建一个索引，然后在单独的语句中添加约束——例如：\n\n```sql\nSQL> create unique index cust_uidx1\
  \ on cust(last_name, first_name) tablespace users;\nSQL> alter table cust add constraint\
  \ cust_uidx1 unique (last_name, first_name);\n```\n\n将索引创建与约束分开的优点是，你可以在不删除底层索引的情况下删除或禁用约束。处理大型索引时，你可能需要考虑这种方法。如果需要出于任何原因禁用约束并在以后重新启用，你可以在不删除索引的情况下完成（对于大型索引，删除操作可能非常耗时）。\n\
  \n##### 仅创建唯一索引\n\n你也可以仅创建一个唯一索引而不添加唯一约束——例如：\n\n```sql\nSQL> create unique index\
  \ cust_uidx1 on cust(last_name, first_name) tablespace users;\n```\n\n当你显式地仅创建唯一索引时（如前面的语句），Oracle\
  \ 会创建一个唯一索引，但不会在 `DBA/ALL/USER_CONSTRAINTS` 中为约束添加条目。为什么这很重要？考虑以下场景：\n\n```sql\n\
  SQL> insert into cust values (1, 'STARK', 'JIM');\nSQL> insert into cust values\
  \ (1, 'STARK', 'JIM');\n```\n\n以下是抛出的相应错误消息：\n\n```\nERROR at line 1:\nORA-00001:\
  \ unique constraint (MV_MAINT.CUST_UIDX1) violated\n```\n\n如果你被要求排查此问题，首先会查看 `DBA_CONSTRAINTS`\
  \ 中名为 `CUST_UIDX1` 的约束。但是，没有信息：\n\n```sql\nselect\n  constraint_name\nfrom dba_constraints\n\
  where constraint_name='CUST_UIDX1';\n```\n\n```\nno rows selected\n```\n\n“未选定行”的消息可能会令人困惑：向表中插入数据时抛出的错误消息表明违反了唯一约束，但在约束相关的数据字典视图中却没有任何信息。在这种情况下，你必须查看\
  \ `DBA_INDEXES` 以查看已创建的唯一索引的详细信息——例如：\n\n```sql\nselect index_name, uniqueness\n\
  from dba_indexes where index_name='CUST_UIDX1';\n```\n\n```\nINDEX_NAME        \
  \             UNIQUENESS\n------------------------------ ----------\nCUST_UIDX1\
  \                     UNIQUE\n```\n\n### 2-5. 为外键列创建索引\n\n#### 问题\n\n你应用程序中的大量查询使用外键列作为\
  \ `WHERE` 子句中的谓词。因此，出于性能原因，你希望确保所有外键列都建有索引。\n\n#### 解决方案\n\n与主键约束不同，Oracle 不会自动在外键列上创建索引。例如，假设你有一个要求：`ADDRESS`\
  \ 表中的每条记录都必须分配一个在 `CUST` 表中存在的相应 `CUST_ID` 列值。为了强制实施这种关系，你在 `ADDRESS` 表上创建了一个外键约束，如下所示：\n\
  \n```sql\nalter table address add constraint addr_fk1\nforeign key (cust_id) references\
  \ cust(cust_id);\n```\n\n![images](img/square.jpg) **注意** 外键列必须引用父表中定义了主键或唯一键约束的列。否则你会收到错误“ORA-02270:\
  \ 此列列表没有匹配的唯一或主键”。\n\n你意识到在连接 `CUST` 和 `ADDRESS` 表时，外键列被广泛使用，并且在外键列上建立索引将显著提高性能。在这种情况下，你必须手动创建索引。例如，在\
  \ `ADDRESS` 表的 `CUST_ID` 外键列上创建一个常规的 B 树索引：\n\n```sql\nSQL> create index addr_fk1\
  \ on address(cust_id);\n```\n\n你不必将索引命名为与外键名称相同（就像我们在前面的代码行中所做的那样）。是否这样做取决于个人偏好。我们认为，当约束和相应的索引具有相同名称时，维护环境会更加容易。\n\
  \n\n#### 工作原理\n\n外键的存在是为了确保在向子表中插入数据时，对应的父表记录确实存在。这是一种保证数据符合父子业务关系规则的机制。从性能角度看，通常为外键列创建索引是一个好主意。这是因为父子表经常通过子表中的外键列与父表中的主键列进行连接——例如：\n\
  \n```sql\nselect\n a.last_name, a.first_name, b.state\nfrom cust a\n    ,address\
  \ b\nwhere a.cust_id = b.cust_id;\n```\n\n在大多数情况下，Oracle 查询优化器会选择使用外键列上的索引来识别满足查询结果所需的子记录。如果没有索引，Oracle\
  \ 就必须对子表执行全表扫描。\n\n如果你继承了一个数据库，那么谨慎的做法是检查定义了外键约束的列是否有对应的索引。以下查询显示了与外键约束关联的索引：\n\n\
  ```sql\nselect\n  a.constraint_name cons_name\n ,a.table_name      tab_name\n ,b.column_name\
  \ cons_column\n ,nvl(c.column_name,'***无索引***') ind_column\nfrom user_constraints\
  \  a\n     join\n     user_cons_columns b on a.constraint_name = b.constraint_name\n\
  \     left outer join\n     user_ind_columns  c on b.column_name = c.column_name\n\
  \                        and b.table_name  = c.table_name\nwhere constraint_type\
  \ = 'R'\norder by 2,1;\n```\n\n如果外键列上没有索引，则会显示 ***无索引*** 信息。例如，假设“解决方案”部分中的索引被意外删除，然后运行了前面的查询。以下是一些示例输出：\n\
  \n```\nCONS_NAME          TAB_NAME                CONS_COLUMN               IND_COLUMN\n\
  ------------------ ----------------------- ------------------------- --------------------\n\
  ADDR_FK1           ADDRESS                 CUST_ID                   ***无索引***\n\
  ```\n\n### 2-6. 决定何时使用复合索引\n\n#### 问题\n\n你有一组（来自同一张表的）列，它们经常在几个 SQL 查询的 `WHERE`\
  \ 子句中一起使用。例如，你使用 `LAST_NAME` 与 `FIRST_NAME` 的组合来标识客户：\n\n```sql\nselect last_name,\
  \ first_name\nfrom cust\nwhere last_name = 'SMITH'\nand first_name = 'STEVE';\n\
  ```\n\n你不确定是创建一个在 `LAST_NAME` 和 `FIRST_NAME` 列组合上的单个复合索引更高效，还是分别在 `LAST_NAME` 和\
  \ `FIRST_NAME` 上创建两个单独的索引性能更好。\n\n#### 解决方案\n\n当经常在 `WHERE` 子句中同时访问两个或多个列时，复合索引通常比两个单列索引更具选择性。对于此示例，以下是表创建脚本：\n\
  \n```sql\ncreate table cust(\n cust_id number primary key\n,last_name varchar2(30)\n\
  ,first_name varchar2(30));\n```\n\n以下是在 `LAST_NAME` 和 `FIRST_NAME` 上创建的复合索引示例：\n\
  \n```sql\nSQL> create index cust_idx1 on cust(last_name, first_name);\n```\n\n为了确定是否使用了复合索引，插入了几行数据（这里只显示了部分行）：\n\
  \n```sql\nSQL> insert into cust values(1,'SMITH','JOHN');\nSQL> insert into cust\
  \ values(2,'JONES','DAVE');\n..........\nSQL> insert into cust values(3,'FORD','SUE');\n\
  ```\n\n接下来，为表和索引生成统计信息：\n\n```sql\nSQL> exec dbms_stats.gather_table_stats(ownname=>'MV_MAINT',-\n\
  \           tabname=>'CUST',cascade=>true);\n```\n\n现在启用 Autotrace，以便在运行查询时显示执行计划：\n\
  \n```sql\nSQL> set autotrace on;\n```\n\n以下是待执行的查询：\n\n```sql\nselect last_name,\
  \ first_name\nfrom cust\nwhere last_name = 'SMITH'\nand first_name = 'JOHN';\n```\n\
  \n接下来列出了一个执行计划，显示优化器正在使用索引：\n\n```\n------------------------------------------------------------------------------\n\
  | Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |\n\
  ------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT |           |    13 |   143 |     1   (0)| 00:00:01 |\n\
  |*  1 |  INDEX RANGE SCAN| CUST_IDX1 |    13 |   143 |     1   (0)| 00:00:01 |\n\
  ------------------------------------------------------------------------------\n\
  ```\n\n前面的输出表明使用了 `INDEX RANGE SCAN` 来访问 `CUST_IDX1` 索引。请注意，满足此查询结果所需的所有信息都包含在索引中。不需要访问表数据。Oracle\
  \ 只访问了索引。\n\n另外需要考虑的一点是：假设你有这个额外选择了 `CUST_ID` 列的查询：\n\n```sql\nselect cust_id, last_name,\
  \ first_name\nfrom cust\nwhere last_name = 'SMITH'\nand first_name = 'JOHN';\n```\n\
  \n如果你经常将 `CUST_ID` 与 `LAST_NAME` 和 `FIRST_NAME` 一起访问，考虑将 `CUST_ID` 添加到复合索引中。这将为查询提供索引中的所有信息。Oracle\
  \ 将能够从索引块中检索所需的数据，从而无需访问表块。\n\n#### 工作原理\n\nOracle 允许你创建包含多于一列的索引。多列索引被称为*复合索引*。当你经常在访问表时在\
  \ `WHERE` 子句中使用多个列时，这些索引尤其有效。以下是使用复合索引时需要考虑的一些因素：\n\n*   如果列经常在 `WHERE` 子句中一起使用，考虑创建一个复合索引。\n\
  *   如果一个列在（其他查询中）单独用于 `WHERE` 子句，请将该列放在索引的前沿（定义的第一列）。\n*   请记住，如果滞后列单独出现在 `WHERE`\
  \ 子句中，Oracle 仍然可以使用滞后边缘索引（非定义的第一列）（有关详细信息，请参阅此处接下来的几段）。\n\n在旧版本的 Oracle（约 v8）中，优化器仅当前沿列出现在\
  \ `WHERE` 子句中时才会使用复合索引。在现代版本中，即使前沿列没有出现在 `WHERE` 子句中，优化器也会使用复合索引。这种无需引用前沿列即可使用索引的能力被称为*跳过扫描*功能。例如，假设你有这个使用\
  \ `FIRST_NAME` 列（这是“解决方案”部分创建的复合索引中的一个滞后列）的查询：\n\n```sql\nSQL> select last_name\
  \ from cust where first_name='DAVE';\n```\n\n以下是相应的执行计划，表明跳过扫描功能正在发挥作用：\n\n```\n\
  ------------------------------------------------------------------------------\n\
  | Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |\n\
  ------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT |           |    38 |   418 |     1   (0)| 00:00:01 |\n\
  |*  1 |  INDEX SKIP SCAN | CUST_IDX1 |    38 |   418 |     1   (0)| 00:00:01 |\n\
  ------------------------------------------------------------------------------\n\
  ```\n\n用于跳过扫描的复合索引比全表扫描更高效。但是，如果你始终只使用复合索引的滞后边缘列，那么请考虑在该滞后列上创建一个单列索引。\n\n### 2-7.\
  \ 通过压缩减小索引大小\n\n\n#### 问题\n\n您希望创建一个索引，用以高效处理那些在索引的一个或多个列中具有相同值的行大量存在的情况。例如，假设您有一个定义如下的表：\n\
  \n```sql\ncreate table cust(\n cust_id number\n,last_name varchar2(30)\n,first_name\
  \ varchar2(30)\n,middle_name varchar2(30));\n```\n\n此外，您使用此查询来检查插入到上述表中的数据：\n\n\
  ```sql\nSQL> select last_name, first_name, middle_name from cust;\n```\n\n您会注意到在\
  \ `LAST_NAME` 和 `FIRST_NAME` 列中存在大量重复：\n\n```\n    LEE                  JOHN   \
  \              Q\n    LEE                  JOHN                 B\n    LEE     \
  \             JOHN                 A\n    LEE                  JOE             \
  \     D\n    SMITH                BOB                  A\n    SMITH            \
  \    BOB                  C\n    SMITH                BOB                  D\n \
  \   SMITH                JOHN                 J\n    SMITH                JOHN \
  \                A\n    SMITH                MIKE                 K\n    SMITH \
  \               MIKE                 R\n    SMITH                MIKE          \
  \       S\n```\n\n您希望创建一个能压缩值以将条目紧凑存储到块中的索引。当访问索引时，压缩将导致更少的块读取，从而提升性能。具体来说，您希望在此表的\
  \ `LAST_NAME` 和 `FIRST_NAME` 列上创建一个键压缩索引。\n\n#### 解决方案\n\n使用 `COMPRESS N` 子句创建压缩索引：\n\
  \n```sql\nSQL> create index cust_cidx1 on cust(last_name, first_name) compress 2;\n\
  ```\n\n前面的代码行指示 Oracle 在两列（`LAST_NAME` 和 `FIRST_NAME`）上创建压缩索引。在此示例中，如果我们确定仅第一列存在高度重复，我们可以通过指定整数\
  \ 1 来指示 `COMPRESS N` 子句仅压缩第一列（`LAST_NAME`）：\n\n```sql\nSQL> create index cust_cidx1\
  \ on cust(last_name, first_name) compress 1;\n```\n\n#### 工作原理\n\n索引压缩对于包含多列且前导索引列值经常重复的索引非常有用。压缩索引具有以下优势：\n\
  \n*   减少存储空间\n*   在叶块中存储更多行，这可能导致访问压缩索引时 I/O 更少\n\n压缩程度将根据为压缩指定的索引列中重复值的数量而变化。您可以通过在创建启用压缩的索引前后运行以下两个查询来验证压缩程度和使用的叶块数量：\n\
  \n```sql\nSQL> select sum(bytes) from user_extents where segment_name='&&ind_name';\n\
  SQL> select index_name, leaf_blocks from user_indexes where index_name='&&ind_name';\n\
  ```\n\n您可以按如下方式验证索引压缩是否在使用中以及相应的前缀长度：\n\n```sql\nselect  index_name, compression,\
  \ prefix_length\nfrom user_indexes\nwhere index_name = 'CUST_CIDX1';\n```\n\n以下是一些示例输出，表明索引已启用压缩，且前缀长度为\
  \ 2：\n\n```\nINDEX_NAME                     COMPRESS PREFIX_LENGTH\n------------------------------\
  \ -------- -------------\nCUST_CIDX1                     ENABLED              2\n\
  ```\n\n您可以通过重建索引来修改前缀长度。以下代码将前缀长度更改为 1：\n\n```sql\nSQL> alter index cust_cidx1 rebuild\
  \ compress 1;\n```\n\n您可以通过重建索引来为现有索引启用或禁用压缩。此示例使用无压缩重建索引：\n\n```sql\nSQL> alter\
  \ index cust_cidx1 rebuild nocompress;\n```\n\n![images](img/square.jpg) 注意 您无法在位图索引上创建键压缩索引。\n\
  \n### 2-8. 实现基于函数的索引\n\n#### 问题\n\n一个查询运行缓慢。您检查 `WHERE` 子句，注意到 SQL `UPPER` 函数已应用于某一列。`UPPER`\
  \ 函数阻止了该列上现有索引的使用。您希望创建一个基于函数的索引以支持该查询。以下是此类查询的示例：\n\n```sql\nSELECT first_name\n\
  FROM cust\nWHERE UPPER(first_name) = 'DAVE';\n```\n\n您检查 `USER_INDEXES`，发现 `FIRST_NAME`\
  \ 列上存在一个索引：\n\n```sql\nselect  index_name, column_name\nfrom user_ind_columns\n\
  where table_name = 'CUST';\n```\n\n```\nINDEX_NAME           COLUMN_NAME\n--------------------\
  \ --------------------\nCUST_IDX1            FIRST_NAME\n```\n\n您通过 `SET AUTOTRACE\
  \ TRACE EXPLAIN` 生成解释计划，并注意到当 `UPPER` 函数应用于该列时，未使用索引：\n\n```\n--------------------------------------------------------------------------\n\
  | Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n--------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |      |     1 |    17 |     2   (0)| 00:00:01 |\n|* \
  \ 1 |  TABLE ACCESS FULL| CUST |     1 |    17 |     2   (0)| 00:00:01 |\n--------------------------------------------------------------------------\n\
  ```\n\n您需要创建一个 Oracle 将在此情况下使用的索引。\n\n#### 解决方案\n\n有两种方法可以解决此问题：\n\n*   创建基于函数的索引。\n\
  *   如果使用 Oracle Database 11g 或更高版本，请创建索引虚拟列（有关详细信息，请参见配方 2-9）。\n\n此解决方案重点介绍使用基于函数的索引。您通过在索引创建语句中引用\
  \ SQL 函数和列来创建基于函数的索引。对于此示例，在 `UPPER(name)` 上创建了一个基于函数的索引：\n\n```sql\nSQL> create\
  \ index cust_fidx1 on cust(UPPER(first_name));\n```\n\n要验证是否使用了该索引，请打开 Autotrace\
  \ 工具：\n\n```sql\nSQL> set autotrace trace explain;\n```\n\n现在执行查询：\n\n```sql\nSELECT\
  \ first_name\nFROM cust\nWHERE UPPER(first_name) = 'DAVE';\n```\n\n以下是显示使用基于函数的索引的执行计划结果：\n\
  \n```\n------------------------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name       | Rows  | Bytes | Cost (%CPU)|\
  \ Time     |\n------------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |            |     1 |    34 |     1   (0)|\
  \ 00:00:01 |\n|   1 |  TABLE ACCESS BY INDEX ROWID| CUST       |     1 |    34 |\
  \     1   (0)| 00:00:01 |\n|*  2 |   INDEX RANGE SCAN          | CUST_FIDX1 |  \
  \   1 |       |     1   (0)| 00:00:01 |\n------------------------------------------------------------------------------------------\n\
  ```\n\n![images](img/square.jpg) 注意 您无法修改已应用基于函数索引的列。您必须先删除索引，修改列，然后重新创建索引。\n\n\n"
- "# 2-8. 创建函数索引\n\n## 问题\n\n你需要创建一个函数索引。\n\n## 解决方案\n\n使用 `CREATE INDEX` 语句并在其定义中包含一个函数或表达式来创建函数索引：\n\
  \n```sql\nSQL> create index cust_upper_idx1\n  2  on cust(upper(first_name));\n\
  ```\n\n这将在 `cust` 表上创建一个函数索引，该索引基于 `UPPER(first_name)` 表达式。\n\n## 工作原理\n\n**函数索引**\
  \ 在其定义中使用函数或表达式创建。函数索引允许在查询的 `WHERE` 子句中引用 SQL 函数的列上进行索引查找。该索引可以像本解决方案示例中那样简单，也可以基于存储在\
  \ PL/SQL 函数中的复杂逻辑。\n\n![images](img/square.jpg) `Note` 任何用户创建的 SQL 函数在用于函数索引之前，都必须声明为确定性的。`DETERMINISTIC`\
  \ 意味着对于一组给定的输入，函数总是返回相同的结果。在创建要在函数索引中使用的用户定义函数时，必须使用关键字 `DETERMINISTIC`。\n\n如果你想查看函数索引的定义，可以从\
  \ `DBA/ALL/USER_IND_EXPRESSIONS` 视图中选择，以显示与索引关联的 SQL。如果你使用的是 SQL*Plus，请务必先发出 `SET\
  \ LONG` 命令，例如：\n\n```sql\nSQL> SET LONG 500\nSQL> select index_name, column_expression\
  \ from user_ind_expressions;\n```\n\n此示例中的 `SET LONG` 命令告诉 SQL*Plus 显示 `COLUMN_EXPRESSION`\
  \ 列中最多 500 个字符，该列的类型为 `LONG`。\n\n"
- "# 2-9. 索引虚拟列\n\n## 问题\n\n你目前使用的是函数索引，但需要更好的性能。你希望用虚拟列替换函数索引，并在虚拟列上放置索引。\n\n![images](img/square.jpg)\
  \ `Note` 虚拟列功能需要 Oracle Database 11g 或更高版本。\n\n## 解决方案\n\n将虚拟列与索引结合使用，为你提供了一种替代方法，用于在\
  \ `WHERE` 子句中的列上使用 SQL 函数时实现性能提升。例如，假设你有以下查询：\n\n```sql\nSELECT first_name\nFROM\
  \ cust\nWHERE UPPER(first_name) = 'DAVE';\n```\n\n通常，由于对列应用了 SQL 函数，优化器会忽略 `FIRST_NAME`\
  \ 列上的任何索引。有两种方法可以提高此情况下的性能：\n\n-   创建函数索引（详情请参阅配方 2-8）。\n-   使用虚拟列结合索引。\n\n本解决方案重点介绍后一种方法。首先，向表中添加一个封装了\
  \ SQL 函数的虚拟列：\n\n```sql\nSQL> alter table cust add(up_name generated always as (UPPER(first_name))\
  \ virtual);\n```\n\n接下来，在虚拟列上创建索引：\n\n```sql\nSQL> create index cust_vidx1 on cust(up_name);\n\
  ```\n\n这创建了一种非常高效的机制，用于在引用带有 SQL 函数的列时检索数据。\n\n## 工作原理\n\n你可能会问这个问题：“函数索引和带索引的虚拟列，哪个性能更好？”\
  \ 在我们的测试中，我们能够创建多种场景，其中虚拟列的性能优于函数索引。结果可能因数据而异。\n\n本配方的目的不是说服你立即开始用虚拟列替换系统中的所有函数索引；而是希望你能意识到解决常见性能问题的另一种方法。\n\
  \n虚拟列并非没有成本。如果存在现有表，你必须创建和维护创建虚拟列所需的 DDL，而函数索引可以独立于表进行添加、修改和删除。\n\n虚拟列有几个注意事项：\n\
  \n-   只能在常规的堆组织表上定义虚拟列。不能在索引组织表、外部表、临时表、对象表或集群表上定义虚拟列。\n-   虚拟列不能引用其他虚拟列。\n-   虚拟列只能引用其定义所在表中的列。\n\
  -   虚拟列的输出必须是标量值（单个值，而不是一组值）。\n\n要查看虚拟列的定义，请使用 `DBMS_METADATA` 包来查看与表关联的 DDL。如果从\
  \ SQL*Plus 中选择，需要将 `LONG` 变量设置为足够大的值以显示所有返回的数据：\n\n```sql\nSQL> set long 10000;\n\
  SQL> select dbms_metadata.get_ddl('TABLE','CUST') from dual;\n```\n\n以下是显示虚拟列详细信息的部分输出片段：\n\
  \n```\n\"UP_NAME\" VARCHAR2(30) GENERATED ALWAYS AS (UPPER(\"FIRST_NAME\"))\nVIRTUAL\
  \ VISIBLE) SEGMENT CREATION IMMEDIATE\n```\n\n你还可以通过查询 `DBA/ALL/USER_IND_EXPRESSIONS`\
  \ 视图来查看虚拟列的定义。如果你使用的是 SQL*Plus，请务必先发出 SET LONG 命令，例如：\n\n```sql\nSQL> SET LONG 500\n\
  SQL> select index_name, column_expression from user_ind_expressions;\n```\n\n此示例中的\
  \ `SET LONG` 命令告诉 SQL*Plus 显示 `COLUMN_EXPRESSION` 列中最多 500 个字符，该列的类型为 `LONG`。\n\n\
  ### 2-10. 避免索引的集中 I/O\n\n## 问题\n\n你使用序列来填充表的主键，并意识到这可能会导致索引前导边缘上的争用，因为索引值非常相似。这导致多个插入操作进入同一个数据块，从而引起争用。你希望将索引的插入操作分散开，使插入更均匀地分布在索引结构中。你希望使用反向键索引来实现这一点。\n\
  \n## 解决方案\n\n使用 `REVERSE` 子句创建反向键索引：\n\n```sql\nSQL> create index inv_idx1 on inv(inv_id)\
  \ reverse;\n```\n\n你可以通过运行以下查询来验证索引是否是反向键索引：\n\n```sql\nSQL> select index_name,\
  \ index_type from user_indexes;\n```\n\n以下是一些示例输出，显示 `INV_IDX1` 索引是反向键索引：\n\n```\n\
  INDEX_NAME                      INDEX_TYPE\n------------------------------ ---------------------------\n\
  INV_IDX1                        NORMAL/REV\nUSERS_IDX1                      NORMAL\n\
  ```\n\n![images](img/square.jpg) `Note` 你不能为位图索引或索引组织表指定 `REVERSE`。\n\n## 工作原理\n\
  \n反向键索引类似于 B-tree 索引，只是在创建索引条目时，索引键的字节会被反转。例如，如果索引值是 100, 101 和 102，则反向键索引值是 001,\
  \ 101 和 201：\n\n```\nIndex value              Reverse key value\n------------- \
  \           --------------------\n100                      001\n101            \
  \          101\n102                      201\n```\n\n反向键索引在需要一种方法来均匀分布本应相似值聚集在一起的索引数据的场景中可以表现更好。因此，使用反向键索引时，你可以避免在插入大量顺序值期间，索引中的\
  \ I/O 集中在单个物理磁盘位置。这种类型的索引的缺点是它不能用于索引范围扫描，从而限制了其用途。\n\n你可以使用 `REBUILD REVERSE` 子句将现有索引重建为反向键索引，例如：\n\
  \n```sql\nSQL> alter index f_regs_idx1 rebuild reverse;\n```\n\n类似地，如果你想将反向键索引更改为正常的有序索引，请使用\
  \ `REBUILD NOREVERSE` 子句：\n\n```sql\nSQL> alter index f_regs_idx1 rebuild noreverse;\n\
  ```\n\n### 2-11. 添加索引而不影响现有应用程序\n\n## 问题\n\n根据经验，你知道有时向第三方应用程序添加索引可能会导致性能问题，并且也可能违反与供应商的支持协议。你希望以一种应用程序永远不会使用该索引的方式来实现索引。\n\
  \n\n\n## 解决方案\n\n通常，第三方供应商不支持客户为其应用程序添加自己的索引。不过，在某些情况下，你确信可以在不影响应用程序中其他查询性能的前提下提升某个查询的性能。这时，你可以创建一个不可见的索引，然后通过提示（hint）明确指示某个查询使用该索引——例如：\n\
  \n```sql\nSQL> create index inv_idx1 on inv(inv_id) invisible;\n```\n\n接下来，确保将初始化参数\
  \ `OPTIMIZER_USE_INVISIBLE_INDEXES` 设置为 `TRUE`（默认值为 `FALSE`）。这将指示优化器考虑不可见索引：\n\n\
  ```sql\nSQL> alter system set optimizer_use_invisible_indexes=true;\n```\n\n现在，使用一个提示来告知优化器该索引存在：\n\
  \n```sql\nSQL> select /*+ index (inv INV_IDX1) */ inv_id from inv where inv_id=1;\n\
  ```\n\n你可以通过设置 `AUTOTRACE TRACE EXPLAIN` 并运行 `SELECT` 语句来验证索引是否被使用：\n\n```sql\n\
  SQL> set autotrace trace explain;\nSQL> select /*+ index (inv INV_IDX1) */ inv_id\
  \ from inv where inv_id=1;\n```\n\n以下是示例输出，表明优化器选择使用了不可见索引：\n\n```\n-----------------------------------------------------------------------------\n\
  | Id  | Operation        | Name     | Rows  | Bytes | Cost (%CPU)| Time     |\n\
  -----------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT |          |     1 |    13 |     1   (0)| 00:00:01 |\n\
  |*  1 |  INDEX RANGE SCAN| INV_IDX1 |     1 |    13 |     1   (0)| 00:00:01 |\n\
  -----------------------------------------------------------------------------\n\
  ```\n\n请记住，索引不可见仅意味着优化器看不到它。与任何其他索引一样，不可见索引在执行 `DML` 语句时也会消耗空间和资源。\n\n## 工作原理\n\n\
  在 Oracle Database 11g 及更高版本中，你可以选择使索引对优化器不可见。Oracle 仍然会维护不可见索引，但不会使其可供优化器使用。如果你希望优化器使用某个不可见索引，可以通过\
  \ SQL 提示来实现。不可见索引有几个有趣的用途：\n\n*   你可以向第三方应用程序添加一个不可见索引，而不影响现有代码或支持协议。\n*   在删除索引之前将其更改为不可见状态，可以让你在日后发现需要该索引时快速恢复。\n\
  \n第一个要点已在本方案的“解决方案”部分讨论。第二个场景将在本节讨论。例如，假设你已识别出一个未被使用的索引，并考虑删除它。在 Oracle 的早期版本中，你可以将索引标记为\
  \ `UNUSABLE`，然后稍后删除那些你确定未被使用的索引。如果你后来发现需要某个不可用的索引，重新启用它的唯一方法是重建它。对于大型索引，这可能需要很长时间并消耗大量的数据库资源。\n\
  \n使索引不可见的优势在于，它只告诉优化器不要使用该索引。当底层表有记录被插入、更新或删除时，不可见索引仍然会被维护。如果你决定日后需要该索引，则无需重建它。你只需将其重新标记为可见即可——例如：\n\
  \n```sql\nSQL> alter index inv_idx1 visible;\n```\n\n你可以通过以下查询验证索引的可见性：\n\n```sql\n\
  SQL> select index_name, status, visibility from user_indexes;\n```\n\n以下是示例输出：\n\
  \n```\nINDEX_NAME                     STATUS   VISIBILITY\n------------------------------\
  \ -------- ----------\nINV_IDX1                       VALID    VISIBLE\n```\n\n\
  ## 老派做法：指示优化器不要使用索引\n\n在过去，基于规则的优化器（已弃用）有时会选择使用一个会显著降低性能的索引。在这些情况下，`DBA` 和开发人员会手动指示优化器不要在基于数字的列上使用索引，如下所示：\n\
  \n```sql\nSQL> select cust_id from cust where cust_id+0 = 12345;\n```\n\n在上述语句中，`+0`\
  \ 对 SQL 语句的逻辑没有任何增加（因此对结果集没有影响）。在这种情况下，优化器将自动不使用经过算术表达式修改的数字列上的索引。\n\n类似地，对于基于字符的列，如果对其连接了字符，索引将被忽略——例如：\n\
  \n```sql\nSQL> select last_name from cust where last_name || '' = 'SMITH';\n```\n\
  \n在上述语句中，`||''` 对 SQL 的逻辑没有任何增加，但会导致优化器不使用 `LAST_NAME` 列上的索引（如果存在的话）。\n\n## 2-12.\
  \ 为支持星型模型创建位图索引\n\n## 问题\n\n你有一个包含星型模型的数据仓库。星型模型由一个大型事实表和多个维度（查找）表组成。维度表的主键列映射到事实表中的外键列。你希望在事实表的所有外键列上创建位图索引。\n\
  \n## 解决方案\n\n你使用 `BITMAP` 关键字来创建位图索引。下一行代码在 `F_SALES` 表的 `CUST_ID` 列上创建了一个位图索引：\n\
  \n```sql\nSQL> create bitmap index f_sales_cust_fk1 on f_sales(cust_id);\n```\n\n\
  通过以下查询可以验证索引类型：\n\n```sql\nSQL> select index_name, index_type from user_indexes\
  \ where index_name='F_SALES_CUST_FK1';\n```\n\n```\nINDEX_NAME                 \
  \    INDEX_TYPE\n------------------------------ ---------------------------\nF_SALES_CUST_FK1\
  \               BITMAP\n```\n\n## 工作原理\n\n位图索引存储行的 `ROWID` 和对应的位图。你可以将位图视为 1 和 0\
  \ 的组合。1 表示存在某个值，0 表示该值不存在。位图索引非常适合低基数列（不同值很少）以及应用程序不频繁更新表的情况。位图索引通常用于采用星型模型设计的数据仓库环境。\n\
  \n一个典型的星型模型结构由一个大型事实表和许多小型维度（查找）表组成。在这些场景下，通常会在事实表的外键列上创建位图索引。事实表通常按日加载，并且（通常）后续不会被更新或删除。\n\
  \n你不应在具有高 `INSERT`/`UPDATE`/`DELETE` 活动的 `OLTP` 数据库上使用位图索引，因为这会导致锁定问题。锁定问题之所以产生，是因为位图索引的结构可能导致在\
  \ `DML` 操作期间锁定许多行，从而导致高事务量的 `OLTP` 系统出现锁定问题。\n\n![images](img/square.jpg) **注意**\
  \ 位图索引和位图连接索引仅在 Oracle 数据库的企业版中可用。\n\n### 2-13. 创建位图连接索引\n\n## 问题\n\n你正在一个数据仓库环境中工作。你有一个相当大的维度表，经常与一个极大的事实表进行连接。你想知道是否有一种方法可以创建位图索引，从而消除优化器为满足查询结果而访问维度表数据块的需要。\n\
  \n\n\n### 2-14. 创建索引组织表\n\n#### 问题\n\n你想要创建一个表，作为另外两个表之间多对多关系的交集。这个交集表将包含两列。每一列都是一个外键，映射回父表中的相应主键。\n\
  \n#### 解决方案\n\n当表数据通常通过查询主键来访问时，索引组织表（IOT）是高效的对象。使用 `ORGANIZATION INDEX` 子句来创建一个\
  \ IOT：\n\n```\ncreate table cust_assoc\n(cust_id number\n,user_group_id number\n\
  ,create_dtt timestamp(5)\n,update_dtt timestamp(5)\n,constraint cust_assoc_pk primary\
  \ key(cust_id, user_group_id)\n)\norganization index\nincluding create_dtt\npctthreshold\
  \ 30\ntablespace nsestar_index\noverflow\ntablespace dim_index;\n```\n\n请注意，`DBA/ALL/USER_TABLES`\
  \ 包含了创建 IOT 时所用表名的条目。以下两个查询展示了 Oracle 如何在数据字典中记录 IOT 的信息：\n\n```\nselect table_name,\
  \ iot_name\nfrom user_tables\nwhere iot_name = 'CUST_ASSOC';\n```\n\n以下是一些示例输出：\n\
  \n```\nTABLE_NAME                      IOT_NAME\n------------------------------\
  \ ------------------------------\nSYS_IOT_OVER_184185             CUST_ASSOC\n```\n\
  \n接下来是另一个略有不同的查询及其输出：\n\n```\nselect table_name, iot_name\nfrom user_tables\nwhere\
  \ table_name = 'CUST_ASSOC';\n```\n\n以下是一些示例输出：\n\n```\nTABLE_NAME             \
  \         IOT_NAME\n------------------------------ ------------------------------\n\
  CUST_ASSOC\n```\n\n此外，`DBA/ALL/USER_INDEXES` 包含一条记录，其名称为指定的主键约束名。对于 IOT，`INDEX_TYPE`\
  \ 列的值为 `IOT - TOP`：\n\n```\nselect index_name, index_type\nfrom user_indexes\nwhere\
  \ table_name = 'CUST_ASSOC';\n```\n\n以下是一些示例输出：\n\n```\nINDEX_NAME             \
  \         INDEX_TYPE\n------------------------------ ---------------------------\n\
  CUST_ASSOC_PK                   IOT - TOP\n```\n\n#### 工作原理\n\nIOT 在 B 树索引结构中存储表行的全部内容。对于那些在主键上进行精确匹配和/或范围搜索的查询，IOT\
  \ 提供了快速的访问。\n\n在 `INCLUDING` 子句中指定并包含的列之前的所有列，都与 `CUST_ASSOC_PK` 主键列存储在同一个块中。换句话说，`INCLUDING`\
  \ 子句指定了保留在表段中的最后一列。列在 `INCLUDING` 子句中指定列之后的列将存储在溢出数据段中。在前面的例子中，`UPDATE_DTT` 列存储在溢出段中。\n\
  \n`PCTTHRESHOLD` 指定了为 IOT 行在索引块中保留的空间百分比。该值可以是 1 到 50，如果未指定值，则默认为 50。索引块中必须有足够的空间来存储主键。`OVERFLOW`\
  \ 子句详细说明了应使用哪个表空间来存储溢出数据段。\n\n### 2-15. 监控索引使用情况\n\n#### 问题\n\n你维护一个包含数千个索引的大型数据库。作为主动维护的一部分，你希望确定是否有任何索引未被使用。你意识到未使用的索引会对性能产生负面影响，因为每次插入、更新和删除行时，都必须维护相应的索引。这会消耗\
  \ CPU 资源和磁盘空间。如果一个索引没有被使用，就应该将其删除。\n\n#### 解决方案\n\n使用 `ALTER INDEX...MONITORING\
  \ USAGE` 语句来启用基本的索引监控。以下示例在名为 `F_REGS_IDX1` 的索引上启用索引监控：\n\n```sql\nSQL> alter index\
  \ f_regs_idx1 monitoring usage;\n```\n\n第一次访问该索引时，Oracle 会记录下来；你可以通过 `V$OBJECT_USAGE`\
  \ 视图查看索引是否已被访问过。要报告哪些索引正在被监控并且曾经被使用过，请运行以下查询：\n\n```sql\nSQL> select index_name,\
  \ table_name, monitoring, used from v$object_usage;\n```\n\n如果该索引曾在 `SELECT` 语句中使用过，那么\
  \ `USED` 列将包含 `YES` 值。以下是先前查询的一些示例输出：\n\n```\nINDEX_NAME                      TABLE_NAME\
  \                     MON USED\n------------------------------ ------------------------------\
  \ --- ----\nF_REGS_IDX1                     F_REGS                         YES YES\n\
  ```\n\n很可能，你不会只监控一个索引。相反，你会希望监控某个用户的所有索引。在这种情况下，使用 SQL 生成 SQL 来创建一个可以运行的脚本，以打开对所有索引的监控。下面就是这样一个脚本：\n\
  \n```sql\nset pagesize 0 head off linesize 132\nspool enable_mon.sql\nselect\n \
  \ 'alter index ' || index_name || ' monitoring usage;'\nfrom user_indexes;\nspool\
  \ off;\n```\n\n要禁用对索引的监控，请使用 `NOMONITORING USAGE` 子句——例如：\n\n```sql\nSQL> alter\
  \ index f_regs_idx1 nomonitoring usage;\n```\n\n\n\n#### 工作原理\n\n监控索引使用情况的主要优势在于识别未被使用的索引。这允许你找出可以删除的索引，从而释放磁盘空间并提升\
  \ DML 语句的性能。\n\n`V$OBJECT_USAGE` 视图仅显示当前连接用户的信息。你可以通过检查 `DBA_VIEWS` 中 `V$OBJECT_USAGE`\
  \ 定义的 `TEXT` 列来验证此行为：\n\n```sql\nSQL> select text from dba_views where view_name\
  \ = 'V$OBJECT_USAGE';\n```\n\n请注意输出中的以下行：\n\n```sql\nwhere io.owner# = userenv('SCHEMAID')\n\
  ```\n\n该行指示视图仅显示当前连接用户的信息。如果你以具有 DBA 权限的用户登录，并希望查看所有启用了监控的索引状态（无论用户是谁），请执行此查询：\n\
  \n```sql\nselect io.name, t.name,\n       decode(bitand(i.flags, 65536), 0, 'NO',\
  \ 'YES'),\n       decode(bitand(ou.flags, 1), 0, 'NO', 'YES'),\n       ou.start_monitoring,\n\
  \       ou.end_monitoring\nfrom sys.obj$ io\n     ,sys.obj$ t\n     ,sys.ind$ i\n\
  \     ,sys.object_usage ou\nwhere i.obj# = ou.obj#\nand io.obj# = ou.obj#\nand t.obj#\
  \ = i.bo#;\n```\n\n之前的查询移除了将输出限制为仅显示当前登录用户信息的那一行。这为你提供了一种便捷的方式来查看所有受监控的索引。\n\n###\
  \ 2-16. 最大化索引创建速度\n\n#### 问题\n\n你正在基于一个包含数百万行的表创建索引。你希望尽可能快地创建该索引。\n\n#### 解决方案\n\
  \n本解决方案描述了两种提高索引创建速度的技术：\n\n*   关闭重做日志生成\n*   提高并行度\n\n你可以独立使用这两种功能，也可以结合使用它们。\n\
  \n##### 关闭重做日志生成\n\n你可以选择使用 `NOLOGGING` 子句创建索引。这样做有以下影响：\n\n*   不会生成在发生介质故障时恢复索引所需的重做日志。\n\
  *   随后的直接路径操作也不会生成在发生介质故障时恢复索引信息所需的重做日志。\n\n以下是一个使用 `NOLOGGING` 子句创建索引的示例：\n\n```sql\n\
  create index inv_idx1 on inv(inv_id, inv_id2)\nnologging\ntablespace inv_mgmt_index;\n\
  ```\n\n你可以运行此查询来确定索引是否是用 `NOLOGGING` 创建的：\n\n```sql\nSQL> select index_name, logging\
  \ from user_indexes;\n```\n\n##### 提高并行度\n\n在大型数据库环境中，当你试图为一个填充了大量行的表创建索引时，通过使用\
  \ `PARALLEL` 子句，你可能能够减少创建索引所需的时间。例如，以下语句在创建索引时将并行度设置为 2：\n\n```sql\ncreate index\
  \ inv_idx1 on inv(inv_id)\nparallel 2\ntablespace inv_mgmt_data;\n```\n\n你可以通过此查询验证索引的并行度：\n\
  \n```sql\nSQL> select index_name, degree from user_indexes;\n```\n\n![images](img/square.jpg)\
  \ **注意** 如果你不指定并行度，Oracle 会基于 CPU 核心数乘以 `PARALLEL_THREADS_PER_CPU` 的值来选择一个并行度。\n\
  \n#### 工作原理\n\n`NOLOGGING` 的主要优势在于，当你创建索引时，生成的重做信息量极少，这对于创建大型索引可能具有显著的性能优势。缺点是，如果你在索引创建后不久经历了介质故障（或者通过直接路径操作插入了记录），并且随后发生了导致你必须从备份（在索引创建之前拍摄的）恢复的故障，那么在访问索引时可能会看到此错误：\n\
  \n```sql\nORA-01578: ORACLE data block corrupted (file # 4, block # 11407)\nORA-01110:\
  \ data file 4: '/ora01/dbfile/O11R2/inv_mgmt_index01.dbf'\nORA-26040: Data block\
  \ was loaded using the NOLOGGING option\n```\n\n此错误表明索引存在逻辑损坏。在这种情况下，你必须在索引可用之前重新创建或重建它。在大多数场景下，创建索引时使用\
  \ `NOLOGGING` 子句是可以接受的，因为索引可以被重新创建或重建，而不会影响其基础表。\n\n除了 `NOLOGGING`，你还可以使用 `PARALLEL`\
  \ 子句来提高索引创建速度。对于大型索引，这可以显著减少创建索引所需的时间。\n\n请记住，你可以将 `NOLOGGING` 与 `PARALLEL` 结合使用。下一个示例以并行方式重建索引，同时生成最小数量的重做日志：\n\
  \n```sql\nSQL> alter index inv_idx1 rebuild parallel nologging;\n```\n\n### 2-17.\
  \ 回收未使用的索引空间\n\n#### 问题\n\n你有一个索引在段中占用了空间，但实际上并未使用该空间。例如，你正在运行以下查询来显示段顾问的建议：\n\n\
  ```sql\nSELECT\n 'Task Name        : ' || f.task_name  || CHR(10) ||\n 'Start Run\
  \ Time   : ' || TO_CHAR(execution_start, 'dd-mon-yy hh24:mi') || chr (10) ||\n 'Segment\
  \ Name     : ' || o.attr2      || CHR(10) ||\n 'Segment Type     : ' || o.type \
  \      || CHR(10) ||\n 'Partition Name   : ' || o.attr3      || CHR(10) ||\n 'Message\
  \          : ' || f.message    || CHR(10) ||\n 'More Info        : ' || f.more_info\
  \  || CHR(10) ||\n '------------------------------------------------------' Advice\n\
  FROM dba_advisor_findings   f\n    ,dba_advisor_objects    o\n    ,dba_advisor_executions\
  \ e\nWHERE o.task_id   = f.task_id\nAND   o.object_id = f.object_id\nAND   f.task_id\
  \   = e.task_id\nAND   e. execution_start > sysdate - 1\nAND   e.advisor_name =\
  \ 'Segment Advisor'\nORDER BY f.task_name;\n```\n\n将显示以下输出：\n\n```sql\nADVICE\n\
  --------------------------------------------------------------------------------\n\
  Task Name        : F_REGS Advice\nStart Run Time   : 19-feb-11 09:32\nSegment Name\
  \     : F_REGS_IDX1\nSegment Type     : INDEX\nPartition Name   :\nMessage     \
  \     : Perform shrink, estimated savings is 84392870 bytes.\nMore Info        :\
  \ Allocated Space:166723584: Used Space:82330714: Reclaimable S\npace :84392870:\n\
  ------------------------------------------------------\n```\n\n你想要收缩索引以释放未使用的空间。\n\
  \n#### 解决方案\n\n有几种有效的方法可以释放与索引关联的未使用空间：\n\n*   重建索引\n*   收缩索引\n\n在执行这两种操作中的任何一种之前，首先检查\
  \ `USER_SEGMENTS` 以验证使用的空间量是否与段顾问的建议相符。在此示例中，段名称是 `F_REGS_IDX1`：\n\n```sql\nSQL>\
  \ select bytes from user_segments where segment_name = 'F_REGS_IDX1';\n```\n\n```sql\n\
  BYTES\n----------\n 166723584\n```\n\n此示例使用 `ALTER INDEX...REBUILD` 语句来重组和压缩索引使用的空间：\n\
  \n```sql\nSQL> alter index f_regs_idx1 rebuild;\n```\n\n或者，使用 `ALTER INDEX...SHRINK\
  \ SPACE` 语句来释放索引中的未使用空间，例如：\n\n```sql\nSQL> alter index f_regs_idx1 shrink space;\n\
  ```\n\n```sql\nIndex altered.\n```\n\n现在再次查询 `USER_SEGMENTS` 以验证空间是否已被释放。以下是此示例的输出：\n\
  \n```sql\n  BYTES\n----------\n    524288\n```\n\n索引消耗的空间已显著减少。\n\n\n\n#### 工作原理\n\
  \n通常，重建索引是回收索引占用的未用空间最快、最有效的方法。因此，我们推荐使用这种方法来回收未使用的索引空间。释放空间是可取的，因为它确保你只使用对象所需的空间量。它还具有性能优势，因为\
  \ Oracle 在执行读取操作时需要管理和排序的块更少。\n\n除了释放空间，你可能还因为以下额外原因考虑重建索引：\n\n*   索引已损坏。\n*   你希望修改存储特性（例如更改表空间）。\n\
  *   之前标记为不可用的索引现在需要重建以使其重新可用。\n\n请记住，Oracle 会尝试获取表上的锁并在线重建索引。如果有任何未提交的活动事务，那么 Oracle\
  \ 将无法获得锁，并会抛出以下错误：\n\n`ORA-00054: resource busy and acquire with NOWAIT specified\
  \ or timeout expired`\n\n在这种情况下，你可以等到数据库活动很少时再操作，或者尝试设置 `DDL_LOCK_TIMEOUT` 参数：\n\
  \n`SQL> alter session set ddl_lock_timeout=15;`\n\n`DDL_LOCK_TIMEOUT` 初始化参数在 Oracle\
  \ Database 11g 或更高版本中可用。它指示 Oracle 在指定的时间内反复尝试获取锁。\n\n如果未指定表空间，Oracle 会在索引当前所在的表空间中重建它。如果你希望索引在不同的表空间中重建，请指定一个表空间：\n\
  \n`SQL> alter index inv_idx1 rebuild tablespace inv_index;`\n\n![images](img/square.jpg)\
  \ **提示** 如果你正在处理大型索引，可以考虑使用 `NOLOGGING` 和/或 `PARALLEL` 等功能（详见配方 2-16）。\n\n如果你使用\
  \ `ALTER INDEX...SHRINK SPACE` 操作来释放未使用的索引空间，请记住此功能要求目标对象必须在启用了自动段空间管理的表空间中创建。如果你尝试收缩在使用手动段空间管理的表空间中创建的表或索引，你将收到此错误：\n\
  \n`ORA-10635: Invalid segment or tablespace type`\n\n正如我们在本章其他地方指出的，我们建议你尽可能使用 ASSM\
  \ 功能。这使你可以利用所有的 Oracle 段管理功能。\n\n`ALTER INDEX...SHRINK SPACE` 语句有一些需要注意的细微差别。例如，你可以通过\
  \ `COMPACT` 子句指示 Oracle 仅尝试合并索引块的内容（而不释放空间）：\n\n`SQL> alter index f_regs_idx1 shrink\
  \ space compact;`\n\n前面的操作等同于 `ALTER INDEX...COALESCE` 语句。以下是使用 `COALESCE` 的示例：\n\
  \n`SQL> alter index f_regs_idx1 coalesce;`\n\n如果你想最大化压缩的空间，要么重建索引，要么使用 `SHRINK SPACE`\
  \ 子句，如本配方的“解决方案”部分所示。`COMPACT` 空间实际上并不启动更大程度的已释放空间，这有点违反直觉。`COMPACT` 子句指示 Oracle\
  \ 仅在可能的情况下合并索引块，而不去最大化释放的空间量。\n\n### 优化实例内存\n\n优化分配给 Oracle 数据库的内存是你作为 DBA 需要执行的最关键任务之一。多年来，Oracle\
  \ DBA 习惯于花费大量时间分析数据库的内存使用情况，并尝试提出最佳的内存分配方案。在 Oracle Database 11g 中，分配 Oracle 内存的负担几乎完全转移给了数据库本身。本章向你展示如何利用\
  \ Oracle 的自动内存管理功能，这样你就可以让数据库优化内存使用，而你则专注于更重要的事务。\n\n本章首先解释如何为数据库设置自动内存管理。本章还向你展示即使在自动内存管理下，如何为某些内存组件设置最小值。它还包括一些配方，解释如何创建多个缓冲池、如何监控\
  \ Oracle 的内存使用，以及如何使用 Oracle Enterprise Manager 的 Database Control（或 Grid Control）工具从\
  \ Oracle 获取有关最佳内存分配大小的建议。你还将学习如何优化程序全局区（PGA）的使用，这是 Oracle 的一个关键内存组件，尤其在数据仓库环境中。\n\
  \n在 Oracle Database 11g 中，Oracle 引入了一项令人兴奋的新结果缓存功能。Oracle 现在可以在 Oracle 内存的共享池组件中缓存\
  \ SQL 查询和 PL/SQL 函数的结果。我们将在本章讨论该服务器结果缓存。此外，你还会找到一个解释如何利用 Oracle 客户端结果缓存功能的配方。最后，我们展示如何使用名为\
  \ Oracle Database Smart Flash Cache 的令人兴奋的新功能。\n\n### 3-1. 自动化内存管理\n\n##### 问题\n\
  \n你希望在 Oracle 数据库中自动化内存管理。你的数据库中同时运行着 OLTP 和批处理作业。你希望利用 Oracle Database 11g 内置的自动内存管理功能。\n\
  \n##### 解决方案\n\n如果你已经设置了 `SGA_TARGET` 或 `PGA_AGGREGATE_TARGET` 参数（或两者），以下是实现在数据库中自动内存管理的步骤。我们假设将为\
  \ `MEMORY_MAX_TARGET` 参数分配 2000 MB，为 `MEMORY_TARGET` 参数分配 1000 MB。\n\n1.  使用 SYSDBA\
  \ 权限连接到数据库。\n2.  假设你使用的是 `SPFILE`，首先为 `MEMORY_MAX_TARGET` 参数设置一个值：\n\n    `SQL>\
  \ alter system set memory_max_target=2G scope=spfile;`\n    `System altered.`\n\n\
  \    你必须在 `alter system` 命令中指定 `SCOPE` 参数，因为 `MEMORY_MAX_TARGET` 不是动态参数，这意味着你不能在实例运行时动态更改它。\n\
  \n3.  请注意，如果你是使用传统的 `init.ora` 参数文件而不是 `SPFILE` 启动的实例，你必须将以下内容添加到你的 `init.ora` 文件中：`memory_max_target\
  \ = 2000M`\n    `memory_target = 1000M`\n4.  重启数据库。\n5.  通过发出以下 `ALTER SYSTEM` 命令关闭\
  \ `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 参数：`SQL> alter system set sga_target = 0;`\n\
  \    `SQL> alter system set pga_aggregate_target = 0;`\n6.  通过设置 `MEMORY_TARGET`\
  \ 参数来开启自动内存管理：`SQL> alter system set memory_target = 1000M;`\n\n从这一点开始，数据库将在自动内存管理模式下运行，根据持续工作负载的需求，收缩和增长对\
  \ Oracle 内存各个组件的分配。只要不超过为 `MEMORY_MAX_TARGET` 参数设置的值，你可以随时动态更改 `MEMORY_TARGET` 参数的值。\n\
  \n![images](img/square.jpg) **提示** 在诸如 `memory_target` 和 `pga_memory_target` 等参数中，“target”一词的含义正是如此——Oracle\
  \ 将尝试保持在目标水平以下，但无法保证它永远不会超过该水平。如果必要，它偶尔可能会超过目标分配。\n\n你不必将 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET`\
  \ 参数设置为 0 才能使用自动内存管理。在配方 3-3 中，我们展示了即使在选择实现自动内存管理时，如何为这些参数设置最小值。该配方假设你正在实现自动内存管理，但出于某种原因，你需要为\
  \ SGA 和 PGA 等组件指定自己的最小值。\n\n\n#### 工作原理\n\n在 Oracle 数据库的早期版本中，数据库管理员需要为各种 SGA 组件设置值，或者为\
  \ SGA 和 PGA 指定值。从 Oracle Database 11g 版本开始，Oracle 通过仅设置一个初始化参数 `MEMORY_TARGET`，即可完全自动化整个实例的内存分配，这被称为自动内存管理。在本教程中，我们将向您展示如何在数据库中设置自动内存管理功能。\n\
  \n如果您正在使用数据库配置助手创建新的 Oracle 数据库，您可以在自动内存管理、共享内存管理和手动内存管理之间进行选择。选择自动内存管理选项，并为两个与自动内存相关的参数指定值：`MEMORY_TARGET`\
  \ 和 `MEMORY_MAX_TARGET`。第一个参数设置数据库当前的内存分配值，第二个参数设置您可以在必要时提高第一个参数值的上限。\n\nOracle\
  \ 的内存结构由两个不同的内存区域组成。系统全局区包含数据和控制信息，由所有服务器和后台进程共享。SGA 保存着 Oracle 从磁盘检索的数据块。程序全局区包含服务器进程的数据和控制信息。每个服务器进程都被分配自己的\
  \ PGA 区块。管理 Oracle 的内存分配需要仔细校准数据库的需求。某些数据库实例的特定内存组件需要更多内存。例如，数据仓库需要更多的 PGA 内存来执行此类环境中常见的大规模排序操作。此外，在一天的过程中，实例的内存需求可能会发生变化；例如，在工作时间内，实例可能处理更多的联机事务处理工作，而在工作时间后，它可能运行涉及数据仓库处理的大型批处理作业，这些作业通常需要每个进程更高的\
  \ PGA 分配。\n\n在之前的 Oracle 数据库版本中，数据库管理员必须仔细决定分配给数据库各内存组件的最佳内存分配。从技术上讲，您仍然可以手动设置 SGA\
  \ 各个组件的值，并为 PGA 设置一个值，或者通过设置 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 等参数来部分自动化此过程。虽然\
  \ Oracle 仍然允许您手动配置内存的各个组件，但自动内存管理是管理 Oracle 内存分配的推荐方法。一旦您通过设置 `MEMORY_TARGET` 和\
  \ `MEMORY_MAX_TARGET` 参数指定了一定量的内存，Oracle 就会通过在 SGA 和 PGA 之间重新分配内存来自动调整实际的内存分配。\n\
  \n![images](img/square.jpg) **提示** 当您使用数据库配置助手创建数据库时，自动内存管理是默认选项。\n\n如果您选择通过设置 `MEMORY_TARGET`\
  \ 和 `MEMORY_MAX_TARGET` 参数来实施自动内存管理，Oracle Database 11g 可让您自动化实例的所有内存分配，包括共享内存和\
  \ PGA 内存。在自动内存管理机制下，Oracle 会自动调整总 SGA 大小、SGA 组件大小、实例 PGA 大小以及各个 PGA 大小。Oracle 实例的这种动态内存调优优化了数据库性能，因为\
  \ Oracle 会自动更改内存分配以匹配不断变化的数据库工作负载。自动内存管理意味着一旦设置了 `MEMORY_TARGET` 参数，您就可以完全忽略以下参数，而无需设置它们：\n\
  \n*   `SGA_TARGET`\n*   `PGA_AGGREGATE_TARGET`\n*   `DB_CACHE_SIZE`\n*   `SHARED_POOL_SIZE`\n\
  *   `LARGE_POOL_SIZE`\n*   `JAVA_POOL_SIZE`\n\n如果您正从使用 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET`\
  \ 参数的系统迁移过来，可以按照本教程“解决方案”部分中展示的步骤，迁移到更新的自动内存管理模式来管理 Oracle 的内存分配。请注意，虽然设置 `MEMORY_TARGET`\
  \ 参数对于实施自动内存管理是强制性的，但 `MEMORY_MAX_TARGET` 参数不是——如果您不设置此参数，Oracle 会在内部将其值设置为 `MEMORY_TARGET`\
  \ 参数的值。此外，`MEMORY_MAX_TARGET` 参数充当 `MEMORY_TARGET` 参数的上限。Oracle 对 `MEMORY_TARGET`\
  \ 参数有不同的最小允许设置，具体取决于操作系统。如果您尝试将此参数设置为低于其最小允许值，数据库将发出错误。某些内存组件无法快速缩小，并且某些组件必须具有最小大小数据库才能正常运行。因此，Oracle\
  \ 不允许您为 `MEMORY_TARGET` 参数设置过低的值。以下示例展示了这一点：\n\n```sql\nSQL> alter system set memory_target=360m\
  \ scope=both;\nalter system set memory_target=360m scope=both\n*\nERROR at line\
  \ 1:\nORA-02097: parameter cannot be modified because specified value is invalid\n\
  ORA-00838: Specified value of MEMORY_TARGET is too small, needs to be at least\n\
  544M\n\nSQL> alter system set memory_target=544m scope=both;\n\nalter system set\
  \ memory_target=544m scope=both\n*\nERROR at line 1:\nORA-02097: parameter cannot\
  \ be modified because specified value is invalid\nORA-00838: Specified value of\
  \ MEMORY_TARGET is too small, needs to be at least\n624M\n\nSQL>  alter system set\
  \ memory_target=624m scope=both;\n\nSystem altered.\n\nSQL>\n```\n\n您会注意到，当我们尝试为\
  \ `MEMORY_TARGET` 参数设置一个非常低的值时，Oracle 发出了错误。请注意，Oracle 通过多次尝试来告知您 `MEMORY_TARGET`\
  \ 参数的最小允许级别。\n\n如何设置 `MEMORY_MAX_TARGET` 参数的值呢？这很简单——您只需选择一个足够高的值，不仅要满足当前的工作负载，还要满足数据库未来的需求。由于\
  \ `MEMORY_TARGET` 参数是动态的，您可以随时更改它，并在必要时在运行于服务器上的多个实例之间重新分配内存。只需确保将 `MEMORY_MAX_TARGET`\
  \ 参数的值设置为至少等于当前 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 参数设置值的总和（如果您是从 10g 版本迁移而来）。务必与您的系统管理员确认，以便不会为\
  \ Oracle 实例分配过多的内存，否则可能导致操作系统级别的页面交换等问题，这不仅会影响您的 Oracle 数据库，还会影响该服务器上运行的所有其他内容。\n\
  \n### 3-2. 管理多个缓冲区池\n\n#### 问题\n\n您正在使用自动内存管理，但决定为缓冲区池组件分配一个最小值。您希望配置缓冲区池，使其保留经常访问的段，这些段可能面临从缓冲区池中老化出局的风险。\n\
  \n\n## 3-2. 使用多个缓冲池\n\n### 解决方案\n\n你可以使用多个缓冲池，而不是 Oracle 单一的默认缓冲池，以确保频繁使用的**段**能保留在缓冲池中，而不会被回收。为了在数据库中实现多个缓冲池，你需要做两件事：创建两个独立的缓冲池——`KEEP`\
  \ 缓冲池和 `RECYCLE` 缓冲池。完成此操作后，你必须在创建段时在 `STORAGE` 子句中指定 `BUFFER_POOL` 关键字。例如，如果你想让一个段被缓存（或固定）在缓冲池中，你必须指定\
  \ `KEEP` 缓冲池。\n\n![images](img/square.jpg) `Note` 无论是 `KEEP` 池还是 `RECYCLE` 池，都不是默认\
  \ `BUFFER CACHE` 的一部分。这两个池都位于默认缓冲缓存之外。\n\n以下是创建这两种类型缓冲池的方法。\n\n在 `SPFILE` 或 `init.ora`\
  \ 文件中，指定两个参数以及你希望分配给每个池的大小：\n\n```\ndb_keep_cache_size=1000m\ndb_recycle_cache_size=100m\n\
  ```\n\n以下是如何为段指定默认缓冲池：\n\n```\nSQL> alter table employees\n     storage (buffer_pool=keep);\n\
  \n表已更改。\nSQL>\n```\n\n### 工作原理\n\n当你的数据库包含被频繁引用的表时，配置一个 `KEEP` 缓冲池是一个理想的解决方案。你可以将此类频繁访问的段存储在\
  \ `KEEP` 缓冲缓存中。通过这样做，你不仅将这些段隔离到缓冲池的特定部分，还能确保物理 I/O 被最小化。`KEEP` 缓冲池应该多大，取决于你想要分配给该池的对象的总大小。你可以通过汇总该池所有候选对象的大小来获得一个粗略的概念，或者你可以检查\
  \ `DBA_TABLES` 视图（`BLOCKS` 列）的值来弄清楚这一点。\n\n谈到这个话题，我们想指出 `KEEP` 缓冲池的对应物——`RECYCLE`\
  \ 缓冲池。通常，Oracle 数据库使用最近最少使用算法来决定当需要更多空闲空间时，应从缓冲缓存中清除哪些对象。如果你的数据库每天大约只访问一次非常大的对象，你可以防止这些对象占用缓冲缓存的大部分空间，而是在它们被访问后让它们直接从缓冲缓存中老化移除。你可以通过在创建对象时或之后通过设置适当的存储参数，允许候选对象使用\
  \ `RECYCLED` 缓冲池来配置这种行为，如下例所示（注意，你必须先设置 `DB_RECYCLE_CACHE_SIZE` 初始化参数，如本方案“解决方案”部分所示）。\n\
  \n你可以执行以下查询来确定每个段当前有多少块在缓冲缓存中：\n\n```\nSQL> select o.object_name, count(*) number_of_blocks\n\
  \     from dba_objects o, v$bh v\n     where o.data_object_id = v.objd\n     and\
  \ o.owner !='SYS'\n     group by o.object_name\n     order by count(*);\n```\n\n\
  当你的数据库访问大段并为处理查询检索数据时，有时可能会过早地使其他段从缓冲池中老化移出。如果你之后需要这些过早老化移出的段，就需要额外的 I/O。什么构成大表或索引段取决于你的理解。考虑到对象大小相对于你分配给缓冲缓存的总内存的比例，可能是比较安全的思考方式。Oracle\
  \ 认为，如果一个段在（非顺序）物理读取中占据了超过 10%，那么就决定是否需要使用 `KEEP` 或 `RECYCLE` 缓冲池的目的而言，它就是一个大段。因此，少数几个这样的大段可以占据缓冲缓存的很大一部分，并损害数据库的性能。\n\
  \n如果你有其他数据库访问的段，比如每秒钟访问一次，它们不会从缓冲池中老化移出，因为它们一直在使用中。然而，可能会有其他段受到数据库读入其缓冲缓存的少数大段的负面影响。正是在这种情况下，你的数据库通过将\
  \ `RECYCLE` 池专用于大段受益最大。当然，如果你想绝对、完全确保关键段根本不会老化移出，那么你可以创建 `KEEP` 缓冲缓存并将这些对象分配给这个池。\n\
  \n## 3-3. 设置内存的最小值\n\n### 问题\n\n你正在使用自动内存管理，但你认为数据库有时没有为 `PGA_AGGREGATE_TARGET`\
  \ 组件分配足够的内存。\n\n### 解决方案\n\n尽管自动内存管理应该如其所言——自动化内存分配——但有时你会意识到 Oracle 没有最优地分配某些内存组件。你可以为主要\
  \ Oracle 内存组件——缓冲缓存、共享池、大池、Java 池和 PGA 内存——中的任何一个设置最小值。例如，即使在指定自动内存管理后，你仍然可以使用以下命令为实例\
  \ PGA 指定一个目标，而无需重启数据库：\n\n```\nSQL> alter system set pga_aggregate_target=1000m;\n\
  ```\n\n从现在起，Oracle 将永远不会将 PGA 内存分配减少到低于你设置的值——这个值隐式地为内存参数设置了一个最小值。数据库将继续自动为 SGA\
  \ 的各个组件分配内存，但它首先会从 `MEMORY_TARGET` 参数值中减去你显式分配给 PGA 的内存——本例中为 1,000 MB。剩下的内存就是数据库将分配给实例\
  \ SGA 的部分。\n\n### 工作原理\n\n自 Oracle 在 Oracle Database 10g 中引入 `SGA_TARGET`（以自动化共享内存管理）和在\
  \ Oracle Database 11g 中引入 `MEMORY_TARGET` 参数（以自动化共享内存和 PGA 内存管理）以来，一些 DBA 抱怨这些参数有时没有正确调整\
  \ Oracle 内存的某些组件，例如缓冲缓存。\n\n有证据表明，在自动内存管理下，数据库可能会滞后于需要突然增加 SGA 单个组件或 PGA 分配的事件。例如，你可能有一个数据库活动激增，需要快速调整内存的共享池组件——数据库可能只有在注意到需要更多内存的事件后才会达到最佳共享池大小分配水平。因此，数据库可能会经历暂时的性能下降。因此，一些\
  \ DBA 发现，只要你为缓冲缓存或 PGA 或两者都设置了最小值——通过为 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 初始化参数指定显式值，而不是让它们保持默认值零——自动内存管理就可以正常工作。数据库仍将使用自动内存管理，但现在会将你为任何内存组件设置的特定值用作最小值。话虽如此，根据我们的经验，自动内存管理在大多数情况下都能如宣传的那样工作；然而，根据特定数据库中任何特殊的基于时间的工作负载变化，你的情况可能会有所不同。在这种时候，设置代表你自己对处理需求理解的最小值，而不是盲目依赖\
  \ Oracle 的自动内存算法，是完全没问题的。\n\n## 3-4. 监控内存调整操作\n\n### 问题\n\n你已经在数据库中实施了自动内存管理，并希望监控数据库当前如何分配各种动态调整的内存组件。\n\
  \n\n#### 解决方案\n\n在自动内存管理模式下，可以通过查询`V$MEMORY_DYNAMIC_COMPONENTS`视图来查看任何实例中当前的内存分配情况。查询此视图可提供重要信息，帮助调整`MEMORY_TARGET`参数。以下是如何对该视图执行查询：\n\
  \n```\nSQL> select * from v$memory_target_advice order by memory_size;\n\nMEMORY_SIZE\
  \ MEMORY_SIZE_FACTOR ESTD_DB_TIME ESTD_DB_TIME_FACTOR    VERSION\n----------- ------------------\
  \ ------------ ------------------- ----------\n        468                .75  \
  \      43598              1.0061          0\n        624                  1    \
  \    43334                   1          0\n        780               1.25      \
  \  43334                   1          0\n        936                1.5        43330\
  \               .9999          0\n       1092               1.75        43330  \
  \             .9999          0\n       1248                  2        43330    \
  \           .9999          0\n\n6 rows selected.\n\nSQL>\n```\n\n当前内存分配由`MEMORY_SIZE_FACTOR`值为\
  \ 1 的行显示（本例中为 624 MB）。`MEMORY_SIZE_FACTOR`列显示了`MEMORY_TARGET`参数的替代大小，其值为当前`MEMORY_TARGET`参数值的倍数。`ESTD_DB_TIME`列显示了\
  \ Oracle 估计使用特定`MEMORY_TARGET`值完成当前工作负载所需的时间。因此，查询结果展示了通过调整`MEMORY_TARGET`参数值，数据库处理工作可以加快多少。\n\
  \n#### 工作原理\n\n使用`V$MEMORY_TARGET_ADVICE`视图可以快速了解`MEMORY_TARGET`分配是否最优。需要在数据库处理了代表性工作负载后，基于此视图运行查询以获得有用的结果。如果视图报告增加`MEMORY_TARGET`设置没有带来收益，您就不必通过向数据库实例分配更多内存来浪费宝贵的系统内存。通常，查询可能报告潜在性能（由`V$MEMORY_TARGET_ADVICE`视图的`ESTD_DB_TIME`列指示）在`MEMORY_SIZE_FACTOR`值小于\
  \ 1 时并未下降。在这种情况下，您可以安全地减少`MEMORY_TARGET`参数的设置。\n\n您还可以使用`V$MEMORY_RESIZE_OPS`视图来查看在过去\
  \ 800 次完成的内存调整操作间隔内，实例如何调整了各种内存组件的大小。您会看到数据库会根据遇到的工作负载自动增加或缩小`SGA_TARGET`和`PGA_AGGREGATE_TARGET`参数的值。以下查询展示了如何使用`V$MEMORY_RESIZE_OPS`视图来了解\
  \ Oracle 的实例内存动态分配：\n\n```\nSQL> select component,oper_type,oper_mode,parameter,\
  \ final_size,target_size\n     from v$memory_resize_ops\n\nCOMPONENT           \
  \    OPER_TYPE   OPER_MODE      PARAMETER      FINAL_SIZE   TARGET_SIZE\n---------------------\
  \  -----------  ---------  ---------------  ------------  ------------\n\nDEFAULT\
  \ buffer cache    GROW        DEFERRED   db_cache_size        180355072     180355072\n\
  shared pool             GROW        DEFERRED   shared_pool_size     264241152  \
  \   264241152\n…\n20 rows selected.\nSQL>\n```\n\n`OPER_TYPE`列可以取两个值——`GROW`或`SHRINK`，这取决于随着数据库工作负载随时间波动，数据库是增长还是缩小单个内存组件。正是这种通过自动为各种内存组件配置必要内存来响应这些变化的能力，构成了这种“自动”内存管理。DBA\
  \ 最好随时间监控此视图，以确保自动内存管理为其数据库运行良好。\n\n### 3-5. 优化内存使用\n\n#### 问题\n\n您已在数据库中设置了自动内存管理，并希望借助\
  \ Oracle 的内存顾问来优化内存使用。\n\n#### 解决方案\n\n无论您设置的是自动内存管理、自动共享内存管理，甚至是手动内存管理方案，您都可以使用\
  \ Oracle 的内存顾问来指导内存调整工作。在本示例中，我们展示了如何使用 Oracle Enterprise Manager Database Control\
  \ 轻松调整内存使用。步骤如下：\n\n1.  转到 Database Control 中的 Database Home 页面。点击页面底部的 Advisor\
  \ Central。\n2.  在出现的 Memory Advisors 页面中，点击 Automatic Memory Management 下 Total\
  \ Memory Size 框旁的 Advice。\n\nMemory Size Advice 图会出现在一个单独的窗口中，如图 3-1 所示。在此图中，DB\
  \ 时间的改进与当前为`MEMORY_TARGET`参数设置的总内存相对应绘制。DB 时间改进的值越高，性能就越好。该图显示了随着您更改`MEMORY_TARGET`参数值，性能（DB\
  \ 时间改进）将如何变化。您分配的总内存不能超过此实例允许的最大内存，这在图中由虚线直线表示。\n\n![images](img/0301.jpg)\n\n**图\
  \ 3-1.** Database Control 中的 Memory Size Advice 图\n\n#### 工作原理\n\n当您实施自动内存管理时，Oracle\
  \ 会根据实例的工作负载特征，在实例运行过程中自动调整总内存的各个组件——SGA 和 PGA 之间的内存。您无需运行各种视图的查询来确定当前内存分配是否最优，而是可以遵循几个简单的步骤来快速了解情况。您可以查看自动数据库诊断监视器报告，看看它们是否包含关于内存不足的任何评论或建议。如果\
  \ ADDM 认为当前内存分配不足以实现最佳性能，它会建议您为`MEMORY_TARGET`参数增加更多内存。\n\n如果 ADDM 报告建议您增加`MEMORY_TARGET`参数的大小，下一个问题是应该增加多少内存分配。Oracle\
  \ 内置的内存顾问正是用于此目的。即使没有 ADDM 的建议，您也可以使用内存顾问来了解增加或减少`MEMORY_TARGET`参数将如何影响性能。\n\n您还可以通过点击\
  \ Memory Advisors 页面顶部的 PGA，从同一页面优化 PGA 内存分配。对于 PGA，在 PGA Target Advice 页面中，图表将\
  \ PGA 缓存命中率与 PGA 目标大小相对应绘制。理想情况下，您会希望 PGA 缓存比率大约在 70%以上。PGA Target Advice 页面将帮助您确定应为`PGA_AGGREGATE_TARGET`参数分配什么值以实现您的性能目标。\n\
  \n### 3-6. 调优 PGA 内存分配\n\n#### 问题\n\n您决定为`PGA_AGGREGATE_TARGET`参数设置一个特定的最小内存大小，尽管您正在使用\
  \ Oracle 的自动内存管理来分配内存。您想知道确定最佳 PGA 内存分配的最佳方法。\n\n#### 解决方案\n\n没有硬性规定来分配`PGA_AGGREGATE_TARGET`参数的大小。话虽如此，如果您运营的是数据仓库，您更可能需要为\
  \ Oracle 内存分配的 PGA 组件预留更大的内存量。您可以遵循以下基本步骤来分配 PGA 内存水平：\n\n1.  大致猜测 PGA 可能需要多少内存，以此作为起始分配。\n\
  2.  让数据库运行一两个完整周期的代表性工作负载。然后您可以访问各种 Oracle 视图来确定您最初对 PGA 的估计是否准确。\n\n\n\n#### 工作原理\n\
  \n尽管自动内存管理旨在优化 Oracle 内存的两个主要组件——`SGA` 和 `PGA`——之间的内存分配，但许多 `DBA` 决定自行设置 `SGA` 和\
  \ `PGA` 的值，这当然也很常见。这要么是作为替代内存管理模式（即自动共享内存管理，在此模式下你显式设置 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET`\
  \ 参数来管理内存）的一部分，要么甚至是在更新的自动内存管理系统下进行的。与 `SGA_TARGET` 参数不同（其缓存命中率可能会误导你对实例效能的判断），你会发现对\
  \ `PGA_AGGREGATE_TARGET` 参数命中率的分析不仅有效，而且对于配置该参数的适当大小非常有用。\n\nOracle 数据库使用 `PGA`\
  \ 内存来执行排序和哈希等操作。分配给 `PGA` 组件的内存由数据库中运行的各种 SQL 工作区使用（连同其他 `PGA` 内存使用者，如 `PL/SQL`\
  \ 和 `Java` 程序）。理想情况下，你希望所有工作区都具有最佳的 `PGA` 内存分配。当内存分配理想时，工作区会在内存中执行整个操作。例如，如果一个 `SQL`\
  \ 操作涉及排序操作，在最佳的 `PGA` 分配下，所有的排序都会在分配给该进程的 `PGA` 内存中完成。如果 `PGA` 内存分配不是最优的，工作区将对数据进行一次或多次遍历——这意味着它们必须在磁盘上执行操作，涉及耗时的\
  \ `I/O`。数据库被迫进行的遍历次数越多，`I/O` 就越多，处理工作所需的时间也越长。\n\nOracle 使用以下公式计算 `PGA` 缓存命中百分比：\n\
  \n```\nBytes Processed * 100 /(Bytes processed + Extra Bytes Processed)\n```\n\n\
  `Bytes Processed` 是自实例启动以来，所有使用 `SQL` 操作的 `PGA` 内存处理的总字节数。你应该力求使这个比率尽可能接近 100——如果你的\
  \ `PGA` 缓存命中百分比大约是 33.37%，那绝对是时候通过提高你为 `PGA_AGGREGATE_TARGET` 参数设置的值来增加 `PGA` 内存分配了。幸运的是，`PGA_AGGREGATE_TARGET`\
  \ 参数是动态的，因此你可以即时调整它，而无需重启数据库，以应对由于大量排序和哈希活动导致的数据库性能突然下降。\n\n你可以执行以下简单查询来找出 `PGA`\
  \ 缓存命中百分比以及一些与 `PGA` 性能相关的值。\n\n```\nSQL>select  * from v$pgastat;\nNAME       \
  \                              VALUE             UNIT\n--------------------------------\
  \       -------------     ----------\naggregate PGA target parameter           \
  \  570425344     bytes\naggregate PGA auto target                  481397760   \
  \  bytes\ntotal PGA inuse                            35661824     bytes\ntotal PGA\
  \ allocated                        70365184     bytes\nmaximum PGA allocated   \
  \                  195681280     bytes\nover allocation count                  \
  \         0     bytes processed\nextra bytes read/written                      \
  \  0     bytes\ncache hit percentage                          100     percent\n\
  SQL>\n```\n\n由于我们这里使用的是测试数据库，缓存命中百分比是满值 100%，但在真实的数据库中不要期望如此，尤其是当它正在处理大量数据仓库类型的操作时！\n\
  \n你也可以使用 `V$SQL_WORKAREA_HISTOGRAM` 视图来了解数据库以最优方式执行了多少工作。如果一个工作区以最优方式执行其工作，即完全在\
  \ `PGA` 内存中完成，它会被计入 `OPTIMAL_COUNT` 列。如果它进行了一次或多次遍历，它将被归入 `ONEPASS_COUNT` 或 `MULTIPASS_COUNT`\
  \ 列。下面是一个展示如何执行此操作的查询：\n\n```\nSQL> select optimal_count, round(optimal_count*100/total,\
  \ 2) optimal_perc,\n  2  onepass_count, round(onepass_count*100/total, 2) onepass_perc,\n\
  \  3  multipass_count, round(multipass_count*100/total, 2) multipass_perc\n  4 \
  \ from\n  5   (select decode(sum(total_executions), 0, 1, sum(total_executions))\
  \ total,\n  6   sum(OPTIMAL_EXECUTIONS) optimal_count,\n  7   sum(ONEPASS_EXECUTIONS)\
  \ onepass_count,\n  8   sum(MULTIPASSES_EXECUTIONS) multipass_count\n  9   from\
  \  v$sql_workarea_histogram\n 10* where low_optimal_size > (64*1024))\nSQL> /\n\
  OPTI_COUNT     OPTI_PERC    ONEPASS_CT     ONEPASS_PERC   MULTIPASS_CT     MULTIPASS_PERC\n\
  -----------   -----------  -----------    -------------   --------------   ---------------\n\
  8069              100             0            0               0               \
  \  0\n```\n\n一次遍历比没有遍历要慢，但多次遍历操作绝对是数据库出现问题的迹象，尤其是在涉及大型工作区时。你很可能会发现，当数据库被迫执行即使是中等数量的涉及大型工作区（例如那些大小在\
  \ 256 MB 到 2 GB 之间的）的多次遍历执行时，数据库已慢如蜗牛，无法有效扩展。为确保你没有任何大型工作区以多次遍历模式运行，请执行以下查询：\n\n\
  ```\nSQl> select low_optimal_size/1024 low,\n     (high_optimal_size+1)/1024 high,\n\
  \     optimal_executions, onepass_executions, multipasses_executions\n     from\
  \ v$sql_workarea_histogram\n     where total_executions !=0;\n```\n\n你还可以执行涉及 `V$SYSSTAT`\
  \ 和 `V$SESSTAT` 等视图的简单查询，如下所示，以准确找出数据库在最优内存大小（在 `PGA` 中）、一次遍历内存大小和多次遍历内存大小下执行了多少个工作区。\n\
  \n```\nSQL>select name profile, cnt, decode(total, 0, 0, round(cnt*100/total)) percentage\n\
  \    from (SELECT name, value cnt, (sum(value) over ()) total\n    from V$SYSSTAT\n\
  \    where name like 'workarea exec%');\n```\n\n请记住，此查询显示的是自数据库启动以来，在三种不同执行模式（最优、一次遍历和多次遍历）下执行的工作区总数。要获取特定时间段内的相同信息，你可以使用涉及自动会话历史（`ASH`）的查询。\n\
  \n你也可以查看自动工作量存储库（`AWR`）的内容，以获取关于数据库在任意你选择的区间内如何使用其 `PGA` 内存的信息。如果你定期创建这些报告并保存它们，就可以拥有\
  \ `PGA` 分配在一段时间内的历史记录。你还可以查看特定时间段的 `ADDM` 报告，以评估数据库在前面讨论的三种执行模式下分别执行了多大比例的工作。在数据仓库环境中，数据库需要处理巨大的排序和哈希操作，`PGA`\
  \ 内存的最优分配是 `DBA` 可执行的最关键任务之一。\n\n### 3-7. 配置服务器查询缓存\n\n#### 问题\n\n你想要设置作为 Oracle\
  \ 内存分配一部分的服务器查询缓存。\n\n\n\n\n#### 服务器查询缓存\n\n##### 配置方案\n\n你可以通过设置三个初始化参数来控制服务器查询缓存的行为：`RESULT_CACHE_MAX_SIZE`、`RESULT_CACHE_MAX_RESULT`\
  \ 和 `RESULT_CACHE_REMOTE_EXPIRATION`。例如，你可以为这三个与服务器结果缓存相关的初始化参数使用以下值集：\n\n```\n\
  RESULT_CACHE_MAX_SIZE=500M      /* 兆字节 */\nRESULT_CACHE_MAX_RESULT=20      /* 百分比\
  \ */\nRESULT_CACHE_REMOTE_EXPIRATION=3600       /* 分钟 */\n```\n\n你可以通过将 `RESULT_CACHE_MAX_SIZE`\
  \ 参数设置为 0 来禁用服务器结果缓存（该参数的任何非零值都会启用缓存）。\n\n如果你将 `RESULT_CACHE_MODE` 初始化参数设置为 `FORCE`，则数据库会缓存所有查询结果，除非你指定\
  \ `/*+ NO_RESULT_CACHE */` 提示来排除某个查询的结果。该参数的默认值（也是推荐值）是 `MANUAL`，这意味着数据库仅在你使用相应的查询提示或表注解（稍后解释）时才会缓存查询结果。你可以在系统级别或会话级别设置此参数，如下所示：\n\
  \n```\nSQL> alter session set result_cache_mode=force;\n```\n\n你可以通过使用 `DBMS_RESULT_CACHE`\
  \ 包中的 `FLUSH` 过程来从服务器结果缓存中移除缓存的结果，如下所示：\n\n```\nSQL> execute dbms_result_cache.flush\n\
  ```\n\n##### 工作原理\n\n服务器结果缓存提供了一种极佳的方式来存储频繁执行的 SQL 查询和 PL/SQL 函数的结果。借助我们在“配置方案”部分描述的三个初始化参数，此功能易于配置。但是，请记住，Oracle\
  \ 并不保证无论怎样，特定的查询或 PL/SQL 函数结果都会被缓存。\n\n在某些方面，你可以将 Oracle 结果缓存功能与其他 Oracle 结果存储机制进行比较，例如共享的\
  \ PL/SQL 集合以及物化视图。但请注意，Oracle 将 PL/SQL 集合存储在私有的 PGA 区域中，而将结果缓存作为共享池组件之一存储在共享池中。如你所知，共享池是\
  \ SGA 的一部分。物化视图存储在磁盘上，而结果缓存则存储在速度更快的随机存取存储器中。因此，当你利用结果缓存来存储结果集时，相比于在物化视图中存储预计算结果，你可以预期获得远胜一筹的性能。最重要的是，结果缓存为\
  \ Oracle DBA 提供了一种完全无需干预的存储频繁访问结果集的模式——你无需像创建物化视图那样创建任何对象、为其建立索引或刷新它们。Oracle 会为你处理好一切。\n\
  \n服务器查询缓存是 SGA 共享池组件的一部分。你可以使用此缓存来存储 SQL 查询结果以及 PL/SQL 函数结果。Oracle 可以在 SQL 结果缓存中缓存\
  \ SQL 结果，并在 PL/SQL 函数结果缓存中缓存 PL/SQL 函数结果。你通常使用服务器查询缓存来使数据库缓存那些频繁执行但每次执行需要访问大量行的查询。你可以通过在数据库中设置以下初始化参数来配置服务器查询缓存。\n\
  \n*   `RESULT_CACHE_MAX_SIZE`：这设置了分配给服务器结果缓存的内存。\n*   `RESULT_CACHE_MAX_RESULT`：这是缓存中单个结果可使用的最大内存量，以百分比表示。默认是服务器结果缓存的\
  \ 5%。\n*   `RESULT_CACHE_REMOTE_EXPIRATION`：默认情况下，任何涉及远程对象的结果都不会被缓存。因此，`RESULT_CACHE_REMOTE_EXPIRATION`\
  \ 参数的默认设置是 0。但是，你可以通过为 `RESULT_CACHE_REMOTE_EXPIRATION` 参数设置一个显式值来启用涉及远程对象的结果的缓存。\n\
  \n仅为服务器结果缓存设置这三个初始化参数仅仅是启用了缓存。要实际将缓存用于你的 SQL 查询结果或 PL/SQL 函数结果，你必须在数据库范围内启用缓存，或针对特定查询启用缓存，如下面的配方所述。\n\
  \n一旦数据库将结果存储在服务器结果缓存中，它会一直保留该结果，直到你使用 `DBMS_RESULT_CACHE.FLUSH` 过程手动移除它，或者直到缓存达到由\
  \ `RESULT_CACHE_MAX_SIZE` 参数设置的最大大小。当服务器结果缓存容量耗尽，需要为更新结果腾出空间时，数据库将从缓存中移除最旧的结果。\n\
  \n#### 管理服务器查询缓存\n\n##### 问题\n\n你已经启用了服务器结果缓存，但不确定查询是否正在利用它。你还想了解服务器结果缓存的运行状况。\n\
  \n##### 解决方案\n\n你可以通过使用 `DBMS_RESULT_CACHE` 包来检查服务器结果缓存的状态。例如，使用以下查询检查缓存是否已启用：\n\
  \n```\nSQL> select dbms_result_cache.status() from dual;\n\nDBMS_RESULT_CACHE.STATUS()\n\
  -----------------------------------------------------\nENABLED\n\nSQL>\n```\n\n\
  在为查询启用缓存后，你可以查看查询的执行计划，以检查该查询是否确实使用了 SQL 查询缓存，如下例所示。查询的执行计划显示该查询确实在使用结果缓存的 SQL 查询缓存组件。\n\
  \n```\nSQL> select  /*+ RESULT_CACHE */ department_id, AVG(salary)\n     from hr.employees\n\
  \     group by department_id;\n.\n.\n.\n--------------------------------------------------------------\n\
  | Id | Operation          | Name                       |Rows\n--------------------------------------------------------------\n\
  |  0 | SELECT STATEMENT   |                            |  11\n|  1 |  RESULT CACHE\
  \      | 8fpza04gtwsfr6n595au15yj4y |\n|  2 |   HASH GROUP BY    |             \
  \               |  11\n|  3 |    TABLE ACCESS FULL| EMPLOYEES                  |\
  \ 107\n--------------------------------------------------------------\n```\n\n你可以使用\
  \ `DBMS_RESULT_CACHE` 包的 `MEMORY_REPORT` 过程来查看 Oracle 如何为结果缓存分配内存，如下所示：\n\n```\n\
  SQL> SET SERVEROUTPUT ON\nSQL> execute dbms_result_cache.memory_report\n\nR e s\
  \ u l t   C a c h e   M e m o r y   R e p o r t\n[Parameters]\nBlock Size     =\
  \ 1024 bytes\nMaximum Cache Size = 950272 bytes (928 blocks)\nMaximum Result Size\
  \ = 47104 bytes (46 blocks)\n[Memory]\nTotal Memory = 46340 bytes [0.048% of the\
  \ Shared Pool]\n... Fixed Memory = 10696 bytes [0.011% of the Shared Pool]\n...\
  \ State Object Pool =  2852 bytes [0.003% of the Shared Pool]\n... Cache Memory\
  \ = 32792 bytes (32 blocks) [0.034% of the Shared Pool]\n....... Unused Memory =\
  \ 30 blocks\n....... Used Memory = 2 blocks\n........... Dependencies = 1 blocks\n\
  ........... Results = 1 blocks\n............... SQL = 1 blocks\n\nPL/SQL procedure\
  \ successfully completed.\nSQL>\n```\n\n你可以通过执行以下查询来监控服务器结果缓存统计信息：\n\n```\nSQL>\
  \ select name, value from V$RESULT_CACHE_STATISTICS;\n\nNAME                   \
  \       VALUE\n--------------------          ----------\nBlock Size (Bytes)    \
  \        1024\nBlock Count Maximum           3136\nBlock Count Current         \
  \    32\nResult Size Maximum (Blocks)   156\nCreate Count Success              2\n\
  Create Count Failure              0\nFind Count                        0\nInvalidation\
  \ Count                0\nDelete Count Invalid              0\nDelete Count Valid\
  \                0\nSQL>\n```\n\n`Create Count Success` 列显示数据库已在服务器结果缓存中缓存的查询数，`Invalidation\
  \ Count` 列显示数据库使缓存结果无效的次数。\n\n\n### 3-9\\. 缓存 SQL 查询结果\n\n#### 工作原理\n\n你可以使用 Oracle\
  \ 提供的 `DBMS_RESULT_CACHE` 包来监控和管理服务器结果缓存。此包允许你管理服务器结果缓存的两个组件：SQL 结果缓存 和 PL/SQL 函数结果缓存。你可以使用\
  \ `DBMS_RESULT_CACHE` 包来管理服务器结果缓存的内存分配，以及绕过和重新启用缓存（例如在重新编译 PL/SQL 包时）、清空缓存以及查看与服务器查询缓存内存使用相关的统计信息。\n\
  \n服务器结果缓存是 Oracle SGA 共享池组件的一部分。根据所使用的内存管理系统，Oracle 在启动数据库时会为服务器结果缓存分配一定比例的内存。以下是\
  \ Oracle 决定分配多少共享池内存给服务器结果缓存的规则：\n\n*   如果你通过设置 `MEMORY_TARGET` 参数来使用自动内存管理，Oracle\
  \ 会将 `MEMORY_TARGET` 参数值的 0.25% 分配给服务器结果缓存。\n*   如果你使用 `SGA_TARGET` 参数进行自动共享内存管理，则分配量为\
  \ `SGA_TARGET` 参数的 0.5%。\n*   如果你通过设置 `SHARED_POOL_SIZE` 参数进行手动内存管理，则分配量为 `SHARED_POOL_SIZE`\
  \ 参数的 1%。\n\n在 Oracle RAC 环境中，你可以在每个实例上为服务器缓存设置不同的大小，就像处理 `MEMORY_TARGET` 和其他实例相关参数一样。同样地，当你通过将\
  \ `RESULT_CACHE_MAX_SIZE` 设置为 0 来禁用服务器结果缓存时，必须在集群的所有实例上都进行此操作。\n\n服务器结果缓存可以通过避免重新计算结果来减少你的\
  \ CPU 开销，否则可能需要从缓冲区缓存中重复获取数据，这会导致更高的逻辑 I/O 次数。当你选择将结果缓存在缓存中，而不是预先计算并将它们存储在物化视图中时，你也有可能减少数据库的磁盘\
  \ I/O。请记住，结果缓存的主要目的不是简单地在内存中存储任何结果——它主要是为了帮助提高涉及静态或基本静态数据的查询的性能。因此，数据仓库或决策支持系统很可能从这一新的性能特性中获益最大。\n\
  \n#### 问题\n\n你已在数据库中配置了服务器结果缓存。现在你希望配置一组查询，使其结果能够被缓存在服务器结果缓存中。\n\n#### 解决方案\n\n\
  将 `RESULT_CACHE_MODE` 初始化参数设置为适当的值，以使查询有资格被缓存到服务器结果缓存中。你可以将 `RESULT_CACHE_MODE`\
  \ 设置为 `FORCE`，以强制所有 SQL 结果都被数据库缓存。Oracle 建议你将 `RESULT_CACHE_MODE` 参数值设置为 `MANUAL`，这恰好是默认设置。`RESULT_CACHE_MODE`\
  \ 参数是动态的，因此你可以使用 `ALTER SYSTEM`（或 `ALTER SESSION`）命令来设置此参数。\n\n当你将 `RESULT_CACHE_MODE`\
  \ 参数值设置为 `MANUAL` 时，数据库仅缓存特定查询的结果——那些你通过使用查询提示或表注解启用了缓存的查询。以下示例展示了如何使用查询提示方法来指定将查询结果缓存到服务器结果缓存中。\n\
  \n```sql\nSQL> select /*+ RESULT_CACHE */ prod_id, sum(amount_sold)\n     from \
  \ sales\n     group by prod_id\n     order by prod_id;\n```\n\n查询提示 `/*+RESULT_CACHE\
  \ */` 告诉数据库缓存前一个查询的结果。你可以使用 `/*+ NO_RESULT_CACHE */` 提示来关闭此查询的结果缓存，如下例所示。\n\n```sql\n\
  SQL> select /*+ NO_RESULT_CACHE */ prod_id, SUM(amount_sold)\n     from  sales\n\
  \     group by prod_id\n     order by prod_id;\n```\n\n当你运行此查询时，服务器将不再缓存此查询的结果，因为你已将\
  \ `RESULT_CACHE_MODE` 初始化参数设置为 `MANUAL`。\n\n指定缓存查询结果的另一种方法是使用表注解方法。在此方法中，你在创建表或更改表时指定\
  \ `RESULT_CACHE` 属性。你可以使用两种不同的模式为 `CREATE TABLE` 或 `ALTER TABLE` 语句添加 `RESULT_CACHE`\
  \ 属性注解：`DEFAULT` 或 `FORCE`，如下列示例所示：\n\n```sql\nSQL> create table stores (...) RESULT_CACHE\
  \ (MODE DEFAULT);\nSQL> alter table stores RESULT_CACHE (MODE FORCE);\n```\n\n我们将在“工作原理”部分解释将\
  \ `RESULT_CACHE_MODE` 初始化参数设置为 `FORCE` 的影响。\n\n#### 工作原理\n\n如果你将 `RESULT_CACHE_MODE`\
  \ 参数的值设置为 `FORCE`，Oracle 将只执行所有后续查询一次。在后续执行这些查询时，数据库将从缓存中检索结果。显然，你不想存储每一条 SQL 语句的结果，因为这会带来性能影响，并且服务器结果缓存可能会耗尽空间。因此，Oracle\
  \ 建议你为 `RESULT_CACHE_MODE` 参数指定 `MANUAL` 设置。\n\n如果可以通过使用 SQL 提示来设置结果缓存行为，为什么还要使用表注解？表注解是一种指定缓存的简便方法，无需通过添加\
  \ SQL 提示直接修改应用程序查询。只需对一组表发出一个 `ALTER TABLE` 语句，即可启用使用该组表的多个查询的缓存，这样更为简单。请注意，当你为表添加注解时，这些注解适用于整个查询，而不是查询的片段。\n\
  \n如果你为表添加了注解*并且*指定了用于查询缓存的 SQL 提示，Oracle 将选择哪种方法来确定是否缓存查询结果？数据库优先考虑查询提示，而非表注解。然而，SQL\
  \ 提示和表注解之间的关系很复杂，数据库是否缓存查询结果还取决于表注解的具体值，如下文总结的讨论所示。\n\n##### 表注解与查询提示\n\n如前所述，你可以同时使用\
  \ SQL 提示和表注解来指定希望结果缓存存储的查询结果，其中提示的优先级高于注解。使用 `ALTER TABLE` 或 `CREATE TABLE` 语句为表添加结果缓存模式注解。以下是为表或一组表添加注解时\
  \ `CREATE` 或 `ALTER TABLE` 语句的语法：\n\n```sql\nCREATE|ALTER TABLE [<schema>.]<table>\
  \ ... [RESULT_CACHE (MODE {FORCE|DEFAULT})]\n```\n\n关于表注解，请注意以下重要几点：\n\n*   `DEFAULT`\
  \ 模式值当然是默认值，它仅仅是移除你可能已设置的任何表注解，并且不允许缓存涉及该表的查询结果。\n*   如果你将至少一个表设置为 `DEFAULT` 模式，则涉及该表的任何查询都不允许将其结果存储在缓存中。\n\
  *   如果你将查询中的所有表都设置为 `FORCE` 模式，Oracle 将总是考虑缓存该查询——除非你在查询中使用 `NO_RESULT_CACHE` 提示关闭缓存。\n\
  *   如果你通过如下的 `CREATE TABLE` 语句注解，将查询中的至少一个表设置为 `DEFAULT`，则 Oracle 仅当你将 `RESULT_CACHE_MODE`\
  \ 参数设置为 `FORCE` 或指定了 `RESULT_CACHE` 提示时，才会缓存此查询的结果。\n\n```sql\nSQL> CREATE TABLE\
  \ sales (id number) RESULT_CACHE (MODE DEFAULT);\n```\n\n请注意，上面的语句等效于下面的语句，因为 `RESULT_CACHE`\
  \ 属性的默认值是 `DEFAULT`。\n\n```sql\nSQL> CREATE TABLE sales (id number);\n```\n\n你可以检查数据库创建的\
  \ `SALES` 表，其 `RESULT_CACHE` 属性被设置为值 `DEFAULT`：\n\n```sql\nSQL> select table_name,\
  \ result_cache from user_tables where table_name ='SALES';\n\nTABLE_NAME       \
  \              RESULT_\n------------------------------ -------\nSALES          \
  \                DEFAULT\n\nSQL>\n```\n\n如果你在表创建语句中指定了 `RESULT_CACHE(MODE FORCE)`\
  \ 选项，这将覆盖你在会话级别设置的 `RESULT_CACHE_MODE` 初始化参数的 `MANUAL` 设置。以下示例说明了这是如何工作的。\n\n1.\
  \  首先，修改表 `STORES` 以指定带有 `MODE FORCE` 选项的 `RESULT_CACHE` 属性：`SQL> alter table stores\
  \ result_cache (mode force);`\n2.  然后确保你已将 `RESULT_CACHE_MODE` 初始化参数设置为值 `MANUAL`。\n\
  3.  接着执行以下查询：\n    ```sql\n    SQL> select prod_id, sum(amount_sold)\n         from\
  \ stores\n         group by prod_id\n         having prod_id=999;\n    ```\n\n在后续执行中，数据库将从服务器结果缓存中检索前述查询的结果。之所以如此，是因为当你指定\
  \ `RESULT_CACHE (MODE FORCE)` 注解时，它会覆盖 `RESULT_CACHE_MODE` 参数的 `MANUAL` 设置。请记住，当你将此参数设置为\
  \ `MANUAL` 模式时，Oracle 仅在你指定查询提示或注解时才会缓存查询结果。这里显示的查询没有使用提示，但其结果被缓存，因为 `RESULT_CACHE\
  \ (MODE FORCE)` 注解使数据库的行为与 `RESULT_CACHE_MODE` 参数设置为 `FORCE` 时相同——它会缓存所有符合条件的查询的查询结果。\n\
  \n然而，查询提示最终优先于 `RESULT_CACHE (MODE FORCE)` 注解，如以下示例所示。\n\n首先，修改表 `STORES` 以指定带有\
  \ `MODE FORCE` 选项的 `RESULT_CACHE` 属性：\n\n```sql\nSQL> alter table stores result_cache\
  \ (mode force);\n```\n\n确保你已将 `RESULT_CACHE_MODE` 初始化参数设置为值 `MANUAL`。\n\n执行以下查询：\n\
  \n```sql\nSQL>select /*+ no_result_cache */ *\n     from stores\n     order by time_id\
  \ desc;\n```\n\n在此示例中，即使你已将 `STORES` 表注解为允许使用 `MODE FORCE` 选项进行缓存，但 `/*+ no_result_cache\
  \ */` 提示覆盖了该注解，并阻止缓存任何涉及 `STORES` 表的查询的结果。\n\n##### 使用结果缓存的要求\n\n为了使数据库能够使用结果缓存，查询必须满足一些读一致性要求：\n\
  \n*   在涉及快照的情况下，如果一个读一致性快照构建了一个结果，它必须检索数据的最新已提交状态，或者该查询必须使用闪回查询来指向特定时间点。\n*   当会话事务正在主动引用查询中的表或视图时，出于读一致性目的，数据库不会缓存此查询的结果。\n\
  \n除了结果缓存的读一致性要求外，查询中如果存在以下对象或函数，则该查询不符合缓存条件：\n\n*   `CURRVAL` 和 `NEXTVAL` 伪列\n*\
  \   `CURRENT_DATE`、`CURRENT_TIMESTAMP`、`USERENV_CONTEXT`、`SYS_CONTEXT`（带有非常量变量）、`SYSDATE`\
  \ 和 `SYS_TIMESTAMP`\n*   临时表\n*   由 `SYS` 和 `SYSTEM` 拥有的表\n\n### 3-10. 缓存客户端结果集\n\
  \n#### 问题\n\n你使用了许多涉及重复查询的 OCI 应用程序。你想探索如何在客户端缓存结果集。\n\n## 解决方案\n\n您可以通过启用客户端结果缓存来实现\
  \ SQL 查询结果的客户端查询缓存。客户端结果缓存在许多方面与服务器端结果缓存类似，但它是独立于服务器端缓存的。您可以通过设置以下初始化参数来配置客户端结果缓存：\n\
  \n*   `CLIENT_RESULT_CACHE_SIZE`：要启用客户端结果缓存，请将此参数设置为 32 KB 或更高，最大可达 2 GB。默认情况下，此参数设置为零，表示客户端查询缓存被禁用。与服务器端结果缓存的情况不同，`CLIENT_RESULT_CACHE_SIZE`\
  \ 参数值设置的是每个进程的结果集缓存的最大大小，而非整个实例的大小。由于此参数不是动态参数，重置它需要重启实例。您需要根据可能被缓存的结果数量以及结果集的平均大小（这取决于结果集中行的大小和行数）来确定此参数的大小。\n\
  \n    ![images](img/square.jpg) **提示** Oracle 建议您不要在数据库创建期间设置 `CLIENT_RESULT_CACHE_SIZE`，以免出现潜在错误。\n\
  \n*   `CLIENT_RESULT_CACHE_LAG`：此参数允许您指定客户端结果缓存落后于影响结果集值的更改的最大时间量。默认情况下，此参数的值设置为\
  \ 3,000 毫秒，因此如果此时间间隔对您来说足够，您可以省略此参数。更改此参数也需要重启数据库，因为它是一个静态参数。\n\n![images](img/square.jpg)\
  \ **注意** 您可以在所有使用 OCI 构建的 OCI 应用程序和驱动程序中使用客户端查询缓存。\n\n此外，您必须将初始化参数 `COMPATIBLE`\
  \ 的值指定为 11.0.0 或更高，才能启用客户端结果缓存。如果您想在客户端缓存视图，则 `COMPATIBLE` 参数的值必须为 11.2.0.0 或更高。\n\
  \n除了必须在数据库服务器上设置的初始化参数外，Oracle 还允许您包含一个可选的客户端配置文件，以指定覆盖初始化文件中客户端查询缓存相关参数值的值。如果您指定了这些参数中的任何一个，则该参数的值将覆盖服务器初始化文件中相应参数的值。您可以在可选的客户端配置文件中指定以下一个或多个参数，该文件可以包含在客户端的\
  \ `sqlnet.ora` 文件中：\n\n> `OCI_RESULT_CACHE_MAX_SIZE`：每个独立进程的查询缓存最大大小（以字节为单位）\n>\n\
  > `OCI_RESULT_CACHE_MAX_RSET_SIZE`：任何进程中结果集的最大大小（以字节为单位）\n>\n> `OCI_RESULT_CACHE_MAX_RSET_ROWS`：任何进程中结果集的最大行数\n\
  \n您无法在客户端文件中设置任何与查询缓存延迟相关的参数。一旦设置了适当的初始化参数和可选的客户端配置文件，您必须使用 `/*+ result_cache +/`（和\
  \ `/*+ no_result_cache +/`）提示或表注释来启用或禁用查询的缓存。完成此操作后，数据库将尝试在客户端查询缓存中缓存所有符合条件的查询。\n\
  \n## 工作原理\n\n您可以部署客户端查询结果缓存来加速您的数据库在 OCI 应用程序中频繁执行的查询的响应速度。数据库会保持结果集数据与任何数据库更改（包括会话更改）的一致性。对于重复查询，您可能会看到巨大的性能提升，因为数据库从本地\
  \ OCI 客户端进程检索结果，而不必通过网络重新访问服务器并重新执行相同的查询来获取这些结果。当 OCI 应用程序发出 `OCIStmtExecute()`\
  \ 或 `OCIStmtFetch()` 调用时，如果查询结果已在客户端查询缓存中缓存，Oracle 会在客户端本地处理这些调用。\n\n使用客户端查询缓存的一大优势是它可以节省服务器内存使用，并帮助您扩展应用程序以服务更多进程。客户端查询缓存是基于每个进程而非每个会话组织的。多个客户端会话可以共享相同的缓存结果集，所有会话都可以通过多个线程和多个语句并发访问相同的结果集。如果\
  \ OCI 进程在数据库服务器上发现重大的数据库更改，缓存会自动使缓存的结果集失效。一旦结果集失效，查询将被再次执行，并将新的结果集存储在缓存中。\n\n![images](img/square.jpg)\
  \ **提示** Oracle 建议您仅对只读或主要是只读的查询使用客户端缓存。\n\n您可以选择设置 `RESULT_CACHE_MODE` 参数（参见配方\
  \ 3-7）来控制缓存行为，但默认情况下，此参数设置为 `MANUAL`，因此您可以保持不变。您真的不希望将其替代值设置为 `FORCE`，这会强制数据库缓存每个符合条件的\
  \ SQL 查询的结果——显然，缓存很快就会用尽空间！然后，您可以在 SQL 级别指定适当的查询提示，或在表级别指定表注释来控制客户端结果缓存。如果您已经通过服务器查询缓存设置了服务器端结果缓存怎么办？没关系。您仍然可以启用客户端结果缓存。只需记住，默认情况下，客户端缓存是禁用的，而服务器端结果缓存是启用的。\n\
  \n在实现客户端查询缓存时，重要的是要发出 `OCIStmtExecute()` 调用，以便语句句柄可以匹配缓存的结果。OCI 语句句柄的首次 `OCIStmtExecute()`\
  \ 调用总是会发送到服务器，无论是否存在缓存的结果集。随后的 `OCIStmtExecute()` 调用如果匹配，将使用缓存的结果。类似地，只有首次 `OCIStmtFetch()`\
  \ 调用会获取行，直到获得“未找到数据”错误——如果调用与缓存的结果集匹配，则随后的获取调用在获得此错误之前不需要获取数据。Oracle 建议您的 OCI 应用程序要么缓存\
  \ OCI 语句，要么为 OCI 语句句柄使用语句缓存，以便它们可以返回已执行的 OCI 语句。缓存集允许多个 OCI 语句句柄从单个或多个会话进行多次访问。\n\
  \n与服务器端缓存一样，您可以将 `RESULT_CACHE_MODE` 参数设置为 `FORCE` 以指定所有查询的缓存。Oracle 建议您将此参数设置为替代值\
  \ `MANUAL`，并在应用程序传递给 `OCIStmtPrepare()` 和 `OCIStmtPrepare2()` 调用的 SQL 代码中使用 SQL\
  \ 提示（`/*+ result_cache */`）。您也可以使用表注释，如配方 3-7 所述，在创建或更改表时指定缓存。随后所有包含该表的查询都将遵循该缓存规范。\n\
  \n您可以查询 `V$CLIENT_RESULT_CACHE_STATS` 视图以获取详细信息，例如缓存的结果集数量、失效的缓存结果集数量以及缓存未命中次数。例如，统计信息\
  \ `Create Count Success` 显示了数据库在缓存结果集的所有行之前未使其失效的次数。统计信息 `Create Count Failure`\
  \ 显示了未能获取结果集中所有行的缓存结果集的数量。\n\n### 3-11. 缓存 PL/SQL 函数结果\n\n#### 问题\n\n您已经在数据库中设置了服务器查询缓存，并希望实现对某些\
  \ PL/SQL 函数结果的缓存。\n\n#### 解决方案\n\nOracle 的服务器查询缓存（参见配方 3-7）可帮助您缓存常规 SQL 查询结果以及 PL/SQL\
  \ 函数结果。通过使用服务器结果缓存，您可以指示数据库将 PL/SQL 函数的结果缓存到 SGA 中。其他会话可以使用这些缓存结果，就像它们可以使用查询结果缓存中的缓存查询结果一样。一旦您通过设置适当的初始化参数配置好服务器查询缓存（请参阅配方\
  \ 3-7），就可以开始使用此功能了。\n\n您必须在函数内指定`RESULT_CACHE`子句，以使数据库将函数结果缓存在 PL/SQL 函数结果缓存中。在启用缓存后，当一个会话调用该函数时，它首先检查缓存中是否存有具有相同参数值的函数结果。如果有，它就直接获取缓存结果，而无需执行函数体。请注意，如果您先声明了一个函数，那么除了在函数体本身中指定该子句外，还必须在函数声明中也指定`RESULT_CACHE`子句。\n\
  \n`清单 3-1`展示了如何缓存 PL/SQL 函数的结果。\n\n**清单 3-1.** 创建带有`/*+result_cache*/`提示的 PL/SQL\
  \ 函数\n\n```\n`SQL> create or replace package store_pkg is`\n`      type store_sales_record\
  \ is record (`\n`      store_name stores.store_name%TYPE,`\n`      mgr_name   employees.last_name%type,`\n\
  `      store_size  PLS_INTEGER`\n`      );`\n`      function get_store_info (store_id\
  \ PLS_INTEGER)`\n`       RETURN store_info_record`\n`       RESULT_CACHE;`\n`  \
  \    END store_pkg;`\n`    /`\n`Create or replace package body store_pkg is`\n`\
  \    FUNCTION get_store_sales (store_id PLS_INTEGER)`\n`    RETURN store_sales_record`\n\
  `    RESULT_CACHE RELIES_ON (stores, employees)`\n`  IS`\n`    rec  store_sales_record;`\n\
  `  BEGIN`\n`    SELECT store_name INTO rec.store_name`\n`    FROM stores`\n`   \
  \ WHERE store_id = store_id;`\n`    SELECT e.last_name INTO rec.mgr_name`\n`   \
  \ FROM stores d, employees e`\n`    WHERE d.store_id = store_id`\n`    AND d.manager_id\
  \ = e.employee_id;`\n`     SELECT COUNT(*) INTO rec.store_size`\n`    FROM EMPLOYEES`\n\
  `    WHERE store_id = store_id;`\n`     RETURN rec;`\n`  END get_store_sales;`\n\
  `END store_pkg;`\n`/`\n```\n\n假设您使用以下值调用该函数：\n\n`SQL> execute store_pkg.get_store_sales(999)`\n\
  \n第一次执行会将 PL/SQL 函数的结果缓存到服务器结果缓存中。之后任何使用相同参数（999）执行此函数时，数据库都不必重新执行它——它只需从服务器结果缓存中获取结果即可。\n\
  \n请注意，除了在函数声明中指定`RESULT_CACHE`子句外，您还可以选择在函数体中指定`RESULT_CACHE RELIES ON`子句，正如我们在本例中所做的那样。在这种情况下，指定`RESULT_CACHE_RELIES_ON`子句意味着结果缓存依赖于表`STORES`和`EMPLOYEES`。这意味着每当这些表发生更改时，数据库都会使`get_store_info`函数的所有缓存结果失效。\n\
  \n#### 工作原理\n\nPL/SQL 函数结果缓存使用与查询结果缓存相同的服务器端结果缓存，您可以使用`RESULT_CACHE_MAX_SIZE`和`RESULT_CACHE_MAX_RESULT`初始化参数来设置缓存的大小，其中第一个参数固定了缓存可以使用的最大\
  \ SGA 内存量，后者则固定了单个结果可以占用的最大缓存百分比。与查询结果缓存不同，PL/SQL 函数缓存可能会快速收集大量缓存结果，因为缓存将根据参数值存储同一函数的多个值。如果缓存空间不足，则会移除较旧的缓存函数结果以为新结果腾出空间。\n\
  \nOracle 建议您使用 PL/SQL 函数结果缓存来缓存那些执行频繁但依赖于静态或基本静态数据的函数的结果。规定静态数据要求的原因很简单：Oracle 会自动使任何底层视图或表发生已提交更改的函数的缓存结果失效。发生这种情况时，调用该函数将导致重新执行。\n\
  \n每当您引入结果缓存函数所依赖的程序包的修改版本时（如`清单 3-1`所示），数据库应该自动从 PL/SQL 函数缓存中刷新该函数的缓存结果。在我们的示例中，当您热补丁（重新编译）程序包`store_pkg`时，Oracle\
  \ 技术上必须刷新与`get_store_info`函数关联的缓存结果。但是，有时数据库可能无法自动刷新这些结果。为了确保函数的缓存结果被移除，每当您重新编译包含缓存启用函数的\
  \ PL/SQL 单元（如程序包）时，请执行以下步骤：\n\n1.  将结果缓存置于旁路模式。\n    `SQL> execute DBMS_RESULT_CACHE.bypass(true);`\n\
  2.  使用`flush`过程清除缓存。\n    `SQL> execute DBMS_RESULT_CACHE.flush;`\n3.  重新编译包含缓存启用函数的程序包。\n\
  \    `SQL> alter package store_pkg compile;`\n4.  使用`bypass`过程重新启用结果缓存。\n    `SQL>\
  \ execute DBMS_RESULT_CACHE.bypass(false);`\n\n![images](img/square.jpg) **提示**\
  \ 如果您同时使用 SQL 查询缓存和 PL/SQL 函数结果缓存，请记住，这两个缓存实际上都是同一服务器查询缓存的一部分。在这种情况下，请确保您将`RESULT_CACHE_SIZE`参数设置得足够大，以容纳来自\
  \ SQL 查询和 PL/SQL 函数的缓存结果。\n\n如果您在 Oracle RAC 环境中运行，则必须在每个 RAC 实例上运行启用和禁用缓存的步骤。\n\
  \n当然，当您以这种方式临时旁路缓存时，在缓存被旁路期间，数据库将执行该函数，而不是尝试从缓存中检索其结果。如果某个会话正在对函数所依赖的表或视图执行 DML\
  \ 语句，数据库也会自动为该函数旁路结果缓存。数据库的这种自动旁路结果缓存机制可确保用户在其自己的会话中看不到另一个会话未提交的更改，从而确保读一致性。\n\n\
  您可以使用`V$RESULT_CACHE_STATISTICS`、`V$RESULT_CACHE_MEMORY`、`V$RESULT_CACHE_OBJECTS`和`V$RESULT_CACHE_DEPENDENCY`视图来监控服务器结果缓存的使用情况，该缓存既包括\
  \ SQL 结果缓存，也包括 PL/SQL 函数结果缓存。\n\n##### 重要注意事项\n\n虽然 PL/SQL 函数缓存能让你获得比重复执行函数快得多的结果，但基于\
  \ PL/SQL 集合（数组）的处理可能更快，因为 PL/SQL 运行时引擎是从 PGA 中的集合缓存获取结果，而非 SGA。然而，由于这需要为每个会话额外消耗\
  \ PGA 内存，当会话数量大幅增长时，使用集合方法会遇到问题。PL/SQL 函数很容易被所有并发会话共享，而要设置集合共享则只能通过额外的编码实现。\n\n\
  你必须警惕这样一种可能性：如果你的数据库经历频繁的 DML 变更，PL/SQL 函数缓存可能并不适合你——它主要适用于从不变更或极少变更的数据。即使你将`RESULT_CACHE_REMOTE_EXPIRATION`参数设置为较高的值，任何\
  \ DML 变更都会迫使数据库使已缓存的 PL/SQL 函数缓存结果集失效。\n\n当结果缓存输出过时时，Oracle 会使其失效。因此，当一条 DML 语句修改了你已启用函数缓存的\
  \ PL/SQL 函数所涉及表的行时，数据库就会使该函数的缓存结果失效。即使被修改的特定行并不属于该 PL/SQL 函数的结果集，这种情况也可能发生。再次提醒，这个限制可以通过在主要为只读的数据库中使用\
  \ PL/SQL 函数缓存来“绕过”。\n\n##### PL/SQL 函数缓存的限制\n\n为使函数结果能被缓存，该函数必须满足以下要求：\n\n*   该函数不使用`OUT`或`IN\
  \ OUT`参数。\n*   函数的`IN`参数是以下类型之一：`BLOB`、`CLOB`、`NCLOB`、`REF CURSOR`、`Collection Object`和`Record`。\n\
  *   该函数不是管道化表函数。\n*   该函数不是匿名块的一部分。\n*   该函数不属于任何使用调用者权利而非定义者权利的模块。\n*   该函数的返回类型不包括以下类型：`BLOB`、`CLOB`、`NCLOB`、`REF\
  \ CURSOR`、`Object`、`Record`，或包含前述不支持的返回类型的 PL/SQL 集合。\n\n### 3-12. 配置 Oracle 数据库智能闪存缓存\n\
  \n#### 问题\n\n你的 AWR（自动工作负载 Repository）报告表明你需要一个大得多的缓冲区缓存。你还注意到共享池的大小设置是合理的，因此无法通过减少共享池的内存分配来为缓冲区缓存设置更高的最小级别。此外，你能分配给\
  \ Oracle 的额外内存量也有限。\n\n#### 解决方案\n\n根据你的操作系统，当数据库表明需要为缓冲区缓存分配大得多的内存时，你可以使用新的 Oracle\
  \ 数据库智能闪存缓存特性。目前，闪存缓存特性仅限于 Solaris 和 Oracle Linux 操作系统。\n\n设置以下参数以开启闪存缓存功能：\n\n\
  *   `DB_FLASH_CACHE_FILE`：此参数设置闪存缓存的路径名和文件名。你指定的文件名将用于存放闪存缓存。你必须使用闪存设备作为闪存缓存文件，它可以位于操作系统文件系统、原始磁盘或\
  \ Oracle ASM 磁盘组中——例如：\n    `DB_FLASH_CACHE_FILE= \"/dev/sdc\"`\n    `DB_FLASH_CACHE_FILE\
  \ = \"/export/home/oracle/file_raw\"          /* 原始文件`\n    `DB_FLASH_CACHE_FILE\
  \ = \"+dg1/file_asm\"                        /* 使用 ASM 存储`\n*   `DB_FLASH_CACHE_SIZE`：此参数设置闪存缓存存储的大小。例如：`DB_FLASH_CACHE_SIZE\
  \ = 8GB`\n\n你可以通过使用`alter system`命令在启用和不启用闪存缓存的系统之间切换，如下所示：\n\n```\nSQL> alter system\
  \ set db_flash_cache_size = 0;       /* 禁用闪存缓存 */\nSQL> alter system set db_flash_cache_size\
  \ = 8G;      /* 重新启用闪存缓存 */\n```\n\n请注意，尽管你可以如上所示动态地成功启用和禁用闪存缓存，但 Oracle 并不支持这种方法。\n\
  \n![images](img/square.jpg) `注意` 如果你使用的是 Oracle RAC，为了利用闪存缓存特性，你必须在集群的所有节点上启用它。\n\
  \n#### 工作原理\n\nOracle 数据库智能闪存缓存是 Oracle Database 11.2 版本的一项功能，作为数据库服务器企业版的一部分包含在内。闪存缓存利用了基于闪存设备的\
  \ I/O 速度优势，其性能远优于基于磁盘的存储。例如，小型基于磁盘的读取提供 4 毫秒的响应时间，而基于闪存的设备执行相同的读取仅需 0.4 毫秒。\n\n\
  请注意，闪存缓存实际上是一个只读缓存——当因空间压力导致未修改的（干净的）数据块从缓冲区缓存中被淘汰时，这些块会被移至闪存缓存。如果之后需要它们，数据库会将这些已传输的数据块从闪存缓存移回系统全局区。假设您和\
  \ Oracle 数据库总能访问无限内存并不总是现实的。如果您最多只能为 Oracle 系统全局区分配 12 GB，但结果证明如果拥有 50 GB 内存，数据库运行速度会快得多呢？Oracle\
  \ 数据库智能闪存缓存正是为这类情况设计的。\n\nOracle 建议您将闪存缓存的大小设置为缓冲区缓存大小的一个倍数。这里没有硬性规定：请采用试错法，将其设置为缓冲区缓存大小的一到十倍之间，并校准结果。Oracle\
  \ 还建议，如果`db file sequential read`等待事件成为首要等待事件，并且您有足够的 CPU 容量，应考虑使用闪存缓存。\n\n一旦启用闪存缓存，Oracle\
  \ 会将数据块从缓冲区缓存移至闪存缓存（您创建的文件），并将有关这些块的元数据保存在数据库缓冲区缓存中。根据移入闪存缓存的块数量，您可能需要调高`MEMORY_TARGET`参数的值，以免累积的元数据影响留给其他组件的内存量。\n\
  \nOracle 为闪存缓存存储提供了两种设备——Sun Storage F5100 Flash Array 和 Sun Flash Accelerator F20\
  \ PCIe Card。由于您只能指定一个闪存设备，因此需要一个卷管理器。根据 Oracle 的测试，Oracle 自动存储管理器是这些设备的最佳卷管理器。\n\
  \n如果您在 Oracle 真正应用集群环境中使用闪存缓存，则必须为每个实例创建一个单独的闪存缓存文件路径，并且还需要为每个实例的闪存缓存创建一个单独的自动存储管理磁盘组。\n\
  \nOracle 对数据库智能闪存缓存功能的测试表明，它特别适合 I/O 受限的工作负载。如果并发的只读事务量非常大，磁盘系统在某个时间点后可能会饱和。Oracle\
  \ 数据库智能闪存缓存通过处理更多的每秒 I/O 操作来提高此类系统的吞吐量。Oracle 对此功能的测试结果还显示，当引入智能闪存缓存来处理因磁盘 I/O 吞吐量达到上限而面临显著性能下降的工作负载时，响应时间提高了五倍。截至本书撰写时，Oracle\
  \ 仅针对完全或主要是只读操作的工作负载做出这些声明。虽然 Oracle 仍在测试闪存缓存对写密集型工作负载的效果，但请注意，即使对于只读操作，使用闪存缓存减少磁盘系统的负载也意味着您将有更多的\
  \ I/O 带宽来处理写操作。\n\n### 3-13. 调优重做日志缓冲区\n\n#### 问题\n\n您想知道如何调优重做日志缓冲区，因为您查看了几份 AWR\
  \ 报告，其中指出生产数据库的重做日志缓冲区设置过小。\n\n#### 解决方案\n\n您通过设置初始化参数`LOG_BUFFER`的值来配置重做日志缓冲区的大小。此参数是静态的，因此对其任何更改都需要重启数据库。您在`init.ora`文件中按如下方式设置该参数：\n\
  \n```\nlog_buffer=4096000\n```\n\n您也可以使用以下`ALTER SYSTEM`语句来更改日志缓冲区的大小：\n\n```\n\
  SQL> alter system set log_buffer=4096000 scope=spfile;\n系统已更改\nSQL>\n```\n\n对于许多数据库而言，`LOG_BUFFER`参数的默认值太小。Oracle\
  \ 声明通常无需为此参数设置大于 1 MB 的值。但是，如果情况需要，您应该毫不犹豫地将其提高到更大的数值。\n\n\n"
- "# 工作原理\n\n当 Oracle 服务器处理缓冲区高速缓存中的数据块时，这些更改会首先以重做日志条目的形式写入重做日志，然后才被写入磁盘。重做日志条目使数据库能够通过各种操作（如\
  \ `INSERT`、`UPDATE` 和 `DELETE`）以及 DDL 操作来重做或重建数据库更改。因此，Oracle 重做日志对于任何数据库恢复都至关重要，因为正是这些重做日志条目使数据库能够应用从过去某个时间点开始对数据库所做的所有更改。然而，更改的数据不会直接进入重做日志；Oracle\
  \ 首先将更改写入一个名为重做日志缓冲区的内存区域。你可以使用 `LOG_BUFFER` 参数来配置这个内存缓冲区的大小。Oracle 日志写入器（LGWR）进程将重做日志缓冲区条目写入活动的重做日志文件（或文件组）。每当缓冲区填充三分之一时，或者当数据库写入器请求\
  \ LGWR 写入重做日志文件时，LGWR 会将缓冲区的内容刷新到磁盘。此外，在每次服务器进程执行 `COMMIT` 或 `ROLLBACK` 时，LGWR 进程都会将缓冲区的内容写入磁盘上的重做日志文件。\n\
  \n重做日志缓冲区是一个可重用的缓存，因此当条目被写出到重做日志文件时，用户进程会将新的条目复制到重做日志缓冲区中。虽然 LGWR 通常工作得足够快，使得缓冲区中有空间，但更大的缓冲区总是有更多的空间容纳新条目。由于增大\
  \ `LOG_BUFFER` 大小没有任何成本，因此可以将其设置为高于该参数建议的最大值 1MB。\n\n如果你的数据库正在处理大型更新，即使没有 `COMMIT`\
  \ 语句，LGWR 也必须频繁地将重做日志缓冲区刷新到重做日志文件中，以保持缓冲区填充不超过三分之一。在这种情况下，增加重做日志缓冲区的大小是一个可以接受的解决方案，并允许\
  \ LGWR 跟上大量进入重做日志缓冲区的条目。如果你认为 LGWR 进程的性能不够快，这也在某些方面抵消了缓慢的 I/O 系统的影响。有几种方法可以减轻重做日志缓冲区的压力：你可以对所有批处理作业批量执行\
  \ `COMMIT` 操作，并在可能的情况下（例如在常规数据加载期间）指定 `NOLOGGING` 选项。当你在数据加载期间指定 `NOLOGGING` 选项时，Oracle\
  \ 不需要使用重做日志文件，因此也会绕过重做日志缓冲区。\n\n调整 `LOG_BUFFER` 参数的大小相当容易。只需执行以下语句来获取当前的“重做日志空间请求比率”：\n\
  ```sql\nSQL> select round(t.value/s.value,5) \"Redo Log Space Request Ratio\"\n\
  \     from v$sysstat s, v$sysstat t\n     where s.name = 'redo log space requests'\n\
  \     and t.name = 'redo entries'\n```\n重做日志空间请求比率只是总重做日志空间请求与重做条目的比率。你也可以查询 `V$SYSSTAT`\
  \ 视图以查找统计信息 `redo buffer allocation retries` 的值。此统计信息显示进程等待重做日志缓冲区空间的次数：\n```sql\n\
  SQL> select name,value from V$SYSSTAT\n     where name= 'redo buffer allocation\
  \ retries';\n```\n在一段时间内多次执行此 SQL 查询。如果“重做缓冲区分配重试”统计信息的值在此时间段内稳定上升，则表明重做日志缓冲区正面临空间压力，因此进程正在等待将其重做日志条目写入重做日志缓冲区。如果你持续看到这种情况，就必须增加重做日志缓冲区的大小。\n\
  \n## 第四章：监控系统性能\n\n监控系统和数据库性能是一项复杂的任务，管理性能可能涉及许多方面，包括内存、磁盘、CPU、数据库对象和数据库用户会话——这仅仅是个开始。本章重点介绍如何使用\
  \ Oracle 的自动工作负载存储库（AWR）来收集中有关数据库中发生活动的数据，并帮助将这些原始数据转换为有用的信息，以评估特定时间段内数据库的性能。通常，当数据库中出现性能问题时，很容易知道性能问题何时发生，因为在此给定时间段内数据库活动“缓慢”。知道这个时间段是使用\
  \ AWR 信息执行分析的起点。\n\n当你创建 Oracle 数据库时，AWR 会自动创建，并自动收集数据库中活动的统计数据。其中一些数据是实时或接近实时的，有些数据则代表这些活动的历史统计信息。关于活动会话的最新数据存储在性能统计信息存储库的活动会话历史（ASH）组件中。更早的历史数据快照通常称为\
  \ AWR 快照。\n\nAWR 进程默认从 Oracle 的动态性能视图捕获每小时快照，并将其存储在 AWR 中。这使得 DBA 能够查看任何时间段内的数据库活动，无论是单个小时的时间段，还是\
  \ AWR 中存储的所有活动。例如，如果你有一段时间数据库性能较差，你可以生成一个 AWR 报告，该报告将仅提供该特定时间段内的数据库活动统计信息。\n\nASH\
  \ 组件旨在为 DBA 提供更实时的会话信息视图，这些信息不会捕获在 AWR 快照中。ASH 存储库中存储的会话信息是每秒从动态性能视图采样一次的数据。\n\n\
  Oracle 多年来通过其前身 UTLBSTAT/UTLESTAT 和 Statspack 在数据库中拥有类似的信息，但直到 Oracle10g 推出 AWR\
  \ 后，报告数据才会自动生成或保存。现在，这些信息可以更轻松地监控数据库性能，无论是分析数据库中当前活动的实时数据，还是分析历史数据（根据数据库中 AWR 的配置，这些数据可能已有数天、数周甚至数月之久）。\n\
  \n### 4-1. 实施自动工作负载存储库（AWR）\n\n#### 问题\n\n你希望为调优目的在数据库中存储历史数据库性能统计信息。\n\n#### 解决方案\n\
  \n通过在数据库中实施和使用自动工作负载存储库（AWR），Oracle 将基于间隔的历史统计信息存储在你的数据库中以供将来参考。此信息可用于查看给定时间段内数据库中发生的情况。默认情况下，应启用数据库中的\
  \ AWR。需要验证的关键初始化参数是 `STATISTICS_LEVEL` 参数：\n```sql\nSQL> show parameter statistics_level\n\
  \nNAME                                 TYPE        VALUE\n------------------------------------\
  \ ----------- ------------------------------\nstatistics_level                 \
  \    string      TYPICAL\n```\n此参数可设置为 `BASIC`、`TYPICAL`（默认值）和 `ALL`。只要参数设置为 `TYPICAL`\
  \ 或 `ALL`，就会为 AWR 收集统计信息。如果参数设置为 `BASIC`，你只需修改参数即可开始为数据库收集 AWR 统计信息：\n```sql\nalter\
  \ system set statistics_level=TYPICAL scope=both;\n```\n\n\n"
- "# 4. AWR（自动工作负载存储库）\n\n## 工作原理\n\nAWR 的前身是 Statspack，它需要手动设置和配置才能启用统计数据收集。如前所述，通常不需要设置，除非`STATISTICS_LEVEL`参数被更改为`BASIC`设置。默认情况下，AWR\
  \ 快照每小时在数据库上拍摄一次，默认存储八天。这些是可配置的设置，如果需要可以进行修改。有关修改 AWR 快照默认设置的信息，请参阅配方 4-2。\n\n除了简单地查看`STATISTICS_LEVEL`参数的值外，您还可以查看`V$STATISTICS_LEVEL`视图以获取此信息，该视图包含有关`STATISTICS_LEVEL`设置以及数据库中所有其他相关统计组件的信息：\n\
  \n```sql\nSELECT statistics_name, activation_level, system_status\nFROM v$statistics_level;\n\
  ```\n\n```\nSTATISTICS_NAME                                  ACTIVAT SYSTEM_S\n\
  ---------------------------------------- ------- --------\nBuffer Cache Advice \
  \                            TYPICAL ENABLED\nMTTR Advice                      \
  \               TYPICAL ENABLED\nTimed Statistics                              \
  \  TYPICAL ENABLED\nTimed OS Statistics                             ALL     DISABLED\n\
  Segment Level Statistics                        TYPICAL ENABLED\nPGA Advice    \
  \                                  TYPICAL ENABLED\nPlan Execution Statistics  \
  \                     ALL     DISABLED\nShared Pool Advice                     \
  \         TYPICAL ENABLED\nModification Monitoring                         TYPICAL\
  \ ENABLED\nLongops Statistics                              TYPICAL ENABLED\nBind\
  \ Data Capture                               TYPICAL ENABLED\nUltrafast Latch Statistics\
  \                      TYPICAL ENABLED\nThreshold-based Alerts                 \
  \         TYPICAL ENABLED\nGlobal Cache Statistics                         TYPICAL\
  \ ENABLED\nActive Session History                          TYPICAL ENABLED\nUndo\
  \ Advisor, Alerts and Fast Ramp up           TYPICAL ENABLED\nStreams Pool Advice\
  \                             TYPICAL ENABLED\nTime Model Events               \
  \                TYPICAL ENABLED\nPlan Execution Sampling                      \
  \   TYPICAL ENABLED\nAutomated Maintenance Tasks                     TYPICAL ENABLED\n\
  SQL Monitoring                                  TYPICAL ENABLED\nAdaptive Thresholds\
  \ Enabled                     TYPICAL ENABLED\nV$IOSTAT_* statistics           \
  \                TYPICAL ENABLED\nSession Wait Stack                           \
  \   TYPICAL ENABLED\n\n24 rows selected.\n```\n\nAWR 中存储的信息类型包括以下内容：\n\n*   关于对象访问和使用的统计信息\n\
  *   时间模型统计信息\n*   系统统计信息\n*   会话统计信息\n*   SQL 语句\n\n收集的信息然后按类别进行分组和格式化。报告中找到的一些类别包括以下内容：\n\
  \n*   实例效率\n*   前 5 个定时事件\n*   内存和 CPU 统计信息\n*   等待信息\n*   SQL 语句信息\n*   各种操作系统和数据库统计信息\n\
  *   数据库文件和表空间使用信息\n\n![images](img/square.jpg) 注意 要使用 AWR 功能，必须满足以下条件。首先，您必须拥有 Oracle\
  \ Diagnostics Pack 的许可，否则您需要使用 Statspack。其次，`CONTROL_MANAGEMENT_PACK_ACCESS`参数必须设置为`DIAGNOSTIC+TUNING`或`DIAGNOSTIC`。\n\
  \n## 4-2. 修改统计信息间隔和保留期\n\n### 问题\n\n您需要将 AWR 快照的间隔或保留期设置为默认值以外的值。\n\n### 解决方案\n\n\
  通过使用`DBMS_WORKLOAD_REPOSITORY` PL/SQL 包，您可以修改数据库的默认快照设置。为了首先验证 AWR 快照的当前保留和间隔设置，请运行以下查询：\n\
  \n```sql\nSQL> column awr_snapshot_retention_period format a40\nSQL> SELECT EXTRACT(day\
  \ from retention) || ':' ||\n       EXTRACT(hour from retention) || ':' ||\n   \
  \    EXTRACT (minute from retention)  awr_snapshot_retention_period,\n       EXTRACT\
  \ (day from snap_interval) *24*60+\n       EXTRACT (hour from snap_interval) *60+\n\
  \       EXTRACT (minute from snap_interval) awr_snapshot_interval\nFROM dba_hist_wr_control;\n\
  ```\n\n```\nAWR_SNAPSHOT_RETENTION_PERIOD      AWR_SNAPSHOT_INTERVAL\n------------------------------\
  \ ---------------------\n8:13:45                                            60\n\
  ```\n\n上面显示的保留期输出采用日：时：分格式。因此，我们当前的保留期是 8 天 13 小时 45 分钟。间隔，即收集 AWR 快照的频率，在前面的示例中是\
  \ 60 分钟。然后，要修改保留期和间隔设置，您可以使用`DBMS_WORKLOAD_REPOSITORY`包的`MODIFY_SNAPSHOT_SETTINGS`过程。要更改数据库的这些设置，请发出如下示例所示的命令，该示例将保留期修改为\
  \ 30 天（以分钟数指定），并将拍摄快照的快照间隔修改为 30 分钟。当然，您可以选择只设置一个参数或另一个参数，而不必同时更改两个设置。以下示例仅出于演示目的显示了两个参数：\n\
  \n```sql\nSQL> exec DBMS_WORKLOAD_REPOSITORY.MODIFY_SNAPSHOT_SETTINGS(retention=>43200,\
  \ interval=>30);\n```\n\n```\nPL/SQL procedure successfully completed.\n```\n\n\
  然后，您可以简单地重新运行来自`DBA_HIST_WR_CONTROL`数据字典视图的查询，以验证您的更改现已生效：\n\n```sql\nSQL> /\n```\n\
  \n```\nAWR_SNAPSHOT_RETENTION_PERIOD               AWR_SNAPSHOT_INTERVAL\n----------------------------------------\
  \ ---------------------\n30:0:0                                                \
  \          30\n```\n\n### 工作原理\n\n修改数据库的默认设置通常是一个好主意，因为八天的保留期在诊断可能的数据库问题或在数据库上执行数据库调优活动时通常不够。例如，如果您被告知月度流程存在问题，那么表示该流程上次成功执行的普通时间框架将不再可用，除非快照存储了给定的间隔。因此，如果可能的话，最好存储至少\
  \ 45 天的快照，或者如果数据库上的存储不是问题，则存储更长时间。如果您希望快照无限期存储，可以指定零值，这告诉 Oracle 无限期保留快照信息（实际上是\
  \ 40,150 天，或 110 年）。参见以下示例：\n\n```sql\nSQL> exec DBMS_WORKLOAD_REPOSITORY.MODIFY_SNAPSHOT_SETTINGS(retention=>0);\n\
  ```\n\n```\nPL/SQL procedure successfully completed.\n```\n\n```sql\nSQL> /\n```\n\
  \n```\nAWR_SNAPSHOT_RETENTION_PERIOD               AWR_SNAPSHOT_INTERVAL\n----------------------------------------\
  \ ---------------------\n40150:0:0                                             \
  \         30\n```\n\n默认的快照间隔为一小时，对于大多数数据库来说通常足够精细，因为当有更频繁或更接近实时的需求时，您可以使用活动会话历史（ASH）信息。通过将默认快照间隔增加到大于一小时，实际上可能使诊断性能问题变得更加困难，因为增加窗口的统计信息可能使得更难区分和识别特定时间段内的性能问题。\n\
  \n### 4-3. 手动生成 AWR 报告\n\n### 问题\n\n您想要生成一个 AWR 报告，并知道收集信息的时间范围。\n\n## 4-4. 通过企业管理器生成\
  \ AWR 报告\n\n### 问题\n\n您希望从企业管理器中生成一份 AWR 报告。\n\n### 解决方案\n\n在企业管理器中，根据版本的不同，生成 AWR\
  \ 报告的方式可能有所不同。通常也有不止一种生成方法。在图 4-1 中，这个特定的屏幕显示您需要输入开始和结束的快照范围，在您点击“Generate Report”按钮后，一份\
  \ AWR HTML 报告将立即在浏览器窗口中显示。生成的 AWR 报告样本屏幕如图 4-2 所示。\n\n![images](img/0401.jpg)\n\n\
  **图 4-1. 在企业管理器中生成 AWR 报告**\n\n![images](img/0402.jpg)\n\n**图 4-2. HTML AWR 报告**\n\
  \n### 工作原理\n\n如果您配置了数据库控制（Database Control），或者正在使用网格控制（Grid Control），就可以通过企业管理器生成\
  \ AWR 报告。要使用此功能，您必须拥有 Oracle 诊断包（Diagnostics Pack）的许可。\n\n### 4-5. 为单个 SQL 语句生成\
  \ AWR 报告\n\n### 问题\n\n您希望查看单个 SQL 语句的统计信息，并且不希望从 AWR 报告中生成所有其他相关统计信息。\n\n\n####\
  \ 解决方案\n\n您可以运行 `awrsqrpt.sql` 脚本，其操作与 `awrrpt.sql` 非常相似。系统将提示您输入所有相同的信息，但会多出一个提示，要求输入一个特定的\
  \ SQL ID 值。例如：\n\n```\nSpecify the SQL Id\n~~~~~~~~~~~~~~~~~~\nEnter value for sql_id:\
  \ 5z1b3z8rhutn6\nSQL ID specified:  5z1b3z8rhutn6\n```\n\n生成的报告将专注于特定于您的 SQL 语句的信息，包括\
  \ `CPU Time`、`Disk Reads` 和 `Buffer Gets`。它还提供了详细的执行计划供审查。请参见报告中的以下片段：\n\n```\n\
  Stat Name                                         Statement   Per Execution % Snap\n\
  ------------------------------------------------ ---------- -------------- -------\n\
