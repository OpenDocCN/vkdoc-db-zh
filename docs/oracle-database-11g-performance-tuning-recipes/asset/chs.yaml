  \                  2.51                  2.07       -0.44\n每次调用平均数据库时间（秒）:     \
  \             1.01                  0.03       -0.98\n```\n\n### 7-17. 分析 AWR 报告\n\
  \n### 问题\n\n你已经生成了一份覆盖数据库出现性能问题时段的 AWR 报告。你想要分析这份报告。\n\n### 解决方案\n\nAWR 报告在其各个部分下总结了与性能相关的统计信息。以下是对\
  \ AWR 报告中最重要的部分的简要总结。\n\n#### 会话信息\n\n你可以从 AWR 报告最顶部的部分了解会话数量，如下所示：\n\n```\n快照 ID\
  \       快照时间       会话数 游标/会话\n            --------- ------------------- --------\
  \ ---------\n开始快照:      1878 11-4 月-11 07:47:33        38       1.7\n  结束快照:   \
  \   1879 11-4 月-11 09:00:48        34       3.7\n   已用时间:               73.25（分钟）\n\
  \   数据库时间:               33.87（分钟）\n```\n\n务必检查“开始快照”和“结束快照”时间，以确认该时段涵盖了性能问题发生的时间。如果你注意到会话数量非常多，可以调查是否正在创建影子进程——例如，如果在你预期两个时间点的会话数应该相同的情况下，会话数在“开始快照”和“结束快照”时间之间增加了\
  \ 200，最可能的原因是应用程序启动问题，因为它正在生成所有这些会话。\n\n#### 负载概况\n\n“负载概况”部分显示了各项数据库负载指标（如硬解析和事务数）的每秒和每事务统计信息。\n\
  \n```\n负载概况              每秒    每事务\n~~~~~~~~~~~~          ---------------    ---------------\n\
  \      数据库时间(秒):                0.5                1.4\n       数据库 CPU(秒):     \
  \           0.1                0.3\n       重做量:            6,165.3           19,028.7\n\
  \   逻辑读:              876.6            2,705.6\n   块变更:               99.2     \
  \         306.0\n  物理读:               10.3               31.8\n  物理写:          \
  \     1.9                5.9\n      用户调用:                3.4               10.4\n\
  \          解析:               10.2               31.5\n      硬解析:               \
  \ 1.0                3.0\n          登录:                0.1                0.2\n\
  \    事务:                0.3\n```\n\n“负载概况”部分是 AWR 报告中最重要的部分之一。物理 I/O 速率和硬解析尤为重要。在高效运行的数据库中，你应该看到主要是软解析，硬解析非常少。高硬解析率通常是未使用绑定变量的结果。如果你看到每秒登录数很高，通常意味着你的应用程序未使用持久连接。登录数过多或异常高的事务数告诉你数据库中正在发生一些异常情况。然而，只有当你定期检查\
  \ AWR 报告并了解各种统计信息在数据库正常运行时、一天中不同时间的表现，你才知道这些数字是否异常！\n\n#### 实例效率百分比\n\n实例效率部分显示了几个命中率以及“执行到解析”和“闩锁命中”百分比。\n\
  \n```\n实例效率百分比（目标 100%）\n~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n       \
  \     缓冲区无等待 %:  100.00       重做无等待 %:  100.00\n            缓冲区命中 %:   99.10   \
  \ 内存中排序 %:  100.00\n            库缓存命中 %:   95.13        软解析 %:   90.35\n       \
  \   执行到解析比 %:   70.71         闩锁命中 %:   99.97\n  解析 CPU 与解析耗时比 %: 36.71     % 非解析\
  \ CPU:   83.60\n\n共享池统计信息        开始    结束\n                              ------\
  \  ------\n             内存使用率 %:   81.08   88.82\n    % 执行次数>1 的 SQL:   70.41  \
  \ 86.92\n  % 执行次数>1 的 SQL 内存占用:   69.60   91.98\n```\n\n在运行良好的实例中，`执行到解析比`应该非常高。`%\
  \ 执行次数>1 的 SQL`统计值低意味着数据库未重用共享 SQL 语句，通常是因为 SQL 未使用绑定变量。\n\n"
- "# 第 8 章\n\n## 前 5 个前台事件\n\n“前 5 个定时前台事件”部分显示了在 AWR 报告涵盖的时间段内，导致等待时间最长的事件。\n\n```\n\
  `Top 5 Timed Foreground Events`\n`~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`\n`            \
  \                                                            Avg Wait    % DB`\n\
  `Event                                              Waits    Time(s)    (ms)   \
  \   time   Wait Class`\n`---------------------------------------------- ------------\
  \ ----------- ------ ---------- ----------`\n`db file sequential read          \
  \                13,735         475     35      23.4      User I/O`\n`DB CPU   \
  \                                                     429                  21.1`\n\
  `latch: shared pool                                 801          96    120     \
  \  4.7  Concurrency`\n`db file scattered read                             998  \
  \        49     49       2.4      User I/O`\n`control file sequential read     \
  \                9,785          31      3       1.5      System I/O`\n```\n\n“前\
  \ 5 个定时前台事件”部分通常是你发现性能问题的地方，它向你展示了会话“等待”的原因。“前 5 个事件”的信息显示了所有会话的总等待时间，但通常一两个会话是造成大部分等待的原因。务必分别分析总等待次数和平均等待时间（毫秒），以确定等待是否显著。仅仅查看等待事件的总等待次数或总等待时间可能会误导你对重要性的判断。你也必须密切关注事件的平均等待时间。在一个运行良好的数据库中，你应该看到\
  \ `CPU` 和 `I/O` 是主要的等待事件，如本例所示。如果来自并发等待类别的事件（如 `latches`）出现在顶部，请进一步调查这些等待。例如，如果你看到诸如\
  \ `enq: TX - row lock contention`、`gc_buffer_busy`（RAC）或 `latch free` 等事件，通常表明数据库存在争用。如果你看到\
  \ `log file sync` 事件的平均等待时间超过 2 毫秒，请进一步调查该等待事件（第 5 章说明了如何分析各种等待事件）。如果你看到由于 `db file\
  \ sequential read` 或 `db file scattered read` 等待事件导致的大量等待，这表明存在大量的索引读取（这是正常的）或全表扫描正在进行。你可以在\
  \ AWR 报告中找到这些读取事件涉及的 SQL 语句和表。\n\n## 时间模型统计\n\n时间模型统计让你了解数据库如何分配其时间，包括执行 SQL 语句与解析语句所花费的时间。如果解析时间非常高，或者硬解析很显著，你必须进一步调查。\n\
  \n```\n`Time Model Statistics                 DB/Inst: ORCL1/orcl1  Snaps: 1878-1879`\n\
  \n`Statistic Name                                           Time (s)  % of DB Time`\n\
  `---------------------------------------------- ------------------ ------------`\n\
  `sql execute elapsed time                              1,791.5          88.2`\n\
  `parse time elapsed                                      700.1          34.5`\n\
  `hard parse elapsed time                                 653.7          32.2`\n\
  ```\n\n## 前 5 个 SQL 语句\n\nAWR 报告的这部分让你能够快速识别出开销最大的 SQL 语句。\n\n```\n`SQL ordered\
  \ by Elapsed Time            DB/Inst: ORCL1/orcl1  Snaps: 1878-1879`\n`-> Captured\
  \ SQL account for   13.7% of Total DB Time (s):           2,032`\n`-> Captured PL/SQL\
  \ account for   19.8% of Total DB Time (s):           2,032`\n\n`        Elapsed\
  \                  Elapsed Time`\n`        Time (s)    Executions  per Exec (s)\
  \  %Total    %CPU     %IO    SQL Id`\n`---------------- -------------- -------------\
  \ ------ ------ ------ -------------`\n`           292.4              1        292.41\
  \   14.4    8.1   61.2 b6usrg82hwsas`\n`…`\n```\n\n你可以使用报告中这部分的 SQL ID 为开销大的 SQL\
  \ 语句生成执行计划。\n\n## PGA 直方图\n\n`PGA 聚合目标直方图`显示了数据库执行排序和哈希操作的性能——例如：\n\n```\n `PGA\
  \ Aggr Target Histogram               DB/Inst: ORCL1/orcl1  Snaps: 1878-1879`\n\
  `-> Optimal Executions are purely in-memory operations`\n\n `  Low       High`\n\
  `Optimal  Optimal    Total Exe cs  Optimal Exe cs 1-Pass Exe cs M-Pass Exe cs`\n\
  `------- ------- -------------- -------------- ------------ ------------`\n `  \
  \   2K      4K         13,957         13,957            0            0`\n `    64K\
  \    128K             86             86            0            0`\n `   128K  \
  \  256K             30             30            0            0`\n```\n\n在此示例中，数据库正在\
  \ PGA 内以最优方式执行所有排序和哈希操作。如果你看到大量的单次通过执行，甚至有一些大型的多次通过执行，这表明 PGA 太小，你应该考虑增加其大小。\n\n\
  ### 工作原理\n\n分析 AWR 报告应该是你排除数据库性能问题（例如查询运行缓慢）的第一步。AWR 报告让你能够快速发现诸如连接数、每秒事务数、缓存命中率、等待事件信息以及使用最多\
  \ CPU 和 I/O 的 SQL 语句等信息。它向你展示了哪些 SQL 语句使用了最多的资源，以及哪些等待事件拖慢了数据库。或许最重要的是，报告告诉你数据库性能在某个特定时间段（白天或夜晚）是否与其通常性能有显著差异。“解决方案”部分总结的\
  \ AWR 报告章节只是 AWR 报告的一小部分。以下是排查性能问题时你必须查看的报告中的其他一些关键部分：\n\n*   前台等待事件\n*   按缓冲区 Gets\
  \ 排序的 SQL\n*   按读取次数排序的 SQL\n*   按物理读取排序的 SQL\n*   实例活动统计\n*   日志切换\n*   队列活动\n\
  *   按表空间、数据文件和 SQL 语句的读取\n*   按表扫描的段\n*   按行锁等待的段\n*   Undo 段摘要\n\n根据你正在调查的性能问题的性质，报告中的这些部分中的几个可能会被证明是有用的。除了性能和等待统计信息外，AWR\
  \ 报告还提供了针对 PGA 和 SGA 的建议。当你排除几乎任何数据库性能问题时，AWR 报告确实是你最好的朋友。通常只需几分钟，你就能找到问题的根本原因并想出潜在的解决方法。AWR\
  \ 为你完成了大部分工作——你只需要知道该查找什么！\n\n\n## 创建高效的 SQL\n\n结构化查询语言（SQL）与任何其他编程语言一样，可以编写得好，也可以编写得差，或者介于两者之间。关于如何编写高效的\
  \ SQL 语句，已有无数书籍进行了讨论。本章将聚焦于基本的 SQL 编码基础，并介绍一些提升 SQL 语句性能的技术。此外，本章还将重点阐述编写不良的 SQL\
  \ 所带来的影响，以及在应用程序的 SQL 语句中应避免的一些常见陷阱。\n\n第一次就写出优秀的 SQL 语句，是获得 SQL 查询良好性能的最佳方式。掌握基础知识是实现良好性能目标的关键。本章将重点介绍\
  \ SQL 语言的基础：\n*   `SELECT` 语句\n*   `WHERE` 子句\n*   表连接\n*   子查询\n*   集合运算符\n\n然后，我们将聚焦于提升查询性能的基本技术，同时也有助于确保您的查询不会妨碍数据库中其他查询的性能。重要的是要花时间在第一次就编写出高效的\
  \ SQL 语句——这说起来容易，但在平衡客户需求、预算和项目时间表时却难以做到。然而，如果您遵循基本的编码实践和基础知识，就能极大地提升 SQL 查询的性能。\n\
  \n![images](img/square.jpg) `注意` 在本章中，我们会多次区分 ISO 语法和传统的 Oracle 语法。具体来说，是在连接语法方面。然而，这种区分的表述稍欠准确。除了\
  \ Oracle 使用`(+)`表示外连接之外，Oracle 的所有连接语法都符合 ISO SQL 标准，因此它`全部`是 ISO 语法。不过，业界通常将较新实现的语法称为“ISO\
  \ 语法”，本章也遵循这一惯例。\n\n### 8-1. 从表中检索所有行\n\n### 问题\n\n您需要编写一个查询，从数据库中的给定表中检索所有行。\n\n\
  ### 解决方案\n\n在 SQL 语言中，您使用`SELECT`语句从数据库中检索数据。`SELECT`语句之后的所有内容都告诉 Oracle 您需要从数据库中获取什么数据。您需要确定的第一件事是从哪个（些）表中检索数据。一旦确定了这一点，您就拥有了运行查询以从数据库获取数据所需的一切。如果我们的\
  \ Oracle 数据库中有一个`EMPLOYEES`表，我们可以对该表执行`describe`操作以查看其结构。通过这样做，我们可以看到表的列名，并确定要从数据库中选择哪些列。\n\
  \n```\nSQL> describe employees\n Name                                      Null?\
  \    Type\n ----------------------------------------- -------- ----------------------------\n\
  \ EMPLOYEE_ID                               NOT NULL NUMBER(6)\n FIRST_NAME    \
  \                                     VARCHAR2(20)\n LAST_NAME                 \
  \                NOT NULL VARCHAR2(25)\n EMAIL                                 \
  \    NOT NULL VARCHAR2(25)\n PHONE_NUMBER                                      \
  \ VARCHAR2(20)\n HIRE_DATE                                NOT NULL DATE\n JOB_ID\
  \                                   NOT NULL VARCHAR2(10)\n SALARY             \
  \                               NUMBER(8,2)\n COMMISSION_PCT                   \
  \                 NUMBER(2,2)\n MANAGER_ID                                     \
  \    NUMBER(6)\n DEPARTMENT_ID                                      NUMBER(4)\n\
  ```\n\n如果我们想从`EMPLOYEES`表中检索所有员工的姓名列表，我们现在就拥有了构建一个针对数据库中`EMPLOYEES`表的简单查询所需的全部信息。我们知道我们是从`EMPLOYEES`表中选择数据，这是`FROM`子句所需的。我们也知道我们想选择员工的姓名，这是满足`SELECT`子句所需的。此时，我们可以向数据库发出以下查询：\n\
  \n```\nSELECT last_name, first_name\nFROM employees;\n```\n\n```\nLAST_NAME    \
  \             FIRST_NAME\n------------------------- --------------------\nAbel \
  \                     Ellen\nBaer                      Hermann\nCabrio         \
  \           Anthony\nDilly                     Jennifer\nErnst                 \
  \    Bruce\n```\n\n如果我们想从`EMPLOYEES`表中选择所有列，我们可以在`SELECT`子句中列出表中的每一列，或者我们也可以用星号代替列出每一列，这表示我们想要检索所有列：\n\
  \n```\nSELECT *\nFROM employees;\n```\n\n如果我们希望经理的输出格式是所有员工姓名的逗号分隔列表，我们可以修改查询来完成这个任务：\n\
  \n```\nSELECT last_name || ', ' || first_name AS \"Employee Name\"\nFROM employees;\n\
  ```\n\n```\nEmployee Name\n-----------------------------------------------\nAbel,\
  \ Ellen\nBaer, Hermann\nCabrio, Anthony\nDilly, Jennifer\nErnst, Bruce\n```\n\n\
  在上述案例中，我们在查询中放置了连接字符（由两个竖线组成），表示我们将多个列的内容组合成一个输出列。同时，我们使用`AS`子句创建了一个列别名，并将组合后的姓和名称为“Employee\
  \ Name”。\n\n### 工作原理\n\n`SELECT`是从 Oracle 数据库中检索数据所需的最基本语句。尽管`SELECT`语句有许多子句和特性，但从其最基本的形式来看，实际上只需要两个子句就能从\
  \ Oracle 数据库中首次检索数据——这些子句就是`SELECT`子句和`FROM`子句。通常，要准确检索所需的结果集需要更多条件。您可能只需要数据库表中的列的子集，并且可能只需要给定表中的行的子集。此外，您可能希望对从数据库中提取的数据执行操作。所有这些都需要比简单的`SELECT`语句更复杂的\
  \ SQL 语言组件。然而，`SELECT`和`FROM`子句是构建查询的基本构建块，从最简单的查询到最复杂的查询都是如此。\n\n![images](img/square.jpg)\
  \ `注意` 为了从任何数据库表中选择数据，您需要拥有该表，或者已被授予从指定表集选择数据的权限。\n\n### 8-2. 从表中检索行的子集\n\n### 问题\n\
  \n您希望过滤数据库`SELECT`查询的数据，以仅返回数据库表中行的子集。\n\n### 解决方案\n\n`WHERE`子句赋予用户过滤行并仅从数据库返回所需结果集的能力。构建`WHERE`子句有多种方式，本小节将回顾其中几种。在`WHERE`子句中首先发生的是将一个或多个列的值与另一个值进行比较。可在`WHERE`子句中使用的比较运算符列表请参见表\
  \ 8-1。其中一种更常见的比较运算符是等号，它表示一个等值条件：\n\n```\nSELECT *\nFROM EMP\nWHERE deptno = 20;\n\
  ```\n\n在上述查询中，我们从`EMP`表中选择所有列（由星号表示），并且我们只想要部门为 20 的行，这是由`WHERE`子句决定的。\n\n![images](img/t0801.jpg)\n\
  \n\n"
- "# WHERE 子句中的多个条件\n\n在许多 SQL 语句中，`WHERE`子句可能存在多个条件。编写多个条件需要使用逻辑运算符`OR`、`AND`和`IN`。如果\
  \ SQL 语句中有多个逻辑运算符，Oracle 将始终首先计算所有`AND`子句，然后再计算任何`OR`子句。如果同一语句中有多个相同的逻辑运算符，则按从左到右的顺序计算。在构建复杂的`WHERE`条件时，这可能会令人困惑。因此，在`WHERE`子句中编写多个条件时，应使用括号分隔每个子句，否则可能无法得到预期的结果。这是良好的\
  \ SQL 编码实践，并使 SQL 代码更易于阅读和维护。例如：\n\n```sql\nSELECT last_name, first_name, salary,\
  \ email\nFROM employees\nWHERE (department_id = 20\nOR department_id = 30)\nAND\
  \ commission_pct > 0;\n```\n\n如果我们在语句中需要多个`OR`逻辑运算符，可以用`IN`逻辑运算符替换它们，这可以简化我们的 SQL\
  \ 语句。通过重写前面的查询以使用`IN`逻辑运算符，我们的查询将如下所示：\n\n```sql\nSELECT last_name, first_name,\
  \ salary, email\nFROM employees\nWHERE department_id IN (20,30)\nAND commission_pct\
  \ > 0;\n```\n\n如果想查找除部门 20 或 30 以外的所有部门的相同信息，SQL 代码如下所示：\n\n```sql\nSELECT last_name,\
  \ first_name, salary, email\nFROM employees\nWHERE (department_id != 20\nAND department_id\
  \ <> 30)\nAND commission_pct > 0;\n```\n\n请注意，在上面的示例中，为了演示，我们使用了两种“不等于”比较运算符。通常，良好的编码实践是保持一致性，并在所有\
  \ SQL 代码中使用相同的运算符。这可以避免其他需要查看或修改你的 SQL 代码的人产生混淆。即使是这样细微的差异，也可能让别人思考为什么一段 SQL 代码用一种方式完成，而另一段\
  \ SQL 代码却用不同的方式完成。编写 SQL 代码时，追求效率很重要，但同样重要的是以可维护性为出发点来编写代码。如果 SQL 代码保持一致，它将更易于阅读和维护。\n\
  \n采用前面的 SQL 语句，我们将再次使用逻辑`OR`运算符，添加`NOT`操作数，并完成相同的任务：\n\n```sql\nSELECT last_name,\
  \ first_name, salary, email\nFROM employees\nWHERE department_id NOT IN(20,30)\n\
  AND commission_pct > 0;\n```\n\n最后两个查询都提供了正确的结果，但在这种情况下，使用`IN`子句简化了我们的 SQL 语句。\n\
  \n### 8-3. 连接具有对应行的表\n\n#### 问题\n\n在单个查询中，你希望从多个表中检索匹配的行。这些表至少有一个公共列，用于匹配表之间的数据。\n\
  \n#### 解决方案\n\nSQL 语言中的连接条件用于在单个查询中组合来自多个表的数据。当连接过程中涉及的所有表中都存在对应的行时，这称为“内连接”。这意味着基于表之间的公共连接列，只返回两个表之间匹配的数据。\n\
  \n假设你想获取公司所有部门所在的城市。在编写 SQL 语句之前，有两种不同的方法来处理这个问题。你可以使用传统的 Oracle 语法，也可以使用较新的 ISO\
  \ 语法。使用传统的 Oracle SQL，语法如下：\n\n```sql\nSELECT d.location_id, department_name, city\n\
  FROM departments d, locations l\nWHERE d.location_id = l.location_id;\n```\n\n使用\
  \ ISO 语法编写相同的语句，有几种可用的方法：\n\n*   `自然连接（NATURAL JOIN）`\n*   `JOIN … USING`子句\n* \
  \  `JOIN … ON`子句\n\n如果使用`NATURAL JOIN`子句，你是在让 Oracle 确定自然连接条件以及将基于哪些列进行连接，因此语句中没有连接子句或条件：\n\
  \n```sql\nSELECT location_id, department_name, city\nFROM departments NATURAL JOIN\
  \ locations;\n```\n\n如果要连接的表具有同名的连接列，你可以指定`JOIN ... USING`子句，并在括号中指定这个公共列：\n\n```sql\n\
  SELECT location_id, department_name, city\nFROM departments JOIN locations\nUSING\
  \ (location_id);\n```\n\n表之间的连接条件通常需要列名不同才能完成连接条件。在这些情况下，`JOIN ... ON`子句是合适的：\n\n\
  ```sql\nSELECT d.loc_id, department_name, city\nFROM departments d JOIN locations\
  \ l\nON l.location_id = d.loc_id;\n```\n\n#### 工作原理\n\n使用传统的 Oracle SQL 时，需要在`WHERE`子句中指定所有连接条件。因此，`WHERE`子句将包含所有连接条件以及任何过滤条件。\n\
  \n使用 ISO SQL 时，一个关键优势是连接条件在`FROM`子句中完成，而`WHERE`子句仅用于过滤条件。这使得 SQL 语句更易于阅读和解读。你不再需要在`WHERE`子句中区分哪些是连接条件，哪些是过滤条件。当你连接三个或更多表时，这一优势更加明显。过滤条件仅在`WHERE`子句中，一目了然：\n\
  \n```sql\nSELECT last_name, first_name, department_name, city,\nstate_province state,\
  \ postal_code zip, country_name\nFROM employees\nJOIN departments USING (department_id)\n\
  JOIN locations USING (location_id)\nJOIN countries USING (country_id)\nJOIN regions\
  \ USING (region_id)\nWHERE department_id = 20;\n```\n\n如果你倾向于使用传统的 Oracle SQL 编写\
  \ SQL 语句，为了代码的可读性和可维护性，一个好的做法是将所有连接条件放在`WHERE`子句的前面，将所有过滤条件放在`WHERE`子句的末尾。如果能使代码简单对齐，也会使代码更易于阅读和维护。这是一种可选的做法，但有助于任何可能需要查看你\
  \ SQL 代码的人：\n\n```sql\nSELECT last_name, first_name, department_name, city,\nstate_province\
  \ state, postal_code zip, country_name\nFROM employees e, departments d, locations\
  \ l, countries c, regions r\nWHERE e.department_id = d.department_id\n  AND d.location_id\
  \   = l.location_id\n  AND l.country_id    = c.country_id\n  AND c.region_id   \
  \  = r.region_id\n  AND d.department_id = 20;\n```\n\n此外，当使用`JOIN ... ON`或`JOIN\
  \ ... USING`子句时，指定可选的`INNER`关键字可能更清晰，因为可以立即知道正在执行的是内连接：\n\n```sql\nSELECT location_id,\
  \ department_name, city\nFROM departments INNER JOIN locations\nUSING (location_id);\n\
  ```\n\n### 8-4. 当可能缺少对应行时连接表\n\n#### 问题\n\n你需要来自两个或多个表的数据，但其中一个或多个表中缺少部分数据。例如，你想获取公司所有部门的列表及其基地位置。无论出于何种原因，你被告知公司中列出的位置并不都对应单个部门，这种情况下，没有列出部门位置。\n\
  \n\n#### 解决方案\n\n你需要展示所有地点，因此内连接在此情况下无法实现。此时，可以使用所谓的外连接。注意以下示例中的 `(+)` 语法：\n\n```sql\n\
  SELECT l.location_id, city, department_id, department_name\nFROM locations l, departments\
  \ d\nWHERE l.location_id = d.location_id(+)\nORDER BY 1;\n```\n\n```\nLOCATION_ID\
  \ CITY                 DEPARTMENT_ID DEPARTMENT_NAME\n----------- --------------------\
  \ ------------- -------------------------\n       1100 Venice\n       1400 Southlake\
  \                       60 IT\n       1500 South San Francisco             50 Shipping\n\
  \       1700 Seattle                        170 Manufacturing\n       1700 Seattle\
  \                        240 Sales\n       1700 Seattle                        270\
  \ Payroll\n       1700 Seattle                        120 Treasury\n       1700\
  \ Seattle                        110 Accounting\n       1700 Seattle           \
  \             100 Finance\n       1700 Seattle                         30 Purchasing\n\
  \       1800 Toronto                         20 Marketing\n       2000 Beijing\n\
  \       2400 London                          40 Human Resources\n       2700 Munich\
  \                          70 Public Relations\n       3200 Mexico City\n```\n\n\
  要在传统的 Oracle SQL 中指定外连接，只需在 `WHERE` 子句的连接条件中，在你已知有缺失数据的表的列旁边放置一个带括号的加号。从前述案例我们知道，有些地点没有被分配到任何一个部门。从结果中，我们可以看到那些没有分配部门的地点。\n\
  \n要使用 ISO SQL 语法执行相同的查询，你可以使用 `LEFT OUTER JOIN` 或 `RIGHT OUTER JOIN` 子句，它们可以简写为\
  \ `LEFT JOIN` 或 `RIGHT JOIN`——例如：\n\n```sql\nSELECT location_id, city, department_id,\
  \ department_name\nFROM locations LEFT JOIN departments d\nUSING (location_id)\n\
  ORDER BY 1;\n```\n\n现在假设你需要执行一个查询，其中连接的任一侧的任一张表都可能缺失一个或多个对应的行。一种方法是创建两个外连接查询的并集：\n\
  \n```sql\nSELECT last_name, first_name, department_name\nFROM employees e, departments\
  \ d\nWHERE e.manager_id = d.manager_id(+)\nUNION\nSELECT last_name, first_name,\
  \ department_name\nFROM employees e, departments d\nWHERE e.manager_id(+) = d.manager_id\n\
  ORDER BY department_name, last_name, first_name;\n```\n\n```\nLAST_NAME        \
  \         FIRST_NAME           DEPARTMENT_NAME\n------------------------- --------------------\
  \ -------------------------\nGietz                     William              Accounting\n\
  \                                                 Administration\n             \
  \                                    Benefits\nCambrault                 Gerald\
  \               Executive\nChen                      John                 Finance\n\
  \                                                 Government Sales\n           \
  \                                      Human Resources\nPataballa              \
  \   Valli                IT\n                                                 Manufacturing\n\
  Fay                       Pat                  Marketing\n                     \
  \                            Payroll\n                                         \
  \        Public Relations\nTobias                    Sigal                Purchasing\n\
  Tucker                    Peter                Sales\n                         \
  \                        Shareholder Services\nSarchand                  Nandita\
  \              Shipping\n                                                 Treasury\n\
  Lee                       Linda\nMorse                     Steve\n```\n\n从前面的结果中，我们可以看到所有管理部门的员工、所有不管理部门的员工，以及那些没有指定经理的部门。\n\
  \n要使用 ISO SQL 语法进行相同的查询，请使用 `FULL OUTER JOIN` 子句，它可以简写为 `FULL JOIN`：\n\n```sql\n\
  SELECT last_name, first_name, department_name\nFROM employees FULL JOIN departments\n\
  USING (manager_id);\n```\n\n#### 工作原理\n\n根据你的具体情况，实际上可以进行三种外连接。表 8-2 描述了所有可能的连接条件。使用传统语法或\
  \ ISO SQL 语法的 SQL 语句都是完全可以接受的。然而，ISO SQL 通常比传统的 Oracle SQL 更容易编写、阅读和维护。\n\nISO 语法的主要优点之一是，对于多表连接，所有的连接条件都在\
  \ `FROM` 子句中指定，因此是隔离的且易于查看。在 Oracle SQL 中，连接条件在 `WHERE` 子句中指定，与查询所需的任何其他过滤条件放在一起。如果你继承了结构不佳的\
  \ SQL 代码，那么阅读那些连接条件和过滤条件交织在单个 `WHERE` 子句中的更长、更复杂的 SQL 语句就会更加困难。\n\n另一种尚未提及的连接类型是交叉连接，即笛卡尔连接。虽然这种连接类型很少有用，但偶尔会带来便利。假设你是一名\
  \ DBA，正在为企业数据库收集数据库大小信息，并将结果放在一个电子表格中。你需要为每个查询获取数据库和主机信息。你可以执行以下查询：\n\n```sql\n\
  SELECT d.name, i.host_name, round(sum(f.bytes)/1048576) megabytes\nFROM v$database\
  \ d\nCROSS JOIN v$instance i\nCROSS JOIN v$datafile f\nGROUP BY d.name, i.host_name;\n\
  ```\n\n```\nNAME      HOST_NAME                       MEGABYTES\n--------- ------------------------------\
  \ ----------\nORCL      DREGS-PC                             2333\n```\n\n在这种情况下，`v$instance`\
  \ 和 `v$database` 视图只包含一行数据，因此进行笛卡尔连接没有问题。上述连接也可以用传统的 Oracle SQL 来编写：\n\n```sql\n\
  SELECT d.name, i.host_name, round(sum(f.bytes)/1048576) megabytes\nFROM v$database\
  \ d, v$instance i, v$datafile f\nGROUP BY d.name, i.host_name;\n```\n\n![images](img/t0802.jpg)\n\
  \n### 8-5. 构建简单子查询\n\n#### 问题\n\n你需要从数据库中检索数据，但无法使用单个查询获取所需的数据。\n\n#### 解决方案\n\n\
  关系数据库的数据需求往往很复杂，以至于无法在单个 SQL `SELECT` 语句中检索数据，这是很常见的。与其必须串行运行两个或多个查询，不如构建多个 SQL\
  \ `SELECT` 语句并将它们放在一个查询中。这些额外的 `SELECT` 语句被称为子查询、子选择或嵌套选择。\n\n假设你想获取公司里薪水最高的员工姓名，以便向你的老板要求加薪。由于你不知道最高薪水是多少，你必须先运行一个查询来确定：\n\
  \n```sql\nSELECT MAX(salary) FROM employees;\n```\n\n```\nMAX(SALARY)\n-----------\n\
  \      24000\n```\n\n然后，知道了最高薪水是多少，你可以运行第二个查询来获取拿该薪水的员工：\n\n```sql\nSELECT last_name,\
  \ first_name\nFROM employees\nWHERE salary = 24000;\n```\n\n```\nLAST_NAME     \
  \            FIRST_NAME\n------------------------- --------------------\nKing  \
  \                    Steven\n```\n\n将前述两个查询组合起来，并构建一个带子查询的单个 SQL 语句来完成相同的任务，是非常简单的：\n\
  \n```sql\nSELECT last_name, first_name\nFROM employees\nWHERE salary =\n(SELECT\
  \ MAX(salary) FROM employees);\n```\n\n```\nLAST_NAME                 FIRST_NAME\n\
  ------------------------- --------------------\nKing                      Steven\n\
  ```\n\n\n#### 工作原理\n\n在 SQL 语句中，子查询可以放置在 `SELECT`、`WHERE` 或 `HAVING` 子句中。你也可以将一个查询放在\
  \ `FROM` 子句中，这也被称为内联视图，这将在另一个教程中介绍。可以构造几种类型的子查询：\n\n*   单行或标量子查询\n*   多行子查询\n* \
  \  多列子查询\n*   相关子查询（将在另一个教程中介绍）\n\n子查询本身也被称为内部查询。除了相关子查询，内部查询首先被执行，然后其结果被传递给外部查询，之后外部查询再被执行。\n\
  \n##### 单行子查询\n\n单行子查询返回单行单列。“解决方案”部分展示的例子就是一个单行子查询。使用时需谨慎，并确保子查询只返回一个值；否则你可能会遇到如下错误：\n\
  \n```sql\nSELECT last_name, first_name\nFROM employees\nWHERE salary =\n(SELECT\
  \ salary FROM employees WHERE department_id = 30);\n```\n\n```\n(SELECT salary FROM\
  \ employees WHERE department_id = 30)\n *\nERROR at line 4:\nORA-01427: single-row\
  \ subquery returns more than one row\n```\n\n在上面的例子中，部门 30 有多名员工，因此子查询会返回所有匹配的行。\n\
  \n如果你想了解你的薪水与公司员工平均薪水的对比情况，你可以在 `SELECT` 子句中使用一个子查询来实现：\n\n```sql\nSELECT last_name,\
  \ first_name, salary, ROUND((SELECT AVG(salary) FROM employees)) avg_sal\nFROM employees\n\
  WHERE last_name = 'King';\n```\n\n```\nLAST_NAME                 FIRST_NAME    \
  \           SALARY    AVG_SAL\n------------------------- -------------------- ----------\
  \ ----------\nKing                      Steven                    24000       6462\n\
  ```\n\n假设你想知道哪些部门的总体平均薪资高于公司平均水平。通过将子查询放在 `HAVING` 子句中，你可以获得想要的结果：\n\n```sql\ncolumn\
  \ avg_sal format 99999.99\n\nSELECT department_id, ROUND(avg(salary),2) avg_sal\n\
  FROM employees\nGROUP BY department_id\nHAVING avg(salary) > (SELECT AVG(salary)\
  \ FROM employees)\nORDER BY 2;\n```\n\n```\nDEPARTMENT_ID   AVG_SAV\n-------------\
  \ ---------\n           40   6500.00\n          100   8600.00\n           80   8955.88\n\
  \           20   9500.00\n           70  10000.00\n          110  10150.00\n   \
  \        90  19333.33\n\n8 rows selected.\n```\n\n##### 多行子查询\n\n如果你知道期望的子查询将返回多行，你可以使用\
  \ `IN`、`ANY`、`ALL` 和 `SOME` 操作符。`IN` 操作符等同于在 `SELECT` 语句中使用多个 `OR` 条件。例如，在下面的 SQL\
  \ 语句中，我们获取部门编号为 20、30 和 40 的部门名称。\n\n```sql\nSELECT department_id, department_name\n\
  FROM departments\nWHERE department_id = 20\nOR department_id = 30\nOR department_id\
  \ = 40;\n```\n\n```\nDEPARTMENT_ID DEPARTMENT_NAME\n------------- ------------------------------\n\
  \           20 Marketing\n           30 Purchasing\n           40 Human Resources\n\
  ```\n\n使用 `IN` 操作符，我们可以简化 SQL 语句并达到相同的结果：\n\n```sql\nSELECT department_id, department_name\n\
  FROM departments\nWHERE department_id IN (20,30,40);\n```\n\n`ANY` 和 `SOME` 操作符功能相同。它们用于将从数据库中检索到的值与查询中列出的每个值进行比较。它们与比较操作符\
  \ =、!=、<>、<、<=、> 或 >= 一起使用。使用 `ANY` 或 `SOME` 时需谨慎，因为它会单独评估每个值，而不考虑整个值列表。例如，使用相同的查询来获取部门编号为\
  \ 20、30 或 40 的部门名称，如果我们修改此查询以使用 `ANY` 或 `SOME`，我们可以看到 Oracle 如何评估 `ANY` 子句中的每个值。由于我们使用了\
  \ `ANY` 子句，部门 10、20 和 30 都被包含在结果中，即使部门 20 和 30 在我们的 `ANY` 子句中。这是因为在返回结果集之前，每个值都是被单独评估的。\n\
  \n```sql\nSELECT department_id, department_name\nFROM departments\nWHERE department_id\
  \ < ANY (20,30,40);\n```\n\n```sql\nSELECT department_id, department_name\nFROM\
  \ departments\nWHERE department_id < SOME (20,30,40);\n```\n\n```\nDEPARTMENT_ID\
  \ DEPARTMENT_NAME\n------------- ------------------------------\n           10 Administration\n\
  \           20 Marketing\n           30 Purchasing\n```\n\n`ALL` 操作符实质上使用逻辑 `AND`\
  \ 操作符来比较查询中列出的值。使用 `ANY` 操作符时，每个值都是单独比较以查看是否存在匹配项，而 `ALL` 操作符需要比较列表中的每个值才能确定是否存在匹配项。以我们的部门表为例，请看以下查询。在此查询中，如果\
  \ `DEPARTMENT_ID` 的值小于或等于列表中*所有*值，我们将从表中检索部门名称：\n\n```sql\nSELECT department_id,\
  \ department_name\nFROM departments\nWHERE department_id <= ALL (20,30,40);\n```\n\
  \n```\nDEPARTMENT_ID DEPARTMENT_NAME\n------------- ------------------------------\n\
  \           10 Administration\n           20 Marketing\n```\n\n##### 多列子查询\n\n有时，你需要根据多个列来匹配数据。如果放置在\
  \ `WHERE` 子句中，列列表需要放在括号内。例如，如果你想获取各部门中薪资最高的员工列表，你可以编写一个如下所示的多列子查询：\n\n```sql\nSELECT\
  \ last_name, first_name, department_id, salary\nFROM employees\nWHERE (department_id,\
  \ salary) IN\n(SELECT department_id, max(salary)\nFROM employees\nGROUP BY department_id)\n\
  ORDER BY department_id;\n```\n\n```\nLAST_NAME                 FIRST_NAME      \
  \     DEPARTMENT_ID     SALARY\n------------------------- -------------------- -------------\
  \ ----------\nWhalen                    Jennifer                        10     \
  \  4400\nHartstein                 Michael                         20      13000\n\
  Raphaely                  Den                             30      11000\nMavris\
  \                    Susan                           40       6500\nFripp      \
  \               Adam                            50       8200\nHunold          \
  \          Alexander                       60       9000\nBaer                 \
  \     Hermann                         70      10000\nRussell                   John\
  \                            80      14000\nKing                      Steven   \
  \                       90      24000\nGreenberg                 Nancy         \
  \                 100      12000\nHiggins                   Shelley            \
  \            110      12000\n\n11 rows selected.\n```\n\n### 8-6. 构造相关子查询\n\n####\
  \ 问题\n\n你正在编写一个子查询，从数据库中的给定表集中检索数据，但为了获取正确的结果，你确实需要在内部查询中引用外部查询。\n\n#### 解决方案\n\n\
  相关子查询是 SQL 语言的一个强大组成部分。它之所以被称为“相关”的，是因为它允许你在内部查询中引用外部查询。例如，我们想查看每位当前员工在公司中曾经担任过的所有职位：\n\
  \n```sql\nSELECT employee_id, job_id\nFROM job_history h\nWHERE job_id in\n(SELECT\
  \ job_id FROM employees e\nWHERE e.job_id = h.job_id)\nORDER BY 1;\n```\n\n```\n\
  EMPLOYEE_ID JOB_ID\n----------- ----------\n        101 AC_ACCOUNT\n        101\
  \ AC_MGR\n        102 IT_PROG\n        114 ST_CLERK\n        122 ST_CLERK\n    \
  \    176 SA_REP\n        176 SA_MAN\n        200 AD_ASST\n        200 AC_ACCOUNT\n\
  \        201 MK_REP\n\n10 rows selected.\n```\n\n#### 工作原理\n\n由于你在内部查询中引用了外部查询，执行关联子查询的过程本质上与简单子查询相反。在关联子查询中，外部查询会首先执行，因为内部查询需要外部查询的数据才能处理查询并检索结果。\n\
  \n执行关联子查询的步骤如下。这些步骤会针对外部查询的每一行重复执行：\n\n1.  从外部查询中检索一行。\n2.  执行内部查询。\n3.  外部查询比较从内部查询返回的值。\n\
  4.  如果在步骤 3 中存在值匹配，则该行将返回给用户。\n\n另一种关联子查询是在子查询中使用 `EXISTS` 子句。当你使用 `EXISTS` 时，会进行测试以查看内部查询是否至少返回一行。这是使用\
  \ `EXISTS` 运算符时发生的重要测试。从以下示例可以看出，内部查询中 `SELECT` 子句的列列表是无关紧要的。在那里包含一些内容只是为了满足正确的\
  \ SQL 语法。如果我们想查看哪些员工也是经理，我们可以使用 `EXISTS` 运算符与回`employees`表的自连接来确定此信息：\n\n```sql\n\
  SELECT employee_id, last_name, first_name\nFROM employees e\nWHERE EXISTS\n(SELECT\
  \ 'ANY LITERAL WILL DO HERE'\nFROM employees m\nWHERE e.employee_id = manager_id);\n\
  ```\n\n```\nEMPLOYEE_ID LAST_NAME                   FIRST_NAME\n----------- -------------------------\
  \ --------------------\n        100 King                        Steven\n       \
  \ 101 Kochhar                     Neena\n        102 De Haan                   \
  \  Lex\n        103 Hunold                      Alexander\n        108 Greenberg\
  \                   Nancy\n        114 Raphaely                    Den\n       \
  \ 120 Weiss                       Matthew\n        121 Fripp                   \
  \    Adam\n        122 Kaufling                    Payam\n        123 Vollman  \
  \                   Shanta\n        124 Mourgos                     Kevin\n    \
  \    145 Russell                     John\n        146 Partners                \
  \    Karen\n        147 Errazuriz                   Alberto\n        148 Cambrault\
  \                   Gerald\n        149 Zlotkey                     Eleni\n    \
  \    201 Hartstein                   Michael\n        205 Higgins              \
  \       Shelley\n\n18 rows selected.\n```\n\n如果你想在查询中测试相反的条件，也可以使用 `NOT EXISTS`。例如，你的\
  \ CEO 想要确定公司内经理与员工的比例。使用前一个示例的查询，我们可以首先使用 `EXISTS` 运算符来确定公司内经理的数量：\n\n```sql\nSELECT\
  \ count(*)\nFROM employees e\nWHERE EXISTS\n(SELECT 'TESTING 1,2,3'\nFROM employees\
  \ m\nWHERE e.employee_id = manager_id);\n```\n\n```\n  COUNT(*)\n----------\n  \
  \      18\n```\n\n如果我们将 `EXISTS` 转换为 `NOT EXISTS`，我们可以确定公司内非经理的数量：\n\n```sql\nSELECT\
  \ count(*)\nFROM employees e\nWHERE NOT EXISTS\n(SELECT 'X'\nFROM employees m\n\
  WHERE e.employee_id = manager_id);\n```\n\n```\n COUNT(*)\n---------\n       89\n\
  ```\n\n### 8-7. 比较两张表以找出缺失的行\n\n#### 问题\n\n你需要比较两个表中某子集列的数据。你需要找出在一个表中存在但在另一个表中缺失的行。\n\
  \n#### 解决方案\n\n你可以使用 Oracle 的 `MINUS` 集合运算符来比较两组数据，并显示其中一个表中缺失的数据。使用任何 Oracle 集合运算符时，`SELECT`\
  \ 子句在列的数量以及每列的数据类型方面必须完全相同。\n\n举个例子，假设你为一家有线电视公司工作，你想找出哪些频道是免费提供的。为了测试，你可以先简单地获取你的公司提供的频道列表：\n\
  \n```sql\nSELECT channel_id FROM channels;\n```\n\n```\nCHANNEL_ID\n----------\n\
  \         2\n         3\n         4\n         5\n         9\n```\n\n然后，你可以通过查询 `COSTS`\
  \ 表来运行一个查询，找出哪些频道有关联成本：\n\n```sql\nSELECT DISTINCT channel_id FROM costs\nORDER\
  \ BY channel_id;\n```\n\n```\nCHANNEL_ID\n----------\n         2\n         3\n \
  \        4\n```\n\n通过快速目视检查结果，免费频道是 5 和 9。通过使用集合运算符，在这个例子中是 `MINUS`，你可以从单个查询中得到这个结果：\n\
  \n```sql\nSELECT channel_id\nFROM channels\nMINUS\nSELECT channel_id\nFROM costs;\n\
  ```\n\n```\nCHANNEL_ID\n----------\n         5\n         9\n```\n\n#### 工作原理\n\n\
  在查询中使用集合运算符以获取有关缺失数据的更多信息也很常见。例如，你已经获得了免费频道列表，但你确实需要获取有关这些免费频道的更多信息，并希望在一个查询中完成所有操作：\n\
  \n```sql\nSELECT channel_id, channel_desc FROM channels\nWHERE channel_id IN\n(SELECT\
  \ channel_id\nFROM channels\nMINUS\nSELECT channel_id\nFROM costs);\n```\n\n```\n\
  CHANNEL_ID CHANNEL_DESC\n---------- --------------------\n         5 Catalog\n \
  \        9 Tele Sales\n```\n\n### 8-8. 比较两张表以找出匹配的行\n\n#### 问题\n\n你需要比较两个表中某子集列的数据。你需要查看这些表中所有匹配的行。\n\
  \n#### 解决方案\n\n你可以使用 Oracle 的 `INTERSECT` 集合运算符来比较两组数据，并显示两个表之间的匹配数据。再次强调，使用任何 Oracle\
  \ 集合运算符时，`SELECT` 子句在列的数量以及每列的数据类型方面必须完全相同。\n\n使用免费频道的例子，我们现在想看看哪些频道不是免费的，并且有关联的成本。通过使用\
  \ `INTERSECT` 集合运算符，我们将只看到两个表之间匹配的行：\n\n```sql\nSELECT channel_id\nFROM channels\n\
  INTERSECT\nSELECT channel_id\nFROM costs;\n```\n\n```\nCHANNEL_ID\n----------\n\
  \         2\n         3\n         4\n```\n\n#### 工作原理\n\n使用 `INTERSECT` 时，可以将其视为基于\
  \ `SELECT` 语句中的列列表，两个表之间重叠的数据。\n\n### 8-9. 合并类似 SELECT 语句的结果\n\n#### 问题\n\n你需要合并两个类似\
  \ `SELECT` 语句之间的结果，并希望在一个查询中完成。\n\n#### 解决方案\n\n你可以使用 Oracle 集合运算符 `UNION` 或 `UNION\
  \ ALL` 来合并两个类似查询的结果。使用 `UNION` 和 `UNION ALL` 的区别在于，`UNION` 会自动消除任何重复行，结果集的每一行都是唯一的。而使用\
  \ `UNION ALL` 时，它会显示所有匹配的行，包括重复行。使用 `UNION ALL` 可能比 `UNION` 性能更好，因为避免了用于消除重复项的排序操作。如果你的应用程序可以在处理过程中消除重复项，那么使用\
  \ `UNION ALL` 所获得的性能提升可能是值得的。\n\n在 Oracle 的示例模式中，我们有 `SCOTT.EMP` 表和 `HR.EMPLOYEES`\
  \ 表。如果我们想查看两个表中的所有员工，可以使用 `UNION` 集合运算符来获取结果：\n\n```sql\nSELECT empno, hiredate\
  \ FROM scott.emp\nUNION\nSELECT employee_id, hire_date FROM hr.employees;\n```\n\
  \n```\n     EMPNO HIREDATE\n---------- ---------\n       100 17-JUN-87\n       101\
  \ 21-SEP-89\n       102 13-JAN-93\n       ...\n      7902 03-DEC-81\n      7934\
  \ 23-JAN-82\n      7997 15-AUG-11\n\n122 rows selected.\n```\n\n## 工作原理\n\n你正在运行两个查询，它们的列列表几乎相同，但假设其中一个表多出了一列。在此例中，我们在\
  \ `SCOTT.EMP` 表中有一个额外的 `COMM` 列，它表示员工已获得的佣金金额。而 `HR.EMPLOYEES` 表中没有对应的列。通过在缺失的列中使用\
  \ `NULL`，只要考虑到操作两侧的任何缺失列，你仍然可以使用 `UNION` 这样的集合操作符：\n\n```sql\nSELECT empno, mgr,\
  \ hiredate, sal, deptno, comm\nFROM scott.emp\nUNION\nSELECT employee_id, manager_id,\
  \ hire_date, salary, department_id, NULL\nFROM hr.employees;\n```\n\n```\n     EMPNO\
  \        MGR HIREDATE          SAL      DEPTNO        COMM\n---------- ---------\
  \ ---------- ---------- ---------- ----------\n       100            17-JUN-87 \
  \      24000         90\n       101        100 21-SEP-89       17000         90\n\
  \       102        100 13-JAN-93       17000         90\n       ...\n      7369\
  \       7902 17-DEC-80         800         20\n      7499       7698 20-FEB-81 \
  \       1600         30        300\n      7521       7698 22-FEB-81        1250\
  \         30        500\n      7566       7839 02-APR-81        2975         20\n\
  \      7654       7698 28-SEP-81        1250         30       1400\n```\n\n检查 `HR.EMPLOYEES`\
  \ 表后，发现有一个名为 `COMMISSION_PCT` 的列。我们可以根据此列计算出实际的佣金，并将其添加到之前的查询中。此外，我们的经理告诉我们，他希望看到佣金列对所有员工都有一个值，即使他们没有获得佣金：\n\
  \n```sql\nSELECT empno, mgr, hiredate, sal, deptno, nvl(comm,0)\nFROM scott.emp\n\
  UNION\nSELECT employee_id, manager_id, hire_date, salary, department_id,\nnvl(salary*commission_pct/100,0)\n\
  FROM hr.employees;\n```\n\n```\n     EMPNO        MGR HIREDATE          SAL    \
  \  DEPTNO NVL(COMM,0)\n---------- --------- ---------- ---------- ---------- -----------\n\
  \       100            17-JUN-87       24000         90            0\n       101\
  \        100 21-SEP-89       17000         90            0\n       102        100\
  \ 13-JAN-93       17000         90            0\n       ...\n       147        100\
  \ 10-MAR-97       12000         80           36\n       148        100 15-OCT-99\
  \       11000         80           33\n       149        100 29-JAN-00       10500\
  \         80           21\n       ...\n      7499       7698 20-FEB-81        1600\
  \         30          300\n      7521       7698 22-FEB-81        1250         30\
  \          500\n      7566       7839 02-APR-81        2975         20         \
  \   0\n```\n\n这里需要再次强调的一点是，每列的数据类型也必须相同。例如，我们要在 `SCOTT.DEPT` 表和 `HR.DEPARTMENTS`\
  \ 表之间进行联合，并希望看到部门编号及其位置的组合列表。然而，根据数据类型列表，我们不能为此使用 Oracle 的集合操作符（如 `UNION`），因为每个表的位置列是不同的：\n\
  \n```sql\nSQL> desc scott.dept\n Name                                      Null?\
  \    Type\n ----------------------------------------- -------- ------------------------\n\
  \ DEPTNO                                    NOT NULL NUMBER(2)\n DNAME         \
  \                                     VARCHAR2(14)\n LOC                       \
  \                         VARCHAR2(13)\n\nSQL> desc hr.departments\n Name      \
  \                                Null?    Type\n -----------------------------------------\
  \ -------- ------------------------\n DEPARTMENT_ID                            \
  \ NOT NULL NUMBER(4)\n DEPARTMENT_NAME                           NOT NULL VARCHAR2(30)\n\
  \ MANAGER_ID                                         NUMBER(6)\n LOCATION_ID   \
  \                                     NUMBER(4)\n```\n\n```sql\nSQL> l\n  1  SELECT\
  \ deptno, loc FROM scott.dept\n  2  UNION\n  3* select department_id, location_id\
  \ from hr.departments\nSQL> /\nSELECT deptno, loc FROM scott.dept\n            \
  \   *\nERROR at line 1:\nORA-01790: expression must have same datatype as corresponding\
  \ expression\n```\n\n### 8-10. 搜索值范围\n\n### 问题\n\n你需要根据给定列的值范围从数据库中检索数据。\n\n###\
  \ 解决方案\n\n`BETWEEN` 子句通常用于从数据库中检索值的范围。它最常用于日期、时间戳和数字，但也可用于字母数字数据。当在 `WHERE` 子句中不知道某个列的确切值集合时，这是从数据库中检索数据的有效方法。例如，如果我们想查看在\
  \ 2000 年至 2010 年期间雇用的所有员工，查询可以这样编写：\n\n```sql\nSELECT last_name, first_name, hire_date\n\
  FROM employees\nWHERE hire_date BETWEEN '2000-01-01' and '2010-12-31'\nORDER BY\
  \ hire_date;\n```\n\n使用 `BETWEEN` 子句是查找列值范围的有效方法，并且适用于多种数据类型。如果你想获取 `SALARY` 列（`NUMBER`\
  \ 数据类型）的值范围，可以给出一个范围：\n\n```sql\nSELECT last_name, first_name, salary\nFROM employees\n\
  WHERE salary BETWEEN 20000 and 30000\nORDER BY salary;\n```\n\n如果你想在上述查询的基础上，只获取姓氏在字母表前半部分的员工，你可以提供一个范围来满足这个要求。为了确保包含所有可能的值，我们将范围填充到了\
  \ `last_name` 列的最大长度 25 个字符：\n\n```sql\nSELECT last_name, first_name, salary\nFROM\
  \ employees\nWHERE salary BETWEEN 20000 and 30000\nAND last_name BETWEEN 'Aaaaaaaaaaaaaaaaaaaaaaaaa'\n\
  AND 'Mzzzzzzzzzzzzzzzzzzzzzzzz'\nORDER BY salary;\n```\n\n\n### 工作原理\n\n使用`BETWEEN`子句时一个常见的陷阱是处理日期类型的列，无论是`DATE`数据类型、`TIMESTAMP`数据类型还是其他任何基于日期的数据类型。如果构造不当，结果集中可能会遗漏所需的行。\n\
  \n这种情况经常发生的原因是，日期查询通常使用年、月、日的组合来完成。重要的是要记住，尽管 Oracle 数据库中基于日期的字段格式通常默认为年、月、日的格式，但时间元素必须始终被考虑在内，否则查询可能会遗漏行。在第一个示例中，我们有一位员工\
  \ Sarah Bell，她于 1996 年 2 月 4 日入职：\n\n```\nSELECT hire_date FROM employees\nWHERE\
  \ email = 'SBELL';\n```\n\n```\nHIRE_DATE\n----------\n1996-02-04\n```\n\n如果我们查询数据库，并且没有考虑任何日期列的时间元素，就可能会遗漏结果集中的关键行。因此，了解列的时间部分是否包含在数据构成中非常重要。在本例中，`hire_date`列确实存在时间元素：\n\
  \n```\nSELECT last_name, first_name, hire_date\nFROM employees\nWHERE hire_date\
  \ = '1996-02-04';\n```\n\n```\nno rows selected\n```\n\n有时，当行被插入数据库时，日期或时间戳的时间部分可能会被截断。然而，在编写高效的\
  \ SQL 时，必须始终假设所有基于日期的列都存在时间元素。基于这个假设，我们可以修改前面的查询以考虑`hire_date`列中的时间元素：\n\n```\n\
  SELECT last_name, first_name, to_char(hire_date,'yyyy-mm-dd:hh24:mi:ss') hire_date\n\
  FROM employees\nWHERE hire_date\nBETWEEN TO_DATE('1996-02-04:00:00:00','yyyy-mm-dd:hh24:mi:ss')\n\
  AND TO_DATE('1996-02-04:23:59:59','yyyy-mm-dd:hh24:mi:ss');\n```\n\n```\nLAST_NAME\
  \                  FIRST_NAME           HIRE_DATE\n------------------------- --------------------\
  \ -------------------\nBell                      Sarah                1996-02-04:12:30:46\n\
  ```\n\n这是一个类似的案例，我们在查询中执行`SELECT`以检索给定月份的所有数据。在本例中，我们检索 1997 年 9 月入职的所有员工。如果我们从`BETWEEN`子句中省略时间元素，实际上可能会遗漏符合查询条件的数据：\n\
  \n```\nSELECT last_name, first_name, hire_date\nFROM employees\nWHERE hire_date\n\
  BETWEEN '1997-09-01' and '1997-09-30';\n```\n\n```\nLAST_NAME                  FIRST_NAME\
  \           HIRE_DATE\n------------------------- -------------------- ----------\n\
  Chen                      John                 1997-09-28\n```\n\n```\nSELECT last_name,\
  \ first_name, hire_date\nFROM employees\nWHERE hire_date\nBETWEEN TO_DATE('1997-09-01:00:00:00','yyyy-mm-dd:hh24:mi:ss')\n\
  AND TO_DATE('1997-09-30:23:59:59','yyyy-mm-dd:hh24:mi:ss');\n```\n\n```\nLAST_NAME\
  \                  FIRST_NAME           HIRE_DATE\n------------------------- --------------------\
  \ ----------\nChen                      John                 1997-09-28\nSciarra\
  \                   Ismael               1997-09-30\n```\n\n如果你在查询中使用`BETWEEN`子句，并且`WHERE`子句中指定的列上存在索引，那么\
  \ Oracle 优化器可以使用该索引来检索数据。你需要执行执行计划来验证是否属于这种情况，但使用`BETWEEN`意味着如果存在索引，通常可以使用它，并且可以成为使用值范围从数据库中选择数据的有效方式：\n\
  \n```\nSELECT last_name, first_name, salary\nFROM employees\nWHERE last_name between\
  \ 'Ba' and 'Bz'\nORDER BY salary;\n```\n\n```\n----------------------------------------------------\n\
  | Id  | Operation                    | Name        |\n----------------------------------------------------\n\
  |   0 | SELECT STATEMENT             |             |\n|   1 |  SORT ORDER BY   \
  \            |             |\n|   2 |   TABLE ACCESS BY INDEX ROWID| EMPLOYEES \
  \  |\n|   3 |    INDEX RANGE SCAN          | EMP_NAME_IX |\n----------------------------------------------------\n\
  ```\n\n### 8-11. 处理空值\n\n#### 问题\n\n你的一些数据库数据中存在空值，需要了解在数据中处理空值的后果。你还需要编写查询来正确处理此类空值。\n\
  \n#### 解决方案\n\n空值必须以特定方式处理，具体取决于你是在`SELECT`子句中搜索数据中的空值，还是在`WHERE`子句中尝试确定在发现空值时该怎么做。\n\
  \n\n"
- '# 在 SELECT 子句中处理空值


  在`SELECT`子句中，如果你正在处理包含空值的列数据，有两种 Oracle 提供的函数可以在 SQL 中使用，以将空值转换为更可用的形式。这两个函数是`NVL`和`NVL2`。


  ![图片](img/square.jpg) 实际上，不仅仅只有`NVL`和`NVL2`这两个函数。然而，它们被广泛使用，是一个很好的起点。


  使用`NVL`时，你只需传入列名，以及一个基于该值在数据库中是否为空而你想输出的值。例如，在我们的 employees 表中，并非所有员工都根据其职位获得佣金，该列中这些员工的值为空：


  ```

  SELECT ename, sal, comm

  FROM emp

  ORDER BY ename;

  ```


  ```

  ENAME              SAL       COMM

  ---------- ---------- ----------

  ADAMS            1100

  ALLEN            1600        300

  BLAKE            2850

  KING             5000

  MARTIN           1250       1400

  ```


  如果我们只是想在佣金列中为没有资格获得佣金的员工显示零，我们可以使用`NVL`函数来实现：


  ```

  SELECT ename , sal , NVL(comm,0) comm

  FROM emp

  ORDER BY ename;

  ```


  ```

  ENAME              SAL       COMM

  ---------- ---------- ----------

  ADAMS            1100          0

  ALLEN            1600        300

  BLAKE            2850          0

  KING             5000          0

  MARTIN           1250       1400

  ```


  如果我们决定对空值执行算术运算，结果将始终为空；因此，如果我们想计算“总薪酬”为工资加佣金，我们必须应用`NVL`函数，以正确计算并考虑空值。在以下示例中，我们分别使用和不使用`NVL`函数计算这些列的总和。不使用`NVL`，我们会得到一个不正确的结果，这可以在`TOTAL_COMP_NO_NVL`输出字段中看到：


  ```

  SELECT ename , sal , nvl(comm,0) comm, sal+comm total_comp_no_nvl,

  sal+NVL(comm,0) total_comp_nvl

  FROM emp

  ORDER BY ename;

  ```


  ```

  ENAME              SAL       COMM TOTAL_COMP_NO_NVL TOTAL_COMP_NVL

  ---------- ---------- ---------- ----------------- --------------

  ADAMS            1100          0                                 1100

  ALLEN            1600        300               1900            1900

  BLAKE            2850          0                                 2850

  KING             5000          0                                 5000

  MARTIN           1250       1400               2650            2650

  ```


  `NVL2`与`NVL`类似，区别在于`NVL2`接受三个参数——值或列，如果列不为空则返回的值，以及如果列为空则返回的值。例如，如果我们使用前面相同的例子来确定员工是否获得佣金，我们只想为每位员工分配一个值，说明他或她是“有佣金”还是“无佣金”员工。我们可以使用`NVL2`函数实现这一点：


  ```

  SELECT ename , sal ,

  NVL2(comm,''Commissioned'',''Non-Commissioned'') comm_status

  FROM emp

  ORDER BY ename;

  ```


  ```

  ENAME              SAL COMM_STATUS

  ---------- ---------- ----------------

  ADAMS            1100 Non-Commissioned

  ALLEN            1600 Commissioned

  BLAKE            2850 Non-Commissioned

  KING             5000 Non-Commissioned

  MARTIN           1250 Commissioned

  ```


  '
- "# 在 WHERE 子句中处理空值\n\n在`WHERE`子句中，如果你只是想检查一个列是否包含空值，请使用`IS NULL`或`IS NOT NULL`作为比较操作符——例如：\n\
  \n```\nSELECT ename , sal\nFROM emp\nWHERE comm IS NULL\nORDER BY ename;\n```\n\n\
  ```\nENAME              SAL\n---------- ----------\nADAMS            1100\nBLAKE\
  \            2850\nKING             5000\n```\n\n```\nSELECT ename , sal\nFROM emp\n\
  WHERE comm IS NOT NULL\nORDER BY ename;\n```\n\n```\nENAME              SAL\n----------\
  \ ----------\nALLEN            1600\nMARTIN           1250\n```\n\n你也可以在`WHERE`子句中使用`NVL`或`NVL2`函数，就像在`SELECT`语句中一样：\n\
  \n```\nSELECT ename , sal\nFROM emp\nWHERE NVL(comm,0) = 0\nORDER BY ename;\n```\n\
  \n```\nENAME              SAL\n---------- ----------\nADAMS            1100\nBLAKE\
  \            2850\nKING             5000\n```\n\n## 工作原理\n\n最好始终明确处理空值的可能性，因此如果表的一列可为空，就假设空值存在，否则输出结果可能不理想或不可预测。一个快速检查列中是否存在空值的方法是将表中的行数（`COUNT\
  \ *`）与该列的行数（`COUNT <column_name>`）进行比较。对可为空列的计数将仅计算那些没有空值的行。以下是一个例子：\n\n```\nSELECT\
  \ count(*) FROM emp;\n```\n\n```\n  COUNT(*)\n----------\n        14\n```\n\n```\n\
  SELECT count(comm) FROM emp;\n```\n\n```\nCOUNT(COMM)\n-----------\n          4\n\
  ```\n\n这种比较行数与列中值数量的技术是检查列中是否存在空值的一种便捷方法。\n\n另一个在处理空值时非常有用的函数是`COALESCE`函数。使用`COALESCE`，你可以传入一系列值，该函数将返回第一个非`NULL`值。如果`COALESCE`中的所有值都是`NULL`，则返回`NULL`值。这里有一个简单的例子：\n\
  \n```\nSELECT coalesce(NULL,'ABC','DEF') FROM dual;\n```\n\n```\nCOA\n---\nABC\n\
  ```\n\n假设你想获取客户的送货地址，如果不存在，则再获取账单地址。使用`COALESCE`，你可以如下例所示实现这一点：\n\n```\nSELECT COALESCE(\n\
  (SELECT shipping_address FROM customers\nWHERE cust_id = 9342),\n(SELECT billing_address\
  \ FROM customers\nWHERE cust_id = 9342))\nFROM dual;\n```\n\n在使用`COALESCE`的语句中，所有参数必须具有相同的数据类型，否则你将收到错误，如下所示：\n\
  \n```\nSELECT coalesce(NULL,123,'DEF') FROM dual;\n                         *\n\
  ERROR at line 1:\nORA-00932: inconsistent datatypes: expected NUMBER got CHAR\n\
  ```\n\n### 8-12. 搜索部分列值\n\n### 问题\n\n你需要从数据库中某个列搜索一个字符串，但不知道该列数据的确切值。\n\n#### 解决方案\n\
  \n当你对`WHERE`子句中用于筛选的列的数据值不确定时，可以使用`LIKE`操作符。与等号、`BETWEEN`子句或`IN`子句等常规比较操作符不同，`LIKE`操作符允许你基于列数据的*部分字符串*来搜索匹配项。使用`LIKE`子句时，你还需要在数据本身中使用`%`符号或`_`符号来查找所需数据。百分比符号用于替代一个到多个字符。\n\
  \n例如，如果你想查看在 1995 年雇佣的员工列表，而不关心具体日期，就可以使用`LIKE`子句来搜索`hire_date`中包含字符串`1995`的任何匹配项。当对日期或时间戳数据类型使用`LIKE`时，你需要确保所使用的日期格式与你`LIKE`语句中的搜索条件兼容。例如，如果你数据库的默认日期格式是`DD-MON-YY`，那么字符串`1995`与此格式不兼容，将永远找不到匹配项。为了以此方式搜索，需要在发出查询前，在你的会话中设置日期格式：\n\
  \n`alter session set nls_date_format = 'yyyy-mm-dd';`\n\n`Session altered.`\n\n\
  ```\nSELECT employee_id, last_name, first_name, hire_date\nFROM employees\nWHERE\
  \ hire_date LIKE '%1995%'\nORDER BY hire_date;\n```\n\n```\nEMPLOYEE_ID LAST_NAME\
  \                 FIRST_NAME           HIRE_DATE\n----------- -------------------------\
  \ -------------------- ----------\n        122 Kaufling                  Payam \
  \               1995-05-01\n        115 Khoo                      Alexander    \
  \        1995-05-18\n        137 Ladwig                    Renske              \
  \ 1995-07-14\n        141 Rajs                      Trenna               1995-10-17\n\
  ```\n\n解决需要担心会话日期格式的一个简单方法是在查询中直接使用`TO_CHAR`函数。这种方法的优势在于编码非常简单，无需担心会话的日期格式。请看以下示例：\n\
  \n```\nSELECT employee_id, last_name, first_name, hire_date\nFROM employees\nWHERE\
  \ to_char(hire_date,'yyyy') = '1995'\nORDER BY hire_date;\n```\n\n下划线符号（`_`）用于精确替代一个字符。假设你正在寻找姓氏为“Olsen”或“Olson”的员工，但不确定具体拼写。你可以在单个查询中，结合下划线和`LIKE`子句来找出数据库中所有符合该名称变体的员工：\n\
  \n```\nSELECT last_name, first_name, phone_number\nFROM employees\nWHERE last_name\
  \ like 'Ols_n';\n```\n\n```\nLAST_NAME                 FIRST_NAME           PHONE_NUMBER\n\
  ------------------------- -------------------- --------------------\nOlsen     \
  \                Christopher          011.44.1344.498718\nOlson                \
  \     TJ                   650.124.8234\n```\n\n"
- "# 工作原理\n\n`LIKE` 子句在您不确定数据库中存储的确切列值时，对于查找数据极为有用。使用 `LIKE` 子句时需要考虑性能方面的影响。主要考虑因素是，当使用\
  \ `LIKE` 子句时，优化器使用索引来辅助检索数据的可能性会降低。由于索引是基于列的完整值建立的，仅搜索列完整值的一部分会使优化器难以使用索引。\n\n以前面查找在\
  \ 1995 年开始工作的员工的例子为例，以下是该查询的执行计划：\n\n```\n---------------------------------------\n\
  | Id  | Operation         | Name      |\n---------------------------------------\n\
  |   0 | SELECT STATEMENT  |           |\n|   1 |  TABLE ACCESS FULL| EMPLOYEES |\n\
  ---------------------------------------\n```\n\n由于索引是基于整个值建立的，如果搜索条件中保留了值的前部分，优化器就能识别出可以使用索引。在值的两侧放置百分号等同于说“包含”。如果我们只在值的末尾放置百分号，则等同于“以...开始”。由于值的开头部分保持完整，优化器将能够根据\
  \ `LIKE` 子句中的值与现有索引进行有效比较，因此可以使用该索引（如果该列上存在索引的话）：\n\n```\nSELECT employee_id, last_name,\
  \ first_name, hire_date\nFROM employees\nWHERE hire_date LIKE '1995%';\n```\n\n\
  ```\nEMPLOYEE_ID LAST_NAME                 FIRST_NAME           HIRE_DATE\n-----------\
  \ ------------------------- -------------------- ----------\n        115 Khoo  \
  \                    Alexander            1995-05-18\n        122 Kaufling     \
  \             Payam                1995-05-01\n        137 Ladwig              \
  \      Renske               1995-07-14\n        141 Rajs                      Trenna\
  \               1995-10-17\n```\n\n```\n---------------------------------------------------\n\
  | Id  | Operation                   | Name        |\n---------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |             |\n|   1 |  TABLE ACCESS BY INDEX\
  \ ROWID| EMPLOYEES   |\n|   2 |   INDEX RANGE SCAN          | EMP_NAME_IX |\n---------------------------------------------------\n\
  ```\n\n有时，下划线很可能正是被搜索数据的一部分。在这种情况下，必须在下划线前加上转义字符。如果您是一名 DBA，并且正在数据库中搜索表空间名（它很容易包含下划线字符），请务必考虑到下划线是一个通配符符号，必须加以处理。参见以下示例：\n\
  \n```\nSELECT tablespace_name FROM dba_tablespaces\nWHERE tablespace_name like '%EE_DATA';\n\
  ```\n\n```\nTABLESPACE_NAME\n------------------------------\nEMPLOYEE_DATA\nEMPLOYEE1DATA\n\
  ```\n\n下划线很可能被当作数据搜索，而不是 `LIKE` 子句的替换字符。如果在查询中插入转义字符，就可以避免得到不期望的结果。通过在下划线前直接插入转义字符，下划线将被视为数据的一部分，而不是替换字符：\n\
  \n```\nSELECT tablespace_name FROM dba_tablespaces\nWHERE tablespace_name LIKE '%EE^_DATA'\
  \ ESCAPE '^';\n```\n\n```\nTABLESPACE_NAME\n------------------------------\nEMPLOYEE_DATA\n\
  ```\n\n`LIKE` 子句的好处是它提供了基于列数据的部分值查找数据的灵活性。可能的代价是性能。使用 `LIKE` 子句的查询通常更不可能使用索引。作为\
  \ `LIKE` 的替代方案，`BETWEEN` 子句虽然在 SQL 语句中编写起来不那么简单，但通常更可能使用索引。然而，有时由于性能影响，`LIKE` 子句可能被视为应避免使用的子句，但如果避免使用前导百分号，优化器通常会在有索引可用的情况下使用它。\n\
  \n在“解决方案”部分的 `TO_CHAR` 示例中，您会注意到 `TO_CHAR` 函数被放置在比较运算符的左侧。通常，当这种情况发生时，意味着不会使用过滤列上的索引（有关此主题的更多讨论，请参见配方\
  \ 8-14）。然而，对于某些 Oracle 函数及其转换方式，仍然可能使用索引。唯一确定的方法就是简单地在您的查询上运行一个执行计划。对于我们前面使用 `TO_CHAR`\
  \ 的查询，尽管函数被放置在比较运算符的左侧，它仍然使用了索引：\n\n```\nSELECT employee_id, last_name, first_name,\
  \ hire_date\nFROM employees\nWHERE to_char(hire_date,'yyyy') = '1995'\nORDER BY\
  \ hire_date;\n```\n\n```\n----------------------------------------------------\n\
  | Id  | Operation                   | Name         |\n----------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |              |\n|   1 |  TABLE ACCESS BY INDEX\
  \ ROWID| EMPLOYEES    |\n|   2 |   INDEX FULL SCAN           | EMPLOYEES_I1 |\n\
  ----------------------------------------------------\n```\n\n## 8-13. 在共享池中重用 SQL\
  \ 语句\n\n### 问题\n\n您的 SQL 语句经历了过量的硬解析，并希望减少经过硬解析过程的 SQL 语句数量。\n\n\n#### 解决方案\n\n\
  在应用程序中实现**绑定变量**可以极大地提高查询的效率和性能。本质上，绑定变量也称为替换变量，用于替换查询中的字面值。通过将绑定变量放入 SQL 语句中，这些语句可以在内存中被重复使用，从而无需经历整个昂贵的\
  \ SQL 解析过程。\n\n这是一个普通 SQL 语句的示例，`WHERE` 子句中显示了字面值：\n\n```sql\nSELECT employee_id,\
  \ last_name || ', ' || first_name employee_name\nFROM employees\nWHERE employee_id\
  \ = 115;\n```\n\n```\nEMPLOYEE_ID EMPLOYEE_NAME\n----------- -------------------------\n\
  \        115 Khoo, Alexander\n```\n\n在 Oracle 中有几种定义绑定变量的方法。首先，你可以直接使用 SQL Plus。要在\
  \ SQL Plus 中完成此操作，首先需要定义一个变量及其数据类型。然后，你可以使用 `exec` 命令，该命令实际上会运行一个 PL/SQL 命令，用所需的值填充该变量。请注意，在\
  \ SQL Plus 中引用绑定变量时，需要在变量名前加一个冒号：\n\n```sql\nSQL> variable g_emp_id number\nSQL>\
  \ exec :g_emp_id := 115;\n```\n\n```\nPL/SQL procedure successfully completed.\n\
  ```\n\n定义变量并为其赋值后，你只需在 SQL 语句中替换该变量名即可。同样，由于它是一个绑定变量，你需要在它前面加一个冒号：\n\n```sql\nSELECT\
  \ employee_id, last_name || ', ' || first_name employee_name\nFROM employees\nWHERE\
  \ employee_id = :g_emp_id;\n```\n\n```\nEMPLOYEE_ID EMPLOYEE_NAME\n----------- -------------------------\n\
  \        115 Khoo, Alexander\n```\n\n你也可以在 PL/SQL 中为变量赋值。PL/SQL 的一个显著优点是，只要在 PL/SQL\
  \ 中使用变量，它们就会自动成为绑定变量，因此不需要特殊的编码。而且，与 SQL Plus 不同，引用在 PL/SQL 块内定义的变量时不需要冒号：\n\n```sql\n\
  SQL> set serveroutput on\n  1  DECLARE\n  2    v_emp_id employees.employee_id%TYPE\
  \ := 200;\n  3    v_last_name employees.last_name%TYPE;\n  4    v_first_name employees.first_name%TYPE;\n\
  \  5  BEGIN\n  6    SELECT last_name, first_name\n  7    INTO v_last_name, v_first_name\n\
  \  8    FROM employees\n  9    WHERE employee_id = v_emp_id;\n 10    dbms_output.put_line('Employee\
  \ Name = ' || v_last_name || ', ' || v_first_name);\n 11* END;\nSQL> /\n```\n\n\
  ```\nEmployee Name = Whalen, Jennifer\n```\n\n#### 工作原理\n\n使用绑定变量可以增加 SQL 语句在共享池中被重用的可能性。Oracle\
  \ 使用哈希算法为每个唯一的 SQL 语句分配一个值。如果 SQL 语句中使用了字面值，那么两个原本相同的语句的哈希值将会不同。通过使用绑定变量，这些语句在共享池中将具有相同的哈希值，从而可以避免部分昂贵的解析过程。\n\
  \n##### 重用是高效的\n\n重用之所以高效，是因为 Oracle 不需要为这些 SQL 语句经历整个解析过程。如果你的 SQL 语句中不使用绑定变量，而是使用字面值，那么这些语句就需要被完全解析。\n\
  \n请参阅 表 8-3 以回顾处理 SQL 语句所采取的步骤。一个被“硬解析”的语句必须执行所有步骤。如果一个语句是“软解析”，优化器通常不会执行优化和行源生成步骤。\n\
  \n![images](img/t0803.jpg)\n\n![images](img/t0803a.jpg)\n\n##### 可以避免硬解析\n\n通过使用绑定变量，可以避免硬解析，这有助于提升\
  \ SQL 查询的性能，并减少共享池中可能发生的内存量抖动。`TKPROF` 实用程序是验证 SQL 语句是否在共享池中被重用的一种方法。稍后，将提供使用绑定变量的\
  \ PL/SQL 代码示例，以及未使用绑定变量的 PL/SQL 代码示例。\n\n使用 `TKPROF` 实用程序，我们可以查看这些语句是如何被处理的。为了使用\
  \ `TKPROF` 实用程序查看此信息，我们必须首先在会话中启用跟踪：\n\n```sql\nalter session set sql_trace=true;\n\
  ```\n\n跟踪文件会生成在由 `diagnostic_dest` 或 `user_dump_dest` 参数设置指定的位置。以下 PL/SQL 块更新 employees\
  \ 表，为所有员工加薪 3%。由于所有 PL/SQL 变量都被视为绑定变量，我们可以通过 `TKPROF` 输出看到，update 语句只被解析了一次，但执行了\
  \ 107 次：\n\n```sql\nBEGIN\nFOR i IN 100..206\nLOOP\nUPDATE employees\nSET salary=salary*1.03\n\
  WHERE employee_id = i;\nEND LOOP;\nCOMMIT;\nEND;\n```\n\n以下是 `TKPROF` 生成报告的摘录，该报告总结了启用跟踪的会话信息：\n\
  \n```\nSQL ID : f7mtnudzhm2py\nUPDATE EMPLOYEES SET SALARY=SALARY*1.03\nWHERE\n\
  \ EMPLOYEE_ID = :B1\n\ncall     count       cpu    elapsed       disk      query\
  \    current        rows\n------- ------  -------- ---------- ---------- ----------\
  \ ----------  ----------\nParse        1      0.00       0.00          0       \
  \   0          0           0\nExecute    107      0.01       0.00          0   \
  \     107        112         107\nFetch        0      0.00       0.00          0\
  \          0          0           0\n------- ------  -------- ---------- ----------\
  \ ---------- ----------  ----------\ntotal      108      0.01       0.00       \
  \   0        107        112         107\n```\n\n在以下示例中，我们使用 `execute immediate`\
  \ 命令通过动态 SQL 完成同样的操作：\n\n```sql\nBEGIN\nFOR i IN 100..206\nLOOP\nexecute immediate\
  \ 'UPDATE employees SET salary=salary*1.03 WHERE employee_id = ' || i;\nEND LOOP;\n\
  COMMIT;\nEND;\n```\n\n由于整个语句在执行前被组合在一起，变量在执行前被转换成了字面值。我们可以通过 `TKPROF` 输出看到，该语句在每次执行时都被解析：\n\
  \n```\nSQL ID : 67776qbqqz5wc\nUPDATE employees SET salary=salary*:\"SYS_B_0\"\n\
  WHERE\n employee_id = :\"SYS_B_1\"\n\ncall     count       cpu    elapsed      \
  \ disk      query    current        rows\n------- ------  -------- ---------- ----------\
  \ ---------- ----------  ----------\nParse      107      0.00       0.00       \
  \   0          0          0           0\nExecute    107      0.00       0.04   \
  \       0        107        112         107\nFetch        0      0.00       0.00\
  \          0          0          0           0\n------- ------  -------- ----------\
  \ ---------- ---------- ----------  ----------\ntotal      214      0.00       0.05\
  \          0        107        112         107\n```\n\n\n\n## 绑定变量可与 EXECUTE IMMEDIATE\
  \ 一起使用\n\n若要更高效地使用 `execute immediate` 命令，我们可以将其转换为使用带有 `USING` 子句的绑定变量，并在 `execute\
  \ immediate` 语句中指定一个绑定变量。结果显示该语句仅被解析了一次：\n\n```\nBEGIN\n  FOR i IN 100..206\n  LOOP\n\
  \    execute immediate 'UPDATE employees SET salary=salary*1.03 WHERE employee_id\
  \ = :empno' USING i;\n  END LOOP;\n  COMMIT;\nEND;\n```\n\n```\nSQL ID : 4y09bqzjngvq4\n\
  update employees set salary=salary*1.03\nwhere\n  employee_id = :empno\n```\n\n\
  ```\ncall     count       cpu    elapsed       disk      query    current      \
  \  rows\n------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
  Parse        1      0.00       0.00          0          0          0           0\n\
  Execute    107      0.01       0.01          0        107        112         107\n\
  Fetch        0      0.00       0.00          0          0          0           0\n\
  ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
  total      108      0.01       0.01          0        107        112         107\n\
  ```\n\n![images](img/square.jpg) **提示** 对于 DDL 语句，总是会发生硬解析。\n\n### 8-14. 避免意外的全表扫描\n\
  \n#### 问题\n\n你有一些查询本应使用索引，但却进行了全表扫描。你希望在优化器可以使用索引检索数据时，避免进行全表扫描。\n\n#### 解决方案\n\n\
  在构造 SQL 语句时，如果可能，应尽量遵循一条基本原则：避免在比较运算符的左侧使用函数。函数本质上是将列转换为字面值，因此 Oracle 优化器不再将该转换后的值识别为列，而是识别为一个值。\n\
  \n在此，我们试图获取自 1999 年以来入职的所有员工的列表。因为我们在比较运算符的左侧放置了一个函数，即使 `HIRE_DATE` 列上有索引，优化器也被迫进行全表扫描：\n\
  \n```\nSELECT employee_id, salary, hire_date\nFROM employees\nWHERE TO_CHAR(hire_date,'yyyy-mm-dd')\
  \ >= '2000-01-01';\n```\n\n```\n---------------------------------------\n| Id  |\
  \ Operation         | Name      |\n---------------------------------------\n|  \
  \ 0 | SELECT STATEMENT  |           |\n|   1 |  TABLE ACCESS FULL| EMPLOYEES |\n\
  ---------------------------------------\n```\n\n通过将函数移到比较运算符的右侧，并保持 `HIRE_DATE`\
  \ 作为 `WHERE` 子句中的原始列，优化器现在可以使用 `HIRE_DATE` 上的索引：\n\n```\nSELECT employee_id, salary,\
  \ hire_date\nFROM employees\nWHERE hire_date >= TO_DATE('2000-01-01','yyyy-mm-dd');\n\
  ```\n\n```\n-------------------------------------------------\n| Id  | Operation\
  \                   | Name      |\n-------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |           |\n|   1 |  TABLE ACCESS BY INDEX\
  \ ROWID| EMPLOYEES |\n|   2 |   INDEX RANGE SCAN          | EMP_I5    |\n-------------------------------------------------\n\
  ```\n\n#### 原理说明\n\n函数是用于转换值或根据从数据库中所需内容返回期望值的绝佳工具，但如果在 SQL 语句中使用不当，它们可能成为性能杀手。确保所有函数都位于比较运算符的右侧，优化器将能够使用\
  \ `WHERE` 子句中指定列上的任何索引。这条规则适用于任何函数。在某些情况下，即使函数位于比较运算符的左侧，Oracle 仍可能使用索引，但这通常是例外。有关这方面的示例，请参见配方\
  \ 8-12。\n\n请记住，`WHERE` 子句中给定列的数据类型可能会影响如何修改 SQL 语句以将函数有效地移动到比较运算符的右侧。在下面的示例中，我们必须更改比较运算符才能有效地移动函数：\n\
  \n```\nSELECT last_name, first_name\nFROM employees\nWHERE SUBSTR(phone_number,1,3)\
  \ = '515';\n```\n\n```\n---------------------------------------\n| Id  | Operation\
  \         | Name      |\n---------------------------------------\n|   0 | SELECT\
  \ STATEMENT  |           |\n|   1 |  TABLE ACCESS FULL| EMPLOYEES |\n---------------------------------------\n\
  ```\n\n为了有效地获取所有 515 区域号码的电话，我们可以使用 `BETWEEN` 子句并捕获所有可能的值。我们也可以使用 `LIKE` 子句，只要通配符位于条件的末尾。通过使用这两种方法中的任何一种，优化器都将执行计划更改为使用索引：\n\
  \n```\nSELECT last_name, first_name\nFROM employees\nWHERE phone_number BETWEEN\
  \ '515.000.0000' and '515.999.9999';\n```\n\n```\nSELECT last_name, first_name\n\
  FROM employees\nWHERE phone_number LIKE '515%';\n```\n\n```\n-------------------------------------------------\n\
  | Id  | Operation                   | Name      |\n-------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |           |\n|   1 |  TABLE ACCESS BY INDEX\
  \ ROWID| EMPLOYEES |\n|   2 |   INDEX RANGE SCAN          | EMP_I6    |\n-------------------------------------------------\n\
  ```\n\n### 8-15. 创建高效的临时视图\n\n#### 问题\n\n你需要一个不存在的表或数据视图来构造所需的查询，但你没有在数据库上创建此类表或视图的权限。\n\
  \n\n\n#### 解决方案\n\n有时，在单个 SQL 语句中，你可能想“即时”创建一个仅供查询使用的表，并且之后永远不会再用到。在查询的 `FROM` 子句中，你通常放置要从中检索数据的表或视图的名称。如果所需的数据视图不存在，你可以使用一种称为“内联视图”的方式，即时创建该数据的临时视图，即直接在查询的\
  \ `FROM` 子句中指定该视图的特征：\n\n```sql\nSELECT last_name, first_name, department_name dept,\
  \ salary\nFROM employees e join\n( SELECT department_id, max(salary) high_sal\n\
  FROM employees\nGROUP BY department_id ) m\nUSING (department_id) join departments\n\
  USING (department_id)\nWHERE e.salary = m.high_sal\nORDER BY SALARY desc;\n```\n\
  \n```\nLAST_NAME                  FIRST_NAME           DEPT                    \
  \ SALARY\n------------------------- -------------------- -------------------- ----------\n\
  King                      Steven               Executive                 24000\n\
  Russell                   John                 Sales                     14000\n\
  Hartstein                 Michael              Marketing                 13000\n\
  Greenberg                 Nancy                Finance                   12000\n\
  Higgins                   Shelley              Accounting                12000\n\
  Raphaely                  Den                  Purchasing                11000\n\
  Baer                      Hermann              Public Relations          10000\n\
  Hunold                    Alexander            IT                         9000\n\
  Fripp                     Adam                 Shipping                   8200\n\
  Mavris                    Susan                Human Resources            6500\n\
  Whalen                    Jennifer             Administration             4400\n\
  ```\n\n在上述查询中，我们获取了每个部门工资最高的员工。我们的数据库中并不存在这样的视图。此外，在单个查询中，也无法直接连接 `employees` 表和\
  \ `departments` 表来检索此数据。因此，内联视图被创建为 SQL 语句的一部分，并且只包含我们所需的关键信息——它拥有高薪和部门信息，现在可以基于匹配该工资的员工轻松地与\
  \ `employees` 表进行连接。\n\n#### 工作原理\n\n与 SQL 语言的许多组件一样，内联视图需要谨慎使用。虽然极其有用，但如果滥用或过度使用，内联视图可能会导致数据库性能问题，特别是在临时表空间的使用方面。由于内联视图仅在查询执行期间创建和使用，其结果保存在程序全局内存区域中，如果数据量过大，则会使用临时表空间。在使用内联视图之前，应考虑以下问题：\n\
  \n1.  最重要的是，包含内联视图的 SQL 将多久运行一次？（如果只运行一次或很少运行，那么最好直接执行查询，而无需担心任何潜在的性能影响）。\n2.  内联视图将包含多少行？\n\
  3.  内联视图的行长度是多少？\n4.  为 `pga_aggregate_target` 或 `memory_target` 设置分配了多少内存？\n5.\
  \  你的 Oracle 用户或模式所使用的临时表空间有多大？\n\n如果你正在进行一个简单的即席查询，可能不需要进行这种分析。如果你创建的 SQL 语句将在生产环境中运行，进行这种分析就很重要，因为如果临时表空间被一个内联视图完全占用，不仅会影响该查询的完成，还会影响任何可能使用该特定临时表空间的用户处理的顺利进行。在许多数据库环境中，只有一个临时表空间。因此，如果一个用户进程通过单个操作消耗了所有临时空间，这将影响数据库中每个用户的操作。\n\
  \n考虑以下查询：\n\n```sql\nWITH service_info AS\n(SELECT\nproduct_id,\ngeographic_id,\n\
  sum(qty) quantity\nFROM services\nGROUP BY\nproduct_id,\ngeographic_id),\nproduct_info\
  \ AS\n(SELECT product_id, product_group, product_desc\nFROM products\nWHERE source_sys\
  \ = 'BILLING'),\nbilling_info AS\n(SELECT journal_date, billing_date, product_id\n\
  FROM BILLING\nWHERE journal_date = TO_DATE('2011-08-15', 'YYYY-MM-DD'))\nSELECT\n\
  product_group,\nproduct_desc,\njournal_date,\nbilling_date,\nsum(service_info.quantity)\n\
  FROM service_info JOIN product_info\nON service_info.product_id = product_info.product_id\
  \ JOIN billing_info\nON  service_info.product_id = billing_info.product_id\nWHERE\n\
  service_info.quantity > 0\nGROUP BY\nproduct_group,\nproduct_desc,\njournal_date,\n\
  billing_date;\n```\n\n在这个查询中，创建了三个内联视图：`SERVICE_INFO` 视图、`PRODUCT_INFO` 视图和 `BILLING_INFO`\
  \ 视图。在最终处理以最后一个 `SELECT` 语句开头的真正用户查询之前，每个查询都会被处理，并且结果会存储在程序全局区域或临时表空间中。虽然通过执行单个查询来获得所需结果在效率上是可取的，但上述查询的处理效率可能非常低，具体取决于表中数据的大小，因为将可能数百万行的数据存储到临时表空间会消耗整个数据库用户群体所需的关键资源。在此类示例中，在数据库层面创建保存内联视图所定义数据的表——在此例中是三个独立的表——通常更有效。然后，可以通过连接这三个永久表来提取最终查询以生成结果。虽然这可能需要开发团队和\
  \ `DBA` 进行更多的前期工作，但如果该查询定期运行，这很可能会带来回报。此外，随着 SQL 语句复杂性的增加，其可维护性会降低。因此，总的来说，将复杂语句分解成多个部分更高效，通常也更易于维护。\n\
  \n内联视图提供了巨大的好处。但是，在生产环境中实施使用此类视图之前，请进行适当的分析和研究。\n\n**注意** 大型内联视图很容易消耗大量的临时表空间\n\n\
  ### 8-16. 避免使用 NOT 子句\n\n#### 问题\n\n你有一些使用了 `NOT` 子句的查询性能不佳，并希望修改它们以提高性能。\n\n\n\n\
  #### 解决方案\n\n正如我们经常为相等条件查询数据库一样，我们也会为非相等条件查询数据库。从数据库中检索数据的本质以及 SQL 语言的本质，就是允许用户执行此类操作。\n\
  \n在 SQL 语句中使用`NOT`子句会带来性能上的缺陷，因为它们会触发全表扫描。以下是一个来自先前示例的查询：\n\n```sql\nSELECT last_name,\
  \ first_name, salary, email\nFROM employees_big\nWHERE department_id NOT IN(20,30)\n\
  AND commission_pct > 0;\n```\n\n```\n-----------------------------------------------------------------------------------\n\
  | Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time  |\n\
  -----------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |               |   697K|    21M|  4480   (1)| 00:00:54\
  \ |\n|*  1 |  TABLE ACCESS FULL| EMPLOYEES_BIG |   697K|    21M|  4480   (1)| 00:00:54\
  \ |\n-----------------------------------------------------------------------------------\n\
  ```\n\n尽管我们在`department_id`列上有索引，但通过使用`NOT`子句，我们导致 Oracle 绕过该索引的使用，以正确搜索并确保所有行都不在部门\
  \ 20 或 30 中。请注意 Oracle 为此查询分配的总成本 4480。\n\n通过重写查询，可以启用索引的使用。例如，让我们使用一个子查询来获取所有`department_id`值不是\
  \ 20 或 30 的列表，然后将该列表传递给父查询。通过这样做，我们将`NOT`子句移到了小得多的`departments`表上，因此对该表的表扫描会很快。这些值被传递给父查询，父查询可以使用索引，因为它不再需要`NOT`子句。\n\
  \n以下是新的查询及其执行计划。\n\n```sql\nSELECT last_name, first_name, salary, email\nFROM employees_big\n\
  WHERE department_id IN\n(SELECT department_id FROM departments\nWHERE department_id\
  \ NOT IN (20,30))\nAND commission_pct > 0;\n```\n\n```\n---------------------------------------------------------------------------------\n\
  | Id  | Operation          | Name       | Rows  | Bytes | Cost (%CPU)| Time  |\n\
  ---------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT   |            |    33 |  1188 |     3   (0)| 00:00:01\
  \ |\n|   1 |  NESTED LOOPS      |            |    33 |  1188 |     3   (0)| 00:00:01\
  \ |\n|*  2 |   TABLE ACCESS FULL| EMPLOYEES  |    34 |  1088 |     3   (0)| 00:00:01\
  \ |\n|*  3 |   INDEX UNIQUE SCAN| DEPT_ID_PK |     1 |     4 |     0   (0)| 00:00:01\
  \ |\n---------------------------------------------------------------------------------\n\
  ```\n\n请注意，在更改之后，查询现在使用了索引，Oracle 分配的总成本从 4480 下降到了 3。\n\n#### 工作原理\n\n你可以通过以下几种方式有效使用`NOT`子句：\n\
  *   比较运算符（'<>', '!=', '^='）\n*   `NOT IN`\n*   `NOT LIKE`\n\n通过使用`NOT`，以下每个查询都具有相同的基本效果，即它会否定对`NOT`所应用列上任何可能索引的使用：\n\
  \n```sql\nSELECT last_name, first_name, salary, email\nFROM employees\nWHERE department_id\
  \ != 20\nAND commission_pct > 0;\n```\n\n```sql\nSELECT last_name, first_name, salary,\
  \ email\nFROM employees\nWHERE department_id NOT IN(20,30)\nAND commission_pct >\
  \ 0;\n```\n\n```sql\nSELECT last_name, first_name, salary, email\nFROM employees\n\
  WHERE hire_date NOT LIKE '2%'\nAND commission_pct > 0;\n```\n\n```\n---------------------------------------\n\
  | Id  | Operation         | Name      |\n---------------------------------------\n\
  |   0 | SELECT STATEMENT  |           |\n|   1 |  TABLE ACCESS FULL| EMPLOYEES |\n\
  ---------------------------------------\n```\n\n有时，全表扫描是必需的。即使存在索引，如果你需要读取表中超过一定百分比的行，Oracle\
  \ 优化器可能无论如何都会执行全表扫描。尽管如此，如果你尽可能尝试避免使用`NOT`，你可能能够提高查询的性能。\n\n综上所述，你可以尝试使用`NOT EXISTS`作为替代方案，它可能在这些条件下提高性能。使用前面的查询并修改为使用`NOT\
  \ EXISTS`，你仍然可以使用索引来提高查询性能：\n\n```sql\nSELECT last_name, first_name, salary, email\n\
  FROM employees\nWHERE NOT EXISTS\n(SELECT department_id FROM departments\nWHERE\
  \ department_id in(20,30))\nAND commission_pct > 0;\n```\n\n```\n------------------------------------------\n\
  | Id  | Operation           | Name       |\n------------------------------------------\n\
  |   0 | SELECT STATEMENT    |            |\n|   1 |  FILTER             |      \
  \      |\n|   2 |   TABLE ACCESS FULL | EMPLOYEES  |\n|   3 |   INLIST ITERATOR\
  \   |            |\n|   4 |    INDEX UNIQUE SCAN| DEPT_ID_PK |\n------------------------------------------\n\
  ```\n\n### 8-17. 控制事务大小\n\n#### 问题\n\n你正在执行一系列 DML 活动，并希望更好地管理工作单元和事务的可恢复性。\n\n\
  #### 解决方案\n\n通过使用保存点，你可以更轻松地将事务拆分为逻辑块，并在失败时更有效地管理它们。利用保存点，你可以将一系列 DML 语句回滚到你创建的增量保存点。在你的\
  \ SQL 会话中，只需在处理过程中适当的位置创建一个保存点，以便更轻松地隔离一个“逻辑工作单元”。以下是一个展示如何创建保存点的示例：\n\n```\nSQL>\
  \ savepoint A;\n\nSavepoint created.\n```\n\n例如，如果你有一个在线书店，一位客户正在下在线订单，当他或她提交订单时，该事务的一个逻辑工作单元如下所示：\n\
  *   向`orders`表添加一行\n*   向`orderitems`表添加一或多行\n\n在处理这个在线订单时，你会希望将订单的所有信息以及订单的所有项目作为一个事务提交。这涉及多个数据库\
  \ DML 语句，但需要逐个处理以维护客户订单的完整性；因此它可以被视为一个“逻辑工作单元”。通过使用保存点，你可以更轻松地将多个 DML 语句作为逻辑工作单元进行处理。创建保存点时，本质上是基于系统更改号（SCN）创建了一个别名。创建保存点后，你就可以方便地将事务回滚到基于你创建的保存点的那个\
  \ SCN。\n\n\n#### 工作原理\n\n假设贵公司为两个新成立的部门招聘了员工。你需要在对应的 `DEPT` 和 `EMP` 表中插入行，但需要为每个部门单独执行一个事务。如果出现错误，你可以回滚到上一个逻辑事务完成的点。首先，我们可以查看\
  \ `DEPT` 表的当前情况：\n\n```\nSELECT * FROM dept;\n\n    DEPTNO DNAME          LOC\n\
  ---------- -------------- -------------\n        10 ACCOUNTING     NEW YORK\n  \
  \      20 RESEARCH       DALLAS\n        30 SALES          CHICAGO\n        40 OPERATIONS\
  \     BOSTON\n```\n\n我们首先将第一个部门的信息插入到 `DEPT` 和 `EMP` 表中，然后创建一个保存点：\n\n```\nINSERT\
  \ INTO dept VALUES (50,'PAYROLL','LOS ANGELES');\n\n1 row created.\n\nINSERT INTO\
  \ emp VALUES (7997,'EVANS','ACCTNT',7566,'2011-08-15',900,0,50);\n\n1 row created.\n\
  \nsavepoint A;\n\nSavepoint created.\n```\n\n然后我们开始处理第二个部门的信息。假设在事务处理到一半时，在向 `DEPT`\
  \ 表插入和向 `EMP` 表插入之间发生了未知错误。这种情况下，我们知道这个为招聘部门插入信息的事务必须被回滚。同时，我们希望提交工资部门的事务。利用我们创建的保存点，我们可以提交事务的一部分，同时回滚我们不想要保留的那部分事务：\n\
  \n```\nINSERT INTO dept VALUES (60,'RECRUITING','DENVER');\n\n1 row created.\n\n\
  ROLLBACK to savepoint A;\n\nRollback complete.\n\nCOMMIT;\n\nCommit complete.\n\
  ```\n\n由于保存点的存在，我们的回滚仅回滚了部门 60 的未完成事务，随后的提交将部门 50 的完整事务写入了数据库的 `DEPT` 和 `EMP` 表：\n\
  \n```\nSELECT * FROM dept;\n\n    DEPTNO DNAME          LOC\n---------- --------------\
  \ -------------\n        10 ACCOUNTING     NEW YORK\n        20 RESEARCH       DALLAS\n\
  \        30 SALES          CHICAGO\n        40 OPERATIONS     BOSTON\n        50\
  \ PAYROLL        LOS ANGELES\n\nSELECT * FROM emp\nWHERE empno = 7997;\n\n     EMPNO\
  \ ENAME      JOB              MGR HIREDATE    SAL       COMM  DEPTNO\n----------\
  \ ---------  ---------- ---------- ---------- ---- ---------- -------\n      7997\
  \ EVANS      ACCTNT          7566 2011-08-15  900          0      50\n```\n\n在编程语言（如\
  \ PL/SQL）中，你可以使用许多类似的机制或编码技术。SQL 语言中的 `SAVEPOINT` 命令是一种简单的方法来管理事务，而无需编写更复杂的程序结构。\n\
  \n## 第 9 章 手动调整 SQL\n\n书籍、文章和其他出版物中多次提到，数据库中超过 90% 的性能问题是由编写不当的 SQL 引起的。当查询性能不足时，数据库管理员常常被赋予“修复数据库”的任务。在证明清白之前，数据库管理员往往就被认定有罪——并且经常需要证明性能问题并非源于数据库本身，而仅仅是\
  \ SQL 语句编写效率低下。当然，目标是让 SQL 语句在第一次编写时就足够高效。本章的重点是帮助监控和分析现有查询，说明其性能不佳的原因，并展示一些改进查询的步骤。\n\
  \n如果你有正在维护或需要帮助提升性能的 SQL 代码，首先需要问的一些问题包括：\n\n*   该查询之前是否成功运行过？\n*   过去该查询的性能是否可以接受？\n\
  *   是否有该查询成功运行时耗时的度量指标？\n*   该查询通常返回多少数据？\n*   最近一次对查询中引用的对象收集统计信息是什么时候？\n\n一旦这些问题得到解答，就有助于将焦点引导到问题可能所在之处。然后，你可能希望为该查询运行一个执行计划，以查看执行计划乍看之下是否合理。阅读执行计划的技能需要时间，并随着经验而提高。有时，特别是在被查询对象之上存在视图时，执行计划可能会很长且令人望而生畏。因此，重要的是首先知道要关注什么，然后随着深入再挖掘细节。\n\
  \n有时，运行不佳的 SQL 可能会暴露出数据库配置问题，但通常，性能不佳的 SQL 查询是由于 SQL 语句编写不当造成的。再次强调，作为数据库管理员或数据库开发人员，最佳方法是尽可能提前花时间在\
  \ SQL 语句运行于生产环境之前对其进行调整。通常，查询的耗时是效率的基准，但这很容易让人陷入误区。随着时间的推移，数据库的特性会发生变化，应用程序可能会存储更多的历史数据，一个在初始安装时性能良好的查询在应用程序成熟时就可能无法很好地扩展。因此，第一次就花时间把它做对很重要，这说起来容易，但在平衡客户需求、预算和项目时间表时却很难做到。\n\
  \n### 9-1. 显示查询的执行计划\n\n#### 问题\n\n你想在 SQL Plus 中快速获取一个查询的执行计划。\n\n#### 解决方案\n\n\
  在 SQL Plus 中，你可以使用 `AUTOTRACE` 功能来快速获取查询的执行计划。这个 SQL Plus 工具在获取执行计划以及查询执行计划的统计信息时非常方便。最基本的形式是，在你的会话中启用\
  \ `AUTOTRACE`，在 SQL Plus 中执行以下命令：\n\n```\nSQL> set autotrace on\n```\n\n然后，你可以使用\
  \ `AUTOTRACE` 运行一个查询，这将显示该查询的执行计划和执行统计信息：\n\n```\nSELECT last_name, first_name\n\
  FROM employees NATURAL JOIN departments\nWHERE employee_id = 101;\n\nLAST_NAME \
  \                FIRST_NAME\n------------------------- --------------------\nKochhar\
  \                   Neena\n\n--------------------------------------------------------------------------------------------\n\
  | Id  | Operation                    | Name          | Rows  | Bytes | Cost (%CPU)|\
  \ Time   |\n--------------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT             |               |     1 |    33 |     2   (0)|\
  \ 00:00:01\n|   1 |  NESTED LOOPS                |               |     1 |    33\
  \ |     2   (0)| 00:00:01\n|   2 |   TABLE ACCESS BY INDEX ROWID| EMPLOYEES    \
  \ |     1 |    26 |     1   (0)| 00:00:01\n|*  3 |    INDEX UNIQUE SCAN        \
  \ | EMP_EMP_ID_PK |     1 |       |     0   (0)| 00:00:01\n|*  4 |   TABLE ACCESS\
  \ BY INDEX ROWID| DEPARTMENTS   |    11 |    77 |     1   (0)| 00:00:01\n|*  5 |\
  \    INDEX UNIQUE SCAN         | DEPT_ID_PK    |     1 |       |     0   (0)| 00:00:01\n\
  --------------------------------------------------------------------------------------------\n\
  \nStatistics\n----------------------------------------------------------\n     \
  \     0  recursive calls\n          0  db block gets\n          4  consistent gets\n\
  \          0  physical reads\n          0  redo size\n        490  bytes sent via\
  \ SQL*Net to client\n        416  bytes received via SQL*Net from client\n     \
  \     2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n      \
  \    0  sorts (disk)\n          1  rows processed\n```\n\n#### 工作原理\n\n使用 `AUTOTRACE`\
  \ 时有多个选项可供选择，基本要素如下：\n\n1.  是否要执行查询？\n2.  是否要查看查询的执行计划？\n3.  是否要查看查询的执行统计信息？\n\n\
  如表 9-1 所示，您可以选择缩写每个命令。方括号中的部分是可选的。\n\n![images](img/t0901.jpg)\n\n`AUTOTRACE` 最常见的用途是在不运行查询的情况下获取其执行计划。这样做可以让您快速判断执行计划是否合理，且无需实际执行查询：\n\
  \n```sql\nSQL> set autot trace exp\n\nSELECT l.location_id, city, department_id,\
  \ department_name\n  FROM locations l, departments d\n  WHERE l.location_id = d.location_id(+)\n\
  \  ORDER BY 1;\n-----------------------------------------------------------------------------------\n\
  | Id  | Operation           | Name        | Rows  | Bytes | Cost (%CPU)| Time  \
  \   |\n-----------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT    |             |    27 |   837 |     8  (25)| 00:00:01\
  \ |\n|   1 |  SORT ORDER BY      |             |    27 |   837 |     8  (25)| 00:00:01\
  \ |\n|*  2 |   HASH JOIN OUTER   |             |    27 |   837 |     7  (15)| 00:00:01\
  \ |\n|   3 |    TABLE ACCESS FULL| LOCATIONS   |    23 |   276 |     3   (0)| 00:00:01\
  \ |\n|   4 |    TABLE ACCESS FULL| DEPARTMENTS |    27 |   513 |     3   (0)| 00:00:01\
  \ |\n-----------------------------------------------------------------------------------\n\
  ```\n\n对于上述查询，如果您只想查看查询的执行统计信息，而不希望看到所有查询输出，您可以这样做：\n\n```sql\nSQL> set autot trace\
  \ stat\nSQL> /\n\n43 rows selected.\n\nStatistics\n----------------------------------------------------------\n\
  \          0  recursive calls\n          0  db block gets\n         14  consistent\
  \ gets\n          0  physical reads\n          0  redo size\n       1862  bytes\
  \ sent via SQL*Net to client\n        438  bytes received via SQL*Net from client\n\
  \          4  SQL*Net roundtrips to/from client\n          1  sorts (memory)\n \
  \         0  sorts (disk)\n         43  rows processed\n```\n\n一旦您在某个会话中使用完 `AUTOTRACE`，并希望将其关闭以便在不使用\
  \ `AUTOTRACE` 的情况下运行其他查询，请在您的 SQL Plus 会话中运行以下命令：\n\n```sql\nSQL> set autot off\n\
  ```\n\n每个 SQL Plus 会话的默认设置是 `AUTOTRACE OFF`，但如果您想检查给定会话的当前 `AUTOTRACE` 设置，可以通过执行以下命令来完成：\n\
  \n```sql\nSQL> show autot\nautotrace OFF\n```\n\n### 9-2. 自定义执行计划输出\n\n#### 问题\n\
  \n您想根据特定需求配置查询的解释计划输出。\n\n#### 解决方案\n\nOracle 提供的 PL/SQL 包 `DBMS_XPLAN` 具有广泛的功能，可用于获取给定查询的解释计划信息。`DBMS_XPLAN`\
  \ 包中包含许多函数。`DISPLAY` 函数可用于快速获取查询的执行计划，并可根据您的具体需求自定义所呈现的信息。以下是一个调用基本显示功能的示例：\n\n\
  ```sql\nexplain plan for\nSELECT last_name, first_name\nFROM employees JOIN departments\
  \ USING(department_id)\nWHERE employee_id = 101;\n\nExplained.\n\nSELECT * FROM\
  \ table(dbms_xplan.display);\n\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------------------\n\
  Plan hash value: 1833546154\n\n--------------------------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name          | Rows  | Bytes | Cost (%CPU)|\
  \ Time    |\n--------------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |               |     1 |    22 |     1   (0)|\
  \ 00:00:01|\n|*  1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES     |     1 |    22\
  \ |     1   (0)| 00:00:01|\n|*  2 |   INDEX UNIQUE SCAN         | EMP_EMP_ID_PK\
  \ |     1 |       |     0   (0)| 00:00:01|\n--------------------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \n   1 - filter(\"EMPLOYEES\".\"DEPARTMENT_ID\" IS NOT NULL)\n   2 - access(\"EMPLOYEES\"\
  .\"EMPLOYEE_ID\"=101)\n```\n\n`DBMS_XPLAN.DISPLAY` 过程在配置输出显示方式方面非常灵活。如果您只想查看最基本的执行计划输出，使用上述查询，您可以配置\
  \ `DBMS_XPLAN.DISPLAY` 函数来获取该输出：\n\n```sql\nSELECT * FROM table(dbms_xplan.display(null,null,'BASIC'));\n\
  \n-----------------------------------------------------\n| Id  | Operation     \
  \              | Name          |\n-----------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |               |\n|   1 |  TABLE ACCESS BY\
  \ INDEX ROWID| EMPLOYEES     |\n|   2 |   INDEX UNIQUE SCAN         | EMP_EMP_ID_PK\
  \ |\n-----------------------------------------------------\n```\n\n#### 工作原理\n\n\
  `DBMS_XPLAN.DISPLAY` 函数具有丰富的内置功能，可根据您的需求提供自定义输出。该函数提供四个基本的输出详细级别：\n\n*   `BASIC`\n\
  *   `TYPICAL`（默认）\n*   `SERIAL`\n*   `ALL`\n\n表 9-2 显示了每个详细级别选项中所包含的格式选项。\n\n![images](img/t0902.jpg)\n\
  \n如果您只需要默认的输出格式，则无需传入任何特殊格式选项：\n\n```sql\nSELECT * FROM table(dbms_xplan.display);\n\
  ```\n\n如果您想获取查询的所有可用输出，请使用 `ALL` 详细级别格式输出选项：\n\n```sql\nSELECT * FROM table(dbms_xplan.display(null,null,'ALL'));\n\
  ```\n\n```\n--------------------------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name          | Rows  | Bytes | Cost (%CPU)|\
  \ Time    |\n--------------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |               |     1 |    22 |     1   (0)|\
  \ 00:00:01|\n|*  1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES     |     1 |    22\
  \ |     1   (0)| 00:00:01|\n|*  2 |   INDEX UNIQUE SCAN         | EMP_EMP_ID_PK\
  \ |     1 |       |     0   (0)| 00:00:01|\n--------------------------------------------------------------------------------------------\n\
  \nQuery Block Name / Object Alias (identified by operation id):\n-------------------------------------------------------------\n\
  \n   1 - SEL$38D4D5F3 / EMPLOYEES@SEL$1\n   2 - SEL$38D4D5F3 / EMPLOYEES@SEL$1\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \n   1 - filter(\"EMPLOYEES\".\"DEPARTMENT_ID\" IS NOT NULL)\n   2 - access(\"EMPLOYEES\"\
  .\"EMPLOYEE_ID\"=101)\n\nColumn Projection Information (identified by operation\
  \ id):\n-----------------------------------------------------------\n\n   1 - \"\
  EMPLOYEES\".\"FIRST_NAME\"[VARCHAR2,20], \"EMPLOYEES\".\"LAST_NAME\"[VARCHAR2,25]\n\
  \   2 - \"EMPLOYEES\".ROWID[ROWID,10]\n\nNote\n-----\n   - rule based optimizer\
  \ used (consider using cbo)\n```\n\n`DBMS_XPLAN.DISPLAY` 函数一个非常好的特性是，在确定了您需要的详细信息基础级别后，您可以添加个别选项，以便在该级别基础输出之外额外显示。例如，如果您只需要最基本的输出信息，但还想了解成本信息，可以按如下方式格式化\
  \ `DBMS_XPLAN.DISPLAY`：\n\n```sql\nSELECT * FROM table(dbms_xplan.display(null,null,'BASIC\
  \ +COST'));\n```\n\n```\n--------------------------------------------------------------------------------\n\
  | Id  | Operation                    | Name                       | Cost (%CPU)|\n\
  --------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT             |                            |     1   (0)|\n\
  |   1 |  RESULT CACHE                | 0fnzzb94z0dj2b5vzkmq4f4xcu |            |\n\
  |   2 |   TABLE ACCESS BY INDEX ROWID| EMPLOYEES                  |     1   (0)|\n\
  |   3 |    INDEX UNIQUE SCAN         | EMP_EMP_ID_PK              |     0   (0)|\n\
  --------------------------------------------------------------------------------\n\
  ```\n\n您也可以做相反的操作，即减去您不想看到的信息。如果您想查看使用 `TYPICAL` 级别的输出，但不想看到 `ROWS` 或 `BYTES` 信息，可以执行以下查询来显示该级别的输出：\n\
  \n```sql\nSELECT * FROM table(dbms_xplan.display(null,null,'TYPICAL -BYTES -ROWS'));\n\
  ```\n\n```\n-----------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name          | Cost (%CPU)| Time     |\n\
  -----------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |               |     1   (0)| 00:00:01 |\n\
  |*  1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES     |     1   (0)| 00:00:01 |\n\
  |*  2 |   INDEX UNIQUE SCAN         | EMP_EMP_ID_PK |     0   (0)| 00:00:01 |\n\
  -----------------------------------------------------------------------------\n\
  ```\n\n### 9-3. 图形化显示执行计划\n\n#### 问题\n\n您希望无需运行 SQL 语句即可快速查看执行计划。您希望通过 GUI 查看计划，以便只需点击即可获取。\n\
  \n#### 解决方案\n\n在 Enterprise Manager 中，您可以快速找到查询的执行计划。要使用此功能，您必须在环境中配置 Enterprise\
  \ Manager。这可以是管理单个数据库的 Database Control，也可以是管理企业数据库的 Grid Control。要查看给定查询的执行计划，您需要导航到\
  \ Enterprise Manager 的 Top Sessions 屏幕。（请参阅您特定版本的 Oracle Enterprise Manager 文档。）在\
  \ Top Sessions 屏幕上，您可以深入查看会话特定信息。首先，找到您的会话。然后，单击 Current SQL 下显示的 SQL ID。从那里，您可以单击\
  \ Plan，执行计划就会出现，如 图 9-1 所示。\n\n![images](img/0901.jpg)\n\n`图 9-1. Enterprise Manager\
  \ 中的示例执行计划输出`\n\n#### 工作原理\n\n使用 Enterprise Manager 可以非常轻松地找到数据库中当前正在运行的 SQL 操作的执行计划。如果某个特定\
  \ SQL 语句的性能不如预期，此方法是确定正在运行的查询或其他 SQL 操作的执行计划的最快方法之一。要使用此功能，您必须拥有 Enterprise Manager\
  \ 的 Tuning Pack 许可。\n\n### 9-4. 阅读执行计划\n\n#### 问题\n\n您已为给定 SQL 语句运行了执行计划解释，并希望了解如何阅读该计划。\n\
  \n#### 解决方案\n\nSQL 操作的执行计划会逐步详细说明 Oracle 优化器将如何执行您的 SQL 操作。使用`AUTOTRACE`，我们可以获取以下查询的执行计划：\n\
  \n```sql\nset autotrace trace explain\n\nSELECT ename, dname\nFROM emp JOIN dept\
  \ USING (deptno);\n```\n\n```\n----------------------------------------------------------------------------------------\n\
  | Id  | Operation                    | Name    | Rows  | Bytes | Cost (%CPU)| Time\
  \     |\n----------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT             |         |    14 |   308 |     6  (17)| 00:00:01\
  \ |\n|   1 |   MERGE JOIN                 |         |    14 |   308 |     6  (17)|\
  \ 00:00:01 |\n|   2 |    TABLE ACCESS BY INDEX ROWID| DEPT    |     4 |    52 |\
  \     2   (0)| 00:00:01 |\n|   3 |     INDEX FULL SCAN          | PK_DEPT |    \
  \ 4 |       |     1   (0)| 00:00:01 |\n|*  4 |    SORT JOIN                 |  \
  \       |    14 |   126 |     4  (25)| 00:00:01 |\n|   5 |     TABLE ACCESS FULL\
  \        | EMP     |    14 |   126 |     3   (0)| 00:00:01 |\n----------------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \n   4 - access(\"EMP\".\"DEPTNO\"=\"DEPT\".\"DEPTNO\")\n       filter(\"EMP\".\"\
  DEPTNO\"=\"DEPT\".\"DEPTNO\")\n\nNote\n-----\n   - automatic DOP: Computed Degree\
  \ of Parallelism is 1 because of parallel threshold\n```\n\n一旦您有了一个需要解读的执行计划，就可以判断哪些步骤最先执行，因为最内层或缩进最深的步骤最先执行，并且执行顺序是从内到外，自顶向下。在上述查询中，我们正在连接`EMP`和`DEPT`表。根据执行计划，该查询的处理步骤如下：\n\
  \n1.  扫描`PK_DEPT`索引（ID 3）。\n2.  扫描`EMP`表的所有行（ID 5）。\n3.  根据`PK_DEPT`索引中的匹配条目，从`DEPT`表中检索行（ID\
  \ 2）。\n4.  对来自`EMP`表的结果数据进行排序（ID 4）。\n5.  然后通过`MERGE JOIN`连接来自`EMP`和`DEPT`表的数据（ID\
  \ 1）。\n6.  查询的结果数据返回给用户（ID 0）。\n\n#### 工作原理\n\n当您第一次查看一个执行计划，并希望快速了解查询将按哪些步骤执行时，请执行以下操作：\n\
  \n1.  在计划中寻找缩进最深的行（最右边的行）。这些将最先执行。\n2.  如果有多个行处于同一缩进级别，它们将在计划中按自顶向下的方式执行，即计划中最顶部的行先执行，然后向下移动。\n\
  3.  查看下一个缩进级别最深的行或行，并继续向外层处理。\n4.  执行计划的顶部对应于计划中缩进最少或最左边的部分，通常是结果返回给用户的地方。\n\n一旦您有了一个查询的执行计划，并能理解查询将被处理的顺序，您就可以进行一些分析，以确定您正在查看的执行计划是否高效。在查看执行计划时，请回答这些问题，并在确定计划是否高效时考虑以下因素：\n\
  \n*   查询的访问路径是什么（查询是执行全表扫描还是使用索引）？\n*   查询的连接方法是什么（如果存在连接条件）？\n*   查看查询`WHERE`子句中的过滤条件所涉及的列，并确定它们是否被索引。\n\
  *   获取查询中每个表的数据量或行数。这些表是小型、中型还是大型？这可能有助于您确定最合适的连接方法。关于连接方法类型的概要，请参见表 9-3。\n*   查询所涉及对象的统计信息上次收集是什么时候？\n\
  *   查看执行计划的`COST`列，获取初始成本。\n\n通过查看我们最初的执行计划，我们确定`EMP`表尺寸较大，并且在`DEPT`和`EMP`表之间连接条件中使用的`DEPTNO`列上没有索引。通过在`EMP`表的`DEPTNO`列上创建索引并收集`EMP`表的统计信息，新的计划现在使用了索引：\n\
  \n```\n---------------------------------------------------------------------------------------\n\
  | Id  | Operation                    | Name   | Rows  | Bytes | Cost (%CPU)| Time\
  \     |\n---------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT             |        |    14 |   280 |     6  (17)| 00:00:01\
  \ |\n|   1 |   MERGE JOIN                 |        |    14 |   280 |     6  (17)|\
  \ 00:00:01 |\n|   2 |    TABLE ACCESS BY INDEX ROWID| EMP    |    14 |    98 | \
  \    2   (0)| 00:00:01 |\n|   3 |     INDEX FULL SCAN          | EMP_I2 |    14\
  \ |       |     1   (0)| 00:00:01 |\n|*  4 |    SORT JOIN                 |    \
  \    |     4 |    52 |     4  (25)| 00:00:01 |\n|   5 |     TABLE ACCESS FULL  \
  \      | DEPT   |     4 |    52 |     3   (0)| 00:00:01 |\n---------------------------------------------------------------------------------------\n\
  ```\n\n![images](img/t0903.jpg)\n\n有关并行执行计划的信息，请参见第 15 章。\n\n![images](img/square.jpg)\
  \ **提示** 导致执行计划次优的最常见原因之一是查询所涉及的一个或多个对象缺少最新的统计信息。\n\n### 9-5. 监控长时间运行的 SQL 语句\n\n\
  #### 问题\n\n您有一个运行时间很长的 SQL 语句，希望能够监控该语句的进度并了解它何时完成。\n\n#### 解决方案\n\n通过查看数据字典视图`V$SESSION_LONGOPS`中长时间运行查询的信息，您可以估算查询大概何时完成。假设您正在对一个大型表运行以下带有连接条件的查询：\n\
  \n```sql\nSELECT last_name, first_name FROM employees_big\nWHERE last_name = 'EVANS';\n\
  ```\n\n通过对`V$SESSION_LONGOPS`视图进行一个简单的查询，您可以快速了解查询将执行多长时间以及何时完成：\n\n```sql\nSELECT\
  \ username, target, sofar blocks_read, totalwork total_blocks,\nround(time_remaining/60)\
  \ minutes\nFROM v$session_longops\nWHERE sofar <> totalwork\nand username = 'HR';\n\
  ```\n\n```\nUSERNAME     TARGET               BLOCKS_READ TOTAL_BLOCKS    MINUTES\n\
  ------------ -------------------- ----------- ------------ ----------\nHR      \
  \     HR.EMPLOYEES_BIG           81101      2353488         10\n```\n\n随着查询的进行，您会看到`BLOCKS_READ`列增加，而`MINUTES`列减少。通常需要添加`WHERE`子句来排除已完成的行，这就是为什么在上面的查询中，它要求显示`SOFAR`列不等于`TOTALWORK`的行。\n\
  \n#### 工作原理\n\n为了能够在`V$SESSION_LONGOPS`视图中监控查询，需满足以下要求：\n\n*   查询必须运行六秒或更长时间。\n\
  *   被访问的表必须大于 10,000 个数据库块。\n*   必须设置`TIMED_STATISTICS`或启用`SQL_TRACE`。\n*   查询中的对象必须通过`DBMS_STATS`或`ANALYZE`进行过分析。\n\
  \n此视图可以包含`SELECT`语句、DML 语句（如`UPDATE`）以及 DDL 语句（如`CREATE INDEX`）的信息。一些常见的会出现在`V$SESSION_LONGOPS`视图中的操作包括表扫描、索引扫描、连接操作、并行操作、RMAN\
  \ 备份操作、排序操作和 Data Pump 操作。\n\n### 9-6. 识别当前正在执行的、消耗资源的 SQL 语句\n\n\n## 9-6. 识别资源消耗最大的\
  \ SQL\n\n### 问题\n\n您的数据库中存在争用问题，并希望识别消耗系统资源最多的 SQL 语句。\n\n![图示](img/square.jpg)\
  \ **注意** 配方 9-9 展示了如何检查历史记录，以查找过去执行过、但当前未在执行的资源消耗大的 SQL 语句。\n\n### 解决方案\n\n查看`V$SQLSTATS`视图，它提供了当前或最近运行的\
  \ SQL 语句的信息。如果您想获取最近执行磁盘 I/O 最多的前五个 SQL 语句，可以执行以下查询：\n\n```sql\nSELECT sql_text,\
  \ disk_reads FROM\n  (SELECT sql_text, buffer_gets, disk_reads, sorts,\n   cpu_time/1000000\
  \ cpu, rows_processed, elapsed_time\n   FROM v$sqlstats\n   ORDER BY disk_reads\
  \ DESC)\nWHERE rownum <= 5;\n```\n\n如果您想按 CPU 时间、排序次数、加载次数、失效次数或任何其他列查看前五个 SQL 语句，只需将上述查询中的`disk_reads`列替换为您期望的列即可。`SQL_TEXT`列可能会使结果看起来很杂乱，因此另一种方法是使用`SQL_ID`列替代`SQL_TEXT`列，然后根据显示的统计数据，您可以运行一个查询，仅基于给定的`SQL_ID`获取其`SQL_TEXT`。\n\
  \n### 工作原理\n\n`V$SQLSTATS`视图旨在帮助更快速地查找有关资源消耗大的 SQL 语句的信息。`V$SQLSTATS`包含与`V$SQL`和`V$SQLAREA`视图相同的信息，但它只包含了这些视图的一个列子集。然而，数据在`V$SQLSTATS`中保留的时间比在`V$SQL`或`V$SQLAREA`中更长。\n\
  \n有时，会存在一些与维护数据库运行的后台处理相关的 SQL 语句，您可能不希望看到这些语句，而只希望看到与您的应用程序相关的那些。如果您将`V$SQLSTATS`与`V$SQL`连接，就可以看到特定用户的信息。请参见以下示例：\n\
  \n```sql\nSELECT schema, sql_text, disk_reads, round(cpu,2) FROM\n  (SELECT s.parsing_schema_name\
  \ schema, t.sql_id, t.sql_text, t.disk_reads,\n  t.sorts, t.cpu_time/1000000 cpu,\
  \ t.rows_processed, t.elapsed_time\n   FROM v$sqlstats t join v$sql s on(t.sql_id\
  \ = s.sql_id)\n  WHERE parsing_schema_name = 'SCOTT'\n  ORDER BY disk_reads DESC)\n\
  WHERE rownum <= 5;\n```\n\n请记住，`V$SQL`代表保存在共享池中的 SQL，其数据老化清除的速度比`V$SQLSTATS`中的数据快，因此此查询不会返回已经从共享池中老化清除的\
  \ SQL 的数据。\n\n### 9-7. 查看当前运行 SQL 的执行统计信息\n\n### 问题\n\n您想查看当前正在运行的 SQL 语句的执行统计信息。\n\
  \n### 解决方案\n\n您可以使用`V$SQL_MONITOR`视图来查看当前运行 SQL 的实时统计信息，并根据 CPU 使用率、缓冲区获取次数、磁盘读取次数和查询耗时等统计信息，查看给定查询所使用的资源消耗。首先，让我们在数据库中查找一个当前正在执行的查询：\n\
  \n```sql\nSELECT sid, sql_text FROM v$sql_monitor\nWHERE status = 'EXECUTING';\n\
  ```\n```\n       SID SQL_TEXT\n---------- -----------------------------------------------------------------\n\
  \       100 select department_name, city, avg(salary)\n           from employees_big\
  \ join departments using(department_id)\n           join locations using (location_id)\n\
  \           group by department_name, city\n           having avg(salary) > 2000\n\
  \           order by 2,1\n```\n\n对于在`V$SQL_MONITOR`中找到的上述正在执行的查询，我们可以在其执行时查看该语句的资源利用情况：\n\
  \n```sql\nSELECT sid, buffer_gets, disk_reads, round(cpu_time/1000000,1) cpu_seconds\n\
  FROM v$sql_monitor\nWHERE SID=100\nAND status = 'EXECUTING';\n```\n```\n       SID\
  \ BUFFER_GETS DISK_READS CPU_SECONDS\n---------- ----------- ---------- -----------\n\
  \       100      149372       4732        39.1\n```\n\n`V$SQL_MONITOR`视图包含当前正在运行的\
  \ SQL 语句，以及最近运行过的 SQL 语句。如果您想查看数据库中消耗 CPU 最多的前五个查询，可以执行以下查询：\n\n```sql\nSELECT *\
  \ FROM (\n  SELECT sid, buffer_gets, disk_reads, round(cpu_time/1000000,1) cpu_seconds\n\
  \  FROM v$sql_monitor\n  ORDER BY cpu_time desc)\nWHERE rownum <= 5;\n```\n```\n\
  \       SID BUFFER_GETS DISK_READS CPU_SECONDS\n---------- ----------- ----------\
  \ -----------\n        20     1332665      30580       350.5\n       105      795330\
  \      13651       269.7\n        20      259324       5449        71.6\n      \
  \  20      259330       5485        71.3\n       100      259236       8188    \
  \    67.9\n```\n\n\n### 工作原理\n\nSQL 语句在 `V$SQL_MONITOR` 中针对以下条件进行监控：\n\n*   对任何并行语句自动监控\n\
  *   对任何 DML 或 DDL 语句自动监控\n*   如果特定 SQL 语句消耗了至少五秒的 CPU 或 I/O 时间，则自动监控\n*   对任何在语句级别设置了监控的\
  \ SQL 语句进行监控\n\n要在语句级别开启监控，可以使用提示。参见以下示例：\n\n```sql\nSELECT /*+ monitor */ ename,\
  \ dname\nFROM emppart JOIN dept USING (deptno);\n```\n\n如果由于某种原因，你不想监控某些语句，可以在语句中使用\
  \ `NOMONITOR` 提示来阻止监控的发生。\n\n`V$SQL_MONITOR` 中的统计信息几乎是实时更新的，即每秒更新一次。任何当前正在执行并被监控的\
  \ SQL 语句都可以在 `V$SQL_MONITOR` 中找到。已完成的查询在执行结束后至少会保留一分钟，并且根据新执行查询所需的空间要求，可能会保留更长时间。`V$SQL_MONITOR`\
  \ 视图的一个关键优势是它为给定查询的每一次执行都提供了详细的统计信息，这与 `V$SQL` 不同，后者是多个 SQL 语句执行的累积结果。为了深入查看 SQL\
  \ 语句的特定执行，你需要来自 `V$SQL_MONITOR` 的三个列：\n\n1.  `SQL_ID`\n2.  `SQL_EXEC_START`\n3.\
  \  `SQL_EXEC_ID`\n\n如果我们想查看给定查询的所有执行（基于 `SQL_ID` 列），我们可以通过查询这三个必要的列来钻取到 SQL 查询的特定执行来获取该信息：\n\
  \n```sql\nSELECT * FROM (\n  SELECT sql_id, to_char(sql_exec_start,'yyyy-mm-dd:hh24:mi:ss')\
  \ sql_exec_start,\n         sql_exec_id, sum(buffer_gets) buffer_gets,\n       \
  \  sum(disk_reads) disk_reads, round(sum(cpu_time/1000000),1) cpu_secs\n  FROM v$sql_monitor\n\
  \  WHERE sql_id = 'fcg00hyh7qbpz'\n  GROUP BY sql_id, sql_exec_start, sql_exec_id\n\
  \  ORDER BY 6 desc)\nWHERE rownum <= 5;\n```\n\n```\nSQL_ID        SQL_EXEC_START\
  \      SQL_EXEC_ID BUFFER_GETS DISK_READS CPU_SECS\n------------- -------------------\
  \ ----------- ----------- ---------- --------\nfcg00hyh7qbpz 2011-05-21:12:28:10\
  \    16777222      259324       5449     71.6\nfcg00hyh7qbpz 2011-05-21:12:29:24\
  \    16777223      259330       5485     71.3\nfcg00hyh7qbpz 2011-05-21:12:26:08\
  \    16777220      213823       4502     58.4\nfcg00hyh7qbpz 2011-05-21:12:27:09\
  \    16777221      211752       4579     58.1\nfcg00hyh7qbpz 2011-05-21:12:25:37\
  \    16777219      107973       2414     29.4\n```\n\n请记住，如果语句在并行运行，查询的每个并行线程都会出现一行，包括查询协调器。但是，它们将共享相同的\
  \ `SQL_ID`、`SQL_EXEC_START` 和 `SQL_EXEC_ID` 值。在这种情况下，如果你愿意，可以对特定统计信息执行聚合。参见以下并行查询示例，其中由\
  \ `PX_SERVER#` 列表示并行从属信息：\n\n```sql\nSELECT sql_id, sql_exec_start, sql_exec_id,\
  \ px_server# px#, disk_reads,\n       cpu_time/1000000 cpu_secs, buffer_gets\nFROM\
  \ v$sql_monitor\nWHERE status = 'EXECUTING'\nORDER BY px_server#;\n```\n\n```\n\
  SQL_ID        SQL_EXEC_S SQL_EXEC_ID PX# DISK_READS CPU_SECS BUFFER_GETS\n-------------\
  \ ---------- ----------- --- ---------- -------- -----------\n0gzf8010xdasr 2011-05-21\
  \    16777216   1       4306     38.0      136303\n0gzf8010xdasr 2011-05-21    16777216\
  \   2       4625     40.6      146497\n0gzf8010xdasr 2011-05-21    16777216   3\
  \       4774     41.6      149717\n0gzf8010xdasr 2011-05-21    16777216   4    \
  \   4200     37.6      132167\n0gzf8010xdasr 2011-05-21    16777216         6  \
  \   92.2          53\n```\n\n然后，要对给定查询（在我们的例子中是并行查询）执行简单聚合，聚合是针对构成给定 SQL 语句单次执行的三个关键列进行的：\n\
  \n```sql\nSELECT sql_id, sql_exec_start, sql_exec_id, sum(buffer_gets) buffer_gets,\n\
  \       sum(disk_reads) disk_reads, round(sum(cpu_time/1000000),1) cpu_seconds\n\
  FROM v$sql_monitor\nWHERE sql_id = '0gzf8010xdasr'\nGROUP BY sql_id, sql_exec_start,\
  \ sql_exec_id;\n```\n\n```\nSQL_ID        SQL_EXEC_S SQL_EXEC_ID BUFFER_GETS DISK_READS\
  \ CPU_SECONDS\n------------- ---------- ----------- ----------- ---------- -----------\n\
  0gzf8010xdasr 2011-05-21    16777216      642403      20351       283.7\n```\n\n\
  如果你想对一个 SQL 语句执行聚合，不管它执行了多少次，只需在 `SQL_ID` 列上运行聚合查询即可，如下所示：\n\n```sql\nSELECT sql_id,\
  \ sum(buffer_gets) buffer_gets,\n       sum(disk_reads) disk_reads, round(sum(cpu_time/1000000),1)\
  \ cpu_seconds\nFROM v$sql_monitor\nWHERE sql_id = '0gzf8010xdasr'\nGROUP BY sql_id;\n\
  ```\n\n![图片](img/square.jpg) **注意** 必须将初始化参数 `STATISTICS_LEVEL` 设置为 `TYPICAL` 或\
  \ `ALL`，并且将 `CONTROL_MANAGEMENT_PACK_ACCESS` 设置为 `DIAGNOSTIC+TUNING`，SQL 监控才能发生。\n\
  \n### 9-8. 监控 SQL 执行计划的进度\n\n#### 问题\n\n你想从正在使用的执行计划中查看查询的进度。\n\n## 解决方案\n\n有几种方法可以获取信息，以查看查询在执行计划中的执行位置。首先，通过查询`V$SQL_PLAN_MONITOR`视图，您可以获取所有正在进行的查询以及最近已完成查询的信息。如果我们连接两个表以获取员工和部门信息，我们的查询如下所示：\n\
  \n```sql\nSELECT ename, dname\nFROM emppart JOIN dept USING (deptno);\n```\n\n执行计划输出为：\n\
  \n```\n--------------------------------------------\n| Id  | Operation         \
  \      | Name     |\n--------------------------------------------\n|   0 | SELECT\
  \ STATEMENT        |          |\n|   1 |  PX COORDINATOR         |          |\n\
  |   2 |   PX SEND QC (RANDOM)   | :TQ10001 |\n|   3 |    HASH JOIN            |\
  \          |\n|   4 |     BUFFER SORT         |          |\n|   5 |      PX RECEIVE\
  \         |          |\n|   6 |       PX SEND BROADCAST | :TQ10000 |\n|   7 |  \
  \      TABLE ACCESS FULL| DEPT     |\n|   8 |     PX BLOCK ITERATOR   |        \
  \  |\n|   9 |      TABLE ACCESS FULL  | EMPPART  |\n--------------------------------------------\n\
  ```\n\n要在上述查询运行时查看其信息，您可以发出如下所示的查询（为简洁起见，已删除部分行）：\n\n```sql\ncolumn operation format\
  \ a25\ncolumn plan_line_id format 9999 heading 'LINE'\ncolumn plan_options format\
  \ a10 heading 'OPTIONS'\ncolumn status format a10\ncolumn output_rows heading 'ROWS'\n\
  break on sid on sql_id on status\n\nSELECT sid, sql_id, status, plan_line_id,\n\
  plan_operation || ' ' || plan_options operation, output_rows\nFROM v$sql_plan_monitor\n\
  WHERE status not like '%DONE%'\nORDER BY 1,4;\n```\n\n查询输出结果如下：\n\n```\n       SID\
  \ SQL_ID        STATUS      LINE OPERATION                               ROWS\n\
  ---------- ------------- ---------- ----- ------------------------- --------------------\n\
  \        18 36bdwxutr5n75 EXECUTING      0 SELECT STATEMENT                    \
  \     3929326\n                                                          1 PX COORDINATOR\
  \                3929326\n        27 36bdwxutr5n75 EXECUTING      0 SELECT STATEMENT\
  \                              0\n                                             \
  \             2 PX SEND QC (RANDOM)          1752552\n                         \
  \                                 3 HASH JOIN                    1752552\n     \
  \                                                     8 PX BLOCK ITERATOR      \
  \      1752552\n                                                          9 TABLE\
  \ ACCESS FULL            1752552\n       101 36bdwxutr5n75 EXECUTING      0 SELECT\
  \ STATEMENT                              0\n                                   \
  \                       2 PX SEND QC (RANDOM)          2148232\n               \
  \                                           3 HASH JOIN                    2148232\n\
  \                                                          8 PX BLOCK ITERATOR \
  \           2148232\n                                                          9\
  \ TABLE ACCESS FULL            2148232\n```\n\n在此特定示例中，`EMPPART`表的并行度为 2，我们可以看到对于\
  \ SID 27 和 101，这些是获取数据的并行从属进程。当这些进程将数据传递回查询协调器，然后再返回给用户时，我们可以查看 SID 18 时看到这一点。如果我们只是针对`V$SQL_PLAN_MONITOR`视图运行后续查询，我们就可以在查询执行时查看其进度。在上述示例中，我们只看到随着查询的进行，输出的行值在增加。\n\
  \n另一种通过执行计划查看查询进度的方法是使用`DBMS_SQLTUNE.REPORT_SQL_MONITOR`函数。如果我们使用与上一个示例中针对`EMPPART`和`DEPT`表相同的查询，我们可以运行`REPORT_SQL_MONITOR`函数来获取进度的图形化视图。请参阅以下示例，了解如何生成可产生\
  \ HTML 文件的文件，该文件随后可用于查看我们的进度。图 9-2 显示了生成报告的部分内容。\n\n```sql\nset pages 9999\nset\
  \ long 1000000\nSELECT DBMS_SQLTUNE.REPORT_SQL_MONITOR(sql_id=> '36bdwxutr5n75',type=>'HTML')\
  \ FROM dual;\n```\n\n![images](img/0902.jpg)\n\n*图 9-2. `DBMS_SQLTUNE.REPORT_SQL_MONITOR`生成的\
  \ HTML 报告示例*\n\n## 工作原理\n\n`V$SQL_PLAN_MONITOR`视图是从`V$SQL_MONITOR`视图填充的（参见配方 9-7）。这两个视图都是\
  \ Oracle 11g 新增的，并在语句执行的每秒钟更新一次。每当 SQL 语句被监控时，`V$SQL_MONITOR`视图就会被填充。\n\n`DBMS_SQLTUNE.REPORT_SQL_MONITOR`函数可以通过多种方式调用。报告中细节的详细程度以及您希望看到的细节类型，可以根据传递给函数的参数进行更改。输出可以多种格式查看，包括纯文本、HTML\
  \ 和 XML。默认输出格式是纯文本。例如，假设我们想查看针对`EMPPART`和`DEPT`表的连接查询的输出。在这种情况下，我们希望输出为文本格式。我们希望聚合细节，并且只想看到最基本级别的细节。我们的查询将按如下方式运行：\n\
  \n```sql\nSELECT DBMS_SQLTUNE.REPORT_SQL_MONITOR\n(sql_id=>'36bdwxutr5n75',event_detail=>'NO',report_level=>'BASIC')\
  \ FROM dual;\n```\n\n报告输出如下：\n\n```\nSQL Monitoring Report\n\nSQL Text\n------------------------------\n\
  select ename, dname from emppart join dept using (deptno)\n\nGlobal Information\n\
  ------------------------------\n Status              :  EXECUTING\n Instance ID\
  \         :  1\n Session             :  SCOTT (27:229)\n SQL ID              : \
  \ 36bdwxutr5n75\n SQL Execution ID    :  16777225\n Execution Started   :  05/15/2011\
  \ 14:56:16\n First Refresh Time  :  05/15/2011 14:56:16\n Last Refresh Time   :\
  \  05/15/2011 15:09:47\n Duration            :  812s\n Module/Action       :  SQL*Plus/-\n\
  \ Service             :  SYS$USERS\n Program             :  sqlplus@ora\n Fetch\
  \ Calls         :  6131367\n\nGlobal Stats\n==========================================================================================\n\
  | Elapsed |   Cpu   |    IO    | Concurrency |  Other   | Fetch | Buffer | Read\
  \ | Read  |\n| Time(s) | Time(s) | Waits(s) |  Waits(s)   | Waits(s) | Calls | \
  \ Gets  | Reqs | Bytes |\n=========================================================================================\n\
  |     398 |     235 |     6.45 |        0.04 |      156 |    6M |   556K | 17629|\
  \   4GB |\n=========================================================================================\n\
  ```\n\n有关执行`REPORT_SQL_MONITOR`函数可用的所有参数的完整列表，请参阅《Oracle PL/SQL Packages and Types\
  \ Reference》。这是一个非常强大的函数，根据您的具体需求，有无数种组合可以进行报告。\n\n### 9-9. 识别过去执行过的消耗资源的 SQL 语句\n\
  \n#### 问题\n\n您希望查看以前运行的 SQL 语句的信息，以帮助识别资源密集型操作。\n\n![images](img/square.jpg) **注意**\
  \ 配方 9-6 展示了如何识别*当前正在执行的*资源密集型语句。\n\n\n## 解决方案\n\n`DBA_HIST_SQLSTAT` 和 `DBA_HIST_SQLTEXT`\
  \ 视图是用于获取 SQL 语句历史信息及其资源消耗统计信息的视图之一。例如，要获取历史信息以了解哪些 SQL 语句导致了最多的磁盘读取，您可以针对 `DBA_HIST_SQLSTAT`\
  \ 执行以下查询：\n\n```sql\nSELECT * FROM (\n  SELECT sql_id, sum(disk_reads_delta) disk_reads_delta,\n\
  \                 sum(disk_reads_total) disk_reads_total,\n                 sum(executions_delta)\
  \ execs_delta,\n                 sum(executions_total) execs_total\n  FROM dba_hist_sqlstat\n\
  \  GROUP BY sql_id\n  ORDER BY 2 desc)\nWHERE rownum <= 5;\n```\n\n```\nSQL_ID \
  \       DISK_READS_DELTA DISK_READS_TOTAL EXECS_DELTA EXECS_TOTAL\n-------------\
  \ ---------------- ---------------- ----------- -----------\n36bdwxutr5n75     \
  \     6306401         10933153          13          24\n0bx1z9rbm10a1          1590538\
  \          1590538           2           2\n0gzf8010xdasr           970292     \
  \     1848743           1           3\n1gtkxf53fk7bp           969785          \
  \ 969785           7           7\n4h81qj5nspx6s           869588           869588\
  \           2           2\n```\n\n由于 SQL 的实际文本并未存储在 `DBA_HIST_SQLSTAT` 中，因此您可以查看关联的\
  \ `DBA_HIST_SQLTEXT` 视图以获取磁盘读取次数最高的查询的 SQL 文本：\n\n```sql\nSELECT sql_text FROM dba_hist_sqltext\n\
  WHERE sql_id = '36bdwxutr5n75';\n```\n\n```\nSQL_TEXT\n----------------------------------------\n\
  select ename, dname\nfrom emppart join dept using (deptno)\n```\n\n## 工作原理\n\n从\
  \ `DBA_HIST_SQLSTAT` 视图中可以获取许多关于历史 SQL 语句的有用统计信息，包括以下内容：\n\n*   CPU 利用率\n*   执行耗时\n\
  *   执行次数\n*   总磁盘读取和写入次数\n*   缓冲区获取信息\n*   并行服务器信息\n*   处理的行数\n*   解析调用\n*   失效次数\n\
  \n此外，这些信息被分为两个数据视图。一组列中包含“总计”信息，另一组列中包含“增量”信息。“总计”列是基于实例启动计算的。“增量”列则基于 `DBA_HIST_SNAPSHOT`\
  \ 视图中的 `BEGIN_INTERVAL_TIME` 和 `END_INTERVAL_TIME` 列的值。\n\n如果您想查看历史 SQL 语句的执行计划信息，有一个关联的视图可用于检索给定查询的该信息。您可以访问\
  \ `DBA_HIST_SQL_PLAN` 视图以获取历史 SQL 语句的执行计划信息。请参见以下示例：\n\n```sql\nSELECT id, operation\
  \ || ' ' || options operation, object_name, cost, bytes\nFROM dba_hist_sql_plan\n\
  WHERE sql_id = '0gzf8010xdasr'\nORDER BY 1;\n```\n\n```\n        ID OPERATION  \
  \               OBJECT_NAME        COST      BYTES\n---------- -------------------------\
  \ ------------ ---------- ----------\n         0 SELECT STATEMENT              \
  \                      73679\n         1 PX COORDINATOR\n         2 PX SEND QC (RANDOM)\
  \       :TQ10001          73679 3506438144\n         3 HASH JOIN               \
  \                      73679 3506438144\n         4 BUFFER SORT\n         5 PX RECEIVE\
  \                                         3          52\n         6 PX SEND BROADCAST\
  \         :TQ10000              3          52\n         7 TABLE ACCESS FULL    \
  \     DEPT                  3          52\n         8 PX BLOCK ITERATOR        \
  \                   73550 1434451968\n         9 TABLE ACCESS FULL        EMPPART\
  \            73550 1434451968\n\n10 rows selected.\n```\n\n### 9-10. 比较系统变更后的 SQL\
  \ 性能\n\n#### 问题\n\n您正在进行系统变更，并希望查看该变更对 SQL 语句性能的影响。\n\n#### 解决方案\n\n通过使用 Oracle\
  \ SQL 性能分析器，特别是 `DBMS_SQLPA` 包，您可以量化系统变更将对一个或多个 SQL 语句产生的性能影响。系统变更可以是初始化参数变更、数据库升级或可能影响\
  \ SQL 语句性能的任何其他环境变更。\n\n假设您将执行数据库升级，并希望查看升级对数据库中运行的一系列 SQL 语句的影响。使用 `DBMS_SQLPA`\
  \ 包，执行分析所需的基本步骤通常如下：\n\n1.  基于单个或一系列 SQL 语句创建分析任务。\n2.  基于当前配置运行这些语句的分析。\n3.  对环境执行给定的变更（如数据库升级）。\n\
  4.  基于新配置运行这些语句的分析。\n5.  运行“前后”比较以确定变更对 SQL 语句性能的影响。\n6.  生成报告以查看比较结果的输出。\n\n使用上述步骤，参见以下针对单个查询的示例。首先，我们需要创建一个分析任务。对于数据库升级示例，这将在合适的\
  \ Oracle 11g 测试数据库上完成。在本例中，我们将在 SQL*Plus 中对一个特定的 SQL 语句进行分析：\n\n```sql\nvariable\
  \ g_task varchar2(100);\n```\n\n```sql\nEXEC :g_task := DBMS_SQLPA.CREATE_ANALYSIS_TASK(sql_text\
  \ => 'select ename, dname from emppart join dept using(deptno)');\n```\n\n为了正确模拟此场景，在我们的\
  \ Oracle 11g 数据库上，我们将 `optimizer_features_enable` 参数设置回 Oracle 10g。然后，我们使用“变更前”条件——在本例中，使用先前版本的优化器——运行查询分析：\n\
  \n```sql\nalter session set optimizer_features_enable='10.2.0.4';\n```\n\n```sql\n\
  EXEC DBMS_SQLPA.EXECUTE_ANALYSIS_TASK(task_name=>:g_task,execution_type=>'test execute',execution_name=>'before_change');\n\
  ```\n\n完成变更前分析后，我们将优化器设置为当前数据库版本，在本例中，这代表我们将升级到的数据库版本：\n\n```sql\nalter session\
  \ set optimizer_features_enable='11.2.0.1';\n```\n\n```sql\nEXEC DBMS_SQLPA.EXECUTE_ANALYSIS_TASK(task_name=>:g_task,execution_type=>'test\
  \ execute',execution_name=>'after_change');\n```\n\n现在，我们已经基于给定的 SQL 语句创建了分析任务，并基于变更条件为该语句运行了“前后”分析任务，我们现在可以运行一个分析任务来比较查询的两次执行结果。有多个指标可以比较。在本例中，我们比较“缓冲区获取次数”：\n\
  \n```sql\nEXEC DBMS_SQLPA.EXECUTE_ANALYSIS_TASK(task_name=>:g_task,execution_type=>'COMPARE\
  \ PERFORMANCE',execution_name=>'compare change',execution_params => dbms_advisor.arglist('comparison_metric','buffer_gets'));\n\
  ```\n\n最后，我们现在可以使用 `DBMS_SQLPA` 包的 `REPORT_ANALYSIS_TASK` 函数来查看结果。在以下示例中，我们希望仅在执行计划发生更改时才查看输出。输出可以是多种格式，最流行的是\
  \ HTML 和纯文本。对于我们的示例，我们生成了文本输出：\n\n```sql\nset long 100000 longchunksize 100000 linesize\
  \ 200 head off feedback off echo off\nspool compare_report.txt\n```\n\n```sql\n\
  SELECT DBMS_SQLPA.REPORT_ANALYSIS_TASK(:g_task, 'TEXT', 'CHANGED_PLANS', 'ALL')\n\
  FROM DUAL;\n```\n\n```\nGeneral Information\n--------------------------------------------------------------------------------------------\n\
  \ Task Information:                              Workload Information:\n----------------------------------------------\
  \  --------------------------------------------\n  Task Name    : TASK_1383\n  Task\
  \ Owner   : SCOTT\n  Description  :\n```\n\n\n\n"
