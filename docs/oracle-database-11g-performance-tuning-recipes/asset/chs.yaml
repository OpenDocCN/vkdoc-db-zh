  \n此输出将帮助你确定 SQL 语句的效率，并提供有关如何调整它的见解。有关如何手动调整查询的详细信息，请参阅第 9 章；有关自动 SQL 调优的详细信息，请参阅第\
  \ 11 章。\n\n#### 工作原理\n\n本配方“解决方案”部分描述的过程允许你快速识别资源密集型进程，然后将 OS 进程映射到数据库进程，并随后将数据库进程映射到\
  \ SQL 语句。一旦你知道了哪个 SQL 语句正在消耗资源，就可以生成执行计划，以进一步尝试确定任何可能的低效之处。\n\n有时，资源消耗进程可能与数据库无关。在这些情况下，你必须与你的系统管理员（SA）合作，以确定该进程是什么以及是否可以调整或终止。\n\
  \n此外，你可能会遇到资源密集型进程，它们特定于数据库但与 SQL 语句无关。例如，你可能有一个长时间运行的 RMAN 备份进程、Data Pump 或 PL/SQL\
  \ 作业正在运行。在这些情况下，请与你的 DBA 合作，以确定这些类型的进程是否可以调整或终止。\n\n**ORADEBUG**\n\n如果你知道操作系统 ID，可以使用\
  \ Oracle 的 `oradebug` 实用程序来显示消耗 SQL 语句最多的语句。例如，假设你已经使用 `top` 或 `ps` 等实用程序识别出一个高\
  \ CPU 消耗的操作系统进程，并且从进程名称你确定它是一个数据库进程。现在登录到 SQL*Plus 并使用 `oradebug` 来显示与该进程相关的任何 SQL。在此示例中，OS\
  \ 进程 ID 是 7853：\n\n```sql\nSQL> oradebug setospid 7853;\nOracle pid: 18, Unix process\
  \ pid: 7853, image: oracle@xengdb (TNS V1-V3)\n```\n\n现在显示与此进程关联的 SQL（如果有的话）：\n\n\
  ```sql\nSQL> oradebug current_sql;\n```\n\n如果有与该进程关联的 SQL 语句，它将被显示——例如：\n\n```\n\
  select\n a.table_name\nfrom dba_tables a, dba_indexes b, .....\n```\n\n`oradebug`\
  \ 实用程序可以通过多种方法用于帮助排查性能问题。你可以通过发出以下命令来显示与会话关联的跟踪文件的名称：\n\n```sql\nSQL> oradebug tracefile_name;\n\
  ```\n\n使用 `oradebug help` 来显示所有可用选项。\n\n\n## 排查数据库故障\n\nOracle Database 11g 提供了诊断数据库健康状况的新方法。本章包含多个操作指南，展示了如何使用数据库内置的诊断基础架构来解决数据库性能问题。您将学习如何使用\
  \ `ADRCI`（自动诊断库命令解释器）来执行各种任务，例如检查数据库警报日志、创建用于发送给 Oracle 支持工程师的诊断包，以及对数据库运行主动健康检查。\n\
  \n许多常见的 Oracle 数据库性能问题发生在临时表空间出现空间问题时，或者在您使用 `create table as select` (`CTAS`) 技术创建大型索引或大型表时。撤销表空间的空间问题是许多\
  \ DBA 面临的另一个常见麻烦来源。本章提供了多个操作指南，帮助您主动监控、诊断和解决与临时表空间及撤销表空间相关的问题。当生产数据库似乎挂起时，有办法收集用于分析原因的关键诊断数据，本章将向您展示如何登录到无响应的数据库以收集诊断数据。\n\
  \n### 7-1. 确定最佳的撤销保留期\n\n#### 问题\n\n您需要确定数据库中撤销保留的最佳时长。\n\n#### 解决方案\n\n您可以通过指定\
  \ `UNDO_RETENTION` 参数，来设定 Oracle 在事务提交后保留撤销数据的时间长度。以下是如何通过更新 `SPFILE` 中的 `UNDO_RETENTION`\
  \ 参数值，为实例将撤销保留期设置为 30 分钟。\n\n```\nSQL> alter system set undo_retention=1800 scope=both;\n\
  系统已更改。\nSQL>\n```\n\n要确定 `UNDO_RETENTION` 参数的最佳值，您必须首先计算数据库实际生成的撤销量。一旦您大致了解数据库生成的撤销量，就可以为\
  \ `UNDO_RETENTION` 参数计算一个更精确的值。使用以下公式计算 `UNDO_RETENTION` 参数的值：\n\n`UNDO_RETENTION\
  \ = UNDO SIZE/(DB_BLOCK_SIZE*UNDO_BLOCK_PER_SEC)`\n\n您可以通过执行以下查询来计算数据库中生成的实际撤销量：\n\
  \n```\nSQL> select sum(d.bytes) \"undo\"\n  2  from v$datafile d,\n  3  v$tablespace\
  \ t,\n  4  dba_tablespaces s\n  5  where s.contents = 'UNDO'\n  6  and s.status\
  \ = 'ONLINE'\n  7  and t.name = s.tablespace_name\n  8  and d.ts# = t.ts#;\n\n \
  \     UNDO\n----------\n  104857600\nSQL>\n```\n\n您可以通过以下查询计算 `UNDO_BLOCKS_PER_SEC`\
  \ 的值：\n\n```\nSQL> select max(undoblks/((end_time-begin_time)*3600*24))\n  2  \"\
  UNDO_BLOCK_PER_SEC\"\n  3  FROM v$undostat;\n\nUNDO_BLOCK_PER_SEC\n------------------\n\
  \            7.625\nSQL>\n```\n\n您很可能记得数据库的块大小——如果不记得，可以在 `SPFILE` 中查找，或通过命令 `show\
  \ parameter db_block_size` 来查找。假设您数据库的 `db_block_size` 是 8 KB（8,192 字节）。然后，您可以使用本配方前面展示的公式来计算\
  \ `UNDO_RETENTION` 参数的最佳值——例如，得出结果（以秒为单位）：1,678.69 = 104,857,600/(7.625 * 8,192)。在这种情况下，为\
  \ `undo_retention` 参数分配 1,800 秒的值是合适的，因为它比我们计算该参数值的公式所指示的值略大一些。\n\n## 工作原理\n\n自动撤销管理是自\
  \ 11g 版本以来的默认撤销管理模式。如果您使用数据库配置助手（`DBCA`）创建数据库，Oracle 会自动创建一个名为`UNDOTBS1`的自动扩展撤销表空间。如果您是手动创建数据库，则需要在数据库创建语句中指定撤销表空间，或者也可以在之后添加撤销表空间。如果数据库没有显式的撤销表空间，Oracle\
  \ 会将撤销记录存储在`SYSTEM`表空间中。\n\n一旦设置了`UNDO_TABLESPACE`初始化参数，Oracle 会自动为您管理撤销保留。您可以选择设置`UNDO_RETENTION`参数，以指定\
  \ Oracle 在用新的撤销数据覆盖旧的撤销数据之前保留它的时间。\n\n“解决方案”部分中的公式展示了如何基于当前数据库活动来确定撤销保留期。请注意，我们依赖动态视图`V$UNDOSTAT`来计算撤销保留期的值。因此，您必须在数据库运行一段时间后再执行查询，以确保它有机会处理典型的工作负载。\n\
  \n如果您配置了`UNDO_RETENTION`参数，那么撤销表空间必须足够大，以容纳在`UNDO_RETENTION`参数指定的时间内数据库生成的撤销数据。当事务提交时，数据库可能会用新的撤销数据覆盖其撤销数据。撤销保留期是数据库尝试保留旧的撤销数据的最短时间。Oracle\
  \ 会为您在`UNDO_RETENTION`参数中指定的持续时间内保留撤销数据，既用于读一致性目的，也用于支持 Oracle 闪回操作。在为`UNDO_RETENTION`参数指定的时间段保存撤销数据后，数据库会将这些撤销数据标记为*过期*，并将其占用的空间提供给新事务写入撤销数据。\n\
  \n默认情况下，数据库使用以下标准来确定需要保留撤销数据的时间：\n*   最长查询的运行时长\n*   最长事务的运行时长\n*   最长的闪回操作时长\n\n\
  理解 Oracle 数据库如何处理撤销数据的保留有些复杂。以下是其工作原理的简要总结：\n*   如果您没有使用`AUTOEXTEND`选项配置撤销表空间，数据库将简单地忽略您为`UNDO_RETENTION`参数设置的值。数据库将根据数据库工作负载和撤销表空间的大小自动调整撤销保留期。因此，如果您收到指示数据库未保留足够长时间的撤销数据的错误，请确保将撤销表空间设置为较大的值。通常，在这种情况下，撤销保留时间会显著长于数据库中最长的活动查询的运行时长。\n\
  *   如果您希望数据库尽量遵守您为`UNDO_RETENTION`参数指定的设置，请确保为撤销表空间启用`AUTOEXTEND`选项。这样，Oracle 将自动扩展撤销表空间的大小，为新事务腾出写入撤销的空间，而不是覆盖旧的撤销数据。但是，如果您收到`ORA-0155`（快照过旧）错误，例如由于\
  \ Oracle 闪回操作，这意味着数据库无法有效地动态调整撤销保留期。在这种情况下，尝试增加`UNDO_RETENTION`参数的值以匹配最长的 Oracle\
  \ 闪回操作的时长。或者，您可以尝试使用更大的固定大小（不带`AUTOEXTEND`选项）的撤销表空间。\n\n确定撤销表空间正确大小或`UNDO_RETENTION`参数正确设置的关键在于理解当前数据库工作负载的性质。为了了解工作负载特征，检查`V$UNDOSTAT`视图至关重要，因为它包含显示数据库如何利用撤销空间的统计数据，以及诸如最长查询的运行时长等信息。您可以使用这些信息来计算当前数据库处理工作负载所需的撤销空间大小。请注意，`V$UNDOSTAT`视图中的每一行都显示一个十分钟时间间隔内的撤销统计信息。该表最多包含\
  \ 576 行，每行对应一个十分钟间隔。因此，您可以回顾过去最多四天的撤销使用情况。\n\n对于您感兴趣的时间段（理想情况下，该时间段应包括最长查询正在执行的时间），以下是您应在`V$UNDOSTAT`视图中监控的关键列。您可以使用这些统计信息来调整`UNDO_TABLESPACE`和`UNDO_RETENTION`初始化参数的大小。\n\
  \n> `begin_time`：时间间隔的开始时间。\n>\n> `end_time`：时间间隔的结束时间。\n>\n> `undoblks`：数据库在十分钟间隔内消耗的撤销块数量；这是我们公式中用于估算撤销表空间大小所使用的数据。\n\
  >\n> `txncount`：在十分钟间隔内执行的事务数量。\n>\n> `maxquerylen`：显示在此实例中，在十分钟间隔内执行的最长查询的长度（以秒为单位）。您可以基于`MAXQUERYLEN`列的最大值来估算`UNDO_RETENTION`参数的大小。\n\
  >\n> `maxqueryid`：此间隔内运行时间最长的 SQL 语句的标识符。\n>\n> `nospaceerrcnt`：数据库在撤销表空间中没有足够可用空间来存储新撤销数据的次数，这是因为整个撤销表空间都被活动事务占用；当然，这意味着您需要增加撤销表空间的空间。\n\
  >\n> `tuned_undoretention`：数据库在提交所属撤销的事务后，将保留撤销数据的时间（以秒为单位）。\n\n以下基于`V$UNDOSTAT`视图的查询展示了\
  \ Oracle 如何根据当前实例工作负载中最长查询的长度（`MAXQUERYLEN`列）自动调整撤销保留（查看`TUNED_UNDORETENTION`列）。\n\
  \n```sql\nSQL> select to_char(begin_time,'hh24:mi:ss') BEGIN_TIME,\n  2  to_char(end_time,'hh24:mi:ss')\
  \ END_TIME,\n  3  maxquerylen,nospaceerrcnt,tuned_undoretention\n  4  from v$undostat;\n\
  \nBEGIN_TI END_TIME MAXQUERYLEN NOSPACEERRCNT TUNED_UNDORETENTION\n-------- --------\
  \ ----------- ------------- -------------------\n12:25:35 12:29:30         892 \
  \            0                1673\n12:15:35 12:25:35         592             0\
  \                1492\n12:05:35 12:15:35        1194             0             \
  \   2094\n11:55:35 12:05:35         592             0                1493\n11:45:35\
  \ 11:55:35        1195             0                2095\n11:35:35 11:45:35    \
  \     593             0                1494\n11:25:35 11:35:35        1196     \
  \        0                2097\n11:15:35 11:25:35         594             0    \
  \            1495\n11:05:35 11:15:35        1195             0                2096\n\
  10:55:35 11:05:35         593             0                1495\n10:45:35 10:55:35\
  \        1198             0                2098\n…\nSQL>\n```\n\n请注意，`TUNED_UNDORETENTION`列的值会根据任何间隔内的最大查询长度（`MAXQUERYLEN`）持续波动。您可以看到这两个列直接相关，Oracle\
  \ 会根据给定间隔（十分钟）内的最大查询长度来提高或降低调整后的撤销保留时间。以下查询显示了每个十分钟间隔内撤销块的使用情况和事务计数。\n\n```sql\n\
  SQL> select to_char(begin_time,'hh24:mi:ss'),to_char(end_time,'hh24:mi:ss'),\n \
  \ 2  maxquerylen,ssolderrcnt,nospaceerrcnt,undoblks,txncount from v$undostat\n \
  \ 3  order by undoblks\n  4  /\n\nTO_CHAR( TO_CHAR( MAXQUERYLEN SSOLDERRCNT NOSPACEERRCNT\
  \   UNDOBLKS   TXNCOUNT\n-------- -------- ----------- ------------- ----------\
  \ ----------\n17:33:51 17:36:49         550           0             0          1\
  \         18\n17:23:51 17:33:51         249           0             0         33\
  \        166\n17:13:51 17:23:51         856           0             0         39\
  \        520\n17:03:51 17:13:51         250           0             0         63\
  \        171\n16:53:51 17:03:51         850           0             0        191\
  \        702\n16:43:51 16:53:51         245           0             0        429\
  \        561\n\n6 rows selected.\n\nSQL>\n```\n\nOracle 通过 OEM 撤销顾问界面提供了一种简单的方法来帮助设置撤销表空间的大小以及撤销保留期。您可以指定顾问进行分析的时间段，最长可回溯一周——顾问使用`AWR`的每小时快照执行其分析。您可以指定撤销保留期以支持闪回事务查询。或者，您可以让数据库根据分析期间最长的查询来确定所需的撤销保留时间。\n\
  \n\n### 7-2. 查找消耗撤销空间最多的原因\n\n#### 问题\n\n通常，一两个用户会话似乎占用了大量的撤销表空间。您希望识别出是哪个用户以及哪条\
  \ SQL 语句正在消耗所有这些撤销空间。\n\n#### 解决方案\n\n高撤销空间使用量通常涉及一个长时间运行的查询。使用以下查询可以找出您的数据库中运行时间最长的\
  \ SQL 语句。\n\n```sql\nselect s.sql_text from v$sql s, v$undostat u\nwhere u.maxqueryid=s.sql_id;\n\
  ```\n\n您可以联接 `V$TRANSACTION` 和 `V$SESSION` 视图，以找出一个会话在当前执行的事务中使用的最多撤销量，如下所示：\n\n\
  ```sql\nselect s.sid, s.username, t.used_urec, t.used_ublk\nfrom v$session s, v$transaction\
  \ t\nwhere s.saddr = t.ses_addr\norder by t.used_ublk desc;\n```\n\n您也可以执行以下查询，以找出实例中当前使用撤销最多的会话：\n\
  \n```sql\nselect s.sid, t.name, s.value\nfrom v$sesstat s, v$statname t\nwhere s.statistic#\
  \ = t.statistic#\nand t.name = 'undo change vector size'\norder by s.value desc;\n\
  ```\n\n该查询的输出依赖于 `V$STATNAME` 视图中的统计信息 `undo change vector size`，以显示当前消耗最多撤销的会话的\
  \ SID。`V$TRANSACTION` 视图显示活动事务的详细信息。这是另一个联接 `V$TRANSACTION`、`V$SQL` 和 `V$SESSION`\
  \ 视图的查询：\n\n```sql\nselect sql.sql_text sql_text, t.USED_UREC Records, t.USED_UBLK\
  \ Blocks,\n(t.USED_UBLK*8192/1024) KBytes from v$transaction t,\nv$session s,\n\
  v$sql sql\nwhere t.addr = s.taddr\nand s.sql_id = sql.sql_id\nand s.username ='&USERNAME';\n\
  ```\n\n`USED_UREC` 列显示使用的撤销记录数，`USED_UBLK` 列显示事务消耗的撤销块数。\n\n#### 工作原理\n\n您可以执行“解决方案”部分中描述的查询，来识别数据库中负责最多撤销使用的会话，以及负责这些会话的用户。您可以查询\
  \ `V$UNDOSTAT` 并提供适当的 `begin_time` 和 `end_time` 值，以获取某个时间区间内运行时间最长的 SQL 语句的 SQL\
  \ 标识符。`MAXQUERYID` 列捕获了该 SQL 标识符。您可以使用此 ID 来查询 `V$SQL` 视图，以找出实际的 SQL 语句。同样，`V$TRANSACTION`\
  \ 和 `V$SESSION` 视图共同帮助识别消耗最多撤销空间的用户。如果过度的撤销使用影响了性能，您可能需要查看应用程序，了解为什么查询会使用如此多的撤销。\n\
  \n### 7-3. 解决 ORA-01555 错误\n\n#### 问题\n\n在关键生产批处理作业的夜间运行期间，您收到了 `ORA-01555`（快照过旧）错误。您希望消除这些错误。\n\
  \n#### 解决方案\n\n虽然为 `UNDO_RETENTION` 参数设置一个较高的值可能会最大限度地减少收到“快照过旧”错误的可能性，但它并不能保证数据库不会覆盖运行中的事务可能需要的较旧的撤销数据。您可以将长时间运行的批处理作业移动到数据库中没有其他程序运行的单独时间间隔，以避免这些错误。\n\
  \n无论如何，虽然通过这些方法可以最小化“快照过旧”错误的发生，但如果不指定*保证撤销保留*功能，您无法完全消除此类错误。当您在数据库中配置了保证撤销保留时，就不会有任何事务因“快照过旧”错误而失败。设置保证撤销保留后，Oracle\
  \ 会阻止新的 DML 语句执行。实现保证撤销功能很简单。假设您希望确保数据库至少保留一小时（3,600 秒）的撤销。首先使用下面所示的 `alter system`\
  \ 命令设置撤销保留阈值，然后通过指定 `retention guarantee` 子句来更改撤销表空间，从而设置保证撤销保留。\n\n```sql\nalter\
  \ system set undo_retention=3600;\n```\n系统已更改。\n```sql\nalter tablespace undotbs1\
  \ retention guarantee;\n```\n表空间已更改。\n\n您可以通过执行带有 `retention noguarantee` 子句的 `alter\
  \ tablespace` 命令来关闭保证撤销保留。\n\n![images](img/square.jpg) **提示** 您可以使用本配方中所示的 `alter\
  \ system` 命令来启用保证撤销保留，也可以使用 `create database` 和 `create undo tablespace` 语句来启用。\n\
  \n#### 工作原理\n\nOracle 使用存储在撤销表空间中的撤销记录来帮助回滚事务、提供读一致性，并帮助恢复数据库。此外，数据库还使用撤销记录通过 Oracle\
  \ 闪回查询从过去的时间点读取数据。撤销数据是多个 Oracle 闪回功能的基础，这些功能可帮助您从逻辑错误中恢复。\n\n##### 错误的发生\n\n`ORA-01555`\
  \ 错误（快照过旧）可能在各种情况下发生。以下是一个在导出过程中发生该错误的案例。\n\n```\nEXP-00008: ORACLE error 1555 encountered\n\
  ORA-01555: snapshot too old: rollback segment number 10 with name \"_SYSSMU10$\"\
  \ too small\nEXP-00000: Export terminated unsuccessfully\n```\n\n在执行闪回事务时，您也可能收到相同的错误：\n\
  \n```\nERROR at line 1:\nORA-01555: snapshot too old: rollback segment number with\
  \ name \"\" too small\nORA-06512: at \"SYS.DBMS_FLASHBACK\", line 37\nORA-06512:\
  \ at \"SYS.DBMS_FLASHBACK\", line 70\nORA-06512: at li\n```\n\n当 Oracle 覆盖了另一个事务所需的撤销数据时，就会发生“快照过旧”错误。该错误是\
  \ Oracle 读一致性机制工作方式的直接结果。当长时间运行的查询执行期间，Oracle 试图从回滚段中读取任何已更改行的“前映像”时，就可能发生此错误。例如，如果一个长时间运行的查询在凌晨\
  \ 1 点开始并一直运行到早上 6 点，那么在查询执行期间，数据库有可能更改属于该查询一部分的数据。当 Oracle 试图读取在凌晨 1 点时的数据状态时，如果该数据在回滚段中已不存在，则查询可能会失败。\n\
  \n如果您的数据库正在经历大量更新，Oracle 可能无法获取已更改的行，因为记录在回滚段中的更改前的值可能已被覆盖。更改这些行的事务可能已经提交，并且回滚段中没有更改前行值的记录，因为数据库覆盖了相关的撤销数据。由于\
  \ Oracle 无法为当前查询返回一致的数据，因此会发出 `ORA-01555` 错误。当前运行的查询需要前映像来构建读一致的数据，但前映像不可用。\n\n\
  `ORA-01555` 错误可能是由以下一个或两个原因造成的：对数据库的更新过多，或者撤销表空间太小。您可以增加撤销表空间的大小，但这并不能保证错误不会再次发生。\n\
  \n\n\n### 范围的影响\n\n数据库将撤销数据存储在撤销范围中，存在三种不同的撤销范围类型：\n\n> `Active`：事务当前正在使用这些范围。\n\
  >\n> `Unexpired`：这些范围包含满足由`UNDO_RETENTION`初始化参数指定的撤销保留时间所需的撤销。\n>\n> `Expired`：这些范围包含的撤销保留时间已超过`UNDO_RETENTION`参数指定的持续时间。\n\
  \n如果数据库在撤销表空间中找不到足够的过期范围，或者无法获取新的撤销范围，它将重用未过期（但永远不会是活动撤销范围）的范围，这就为`ORA-01555`，“snapshot\
  \ too old”错误敞开了大门。默认情况下，如果遇到空间压力以容纳新事务的撤销，数据库实际上会缩小你指定的撤销保留期。由于未过期的撤销范围包含满足撤销保留期所需的撤销记录，覆盖这些范围实际上意味着数据库正在降低你设置的撤销保留期。启用撤销保留保证有助于确保长时间运行的查询以及\
  \ Oracle Flashback 操作的成功。撤销保留保证中的“保证”是`真实`的——Oracle 肯定会至少在你指定的时间内保留撤销，并且永远不会覆盖任何包含满足撤销保留期所需撤销的未过期撤销范围。然而，这项保证伴随着一个沉重的代价——即使这意味着\
  \ DML 事务因数据库找不到空间来记录这些事务的撤销而失败，Oracle 也会保证保留。因此，在启用保证的撤销保留功能时必须格外谨慎。\n\n### 7-4.\
  \ 监控临时表空间使用情况\n\n#### 问题\n\n你想要监控临时表空间的使用情况。\n\n#### 解决方案\n\n执行以下查询以找出临时表空间中的已使用和空闲空间。\n\
  \n```sql\nSQL> select * from (select a.tablespace_name,\n      sum(a.bytes/1024/1024)\
  \ allocated_mb\n      from dba_temp_files a\n      where a.tablespace_name = upper('&&temp_tsname')\
  \ group by a.tablespace_name) x,\n      (select sum(b.bytes_used/1024/1024) used_mb,\n\
        sum(b.bytes_free/1024/1024) free_mb\n      from v$temp_space_header b\n      where\
  \ b.tablespace_name=upper('&&temp_tsname') group by b.tablespace_name);\n\nEnter\
  \ value for temp_tsname: TEMP\n…\nTABLESPACE_NAME                ALLOCATED_MB    USED_MB    FREE_MB\n\
  ------------------------------ ------------ ---------- ----------\nTEMP                             52.9921875\
  \ 52.9921875          0\nSQL>\n```\n\n显然，此示例中的临时表空间急需 DBA 的帮助。\n\n#### 工作原理\n\n\
  Oracle 使用临时表空间存储排序操作的中间结果以及任何临时表、临时 LOB 和临时 B 树。你可以创建多个临时表空间，但其中只有一个可以是默认临时表空间。如果你没有显式分配临时表空间，该用户将被分配默认临时表空间。\n\
  \n你不会在`DBA_FREE_SPACE`视图中找到关于临时表空间的信息。如本例所示，使用`V$TEMP_SPACE_HEADER`来查找任何临时表空间中有多少空闲和已用空间。\n\
  \n### 7-5. 识别谁在使用临时表空间\n\n#### 问题\n\n你注意到临时表空间填充速度很快，你想要识别导致临时表空间高使用率的用户和 SQL 语句。\n\
  \n#### 解决方案\n\n发出以下查询，以找出哪个 SQL 语句正在排序段中使用空间。\n\n```sql\nSQL> select s.sid || ','\
  \ || s.serial# sid_serial, s.username,\n     o.blocks * t.block_size / 1024 / 1024\
  \ mb_used, o.tablespace,\n     o.sqladdr address, h.hash_value, h.sql_text\n     from\
  \ v$sort_usage o, v$session s, v$sqlarea h, dba_tablespaces t\n     where o.session_addr\
  \ = s.saddr\n     and o.sqladdr = h.address (+)\n     and o.tablespace = t.tablespace_name\n\
       order by s.sid;\n```\n\n前面的查询显示了发出 SQL 语句的会话信息，以及临时表空间的名称和该 SQL 语句在该表空间中使用了多少空间。\n\
  \n你可以使用以下查询，找出哪些会话正在临时表空间中使用空间。请注意，信息是汇总形式的，这意味着它不会分离一个会话运行的各种排序操作——它只是给出每个会话的临时表空间总使用量。\n\
  \n```sql\nSQL> select s.sid || ',' || s.serial# sid_serial, s.username, s.osuser,\
  \ p.spid,\n     s.module,s.program,\n     sum (o.blocks) * t.block_size / 1024 /\
  \ 1024 mb_used, o.tablespace,\n     count(*) sorts\n     from v$sort_usage o, v$session\
  \ s, dba_tablespaces t, v$process p\n     where o.session_addr = s.saddr\n     and\
  \ s.paddr = p.addr\n     and o.tablespace = t.tablespace_name\n     group by s.sid,\
  \ s.serial#, s.username, s.osuser, p.spid, s.module,\n     s.program, t.block_size,\
  \ o.tablespace\n     order by sid_serial;\n```\n\n此查询的输出将显示每个会话在临时表空间中使用的空间，以及该会话当前正在执行的排序操作数量。\n\
  \n\n\n"
- "# 工作原理\n\nOracle 尝试在内存（PGA）中执行排序和哈希操作，但如果排序操作太大无法放入内存，它会使用临时表空间来完成工作。重要的是要理解，即使是一个大型排序操作也有可能用尽整个临时表空间。由于所有数据库会话共享临时表空间，运行大型排序操作的会话可能导致其他会话因空间不足而收到错误。一旦临时表空间填满，所有试图使用临时表空间的\
  \ SQL 语句都将失败，并出现 `ORA-1652: unable to extend temp segment` 错误。新会话可能无法连接，查询有时会挂起，用户可能无法发出新查询。你试图查找任何阻塞锁，但并不存在。如果临时表空间被填满，事务将无法完成。如果你查看告警日志，会发现临时表空间空间已耗尽。\n\
  \n使用 `ORDER BY` 或 `GROUP BY` 子句的操作经常使用临时表空间来完成工作。你还必须记住，创建索引或重建索引也会使用临时表空间对索引进行排序。\n\
  \nOracle 使用 PGA 内存来执行排序和哈希操作。因此，你首先要做的是检查为 `PGA_AGGREGATE_TARGET` 初始化参数设置的当前值，并看看提高它是否有所帮助。然而，即使调大\
  \ `PGA_AGGREGATE_TARGET` 参数的设置，也不能保证 Oracle 会完全在内存中执行巨大的排序操作。Oracle 为每个会话分配一定量的\
  \ PGA 内存，其分配量由内部根据 `PGA_AGGREGATE_TARGET` 参数的值决定。一旦一个大型操作使用了其分配的 PGA 内存份额，Oracle\
  \ 就会将中间结果写入到磁盘上的临时表空间中。这类操作被称为 `one-pass` 或 `multi-pass` 操作，由于它们是在磁盘上执行的，因此比完全在\
  \ PGA 中执行的操作要慢得多。\n\n如果你的数据库临时表空间空间不足，你必须通过添加临时文件来增加其大小。为临时表空间启用 `autoextend` 也有助于防止“空间不足”错误。由于\
  \ Oracle 会为执行排序操作的用户分配其指定的临时表空间中的空间，因此你可以为需要执行大量排序的用户分配一个不同于其他用户的临时表空间，从而防止大量排序活动损害数据库性能。\n\
  \n请注意，与每个对象有多个表或索引段不同，临时表空间只有一个称为排序段的段。所有会话共享此排序段。单个 SQL 语句可以使用多个排序和哈希操作。此外，同一个会话可以同时执行多个\
  \ SQL 语句，每个语句使用多个排序和哈希操作。一旦一个排序操作完成，数据库会立即将该操作使用的块标记为可用，并将它们分配给另一个排序操作。随着排序操作变大，数据库会向排序段添加区，但如果临时表空间中没有更多空闲空间来分配额外的区，它将发出\
  \ `ORA-1652:unable to extend temp segment` 错误。使用该排序操作的 SQL 语句将因此失败。\n\n![images](img/square.jpg)\
  \ **注意** 尽管当执行大型排序的 SQL 语句因临时表空间空间不足而失败时，你会收到 `ORA-1652` 错误，但这并非收到此错误的唯一原因。在执行表移动操作（`alter\
  \ table …move`）时，如果移动到的表空间没有空间容纳该表，你也会收到此错误。有时在创建大型索引时也是如此。有关此错误的解释，请参阅配方 7-6。\n\
  \n## 7-6. 解决“无法扩展临时段”错误\n\n### 问题\n\n在创建大型索引时，你收到一个 Oracle 错误，指出数据库无法扩展 `TEMP` 段。然而，你的临时表空间中有大量可用空间。\n\
  \n### 解决方案\n\n当你遇到如下错误时，你的第一反应可能是认为临时表空间中没有可用空间。\n\n```\nORA-01652: unable to extend\
  \ temp segment by 1024 in tablespace INDX_01\n```\n\n你无法通过向临时表空间添加空间来解决此问题。错误信息明确指出了空间不足的表空间。在本例中，出问题的表空间是\
  \ `INDX_01`，而不是 `TEMP` 表空间。显然，索引创建过程失败是因为 `INDX_01` 表空间空间不足。你可以通过向 `INDX_01` 表空间添加一个数据文件来修复问题，如下所示：\n\
  \n```\nSQL>alter tablespace INDX_01 add datafile '/u01/app/oracle/data/indx_01_02.dbf'\n\
  \  2 size 1000m;\n```\n\n\n\n"
- "# 工作原理\n\n当您收到 `ORA-01652` 错误时，通常的第一反应是检查临时表空间。您会查看 `DBA_TEMP_FREE_SPACE` 视图，发现默认临时表空间\
  \ `TEMP` 中有大量空闲空间。但是，如果您仔细查看错误信息，它会告诉您数据库无法在 `INDX_01` 表空间中扩展临时段。当您像在此例中一样创建索引时，您需要提供数据库创建新索引时必须使用的永久表空间的名称。Oracle\
  \ 开始创建新索引时，会将新的索引结构放入您为索引指定的表空间（我们的例子中是 `INDX_01`）的一个临时段中。原因是，如果您的索引创建过程失败，Oracle（更具体地说，是\
  \ SMON 进程）会从您指定用于创建新索引的表空间中删除该临时段。一旦索引成功创建（或重建），Oracle 会将临时段转换为 `INDX_01` 表空间中的一个永久段。然而，只要\
  \ Oracle 仍在创建索引，数据库就会将其视为临时段，因此当索引创建失败时，数据库会发出 `ORA-01652` 错误，这也是临时表空间“空间不足”错误的错误代码。错误中提到的\
  \ `TEMP` 段，是指在构建过程中保存新索引的那段空间。一旦您增大了 `INDX_01` 表空间的大小，错误就会消失。\n\n![images](img/square.jpg)\
  \ `提示` `ORA-1652` 错误消息中的临时段可能并非指临时表空间中的临时段。\n\n解决 `ORA-01652` 错误的关键在于理解，Oracle 在临时表空间之外的地方也会使用临时段。临时表空间中的临时段用于排序等活动，而永久表空间在执行创建表（`CTAS`）或索引所需的临时操作时，也可以使用临时段。\n\
  \n![images](img/square.jpg) `提示` 当您创建索引时，创建过程会使用两个不同的临时段。一个位于 `TEMP` 表空间的临时段用于对索引数据进行排序。另一个位于永久表空间的临时段则在索引创建期间保存索引。索引创建完成后，Oracle\
  \ 会将索引表空间中的临时段更改为永久段。使用 `CREATE TABLE…AS SELECT`（`CTAS`）选项创建表时，情况也是如此。\n\n如“解决方案”部分所述，`ORA-01652`\
  \ 错误指的是您正在重建索引的表空间。如果您正在创建新索引，Oracle 会使用临时表空间对索引数据进行排序。在创建大型索引时，明智的做法可能是创建一个大型临时表空间并将其分配给正在创建索引的用户。索引创建完成后，您可以为该用户重新分配原始临时表空间，并删除那个大型临时表空间。此策略有助于避免为容纳大型索引的创建而将默认临时表空间扩展得非常大。\n\
  \n如果您为临时表空间指定了 `autoextend`，临时文件可能会变得非常大，这取决于数据库中一两次大型排序操作。当您尝试回收 `TEMP` 表空间的空间时，可能会遇到以下错误。\n\
  \n```sql\nSQL> alter database tempfile '/u01/app/oracle/oradata/prod1/temp01.dbf'\
  \ resize 500M;\nalter database tempfile '/u01/app/oracle/oradata/prod1/temp01.dbf'\
  \ resize 500M\n*ERROR at line 1:\nORA-03297: file contains used data beyond requested\
  \ RESIZE value\n```\n\n一种解决方案是创建一个新的临时表空间，将其设为默认临时表空间，然后删除那个较大的临时表空间。在 Oracle Database\
  \ 11g 中，您可以通过使用以下 `alter tablespace` 命令来简化临时表空间的收缩操作：\n\n```sql\nSQL> alter tablespace\
  \ temp shrink space;\n\nTablespace altered.\n\nSQL>\n```\n\n在此示例中，我们收缩了整个临时表空间，但您可以通过执行命令\
  \ `alter tablespace temp shrink tempfile <file_name>` 来收缩特定的临时文件。该命令会将临时文件收缩到尽可能小的大小。\n\
  \n## 7-7. 解决 Open Cursor 错误\n\n### 问题\n\n您频繁遇到 `Maximum Open Cursors exceeded error`，并希望解决此错误。\n\
  \n### 解决方案\n\n当您收到 `ORA-01000`：“maximum open cursors exceeded”错误时，首先需要做的一件事是检查初始化参数\
  \ `open_cursors` 的值。您可以通过执行以下命令查看当前打开的游标数限制：\n\n```sql\nSQL> sho parameter open_cursors\n\
  \nNAME                                 TYPE        VALUE\n------------------------------------\
  \ ----------- ---------\nopen_cursors                         integer     300\n\
  SQL>\n```\n\n参数 `OPEN_CURSORS` 设置一个会话可以同时打开的最大游标数。您指定此参数以控制打开游标数。将该参数的值设置得太低将导致会话收到\
  \ `ORA-01000` 错误。为 `OPEN_CURSORS` 参数指定一个非常大的值通常没有害处（除非您预计所有会话会同时达到其游标上限，而这不太可能），因此您通常只需将参数值提高到一个较大的数字，即可解决与游标相关的错误。然而，有时您可能会发现提高\
  \ `open_cursors` 参数的值并不能“修复”问题。在这种情况下，请通过执行以下查询来调查哪些进程正在使用打开的游标：\n\n```sql\nSQL>\
  \ select a.value, s.username,s.sid,s.serial#,s.program,s.inst_id\n     from gv$sesstat\
  \ a,gv$statname b,gv$session s\n     where a.statistic# = b.statistic# and s.sid=a.sid\n\
  \     and b.name='opened cursors current'\n```\n\n`GV$OPEN_CURSOR`（或 `V$OPEN_CURSOR`）视图显示每个用户会话当前已打开并解析或缓存的所有游标。您可以执行以下查询来识别具有大量已打开、已解析或已缓存游标的会话。\n\
  \n```sql\nSQL> select saddr, sid, user_name, address,hash_value,sql_id, sql_text\n\
  \     from gv$open_cursor\n     where sid in\n     (select sid from v$open_cursor\n\
  \     group by sid having count(*)  > &threshold);\n```\n\n该查询列出所有打开游标数大于您指定阈值的会话。这样，您可以限制查询的输出，并专注于那些已打开、解析或缓存了大量游标的会话。\n\
  \n您可以通过执行以下查询获取特定会话的实际 SQL 代码和打开的游标数：\n\n```sql\nSQl> select sql_id,substr(sql_text,1,50)\
  \ sql_text, count(*)\n     from gv$open_cursor where sid=81\n     group by sql_id,substr(sql_text,1,50)\n\
  \     order by sql_id;\n```\n\n输出显示了 SID 为 81 的会话中所有打开游标的 SQL 代码。您可以检查所有具有高打开游标数的\
  \ SQL 语句，以了解该会话为何保持大量游标打开。\n\n\n#### 工作原理\n\n如果你的应用没有关闭打开的游标，那么将 `OPEN_CURSORS`\
  \ 参数设置为更高的值对你帮助不大。你可能暂时解决了问题，但不久后很可能又会遇到同样的问题。如果应用层从不关闭由 PL/SQL 代码创建的 ref 游标，数据库将仅仅为已使用的游标持有服务器资源。你必须修复应用逻辑，使其关闭游标——问题其实不在于数据库。\n\
  \n如果你使用的是部署在应用服务器（如 Oracle WebLogic Server）上的 Java 应用，WebLogic Server 的 JDBC 连接池会为应用程序提供打开的数据库连接。这些连接中的每个预处理语句都将使用一个游标。多个应用服务器实例和多个\
  \ JDBC 连接池意味着数据库需要支持所有的游标。如果多个请求共享相同的会话 ID，打开的游标问题可能是由隐式游标引起的。此时唯一的解决方案是在每个请求后关闭连接。\n\
  \n`游标泄漏` 是指数据库打开游标但没有关闭它们。你可以为一个会话运行 10046 跟踪，以查明它是否关闭了其游标：\n\n```\nSQL> alter session\
  \ set events '10046 trace name context forever, level 12';\n```\n\n如果你注意到同一条 SQL\
  \ 语句与不同的游标相关联，那就意味着应用没有关闭其游标。如果应用在打开游标后不关闭它们，Oracle 会为其执行的下一条 SQL 语句分配不同的游标号。反之，如果游标被关闭，Oracle\
  \ 将为分配的下一个游标重用相同的游标号。因此，如果你在 10046 跟踪的输出中看到 `PARSING IN CURSOR #nnnn` 项逐渐增加，则表明应用没有关闭游标。请注意，游标保持打开状态可能是由于有缺陷的应用设计，但开发者也可能有意让游标保持打开以减少软解析，或者当他们使用会话游标缓存时。\n\
  \n你可以使用 `SESSION_CACHED_CURSORS` 初始化参数来设置每个会话缓存的已关闭游标的最大数量。默认设置是 50。你可以使用此参数来防止一个会话打开过多游标，从而填满库缓存或强制进行过多的硬解析。对一条\
  \ SQL 语句重复进行解析调用会导致 Oracle 将该语句的会话游标移入会话游标缓存。数据库通过使用缓存的游标来满足后续的解析调用，而不是重新打开游标。\n\
  \n当你重新执行一条 SQL 语句时，Oracle 会首先尝试在共享池中查找该语句的已解析版本——如果在共享池中找到了已解析版本，则发生软解析。如果未在共享池中找到该语句的已解析版本，Oracle\
  \ 将被迫执行开销大得多的硬解析。虽然软解析的开销远小于硬解析，但大量的软解析会影响性能，因为它们确实需要 CPU 使用和库缓存闩。为了减少软解析的数量，Oracle\
  \ 将每个会话最近关闭的游标缓存在该会话的本地会话缓存中——Oracle 存储那些至少进行了三次解析调用的游标，从而避免了缓存每一个会话游标（这会填满游标缓存）。\n\
  \n`SESSION_CACHED_CURSORS` 初始化参数的默认值 50 对许多数据库来说可能太低了。你可以通过执行以下语句来检查数据库是否达到了会话缓存游标的上限：\n\
  \n```\nSQL> select max(value) from v$sesstat\n  2  where statistic# in (select statistic#\
  \ from v$statname\n  3  where name = 'session cursor cache count');\n\nMAX(VALUE)\n\
  ----------\n        49\n\nSQL>\n```\n\n该查询显示了过去已被缓存的会话游标的最大数量。由于这个数字（49）几乎与 `SESSION_CACHED_CURSORS`\
  \ 参数的默认值（或你设置的值）相同，你必须将该参数的值设置为更大的数字。会话游标缓存使用共享池。如果你使用的是自动内存管理，在重置 `SESSION_CACHED_CURSORS`\
  \ 参数后无需做其他事情——数据库会在必要时增加共享池大小。你可以通过执行以下查询来了解每个会话在其会话游标缓存中有多少游标：\n\n```\nSQL> select\
  \ a.value,s.username,s.sid,s.serial#\n  2  from v$sesstat a, v$statname b,v$session\
  \ s\n  3  where a.statistic#=b.statistic# and s.sid=a.sid\n  4  and b.name='session\
  \ cursor cache count';\n```\n\n### 7-8. 解决数据库挂起问题\n\n#### 问题\n\n你的数据库挂起了。用户无法登录，现有用户也无法完成其事务。具有\
  \ SYSDBA 权限的数据库管理员也可能无法登录到数据库。你需要找出导致数据库挂起的原因，并修复该问题。\n\n## 解决方案\n\n当遇到似乎已挂起的数据库时，请遵循以下通用步骤：\n\
  \n1.  检查你的`告警日志`，查看数据库是否报告了任何错误，这些错误可能指示了数据库挂起的原因。\n2.  尝试获取`AWR`或`ASH`报告，或查询一些`ASH`视图，如第\
  \ 5 章所述。你可能会在`AWR`报告的`负载概要`部分顶部注意到诸如`硬解析`之类的事件，这表明正是它导致了数据库变慢。\n3.  单个`即席查询`确实有可能使整个数据库陷入瘫痪。试着找出一个或多个性能极差的`SQL`语句，它们可能导致了数据库挂起（或性能极差）。\n\
  4.  检查数据库是否存在阻塞性的`锁`以及`门`争用。\n5.  检查服务器的内存使用情况以及`CPU`使用率。确保会话没有因为`PGA`大小设置过低而停滞，如第\
  \ 3 章所述。\n6.  不要忽视这一点：看起来很吓人的数据库挂起，可能仅仅是由`归档日志`目标空间填满这样简单的原因引起的。如果`归档目标`已满，数据库将挂起，新的用户连接将会失败。不过，你仍然可以以`SYS`用户身份连接，并且一旦通过移动一些已归档的重做日志文件在`归档目标`中腾出空间，数据库就能重新被用户访问。\n\
  7.  检查`快速恢复区`。当数据库无法将`闪回数据库`日志写入恢复区时，也会发生挂起。当`快速恢复区`填满时，数据库将不会处理新工作，也不会建立新的数据库连接。你可以通过`alter\
  \ system set db_recovery_file_dest_size`命令增大恢复区来解决此问题。\n\n如果你仍然无法解决数据库挂起的原因，那么你很可能遇到了一个真正挂起的数据库。在调查这样的数据库时，你有时可能会发现自己无法连接和登录。在这种情况下，请使用`prelim`选项登录到数据库。`prelim`选项不需要真正的数据库连接。以下是一个示例，展示了如何使用`prelim`选项登录数据库：\n\
  \n```\nC:\\app\\ora\\product\\11.2.0\\dbhome_1\\bin>sqlplus /nolog\n\nSQL*Plus:\
  \ Release 11.2.0.1.0 Production on Sun Mar 27 10:43:31 2011\n\nCopyright (c) 1982,\
  \ 2010, Oracle.  All rights reserved.\n\nSQL> set _prelim on\nSQL> connect / as\
  \ sysdba\nPrelim connection established\nSQL>\n```\n\n或者，你可以使用命令 `sqlplus -prelim\
  \ \"/ as sysdba\"` 来使用 `-prelim` 选项登录。请注意，你使用 `nolog` 选项来打开一个 `SQL*Plus` 会话。如果你已经连接到数据库，则无法执行\
  \ `set _prelim on` 命令。一旦你如上所示建立了 `prelim` 连接，就可以执行 `oradebug hanganalyze` 命令来分析挂起的数据库，例如：\n\
  \n```\nSQL> oradebug hanganalyze 3\nStatement processed.\nSQL>\n```\n\n在 Oracle\
  \ `RAC` 环境中，指定带有附加选项的 `oradebug hanganalyze` 命令，如下所示：\n\n```\nSQL> oradebug setinst\
  \ all\nSQL> oradebug -g def hanganalyze 3\n```\n\n你可以重复执行几次 `oradebug hanganalyze`\
  \ 命令，以生成不同进程状态的转储文件。\n\n除了 `hanganalyze` 命令生成的转储文件外，Oracle 支持团队通常还会请求一个进程状态转储（也称为\
  \ `systemstate` 转储）来分析数据库挂起状况。`systemstate` 转储将报告进程正在做什么以及它们当前持有的资源。你可以通过执行以下命令集从非\
  \ `RAC` 系统获取 `systemstate` 转储。\n\n```\nSQL> oradebug setmypid\nStatement processed.\n\
  SQL> oradebug dump systemstate 266\nStatement processed.\nSQL>\n```\n\n在 `RAC` 环境中，执行以下命令来获取\
  \ `systemstate` 转储：\n\n```\nSQL> oradebug setmypid\nSQL> oradebug unlimit\nSQL>\
  \ oradebug -g all dump systemstate 266\n```\n\n请注意，与 `oradebug hanganalyze` 命令不同，你必须连接到一个进程。`setmypid`\
  \ 选项指定了进程，在本例中是你自己的进程。你也可以指定一个非你自己的进程 ID，在这种情况下，你需要在执行 `dump systemstate` 命令之前，先执行\
  \ `oradebug setmypid <pid>` 命令。如果你尝试在未设置 `PID` 的情况下执行 `dump systemstate` 命令，将会收到错误：\n\
  \n```\nSQL> oradebug dump systemstate 10\nORA-00074: no process has been specified\n\
  SQL>\n```\n\n你必须执行几次 `systemstate` 转储，每次转储之间间隔大约一分钟左右。Oracle 支持团队通常会请求多个 `systemstate`\
  \ 转储以及 `hanganalyze` 命令生成的跟踪文件。\n\n\n#### 工作原理\n\n当你遇到一个“挂起”的数据库时，关键是要确定它是真的挂起了，还是只是运行缓慢。如果一两个用户抱怨查询运行缓慢，你需要使用第\
  \ 5 章中描述的技术来分析他们的会话，以查看缓慢是由于阻塞会话还是 Oracle 等待事件引起的。如果有多个用户报告他们的工作进行缓慢，这可能是由于多种原因造成的，包括\
  \ CPU、内存（SGA 或 PGA）或其他系统资源问题。\n\n在排查挂起数据库的故障时，首先应检查服务器的 CPU 使用率。如果你的服务器显示 100%的\
  \ CPU 利用率，或者正在交换或分页，那么问题可能根本不在数据库上。至于内存，如果服务器没有足够的空闲内存，新会话就无法连接到数据库。\n\n![images](img/square.jpg)\
  \ `Tip` “解决方案”部分中展示的`prelim`选项允许你在不打开会话的情况下连接到 SGA。因此，即使正常的 SQL*Plus 登录不起作用，你也可以“登录”到挂起的数据库。当你连接到\
  \ SGA 后启动的`oradebug`会话实际上会分析 SGA 中的内容，并将其转储到跟踪文件中。\n\n真正的数据库挂起可能由多种原因引起，包括耗尽了 CPU\
  \ 或内存等资源的系统，或者几个会话卡在等待某个资源（如锁）。虽然数据库可以自动解决会话之间的死锁（通过终止持有所需锁的其中一个会话），但当涉及内部内核级资源的栓锁或引脚时，Oracle\
  \ 有时无法自动检测和解决内部死锁——这导致了 Oracle 支持团队所称的“真正的数据库挂起”。因此，真正的数据库挂起是一种内部死锁或多个进程之间的循环依赖。Oracle\
  \ 支持团队通常会要求你提供`hanganalyze`跟踪文件和多个系统状态转储，以便他们诊断挂起的根本原因。在这种情况下，你甚至可能无法登录数据库。当你发现自己甚至无法登录数据库时，你的第一反应通常是尝试关闭并重启，这通常被称为“弹跳”数据库。不幸的是，虽然关闭并重启数据库可能“解决”问题，但它也会断开所有用户的连接——而且你仍然不知道到底是什么原因导致的问题。如果你决定要弹跳数据库，请先快速生成一些`hanganalyze`和`systemstate`转储。\n\
  \n![images](img/square.jpg) `Tip` 尽管有时可能令人不快，但如果你发现自己根本无法连接到挂起的数据库，那么请收集任何可能需要的跟踪转储，然后快速弹跳数据库，以便用户可以访问他们的应用程序。特别是当你处理的是由于内存问题而挂起的数据库时，弹跳实例可能会让事情迅速重新运转起来。\n\
  \n如果你发现数据库完全没有响应，并且你甚至无法使用`SYSDBA`特权登录数据库，你可以使用`prelim`选项登录数据库。`prelim`选项代表初步连接，它会启动一个\
  \ Oracle 进程并将该进程附加到 SGA 共享内存。然而，这不是一个完整或完全的连接，而是一个有限的连接，其中用于查询执行的结构没有被建立——因此，你甚至无法查询`V$`视图。不过，`prelim`选项允许你运行`oradebug`命令来获取用于诊断目的的错误转储堆栈。`hanganalyze`命令的输出可以告诉\
  \ Oracle 支持工程师你的数据库是否真的因为会话等待某个资源而挂起。该命令进行内部内核调用，以找出所有正在等待资源的会话，并显示阻塞会话和等待会话之间的关系。你可以通过`oradebug`命令或`alter\
  \ session`语句指定的`hanganalyze`选项会生成有关挂起会话的详细信息。一旦你获得转储文件，Oracle 支持人员就可以分析它，并告知你数据库挂起的原因。\n\
  \n你可以在 1 到 10 之间的各个级别调用`hanganalyze`命令。级别 3 转储处于挂起（`IN_HANG`）状态的进程。通常不需要指定高于 3 的级别，因为更高的级别会产生冗长的报告，包含过多的进程细节。\n\
  \n![images](img/square.jpg) `Note` 你使用`hanganalyze`和`systemstate`命令创建的转储文件位于 ADR\
  \ 的 trace 目录中。\n\n注意，我们发出`oradebug`命令是为了获取级别为 266 的`systemstate`转储。级别 266（结合了产生短栈信息的级别\
  \ 256 和级别 10）适用于 Oracle 9.2.0.6 及更高版本的发行版（早期的发行版使用`systemstate level 10`）。级别 266\
  \ 允许你转储每个进程的短栈，这些是 Oracle 函数调用，可帮助 Oracle 开发团队确定是哪个 Oracle 函数导致了问题。短栈信息也有助于匹配代码中的已知错误。在\
  \ Solaris 和 Linux 系统上，你可以安全地指定级别 266，但在其他系统上，转储短栈可能需要很长时间。因此，对于其他操作系统，你可能希望坚持使用级别\
  \ 10。\n\n如果你能找出阻塞会话，你也可以只为该会话获取转储，使用命令`oradebug setospid nnnn`，其中`nnnn`是阻塞会话的 PID，然后调用`oradebug`命令，如下所示：\n\
  \n```\nSQL> oradebug setospid  9999\nSQL> oradebug unlimit\nSQL> oradebug dump errorstack\
  \  3\n```\n\n请注意，你可以在正常会话（以及在`prelim`会话）中生成`hanganalyze`和`systemstate`转储，而无需使用`oradebug`命令。你可以通过`alter\
  \ session`命令调用`hanganalyze`命令，如下所示。\n\n```\nSQL> alter session set  events 'immediate\
  \ trace name hanganalyze level 3';\n```\n\n同样，你可以使用以下命令获取`systemstate`转储：\n\n```\n\
  SQL> alter session set events 'immediate trace name SYSTEMSTATE level 10';\nSession\
  \ altered.\nSQL>\n```\n\n`oradebug`和`systemstate`转储只是你可以收集的众多转储中的两种。使用`oradebug\
  \ dumplist`命令查看你可以收集的各种错误转储。\n\n```\nSQL> oradebug dumplist\nTRACE_BUFFER_ON\nTRACE_BUFFER_OFF\n\
  LATCHES\nPROCESSSTATE\nSYSTEMSTATE\nINSTANTIATIONSTATE\nREFRESH_OS_STATS\nCROSSIC\n\
  CONTEXTAREA\nHANGDIAG_HEADER\nHEAPDUMP\n…\n```\n\n请注意，虽然你可以在编辑器中阅读一些转储文件，但这些文件主要是为了帮助\
  \ Oracle 支持专业人员排查数据库挂起情况。你对这些转储文件能做的有限，特别是当数据库挂起是由于 Oracle 错误或内核级锁引起时，除了将它们发送给 Oracle\
  \ 支持团队进行分析之外。\n\n### 7-9. 调用自动诊断存储库命令解释程序\n\n#### Problem\n\n你想调用自动诊断存储库命令解释程序（ADRCI）并使用自动诊断存储库（ADR）的各种组件。\n\
  \n\n### 解决方案\n\nADRCI 是一个帮助你管理 Oracle 诊断数据的工具。你可以在交互模式和批处理模式下使用 ADRCI 命令。\n\n要在交互模式下启动\
  \ ADRCI，请在命令行输入 `adrci`，如下所示：\n\n```\n$ adrci\nADRCI: Release 11.2.0.1.0 - Production\
  \ on Mon Mar 14 11:41:41 2011\nCopyright (c) 1982, 2009, Oracle and/or its affiliates.\
  \  All rights reserved.\nADR base = \"c:\\app\\ora\"\nadrci>\n```\n\n只要 `PATH` 环境变量包含了\
  \ `ORACLE_HOME/bin/`，你就可以从任何目录发出 `adrci` 命令。你可以在 `adrci>` 提示符下输入每条命令，使用完该实用程序后，你可以键入\
  \ `EXIT` 或 `QUIT` 来退出。你可以通过在 ADRCI 命令行键入 `HELP` 来查看所有可用的 ADRCI 命令，如下所示：\n\n```\n\
  adrci> HELP\n  HELP [topic]\n   Available Topics:\n        CREATE REPORT\n     \
  \   ECHO\n        EXIT\n        HELP\n        HOST\n        IPS\n…\n        SHOW\
  \ HOMES | HOME | HOMEPATH\n        SHOW INCDIR\n        SHOW INCIDENT\n        SHOW\
  \ PROBLEM\n        SHOW REPORT\n        SHOW TRACEFILE\n        SPOOL\n\n There\
  \ are other commands intended to be used directly by Oracle, type\n \"HELP EXTENDED\"\
  \ to see the list\nadrci>\n```\n\n你可以通过将命令名作为属性添加到 `HELP` 命令中，来获取单个 ADRCI 命令的详细信息。例如，以下是获取\
  \ `show tracefile` 命令语法的方法：\n\n```\nadrci> help show tracefile\n  Usage: SHOW TRACEFILE\
  \ [file1 file2 ...] [-rt | -t]\n                         [-i inc1 inc2 ...] [-path\
  \ path1 path2 ...]\n\n  Purpose: List the qualified trace filenames.\n…\n  Options:\n\
  \  Examples:\n…\nadrci>\n```\n\n你也可以通过将命令集成到脚本或批处理文件中，以批处理模式执行 ADRCI 命令。例如，如果你想从操作系统脚本中运行\
  \ ADRCI 命令 `SET HOMEPATH` 和 `SHOW ALERT`，请在 shell 脚本中包含以下内容：\n\n```\nSET HOMEPATH\
  \ diag/rdbms/orcl/orcl; SHOW ALERT -term\n```\n\n假设你的脚本名是 `myscript.txt`。然后，你可以在操作系统\
  \ shell 脚本或批处理文件中执行以下命令来运行此脚本：\n\n```\n$ adrci script=myscript.txt\n```\n\n请注意，参数\
  \ `SCRIPT` 告诉 ADRCI 它必须执行文本文件 `myscript.txt` 中的命令。如果文本文件不在运行 shell 脚本或批处理文件的同一目录中，你必须提供保存文本文件的目录的路径。\n\
  \n要直接在命令行执行 ADRCI 命令，而不是先调用 ADRCI 并与 ADR 接口进行交互，请使用参数 `EXEC` 指定 ADRCI 命令，如下所示：\n\
  \n```\n$ adrci EXEC=\"SHOW HOMES; SHOW INCIDENT\"\n```\n\n此示例展示了如何通过在命令行执行 ADRCI\
  \ 命令来包含两个 ADRCI 命令——`SHOW HOMES` 和 `SHOW INCIDENT`。\n\n\n"
- "# 工作原理\n\n自动诊断知识库是一个目录结构，即使数据库关闭，您也可以访问它，因为它存储在数据库之外。ADR 的根目录称为 **ADR 基目录**，由 `DIAGNOSTIC_DEST`\
  \ 初始化参数设置。每个 Oracle 产品或组件在 ADR 基目录下都有自己的 **ADR 主目录**。每个 ADR 主目录的位置遵循路径 `diag/产品类型/产品\
  \ ID/实例 ID`。因此，对于一个名为 `orcl1`、实例名称为 `orcl1` 且 ADR 基目录设置为 `/app/oracle` 的数据库，其 ADR\
  \ 主目录将是 `/app/oracle/diag/rdbms/orcl1/orcl1`。每个 ADR 主目录下都包含该 Oracle 产品实例的诊断数据，例如跟踪和转储文件、警报日志以及其他诊断文件。\n\
  \nADRCI 实用程序可帮助您管理 ADR 中的诊断数据。ADRCI 允许您执行以下类型的诊断任务：\n\n*   查看 ADR（自动诊断知识库）中的诊断数据：ADR\
  \ 存储警报日志、转储文件、跟踪文件、健康检查报告等诊断数据。\n*   查看健康检查报告：诊断基础结构会自动运行健康检查以捕获有关错误的详细信息，并将其添加到它为该错误收集的其他诊断数据中。您也可以手动调用健康检查。\n\
  *   将事件和问题信息打包以便传输给 Oracle 支持人员：**问题** 是指关键数据库错误，**事件** 是指特定问题的单次发生。事件包是您发送给 Oracle\
  \ 支持人员用于故障排除的诊断数据集合。ADRCI 提供特殊命令，使您能够创建包并生成压缩的诊断包以发送给 Oracle 支持人员。\n\n您可以通过查询 `V$DIAG_INFO`\
  \ 视图来查看当前数据库实例的所有 ADR 位置，如下所示。\n\n```sql\nSQL> select * from v$diag_info;\n\n  \
  \ INST_ID           NAME                   VALUE\n-----------    ------------------\
  \     ----------------------------------------\n1              Diag Enabled    \
  \       TRUE\n1              ADR Base               c:\\app\\ora\n1            \
  \  ADR Home               c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\n1           \
  \   Diag Trace             c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\trace\n1   \
  \           Diag Alert             c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\alert\n\
  1              Diag Incident          c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\\
  incident\n1              Diag Cdump             c:\\app\\ora\\diag\\rdbms\\orcl1\\\
  orcl1\\cdump\n1              Health Monitor         c:\\app\\ora\\diag\\rdbms\\\
  orcl1\\orcl1\\hm\n1              Default Trace File     c:\\app\\ora…\\trace\\orcl1_ora_6272.trc\n\
  1              Active Problem Count        2\n1              Active Incident Count\
  \       3\n\n11 rows selected.\n\nSQL>\n```\n\nADR 主目录是数据库诊断数据的根目录。所有诊断文件，如警报日志和各种跟踪文件，都位于\
  \ ADR 主目录下。ADR 主目录直接位于您使用 `DIAGNOSTIC_DEST` 初始化参数指定的 ADR 基目录之下。以下是如何找出 ADR 基目录位置的方法：\n\
  \n```\nadrci> show base\nADR base is \"c:\\app\\ora\"\nadrci>\n```\n\n您可以通过执行以下命令查看\
  \ ADR 基目录下的所有 ADR 主目录：\n\n```\nadrci> show homes\nADR Homes:\ndiag\\clients\\user_salapati\\\
  host_3975876188_76\ndiag\\clients\\user_system\\host_3975876188_76\ndiag\\rdbms\\\
  orcl1\\orcl1\ndiag\\tnslsnr\\miropc61\\listener\nadrci>\n```\n\n您可以在 ADR 基目录下拥有多个\
  \ ADR 主目录，并且在任何给定时间可以有多个 ADR 主目录是当前的。您的 ADRCI 命令将仅在当前 ADR 主目录中的诊断数据上操作。如何知道在任何时间点哪个\
  \ ADR 主目录是当前的？ADRCI 主路径通过指向 ADR 基目录目录层次结构下的 ADR 主目录来帮助确定当前的 ADR 主目录。\n\n![images](img/square.jpg)\
  \ **注意** 某些 ADRCI 命令只需要一个 ADR 主目录是当前的——如果有多个 ADR 主目录是当前的，这些命令将报错。\n\n您可以使用 `show\
  \ homes` 或 `show homepath` 命令来查看所有当前的 ADR 主目录：\n\n```\nadrci> show homepath\nADR\
  \ Homes:\ndiag\\clients\\user_salapati\\host_3975876188_76\ndiag\\clients\\user_system\\\
  host_3975876188_76\ndiag\\rdbms\\orcl1\\orcl1\ndiag\\tnslsnr\\miropc61\\listener\n\
  adrci>\n```\n\n如果您想处理来自多个数据库实例或组件的诊断数据，必须确保所有相关的 ADR 主目录都是当前的。然而，大多数时候，您只会处理单个数据库实例或单个\
  \ Oracle 产品或组件，例如监听器。ADR 主路径总是相对于 ADR 的。例如，如果您将 `/u01/app/oracle/` 指定为 ADR 基目录的值，那么所有\
  \ ADR 主目录都将位于 `ADR_Base/diag` 目录下。使用 `set homepath` 命令将 ADR 主目录设置为单个主目录，如下所示：\n\n\
  ```\nadrci> set homepath diag\\rdbms\\orcl1\\orcl1\n\nadrci> show homepath\n\nADR\
  \ Homes:\ndiag\\rdbms\\orcl1\\orcl1\nadrci>\n```\n\n![images](img/square.jpg) **注意**\
  \ 诊断数据包括事件和问题的描述、健康监控报告以及传统的诊断文件，如跟踪文件、转储文件和警报日志。\n\n请注意，在使用 `set homepath` 命令设置主路径之前，`show\
  \ homepath` 命令会显示所有 ADR 主路径。但是，一旦您将主路径设置为特定主目录，`show homepath` 命令将仅显示该单个主路径。在执行多个\
  \ ADRCI 命令之前设置主路径非常重要，因为它们仅适用于单个 ADR 主目录。例如，如果在发出以下命令之前未设置主路径，您将收到错误：\n\n```\nadrci>\
  \ ips create package\nDIA-48448: This command does not support multiple ADR homes\n\
  adrci>\n```\n\n发生错误是因为 `ips create package` 命令在有多个 ADR 主目录时无效。在您使用 `set homepath`\
  \ 命令将主路径设置为单个 ADR 主目录后，该命令将正常工作。像这里显示的命令这样的命令仅适用于单个当前 ADR 主目录，而其他命令则适用于多个当前 ADR\
  \ 主目录——也有些命令不需要当前 ADR 主目录。最重要的是，所有 ADRCI 命令都将在单个当前 ADR 主目录上工作。\n\n### 7-10. 从 ADRCI\
  \ 查看警报日志\n\n#### 问题\n\n您想使用 ADRCI 命令查看警报日志。\n\n#### 解决方案\n\n要使用 ADRCI 查看警报日志，请按照以下步骤操作：\n\
  \n1.  调用 ADRCI。\n    `$ adrci`\n2.  使用 `set homepath` 命令设置 ADR 主目录。\n    `adrci>\
  \ set homepath diag\\rdbms\\orcl1\\orcl1`\n3.  输入以下命令查看警报日志：\n    `adrci> show alert`\n\
  \n    ```\n    ADR Home = c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1:\n    *************************************************************************\n\
  \    Output the results to file: c:\\temp\\alert_10916_7048_orcl1_1.ado\n    ```\n\
  \n警报日志将在您的默认编辑器中弹出。一旦您在编辑器中关闭文本文件，ADRCI 提示符将返回。\n\n您也可以查询 `V$DIAG_INFO` 视图以找到与 Diag\
  \ Trace 条目对应的路径。您可以切换到该目录并使用文本编辑器打开 `alert_<数据库名称>.log` 文件。\n\n\n### 工作原理\n\n警报日志保存了\
  \ Oracle 实例的运行时信息，并提供诸如实例正在使用的初始化参数等信息，以及重做日志文件切换等关键变更的记录，最重要的是，还包含显示 Oracle 错误及其详细信息的消息。警报日志对于故障排查至关重要，通常是问题发生时你首先查看的地方。Oracle\
  \ 以文本文件和 XML 格式文件两种形式提供警报日志。\n\n`show alert` 命令会显示 XML 格式的警报日志，但不显示 XML 标签。你可以使用\
  \ `SET EDITOR` 命令设置默认编辑器，如下所示：\n\n`adrci> set editor notepad.exe`\n\n上一条命令将默认编辑器更改为记事本。`show\
  \ alert -term` 命令在终端窗口中显示警报日志内容。如果你想只检查警报日志中最新的事件，请执行以下命令：\n\n`adrci>show alert\
  \ -tail 50`\n\n`tail` 选项在命令窗口中显示警报日志中最 recent 的一组行。在此示例中，它显示警报日志的最后 50 行。如果你没有为\
  \ `tail` 参数指定值，默认情况下，它会显示警报日志的最后十行。\n\n以下命令显示一个“实时”警报日志，即它会随着条目被添加到日志中而显示警报日志的变更。\n\
  \n`adrci> show alert -tail -f`\n\n上一条命令显示警报日志的最后十行，并将所有新消息打印到屏幕上，从而提供警报日志持续添加的“实时”显示。按\
  \ CTRL+C 组合键将带你返回到 ADRCI 提示符。\n\n在故障排查时，查看数据库是否发出任何 `ORA-600` 错误非常有用。你可以执行以下命令来捕获\
  \ `ORA-600` 错误。\n\n`adrci> show alert -p \"MESSAGE_TEXT LIKE '%ORA-600%'\"`\n\n\
  尽管你可以通过直接访问存储警报日志的文件系统位置来查看它，但通过 ADRCI 工具这样做要容易得多。ADRCI 对于处理实例的跟踪文件尤其有用。`SHOW TRACEFILE`\
  \ 命令显示实例跟踪目录中的所有跟踪文件。你可以使用各种过滤器来执行 `SHOW TRACEFILE` 命令——以下示例查找引用后台进程 `mmon` 的跟踪文件：\n\
  \n```\n$ adrci> show tracefile %mmon%\n     diag\\rdbms\\orcl1\\orcl1\\trace\\orcl1_mmon_1792.trc\n\
  \     diag\\rdbms\\orcl1\\orcl1\\trace\\orcl1_mmon_2340.trc\nadrci>\n```\n\n此命令列出文件名中包含字符串\
  \ `mmon` 的所有跟踪文件。你可以应用过滤器将输出限制为仅与特定事件号关联的跟踪文件，如下所示：\n\n```\nadrci> show tracefile\
  \ -I 43417\n          diag\\rdbms\\orcl1\\orcl1\\incident\\incdir_43417\\orcl1_ora_4276_i43417.trc\n\
  adrci>\n```\n\n上一条命令列出了与事件号 43417 相关的跟踪文件。\n\n## 7-11. 使用 ADRCI 查看事件\n\n### 问题\n\
  \n你想使用 ADRCI 查看事件。\n\n### 解决方案\n\n你可以使用 `show incident` 命令查看 ADR 中的所有事件（请务必先设置 homepath）：\n\
  \n```\n$ adrci\n$ set homepath diag\\rdbms\\orcl1\\orcl1\n\nadrci> show incident\n\
  \nADR Home = c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1:\n*******************************************************************************/\n\
  INCIDENT_ID          PROBLEM_KEY\n CREATE_TIME\n-------------------- -----------------------------------------------------------\n\
  \ 43417                ORA 600 [kkqctinvvm(2): Inconsistent state space!]\n 2010-12-17\
  \ 09:26:15.091000 -05:00\n43369                ORA 600 [kkqctinvvm(2): Inconsistent\
  \ state space!]\n 2010-12-17 11:08:40.589000 -05:00\n79451                ORA 445\n\
  \ 2011-03-04 03:00:39.246000 -05:00\n84243                ORA 445\n 2011-03-14 19:12:27.434000\
  \ -04:00\n84244                ORA 445\n 2011-03-20 16:55:54.501000 -04:00\n 5 rows\
  \ fetched\n```\n\n你可以指定 `detail` 模式来查看特定事件的详细信息，如下所示：\n\n```\nadrci> show incident\
  \ -mode detail -p \"incident_id=43369\"\n\nADR Home = c:\\app\\ora\\diag\\rdbms\\\
  orcl1\\orcl1:\n*******************************************************************************\n\
  \nINCIDENT INFO RECORD 1\n*******************************************************************************/\n\
  \   INCIDENT_ID                   43369\n   STATUS                        ready\n\
  \   CREATE_TIME                   2010-12-17 11:08:40.589000 -05:00\n   PROBLEM_ID\
  \                    1\n   CLOSE_TIME                    <NULL>\n   FLOOD_CONTROLLED\
  \              none\n   ERROR_FACILITY                ORA\n   ERROR_NUMBER     \
  \             600\n   ERROR_ARG1                    kkqctinvvm(2): Inconsistent\
  \ state space!\n   SIGNALLING_COMPONENT          SQL_Transform\n   PROBLEM_KEY \
  \                  ORA 600 [kkqctin: Inconsistent state space!]\n   FIRST_INCIDENT\
  \                43417\n   FIRSTINC_TIME                 2010-12-17 09:26:15.091000\
  \ -05:00\n   LAST_INCIDENT                 43369\n   LASTINC_TIME              \
  \    2010-12-17 11:08:40.589000 -05:00\n   KEY_VALUE                     ORACLE.EXE.3760_3548\n\
  \   KEY_NAME                      PQ\n   KEY_NAME                      SID\n   KEY_VALUE\
  \                     71.304\n   OWNER_ID                      1\n   INCIDENT_FILE\
  \                 c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\trace\\orcl1_ora_3548.trc\n\
  \nadrci>\n```\n\n### 工作原理\n\n`show incident` 命令报告数据库中所有未解决的事件。对于每个事件，此命令的输出显示问题键、事件\
  \ ID 以及事件发生的时间。在此示例中，我们首先设置了 ADRCI homepath，因此该命令只显示来自此 ADR 主目录的事件。如果你未设置 homepath，你将看到所有当前\
  \ ADR 主目录的事件。\n\n如前所述，事件是问题的单次发生。问题是指关键错误，例如 `ORA-600`（内部错误）或与操作系统异常相关的 `ORA-07445`\
  \ 错误。问题键是一个显示问题详细信息的文本字符串。例如，问题键 `ORA 600 [kkqctinvvm(2): Inconsistent state space!]`\
  \ 表明问题是由于内部错误引起的。\n\n当一个问题发生多次时，数据库会为问题的每次发生创建一个事件，每个事件都有一个唯一的事件 ID。数据库将事件记录在警报日志中，并向\
  \ Oracle Enterprise Manager 发送警报，警报会显示在主页上。数据库自动收集事件的诊断数据，称为事件转储，并将它们存储在 ADR 跟踪目录中。\n\
  \n由于一个关键错误可能产生大量相同的事件，因此故障诊断基础结构应用“洪泛控制”机制来限制事件的生成。对于给定的问题键，数据库在一小时内只允许 5 个事件，一天内最多允许\
  \ 25 个事件。一旦问题触发的事件超过这些阈值，数据库仅在警报日志和 Oracle Enterprise Manager 中记录这些事件，但会停止为其生成新的事件转储。你无法更改事件洪泛控制机制的默认阈值设置。\n\
  \n## 7-12. 为 Oracle 支持打包事件\n\n### 问题\n\n你想将与特定问题相关的诊断文件发送给 Oracle 支持部门。\n\n\n####\
  \ 解决方案\n\n您可以通过 Database Control 或 ADRCI 界面执行的命令，来打包更多事件的诊断信息。在本解决方案中，我们将展示如何通过\
  \ ADRCI 打包事件。您可以使用各种 IPS 命令，以压缩格式打包与特定问题相关的所有诊断文件，并将文件发送给 Oracle 支持。以下是创建事件包的步骤。\n\
  \n1.  创建一个空的逻辑包，如下所示：\n\n    ```\n    adrci> ips create package\n    Created package\
  \ 1 without any contents, correlation level typical\n    adrci>\n    ```\n\n   \
  \ 在此示例中，我们创建了一个空包，但您也可以基于事件编号、问题编号、问题键或时间间隔来创建包。在所有这些情况下，包都不会是空的——它将包含您指定的事件或问题的诊断信息。由于我们创建了一个空包，因此需要在下一步中向该包添加诊断信息。\n\
  \n2.  使用 `ips add incident` 命令向逻辑包添加诊断信息：\n\n    ```\n    adrci> ips add incident\
  \ 43369 package 1\n    Added incident 43369 to package 1\n    adrci>\n    ```\n\n\
  \    此时，事件 43369 与包 1 相关联，但其中还没有诊断数据。\n\n3.  生成物理包。\n\n    ```\n    adrci> ips generate\
  \ package 1 in \\app\\ora\\diagnostics\n    Generated package 1 in file \\app\\\
  ora\\diagnostics\\IPSPKG_20110419131046_COM_1.zip, mode complete\n    adrci>\n \
  \   ```\n\n    当您发出 `generate package` 命令时，ADRCI 会收集所有相关的诊断文件，并将它们添加到您指定目录中的一个 zip\
  \ 文件中。\n\n4.  将生成的 zip 文件发送给 Oracle 支持。\n\n    如果您决定向现有的物理包（zip 文件）添加补充诊断数据，可以通过在\
  \ `generate package` 命令中指定 `incremental` 选项来完成：\n\n    ```\n    adrci> ips generate\
  \ package 1 in \\app\\ora\\diagnostics incremental\n    ```\n\n    此命令创建的增量 zip\
  \ 文件将在文件名中包含 `INC` 一词，表示它是一个增量 zip 文件。\n\n#### 工作原理\n\n物理包是您可以发送给 Oracle 支持以诊断数据库问题的\
  \ zip 文件。由于事件是问题的单次发生，因此将事件编号添加到逻辑包并生成物理包，会将该问题（事件）的所有诊断数据汇总到一个 zip 文件中。在此示例中，我们展示了如何首先创建一个空的逻辑包，然后将其与事件编号关联。然而，`ips\
  \ create package` 命令有几个选项：您可以在创建逻辑包时直接指定事件编号或问题编号，从而跳过 `add incident` 命令。您还可以创建一个包含两个时间点之间所有事件的包，如下所示：\n\
  \n```\nadrci> ips create package time '2011-04-12 10:00:00.00 -06:00' to '2011-04-12\
  \ 23:00:00.00 -06:00'\nCreated package 2 based on time range 2011-04-12 12:00:00.000000\
  \ -06:00 to 2011-04-12 23:00:00.000000 -06:00, correlation level typical\nadrci>\n\
  ```\n\n由先前命令生成的包包含 2011 年 4 月 12 日上午 10 点至晚上 11 点之间发生的所有事件。\n\n请注意，您还可以手动将特定的诊断文件添加到现有包中。要添加文件，您需要在\
  \ `ips add file` 命令中指定文件名——您仅限于添加位于 ADR 基目录内的那些诊断文件。以下是一个示例：\n\n```\nadrci> ips\
  \ add file <ADR_BASE>/diag/rdbms/orcl1/orcl1/trace/orcl_ora12345.trc package 1\n\
  ```\n\n默认情况下，`ips generate package` 命令生成一个包含包中所有文件的 zip 文件。`incremental` 选项将限制文件为数据库自您最初为该包生成\
  \ zip 文件以来所生成的文件。`ips show files` 命令显示包中的所有文件，`ips show incidents` 命令显示包中的所有事件。您可以发出\
  \ `ips remove file` 命令从包中移除诊断文件。\n\n### 7-13. 运行数据库健康检查\n\n#### 问题\n\n您希望对数据库运行全面的诊断健康检查。您想了解是否存在任何数据字典或文件损坏，以及数据库中的任何其他潜在问题。\n\
  \n#### 解决方案\n\n您可以使用数据库健康监控基础结构来运行数据库的健康检查。您可以运行各种完整性检查，例如事务完整性检查和字典完整性检查。您可以通过查询\
  \ `V$HM_CHECK` 视图来获取可以运行的所有健康检查的列表：\n\n```\nSQL> select name from v$hm_check where\
  \ internal_check='N';\n```\n\n一旦决定了检查类型，请在 `DBMS_HM` 包的 `RUN_CHECK` 过程中指定检查的名称，如下所示：\n\
  \n```\nSQL> begin\n  2   dbms_hm.run_check('Dictionary Integrity Check','testrun1');\n\
  \  3  end;\n  4  /\n\nPL/SQL procedure successfully completed.\n\nSQL>\n```\n\n\
  您也可以从 Enterprise Manager 运行健康检查。转到 Advisor Central -> Checkers，然后从 Checkers 子页面中选择特定的检查器来运行健康检查。\n\
  \n#### 工作原理\n\nOracle 在遇到关键错误时会自动运行健康检查。您可以使用“解决方案”部分中所示的过程手动运行检查。数据库将所有健康检查结果存储在\
  \ ADR 中。\n\n您可以在数据库打开时运行大多数健康检查。只能在数据库关闭时运行重做完整性检查和数据库结构完整性检查——您必须将数据库置于 `NOMOUNT`\
  \ 状态才能运行这两项检查。\n\n您可以使用 `DBMS_HM` 包或通过 Enterprise Manager 查看健康检查的结果。以下是使用 `DBMS_HM`\
  \ 包获取健康检查报告的方法：\n\n```\nSQL> set long 100000\nSQL> set longchunksize 1000\nSQL>\
  \ set pagesize 1000\nSQL> set linesize 512\nSQL> select dbms_hm.get_run_report('testrun1')\
  \ from dual;\n\nDBMS_HM.GET_RUN_REPORT('TESTRUN1')\n-----------------------------------------------------------------\n\
  Basic Run Information\n Run Name                     : testrun1\n Run Id       \
  \                : 61\n Check Name                   : Dictionary Integrity Check\n\
  \ Mode                         : MANUAL\n Status                       : COMPLETED\n\
  \ Start Time                   : 2011-04-19 15:46:50.313000 -04:00\n End Time  \
  \                   : 2011-04-19 15:46:54.117000 -04:00\n Error Encountered    \
  \        : 0\n Source Incident Id           : 0\n Number of Incidents Created  :\
  \ 0\n\nInput Paramters for the Run\n TABLE_NAME=ALL_CORE_TABLES\n CHECK_MASK=ALL\n\
  Run Findings And Recommendations\n\nSQL>\n```\n\n在此示例中，幸运的是，没有发现任何问题，因此没有建议，因为字典健康检查没有发现任何问题。您也可以转到\
  \ Advisor Central -> Checkers，并为您运行过的任何健康检查从“运行详细信息”页面运行报告。使用 `show hm_run`、`create\
  \ report` 和 `show report` 命令通过 ADRCI 实用程序查看健康检查报告。您可以使用视图 `V$HM_FINDING` 和 `V$HM_RECOMMENDATION`\
  \ 来调查健康检查的发现和相应建议。\n\n### 7-14. 创建 SQL 测试用例\n\n#### 问题\n\n您需要创建一个 SQL 测试用例，以便在不同的机器上重现\
  \ SQL 故障，无论是为了支持您自己的诊断工作，还是为了让 Oracle 支持能够重现该故障。\n\n\n\n#### 解决方案\n\n要创建一个 SQL 测试案例，首先必须导出\
  \ SQL 语句以及关于该语句的若干有用信息。以下示例展示了如何捕获抛出错误的 SQL 语句。在此示例中，用户 SH 执行导出操作（你无法以用户 SYS 的身份执行导出）。\n\
  \n首先，以 SYSDBA 身份连接到数据库并创建一个目录来保存测试案例：\n\n```\nSQL> conn / as sysdba\nConnected.\n\
  SQL> create or replace directory TEST_DIR1 as 'c:\\myora\\diagnsotics\\incidents\\\
  ';\n\nDirectory created.\nSQL> grant read,write on directory TEST_DIR1 to sh;\n\n\
  Grant succeeded.\nSQL>\n```\n\n然后，将 DBA 角色授予将用于创建测试案例的用户，并以该用户身份连接：\n\n```\nSQL>\
  \ grant dba to sh;\n\nGrant succeeded.\n\nSQL> conn sh/sh\nConnected.\n```\n\n执行抛出错误的\
  \ SQL 命令：\n\n```\nSQL> select * from  my_mv  where max_amount_sold >100000 order\
  \ by 1;\n```\n\n现在，你已准备好导出 SQL 语句和相关信息，以便日后可以将其导入到不同的系统中。使用 `EXPORT_SQL_TESTCASE`\
  \ 过程来导出数据，如下所示：\n\n```\nSQL> set serveroutput on\n\nSQL> declare mycase clob;\n\
  \  2  begin\n  3  dbms_sqldiag.export_sql_testcase\n  4  (directory    =>'TEST_DIR1',\n\
  \  5  sql_text      => 'select * from my_mv where max_amount_sold >100000 order\
  \ by 1',\n  6  user_name     => 'SH',\n  7  exportData    =>  TRUE,\n  8  testcase\
  \      => mycase\n  9  );\n 10  end;\n 11  /\n\nPL/SQL procedure successfully completed.\n\
  \nSQL>\n```\n\n一旦导出过程完成，你就可以执行导入操作了，无论是在同一台服务器还是不同的服务器上。以下示例创建一个名为 TEST 的新用户，并将测试案例导入到该用户的模式中。以下是将\
  \ SQL 语句和相关信息导入到不同模式的步骤。\n\n```\nSQL> conn /as sysdba\nConnected.\nSQL> create or\
  \ replace directory TEST_DIR2 as 'c:\\myora\\diagnsotics\\incidents\\'; /\n\nDirectory\
  \ created.\nSQL> grant read,write on directory TEST_dir2 to test;\n```\n\n将 `TEST_DIR1`\
  \ 目录中的所有文件传输到 `TEST_DIR2` 目录。然后，将 DBA 角色授予用户 TEST，并以该用户身份连接：\n\n```\nSQL> grant\
  \ dba to test;\n\nGrant succeeded.\n\nSQL> conn test/test\nConnected.\n```\n\n以用户\
  \ TEST 的身份执行 SQL 数据的导入，调用 `IMPORT_SQL_TESTCASE` 过程，如下所示：\n\n```\nSQL> begin\n  2\
  \  dbms_sqldiag.import_sql_testcase\n  3  (directory=>'TEST_DIR2',\n  4  filename=>'oratcb1_008602000001main.xml',\n\
  \  5  importData=>TRUE\n  6  );\n  7  end;\n  8  /\n\nPL/SQL procedure successfully\
  \ completed.\n\nSQL>\n```\n\n现在，用户 TEST 将拥有执行你想要调查的 SQL 语句所需的所有对象。你可以通过执行原始的 `select`\
  \ 语句来验证这一点。它应该给出与在 SH 模式下相同的输出。\n\n#### 工作原理\n\nOracle 提供了 SQL 测试案例构建器 (TCB) 来重现\
  \ SQL 故障。你可以通过企业管理器或通过 PL/SQL 包来创建测试案例。本教程的“解决方案”部分展示了如何使用 `DBMS_SQLDIAG` 包的 `EXPORT_SQL_TESTCASE`\
  \ 过程创建测试案例。该包有多个变体，我们的示例展示了如何使用 SQL 语句作为源来创建 SQL 测试案例。有关创建测试案例的其他选项，请查阅 Oracle PL/SQL\
  \ Packages 手册中的 `DBMS_SQLDIAG.EXPORT_TESTCASE` 过程的详细信息。\n\n![images](img/square.jpg)\
  \ **注意** 记住，你应该以任何已被授予 DBA 角色的用户（SYS 除外）的身份运行测试案例构建器。\n\n通常，你会发现自己需要为 Oracle 提供一个测试案例，否则\
  \ Oracle Support 人员将无法调查他们正在帮助你解决的特定问题。SQL 测试案例构建器是 Oracle Database 11g 的一部分，其主要目的是帮助你快速获得一个可复现的测试案例。SQL\
  \ 测试案例构建器帮助你轻松捕获与失败 SQL 语句相关的关键信息，并将其打包成一种格式，供开发人员或 Oracle 支持人员在另一个环境中重现问题。\n\n\
  你可以通过 `DBMS_SQLDIAG` 包访问 SQL 测试案例构建器。要创建测试案例，必须首先导出 SQL 语句，包括该语句涉及的所有对象以及其他相关信息。导出过程与使用\
  \ `EXPDP` 命令的 Oracle 导出非常相似，因此也像 `EXPDP` 一样使用一个目录。Oracle 将 SQL 测试案例创建为一个脚本，其中包含将重新创建必要数据库对象的语句，以及相关的运行时信息（如统计信息），这些信息使你能够重现错误。以下是作为测试案例创建过程一部分捕获和导出的各种类型的信息：\n\
  \n*   问题语句的 SQL 文本\n*   表数据 —— 这是可选的，你可以导出样本数据或完整数据。\n*   执行计划\n*   优化器统计信息\n* \
  \  PL/SQL 函数、过程和包\n*   绑定变量\n*   用户权限\n*   SQL 配置文件\n*   作为 SQL 语句一部分的所有对象的元数据\n\
  *   动态采样结果\n*   运行时信息，例如并行度\n\n在 `DBMS_SQLDIAG` 包中，`EXPORT_SQL_TESTCASE` 过程将 SQL\
  \ 语句的 SQL 测试案例导出到一个目录。`IMPORT_SQL_TESTCASE` 过程则从一个目录导入测试案例。\n\n在 `EXPORT_SQL_TESTCASE`\
  \ 过程中，各属性含义如下：\n\n> `DIRECTORY`：你想要存储测试案例文件的目录\n> \n> `SQL_TEXT`：实际抛出错误的 SQL 语句\n\
  > \n> `TESTCASE`：测试案例的名称\n> \n> `EXPORTDATA`：默认情况下，Oracle 不导出数据。你可以将此参数设置为 `TRUE`\
  \ 以导出数据。你可以通过为 Sampling Percent 属性指定一个值来选择性地限制要导出的数据量。默认值为 100。\n\n测试案例构建器会自动导出\
  \ PL/SQL 包规范，但不导出包体。但是，你也可以指定 TCB 同时导出包体。导出过程在你指定的目录中创建多个文件。其中，格式为 `oratcb1_008602000001main.xml`\
  \ 的文件包含测试案例的元数据。\n\n### 7-15. 生成 AWR 报告\n\n#### 问题\n\n你想要生成一份 AWR 报告来分析数据库中的性能问题。\n\
  \n\n#### 解决方案\n\n数据库会自动每小时执行一次 AWR 快照，并将统计信息保存在 AWR 中八天。一份 AWR 报告包含两个快照之间捕获的数据，这两个快照不必是连续的。因此，AWR\
  \ 报告可以让您检查两个时间点之间的实例性能。您可以通过**Oracle Enterprise Manager**生成 AWR 报告。不过，我们会向您展示如何使用\
  \ Oracle 提供的脚本创建 AWR 报告。\n\n要为单实例数据库生成 AWR 报告，请执行`awrrpt.sql`脚本，如下所示。\n\n```\nSQL>\
  \ @?/rdbms/admin/awrrpt.sql\n\nCurrent Instance\n~~~~~~~~~~~~~~~~\n   DB Id    DB\
  \ Name      Inst Num Instance\n----------- ------------ -------- ------------\n\
  1118243965 ORCL1               1 orcl1\nSpecify the Report Type\n~~~~~~~~~~~~~~~~~~~~~~~\n\
  Would you like an HTML report, or a plain text report?\nEnter 'html' for an HTML\
  \ report, or 'text' for plain text\nDefaults to 'html'\nEnter value for report_type:\
  \ text\n\nType Specified:  \n```\n\n选择基于文本或 HTML 的报告。HTML 报告是默认报告类型，它提供外观美观、格式良好、易于阅读的报告。按\
  \ Enter 键选择默认的 HTML 类型报告。\n\n```\nInstances in this Workload Repository schema\n\
  ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n\n   DB Id     Inst Num DB Name  \
  \    Instance     Host\n------------ -------- ------------ ------------ ------------\n\
  * 1118243965        1 ORCL1        orcl1        MIROPC61\n\nUsing 1118243965 for\
  \ database Id\nUsing          1 for instance number\n```\n\n此时您必须指定数据库的 DBID。然而，在我们的示例中，只有一个数据库，因此也只有一个\
  \ DBID，所以无需输入 DBID。\n\n```\nSpecify the number of days of snapshots to choose from\n\
  ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\nEntering the number of days\
  \ (n) will result in the most recent\n(n) days of snapshots being listed.  Pressing\
  \ <return> without\nspecifying a number lists all completed snapshots.\nEnter value\
  \ for num_days: 1\n```\n\n输入您希望数据库列出快照 ID 的天数。在此示例中，我们选择 1，因为我们想生成一个发生在最近一天的时间段内的\
  \ AWR 报告。\n\n```\nListing the last day's Completed Snapshots\n                 \
  \                               Snap\nInstance     DB Name        Snap Id    Snap\
