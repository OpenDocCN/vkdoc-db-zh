  \ 提示：您可以通过执行`awrsqrpt.sql`脚本来生成 AWR 报告，以分析单个 SQL 语句的性能。\n\n#### 工作原理\n\n您生成的 AWR\
  \ 报告会显示两个时间点之间捕获的性能统计信息，每个时间点称为一个快照。通过仔细阅读 AWR 报告，您可以深入了解数据库性能。AWR 报告在大多数情况下运行时间不到一分钟，并且包含大量性能信息。该报告由多个部分组成。浏览\
  \ AWR 报告通常可以找出数据库未达到最佳性能水平的原因。\n\n要在 Oracle RAC 环境中为所有实例生成 AWR 报告，请改用`awrgrpt.sql`脚本。您可以通过使用`awrrpti.sql`脚本为\
