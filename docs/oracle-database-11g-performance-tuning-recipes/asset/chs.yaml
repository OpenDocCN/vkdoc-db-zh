  AWR 比较时段报告的组织结构与普通 AWR 报告类似，但它并排显示两个时段的每个性能统计信息，因此你可以快速看到性能上的差异（或相似之处）。以下是报告中的一个部分，展示了如何轻松查看第一个和第二个时段之间性能统计信息的差异。\n\
