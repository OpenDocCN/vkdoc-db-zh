- fmt: "### 磁盘空间问题解决方案\n\n在 Linux/Unix 环境中，使用 `df` 命令来识别磁盘空间问题。此示例使用 `-h` 选项来格式化输出，以便以兆字节或千兆字节报告空间使用情况：\n\
    ```\n$ df -h\n```\n\n以下是一些示例输出：\n```\nFilesystem            Size  Used Avail Use%\
    \ Mounted on\n/dev/mapper/VolGroup00-LogVol00\n                       29G   28G\
    \     0 100% /\n/dev/sda1              99M   19M   75M  20% /boot\n```\n\n以上输出表明，此服务器上的根\
    \ (`/`) 文件系统已满。在这种情况下，一旦识别出已满的挂载点，就可以使用 `find` 命令来定位目录结构中的最大文件。此示例导航到 `ORACLE_HOME`\
    \ 目录，然后连接 `find`、`ls`、`sort` 和 `head` 命令来识别该目录下最大的文件：\n```\n$ cd $ORACLE_HOME\n\
    $ find . -ls | sort -nrk7 | head -10\n```\n\n如果您有一个已满的挂载点，还应考虑查找以下类型的可以移动或删除的文件：\n\
    \n*   删除数据库跟踪文件\n*   删除大型 Oracle Net 日志文件\n*   移动、压缩或删除旧的归档重做日志文件\n*   删除旧的安装文件或二进制文件\n\
    *   如果数据文件有大量可用空间，请考虑将其调整为更小的大小\n\n另一种识别磁盘空间使用情况的方法是查找给定目录下占用空间最大的目录。此示例结合使用 `du`、`sort`\
    \ 和 `head` 命令来显示当前工作目录下最大的十个目录：\n```\n$ du -S . | sort -nr | head -10\n```\n\n\
    前面的命令对于识别可能没有大文件但有很多占用空间的小文件（如跟踪文件）的目录特别有用。\n\n![images](images/square.jpg) **注意**\
    \ 在 Solaris Unix 系统上，前面的命令需要使用带 `-o` 选项的 `du`。\n\n### 工作原理\n\n当数据库因磁盘空间很少或没有剩余空间而挂起时，您应该快速找到可以安全删除而不影响数据库可用性的文件。在\
    \ Linux/Unix 服务器上，`df`、`find` 和 `du` 命令特别有用。\n\n处理生产数据库服务器时，强烈建议主动监控磁盘空间，以便在挂载点即将满时收到警告。下面列出了一个简单的\
    \ shell 脚本，用于监控给定挂载点的磁盘空间：\n```\n#!/bin/bash\nmntlist=\"/orahome /oraredo1 /oraarch1\
    \ /ora01 /oradump01 /\"\nfor ml in $mntlist\ndo\necho $ml\nusedSpc=$(df -h $ml\
    \ | awk '{print $5}' | grep -v capacity | cut -d \"%\" -f1 -)\nBOX=$(uname -a\
    \ | awk '{print $2}')\n#\ncase $usedSpc in\n[0-9])\narcStat=\"relax, lots of disk\
    \ space: $usedSpc\"\n;;\n[1-7][0-9])\narcStat=\"disk space okay: $usedSpc\"\n\
    ;;\n[8][0-9])\narcStat=\"space getting low: $usedSpc\"\n;;\n[9][0-9])\narcStat=\"\
    warning, running out of space: $usedSpc\"\necho $arcStat $ml | mailx -s \"space\
    \ on: $BOX\" dkuhn@oracle.com\n;;\n[1][0][0])\narcStat=\"update resume, no space\
    \ left: $usedSpc\"\necho $arcStat $ml | mailx -s \"space on: $BOX\" dkuhn@oracle.com\n\
    ;;\n*)\narcStat=\"huh?: $usedSpc\"\nesac\n#\nBOX=$(uname -a | awk '{print $2}')\n\
    echo $arcStat\n#\ndone\n#\nexit 0\n```\n\n您必须修改脚本以匹配您的环境。例如，脚本的第二行指定了被监控机器上的挂载点：\n\
    ```\nmntlist=\"/orahome /oraredo1 /oraarch1 /ora01 /oradump01 /\"\n```\n\n这些挂载点应与\
    \ `df -h` 命令输出中列出的挂载点匹配。对于运行此脚本的 Solaris 机器，以下是 `df` 的输出：\n```\nFilesystem   \
    \          size   used  avail capacity  Mounted on\n/                      35G\
    \   5.9G    30G    17%    /\n/ora01                 230G   185G    45G    81%\
    \    /ora01\n/oraarch1              100G    12G    88G    13%    /oraarch1\n/oradump01\
    \             300G    56G   244G    19%    /oradump01\n/orahome              \
    \  20G    15G   5.4G    73%    /orahome\n/oraredo1               30G   4.9G  \
    \  25G    17%    /oraredo1\n```\n\n另外，根据您使用的 Linux/Unix 版本，您还必须修改这一行：\n```\nusedSpc=$(df\
    \ -h $ml | awk '{print $5}' | grep -v capacity | cut -d \"%\" -f1 -)\n```\n\n\
    前面的代码行依赖于 `df` 命令的输出，该输出可能因操作系统供应商和版本而有所不同。例如，在一个 Linux 系统上，`df` 的输出可能跨越两行并报告\
    \ `Use%` 而不是 `capacity`，因此在此场景下，`usedSpc` 变量的填充方式如下所示：\n```\nusedSpc=$(for x in\
    \ `df -h $ml | grep -v \"Use%\"` ; do echo $x ; done | \\\ngrep \"%\" |  cut -d\
    \ \"%\" -f1 -)\n```\n\n前面的代码（为了适应页面而分成两行）运行几个 Linux/Unix 命令并将输出放入 `usedSpc` 变量。该命令首先运行\
    \ `df -h`，然后通过管道传递给 `awk` 命令。`awk` 命令获取输出并打印第五列。然后通过管道传递给 `grep` 命令，该命令使用 `-v`\
    \ 从输出中排除单词 `Use%`。最后通过管道传递给 `cut` 命令，该命令从输出中切出“%”字符。\n\n在 Linux/Unix 系统上，像前面这样的\
    \ shell 脚本可以很容易地从 `cron` 等调度工具运行。例如，如果 shell 脚本名为 `filesp.bsh`，则是一个示例 `cron` 条目：\n\
    ```\n#-----------------------------------------------------------------\n# Filesystem\
    \ check\n7 * * * * /orahome/oracle/bin/filesp.bsh 1>/orahome/oracle/bin/log/filesp.log\
    \ 2>&1\n#-----------------------------------------------------------------\n```\n\
    \n前面的条目指示系统在每天每小时的第七分钟运行 `filesp.bsh` shell 脚本。\n\n### 6-2. 识别系统瓶颈 (vmstat)\n\n\
    #### 问题\n\n您想确定服务器性能问题是否特别与磁盘 I/O、CPU、内存或网络相关。\n\n![images](images/square.jpg)\
    \ **注意** 如果您在 Solaris 下运行，请参阅 Recipe 6-3 以获取适用于该操作系统的特定解决方案。\n\n#### 解决方案\n\n\
    使用 `vmstat` 来确定系统资源在何处受到限制。例如，以下命令在 Linux 系统上每五秒报告一次系统资源使用情况：\n```\n$ vmstat 5\n\
    ```\n\n以下是一些示例输出：\n```\nprocs -----------memory---------- ---swap-- -----io----\
    \ --system-- -----cpu------\n r  b   swpd   free   buff  cache   si   so    bi\
    \    bo   in   cs us sy id wa st\n2  0 228816 2036164  78604 3163452   0    0\
    \     1   16    0    0 29  0 70  0  0\n 2  0 228816 2035792  78612 3163456   0\
    \    0     0   59  398  528 50  1 49  0  0\n 2  0 228816 2035172  78620 3163448\
    \   0    0     0   39  437  561 50  1 49  0  0\n```\n\n要在此模式下退出 `vmstat`，请按 Ctrl+C。您也可以让\
    \ `vmstat` 报告特定的运行次数。例如，这指示 `vmstat` 每六秒运行一次，总共报告十次：\n```\n$ vmstat 6 10\n```\n\
    \n以下是解释 `vmstat` 输出时可以使用的一些通用启发式方法：\n\n*   如果 `wa`（等待 I/O 的时间）列很高，这通常表明存储子系统过载。有关识别\
    \ I/O 争用源，请参阅 Recipe 6-6。\n*   如果 `b`（正在睡眠的进程）持续大于 0，则您可能没有足够的 CPU 处理能力。有关识别消耗最多\
    \ CPU 的 Oracle 进程和 SQL 语句，请参阅 Recipe 6-5 和 6-9。\n*   如果 `so`（换出到磁盘的内存）和 `si`（从磁盘换入的内存）持续大于\
    \ 0，您可能存在内存瓶颈。有关识别消耗最多内存的 Oracle 进程和 SQL 语句的详细信息，请参阅 Recipe 6-5。"
  raw: '#### Solution


    In a Linux/Unix environment, use the `df` command to identify disk space issues.
    This example uses the `-h` to format the output so that space is reported in megabytes
    or gigabytes:


    `$ df -h`


    Here is some sample output:


    `Filesystem            Size  Used Avail Use% Mounted on`

    `/dev/mapper/VolGroup00-LogVol00`

    `                       29G   28G     0 100% /`

    `/dev/sda1              99M   19M   75M  20% /boot`


    The prior output indicates that the root (`/`) file system is full on this server.
    In this situation, once a full mount point is identified, then use the `find`
    command to locate the largest files contained in a directory structure. This example
    navigates to the `ORACLE_HOME` directory and then connects the `find`, `ls`, `sort`,
    and `head` commands to identify the largest files beneath that directory:


    `$ cd $ORACLE_HOME`

    `$ find . -ls | sort -nrk7 | head -10`


    If you have a full mount point, also consider looking for the following types
    of files that can be moved or removed:


    *   Deleting database trace files

    *   Removing large Oracle Net log files

    *   Moving, compressing, or deleting old archive redo log files

    *   Removing old installation files or binaries

    *   If you have datafiles with ample free space, consider resizing them to smaller
    sizes


    Another way to identify where the disk space is being used is to find the largest
    space-consuming directories beneath a given directory. This example combines the
    `du`, `sort`, and `head` commands to show the ten largest directories beneath
    the current working directory:


    `$ du -S . | sort -nr | head -10`


    The prior command is particularly useful for identifying a directory that might
    not necessarily have large files in it, but lots of small files consuming space
    (like trace files).


    ![images](images/square.jpg) **Note** On Solaris Unix systems, the prior command
    will need to use `du` with the `-o` option.


    #### How It Works


    When you have a database that is hung because there is little or no free disk
    space, you should quickly find files that can be safely removed without compromising
    database availability. On Linux/Unix servers, the `df`, `find`, and `du` commands
    are particularly useful.


    When working with production database servers, it''s highly desirable to proactively
    monitor disk space so that you''re warned about a mount point becoming full. Listed
    next is a simple shell script that monitors disk space for a given set of mount
    points:


    `#!/bin/bash`

    `mntlist="/orahome /oraredo1 /oraarch1 /ora01 /oradump01 /"`

    `for ml in $mntlist`

    `do`

    `echo $ml`

    `usedSpc=$(df -h $ml | awk ''{print $5}'' | grep -v capacity | cut -d "%" -f1
    -)`

    `BOX=$(uname -a | awk ''{print $2}'')`

    `#`

    `case $usedSpc in`

    `[0-9])`

    `arcStat="relax, lots of disk space: $usedSpc"`

    `;;`

    `[1-7][0-9])`

    `arcStat="disk space okay: $usedSpc"`

    `;;`

    `[8][0-9])`

    `arcStat="space getting low: $usedSpc"`

    `;;`

    `[9][0-9])`

    `arcStat="warning, running out of space: $usedSpc"`

    `echo $arcStat $ml | mailx -s "space on: $BOX" dkuhn@oracle.com`

    `;;`

    `[1][0][0])`

    `arcStat="update resume, no space left: $usedSpc"`

    `echo $arcStat $ml | mailx -s "space on: $BOX" dkuhn@oracle.com`

    `;;`

    `*)`

    `arcStat="huh?: $usedSpc"`

    `esac`

    `#`

    `BOX=$(uname -a | awk ''{print $2}'')`

    `echo $arcStat`

    `#`

    `done`

    `#`

    `exit 0`


    You''ll have to modify the script to match your environment. For example, the
    second line of the script specifies the mount points on the box being monitored:


    `mntlist="/orahome /oraredo1 /oraarch1 /ora01 /oradump01 /"`


    These mount points should match the mount points listed in the output of the `df
    –h` command. For a Solaris box that this script runs on, here''s the output of
    `df`:


    `Filesystem             size   used  avail capacity  Mounted on`

    `/                       35G   5.9G    30G    17%    /`

    `/ora01                 230G   185G    45G    81%    /ora01`

    `/oraarch1              100G    12G    88G    13%    /oraarch1`

    `/oradump01             300G    56G   244G    19%    /oradump01`

    `/orahome                20G    15G   5.4G    73%    /orahome`

    `/oraredo1               30G   4.9G    25G    17%    /oraredo1`


    Also, depending on what version of Linux/Unix you''re using, you''ll have to modify
    this line as well:


    `usedSpc=$(df -h $ml | awk ''{print $5}'' | grep -v capacity | cut -d "%" -f1
    -)`


    The prior line of code depends on the output of the `df` command, which can vary
    somewhat depending on the operating system vendor and version. For example, on
    one Linux system, the output of `df` might span two lines and reports on `Use%`
    instead of `capacity`, so in this scenario, the `usedSpc` variable is populated
    as shown:


    ``usedSpc=$(for x in `df -h $ml | grep -v "Use%"` ; do echo $x ; done | \``

    `grep "%" |  cut -d "%" -f1 -)`


    The prior code (broken into two lines to fit on the page) runs several Linux/Unix
    commands and places the output in the `usedSpc` variable. The command first runs
    `df –h`, which is piped to the `awk` command. The `awk` command takes the output
    and prints out the fifth column. This is piped to the `grep` command, which uses
    `–v` to eliminate the word `Use%` from the output. This is finally piped to the
    `cut` command, which cuts out the “%” character from the output.


    On a Linux/Unix system, a shell script such as the prior one can easily be run
    from a scheduling utility such as `cron`. For example, if the shell script is
    named `filesp.bsh`, here is a sample `cron` entry:


    `#-----------------------------------------------------------------`

    `# Filesystem check`

    `7 * * * * /orahome/oracle/bin/filesp.bsh 1>/orahome/oracle/bin/log/filesp.log
    2>&1`

    `#-----------------------------------------------------------------`


    The prior entry instructs the system to run the `filesp.bsh` shell script at seven
    minutes after the hour for every hour of the day.


    ### 6-2. Identifying System Bottlenecks (vmstat)


    #### Problem


    You want to determine if a server performance issue is specifically related to
    disk I/O, CPU, memory, or network.


    ![images](images/square.jpg) **Note** If you are running under Solaris, see Recipe
    6-3 for a specific solution applying to that operating system.


    #### Solution


    Use `vmstat` to determine where the system is resource-constrained. For example,
    the following command reports on system resource usage every five seconds on a
    Linux system:


    `$ vmstat 5`


    Here is some sample output:


    `procs -----------memory---------- ---swap-- -----io---- --system-- -----cpu------`

    ` r  b   swpd   free   buff  cache   si   so    bi    bo   in   cs us sy id wa
    st`

    `2  0 228816 2036164  78604 3163452   0    0     1   16    0    0 29  0 70  0  0`

    ` 2  0 228816 2035792  78612 3163456   0    0     0   59  398  528 50  1 49  0  0`

    ` 2  0 228816 2035172  78620 3163448   0    0     0   39  437  561 50  1 49  0  0`


    To exit out of `vmstat` in this mode, press Ctrl+C. You can also have `vmstat`
    report for a specific number of runs. For example, this instructs `vmstat` to
    run every six seconds for a total of ten reports:


    `$ vmstat 6 10`


    Here are some general heuristics you can use when interpreting the output of `vmstat`:


    *   If the `wa` (time waiting for I/O) column is high, this is usually an indication
    that the storage subsystem is overloaded. See Recipe 6-6 for identifying the sources
    of I/O contention.

    *   If `b` (processes sleeping) is consistently greater than 0, then you may not
    have enough CPU processing power. See Recipes 6-5 and 6-9 for identifying Oracle
    processes and SQL statements consuming the most CPU.

    *   If `so` (memory swapped out to disk) and `si` (memory swapped in from disk)
    are consistently greater than 0, you may have a memory bottleneck. See Recipe
    6-5 for details on identifying Oracle processes and SQL statements consuming the
    most memory.'
