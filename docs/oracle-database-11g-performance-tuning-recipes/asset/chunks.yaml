- fmt: '## Solution


    Often, third-party vendors don''t support customers adding their own indexes to
    an application. However, there may be a scenario in which you''re certain you
    can increase a query''s performance without impacting other queries in the application.
    You can create the index as invisible and then explicitly instruct a query to
    use the index via a hint—for example:


    ```sql

    SQL> create index inv_idx1 on inv(inv_id) invisible;

    ```


    Next, ensure that the `OPTIMIZER_USE_INVISIBLE_INDEXES` initialization parameter
    is set to `TRUE` (the default is `FALSE`). This instructs the optimizer to consider
    invisible indexes:


    ```sql

    SQL> alter system set optimizer_use_invisible_indexes=true;

    ```


    Now, use a hint to tell the optimizer that the index exists:


    ```sql

    SQL> select /*+ index (inv INV_IDX1) */ inv_id from inv where inv_id=1;

    ```


    You can verify that the index is being used by setting `AUTOTRACE TRACE EXPLAIN`
    and running the `SELECT` statement:


    ```sql

    SQL> set autotrace trace explain;

    SQL> select /*+ index (inv INV_IDX1) */ inv_id from inv where inv_id=1;

    ```


    Here''s some sample output indicating that the optimizer chose to use the invisible
    index:


    ```

    -----------------------------------------------------------------------------

    | Id  | Operation        | Name     | Rows  | Bytes | Cost (%CPU)| Time     |

    -----------------------------------------------------------------------------

    |   0 | SELECT STATEMENT |          |     1 |    13 |     1   (0)| 00:00:01 |

    |*  1 |  INDEX RANGE SCAN| INV_IDX1 |     1 |    13 |     1   (0)| 00:00:01 |

    -----------------------------------------------------------------------------

    ```


    Keep in mind that an invisible index means only that the optimizer can''t see
    the index. Just like any other index, an invisible index consumes space and resources
    when executing `DML` statements.


    ## How It Works


    In Oracle Database 11g and higher, you have the option of making an index invisible
    to the optimizer. Oracle still maintains invisible indexes but doesn''t make them
    available for use by the optimizer. If you want the optimizer to use an invisible
    index, you can do so with a SQL hint. Invisible indexes have a couple of interesting
    uses:


    *   You can add an invisible index to a third-party application without affecting
    existing code or support agreements.

    *   Altering an index to invisible before dropping it allows you to quickly recover
    if you later determine that the index is required.


    The first bulleted item was discussed in the “Solution” section of this recipe.
    The second scenario is discussed in this section. For example, suppose you''ve
    identified an index that isn''t being used and are considering dropping it. In
    earlier releases of Oracle, you could mark the index as `UNUSABLE` and then later
    drop indexes that you were certain weren''t being used. If you later determined
    that you needed an unusable index, the only way to re-enable the index was to
    rebuild it. For large indexes, this could take a long time and consume considerable
    database resources.


    Making an index invisible has the advantage that it tells the optimizer only to
    not use the index. The invisible index is still maintained as the underlying table
    has records inserted, updated, or deleted. If you decide that you later need the
    index, there is no need to rebuild it. You simply have to mark it as visible again—for
    example:


    ```sql

    SQL> alter index inv_idx1 visible;

    ```


    You can verify the visibility of an index via this query:


    ```sql

    SQL> select index_name, status, visibility from user_indexes;

    ```


    Here''s some sample output:


    ```

    INDEX_NAME                     STATUS   VISIBILITY

    ------------------------------ -------- ----------

    INV_IDX1                       VALID    VISIBLE

    ```


    ## OLD SCHOOL: INSTRUCTING THE OPTIMIZER NOT TO USE AN INDEX


    In the olden days, sometimes the rule-based optimizer (deprecated) would choose
    to use an index that would significantly decrease performance. In these situations,
    `DBAs` and developers would manually instruct the optimizer not to use an index
    on a numeric-based column as follows:


    ```sql

    SQL> select cust_id from cust where cust_id+0 = 12345;

    ```


    In the prior statement, the `+0` adds nothing to the logic of the SQL statement
    (and therefore has no impact on the result set). In this scenario, the optimizer
    will automatically not use an index on a numeric column that has been modified
    with an arithmetic expression.


    Similarly with character-based columns, indexes will be ignored for columns that
    have characters concatenated to them—for example:


    ```sql

    SQL> select last_name from cust where last_name || '''' = ''SMITH'';

    ```


    In the prior statement, the `||''''` adds nothing to the logic of the SQL, but
    results in the optimizer not using an index on the `LAST_NAME` column (if one
    exists).


    ## 2-12. Creating a Bitmap Index in Support of a Star Schema


    ## Problem


    You have a data warehouse that contains a star schema. The star schema consists
    of a large fact table and several dimension (lookup) tables. The primary key columns
    of the dimension tables map to foreign key columns in the fact table. You would
    like to create bitmap indexes on all of the foreign key columns in the fact table.


    ## Solution


    You use the `BITMAP` keyword to create a bitmap index. The next line of code creates
    a bitmap index on the `CUST_ID` column of the `F_SALES` table:


    ```sql

    SQL> create bitmap index f_sales_cust_fk1 on f_sales(cust_id);

    ```


    The type of index is verified with the following query:


    ```sql

    SQL> select index_name, index_type from user_indexes where index_name=''F_SALES_CUST_FK1'';

    ```


    ```

    INDEX_NAME                     INDEX_TYPE

    ------------------------------ ---------------------------

    F_SALES_CUST_FK1               BITMAP

    ```


    ## How It Works


    A bitmap index stores the `ROWID` of a row and a corresponding bitmap. You can
    think of the bitmap as a combination of ones and zeros. A one indicates the presence
    of a value, and a zero indicates that the value doesn''t exist. Bitmap indexes
    are ideal for low-cardinality columns (few distinct values) and where the application
    is not frequently updating the table. Bitmap indexes are commonly used in data
    warehouse environments where you have star schema design.


    A typical star schema structure consists of a large fact table and many small
    dimension (lookup) tables. In these scenarios, it''s common to create bitmap indexes
    on fact table–foreign key columns. The fact tables are typically loaded on a daily
    basis and (usually) aren''t subsequently updated or deleted.


    You shouldn''t use bitmap indexes on `OLTP` databases with high `INSERT`/`UPDATE`/`DELETE`
    activities, due to locking issues. Locking issues arise because the structure
    of the bitmap index results in potentially many rows being locked during `DML`
    operations, which results in locking problems for high-transaction `OLTP` systems.


    ![images](images/square.jpg) **Note** Bitmap indexes and bitmap join indexes are
    available only with the Oracle Enterprise Edition of the database.


    ## 2-13. Creating a Bitmap Join Index


    ## Problem


    You''re working in a data warehouse environment. You have a fairly large dimension
    table that is often joined to an extremely large fact table. You wonder if there''s
    a way to create a bitmap index in such a way that it can eliminate the need for
    the optimizer to access the dimension table blocks to satisfy the results of a
    query.'
