    If for some reason your database is set with a default mode of `FORCE` at the
    database or table level, you can use the `NO_RESULT_CACHE` hint to bypass the
    result cache. If we run our previous query with the result cache mode set to `FORCE`,
    it is evident that the result cache is used automatically.


