- fmt: "## How It Works\n\nThe goal of concurrent statistics gathering is to reduce\
    \ the statistics gathering time for large tables and partitions. When you enable\
    \ concurrent statistics gathering, Oracle uses the job scheduler and advanced\
    \ queuing capabilities of the database to create multiple concurrent statistics\
    \ gathering jobs. The `job_queue_processes` parameter determines the maximum number\
    \ of concurrent statistics gathering jobs. In a RAC environment, you must set\
    \ this parameter on each node. Concurrent statistics gathering works somewhat\
    \ differently depending on the level of statistics gathering (table level or not),\
    \ as explained here.\n\nIf you execute the `DBMS_STATS.GATHER_TABLE_STATS` procedure\
    \ to collect statistics on a partitioned table, Oracle will create a separate\
    \ statistics collection job for each partition (and subpartition) in the table.\
    \ The scheduler determines how many jobs to run concurrently, and how many jobs\
    \ it must queue, based on the system capacity.\n\n![images](images/square.jpg)\
    \ Note: The value of the `job_queue_processes` parameter determines the maximum\
    \ number of concurrent statistics collection jobs.\n\nIf you execute the `GATHER_DATABASE_STATS`,\
    \ `GATHER_SCHEMA_STATS`, or the `GATHER_DICTIONARY_STATS` procedures, Oracle creates\
    \ a separate statistics collection job for each table and each partition in a\
    \ partitioned table. To prevent potential deadlocking issues, Oracle won't process\
    \ multiple partitioned tables concurrently. Oracle creates a coordinator job for\
    \ each partitioned table, to manage the partition statistics collection jobs.\
    \ Each job is either a coordinator for a table's partition-level jobs (if the\
    \ table is partitioned), or is an actual statistics gathering job. If you have\
    \ multiple partitioned tables, the database queues all partitioned tables except\
    \ one; as it finishes gathering statistics for each partitioned table, it dequeues\
    \ and starts another job for a partitioned table. This queuing behavior doesn't\
    \ apply to non-partitioned tables.\n\n### Using a Parallel Execution Strategy\n\
    \nIf you're gathering statistics for very large tables, you can enable parallel\
    \ execution of the individual statistics gathering jobs. To do this, you must\
    \ disable the `parallel_adaptive_multi_user` initialization parameter as shown\
    \ here:\n\n```\nSQL> alter system set parallel_adaptive_multi_user=false;\n```\n\
    \nAlthough not necessary, Oracle also recommends that you enable parallel statement\
    \ queuing by activating the resource manager, creating a temporary resource plan,\
    \ and enable queuing for the consumer group `OTHER_GROUPS`. Here's a simple example\
    \ that shows how to create a temporary resource plan and enable the resource manager:\n\
    \n```\nbegin\n  dbms_resource_manager.create_pending_area();\n  dbms_resource_manager.create_plan('parallel_test',\
    \ 'parallel_test');\n  dbms_resource_manager.create_plan_directive(\n        'parallel_test',\n\
    \        'OTHER_GROUPS',\n        'OTHER_GROUPS directive for parallel test',\n\
    \        parallel_target_percentage => 90);\n  dbms_resource_manager.submit_pending_area();\n\
    end;\n/\nALTER SYSTEM SET RESOURCE_MANAGER_PLAN = 'parallel_test' SID='*';\n```\n\
    \n### Monitoring Concurrent Stats Collection Jobs\n\nUse the `DBA_SCHEDULER_JOBS`\
    \ view to monitor the concurrent statistics gathering jobs. You can view all the\
    \ concurrent statistics collection jobs in your database by issuing the following\
    \ statement:\n\n```\nSQL> select job_name,state,comments\n     from dba_scheduler_jobs\n\
    \     where job_class like 'CONC%';\n```\n\nIf you want to limit the output to\
    \ currently executing jobs, add the line \"`and state='RUNNING'`\" to the previous\
    \ query. Similarly, you can add the line \"`and state='SCHEDULED'`\" to view only\
    \ the scheduled jobs that are waiting to run. You can check the elapsed time for\
    \ the currently executing statistics gathering jobs by issuing the following query:\n\
    \n```\nSQL> select job_name,elapsed_time\n     from dba_scheduler_running_jobs\n\
    \     where job_name like 'ST$%';\n```\n\n# C H A P T E R 14 Implementing Query\
    \ Hints\n\nPlacing hints in SQL is a common and simple approach to improve performance.\
    \ Hints influence Oracle's optimizer to take a specific path to accomplish a given\
    \ task, overriding the default path the optimizer may have chosen. Hints can also\
    \ be viewed as a double-edged sword. If not implemented and maintained properly,\
    \ they can hurt performance in the long run.\n\nThe most popular reason to use\
    \ hints is simply to get data out of the database faster, and many of the available\
    \ hints are geared for that purpose. The Oracle database supports more than 60\
    \ hints, so it is apparent that hints can be placed in SQL for a multitude of\
    \ reasons. The purpose of this chapter is to categorize these hints into subsets,\
    \ and then to show specific examples of some of the popular and most performance-impacting\
    \ hints.\n\nSome of the reasons to place hints in SQL are to change the access\
    \ path to the database, change the join order or join type for queries that are\
    \ doing joins, hints for DML, and hints for data warehouse–specific operations,\
    \ to name a few. In addition, there are new Oracle 11g hints to take advantage\
    \ of some of the new features of Oracle 11g.\n\n## 14-1. Writing a Hint\n\n###\
    \ Problem\n\nYou want to place a hint into a SQL statement.\n\n### Solution\n\n\
    Place your hint into the statement using the `/*+ hint */` syntax—for example:\n\
    \n```\nSELECT /*+ full(emp) */ * FROM emp;\n```\n\nBe sure to leave a space following\
    \ the plus sign. The `/*+` sequence is exactly three characters long, with no\
    \ spaces. Generally, you want to place your hint immediately following the SQL\
    \ verb beginning the statement. While it is not required to place this sequence\
    \ of characters after the SQL verb, it is customary to do this.\n\n### How It\
    \ Works\n\nHints are delimited by special characters placed within your SQL statement.\
    \ Each hint starts with a forward slash, followed by the star and plus characters.\
    \ They end with a star and forward slash:\n\n```\nSELECT /*+ full(emp) */ * FROM\
    \ emp;\n```\n\n[Table 14-1](#Chapter14.html#tab_14_1) breaks down many of the\
    \ most popular hints into specific categories. This table is meant to make it\
    \ easier to zero in on a hint based on your specific need, so keep in mind that\
    \ some of these hints actually can fit into multiple categories. Another thing\
    \ to remember about hints is that for many of them, you can enable a particular\
    \ feature or aspect, and you can disable that same feature or aspect. For example,\
    \ there is an `INDEX` hint to enable the use of an index. There is also a `NO_INDEX`\
    \ hint, which disables the use of an index. This is true for many of the available\
    \ hints within the Oracle database.\n\nFor a complete listing of hints, refer\
    \ to the Oracle Database Performance Tuning Guide for your version of the database.\n\
    \n![image](images/t1401.jpg)\n![image](images/t1401a.jpg)\n\n## 14-2. Changing\
    \ the Access Path\n\n### Problem\n\nYou have a query that you have determined\
    \ is not taking the access path you desire."
  raw: '#### How It Works


    The goal of concurrent statistics gathering is to reduce the statistics gathering
    time for large tables and partitions. When you enable concurrent statistics gathering,
    Oracle uses the job scheduler and advanced queuing capabilities of the database
    to create multiple concurrent statistics gathering jobs. The `job_queue_processes`
    parameter determines the maximum number of concurrent statistics gathering jobs.
    In a RAC environment, you must set this parameter on each node. Concurrent statistics
    gathering works somewhat differently depending on the level of statistics gathering
    (table level or not), as explained here.


    If you execute the `DBMS_STATS.GATHER_TABLE_STATS` procedure to collect statistics
    on a partitioned table, Oracle will create a separate statistics collection job
    for each partition (and subpartition) in the table. The scheduler determines how
    many jobs to run concurrently, and how many jobs it must queue, based on the system
    capacity.


    ![images](images/square.jpg) **Note** The value of the `job_queue_processes` parameter
    determines the maximum number of concurrent statistics collection jobs.


    If you execute the `GATHER_DATABASE_STATS`, `GATHER_SCHEMA_STATS`, or the `GATHER_DICTIONARY_STATS`
    procedures, Oracle creates a separate statistics collection job for each table
    and each partition in a partitioned table. To prevent potential deadlocking issues,
    Oracle won''t process multiple partitioned tables concurrently. Oracle creates
    a coordinator job for each partitioned table, to manage the partition statistics
    collection jobs. Each job is either a coordinator for a table''s partition-level
    jobs (if the table is partitioned), or is an actual statistics gathering job.
    If you have multiple partitioned tables, the database queues all partitioned tables
    except one; as it finishes gathering statistics for each partitioned table, it
    dequeues and starts another job for a partitioned table. This queuing behavior
    doesn''t apply to non-partitioned tables.


    ##### Using a Parallel Execution Strategy


    If you''re gathering statistics for very large tables, you can enable parallel
    execution of the individual statistics gathering jobs. To do this, you must disable
    the `parallel_adaptive_multi_user` initialization parameter as shown here:


    `SQL> alter system set parallel_adaptive_multi_user=false;`


    Although not necessary, Oracle also recommends that you enable parallel statement
    queuing by activating the resource manager, creating a temporary resource plan,
    and enable queuing for the consumer group `OTHER _GROUPS`. Here''s a simple example
    that shows how to create a temporary resource plan and enable the resource manager:


    `begin`

    `  dbms_resource_manager.create_pending_area();`

    `  dbms_resource_manager.create_plan(''parallel_test'', ''parallel_test'');`

    `  dbms_resource_manager.create_plan_directive(`

    `        ''parallel_test'',`

    `        ''OTHER_GROUPS'',`

    `        ''OTHER_GROUPS directive for parallel test'',`

    `        parallel_target_percentage => 90);`

    `  dbms_resource_manager.submit_pending_area();`

    `end;`

    `/`

    `ALTER SYSTEM SET RESOURCE_MANAGER_PLAN = ''parallel_test'' SID=''*'';`


    ##### Monitoring Concurrent Stats Collection Jobs


    Use the `DBA_SCHEDULER_JOBS` view to monitor the concurrent statistics gathering
    jobs. You can view all the concurrent statistics collection jobs in your database
    by issuing the following statement:


    `SQL> select job_name,state,comments`

    `     from dba_scheduler_jobs`

    `     where job_class like ''CONC%'';`


    If you want to limit the output to currently executing jobs, add the line “`and
    state=''RUNNING''`” to the previous query. Similarly, you can add the line “`and
    state=''SCHEDULED''`” to view only the scheduled jobs that are waiting to run.
    You can check the elapsed time for the currently executing statistics gathering
    jobs by issuing the following query:


    `SQL> select job_name,elapsed_time`

    `     from dba_scheduler_running_jobs`

    `     where job_name like ''ST$%'';`


    ## C H A P T E R  14


    ## Implementing Query Hints


    Placing hints in SQL is a common and simple approach to improve performance. Hints
    influence Oracle''s optimizer to take a specific path to accomplish a given task,
    overriding the default path the optimizer may have chosen. Hints can also be viewed
    as a double-edged sword. If not implemented and maintained properly, they can
    hurt performance in the long run.


    The most popular reason to use hints is simply to get data out of the database
    faster, and many of the available hints are geared for that purpose. The Oracle
    database supports more than 60 hints, so it is apparent that hints can be placed
    in SQL for a multitude of reasons. The purpose of this chapter is to categorize
    these hints into subsets, and then to show specific examples of some of the popular
    and most performance-impacting hints.


    Some of the reasons to place hints in SQL are to change the access path to the
    database, change the join order or join type for queries that are doing joins,
    hints for DML, and hints for data warehouse–specific operations, to name a few.
    In addition, there are new Oracle 11g hints to take advantage of some of the new
    features of Oracle 11g.


    ### 14-1. Writing a Hint


    #### Problem


    You want to place a hint into a SQL statement.


    #### Solution


    Place your hint into the statement using the `/*+ hint */` syntax—for example:


    `SELECT /*+ full(emp) */ * FROM emp;`


    Be sure to leave a space following the plus sign. The `/*+` sequence is exactly
    three characters long, with no spaces. Generally, you want to place your hint
    immediately following the SQL verb beginning the statement. While it is not required
    to place this sequence of characters after the SQL verb, it is customary to do
    this.


    #### How It Works


    Hints are delimited by special characters placed within your SQL statement. Each
    hint starts with a forward slash, followed by the star and plus characters. They
    end with a star and forward slash:


    `SELECT /*+ full(emp) */ * FROM emp;`


    [Table 14-1](#Chapter14.html#tab_14_1) breaks down many of the most popular hints
    into specific categories. This table is meant to make it easier to zero in on
    a hint based on your specific need, so keep in mind that some of these hints actually
    can fit into multiple categories. Another thing to remember about hints is that
    for many of them, you can enable a particular feature or aspect, and you can disable
    that same feature or aspect. For example, there is an `INDEX` hint to enable the
    use of an index. There is also a `NO_INDEX` hint, which disables the use of an
    index. This is true for many of the available hints within the Oracle database.


    For a complete listing of hints, refer to the Oracle Database Performance Tuning
    Guide for your version of the database.


    ![image](images/t1401.jpg)


    ![image](images/t1401a.jpg)


    ### 14-2\. Changing the Access Path


    #### Problem


    You have a query that you have determined is not taking the access path you desire.'
  trans: "## 工作原理\n\n并发统计信息收集的目标是缩短大表和分区的统计信息收集时间。启用并发统计信息收集后，Oracle 会利用数据库的作业调度器和高级队列功能创建多个并发统计信息收集作业。参数\
    \ `job_queue_processes` 决定了并发统计信息收集作业的最大数量。在 RAC 环境中，您必须在每个节点上设置此参数。并发统计信息收集的工作方式在某种程度上取决于统计信息收集的级别（是否在表级别），如下所述。\n\
    \n如果您执行 `DBMS_STATS.GATHER_TABLE_STATS` 过程来收集分区表的统计信息，Oracle 将为表中的每个分区（和子分区）创建一个单独的统计信息收集作业。调度器会根据系统容量来决定并发运行的作业数量以及需要排队的作业数量。\n\
    \n![images](img/square.jpg) 注意：`job_queue_processes` 参数的值决定了并发统计信息收集作业的最大数量。\n\
    \n如果您执行 `GATHER_DATABASE_STATS`、`GATHER_SCHEMA_STATS` 或 `GATHER_DICTIONARY_STATS`\
    \ 过程，Oracle 会为每个表以及分区表中的每个分区创建一个单独的统计信息收集作业。为了防止潜在的死锁问题，Oracle 不会同时处理多个分区表。Oracle\
    \ 会为每个分区表创建一个协调器作业，以管理该分区的统计信息收集作业。每个作业要么是一个表分区级作业的协调器（如果该表是分区表），要么是一个实际的统计信息收集作业。如果您有多个分区表，数据库会将除一个以外的所有分区表放入队列；在完成对一个分区表的统计信息收集后，它会将另一个分区表的作业出队并启动。这种队列行为不适用于非分区表。\n\
    \n### 使用并行执行策略\n\n如果您正在为极大的表收集统计信息，可以启用各个统计信息收集作业的并行执行。为此，您必须禁用 `parallel_adaptive_multi_user`\
    \ 初始化参数，如下所示：\n\n```\nSQL> alter system set parallel_adaptive_multi_user=false;\n\
    ```\n\n虽然不是必需的，Oracle 还建议您通过激活资源管理器、创建一个临时资源计划，并为消费者组 `OTHER_GROUPS` 启用队列来启用并行语句排队。以下是一个简单的示例，展示了如何创建临时资源计划并启用资源管理器：\n\
    \n```\nbegin\n  dbms_resource_manager.create_pending_area();\n  dbms_resource_manager.create_plan('parallel_test',\
    \ 'parallel_test');\n  dbms_resource_manager.create_plan_directive(\n        'parallel_test',\n\
    \        'OTHER_GROUPS',\n        'OTHER_GROUPS directive for parallel test',\n\
    \        parallel_target_percentage => 90);\n  dbms_resource_manager.submit_pending_area();\n\
    end;\n/\nALTER SYSTEM SET RESOURCE_MANAGER_PLAN = 'parallel_test' SID='*';\n```\n\
    \n### 监控并发统计信息收集作业\n\n使用 `DBA_SCHEDULER_JOBS` 视图来监控并发统计信息收集作业。您可以通过执行以下语句查看数据库中的所有并发统计信息收集作业：\n\
    \n```\nSQL> select job_name,state,comments\n     from dba_scheduler_jobs\n   \
    \  where job_class like 'CONC%';\n```\n\n如果您想将输出限制为当前正在执行的作业，请在上述查询中添加 \"`and\
    \ state='RUNNING'`\" 这一行。类似地，您可以添加 \"`and state='SCHEDULED'`\" 来仅查看正在等待运行的已计划作业。您可以通过执行以下查询来检查当前正在执行的统计信息收集作业的已用时间：\n\
    \n```\nSQL> select job_name,elapsed_time\n     from dba_scheduler_running_jobs\n\
    \     where job_name like 'ST$%';\n```\n\n# 第 14 章 实现查询提示\n\n在 SQL 中放置提示是提高性能的一种常见且简单的方法。提示会影响\
    \ Oracle 优化器，使其采取特定的路径来完成给定任务，从而覆盖优化器可能选择的默认路径。提示也可以被视为一把双刃剑。如果实施和维护不当，从长远来看它们可能会损害性能。\n\
    \n使用提示最常见的原因只是为了更快地从数据库中获取数据，许多可用的提示也是为此目的而设计的。Oracle 数据库支持超过 60 个提示，因此很明显，提示可以因多种原因被放置在\
    \ SQL 中。本章的目的是将这些提示分类为不同的子集，然后展示一些流行且对性能影响最大的提示的具体示例。\n\n在 SQL 中放置提示的一些原因包括：更改数据库的访问路径、更改执行连接操作的查询的连接顺序或连接类型、用于\
    \ DML 的提示、以及用于数据仓库特定操作的提示，等等。此外，还有 Oracle 11g 的新提示，以利用 Oracle 11g 的一些新特性。\n\n\
    ## 14-1. 编写提示\n\n### 问题\n\n您希望将一个提示放入 SQL 语句中。\n\n### 解决方案\n\n使用 `/*+ hint */`\
    \ 语法将您的提示放入语句中——例如：\n\n```\nSELECT /*+ full(emp) */ * FROM emp;\n```\n\n请确保在加号后面留一个空格。`/*+`\
    \ 序列正好是三个字符长，没有空格。通常，您希望将提示紧跟在开始 SQL 语句的动词之后。虽然不要求将此字符序列放在 SQL 动词之后，但这是惯例。\n\n\
    ### 工作原理\n\n提示由放置在 SQL 语句中的特殊字符界定。每个提示以正斜杠开始，后跟星号和加号字符。它们以星号和正斜杠结束：\n\n```\nSELECT\
    \ /*+ full(emp) */ * FROM emp;\n```\n\n表 14-1 将许多最流行的提示分解为特定类别。此表旨在使您能够根据特定需求更容易地找到合适的提示，因此请记住，其中一些提示实际上可以属于多个类别。关于提示要记住的另一点是，对于许多提示，您可以启用某个特定特性或方面，也可以禁用该特性或方面。例如，有一个\
    \ `INDEX` 提示用于启用索引的使用。还有一个 `NO_INDEX` 提示，用于禁用索引的使用。对于 Oracle 数据库中许多可用的提示来说都是如此。\n\
    \n有关提示的完整列表，请参阅您所使用的数据库版本的《Oracle 数据库性能调优指南》。\n\n![image](img/t1401.jpg)\n![image](img/t1401a.jpg)\n\
    \n## 14-2. 更改访问路径\n\n### 问题\n\n您有一个查询，您已确定它没有采用您期望的访问路径。"
- fmt: '## Solution


    You can change the access path of your SQL statement by placing an access path
    hint in your query. The two most common access path hints to place in a query
    tell the Oracle optimizer to do a full table scan, or use an index. Often, the
    optimizer does a good job of choosing the best or at least a reasonable path to
    the data needed for a query. Sometimes, though, because of the specific makeup
    of data in a table, the statistics for the objects, or the specific configuration
    of a given database, the optimizer doesn''t necessarily make the best choice.
    In these cases, you can influence the optimizer by placing a hint in your query.


    By the time you decide to place a hint in a query, you should already know that
    the optimizer isn''t making the choice you want. Let''s say you want to place
    a hint in your query to tell the optimizer to modify the access path to either
    perform a full table scan, or change how the optimizer will access the data from
    table. Full table scans are appropriate if your query will be returning a large
    number of rows. For example, if you want to perform a full table scan on your
    table, your hint will appear as follows:


    ```sql

    SELECT /*+ full(emp) */ empno, ename

    FROM emp

    WHERE DEPTNO = 20;

    ```


    The foregoing hint instructs the optimizer to bypass the use of any possible indexes
    on the `EMP` table, and simply scan the entire table in order to retrieve the
    data for the query.


    Conversely, let''s say you are retrieving a much smaller subset of data from the
    `EMP` table, and you want to get the average salary for those employees in department
    20. You can tell the optimizer to use an index on a given table in the query:


    ```sql

    SELECT /*+ index(emp emp_i2) */ avg(sal)

    FROM emp

    WHERE deptno = 20;

    ```


    ![images](images/square.jpg) Tips with incorrect or improper syntax are ignored
    by the optimizer.


    ## How It Works


    Access path hints, like many hints, are placed in your query because you already
    know what access path the optimizer is going to take for your query, and you believe
    it will be more efficient using the method you specify with the hint. It is very
    important that before you use a hint, you validate that you are not getting the
    access path you desire or think you should be getting. You can also gauge the
    potential performance gain by analyzing the optimizer''s cost of the query with
    and without the hint.


    For example, you want to compare your salary to other jobs in your company, so
    you write the following query to get, by job title, the minimum, average, and
    maximum salary.


    ```sql

    SELECT job, min(sal), avg(sal), max(sal)

    FROM emp

    WHERE deptno=20

    GROUP BY job;

    ```


    ```

    -----------------------------------------------

    | Id  | Operation                    | Name   |

    -----------------------------------------------

    |   0 | SELECT STATEMENT             |        |

    |   1 |  HASH GROUP BY               |        |

    |   2 |   TABLE ACCESS BY INDEX ROWID| EMP    |

    |   3 |    INDEX RANGE SCAN          | EMP_I2 |

    -----------------------------------------------

    ```


    If you want to bypass the use of the index in the query, placing the `FULL` hint
    in the query will instruct the optimizer to bypass the use of the index:


    ```sql

    SELECT /*+ full(emp) */ job, min(sal), avg(sal), max(sal)

    FROM emp

    WHERE deptno=20

    GROUP BY job;

    ```


    ```

    -----------------------------------

    | Id  | Operation         | Name  |

    -----------------------------------

    |   0 | SELECT STATEMENT  |       |

    |   1 |  HASH GROUP BY    |       |

    |   2 |   TABLE ACCESS FULL| EMP  |

    -----------------------------------

    ```


    Another way you can tell the optimizer to bypass the use of an index is by telling
    the optimizer to not use indexes to retrieve the data for a given query. In this
    particular case, it has the same effect as the `FULL` hint:


    ```sql

    SELECT /*+ no_index(emp) */ job, min(sal), avg(sal), max(sal)

    FROM emp

    WHERE deptno=20

    GROUP BY job;

    ```


    You can also explicitly state the name of the index you wish to bypass:


    ```sql

    SELECT /*+ no_index(emp emp_i2) */ job, min(sal), avg(sal), max(sal)

    FROM emp

    WHERE deptno=20

    GROUP BY job;

    ```


    In both of the foregoing cases, the result is a full table scan. In a different
    case, you may have a query that could possibly use different indexes. For instance,
    on our `EMP` table, we have an index on the `DEPTNO` column, and we also have
    an index on the `HIREDATE` column. If we wanted to execute a query to get the
    employees that started in the year 1980 for department 20, our query would look
    like this:


    ```sql

    SELECT empno, ename

    FROM emp

    WHERE DEPTNO = 20

    AND hiredate

    BETWEEN to_date(''1980-01-01'',''yyyy-mm-dd'')

    AND to_date(''1980-12-31'',''yyyy-mm-dd'');

    ```


    ```

    ----------------------------------------------

    | Id  | Operation                   | Name   |

    ----------------------------------------------

    |   0 | SELECT STATEMENT            |        |

    |   1 |  TABLE ACCESS BY INDEX ROWID| EMP    |

    |   2 |   INDEX RANGE SCAN          | EMP_I1 |

    ----------------------------------------------

    ```


    In this case, the optimizer chose the `EMP_I1` index, which is the index on the
    `HIREDATE` column. We can instruct the optimizer to bypass the use of that index:


    ```sql

    SELECT /*+ no_index(emp emp_i1) */ job, min(sal), avg(sal), max(sal)

    FROM emp

    WHERE deptno=20

    GROUP BY job;

    ```


    In this case, we don''t necessarily know what the optimizer is going to do next.
    It may decide to use our other index on the `DEPTNO` column, or it could choose
    to perform a full table scan. It is good practice in using hints to be as specific
    as possible when instructing the optimizer what to do. Therefore, if we place
    an index hint to tell the optimizer to use the index on the `DEPTNO` column, we
    can see that the optimizer now uses that index:


    ```sql

    SELECT /*+ index(emp emp_i2) */ empno, ename

    FROM emp

    WHERE DEPTNO = 20

    AND hiredate

    BETWEEN to_date(''1980-01-01'',''yyyy-mm-dd'')

    AND to_date(''1980-12-31'',''yyyy-mm-dd'');

    ```


    ```

    ----------------------------------------------

    | Id  | Operation                   | Name   |

    ----------------------------------------------

    | 0 | SELECT STATEMENT            |        |

    | 1 |  TABLE ACCESS BY INDEX ROWID| EMP    |

    | 2 |   INDEX RANGE SCAN          | EMP_I2 |

    ----------------------------------------------

    ```


    Other examples of index hints are the `INDEX_FFS` for an index fast full scan,
    and the `INDEX SS` for an index skip scan. The `INDEX_SS` hint is appropriate
    if you have a table with composite, multi-column indexes. It is possible to have
    Oracle use the index, even if the query does not use the leading column of the
    index. At times, the `INDEX_SS` hint can be beneficial to retrieve data fast,
    even if the column noted in the `WHERE` clause isn''t the leading column of an
    index. For example, if we want to get the names of all employees that received
    a commission, our query would look like this:


    ```sql

    SELECT ename, comm FROM emp

    WHERE comm > 0;

    ```


    ```

    ----------------------------------

    | Id  | Operation        | Name  |

    ----------------------------------

    |   0 | SELECT STATEMENT |       |

    |   1 |  TABLE ACCESS FULL| EMP  |

    ----------------------------------

    ```


    As noted in the explain plan, no index is used. We happen to know there is a composite
    index on the `SAL` and `COMM` columns of our `EMP` table. We can add a hint to
    use this index to gain the benefit of having an index on the `COMM` column, even
    though it is not the leading column of the index:


    ```sql

    SELECT /*+ index_ss(emp emp_i3) */ ename, comm FROM emp

    WHERE comm > 0;

    ```


    ```

    ----------------------------------------------

    | Id  | Operation                   | Name   |

    ----------------------------------------------

    |   0 | SELECT STATEMENT            |        |

    |   1 |  TABLE ACCESS BY INDEX ROWID| EMP    |

    |   2 |   INDEX SKIP SCAN           | EMP_I3 |

    ----------------------------------------------

    ```


    ![images](images/square.jpg) Notes Hints influence the optimizer, but the optimizer
    may still choose to ignore any hints specified in the query.'
