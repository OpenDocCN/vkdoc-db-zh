    subquery would return all of the matching rows.


    If you want to see how your salary stacks up against the average salaries of employees
    in your company, you can issue a subquery in the `SELECT` clause to accomplish
    this:


    **`SELECT last_name, first_name, salary, ROUND((SELECT AVG(salary) FROM employees))
    avg_sal`**

    `FROM employees`

