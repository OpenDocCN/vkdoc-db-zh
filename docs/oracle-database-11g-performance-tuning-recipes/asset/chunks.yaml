    `FROM emp`

    `WHERE hiredate between ''2010-01-01'' and ''2010-12-31'';`


    ![images](images/square.jpg) **Note** As of Oracle 11g Release 2, the `NOPARALLEL`
    and `NOPARALLEL_INDEX` hints have been deprecated. Instead, use `NO_PARALLEL`
    and `NO_PARALLEL_INDEX`.


    ### 15-2. Enabling Parallelism at Object Creation


    #### Problem


    You have new tables to create in your database that will be growing to a very
    large size, and you want speed the queries against those tables.'
  trans: '## 工作原理


    为了有效地使用并行提示，您需要考虑以下几项：

    *   您查询中涉及的表数量

    *   您查询中表的大小

    *   您系统上的 CPU 数量

    *   您`WHERE`子句中的过滤列

    *   哪些列有索引（如果有的话）


    在查询中使用并行提示之前，您还必须分析和理解系统的三个关键组件：

    *   系统配置，例如内存和 CPU 数量，甚至磁盘配置

    *   与并行性相关的数据库配置参数

    *   对象本身（表和索引）上指定的并行度


    并行 SQL 必须谨慎使用，因为过度使用很常见，并且可能导致系统资源过度利用，最终导致性能`变慢`而非加快。过度使用是使用并行性时一个非常常见的错误。


    根据查询中涉及的表的数量，您可能希望对一个或多个表启用并行性——这取决于它们的大小。一个经验法则是，如果一个表包含超过 1000 万行，或大小至少为 2GB，它可能是一个适合使用并行性的候选对象。


    并行度应直接与系统上的 CPU 数量相关。如果您使用的是单 CPU 系统，使用并行 SQL 几乎没有（如果有的话）好处，结果返回速度甚至可能比完全不使用并行性还要慢。


    要帮助确定是否可以在任何索引上使用并行性，您需要首先确定`WHERE`子句中的任何过滤列是否被索引。如果是，请检查表是否已分区。通常，对于大型表上的查询，`parallel_index`提示可能有助于提高查询速度。总的来说，在决定是否对查询使用并行性时，执行解释计划以确定是否会使用并行性是有帮助的。此外，查询中的某个对象可能已指定了并行性，因此在检查提示中的并行度之前，检查`USER_TABLES`或`USER_INDEXES`视图中的`DEGREE`列也是一个好主意。


    表 15-1 显示了可以使用的不同并行提示。


    ![images](img/t1501.jpg)


    Oracle 为您提供了许多选项来帮助您确定合适的并行度，无论您是想自己指定，还是希望 Oracle 为您的查询确定并行度。表 15-2 简要描述了这些选项。


    ![images](img/t1502.jpg)


    ### 表的并行提示


    为了确定查询中是否使用了并行性，首先对您的查询执行解释计划。以下是一个简单查询及其关联的执行计划：


    ```

    select * from emp;

    ```


    ```

    --------------------------------------------------------------------------

    | Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |

    --------------------------------------------------------------------------

    |   0 | SELECT STATEMENT  |      |    14 |  1218 |     3   (0)| 00:00:01 |

    |   1 |  TABLE ACCESS FULL| EMP  |    14 |  1218 |     3   (0)| 00:00:01 |

    --------------------------------------------------------------------------

    ```


    如果未使用并行性，您可以插入 parallel 提示，然后重新运行解释计划以验证优化器是否会在执行计划中使用并行性——例如：


    ```

    select /*+ parallel(emp,4) */ * from emp;

    ```


    ```

    ----------------------------------------------------------------------

    | Id  | Operation            | Name     |    TQ  |IN-OUT| PQ Distrib |

    ----------------------------------------------------------------------

    |   0 | SELECT STATEMENT     |          |        |      |            |

    |   1 |  PX COORDINATOR      |          |        |      |            |

    |   2 |   PX SEND QC (RANDOM)| :TQ10000 |  Q1,00 | P->S | QC (RAND)  |

    |   3 |    PX BLOCK ITERATOR |          |  Q1,00 | PCWC |            |

    |   4 |     TABLE ACCESS FULL| EMP      |  Q1,00 | PCWP |            |

    ----------------------------------------------------------------------

    ```


    ![images](img/square.jpg) `注意` 需要正确设置适当的数据库初始化参数，才能通过使用提示启用并行性。


    ### 索引的并行提示


    尽管并行化基于索引的查询要少见得多，但在某些情况下可能有益。例如，您可能希望并行化针对分区表的本地索引的查询。以下是一个示例查询及其产生的执行计划：


    ```

    SELECT /*+ parallel_index(emp, emp_i3) */ empno, ename

    FROM emp

    WHERE hiredate between ''2010-01-01'' and ''2010-12-31'';

    ```


    ```

    ------------------------------------------------------------------------------------------

    | Id  | Operation                                    | Name             |    TQ  |IN-OUT|
    PQ Dist |

    ------------------------------------------------------------------------------------------

    |   0 | SELECT STATEMENT                             |                  |        |      |         |

    |   1 |  PX COORDINATOR                              |                  |        |      |         |

    |   2 |   PX SEND QC (RANDOM)                        | :TQ10000         |  Q1,00
    | P->S |         |

    |   3 |    PX PARTITION RANGE ITERATOR               |                  |  Q1,00
    | PCWC |         |

    |   4 |     TABLE ACCESS BY LOCAL INDEX ROWID        | EMP              |  Q1,00
    | PCWP |         |

    |   5 |      INDEX RANGE SCAN                        | EMP_I3           |  Q1,00
    | PCWP |         |

    ------------------------------------------------------------------------------------------

    ```


    在格式化提示时，您可以指定所有参数，以准确告知优化器使用哪个索引以及您期望的并行度。在以下查询中，我们告诉优化器希望使用`EMP_I3`索引，并行度为 4。


    ```

    SELECT /*+ parallel_index(emp, emp_i3, 4) */ empno, ename

    FROM emp

    WHERE hiredate between ''2010-01-01'' and ''2010-12-31'';

    ```


    如果您在提示中省略并行度，优化器将根据初始化参数设置确定并行度。例如，在以下示例中，提示中指定了表名和索引名，但未指定并行度。Oracle 将在这些情况下为我们计算并行度。


    ```

    SELECT /*+ parallel_index(emp, emp_i3) */ empno, ename

    FROM emp

    WHERE hiredate between ''2010-01-01'' and ''2010-12-31'';

    ```


    您也可以简单地在提示中放置表名，优化器也将确定可以使用哪个索引（如果有的话）。如果优化器确定没有合适的索引，则不会使用任何索引。在以下示例中，提示中只使用了表名：


    ```

    SELECT /*+ parallel_index(emp) */ empno, ename

    FROM emp

    WHERE hiredate between ''2010-01-01'' and ''2010-12-31'';

    ```


    ![images](img/square.jpg) `注意` 从 Oracle 11g 第 2 版开始，`NOPARALLEL`和`NOPARALLEL_INDEX`提示已被弃用。请改用`NO_PARALLEL`和`NO_PARALLEL_INDEX`。


    ## 15-2. 在创建对象时启用并行性


    ### 问题


    您需要在数据库中创建新的表，这些表将增长到非常大的尺寸，并且您希望加快对这些表的查询速度。'
- fmt: "# 启用并行性\n\n## 15-2. 为新建对象设置并行度\n\n### Solution\n\n为表或索引设置高于默认值的并行度（DOP）是启用多进程处理的一种简单直接的方法，能提供更一致和固定的行为。对表或索引启用并行性是通过\
    \ DDL 命令完成的。你可以在创建表或索引的 `CREATE` 语句中启用并行性。\n\n对于一个新表，如果你期望有能利用多进程的稳定查询，那么为对象设置一个固定的\
    \ DOP 可能比在 SQL 中添加提示（hint）或让 Oracle 为你设置 DOP 更方便。在以下示例中，我们为 `EMP` 表指定了 DOP 为 4：\n\
    \n```sql\nCREATE TABLE EMP\n(\n EMPNO NUMBER(4) CONSTRAINT PK_EMP PRIMARY KEY,\n\
    \ ENAME VARCHAR2(10),\n JOB VARCHAR2(9),\n MGR NUMBER(4),\n HIREDATE DATE,\n SAL\
    \ NUMBER(7,2),\n COMM NUMBER(7,2),\n DEPTNO NUMBER(2) CONSTRAINT FK_DEPTNO REFERENCES\
    \ DEPT\n)\nPARALLEL(DEGREE 4);\n```\n\n通过在表上放置一个静态的 DOP 值 4，任何访问 `EMP` 表的用户执行的每个查询都将使用\
    \ DOP 为 4。\n\n```sql\nselect * from emp;\n```\n\n```\n----------------------------------------------------------------------\n\
    | Id  | Operation            | Name     |    TQ  |IN-OUT| PQ Distrib |\n----------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT     |          |        |      |            |\n|   1\
    \ |  PX COORDINATOR      |          |        |      |            |\n|   2 |  \
    \ PX SEND QC (RANDOM)| :TQ10000 |  Q1,00 | P->S | QC (RAND)  |\n|   3 |    PX\
    \ BLOCK ITERATOR |          |  Q1,00 | PCWC |            |\n|   4 |     TABLE\
    \ ACCESS FULL| EMP      |  Q1,00 | PCWP |            |\n----------------------------------------------------------------------\n\
    ```\n\n在创建索引时，也可以指定默认的 DOP。在某些情况下，创建索引时使用更高的 DOP 是有益的。对于大型分区表，在 `WHERE` 子句中常用的列上创建二次本地分区索引是很常见的。使用这些索引的一些查询可能会受益于增加\
    \ DOP。在以下 DDL 中，我们以 DOP 为 4 创建了这个索引：\n\n```sql\nCREATE INDEX EMP_I1\nON EMP (HIREDATE)\n\
    LOCAL\nPARALLEL(DEGREE 4);\n```\n\n### How It Works\n\n直接在对象上设置并行性有助于多个进程更快地完成任务——无论是加速查询，还是帮助加速索引的创建。为了能够评估为对象设置的合适\
    \ DOP，你应该了解数据的访问模式。如果对对象的信息了解越少，设置的 DOP 就应该越保守。为一系列对象设置高 DOP 可能会像它帮助性能一样轻易地损害性能，因此启用对象\
    \ DOP 需要经过仔细的规划和考虑。\n\n![images](images/square.jpg) **提示** 如果启用了自动 DOP 并且配置正确（`PARALLEL_DEGREE_POLICY=AUTO`），那么你在对象上设置的并行性将被忽略，优化器会选择要使用的并行度。有关启用自动\
    \ DOP 的详细信息，请参见配方 15-10。\n\n## 15-3. 为现有对象启用并行性\n\n### Problem\n\n你有一系列运行缓慢的查询正在访问一组现有的数据库表，并且你希望采取措施来减少查询的执行时间。\n\
    \n### Solution\n\n为现有表或索引设置更高的 DOP 是一种更一致和固定的启用多进程的方法。设置表或索引的 DOP 是在 DDL 命令中完成的。你可以使用\
    \ `ALTER` 语句来更改表或索引的 DOP。例如，如果你有一个现有表需要更改 DOP 以适应希望利用多进程的用户查询，可以轻松地将其添加到表上，并立即生效。以下示例更改了表的默认\
    \ DOP：\n\n```sql\nALTER TABLE EMP\nPARALLEL(DEGREE 4);\n```\n\n如果过了一段时间，你希望重置表上的\
    \ DOP，也可以使用 `ALTER` 语句来完成。查看以下两个示例，了解如何重置表的 DOP：\n\n```sql\nALTER TABLE EMP\n\
    PARALLEL(DEGREE 1);\n```\n\n```sql\nALTER TABLE EMP\nNOPARALLEL;\n```\n\n如果你认为一个已存在的索引会受益于更高的\
    \ DOP，也可以轻松更改。与表一样，更改会立即生效。以下示例展示了如何更改索引的默认 DOP：\n\n```sql\nALTER INDEX EMP_I1\n\
    PARALLEL(DEGREE 4);\n```\n\n与表类似，你可以通过以下两种方式之一重置索引的 DOP：\n\n```sql\nALTER INDEX\
    \ EMP_I4\nPARALLEL(DEGREE 1);\n```\n\n```sql\nALTER INDEX EMP_I4\nNOPARALLEL;\n\
    ```\n\n### How It Works\n\n增加现有对象的 DOP 是表明你数据库中访问表的查询已经存在性能问题的标志。监控并行性能是了解为对象或一组对象设置的\
    \ DOP 是否合适的关键因素。检查 `V$PQ_TQSTAT` 中的数据以帮助确定已使用的 DOP，或检查 `V$SYSSTAT` 以帮助了解数据库上并行性的使用程度。请参阅配方\
    \ 15-12 获取使用这些数据字典视图的一些示例。\n\n## 15-4. 实现并行 DML\n\n### Problem\n\n你希望在执行 DML 操作（`INSERT`、`UPDATE`、`MERGE`、`DELETE`）时诱导并行性，以提高性能并减少事务时间。\n\
    \n### Solution\n\n如果在数据仓库环境或需要高容量批量事务的大型表环境中操作，并行 DML 可以帮助加快处理速度并减少执行这些操作所需的时间。并行\
    \ DML 在数据库中默认是禁用的，必须使用以下语句显式启用：\n\n```sql\nALTER SESSION ENABLE PARALLEL DML;\n\
    ```\n\n通过指定上述语句，它确实*启用*了会话中并行 DML 的可能性，但并不保证一定会发生。并行 DML 操作只会在特定条件下发生：\n\n*  \
    \ 在 DML 语句中指定了提示（hint）。\n*   具有并行属性的表是 DML 语句的一部分。\n*   DML 操作满足语句并行运行的适当规则。使用并行\
    \ DML 的关键限制在本配方后面部分注明。\n\n在某些情况下，你可能希望强制并行行为，无论你为对象设置了什么并行度，或者无论你在 DML 中放置了什么提示。因此，或者，你可以使用以下语句强制并行\
    \ DML：\n\n```sql\nALTER SESSION FORCE PARALLEL DML;\n```\n\n作为一般规则，在常规运行的 DML\
    \ 中强制使用并行 DML 不是一个好的做法，因为它会很快消耗系统资源，导致性能开始下降。最好谨慎使用，它可以帮助处理偶尔的大型 DML 操作。"
  raw: '#### Solution


    Having a higher than default DOP on a table or index is an easy way to set a more
    consistent and fixed method of enabling multiple processes on tables and indexes.
    Enabling parallelism on tables or indexes is done within DDL commands. You can
    enable parallelism within the `CREATE` statement when creating a table or an index.


    For a new table, if you are expecting to have consistent queries that can take
    advantage of multiple processes, it may be easier to set a fixed DOP on your object,
    rather than having to place hints in your SQL, or let Oracle set the DOP for you.
    In the following example, we''ve specified a DOP of 4 on the `EMP` table:


    `CREATE TABLE EMP`

    `(`

    ` EMPNO NUMBER(4) CONSTRAINT PK_EMP PRIMARY KEY,`

    ` ENAME VARCHAR2(10),`

    ` JOB VARCHAR2(9),`

    ` MGR NUMBER(4),`

    ` HIREDATE DATE,`

    ` SAL NUMBER(7,2),`

    ` COMM NUMBER(7,2),`

    ` DEPTNO NUMBER(2) CONSTRAINT FK_DEPTNO REFERENCES DEPT`

    `)`

    `PARALLEL(DEGREE 4);`


    By placing a static DOP of 4 on the table, any user accessing the `EMP` table
    will get a DOP of 4 for each query executed.


    `select * from emp;`


    `----------------------------------------------------------------------`

    `| Id  | Operation            | Name     |    TQ  |IN-OUT| PQ Distrib |`

    `----------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT     |          |        |      |            |`

    `|   1 |  PX COORDINATOR      |          |        |      |            |`

    `|   2 |   PX SEND QC (RANDOM)| :TQ10000 |  Q1,00 | P->S | QC (RAND)  |`

    `|   3 |    PX BLOCK ITERATOR |          |  Q1,00 | PCWC |            |`

    `|   4 |     TABLE ACCESS FULL| EMP      |  Q1,00 | PCWP |            |`

    `----------------------------------------------------------------------`


    You can also specify a default DOP when creating an index. There are circumstances
    where it may be beneficial to create an index with a higher DOP. With large partitioned
    tables, it is common to have secondary locally partitioned indexes on often-used
    columns in the `WHERE` clause. Some queries that use these indexes may benefit
    from increasing the DOP. In the following DDL, we''ve created this index with
    a DOP of 4:


    `CREATE INDEX EMP_I1`

    `ON EMP (HIREDATE)`

    `LOCAL`

    `PARALLEL(DEGREE 4);`


    #### How It Works


    Placing parallelism on objects themselves helps multiple processes complete the
    task at hand sooner—whether it be to speed up queries, or to help speed up the
    creation of an index. In order to be able to assess the proper DOP to place on
    an object, you should know the access patterns of the data. If less information
    is known about the objects, the more conservative the DOP should be. Placing a
    high DOP on a series of objects can hurt performance just as easily as it can
    help, so enabling DOP on objects needs to be done with careful planning and consideration.


    ![images](images/square.jpg) **Tip** If automatic DOP is enabled and configured
    properly (`PARALLEL_DEGREE_POLICY=AUTO`), then the parallelism that you set on
    objects is ignored, and the optimizer chooses the degree of parallelism to be
    used. See Recipe 15-10 for details on enabling automatic DOP.


    ### 15-3\. Enabling Parallelism for an Existing Object


    #### Problem


    You have a series of slow-running queries accessing a set of existing database
    tables, and you want to take steps to reduce the execution time of the queries.


    #### Solution


    Setting a higher DOP on an existing table or index is an easy way to have a more
    consistent and fixed method of enabling multiple processes on tables and indexes.
    Setting the DOP for tables or indexes is done within DDL commands. You can change
    the DOP on a table or index by using the `ALTER` statement. For instance, if you
    have an existing table that needs to have the DOP changed to accommodate user
    queries that want to take advantage of multiple processes, they can be added easily
    to the table, which takes effect immediately. The following example alters the
    default DOP for a table:


    `ALTER TABLE EMP`

    `PARALLEL(DEGREE 4);`


    If, after a time, you wish to reset the DOP on your table, you can also do that
    with the `ALTER` statement. See the following two examples on how to reset the
    DOP for a table:


    `ALTER TABLE EMP`

    `PARALLEL(DEGREE 1);`


    `ALTER TABLE EMP`

    `NOPARALLEL;`


    If you have an already existing index that you think will benefit from a higher
    DOP, it can also easily be changed.  As with tables, the change takes effect immediately.
    The following example shows how to change the default DOP for an index:


    `ALTER INDEX EMP_I1`

    `PARALLEL(DEGREE 4);`


    As with tables, you can reset the DOP on an index either of the following two
    ways:


    `ALTER INDEX EMP_I4`

    `PARALLEL(DEGREE 1);`


    `ALTER INDEX EMP_I4`

    `NOPARALLEL;`


    #### How It Works


    Increasing the DOP on an existing object is a sign that you already have a performance
    issue for queries accessing tables within your database. Monitoring parallelism
    performance is a key factor in knowing if the DOP set for an object or set of
    objects is appropriate. Examine data in the `V$PQ_TQSTAT` to assist in determining
    the DOP that has been used, or `V$SYSSTAT` to assist in the extent that parallelism
    is being used on your database. Refer to Recipe 15-12 for some examples of using
    these data dictionary views.


    ### 15-4\. Implementing Parallel DML


    #### Problem


    You want to induce parallelism when performing DML operations (`INSERT`, `UPDATE`,
    `MERGE`, `DELETE`) in order to speed performance and reduce transaction time.


    #### Solution


    If operating within a data warehouse environment or an environment with large
    tables that require a high volume of bulk transactions, parallel DML can help
    speed up processing and reduce the time it takes to perform these operations.
    Parallel DML is disabled by default on a database, and must be explicitly enabled
    with the following statement:


    `ALTER SESSION ENABLE PARALLEL DML;`


    By specifying the foregoing statement, it truly *enables* parallel DML to be possible
    in a session, but does not guarantee it. Parallel DML operations will occur only
    under certain conditions:


    *   Hints are specified in a DML statement.

    *   Tables with a parallel attribute are part of a DML statement.

    *   The DML operations meet the appropriate rules for a statement to run in parallel.
    Key restrictions for using parallel DML are noted later in the recipe.


    You may desire, in certain circumstances, to force parallel behavior, regardless
    of the parallel degree you have placed on an object, or regardless of any hints
    you''ve placed in your DML. So, alternatively, you can force parallel DML with
    the following statement:


    `ALTER SESSION FORCE PARALLEL DML;`


    As a general rule, it is not good practice to force parallel DML in your regularly
    run DML, as it can quickly consume system resources to a point where performance
    begins to suffer. It is best used sparingly, and can help with occasional large
    DML operations.'
