    \ to 25 pct                              1\n\n6 rows selected.\n```\n\n如果你查看 `V$PQ_SYSSTAT`\
    \ 视图，你可以看到数据库中并行从属进程的活动情况。通过查看这些统计数据，你可以快速了解数据库上的并行是否配置得当。例如，如果你看到 `Servers Shutdown`\
    \ 和 `Servers Started` 的值很高，则可能表明 `PARALLEL_MIN_SERVERS` 参数设置得太低，因为系统需要持续启动和停止并行进程，从而产生了开销。\n\
    \n```sql\nSELECT * FROM v$pq_sysstat\nWHERE statistic LIKE 'Server%';\n```\n\n\
    ```\nSTATISTIC                                 VALUE\n------------------------------\
    \ --------------------\nServers Busy                                   0\nServers\
    \ Idle                                   0\nServers Highwater                \
    \              4\nServer Sessions                                8\nServers Started\
    \                                4\nServers Shutdown                         \
    \      4\nServers Cleaned Up                             0\n\n7 rows selected.\n\
    ```\n\n如果你在寻找关于某个并行操作的会话级统计信息，查看 `V$PQ_TQSTAT` 视图对于确定工作如何在并行从属进程之间拆分非常有用，同时它也能根据\
    \ `V$PQ_TQSTAT` 中的信息提供实际使用的并行度。让我们使用提示（hint）指定并行度为 4，再次对 `EMP` 表运行并行查询。\n\n```sql\n\
    SELECT /*+ parallel(emp,4) */ * FROM emp;\n```\n\n查询完成后（仍在同一会话中），我们可以查询 `V$PQ_TQSTAT`\
    \ 来获取该查询所用并行操作的信息：\n\n```sql\nSELECT dfo_number, tq_id, server_type, process,\
    \ num_rows, bytes\nFROM v$pq_tqstat\nORDER BY dfo_number DESC, tq_id, server_type\
    \ DESC , process;\n```\n\n```\nDFO_NUMBER        TQ_ID SERVER_TYP PROCESS    \
    \    NUM_ROWS      BYTES\n---------- ---------- ---------- ---------- ----------\
    \ ----------\n         1          0 Producer   P000             298629   13211118\n\
    \         1          0 Producer   P001             302470   13372088\n       \
    \  1          0 Producer   P002             315956   13978646\n         1    \
    \      0 Producer   P003             317512   14052340\n         1          0\
    \ Consumer   QC              1234567   54614192\n```\n\n我们可以看到，在四个生产者并行从属进程之间，工作分配得相当均匀。我们还可以确认此查询实际使用的并行度是\
    \ 4，与查询提示中指定的一致。\n\n## 工作原理\n\n分析数据库中并行操作性能的最快方法之一是分析动态性能视图。这些视图让你得以一窥数据库中并行处理的整体表现，从而可以指示你的数据库针对并行的调优是好是坏。它还可以提供非常具体的会话级详细信息，例如工作如何在从属进程之间拆分，以及给定操作实际使用的并行度信息。表\
    \ 15-6 概述了与并行相关的动态性能视图。\n\n![images](img/t1506.jpg)\n\n## 15-13. 查找并行进程中的瓶颈\n\n\
    ## 问题\n\n你有一些并行进程性能不佳，希望进行分析以找出瓶颈。\n\n## 解决方案\n\n有许多与并行相关的等待事件。其中许多事件被认为是“空闲”等待事件——也就是说，它们通常不表示问题。如果你查询\
    \ `V$SYSTEM_EVENT` 视图，可以了解数据库实例中发生的与并行相关的等待。以下查询结果显示了一些可能发生的常见等待事件：\n\n```sql\n\
    SELECT event, wait_class, total_waits\nFROM v$session_event\nWHERE event LIKE\
    \ 'PX%';\n```\n\n```\nEVENT                                      WAIT_CLASS  \
    \ TOTAL_WAITS\n------------------------------------------ ------------ -----------\n\
    PX Deq Credit: need buffer                 Idle               6667936\nPX Deq\
    \ Credit: send blkd                   Other              8161247\nPX Deq: Execute\
    \ Reply                      Idle                490827\nPX Deq: Execution Msg\
    \                      Idle                685175\nPX Deq: Join ACK          \
    \                 Idle                 26312\nPX Deq: Msg Fragment           \
    \            Idle                    67\nPX Deq: Parse Reply                 \
    \       Idle                 20891\nPX Deq: Signal ACK                       \
    \  Other                25729\nPX Deq: Table Q Get Keys                   Other\
    \                 3141\nPX Deq: Table Q Normal                     Idle      \
    \        25120970\nPX Deq: Table Q Sample                     Idle           \
    \      11124\nPX Deq: Table Q qref                       Other              1705216\n\
    PX Idle Wait                               Idle                241116\nPX qref\
    \ latch                              Other              1208472\n```\n\n## 工作原理\n\
    \n表 15-7 描述了一些关键的与并行相关的等待事件。如果你遇到了严重的性能问题，浏览这些等待事件，看看是否存在过多的等待或等待时间，可能是值得的。如果存在，则可能表明并行从属进程的处理存在问题。再次强调，*通常*情况下，“空闲”事件并不表示问题。\n\
    \n![images](img/t1507.jpg)\n\n![images](img/t1507a.jpg)\n\n## 15-14. 获取并行会话的详细信息\n\
    \n## 问题\n\n你有一些性能不佳的并行进程，需要关于这些会话的更详细信息。\n\n## 解决方案\n\n通过开启会话跟踪，你可以获取关于并行会话的详细跟踪信息。这本质上是一个四步过程：\n\
    \n1.  在你的会话中设置事件。\n2.  执行你的 SQL 语句。\n3.  关闭你的会话跟踪。\n4.  分析你的跟踪文件输出。\n\n例如，你再次对\
    \ `EMP` 表执行一个并行查询。为了收集跟踪信息，你需要执行以下操作：\n\n```sql\nalter session set events '10391\
    \ trace name context forever, level 128';\n```\n\n```sql\nselect /*+ parallel(emp,4)\
    \ */ * from emp;\n```\n\n```sql\nalter session set events '10391 trace name context\
    \ off';\n```\n\n然后，在跟踪文件中，你可以分析与并行相关的信息，例如以下内容：\n\n```\nkxfrDmpUpdSys\n      \
    \  allocated slave set: nsset:1 nbslv:4\n          Slave set 0: #nodes:1\n   \
    \       Min # slaves 4: Max # slaves:4\n            List of Slaves:\n        \
    \      slv 0 nid:0\n              slv 1 nid:0\n              slv 2 nid:0\n   \
    \           slv 3 nid:0\n            List of Nodes:\n              node 0\n```"
- fmt: "#### How It Works\n\nAs with other session tracing, the trace file can be\
    \ found in the destination specified under the `user_dump_dest` parameter. The\
    \ trace file shows granular information for the parallel processes. If you are\
    \ experiencing significant performance issues with parallelism, and you wish to\
    \ delve further into investigating the results of the trace files generated by\
    \ this event, it may be beneficial to simply create a service request with Oracle\
    \ in order to get the most detailed information. Reading and understanding these\
    \ trace files can be difficult and cumbersome, and it may be more expedient to\
    \ simply send the files to Oracle support for analysis. Yet another way to validate\
    \ the DOP used for a parallel operation is to use the `_px_trace` facility, which\
    \ also generates a trace file:\n```sql\nalter session set \"_px_trace\"=\"compilation\"\
    ,\"execution\",\"messaging\";\n\nselect /*+ parallel(emp,4) */ * from emp;\n```\n\
    Then, within the trace file, you can evaluate the DOP requested and used:\n```\n\
    kkscscid_pdm_eval\n        pdml_allowed=0, cursorPdmlMode=0,                sessPdmlMode=0\n\
    \        select /*+ parallel(emp,4) */ * from emp\n\nkxfrDefaultDOP\n        DOP\
    \ Trace -- compute default DOP\n            # CPU       = 2\n            Threads/CPU\
    \ = 2 (\"parallel_threads_per_cpu\")\n            default DOP = 4 (# CPU * Threads/CPU)\n\
    \nkxfpAdaptDOP\n        Requested=4 Granted=4 Target=8 Load=2 Default=4 users=0\
    \ sets=1\n        load adapt num servers requested to = 4 (from kxfpAdaptDOP())\n\
    ```\n\n## Index\n\n### ![images](images/square.jpg)A\nActive Session History (ASH)\
