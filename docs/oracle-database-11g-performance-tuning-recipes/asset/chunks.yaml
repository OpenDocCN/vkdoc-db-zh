    ```\n\n下划线很可能被当作数据搜索，而不是 `LIKE` 子句的替换字符。如果在查询中插入转义字符，就可以避免得到不期望的结果。通过在下划线前直接插入转义字符，下划线将被视为数据的一部分，而不是替换字符：\n\
    \n```\nSELECT tablespace_name FROM dba_tablespaces\nWHERE tablespace_name LIKE\
    \ '%EE^_DATA' ESCAPE '^';\n```\n\n```\nTABLESPACE_NAME\n------------------------------\n\
