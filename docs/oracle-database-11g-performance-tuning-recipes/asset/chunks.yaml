    > \n> `Cache buffers LRU chain`: These latch events are usually due to excessive\
    \ buffer cache usage and may be caused both by excessive physical reads as well\
    \ as logical reads. Either the database is performing large full table scans,\
    \ or it's performing large index range scans. The usual cause for these types\
