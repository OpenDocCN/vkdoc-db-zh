- fmt: "# Handling Nulls in the SELECT Clause\n\nWithin the `SELECT` clause, if you\
    \ are dealing with data within a column that contains null values, there are two\
    \ Oracle-provided functions you can use within SQL to transform a null value into\
    \ a more usable form. The two functions are `NVL` and `NVL2`.\n\n![images](images/square.jpg)\
    \ Actually, there are more than just the two functions `NVL` and `NVL2`. However,\
    \ those are widely used, and are a good place to begin.\n\nWith `NVL`, you simply\
    \ pass in the column name, along with the value you want to give the output based\
    \ on whether that value is null in the database. For instance, in our employees\
    \ table, not all employees get a commission based on their jobs, and the value\
    \ in that column for these employees is null:\n\n```\nSELECT ename, sal, comm\n\
    FROM emp\nORDER BY ename;\n```\n\n```\nENAME              SAL       COMM\n----------\
    \ ---------- ----------\nADAMS            1100\nALLEN            1600        300\n\
    BLAKE            2850\nKING             5000\nMARTIN           1250       1400\n\
    ```\n\nIf we simply want to see a zero in the commission column for employees\
    \ not eligible for a commission, we can use the `NVL` function to accomplish this:\n\
    \n```\nSELECT ename , sal , NVL(comm,0) comm\nFROM emp\nORDER BY ename;\n```\n\
    \n```\nENAME              SAL       COMM\n---------- ---------- ----------\nADAMS\
    \            1100          0\nALLEN            1600        300\nBLAKE        \
    \    2850          0\nKING             5000          0\nMARTIN           1250\
    \       1400\n```\n\nIf we decide to perform arithmetic on a null value, the result\
    \ will always be null; therefore if we want to compute “Total Compensation” as\
    \ salary plus commission, we must apply the `NVL` function to properly compute\
    \ this with consideration of the null values. In the following example, we compute\
    \ the sum of these columns, both with and without the `NVL` function. Without\
    \ using `NVL`, we get an incorrect result, which can be seen in the `TOTAL_COMP_NO_NVL`\
    \ output field:\n\n```\nSELECT ename , sal , nvl(comm,0) comm, sal+comm total_comp_no_nvl,\n\
    sal+NVL(comm,0) total_comp_nvl\nFROM emp\nORDER BY ename;\n```\n\n```\nENAME \
    \             SAL       COMM TOTAL_COMP_NO_NVL TOTAL_COMP_NVL\n---------- ----------\
    \ ---------- ----------------- --------------\nADAMS            1100         \
    \ 0                                 1100\nALLEN            1600        300   \
    \            1900            1900\nBLAKE            2850          0          \
    \                       2850\nKING             5000          0               \
    \                  5000\nMARTIN           1250       1400               2650 \
    \           2650\n```\n\nThe `NVL2` is similar to `NVL`, except that `NVL2` takes\
    \ in three arguments—the value or column, the value to return if the column is\
    \ not null, and finally the value to return if the column is null. For instance,\
    \ if we use the same foregoing example when determining if an employee gets a\
    \ commission, we simply want to assign a value to each employee stating whether\
    \ he or she is a “commissioned” or “non-commissioned” employee. We can accomplish\
    \ this with the `NVL2` function:\n\n```\nSELECT ename , sal ,\nNVL2(comm,'Commissioned','Non-Commissioned')\
    \ comm_status\nFROM emp\nORDER BY ename;\n```\n\n```\nENAME              SAL COMM_STATUS\n\
    ---------- ---------- ----------------\nADAMS            1100 Non-Commissioned\n\
    ALLEN            1600 Commissioned\nBLAKE            2850 Non-Commissioned\nKING\
    \             5000 Non-Commissioned\nMARTIN           1250 Commissioned\n```\n\
    \n# Handling Nulls in the WHERE Clause\n\nWithin the `WHERE` clause, if you simply\
    \ want to check a column to see if it contains a null value, use `IS NULL` or\
    \ `IS NOT NULL` as the comparison operator—for example:\n\n```\nSELECT ename ,\
    \ sal\nFROM emp\nWHERE comm IS NULL\nORDER BY ename;\n```\n\n```\nENAME      \
    \        SAL\n---------- ----------\nADAMS            1100\nBLAKE            2850\n\
    KING             5000\n```\n\n```\nSELECT ename , sal\nFROM emp\nWHERE comm IS\
    \ NOT NULL\nORDER BY ename;\n```\n\n```\nENAME              SAL\n---------- ----------\n\
    ALLEN            1600\nMARTIN           1250\n```\n\nYou can also use the `NVL`\
    \ or `NVL2` function in the `WHERE` clause just as it was used in the `SELECT`\
    \ statement:\n\n```\nSELECT ename , sal\nFROM emp\nWHERE NVL(comm,0) = 0\nORDER\
    \ BY ename;\n```\n\n```\nENAME              SAL\n---------- ----------\nADAMS\
    \            1100\nBLAKE            2850\nKING             5000\n```\n\n## How\
    \ It Works\n\nIt is best to always explicitly handle the possibility of null values,\
    \ so if a column of a table is nullable, assume nulls exist, else output results\
    \ can be undesired or unpredictable. One quick check that can be made to determine\
    \ if a column has null values is to compare a count of rows in the table (`COUNT\
    \ *`) to a count of rows for that column (`COUNT <column_name>`).  A count on\
    \ a nullable column will count only those rows that do not have null values. Here's\
    \ an example:\n\n```\nSELECT count(*) FROM emp;\n```\n\n```\n  COUNT(*)\n----------\n\
    \        14\n```\n\n```\nSELECT count(comm) FROM emp;\n```\n\n```\nCOUNT(COMM)\n\
    -----------\n          4\n```\n\nThis technique of comparing row count to a count\
    \ of values in a column is a handy way to check if nulls exist in a column.\n\n\
    Another very useful function that can be used in the handling of null values is\
    \ the `COALESCE` function. With `COALESCE`, you can pass in a series of values,\
    \ and the function will return the first non-`NULL` value. If all values within\
    \ `COALESCE` are `NULL`, a `NULL` value is returned. Here is a simple example:\n\
    \n```\nSELECT coalesce(NULL,'ABC','DEF') FROM dual;\n```\n\n```\nCOA\n---\nABC\n\
    ```\n\nLet's say you wanted to get the shipping address for your customers, and\
    \ if none were present, you would then get the billing address. Using `COALESCE`,\
    \ you could achieve this as shown in the following example:\n\n```\nSELECT COALESCE(\n\
    (SELECT shipping_address FROM customers\nWHERE cust_id = 9342),\n(SELECT billing_address\
    \ FROM customers\nWHERE cust_id = 9342))\nFROM dual;\n```\n\nAll arguments used\
    \ in a statement with `COALESCE` must be with the same datatype, else you will\
    \ receive an error, as shown here:\n\n```\nSELECT coalesce(NULL,123,'DEF') FROM\
    \ dual;\n                         *\nERROR at line 1:\nORA-00932: inconsistent\
    \ datatypes: expected NUMBER got CHAR\n```\n\n## 8-12. Searching for Partial Column\
    \ Values\n\n### Problem\n\nYou need to search for a string from a column in the\
    \ database, but do not know the exact value of the column data."
