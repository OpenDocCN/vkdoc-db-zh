    ## 14-8. 在视图中放置提示


    ### 问题


    你正在创建一个视图，并希望在该视图的查询中放置一个提示，以提高访问该视图的任何查询的性能。'
- fmt: '## Solution


    Hints can be placed in views, as a view is simply a stored query in the database.
    Depending on the type of hint used, as well as the type of view that is being
    queried, you can determine if your hint will be used. It is important to understand
    what type of view you have so you can determine what impacts hints will have on
    that view. To understand this, you first need to determine which of the following
    describes your view:

    *   Mergeable or non-mergeable view

    *   Simple or complex view


    A simple view is a view that references only one table, and there are not any
    grouping functions or expressions:

    ```

    CREATE view emp_high_sal

    AS SELECT /*+ use_index(employees) */ employee_id, first_name, last_name, salary

    FROM employees

    WHERE salary > 10000;

    ```


    A complex view can reference multiple tables, or it will have grouping clauses,
    or use functions and expressions:

    ```

    CREATE or replace view dept_sal

    AS SELECT /*+ full(employees) */ department_id, department_name,

    departments.manager_id, SUM(salary) total_salary, AVG(salary) avg_salary

    FROM employees JOIN departments USING(department_id)

    GROUP BY department_id, department_name, departments.manager_id;

    ```


    A mergeable view is simply one in which the optimizer can replace the query calling
    the view with the query within the view definition itself. For example, we simply
    want to query all the rows from our `emp_high_sal` view. The optimizer simply
    has to go directly to the `employees` table:

    ```

    SELECT * FROM emp_high_sal;

    ```

    ```

    ---------------------------------------

    | Id  | Operation         | Name      |

    ---------------------------------------

    |   0 | SELECT STATEMENT  |           |

    |   1 |  TABLE ACCESS FULL| EMPLOYEES |

    ---------------------------------------

    ```

    The optimizer has simply replaced the query with the query that defined the view:

    ```

    SELECT /*+ full(employees) */ department_id, department_name,

    departments.manager_id, SUM(salary) total_salary, AVG(salary) avg_salary

    FROM employees JOIN departments USING(department_id)

    GROUP BY department_id, department_name, departments.manager_id;

    ```

    With a mergeable view, the hint inside the view is preserved because the essential
    structure of the view definition is intact based on the query calling the view.
    See [Table 14-3](#Chapter14.html#tab_14_3) for the guidelines for hints regarding
    mergeable views.


    ![images](images/t1403.jpg)


    For a non-mergeable view, the optimizer must break the work up into two pieces.
    It first must execute the query that defines the view, and then must execute the
    top-level query. Because of this, the hints defined within the view itself are
    preserved. For instance, we are querying our `dept_sal` view. We can see from
    the explain plan that the query is broken up into pieces:

    ```

    SELECT manager_id, sum(total_salary)

    FROM dept_sal

    GROUP BY manager_id;

    ```

    ```

    -------------------------------------------------------

    | Id  | Operation                       | Name        |

    -------------------------------------------------------

    |   0 | SELECT STATEMENT                |             |

    |   1 |  HASH GROUP BY                  |             |

    |   2 |   VIEW                          | DEPT_SAL    |

    |   3 |    HASH GROUP BY                |             |

    |   4 |     MERGE JOIN                  |             |

    |   5 |      TABLE ACCESS BY INDEX ROWID| DEPARTMENTS |

    |   6 |       INDEX FULL SCAN           | DEPT_ID_PK  |

    |   7 |      SORT JOIN                  |             |

    |   8 |       TABLE ACCESS FULL         | EMPLOYEES   |

    -------------------------------------------------------

    ```

    See [Table 14-4](#Chapter14.html#tab_14_4) for the guidelines for hints regarding
    non-mergeable views.


    ![images](images/t1404.jpg)


    It can be confusing to understand all the possible scenarios with hints and views,
    so they need to be used sparingly, and only when other means of tuning have not
    met the needed requirements.


    ## How It Works


    Since a view, as mentioned, is simply a stored query, hints can be placed easily
    inside the view as they would be inside any query. The type of hint placed in
    the view will determine how and if a hint can be used within the view. Much like
    performing DML on a view, there are limitations on when hints are used or ignored.


    As a rule of thumb, the simpler a view is, the more likely hints can be effective.
    Because of the uniqueness of each application, each query, and each view, the
    only true way to know if a hint will be used is to simply try the hint and perform
    an explain plan to validate whether a given hint is used.


    Oracle does not recommend placing hints in views, as since the underlying objects
    can change over time, you can expect unpredictable execution plans. Also, views
    can be created for one specific use, but could be used for other purposes later,
    and any hints in the views may not help every scenario. In addition, hints placed
    within views are managed differently than if you were simply executing the query
    itself. Before any hint placed inside a view is used, the optimizer needs to determine
    if the view can be merged with the query calling the view.


    You can also consider placing hints within queries that access views. It is important
    to understand the rules of precedence when hints are placed within queries that
    access the views that have hints within themselves. This especially underlines
    the need for caution before placing a hint within a view.


    ![images](images/square.jpg) `Tip` Hints in queries that reference a complex view
    are ignored.


    ### 14-9\. Caching Query Results


    #### Problem


    You want to improve the performance on a given set of often-used queries, and
    want to use Oracle''s result cache to store the query results, so they can be
    retrieved quickly for future use when the same query has been executed.'
  raw: '#### Solution


    Hints can be placed in views, as a view is simply a stored query in the database.
    Depending on the type of hint used, as well as the type of view that is being
    queried, you can determine if your hint will be used. It is important to understand
    what type of view you have so you can determine what impacts hints will have on
    that view. To understand this, you first need to determine  which of the following
    describes your view:


    *   Mergeable or non-mergeable view

    *   Simple or complex view


    A simple view is a view that references only one table, and there are not any
    grouping functions or expressions:


    `CREATE view emp_high_sal`

    `AS SELECT /*+ use_index(employees) */ employee_id, first_name, last_name, salary`

    `FROM employees`

    `WHERE salary > 10000;`


    A complex view can reference multiple tables, or it will have grouping clauses,
    or use functions and expressions:


    `CREATE or replace view dept_sal`

    `AS SELECT /*+ full(employees) */ department_id, department_name,`

    `departments.manager_id, SUM(salary) total_salary, AVG(salary) avg_salary`

    `FROM employees JOIN departments USING(department_id)`

    `GROUP BY department_id, department_name, departments.manager_id;`


    A mergeable view is simply one in which the optimizer can replace the query calling
    the view with the query within the view definition itself. For example, we simply
    want to query all the rows from our `EMP_HIGH_SAL` view. The optimizer simply
    has to go directly to the `EMPLOYEES` table:


