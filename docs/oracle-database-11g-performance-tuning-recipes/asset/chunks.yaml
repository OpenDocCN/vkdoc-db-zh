    ### 8-7. Comparing Two Tables to Finding Missing Rows


    #### Problem


    You need to compare data for a subset of columns between two tables. You need
    to find rows in one table that are missing from the other.


    #### Solution


    You can use the Oracle `MINUS` set operator to compare two sets of data, and show
    data missing from one of the tables. When using any of the Oracle set operators,
    the `SELECT` clauses must be identical in terms of number of columns, and the
    datatypes of each column.


    As an example, you work for a cable television company, and you want to find out
    what channels are offered free of charge. To test this out, you could first simply
    get a list of the channels offered by your company:


    `SELECT channel_id FROM channels;`


    `CHANNEL_ID`

    `----------`

    `         2`

    `         3`

    `         4`

    `         5`

    `         9`


    Then, you can run a query to find out which channels have costs associated with
    them by querying the `COSTS` table:


    `SELECT DISTINCT channel_id FROM costs`

    `ORDER BY channel_id;`


    `CHANNEL_ID`

    `----------`

    `         2`

    `         3`

    `         4`


    By quickly doing a visual examination of the results, the free channels are channels
    5 and 9\. By using a set operator, in this case, `MINUS`, you can get this result
    from a single query:


    `SELECT channel_id`

    `FROM channels`

    **`MINUS`**

    `SELECT channel_id`

    `FROM costs;`


    `CHANNEL_ID`

    `----------`

    `         5`

    `         9`


    #### How It Works


    It is also very common to use set operators in queries to get more information
    about the missing data. For instance, you have gotten the free channel list, but
    you really need to get more information about those free channels, and would like
    to accomplish everything within a single query:


    `SELECT channel_id, channel_desc FROM channels`

    `WHERE channel_id IN`

    **`(SELECT channel_id`**

    **`FROM channels`**

    **`MINUS`**

    **`SELECT channel_id`**

    **`FROM costs);`**

    `CHANNEL_ID CHANNEL_DESC`

    `---------- --------------------`

    `         5 Catalog`

    `         9 Tele Sales`


    ### 8-8. Comparing Two Tables to Finding Matching Rows


    #### Problem


    You need to compare data for a subset of columns between two tables. You need
    to see all matching rows from those tables.


    #### Solution


    You can use the Oracle `INTERSECT` set operator to compare two sets of data, and
    show the matching data between the two tables. Again, when using any of the Oracle
    set operators, the `SELECT` clauses must be identical in terms of number of columns,
    and the datatypes of each column.


    Using the example of the free channels, we now want to see which channels are
    not free, and have costs associated with them. By using the `INTERSECT` set operator,
    we will see only the matching rows between the two tables:


    `SELECT channel_id`

    `FROM channels`

    **`INTERSECT`**

    `SELECT channel_id`

    `FROM costs;`


    `CHANNEL_ID`

    `----------`

    `         2`

    `         3`

    `         4`


    #### How It Works


    When using `INTERSECT`, think of it as the overlapping data between two tables,
    based on the column list in the `SELECT` statement.


    ### 8-9. Combining Results from Similar SELECT Statements


    #### Problem


    You need to combine the results between two similar `SELECT` statements, and would
    like to accomplish it within a single query.


    #### Solution


    You can use the Oracle set operators `UNION` or `UNION ALL` to combine results
    from two like queries. The difference between using `UNION` and `UNION ALL` is
    that `UNION` will automatically eliminate any duplicate rows, and each row of
    the result set will be unique. When using `UNION ALL`, it will show all matching
    rows, including duplicate rows. Using `UNION ALL` may yield better performance
    than `UNION`, because a sort to eliminate duplicates is avoided. If your application
    can eliminate duplicates during processing, it may be worth the performance gained
    from using `UNION ALL`.


    In Oracle''s sample schemas, we have the `SCOTT.EMP` table and the `HR.EMPLOYEES`
    table. If we want to see all the employees on both tables, we can use a `UNION`
    set operator to get the results:


    `SELECT empno, hiredate FROM scott.emp`

    **`UNION`**

    `SELECT employee_id, hire_date FROM hr.employees;`


    `     EMPNO HIREDATE`

    `---------- ---------`

    `       100 17-JUN-87`

    `       101 21-SEP-89`

    `       102 13-JAN-93`

    `       ...`

    `      7902 03-DEC-81`

    `      7934 23-JAN-82`

    `      7997 15-AUG-11`


