- fmt: '## How It Works


    Here''s what the various keywords in the syntax for setting a 10046 trace mean:


    `set events`: Sets a specific Oracle event, in this case, the event 10046.


    `10046`: Specifies when an action should be taken.


    `trace`: The database must take this action when the event 10046 occurs.


    `name`: Indicates the type of dump or trace.


    `context`: Specifies that Oracle should generate a context-specific trace; if
    you replace `context` with `errorstack`, the database will not trace the SQL statement.
    It dumps the error stack when it hits the 10046 event.


    `forever`: Specifying the keyword `forever` tells the database to invoke the action
    (trace) every time the event 10046 is invoked, until you disable the 10046 trace.
    If you omit the keyword `forever`, the action is invoked just once, following
    which the event is automatically disabled.


    `level 12`: Specifies the trace level—in this case, it captures both bind and
    wait information.


    While the Oracle event 10046 has existed for several years, this trace is identical
    to the trace you can generate with the `session_trace_enable` procedure of the
    `DBMS_MONITOR` package:

    ```sql

    SQL> execute dbms_monitor.session_trace_enable(session_id=>99, serial_num=>88,waits=>true,binds=>true);

    ```

    Both the 10046 event and the `dbms_monitor.session_trace_enable` procedure shown
    here generate identical tracing information, called extended tracing because the
    trace includes wait and bind variable data.


    If you aren''t using the new diagnostic infrastructure (ADR) introduced in Oracle
    Database 11g, make sure you set the dump file size to the value `unlimited`, as
    the 10046 trace often produces very large trace files, and the database will truncate
    the dump file if there isn''t enough space in the trace dump directory.


    The level of tracing you specify for the 10046 trace determines which types of
    information is gathered by the trace. The default level is 1, which collects basic
    information. Level 4 allows you to capture the bind variable values, which are
    shown as `:bi`, `:b2`, and so on. You can see the actual values that Oracle substitutes
    for each of the bind variables. Level 8 provides all the information from a Level
    1 trace plus details about all the wait events during the course of the execution
    of the SQL query. A Level 12 trace is a combination of the Level 4 and Level 8
    traces, meaning it''ll include both bind variable and wait information. Level
    16 is new in Oracle Database 11g, and provides STAT line dumps for each execution
    of the query. Note that this is the same as setting the value `all_executions`
    for the `plan_level` parameter when you trace with the `dbms_monitor.session_trace_enable`
    procedure.


    ![images](images/square.jpg) **Tip** If the session doesn''t close cleanly before
    you disable tracing, your trace file may not include important trace information.


    While getting a 10046 trace and analyzing it does provide valuable information
    regarding the usage of bind variables and the wait events, you need to be careful
    about when to trace sessions. If the instance as a whole is poorly performing,
    your tracing might even make performance worse due to overhead imposed by running
    the trace. In addition, it takes time to complete the trace, run it through `TKPROF`
    or some other profiler, and go through the dozens of SQL statements in the report.
    Here is a general strategy that has worked for us in our own work:


    If you''re diagnosing general performance problems, a good first step would be
    to get an AWR report, ideally taking several snapshots spaced 1–15 minutes apart.
    Often, you can identify the problem from a review of the AWR report. The report
    will highlight things such as inefficient SQL statements, contention of various
    types, memory issues, latching, and full table scans that are affecting performance.
    You can get all this information without running a 10046 trace.


    Run a 10046 trace when a user reports a problem and you can''t identify a problem
    through the AWR reports. If you''ve clearly identified a process that is performing
    poorly, you can trace the relevant session. You can also run this trace in a development
    environment to help developers understand the query execution details and tune
    their queries.


    ### 10-20. Generating an Event 10046 Trace for an Instance


    #### Problem


    You want to trace a problem SQL query, but you can''t identify the session in
    advance. You would like to trace all SQL statements executed by the instance.


    #### Solution


    You can turn on tracing at the instance level with the following `alter system`
    command, after connecting to the instance you want to trace.

    ```sql

    SQL> alter system set events ''10046 trace name context forever,level 12'';

    ```

    The previous command enables the tracing of all sessions that start after you
    issue the command—it won''t trace sessions that are already connected.


    You disable the trace by issuing the following command:

    ```sql

    SQL> alter system set events ''10046 trace name context off'';

    ```

    This command disables tracing for all sessions.


    #### How It Works


    Instance-wide tracing helps in cases where you know a problem query is running,
    but there''s no way to identify the session ahead of time. Make sure that you
    enable instance-wide tracing only when you have no other alternative, and turn
    it off as soon as you capture the necessary diagnostic information. Any instance-wide
    tracing is going to not only generate very large trace files in a busy environment,
    but also contribute significantly to the system workload.


    ### 10-21. Setting a Trace in a Running Session


    #### Problem


    You want to set a trace in a session, but the session has already started.


    ![images](images/square.jpg) **Note** A user who phones to ask for help with a
    long-running query is a good example of a case in which you might want to initiate
    a trace in a currently executing session. Some business-intelligence queries,
    for example, run for dozens of minutes, even hours, so there is time to initiate
    a trace mid-query and diagnose a performance problem.


    #### Solution


    You can set a trace in a running session using the operating system process ID
    (PID), with the help of the `oradebug` utility. Once you identify the PID of the
    session you want to trace, issue the following commands to trace the session.

    ```sql

    SQL> connect / as sysdba

    SQL> oradebug setospid <SPID>

    SQL> oradebug unlimit

    SQL> oradebug event 10046 trace name context forever,level 12

    SQL> oradebug event 10046 trace name context off

    ```

    In the example shown here, we specified Level 12, but as with the 10046 trace
    you set with the `alter session` command, you can specify the lower tracing levels
    4 or 8.'
