- fmt: '# Implications of Setting CURSOR_SHARING to a Non-default Value


    Both the `FORCE` and the `SIMILAR` settings can help you get around the non-use
    of bind variables in an application, by letting the database generate bind values
    (system-generated bind values, as opposed to user-specified)). However, you should
    be aware of the differences in the behavior of the optimizer when you set the
    `cursor_sharing` parameter to `FORCE` as opposed to the `SIMILAR` setting. The
    key thing to understand here is that there''s a conflict between query performance
    and the space used in the shared pool by multiple executions of a query.


    Here is a summary of the performance implications of setting the `cursor_sharing`
    parameter to `EXACT`, `FORCE`, and `SIMILAR`. Let''s assume the following query,
    which contains a literal:


    `select * from employees where job = ''Clerk''`


    Note that if the query were to use bind variables instead of literals, it would
    be of the following form:


    `select * from employees where job=:b`


    > `EXACT`: The database doesn''t replace any literals, and the optimizer sees
    the query as it''s presented to the optimizer. The optimizer generates a different
    plan for each execution of the statement, based on the literal values in the statement.
    The plan would thus be an optimal one, but each statement has its own parent cursor,
    and therefore a statement that''s executed numerous times can use a considerable
    amount of space in the shared pool. This could potentially lead to latch contention
    and a slowdown in performance.

    >

    > `FORCE`: Regardless of whether there''s a histogram, the optimizer will replace
    the literal values with a bind value and optimize this query as if it were in
    the following form:

    >

    > `select * from employees where job=:b`

    >

    > The optimizer uses a single plan for each SQL statement, regardless of the literal
    values. Thus, the execution plan won''t be optimal, as the plan is generic, and
    not based on the literal values. If a query uses literal values, the optimizer
    will use those values to find the most efficient execution plan. If there are
    no literals in the SQL statement, it''s very hard for the optimizer to figure
    out the best execution plan. By “peeking” at the value of the bind variables,
    the optimizer can get a better idea of the selectivity of the `where` clause condition—it
    is almost as if literals had been used in the SQL statement. The optimizer peeks
    at the bind values during the hard parse state. Since the execution plan is based
    on the specific value of the bind variable that the optimizer happened to peek
    at, the execution plan may not be optimal for all possible values of the bind
    variable.

    >

    > In this example, the optimizer uses bind peeking based on the specific value
    of the `JOB` column it sees. In this case, the optimizer uses the value `Clerk`
    to estimate the cardinality for the query. When it executes the same statement
    (with a different value in the `JOB` column, say, `Manager`), the optimizer will
    use the same plan that it generated the first time (`JOB`=`Clerk`). Since there
    is only one parent cursor and just child cursors for the distinct statements,
    there''s less pressure on the shared pool. Note that a child cursor uses far less
    space in the shared pool than a parent cursor. Often, setting the `cursor_sharing`
    parameter to `FORCE` immediately resolves serious latch contention in the database,
    making this one of the few magic bullets that can help you quickly reduce latch
    contention.

    >

    > `SIMILAR` (without a histogram on the `JOB` column): The database will use literal
    replacement—it uses a system-generated bind value instead of the literal value
    for the `JOB` column (`Clerk`). This is because the absence of a histogram on
    the `JOB` column tells the optimizer that the data in the `JOB` column isn''t
    skewed, and therefore the optimizer chooses the same plan for each execution of
    the statement, even though the literal values are different. The optimizer thinks
    it shouldn''t make any changes to the execution plans for the statements that
    differ only in literal values because the data is uniformly distributed. The `SIMILAR`
    setting without a histogram on the columns in a query provides the same query
    performance and a similar impact on the shared pool as when you specify the `FORCE`
    setting.

    >

    > `SIMILAR` (with a histogram on the `JOB` column): When the optimizer sees the
    histogram in the `JOB` column, it realizes that the column is skewed—this tells
    the optimizer that the results of the query may vary widely depending on the literal
    value of the `JOB` column. Consequently, the optimizer generates a different plan
    for each statement based on the literal values—thus the plans are very efficient,
    as in the case when you specify the `EXACT` setting. The `SIMILAR` option with
    a histogram in place does use more space in the shared pool, but not as much as
    when you use the `EXACT` setting. The reason for this is that each statement has
    its own child cursor instead of a parent cursor.


    The choice among the various settings of the `cursor_sharing` parameter really
    boils down to an assessment of what''s more critical to database performance:
    using the default `EXACT` setting or `SIMILAR` (with a histogram on the relevant
    column) does provide better query performance but leads to the generation of numerous
    parent cursors (`EXACT` setting) or child cursors (`SIMILAR` setting). If there''s
    a severe pressure in the shared pool, and consequent latch contention, the entire
    database will perform poorly. Under these circumstances, you''re better off implementing
    a system-wide solution by setting the `cursor_sharing` parameter to `FORCE`, as
    this guarantees that there''s only a single child cursor for each SQL statement.
    If you''re concerned about the impact of a single SQL statement, just drop the
    histogram on the relevant columns used in the SQL statement and set the `cursor_sharing`
    parameter to `FORCE`—this will ensure that the optimizer uses system-generated
    bind values for the column(s) and ensures that the SQL statement uses much less
    space in the shared pool. As you''ll see in the next section, Oracle Database
    11g''s adaptive cursor sharing offers an even better solution, if you set the
    `cursor_sharing` parameter to `FORCE` and keep the histograms on the columns.


    ## 13-15. Understanding Adaptive Cursor Sharing


    ### Problem


    Your database uses user-defined bind variables. You want to know if there''s anything
    you can do to optimize database behavior so it doesn''t “blindly” use the same
    execution plan for all bind variable values.


    ### Solution


    In prior releases, Oracle used a single execution plan for each execution of a
    SQL statement, regardless of the values of the bind variables. In Oracle Database
    11g, the database feature called `adaptive cursor sharing` enables a SQL statement
    with bind variables to use multiple execution plans, with each execution plan
    based on the values of the bind variable(s). Adaptive cursor sharing is enabled
    by default, and you can''t disable it.'
  raw: "##### Implications of Setting CURSOR_SHARING to a Non-default Value\n\nBoth\
