  raw: '#### How It Works


    When you create a database in Oracle Database 11g or higher, Oracle automatically
    implements three automatic maintenance jobs:


    *   Automatic SQL Tuning Advisor

    *   Automatic Segment Advisor

    *   Automatic Optimizer Statistics Collection


    These tasks are automatically configured to run in maintenance windows. A maintenance
    window is a specified time and duration for the task to run. You can view the
    maintenance window details with this query:


    `SELECT window_name,TO_CHAR(window_next_time,''DD-MON-YY HH24:MI:SS'')`

    `,sql_tune_advisor, optimizer_stats, segment_advisor`

    `FROM dba_autotask_window_clients;`


    Here''s a snippet of the output for this example:


    `WINDOW_NAME      TO_CHAR(WINDOW_NEXT_TIME SQL_TUNE OPTIMIZE SEGMENT_`

    `---------------- ------------------------ -------- -------- --------`

    `THURSDAY_WINDOW  28-APR-11 22:00:00       ENABLED  ENABLED  ENABLED`

    `FRIDAY_WINDOW    29-APR-11 22:00:00       ENABLED  ENABLED  ENABLED`

    `SATURDAY_WINDOW  30-APR-11 06:00:00       ENABLED  ENABLED  ENABLED`

    `SUNDAY_WINDOW    01-MAY-11 06:00:00       ENABLED  ENABLED  ENABLED`


    There are several data dictionary views related to the automatically scheduled
    jobs. See [Table 11-1](#Chapter11.html#tab_11_1) for descriptions of these views.


    ![images](images/t1101.jpg)


    ### 11-2\. Displaying Automatic SQL Tuning Advice


    #### Problem


    You''re aware that Oracle automatically runs a daily job that generates SQL tuning
    advice. You want to view the advice.


    #### Solution


    If you''re using Oracle Database 11g Release 2 or higher, here''s the quickest
    way to display automatically generated SQL tuning advice:


    `SQL> SET LINESIZE 80 PAGESIZE 0 LONG 100000`

    `SQL> SELECT DBMS_AUTO_SQLTUNE.REPORT_AUTO_TUNING_TASK FROM DUAL;`


    ![images](images/square.jpg) **Note** Starting with Oracle Database 11g Release
    2, the `DBMS_AUTO_SQLTUNE` package should be used (instead of `DBMS_SQLTUNE`)
    for administrating automatic SQL tuning features. If you are using an older release
    of Oracle, use `DBMS_SQLTUNE.REPORT_AUTO_TUNING_TASK` to view automated SQL tuning
    advice.


    Depending on the activity in your database, there may be a great deal of output.
    Here''s a small sample of output from a very active database:


    `GENERAL INFORMATION SECTION`

    `-------------------------------------------------------------------------------`

    `Tuning Task Name                        : SYS_AUTO_SQL_TUNING_TASK`

    `Tuning Task Owner                       : SYS`

    `Workload Type                           : Automatic High-Load SQL Workload`

    `Execution Count                         : 30`

    `Current Execution                       : EXEC_3483`

    `Execution Type                          : TUNE SQL`

    `Scope                                   : COMPREHENSIVE`

    `.....`

    `Completion Status                       : COMPLETED`

    `Started at                              : 04/10/2011 06:00:01`

    `Completed at                            : 04/10/2011 06:02:41`

    `Number of Candidate SQLs                : 103`

    `Cumulative Elapsed Time of SQL (s)      : 49124`

    `-------------------------------------------------------------------------------`

    `SUMMARY SECTION`

    `-------------------------------------------------------------------------------`

    `                      Global SQL Tuning Result Statistics`

    `-------------------------------------------------------------------------------`

    `Number of SQLs Analyzed                      : 103`

    `Number of SQLs in the Report                 : 8`

    `Number of SQLs with Findings                 : 8`

    `Number of SQLs with Alternative Plan Findings: 1`

    `Number of SQLs with SQL profiles recommended : 1`

    `-------------------------------------------------------------------------------`

    `    SQLs with Findings Ordered by Maximum (Profile/Index) Benefit, Object ID`

    `-------------------------------------------------------------------------------`

    `object ID  SQL ID        statistics profile(benefit) index(benefit) restructure`

    `---------- ------------- ---------- ---------------- -------------- -----------`

    `      9130 crx9h7tmwwv67                      51.44%`


    **AUTOMATICALLY E-MAILING SQL OUTPUT**


    On Linux/Unix systems, it''s quite easy to automate the e-mailing of output from
    a SQL script. First encapsulate the SQL in a shell script, and then use a utility
    such as `cron` to automatically generate and e-mail the output. Here''s a sample
    shell script:


    `#!/bin/bash`

    `if [ $# -ne 1 ]; then`

    `  echo "Usage: $0 SID"`

    `  exit 1`

    `fi`

    `# source oracle OS variables`

    `. /var/opt/oracle/oraset $1`

    `#`

    `` BOX=`uname -a | awk ''{print$2}''` ``

    `OUTFILE=$HOME/bin/log/sqladvice.txt`

    `#`

    `sqlplus -s <<EOF`

    `mv_maint/foo`

    `SPO $OUTFILE`

    `SET LINESIZE 80 PAGESIZE 0 LONG 100000`

    `SELECT DBMS_AUTO_SQLTUNE.REPORT_AUTO_TUNING_TASK FROM DUAL;`

    `EOF`

    `cat $OUTFILE | mailx -s "SQL Advice: $1 $BOX" larry@oracle.com`

    `exit 0`


    Here''s the corresponding `cron` entry that runs the report on a daily basis:


    `#-----------------------------------------------------------------`

    `# SQL Advice report from SQL auto tuning`

    `16 11 * * * /orahome/oracle/bin/sqladvice.bsh DWREP`

    `   1>/orahome/oracle/bin/log/sqladvice.log 2>&1`

    `#-----------------------------------------------------------------`


    In the prior `cron` entry, the command was broken into two lines to fit on a page
    within this book.'
  trans: "\n#### 工作原理\n\n当你在 Oracle Database 11g 或更高版本中创建数据库时，Oracle 会自动实施三个自动维护任务：\n\
    \n*   自动 SQL 优化建议器\n*   自动段顾问\n*   自动优化器统计信息收集\n\n这些任务被自动配置为在维护窗口中运行。维护窗口是指定任务运行的时间和持续时长。你可以使用此查询查看维护窗口的详细信息：\n\
    \n```sql\nSELECT window_name,TO_CHAR(window_next_time,'DD-MON-YY HH24:MI:SS')\n\
    ,sql_tune_advisor, optimizer_stats, segment_advisor\nFROM dba_autotask_window_clients;\n\
    ```\n\n以下是此示例的输出片段：\n\n```sql\nWINDOW_NAME      TO_CHAR(WINDOW_NEXT_TIME SQL_TUNE\
    \ OPTIMIZE SEGMENT_\n---------------- ------------------------ -------- --------\
    \ --------\nTHURSDAY_WINDOW  28-APR-11 22:00:00       ENABLED  ENABLED  ENABLED\n\
    FRIDAY_WINDOW    29-APR-11 22:00:00       ENABLED  ENABLED  ENABLED\nSATURDAY_WINDOW\
    \  30-APR-11 06:00:00       ENABLED  ENABLED  ENABLED\nSUNDAY_WINDOW    01-MAY-11\
    \ 06:00:00       ENABLED  ENABLED  ENABLED\n```\n\n有几个与自动调度任务相关的数据字典视图。有关这些视图的描述，请参见表\
    \ 11-1。\n\n![images](img/t1101.jpg)\n\n### 11-2. 显示自动 SQL 优化建议\n\n#### 问题\n\n\
    你已知 Oracle 会自动运行一个每日任务来生成 SQL 优化建议。你希望查看该建议。\n\n#### 解决方案\n\n如果你使用的是 Oracle Database\
    \ 11g Release 2 或更高版本，以下是显示自动生成的 SQL 优化建议的最快方法：\n\n```sql\nSQL> SET LINESIZE 80\
    \ PAGESIZE 0 LONG 100000\nSQL> SELECT DBMS_AUTO_SQLTUNE.REPORT_AUTO_TUNING_TASK\
    \ FROM DUAL;\n```\n\n![images](img/square.jpg) **注意** 从 Oracle Database 11g Release\
    \ 2 开始，应使用 `DBMS_AUTO_SQLTUNE` 包（而不是 `DBMS_SQLTUNE`）来管理自动 SQL 优化功能。如果你使用的是旧版 Oracle，请使用\
    \ `DBMS_SQLTUNE.REPORT_AUTO_TUNING_TASK` 查看自动 SQL 优化建议。\n\n根据数据库的活动情况，输出内容可能会非常多。以下是一个非常活跃的数据库输出的一小部分样本：\n\
    \n```sql\nGENERAL INFORMATION SECTION\n-------------------------------------------------------------------------------\n\
    Tuning Task Name                        : SYS_AUTO_SQL_TUNING_TASK\nTuning Task\
    \ Owner                       : SYS\nWorkload Type                           :\
    \ Automatic High-Load SQL Workload\nExecution Count                         :\
    \ 30\nCurrent Execution                       : EXEC_3483\nExecution Type    \
    \                      : TUNE SQL\nScope                                   : COMPREHENSIVE\n\
    .....\nCompletion Status                       : COMPLETED\nStarted at       \
    \                       : 04/10/2011 06:00:01\nCompleted at                  \
    \          : 04/10/2011 06:02:41\nNumber of Candidate SQLs                : 103\n\
    Cumulative Elapsed Time of SQL (s)      : 49124\n-------------------------------------------------------------------------------\n\
    SUMMARY SECTION\n-------------------------------------------------------------------------------\n\
    \                      Global SQL Tuning Result Statistics\n-------------------------------------------------------------------------------\n\
    Number of SQLs Analyzed                      : 103\nNumber of SQLs in the Report\
    \                 : 8\nNumber of SQLs with Findings                 : 8\nNumber\
    \ of SQLs with Alternative Plan Findings: 1\nNumber of SQLs with SQL profiles\
    \ recommended : 1\n-------------------------------------------------------------------------------\n\
    \    SQLs with Findings Ordered by Maximum (Profile/Index) Benefit, Object ID\n\
    -------------------------------------------------------------------------------\n\
    object ID  SQL ID        statistics profile(benefit) index(benefit) restructure\n\
    ---------- ------------- ---------- ---------------- -------------- -----------\n\
    \      9130 crx9h7tmwwv67                      51.44%\n```\n\n**自动通过电子邮件发送 SQL\
    \ 输出**\n\n在 Linux/Unix 系统上，实现 SQL 脚本输出的自动电子邮件发送相当容易。首先将 SQL 封装在 shell 脚本中，然后使用\
    \ `cron` 等实用程序来自动执行并生成电子邮件。以下是一个示例 shell 脚本：\n\n```bash\n#!/bin/bash\nif [ $#\
    \ -ne 1 ]; then\n  echo \"Usage: $0 SID\"\n  exit 1\nfi\n# source oracle OS variables\n\
    . /var/opt/oracle/oraset $1\n#\nBOX=`uname -a | awk '{print$2}'`\nOUTFILE=$HOME/bin/log/sqladvice.txt\n\
    #\nsqlplus -s <<EOF\nmv_maint/foo\nSPO $OUTFILE\nSET LINESIZE 80 PAGESIZE 0 LONG\
    \ 100000\nSELECT DBMS_AUTO_SQLTUNE.REPORT_AUTO_TUNING_TASK FROM DUAL;\nEOF\ncat\
    \ $OUTFILE | mailx -s \"SQL Advice: $1 $BOX\" larry@oracle.com\nexit 0\n```\n\n\
    以下是对应的 `cron` 条目，用于每日运行该报告：\n\n```bash\n#-----------------------------------------------------------------\n\
    # SQL Advice report from SQL auto tuning\n16 11 * * * /orahome/oracle/bin/sqladvice.bsh\
    \ DWREP\n   1>/orahome/oracle/bin/log/sqladvice.log 2>&1\n#-----------------------------------------------------------------\n\
    ```\n\n在之前的 `cron` 条目中，命令被分成两行以适应本书页面的宽度。\n"
- fmt: "## How It Works\n\nThe “Solution” section describes a simple method to display\
    \ in-depth tuning advice for high-load queries in your database. Depending on\
    \ the activity and load on your database, the report may contain no suggestions\
    \ or may provide a great deal of advice. The Automatic SQL Tuning job uses the\
    \ high-workload SQL statements identified in the AWR as the target SQL statements\
    \ to report on. The advice report consists of one or more of the following general\
    \ subsections:\n\n*   General information\n*   Summary\n*   Details\n*   Findings\n\
    *   Explain plans\n*   Alternate plans\n*   Errors\n\nThe general information\
    \ section contains high-level information regarding the start and end time, number\
    \ of SQL statements considered, cumulative elapsed time of the SQL statements,\
    \ and so on.\n\nThe summary section contains information regarding the SQL statements\
    \ analyzed—for example:\n\n```\n                      Global SQL Tuning Result\
    \ Statistics\n-------------------------------------------------------------------------------\n\
    Number of SQLs Analyzed                      : 26\nNumber of SQLs in the Report\
    \                 : 5\nNumber of SQLs with Findings                 : 5\nNumber\
    \ of SQLs with Alternative Plan Findings: 1\nNumber of SQLs with SQL profiles\
    \ recommended : 5\nNumber of SQLs with Index Findings           : 2\n-------------------------------------------------------------------------------\n\
    \    SQLs with Findings Ordered by Maximum (Profile/Index) Benefit, Object ID\n\
    -------------------------------------------------------------------------------\n\
    object ID  SQL ID        statistics profile(benefit) index(benefit) restructure\n\
    ---------- ------------- ---------- ---------------- -------------- -----------\n\
    \      1160 31q9w59vpt86t                     98.27%          99.90%\n      1167\
    \ 3u8xd0vf2pnhr                     98.64%\n```\n\nThe detail section contains\
    \ information describing specific SQL statements, such as the owner and SQL text.\
    \ Here is a small sample:\n\n```\nDETAILS SECTION\n-------------------------------------------------------------------------------\n\
    Statements with Results Ordered by Maximum (Profile/Index) Benefit, Object ID\n\
    -------------------------------------------------------------------------------\n\
    Object ID  : 1160\nSchema Name: CHN_READ\nSQL ID     : 31q9w59vpt86t\nSQL Text\
    \   : SELECT \"A2\".\"UMID\",\"A2\".\"ORACLE_UNIQUE_ID\",\"A2\".\"PUBLIC_KEY\"\
    ,\"A2\"\n             .\"SERIAL_NUMBER\",:1||\"A1\".\"USER_NAME\",\"A1\".\"USER_NAME\"\
    ,NVL(\"A2\".\"\n             CREATE_TIME_DTT\",:2),NVL(\"A2\".\"UPDATE_TIME_DTT\"\
    ,:3) FROM\n             \"COMPUTER_SYSTEM\" \"A2\",\"USERS\" \"A1\" WHERE\n```\n\
    \nThe findings section contains recommendations such as accepting a SQL profile\
    \ or creating an index—for example:\n\n```\nFINDINGS SECTION\n-------------------------------------------------------------------------------\n\
    1- SQL Profile Finding (see explain plans section below)\n--------------------------------------------------------\n\
    \  A potentially better execution plan was found for this statement.\n  Recommendation\
    \ (estimated benefit: 98.27%)\n  ------------------------------------------\n\
    \  - Consider accepting the recommended SQL profile to use\nparallel execution\
    \ for this statement.\n    execute dbms_sqltune.accept_sql_profile(task_name =>\n\
    \            'SYS_AUTO_SQL_TUNING_TASK', object_id => 1160, task_owner =>\n  \
    \          'SYS', replace => => TRUE, profile_type => DBMS_SQLTUNE.PX_PROFILE);\n\
    ................. \n2- Index Finding (see explain plans section below)\n-------------------------------------------------\n\
    The execution plan of this statement can be improved by creating\none or more\
    \ indices.\n  Recommendation (estimated benefit: 99.9%)\n  -----------------------------------------\n\
    \  - Consider running the Access Advisor to improve the physical schema design\n\
    \    or creating the recommended index.\n    create index CHAINSAW.IDX$$_90890002\
    \ on\n    CHAINSAW.COMPUTER_SYSTEM(\"UPDATE_TIME_DTT\");\n```\n\nWhere appropriate,\
    \ the original execution plan for a query is displayed along with a suggested\
    \ fix and new execution plan. This allows you to see the before and after plan\
    \ differences. This is very useful when determining if the findings (such as adding\
    \ an index) would improve performance.\n\nLastly, there is an error section of\
    \ the report. For most scenarios, there typically will not be an error section\
    \ in the report.\n\nThe “Solution” section showed how to execute the `REPORT_AUTO_TUNING_TASK`\
    \ function from a SQL statement. This function can also be called from an anonymous\
    \ block of PL/SQL. Here's an example:\n\n```\nVARIABLE tune_report CLOB;\nBEGIN\n\
    \  :tune_report := DBMS_AUTO_SQLTUNE.report_auto_tuning_task(\n    begin_exec\
    \   => NULL\n   ,end_exec     => NULL\n   ,type         => DBMS_AUTO_SQLTUNE.type_text\n\
    \   ,level        => DBMS_AUTO_SQLTUNE.level_typical\n   ,section      => DBMS_AUTO_SQLTUNE.section_all\n\
    \   ,object_id    => NULL\n   ,result_limit => NULL);\nEND;\n/\n--\nSET LONG 1000000\n\
    PRINT :tune_report\n```\n\nThe parameters for the `REPORT_AUTO_TUNING_TASK` function\
    \ are described in detail in [Table 11-2](#Chapter11.html#tab_11_2). These parameters\
    \ allow you a great deal of flexibility to customize the advice output.\n\n![images](images/t1102.jpg)\n\
    \n## 11-3. Generating a SQL Script to Implement Automatic Tuning Advice\n\n###\
    \ Problem\n\nYou've reported on the automatic tuning advice. Now you want to generate\
    \ a SQL script that can be used to implement tuning advice.\n\n### Solution\n\n\
    Use the `DBMS_SQLTUNE.SCRIPT_TUNING_TASK` function to generate the SQL statements\
    \ to implement the advice of a tuning task. You need to provide as input the name\
    \ of the automatic tuning task. In this example, the name of the task is `SYS_AUTO_SQL_TUNING_TASK`:\n\
    \n```\nSET LINES 132 PAGESIZE 0 LONG 10000\nSELECT DBMS_SQLTUNE.SCRIPT_TUNING_TASK('SYS_AUTO_SQL_TUNING_TASK')\
    \ FROM dual;\n```\n\nHere is a small snippet of the output for this example:\n\
    \n```\nexecute dbms_stats.gather_index_stats(ownname => 'STAR2', indname => 'F_CONFIG_P\n\
    ROD_INST_FK1', estimate_percent => DBMS_STATS.AUTO_SAMPLE_SIZE);\ncreate index\
    \ NSESTAR.IDX$$_17F5F0004 on NSESTAR.D_DATES(\"FISCAL_YEAR\",\"FISCAL_WE\nEK_NUMBER_IN_YEAR\"\
    ,\"DATE_DTT\");\n```\n\n### How It Works\n\nThe `SCRIPT_TUNING_TASK` function\
    \ generates the SQL to implement the advice recommended by the Automatic SQL Tuning\
    \ job. If the tuning task doesn't have any advice to give, then there won't be\
    \ any SQL statements generated in the output. `SYS_AUTO_SQL_TUNING_TASK` is the\
    \ default name of the Automatic SQL Tuning task. If you're unsure of the details\
    \ regarding this task, then query the `DBA_ADVISOR_LOG` view:\n\n```\nselect task_name,\
    \ execution_start from dba_advisor_log\nwhere task_name='SYS_AUTO_SQL_TUNING_TASK'\n\
    order by 2;\n```\n\nHere's some sample output for this example:\n\n```\nTASK_NAME\
    \                      EXECUTION\n------------------------------ ---------\nSYS_AUTO_SQL_TUNING_TASK\
    \       19-APR-11\n```\n\n## 11-4. Modifying Automatic SQL Tuning Features\n\n\
    ### Problem\n\nYou've noticed that sometimes the Automatic SQL Tuning advice job\
    \ recommends that a SQL profile be applied to a SQL statement (see [Chapter 12](#Chapter12.html#ch12)\
    \ for details on SQL profiles). The default behavior of the tuning advice job\
    \ is to not automatically accept SQL profile recommendations. You want to modify\
    \ this behavior and have the Automatic SQL Tuning job automatically place any\
    \ SQL profiles that it recommends into an accepted state."
  raw: '#### How It Works


    The “Solution” section describes a simple method to display in-depth tuning advice
    for high-load queries in your database. Depending on the activity and load on
    your database, the report may contain no suggestions or may provide a great deal
    of advice. The Automatic SQL Tuning job uses the high-workload SQL statements
    identified in the AWR as the target SQL statements to report on. The advice report
    consists of one or more of the following general subsections:


    *   General information

    *   Summary

    *   Details

    *   Findings

    *   Explain plans

    *   Alternate plans

    *   Errors


    The general information section contains high-level information regarding the
    start and end time, number of SQL statements considered, cumulative elapsed time
    of the SQL statements, and so on.


    The summary section contains information regarding the SQL statements analyzed—for
    example:


    `                      Global SQL Tuning Result Statistics`

    `-------------------------------------------------------------------------------`

    `Number of SQLs Analyzed                      : 26`

    `Number of SQLs in the Report                 : 5`

    `Number of SQLs with Findings                 : 5`

    `Number of SQLs with Alternative Plan Findings: 1`

    `Number of SQLs with SQL profiles recommended : 5`

    `Number of SQLs with Index Findings           : 2`

    `-------------------------------------------------------------------------------`

    `    SQLs with Findings Ordered by Maximum (Profile/Index) Benefit, Object ID`

    `-------------------------------------------------------------------------------`

    `object ID  SQL ID        statistics profile(benefit) index(benefit) restructure`

    `---------- ------------- ---------- ---------------- -------------- -----------`

    `      1160 31q9w59vpt86t                      98.27%         99.90%`

    `      1167 3u8xd0vf2pnhr                      98.64%`


    The detail section contains information describing specific SQL statements, such
    as the owner and SQL text. Here is a small sample:


    `DETAILS SECTION`

    `-------------------------------------------------------------------------------`

    `Statements with Results Ordered by Maximum (Profile/Index) Benefit, Object ID`

    `-------------------------------------------------------------------------------`

    `Object ID  : 1160`

    `Schema Name: CHN_READ`

    `SQL ID     : 31q9w59vpt86t`

    `SQL Text   : SELECT "A2"."UMID","A2"."ORACLE_UNIQUE_ID","A2"."PUBLIC_KEY","A2"`

    `             ."SERIAL_NUMBER",:1||"A1"."USER_NAME","A1"."USER_NAME",NVL("A2"."`

    `             CREATE_TIME_DTT",:2),NVL("A2"."UPDATE_TIME_DTT",:3) FROM`

    `             "COMPUTER_SYSTEM" "A2","USERS" "A1" WHERE`


    The findings section contains recommendations such as accepting a SQL profile
    or creating an index—for example:


    `FINDINGS SECTION`

    `-------------------------------------------------------------------------------`

    `1- SQL Profile Finding (see explain plans section below)`

    `--------------------------------------------------------`

    `  A potentially better execution plan was found for this statement.`

    `  Recommendation (estimated benefit: 98.27%)`

    `  ------------------------------------------`

    `  - Consider accepting the recommended SQL profile to use`

    `parallel execution for this statement.`

    `    execute dbms_sqltune.accept_sql_profile(task_name =>`

    `            ''SYS_AUTO_SQL_TUNING_TASK'', object_id => 1160, task_owner =>`

    `            ''SYS'', replace => TRUE, profile_type => DBMS_SQLTUNE.PX_PROFILE);`

    `.................`

    `2- Index Finding (see explain plans section below)`

    `-------------------------------------------------`

    `The execution plan of this statement can be improved by creating`

    `one or more indices.`

    `  Recommendation (estimated benefit: 99.9%)`

    `  -----------------------------------------`

    `  - Consider running the Access Advisor to improve the physical schema design`

    `    or creating the recommended index.`

    `    create index CHAINSAW.IDX$$_90890002 on`

    `    CHAINSAW.COMPUTER_SYSTEM("UPDATE_TIME_DTT");`


    Where appropriate, the original execution plan for a query is displayed along
    with a suggested fix and new execution plan. This allows you to see the before
    and after plan differences. This is very useful when determining if the findings
    (such as adding an index) would improve performance.


    Lastly, there is an error section of the report. For most scenarios, there typically
    will not be an error section in the report.


    The “Solution” section showed how to execute the `REPORT_AUTO_TUNING_TASK` function
    from a SQL statement. This function can also be called from an anonymous block
    of PL/SQL. Here''s an example:


    `VARIABLE tune_report CLOB;`

    `BEGIN`

    `  :tune_report := DBMS_AUTO_SQLTUNE.report_auto_tuning_task(`

    `    begin_exec   => NULL`

    `   ,end_exec     => NULL`

    `   ,type         => DBMS_AUTO_SQLTUNE.type_text`

    `   ,level        => DBMS_AUTO_SQLTUNE.level_typical`

    `   ,section      => DBMS_AUTO_SQLTUNE.section_all`

    `   ,object_id    => NULL`

    `   ,result_limit => NULL);`

    `END;`

    `/`

    `--`

    `SET LONG 1000000`

    `PRINT :tune_report`


    The parameters for the `REPORT_AUTO_TUNING_TASK` function are described in detail
    in [Table 11-2](#Chapter11.html#tab_11_2). These parameters allow you a great
    deal of flexibility to customize the advice output.


    ![images](images/t1102.jpg)


    ### 11-3. Generating a SQL Script to Implement Automatic Tuning Advice


    #### Problem


    You''ve reported on the automatic tuning advice. Now you want to generate a SQL
    script that can be used to implement tuning advice.


    #### Solution


    Use the `DBMS_SQLTUNE.SCRIPT_TUNING_TASK` function to generate the SQL statements
    to implement the advice of a tuning task. You need to provide as input the name
    of the automatic tuning task. In this example, the name of the task is `SYS_AUTO_SQL_TUNING_TASK`:


    `SET LINES 132 PAGESIZE 0 LONG 10000`

    `SELECT DBMS_SQLTUNE.SCRIPT_TUNING_TASK(''SYS_AUTO_SQL_TUNING_TASK'') FROM dual;`


    Here is a small snippet of the output for this example:


    `execute dbms_stats.gather_index_stats(ownname => ''STAR2'', indname => ''F_CONFIG_P`

    `ROD_INST_FK1'', estimate_percent => DBMS_STATS.AUTO_SAMPLE_SIZE);`

    `create index NSESTAR.IDX$$_17F5F0004 on NSESTAR.D_DATES("FISCAL_YEAR","FISCAL_WE`

    `EK_NUMBER_IN_YEAR","DATE_DTT");`


    #### How It Works


    The `SCRIPT_TUNING_TASK` function generates the SQL to implement the advice recommended
    by the Automatic SQL Tuning job. If the tuning task doesn''t have any advice to
    give, then there won''t be any SQL statements generated in the output. `SYS_AUTO_SQL_TUNING_TASK`
    is the default name of the Automatic SQL Tuning task. If you''re unsure of the
    details regarding this task, then query the `DBA_ADVISOR_LOG` view:


    `select task_name, execution_start from dba_advisor_log`

    `where task_name=''SYS_AUTO_SQL_TUNING_TASK''`

    `order by 2;`


    Here''s some sample output for this example:


    `TASK_NAME                      EXECUTION`

    `------------------------------ ---------`

    `SYS_AUTO_SQL_TUNING_TASK       19-APR-11`


    ### 11-4. Modifying Automatic SQL Tuning Features


    #### Problem


    You''ve noticed that sometimes the Automatic SQL Tuning advice job recommends
    that a SQL profile be applied to a SQL statement (see [Chapter 12](#Chapter12.html#ch12)
    for details on SQL profiles). The default behavior of the tuning advice job is
    to not automatically accept SQL profile recommendations. You want to modify this
    behavior and have the Automatic SQL Tuning job automatically place any SQL profiles
    that it recommends into an accepted state.'
  trans: "\n## 工作原理\n\n“解决方案”部分描述了一种简单方法，用于显示数据库中高负载查询的深度调优建议。根据数据库的活动和负载情况，报告可能不包含任何建议，也可能提供大量建议。自动\
    \ SQL 调优作业使用 AWR 中识别的高负载 SQL 语句作为报告的目标 SQL 语句。建议报告包含一个或多个以下通用小节：\n\n*   基本信息\n\
    *   摘要\n*   详细信息\n*   调查结果\n*   执行计划\n*   备选执行计划\n*   错误\n\n基本信息部分包含有关开始和结束时间、考虑的\
    \ SQL 语句数量、SQL 语句的累计耗时等高级别信息。\n\n摘要部分包含有关已分析 SQL 语句的信息，例如：\n\n```\n          \
    \            Global SQL Tuning Result Statistics\n-------------------------------------------------------------------------------\n\
    Number of SQLs Analyzed                      : 26\nNumber of SQLs in the Report\
    \                 : 5\nNumber of SQLs with Findings                 : 5\nNumber\
    \ of SQLs with Alternative Plan Findings: 1\nNumber of SQLs with SQL profiles\
    \ recommended : 5\nNumber of SQLs with Index Findings           : 2\n-------------------------------------------------------------------------------\n\
    \    SQLs with Findings Ordered by Maximum (Profile/Index) Benefit, Object ID\n\
    -------------------------------------------------------------------------------\n\
    object ID  SQL ID        statistics profile(benefit) index(benefit) restructure\n\
    ---------- ------------- ---------- ---------------- -------------- -----------\n\
    \      1160 31q9w59vpt86t                     98.27%          99.90%\n      1167\
    \ 3u8xd0vf2pnhr                     98.64%\n```\n\n详细信息部分包含描述特定 SQL 语句的信息，例如所有者和\
    \ SQL 文本。以下是一个小示例：\n\n```\nDETAILS SECTION\n-------------------------------------------------------------------------------\n\
    Statements with Results Ordered by Maximum (Profile/Index) Benefit, Object ID\n\
    -------------------------------------------------------------------------------\n\
    Object ID  : 1160\nSchema Name: CHN_READ\nSQL ID     : 31q9w59vpt86t\nSQL Text\
    \   : SELECT \"A2\".\"UMID\",\"A2\".\"ORACLE_UNIQUE_ID\",\"A2\".\"PUBLIC_KEY\"\
    ,\"A2\"\n             .\"SERIAL_NUMBER\",:1||\"A1\".\"USER_NAME\",\"A1\".\"USER_NAME\"\
    ,NVL(\"A2\".\"\n             CREATE_TIME_DTT\",:2),NVL(\"A2\".\"UPDATE_TIME_DTT\"\
    ,:3) FROM\n             \"COMPUTER_SYSTEM\" \"A2\",\"USERS\" \"A1\" WHERE\n```\n\
    \n调查结果部分包含建议，例如接受 SQL 配置文件或创建索引，例如：\n\n```\nFINDINGS SECTION\n-------------------------------------------------------------------------------\n\
    1- SQL Profile Finding (see explain plans section below)\n--------------------------------------------------------\n\
    \  A potentially better execution plan was found for this statement.\n  Recommendation\
    \ (estimated benefit: 98.27%)\n  ------------------------------------------\n\
    \  - Consider accepting the recommended SQL profile to use\nparallel execution\
    \ for this statement.\n    execute dbms_sqltune.accept_sql_profile(task_name =>\n\
    \            'SYS_AUTO_SQL_TUNING_TASK', object_id => 1160, task_owner =>\n  \
    \          'SYS', replace => => TRUE, profile_type => DBMS_SQLTUNE.PX_PROFILE);\n\
    ................. \n2- Index Finding (see explain plans section below)\n-------------------------------------------------\n\
    The execution plan of this statement can be improved by creating\none or more\
    \ indices.\n  Recommendation (estimated benefit: 99.9%)\n  -----------------------------------------\n\
    \  - Consider running the Access Advisor to improve the physical schema design\n\
    \    or creating the recommended index.\n    create index CHAINSAW.IDX$$_90890002\
    \ on\n    CHAINSAW.COMPUTER_SYSTEM(\"UPDATE_TIME_DTT\");\n```\n\n在适当情况下，会显示查询的原始执行计划以及建议的修复方案和新的执行计划。这样你可以查看调整前后的计划差异。这对于确定调查结果（如添加索引）是否会改善性能非常有用。\n\
    \n最后，报告还有一个错误部分。对于大多数场景，报告中通常不会有错误部分。\n\n“解决方案”部分展示了如何从 SQL 语句中执行`REPORT_AUTO_TUNING_TASK`函数。此函数也可以从匿名\
    \ PL/SQL 块中调用。这是一个示例：\n\n```\nVARIABLE tune_report CLOB;\nBEGIN\n  :tune_report\
    \ := DBMS_AUTO_SQLTUNE.report_auto_tuning_task(\n    begin_exec   => NULL\n  \
    \ ,end_exec     => NULL\n   ,type         => DBMS_AUTO_SQLTUNE.type_text\n   ,level\
    \        => DBMS_AUTO_SQLTUNE.level_typical\n   ,section      => DBMS_AUTO_SQLTUNE.section_all\n\
    \   ,object_id    => NULL\n   ,result_limit => NULL);\nEND;\n/\n--\nSET LONG 1000000\n\
    PRINT :tune_report\n```\n\n`REPORT_AUTO_TUNING_TASK`函数的参数在表 11-2 中有详细描述。这些参数让你可以灵活地自定义建议输出。\n\
    \n![images](img/t1102.jpg)\n\n## 11-3. 生成用于实施自动调优建议的 SQL 脚本\n\n### 问题\n\n你已经生成了自动调优建议的报告。现在你想要生成一个可用于实施调优建议的\
    \ SQL 脚本。\n\n### 解决方案\n\n使用`DBMS_SQLTUNE.SCRIPT_TUNING_TASK`函数来生成实施调优任务建议的 SQL\
    \ 语句。你需要提供自动调优任务的名称作为输入。在此示例中，任务名称为`SYS_AUTO_SQL_TUNING_TASK`：\n\n```\nSET LINES\
    \ 132 PAGESIZE 0 LONG 10000\nSELECT DBMS_SQLTUNE.SCRIPT_TUNING_TASK('SYS_AUTO_SQL_TUNING_TASK')\
    \ FROM dual;\n```\n\n以下是此示例输出的一小部分：\n\n```\nexecute dbms_stats.gather_index_stats(ownname\
    \ => 'STAR2', indname => 'F_CONFIG_P\nROD_INST_FK1', estimate_percent => DBMS_STATS.AUTO_SAMPLE_SIZE);\n\
    create index NSESTAR.IDX$$_17F5F0004 on NSESTAR.D_DATES(\"FISCAL_YEAR\",\"FISCAL_WE\n\
    EK_NUMBER_IN_YEAR\",\"DATE_DTT\");\n```\n\n### 工作原理\n\n`SCRIPT_TUNING_TASK`函数生成用于实施自动\
    \ SQL 调优作业所推荐建议的 SQL 语句。如果调优任务没有任何建议，那么输出中将不会生成任何 SQL 语句。`SYS_AUTO_SQL_TUNING_TASK`是自动\
    \ SQL 调优任务的默认名称。如果你不确定此任务的详细信息，可以查询`DBA_ADVISOR_LOG`视图：\n\n```\nselect task_name,\
    \ execution_start from dba_advisor_log\nwhere task_name='SYS_AUTO_SQL_TUNING_TASK'\n\
    order by 2;\n```\n\n以下是此示例的一些示例输出：\n\n```\nTASK_NAME                      EXECUTION\n\
    ------------------------------ ---------\nSYS_AUTO_SQL_TUNING_TASK       19-APR-11\n\
    ```\n\n## 11-4. 修改自动 SQL 调优功能\n\n### 问题\n\n你注意到，有时自动 SQL 调优建议作业会建议对 SQL 语句应用 SQL\
    \ 配置文件（有关 SQL 配置文件的详细信息，请参见第 12 章）。调优建议作业的默认行为是不自动接受 SQL 配置文件建议。你想要修改此行为，让自动 SQL\
    \ 调优作业自动将其推荐的任何 SQL 配置文件置于已接受状态。\n"
- fmt: "## Solution\n\n使用 `DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER` 过程来修改自动\
    \ SQL 调优的默认行为。例如，如果您希望自动接受 SQL 配置文件，可以按如下方式操作：\n\n```sql\nBEGIN\n  DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER(\n\
    \    parameter => 'ACCEPT_SQL_PROFILES', value => 'TRUE');\nEND;\n/\n```\n\n您可以通过此查询验证是否启用了自动\
    \ SQL 配置文件接受：\n\n```sql\nSELECT parameter_name, parameter_value\nFROM dba_advisor_parameters\n\
    WHERE task_name = 'SYS_AUTO_SQL_TUNING_TASK'\nAND  parameter_name ='ACCEPT_SQL_PROFILES';\n\
    ```\n\n这是一些示例输出：\n\n```\nPARAMETER_NAME                 PARAMETER_VALUE\n------------------------------\
    \ ------------------------------\nACCEPT_SQL_PROFILES            TRUE\n```\n\n\
    要禁用 SQL 配置文件的自动接受，请向过程传递一个 `FALSE` 值：\n\n```sql\nBEGIN\n  DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER(\n\
    \    parameter => 'ACCEPT_SQL_PROFILES', value => 'FALSE');\nEND;\n/\n```\n\n\
    ![images](images/square.jpg) `Note` 从 Oracle Database 11g Release 2 开始，应使用 `DBMS_AUTO_SQLTUNE`\
    \ 包（而不是 `DBMS_SQLTUNE`）来管理自动 SQL 调优功能。\n\n## How It Works\n\n`DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER`\
    \ 过程允许您修改自动 SQL 调优作业的默认行为。您可以通过此查询查看自动 SQL 调优的所有当前设置：\n\n```sql\nSELECT parameter_name\
    \ ,parameter_value\nFROM dba_advisor_parameters\nWHERE task_name = 'SYS_AUTO_SQL_TUNING_TASK'\n\
    AND  parameter_name IN ('ACCEPT_SQL_PROFILES',\n                        'MAX_SQL_PROFILES_PER_EXEC',\n\
    \                        'MAX_AUTO_SQL_PROFILES',\n                        'EXECUTION_DAYS_TO_EXPIRE');\n\
    ```\n\n这是一些示例输出：\n\n```\nPARAMETER_NAME                 PARAMETER_VALUE\n------------------------------\
    \ ------------------------------\nACCEPT_SQL_PROFILES            FALSE\nEXECUTION_DAYS_TO_EXPIRE\
    \       30\nMAX_SQL_PROFILES_PER_EXEC      20\nMAX_AUTO_SQL_PROFILES         \
    \ 10000\n```\n\n前面的参数在 [Table 11-3](#Chapter11.html#tab_11_3) 中描述。\n\n![images](images/t1103.jpg)\n\
    \n您还可以使用 Enterprise Manager 来管理自动 SQL 调优的相关功能。从主数据库页面，导航到“顾问中心”页面。接下来，单击“SQL 顾问”链接。现在单击“自动\
    \ SQL 调优结果”页面。您应该会看到一个类似于 [Figure 11-2](#Chapter11.html#fig_11_2) 的屏幕。\n\n![images](images/1102.jpg)\n\
    \n`Figure 11-2.` 使用 Enterprise Manager 管理自动 SQL 调优\n\n从这个屏幕，您可以配置、查看结果、禁用和启用自动\
    \ SQL 调优的各个方面。\n\n### 11-5. 禁用和启用自动 SQL 调优\n\n#### Problem\n\n您想要完全禁用，然后重新启用自动\
    \ SQL 调优作业。\n\n#### Solution\n\n使用 `DBMS_AUTO_TASK_ADMIN.DISABLE` 过程来禁用自动 SQL\
    \ 调优作业。此示例禁用自动 SQL 调优顾问作业。\n\n```sql\nBEGIN\n  DBMS_AUTO_TASK_ADMIN.DISABLE(\n\
    \  client_name => 'sql tuning advisor',\n  operation => NULL,\n  window_name =>\
    \ NULL);\nEND;\n/\n```\n\n要重新启用作业，请使用 `ENABLE` 过程，如下所示：\n\n```sql\nBEGIN\n  DBMS_AUTO_TASK_ADMIN.ENABLE(\n\
    \  client_name => 'sql tuning advisor',\n  operation => NULL,\n  window_name =>\
    \ NULL);\nEND;\n/\n```\n\n您可以通过此查询报告自动调优作业的状态：\n\n```sql\nSELECT client_name ,status\
    \ ,consumer_group\nFROM dba_autotask_client\nORDER BY client_name;\n```\n\n这是一些示例输出：\n\
    \n```\nCLIENT_NAME                      STATUS          CONSUMER_GROUP\n--------------------------------\
    \ --------------- ------------------------------\nauto optimizer stats collection\
    \  ENABLED         ORA$AUTOTASK_STATS_GROUP\nauto space advisor              \
    \ ENABLED         ORA$AUTOTASK_SPACE_GROUP\nsql tuning advisor               ENABLED\
    \         ORA$AUTOTASK_SQL_GROUP\n```\n\n#### How It Works\n\n您可能希望禁用自动 SQL 调优作业，因为您的数据库非常活跃，并希望确保此作业不会影响数据库的整体性能。`DBMS_AUTO_TASK_ADMIN.ENABLE/DISABLE`\
    \ 过程允许您打开和关闭自动 SQL 调优作业。这些过程接受三个参数（详见 [Table 11-4](#Chapter11.html#tab_11_4)）。这些过程的行为取决于您传递的参数：\n\
    \n*   如果提供了 `CLIENT_NAME`，并且 `OPERATION` 和 `WINDOW_NAME` 都是 `NULL`，则禁用该客户端。\n\
    *   如果提供了 `OPERATION`，则禁用该操作。\n*   如果提供了 `WINDOW_NAME`，并且 `OPERATION` 是 `NULL`，则在提供的窗口名称中禁用该客户端。\n\
    \n前面的参数允许您以精细的细节控制自动任务的调度。根据前面的规则，您可以按如下方式在周二维护窗口期间禁用自动 SQL 调优作业：\n\n```sql\n\
    BEGIN\n  dbms_auto_task_admin.disable(\n  client_name => 'sql tuning advisor',\n\
    \  operation => NULL,\n  window_name => 'TUESDAY_WINDOW');\nEND;\n/\n```\n\n您可以通过此查询验证窗口是否已被禁用：\n\
    \n```sql\nSELECT window_name,TO_CHAR(window_next_time,'DD-MON-YY HH24:MI:SS')\n\
    ,sql_tune_advisor\nFROM dba_autotask_window_clients;\n```\n\n这是输出的一个片段：\n\n```\n\
    WINDOW_NAME      TO_CHAR(WINDOW_NEXT_TIME SQL_TUNE\n---------------- ------------------------\
    \ --------\nTUESDAY_WINDOW   03-MAY-11 22:00:00       DISABLED\n```\n\n![images](images/t1104.jpg)\n\
    \n### 11-6. 修改维护窗口属性\n\n#### Problem\n\n您意识到自动任务（如自动 SQL 调优作业）在定期安排的维护窗口期间运行。您想要修改与维护窗口相关联的持续时间。\n\
    \n#### Solution\n\n以下示例将周日维护窗口的持续时间更改为两小时：\n\n```sql\nBEGIN\n  dbms_scheduler.set_attribute(\n\
    \  name => 'SUNDAY_WINDOW',\n  attribute => 'DURATION',\n  value => numtodsinterval(2,\
    \ 'hour'));\nEND;\n/\n```\n\n您可以通过此查询确认对维护窗口的更改：\n\n```sql\nSELECT window_name,\
    \ next_start_date, duration\nFROM dba_scheduler_windows;\n```\n\n这是输出的一个片段：\n\n\
    ```\nWINDOW_NAME      NEXT_START_DATE                                   DURATION\n\
    ---------------- ------------------------------------------------ --------\nSATURDAY_WINDOW\
    \  07-MAY-11 06.00.00.000000 AM US/MOUNTAIN         +000 20:00:00\nSUNDAY_WINDOW\
    \    08-MAY-11 06.00.00.000000 AM US/MOUNTAIN         +000 02:00:00\n```\n\n####\
    \ How It Works\n\n理解如何修改维护窗口的关键在于，它是数据库作业调度程序的一个属性，因此必须通过 `DBMS_SCHEDULER` 包来维护。当您安装\
    \ Oracle Database 11g 时，默认配置了三个自动维护作业：\n\n*   自动 SQL 调优\n*   统计信息收集\n*   段建议\n\
    \n这些作业在预配置的每日维护窗口中自动执行。维护窗口由一周中的某天和作业运行的时长组成。\n\n您可以通过此查询查看未来一个月的计划作业：\n\n```sql\n\
    SELECT window_name, to_char(start_time,'dd-mon-yy hh24:mi'), duration\nFROM dba_autotask_schedule\n\
    ORDER BY start_time;\n```\n\n这是输出的一个小样本：\n\n```\nWINDOW_NAME          TO_CHAR(START_TIME,'DD\
    \ DURATION\n-------------------- -------------------- --------------------\nSATURDAY_WINDOW\
    \      14-may-11 06:00     +000 20:00:00\nSUNDAY_WINDOW        15-may-11 06:00\
    \     +000 02:00:00\n```\n\n![images](images/square.jpg) `Tip` 有关管理计划作业的更多详细信息，请参阅\
    \ Oracle 的 *Database Administrator's Guide*（可在 Oracle Technology Network 网站上获取）。\n\
    \n### 11-7. 创建 SQL 调优集对象"
  raw: '#### Solution


    Use the `DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER` procedure to modify
    the default behavior of Automatic SQL Tuning. For example, if you want SQL profiles
    to be automatically accepted, you can do so as follows:


    `BEGIN`

    `  DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER(`

    `    parameter => ''ACCEPT_SQL_PROFILES'', value => ''TRUE'');`

    `END;`

    `/`


    You can verify that auto SQL profile accepting is enabled via this query:


    `SELECT parameter_name, parameter_value`

    `FROM dba_advisor_parameters`

    `WHERE task_name = ''SYS_AUTO_SQL_TUNING_TASK''`

    `AND  parameter_name =''ACCEPT_SQL_PROFILES'';`


    Here is some sample output:


    `PARAMETER_NAME                 PARAMETER_VALUE`

    `------------------------------ ------------------------------`

    `ACCEPT_SQL_PROFILES            TRUE`


    To disable automatic acceptance of SQL profiles, pass a `FALSE` value to the procedure:


    `BEGIN`

    `  DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER(`

    `    parameter => ''ACCEPT_SQL_PROFILES'', value => ''FALSE'');`

    `END;`

    `/`


    ![images](images/square.jpg) **Note** Starting with Oracle Database 11g Release
    2, the `DBMS_AUTO_SQLTUNE` package should be used (instead of `DBMS_SQLTUNE`)
    for administrating Automatic SQL Tuning features.


    #### How It Works


    The `DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER` procedure allows you to
    modify the default behavior of the Automatic SQL Tuning job. You can view all
    of the current settings for Automatic SQL Tuning via this query:


    `SELECT parameter_name ,parameter_value`

    `FROM dba_advisor_parameters`

    `WHERE task_name = ''SYS_AUTO_SQL_TUNING_TASK''`

    `AND  parameter_name IN (''ACCEPT_SQL_PROFILES'',`

    `                        ''MAX_SQL_PROFILES_PER_EXEC'',`

    `                        ''MAX_AUTO_SQL_PROFILES'',`

    `                        ''EXECUTION_DAYS_TO_EXPIRE'');`


    Here''s some sample output:


    `PARAMETER_NAME                 PARAMETER_VALUE`

    `------------------------------ ------------------------------`

    `ACCEPT_SQL_PROFILES            FALSE`

    `EXECUTION_DAYS_TO_EXPIRE       30`

    `MAX_SQL_PROFILES_PER_EXEC      20`

    `MAX_AUTO_SQL_PROFILES          10000`


    The prior parameters are described in [Table 11-3](#Chapter11.html#tab_11_3).


    ![images](images/t1103.jpg)


    You can also use Enterprise Manager to manage the features regarding Automatic
    SQL Tuning. From the main database page, navigate to the Advisor Central page.
    Next, click the SQL Advisors link. Now click the Automatic SQL Tuning Results
    page. You should be presented with a screen similar to [Figure 11-2](#Chapter11.html#fig_11_2).


    ![images](images/1102.jpg)


    ***Figure 11-2.** Managing Automatic SQL Tuning with Enterprise Manager*


    From this screen, you can configure, view results, disable, and enable various
    aspects of Automatic SQL Tuning.


    ### 11-5. Disabling and Enabling Automatic SQL Tuning


    #### Problem


    You want to completely disable and later re-enable the Automatic SQL Tuning job.


    #### Solution


    Use the `DBMS_AUTO_TASK_ADMIN.DISABLE` procedure to disable the Automatic SQL
    Tuning job. This example disables the Automatic SQL Tuning Advisor job.


    `BEGIN`

    `  DBMS_AUTO_TASK_ADMIN.DISABLE(`

    `  client_name => ''sql tuning advisor'',`

    `  operation => NULL,`

    `  window_name => NULL);`

    `END;`

    `/`


    To re-enable the job, use the `ENABLE` procedure as shown:


    `BEGIN`

    `  DBMS_AUTO_TASK_ADMIN.ENABLE(`

    `  client_name => ''sql tuning advisor'',`

    `  operation => NULL,`

    `  window_name => NULL);`

    `END;`

    `/`


    You can report on the status of the automatic tuning job via this query:


    `SELECT client_name ,status ,consumer_group`

    `FROM dba_autotask_client`

    `ORDER BY client_name;`


    Here''s some sample output:


    `CLIENT_NAME                      STATUS          CONSUMER_GROUP`

    `-------------------------------- --------------- ------------------------------`

    `auto optimizer stats collection  ENABLED         ORA$AUTOTASK_STATS_GROUP`

    `auto space advisor               ENABLED         ORA$AUTOTASK_SPACE_GROUP`

    `sql tuning advisor               ENABLED         ORA$AUTOTASK_SQL_GROUP`


    #### How It Works


    You might want to disable the Automatic SQL Tuning job because you have a very
    active database and want to ensure that this job doesn''t impact the overall performance
    of the database. The `DBMS_AUTO_ TASK_ADMIN.ENABLE/DISABLE` procedures allow you
    to turn on and off the Automatic SQL Tuning job. These procedures take three parameters
    (see [Table 11-4](#Chapter11.html#tab_11_4) for details). The behavior of the
    procedures varies depending on which parameters you pass in:


    *   If `CLIENT_NAME` is provided and both `OPERATION` and `WINDOW_NAME` are `NULL`,
    then the client is disabled.

    *   If `OPERATION` is provided, then the operation is disabled.

    *   If `WINDOW_NAME` is provided, and `OPERATION` is `NULL`, then the client is
    disabled in the provided window name.


    The prior parameters allow you to control at a granular detail the schedule of
    the automatic task. Given the prior rules, you would disable the Automatic SQL
    Tuning job during the Tuesday maintenance window as follows:


    `BEGIN`

    `  dbms_auto_task_admin.disable(`

    `  client_name => ''sql tuning advisor'',`

    `  operation => NULL,`

    `  window_name => ''TUESDAY_WINDOW'');`

    `END;`

    `/`


    You can verify that the window has been disabled via this query:


    `SELECT window_name,TO_CHAR(window_next_time,''DD-MON-YY HH24:MI:SS'')`

    `,sql_tune_advisor`

    `FROM dba_autotask_window_clients;`


    Here is a snippet of the output:


    `WINDOW_NAME      TO_CHAR(WINDOW_NEXT_TIME SQL_TUNE`

    `---------------- ------------------------ --------`

    `TUESDAY_WINDOW   03-MAY-11 22:00:00       DISABLED`


    ![images](images/t1104.jpg)


    ### 11-6\. Modifying Maintenance Window Attributes


    #### Problem


    You realize that the automatic tasks (such as the Automatic SQL Tuning job) run
    during regularly scheduled maintenance windows. You want to modify the length
    of time associated with a maintenance window.


    #### Solution


    Here''s an example that changes the duration of the Sunday maintenance window
    to two hours:


    `BEGIN`

    `  dbms_scheduler.set_attribute(`

    `  name => ''SUNDAY_WINDOW'',`

    `  attribute => ''DURATION'',`

    `  value => numtodsinterval(2, ''hour''));`

    `END;`

    `/`


    You can confirm the changes to the maintenance window with this query:


    `SELECT window_name, next_start_date, duration`

    `FROM dba_scheduler_windows;`


    Here is a snippet of the output:


    `WINDOW_NAME      NEXT_START_DATE                          DURATION`

    `---------------- ---------------------------------------- --------------------`

    `SATURDAY_WINDOW  07-MAY-11 06.00.00.000000 AM US/MOUNTAIN +000 20:00:00`

    `SUNDAY_WINDOW    08-MAY-11 06.00.00.000000 AM US/MOUNTAIN +000 02:00:00`


    #### How It Works


    The key to understanding how to modify a maintenance window is that it is an attribute
    of the database job scheduler and therefore must be maintained via the `DBMS_SCHEDULER`
    package. When you install Oracle Database 11g, by default three automatic maintenance
    jobs are configured:


    *   Automatic SQL Tuning

    *   Statistics gathering

    *   Segment advice


    These jobs automatically execute in preconfigured daily maintenance windows. A
    maintenance window consists of a day of the week and the length of time the job
    runs.


    You can view the future one month''s worth of scheduled jobs via this query:


    `SELECT window_name, to_char(start_time,''dd-mon-yy hh24:mi''), duration`

    `FROM dba_autotask_schedule`

    `ORDER BY start_time;`


    Here is a small sample of the output:


    `WINDOW_NAME          TO_CHAR(START_TIME,''D DURATION`

    `-------------------- --------------------- --------------------`

    `SATURDAY_WINDOW      14-may-11 06:00       +000 20:00:00`

    `SUNDAY_WINDOW        15-may-11 06:00       +000 02:00:00`


    ![images](images/square.jpg) **Tip** See Oracle''s Database Administrator''s Guide
    (available on the Oracle Technology Network web site) for further details on managing
    scheduled jobs.


    ### 11-7. Creating a SQL Tuning Set Object'
  trans: "## 解决方案\n\n使用 `DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER` 过程来修改自动\
