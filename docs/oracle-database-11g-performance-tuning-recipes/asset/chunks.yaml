    ### 15-13. Finding Bottlenecks in Parallel Processes


    #### Problem


    You have some parallel processes that are underperforming, and you want to do
    analysis to find the bottlenecks.


    #### Solution


    There are many wait events related to parallelism. Many of these events are considered
    “idle” wait events—that is, they don''t usually indicate a problem. If you query
    the `V$SYSTEM_EVENT` view, you can get an idea of the parallelism-related waits
    that have occurred in your database instance. The following query results show
    some of the common wait events that can occur:


    `SELECT event, wait_class, total_waits`

    `FROM v$session_event`

    `WHERE event LIKE ''PX%'';`


    `EVENT                        WAIT_CLASS   TOTAL_WAITS`

    `---------------------------- ------------ -----------`

    `PX Deq Credit: need buffer   Idle             6667936`

    `PX Deq Credit: send blkd     Other            8161247`

    `PX Deq: Execute Reply        Idle              490827`

    `PX Deq: Execution Msg        Idle              685175`

    `PX Deq: Join ACK             Idle               26312`

    `PX Deq: Msg Fragment         Idle                  67`

    `PX Deq: Parse Reply          Idle               20891`

    `PX Deq: Signal ACK           Other              25729`

    `PX Deq: Table Q Get Keys     Other               3141`

    `PX Deq: Table Q Normal       Idle            25120970`

    `PX Deq: Table Q Sample       Idle               11124`

    `PX Deq: Table Q qref         Other            1705216`

    `PX Idle Wait                 Idle              241116`

    `PX qref latch                Other            1208472`


    #### How It Works


    [Table 15-7](#Chapter15.html#tab_15_7) describes some of the key parallelism-related
    wait events. If you are having significant performance issues, it may be worthwhile
    to browse these wait events to see if you have excessive waits or wait times.
    If so, it may indicate an issue with the processing occurring with the parallel
    slaves. Again, events that are “idle” *generally* do not indicate a problem.


    ![images](images/t1507.jpg)


    ![images](images/t1507a.jpg)


    ### 15-14. Getting Detailed Information on Parallel Sessions


    #### Problem


    You have some underperforming parallel processes, and need more detailed information
    on the sessions.


    #### Solution


    By turning on session tracing, you can get detailed trace information on your
    parallel sessions. This is essentially a four-step process:


    1.  Set the event in your session.

    2.  Execute your SQL statement.

    3.  Turn off your session tracing.

    4.  Analyze your trace file output.


    For example, you are again executing a parallel query against our `EMP` table.
    In order to gather trace information, you would do the following:


    `alter session set events ''10391 trace name context forever, level 128'';`


    `select /*+ parallel(emp,4) */ * from emp;`


    `alter session set events ''10391 trace name context off'';`


    Then, within the trace file, you can analyze the parallel-related information,
    such as the following:


    `kxfrDmpUpdSys`

    `        allocated slave set: nsset:1 nbslv:4`

    `          Slave set 0: #nodes:1`

    `          Min # slaves 4: Max # slaves:4`

    `            List of Slaves:`

    `              slv 0 nid:0`

    `              slv 1 nid:0`

    `              slv 2 nid:0`

    `              slv 3 nid:0`

    `            List of Nodes:`

