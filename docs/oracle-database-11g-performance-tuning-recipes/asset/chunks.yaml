    追踪会话活动是大多数 SQL 性能调优工作的核心。Oracle 提供了一套丰富的工具来追踪 SQL 活动。本章介绍 Oracle SQL 追踪功能，并向您展示如何在您的环境中设置\
    \ SQL 追踪。Oracle 提供了许多“事件”来帮助您执行各种类型的追踪。\n\n尽管有几种追踪方法可用，但 Oracle 现在建议您对大多数类型的追踪使用`DBMS_MONITOR`包。本章包含几个说明如何使用此包生成追踪的配方。此外，我们还展示了如何通过设置各种\
    \ Oracle 事件来追踪会话，这通常是 Oracle 支持人员所要求的。您将学习如何追踪单个 SQL 语句、一个会话以及整个实例，以及如何追踪并行查询。有配方展示了如何追踪另一个用户的会话以及如何使用触发器来启动会话追踪。您还将学习如何追踪\
    \ Oracle 优化器的执行路径。\n\nOracle 提供了`TKPROF`实用程序以及可免费下载的分析器 Oracle Trace Analyzer。本章展示了如何使用这两种分析器来分析您生成的原始追踪文件。\n\
    \n### 10-1. 准备环境\n\n#### 问题\n\n您希望确保数据库已为追踪 SQL 会话正确设置。\n\n#### 解决方案\n\n在开始追踪\
    \ SQL 语句之前，您必须做三件事：\n\n1.  启用定时统计信息收集。\n2.  指定追踪转储文件的目标位置。\n3.  调整追踪转储文件大小。\n\n\
    您可以通过将`timed_statistics`参数设置为`true`来启用定时统计信息的收集。首先检查此参数的当前值：\n\n```sql\nSQL> sho\
    \ parameter statistics\nNAME                                 TYPE        VALUE\n\
    ------------------------------------ ----------- -----------\n...\nstatistics_level\
    \                     string      TYPICAL\ntimed_statistics                  \
    \   boolean     TRUE\nSQL>\n```\n\n如果`timed_statistics`参数的值为`false`，请使用以下语句将其设置为`true`：\n\
    \n```sql\nSQL> alter system set timed_statistics=true scope=both;\nSystem altered.\n\
    SQL>\n```\n\n您也可以使用以下语句在会话级别设置此参数：\n\n```sql\nSQL> alter session set timed_statistics=true\n\
    ```\n\n您可以使用以下命令找到追踪目录的位置（在 Oracle Database 11g 之前的版本中称为用户转储目录）：\n\n```sql\nSQL>\
    \ select name,value from v$diag_info\n  2* where name='Diag Trace'\nSQL> /\nNAME\
    \                                      VALUE\n-----------------------------  \
    \  ----------------------------------------\nDiag Trace                      \
    \ c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\trace\nSQL>\n```\n\n在 Oracle Database\
    \ 11g 中，`max_dump_file_size`参数的默认值为`unlimited`，您可以通过发出以下命令进行验证：\n\n```sql\nSQL>\
    \ sho parameter dump\nNAME                                 TYPE        VALUE\n\
    ------------------------------------ ----------- ----------\n...\nmax_dump_file_size\
    \                   string      unlimited\n```\n\n无限制的转储文件大小意味着文件可以增长到操作系统允许的大小。"
- fmt: "# SQL 跟踪技术\n\n## 概述与工作原理\n\n### 如何工作\n在追踪任何 SQL 会话之前，请确保已将 `timed_statistics`\
    \ 初始化参数设置为 `true`。如果此参数的值为 `false`，SQL 跟踪将被禁用。将 `timed_statistics` 参数设置为 `true`\
    \ 可使数据库收集 CPU 和耗时等统计信息，并将其存储在各种动态性能表中。从 Oracle 11.1.0.7.0 版本开始，此参数的默认值取决于初始化参数\
    \ `statistics_level` 的值。如果将 `statistics_level` 参数设置为 `basic`，则 `timed_statistics`\
    \ 参数的默认值为 `false`。如果将 `statistics_level` 设置为 `typical` 或 `all`，则 `timed_statistics`\
    \ 参数的默认值为 `true`。`timed_statistics` 参数是动态的，这意味着您无需重启数据库即可将其打开——您可以在整个数据库上开启此参数而不会产生显著开销。您也可以仅为单个会话开启此参数。\n\
    \n当您追踪一个 SQL 会话时，Oracle 会生成一个跟踪文件，其中包含对排查 SQL 性能问题非常有用的诊断数据。从 Oracle Database\
    \ 11g 开始，数据库将所有诊断文件存储在一个专用的诊断目录中，该目录通过 `diagnostic_dest` 初始化参数指定。诊断目录的结构如下：\n\n\
    ```\n<diagnostic_dest>/diag/rdbms/<dbname>/<instance>\n```\n\n该诊断目录称为 ADR 主目录。如果您的数据库名称是\
    \ `prod1`，实例名称也是 `prod1`，那么 ADR 主目录将是：\n\n```\n<diagnostic_dest>/diag/rdbms/prod1/prod1\n\
    ```\n\nADR 主目录在 `<ADR Home>/trace` 子目录中包含跟踪文件。跟踪文件通常以 `.trc` 为扩展名。您会注意到，多个跟踪文件有一个对应的跟踪映射文件，扩展名为\
    \ `.trm`。`.trm` 文件包含有关跟踪文件的结构信息，数据库使用这些信息进行搜索和导航。您可以使用以下命令查看数据库的诊断目录设置：\n\n```\n\
    SQL> sho parameter diagnostic_dest\n\nNAME                                 TYPE\
    \        VALUE\n------------------------------------ ----------- ------------------------------\n\
    diagnostic_dest                      string      C:\\APP\\ORA\nSQL>\n```\n\n`V$DIAG_INFO`\
    \ 视图显示了各个诊断目录的位置，包括跟踪目录，该目录在视图中以 Diag Trace 名称列出。尽管 Oracle Database 11g 中的新数据库可诊断性基础设施忽略了\
    \ `user_dump_dest` 初始化参数，但该参数仍然存在，并且指向与 `$ADR_BASE\\diag\\rdbms\\<database>\\\
    <instance>\\trace` 目录相同的目录，如以下命令所示：\n\n```\nSQL> show parameter user_dump_dest\n\
    \nNAME                                 TYPE        VALUE\n------------------------------------\
    \ ----------- ------------------------------\nuser_dump_dest                 \
    \      string      c:\\app\\ora\\diag\\rdbms\\orcl1\\or\n                    \
    \                             cl1\\trace\nSQL>\n```\n\n在 Oracle Database 11g 中，您无需设置\
    \ `max_dump_file_size` 参数来指定跟踪文件的最大大小。\n\n## 追踪特定 SQL 语句\n\n### 问题\n您想要追踪特定的 SQL\
    \ 语句，以查明数据库在执行该语句期间将时间花费在了哪里。\n\n### 解决方案\n在 Oracle 11.1 或更高版本中，您可以使用增强的 SQL 跟踪接口来追踪一条或多条\
    \ SQL 语句。以下是对一组 SQL 语句进行追踪的步骤。\n\n1.  执行 `alter session set events` 语句以设置追踪，如下所示：\n\
    \    ```\n    SQL> alter session set events 'sql_trace level 12';\n    Session\
    \ altered.\n    SQL>\n    ```\n2.  执行 SQL 语句：\n    ```\n    SQL> select count(*)\
    \ from sales;\n    ```\n3.  关闭追踪：\n    ```\n    SQL> alter session set events\
    \ 'sql_trace off';\n    Session altered.\n    SQL>\n    ```\n\n您可以通过在 `alter session\
    \ set events` 语句中指定 SQL 语句的 SQL ID 来选择追踪特定的 SQL 语句。步骤如下：\n\n1.  通过执行以下语句找到 SQL\
    \ 语句的 SQL ID：\n    ```\n    SQL> select sql_id,sql_text\n      2  from v$sql\n\
    \      3  where sql_text='select sum(quantity_sold) from sales';\n\n    SQL_ID\
    \                       SQL_TEXT\n---------------------------- ------------------------------------\n\
    \    fb2yu0p1kgvhr                select sum(quantity_sold) from sales\n\n   \
    \ SQL>\n    ```\n2.  为您检索到的 SQL ID 对应的特定 SQL 语句开启追踪：\n    ```\n    SQL> alter\
    \ session set events 'sql_trace [sql:fb2yu0p1kgvhr] level 12';\n    Session altered.\n\
    \    SQL>\n    ```\n3.  执行 SQL 语句：\n    ```\n    SQL> select sum(quantity_sold)\
    \ from sales;\n\n    SUM(QUANTITY_SOLD)\n    ------------------\n            \
    \    918843\n    ```\n4.  关闭追踪：\n    ```\n    SQL> alter session set events 'sql_trace[sql:fb2yu0p1kgvhr]\
    \ off';\n    Session altered.\n    SQL>\n    ```\n\n您可以通过用管道符 (`|`) 分隔 SQL ID\
    \ 来追踪多条 SQL 语句，如下所示：\n\n```\nSQL> alter session set events ‘sql_trace [sql: fb2yu0p1kgvhr|4v433su9vvzsw]‘;\n\
    ```\n\n您可以通过执行 `alter system set events` 语句来追踪在另一个会话中运行的特定 SQL 语句：\n\n```\nSQL>\
    \ alter system set events 'sql_trace[sql:fb2yu0p1kgvhr] level 12';\nSystem altered.\n\
    SQL>\n```\n\n您可以通过查询 `V$SQL` 视图（如本配方前面所示）来获取该语句的 SQL ID，也可以通过 Oracle Enterprise\
    \ Manager 获取。一旦另一个会话中的用户完成执行 SQL 语句，请使用以下命令关闭追踪：\n\n```\nSQL> alter system set\
    \ events 'sql_trace[sql:fb2yu0p1kgvhr] off';\nSystem altered.\nSQL>\n```\n\n###\
    \ 如何工作\n在 Oracle Database 11g 中，您可以设置 Oracle 事件 `SQL_TRACE` 来追踪一条或多条 SQL 语句的执行。您可以执行\
    \ `alter session` 或 `alter system` 语句来追踪特定的 SQL 语句。命令语法如下：\n\n```\nalter session/system\
    \ set events ‘sql_trace [sql:<sql_id>|<sql_id>] … event specification‘;\n```\n\
    \n即使您在关闭追踪之前执行了多条 SQL 语句，跟踪文件也只会显示与您指定的 SQL_ID 或 SQL_ID 相关的信息。\n\n## 在自己的会话中启用追踪\n\
    \n### 问题\n您想要追踪您自己的会话。\n\n### 解决方案\n普通用户可以使用 `DBMS_SESSION` 包来追踪其会话，如下例所示：\n\n\
    ```\nSQL>execute dbms_session.session_trace_enable(waits=>true, binds=> false);\n\
    ```\n\n要禁用追踪，用户必须执行 `session_trace_disable` 过程，如下所示：\n\n```\nSQL> execute dbms_session.session_trace_disable();\n\
    ```\n\n### 如何工作\nOracle 推荐用于所有追踪的 `DBMS_MONITOR` 包只能由具有 DBA 角色的用户执行。如果您没有 DBA\
    \ 角色，可以使用 `dbms_session.session_trace_enable` 过程来追踪您自己的会话。\n\n## 查找跟踪文件\n\n###\
    \ 问题\n您希望找到一种轻松识别您的跟踪文件的方法。"
  raw: "#### How It Works\n\nBefore you can trace any SQL sessions, ensure that you’ve\
    \ set the `timed_statistics` initialization parameter to `true`. If the value\
    \ for this parameter is `false`, SQL tracing is disabled. Setting the `timed_statistics`\
    \ parameter to `true` enables the database to collect statistics such as the CPU\
    \ and elapsed times and store them in various dynamic performance tables. The\
    \ default value of this parameter, starting with the Oracle 11.1.0.7.0 release,\
    \ depends on the value of the initialization parameter `statistics_level`. If\
    \ you set the `statistics_level` parameter to `basic`, the default value of the\
    \ `timed_statistics` parameter is `false`. If you set `statistics_level` to the\
    \ value `typical` or `all`, the default value of the `timed_statistics` parameter\
    \ is `true`. The `timed_statistics` parameter is dynamic, meaning you don't have\
    \ to restart the database to turn it on—you can turn this parameter on for the\
    \ entire database without a significant overhead. You can also turn the parameter\
    \ on only for an individual session.\n\nWhen you trace a SQL session, Oracle generates\
    \ a trace file that contains diagnostic data that's very useful in troubleshooting\
    \ SQL performance issues. Starting with Oracle Database 11g, the database stores\
    \ all diagnostic files under a dedicated diagnostic directory that you specify\
    \ through the `diagnostic_dest` initialization parameter. The structure of the\
    \ diagnostic directory is as follows:\n\n`<diagnostic_dest>/diag/rdbms/<dbname>/<instance>`\n\
    \nThe diagnostic directory is called the ADR Home. If your database name is `prod1`\
    \ and the instance name is `prod1` as well, then the ADR home directory will be\
    \ the following:\n\n`<diagnostic_dest>/diag/rdbms/prod1/prod1`\n\nThe ADR home\
    \ directory contains trace files in the `<ADR Home>/trace` subdirectory. Trace\
    \ files usually have the extension `.trc`. You'll notice that several trace files\
    \ have a corresponding trace map file with the `.trm` extension. The `.trm` files\
    \ contain structural information about trace files, which the database uses for\
    \ searching and navigation. You can view the diagnostic directory setting for\
    \ a database with the following command:\n\n`SQL> sho parameter diagnostic_dest`\n\
    \n`NAME                                 TYPE        VALUE`\n`------------------------------------\
    \ ----------- -----------`\n`diagnostic_dest                      string      C:\\\
    APP\\ORA`\n`SQL>`\n\nThe `V$DIAG_INFO` view shows the location of the various\
    \ diagnostic directories, including the trace directory, which is listed in this\
    \ view under the name Diag Trace. Although the new database diagnosability infrastructure\
    \ in Oracle Database 11g ignores the `user_dump_dest` initialization parameter,\
    \ the parameter still exists, and points to the same directory as the `$ADR_BASE\\\
    diag\\rdbms\\<database>\\<instance>\\trace` directory, as the following command\
    \ shows:\n\n`SQL> show parameter user_dump_dest`\n\n`NAME                                 TYPE        VALUE`\n\
    `------------------------------------ ----------- ------------------------------`\n\
    `user_dump_dest                       string      c:\\app\\ora\\diag\\rdbms\\\
    orcl1\\or`\n`                                                 cl1\\trace`\n`SQL>`\n\
    \nIn Oracle Database 11g, you don't have to set the `max_dump_file_size` parameter\
    \ to specify the maximum size of a trace file.\n\n### 10-2\\. Tracing a Specific\
    \ SQL Statement\n\n#### Problem\n\nYou want to trace a specific SQL statement,\
    \ in order to find out where the database is spending its time during the execution\
    \ of the statement.\n\n#### Solution\n\nIn an Oracle 11.1 or higher release, you\
    \ can use the enhanced SQL tracing interface to trace one or more SQL statements.\
    \ Here are the steps to tracing a set of SQL statements.\n\n1.  Issue the `alter\
    \ session set events` statement, as shown here, to set up the trace. `SQL> alter\
    \ session set events 'sql_trace level 12';`\n\n    `Session altered.`\n    `SQL>`\n\
    2.  Execute the SQL statements. `SQL> select count(*) from sales;`\n3.  Set tracing\
    \ off. `SQL> alter session set events 'sql_trace off';`\n\n    `Session altered.`\n\
    \n    `SQL>`\n\nYou can choose to trace specific SQL statements by specifying\
    \ the SQL ID of a statement in the `alter session set events` statement. Here\
    \ are the steps:\n\n1.  Find the SQL ID of the SQL statement by issuing this statement:\
    \ ` SQL> select sql_id,sql_text`\n    `      from v$sql`\n    `      where sql_text='select\
    \ sum(quantity_sold) from sales';`\n\n    `SQL_ID                       SQL_TEXT`\n\
    \    `----------------           ------------------------------------`\n    `fb2yu0p1kgvhr              select\
    \ sum(quantity_sold) from sales`\n\n    `SQL>`\n2.  Set tracing on for the specific\
    \ SQL statement whose SQL ID you've retrieved. `SQL> alter session set events\
    \ 'sql_trace [sql:fb2yu0p1kgvhr] level 12';`\n\n    `Session altered.`\n\n   \
    \ `SQL>`\n3.  Execute the SQL statement. `SQL> select sum(quantity_sold) from\
    \ sales;`\n\n    `SUM(QUANTITY_SOLD)`\n    `------------------`\n    `            918843`\n\
    4.  Turn off tracing. `SQL> alter session set events 'sql_trace[sql:fb2yu0p1kgvhr]\
    \ off';`\n\n    `Session altered.`\n\n    `SQL>`\n\nYou can trace multiple SQL\
    \ statements by separating the SQL IDs with the pipe (`|`) character, as shown\
    \ here:\n\n`SQL> alter session set events ‘sql_trace [sql: fb2yu0p1kgvhr|4v433su9vvzsw]‘;`\n\
    \nYou can trace a specific SQL statement running in a different session by issuing\
    \ an `alter system set events` statement:\n\n`SQL> alter system set events 'sql_trace[sql:fb2yu0p1kgvhr]\
    \ level 12';`\n\n`System altered.`\n`SQL>`\n\nYou can get the SQL ID for the statement\
    \ by querying the `V$SQL` view as shown earlier in this recipe, or you can get\
    \ it through the Oracle Enterprise Manager. Once the user in the other session\
    \ completes executing the SQL statement, turn off tracing with the following command:\n\
    \n`SQL> alter system set events 'sql_trace[sql:fb2yu0p1kgvhr] off';`\n\n`System\
    \ altered.`\n\n`SQL>`\n\n#### How It Works\n\nIn Oracle Database 11g, you can\
    \ set the Oracle event `SQL_TRACE` to trace the execution of one or more SQL statements.\
    \ You can issue either an `alter session` or an `alter system` statement for tracing\
    \ a specific SQL statement. Here's the syntax of the command:\n\n`alter session/system\
    \ set events ‘sql_trace [sql:<sql_id>|<sql_id>] … event specification‘;`\n\nEven\
    \ if you execute multiple SQL statements before you turn the tracing off, the\
    \ trace file will show just the information pertaining to the SQL_ID or SQL_IDs\
    \ you specify.\n\n### 10.3. Enabling Tracing in Your Own Session\n\n#### Problem\n\
    \nYou want to trace your own session.\n\n#### Solution\n\nNormal users can use\
    \ the `DBMS_SESSION` package to trace their sessions, as shown in this example:\n\
    \n`SQL>execute dbms_session.session_trace_enable(waits=>true, binds=> false);`\n\
    \nTo disable tracing, the user must execute the `session_trace_disable` procedure,\
    \ as shown here:\n\n`SQL> execute dbms_session.session_trace_disable();`\n\n####\
    \ How It Works\n\nThe `DBMS_MONITOR` package, which Oracle recommends for all\
    \ tracing, is executable only by a user with the DBA role. If you don't have the\
    \ DBA role, you can use the `dbms_session.session_trace_enable` procedure to trace\
    \ your own session.\n\n### 10-4\\. Finding the Trace Files\n\n#### Problem\n\n\
    You'd like to find a way to easily identify your trace files."
  trans: "\n# SQL 跟踪技术\n\n## 概述与工作原理\n\n### 如何工作\n在追踪任何 SQL 会话之前，请确保已将 `timed_statistics`\
    \ 初始化参数设置为 `true`。如果此参数的值为 `false`，SQL 跟踪将被禁用。将 `timed_statistics` 参数设置为 `true`\
    \ 可使数据库收集 CPU 和耗时等统计信息，并将其存储在各种动态性能表中。从 Oracle 11.1.0.7.0 版本开始，此参数的默认值取决于初始化参数\
    \ `statistics_level` 的值。如果将 `statistics_level` 参数设置为 `basic`，则 `timed_statistics`\
    \ 参数的默认值为 `false`。如果将 `statistics_level` 设置为 `typical` 或 `all`，则 `timed_statistics`\
    \ 参数的默认值为 `true`。`timed_statistics` 参数是动态的，这意味着您无需重启数据库即可将其打开——您可以在整个数据库上开启此参数而不会产生显著开销。您也可以仅为单个会话开启此参数。\n\
    \n当您追踪一个 SQL 会话时，Oracle 会生成一个跟踪文件，其中包含对排查 SQL 性能问题非常有用的诊断数据。从 Oracle Database\
    \ 11g 开始，数据库将所有诊断文件存储在一个专用的诊断目录中，该目录通过 `diagnostic_dest` 初始化参数指定。诊断目录的结构如下：\n\n\
    ```\n<diagnostic_dest>/diag/rdbms/<dbname>/<instance>\n```\n\n该诊断目录称为 ADR 主目录。如果您的数据库名称是\
    \ `prod1`，实例名称也是 `prod1`，那么 ADR 主目录将是：\n\n```\n<diagnostic_dest>/diag/rdbms/prod1/prod1\n\
    ```\n\nADR 主目录在 `<ADR Home>/trace` 子目录中包含跟踪文件。跟踪文件通常以 `.trc` 为扩展名。您会注意到，多个跟踪文件有一个对应的跟踪映射文件，扩展名为\
    \ `.trm`。`.trm` 文件包含有关跟踪文件的结构信息，数据库使用这些信息进行搜索和导航。您可以使用以下命令查看数据库的诊断目录设置：\n\n```\n\
    SQL> sho parameter diagnostic_dest\n\nNAME                                 TYPE\
    \        VALUE\n------------------------------------ ----------- ------------------------------\n\
    diagnostic_dest                      string      C:\\APP\\ORA\nSQL>\n```\n\n`V$DIAG_INFO`\
    \ 视图显示了各个诊断目录的位置，包括跟踪目录，该目录在视图中以 Diag Trace 名称列出。尽管 Oracle Database 11g 中的新数据库可诊断性基础设施忽略了\
    \ `user_dump_dest` 初始化参数，但该参数仍然存在，并且指向与 `$ADR_BASE\\diag\\rdbms\\<database>\\\
    <instance>\\trace` 目录相同的目录，如以下命令所示：\n\n```\nSQL> show parameter user_dump_dest\n\
    \nNAME                                 TYPE        VALUE\n------------------------------------\
    \ ----------- ------------------------------\nuser_dump_dest                 \
    \      string      c:\\app\\ora\\diag\\rdbms\\orcl1\\or\n                    \
    \                             cl1\\trace\nSQL>\n```\n\n在 Oracle Database 11g 中，您无需设置\
    \ `max_dump_file_size` 参数来指定跟踪文件的最大大小。\n\n## 追踪特定 SQL 语句\n\n### 问题\n您想要追踪特定的 SQL\
    \ 语句，以查明数据库在执行该语句期间将时间花费在了哪里。\n\n### 解决方案\n在 Oracle 11.1 或更高版本中，您可以使用增强的 SQL 跟踪接口来追踪一条或多条\
    \ SQL 语句。以下是对一组 SQL 语句进行追踪的步骤。\n\n1.  执行 `alter session set events` 语句以设置追踪，如下所示：\n\
    \    ```\n    SQL> alter session set events 'sql_trace level 12';\n    Session\
    \ altered.\n    SQL>\n    ```\n2.  执行 SQL 语句：\n    ```\n    SQL> select count(*)\
    \ from sales;\n    ```\n3.  关闭追踪：\n    ```\n    SQL> alter session set events\
    \ 'sql_trace off';\n    Session altered.\n    SQL>\n    ```\n\n您可以通过在 `alter session\
    \ set events` 语句中指定 SQL 语句的 SQL ID 来选择追踪特定的 SQL 语句。步骤如下：\n\n1.  通过执行以下语句找到 SQL\
    \ 语句的 SQL ID：\n    ```\n    SQL> select sql_id,sql_text\n      2  from v$sql\n\
    \      3  where sql_text='select sum(quantity_sold) from sales';\n\n    SQL_ID\
    \                       SQL_TEXT\n---------------------------- ------------------------------------\n\
    \    fb2yu0p1kgvhr                select sum(quantity_sold) from sales\n\n   \
    \ SQL>\n    ```\n2.  为您检索到的 SQL ID 对应的特定 SQL 语句开启追踪：\n    ```\n    SQL> alter\
    \ session set events 'sql_trace [sql:fb2yu0p1kgvhr] level 12';\n    Session altered.\n\
    \    SQL>\n    ```\n3.  执行 SQL 语句：\n    ```\n    SQL> select sum(quantity_sold)\
    \ from sales;\n\n    SUM(QUANTITY_SOLD)\n    ------------------\n            \
    \    918843\n    ```\n4.  关闭追踪：\n    ```\n    SQL> alter session set events 'sql_trace[sql:fb2yu0p1kgvhr]\
    \ off';\n    Session altered.\n    SQL>\n    ```\n\n您可以通过用管道符 (`|`) 分隔 SQL ID\
    \ 来追踪多条 SQL 语句，如下所示：\n\n```\nSQL> alter session set events ‘sql_trace [sql: fb2yu0p1kgvhr|4v433su9vvzsw]‘;\n\
    ```\n\n您可以通过执行 `alter system set events` 语句来追踪在另一个会话中运行的特定 SQL 语句：\n\n```\nSQL>\
    \ alter system set events 'sql_trace[sql:fb2yu0p1kgvhr] level 12';\nSystem altered.\n\
    SQL>\n```\n\n您可以通过查询 `V$SQL` 视图（如本配方前面所示）来获取该语句的 SQL ID，也可以通过 Oracle Enterprise\
    \ Manager 获取。一旦另一个会话中的用户完成执行 SQL 语句，请使用以下命令关闭追踪：\n\n```\nSQL> alter system set\
    \ events 'sql_trace[sql:fb2yu0p1kgvhr] off';\nSystem altered.\nSQL>\n```\n\n###\
    \ 如何工作\n在 Oracle Database 11g 中，您可以设置 Oracle 事件 `SQL_TRACE` 来追踪一条或多条 SQL 语句的执行。您可以执行\
    \ `alter session` 或 `alter system` 语句来追踪特定的 SQL 语句。命令语法如下：\n\n```\nalter session/system\
    \ set events ‘sql_trace [sql:<sql_id>|<sql_id>] … event specification‘;\n```\n\
    \n即使您在关闭追踪之前执行了多条 SQL 语句，跟踪文件也只会显示与您指定的 SQL_ID 或 SQL_ID 相关的信息。\n\n## 在自己的会话中启用追踪\n\
    \n### 问题\n您想要追踪您自己的会话。\n\n### 解决方案\n普通用户可以使用 `DBMS_SESSION` 包来追踪其会话，如下例所示：\n\n\
    ```\nSQL>execute dbms_session.session_trace_enable(waits=>true, binds=> false);\n\
    ```\n\n要禁用追踪，用户必须执行 `session_trace_disable` 过程，如下所示：\n\n```\nSQL> execute dbms_session.session_trace_disable();\n\
    ```\n\n### 如何工作\nOracle 推荐用于所有追踪的 `DBMS_MONITOR` 包只能由具有 DBA 角色的用户执行。如果您没有 DBA\
    \ 角色，可以使用 `dbms_session.session_trace_enable` 过程来追踪您自己的会话。\n\n## 查找跟踪文件\n\n###\
    \ 问题\n您希望找到一种轻松识别您的跟踪文件的方法。\n"
- fmt: "#### Solution\n\nIssue the following statement to set an identifier for your\
    \ trace files, before you start generating the trace:\n\n`SQL> alter session set\
    \ tracefile_identifier='MyTune1';`\n\nTo view the most recent trace files the\
    \ database has created, in Oracle Database 11.1 and newer releases, you can query\
    \ the Automatic Diagnostic Repository (ADR) by executing the following command\
    \ (see [Chapter 5](#Chapter05.html#ch5) for details on the `adrci` utility):\n\
    \n```\nadrci> show tracefile -t\n08-MAY-11 19:01:48  diag\\rdbms\\orcl1\\orcl1\\\
    trace\\orcl1_p000_8652_MyTune1.trc\n08-MAY-11 19:01:48  diag\\rdbms\\orcl1\\orcl1\\\
    trace\\orcl1_p001_6424_MyTune1.trc\n08-MAY-11 19:01:48  diag\\rdbms\\orcl1\\orcl1\\\
    trace\\orcl1_p002_5980_MyTune1.trc\nadrci>\n```\n\nTo find out the path to your\
    \ current session's trace file, issue the following command:\n\n```\nSQL>  select\
    \ value from v$diag_info\n      where name = 'Default Trace File';\n\nVALUE\n\
    -----------------------------------------------------------------------\n\nc:\\\
    app\\ora\\diag\\rdbms\\orcl1\\orcl1\\trace\\orcl1_ora_11248_My_Tune1.trc\n\nSQL>\n\
    ```\n\nTo find all trace files for the current instance, issue the following query:\n\
    \n`SQL> select value from v$diag_info where name = 'Diag Trace'`\n\n#### How It\
    \ Works\n\nOften, it's hard to find the exact trace file you're looking for, because\
    \ there may be a bunch of other trace files in the trace directory, all with similar-looking\
    \ file names. A best practice during SQL tracing is to associate your trace files\
    \ with a unique identifier. Setting an identifier for the trace files you're going\
    \ to generate makes it easy to identify the SQL trace files from among the many\
    \ trace files the database generates in the trace directory.\n\nYou can confirm\
    \ the value of the trace identifier with the following command:\n\n```\nSQL> sho\
    \ parameter tracefile_identifier\nNAME                                 TYPE  \
    \      VALUE\n------------------------------------ ----------- ---------------\n\
    tracefile_identifier                 string      MyTune1\nSQL>\n```\n\nThe column\
    \ `TRACEID` in the `V$PROCESS` view shows the current value of the `tracefile_identifier`\
    \ parameter as well. The trace file identifier you set becomes part of the trace\
    \ file name, making it easy to pick the correct file name for a trace from among\
    \ a large number of trace files in the trace directory. You can modify the value\
    \ of the `tracefile_identifier` parameter multiple times for a session. The trace\
    \ file names for a process will contain information to indicate that they all\
    \ belong to the same process.\n\nOnce you set the `tracefile_identifier` parameter,\
    \ the trace files will have the following format, where `sid` is the Oracle SID,\
    \ `pid` is the process ID, and `traceid` is the value you've set for the `tracefile_identifier`\
    \ initialization parameter.\n\n`sid_ora_pid_traceid.trc`\n\n### 10-5. Examining\
    \ a Raw SQL Trace File\n\n#### Problem\n\nYou want to examine a raw SQL trace\
    \ file.\n\n#### Solution\n\nOpen the trace file in a text editor to inspect the\
    \ tracing information. Here are portions of a raw SQL trace generated by executing\
    \ the `dbms_monitor.session_trace_enable` procedure:\n\n```\nPARSING IN CURSOR\
    \ #3 len=490 dep=1 uid=85 oct=3 lid=85 tim=269523043683 hv=672110367 ad='7ff18986250'\
    \ sqlid='bqasjasn0z5sz'\nPARSE #3:c=0,e=647,p=0,cr=0,cu=0,mis=1,r=0,dep=1,og=1,plh=0,tim=269523043680\n\
    EXEC #3:c=0,e=1749,p=0,cr=0,cu=0,mis=1,r=0,dep=1,og=1,plh=3969568374,tim=269523045613\n\
    WAIT #3: nam='Disk file operations I/O' ela= 15833 FileOperation=2 fileno=4 filetype=2\
    \ obj#=-1 tim=269523061555\nFETCH #3:c=0,e=19196,p=0,cr=46,cu=0,mis=0,r=1,dep=1,og=1,plh=3969568374,tim=269523064866\n\
    STAT #3 id=3 cnt=12 pid=2 pos=1 obj=0 op='HASH GROUP BY (cr=46 pr=0 pw=0 time=11\
    \ us cost=4 size=5317 card=409)'\nSTAT #3 id=4 cnt=3424 pid=3 pos=1 obj=89079\
    \ op='TABLE ACCESS  FULL DEPT (cr=16 pr=0 pw=0 time=246 us cost=3 size=4251 card=327)'\n\
    ```\n\nAs you can see from this excerpt of the raw trace file, you can glean useful\
    \ information, such as parse misses, waits, and the execution plan of the SQL\
    \ statement.\n\n#### How It Works\n\nThe usual practice after getting a session\
    \ trace file is to analyze it using a tool such as `TKPROF`. However, you can\
    \ examine a trace file by visually reading the trace output. The raw trace files\
    \ capture information for each of the following three steps of SQL statement processing:\n\
    \n`Parse`: During this stage, the database converts the SQL statement into an\
    \ execution plan, and checks for authorization and the existence of tables and\
    \ other objects.\n\n`Execute`: The database executes the SQL statement during\
    \ this phase. For a `SELECT` statement, the execute phase identifies the rows\
    \ the database must retrieve. The database modifies the data for DML statements\
    \ such as insert, update, and delete.\n\n`Fetch:` This step applies only for a\
    \ `SELECT` statement. During this phase, the database retrieves the selected rows.\n\
    \nA SQL trace file will contain detailed statistics for each of the three phases\
    \ of execution, in addition to wait event information. You usually format the\
    \ raw trace files with a utility such as `TKPROF`. However, there are times when\
    \ a raw trace file can show you useful information very quickly, by a simple scroll\
    \ through the file. A locking situation is a good example where you can visually\
    \ inspect a raw trace file. `TKPROF` doesn't provide you details about latches\
    \ and locks (enqueues). If you suspect that a query was waiting on a lock, digging\
    \ deep into a raw trace file shows you exactly where and why a query was waiting.\
    \ In the `WAIT` line, the elapsed time (`ela`) shows the amount of time waited\
    \ (in microseconds). In our example, elapsed wait time for “Disk file operations\
    \ I/O” is 15,833 microseconds. Since 1 second=1,000,000 microseconds, this is\
    \ not a significant wait time. The raw trace file clearly shows if an I/O wait\
    \ event, as is true in this case, or another type of wait event held up the query.\
    \ If the query was waiting on a lock, you'll see something similar to the following:\
    \ `WAIT #2: nam='enqueue ela-300…. `\n\nWe've purposefully kept the discussion\
    \ short in this recipe, because tools such as `TKPROF` and the Oracle Trace Analyzer\
    \ provide you sophisticated diagnostic information by profiling the raw trace\
    \ files.\n\n### 10-6. Analyzing Oracle Trace Files\n\n#### Problem\n\nYou want\
    \ to know how to analyze an Oracle trace file.\n\n#### Solution\n\nThere are multiple\
    \ ways to interpret a SQL trace file. Here are the different approaches:\n\n*\
    \   Read the raw SQL trace file in a text editor.\n*   Use the Oracle-provided\
    \ `TKPROF` (Trace Kernel Profiler) utility.\n*   Use Oracle Trace Analyzer, a\
    \ free product you can download from Oracle Support.\n*   Use third-party tools."
  raw: "#### Solution\n\nIssue the following statement to set an identifier for your\
    \ trace files, before you start generating the trace:\n\n`SQL> alter session set\
    \ tracefile_identifier='MyTune1';`\n\nTo view the most recent trace files the\
    \ database has created, in Oracle Database 11.1 and newer releases, you can query\
    \ the Automatic Diagnostic Repository (ADR) by executing the following command\
    \ (see [Chapter 5](#Chapter05.html#ch5) for details on the `adrci` utility):\n\
    \n`adrci> show tracefile -t`\n`08-MAY-11 19:01:48  diag\\rdbms\\orcl1\\orcl1\\\
    trace\\orcl1_p000_8652_MyTune1.trc`\n`08-MAY-11 19:01:48  diag\\rdbms\\orcl1\\\
    orcl1\\trace\\orcl1_p001_6424_MyTune1.trc`\n`08-MAY-11 19:01:48  diag\\rdbms\\\
    orcl1\\orcl1\\trace\\orcl1_p002_5980_MyTune1.trc`\n`adrci>`\n\nTo find out the\
    \ path to your current session's trace file, issue the following command:\n\n\
    `SQL>  select value from v$diag_info`\n`      where name = 'Default Trace File';`\n\
    \n`VALUE`\n`-----------------------------------------------------------------------`\n\
    \n`c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\trace\\orcl1_ora_11248_My_Tune1.trc`\n\
    \n`SQL>`\n\nTo find all trace files for the current instance, issue the following\
    \ query:\n\n`SQL> select value from v$diag_info where name = 'Diag Trace'`\n\n\
    #### How It Works\n\nOften, it's hard to find the exact trace file you're looking\
    \ for, because there may be a bunch of other trace files in the trace directory,\
    \ all with similar-looking file names. A best practice during SQL tracing is to\
