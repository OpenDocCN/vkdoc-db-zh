    #### How It Works


    The process described in the “Solution” section of this recipe allows you to quickly
    identify resource-intensive processes, then map the OS process to a database process,
    and subsequently map the database process to a SQL statement. Once you know which
    SQL statement is consuming resources, then you can generate an execution plan
    to further attempt to determine any possible inefficiencies.


    Sometimes the resource-consuming process will not be associated with a database.
    In these scenarios, you''ll have to work with your SA to determine what the process
    is and if it can be tuned or terminated.


    Also, you may encounter resource-intensive processes that are database-specific
    but not associated with a SQL statement. For example, you might have a long-running
    RMAN backup process, Data Pump, or PL/SQL jobs running. In these cases, work with
    your DBA to identify whether these types of processes can be tuned or killed.


    **ORADEBUG**


    You can use Oracle''s `oradebug` utility to display top consuming SQL statements
    if you know the operating system ID. For example, suppose that you have used a
    utility such as `top` or `ps` to identify a high CPU-consuming operating system
    process, and from the name of the process you determine it''s a database process.
    Now log in to SQL*Plus and use `oradebug` to display any SQL associated with the
    process. In this example, the OS process ID is 7853:


    `SQL> oradebug setospid 7853;`

    `Oracle pid: 18, Unix process pid: 7853, image: oracle@xengdb (TNS V1-V3)`


    Now show the SQL associated with this process (if any):


    `SQL> oradebug current_sql;`


    If there is a SQL statement associated with the process, it will be displayed—for
    example:


    `select`

    ` a.table_name`

    `from dba_tables a, dba_indexes b, .....`


    The `oradebug` utility can be used in a variety of methods to help troubleshoot
    performance issues. You can display the name of the trace file associated with
    the session by issuing the following:


    `SQL> oradebug tracefile_name;`


    Use `oradebug help` to display all options available.


    ### 6-10. Terminating a Resource-Intensive Process


    #### Problem


    You have identified a process that is consuming inordinate amounts of system resources
    (see Recipe 6-9) and determined that it''s a runaway SQL statement that needs
    to be killed.


    #### Solution


    There are three basic ways to terminate a SQL process:


    *   If you have access to the terminal where the SQL statement is running, you
    can press Ctrl+C and attempt to halt the process.

    *   Determine the session ID and serial number, and then use the SQL `ALTER SYSTEM
    KILL SESSION` statement.

    *   Determine the operating system process ID, and use the `kill` utility to stop
    the process.


    If you happen to have access to the terminal from which the resource-consuming
    SQL statement is running, you can attempt to press Ctrl+C to terminate the process.
    Oftentimes you don''t have access to the terminal and will have to use a SQL statement
    or an operating system command to terminate the process.


    ##### Using SQL to Kill a Session


    If it''s an Oracle process and you have identified the `SID` and `SERIAL#` (see
    Recipe 6-9), you can terminate a process from within SQL*Plus. Here is the general
    syntax:


    `alter system kill session ''integer1, integer2 [,integer3]'' [immediate];`


    In the prior syntax statement, `integer1` is the value of the `SID` column and
    `integer2` is the value from the `SERIAL#` column (of `V$SESSION`). In a RAC environment,
    you can optionally specify the value of the instance ID for `integer3`. The instance
    ID can be retrieved from the `GV$SESSION` view.


    Here''s an example that terminates a process with a `SID` of 1177 and a `SERIAL#`
    of 38583:


    `SQL> alter system kill session ''1177,38583'';`


    If successful, you should see this output:


    `System altered.`


    When you kill a session, this will mark the session as terminated, roll back active
    transactions (within the session), and release any locks (held by the session).
    The session will stay in a terminated state until any dependent transactions are
    rolled back. If it takes a minute or more to roll back the transaction, Oracle
    reports the session as “marked to be terminated” and returns control to the SQL
    prompt. If you specify `IMMEDIATE` (optional), Oracle will roll back any active
    transactions and immediately return control back to you.


    ##### Using the OS Kill Command


    If you have access to the database server and access to an operating system account
    that has privileges to terminate an Oracle process (such as the `oracle` OS account),
    you can also terminate a process directly with the `kill` command.


    For example, suppose you run the `ps` command and have done the associated work
    to determine that you have a SQL statement that has been running for hours and
    needs to be terminated. The `kill` command directly terminates the operating system
    process. In this example, the process ID of 6254 is terminated:


    `$ kill -9 6254`


    ![images](images/square.jpg) **Caution**   Ensure that you don''t kill the wrong
    Oracle process. If you accidentally kill a required Oracle background process,
    this will cause your instance to abort.


    #### How It Works


    Sometimes you''ll find yourself in a situation where you need to kill hung SQL
    processes, database jobs, or SQL statements that are consuming inordinate amounts
    of resources. For example, you may have a test server where a job has been running
    for several hours, is consuming much of the server resources, and needs to be
    stopped so that other jobs can continue to process in a timely manner.


    Manually killing a SQL statement will cause the transaction to be rolled back.
    Therefore take care when doing this. Ensure that you are killing the correct process.
    If you erroneously terminate a critical process, this obviously will have an adverse
    impact on the application and associated data.


    ## C H A P T E R  7'
