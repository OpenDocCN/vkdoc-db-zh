    and evolving plan baselines.


    ### 12-8. Creating a Plan Baseline for One SQL Statement


    #### Problem


    You want to create a plan baseline for a specific SQL statement that you''re currently
    executing.


    #### Solution


    The procedure for manually associating a plan baseline with a SQL statement is
    as follows:


    1.  Identify the SQL statement(s) for which you want plan baselines.

    2.  Provide an identifier such as the `SQL_ID` as input to the `DBMS_SPM` package
    to create a plan baseline for the SQL statement.


    For example, suppose you have a SQL statement you''ve been working with such as
    the following:


    `SQL> select emp_id from emp where emp_id = 100;`


    Now query the `V$SQL` view to determine the `SQL_ID` for the query:


    `select`

    ` sql_id`

    `,sql_text`

    `from v$sql`

    `where sql_text`

    `  like ''select emp_id from emp where emp_id = 100'';`


    Here is a snippet of the output:


    `SQL_ID        SQL_TEXT`

    `------------- ------------------------------------------------------------`

    `0qgmjf9krq285 select emp_id from emp where emp_id = 100`


    Now that the `SQL_ID` has been identified, use it as input to the `DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE`
    function to create a plan baseline for the given query—for example:


    `DECLARE`

    `  plan1 PLS_INTEGER;`

    `BEGIN`

    `  plan1 := DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE(sql_id => ''0qgmjf9krq285'');`

    `END;`

    `/`


    The query now should have an entry in the `DBA_SQL_PLAN_BASELINES` view showing
    that it has an enabled plan baseline associated with it—for example:


    `SQL> select sql_handle, plan_name, sql_text from dba_sql_plan_baselines;`


    Here''s a small snippet of the output:


    `SQL_HANDLE                PLAN_NAME                                SQL_TEXT`

    `------------------------- ---------------------------------------- ----------------------`

    `SQL_f34ef255797c4713      SQL_PLAN_g6mrkapwrsjsmd8a279cc           select emp_id.....`


    #### How It Works


    The “Solution” section described how to identify a single SQL statement for which
    you want to create a plan baseline (based on the `SQL_ID`) using a query in the
    cursor cache. There are many methods for creating a plan baseline for a query,
    such as using the SQL text, schema, module, and so on. For example, next a plan
    baseline is loaded based on a partial SQL string:


    `DECLARE`

    `  plan1 PLS_INTEGER;`

    `BEGIN`

    `  plan1 := DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE(`

    `             attribute_name => ''sql_text''`

    `            ,attribute_value => ''select emp_id from emp%'');`

    `END;`

    `/`


    See [Table 12-5](#Chapter12.html#tab_12_5) for details on input parameters available
    with the `DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE` function.


    ![images](images/square.jpg) **Note** See Recipe 12-9 for an example of how to
    create plan baselines for SQL statements contained in a SQL tuning set.


    ![images](images/t1205.jpg)


    ### 12-9. Creating Plan Baselines for SQL Contained in SQL Tuning Set


    #### Problem


    You have the following scenario:


    *   You''re upgrading a database to a new version.

    *   You know from past experience that upgrading to newer versions of Oracle can
    sometimes cause SQL statements to perform poorly because the optimizer in the
    upgraded version of the database is choosing a less efficient (worse) execution
    plan than the optimizer from the prior version of the database.

    *   You want to ensure that SQL statements execute with acceptable performance
    after the upgrade.


    In essence, you are upgrading and would prefer that the optimizer choose the same
    execution plans both before and after the upgrade. You don''t want the upgrade
    to result in new plans that risk degrading performance.'
  trans: "### 12-8. 为单个 SQL 语句创建计划基线\n\n#### 问题\n\n您希望为当前正在执行的某个特定 SQL 语句创建一个计划基线。\n\
    \n#### 解决方案\n\n手动将计划基线与 SQL 语句关联的过程如下：\n\n1.  确定您想要为其创建计划基线的 SQL 语句。\n2.  提供一个标识符（例如\
    \ `SQL_ID`）作为 `DBMS_SPM` 包的输入，以针对该 SQL 语句创建计划基线。\n\n例如，假设您正在使用一个 SQL 语句，如下所示：\n\
    \n`SQL> select emp_id from emp where emp_id = 100;`\n\n现在查询 `V$SQL` 视图以确定该查询的\
    \ `SQL_ID`：\n\n```sql\nselect\n  sql_id\n ,sql_text\nfrom v$sql\nwhere sql_text\n\
    \    like 'select emp_id from emp where emp_id = 100';\n```\n\n以下是输出片段：\n\n```text\n\
    SQL_ID        SQL_TEXT\n------------- ------------------------------------------------------------\n\
    0qgmjf9krq285 select emp_id from emp where emp_id = 100\n```\n\n既然已经确定了 `SQL_ID`，就将其作为输入提供给\
    \ `DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE` 函数，为给定的查询创建计划基线——例如：\n\n```sql\nDECLARE\n\
    \  plan1 PLS_INTEGER;\nBEGIN\n  plan1 := DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE(sql_id\
    \ => '0qgmjf9krq285');\nEND;\n/\n```\n\n现在，该查询应该在 `DBA_SQL_PLAN_BASELINES` 视图中有一个条目，显示其已关联一个已启用的计划基线——例如：\n\
    \n`SQL> select sql_handle, plan_name, sql_text from dba_sql_plan_baselines;`\n\
    \n以下是输出的一小部分：\n\n```text\nSQL_HANDLE                PLAN_NAME                \
    \                 SQL_TEXT\n------------------------- ----------------------------------------\
    \ ----------------------\nSQL_f34ef255797c4713      SQL_PLAN_g6mrkapwrsjsmd8a279cc\
    \           select emp_id.....\n```\n\n#### 工作原理\n\n“解决方案”部分描述了如何使用游标缓存中的查询来确定单个\
    \ SQL 语句（基于 `SQL_ID`）以创建计划基线。为查询创建计划基线的方法有很多种，例如使用 SQL 文本、方案、模块等。例如，接下来基于部分 SQL\
    \ 字符串加载一个计划基线：\n\n```sql\nDECLARE\n  plan1 PLS_INTEGER;\nBEGIN\n  plan1 := DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE(\n\
    \               attribute_name => 'sql_text'\n              ,attribute_value =>\
    \ 'select emp_id from emp%');\nEND;\n/\n```\n\n有关 `DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE`\
    \ 函数可用输入参数的详细信息，请参见 `表 12-5`。\n\n**注意：** 有关如何为 SQL 调优集中包含的 SQL 语句创建计划基线的示例，请参见配方\
    \ 12-9。\n\n![images](img/t1205.jpg)\n\n### 12-9. 为 SQL 调优集中包含的 SQL 创建计划基线\n\n\
    #### 问题\n\n您面临以下情况：\n\n*   您正在将数据库升级到新版本。\n*   根据以往经验，您知道升级到更新版本的 Oracle 有时可能会导致\
    \ SQL 语句性能不佳，因为升级后的数据库优化器选择的执行计划比先前版本数据库的优化器效率更低（更差）。\n*   您希望确保升级后 SQL 语句以可接受的性能执行。\n\
    \n本质上，您正在升级，并希望优化器在升级前后选择相同的执行计划。您不希望升级导致出现可能降低性能的新计划。\n\n#### 解决方案\n\n以下是自动为执行次数超过一次的\
    \ SQL 语句创建计划基线的步骤：\n\n1.  将 `OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES` 参数设置为 `TRUE`（在会话或系统级别）。\n\
    2.  执行两次或更多次您希望捕获其计划基线的查询。\n3.  将 `OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES` 设置为 `FALSE`。\n\
    \n接下来的示例说明了使用上述步骤为查询添加计划基线的过程。首先在会话级别设置指定的初始化参数：\n\n`SQL> alter session set optimizer_capture_sql_plan_baselines=true;`\n\
    \n现在执行一个查询两次。当 `OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES` 参数设置为 `TRUE` 时，对于运行两次或更多次的查询，Oracle\
    \ 将自动为其创建计划基线：\n\n`SQL> select emp_id from emp where emp_id=3000;`\n`SQL> select\
    \ emp_id from emp where emp_id=3000;`\n\n现在将初始化参数设置回 `FALSE`。\n\n`SQL> alter session\
    \ set optimizer_capture_sql_plan_baselines=false;`\n\n现在，该查询应该在 `DBA_SQL_PLAN_BASELINES`\
    \ 视图中有一个条目，显示其已关联一个已启用的计划基线——例如：\n\n```sql\nSELECT\n  sql_handle, plan_name, enabled,\
    \ accepted,\n  created, optimizer_cost, sql_text\nFROM dba_sql_plan_baselines;\n\
    ```\n\n以下是输出的部分列表：\n\n```text\nSQL_HANDLE           PLAN_NAME                \
    \      ENA ACC...\n-------------------- ------------------------------ --- ---...\n\
    SQL_790bd425fe4a0125 SQL_PLAN_7k2yn4rz4n095d8a279cc YES YES...\n```\n\n#### 工作原理\n\
    \n启用 `OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES` 允许您自动捕获数据库中重复运行（超过一次）的查询的计划基线。“解决方案”部分描述了如何在会话级别使用此功能。您也可以设置该参数，以便为数据库中所有重复查询生成计划基线——例如：\n\
    \n`SQL> alter system set optimizer_capture_sql_plan_baselines=true;`\n\n从此时起，数据库中任何运行超过一次的查询都将自动为其创建计划基线。我们不建议在生产环境中这样做，除非您已先仔细测试了此功能并确保不会产生任何不利的副作用（因为要为每个查询存储计划基线）。但是，您可能有一个测试环境，希望有意为每个重复运行的\
    \ SQL 语句创建计划基线。\n\n**注意：** 默认情况下，`OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES` 参数为 `FALSE`。\n\
    \n您也可以从 Enterprise Manager 管理计划基线的使用。从主数据库页面，导航到“服务器”选项卡。在“查询优化器”部分，单击“SQL 计划控制”选项卡。接下来，单击“SQL\
    \ 计划基线”选项卡。您应该会看到一个类似于 `图 12-4` 的屏幕。\n\n![images](img/1204.jpg)\n\n`图 12-4. 管理计划基线`\n\
    \n从此屏幕，您可以管理诸如启用、禁用、删除和演进计划基线等任务。"
- fmt: "## 12-10. Altering a Plan Baseline\n\n### Solution\n\nTo deal with this problem,\
    \ use the most resource-intensive SQL queries in the AWR as candidates for the\
    \ creation of plan baselines. This solution uses the technique of creating an\
    \ AWR baseline. An AWR baseline is a snapshot of activity in the AWR designated\
    \ by begin/end snapshot IDs. Listed next are the steps for creating and populating\
    \ a SQL tuning set with high resource-consuming SQL statements found in an AWR\
    \ baseline and then creating plan baselines for those queries:\n\n1.  Create an\
    \ AWR baseline.\n2.  Create a SQL tuning set object.\n3.  Populate the SQL tuning\
    \ set with the queries found in the AWR baseline.\n4.  Use the tuning set as input\
    \ to `DBMS_SPM` to create a plan baseline for each query contained in the SQL\
    \ tuning set.\n\n![images](images/square.jpg) **Note** You have a great deal of\
    \ flexibility on how to populate a SQL tuning set with high resource-consuming\
    \ queries in the AWR or memory. See [Chapter 11](#Chapter11.html#ch11) for complete\
    \ details on working with SQL tuning sets.\n\n### Step 1: Create an AWR Baseline\n\
    \nThe first step is to create an AWR baseline. For example, suppose you knew you\
    \ had high-load queries running between two snapshots in your database. The following\
    \ creates an AWR baseline using two snapshot IDs:\n\n```sql\nBEGIN\n  DBMS_WORKLOAD_REPOSITORY.create_baseline\
    \ (\n    start_snap_id => 26632,\n    end_snap_id   => 26635,\n    baseline_name\
    \ => 'peak_baseline_apr15_11');\nEND;\n/\n```\n\nIf you're unsure of the available\
    \ snapshots in your database, you can run an AWR report or select the `SNAP_ID`\
    \ from `DBA_HIST_SNAPSHOTS`:\n\n```sql\nselect snap_id, begin_interval_time\n\
    from dba_hist_snapshot order by 1;\n```\n\n### Step 2: Create a SQL Tuning Set\
    \ Object\n\nNow create a SQL tuning set. This next bit of code creates a tuning\
    \ set named `test1`:\n\n```sql\nBEGIN\n  dbms_sqltune.create_sqlset(\n    sqlset_name\
    \ => 'test1'\n   ,description => 'STS from AWR');\nEND;\n/\n```\n\n### Step 3:\
    \ Populate the SQL Tuning Set with High-Resource Queries Found in AWR Baseline\n\
    \nNow the SQL tuning set (created in step 2) is populated with any queries found\
    \ within the AWR baseline (created in step 1):\n\n```sql\nDECLARE\n  base_cur\
    \ dbms_sqltune.sqlset_cursor;\nBEGIN\n  OPEN base_cur FOR\n    SELECT value(x)\n\
    \    FROM table(dbms_sqltune.select_workload_repository(\n      'peak_baseline_apr15_11',\
    \ null, null,'elapsed_time',\n      null, null, null, 15)) x;\n  --\n\n  dbms_sqltune.load_sqlset(\n\
    \    sqlset_name => 'test1',\n    populate_cursor => base_cur);\nEND;\n/\n```\n\
    \nIn the prior lines of a code, the AWR baseline name is passed to the `DBMS_SQLTUNE`\
    \ package. The queries within the baseline are select by the `elapsed time`, and\
    \ the top 15 are specified.\n\n### Step 4: Use the Tuning Set As Input to `DBMS_SPM`\
    \ to Create Plan Baselines for Each Query Contained in the SQL Tuning Set\n\n\
    Now the tuning set (populated in step 3) is provided as input to the `DBMS_SPM`\
    \ package:\n\n```sql\nDECLARE\n  test_plan1 PLS_INTEGER;\nBEGIN\n  test_plan1\
    \ := dbms_spm.load_plans_from_sqlset(\n                  sqlset_name=>'test1');\n\
    END;\n/\n```\n\nAny queries contained in the tuning set should now have entries\
    \ in the `DBA_SQL_PLAN_BASELINES` view.\n\n## How It Works\n\nThe technique shown\
    \ in the \"Solution\" section is a very powerful method for creating plan baselines\
    \ for the most resource-consuming queries running in your database. The key to\
    \ this recipe is understanding that you can use as input (to the `DBMS_SPM` package)\
    \ queries contained in a SQL tuning set. A SQL tuning set can be populated from\
    \ high resource-consuming statements found in the AWR and memory. This allows\
    \ you to easily create plan baselines for the most problematic queries.\n\nHaving\
    \ plan baselines in place for resource-intensive queries helps ensure that the\
    \ same execution plan is used after there are changes to your system, such as\
    \ a database upgrades, changes in statistics, different data sets, and so on.\n\
    \nKeep in mind that it's possible to have more than one accepted execution plan\
    \ within the plan baseline. If you have a specific plan that you want the optimizer\
    \ to always use, then consider altering the plan to a `FIXED` state. See Recipe\
    \ 12-10 for details on altering a plan baseline to a `FIXED` state.\n\n## 12-10.\
    \ Altering a Plan Baseline\n\n### Problem\n\nYou have several accepted plan baseline\
    \ execution plans for one query. You want to specifically instruct the optimizer\
    \ to give preference to one of the accepted plans.\n\n### Solution\n\nThe optimizer\
    \ will give preference to plan baselines with a `FIXED` state. Use the `DBMS_SPM`\
    \ package and `ALTER_SQL_PLAN_BASELINE` function to alter a current plan baseline\
    \ execution plan to `FIXED`. Here's an example:\n\n```sql\nDECLARE\n  pf PLS_INTEGER;\n\
    BEGIN\n  pf := dbms_spm.alter_sql_plan_baseline(\n    plan_name => 'SQL_PLAN_1wskqhvrwf8g60e23be79'\n\
    \   ,attribute_name => 'fixed'\n   ,attribute_value => 'YES');\nEND;\n/\n```\n\
    \nYou can query the `FIXED` column of `DBA_SQL_PLAN_BASELINES` to verify that\
    \ it is now baseline-neutered. Listed next is such a query:\n\n```sql\nSELECT\n\
    \  sql_handle, plan_name, enabled, accepted, fixed\nFROM dba_sql_plan_baselines;\n\
    ```\n\nHere is some sample output:\n\n```\nSQL_HANDLE           PLAN_NAME    \
    \                  ENA ACC FIX\n-------------------- ------------------------------\
    \ --- --- ---\nSQL_457bf2f82571bd38 SQL_PLAN_4ayzkz0kr3g9s90e466fd YES YES NO\n\
    SQL_790bd425fe4a0125 SQL_PLAN_7k2yn4rz4n095d8a279cc YES YES YES\n```\n\n### How\
    \ It Works\n\nYou can think of fixing a plan baseline as a way of establishing\
    \ a preference hierarchy for how the optimizer chooses a plan baseline. The optimizer\
    \ will give first priority to any accepted *and* fixed plan baselines. If none\
    \ is available, then accepted non-fixed plan baselines are considered. Execution\
    \ plans that are added to a plan baseline that already contains a fixed plan baseline\
    \ will be considered secondary (unless you add them as fixed).\n\n[Table 12-6](#Chapter12.html#tab_12_6)\
    \ describes the parameters available with `ALTER_SQL_PLAN_BASELINE`. You can specify\
    \ either the `SQL_HANDLE` or `PLAN_NAME` or both. If the `SQL_HANDLE` is `NULL`,\
    \ then a `PLAN_NAME` must be specified and vice versa.\n\n![images](images/t1206.jpg)\n\
    \nThe `ATTRIBUTE_NAME` and `ATTRIBUTE_VALUE` parameters consist of a name/value\
    \ pairing that can be used to alter various attributes of a plan baseline. See\
    \ [Table 12-7](#Chapter12.html#tab_12_7) for a complete description of the possible\
    \ pairings.\n\n![images](images/square.jpg) **Tip** Use the `ENABLED` attribute\
    \ of `ALTER_SQL_PLAN_BASELINE` to either disable or re-enable a plan baseline\
    \ for use.\n\n![images](images/t1207.jpg)\n\n## 12-11. Determining If Plan Baselines\
    \ Exist\n\n### Problem\n\nYou recently implemented a plan baseline for a query.\
    \ You want to verify the configuration of a plan baseline.\n\n### Solution\n\n\
    Run the following query to view details regarding any plan baselines that have\
    \ been configured:\n\n```sql\nset pages 100\nset linesize 132\ncol sql_handle\
    \ form a20\ncol plan_name form a30\ncol sql_text form a20\ncol created form a20\n\
    --\nSELECT sql_handle, plan_name, enabled\n,accepted, created, optimizer_cost,\
    \ sql_text\nFROM dba_sql_plan_baselines;\n```\n\nThe output from the prior query\
    \ is very wide and has been modified to fit within the page width:\n\n```\nSQL_HANDLE\
    \           PLAN_NAME                      ENA ACC\n-------------------- ------------------------------\
    \ --- ---\nSQL_b98d2ae2145eec3d SQL_PLAN_bm39aw8a5xv1xae72d2f5 YES YES\nCREATED\
    \              OPTIMIZER_COST SQL_TEXT\n-------------------- -------------- --------------------\n\
    21-MAR-11 10.53.29.0              2 select last_name from custs...\n```\n\nIn\
    \ the output, there are two key columns: the `SQL_HANDLE` and `PLAN_NAME`. Each\
    \ query has an associated `SQL_HANDLE` that is an identifier for a query. Each\
    \ execution plan has a unique `PLAN_NAME`. The `PLAN_NAME` will be unique within\
    \ `DBA_SQL_PLAN_BASELINES`, whereas there could be multiple rows with the same\
    \ `SQL_HANDLE` (but different `PLAN_NAME`)."
