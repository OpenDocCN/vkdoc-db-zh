    ## 10-24. 生成自动的 Oracle 错误跟踪


    ### Problem


    你希望在发生特定的 Oracle 错误时创建自动的错误转储文件。


    ### Solution


    你可以通过在 `hanganalyze` 或 `systemstate` 命令中指定错误号来创建错误转储，以诊断数据库中的各种问题。例如，诊断死锁的原因通常很棘手。你可以要求数据库在遇到
    `ORA-00060: Deadlock detected` 错误时转储一个跟踪文件。为此，使用 `hanganalyze` 或 `systemstate`
    命令指定事件号 60：


    ```sql

    SQL> alter session set events ''60 trace name hanganalyze level 4'';


    Session altered.


    SQL> alter session set events ''60 trace name systemstate level 266'';


    Session altered.


    SQL>

    ```


    这两个命令都将在数据库下次遇到 `ORA-00060` 错误时自动转储诊断数据。你可以在 Oracle RAC 数据库中使用相同的技术。例如，你可以执行以下命令来生成自动的
    `hanganalyze` 转储：


    ```sql

    SQL>alter session set events ''60 trace name hanganalyze_global level 4'';

    ```


    此 `alter session` 语句会在数据库遇到 `ORA-00060` 错误的任何实例中调用 `hanganalyze` 命令。


    ### How It Works


    为错误设置事件号将确保当指定错误下次发生时，Oracle 会自动为你转储错误信息。当你要诊断一个偶尔发生的错误，并且获取当前的 `systemstate`
    转储或 `hanganalyze` 转储没有帮助时，这就非常方便。某些事件（如死锁）具有文本别名，在这种情况下，你可以指定别名而不是错误号。对于 `ORA-00060`
    错误，文本别名是 `deadlock`，因此你可以执行以下命令来跟踪该错误：


    ```sql

    SQL> alter session set events ''deadlock trace name systemstate level 266'';


    Session altered.


    SQL>

    ```


    同样，对于其他错误事件，你可以在可用的地方使用文本别名。


    ## 10-25. 跟踪后台进程


    ### Problem


    你想要跟踪一个后台进程。'
  raw: '#### How It Works


    An event 10053 trace gives you insight into the way the optimizer does its job
    in selecting the optimal execution plan for a SQL statement. For example, you
    may wonder why the optimizer didn''t use an index in a specific case—the event
    10053 trace shows you the logic used by the optimizer in skipping that index.
    The optimizer considers the available statistics for all objects in the query
    and evaluates various join orders and access paths. The event 10053 trace also
    reveals all the evaluations performed by the optimizer and how it arrived at the
    best join order and the best access path to use in executing a query.


    You can set either Level 1 or Level 2 for the event 10053 trace. Level 2 captures
    the following types of information:


    *   Column statistics

    *   Single access paths

    *   Table joins considered by the optimizer

    *   Join costs

    *   Join methods considered by the optimizer


    A Level 1 trace includes all the foregoing, plus a listing of all the default
    initialization parameters used by the optimizer. You''ll also find detailed index
    statistics used by the optimizer in determining the best execution plan. The trace
    file captures the amazing array of statistics considered by the cost optimizer,
    and explains how the CBO creates the execution plan. Here are some of the important
    things you''ll find in the CBO trace file.


    *   List of all internal optimizer-related initialization parameters

    *   Peeked values of the binds in the SQL statement

    *   Final query after optimizer transformations

    *   System statistics (`CPUSPEEDNW`, `IOTFRSPEED`, `IOSEEKTIM`, `MBRC`)

    *   Access path analysis for all objects in the query

    *   Join order evaluation


