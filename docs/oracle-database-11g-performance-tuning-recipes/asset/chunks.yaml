    \ Space:20971520: Used Space:2761560: Reclaimable Spa\nce :18209960:\n```\n\n\
    ### 工作原理\n\n`DBMS_ADVISOR` 包用于手动指示段顾问为特定表生成建议。该包包含多个过程，用于执行诸如创建和执行任务等操作。表 1-6\
    \ 列出了与段顾问相关的过程。\n\n![images](img/t0106.jpg)\n\n段顾问可以以各种粒度调用。例如，你可以生成表空间中所有对象的建议，或特定表、索引或分区的建议。表\
    \ 1-7 列出了可以通过 `DBMS_ADVISOR.CREATE_TASK` 过程获取段顾问建议的对象类型。\n\n![images](img/t0107.jpg)\n\
    \n![images](img/t0107a.jpg)\n\n你还可以指定希望段顾问运行的最长时间。这是通过 `SET_TASK_PARAMETER` 过程控制的。该过程还控制生成的建议类型。表\
    \ 1-8 描述了此过程的有效输入。\n\n![images](img/t0108.jpg)\n\n## 1-10. 自动通过电子邮件发送段顾问输出\n\n\
    ### 问题\n\n你意识到段顾问会自动生成建议，并希望通过电子邮件自动接收段顾问输出。\n\n### 解决方案\n\n首先将显示段顾问输出的 SQL 封装在一个\
    \ shell 脚本中，例如：\n\n```bash\n#!/bin/bash\nif [ $# -ne 1 ]; then\n  echo \"Usage:\
    \ $0 SID\"\n  exit 1\nfi\n# source oracle OS variables\n. /var/opt/oracle/oraset\
    \ $1\n#\n BOX=`uname -a | awk '{print$2}'`\n#\nsqlplus -s <<EOF\nmv_maint/foo\n\
    spo $HOME/bin/log/seg.txt\nset lines 80\nset pages 100\nSELECT\n 'Segment Advice\
    \ --------------------------'|| chr(10) ||\n 'TABLESPACE_NAME  : ' || tablespace_name\
    \   || chr(10) ||\n 'SEGMENT_OWNER    : ' || segment_owner     || chr(10) ||\n\
    \ 'SEGMENT_NAME     : ' || segment_name      || chr(10) ||\n 'ALLOCATED_SPACE\
    \  : ' || allocated_space   || chr(10) ||\n 'RECLAIMABLE_SPACE: ' || reclaimable_space\
    \ || chr(10) ||\n 'RECOMMENDATIONS  : ' || recommendations   || chr(10) ||\n 'SOLUTION\
    \ 1       : ' || c1                || chr(10) ||\n 'SOLUTION 2       : ' || c2\
    \                || chr(10) ||\n 'SOLUTION 3       : ' || c3 Advice\nFROM\nTABLE(dbms_space.asa_recommendations('FALSE',\
    \ 'FALSE', 'FALSE'));\nEOF\ncat $HOME/bin/log/seg.txt | mailx -s \"Seg. rpt. on\
    \ DB: $1 $BOX\" dkuhn@oracle.com\nexit 0\n```\n\n前面的 shell 脚本可以通过 Linux/Unix 实用程序（如\
    \ `cron`）定期执行。这是一个 `cron` 条目示例：\n\n```\n# Segment Advisor report\n16 11 * * *\
    \ /orahome/oracle/bin/seg.bsh DWREP\n```\n\n这样，你就能自动接收段建议，并在问题演变成性能问题之前主动解决它们。\n\
    \n### 工作原理\n\n段顾问会定期自动生成建议。有时主动向自己发送建议会很方便。这使你可以定期审阅输出，并实施有意义的建议。\n\n“解决方案”部分中的\
    \ shell 脚本在靠近顶部的位置有一行，通过运行 `oraset` 脚本来设置操作系统变量。这是一个自定义脚本，等同于 Oracle 提供的 `oraset`\
    \ 脚本。你可以使用脚本来设置操作系统变量，或者将所需的行硬编码到脚本中。调用脚本来设置变量更灵活且易于维护，因为它允许你使用 `oratab` 文件中出现的任何数据库名称作为输入。\n\
    \n## 1-11. 重建跨多个块的行"
- fmt: "#### Problem\n\nYou have a table in which individual rows are stored in more\
    \ than one block. That situation leads to higher rates of I/O, and causes queries\
    \ against the table to run slowly. You want to rebuild the spanned rows such that\
    \ each row fits into a single block.\n\nFor example, you're running the following\
    \ query, which displays Segment Advisor advice:\n\n```\nSELECT\n 'Task Name  \
    \      : ' || f.task_name  || chr(10) ||\n 'Segment Name     : ' || o.attr2  \
    \    || chr(10) ||\n 'Segment Type     : ' || o.type       || chr(10) ||\n 'Partition\
    \ Name   : ' || o.attr3      || chr(10) ||\n 'Message          : ' || f.message\
    \    || chr(10) ||\n 'More Info        : ' || f.more_info TASK_ADVICE\nFROM dba_advisor_findings\
    \ f\n    ,dba_advisor_objects  o\nWHERE o.task_id   = f.task_id\nAND   o.object_id\
    \ = f.object_id\nORDER BY f.task_name;\n```\n\nHere is the output for this example:\n\
    \n```\nTASK_ADVICE\n--------------------------------------------------------------------------------\n\
    Task Name        : EMP Advice\nSegment Name     : EMP\nSegment Type     : TABLE\n\
    Partition Name   :\nMessage          : The object has chained rows that can be\
    \ removed by re-org.\nMore Info        : 47 percent chained rows can be removed\
    \ by re-org.\n```\n\nFrom the prior output, the `EMP` table has a large percentage\
    \ of rows affected by row chaining and is causing performance issues when retrieving\
    \ data from the table. You want to eliminate the chained rows within the table.\n\
    \n#### Solution\n\nOne method for resolving the row chaining within a table is\
    \ to use the `MOVE` statement. When you move a table, Oracle requires an exclusive\
    \ lock on the table; therefore you should perform this operation when there are\
    \ no active transactions associated with the table being moved.\n\nAlso, as part\
    \ of a `MOVE` operation, all of the rows are assigned a new `ROWID`. This will\
    \ invalidate any indexes that are associated with the table. Therefore, as part\
    \ of the move operation, you should rebuild all indexes associated with the table\
    \ being moved. This example moves the `EMP` table:\n\n```\nSQL> alter table emp\
    \ move;\n```\n\nAfter the move operation completes, then rebuild any indexes associated\
    \ with the table being moved. You can verify the status of the indexes by interrogating\
    \ the `DBA/ALL/USER_INDEXES` view:\n\n```\nselect\n owner\n,index_name\n,status\n\
    from dba_indexes\nwhere table_name='EMP';\n```\n\nHere is some sample output:\n\
    \n```\nOWNER                          INDEX_NAME                     STATUS\n\
    ------------------------------ ------------------------------ --------\nMV_MAINT\
    \                       EMP_PK                         UNUSABLE\n```\n\nRebuilding\
    \ the index will make it usable again:\n\n```\nSQL> alter index emp_pk rebuild;\n\
    ```\n\nYou can now manually generate Segment Advisor advice (see Recipe 1-9) for\
    \ the segment and run the query listed in the “Problem” section of this recipe\
    \ to see if the row chaining has been resolved."
