- fmt: "## Solution\n\n使用`awrddrpt.sql`脚本（位于`$ORACLE_HOME/rdbms/admin`目录）生成一个AWR比较时段报告，以比较两个时段之间的性能。步骤如下。\n\
    \n1.  调用`awrddrpt.sql`脚本。`SQL> @$ORACLE_HOME/rdbms/admin/awrddrpt.sql`\n2.  选择报告类型（默认为文本）。`Enter\
    \ value for report_type: html`\n    `Type Specified:   html`\n3.  指定要从中选择第一个时段起始和结束快照的快照天数。`Specify\
    \ the number of days of snapshots to choose from`\n    `Enter value for num_days:\
    \ 4`\n4.  选择要分析第一个时段性能的一对快照。`Specify the First Pair of Begin and End Snapshot\
    \ Ids`\n    `~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`\n    `Enter\
    \ value for begin_snap: 2092`\n    `First Begin Snapshot Id specified: 2092`\n\
    \n    `Enter value for end_snap: 2093`\n    `First End   Snapshot Id specified:\
    \ 2093`\n5.  选择要从中选择第二个时段快照对的天数。输入值4，以便从过去4天中选择一对快照。`Specify the number of days\
    \ of snapshots to choose from`\n    `Enter value for num_days: 4`\n6.  指定第二个时段的起始和结束快照。`Specify\
    \ the Second Pair of Begin and End Snapshot Ids`\n    `~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`\n\
    \    `Enter value for begin_snap2: 2134`\n    `Second Begin Snapshot Id specified:\
    \ 2134`\n\n    `Enter value for end_snap2: 2135`\n    `Second End   Snapshot Id\
    \ specified: 2135`\n7.  指定报告名称或接受默认名称。`Specify the Report Name`\n    `~~~~~~~~~~~~~~~~~~~~~~~`\n\
    \    `The default report file name is awrdiff_1_2092_1_2134.html  To use this\
    \ name,`\n    `press <return> to continue, otherwise enter an alternative.`\n\n\
    \    `Enter value for report_name:`\n    `Using the report name awrdiff_1_2092_1_2134.html`\n\
    \    `Report written to awrdiff_1_2092_1_2134.html`\n    `SQL>`\n\n## How It Works\n\
    \n生成AWR比较时段报告的过程与生成普通AWR报告的过程非常相似。最大的区别在于，该报告不显示两个快照之间发生的情况，而普通AWR报告会显示。AWR比较时段报告比较两个不同时间段的性能，每个时间段涉及不同的一对快照。如果你想比较数据库今天上午9点到10点与三天前同一时间段的性能，可以使用AWR比较时段报告来完成。你可以在一个或所有RAC数据库实例上运行AWR比较时段报告。\n\
    \nAWR比较时段报告的组织结构与普通AWR报告类似，但它并排显示两个时段的每个性能统计信息，因此你可以快速看到性能上的差异（或相似之处）。以下是报告中的一个部分，展示了如何轻松查看第一个和第二个时段之间性能统计信息的差异。\n\
    \n```\n                                     First                Second      \
    \  Diff\n                              ---------------       --------------- \
    \     ------\n % Blocks changed per Read:                 61.48              \
    \   15.44      -46.04\n           Recursive Call %:                 98.03    \
    \             97.44       -0.59\nRollback per transaction %:                 \
    \ 0.00                  0.00        0.00\n              Rows per Sort:       \
    \           2.51                  2.07       -0.44\nAvg DB time per Call (sec):\
    \                  1.01                  0.03       -0.98\n```\n\n## 7-17. Analyzing\
    \ an AWR Report\n\n### Problem\n\n你已经生成了一份覆盖数据库出现性能问题时段的AWR报告。你想要分析这份报告。\n\n###\
    \ Solution\n\nAWR报告在其各个部分下总结了与性能相关的统计信息。以下是对AWR报告中最重要的部分的简要总结。\n\n#### Session\
    \ Information\n\n你可以从AWR报告最顶部的部分了解会话数量，如下所示：\n\n```\nSnap Id      Snap Time  \
    \    Sessions Curs/Sess\n            --------- ------------------- -------- ---------\n\
    Begin Snap:      1878 17-Apr-11 07:47:33        38       1.7\n  End Snap:    \
    \  1879 17-Apr-11 09:00:48        34       3.7\n   Elapsed:               73.25\
    \ (mins)\n   DB Time:               33.87 (mins)\n```\n\n务必检查“Begin Snap”和“End\
    \ Snap”时间，以确认该时段涵盖了性能问题发生的时间。如果你注意到会话数量非常多，可以调查是否正在创建影子进程——例如，如果在你预期两个时间点的会话数应该相同的情况下，会话数在“Begin\
    \ Snap”和“End Snap”时间之间增加了200，最可能的原因是应用程序启动问题，因为它正在生成所有这些会话。\n\n#### Load Profile\n\
    \n“Load Profile”部分显示了各项数据库负载指标（如硬解析和事务数）的每秒和每事务统计信息。\n\n```\nLoad Profile    \
    \          Per Second    Per Transaction\n~~~~~~~~~~~~          ---------------\
    \    ---------------\n      DB Time(s):                0.5                1.4\n\
    \       DB CPU(s):                0.1                0.3\n       Redo size:  \
    \          6,165.3           19,028.7\n   Logical reads:              876.6  \
    \          2,705.6\n   Block changes:               99.2              306.0\n\
    \  Physical reads:               10.3               31.8\n  Physical writes: \
    \              1.9                5.9\n      User calls:                3.4  \
    \             10.4\n          Parses:               10.2               31.5\n\
    \      Hard parses:                1.0                3.0\n          Logons: \
    \               0.1                0.2\n    Transactions:                0.3\n\
    ```\n\n“Load Profile”部分是AWR报告中最重要的部分之一。物理I/O速率和硬解析尤为重要。在高效运行的数据库中，你应该看到主要是软解析，硬解析非常少。高硬解析率通常是未使用绑定变量的结果。如果你看到每秒登录数很高，通常意味着你的应用程序未使用持久连接。登录数过多或异常高的事务数告诉你数据库中正在发生一些异常情况。然而，只有当你定期检查AWR报告并了解各种统计信息在数据库正常运行时、一天中不同时间的表现，你才知道这些数字是否异常！\n\
    \n#### Instance Efficiency Percentages\n\n实例效率部分显示了几个命中率以及“执行到解析”和“闩锁命中”百分比。\n\
    \n```\nInstance Efficiency Percentages (Target 100%)\n~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n\
    \            Buffer Nowait %:  100.00       Redo NoWait %:  100.00\n         \
    \   Buffer  Hit   %:   99.10    In-memory Sort %:  100.00\n            Library\
    \ Hit   %:   95.13        Soft Parse %:   90.35\n          Execute to Parse %:\
    \   70.71         Latch Hit %:   99.97\n  Parse CPU to Parse Elapsd %: 36.71 \
    \    % Non-Parse CPU:   83.60\n\nShared Pool Statistics        Begin    End\n\
    \                              ------  ------\n             Memory Usage %:  \
    \ 81.08   88.82\n    % SQL with executions>1:   70.41   86.92\n  % Memory for\
    \ SQL w/exec>1:   69.60   91.98\n```\n\n在运行良好的实例中，`execute to parse ratio`应该非常高。`%\
    \ SQL with exec>1`统计值低意味着数据库未重用共享SQL语句，通常是因为SQL未使用绑定变量。"
  raw: "#### Solution\n\nUse the `awrddrpt.sql` script (located in the `$ORACLE_HOME/rdbms/admin`\
    \ directory) to generate an AWR Compare Periods Report that compares performance\
    \ between two periods. Here are the steps.\n\n1.  Invoke the `awrddrpt.sql` script.\
    \ `SQL> @$ORACLE_HOME/rdbms/admin/awrddrpt.sql`\n2.  Select the report type (default\
    \ is text). `Enter value for report_type: html`\n    `Type Specified:  html`\n\
    3.  Specify the number of days of snapshots from which you want to select the\
    \ beginning and ending snapshots for the first time period. `Specify the number\
    \ of days of snapshots to choose from`\n    `Enter value for num_days: 4`\n4.\
    \  Choose a pair of snapshots over which you want to analyze the first period's\
    \ performance. `Specify the First Pair of Begin and End Snapshot Ids`\n    `~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`\n\
    \    `Enter value for begin_snap: 2092`\n    `First Begin Snapshot Id specified:\
    \ 2092`\n\n    `Enter value for end_snap: 2093`\n    `First End   Snapshot Id\
    \ specified: 2093`\n5.  Select the number of days of snapshots from which you\
    \ want to select the pair of snapshots for the second period. Enter the value\
    \ 4 so you can select a pair of snapshots from the previous 4 days. `Specify the\
    \ number of days of snapshots to choose from`\n    `Enter value for num_days:\
    \ 4`\n6.  Specify the beginning and ending snapshots for the second period. `Specify\
    \ the Second Pair of Begin and End Snapshot Ids`\n    `~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`\n\
    \    `Enter value for begin_snap2: 2134`\n    `Second Begin Snapshot Id specified:\
    \ 2134`\n\n    `Enter value for end_snap2: 2135`\n    `Second End   Snapshot Id\
    \ specified: 2135`\n7.  Specify a report name or accept the default name. `Specify\
    \ the Report Name`\n    `~~~~~~~~~~~~~~~~~~~~~~~`\n    `The default report file\
    \ name is awrdiff_1_2092_1_2134.html  To use this name,`\n    `press <return>\
    \ to continue, otherwise enter an alternative.`\n\n    `Enter value for report_name:`\n\
    \    `Using the report name awrdiff_1_2092_1_2134.html`\n    `Report written to\
    \ awrdiff_1_2092_1_2134.html`\n    `SQL>`\n\n#### How It Works\n\nGenerating an\
    \ AWR Compare Periods report is a process very similar to the one for generating\
    \ a normal AWR report. The big difference is that the report does not show what\
    \ happened between two snapshots, as the normal AWR report does. The AWR Compare\
    \ Periods report compares performance between two different time periods, with\
    \ each time period involving a different pair of snapshots. If you want to compare\
    \ the performance of your database between 9 a.m. and 10 a.m. today and the same\
    \ time period three days ago, you can do it with the AWR Compare Periods report.\
    \ You can run an AWR Compare Periods report on one or all instances of a RAC database.\n\
    \nThe AWR Compare Periods report is organized similarly to the normal AWR report,\
    \ but it shows each performance statistic for the two periods side by side, so\
    \ you can quickly see the differences (or similarities) in performance. Here's\
    \ a section of the report showing how you can easily review the differences in\
    \ performance statistics between the first and the second periods.\n\n`                                            First                Second        Diff`\n\
    `                                  ---------------       ---------------      ------`\n\
    ` % Blocks changed per Read:                 61.48                 15.44      -46.04`\n\
    `          Recursive Call %:                 98.03                 97.44       -0.59`\n\
    `Rollback per transaction %:                  0.00                  0.00        0.00`\n\
    `             Rows per Sort:                  2.51                  2.07       -0.44`\n\
    `Avg DB time per Call (sec):                  1.01                  0.03       -0.98`\n\
    \n### 7-17\\. Analyzing an AWR Report\n\n#### Problem\n\nYou've generated an AWR\
    \ report that covers a period when the database was exhibiting performance problems.\
    \ You want to analyze the report.\n\n#### Solution\n\nAn AWR report summarizes\
    \ its performance-related statistics under various sections. The following is\
    \ a quick summary of the most important sections in an AWR report.\n\n##### Session\
    \ Information\n\nYou can find out the number of sessions from the section at the\
    \ very top of the AWR report, as shown here:\n\n`Snap Id      Snap Time      Sessions\
    \ Curs/Sess`\n`            --------- ------------------- -------- ---------`\n\
    `Begin Snap:      1878 17-Apr-11 07:47:33        38       1.7`\n`  End Snap:      1879\
    \ 17-Apr-11 09:00:48        34       3.7`\n`   Elapsed:               73.25 (mins)`\n\
    `   DB Time:               33.87 (mins)`\n\nBe sure to check the Begin Snap and\
    \ End Snap times, to confirm that the period encompasses the time when the performance\
    \ problem occurred. If you notice a very high number of sessions, you can investigate\
    \ if shadow processes are being created—for example, if the number of sessions\
    \ goes up by 200 between the Begin Snap and End Snap times when you expect the\
    \ number of sessions to be the same at both times, the most likely cause is an\
    \ application startup issue, which is spawning all those sessions.\n\n##### Load\
    \ Profile\n\nThe load profile section shows the per-second and per-transaction\
    \ statistics for various indicators of database load such as hard parses and the\
    \ number of transactions.\n\n`Load Profile              Per Second    Per Transaction`\n\
    `~~~~~~~~~~~~         ---------------    ---------------`\n`      DB Time(s):                0.5                1.4`\n\
    `       DB CPU(s):                0.1                0.3`\n`       Redo size:            6,165.3           19,028.7`\n\
    `   Logical reads:              876.6            2,705.6`\n`   Block changes:               99.2              306.0`\n\
    `  Physical reads:               10.3               31.8`\n` Physical writes:                1.9                5.9`\n\
    `      User calls:                3.4               10.4`\n`          Parses:               10.2               31.5`\n\
    `     Hard parses:                1.0                3.0`\n`          Logons:                0.1                0.2`\n\
    `    Transactions:                0.3`\n\nThe Load Profile section is one of the\
    \ most important parts of an AWR report. Of particular significance are the physical\
    \ I/O rates and hard parses. In an efficiently performing database, you should\
    \ see mostly soft parses and very few hard parses. A high hard parse rate usually\
    \ is a result of not using bind variables. If you see a high per second value\
    \ for logons, it usually means that your applications aren't using persistent\
    \ connections. A high number of logons or an unusually high number of transactions\
    \ tells you something unusual is happening in your database. However, the only\
    \ way you'll know the numbers are unusual is if you regularly check the AWR reports\
    \ and know what the various statistics look like in a normally functioning database,\
    \ at various times of the day!\n\n##### Instance Efficiency Percentages\n\nThe\
    \ instance efficiency section shows several hit ratios as well as the “execute\
    \ to parse” and “latch hit” percentages.\n\n`Instance Efficiency Percentages (Target\
    \ 100%)`\n`~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`\n`            Buffer\
    \ Nowait %:  100.00       Redo NoWait %:  100.00`\n`            Buffer  Hit   %:   99.10    In-memory\
    \ Sort %:  100.00`\n`            Library Hit   %:   95.13        Soft Parse %:   90.35`\n\
    `         Execute to Parse %:   70.71         Latch Hit %:   99.97`\n`  Parse\
    \ CPU to Parse Elapsd %: 36.71     % Non-Parse CPU:   83.60`\n\n`Shared Pool Statistics        Begin    End`\n\
    `                              ------  ------`\n`             Memory Usage %:   81.08   88.82`\n\
    `    % SQL with executions>1:   70.41   86.92`\n`  % Memory for SQL w/exec>1:   69.60   91.98`\n\
    \nThe *execute to parse ratio* should be very high in a well-running instance.\
    \ A low value for the `% SQL with exec>1` statistic means that the database is\
    \ not re-using shared SQL statements, usually because the SQL is not using bind\
    \ variables."
  trans: "## 解决方案\n\n使用`awrddrpt.sql`脚本（位于`$ORACLE_HOME/rdbms/admin`目录）生成一个 AWR 比较时段报告，以比较两个时段之间的性能。步骤如下。\n\
    \n1.  调用`awrddrpt.sql`脚本。`SQL> @$ORACLE_HOME/rdbms/admin/awrddrpt.sql`\n2.  选择报告类型（默认为文本）。`输入报告类型的值:\
    \ html`\n    `指定的类型:   html`\n3.  指定要从中选择第一个时段起始和结束快照的快照天数。`指定要选择的快照天数`\n    `输入\
    \ num_days 的值: 4`\n4.  选择要分析第一个时段性能的一对快照。`指定第一对起始和结束快照 ID`\n    `~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`\n\
    \    `输入 begin_snap 的值: 2092`\n    `指定的第一开始快照 ID: 2092`\n\n    `输入 end_snap 的值:\
    \ 2093`\n    `指定的第一结束快照 ID: 2093`\n5.  选择要从中选择第二个时段快照对的天数。输入值 4，以便从过去 4 天中选择一对快照。`指定要选择的快照天数`\n\
    \    `输入 num_days 的值: 4`\n6.  指定第二个时段的起始和结束快照。`指定第二对起始和结束快照 ID`\n    `~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`\n\
    \    `输入 begin_snap2 的值: 2134`\n    `指定的第二开始快照 ID: 2134`\n\n    `输入 end_snap2\
    \ 的值: 2135`\n    `指定的第二结束快照 ID: 2135`\n7.  指定报告名称或接受默认名称。`指定报告名称`\n    `~~~~~~~~~~~~~~~~~~~~~~~`\n\
    \    `默认报告文件名为 awrdiff_1_2092_1_2134.html。要使用此名称，`\n    `按 <回车> 键继续，否则请输入替代名称。`\n\
    \n    `输入 report_name 的值:`\n    `使用报告名称 awrdiff_1_2092_1_2134.html`\n    `报告已写入\
    \ awrdiff_1_2092_1_2134.html`\n    `SQL>`\n\n## 工作原理\n\n生成 AWR 比较时段报告的过程与生成普通\
    \ AWR 报告的过程非常相似。最大的区别在于，该报告不显示两个快照之间发生的情况，而普通 AWR 报告会显示。AWR 比较时段报告比较两个不同时间段的性能，每个时间段涉及不同的一对快照。如果你想比较数据库今天上午\
    \ 9 点到 10 点与三天前同一时间段的性能，可以使用 AWR 比较时段报告来完成。你可以在一个或所有 RAC 数据库实例上运行 AWR 比较时段报告。\n\
    \nAWR 比较时段报告的组织结构与普通 AWR 报告类似，但它并排显示两个时段的每个性能统计信息，因此你可以快速看到性能上的差异（或相似之处）。以下是报告中的一个部分，展示了如何轻松查看第一个和第二个时段之间性能统计信息的差异。\n\
    \n```\n                                     第一时段            第二时段        差异\n \
    \                             ---------------       ---------------      ------\n\
    \ 每次读取变更的块百分比:                 61.48                 15.44      -46.04\n     \
    \      递归调用百分比:                 98.03                 97.44       -0.59\n每事务回滚百分比:\
    \                  0.00                  0.00        0.00\n              每排序行数:\
    \                  2.51                  2.07       -0.44\n每次调用平均数据库时间（秒）:   \
    \               1.01                  0.03       -0.98\n```\n\n## 7-17. 分析 AWR\
    \ 报告\n\n### 问题\n\n你已经生成了一份覆盖数据库出现性能问题时段的 AWR 报告。你想要分析这份报告。\n\n### 解决方案\n\nAWR\
    \ 报告在其各个部分下总结了与性能相关的统计信息。以下是对 AWR 报告中最重要的部分的简要总结。\n\n#### 会话信息\n\n你可以从 AWR 报告最顶部的部分了解会话数量，如下所示：\n\
    \n```\n快照 ID       快照时间       会话数 游标/会话\n            --------- -------------------\
    \ -------- ---------\n开始快照:      1878 11-4 月-11 07:47:33        38       1.7\n\
    \  结束快照:      1879 11-4 月-11 09:00:48        34       3.7\n   已用时间:          \
    \     73.25（分钟）\n   数据库时间:               33.87（分钟）\n```\n\n务必检查“开始快照”和“结束快照”时间，以确认该时段涵盖了性能问题发生的时间。如果你注意到会话数量非常多，可以调查是否正在创建影子进程——例如，如果在你预期两个时间点的会话数应该相同的情况下，会话数在“开始快照”和“结束快照”时间之间增加了\
    \ 200，最可能的原因是应用程序启动问题，因为它正在生成所有这些会话。\n\n#### 负载概况\n\n“负载概况”部分显示了各项数据库负载指标（如硬解析和事务数）的每秒和每事务统计信息。\n\
    \n```\n负载概况              每秒    每事务\n~~~~~~~~~~~~          ---------------    ---------------\n\
    \      数据库时间(秒):                0.5                1.4\n       数据库 CPU(秒):   \
    \             0.1                0.3\n       重做量:            6,165.3         \
    \  19,028.7\n   逻辑读:              876.6            2,705.6\n   块变更:          \
    \     99.2              306.0\n  物理读:               10.3               31.8\n\
    \  物理写:               1.9                5.9\n      用户调用:                3.4 \
    \              10.4\n          解析:               10.2               31.5\n   \
    \   硬解析:                1.0                3.0\n          登录:                0.1\
    \                0.2\n    事务:                0.3\n```\n\n“负载概况”部分是 AWR 报告中最重要的部分之一。物理\
    \ I/O 速率和硬解析尤为重要。在高效运行的数据库中，你应该看到主要是软解析，硬解析非常少。高硬解析率通常是未使用绑定变量的结果。如果你看到每秒登录数很高，通常意味着你的应用程序未使用持久连接。登录数过多或异常高的事务数告诉你数据库中正在发生一些异常情况。然而，只有当你定期检查\
    \ AWR 报告并了解各种统计信息在数据库正常运行时、一天中不同时间的表现，你才知道这些数字是否异常！\n\n#### 实例效率百分比\n\n实例效率部分显示了几个命中率以及“执行到解析”和“闩锁命中”百分比。\n\
    \n```\n实例效率百分比（目标 100%）\n~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n     \
    \       缓冲区无等待 %:  100.00       重做无等待 %:  100.00\n            缓冲区命中 %:   99.10\
    \    内存中排序 %:  100.00\n            库缓存命中 %:   95.13        软解析 %:   90.35\n  \
    \        执行到解析比 %:   70.71         闩锁命中 %:   99.97\n  解析 CPU 与解析耗时比 %: 36.71 \
    \    % 非解析 CPU:   83.60\n\n共享池统计信息        开始    结束\n                         \
    \     ------  ------\n             内存使用率 %:   81.08   88.82\n    % 执行次数>1 的 SQL:\
    \   70.41   86.92\n  % 执行次数>1 的 SQL 内存占用:   69.60   91.98\n```\n\n在运行良好的实例中，`执行到解析比`应该非常高。`%\
    \ 执行次数>1 的 SQL`统计值低意味着数据库未重用共享 SQL 语句，通常是因为 SQL 未使用绑定变量。"
- fmt: "# Chapter 8\n\n## Top 5 Foreground Events\n\nThe Top 5 Timed Foreground Events\
    \ section shows the events that were responsible for the most waits during the\
    \ time spanned by the AWR report.\n\n```\n`Top 5 Timed Foreground Events`\n`~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`\n\
    `                                                                        Avg Wait\
    \    % DB`\n`Event                                              Waits    Time(s)\
    \    (ms)      time   Wait Class`\n`----------------------------------------------\
    \ ------------ ----------- ------ ---------- ----------`\n`db file sequential\
    \ read                          13,735         475     35      23.4      User\
    \ I/O`\n`DB CPU                                                        429   \
    \               21.1`\n`latch: shared pool                                 801\
    \          96    120       4.7  Concurrency`\n`db file scattered read        \
    \                     998          49     49       2.4      User I/O`\n`control\
    \ file sequential read                     9,785          31      3       1.5\
    \      System I/O`\n```\n\nThe Top 5 Timed Foreground Events section is where\
    \ you can usually spot the problem, by showing you why the sessions are “waiting.”\
    \ The Top 5 Events information shows the total waits for all sessions, but usually\
    \ one or two sessions are responsible for most of the waits. Make sure to analyze\
    \ the total waits and average waits (ms) separately, in order to determine if\
    \ the waits are significant. Merely looking at the total number of waits or the\
    \ total wait time for a wait event could give you a misleading idea about its\
    \ importance. You must pay close attention to the average wait times for an event\
    \ as well. In a nicely performing database, you should see `CPU` and `I/O` as\
    \ the top wait events, as is the case here. If any wait events from the concurrent\
    \ wait class such as latches show up at the top, investigate those waits further.\
    \ For example, if you see events such as `enq: TX - row lock contention`, `gc_buffer_busy`\
    \ (RAC), or `latch free`, it usually indicates contention in the database. If\
    \ you see an average wait of more than 2 ms for the `log file sync` event, investigate\
    \ the wait event further ([Chapter 5](#Chapter05.html#ch5) shows how to analyze\
    \ various wait events). If you see a high amount of waits due to the `db file\
    \ sequential read` or the `db file scattered read` wait events, there are heavy\
    \ indexed reads (this is normal) or full table scans going on. You can find out\
    \ the SQL statement and the tables involved in these read events in the AWR report.\n\
    \n## Time Model Statistics\n\nTime model statistics give you an idea about how\
    \ the database has spent its time, including the time it spent on executing SQL\
    \ statements as against parsing statements. If parsing time is very high, or if\
    \ hard parsing is significant, you must investigate further.\n\n```\n`Time Model\
    \ Statistics                 DB/Inst: ORCL1/orcl1  Snaps: 1878-1879`\n\n`Statistic\
    \ Name                                           Time (s)  % of DB Time`\n`----------------------------------------------\
    \ ------------------ ------------`\n`sql execute elapsed time                \
    \              1,791.5          88.2`\n`parse time elapsed                   \
    \                   700.1          34.5`\n`hard parse elapsed time           \
    \                      653.7          32.2`\n```\n\n## Top SQL Statements\n\n\
    This section of the AWR report lets you quickly identify the most expensive SQL\
    \ statements.\n\n```\n`SQL ordered by Elapsed Time            DB/Inst: ORCL1/orcl1\
