    The `ANY` and `SOME` operators function identically. They are used to compare
    a value retrieved from the database to each value shown in the list of values
    in the query. They are used with the comparison operators =, !=, <>, <, <=, >,
    or >=. Use care with `ANY` or `SOME`, as it evaluates each value separately, without
    regard to the entire list of values. For example, using the same query to get
    the department name for departments 20, 30, or 40, if we modify this query to
    use `ANY` or `SOME`, we can see how Oracle evaluates each value in the `ANY` clause.
    Because we used the `ANY` clause, departments 10, 20, and 30 were included in
    the result, even though departments 20 and 30 were within our `ANY` clause. This
    is because each value is evaluated separately before the result set is returned.


    `SELECT department_id, department_name`

    `FROM departments`

    `WHERE department_id < ANY (20,30,40);`


    `SELECT department_id, department_name`

    `FROM departments`

    `WHERE department_id < SOME (20,30,40);`


