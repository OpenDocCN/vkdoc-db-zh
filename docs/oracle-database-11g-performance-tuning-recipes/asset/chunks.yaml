    #### How It Works


    The result cache hint, if placed in a query, will override any database-level,
    table-level, or session-level result cache settings. Before using hints in your
    queries, you need to determine the configuration of the result cache on your database.
    There are two separate result caches to look at: the server-side result cache
    and the client-side result cache. The server-side result cache is part of the
    shared pool of the SGA, and stores SQL query results and PL/SQL function results.
    Query time can be improved significantly, as query results are checked within
    the result cache first, and if the results exist, they are simply pulled from
    memory, and the query is not executed. The result cache is most appropriately
    used for often-run queries that produce the same results.


    The result cache can be configured at several levels. As [Table 14-5](#Chapter14.html#tab_14_5)
    indicates, it can be configured at the database level, the session level, the
    table level, or the statement level. The statement level is where hints are specified.
    If you decide to configure the result cache in your database, there are several
    initialization parameters that need to be configured. [Table 14-6](#Chapter14.html#tab_14_6)
    reviews these parameters. Some are specific parameters for the result cache, while
    the remaining memory-related parameters need to be analyzed to see if they need
    to be changed to accommodate the result cache.


