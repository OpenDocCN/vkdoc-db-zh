    Having plan baselines in place for resource-intensive queries helps ensure that
    the same execution plan is used after there are changes to your system, such as
    a database upgrades, changes in statistics, different data sets, and so on.


    Keep in mind that it''s possible to have more than one accepted execution plan
    within the plan baseline. If you have a specific plan that you want the optimizer
    to always use, then consider altering the plan to a `FIXED` state. See Recipe
    12-10 for details on altering a plan baseline to a `FIXED` state.


    ### 12-10\. Altering a Plan Baseline


    #### Problem


    You have several accepted plan baseline execution plans for one query. You want
    to specifically instruct the optimizer to give preference to one of the accepted
    plans.


    #### Solution


    The optimizer will give preference to plan baselines with a `FIXED` state. Use
    the `DBMS_SPM` package and `ALTER_SQL_PLAN_BASELINE` function to alter a current
    plan baseline execution plan to `FIXED`. Here''s an example:


    `DECLARE`

    ` pf PLS_INTEGER;`

    `BEGIN`

    `  pf := dbms_spm.alter_sql_plan_baseline(`

    `    plan_name => ''SQL_PLAN_1wskqhvrwf8g60e23be79''`

    `   ,attribute_name => ''fixed''`

    `   ,attribute_value => ''YES'');`

    `END;`

    `/`


    You can query the `FIXED` column of `DBA_SQL_PLAN_BASELINES` to verify that it
    is now baseline-neutered. Listed next is such a query:


    `SELECT`

    ` sql_handle, plan_name, enabled, accepted, fixed`

    `FROM dba_sql_plan_baselines;`


    Here is some sample output:


    `SQL_HANDLE           PLAN_NAME                      ENA ACC FIX`

    `-------------------- ------------------------------ --- --- ---`

    `SQL_457bf2f82571bd38 SQL_PLAN_4ayzkz0kr3g9s90e466fd YES YES NO`

    `SQL_790bd425fe4a0125 SQL_PLAN_7k2yn4rz4n095d8a279cc YES YES YES`


    #### How It Works


    You can think of fixing a plan baseline as a way of establishing a preference
    hierarchy for how the optimizer chooses a plan baseline. The optimizer will give
    first priority to any accepted *and* fixed plan baselines. If none is available,
    then accepted non-fixed plan baselines are considered. Execution plans that are
    added to a plan baseline that already contains a fixed plan baseline will be considered
    secondary (unless you add them as fixed).


    [Table 12-6](#Chapter12.html#tab_12_6) describes the parameters available with
    `ALTER_SQL_PLAN_BASELINE`. You can specify either the `SQL_HANDLE` or `PLAN_NAME`
    or both. If the `SQL_HANDLE` is `NULL`, then a `PLAN_NAME` must be specified and
    vice versa.


    ![images](images/t1206.jpg)


    The `ATTRIBUTE_NAME` and `ATTRIBUTE_VALUE` parameters consist of a name/value
    pairing that can be used to alter various attributes of a plan baseline. See [Table
    12-7](#Chapter12.html#tab_12_7) for a complete description of the possible pairings.


    ![images](images/square.jpg) **Tip** Use the `ENABLED` attribute of `ALTER_SQL_PLAN_BASELINE`
    to either disable or re-enable a plan baseline for use.


    ![images](images/t1207.jpg)


    ### 12-11. Determining If Plan Baselines Exist


    #### Problem


    You recently implemented a plan baseline for a query. You want to verify the configuration
    of a plan baseline.


    #### Solution


    Run the following query to view details regarding any plan baselines that have
    been configured:


    `set pages 100`

    `set linesize 132`

    `col sql_handle form a20`

    `col plan_name form a30`

    `col sql_text form a20`

    `col created form a20`

    `--`

    `SELECT sql_handle, plan_name, enabled`

    `,accepted, created, optimizer_cost, sql_text`

    `FROM dba_sql_plan_baselines;`


    The output from the prior query is very wide and has been modified to fit within
    the page width:


    `SQL_HANDLE           PLAN_NAME                      ENA ACC`

    `-------------------- ------------------------------ --- ---`

    `SQL_b98d2ae2145eec3d SQL_PLAN_bm39aw8a5xv1xae72d2f5 YES YES`

    `CREATED              OPTIMIZER_COST SQL_TEXT`

    `-------------------- -------------- --------------------`

    `21-MAR-11 10.53.29.0              2 select last_name from custs...`


    In the output, there are two key columns: the `SQL_HANDLE` and `PLAN_NAME`. Each
    query has an associated `SQL_HANDLE` that is an identifier for a query. Each execution
    plan has a unique `PLAN_NAME`. The `PLAN_NAME` will be unique within `DBA_SQL_PLAN_BASELINES`,
    whereas there could be multiple rows with the same `SQL_HANDLE` (but different
    `PLAN_NAME`).'
  trans: "\n## 12-10. 修改计划基线\n\n### 解决方案\n\n要处理此问题，请将 AWR 中资源消耗最高的 SQL 查询作为创建计划基线的候选。此方案使用了创建\
    \ AWR 基线的技术。AWR 基线是由起始/结束快照 ID 指定的 AWR 活动快照。接下来的步骤展示了如何使用在 AWR 基线中找到的高资源消耗 SQL\
    \ 语句创建并填充 SQL 调优集，然后为这些查询创建计划基线：\n\n1.  创建一个 AWR 基线。\n2.  创建一个 SQL 调优集对象。\n3.\
    \  使用在 AWR 基线中找到的查询填充 SQL 调优集。\n4.  使用该调优集作为 `DBMS_SPM` 的输入，为 SQL 调优集中包含的每个查询创建一个计划基线。\n\
    \n![images](img/square.jpg) **注意** 在如何使用 AWR 或内存中的高资源消耗查询填充 SQL 调优集方面，您拥有很大的灵活性。有关使用\
    \ SQL 调优集的完整详细信息，请参阅第 11 章。\n\n### 步骤 1：创建 AWR 基线\n\n第一步是创建一个 AWR 基线。例如，假设您知道在数据库中两个快照之间运行着高负载查询。下面的代码使用两个快照\
    \ ID 创建一个 AWR 基线：\n\n```sql\nBEGIN\n  DBMS_WORKLOAD_REPOSITORY.create_baseline\
    \ (\n    start_snap_id => 26632,\n    end_snap_id   => 26635,\n    baseline_name\
    \ => 'peak_baseline_apr15_11');\nEND;\n/\n```\n\n如果您不确定数据库中有哪些可用快照，可以运行 AWR 报告或从\
    \ `DBA_HIST_SNAPSHOT` 中选择 `SNAP_ID`：\n\n```sql\nselect snap_id, begin_interval_time\n\
    from dba_hist_snapshot order by 1;\n```\n\n### 步骤 2：创建 SQL 调优集对象\n\n现在创建一个 SQL\
    \ 调优集。接下来的代码片段创建了一个名为 `test1` 的调优集：\n\n```sql\nBEGIN\n  dbms_sqltune.create_sqlset(\n\
    \    sqlset_name => 'test1'\n   ,description => 'STS from AWR');\nEND;\n/\n```\n\
    \n### 步骤 3：使用在 AWR 基线中找到的高资源消耗查询填充 SQL 调优集\n\n现在，使用在 AWR 基线（步骤 1 创建）中找到的任何查询来填充\
    \ SQL 调优集（步骤 2 创建）：\n\n```sql\nDECLARE\n  base_cur dbms_sqltune.sqlset_cursor;\n\
    BEGIN\n  OPEN base_cur FOR\n    SELECT value(x)\n    FROM table(dbms_sqltune.select_workload_repository(\n\
    \      'peak_baseline_apr15_11', null, null,'elapsed_time',\n      null, null,\
    \ null, 15)) x;\n  --\n\n  dbms_sqltune.load_sqlset(\n    sqlset_name => 'test1',\n\
    \    populate_cursor => base_cur);\nEND;\n/\n```\n\n在前面的代码行中，AWR 基线名称被传递给 `DBMS_SQLTUNE`\
    \ 包。基线内的查询按 `elapsed_time`（耗时）进行选择，并指定了前 15 个。\n\n### 步骤 4：使用调优集作为 `DBMS_SPM`\
    \ 的输入，为 SQL 调优集中包含的每个查询创建计划基线\n\n现在，将调优集（步骤 3 填充）提供给 `DBMS_SPM` 包作为输入：\n\n```sql\n\
    DECLARE\n  test_plan1 PLS_INTEGER;\nBEGIN\n  test_plan1 := dbms_spm.load_plans_from_sqlset(\n\
    \                  sqlset_name=>'test1');\nEND;\n/\n```\n\n调优集中包含的任何查询现在应该在 `DBA_SQL_PLAN_BASELINES`\
    \ 视图中都有相应的条目。\n\n## 工作原理\n\n“解决方案”部分展示的技术是一种非常强大的方法，用于为数据库中运行的最具资源消耗的查询创建计划基线。本方案的关键在于理解，您可以使用\
    \ SQL 调优集中包含的查询作为（`DBMS_SPM` 包的）输入。SQL 调优集可以从在 AWR 和内存中发现的高资源消耗语句中填充。这使您可以轻松地为问题最严重的查询创建计划基线。\n\
    \n为资源密集型查询设置计划基线有助于确保在您的系统（例如数据库升级、统计数据变化、数据集不同等）发生变化后，仍使用相同的执行计划。\n\n请记住，一个计划基线中可能包含多个已接受的执行计划。如果您有一个希望优化器始终使用的特定计划，请考虑将该计划更改为\
    \ `FIXED`（固定）状态。有关将计划基线更改为 `FIXED` 状态的详细信息，请参见第 12-10 节。\n\n## 12-10. 修改计划基线\n\
    \n### 问题\n\n您有一个查询的多个已接受计划基线执行计划。您希望明确指示优化器优先使用其中一个已接受的计划。\n\n### 解决方案\n\n优化器将优先考虑状态为\
    \ `FIXED` 的计划基线。使用 `DBMS_SPM` 包和 `ALTER_SQL_PLAN_BASELINE` 函数将当前计划基线执行计划更改为 `FIXED`。以下是一个示例：\n\
    \n```sql\nDECLARE\n  pf PLS_INTEGER;\nBEGIN\n  pf := dbms_spm.alter_sql_plan_baseline(\n\
    \    plan_name => 'SQL_PLAN_1wskqhvrwf8g60e23be79'\n   ,attribute_name => 'fixed'\n\
    \   ,attribute_value => 'YES');\nEND;\n/\n```\n\n您可以查询 `DBA_SQL_PLAN_BASELINES`\
    \ 的 `FIXED` 列来验证它现在是否为基线固定状态。下面是一个这样的查询：\n\n```sql\nSELECT\n  sql_handle, plan_name,\
    \ enabled, accepted, fixed\nFROM dba_sql_plan_baselines;\n```\n\n以下是一些示例输出：\n\n\
    ```\nSQL_HANDLE           PLAN_NAME                      ENA ACC FIX\n--------------------\
    \ ------------------------------ --- --- ---\nSQL_457bf2f82571bd38 SQL_PLAN_4ayzkz0kr3g9s90e466fd\
    \ YES YES NO\nSQL_790bd425fe4a0125 SQL_PLAN_7k2yn4rz4n095d8a279cc YES YES YES\n\
    ```\n\n### 工作原理\n\n您可以将固定计划基线视为一种建立优化器选择计划基线的优先级层次结构的方法。优化器将首先优先考虑任何已接受*且*固定的计划基线。如果没有可用的，则考虑已接受的非固定计划基线。添加到已包含固定计划基线的计划基线中的执行计划将被视为次要（除非您也将它们添加为固定计划）。\n\
    \n表 12-6 描述了 `ALTER_SQL_PLAN_BASELINE` 的可用参数。您可以指定 `SQL_HANDLE` 或 `PLAN_NAME`\
    \ 或两者。如果 `SQL_HANDLE` 为 `NULL`，则必须指定 `PLAN_NAME`，反之亦然。\n\n![images](img/t1206.jpg)\n\
    \n`ATTRIBUTE_NAME` 和 `ATTRIBUTE_VALUE` 参数由可用于更改计划基线各种属性的名称/值对组成。有关可能配对的完整说明，请参见表\
    \ 12-7。\n\n![images](img/square.jpg) **提示** 使用 `ALTER_SQL_PLAN_BASELINE` 的 `ENABLED`\
    \ 属性可以禁用或重新启用计划基线以供使用。\n\n![images](img/t1207.jpg)\n\n## 12-11. 确定是否存在计划基线\n\n\
    ### 问题\n\n您最近为某个查询实施了计划基线。您想要验证计划基线的配置。\n\n### 解决方案\n\n运行以下查询以查看有关已配置的任何计划基线的详细信息：\n\
    \n```sql\nset pages 100\nset linesize 132\ncol sql_handle form a20\ncol plan_name\
    \ form a30\ncol sql_text form a20\ncol created form a20\n--\nSELECT sql_handle,\
    \ plan_name, enabled\n,accepted, created, optimizer_cost, sql_text\nFROM dba_sql_plan_baselines;\n\
    ```\n\n前面查询的输出非常宽，已被修改以适应页面宽度：\n\n```\nSQL_HANDLE           PLAN_NAME        \
    \              ENA ACC\n-------------------- ------------------------------ ---\
    \ ---\nSQL_b98d2ae2145eec3d SQL_PLAN_bm39aw8a5xv1xae72d2f5 YES YES\nCREATED  \
    \            OPTIMIZER_COST SQL_TEXT\n-------------------- -------------- --------------------\n\
    21-MAR-11 10.53.29.0              2 select last_name from custs...\n```\n\n在输出中，有两个关键列：`SQL_HANDLE`\
    \ 和 `PLAN_NAME`。每个查询都有一个关联的 `SQL_HANDLE`，它是查询的标识符。每个执行计划都有一个唯一的 `PLAN_NAME`。`PLAN_NAME`\
    \ 在 `DBA_SQL_PLAN_BASELINES` 中是唯一的，而可能有多个行具有相同的 `SQL_HANDLE`（但具有不同的 `PLAN_NAME`）。\n"
- fmt: "### 12-12. Displaying Plan Baseline Execution Plans\n\n#### How It Works\n\
    \n`DBA_SQL_PLAN_BASELINES` 视图提供了一种快速简便的方法来确定计划基线是否存在并正在使用。如果一个计划被启用并接受，则查询正在使用计划基线。\n\
    \n![images](images/square.jpg) **注意** 没有计划基线的 `ALL` 或 `USER` 级数据字典视图。这是因为计划基线与特定的\
    \ SQL 语句相关联，而不是与用户相关联。\n\n如果您怀疑优化器是否正在考虑某个计划基线，请设置 `AUTOTRACE` 为开并查看输出，例如：\n\n\
    ```sql\nSQL> set autotrace trace explain;\nSQL> select emp_id from emp where emp_id\
    \ = 100;\n```\n\n以下是输出的一部分，表明此查询使用了 SQL 计划基线执行计划：\n\n```\nExecution Plan\n----------------------------------------------------------\n\
    Plan hash value: 2872589290\n--------------------------------------------------------------------------\n\
    ..................\n- SQL plan baseline \"SQL_PLAN_g6mrkapwrsjsmd8a279cc\" used\
    \ for this statement\n```\n\n#### Problem\n\n您希望快速查看有关现有计划基线的详细信息，例如相关的执行计划。\n\
    \n#### Solution\n\n使用 `DBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE` 函数来显示执行计划和相应的计划基线详细信息。此示例报告特定计划的详细信息：\n\
    \n```sql\nSELECT *\nFROM TABLE(\nDBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE(plan_name=>'SQL_PLAN_bm39aw8a5xv1xae72d2f5'));\n\
    ```\n\n以下是一些示例输出：\n\n```\n--------------------------------------------------------------------------------\n\
    SQL handle: SQL_b98d2ae2145eec3d\nSQL text: select last_name from custs where\
    \ last_name='DAVIS'\n--------------------------------------------------------------------------------\n\
    --------------------------------------------------------------------------------\n\
    Plan name: SQL_PLAN_bm39aw8a5xv1xae72d2f5          Plan id: 2926760693\nEnabled:\
    \ YES     Fixed: NO      Accepted: YES     Origin: MANUAL-LOAD\n--------------------------------------------------------------------------------\n\
    Plan hash value: 1824334906\n---------------------------------------------------------------------------\n\
    | Id  | Operation         | Name  | Rows  | Bytes | Cost (%CPU)| Time     |\n\
    ---------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |       |     2 |    54 |     2   (0)| 00:00:01 |\n\
    |*  1 |  TABLE ACCESS FULL| CUSTS |     2 |    54 |     2   (0)| 00:00:01 |\n\
    ---------------------------------------------------------------------------\n\
    ```\n\n#### How It Works\n\n`DBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE` 函数允许您显示计划基线中的一个或多个执行计划。此函数的返回类型是\
    \ PL/SQL 表类型。此函数接受三个参数（在 [表 12-8](#Chapter12.html#tab_12_8) 中描述）。\n\n![images](images/t1208.jpg)\n\
    \n如果要显示 SQL 语句的所有计划，请使用 `SQL_HANDLE` 参数作为输入，例如：\n\n```sql\nSELECT *\nFROM TABLE(\n\
    DBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE(sql_handle=>'SQL_b98d2ae2145eec3d'));\n```\n\
    \n以下是输出的一部分，显示此 SQL 查询的计划基线中有多个计划：\n\n```\n--------------------------------------------------------------------------------\n\
    Plan name: SQL_PLAN_bm39aw8a5xv1x519fc7bf          Plan id: 1369425855\nEnabled:\
    \ YES     Fixed: NO      Accepted: NO      Origin: AUTO-CAPTURE\n--------------------------------------------------------------------------------\n\
    Plan hash value: 16205770\n-------------------------------------------------------------------------------\n\
    | Id  | Operation        | Name       | Rows  | Bytes | Cost (%CPU)| Time    \
    \ |\n-------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT |            |     2 |    54 |     1   (0)| 00:00:01\
    \ |\n|*  1 |  INDEX RANGE SCAN| CUSTS_IDX1 |     2 |    54 |     1   (0)| 00:00:01\
    \ |\n-------------------------------------------------------------------------------\n\
    Predicate Information (identified by operation id):\n---------------------------------------------------\n\
    \   1 - access(\"LAST_NAME\"='DAVIS')\n--------------------------------------------------------------------------------\n\
    Plan name: SQL_PLAN_bm39aw8a5xv1xae72d2f5          Plan id: 2926760693\nEnabled:\
    \ YES     Fixed: NO      Accepted: YES     Origin: MANUAL-LOAD\n--------------------------------------------------------------------------------\n\
    Plan hash value: 1824334906\n\n---------------------------------------------------------------------------\n\
    | Id  | Operation         | Name  | Rows  | Bytes | Cost (%CPU)| Time     |\n\
    ---------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |       |     2 |    54 |     2   (0)| 00:00:01 |\n\
    |*  1 |  TABLE ACCESS FULL| CUSTS |     2 |    54 |     2   (0)| 00:00:01 |\n\
    ---------------------------------------------------------------------------\n\
    ```\n\n### 12-13. Adding a New Plan to Plan Baseline (Evolving)\n\n#### Problem\n\
    \n您有以下场景：\n\n*   您有一个查询的现有计划基线。\n*   您最近添加了一个查询可以使用的索引。\n*   优化器确定查询现在有一个新的低成本计划可用，并将新计划以未接受状态添加到计划历史中。\n\
    *   您通过 SQL Tuning Advisor 的建议或查询 `DBA_SQL_PLAN_BASELINES` 视图注意到新计划。\n*   您已经检查了新的执行计划，在测试环境中运行了查询，并确信新计划将带来更好的性能。\n\
    \n您希望将历史记录中的低成本计划进行演进，使其成为基线中已接受的计划。您意识到，一旦计划在基线中被接受，优化器就会使用它（如果它是基线中成本最低的计划）。"
  raw: '#### How It Works


    The `DBA_SQL_PLAN_BASELINES` view provides a quick and easy way to determine if
    plan baselines exist and are in use. If a plan is enabled and accepted, then the
    query has a plan baseline in use.


    ![images](images/square.jpg) **Note** There is no `ALL` or `USER`-level data dictionary
    views for plan baselines. This is because the plan baseline is associated with
    a specific SQL statement and not a user.


    If you have doubts about whether a plan baseline is being considered by the optimizer,
    then set `AUTOTRACE` on and view the output—for example:


    `SQL> set autotrace trace explain;`

    `SQL> select emp_id from emp where emp_id = 100;`


    Here is a partial listing of the output indicating that a SQL plan baseline execution
    plan is used for this query:


    `Execution Plan`

    `----------------------------------------------------------`

    `Plan hash value: 2872589290`

    `--------------------------------------------------------------------------`

    `..................`

    `- SQL plan baseline "SQL_PLAN_g6mrkapwrsjsmd8a279cc" used for this statement`


    ### 12-12. Displaying Plan Baseline Execution Plans


    #### Problem


    You want to quickly view details regarding an existing plan baseline, such as
    the associated execution plan.


    #### Solution


    Use the `DBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE` function to display the execution
    plan and corresponding plan baseline details. This example reports details for
    a specific plan:


    `SELECT *`

    `FROM TABLE(`

    `DBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE(plan_name=>''SQL_PLAN_bm39aw8a5xv1xae72d2f5''));`


    Here is some sample output:


    `--------------------------------------------------------------------------------`

    `SQL handle: SQL_b98d2ae2145eec3d`

    `SQL text: select last_name from custs where last_name=''DAVIS''`

    `--------------------------------------------------------------------------------`

    `--------------------------------------------------------------------------------`

    `Plan name: SQL_PLAN_bm39aw8a5xv1xae72d2f5         Plan id: 2926760693`

    `Enabled: YES     Fixed: NO      Accepted: YES     Origin: MANUAL-LOAD`

    `--------------------------------------------------------------------------------`

    `Plan hash value: 1824334906`

    `---------------------------------------------------------------------------`

    `| Id  | Operation         | Name  | Rows  | Bytes | Cost (%CPU)| Time     |`

    `---------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT  |       |     2 |    54 |     2   (0)| 00:00:01 |`

    `|*  1 |  TABLE ACCESS FULL| CUSTS |     2 |    54 |     2   (0)| 00:00:01 |`

    `---------------------------------------------------------------------------`


    #### How It Works


    The `DBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE` function allows you to display one
    or more execution plans in a plan baseline. The return type for this function
    is a PL/SQL table type. This function takes three parameters (described in [Table
    12-8](#Chapter12.html#tab_12_8)).


    ![images](images/t1208.jpg)


    If you want to display all plans for a SQL statement, then use as input the `SQL_HANDLE`
    parameter—for example:


    `SELECT *`

    `FROM TABLE(`

    `DBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE(sql_handle=>''SQL_b98d2ae2145eec3d''));`


    Here is a partial listing of the output showing there are multiple plans in the
    plan baseline for this SQL query:


    `--------------------------------------------------------------------------------`

    `Plan name: SQL_PLAN_bm39aw8a5xv1x519fc7bf         Plan id: 1369425855`

    `Enabled: YES     Fixed: NO      Accepted: NO      Origin: AUTO-CAPTURE`

    `--------------------------------------------------------------------------------`

    `Plan hash value: 16205770`

    `-------------------------------------------------------------------------------`

    `| Id  | Operation        | Name       | Rows  | Bytes | Cost (%CPU)| Time     |`

    `-------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT |            |     2 |    54 |     1   (0)| 00:00:01
    |`

    `|*  1 |  INDEX RANGE SCAN| CUSTS_IDX1 |     2 |    54 |     1   (0)| 00:00:01
    |`

    `-------------------------------------------------------------------------------`

    `Predicate Information (identified by operation id):`

    `---------------------------------------------------`

    `   1 - access("LAST_NAME"=''DAVIS'')`

    `--------------------------------------------------------------------------------`

    `Plan name: SQL_PLAN_bm39aw8a5xv1xae72d2f5         Plan id: 2926760693`

    `Enabled: YES     Fixed: NO      Accepted: YES     Origin: MANUAL-LOAD`

    `--------------------------------------------------------------------------------`

    `Plan hash value: 1824334906`


    `---------------------------------------------------------------------------`

    `| Id  | Operation         | Name  | Rows  | Bytes | Cost (%CPU)| Time     |`

    `---------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT  |       |     2 |    54 |     2   (0)| 00:00:01 |`

    `|*  1 |  TABLE ACCESS FULL| CUSTS |     2 |    54 |     2   (0)| 00:00:01 |`

    `---------------------------------------------------------------------------`


    ### 12-13. Adding a New Plan to Plan Baseline (Evolving)


    #### Problem


    You have the following scenario:


    *   You have an existing plan baseline for the query.

    *   You have recently added an index that the query can use.

    *   The optimizer determines a new lower-cost plan is now available for the query
    and adds the new plan to the plan history in an unaccepted state.

    *   You notice the new plan either from a recommendation by the SQL Tuning Advisor
    or by querying the `DBA_SQL_PLAN_BASELINES` view.

    *   You have examined the new execution plan, have run the query in a test environment,
    and are confident that the new plan will result in better performance.


    You want to evolve the low-cost plan in the history so that it''s moved to an
    accepted plan in the baseline. You realize that once the plan is accepted in the
    baseline, the optimizer will use it (if it''s the lowest-cost plan in the baseline).'
  trans: "\n### 12-12. 显示计划基线执行计划\n\n#### 工作原理\n\n`DBA_SQL_PLAN_BASELINES` 视图提供了一种快速简便的方法，用于确定计划基线是否存在并正在使用。如果一个计划被启用并接受，则表明查询正在使用计划基线。\n\
    \n![images](img/square.jpg) **注意** 数据字典视图中没有 `ALL` 或 `USER` 级别的计划基线。这是因为计划基线与特定的\
    \ SQL 语句相关联，而不是与用户相关联。\n\n如果您怀疑优化器是否正在考虑某个计划基线，请将 `AUTOTRACE` 设置为开，并查看输出，例如：\n\
    \n```sql\nSQL> set autotrace trace explain;\nSQL> select emp_id from emp where\
    \ emp_id = 100;\n```\n\n以下是输出的一部分，表明此查询使用了 SQL 计划基线执行计划：\n\n```\nExecution Plan\n\
    ----------------------------------------------------------\nPlan hash value: 2872589290\n\
    --------------------------------------------------------------------------\n..................\n\
    - SQL plan baseline \"SQL_PLAN_g6mrkapwrsjsmd8a279cc\" used for this statement\n\
    ```\n\n#### 问题\n\n您希望快速查看有关现有计划基线的详细信息，例如相关的执行计划。\n\n#### 解决方案\n\n使用 `DBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE`\
    \ 函数来显示执行计划和相应的计划基线详细信息。此示例报告特定计划的详细信息：\n\n```sql\nSELECT *\nFROM TABLE(\nDBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE(plan_name=>'SQL_PLAN_bm39aw8a5xv1xae72d2f5'));\n\
    ```\n\n以下是一些示例输出：\n\n```\n--------------------------------------------------------------------------------\n\
    SQL handle: SQL_b98d2ae2145eec3d\nSQL text: select last_name from custs where\
    \ last_name='DAVIS'\n--------------------------------------------------------------------------------\n\
    --------------------------------------------------------------------------------\n\
    Plan name: SQL_PLAN_bm39aw8a5xv1xae72d2f5          Plan id: 2926760693\nEnabled:\
    \ YES     Fixed: NO      Accepted: YES     Origin: MANUAL-LOAD\n--------------------------------------------------------------------------------\n\
    Plan hash value: 1824334906\n---------------------------------------------------------------------------\n\
    | Id  | Operation         | Name  | Rows  | Bytes | Cost (%CPU)| Time     |\n\
    ---------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |       |     2 |    54 |     2   (0)| 00:00:01 |\n\
    |*  1 |  TABLE ACCESS FULL| CUSTS |     2 |    54 |     2   (0)| 00:00:01 |\n\
    ---------------------------------------------------------------------------\n\
    ```\n\n#### 工作原理\n\n`DBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE` 函数允许您显示计划基线中的一个或多个执行计划。此函数的返回类型是\
    \ PL/SQL 表类型。此函数接受三个参数（在 表 12-8 中描述）。\n\n![images](img/t1208.jpg)\n\n如果要显示 SQL\
    \ 语句的所有计划，请使用 `SQL_HANDLE` 参数作为输入，例如：\n\n```sql\nSELECT *\nFROM TABLE(\nDBMS_XPLAN.DISPLAY_SQL_PLAN_BASELINE(sql_handle=>'SQL_b98d2ae2145eec3d'));\n\
    ```\n\n以下是输出的一部分，显示此 SQL 查询的计划基线中有多个计划：\n\n```\n--------------------------------------------------------------------------------\n\
    Plan name: SQL_PLAN_bm39aw8a5xv1x519fc7bf          Plan id: 1369425855\nEnabled:\
    \ YES     Fixed: NO      Accepted: NO      Origin: AUTO-CAPTURE\n--------------------------------------------------------------------------------\n\
    Plan hash value: 16205770\n-------------------------------------------------------------------------------\n\
    | Id  | Operation        | Name       | Rows  | Bytes | Cost (%CPU)| Time    \
    \ |\n-------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT |            |     2 |    54 |     1   (0)| 00:00:01\
    \ |\n|*  1 |  INDEX RANGE SCAN| CUSTS_IDX1 |     2 |    54 |     1   (0)| 00:00:01\
    \ |\n-------------------------------------------------------------------------------\n\
    Predicate Information (identified by operation id):\n---------------------------------------------------\n\
    \   1 - access(\"LAST_NAME\"='DAVIS')\n--------------------------------------------------------------------------------\n\
    Plan name: SQL_PLAN_bm39aw8a5xv1xae72d2f5          Plan id: 2926760693\nEnabled:\
    \ YES     Fixed: NO      Accepted: YES     Origin: MANUAL-LOAD\n--------------------------------------------------------------------------------\n\
    Plan hash value: 1824334906\n\n---------------------------------------------------------------------------\n\
    | Id  | Operation         | Name  | Rows  | Bytes | Cost (%CPU)| Time     |\n\
    ---------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |       |     2 |    54 |     2   (0)| 00:00:01 |\n\
    |*  1 |  TABLE ACCESS FULL| CUSTS |     2 |    54 |     2   (0)| 00:00:01 |\n\
    ---------------------------------------------------------------------------\n\
    ```\n\n### 12-13. 向计划基线添加新计划（演进）\n\n#### 问题\n\n您有以下场景：\n\n*   您有一个查询的现有计划基线。\n\
    *   您最近添加了一个查询可以使用的索引。\n*   优化器确定查询现在有一个新的低成本计划可用，并将新计划以未接受状态添加到计划历史中。\n*   您通过\
    \ SQL Tuning Advisor 的建议或查询 `DBA_SQL_PLAN_BASELINES` 视图注意到新计划。\n*   您已经检查了新的执行计划，在测试环境中运行了查询，并确信新计划将带来更好的性能。\n\
    \n您希望将历史记录中的低成本计划进行演进，使其成为基线中已接受的计划。您意识到，一旦计划在基线中被接受，优化器就会使用它（如果它是基线中成本最低的计划）。\n"
- fmt: "### Solution\n\n首先验证相关查询是否存在未接受状态的执行计划（更多详情请参阅 Recipes 12-11 和 12-12）。以下是一个快速示例：\n\
    \n```sql\nSELECT sql_handle, plan_name, enabled, accepted, optimizer_cost\nFROM\
    \ dba_sql_plan_baselines\nWHERE sql_text like '%select emp_id from emp where emp_id\
    \ = 100%';\n```\n\n输出显示有两个计划，其中一个未被接受但成本低得多：\n\n```\nSQL_HANDLE           PLAN_NAME                      ENA\
    \ ACC OPTIMIZER_COST\n-------------------- ------------------------------ ---\
    \ --- --------------\nSQL_f34ef255797c4713 SQL_PLAN_g6mrkapwrsjsm01205c23 YES\
    \ NO               1\nSQL_f34ef255797c4713 SQL_PLAN_g6mrkapwrsjsmd8a279cc YES\
    \ YES              7\n```\n\n使用 `DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE` 函数可以将计划从历史记录移动到基线中（即演进该计划）。在此示例中，使用\
    \ SQL 句柄（与 SQL 语句关联的唯一字符串）来演进计划：\n\n```sql\nSET SERVEROUT ON SIZE 1000000\nSET\
    \ LONG 100000\nDECLARE\n  rpt CLOB;\nBEGIN\n  rpt := DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE(\n\
    \    sql_handle => 'SQL_f34ef255797c4713');\n  DBMS_OUTPUT.PUT_LINE(rpt);\nEND;\n\
    /\n```\n\n如果 Oracle 确定存在一个成本更低的未接受计划，你将看到类似以下的输出，表明该计划已被移动到接受状态（已演进）：\n\n```\n\
    -------------------------------------------------------------------------------\n\
    \                        Evolve SQL Plan Baseline\n                          \
    \    Report\n-------------------------------------------------------------------------------\n\
    \nInputs:\n-------\n  SQL_HANDLE = SQL_f34ef255797c4713\n  PLAN_NAME  =\n  TIME_LIMIT\
    \ = DBMS_SPM.AUTO_LIMIT\n  VERIFY     = YES\n  COMMIT     = YES\n\nPlan: SQL_PLAN_4fpttm0b55uwr918dd295\n\
    ------------------------------------\n  Plan was verified: Time used .09 seconds.\n\
    \  Plan passed performance criterion: 11.56 times better than baseline plan.\n\
    \  Plan was changed to an accepted plan.\n```\n\n你可以通过设置 `AUTOTRACE` 为 on 并运行查询来快速验证新的计划基线是否正在使用——例如：\n\
    \n```sql\nSQL> set autotrace trace explain;\nSQL> select emp_id from emp where\
    \ emp_id = 100;\n```\n\n以下是一个小片段输出，表明正在使用新的计划基线：\n\n```\nSQL plan baseline \"\
    SQL_PLAN_g6mrkapwrsjsm01205c23\" used for this statement\n```\n\n### How It Works\n\
    \nSQL 计划管理的一个关键特性是，当查询优化器生成一个新的低成本计划时，如果这个新计划的成本低于计划基线中已接受的计划，那么这个新低成本计划会自动被添加到该查询的计划历史中，处于未接受状态。\n\
    \n你可以选择接受这个新的低成本计划，这将使其作为已接受的计划移动到计划基线中。将未接受的执行计划从计划历史移动到计划基线（`ENABLED` 和 `ACCEPTED`）被称为\
    \ **演进计划基线**。\n\n为什么优化器会生成一个新计划？有多个因素会导致优化器创建一个与计划基线中现有计划不匹配的新执行计划：\n\n*   有新的统计信息可用。\n\
    *   为查询分配了新的 SQL 配置文件。\n*   索引被添加或删除。\n\n这为你提供了一种强大的技术，以便在有新计划可用时进行管理和使用。你可以使用\
    \ `DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE` 函数以以下模式运行：\n\n*   指定要演进的计划名称。\n*   提供一个要演进的计划列表。\n\
    *   不提供任何值运行，这意味着 Oracle 将演进计划基线存储库中所有未接受的计划。\n\n[Table 12-9](#Chapter12.html#tab_12_9)\
    \ 描述了 `DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE` 函数中使用的参数。\n\n![images](images/t1209.jpg)\n\
    \n### 12-14. 禁用计划基线\n\n#### Problem\n\n你正在使用一个测试数据库，其中许多 SQL 语句有关联的计划基线。你想确定如果不禁用计划基线，性能差异会如何，因此希望临时禁用计划基线的使用。\n\
    \n#### Solution\n\n要禁用数据库中任何 SQL 计划基线的使用，请将 `OPTIMIZER_USE_SQL_PLAN_BASELINES`\
    \ 初始化参数设置为 `FALSE`：\n\n```sql\nSQL> alter system set optimizer_use_sql_plan_baselines=false\
    \ scope=both;\n```\n\n前面的命令在 `SYSTEM` 级别禁用了计划基线的使用，并将该值记录在内存和服务器参数文件中。要重新启用计划基线的使用，请将该值设置回\
    \ `TRUE`。\n\n你也可以在会话级别设置 `OPTIMIZER_USE_SQL_PLAN_BASELINES`。这将为当前连接用户在其会话持续时间内禁用计划基线的使用：\n\
    \n```sql\nSQL> alter session set optimizer_use_sql_plan_baselines=false;\n```\n\
    \n#### How It Works\n\n`OPTIMIZER_USE_SQL_PLAN_BASELINES` 的默认值是 `TRUE`，这意味着默认情况下，如果有计划基线可用，它们将被使用。启用时，优化器将为给定的\
    \ SQL 查询查找有效的计划基线执行计划，并选择成本最低的那个。这为你提供了一种快速简便的方法来在整个数据库或特定会话中禁用/启用计划基线。\n\n如果你想禁用一个特定的计划基线，那么将其状态改为\
    \ `DISABLED`：\n\n```sql\nDECLARE\n  pf PLS_INTEGER;\nBEGIN\n  pf := dbms_spm.alter_sql_plan_baseline(\n\
    \    plan_name => 'SQL_PLAN_4ayzkz0kr3g9s6afbe2b3'\n   ,attribute_name => 'ENABLED'\n\
    \   ,attribute_value => 'NO');\nEND;\n/\n```\n\n![images](images/square.jpg) **Tip**\
    \ 有关如何更改计划基线的更多详细信息，请参见 Recipe 12-10。\n\n### 12-15. 移除计划基线信息\n\n#### Problem\n\
    \n你有几个不再想使用的计划基线，因此希望移除它们。\n\n#### Solution\n\n你可以删除单个计划基线。这将使用 `PLAN_NAME` 参数删除单个计划基线：\n\
    \n```sql\nDECLARE\n  plan_name1 PLS_INTEGER;\nBEGIN\n  plan_name1 := DBMS_SPM.DROP_SQL_PLAN_BASELINE(\n\
    \                   plan_name => 'SQL_PLAN_bm39aw8a5xv1x519fc7bf');\nEND;\n/\n\
    ```\n\n你也可以删除与某个 SQL 语句关联的所有计划。此示例使用 `SQL_HANDLE` 参数移除与某个 SQL 语句关联的所有计划：\n\n```sql\n\
    DECLARE\n  sql_handle1 PLS_INTEGER;\nBEGIN\n  sql_handle1 := DBMS_SPM.DROP_SQL_PLAN_BASELINE(\n\
    \                   sql_handle => 'SQL_b98d2ae2145eec3d');\nEND;\n/\n```\n\n####\
    \ How It Works\n\n你可能偶尔会因为以下原因想要移除 SQL 计划基线：\n\n*   你有旧的计划，因为对某个 SQL 语句来说更高效的计划（已演进）已可用而不再使用。\n\
    *   你有一些从未被接受的计划，现在想移除它们。\n*   你有为不再需要的测试环境创建的计划。\n\n如“Solution”部分所示，你可以通过 `PLAN_NAME`\
    \ 参数移除特定的计划基线。这将移除一个特定的计划。如果一个 SQL 语句关联了多个计划，你可以通过 `SQL_HANDLE` 参数移除该 SQL 语句的所有计划基线。\n\
    \n如果你有一个数据库，想要清除所有计划，那么可以将调用 `DBMS_SPM.DROP_SQL_PLAN_BASELINE` 封装在 PL/SQL 块中，通过循环遍历在\
    \ `DBA_SQL_PLAN_BASELINES` 中找到的任何计划来删除所有计划：\n\n```sql\nSET SERVEROUT ON SIZE 1000000\n\
    DECLARE\n  sql_handle1 PLS_INTEGER;\n  CURSOR c1 IS\n    SELECT sql_handle\n \
    \   FROM dba_sql_plan_baselines;\nBEGIN\n  FOR r1 IN c1 LOOP\n    sql_handle1\
    \ := DBMS_SPM.DROP_SQL_PLAN_BASELINE(sql_handle => r1.sql_handle);\n    DBMS_OUTPUT.PUT_LINE('PB\
    \ dropped for SH: ' || r1.sql_handle);\n  END LOOP;\nEND;\n/\n```\n\n### 12-16.\
    \ 传输计划基线\n\n#### Problem\n\n你有一个测试环境，并希望确保测试系统中的所有计划基线都被移动到生产数据库。"
  raw: '#### Solution


    First verify that there are plans in the unaccepted state for the query in question
    (see Recipes 12-11 and 12-12 for more details). Here''s a quick example:


    `SELECT sql_handle, plan_name, enabled, accepted, optimizer_cost`

    `FROM dba_sql_plan_baselines`

    `WHERE sql_text like ''%select emp_id from emp where emp_id = 100%'';`


    Here is the output indicating there are two plans, one unaccepted but with a much
    lower cost:


    `SQL_HANDLE           PLAN_NAME                      ENA ACC OPTIMIZER_COST`

    `-------------------- ------------------------------ --- --- --------------`

    `SQL_f34ef255797c4713 SQL_PLAN_g6mrkapwrsjsm01205c23 YES NO               1`

    `SQL_f34ef255797c4713 SQL_PLAN_g6mrkapwrsjsmd8a279cc YES YES              7`


    Use the `DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE` function to move a plan from the history
    to the baseline (evolve the plan). In this example, the SQL handle (unique SQL
    string associated with a SQL statement) is used to evolve a plan:


    `SET SERVEROUT ON SIZE 1000000`

    `SET LONG 100000`

    `DECLARE`

    `  rpt CLOB;`

    `BEGIN`

    `  rpt := DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE(`

    `    sql_handle => ''SQL_f34ef255797c4713'');`

    `  DBMS_OUTPUT.PUT_LINE(rpt);`

    `END;`

    `/`


    If Oracle determines that there is an unaccepted plan with a lower cost, then
    you''ll see output similar to this indicating that the plan has been moved to
    the accepted state (evolved):


    `-------------------------------------------------------------------------------`

    `                        Evolve SQL Plan Baseline`

    `Report`

    `-------------------------------------------------------------------------------`


    `Inputs:`

    `-------`

    `  SQL_HANDLE =`

    `SQL_f34ef255797c4713`

    `  PLAN_NAME  =`

    `  TIME_LIMIT = DBMS_SPM.AUTO_LIMIT`

    `  VERIFY     = YES`

    `  COMMIT     = YES`


    `Plan:`

    `SQL_PLAN_4fpttm0b55uwr918dd295`

    `------------------------------------`

    `  Plan was verified: Time used .09 seconds.`

    `  Plan passed`

    `performance criterion: 11.56 times better than baseline plan.`

    `  Plan was changed to an accepted plan.`


    You can quickly verify that the new plan baseline is now in use by setting `AUTOTRACE`
    on and running the query—for example:


    `SQL> set autotrace trace explain;`

    `SQL> select emp_id from emp where emp_id = 100;`


    Here''s a small snippet of the output indicating the new plan baseline is in use:


    `SQL plan baseline "SQL_PLAN_g6mrkapwrsjsm01205c23" used for this statement`


    #### How It Works


    One key feature of SQL plan management is that when a new low-cost plan is generated
    by the query optimizer, if the new low-cost plan has a lower cost than the accepted
    plan(s) in the plan baseline, the new low-cost plan will automatically be added
    to the query''s plan history in an unaccepted state.


    You can choose to accept this new low-cost plan, which then moves it into the
    plan baseline as accepted. Moving an unaccepted execution plan from the plan history
    to the plan baseline (`ENABLED` and `ACCEPTED`) is known as *evolving the plan
    baseline*.


    Why would a new plan ever be generated by the optimizer? There are several factors
    that would cause the optimizer to create a new execution plan that doesn''t match
    an existing one in the plan baseline:


    *   New statistics are available.

    *   A new SQL profile has been assigned to the query.

    *   An index has been added or dropped.


    This gives you a powerful technique to manage and use new plans as they become
    available. You can use the `DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE` function in the
    following modes:


    *   Specify the name of the plan to evolve.

    *   Provide a list of plans to evolve.

    *   Run it with no value, meaning that Oracle will evolve all non-accepted plans
    contained within the plan baseline repository.


    [Table 12-9](#Chapter12.html#tab_12_9) describes the parameters used in the `DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE`
    function.


    ![images](images/t1209.jpg)


    ### 12-14\. Disabling Plan Baselines


    #### Problem


    You''re working with a test database that has many SQL statements with associated
    plan baselines. You want to determine what the performance difference would be
    without the plan baselines enabled and therefore want to temporarily disable the
    use of plan baselines.


    #### Solution


    To disable the use of any SQL plan baselines within the database, set the `OPTIMIZER_USE_SQL_PLAN_BASELINES`
    initialization parameter to `FALSE`:


    `SQL> alter system set optimizer_use_sql_plan_baselines=false scope=both;`


    The prior line disables the use of the plan baselines at the `SYSTEM` level and
    records the value in memory and in the server parameter file. To re-enable the
    use of plan baselines, set the value back to `TRUE`.


    You can also set the `OPTIMIZER_USE_SQL_PLAN_BASELINES` at the session level.
    This disables the use of plan baselines for the duration of the session for the
    currently connected user:


    `SQL> alter session set optimizer_use_sql_plan_baselines=false;`


    #### How It Works


    The default value for `OPTIMIZER_USE_SQL_PLAN_BASELINES` is `TRUE`, which means
    by default, if plan baselines are available, they will be used. When enabled,
    the optimizer will look for a valid plan baseline execution plan for the given
    SQL query and choose the one with the lowest cost. This gives you a quick and
    easy way to disable/enable the use of plan baselines within your entire database
    or specific to a session.


    If you want to disable the use of one specific plan baseline, then alter its state
    to `DISABLED`:


    `DECLARE`

    ` pf PLS_INTEGER;`

    `BEGIN`

    `  pf := dbms_spm.alter_sql_plan_baseline(`

    `    plan_name => ''SQL_PLAN_4ayzkz0kr3g9s6afbe2b3''`

    `   ,attribute_name => ''ENABLED''`

    `   ,attribute_value => ''NO'');`

    `END;`

    `/`


    ![images](images/square.jpg) **Tip** See Recipe 12-10 for more details on how
    to alter plan baselines.


    ### 12-15. Removing Plan Baseline Information


    #### Problem


    You have several plan baselines that you no longer want to use and therefore want
    to remove them.


    #### Solution


    You can drop a single plan baseline. This removes a single plan baseline using
    the `PLAN_NAME` parameter:


    `DECLARE`

    `  plan_name1 PLS_INTEGER;`

    `BEGIN`

    `  plan_name1 := DBMS_SPM.DROP_SQL_PLAN_BASELINE(`

    `                           plan_name => ''SQL_PLAN_bm39aw8a5xv1x519fc7bf'');`

    `END;`

    `/`


    You can also drop all plans associated with a SQL statement. This example removes
    all plans associated with a SQL statement using the `SQL_HANDLE` parameter:


    `DECLARE`

    `  sql_handle1 PLS_INTEGER;`

    `BEGIN`

    `  sql_handle1 := DBMS_SPM.DROP_SQL_PLAN_BASELINE(`

    `                           sql_handle => ''SQL_b98d2ae2145eec3d'');`

    `END;`

    `/`


    #### How It Works


    You may occasionally want to remove SQL plan baselines for the following reasons:


    *   You have old plans that aren''t used anymore because more efficient plans
    (evolved) are available for a SQL statement.

    *   You have plans that were never accepted and now want to remove them.

    *   You have plans that were created for testing environments that are no longer
    needed.


    As shown in the “Solution” section, you can remove a specific plan baseline via
    the `PLAN_NAME` parameter. This will remove one specific plan. If you have several
    plans associated with one SQL statement, you can remove all plan baselines for
    that SQL statement via the `SQL_HANDLE` parameter.


    If you have a database where you want to clear out all plans, then you can encapsulate
    the call `DBMS_SPM.DROP_SQL_PLAN_BASELINE` within a PL/SQL block that drops all
    plans by looping through any plan found in `DBA_SQL_PLAN_BASELINES`:


    `SET SERVEROUT ON SIZE 1000000`

    `DECLARE`

    `  sql_handle1 PLS_INTEGER;`

    `  CURSOR c1 IS`

    `    SELECT sql_handle`

    `    FROM dba_sql_plan_baselines;`

    `BEGIN`

    `  FOR r1 IN c1 LOOP`

    `    sql_handle1 := DBMS_SPM.DROP_SQL_PLAN_BASELINE(sql_handle => r1.sql_handle);`

    `    DBMS_OUTPUT.PUT_LINE(''PB dropped for SH: '' || r1.sql_handle);`

    `  END LOOP;`

    `END;`

    `/`


    ### 12-16. Transporting Plan Baselines


    #### Problem


    You have a test environment, and you want to ensure that all of the plan baselines
    in the test system are moved to a production database.'
  trans: "### 解决方案\n\n首先验证相关查询是否存在未接受状态的执行计划（更多详情请参阅 配方 12-11 和 12-12）。以下是一个快速示例：\n\
    \n```sql\nSELECT sql_handle, plan_name, enabled, accepted, optimizer_cost\nFROM\
    \ dba_sql_plan_baselines\nWHERE sql_text like '%select emp_id from emp where emp_id\
    \ = 100%';\n```\n\n输出显示有两个计划，其中一个未被接受但成本低得多：\n\n```\nSQL_HANDLE           PLAN_NAME                      ENA\
    \ ACC OPTIMIZER_COST\n-------------------- ------------------------------ ---\
    \ --- --------------\nSQL_f34ef255797c4713 SQL_PLAN_g6mrkapwrsjsm01205c23 YES\
    \ NO               1\nSQL_f34ef255797c4713 SQL_PLAN_g6mrkapwrsjsmd8a279cc YES\
    \ YES              7\n```\n\n使用 `DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE` 函数可以将计划从历史记录移动到基线中（即演进该计划）。在此示例中，使用\
    \ SQL 句柄（与 SQL 语句关联的唯一字符串）来演进计划：\n\n```sql\nSET SERVEROUT ON SIZE 1000000\nSET\
    \ LONG 100000\nDECLARE\n  rpt CLOB;\nBEGIN\n  rpt := DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE(\n\
    \    sql_handle => 'SQL_f34ef255797c4713');\n  DBMS_OUTPUT.PUT_LINE(rpt);\nEND;\n\
    /\n```\n\n如果 Oracle 确定存在一个成本更低的未接受计划，你将看到类似以下的输出，表明该计划已被移动到接受状态（已演进）：\n\n```\n\
    -------------------------------------------------------------------------------\n\
    \                        Evolve SQL Plan Baseline\n                          \
    \    Report\n-------------------------------------------------------------------------------\n\
    \nInputs:\n-------\n  SQL_HANDLE = SQL_f34ef255797c4713\n  PLAN_NAME  =\n  TIME_LIMIT\
    \ = DBMS_SPM.AUTO_LIMIT\n  VERIFY     = YES\n  COMMIT     = YES\n\nPlan: SQL_PLAN_4fpttm0b55uwr918dd295\n\
    ------------------------------------\n  Plan was verified: Time used .09 seconds.\n\
    \  Plan passed performance criterion: 11.56 times better than baseline plan.\n\
    \  Plan was changed to an accepted plan.\n```\n\n你可以通过设置 `AUTOTRACE` 为 on 并运行查询来快速验证新的计划基线是否正在使用——例如：\n\
    \n```sql\nSQL> set autotrace trace explain;\nSQL> select emp_id from emp where\
    \ emp_id = 100;\n```\n\n以下是一个小片段输出，表明正在使用新的计划基线：\n\n```\nSQL plan baseline \"\
    SQL_PLAN_g6mrkapwrsjsm01205c23\" used for this statement\n```\n\n### 工作原理\n\n\
    SQL 计划管理的一个关键特性是，当查询优化器生成一个新的低成本计划时，如果这个新计划的成本低于计划基线中已接受的计划，那么这个新低成本计划会自动被添加到该查询的计划历史中，处于未接受状态。\n\
    \n你可以选择接受这个新的低成本计划，这将使其作为已接受的计划移动到计划基线中。将未接受的执行计划从计划历史移动到计划基线（`ENABLED` 和 `ACCEPTED`）被称为\
    \ **演进计划基线**。\n\n为什么优化器会生成一个新计划？有多个因素会导致优化器创建一个与计划基线中现有计划不匹配的新执行计划：\n\n*   有新的统计信息可用。\n\
    *   为查询分配了新的 SQL 配置文件。\n*   索引被添加或删除。\n\n这为你提供了一种强大的技术，以便在有新计划可用时进行管理和使用。你可以使用\
    \ `DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE` 函数以以下模式运行：\n\n*   指定要演进的计划名称。\n*   提供一个要演进的计划列表。\n\
    *   不提供任何值运行，这意味着 Oracle 将演进计划基线存储库中所有未接受的计划。\n\n表 12-9 描述了 `DBMS_SPM.EVOLVE_SQL_PLAN_BASELINE`\
    \ 函数中使用的参数。\n\n![images](img/t1209.jpg)\n\n### 12-14. 禁用计划基线\n\n#### 问题\n\n你正在使用一个测试数据库，其中许多\
    \ SQL 语句有关联的计划基线。你想确定如果不禁用计划基线，性能差异会如何，因此希望临时禁用计划基线的使用。\n\n#### 解决方案\n\n要禁用数据库中任何\
    \ SQL 计划基线的使用，请将 `OPTIMIZER_USE_SQL_PLAN_BASELINES` 初始化参数设置为 `FALSE`：\n\n```sql\n\
    SQL> alter system set optimizer_use_sql_plan_baselines=false scope=both;\n```\n\
    \n前面的命令在 `SYSTEM` 级别禁用了计划基线的使用，并将该值记录在内存和服务器参数文件中。要重新启用计划基线的使用，请将该值设置回 `TRUE`。\n\
    \n你也可以在会话级别设置 `OPTIMIZER_USE_SQL_PLAN_BASELINES`。这将为当前连接用户在其会话持续时间内禁用计划基线的使用：\n\
    \n```sql\nSQL> alter session set optimizer_use_sql_plan_baselines=false;\n```\n\
    \n#### 工作原理\n\n`OPTIMIZER_USE_SQL_PLAN_BASELINES` 的默认值是 `TRUE`，这意味着默认情况下，如果有计划基线可用，它们将被使用。启用时，优化器将为给定的\
    \ SQL 查询查找有效的计划基线执行计划，并选择成本最低的那个。这为你提供了一种快速简便的方法来在整个数据库或特定会话中禁用/启用计划基线。\n\n如果你想禁用一个特定的计划基线，那么将其状态改为\
    \ `DISABLED`：\n\n```sql\nDECLARE\n  pf PLS_INTEGER;\nBEGIN\n  pf := dbms_spm.alter_sql_plan_baseline(\n\
    \    plan_name => 'SQL_PLAN_4ayzkz0kr3g9s6afbe2b3'\n   ,attribute_name => 'ENABLED'\n\
    \   ,attribute_value => 'NO');\nEND;\n/\n```\n\n![images](img/square.jpg) **提示**\
    \ 有关如何更改计划基线的更多详细信息，请参见 配方 12-10。\n\n### 12-15. 移除计划基线信息\n\n#### 问题\n\n你有几个不再想使用的计划基线，因此希望移除它们。\n\
    \n#### 解决方案\n\n你可以删除单个计划基线。这将使用 `PLAN_NAME` 参数删除单个计划基线：\n\n```sql\nDECLARE\n \
    \ plan_name1 PLS_INTEGER;\nBEGIN\n  plan_name1 := DBMS_SPM.DROP_SQL_PLAN_BASELINE(\n\
    \                   plan_name => 'SQL_PLAN_bm39aw8a5xv1x519fc7bf');\nEND;\n/\n\
    ```\n\n你也可以删除与某个 SQL 语句关联的所有计划。此示例使用 `SQL_HANDLE` 参数移除与某个 SQL 语句关联的所有计划：\n\n```sql\n\
    DECLARE\n  sql_handle1 PLS_INTEGER;\nBEGIN\n  sql_handle1 := DBMS_SPM.DROP_SQL_PLAN_BASELINE(\n\
    \                   sql_handle => 'SQL_b98d2ae2145eec3d');\nEND;\n/\n```\n\n####\
    \ 工作原理\n\n你可能偶尔会因为以下原因想要移除 SQL 计划基线：\n\n*   你有旧的计划，因为对某个 SQL 语句来说更高效的计划（已演进）已可用而不再使用。\n\
    *   你有一些从未被接受的计划，现在想移除它们。\n*   你有为不再需要的测试环境创建的计划。\n\n如“解决方案”部分所示，你可以通过 `PLAN_NAME`\
    \ 参数移除特定的计划基线。这将移除一个特定的计划。如果一个 SQL 语句关联了多个计划，你可以通过 `SQL_HANDLE` 参数移除该 SQL 语句的所有计划基线。\n\
    \n如果你有一个数据库，想要清除所有计划，那么可以将调用 `DBMS_SPM.DROP_SQL_PLAN_BASELINE` 封装在 PL/SQL 块中，通过循环遍历在\
    \ `DBA_SQL_PLAN_BASELINES` 中找到的任何计划来删除所有计划：\n\n```sql\nSET SERVEROUT ON SIZE 1000000\n\
    DECLARE\n  sql_handle1 PLS_INTEGER;\n  CURSOR c1 IS\n    SELECT sql_handle\n \
    \   FROM dba_sql_plan_baselines;\nBEGIN\n  FOR r1 IN c1 LOOP\n    sql_handle1\
    \ := DBMS_SPM.DROP_SQL_PLAN_BASELINE(sql_handle => r1.sql_handle);\n    DBMS_OUTPUT.PUT_LINE('PB\
    \ dropped for SH: ' || r1.sql_handle);\n  END LOOP;\nEND;\n/\n```\n\n### 12-16.\
    \ 传输计划基线\n\n#### 问题\n\n你有一个测试环境，并希望确保测试系统中的所有计划基线都被移动到生产数据库。"
- fmt: "### Solution\n\nFollow these steps to transport plan baselines:\n\n1.  Create\
    \ a table using the `DBMS_SPM` package and `CREATE_STGTAB_BASELINE` procedure.\n\
    2.  Populate the table with plan baselines using the `DBMS_SPM.PACK_STGTAB_BASELINE`\
    \ function.\n3.  Copy the staging table to the destination database using a database\
    \ link or Data Pump.\n4.  Import the plan baseline information using the `DBMS_SPM.UNPACK_STGTAB_BASELINE`\
    \ function.\n\nThis example first uses the `DBMS_SPM` package to create a table\
    \ named `EXP_PB`:\n```sql\nBEGIN\n  DBMS_SPM.CREATE_STGTAB_BASELINE(table_name\
    \ => 'exp_pb');\nEND;\n/\n```\n\n![images](images/square.jpg) **Note** You cannot\
    \ create the staging table in the `SYS` user.\n\nNext the `EXP_PB` table is populated\
    \ with plan baselines created by the database user `MV_MAINT`:\n```sql\nDECLARE\n\
    \  pbs NUMBER;\nBEGIN\n  pbs := DBMS_SPM.PACK_STGTAB_BASELINE(\n           table_name\
    \ => 'exp_pb',\n           enabled => 'yes',\n           creator => 'MV_MAINT');\n\
    END;\n/\n```\n\nThe prior code populates the table with all plan baselines created\
    \ by a user. You can also populate the table by `PLAN_NAME`, `SQL_HANDLE`, `SQL_TEXT`,\
    \ or various other criteria. The only mandatory parameter is the name of the table\
    \ to be populated.\n\nNow copy the staging table to the destination database.\
    \ You can use a database link, Data Pump, or the old `exp`/`imp` utilities to\
    \ accomplish this.\n\nLastly, on the destination database, use the `DBMS_SPM.UNPACK_STGTAB_BASELINE`\
    \ function to take the contents of the `EXP_PB` table and create plan baselines:\n\
    ```sql\nDECLARE\n  pbs NUMBER;\nBEGIN\n  pbs := DBMS_SPM.UNPACK_STGTAB_BASELINE(\n\
    \           table_name => 'exp_pb',\n           enabled => 'yes');\nEND;\n/\n\
    ```\n\nYou should now have all of the plan baselines transferred to your target\
    \ database. You can query `DBA_SQL_PLAN_BASELINES` to verify this.\n\n### How\
    \ It Works\n\nIt's a fairly easy process to create a table, populate it with plan\
    \ baseline information, copy the table, and the import its contents into the destination\
    \ database. As shown in step 2 of the \"Solution\" section of this recipe, the\
    \ `PACK_STGTAB_BASELINE` function is used (see [Table 12-10](#Chapter12.html#tab_12_10)).\
    \ This function allows quite a bit of flexibility in what types of plan baselines\
    \ you want exported. You can limit the plan baselines extracted to a specific\
    \ user, or enabled, or accepted, and so on.\n\nLikewise, the `DBMS_SPM.UNPACK_STGTAB_BASELINE`\
    \ function allows you a great deal of flexibility on what types of plan baselines\
    \ are extracted from the staging table and loaded into the destination database.\
    \ The input parameters for `UNPACK_STGTAB_BASELINE` are the same as the parameters\
    \ used for `PACK_STGTAB_BASELINE` (described in [Table 12-10](#Chapter12.html#tab_12_10)).\n\
    \n![images](images/t1210.jpg)\n\n## Chapter 13\n\n## Configuring the Optimizer\n\
    \nThe cost optimizer determines the most efficient execution plan for a SQL statement.\
    \ The optimizer depends heavily on the statistics that you (or the database) gather.\
    \ This chapter explains how to set the optimizer goal and how to control the behavior\
    \ of the optimizer. You'll learn how to enable and disable automatic statistics\
    \ collection by the database and when to collect statistics manually. You'll learn\
    \ how to set preferences for statistics collection as well as how to validate\
    \ new statistics before making them available to the optimizer. The chapter explains\
    \ how to lock statistics, export statistics, gather system statistics, restore\
    \ older versions of statistics, and how to handle missing statistics.\n\nBind\
    \ peeking behavior, wherein the optimizer looks at the bind variable values when\
    \ parsing a SQL statement, can have unpredictable effects on execution plans.\
    \ The chapter explains adaptive cursor sharing, which is designed to produce execution\
    \ plans based on the specific values of bind variables.\n\nCollecting statistics\
    \ on large tables is always problematic, and the chapter shows how to use the\
    \ incremental statistics gathering feature to speed up statistics collection for\
    \ large partitioned tables. You'll also learn how to use the new concurrent statistics\
    \ collection feature to optimize statistics collection for large tables.\n\nCollecting\
    \ extension statistics for expressions and column groups improves optimizer performance,\
    \ and you'll learn how to collect these types of statistics. The chapter also\
    \ explains how to let the database tell you which columns in a table are candidates\
    \ for creating a column group.\n\n### 13-1. Choosing an Optimizer Goal\n\n####\
    \ Problem\n\nYou want to set the cost optimizer goal for your database.\n\n####\
    \ Solution\n\nYou can influence the behavior of the cost optimizer by setting\
    \ an optimizer goal. The optimizer will collect appropriate statistics based on\
    \ the goal you set. You set the optimizer goal with the `optimizer_mode` initialization\
    \ parameter. You can set the parameter to the values `ALL_ROWS` or `FIRST_ROWS_n`,\
    \ as shown here:\n```sql\noptimizer_mode=all_rows\noptimizer_mode=first_rows_n\
    \          /* n can be 1,10,100 or 1000 */\n```\n\nThe default value for the `optimizer_mode`\
    \ parameter is `ALL_ROWS`.\n\n#### How It Works\n\nThe default value for the `optimizer_mode`\
    \ parameter, `ALL_ROWS`, has the goal of maximizing throughput—it minimizes resource\
    \ use to complete the processing of the entire statement and get all the requested\
    \ rows. The alternate value of `FIRST_ROWS_n` uses the goal of response time,\
    \ which is the time it takes to return the first *n* number of rows.\n\nIf you\
    \ set the `optimizer_mode` parameter to `FIRST_ROWS_n`, all sessions will use\
    \ the optimizer goal of best response time. However, you can change the optimizer\
    \ goal just at the session level by executing a SQL statement such as the following:\n\
    ```sql\nSQL> alter session set optimizer_mode=first_rows_1;\n```\n\nNote that\
    \ the `ALL_ROWS` optimizer mode setting has built-in bias toward full table scans,\
    \ because its goal is to minimize resource usage. The `FIRST_ROWS_n` setting,\
    \ on the other hand, favors index accesses because its goal is minimizing response\
    \ time, and thus returns the requested number of rows as fast as possible.\n\n\
    In addition to the `optimizer_mode` parameter, you can also set the following\
    \ parameters to influence the behavior of the optimizer:\n*   `optimizer_index_caching`\n\
    *   `optimizer_index_cost_adj`\n*   `db_file_multiblock_read_count`\n\nIn general,\
    \ changing these parameters at the database level can lead to unexpected optimizer\
    \ behavior, including potential performance deterioration for some queries. The\
    \ recommended practice is to leave these parameters at their default levels. We,\
    \ however, do show (Recipe 13-11) how to use one of these parameters (`optimizer_index_cost_adj`)\
    \ at the session level, to improve the performance of a long-running query by\
    \ forcing the optimizer to use an index.\n\n### 13-2. Enabling Automatic Statistics\
    \ Gathering\n\n#### Problem\n\nYou want to enable automatic statistics gathering\
    \ in your database.\n\n![images](images/square.jpg) **Tip** Oracle recommends\
    \ the enabling of automatic optimizer statistics collection."
  raw: '#### Solution


    Follow these steps to transport plan baselines:


    1.  Create a table using the `DBMS_SPM` package and `CREATE_STGTAB_BASELINE` procedure.

    2.  Populate the table with plan baselines using the `DBMS_SPM.PACK_STGTAB_BASELINE`
    function.

    3.  Copy the staging table to the destination database using a database link or
    Data Pump.

    4.  Import the plan baseline information using the `DBMS_SPM.UNPACK_STGTAB_BASELINE`
    function.


    This example first uses the `DBMS_SPM` package to create a table named `EXP_PB`:


    `BEGIN`

    `  DBMS_SPM.CREATE_STGTAB_BASELINE(table_name => ''exp_pb'');`

    `END;`

    `/`


    ![images](images/square.jpg) **Note** You cannot create the staging table in the
    `SYS` user.


    Next the `EXP_PB` table is populated with plan baselines created by the database
    user `MV_MAINT`:


    `DECLARE`

    `  pbs NUMBER;`

    `BEGIN`

    `  pbs := DBMS_SPM.PACK_STGTAB_BASELINE(`

    `           table_name => ''exp_pb'',`

    `           enabled => ''yes'',`

    `           creator => ''MV_MAINT'');`

    `END;`

    `/`


    The prior code populates the table with all plan baselines created by a user.
    You can also populate the table by `PLAN_NAME`, `SQL_HANDLE`, `SQL_TEXT`, or various
    other criteria. The only mandatory parameter is the name of the table to be populated.


    Now copy the staging table to the destination database. You can use a database
    link, Data Pump, or the old `exp`/`imp` utilities to accomplish this.


    Lastly, on the destination database, use the `DBMS_SPM.UNPACK_STGTAB_BASELINE`
    function to take the contents of the `EXP_PB` table and create plan baselines:


    `DECLARE`

    `  pbs NUMBER;`

    `BEGIN`

    `  pbs := DBMS_SPM.UNPACK_STGTAB_BASELINE(`

    `           table_name => ''exp_pb'',`

    `           enabled => ''yes'');`

    `END;`

    `/`


    You should now have all of the plan baselines transferred to your target database.
    You can query `DBA_SQL_PLAN_BASELINES` to verify this.


    #### How It Works


    It''s a fairly easy process to create a table, populate it with plan baseline
    information, copy the table, and the import its contents into the destination
    database. As shown in step 2 of the “Solution” section of this recipe, the `PACK_STGTAB_BASELINE`
    function is used (see [Table 12-10](#Chapter12.html#tab_12_10)). This function
    allows quite a bit of flexibility in what types of plan baselines you want exported.
    You can limit the plan baselines extracted to a specific user, or enabled, or
    accepted, and so on.


    Likewise, the `DBMS_SPM.UNPACK_STGTAB_BASELINE` function allows you a great deal
    of flexibility on what types of plan baselines are extracted from the staging
    table and loaded into the destination database. The input parameters for `UNPACK_STGTAB_BASELINE`
    are the same as the parameters used for `PACK_STGTAB_BASELINE` (described in [Table
    12-10](#Chapter12.html#tab_12_10)).


    ![images](images/t1210.jpg)


    ## C H A P T E R  13


    ## Configuring the Optimizer


    The cost optimizer determines the most efficient execution plan for a SQL statement.
    The optimizer depends heavily on the statistics that you (or the database) gather.
    This chapter explains how to set the optimizer goal and how to control the behavior
    of the optimizer. You''ll learn how to enable and disable automatic statistics
    collection by the database and when to collect statistics manually. You''ll learn
    how to set preferences for statistics collection as well as how to validate new
    statistics before making them available to the optimizer. The chapter explains
    how to lock statistics, export statistics, gather system statistics, restore older
    versions of statistics, and how to handle missing statistics.


    Bind peeking behavior, wherein the optimizer looks at the bind variable values
    when parsing a SQL statement, can have unpredictable effects on execution plans.
    The chapter explains adaptive cursor sharing, which is designed to produce execution
    plans based on the specific values of bind variables.


    Collecting statistics on large tables is always problematic, and the chapter shows
    how to use the incremental statistics gathering feature to speed up statistics
    collection for large partitioned tables. You''ll also learn how to use the new
    concurrent statistics collection feature to optimize statistics collection for
    large tables.


    Collecting extension statistics for expressions and column groups improves optimizer
    performance, and you''ll learn how to collect these types of statistics. The chapter
    also explains how to let the database tell you which columns in a table are candidates
    for creating a column group.


    ### 13-1\. Choosing an Optimizer Goal


    #### Problem


    You want to set the cost optimizer goal for your database.


    #### Solution


    You can influence the behavior of the cost optimizer by setting an optimizer goal.
    The optimizer will collect appropriate statistics based on the goal you set. You
    set the optimizer goal with the `optimizer_mode` initialization parameter. You
    can set the parameter to the values `ALL_ROWS` or `FIRST_ROWS_n`, as shown here:


    `optimizer_mode=all_rows`

    `optimizer_mode=first_rows_`*`n`*`         /* n can be 1,10,100 or 1000 */`


    The default value for the `optimizer_mode` parameter is `ALL_ROWS`.


    #### How It Works


    The default value for the `optimizer_mode` parameter, `ALL_ROWS`, has the goal
    of maximizing throughput—it minimizes resource use to complete the processing
    of the entire statement and get all the requested rows. The alternate value of
    `FIRST_ROWS_`*`n`* uses the goal of response time, which is the time it takes
    to return the first *`n`* number of rows.


    If you set the `optimizer_mode` parameter to `FIRST_ROWS_`*`n`*, all sessions
    will use the optimizer goal of best response time. However, you can change the
    optimizer goal just at the session level by executing a SQL statement such as
    the following:


    `SQL> alter session set optimizer_mode=first_rows_1;`


    Note that the `ALL_ROWS` optimizer mode setting has built-in bias toward full
    table scans, because its goal is to minimize resource usage. The `FIRST_ROWS_n`
    setting, on the other hand, favors index accesses because its goal is minimizing
    response time, and thus returns the requested number of rows as fast as possible.


    In addition to the `optimizer_mode` parameter, you can also set the following
    parameters to influence the behavior of the optimizer:


    *   `optimizer_index_caching`

    *   `optimizer_index_cost_adj`

    *   `db_file_multiblock_read_count`


    In general, changing these parameters at the database level can lead to unexpected
    optimizer behavior, including potential performance deterioration for some queries.
    The recommended practice is to leave these parameters at their default levels.
    We, however, do show (Recipe 13-11) how to use one of these parameters (`optimizer_index_cost_adj`)
    at the session level, to improve the performance of a long-running query by forcing
    the optimizer to use an index.


    ### 13-2. Enabling Automatic Statistics Gathering


    #### Problem


    You want to enable automatic statistics gathering in your database.


    ![images](images/square.jpg) **Tip** Oracle recommends the enabling of automatic
    optimizer statistics collection.'
  trans: "### 解决方案\n\n按以下步骤传输计划基线：\n\n1.  使用 `DBMS_SPM` 软件包和 `CREATE_STGTAB_BASELINE`\
    \ 过程创建一个表。\n2.  使用 `DBMS_SPM.PACK_STGTAB_BASELINE` 函数向该表填充计划基线。\n3.  使用数据库链接或\
    \ Data Pump 将暂存表复制到目标数据库。\n4.  使用 `DBMS_SPM.UNPACK_STGTAB_BASELINE` 函数导入计划基线信息。\n\
    \n本示例首先使用 `DBMS_SPM` 软件包创建一个名为 `EXP_PB` 的表：\n```sql\nBEGIN\n  DBMS_SPM.CREATE_STGTAB_BASELINE(table_name\
    \ => 'exp_pb');\nEND;\n/\n```\n\n![images](img/square.jpg) **注意** 你无法在 `SYS` 用户下创建暂存表。\n\
    \n接下来，用数据库用户 `MV_MAINT` 创建的计划基线填充 `EXP_PB` 表：\n```sql\nDECLARE\n  pbs NUMBER;\n\
    BEGIN\n  pbs := DBMS_SPM.PACK_STGTAB_BASELINE(\n           table_name => 'exp_pb',\n\
    \           enabled => 'yes',\n           creator => 'MV_MAINT');\nEND;\n/\n```\n\
    \n前面的代码用某个用户创建的所有计划基线填充了该表。你也可以通过 `PLAN_NAME`、`SQL_HANDLE`、`SQL_TEXT` 或其他各种条件来填充该表。唯一必需的参数是要填充的表的名称。\n\
    \n现在将暂存表复制到目标数据库。你可以使用数据库链接、Data Pump 或旧的 `exp`/`imp` 实用程序来完成此操作。\n\n最后，在目标数据库上，使用\
    \ `DBMS_SPM.UNPACK_STGTAB_BASELINE` 函数获取 `EXP_PB` 表的内容并创建计划基线：\n```sql\nDECLARE\n\
    \  pbs NUMBER;\nBEGIN\n  pbs := DBMS_SPM.UNPACK_STGTAB_BASELINE(\n           table_name\
    \ => 'exp_pb',\n           enabled => 'yes');\nEND;\n/\n```\n\n现在，你应该已将所有计划基线传输到了目标数据库。你可以查询\
    \ `DBA_SQL_PLAN_BASELINES` 来验证这一点。\n\n### 工作原理\n\n创建一个表，用计划基线信息填充它，复制该表，然后将其内容导入目标数据库，这是一个相当简单的过程。如本方案“解决方案”部分的第\
    \ 2 步所示，使用了 `PACK_STGTAB_BASELINE` 函数（参见 表 12-10）。该函数在要导出的计划基线类型方面提供了相当大的灵活性。你可以将提取的计划基线限制为特定用户、或已启用的、或已接受的，等等。\n\
    \n同样，`DBMS_SPM.UNPACK_STGTAB_BASELINE` 函数在从暂存表提取并加载到目标数据库的计划基线类型方面也提供了极大的灵活性。`UNPACK_STGTAB_BASELINE`\
    \ 的输入参数与 `PACK_STGTAB_BASELINE` 使用的参数相同（在 表 12-10 中描述）。\n\n![images](img/t1210.jpg)\n\
    \n## 第 13 章\n\n## 配置优化器\n\n成本优化器为 SQL 语句确定最高效的执行计划。优化器在很大程度上依赖于你（或数据库）收集的统计信息。本章解释如何设置优化器目标以及如何控制优化器的行为。你将学习如何启用和禁用数据库的自动统计信息收集，以及何时手动收集统计信息。你将学习如何设置统计信息收集的首选项，以及如何在让优化器使用新统计信息之前对其进行验证。本章还解释了如何锁定统计信息、导出统计信息、收集系统统计信息、恢复旧版本的统计信息，以及如何处理缺失的统计信息。\n\
    \n绑定窥探行为（即优化器在解析 SQL 语句时查看绑定变量值）可能对执行计划产生不可预测的影响。本章解释了自适应游标共享，该功能旨在基于绑定变量的具体值来生成执行计划。\n\
    \n收集大表的统计信息始终是个问题，本章展示了如何使用增量统计信息收集功能来加速大型分区表的统计信息收集。你还将学习如何使用新的并发统计信息收集功能来优化大表的统计信息收集。\n\
    \n为表达式和列组收集扩展统计信息可以提高优化器性能，你将学习如何收集这些类型的统计信息。本章还解释了如何让数据库告诉你表中的哪些列是创建列组的候选列。\n\
    \n### 13-1. 选择优化器目标\n\n#### 问题\n\n你想为数据库设置成本优化器目标。\n\n#### 解决方案\n\n你可以通过设置优化器目标来影响成本优化器的行为。优化器将根据你设置的目标收集相应的统计信息。你使用\
    \ `optimizer_mode` 初始化参数来设置优化器目标。你可以将该参数设置为 `ALL_ROWS` 或 `FIRST_ROWS_n`，如下所示：\n\
    ```sql\noptimizer_mode=all_rows\noptimizer_mode=first_rows_n          /* n 可以是\
    \ 1,10,100 或 1000 */\n```\n\n`optimizer_mode` 参数的默认值是 `ALL_ROWS`。\n\n#### 工作原理\n\
    \n`optimizer_mode` 参数的默认值 `ALL_ROWS` 的目标是最大化吞吐量——它最小化完成整个语句处理并获取所有请求行所需的资源使用。替代值\
    \ `FIRST_ROWS_n` 使用的目标是响应时间，即返回前 *n* 行所需的时间。\n\n如果你将 `optimizer_mode` 参数设置为 `FIRST_ROWS_n`，所有会话都将使用最佳响应时间的优化器目标。但是，你也可以仅在会话级别更改优化器目标，方法是执行如下\
    \ SQL 语句：\n```sql\nSQL> alter session set optimizer_mode=first_rows_1;\n```\n\n\
    请注意，`ALL_ROWS` 优化器模式设置偏向于全表扫描，因为其目标是最小化资源使用。另一方面，`FIRST_ROWS_n` 设置则倾向于索引访问，因为其目标是最小化响应时间，从而尽可能快地返回请求的行数。\n\
    \n除了 `optimizer_mode` 参数外，你还可以设置以下参数来影响优化器的行为：\n*   `optimizer_index_caching`\n\
    *   `optimizer_index_cost_adj`\n*   `db_file_multiblock_read_count`\n\n通常，在数据库级别更改这些参数可能会导致优化器行为出现意外情况，包括某些查询的性能可能恶化。推荐的做法是将这些参数保持在其默认级别。不过，我们确实展示了（方案\
    \ 13-11）如何在会话级别使用其中一个参数（`optimizer_index_cost_adj`）来提高长时间运行的查询的性能，方法是强制优化器使用索引。\n\
    \n### 13-2. 启用自动统计信息收集\n\n#### 问题\n\n你想在数据库中启用自动统计信息收集。\n\n![images](img/square.jpg)\
    \ **提示** Oracle 建议启用自动优化器统计信息收集。\n"
- fmt: "# Solution\n\nYou enable automatic statistics collection by using the `enable`\
    \ procedure in the `DBMS_AUTO_TASK_ADMIN` package. Check the status of the auto\
    \ optimizer stats collection task in the following way:\n\n```sql\nSQL> select\
    \ client_name,status from dba_autotask_client;\n\nCLIENT_NAME                \
    \                                          STATUS\n----------------------------------------------------------------\
    \ --------\nauto optimizer stats collection                                  \
    \   DISABLED\nauto space advisor                                             \
    \     ENABLED\nsql tuning advisor                                            \
    \      ENABLED\nSQL>\n```\n\nExecute the `dbms_auto_task_admin.enable` procedure\
    \ to enable the automatic statistics collection task:\n\n```sql\nSQL> begin dbms_auto_task_admin.enable(\n\
    \  2  client_name=>'auto optimizer stats collection',\n  3  operation=>NULL,\n\
    \  4  window_name=>NULL);\n  5  end;\n  6  /\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\nCheck the status of the `auto optimizer stats collection`\
    \ task:\n\n```sql\nSQL>  SELECT client_name,status from dba_autotask_client;\n\
    \nCLIENT_NAME                                                          STATUS\n\
    ---------------------------------------------------------------- --------\nauto\
    \ optimizer stats collection                                     ENABLED\nauto\
    \ space advisor                                                  ENABLED\nsql\
    \ tuning advisor                                                  ENABLED\n\n\
    SQL>\n```\n\nYou can disable the statistics collection task by using the `dbms_auto_task_admin.disable`\
    \ procedure:\n\n```sql\nSQL> begin\n  2  dbms_auto_task_admin.disable(\n  3  client_name=>\
    \ 'auto optimizer stats collection',\n  4  operation=> NULL,\n  5  window_name=>\
    \ NULL);\n  6  end;\n  7  /\n\nPL/SQL procedure successfully completed.\n\nSQL>\n\
    ```\n\n# How It Works\n\nAutomatic optimizer statistics collection is enabled\
    \ by default when you create a database with the DBCA. If you've disabled automatic\
    \ statistics collection, you can enable it by executing the procedure shown in\
    \ the \"Solution\" section. Once you enable automatic statistics collection, the\
    \ database collects statistics whenever they get stale—the database determines\
    \ this based on the changes made to the tables and indexes. Automating statistics\
    \ collection eliminates all the work involved in collecting statistics yourself.\n\
    \nWhen you enable automatic optimizer statistics collection, the \"auto optimizer\
    \ stats collection\" task calls the `DBMS_STATS.GATHER_DATABASE_STATS_JOB_PROC`\
    \ procedure. This procedure is virtually identical to the `DBMS_STATS.GATHER_DATABASE_STATS`\
    \ procedure—the big difference is that the database will collect the statistics\
    \ only during the maintenance window that you specify. If you don't specify a\
    \ maintenance window, the database uses the default maintenance window, which\
    \ opens every night from 10 p.m. to 6 a.m. and all day on weekends. The \"auto\
    \ optimizer stats collection\" job collects statistics first for those objects\
    \ that need the new statistics the most. Thus, the auto statistics collection\
    \ job will first collect statistics for objects that don't have any statistics,\
    \ or objects that underwent substantial modifications (usually about 10% of the\
    \ rows). This way, if the statistics collection job doesn't complete before the\
    \ end of the maintenance window, the database ensures that objects with the stalest\
    \ statistics are refreshed for sure.\n\nYou can query the `DBA_OPTSTAT_OPERATIONS`\
    \ view to find out the beginning and ending times for the automatic statistics\
    \ collection job, as shown here:\n\n```sql\nSQL> select operation,target,start_time,end_time\
    \ from dba_optstat_operations\n2*   where operation='gather_database_stats(auto)';\n\
    \nOPERATION                      START_TIME                       END_TIME\n---------------------\
    \          ----------------------------     ----------------------------\ngather_database_stats\
    \          26-APR-11 10.00.02.970000 PM     26-APR-11 10.03.11.671000 PM\n…\n\
    SQL>\n```\n\n![images](images/square.jpg) Tip: Automatic statistics collection\
    \ works very well with OLTP databases whose data changes moderately on a day-to-day\
    \ basis, but not for most data warehouses that perform nightly data loading from\
    \ ETL jobs.\n\nThe `DBA_TAB_MODIFICATIONS` view stores information about the inserts,\
    \ deletes, and updates to a table. By default, the `OPTIONS` parameter for the\
    \ `GATHER_DATABASE_STATS` procedure is set to the value `GATHER AUTO`. What this\
    \ means is that once you enable automatic statistics collection, the database\
    \ will collect statistics for all tables where more than 10% of the rows have\
    \ been affected by `insert`, `delete`, and `update` operations.\n\nAutomatic statistics\
    \ collection by the database works well for most OLTP databases. However, in a\
    \ data warehouse environment, you may run into issues because the automatic statistics\
    \ collection job runs during the nightly maintenance window. If your ETL or ELT\
    \ jobs load data into a table after the auto job has already collected statistics\
    \ for that table, you could end up with unrepresentative statistics for that table.\
    \ In a data warehouse environment, it's a good idea to collect statistics manually\
    \ right after the load process completes and disable the default automatic statistics\
    \ collection job.\n\nNote that in addition to collecting statistics for all schema\
    \ objects, the auto stats job also gathers dictionary statistics (for the SYS\
    \ and SYSTEM schemas).\n\n# Problem\n\nYou want to set default values for the\
    \ parameters used by the `DBMS_STATS` procedures that gather various types of\
    \ statistics.\n\n# Solution\n\nUse the appropriate `DBMS_STATS.SET_*_PREFS` procedure\
    \ to change the default values for parameters that control statistics collection.\
    \ Use the following procedures for changing the default values of the parameters\
    \ used at various levels of statistics collection:\n\n*   `SET_TABLE_PREFS`: Lets\
    \ you specify default parameters to be used by the `DBMS_STATS.GATHER_*_STATS`\
    \ procedures for a specific table\n*   `SET_SCHEMA_PREFS`: Lets you change the\
    \ default parameters to be used by the `DBMS_STATS.GATHER_*_STATS` procedures\
    \ for all objects in a specific schema\n*   `SET_DATABASE_PREFS`: Lets you change\
    \ the default parameters to be used by the `DBMS_STATS.GATHER_*_STATS` procedures\
    \ for the entire database, including all user schemas and system schemas such\
    \ as SYS and SYSTEM\n*   `SET_GLOBAL_PREFS`: Sets global statistics preferences;\
    \ this procedure lets you change the default statistic collection parameters for\
    \ any object in the database that doesn't have an existing preference at the table\
    \ level. If you don't set table-level preferences or you don't set any parameter\
    \ explicitly in the `DBMS_STATS.GATHER_*_STATS` procedure, the parameters default\
    \ to their global settings.\n\nHere's an example that shows how to set default\
    \ preferences at the database level by invoking the `SET_DATABASE_PREFS` procedure:\n\
    \n```sql\nSQL>  execute dbms_stats.set_database_prefs('ESTIMATE_PERCENT','20');\n\
    ```\n\nOnce you set a preference for a parameter at the database level, it applies\
    \ to all tables in the database. Note that the `SET_*_PREFS` procedures accept\
    \ three parameters:\n\n*   `pname` refers to the name of the preference, such\
    \ as the `ESTIMATE_PERCENT` preference used in the previous example.\n*   `pvalue`\
    \ lets you specify a value for the preference. If you specify `NULL` as the value\
    \ for the `pvalue` parameter, the preference's value will be set to the Oracle\
    \ default values.\n*   `add_sys` is an optional parameter that, if set to `TRUE`,\
    \ will also include all Oracle-owned tables in the statistics collection process."
  raw: '#### Solution


    You enable automatic statistics collection by using the `enable` procedure in
    the `DBMS_AUTO_TASK_ADMIN` package. Check the status of the auto optimizer stats
    collection task in the following way:


    `SQL> select client_name,status from dba_autotask_client;`


    `CLIENT_NAME                                                      STATUS`

    `---------------------------------------------------------------- --------`

    `auto optimizer stats collection                                  DISABLED`

    `auto space advisor                                               ENABLED`

    `sql tuning advisor                                               ENABLED`

    `SQL>`


    Execute the `dbms_auto_task_admin.enable` procedure to enable the automatic statistics
    collection task:


    `SQL> begin dbms_auto_task_admin.enable(`

    `  2  client_name=>''auto optimizer stats collection'',`

    `  3  operation=>NULL,`

    `  4  window_name=>NULL);`

    `  5  end;`

    `  6  /`


    `PL/SQL procedure successfully completed.`


    Check the status of the *auto optimizer stats collection* task:


    `SQL>  SELECT client_name,status from dba_autotask_client;`


    `CLIENT_NAME                                                      STATUS`

    `---------------------------------------------------------------- --------`

    `auto optimizer stats collection                                  ENABLED`

    `auto space advisor                                               ENABLED`

    `sql tuning advisor                                               ENABLED`


    `SQL>`


    You can disable the statistics collection task by using the `dbms_auto_task_admin.disable`
    procedure:


    `SQL> begin`

    `  2  dbms_auto_task_admin.disable(`

    `  3  client_name=> ''auto optimizer stats collection'',`

    `  4  operation=> NULL,`

    `  5  window_name=> NULL);`

    `  6  end;`

    `  7  /`


    `PL/SQL procedure successfully completed.`


    `SQL>`


    #### How It Works


    Automatic optimizer statistics collection is enabled by default when you create
    a database with the DBCA. If you''ve disabled automatic statistics collection,
    you can enable it by executing the procedure shown in the “Solution” section.
    Once you enable automatic statistics collection, the database collects statistics
    whenever they get stale—the database determines this based on the changes made
    to the tables and indexes. Automating statistics collection eliminates all the
    work involved in collecting statistics yourself.


    When you enable automatic optimizer statistics collection, the “auto optimizer
    stats collection” task calls the `DBMS_STATS.GATHER_DATABASE_STATS_JOB_PROC` procedure.
    This procedure is virtually identical to the `DBMS_STATS.GATHER_DATABASE_STATS`
    procedure—the big difference is that the database will collect the statistics
    only during the maintenance window that you specify. If you don''t specify a maintenance
    window, the database uses the default maintenance window, which opens every night
    from 10 p.m. to 6 a.m. and all day on weekends. The “auto optimizer stats collection”
    job collects statistics first for those objects that need the new statistics the
    most. Thus, the auto statistics collection job will first collect statistics for
    objects that don''t have any statistics, or objects that underwent substantial
    modifications (usually about 10% of the rows). This way, if the statistics collection
    job doesn''t complete before the end of the maintenance window, the database ensures
    that objects with the stalest statistics are refreshed for sure.


    You can query the `DBA_OPTSTAT_OPERATIONS` view to find out the beginning and
    ending times for the automatic statistics collection job, as shown here:


    `SQL> select operation,target,start_time,end_time from dba_optstat_operations`

    `2*   where operation=''gather_database_stats(auto)'';`


    `OPERATION                          START_TIME                        END_TIME`

    `---------------------    ----------------------------             ----------------------------`

    `gather_database_stats     26-APR-11 10.00.02.970000 PM            26-APR-11 10.03.11.671000
    PM`

    `…`

    `SQL>`


    ![images](images/square.jpg) **Tip** Automatic statistics collection works very
    well with OLTP databases whose data changes moderately on a day-to-day basis,
    but not for most data warehouses that perform nightly data loading from ETL jobs.


    The `DBA_TAB_MODIFICATIONS` view stores information about the inserts, deletes,
    and updates to a table. By default, the `OPTIONS` parameter for the `GATHER_DATABASE_STATS`
    procedure is set to the value `GATHER AUTO`. What this means is that once you
    enable automatic statistics collection, the database will collect statistics for
    all tables where more than 10% of the rows have been affected `by insert, delete`,
    and `update` operations.


    Automatic statistics collection by the database works well for most OLTP databases.
    However, in a data warehouse environment, you may run into issues because the
    automatic statistics collection job runs during the nightly maintenance window.
    If your ETL or ELT jobs load data into a table after the auto job has already
    collected statistics for that table, you could end up with unrepresentative statistics
    for that table. In a data warehouse environment, it''s a good idea to collect
    statistics manually right after the load process completes and disable the default
    automatic statistics collection job.


    Note that in addition to collecting statistics for all schema objects, the auto
    stats job also gathers dictionary statistics (for the SYS and SYSTEM schemas).


    #### Problem


    You want to set default values for the parameters used by the `DBMS_STATS` procedures
    that gather various types of statistics.


    #### Solution


    Use the appropriate `DBMS_STATS.SET_*_PREFS` procedure to change the default values
    for parameters that control statistics collection. Use the following procedures
    for changing the default values of the parameters used at various levels of statistics
    collection:


    *   `SET_TABLE_PREFS`: Lets you specify default parameters to be used by the `DBMS_STATS.GATHER_*_STATS`
    procedures for a specific table

    *   `SET_SCHEMA_PREFS`: Lets you change the default parameters to be used by the
    `DBMS_STATS.GATHER_*_STATS` procedures for all objects in a specific schema

    *   `SET_DATABASE_PREFS`: Lets you change the default parameters to be used by
    the `DBMS_STATS.GATHER_*_STATS` procedures for the entire database, including
    all user schemas and system schemas such as SYS and SYSTEM

    *   `SET_GLOBAL_PREFS`: Sets global statistics preferences; this procedure lets
    you change the default statistic collection parameters for any object in the database
    that doesn''t have an existing preference at the table level. If you don''t set
    table-level preferences or you don''t set any parameter explicitly in the `DBMS_STATS.GATHER_*_STATS`
    procedure, the parameters default to their global settings.


    Here''s an example that shows how to set default preferences at the database level
    by invoking the `SET_DATABASE_PREFS` procedure:


    `SQL>  execute dbms_stats.set_database_prefs(''ESTIMATE_PERCENT'',''20'');`


    Once you set a preference for a parameter at the database level, it applies to
    all tables in the database. Note that the `SET_*_PREFS` procedures accept three
    parameters:


    *   `pname` refers to the name of the preference, such as the `ESTIMATE_PERCENT`
    preference used in the previous example.

    *   `pvalue` lets you specify a value for the preference. If you specify `NULL`
    as the value for the `pvalue` parameter, the preference''s value will be set to
    the Oracle default values.

    *   `add_sys` is an optional parameter that, if set to `TRUE`, will also include
    all Oracle-owned tables in the statistics collection process.'
  trans: "# 解决方案\n\n您可以通过使用 `DBMS_AUTO_TASK_ADMIN` 包中的 `enable` 过程来启用自动统计信息收集。可通过以下方式检查自动优化器统计信息收集任务的状态：\n\
    \n```sql\nSQL> select client_name,status from dba_autotask_client;\n\nCLIENT_NAME\
    \                                                          STATUS\n----------------------------------------------------------------\
    \ --------\nauto optimizer stats collection                                  \
    \   DISABLED\nauto space advisor                                             \
    \     ENABLED\nsql tuning advisor                                            \
    \      ENABLED\nSQL>\n```\n\n执行 `dbms_auto_task_admin.enable` 过程以启用自动统计信息收集任务：\n\
    \n```sql\nSQL> begin dbms_auto_task_admin.enable(\n  2  client_name=>'auto optimizer\
    \ stats collection',\n  3  operation=>NULL,\n  4  window_name=>NULL);\n  5  end;\n\
    \  6  /\n\nPL/SQL procedure successfully completed.\n```\n\n检查 `auto optimizer\
    \ stats collection` 任务的状态：\n\n```sql\nSQL>  SELECT client_name,status from dba_autotask_client;\n\
    \nCLIENT_NAME                                                          STATUS\n\
    ---------------------------------------------------------------- --------\nauto\
    \ optimizer stats collection                                     ENABLED\nauto\
    \ space advisor                                                  ENABLED\nsql\
    \ tuning advisor                                                  ENABLED\n\n\
    SQL>\n```\n\n您可以使用 `dbms_auto_task_admin.disable` 过程来禁用统计信息收集任务：\n\n```sql\nSQL>\
    \ begin\n  2  dbms_auto_task_admin.disable(\n  3  client_name=> 'auto optimizer\
    \ stats collection',\n  4  operation=> NULL,\n  5  window_name=> NULL);\n  6 \
    \ end;\n  7  /\n\nPL/SQL procedure successfully completed.\n\nSQL>\n```\n\n# 工作原理\n\
    \n当您使用 DBCA 创建数据库时，自动优化器统计信息收集默认是启用的。如果您已禁用自动统计信息收集，可以通过执行“解决方案”部分所示的过程来重新启用它。一旦启用自动统计信息收集，数据库会在统计信息变得过时时收集它们——数据库根据对表和索引所做的更改来判断这一点。自动化统计信息收集消除了您自己收集统计信息所涉及的所有工作。\n\
    \n当您启用自动优化器统计信息收集时，“auto optimizer stats collection”任务会调用 `DBMS_STATS.GATHER_DATABASE_STATS_JOB_PROC`\
    \ 过程。该过程与 `DBMS_STATS.GATHER_DATABASE_STATS` 过程几乎相同——最大的区别在于数据库仅在您指定的维护窗口内收集统计信息。如果您未指定维护窗口，数据库将使用默认的维护窗口，该窗口在每个晚上\
    \ 10 点至早上 6 点以及周末全天开放。“auto optimizer stats collection”作业首先为最需要新统计信息的对象收集统计信息。因此，自动统计信息收集作业将首先为没有任何统计信息的对象，或经历了大量修改（通常是大约\
    \ 10%的行）的对象收集统计信息。这样，如果统计信息收集作业在维护窗口结束前未能完成，数据库可以确保最过时的统计信息对应的对象一定会被刷新。\n\n您可以查询\
    \ `DBA_OPTSTAT_OPERATIONS` 视图以了解自动统计信息收集作业的开始和结束时间，如下所示：\n\n```sql\nSQL> select\
    \ operation,target,start_time,end_time from dba_optstat_operations\n2*   where\
    \ operation='gather_database_stats(auto)';\n\nOPERATION                      START_TIME\
    \                       END_TIME\n---------------------          ----------------------------\
    \     ----------------------------\ngather_database_stats          26-APR-11 10.00.02.970000\
    \ PM     26-APR-11 10.03.11.671000 PM\n…\nSQL>\n```\n\n![提示](img/square.jpg) 提示：自动统计信息收集对于数据日常变化程度适中的\
    \ OLTP 数据库效果非常好，但对于大多数执行夜间 ETL 作业数据加载的数据仓库则不然。\n\n`DBA_TAB_MODIFICATIONS` 视图存储了关于表插入、删除和更新的信息。默认情况下，`GATHER_DATABASE_STATS`\
    \ 过程的 `OPTIONS` 参数被设置为 `GATHER AUTO`。这意味着一旦启用自动统计信息收集，数据库将为所有行受到 `insert`、`delete`\
    \ 和 `update` 操作影响超过 10%的表收集统计信息。\n\n数据库的自动统计信息收集对大多数 OLTP 数据库效果良好。然而，在数据仓库环境中，您可能会遇到问题，因为自动统计信息收集作业在夜间维护窗口运行。如果您的\
    \ ETL 或 ELT 作业在自动作业已收集完某张表的统计信息之后才将数据加载到该表中，您最终可能得到该表不具代表性的统计信息。在数据仓库环境中，在加载过程完成后立即手动收集统计信息并禁用默认的自动统计信息收集作业是一个好主意。\n\
    \n请注意，自动统计作业除了收集所有模式对象的统计信息外，还收集字典统计信息（针对 SYS 和 SYSTEM 模式）。\n\n# 问题\n\n您想要为 `DBMS_STATS`\
    \ 过程使用的参数设置默认值，这些过程用于收集各种类型的统计信息。\n\n# 解决方案\n\n使用适当的 `DBMS_STATS.SET_*_PREFS`\
    \ 过程来更改控制统计信息收集的参数的默认值。使用以下过程来更改在统计信息收集各个级别使用的参数的默认值：\n\n*   `SET_TABLE_PREFS`：允许您为特定表指定\
    \ `DBMS_STATS.GATHER_*_STATS` 过程使用的默认参数\n*   `SET_SCHEMA_PREFS`：允许您更改用于特定模式中所有对象的\
    \ `DBMS_STATS.GATHER_*_STATS` 过程的默认参数\n*   `SET_DATABASE_PREFS`：允许您更改用于整个数据库（包括所有用户模式和系统模式如\
    \ SYS 和 SYSTEM）的 `DBMS_STATS.GATHER_*_STATS` 过程的默认参数\n*   `SET_GLOBAL_PREFS`：设置全局统计信息首选项；此过程允许您更改数据库中任何尚未在表级别设置首选项的对象的默认统计信息收集参数。如果您未设置表级首选项或未在\
    \ `DBMS_STATS.GATHER_*_STATS` 过程中显式设置任何参数，则参数将默认为其全局设置。\n\n以下示例展示了如何通过调用 `SET_DATABASE_PREFS`\
    \ 过程在数据库级别设置默认首选项：\n\n```sql\nSQL>  execute dbms_stats.set_database_prefs('ESTIMATE_PERCENT','20');\n\
    ```\n\n一旦您在数据库级别设置了某个参数的首选项，它将应用于数据库中的所有表。请注意，`SET_*_PREFS` 过程接受三个参数：\n\n*   `pname`\
    \ 指的是首选项的名称，例如前面示例中使用的 `ESTIMATE_PERCENT` 首选项。\n*   `pvalue` 允许您为首选项指定一个值。如果您为\
    \ `pvalue` 参数指定 `NULL` 作为值，则首选项的值将被设置为 Oracle 默认值。\n*   `add_sys` 是一个可选参数，如果设置为\
    \ `TRUE`，则还将包括所有 Oracle 拥有的表在统计信息收集过程中。"
- fmt: '#### How It Works


    所有 `DBMS_STATS.GATHER_*_STATS` 过程都使用参数的默认值。有两种方式可以为 `DBMS_STATS` 包中过程（例如 `GATHER_TABLE_STATS`
    过程）的各个参数指定值。您可以在执行 `GATHER_TABLE_STATS` 等过程来收集统计信息时指定偏好值。或者，您也可以使用适当的 `DBMS_STATS.SET_*_PREFS`
    过程，在表、方案、数据库或全局级别更改偏好的默认值，如“解决方案”部分所示。如果您未为任何统计信息收集参数指定值，数据库将使用该参数的默认值。


    您可以通过执行 `DBMS_STATS.GET_PREFS` 过程来查找任何偏好的默认值。以下示例展示了如何查找 `STALE_PERCENT` 参数的当前设置值：


    ```sql

    SQL> select dbms_stats.get_prefs (''STALE_PERCENT'',''SH'') stale_percent from
    dual;


    STALE_PERCENT

    --------------------------------------------------------------------------------


    10


    SQL>

    ```


    您在表、方案或数据库级别收集统计信息时，需要指定类似的偏好。以下是您可以指定的各种偏好的描述，用于控制数据库收集统计信息的方式。


    ##### CASCADE


    此参数指定数据库是否应随表统计信息一起收集索引统计信息。默认情况下，数据库会自动为表的所有索引收集统计信息（`cascade=true`）。


    ##### DEGREE


    此参数指定数据库在收集统计信息时必须使用的并行度。Oracle 建议使用常量 `DBMS_STATS.AUTO_DEGREE` 的默认设置。Oracle 会根据对象和与并行度相关的初始化参数选择正确的并行度。当您使用默认的
    `DBMS_STATS.AUTO_DEGREE` 设置时，Oracle 会根据对象的大小确定并行度。如果对象足够小，Oracle 会以串行方式收集统计信息；如果对象很大，Oracle
    会根据 CPU 数量使用默认的并行度。请注意，默认并行度是 `NULL`，这意味着仅当您使用 `DEGREE` 子句在表级别设置了并行度，数据库才会使用并行方式收集统计信息。


    ##### ESTIMATE_PERCENT


    此参数指定数据库用于估算统计信息的行百分比。对于大表，估算是唯一能在合理时间内完成统计信息收集过程的方式——统计信息收集并非简单过程——它对资源密集型，且对大表消耗大量时间。您可以为
    `estimate_percent` 参数设置 0 到 100 之间的值。一个经验法则是，表的数据越均匀，所需的样本量就越小。另一方面，如果表的数据高度倾斜，则应使用更大的样本量来捕获数据分布的差异。当然，将此参数设置为
    100 意味着数据库不进行估算——它将收集表中每一行的统计信息。通常，DBA 会将 `estimate_percent` 参数设置得过高，因为他们曾在设置小样本量时对某个表有过糟糕的体验。如果您认为数据分布均匀，即使
    1% 或 2% 的样本也能为您提供非常准确的统计信息，并节省大量时间和处理开销。


    ![images](images/square.jpg) **Tip** 在 Oracle Database 11g 中，通过将 `estimate_percent`
    参数设置为 `DBMS_STATS.AUTO_SAMPLE_SIZE` 计算的关键统计信息 NDV（不同值的数量），在统计学上与通过 100% 完整统计信息计算的
    NDV 计数是相同的。最佳实践是从 `AUTO_SAMPLE_SIZE` 开始，仅在必要时才设置您自己的样本大小。


    为 `estimate_percent` 参数选择最佳大小并不容易——如果设置得太高，收集统计信息会花费很长时间。如果设置得太低，您确实可以快速收集统计信息，但这些统计信息很可能不准确。默认情况下，数据库使用常量
    `DBMS_STATS.AUTO_SAMPLE_SIZE` 来确定最佳样本大小。您可以通过以下方式为 `estimate_percent` 参数指定 `AUTO`
    值：


    ```sql

    SQL> exec dbms_stats.gather_table_stats(NULL, ''MASSIVE_TABLE'', estimate_percent=>

    dbms_stats.auto_sample_size)

    ```


    当您为 `estimate_percent` 参数设置 `AUTO` 值时，数据库不仅会自动确定采样大小，还会随着数据分布的变化调整样本大小。NDV 是评估不同样本大小收集的统计信息准确性的一个好标准。列的
    NDV 定义如下：


    `accuracy rate = 1 - (estimated NDV - actual NDV) /actual NDV`


    准确率范围在 0% 到 100% 之间。100% 的样本大小总会给您 100% 的准确率——重要的是，在 Oracle 11g 中，自动采样提供的准确率非常接近
    100%，并且只占用为大表收集完整统计信息所需时间的一小部分。'
  raw: '#### How It Works


    All `DBMS_STATS.GATHER_*_STATS` procedures use default values for the various
    parameters. There are two ways you can handle the specification of values for
    the various parameters that are part of the procedures in the `DBMS_STATS` package
    such as the `GATHER_TABLE_STATS` procedure. You can specify the preference values
    when you execute a procedure such as `GATHER_TABLE_STATS` to collect statistics.
    Alternatively, you can change the default values of the preferences at the table,
    schema, database, or global level with the appropriate `DBMS_STATS.SET_*_PREFS`
    procedure, as shown in the “Solution” section. If you don''t specify a value for
    any of the statistics gathering parameters, the database uses the default value
    for that parameter.


    You can find the default value of any preference by executing the `DBMS_STATS.GET_PREFS`
    procedure. The following example shows how to find the value of the current setting
    of the `STALE_PERCENT` parameter:


    `SQL> select dbms_stats.get_prefs (''STALE_PERCENT'',''SH'') stale_percent from
    dual;`


    `STALE_PERCENT`

    `--------------------------------------------------------------------------------`


    `10`


    `SQL>`


    You specify similar preferences when you collect statistics at the table, schema,
    or database level. Here is a description of the various preferences you can specify
    to control the way the database gathers statistics.


    ##### CASCADE


    This specifies whether the database should collect index statistics along with
    the table statistics. By default, the database automatically collects statistics
    (`cascade=true`) for all of a table''s indexes.


    ##### DEGREE


    This specifies the degree of parallelism the database must use when gathering
    statistics. Oracle recommends using the default setting of the constant `DBMS_STATS.AUTO_DEGREE`.
    Oracle chooses the correct degree of parallelism based on the object and the parallelism-related
    initialization parameters. When you use the default `DBMS_STATS.AUTO_DEGREE` setting,
    Oracle determines the degree of parallelism based on the size of the object. If
    the object is small enough, Oracle collects statistics serially, and if the object
    is large, Oracle uses the default degree of parallelism based on the number of
    CPUs. Note that the default degree is `NULL`, which means that the database collects
    statistics using parallelism only if you set the degree of parallelism at the
    table level with the `DEGREE` clause.


    ##### ESTIMATE_PERCENT


    This specifies the percentage of rows the database must use to estimate the statistics.
    For large tables, estimation is the only way to complete the statistics collection
    process within a reasonable time—statistics collection is not a trivial process—it''s
    resource-intensive and consumes a lot of time for large tables. You can set a
    value between 0 and 100 for the `estimate_percent` parameter. A rule of thumb
    here is that the more uniform a table''s data, the smaller the sample size can
    be. On the other hand, if a table''s data is highly skewed, you should use a higher
    sample size to capture the variations in the data distribution. Of course, setting
    this parameter to 100 means that the database isn''t doing an estimation—it will
    collect statistics for each row in a table. Often, DBAs set the `estimate_percent`
    parameter too high, because they''ve had bad experiences with a table when they
    set a small sample size. If you think the data is uniformly distributed, even
    a 1 or 2% sample will get you very accurate statistics, and save you a bunch of
    time and processing overhead.


    ![images](images/square.jpg) **Tip** In Oracle Database 11g, the NDV (number of
    distinct values) count, which is a key statistic calculated by setting the `estimate_percent`
    parameter to `DBMS_STATS.AUTO_SAMPLE_SIZE`, is statistically identical to the
    NDV count calculated by a 100% complete statistics collection. The best practice
    is to start with the `AUTO_SAMPLE_SIZE` and set your own sample size only if you
    have to.


    It''s not easy to select the best size for the `estimate_percent` parameter—if
    you set it too high, it''ll take a long time to collect statistics. If you set
    it too low, you can gather the statistics quickly all right, but those statistics
    can very well be inaccurate. By default, the database uses the constant `DBMS_STATS.AUTO_SAMPLE_SIZE`
    to determine the best sample size. You specify the `AUTO` value for the `estimate_percent`
    parameter in the following way:


    `SQL> exec dbms_stats.gather_table_stats(NULL, ''MASSIVE_TABLE'', estimate_percent=>`

    `dbms_stats.auto_sample_size)`


    When you set the `AUTO` value for the `estimate_percent` parameter, not only does
    the database automatically determine the sampling size, but it also adjusts the
    size of the sample as the data distribution changes. NDV is a good criterion to
    calculate the accuracy of the statistics collected with varying samples sizes.
    The NDV of a column is defined as follows:


    `accuracy rate = 1 - (estimated NDV - actual NDV) /actual NDV`


    The accuracy rate can range over 0 to 100%. A 100% sample size will always give
    you a 100% accuracy rate—what is significant is that in Oracle 11g, auto sampling
    provides accuracy rates that are very close to 100%, and take a fraction of the
    time it takes to collect complete statistics for a large table.'
