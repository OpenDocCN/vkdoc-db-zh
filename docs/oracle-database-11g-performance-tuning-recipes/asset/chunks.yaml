  trans: '#### 问题


    你需要判断是应该让数据库自动收集优化器统计信息，还是必须手动收集这些统计信息。


    #### 解决方案


    在大多数情况下，自动统计信息收集任务足以收集优化器统计信息。事实上，许多生产环境的数据库都如**配方 13-2**所示，实现了统计信息自动收集，并且从未使用手动统计信息收集流程。然而，在某些情况下，手动收集统计信息可能是必要的。以下是两种必须手动收集统计信息的场景。


    ##### 易变表


    如果你的数据库中包含在一天内经历大量删除（甚至截断）操作的**易变表**，那么在夜间维护窗口运行的自动统计信息收集作业可能就不够充分了。对于表数据在一天中持续波动的情况，你可以采用以下几种策略：


    *   在表的行数处于其“典型”状态时收集统计信息。完成后，锁定这些统计信息，以防止自动统计信息收集作业在夜间维护窗口为该表收集新的统计信息。

    *   另一种选择是将表的统计信息设为 null。


    你可以先删除统计信息，然后立即锁定表的统计信息，从而将表的统计信息设为 null，如下例所示：


    ```

    SQL> execute dbms_stats.delete_table_stats(''OE'',''ORDERS'');


    PL/SQL procedure successfully completed.


    SQL> execute dbms_stats.lock_table_stats(''OE'',''ORDERS'');


    PL/SQL procedure successfully completed.


    SQL>

    ```


    ##### 批量加载表


    对于你进行批量数据加载的表，必须在加载数据后立即收集统计信息。如果你没有在批量加载数据后立即收集统计信息，数据库仍可以使用动态采样来估算统计信息，但这些统计信息不如你手动收集的统计信息全面。


    #### 工作原理


    在 Oracle Database 10g 版本引入自动优化器统计信息收集功能之前，每位 DBA 都会使用推荐的 `DBMS_STATS` 包（甚至更早的
    `analyze table` 命令）来编写脚本收集统计信息。有了自动统计信息收集，DBA 就不必再通过调度 `DBMS_STATS` 作业来收集优化器统计信息了。然而，你仍然可能会遇到自动统计信息收集不合适的情况。“解决方案”部分描述了两种这样的情况，以及如何通过手动收集统计信息来处理它们。


    你可以通过使用相应的 `DBMS_STATS.GATHER_*_STATS` 过程，在表、模式或数据库级别手动收集统计信息。


    当你手动收集优化器统计信息时，建议坚持使用控制数据库如何收集统计信息的各个参数的默认设置。通常，当恢复为默认设置时，统计信息收集作业的性能（速度）和统计信息本身的质量都会得到改善。例如，许多
    DBA 通过 `estimate_percent` 参数设置了过高的采样比例，而不是让数据库基于 `DBMS_STATS.AUTO_SAMPLE_SIZE`
    常量使用适当的采样比例。


    ### 13-5\. 锁定统计信息


    #### 问题


    你想锁定表或模式的统计信息，以冻结这些统计信息。


    #### 解决方案


    你可以通过执行相应的 `DBMS_STATS.LOCK_*` 过程来锁定表或模式的统计信息。例如，你可以使用 `DBMS_STATS` 包中的 `LOCK_TABLE_STATS`
    过程来锁定表的统计信息：


    ```

    SQL> execute dbms_stats.lock_table_stats(ownname=>''SH'',tabname=>''SALES'');


    PL/SQL procedure successfully completed.

    SQL>

    ```


    你可以通过执行以下过程来解锁表的统计信息：


    ```

    SQL> execute dbms_stats.unlock_table_stats(ownname=>''SH'',tabname=>''SALES'');


    PL/SQL procedure successfully completed.


    SQL>

    ```


    你可以使用 `DBMS_STATS.LOCK_SCHEMA_STATS` 过程来锁定模式的统计信息，如下所示：


    ```

    SQL> execute dbms_stats.lock_schema_stats(''SH'');


    PL/SQL procedure successfully completed.

    SQL>

    ```


    使用 `UNLOCK_SCHEMA_STATS` 过程解锁统计信息：


    ```

    SQL> execute dbms_stats.unlock_schema_stats(''SH'');


    PL/SQL procedure successfully completed.


    SQL>

    ```


    #### 工作原理


    你可能希望锁定表的统计信息以冻结当前的统计信息集。你也可以先删除现有统计信息然后再锁定——在这种情况下，你是强制数据库使用动态采样来估算表的统计信息。删除表的统计信息然后锁定，在效果上等同于将表的统计信息设为
    null。你可以选择在使用 `GATHER_TABLE__STATS` 过程时设置 `force` 参数来覆盖表对其统计信息的锁定。


    ![images](img/square.jpg) **注意** 锁定表也会锁定所有依赖于该表的统计信息，例如索引、直方图和列统计信息。


    ### 13-6\. 处理缺失统计信息


    #### 问题


    数据库中的某些表缺失统计信息，因为这些表是在夜间批处理窗口之外加载数据的。你无法在白天数据库处理其他工作负载时收集这些表的统计信息。


    #### 解决方案


    Oracle 使用动态采样来弥补缺失的统计信息。当你启用动态采样时，数据库将扫描表中数据块的随机样本。你可以通过设置 `optimizer_dynamic_sampling`
    初始化参数在数据库中启用/禁用动态采样。默认情况下动态采样是启用的，如下所示：


    ```

    SQL> sho parameter dynamic


    NAME                                  TYPE        VALUE

    ------------------------------------ ----------- -----

    optimizer_dynamic_sampling           integer     2

    SQL>

    ```


    动态采样的默认级别是 2——将其设置为 0 将禁用动态采样。你可以通过设置不同的采样级别来修改默认值，如下所示：


    ```

    SQL> alter system set optimizer_dynamic_sampling=4 scope=both;

    System altered.


    SQL>

    ```'
- fmt: "#### How It Works\n\n理想情况下，您应该使用 `DBMS_STATS` 包（手动或通过自动统计信息收集）来收集优化器统计信息。在您没有机会为新创建或新加载的表收集统计信息的情况下，该表将不会有任何统计信息，直到数据库通过其自动统计信息收集作业自动生成统计信息，或者您安排了手动统计信息收集作业。即使您不收集任何统计信息，数据库也会使用一些基本统计信息（如表和索引块数）来估计查询中谓词的选择性。动态采样更进一步，通过在编译时动态收集额外的统计信息来增强这些基本统计信息。当处理涉及无统计信息表的频繁执行查询时，动态采样特别有帮助。\n\
    \n![images](images/square.jpg) **注意** Oracle 不对外部表执行动态采样。\n\n动态采样是有成本的，因为数据库在查询编译期间使用资源来收集统计信息。如果您不频繁执行这些查询，数据库每次执行涉及必须动态收集统计信息的表的查询时都会产生开销。为了使动态采样真正发挥作用，它必须帮助频繁执行的查询。\n\
    \n理解动态采样级别（范围从 0 到 10）的含义很重要。请注意，各采样级别使用的样本大小以数据块为单位，而不是行数。以下是对各种动态采样级别的简要描述。\n\
    \n> *级别 1*: 对没有统计信息的所有表使用动态采样，前提是查询中至少有一个没有统计信息的非分区表；该表还必须没有任何索引，并且必须大于 32 个块（这是此级别的样本大小）。\n\
    >\n> *级别 2*: 如果查询中至少有一个表没有统计信息，则使用动态采样；样本大小为 64 个块。\n>\n> *级别 3*: 如果查询满足级别 2 的标准，并且\
    \ `WHERE` 子句谓词中有一个或多个表达式，则使用动态采样；样本大小为 64 个块。\n>\n> *级别 4*: 如果查询满足所有级别 3 的标准，并且使用复杂谓词（例如多个谓词之间的\
    \ `OR/AND` 运算符），则使用动态采样；样本大小为 64 个块。\n>\n> *级别 5–9*: 如果语句满足级别 4 的标准，则使用动态采样；这些级别的区别仅在于样本大小，范围从\
    \ 128 到 4086 个块。\n>\n> *级别 10*: 最全面的级别——它对所有语句都使用动态采样，并且使用的样本并非真正的样本，因为它会检查所有数据块以获取统计信息。\n\
    \n动态采样是对 `DBMS_STATS` 包过程收集的统计信息的补充。Oracle 通常不期望您使用此功能，因为在生成执行计划期间收集优化器统计信息有额外开销。动态采样确实有助于获得更好的基数估计，但由于涉及的开销，它更适用于数据仓库或决策支持系统中的长运行查询，而不是\
    \ OLTP 数据库中的查询。您还必须记住，通过动态采样收集的统计信息与通过 `DBMS_STATS` 过程收集的统计信息绝不相同。动态采样仅收集基本的统计信息，例如数据块数量和列的最高/最低值。如果您必须设置动态采样级别，请使用\
    \ `alter session` 语句在会话级别进行设置，而不是在数据库范围内设置。\n\n### 13-7. 导出统计信息\n\n#### 问题\n\n\
    您想要将一组统计信息从您的生产数据库导出到一个小得多的测试数据库。\n\n#### 解决方案\n\n您可以使用 `DBMS_STATS.EXPORT_*_STATS`\
    \ 过程将优化器统计信息从一个数据库导出到另一个数据库。这些过程允许您从源表、方案或数据库导出优化器统计信息。完成统计信息导出后，您必须执行一个 `DBMS_STATS.IMPORT_*_STATS`\
    \ 过程，将统计信息导入不同的数据库。您可以在表、方案或数据库级别导出统计信息。以下是一个说明如何从表导出统计信息的示例。\n\n1.  创建一个表来保存导出的统计信息：\n\
    \    ```sql\n    SQL> execute dbms_stats.create_stat_table(ownname=>'SH',stattab=>'mytab',\n\
    \                                             tblspace=>'USERS')\n\n    PL/SQL\
    \ procedure successfully completed.\n\n    SQL>\n    ```\n\n2.  使用 `DBMS_STATS.EXPORT_*STATS`\
    \ 过程将表 `SH.SALES` 的统计信息从数据字典导出到 `mytab` 表。\n    ```sql\n    SQL> exec dbms_stats.export_table_stats(ownname=>\
    \ 'SH',tabname=>'SALES',stattab=>\n    'mytab')\n\n    PL/SQL procedure successfully\
    \ completed.\n\n    SQL>\n    ```\n\n3.  在另一个数据库中，使用 `DBMS_STATS.IMPORT_*STATS`\
    \ 过程导入统计信息。\n    ```sql\n    SQL> exec dbms_stats.import_table_stats(ownname=>'SH',tabname=>'SALES',stattab=>\n\
    \    'MyTab',no_invalidate=>true);\n\n    PL/SQL procedure successfully completed.\n\
    \n    SQL>\n    ```\n\n#### 工作原理\n\n`EXPORT_TABLE_STATS` 过程从数据字典导出表的当前统计信息，并将它们存储在您创建的表中。请注意，此过程不会生成新的统计信息，数据库将继续使用该表（在我们的示例中是\
    \ `SH.SALES`）的当前统计信息。默认情况下，`cascade` 选项为 `true`，这意味着该过程将同时导出 `SH.SALES` 表中所有索引的统计信息以及列统计信息。\n\
    \n只有在将导出的统计信息导入到数据字典（在相同或不同的数据库中）后，才能使优化器使用这些统计信息。`IMPORT_TABLE_STATS` 过程将您之前导出的统计信息导入到数据字典中。将\
    \ `no_invalidate` 参数设置为 `true`（默认为 `false`）可确保任何依赖的游标不会失效。默认情况下，当统计信息被锁定时，您无法导入表的统计信息。您可以通过将\
    \ `force` 参数设置为 `true` 来覆盖此属性。如果您要将统计信息导入到与导出统计信息不同的数据库，则必须将存储统计信息的表导出到目标数据库。然后，您必须在执行\
    \ `IMPORT_TABLE_STATS` 过程之前将该表导入到目标数据库中。\n\n导出和导入统计信息是在测试系统中向优化器呈现与生产系统中相同的统计信息以确保执行计划一致的理想方法。当您想要保留一组已知良好的统计信息的时间超过“恢复统计信息”功能（在配方\
    \ 13-8 中解释）所允许的时间时，这也是一个很好的策略。导出和导入统计信息的功能使您可以在决定哪组参数最适合您的数据库之前，测试不同的统计信息集。\n\n\
    在此配方中，我们向您展示了如何导出和导入表级统计信息。`DBMS_STATS` 包还包含在列、索引、方案和数据库级别导出和导入统计信息的过程。此外，还有用于导出和导入字典统计信息、固定对象统计信息和系统统计信息的过程。\n\
    \n### 13-8. 恢复统计信息的先前版本\n\n#### 问题\n\n在收集新的统计信息后，某些查询的性能突然下降。您想看看是否可以使用一组您已知运行良好的旧统计信息。"
  raw: "#### How It Works\n\nIdeally, you should gather optimizer statistics with\
    \ the `DBMS_STATS` package (manually or through automatic statistics collection).\
    \ In cases where you don't have a chance to collect statistics for a newly created\
    \ or newly loaded table, the table won't have any statistics until the database\
    \ automatically generates the statistics through its automatic stats collection\
    \ job or when you schedule a manual statistics collection job. Even if you don't\
    \ collect any statistics, the database uses some basic statistics such as table\
    \ and index block counts to estimate the selectivity of the predicates in a query.\
    \ Dynamic sampling goes a step further, augmenting these basic statistics by dynamically\
    \ gathering additional statistics at compile time. Dynamic sampling is of particular\
    \ help when dealing with frequently executed queries that involve tables with\
    \ no statistics.\n\n![images](images/square.jpg) **Note** Oracle doesn't perform\
    \ dynamic sampling for external tables.\n\nThere's a cost to dynamic sampling,\
    \ because the database uses resources to gather statistics during query compilation.\
    \ If you don't execute these queries many times, the database incurs an overhead\
    \ each time it executes a query involving table(s) for which it must dynamically\
    \ collect statistics. For dynamic sampling to really pay off, it must help queries\
    \ that are executed frequently.\n\nIt's important to understand the significance\
    \ of the dynamic sampling levels, which can range from 0 to 10\\. Note that the\
    \ sample size used for dynamic sampling at various sampling levels is in terms\
    \ of data blocks, not rows. Here is a brief description of the various dynamic\
    \ sampling levels.\n\n> *Level 1*: Uses dynamic sampling for all tables that don't\
    \ have statistics, provided there's at least one non-partitioned table without\
    \ statistics in the query; the table must also not have any indexes and it must\
    \ be larger than 32 blocks, which is the sample size for this level.\n> \n> *Level\
    \ 2*: Uses dynamic sampling if at least one table in the query has no statistics;\
    \ sample size is 64 blocks.\n> \n> *Level 3*: Uses dynamic sampling if the query\
    \ meets the Level 2 criteria and it has one or more expressions in a `WHERE` clause\
    \ predicate; sample size is 64 blocks.\n> \n> *Level 4*: Uses dynamic sampling\
    \ if the query meets all Level 3 criteria, and in addition it uses complex predicates\
    \ such as an `OR/AND` operator between multiple predicates; sample size is 64\
    \ blocks.\n> \n> *Levels 5–9*: Use dynamic sampling if the statement meets the\
    \ Level 4 criteria; each of these levels differs only in the sample size, which\
    \ ranges from 128 to 4086 blocks.\n> \n> *Level 10*: The most comprehensive level—it\
    \ uses dynamic sampling for all statements, and the sample it uses isn't really\
    \ a sample, because it checks all data blocks to get the statistics.\n\nDynamic\
    \ sampling is a complement to the statistics collected by the `DBMS_STATS` package's\
    \ procedures. Oracle doesn't expect you to use this in general, due to the additional\
    \ overhead for gathering optimizer statistics during the generation of an execution\
    \ plan. Dynamic sampling does help in getting better cardinality estimates, but\
    \ is more suitable for longer-running queries in a data warehouse or a decision\
    \ support system, rather than for queries in an OLTP database, due to the overhead\
    \ involved. You must also keep in mind that the statistics collected through dynamic\
    \ sampling are by no means the same as the statistics collected through the `DBMS_STATS`\
    \ procedures. Dynamic sampling merely collects rudimentary statistics such as\
    \ the number of data blocks and the high and low values of columns. If you must\
    \ set a dynamic sampling level, do so at the session level with an `alter session`\
    \ statement, rather than setting it database-wide.\n\n### 13-7\\. Exporting Statistics\n\
    \n#### Problem\n\nYou want to export a set of statistics from your production\
    \ database to a much smaller test database.\n\n#### Solution\n\nYou can export\
    \ optimizer statistics from one database to another by using the `DBMS_STATS.EXPORT_*_STATS`\
    \ procedures. These procedures let you export optimizer statistics from a source\
    \ table, schema, or database. Once you complete the export of the statistics,\
    \ you must execute one of the `DBMS_STATS.IMPORT_*_STATS` procedures to import\
    \ the statistics into a different database. You can export statistics at the table,\
    \ schema, or database level. Here's an example that explains how to export statistics\
    \ from a table.\n\n1.  Create a table to hold the exported statistics: `SQL> execute\
    \ dbms_stats.create_stat_table(ownname=>'SH',stattab=>'mytab',`\n    `                                                tblspace=>'USERS')`\n\
    \n    `PL/SQL procedure successfully completed.`\n\n    `SQL>`\n2.  Export the\
    \ statistics for the table `SH.SALES` from the data dictionary into the `mytab`\
    \ table, using the `DBMS_STATS.EXPORT_*STATS` procedure. `SQL> exec dbms_stats.export_table_stats(ownname=>\
    \ 'SH',tabname=>'SALES',stattab=`\n    `>'mytab')`\n\n    `PL/SQL procedure successfully\
    \ completed.`\n\n    `SQL>`\n3.  In a different database, import the statistics\
    \ using the `DBMS_STATS.IMPORT_*STATS` procedure. `SQL> exec dbms_stats.import_table_stats(ownname=>'SH',tabname=>'SALES',stattab=>`\n\
    \    `'MyTab',no_invalidate=>true);`\n\n    `PL/SQL procedure successfully completed.`\n\
    \n    `SQL>`\n\n#### How It Works\n\nThe `EXPORT_TABLE_STATS` procedure exports\
    \ the current statistics for a table from the data dictionary and stores them\
    \ in a table that you create. Note that this procedure doesn't generate fresh\
    \ statistics and the database will continue to use the current statistics for\
    \ the table (`SH.SALES` in our example). By default, the `cascade` option is `true`,\
    \ meaning the procedure will export statistics for all indexes in the `SH.SALES`\
    \ table along with the column statistics.\n\nYou can make the optimizer use the\
    \ exported statistics only after you import them into the data dictionary, in\
    \ the same or a different database. The `IMPORT_TABLE_STATS` procedure imports\
    \ the statistics you've exported earlier, into the data dictionary. Setting the\
    \ `no_invalidate` parameter to `true` (default is `false`) ensures that any dependent\
    \ cursors aren't invalidated. By default, you can't import a table's statistics\
    \ when the statistics are locked. You can override this property by setting the\
    \ `force` parameter to `true`. If you're importing the statistics into a different\
    \ database from the one from which you exported the statistics, you must export\
    \ the table in which you stored the statistics to the target database. You must\
    \ then import the table into the target database before you can execute the `IMPORT_TABLE_STATS`\
    \ procedure.\n\nExporting and importing statistics is an ideal way to present\
    \ the same statistics to the optimizer in a test system as those in a production\
    \ system, to ensure consistent explain plans. It's also a good strategy when you\
    \ want to preserve a known set of good statistics for a longer period than what\
    \ is allowed by the “restore statistics” feature explained in Recipe 13-8\\. The\
    \ ability to export and import statistics enables you to test different sets of\
    \ statistics before deciding which set of parameters is the best for your database.\n\
    \nIn this recipe, we showed you how to export and import table-level statistics.\
    \ The `DBMS_STATS` package also contains procedures to export and import statistics\
    \ at the column, index, schema, and database level. In addition, there are procedures\
    \ for exporting and importing dictionary statistics, statistics for fixed objects,\
    \ and system statistics.\n\n### 13-8. Restoring Previous Versions of Statistics\n\
    \n#### Problem\n\nPerformance of certain queries has deteriorated suddenly after\
    \ collecting fresh statistics. You want to see if you can use an older set of\
    \ statistics that you knew worked well."
  trans: "#### 工作原理\n\n理想情况下，您应该使用 `DBMS_STATS` 包（手动或通过自动统计信息收集）来收集优化器统计信息。在您没有机会为新创建或新加载的表收集统计信息的情况下，该表将不会有任何统计信息，直到数据库通过其自动统计信息收集作业自动生成统计信息，或者您安排了手动统计信息收集作业。即使您不收集任何统计信息，数据库也会使用一些基本统计信息（如表和索引块数）来估计查询中谓词的选择性。动态采样更进一步，通过在编译时动态收集额外的统计信息来增强这些基本统计信息。当处理涉及无统计信息表的频繁执行查询时，动态采样特别有帮助。\n\
    \n![images](img/square.jpg) **注意** Oracle 不对外部表执行动态采样。\n\n动态采样是有成本的，因为数据库在查询编译期间使用资源来收集统计信息。如果您不频繁执行这些查询，数据库每次执行涉及必须动态收集统计信息的表的查询时都会产生开销。为了使动态采样真正发挥作用，它必须帮助频繁执行的查询。\n\
    \n理解动态采样级别（范围从 0 到 10）的含义很重要。请注意，各采样级别使用的样本大小以数据块为单位，而不是行数。以下是对各种动态采样级别的简要描述。\n\
    \n> *级别 1*: 对没有统计信息的所有表使用动态采样，前提是查询中至少有一个没有统计信息的非分区表；该表还必须没有任何索引，并且必须大于 32 个块（这是此级别的样本大小）。\n\
    >\n> *级别 2*: 如果查询中至少有一个表没有统计信息，则使用动态采样；样本大小为 64 个块。\n>\n> *级别 3*: 如果查询满足级别 2 的标准，并且\
    \ `WHERE` 子句谓词中有一个或多个表达式，则使用动态采样；样本大小为 64 个块。\n>\n> *级别 4*: 如果查询满足所有级别 3 的标准，并且使用复杂谓词（例如多个谓词之间的\
    \ `OR/AND` 运算符），则使用动态采样；样本大小为 64 个块。\n>\n> *级别 5–9*: 如果语句满足级别 4 的标准，则使用动态采样；这些级别的区别仅在于样本大小，范围从\
    \ 128 到 4086 个块。\n>\n> *级别 10*: 最全面的级别——它对所有语句都使用动态采样，并且使用的样本并非真正的样本，因为它会检查所有数据块以获取统计信息。\n\
    \n动态采样是对 `DBMS_STATS` 包过程收集的统计信息的补充。Oracle 通常不期望您使用此功能，因为在生成执行计划期间收集优化器统计信息有额外开销。动态采样确实有助于获得更好的基数估计，但由于涉及的开销，它更适用于数据仓库或决策支持系统中的长运行查询，而不是\
    \ OLTP 数据库中的查询。您还必须记住，通过动态采样收集的统计信息与通过 `DBMS_STATS` 过程收集的统计信息绝不相同。动态采样仅收集基本的统计信息，例如数据块数量和列的最高/最低值。如果您必须设置动态采样级别，请使用\
    \ `alter session` 语句在会话级别进行设置，而不是在数据库范围内设置。\n\n### 13-7. 导出统计信息\n\n#### 问题\n\n\
    您想要将一组统计信息从您的生产数据库导出到一个小得多的测试数据库。\n\n#### 解决方案\n\n您可以使用 `DBMS_STATS.EXPORT_*_STATS`\
    \ 过程将优化器统计信息从一个数据库导出到另一个数据库。这些过程允许您从源表、方案或数据库导出优化器统计信息。完成统计信息导出后，您必须执行一个 `DBMS_STATS.IMPORT_*_STATS`\
    \ 过程，将统计信息导入不同的数据库。您可以在表、方案或数据库级别导出统计信息。以下是一个说明如何从表导出统计信息的示例。\n\n1.  创建一个表来保存导出的统计信息：\n\
    \    ```sql\n    SQL> execute dbms_stats.create_stat_table(ownname=>'SH',stattab=>'mytab',\n\
    \                                             tblspace=>'USERS')\n\n    PL/SQL\
    \ procedure successfully completed.\n\n    SQL>\n    ```\n\n2.  使用 `DBMS_STATS.EXPORT_*STATS`\
    \ 过程将表 `SH.SALES` 的统计信息从数据字典导出到 `mytab` 表。\n    ```sql\n    SQL> exec dbms_stats.export_table_stats(ownname=>\
    \ 'SH',tabname=>'SALES',stattab=>\n    'mytab')\n\n    PL/SQL procedure successfully\
    \ completed.\n\n    SQL>\n    ```\n\n3.  在另一个数据库中，使用 `DBMS_STATS.IMPORT_*STATS`\
    \ 过程导入统计信息。\n    ```sql\n    SQL> exec dbms_stats.import_table_stats(ownname=>'SH',tabname=>'SALES',stattab=>\n\
    \    'MyTab',no_invalidate=>true);\n\n    PL/SQL procedure successfully completed.\n\
    \n    SQL>\n    ```\n\n#### 工作原理\n\n`EXPORT_TABLE_STATS` 过程从数据字典导出表的当前统计信息，并将它们存储在您创建的表中。请注意，此过程不会生成新的统计信息，数据库将继续使用该表（在我们的示例中是\
    \ `SH.SALES`）的当前统计信息。默认情况下，`cascade` 选项为 `true`，这意味着该过程将同时导出 `SH.SALES` 表中所有索引的统计信息以及列统计信息。\n\
    \n只有在将导出的统计信息导入到数据字典（在相同或不同的数据库中）后，才能使优化器使用这些统计信息。`IMPORT_TABLE_STATS` 过程将您之前导出的统计信息导入到数据字典中。将\
    \ `no_invalidate` 参数设置为 `true`（默认为 `false`）可确保任何依赖的游标不会失效。默认情况下，当统计信息被锁定时，您无法导入表的统计信息。您可以通过将\
    \ `force` 参数设置为 `true` 来覆盖此属性。如果您要将统计信息导入到与导出统计信息不同的数据库，则必须将存储统计信息的表导出到目标数据库。然后，您必须在执行\
    \ `IMPORT_TABLE_STATS` 过程之前将该表导入到目标数据库中。\n\n导出和导入统计信息是在测试系统中向优化器呈现与生产系统中相同的统计信息以确保执行计划一致的理想方法。当您想要保留一组已知良好的统计信息的时间超过“恢复统计信息”功能（在配方\
    \ 13-8 中解释）所允许的时间时，这也是一个很好的策略。导出和导入统计信息的功能使您可以在决定哪组参数最适合您的数据库之前，测试不同的统计信息集。\n\n\
    在此配方中，我们向您展示了如何导出和导入表级统计信息。`DBMS_STATS` 包还包含在列、索引、方案和数据库级别导出和导入统计信息的过程。此外，还有用于导出和导入字典统计信息、固定对象统计信息和系统统计信息的过程。\n\
    \n### 13-8. 恢复统计信息的先前版本\n\n#### 问题\n\n在收集新的统计信息后，某些查询的性能突然下降。您想看看是否可以使用一组您已知运行良好的旧统计信息。"
- fmt: "#### Solution\n\n使用 `DBMS_STATS.RESTORE_STATS` 过程可以恢复到旧的优化器统计信息集。在恢复旧统计信息之前，请检查可以回溯多久来恢复统计信息：\n\
    ```sql\nSQL> select dbms_stats.get_stats_history_availability from dual;\n\nGET_STATS_HISTORY_AVAILABILITY\n\
    ----------------------------------------------------------------------\n19-APR-11\
    \ 07.49.26.718000000 AM -04:00\n\nSQL>\n```\n此查询的输出显示，您可以将统计信息恢复到比所示时间戳（19-APR-11\
    \ 07.49.26.718000000 AM -04:00）更近的时间点。\n\n执行 `DBMS_STATS` 包中的 `RESTORE_*_STATS`\
    \ 过程可以恢复到更早时期的统计信息。以下示例展示了如何在模式级别恢复统计信息。\n```sql\nSQL> exec dbms_stats.restore_schema_stats(ownname=>'SH',as_of_timestamp=>'19-MAY-11\
    \ 01.30.31.323000 PM -04:00',no_invalidate=>false)\n\nPL/SQL procedure successfully\
    \ completed.\n\nSQL>\n```\n\n#### How It Works\n\n当数据库收集新的统计信息时，它不会丢弃前一组统计信息，而是保留旧版本一定天数。您可以通过执行\
    \ `DBMS_STATS.RESTORE_*_STATS` 过程来恢复旧统计信息，这些过程会用您指定时间的统计信息替换当前统计信息。当您希望优化器使用与访问旧统计信息集时相同的执行计划时，请恢复统计信息。默认情况下，数据库管理历史统计信息的保留和清除。以下是找出数据库默认保留多少天统计信息的方法。\n\
    ```sql\nSQL> select dbms_stats.get_stats_history_retention from dual;\n\nGET_STATS_HISTORY_RETENTION\n\
    ---------------------------\n                          31\nSQL>\n```\n数据库会自动清除超过\
    \ 31 天前收集的统计信息（前提是存在更新的统计信息！）。您可以通过执行 `DBMS_STATS.PURGE_STATS` 过程手动清除所有旧版本的统计信息。您可以通过执行以下命令来更改数据库保留统计信息的天数：\n\
    ```sql\nSQL> exec dbms_stats.alter_stats_history_retention(retention=>60);\n\n\
    PL/SQL procedure successfully completed.\n\nSQL>\n```\n该命令指示数据库将历史统计信息保存 60 天。\n\
    \n在“Solution”部分展示的示例中，我们展示了如何为模式恢复统计信息。您可以类似地使用 `RESTORE_DATABASE_STATS` 过程为数据库恢复统计信息，或使用\
    \ `RESTORE_TABLE_STATS` 过程为表恢复统计信息。您还可以使用 `RESTORE_DICTIONARY_STATS` 过程恢复字典统计信息，使用\
    \ `RESTORE_SYSTEM_STATS` 过程恢复系统统计信息。\n\n### 13-9. Gathering System Statistics\n\
    \n#### Problem\n\n您知道优化器在选择执行计划时会使用系统的 I/O 和 CPU 特性。您希望确保优化器正在使用准确的系统统计信息。\n\n\
    #### Solution\n\n您可以收集两种类型的系统统计信息来捕获系统的 I/O 和 CPU 特性。您可以收集*工作负载统计信息*或*非工作负载统计信息*，以使优化器能够更准确地估计真实的\
    \ I/O 和 CPU 成本，这对于查询优化至关重要。\n\n当数据库收集非工作负载统计信息时，它会模拟工作负载。以下是使用 `DBMS_STATS.GATHER_SYSTEM_STATS`\
    \ 过程收集非工作负载统计信息的方法：\n```sql\nSQL> execute dbms_stats.gather_system_stats()\n\n\
    PL/SQL procedure successfully completed.\n\nSQL>\n```\n您还可以在数据库处理典型工作负载时收集系统统计信息。这些系统统计信息称为工作负载统计信息，更能代表实际的系统\
    \ I/O 和 CPU 特性，并向优化器提供更准确的系统硬件状况。您可以通过执行带有 “start” 和 “stop” 选项的 `DBMS_STATS.GATHER_SYSTEM_STATS`\
    \ 过程来收集工作负载系统统计信息：\n```sql\nSQL> execute dbms_stats.gather_system_stats('start')\n\
    \nPL/SQL procedure successfully completed.\nSQL>\n```\n您可以在工作负载窗口开始前执行上述命令。工作负载窗口结束后，执行以下命令停止系统统计信息收集：\n\
    ```sql\nSQL> execute dbms_stats.gather_system_stats('stop')\n\nPL/SQL procedure\
    \ successfully completed.\n\nSQL>\n```\n您也可以使用 `interval` 参数执行 `GATHER_SYSTEM_STATS`\
    \ 过程，以指示数据库在您指定的时间段内收集工作负载系统统计信息，并在该时间段结束时自动停止统计信息收集过程。以下是一个示例：\n```sql\nSQL>\
    \ execute dbms_stats.gather_system_stats('interval',90);\nPL/SQL procedure successfully\
    \ completed.\nSQL>\n```\n上述命令收集 90 分钟的工作负载统计信息。\n\n一旦收集了非工作负载或工作负载系统统计信息，您可以在\
    \ `sys.aux_stats$` 视图中查看为各种系统统计信息捕获的值，如下一节所示。\n\n![images](images/square.jpg)\
    \ **提示** Oracle 强烈建议收集系统统计信息，以便为优化器提供更准确的 CPU 和 I/O 成本估算。"
  raw: '#### Solution


    Use the `DBMS_STATS.RESTORE_STATS` procedure to revert to an older set of optimizer
    statistics. Before you restore older statistics, check how far back you can go
    to restore older statistics:


    `SQL> select dbms_stats.get_stats_history_availability from dual;`


    `GET_STATS_HISTORY_AVAILABILITY`

    `----------------------------------------------------------------------`

    `19-APR-11 07.49.26.718000000 AM -04:00`


    `SQL>`


    The output of this query shows that you can restore statistics to a timestamp
    that''s more recent than the timestamp shown, which is 19-APR-11 07.49.26.718000000
    AM -04:00.


    Execute the `RESTORE_*_STATS` procedures of the `DBMS_STATS` package to revert
    to statistics from an earlier period. The following example shows how to restore
    statistics at the schema level.


    `SQL> exec dbms_stats.restore_schema_stats(ownname=>''SH'',as_of_timestamp=>''19-MAY`

    `-11 01.30.31.323000 PM -04:00'',no_invalidate=>false)`


    `PL/SQL procedure successfully completed.`


    `SQL>`


    #### How It Works


    When the database collects fresh statistics, it doesn''t get rid of the previous
    set of statistics. Instead, it retains the older versions for a set number of
    days. You have the ability to restore older statistics by executing the `DBMS_STATS.RESTORE_*_STATS`
    procedures, which replace the current statistics with the statistics from the
    time you specify. Restore statistics when you want the optimizer to use the same
    execution plans as it did when it had access to an older set of statistics. By
    default, the database manages the retention and purging of historical statistics.
    Here''s how to find out how many days'' worth of statistics the database retains
    by default.


    `SQL> select dbms_stats.get_stats_history_retention from dual;`


    `GET_STATS_HISTORY_RETENTION`

    `---------------------------`

    `                         31`

    `SQL>`


    The database automatically purges statistics it has collected more than 31 days
    ago (provided newer statistics exist!). You can manually purge all old versions
    of statistics by executing the `DBMS_STATS.PURGE_STATS` procedure. You can change
    the number of days the database retains statistics by executing the following
    command:


    `SQL> exec dbms_stats.alter_stats_history_retention(retention=>60);`


    `PL/SQL procedure successfully completed.`


    `SQL>`


    The command tells the database to save historical statistics for a period of 60
    days.


    In the example shown in the “Solution” section, we showed how to restore statistics
    for a schema. You can similarly restore statistics for a database with the `RESTORE_DATABASE_STATS`
    procedure or for a table with the `RESTORE_TABLE_STATS` procedure. You can also
    restore dictionary stats with the `RESTORE_DICTIONARY_STATS` procedure and system
    stats with the `RESTORE_SYSTEM_STATS` procedure.


    ### 13-9\. Gathering System Statistics


    #### Problem


    You know the optimizer uses I/O and CPU characteristics of a system during the
    selection of an execution plan. You''d like to ensure that the optimizer is using
    accurate system statistics.


    #### Solution


    You can collect two types of system statistics to capture your system''s I/O and
    CPU characteristics. You can collect *workload statistics* or *noworkload statistics*
    to enable the optimizer to better estimate the true I/O and CPU costs, which are
    a critical part of query optimization.


    When the database gathers noworkload statistics, it simulates a workload. Here''s
    how you collect noworkload statistics, using the `DBMS_STATS.GATHER_SYSTEM_STATS`
    procedure:


    `SQL> execute dbms_stats.gather_system_stats()`


    `PL/SQL procedure successfully completed.`


    `SQL>`


    You can also gather system statistics while the database is processing a typical
    workload. These system statistics, called workload statistics, are more representative
    of actual system I/O and CPU characteristics and present a more accurate system
    hardware picture to the optimizer. You can collect workload system statistics
    by executing the `DBMS_STATS.GATHER_SYSTEM_STATS` procedure with the “start” and
    “stop” options:


    `SQL> execute dbms_stats.gather_system_stats(''start'')`


    `PL/SQL procedure successfully completed.`

    `SQL>`


    You can execute the previous command before the beginning of the workload window.
    Once the workload window ends, stop the system statistics gathering by executing
    the following command:


    `SQL> execute dbms_stats.gather_system_stats(''stop'')`


    `PL/SQL procedure successfully completed.`


    `SQL>`


    You can also execute the `GATHER_SYSTEM_STATS` procedure with an `interval` parameter,
    to instruct the database to collect workload system statistics over a period of
    time that you specify and automatically stop the statistics gathering process
    at the end of the period. Here''s an example:


    `SQL> execute dbms_stats.gather_system_stats(''interval'',90);`

    `PL/SQL procedure successfully completed.`

    `SQL>`


    The previous command collects workload statistics for 90 minutes.


    Once you collect noworkload or workload system statistics, you can check the values
    captured for the various system statistics in the `sys.aux_stats$` view, shown
    in the next section.


    ![images](images/square.jpg) **Tip** Oracle highly recommends the gathering of
    system statistics in order to provide more accurate CPU and I/O cost estimates
    to the optimizer.'
  trans: "\n\n#### 解决方案\n\n使用 `DBMS_STATS.RESTORE_STATS` 过程可以将优化器统计信息集恢复到旧版本。在恢复旧统计信息之前，请先检查可以回溯多久来恢复统计信息：\n\
    ```sql\nSQL> select dbms_stats.get_stats_history_availability from dual;\n\nGET_STATS_HISTORY_AVAILABILITY\n\
    ----------------------------------------------------------------------\n19-APR-11\
    \ 07.49.26.718000000 AM -04:00\n\nSQL>\n```\n此查询的输出显示，您可以将统计信息恢复到比所示时间戳（19-APR-11\
    \ 07.49.26.718000000 AM -04:00）更近的时间点。\n\n执行 `DBMS_STATS` 包中的 `RESTORE_*_STATS`\
    \ 过程可以将统计信息恢复到更早的时期。以下示例展示了如何在模式级别恢复统计信息。\n```sql\nSQL> exec dbms_stats.restore_schema_stats(ownname=>'SH',as_of_timestamp=>'19-MAY-11\
    \ 01.30.31.323000 PM -04:00',no_invalidate=>false)\n\nPL/SQL procedure successfully\
    \ completed.\n\nSQL>\n```\n\n#### 工作原理\n\n当数据库收集新的统计信息时，它不会丢弃前一组统计信息，而是保留旧版本一定天数。您可以通过执行\
    \ `DBMS_STATS.RESTORE_*_STATS` 过程来恢复旧统计信息，这些过程会用您指定时间的统计信息替换当前统计信息。当您希望优化器使用与访问旧统计信息集时相同的执行计划时，请恢复统计信息。默认情况下，数据库会管理历史统计信息的保留和清除。以下是找出数据库默认保留多少天统计信息的方法。\n\
    ```sql\nSQL> select dbms_stats.get_stats_history_retention from dual;\n\nGET_STATS_HISTORY_RETENTION\n\
    ---------------------------\n                          31\nSQL>\n```\n数据库会自动清除超过\
    \ 31 天前收集的统计信息（前提是存在更新的统计信息！）。您可以通过执行 `DBMS_STATS.PURGE_STATS` 过程手动清除所有旧版本的统计信息。您可以通过执行以下命令来更改数据库保留统计信息的天数：\n\
    ```sql\nSQL> exec dbms_stats.alter_stats_history_retention(retention=>60);\n\n\
    PL/SQL procedure successfully completed.\n\nSQL>\n```\n该命令指示数据库将历史统计信息保存 60 天。\n\
    \n在“解决方案”部分展示的示例中，我们展示了如何为模式恢复统计信息。您可以类似地使用 `RESTORE_DATABASE_STATS` 过程为数据库恢复统计信息，或使用\
    \ `RESTORE_TABLE_STATS` 过程为表恢复统计信息。您还可以使用 `RESTORE_DICTIONARY_STATS` 过程恢复字典统计信息，使用\
    \ `RESTORE_SYSTEM_STATS` 过程恢复系统统计信息。\n\n### 13-9. 收集系统统计信息\n\n#### 问题\n\n您知道优化器在选择执行计划时会使用系统的\
    \ I/O 和 CPU 特性。您希望确保优化器正在使用准确的系统统计信息。\n\n#### 解决方案\n\n您可以收集两种类型的系统统计信息来捕获系统的 I/O\
    \ 和 CPU 特性。您可以收集*工作负载统计信息*或*非工作负载统计信息*，以使优化器能够更准确地估计真实的 I/O 和 CPU 成本，这对于查询优化至关重要。\n\
    \n当数据库收集非工作负载统计信息时，它会模拟工作负载。以下是使用 `DBMS_STATS.GATHER_SYSTEM_STATS` 过程收集非工作负载统计信息的方法：\n\
    ```sql\nSQL> execute dbms_stats.gather_system_stats()\n\nPL/SQL procedure successfully\
    \ completed.\n\nSQL>\n```\n您还可以在数据库处理典型工作负载时收集系统统计信息。这些系统统计信息称为工作负载统计信息，更能代表实际的系统\
    \ I/O 和 CPU 特性，并向优化器提供更准确的系统硬件状况。您可以通过执行带有 “start” 和 “stop” 选项的 `DBMS_STATS.GATHER_SYSTEM_STATS`\
    \ 过程来收集工作负载系统统计信息：\n```sql\nSQL> execute dbms_stats.gather_system_stats('start')\n\
    \nPL/SQL procedure successfully completed.\nSQL>\n```\n您可以在工作负载窗口开始前执行上述命令。工作负载窗口结束后，执行以下命令停止系统统计信息收集：\n\
    ```sql\nSQL> execute dbms_stats.gather_system_stats('stop')\n\nPL/SQL procedure\
    \ successfully completed.\n\nSQL>\n```\n您也可以使用 `interval` 参数执行 `GATHER_SYSTEM_STATS`\
    \ 过程，以指示数据库在您指定的时间段内收集工作负载系统统计信息，并在该时间段结束时自动停止统计信息收集过程。以下是一个示例：\n```sql\nSQL>\
    \ execute dbms_stats.gather_system_stats('interval',90);\nPL/SQL procedure successfully\
    \ completed.\nSQL>\n```\n上述命令收集 90 分钟的工作负载统计信息。\n\n一旦收集了非工作负载或工作负载系统统计信息，您可以在\
    \ `sys.aux_stats$` 视图中查看为各种系统统计信息捕获的值，如下一节所示。\n\n![images](img/square.jpg) **提示**\
    \ Oracle 强烈建议收集系统统计信息，以便为优化器提供更准确的 CPU 和 I/O 成本估算。\n"
- fmt: "## How It Works\n\n准确的系统统计信息对于优化器评估可执行计划至关重要。正是通过估算各种系统性能特性（如I/O速度和CPU速度），优化器才能计算出全表扫描与索引读取等操作的成本。\n\
    \n你可以通过收集系统统计信息，向优化器传递最多九个优化器系统统计信息。数据库在无负载模拟统计信息收集过程中收集前三个统计信息。在负载模式系统统计信息收集过程中，它会收集所有九个系统统计信息。以下是这九个系统统计信息的摘要：\n\
    \n> `cpuspeedNW`: 显示无负载CPU速度，以平均每秒CPU周期数为单位\n> \n> `ioseektim`: 寻道时间、延迟时间和操作系统开销时间的总和\n\
    > \n> `iotfrspeed`: 代表I/O传输速度，告诉优化器数据库在单次读取请求中读取数据的速度\n> \n> `cpuspeed`: 代表负载统计信息收集期间的CPU速度\n\
    > \n> `maxthr`: 最大I/O吞吐量\n> \n> `slavethr`: 平行从属I/O平均吞吐量\n> \n> `sreadtim`: 单块读取时间统计信息显示随机单块读取的平均时间。\n\
    > \n> `mreadtim`: 多块读取时间统计信息显示顺序多块读取的平均时间（以秒为单位）。\n> \n> `mbrc`: 多块读取计数统计信息显示以块为单位的平均多块读取计数。\n\
    \n当你收集无负载系统统计信息时，数据库只捕获 `cpuspeedNW`、`ioseektim` 和 `iotfrspeed` 系统统计信息。以下是一个查询，显示Oracle\
    \ 11g数据库（Windows系统上）中的默认系统统计信息。\n\n```\nSQL> select pname, pval1 from sys.aux_stats$\
    \ where sname = 'SYSSTATS_MAIN';\n\nPNAME                               PVAL1\n\
    ------------------------------ ----------\nCPUSPEED\nCPUSPEEDNW              \
    \        1183.90219\nIOSEEKTIM                              10\nIOTFRSPEED   \
    \                        4096\nMAXTHR\nMBRC\nMREADTIM\nSLAVETHR\nSREADTIM\n\n\
    9 rows selected.\n\nSQL>\n```\n\n数据库默认使用无负载系统统计信息，当你启动实例时，三个无负载统计信息—I/O传输速度（`IOTFRSPEED`）、I/O寻道时间（`IOSEEKTIM`）和CPU速度（`CPUSPEEDNW`）—被初始化为默认值。一旦你如“解决方案”部分所示收集了无负载统计信息，这三个无负载系统统计信息中的部分或全部可能会改变。在我们的案例中，收集无负载统计信息后，`CPUSPEEDNW`的值变为2039.06，`IOSEEKTIM`统计信息的值变为14.756。然而，`IOTFRSPEED`统计信息的值保持4096不变。\n\
    \n如果你注意到即使手动收集了几次统计信息，`sys.aux_stats$`视图仍然显示无负载统计信息的默认值，你可以使用`DBMS_STATS.SET_SYSTEM_STATS`过程手动将统计信息值设置为你I/O或CPU系统的已知规格。你可以使用此过程为九个系统统计信息中的任何一个设置值。\n\
    \n当你在负载模式下收集系统统计信息时，你会看到剩余六个系统统计信息中部分或全部的值。在我们的示例中，这些是通过运行负载模式下的`GATHER_SYSTEM_STATS`过程收集的系统统计信息。\n\
    \n```\nSQL>  select pname, pval1 from sys.aux_stats$ where sname = 'SYSSTATS_MAIN';\n\
    \nPNAME                               PVAL1\n------------------------------ ----------\n\
    CPUSPEED                             2040\nCPUSPEEDNW                       2039.06\n\
    IOSEEKTIM                         14.756\nIOTFRSPEED                         \
    \  4096\nMAXTHR\nMBRC                                   7\nMREADTIM          \
    \              46605.947\nSLAVETHR\nSREADTIM                        51471.538\n\
    \n9 rows selected.\n\nSQL>\n```\n\n如果在负载统计信息收集期间数据库执行了任何全表扫描，Oracle会使用`mbrc`和`mreadtim`统计信息的值来估算全表扫描的成本。如果没有这两个统计信息，数据库会使用`db_file_multiblock_read_count`参数的值来估算全表扫描的成本。\n\
    \n你可以通过执行`DELETE_SYSTEM_STATS`过程来删除所有系统统计信息：\n\n```\nSQL> execute dbms_stats.delete_system_stats()\n\
    \nPL/SQL procedure successfully completed.\n\nSQL>\n```\n\n根据Oracle的说法，收集负载统计信息不会给你的系统带来额外的开销。但是，请确保指定特定的时间间隔或在短暂收集后停止统计信息收集，以避免潜在的开销。\n\
    \n### 13-10\\. Validating New Statistics\n\n#### Problem\n\n你正在收集新的统计信息，但在验证它们之前，不希望数据库自动使用这些统计信息。\n\
    \n#### Solution\n\n在这个例子中，我们将展示如何阻止数据库自动发布表的新统计信息。以下是必须遵循的步骤。\n\n1.  执行以下语句，阻止数据库自动发布为`SH.SALES`表收集的新统计信息。\n\
    \n    ```\n    SQL> execute dbms_stats.set_table_prefs('SH','SALES','PUBLISH','false');\n\
    \n    PL/SQL procedure successfully completed.\n\n    SQL>\n    ```\n\n    该语句将`SH.SALES`表的`PUBLISH`参数首选项设置为`false`（默认=`true`）。从现在开始，数据库不会自动发布为`SH.SALES`表收集的统计信息。相反，它会将这些统计信息暂时搁置，等待你的批准。这些统计信息被称为待定统计信息，因为数据库尚未将其提供给优化器。\n\
    \n2.  为`SH.SALES`表收集新的统计信息：\n    ```\n    SQL> exec dbms_stats.gather_table_stats('sh','sales');\n\
    \n    PL/SQL procedure successfully completed.\n    SQL>\n    ```\n\n3.  告诉优化器使用新收集的待定统计信息，以便你可以用这些统计信息测试你的查询：\n\
    \    ```\n    SQL>  alter session set optimizer_use_pending_statistics=true;\n\
    \n    Session altered.\n\n    SQL>\n    ```\n\n4.  通过针对`SH.SALES`表运行工作负载并检查性能和执行计划来进行测试。\n\
    5.  如果你对新（待定）统计信息集感到满意，通过执行以下语句使其公开：\n    ```\n    SQL> execute dbms_stats.publish_pending_stats('SH','SALES');\n\
    \n    PL/SQL procedure successfully completed.\n\n    SQL>\n    ```\n\n6.  如果你想删除新统计信息，请执行以下命令：\n\
    \    ```\n    SQL> exec dbms_stats.delete_pending_stats('SH','SALES');\n\n   \
    \ PL/SQL procedure successfully completed.\n\n    SQL>\n    ```"
  raw: "#### How It Works\n\nAccurate system statistics are critical for the optimizer's\
    \ evaluation of alternative execution plans. It's through its estimates of various\
    \ system performance characteristics such as I/O speed and CPU speed that the\
    \ optimizer calculates the cost of, say, a full table scan vs. an indexed read.\n\
    \nYou can pass up to nine optimizer system statistics to the optimizer, by collecting\
    \ system statistics. The database gathers the first three statistics during a\
    \ noworkload simulated statistics gathering process. It gathers all nine system\
    \ statistics during a workload mode system statistics collection. Here's a summary\
    \ of the nine system statistics:\n\n> `cpuspeedNW`: Shows the noworkload CPU speed,\
    \ in terms of the average number of CPU cycles per second\n> \n> `ioseektim`:\
    \ The sum of seek time, latency time, and OS overhead time\n> \n> `iotfrspeed`:\
    \ Stands for I/O transfer speed and tells the optimizer how fast the database\
    \ can read data in a single read request\n> \n> `cpuspeed`: Stands for CPU speed\
    \ during a workload statistics collection\n> \n> `maxthr`: The maximum I/O throughput\n\
    > \n> `slavethr`: Average parallel slave I/O throughput\n> \n> `sreadtim`: The\
    \ Single Block Read Time statistic shows the average time for a random single\
    \ block read.\n> \n> `mreadtim`: The Multiblock Read Time statistic shows the\
    \ average time (in seconds) for a sequential multiblock read.\n> \n> `mbrc`: The\
    \ Multi Block Read Count statistic shows the average multiblock read count in\
    \ blocks.\n\nWhen you collect the noworkload system statistics, the database captures\
    \ only the `cpuspeedNW`, `ioseektim`, and `iotfrspeed` system statistics. Here's\
    \ a query that shows the default system statistics in an Oracle 11g database (on\
    \ a Windows system).\n\n`SQL> select pname, pval1 from sys.aux_stats$ where sname\
    \ = 'SYSSTATS_MAIN';`\n\n`PNAME                               PVAL1`\n`------------------------------\
    \ ----------`\n`CPUSPEED`\n`CPUSPEEDNW                     1183.90219`\n`IOSEEKTIM                              10`\n\
    `IOTFRSPEED                           4096`\n`MAXTHR`\n`MBRC`\n`MREADTIM`\n`SLAVETHR`\n\
    `SREADTIM`\n\n`9 rows selected.`\n\n`SQL>`\n\nThe database uses noworkload systems\
    \ statistics by default, with the values of the three noworkload statistics—I/O\
    \ transfer speed (`IOTFRSPEED`), I/O seek time (`IOSEEKTIM`), and CPU speed (`CPUSPEEDNW`)—initialized\
    \ to default values when you start the instance. Once you collect the noworkload\
    \ statistics as shown in the “Solution” section, some or all of the three noworkload\
    \ system statistics may change. In our case, once we collected the noworkload\
    \ statistics, the value of `CPUSPEEDNW` changed to 2039.06 and the value of the\
    \ `IOSEEKTIM` statistic changed to 14.756\\. However, the value of the `IOTFRSPEED`\
    \ statistic remained constant at 4096.\n\nIf you notice that the `sys.aux_stats$`\
    \ view continues to show the default values for noworkload statistics even after\
    \ you manually gather the statistics a few times, you can manually set the statistics\
    \ values to known specifications of your I/O or CPU system by using the `DBMS_STATS.SET_SYSTEM_STATS`\
    \ procedure. You can use this procedure to set values for any of the nine system\
    \ statistics.\n\nWhen you gather system statistics in the workload mode, you'll\
    \ see values for some or all of the remaining six system statistics. In our example,\
    \ these are the system statistics collected by running the `GATHER_SYSTEM_STATS`\
    \ procedure in the workload mode.\n\n`SQL>  select pname, pval1 from sys.aux_stats$\
    \ where sname = 'SYSSTATS_MAIN';`\n\n`PNAME                               PVAL1`\n\
    `------------------------------ ----------`\n`CPUSPEED                             2040`\n\
    `CPUSPEEDNW                        2039.06`\n`IOSEEKTIM                          14.756`\n\
    `IOTFRSPEED                           4096`\n`MAXTHR`\n`MBRC                                    7`\n\
    `MREADTIM                        46605.947`\n`SLAVETHR`\n`SREADTIM                        51471.538`\n\
    \n`9 rows selected.`\n\n`SQL>`\n\nIf the database performs any full table scans\
    \ during the workload statistics collection period, Oracle uses the value of the\
    \ `mbrc` and the `mreadtim` statistics to estimate the cost of a full table scan.\
    \ In the absence of these two statistics, the database uses the value of the `db_file_multiblock_read_count`\
    \ parameter to estimate the cost of full table scans.\n\nYou can delete all system\
    \ statistics by executing the `DELETE_SYSTEM_STATS` procedure:\n\n`SQL> execute\
    \ dbms_stats.delete_system_stats()`\n\n`PL/SQL procedure successfully completed.`\n\
    \n`SQL>`\n\nAccording to Oracle, collecting workload statistics doesn't impose\
    \ an additional overhead on your system. However, ensure that you specify a specific\
    \ interval or stop the statistics collection after a brief period, to avoid potential\
    \ overhead.\n\n### 13-10\\. Validating New Statistics\n\n#### Problem\n\nYou're\
    \ collecting new statistics, but you don't want the database to automatically\
    \ use those statistics until you validate them.\n\n#### Solution\n\nIn this example,\
    \ we'll show how to keep the database from automatically publishing new statistics\
    \ for a table. Here are the procedures you must follow to do this.\n\n1.  Execute\
    \ the following statement to keep the database from automatically publishing new\
    \ statistics it collects for the `SH.SALES` table.\n\n    `SQL> execute dbms_stats.set_table_prefs('SH','SALES','PUBLISH','false');`\n\
    \n    `PL/SQL procedure successfully completed.`\n\n    `SQL>`\n\n    The statement\
    \ sets the preference for the `PUBLISH` parameter to `false` (default=`true`)\
    \ for the `SH.SALES` table. From here on, the database won't automatically publish\
    \ the statistics you collect for the `SH.SALES` table. Rather, it keeps those\
    \ statistics in abeyance, pending your approval. These statistics are called pending\
    \ statistics, because the database hasn't made them available to the optimizer\
    \ yet.\n\n2.  Collect new statistics for the `SH.SALES` table: `SQL> exec dbms_stats.gather_table_stats('sh','sales');`\n\
    \n    `PL/SQL procedure successfully completed.`\n    `SQL>`\n3.  Tell the optimizer\
    \ to use the newly collected pending statistics, so you can test your queries\
    \ with those statistics: `SQL>  alter session set optimizer_use_pending_statistics=true;`\n\
    \n    `Session altered.`\n\n    `SQL>`\n4.  Perform your tests by running a workload\
    \ against the `SH.SALES` table and checking the performance and the execution\
    \ plans.\n5.  If you're happy with the new set of (pending) statistics, make them\
    \ public by executing this statement: `SQL> execute dbms_stats.publish_pending_stats('SH','SALES');`\n\
    \n    `PL/SQL procedure successfully completed.`\n\n    `SQL>`\n6.  If you want\
    \ to delete the new statistics instead, execute the following command: `SQL> exec\
    \ dbms_stats.delete_pending_stats('SH','SALES');`\n\n    `PL/SQL procedure successfully\
    \ completed.`\n\n    `SQL>`"
  trans: "\n\n## 工作原理\n\n准确的系统统计信息对于优化器评估可执行计划至关重要。正是通过估算各种系统性能特性（如 I/O 速度和 CPU 速度），优化器才能计算出全表扫描与索引读取等操作的成本。\n\
    \n你可以通过收集系统统计信息，向优化器传递最多九个优化器系统统计信息。数据库在无负载模拟统计信息收集过程中收集前三个统计信息。在负载模式系统统计信息收集过程中，它会收集所有九个系统统计信息。以下是这九个系统统计信息的摘要：\n\
    \n> `cpuspeedNW`： 显示无负载 CPU 速度，以平均每秒 CPU 周期数为单位\n>\n> `ioseektim`： 寻道时间、延迟时间和操作系统开销时间的总和\n\
    >\n> `iotfrspeed`： 代表 I/O 传输速度，告诉优化器数据库在单次读取请求中读取数据的速度\n>\n> `cpuspeed`： 代表负载统计信息收集期间的\
    \ CPU 速度\n>\n> `maxthr`： 最大 I/O 吞吐量\n>\n> `slavethr`： 平行从属 I/O 平均吞吐量\n>\n> `sreadtim`：\
    \ 单块读取时间统计信息显示随机单块读取的平均时间。\n>\n> `mreadtim`： 多块读取时间统计信息显示顺序多块读取的平均时间（以秒为单位）。\n\
    >\n> `mbrc`： 多块读取计数统计信息显示以块为单位的平均多块读取计数。\n\n当你收集无负载系统统计信息时，数据库只捕获 `cpuspeedNW`、`ioseektim`\
    \ 和 `iotfrspeed` 系统统计信息。以下是一个查询，显示 Oracle 11g 数据库（Windows 系统上）中的默认系统统计信息。\n\n\
    ```\nSQL> select pname, pval1 from sys.aux_stats$ where sname = 'SYSSTATS_MAIN';\n\
    \nPNAME                               PVAL1\n------------------------------ ----------\n\
    CPUSPEED\nCPUSPEEDNW                      1183.90219\nIOSEEKTIM              \
    \                10\nIOTFRSPEED                           4096\nMAXTHR\nMBRC\n\
    MREADTIM\nSLAVETHR\nSREADTIM\n\n9 rows selected.\n\nSQL>\n```\n\n数据库默认使用无负载系统统计信息，当你启动实例时，三个无负载统计信息—I/O\
    \ 传输速度（`IOTFRSPEED`）、I/O 寻道时间（`IOSEEKTIM`）和 CPU 速度（`CPUSPEEDNW`）—被初始化为默认值。一旦你如“解决方案”部分所示收集了无负载统计信息，这三个无负载系统统计信息中的部分或全部可能会改变。在我们的案例中，收集无负载统计信息后，`CPUSPEEDNW`\
    \ 的值变为 2039.06，`IOSEEKTIM` 统计信息的值变为 14.756。然而，`IOTFRSPEED` 统计信息的值保持 4096 不变。\n\
    \n如果你注意到即使手动收集了几次统计信息，`sys.aux_stats$` 视图仍然显示无负载统计信息的默认值，你可以使用 `DBMS_STATS.SET_SYSTEM_STATS`\
    \ 过程手动将统计信息值设置为你 I/O 或 CPU 系统的已知规格。你可以使用此过程为九个系统统计信息中的任何一个设置值。\n\n当你在负载模式下收集系统统计信息时，你会看到剩余六个系统统计信息中部分或全部的值。在我们的示例中，这些是通过运行负载模式下的\
    \ `GATHER_SYSTEM_STATS` 过程收集的系统统计信息。\n\n```\nSQL>  select pname, pval1 from sys.aux_stats$\
    \ where sname = 'SYSSTATS_MAIN';\n\nPNAME                               PVAL1\n\
    ------------------------------ ----------\nCPUSPEED                          \
    \   2040\nCPUSPEEDNW                       2039.06\nIOSEEKTIM                \
    \         14.756\nIOTFRSPEED                           4096\nMAXTHR\nMBRC    \
    \                               7\nMREADTIM                        46605.947\n\
    SLAVETHR\nSREADTIM                        51471.538\n\n9 rows selected.\n\nSQL>\n\
    ```\n\n如果在负载统计信息收集期间数据库执行了任何全表扫描，Oracle 会使用 `mbrc` 和 `mreadtim` 统计信息的值来估算全表扫描的成本。如果没有这两个统计信息，数据库会使用\
    \ `db_file_multiblock_read_count` 参数的值来估算全表扫描的成本。\n\n你可以通过执行 `DELETE_SYSTEM_STATS`\
    \ 过程来删除所有系统统计信息：\n\n```\nSQL> execute dbms_stats.delete_system_stats()\n\nPL/SQL\
    \ procedure successfully completed.\n\nSQL>\n```\n\n根据 Oracle 的说法，收集负载统计信息不会给你的系统带来额外的开销。但是，请确保指定特定的时间间隔或在短暂收集后停止统计信息收集，以避免潜在的开销。\n\
    \n### 13-10\\. 验证新统计信息\n\n#### 问题\n\n你正在收集新的统计信息，但在验证它们之前，不希望数据库自动使用这些统计信息。\n\n\
    #### 解决方案\n\n在这个例子中，我们将展示如何阻止数据库自动发布表的新统计信息。以下是必须遵循的步骤。\n\n1.  执行以下语句，阻止数据库自动发布为\
    \ `SH.SALES` 表收集的新统计信息。\n\n    ```\n    SQL> execute dbms_stats.set_table_prefs('SH','SALES','PUBLISH','false');\n\
    \n    PL/SQL procedure successfully completed.\n\n    SQL>\n    ```\n\n    该语句将\
    \ `SH.SALES` 表的 `PUBLISH` 参数首选项设置为 `false`（默认=`true`）。从现在开始，数据库不会自动发布为 `SH.SALES`\
    \ 表收集的统计信息。相反，它会将这些统计信息暂时搁置，等待你的批准。这些统计信息被称为待定统计信息，因为数据库尚未将其提供给优化器。\n\n2.  为 `SH.SALES`\
    \ 表收集新的统计信息：\n    ```\n    SQL> exec dbms_stats.gather_table_stats('sh','sales');\n\
    \n    PL/SQL procedure successfully completed.\n    SQL>\n    ```\n\n3.  告诉优化器使用新收集的待定统计信息，以便你可以用这些统计信息测试你的查询：\n\
    \    ```\n    SQL>  alter session set optimizer_use_pending_statistics=true;\n\
    \n    Session altered.\n\n    SQL>\n    ```\n\n4.  通过针对 `SH.SALES` 表运行工作负载并检查性能和执行计划来进行测试。\n\
    5.  如果你对新（待定）统计信息集感到满意，通过执行以下语句使其公开：\n    ```\n    SQL> execute dbms_stats.publish_pending_stats('SH','SALES');\n\
    \n    PL/SQL procedure successfully completed.\n\n    SQL>\n    ```\n\n6.  如果你想删除新统计信息，请执行以下命令：\n\
    \    ```\n    SQL> exec dbms_stats.delete_pending_stats('SH','SALES');\n\n   \
    \ PL/SQL procedure successfully completed.\n\n    SQL>\n    ```\n\n"
- fmt: "### 13-10. 控制统计信息的发布\n\n#### 工作原理\n\n默认情况下，数据库会立即开始使用收集到的所有统计信息。但是，您可以指定数据库不自动使用新收集的统计信息，直到您确认这些统计信息将改进或至少不会降低当前的执行计划。您可以通过将新统计信息保持在*待处理*状态来实现这一点。使统计信息对优化器可用，以便其在计算执行计划时能够使用它们，这被称为*发布*统计信息。数据库将已发布的统计信息存储在其数据字典中。如果您不确定一组新统计信息的效果，可以防止数据库自动发布统计信息，直到您先完成测试。当您将统计信息保持在待处理状态时，数据库不会将其存储在数据字典中——而是将其存储在一个私有区域中，并且只有在您将`optimizer_use_pending_statistics`参数设置为`true`时，才会使这些统计信息对优化器可用。\n\
    \n在指定数据库必须将新收集的统计信息保持在待处理状态后，您可以选择发布新统计信息或将其删除。使用`publish_pending_stats`过程发布统计信息，使用`delete_pending_stats`过程删除统计信息。如果您删除了某个对象的待处理统计信息，数据库将使用该对象的现有统计信息。\n\
    \n在此示例中，我们展示了如何更改表级别的统计信息`PUBLISH`设置。您也可以在模式级别执行此操作，但不能在数据库级别执行。如果在模式级别操作，则需要运行以下语句（模式名称为SH）。\n\
    \n```sql\nSQL> execute dbms_stats.set_schema_prefs('SH','PUBLISH','false');\n\
    SQL> execute dbms_stats.publish_pending_stats(null,null);\nSQL> execute dbms_stats.delete_pending_stats('SH');\n\
    ```\n\n### 13-11. 强制优化器使用索引\n\n#### 问题\n\n您知道在某个列上使用特定索引会加快查询速度，但优化器在其执行计划中并未使用该索引。您希望强制优化器使用该索引。\n\
    \n#### 解决方案\n\n当优化器没有使用索引时，您可以通过调整`optimizer_index_cost_adj`初始化参数来强制其使用。您可以在系统或会话级别设置此参数。以下示例展示了如何在会话级别设置此参数：\n\
    \n```sql\nSQL> alter session set optimizer_index_cost_adj=50;\n\nSession altered.\n\
    SQL>\n```\n\n`optimizer_index_cost_adj`参数的默认值为100，您可以将该参数设置为介于0到10000之间的值。该参数的值越低，优化器使用索引的可能性就越大。\n\
    \n#### 工作原理\n\n`optimizer_index_cost_adj`参数允许您调整索引访问的成本。优化器对此参数使用默认值100，这意味着它基于正常的成本模型来评估索引访问路径。根据优化器对执行索引读取成本的估计，它决定是否使用索引。这通常工作良好。然而，在某些情况下，即使使用索引能带来更好的执行计划，优化器也不会使用它，因为优化器对索引访问路径成本的估计可能不准确。由于优化器对`optimizer_index_cost_adj`参数使用默认值100，您可以通过将此参数设置为较小的值，使索引成本在优化器看来更低。任何小于100的值都会使索引使用（就索引读取的成本而言）在优化器看来更便宜。通常，当您这样做时，优化器就会开始使用您希望它使用的索引。在我们的示例中，我们将`optimizer_index_cost_adj`参数设置为50，使索引访问路径的成本看起来是其正常成本（100）的一半。您设置此参数的值越低，索引成本访问路径在优化器看来就越便宜，它就越倾向于选择索引访问路径而非全表扫描。\n\
    \n我们建议您仅针对特定查询在会话级别设置`optimizer_index_cost_adj`参数，因为如果在数据库级别设置，它有可能改变许多查询的执行计划。默认情况下，如果您设置了`ALL_ROWS`优化器目标，优化器会内置偏好全表扫描。通过将`optimizer_index_cost_adj`参数设置为小于100的值，您就是在诱导优化器偏好索引扫描而非全表扫描。可以放心地使用`optimizer_index_cost_adj`参数，尤其是在OLTP环境中，您可以尝试将该参数设置为较低的值（例如5或10），以强制优化器使用索引。\n\
    \n默认情况下，优化器假设与全表扫描相关的多块读取I/O成本和与索引读取相关的单块读取成本是相同的。然而，单块读取的成本可能低于多块读取。`optimizer_index_cost_adj`参数允许您更准确地调整与索引读取相关的单块读取成本，以反映索引读取相对于全表扫描的真实成本。默认值100意味着单块读取是多块读取的100%——因此它告诉优化器将索引读取的成本视为与多块I/O全表扫描的成本相同。当您将参数设置为50时，您是在告诉优化器单块I/O（索引读取）的成本仅为多块I/O成本的一半。这会使优化器选择索引读取而非全表扫描。\n\
    \n请注意，准确的系统统计信息（`mbrc`、`mreadtim`、`sreadtim`等）会影响索引与全表扫描的使用。理想情况下，您应该收集工作负载系统统计信息，而不要调整`optimizer_index_cost_adj`参数。您也可以计算单块读取和多块读取的相对成本，并基于这些计算来设置`optimizer_index_cost_adj`参数值。然而，最佳策略是简单地在会话级别针对特定语句使用该参数，而不是在数据库级别使用。只需尝试该参数的不同级别，直到优化器开始使用索引。\n\
    \n您也可以使用更“科学”的方法来确定`optimizer_index_cost_adj`参数的正确设置，即将其设置为反映单块和多块读取“真实”差异的值。您可以简单地比较`db\
    \ file sequential read`等待事件（代表单块I/O）和`db file scattered read`等待事件（代表多块I/O）的平均等待时间，从而得出`optimizer_index_cost_adj`参数的近似值。发出以下查询以查看两个等待事件的平均等待时间。\n\
    \n```sql\nSQL> select event, average_wait from v$system_event\n     where event\
    \ like 'db file s%read';\nEVENT                                              \
    \       AVERAGE_WAIT\n----------------------------------------------------------------\
    \ ------------\ndb file sequential read                                      \
    \        .91\ndb file scattered read                                         \
    \     1.41\n\nSQL>\n```\n\n根据此查询的输出，单块顺序读取大约花费多块（分散）读取所需时间的75%。这表明`optimizer_cost_index_adj`参数应设置为75左右。然而，如前所述，不建议在数据库级别设置该参数——相反，应谨慎地在您希望强制使用索引的特定语句中使用此参数。\n\
    \n### 13-12. 启用查询优化器功能"
  raw: '#### How It Works


    By default the database immediately starts using all statistics it gathers. However,
    you can specify that the database not automatically use the new statistics it
    collects until you decide that the statistics are going to improve or at least
    don''t degrade current execution plans. You do this by keeping the new statistics
    in a *pending* state. Making the statistics available to the optimizer so it can
    use them in figuring out execution plans is called *publishing* the statistics.
    The database stores published statistics in its data dictionary. If you aren''t
    sure about the efficacy of a new set of statistics, you can keep the database
    from automatically publishing statistics until you complete testing them first.
    When you keep statistics in the pending state, the database won''t store them
    in the data dictionary—instead, it stores them in a private area, and makes those
    statistics available to the optimizer only if you set the `optimizer_use_pending_statistics`
    parameter to `true`.


    After specifying that the database must keep newly collected statistics in the
    pending status, you can choose to either publish the new statistics or delete
    them. Use the `publish_pending_stats` procedure to publish the statistics and
    the `delete_pending_stats` procedure to delete the statistics. If you delete the
    pending statistics for an object, the database will use existing statistics for
    that object.


    In this example, we showed how to change the `PUBLISH` setting for statistics
    at the table level. You can also do this at the schema level, but not at the database
    level. If working at the schema level, you need to run the following statements
    instead (the schema name is SH).


    `SQL> execute dbms_stats.set_schema_prefs(''SH'',''PUBLISH'',''false'');`

    `SQL> execute dbms_stats.publish_pending_stats(null,null);`

    `SQL> execute dbms_stats.delete_pending_stats(''SH'');`


    ### 13-11. Forcing the Optimizer to Use an Index


    #### Problem


    You know that using a certain index on a column is going to speed up a query,
    but the optimizer doesn''t use the index in its execution plans. You want to force
    the optimizer to use the index.


    #### Solution


    You can force the optimizer to use an index when it isn''t doing so, by adjusting
    the `optimizer_index_cost_adj` initialization parameter. You can set this parameter
    at the system or session level. Here''s an example that shows how to set this
    parameter at the session level:


    `SQL> alter session set optimizer_index_cost_adj=50;`


    `Session altered.`

    `SQL>`


    The default value for the `optimizer_index_cost_adj` parameter is 100, and you
    can set the parameter to a value between 0 and 10000\. The lower the value of
    the parameter, the more likely it is for the optimizer to use an index.


    #### How It Works


    The `optimizer_index_cost_adj` parameter lets you adjust the cost of an index
    access. The optimizer uses a default value of 100 for this parameter, which means
    that it evaluates an indexed access path based on the normal costing model. Based
    on the optimizer''s estimate of the cost of performing an indexed read, it makes
    the decision of whether to use the index. Usually this works fine. However, in
    some cases, the optimizer doesn''t use an index even if it leads to a better execution
    plan, because the optimizer''s estimates of the cost of the indexed access path
    may be off. Since it uses a default value of 100 for the `optimizer_index_cost_adj`
    parameter, you make the index cost seem lower to the optimizer by setting this
    parameter to a smaller value. Any value less than 100 makes the use of an index
    look cheaper (in terms of the cost of an indexed read) to the optimizer. Often,
    when you do this, the optimizer starts using the index you want it to use. In
    our example, we set the `optimizer_index_cost_adj` parameter to 50, making the
    cost of an index access path appear half as expensive as its normal cost (100).
    The lower you set the value of this parameter, the cheaper an index cost access
    path appears to the optimizer, and the more likely it will be to prefer an index
    access path to a full table scan.


    We recommend that you set the `optimizer_index_cost_adj` parameter only at the
    session level for a specific query, because it has the potential to change the
    execution plans for many queries if you set it at the database level. By default,
    if you set the `ALL_ROWS` optimizer goal, there''s a built-in preference for full
    table scans by the optimizer. By setting the `optimizer_index_cost_adj` parameter
    to a value less than 100, you''re inducing the optimizer to prefer an index scan
    over a full table scan. Use the `optimizer_index_cost_adj` parameter with confidence,
    especially in an OLTP environment, where you can experiment with low values such
    as 5 or 10 for the parameter to force the optimizer to use an index.


    By default, the optimizer assumes that the cost of a multiblock read I/O associated
    with a full table scan and the single block read cost associated with an indexed
    read are identical. However, a single block read is likely to be less expensive
    than a multiblock read. The `optimizer_index_cost_adj` parameter lets you adjust
    the cost of a single block read associated with an index read more accurately
    to reflect the true cost of an index read vis-à-vis the cost of a full table scan.
    The default value of 100 means that a single block read is 100% of a multiblock
    read—so it''s telling the optimizer to treat the cost of an indexed read as identical
    to the cost of a multiblock I/O full table scan. When you set the parameter to
    a value of 50, you''re telling the optimizer that the cost of a single block I/O
    (index read) is only half the cost of a multiblock I/O. This makes the optimizer
    choose the indexed read over a full table scan.


    Note that accurate system statistics (`mbrc`, `mreadtim`, `sreadtim`, etc.) have
    a bearing on the use of indexes vs. full table scans. Ideally, you should collect
    workload system statistics and leave the `optimizer_index_cost_adj` parameter
    alone. You can also calculate the relative costs of a single block read and a
    multiblock read and set the `optimizer_index_cost_adj` parameter value based on
    those calculations. However, the best strategy is to simply use the parameter
    at the session level for a specific statement and not at the database level. Simply
    experiment with various levels of the parameter until the optimizer starts using
    the index.


    You can also use a more “scientific” way to figure out the correct setting for
    the `optimizer_index_cost_adj` parameter, by setting it to a value that reflects
    the “true” difference between single and multiblock reads. You can simply compare
    the average wait times for the `db file sequential read` wait event (represents
    a single block I/O) and the `db file scattered read` wait event (represents multiblock
    I/O), to arrive at an approximate value for the `optimizer_index_cost_adj` parameter.
    Issue the following query to view the average wait times for both of the wait
    events.


    ` SQL> select event, average_wait from v$system_event`

    `      where event like ''db file s%read'';`

    `EVENT                                                            AVERAGE_WAIT`

    `---------------------------------------------------------------- ------------`

    `db file sequential read                                                   .91`

    `db file scattered read                                                   1.41`


    `SQL>`


    Based on the output of this query, single block sequential reads take roughly
    75% of the time it takes to perform a multiblock (scattered) read. This indicates
    that the `optimizer_cost_index_adj` parameter should be set to somewhere around
    75\. However, as we mentioned earlier, setting the parameter at the database level
    isn''t recommended—instead, use this parameter sparingly for specific statements
    where you want to force the use of an index.


    ### 13-12. Enabling Query Optimizer Features'
  trans: "\n### 13-10. 控制统计信息的发布\n\n#### 工作原理\n\n默认情况下，数据库会立即开始使用收集到的所有统计信息。但是，您可以指定数据库不自动使用新收集的统计信息，直到您确认这些统计信息将改进或至少不会降低当前的执行计划。您可以通过将新统计信息保持在*待处理*状态来实现这一点。使统计信息对优化器可用，以便其在计算执行计划时能够使用它们，这被称为*发布*统计信息。数据库将已发布的统计信息存储在其数据字典中。如果您不确定一组新统计信息的效果，可以防止数据库自动发布统计信息，直到您先完成测试。当您将统计信息保持在待处理状态时，数据库不会将其存储在数据字典中——而是将其存储在一个私有区域中，并且只有在您将`optimizer_use_pending_statistics`参数设置为`true`时，才会使这些统计信息对优化器可用。\n\
    \n在指定数据库必须将新收集的统计信息保持在待处理状态后，您可以选择发布新统计信息或将其删除。使用`publish_pending_stats`过程发布统计信息，使用`delete_pending_stats`过程删除统计信息。如果您删除了某个对象的待处理统计信息，数据库将使用该对象的现有统计信息。\n\
    \n在此示例中，我们展示了如何更改表级别的统计信息`PUBLISH`设置。您也可以在模式级别执行此操作，但不能在数据库级别执行。如果在模式级别操作，则需要运行以下语句（模式名称为\
    \ SH）。\n\n```sql\nSQL> execute dbms_stats.set_schema_prefs('SH','PUBLISH','false');\n\
    SQL> execute dbms_stats.publish_pending_stats(null,null);\nSQL> execute dbms_stats.delete_pending_stats('SH');\n\
    ```\n\n### 13-11. 强制优化器使用索引\n\n#### 问题\n\n您知道在某个列上使用特定索引会加快查询速度，但优化器在其执行计划中并未使用该索引。您希望强制优化器使用该索引。\n\
    \n#### 解决方案\n\n当优化器没有使用索引时，您可以通过调整`optimizer_index_cost_adj`初始化参数来强制其使用。您可以在系统或会话级别设置此参数。以下示例展示了如何在会话级别设置此参数：\n\
    \n```sql\nSQL> alter session set optimizer_index_cost_adj=50;\n\nSession altered.\n\
    SQL>\n```\n\n`optimizer_index_cost_adj`参数的默认值为 100，您可以将该参数设置为介于 0 到 10000 之间的值。该参数的值越低，优化器使用索引的可能性就越大。\n\
    \n#### 工作原理\n\n`optimizer_index_cost_adj`参数允许您调整索引访问的成本。优化器对此参数使用默认值 100，这意味着它基于正常的成本模型来评估索引访问路径。根据优化器对执行索引读取成本的估计，它决定是否使用索引。这通常工作良好。然而，在某些情况下，即使使用索引能带来更好的执行计划，优化器也不会使用它，因为优化器对索引访问路径成本的估计可能不准确。由于优化器对`optimizer_index_cost_adj`参数使用默认值\
    \ 100，您可以通过将此参数设置为较小的值，使索引成本在优化器看来更低。任何小于 100 的值都会使索引使用（就索引读取的成本而言）在优化器看来更便宜。通常，当您这样做时，优化器就会开始使用您希望它使用的索引。在我们的示例中，我们将`optimizer_index_cost_adj`参数设置为\
    \ 50，使索引访问路径的成本看起来是其正常成本（100）的一半。您设置此参数的值越低，索引成本访问路径在优化器看来就越便宜，它就越倾向于选择索引访问路径而非全表扫描。\n\
    \n我们建议您仅针对特定查询在会话级别设置`optimizer_index_cost_adj`参数，因为如果在数据库级别设置，它有可能改变许多查询的执行计划。默认情况下，如果您设置了`ALL_ROWS`优化器目标，优化器会内置偏好全表扫描。通过将`optimizer_index_cost_adj`参数设置为小于\
    \ 100 的值，您就是在诱导优化器偏好索引扫描而非全表扫描。可以放心地使用`optimizer_index_cost_adj`参数，尤其是在 OLTP 环境中，您可以尝试将该参数设置为较低的值（例如\
    \ 5 或 10），以强制优化器使用索引。\n\n默认情况下，优化器假设与全表扫描相关的多块读取 I/O 成本和与索引读取相关的单块读取成本是相同的。然而，单块读取的成本可能低于多块读取。`optimizer_index_cost_adj`参数允许您更准确地调整与索引读取相关的单块读取成本，以反映索引读取相对于全表扫描的真实成本。默认值\
    \ 100 意味着单块读取是多块读取的 100%——因此它告诉优化器将索引读取的成本视为与多块 I/O 全表扫描的成本相同。当您将参数设置为 50 时，您是在告诉优化器单块\
    \ I/O（索引读取）的成本仅为多块 I/O 成本的一半。这会使优化器选择索引读取而非全表扫描。\n\n请注意，准确的系统统计信息（`mbrc`、`mreadtim`、`sreadtim`等）会影响索引与全表扫描的使用。理想情况下，您应该收集工作负载系统统计信息，而不要调整`optimizer_index_cost_adj`参数。您也可以计算单块读取和多块读取的相对成本，并基于这些计算来设置`optimizer_index_cost_adj`参数值。然而，最佳策略是简单地在会话级别针对特定语句使用该参数，而不是在数据库级别使用。只需尝试该参数的不同级别，直到优化器开始使用索引。\n\
    \n您也可以使用更“科学”的方法来确定`optimizer_index_cost_adj`参数的正确设置，即将其设置为反映单块和多块读取“真实”差异的值。您可以简单地比较`db\
    \ file sequential read`等待事件（代表单块 I/O）和`db file scattered read`等待事件（代表多块 I/O）的平均等待时间，从而得出`optimizer_index_cost_adj`参数的近似值。发出以下查询以查看两个等待事件的平均等待时间。\n\
    \n```sql\nSQL> select event, average_wait from v$system_event\n     where event\
    \ like 'db file s%read';\nEVENT                                              \
    \       AVERAGE_WAIT\n----------------------------------------------------------------\
    \ ------------\ndb file sequential read                                      \
    \        .91\ndb file scattered read                                         \
    \     1.41\n\nSQL>\n```\n\n根据此查询的输出，单块顺序读取大约花费多块（分散）读取所需时间的 75%。这表明`optimizer_cost_index_adj`参数应设置为\
    \ 75 左右。然而，如前所述，不建议在数据库级别设置该参数——相反，应谨慎地在您希望强制使用索引的特定语句中使用此参数。\n\n### 13-12. 启用查询优化器功能\n"
- fmt: "### Problem\n\nYou've upgraded your database, but you want to ensure the query\
    \ plans don't change due to new optimizer features in the new release.\n\n###\
    \ Solution\n\nBy default, the database enables all query optimizer features in\
    \ the current database version. You can control the set of optimizer features\
    \ enabled in a database by setting the `optimizer_features_enable` initialization\
    \ parameter. For example, if you're running an Oracle Database 11g Release 2 database,\
    \ the optimizer features are set to the 11.2 release, as shown here:\n\n```sql\n\
    SQL> show parameter optimizer_features_enable\n\nNAME                        \
    \         TYPE        VALUE\n------------------------------------ -----------\
    \ ----------\noptimizer_features_enable            string      11.2.0.1\nSQL>\n\
    ```\n\nYou can set the optimizer features of a database to an earlier release\
    \ by setting the `optimizer_features_enable` parameter to a different value from\
    \ its default value (same as the database release). For example, in an 11.x release,\
    \ you can do this:\n\n```sql\nSQL> alter system set optimizer_features_enable='10.2.0.5';\n\
    \nSystem altered.\nSQL>\n```\n\nYou can now check the current value of the parameter:\n\
    \n```sql\nSQL> show  parameter optimizer_features_enable\n\nNAME             \
    \                    TYPE        VALUE\n------------------------------------ -----------\
    \ --------------\noptimizer_features_enable            string      10.2.0.5\n\
    SQL>\n```\n\nYou can set the `optimizer_features_enable` parameter to any past\
    \ major release or a point release, all the way back to the Oracle Database 8.0\
    \ release.\n\n### How It Works\n\nSetting the `optimizer_features_enable` parameter\
    \ to the value of the previous database release ensures that when you upgrade\
    \ the database, the optimizer will behave exactly the same way as it did before\
    \ the upgrade. This is a strategy that DBAs commonly use to ensure that query\
    \ plans don't suddenly deteriorate following an upgrade. Once you understand the\
    \ new optimizer features better, you can set the value of the `optimizer_features_enable`\
    \ parameter to the same value as the upgraded database release.\n\nOf course,\
    \ you won't be able to take advantage of any of the new optimizer features when\
    \ you set the `optimizer_features_enable` parameter to a lower value than the\
    \ current release—but you aren't going to be surprised by any sudden changes in\
    \ the execution plans either. Optimizer features don't change drastically between\
    \ releases, but it all depends on the database release. For example, there are\
    \ six major new optimizer features in the 11.1.0.6 release that weren't in the\
    \ 10.2.0.2 release. These include the enhanced bind peeking feature and the ability\
    \ to use extended statistics to estimate selectivity. Different applications will\
    \ behave differently following the introduction of a new optimizer feature—that's\
    \ where the ability to retain the current optimizer feature set during an upgrade\
    \ provides you a safety net. You get the opportunity to fully test and understand\
    \ the implications of the new optimizer features before enabling them in a production\
    \ database.\n\nThe example shown in the \"Solution\" section shows how to set\
    \ the optimizer features level for an entire database. You can, however, enable\
    \ it just at the session level (`alter session …`) to test for regressions in\
    \ execution plans following an upgrade. You can also specify the release number\
    \ with a hint, so you can test a query with optimizer features from a specific\
    \ release, as shown here in an 11.2 release database.\n\n```sql\nSQL>  select\
    \ /*+ optimizer_features_enable ('11.1.0.6')  */ sum(sales) from sales\n     \
    \ order by product_id;\n```\n\nThis `SELECT` statement was executed in an 11.2\
    \ release database, but uses optimizer features from the 11.1 release.\n\n## 13-13.\
    \ Keeping the Database from Creating Histograms\n\n### Problem\n\nYou think that\
    \ the presence of a histogram on a particular column is leading to sub-optimal\
    \ execution plans. You'd like the database not to use any histograms on that column.\n\
    \n### Solution\n\nYou need to do two things if you want to keep Oracle from using\
    \ the histogram it's automatically collecting on a column:\n\n1.  Drop the histogram\
    \ by executing the `DELETE_COLUMN_STATS` procedure:\n    ```sql\n    SQL> begin\n\
    \      2  dbms_stats.delete_column_stats(ownname=>'SH',tabname=>'SALES',\n   \
    \   3  colname=>'PROD_ID',col_stat_type=>'HISTOGRAM');\n      4  end;\n      5\
    \  /\n\n    PL/SQL procedure successfully completed.\n\n    SQL>\n    ```\n2.\
    \  Once you drop the histogram, tell Oracle not to create a histogram on the `PROD_ID`\
    \ column by executing the following `SET_TABLE_PREFS` procedure:\n    ```sql\n\
    \    SQL> begin\n      2  dbms_stats.set_table_prefs('SH','SALES','METHOD_OPT','FOR\
    \  ALL COLUMNS SIZE\n         AUTO,\n         FOR COLUMNS  SIZE 1 PROD_ID');\n\
    \      3  end;\n      4  /\n\n    PL/SQL procedure successfully completed.\n\n\
    \    SQL>\n    ```\n\n#### How it Works\n\nFor various reasons, DBAs often would\
    \ sometimes like to keep the optimizer from using a histogram on a column, If\
    \ there's already a histogram on a column, you must first get rid of it and then\
    \ use the `dbms_stats.set_table_prefs` procedure to keep the database from creating\
    \ a histogram on that column. In the Oracle Database 10g release, you drop the\
    \ histogram first, freeze the statistics (with the `lock_table_stats` procedure)\
    \ and then manually collect statistics on the table, specifying that the database\
    \ must not collect statistics for the column for which you dropped the histogram.\
    \ Because you locked the statistics, you must also specify the `force=true` option\
    \ when executing the `dbms_stats.gather_table_stats` procedure to manually collect\
    \ statistics on a table. As you can see, the `dbms_stats.set_table_prefs` procedure\
    \ in the 11g release makes things a lot simpler.\n\nIn the command shown in the\
    \ Solution section, `FOR ALL COLUMNS SIZE AUTO` option tells the database to create\
    \ histograms on any column that Oracle deems skewed. However, the `FOR COLUMNS\
    \ SIZE 1 PROD_ID` tells the database not to create a histogram for the column\
    \ `PROD_ID` in the `SH.SALES` table. The `SIZE` column accepts values 1–254, with\
    \ the integer number you specify representing the number of buckets in the histogram.\
    \ Telling the database to use just a single bucket (`N`=1) means that all data\
    \ will be in a single bucket—i.e., the database won't create a histogram on that\
    \ column.\n\n## 13-14. Improving Performance When Not Using Bind Variables\n\n\
    ### Problem\n\nFor various reasons, your developers didn't specify bind variables\
    \ in the code. You notice heavy latch contention and poor response times due to\
    \ the non-use of bind variables. You want to improve the performance of the database\
    \ in a situation like this, where you can't change existing code.\n\n### Solution\n\
    \nIf your applications aren't using bind variables, there will be an increase\
    \ in expensive hard-parsing in the database. To avoid this, you need to set the\
    \ `cursor_sharing` initialization parameter to a non-default value. The default\
    \ value for this parameter is `EXACT`. You can set the `cursor_sharing` parameter\
    \ to either `FORCE` or `SIMILAR` to determine which SQL statements can share the\
    \ same cursors.\n\nHere's how you can set the `cursor_sharing` parameter to `force`\
    \ or `similar`.\n\n```sql\nSQL> alter system set cursor_sharing=force;\nSQL> alter\
    \ system set cursor_sharing=similar;\n```\n\nSetting the `cursor_sharing` parameter\
    \ to a non-default value has several implications, as the next section explains."
