- fmt: '# Join Hints When Querying Multiple Tables


    If you are joining several tables, and wish to invoke a specific join method between
    all of the associated tables in the query, you must add a hint for each join condition—for
    example:


    ```sql

    SELECT /*+ use_hash(employees, department) use_hash(departments, locations)  */

    last_name, first_name, department_name,  city, state_province

    FROM employees JOIN departments USING (department_id)

    JOIN locations USING (location_id);

    ```


    ```

    -----------------------------------------------------

    | Id  | Operation               | Name              |

    -----------------------------------------------------

    |   0 | SELECT STATEMENT        |                   |

    |   1 |  HASH JOIN              |                   |

    |   2 |   HASH JOIN             |                   |

    |   3 |    TABLE ACCESS FULL    | LOCATIONS         |

    |   4 |    TABLE ACCESS FULL    | DEPARTMENTS       |

    |   5 |   VIEW                  | index$_join$_001  |

    |   6 |    HASH JOIN            |                   |

    |   7 |     INDEX FAST FULL SCAN| EMP_NAME_IX       |

    |   8 |     INDEX FAST FULL SCAN| EMP_DEPARTMENT_IX |

    -----------------------------------------------------

    ```


    ## How It Works


    [Table 14-2](#Chapter14.html#tab_14_2) summarizes the hints available for each
    of the different join methods. Hints to instruct the optimizer to choose a join
    method are sometimes necessary because of several factors:


    *   Status of statistics on the table

    *   Size of the PGA

    *   If the data is sorted at join time

    *   An unexplained choice of the optimizer


    Oracle advises against using hints as much as possible, as over time what was
    optimal at one moment under one circumstance and one version of the database software
    may not be optimal the next time. However, sometimes these hints can simply be
    helpful in fulfilling the short-term need or simply may be the only way to get
    the optimizer to do what you want it to do.


    ![images](images/t1402.jpg)


    ![images](images/square.jpg) **Tip** The size of your PGA can affect which join
    method the optimizer uses for your query.


    ## 14-5. Changing the Optimizer Version


    ### Problem


    You have upgraded to a newer version of Oracle, and you are having query performance
    problems related to the newer version of Oracle. The problem is isolated to a
    small number of queries, so you want to place a hint in these queries to use the
    previous version of the optimizer''s rules and features.


    ### Solution


    In order to specify a version of the optimizer for a given query, you specify
    the version of the optimizer you desire within the `optimizer_features_enable`
    hint. Within parentheses, place the desired version of the database within single
    quotes.


    ```sql

    SELECT /*+ optimizer_features_enable(''10.2'') */ *

    FROM EMP JOIN DEPT USING(DEPTNO);

    ```


    This method is mostly used as an interim measure to improve performance immediately
    following an upgrade, until analysis can be done and a resolution found with the
    query and the upgraded version of the database.


    ### How It Works


    You can modify the version of the optimizer for a given query. This can be done
    via the `optimizer_features_enable` hint, and will be in effect only for a given
    query. The primary reason this hint is used is that a query that performed well
    under one specific version of Oracle has seen performance degrade immediately
    following an Oracle database version upgrade.


    There is an Oracle initialization parameter, `optimizer_features_enable`, that
    can be changed for the entire database instance, and it is an option when widespread
    performance problems occur within queries immediately after you''ve upgraded your
    database. Often, however, changing this parameter at the database instance level
    is not feasible, nor even desired, as the primary reason for upgrading is to take
    advantage of new features. So, unless there are significant and widespread performance
    issues, it is not recommended to change the `optimizer_features_enable` parameter
    for an entire database instance.


    If you have a given query or a small subset of critical queries that are performing
    at a substandard performance level after an upgrade, a quick method to return
    to the pre-upgrade performance is to use the `optimizer_features_enable` hint
    to point to a specific version of the optimizer for a given query.


    ## 14-6. Choosing Between a Fast Response and Overall Optimization


    ### Problem


    When you execute a query, you can choose between two goals:


    *   *Fast, initial response*: Get to the point of returning some rows as quickly
    as possible.

    *   *Overall optimization*: Minimize overall cost at the expense of upfront processing
    time.


    Your instance will have a default goal configured for it. You can specify hints
    on a query-by-query basis to override the default goal and get the behavior that
    you want for a given query.


    ### Solution


    There are hints that can be used to override the optimization goal of your database
    instance. Before using any of the hints related to the `optimizer_mode`, you first
    want to validate what your database instance is currently set to. If you have
    the `SELECT ANY DICTIONARY` system privilege, you can see what value is set for
    the `optimizer_mode` parameter.


    ```sql

    SQL> show parameter optimizer_mode


    NAME                 TYPE        VALUE

    -------------------- -------------------- --------------------

    optimizer_mode       string      ALL_ROWS

    ```


    If we run an explain plan for an example query, we can see what the execution
    plan is by using the default `optimizer_mode` setting for our database instance.


    ```sql

    SELECT *

    FROM employees NATURAL JOIN departments;

    ```


    ```

    ------------------------------------------

    | Id  | Operation          | Name        |

    ------------------------------------------

    |   0 | SELECT STATEMENT   |             |

    |   1 |  HASH JOIN         |             |

    |   2 |   TABLE ACCESS FULL| DEPARTMENTS |

    |   3 |   TABLE ACCESS FULL| EMPLOYEES   |

    ------------------------------------------

    ```


    Since the foregoing query is doing full table scans against the tables, and we
    want to see some rows as soon as possible, but not necessarily the full result
    set, we can pass in a `FIRST_ROWS` hint to accomplish this task. It is apparent
    that this changes the optimizer''s execution plan in order to provide results
    as soon as possible.


    ```sql

    SELECT /*+ first_rows */ *

    FROM employees NATURAL JOIN departments;

    ```


    ```

    ----------------------------------------------------

    | Id  | Operation                    | Name        |

    ----------------------------------------------------

    |   0 | SELECT STATEMENT             |             |

    |   1 |  NESTED LOOPS                |             |

    |   2 |   NESTED LOOPS               |             |

    |   3 |    TABLE ACCESS FULL         | EMPLOYEES   |

    |   4 |    INDEX UNIQUE SCAN         | DEPT_ID_PK  |

    |   5 |   TABLE ACCESS BY INDEX ROWID| DEPARTMENTS |

    ----------------------------------------------------

    ```


    If we needed the reverse situation, and the database''s default `optimizer_mode`
    was set to `FIRST_ROWS`, we can supply an `ALL_ROWS` hint to tell the optimizer
    to use that mode when determining the execution plan:


    ```sql

    SQL> alter system set optimizer_mode=first_rows scope=both;


    System altered.


    SQL> show parameter optimizer_mode


    NAME                 TYPE        VALUE

    -------------------- -------------------- --------------------

    optimizer_mode       string      FIRST_ROWS

    ```


    ```sql

    SELECT /*+ all_rows */ *

    FROM employees NATURAL JOIN departments;

    ```


    ```

    ------------------------------------------

    | Id  | Operation          | Name        |

    ------------------------------------------

    |   0 | SELECT STATEMENT   |             |

    |   1 |  HASH JOIN         |             |

    |   2 |   TABLE ACCESS FULL| DEPARTMENTS |

    |   3 |   TABLE ACCESS FULL| EMPLOYEES   |

    ------------------------------------------

    ```'
