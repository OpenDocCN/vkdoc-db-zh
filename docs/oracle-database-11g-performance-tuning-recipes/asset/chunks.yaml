  raw: '#### How It Works


    As with other session tracing, the trace file can be found in the destination
    specified under the `user_dump_dest` parameter. The trace file shows granular
    information for the parallel processes. If you are experiencing significant performance
    issues with parallelism, and you wish to delve further into investigating the
    results of the trace files generated by this event, it may be beneficial to simply
    create a service request with Oracle in order to get the most detailed information.
    Reading and understanding these trace files can be difficult and cumbersome, and
    it may be more expedient to simply send the files to Oracle support for analysis.
    Yet another way to validate the DOP used for a parallel operation is to use the
    `_px_trace` facility, which also generates a trace file:


    `alter session set "_px_trace"="compilation","execution","messaging";`


    `select /*+ parallel(emp,4) */ * from emp;`


    Then, within the trace file, you can evaluate the DOP requested and used:


    `kkscscid_pdm_eval`

    `        pdml_allowed=0, cursorPdmlMode=0,                sessPdmlMode=0`

    `        select /*+ parallel(emp,4) */ * from emp`


    `kxfrDefaultDOP`

    `        DOP Trace -- compute default DOP`

    `            # CPU       = 2`

    `            Threads/CPU = 2 ("parallel_threads_per_cpu")`

    `            default DOP = 4 (# CPU * Threads/CPU)`


    `kxfpAdaptDOP`

    `        Requested=4 Granted=4 Target=8 Load=2 Default=4 users=0 sets=1`

    `        load adapt num servers requested to = 4 (from kxfpAdaptDOP())`


