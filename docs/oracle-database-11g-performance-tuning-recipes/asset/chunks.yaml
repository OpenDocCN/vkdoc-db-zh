    `|   8 |         INDEX FAST FULL SCAN| EMP_COPY_I1 |  Q1,00 | PCWP |            |`

    `--------------------------------------------------------------------------------`


    If you need to rebuild a partition of a large local index, you can also use parallelism
    to perform this operation. See the following example:


    `ALTER INDEX emppart_i1`

    `REBUILD PARTITION emppart2001_p`

    `PARALLEL(DEGREE 4);`


    `--------------------------------------------------------------------------------------`

    `| Id  | Operation                   | Name       | Pstart| Pstop |IN-OUT| PQ
    Distrib |`

    `--------------------------------------------------------------------------------------`

    `|   0 | ALTER INDEX STATEMENT       |            |       |       |      |            |`

    `|   1 |  PX COORDINATOR             |            |       |       |      |            |`

    `|   2 |   PX SEND QC (ORDER)        | :TQ10001   |       |       | P->S | QC
    ORDER)  |`

    `|   3 |    INDEX BUILD NON UNIQUE   | EMPPART_I1 |       |       | PCWP |            |`

    `|   4 |     SORT CREATE INDEX       |            |       |       | PCWP |            |`

    `|   5 |      PX RECEIVE             |            |       |       | PCWP |            |`

    `|   6 |       PX SEND RANGE         | :TQ10000   |       |       | P->P | RANGE      |`

    `|   7 |        PX BLOCK ITERATOR    |            |     2 |     2 | PCWC |            |`

    `|   8 |         INDEX FAST FULL SCAN| EMPPART_I1 |     2 |     2 | PCWP |            |`

    `--------------------------------------------------------------------------------------`


    #### How It Works


    Rebuilding an index has a key advantage over re-creating an index from scratch,
    as well as a key disadvantage. The advantage of rebuilding an index is that the
    existing index is in place until the rebuild operation is complete, so it can
    therefore be used by queries that are run concurrently with the rebuild process.
    The main disadvantage of the index rebuild process is that you will need space
