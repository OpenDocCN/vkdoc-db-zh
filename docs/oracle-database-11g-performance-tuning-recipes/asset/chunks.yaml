  trans: "#### 解决方案\n\nSQL 操作的执行计划会逐步详细说明 Oracle 优化器将如何执行您的 SQL 操作。使用`AUTOTRACE`，我们可以获取以下查询的执行计划：\n\
    \n```sql\nset autotrace trace explain\n\nSELECT ename, dname\nFROM emp JOIN dept\
    \ USING (deptno);\n```\n\n```\n----------------------------------------------------------------------------------------\n\
    | Id  | Operation                    | Name    | Rows  | Bytes | Cost (%CPU)|\
    \ Time     |\n----------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT             |         |    14 |   308 |     6  (17)|\
    \ 00:00:01 |\n|   1 |   MERGE JOIN                 |         |    14 |   308 |\
    \     6  (17)| 00:00:01 |\n|   2 |    TABLE ACCESS BY INDEX ROWID| DEPT    | \
    \    4 |    52 |     2   (0)| 00:00:01 |\n|   3 |     INDEX FULL SCAN        \
    \  | PK_DEPT |     4 |       |     1   (0)| 00:00:01 |\n|*  4 |    SORT JOIN \
    \                |         |    14 |   126 |     4  (25)| 00:00:01 |\n|   5 |\
    \     TABLE ACCESS FULL        | EMP     |    14 |   126 |     3   (0)| 00:00:01\
    \ |\n----------------------------------------------------------------------------------------\n\
    \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
    \n   4 - access(\"EMP\".\"DEPTNO\"=\"DEPT\".\"DEPTNO\")\n       filter(\"EMP\"\
    .\"DEPTNO\"=\"DEPT\".\"DEPTNO\")\n\nNote\n-----\n   - automatic DOP: Computed\
    \ Degree of Parallelism is 1 because of parallel threshold\n```\n\n一旦您有了一个需要解读的执行计划，就可以判断哪些步骤最先执行，因为最内层或缩进最深的步骤最先执行，并且执行顺序是从内到外，自顶向下。在上述查询中，我们正在连接`EMP`和`DEPT`表。根据执行计划，该查询的处理步骤如下：\n\
    \n1.  扫描`PK_DEPT`索引（ID 3）。\n2.  扫描`EMP`表的所有行（ID 5）。\n3.  根据`PK_DEPT`索引中的匹配条目，从`DEPT`表中检索行（ID\
    \ 2）。\n4.  对来自`EMP`表的结果数据进行排序（ID 4）。\n5.  然后通过`MERGE JOIN`连接来自`EMP`和`DEPT`表的数据（ID\
    \ 1）。\n6.  查询的结果数据返回给用户（ID 0）。\n\n#### 工作原理\n\n当您第一次查看一个执行计划，并希望快速了解查询将按哪些步骤执行时，请执行以下操作：\n\
    \n1.  在计划中寻找缩进最深的行（最右边的行）。这些将最先执行。\n2.  如果有多个行处于同一缩进级别，它们将在计划中按自顶向下的方式执行，即计划中最顶部的行先执行，然后向下移动。\n\
    3.  查看下一个缩进级别最深的行或行，并继续向外层处理。\n4.  执行计划的顶部对应于计划中缩进最少或最左边的部分，通常是结果返回给用户的地方。\n\n\
    一旦您有了一个查询的执行计划，并能理解查询将被处理的顺序，您就可以进行一些分析，以确定您正在查看的执行计划是否高效。在查看执行计划时，请回答这些问题，并在确定计划是否高效时考虑以下因素：\n\
    \n*   查询的访问路径是什么（查询是执行全表扫描还是使用索引）？\n*   查询的连接方法是什么（如果存在连接条件）？\n*   查看查询`WHERE`子句中的过滤条件所涉及的列，并确定它们是否被索引。\n\
    *   获取查询中每个表的数据量或行数。这些表是小型、中型还是大型？这可能有助于您确定最合适的连接方法。关于连接方法类型的概要，请参见表 9-3。\n* \
    \  查询所涉及对象的统计信息上次收集是什么时候？\n*   查看执行计划的`COST`列，获取初始成本。\n\n通过查看我们最初的执行计划，我们确定`EMP`表尺寸较大，并且在`DEPT`和`EMP`表之间连接条件中使用的`DEPTNO`列上没有索引。通过在`EMP`表的`DEPTNO`列上创建索引并收集`EMP`表的统计信息，新的计划现在使用了索引：\n\
    \n```\n---------------------------------------------------------------------------------------\n\
    | Id  | Operation                    | Name   | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n---------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT             |        |    14 |   280 |     6  (17)| 00:00:01\
    \ |\n|   1 |   MERGE JOIN                 |        |    14 |   280 |     6  (17)|\
    \ 00:00:01 |\n|   2 |    TABLE ACCESS BY INDEX ROWID| EMP    |    14 |    98 |\
    \     2   (0)| 00:00:01 |\n|   3 |     INDEX FULL SCAN          | EMP_I2 |   \
    \ 14 |       |     1   (0)| 00:00:01 |\n|*  4 |    SORT JOIN                 |\
    \        |     4 |    52 |     4  (25)| 00:00:01 |\n|   5 |     TABLE ACCESS FULL\
    \        | DEPT   |     4 |    52 |     3   (0)| 00:00:01 |\n---------------------------------------------------------------------------------------\n\
    ```\n\n![images](img/t0903.jpg)\n\n有关并行执行计划的信息，请参见第 15 章。\n\n![images](img/square.jpg)\
    \ **提示** 导致执行计划次优的最常见原因之一是查询所涉及的一个或多个对象缺少最新的统计信息。\n\n### 9-5. 监控长时间运行的 SQL 语句\n\
    \n#### 问题\n\n您有一个运行时间很长的 SQL 语句，希望能够监控该语句的进度并了解它何时完成。\n\n#### 解决方案\n\n通过查看数据字典视图`V$SESSION_LONGOPS`中长时间运行查询的信息，您可以估算查询大概何时完成。假设您正在对一个大型表运行以下带有连接条件的查询：\n\
    \n```sql\nSELECT last_name, first_name FROM employees_big\nWHERE last_name = 'EVANS';\n\
    ```\n\n通过对`V$SESSION_LONGOPS`视图进行一个简单的查询，您可以快速了解查询将执行多长时间以及何时完成：\n\n```sql\nSELECT\
    \ username, target, sofar blocks_read, totalwork total_blocks,\nround(time_remaining/60)\
    \ minutes\nFROM v$session_longops\nWHERE sofar <> totalwork\nand username = 'HR';\n\
    ```\n\n```\nUSERNAME     TARGET               BLOCKS_READ TOTAL_BLOCKS    MINUTES\n\
    ------------ -------------------- ----------- ------------ ----------\nHR    \
    \       HR.EMPLOYEES_BIG           81101      2353488         10\n```\n\n随着查询的进行，您会看到`BLOCKS_READ`列增加，而`MINUTES`列减少。通常需要添加`WHERE`子句来排除已完成的行，这就是为什么在上面的查询中，它要求显示`SOFAR`列不等于`TOTALWORK`的行。\n\
    \n#### 工作原理\n\n为了能够在`V$SESSION_LONGOPS`视图中监控查询，需满足以下要求：\n\n*   查询必须运行六秒或更长时间。\n\
    *   被访问的表必须大于 10,000 个数据库块。\n*   必须设置`TIMED_STATISTICS`或启用`SQL_TRACE`。\n*   查询中的对象必须通过`DBMS_STATS`或`ANALYZE`进行过分析。\n\
    \n此视图可以包含`SELECT`语句、DML 语句（如`UPDATE`）以及 DDL 语句（如`CREATE INDEX`）的信息。一些常见的会出现在`V$SESSION_LONGOPS`视图中的操作包括表扫描、索引扫描、连接操作、并行操作、RMAN\
    \ 备份操作、排序操作和 Data Pump 操作。\n\n### 9-6. 识别当前正在执行的、消耗资源的 SQL 语句"
- fmt: "## 9-6. Identifying the Most Resource-Consuming SQL\n\n### Problem\n\nYou\
    \ have contention issues within your database, and want to identify the SQL statement\
    \ consuming the most system resources.\n\n![images](images/square.jpg) **Note**\
    \ Recipe 9-9 shows how to examine the historical record to find resource-consuming\
    \ SQL statements that have executed in the past, but that are not currently executing.\n\
    \n### Solution\n\nLook at the `V$SQLSTATS` view, which gives information about\
    \ currently or recently run SQL statements. If you wanted to get the top five\
    \ recent SQL statements that performed the highest disk I/O, you could issue the\
    \ following query:\n\n```sql\nSELECT sql_text, disk_reads FROM\n  (SELECT sql_text,\
    \ buffer_gets, disk_reads, sorts,\n   cpu_time/1000000 cpu, rows_processed, elapsed_time\n\
    \   FROM v$sqlstats\n   ORDER BY disk_reads DESC)\nWHERE rownum <= 5;\n```\n\n\
    If you wanted to see the top five SQL statements by CPU time, sorts, loads, invalidations,\
    \ or any other column, simply replace the `disk_reads` column in the foregoing\
    \ query with your desired column. The `SQL_TEXT` column can make the results look\
    \ messy, so another alternative is to substitute the `SQL_TEXT` column with `SQL_ID`,\
    \ and then, based on the statistics shown, you can run a query to simply get the\
    \ `SQL_TEXT` based on a given `SQL_ID`.\n\n### How It Works\n\nThe `V$SQLSTATS`\
    \ view is meant to help more quickly find information on resource-consuming SQL\
    \ statements. `V$SQLSTATS` has the same information as the `V$SQL` and `V$SQLAREA`\
    \ views, but `V$SQLSTATS` has only a subset of columns of the other views. However,\
    \ data is held within the `V$SQLSTATS` longer than either `V$SQL` or `V$SQLAREA`.\n\
    \nSometimes, there are SQL statements that are related to the database background\
    \ processing of keeping the database running, and you may not want to see those\
    \ statements, but only the ones related to your application. If you join `V$SQLSTATS`\
    \ to `V$SQL`, you can see information for particular users. See the following\
    \ example:\n\n```sql\nSELECT schema, sql_text, disk_reads, round(cpu,2) FROM\n\
    \  (SELECT s.parsing_schema_name schema, t.sql_id, t.sql_text, t.disk_reads,\n\
    \  t.sorts, t.cpu_time/1000000 cpu, t.rows_processed, t.elapsed_time\n   FROM\
    \ v$sqlstats t join v$sql s on(t.sql_id = s.sql_id)\n  WHERE parsing_schema_name\
    \ = 'SCOTT'\n  ORDER BY disk_reads DESC)\nWHERE rownum <= 5;\n```\n\nKeep in mind\
    \ that `V$SQL` represents SQL held in the shared pool, and is aged out faster\
    \ than the data in `V$SQLSTATS`, so this query will not return data for SQL that\
    \ has been already aged out of the shared pool.\n\n## 9-7. Seeing Execution Statistics\
    \ for Currently Running SQL\n\n### Problem\n\nYou want to view execution statistics\
    \ for SQL statements that are currently running.\n\n### Solution\n\nYou can use\
    \ the `V$SQL_MONITOR` view to see real-time statistics of currently running SQL,\
    \ and see the resource consumption used for a given query based on such statistics\
    \ as CPU usage, buffer gets, disk reads, and elapsed time of the query. Let's\
    \ first find a current executing query within our database:\n\n```sql\nSELECT\
    \ sid, sql_text FROM v$sql_monitor\nWHERE status = 'EXECUTING';\n```\n```\n  \
    \     SID SQL_TEXT\n---------- -----------------------------------------------------------------\n\
    \       100 select department_name, city, avg(salary)\n           from employees_big\
    \ join departments using(department_id)\n           join locations using (location_id)\n\
    \           group by department_name, city\n           having avg(salary) > 2000\n\
    \           order by 2,1\n```\n\nFor the foregoing executing query found in `V$SQL_MONITOR`,\
    \ we can see the resource utilization for that statement as it executes:\n\n```sql\n\
    SELECT sid, buffer_gets, disk_reads, round(cpu_time/1000000,1) cpu_seconds\nFROM\
    \ v$sql_monitor\nWHERE SID=100\nAND status = 'EXECUTING';\n```\n```\n       SID\
    \ BUFFER_GETS DISK_READS CPU_SECONDS\n---------- ----------- ---------- -----------\n\
    \       100      149372       4732        39.1\n```\n\nThe `V$SQL_MONITOR` view\
    \ contains currently running SQL statements, as well as recently run SQL statements.\
    \ If you wanted to see the top five most CPU-consuming queries in your database,\
    \ you could issue the following query:\n\n```sql\nSELECT * FROM (\n  SELECT sid,\
    \ buffer_gets, disk_reads, round(cpu_time/1000000,1) cpu_seconds\n  FROM v$sql_monitor\n\
    \  ORDER BY cpu_time desc)\nWHERE rownum <= 5;\n```\n```\n       SID BUFFER_GETS\
    \ DISK_READS CPU_SECONDS\n---------- ----------- ---------- -----------\n    \
    \    20     1332665      30580       350.5\n       105      795330      13651\
    \       269.7\n        20      259324       5449        71.6\n        20     \
    \ 259330       5485        71.3\n       100      259236       8188        67.9\n\
    ```"
  raw: '#### Problem


    You have contention issues within your database, and want to identify the SQL
    statement consuming the most system resources.


    ![images](images/square.jpg) **Note** Recipe 9-9 shows how to examine the historical
    record to find resource-consuming SQL statements that have executed in the past,
    but that are not currently executing.


    #### Solution


    Look at the `V$SQLSTATS` view, which gives information about currently or recently
    run SQL statements. If you wanted to get the top five recent SQL statements that
    performed the highest disk I/O, you could issue the following query:


    `SELECT sql_text, disk_reads FROM`

    `  (SELECT sql_text, buffer_gets, disk_reads, sorts,`

    `   cpu_time/1000000 cpu, rows_processed, elapsed_time`

    `   FROM v$sqlstats`

    `   ORDER BY disk_reads DESC)`

    `WHERE rownum <= 5;`


    If you wanted to see the top five SQL statements by CPU time, sorts, loads, invalidations,
    or any other column, simply replace the `disk_reads` column in the foregoing query
    with your desired column. The `SQL_TEXT` column can make the results look messy,
    so another alternative is to substitute the `SQL_TEXT` column with `SQL_ID`, and
    then, based on the statistics shown, you can run a query to simply get the `SQL_TEXT`
    based on a given `SQL_ID`.


    #### How It Works


    The `V$SQLSTATS` view is meant to help more quickly find information on resource-consuming
    SQL statements. `V$SQLSTATS` has the same information as the `V$SQL` and `V$SQLAREA`
    views, but `V$SQLSTATS` has only a subset of columns of the other views. However,
    data is held within the `V$SQLSTATS` longer than either `V$SQL` or `V$SQLAREA`.


    Sometimes, there are SQL statements that are related to the database background
    processing of keeping the database running, and you may not want to see those
    statements, but only the ones related to your application. If you join `V$SQLSTATS`
    to `V$SQL`, you can see information for particular users. See the following example:


    `SELECT schema, sql_text, disk_reads, round(cpu,2) FROM`

    `  (SELECT s.parsing_schema_name schema, t.sql_id, t.sql_text, t.disk_reads,`

    `  t.sorts, t.cpu_time/1000000 cpu, t.rows_processed, t.elapsed_time`

    `   FROM v$sqlstats t join v$sql s on(t.sql_id = s.sql_id)`

    `  WHERE parsing_schema_name = ''SCOTT''`

    `  ORDER BY disk_reads DESC)`

    `WHERE rownum <= 5;`


    Keep in mind that `V$SQL` represents SQL held in the shared pool, and is aged
    out faster than the data in `V$SQLSTATS`, so this query will not return data for
    SQL that has been already aged out of the shared pool.


    ### 9-7. Seeing Execution Statistics for Currently Running SQL


    #### Problem


    You want to view execution statistics for SQL statements that are currently running.


    #### Solution


    You can use the `V$SQL_MONITOR` view to see real-time statistics of currently
    running SQL, and see the resource consumption used for a given query based on
    such statistics as CPU usage, buffer gets, disk reads, and elapsed time of the
    query. Let''s first find a current executing query within our database:


    `SELECT sid, sql_text FROM v$sql_monitor`

    `WHERE status = ''EXECUTING'';`


    `       SID SQL_TEXT`

    `---------- -----------------------------------------------------------------`

    `       100 select department_name, city, avg(salary)`

    `           from employees_big join departments using(department_id)`

    `           join locations using (location_id)`

    `           group by department_name, city`

    `           having avg(salary) > 2000`

    `           order by 2,1`


    For the foregoing executing query found in `V$SQL_MONITOR`, we can see the resource
    utilization for that statement as it executes:


    `SELECT sid, buffer_gets, disk_reads, round(cpu_time/1000000,1) cpu_seconds`

    `FROM v$sql_monitor`

    `WHERE SID=100`

    `AND status = ''EXECUTING'';`


    `       SID BUFFER_GETS DISK_READS CPU_SECONDS`

    `---------- ----------- ---------- -----------`

    `       100      149372       4732        39.1`


    The `V$SQL_MONITOR` view contains currently running SQL statements, as well as
    recently run SQL statements. If you wanted to see the top five most CPU-consuming
    queries in your database, you could issue the following query:


    `SELECT * FROM (`

    `  SELECT sid, buffer_gets, disk_reads, round(cpu_time/1000000,1) cpu_seconds`

    `  FROM v$sql_monitor`

    `  ORDER BY cpu_time desc)`

    `WHERE rownum <= 5;`


    `       SID BUFFER_GETS DISK_READS CPU_SECONDS`

    `---------- ----------- ---------- -----------`

    `        20     1332665      30580       350.5`

    `       105      795330      13651       269.7`

    `        20      259324       5449        71.6`

    `        20      259330       5485        71.3`

    `       100      259236       8188        67.9`'
  trans: "\n## 9-6. 识别资源消耗最大的 SQL\n\n### 问题\n\n您的数据库中存在争用问题，并希望识别消耗系统资源最多的 SQL 语句。\n\
    \n![图示](img/square.jpg) **注意** 配方 9-9 展示了如何检查历史记录，以查找过去执行过、但当前未在执行的资源消耗大的 SQL\
    \ 语句。\n\n### 解决方案\n\n查看`V$SQLSTATS`视图，它提供了当前或最近运行的 SQL 语句的信息。如果您想获取最近执行磁盘 I/O\
    \ 最多的前五个 SQL 语句，可以执行以下查询：\n\n```sql\nSELECT sql_text, disk_reads FROM\n  (SELECT\
    \ sql_text, buffer_gets, disk_reads, sorts,\n   cpu_time/1000000 cpu, rows_processed,\
    \ elapsed_time\n   FROM v$sqlstats\n   ORDER BY disk_reads DESC)\nWHERE rownum\
    \ <= 5;\n```\n\n如果您想按 CPU 时间、排序次数、加载次数、失效次数或任何其他列查看前五个 SQL 语句，只需将上述查询中的`disk_reads`列替换为您期望的列即可。`SQL_TEXT`列可能会使结果看起来很杂乱，因此另一种方法是使用`SQL_ID`列替代`SQL_TEXT`列，然后根据显示的统计数据，您可以运行一个查询，仅基于给定的`SQL_ID`获取其`SQL_TEXT`。\n\
    \n### 工作原理\n\n`V$SQLSTATS`视图旨在帮助更快速地查找有关资源消耗大的 SQL 语句的信息。`V$SQLSTATS`包含与`V$SQL`和`V$SQLAREA`视图相同的信息，但它只包含了这些视图的一个列子集。然而，数据在`V$SQLSTATS`中保留的时间比在`V$SQL`或`V$SQLAREA`中更长。\n\
    \n有时，会存在一些与维护数据库运行的后台处理相关的 SQL 语句，您可能不希望看到这些语句，而只希望看到与您的应用程序相关的那些。如果您将`V$SQLSTATS`与`V$SQL`连接，就可以看到特定用户的信息。请参见以下示例：\n\
    \n```sql\nSELECT schema, sql_text, disk_reads, round(cpu,2) FROM\n  (SELECT s.parsing_schema_name\
    \ schema, t.sql_id, t.sql_text, t.disk_reads,\n  t.sorts, t.cpu_time/1000000 cpu,\
    \ t.rows_processed, t.elapsed_time\n   FROM v$sqlstats t join v$sql s on(t.sql_id\
    \ = s.sql_id)\n  WHERE parsing_schema_name = 'SCOTT'\n  ORDER BY disk_reads DESC)\n\
    WHERE rownum <= 5;\n```\n\n请记住，`V$SQL`代表保存在共享池中的 SQL，其数据老化清除的速度比`V$SQLSTATS`中的数据快，因此此查询不会返回已经从共享池中老化清除的\
    \ SQL 的数据。\n\n## 9-7. 查看当前运行 SQL 的执行统计信息\n\n### 问题\n\n您想查看当前正在运行的 SQL 语句的执行统计信息。\n\
    \n### 解决方案\n\n您可以使用`V$SQL_MONITOR`视图来查看当前运行 SQL 的实时统计信息，并根据 CPU 使用率、缓冲区获取次数、磁盘读取次数和查询耗时等统计信息，查看给定查询所使用的资源消耗。首先，让我们在数据库中查找一个当前正在执行的查询：\n\
    \n```sql\nSELECT sid, sql_text FROM v$sql_monitor\nWHERE status = 'EXECUTING';\n\
    ```\n```\n       SID SQL_TEXT\n---------- -----------------------------------------------------------------\n\
    \       100 select department_name, city, avg(salary)\n           from employees_big\
    \ join departments using(department_id)\n           join locations using (location_id)\n\
    \           group by department_name, city\n           having avg(salary) > 2000\n\
    \           order by 2,1\n```\n\n对于在`V$SQL_MONITOR`中找到的上述正在执行的查询，我们可以在其执行时查看该语句的资源利用情况：\n\
    \n```sql\nSELECT sid, buffer_gets, disk_reads, round(cpu_time/1000000,1) cpu_seconds\n\
    FROM v$sql_monitor\nWHERE SID=100\nAND status = 'EXECUTING';\n```\n```\n     \
    \  SID BUFFER_GETS DISK_READS CPU_SECONDS\n---------- ----------- ---------- -----------\n\
    \       100      149372       4732        39.1\n```\n\n`V$SQL_MONITOR`视图包含当前正在运行的\
    \ SQL 语句，以及最近运行过的 SQL 语句。如果您想查看数据库中消耗 CPU 最多的前五个查询，可以执行以下查询：\n\n```sql\nSELECT\
    \ * FROM (\n  SELECT sid, buffer_gets, disk_reads, round(cpu_time/1000000,1) cpu_seconds\n\
    \  FROM v$sql_monitor\n  ORDER BY cpu_time desc)\nWHERE rownum <= 5;\n```\n```\n\
    \       SID BUFFER_GETS DISK_READS CPU_SECONDS\n---------- ----------- ----------\
    \ -----------\n        20     1332665      30580       350.5\n       105     \
    \ 795330      13651       269.7\n        20      259324       5449        71.6\n\
    \        20      259330       5485        71.3\n       100      259236       8188\
    \        67.9\n```\n"
- fmt: "### How It Works\n\nSQL 语句在 `V$SQL_MONITOR` 中针对以下条件进行监控：\n\n*   对任何并行语句自动监控\n\
    *   对任何 DML 或 DDL 语句自动监控\n*   如果特定 SQL 语句消耗了至少五秒的 CPU 或 I/O 时间，则自动监控\n*   对任何在语句级别设置了监控的\
    \ SQL 语句进行监控\n\n要在语句级别开启监控，可以使用 hint。参见以下示例：\n\n```sql\nSELECT /*+ monitor */\
    \ ename, dname\nFROM emppart JOIN dept USING (deptno);\n```\n\n如果由于某种原因，你不想监控某些语句，可以在语句中使用\
    \ `NOMONITOR` hint 来阻止监控的发生。\n\n`V$SQL_MONITOR` 中的统计信息几乎是实时更新的，即每秒更新一次。任何当前正在执行并被监控的\
    \ SQL 语句都可以在 `V$SQL_MONITOR` 中找到。已完成的查询在执行结束后至少会保留一分钟，并且根据新执行查询所需的空间要求，可能会保留更长时间。`V$SQL_MONITOR`\
    \ 视图的一个关键优势是它为给定查询的每一次执行都提供了详细的统计信息，这与 `V$SQL` 不同，后者是多个 SQL 语句执行的累积结果。为了深入查看 SQL\
    \ 语句的特定执行，你需要来自 `V$SQL_MONITOR` 的三个列：\n\n1.  `SQL_ID`\n2.  `SQL_EXEC_START`\n\
    3.  `SQL_EXEC_ID`\n\n如果我们想查看给定查询的所有执行（基于 `SQL_ID` 列），我们可以通过查询这三个必要的列来钻取到 SQL 查询的特定执行来获取该信息：\n\
    \n```sql\nSELECT * FROM (\n  SELECT sql_id, to_char(sql_exec_start,'yyyy-mm-dd:hh24:mi:ss')\
    \ sql_exec_start,\n         sql_exec_id, sum(buffer_gets) buffer_gets,\n     \
    \    sum(disk_reads) disk_reads, round(sum(cpu_time/1000000),1) cpu_secs\n  FROM\
    \ v$sql_monitor\n  WHERE sql_id = 'fcg00hyh7qbpz'\n  GROUP BY sql_id, sql_exec_start,\
    \ sql_exec_id\n  ORDER BY 6 desc)\nWHERE rownum <= 5;\n```\n\n```\nSQL_ID    \
    \    SQL_EXEC_START      SQL_EXEC_ID BUFFER_GETS DISK_READS CPU_SECS\n-------------\
    \ ------------------- ----------- ----------- ---------- --------\nfcg00hyh7qbpz\
    \ 2011-05-21:12:28:10    16777222      259324       5449     71.6\nfcg00hyh7qbpz\
    \ 2011-05-21:12:29:24    16777223      259330       5485     71.3\nfcg00hyh7qbpz\
    \ 2011-05-21:12:26:08    16777220      213823       4502     58.4\nfcg00hyh7qbpz\
    \ 2011-05-21:12:27:09    16777221      211752       4579     58.1\nfcg00hyh7qbpz\
    \ 2011-05-21:12:25:37    16777219      107973       2414     29.4\n```\n\n请记住，如果语句在并行运行，查询的每个并行线程都会出现一行，包括查询协调器。但是，它们将共享相同的\
    \ `SQL_ID`、`SQL_EXEC_START` 和 `SQL_EXEC_ID` 值。在这种情况下，如果你愿意，可以对特定统计信息执行聚合。参见以下并行查询示例，其中由\
    \ `PX_SERVER#` 列表示并行从属信息：\n\n```sql\nSELECT sql_id, sql_exec_start, sql_exec_id,\
    \ px_server# px#, disk_reads,\n       cpu_time/1000000 cpu_secs, buffer_gets\n\
    FROM v$sql_monitor\nWHERE status = 'EXECUTING'\nORDER BY px_server#;\n```\n\n\
    ```\nSQL_ID        SQL_EXEC_S SQL_EXEC_ID PX# DISK_READS CPU_SECS BUFFER_GETS\n\
    ------------- ---------- ----------- --- ---------- -------- -----------\n0gzf8010xdasr\
    \ 2011-05-21    16777216   1       4306     38.0      136303\n0gzf8010xdasr 2011-05-21\
    \    16777216   2       4625     40.6      146497\n0gzf8010xdasr 2011-05-21  \
    \  16777216   3       4774     41.6      149717\n0gzf8010xdasr 2011-05-21    16777216\
    \   4       4200     37.6      132167\n0gzf8010xdasr 2011-05-21    16777216  \
    \       6     92.2          53\n```\n\n然后，要对给定查询（在我们的例子中是并行查询）执行简单聚合，聚合是针对构成给定\
    \ SQL 语句单次执行的三个关键列进行的：\n\n```sql\nSELECT sql_id, sql_exec_start, sql_exec_id,\
    \ sum(buffer_gets) buffer_gets,\n       sum(disk_reads) disk_reads, round(sum(cpu_time/1000000),1)\
    \ cpu_seconds\nFROM v$sql_monitor\nWHERE sql_id = '0gzf8010xdasr'\nGROUP BY sql_id,\
    \ sql_exec_start, sql_exec_id;\n```\n\n```\nSQL_ID        SQL_EXEC_S SQL_EXEC_ID\
    \ BUFFER_GETS DISK_READS CPU_SECONDS\n------------- ---------- ----------- -----------\
    \ ---------- -----------\n0gzf8010xdasr 2011-05-21    16777216      642403   \
    \   20351       283.7\n```\n\n如果你想对一个 SQL 语句执行聚合，不管它执行了多少次，只需在 `SQL_ID` 列上运行聚合查询即可，如下所示：\n\
    \n```sql\nSELECT sql_id, sum(buffer_gets) buffer_gets,\n       sum(disk_reads)\
    \ disk_reads, round(sum(cpu_time/1000000),1) cpu_seconds\nFROM v$sql_monitor\n\
    WHERE sql_id = '0gzf8010xdasr'\nGROUP BY sql_id;\n```\n\n![images](images/square.jpg)\
    \ **注意** 必须将初始化参数 `STATISTICS_LEVEL` 设置为 `TYPICAL` 或 `ALL`，并且将 `CONTROL_MANAGEMENT_PACK_ACCESS`\
    \ 设置为 `DIAGNOSTIC+TUNING`，SQL 监控才能发生。\n\n### 9-8. 监控 SQL 执行计划的进度\n\n#### 问题\n\n\
    你想从正在使用的执行计划中查看查询的进度。"
  raw: '#### How It Works


    SQL statements are monitored in `V$SQL_MONITOR` under the following conditions:


    *   Automatically for any parallelized statements

    *   Automatically for any DML or DDL statements

    *   Automatically if a particular SQL statement has consumed at least five seconds
    of CPU or I/O time

    *   Monitored for any SQL statement that has monitoring set at the statement level


    To turn monitoring on at the statement level, a hint can be used. See the following
    example:


    `SELECT /*+ monitor */ ename, dname`

    `FROM emppart JOIN dept USING (deptno);`


    If, for some reason, you do not want certain statements monitored, you can use
    the `NOMONITOR` hint in the statement to prevent monitoring from occurring for
    a given statement.


    Statistics in `V$SQL_MONITOR` are updated near real-time, that is, every second.
    Any currently executing SQL statement that is being monitored can be found in
    `V$SQL_MONITOR`. Completed queries can be found there for at least one minute
    after execution ends, and can exist there longer, depending on the space requirements
    needed for newly executed queries. One key advantage of the `V$SQL_MONITOR` view
    is it has detailed statistics for each and every execution of a given query, unlike
    `V$SQL`, where results are cumulative for several executions of a SQL statement.
    In order to drill down, then, to a given execution of a SQL statement, you need
    three columns from `V$SQL_MONITOR`:


    1.  `SQL_ID`

    2.  `SQL_EXEC_START`

    3.  `SQL_EXEC_ID`


    If we wanted to see all executions for a given query (based on the `SQL_ID` column),
    we can get that information by querying on the three necessary columns to drill
    to a given execution of a SQL query:


    `SELECT * FROM (`

    `  SELECT sql_id, to_char(sql_exec_start,''yyyy-mm-dd:hh24:mi:ss'') sql_exec_start,`

    `         sql_exec_id, sum(buffer_gets) buffer_gets,`

    `         sum(disk_reads) disk_reads, round(sum(cpu_time/1000000),1) cpu_secs`

    `  FROM v$sql_monitor`

    `  WHERE sql_id = ''fcg00hyh7qbpz''`

    `  GROUP BY sql_id, sql_exec_start, sql_exec_id`

    `  ORDER BY 6 desc)`

    `WHERE rownum <= 5;`


    `SQL_ID        SQL_EXEC_START      SQL_EXEC_ID BUFFER_GETS DISK_READS CPU_SECS`

    `------------- ------------------- ----------- ----------- ---------- --------`

    `fcg00hyh7qbpz 2011-05-21:12:28:10    16777222      259324       5449     71.6`

    `fcg00hyh7qbpz 2011-05-21:12:29:24    16777223      259330       5485     71.3`

    `fcg00hyh7qbpz 2011-05-21:12:26:08    16777220      213823       4502     58.4`

    `fcg00hyh7qbpz 2011-05-21:12:27:09    16777221      211752       4579     58.1`

    `fcg00hyh7qbpz 2011-05-21:12:25:37    16777219      107973       2414     29.4`


    Keep in mind that if a statement is running in parallel, one row will appear for
    each parallel thread for the query, including one for the query coordinator. However,
    they will share the same `SQL_ID`, `SQL_EXEC_START`, and `SQL_EXEC_ID` values.
    In this case, you could perform an aggregation on a particular statistic, if desired.
    See the following example for a parallelized query, along with parallel slave
    information denoted by the `PX_SERVER#` column:


    `SELECT sql_id, sql_exec_start, sql_exec_id, px_server# px#, disk_reads,`

    `       cpu_time/1000000 cpu_secs, buffer_gets`

    `FROM v$sql_monitor`

    `WHERE status = ''EXECUTING''`

    `ORDER BY px_server#;`


    `SQL_ID        SQL_EXEC_S SQL_EXEC_ID PX# DISK_READS CPU_SECS BUFFER_GETS`

    `------------- ---------- ----------- --- ---------- -------- -----------`

    `0gzf8010xdasr 2011-05-21    16777216   1       4306     38.0      136303`

    `0gzf8010xdasr 2011-05-21    16777216   2       4625     40.6      146497`

    `0gzf8010xdasr 2011-05-21    16777216   3       4774     41.6      149717`

    `0gzf8010xdasr 2011-05-21    16777216   4       4200     37.6      132167`

    `0gzf8010xdasr 2011-05-21    16777216              6     92.2          53`


    Then, to perform a simple aggregation for a given query, in this case, our parallelized
    query, the aggregation is done on the three key columns that make up a single
    execution of a given SQL statement:


    `SELECT sql_id,sql_exec_start, sql_exec_id, sum(buffer_gets) buffer_gets,`

    `       sum(disk_reads) disk_reads, round(sum(cpu_time/1000000),1) cpu_seconds`

    `FROM v$sql_monitor`

    `WHERE sql_id = ''0gzf8010xdasr''`

    `GROUP BY sql_id, sql_exec_start, sql_exec_id;`


    `SQL_ID        SQL_EXEC_S SQL_EXEC_ID BUFFER_GETS DISK_READS CPU_SECONDS`

    `------------- ---------- ----------- ----------- ---------- -----------`

    `0gzf8010xdasr 2011-05-21    16777216      642403      20351       283.7`


    If you wanted to perform an aggregation for one SQL statement, regardless of the
    number of times is has been executed, simply run the aggregate query only on the
    `SQL_ID` column, as shown here:


    `SELECT sql_id, sum(buffer_gets) buffer_gets,`

    `       sum(disk_reads) disk_reads, round(sum(cpu_time/1000000),1) cpu_seconds`

    `FROM v$sql_monitor`

    `WHERE sql_id = ''0gzf8010xdasr''`

    `GROUP BY sql_id;`


    ![images](images/square.jpg) **Note** Initialization parameter `STATISTICS_LEVEL`
    must be set to `TYPICAL` or `ALL`, and `CONTROL_MANAGEMENT_PACK_ACCESS` must be
    set to `DIAGNOSTIC+TUNING` for SQL monitoring to occur.


    ### 9-8. Monitoring Progress of a SQL Execution Plan


    #### Problem


    You want to see the progress a query is making from within the execution plan
    used.'
  trans: "### 工作原理\n\nSQL 语句在 `V$SQL_MONITOR` 中针对以下条件进行监控：\n\n*   对任何并行语句自动监控\n* \
    \  对任何 DML 或 DDL 语句自动监控\n*   如果特定 SQL 语句消耗了至少五秒的 CPU 或 I/O 时间，则自动监控\n*   对任何在语句级别设置了监控的\
    \ SQL 语句进行监控\n\n要在语句级别开启监控，可以使用提示。参见以下示例：\n\n```sql\nSELECT /*+ monitor */ ename,\
    \ dname\nFROM emppart JOIN dept USING (deptno);\n```\n\n如果由于某种原因，你不想监控某些语句，可以在语句中使用\
    \ `NOMONITOR` 提示来阻止监控的发生。\n\n`V$SQL_MONITOR` 中的统计信息几乎是实时更新的，即每秒更新一次。任何当前正在执行并被监控的\
    \ SQL 语句都可以在 `V$SQL_MONITOR` 中找到。已完成的查询在执行结束后至少会保留一分钟，并且根据新执行查询所需的空间要求，可能会保留更长时间。`V$SQL_MONITOR`\
    \ 视图的一个关键优势是它为给定查询的每一次执行都提供了详细的统计信息，这与 `V$SQL` 不同，后者是多个 SQL 语句执行的累积结果。为了深入查看 SQL\
    \ 语句的特定执行，你需要来自 `V$SQL_MONITOR` 的三个列：\n\n1.  `SQL_ID`\n2.  `SQL_EXEC_START`\n\
    3.  `SQL_EXEC_ID`\n\n如果我们想查看给定查询的所有执行（基于 `SQL_ID` 列），我们可以通过查询这三个必要的列来钻取到 SQL 查询的特定执行来获取该信息：\n\
    \n```sql\nSELECT * FROM (\n  SELECT sql_id, to_char(sql_exec_start,'yyyy-mm-dd:hh24:mi:ss')\
    \ sql_exec_start,\n         sql_exec_id, sum(buffer_gets) buffer_gets,\n     \
    \    sum(disk_reads) disk_reads, round(sum(cpu_time/1000000),1) cpu_secs\n  FROM\
    \ v$sql_monitor\n  WHERE sql_id = 'fcg00hyh7qbpz'\n  GROUP BY sql_id, sql_exec_start,\
    \ sql_exec_id\n  ORDER BY 6 desc)\nWHERE rownum <= 5;\n```\n\n```\nSQL_ID    \
    \    SQL_EXEC_START      SQL_EXEC_ID BUFFER_GETS DISK_READS CPU_SECS\n-------------\
    \ ------------------- ----------- ----------- ---------- --------\nfcg00hyh7qbpz\
    \ 2011-05-21:12:28:10    16777222      259324       5449     71.6\nfcg00hyh7qbpz\
    \ 2011-05-21:12:29:24    16777223      259330       5485     71.3\nfcg00hyh7qbpz\
    \ 2011-05-21:12:26:08    16777220      213823       4502     58.4\nfcg00hyh7qbpz\
    \ 2011-05-21:12:27:09    16777221      211752       4579     58.1\nfcg00hyh7qbpz\
    \ 2011-05-21:12:25:37    16777219      107973       2414     29.4\n```\n\n请记住，如果语句在并行运行，查询的每个并行线程都会出现一行，包括查询协调器。但是，它们将共享相同的\
    \ `SQL_ID`、`SQL_EXEC_START` 和 `SQL_EXEC_ID` 值。在这种情况下，如果你愿意，可以对特定统计信息执行聚合。参见以下并行查询示例，其中由\
    \ `PX_SERVER#` 列表示并行从属信息：\n\n```sql\nSELECT sql_id, sql_exec_start, sql_exec_id,\
    \ px_server# px#, disk_reads,\n       cpu_time/1000000 cpu_secs, buffer_gets\n\
    FROM v$sql_monitor\nWHERE status = 'EXECUTING'\nORDER BY px_server#;\n```\n\n\
    ```\nSQL_ID        SQL_EXEC_S SQL_EXEC_ID PX# DISK_READS CPU_SECS BUFFER_GETS\n\
    ------------- ---------- ----------- --- ---------- -------- -----------\n0gzf8010xdasr\
    \ 2011-05-21    16777216   1       4306     38.0      136303\n0gzf8010xdasr 2011-05-21\
    \    16777216   2       4625     40.6      146497\n0gzf8010xdasr 2011-05-21  \
    \  16777216   3       4774     41.6      149717\n0gzf8010xdasr 2011-05-21    16777216\
    \   4       4200     37.6      132167\n0gzf8010xdasr 2011-05-21    16777216  \
    \       6     92.2          53\n```\n\n然后，要对给定查询（在我们的例子中是并行查询）执行简单聚合，聚合是针对构成给定\
    \ SQL 语句单次执行的三个关键列进行的：\n\n```sql\nSELECT sql_id, sql_exec_start, sql_exec_id,\
    \ sum(buffer_gets) buffer_gets,\n       sum(disk_reads) disk_reads, round(sum(cpu_time/1000000),1)\
    \ cpu_seconds\nFROM v$sql_monitor\nWHERE sql_id = '0gzf8010xdasr'\nGROUP BY sql_id,\
    \ sql_exec_start, sql_exec_id;\n```\n\n```\nSQL_ID        SQL_EXEC_S SQL_EXEC_ID\
    \ BUFFER_GETS DISK_READS CPU_SECONDS\n------------- ---------- ----------- -----------\
    \ ---------- -----------\n0gzf8010xdasr 2011-05-21    16777216      642403   \
    \   20351       283.7\n```\n\n如果你想对一个 SQL 语句执行聚合，不管它执行了多少次，只需在 `SQL_ID` 列上运行聚合查询即可，如下所示：\n\
    \n```sql\nSELECT sql_id, sum(buffer_gets) buffer_gets,\n       sum(disk_reads)\
    \ disk_reads, round(sum(cpu_time/1000000),1) cpu_seconds\nFROM v$sql_monitor\n\
    WHERE sql_id = '0gzf8010xdasr'\nGROUP BY sql_id;\n```\n\n![图片](img/square.jpg)\
    \ **注意** 必须将初始化参数 `STATISTICS_LEVEL` 设置为 `TYPICAL` 或 `ALL`，并且将 `CONTROL_MANAGEMENT_PACK_ACCESS`\
    \ 设置为 `DIAGNOSTIC+TUNING`，SQL 监控才能发生。\n\n### 9-8. 监控 SQL 执行计划的进度\n\n#### 问题\n\n\
    你想从正在使用的执行计划中查看查询的进度。"
- fmt: "## Solution\n\n有几种方法可以获取信息，以查看查询在执行计划中的执行位置。首先，通过查询`V$SQL_PLAN_MONITOR`视图，您可以获取所有正在进行的查询以及最近已完成查询的信息。如果我们连接两个表以获取员工和部门信息，我们的查询如下所示：\n\
    \n```sql\nSELECT ename, dname\nFROM emppart JOIN dept USING (deptno);\n```\n\n\
    执行计划输出为：\n\n```\n--------------------------------------------\n| Id  | Operation\
    \               | Name     |\n--------------------------------------------\n|\
    \   0 | SELECT STATEMENT        |          |\n|   1 |  PX COORDINATOR        \
    \ |          |\n|   2 |   PX SEND QC (RANDOM)   | :TQ10001 |\n|   3 |    HASH\
    \ JOIN            |          |\n|   4 |     BUFFER SORT         |          |\n\
    |   5 |      PX RECEIVE         |          |\n|   6 |       PX SEND BROADCAST\
    \ | :TQ10000 |\n|   7 |        TABLE ACCESS FULL| DEPT     |\n|   8 |     PX BLOCK\
    \ ITERATOR   |          |\n|   9 |      TABLE ACCESS FULL  | EMPPART  |\n--------------------------------------------\n\
    ```\n\n要在上述查询运行时查看其信息，您可以发出如下所示的查询（为简洁起见，已删除部分行）：\n\n```sql\ncolumn operation\
    \ format a25\ncolumn plan_line_id format 9999 heading 'LINE'\ncolumn plan_options\
    \ format a10 heading 'OPTIONS'\ncolumn status format a10\ncolumn output_rows heading\
    \ 'ROWS'\nbreak on sid on sql_id on status\n\nSELECT sid, sql_id, status, plan_line_id,\n\
    plan_operation || ' ' || plan_options operation, output_rows\nFROM v$sql_plan_monitor\n\
    WHERE status not like '%DONE%'\nORDER BY 1,4;\n```\n\n查询输出结果如下：\n\n```\n     \
    \  SID SQL_ID        STATUS      LINE OPERATION                              \
    \ ROWS\n---------- ------------- ---------- ----- ------------------------- --------------------\n\
    \        18 36bdwxutr5n75 EXECUTING      0 SELECT STATEMENT                  \
    \       3929326\n                                                          1 PX\
    \ COORDINATOR                3929326\n        27 36bdwxutr5n75 EXECUTING     \
    \ 0 SELECT STATEMENT                              0\n                        \
    \                                  2 PX SEND QC (RANDOM)          1752552\n  \
    \                                                        3 HASH JOIN         \
    \           1752552\n                                                        \
    \  8 PX BLOCK ITERATOR            1752552\n                                  \
    \                        9 TABLE ACCESS FULL            1752552\n       101 36bdwxutr5n75\
    \ EXECUTING      0 SELECT STATEMENT                              0\n         \
    \                                                 2 PX SEND QC (RANDOM)      \
    \    2148232\n                                                          3 HASH\
    \ JOIN                    2148232\n                                          \
    \                8 PX BLOCK ITERATOR            2148232\n                    \
    \                                      9 TABLE ACCESS FULL            2148232\n\
    ```\n\n在此特定示例中，`EMPPART`表的并行度为2，我们可以看到对于SID 27和101，这些是获取数据的并行从属进程。当这些进程将数据传递回查询协调器，然后再返回给用户时，我们可以查看SID\
    \ 18时看到这一点。如果我们只是针对`V$SQL_PLAN_MONITOR`视图运行后续查询，我们就可以在查询执行时查看其进度。在上述示例中，我们只看到随着查询的进行，输出的行值在增加。\n\
    \n另一种通过执行计划查看查询进度的方法是使用`DBMS_SQLTUNE.REPORT_SQL_MONITOR`函数。如果我们使用与上一个示例中针对`EMPPART`和`DEPT`表相同的查询，我们可以运行`REPORT_SQL_MONITOR`函数来获取进度的图形化视图。请参阅以下示例，了解如何生成可产生HTML文件的文件，该文件随后可用于查看我们的进度。[图\
    \ 9-2](#Chapter09.html#fig_9_2)显示了生成报告的部分内容。\n\n```sql\nset pages 9999\nset long\
    \ 1000000\nSELECT DBMS_SQLTUNE.REPORT_SQL_MONITOR(sql_id=> '36bdwxutr5n75',type=>'HTML')\
    \ FROM dual;\n```\n\n![images](images/0902.jpg)\n\n*图 9-2. `DBMS_SQLTUNE.REPORT_SQL_MONITOR`生成的HTML报告示例*\n\
    \n## How It Works\n\n`V$SQL_PLAN_MONITOR`视图是从`V$SQL_MONITOR`视图填充的（参见配方 9-7）。这两个视图都是Oracle\
    \ 11g新增的，并在语句执行的每秒钟更新一次。每当SQL语句被监控时，`V$SQL_MONITOR`视图就会被填充。\n\n`DBMS_SQLTUNE.REPORT_SQL_MONITOR`函数可以通过多种方式调用。报告中细节的详细程度以及您希望看到的细节类型，可以根据传递给函数的参数进行更改。输出可以多种格式查看，包括纯文本、HTML和XML。默认输出格式是纯文本。例如，假设我们想查看针对`EMPPART`和`DEPT`表的连接查询的输出。在这种情况下，我们希望输出为文本格式。我们希望聚合细节，并且只想看到最基本级别的细节。我们的查询将按如下方式运行：\n\
    \n```sql\nSELECT DBMS_SQLTUNE.REPORT_SQL_MONITOR\n(sql_id=>'36bdwxutr5n75',event_detail=>'NO',report_level=>'BASIC')\
    \ FROM dual;\n```\n\n报告输出如下：\n\n```\nSQL Monitoring Report\n\nSQL Text\n------------------------------\n\
    select ename, dname from emppart join dept using (deptno)\n\nGlobal Information\n\
