  trans: '## 解决方案


    提示（hints）可以置于视图（view）中，因为视图本质上是数据库中存储的查询。根据所使用的提示类型以及被查询的视图类型，您可以判断您的提示是否会被使用。理解您拥有的视图类型至关重要，这样才能确定提示会对该视图产生何种影响。要理解这一点，您首先需要判断您的视图属于以下哪种类型：

    *   可合并（mergeable）或不可合并（non-mergeable）视图

    *   简单（simple）或复杂（complex）视图


    简单视图是仅引用一个表，且不含任何分组函数或表达式的视图：

    ```

    CREATE view emp_high_sal

    AS SELECT /*+ use_index(employees) */ employee_id, first_name, last_name, salary

    FROM employees

    WHERE salary > 10000;

    ```


    复杂视图可以引用多个表，或者包含分组子句，或者使用函数和表达式：

    ```

    CREATE or replace view dept_sal

    AS SELECT /*+ full(employees) */ department_id, department_name,

    departments.manager_id, SUM(salary) total_salary, AVG(salary) avg_salary

    FROM employees JOIN departments USING(department_id)

    GROUP BY department_id, department_name, departments.manager_id;

    ```


    可合并视图是指优化器可以用视图定义内部的查询来替换调用该视图的查询。例如，我们只想从 `emp_high_sal` 视图中查询所有行。优化器可以直接转到 `employees`
    表：

    ```

    SELECT * FROM emp_high_sal;

    ```

    ```

    ---------------------------------------

    | Id  | Operation         | Name      |

    ---------------------------------------

    |   0 | SELECT STATEMENT  |           |

    |   1 |  TABLE ACCESS FULL| EMPLOYEES |

    ---------------------------------------

    ```

    优化器已简单地用定义视图的查询替换了原查询：

    ```

    SELECT /*+ full(employees) */ department_id, department_name,

    departments.manager_id, SUM(salary) total_salary, AVG(salary) avg_salary

    FROM employees JOIN departments USING(department_id)

    GROUP BY department_id, department_name, departments.manager_id;

    ```

    对于可合并视图，视图内部的提示会得以保留，因为基于调用该视图的查询，视图定义的基本结构保持不变。关于可合并视图的提示使用指南，请参见表 14-3。


    ![images](img/t1403.jpg)


    对于不可合并视图，优化器必须将工作分解成两个部分。它必须先执行定义视图的查询，然后必须执行顶层查询。因此，视图本身内部定义的提示会得以保留。例如，我们正在查询
    `dept_sal` 视图。从执行计划中可以看出，查询被分解成了若干部分：

    ```

    SELECT manager_id, sum(total_salary)

    FROM dept_sal

    GROUP BY manager_id;

    ```

    ```

    -------------------------------------------------------

    | Id  | Operation                       | Name        |

    -------------------------------------------------------

    |   0 | SELECT STATEMENT                |             |

    |   1 |  HASH GROUP BY                  |             |

    |   2 |   VIEW                          | DEPT_SAL    |

    |   3 |    HASH GROUP BY                |             |

    |   4 |     MERGE JOIN                  |             |

    |   5 |      TABLE ACCESS BY INDEX ROWID| DEPARTMENTS |

    |   6 |       INDEX FULL SCAN           | DEPT_ID_PK  |

    |   7 |      SORT JOIN                  |             |

    |   8 |       TABLE ACCESS FULL         | EMPLOYEES   |

    -------------------------------------------------------

    ```

    关于不可合并视图的提示使用指南，请参见表 14-4。


    ![images](img/t1404.jpg)


    理解提示和视图所有可能的场景可能会令人困惑，因此需要谨慎使用，并且仅在其他调优手段未能满足需求时才使用。


    ## 工作原理


    如前所述，由于视图只是一个存储的查询，提示可以像在任何查询中一样轻松地置于视图内部。放置在视图中的提示类型将决定提示在视图内部是否以及如何被使用。就像在视图上执行
    DML 操作一样，提示在何时会被使用或忽略也存在限制。


    根据经验，视图越简单，提示有效的可能性越大。由于每个应用程序、每个查询和每个视图都具有独特性，要知道一个提示是否会被使用的唯一真正方法，就是简单地尝试该提示并执行执行计划来验证给定的提示是否被使用。


    Oracle 不建议在视图中放置提示，因为底层对象可能随时间变化，您可能会遇到不可预测的执行计划。此外，视图可能是为某个特定用途创建的，但以后可能用于其他目的，而视图中的任何提示可能无法适用于所有场景。另外，放置在视图内部的提示的管理方式与直接执行查询本身时不同。在视图内部放置的任何提示被使用之前，优化器需要确定该视图是否可以与其调用查询合并。


    您也可以考虑在访问视图的查询中放置提示。当在访问自身包含提示的视图的查询中放置提示时，理解优先级规则很重要。这尤其突显了在视图中放置提示之前需要谨慎的必要性。


    ![images](img/square.jpg) `提示` 在引用复杂视图的查询中放置的提示会被忽略。


    ### 14-9\. 缓存查询结果


    #### 问题


    您希望提高一组经常使用的查询的性能，并希望使用 Oracle 的结果缓存（result cache）来存储查询结果，以便在相同查询再次执行时能快速检索以供未来使用。'
- fmt: "### Solution\n\nThe result cache is new to Oracle 11g, and was created in\
    \ order to store results from often-used queries in memory for quick and easy\
    \ retrieval. If you run an explain plan on a given query, you can see if the results\
    \ will be stored in the result cache:\n\n```sql\nSELECT /*+ result_cache */\n\
    job_id, min_salary, avg(salary) avg_salary, max_salary\nFROM employees JOIN jobs\
    \ USING (job_id)\nGROUP BY job_id, min_salary, max_salary;\n```\n\n```\n---------------------------------------------------------------------\n\
    | Id  | Operation                       | Name                      |\n---------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT                |                           |\n|   1 |\
    \  RESULT CACHE                   | 5t4cc5n1gdyfh46jdhfttnhx4g|\n|   2 |   HASH\
    \ GROUP BY                 |                           |\n|   3 |    NESTED LOOPS\
    \                 |                           |\n|   4 |     NESTED LOOPS    \
    \            |                           |\n|   5 |      TABLE ACCESS FULL   \
    \       | EMPLOYEES                 |\n|   6 |      INDEX UNIQUE SCAN        \
    \  | JOB_ID_PK                 |\n|   7 |     TABLE ACCESS BY INDEX ROWID | JOBS\
    \                      |\n---------------------------------------------------------------------\n\
    ```\n\nIf you then query the `V$RESULT_CACHE_OBJECTS` view, you can validate whether\
    \ the results of a query are stored in the result cache by looking at the `CACHE_ID`\
    \ value from the explain plan.\n\n```sql\nSELECT ID, TYPE, to_char(CREATION_TIMESTAMP,'yyyy-mm-dd:hh24:mi:ss')\
    \ cr_date,\nBLOCK_COUNT blocks, COLUMN_COUNT columns, PIN_COUNT pins, ROW_COUNT\
    \ \"ROWS\"\nFROM   V$RESULT_CACHE_OBJECTS\nWHERE  CACHE_ID = '5t4cc5n1gdyfh46jdhfttnhx4g';\n\
    ```\n\n```\n        ID TYPE    CR_DATE              BLOCKS  COLUMNS  PINS    \
    \   ROWS\n---------- ------- ------------------- ------- -------- ----- ----------\n\
    \         4 Result  2011-03-19:15:20:43       1        4     0         19\n```\n\
    \nIf for some reason your database is set with a default mode of `FORCE` at the\
    \ database or table level, you can use the `NO_RESULT_CACHE` hint to bypass the\
    \ result cache. If we run our previous query with the result cache mode set to\
    \ `FORCE`, it is evident that the result cache is used automatically.\n\n```sql\n\
    SQL> show parameter result_cache_mode\n```\n\n```\nNAME                  TYPE\
    \          VALUE\n--------------------  ------------  --------------------\nresult_cache_mode\
    \     string        FORCE\n```\n\n```sql\nselect job_id, min_salary, avg(salary)\
    \ avg_salary, max_salary\nfrom employees join jobs using (job_id)\ngroup by job_id,\
    \ min_salary, max_salary;\n```\n\n```\n---------------------------------------------------------------------\n\
    | Id  | Operation                       | Name                      |\n---------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT                |                           |\n|   1 |\
    \  RESULT CACHE                   | 5t4cc5n1gdyfh46jdhfttnhx4g|\n|   2 |   HASH\
    \ GROUP BY                 |                           |\n|   3 |    NESTED LOOPS\
    \                 |                           |\n|   4 |     NESTED LOOPS    \
    \            |                           |\n|   5 |      TABLE ACCESS FULL   \
    \       | EMPLOYEES                 |\n|   6 |      INDEX UNIQUE SCAN        \
    \  | JOB_ID_PK                 |\n|   7 |     TABLE ACCESS BY INDEX ROWID | JOBS\
    \                      |\n---------------------------------------------------------------------\n\
    ```\n\nIf we then rerun with the `NO_RESULT_CACHE` hint, the result cache is not\
    \ used and the statement is executed:\n\n```sql\nSELECT /*+ no_result_cache */\
    \ job_id, min_salary, avg(salary) avg_salary, max_salary\nFROM employees JOIN\
    \ jobs USING (job_id)\nGROUP BY job_id, min_salary, max_salary;\n```\n\n```\n\
    ---------------------------------------------------\n| Id  | Operation       \
    \                | Name    |\n---------------------------------------------------\n\
    |   0 | SELECT STATEMENT                |         |\n|   1 |  HASH GROUP BY  \
    \                |         |\n|   2 |   NESTED LOOPS                  |      \
    \   |\n|   3 |    NESTED LOOPS                 |         |\n|   4 |     TABLE\
    \ ACCESS FULL           | EMPLOYEES|\n|   5 |     INDEX UNIQUE SCAN          \
    \ | JOB_ID_PK|\n|   6 |    TABLE ACCESS BY INDEX ROWID  | JOBS    |\n---------------------------------------------------\n\
    ```\n\nThe following query was run twice, first not using the result cache, and\
    \ the second time using the result cache, and the performance difference is significant:\n\
    \n```sql\nSELECT /*+ no_result_cache */\nj.job_id, min_salary, avg(salary) avg_salary,\
    \ max_salary, department_name\nFROM employees_big e, jobs j, departments d\nWHERE\
    \ e.department_id = d.department_id\nAND e.job_id = j.job_id\nAND salary BETWEEN\
    \ 5000 AND 9000\nGROUP BY j.job_id, min_salary, max_salary, department_name;\n\
    ```\n\n```\nJOB_ID      MIN_SALARY AVG_SALARY MAX_SALARY DEPARTMENT_NAME\n----------\
    \ ---------- ---------- ---------- ------------------------------\nST_MAN    \
    \       5500       7280       8500 Shipping\nSA_REP           6000       7494\
    \      12000 Sales\nHR_REP           4000       6500       9000 Human Resources\n\
    AC_ACCOUNT       4200       8300       9000 Accounting\nIT_PROG          4000\
    \       7500      10000 IT\nFI_ACCOUNT       4200       7920       9000 Finance\n\
    MK_REP           4000       6000       9000 Marketing\n\n7 rows selected.\n\n\
    Elapsed: 00:00:21.80\n```\n\n```sql\nSELECT /*+ result_cache */\nj.job_id, min_salary,\
    \ avg(salary) avg_salary, max_salary, department_name\nFROM employees_big e, jobs\
    \ j, departments d\nWHERE e.department_id = d.department_id\nAND e.job_id = j.job_id\n\
    AND salary BETWEEN 5000 AND 9000\nGROUP BY j.job_id, min_salary, max_salary, department_name;\n\
    ```\n\n```\nElapsed: 00:00:00.08\n```\n\n### How It Works\n\nThe `result_cache`\
    \ hint, if placed in a query, will override any database-level, table-level, or\
    \ session-level result cache settings. Before using hints in your queries, you\
    \ need to determine the configuration of the result cache on your database. There\
    \ are two separate result caches to look at: the server-side result cache and\
    \ the client-side result cache. The server-side result cache is part of the shared\
    \ pool of the SGA, and stores SQL query results and PL/SQL function results. Query\
    \ time can be improved significantly, as query results are checked within the\
    \ result cache first, and if the results exist, they are simply pulled from memory,\
    \ and the query is not executed. The result cache is most appropriately used for\
    \ often-run queries that produce the same results.\n\nThe result cache can be\
    \ configured at several levels. As [Table 14-5](#Chapter14.html#tab_14_5) indicates,\
    \ it can be configured at the database level, the session level, the table level,\
    \ or the statement level. The statement level is where hints are specified. If\
    \ you decide to configure the result cache in your database, there are several\
    \ initialization parameters that need to be configured. [Table 14-6](#Chapter14.html#tab_14_6)\
    \ reviews these parameters. Some are specific parameters for the result cache,\
    \ while the remaining memory-related parameters need to be analyzed to see if\
    \ they need to be changed to accommodate the result cache.\n\n![images](images/t1405.jpg)\n\
    \n![images](images/t1406.jpg)\n\n### 14-10. Directing a Distributed Query to a\
    \ Specific Database\n\n#### Problem\n\nYou are joining two or more tables together\
    \ that exist on different databases, and want to direct the work to take place\
    \ on a particular database, as the remote database is where most of the data resides."
