    \n## 15-13. Finding Bottlenecks in Parallel Processes\n\n## Problem\n\nYou have\
    \ some parallel processes that are underperforming, and you want to do analysis\
    \ to find the bottlenecks.\n\n## Solution\n\nThere are many wait events related\
