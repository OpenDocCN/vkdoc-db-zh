  trans: '

    ### 7-2. 查找消耗撤销空间最多的原因


    #### 问题


    通常，一两个用户会话似乎占用了大量的撤销表空间。您希望识别出是哪个用户以及哪条 SQL 语句正在消耗所有这些撤销空间。


    #### 解决方案


    高撤销空间使用量通常涉及一个长时间运行的查询。使用以下查询可以找出您的数据库中运行时间最长的 SQL 语句。


    ```sql

    select s.sql_text from v$sql s, v$undostat u

    where u.maxqueryid=s.sql_id;

    ```


    您可以联接 `V$TRANSACTION` 和 `V$SESSION` 视图，以找出一个会话在当前执行的事务中使用的最多撤销量，如下所示：


    ```sql

    select s.sid, s.username, t.used_urec, t.used_ublk

    from v$session s, v$transaction t

    where s.saddr = t.ses_addr

    order by t.used_ublk desc;

    ```


    您也可以执行以下查询，以找出实例中当前使用撤销最多的会话：


    ```sql

    select s.sid, t.name, s.value

    from v$sesstat s, v$statname t

    where s.statistic# = t.statistic#

    and t.name = ''undo change vector size''

    order by s.value desc;

    ```


    该查询的输出依赖于 `V$STATNAME` 视图中的统计信息 `undo change vector size`，以显示当前消耗最多撤销的会话的 SID。`V$TRANSACTION`
    视图显示活动事务的详细信息。这是另一个联接 `V$TRANSACTION`、`V$SQL` 和 `V$SESSION` 视图的查询：


    ```sql

    select sql.sql_text sql_text, t.USED_UREC Records, t.USED_UBLK Blocks,

    (t.USED_UBLK*8192/1024) KBytes from v$transaction t,

    v$session s,

    v$sql sql

    where t.addr = s.taddr

    and s.sql_id = sql.sql_id

    and s.username =''&USERNAME'';

    ```


    `USED_UREC` 列显示使用的撤销记录数，`USED_UBLK` 列显示事务消耗的撤销块数。


    #### 工作原理


    您可以执行“解决方案”部分中描述的查询，来识别数据库中负责最多撤销使用的会话，以及负责这些会话的用户。您可以查询 `V$UNDOSTAT` 并提供适当的 `begin_time`
    和 `end_time` 值，以获取某个时间区间内运行时间最长的 SQL 语句的 SQL 标识符。`MAXQUERYID` 列捕获了该 SQL 标识符。您可以使用此
    ID 来查询 `V$SQL` 视图，以找出实际的 SQL 语句。同样，`V$TRANSACTION` 和 `V$SESSION` 视图共同帮助识别消耗最多撤销空间的用户。如果过度的撤销使用影响了性能，您可能需要查看应用程序，了解为什么查询会使用如此多的撤销。


    ### 7-3. 解决 ORA-01555 错误


    #### 问题


    在关键生产批处理作业的夜间运行期间，您收到了 `ORA-01555`（快照过旧）错误。您希望消除这些错误。


    #### 解决方案


    虽然为 `UNDO_RETENTION` 参数设置一个较高的值可能会最大限度地减少收到“快照过旧”错误的可能性，但它并不能保证数据库不会覆盖运行中的事务可能需要的较旧的撤销数据。您可以将长时间运行的批处理作业移动到数据库中没有其他程序运行的单独时间间隔，以避免这些错误。


    无论如何，虽然通过这些方法可以最小化“快照过旧”错误的发生，但如果不指定*保证撤销保留*功能，您无法完全消除此类错误。当您在数据库中配置了保证撤销保留时，就不会有任何事务因“快照过旧”错误而失败。设置保证撤销保留后，Oracle
    会阻止新的 DML 语句执行。实现保证撤销功能很简单。假设您希望确保数据库至少保留一小时（3,600 秒）的撤销。首先使用下面所示的 `alter system`
    命令设置撤销保留阈值，然后通过指定 `retention guarantee` 子句来更改撤销表空间，从而设置保证撤销保留。


    ```sql

    alter system set undo_retention=3600;

    ```

    系统已更改。

    ```sql

    alter tablespace undotbs1 retention guarantee;

    ```

    表空间已更改。


    您可以通过执行带有 `retention noguarantee` 子句的 `alter tablespace` 命令来关闭保证撤销保留。


    ![images](img/square.jpg) **提示** 您可以使用本配方中所示的 `alter system` 命令来启用保证撤销保留，也可以使用
    `create database` 和 `create undo tablespace` 语句来启用。


    #### 工作原理


    Oracle 使用存储在撤销表空间中的撤销记录来帮助回滚事务、提供读一致性，并帮助恢复数据库。此外，数据库还使用撤销记录通过 Oracle 闪回查询从过去的时间点读取数据。撤销数据是多个
    Oracle 闪回功能的基础，这些功能可帮助您从逻辑错误中恢复。


    ##### 错误的发生


    `ORA-01555` 错误（快照过旧）可能在各种情况下发生。以下是一个在导出过程中发生该错误的案例。


    ```

    EXP-00008: ORACLE error 1555 encountered

    ORA-01555: snapshot too old: rollback segment number 10 with name "_SYSSMU10$"
    too small

    EXP-00000: Export terminated unsuccessfully

    ```


    在执行闪回事务时，您也可能收到相同的错误：


    ```

    ERROR at line 1:

    ORA-01555: snapshot too old: rollback segment number with name "" too small

    ORA-06512: at "SYS.DBMS_FLASHBACK", line 37

    ORA-06512: at "SYS.DBMS_FLASHBACK", line 70

    ORA-06512: at li

    ```


    当 Oracle 覆盖了另一个事务所需的撤销数据时，就会发生“快照过旧”错误。该错误是 Oracle 读一致性机制工作方式的直接结果。当长时间运行的查询执行期间，Oracle
    试图从回滚段中读取任何已更改行的“前映像”时，就可能发生此错误。例如，如果一个长时间运行的查询在凌晨 1 点开始并一直运行到早上 6 点，那么在查询执行期间，数据库有可能更改属于该查询一部分的数据。当
    Oracle 试图读取在凌晨 1 点时的数据状态时，如果该数据在回滚段中已不存在，则查询可能会失败。


    如果您的数据库正在经历大量更新，Oracle 可能无法获取已更改的行，因为记录在回滚段中的更改前的值可能已被覆盖。更改这些行的事务可能已经提交，并且回滚段中没有更改前行值的记录，因为数据库覆盖了相关的撤销数据。由于
    Oracle 无法为当前查询返回一致的数据，因此会发出 `ORA-01555` 错误。当前运行的查询需要前映像来构建读一致的数据，但前映像不可用。


    `ORA-01555` 错误可能是由以下一个或两个原因造成的：对数据库的更新过多，或者撤销表空间太小。您可以增加撤销表空间的大小，但这并不能保证错误不会再次发生。

