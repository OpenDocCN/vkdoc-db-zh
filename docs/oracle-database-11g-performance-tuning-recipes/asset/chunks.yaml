    \ SQL 结果，并在 PL/SQL 函数结果缓存中缓存 PL/SQL 函数结果。你通常使用服务器查询缓存来使数据库缓存那些频繁执行但每次执行需要访问大量行的查询。你可以通过在数据库中设置以下初始化参数来配置服务器查询缓存。\n\
    \n*   `RESULT_CACHE_MAX_SIZE`：这设置了分配给服务器结果缓存的内存。\n*   `RESULT_CACHE_MAX_RESULT`：这是缓存中单个结果可使用的最大内存量，以百分比表示。默认是服务器结果缓存的\
    \ 5%。\n*   `RESULT_CACHE_REMOTE_EXPIRATION`：默认情况下，任何涉及远程对象的结果都不会被缓存。因此，`RESULT_CACHE_REMOTE_EXPIRATION`\
    \ 参数的默认设置是 0。但是，你可以通过为 `RESULT_CACHE_REMOTE_EXPIRATION` 参数设置一个显式值来启用涉及远程对象的结果的缓存。\n\
    \n仅为服务器结果缓存设置这三个初始化参数仅仅是启用了缓存。要实际将缓存用于你的 SQL 查询结果或 PL/SQL 函数结果，你必须在数据库范围内启用缓存，或针对特定查询启用缓存，如下面的配方所述。\n\
    \n一旦数据库将结果存储在服务器结果缓存中，它会一直保留该结果，直到你使用 `DBMS_RESULT_CACHE.FLUSH` 过程手动移除它，或者直到缓存达到由\
    \ `RESULT_CACHE_MAX_SIZE` 参数设置的最大大小。当服务器结果缓存容量耗尽，需要为更新结果腾出空间时，数据库将从缓存中移除最旧的结果。\n\
    \n#### 管理服务器查询缓存\n\n##### 问题\n\n你已经启用了服务器结果缓存，但不确定查询是否正在利用它。你还想了解服务器结果缓存的运行状况。\n\
    \n##### 解决方案\n\n你可以通过使用 `DBMS_RESULT_CACHE` 包来检查服务器结果缓存的状态。例如，使用以下查询检查缓存是否已启用：\n\
    \n```\nSQL> select dbms_result_cache.status() from dual;\n\nDBMS_RESULT_CACHE.STATUS()\n\
    -----------------------------------------------------\nENABLED\n\nSQL>\n```\n\n\
    在为查询启用缓存后，你可以查看查询的执行计划，以检查该查询是否确实使用了 SQL 查询缓存，如下例所示。查询的执行计划显示该查询确实在使用结果缓存的 SQL\
    \ 查询缓存组件。\n\n```\nSQL> select  /*+ RESULT_CACHE */ department_id, AVG(salary)\n\
    \     from hr.employees\n     group by department_id;\n.\n.\n.\n--------------------------------------------------------------\n\
    | Id | Operation          | Name                       |Rows\n--------------------------------------------------------------\n\
    |  0 | SELECT STATEMENT   |                            |  11\n|  1 |  RESULT CACHE\
    \      | 8fpza04gtwsfr6n595au15yj4y |\n|  2 |   HASH GROUP BY    |           \
    \                 |  11\n|  3 |    TABLE ACCESS FULL| EMPLOYEES              \
    \    | 107\n--------------------------------------------------------------\n```\n\
    \n你可以使用 `DBMS_RESULT_CACHE` 包的 `MEMORY_REPORT` 过程来查看 Oracle 如何为结果缓存分配内存，如下所示：\n\
    \n```\nSQL> SET SERVEROUTPUT ON\nSQL> execute dbms_result_cache.memory_report\n\
    \nR e s u l t   C a c h e   M e m o r y   R e p o r t\n[Parameters]\nBlock Size\
    \     = 1024 bytes\nMaximum Cache Size = 950272 bytes (928 blocks)\nMaximum Result\
    \ Size = 47104 bytes (46 blocks)\n[Memory]\nTotal Memory = 46340 bytes [0.048%\
    \ of the Shared Pool]\n... Fixed Memory = 10696 bytes [0.011% of the Shared Pool]\n\
    ... State Object Pool =  2852 bytes [0.003% of the Shared Pool]\n... Cache Memory\
    \ = 32792 bytes (32 blocks) [0.034% of the Shared Pool]\n....... Unused Memory\
    \ = 30 blocks\n....... Used Memory = 2 blocks\n........... Dependencies = 1 blocks\n\
    ........... Results = 1 blocks\n............... SQL = 1 blocks\n\nPL/SQL procedure\
    \ successfully completed.\nSQL>\n```\n\n你可以通过执行以下查询来监控服务器结果缓存统计信息：\n\n```\nSQL>\
    \ select name, value from V$RESULT_CACHE_STATISTICS;\n\nNAME                 \
    \         VALUE\n--------------------          ----------\nBlock Size (Bytes)\
    \            1024\nBlock Count Maximum           3136\nBlock Count Current   \
    \          32\nResult Size Maximum (Blocks)   156\nCreate Count Success      \
    \        2\nCreate Count Failure              0\nFind Count                  \
    \      0\nInvalidation Count                0\nDelete Count Invalid          \
    \    0\nDelete Count Valid                0\nSQL>\n```\n\n`Create Count Success`\
    \ 列显示数据库已在服务器结果缓存中缓存的查询数，`Invalidation Count` 列显示数据库使缓存结果无效的次数。\n"
- fmt: "### 3-9\\. Caching SQL Query Results\n\n#### How It Works\n\nYou can monitor\
    \ and manage the server result cache with the `DBMS_RESULT_CACHE` package provided\
    \ by Oracle. This package lets you manage both components of the server result\
    \ cache, the SQL result cache and the PL/SQL function result cache. You can use\
    \ the `DBMS_RESULT_CACHE` package to manage the server result cache memory allocation,\
    \ as well as to bypass and re-enable the cache (when recompiling PL/SQL packages,\
    \ for example), flush the cache, and to view statistics relating to the server\
    \ query cache memory usage.\n\nThe server result cache is part of Oracle's shared\
    \ pool component of the SGA. Depending on the memory management system in use,\
    \ Oracle allocates a certain proportion of memory to the server result cache upon\
    \ starting the database. Here are the rules that Oracle uses for deciding what\
    \ percentage of the shared pool it allocates to the server result cache:\n\n*\
    \   If you're using automatic memory management by setting the `MEMORY_TARGET`\
    \ parameter, Oracle allocates 0.25% of the `MEMORY_TARGET` parameter's value to\
    \ the server result cache.\n*   If you're using automatic shared memory management\
    \ with the `SGA_TARGET` parameter, the allocation is 0.5% of the `SGA_TARGET`\
    \ parameter.\n*   If you're using manual memory management by setting the `SHARED_POOL_SIZE`\
    \ parameter, the allocation is 1% of the `SHARED_POOL_SIZE` parameter.\n\nIn an\
    \ Oracle RAC environment, you can size the server cache differently on each instance,\
    \ just as you do with the `MEMORY_TARGET` and other instance-related parameters.\
    \ Similarly, when you disable the server result cache by setting the `RESULT_CACHE_MAX_SIZE`\
    \ to 0, you must do so on all the instances of the cluster.\n\nThe server result\
    \ cache can potentially reduce your CPU overhead by avoiding recomputation of\
    \ results, where data may have to be fetched repeatedly from the buffer cache,\
    \ which results in a higher number of logical I/Os. When you opt to cache the\
    \ results in the cache instead of pre-computing them and storing them in materialized\
    \ views, you can also potentially reduce the database disk I/O as well. Just remember\
    \ that the primary purpose of the result cache isn't to store just any results\
    \ in memory—it's mainly designed to help with the performance of queries that\
    \ involve static or mostly static data. Thus, a data warehouse or decision support\
    \ system is likely to derive the greatest benefit from this new performance feature.\n\
    \n#### Problem\n\nYou've configured the server result cache in your database.\
    \ You would now like to configure a set of queries whose result you would like\
    \ to be cached in the server result cache.\n\n#### Solution\n\nSet the `RESULT_CACHE_MODE`\
    \ initialization parameter to the appropriate value for making queries eligible\
    \ for caching in the server result cache. You can set the `RESULT_CACHE_MODE`\
    \ to the value `FORCE`, to force all SQL results to be cached by the database.\
    \ Oracle recommends that you set the `RESULT_CACHE_MODE` parameter value to `MANUAL`,\
    \ which happens to be the default setting. The `RESULT_CACHE_MODE` parameter is\
    \ dynamic, so you can set this parameter with the `ALTER SYSTEM` (or the `ALTER\
    \ SESSION`) command.\n\nWhen you set the `RESULT_CACHE_MODE` parameter to the\
    \ value `MANUAL`, the database caches the results of only specific queries—queries\
    \ that you enable for caching by using either a query hint or a table annotation.\
    \ The following example shows how to use the query hint method to specify a query's\
    \ results to be cached in the server result cache.\n\n```sql\nSQL> select /*+\
    \ RESULT_CACHE */ prod_id, sum(amount_sold)\n     from  sales\n     group by prod_id\n\
    \     order by prod_id;\n```\n\nThe query hint `/*+RESULT_CACHE */` tells the\
    \ database to cache the results of the previous query. You can turn off the result\
    \ caching for this query by using the `/+ NO_RESULT_CACHE */` hint, as shown in\
    \ the following example.\n\n```sql\nSQL> select /*+ NO_RESULT_CACHE */ prod_id,\
    \ SUM(amount_sold)\n     from  sales\n     group by prod_id\n     order by prod_id;\n\
    ```\n\nWhen you run this query, the server won't cache the results of this query\
    \ any longer, because you've specified the `MANUAL` setting for the `RESULT_CACHE_MODE`\
    \ initialization parameter.\n\nThe alternative way to specify the caching of a\
    \ query's results is to use the table annotation method. Under this method, you\
    \ specify the `RESULT_CACHE` attribute when you create a table or alter it. You\
    \ can annotate a `CREATE TABLE` or `ALTER TABLE` statement with the `RESULT_CACHE`\
    \ attribute in two different modes: `DEFAULT` or `FORCE`, as shown in the following\
    \ examples:\n\n```sql\nSQL> create table stores (...) RESULT_CACHE (MODE DEFAULT);\n\
    SQL> alter table stores RESULT_CACHE (MODE FORCE);\n```\n\nWe explain the implications\
    \ of setting the `RESULT_CACHE_MODE` initialization parameter to `FORCE` in the\
    \ “How it Works” section.\n\n#### How It Works\n\nIf you set the value of the\
    \ `RESULT_CACHE_MODE` parameter to `FORCE`, Oracle executes all subsequent queries\
    \ only once. Upon subsequent executions of those queries, the database retrieves\
    \ the results from the cache. Obviously, you don't want to store the results of\
    \ each and every SQL statement, because of the performance implications, as well\
    \ as the fact that the server result cache may run out of room. Thus Oracle recommends\
    \ that you specify the `MANUAL` setting for the `RESULT_CACHE_MODE` parameter.\n\
    \nIf you can set the result caching behavior with the use of SQL hints, why use\
    \ table annotations? Table annotations are an easy way to specify caching without\
    \ having to modify the application queries directly by adding the SQL hints. It's\
    \ easier to simply issue an `ALTER TABLE` statement for a set of tables, to enable\
    \ the caching of several queries that use that set of tables. Note that when you\
    \ annotate a table, those annotations apply to the entire query, but not for fragments\
    \ of that query.\n\nIf you annotate a table *and* specify a SQL hint for query\
    \ caching, which method will Oracle choose to determine whether to cache a query's\
    \ results? Query hints are given precedence by the database over table annotations.\
    \ However, the relationship between SQL hints and table annotations is complex,\
    \ and whether the database caches a query's results also depends on the specific\
    \ value of the table annotation, as summarized in the following discussion."
  raw: '#### How It Works


    You can monitor and manage the server result cache with the `DBMS_RESULT_CACHE`
    package provided by Oracle. This package lets you manage both components of the
    server result cache, the SQL result cache and the PL/SQL function result cache.
    You can use the `DBMS_RESULT_CACHE` package to manage the server result cache
    memory allocation, as well as to bypass and re-enable the cache (when recompiling
    PL/SQL packages, for example), flush the cache, and to view  statistics relating
    to the server query cache memory usage.


    The server result cache is part of Oracle''s shared pool component of the SGA.
    Depending on the memory management system in use, Oracle allocates a certain proportion
    of memory to the server result cache upon starting the database. Here are the
    rules that Oracle uses for deciding what percentage of the shared pool it allocates
    to the server result cache:


    *   If you''re using automatic memory management by setting the `MEMORY_TARGET`
    parameter, Oracle allocates 0.25% of the `MEMORY_TARGET` parameter''s value to
    the server result cache.

    *   If you''re using automatic shared memory management with the `SGA_TARGET`
    parameter, the allocation is 0.5% of the `SGA_TARGET` parameter.

    *   If you''re using manual memory management by setting the `SHARED_POOL_SIZE`
    parameter, the allocation is 1% of the `SHARED_POOL_SIZE` parameter.


    In an Oracle RAC environment, you can size the server cache differently on each
    instance, just as you do with the `MEMORY_TARGET` and other instance-related parameters.
    Similarly, when you disable the server result cache by setting the `RESULT_CACHE_MAX_SIZE`
    to 0, you must do so on all the instances of the cluster.


    The server result cache can potentially reduce your CPU overhead by avoiding recomputation
    of results, where data may have to be fetched repeatedly from the buffer cache,
    which results in a higher number of logical I/Os. When you opt to cache the results
    in the cache instead of pre-computing them and storing them in materialized views,
    you can also potentially reduce the database disk I/O as well. Just remember that
    the primary purpose of the result cache isn''t to store just any results in memory—it''s
    mainly designed to help with the performance of queries that involve static or
    mostly static data. Thus, a data warehouse or decision support system is likely
    to derive the greatest benefit from this new performance feature.


    ### 3-9\. Caching SQL Query Results


    #### Problem


    You''ve configured the server result cache in your database. You would now like
    to configure a set of queries whose result you would like to be cached in the
    server result cache.


    #### Solution


    Set the `RESULT_CACHE_MODE` initialization parameter to the appropriate value
    for making queries eligible for caching in the server result cache. You can set
    the `RESULT_CACHE_MODE` to the value `FORCE`, to force all SQL results to be cached
    by the database. Oracle recommends that you set the `RESULT_CACHE_MODE` parameter
    value to `MANUAL`, which happens to be the default setting. The `RESULT_CACHE_MODE`
    parameter is dynamic, so you can set this parameter with the `ALTER SYSTEM` (or
    the `ALTER SESSION`) command.


    When you set the `RESULT_CACHE_MODE` parameter to the value `MANUAL`, the database
    caches the results of only specific queries—queries that you enable for caching
    by using either a query hint or a table annotation. The following example shows
    how to use the query hint method to specify a query''s results to be cached in
    the server result cache.


    `SQL> select /*+ RESULT_CACHE */ prod_id, sum(amount_sold)`

    `     from  sales`

    `     group by prod_id`

    `     order by prod_id;`


    The query hint `/*+RESULT_CACHE */` tells the database to cache the results of
    the previous query. You can turn off the result caching for this query by using
    the `/+ NO_RESULT_CACHE */` hint, as shown in the following example.


    `SQL> select /*+ NO_RESULT_CACHE */ prod_id, SUM(amount_sold)`

    `     from  sales`

    `     group by prod_id`

    `     order by prod_id;`


    When you run this query, the server won''t cache the results of this query any
    longer, because you''ve specified the `MANUAL` setting for the `RESULT_CACHE_MODE`
    initialization parameter.


    The alternative way to specify the caching of a query''s results is to use the
    table annotation method. Under this method, you specify the `RESULT_CACHE` attribute
    when you create a table or alter it. You can annotate a `CREATE TABLE` or `ALTER
    TABLE` statement with the `RESULT_CACHE` attribute in two different modes `:`
    `DEFAULT` or `FORCE`, as shown in the following examples:


    `SQL> create table stores (...) RESULT_CACHE (MODE DEFAULT);`

    `SQL> alter table stores RESULT_CACHE (MODE FORCE);`


    We explain the implications of setting the `RESULT_CACHE_MODE` initialization
    parameter to `FORCE` in the “How it Works” section.


    #### How It Works


    If you set the value of the `RESULT_CACHE_MODE` parameter to `FORCE`, Oracle executes
    all subsequent queries only once. Upon subsequent executions of those queries,
    the database retrieves the results from the cache. Obviously, you don''t want
    to store the results of each and every SQL statement, because of the performance
    implications, as well as the fact that the server result cache may run out of
    room. Thus Oracle recommends that you specify the `MANUAL` setting for the `RESULT_CACHE_MODE`
    parameter.


    If you can set the result caching behavior with the use of SQL hints, why use
    table annotations? Table annotations are an easy way to specify caching without
    having to modify the application queries directly by adding the SQL hints. It''s
    easier to simply issue an `ALTER TABLE` statement for a set of tables, to enable
    the caching of several queries that use that set of tables. Note that when you
    annotate a table, those annotations apply to the entire query, but not for fragments
    of that query.


    If you annotate a table *and* specify a SQL hint for query caching, which method
    will Oracle choose to determine whether to cache a query''s results? Query hints
    are given precedence by the database over table annotations. However, the relationship
    between SQL hints and table annotations is complex, and whether the database caches
    a query''s results also depends on the specific value of the table annotation,
    as summarized in the following discussion.'
  trans: "### 3-9\\. 缓存 SQL 查询结果\n\n#### 工作原理\n\n你可以使用 Oracle 提供的 `DBMS_RESULT_CACHE`\
    \ 包来监控和管理服务器结果缓存。此包允许你管理服务器结果缓存的两个组件：SQL 结果缓存 和 PL/SQL 函数结果缓存。你可以使用 `DBMS_RESULT_CACHE`\
    \ 包来管理服务器结果缓存的内存分配，以及绕过和重新启用缓存（例如在重新编译 PL/SQL 包时）、清空缓存以及查看与服务器查询缓存内存使用相关的统计信息。\n\
    \n服务器结果缓存是 Oracle SGA 共享池组件的一部分。根据所使用的内存管理系统，Oracle 在启动数据库时会为服务器结果缓存分配一定比例的内存。以下是\
    \ Oracle 决定分配多少共享池内存给服务器结果缓存的规则：\n\n*   如果你通过设置 `MEMORY_TARGET` 参数来使用自动内存管理，Oracle\
    \ 会将 `MEMORY_TARGET` 参数值的 0.25% 分配给服务器结果缓存。\n*   如果你使用 `SGA_TARGET` 参数进行自动共享内存管理，则分配量为\
    \ `SGA_TARGET` 参数的 0.5%。\n*   如果你通过设置 `SHARED_POOL_SIZE` 参数进行手动内存管理，则分配量为 `SHARED_POOL_SIZE`\
    \ 参数的 1%。\n\n在 Oracle RAC 环境中，你可以在每个实例上为服务器缓存设置不同的大小，就像处理 `MEMORY_TARGET` 和其他实例相关参数一样。同样地，当你通过将\
    \ `RESULT_CACHE_MAX_SIZE` 设置为 0 来禁用服务器结果缓存时，必须在集群的所有实例上都进行此操作。\n\n服务器结果缓存可以通过避免重新计算结果来减少你的\
    \ CPU 开销，否则可能需要从缓冲区缓存中重复获取数据，这会导致更高的逻辑 I/O 次数。当你选择将结果缓存在缓存中，而不是预先计算并将它们存储在物化视图中时，你也有可能减少数据库的磁盘\
    \ I/O。请记住，结果缓存的主要目的不是简单地在内存中存储任何结果——它主要是为了帮助提高涉及静态或基本静态数据的查询的性能。因此，数据仓库或决策支持系统很可能从这一新的性能特性中获益最大。\n\
    \n#### 问题\n\n你已在数据库中配置了服务器结果缓存。现在你希望配置一组查询，使其结果能够被缓存在服务器结果缓存中。\n\n#### 解决方案\n\n\
    将 `RESULT_CACHE_MODE` 初始化参数设置为适当的值，以使查询有资格被缓存到服务器结果缓存中。你可以将 `RESULT_CACHE_MODE`\
    \ 设置为 `FORCE`，以强制所有 SQL 结果都被数据库缓存。Oracle 建议你将 `RESULT_CACHE_MODE` 参数值设置为 `MANUAL`，这恰好是默认设置。`RESULT_CACHE_MODE`\
    \ 参数是动态的，因此你可以使用 `ALTER SYSTEM`（或 `ALTER SESSION`）命令来设置此参数。\n\n当你将 `RESULT_CACHE_MODE`\
    \ 参数值设置为 `MANUAL` 时，数据库仅缓存特定查询的结果——那些你通过使用查询提示或表注解启用了缓存的查询。以下示例展示了如何使用查询提示方法来指定将查询结果缓存到服务器结果缓存中。\n\
    \n```sql\nSQL> select /*+ RESULT_CACHE */ prod_id, sum(amount_sold)\n     from\
    \  sales\n     group by prod_id\n     order by prod_id;\n```\n\n查询提示 `/*+RESULT_CACHE\
    \ */` 告诉数据库缓存前一个查询的结果。你可以使用 `/*+ NO_RESULT_CACHE */` 提示来关闭此查询的结果缓存，如下例所示。\n\n\
    ```sql\nSQL> select /*+ NO_RESULT_CACHE */ prod_id, SUM(amount_sold)\n     from\
    \  sales\n     group by prod_id\n     order by prod_id;\n```\n\n当你运行此查询时，服务器将不再缓存此查询的结果，因为你已将\
    \ `RESULT_CACHE_MODE` 初始化参数设置为 `MANUAL`。\n\n指定缓存查询结果的另一种方法是使用表注解方法。在此方法中，你在创建表或更改表时指定\
    \ `RESULT_CACHE` 属性。你可以使用两种不同的模式为 `CREATE TABLE` 或 `ALTER TABLE` 语句添加 `RESULT_CACHE`\
    \ 属性注解：`DEFAULT` 或 `FORCE`，如下列示例所示：\n\n```sql\nSQL> create table stores (...)\
    \ RESULT_CACHE (MODE DEFAULT);\nSQL> alter table stores RESULT_CACHE (MODE FORCE);\n\
    ```\n\n我们将在“工作原理”部分解释将 `RESULT_CACHE_MODE` 初始化参数设置为 `FORCE` 的影响。\n\n#### 工作原理\n\
    \n如果你将 `RESULT_CACHE_MODE` 参数的值设置为 `FORCE`，Oracle 将只执行所有后续查询一次。在后续执行这些查询时，数据库将从缓存中检索结果。显然，你不想存储每一条\
    \ SQL 语句的结果，因为这会带来性能影响，并且服务器结果缓存可能会耗尽空间。因此，Oracle 建议你为 `RESULT_CACHE_MODE` 参数指定\
    \ `MANUAL` 设置。\n\n如果可以通过使用 SQL 提示来设置结果缓存行为，为什么还要使用表注解？表注解是一种指定缓存的简便方法，无需通过添加 SQL\
    \ 提示直接修改应用程序查询。只需对一组表发出一个 `ALTER TABLE` 语句，即可启用使用该组表的多个查询的缓存，这样更为简单。请注意，当你为表添加注解时，这些注解适用于整个查询，而不是查询的片段。\n\
    \n如果你为表添加了注解*并且*指定了用于查询缓存的 SQL 提示，Oracle 将选择哪种方法来确定是否缓存查询结果？数据库优先考虑查询提示，而非表注解。然而，SQL\
    \ 提示和表注解之间的关系很复杂，数据库是否缓存查询结果还取决于表注解的具体值，如下文总结的讨论所示。"
- fmt: "##### 表注解与查询提示\n\n如前所述，你可以同时使用 SQL 提示和表注解来指定希望结果缓存存储的查询结果，其中提示的优先级高于注解。使用\
    \ `ALTER TABLE` 或 `CREATE TABLE` 语句为表添加结果缓存模式注解。以下是为表或一组表添加注解时 `CREATE` 或 `ALTER\
    \ TABLE` 语句的语法：\n\n```sql\nCREATE|ALTER TABLE [<schema>.]<table> ... [RESULT_CACHE\
    \ (MODE {FORCE|DEFAULT})]\n```\n\n关于表注解，请注意以下重要几点：\n\n*   `DEFAULT` 模式值当然是默认值，它仅仅是移除你可能已设置的任何表注解，并且不允许缓存涉及该表的查询结果。\n\
    *   如果你将至少一个表设置为 `DEFAULT` 模式，则涉及该表的任何查询都不允许将其结果存储在缓存中。\n*   如果你将查询中的所有表都设置为 `FORCE`\
    \ 模式，Oracle 将总是考虑缓存该查询——除非你在查询中使用 `NO_RESULT_CACHE` 提示关闭缓存。\n*   如果你通过如下的 `CREATE\
    \ TABLE` 语句注解，将查询中的至少一个表设置为 `DEFAULT`，则 Oracle 仅当你将 `RESULT_CACHE_MODE` 参数设置为\
    \ `FORCE` 或指定了 `RESULT_CACHE` 提示时，才会缓存此查询的结果。\n\n```sql\nSQL> CREATE TABLE sales\
    \ (id number) RESULT_CACHE (MODE DEFAULT);\n```\n\n请注意，上面的语句等效于下面的语句，因为 `RESULT_CACHE`\
    \ 属性的默认值是 `DEFAULT`。\n\n```sql\nSQL> CREATE TABLE sales (id number);\n```\n\n\
    你可以检查数据库创建的 `SALES` 表，其 `RESULT_CACHE` 属性被设置为值 `DEFAULT`：\n\n```sql\nSQL> select\
    \ table_name, result_cache from user_tables where table_name ='SALES';\n\nTABLE_NAME\
    \                     RESULT_\n------------------------------ -------\nSALES \
    \                         DEFAULT\n\nSQL>\n```\n\n如果你在表创建语句中指定了 `RESULT_CACHE(MODE\
    \ FORCE)` 选项，这将覆盖你在会话级别设置的 `RESULT_CACHE_MODE` 初始化参数的 `MANUAL` 设置。以下示例说明了这是如何工作的。\n\
    \n1.  首先，修改表 `STORES` 以指定带有 `MODE FORCE` 选项的 `RESULT_CACHE` 属性：`SQL> alter table\
    \ stores result_cache (mode force);`\n2.  然后确保你已将 `RESULT_CACHE_MODE` 初始化参数设置为值\
    \ `MANUAL`。\n3.  接着执行以下查询：\n    ```sql\n    SQL> select prod_id, sum(amount_sold)\n\
    \         from stores\n         group by prod_id\n         having prod_id=999;\n\
    \    ```\n\n在后续执行中，数据库将从服务器结果缓存中检索前述查询的结果。之所以如此，是因为当你指定 `RESULT_CACHE (MODE FORCE)`\
    \ 注解时，它会覆盖 `RESULT_CACHE_MODE` 参数的 `MANUAL` 设置。请记住，当你将此参数设置为 `MANUAL` 模式时，Oracle\
    \ 仅在你指定查询提示或注解时才会缓存查询结果。这里显示的查询没有使用提示，但其结果被缓存，因为 `RESULT_CACHE (MODE FORCE)` 注解使数据库的行为与\
    \ `RESULT_CACHE_MODE` 参数设置为 `FORCE` 时相同——它会缓存所有符合条件的查询的查询结果。\n\n然而，查询提示最终优先于 `RESULT_CACHE\
    \ (MODE FORCE)` 注解，如以下示例所示。\n\n首先，修改表 `STORES` 以指定带有 `MODE FORCE` 选项的 `RESULT_CACHE`\
    \ 属性：\n\n```sql\nSQL> alter table stores result_cache (mode force);\n```\n\n确保你已将\
    \ `RESULT_CACHE_MODE` 初始化参数设置为值 `MANUAL`。\n\n执行以下查询：\n\n```sql\nSQL>select /*+\
    \ no_result_cache */ *\n     from stores\n     order by time_id desc;\n```\n\n\
    在此示例中，即使你已将 `STORES` 表注解为允许使用 `MODE FORCE` 选项进行缓存，但 `/*+ no_result_cache */` 提示覆盖了该注解，并阻止缓存任何涉及\
    \ `STORES` 表的查询的结果。\n\n##### 使用结果缓存的要求\n\n为了使数据库能够使用结果缓存，查询必须满足一些读一致性要求：\n\n*\
    \   在涉及快照的情况下，如果一个读一致性快照构建了一个结果，它必须检索数据的最新已提交状态，或者该查询必须使用闪回查询来指向特定时间点。\n*   当会话事务正在主动引用查询中的表或视图时，出于读一致性目的，数据库不会缓存此查询的结果。\n\
    \n除了结果缓存的读一致性要求外，查询中如果存在以下对象或函数，则该查询不符合缓存条件：\n\n*   `CURRVAL` 和 `NEXTVAL` 伪列\n\
    *   `CURRENT_DATE`、`CURRENT_TIMESTAMP`、`USERENV_CONTEXT`、`SYS_CONTEXT`（带有非常量变量）、`SYSDATE`\
    \ 和 `SYS_TIMESTAMP`\n*   临时表\n*   由 `SYS` 和 `SYSTEM` 拥有的表\n\n### 3-10. 缓存客户端结果集\n\
    \n#### 问题\n\n你使用了许多涉及重复查询的 OCI 应用程序。你想探索如何在客户端缓存结果集。"
  raw: "##### Table Annotations and Query Hints\n\nAs mentioned earlier, you can use\
    \ both SQL hints and table annotations to specify which query results you want\
    \ the result cache to store, with hints overriding annotations. Use either the\
    \ `ALTER TABLE` or the `CREATE` `TABLE` statements to annotate tables with the\
    \ result cache mode. Here's the syntax for a `CREATE` or `ALTER TABLE` statement\
    \ when annotating a table or a set of tables:\n\n`CREATE|ALTER TABLE [<schema>.]<table>\
    \ ... [RESULT_CACHE (MODE {FORCE|DEFAULT})]`\n\nNote the following important points\
    \ about table annotations:\n\n*   The mode value `DEFAULT` is, of course, the\
    \ default value, and this merely removes any table annotations you may have set\
    \ and doesn't permit caching of results that involve this table.\n*   If you set\
    \ at least one table to the `DEFAULT` mode, any query involving that table won't\
    \ be allowed to store its results in the cache.\n*   If you set all the tables\
    \ in a query to the `FORCE` mode, Oracle will always consider that query for caching—unless\
    \ you turn off the caching with the `NO_RESULT_CACHE` hint within the query.\n\
    *   If you set at least one table in a query to `DEFAULT` by annotating a `CREATE\
    \ TABLE` statement, as shown here, Oracle caches results of this query only if\
    \ you've either set the `RESULT_CACHE_MODE` parameter to `FORCE` or specified\
    \ the `RESULT_CACHE` hint.\n\n`SQL> CREATE TABLE sales (id number) RESULT_CACHE\
    \ (MODE DEFAULT);`\n\nNote that the previous statement is equivalent to the following\
    \ statement, because the default value of the attribute `RESULT_CACHE` is `DEFAULT`.\n\
    \n`SQL> CREATE TABLE sales (id number);`\n\nYou can check that the database created\
    \ the table `SALES` with the `RESULT_CACHE` attribute set to the value `DEFAULT:`\n\
    \n`SQL> select table_name, result_cache from user_tables where table_name ='SALES';`\n\
    \n`TABLE_NAME                     RESULT_`\n`------------------------------ -------`\n\
    `SALES                          DEFAULT`\n\n`SQL>`\n\nIf you specify the table\
    \ creation statement with the `RESULT_CACHE(MODE FORCE)` option, this will prevail\
    \ over the `MANUAL` setting of the `RESULT_CACHE_MODE` initialization parameter\
    \ that you've set at the session level. The following example illustrates how\
    \ this works.\n\n1.  First alter the table `STORES` to specify the `RESULT_CACHE`\
    \ attribute with the `MODE FORCE` option: `SQL> alter table stores result_cache\
    \ (mode force);`\n2.  Then ensure that you've set the `RESULT_CACHE_MODE` initialization\
    \ parameter to the value `MANUAL`.\n3.  Then execute the following query: `SQL>\
    \ select prod_id, sum(amount_sold)`\n    `     from stores`\n    `     group by\
    \ prod_id`\n    `     having prod_id=999;`\n\nOn subsequent executions, the database\
    \ will retrieve the results for the preceding query from the server result cache.\
    \ The reason this is so is that when you specify the `RESULT_CACHE (MODE FORCE)`\
    \ annotation, it overrides the `MANUAL` setting for the `RESULT_CACHE_MODE` parameter.\
    \ Remember that when you set this parameter to the `MANUAL` mode, Oracle will\
    \ cache query results only if you specify a query hint or annotation. The query\
    \ shown here doesn't involve the use of a hint, but its results are cached because\
    \ the `RESULT_CACHE (MODE FORCE)` annotation makes the database behave the same\
    \ way as it does when the `RESULT_CACHE_MODE` parameter is set to `FORCE`—it caches\
    \ the query results of all eligible queries.\n\nQuery hints, however, ultimately\
    \ trump the `RESULT_CACHE (MODE FORCE)` annotation, as shown in the following\
    \ example.\n\nFirst alter the table `STORES` to specify the `RESULT_CACHE` attribute\
    \ with the `MODE FORCE` option:\n\n`SQL> alter table stores result_cache (mode\
    \ force);`\n\nEnsure that you've set the `RESULT_CACHE_MODE` initialization parameter\
    \ to the value `MANUAL`.\n\nExecute the following query:\n\n`SQL>select /*+ no_result_cache\
    \ */ *`\n`     from stores`\n`     order by time_id desc;`\n\nIn this example,\
    \ even though you've annotated the `STORES` table to allow caching with the `MODE\
    \ FORCE` option, the `/*+ no_result_cache */` hint overrides the annotation and\
    \ prevents the caching of the results of any query that involves the `STORES table`.\n\
    \n##### Requirements for Using the Result Cache\n\nThere are a few read consistency\
    \ requirements that a query must satisfy, in order for the database to use the\
    \ result cache:\n\n*   In cases involving a snapshot, if a read-consistent snapshot\
    \ builds a result, it must retrieve the latest committed state of the data, or\
    \ the query must use a flashback query to point to a specific point in time.\n\
    *   Whenever a session transaction is actively referencing the tables or views\
    \ in a query, the database won't cache the results from this query for read consistency\
    \ purposes.\n\nIn addition to the read consistency requirements for result caching,\
    \ the following objects or functions, when present in a query, make that query\
    \ ineligible for caching:\n\n*   `CURRVAL` and `NEXTVAL` pseudo columns\n*   The\
    \ `CURRENT_DATE`, `CURRENT_TIMESTAMP`, `USERENV_CONTEXT`, `SYS_CONTEXT` (with\
    \ non-constant variables), `SYSDATE`, and `SYS_TIMESTAMP`\n*   Temporary tables\n\
    *   Tables owned by `SYS` and `SYSTEM`\n\n### 3-10\\. Caching Client Result Sets\n\
    \n#### Problem\n\nYou use a lot of OCI applications that involve repetitive queries.\
    \ You would like to explore how you can cache the result sets on the client."
  trans: "##### 表注解与查询提示\n\n如前所述，你可以同时使用 SQL 提示和表注解来指定希望结果缓存存储的查询结果，其中提示的优先级高于注解。使用\
    \ `ALTER TABLE` 或 `CREATE TABLE` 语句为表添加结果缓存模式注解。以下是为表或一组表添加注解时 `CREATE` 或 `ALTER\
    \ TABLE` 语句的语法：\n\n```sql\nCREATE|ALTER TABLE [<schema>.]<table> ... [RESULT_CACHE\
    \ (MODE {FORCE|DEFAULT})]\n```\n\n关于表注解，请注意以下重要几点：\n\n*   `DEFAULT` 模式值当然是默认值，它仅仅是移除你可能已设置的任何表注解，并且不允许缓存涉及该表的查询结果。\n\
    *   如果你将至少一个表设置为 `DEFAULT` 模式，则涉及该表的任何查询都不允许将其结果存储在缓存中。\n*   如果你将查询中的所有表都设置为 `FORCE`\
    \ 模式，Oracle 将总是考虑缓存该查询——除非你在查询中使用 `NO_RESULT_CACHE` 提示关闭缓存。\n*   如果你通过如下的 `CREATE\
    \ TABLE` 语句注解，将查询中的至少一个表设置为 `DEFAULT`，则 Oracle 仅当你将 `RESULT_CACHE_MODE` 参数设置为\
