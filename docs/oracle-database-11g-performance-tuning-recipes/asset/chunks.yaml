  trans: "\n## 延迟段分配\n\n#### 问题\n\n您正在安装一个包含数千个表和索引的应用程序。每个表和索引都被配置为初始分配一个 10 MB 的区。在将安装\
    \ DDL 部署到生产环境时，您希望尽快安装这些数据库对象。您意识到，如果每个对象在创建时都分配 10 MB 的磁盘空间，那么部署 DDL 将需要一些时间。您想知道是否可以以某种方式指示\
    \ Oracle 将每个对象的初始区分配推迟到数据实际插入表中时。\n\n#### 解决方案\n\n推迟初始段生成的唯一方法是使用 Oracle Database\
    \ 11g R2。使用此版本（或更高版本）的数据库时，默认情况下，表（及关联索引）的区物理分配将被推迟，直到记录首次插入该表。一个小示例将有助于说明这个概念。首先创建一个表：\n\
    \n```\nSQL> create table f_regs(reg_id number, reg_name varchar2(200));\n```\n\
    \n现在查询 `USER_SEGMENTS` 和 `USER_EXTENTS` 以验证尚未分配物理空间：\n\n```\nSQL> select count(*)\
    \ from user_segments where segment_name='F_REGS';\n  COUNT(*)\n----------\n  \
    \       0\n\nSQL> select count(*) from user_extents where segment_name='F_REGS';\n\
    \  COUNT(*)\n----------\n         0\n```\n\n接下来插入一条记录，并再次运行之前的查询：\n\n```\nSQL>\
    \ insert into f_regs values(1,'BRDSTN');\n\n1 row created.\n\nSQL>> select count(*)\
    \ from user_segments where segment_name='F_REGS';\n COUNT(*)\n----------\n   \
    \      1\n\nSQL> select count(*) from user_extents where segment_name='F_REGS';\n\
    \  COUNT(*)\n----------\n         1\n```\n\n先前的行为与 Oracle 的早期版本有很大不同。在早期版本中，一旦您创建对象，就会立即分配段和关联的区。\n\
    \n![images](img/square.jpg) 注意：延迟段生成也适用于分区表和索引。在记录首次插入给定分区之前，不会为该分区分配区。\n\n####\
    \ 工作原理\n\n从 Oracle Database 11g R2 开始，对于在本地管理表空间中创建的非分区堆组织表，初始段创建会被推迟，直到记录插入该表。您需要了解\
    \ Oracle 的延迟段创建功能，原因有几个：\n\n*   允许更快地安装包含大量表和索引的应用程序；这提升了安装速度，尤其是在您有数千个对象时。\n\
    *   作为 DBA，当您注意到对象没有分配空间时，最初可能会对空间使用报告感到困惑。\n*   创建第一行所需的时间会比以前的版本稍长一些（因为现在 Oracle\
    \ 根据第一行的创建来分配第一个区）。对于大多数应用程序来说，这种性能下降并不明显。\n\n我们意识到，要利用此功能，唯一的“解决方案”是升级到 Oracle\
    \ Database 11g R2，而这通常并不可行。然而，我们认为讨论此功能很重要，因为您最终会遇到上述特性（当您开始使用 Oracle 的最新版本时）。\n\
    \n您可以通过将数据库初始化参数 `DEFERRED_SEGMENT_CREATION` 设置为 `FALSE` 来禁用延迟段创建功能。此参数的默认值为 `TRUE`。\n\
    \n在创建表时，您也可以控制延迟段创建行为。`CREATE TABLE` 语句有两个新子句：`SEGMENT CREATION IMMEDIATE` 和 `SEGMENT\
    \ CREATION DEFERRED`——例如：\n\n```\ncreate table f_regs(\n reg_id number\n,reg_name\
    \ varchar2(2000))\nsegment creation immediate;\n```\n\n![images](img/square.jpg)\
    \ 注意：在使用 `SEGMENT CREATION DEFERRED` 子句之前，`COMPATIBLE` 初始化参数需要为 11.2.0.0.0 或更高。\n\
    \n### 1-6. 最大化数据加载速度\n\n#### 问题\n\n您正在将大量数据加载到一个表中，并希望尽可能快地插入新记录。\n\n#### 解决方案\n\
    \n结合使用以下两个功能来最大化插入语句的速度：\n\n*   将表的日志记录属性设置为 `NOLOGGING`；这可以最大限度地减少直接路径操作生成的重做日志（此功能对常规\
    \ DML 操作无效）。\n*   使用直接路径加载功能，例如：\n    *   对于使用子查询确定要插入记录的查询，使用 `INSERT /*+ APPEND\
    \ */`\n    *   对于使用 `VALUES` 子句的查询，使用 `INSERT /*+ APPEND_VALUES */`\n    *   使用\
    \ `CREATE TABLE…AS SELECT`\n\n下面是一个示例来说明 `NOLOGGING` 和直接路径加载。首先，运行以下查询以验证表的日志记录状态。在此示例中，表名为\
    \ `F_REGS`：\n\n```\nselect\n table_name\n,logging\nfrom user_tables\nwhere table_name\
    \ = 'F_REGS';\n```\n\n以下是一些示例输出：\n\n```\nTABLE_NAME             LOG\n------------------------------\
    \ ---\nF_REGS                     YES\n```\n\n以上输出验证了该表是在启用 `LOGGING` 的情况下创建的（默认值）。要启用\
    \ `NOLOGGING`，请使用 `ALTER TABLE` 语句，如下所示：\n\n```\nSQL> alter table f_regs nologging;\n\
    ```\n\n既然已启用 `NOLOGGING`，那么直接路径操作应只会生成最少数量的重做日志。以下示例使用直接路径 `INSERT` 语句将数据加载到表中：\n\
    \n```\ninsert /*+APPEND */ into f_regs\nselect * from reg_master;\n```\n\n前面的语句是一种高效的数据加载方法，因为诸如\
    \ `INSERT /*+APPEND */` 与 `NOLOGGING` 结合使用的直接路径操作会生成最少数量的重做日志。\n"
- fmt: "# How It Works\n\nDirect path inserts have two performance advantages over\
    \ regular insert statements:\n\n*   If `NOLOGGING` is specified, then a minimal\
    \ amount of redo is generated.\n*   The buffer cache is bypassed and data is loaded\
    \ directly into the datafiles. This can significantly improve the loading performance.\n\
    \nThe `NOLOGGING` feature minimizes the generation of redo for direct path operations\
    \ only. For direct path inserts, the `NOLOGGING` option can significantly increase\
    \ the loading speed. One perception is that `NOLOGGING` eliminates redo generation\
    \ for the table for all DML operations. That isn't correct. The `NOLOGGING` feature\
    \ never affects redo generation for regular `INSERT`, `UPDATE`, `MERGE`, and `DELETE`\
    \ statements.\n\nOne downside to reducing redo generation is that you can't recover\
    \ the data created via `NOLOGGING` in the event a failure occurs after the data\
    \ is loaded (and before you back up the table). If you can tolerate some risk\
    \ of data loss, then use `NOLOGGING` but back up the table soon after the data\
    \ is loaded. If your data is critical, then don't use `NOLOGGING`. If your data\
    \ can be easily re-created, then `NOLOGGING` is desirable when you're trying to\
    \ improve performance of large data loads.\n\nWhat happens if you have a media\
    \ failure after you've populated a table in `NOLOGGING` mode (and before you've\
    \ made a backup of the table)? After a restore and recovery operation, it will\
    \ appear that the table has been restored:\n\n```sql\nSQL> desc f_regs;\n\nName\
    \                                      Null?    Type\n-----------------------------------------\
    \ -------- ----------------------------\nREG_ID                              \
    \               NUMBER\nREG_NAME                                           VARCHAR2(2000)\n\
    ```\n\nHowever, when executing a query that scans every block in the table, an\
    \ error is thrown.\n\n```sql\nSQL> select * from f_regs;\n```\n\nThis indicates\
    \ that there is logical corruption in the datafile:\n\n```\nORA-01578: ORACLE\
    \ data block corrupted (file # 10, block # 198)\nORA-01110: data file 10: '/ora01/dbfile/O11R2/users201.dbf'\n\
    ORA-26040: Data block was loaded using the NOLOGGING option\n```\n\nAs the prior\
    \ output indicates, the data in the table is unrecoverable. Use `NOLOGGING` only\
    \ in situations where the data isn't critical or in scenarios where you can back\
    \ up the data soon after it was created.\n\n![Tip icon](images/square.jpg) **Tip**\
    \ If you're using RMAN to back up your database, you can report on unrecoverable\
    \ datafiles via the `REPORT UNRECOVERABLE` command.\n\nThere are some quirks of\
    \ `NOLOGGING` that need some explanation. You can specify logging characteristics\
    \ at the database, tablespace, and object levels. If your database has been enabled\
    \ to force logging, then this overrides any `NOLOGGING` specified for a table.\
    \ If you specify a logging clause at the tablespace level, it sets the default\
    \ logging for any `CREATE TABLE` statements that don't explicitly use a logging\
    \ clause.\n\nYou can verify the logging mode of the database as follows:\n\n```sql\n\
    SQL> select name, log_mode, force_logging from v$database;\n```\n\nThe next statement\
    \ verifies the logging mode of a tablespace:\n\n```sql\nSQL> select tablespace_name,\
    \ logging from dba_tablespaces;\n```\n\nAnd this example verifies the logging\
    \ mode of a table:\n\n```sql\nSQL> select owner, table_name, logging from dba_tables\
    \ where logging = 'NO';\n```\n\nHow do you tell whether Oracle logged redo for\
    \ an operation? One way is to measure the amount of redo generated for an operation\
    \ with logging enabled vs. operating in `NOLOGGING` mode. If you have a development\
    \ environment for testing, you can monitor how often the redo logs switch while\
    \ the transactions are taking place. Another simple test is to measure how long\
    \ the operation takes with and without logging. The operation performed in `NOLOGGING`\
    \ mode should occur faster because a minimal amount of redo is generated during\
    \ the load.\n\n# 1-7. Efficiently Removing Table Data\n\n## Problem\n\nYou're\
    \ experiencing performance issues when deleting data from a table. You want to\
    \ remove data as efficiently as possible.\n\n## Solution\n\nYou can use either\
    \ the `TRUNCATE` statement or the `DELETE` statement to remove records from a\
    \ table. `TRUNCATE` is usually more efficient but has some side effects that you\
    \ must be aware of. For example, `TRUNCATE` is a DDL statement. This means Oracle\
    \ automatically commits the statement (and the current transaction) after it runs,\
    \ so there is no way to roll back a `TRUNCATE` statement. Because a `TRUNCATE`\
    \ statement is DDL, you can't truncate two separate tables as one transaction.\n\
    \nThis example uses a `TRUNCATE` statement to remove all data from the `COMPUTER_SYSTEMS`\
    \ table:\n\n```sql\nSQL> truncate table computer_systems;\n```\n\nWhen truncating\
    \ a table, by default all space is de-allocated for the table except the space\
    \ defined by the `MINEXTENTS` table-storage parameter. If you don't want the `TRUNCATE`\
    \ statement to de-allocate the currently allocated extents, then use the `REUSE\
    \ STORAGE` clause:\n\n```sql\nSQL> truncate table computer_systems reuse storage;\n\
    ```\n\nYou can query the `DBA_EXTENTS`, `ALL_EXTENTS`, or `USER_EXTENTS` views\
    \ to verify if the extents have been de-allocated (or not)—for example:\n\n```sql\n\
    select count(*)\n  from user_extents where segment_name = 'COMPUTER_SYSTEMS';\n\
    ```"
  raw: '#### How It Works


    Direct path inserts have two performance advantages over regular insert statements:


    *   If `NOLOGGING` is specified, then a minimal amount of redo is generated.

    *   The buffer cache is bypassed and data is loaded directly into the datafiles.
    This can significantly improve the loading performance.


    The `NOLOGGING` feature minimizes the generation of redo for direct path operations
    only. For direct path inserts, the `NOLOGGING` option can significantly increase
    the loading speed. One perception is that `NOLOGGING` eliminates redo generation
    for the table for all DML operations. That isn''t correct. The `NOLOGGING` feature
    never affects redo generation for regular `INSERT`, `UPDATE`, `MERGE`, and `DELETE`
    statements.


    One downside to reducing redo generation is that you can''t recover the data created
    via `NOLOGGING` in the event a failure occurs after the data is loaded (and before
    you back up the table). If you can tolerate some risk of data loss, then use `NOLOGGING`
    but back up the table soon after the data is loaded. If your data is critical,
    then don''t use `NOLOGGING`. If your data can be easily re-created, then `NOLOGGING`
    is desirable when you''re trying to improve performance of large data loads.


    What happens if you have a media failure after you''ve populated a table in `NOLOGGING`
    mode (and before you''ve made a backup of the table)? After a restore and recovery
    operation, it will appear that the table has been restored:


    `SQL> desc f_regs;`


    `Name                                      Null?    Type`

    ` ----------------------------------------- -------- ----------------------------`

    ` REG_ID                                             NUMBER`

    ` REG_NAME                                           VARCHAR2(2000)`


    However, when executing a query that scans every block in the table, an error
    is thrown.


    `SQL> select * from f_regs;`


    This indicates that there is logical corruption in the datafile:


    `ORA-01578: ORACLE data block corrupted (file # 10, block # 198)`

    `ORA-01110: data file 10: ''/ora01/dbfile/O11R2/users201.dbf''`

    `ORA-26040: Data block was loaded using the NOLOGGING option`


    As the prior output indicates, the data in the table is unrecoverable. Use `NOLOGGING`
    only in situations where the data isn''t critical or in scenarios where you can
    back up the data soon after it was created.


    ![images](images/square.jpg) **Tip** If you''re using RMAN to back up your database,
    you can report on unrecoverable datafiles via the `REPORT UNRECOVERABLE` command.


    There are some quirks of `NOLOGGING` that need some explanation. You can specify
    logging characteristics at the database, tablespace, and object levels. If your
    database has been enabled to force logging, then this overrides any `NOLOGGING`
    specified for a table. If you specify a logging clause at the tablespace level,
    it sets the default logging for any `CREATE TABLE` statements that don''t explicitly
    use a logging clause.


    You can verify the logging mode of the database as follows:


    `SQL> select name, log_mode, force_logging from v$database;`


    The next statement verifies the logging mode of a tablespace:


    `SQL> select tablespace_name, logging from dba_tablespaces;`


    And this example verifies the logging mode of a table:


    `SQL> select owner, table_name, logging from dba_tables where logging = ''NO'';`


    How do you tell whether Oracle logged redo for an operation? One way is to measure
    the amount of redo generated for an operation with logging enabled vs. operating
    in `NOLOGGING` mode. If you have a development environment for testing, you can
    monitor how often the redo logs switch while the transactions are taking place.
    Another simple test is to measure how long the operation takes with and without
    logging. The operation performed in `NOLOGGING` mode should occur faster because
    a minimal amount of redo is generated during the load.


    ### 1-7. Efficiently Removing Table Data


    #### Problem


    You''re experiencing performance issues when deleting data from a table. You want
    to remove data as efficiently as possible.


    #### Solution


    You can use either the `TRUNCATE` statement or the `DELETE` statement to remove
    records from a table. `TRUNCATE` is usually more efficient but has some side effects
    that you must be aware of. For example, `TRUNCATE` is a DDL statement. This means
    Oracle automatically commits the statement (and the current transaction) after
    it runs, so there is no way to roll back a `TRUNCATE` statement. Because a `TRUNCATE`
    statement is DDL, you can''t truncate two separate tables as one transaction.


    This example uses a `TRUNCATE` statement to remove all data from the `COMPUTER_SYSTEMS`
    table:


    `SQL> truncate table computer_systems;`


    When truncating a table, by default all space is de-allocated for the table except
    the space defined by the `MINEXTENTS` table-storage parameter. If you don''t want
    the `TRUNCATE` statement to de-allocate the currently allocated extents, then
    use the `REUSE STORAGE` clause:


    `SQL> truncate table computer_systems reuse storage;`


    You can query the `DBA/ALL/USER_EXTENTS` views to verify if the extents have been
    de-allocated (or not)—for example:


    `select count(*)`

    ` from user_extents where segment_name = ''COMPUTER_SYSTEMS'';`'
