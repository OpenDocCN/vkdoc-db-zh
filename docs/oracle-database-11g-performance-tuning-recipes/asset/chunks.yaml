  trans: "#### 工作原理\n\n与其他会话跟踪一样，跟踪文件可以在 `user_dump_dest` 参数指定的目标位置找到。该跟踪文件显示了并行进程的详细信息。如果您在使用并行处理时遇到了显著的性能问题，并希望进一步调查此事件生成的跟踪文件的结果，那么直接向\
    \ Oracle 创建一个服务请求以获取最详细的信息可能是有益的。阅读和理解这些跟踪文件可能既困难又繁琐，将文件直接发送给 Oracle 支持部门进行分析可能更为便捷。另一种验证并行操作所用并行度（DOP）的方法是使用\
    \ `_px_trace` 工具，它也会生成一个跟踪文件：\n```sql\nalter session set \"_px_trace\"=\"compilation\"\
    ,\"execution\",\"messaging\";\n\nselect /*+ parallel(emp,4) */ * from emp;\n```\n\
    然后，在跟踪文件中，您可以评估请求和使用的并行度：\n```\nkkscscid_pdm_eval\n        pdml_allowed=0, cursorPdmlMode=0,\
    \                sessPdmlMode=0\n        select /*+ parallel(emp,4) */ * from\
    \ emp\n\nkxfrDefaultDOP\n        DOP Trace -- compute default DOP\n          \
    \  # CPU       = 2\n            Threads/CPU = 2 (\"parallel_threads_per_cpu\"\
    )\n            default DOP = 4 (# CPU * Threads/CPU)\n\nkxfpAdaptDOP\n       \
