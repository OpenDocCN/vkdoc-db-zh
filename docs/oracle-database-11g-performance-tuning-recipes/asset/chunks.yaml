    `              Snap Id      Snap Time      Sessions Curs/Sess`

    `            --------- ------------------- -------- ---------`

    `Begin Snap:     18033 11-Jun-11 00:00:43        59       2.3`

    `  End Snap:     18039 11-Jun-11 06:00:22        69       2.4`

    `   Elapsed:              359.66 (mins)`

    `   DB Time:            7,713.90 (mins)`


    The instance efficiency section gives you a very quick view to determine if things
    are running adequately on your database. Generally, most percentages within this
    section should be above 90%. The Parse CPU to Parse Elapsd metric shows how much
    time the CPU is spending parsing SQL statements. The lower this metric is, the
    better. In the following example, it is about 2%, which is very low. If this metric
    ever gets to 5%, it may mean investigation is warranted to determine why the CPU
    is spending this much time simply parsing SQL statements.


    `Instance Efficiency Percentages (Target 100%)`

    `~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`

    `            Buffer Nowait %:   99.64       Redo NoWait %:   99.99`

    `            Buffer  Hit   %:   91.88    In-memory Sort %:   99.87`

    `            Library Hit   %:   98.92        Soft Parse %:   94.30`

    `         Execute to Parse %:   93.70         Latch Hit %:   99.89`

    `Parse CPU to Parse Elapsd %:    2.10     % Non-Parse CPU:   99.75`


    The third place to get a quick glance at your database performance is the Top
    5 Timed Events section. This section gives you a quick look at exactly where the
    highest amount of resources are being consumed within your database for the snapshot
    period. Based on these results, it may show you that there is an inordinate amount
    of time spent performing full-table scans, or getting data across a network database
    link. The following example shows that the highest amount of resources is being
    used performing index scans (noted by “`db file sequential read`”). We can see
    there is significant time on “`local write wait`”, “`enq: CF – contention`”, and
    “`free buffer waits`”, which gives us a quick view of what possible contention
    and wait events are for our database, and gives us immediate direction for investigation
    and analysis.


    `Top 5 Timed Foreground Events                              Avg`

    `~~~~~~~~~~~~~~~~~~~~~~~~~~~~~                             wait   % DB`

    `Event                                 Waits    Time (s)   (ms)   Time Wait Class`

    `------------------------------ ------------ ----------- ------ ------ ----------`

    `db file sequential read           3,653,606      96,468     26   20.8   User
    I/O`

    `local write wait                     94,358      67,996    721   14.7   User
    I/O`

    `enq: CF - contention                 18,621      46,944   2521   10.1      Other`

    `free buffer waits                 3,627,548      38,249     11    8.3 Configurat`

    `db file scattered read            2,677,267      32,400     12    7.0   User
    I/O`


    #### How It Works


    After looking at the DB Time, Instance Efficiency, and Top 5 Timed Events sections,
    if you want to look in more detail at the sections of a given AWR report, refer
    to Recipe 7-17 in [Chapter 7](#Chapter07.html#ch7) for more information. Because
    the sheer volume of information in the AWR report is so daunting, it is strongly
    recommended to create baselines that represent a normal processing window. Then,
    AWR snapshots can be compared to the baselines, and metrics that may just look
    like a number on a given AWR report will stand out when a particular metric is
    significantly above or below a normal range.


    ### 4-11. Manually Getting Active Session Information


    #### Problem


    You need to do performance analysis on sessions that run too frequently or are
    too short to be available on available AWR snapshots. The AWR snapshots are not
    taken often enough to capture the information that you need.'
  trans: "\n#### 工作原理\n\n如果您需要删除模板，只需使用 `DBMS_WORKLOAD_REPOSITORY` 包中的 `DROP_BASELINE_TEMPLATE`\
    \ 过程。请参见以下示例：\n\n```sql\nSQL> exec dbms_workload_repository.drop_baseline_template('Batch\
    \ Template');\n\nPL/SQL procedure successfully completed.\n```\n\n如果您希望查看您已创建的任何模板的信息，可以查询\
    \ `DBA_HIST_BASELINE_TEMPLATE` 视图。请参见以下示例查询：\n\n```sql\ncolumn template_name format\
    \ a14\ncolumn prefix format a14\ncolumn hr format 99\ncolumn dur format 999\n\
    column exp format 999\n\nSELECT template_name, baseline_name_prefix prefix,\n\
    to_char(start_time,'mm/dd/yy:hh24') start_time,\nto_char(end_time,'mm/dd/yy:hh24')\
    \ end_time,\nsubstr(day_of_week,1,3) day, hour_in_day hr, duration dur, expiration\
    \ exp,\nto_char(last_generated,'mm/dd/yy:hh24') last\nFROM dba_hist_baseline_template;\n\
    \nTEMPLATE_NAME  PREFIX         START_TIME  END_TIME    DAY  HR  DUR  EXP LAST\n\
    -------------- -------------- ----------- ----------- --- --- ---- ---- -----------\n\
    Batch Template Batch Baseline 06/14/11:00 06/14/11:06 WED   0    6  365 06/14/11:00\n\
    ```\n\n### 4-10. 快速分析 AWR 输出\n\n#### 问题\n\n您已生成 AWR 报告，并希望快速解读报告的关键部分，以确定数据库是否存在性能问题。\n\
    \n#### 解决方案\n\nAWR 报告与其前身——早期 Oracle 版本的 Statspack 和 UTLBSTAT/UTLESTAT——一样，包含大量统计信息，可帮助您确定数据库的运行和性能状况。报告包含许多部分。评估数据库性能时，首先要看的三个地方是：\n\
    \n1.  数据库时间\n2.  实例效率\n3.  前五大计时事件\n\n报告显示的第一部分是报告快照窗口的摘要，以及对经过时间（代表快照窗口）和数据库时间（代表数据库活动）的简要查看。如果数据库时间超过经过时间，则表示数据库繁忙。如果它比经过时间高出很多，可能意味着某些会话正在等待资源。虽然这不够具体，但可以让您快速查看数据库整体是否繁忙并可能已超负荷。从以下此部分的示例中，通过比较经过时间和数据库时间，我们可以看出这是一个非常繁忙的数据库：\n\
    \n```\n              快照 ID       快照时间        会话数  游标/会话\n            ---------\
    \ ------------------- -------- ---------\n开始快照:    18033 11-Jun-11 00:00:43  \
    \      59       2.3\n  结束快照:    18039 11-Jun-11 06:00:22        69       2.4\n\
    \   经过时间:              359.66 (分钟)\n   数据库时间:          7,713.90 (分钟)\n```\n\n\
    实例效率部分可以让您非常快速地了解数据库上的运行是否充分。通常，此部分中的大多数百分比应高于 90%。`Parse CPU to Parse Elapsd`\
    \ 指标显示 CPU 在解析 SQL 语句上花费了多少时间。此指标越低越好。在以下示例中，它约为 2%，非常低。如果此指标达到 5%，可能意味着需要调查以确定为什么\
    \ CPU 要花费这么多时间仅仅解析 SQL 语句。\n\n```\n实例效率百分比（目标 100%）\n~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n\
    \            缓冲区立即获得 %:   99.64       重做无等待 %:   99.99\n            缓冲区命中率 %:\
    \   91.88    内存中排序 %:   99.87\n            库缓存命中率 %:   98.92        软解析 %:   94.30\n\
    \         执行到解析比率 %:   93.70         闩锁命中率 %:   99.89\n解析 CPU 时间与解析耗时比率 %:   \
    \ 2.10     % 非解析 CPU:   99.75\n```\n\n快速了解数据库性能的第三个地方是“前五大计时事件”部分。此部分让您快速了解在快照期间，数据库内资源消耗最高的具体位置。根据这些结果，它可能显示花费了过多时间执行全表扫描，或通过数据库链接获取数据。以下示例显示，使用最多资源的操作是索引扫描（由\
    \ `db file sequential read` 标明）。我们可以看到在 `local write wait`、`enq: CF – contention`\
    \ 和 `free buffer waits` 上花费了大量时间，这让我们快速了解了数据库可能存在的争用和等待事件，并为调查和分析提供了直接方向。\n\n\
    ```\n前五大计时前台事件                                  平均\n~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\
    \                          等待时间   % 数据库\n事件                                 等待次数\
    \    耗时(秒)   (毫秒)   时间 等待类别\n------------------------------ ------------ -----------\
    \ ------ ------ ----------\ndb file sequential read           3,653,606      96,468\
    \     26   20.8   用户 I/O\nlocal write wait                     94,358      67,996\
    \    721   14.7   用户 I/O\nenq: CF - contention                 18,621      46,944\
    \   2521   10.1      其他\nfree buffer waits                 3,627,548      38,249\
    \     11    8.3 配置\ndb file scattered read            2,677,267      32,400  \
    \   12    7.0   用户 I/O\n```\n\n#### 工作原理\n\n在查看了数据库时间、实例效率和前五大计时事件部分后，如果您想更详细地查看特定\
    \ AWR 报告的部分，请参阅第 7 章中的方案 7-17 获取更多信息。由于 AWR 报告中的信息量非常庞大，强烈建议创建代表正常处理窗口的基线。然后，可以将\
    \ AWR 快照与基线进行比较，那些在给定 AWR 报告中可能只是数字的指标，当特定指标显著高于或低于正常范围时，就会凸显出来。\n\n### 4-11.\
    \ 手动获取活动会话信息\n\n#### 问题\n\n您需要对执行过于频繁或时间太短以至于无法在可用 AWR 快照中捕获的会话进行性能分析。AWR 快照的采样频率不足以捕捉您需要的信息。\n"
