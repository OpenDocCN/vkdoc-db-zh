    `BEGIN`

    `  tune_sql := ''select count(*) from mgmt_db_feature_usage_ecm2'';`

    `  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(`

    `    sql_text   => tune_sql`

    `   ,user_name  => ''STAGING''`

    `   ,scope      => ''COMPREHENSIVE''`

    `   ,time_limit => 60`

    `   ,task_name  => ''TUNE1''`

    `   ,description => ''Calling SQL Tuning Advisor for one statement''`

    `);`

    `END;`

    `/`


