    is that once the data is loaded as compressed, any subsequent I/O operations will
    use fewer resources because there are fewer blocks required to read and write
    data. You will need to test the performance benefits for your environment. In
    general, tables that hold large amounts of character data are candidates for basic
    compression—especially in scenarios where data is direct path–loaded once, and
    thereafter selected from many times.


    Keep in mind that Oracle''s basic compression feature has no effect on regular
    DML statements such as `INSERT`, `UPDATE`, `MERGE`, and `DELETE`. If you require
    compression to occur on all DML statements, then consider using OLTP compression
    (see Recipe 1-14 for details).


    You can also specify basic compression at the partition and tablespace level.
    Any table created within a tablespace created with the `COMPRESS` clause will
    have basic compression enabled by default. Here''s an example of creating a tablespace
    with the `COMPRESS` clause:


    `CREATE TABLESPACE comp_data`

    `  DATAFILE ''/ora01/dbfile/O11R2/comp_data01.dbf''`

    `  SIZE 500M`

    `  EXTENT MANAGEMENT LOCAL`

    `  UNIFORM SIZE 512K`

    `  SEGMENT SPACE MANAGEMENT AUTO`

    `  DEFAULT COMPRESS;`


    You can also alter an existing tablespace to set the default degree of compression:


    `SQL> alter tablespace comp_data default compress;`


    Run this query to verify that basic compression for a tablespace is enabled:


    `select tablespace_name, def_tab_compression, compress_for`

    `from dba_tablespaces`

    `where tablespace_name = ''COMP_DATA'';`


    Here is some sample output:


    `TABLESPACE_NAME                DEF_TAB_ COMPRESS_FOR`

    `------------------------------ -------- ------------`

    `COMP_DATA                      ENABLED  BASIC`


    ![images](images/square.jpg) **Tip** You cannot drop a column from a table created
    with basic compression enabled. However, you can mark a column as unused.


    ### 1-14. Compressing Data for All DML


    #### Problem


    You''re in an OLTP environment and have noticed that there is a great deal of
    disk I/O occurring when reading data from a table. You wonder if you can increase
    I/O performance by compressing the data within the table. The idea is that compressed
    table data will consume less physical storage and thus require less I/O to read
    from disk.'
  trans: "\n### 问题描述\n\n您正在使用一个决策支持系统类型的数据库，并希望优化与其关联的报表应用程序的性能。此环境中包含一些大型表，这些表在加载后会频繁进行全表扫描。您希望在数据加载时进行压缩，因为这样可以将数据压缩到更少的数据库块中，从而减少后续从表中读取所需的\
    \ I/O 操作。由于压缩数据需要读取的块数更少，这将提升数据检索性能。\n\n### 解决方案\n\n使用 Oracle 的基本压缩功能来压缩通过直接路径加载到堆组织表中的数据。启用基本压缩的方法如下：\n\
    \n1.  在创建、修改或移动现有表时，使用 `COMPRESS` 子句来启用压缩。\n2.  通过直接路径机制加载数据，例如 `CREATE TABLE…AS\
    \ SELECT` 或 `INSERT /*+ APPEND */`。\n\n![images](img/square.jpg) **注意** 在 Oracle\
    \ Database 11g R2 之前，基本压缩被称为 DSS 压缩，并通过 `COMPRESS FOR DIRECT_LOAD OPERATION` 子句启用。此语法在\
    \ Oracle Database 11g R2 及更高版本中已**弃用**。\n\n下面是一个使用 `CREATE TABLE…AS SELECT` 语句创建启用基本压缩的表并通过直接路径加载数据的示例：\n\
    \n```\ncreate table regs_dss\ncompress\nas select reg_id, reg_name\nfrom regs;\n\
    ```\n\n前面的语句创建了一个包含压缩数据的表。任何后续的直接路径加载操作也将以压缩格式加载数据。\n\n![images](img/square.jpg)\
    \ **提示** 您可以使用 `COMPRESS` 子句或 `COMPRESS BASIC` 子句来启用表的基本压缩功能。`COMPRESS` 子句和 `COMPRESS\
    \ BASIC` 子句是**同义**的。\n\n您可以通过查询相应的 `DBA/ALL/USER_TABLES` 视图来验证表是否已启用压缩。此示例假设您已作为表的所有者连接到数据库：\n\
    \n```\nselect table_name, compression, compress_for\nfrom user_tables\nwhere table_name='REGS_DSS';\n\
    ```\n\n以下是一些示例输出：\n\n```\nTABLE_NAME                      COMPRESS COMPRESS_FOR\n\
    ------------------------------ -------- ------------\nREGS_DSS               \
    \         ENABLED  BASIC\n```\n\n前面的输出显示该表已启用基本模式压缩。如果您正在处理一个已创建的表，则可以使用 `ALTER\
    \ TABLE` 语句更改其基本压缩特性——例如：\n\n```\nSQL> alter table regs_dss compress;\n```\n\n\
    当您修改表以启用基本压缩时，这**不会**影响表中当前存在的任何数据；它只会压缩后续的直接路径数据加载操作。\n\n如果您想为现有表中的数据启用基本压缩，请使用\
    \ `MOVE COMPRESS` 子句：\n\n```\nSQL> alter table regs_dss move compress;\n```\n\n\
    请记住，当您移动一个表时，所有相关的索引都将**失效**。您必须重建与已移动表关联的任何索引。\n\n如果您已为表启用了基本压缩，则可以通过 `NOCOMPRESS`\
    \ 子句禁用它——例如：\n\n```\nSQL> alter table regs_dss nocompress;\n```\n\n当您修改表以禁用基本压缩时，这**不会**解压缩表中现有的数据。相反，此操作会指示\
    \ Oracle 不压缩后续直接路径操作的数据。如果您需要解压缩现有的压缩数据，请使用 `MOVE NOCOMPRESS` 子句：\n\n```\nSQL>\
    \ alter table regs_dss move nocompress;\n```\n\n### 工作原理\n\n基本压缩功能作为 Oracle 企业版的一部分**免费提供**。任何创建或修改为使用基本压缩的堆组织表，都将成为后续直接路径加载操作中以压缩格式加载数据的候选对象。压缩数据会带来一些额外的\
    \ CPU 开销，但在许多情况下，您可能会发现此开销被因 I/O 减少而带来的性能提升所抵消。\n\n从性能角度来看，使用基本压缩的主要优点是，一旦数据以压缩形式加载，任何后续的\
    \ I/O 操作将使用更少的资源，因为读写数据所需的块更少。您需要为您的环境测试性能收益。一般来说，保存大量字符数据的表是基本压缩的候选对象——尤其是在数据一次性直接路径加载，之后多次被查询的场景中。\n\
    \n请记住，Oracle 的基本压缩功能对常规 DML 语句（如 `INSERT`、`UPDATE`、`MERGE` 和 `DELETE`）**没有影响**。如果您需要在所有\
    \ DML 语句上发生压缩，那么请考虑使用 OLTP 压缩（详见配方 1-14）。\n\n您还可以在分区和表空间级别指定基本压缩。在使用 `COMPRESS`\
    \ 子句创建的表空间中创建的任何表，默认情况下都将启用基本压缩。以下是一个创建带有 `COMPRESS` 子句的表空间的示例：\n\n```\nCREATE\
    \ TABLESPACE comp_data\n  DATAFILE '/ora01/dbfile/O11R2/comp_data01.dbf'\n  SIZE\
    \ 500M\n  EXTENT MANAGEMENT LOCAL\n  UNIFORM SIZE 512K\n  SEGMENT SPACE MANAGEMENT\
    \ AUTO\n  DEFAULT COMPRESS;\n```\n\n您也可以修改现有表空间以设置默认压缩级别：\n\n```\nSQL> alter tablespace\
    \ comp_data default compress;\n```\n\n运行此查询以验证表空间的基本压缩是否已启用：\n\n```\nselect tablespace_name,\
    \ def_tab_compression, compress_for\nfrom dba_tablespaces\nwhere tablespace_name\
    \ = 'COMP_DATA';\n```\n\n以下是一些示例输出：\n\n```\nTABLESPACE_NAME                DEF_TAB_\
    \ COMPRESS_FOR\n------------------------------ -------- ------------\nCOMP_DATA\
    \                      ENABLED  BASIC\n```\n\n![images](img/square.jpg) **提示**\
    \ 您**无法**从启用了基本压缩创建的表中删除列。但是，您可以将列标记为未使用。\n\n## 1-14. 为所有 DML 操作压缩数据\n\n### 问题描述\n\
    \n您身处 OLTP 环境，并注意到从表中读取数据时发生大量的磁盘 I/O。您想知道是否可以通过压缩表内的数据来提高 I/O 性能。其思路是，压缩后的表数据将占用更少的物理存储空间，从而需要更少的\
    \ I/O 来从磁盘读取。\n"
- fmt: "#### Solution\n\nUse the `COMPRESS FOR OLTP` clause when creating a table\
    \ to enable data compression when using regular DML statements to manipulate data.\
    \ This example creates an OLTP compression–enabled table:\n\n```\ncreate table\
    \ regs\n(reg_id   number\n,reg_name varchar2(2000)\n) compress for oltp;\n```\n\
    \n![images](images/square.jpg) **Note** Prior to Oracle Database 11g R2, OLTP\
    \ table compression was enabled using the `COMPRESS FOR ALL OPERATIONS` clause.\
    \ This syntax is deprecated in Oracle Database 11g R2 and higher.\n\nYou can verify\
    \ that compression has been enabled for a table by querying the appropriate `DBA/ALL/USER_TABLES`\
    \ view. This example assumes that you're connected to the database as the owner\
    \ of the table:\n\n```\nselect table_name, compression, compress_for\nfrom user_tables\n\
    where table_name='REGS';\n```\n\nHere is some sample output:\n\n```\nTABLE_NAME\
    \                     COMPRESS COMPRESS_FOR\n------------------------------ --------\
    \ ------------\nREGS                           ENABLED  OLTP\n```\n\nIf you've\
    \ already created the table, you can use the `ALTER TABLE` statement to enable\
    \ compression on an existing table—for example:\n\n```\nSQL> alter table regs\
    \ compress for oltp;\n```\n\nWhen you alter a table's compression mode, it doesn't\
    \ impact any of the data currently within the table. Subsequent DML statements\
    \ will result in data stored in a compressed fashion.\n\nIf you want to enable\
    \ OLTP compression for data in an existing table, use the `MOVE COMPRESS FOR OLTP`\
    \ clause:\n\n```\nSQL> alter table regs move compress for oltp;\n```\n\nKeep in\
    \ mind that when you move a table, all of the associated indexes are invalidated.\
    \ You'll have to rebuild any indexes associated with the moved table.\n\nIf you\
    \ have enabled OLTP compression for a table, you can disable it via the `NOCOMPRESS`\
    \ clause—for example:\n\n```\nSQL> alter table regs nocompress;\n```\n\nWhen you\
    \ alter a table to disable OLTP compression, this does not uncompress existing\
    \ data within the table. Rather this operation instructs Oracle to not compress\
    \ data for subsequent DML operations.\n\n#### How It Works\n\nOLTP compression\
    \ requires the Oracle Enterprise Edition and the Advanced Compression Option (extra\
    \ cost license). The `COMPRESS FOR OLTP` clause enables compression for all DML\
    \ operations. The OLTP compression doesn't immediately compress data as it is\
    \ inserted or updated in a table. Rather the compression occurs in a batch mode\
    \ when the degree of change within the block reaches a certain threshold. When\
    \ the threshold is reached, all of the uncompressed rows are compressed at the\
    \ same time. The threshold at which compression occurs is determined by an internal\
    \ algorithm (over which you have no control).\n\nYou can also specify OLTP compression\
    \ at the tablespace level. Any table created in an OLTP compression–enabled tablespace\
    \ will by default inherit this compression setting. Here's an example of tablespace\
    \ creation script specifying OLTP compression:\n\n```\nCREATE TABLESPACE comp_data\n\
    \  DATAFILE '/ora01/dbfile/O11R2/comp_data01.dbf'\n  SIZE 10M\n  EXTENT MANAGEMENT\
    \ LOCAL\n  UNIFORM SIZE 1M\n  SEGMENT SPACE MANAGEMENT AUTO\n  DEFAULT COMPRESS\
    \ FOR OLTP;\n```\n\nYou can also alter an existing tablespace to set the default\
    \ degree of compression:\n\n```\nSQL> alter tablespace comp_data default compress\
    \ for oltp;\n```\n\nYou can verify the default compression characteristics with\
    \ this query:\n\n```\nselect tablespace_name, def_tab_compression, compress_for\n\
    from dba_tablespaces\nwhere tablespace_name = 'COMP_DATA';\n```\n\nHere is some\
    \ sample output:\n\n```\nTABLESPACE_NAME                DEF_TAB_ COMPRESS_FOR\n\
    ------------------------------ -------- ------------\nCOMP_DATA              \
    \        ENABLED  OLTP\n```\n\n### 1-15. Compressing Data at the Column Level\n\
    \n#### Problem\n\nYou're using the Oracle Exadata product and you want to efficiently\
    \ compress data. You have determined that compressed data will result in much\
    \ more efficient I/O operations, especially when reading data from disk. The idea\
    \ is that compressed data will result in much fewer blocks read for `SELECT` statements.\n\
    \n#### Solution\n\nTo enable hybrid columnar compression, when creating a table,\
    \ use either the `COMPRESS FOR QUERY` or the `COMPRESS FOR ARCHIVE` clause—for\
    \ example:\n\n```\ncreate table f_regs(\n reg_id number\n,reg_desc varchar2(4000))\n\
    compress for query;\n```\n\nYou can also specify a degree of compression of either\
    \ `LOW` or `HIGH`:\n\n```\ncreate table f_regs(\n reg_id number\n,reg_desc varchar2(4000))\n\
    compress for query high;\n```\n\nThe default level of compression for `QUERY`\
    \ is `HIGH`, and the default level of compression for `ARCHIVE` is `LOW`. You\
    \ can validate the level of compression enabled via this query:\n\n```\nselect\
    \ table_name, compression, compress_for\nfrom user_tables\nwhere table_name='F_REGS';\n\
    ```\n\nHere is some sample output:\n\n```\nTABLE_NAME                     COMPRESS\
    \ COMPRESS_FOR\n------------------------------ -------- ------------\nF_REGS \
    \                        ENABLED  QUERY HIGH\n```\n\nIf you attempt to use hybrid\
    \ columnar compression in an environment other than Exadata, you'll receive the\
    \ following error:\n\n```\nERROR at line 1:\nORA-64307: hybrid columnar compression\
    \ is only supported in tablespaces\nresiding on Exadata storage\n```\n\n#### How\
    \ It Works\n\nExadata is Oracle's high-performance database machine. It is designed\
    \ to deliver high performance for both data warehouse and OLTP databases. Exadata\
    \ storage supports hybrid columnar compression and is available starting with\
    \ Oracle Database 11g R2.\n\nHybrid columnar compression compresses the data on\
    \ a column-by-column basis. Column-level compression results in higher compression\
    \ ratios than Oracle basic compression (see Recipe 1-13) or OLTP compression (see\
    \ Recipe 1-14). There are four levels of hybrid columnar compression. These levels\
    \ are listed here from the lowest level of compression to the highest level:\n\
    \n- `COMPRESS FOR QUERY LOW`\n- `COMPRESS FOR QUERY HIGH`\n- `COMPRESS FOR ARCHIVE\
    \ LOW`\n- `COMPRESS FOR ARCHIVE HIGH`\n\n`COMPRESS FOR QUERY` is appropriate for\
    \ bulk load operations on heap-organized tables that are infrequently updated.\
    \ This type of compression is optimized for query performance and is therefore\
    \ more appropriate for DSS and data warehouse databases, whereas `COMPRESS FOR\
    \ ARCHIVE` maximizes the degree of compression and is more appropriate for data\
    \ that is stored for long periods of time and will not be updated.\n\n![images](images/square.jpg)\
    \ **Note** Refer to the Oracle Exadata Storage Server Software documentation for\
    \ more information on hybrid columnar compression.\n\n### 1-16. Monitoring Table\
    \ Usage\n\n#### Problem\n\nYou've recently inherited a database that contains\
    \ hundreds of tables. The application is experiencing performance issues. As part\
    \ of your overall tuning strategy, you want to obtain a better understanding of\
    \ the application by determining which tables are being used by what types of\
    \ SQL statements. Tables that aren't being used can be renamed and later dropped.\
    \ By removing unused tables, you can free up space, reduce the clutter, and focus\
    \ your performance analysis on actively used tables."
  raw: '#### Solution


    Use the `COMPRESS FOR OLTP` clause when creating a table to enable data compression
    when using regular DML statements to manipulate data. This example creates an
    OLTP compression–enabled table:


    `create table regs`

    `(reg_id   number`

    `,reg_name varchar2(2000)`

    `) compress for oltp;`


    ![images](images/square.jpg) **Note** Prior to Oracle Database 11g R2, OLTP table
    compression was enabled using the `COMPRESS FOR ALL OPERATIONS` clause. This syntax
    is deprecated in Oracle Database 11g R2 and higher.


    You can verify that compression has been enabled for a table by querying the appropriate
    `DBA/ALL/USER_TABLES` view. This example assumes that you''re connected to the
    database as the owner of the table:


    `select table_name, compression, compress_for`

    `from user_tables`

    `where table_name=''REGS'';`


    Here is some sample output:


    `TABLE_NAME                     COMPRESS COMPRESS_FOR`

    `------------------------------ -------- ------------`

    `REGS                           ENABLED  OLTP`


    If you''ve already created the table, you can use the `ALTER TABLE` statement
    to enable compression on an existing table—for example:


    `SQL> alter table regs compress for oltp;`


    When you alter a table''s compression mode, it doesn''t impact any of the data
    currently within the table. Subsequent DML statements will result in data stored
    in a compressed fashion.


    If you want to enable OLTP compression for data in an existing table, use the
    `MOVE COMPRESS FOR OLTP` clause:


    `SQL> alter table regs move compress for oltp;`


    Keep in mind that when you move a table, all of the associated indexes are invalidated.
    You''ll have to rebuild any indexes associated with the moved table.


    If you have enabled OLTP compression for a table, you can disable it via the `NOCOMPRESS`
    clause—for example:


    `SQL> alter table regs nocompress;`


    When you alter a table to disable OLTP compression, this does not uncompress existing
    data within the table. Rather this operation instructs Oracle to not compress
    data for subsequent DML operations.


    #### How It Works


    OLTP compression requires the Oracle Enterprise Edition and the Advanced Compression
    Option (extra cost license). The `COMPRESS FOR OLTP` clause enables compression
    for all DML operations. The OLTP compression doesn''t immediately compress data
    as it is inserted or updated in a table. Rather the compression occurs in a batch
    mode when the degree of change within the block reaches a certain threshold. When
    the threshold is reached, all of the uncompressed rows are compressed at the same
    time. The threshold at which compression occurs is determined by an internal algorithm
    (over which you have no control).


    You can also specify OLTP compression at the tablespace level. Any table created
    in an OLTP compression–enabled tablespace will by default inherit this compression
    setting. Here''s an example of tablespace creation script specifying OLTP compression:


    `CREATE TABLESPACE comp_data`

    `  DATAFILE ''/ora01/dbfile/O11R2/comp_data01.dbf''`

    `  SIZE 10M`

    `  EXTENT MANAGEMENT LOCAL`

    `  UNIFORM SIZE 1M`

    `  SEGMENT SPACE MANAGEMENT AUTO`

    `  DEFAULT COMPRESS FOR OLTP;`


    You can also alter an existing tablespace to set the default degree of compression:


    `SQL> alter tablespace comp_data default compress for oltp;`


    You can verify the default compression characteristics with this query:


    `select tablespace_name, def_tab_compression, compress_for`

    `from dba_tablespaces`

    `where tablespace_name = ''COMP_DATA'';`


    Here is some sample output:


    `TABLESPACE_NAME                DEF_TAB_ COMPRESS_FOR`

    `------------------------------ -------- ------------`

    `COMP_DATA                      ENABLED  OLTP`


    ### 1-15. Compressing Data at the Column Level


    #### Problem


    You''re using the Oracle Exadata product and you want to efficiently compress
    data. You have determined that compressed data will result in much more efficient
    I/O operations, especially when reading data from disk. The idea is that compressed
    data will result in much fewer blocks read for `SELECT` statements.


    #### Solution


    To enable hybrid columnar compression, when creating a table, use either the `COMPRESS
    FOR QUERY` or the `COMPRESS FOR ARCHIVE` clause—for example:


    `create table f_regs(`

    ` reg_id number`

    `,reg_desc varchar2(4000))`

    `compress for query;`


    You can also specify a degree of compression of either `LOW` or `HIGH`:


    `create table f_regs(`

    ` reg_id number`

    `,reg_desc varchar2(4000))`

    `compress for query high;`


    The default level of compression for `QUERY` is `HIGH`, and the default level
    of compression for `ARCHIVE` is `LOW`. You can validate the level of compression
    enabled via this query:


    `select table_name, compression, compress_for`

    `from user_tables`

    `where table_name=''F_REGS'';`


    Here is some sample output:


    `TABLE_NAME                     COMPRESS COMPRESS_FOR`

    `------------------------------ -------- ------------`

    `F_REGS                         ENABLED  QUERY HIGH`


    If you attempt to use hybrid columnar compression in an environment other than
    Exadata, you''ll receive the following error:


    `ERROR at line 1:`

    `ORA-64307: hybrid columnar compression is only supported in tablespaces`

    `residing on Exadata storage`


    #### How It Works


    Exadata is Oracle''s high-performance database machine. It is designed to deliver
    high performance for both data warehouse and OLTP databases. Exadata storage supports
    hybrid columnar compression and is available starting with Oracle Database 11g
    R2.


    Hybrid columnar compression compresses the data on a column-by-column basis. Column-level
    compression results in higher compression ratios than Oracle basic compression
    (see Recipe 1-13) or OLTP compression (see Recipe 1-14). There are four levels
    of hybrid columnar compression. These levels are listed here from the lowest level
    of compression to the highest level:


    *   `COMPRESS FOR QUERY LOW`

    *   `COMPRESS FOR QUERY HIGH`

    *   `COMPRESS FOR ARCHIVE LOW`

    *   `COMPRESS FOR ARCHIVE HIGH`


    COMPRESS FOR QUERY is appropriate for bulk load operations on heap-organized tables
    that are infrequently updated. This type of compression is optimized for query
    performance and is therefore more appropriate for DSS and data warehouse databases,
    whereas `COMPRESS FOR ARCHIVE` maximizes the degree of compression and is more
    appropriate for data that is stored for long periods of time and will not be updated.


    ![images](images/square.jpg) **Note** Refer to the Oracle Exadata Storage Server
    Software documentation for more information on hybrid columnar compression.


    ### 1-16\. Monitoring Table Usage


    #### Problem


    You''ve recently inherited a database that contains hundreds of tables. The application
    is experiencing performance issues. As part of your overall tuning strategy, you
    want to obtain a better understanding of the application by determining which
    tables are being used by what types of SQL statements. Tables that aren''t being
    used can be renamed and later dropped. By removing unused tables, you can free
    up space, reduce the clutter, and focus your performance analysis on actively
    used tables.'
