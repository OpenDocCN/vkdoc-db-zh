    `SQL> select wait_class_id, wait_class,`

    `     total_waits, time_waited`

    `     from v$session_wait_class`

    `     where sid = <SID>;`


    If you find, for example, that this session endured a very high number of waits
    in the application wait class (wait class ID for this class is 4217450380), you
    can issue the following query using the `V$SYSTEM_EVENT` view, to find out exactly
    which waits are responsible:


    `SQL> select event, total_waits, time_waited`

    `     from v$system_event e, v$event_name n`

    `     where n.event_id = e.event_id`

    `     and e.wait_class_id = 4217450380;`


    `EVENT                                    TOTAL_WAITS             TIME_WAITED`

    `----------------------        ----------------------     --------------------`


    `enq: TM - contention                              82                      475`

    `…`

    `SQL>`


    In our example, the waits in the application class (ID 4217450380) are due to
    locking contention as revealed by the wait event `enq:TM - contention`. You can
    further use the `V$EVENT_HISTOGRAM` view, to find out how many times and for how
    long sessions have waited for a specific wait event since you started the instance.
    Here''s the query you need to execute to find out the wait time pattern for enqueue
    lock waits:


    `SQL> select wait_time_milli bucket, wait_count`

    `     from v$event_histogram`

    `     where event = ''enq: TX - row lock contention'';`


    A high amount of enqueue waits due to locking behavior is usually due to faulty
    application design. You''ll sometimes encounter this when an application executes
    many updates against the same row or a set of rows. Since this type of high waits
    due to locking is due to inappropriately designed applications, there''s not much
    you can do by yourself to reduce these waits. Let your application team know why
    these waits are occurring, and ask them to consider modifying the application
    logic to avoid the waits.


    Any of the following four DML statements can cause locking contention: `INSERT`,
    `UPDATE`, `DELETE`, and `SELECT FOR UPDATE`. `INSERT` statements wait for a lock
    because another session is attempting to insert a row with an identical value.
    This usually happens when you have a table that has a primary key or unique constraint,
    with the application generating the keys. Use an Oracle sequence instead to generate
    the key values, to avoid these types of locking situations. You can specify the
    `NOWAIT` option with a `SELECT` `FOR UPDATE` statement to eliminate session blocking
    due to locks. You can also use the `SELECT FOR UPDATE NOWAIT` statement to avoid
    waiting by sessions for locks when they issue an `UPDATE` or `DELETE` statement.
    The `SELECT FOR UPDATE NOWAIT` statement locks the row without waiting.


    ### 5-20\. Minimizing Latch Contention'
  trans: "#### 工作原理\n\n“解决方案”部分展示了如何将 `V$ACTIVE_SESSION_HISTORY` 视图与其他视图（如 `V$SESSION`、`V$SQLAREA`、`DBA_USERS`\
    \ 和 `DBA_OBJECTS`）关联起来，以准确找出过去几分钟内导致等待事件数量最多的原因，或者谁等待得最久。在诊断“实时”数据库性能问题时，这些信息极具价值。\n\
    \n### 5-19. 识别因锁定导致的等待时间\n\n#### 问题\n\n你希望识别出会话因锁定问题而花费的总等待时间。\n\n#### 解决方案\n\n\
    你可以使用以下查询来识别（并量化）由于表行锁定引起的等待。由于该查询按等待时间对事件排序，你可以快速查看哪种类型的等待事件在你的实例中占据了大部分等待。\n\
    \n```sql\nselect wait_class, event, time_waited / 100 time_secs\nfrom v$system_event\
    \ e\nwhere e.wait_class <> 'Idle' AND time_waited > 0\nunion\nselect 'Time Model',\
    \ stat_name NAME,\nround ((value / 1000000), 2) time_secs\nfrom v$sys_time_model\n\
    where stat_name NOT IN ('background elapsed time', 'background cpu time')\norder\
    \ by 3 desc;\n```\n\n```\nWAIT_CLASS                                EVENT    \
    \                        TIME_SECS\n-------------------------       ------------------------------\
    \   --------------\nSystem I/O                      log file parallel write  \
    \              45066.32\nSystem I/O                      control file sequential\
    \ read           23254.41\nTime Model                      DB time           \
    \                     11083.91\nTime Model                      sql execute elapsed\
    \ time                7660.04\nConcurrency                     latch: shared pool\
    \                      5928.73\nApplication                     enq: TX - row\
    \ lock contention           3182.06\n…\nSQL>\n```\n\n在此示例中，等待事件 `enq: TX - row\
    \ lock contention` 揭示了由于行锁排队等待事件导致的总时间。请注意，共享池闩锁事件被归类在 **Concurrency**（并发）等待类下，而排队\
    \ `TX - row lock contention` 事件则被归类为 **Application**（应用程序）类等待事件。\n\n#### 工作原理\n\
    \n“解决方案”部分中的查询关联了 `V$SYSTEM_EVENT` 和 `V$SYS_TIME_MODEL` 视图，以向你显示因各种等待事件而导致的总等待时间。在我们的场景中，我们关注的是因排队锁定导致的总等待时间。如果你对特定会话的总等待时间感兴趣，可以使用一些不同的\
    \ `V$` 视图来找出会话处于等待状态的时间，但我们推荐使用 `V$SESSION` 视图，因为它显示了阻塞会话和被阻塞会话的各种有用属性。以下是一个示例，展示如何找出一个会话被另一个会话阻塞了多长时间。\n\
    \n```sql\nSQL> select sid, username, event, blocking_session,\n    seconds_in_wait,\
    \ wait_time\n    from v$session where state in ('WAITING');\n```\n\n该查询揭示了关于 SID\
    \ 为 81、处于 `WAITING` 状态的会话的以下信息：\n\n`SID  : 81` （这是被阻塞的会话）\n`username: SH` （当前被阻塞的用户）\n\
    `event: TX - row lock contention` （显示了确切的锁竞争类型）\n`blocking session: 68` （这是“阻塞者”）\n\
    `seconds_in_wait: 3692` （被阻塞会话在此状态下的等待时长）\n\n查询显示，SID 为 81 的用户 SH 已被阻塞了将近一个小时（3692\
    \ 秒）。用户 SH 显示正在等待一个当前被会话 68 锁定的表的锁。虽然 `V$SESSION` 视图对于识别阻塞和被阻塞会话非常有用，但它无法告诉你涉及阻塞表的\
    \ SQL 语句。通常，识别出涉及阻塞情况的 SQL 语句有助于找出该语句导致锁定行为的确切原因。要找出涉及的实际 SQL 语句，你必须关联 `V$SESSION`\
    \ 和 `V$SQL` 视图，如下所示。\n\n```sql\nSQL> select sid, sql_text\n     from v$session\
    \ s, v$sql q\n     where sid in (68,81)\n     and (\n     q.sql_id = s.sql_id\
    \ or  q.sql_id = s.prev_sql_id)\nSQL> /\n```\n\n```\n      SID               \
    \        SQL_TEXT\n-------------     -----------------------------------------------------\n\
    \      68           select * from test for update\n      81           update hr.test\
    \ set name='nalapati' where user_id=1111\nSQL>\n```\n\n查询的输出显示，会话 81 被阻塞是因为它试图更新表中的一行，而该表已被会话\
    \ 68 使用 `SELECT … FOR UPDATE` 语句锁定。在这种情况下，如果你发现有很长的用户会话队列被另一个会话阻塞，你必须终止阻塞会话，以便其他会话可以继续处理它们的工作。在这些情况下，你还会在数据库中看到较高的活动用户计数——终止阻塞会话为你提供了解决由排队锁引起的争用的直接方法。之后，你可以调查阻塞发生的原因，以便预防这些情况。\n\
    \n对于任何会话，你可以通过执行以下查询来识别该会话在每个等待类上花费的总等待时间：\n\n```sql\nSQL> select wait_class_id,\
    \ wait_class,\n     total_waits, time_waited\n     from v$session_wait_class\n\
    \     where sid = <SID>;\n```\n\n如果你发现，例如，此会话在应用程序等待类（此类的等待类 ID 为 4217450380）中承受了非常高的等待次数，你可以使用\
    \ `V$SYSTEM_EVENT` 视图执行以下查询，以找出具体是哪些等待造成的：\n\n```sql\nSQL> select event, total_waits,\
    \ time_waited\n     from v$system_event e, v$event_name n\n     where n.event_id\
    \ = e.event_id\n     and e.wait_class_id = 4217450380;\n```\n\n```\nEVENT    \
    \                                      TOTAL_WAITS                 TIME_WAITED\n\
    ----------------------        ----------------------     --------------------\n\
    enq: TM - contention                                     82                  \
    \        475\n…\nSQL>\n```\n\n在我们的示例中，应用程序类（ID 4217450380）中的等待是由于锁定争用造成的，如等待事件\
    \ `enq:TM - contention` 所揭示。你可以进一步使用 `V$EVENT_HISTOGRAM` 视图，找出自实例启动以来，会话为特定等待事件等待的次数和时长。以下是找出排队锁等待模式所需的查询：\n\
    \n```sql\nSQL> select wait_time_milli bucket, wait_count\n     from v$event_histogram\n\
    \     where event = 'enq: TX - row lock contention';\n```\n\n由于锁定行为导致的高数量排队等待通常是由有缺陷的应用程序设计引起的。当应用程序对同一行或一组行执行多次更新时，你有时会遇到这种情况。由于这种类型的高锁定等待是由设计不当的应用程序造成的，你自己能做的来减少这些等待的事情不多。告知你的应用团队这些等待发生的原因，并请他们考虑修改应用程序逻辑以避免这些等待。\n\
    \n以下四种 DML 语句中的任何一种都可能导致锁争用：`INSERT`、`UPDATE`、`DELETE` 和 `SELECT FOR UPDATE`。`INSERT`\
    \ 语句会等待锁，因为另一个会话正试图插入具有相同值的行。当你有一个具有主键或唯一约束的表，并且由应用程序生成键值时，通常会发生这种情况。请改用 Oracle\
    \ 序列来生成键值，以避免此类锁定情况。你可以在 `SELECT FOR UPDATE` 语句中指定 `NOWAIT` 选项，以消除由于锁导致的会话阻塞。你还可以使用\
    \ `SELECT FOR UPDATE NOWAIT` 语句，以避免会话在发出 `UPDATE` 或 `DELETE` 语句时等待锁。`SELECT FOR\
    \ UPDATE NOWAIT` 语句会锁定行而不等待。\n\n### 5-20. 最小化闩锁争用"
- fmt: "## Problem\n\nYou're seeing a high number of latch waits, and you'd like to\
    \ reduce the latch contention.\n\n## Solution\n\nSevere latch contention can slow\
    \ your database down noticeably. When you're dealing with a latch contention issue,\
    \ start by executing the following query to find out the specific types of latches\
    \ and the total wait time caused by each wait.\n\n```\nSQL> select event, sum(P3),\
    \ sum(seconds_in_wait) seconds_in_wait\n     from v$session_wait\n     where event\
    \ like 'latch%'\n     group by event;\n```\n\nThe previous query shows the latches\
    \ that are currently being waited for by this session. To find out the amount\
    \ of time the entire instance has waited for various latches, execute the following\
    \ SQL statement.\n\n```\nSQL> select wait_class, event, time_waited / 100 time_secs\n\
    \     from v$system_event e\n     where e.wait_class <> 'Idle' AND time_waited\
    \ > 0\n     union\n     select 'Time Model', stat_name NAME,\n     round ((value\
    \ / 1000000), 2) time_secs\n     from v$sys_time_model\n     where stat_name not\
    \ in ('background elapsed time', 'background cpu time')\n     order by 3 desc;\n\
    ```\n\n```\nWAIT_CLASS                                         EVENT         \
    \                      TIME_SECS\n-------------------- -----------------------------\
    \ -----------------\nConcurrency              library cache pin              \
    \             622.24\nConcurrency              latch: library cache          \
    \              428.23\nConcurrency              latch: library cache lock    \
    \                93.24\nConcurrency              library cache lock          \
    \                24.20\nConcurrency              latch: library cache pin    \
    \                60.28\n-\n```\n\nThe partial output from the query shows the\
    \ latch-related wait events, which are part of the `Concurrency` wait class.\n\
    \nYou can also view the top five wait events in the AWR report to see if latch\
    \ contention is an issue, as shown here:\n\n```\nEvent                       \
    \            Waits           Time (s)     (ms)      Time      Wait Class\n------------------------\
    \   ------------    ----------    -------   --------   ------------\ndb file sequential\
    \ read      42,005,780       232,838          6       73.8      User I/O\nCPU\
    \ time                                    124,672                  39.5      Other\n\
    latch free                   11,592,952        76,746          7       24.3  \
    \    Other\nwait list latch free            107,553         2,088         19 \
    \       0.7      Other\nlatch: library cache          1,135,976         1,862\
    \          2        0.6      Concurrency\n```\n\n### Common Latch Wait Types and\
    \ Reduction Methods\n\nHere are the most common Oracle latch wait types and how\
    \ you can reduce them.\n\n> `Shared pool` and `library latches`: These are caused\
    \ mostly by the database repeatedly executing the same SQL statement that varies\
    \ slightly each time. For example, a database may execute a SQL statement 10,000\
    \ times, each time with a different value for a variable. The solution in all\
    \ such cases is to use bind variables. An application that explicitly closes all\
    \ cursors after each execution may also contribute to this type of wait. The solution\
    \ for this is to specify the `CURSOR_SPACE_FOR_TIME` initialization parameter.\
    \ Too small a shared pool may also contribute to the latch problem, so check your\
    \ SGA size.\n> \n> `Cache buffers LRU chain`: These latch events are usually due\
    \ to excessive buffer cache usage and may be caused both by excessive physical\
    \ reads as well as logical reads. Either the database is performing large full\
    \ table scans, or it's performing large index range scans. The usual cause for\
    \ these types of latch waits is either the lack of an index or the presence of\
    \ an unselective index. Also check to see if you need to increase the size of\
    \ the buffer cache.\n> \n> `Cache buffer chains`: These waits are due to one or\
    \ more hot blocks that are being repeatedly accessed. Application code that updates\
    \ a table's rows to generate sequence numbers, rather than using an Oracle sequence,\
    \ can result in such hot blocks. You might also see the cache buffer chains wait\
    \ event when too many processes are scanning an unselective index with similar\
    \ predicates.\n\n### Optimizing Oracle Sequences\n\nAlso, if you're using Oracle\
    \ sequences, re-create them with a larger cache size setting and try to avoid\
    \ using the `ORDER` clause. The `CACHE` clause for a sequence determines the number\
    \ of sequence values the database must cache in the SGA. If your database is processing\
    \ a large number of inserts and updates, consider increasing the cache size to\
    \ avoid contention for sequence values. By default, the cache is set to 20 values.\
    \ Contention can result if values are being requested fast enough to frequently\
    \ deplete the cache. If you're dealing with a RAC environment, using the `NOORDER`\
    \ clause will prevent enqueue contention due to the forced ordering of queued\
    \ sequence values."
