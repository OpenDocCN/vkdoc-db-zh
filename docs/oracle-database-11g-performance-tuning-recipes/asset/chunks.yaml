    `5z1b3z8rhutn /* SQL Analyze(98, 0) */ select * from emppart where empno > 12345`


    #### How It Works


    Utilizing this feature is a handy way to get historical statistics for a given
    SQL statement. For current statements, you can continue to use other mechanisms
    such as `AUTOTRACE`, but after a SQL statement has been run, using the `awrsqrpt.sql`
    script provides an easy mechanism to help analyze past run statements and help
    retroactively tune poorly performing SQL statements.


    ### 4-6. Creating a Statistical Baseline for Your Database


    #### Problem


    You want to establish baseline statistics that represent a normal view of database
    operations.


    #### Solution


    You can create AWR baselines in order to establish a saved workload view for your
    database, which can be used later for comparison to other AWR snapshots. The purpose
    of a baseline is to establish a normal workload view of your database for a predefined
    time period. Performance statistics for an AWR baseline are saved in your database,
    and are not purged automatically. There are two types of baselines—fixed and moving.


    ##### Fixed Baselines


    The most common type of baseline is called a fixed baseline. This is a single,
    static view that is meant to represent a normal system workload. To manually create
    an AWR baseline, you can use the `CREATE_BASELINE` procedure of the `DBMS_WORKLOAD_REPOSITORY`
    PL/SQL package. The following example illustrates how to create a baseline based
    on a known begin and end date and time for which the baseline will be created:


    `SQL> exec dbms_workload_repository.create_baseline -`

    `    (to_date(''2011-06-01:00:00:00'',''yyyy-mm-dd:hh24:mi:ss''), -`

    `    to_date(''2011-06-01:06:00:00'',''yyyy-mm-dd:hh24:mi:ss''),''Batch Baseline
    #1'');`


    `PL/SQL procedure successfully completed.`


    For the foregoing baseline, we want to establish a normal workload for a data
    warehouse batch window, which is between midnight and 6 a.m. This baseline will
    be held indefinitely unless explicitly dropped (see Recipe 4-7 for managing AWR
    baselines). Any fixed baseline you create stays in effect until a new baseline
    is created. If you want to have a set expiration for a baseline, you can simply
    specify the retention period for a baseline when creating it by using the `EXPIRATION`
    parameter, which is specified in days:


    `exec dbms_workload_repository.create_baseline( -`

    `start_time=>to_date(''2011-06-01:00:00:00'',''yyyy-mm-dd:hh24:mi:ss''), -`

    `end_time=>to_date(''2011-06-01:06:00:00'',''yyyy-mm-dd:hh24:mi:ss''), -`

    `baseline_name=>''Batch Baseline #1'', -`

    `expiration=>30);`


    You can also create a baseline based on already created AWR snapshot IDs. In order
    to do this, you could run the `CREATE_BASELINE` procedure as follows:


    `exec dbms_workload_repository.create_baseline( -`

    `start_snap_id=>258,end_snap_id=>268,baseline_name=>''Batch Baseline #1'', -`

    `expiration=>30);`


    ##### Moving Baselines


    Like the fixed baseline, the moving baseline is used to capture metrics over a
    period of time. The big difference is the metrics for moving baselines are captured
    based on the entire AWR retention period. For instance, the default AWR retention
    is eight days (see Recipe 4-2 on changing the AWR retention period). These metrics,
    also called adaptive thresholds, are captured based on the entire eight-day window.
    Furthermore, the baseline changes with each passing day, as the AWR window for
    a given database moves day by day. Because of this, the metrics over a given period
    of time can change as a database evolves and performance loads change over time.
    A default moving baseline is automatically created—the `SYSTEM_MOVING_BASELINE`.
    It is recommended to increase the default AWR retention period, as this may give
    a more complete set of metrics on which to accurately analyze performance. The
    maximum size of the moving window is the AWR retention period. To modify the moving
    window baseline, use the `MODIFY_BASELINE_WINDOW_SIZE` procedure of the `DBMS_WORKLOAD_REPOSITORY`
    package, as in the following example:


    `SQL>  exec dbms_workload_repository.modify_baseline_window_size(30);`


    `PL/SQL procedure successfully completed.`'
  trans: "\n#### 解决方案\n\n您可以运行 `awrsqrpt.sql` 脚本，其操作与 `awrrpt.sql` 非常相似。系统将提示您输入所有相同的信息，但会多出一个提示，要求输入一个特定的\
    \ SQL ID 值。例如：\n\n```\nSpecify the SQL Id\n~~~~~~~~~~~~~~~~~~\nEnter value for\
    \ sql_id: 5z1b3z8rhutn6\nSQL ID specified:  5z1b3z8rhutn6\n```\n\n生成的报告将专注于特定于您的\
    \ SQL 语句的信息，包括 `CPU Time`、`Disk Reads` 和 `Buffer Gets`。它还提供了详细的执行计划供审查。请参见报告中的以下片段：\n\
    \n```\nStat Name                                         Statement   Per Execution\
    \ % Snap\n------------------------------------------------ ---------- --------------\
    \ -------\nElapsed Time (ms)                                   210,421      105,210.3\
    \     9.4\nCPU Time (ms)                                        22,285       11,142.3\
    \     1.6\nExecutions                                                2       \
    \     N/A     N/A\nBuffer Gets                                           1,942,525\
    \      971,262.5    12.5\nDisk Reads                                         \
    \   1,940,578      970,289.0    14.0\nParse Calls                            \
    \                    9            4.5     0.0\nRows                          \
    \                             0            0.0     N/A\nUser I/O Wait Time (ms)\
    \                              195,394            N/A     N/A\nCluster Wait Time\
    \ (ms)                                    0            N/A     N/A\nApplication\
    \ Wait Time (ms)                                0            N/A     N/A\nConcurrency\
    \ Wait Time (ms)                                0            N/A     N/A\nInvalidations\
    \                                             0            N/A     N/A\nVersion\
    \ Count                                             2            N/A     N/A\n\
    Sharable Mem(KB)                                         22            N/A   \
    \  N/A\n```\n\n```\nExecution Plan\n-----------------------------------------------------------------------------------------------\n\
    | Id  | Operation            | Name      | Rows  | Bytes | Cost (%CPU)| Time \
    \    |PQ Dis\n-----------------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT     |           |       |       | 73425 (100)|      \
    \    |\n|   1 |  PX COORDINATOR      |           |       |       |           \
    \ |          |\n|   2 |   PX SEND QC (RANDOM)| :TQ10000  |     1 |    39 | 73425\
    \   (1)| 00:14:42 | P->S\n|   3 |    PX BLOCK ITERATOR |           |     1 | \
    \   39 | 73425   (1)| 00:14:42 | PCWC\n|   4 |     TABLE ACCESS FULL| EMPPART\
    \   |     1 |    39 | 73425   (1)| 00:14:42 | PCWP\n-----------------------------------------------------------------------------------------------\n\
    ```\n\n```\nFull SQL Text\n\nSQL ID         SQL Text\n------------ ------------------------------------------------------------------\n\
    5z1b3z8rhutn  /* SQL Analyze(98, 0) */ select * from emppart where empno > 12345\n\
    ```\n\n#### 工作原理\n\n利用此功能是获取给定 SQL 语句历史统计信息的一种便捷方式。对于当前语句，您可以继续使用其他机制（如 `AUTOTRACE`），但在\
    \ SQL 语句运行后，使用 `awrsqrpt.sql` 脚本提供了一种简单的机制，可帮助分析过去的运行语句，并辅助对性能不佳的 SQL 语句进行追溯性调优。\n\
    \n### 4-6. 为您的数据库创建统计基线\n\n#### 问题\n\n您希望建立能够代表数据库操作正常状态的基线统计信息。\n\n#### 解决方案\n\
    \n您可以创建 AWR 基线，以便为您的数据库建立一个保存的工作负载视图，该视图可用于后续与其他 AWR 快照进行比较。基线的目的是为预定义的时间段建立数据库的正常工作负载视图。AWR\
    \ 基线的性能统计信息保存在您的数据库中，不会被自动清除。基线有两种类型——固定基线和移动基线。\n\n##### 固定基线\n\n最常见的基线类型称为固定基线。这是一个单一的、静态的视图，旨在代表正常的系统工作负载。要手动创建\
    \ AWR 基线，您可以使用 `DBMS_WORKLOAD_REPOSITORY` PL/SQL 包的 `CREATE_BASELINE` 过程。以下示例说明了如何基于已知的开始和结束日期时间创建基线：\n\
    \n```\nSQL> exec dbms_workload_repository.create_baseline -\n    (to_date('2011-06-01:00:00:00','yyyy-mm-dd:hh24:mi:ss'),\
    \ -\n    to_date('2011-06-01:06:00:00','yyyy-mm-dd:hh24:mi:ss'),'Batch Baseline\
    \ #1');\n\nPL/SQL procedure successfully completed.\n```\n\n对于上述基线，我们希望为数据仓库批处理窗口（午夜至凌晨\
    \ 6 点之间）建立一个正常工作负载视图。除非显式删除（管理 AWR 基线请参见配方 4-7），否则此基线将无限期保留。您创建的任何固定基线在创建新基线之前一直有效。如果您希望基线有明确的过期时间，可以在创建时使用\
    \ `EXPIRATION` 参数（以天为单位指定）简单地指定基线的保留期：\n\n```\nexec dbms_workload_repository.create_baseline(\
    \ -\nstart_time=>to_date('2011-06-01:00:00:00','yyyy-mm-dd:hh24:mi:ss'), -\nend_time=>to_date('2011-06-01:06:00:00','yyyy-mm-dd:hh24:mi:ss'),\
    \ -\nbaseline_name=>'Batch Baseline #1', -\nexpiration=>30);\n```\n\n您也可以基于已创建的\
    \ AWR 快照 ID 创建基线。为此，您可以如下运行 `CREATE_BASELINE` 过程：\n\n```\nexec dbms_workload_repository.create_baseline(\
    \ -\nstart_snap_id=>258,end_snap_id=>268,baseline_name=>'Batch Baseline #1', -\n\
    expiration=>30);\n```\n\n##### 移动基线\n\n与固定基线类似，移动基线用于在一段时间内捕获指标。最大的区别在于，移动基线的指标是基于整个\
    \ AWR 保留期捕获的。例如，默认的 AWR 保留期是八天（有关更改 AWR 保留期，请参见配方 4-2）。这些指标，也称为自适应阈值，是基于整个八天的窗口捕获的。此外，随着给定数据库的\
    \ AWR 窗口逐日移动，基线也每天都在变化。因此，随着数据库的演变和性能负载随时间变化，给定时间段内的指标可能会发生变化。系统会自动创建一个默认的移动基线——`SYSTEM_MOVING_BASELINE`。建议增加默认的\
    \ AWR 保留期，因为这可以提供更完整的指标集，以更准确地分析性能。移动窗口的最大大小是 AWR 保留期。要修改移动窗口基线，请使用 `DBMS_WORKLOAD_REPOSITORY`\
    \ 包的 `MODIFY_BASELINE_WINDOW_SIZE` 过程，如下例所示：\n\n```\nSQL>  exec dbms_workload_repository.modify_baseline_window_size(30);\n\
    \nPL/SQL procedure successfully completed.\n```\n"
- fmt: "# How It Works\n\n设置AWR保留期可能是使用移动基线时最重要的配置事项，因为所有自适应阈值指标都基于整个保留期的信息。在为移动基线设置保留期时，请再次记住它不能超过AWR保留期，否则可能会收到以下错误：\n\
    \n```sql\nSQL> exec dbms_workload_repository.modify_baseline_window_size(45);\n\
    BEGIN dbms_workload_repository.modify_baseline_window_size(45); END;\n*\nERROR\
    \ at line 1:\nORA-13541: system moving window baseline size (3888000) greater\
    \ than retention\n(2592000)\nORA-06512: at \"SYS.DBMS_WORKLOAD_REPOSITORY\", line\
    \ 686\nORA-06512: at line 1\n```\n\n如果你将AWR保留期设置为无限制值，移动基线保留期仍然有一个上限，如果你设置的移动基线保留期过高，并且AWR保留期被设置为无限制，你可能会收到以下错误：\n\
    \n```sql\nexec dbms_workload_repository.modify_baseline_window_size(92);\nBEGIN\
    \ dbms_workload_repository.modify_baseline_window_size(92); END;\n*\nERROR at\
    \ line 1:\nORA-13539: invalid input for modify baseline window size (window_size,\
    \ 92)\nORA-06512: at \"SYS.DBMS_WORKLOAD_REPOSITORY\", line 686\nORA-06512: at\
    \ line 1\n```\n\n对于固定基线，AWR保留期不是决定因素，它仅仅基于你希望将快照与基线进行对比的时间跨度来考虑。设置任何基线后，你可以从数据字典中获取有关基线的信息。要获取数据库中基线的信息，你可以使用如下查询，该查询将显示你已配置的任何固定基线，以及自动配置的移动基线：\n\
    \n```sql\n  SELECT baseline_name, start_snap_id start_id,\n         TO_CHAR(start_snap_time,\
    \ 'yyyy-mm-dd:hh24:mi') start_time,\n         end_snap_id end_id,\n         TO_CHAR(end_snap_time,\
    \ 'yyyy-mm-dd:hh24:mi') end_time,\n         expiration\n  FROM dba_hist_baseline\n\
    \  ORDER BY baseline_id;\n```\n\n```\nBASELINE_NAME          START_ID START_TIME\
    \           END_ID END_TIME          EXPIRATION\n-------------------- ----------\
    \ ---------------- ---------- ---------------- ----------\nSYSTEM_MOVING_WINDOW\
    \        255 2011-05-27:22:00        358 2011-06-08:22:00\nBatch Baseline #1 \
    \          258 2011-05-28:13:39        268 2011-05-29:00:00       30\n```\n\n\
    从上述结果来看，移动基线包含了基于AWR保留期的整个快照范围；因此其过期时间显示为`NULL`。你可以通过使用`DBMS_WORKLOAD_REPOSITORY`包的`SELECT_BASELINE_DETAILS`函数获取类似信息。你需要提供`baseline_id`编号传入函数以获得所需结果：\n\
    \n```sql\nSELECT start_snap_id, start_snap_time, end_snap_id, end_snap_time,\n\
    \       pct_total_time pct  FROM (SELECT * FROM\n       TABLE(DBMS_WORKLOAD_REPOSITORY.select_baseline_details(12)));\n\
    ```\n\n```\nSTART_SNAP_ID START_SNAP_TIME           END_SNAP_ID END_SNAP_TIME\
    \                    PCT\n------------- ------------------------- -----------\
    \ ------------------------- ----------\n           258 28-MAY-11 01.39.19.296\
    \ PM         268 29-MAY-11 12.00.45.211 AM     100\n```\n\n要获取数据库中关于移动基线的更具体信息，你需要深入研究自适应指标的统计信息。例如，要查看基于移动窗口的每个与“读取”相关的指标的平均值和最大值，你可以使用以下查询：\n\
    \n```sql\ncolumn metric_name format a50\nSELECT metric_name, average, maximum\
    \ FROM\n(SELECT * FROM TABLE\n(DBMS_WORKLOAD_REPOSITORY.select_baseline_metric('SYSTEM_MOVING_WINDOW')))\n\
    where lower(metric_name) like '%read%'\norder by metric_name;\n```\n\n```\nMETRIC_NAME\
    \                                             AVERAGE    MAXIMUM\n--------------------------------------------------\
    \ ---------- ----------\nAverage Synchronous Single-Block Read Latency      .159658155\
    \ 53.8876404\nConsistent Read Changes Per Sec                    2.99232446 3984.11246\n\
    Consistent Read Changes Per Txn                    117.812978      239485\nConsistent\
    \ Read Gets Per Sec                       202.570936  64677.436\nConsistent Read\
    \ Gets Per Txn                       3930.41373 372602.889\nLogical Reads Per\
    \ Sec                              224.984307 64690.6884\nLogical Reads Per Txn\
    \                              4512.34119      840030\nLogical Reads Per User\
    \ Call                        276.745756      135804\nPhysical Read Bytes Per\
    \ Sec                        1249601.48 528672777\nPhysical Read IO Requests Per\
    \ Sec                  6.44664078 2040.73828\nPhysical Read Total Bytes Per Sec\
    \                  1272159.18 528699475\nPhysical Read Total IO Requests Per Sec\
    \            7.82238122 2042.31792\nPhysical Reads Direct Lobs Per Sec       \
    \          .006030572  4.6953047\nPhysical Reads Direct Lobs Per Txn         \
    \        .231642268        141\nPhysical Reads Direct Per Sec                \
    \      59.3280451 64535.1513\nPhysical Reads Direct Per Txn                  \
    \    602.336945 371825.222\nPhysical Reads Per Sec                           \
    \  152.539244 64535.2511\nPhysical Reads Per Txn                             2966.04803\
    \ 371831.889\n```\n\n## 4-7. Managing AWR Baselines via Enterprise Manager\n\n\
    ### Problem\n\nYou want to create and manage AWR baselines using Enterprise Manager.\n\
    \n### Solution\n\nUsing Enterprise Manager, you can easily configure or modify\
    \ baselines. In [Figure 4-3](#Chapter04.html#fig_4_3), you can see the window\
    \ where you can establish or modify your existing baselines, including any fixed\
    \ baselines, as well as the system moving baseline. To create a new fixed baseline,\
    \ you would click the `Create` button, which would navigate you to the screen\
    \ shown in [Figure 4-4](#Chapter04.html#fig_4_4), where you can configure your\
    \ new fixed baseline. Within this screen, you name your baseline, and choose between\
    \ a snapshot-based or time-based baseline.\n\n![images](images/0403.jpg)\n\nFigure\
    \ 4-3. Managing baselines within Enterprise Manager\n\n![images](images/0404.jpg)\n\
    \nFigure 4-4. Creating new fixed baseline within Enterprise Manager\n\nWhen deciding\
    \ to modify your existing baselines, the screen options differ between modifying\
    \ fixed baselines, and modifying the system moving baseline. [Figure 4-5](#Chapter04.html#fig_4_5)\
    \ shows the modifiable options for a fixed baseline. As you can see, the only\
    \ real modification that can be made is the actual baseline name itself. [Figure\
    \ 4-6](#Chapter04.html#fig_4_6) shows how to change the moving baseline window\
    \ within Enterprise Manager. As mentioned before, the actual screens may differ\
    \ between versions of the Enterprise Manager tool.\n\n![images](images/0405.jpg)\n\
    \nFigure 4-5. Modifying a fixed baseline within Enterprise Manager\n\n![images](images/0406.jpg)\n\
    \nFigure 4-6. Modifying the moving baseline within Enterprise Manager"
  raw: '#### How It Works


    Setting the AWR retention period is probably the most important thing to configure
    when utilizing the moving baseline, as all adaptive threshold metrics are based
    on information from the entire retention period. When setting the retention period
    for the moving baseline, remember again that it cannot exceed the AWR retention
    period, else you may get the following error:


    `SQL> exec dbms_workload_repository.modify_baseline_window_size(45);`

    `BEGIN dbms_workload_repository.modify_baseline_window_size(45); END;`

    `*`

    `ERROR at line 1:`

    `ORA-13541: system moving window baseline size (3888000) greater than retention`

    `(2592000)`

    `ORA-06512: at "SYS.DBMS_WORKLOAD_REPOSITORY", line 686`

    `ORA-06512: at line 1`


    If you set your AWR retention to an unlimited value, there still is an upper bound
    to the moving baseline retention period, and you could receive the following error
    if you set your moving baseline retention period too high, and your AWR retention
    period is set to unlimited:


    `exec dbms_workload_repository.modify_baseline_window_size(92);`

    `BEGIN dbms_workload_repository.modify_baseline_window_size(92); END;`

    `*`

    `ERROR at line 1:`

    `ORA-13539: invalid input for modify baseline window size (window_size, 92)`

    `ORA-06512: at "SYS.DBMS_WORKLOAD_REPOSITORY", line 686`

    `ORA-06512: at line 1`


    For fixed baselines, the AWR retention isn''t a factor, and is a consideration
    only based on how far back in time you want to compare a snapshot to your baseline.
    After you have set up any baselines, you can get information on baselines from
    the data dictionary. To get information on the baselines in your database, you
    can use a query such as the following one, which would show you any fixed baselines
    you have configured, as well as the automatically configured moving baseline:


    `  SELECT baseline_name, start_snap_id start_id,`

    `         TO_CHAR(start_snap_time, ''yyyy-mm-dd:hh24:mi'') start_time,`

    `         end_snap_id end_id,`

    `         TO_CHAR(end_snap_time, ''yyyy-mm-dd:hh24:mi'') end_time,`

    `         expiration`

    `  FROM dba_hist_baseline`

    `  ORDER BY baseline_id;`


    `BASELINE_NAME          START_ID START_TIME           END_ID END_TIME         EXPIRATION`

    `-------------------- ---------- ---------------- ---------- ----------------
    ----------`

    `SYSTEM_MOVING_WINDOW        255 2011-05-27:22:00        358 2011-06-08:22:00`

    `Batch Baseline #1           258 2011-05-28:13:39        268 2011-05-29:00:00      30`


    From the foregoing results, the moving baseline includes the entire range of snapshots
    based on the AWR retention period; therefore the expiration is shown as `NULL`.
    You can get similar information by using the `SELECT_BASELINE_DETAILS` function
    of the `DBMS_WORKLOAD_REPOSITORY` package. You do need the `baseline_id` number
    to pass into the function to get the desired results:


    `SELECT start_snap_id, start_snap_time, end_snap_id, end_snap_time,`

    `       pct_total_time pct  FROM (SELECT * FROM`

    `       TABLE(DBMS_WORKLOAD_REPOSITORY.select_baseline_details(12)));`


    `START_SNAP_ID START_SNAP_TIME           END_SNAP_ID END_SNAP_TIME                 PCT`

    `------------- ------------------------- ----------- -------------------------
    ----------`

    `          258 28-MAY-11 01.39.19.296 PM         268 29-MAY-11 12.00.45.211 AM     100`


    To get more specific information on the moving baseline in the database, you are
    drilling down into the statistics for the adaptive metrics. For instance, to see
    an average and maximum for each metric related to *reads* based on the moving
    window, you could use the following query:


    `column metric_name format a50`

    `SELECT metric_name, average, maximum FROM`

    `(SELECT * FROM TABLE`

    `(DBMS_WORKLOAD_REPOSITORY.select_baseline_metric(''SYSTEM_MOVING_WINDOW'')))`

    `where lower(metric_name) like ''%read%''`

    `order by metric_name;`


    `METRIC_NAME                                           AVERAGE    MAXIMUM`

    `-------------------------------------------------- ---------- ----------`

    `Average Synchronous Single-Block Read Latency      .159658155 53.8876404`

    `Consistent Read Changes Per Sec                    2.99232446 3984.11246`

    `Consistent Read Changes Per Txn                    117.812978     239485`

    `Consistent Read Gets Per Sec                       202.570936  64677.436`

    `Consistent Read Gets Per Txn                       3930.41373 372602.889`

    `Logical Reads Per Sec                              224.984307 64690.6884`

    `Logical Reads Per Txn                              4512.34119     840030`

    `Logical Reads Per User Call                        276.745756     135804`

    `Physical Read Bytes Per Sec                        1249601.48  528672777`

    `Physical Read IO Requests Per Sec                  6.44664078 2040.73828`

    `Physical Read Total Bytes Per Sec                  1272159.18  528699475`

    `Physical Read Total IO Requests Per Sec            7.82238122 2042.31792`

    `Physical Reads Direct Lobs Per Sec                 .006030572  4.6953047`

    `Physical Reads Direct Lobs Per Txn                 .231642268        141`

    `Physical Reads Direct Per Sec                      59.3280451 64535.1513`

    `Physical Reads Direct Per Txn                      602.336945 371825.222`

    `Physical Reads Per Sec                             152.539244 64535.2511`

    `Physical Reads Per Txn                             2966.04803 371831.889`


    ### 4-7. Managing AWR Baselines via Enterprise Manager


    #### Problem


    You want to create and manage AWR baselines using Enterprise Manager.


    #### Solution


    Using Enterprise Manager, you can easily configure or modify baselines. In [Figure
    4-3](#Chapter04.html#fig_4_3), you can see the window where you can establish
    or modify your existing baselines, including any fixed baselines, as well as the
    system moving baseline. To create a new fixed baseline, you would click the Create
    button, which would navigate you to the screen shown in [Figure 4-4](#Chapter04.html#fig_4_4),
    where you can configure your new fixed baseline. Within this screen, you name
    your baseline, and choose between a snapshot-based or time-based baseline.


    ![images](images/0403.jpg)


    ***Figure 4-3.** Managing baselines within Enterprise Manager*


    ![images](images/0404.jpg)


    ***Figure 4-4.** Creating new fixed baseline within Enterprise Manager*


    When deciding to modify your existing baselines, the screen options differ between
    modifying fixed baselines, and modifying the system moving baseline. [Figure 4-5](#Chapter04.html#fig_4_5)
    shows the modifiable options for a fixed baseline. As you can see, the only real
    modification that can be made is the actual baseline name itself. [Figure 4-6](#Chapter04.html#fig_4_6)
    shows how to change the moving baseline window within Enterprise Manager. As mentioned
    before, the actual screens may differ between versions of the Enterprise Manager
    tool.


    ![images](images/0405.jpg)


    ***Figure 4-5.** Modifying a fixed baseline within Enterprise Manager*


    ![images](images/0406.jpg)


    ***Figure 4-6.** Modifying the moving baseline within Enterprise Manager*'
  trans: "\n# 工作原理\n\n设置 AWR 保留期可能是使用移动基线时最重要的配置事项，因为所有自适应阈值指标都基于整个保留期的信息。在为移动基线设置保留期时，请再次记住它不能超过\
    \ AWR 保留期，否则可能会收到以下错误：\n\n```sql\nSQL> exec dbms_workload_repository.modify_baseline_window_size(45);\n\
    BEGIN dbms_workload_repository.modify_baseline_window_size(45); END;\n*\nERROR\
    \ at line 1:\nORA-13541: system moving window baseline size (3888000) greater\
    \ than retention\n(2592000)\nORA-06512: at \"SYS.DBMS_WORKLOAD_REPOSITORY\", line\
    \ 686\nORA-06512: at line 1\n```\n\n如果你将 AWR 保留期设置为无限制值，移动基线保留期仍然有一个上限，如果你设置的移动基线保留期过高，并且\
    \ AWR 保留期被设置为无限制，你可能会收到以下错误：\n\n```sql\nexec dbms_workload_repository.modify_baseline_window_size(92);\n\
    BEGIN dbms_workload_repository.modify_baseline_window_size(92); END;\n*\nERROR\
    \ at line 1:\nORA-13539: invalid input for modify baseline window size (window_size,\
    \ 92)\nORA-06512: at \"SYS.DBMS_WORKLOAD_REPOSITORY\", line 686\nORA-06512: at\
    \ line 1\n```\n\n对于固定基线，AWR 保留期不是决定因素，它仅仅基于你希望将快照与基线进行对比的时间跨度来考虑。设置任何基线后，你可以从数据字典中获取有关基线的信息。要获取数据库中基线的信息，你可以使用如下查询，该查询将显示你已配置的任何固定基线，以及自动配置的移动基线：\n\
    \n```sql\n  SELECT baseline_name, start_snap_id start_id,\n         TO_CHAR(start_snap_time,\
    \ 'yyyy-mm-dd:hh24:mi') start_time,\n         end_snap_id end_id,\n         TO_CHAR(end_snap_time,\
    \ 'yyyy-mm-dd:hh24:mi') end_time,\n         expiration\n  FROM dba_hist_baseline\n\
    \  ORDER BY baseline_id;\n```\n\n```\nBASELINE_NAME          START_ID START_TIME\
    \           END_ID END_TIME          EXPIRATION\n-------------------- ----------\
    \ ---------------- ---------- ---------------- ----------\nSYSTEM_MOVING_WINDOW\
    \        255 2011-05-27:22:00        358 2011-06-08:22:00\nBatch Baseline #1 \
    \          258 2011-05-28:13:39        268 2011-05-29:00:00       30\n```\n\n\
    从上述结果来看，移动基线包含了基于 AWR 保留期的整个快照范围；因此其过期时间显示为`NULL`。你可以通过使用`DBMS_WORKLOAD_REPOSITORY`包的`SELECT_BASELINE_DETAILS`函数获取类似信息。你需要提供`baseline_id`编号传入函数以获得所需结果：\n\
    \n```sql\nSELECT start_snap_id, start_snap_time, end_snap_id, end_snap_time,\n\
    \       pct_total_time pct  FROM (SELECT * FROM\n       TABLE(DBMS_WORKLOAD_REPOSITORY.select_baseline_details(12)));\n\
    ```\n\n```\nSTART_SNAP_ID START_SNAP_TIME           END_SNAP_ID END_SNAP_TIME\
    \                    PCT\n------------- ------------------------- -----------\
    \ ------------------------- ----------\n           258 28-MAY-11 01.39.19.296\
    \ PM         268 29-MAY-11 12.00.45.211 AM     100\n```\n\n要获取数据库中关于移动基线的更具体信息，你需要深入研究自适应指标的统计信息。例如，要查看基于移动窗口的每个与“读取”相关的指标的平均值和最大值，你可以使用以下查询：\n\
    \n```sql\ncolumn metric_name format a50\nSELECT metric_name, average, maximum\
    \ FROM\n(SELECT * FROM TABLE\n(DBMS_WORKLOAD_REPOSITORY.select_baseline_metric('SYSTEM_MOVING_WINDOW')))\n\
    where lower(metric_name) like '%read%'\norder by metric_name;\n```\n\n```\nMETRIC_NAME\
    \                                             AVERAGE    MAXIMUM\n--------------------------------------------------\
    \ ---------- ----------\nAverage Synchronous Single-Block Read Latency      .159658155\
    \ 53.8876404\nConsistent Read Changes Per Sec                    2.99232446 3984.11246\n\
    Consistent Read Changes Per Txn                    117.812978      239485\nConsistent\
    \ Read Gets Per Sec                       202.570936  64677.436\nConsistent Read\
    \ Gets Per Txn                       3930.41373 372602.889\nLogical Reads Per\
    \ Sec                              224.984307 64690.6884\nLogical Reads Per Txn\
    \                              4512.34119      840030\nLogical Reads Per User\
    \ Call                        276.745756      135804\nPhysical Read Bytes Per\
    \ Sec                        1249601.48 528672777\nPhysical Read IO Requests Per\
    \ Sec                  6.44664078 2040.73828\nPhysical Read Total Bytes Per Sec\
    \                  1272159.18 528699475\nPhysical Read Total IO Requests Per Sec\
    \            7.82238122 2042.31792\nPhysical Reads Direct Lobs Per Sec       \
    \          .006030572  4.6953047\nPhysical Reads Direct Lobs Per Txn         \
    \        .231642268        141\nPhysical Reads Direct Per Sec                \
    \      59.3280451 64535.1513\nPhysical Reads Direct Per Txn                  \
    \    602.336945 371825.222\nPhysical Reads Per Sec                           \
    \  152.539244 64535.2511\nPhysical Reads Per Txn                             2966.04803\
    \ 371831.889\n```\n\n## 4-7. 通过企业管理器管理 AWR 基线\n\n### 问题\n\n你想使用企业管理器创建和管理 AWR\
    \ 基线。\n\n### 解决方案\n\n使用企业管理器，你可以轻松配置或修改基线。在图 4-3 中，你可以看到用于建立或修改现有基线（包括任何固定基线以及系统移动基线）的窗口。要创建一个新的固定基线，你可以点击`Create`（创建）按钮，这将导航到如图\
    \ 4-4 所示的屏幕，在那里你可以配置新的固定基线。在此屏幕中，你为基线命名，并在基于快照或基于时间的基线之间进行选择。\n\n![images](img/0403.jpg)\n\
    \n图 4-3. 在企业管理器中管理基线\n\n![images](img/0404.jpg)\n\n图 4-4. 在企业管理器中创建新的固定基线\n\n\
    当决定修改现有基线时，屏幕选项在修改固定基线和修改系统移动基线之间有所不同。图 4-5 显示了固定基线的可修改选项。如你所见，唯一可以实际修改的是基线名称本身。图\
    \ 4-6 展示了如何在企业管理器中更改移动基线窗口。如前所述，实际屏幕可能因企业管理器工具的版本而异。\n\n![images](img/0405.jpg)\n\
    \n图 4-5. 在企业管理器中修改固定基线\n\n![images](img/0406.jpg)\n\n图 4-6. 在企业管理器中修改移动基线\n"
- fmt: "#### How It Works\n\n对于任何创建的固定基线或系统移动基线，您还可以简单地基于特定基线生成AWR报告。[图4-1](#Chapter04.html#fig_4_1)展示了如何点击\
    \ By Snapshot 按钮生成基于快照的AWR报告。使用同一屏幕，您也可以通过点击 By Baseline 按钮为基线生成AWR报告。\n\n如果您想在Enterprise\
    \ Manager中删除基线，只需选中要删除基线的单选按钮，然后点击 Delete 按钮，如[图4-7](#Chapter04.html#fig_4_7)所示。[图4-8](#Chapter04.html#fig_4_8)展示了实际删除基线的操作。您可以通过选择相应的单选按钮来决定保留或清除基线数据。\n\
    \n![images](images/0407.jpg)\n\n**图4-7. 选择要删除的基线**\n\n![images](images/0408.jpg)\n\
    \n**图4-8. 删除基线**\n\n![images](images/square.jpg) **注意**  您无法删除系统移动基线。\n\n### 4-8.\
    \ 管理 AWR 统计信息存储库\n\n#### 问题\n\n您的数据库中已存在AWR快照和基线，需要对您的AWR信息执行定期维护活动。\n\n#### 解决方案\n\
    \n通过使用 `DBMS_WORKLOAD_REPOSITORY` 包，您可以执行对基线的大部分维护操作，包括：\n\n*   重命名基线\n*   删除基线\n\
    *   删除快照范围\n\n要重命名基线，请使用 `DBMS_WORKLOAD_REPOSITORY` 包的 `RENAME_BASELINE` 过程：\n\
    \n```sql\nSQL>  exec dbms_workload_repository.rename_baseline -\n      ('Batch\
    \ Baseline #9','Batch Baseline #10');\n\nPL/SQL procedure successfully completed.\n\
    ```\n\n要删除基线，只需使用 `DROP_BASELINE` 过程：\n\n```sql\nSQL> exec dbms_workload_repository.drop_baseline('Batch\
    \ Baseline #1');\n\nPL/SQL procedure successfully completed.\n```\n\n如果您认为有些AWR快照不再需要，可以通过使用\
    \ `DROP_BASELINE` 过程删除快照范围来减少数据库中保存的AWR快照数量：\n\n```sql\nSQL>  exec dbms_workload_repository.drop_snapshot_range(255,256);\n\
    \nPL/SQL procedure successfully completed.\n```\n\n#### 工作原理\n\n除了 `DBMS_WORKLOAD_REPOSITORY`\
    \ 包，您还可以采取其他措施来分析AWR信息，以帮助管理数据库中的所有AWR信息，包括：\n\n*   从数据字典中查看AWR信息\n*   将AWR信息移动到另一个数据库位置的存储库中\n\
    \n如果您希望将整个数据库网格的AWR信息存储在单个数据库中，Oracle提供了可运行的脚本，用于根据快照范围从给定数据库提取AWR信息，然后将这些信息加载到不同的数据库。\n\
    \n要从数据库中提取给定快照范围的AWR信息，您需要运行 `awrextr.sql` 脚本。这是一个交互式脚本，会询问与使用 `awrrpt.sql` 脚本生成AWR报告时类似的信息。运行此脚本时需要回答以下问题：\n\
    \n1.  DBID（默认为当前数据库的DBID）\n2.  要显示以供提取的快照天数\n3.  要提取的起始快照号\n4.  要提取的结束快照号\n5.\
    \  用于存放包含指定快照范围所有AWR信息的结果输出文件的Oracle目录；目录必须以大写输入。\n6.  输出文件名（默认为 `awrdat` 加上快照范围编号）\n\
    \n请记住，此过程生成的输出文件会占用空间，其大小根据快照时活动的会话数而变化。每个需要提取的单个快照可能占用1 MB或更多的存储空间，因此请仔细评估所需的快照量。如有必要，如果目标目录空间不足，可以将提取过程分成几部分进行。\n\
    \n此外，对于生成的每个输出文件，还会生成一个小的输出日志文件，其中包含有关提取过程的信息，这有助于确定提取的信息是否与您认为已提取的信息相符。这是确保您提取了所需AWR信息的宝贵审计。\n\
    \n一旦您有了提取输出文件，您需要将它们（如果需要）传输到目标服务器位置，以加载到目标数据库位置。加载过程使用 `awrload.sql` 脚本完成。加载脚本所需的输入包括：\n\
    \n1.  用于存放包含指定快照范围所有AWR信息的结果输出文件的Oracle目录；目录必须以大写输入。\n2.  文件名（应与提取过程（即 `awrextr.sql`\
    \ 脚本）第6步中输入的名称相同；输入文件名时，请省略 `.dmp` 后缀，因为它会自动追加）。\n3.  目标模式（默认模式名为 `AWR_STAGE`）\n\
    4.  将创建对象的目标表空间（提供选项列表）\n5.  将创建对象的目标临时表空间（提供选项列表）\n\n数据加载完成后，AWR数据将移动到目标数据库数据字典表中的\
    \ `SYS` 模式。然后，临时目标模式（例如 `AWR_STAGE`）将被删除。\n\n为了生成从一个数据库加载到另一个数据库的AWR报告，请使用 `DBMS_WORKLOAD_REPOSITORY`\
    \ 包的 `AWR_REPORT_TEXT` 函数。例如，假设我们已将快照300到366加载并存储到我们的独立AWR数据库中。如果我们想为某个数据库生成快照365到366之间信息的AWR报告，我们将运行以下命令，并指定源数据库的DBID以及起始和结束快照号：\n\
    \n```sql\nSELECT  dbms_workload_repository.awr_report_text\n        (l_dbid=>2334201269,l_inst_num=>1,l_bid=>365,l_eid=>366)\n\
    FROM dual;\n```\n\n### 4-9. 自动创建 AWR 基线\n\n#### 问题\n\n您希望定期在数据库中自动创建基线。\n\n####\
    \ 解决方案\n\n您可以创建一个AWR重复模板，这使您能够根据预定义的间隔和时间范围自动创建基线。通过使用 `DBMS_WORKLOAD_REPOSITORY`\
    \ 包中的 `CREATE_BASELINE_TEMPLATE` 过程，您可以为这个重复的间隔和时间范围自动创建一个固定基线。参见以下示例来设置AWR模板：\n\
    \n```sql\nSQL> alter session set nls_date_format = 'yyyy-mm-dd:hh24:mi:ss';\n\n\
    SQL> exec DBMS_WORKLOAD_REPOSITORY.create_baseline_template( -\n>    day_of_week\
    \          => 'WEDNESDAY', -\n>    hour_in_day          => 0, -\n>    duration\
    \             => 6, -\n>    start_time           => '2011-06-14:00:00:00', -\n\
    >    end_time             => '2011-06-14:06:00:00', -\n>    baseline_name_prefix\
    \ => 'Batch Baseline ', -\n>    template_name        => 'Batch Template', -\n\
    >    expiration           => 365);\n\nPL/SQL procedure successfully completed.\n\
    ```\n\n对于上述模板，将基于每周三午夜到早上6点的时间窗口创建一个固定基线。在这种情况下，此模板为常规的批处理窗口时间框架创建基线。\n\n如果您使用的是Enterprise\
    \ Manager，可以使用相同的参数创建模板。示例请参见[图4-9](#Chapter04.html#fig_4_9)。\n\n![images](images/0409.jpg)\n\
    \n**图4-9. 创建AWR模板**"
  raw: '#### How It Works


    For any fixed baseline created or the system moving baseline, you can also simply
    generate an AWR report based on a particular baseline. [Figure 4-1](#Chapter04.html#fig_4_1)
    shows how to generate a snapshot-based AWR report by clicking the By Snapshot
    button. Using this same screen, you can also generate an AWR report for a baseline
    simply by clicking the By Baseline button.


    If you want to delete a baseline from within Enterprise Manager, simply click
    the radio button of the baseline you wish to delete, and then click the Delete
    button, as depicted in [Figure 4-7](#Chapter04.html#fig_4_7). [Figure 4-8](#Chapter04.html#fig_4_8)
    shows how to actually delete the baseline. You can choose to keep or purge the
    baseline data by clicking the appropriate radio button.


    ![images](images/0407.jpg)


    ***Figure 4-7.** Choosing a baseline to delete*


    ![images](images/0408.jpg)


    ***Figure 4-8.** Deleting a baseline*


    ![images](images/square.jpg) **Note** You cannot delete the system moving baseline.


    ### 4-8. Managing AWR Statistics Repository


    #### Problem


    You have AWR snapshots and baselines in place for your database, and need to perform
    regular maintenance activities for your AWR information.


    #### Solution


    By using the `DBMS_WORKLOAD_REPOSITORY` package, you can perform most maintenance
    on your baselines, including the following:


    *   Renaming a baseline

    *   Dropping a baseline

    *   Dropping a snapshot range


    To rename a baseline, use the `RENAME_BASELINE` procedure of the `DBMS_WORKLOAD_REPOSITORY`
    package:


    `SQL>  exec dbms_workload_repository.rename_baseline -`

    `      (''Batch Baseline #9'',''Batch Baseline #10'');`


    `PL/SQL procedure successfully completed.`


    To drop a baseline, simply use the `DROP_BASELINE` procedure:


    `SQL> exec dbms_workload_repository.drop_baseline(''Batch Baseline #1'');`


    `PL/SQL procedure successfully completed.`


    If you have decided you have AWR snapshots you no longer need, you can reduce
    the number of AWR snapshots held within your database by dropping a range of snapshots
    using the `DROP_BASELINE` procedure:


    `SQL>  exec dbms_workload_repository.drop_snapshot_range(255,256);`


    `PL/SQL procedure successfully completed.`


    #### How It Works


    In addition to the `DBMS_WORKLOAD_REPOSITORY` package, there are other things
    you can do to analyze your AWR information in order to help manage all of the
    AWR information in your database, including the following:


    *   Viewing AWR information from the data dictionary

    *   Moving AWR information to a repository in another database location


    If you wanted to store AWR  information for an entire grid of databases in a single
    database, Oracle provides scripts that can be run in order to extract AWR information
    from a given database, based on a snapshot range, and in turn, load that information
    into a different database.


    To extract a given snapshot range of AWR information from your database, you need
    to run the `awrextr.sql` script. This script is an interactive script, and asks
    for the same kind of information as when you generate an AWR report using the
    `awrrpt.sql` script. You need to answer the following questions when running this
    script:


    1.  DBID (defaults to DBID of current database)

    2.  Number of days of snapshots to display for extraction

    3.  The beginning snapshot number to extract

    4.  The ending snapshot number to extract

    5.  Oracle directory in which to place the resulting output file holding all the
    AWR information for the specified snapshot range; the directory must be entered
    in upper case.

    6.  Output file name (defaults to `awrdat` plus snapshot range numbers)


    Keep in mind that the output file generated by this process does take up space,
    which can vary based on the number of sessions active at snapshot time. Each individual
    snapshot needed for extraction can take up 1 MB or more of storage, so carefully
    gauge the amount of snapshots needed. If necessary, you can break the extraction
    process into pieces if there is inadequate space on a given target directory.


    In addition, for each output file generated, a small output log file is also generated,
    with information about the extraction process, which can be useful in determining
    if the information extracted matches what you think has been extracted. This is
    a valuable audit to ensure you have extracted the AWR information you need.


    Once you have the extract output file(s), you need to transport them (if necessary)
    to the target server location for loading into the target database location. The
    load process is done using the `awrload.sql` script. What is needed for input
    into the load script includes the following:


    1.  Oracle directory in which to place the resulting output file holding all the
    AWR information for the specified snapshot range; the directory must be entered
    in upper case.

    2.  File name (would be the same name as entered in number 6 of the extraction
    process (for the `awrextr.sql` script); when entering the file name, exclude the
    `.dmp` suffix, as it will be appended automatically.

    3.  Target schema (default schema name is `AWR_STAGE`)

    4.  Target tablespace for object that will be created (provides list of choices)

    5.  Target temporary tablespace for object that will be created (provides list
    of choices)


    After the load of the data is complete, the AWR data is moved to the SYS schema
    in the data dictionary tables within the target database. The temporary target
    schema (for example, `AWR_STAGE`) is then dropped.


    In order to generate an AWR report generated from one database that is then loaded
    into a different  database, use the `AWR_REPORT_TEXT` function of the `DBMS_WORKLOAD_REPOSITORY`
    package. For example, let''s say we loaded and stored snapshots 300 through 366
    into our separate AWR  database. If we wanted to generate an AWR report for the
    information generated between snapshots 365 and 366 for a given database, we would
    run the following command, with the DBID of the originating, source database,
    as well as the beginning and ending snapshot numbers as follows:


    `SELECT  dbms_workload_repository.awr_report_text`

    `        (l_dbid=>2334201269,l_inst_num=>1,l_bid=>365,l_eid=>366)`

    `FROM dual;`


    ### 4-9. Creating AWR Baselines Automatically


    #### Problem


    You want to periodically create baselines in your database automatically.


    #### Solution


    You can create an AWR repeating template, which gives you the ability to have
    baselines created automatically based on a predefined interval and time frame.
    By using the `CREATE_BASELINE_TEMPLATE` procedure within the `DBMS_WORKLOAD_REPOSITORY`
    package, you can have a fixed baseline automatically created for this repeating
    interval and time frame. See the following example to set up an AWR template:


    `SQL> alter session set nls_date_format = ''yyyy-mm-dd:hh24:mi:ss'';`


    `SQL> exec DBMS_WORKLOAD_REPOSITORY.create_baseline_template( -`

    `>    day_of_week          => ''WEDNESDAY'', -`

    `>    hour_in_day          => 0, -`

    `>    duration             => 6, -`

    `>    start_time           => ''2011-06-14:00:00:00'', -`

    `>    end_time             => ''2011-06-14:06:00:00'', -`

    `>    baseline_name_prefix => ''Batch Baseline '', -`

    `>    template_name        => ''Batch Template'', -`

    `>    expiration           => 365);`


    `PL/SQL procedure successfully completed.`


    For the foregoing template, a fixed baseline will be created based on the midnight
    to 6 a.m. window every Wednesday. In this case, this template creates baselines
    for a normal batch window time frame.


    If you are using Enterprise Manager, you can create a template using the same
    parameters. See [Figure 4-9](#Chapter04.html#fig_4_9) for an example.


    ![images](images/0409.jpg)


    ***Figure 4-9.** Creating an AWR template*'
  trans: "\n#### 工作原理\n\n对于任何创建的固定基线或系统移动基线，您还可以简单地基于特定基线生成 AWR 报告。图 4-1 展示了如何点击 **按快照**\
    \ 按钮生成基于快照的 AWR 报告。使用同一屏幕，您也可以通过点击 **按基线** 按钮为基线生成 AWR 报告。\n\n如果您想在 Enterprise\
    \ Manager 中删除基线，只需选中要删除基线的单选按钮，然后点击 **删除** 按钮，如图 4-7 所示。图 4-8 展示了实际删除基线的操作。您可以通过选择相应的单选按钮来决定保留或清除基线数据。\n\
    \n![images](img/0407.jpg)\n\n**图 4-7. 选择要删除的基线**\n\n![images](img/0408.jpg)\n\n\
    **图 4-8. 删除基线**\n\n![images](img/square.jpg) **注意**  您无法删除系统移动基线。\n\n### 4-8.\
    \ 管理 AWR 统计信息存储库\n\n#### 问题\n\n您的数据库中已存在 AWR 快照和基线，需要对您的 AWR 信息执行定期维护活动。\n\n####\
    \ 解决方案\n\n通过使用 `DBMS_WORKLOAD_REPOSITORY` 包，您可以执行对基线的大部分维护操作，包括：\n\n*   重命名基线\n\
    *   删除基线\n*   删除快照范围\n\n要重命名基线，请使用 `DBMS_WORKLOAD_REPOSITORY` 包的 `RENAME_BASELINE`\
    \ 过程：\n\n```sql\nSQL>  exec dbms_workload_repository.rename_baseline -\n     \
    \ ('Batch Baseline #9','Batch Baseline #10');\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n要删除基线，只需使用 `DROP_BASELINE` 过程：\n\n```sql\nSQL> exec dbms_workload_repository.drop_baseline('Batch\
    \ Baseline #1');\n\nPL/SQL procedure successfully completed.\n```\n\n如果您认为有些 AWR\
    \ 快照不再需要，可以通过使用 `DROP_BASELINE` 过程删除快照范围来减少数据库中保存的 AWR 快照数量：\n\n```sql\nSQL> \
    \ exec dbms_workload_repository.drop_snapshot_range(255,256);\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\n#### 工作原理\n\n除了 `DBMS_WORKLOAD_REPOSITORY` 包，您还可以采取其他措施来分析\
    \ AWR 信息，以帮助管理数据库中的所有 AWR 信息，包括：\n\n*   从数据字典中查看 AWR 信息\n*   将 AWR 信息移动到另一个数据库位置的存储库中\n\
    \n如果您希望将整个数据库网格的 AWR 信息存储在单个数据库中，Oracle 提供了可运行的脚本，用于根据快照范围从给定数据库提取 AWR 信息，然后将这些信息加载到不同的数据库。\n\
    \n要从数据库中提取给定快照范围的 AWR 信息，您需要运行 `awrextr.sql` 脚本。这是一个交互式脚本，会询问与使用 `awrrpt.sql`\
    \ 脚本生成 AWR 报告时类似的信息。运行此脚本时需要回答以下问题：\n\n1.  DBID（默认为当前数据库的 DBID）\n2.  要显示以供提取的快照天数\n\
    3.  要提取的起始快照号\n4.  要提取的结束快照号\n5.  用于存放包含指定快照范围所有 AWR 信息的结果输出文件的 Oracle 目录；目录必须以大写输入。\n\
    6.  输出文件名（默认为 `awrdat` 加上快照范围编号）\n\n请记住，此过程生成的输出文件会占用空间，其大小根据快照时活动的会话数而变化。每个需要提取的单个快照可能占用\
    \ 1 MB 或更多的存储空间，因此请仔细评估所需的快照量。如有必要，如果目标目录空间不足，可以将提取过程分成几部分进行。\n\n此外，对于生成的每个输出文件，还会生成一个小的输出日志文件，其中包含有关提取过程的信息，这有助于确定提取的信息是否与您认为已提取的信息相符。这是确保您提取了所需\
    \ AWR 信息的宝贵审计。\n\n一旦您有了提取输出文件，您需要将它们（如果需要）传输到目标服务器位置，以加载到目标数据库位置。加载过程使用 `awrload.sql`\
    \ 脚本完成。加载脚本所需的输入包括：\n\n1.  用于存放包含指定快照范围所有 AWR 信息的结果输出文件的 Oracle 目录；目录必须以大写输入。\n\
    2.  文件名（应与提取过程（即 `awrextr.sql` 脚本）第 6 步中输入的名称相同；输入文件名时，请省略 `.dmp` 后缀，因为它会自动追加）。\n\
    3.  目标模式（默认模式名为 `AWR_STAGE`）\n4.  将创建对象的目标表空间（提供选项列表）\n5.  将创建对象的目标临时表空间（提供选项列表）\n\
    \n数据加载完成后，AWR 数据将移动到目标数据库数据字典表中的 `SYS` 模式。然后，临时目标模式（例如 `AWR_STAGE`）将被删除。\n\n为了生成从一个数据库加载到另一个数据库的\
    \ AWR 报告，请使用 `DBMS_WORKLOAD_REPOSITORY` 包的 `AWR_REPORT_TEXT` 函数。例如，假设我们已将快照 300\
    \ 到 366 加载并存储到我们的独立 AWR 数据库中。如果我们想为某个数据库生成快照 365 到 366 之间信息的 AWR 报告，我们将运行以下命令，并指定源数据库的\
    \ DBID 以及起始和结束快照号：\n\n```sql\nSELECT  dbms_workload_repository.awr_report_text\n\
    \        (l_dbid=>2334201269,l_inst_num=>1,l_bid=>365,l_eid=>366)\nFROM dual;\n\
    ```\n\n### 4-9. 自动创建 AWR 基线\n\n#### 问题\n\n您希望定期在数据库中自动创建基线。\n\n#### 解决方案\n\n您可以创建一个\
    \ AWR 重复模板，这使您能够根据预定义的间隔和时间范围自动创建基线。通过使用 `DBMS_WORKLOAD_REPOSITORY` 包中的 `CREATE_BASELINE_TEMPLATE`\
    \ 过程，您可以为这个重复的间隔和时间范围自动创建一个固定基线。参见以下示例来设置 AWR 模板：\n\n```sql\nSQL> alter session\
    \ set nls_date_format = 'yyyy-mm-dd:hh24:mi:ss';\n\nSQL> exec DBMS_WORKLOAD_REPOSITORY.create_baseline_template(\
    \ -\n>    day_of_week          => 'WEDNESDAY', -\n>    hour_in_day          =>\
    \ 0, -\n>    duration             => 6, -\n>    start_time           => '2011-06-14:00:00:00',\
    \ -\n>    end_time             => '2011-06-14:06:00:00', -\n>    baseline_name_prefix\
    \ => 'Batch Baseline ', -\n>    template_name        => 'Batch Template', -\n\
    >    expiration           => 365);\n\nPL/SQL procedure successfully completed.\n\
    ```\n\n对于上述模板，将基于每周三午夜到早上 6 点的时间窗口创建一个固定基线。在这种情况下，此模板为常规的批处理窗口时间框架创建基线。\n\n如果您使用的是\
    \ Enterprise Manager，可以使用相同的参数创建模板。示例请参见图 4-9。\n\n![images](img/0409.jpg)\n\n\
    **图 4-9. 创建 AWR 模板**\n"
- fmt: "#### How It Works\n\nIf you need to drop your template, you simply use the\
    \ `DROP_BASELINE_TEMPLATE` procedure from the `DBMS_WORKLOAD_REPOSITORY` package.\
    \ See the following example:\n\n```sql\nSQL> exec dbms_workload_repository.drop_baseline_template('Batch\
    \ Template');\n\nPL/SQL procedure successfully completed.\n```\n\nIf you wish\
    \ to view information on any templates you have created, you can query the `DBA_HIST_BASELINE_TEMPLATE`\
    \ view. See the following sample query:\n\n```sql\ncolumn template_name format\
    \ a14\ncolumn prefix format a14\ncolumn hr format 99\ncolumn dur format 999\n\
    column exp format 999\n\nSELECT template_name, baseline_name_prefix prefix,\n\
    to_char(start_time,'mm/dd/yy:hh24') start_time,\nto_char(end_time,'mm/dd/yy:hh24')\
    \ end_time,\nsubstr(day_of_week,1,3) day, hour_in_day hr, duration dur, expiration\
    \ exp,\nto_char(last_generated,'mm/dd/yy:hh24') last\nFROM dba_hist_baseline_template;\n\
    \nTEMPLATE_NAME  PREFIX         START_TIME  END_TIME    DAY  HR  DUR  EXP LAST\n\
    -------------- -------------- ----------- ----------- --- --- ---- ---- -----------\n\
    Batch Template Batch Baseline 06/14/11:00 06/14/11:06 WED   0    6  365 06/14/11:00\n\
    ```\n\n### 4-10. Quickly Analyzing AWR Output\n\n#### Problem\n\nYou have generated\
    \ an AWR report, and want to quickly interpret key portions of the report to determine\
    \ if there are performance issues for your database.\n\n#### Solution\n\nThe AWR\
    \ report, like its predecessors Statspack and UTLBSTAT/UTLESTAT for earlier versions\
    \ of Oracle, has a multitude of statistics to help you determine how your database\
    \ is functioning and performing. There are many sections of the report. The first\
    \ three places on the report to gauge how your database is performing are as follows:\n\
    \n1.  DB Time\n2.  Instance Efficiency\n3.  Top 5 Timed Events\n\nThe first section\
    \ displayed on the report shows a summary of the snapshot window for your report,\
    \ as well as a brief look at the elapsed time, which represents the snapshot window,\
    \ and the DB time, which represents activity on your database. If the DB time\
    \ exceeds the elapsed time, it denotes a busy database. If it is a lot higher\
    \ than the elapsed time, it may mean that some sessions are waiting for resources.\
    \ While not specific, it can give you a quick view to see if your overall database\
    \ is busy and possibly overtaxed. We can see from the following example of this\
    \ section that this is a very busy database by comparing the elapsed time to the\
    \ DB time:\n\n```\n              Snap Id      Snap Time      Sessions Curs/Sess\n\
    \            --------- ------------------- -------- ---------\nBegin Snap:   \
    \  18033 11-Jun-11 00:00:43        59       2.3\n  End Snap:     18039 11-Jun-11\
    \ 06:00:22        69       2.4\n   Elapsed:              359.66 (mins)\n   DB\
    \ Time:            7,713.90 (mins)\n```\n\nThe instance efficiency section gives\
    \ you a very quick view to determine if things are running adequately on your\
    \ database. Generally, most percentages within this section should be above 90%.\
    \ The Parse CPU to Parse Elapsd metric shows how much time the CPU is spending\
    \ parsing SQL statements. The lower this metric is, the better. In the following\
    \ example, it is about 2%, which is very low. If this metric ever gets to 5%,\
    \ it may mean investigation is warranted to determine why the CPU is spending\
    \ this much time simply parsing SQL statements.\n\n```\nInstance Efficiency Percentages\
    \ (Target 100%)\n~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n            Buffer\
    \ Nowait %:   99.64       Redo NoWait %:   99.99\n            Buffer  Hit   %:\
    \   91.88    In-memory Sort %:   99.87\n            Library Hit   %:   98.92 \
    \       Soft Parse %:   94.30\n         Execute to Parse %:   93.70         Latch\
    \ Hit %:   99.89\nParse CPU to Parse Elapsd %:    2.10     % Non-Parse CPU:  \
    \ 99.75\n```\n\nThe third place to get a quick glance at your database performance\
    \ is the Top 5 Timed Events section. This section gives you a quick look at exactly\
    \ where the highest amount of resources are being consumed within your database\
    \ for the snapshot period. Based on these results, it may show you that there\
    \ is an inordinate amount of time spent performing full-table scans, or getting\
    \ data across a network database link. The following example shows that the highest\
    \ amount of resources is being used performing index scans (noted by `db file\
    \ sequential read`). We can see there is significant time on `local write wait`,\
    \ `enq: CF – contention`, and `free buffer waits`, which gives us a quick view\
    \ of what possible contention and wait events are for our database, and gives\
    \ us immediate direction for investigation and analysis.\n\n```\nTop 5 Timed Foreground\
    \ Events                              Avg\n~~~~~~~~~~~~~~~~~~~~~~~~~~~~~     \
    \                         wait   % DB\nEvent                                 Waits\
    \    Time (s)   (ms)   Time Wait Class\n------------------------------ ------------\
    \ ----------- ------ ------ ----------\ndb file sequential read           3,653,606\
    \      96,468     26   20.8   User I/O\nlocal write wait                     94,358\
    \      67,996    721   14.7   User I/O\nenq: CF - contention                 18,621\
    \      46,944   2521   10.1      Other\nfree buffer waits                 3,627,548\
    \      38,249     11    8.3 Configurat\ndb file scattered read            2,677,267\
    \      32,400     12    7.0   User I/O\n```\n\n#### How It Works\n\nAfter looking\
    \ at the DB Time, Instance Efficiency, and Top 5 Timed Events sections, if you\
    \ want to look in more detail at the sections of a given AWR report, refer to\
    \ Recipe 7-17 in [Chapter 7](#Chapter07.html#ch7) for more information. Because\
    \ the sheer volume of information in the AWR report is so daunting, it is strongly\
    \ recommended to create baselines that represent a normal processing window. Then,\
    \ AWR snapshots can be compared to the baselines, and metrics that may just look\
    \ like a number on a given AWR report will stand out when a particular metric\
    \ is significantly above or below a normal range.\n\n### 4-11. Manually Getting\
    \ Active Session Information\n\n#### Problem\n\nYou need to do performance analysis\
    \ on sessions that run too frequently or are too short to be available on available\
    \ AWR snapshots. The AWR snapshots are not taken often enough to capture the information\
    \ that you need."
