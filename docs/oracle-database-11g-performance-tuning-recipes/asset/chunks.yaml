    `--------------------------------------------------------------------------------`

    `Task Name        : F_REGS Advice`

    `Segment Name     : F_REGS`

    `Segment Type     : TABLE`

    `Partition Name   :`

    `Message          : Perform re-org on the object F_REGS, estimated savings is
    182`

    `09960 bytes.`

    `More Info        : Allocated Space:20971520: Used Space:2761560: Reclaimable
    Spa`

    `ce :18209960:`


    #### How It Works


    The `DBMS_ADVISOR` package is used to manually instruct the Segment Advisor to
    generate advice for specific tables. This package contains several procedures
    that perform operations such as creating and executing a task. [Table 1-6](#Chapter01.html#tab_1_6)
    lists the procedures relevant to the Segment Advisor.


    ![images](images/t0106.jpg)


    The Segment Advisor can be invoked with various degrees of granularity. For example,
    you can generate advice for all objects in a tablespace or advice for a specific
    table, index, or partition. [Table 1-7](#Chapter01.html#tab_1_7) lists the object
    types for which Segment Advisor advice can be obtained via the `DBMS_ADVISOR.CREATE_TASK`
    procedure.


    ![images](images/t0107.jpg)


    ![images](images/t0107a.jpg)


    You can also specify a maximum amount of time that you want the Segment Advisor
    to run. This is controlled via the `SET_TASK_PARAMETER` procedure. This procedure
    also controls the type of advice that is generated. [Table 1-8](#Chapter01.html#tab_1_8)
    describes valid inputs for this procedure.


    ![images](images/t0108.jpg)


    ### 1-10. Automatically E-mailing Segment Advisor Output


    #### Problem


    You realize that the Segment Advisor automatically generates advice and want to
    automatically e-mail yourself Segment Advisor output.


    #### Solution


    First encapsulate the SQL that displays the Segment Advisor output in a shell
    script—for example:


    `#!/bin/bash`

    `if [ $# -ne 1 ]; then`

    `  echo "Usage: $0 SID"`

    `  exit 1`

    `fi`

    `# source oracle OS variables`

    `. /var/opt/oracle/oraset $1`

    `#`

    `` BOX=`uname -a | awk ''{print$2}''` ``

    `#`

    `sqlplus -s <<EOF`

    `mv_maint/foo`

    `spo $HOME/bin/log/seg.txt`

    `set lines 80`

    `set pages 100`

    `SELECT`

    ` ''Segment Advice --------------------------''|| chr(10) ||`

    ` ''TABLESPACE_NAME  : '' || tablespace_name   || chr(10) ||`

    ` ''SEGMENT_OWNER    : '' || segment_owner     || chr(10) ||`

    ` ''SEGMENT_NAME     : '' || segment_name      || chr(10) ||`

    ` ''ALLOCATED_SPACE  : '' || allocated_space   || chr(10) ||`

    ` ''RECLAIMABLE_SPACE: '' || reclaimable_space || chr(10) ||`

    ` ''RECOMMENDATIONS  : '' || recommendations   || chr(10) ||`

    ` ''SOLUTION 1       : '' || c1                || chr(10) ||`

    ` ''SOLUTION 2       : '' || c2                || chr(10) ||`

    ` ''SOLUTION 3       : '' || c3 Advice`

    `FROM`

    `TABLE(dbms_space.asa_recommendations(''FALSE'', ''FALSE'', ''FALSE''));`

    `EOF`

    `cat $HOME/bin/log/seg.txt | mailx -s "Seg. rpt. on DB: $1 $BOX" dkuhn@oracle.com`

    `exit 0`


    The prior shell script can be regularly executed from a Linux/Unix utility such
    as `cron`. Here is a sample `cron` entry:


    `# Segment Advisor report`

    `16 11 * * * /orahome/oracle/bin/seg.bsh DWREP`


    In this way, you automatically receive segment advice and proactively resolve
    issues before they become performance problems.


    #### How It Works


    The Segment Advisor automatically generates advice on a regular basis. Sometimes
    it''s handy to proactively send yourself the recommendations. This allows you
    to periodically review the output and implement suggestions that make sense.


    The shell script in the “Solution” section contains a line near the top where
    the OS variables are established through running an `oraset` script. This is a
    custom script that is the equivalent of the `oraset` script provided by Oracle.
    You can use a script to set the OS variables or hard-code the required lines into
    the script. Calling a script to set the variables is more flexible and maintainable,
    as it allows you to use as input any database name that appears in the `oratab`
    file.


    ### 1-11. Rebuilding Rows Spanning Multiple Blocks'
  trans: "### 解决方案\n\n你可以手动运行段顾问，让其专门分析表空间中的所有段，或查看特定对象（如单个表或索引）。你可以通过执行以下步骤，使用 `DBMS_ADVISOR`\
    \ 包手动为特定段生成建议：\n\n1.  创建一个任务。\n2.  将对象分配给该任务。\n3.  设置任务参数。\n4.  执行任务。\n\n![images](img/square.jpg)\
