  trans: "\n# 工作原理\n\n自动诊断知识库是一个目录结构，即使数据库关闭，您也可以访问它，因为它存储在数据库之外。ADR 的根目录称为 **ADR\
    \ 基目录**，由 `DIAGNOSTIC_DEST` 初始化参数设置。每个 Oracle 产品或组件在 ADR 基目录下都有自己的 **ADR 主目录**。每个\
    \ ADR 主目录的位置遵循路径 `diag/产品类型/产品 ID/实例 ID`。因此，对于一个名为 `orcl1`、实例名称为 `orcl1` 且 ADR\
    \ 基目录设置为 `/app/oracle` 的数据库，其 ADR 主目录将是 `/app/oracle/diag/rdbms/orcl1/orcl1`。每个\
    \ ADR 主目录下都包含该 Oracle 产品实例的诊断数据，例如跟踪和转储文件、警报日志以及其他诊断文件。\n\nADRCI 实用程序可帮助您管理 ADR\
    \ 中的诊断数据。ADRCI 允许您执行以下类型的诊断任务：\n\n*   查看 ADR（自动诊断知识库）中的诊断数据：ADR 存储警报日志、转储文件、跟踪文件、健康检查报告等诊断数据。\n\
    *   查看健康检查报告：诊断基础结构会自动运行健康检查以捕获有关错误的详细信息，并将其添加到它为该错误收集的其他诊断数据中。您也可以手动调用健康检查。\n\
    *   将事件和问题信息打包以便传输给 Oracle 支持人员：**问题** 是指关键数据库错误，**事件** 是指特定问题的单次发生。事件包是您发送给 Oracle\
    \ 支持人员用于故障排除的诊断数据集合。ADRCI 提供特殊命令，使您能够创建包并生成压缩的诊断包以发送给 Oracle 支持人员。\n\n您可以通过查询\
    \ `V$DIAG_INFO` 视图来查看当前数据库实例的所有 ADR 位置，如下所示。\n\n```sql\nSQL> select * from v$diag_info;\n\
    \n   INST_ID           NAME                   VALUE\n-----------    ------------------\
    \     ----------------------------------------\n1              Diag Enabled  \
    \         TRUE\n1              ADR Base               c:\\app\\ora\n1        \
    \      ADR Home               c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\n1     \
    \         Diag Trace             c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\trace\n\
    1              Diag Alert             c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\\
    alert\n1              Diag Incident          c:\\app\\ora\\diag\\rdbms\\orcl1\\\
    orcl1\\incident\n1              Diag Cdump             c:\\app\\ora\\diag\\rdbms\\\
    orcl1\\orcl1\\cdump\n1              Health Monitor         c:\\app\\ora\\diag\\\
    rdbms\\orcl1\\orcl1\\hm\n1              Default Trace File     c:\\app\\ora…\\\
    trace\\orcl1_ora_6272.trc\n1              Active Problem Count        2\n1   \
    \           Active Incident Count       3\n\n11 rows selected.\n\nSQL>\n```\n\n\
    ADR 主目录是数据库诊断数据的根目录。所有诊断文件，如警报日志和各种跟踪文件，都位于 ADR 主目录下。ADR 主目录直接位于您使用 `DIAGNOSTIC_DEST`\
    \ 初始化参数指定的 ADR 基目录之下。以下是如何找出 ADR 基目录位置的方法：\n\n```\nadrci> show base\nADR base\
    \ is \"c:\\app\\ora\"\nadrci>\n```\n\n您可以通过执行以下命令查看 ADR 基目录下的所有 ADR 主目录：\n\n```\n\
    adrci> show homes\nADR Homes:\ndiag\\clients\\user_salapati\\host_3975876188_76\n\
    diag\\clients\\user_system\\host_3975876188_76\ndiag\\rdbms\\orcl1\\orcl1\ndiag\\\
    tnslsnr\\miropc61\\listener\nadrci>\n```\n\n您可以在 ADR 基目录下拥有多个 ADR 主目录，并且在任何给定时间可以有多个\
    \ ADR 主目录是当前的。您的 ADRCI 命令将仅在当前 ADR 主目录中的诊断数据上操作。如何知道在任何时间点哪个 ADR 主目录是当前的？ADRCI\
    \ 主路径通过指向 ADR 基目录目录层次结构下的 ADR 主目录来帮助确定当前的 ADR 主目录。\n\n![images](img/square.jpg)\
    \ **注意** 某些 ADRCI 命令只需要一个 ADR 主目录是当前的——如果有多个 ADR 主目录是当前的，这些命令将报错。\n\n您可以使用 `show\
    \ homes` 或 `show homepath` 命令来查看所有当前的 ADR 主目录：\n\n```\nadrci> show homepath\n\
    ADR Homes:\ndiag\\clients\\user_salapati\\host_3975876188_76\ndiag\\clients\\\
    user_system\\host_3975876188_76\ndiag\\rdbms\\orcl1\\orcl1\ndiag\\tnslsnr\\miropc61\\\
    listener\nadrci>\n```\n\n如果您想处理来自多个数据库实例或组件的诊断数据，必须确保所有相关的 ADR 主目录都是当前的。然而，大多数时候，您只会处理单个数据库实例或单个\
    \ Oracle 产品或组件，例如监听器。ADR 主路径总是相对于 ADR 的。例如，如果您将 `/u01/app/oracle/` 指定为 ADR 基目录的值，那么所有\
    \ ADR 主目录都将位于 `ADR_Base/diag` 目录下。使用 `set homepath` 命令将 ADR 主目录设置为单个主目录，如下所示：\n\
    \n```\nadrci> set homepath diag\\rdbms\\orcl1\\orcl1\n\nadrci> show homepath\n\
    \nADR Homes:\ndiag\\rdbms\\orcl1\\orcl1\nadrci>\n```\n\n![images](img/square.jpg)\
    \ **注意** 诊断数据包括事件和问题的描述、健康监控报告以及传统的诊断文件，如跟踪文件、转储文件和警报日志。\n\n请注意，在使用 `set homepath`\
    \ 命令设置主路径之前，`show homepath` 命令会显示所有 ADR 主路径。但是，一旦您将主路径设置为特定主目录，`show homepath`\
    \ 命令将仅显示该单个主路径。在执行多个 ADRCI 命令之前设置主路径非常重要，因为它们仅适用于单个 ADR 主目录。例如，如果在发出以下命令之前未设置主路径，您将收到错误：\n\
    \n```\nadrci> ips create package\nDIA-48448: This command does not support multiple\
    \ ADR homes\nadrci>\n```\n\n发生错误是因为 `ips create package` 命令在有多个 ADR 主目录时无效。在您使用\
    \ `set homepath` 命令将主路径设置为单个 ADR 主目录后，该命令将正常工作。像这里显示的命令这样的命令仅适用于单个当前 ADR 主目录，而其他命令则适用于多个当前\
    \ ADR 主目录——也有些命令不需要当前 ADR 主目录。最重要的是，所有 ADRCI 命令都将在单个当前 ADR 主目录上工作。\n\n### 7-10.\
    \ 从 ADRCI 查看警报日志\n\n#### 问题\n\n您想使用 ADRCI 命令查看警报日志。\n\n#### 解决方案\n\n要使用 ADRCI\
    \ 查看警报日志，请按照以下步骤操作：\n\n1.  调用 ADRCI。\n    `$ adrci`\n2.  使用 `set homepath` 命令设置\
    \ ADR 主目录。\n    `adrci> set homepath diag\\rdbms\\orcl1\\orcl1`\n3.  输入以下命令查看警报日志：\n\
    \    `adrci> show alert`\n\n    ```\n    ADR Home = c:\\app\\ora\\diag\\rdbms\\\
    orcl1\\orcl1:\n    *************************************************************************\n\
    \    Output the results to file: c:\\temp\\alert_10916_7048_orcl1_1.ado\n    ```\n\
    \n警报日志将在您的默认编辑器中弹出。一旦您在编辑器中关闭文本文件，ADRCI 提示符将返回。\n\n您也可以查询 `V$DIAG_INFO` 视图以找到与\
    \ Diag Trace 条目对应的路径。您可以切换到该目录并使用文本编辑器打开 `alert_<数据库名称>.log` 文件。\n"
- fmt: '### How It Works


    The alert log holds runtime information for an Oracle instance and provides information
    such as the initialization parameters the instance is using, as well as a record
    of key changes such as redo log file switches and, most importantly, messages
    that show Oracle errors and their details. The alert log is critical for troubleshooting
    purposes, and is usually the first place you''ll look when a problem occurs. Oracle
    provides the alert log as both a text file as well as an XML-formatted file.


    The `show alert` command brings up the XML-formatted alert log without displaying
    the XML tags. You can set the default editor with the `SET EDITOR` command, as
    shown here:


    `adrci> set editor notepad.exe`


    The previous command changes the default editor to Notepad. The `show alert -term`
    command shows the alert log contents in the terminal window. If you want to examine
    just the latest events in the alert log, issue the following command:


    `adrci>show alert -tail 50`


    The `tail` option shows you a set of the most recent lines from the alert log
    in the command window. In this example, it shows the last 50 lines from the alert
    log. If you don''t specify a value for the `tail` parameter, by default, it shows
    the last ten lines from the alert log.


    The following command shows a "live" alert log, in the sense that it will show
    changes to the alert log as the entries are added to the log.


    `adrci> show alert -tail -f`


    The previous command shows the last ten lines of the alert log and prints all
    new messages to the screen, thus offering a "live" display of ongoing additions
    to the alert log. The CTRL+C sequence will take you back to the ADRCI prompt.


    When troubleshooting, it is very useful to see if the database issued any `ORA-600`
    errors. You can issue the following command to trap the `ORA-600` errors.


    `adrci> show alert -p "MESSAGE_TEXT LIKE ''%ORA-600%''"`


    Although you can view the alert log directly by going to the file system location
    where it''s stored, it''s much easier to do so through the ADRCI tool. ADRCI is
    especially useful for working with the trace files of an instance. The `SHOW TRACEFILE`
    command shows all the trace files in the trace directory of the instance. You
    can issue the `SHOW TRACEFILE` command with various filters—the following example
    looks for trace files that reference the background process `mmon`:


    ```

    $ adrci> show tracefile %mmon%

         diag\rdbms\orcl1\orcl1\trace\orcl1_mmon_1792.trc

         diag\rdbms\orcl1\orcl1\trace\orcl1_mmon_2340.trc

    adrci>

    ```


    This command lists all trace files with the string `mmon` in their file names.
    You can apply filters to restrict the output to just the trace files associated
    with a specific incident number, as shown here:


    ```

    adrci> show tracefile -I 43417

              diag\rdbms\orcl1\orcl1\incident\incdir_43417\orcl1_ora_4276_i43417.trc

    adrci>

    ```


    The previous command lists the trace files related to the incident number 43417.


    ## 7-11. Viewing Incidents with ADRCI


    ### Problem


    You want to use ADRCI to view incidents.


    ### Solution


    You can view all incidents in the ADR with the `show incident` command (be sure
    to set the homepath first):


    ```

    $ adrci

    $ set homepath diag\rdbms\orcl1\orcl1


    adrci> show incident


    ADR Home = c:\app\ora\diag\rdbms\orcl1\orcl1:

    *******************************************************************************

    INCIDENT_ID          PROBLEM_KEY

     CREATE_TIME

    -------------------- -----------------------------------------------------------

     43417                ORA 600 [kkqctinvvm(2): Inconsistent state space!]

     2010-12-17 09:26:15.091000 -05:00

    43369                ORA 600 [kkqctinvvm(2): Inconsistent state space!]

     2010-12-17 11:08:40.589000 -05:00

    79451                ORA 445

     2011-03-04 03:00:39.246000 -05:00

    84243                ORA 445

     2011-03-14 19:12:27.434000 -04:00

    84244                ORA 445

     2011-03-20 16:55:54.501000 -04:00

     5 rows fetched

    ```


    You can specify the `detail` mode to view details about a specific incident, as
    shown here:


    ```

    adrci> show incident -mode detail -p "incident_id=43369"


    ADR Home = c:\app\ora\diag\rdbms\orcl1\orcl1:

    *******************************************************************************


    INCIDENT INFO RECORD 1

    *******************************************************************************

       INCIDENT_ID                   43369

       STATUS                        ready

       CREATE_TIME                   2010-12-17 11:08:40.589000 -05:00

       PROBLEM_ID                    1

       CLOSE_TIME                    <NULL>

       FLOOD_CONTROLLED              none

       ERROR_FACILITY                ORA

       ERROR_NUMBER                  600

       ERROR_ARG1                    kkqctinvvm(2): Inconsistent state space!

       SIGNALLING_COMPONENT          SQL_Transform

       PROBLEM_KEY                   ORA 600 [kkqctin: Inconsistent state space!]

       FIRST_INCIDENT                43417

       FIRSTINC_TIME                 2010-12-17 09:26:15.091000 -05:00

       LAST_INCIDENT                 43369

       LASTINC_TIME                  2010-12-17 11:08:40.589000 -05:00

       KEY_VALUE                     ORACLE.EXE.3760_3548

       KEY_NAME                      PQ

       KEY_NAME                      SID

       KEY_VALUE                     71.304

       OWNER_ID                      1

       INCIDENT_FILE                 c:\app\ora\diag\rdbms\orcl1\orcl1\trace\orcl1_ora_3548.trc


    adrci>

    ```


    ### How It Works


    The `show incident` command reports on all open incidents in the database. For
    each incident, the output for this command shows the problem key, incident ID,
    and the time when the incident occurred. In this example, we first set the ADRCI
    homepath, so the command shows incidents from just this ADR home. If you don''t
    set the homepath, you''ll see incidents from all the current ADR homes.


    As mentioned earlier, an incident is a single occurrence of a problem. A problem
    is a critical error such as an `ORA-600` (internal error) or an `ORA-07445` error
    relating to operating system exceptions. The problem key is a text string that
    shows the problem details. For example, the problem key `ORA 600 [kkqctinvvm(2):
    Inconsistent state space!]` shows that the problem is due to an internal error.


    When a problem occurs several times, the database creates an incident for each
    occurrence of the problem, each with a unique incident ID. The database logs the
    incident in the alert log and sends an alert to the Oracle Enterprise Manager,
    where they show up in the Home page. The database automatically gathers diagnostic
    data for the incident, called incident dumps, and stores them in the ADR trace
    directory.


    Since a critical error can potentially generate numerous identical incidents,
    the fault diagnosability infrastructure applies a "flood control" mechanism to
    limit the generation of incidents. For a given problem key, the database allows
    only 5 incidents within one hour and a maximum of 25 incidents in one day. Once
    a problem triggers incidents beyond these thresholds, the database merely logs
    the incidents in the alert log and the Oracle Enterprise Manager, but stops generating
    new incident dumps for them. You can''t alter the default threshold settings for
    the incident flood control mechanism.


    ## 7-12. Packaging Incidents for Oracle Support


    ### Problem


    You want to send the diagnostic files related to a specific problem to Oracle
    Support.'
