    > `AUTOSTATS_TARGET` 参数的默认值是 `AUTO`。请注意，目前 `ALL` 和 `AUTO`（默认）设置的工作方式相同。Oracle\
    \ 建议您将 `AUTOSTATS_TARGET` 首选项设置为值 `ORACLE`，以确保数据库收集最新的字典统计信息（针对 SYS 和 SYSTEM 拥有的对象）。\n\
    \n我们在本配方中融入了多个 Oracle 统计信息收集的最佳实践。除非有充分的理由不这样做，否则尽量坚持使用首选项的默认设置。请记住，如果您要创建新表，可以先加载数据并仅针对该表收集统计信息。然后再创建索引，因为数据库在索引创建时会自动计算索引的统计信息。\n\
    \n## 13-4. 手动生成统计信息"
- fmt: '#### Problem


    You''re trying to determine if you should let the database automatically collect
    the optimizer statistics, or if you must manually collect the statistics.


    #### Solution


    In most cases, the automatic statistics collection task is good enough to collect
    the optimizer statistics. In fact, there are many production databases that automate
    statistics collection as shown in Recipe 13-2 and never use a manual statistic
    collection process. However, there are cases where manual statistic collection
    may be necessary. Here are two cases when you must manually collect statistics.


    ##### Volatile Tables


    If your database contains volatile tables that experience numerous deletes (or
    even truncates) throughout the day, then an automatic stats collection job that
    runs during the nightly maintenance window isn''t adequate. There are a couple
    of strategies you can use in this type of situation, where a table''s data keeps
    fluctuating throughout the day:


    *   Collect the statistics when the table has the number of rows that represent
    its “typical” state. Once you do this, lock the statistics to prevent the automatic
    statistics collection job from collecting fresh statistics for this table during
    the nightly maintenance window.

    *   The other option is to make the statistics of the table null.


    You make the statistics of a table null by deleting the statistics first and then
    locking the table''s statistics right after that, as shown in the following example:


    ```

    SQL> execute dbms_stats.delete_table_stats(''OE'',''ORDERS'');


    PL/SQL procedure successfully completed.


    SQL> execute dbms_stats.lock_table_stats(''OE'',''ORDERS'');


    PL/SQL procedure successfully completed.


    SQL>

    ```


    ##### Bulk Loaded Tables


    For tables that you bulk load data into, you must collect statistics immediately
    after loading the data. If you don''t collect statistics right after bulk loading
    data into a table, the database can still use dynamic sampling to estimate the
    statistics, but these statistics aren''t as comprehensive as the statistics that
    you collect.


    #### How It Works


    Before Oracle introduced the automatic optimizer statistics collection feature
    in the Oracle Database 10g release, every DBA collected scripts using the recommended
    `DBMS_STATS` package (or even the older `analyze table` command). With automatic
    statistics collection, DBAs don''t have to collect optimizer statistics by scheduling
    `DBMS_STATS` jobs. However, you may still run into situations where automatic
    statistics collection isn''t appropriate. The “Solution” section describes two
    such cases, and how to handle them by manually collecting the statistics.


    You can manually collect statistics at the table, schema, or database level, by
    using the appropriate `DBMS_STATS.GATHER_*_STATS` procedure.


    When you''re manually gathering the optimizer statistics, it''s a good idea to
    stick with the default settings for the various parameters that control how the
    database collects the statistics. Often, performance of the statistics gathering
    job (how fast) and the quality of the statistics itself improve when you revert
    to the default settings. For example, many DBAs set too high a sample size with
    the `estimate_percent` parameter, rather than letting the database use the appropriate
    sample size based on the `DBMS_STATS.AUTO_SAMPLE_SIZE` constant.


    ### 13-5\. Locking Statistics


    #### Problem


    You want to lock the statistics for a table or a schema, to freeze the statistics.


    #### Solution


    You can lock a table or a schema''s statistics by executing the appropriate `DBMS_STATS.LOCK_*`
    procedures. For example, you can lock a table''s statistics with the `LOCK_TABLE_STATS`
    procedure in the `DBMS_STATS` package:


    ```

    SQL> execute dbms_stats.lock_table_stats(ownname=>''SH'',tabname=>''SALES'');


    PL/SQL procedure successfully completed.

    SQL>

    ```


    You can unlock the table''s statistics by executing the following procedure:


    ```

    SQL> execute dbms_stats.unlock_table_stats(ownname=>''SH'',tabname=>''SALES'');


    PL/SQL procedure successfully completed.


    SQL>

    ```


    You can lock a schema''s statistics with the `DBMS_STATS.LOCK_SCHEMA_STATS` procedure,
    as shown here:


    ```

    SQL> execute dbms_stats.lock_schema_stats(''SH'');


    PL/SQL procedure successfully completed.

    SQL>

    ```


    Unlock the statistics with the `UNLOCK_SCHEMA_STATS` procedure:


    ```

    SQL> execute dbms_stats.unlock_schema_stats(''SH'');


    PL/SQL procedure successfully completed.


    SQL>

    ```


    #### How It Works


    You may want to lock a table''s statistics to freeze the current set of statistics.
    You may also lock the statistics after you delete the existing statistics first—in
    this case, you are forcing the database to use dynamic sampling to estimate the
    table''s statistics. Deleting a table''s statistics and then locking the statistics
    is in effect the same as setting the statistics on a table to null. You have the
    option of setting the `force` argument with the `GATHER_TABLE__STATS` procedure
    to override a table''s lock on its statistics.


    ![images](images/square.jpg) **Note** Locking a table also locks all statistics
    that depend on that table, such as index, histogram and column statistics.


    ### 13-6\. Handling Missing Statistics


    #### Problem


    Certain tables in your database are missing statistics, because the tables have
    had data loaded into them outside the nightly batch window. You can''t collect
    statistics on the table during the day when the database is handling other workload.


    #### Solution


    Oracle uses dynamic sampling to compensate for missing statistics. The database
    will scan a random sample of data blocks in a table when you enable dynamic sampling.
    You enable/disable dynamic sampling in the database by setting the `optimizer_dynamic_sampling`
    initialization parameter. Dynamic sampling is enabled by default, as you can see
    from the following:


    ```

    SQL> sho parameter dynamic


    NAME                                  TYPE        VALUE

    ------------------------------------ ----------- -----

    optimizer_dynamic_sampling           integer     2

    SQL>

    ```


    The default level of dynamic sampling is 2—setting it to 0 disables dynamic sampling.
    You can modify the default value by setting a different sampling level as shown
    here:


    ```

    SQL> alter system set optimizer_dynamic_sampling=4 scope=both;

    System altered.


    SQL>

    ```'
