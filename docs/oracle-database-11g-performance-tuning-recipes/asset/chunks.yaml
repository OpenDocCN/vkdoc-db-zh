    If we want to use the `execute immediate` command more efficiently, we can convert
    that `execute immediate` command to use a bind variable with the `USING` clause,
    and specify a bind variable within the `execute immediate` statement. The result
    shows that the statement was parsed only one time:


    `BEGIN`

    `FOR i IN 100..206`

    `LOOP`

    `execute immediate ''UPDATE employees SET salary=salary*1.03 WHERE employee_id
    = :empno'' USING i;`

    `END LOOP;`

    `COMMIT;`

    `END;`

    `SQL ID : 4y09bqzjngvq4`

    `update employees set salary=salary*1.03`

    `where`

    ` employee_id = :empno`


    `call     count       cpu    elapsed       disk      query    current        rows`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    **`Parse`****`1`****`0.00`****`0.00`**`          0          `**`0`****`0`****`0`**

    **`Execute`****`107`****`0.01`****`0.01`****`0`****`107`****`112`****`107`**

    `Fetch        0      0.00       0.00          0          0          0           0`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `total      108      0.01       0.01          0        107        112         107`


    ![images](images/square.jpg) **Tip** Hard-parsing always occurs for DDL statements.


    ### 8-14. Avoiding Accidental Full Table Scans


    #### Problem


    You have queries that should be using indexes, but instead are doing full table
    scans. You want to avoid doing full table scans when the optimizer could be using
    an index to retrieve the data.


    #### Solution


    When constructing a SQL statement, a fundamental rule to try to always observe,
    if possible, is to avoid using functions on the left side of the comparison operator.
    A function essentially turns a column into a literal value, and therefore the
    Oracle optimizer does not recognize that converted value as a column any longer,
    but as a value instead.


    Here, we''re trying to get a list of all the employees that started since the
    year 1999\. Because we placed a function on the left side of the comparison operator,
    the optimizer is forced to do a full table scan, even though the `HIRE_DATE` column
    is indexed:


    `SELECT employee_id, salary, hire_date`

    `FROM employees`

    **`WHERE TO_CHAR(hire_date,''yyyy-mm-dd'') >= ''2000-01-01'';`**


    `---------------------------------------`

    `| Id  | Operation         | Name      |`

    `---------------------------------------`

    `|   0 | SELECT STATEMENT  |           |`

    `|   1 |  TABLE ACCESS FULL| EMPLOYEES |`

    `---------------------------------------`


    By moving the function to the right side of the comparison operator and leaving
    `HIRE_DATE` as a pristine column in the `WHERE` clause, the optimizer can now
    use the index on `HIRE_DATE`:


    `SELECT employee_id, salary, hire_date`

    `FROM employees`

    **`WHERE hire_date >= TO_DATE(''2000-01-01'',''yyyy-mm-dd'');`**


    `-------------------------------------------------`

    `| Id  | Operation                   | Name      |`

    `-------------------------------------------------`

    `|   0 | SELECT STATEMENT            |           |`

    `|   1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES |`

    `|   2 |   INDEX RANGE SCAN          | EMP_I5    |`

    `-------------------------------------------------`


    #### How It Works


    Functions are wonderful tools to convert a value or return the desired value based
    on what you need from the database, but they can be a performance killer if used
    incorrectly within a SQL statement. Make sure all functions are on the right side
    of the comparison operator, and the optimizer will be able to use any indexes
    on columns specified in the `WHERE` clause. This rule holds true for any function.
    In certain cases, it is possible Oracle will still use an index even if a function
    is on the left side of the comparison operator, but this is usually the exception.
    See Recipe 8-12 for an example of this.


    Keep in mind that the datatype for a given column in the `WHERE` clause may change
    how the SQL statement needs to be modified to move the function to the right side
    of the comparison operator. With the following example, we had to change the comparison
    operator in order to effectively move the function:


    `SELECT last_name, first_name`

    `FROM employees`

    **`WHERE SUBSTR(phone_number,1,3) = ''515'';`**


    `---------------------------------------`

    `| Id  | Operation         | Name      |`

    `---------------------------------------`

    `|   0 | SELECT STATEMENT  |           |`

    `|   1 |  TABLE ACCESS FULL| EMPLOYEES |`

    `---------------------------------------`


    In order to effectively get all numbers in the 515 area code, we can use a `BETWEEN`
    clause and capture all possible values. We can also use a `LIKE` clause, as long
    as the wildcard character is on the trailing end of the condition. By using either
    of these methods, the optimizer changed the execution plan to use an index:


    `SELECT last_name, first_name`

    `FROM employees`

    **`WHERE phone_number BETWEEN ''515.000.0000'' and ''515.999.9999'';`**


    `SELECT last_name, first_name`

    `FROM employees`

    **`WHERE phone_number LIKE''515%'';`**


    `-------------------------------------------------`

    `| Id  | Operation                   | Name      |`

    `-------------------------------------------------`

    `|   0 | SELECT STATEMENT            |           |`

    `|   1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES |`

    `|   2 |   INDEX RANGE SCAN          | EMP_I6    |`

    `-------------------------------------------------` ]


    ### 8-15. Creating Efficient Temporary Views


    #### Problem


    You need a table or a view of data that does not exist to construct a needed query,
    and do not have the authority to create such a table or view on your database.'
  trans: "\n## 绑定变量可与 EXECUTE IMMEDIATE 一起使用\n\n若要更高效地使用 `execute immediate` 命令，我们可以将其转换为使用带有\
    \ `USING` 子句的绑定变量，并在 `execute immediate` 语句中指定一个绑定变量。结果显示该语句仅被解析了一次：\n\n```\n\
    BEGIN\n  FOR i IN 100..206\n  LOOP\n    execute immediate 'UPDATE employees SET\
    \ salary=salary*1.03 WHERE employee_id = :empno' USING i;\n  END LOOP;\n  COMMIT;\n\
    END;\n```\n\n```\nSQL ID : 4y09bqzjngvq4\nupdate employees set salary=salary*1.03\n\
    where\n  employee_id = :empno\n```\n\n```\ncall     count       cpu    elapsed\
    \       disk      query    current        rows\n------- ------  -------- ----------\
    \ ---------- ---------- ----------  ----------\nParse        1      0.00     \
    \  0.00          0          0          0           0\nExecute    107      0.01\
    \       0.01          0        107        112         107\nFetch        0    \
    \  0.00       0.00          0          0          0           0\n------- ------\
    \  -------- ---------- ---------- ---------- ----------  ----------\ntotal   \
    \   108      0.01       0.01          0        107        112         107\n```\n\
    \n![images](img/square.jpg) **提示** 对于 DDL 语句，总是会发生硬解析。\n\n### 8-14. 避免意外的全表扫描\n\
    \n#### 问题\n\n你有一些查询本应使用索引，但却进行了全表扫描。你希望在优化器可以使用索引检索数据时，避免进行全表扫描。\n\n#### 解决方案\n\
    \n在构造 SQL 语句时，如果可能，应尽量遵循一条基本原则：避免在比较运算符的左侧使用函数。函数本质上是将列转换为字面值，因此 Oracle 优化器不再将该转换后的值识别为列，而是识别为一个值。\n\
    \n在此，我们试图获取自 1999 年以来入职的所有员工的列表。因为我们在比较运算符的左侧放置了一个函数，即使 `HIRE_DATE` 列上有索引，优化器也被迫进行全表扫描：\n\
    \n```\nSELECT employee_id, salary, hire_date\nFROM employees\nWHERE TO_CHAR(hire_date,'yyyy-mm-dd')\
    \ >= '2000-01-01';\n```\n\n```\n---------------------------------------\n| Id\
    \  | Operation         | Name      |\n---------------------------------------\n\
    |   0 | SELECT STATEMENT  |           |\n|   1 |  TABLE ACCESS FULL| EMPLOYEES\
    \ |\n---------------------------------------\n```\n\n通过将函数移到比较运算符的右侧，并保持 `HIRE_DATE`\
    \ 作为 `WHERE` 子句中的原始列，优化器现在可以使用 `HIRE_DATE` 上的索引：\n\n```\nSELECT employee_id, salary,\
    \ hire_date\nFROM employees\nWHERE hire_date >= TO_DATE('2000-01-01','yyyy-mm-dd');\n\
    ```\n\n```\n-------------------------------------------------\n| Id  | Operation\
    \                   | Name      |\n-------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |           |\n|   1 |  TABLE ACCESS BY INDEX\
    \ ROWID| EMPLOYEES |\n|   2 |   INDEX RANGE SCAN          | EMP_I5    |\n-------------------------------------------------\n\
    ```\n\n#### 原理说明\n\n函数是用于转换值或根据从数据库中所需内容返回期望值的绝佳工具，但如果在 SQL 语句中使用不当，它们可能成为性能杀手。确保所有函数都位于比较运算符的右侧，优化器将能够使用\
    \ `WHERE` 子句中指定列上的任何索引。这条规则适用于任何函数。在某些情况下，即使函数位于比较运算符的左侧，Oracle 仍可能使用索引，但这通常是例外。有关这方面的示例，请参见配方\
    \ 8-12。\n\n请记住，`WHERE` 子句中给定列的数据类型可能会影响如何修改 SQL 语句以将函数有效地移动到比较运算符的右侧。在下面的示例中，我们必须更改比较运算符才能有效地移动函数：\n\
    \n```\nSELECT last_name, first_name\nFROM employees\nWHERE SUBSTR(phone_number,1,3)\
    \ = '515';\n```\n\n```\n---------------------------------------\n| Id  | Operation\
    \         | Name      |\n---------------------------------------\n|   0 | SELECT\
    \ STATEMENT  |           |\n|   1 |  TABLE ACCESS FULL| EMPLOYEES |\n---------------------------------------\n\
    ```\n\n为了有效地获取所有 515 区域号码的电话，我们可以使用 `BETWEEN` 子句并捕获所有可能的值。我们也可以使用 `LIKE` 子句，只要通配符位于条件的末尾。通过使用这两种方法中的任何一种，优化器都将执行计划更改为使用索引：\n\
    \n```\nSELECT last_name, first_name\nFROM employees\nWHERE phone_number BETWEEN\
    \ '515.000.0000' and '515.999.9999';\n```\n\n```\nSELECT last_name, first_name\n\
    FROM employees\nWHERE phone_number LIKE '515%';\n```\n\n```\n-------------------------------------------------\n\
    | Id  | Operation                   | Name      |\n-------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |           |\n|   1 |  TABLE ACCESS BY INDEX\
    \ ROWID| EMPLOYEES |\n|   2 |   INDEX RANGE SCAN          | EMP_I6    |\n-------------------------------------------------\n\
    ```\n\n### 8-15. 创建高效的临时视图\n\n#### 问题\n\n你需要一个不存在的表或数据视图来构造所需的查询，但你没有在数据库上创建此类表或视图的权限。\n"
- fmt: '#### Solution


    At times, within a single SQL statement, you want to create a table "on the fly"
    that is used solely for your query, and will never be used again. In the `FROM`
    clause of your query, you normally place the name of your table or view on which
    to retrieve the data. In cases where a needed view of the data does not exist,
    you can create a temporary view of that data with what is called an "inline view,"
    where you specify the characteristics of that view right in the `FROM` clause
    of your query:


    ```sql

    SELECT last_name, first_name, department_name dept, salary

    FROM employees e join

    ( SELECT department_id, max(salary) high_sal

    FROM employees

    GROUP BY department_id ) m

    USING (department_id) join departments

    USING (department_id)

    WHERE e.salary = m.high_sal

    ORDER BY SALARY desc;

    ```


    ```

    LAST_NAME                  FIRST_NAME           DEPT                     SALARY

    ------------------------- -------------------- -------------------- ----------

    King                      Steven               Executive                 24000

    Russell                   John                 Sales                     14000

    Hartstein                 Michael              Marketing                 13000

    Greenberg                 Nancy                Finance                   12000

    Higgins                   Shelley              Accounting                12000

    Raphaely                  Den                  Purchasing                11000

    Baer                      Hermann              Public Relations          10000

    Hunold                    Alexander            IT                         9000

    Fripp                     Adam                 Shipping                   8200

    Mavris                    Susan                Human Resources            6500

    Whalen                    Jennifer             Administration             4400

    ```


    In the foregoing query, we are getting the employees with the highest salary for
    each department. There isn''t such a view in our database. Moreover, there isn''t
    a way to directly join the `employees` table to the `departments` table to retrieve
    this data within a single query. Therefore, the inline view is created as part
    of the SQL statement, and holds only the key information we needed—it has the
    high salary and department information, which now can easily be joined to the
    `employees` table based on the employee with that matching salary.


    #### How It Works


    Inline views, as with many components of the SQL language, need to be used carefully.
    While extremely useful, if misused or overused, inline views can cause database
    performance issues, especially in terms of the use of the temporary tablespace.
    Since inline views are created and used only for the duration of a query, their
    results are held in the program global memory area, and if too large, the temporary
    tablespace. Before using an inline view, the following questions should be considered:


    1.  Most importantly, how often will the SQL containing the inline view be run?
    (If only once or rarely, then it might be best to simply execute the query and
    not worry about any potential performance impact).

    2.  How many rows will be contained in the inline view?

    3.  What will the row length be for the inline view?

    4.  How much memory is allocated for the `pga_aggregate_target` or `memory_target`
    setting?

    5.  How big is the temporary tablespace that is used by your Oracle user or schema?


    If you have a simple ad hoc query you are doing, this kind of analysis may not
    be necessary. If you are creating a SQL statement that will run in a production
    environment, it is important to perform this analysis, as if all the temporary
    tablespace is consumed by an inline view, it affects not only the completion of
    that query, but also the successful completion of any processing for any user
    that may use that specific temporary tablespace. In many database environments,
    there is only a single temporary tablespace. Therefore, if one user process consumes
    all the temporary space with a single operation, this affects the operations for
    every user in the database.


    Consider the following query:


    ```sql

    WITH service_info AS

    (SELECT

    product_id,

    geographic_id,

    sum(qty) quantity

    FROM services

    GROUP BY

    product_id,

    geographic_id),

    product_info AS

    (SELECT product_id, product_group, product_desc

    FROM products

    WHERE source_sys = ''BILLING''),

    billing_info AS

    (SELECT journal_date, billing_date, product_id

    FROM BILLING

    WHERE journal_date = TO_DATE(''2011-08-15'', ''YYYY-MM-DD''))

    SELECT

    product_group,

    product_desc,

    journal_date,

    billing_date,

    sum(service_info.quantity)

    FROM service_info JOIN product_info

    ON service_info.product_id = product_info.product_id JOIN billing_info

    ON  service_info.product_id = billing_info.product_id

    WHERE

    service_info.quantity > 0

    GROUP BY

    product_group,

    product_desc,

    journal_date,

    billing_date;

    ```


    In this query, there are three inline views created: the `SERVICE_INFO` view,
    the `PRODUCT_INFO` view, and the `BILLING_INFO` view. Each of these queries will
    be processed and the results stored in the program global area or the temporary
    tablespace before finally processing the true end-user query, which starts with
    the final `SELECT` statement shown in the query. While efficient in that the desired
    results can be done by executing a single query, the foregoing query, depending
    on the size of the data within the tables, can be tremendously inefficient to
    process, as storing potentially millions of rows in the temporary tablespace uses
    critical resources needed by an entire community of users that use the database.
    In examples such as these, it is generally more efficient at the database level
    to create tables that hold the data defined by the inline views—in this case,
    three separate tables. Then, the final query can be extracted from joining the
    three permanent tables to generate the results. While this may be more upfront
    work by the development team and the `DBA`, it could very well pay dividends if
    the query is run on a regular basis. Furthermore, as complexity increases with
    a SQL statement, ease of maintenance decreases. So, overall, it is more efficient,
    and usually more maintainable, to break a complex statement into chunks.


    Inline views provide great benefit. However, do the proper analysis and investigation
    prior to implementing the use of such a view in a production environment.


    **Caution** Large inline views can easily consume a large amount of temporary
    tablespace


    ### 8-16\. Avoiding the NOT Clause


    #### Problem


    You have queries that use the `NOT` clause that are not performing adequately,
    and wish to modify them to improve performance.'
