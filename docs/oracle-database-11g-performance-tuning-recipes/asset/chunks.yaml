    \ (system-generated bind values, as opposed to user-specified)). However, you\
    \ should be aware of the differences in the behavior of the optimizer when you\
    \ set the `cursor_sharing` parameter to `FORCE` as opposed to the `SIMILAR` setting.\
    \ The key thing to understand here is that there's a conflict between query performance\
    \ and the space used in the shared pool by multiple executions of a query. Here\
    \ is a summary of the performance implications of setting the `cursor_sharing`\
    \ parameter to `EXACT`, `FORCE`, and `SIMILAR`. Let's assume the following query,\
    \ which contains a literal:\n\n`select * from employees where job = 'Clerk'`\n\
