    `-------------------------------------------------------`

    `|   0 | SELECT STATEMENT                |             |`

    `|   1 |  HASH GROUP BY                  |             |`

    `|   2 |   VIEW                          | DEPT_SAL    |`

    `|   3 |    HASH GROUP BY                |             |`

    `|   4 |     MERGE JOIN                  |             |`

    `|   5 |      TABLE ACCESS BY INDEX ROWID| DEPARTMENTS |`

    `|   6 |       INDEX FULL SCAN           | DEPT_ID_PK  |`

    `|   7 |      SORT JOIN                  |             |`

    `|   8 |       TABLE ACCESS FULL         | EMPLOYEES   |`

    `-------------------------------------------------------`


    See [Table 14-4](#Chapter14.html#tab_14_4) for the guidelines for hints regarding
    non-mergeable views.


    ![images](images/t1404.jpg)


