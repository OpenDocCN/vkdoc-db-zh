- fmt: "## Minimizing System Contention\n\nIt's not uncommon for Oracle DBAs to field\
    \ calls about a user being locked or “blocked” in the database. Oracle's locking\
    \ behavior is extremely sophisticated and supports simultaneous use of the database\
    \ by multiple users. However, on occasion, it's possible for a user to block another\
    \ user's work, mostly due to flaws in application design. This chapter explains\
    \ how Oracle handles locks and how to identify a session that's blocking others.\n\
    \nOracle database can experience two main types of contention for resources. The\
    \ first is contention for transaction locks on a table's rows. The second type\
    \ of contention is that caused by simultaneous requests for areas of the shared\
    \ memory (`SGA`), resulting in latch contention. In addition to showing you how\
    \ to troubleshoot typical locking issues, we will also show how to handle various\
    \ types of latch contention in your database.\n\nOracle Wait Interface is a handy\
    \ name for Oracle's internal mechanism for classifying and measuring the different\
    \ types of waits for resources in an Oracle instance. Understanding Oracle wait\
    \ events is the key to instance tuning, because high waits slow down response\
    \ time. We will explain the Oracle Wait Interface in this chapter and show you\
    \ how to reduce the most common Oracle wait events that beguile Oracle DBAs. We\
    \ will show you how to use various SQL scripts to unravel the mysteries of the\
    \ Oracle Wait Interface, and we will also show how to use Oracle Enterprise Manager\
    \ to quickly track down the SQL statements and sessions that are responsible for\
    \ contention in the database.\n\n### 5-1. Understanding Response Time\n\n####\
    \ Problem\n\nYou want to understand what database response time is, and its relationship\
    \ with wait time.\n\n#### Solution\n\nThe most crucial performance indicator in\
    \ a database is response time. Response time is the time it takes to get a response\
    \ from the database for a query that a client sends to the database. Response\
    \ time is simply the sum of two components:\n\n`response time = processing time\
    \ + wait time`\n\nThe foregoing relationship is also frequently represented as\
    \ `R=S + W`, where `R` is the response time, `S` the service time, and `W` stands\
    \ for the wait time. The processing time component is the actual time spent by\
    \ the database processing the request. Wait time, on the other hand, is time actually\
    \ wasted by the database—it's the time the database spends waiting for resources\
    \ such as a lock on a table's rows, library cache latch, or any of the numerous\
    \ resources that a query needs to complete its processing. Oracle has hundreds\
    \ of official wait events, a dozen or so of which are crucial to troubleshooting\
    \ slow-running queries.\n\n##### Do You Have a Wait Problem?\n\nIt's easy to find\
    \ out the percentage of time a database has spent waiting for resources instead\
    \ of actually executing. Issue the following query to find out the relative percentages\
    \ of wait times and actual CPU processing in the database:\n\n```sql\nSQL> select\
    \ metric_name, value\n   2 from v$sysmetric\n   3 where metric_name in ('Database\
    \ CPU Time Ratio',\n   4 'Database Wait Time Ratio') and\n   5 intsize_csec =\n\
    \   6 (select max(INTSIZE_CSEC) from V$SYSMETRIC);\n\nMETRIC_NAME            \
    \                         VALUE\n————————————————————------------            \
    \  ————————————\nDatabase Wait Time Ratio                        11.371689\nDatabase\
    \ CPU Time Ratio                         87.831890\nSQL>\n```\n\nIf the query\
    \ shows a very high value for the `Database Wait Time Ratio`, or if the `Database\
    \ Wait Time Ratio` is much greater than the `Database CPU Time Ratio`, the database\
    \ is spending more time waiting than processing and you must dig deeper into the\
    \ Oracle wait events to identify the specific wait events causing this.\n\n#####\
    \ Find Detailed Information\n\nYou can use the following Oracle views to find\
    \ out detailed information of what a wait event is actually waiting for and how\
    \ long it has waited for each resource.\n\n> `V$SESSION`: This view shows the\
    \ event currently being waited for as well as the event last waited for in each\
    \ session.\n>\n> `V$SESSION_WAIT`: This view lists either the event currently\
    \ being waited for or the event last waited on for each session. It also shows\
    \ the wait state and the wait time.\n>\n> `V$SESSION_WAIT_HISTORY`: This view\
    \ shows the last ten wait events for each current session.\n>\n> `V$SESSION_EVENT`:\
    \ This view shows the cumulative history of events waited on for each session.\
    \ The data in this view is available only so long as a session is active.\n>\n\
    > `V$SYSTEM_EVENT`: This view shows each wait event and the time the entire instance\
    \ waited for that event since you started the instance.\n>\n> `V$SYSTEM_WAIT_CLASS`:\
    \ This view shows wait event statistics by wait classes."
