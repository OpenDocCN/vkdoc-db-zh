    #### Problem


    A user has reported that he or she can''t connect to a database. You know there
    are many components involved with network connectivity and want to figure out
    the root cause of the problem.'
  trans: "\n# 工作原理\n\nLinux/Unix 的 `ps` 命令用于显示服务器上当前活动进程的信息。`pcpu` 开关指示进程状态命令报告每个进程的\
    \ CPU 使用率。类似地，`pmem` 开关指示 `ps` 报告进程内存使用情况。这为你提供了一种快速简便的方法来确定哪些进程消耗了最多的资源。\n\n\
    当在一行中使用多个命令时（如 `ps`、`sort` 和 `head`），通常希望将命令组合与一个快捷方式（别名）关联起来。以下是创建别名的示例：\n\n\
    ```bash\n$ alias topc='ps -e -o pcpu,pid,user,tty,args | sort -n -k 1 -r | head'\n\
    $ alias topm='ps -e -o pmem,pid,user,tty,args | sort -n -k 1 -r | head'\n```\n\
    \n现在，你可以使用别名代替输入长长的命令行——例如：\n\n```bash\n$ topc\n```\n\n另外，考虑在启动文件（如 `.bashrc`\
    \ 或 `.profile`）中建立这些别名，这样当你登录到数据库服务器时，命令会自动定义。\n\n## 6-6. 识别 I/O 瓶颈\n\n### 问题\n\
    \n你正遇到性能问题，并希望确定问题是否与缓慢的磁盘 I/O 相关。\n\n### 解决方案\n\n使用带有 `-x`（扩展）选项的 `iostat` 命令，结合\
    \ `-d`（设备）选项来生成 I/O 统计信息。下一个示例每十秒显示一次扩展的设备统计信息：\n\n```bash\n$ iostat –xd 10\n\
    ```\n\n你需要一个相当宽的屏幕来查看此输出；以下是部分列表：\n\n```\nDevice:    rrqm/s wrqm/s   r/s   w/s  rsec/s  wsec/s    rkB/s    wkB/s\
    \ avgrq-sz\navgqu-sz   await  svctm  %util\nsda          0.01   3.31  0.11  0.31    5.32   28.97     2.66    14.49    83.13\n\
    0.06  138.44   1.89   0.08\n```\n\n这种周期性的扩展输出允许你实时查看哪些设备出现了读写活动的激增。要退出前面的 `iostat`\
    \ 命令，请按 `Ctrl+C`。选项和输出可能因你的操作系统而异。例如，在一些 Linux/Unix 发行版上，`iostat` 输出可能将磁盘利用率报告为\
    \ `%b`（繁忙百分比）。\n\n在尝试确定设备 I/O 是否是瓶颈时，检查 `iostat` 输出时有一些通用准则：\n\n*   查找每秒读取或写入块数异常高的设备。\n\
    *   如果任何设备的利用率接近 100%，这强烈表明 I/O 是瓶颈。\n\n### 工作原理\n\n`iostat` 命令可以帮助你确定磁盘 I/O 是否可能是性能问题的根源。表\
    \ 6-5 描述了 `iostat` 输出中显示的列。\n\n![images](img/t0605.jpg)\n\n你还可以指示 `iostat` 按指定的时间间隔显示报告。显示的第一份报告将报告自上次服务器重启以来的平均值；每份后续报告显示自上一次生成快照以来的统计信息。以下示例每三秒显示一次设备统计报告：\n\
    \n```bash\n$ iostat -d 3\n```\n\n你还可以指定要生成的有限数量的报告。这对于收集一段时间内要分析的指标很有用。此示例指示 `iostat`\
    \ 每 2 秒报告一次，总共报告 15 次：\n\n```bash\n$ iostat 2 15\n```\n\n在处理本地连接的磁盘时，`iostat`\
    \ 命令的输出将清楚地显示 I/O 发生的位置。然而，在使用外部阵列进行存储的环境中，情况就不那么明确了。你在文件系统层看到的是某种虚拟磁盘，它可能也由卷管理器配置。在虚拟化存储环境中，你必须与你的系统管理员或存储管理员合作，以确定到底是哪些磁盘正经历高\
    \ I/O 活动。\n\n一旦确定了你存在磁盘 I/O 争用问题，你就可以使用诸如 AWR（如果已许可）、Statspack（无需许可）或 `V$` 视图等实用程序来确定你的数据库是否承受\
    \ I/O 压力。例如，AWR 报告包含一个 I/O 统计部分，其中包含以下小节：\n\n*   按功能统计的 IOStat 摘要\n*   按文件类型统计的\
    \ IOStat 摘要\n*   按功能/文件类型统计的 IOStat 摘要\n*   表空间 I/O 统计\n*   文件 I/O 统计\n\n你还可以直接查询数据字典视图，如\
    \ `V$SQL`，以确定哪些 SQL 语句使用了过多的 I/O——例如：\n\n```sql\nSELECT *\nFROM\n(SELECT\n  parsing_schema_name\n\
    \ ,direct_writes\n ,SUBSTR(sql_text,1,75)\n ,disk_reads\nFROM v$sql\nORDER BY\
    \ disk_reads DESC)\nWHERE rownum < 20;\n```\n\n要确定哪些会话当前正在等待 I/O 资源，请查询 `V$SESSION`：\n\
    \n```sql\nSELECT\n  username\n,program\n,machine\n,sql_id\nFROM v$session\nWHERE\
    \ event LIKE 'db file%read';\n```\n\n要查看正在等待 I/O 资源的对象，请运行如下查询：\n\n```sql\nSELECT\n\
    \  object_name\n,object_type\n,owner\nFROM v$session   a\n    ,dba_objects b\n\
    WHERE a.event LIKE 'db file%read'\nAND   b.data_object_id = a.row_wait_obj#;\n\
    ```\n\n一旦你确定了查询（使用本部分前面的查询），那么请考虑以下因素，这些因素可能导致 SQL 语句消耗过多的 I/O：\n\n*   编写糟糕的 SQL\n\
    *   不当的索引\n*   并行性的不当使用（这可能导致过多的全表扫描）\n\n你必须检查每个查询，并尝试确定是否是上述某一项导致了与 I/O 相关的性能不佳。\n\
    \n## 6-7. 识别网络密集型进程\n\n### 问题\n\n你正在调查数据库服务器上的性能问题。作为调查的一部分，你希望确定系统上是否存在网络瓶颈。\n\
    \n### 解决方案\n\n使用 `netstat`（网络统计）命令显示网络流量。也许查看 `iostat` 输出最有用的方式是使用 `-ptc` 选项。这些选项显示进程\
    \ ID 和 TCP 连接，并持续更新输出：\n\n```bash\n$ netstat -ptc\n```\n\n按 Ctrl+C 退出前面的命令。以下是输出的部分列表：\n\
    \n```\n(并非所有进程都能被识别，非属主进程的信息\n 将不会显示，你需要 root 权限才能看到全部信息。)\nActive Internet connections\
    \ (w/o servers)\nProto Recv-Q Send-Q Local Address  Foreign Address  State   \
    \    PID/Program name\ntcp        0      0 rmug.com:62386 rmug.com:1521    ESTABLISHED\
    \ 22864/ora_pmon_RMDB\ntcp        0      0 rmug.com:53930 rmug.com:1521    ESTABLISHED\
    \ 6091/sqlplus\ntcp        0      0 rmug.com:1521  rmug.com:53930   ESTABLISHED\
    \ 6093/oracleRMDB1\ntcp        0      0 rmug.com:1521  rmug.com:62386   ESTABLISHED\
    \ 10718/tnslsnr\n```\n\n如果 `Send-Q`（未被远程主机确认的字节数）列对于某个进程的值异常高，这可能表明网络过载。前述输出的有用之处在于，你可以确定与网络连接关联的操作系统进程\
    \ ID（PID）。如果你怀疑有问题的连接是一个 `oracle` 会话，可以使用“6-9 解决方案”部分中描述的技术将操作系统 PID 映射到 Oracle\
    \ 进程或 SQL 语句。\n\n### 工作原理\n\n当遇到性能问题时，网络通常不是原因。你更有可能发现性能不佳与编写糟糕的 SQL 语句、不足的磁盘\
    \ I/O 或不够的 CPU 或内存资源有关。然而，作为 DBA，你需要了解所有性能瓶颈的来源以及如何诊断它们。在当今高度互联的世界中，你必须掌握网络故障排除和监控技能。`netstat`\
    \ 实用程序是监控服务器网络连接的一个良好起点。\n\n## 6-8. 排查数据库网络连接问题\n\n### 问题\n\n一位用户报告说他/她无法连接到数据库。你知道网络连接涉及许多组件，并希望找出问题的根本原因。\n"
- fmt: "## Solution\n\nUse these steps as guidelines when diagnosing Oracle database\
    \ network connectivity issues:\n\n1.  Use the operating system `ping` utility\
    \ to determine whether the remote box is accessible—for example:\n    ```\n  \
    \  $ ping dwdb\n    dwdb is alive\n    ```\n    If `ping` doesn't work, work with\
    \ your system or network administrator to ensure you have server-to-server connectivity\
    \ in place.\n2.  Use `telnet` to see if you can connect to the remote server and\
    \ port (that the listener is listening on)—for example:\n    ```\n    $ telnet\
    \ ora03 1521\n    Trying 127.0.0.1...\n    Connected to ora03.\n    Escape character\
    \ is '^]'.\n    ```\n    The prior output indicates that connectivity to a server\
    \ and port is okay. If the prior command hangs, then contact your SA or network\
    \ administrator for further assistance.\n3.  Use `tnsping` to determine whether\
    \ Oracle Net is working. This utility will verify that an Oracle Net connection\
    \ can be made to a database via the network—for example:\n    ```\n    $ tnsping\
    \ dwrep\n    ..........\n    Used TNSNAMES adapter to resolve the alias\n    Attempting\
    \ to contact (DESCRIPTION = (ADDRESS = (PROTOCOL = TCP)\n    (HOST = dwdb1.us.farm.com)(PORT\
    \ = 1521))\n    (CONNECT_DATA = (SERVER = DEDICATED) (SERVICE_NAME = DWREP)))\n\
    \    OK (500 msec)\n    ```\n    If `tnsping` can't contact the remote database,\
    \ verify that the remote listener and database are both up and running. On the\
    \ remote box, use the `lsnrctl status` command to verify that the listener is\
    \ up. Verify that the remote database is available by establishing a local connection\
    \ as a non-`SYS` account (`SYS` can often connect to a troubled database when\
    \ other schemas will not work).\n4.  Verify that the `TNS` information is correct.\
    \ If the remote listener and database are working, then ensure that the mechanism\
    \ for determining `TNS` information (like the `tnsnames.ora` file) contains the\
    \ correct information.\n    Sometimes the client machine will have multiple `TNS_ADMIN`\
    \ locations and `tnsnames.ora` files. One way to verify whether a particular `tnsnames.ora`\
    \ file is being used is to rename it and see whether you get a different error\
    \ when attempting to connect to the remote database.\n\n## How It Works\n\nNetwork\
    \ connectivity issues can be troublesome to diagnose because there are several\
    \ architectural components that have to be in place for it to work correctly.\
    \ You need to have the following in place:\n\n*   A functional network\n*   Open\
    \ ports from point to point\n*   Oracle Net correctly installed and configured\n\
    *   Target database and listener up and running\n*   Correct navigational information\
    \ from the client to the target database\n\nIf you're still having issues, examine\
    \ the client `sqlnet.log` file and the remote server `listener.log` file. Sometimes\
    \ these log files will show additional information that will pinpoint the issue.\n\
    \n## 6-9. Mapping a Resource-Intensive Process to a Database Process\n\n### Problem\n\
    \nIt's a dark and stormy night, and the system is performing poorly. You identify\
    \ an operating system–intensive process on the box. You want to map an operating\
    \ system process back to a database process. If the database process is a SQL\
    \ process, you want to display the user of the SQL statement and also the SQL.\n\
    \n### Solution\n\nIn Linux/Unix environments, if you can identify the resource-intensive\
    \ operating system process, then you can easily check to see if that process is\
    \ associated with a database process. The process consists of the following:\n\
    \n1.  Run an OS command to identify resource-intensive processes and associated\
    \ IDs.\n2.  Identify the database associated with the process.\n3.  Extract details\
    \ about the process from the database data dictionary views.\n4.  If it's a SQL\
    \ statement, get those details.\n5.  Generate an execution plan for the SQL statement.\n\
    \nFor example, suppose you identify the top CPU-consuming queries with the `ps`\
    \ command:\n```\n$ ps -e -o pcpu,pid,user,tty,args|grep -i oracle|sort -n -k 1\
    \ -r|head\n```\nHere is some sample output:\n```\n16.4 11026   oracle ?      \
    \ oracleDWREP (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))\n 0.1  6448  \
    \ oracle ?       oracleINVPRD (LOCAL=NO)\n 0.5  3639   oracle ?       ora_dia0_STAGE\n\
    \ 0.4 28133   oracle ?       ora_dia0_DEVSEM\n 0.4  4093   oracle ?       ora_dia0_DWODI\n\
    \ 0.4  3534   oracle ?       ora_dia0_ENGDEV\n 0.2  4111   oracle ?       ora_mmnl_DWODI\n\
    ```\nThe prior output identifies one operating system process consuming an excessive\
    \ amount of CPU (16.4%). The process ID is 11026 and name is `oracleDWREP`. From\
    \ the process name, it's an Oracle process associated with the `DWREP` database.\n\
    \nYou can determine what type of Oracle process this is by querying the data dictionary:\n\
    ```sql\nSELECT\n  'USERNAME   : ' || s.username     || CHR(10) ||\n  'SCHEMA \
    \    : ' || s.schemaname   || CHR(10) ||\n  'OSUSER     : ' || s.osuser      \
    \ || CHR(10) ||\n  'PROGRAM    : ' || s.program      || CHR(10) ||\n  'SPID  \
    \     : ' || p.spid         || CHR(10) ||\n  'SID        : ' || s.sid        \
    \  || CHR(10) ||\n  'SERIAL#    : ' || s.serial#      || CHR(10) ||\n  'KILL STRING:\
    \ ' || '''' || s.sid || ',' || s.serial# || ''''  || CHR(10) ||\n  'MACHINE  \
    \  : ' || s.machine      || CHR(10) ||\n  'TYPE       : ' || s.type         ||\
    \ CHR(10) ||\n  'TERMINAL   : ' || s.terminal     || CHR(10) ||\n  'SQL ID   \
    \  : ' || q.sql_id       || CHR(10) ||\n  'SQL TEXT   : ' || q.sql_text\nFROM\
    \ v$session s\n    ,v$process p\n    ,v$sql     q\nWHERE s.paddr  = p.addr\nAND\
    \   p.spid   = '&&PID_FROM_OS'\nAND   s.sql_id = q.sql_id(+);\n```\nThe prior\
    \ script prompts you for the operating system process ID. Here is the output for\
    \ this example:\n```\nUSERNAME   : MV_MAINT\nSCHEMA     : MV_MAINT\nOSUSER   \
    \  : oracle\nPROGRAM    : sqlplus@dwdb (TNS V1-V3)\nSPID       : 11026\nSID  \
    \      : 410\nSERIAL#    : 30653\nKILL STRING: '410,30653'\nMACHINE    : dwdb\n\
    TYPE       : USER\nTERMINAL   : pts/2\nSQL ID     : by3c8848gyngu\nSQL TEXT  \
    \ : SELECT \"A1\".\"REGISTRATION_ID\",\"A1\".\"PRODUCT_INSTANCE_ID\"\n,\"A1\"\
    .\"SOA_ID\",\"A1\".\"REG_SOURCE_IP_ADDR\",\"A1\"...\n```\nThe output indicates\
    \ that this is a SQL*Plus process with a database `SID` of 410 and `SERIAL#` of\
    \ 30653\\. You'll need this information if you decide to terminate the process\
    \ with the `ALTER SYSTEM KILL SESSION` statement (see Recipe 6-10 for details).\n\
    \nIn this example, since the process is running a SQL statement, further details\
    \ about the query can be extracted by generating an execution plan:\n```sql\n\
    SQL> SELECT * FROM table(DBMS_XPLAN.DISPLAY_CURSOR(('&&sql_id')));\n```\nYou'll\
    \ be prompted for the `sql_id` when you run the prior statement (in this example,\
    \ the `sql_id` is `by3c8848gyngu`). Here is a partial listing of the output:"
