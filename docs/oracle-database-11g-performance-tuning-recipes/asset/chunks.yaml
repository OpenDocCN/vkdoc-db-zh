    \ by other session`等待事件。如果可能，将任何低基数索引替换为在高基数列上的索引。\n\n#### 工作原理\n\n`read by other\
    \ session`等待事件表明一个或多个会话正在等待另一个会话将相同的数据块从磁盘读取到 SGA 中。显然，大量的此类等待会降低性能。您的首要目标应该是识别实际的数据块以及这些块所属的对象。例如，这些等待可能是由多个会话试图读取相同的索引块引起的。多个会话也可能试图同时对同一张表执行全表扫描。\n\
    \n### 5-10. 减少直接路径读取等待事件\n\n#### 问题\n\n您注意到大量的`direct path read`等待事件，以及`direct\
    \ path read temp`等待事件，并且您希望减少这些事件的发生。\n"
- fmt: "## 5-10. 处理直接路径读取等待\n\n### 解决方案\n\n`Direct path read` 和 `direct path read\
    \ temp` 事件是会话将数据直接读入 PGA 而不是读入 SGA 时发生的相关等待事件。将数据读入 PGA 本身并不是问题——对于某些操作（例如排序）来说，这是正常行为。`direct\
    \ path read` 和 `direct path read temp` 事件通常表明正在进行的排序非常大，PGA 无法容纳这些排序。\n\n执行以下命令以获取正在等待的块的文件\
    \ ID：\n\n```sql\nSQL> select p1 \"file#\", p2 \"block#\", p3 \"class#\"\n    \
    \ from v$session_wait\n     where event = 'direct path read temp';\n```\n\n列 `P1`\
    \ 显示读取调用的文件 ID。列 `P2` 显示起始 `BLOCK_ID`，列 `P3` 显示块的数量。然后，您可以执行以下语句来检查此文件 ID 是否对应于临时表空间临时文件：\n\
    \n```sql\nSQL> select relative_fno, owner, segment_name, segment_type\n     from\
    \ dba_extents\n     where file_id = &file\n     and &block between block_id and\
    \ block_id + &blocks - 1;\n```\n\n直接读取类型的等待可能由过度的磁盘排序或全表扫描引起。为了查明读取的实际原因，请检查 `V$SESSION_WAIT`\
    \ 视图的 `P1` 列（读取调用的文件 ID）。通过这种方式，您可以确定读取是由于从 `TEMP` 表空间读取数据进行磁盘排序引起的，还是由于并行从属进程进行全表扫描引起的。\n\
    \n如果确定磁盘排序是导致高 `direct read` 等待事件的主要原因，请增加 `PGA_AGGREGATE_TARGET` 参数的值（或者，如果您使用自动内存管理，请为其指定最小大小）。当查询执行大型哈希连接时，增加\
    \ PGA 大小也是一个很好的策略，因为如果 PGA 不足以处理大型哈希连接，可能会导致过度的磁盘 I/O。当您为表设置高度并行时，Oracle 倾向于使用并行从属进程进行全表扫描。如果您的\
    \ I/O 系统无法处理所有的并行从属进程，您会注意到大量的直接路径读取。解决方案是降低相关表或表的并行度。此外，调查是否可以通过指定适当的索引来避免全表扫描。\n\
    \n### 工作原理\n\n通常，在顺序数据库读取或分散数据库读取操作期间，数据库将数据从磁盘读入 SGA。`direct path read` 是指从磁盘进行的单块或多块读取直接到\
    \ PGA，绕过 SGA。理想情况下，数据库应在 PGA 中完成整个数据排序。当巨大的排序无法放入可用的 PGA 时，Oracle 会将部分排序数据直接写入磁盘。当服务器进程从磁盘（而不是从\
    \ PGA）读取此数据时，就会发生直接读取。\n\n当 I/O 子系统过载时，也可能发生 `direct path read` 事件，这很可能是由于为表设置高度并行而导致的，这使得数据库返回缓冲区的速度低于服务器进程处理速度所需的速度。良好的磁盘条带策略会对此有所帮助。Oracle\
    \ 的自动存储管理 (ASM) 会自动为您条带化数据。如果您尚未使用 ASM，请考虑在数据库中实施它。\n\n`Direct path write` 和 `direct\
    \ path write temp` 等待事件类似于 `direct path read` 和 `direct path read temp` 等待。通常，由\
    \ DBWR 将数据从缓冲区高速缓存写出。当进程直接从 PGA 写入数据缓冲区时，Oracle 使用 `direct path write`。如果您的数据库正在执行大量溢出到磁盘的排序或并行\
    \ DML 操作，您偶尔可能会遇到 `direct path write` 事件。当您执行直接路径加载事件（例如并行 `CTAS` (`create table\
    \ as select`) 或直接路径 `INSERT` 操作）时，您也可能看到此等待事件。与 `direct path read` 事件一样，`direct\
    \ path write` 事件的解决方案取决于导致等待的原因。如果等待主要是由于大型排序引起的，那么您可以考虑增加 `PGA_AGGREGATE_TARGET`\
    \ 参数的值。如果操作（如并行 DML）导致等待，您必须研究如何在所有磁盘上适当分散 I/O，并确保您的 I/O 子系统能够处理 DML 操作期间的高度并行性。\n\
    \n## 5-11. 最小化恢复写入器等待\n\n### 问题\n\n您已在数据库中启用了 Oracle Flashback Database 功能。由于恢复写入器\
    \ (RVWR) 进程缓慢，您现在看到大量等待事件。您想要减少恢复写入器等待。\n\n### 解决方案\n\nOracle 将所有更改的块从内存写入磁盘上的闪回日志。当数据库写入闪回日志时，您可能会遇到\
    \ `flashback buf free by RVWR` 等待事件作为首要等待事件。为了减少这些恢复写入器等待，您必须调整闪回恢复区域文件系统和存储。具体来说，您必须执行以下操作：\n\
    \n*   由于闪回日志往往相当大，您的数据库在写入这些文件时会产生一些 CPU 开销。您可以考虑的一件事是将闪回恢复区域移动到更快的文件系统。此外，Oracle\
    \ 建议您使用基于 ASM 的文件系统，因为它们不受操作系统文件缓存（往往会减慢 I/O 速度）的影响。\n*   通过为闪回恢复区域所在的文件系统配置多个磁盘主轴来增加其磁盘吞吐量。这将加快闪回日志的写入速度。\n\
    *   条带化存储卷，理想情况下使用较小的条带大小（例如，128 KB）。\n*   将 `LOG_BUFFER` 初始化参数设置为至少 8 MB 的最小值——为写入闪回数据库日志分配的内存取决于\
    \ `LOG_BUFFER` 参数的设置。\n\n### 工作原理\n\n与重做日志缓冲区的情况不同，Oracle 以不频繁的间隔将闪回缓冲区写入闪回日志，以保持\
    \ Oracle Flashback Database 的开销较低。当会话等待 RVWR 进程时，会发生 `flashback buf free by RVWR`\
    \ 等待事件。RVWR 进程将闪回缓冲区的内容写入磁盘上的闪回日志。当 RVWR 在此过程中落后时，闪回缓冲区已满，无法为通过 DML 操作更改数据的会话提供可用缓冲区。会话将继续等待，直到\
    \ RVWR 通过将其内容写入闪回日志来释放缓冲区。高 RVWR 等待表明您的 I/O 系统无法支持 RVWR 需要将闪回缓冲区刷新到磁盘上闪回日志的速率。\n\
    \n## 5-12. 查找谁持有阻塞锁\n\n### 问题\n\n您的用户抱怨他们的一些会话非常缓慢。您怀疑这些会话可能因某种原因被 Oracle 锁定，并希望找到找出谁在阻碍这些会话的最佳方法。"
  raw: '#### Solution


    `Direct path read` and `direct path read temp` events are related wait events
    that occur when sessions are reading data directly into the PGA instead of reading
    it into the SGA. Reading data into the PGA isn''t the problem here—that''s normal
    behavior for certain operations, such as sorting, for example. The `direct path
    read` and `direct path read temp` events usually indicate that that the sorts
    being performed are very large and that the PGA is unable to accommodate those
    sorts.


    Issue the following command to get the file ID for the blocks that are being waited
    for:


    `SQL> select p1 "file#", p2 "block#", p3 "class#"`

    `     from v$session_wait`

    `     where event = ''direct path read temp'';`


    The column `P1` shows the file ID for the read call. Column `P2` shows the start
    `BLOCK_ID`, and column `P3` shows the number of blocks. You can then execute the
    following statement to check whether this file ID is for a temporary tablespace
    tempfile:


    `SQL> select relative_fno, owner, segment_name, segment_type`

    `     from dba_extents`

    `     where file_id = &file`

    `     and &block betgween block_id and block_id + &blocks - 1;`


    The direct read–type waits can be caused by excessive sorts to disk or full table
    scans. In order to find out what the reads are actually for, check the `P1` column
    (file ID for the read call) of the `V$SESSION_WAIT` view. By doing this, you can
    find out if the reads are being caused by reading data from the `TEMP` tablespace
    due to disk sorting, or if they''re occurring due to full table scans by parallel
    slaves.


    If you determine that sorts to disk are the main culprit in causing high `direct
    read` wait events, increase the value of the `PGA_AGGREGATE_TARGET` parameter
    (or specify a minimum size for it, if you''re using automatic memory management).
    Increasing PGA size is also a good strategy when the queries are doing large hash
    joins, which could result in excessive I/O on disk if the PGA is inadequate for
    handling the large hash joins. When you set a high degree of parallelism for a
    table, Oracle tends to go for full table scans, using parallel slaves. If your
    I/O system can''t handle all the parallel slaves, you''ll notice a high amount
    of direct path reads. The solution for this is to reduce the degree of parallelism
    for the table or tables in question. Also investigate if you can avoid the full
    table scan by specifying appropriate indexes.


    #### How It Works


    Normally, during both a sequential db read or a scattered db read operation, the
    database reads data from disk into the SGA. A `direct path read` is one where
    a single or multiblock read is made from disk directly to the PGA, bypassing the
    SGA. Ideally, the database should perform the entire sorting of the data in the
    PGA. When a huge sort doesn''t fit into the available PGA, Oracle writes part
    of the sort data directly to disk. A direct read occurs when the server process
    reads this data from disk (instead of the PGA).


    A `direct path read` event can also occur when the I/O subsystem is overloaded,
    most likely due to full table scans caused by setting a high degree of parallelism
    for tables, causing the database to return buffers slower than what the processing
    speed of the server process requires. A good disk striping strategy would help
    out here. Oracle''s Automatic Storage Management (ASM) automatically stripes data
    for you. If you aren''t already using ASM, consider implementing it in your database.


    `Direct path write` and `direct path write temp` wait events are analogous to
    the `direct path read` and the `direct path read temp` waits. Normally, it''s
    the DBWR that writes data from the buffer cache. Oracle uses a `direct path write`
    when a process writes data buffers directly from the PGA. If your database is
    performing heavy sorts that spill onto disk, or parallel DML operations, you can
    on occasion expect to encounter the `direct path write` events. You may also see
    this wait event when you execute direct path load events such as a parallel `CTAS`
    (`create table as select`) or a direct path `INSERT` operation. As with the `direct
    path read` events, the solution for `direct path write` events depends on what''s
    causing the waits. If the waits are being mainly caused by large sorts, then you
    may think about increasing the value of the `PGA_AGGREGATE_TARGET` parameter.
    If operations such as parallel DML are causing the waits, you must look into the
    proper spreading of I/O across all disks and also ensure that your I/O subsystem
    can handle the high degree of parallelism during DML operations.


    ### 5-11. Minimizing Recovery Writer Waits


    #### Problem


    You''ve turned on the Oracle Flashback Database feature in your database. You''re
    now seeing a large number of wait events due to a slow RVWR (recovery writer)
    process. You want to reduce the recovery writer waits.


    #### Solution


    Oracle writes all changed blocks from memory to the flashback logs on disk. You
    may  encounter  the `flashback buf free by RVWR` wait event as a top wait event
    when thie database is writing to the flashback logs. To reduce these recovery
    writer waits, you must tune the flash recovery area file system and storage. Specifically,
    you must do the following:


    *   Since flashback logs tend to be quite large, your database is going to incur
    some CPU overhead when writing to these files. One of the things you may consider
    is moving the flash recovery area to a faster file system. Also, Oracle recommends
    that you use file systems based on ASM, because they won''t be subject to operating
    system file caching, which tends to slow down I/O.

    *   Increase the disk throughput for the file system where you store the flash
    recovery area, by configuring multiple disk spindles for that file system. This
    will speed up the writing of the flashback logs.

    *   Stripe the storage volumes, ideally with small stripe sizes (for example,
    128 KB).

    *   Set the `LOG_BUFFER` initialization parameter to a minimum value of 8 MB—the
    memory allocated for writing to the flashback database logs depends on the setting
    of the `LOG_BUFFER` parameter.


    #### How It Works


    Unlike in the case of the redo log buffer, Oracle writes flashback buffers to
    the flashback logs at infrequent intervals to keep overhead low for the Oracle
    Flashback Database. The `flashback buf free by RVWR` wait event occurs when sessions
    are waiting on the RVWR process. The RVWR process writes the contents of the flashback
    buffers to the flashback logs on disk. When the RVWR falls behind during this
    process, the flashback buffer is full and free buffers aren''t available to sessions
    that are making changes to data through DML operations. The sessions will continue
    to wait until RVWR frees up buffers by writing their contents to the flashback
    logs. High RVWR waits indicate that your I/O system is unable to support the rate
    at which the RVWR needs to flush flashback buffers to the flashback logs on disk.


    ### 5-12. Finding Out Who''s Holding a Blocking Lock


    #### Problem


    Your users are complaining that some of their sessions are very slow. You suspect
    that those sessions may be locked by Oracle for some reason, and would like to
    find the best way to go about figuring out who is holding up these sessions.'
  trans: "\n## 5-10. 处理直接路径读取等待\n\n### 解决方案\n\n`Direct path read` 和 `direct path read\
    \ temp` 事件是会话将数据直接读入 PGA 而不是读入 SGA 时发生的相关等待事件。将数据读入 PGA 本身并不是问题——对于某些操作（例如排序）来说，这是正常行为。`direct\
    \ path read` 和 `direct path read temp` 事件通常表明正在进行的排序非常大，PGA 无法容纳这些排序。\n\n执行以下命令以获取正在等待的块的文件\
    \ ID：\n\n```sql\nSQL> select p1 \"file#\", p2 \"block#\", p3 \"class#\"\n    \
    \ from v$session_wait\n     where event = 'direct path read temp';\n```\n\n列 `P1`\
    \ 显示读取调用的文件 ID。列 `P2` 显示起始 `BLOCK_ID`，列 `P3` 显示块的数量。然后，您可以执行以下语句来检查此文件 ID 是否对应于临时表空间临时文件：\n\
    \n```sql\nSQL> select relative_fno, owner, segment_name, segment_type\n     from\
    \ dba_extents\n     where file_id = &file\n     and &block between block_id and\
    \ block_id + &blocks - 1;\n```\n\n直接读取类型的等待可能由过度的磁盘排序或全表扫描引起。为了查明读取的实际原因，请检查 `V$SESSION_WAIT`\
    \ 视图的 `P1` 列（读取调用的文件 ID）。通过这种方式，您可以确定读取是由于从 `TEMP` 表空间读取数据进行磁盘排序引起的，还是由于并行从属进程进行全表扫描引起的。\n\
    \n如果确定磁盘排序是导致高 `direct read` 等待事件的主要原因，请增加 `PGA_AGGREGATE_TARGET` 参数的值（或者，如果您使用自动内存管理，请为其指定最小大小）。当查询执行大型哈希连接时，增加\
    \ PGA 大小也是一个很好的策略，因为如果 PGA 不足以处理大型哈希连接，可能会导致过度的磁盘 I/O。当您为表设置高度并行时，Oracle 倾向于使用并行从属进程进行全表扫描。如果您的\
    \ I/O 系统无法处理所有的并行从属进程，您会注意到大量的直接路径读取。解决方案是降低相关表或表的并行度。此外，调查是否可以通过指定适当的索引来避免全表扫描。\n\
    \n### 工作原理\n\n通常，在顺序数据库读取或分散数据库读取操作期间，数据库将数据从磁盘读入 SGA。`direct path read` 是指从磁盘进行的单块或多块读取直接到\
    \ PGA，绕过 SGA。理想情况下，数据库应在 PGA 中完成整个数据排序。当巨大的排序无法放入可用的 PGA 时，Oracle 会将部分排序数据直接写入磁盘。当服务器进程从磁盘（而不是从\
    \ PGA）读取此数据时，就会发生直接读取。\n\n当 I/O 子系统过载时，也可能发生 `direct path read` 事件，这很可能是由于为表设置高度并行而导致的，这使得数据库返回缓冲区的速度低于服务器进程处理速度所需的速度。良好的磁盘条带策略会对此有所帮助。Oracle\
    \ 的自动存储管理 (ASM) 会自动为您条带化数据。如果您尚未使用 ASM，请考虑在数据库中实施它。\n\n`Direct path write` 和 `direct\
    \ path write temp` 等待事件类似于 `direct path read` 和 `direct path read temp` 等待。通常，由\
    \ DBWR 将数据从缓冲区高速缓存写出。当进程直接从 PGA 写入数据缓冲区时，Oracle 使用 `direct path write`。如果您的数据库正在执行大量溢出到磁盘的排序或并行\
    \ DML 操作，您偶尔可能会遇到 `direct path write` 事件。当您执行直接路径加载事件（例如并行 `CTAS` (`create table\
    \ as select`) 或直接路径 `INSERT` 操作）时，您也可能看到此等待事件。与 `direct path read` 事件一样，`direct\
    \ path write` 事件的解决方案取决于导致等待的原因。如果等待主要是由于大型排序引起的，那么您可以考虑增加 `PGA_AGGREGATE_TARGET`\
    \ 参数的值。如果操作（如并行 DML）导致等待，您必须研究如何在所有磁盘上适当分散 I/O，并确保您的 I/O 子系统能够处理 DML 操作期间的高度并行性。\n\
    \n## 5-11. 最小化恢复写入器等待\n\n### 问题\n\n您已在数据库中启用了 Oracle Flashback Database 功能。由于恢复写入器\
    \ (RVWR) 进程缓慢，您现在看到大量等待事件。您想要减少恢复写入器等待。\n\n### 解决方案\n\nOracle 将所有更改的块从内存写入磁盘上的闪回日志。当数据库写入闪回日志时，您可能会遇到\
    \ `flashback buf free by RVWR` 等待事件作为首要等待事件。为了减少这些恢复写入器等待，您必须调整闪回恢复区域文件系统和存储。具体来说，您必须执行以下操作：\n\
    \n*   由于闪回日志往往相当大，您的数据库在写入这些文件时会产生一些 CPU 开销。您可以考虑的一件事是将闪回恢复区域移动到更快的文件系统。此外，Oracle\
    \ 建议您使用基于 ASM 的文件系统，因为它们不受操作系统文件缓存（往往会减慢 I/O 速度）的影响。\n*   通过为闪回恢复区域所在的文件系统配置多个磁盘主轴来增加其磁盘吞吐量。这将加快闪回日志的写入速度。\n\
    *   条带化存储卷，理想情况下使用较小的条带大小（例如，128 KB）。\n*   将 `LOG_BUFFER` 初始化参数设置为至少 8 MB 的最小值——为写入闪回数据库日志分配的内存取决于\
    \ `LOG_BUFFER` 参数的设置。\n\n### 工作原理\n\n与重做日志缓冲区的情况不同，Oracle 以不频繁的间隔将闪回缓冲区写入闪回日志，以保持\
    \ Oracle Flashback Database 的开销较低。当会话等待 RVWR 进程时，会发生 `flashback buf free by RVWR`\
    \ 等待事件。RVWR 进程将闪回缓冲区的内容写入磁盘上的闪回日志。当 RVWR 在此过程中落后时，闪回缓冲区已满，无法为通过 DML 操作更改数据的会话提供可用缓冲区。会话将继续等待，直到\
    \ RVWR 通过将其内容写入闪回日志来释放缓冲区。高 RVWR 等待表明您的 I/O 系统无法支持 RVWR 需要将闪回缓冲区刷新到磁盘上闪回日志的速率。\n\
    \n## 5-12. 查找谁持有阻塞锁\n\n### 问题\n\n您的用户抱怨他们的一些会话非常缓慢。您怀疑这些会话可能因某种原因被 Oracle 锁定，并希望找到找出谁在阻碍这些会话的最佳方法。\n"
- fmt: "### Solution\n\nAs we've explained in the introduction to this chapter, Oracle\
    \ uses several types of locks to control transactions being executed by multiple\
    \ sessions, to prevent destructive behavior in the database. A blocking lock could\
    \ “slow” a session down—in fact, the session is merely waiting on another session\
    \ that is holding a lock on an object (such as a row or a set of rows, or even\
    \ an entire table). Or, in a development scenario, a developer might have started\
    \ multiple sessions, some of which are blocking each other.\n\nWhen analyzing\
    \ Oracle locks, some of the key database views you must examine are the `V$LOCK`\
    \ and the `V$SESSION` views. The `V$LOCKED_OBJECT` and the `DBA_OBJECTS` views\
    \ are also very useful in identifying the locked objects. In order to find out\
    \ whether a session is being blocked by the locks being applied by another session,\
    \ you can execute the following query:\n\n```sql\nSQL> select s1.username || '@'\
    \ || s1.machine\n  2  || ' ( SID=' || s1.sid || ' )  is blocking '\n  3  || s2.username\
    \ || '@' || s2.machine || ' ( SID=' || s2.sid || ' ) ' AS blocking_status\n  4\
    \  from v$lock l1, v$session s1, v$lock l2, v$session s2\n  5  where s1.sid=l1.sid\
    \ and s2.sid=l2.sid\n  6  and l1.BLOCK=1 and l2.request > 0\n  7  and l1.id1 =\
    \ l2.id1\n  8  and l2.id2 = l2.id2 ;\n\nBLOCKING_STATUS\n--------------------------------------------------------------------\n\
    \nHR@MIRO\\MIROPC61 ( SID=68 )  is blocking SH@MIRO\\MIROPC61 ( SID=81 )\n\nSQL>\n\
    ```\n\nThe output of the query shows the blocking session as well as all the blocked\
    \ sessions.\n\nA quick way to find out if you have any blocking locks in your\
    \ instance at all, for any user, is to simply run the following query:\n\n```sql\n\
    SQL> select * from V$lock where block > 0;\n```\n\nIf you don't get any rows back\
    \ from this query—good—you don't have any blocking locks in the instance right\
    \ now! We'll explain this view in more detail in the explanation section.\n\n\
    ### How It Works\n\nOracle uses two types of locks to prevent destructive behavior:\
    \ exclusive and shared locks. Only one transaction can obtain an exclusive lock\
    \ on a row or a table, while multiple shared locks can be obtained on the same\
    \ object. Oracle uses locks at two levels—row and table levels. Row locks, indicated\
    \ by the symbol `TX`, lock just a single row of a table for each row that'll be\
    \ modified by a DML statement such as `INSERT`, `UPDATE`, and `DELETE`. This is\
    \ true also for a `MERGE` or a `SELECT … FOR UPDATE` statement. The transaction\
    \ that includes one of these statements grabs an exclusive row lock as well as\
    \ a row share table lock. The transaction (and the session) will hold these locks\
    \ until it commits or rolls back the statement. Until it does one of these two\
    \ things, all other sessions that intend to modify that particular row are blocked.\
    \ Note that each time a transaction intends to modify a row or rows of a table,\
    \ it holds a table lock (`TM`) as well on that table, to prevent the database\
    \ from allowing any DDL operations (such as `DROP TABLE`) on that table while\
    \ the transaction is trying to modify some of its rows.\n\nIn an Oracle database,\
    \ locking works this way:\n\n*   A reader won't block another reader.\n*   A reader\
    \ won't block a writer.\n*   A writer won't block a reader of the same data.\n\
    *   A writer will block another writer that wants to modify the same data.\n\n\
    It's the last case in the list, where two sessions intend to modify the same data\
    \ in a table, that Oracle's automatic locking kicks in, to prevent destructive\
    \ behavior. The first transaction that contains the statement that updates an\
    \ existing row will get an exclusive lock on that row. While the first session\
    \ that locks a row continues to hold that lock (until it issues a `COMMIT` or\
    \ `ROLLBACK` statement), other sessions can modify any other rows in that table\
    \ other than the locked row. The concomitant table lock held by the first session\
    \ is merely intended to prevent any other sessions from issuing a DDL statement\
    \ to alter the table's structure. Oracle uses a sophisticated locking mechanism\
    \ whereby a row-level lock isn't automatically escalated to the table, or even\
    \ the block level.\n\n## 5-13. Identifying Blocked and Blocking Sessions\n\n###\
    \ Problem\n\nYou notice enqueue locks in your database and suspect that a blocking\
    \ lock may be holding up other sessions. You'd like to identify the blocking and\
    \ the blocked sessions.\n\n### Solution\n\nWhen you see an enqueue wait event\
    \ in an Oracle database, chances are that it's a locking phenomenon that's holding\
    \ up some sessions from executing their SQL statements. When a session waits on\
    \ an “enqueue” wait event, that session is waiting for a lock that's held by a\
    \ different session. The blocking session is holding the lock in a mode that's\
    \ incompatible with the lock mode that's being requested by the blocked session.\
    \ You can issue the following command to view information about the blocked and\
    \ the blocking sessions:\n\n```sql\nSQL> select decode(request,0,'Holder: ','Waiter:\
    \ ')||sid sess,\n     id1, id2, lmode, request, type\n     from v$lock\n     where\
    \ (id1, id2, type) in\n     (select id1, id2, type from v$lock where request>0)\n\
    \     order by id1, request;\n```\n\nThe `V$LOCK` view shows if there are any\
    \ blocking locks in the instance. If there are blocking locks, it also shows the\
    \ blocking session(s) and the blocked session(s). Note that a blocking session\
    \ can block multiple sessions simultaneously, if all of them need the same object\
    \ that's being blocked. Here's an example that shows there are locks present:\n\
    \n```sql\nSQL> select sid,type,lmode,request,ctime,block from v$lock;\n\n    \
    \   SID           TY           LMODE          REQUEST       CTIME        BLOCK\n\
    --------------      --------      -----------    -----------   -------      -------\n\
    \       127           MR               4             0         102870        \
    \  0\n        81           TX               0             6           778    \
    \      0\n       191           AE               4             0           758\
    \          0\n       205           AE               4             0          \
    \ 579          0\n       140           AE               4             0      \
    \   11655          0\n        68           TM               3             0  \
    \         826          0\n        68           TX               6            \
    \ 0           826          1\n…\nSQL>\n```\n\nThe key column to watch is the `BLOCK`\
    \ column—the blocking session will have the value 1 for this column. In our example,\
    \ session 68 is the blocking session, because it shows the value 1 under the `BLOCK`\
    \ column. Thus, the `V$LOCK` view confirms our initial finding in the “Solution”\
    \ section of this recipe. The blocking session, with a SID of 68, also shows a\
    \ lock mode 6 under the `LMODE` column, indicating that it's holding this lock\
    \ in the exclusive mode—this is the reason session 81 is “hanging,” unable to\
    \ perform its update operation. The blocked session, of course, is the victim—so\
    \ it shows a value of 0 in the `BLOCK` column. It also shows a value of 6 under\
    \ the `REQUEST` column, because it's requesting a lock in the exclusive mode to\
    \ perform its update of the column. The blocking session, in turn, will show a\
    \ value of 0 for the `REQUEST` column, because it isn't requesting any locks—it's\
    \ already holding it.\n\nIf you want to find out the wait class and for how long\
    \ a blocking session has been blocking others, you can do so by querying the `V$SESSION`\
    \ view, as shown here:\n\n```sql\nSQL> select  blocking_session, sid,  wait_class,\n\
    \     seconds_in_wait\n     from     v$session\n     where blocking_session is\
    \ not NULL\n     order by blocking_session;\n\nBLOCKING_SESSION        SID   \
    \     WAIT_CLASS        SECONDS_IN_WAIT\n-----------------    -------       -------------\
    \    ----------------\n      68                81          Application       \
    \           7069\n\nSQL>\n```\n\nThe query shows that the session with SID=68\
    \ is blocking the session with SID=81, and the block started 7,069 seconds ago."
