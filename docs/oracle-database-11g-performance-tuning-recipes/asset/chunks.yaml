    `|   8 |         TABLE ACCESS FULL| EMP_NORTH     |  Q1,00 | PCWP |            |`

    `|   9 |        PX BLOCK ITERATOR |               |  Q1,00 | PCWC |            |`

    `|  10 |         TABLE ACCESS FULL| EMP_SOUTH     |  Q1,00 | PCWP |            |`

    `-------------------------------------------------------------------------------`


    #### How It Works


    [Tables 15-4](#Chapter15.html#tab_15_4) and [15-5](#Chapter15.html#tab_15_5) delineate
    the fundamental information that can be used to determine the execution plan for
    a parallel operation. In order to understand the basics of interpreting your explain
    plan output, you should be aware of two aspects:


    *   The possible parallel execution steps ([Table 15-4](#Chapter15.html#tab_15_4))

    *   The parallel operations that occur within each step ([Table 15-5](#Chapter15.html#tab_15_5))


    The execution steps are the aspects of a parallelized plan, while the operations
    that occur within your parallel execution plan can help you determine if you have
    an optimized plan, or one that needs tuning and improvement.


    As with non-parallel operations, the explain plan utility is a very useful tool
    in determining what the optimizer is planning to do to complete the task at hand.
    When executing operations in parallel, there are specific aspects of the explain
    plan related to parallelism. These are important to understand, so you can determine
    if the operation is running as optimized as possible. One of the key aspects of
    analyzing a parallel explain plan is to determine if there are any aspects of
    the plan that are being run serially, as this bottleneck can reduce the overall
    performance of a given operation. That it is why it is critical to understand
    aspects of the explain plan that relate to parallel operations, with the end goal
    being that all aspects of the operation are parallelized.


    ![images](images/t1504.jpg)


    ![images](images/t1505.jpg)


    ### 15-12. Monitoring Parallel Operations


    #### Problem


    You want to quickly get information regarding the performance of your parallel
    operations from the database.'
