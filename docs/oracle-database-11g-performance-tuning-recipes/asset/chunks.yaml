    ```

    SELECT /*+ driving_site(employees) */ first_name, last_name, department_name

    FROM employees@to_emp_link JOIN departments USING(department_id);

    ```


    如果远程站点的数据量很大，或者你在远程站点上查询许多表，那么指定远程站点作为驱动是最合适的。为了处理分布式查询，优化器首先必须将远程表中的行传送到本地站点，然后再处理整个查询。这对本地数据库上的临时表空间可能非常耗费资源。因此，通过指示优化器在数据占比最大的站点执行工作，你可以显著提升查询性能。


    指定这个提示时，你只需要在提示中指定远程表或表别名，就能引导优化器到将要执行工作的站点。如果你希望优化器在本地数据库执行工作，则无需指定任何提示；只有当你想将工作导向到远程数据库时，才需要指定此提示。'
- fmt: '## How It Works


    分布式查询可能是一把双刃剑。通过能够连接来自远程数据库的表，它给用户带来数据透明性的印象，即他们需要检索的数据仿佛位于一个地方，因为他们可以编写单个查询来检索数据，而实际上这些数据可能驻留在两个或多个数据库中。这种简化查询编写的能力是执行分布式查询的一个关键优势。主要的缺点在于分布式查询的优化非常困难。本质上，发起查询的源数据库或本地数据库默认成为“驱动”数据库。本地站点的优化器不了解远程站点数据的构成或数量，因此工作被分割成若干部分，默认情况下查询不会作为一个整体进行优化。因此，理解每个数据库上数据的构成非常重要，以便尝试最佳地优化查询。对于分布式查询，你需要做出的关键决策是：你希望哪个数据库作为“驱动”站点。决定哪个站点应作为驱动站点的最大因素如下：


    *   分布式查询涉及多少张表？

    *   分布式查询涉及多少个数据库？

    *   哪个数据库包含查询涉及的表最多？

    *   哪个数据库包含的数据量最大？


    本质上，如果大部分表或大量数据驻留在远程，那么使用远程数据库作为驱动站点可能是有益的。假设我们要连接三个表，以获取员工信息及其所在部门和工作地址。在此场景中，最大的员工表驻留在一个数据库上，而两个较小的表——部门表和位置表——驻留在我们的本地数据库上：


    ```

    SELECT first_name, last_name, department_name, street_address, city

    FROM employees@to_emp_link JOIN departments USING(department_id)

    JOIN locations USING (location_id);

    -------------------------------------------

    |  Id  | Operation           | Name        |

    -------------------------------------------

    |    0 | SELECT STATEMENT    |             |

    |    1 |  HASH JOIN          |             |

    |    2 |   HASH JOIN         |             |

    |    3 |    TABLE ACCESS FULL| LOCATIONS   |

    |    4 |    TABLE ACCESS FULL| DEPARTMENTS |

    |    5 |   REMOTE            | EMPLOYEES   |

    -------------------------------------------

    ```


    从执行计划中，我们可以看到`EMPLOYEES`表是远程表。这意味着在连接员工数据之前，所有这些员工数据都必须先传输到本地数据库，然后查询才能完成。在此情况下，员工数据是三者中最大的表。员工数量远多于部门或位置数量，因此在处理查询的剩余部分之前，会有大量数据被传输到本地数据库。所以，在这种情况下，通过让工作在员工数据所在的数据库上完成，性能可能会有所提升：


    ```

    SELECT /*+ driving_site(employees) */

    first_name, last_name, department_name, street_address, city

    FROM employees@to_emp_link JOIN departments USING(department_id)

    JOIN locations USING (location_id);


    ---------------------------------------------------------------

    |  Id  | Operation                | Name                       |

    ---------------------------------------------------------------

    |    0 | SELECT STATEMENT REMOTE  |                            |

    |    1 |   HASH JOIN              |                            |

    |    2 |    VIEW                  | index$_join$_001           |

    |    3 |     HASH JOIN            |                            |

    |    4 |      INDEX FAST FULL SCAN| EMP_DEPARTMENT_IX          |

    |    5 |      INDEX FAST FULL SCAN| EMP_NAME_IX                |

    |    6 |    HASH JOIN             |                            |

    |    7 |     REMOTE               | DEPARTMENTS                |

    |    8 |     REMOTE               | LOCATIONS                  |

    ---------------------------------------------------------------

    ```


    现在，执行计划显示两个较小的表为远程表，因为`EMPLOYEES`表所在的数据库现在是查询的驱动站点。有时，当哪个站点应作为驱动站点不明显时，你可能需要通过试错来确定。


    另一种简单的方法是直接判断哪个查询返回更快。如果我们想获取每个部门和位置的平均工资，查询如下所示：


    ```

    SELECT department_name, city, avg(salary)

    FROM employees_big@to_emp_link JOIN departments USING(department_id)

    JOIN locations USING (location_id)

    GROUP BY department_name, city

    ORDER BY 2,1;

    DEPARTMENT_NAME                CITY                           AVG(SALARY)

    ------------------------------ ------------------------------ -----------

    Human Resources                London                                  6500

    Public Relations               Munich                                 10000

    Sales                          Oxford                           8955.88235

    Accounting                     Seattle                               10150

    Administration                 Seattle                                4400

    Executive                      Seattle                          19333.3333

    Finance                        Seattle                                8600

    Purchasing                     Seattle                                4150

    Shipping                       South San Francisco              3475.55556

    IT                             Southlake                             5760

    Marketing                      Toronto                                9500


    11 rows selected.

    ```


    `Elapsed: 00:00:42.87`


    由于没有指定驱动站点提示，本地站点是驱动站点。如果我们发出相同的查询，但指定远程且更大的表作为驱动站点，我们仅仅从查询执行时间上就能看到好处：


    ```

    SELECT /*+ driving_site(employees_big) */ department_name, city, avg(salary)

    FROM employees_big@to_emp_link JOIN departments USING(department_id)

    JOIN locations USING (location_id)

    GROUP BY department_name, city

    ORDER BY 2,1;

    ```


    `Elapsed: 00:00:22.24`


    另一种可以尝试确定哪个站点应作为驱动站点的方法是，弄清楚在每个站点上具体执行了什么工作。例如，以前面的查询为例，如果我们不使用提示，则执行以下步骤：


    1.  获取查询的执行计划。

    2.  在远程数据库上，确定查询的哪部分正在远程运行。


    首先，我们可以查看查询的执行计划。再次说明，我们没有使用`driving_site`提示。


    ```

    ----------------------------------------------

    |  Id  | Operation            | Name          |

    ----------------------------------------------

    |    0 | SELECT STATEMENT     |               |

    |    1 |  SORT GROUP BY       |               |

    |    2 |   HASH JOIN          |               |

    |    3 |    HASH JOIN         |               |

    |    4 |     TABLE ACCESS FULL| LOCATIONS     |

    |    5 |     TABLE ACCESS FULL| DEPARTMENTS   |

    |    6 |    REMOTE            | EMPLOYEES_BIG |

    ----------------------------------------------

    ```


    其次，我们可以确定在远程数据库上发生的操作是针对远程`EMPLOYEES_BIG`表的`SELECT`语句和列。你可以直接从远程数据库的数据字典或诸如Enterprise
    Manager之类的工具中检索此信息。


    ```

    SELECT "SALARY","DEPARTMENT_ID"

    FROM "EMPLOYEES_BIG" "EMPLOYEES_BIG"

    ```


    如果我们使用相同的查询重复前述两个步骤，但这次为`EMPLOYEES`表插入一个`driving_site`提示，我们会得到以下结果。首先，我们可以获取带有`driving_site`提示的查询的执行计划：


    ```

    -------------------------------------------------------------

    |  Id  | Operation              | Name                       |

    -------------------------------------------------------------

    |    0 | SELECT STATEMENT REMOTE|                            |

    |    1 |  RESULT CACHE          | 326m75n1yb5kt2qysx7f37cy2y |

    |    2 |   SORT GROUP BY        |                            |

    |    3 |    HASH JOIN           |                            |

    |    4 |     HASH JOIN          |                            |

    |    5 |      REMOTE            | LOCATIONS                  |

    |    6 |      REMOTE            | DEPARTMENTS                |

    |    7 |      TABLE ACCESS FULL | EMPLOYEES_BIG              |

    -------------------------------------------------------------

    ```


    其次，我们可以看到查询的哪部分正在远程站点上执行。此案例中，数据是从Enterprise Manager检索的：


    ```

    SELECT "A2"."DEPARTMENT_NAME","A1"."CITY",AVG("A3"."SALARY")

    FROM "EMPLOYEES_BIG" "A3","DEPARTMENTS"@! "A2","LOCATIONS"@! "A1"

    WHERE "A2"."LOCATION_ID"="A1"."LOCATION_ID" AND "A3"."DEPARTMENT_ID"="A2"."DEPARTMENT_ID"

    GROUP BY "A2"."DEPARTMENT_NAME","A1"."CITY" ORDER BY "A1"."CITY","A2"."DEPARTMENT_NAME"

    ```


    没有驱动站点提示时，我们必须移动`EMPLOYEES_BIG`表的所有行，包括`SALARY`和`DEPARTMENT_ID`列。传输完这些数据后，才能处理查询结果。


    使用了`driving_site`提示后，我们必须将`DEPARTMENTS`和`LOCATIONS`表的所有列的所有行移动到远程数据库。然后，才能处理查询结果。并且，因为我们使用了`driving_site`提示，查询结果编译完成后，完整的最终结果集必须被传输回发起查询的本地数据库。因此，你不仅需要考虑查询本身在数据库之间移动的数据，还需要考虑，如果你使用了`driving_site`提示，结果本身被传输回本地数据库的开销。'
  raw: '#### How It Works


    Distributed queries can be a blessing and a curse. By being able to join tables
    from remote databases, it gives users the impression of data transparency, that
    is, that the data they need to retrieve appears to be in one place, as they can
    assemble a single query to retrieve data, when in fact the data may reside on
    two or more databases. This simplicity in assembling queries is a key advantage
    of being able to perform distributed queries. The key disadvantage is that optimization
    of distributed queries is difficult. Essentially, the originating or local database
    where the query is initiated becomes the “driver” database by default. The optimizer
    at the local site has no knowledge of the makeup or volume of data at the remote
    site, and therefore the work is split up into pieces, and the query is not, by
    default, optimized as a single unit. Therefore, it is important to understand
    the makeup of the data on each database, in order to attempt to best optimize
    the query. The key decision you need to make with a distributed query is which
    database you want to be the “driving” site. The biggest factors in determining
    which site should be the driving site are as follows:


    *   How many tables are in the distributed query?

    *   How many databases are involved in the distributed query?

    *   Which database contains the most tables involved in the query?

    *   Which database contains the greatest volume of data?


    In essence, if a majority of tables or a large volume of data resides remotely,
    it may be beneficial to use a remote database as the driving site. Let''s say
    we are joining three tables together, and we want to get employee information
    along with the department they work in, and their work address. In this scenario,
    the employee table, being the largest, resides on one database, while two smaller
    tables, the department and location tables, reside on our local database:


    `SELECT first_name, last_name, department_name, street_address, city`

    `FROM employees@to_emp_link JOIN departments USING(department_id)`

    `JOIN locations USING (location_id);`

    `-------------------------------------------`

    `| Id  | Operation           | Name        |`

    `-------------------------------------------`

    `|   0 | SELECT STATEMENT    |             |`

    `|   1 |  HASH JOIN          |             |`

    `|   2 |   HASH JOIN         |             |`

    `|   3 |    TABLE ACCESS FULL| LOCATIONS   |`

    `|   4 |    TABLE ACCESS FULL| DEPARTMENTS |`

    `|   5 |   REMOTE            | EMPLOYEES   |`

    `-------------------------------------------`


    From the execution plan, we can see that the `EMPLOYEES` table is the remote table.
    What this means is before the join to the employee data can occur, all of that
    employee data must be brought over to the local database before the query can
    be completed. In this case, the employee data is by far the largest table of the
    three. There are far more employees than there are departments or locations, and
    therefore a large volume of data will be brought over to the local database before
    the remainder of the query can be processed. So, in this case, performance many
    improve by having the work done on the database where the employee data resides:


    `SELECT /*+ driving_site(employees) */`

    `first_name, last_name, department_name, street_address, city`

    `FROM employees@to_emp_link JOIN departments USING(department_id)`

    `JOIN locations USING (location_id);`


    `---------------------------------------------------------------`

    `| Id  | Operation                | Name                       |`

    `---------------------------------------------------------------`

    `|   0 | SELECT STATEMENT REMOTE  |                            |`

    `|   1 |   HASH JOIN              |                            |`

    `|   2 |    VIEW                  | index$_join$_001           |`

    `|   3 |     HASH JOIN            |                            |`

    `|   4 |      INDEX FAST FULL SCAN| EMP_DEPARTMENT_IX          |`

    `|   5 |      INDEX FAST FULL SCAN| EMP_NAME_IX                |`

    `|   6 |    HASH JOIN             |                            |`

    `|   7 |     REMOTE               | DEPARTMENTS                |`

    `|   8 |     REMOTE               | LOCATIONS                  |`

    `---------------------------------------------------------------`


    Now the explain plan shows the two smaller tables as remote tables, since the
    database where the `EMPLOYEES` table resides is now the driving site for the query.
    Sometimes you may simply need to determine this by trial and error, when it is
    not obvious which site should be the driving site.


    Another easy way to determine this is simply by determining which query returns
    faster. If we want to get the average salary for each department and location,
    the query would look like the following:


    `SELECT department_name, city, avg(salary)`

    `FROM employees_big@to_emp_link JOIN departments USING(department_id)`

    `JOIN locations USING (location_id)`

    `GROUP BY department_name, city`

    `ORDER BY 2,1;`

    `DEPARTMENT_NAME                CITY                           AVG(SALARY)`

    `------------------------------ ------------------------------ -----------`

    `Human Resources                London                                6500`

    `Public Relations               Munich                               10000`

    `Sales                          Oxford                          8955.88235`

    `Accounting                     Seattle                              10150`

    `Administration                 Seattle                               4400`

    `Executive                      Seattle                         19333.3333`

    `Finance                        Seattle                               8600`

    `Purchasing                     Seattle                               4150`

    `Shipping                       South San Francisco             3475.55556`

    `IT                             Southlake                             5760`

    `Marketing                      Toronto                               9500`


    `11 rows selected.`


    **`Elapsed: 00:00:42.87`**


    Since no driving site hint is specified, the local site is the driving site. If
    we issue the same query specifying the remote and larger table to be the driving
    site, we see a benefit simply from the time the query takes to execute:


    `SELECT /*+ driving_site(employees_big) */ department_name, city, avg(salary)`

    `FROM employees_big@to_emp_link JOIN departments USING(department_id)`

    `JOIN locations USING (location_id)`

    `GROUP BY department_name, city`

    `ORDER BY 2,1;`


    **`Elapsed: 00:00:22.24`**


    One more way you can try to determine which site should be the driving site is
    by figuring out exactly what work is being performed on each site. For example,
    using the foregoing query as an example, if we do not use the hint, perform the
    following:


    1.  Retrieve an explain plan for the query.

    2.  On the remote database, determine what part of the query is running remotely.


    First, we can see the execution plan of our query. Again, we are not using the
    `driving_site` hint.


    `----------------------------------------------`

    `| Id  | Operation            | Name          |`

    `----------------------------------------------`

    `|   0 | SELECT STATEMENT     |               |`

    `|   1 |  SORT GROUP BY       |               |`

    `|   2 |   HASH JOIN          |               |`

    `|   3 |    HASH JOIN         |               |`

    `|   4 |     TABLE ACCESS FULL| LOCATIONS     |`

    `|   5 |     TABLE ACCESS FULL| DEPARTMENTS   |`

    `|   6 |    REMOTE            | EMPLOYEES_BIG |`

    `----------------------------------------------`


    Second, we can determine that the operation occurring on the remote database is
    the `SELECT` statement and columns for the remote `EMPLOYEES_BIG` table. You can
    retrieve this information directly from the data dictionary on the remote database,
    or a tool such as Enterprise Manager.


    `SELECT "SALARY","DEPARTMENT_ID"`

    `FROM "EMPLOYEES_BIG" "EMPLOYEES_BIG"`


    If we repeat the foregoing two steps with the same query, only this time we insert
    a `driving_site` hint for the `EMPLOYEES` table, we get the following results.
    First, we can get the execution plan of our query with the `driving_site` hint:


    `-------------------------------------------------------------`

    `| Id  | Operation              | Name                       |`

    `-------------------------------------------------------------`

    `|   0 | SELECT STATEMENT REMOTE|                            |`

    `|   1 |  RESULT CACHE          | 326m75n1yb5kt2qysx7f37cy2y |`

    `|   2 |   SORT GROUP BY        |                            |`

    `|   3 |    HASH JOIN           |                            |`

    `|   4 |     HASH JOIN          |                            |`

    `|   5 |      REMOTE            | LOCATIONS                  |`

    `|   6 |      REMOTE            | DEPARTMENTS                |`

    `|   7 |     TABLE ACCESS FULL  | EMPLOYEES_BIG              |`

    `-------------------------------------------------------------`


    Second, we can see which part of the query is being performed on the remote site.
    In this case, the data was retrieved from Enterprise Manager:


    `SELECT "A2"."DEPARTMENT_NAME","A1"."CITY",AVG("A3"."SALARY")`

    `FROM "EMPLOYEES_BIG" "A3","DEPARTMENTS"@! "A2","LOCATIONS"@! "A1"`

    `WHERE "A2"."LOCATION_ID"="A1"."LOCATION_ID" AND "A3"."DEPARTMENT_ID"="A2"."DEPARTMENT_ID"`

    `GROUP BY "A2"."DEPARTMENT_NAME","A1"."CITY" ORDER BY "A1"."CITY","A2"."DEPARTMENT_NAME"`


    Without the driving site hint, we had to move all rows for the `EMPLOYEES_BIG`
    table for the `SALARY` and `DEPARTMENT_ID` columns. After transporting this data,
    the query results could be processed.


    With the `driving_site` hint, we had to move all rows for all columns of the `DEPARTMENTS`
    and `LOCATIONS` table to the remote database. Then, the query results could be
    processed. And, because we used the `driving_site` hint, after the query results
    were compiled, the complete result set had to be transported to the local database.
    Therefore, you need to factor in not only the data moving between databases for
    the query itself, but also, if you are using the `driving_site` hint, the results
    themselves being transported back to the local database where the query originated.'
  trans: '## 工作原理


    分布式查询可能是一把双刃剑。通过能够连接来自远程数据库的表，它给用户带来数据透明性的印象，即他们需要检索的数据仿佛位于一个地方，因为他们可以编写单个查询来检索数据，而实际上这些数据可能驻留在两个或多个数据库中。这种简化查询编写的能力是执行分布式查询的一个关键优势。主要的缺点在于分布式查询的优化非常困难。本质上，发起查询的源数据库或本地数据库默认成为“驱动”数据库。本地站点的优化器不了解远程站点数据的构成或数量，因此工作被分割成若干部分，默认情况下查询不会作为一个整体进行优化。因此，理解每个数据库上数据的构成非常重要，以便尝试最佳地优化查询。对于分布式查询，你需要做出的关键决策是：你希望哪个数据库作为“驱动”站点。决定哪个站点应作为驱动站点的最大因素如下：


    *   分布式查询涉及多少张表？

    *   分布式查询涉及多少个数据库？

    *   哪个数据库包含查询涉及的表最多？

    *   哪个数据库包含的数据量最大？


    本质上，如果大部分表或大量数据驻留在远程，那么使用远程数据库作为驱动站点可能是有益的。假设我们要连接三个表，以获取员工信息及其所在部门和工作地址。在此场景中，最大的员工表驻留在一个数据库上，而两个较小的表——部门表和位置表——驻留在我们的本地数据库上：


    ```

    SELECT first_name, last_name, department_name, street_address, city

    FROM employees@to_emp_link JOIN departments USING(department_id)

    JOIN locations USING (location_id);

    -------------------------------------------

    |  Id  | Operation           | Name        |

    -------------------------------------------

    |    0 | SELECT STATEMENT    |             |

    |    1 |  HASH JOIN          |             |

    |    2 |   HASH JOIN         |             |

    |    3 |    TABLE ACCESS FULL| LOCATIONS   |

    |    4 |    TABLE ACCESS FULL| DEPARTMENTS |

    |    5 |   REMOTE            | EMPLOYEES   |

    -------------------------------------------

    ```


    从执行计划中，我们可以看到`EMPLOYEES`表是远程表。这意味着在连接员工数据之前，所有这些员工数据都必须先传输到本地数据库，然后查询才能完成。在此情况下，员工数据是三者中最大的表。员工数量远多于部门或位置数量，因此在处理查询的剩余部分之前，会有大量数据被传输到本地数据库。所以，在这种情况下，通过让工作在员工数据所在的数据库上完成，性能可能会有所提升：


    ```

    SELECT /*+ driving_site(employees) */

    first_name, last_name, department_name, street_address, city

    FROM employees@to_emp_link JOIN departments USING(department_id)

    JOIN locations USING (location_id);


    ---------------------------------------------------------------

    |  Id  | Operation                | Name                       |

    ---------------------------------------------------------------

    |    0 | SELECT STATEMENT REMOTE  |                            |

    |    1 |   HASH JOIN              |                            |

    |    2 |    VIEW                  | index$_join$_001           |

    |    3 |     HASH JOIN            |                            |

    |    4 |      INDEX FAST FULL SCAN| EMP_DEPARTMENT_IX          |

    |    5 |      INDEX FAST FULL SCAN| EMP_NAME_IX                |

    |    6 |    HASH JOIN             |                            |

    |    7 |     REMOTE               | DEPARTMENTS                |

    |    8 |     REMOTE               | LOCATIONS                  |

    ---------------------------------------------------------------

    ```


    现在，执行计划显示两个较小的表为远程表，因为`EMPLOYEES`表所在的数据库现在是查询的驱动站点。有时，当哪个站点应作为驱动站点不明显时，你可能需要通过试错来确定。


    另一种简单的方法是直接判断哪个查询返回更快。如果我们想获取每个部门和位置的平均工资，查询如下所示：


    ```

    SELECT department_name, city, avg(salary)

    FROM employees_big@to_emp_link JOIN departments USING(department_id)

    JOIN locations USING (location_id)

    GROUP BY department_name, city

    ORDER BY 2,1;

    DEPARTMENT_NAME                CITY                           AVG(SALARY)

    ------------------------------ ------------------------------ -----------

    Human Resources                London                                  6500

    Public Relations               Munich                                 10000

    Sales                          Oxford                           8955.88235

    Accounting                     Seattle                               10150

    Administration                 Seattle                                4400

    Executive                      Seattle                          19333.3333

    Finance                        Seattle                                8600

    Purchasing                     Seattle                                4150

    Shipping                       South San Francisco              3475.55556

    IT                             Southlake                             5760

    Marketing                      Toronto                                9500


    11 rows selected.

    ```


    `Elapsed: 00:00:42.87`


    由于没有指定驱动站点提示，本地站点是驱动站点。如果我们发出相同的查询，但指定远程且更大的表作为驱动站点，我们仅仅从查询执行时间上就能看到好处：


    ```

    SELECT /*+ driving_site(employees_big) */ department_name, city, avg(salary)

    FROM employees_big@to_emp_link JOIN departments USING(department_id)

    JOIN locations USING (location_id)

    GROUP BY department_name, city

    ORDER BY 2,1;

    ```


    `Elapsed: 00:00:22.24`


    另一种可以尝试确定哪个站点应作为驱动站点的方法是，弄清楚在每个站点上具体执行了什么工作。例如，以前面的查询为例，如果我们不使用提示，则执行以下步骤：


    1.  获取查询的执行计划。

    2.  在远程数据库上，确定查询的哪部分正在远程运行。


    首先，我们可以查看查询的执行计划。再次说明，我们没有使用`driving_site`提示。


    ```

    ----------------------------------------------

    |  Id  | Operation            | Name          |

    ----------------------------------------------

    |    0 | SELECT STATEMENT     |               |

    |    1 |  SORT GROUP BY       |               |

    |    2 |   HASH JOIN          |               |

    |    3 |    HASH JOIN         |               |

    |    4 |     TABLE ACCESS FULL| LOCATIONS     |

    |    5 |     TABLE ACCESS FULL| DEPARTMENTS   |

    |    6 |    REMOTE            | EMPLOYEES_BIG |

    ----------------------------------------------

    ```


    其次，我们可以确定在远程数据库上发生的操作是针对远程`EMPLOYEES_BIG`表的`SELECT`语句和列。你可以直接从远程数据库的数据字典或诸如 Enterprise
    Manager 之类的工具中检索此信息。


    ```

    SELECT "SALARY","DEPARTMENT_ID"

    FROM "EMPLOYEES_BIG" "EMPLOYEES_BIG"

    ```


    如果我们使用相同的查询重复前述两个步骤，但这次为`EMPLOYEES`表插入一个`driving_site`提示，我们会得到以下结果。首先，我们可以获取带有`driving_site`提示的查询的执行计划：


    ```

    -------------------------------------------------------------

    |  Id  | Operation              | Name                       |

    -------------------------------------------------------------

    |    0 | SELECT STATEMENT REMOTE|                            |

    |    1 |  RESULT CACHE          | 326m75n1yb5kt2qysx7f37cy2y |

    |    2 |   SORT GROUP BY        |                            |

    |    3 |    HASH JOIN           |                            |

    |    4 |     HASH JOIN          |                            |

    |    5 |      REMOTE            | LOCATIONS                  |

    |    6 |      REMOTE            | DEPARTMENTS                |

    |    7 |      TABLE ACCESS FULL | EMPLOYEES_BIG              |

    -------------------------------------------------------------

    ```


    其次，我们可以看到查询的哪部分正在远程站点上执行。此案例中，数据是从 Enterprise Manager 检索的：


    ```

    SELECT "A2"."DEPARTMENT_NAME","A1"."CITY",AVG("A3"."SALARY")

    FROM "EMPLOYEES_BIG" "A3","DEPARTMENTS"@! "A2","LOCATIONS"@! "A1"

    WHERE "A2"."LOCATION_ID"="A1"."LOCATION_ID" AND "A3"."DEPARTMENT_ID"="A2"."DEPARTMENT_ID"

    GROUP BY "A2"."DEPARTMENT_NAME","A1"."CITY" ORDER BY "A1"."CITY","A2"."DEPARTMENT_NAME"

    ```


    没有驱动站点提示时，我们必须移动`EMPLOYEES_BIG`表的所有行，包括`SALARY`和`DEPARTMENT_ID`列。传输完这些数据后，才能处理查询结果。


    使用了`driving_site`提示后，我们必须将`DEPARTMENTS`和`LOCATIONS`表的所有列的所有行移动到远程数据库。然后，才能处理查询结果。并且，因为我们使用了`driving_site`提示，查询结果编译完成后，完整的最终结果集必须被传输回发起查询的本地数据库。因此，你不仅需要考虑查询本身在数据库之间移动的数据，还需要考虑，如果你使用了`driving_site`提示，结果本身被传输回本地数据库的开销。'
- fmt: '### 14-11. 收集扩展的查询执行统计信息


    #### 问题


    你想要为特定查询收集扩展的执行计划统计信息，同时不希望在收集信息期间对整个数据库实例的性能产生不利影响。


    #### 解决方案


    你可以使用 `GATHER_PLAN_STATISTICS` 提示。如果在运行时将其放入查询中，它将生成扩展的运行时统计信息。这是一个两步过程：


    1.  使用 `gather_plan_statistics` 提示执行查询。

    2.  使用 `dbms_xplan.display_cursor` 来显示结果。


    请参见以下示例：


    ```sql

    SELECT /*+ gather_plan_statistics */

    city, round(avg(salary)) avg, min(salary) min, max(salary) max

    FROM employees JOIN departments USING (department_id)

    JOIN locations USING (location_id)

    GROUP BY city;

    ```


    ```text

    CITY                                          AVG        MIN        MAX

    ----------------------------------- ---------- ---------- ----------

    London                                       6500       6500       6500

    Seattle                                      8844       2500      24000

    Munich                                      10000      10000      10000

    South San Francisco                          3476       2100       8200

    Toronto                                      9500       6000      13000

    Southlake                                    5760       4200       9000

    Oxford                                       8956       6100      14000

    ```


    然后，你可以使用 `dbms_xplan` 来显示扩展的查询统计信息。确保 SQL Plus 的 `SERVEROUTPUT` 设置为 `OFF`，否则结果可能无法正确显示。


    ```sql

    SELECT * FROM table(dbms_xplan.display_cursor(format=>''ALLSTATS LAST''));

    ```


    ```text

    ------------------------------------------------------------------------------------------

    | Id  | Operation                   | Name          | Starts | E-Rows | A-Rows
    |  Buffers |

    ------------------------------------------------------------------------------------------

    |   0 | SELECT STATEMENT            |               |      2 |        |     14
    |       23 |

    |   1 |   HASH GROUP BY             |               |      0 |     23 |      0
    |       23 |

    |*  2 |    HASH JOIN                |               |      0 |    106 |      0
    |       23 |

    |*  3 |     HASH JOIN               |               |      0 |     27 |      0
    |       16 |

    |   4 |      VIEW                   | index$_join$_4|      0 |     23 |      0
    |        8 |

    |*  5 |       HASH JOIN             |               |      0 |        |      0
    |        8 |

    |   6 |        INDEX FAST FULL SCAN | LOC_CITY_IX   |      0 |     23 |      0
    |        4 |

    |   7 |        INDEX FAST FULL SCAN | LOC_ID_PK     |      0 |     23 |      0
    |        4 |

    |   8 |      VIEW                   | index$_join$_2|      0 |     27 |      0
    |        8 |

    |*  9 |       HASH JOIN             |               |      0 |        |      0
    |        8 |

    |  10 |        INDEX FAST FULL SCAN | DEPT_ID_PK    |      0 |     27 |      0
    |        4 |

    |  11 |        INDEX FAST FULL SCAN | DEPT_LOC_IX   |      0 |     27 |      0
    |        4 |

    |  12 |      TABLE ACCESS FULL      | EMPLOYEES     |      0 |    107 |      0
    |        7 |

    ------------------------------------------------------------------------------------------

    ```


    使用 `DISPLAY_CURSOR` 过程还有许多其他可用选项；更完整的选项列表请参阅《Oracle PL/SQL Packages and Types
    Reference Guide》。


    #### 工作原理


    `GATHER_PLAN_STATISTICS` 提示收集运行时统计信息；因此需要执行查询才能收集这些信息。如果你有一个查询的优化级别表现不佳，使用 `GATHER_PLAN_STATISTICS`
    提示运行该查询可能很有用。它可以快速提供普通执行计划无法提供的信息，因为它显示了查询统计信息的估计值和实际值。由此，你可以确定优化器是否以最优方式执行 SQL，并判断是否需要任何优化。


    请记住，收集这些额外的运行时统计信息需要消耗一些资源，因此请谨慎使用此选项。在某些情况下，测试运行时差异可能是值得的。此提示的一个关键好处是，额外的统计信息仅针对特定查询收集。这样，范围是有限的，不会影响数据库中的其他进程，甚至不会影响特定的会话。如果你想要一个更全局的设置来收集扩展统计信息，可以在会话或实例级别设置
    `STATISTICS_LEVEL=ALL`。


    一组需要快速查看的列是 `E-Rows` 和 `A-Rows` 列。通过查看这些列，你可以快速判断优化器是否基于准确的统计信息执行查询。如果这些列之间存在较大差异，则表明执行计划效率低下。进行准确分析所需的一个计算是针对
    `E-Rows` 列的。你需要将 `Starts` 列与 `E-Rows` 相乘，才能准确地将总数与 `A-Rows` 进行比较。


    ### 14-12. 启用查询重写


    #### 问题


    你的数据库环境中存在物化视图，并且希望访问构成这些物化视图的源表的查询能够直接访问物化视图以检索结果。


    #### 解决方案


    可以使用 `REWRITE` 提示来指示优化器使用物化视图。物化视图必须启用查询重写功能，并且物化视图和相关对象的统计信息应是最新的，以增加查询被重写的可能性。请参见以下示例：


    ```sql

    SELECT /*+ rewrite(dept_sal_mv) */ department_id,

    sum(nvl(salary+(salary*commission_pct),salary)) total_compensation

    FROM employees

    GROUP BY department_id

    having sum(nvl(salary+(salary*commission_pct),salary)) > 10000

    ORDER by 2;

    ```


    在这里我们可以看到，优化器在执行计划中使用了物化视图，而不是处理整个查询并重新计算汇总：


    ```text

    -----------------------------------------------------

    | Id  | Operation                       | Name        |

    -----------------------------------------------------

    |   0 | SELECT STATEMENT                |             |

    |   1 |  SORT ORDER BY                  |             |

    |   2 |   MAT_VIEW REWRITE ACCESS FULL  | DEPT_SAL_MV |

    -----------------------------------------------------

    ```'
  raw: '### 14-11. Gathering Extended Query Execution Statistics


    #### Problem


    You want to gather extended explain plan statistics for a specific query, and
    do not want to adversely affect performance for an entire database instance while
    gathering this information.


    #### Solution


    You can use the `GATHER_PLAN_STATISTICS` hint, which, if placed within a query
    at runtime, will generate extended runtime statistics. It is a two-step process:


    1.  Execute the query with the `gather_plan_statistics` hint.

    2.  Use `dbms_xplan.display_cursor` to display the results.


    See the following example:


    `SELECT /*+ gather_plan_statistics */`

    `city, round(avg(salary)) avg, min(salary) min, max(salary) max`

    `FROM employees JOIN departments USING (department_id)`

    `JOIN locations USING (location_id)`

    `GROUP BY city;`


    `CITY                                  AVG        MIN        MAX`

    `------------------------------ ---------- ---------- ----------`

    `London                               6500       6500       6500`

    `Seattle                              8844       2500      24000`

    `Munich                              10000      10000      10000`

    `South San Francisco                  3476       2100       8200`

    `Toronto                              9500       6000      13000`

    `Southlake                            5760       4200       9000`

    `Oxford                               8956       6100      14000`


    Then, you can use `dbms_xplan` to display the extended query statistics. Ensure
    that the SQL Plus setting `SERVEROUTPUT` is set to `OFF`, else results will not
    be properly displayed.


    `SELECT * FROM table(dbms_xplan.display_cursor(format=>''ALLSTATS LAST''));`


    `------------------------------------------------------------------------------------------`

    `| Id  | Operation                  | Name          | Starts | E-Rows | A-Rows
    |  Buffers |`

    `------------------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT           |               |      2 |        |      14|       23 |`

    `|   1 |   HASH GROUP BY            |               |      0 |     23 |       0|       23 |`

    `|*  2 |    HASH JOIN               |               |      0 |    106 |       0|       23 |`

    `|*  3 |     HASH JOIN              |               |      0 |     27 |       0|       16 |`

    `|   4 |      VIEW                  | index$_join$_4|      0 |     23 |       0|        8 |`

    `|*  5 |       HASH JOIN            |               |      0 |        |       0|        8 |`

    `|   6 |        INDEX FAST FULL SCAN| LOC_CITY_IX   |      0 |     23 |       0|        4 |`

    `|   7 |        INDEX FAST FULL SCAN| LOC_ID_PK     |      0 |     23 |       0|        4 |`

    `|   8 |      VIEW                  | index$_join$_2|      0 |     27 |       0|        8 |`

    `|*  9 |       HASH JOIN            |               |      0 |        |       0|        8 |`

    `|  10 |        INDEX FAST FULL SCAN| DEPT_ID_PK    |      0 |     27 |       0|        4 |`

    `|  11 |        INDEX FAST FULL SCAN| DEPT_LOC_IX   |      0 |     27 |       0|        4 |`

    `|  12 |     TABLE ACCESS FULL      | EMPLOYEES     |      0 |    107 |       0|        7 |`

    `------------------------------------------------------------------------------------------`


    There are many other options available using the `DISPLAY_CURSOR` procedure; refer
    to the Oracle PL/SQL Packages and Types Reference Guide for a more complete listing
    of these options.


    #### How It Works


    The `GATHER_PLAN_STATISTICS` hint gathers runtime statistics; therefore the query
    needs to be executed in order to gather these statistics. If you already have
    a query that is performing at a substandard optimization level, it may be useful
    to run your query with the `GATHER_PLAN_STATISTICS` hint. This can quickly give
    you information that you simply do not have with a normal explain plan, as it
    shows you estimated and actual information regarding query statistics. From this,
    you can determine if the optimizer is optimally executing the SQL, and you can
    determine if any optimization is needed.


    Keep in mind that it does take some resources in order to gather these extra runtime
    statistics, so use this option with care. It may even be worthwhile to test the
    runtime differences in some cases. One key benefit of this hint is that the extra
    statistics are gathered only for the specific query. That way, the scope is limited
    and has no effect on other processes in the database, or even a particular session.
    If you wanted a more global setting to gather extended statistics, you can set
    `STATISTICS_LEVEL=ALL` at the session or instance level. One quick set of columns
    to review are the E-Rows and A-Rows columns. By looking at these columns, you
    can quickly tell if the optimizer is executing the query based on accurate statistics.
    If there is a large discrepancy between these columns, it is a sign of an inefficient
    execution plan. The one needed calculation for an accurate analysis is for the
    E-Rows column. You need to multiply the Starts column with E-Rows to accurately
    compare the total with A-Rows.


    ### 14-12\. Enabling Query Rewrite


    #### Problem


    You have materialized views in your database environment, and want to have queries
    that access the source tables that make up the materialized views go against the
    materialized views directly to retrieve the results.


    #### Solution


    The `REWRITE` hint can be used to direct the optimizer to use a materialized view.
    The materialized view must have query rewrite enabled, and statistics for the
    materialized view and the associated objects should be current to increase the
    likelihood for a query to be rewritten. See the following example:


    `SELECT /*+ rewrite(dept_sal_mv) */ department_id,`

    `sum(nvl(salary+(salary*commission_pct),salary)) total_compensation`

    `FROM employees`

    `GROUP BY department_id`

    `having sum(nvl(salary+(salary*commission_pct),salary)) > 10000`

    `ORDER by 2;`


    We can see here that the optimizer used the materialized view in the execution
    plan, rather than processing the entire query and recalculating the summary:


    `-----------------------------------------------------`

    `| Id  | Operation                     | Name        |`

    `-----------------------------------------------------`

    `|   0 | SELECT STATEMENT              |             |`

    `|   1 |  SORT ORDER BY                |             |`

    `|   2 |   MAT_VIEW REWRITE ACCESS FULL| DEPT_SAL_MV |`

    `-----------------------------------------------------`'
