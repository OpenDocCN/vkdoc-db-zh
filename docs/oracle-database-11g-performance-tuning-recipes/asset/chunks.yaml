- fmt: '## How It Works


    In order to effectively use parallel hints, you need to take the following items
    into consideration:

    *   The number of tables in your query

    *   The size of table(s) in your query

    *   The number of CPUs on your system

    *   The filtering columns in your `WHERE` clause

    *   What columns are indexed, if any


    You also must analyze and understand three key components of your system prior
    to using parallel hints in queries:

    *   System configuration, such as amount of memory and CPUs, and even disk configuration

    *   Database configuration parameters related to parallelism

    *   The DOP specified on the objects themselves (tables and indexes)


    Parallel SQL must be used with caution, as it is common to overuse, and can cause
    an over-utilization of system resources, which ultimately results in `slower`
    rather than faster performance. Overuse is a very common mistake in the use of
    parallelism.


    Depending on the number of tables in your query, you may want to place parallelism
    on one or more of the tables—depending on their size. A general rule of thumb
    is that if a table contains more than 10 million rows, or is at least 2 gigabytes
    in size, it may be a viable candidate for using parallelism.


    The degree of parallelism (DOP) should be directly related to the number of CPUs
    on your system. If you have a single-CPU system, there is little, if any, benefit
    of using parallel SQL, and the result could very well be returned slower than
    if no parallelism was used at all.


    To help determine if you can use parallelism on any indexes, you need to first
    determine if any of the filtering columns in your `WHERE` clause are indexed.
    If so, check to see if the table is partitioned. Typically, then, for a query
    on a large table, a `parallel_index` hint may help the speed of your query. Overall,
    when trying to determine whether to use parallelism for your query, it''s helpful
    to perform an explain plan to determine if parallelism will be used. Also, there
    may be parallelism already specified for an object within your query, so it is
    also a good idea to check the `DEGREE` column in the `USER_TABLES` or `USER_INDEXES`
    view prior to checking the degree of parallelism within a hint.


    [Table 15-1](#Chapter15.html#tab_15_1) shows the different parallel hints that
    can be used.


    ![images](images/t1501.jpg)


    There are many options Oracle gives you to help you determine a proper DOP, and
    whether you want to specify it yourself, or you want Oracle to determine the DOP
    for your query. [Table 15-2](#Chapter15.html#tab_15_2) briefly describes these
    options.


    ![images](images/t1502.jpg)


    ### Parallel Hints for Tables


    In order to determine if parallelism is being used in your query, first perform
    an explain plan on your query. The following are a simple query and its associated
    execution plan:


    ```

    select * from emp;

    ```


    ```

    --------------------------------------------------------------------------

    | Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |

    --------------------------------------------------------------------------

    |   0 | SELECT STATEMENT  |      |    14 |  1218 |     3   (0)| 00:00:01 |

    |   1 |  TABLE ACCESS FULL| EMP  |    14 |  1218 |     3   (0)| 00:00:01 |

    --------------------------------------------------------------------------

    ```


    If parallelism isn''t being used, you can insert the parallel hint, and then rerun
    the explain plan to verify that the optimizer will use parallelism in the execution
    plan—for example:


    ```

    select /*+ parallel(emp,4) */ * from emp;

    ```


    ```

    ----------------------------------------------------------------------

    | Id  | Operation            | Name     |    TQ  |IN-OUT| PQ Distrib |

    ----------------------------------------------------------------------

    |   0 | SELECT STATEMENT     |          |        |      |            |

    |   1 |  PX COORDINATOR      |          |        |      |            |

    |   2 |   PX SEND QC (RANDOM)| :TQ10000 |  Q1,00 | P->S | QC (RAND)  |

    |   3 |    PX BLOCK ITERATOR |          |  Q1,00 | PCWC |            |

    |   4 |     TABLE ACCESS FULL| EMP      |  Q1,00 | PCWP |            |

    ----------------------------------------------------------------------

    ```


    ![images](images/square.jpg) `Note` The proper database initialization parameters
    need to be properly set in order for parallelism to be enabled via the use of
    hints.


    ### Parallel Hints for Indexes


    Although it is far less common to parallelize index-based queries, it may be of
    benefit in certain circumstances. For example, you may want to parallelize the
    query against a local index that is part of a partitioned table. The following
    is an example query and the resulting execution plan:


    ```

    SELECT /*+ parallel_index(emp, emp_i3) */ empno, ename

    FROM emp

    WHERE hiredate between ''2010-01-01'' and ''2010-12-31'';

    ```


    ```

    ------------------------------------------------------------------------------------------

    | Id  | Operation                                    | Name             |    TQ  |IN-OUT|
    PQ Dist |

    ------------------------------------------------------------------------------------------

    |   0 | SELECT STATEMENT                             |                  |        |      |         |

    |   1 |  PX COORDINATOR                              |                  |        |      |         |

    |   2 |   PX SEND QC (RANDOM)                        | :TQ10000         |  Q1,00
    | P->S |         |

    |   3 |    PX PARTITION RANGE ITERATOR               |                  |  Q1,00
    | PCWC |         |

    |   4 |     TABLE ACCESS BY LOCAL INDEX ROWID        | EMP              |  Q1,00
    | PCWP |         |

    |   5 |      INDEX RANGE SCAN                        | EMP_I3           |  Q1,00
    | PCWP |         |

    ------------------------------------------------------------------------------------------

    ```


    When formatting the hint, you can specify all the parameters that tell the optimizer
    exactly which index to use, and what DOP you desire. In the following query, we''re
    telling the optimizer that we want to use the `EMP_I3` index, with a DOP of 4.


    ```

    SELECT /*+ parallel_index(emp, emp_i3, 4) */ empno, ename

    FROM emp

    WHERE hiredate between ''2010-01-01'' and ''2010-12-31'';

    ```


    If you omit the DOP from the hint, the optimizer determines the DOP based on the
    initialization parameter settings. For instance, in the following example, the
    table name and index name are specified in the hint, but the DOP is not specified.
    Oracle will compute the DOP for us in these cases.


    ```

    SELECT /*+ parallel_index(emp, emp_i3) */ empno, ename

    FROM emp

    WHERE hiredate between ''2010-01-01'' and ''2010-12-31'';

    ```


    You can also simply place the table name in the hint, and the optimizer will also
    determine which index, if any, can be used. If the optimizer determines that no
    index is suitable, then no index will be used. In the following example, only
    the table name is used in the hint:


    ```

    SELECT /*+ parallel_index(emp) */ empno, ename

    FROM emp

    WHERE hiredate between ''2010-01-01'' and ''2010-12-31'';

    ```


    ![images](images/square.jpg) `Note` As of Oracle 11g Release 2, the `NOPARALLEL`
    and `NOPARALLEL_INDEX` hints have been deprecated. Instead, use `NO_PARALLEL`
    and `NO_PARALLEL_INDEX`.


    ## 15-2. Enabling Parallelism at Object Creation


    ### Problem


    You have new tables to create in your database that will be growing to a very
    large size, and you want speed the queries against those tables.'
