    *   I/O 瓶颈\n\n如果你遇到数据库性能问题，ADDM 报告是首先寻找数据库瓶颈和问题区域的绝佳位置。ADDM 还会详细列出顶级资源消耗 SQL 语句，并就如何调优这些查询提出建议。\n"
- fmt: '## Execution Plan Optimization and Consistency


    An execution plan describes how Oracle will retrieve the data to satisfy the results
    of a query. When you submit a SQL statement, the query optimizer quickly produces
    several execution plans and will determine which plan is most efficient. In most
    scenarios, the prior behavior results in a well-performing execution plan. However,
    you will encounter situations where you know additional details about your environment
    and need to adjust the optimizer''s choice of an execution plan. Listed next are
    features you can use to influence the decision path the optimizer uses when selecting
    a plan:


    *   Initialization parameters

    *   Statistics

    *   Hints

    *   SQL profiles

    *   SQL plan management (plan baselines)

    *   Stored outlines (deprecated in favor of plan baselines)


    It''s critical you understand how these features affect the optimizer''s choice
    of an execution plan. When troubleshooting SQL performance problems, you must
    determine which of the prior features are enabled and how they influence query
    behavior. The performance of a SQL statement can vary drastically depending on
    which feature is implemented and the impact of the various combinations of features.


    Initialization parameters (that impact the optimizer) and statistics gathering
    are detailed in [Chapter 13](#Chapter13.html#ch13). Using hints is the emphasis
    of [Chapter 14](#Chapter14.html#ch14). The focus of this chapter is SQL profiles
    and plan baselines.


    *SQL profiles* are optionally generated corrections and improvements to statistics.
    The recommendation (and code) to implement a SQL profile is manifested through
    the output of the SQL Tuning Advisor. You can manually enable SQL profiles or
    configure them to be automatically accepted. SQL profiles help the optimizer derive
    better execution plans.


    *SQL plan management* allows you to store and manage execution plans within tables
    in the database. *Plan baselines* consist of one or more stored execution plans
    that have been accepted for a SQL query. When you run a query, and if a plan baseline
    exists for the query, the optimizer will give precedence to execution plans within
    the plan baseline. *Plan history* is the super set of both accepted and unaccepted
    execution plans for a query. You can manually change the state of an unaccepted
    plan to accepted (this moves it to the plan baseline). This is known as *evolving
    a plan baseline*.


    Plan baselines help ensure that the optimizer consistently chooses the same execution
    plan, regardless of changes in the database environment. Plan baselines provide
    the following benefits:


    *   Preserving performance when upgrading from one database version to another;
    in other words, helping ensure that the same execution plan is used for a query
    before and after the upgrade

    *   Keeping performance stable and consistent when data changes, or statistics
    are updated, or new SQL profiles become available

    *   Providing a mechanism for accepting more efficient executions plans as they
    become available (like a new index is added or a SQL profile becomes available)


    [Figure 12-1](#Chapter12.html#fig_12_1) displays the flow of choices that the
    optimizer makes when choosing an execution plan. Please take a few minutes to
    analyze this diagram and ensure you grasp how the various features influence the
    optimizer''s behavior. As you view the diagram, keep in mind the following:


    *   Hints are the only feature that requires a physical modification to the SQL
    query. All of the other techniques can be used to improve performance without
    changing the query.

    *   Initialization parameters, statistics, hints, SQL profiles, and plan baselines
    can all operate independently of each other. No one feature is dependent on the
    existence of another feature.

    *   The optimizer works fine with out-of-the-box settings. You don''t need any
    of these features (hints, SQL profiles, and so on) to be explicitly enabled. However,
    to get the maximum performance from SQL queries, we highly recommend you know
    when and how to use these features to help the query optimizer make optimal decisions.


    As you look at the skep-shaped diagram, to help understand how the optimizer chooses
    between the low-cost plan and a plan baseline plan, consider the general steps
    taken when formulating an execution plan:


    1.  The optimizer first considers initialization parameters, hints, and SQL profiles
    when choosing the lowest-cost plan.

    2.  Regardless of the plan arrived at in step 1, if a plan baseline exists for
    the query, the optimizer will choose the lowest-cost plan from the plan baseline.
    Additionally, the optimizer will give preference to plans that have a fixed state
    in the plan baseline.

    3.  If the accepted plans in the plan baseline are not reproducible (say an index
    has been dropped that all of the plan baseline plans depend on), then the optimizer
    chooses the lowest-cost plan generated in step 1\. Lowest cost in this situation
    means using the least amount of database resources such as CPU, I/O, and memory.

    4.  If a plan baseline exists for a query, and if the low-cost plan (from step
    1) has a lower cost than the plan from the plan baseline, then the low-cost plan
    is automatically added to the plan history for the query in an unaccepted state.
    You can choose to move plans from the plan history into the plan baseline so that
    the optimizer will consider them when choosing an execution plan. This provides
    you the flexibility to use better plans as they become available (evolving the
    plan).


    ![images](images/1201.jpg)


    **Figure 12-1.** Oracle database features influencing optimizer''s choice of execution
    plan


    Features such as initialization parameters and hints don''t require an extra license
    and are available with all editions of the Oracle database. Other features such
    as SQL profiles require an extra license and ship only with the Enterprise Edition.
    [Table 12-1](#Chapter12.html#tab_12_1) summarizes the characteristics of each
    query optimizer-influencing feature.


    ![images](images/t1201.jpg)


    The first part of this chapter focuses on managing SQL profiles. The rest of the
    chapter deals with the implementation and use of plan baselines. We describe practical
    and real-world examples of the use of these tools. Where appropriate, we also
    have added instructions on how to use a given feature via Enterprise Manager.


    ### 12-1. Creating and Accepting a SQL Profile


    #### Problem


    You have a poorly performing query, and you want to get advice from the SQL Tuning
    Advisor. You realize that the SQL Tuning Advisor may recommend that a SQL profile
    be applied to the problem query as part of the tuning recommendation.


    #### Solution


    Run the SQL Tuning Advisor for the problem query. Keep in mind that the SQL Tuning
    Advisor may or may not recommend a SQL profile as a solution for performance issues.
    To run the SQL Tuning Advisor manually, perform the following steps:


    1.  Use `DBMS_SQLTUNE` to create a tuning task.

    2.  Execute the tuning task.

    3.  Generate the tuning advice report.

    4.  If SQL profile is part of the tuning advice output, then create and accept.


    The following example follows the prior steps. In this scenario, the SQL Tuning
    Advisor recommends that a SQL profile be applied to the given query.


    ![images](images/square.jpg) **Tip** See [Chapter 11](#Chapter11.html#ch11) for
    complete details on creating SQL tuning tasks. [Chapter 11](#Chapter11.html#ch11)
    covers topics such as using the AWR, memory, or SQL tuning sets as the source
    of SQL for a tuning task.'
