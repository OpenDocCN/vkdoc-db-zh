    If we simply want to see a zero in the commission column for employees not eligible
    for a commission, we can use the `NVL` function to accomplish this:


    **`SELECT ename , sal , NVL(comm,0) comm`**

    `FROM emp`

    `ORDER BY ename;`


    `ENAME             SAL       COMM`

    `---------- ---------- ----------`

    `ADAMS            1100          0`

    `ALLEN            1600        300`

    `BLAKE            2850          0`

    `KING             5000          0`

    `MARTIN           1250       1400`


    If we decide to perform arithmetic on a null value, the result will always be
    null; therefore if we want to compute “Total Compensation” as salary plus commission,
    we must apply the `NVL` function to properly compute this with consideration of
    the null values. In the following example, we compute the sum of these columns,
    both with and without the `NVL` function. Without using `NVL`, we get an incorrect
    result, which can be seen in the `TOTAL_COMP_NO_NVL` output field:


    `SELECT ename , sal , nvl(comm,0) comm, sal+comm total_comp_no_nvl,`

    **`sal+NVL(comm,0) total_comp_nvl`**

    `FROM emp`

    `ORDER BY ename;`


    `ENAME             SAL       COMM TOTAL_COMP_NO_NVL TOTAL_COMP_NVL`

    `---------- ---------- ---------- ----------------- --------------`

    `ADAMS            1100          0                             1100`

    `ALLEN            1600        300              1900           1900`

    `BLAKE            2850          0                             2850`

    `KING             5000          0                             5000`

    `MARTIN           1250       1400              2650           2650`


    The `NVL2` is similar to `NVL`, except that `NVL2` takes in three arguments—the
    value or column, the value to return if the column is not null, and finally the
    value to return if the column is null. For instance, if we use the same foregoing
    example when determining if an employee gets a commission, we simply want to assign
    a value to each employee stating whether he or she is a “commissioned” or “non-commissioned”
    employee. We can accomplish this with the `NVL2` function:


    `SELECT ename , sal ,`

    **`NVL2(comm,''Commissioned'',''Non-Commissioned'') comm_status`**

    `FROM emp`

    `ORDER BY ename;`


    `ENAME             SAL COMM_STATUS`

    `---------- ---------- ----------------`

    `ADAMS            1100 Non-Commissioned`

    `ALLEN            1600 Commissioned`

    `BLAKE            2850 Non-Commissioned`

    `KING             5000 Non-Commissioned`

    `MARTIN           1250 Commissioned`


    ##### Handling Nulls in the WHERE Clause


    Within the `WHERE` clause, if you simply want to check a column to see if it contains
    a null value, use `IS NULL` or `IS NOT NULL` as the comparison operator—for example:


    `SELECT ename , sal`

    `FROM emp`

    **`WHERE comm IS NULL`**

    `ORDER BY ename;`


    `ENAME             SAL`

    `---------- ----------`

    `ADAMS            1100`

    `BLAKE            2850`

    `KING             5000`


    `SELECT ename , sal`

    `FROM emp`

    **`WHERE comm IS NOT NULL`**

    `ORDER BY ename;`


    `ENAME             SAL`

    `---------- ----------`

    `ALLEN            1600`

    `MARTIN           1250`


    You can also use the `NVL` or `NVL2` function in the `WHERE` clause just as it
    was used in the `SELECT` statement:


    `SELECT ename , sal`

    `FROM emp`

    **`WHERE NVL(comm,0) = 0`**

    `ORDER BY ename;`


    `ENAME             SAL`

    `---------- ----------`

    `ADAMS            1100`

    `BLAKE            2850`

    `KING             5000`


    #### How It Works


    It is best to always explicitly handle the possibility of null values, so if a
    column of a table is nullable, assume nulls exist, else output results can be
    undesired or unpredictable. One quick check that can be made to determine if a
    column has null values is to compare a count of rows in the table (`COUNT *`)
    to a count of rows for that column (`COUNT <column_name>`).  A count on a nullable
    column will count only those rows that do not have null values. Here''s an example:


    `SELECT count(*) FROM emp;`


    `  COUNT(*)`

    `----------`

    `        14`


    `SELECT count(comm) FROM emp;`


    `COUNT(COMM)`

    `-----------`

    `          4`


    This technique of comparing row count to a count of values in a column is a handy
    way to check if nulls exist in a column.


    Another very useful function that can be used in the handling of null values is
    the `COALESCE` function. With `COALESCE`, you can pass in a series of values,
    and the function will return the first non-`NULL` value. If all values within
    `COALESCE` are `NULL`, a `NULL` value is returned. Here is a simple example:


    `SELECT coalesce(NULL,''ABC'',''DEF'') FROM dual;`


    `COA`

    `---`

    `ABC`


    Let''s say you wanted to get the shipping address for your customers, and if none
    were present, you would then get the billing address. Using `COALESCE`, you could
    achieve this as shown in the following example:


    `SELECT COALESCE(`

    `(SELECT shipping_address FROM customers`

    `WHERE cust_id = 9342),`

    `(SELECT billing_address FROM customers`

    `WHERE cust_id = 9342))`

    `FROM dual;`


    All arguments used in a statement with `COALESCE` must be with the same datatype,
    else you will receive an error, as shown here:


    `SELECT coalesce(NULL,123,''DEF'') FROM dual;`

    `                         *`

    `ERROR at line 1:`

    `ORA-00932: inconsistent datatypes: expected NUMBER got CHAR`


    ### 8-12. Searching for Partial Column Values


    #### Problem


    You need to search for a string from a column in the database, but do not know
    the exact value of the column data.'
  trans: "# 在 SELECT 子句中处理空值\n\n在`SELECT`子句中，如果你正在处理包含空值的列数据，有两种 Oracle 提供的函数可以在 SQL\
    \ 中使用，以将空值转换为更可用的形式。这两个函数是`NVL`和`NVL2`。\n\n![图片](img/square.jpg) 实际上，不仅仅只有`NVL`和`NVL2`这两个函数。然而，它们被广泛使用，是一个很好的起点。\n\
    \n使用`NVL`时，你只需传入列名，以及一个基于该值在数据库中是否为空而你想输出的值。例如，在我们的 employees 表中，并非所有员工都根据其职位获得佣金，该列中这些员工的值为空：\n\
    \n```\nSELECT ename, sal, comm\nFROM emp\nORDER BY ename;\n```\n\n```\nENAME \
    \             SAL       COMM\n---------- ---------- ----------\nADAMS        \
    \    1100\nALLEN            1600        300\nBLAKE            2850\nKING     \
    \        5000\nMARTIN           1250       1400\n```\n\n如果我们只是想在佣金列中为没有资格获得佣金的员工显示零，我们可以使用`NVL`函数来实现：\n\
    \n```\nSELECT ename , sal , NVL(comm,0) comm\nFROM emp\nORDER BY ename;\n```\n\
    \n```\nENAME              SAL       COMM\n---------- ---------- ----------\nADAMS\
    \            1100          0\nALLEN            1600        300\nBLAKE        \
    \    2850          0\nKING             5000          0\nMARTIN           1250\
    \       1400\n```\n\n如果我们决定对空值执行算术运算，结果将始终为空；因此，如果我们想计算“总薪酬”为工资加佣金，我们必须应用`NVL`函数，以正确计算并考虑空值。在以下示例中，我们分别使用和不使用`NVL`函数计算这些列的总和。不使用`NVL`，我们会得到一个不正确的结果，这可以在`TOTAL_COMP_NO_NVL`输出字段中看到：\n\
    \n```\nSELECT ename , sal , nvl(comm,0) comm, sal+comm total_comp_no_nvl,\nsal+NVL(comm,0)\
    \ total_comp_nvl\nFROM emp\nORDER BY ename;\n```\n\n```\nENAME              SAL\
    \       COMM TOTAL_COMP_NO_NVL TOTAL_COMP_NVL\n---------- ---------- ----------\
    \ ----------------- --------------\nADAMS            1100          0         \
    \                        1100\nALLEN            1600        300              \
    \ 1900            1900\nBLAKE            2850          0                     \
    \            2850\nKING             5000          0                          \
    \       5000\nMARTIN           1250       1400               2650            2650\n\
    ```\n\n`NVL2`与`NVL`类似，区别在于`NVL2`接受三个参数——值或列，如果列不为空则返回的值，以及如果列为空则返回的值。例如，如果我们使用前面相同的例子来确定员工是否获得佣金，我们只想为每位员工分配一个值，说明他或她是“有佣金”还是“无佣金”员工。我们可以使用`NVL2`函数实现这一点：\n\
    \n```\nSELECT ename , sal ,\nNVL2(comm,'Commissioned','Non-Commissioned') comm_status\n\
    FROM emp\nORDER BY ename;\n```\n\n```\nENAME              SAL COMM_STATUS\n----------\
    \ ---------- ----------------\nADAMS            1100 Non-Commissioned\nALLEN \
    \           1600 Commissioned\nBLAKE            2850 Non-Commissioned\nKING  \
    \           5000 Non-Commissioned\nMARTIN           1250 Commissioned\n```\n\n\
    # 在 WHERE 子句中处理空值\n\n在`WHERE`子句中，如果你只是想检查一个列是否包含空值，请使用`IS NULL`或`IS NOT NULL`作为比较操作符——例如：\n\
    \n```\nSELECT ename , sal\nFROM emp\nWHERE comm IS NULL\nORDER BY ename;\n```\n\
    \n```\nENAME              SAL\n---------- ----------\nADAMS            1100\n\
    BLAKE            2850\nKING             5000\n```\n\n```\nSELECT ename , sal\n\
    FROM emp\nWHERE comm IS NOT NULL\nORDER BY ename;\n```\n\n```\nENAME         \
    \     SAL\n---------- ----------\nALLEN            1600\nMARTIN           1250\n\
    ```\n\n你也可以在`WHERE`子句中使用`NVL`或`NVL2`函数，就像在`SELECT`语句中一样：\n\n```\nSELECT ename\
    \ , sal\nFROM emp\nWHERE NVL(comm,0) = 0\nORDER BY ename;\n```\n\n```\nENAME \
    \             SAL\n---------- ----------\nADAMS            1100\nBLAKE       \
    \     2850\nKING             5000\n```\n\n## 工作原理\n\n最好始终明确处理空值的可能性，因此如果表的一列可为空，就假设空值存在，否则输出结果可能不理想或不可预测。一个快速检查列中是否存在空值的方法是将表中的行数（`COUNT\
    \ *`）与该列的行数（`COUNT <column_name>`）进行比较。对可为空列的计数将仅计算那些没有空值的行。以下是一个例子：\n\n```\n\
    SELECT count(*) FROM emp;\n```\n\n```\n  COUNT(*)\n----------\n        14\n```\n\
    \n```\nSELECT count(comm) FROM emp;\n```\n\n```\nCOUNT(COMM)\n-----------\n  \
    \        4\n```\n\n这种比较行数与列中值数量的技术是检查列中是否存在空值的一种便捷方法。\n\n另一个在处理空值时非常有用的函数是`COALESCE`函数。使用`COALESCE`，你可以传入一系列值，该函数将返回第一个非`NULL`值。如果`COALESCE`中的所有值都是`NULL`，则返回`NULL`值。这里有一个简单的例子：\n\
    \n```\nSELECT coalesce(NULL,'ABC','DEF') FROM dual;\n```\n\n```\nCOA\n---\nABC\n\
    ```\n\n假设你想获取客户的送货地址，如果不存在，则再获取账单地址。使用`COALESCE`，你可以如下例所示实现这一点：\n\n```\nSELECT\
    \ COALESCE(\n(SELECT shipping_address FROM customers\nWHERE cust_id = 9342),\n\
    (SELECT billing_address FROM customers\nWHERE cust_id = 9342))\nFROM dual;\n```\n\
    \n在使用`COALESCE`的语句中，所有参数必须具有相同的数据类型，否则你将收到错误，如下所示：\n\n```\nSELECT coalesce(NULL,123,'DEF')\
    \ FROM dual;\n                         *\nERROR at line 1:\nORA-00932: inconsistent\
    \ datatypes: expected NUMBER got CHAR\n```\n\n## 8-12. 搜索部分列值\n\n### 问题\n\n你需要从数据库中某个列搜索一个字符串，但不知道该列数据的确切值。"
- fmt: "#### Solution\n\nWhen you are unsure of the data values in the columns you\
    \ are filtering on in your `WHERE` clause, you can utilize the `LIKE` operator.\
    \ Unlike the normal comparison operators such as the equal sign, the `BETWEEN`\
    \ clause, or the `IN` clause, the `LIKE` operator allows you to search for matches\
    \ based on a partial string of the column data. When you use the `LIKE` clause,\
    \ you need to also use the `%` symbol or the `_` symbol within the data itself\
    \ in order to search for the data you need. The percent sign is used to replace\
    \ one to many characters.\n\nFor example, if you want to see the list of employees\
    \ that were hired in 1995, regardless of the exact date, the `LIKE` clause can\
    \ be used to search for any matches within `hire_date` that contain the string\
    \ `1995`. When using `LIKE` with a date or timestamp datatype, you need to ensure\
    \ that the date format you are using is compatible with your search criteria in\
    \ your `LIKE` statement. For instance, if the default date format for your database\
    \ is `DD-MON-YY`, then the string `1995` is not compatible with that format and\
    \ a match would never be found. In order to search in this manner, set your date\
    \ format within your session before issuing your query:\n\n`alter session set\
    \ nls_date_format = 'yyyy-mm-dd';`\n\n`Session altered.`\n\n```\nSELECT employee_id,\
    \ last_name, first_name, hire_date\nFROM employees\nWHERE hire_date LIKE '%1995%'\n\
    ORDER BY hire_date;\n```\n\n```\nEMPLOYEE_ID LAST_NAME                 FIRST_NAME\
    \           HIRE_DATE\n----------- ------------------------- --------------------\
    \ ----------\n        122 Kaufling                  Payam                1995-05-01\n\
    \        115 Khoo                      Alexander            1995-05-18\n     \
    \   137 Ladwig                    Renske               1995-07-14\n        141\
    \ Rajs                      Trenna               1995-10-17\n```\n\nAn easy way\
    \ to remedy having to worry about the date format of your session is to simply\
    \ use the `TO_CHAR` function within the query. The advantage of this method is\
    \ it is very easy to code, without having to worry about your session's date format.\
    \ See the following example:\n\n```\nSELECT employee_id, last_name, first_name,\
    \ hire_date\nFROM employees\nWHERE to_char(hire_date,'yyyy') = '1995'\nORDER BY\
    \ hire_date;\n```\n\nThe underscore symbol (“_”) is used to replace exactly one\
    \ character. Let's say you were looking for an employee that had a last name of\
    \ “Olsen” or “Olson,” but were unsure of the spelling. In a single query, you\
    \ can use the underscore in conjunction with the `LIKE` clause to find all employees\
    \ with that name variation in your database:\n\n```\nSELECT last_name, first_name,\
    \ phone_number\nFROM employees\nWHERE last_name like 'Ols_n';\n```\n\n```\nLAST_NAME\
    \                 FIRST_NAME           PHONE_NUMBER\n-------------------------\
    \ -------------------- --------------------\nOlsen                     Christopher\
    \          011.44.1344.498718\nOlson                     TJ                  \
    \ 650.124.8234\n```"
  raw: '#### Solution


    When you are unsure of the data values in the columns you are filtering on in
    your `WHERE` clause, you can utilize the `LIKE` operator. Unlike the normal comparison
    operators such as the equal sign, the `BETWEEN` clause, or the `IN` clause, the
    `LIKE` operator allows you to search for matches based on a partial string of
    the column data. When you use the `LIKE` clause, you need to also use the “%”
    symbol or the “_” symbol within the data itself in order to search for the data
    you need. The percent sign is used to replace one to many characters. For example,
    if you want to see the list of employees that were hired in 1995, regardless of
    the exact date, the `LIKE` clause can be used to search for any matches within
    `hire_date` that contain the string `1995`. When using `LIKE` with a date or timestamp
    datatype, you need to ensure that the date format you are using is compatible
    with your search criteria in your `LIKE` statement. For instance, if the default
    date format for your database is `DD-MON-YY`, then the string `1995` is not compatible
    with that format and a match would never be found. In order to search in this
    manner, set your date format within your session before issuing your query:


    `alter session set nls_date_format = ''yyyy-mm-dd'';`


    `Session altered.`


    `SELECT employee_id, last_name, first_name, hire_date`

    `FROM employees`

    **`WHERE hire_date LIKE ''%1995%''`**

    `ORDER BY hire_date;`


    `EMPLOYEE_ID LAST_NAME                 FIRST_NAME           HIRE_DATE`

    `----------- ------------------------- -------------------- ----------`

    `        122 Kaufling                  Payam                1995-05-01`

    `        115 Khoo                      Alexander            1995-05-18`

    `        137 Ladwig                    Renske               1995-07-14`

    `        141 Rajs                      Trenna               1995-10-17`


    An easy way to remedy having to worry about the date format of your session is
    to simply use the `TO_CHAR` function within the query. The advantage of this method
    is it is very easy to code, without having to worry about your session''s date
    format. See the following example:


    `SELECT employee_id, last_name, first_name, hire_date`

    `FROM employees`

    `WHERE to_char(hire_date,''yyyy'') = ''1995''`

    `ORDER BY hire_date;`


    The underscore symbol (“_”) is used to replace exactly one character. Let''s say
    you were looking for an employee that had a last name of “Olsen” or “Olson,” but
    were unsure of the spelling. In a single query, you can use the underscore in
    conjunction with the `LIKE` clause to find all employees with that name variation
    in your database:


    `SELECT last_name, first_name, phone_number`

    `FROM employees`

    **`WHERE last_name like ''Ols_n'';`**


    `LAST_NAME                 FIRST_NAME           PHONE_NUMBER`

    `------------------------- -------------------- --------------------`

    `Olsen                     Christopher          011.44.1344.498718`

    `Olson                     TJ                   650.124.8234`'
  trans: "#### 解决方案\n\n当你对`WHERE`子句中用于筛选的列的数据值不确定时，可以使用`LIKE`操作符。与等号、`BETWEEN`子句或`IN`子句等常规比较操作符不同，`LIKE`操作符允许你基于列数据的*部分字符串*来搜索匹配项。使用`LIKE`子句时，你还需要在数据本身中使用`%`符号或`_`符号来查找所需数据。百分比符号用于替代一个到多个字符。\n\
    \n例如，如果你想查看在 1995 年雇佣的员工列表，而不关心具体日期，就可以使用`LIKE`子句来搜索`hire_date`中包含字符串`1995`的任何匹配项。当对日期或时间戳数据类型使用`LIKE`时，你需要确保所使用的日期格式与你`LIKE`语句中的搜索条件兼容。例如，如果你数据库的默认日期格式是`DD-MON-YY`，那么字符串`1995`与此格式不兼容，将永远找不到匹配项。为了以此方式搜索，需要在发出查询前，在你的会话中设置日期格式：\n\
    \n`alter session set nls_date_format = 'yyyy-mm-dd';`\n\n`Session altered.`\n\n\
    ```\nSELECT employee_id, last_name, first_name, hire_date\nFROM employees\nWHERE\
    \ hire_date LIKE '%1995%'\nORDER BY hire_date;\n```\n\n```\nEMPLOYEE_ID LAST_NAME\
    \                 FIRST_NAME           HIRE_DATE\n----------- -------------------------\
    \ -------------------- ----------\n        122 Kaufling                  Payam\
    \                1995-05-01\n        115 Khoo                      Alexander \
    \           1995-05-18\n        137 Ladwig                    Renske         \
    \      1995-07-14\n        141 Rajs                      Trenna              \
    \ 1995-10-17\n```\n\n解决需要担心会话日期格式的一个简单方法是在查询中直接使用`TO_CHAR`函数。这种方法的优势在于编码非常简单，无需担心会话的日期格式。请看以下示例：\n\
    \n```\nSELECT employee_id, last_name, first_name, hire_date\nFROM employees\n\
    WHERE to_char(hire_date,'yyyy') = '1995'\nORDER BY hire_date;\n```\n\n下划线符号（`_`）用于精确替代一个字符。假设你正在寻找姓氏为“Olsen”或“Olson”的员工，但不确定具体拼写。你可以在单个查询中，结合下划线和`LIKE`子句来找出数据库中所有符合该名称变体的员工：\n\
    \n```\nSELECT last_name, first_name, phone_number\nFROM employees\nWHERE last_name\
    \ like 'Ols_n';\n```\n\n```\nLAST_NAME                 FIRST_NAME           PHONE_NUMBER\n\
    ------------------------- -------------------- --------------------\nOlsen   \
    \                  Christopher          011.44.1344.498718\nOlson            \
    \         TJ                   650.124.8234\n```"
- fmt: "# How It Works\n\n`LIKE` 子句在您不确定数据库中存储的确切列值时，对于查找数据极为有用。使用 `LIKE` 子句时需要考虑性能方面的影响。主要考虑因素是，当使用\
    \ `LIKE` 子句时，优化器使用索引来辅助检索数据的可能性会降低。由于索引是基于列的完整值建立的，仅搜索列完整值的一部分会使优化器难以使用索引。\n\n\
    以前面查找在1995年开始工作的员工的例子为例，以下是该查询的执行计划：\n\n```\n---------------------------------------\n\
    | Id  | Operation         | Name      |\n---------------------------------------\n\
    |   0 | SELECT STATEMENT  |           |\n|   1 |  TABLE ACCESS FULL| EMPLOYEES\
    \ |\n---------------------------------------\n```\n\n由于索引是基于整个值建立的，如果搜索条件中保留了值的前部分，优化器就能识别出可以使用索引。在值的两侧放置百分号等同于说“包含”。如果我们只在值的末尾放置百分号，则等同于“以...开始”。由于值的开头部分保持完整，优化器将能够根据\
    \ `LIKE` 子句中的值与现有索引进行有效比较，因此可以使用该索引（如果该列上存在索引的话）：\n\n```\nSELECT employee_id,\
    \ last_name, first_name, hire_date\nFROM employees\nWHERE hire_date LIKE '1995%';\n\
    ```\n\n```\nEMPLOYEE_ID LAST_NAME                 FIRST_NAME           HIRE_DATE\n\
    ----------- ------------------------- -------------------- ----------\n      \
    \  115 Khoo                      Alexander            1995-05-18\n        122\
    \ Kaufling                  Payam                1995-05-01\n        137 Ladwig\
    \                    Renske               1995-07-14\n        141 Rajs       \
    \               Trenna               1995-10-17\n```\n\n```\n---------------------------------------------------\n\
    | Id  | Operation                   | Name        |\n---------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |             |\n|   1 |  TABLE ACCESS BY\
    \ INDEX ROWID| EMPLOYEES   |\n|   2 |   INDEX RANGE SCAN          | EMP_NAME_IX\
    \ |\n---------------------------------------------------\n```\n\n有时，下划线很可能正是被搜索数据的一部分。在这种情况下，必须在下划线前加上转义字符。如果您是一名\
    \ DBA，并且正在数据库中搜索表空间名（它很容易包含下划线字符），请务必考虑到下划线是一个通配符符号，必须加以处理。参见以下示例：\n\n```\nSELECT\
    \ tablespace_name FROM dba_tablespaces\nWHERE tablespace_name like '%EE_DATA';\n\
    ```\n\n```\nTABLESPACE_NAME\n------------------------------\nEMPLOYEE_DATA\nEMPLOYEE1DATA\n\
    ```\n\n下划线很可能被当作数据搜索，而不是 `LIKE` 子句的替换字符。如果在查询中插入转义字符，就可以避免得到不期望的结果。通过在下划线前直接插入转义字符，下划线将被视为数据的一部分，而不是替换字符：\n\
    \n```\nSELECT tablespace_name FROM dba_tablespaces\nWHERE tablespace_name LIKE\
    \ '%EE^_DATA' ESCAPE '^';\n```\n\n```\nTABLESPACE_NAME\n------------------------------\n\
    EMPLOYEE_DATA\n```\n\n`LIKE` 子句的好处是它提供了基于列数据的部分值查找数据的灵活性。可能的代价是性能。使用 `LIKE` 子句的查询通常更不可能使用索引。作为\
    \ `LIKE` 的替代方案，`BETWEEN` 子句虽然在 SQL 语句中编写起来不那么简单，但通常更可能使用索引。然而，有时由于性能影响，`LIKE`\
    \ 子句可能被视为应避免使用的子句，但如果避免使用前导百分号，优化器通常会在有索引可用的情况下使用它。\n\n在“解决方案”部分的 `TO_CHAR` 示例中，您会注意到\
    \ `TO_CHAR` 函数被放置在比较运算符的左侧。通常，当这种情况发生时，意味着不会使用过滤列上的索引（有关此主题的更多讨论，请参见配方 8-14）。然而，对于某些\
    \ Oracle 函数及其转换方式，仍然可能使用索引。唯一确定的方法就是简单地在您的查询上运行一个执行计划。对于我们前面使用 `TO_CHAR` 的查询，尽管函数被放置在比较运算符的左侧，它仍然使用了索引：\n\
    \n```\nSELECT employee_id, last_name, first_name, hire_date\nFROM employees\n\
    WHERE to_char(hire_date,'yyyy') = '1995'\nORDER BY hire_date;\n```\n\n```\n----------------------------------------------------\n\
    | Id  | Operation                   | Name         |\n----------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |              |\n|   1 |  TABLE ACCESS BY\
    \ INDEX ROWID| EMPLOYEES    |\n|   2 |   INDEX FULL SCAN           | EMPLOYEES_I1\
    \ |\n----------------------------------------------------\n```\n\n## 8-13. 在共享池中重用\
    \ SQL 语句\n\n### Problem\n\n您的 SQL 语句经历了过量的硬解析，并希望减少经过硬解析过程的 SQL 语句数量。"
  raw: '#### How It Works


    The `LIKE` clause is extremely useful for finding data within your database when
    you are unsure of the exact column values stored within the data. There are performance
    ramifications that need to be considered when using the `LIKE` clause. The primary
    consideration is that when the `LIKE` clause is used, the chances of the optimizer
    using an index to aid in retrieving the data are reduced. Since an index is based
    on a complete value for a column, having to search for only a portion of the complete
    value of a column is problematic for the optimizer to be able to use an index.


    Using our foregoing example of finding employees that started during the year
    1995, here is the explain plan for that query:


    `---------------------------------------`

    `| Id  | Operation         | Name      |`

    `---------------------------------------`

    `|   0 | SELECT STATEMENT  |           |`

    `|   1 |  TABLE ACCESS FULL| EMPLOYEES |`

    `---------------------------------------`


    Since an index is based on an entire value, the optimizer can recognize that an
    index can be used if the first part of the value is intact in the search criteria.
    By placing the percent signs on both sides of the value, it is the same as saying
    “contains.” If we place the percent sign on only the trailing end of the value,
    it is the same as “starts with.” Since the leading edge of the value is intact,
    the optimizer will be able to effectively compare the value based on the value
    in the `LIKE` clause with an existing index, and can therefore use such an index,
    if one is present on that column:


    `SELECT employee_id, last_name, first_name, hire_date`

    `FROM employees`

    **`WHERE hire_date LIKE ''1995%'';`**


    `EMPLOYEE_ID LAST_NAME                 FIRST_NAME           HIRE_DATE`

    `----------- ------------------------- -------------------- ----------`

    `        115 Khoo                      Alexander            1995-05-18`

    `        122 Kaufling                  Payam                1995-05-01`

    `        137 Ladwig                    Renske               1995-07-14`

    `        141 Rajs                      Trenna               1995-10-17`


    `---------------------------------------------------`

    `| Id  | Operation                   | Name        |`

    `---------------------------------------------------`

    `|   0 | SELECT STATEMENT            |             |`

    `|   1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES   |`

    `|   2 |   INDEX RANGE SCAN          | EMP_NAME_IX |`

    `---------------------------------------------------`


    Sometimes it is very possible for an underscore to be part of the data that is
    being searched. In these cases, it is important to preface the underscore with
    the escape character. If you are a DBA, and are searching for a tablespace name
    in your database, which easily can contain the underscore character, make sure
    you consider that underscore is a wildcard symbol, and must be considered. See
    the following example:


    `SELECT tablespace_name FROM dba_tablespaces`

    **`WHERE tablespace_name like ''%EE_DATA'';`**


    `TABLESPACE_NAME`

    `------------------------------`

    `EMPLOYEE_DATA`

    `EMPLOYEE1DATA`


    It is very possible that the underscore is searched as data, not as a substitution
    character for the `LIKE` clause. If you insert an escape character within the
    query, you can avoid getting undesired results. By inserting the escape character
    directly in front of the underscore, then the underscore will be considered as
    part of the data, rather than a substitution character:


    `SELECT tablespace_name FROM dba_tablespaces`

    **`WHERE tablespace_name LIKE ''%EE^_DATA'' ESCAPE ''^'';`**


    `TABLESPACE_NAME`

    `------------------------------`

    `EMPLOYEE_DATA`


    The benefit of the `LIKE` clause is the flexibility it gives you in finding data
    based on a partial value of the column data. The likely trade-off is performance.
    Queries using the `LIKE` clause are often much less likely to use an index. As
    an alternative to `LIKE`, the `BETWEEN` clause, although not as simple to code
    within your SQL statement, can generally be more likely to use an index. Sometimes,
    however, the `LIKE` clause can be perceived as a clause to avoid because of the
    performance ramifications, but if the leading percent sign is avoided, often the
    optimizer will use an index, if available.


    In the `TO_CHAR` example of the “Solution” section, you will note that the `TO_CHAR`
    function is placed on the left side of the comparison operator. Generally, when
    this occurs, it means no index on the filtering column will be used (see Recipe
    8-14 for more discussion on this topic). However, with certain Oracle functions
    and the manner in which they are translated, an index still may be used. The only
    way to be certain is to simply run an explain plan on your query. For our foregoing
    query using `TO_CHAR`, it still used an index even though the function was placed
    on the left side of the comparison operator:


    `SELECT employee_id, last_name, first_name, hire_date`

    `FROM employees`

    `WHERE to_char(hire_date,''yyyy'') = ''1995''`

    `ORDER BY hire_date;`


    `----------------------------------------------------`

    `| Id  | Operation                   | Name         |`

    `----------------------------------------------------`

    `|   0 | SELECT STATEMENT            |              |`

    `|   1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES    |`

    `|   2 |   INDEX FULL SCAN           | EMPLOYEES_I1 |`

    `----------------------------------------------------`


    ### 8-13. Re-using SQL Statements Within the Shared Pool


    #### Problem


    You are getting an excessive amount of hard-parsing for your SQL statements, and
    want to lower the number of SQL statements that go through the hard parse process.'
