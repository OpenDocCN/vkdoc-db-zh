  raw: "#### Solution\n\nIn order to create a SQL test case, first you must export\
    \ the SQL statement along with several bits of useful information about the statement.\
    \ The following example shows how to capture the SQL statement that is throwing\
    \ an error. In this example, the user SH is doing the export (you can't do the\
    \ export as the user SYS).\n\nFirst, connect to the database as SYSDBA and create\
    \ a directory to hold the test case:\n\n`SQL> conn / as sysdba`\n`Connected.`\n\
    `SQL> create or replace directory TEST_DIR1 as 'c:\\myora\\diagnsotics\\incidents\\\
    ';`\n\n`Directory created.`\n`SQL> grant read,write on directory TEST_DIR1 to\
    \ sh;`\n\n`Grant succeeded.`\n`SQL>`\n\nThen grant the DBA role to the user through\
    \ which you will create the test case, and connect as that user:\n\n`SQL> grant\
    \ dba to sh;`\n\n`Grant succeeded.`\n\n`SQL> conn sh/sh`\n`Connected.`\n\nIssue\
    \ the SQL command that's throwing the error:\n\n`SQL> select * from  my_mv  where\
    \ max_amount_sold >100000 order by 1;`\n\nNow you're ready to export the SQL statement\
    \ and relevant information, which you can import to a different system later on.\
    \ Use the `EXPORT_SQL_TESTCASE` procedure to export the data, as shown here:\n\
    \n`SQL> set serveroutput on`\n\n`SQL> declare mycase clob;`\n`  2  begin`\n`  3  dbms_sqldiag.export_sql_testcase`\n\
    `  4  (directory    =>'TEST_DIR1',`\n`  5  sql_text      => 'select * from my_mv\
    \ where max_amount_sold >100000 order by 1',`\n`  6  user_name     => 'SH',`\n\
    `  7  exportData    =>  TRUE,`\n`  8  testcase      => mycase`\n`  9  );`\n` 10  end;`\n\
    ` 11  /`\n\n`PL/SQL procedure successfully completed.`\n\n`SQL>`\n\nOnce the export\
    \ procedure completes, you are ready to perform the import, either on the same\
    \ or on a different server. The following example creates a new user named TEST,\
    \ and imports the test case into that user's schema. Here are the steps for importing\
    \ the SQL statement and associated information into a different schema.\n\n`SQL>\
    \ conn /as sysdba`\n`Connected.`\n`SQL> create or replace directory TEST_DIR2\
    \ as 'c:\\myora\\diagnsotics\\incidents\\'; /`\n\n`Directory created.`\n`SQL>\
    \ grant read,write on directory TEST_dir2 to test;`\n\nTransfer all the files\
    \ in the `TEST_DIR1` directory to the `TEST_DIR2` directory. Then grant the DBA\
    \ role to user TEST, and connect as that user:\n\n`SQL> grant dba to test;`\n\n\
    `Grant succeeded.`\n\n`SQL> conn test/test`\n`Connected.`\n\nPerform the import\
    \ of the SQL data as the user TEST, by invoking the `IMPORT_SQL_TESTCASE` procedure,\
    \ as shown here:\n\n`SQL> begin`\n`  2  dbms_sqldiag.import_sql_testcase`\n`  3  (directory=>'TEST_DIR2',`\n\
    `  4  filename=>'oratcb1_008602000001main.xml',`\n`  5  importData=>TRUE`\n`  6  );`\n\
    `  7  end;`\n`  8  /`\n\n`PL/SQL procedure successfully completed.`\n\n`SQL>`\n\
    \nThe user TEST will now have all the objects to execute the SQL statement that\
    \ you want to investigate. You can verify this by issuing the original `select`\
    \ statement. It should give you the same output as under the SH schema.\n\n####\
    \ How It Works\n\nOracle offers the SQL Test Case Builder (TCB) to reproduce a\
    \ SQL failure. You can create a test case through Enterprise Manager or through\
    \ a PL/SQL package. The “Solution” section of this recipe shows how create a test\
    \ case using the `EXPORT_SQL_TESTCASE` procedure of the `DBMS_SQLDIAG` package.\
    \ There are several variants of this package, and our example shows how to use\
    \ a SQL statement as the source for creating a SQL test case. Please review the\
    \ `DBMS_SQLDIAG.EXPORT_TESTCASE` procedure in Oracle's PL/SQL Packages manual\
    \ for details about other options to create test cases.\n\n![images](images/square.jpg)\
    \ **Note** Remember that you should run the Test Case Builder as any user, other\
    \ than SYS, who has been granted the DBA role.\n\nOften, you'll find yourself\
    \ trying to provide a test case for Oracle, without which the Oracle Support personnel\
    \ won't be able to investigate a particular problem they are helping you with.\
    \ The SQL Test Case Builder is a tool that is part of Oracle Database 11g, and\
    \ its primary purpose is to help you quickly obtain a reproducible test case.\
    \ The SQL Test Case Builder helps you easily capture pertinent information relating\
    \ to a failed SQL statement and package it in a format that either a developer\
    \ or an Oracle support person can use to reproduce the problem in a different\
    \ environment.\n\nYou access the SQL Test Case Builder through the `DBMS_SQLDIAG`\
    \ package. To create a test case, you must first export the SQL statement, including\
    \ all the objects that are part of the statement, and all other related information.\
    \ The export process is very similar to an Oracle export with the `EXPDP` command,\
    \ and thus uses a directory, just as `EXPDP` does. Oracle creates the SQL test\
    \ case as a script that contains the statements that will re-create the necessary\
    \ database objects, along with associated runtime information such as statistics,\
    \ which enable you to reproduce the error. The following are the various types\
    \ of information captured and exported as part of the test case creation process:\n\
    \n*   SQL text for the problem statement\n*   Table data—this is optional, and\
    \ you can export a sample or complete data.\n*   The execution plan\n*   Optimizer\
    \ statistics\n*   PL/SQL functions, procedure, and packages\n*   Bind variables\n\
    *   User privileges\n*   SQL profiles\n*   Metadata for all the objects that are\
    \ part of the SQL statement\n*   Dynamic sampling results\n*   Runtime information\
    \ such as the degree of parallelism, for example\n\nIn the `DBMS_SQLDIAG` package,\
    \ the `EXPORT_SQL_TESTCASE` procedure exports a SQL test case for a SQL statement\
    \ to a directory. The `IMPORT_SQL_TESTCASE` procedure imports the test case from\
    \ a directory.\n\nIn the `EXPORT_SQL_TESTCASE` procedure, here is what the attributes\
    \ stand for:\n\n> `DIRECTORY`: The directory where you want to store the test\
    \ case files\n> \n> `SQL_TEXT`: The actual SQL statement that's throwing the error\n\
    > \n> `TESTCASE`: The name of the test case\n> \n> `EXPORTDATA`: By default, Oracle\
    \ doesn't export the data. You can set this parameter to `TRUE` in order to export\
    \ the data. You can optionally limit the amount of data you want to export, by\
    \ specifying a value for the Sampling Percent attribute. The default value is\
    \ 100.\n\nThe Test Case Builder automatically exports the PL/SQL package specifications\
    \ but not the package body. However, you can specify that the TCB export the package\
    \ body as well. The export process creates several files in the directory you\
    \ specify. Of these files, the file in the format `oratcb1_008602000001main.xml`\
    \ contains the metadata for the test case.\n\n### 7-15\\. Generating an AWR Report\n\
    \n#### Problem\n\nYou'd like to generate an AWR report to analyze performance\
    \ problems in your database."
