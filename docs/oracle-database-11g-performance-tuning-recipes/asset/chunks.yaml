  trans: '## 解决方案


    当遇到似乎已挂起的数据库时，请遵循以下通用步骤：


    1.  检查你的`告警日志`，查看数据库是否报告了任何错误，这些错误可能指示了数据库挂起的原因。

    2.  尝试获取`AWR`或`ASH`报告，或查询一些`ASH`视图，如第 5 章所述。你可能会在`AWR`报告的`负载概要`部分顶部注意到诸如`硬解析`之类的事件，这表明正是它导致了数据库变慢。

    3.  单个`即席查询`确实有可能使整个数据库陷入瘫痪。试着找出一个或多个性能极差的`SQL`语句，它们可能导致了数据库挂起（或性能极差）。

    4.  检查数据库是否存在阻塞性的`锁`以及`门`争用。

    5.  检查服务器的内存使用情况以及`CPU`使用率。确保会话没有因为`PGA`大小设置过低而停滞，如第 3 章所述。

    6.  不要忽视这一点：看起来很吓人的数据库挂起，可能仅仅是由`归档日志`目标空间填满这样简单的原因引起的。如果`归档目标`已满，数据库将挂起，新的用户连接将会失败。不过，你仍然可以以`SYS`用户身份连接，并且一旦通过移动一些已归档的重做日志文件在`归档目标`中腾出空间，数据库就能重新被用户访问。

    7.  检查`快速恢复区`。当数据库无法将`闪回数据库`日志写入恢复区时，也会发生挂起。当`快速恢复区`填满时，数据库将不会处理新工作，也不会建立新的数据库连接。你可以通过`alter
    system set db_recovery_file_dest_size`命令增大恢复区来解决此问题。


    如果你仍然无法解决数据库挂起的原因，那么你很可能遇到了一个真正挂起的数据库。在调查这样的数据库时，你有时可能会发现自己无法连接和登录。在这种情况下，请使用`prelim`选项登录到数据库。`prelim`选项不需要真正的数据库连接。以下是一个示例，展示了如何使用`prelim`选项登录数据库：


    ```

    C:\app\ora\product\11.2.0\dbhome_1\bin>sqlplus /nolog


    SQL*Plus: Release 11.2.0.1.0 Production on Sun Mar 27 10:43:31 2011


    Copyright (c) 1982, 2010, Oracle.  All rights reserved.


    SQL> set _prelim on

    SQL> connect / as sysdba

    Prelim connection established

    SQL>

    ```


    或者，你可以使用命令 `sqlplus -prelim "/ as sysdba"` 来使用 `-prelim` 选项登录。请注意，你使用 `nolog`
    选项来打开一个 `SQL*Plus` 会话。如果你已经连接到数据库，则无法执行 `set _prelim on` 命令。一旦你如上所示建立了 `prelim`
    连接，就可以执行 `oradebug hanganalyze` 命令来分析挂起的数据库，例如：


    ```

    SQL> oradebug hanganalyze 3

    Statement processed.

    SQL>

    ```


    在 Oracle `RAC` 环境中，指定带有附加选项的 `oradebug hanganalyze` 命令，如下所示：


    ```

    SQL> oradebug setinst all

    SQL> oradebug -g def hanganalyze 3

    ```


    你可以重复执行几次 `oradebug hanganalyze` 命令，以生成不同进程状态的转储文件。


    除了 `hanganalyze` 命令生成的转储文件外，Oracle 支持团队通常还会请求一个进程状态转储（也称为 `systemstate` 转储）来分析数据库挂起状况。`systemstate`
    转储将报告进程正在做什么以及它们当前持有的资源。你可以通过执行以下命令集从非 `RAC` 系统获取 `systemstate` 转储。


    ```

    SQL> oradebug setmypid

    Statement processed.

    SQL> oradebug dump systemstate 266

    Statement processed.

    SQL>

    ```


    在 `RAC` 环境中，执行以下命令来获取 `systemstate` 转储：


    ```

    SQL> oradebug setmypid

    SQL> oradebug unlimit

    SQL> oradebug -g all dump systemstate 266

    ```


    请注意，与 `oradebug hanganalyze` 命令不同，你必须连接到一个进程。`setmypid` 选项指定了进程，在本例中是你自己的进程。你也可以指定一个非你自己的进程
    ID，在这种情况下，你需要在执行 `dump systemstate` 命令之前，先执行 `oradebug setmypid <pid>` 命令。如果你尝试在未设置
    `PID` 的情况下执行 `dump systemstate` 命令，将会收到错误：


    ```

    SQL> oradebug dump systemstate 10

    ORA-00074: no process has been specified

    SQL>

    ```


    你必须执行几次 `systemstate` 转储，每次转储之间间隔大约一分钟左右。Oracle 支持团队通常会请求多个 `systemstate` 转储以及
    `hanganalyze` 命令生成的跟踪文件。'
- fmt: '#### How It Works


    当你遇到一个“挂起”的数据库时，关键是要确定它是真的挂起了，还是只是运行缓慢。如果一两个用户抱怨查询运行缓慢，你需要使用[第5章](#Chapter05.html#ch5)中描述的技术来分析他们的会话，以查看缓慢是由于阻塞会话还是Oracle等待事件引起的。如果有多个用户报告他们的工作进行缓慢，这可能是由于多种原因造成的，包括CPU、内存（SGA或PGA）或其他系统资源问题。


    在排查挂起数据库的故障时，首先应检查服务器的CPU使用率。如果你的服务器显示100%的CPU利用率，或者正在交换或分页，那么问题可能根本不在数据库上。至于内存，如果服务器没有足够的空闲内存，新会话就无法连接到数据库。


    ![images](images/square.jpg) `Tip` “解决方案”部分中展示的`prelim`选项允许你在不打开会话的情况下连接到SGA。因此，即使正常的SQL*Plus登录不起作用，你也可以“登录”到挂起的数据库。当你连接到SGA后启动的`oradebug`会话实际上会分析SGA中的内容，并将其转储到跟踪文件中。


    真正的数据库挂起可能由多种原因引起，包括耗尽了CPU或内存等资源的系统，或者几个会话卡在等待某个资源（如锁）。虽然数据库可以自动解决会话之间的死锁（通过终止持有所需锁的其中一个会话），但当涉及内部内核级资源的栓锁或引脚时，Oracle有时无法自动检测和解决内部死锁——这导致了Oracle支持团队所称的“真正的数据库挂起”。因此，真正的数据库挂起是一种内部死锁或多个进程之间的循环依赖。Oracle支持团队通常会要求你提供`hanganalyze`跟踪文件和多个系统状态转储，以便他们诊断挂起的根本原因。在这种情况下，你甚至可能无法登录数据库。当你发现自己甚至无法登录数据库时，你的第一反应通常是尝试关闭并重启，这通常被称为“弹跳”数据库。不幸的是，虽然关闭并重启数据库可能“解决”问题，但它也会断开所有用户的连接——而且你仍然不知道到底是什么原因导致的问题。如果你决定要弹跳数据库，请先快速生成一些`hanganalyze`和`systemstate`转储。


    ![images](images/square.jpg) `Tip` 尽管有时可能令人不快，但如果你发现自己根本无法连接到挂起的数据库，那么请收集任何可能需要的跟踪转储，然后快速弹跳数据库，以便用户可以访问他们的应用程序。特别是当你处理的是由于内存问题而挂起的数据库时，弹跳实例可能会让事情迅速重新运转起来。


    如果你发现数据库完全没有响应，并且你甚至无法使用`SYSDBA`特权登录数据库，你可以使用`prelim`选项登录数据库。`prelim`选项代表初步连接，它会启动一个Oracle进程并将该进程附加到SGA共享内存。然而，这不是一个完整或完全的连接，而是一个有限的连接，其中用于查询执行的结构没有被建立——因此，你甚至无法查询`V$`视图。不过，`prelim`选项允许你运行`oradebug`命令来获取用于诊断目的的错误转储堆栈。`hanganalyze`命令的输出可以告诉Oracle支持工程师你的数据库是否真的因为会话等待某个资源而挂起。该命令进行内部内核调用，以找出所有正在等待资源的会话，并显示阻塞会话和等待会话之间的关系。你可以通过`oradebug`命令或`alter
    session`语句指定的`hanganalyze`选项会生成有关挂起会话的详细信息。一旦你获得转储文件，Oracle支持人员就可以分析它，并告知你数据库挂起的原因。


    你可以在1到10之间的各个级别调用`hanganalyze`命令。级别3转储处于挂起（`IN_HANG`）状态的进程。通常不需要指定高于3的级别，因为更高的级别会产生冗长的报告，包含过多的进程细节。


    ![images](images/square.jpg) `Note` 你使用`hanganalyze`和`systemstate`命令创建的转储文件位于ADR的trace目录中。


    注意，我们发出`oradebug`命令是为了获取级别为266的`systemstate`转储。级别266（结合了产生短栈信息的级别256和级别10）适用于Oracle
    9.2.0.6及更高版本的发行版（早期的发行版使用`systemstate level 10`）。级别266允许你转储每个进程的短栈，这些是Oracle函数调用，可帮助Oracle开发团队确定是哪个Oracle函数导致了问题。短栈信息也有助于匹配代码中的已知错误。在Solaris和Linux系统上，你可以安全地指定级别266，但在其他系统上，转储短栈可能需要很长时间。因此，对于其他操作系统，你可能希望坚持使用级别10。


    如果你能找出阻塞会话，你也可以只为该会话获取转储，使用命令`oradebug setospid nnnn`，其中`nnnn`是阻塞会话的PID，然后调用`oradebug`命令，如下所示：


    ```

    SQL> oradebug setospid  9999

    SQL> oradebug unlimit

    SQL> oradebug dump errorstack  3

    ```


    请注意，你可以在正常会话（以及在`prelim`会话）中生成`hanganalyze`和`systemstate`转储，而无需使用`oradebug`命令。你可以通过`alter
    session`命令调用`hanganalyze`命令，如下所示。


    ```

    SQL> alter session set  events ''immediate trace name hanganalyze level 3'';

    ```


    同样，你可以使用以下命令获取`systemstate`转储：


    ```

    SQL> alter session set events ''immediate trace name SYSTEMSTATE level 10'';

    Session altered.

    SQL>

    ```


    `oradebug`和`systemstate`转储只是你可以收集的众多转储中的两种。使用`oradebug dumplist`命令查看你可以收集的各种错误转储。


    ```

    SQL> oradebug dumplist

    TRACE_BUFFER_ON

    TRACE_BUFFER_OFF

    LATCHES

    PROCESSSTATE

    SYSTEMSTATE

    INSTANTIATIONSTATE

    REFRESH_OS_STATS

    CROSSIC

    CONTEXTAREA

    HANGDIAG_HEADER

    HEAPDUMP

    …

    ```


    请注意，虽然你可以在编辑器中阅读一些转储文件，但这些文件主要是为了帮助Oracle支持专业人员排查数据库挂起情况。你对这些转储文件能做的有限，特别是当数据库挂起是由于Oracle错误或内核级锁引起时，除了将它们发送给Oracle支持团队进行分析之外。


    ### 7-9. 调用自动诊断存储库命令解释程序


    #### Problem


    你想调用自动诊断存储库命令解释程序（ADRCI）并使用自动诊断存储库（ADR）的各种组件。'
  raw: '#### How It Works


    The key thing you must ascertain when dealing with a “hung” database is whether
    the database is really hung, or just slow. If one or two users complain about
    a slow-running query, you need to analyze their sessions, using the techniques
    described in [Chapter 5](#Chapter05.html#ch5), to see if the slowness is due to
    a blocking session or to an Oracle wait event. If several users report that their
    work is going slowly, it could be due to various reasons, including CPU, memory
    (SGA or PGA), or other system resource issues.


    Check the server''s CPU usage as one of your first steps in troubleshooting a
    hung database. If your server is showing 100% CPU utilization, or if it''s swapping
    or paging, the problem may not lie in the database at all. As for memory, if the
    server doesn''t have enough free memory, new sessions can''t connect to the database.


    ![images](images/square.jpg) **Tip** The “prelim” option shown in the “Solution”
    section lets you connect to the SGA without opening a session. You can thus “log”
    in to the hung database even when normal SQL*Plus logins don''t work. The `oradebug`
    session you start once you connect to the SGA actually analyzes what''s in the
    SGA and dumps it into a trace file.


    A true database hang can be due to a variety of reasons, including a system that
    has exhausted resources such as the CPU or memory, or because several sessions
    are stuck waiting for a resource such as a lock. While the database can automatically
    resolve deadlocks between sessions (by killing one of the sessions holding a needed
    lock), when there''s a latch or pin on an internal kernel-level resource, Oracle
    is sometimes unable to automatically detect and resolve the internal deadlock—and
    this leads to what Oracle Support calls a “true database hang.” A true database
    hang is thus an internal deadlock or a cyclical dependency among multiple processes.
    Oracle Support will usually ask you to provide them the `hanganalyze` trace files
    and multiple systemstate dumps to enable them to diagnose the root cause of your
    hang. At times like this, you may not even be able to log into the database. Your
    first instinct when you realize that you can''t even log in to a database is to
    try shutting down and restarting, often referred to as bouncing the database.
    Unfortunately, while shutting down and restarting the database may “resolve” the
    issue, it''ll also disconnect all users—and you''re no wiser as to what exactly
    caused the problem. If you do decide to bounce your database, quickly generate
    a few `hanganalyze` and `systemstate` dumps first.


    ![images](images/square.jpg) **Tip** As unpleasant as it may be at times, if you
    find that you simply can''t connect to a hung database, then collect any trace
    dumps you may need, and quickly bounce the database so that users can access their
    applications. Especially when you''re dealing with a database that''s hanging
    because of memory issues, bouncing the instance may get things going again quickly.


    If you find that the database is completely unresponsive, and you can''t even
    log in to the database with the SYSDBA privilege, you can use the prelim option
    to log into the database. The prelim option stands for preliminary connection,
    and it starts an Oracle process and attaches that process to the SGA shared memory.
    However, this is not a full or complete connection, but a limited connection where
    the structures for query execution are not set up—so, you cannot even query the
    `V$` views. However, the prelim option lets you run `oradebug` commands to get
    error dump stacks for diagnostic purposes. The output of the `hanganalyze` command
    can tell Oracle Support engineers if your database is really hanging, because
    of sessions waiting for some resource. The command makes internal kernel calls
    to find out all sessions that are waiting for a resource and shows the relationship
    between the blocking and waiting sessions. The `hanganalyze` option that you can
    specify with either the `oradebug` command or an `alter session` statement produces
    details about hung sessions. Once you get the dump file, Oracle Support personnel
    can analyze it and let you know the reasons for the database hang.


    You can invoke the `hanganalyze` command at various levels ranging from 1 to 10\.
    Level 3 dumps processes that are in a hanging (`IN_HANG`) state. You normally
    don''t need to specify a level higher than 3, because higher levels will produce
    voluminous reports with too many details about the processes.


    ![images](images/square.jpg) **Note** The dump files you create with the `hanganalyze`
    and the `systemstate` commands are created in ADR''s trace directory.


    Note that we issued the `oradebug` command to get a `systemstate` dump with a
    level of 266\. Level 266 (combination of Level 256, which produces short stack
    information, and Level 10) is for Oracle releases 9.2.0.6 and onward (earlier
    releases used `systemstate level 10`). Level 266 allows you to dump the short
    stacks for each process, which are Oracle function calls that help Oracle development
    teams determine which Oracle function is causing the problem. The short stack
    information also helps in matching known bugs in the code. On Solaris and Linux
    systems, you can safely specify level 266, but on other systems, it may take a
    long time to dump the short stacks. Therefore, you may want to stick with level
    10 for the other operating systems.


    If you can find out the blocking session, you can also take a dump just for that
    session, by using the command `oradebug` `setospid` `nnnn`, where `nnnn` is the
    blocking session''s PID, and then invoking the `oradebug` command, as shown here:


    `SQL> oradebug setospid  9999`

    `SQL> oradebug unlimit`

    `SQL> oradebug dump errorstack  3`


    Note that you can generate the `hanganalyze` and `systemstate` dumps in a normal
    session (as well as in a prelim session), without using the `oradebug` command.
    You can invoke the `hanganalyze` command with an `alter session` command, as shown
    here.


    `SQL>alter session set  events ''immediate trace name hanganalyze level 3'';`


    Similarly, you can get a `systemstate` dump with the following command:


    `SQL> alter session set events ''immediate trace name SYSTEMSTATE level 10'';`

    `Session altered.`

    `SQL>`


    The `oradebug` and `systemstate` dumps are just two of the many dumps you can
    collect. Use the `oradebug dumplist` command to view the various error dumps you
    can collect.


    `SQL> oradebug dumplist`

    `TRACE_BUFFER_ON`

    `TRACE_BUFFER_OFF`

    `LATCHES`

    `PROCESSSTATE`

    `SYSTEMSTATE`

    `INSTANTIATIONSTATE`

    `REFRESH_OS_STATS`

    `CROSSIC`

    `CONTEXTAREA`

    `HANGDIAG_HEADER`

    `HEAPDUMP`

    `…`


    Note that while you can read some of the dump files in an editor, these files
    are mainly for helping Oracle Support professionals troubleshoot a database hang
    situation. There''s not much you can do with the dump files, especially when a
    database hang situation is due to an Oracle bug or a kernel-level lock, except
    to send them along to Oracle Support for analysis.


    ### 7-9. Invoking the Automatic Diagnostic Repository Command Interpreter


    #### Problem


    You''d like to invoke the Automatic Diagnostic Repository Command Interpreter
    (ADRCI) and work with various components of the Automatic Diagnostic Repository
    (ADR).'
  trans: '

    #### 工作原理


    当你遇到一个“挂起”的数据库时，关键是要确定它是真的挂起了，还是只是运行缓慢。如果一两个用户抱怨查询运行缓慢，你需要使用第 5 章中描述的技术来分析他们的会话，以查看缓慢是由于阻塞会话还是
    Oracle 等待事件引起的。如果有多个用户报告他们的工作进行缓慢，这可能是由于多种原因造成的，包括 CPU、内存（SGA 或 PGA）或其他系统资源问题。


    在排查挂起数据库的故障时，首先应检查服务器的 CPU 使用率。如果你的服务器显示 100%的 CPU 利用率，或者正在交换或分页，那么问题可能根本不在数据库上。至于内存，如果服务器没有足够的空闲内存，新会话就无法连接到数据库。


    ![images](img/square.jpg) `Tip` “解决方案”部分中展示的`prelim`选项允许你在不打开会话的情况下连接到 SGA。因此，即使正常的
    SQL*Plus 登录不起作用，你也可以“登录”到挂起的数据库。当你连接到 SGA 后启动的`oradebug`会话实际上会分析 SGA 中的内容，并将其转储到跟踪文件中。


    真正的数据库挂起可能由多种原因引起，包括耗尽了 CPU 或内存等资源的系统，或者几个会话卡在等待某个资源（如锁）。虽然数据库可以自动解决会话之间的死锁（通过终止持有所需锁的其中一个会话），但当涉及内部内核级资源的栓锁或引脚时，Oracle
    有时无法自动检测和解决内部死锁——这导致了 Oracle 支持团队所称的“真正的数据库挂起”。因此，真正的数据库挂起是一种内部死锁或多个进程之间的循环依赖。Oracle
    支持团队通常会要求你提供`hanganalyze`跟踪文件和多个系统状态转储，以便他们诊断挂起的根本原因。在这种情况下，你甚至可能无法登录数据库。当你发现自己甚至无法登录数据库时，你的第一反应通常是尝试关闭并重启，这通常被称为“弹跳”数据库。不幸的是，虽然关闭并重启数据库可能“解决”问题，但它也会断开所有用户的连接——而且你仍然不知道到底是什么原因导致的问题。如果你决定要弹跳数据库，请先快速生成一些`hanganalyze`和`systemstate`转储。


    ![images](img/square.jpg) `Tip` 尽管有时可能令人不快，但如果你发现自己根本无法连接到挂起的数据库，那么请收集任何可能需要的跟踪转储，然后快速弹跳数据库，以便用户可以访问他们的应用程序。特别是当你处理的是由于内存问题而挂起的数据库时，弹跳实例可能会让事情迅速重新运转起来。


    如果你发现数据库完全没有响应，并且你甚至无法使用`SYSDBA`特权登录数据库，你可以使用`prelim`选项登录数据库。`prelim`选项代表初步连接，它会启动一个
    Oracle 进程并将该进程附加到 SGA 共享内存。然而，这不是一个完整或完全的连接，而是一个有限的连接，其中用于查询执行的结构没有被建立——因此，你甚至无法查询`V$`视图。不过，`prelim`选项允许你运行`oradebug`命令来获取用于诊断目的的错误转储堆栈。`hanganalyze`命令的输出可以告诉
    Oracle 支持工程师你的数据库是否真的因为会话等待某个资源而挂起。该命令进行内部内核调用，以找出所有正在等待资源的会话，并显示阻塞会话和等待会话之间的关系。你可以通过`oradebug`命令或`alter
    session`语句指定的`hanganalyze`选项会生成有关挂起会话的详细信息。一旦你获得转储文件，Oracle 支持人员就可以分析它，并告知你数据库挂起的原因。


    你可以在 1 到 10 之间的各个级别调用`hanganalyze`命令。级别 3 转储处于挂起（`IN_HANG`）状态的进程。通常不需要指定高于 3 的级别，因为更高的级别会产生冗长的报告，包含过多的进程细节。


    ![images](img/square.jpg) `Note` 你使用`hanganalyze`和`systemstate`命令创建的转储文件位于 ADR
    的 trace 目录中。


    注意，我们发出`oradebug`命令是为了获取级别为 266 的`systemstate`转储。级别 266（结合了产生短栈信息的级别 256 和级别 10）适用于
    Oracle 9.2.0.6 及更高版本的发行版（早期的发行版使用`systemstate level 10`）。级别 266 允许你转储每个进程的短栈，这些是
    Oracle 函数调用，可帮助 Oracle 开发团队确定是哪个 Oracle 函数导致了问题。短栈信息也有助于匹配代码中的已知错误。在 Solaris 和
    Linux 系统上，你可以安全地指定级别 266，但在其他系统上，转储短栈可能需要很长时间。因此，对于其他操作系统，你可能希望坚持使用级别 10。


    如果你能找出阻塞会话，你也可以只为该会话获取转储，使用命令`oradebug setospid nnnn`，其中`nnnn`是阻塞会话的 PID，然后调用`oradebug`命令，如下所示：


    ```

    SQL> oradebug setospid  9999

    SQL> oradebug unlimit

    SQL> oradebug dump errorstack  3

    ```


    请注意，你可以在正常会话（以及在`prelim`会话）中生成`hanganalyze`和`systemstate`转储，而无需使用`oradebug`命令。你可以通过`alter
    session`命令调用`hanganalyze`命令，如下所示。


    ```

    SQL> alter session set  events ''immediate trace name hanganalyze level 3'';

    ```


    同样，你可以使用以下命令获取`systemstate`转储：


    ```

    SQL> alter session set events ''immediate trace name SYSTEMSTATE level 10'';

    Session altered.

    SQL>

    ```


    `oradebug`和`systemstate`转储只是你可以收集的众多转储中的两种。使用`oradebug dumplist`命令查看你可以收集的各种错误转储。


    ```

    SQL> oradebug dumplist

    TRACE_BUFFER_ON

    TRACE_BUFFER_OFF

    LATCHES

    PROCESSSTATE

    SYSTEMSTATE

    INSTANTIATIONSTATE

    REFRESH_OS_STATS

    CROSSIC

    CONTEXTAREA

    HANGDIAG_HEADER

    HEAPDUMP

    …

    ```


    请注意，虽然你可以在编辑器中阅读一些转储文件，但这些文件主要是为了帮助 Oracle 支持专业人员排查数据库挂起情况。你对这些转储文件能做的有限，特别是当数据库挂起是由于
    Oracle 错误或内核级锁引起时，除了将它们发送给 Oracle 支持团队进行分析之外。


    ### 7-9. 调用自动诊断存储库命令解释程序


    #### Problem


    你想调用自动诊断存储库命令解释程序（ADRCI）并使用自动诊断存储库（ADR）的各种组件。

    '
- fmt: "### Solution\n\nADRCI is a tool to help you manage Oracle diagnostic data.\
    \ You can use ADRCI commands in both an interactive as well as a batch mode.\n\
    \nTo start ADRCI in the interactive mode, type `adrci` at the command line, as\
    \ shown here:\n\n```\n$ adrci\nADRCI: Release 11.2.0.1.0 - Production on Mon Mar\
    \ 14 11:41:41 2011\nCopyright (c) 1982, 2009, Oracle and/or its affiliates.  All\
    \ rights reserved.\nADR base = \"c:\\app\\ora\"\nadrci>\n```\n\nYou can issue\
    \ the `adrci` command from any directory, so long as the `PATH` environment variable\
    \ includes `ORACLE_HOME/bin/`. You can enter each command at the `adrci` prompt,\
    \ and when you're done using the utility, you can type `EXIT` or `QUIT` to exit.\
    \ You can view all the ADRCI commands available to you by typing `HELP` at the\
    \ ADRCI command line, as shown here:\n\n```\nadrci> HELP\n  HELP [topic]\n   Available\
    \ Topics:\n        CREATE REPORT\n        ECHO\n        EXIT\n        HELP\n \
    \       HOST\n        IPS\n…\n        SHOW HOMES | HOME | HOMEPATH\n        SHOW\
    \ INCDIR\n        SHOW INCIDENT\n        SHOW PROBLEM\n        SHOW REPORT\n \
    \       SHOW TRACEFILE\n        SPOOL\n\n There are other commands intended to\
    \ be used directly by Oracle, type\n \"HELP EXTENDED\" to see the list\nadrci>\n\
    ```\n\nYou can get detailed information for an individual ADRCI command by adding\
    \ the name of the command as an attribute to the `HELP` command. For example,\
    \ here is how to get the syntax for the `show tracefile` command:\n\n```\nadrci>\
    \ help show tracefile\n  Usage: SHOW TRACEFILE [file1 file2 ...] [-rt | -t]\n\
    \                         [-i inc1 inc2 ...] [-path path1 path2 ...]\n\n  Purpose:\
    \ List the qualified trace filenames.\n…\n  Options:\n  Examples:\n…\nadrci>\n\
    ```\n\nYou can also execute ADRCI commands in the batch mode by incorporating\
    \ the commands in a script or batch file. For example, if you want to run the\
    \ ADRCI commands `SET HOMEPATH` and `SHOW ALERT` from within an operating system\
    \ script, include the following line inside a shell script:\n\n```\nSET HOMEPATH\
    \ diag/rdbms/orcl/orcl; SHOW ALERT -term\n```\n\nLet's say your script name is\
    \ `myscript.txt`. You can then execute this script by issuing the following command\
    \ inside an operating system shell script or batch file:\n\n```\n$ adrci script=myscript.txt\n\
    ```\n\nNote that the parameter `SCRIPT` tells ADRCI that it must execute the commands\
    \ within the text file `myscript.txt`. If the text file is not within the same\
    \ directory from where the shell script or batch file is running, you must provide\
    \ the path for the directory where you saved the text file.\n\nTo execute an ADRCI\
    \ command directly at the command line instead of invoking ADRCI first and working\
    \ interactively with the ADR interface, specify the parameter `EXEC` with the\
    \ ADRCI command, as shown here:\n\n```\n$ adrci EXEC=\"SHOW HOMES; SHOW INCIDENT\"\
    \n```\n\nThis example shows how to include two ADRCI commands `—SHOW HOMES` and\
    \ `SHOW INCIDENT`—by executing the ADRCI command at the command line."
  raw: '#### Solution


    ADRCI is a tool to help you manage Oracle diagnostic data. You can use ADRCI commands
    in both an interactive as well as a batch mode.


    To start ADRCI in the interactive mode, type **adrci** at the command line, as
    shown here:


    ` $ adrci`


    `ADRCI: Release 11.2.0.1.0 - Production on Mon Mar 14 11:41:41 2011`


    `Copyright (c) 1982, 2009, Oracle and/or its affiliates.  All rights reserved.`


    `ADR base = "c:\app\ora"`

    `adrci>`


    You can issue the `adrci` command from any directory, so long as the PATH environment
    variable includes `ORACLE_HOME/bin/`. You can enter each command at the `adrci`
    prompt, and when you''re done using the utility, you can type **EXIT** or **QUIT**
    to exit. You can view all the ADRCI commands available to you by typing **HELP**
    at the ADRCI command line, as shown here:


    `adrci> HELP`


    ` HELP [topic]`

    `   Available Topics:`

    `        CREATE REPORT`

    `        ECHO`

    `        EXIT`

    `        HELP`

    `        HOST`

    `        IPS`

    `…`

    `        SHOW HOMES | HOME | HOMEPATH`

    `        SHOW INCDIR`

    `        SHOW INCIDENT`

    `        SHOW PROBLEM`

    `        SHOW REPORT`

    `        SHOW TRACEFILE`

    `        SPOOL`


    ` There are other commands intended to be used directly by Oracle, type`

    ` "HELP EXTENDED" to see the list`


    `adrci>`


    You can get detailed information for an individual ADRCI command by adding the
    name of the command as an attribute to the `HELP` command. For example, here is
    how to get the syntax for the `show tracefile` command:


    `adrci> help` *`show tracefile`*


    `  Usage: SHOW TRACEFILE [file1 file2 ...] [-rt | -t]`

    `                        [-i inc1 inc2 ...] [-path path1 path2 ...]`


    `  Purpose: List the qualified trace filenames.`

    `…`

    `  Options:`

    `  Examples:`

    `…`

    `adrci>`


    You can also execute ADRCI commands in the batch mode by incorporating the commands
    in a script or batch file. For example, if you want to run the ADRCI commands
    `SET HOMEPATH` and `SHOW ALERT` from within an operating system script, include
    the following line inside a shell script:


    `SET HOMEPATH diag/rdbms/orcl/orcl; SHOW ALERT -term`


    Let''s say your script name is `myscript.txt`. You can then execute this script
    by issuing the following command inside an operating system shell script or batch
    file:


    `$ adrci script=myscript.txt`


    Note that the parameter `SCRIPT` tells ADRCI that it must execute the commands
    within the text file `myscript.txt`. If the text file is not within the same directory
    from where the shell script or batch file is running, you must provide the path
    for the directory where you saved the text file.


    To execute an ADRCI command directly at the command line instead of invoking ADRCI
    first and working interactively with the ADR interface, specify the parameter
    `EXEC` with the ADRCI command, as shown here:


    `$ adrci EXEC="SHOW HOMES; SHOW INCIDENT"`


    This example shows how to include two ADRCI commands `—SHOW HOMES` and `SHOW INCIDENT`—by
    executing the ADRCI command at the command line.'
  trans: "### 解决方案\n\nADRCI 是一个帮助你管理 Oracle 诊断数据的工具。你可以在交互模式和批处理模式下使用 ADRCI 命令。\n\n\
    要在交互模式下启动 ADRCI，请在命令行输入 `adrci`，如下所示：\n\n```\n$ adrci\nADRCI: Release 11.2.0.1.0\
    \ - Production on Mon Mar 14 11:41:41 2011\nCopyright (c) 1982, 2009, Oracle and/or\
    \ its affiliates.  All rights reserved.\nADR base = \"c:\\app\\ora\"\nadrci>\n\
    ```\n\n只要 `PATH` 环境变量包含了 `ORACLE_HOME/bin/`，你就可以从任何目录发出 `adrci` 命令。你可以在 `adrci>`\
    \ 提示符下输入每条命令，使用完该实用程序后，你可以键入 `EXIT` 或 `QUIT` 来退出。你可以通过在 ADRCI 命令行键入 `HELP` 来查看所有可用的\
    \ ADRCI 命令，如下所示：\n\n```\nadrci> HELP\n  HELP [topic]\n   Available Topics:\n \
    \       CREATE REPORT\n        ECHO\n        EXIT\n        HELP\n        HOST\n\
    \        IPS\n…\n        SHOW HOMES | HOME | HOMEPATH\n        SHOW INCDIR\n \
    \       SHOW INCIDENT\n        SHOW PROBLEM\n        SHOW REPORT\n        SHOW\
    \ TRACEFILE\n        SPOOL\n\n There are other commands intended to be used directly\
    \ by Oracle, type\n \"HELP EXTENDED\" to see the list\nadrci>\n```\n\n你可以通过将命令名作为属性添加到\
    \ `HELP` 命令中，来获取单个 ADRCI 命令的详细信息。例如，以下是获取 `show tracefile` 命令语法的方法：\n\n```\nadrci>\
    \ help show tracefile\n  Usage: SHOW TRACEFILE [file1 file2 ...] [-rt | -t]\n\
    \                         [-i inc1 inc2 ...] [-path path1 path2 ...]\n\n  Purpose:\
    \ List the qualified trace filenames.\n…\n  Options:\n  Examples:\n…\nadrci>\n\
    ```\n\n你也可以通过将命令集成到脚本或批处理文件中，以批处理模式执行 ADRCI 命令。例如，如果你想从操作系统脚本中运行 ADRCI 命令 `SET\
    \ HOMEPATH` 和 `SHOW ALERT`，请在 shell 脚本中包含以下内容：\n\n```\nSET HOMEPATH diag/rdbms/orcl/orcl;\
    \ SHOW ALERT -term\n```\n\n假设你的脚本名是 `myscript.txt`。然后，你可以在操作系统 shell 脚本或批处理文件中执行以下命令来运行此脚本：\n\
    \n```\n$ adrci script=myscript.txt\n```\n\n请注意，参数 `SCRIPT` 告诉 ADRCI 它必须执行文本文件\
    \ `myscript.txt` 中的命令。如果文本文件不在运行 shell 脚本或批处理文件的同一目录中，你必须提供保存文本文件的目录的路径。\n\n要直接在命令行执行\
    \ ADRCI 命令，而不是先调用 ADRCI 并与 ADR 接口进行交互，请使用参数 `EXEC` 指定 ADRCI 命令，如下所示：\n\n```\n\
    $ adrci EXEC=\"SHOW HOMES; SHOW INCIDENT\"\n```\n\n此示例展示了如何通过在命令行执行 ADRCI 命令来包含两个\
    \ ADRCI 命令——`SHOW HOMES` 和 `SHOW INCIDENT`。"
- fmt: "# How It Works\n\nThe Automatic Diagnostic Repository is a directory structure\
    \ that you can access even when the database is down, because it's stored outside\
    \ the database. The root directory for the ADR is called the **ADR base** and\
    \ is set by the `DIAGNOSTIC_DEST` initialization parameter. Each Oracle product\
    \ or component has its own **ADR home** under the ADR base. The location of each\
    \ of the ADR homes follows the path `diag/product_type/product_id/instance_id`.\
    \ Thus, the ADR home for a database named `orcl1` with the instance name `orcl1`\
    \ and the ADR base set to `/app/oracle` will be `/app/oracle/diag/rdbms/orcl1/orcl1`.\
    \ Under each of the ADR homes are the diagnostic data, such as the trace and dump\
    \ files and the alert log, as well as other diagnostic files, for that instance\
    \ of an Oracle product.\n\nThe ADRCI utility helps you manage the diagnostic data\
    \ in the ADR. ADRCI lets you perform the following types of diagnostic tasks:\n\
    \n*   View diagnostic data in the ADR (Automatic Diagnostic Repository): The ADR\
    \ stores diagnostic data such as alert logs, dump files, trace files, health check\
    \ reports, etc.\n*   View health check reports: The diagnosability infrastructure\
    \ automatically runs health checks to capture details about the error and adds\
    \ them to other diagnostic data it collects for that error. You can also manually\
    \ invoke a health check.\n*   Package incidents and problem information for transmission\
    \ to Oracle Support: A **problem** is a critical database error, and an **incident**\
    \ is a single occurrence of a specific problem. An incident package is a collection\
    \ of diagnostic data that you send to Oracle Support for troubleshooting purposes.\
    \ ADRCI has special commands that enable you to create packages and generate zipped\
    \ diagnostic packages to send to Oracle Support.\n\nYou can view all ADR locations\
    \ for the current database instance by querying the `V$DIAG_INFO` view, as shown\
    \ here.\n\n```sql\nSQL> select * from v$diag_info;\n\n   INST_ID           NAME\
    \                   VALUE\n-----------    ------------------     ----------------------------------------\n\
    1              Diag Enabled           TRUE\n1              ADR Base          \
    \     c:\\app\\ora\n1              ADR Home               c:\\app\\ora\\diag\\\
    rdbms\\orcl1\\orcl1\n1              Diag Trace             c:\\app\\ora\\diag\\\
    rdbms\\orcl1\\orcl1\\trace\n1              Diag Alert             c:\\app\\ora\\\
    diag\\rdbms\\orcl1\\orcl1\\alert\n1              Diag Incident          c:\\app\\\
    ora\\diag\\rdbms\\orcl1\\orcl1\\incident\n1              Diag Cdump          \
    \   c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\cdump\n1              Health Monitor\
    \         c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\hm\n1              Default\
    \ Trace File     c:\\app\\ora…\\trace\\orcl1_ora_6272.trc\n1              Active\
    \ Problem Count        2\n1              Active Incident Count       3\n\n11 rows\
    \ selected.\n\nSQL>\n```\n\nThe ADR home is the root directory for a database's\
    \ diagnostic data. All diagnostic files such as the alert log and the various\
    \ trace files are located under the ADR home. The ADR home is located directly\
    \ underneath the ADR base, which you specify with the `DIAGNOSTIC_DEST` initialization\
    \ parameter. Here's how to find out the location of the ADR base directory:\n\n\
    ```\nadrci> show base\nADR base is \"c:\\app\\ora\"\nadrci>\n```\n\nYou can view\
    \ all the ADR homes under the ADR base by issuing the following command:\n\n```\n\
    adrci> show homes\nADR Homes:\ndiag\\clients\\user_salapati\\host_3975876188_76\n\
    diag\\clients\\user_system\\host_3975876188_76\ndiag\\rdbms\\orcl1\\orcl1\ndiag\\\
    tnslsnr\\miropc61\\listener\nadrci>\n```\n\nYou can have multiple ADR homes under\
    \ the ADR base, and multiple ADR homes can be current at any given time. Your\
    \ ADRCI commands will work only with diagnostic data in the current ADR home.\
    \ How do you know which ADR home is current at any point in time? The ADRCI homepath\
    \ helps determine the ADR homes that are current, by pointing to the ADR home\
    \ directory under the ADR base hierarchy of directories.\n\n![images](images/square.jpg)\
    \ **Note** Some ADRCI commands require only one ADR home to be current—these commands\
    \ will issue an error if multiple ADR homes are current.\n\nYou can use either\
    \ the `show homes` or the `show homepath` command to view all ADR homes that are\
    \ current:\n\n```\nadrci> show homepath\nADR Homes:\ndiag\\clients\\user_salapati\\\
    host_3975876188_76\ndiag\\clients\\user_system\\host_3975876188_76\ndiag\\rdbms\\\
    orcl1\\orcl1\ndiag\\tnslsnr\\miropc61\\listener\nadrci>\n```\n\nIf you want to\
    \ work with diagnostic data from multiple database instances or components, you\
    \ must ensure that all the relevant ADR homes are current. Most of the time, however,\
    \ you'll be dealing with a single database instance or a single Oracle product\
    \ or component such as the listener, for example. An ADR homepath is always relative\
    \ to the ADR. If you specify `/u01/app/oracle/` as the value for the ADR base\
    \ directory, for example, all ADR homes will be under the `ADR_Base/diag` directory.\
    \ Issue the `set homepath` command to set an ADR home directory to a single home,\
    \ as shown here:\n\n```\nadrci> set homepath diag\\rdbms\\orcl1\\orcl1\n\nadrci>\
    \ show homepath\n\nADR Homes:\ndiag\\rdbms\\orcl1\\orcl1\nadrci>\n```\n\n![images](images/square.jpg)\
    \ **Note** Diagnostic data includes descriptions of incidents and problems, health\
    \ monitoring reports, and traditional diagnostic files such as trace files, dump\
    \ files, and alert logs.\n\nNote that before you set the homepath with the `set\
    \ homepath` command, the `show homepath` command shows all ADR homepaths. However,\
    \ once you set the homepath to a specific home, the `show homepath` command shows\
    \ just a single homepath. It's important to set the homepath before you execute\
    \ several ADRCI commands, as they are applicable to only a single ADR home. For\
    \ example, if you don't set the homepath before issuing the following command,\
    \ you'll receive an error:\n\n```\nadrci> ips create package\nDIA-48448: This\
    \ command does not support multiple ADR homes\nadrci>\n```\n\nThe error occurs\
    \ because the `ips create package` command is not valid with multiple ADR homes.\
    \ The command will work fine after you issue the `set homepath` command to set\
    \ the homepath to a single ADR home. Commands such as the one shown here work\
    \ only with a single current ADR home, but others work with multiple current ADR\
    \ homes—there are also commands that don't need a current ADR home. The bottom\
    \ line is that all ADRCI commands will work with a single current ADR home.\n\n\
    ### 7-10. Viewing an Alert Log from ADRCI\n\n#### Problem\n\nYou want to view\
    \ an alert log by using ADRCI commands.\n\n#### Solution\n\nTo view an alert log\
    \ with ADRCI, follow these steps:\n\n1.  Invoke ADRCI.\n    `$ adrci`\n2.  Set\
    \ the ADR home with the `set homepath` command.\n    `adrci> set homepath diag\\\
    rdbms\\orcl1\\orcl1`\n3.  Enter the following command to view the alert log:\n\
    \    `adrci> show alert`\n\n    ```\n    ADR Home = c:\\app\\ora\\diag\\rdbms\\\
    orcl1\\orcl1:\n    *************************************************************************\n\
    \    Output the results to file: c:\\temp\\alert_10916_7048_orcl1_1.ado\n    ```\n\
    \nThe alert log will pop up in your default editor. The ADRCI prompt will return\
    \ once you close the text file in the editor.\n\nYou can also query the `V$DIAG_INFO`\
    \ view to find the path that corresponds to the Diag Trace entry. You can change\
    \ the directory to that path and open the `alert_<db_name>.log` file with a text\
    \ editor."
