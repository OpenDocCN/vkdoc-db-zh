  trans: "#### 工作原理\n\n等待事件是服务器进程或线程在等待某个事件完成以便继续处理时递增的统计信息。例如，一条 SQL 语句可能正在修改数据，但服务器进程可能必须等待从磁盘读取一个数据块，因为它不在\
    \ SGA 中可用。尽管等待事件数量庞大，但最常见的事件包括以下这些：\n*   `buffer busy waits`（缓冲区忙等待）\n*   `free\
    \ buffer waits`（空闲缓冲区等待）\n*   `db file scattered read`（数据文件分散读取）\n*   `db file\
    \ sequential read`（数据文件顺序读取）\n*   `enqueue waits`（队列锁等待）\n*   `log buffer space`（日志缓冲区空间）\n\
    *   `log file sync`（日志文件同步）\n\n分析 Oracle 等待事件是在排查运行缓慢的查询时需要执行的最重要的性能调优任务。当一个查询运行缓慢时，通常意味着存在过多某种类型的等待。有些等待可能是由于缺少索引导致\
    \ I/O 过多所致。其他等待则可能由闩锁或锁事件引起。本章中的多个方法将向您展示如何识别和修复各种与 Oracle 等待相关的性能问题。\n\n通常，占据最多等待时间的等待事件值得进一步调查。然而，重要的是要理解，等待事件只显示了潜在问题的**症状**——因此，您应将等待事件视为观察特定问题的窗口，而不是问题本身。当\
    \ Oracle 遇到诸如缓冲区争用或闩锁争用之类的问题时，它只会递增与该闩锁或缓冲区相关的特定类型的等待事件。通过这样做，数据库显示了它在哪里不得不等待特定资源，因而无法继续处理。\n\
    \n缓冲区或闩锁争用通常可追溯到有缺陷的应用程序逻辑，但有些等待事件也可能源自系统问题，例如配置错误的 RAID 系统。缺少索引、不合适的初始化参数、与内存相关的初始化参数值不足，以及重做日志文件大小不足，都只是可能导致数据库中等待过多的部分原因。分析\
    \ Oracle 等待事件的最大好处在于，它消除了性能调优中的猜测成分——您可以看到导致性能下降的确切原因，因此您可以立即着手修复问题。\n\n### 5-4.\
    \ 理解等待类别事件\n\n#### 问题\n\n您想了解 Oracle 如何将等待事件分类到不同的类别中。\n\n#### 解决方案\n\n每个 Oracle\
    \ 等待事件都属于一个特定的等待事件类别。Oracle 将等待事件分组为诸如 `Administrative`（管理）、`Application`（应用程序）、`Cluster`（集群）、`Commit`（提交）、`Concurrency`（并发）、`Configuration`（配置）、`Scheduler`（调度程序）、`System\
    \ I/O`（系统 I/O）和 `User I/O`（用户 I/O）等类别，以方便分析等待事件。以下是其中部分类别中典型等待的一些示例：\n\n> `Application`:\
    \ 与锁相关的等待信息\n> \n> `Commit`: 在提交事务后等待确认重做日志写入\n> \n> `Network`: 由于通过网络发送数据延迟导致的等待\n\
    > \n> `User I/O`: 等待从磁盘读取数据块\n\n两个关键的等待类别是 `Application` 和 `User I/O` 等待类别。`Application`\
    \ 等待类别包含由于应用程序引起的行锁和表锁导致的等待。`User I/O` 类别包括 `db file scattered read`、`db file\
    \ sequential read`、`direct path read` 和 `direct path write` 事件。`System I/O` 类别包括重做日志相关的等待事件以及其他等待。`Commit`\
    \ 类别仅包含 `log file sync` 等待信息。还有一个“空闲”类别的等待事件，例如 `SQL*Net message from client`，它们仅仅表示一个不活动的会话。您可以忽略这些空闲等待。\n\
    \n#### 工作原理\n\n等待事件的类别帮助您快速查明是哪种类型的活动影响了数据库性能。例如，`Administrative` 等待类别可能显示大量的等待，因为您正在重建索引。`Concurrency`\
    \ 等待指向对内部数据库资源（如闩锁）的等待。如果 `Cluster` 等别显示了最多的等待事件，那么您的 RAC 实例可能正在经历全局缓存资源的争用（例如\
    \ `gc cr block busy` 事件）。请注意，`System I/O` 等待类别包括后台进程 I/O 的等待，例如 DBWR（数据库写入器）等待事件\
    \ `db file parallel write`。\n\n`Application` 等待类别包含由用户应用程序代码导致的等待——您的大部分队列锁（enqueue）等待都属于这个等待类别。`Commit`\
    \ 类别中唯一的等待事件是 `log file sync` 事件，我们将在本章后面详细研究它。`Configuration` 类别的等待包括那些由日志文件大小过小等原因引起的等待。\n\
    \n### 5-5. 检查会话等待\n\n#### 问题\n\n您想要找出一个会话中的等待事件。\n\n#### 解决方案\n\n您可以使用 `V$SESSION_WAIT`\
    \ 视图快速了解特定会话正在等待什么，如下所示：\n\n```\nSQL> select event, count(*) from v$session_wait\n\
    \     group by event;\n\nEVENT                                               \
    \                    COUNT(*)\n----------------------------------------------------------------\
    \ ----------\nSQL*Net message from client                                    \
    \                11\nStreams AQ: waiting for messages in the queue           \
    \                        1\nenq: TX - row lock contention                    \
    \                               1\n…\n15 rows selected.\n\nSQL>\n```\n\n该查询的输出表明，一个会话正在等待队列锁（enqueue\
    \ lock），可能是因为被另一个会话持有的阻塞锁。如果您看到大量会话正在经历行锁争用，则必须进一步调查并确定阻塞会话。\n\n以下是另一种查询 `V$SESSION_WAIT`\
    \ 视图的方法，用于找出是什么拖慢了特定会话：\n\n```\nSQL> select event, state, seconds_in_wait siw\n\
    \     from   v$session_wait\n     where  sid = 81;\n\nEVENT                  \
    \                       STATE             SIW\n----------------------------------------\
    \     -----------        ------\nenq: TX - row lock contention               \
    \  WAITING             976\n```\n\n前面的查询显示，SID 为 81 的会话一直在等待一个队列锁事件，因为它想要更新的行（或多行）被另一个事务锁定了。\n\
    \n![images](img/square.jpg) **注意** 在 Oracle Database 11g 中，数据库将每个资源等待计为仅仅一次等待，即使该会话因等待而经历了许多内部超时。例如，等待一个队列锁\
    \ 15 秒可能包含 5 次不同的、每次 3 秒长的等待调用——数据库将这些仅视为一次单独的队列锁等待。"
- fmt: "### 5-6\\. 按类别检查等待事件\n\n#### 问题\n\n你想要检查 Oracle 等待事件类别。\n\n#### 解决方案\n\n以下查询显示了不同的等待类别以及与每个等待类别关联的等待事件。\n\
    \n```sql\nSQL> select  wait_class, name\n  2  from v$event_name\n  3  where name\
    \ LIKE 'enq%'\n  4  and wait_class <> 'Other'\n  5* order by wait_class\nSQL>\
    \ /\n\nWAIT_CLASS                                  NAME\n--------------------\
    \               --------------------------\nAdministrative                   \
    \  enq: TW - contention\nConcurrency                        enq: TX - index contention\n\
    …\nSQL>\n```\n\n要查看当前按各种等待类别分组的等待情况，请执行以下查询：\n\n```sql\nSQL> select wait_class,\
    \ sum(time_waited), sum(time_waited)/sum(total_waits)\n  2  sum_waits\n  3  from\
    \ v$system_wait_class\n  4  group by wait_class\n  5* order by 3 desc;\n\nWAIT_CLASS\
    \                         SUM(TIME_WAITED)                SUM_WAITS\n----------------\
    \ ----------               -----------------        -----------------\nIdle  \
    \                                        249659211               347.489249\n\
    Commit                                         1318006               236.795904\n\
    Concurrency                                     16126                 4.818046\n\
    User I/O                                        135279                 2.228869\n\
    Application                                        912                .0928055\n\
    Network                                            139                .0011209\n\
    …\nSQL>\n```\n\n如果你看到 `Idle` 等待类别的总和非常高，不用担心——实际上，在任何健康的数据库中，你都应该期望看到这个。然而，在典型的生产环境中，你肯定会看到更多在\
    \ `User I/O` 和 `Application` 等待类别下的等待。例如，如果你注意到数据库为 `Application` 等待类别或 `User\
    \ I/O` 等待类别积累了非常长的等待时间，那么就需要进一步研究这两个等待类别。在下面的例子中，我们深入研究了几个等待类别，以找出是哪些特定的等待导致了\
    \ `Application` 和 `Concurrency` 类别下的总等待时间过高。为此，除了 `V$SYSTEM_WAIT_CLASS` 视图外，我们还使用了\
    \ `V$SYSTEM_EVENT` 和 `$EVENT_NAME` 视图。关注点不仅在于总等待时间，还在于平均等待时间，以评估等待事件的影响。\n\n```sql\n\
    SQL> select a.event, a.total_waits, a.time_waited, a.average_wait\n     from v$system_event\
    \ a, v$event_name b, v$system_wait_class c\n     where a.event_id=b.event_id\n\
    \     and b.wait_class#=c.wait_class#\n     and c.wait_class in ('Application','Concurrency')\n\
    \     order by average_wait desc;\nEVENT                       TOTAL_WAITS   TIME_WAITED\
    \    AVERAGE_WAIT\n----------- ------------    -----------   -------------  -------------\n\
    enq: UL - contention                  1             499          499.19\nlatch:\
    \ shared pool                  251           10944           43.6\nlibrary cache\
    \ load lock              24             789          32.88\nSQL>\n```\n\n> ![images](images/square.jpg)\
    \ **提示** 两个最常见的 Oracle 等待事件是 `db file scattered read` 和 `db file sequential read`\
    \ 事件。`db file scattered read` 等待事件是由于对大表进行全表扫描引起的。如果你遇到这个等待事件， investigate 为表添加索引的可能性。`db\
    \ file sequential read` 等待事件是由于索引读引起的。虽然索引读看起来是好事，但大量的索引读可能表明存在需要优化的低效查询。如果 `db\
    \ file sequential read` 等待事件的高值是由大量小型索引读引起的，这并不是真正的问题——这在数据库中很常见。如果少数查询导致了大部分等待，你就应该关注了。\n\
    \n你可以看到，由行锁争用引起的入队等待是这两个类别下导致最多等待的原因。现在你确切地知道是什么拖慢了数据库中的查询！要找到性能受到行锁争用影响的会话，请使用以下查询深入到会话级别：\n\
    \n```sql\nSQL> select a.sid, a.event, a.total_waits, a.time_waited, a.average_wait\n\
    \     from v$session_event a, v$session b\n     where time_waited > 0\n     and\
    \ a.sid=b.sid\n     and b.username is not NULL\n     and a.event='enq: TX - row\
    \ lock contention';\n\n  SID               EVENT                      TOTAL_WAITS\
    \    time_waited      average_wait\n----------     ------------------------------\
    \  ------------   -----------      ------------\n        68      enq: TX - row\
    \ lock contention             24           8018              298\nSQL>\n```\n\n\
    输出显示，SID 为 68 的会话正在等待被另一个事务持有的行锁。\n\n#### 工作原理\n\n理解各种 Oracle 等待事件类别能增强你快速诊断 Oracle\
    \ 与等待相关问题的能力。按类别分析等待事件可以让你知道是争用、用户 I/O 还是配置问题导致了高等待。“解决方案”部分中的示例展示了如何基于等待事件类别开始分析等待。这有助于识别等待的来源，例如并发问题。一旦你识别出导致大部分等待的等待事件类别，你就可以深入研究该等待事件类别，找出导致该类别下总等待时间过高的具体等待事件。然后，你可以使用“解决方案”部分中显示的最终查询，识别正在等待这些等待事件的用户会话。\n\
    \n### 5-7\\. 解决缓冲区忙等待\n\n#### 问题\n\n根据 AWR 报告的输出，你的数据库正在经历大量的缓冲区忙等待。你想要解决这些等待。\n\
    \n#### 解决方案\n\n...\n\n### 5-6. 按类别检查等待事件\n\n#### 工作原理\n\n“解决方案”部分中显示的第一个查询提供了一种简单的方法来查明哪些等待事件（如果有的话）正在拖慢用户会话。当你在不指定\
    \ `SID` 的情况下发出查询时，它会显示数据库中所有会话的当前和最后一次等待。例如，如果你在数据库中遇到锁定情况，你可以定期发出查询，以查看总入队等待次数是否在下降。如果整个实例的入队等待次数在增长，则意味着更多会话因被阻塞的锁而遇到性能下降。\n\
    \n`V$SESSION_WAIT` 视图显示每个会话的当前或上一次等待。该视图中的 `STATE` 列告诉你会话是否正在等待。以下是 `STATE` 列的可能值：\n\
    \n> `WAITING:` 会话当前正在等待资源。\n>\n> `WAITED UNKNOWN TIME`: 上一次等待的持续时间未知（仅在你将 `TIMED_STATISTICS`\
    \ 参数设置为 `false` 时才显示此值）。\n>\n> `WAITED SHORT TIME`: 最近一次等待少于百分之一秒。\n>\n> `WAITED\
    \ KNOWN TIME`: `WAIT_TIME` 列显示上一次等待的持续时间。\n\n请注意，该查询利用 `seconds_in_wait` 列来查明此会话已等待了多长时间。Oracle\
    \ 已弃用此列，转而使用 `wait_time_micro` 列，该列以微秒为单位显示等待时间。如果会话当前正在等待，这两列都显示当前等待已等待的时间量。如果会话当前没有等待，`wait_time_micro`\
    \ 列显示上一次等待期间已等待的时间量。"
  raw: "#### How It Works\n\nThe first query shown in the “Solution” section offers\
    \ an easy way to find out which wait events, if any, are slowing down user sessions.\
    \ When you issue the query without specifying a SID, it displays the current and\
    \ last waits for all sessions in the database. If you encounter a locking situation\
    \ in the database, for example, you can issue the query periodically to see whether\
    \ the total number of enqueue waits is coming down. If the number of enqueue waits\
    \ across the instance is growing, that means more sessions are encountering slowdowns\
    \ due to blocked locks.\n\nThe `V$SESSION_WAIT` view shows the current or the\
    \ last wait for each session. The `STATE` column in this view tells you if a session\
    \ is currently waiting. Here are the possible values for the `STATE` column:\n\
    \n> `WAITING:` The session is currently waiting for a resource.\n> \n> `WAITED\
    \ UNKNOWN TIME`: The duration of the last wait is unknown (this value is shown\
    \ only if you set the `TIMED_STATISTICS` parameter to false).\n> \n> `WAITED SHORT\
    \ TIME`: The most recent wait was less than a hundredth of a second long.\n> \n\
    > `WAITED KNOWN TIME`: The `WAIT_TIME` column shows the duration of the last wait.\n\
    \nNote that the query utilizes the `seconds_in_wait` column to find out how long\
    \ this session has been waiting. Oracle has deprecated this column in favor of\
    \ the `wait_time_micro` column, which shows the amount of time waited in microseconds.\
    \ Both columns show the amount of time waited for the current wait, if the session\
    \ is currently waiting. If the session is not currently waiting, the `wait_time_micro`\
    \ column shows the amount of time waited during the last wait.\n\n### 5-6\\. Examining\
    \ Wait Events by Class\n\n#### Problem\n\nYou want to examine Oracle wait event\
    \ classes.\n\n#### Solution\n\nThe following query shows the different types of\
    \ wait classes and the wait events associated with each wait class.\n\n`SQL> select  wait_class,\
    \ name`\n`  2  from v$event_name`\n`  3  where name LIKE 'enq%'`\n`  4  and wait_class\
    \ <> 'Other'`\n`  5* order by wait_class`\n`SQL> /`\n\n`WAIT_CLASS                                 NAME`\n\
    `--------------------               --------------------------`\n`Administrative                     enq:\
    \ TW - contention`\n`Concurrency                        enq: TX - index contention`\n\
    `…`\n`SQL>`\n\nTo view the current waits grouped into various wait classes, issue\
    \ the following query:\n\n`SQL> select wait_class, sum(time_waited), sum(time_waited)/sum(total_waits)`\n\
    `  2  sum_waits`\n`  3  from v$system_wait_class`\n`  4  group by wait_class`\n\
    `  5* order by 3 desc;`\n\n`WAIT_CLASS                             SUM(TIME_WAITED)                SUM_WAITS`\n\
    `---------------- ----------           -----------------        -----------------`\n\
    `Idle                                          249659211               347.489249`\n\
    `Commit                                          1318006               236.795904`\n\
    `Concurrency                                       16126                 4.818046`\n\
    `User I/O                                         135279                 2.228869`\n\
    `Application                                         912                 .0928055`\n\
    `Network                                             139                 .0011209`\n\
    `…`\n`SQL>`\n\nIf you see a very high sum of waits for the `Idle` wait class,\
    \ not to worry—actually, you should expect to see this in any healthy database.\
    \ In a typical production environment, however, you'll certainly see more waits\
    \ under the `User I/O` and `Application` wait classes. If you notice that the\
    \ database has accumulated a very large wait time for the `Application` wait class,\
    \ or the `User I/O` wait class, for example, it's time to investigate those two\
    \ wait classes further. In the following example, we drill down into a couple\
    \ of wait classes to find out which specific waits are causing the high sum of\
    \ total wait time under the `Application` and `Concurrency` classes. To do this,\
    \ we use the `V$SYSTEM_EVENT` and the `$EVENT_NAME` views in addition to the `V$SYSTEM_WAIT_CLASS`\
    \ view. Focus not just on the total time waited, but also on the average wait,\
    \ to gauge the effect of the wait event.\n\n`SQL> select a.event, a.total_waits,\
    \ a.time_waited, a.average_wait`\n`     from v$system_event a, v$event_name b,\
    \ v$system_wait_class c`\n`     where a.event_id=b.event_id`\n`     and b.wait_class#=c.wait_class#`\n\
    `     and c.wait_class in ('Application','Concurrency')`\n`     order by average_wait\
    \ desc;`\n`EVENT                       TOTAL_WAITS   TIME_WAITED    AVERAGE_WAIT`\n\
    `----------- ------------    -----------   -------------  -------------`\n`enq:\
    \ UL - contention                  1             499         499.19`\n\n`latch:\
    \ shared pool                  251           10944           43.6`\n\n`library\
    \ cache load lock              24             789          32.88`\n\n`SQL>`\n\n\
    ![images](images/square.jpg) **Tip** Two of the most common Oracle wait events\
    \ are the `db file scattered read` and the `db file sequential read` events. The\
    \ `db file scattered read` wait event is due to full table scans of large tables.\
    \ If you experience this wait event, investigate the possibility of adding indexes\
    \ to the table or tables. The `db file sequential read` wait event is due to indexed\
    \ reads. While an indexed read may seem like it's a good thing, a very high amount\
    \ of indexed reads could potentially indicate an inefficient query that you must\
    \ tune. If high values for the `db file sequential read` wait event are due to\
    \ a very large number of small indexed reads, it's not really a problem—this is\
    \ natural in a database. You should be concerned if a handful of queries are responsible\
    \ for most of the waits.\n\nYou can see that the enqueue waits caused by the row\
    \ lock contention are what's causing the most waits under these two classes. Now\
    \ you know exactly what's slowing down the queries in your database! To get at\
    \ the session whose performance is being affected by the contention for the row\
    \ lock, drill down to the session level using the following query:\n\n`SQL> select\
    \ a.sid, a.event, a.total_waits, a.time_waited, a.average_wait`\n`     from v$session_event\
    \ a, v$session b`\n`     where time_waited > 0`\n`     and a.sid=b.sid`\n`     and\
    \ b.username is not NULL`\n`     and a.event='enq: TX - row lock contention';`\n\
    \n`  SID               EVENT                      TOTAL_WAITS    time_waited      average_wait`\n\
    `----------     ------------------------------  ------------   -----------      ------------`\n\
    `        68     enq: TX - row lock contention             24           8018              298`\n\
    `SQL>`\n\nThe output shows that the session with the SID 68 is waiting for a row\
    \ lock that's held by another transaction.\n\n#### How It Works\n\nUnderstanding\
    \ the various Oracle wait event classes enhances your ability to quickly diagnose\
    \ Oracle wait-related problems. Analyzing wait events by classes lets you know\
    \ if contention, user I/O, or a configuration issue is responsible for high waits.\
    \ The examples in the “Solution” section show you how to start analyzing the waits\
    \ based on the wait event classes. This helps identify the source of the waits,\
    \ such as concurrency issues, for example. Once you identify the wait event class\
    \ responsible for most of the waits, you can drill down into that wait event class\
    \ to find out the specific wait events that are contributing to high total waits\
    \ for that wait event class. You can then identify the user sessions waiting for\
    \ those wait events, using the final query shown in the “Solution” section.\n\n\
    ### 5-7\\. Resolving Buffer Busy Waits\n\n#### Problem\n\nYour database is experiencing\
    \ a high number of buffer busy waits, based on the output from the AWR report.\
    \ You want to resolve those waits."
