    \                        'MAX_AUTO_SQL_PROFILES',\n                        'EXECUTION_DAYS_TO_EXPIRE');\n\
    ```\n\n这是一些示例输出：\n\n```\nPARAMETER_NAME                 PARAMETER_VALUE\n------------------------------\
    \ ------------------------------\nACCEPT_SQL_PROFILES            FALSE\nEXECUTION_DAYS_TO_EXPIRE\
    \       30\nMAX_SQL_PROFILES_PER_EXEC      20\nMAX_AUTO_SQL_PROFILES         \
    \ 10000\n```\n\n前面的参数在 表 11-3 中描述。\n\n![images](img/t1103.jpg)\n\n您还可以使用 Enterprise\
    \ Manager 来管理自动 SQL 调优的相关功能。从主数据库页面，导航到“顾问中心”页面。接下来，单击“SQL 顾问”链接。现在单击“自动 SQL 调优结果”页面。您应该会看到一个类似于\
    \ 图 11-2 的屏幕。\n\n![images](img/1102.jpg)\n\n`图 11-2.` 使用 Enterprise Manager 管理自动\
    \ SQL 调优\n\n从这个屏幕，您可以配置、查看结果、禁用和启用自动 SQL 调优的各个方面。\n\n### 11-5. 禁用和启用自动 SQL 调优\n\
    \n#### 问题\n\n您想要完全禁用，然后重新启用自动 SQL 调优作业。\n\n#### 解决方案\n\n使用 `DBMS_AUTO_TASK_ADMIN.DISABLE`\
    \ 过程来禁用自动 SQL 调优作业。此示例禁用自动 SQL 调优顾问作业。\n\n```sql\nBEGIN\n  DBMS_AUTO_TASK_ADMIN.DISABLE(\n\
    \  client_name => 'sql tuning advisor',\n  operation => NULL,\n  window_name =>\
    \ NULL);\nEND;\n/\n```\n\n要重新启用作业，请使用 `ENABLE` 过程，如下所示：\n\n```sql\nBEGIN\n  DBMS_AUTO_TASK_ADMIN.ENABLE(\n\
    \  client_name => 'sql tuning advisor',\n  operation => NULL,\n  window_name =>\
    \ NULL);\nEND;\n/\n```\n\n您可以通过此查询报告自动调优作业的状态：\n\n```sql\nSELECT client_name ,status\
    \ ,consumer_group\nFROM dba_autotask_client\nORDER BY client_name;\n```\n\n这是一些示例输出：\n\
    \n```\nCLIENT_NAME                      STATUS          CONSUMER_GROUP\n--------------------------------\
    \ --------------- ------------------------------\nauto optimizer stats collection\
    \  ENABLED         ORA$AUTOTASK_STATS_GROUP\nauto space advisor              \
    \ ENABLED         ORA$AUTOTASK_SPACE_GROUP\nsql tuning advisor               ENABLED\
    \         ORA$AUTOTASK_SQL_GROUP\n```\n\n#### 工作原理\n\n您可能希望禁用自动 SQL 调优作业，因为您的数据库非常活跃，并希望确保此作业不会影响数据库的整体性能。`DBMS_AUTO_TASK_ADMIN.ENABLE/DISABLE`\
    \ 过程允许您打开和关闭自动 SQL 调优作业。这些过程接受三个参数（详见 表 11-4）。这些过程的行为取决于您传递的参数：\n\n*   如果提供了 `CLIENT_NAME`，并且\
    \ `OPERATION` 和 `WINDOW_NAME` 都是 `NULL`，则禁用该客户端。\n*   如果提供了 `OPERATION`，则禁用该操作。\n\
    *   如果提供了 `WINDOW_NAME`，并且 `OPERATION` 是 `NULL`，则在提供的窗口名称中禁用该客户端。\n\n前面的参数允许您以精细的细节控制自动任务的调度。根据前面的规则，您可以按如下方式在周二维护窗口期间禁用自动\
    \ SQL 调优作业：\n\n```sql\nBEGIN\n  dbms_auto_task_admin.disable(\n  client_name =>\
    \ 'sql tuning advisor',\n  operation => NULL,\n  window_name => 'TUESDAY_WINDOW');\n\
    END;\n/\n```\n\n您可以通过此查询验证窗口是否已被禁用：\n\n```sql\nSELECT window_name,TO_CHAR(window_next_time,'DD-MON-YY\
    \ HH24:MI:SS')\n,sql_tune_advisor\nFROM dba_autotask_window_clients;\n```\n\n\
    这是输出的一个片段：\n\n```\nWINDOW_NAME      TO_CHAR(WINDOW_NEXT_TIME SQL_TUNE\n----------------\
    \ ------------------------ --------\nTUESDAY_WINDOW   03-MAY-11 22:00:00     \
    \  DISABLED\n```\n\n![images](img/t1104.jpg)\n\n### 11-6. 修改维护窗口属性\n\n#### 问题\n\
    \n您意识到自动任务（如自动 SQL 调优作业）在定期安排的维护窗口期间运行。您想要修改与维护窗口相关联的持续时间。\n\n#### 解决方案\n\n以下示例将周日维护窗口的持续时间更改为两小时：\n\
    \n```sql\nBEGIN\n  dbms_scheduler.set_attribute(\n  name => 'SUNDAY_WINDOW',\n\
    \  attribute => 'DURATION',\n  value => numtodsinterval(2, 'hour'));\nEND;\n/\n\
    ```\n\n您可以通过此查询确认对维护窗口的更改：\n\n```sql\nSELECT window_name, next_start_date, duration\n\
    FROM dba_scheduler_windows;\n```\n\n这是输出的一个片段：\n\n```\nWINDOW_NAME      NEXT_START_DATE\
    \                                   DURATION\n---------------- ------------------------------------------------\
    \ --------\nSATURDAY_WINDOW  07-MAY-11 06.00.00.000000 AM US/MOUNTAIN        \
    \ +000 20:00:00\nSUNDAY_WINDOW    08-MAY-11 06.00.00.000000 AM US/MOUNTAIN   \
    \      +000 02:00:00\n```\n\n#### 工作原理\n\n理解如何修改维护窗口的关键在于，它是数据库作业调度程序的一个属性，因此必须通过\
    \ `DBMS_SCHEDULER` 包来维护。当您安装 Oracle Database 11g 时，默认配置了三个自动维护作业：\n\n*   自动 SQL\
    \ 调优\n*   统计信息收集\n*   段建议\n\n这些作业在预配置的每日维护窗口中自动执行。维护窗口由一周中的某天和作业运行的时长组成。\n\n您可以通过此查询查看未来一个月的计划作业：\n\
    \n```sql\nSELECT window_name, to_char(start_time,'dd-mon-yy hh24:mi'), duration\n\
    FROM dba_autotask_schedule\nORDER BY start_time;\n```\n\n这是输出的一个小样本：\n\n```\n\
    WINDOW_NAME          TO_CHAR(START_TIME,'DD DURATION\n-------------------- --------------------\
    \ --------------------\nSATURDAY_WINDOW      14-may-11 06:00     +000 20:00:00\n\
    SUNDAY_WINDOW        15-may-11 06:00     +000 02:00:00\n```\n\n![images](img/square.jpg)\
    \ `Tip` 有关管理计划作业的更多详细信息，请参阅 Oracle 的 *Database Administrator's Guide*（可在 Oracle\
    \ Technology Network 网站上获取）。\n\n### 11-7. 创建 SQL 调优集对象"
- fmt: "## Problem\n\nYou're working on a performance issue that requires that you\
    \ analyze a group of SQL statements. Before you process the SQL statements as\
    \ a set, you need to create a SQL tuning set object.\n\n## Solution\n\nUse the\
    \ `DBMS_SQLTUNE.CREATE_SQLSET` procedure to create a SQL tuning set object—for\
    \ example:\n\n```sql\nBEGIN\n  DBMS_SQLTUNE.CREATE_SQLSET(\n  sqlset_name => 'HIGH_IO',\n\
    \  description => 'High disk read tuning set');\nEND;\n/\n```\n\nThe prior code\
    \ creates a tuning set with the name of `HIGH_IO`. At this point, you have created\
    \ a named tuning set object. The tuning set does not contain any SQL statements.\n\
    \n## How It Works\n\nA SQL tuning set object must be created before populating\
    \ a tuning set with SQL statements (see Recipes 11-9 through 11-11 for details\
    \ on adding SQL statements to an STS). You can view any defined SQL tuning sets\
    \ in the database by querying the `DBA_SQLSET` view:\n\n```sql\nSQL> select id,\
    \ name, created, statement_count from dba_sqlset;\n```\n\nHere is some sample\
    \ output:\n\n```\n        ID NAME                           CREATED   STATEMENT_COUNT\n\
    ---------- ------------------------------ --------- ---------------\n        \
    \ 5 HIGH_IO                        26-APR-11               0\n```\n\nIf you need\
    \ to drop a SQL tuning set object, then use the `DBMS_SQLTUNE.DROP_SQLSET` procedure\
    \ to drop a tuning set. The following example drops a tuning set named `MY_TUNING_SET`:\n\
    \n```sql\nSQL> EXEC  DBMS_SQLTUNE.DROP_SQLSET(sqlset_name => 'MY_TUNING_SET' );\n\
    ```\n\n### 11-8. Viewing Resource-Intensive SQL in the AWR\n\n## Problem\n\nBefore\
    \ populating a SQL tuning set, you want to view high-load SQL statements in the\
    \ AWR. You want to eventually use SQL contained in the AWR as input for populating\
    \ a SQL tuning set.\n\n## Solution\n\nThe `DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY`\
    \ function can be used to extract SQL stored in the AWR. This particular query\
    \ selects queries in the AWR between snapshots 8200 and 8201 ordered by the top\
    \ 10 in the disk reads usage category:\n\n```sql\nSELECT\nsql_id\n,substr(sql_text,1,20)\n\
    ,disk_reads\n,cpu_time\n,elapsed_time\nFROM table(DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY(8200,8201,\n\
    \            null, null, 'disk_reads',null, null, null, 10))\nORDER BY disk_reads\
    \ DESC;\n```\n\nHere is a small snippet of the output:\n\n```\nSQL_ID        \
    \ SUBSTR(SQL_TEXT,1,20 DISK_READS      CPU_TIME  ELAPSED_TIME\n--------------\
    \ -------------------- ---------- ------------- -------------\nachffburdff9j \
    \  delete from \"MVS\".\"      101145     814310000     991574249\n5vku5ap6g6zh8\
    \  INSERT /*+ BYPASS_RE       98172      75350000      91527239\n```\n\n## How\
    \ It Works\n\nBefore you work with SQL tuning sets, it's critical to understand\
    \ you can use the `DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY` function to retrieve\
    \ high resource-usage SQL from the AWR. The result sets retrieved by this PL/SQL\
    \ function can be used as input for populating SQL tuning sets. See [Table 11-5](#Chapter11.html#tab_11_5)\
    \ for a description of the `SELECT_WORKLOAD_REPOSITORY` function parameters.\n\
    \nYou have a great deal of flexibility in how you use this function. A few examples\
    \ will help illustrate this. Say you want to retrieve SQL from the AWR that was\
    \ not parsed by the `SYS` user. Here is the SQL to do that:\n\n```sql\nSELECT\
    \ sql_id, substr(sql_text,1,20)\n,disk_reads, cpu_time, elapsed_time, parsing_schema_name\n\
    FROM table(\nDBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY(8200,8201,\n'parsing_schema_name\
    \ <> ''SYS''',\nNULL, NULL,NULL,NULL, 1, NULL, 'ALL'));\n```\n\nThe following\
    \ example retrieves the top ten queries ranked by buffer gets for non-`SYS` users:\n\
    \n```sql\nSELECT\n sql_id\n,substr(sql_text,1,20)\n,disk_reads\n,cpu_time\n,elapsed_time\n\
    ,buffer_gets\n,parsing_schema_name\nFROM table(\nDBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY(\n\
    \ begin_snap => 21730\n,end_snap => 22900\n,basic_filter => 'parsing_schema_name\
    \ <> ''SYS'''\n,ranking_measure1 => 'buffer_gets'\n,result_limit => 10\n));\n\
    ```\n\nIn the prior queries, the `SYS` keyword is enclosed by two single quotes\
    \ (in other words, those aren't double quotes around `SYS`).\n\n![images](images/t1105.jpg)\n\
    \n![images](images/t1105a.jpg)\n\n### 11-9. Viewing Resource-Intensive SQL in\
    \ Memory\n\n## Problem\n\nBefore populating a SQL tuning set, you want to view\
    \ high-load SQL statements in the cursor cache in memory. You want to eventually\
    \ use SQL contained in memory as input for populating a SQL tuning set.\n\n##\
    \ Solution\n\nUse the `DBMS_SQLTUNE.SELECT_CURSOR_CACHE` function to view current\
    \ high resource-consuming SQL statements in memory. This query selects SQL statements\
    \ in memory that have required more than a million disk reads:\n\n```sql\nSELECT\n\
    \ sql_id\n,substr(sql_text,1,20)\n,disk_reads\n,cpu_time\n,elapsed_time\nFROM\
    \ table(DBMS_SQLTUNE.SELECT_CURSOR_CACHE('disk_reads > 1000000'))\nORDER BY sql_id;\n\
    ```\n\nHere is some sample output:\n\n```\nSQL_ID        SUBSTR(SQL_TEXT,1,20\
    \ DISK_READS   CPU_TIME ELAPSED_TIME\n------------- -------------------- ----------\
    \ ---------- ------------\n0s6gq1c890p4s  delete from \"MVS\".\"    3325320 8756130000\
    \   1.0416E+10\nb63h4skwvpshj BEGIN dbms_mview.ref    9496353 1.4864E+10   3.3006E+10\n\
    ```\n\n## How It Works\n\nBefore you work with SQL tuning sets, it's critical\
    \ to understand you can use the `DBMS_SQLTUNE.SELECT_CURSOR_CACHE` function to\
    \ retrieve high resource-usage SQL from memory. The result set retrieved by this\
    \ PL/SQL function can be used as input for populating SQL tuning sets. See [Table\
    \ 11-6](#Chapter11.html#tab_11_6) for a description of the `SELECT_CURSOR_CACHE`\
    \ function parameters.\n\nYou have a great deal of flexibility in how you use\
    \ this function. Here's an example that selects SQL in memory, but excludes statements\
    \ parsed by the `SYS` user and also returns statements with an elapsed time greater\
    \ than 100,000:\n\n```sql\nSELECT sql_id, substr(sql_text,1,20)\n,disk_reads,\
    \ cpu_time, elapsed_time\nFROM table(DBMS_SQLTUNE.SELECT_CURSOR_CACHE('parsing_schema_name\
    \ <> ''SYS''\n                                             AND elapsed_time >\
    \ 100000'))\nORDER BY sql_id;\n```\n\nIn the prior query, the `SYS` keyword is\
    \ enclosed by two single quotes (in other words, those aren't double quotes around\
    \ `SYS`). The `SQL_TEXT` column is truncated to 20 characters so that the output\
    \ can be displayed on the page more easily. Here is some sample output:\n\n```\n\
    SQL_ID        SUBSTR(SQL_TEXT,1,20 DISK_READS   CPU_TIME ELAPSED_TIME\n-------------\
    \ -------------------- ---------- ---------- ------------\nbyzwu34haqmh4 SELECT\
    \ /* DS_SVC */           0     140000       159828\n```\n\nOnce you have identified\
    \ a `SQL_ID` for a resource-intensive SQL statement, you can view all of its execution\
    \ details via this query:\n\n```sql\nSELECT *\nFROM table(DBMS_SQLTUNE.SELECT_CURSOR_CACHE('sql_id\
    \ = ''byzwu34haqmh4'''));\n```\n\nNote that the `SQL_ID` in the prior statement\
    \ is enclosed by two single quotes (not double quotes).\n\nThis next example selects\
    \ the top ten queries in memory in terms of CPU time for non-`SYS` users:\n\n\
    ```sql\nSELECT\n sql_id\n,substr(sql_text,1,20)\n,disk_reads\n,cpu_time\n,elapsed_time\n\
    ,buffer_gets\n,parsing_schema_name\nFROM table(\nDBMS_SQLTUNE.SELECT_CURSOR_CACHE(\n\
    \ basic_filter => 'parsing_schema_name <> ''SYS'''\n,ranking_measure1 => 'cpu_time'\n\
    ,result_limit => 10\n));\n```\n\n![images](images/t1106.jpg)\n\n### 11-10. Populating\
    \ SQL Tuning Set from High-Resource SQL in AWR\n\n## Problem\n\nYou want to create\
    \ a SQL tuning set and populate it with the top I/O-consuming SQL statements found\
    \ in the AWR."
