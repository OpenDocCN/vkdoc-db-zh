    \ you can see parallel slave activity on your database. From looking at these\
    \ statistics, you can quickly see if parallelism is properly configured on your\
    \ database, just by looking at the parallel slave activity. For instance, if you\
    \ see that the `Servers Shutdown` and `Servers Started` values are high, it can\
    \ be an indication that the `PARALLEL_MIN_SERVERS` parameter is set too low, as\
    \ there is overhead occurring to consistently start and stop parallel processes.\n\
    \n```sql\nSELECT * FROM v$pq_sysstat\nWHERE statistic LIKE 'Server%';\n```\n\n\
    ```\nSTATISTIC                                 VALUE\n------------------------------\
    \ --------------------\nServers Busy                                   0\nServers\
    \ Idle                                   0\nServers Highwater                \
    \              4\nServer Sessions                                8\nServers Started\
    \                                4\nServers Shutdown                         \
    \      4\nServers Cleaned Up                             0\n\n7 rows selected.\n\
    ```\n\nIf you are looking for session-level statistics regarding a parallel operation,\
