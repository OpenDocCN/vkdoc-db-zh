    \    Other              1705216\nPX Idle Wait                               Idle\
    \                241116\nPX qref latch                              Other    \
    \          1208472\n```\n\n## How It Works\n\n[Table 15-7](#Chapter15.html#tab_15_7)\
    \ describes some of the key parallelism-related wait events. If you are having\
