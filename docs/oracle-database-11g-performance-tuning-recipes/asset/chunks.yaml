- fmt: '## How It Works


    物化视图通常用于存储经常执行的查询的结果集。常规视图只是在数据字典中存储的查询，而物化视图本质上是存储这些查询结果的表。它们通常在查询中存在复杂的连接、汇总或聚合时创建。以下示例是一个物化视图，用于计算公司每个部门的总薪酬。假设此查询经常被公司高管用来确定其部门在向员工分配薪酬方面的表现：


    ```sql

    CREATE MATERIALIZED VIEW DEPT_SAL_MV

    ENABLE QUERY REWRITE

    AS

    SELECT department_id,

    sum(nvl(salary+(salary*commission_pct),salary)) total_compensation

    FROM employees

    GROUP BY department_id;

    ```


    由于结果存储在数据库中，优化器无需重新处理查询来检索数据。最终用户社区不必反复执行复杂的连接或聚合，因此这是一个相当大的性能优势。有些用户可能不知道你环境中的物化视图，并可能对星型模式或其他表执行原始查询。此时，`REWRITE`提示有助于提高那些可以使用物化视图的查询的性能。


    如果你为物化视图启用了查询重写，并且执行了一个查询，其结果可以在该物化视图中找到，优化器可能会选择“重写”查询以直接针对物化视图进行，而不是处理查询本身。通常不需要提示，因为如果启用了查询重写，优化器会尝试重写查询。然而，即使这是期望的结果，优化器也可能选择不重写查询以使用物化视图。在这些情况下，你可以在查询中放置一个提示，让优化器使用物化视图，而不考虑执行成本。你可以在提示中放置实际的视图名称，或者不带视图名称地放置提示：


    ```sql

    SELECT /*+ rewrite */ department_id,

    sum(nvl(salary+(salary*commission_pct),salary)) total_compensation

    FROM employees

    GROUP BY department_id

    having sum(nvl(salary+(salary*commission_pct),salary)) > 10000

    ORDER by 2;

    ```


    相反，如果出于某种原因你不希望优化器使用物化视图，也可以使用`NOREWRITE`提示。一个可能的原因是物化视图中的数据与源表相比已过时，而你希望确保获取最新的数据。在这里我们可以看到，优化器绕过了物化视图的使用，直接从`EMPLOYEES`表重新汇总了数据：


    ```sql

    SELECT /*+ norewrite */ department_id,

    sum(nvl(salary+(salary*commission_pct),salary)) total_compensation

    FROM employees

    GROUP BY department_id

    having sum(nvl(salary+(salary*commission_pct),salary)) > 10000

    ORDER by 2;

    ```


    ```

    ------------------------------------------

    | Id  | Operation            | Name      |

    ------------------------------------------

    |   0 | SELECT STATEMENT     |           |

    |   1 |  SORT ORDER BY       |           |

    |   2 |   FILTER             |           |

    |   3 |    HASH GROUP BY     |           |

    |   4 |     TABLE ACCESS FULL| EMPLOYEES |

    ------------------------------------------

    ```


    ## 14-13. Improving Star Schema Query Performance


    ### Problem


    你工作在一个包含星型模式的数据仓库环境中，并且希望提高查询的性能。


    ### Solution


    Oracle有一个特定的解决方案称为“星型转换”，旨在帮助提高数据仓库环境中针对星型模式的性能。Oracle提供了`STAR_TRANSFORMATION`和`FACT`提示来帮助使用星型模式提高查询性能。在你的查询中，你可以使用`STAR_TRANSFORMATION`或`FACT`提示，或者两者都用。以下查询是如何使用这些提示的示例：


    ```sql

    SELECT /*+ star_transformation */ pr.prod_category, c.country_id,

    t.calendar_year, sum(s.quantity_sold), SUM(s.amount_sold)

    FROM sales s, times t, customers c, products pr

    WHERE s.time_id = t.time_id

    AND   s.cust_id = c.cust_id

    AND   pr.prod_id = s.prod_id

    AND   t.calendar_year = ''2011''

    GROUP BY pr.prod_category, c.country_id, t.calendar_year;

    ```


    要仅使用`FACT`提示，只需将事实表名或别名放在提示的括号内：


    ```sql

    SELECT /*+ fact(s) */ pr.prod_category, c.country_id,

    ```


    有时，当两个提示都存在时，优化器更有可能执行星型转换：


    ```sql

    SELECT /*+ star_transformation fact(s) */ pr.prod_category, c.country_id,

    ```


    以下是经过星型转换的典型执行计划：


    ```

    -----------------------------------------------------------------------

    | Id  | Operation                                      | Name                  |

    -----------------------------------------------------------------------

    |   0 | SELECT STATEMENT                               |                       |

    |   1 |  HASH GROUP BY                                 |                       |

    |   2 |   HASH JOIN                                    |                       |

    |   3 |    HASH JOIN                                   |                       |

    |   4 |     HASH JOIN                                  |                       |

    |   5 |      PARTITION RANGE ALL                       |                       |

    |   6 |       TABLE ACCESS BY LOCAL INDEX ROWID        | SALES                 |

    |   7 |        BITMAP CONVERSION TO ROWIDS             |                       |

    |   8 |         BITMAP AND                             |                       |

    |   9 |          BITMAP MERGE                          |                       |

    |  10 |           BITMAP KEY ITERATION                 |                       |

    |  11 |            BUFFER SORT                         |                       |

    |  12 |             TABLE ACCESS FULL                  | CUSTOMERS             |

    |  13 |            BITMAP INDEX RANGE SCAN             | SALES_CUST_BIX        |

    |  14 |          BITMAP MERGE                          |                       |

    |  15 |           BITMAP KEY ITERATION                 |                       |

    |  16 |            BUFFER SORT                         |                       |

    |  17 |             VIEW                               | index$_join$_016      |

    |  18 |              HASH JOIN                         |                       |

    |  19 |               INDEX FAST FULL SCAN             | PRODUCTS_PK           |

    |  20 |               INDEX FAST FULL SCAN             | PRODUCTS_PROD_CAT_IX  |

    |  21 |            BITMAP INDEX RANGE SCAN             | SALES_PROD_BIX        |

    |  22 |      TABLE ACCESS FULL                         | TIMES                 |

    |  23 |     TABLE ACCESS FULL                          | CUSTOMERS             |

    |  24 |    VIEW                                        | index$_join$_004      |

    |  25 |     HASH JOIN                                  |                       |

    |  26 |      INDEX FAST FULL SCAN                      | PRODUCTS_PK           |

    |  27 |      INDEX FAST FULL SCAN                      | PRODUCTS_PROD_CAT_IX  |

    -----------------------------------------------------------------------


    `Note`

    `-----`

    `- star transformation used for this statement`

    ```'
  raw: '#### How It Works


    Materialized views are very commonly used to store the result set for often-executed
    queries. While regular views are simply stored queries in the data dictionary,
    materialized views are essentially tables that store the result for these queries.
    Usually, they are created when there are complex joins, summaries, or aggregations
    occurring within a query. The following example is a materialized view that is
    calculating the total compensation for each department for a company. Let''s say
    this query is often used by executives of this company to determine how their
    particular department is doing in terms of distributing compensation to its employees:


    `CREATE MATERIALIZED VIEW DEPT_SAL_MV`

    `ENABLE QUERY REWRITE`

    `AS`

    `SELECT department_id,`

    `sum(nvl(salary+(salary*commission_pct),salary)) total_compensation`

    `FROM employees`

    `GROUP BY department_id;`


    Since the results are stored in the database, there is no need for the optimizer
    to reprocess the query to retrieve the data. The end-user community does not have
    to execute a complex join or aggregation over and over, so it is a considerable
    performance benefit. Some users may not be aware of the materialized views in
    your environment, and may be executing the raw queries against the star schema
    or other tables. It is here that the `REWRITE` hint may help in improving performance
    on queries that could use a materialized view.


    If you enable query rewrite for a materialized view, and if a query executes where
    the results can be found in that materialized view, the optimizer may choose to
    “rewrite” the query to go directly against the materialized view, rather than
    process the query itself. Generally, no hint is required, because if query rewrite
    is enabled, the optimizer will attempt to rewrite the query. However, it''s possible
    the optimizer may not choose to rewrite the query to use the materialized view,
    even though that is the desired outcome. In those instances, you can place a hint
    within your query to have the optimizer use the materialized view, regardless
    of the execution cost. You can place the actual view name within the hint, or
    place the hint without the view name:


    `SELECT /*+ rewrite */ department_id,`

    `sum(nvl(salary+(salary*commission_pct),salary)) total_compensation`

    `FROM employees`

    `GROUP BY department_id`

    `having sum(nvl(salary+(salary*commission_pct),salary)) > 10000`

    `ORDER by 2;`


    Conversely, you can also use a `NOREWRITE` hint if, for some reason, you do not
    want the optimizer to use the materialized view. One possible reason is that the
    data in the materialized view is stale compared to the source table(s), and you
    want to ensure you are getting the most current data. Here we can see that the
    optimizer bypassed the use of the materialized view and resummarized the data
    directly from the `EMPLOYEES` table:


    `SELECT /*+ norewrite */ department_id,`

    `sum(nvl(salary+(salary*commission_pct),salary)) total_compensation`

    `FROM employees`

    `GROUP BY department_id`

    `having sum(nvl(salary+(salary*commission_pct),salary)) > 10000`

    `ORDER by 2;`


    `------------------------------------------`

    `| Id  | Operation            | Name      |`

    `------------------------------------------`

    `|   0 | SELECT STATEMENT     |           |`

    `|   1 |  SORT ORDER BY       |           |`

    `|   2 |   FILTER             |           |`

    `|   3 |    HASH GROUP BY     |           |`

    `|   4 |     TABLE ACCESS FULL| EMPLOYEES |`

    `------------------------------------------`


    ### 14-13. Improving Star Schema Query Performance


    #### Problem


    You work in a data warehouse environment that contains star schemas, and you want
    to improve the performance of queries.


    #### Solution


    Oracle has a specific solution called “star transformation,” which was designed
    to help improve performance against star schemas in the data warehouse environment.
    Oracle has the `STAR_TRANSFORMATION` and `FACT` hints to help improve query performance
    using star schemas. In your queries, you can use the `STAR_TRANSFORMATION` or
    the `FACT` hint, or you can use both. The following query is an example of how
    to use these hints:


    `SELECT /*+ star_transformation */ pr.prod_category, c.country_id,`

    `t.calendar_year, sum(s.quantity_sold), SUM(s.amount_sold)`

    `FROM sales s, times t, customers c, products pr`

    `WHERE s.time_id = t.time_id`

    `AND   s.cust_id = c.cust_id`

    `AND   pr.prod_id = s.prod_id`

    `AND   t.calendar_year = ''2011''`

    `GROUP BY pr.prod_category, c.country_id, t.calendar_year;`


    To use just the `FACT` hint, simply place the fact table name or alias within
    parentheses in the hint:


    `SELECT /*+ fact(s) */ pr.prod_category, c.country_id,`


    At times, the optimizer will be more likely to perform star transformation when
    both hints are present:


    `SELECT /*+ star_transformation fact(s) */ pr.prod_category, c.country_id,`


    Here is a typical explain plan that has undergone star transformation:


    `-----------------------------------------------------------------------`

    `| Id  | Operation                              | Name                 |`

    `-----------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT                       |                      |`

    `|   1 |  HASH GROUP BY                         |                      |`

    `|   2 |   HASH JOIN                            |                      |`

    `|   3 |    HASH JOIN                           |                      |`

    `|   4 |     HASH JOIN                          |                      |`

    `|   5 |      PARTITION RANGE ALL               |                      |`

    `|   6 |       TABLE ACCESS BY LOCAL INDEX ROWID| SALES                |`

    `|   7 |        BITMAP CONVERSION TO ROWIDS     |                      |`

    `|   8 |         BITMAP AND                     |                      |`

    `|   9 |          BITMAP MERGE                  |                      |`

    `|  10 |           BITMAP KEY ITERATION         |                      |`

    `|  11 |            BUFFER SORT                 |                      |`

    `|  12 |             TABLE ACCESS FULL          | CUSTOMERS            |`

    `|  13 |            BITMAP INDEX RANGE SCAN     | SALES_CUST_BIX       |`

    `|  14 |          BITMAP MERGE                  |                      |`

    `|  15 |           BITMAP KEY ITERATION         |                      |`

    `|  16 |            BUFFER SORT                 |                      |`

    `|  17 |             VIEW                       | index$_join$_016     |`

    `|  18 |              HASH JOIN                 |                      |`

    `|  19 |               INDEX FAST FULL SCAN     | PRODUCTS_PK          |`

    `|  20 |               INDEX FAST FULL SCAN     | PRODUCTS_PROD_CAT_IX |`

    `|  21 |            BITMAP INDEX RANGE SCAN     | SALES_PROD_BIX       |`

    `|  22 |      TABLE ACCESS FULL                 | TIMES                |`

    `|  23 |     TABLE ACCESS FULL                  | CUSTOMERS            |`

    `|  24 |    VIEW                                | index$_join$_004     |`

    `|  25 |     HASH JOIN                          |                      |`

    `|  26 |      INDEX FAST FULL SCAN              | PRODUCTS_PK          |`

    `|  27 |      INDEX FAST FULL SCAN              | PRODUCTS_PROD_CAT_IX |`

    `-----------------------------------------------------------------------`


    **`Note`**

    **`-----`**

    **`- star transformation used for this statement`**'
  trans: '## 工作原理


    物化视图通常用于存储经常执行的查询的结果集。常规视图只是在数据字典中存储的查询，而物化视图本质上是存储这些查询结果的表。它们通常在查询中存在复杂的连接、汇总或聚合时创建。以下示例是一个物化视图，用于计算公司每个部门的总薪酬。假设此查询经常被公司高管用来确定其部门在向员工分配薪酬方面的表现：


    ```sql

    CREATE MATERIALIZED VIEW DEPT_SAL_MV

    ENABLE QUERY REWRITE

    AS

    SELECT department_id,

    sum(nvl(salary+(salary*commission_pct),salary)) total_compensation

    FROM employees

    GROUP BY department_id;

    ```


    由于结果存储在数据库中，优化器无需重新处理查询来检索数据。最终用户社区不必反复执行复杂的连接或聚合，因此这是一个相当大的性能优势。有些用户可能不知道你环境中的物化视图，并可能对星型模式或其他表执行原始查询。此时，`REWRITE`提示有助于提高那些可以使用物化视图的查询的性能。


    如果你为物化视图启用了查询重写，并且执行了一个查询，其结果可以在该物化视图中找到，优化器可能会选择“重写”查询以直接针对物化视图进行，而不是处理查询本身。通常不需要提示，因为如果启用了查询重写，优化器会尝试重写查询。然而，即使这是期望的结果，优化器也可能选择不重写查询以使用物化视图。在这些情况下，你可以在查询中放置一个提示，让优化器使用物化视图，而不考虑执行成本。你可以在提示中放置实际的视图名称，或者不带视图名称地放置提示：


    ```sql

    SELECT /*+ rewrite */ department_id,

    sum(nvl(salary+(salary*commission_pct),salary)) total_compensation

    FROM employees

    GROUP BY department_id

    having sum(nvl(salary+(salary*commission_pct),salary)) > 10000

    ORDER by 2;

    ```


    相反，如果出于某种原因你不希望优化器使用物化视图，也可以使用`NOREWRITE`提示。一个可能的原因是物化视图中的数据与源表相比已过时，而你希望确保获取最新的数据。在这里我们可以看到，优化器绕过了物化视图的使用，直接从`EMPLOYEES`表重新汇总了数据：


    ```sql

    SELECT /*+ norewrite */ department_id,

    sum(nvl(salary+(salary*commission_pct),salary)) total_compensation

    FROM employees

    GROUP BY department_id

    having sum(nvl(salary+(salary*commission_pct),salary)) > 10000

    ORDER by 2;

    ```


    ```

    ------------------------------------------

    | Id  | Operation            | Name      |

    ------------------------------------------

    |   0 | SELECT STATEMENT     |           |

    |   1 |  SORT ORDER BY       |           |

    |   2 |   FILTER             |           |

    |   3 |    HASH GROUP BY     |           |

    |   4 |     TABLE ACCESS FULL| EMPLOYEES |

    ------------------------------------------

    ```


    ## 14-13. 提升星型模式查询性能


    ### 问题


    你工作在一个包含星型模式的数据仓库环境中，并且希望提高查询的性能。


    ### 解决方案


    Oracle 有一个特定的解决方案称为“星型转换”，旨在帮助提高数据仓库环境中针对星型模式的性能。Oracle 提供了`STAR_TRANSFORMATION`和`FACT`提示来帮助使用星型模式提高查询性能。在你的查询中，你可以使用`STAR_TRANSFORMATION`或`FACT`提示，或者两者都用。以下查询是如何使用这些提示的示例：


    ```sql

    SELECT /*+ star_transformation */ pr.prod_category, c.country_id,

    t.calendar_year, sum(s.quantity_sold), SUM(s.amount_sold)

    FROM sales s, times t, customers c, products pr

    WHERE s.time_id = t.time_id

    AND   s.cust_id = c.cust_id

    AND   pr.prod_id = s.prod_id

    AND   t.calendar_year = ''2011''

    GROUP BY pr.prod_category, c.country_id, t.calendar_year;

    ```


    要仅使用`FACT`提示，只需将事实表名或别名放在提示的括号内：


    ```sql

    SELECT /*+ fact(s) */ pr.prod_category, c.country_id,

    ```


    有时，当两个提示都存在时，优化器更有可能执行星型转换：


    ```sql

    SELECT /*+ star_transformation fact(s) */ pr.prod_category, c.country_id,

    ```


    以下是经过星型转换的典型执行计划：


    ```

    -----------------------------------------------------------------------

    | Id  | Operation                                      | Name                  |

    -----------------------------------------------------------------------

    |   0 | SELECT STATEMENT                               |                       |

    |   1 |  HASH GROUP BY                                 |                       |

    |   2 |   HASH JOIN                                    |                       |

    |   3 |    HASH JOIN                                   |                       |

    |   4 |     HASH JOIN                                  |                       |

    |   5 |      PARTITION RANGE ALL                       |                       |

    |   6 |       TABLE ACCESS BY LOCAL INDEX ROWID        | SALES                 |

    |   7 |        BITMAP CONVERSION TO ROWIDS             |                       |

    |   8 |         BITMAP AND                             |                       |

    |   9 |          BITMAP MERGE                          |                       |

    |  10 |           BITMAP KEY ITERATION                 |                       |

    |  11 |            BUFFER SORT                         |                       |

    |  12 |             TABLE ACCESS FULL                  | CUSTOMERS             |

    |  13 |            BITMAP INDEX RANGE SCAN             | SALES_CUST_BIX        |

    |  14 |          BITMAP MERGE                          |                       |

    |  15 |           BITMAP KEY ITERATION                 |                       |

    |  16 |            BUFFER SORT                         |                       |

    |  17 |             VIEW                               | index$_join$_016      |

    |  18 |              HASH JOIN                         |                       |

    |  19 |               INDEX FAST FULL SCAN             | PRODUCTS_PK           |

    |  20 |               INDEX FAST FULL SCAN             | PRODUCTS_PROD_CAT_IX  |

    |  21 |            BITMAP INDEX RANGE SCAN             | SALES_PROD_BIX        |

    |  22 |      TABLE ACCESS FULL                         | TIMES                 |

    |  23 |     TABLE ACCESS FULL                          | CUSTOMERS             |

    |  24 |    VIEW                                        | index$_join$_004      |

    |  25 |     HASH JOIN                                  |                       |

    |  26 |      INDEX FAST FULL SCAN                      | PRODUCTS_PK           |

    |  27 |      INDEX FAST FULL SCAN                      | PRODUCTS_PROD_CAT_IX  |

    -----------------------------------------------------------------------


    `Note`

    `-----`

    `- star transformation used for this statement`

    ```'
- fmt: '#### How It Works


    在开始运行星型查询之前，有两个关键的配置要素需要在星型转换发生前处理好：

    *   确保 `star_transformation_enabled` 参数被设置为 `TRUE`。

    *   确保在事实表上，每个维度外键列都有位图索引。


    如果你打算在星型模式中使用提示，无论是 `FACT` 提示还是 `STAR_TRANSFORMATION` 提示，都默认你已拥有一个配置得当的环境，否则优化器不会使用这些提示。这些提示对于星型转换并非必需，但使用其中任何一个，优化器都会尝试进行转换。然而，即使有提示，优化器也可能根据它认为的最佳执行计划来选择忽略该请求。星型查询非常高效且性能优异，因为其转换是专门为在星型模式中操作而设计的。


    如果出于某种原因，你想避免在查询中使用星型转换，只需使用 `no_star_transformation` 提示，优化器将绕过星型转换的使用：

    ```sql

    SELECT /*+ no_star_transformation */ pr.prod_category, c.country_id,

    t.calendar_year, sum(s.quantity_sold), SUM(s.amount_sold)

    FROM sales s, times t, customers c, products pr

    WHERE s.time_id = t.time_id

    AND   s.cust_id = c.cust_id

    AND   pr.prod_id = s.prod_id

    AND   t.calendar_year = ''2011''

    GROUP BY pr.prod_category, c.country_id, t.calendar_year;

    ```

    从执行计划中，我们可以看到优化器没有转换我们的查询：

    ```

    ---------------------------------------------------------

    | Id  | Operation                        | Name         |

    ---------------------------------------------------------

    |   0 | SELECT STATEMENT                 |              |

    |   1 |  HASH GROUP BY                   |              |

    |   2 |   NESTED LOOPS                   |              |

    |   3 |    NESTED LOOPS                  |              |

    |   4 |     NESTED LOOPS                 |              |

    |   5 |      NESTED LOOPS                |              |

    |   6 |       PARTITION RANGE ALL        |              |

    |   7 |        TABLE ACCESS FULL         | SALES        |

    |   8 |       TABLE ACCESS BY INDEX ROWID| PRODUCTS     |

    |   9 |        INDEX UNIQUE SCAN         | PRODUCTS_PK  |

    |  10 |      TABLE ACCESS BY INDEX ROWID | CUSTOMERS    |

    |  11 |       INDEX UNIQUE SCAN          | CUSTOMERS_PK |

    |  12 |     INDEX UNIQUE SCAN            | TIMES_PK     |

    |  13 |    TABLE ACCESS BY INDEX ROWID   | TIMES        |

    ---------------------------------------------------------

    ```

    有时，让星型转换发生可能有些棘手。至关重要的是，你已用所有适当的位图索引正确配置了星型模式。即使缺少一个位图索引也可能影响查询发生星型转换的能力，因此，彻底验证配置非常重要，尤其是关于位图索引的配置。一些星型模式还采用事实表和维度表之间的位图连接索引来帮助实现星型转换。


    ## 第 15 章 并行执行 SQL


    并行性可以通过为任务分配多个资源来帮助提高特定操作的性能。并行性最好在具有多个 CPU 的系统上使用，因为所使用的多个进程（即并行进程）将利用这些额外的 CPU
    资源来更快地完成给定任务。


    通常，并行性也最好用于大表或索引，以及具有大量数据的数据库。它非常适合在本质上就很庞大的数据仓库环境中使用。并行性不太适合 OLTP 环境，因为这些系统具有事务性质。


    为了正确使用并行性，有几个重要因素需要理解：

    *   系统上的 CPU 数量

    *   相关初始化参数的正确配置

    *   你想要为其调优并行的关键 SQL 语句

    *   在数据库上配置的并行度（DOP）

    *   目标 SQL 操作的实际性能与预期性能


    并行性最常见的陷阱之一是过度使用。它有时被视为调优和加速 SQL 操作的灵丹妙药。反过来，并行性实际上可能导致性能更差而不是更好。因此，对于 DBA 来说，至关重要的是要理解其系统的物理配置，并配置与并行性相关的参数以最适合系统。向数据库的开发人员和用户普及基本知识将提高并行操作的成功率。何时适合使用并行性？如何在
    SQL 操作中正确启用并行性？哪种类型的操作可以并行化？并行性是一个强大的工具，有助于显著提高数据库操作的性能，但随之而来的是责任。


    本章重点介绍如何为并行性正确配置数据库、可并行化的关键操作、如何在 SQL 中引发并行性，以及一些用于查看并行操作是否以最佳方式运行的工具。


    ### 15-1. 为特定查询启用并行性


    #### 问题


    你有一个访问大表数据的慢速查询。你想看看是否可以通过指示 Oracle 使用多个进程来检索数据，从而加快查询速度。


    #### 解决方案


    有两种不同类型的提示可以放在你的 SQL 中，尝试通过使用多个进程（即并行性）来加速查询。一种提示用于数据检索本身，另一种用于帮助加速读取表上的索引的过程。


    ##### 表的并行提示


    首先，你需要确定查询所需的并行度（DOP）。这指示 Oracle 将使用多少个进程来检索数据。其次，在查询内放置一个并行提示，指定要在其上执行并行 SQL
    的表，以及用于查询的并行度，例如：

    ```sql

    SELECT /*+ parallel(emp,4) */  empno, ename

    FROM emp;

    ```

    如果你在查询中使用表别名，则必须在提示中使用它，否则 Oracle 优化器将忽略该提示。

    ```sql

    SELECT/*+ parallel(e,4) */  empno, ename

    FROM emp e;

    ```

    前面两个查询中的提示导致四个进程分担从 `EMP` 表读取行的工作。四个进程一起工作，就墙钟时间而言，会比一个进程独自完成所有工作更快地完成任务。


    或者，你可以省略在提示中指定并行度。如果提示中只指定表名或别名，Oracle 将根据数据库初始化参数推导并行度，这可能给出也可能不给出你期望的并行度：

    ```sql

    SELECT/*+ parallel(e) */  empno, ename

    FROM emp e;

    ```


    ##### 索引的并行提示


    指定 `parallel_index` 提示以控制对索引的并行访问。通常，只有当索引是本地分区索引时，你才能并行访问它。在这种情况下，你可以应用 `parallel_index`
    提示。这是一个例子：

    ```sql

    SELECT /*+ parallel_index(emp, emp_i4 ,4) */ empno, ename

    FROM emp

    WHERE deptno = 10;

    ```

    `parallel_index` 提示有两个参数：表名和索引名。与为表指定并行度一样，如果你在索引提示中省略了并行度，数据库本身将为查询计算并行度。


    如果你为表使用了别名，则必须在提示中使用别名。有关示例，请参阅前面关于“表的并行提示”的部分。'
  raw: '#### How It Works


    Before you start running star queries, there are two key configuration elements
    that need to be taken care of before star transformation can occur:


    *   Ensure the `star_transformation_enabled` parameter is set to `TRUE`.

    *   Ensure that on the fact table, there is a bitmap index on every dimension
    foreign key column.


    If you are at a point to want to use a hint within a star schema, be it the `FACT`
    hint or the `STAR_TRANSFORMATION` hint, it is assumed you have a properly configured
    environment, else these hints will not be used by the optimizer. These hints are
    not required for star transformation, but by using either or these hints, the
    optimizer will look to do transformation. Even with the hint, however, the optimizer
    may choose to ignore the request, based on what it thinks the best execution plan
    will be for the query. Star queries are very efficient and perform very well,
    because the transformation is designed to operate specifically with star schemas.


    If, for some reason, you want to avoid the use of star transformation for your
    query, simply use the `no_star_transformation` hint, and the optimizer will bypass
    the use of star transformation:


    `SELECT /*+ no_star_transformation */ pr.prod_category, c.country_id,`

    `t.calendar_year, sum(s.quantity_sold), SUM(s.amount_sold)`

    `FROM sales s, times t, customers c, products pr`

    `WHERE s.time_id = t.time_id`

    `AND   s.cust_id = c.cust_id`

    `AND   pr.prod_id = s.prod_id`

    `AND   t.calendar_year = ''2011''`

    `GROUP BY pr.prod_category, c.country_id, t.calendar_year;`


    From the explain plan, we can see that the optimizer did not transform our query:


    `---------------------------------------------------------`

    `| Id  | Operation                        | Name         |`

    `---------------------------------------------------------`

    `|   0 | SELECT STATEMENT                 |              |`

    `|   1 |  HASH GROUP BY                   |              |`

    `|   2 |   NESTED LOOPS                   |              |`

    `|   3 |    NESTED LOOPS                  |              |`

    `|   4 |     NESTED LOOPS                 |              |`

    `|   5 |      NESTED LOOPS                |              |`

    `|   6 |       PARTITION RANGE ALL        |              |`

    `|   7 |        TABLE ACCESS FULL         | SALES        |`

    `|   8 |       TABLE ACCESS BY INDEX ROWID| PRODUCTS     |`

    `|   9 |        INDEX UNIQUE SCAN         | PRODUCTS_PK  |`

    `|  10 |      TABLE ACCESS BY INDEX ROWID | CUSTOMERS    |`

    `|  11 |       INDEX UNIQUE SCAN          | CUSTOMERS_PK |`

    `|  12 |     INDEX UNIQUE SCAN            | TIMES_PK     |`

    `|  13 |    TABLE ACCESS BY INDEX ROWID   | TIMES        |`

    `---------------------------------------------------------`


    At times, it can be tricky to get the star transformation to take place. It is
    critically important that you have properly configured the star schema with all
    the appropriate bitmap indexes. Even having one missing bitmap index can affect
    the ability to have star transformation occur for your queries, so it is important
    to be very thorough and validate the configuration, especially regarding the bitmap
    indexes. Some star schemas also employ the use of bitmap join indexes between
    the fact and dimension tables to aid in achieving star transformation.


    ## C H A P T E R  15


    ## Executing SQL in Parallel


    Parallelism can help improve performance on particular operations simply by assigning
    multiple resources to a task. Parallelism is best used on systems with multiple
    CPUs, as the multiple processes used (that is, the parallel processes) will use
    those extra CPU resources to more quickly complete a given task.


    As a general rule, parallelism is also best used on large tables or indexes, and
    on databases with large volumes of data. It is ideal for use in data warehouse
    environments, which are large by their nature. Parallelism is not well suited
    for OLTP environments, just because of the transactional nature of those systems.


    In order to use parallelism properly, there are several important factors to understand:


    *   The number of CPUs on your system

    *   Proper configuration of the related initialization parameters

    *   The key SQL statements that you want to tune for parallelization

    *   The degree of parallelism (DOP) configured on your database

    *   The actual performance vs. expected performance of targeted SQL operations


    One of the most common pitfalls of parallelism is overuse. It is sometimes seen
    as a magic bullet to tune and speed up SQL operations. In turn, parallelism can
    actually lead to poorer rather than better performance. Therefore, it is critically
    important for the DBA to understand the physical configuration of his or her system,
    and configure parallelism-related parameters to best suit the system. Educating
    developers and users of your database about basic questions will increase the
    success rate of parallel operations. When is it appropriate to use parallelism?
    How do you properly enable parallelism in SQL operations? What type of operations
    can be parallelized? Parallelism is a powerful tool to aid in drastically improving
    performance of database operations, but with that power comes responsibility.


    This chapter focuses on the methods to properly configure your database for parallelism,
    key operations that can be parallelized, how to induce parallelism in your SQL,
    and some tools to use to see if parallel operations are running optimally.


    ### 15-1\. Enabling Parallelism for a Specific Query


    #### Problem


    You have a slow-running query accessing data from a large table. You want to see
    if you can speed up the query by instructing Oracle to use multiple processes
    to retrieve the data.


    #### Solution


    There are two distinct types of hints to place in your SQL to try to speed up
    your query by using multiple processes, or parallelism. One type of hint is for
    data retrieval itself, and the other is to help speed the process of reading the
    indexes on a table.


    ##### Parallel Hints for Tables


    First, you need to determine the degree of parallelism (DOP) desired for the query.
    This instructs Oracle how many processes it will use to retrieve the data. Second,
    place a parallel hint inside of the query specifying the table(s) on which to
    execute parallel SQL, as well the degree of parallelism to use for the query—for
    example:


    `SELECT /*+ parallel(emp,4) */  empno, ename`

    `FROM emp;`


    If you use a table alias in your query, you must use it in your hint, else the
    Oracle optimizer will ignore the hint.


    `SELECT/*+ parallel(e,4) */  empno, ename`

    `FROM emp e;`


    The hints in the preceding two queries result in four processes dividing the work
    of reading rows from the `EMP` table. Four processes working together will get
    the job done faster in terms of wall-clock time than one process doing all the
    work by itself.


    Optionally, you can omit specifying a degree of parallelism within the hint. If
    you specify only the table name or alias in the hint, Oracle will derive the degree
    of parallelism based on the database initialization parameters, which may or may
    not give you the desired degree of parallelism:


    `SELECT/*+ parallel(e) */  empno, ename`

    `FROM emp e;`


    ##### Parallel Hints for Indexes


    Specify the `parallel_index` hint to control parallel access to indexes. You can
    generally access an index in parallel only when the index is a locally partitioned
    index. In that case, you can apply the `parallel_index` hint. Here''s an example:


    `SELECT /*+ parallel_index(emp, emp_i4 ,4) */ empno, ename`

    `FROM emp`

    `WHERE deptno = 10;`


    There are two arguments to the `parallel_index` hint: table name and index name.
    As with specifying the degree of parallelism on tables, if you omit the degree
    of parallelism from within an index hint, the database itself will compute the
    degree of parallelism for the query.


    If you alias your tables, then you must use the alias names in your hints. See
    the preceding section on “Parallel Hints for Tables” for an example.'
  trans: '

    #### 工作原理


    在开始运行星型查询之前，有两个关键的配置要素需要在星型转换发生前处理好：

    *   确保 `star_transformation_enabled` 参数被设置为 `TRUE`。

    *   确保在事实表上，每个维度外键列都有位图索引。


    如果你打算在星型模式中使用提示，无论是 `FACT` 提示还是 `STAR_TRANSFORMATION` 提示，都默认你已拥有一个配置得当的环境，否则优化器不会使用这些提示。这些提示对于星型转换并非必需，但使用其中任何一个，优化器都会尝试进行转换。然而，即使有提示，优化器也可能根据它认为的最佳执行计划来选择忽略该请求。星型查询非常高效且性能优异，因为其转换是专门为在星型模式中操作而设计的。


    如果出于某种原因，你想避免在查询中使用星型转换，只需使用 `no_star_transformation` 提示，优化器将绕过星型转换的使用：

    ```sql

    SELECT /*+ no_star_transformation */ pr.prod_category, c.country_id,

    t.calendar_year, sum(s.quantity_sold), SUM(s.amount_sold)

    FROM sales s, times t, customers c, products pr

    WHERE s.time_id = t.time_id

    AND   s.cust_id = c.cust_id

    AND   pr.prod_id = s.prod_id

    AND   t.calendar_year = ''2011''

    GROUP BY pr.prod_category, c.country_id, t.calendar_year;

    ```

    从执行计划中，我们可以看到优化器没有转换我们的查询：

    ```

    ---------------------------------------------------------

    | Id  | Operation                        | Name         |

    ---------------------------------------------------------

    |   0 | SELECT STATEMENT                 |              |

    |   1 |  HASH GROUP BY                   |              |

    |   2 |   NESTED LOOPS                   |              |

    |   3 |    NESTED LOOPS                  |              |

    |   4 |     NESTED LOOPS                 |              |

    |   5 |      NESTED LOOPS                |              |

    |   6 |       PARTITION RANGE ALL        |              |

    |   7 |        TABLE ACCESS FULL         | SALES        |

    |   8 |       TABLE ACCESS BY INDEX ROWID| PRODUCTS     |

    |   9 |        INDEX UNIQUE SCAN         | PRODUCTS_PK  |

    |  10 |      TABLE ACCESS BY INDEX ROWID | CUSTOMERS    |

    |  11 |       INDEX UNIQUE SCAN          | CUSTOMERS_PK |

    |  12 |     INDEX UNIQUE SCAN            | TIMES_PK     |

    |  13 |    TABLE ACCESS BY INDEX ROWID   | TIMES        |

    ---------------------------------------------------------

    ```

    有时，让星型转换发生可能有些棘手。至关重要的是，你已用所有适当的位图索引正确配置了星型模式。即使缺少一个位图索引也可能影响查询发生星型转换的能力，因此，彻底验证配置非常重要，尤其是关于位图索引的配置。一些星型模式还采用事实表和维度表之间的位图连接索引来帮助实现星型转换。


    ## 第 15 章 并行执行 SQL


    并行性可以通过为任务分配多个资源来帮助提高特定操作的性能。并行性最好在具有多个 CPU 的系统上使用，因为所使用的多个进程（即并行进程）将利用这些额外的 CPU
    资源来更快地完成给定任务。


    通常，并行性也最好用于大表或索引，以及具有大量数据的数据库。它非常适合在本质上就很庞大的数据仓库环境中使用。并行性不太适合 OLTP 环境，因为这些系统具有事务性质。


    为了正确使用并行性，有几个重要因素需要理解：

    *   系统上的 CPU 数量

    *   相关初始化参数的正确配置

    *   你想要为其调优并行的关键 SQL 语句

    *   在数据库上配置的并行度（DOP）

    *   目标 SQL 操作的实际性能与预期性能


    并行性最常见的陷阱之一是过度使用。它有时被视为调优和加速 SQL 操作的灵丹妙药。反过来，并行性实际上可能导致性能更差而不是更好。因此，对于 DBA 来说，至关重要的是要理解其系统的物理配置，并配置与并行性相关的参数以最适合系统。向数据库的开发人员和用户普及基本知识将提高并行操作的成功率。何时适合使用并行性？如何在
    SQL 操作中正确启用并行性？哪种类型的操作可以并行化？并行性是一个强大的工具，有助于显著提高数据库操作的性能，但随之而来的是责任。


    本章重点介绍如何为并行性正确配置数据库、可并行化的关键操作、如何在 SQL 中引发并行性，以及一些用于查看并行操作是否以最佳方式运行的工具。


    ### 15-1. 为特定查询启用并行性


    #### 问题


    你有一个访问大表数据的慢速查询。你想看看是否可以通过指示 Oracle 使用多个进程来检索数据，从而加快查询速度。


    #### 解决方案


    有两种不同类型的提示可以放在你的 SQL 中，尝试通过使用多个进程（即并行性）来加速查询。一种提示用于数据检索本身，另一种用于帮助加速读取表上的索引的过程。


    ##### 表的并行提示


    首先，你需要确定查询所需的并行度（DOP）。这指示 Oracle 将使用多少个进程来检索数据。其次，在查询内放置一个并行提示，指定要在其上执行并行 SQL
    的表，以及用于查询的并行度，例如：

    ```sql

    SELECT /*+ parallel(emp,4) */  empno, ename

    FROM emp;

    ```

    如果你在查询中使用表别名，则必须在提示中使用它，否则 Oracle 优化器将忽略该提示。

    ```sql

    SELECT/*+ parallel(e,4) */  empno, ename

    FROM emp e;

    ```

    前面两个查询中的提示导致四个进程分担从 `EMP` 表读取行的工作。四个进程一起工作，就墙钟时间而言，会比一个进程独自完成所有工作更快地完成任务。


    或者，你可以省略在提示中指定并行度。如果提示中只指定表名或别名，Oracle 将根据数据库初始化参数推导并行度，这可能给出也可能不给出你期望的并行度：

    ```sql

    SELECT/*+ parallel(e) */  empno, ename

    FROM emp e;

    ```


    ##### 索引的并行提示


    指定 `parallel_index` 提示以控制对索引的并行访问。通常，只有当索引是本地分区索引时，你才能并行访问它。在这种情况下，你可以应用 `parallel_index`
    提示。这是一个例子：

    ```sql

    SELECT /*+ parallel_index(emp, emp_i4 ,4) */ empno, ename

    FROM emp

    WHERE deptno = 10;

    ```

    `parallel_index` 提示有两个参数：表名和索引名。与为表指定并行度一样，如果你在索引提示中省略了并行度，数据库本身将为查询计算并行度。


    如果你为表使用了别名，则必须在提示中使用别名。有关示例，请参阅前面关于“表的并行提示”的部分。

