    The `ALL` operator essentially uses a logical `AND` operator to do the comparison
    of values shown in the query. While with the `ANY` operator, each value was compared
    individually to see if there was a match, the `ALL` operator needs to compare
    every value in the list before determining if there is a match. Using our department
    table as an example, see the following query. In this query, we are retrieving
