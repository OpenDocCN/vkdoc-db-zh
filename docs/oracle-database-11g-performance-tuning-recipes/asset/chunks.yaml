    \ 中的示例执行计划输出`\n\n#### 工作原理\n\n使用 Enterprise Manager 可以非常轻松地找到数据库中当前正在运行的 SQL 操作的执行计划。如果某个特定\
    \ SQL 语句的性能不如预期，此方法是确定正在运行的查询或其他 SQL 操作的执行计划的最快方法之一。要使用此功能，您必须拥有 Enterprise Manager\
    \ 的 Tuning Pack 许可。\n\n### 9-4. 阅读执行计划\n\n#### 问题\n\n您已为给定 SQL 语句运行了执行计划解释，并希望了解如何阅读该计划。"
- fmt: '#### Solution


    The execution plan for a SQL operation tells you step-by-step exactly how the
    Oracle optimizer will execute your SQL operation. Using `AUTOTRACE`, let''s get
    an explain plan for the following query:


    ```sql

    set autotrace trace explain


    SELECT ename, dname

    FROM emp JOIN dept USING (deptno);

    ```


    ```

    ----------------------------------------------------------------------------------------

    | Id  | Operation                    | Name    | Rows  | Bytes | Cost (%CPU)|
    Time     |

    ----------------------------------------------------------------------------------------

    |   0 | SELECT STATEMENT             |         |    14 |   308 |     6  (17)|
    00:00:01 |

    |   1 |   MERGE JOIN                  |         |    14 |   308 |     6  (17)|
    00:00:01 |

    |   2 |    TABLE ACCESS BY INDEX ROWID| DEPT    |     4 |    52 |     2   (0)|
    00:00:01 |

    |   3 |     INDEX FULL SCAN           | PK_DEPT |     4 |       |     1   (0)|
    00:00:01 |

    |*  4 |    SORT JOIN                  |         |    14 |   126 |     4  (25)|
    00:00:01 |

    |   5 |     TABLE ACCESS FULL         | EMP     |    14 |   126 |     3   (0)|
    00:00:01 |

    ----------------------------------------------------------------------------------------


    Predicate Information (identified by operation id):

    ---------------------------------------------------


       4 - access("EMP"."DEPTNO"="DEPT"."DEPTNO")

           filter("EMP"."DEPTNO"="DEPT"."DEPTNO")


    Note

    -----

       - automatic DOP: Computed Degree of Parallelism is 1 because of parallel threshold

    ```


    Once you have an explain plan to interpret, you can tell which steps are executed
    first because the innermost or most indented steps are executed first, and are
    executed from the inside out, in top-down order. In the foregoing query, we are
    joining the `EMP` and `DEPT` tables. Here are the steps of how the query is processed
    based on the execution plan:


    1.  The `PK_DEPT` index is scanned (ID 3).

    2.  All `EMP` table rows are scanned (ID 5).

    3.  Rows are retrieved from the `DEPT` table based on the matching entries in
    the `PK_DEPT` index (ID 2).

    4.  Resulting data from the `EMP` table is sorted (ID 4).

    5.  Data from the `EMP` and `DEPT` tables are then joined via a `MERGE JOIN` (ID
    1).

    6.  The resulting data from the query is returned to the user (ID 0).


    #### How It Works


    When first looking at an explain plan and wanting to quickly get an idea of the
    steps in which the query will be executed, do the following:


    1.  Look for the most indented rows in the plan (the right-most rows). These will
    be executed first.

    2.  If multiple rows are at the same level of indentation, they will be executed
    in top-down fashion in the plan, with the highest rows in the plan first moving
    downward in the plan.

    3.  Look at the next most indented row or rows and continue working your way outward.

    4.  The top of the explain plan corresponds with the least indented or left-most
    part of the plan, and usually is where the results are returned to the user.


    Once you have an explain plan for a query, and can understand the sequence of
    how the query will be processed, you then can move on and perform some analysis
    to determine if the explain plan you are looking at is efficient. When looking
    at your explain plan, answer these questions and consider these factors when determining
    if you have an efficient plan:


    *   What is the access path for the query (is the query performing a full table
    scan or is the query using an index)?

    *   What is the join method for the query (if a join condition is present)?

    *   Look at the columns within the filtering criteria found within the `WHERE`
    clause of the query, and determine if they are indexed.

    *   Get the volume or number of rows for each table in the query. Are the tables
    small, medium-sized, or large? This may help you determine the most appropriate
    join method. See [Table 9-3](#Chapter09.html#tab_9_3) for a synopsis of the types
    of join methods.

    *   When were statistics last gathered for the objects involved in the query?

    *   Look at the `COST` column of the explain plan to get a starting cost.


    By looking at our original explain plan, we determined that the `EMP` table is
    larger in size, and also that there is no index present on the `DEPTNO` column,
    which is used within a join condition between the `DEPT` and `EMP` tables. By
    placing an index on the `DEPTNO` column on the `EMP` table and gathering statistics
    on the `EMP` table, the plan now uses an index:


    ```

    ---------------------------------------------------------------------------------------

    | Id  | Operation                    | Name   | Rows  | Bytes | Cost (%CPU)| Time     |

    ---------------------------------------------------------------------------------------

    |   0 | SELECT STATEMENT             |        |    14 |   280 |     6  (17)| 00:00:01
    |

    |   1 |   MERGE JOIN                  |        |    14 |   280 |     6  (17)|
    00:00:01 |

    |   2 |    TABLE ACCESS BY INDEX ROWID| EMP    |    14 |    98 |     2   (0)|
    00:00:01 |

    |   3 |     INDEX FULL SCAN           | EMP_I2 |    14 |       |     1   (0)|
    00:00:01 |

    |*  4 |    SORT JOIN                  |        |     4 |    52 |     4  (25)|
    00:00:01 |

    |   5 |     TABLE ACCESS FULL         | DEPT   |     4 |    52 |     3   (0)|
    00:00:01 |

    ---------------------------------------------------------------------------------------

    ```


    ![images](images/t0903.jpg)


    For information on parallel execution plans, see [Chapter 15](#Chapter15.html#ch15).


    ![images](images/square.jpg) **Tip** One of the most common reasons for a sub-optimal
    explain plan is the lack of current statistics on one or more objects involved
    in a query.


    ### 9-5. Monitoring Long-Running SQL Statements


    #### Problem


    You have a SQL statement that runs a long time, and you want to be able to monitor
    the progress of the statement and find out when it will finish.


    #### Solution


    By viewing information for a long-running query in the `V$SESSION_LONGOPS` data
    dictionary view, you can gauge about when a query will finish. Let''s say you
    are running the following query, with join conditions, against a large table:


    ```sql

    SELECT last_name, first_name FROM employees_big

    WHERE last_name = ''EVANS'';

    ```


    With a simple query against the `V$SESSION_LONGOPS` view, you can quickly get
    an idea of how long the query will execute, and when it will finish:


    ```sql

    SELECT username, target, sofar blocks_read, totalwork total_blocks,

    round(time_remaining/60) minutes

    FROM v$session_longops

    WHERE sofar <> totalwork

    and username = ''HR'';

    ```


    ```

    USERNAME     TARGET               BLOCKS_READ TOTAL_BLOCKS    MINUTES

    ------------ -------------------- ----------- ------------ ----------

    HR           HR.EMPLOYEES_BIG           81101      2353488         10

    ```


    As the query progresses, you can see the `BLOCKS_READ` column increase, as well
    as the `MINUTES` column decrease. It is usually necessary to place the `WHERE`
    clause to eliminate rows that have been completed, which is why in the foregoing
    query it asked for rows where the `SOFAR` column did not equal `TOTALWORK`.


    #### How It Works


    In order to be able to monitor a query within the `V$SESSION_LONGOPS` view, the
    following requirements apply:


    *   The query must run for six seconds or greater.

    *   The table being accessed must be greater than 10,000 database blocks.

    *   `TIMED_STATISTICS` must be set or `SQL_TRACE` must be turned on.

    *   The objects within the query must have been analyzed via `DBMS_STATS` or `ANALYZE`.


    This view can contain information on `SELECT` statements, DML statements such
    as `UPDATE`, as well as DDL statements such as `CREATE INDEX`. Some common operations
    that find themselves in the `V$SESSION_LONGOPS` view include table scans, index
    scans, join operations, parallel operations, RMAN backup operations, sort operations,
    and Data Pump operations.


    ### 9-6. Identifying Resource-Consuming SQL Statements That Are Currently Executing'
