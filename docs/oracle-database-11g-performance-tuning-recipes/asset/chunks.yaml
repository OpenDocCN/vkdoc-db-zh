  trans: "##### 重要注意事项\n\n虽然 PL/SQL 函数缓存能让你获得比重复执行函数快得多的结果，但基于 PL/SQL 集合（数组）的处理可能更快，因为\
    \ PL/SQL 运行时引擎是从 PGA 中的集合缓存获取结果，而非 SGA。然而，由于这需要为每个会话额外消耗 PGA 内存，当会话数量大幅增长时，使用集合方法会遇到问题。PL/SQL\
    \ 函数很容易被所有并发会话共享，而要设置集合共享则只能通过额外的编码实现。\n\n你必须警惕这样一种可能性：如果你的数据库经历频繁的 DML 变更，PL/SQL\
    \ 函数缓存可能并不适合你——它主要适用于从不变更或极少变更的数据。即使你将`RESULT_CACHE_REMOTE_EXPIRATION`参数设置为较高的值，任何\
    \ DML 变更都会迫使数据库使已缓存的 PL/SQL 函数缓存结果集失效。\n\n当结果缓存输出过时时，Oracle 会使其失效。因此，当一条 DML 语句修改了你已启用函数缓存的\
    \ PL/SQL 函数所涉及表的行时，数据库就会使该函数的缓存结果失效。即使被修改的特定行并不属于该 PL/SQL 函数的结果集，这种情况也可能发生。再次提醒，这个限制可以通过在主要为只读的数据库中使用\
    \ PL/SQL 函数缓存来“绕过”。\n\n##### PL/SQL 函数缓存的限制\n\n为使函数结果能被缓存，该函数必须满足以下要求：\n\n*  \
    \ 该函数不使用`OUT`或`IN OUT`参数。\n*   函数的`IN`参数是以下类型之一：`BLOB`、`CLOB`、`NCLOB`、`REF CURSOR`、`Collection\
    \ Object`和`Record`。\n*   该函数不是管道化表函数。\n*   该函数不是匿名块的一部分。\n*   该函数不属于任何使用调用者权利而非定义者权利的模块。\n\
    *   该函数的返回类型不包括以下类型：`BLOB`、`CLOB`、`NCLOB`、`REF CURSOR`、`Object`、`Record`，或包含前述不支持的返回类型的\
    \ PL/SQL 集合。\n\n### 3-12. 配置 Oracle 数据库智能闪存缓存\n\n#### 问题\n\n你的 AWR（自动工作负载 Repository）报告表明你需要一个大得多的缓冲区缓存。你还注意到共享池的大小设置是合理的，因此无法通过减少共享池的内存分配来为缓冲区缓存设置更高的最小级别。此外，你能分配给\
    \ Oracle 的额外内存量也有限。\n\n#### 解决方案\n\n根据你的操作系统，当数据库表明需要为缓冲区缓存分配大得多的内存时，你可以使用新的 Oracle\
    \ 数据库智能闪存缓存特性。目前，闪存缓存特性仅限于 Solaris 和 Oracle Linux 操作系统。\n\n设置以下参数以开启闪存缓存功能：\n\n\
    *   `DB_FLASH_CACHE_FILE`：此参数设置闪存缓存的路径名和文件名。你指定的文件名将用于存放闪存缓存。你必须使用闪存设备作为闪存缓存文件，它可以位于操作系统文件系统、原始磁盘或\
    \ Oracle ASM 磁盘组中——例如：\n    `DB_FLASH_CACHE_FILE= \"/dev/sdc\"`\n    `DB_FLASH_CACHE_FILE\
    \ = \"/export/home/oracle/file_raw\"          /* 原始文件`\n    `DB_FLASH_CACHE_FILE\
    \ = \"+dg1/file_asm\"                        /* 使用 ASM 存储`\n*   `DB_FLASH_CACHE_SIZE`：此参数设置闪存缓存存储的大小。例如：`DB_FLASH_CACHE_SIZE\
    \ = 8GB`\n\n你可以通过使用`alter system`命令在启用和不启用闪存缓存的系统之间切换，如下所示：\n\n```\nSQL> alter\
    \ system set db_flash_cache_size = 0;       /* 禁用闪存缓存 */\nSQL> alter system set\
    \ db_flash_cache_size = 8G;      /* 重新启用闪存缓存 */\n```\n\n请注意，尽管你可以如上所示动态地成功启用和禁用闪存缓存，但\
    \ Oracle 并不支持这种方法。\n\n![images](img/square.jpg) `注意` 如果你使用的是 Oracle RAC，为了利用闪存缓存特性，你必须在集群的所有节点上启用它。"
- fmt: '#### How It Works


    Oracle Database Smart Flash Cache, a feature of the Oracle Database 11.2 release,
    is included as part of the enterprise edition of the database server. Flash Cache
    takes advantage of the I/O speed of flash-based devices, which perform much better
    than disk-based storage. For example, small disk-based reads offer a 4-millisecond
    response, whereas a flash-based device takes only 0.4 milliseconds to perform
    the same read.


    Note that Flash Cache is really a read-only cache—when clean (unmodified) data
    blocks are evicted from the buffer cache due to space pressure, those blocks are
    then moved to the flash cache. If they''re required later on, the database will
    move transferred data blocks back to the SGA from the flash cache. It''s not always
    realistic to assume that you and the Oracle database will have access to unlimited
    memory. What if you can allocate only a maximum of 12 GB for your Oracle SGA,
    but it turns out that if you have 50 GB of memory, the database will run a whole
    lot faster? Oracle Database Smart Flash Cache is designed for those types of situations.


    Oracle recommends that you size the flash cache to a value that''s a multiple
    of your buffer cache size. There''s no hard and fast rule here: use a trial and
    error method by just setting it to anywhere between one and ten times the size
    of the buffer cache size and calibrate the results. Oracle also suggests that
    if you encounter the db file sequential read wait event as a top wait event and
    if you have sufficient CPU capacity, you should consider using the flash cache.


    Once you enable the flash cache, Oracle moves data blocks from the buffer cache
    to the flash cache (the file you''ve created) and saves metadata about the blocks
    in the database buffer cache. Depending on the number of blocks moved into the
    flash cache, you may want to bump up the size of the `MEMORY_TARGET` parameter
    so the accumulated metadata doesn''t impact the amount of memory left for the
    other components.


    Oracle offers two devices for flash cache storage—Sun Storage F5100 Flash Array
    and the Sun Flash Accelerator F20 PCIe Card. Since you can specify only a single
    flash device, you will need a volume manager. It turns out that Oracle ASM is
    the best volume manager for these devices, based on Oracle''s tests.


    If you''re using the flash cache in an Oracle RAC environment, you must create
    a separate flash cache file path for each of the instances, and you will also
    need to create a separate ASM disk group for each instance''s flash cache.


    Oracle testing of the Database Smart Flash Cache feature shows that it''s ideally
    suited for workloads that are I/O bound. If you have a very heavy amount of concurrent
    read-only transactions, the disk system could be saturated after some point. Oracle
    Database Smart Flash Cache increases such a system''s throughput by processing
    more IOPS (I/O per second). Oracle''s testing results of this feature also show
    that response times increased by five times when Smart Flash Cache was introduced
    to deal with workloads facing significant performance deterioration due to maxing
    out of their disk I/O throughput. As of the writing of this book, Oracle makes
    these claims only for workloads that are exclusively or mostly read-only operations.
    While Oracle is still in the process of testing the flash cache for write-intensive
    workloads, note that even for read-only operations, the reduced load on your disk
    system due to using the flash cache will mean that you''ll have more I/O bandwidth
    to handle your writes.


    ### 3-13\. Tuning the Redo Log Buffer


    #### Problem


    You''d like to know how to tune the redo log buffer, as you''ve reviewed several
    AWR reports that pointed out that the redo log buffer setting for your production
    database is too small.


    #### Solution


    You configure the size of the redo log buffer by setting the value of the initialization
    parameter `LOG_BUFFER`. This parameter is static, so any changes to it require
    a restart of the database. You set the parameter in your `init.ora` file as follows:


    ```

    log_buffer=4096000

    ```


    You can also change the size of the log buffer, with the following `ALTER SYSTEM`
    statement:


    ```

    SQL> alter system set log_buffer=4096000 scope=spfile;

    System altered

    SQL>

    ```


    The default value of the `LOG_BUFFER` parameter is way too small for many databases.
    Oracle states that you don''t normally need to set a value larger than 1 MB for
    this parameter. However, you shouldn''t hesitate to raise it to a much larger
    amount, if it''s warranted by circumstances.'
