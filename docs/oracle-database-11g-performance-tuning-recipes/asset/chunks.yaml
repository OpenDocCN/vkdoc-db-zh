    \ LGWR 何时写入重做日志文件的阈值。在没有提交请求或检查点的情况下，LGWR 会等待直到达到`log_io_size`阈值。因此，当数据库发出`COMMIT`语句时，LGWR\
    \ 进程将被迫立即将大量数据写入重做日志文件，导致会话在`log file sync`等待事件上等待。这是因为每个等待的会话都在等待 LGWR 将会话的重做日志缓冲区内容刷新到重做日志文件。虽然数据库会自动计算`log_io_size`参数的值，但您可以通过发出如下命令来为其指定一个值：\n\
    \n```\nSQL> alter system set \"_log_io_size\"=1024000 scope=spfile;\n\nSystem\
    \ altered.\n\nSQL>\n```\n\n### 5-9. 最小化“由其他会话读取”等待事件\n\n#### 问题\n\n您的 AWR 报告显示，`read\
    \ by other session`等待事件是导致最多等待的原因。您希望减少高`read by other session`等待。\n\n#### 解决方案\n\
    \n您看到`read by other session`等待事件的主要原因是多个会话试图读取相同的数据块（无论是表块还是索引块），并且不得不等待当前正在读取这些块的会话。您可以通过执行以下命令找到会话正在等待的数据块：\n\
    \n```\nSQL> select p1 \"file#\", p2 \"block#\", p3 \"class#\"\n     from v$session_wait\n\
    \     where event = 'read by other session';\n```\n\n然后，您可以获取`block#`并在以下查询中使用，以识别导致`read\
    \ by other session`等待的确切段（表或索引）。\n\n```\nSQL> select relative_fno, owner, segment_name,\
    \ segment_type\n     from dba_extents\n     where file_id = &file\n     and &block\
    \ between block_id\n     and block_id + blocks - 1;\n```\n\n一旦您识别出热点块及其所属的段，就需要识别使用这些数据块和段的查询，并尽可能调整这些查询。您也可以尝试删除并重新插入热点块内的行。\n\
