  trans: '

    #### 解决方案


    有时，在单个 SQL 语句中，你可能想“即时”创建一个仅供查询使用的表，并且之后永远不会再用到。在查询的 `FROM` 子句中，你通常放置要从中检索数据的表或视图的名称。如果所需的数据视图不存在，你可以使用一种称为“内联视图”的方式，即时创建该数据的临时视图，即直接在查询的
    `FROM` 子句中指定该视图的特征：


    ```sql

    SELECT last_name, first_name, department_name dept, salary

    FROM employees e join

    ( SELECT department_id, max(salary) high_sal

    FROM employees

    GROUP BY department_id ) m

    USING (department_id) join departments

    USING (department_id)

    WHERE e.salary = m.high_sal

    ORDER BY SALARY desc;

    ```


    ```

    LAST_NAME                  FIRST_NAME           DEPT                     SALARY

    ------------------------- -------------------- -------------------- ----------

    King                      Steven               Executive                 24000

    Russell                   John                 Sales                     14000

    Hartstein                 Michael              Marketing                 13000

    Greenberg                 Nancy                Finance                   12000

    Higgins                   Shelley              Accounting                12000

    Raphaely                  Den                  Purchasing                11000

    Baer                      Hermann              Public Relations          10000

    Hunold                    Alexander            IT                         9000

    Fripp                     Adam                 Shipping                   8200

    Mavris                    Susan                Human Resources            6500

    Whalen                    Jennifer             Administration             4400

    ```


    在上述查询中，我们获取了每个部门工资最高的员工。我们的数据库中并不存在这样的视图。此外，在单个查询中，也无法直接连接 `employees` 表和 `departments`
    表来检索此数据。因此，内联视图被创建为 SQL 语句的一部分，并且只包含我们所需的关键信息——它拥有高薪和部门信息，现在可以基于匹配该工资的员工轻松地与 `employees`
    表进行连接。


    #### 工作原理


    与 SQL 语言的许多组件一样，内联视图需要谨慎使用。虽然极其有用，但如果滥用或过度使用，内联视图可能会导致数据库性能问题，特别是在临时表空间的使用方面。由于内联视图仅在查询执行期间创建和使用，其结果保存在程序全局内存区域中，如果数据量过大，则会使用临时表空间。在使用内联视图之前，应考虑以下问题：


    1.  最重要的是，包含内联视图的 SQL 将多久运行一次？（如果只运行一次或很少运行，那么最好直接执行查询，而无需担心任何潜在的性能影响）。

    2.  内联视图将包含多少行？

    3.  内联视图的行长度是多少？

    4.  为 `pga_aggregate_target` 或 `memory_target` 设置分配了多少内存？

    5.  你的 Oracle 用户或模式所使用的临时表空间有多大？


    如果你正在进行一个简单的即席查询，可能不需要进行这种分析。如果你创建的 SQL 语句将在生产环境中运行，进行这种分析就很重要，因为如果临时表空间被一个内联视图完全占用，不仅会影响该查询的完成，还会影响任何可能使用该特定临时表空间的用户处理的顺利进行。在许多数据库环境中，只有一个临时表空间。因此，如果一个用户进程通过单个操作消耗了所有临时空间，这将影响数据库中每个用户的操作。


    考虑以下查询：


    ```sql

    WITH service_info AS

    (SELECT

    product_id,

    geographic_id,

    sum(qty) quantity

    FROM services

    GROUP BY

    product_id,

    geographic_id),

    product_info AS

    (SELECT product_id, product_group, product_desc

    FROM products

    WHERE source_sys = ''BILLING''),

    billing_info AS

    (SELECT journal_date, billing_date, product_id

    FROM BILLING

    WHERE journal_date = TO_DATE(''2011-08-15'', ''YYYY-MM-DD''))

    SELECT

    product_group,

    product_desc,

    journal_date,

    billing_date,

    sum(service_info.quantity)

    FROM service_info JOIN product_info

    ON service_info.product_id = product_info.product_id JOIN billing_info

    ON  service_info.product_id = billing_info.product_id

    WHERE

    service_info.quantity > 0

    GROUP BY

    product_group,

    product_desc,

    journal_date,

    billing_date;

    ```


    在这个查询中，创建了三个内联视图：`SERVICE_INFO` 视图、`PRODUCT_INFO` 视图和 `BILLING_INFO` 视图。在最终处理以最后一个
    `SELECT` 语句开头的真正用户查询之前，每个查询都会被处理，并且结果会存储在程序全局区域或临时表空间中。虽然通过执行单个查询来获得所需结果在效率上是可取的，但上述查询的处理效率可能非常低，具体取决于表中数据的大小，因为将可能数百万行的数据存储到临时表空间会消耗整个数据库用户群体所需的关键资源。在此类示例中，在数据库层面创建保存内联视图所定义数据的表——在此例中是三个独立的表——通常更有效。然后，可以通过连接这三个永久表来提取最终查询以生成结果。虽然这可能需要开发团队和
    `DBA` 进行更多的前期工作，但如果该查询定期运行，这很可能会带来回报。此外，随着 SQL 语句复杂性的增加，其可维护性会降低。因此，总的来说，将复杂语句分解成多个部分更高效，通常也更易于维护。


    内联视图提供了巨大的好处。但是，在生产环境中实施使用此类视图之前，请进行适当的分析和研究。


    **注意** 大型内联视图很容易消耗大量的临时表空间


    ### 8-16. 避免使用 NOT 子句


    #### 问题


    你有一些使用了 `NOT` 子句的查询性能不佳，并希望修改它们以提高性能。

    '
- fmt: '#### Solution


    Just as often as we query our database for equality conditions, we will query
    our database for non-equality conditions. It is the nature of retrieving data
    from a database and the nature of the SQL language to allow users to do this.


    There are performance drawbacks in using the `NOT` clause within your SQL statements,
    as they trigger full table scans. Here''s an example query from a previous recipe:


    ```sql

    SELECT last_name, first_name, salary, email

    FROM employees_big

    WHERE department_id NOT IN(20,30)

    AND commission_pct > 0;

    ```


    ```

    -----------------------------------------------------------------------------------

    | Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time  |

    -----------------------------------------------------------------------------------

    |   0 | SELECT STATEMENT  |               |   697K|    21M|  4480   (1)| 00:00:54
    |

    |*  1 |  TABLE ACCESS FULL| EMPLOYEES_BIG |   697K|    21M|  4480   (1)| 00:00:54
    |

    -----------------------------------------------------------------------------------

    ```


    Even though we have an index on the `department_id` column, by using the `NOT`
    clause we cause Oracle to bypass the use of that index in order to properly search
    and ensure all rows were not those in department 20 or 30. Note the overall cost
    of 4480 that Oracle assigned to this query.


    It is possible to enable the use of the index by rewriting the query. For instance,
    let''s issue a subquery to get a list of all the `department_id` values that are
    not 20 or 30, and then pass that list to the parent query. By doing this, we are
    moving the `NOT` clause to the much smaller departments table, so the table scan
    on that table will be fast. Those values get passed the parent query, and the
    parent query can use an index because it no longer needs the `NOT` clause.


    Here''s the new query, and the resulting execution plan.


    ```sql

    SELECT last_name, first_name, salary, email

    FROM employees_big

    WHERE department_id IN

    (SELECT department_id FROM departments

    WHERE department_id NOT IN (20,30))

    AND commission_pct > 0;

    ```


    ```

    ---------------------------------------------------------------------------------

    | Id  | Operation          | Name       | Rows  | Bytes | Cost (%CPU)| Time  |

    ---------------------------------------------------------------------------------

    |   0 | SELECT STATEMENT   |            |    33 |  1188 |     3   (0)| 00:00:01
    |

    |   1 |  NESTED LOOPS      |            |    33 |  1188 |     3   (0)| 00:00:01
    |

    |*  2 |   TABLE ACCESS FULL| EMPLOYEES  |    34 |  1088 |     3   (0)| 00:00:01
    |

    |*  3 |   INDEX UNIQUE SCAN| DEPT_ID_PK |     1 |     4 |     0   (0)| 00:00:01
    |

    ---------------------------------------------------------------------------------

    ```


    Note now that after our change, the query now uses an index, and the overall cost
    that Oracle assigned dropped from 4480 to 3.


    #### How It Works


    You can effectively use the `NOT` clause several ways:

    *   Comparison operators (''<>'', ''!='', ''^='')

    *   `NOT IN`

    *   `NOT LIKE`


    By using `NOT`, each of the following queries has the same basic effect in that
    it will negate the use of any possible index on the columns to which `NOT` applies:


    ```sql

    SELECT last_name, first_name, salary, email

    FROM employees

    WHERE department_id != 20

    AND commission_pct > 0;

    ```


    ```sql

    SELECT last_name, first_name, salary, email

    FROM employees

    WHERE department_id NOT IN(20,30)

    AND commission_pct > 0;

    ```


    ```sql

    SELECT last_name, first_name, salary, email

    FROM employees

    WHERE hire_date NOT LIKE ''2%''

    AND commission_pct > 0;

    ```


    ```

    ---------------------------------------

    | Id  | Operation         | Name      |

    ---------------------------------------

    |   0 | SELECT STATEMENT  |           |

    |   1 |  TABLE ACCESS FULL| EMPLOYEES |

    ---------------------------------------

    ```


    At times, a full table scan is simply required. Even if an index is present, if
    you need to read more than a certain percentage of rows of a table, the Oracle
    optimizer may perform a full table scan regardless of whether an index is present.
    Still, if you simply try to avoid using `NOT` where possible, you may be able
    to improve performance on your queries.


    All this said, you can try to use `NOT EXISTS` as an alternative that may improve
    performance in these conditions. Using the foregoing query and modifying it to
    use `NOT EXISTS`, you can still use an index to improve performance of the query:


    ```sql

    SELECT last_name, first_name, salary, email

    FROM employees

    WHERE NOT EXISTS

    (SELECT department_id FROM departments

    WHERE department_id in(20,30))

    AND commission_pct > 0;

    ```


    ```

    ------------------------------------------

    | Id  | Operation           | Name       |

    ------------------------------------------

    |   0 | SELECT STATEMENT    |            |

    |   1 |  FILTER             |            |

    |   2 |   TABLE ACCESS FULL | EMPLOYEES  |

    |   3 |   INLIST ITERATOR   |            |

    |   4 |    INDEX UNIQUE SCAN| DEPT_ID_PK |

    ------------------------------------------

    ```


    ### 8-17. Controlling Transaction Sizes


    #### Problem


    You are performing a series of DML activities, and want to better manage the units
    of work and the recoverability of your transactions.


    #### Solution


    With the use of savepoints, you can split up transactions more easily into logical
    chunks, and can manage them more effectively upon failure. With the use of savepoints,
    you can roll back a series of DML statements to an incremental savepoint you have
    created. Within your SQL session, simply create a savepoint at an appropriate
    place during your processing that allows you to more easily isolate a “logical
    unit of work.” The following is an example showing how to create a savepoint:


    ```

    SQL> savepoint A;


    Savepoint created.

    ```


    If you have an online bookstore, for instance, and you have a customer placing
    an online order, when he or she submits an order, a logical unit of work for this
    transaction would be as follows:

    *   Adding a row to the `orders` table

    *   Adding one to many rows to the `orderitems` table


    When processing this online order, you will want to commit all the information
    for the order and all items for an order as one transaction. This represents multiple
    database DML statements, but needs to be processed one at a time to preserve the
    integrity of a customer order; therefore it can be regarded as one “logical unit
    of work.” By using savepoints, you can more easily process multiple DML statements
    as logical units of work. When a savepoint is created, it is essentially creating
    an alias based on a system change number (SCN). After creating a savepoint, you
    then have the luxury to roll back a transaction to that SCN based on the savepoint
    you created.'
  raw: '#### Solution


    Just as often as we query our database for equality conditions, we will query
    our database for non-equality conditions. It is the nature of retrieving data
    from a database and the nature of the SQL language to allow users to do this.


    There are performance drawbacks in using the `NOT` clause within your SQL statements,
    as they trigger full table scans. Here''s an example query from a previous recipe:


    `SELECT last_name, first_name, salary, email`

    `FROM employees_big`

    **`WHERE department_id NOT IN(20,30)`**

    `AND commission_pct > 0;`


    `-----------------------------------------------------------------------------------`

    `| Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time  |`

    `-----------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT  |               |   697K|    21M|  4480   (1)| 00:00:54
    |`

    `|*  1 |  TABLE ACCESS FULL| EMPLOYEES_BIG |   697K|    21M|  4480   (1)| 00:00:54
    |`

    `-----------------------------------------------------------------------------------`


    Even though we have an index on the `department_id` column, by using the `NOT`
    clause we cause Oracle to bypass the use of that index in order to properly search
    and ensure all rows were not those in department 20 or 30.  Note the overall cost
    of 4480 that Oracle assigned to this query.


    It is possible to enable the use of the index by rewriting the query. For instance,
    let''s issue a subquery to get a list of all the `department_id` values that are
    not 20 or 30, and then pass that list to the parent query. By doing this, we are
    moving the `NOT` clause to the much smaller departments table, so the table scan
    on that table will be fast. Those values get passed the parent query, and the
    parent query can use an index because it no longer needs the `NOT` clause.


    Here''s the new query, and the resulting execution plan.


    `SELECT last_name, first_name, salary, email`

    `FROM employees_big`

    **`WHERE department_id IN`**

    `(SELECT department_id FROM departments`

    `WHERE department_id NOT IN (20,30))`

    `AND commission_pct > 0;`

    `---------------------------------------------------------------------------------`

    `| Id  | Operation          | Name       | Rows  | Bytes | Cost (%CPU)| Time  |`

    `---------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT   |            |    33 |  1188 |     3   (0)| 00:00:01
    |`

    `|   1 |  NESTED LOOPS      |            |    33 |  1188 |     3   (0)| 00:00:01
    |`

    `|*  2 |   TABLE ACCESS FULL| EMPLOYEES  |    34 |  1088 |     3   (0)| 00:00:01
    |`

    `|*  3 |   INDEX UNIQUE SCAN| DEPT_ID_PK |     1 |     4 |     0   (0)| 00:00:01
    |`

    `---------------------------------------------------------------------------------`


    Note now that after our change, the query now uses an index, and the overall cost
    that Oracle assigned dropped from 4480 to 3.


    #### How It Works


    You can effectively use the `NOT` clause several ways:


    *   Comparison operators (''<>'', ''!='', ''^='')

    *   `NOT IN`

    *   `NOT LIKE`


    By using `NOT`, each of the following queries has the same basic effect in that
    it will negate the use of any possible index on the columns to which `NOT` applies:


    `SELECT last_name, first_name, salary, email`

    `FROM employees`

    `WHERE department_id != 20`

    `AND commission_pct > 0;`


    `SELECT last_name, first_name, salary, email`

    `FROM employees`

    `WHERE department_id NOT IN(20,30)`

    `AND commission_pct > 0;`


    `SELECT last_name, first_name, salary, email`

    `FROM employees`

    `WHERE hire_date NOT LIKE ''2%''`

    `AND commission_pct > 0;`


    `---------------------------------------`

    `| Id  | Operation         | Name      |`

    `---------------------------------------`

    `|   0 | SELECT STATEMENT  |           |`

    `|   1 |  TABLE ACCESS FULL| EMPLOYEES |`

    `---------------------------------------`


    At times, a full table scan is simply required. Even if an index is present, if
    you need to read more than a certain percentage of rows of a table, the Oracle
    optimizer may perform a full table scan regardless of whether an index is present.
    Still, if you simply try to avoid using `NOT` where possible, you may be able
    to improve performance on your queries.


    All this said, you can try to use `NOT EXISTS` as an alternative that may improve
    performance in these conditions. Using the foregoing query and modifying it to
    use `NOT EXISTS`, you can still use an index to improve performance of the query:


    `SELECT last_name, first_name, salary, email`

    `FROM employees`

    `WHERE NOT EXISTS`

    `(SELECT department_id FROM departments`

    `WHERE department_id in(20,30))`

    `AND commission_pct > 0;`


    `------------------------------------------`

    `| Id  | Operation           | Name       |`

    `------------------------------------------`

    `|   0 | SELECT STATEMENT    |            |`

    `|   1 |  FILTER             |            |`

    `|   2 |   TABLE ACCESS FULL | EMPLOYEES  |`

    `|   3 |   INLIST ITERATOR   |            |`

    `|   4 |    INDEX UNIQUE SCAN| DEPT_ID_PK |`

    `------------------------------------------`


    ### 8-17. Controlling Transaction Sizes


    #### Problem


    You are performing a series of DML activities, and want to better manage the units
    of work and the recoverability of your transactions.


    #### Solution


    With the use of savepoints, you can split up transactions more easily into logical
    chunks, and can manage them more effectively upon failure. With the use of savepoints,
    you can roll back a series of DML statements to an incremental savepoint you have
    created. Within your SQL session, simply create a savepoint at an appropriate
    place during your processing that allows you to more easily isolate a “logical
    unit of work.” The following is an example showing how to create a savepoint:


    `SQL> savepoint A;`


    `Savepoint created.`


    If you have an online bookstore, for instance, and you have a customer placing
    an online order, when he or she submits an order, a logical unit of work for this
    transaction would be as follows:


    *   Adding a row to the orders table

    *   Adding one to many rows to the orderitems table


    When processing this online order, you will want to commit all the information
    for the order and all items for an order as one transaction. This represents multiple
    database DML statements, but needs to be processed one at a time to preserve the
    integrity of a customer order; therefore it can be regarded as one “logical unit
    of work.” By using savepoints, you can more easily process multiple DML statements
    as logical units of work. When a savepoint is created, it is essentially creating
    an alias based on a system change number (SCN). After creating a savepoint, you
    then have the luxury to roll back a transaction to that SCN based on the savepoint
    you created.'
  trans: '

    #### 解决方案


    正如我们经常为相等条件查询数据库一样，我们也会为非相等条件查询数据库。从数据库中检索数据的本质以及 SQL 语言的本质，就是允许用户执行此类操作。


    在 SQL 语句中使用`NOT`子句会带来性能上的缺陷，因为它们会触发全表扫描。以下是一个来自先前示例的查询：


    ```sql

    SELECT last_name, first_name, salary, email

    FROM employees_big

    WHERE department_id NOT IN(20,30)

    AND commission_pct > 0;

    ```


    ```

    -----------------------------------------------------------------------------------

    | Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time  |

    -----------------------------------------------------------------------------------

    |   0 | SELECT STATEMENT  |               |   697K|    21M|  4480   (1)| 00:00:54
    |

    |*  1 |  TABLE ACCESS FULL| EMPLOYEES_BIG |   697K|    21M|  4480   (1)| 00:00:54
    |

    -----------------------------------------------------------------------------------

    ```


    尽管我们在`department_id`列上有索引，但通过使用`NOT`子句，我们导致 Oracle 绕过该索引的使用，以正确搜索并确保所有行都不在部门 20
    或 30 中。请注意 Oracle 为此查询分配的总成本 4480。


    通过重写查询，可以启用索引的使用。例如，让我们使用一个子查询来获取所有`department_id`值不是 20 或 30 的列表，然后将该列表传递给父查询。通过这样做，我们将`NOT`子句移到了小得多的`departments`表上，因此对该表的表扫描会很快。这些值被传递给父查询，父查询可以使用索引，因为它不再需要`NOT`子句。


    以下是新的查询及其执行计划。


    ```sql

    SELECT last_name, first_name, salary, email

    FROM employees_big

    WHERE department_id IN

    (SELECT department_id FROM departments

    WHERE department_id NOT IN (20,30))

    AND commission_pct > 0;

    ```


    ```

    ---------------------------------------------------------------------------------

    | Id  | Operation          | Name       | Rows  | Bytes | Cost (%CPU)| Time  |

    ---------------------------------------------------------------------------------

    |   0 | SELECT STATEMENT   |            |    33 |  1188 |     3   (0)| 00:00:01
    |

    |   1 |  NESTED LOOPS      |            |    33 |  1188 |     3   (0)| 00:00:01
    |

    |*  2 |   TABLE ACCESS FULL| EMPLOYEES  |    34 |  1088 |     3   (0)| 00:00:01
    |

    |*  3 |   INDEX UNIQUE SCAN| DEPT_ID_PK |     1 |     4 |     0   (0)| 00:00:01
    |

    ---------------------------------------------------------------------------------

    ```


    请注意，在更改之后，查询现在使用了索引，Oracle 分配的总成本从 4480 下降到了 3。


    #### 工作原理


    你可以通过以下几种方式有效使用`NOT`子句：

    *   比较运算符（''<>'', ''!='', ''^=''）

    *   `NOT IN`

    *   `NOT LIKE`


    通过使用`NOT`，以下每个查询都具有相同的基本效果，即它会否定对`NOT`所应用列上任何可能索引的使用：


    ```sql

    SELECT last_name, first_name, salary, email

    FROM employees

    WHERE department_id != 20

    AND commission_pct > 0;

    ```


    ```sql

    SELECT last_name, first_name, salary, email

    FROM employees

    WHERE department_id NOT IN(20,30)

    AND commission_pct > 0;

    ```


    ```sql

    SELECT last_name, first_name, salary, email

    FROM employees

    WHERE hire_date NOT LIKE ''2%''

    AND commission_pct > 0;

    ```


    ```

    ---------------------------------------

    | Id  | Operation         | Name      |

    ---------------------------------------

    |   0 | SELECT STATEMENT  |           |

    |   1 |  TABLE ACCESS FULL| EMPLOYEES |

    ---------------------------------------

    ```


    有时，全表扫描是必需的。即使存在索引，如果你需要读取表中超过一定百分比的行，Oracle 优化器可能无论如何都会执行全表扫描。尽管如此，如果你尽可能尝试避免使用`NOT`，你可能能够提高查询的性能。


    综上所述，你可以尝试使用`NOT EXISTS`作为替代方案，它可能在这些条件下提高性能。使用前面的查询并修改为使用`NOT EXISTS`，你仍然可以使用索引来提高查询性能：


    ```sql

    SELECT last_name, first_name, salary, email

    FROM employees

    WHERE NOT EXISTS

    (SELECT department_id FROM departments

    WHERE department_id in(20,30))

    AND commission_pct > 0;

    ```


    ```

    ------------------------------------------

    | Id  | Operation           | Name       |

    ------------------------------------------

    |   0 | SELECT STATEMENT    |            |

    |   1 |  FILTER             |            |

    |   2 |   TABLE ACCESS FULL | EMPLOYEES  |

    |   3 |   INLIST ITERATOR   |            |

    |   4 |    INDEX UNIQUE SCAN| DEPT_ID_PK |

    ------------------------------------------

    ```


    ### 8-17. 控制事务大小


    #### 问题


    你正在执行一系列 DML 活动，并希望更好地管理工作单元和事务的可恢复性。


    #### 解决方案


    通过使用保存点，你可以更轻松地将事务拆分为逻辑块，并在失败时更有效地管理它们。利用保存点，你可以将一系列 DML 语句回滚到你创建的增量保存点。在你的 SQL
    会话中，只需在处理过程中适当的位置创建一个保存点，以便更轻松地隔离一个“逻辑工作单元”。以下是一个展示如何创建保存点的示例：


    ```

    SQL> savepoint A;


    Savepoint created.

    ```


    例如，如果你有一个在线书店，一位客户正在下在线订单，当他或她提交订单时，该事务的一个逻辑工作单元如下所示：

    *   向`orders`表添加一行

    *   向`orderitems`表添加一或多行


    在处理这个在线订单时，你会希望将订单的所有信息以及订单的所有项目作为一个事务提交。这涉及多个数据库 DML 语句，但需要逐个处理以维护客户订单的完整性；因此它可以被视为一个“逻辑工作单元”。通过使用保存点，你可以更轻松地将多个
    DML 语句作为逻辑工作单元进行处理。创建保存点时，本质上是基于系统更改号（SCN）创建了一个别名。创建保存点后，你就可以方便地将事务回滚到基于你创建的保存点的那个
    SCN。

