    ![images](img/square.jpg) **提示** 在 Oracle Database 11g 中，通过将 `estimate_percent`
    参数设置为 `DBMS_STATS.AUTO_SAMPLE_SIZE` 计算的关键统计信息 NDV（不同值的数量），在统计学上与通过 100% 完整统计信息计算的
    NDV 计数是相同的。最佳实践是从 `AUTO_SAMPLE_SIZE` 开始，仅在必要时才设置您自己的样本大小。


    为 `estimate_percent` 参数选择最佳大小并不容易——如果设置得太高，收集统计信息会花费很长时间。如果设置得太低，您确实可以快速收集统计信息，但这些统计信息很可能不准确。默认情况下，数据库使用常量
    `DBMS_STATS.AUTO_SAMPLE_SIZE` 来确定最佳样本大小。您可以通过以下方式为 `estimate_percent` 参数指定 `AUTO`
    值：


    ```sql

    SQL> exec dbms_stats.gather_table_stats(NULL, ''MASSIVE_TABLE'', estimate_percent=>

    dbms_stats.auto_sample_size)

    ```


    当您为 `estimate_percent` 参数设置 `AUTO` 值时，数据库不仅会自动确定采样大小，还会随着数据分布的变化调整样本大小。NDV 是评估不同样本大小收集的统计信息准确性的一个好标准。列的
    NDV 定义如下：


    `准确率 = 1 - (估算的 NDV - 实际的 NDV) / 实际的 NDV`


    准确率范围在 0% 到 100% 之间。100% 的样本大小总会给您 100% 的准确率——重要的是，在 Oracle 11g 中，自动采样提供的准确率非常接近
    100%，并且只占用为大表收集完整统计信息所需时间的一小部分。'
- fmt: "### METHOD_OPT\n\n`METHOD_OPT` 参数可以指定两件事：数据库将为其收集统计信息的列，以及数据库将在其上创建直方图的列。您还可以指定直方图中的桶数。您可以为此参数指定以下选项之一：\n\
    \n```\nFOR ALL [INDEXED  |  HIDDEN]  COLUMNS  [size_clause]\n```\n```\nFOR COLUMNS\
    \ [size_clause]  column  [size_clause]  [,COLUMN  [size_clause]…]\n```\n\n`FOR\
    \ ALL` 选项允许您指定数据库必须为所有列收集统计信息，或者仅为索引列收集。如果指定了 `INDEXED COLUMNS` 选项，数据库将只为那些有索引的列收集统计信息。请谨慎使用此选项，因为数据库不会收集表列的统计信息，而是使用基本的默认统计信息。在数据仓库环境中使用\
    \ `FOR ALL INDEXED COLUMNS` 可能尤其有问题，因为该环境中索引使用不多。\n\n`FOR COLUMNS` 选项允许您指定数据库必须在其中一列或多列上收集统计信息，而不是默认的在所有列上收集。在此上下文中指定\
    \ `column` 子句的方法如下：\n\n```\ncolumn:= column_name  |  extension name |  extension\n\
    ```\n\n`column_name` 子句指的是列的名称，`extension` 可以是列组（格式为 `column_name, column_name\
    \ [,…]`）或表达式。\n\n`FOR ALL` 和 `FOR COLUMNS` 选项的关键子句是 `size_clause`。`size_clause`\
    \ 确定数据库是否应为某列收集直方图，以及在什么条件下收集。一个选项是提供一个整数值，指示您想要的直方图桶数——范围在1到254之间——例如：\n\n```\n\
    SQL> exec dbms_stats.gather_table_stats('HR','EMPLOYEES',method_opt=> 'for columns\
    \ size 254 job_id')\nPL/SQL procedure successfully completed.\nSQL>\n```\n\n执行此过程时，数据库会收集直方图，并且将有254个直方图桶。\n\
    \n![images](images/square.jpg) `Note` `integer` 子句的值为1（例如，`'FOR ALL COLUMNS SIZE\
    \ 1'`）实际上不会在列上创建任何直方图，因为所有数据都被放入一个桶中。此外，如果表上已经有直方图，将 `integer` 子句的值设置为1将删除这些直方图。\n\
    \n> `size_clause` 的另一个选项是指定以下三个值之一：\n> \n> `REPEAT`：指定数据库必须仅在那些已为其收集了直方图的列上收集直方图；将值设置为\
    \ `repeat` 而不是整数值1可确保保留任何有用的直方图。\n> \n> `AUTO`：让数据库根据每列的数据分布（是均匀还是倾斜）和实际的列使用情况统计信息来决定应在其上收集直方图的列。\n\
    > \n> `SKEWONLY`：让数据库根据每列的数据分布来决定应在其上收集直方图的列。\n> \n> 以下示例指定了 `SKEWONLY`：\n\n```\n\
    SQL> exec dbms_stats.gather_table_stats('HR','EMPLOYEES',method_opt=> 'for all\
    \ columns size skewonly')\nPL/SQL procedure successfully completed.\nSQL>\n```\n\
    \n当您指定 `SKEWONLY` 时，数据库将查看每列的数据分布，以确定数据是否倾斜到足以证明创建直方图是合理的。\n\n`METHOD_OPT` 参数的默认值是\
    \ `FOR ALL COLUMNS SIZE AUTO`。也就是说，数据库将为表中的所有列收集统计信息，并自动选择应为其创建直方图的列。\n\n### NO_INVALIDATE\n\
    \n您可以为这个参数设置三个不同的值。值 `TRUE` 表示数据库不会使其正在收集统计信息的表的依赖游标失效。值 `FALSE` 表示数据库立即使依赖游标失效。最后，您可以将此参数设置为值\
    \ `DBMS_STATS.AUTO_INVALIDATE`，让 Oracle 决定使游标失效——这也是 `NO_INVALIDATE` 参数的默认值。\n\
    \n### GRANULARITY\n\n此参数确定数据库如何处理分区表的统计信息收集。您可以为 `GRANULARITY` 参数指定以下各种选项：\n\n\
    > `ALL`：收集子分区、分区和全局级别的统计信息；此设置提供了非常准确的表统计信息集，但资源消耗极大，完成时间比使用其他选项的统计信息收集作业长得多。\n\
    > \n> `GLOBAL`：仅收集表的全局统计信息。\n> \n> `PARTITION`：仅收集分区级别的统计信息——分区级别的统计信息在表级别汇总，在表级别可能不太准确。\n\
    > \n> `GLOBAL AND PARTITION`：收集全局和分区级别的统计信息，但不收集子分区级别的统计信息。\n> \n> `SUBPARTITION`：仅收集子分区统计信息。\n\
    > \n> `AUTO`：这是 `GRANULARITY` 参数的默认值，根据分区类型确定粒度。\n\n请注意，`ALL` 设置除了消耗大量资源外，完成时间可能也很长。对于复合分区表，收集子分区级别的统计信息通常并不真正必要。在大多数情况下，默认的\
    \ `AUTO` 设置效果很好。`ALL` 设置绝对是过度的，在大多数（可能所有）情况下都没有必要。\n\n### PUBLISH\n\n默认情况下，数据库在完成统计信息收集过程后立即发布所有统计信息。您可以通过将\
    \ `PUBLISH` 参数设置为 `FALSE` 来指定数据库将新收集的统计信息保留为待处理统计信息。\n\n### INCREMENTAL\n\n`INCREMENTAL`\
    \ 首选项确定数据库是否无需执行全表扫描即可维护分区表的统计信息。此参数的默认值为 `FALSE`，意味着数据库执行全表扫描来维护全局统计信息。配方 13-19\
    \ 详细讨论了增量统计信息收集。\n\n### STALE_PERCENT\n\n`STALE_PERCENT` 首选项确定表中必须更改的行的比例，然后数据库才认为该表的统计信息“过时”并开始收集新的统计信息。默认情况下，`STALE_PERCENT`\
    \ 参数设置为 10%。不要对完全没有更改或更改很少的表收集统计信息，因为您将收集不必要的统计信息。\n\n### AUTOSTATS_TARGET\n\n\
    此首选项仅对自动统计信息收集有效，在使用 `SET_GLOBAL_STATS` 过程设置全局统计信息首选项时指定。您可以为此首选项设置以下值：\n\n> `ALL`：为数据库中的所有对象收集统计信息。\n\
    > \n> `ORACLE`：为所有 Oracle 拥有的对象收集统计信息。\n> \n> `AUTO`：数据库决定应为其收集统计信息的对象。\n> \n\
    > `AUTOSTATS_TARGET` 参数的默认值是 `AUTO`。请注意，目前 `ALL` 和 `AUTO`（默认）设置的工作方式相同。Oracle\
    \ 建议您将 `AUTOSTATS_TARGET` 首选项设置为值 `ORACLE`，以确保数据库收集最新的字典统计信息（针对 SYS 和 SYSTEM 拥有的对象）。\n\
    \n我们在本配方中融入了多个 Oracle 统计信息收集的最佳实践。除非有充分的理由不这样做，否则尽量坚持使用首选项的默认设置。请记住，如果您要创建新表，可以先加载数据并仅针对该表收集统计信息。然后再创建索引，因为数据库在索引创建时会自动计算索引的统计信息。\n\
    \n## 13-4\\. 手动生成统计信息"
  raw: "##### METHOD_OPT\n\nYou can specify two things with the `METHOD_OPT` parameter:\
    \ the columns for which the database will collect statistics, and the columns\
    \ on which the database will create histograms. You can also specify the number\
    \ of the buckets in the histograms. You can specify one of the following options\
    \ for this parameter:\n\n`FOR ALL [INDEXED  |  HIDDEN]  COLUMNS  [size_clause]`\n\
    `FOR COLUMNS [size_clause]  column  [size_clause]  [,COLUMN  [size_clause]…]`\n\
    \nThe `FOR ALL` option lets you specify that the database must collect statistics\
    \ for all columns, or only for the indexed columns. If you specify the `INDEXED\
    \ COLUMNS` option, the database will collect statistics only for those columns\
    \ that have an index on them. Be careful with this option, as the database will\
    \ not collect statistics on the table's columns, instead using basic default statistics\
    \ for the columns. Using the `FOR ALL INDEXED COLUMNS` in a data warehouse environment\
    \ could be especially problematic, as indexes aren't heavily used in that environment.\n\
    \nThe `FOR COLUMNS` option lets you specify one or more columns on which the database\
    \ must gather statistics, instead of on all columns in a table, which is the default\
    \ behavior. Here's how to specify the `column` clause in this context:\n\n`column:=\
    \ column_name  |  extension name |  extension`\n\nThe `column_name` clause refers\
    \ to the name of the column, and `extension` can be either a column group (in\
    \ the format `column_name, column_name [,…]`) or an expression.\n\nThe key clause\
    \ for both the `FOR ALL` and the `FOR COLUMNS` options is the `size_clause`. The\
    \ `size_clause` determines whether the database should collect histograms for\
    \ a column, and under what conditions. One option is to supply an integer value\
    \ indicating the number of histogram buckets—in the range 1 through 254—that you\
    \ would like—for example:\n\n`SQL> exec dbms_stats.gather_table_stats('HR','EMPLOYEES',method_opt=>\
    \ 'for columns size 254 job_id')`\n\n`PL/SQL procedure successfully completed.`\n\
    `SQL>`\n\nWhen you execute this procedure, the database collects histograms, and\
    \ there will be 254 histogram buckets.\n\n![images](images/square.jpg) **Note**\
    \ A value of 1 for the `integer` clause (for example, `'FOR ALL COLUMNS SIZE 1'`)\
    \ won't really create any histograms on the columns, because all the data is placed\
    \ into a single bucket. Also, if there's already a histogram(s) on a table, setting\
    \ the value 1 for the `integer` clause will remove the histogram(s).\n\n> Another\
    \ option for the `size_clause` is to specify one of the following three values:\n\
    > \n> `REPEAT`: Specifies that the database must collect histograms on only those\
    \ columns that already have histograms collected for them; setting the value *repeat*\
    \ instead of the integer 1 value ensures that you retain any useful histograms.\n\
    > \n> `AUTO`: Lets the database determine for which columns it should collect\
    \ histograms, based on each column's data distribution (whether it's uniform or\
    \ skewed) and the actual column usage statistics\n> \n> `SKEWONLY`: Lets the database\
    \ determine for which columns it should collect histograms, based on each column's\
    \ data distribution\n> \n> Here is an example that specifies `SKEWONLY`:\n\n`SQL>\
    \ exec dbms_stats.gather_table_stats('HR','EMPLOYEES',method_opt=> 'for all columns\
    \ size skewonly')`\n`PL/SQL procedure successfully completed.`\n`SQL>`\n\nWhen\
    \ you specify `SKEWONLY`, the database will look at the data distribution for\
    \ each column to determine if the data is skewed enough to warrant the creation\
    \ of a histogram.\n\nThe default value for the `METHOD_OPT` parameter is `FOR\
    \ ALL COLUMNS SIZE AUTO`. That is, the database will collect statistics for all\
    \ columns in a table, and it automatically selects the columns for which it should\
    \ create histograms.\n\n##### NO_INVALIDATE\n\nYou can set three different values\
    \ for this parameter. The value `TRUE` means that the database doesn't invalidate\
    \ the dependent cursors of the table for which it's collecting statistics. The\
    \ value `FALSE` means that the database immediately invalidates the dependent\
    \ cursors. Finally, you can set this parameter to the value `DBMS_STATS.AUTO_INVALIDATE`,\
    \ to let Oracle decide to invalidate the cursors—this is also the default value\
    \ for the `NO_INVALIDATE` parameter.\n\n##### GRANULARITY\n\nThis parameter determines\
    \ how the database handles statistics gathering for partitioned tables. Here are\
    \ the various options you can specify for the `GRANULARITY` parameter:\n\n> `ALL`:\
    \ Gathers subpartition-, partition-, and global-level statistics; this setting\
    \ provides a very accurate set of table statistics, but is extremely resource-intensive\
    \ and takes much longer to complete than a statistics collection job with the\
    \ other options.\n> \n> `GLOBAL`: Gathers just global statistics for a table\n\
    > \n> `PARTITION`: Gathers only partition-level statistics—the partition-level\
    \ statistics are rolled up at the table level, and may not be very accurate at\
    \ the table level.\n> \n> `GLOBAL AND PARTITION`: Gathers the global- and partition-level\
    \ statistics, but not the subpartition-level statistics\n> \n> `SUBPARTITION`:\
    \ Gathers only subpartition statistics\n> \n> `AUTO`: This is the default value\
    \ for the `GRANULARITY` parameter and determines the granularity based on the\
    \ partitioning type.\n\nNote that the `ALL` setting could take a long time to\
    \ complete besides using up a lot of resources. It's not really necessary to gather\
    \ statistics at the subpartition level for composite partitioned tables. In most\
    \ cases, the default setting of `AUTO` works well. The `ALL` setting is definitely\
    \ overkill, and isn't necessary in most, probably all situations.\n\n##### PUBLISH\n\
    \nBy default, the database publishes all statistics right after it completes the\
    \ statistics gathering process. You can specify that the database keep newly collected\
    \ statistics as pending statistics by setting the `PUBLISH` parameter to `FALSE`.\n\
    \n##### INCREMENTAL\n\nThe `INCREMENTAL` preference determines whether the database\
    \ maintains a partitioned table's statistics without having to perform a full\
    \ table scan. The default value of this parameter is `FALSE`, meaning the database\
    \ does a full table scan to maintain global statistics. Recipe 13-19 discusses\
    \ incremental statistics collection in detail.\n\n##### STALE_PERCENT\n\nThe `STALE_PERCENT`\
    \ preference determines the proportion of a table's rows that must change before\
    \ the database considers the table's statistics as “stale” and starts gathering\
    \ fresh statistics. By default, the `STALE_PERCENT` parameter is set to 10%. Don't\
    \ collect statistics on tables that haven't changed at all, or have changed very\
    \ little, as you'd be collecting unnecessary statistics.\n\n##### AUTOSTATS_TARGET\n\
    \nThis preference is valid only for auto stats collection, and you specify it\
    \ when setting global statistics preferences with the `SET_GLOBAL_STATS` procedure.\
    \ You can set the following values for this preference:\n\n> `ALL`: Collects statistics\
    \ for all objects in the database\n> \n> `ORACLE`: Collects statistics for all\
    \ Oracle-owned objects\n> \n> `AUTO`: The database determines for which objects\
    \ it should collect statistics.\n\nThe default value for the `AUTOSTATS_TARGET`\
    \ parameter is `AUTO`. Note that currently the `ALL` and the `AUTO` (default)\
    \ settings work the same way. Oracle recommends that you set the `AUTOSTATS_TARGET`\
    \ preference to the value `ORACLE`, to ensure that the database collects fresh\
    \ dictionary statistics (for objects owned by SYS and SYSTEM).\n\nWe've incorporated\
    \ several Oracle best practices for statistics collection in this recipe. Try\
    \ to stick with the default settings for the preferences unless you have strong\
    \ reasons to do otherwise. Remember that if you're creating a new table, you can\
    \ load the data first and collect statistics just for the table. Create the indexes\
    \ afterward, because the database automatically computes statistics for the indexes\
    \ during index creation time.\n\n### 13-4\\. Manually Generating Statistics"
