    ## How It Works


    Retrieving ASH information is necessary if you need to get session information
    more current than you can retrieve from the AWR report. Again, AWR information
    is generated only hourly by default. ASH information is gathered every second
    from `V$SESSION`, and stores the most useful session information to help gauge
    database performance at any given moment.


    The ASH information is stored within a circular buffer in the SGA. Oracle documentation
    states that the buffer size is calculated as follows:


    ```

    Max [Min [ #CPUs * 2 MB, 5% of Shared Pool Size, 30MB ], 1MB ]

    ```


    The amount of time that the information is stored within the data dictionary depends
    on the activity within your database. You may need to view the `DBA_HIST_ACTIVE_SESS_HISTORY`
    historical view in order to get the ASH information you need if your database
    is very active. For an example of querying the `DBA_HIST_ACTIVE_SESS_HISTORY`
    view, see Recipe 4-13. To quickly see how much data is held in your historical
    view, you could simply get the earliest `SAMPLE_TIME` from the `DBA_HIST_ACTIVE_SESS_HISTORY`
    view:


    ```

    SELECT min(sample_time) FROM dba_hist_active_sess_history;

    ```


    ```

    MIN(SAMPLE_TIME)

    ---------------------------------------------------------------------------

    20-MAR-11 11.00.27.433 PM

    ```


    The MMON background process, which manages the AWR hourly snapshots, also flushes
    ASH information to the historical view at the same time. If there is heavy activity
    on the database, and the buffer fills between the hourly AWR snapshots, the MMNL
    background process will wake up and flush the ASH data to the historical view.


    The `V$ACTIVE_SESSION_HISTORY` and `DBA_HIST_ACTIVE_SESS_HISTORY` views contain
    much more detailed information than just the samples shown within this recipe,
    and you can drill down and get much more information at the session level, if
    desired, including information regarding actual SQL statements, the SQL operations,
    blocking session information, and file I/O information.


    ### 4-12. Getting ASH Information from Enterprise Manager


    #### Problem


    You want to get to ASH information from within Enterprise Manager because you
    use Enterprise Manager for performance tuning activities.


    #### Solution


    The ASH report generated from within Enterprise Manager has the same sections
    as specified in [Table 4-1](#Chapter04.html#tab_4_1) (see Recipe 4-11). To generate
    an ASH report from within Enterprise Manager, you generally need to be in the
    Performance tab, depending on your particular version of Enterprise Manager. As
    with running the `ashrpt.sql` script, you need to specify the beginning and ending
    time frames for the report period desired. See [Figure 4-10](#Chapter04.html#fig_4_10)
    for an example of the screen used to generate an ASH report, and [Figure 4-11](#Chapter04.html#fig_4_11)
    for a sample of the ASH report output:


    ![images](images/0410.jpg)


    Figure 4-10. Generating ASH report from Enterprise Manager


    ![images](images/0411.jpg)


    Figure 4-11. Sample ASH report from Enterprise Manager


    #### How It Works


    When generating an ASH report, you have the option to filter on specific criteria.
    In [Figure 4-12](#Chapter04.html#fig_4_12), see the Filter drop-down menu. If
    you have a very active database, and already want to zero in on a specific SQL_ID,
    for example, you can choose the SQL_ID option from the Filter drop-down menu,
    and enter the SQL_ID value. The resulting report will show information based only
    on the filtered criteria.


    The choices to filter on include the following:


    *   `SID`

    *   `SQL_ID`

    *   `Wait Class`

    *   `Service`

    *   `Module`

    *   `Action`

    *   `Client`


    Many of the foregoing filters can be found in the `V$SESSION` view. For a list
    of the possible wait classes, you can query the `DBA_HIST_EVENT_NAME` view as
    shown in the following example:


    ```

    SELECT DISTINCT wait_class FROM dba_hist_event_name;

    ```


    ```

    WAIT_CLASS

    ----------------------------------------------------------------

    Concurrency

    User I/O

    Administrative

    System I/O

    Scheduler

    Configuration

    Other

    Application

    Cluster

    Network

    Idle

    Commit

    ```


    ![images](images/0412.jpg)


    Figure 4-12. Customizing ASH report by filter


