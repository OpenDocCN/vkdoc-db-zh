    `    task_name => ''TUNE1'',`

    `    task_owner => ''SYS'',`

    `    replace => TRUE,`

    `    profile_type => DBMS_SQLTUNE.PX_PROFILE);`

    `--`

    `end;`

    `/`


    When the prior code is run, it creates and enables the SQL profile. Now whenever
    the associated SQL query is executed, the SQL profile will be considered by the
    optimizer when formulating an execution plan.


    ![images](images/square.jpg) **Tip** How do you know if a SQL profile is being
    used by the optimizer? Set `AUTOTRACE` on and view the execution plan with the
    profile enabled and then disabled. You should see a lower-cost execution plan
    being used when the profile is enabled. Additionally, consider inspecting the
    `SQL_PROFILE` column of `V$SQL`.


    #### How It Works


    The only Oracle-supported method for creating a SQL profile is to run the SQL
    Tuning Advisor and if recommended, create a SQL profile using the Tuning Advisor''s
    output. In other words, the SQL Tuning Advisor determines if a SQL profile will
    help, and if so generates the code required to create a SQL profile for a given
    query.


    The “Solution” section detailed how to manually run the SQL Tuning Advisor. Keep
    in mind that as of Oracle Database 11g, this tuning task job automatically runs
    on a regularly scheduled basis. See [Chapter 11](#Chapter11.html#ch11) for details
    on automatic SQL tuning features. You can easily review the output of the automatic
    tuning job via this query:


    `SQL> SELECT DBMS_AUTO_SQLTUNE.REPORT_AUTO_TUNING_TASK FROM DUAL;`


    We recommend that you review the output of the automatic tuning job on a regular
    basis. The SQL Tuning Advisor will provide the code to create and accept SQL profiles
    as part of the output.


    ![images](images/square.jpg) **Tip** See Recipe 12-2 for details on how to configure
    the automatic acceptance of SQL profiles.


    As noted in the “Solution” section, a SQL profile is created and accepted via
    the `DBMS_SQLTUNE.ACCEPT_SQL_PROFILE` procedure. There are many options available
    when using this procedure (see [Table 12-2](#Chapter12.html#tab_12_2) for details).


    ![images](images/t1202.jpg)


    The `FORCE_MATCH` parameter of `ACCEPT_SQL_PROFILE` requires further explanation.
    Recall that a SQL profile is associated with a SQL statement. The SQL statement
    is identified via a hash function (SQL signature). The hash function is generated
    after converting the SQL text and removing extra white space. When setting `FORCE_MATCH`
    to `TRUE`, this additionally normalizes literal values into bind values. This
    is similar to the algorithm generated via the `FORCE` option of the `CURSOR_SHARING`
    database initialization parameter.


    For example, with `FORCE_MATCH` set to `TRUE`, the following two SQL statements
    will generate the same SQL signature:


    `SQL> select value from my_table where value = ''AA'';`

    `SQL> select value from my_table where value = ''bb'';`


    This allows SQL statements that use literal values to share the same SQL profile.
    If there is a combination of literal values and bind variables in a SQL statement,
    then literal values are not normalized.


    **SQL PROFILE VS. DATABASE PROFILE**


    It''s puzzling that Oracle would choose the name of “profile” and apply it to
    two diverse database features, namely SQL profiles and database profiles. Perhaps
    in a future release, Oracle might consider renaming SQL profiles to something
    like SQL Optional More Intelligent Statistics That Make Your Queries Run Faster.
    Regardless, ensure you don''t confuse a SQL profile with a database profile.


    Briefly, a SQL profile is associated with a SQL statement and contains corrections
    to statistics that help the optimizer generate a more efficient execution plan.
    The SQL Tuning Advisor recommends and generates the code required to create and
    accept a SQL profile, whereas a database profile is an object assigned to a user
    that constrains database resource usage and also enforces password security. A
    database profile is created with the `CREATE PROFILE` statement.


    ### 12-2. Automatically Accepting SQL Profiles


    #### Problem


    You realize that the Automatic SQL Tuning job runs on a daily basis (in Oracle
    Database 11g or higher). You determine that the automatic tuning job generates
    reasonable SQL profiles for problematic queries and now want to enable the automatic
    acceptance of SQL profiles generated by the automatic tuning job.


    ![images](images/square.jpg) **Tip** See [Chapter 11](#Chapter11.html#ch11) for
    full details on modifying the Automatic SQL Tuning job.'
  trans: "### 步骤 1: 使用 DBMS_SQLTUNE 创建调优任务\n\n第一步是创建一个与有问题的 SQL 语句相关联的调优任务。在以下代码中，SQL\
    \ 文本被硬编码为输入到 `tune_sql` 变量：\n\n```sql\nDECLARE\n  tune_sql  CLOB;\n  tune_task\
    \ VARCHAR2(30);\nBEGIN\n  tune_sql := 'select count(*) from mgmt_db_feature_usage_ecm2';\n\
    \  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n    sql_text   => tune_sql\n\
    \   ,user_name  => 'STAGING'\n   ,scope      => 'COMPREHENSIVE'\n   ,time_limit\
    \ => 60\n   ,task_name  => 'TUNE1'\n   ,description => 'Calling SQL Tuning Advisor\
    \ for one statement'\n);\nEND;\n/\n```\n\n上述代码被放置在一个名为 `sqltune.sql` 的文件中，并按如下方式执行：\n\
    \n```sql\nSQL> @sqltune.sql\n```\n\n如果你之后需要删除调优任务，可以使用 `DBMS_SQLTUNE.DROP_TUNING_TASK`\
    \ 过程。显然，此时不要删除调优任务，因为在接下来的几个步骤中你还需要它。\n\n![images](img/square.jpg) `注意` 在处理调优建议和\
    \ SQL 配置文件时，请确保你使用的数据库账户已被授予 `ADMINISTER SQL MANAGEMENT OBJECT` 系统权限。此权限包含了管理调优任务和\
    \ SQL 配置文件所需的所有权限。\n\n### 步骤 2: 执行调优任务\n\n此步骤运行 SQL 调优顾问，以生成与调优任务（在步骤 1 中创建）相关联的任何查询的建议：\n\
    \n```sql\nSQL> exec dbms_sqltune.execute_tuning_task(task_name=>'TUNE1');\n```\n\
    \n### 步骤 3: 运行调优建议报告\n\n现在使用 `DBMS_SQLTUNE` 提取在步骤 2 中生成的任何调优建议：\n\n```sql\nset\
    \ long 10000\nset longchunksize 10000\nset lines 132\nset pages 200\nselect dbms_sqltune.report_tuning_task('TUNE1')\
    \ from dual;\n```\n\n对于此示例，SQL 调优顾问建议创建一个 SQL 配置文件。以下是输出中的一段内容，包含了建议以及创建 SQL 配置文件所需的代码：\n\
    \n```\nRecommendation (estimated benefit: 86.11%)\n ------------------------------------------\n\
    \  - Consider accepting the recommended SQL profile to use parallel execution\n\
    \    for this statement.\n    execute dbms_sqltune.accept_sql_profile(task_name\
    \ => 'TUNE1', task_owner\n            => 'SYS', replace => TRUE, profile_type\
    \ =>\n            DBMS_SQLTUNE.PX_PROFILE);\n-------------------------------------------\n\
    \  Executing this query parallel with DOP 8 will improve its response time\n \
    \ 86.11% over the original plan. However, there is some cost in enabling\n  parallel\
    \ execution...\n```\n\n### 步骤 4: 创建并接受 SQL 配置文件\n\n要实际创建 SQL 配置文件，你需要运行 SQL 调优顾问推荐的代码（来自步骤\
    \ 3）——例如：\n\n```sql\nbegin\n-- This is the code from the SQL Tuning Advisor\n\
    dbms_sqltune.accept_sql_profile(\n    task_name => 'TUNE1',\n    task_owner =>\
    \ 'SYS',\n    replace => TRUE,\n    profile_type => DBMS_SQLTUNE.PX_PROFILE);\n\
    --\nend;\n/\n```\n\n当运行上述代码时，它会创建并启用 SQL 配置文件。现在，每当执行关联的 SQL 查询时，优化器在制定执行计划时都会考虑这个\
    \ SQL 配置文件。\n\n![images](img/square.jpg) `提示` 你如何知道优化器是否正在使用 SQL 配置文件？开启 `AUTOTRACE`，在启用配置文件和禁用配置文件两种情况下查看执行计划。你应该能看到在启用配置文件时使用了成本更低的执行计划。此外，可以考虑检查\
    \ `V$SQL` 的 `SQL_PROFILE` 列。\n\n#### 工作原理\n\nOracle 支持的创建 SQL 配置文件的唯一方法是运行 SQL\
    \ 调优顾问，如果建议创建，则使用调优顾问的输出来创建 SQL 配置文件。换句话说，SQL 调优顾问会判断 SQL 配置文件是否有帮助，如果有，则会为给定查询生成创建\
    \ SQL 配置文件所需的代码。\n\n“解决方案”部分详细说明了如何手动运行 SQL 调优顾问。请记住，从 Oracle Database 11g 开始，此调优任务作业会定期自动运行。有关自动\
    \ SQL 调优功能的详细信息，请参阅 第 11 章。你可以通过此查询轻松查看自动调优作业的输出：\n\n```sql\nSQL> SELECT DBMS_AUTO_SQLTUNE.REPORT_AUTO_TUNING_TASK\
    \ FROM DUAL;\n```\n\n我们建议你定期查看自动调优作业的输出。SQL 调优顾问会在输出中提供创建和接受 SQL 配置文件的代码。\n\n\
    ![images](img/square.jpg) `提示` 有关如何配置自动接受 SQL 配置文件的详细信息，请参阅配方 12-2。\n\n如“解决方案”部分所述，SQL\
    \ 配置文件是通过 `DBMS_SQLTUNE.ACCEPT_SQL_PROFILE` 过程创建和接受的。使用此过程时有许多可用选项（详见 表 12-2）。\n\
    \n![images](img/t1202.jpg)\n\n`ACCEPT_SQL_PROFILE` 的 `FORCE_MATCH` 参数需要进一步解释。回想一下，SQL\
    \ 配置文件与一个 SQL 语句相关联。该 SQL 语句是通过哈希函数（SQL 签名）来识别的。哈希函数是在转换 SQL 文本并删除多余空格后生成的。当将\
    \ `FORCE_MATCH` 设置为 `TRUE` 时，这还会将字面值规范化为绑定值。这类似于通过 `CURSOR_SHARING` 数据库初始化参数的\
    \ `FORCE` 选项生成的算法。\n\n例如，当 `FORCE_MATCH` 设置为 `TRUE` 时，以下两个 SQL 语句将生成相同的 SQL 签名：\n\
    \n```sql\nSQL> select value from my_table where value = 'AA';\nSQL> select value\
    \ from my_table where value = 'bb';\n```\n\n这允许使用字面值的 SQL 语句共享同一个 SQL 配置文件。如果\
    \ SQL 语句中同时存在字面值和绑定变量，则字面值不会被规范化。\n\n#### SQL 配置文件 与 数据库配置文件\n\n令人困惑的是，Oracle\
    \ 会选择 “profile” 这个名称并将其应用于两个不同的数据库功能，即 SQL 配置文件和数据库配置文件。也许在未来的版本中，Oracle 会考虑将\
    \ SQL 配置文件重命名为类似 SQL 可选更智能统计信息（使查询运行更快）这样的名字。无论如何，请确保不要混淆 SQL 配置文件和数据库配置文件。\n\n\
    简而言之，SQL 配置文件与一个 SQL 语句相关联，包含对统计信息的修正，以帮助优化器生成更高效的执行计划。SQL 调优顾问推荐并生成创建和接受 SQL\
    \ 配置文件所需的代码，而数据库配置文件是一个分配给用户的对象，用于约束数据库资源使用并强制执行密码安全性。数据库配置文件是使用 `CREATE PROFILE`\
    \ 语句创建的。\n\n### 12-2. 自动接受 SQL 配置文件\n\n#### 问题\n\n你了解到自动 SQL 调优作业（在 Oracle Database\
    \ 11g 或更高版本中）每天都会运行。你确定自动调优作业会为有问题的查询生成合理的 SQL 配置文件，现在希望启用自动接受自动调优作业生成的 SQL 配置文件。\n\
    \n![images](img/square.jpg) `提示` 有关修改自动 SQL 调优作业的完整详细信息，请参阅 第 11 章。"
- fmt: "## Solution\n\n使用 `DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER` 过程来启用自动接受自动SQL优化任务推荐的SQL配置文件——例如：\n\
    \n```\nBEGIN\n  DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER(\n    parameter\
    \ => 'ACCEPT_SQL_PROFILES', value => 'TRUE');\nEND;\n/\n```\n\n如果要禁用SQL配置文件的自动接受，可以按照如下方式操作（使用\
    \ `FALSE` 参数）：\n\n```\nBEGIN\n  DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER(\n\
    \    parameter => 'ACCEPT_SQL_PROFILES', value => 'FALSE');\nEND;\n/\n```\n\n\
    ![images](images/square.jpg) **注意** `DBMS_AUTO_SQLTUNE` 包需要DBA角色，或者已将该包的 `EXECUTE`\
    \ 权限显式授予用户。此包在Oracle数据库11g R2或更高版本中可用。如果你使用的是更低版本的数据库，请使用 `DBMS_SQLTUNE` 包。\n\n\
    ## How It Works\n\n在Oracle数据库11g或更高版本中，一个自动配置的作业会定期运行SQL优化顾问（运行周期由配置的维护窗口决定）。该作业从AWR中包含的性能指标中识别高资源消耗的SQL语句。当自动优化作业运行时，它偶尔会建议为性能不佳的SQL语句实现一个SQL配置文件。如果满足以下条件，Oracle将自动接受该配置文件：\n\
    \n*   已通过 `DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER` 配置了自动接受。\n*   使用该SQL配置文件后，性能增益（由SQL优化顾问确定）至少是未使用配置文件的三倍。\n\
    \n你可以通过此查询报告自动优化任务配置的详细信息：\n\n```\nSELECT\n  parameter_name\n ,parameter_value\n\
    FROM dba_advisor_parameters\nWHERE task_name = 'SYS_AUTO_SQL_TUNING_TASK'\nAND\
    \   parameter_name\n   IN ('ACCEPT_SQL_PROFILES',\n       'MAX_SQL_PROFILES_PER_EXEC',\n\
    \       'MAX_AUTO_SQL_PROFILES',\n       'EXECUTION_DAYS_TO_EXPIRE');\n```\n\n\
    以下是一些示例输出：\n\n```\nPARAMETER_NAME            PARAMETER_VALUE\n-------------------------\
    \ --------------------\nEXECUTION_DAYS_TO_EXPIRE  30\nACCEPT_SQL_PROFILES    \
    \   TRUE\nMAX_SQL_PROFILES_PER_EXEC 20\nMAX_AUTO_SQL_PROFILES     10000\n```\n\
    \n![images](images/square.jpg) **提示** 自动实现的SQL配置文件在 `DBA_SQL_PROFILES` 视图的 `TYPE`\
    \ 列中显示 `AUTO` 值。\n\n你还可以使用Enterprise Manager来配置SQL配置文件的自动接受。从主数据库页面，导航到Advisor\
    \ Central页面。接下来，单击SQL Advisors链接。现在单击Automatic SQL Tuning Results页面。然后单击Automatic\
    \ Implementation of SQL Profiles的配置按钮。你应该会看到一个类似于[Figure 12-2](#Chapter12.html#fig_12_2)的页面。\n\
    \n![images](images/1202.jpg)\n\n`Figure 12-2.` 配置SQL配置文件的自动接受\n\n通过此屏幕，你可以管理诸如SQL配置文件的自动接受、优化会话的最长时间等功能。\n\
    \n### 12-3. 显示SQL配置文件信息\n\n#### Problem\n\n你已经创建并接受了多个SQL配置文件，现在想要查看与这些数据库对象相关的信息。\n\
    \n#### Solution\n\n使用 `DBA_SQL_PROFILES` 视图来显示有关SQL配置文件的信息。以下是一个选择最有趣列的示例：\n\n\
    ```\nSQL> select name, type, status, sql_text from dba_sql_profiles;\n```\n\n\
    以下是部分输出片段：\n\n```\nNAME                           TYPE    STATUS   SQL_TEXT\n\
    ------------------------------ ------- -------- ------------------------------\n\
    SYS_SQLPROF_012eda58a1be0001   MANUAL  ENABLED  SELECT ecm_snapshot_id AS id...\n\
    SYS_SQLPROF_012ea20305980000   MANUAL  ENABLED  SELECT *  FROM inv_maint...\n\
    SYS_SQLPROF_012edf0316930003   MANUAL  ENABLED  SELECT /* + parallel(mgmt_db_f...\n\
    ```\n\n对于此数据库，有几个手动启用的SQL配置文件（如前述输出所示）。\n\n![images](images/square.jpg) **注意**\
    \ 由于SQL配置文件与特定的SQL语句关联（而非用户），因此没有与SQL配置文件关联的 `ALL` 或 `USER` 级别视图。\n\n#### How\
    \ It Works\n\n回想一下，SQL配置文件包含对现有统计信息的改进。`DBA_SQL_PROFILES` 视图是查看SQL配置文件名称、属性和关联SQL文本的最佳来源。\n\
    \n要查看内部的SQL配置文件提示相关信息，你还可以额外查询 `DBMSHSXP_SQL_PROFILE_ATTR` 视图——例如：\n\n```\nSELECT\n\
    \  a.name\n ,b.comp_data\nFROM dba_sql_profiles          a\n    ,dbmshsxp_sql_profile_attr\
    \ b\nWHERE a.name = b.profile_name;\n```\n\n以下是一些示例输出：\n\n```\nSYS_SQLPROF_0130520c90dc0002\n\
    <outline_data><hint><![CDATA[OPT_ESTIMATE(@\"SEL$2\",\nNLJ_INDEX_SCAN, \"FS\"\
    @\"SEL$2\", (\"MAP\"@\"SEL$2\"), \"DB_FEAT_OPT_112_SUM_MV_IDX3\",\nSCALE_ROWS=0.3369001041)]]></h\n\
    ```\n\n前面的输出让你了解SQL配置文件中提示的类型。此信息供优化器使用，以更好地估计每个执行步骤的基数。这些数据使优化器在生成执行计划时能够做出更好的决策。\n\
    \n你还可以通过查询 `SQLOBJ$` 和 `SQLOBJ$DATA` 视图来查看此内部SQL配置文件信息。这些视图中的数据是XML格式的，因此在查询时必须使用Oracle\
    \ XML函数格式化输出——例如：\n\n```\nSELECT\n    extractvalue(value(a), '.') sqlprofile_hints\n\
    FROM sqlobj$      o\n    ,sqlobj$data d\n    ,table(xmlsequence(extract(xmltype(d.comp_data),'/outline_data/hint')))\
    \ a\nWHERE o.name      = '&&profile_name'\nAND   o. plan_id = d.plan_id\nAND \
    \  o.signature = d.signature\nAND   o.category = d.category\nAND   o.obj_type\
    \ = d.obj_type;\n```\n\n以下是输出的一个小示例：\n\n```\nOPT_ESTIMATE(@\"SEL$EF0E05FC\", INDEX_SCAN,\
    \ \"MGMT_TARGETS\"@\"SEL$4\",\n\"MIDX3\", SCALE_ROWS=50.68489486)\nOPT_ESTIMATE(@\"\
    SEL$EF0E05FC\", NLJ_INDEX_FILTER,\n\"MGMT_ECM_GEN_SNAPSHOT\"@\"SEL$3\", (\"MGMT_TARGETS\"\
    @\"SEL$4\"),\n\"IDX$$_1197C0001\", SCALE_ROWS=0.4308705)\n```\n\n同样，这些配置文件统计信息并不强制优化器使用特定的执行计划。相反，这些统计信息为优化器提供了选择更高效执行计划的灵活性。\n\
    \n![images](images/square.jpg) **注意** 如果你使用的是Oracle数据库10g，则使用 `SQLPROF$` 和 `SQLPROF$ATTR`\
    \ 视图。\n\n### 12-4. 禁用SQL配置文件\n\n#### Problem\n\n你认为某个查询不再需要SQL配置文件。你希望手动禁用（而非删除）该SQL配置文件。\n\
    \n#### Solution\n\n首先验证要禁用的SQL配置文件的名称：\n\n```\nSQL> select name, status from dba_sql_profiles;\n\
    ```\n\n以下是部分输出片段：\n\n```\nNAME                           STATUS\n------------------------------\
    \ --------\nSYS_SQLPROF_012eda58a1be0001   ENABLED\n```\n\n现在使用 `DBMS_SQLTUNE.ALTER_SQL_PROFILE`\
    \ 过程将配置文件的状态修改为禁用：\n\n```\nBEGIN\n  DBMS_SQLTUNE.ALTER_SQL_PROFILE(\n    name\
    \ => 'SYS_SQLPROF_012eda58a1be0001',\n    attribute_name => 'STATUS',\n    value\
    \ => 'DISABLED');\nEND;\n/\n```"
  raw: '#### Solution


    Use the `DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER` procedure to enable
    the automatic acceptance of SQL profiles recommended by the Automatic SQL Tuning
    task—for example:


    `BEGIN`

    `DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER(`

    `  parameter => ''ACCEPT_SQL_PROFILES'', value => ''TRUE'');`

    `END;`

    `/`


    If you want to disable the automatic acceptance of SQL profiles, then do so as
    follows (using the `FALSE` parameter):


    `BEGIN`

    `DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER(`

    `  parameter => ''ACCEPT_SQL_PROFILES'', value => ''FALSE'');`

    `END;`

    `/`


    ![images](images/square.jpg) **Note** The `DBMS_AUTO_SQLTUNE` package requires
    the DBA role or that `EXECUTE` on the package has been granted explicitly to a
    user. This package is available in Oracle Database 11g R2 or higher. If you are
    using a lower version of the database, then use the `DBMS_SQLTUNE` package.


    #### How It Works


    In Oracle Database 11g or higher, an automatically configured job runs the SQL
    Tuning Advisor on a periodic basis (determined by a configured maintenance window).
    This job identifies high resource-consuming SQL statements from performance metrics
    contained in the AWR. When the automatic tuning job runs, it will occasionally
    recommend that a SQL profile be implemented for a poorly performing SQL statement.
    Oracle will automatically accept the profile if the following conditions are true:


    *   Automatic acceptance has been configured via `DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER`.

    *   With the SQL profile, the performance gain is determined (by the SQL Tuning
    Advisor) to be at least three times more (than without the profile).


    You can report on the details of the automatic tuning task configuration via this
    query:


    `SELECT`

    ` parameter_name`

    `,parameter_value`

    `FROM dba_advisor_parameters`

    `WHERE task_name = ''SYS_AUTO_SQL_TUNING_TASK''`

    `AND  parameter_name`

    `  IN (''ACCEPT_SQL_PROFILES'',`

    `      ''MAX_SQL_PROFILES_PER_EXEC'',`

    `      ''MAX_AUTO_SQL_PROFILES'',`

    `      ''EXECUTION_DAYS_TO_EXPIRE'');`


    Here is some sample output:


    `PARAMETER_NAME            PARAMETER_VALUE`

    `------------------------- --------------------`

    `EXECUTION_DAYS_TO_EXPIRE  30`

    `ACCEPT_SQL_PROFILES       TRUE`

    `MAX_SQL_PROFILES_PER_EXEC 20`

    `MAX_AUTO_SQL_PROFILES     10000`


    ![images](images/square.jpg) **Tip** SQL profiles that have automatically been
    implemented display the value of `AUTO` in the `TYPE` column of the `DBA_SQL_PROFILES`
    view.


    You can also use Enterprise Manager to configure the automatic acceptance of SQL
    profiles. From the main database page, navigate to the Advisor Central page. Next,
    click the SQL Advisors link. Now click the Automatic SQL Tuning Results page.
    Next click the configure button of Automatic Implementation of SQL Profiles. You
    should see a page similar to [Figure 12-2](#Chapter12.html#fig_12_2).


    ![images](images/1202.jpg)


    ***Figure 12-2.** Configuring automatic acceptance of SQL profiles*


    From this screen, you can manage features such as the automatic acceptance of
    SQL profiles, maximum time for a tuning session, and so on.


    ### 12-3. Displaying SQL Profile Information


    #### Problem


    You have created and accepted several SQL profiles and now want to view information
    related to these database objects.


    #### Solution


    Use the `DBA_SQL_PROFILES` view to display information about SQL profiles. Here''s
    an example that selects the most interesting columns:


    `SQL> select name, type, status, sql_text from dba_sql_profiles;`


    Here is a snippet of the output:


    `NAME                           TYPE    STATUS   SQL_TEXT`

    `------------------------------ ------- -------- ------------------------------`

    `SYS_SQLPROF_012eda58a1be0001   MANUAL  ENABLED  SELECT ecm_snapshot_id AS id...`

    `SYS_SQLPROF_012ea20305980000   MANUAL  ENABLED  SELECT *  FROM inv_maint...`

    `SYS_SQLPROF_012edf0316930003   MANUAL  ENABLED  SELECT /* + parallel(mgmt_db_f...`


    For this database, there are several manually enabled SQL profiles (as shown in
    the prior output).


    ![images](images/square.jpg) **Note** Since a SQL profile is associated with a
    specific SQL statement (and not a user), there are no `ALL`- or `USER`-level views
    associated with SQL profiles.


    #### How It Works


    Recall that a SQL profile contains improvements to existing statistics. The `DBA_SQL_PROFILES`
    view is the best source for viewing the SQL profile name, attributes, and associated
    SQL text.


    To view the internal SQL profile hint-related information, you can additionally
    query the `DBMSHSXP_SQL_PROFILE_ATTR` view—for example:


    `SELECT`

    ` a.name`

    `,b.comp_data`

    `FROM dba_sql_profiles          a`

    `    ,dbmshsxp_sql_profile_attr b`

    `WHERE a.name = b.profile_name;`


    Here is some sample output:


    `SYS_SQLPROF_0130520c90dc0002`

    `<outline_data><hint><![CDATA[OPT_ESTIMATE(@"SEL$2",`

    `NLJ_INDEX_SCAN, "FS"@"SEL$2", ("MAP"@"SEL$2"), "DB_FEAT_OPT_112_SUM_MV_IDX3",`

    `SCALE_ROWS=0.3369001041)]]></h`


    The prior output gives you an indication of the types of hints within a SQL profile.
    This information is used by the optimizer to better estimate the cardinality of
    each execution step. This data allows the optimizer to make better decisions when
    generating an execution plan.


    You can also view this internal SQL profile information by querying the `SQLOBJ$`
    and `SQLOBJ$DATA` views. The data in these views is in XML format, and therefore
    you must format the output with Oracle XML functions when querying—for example:


    `SELECT`

    `  extractvalue(value(a), ''.'') sqlprofile_hints`

    `FROM sqlobj$     o`

    `    ,sqlobj$data d`

    `    ,table(xmlsequence(extract(xmltype(d.comp_data),''/outline_data/hint'')))
    a`

    `WHERE o.name     = ''&&profile_name''`

    `AND   o. plan_id = d.plan_id`

    `AND   o.signature = d.signature`

    `AND   o.category = d.category`

    `AND   o.obj_type = d.obj_type;`


    Here is a small sample of the output:


    `OPT_ESTIMATE(@"SEL$EF0E05FC", INDEX_SCAN, "MGMT_TARGETS"@"SEL$4",`

    `"MIDX3", SCALE_ROWS=50.68489486)`

    `OPT_ESTIMATE(@"SEL$EF0E05FC", NLJ_INDEX_FILTER,`

    `"MGMT_ECM_GEN_SNAPSHOT"@"SEL$3", ("MGMT_TARGETS"@"SEL$4"),`

    `"IDX$$_1197C0001", SCALE_ROWS=0.4308705)`


    Again, these profile statistics don''t force the optimizer to use a certain execution
    plan. Rather these statistics provide the optimizer the flexibility to choose
    a more efficient execution plan.


    ![images](images/square.jpg) **Note** If you''re using Oracle Database 10g, then
    use the `SQLPROF$` and `SQLPROF$ATTR` views.


    ### 12-4\. Disabling a SQL Profile


    #### Problem


    You think that a SQL profile is no longer required for a query. You want to manually
    disable (not drop) the SQL profile.


    #### Solution


    First verify the name of the SQL profile that you want to disable:


    `SQL> select name, status from dba_sql_profiles;`


    Here''s a partial snippet of the output:


    `NAME                           STATUS`

    `------------------------------ --------`

    `SYS_SQLPROF_012eda58a1be0001   ENABLED`


    Now use the `DBMS_SQLTUNE.ALTER_SQL_PROFILE` procedure to modify the status of
    the profile to disabled:


    `BEGIN`

    `  DBMS_SQLTUNE.ALTER_SQL_PROFILE(`

    `    name => ''SYS_SQLPROF_012eda58a1be0001'',`

    `    attribute_name => ''STATUS'',`

    `    value => ''DISABLED'');`

    `END;`

    `/`'
