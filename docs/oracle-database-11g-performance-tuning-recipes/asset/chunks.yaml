  trans: "#### 工作原理\n\n在 SQL 语句中，子查询可以放置在 `SELECT`、`WHERE` 或 `HAVING` 子句中。你也可以将一个查询放在\
    \ `FROM` 子句中，这也被称为内联视图，这将在另一个教程中介绍。可以构造几种类型的子查询：\n\n*   单行或标量子查询\n*   多行子查询\n\
    *   多列子查询\n*   相关子查询（将在另一个教程中介绍）\n\n子查询本身也被称为内部查询。除了相关子查询，内部查询首先被执行，然后其结果被传递给外部查询，之后外部查询再被执行。\n\
    \n##### 单行子查询\n\n单行子查询返回单行单列。“解决方案”部分展示的例子就是一个单行子查询。使用时需谨慎，并确保子查询只返回一个值；否则你可能会遇到如下错误：\n\
    \n```sql\nSELECT last_name, first_name\nFROM employees\nWHERE salary =\n(SELECT\
    \ salary FROM employees WHERE department_id = 30);\n```\n\n```\n(SELECT salary\
    \ FROM employees WHERE department_id = 30)\n *\nERROR at line 4:\nORA-01427: single-row\
    \ subquery returns more than one row\n```\n\n在上面的例子中，部门 30 有多名员工，因此子查询会返回所有匹配的行。\n\
    \n如果你想了解你的薪水与公司员工平均薪水的对比情况，你可以在 `SELECT` 子句中使用一个子查询来实现：\n\n```sql\nSELECT last_name,\
    \ first_name, salary, ROUND((SELECT AVG(salary) FROM employees)) avg_sal\nFROM\
    \ employees\nWHERE last_name = 'King';\n```\n\n```\nLAST_NAME                \
    \ FIRST_NAME               SALARY    AVG_SAL\n------------------------- --------------------\
    \ ---------- ----------\nKing                      Steven                    24000\
    \       6462\n```\n\n假设你想知道哪些部门的总体平均薪资高于公司平均水平。通过将子查询放在 `HAVING` 子句中，你可以获得想要的结果：\n\
    \n```sql\ncolumn avg_sal format 99999.99\n\nSELECT department_id, ROUND(avg(salary),2)\
    \ avg_sal\nFROM employees\nGROUP BY department_id\nHAVING avg(salary) > (SELECT\
    \ AVG(salary) FROM employees)\nORDER BY 2;\n```\n\n```\nDEPARTMENT_ID   AVG_SAV\n\
    ------------- ---------\n           40   6500.00\n          100   8600.00\n  \
    \         80   8955.88\n           20   9500.00\n           70  10000.00\n   \
    \       110  10150.00\n           90  19333.33\n\n8 rows selected.\n```\n\n#####\
    \ 多行子查询\n\n如果你知道期望的子查询将返回多行，你可以使用 `IN`、`ANY`、`ALL` 和 `SOME` 操作符。`IN` 操作符等同于在 `SELECT`\
    \ 语句中使用多个 `OR` 条件。例如，在下面的 SQL 语句中，我们获取部门编号为 20、30 和 40 的部门名称。\n\n```sql\nSELECT\
    \ department_id, department_name\nFROM departments\nWHERE department_id = 20\n\
    OR department_id = 30\nOR department_id = 40;\n```\n\n```\nDEPARTMENT_ID DEPARTMENT_NAME\n\
    ------------- ------------------------------\n           20 Marketing\n      \
    \     30 Purchasing\n           40 Human Resources\n```\n\n使用 `IN` 操作符，我们可以简化\
    \ SQL 语句并达到相同的结果：\n\n```sql\nSELECT department_id, department_name\nFROM departments\n\
    WHERE department_id IN (20,30,40);\n```\n\n`ANY` 和 `SOME` 操作符功能相同。它们用于将从数据库中检索到的值与查询中列出的每个值进行比较。它们与比较操作符\
    \ =、!=、<>、<、<=、> 或 >= 一起使用。使用 `ANY` 或 `SOME` 时需谨慎，因为它会单独评估每个值，而不考虑整个值列表。例如，使用相同的查询来获取部门编号为\
    \ 20、30 或 40 的部门名称，如果我们修改此查询以使用 `ANY` 或 `SOME`，我们可以看到 Oracle 如何评估 `ANY` 子句中的每个值。由于我们使用了\
    \ `ANY` 子句，部门 10、20 和 30 都被包含在结果中，即使部门 20 和 30 在我们的 `ANY` 子句中。这是因为在返回结果集之前，每个值都是被单独评估的。\n\
    \n```sql\nSELECT department_id, department_name\nFROM departments\nWHERE department_id\
    \ < ANY (20,30,40);\n```\n\n```sql\nSELECT department_id, department_name\nFROM\
    \ departments\nWHERE department_id < SOME (20,30,40);\n```\n\n```\nDEPARTMENT_ID\
    \ DEPARTMENT_NAME\n------------- ------------------------------\n           10\
    \ Administration\n           20 Marketing\n           30 Purchasing\n```\n\n`ALL`\
    \ 操作符实质上使用逻辑 `AND` 操作符来比较查询中列出的值。使用 `ANY` 操作符时，每个值都是单独比较以查看是否存在匹配项，而 `ALL` 操作符需要比较列表中的每个值才能确定是否存在匹配项。以我们的部门表为例，请看以下查询。在此查询中，如果\
    \ `DEPARTMENT_ID` 的值小于或等于列表中*所有*值，我们将从表中检索部门名称：\n\n```sql\nSELECT department_id,\
    \ department_name\nFROM departments\nWHERE department_id <= ALL (20,30,40);\n\
    ```\n\n```\nDEPARTMENT_ID DEPARTMENT_NAME\n------------- ------------------------------\n\
    \           10 Administration\n           20 Marketing\n```\n\n##### 多列子查询\n\n\
    有时，你需要根据多个列来匹配数据。如果放置在 `WHERE` 子句中，列列表需要放在括号内。例如，如果你想获取各部门中薪资最高的员工列表，你可以编写一个如下所示的多列子查询：\n\
    \n```sql\nSELECT last_name, first_name, department_id, salary\nFROM employees\n\
    WHERE (department_id, salary) IN\n(SELECT department_id, max(salary)\nFROM employees\n\
    GROUP BY department_id)\nORDER BY department_id;\n```\n\n```\nLAST_NAME      \
    \           FIRST_NAME           DEPARTMENT_ID     SALARY\n-------------------------\
    \ -------------------- ------------- ----------\nWhalen                    Jennifer\
    \                        10       4400\nHartstein                 Michael    \
    \                     20      13000\nRaphaely                  Den           \
    \                  30      11000\nMavris                    Susan            \
    \               40       6500\nFripp                     Adam                \
    \            50       8200\nHunold                    Alexander              \
    \         60       9000\nBaer                      Hermann                   \
    \      70      10000\nRussell                   John                         \
    \   80      14000\nKing                      Steven                          90\
    \      24000\nGreenberg                 Nancy                          100   \
    \   12000\nHiggins                   Shelley                        110      12000\n\
    \n11 rows selected.\n```\n\n### 8-6. 构造相关子查询\n\n#### 问题\n\n你正在编写一个子查询，从数据库中的给定表集中检索数据，但为了获取正确的结果，你确实需要在内部查询中引用外部查询。\n\
    \n#### 解决方案\n\n相关子查询是 SQL 语言的一个强大组成部分。它之所以被称为“相关”的，是因为它允许你在内部查询中引用外部查询。例如，我们想查看每位当前员工在公司中曾经担任过的所有职位：\n\
    \n```sql\nSELECT employee_id, job_id\nFROM job_history h\nWHERE job_id in\n(SELECT\
    \ job_id FROM employees e\nWHERE e.job_id = h.job_id)\nORDER BY 1;\n```\n\n```\n\
    EMPLOYEE_ID JOB_ID\n----------- ----------\n        101 AC_ACCOUNT\n        101\
    \ AC_MGR\n        102 IT_PROG\n        114 ST_CLERK\n        122 ST_CLERK\n  \
    \      176 SA_REP\n        176 SA_MAN\n        200 AD_ASST\n        200 AC_ACCOUNT\n\
    \        201 MK_REP\n\n10 rows selected.\n```"
- fmt: "#### How It Works\n\nBecause you reference the outer query from inside the\
    \ inner query, the process of executing a correlated subquery is essentially the\
    \ opposite compared to a simple subquery. In a correlated subquery, the outer\
    \ query is executed first, as the inner query needs the data from the outer query\
    \ in order to be able to process the query and retrieve the results.\n\nThe steps\
    \ to execute a correlated subquery are as follows. These steps repeat for each\
    \ row in the outer query:\n\n1.  Retrieve row from the outer query.\n2.  Execute\
    \ the inner query.\n3.  The outer query compares the value returned from the inner\
    \ query.\n4.  If there is a value match in step 3, the row is returned to the\
    \ user.\n\nAnother type of correlated subquery is to use the `EXISTS` clause in\
    \ a subquery. When you use `EXISTS`, a test is done to see if the inner query\
    \ returns at least one row. This is the important test that occurs when using\
    \ the `EXISTS` operator. As you can see from the following example, the column\
    \ list of the `SELECT` clause within the inner query is irrelevant. Something\
    \ is included there simply to have proper SQL syntax only. If we want to see which\
    \ of our employees are also managers, we can use the `EXISTS` operator with a\
    \ self-join back to the employees table to determine this information:\n\n```sql\n\
    SELECT employee_id, last_name, first_name\nFROM employees e\nWHERE EXISTS\n(SELECT\
    \ 'ANY LITERAL WILL DO HERE'\nFROM employees m\nWHERE e.employee_id = manager_id);\n\
    ```\n\n```\nEMPLOYEE_ID LAST_NAME                   FIRST_NAME\n----------- -------------------------\
    \ --------------------\n        100 King                        Steven\n     \
    \   101 Kochhar                     Neena\n        102 De Haan               \
    \      Lex\n        103 Hunold                      Alexander\n        108 Greenberg\
    \                   Nancy\n        114 Raphaely                    Den\n     \
    \   120 Weiss                       Matthew\n        121 Fripp               \
    \        Adam\n        122 Kaufling                    Payam\n        123 Vollman\
    \                     Shanta\n        124 Mourgos                     Kevin\n\
    \        145 Russell                     John\n        146 Partners          \
    \          Karen\n        147 Errazuriz                   Alberto\n        148\
    \ Cambrault                   Gerald\n        149 Zlotkey                    \
    \ Eleni\n        201 Hartstein                   Michael\n        205 Higgins\
    \                     Shelley\n\n18 rows selected.\n```\n\nYou can also use `NOT\
    \ EXISTS` if you want to test the opposite condition within a query. For example,\
    \ your CEO wants to determine the manager-to-employee ratio within your company.\
    \ Using the query from the previous example, we can first use the `EXISTS` operator\
    \ to determine the number of managers within the company:\n\n```sql\nSELECT count(*)\n\
    FROM employees e\nWHERE EXISTS\n(SELECT 'TESTING 1,2,3'\nFROM employees m\nWHERE\
    \ e.employee_id = manager_id);\n```\n\n```\n  COUNT(*)\n----------\n        18\n\
    ```\n\nIf we convert `EXISTS` to `NOT EXISTS`, we can determine the number of\
    \ non-managers within the company:\n\n```sql\nSELECT count(*)\nFROM employees\
    \ e\nWHERE NOT EXISTS\n(SELECT 'X'\nFROM employees m\nWHERE e.employee_id = manager_id);\n\
    ```\n\n```\n COUNT(*)\n---------\n       89\n```\n\n### 8-7. Comparing Two Tables\
    \ to Finding Missing Rows\n\n#### Problem\n\nYou need to compare data for a subset\
    \ of columns between two tables. You need to find rows in one table that are missing\
    \ from the other.\n\n#### Solution\n\nYou can use the Oracle `MINUS` set operator\
    \ to compare two sets of data, and show data missing from one of the tables. When\
    \ using any of the Oracle set operators, the `SELECT` clauses must be identical\
    \ in terms of number of columns, and the datatypes of each column.\n\nAs an example,\
    \ you work for a cable television company, and you want to find out what channels\
    \ are offered free of charge. To test this out, you could first simply get a list\
    \ of the channels offered by your company:\n\n```sql\nSELECT channel_id FROM channels;\n\
    ```\n\n```\nCHANNEL_ID\n----------\n         2\n         3\n         4\n     \
    \    5\n         9\n```\n\nThen, you can run a query to find out which channels\
    \ have costs associated with them by querying the `COSTS` table:\n\n```sql\nSELECT\
    \ DISTINCT channel_id FROM costs\nORDER BY channel_id;\n```\n\n```\nCHANNEL_ID\n\
    ----------\n         2\n         3\n         4\n```\n\nBy quickly doing a visual\
    \ examination of the results, the free channels are channels 5 and 9. By using\
    \ a set operator, in this case, `MINUS`, you can get this result from a single\
    \ query:\n\n```sql\nSELECT channel_id\nFROM channels\nMINUS\nSELECT channel_id\n\
    FROM costs;\n```\n\n```\nCHANNEL_ID\n----------\n         5\n         9\n```\n\
    \n#### How It Works\n\nIt is also very common to use set operators in queries\
    \ to get more information about the missing data. For instance, you have gotten\
    \ the free channel list, but you really need to get more information about those\
    \ free channels, and would like to accomplish everything within a single query:\n\
    \n```sql\nSELECT channel_id, channel_desc FROM channels\nWHERE channel_id IN\n\
    (SELECT channel_id\nFROM channels\nMINUS\nSELECT channel_id\nFROM costs);\n```\n\
    \n```\nCHANNEL_ID CHANNEL_DESC\n---------- --------------------\n         5 Catalog\n\
    \         9 Tele Sales\n```\n\n### 8-8. Comparing Two Tables to Finding Matching\
    \ Rows\n\n#### Problem\n\nYou need to compare data for a subset of columns between\
    \ two tables. You need to see all matching rows from those tables.\n\n#### Solution\n\
    \nYou can use the Oracle `INTERSECT` set operator to compare two sets of data,\
    \ and show the matching data between the two tables. Again, when using any of\
    \ the Oracle set operators, the `SELECT` clauses must be identical in terms of\
    \ number of columns, and the datatypes of each column.\n\nUsing the example of\
    \ the free channels, we now want to see which channels are not free, and have\
    \ costs associated with them. By using the `INTERSECT` set operator, we will see\
    \ only the matching rows between the two tables:\n\n```sql\nSELECT channel_id\n\
    FROM channels\nINTERSECT\nSELECT channel_id\nFROM costs;\n```\n\n```\nCHANNEL_ID\n\
    ----------\n         2\n         3\n         4\n```\n\n#### How It Works\n\nWhen\
    \ using `INTERSECT`, think of it as the overlapping data between two tables, based\
    \ on the column list in the `SELECT` statement.\n\n### 8-9. Combining Results\
    \ from Similar SELECT Statements\n\n#### Problem\n\nYou need to combine the results\
    \ between two similar `SELECT` statements, and would like to accomplish it within\
    \ a single query.\n\n#### Solution\n\nYou can use the Oracle set operators `UNION`\
    \ or `UNION ALL` to combine results from two like queries. The difference between\
    \ using `UNION` and `UNION ALL` is that `UNION` will automatically eliminate any\
    \ duplicate rows, and each row of the result set will be unique. When using `UNION\
    \ ALL`, it will show all matching rows, including duplicate rows. Using `UNION\
    \ ALL` may yield better performance than `UNION`, because a sort to eliminate\
    \ duplicates is avoided. If your application can eliminate duplicates during processing,\
    \ it may be worth the performance gained from using `UNION ALL`.\n\nIn Oracle's\
    \ sample schemas, we have the `SCOTT.EMP` table and the `HR.EMPLOYEES` table.\
    \ If we want to see all the employees on both tables, we can use a `UNION` set\
    \ operator to get the results:\n\n```sql\nSELECT empno, hiredate FROM scott.emp\n\
    UNION\nSELECT employee_id, hire_date FROM hr.employees;\n```\n\n```\n     EMPNO\
    \ HIREDATE\n---------- ---------\n       100 17-JUN-87\n       101 21-SEP-89\n\
    \       102 13-JAN-93\n       ...\n      7902 03-DEC-81\n      7934 23-JAN-82\n\
    \      7997 15-AUG-11\n\n122 rows selected.\n```"
  raw: '#### How It Works


    Because you reference the outer query from inside the inner query, the process
    of executing a correlated subquery is essentially the opposite compared to a simple
    subquery. In a correlated subquery, the outer query is executed first, as the
    inner query needs the data from the outer query in order to be able to process
    the query and retrieve the results.  The steps to execute a correlated subquery
    are as follows. These steps repeat for each row in the outer query:


    1.  Retrieve row from the outer query.

    2.  Execute the inner query.

    3.  The outer query compares the value returned from the inner query.

    4.  If there is a value match in step 3, the row is returned to the user.


    Another type of correlated subquery is to use the `EXISTS` clause in a subquery.
    When you use `EXISTS`, a test is done to see if the inner query returns at least
    one row. This is the important test that occurs when using the `EXISTS` operator.
    As you can see from the following example, the column list of the `SELECT` clause
    within the inner query is irrelevant. Something is included there simply to have
    proper SQL syntax only. If we want to see which of our employees are also managers,
    we can use the `EXISTS` operator with a self-join back to the employees table
    to determine this information:


    `SELECT employee_id, last_name, first_name`

    `FROM employees e`

    **`WHERE EXISTS`**

    `(SELECT ''ANY LITERAL WILL DO HERE''`

    `FROM employees m`

    `WHERE e.employee_id = manager_id);`


    `EMPLOYEE_ID LAST_NAME                 FIRST_NAME`

    `----------- ------------------------- --------------------`

    `        100 King                      Steven`

    `        101 Kochhar                   Neena`

    `        102 De Haan                   Lex`

    `        103 Hunold                    Alexander`

    `        108 Greenberg                 Nancy`

