  trans: '# 多表查询时的联接提示


    如果您正在联接多个表，并希望在查询中为所有关联表调用特定的联接方法，则必须为每个联接条件添加一个提示——例如：


    ```sql

    SELECT /*+ use_hash(employees, department) use_hash(departments, locations)  */

    last_name, first_name, department_name,  city, state_province

    FROM employees JOIN departments USING (department_id)

    JOIN locations USING (location_id);

    ```


    ```

    -----------------------------------------------------

    | Id  | Operation               | Name              |

    -----------------------------------------------------

    |   0 | SELECT STATEMENT        |                   |

    |   1 |  HASH JOIN              |                   |

    |   2 |   HASH JOIN             |                   |

    |   3 |    TABLE ACCESS FULL    | LOCATIONS         |

    |   4 |    TABLE ACCESS FULL    | DEPARTMENTS       |

    |   5 |   VIEW                  | index$_join$_001  |

    |   6 |    HASH JOIN            |                   |

    |   7 |     INDEX FAST FULL SCAN| EMP_NAME_IX       |

    |   8 |     INDEX FAST FULL SCAN| EMP_DEPARTMENT_IX |

    -----------------------------------------------------

    ```


    ## 工作原理


    表 14-2 总结了可用于不同联接方法的各种提示。有时，由于以下几个因素，需要使用提示来指示优化器选择联接方法：


    *   表上统计信息的状态

    *   PGA 的大小

    *   数据在联接时是否已排序

    *   优化器做出了无法解释的选择


    Oracle 建议尽可能不使用提示，因为随着时间的推移，在某一时刻、某种环境、某一数据库软件版本下最优的选择，下次可能就不再是最优的。然而，有时这些提示对于满足短期需求非常有帮助，或者可能是让优化器按照您意愿行事的唯一方法。


    ![images](img/t1402.jpg)


    ![images](img/square.jpg) **提示** 您的 PGA 大小会影响优化器为查询选择的联接方法。


    ## 14-5. 更改优化器版本


    ### 问题


    您已升级到较新版本的 Oracle，并且遇到了与较新版本 Oracle 相关的查询性能问题。该问题仅限于少数查询，因此您希望在这些查询中放置一个提示，以使用先前版本的优化器规则和功能。


    ### 解决方案


    为了为给定查询指定优化器版本，您需要在 `optimizer_features_enable` 提示中指定您期望的优化器版本。在括号内，用单引号括起所需的数据库版本。


    ```sql

    SELECT /*+ optimizer_features_enable(''10.2'') */ *

    FROM EMP JOIN DEPT USING(DEPTNO);

    ```


    此方法主要用作升级后立即提高性能的临时措施，直到可以进行分析并找到针对查询和升级后数据库版本的解决方案。


    ### 工作原理


    您可以修改给定查询的优化器版本。这可以通过 `optimizer_features_enable` 提示完成，并且仅对给定查询生效。使用此提示的主要原因是，在某个特定
    Oracle 版本下表现良好的查询，在 Oracle 数据库版本升级后性能立即下降。


    有一个 Oracle 初始化参数 `optimizer_features_enable`，可以为整个数据库实例更改它。如果您在升级数据库后立即遇到查询性能问题广泛发生，这是一个可选方案。然而，在数据库实例级别更改此参数通常并不可行，甚至并不理想，因为升级的主要原因是为了利用新特性。因此，除非存在重大且广泛的性能问题，否则不建议为整个数据库实例更改
    `optimizer_features_enable` 参数。


    如果您有一个特定的查询或一小部分关键查询在升级后性能不达标，一个快速恢复到升级前性能的方法是使用 `optimizer_features_enable` 提示，为给定查询指向特定版本的优化器。


    ## 14-6. 在快速响应与全局优化之间选择


    ### 问题


    执行查询时，您可以在两个目标之间做出选择：


    *   *快速初始响应*：尽快开始返回部分行。

    *   *全局优化*：以牺牲前期处理时间为代价，最小化总体成本。


    您的实例会为其配置一个默认目标。您可以按查询指定提示，以覆盖默认目标，并为特定查询获得所需的行为。


    ### 解决方案


    有些提示可用于覆盖数据库实例的优化目标。在使用与 `optimizer_mode` 相关的任何提示之前，您首先需要确认数据库实例当前的设置。如果您拥有 `SELECT
    ANY DICTIONARY` 系统权限，可以查看 `optimizer_mode` 参数的设置值。


    ```sql

    SQL> show parameter optimizer_mode


    NAME                 TYPE        VALUE

    -------------------- -------------------- --------------------

    optimizer_mode       string      ALL_ROWS

    ```


    如果我们为示例查询运行执行计划，我们可以看到使用数据库实例默认 `optimizer_mode` 设置时的执行计划。


    ```sql

    SELECT *

    FROM employees NATURAL JOIN departments;

    ```


    ```

    ------------------------------------------

    | Id  | Operation          | Name        |

    ------------------------------------------

    |   0 | SELECT STATEMENT   |             |

    |   1 |  HASH JOIN         |             |

    |   2 |   TABLE ACCESS FULL| DEPARTMENTS |

    |   3 |   TABLE ACCESS FULL| EMPLOYEES   |

    ------------------------------------------

    ```


    由于上述查询对表进行了全表扫描，而我们希望尽快看到一些行（但不一定是完整的结果集），我们可以传入一个 `FIRST_ROWS` 提示来完成此任务。很明显，这改变了优化器的执行计划以便尽快提供结果。


    ```sql

    SELECT /*+ first_rows */ *

    FROM employees NATURAL JOIN departments;

    ```


    ```

    ----------------------------------------------------

    | Id  | Operation                    | Name        |

    ----------------------------------------------------

    |   0 | SELECT STATEMENT             |             |

    |   1 |  NESTED LOOPS                |             |

    |   2 |   NESTED LOOPS               |             |

    |   3 |    TABLE ACCESS FULL         | EMPLOYEES   |

    |   4 |    INDEX UNIQUE SCAN         | DEPT_ID_PK  |

    |   5 |   TABLE ACCESS BY INDEX ROWID| DEPARTMENTS |

    ----------------------------------------------------

    ```


    如果我们需要相反的情况，并且数据库的默认 `optimizer_mode` 设置为 `FIRST_ROWS`，我们可以提供一个 `ALL_ROWS` 提示来告诉优化器在确定执行计划时使用该模式：


    ```sql

    SQL> alter system set optimizer_mode=first_rows scope=both;


    System altered.


    SQL> show parameter optimizer_mode


    NAME                 TYPE        VALUE

    -------------------- -------------------- --------------------

    optimizer_mode       string      FIRST_ROWS

    ```


    ```sql

    SELECT /*+ all_rows */ *

    FROM employees NATURAL JOIN departments;

    ```


    ```

    ------------------------------------------

    | Id  | Operation          | Name        |

    ------------------------------------------

    |   0 | SELECT STATEMENT   |             |

    |   1 |  HASH JOIN         |             |

    |   2 |   TABLE ACCESS FULL| DEPARTMENTS |

    |   3 |   TABLE ACCESS FULL| EMPLOYEES   |

    ------------------------------------------

    ```'
- fmt: '## How It Works


    快速、初始响应的目标通常是用户等待结果时的良好选择。它使数据库引擎做出选择，允许行几乎立即从查询中返回。例如，为初始响应进行优化通常会产生一个嵌套循环连接，因为这样的连接可以从一开始就返回行。代价可能是更长的总体执行时间。


    降低总体查询成本的目标通常是批处理过程的不错选择。没有真实的、人类用户在等待结果，因此可以接受在初始处理上花费更多时间以减少总体查询成本。一个例子可能是执行哈希连接，它在连接完成之前不能开始返回行，但其总执行时间可能比嵌套循环连接更短。


    可以在查询中使用 `FIRST_ROWS` 或 `ALL_ROWS` 提示来更改优化器模式，该模式控制前述两个目标中哪一个应用于给定的查询。


    要检查数据库实例当前的优化器模式，请检查 `optimizer_mode` 初始化参数的值。通过指定优化器目标提示，它可以覆盖数据库实例级别设置的优化器模式，以及会话级别的任何设置。


    `FIRST_ROWS` 提示非常流行，因为它可以快速从查询返回第一个可能的行。`FIRST_ROWS` 提示也很常见，因为 `ALL_ROWS` 是 `optimizer_mode`
    参数的默认值。因此，通常不需要指定 `ALL_ROWS`。


    ## 14-7. Performing a Direct-Path Insert


    ### Problem


    你正在执行一个 DML `INSERT` 语句，其执行速度比所需慢。你希望优化 `INSERT` 语句以使用直接路径插入技术。


    ### Solution


    通过使用 `APPEND` 或 `APPEND_VALUES` 提示，你可以显著加快在数据库上执行插入操作的过程。以下是使用 `APPEND` 提示节省性能的示例。首先，我们有一个在两个表之间执行常规插入的查询：


    ```sql

    INSERT INTO emp_dept

    SELECT * FROM emp_ctas_new;

    ```


    ```

    19753072 rows created.


    Elapsed: 00:01:17.86

    -------------------------------------------------

    | Id  | Operation                | Name         |

    -------------------------------------------------

    |   0 | INSERT STATEMENT         |              |

    |   1 |  LOAD TABLE CONVENTIONAL | EMP_DEPT     |

    |   2 |   TABLE ACCESS FULL      | EMP_CTAS_NEW |

    -------------------------------------------------

    ```


    如果在相同的 `INSERT` 语句中放置 `APPEND` 提示，我们会看到性能上的显著提升：


    ```sql

    INSERT /*+ append */ INTO emp_dept

    SELECT * FROM emp_ctas_new;

    ```


    ```

    19753072 rows created.


    Elapsed: 00:00:12.15

    -------------------------------------------

    | Id  | Operation          | Name         |

    -------------------------------------------

    |   0 | INSERT STATEMENT   |              |

    |   1 |  LOAD AS SELECT    | EMP_DEPT     |

    |   2 |   TABLE ACCESS FULL| EMP_CTAS_NEW |

    -------------------------------------------

    ```


    `APPEND` 提示仅适用于带有子查询的 `INSERT` 语句；它不适用于带有 `VALUES` 子句的 `INSERT` 语句。对于后者，你需要使用
    `APPEND_VALUES` 提示。以下是两个带有 `VALUES` 子句的 `INSERT` 语句示例，我们可以看到提示对执行计划的影响：


    ```sql

    INSERT INTO emp_dept

    VALUES (15867234,''Smith, JR'',''Sales'',1359,''2010-01-01'',200,5,20);

    ```


    ```

    ---------------------------------------------

    | Id  | Operation                | Name     |

    ---------------------------------------------

    |   0 | INSERT STATEMENT         |          |

    |   1 |  LOAD TABLE CONVENTIONAL | EMP_DEPT |

    ---------------------------------------------

    ```


    ```sql

    INSERT /*+ append_values */ INTO emp_dept

    VALUES (15867234,''Smith, JR'',''Sales'',1359,''2010-01-01'',200,5,20);

    ```


    ```

    -------------------------------------

    | Id  | Operation        | Name     |

    -------------------------------------

    |   0 | INSERT STATEMENT |          |

    |   1 |  LOAD AS SELECT  | EMP_DEPT |

    |   2 |   BULK BINDS GET |          |

    -------------------------------------

    ```


    ### How It Works


    `APPEND` 提示在从另一个表执行 DML 插入操作的语句中工作，即，在 `INSERT SQL` 语句中使用子查询。这适用于需要在表之间复制大量行的情况。通过绕过
    Oracle 数据库缓冲区缓存块并将数据直接追加到段高水位标记之上，它节省了大量开销。这是一种非常流行的快速向表中插入行的方法。


    当你指定这些提示之一时，Oracle 将执行直接路径插入。在直接路径插入中，数据被追加到表的末尾，而不是使用在该表当前分配块内找到的空闲空间。`APPEND`
    和 `APPEND_VALUES` 提示在使用时，会自动将常规插入操作转换为直接路径插入操作。此外，如果你在插入期间使用并行操作，默认的操作模式是使用直接路径模式。如果你想绕过直接路径操作，可以使用
    `NOAPPEND` 提示。


    请记住，如果你正在使用这些提示运行，当多个应用程序进程向同一个表插入行时，存在争用的风险。如果两个追加操作同时插入行，性能将会下降，因为插入追加操作在段的高水位标记之上追加数据，一次只应执行一个操作。但是，如果你有分区对象，只要每个插入操作在给定表的不同分区上运行，你仍然可以运行多个并发的追加操作。


    ## 14-8. Placing Hints in Views


    ### Problem


    你正在创建一个视图，并希望在该视图的查询中放置一个提示，以提高访问该视图的任何查询的性能。'
  raw: '#### How It Works


    The fast, initial response goal is often a good choice for queries when a user
    is awaiting results. It causes the database engine to make choices that allow
    rows to begin coming back from the query almost immediately. For example, optimizing
    for initial response often results in a nested loops join, because such a join
    can begin returning rows from the very beginning. The trade-off is possibly a
    longer overall execution time.


    The goal of reducing overall query cost is usually a good choice for batch processes.
    No live, human user is awaiting results, so it is acceptable to spend more time
    on upfront processing in order to reduce overall query cost. An example might
    be to execute a hash join, which can''t begin returning rows until the join is
    done, but which might execute in less overall time than a nested loops join.


    You can use either the `FIRST_ROWS` or the `ALL_ROWS` hint in your query in order
    to change the optimizer mode, which controls which of the preceding two goals
    applies to a given query.


    To check what the current optimizer mode is for your database instance, check
    the value of the `optimizer_mode` initialization parameter. By specifying an optimizer
    goal hint, it overrides the optimizer mode set at the database instance level,
    as well as any settings at the session level.


    The `FIRST_ROWS` hint is very popular, as it can quickly return the first possible
    rows back from a query. The `FIRST_ROWS` hint is also very common because `ALL_ROWS`
    is the default value for the `optimizer_mode` parameter. It''s thus unusual to
    need to specify `ALL_ROWS`.


    ### 14-7\. Performing a Direct-Path Insert


    #### Problem


    You are doing a DML `INSERT` statement, and it is performing slower than needed.
    You want to optimize the `INSERT` statement to use a direct-path insert technique.


    #### Solution


    By using the `APPEND` or `APPEND_VALUES` hint, you can significantly speed up
    the process of performing an insert operation on the database. Here is an example
    of the performance savings using the `APPEND` hint. First, we have a query that
    does a conventional insert between two tables:


    `INSERT INTO emp_dept`

    `SELECT * FROM emp_ctas_new;`


    `19753072 rows created.`


    **`Elapsed: 00:01:17.86`**


    `-------------------------------------------------`

    `| Id  | Operation                | Name         |`

    `-------------------------------------------------`

    `|   0 | INSERT STATEMENT         |              |`

    `|   1 |  LOAD TABLE CONVENTIONAL | EMP_DEPT     |`

    `|   2 |   TABLE ACCESS FULL      | EMP_CTAS_NEW |`

    `-------------------------------------------------`


    If we place the `APPEND` hint inside of the same `INSERT` statement, we see a
    considerable gain in performance:


    `INSERT /*+ append */ INTO emp_dept`

    `SELECT * FROM emp_ctas_new;`


    `19753072 rows created.`


    **`Elapsed: 00:00:12.15`**


    `-------------------------------------------`

    `| Id  | Operation          | Name         |`

    `-------------------------------------------`

    `|   0 | INSERT STATEMENT   |              |`

    `|   1 |  LOAD AS SELECT    | EMP_DEPT     |`

    `|   2 |   TABLE ACCESS FULL| EMP_CTAS_NEW |`

    `-------------------------------------------`


    The `APPEND` hint works with an `INSERT` statement only with a subquery; it does
    not work with an `INSERT` statement with a `VALUES` clause. For that, you need
    to use the `APPEND_VALUES` hint. Here are two examples of an `INSERT` statement
    with a `VALUES` clause, and we can see the effect the hint has on the execution
    plan:


    `INSERT INTO emp_dept`

    `VALUES (15867234,''Smith, JR'',''Sales'',1359,''2010-01-01'',200,5,20);`


    `---------------------------------------------`

    `| Id  | Operation                | Name     |`

    `---------------------------------------------`

    `|   0 | INSERT STATEMENT         |          |`

    `|   1 |  LOAD TABLE CONVENTIONAL | EMP_DEPT |`

    `---------------------------------------------`


    `INSERT /*+ append_values */ INTO emp_dept`

    `VALUES (15867234,''Smith, JR'',''Sales'',1359,''2010-01-01'',200,5,20);`


    `-------------------------------------`

    `| Id  | Operation        | Name     |`

    `-------------------------------------`

    `|   0 | INSERT STATEMENT |          |`

    `|   1 |  LOAD AS SELECT  | EMP_DEPT |`

    `|   2 |   BULK BINDS GET |          |`

    `-------------------------------------`


    #### How It Works


    The `APPEND` hint works within statements performing DML insert operations from
    another table, that is, using a subquery from within an `INSERT SQL` statement.
    This is appropriate for when you need to copy a large volume of rows between tables.
    By bypassing the Oracle database buffer cache blocks and appending the data directly
    to the segment above the high water mark, it saves significant overhead. This
    is a very popular method for inserting rows into a table very quickly.


    When you specify one of these hints, Oracle will perform a direct-path insert.
    In a direct-path insert, the data is appended at the end of a table, rather than
    using free space that is found within current allocated blocks for that table.
    The `APPEND` and `APPEND_VALUES` hints, when used, automatically convert a conventional
    insert operation into a direct-path insert operation. In addition, if you are
    using parallel operations during an insert, the default mode of operation is to
    use the direct-path mode. If you want to bypass performing direct-path operations,
    you can use the `NOAPPEND` hint.


    Keep in mind that if you are running with either of these hints, there is a risk
    of contention if you have multiple application processes inserting rows into the
    same table. If two append operations are inserting rows at the same time, performance
    will suffer, as since the insert append operation appends the data above the high
    water mark for a segment, only one operation should be done at one time. However,
    if you have partitioned objects, you can still run several concurrent append operations,
    as long as each insert operates on separate partitions for a given table.


    ### 14-8\. Placing Hints in Views


    #### Problem


    You are creating a view, and want to place a hint in the view''s query in order
    to improve performance on any queries that access the view.'
