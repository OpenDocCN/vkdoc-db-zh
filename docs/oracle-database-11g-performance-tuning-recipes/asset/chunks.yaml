    \n您绝不应该再使用字典管理的表空间；而应使用本地管理的表空间。本地管理的表空间使用每个数据文件中的位图来管理对象的区和空闲空间，比已弃用的字典管理架构高效得多。\n\
    \n在早期的 Oracle 版本中，数据库管理员需要花费大量时间监控和修改表的物理空间管理方面。本地管理与自动段空间管理的结合使得许多此类空间设置变得过时。例如，在本地管理的表空间中，以下存储参数是无效的：\n\
    \n*   `NEXT`\n*   `PCTINCREASE`\n*   `MINEXTENTS`\n*   `MAXEXTENTS`\n*   `DEFAULT`\n\
    \n`SEGMENT SPACE MANAGEMENT AUTO` 子句指示 Oracle 管理块内的物理空间。使用此子句时，无需再指定诸如以下的参数：\n\
    \n*   `PCTUSED`\n*   `FREELISTS`\n*   `FREELIST GROUPS`\n\n与 `AUTO` 空间管理对应的是 `MANUAL`\
    \ 空间管理。使用 `MANUAL` 时，您可以根据应用程序的需求调整前面提到的参数。我们建议您使用 `AUTO`（而不要使用 `MANUAL`）。使用 `AUTO`\
    \ 可以减少您原本需要配置和管理的参数数量。您可以通过以下查询来验证是否使用了本地管理和 ASSM：\n\n```sql\nselect\n tablespace_name\n\
    ,extent_management\n,segment_space_management\nfrom dba_tablespaces;\n```\n\n\
    以下是一些示例输出：\n\n```sql\nTABLESPACE_NAME                EXTENT_MAN SEGMENT\n------------------------------\
    \ ---------- -------\nSYSTEM                         LOCAL      MANUAL\nSYSAUX\
    \                         LOCAL      AUTO\nUNDOTBS1                       LOCAL\
    \      MANUAL\nTEMP                           LOCAL      MANUAL\nUSERS       \
    \                   LOCAL      AUTO\nTOOLS                          LOCAL    \
    \  AUTO\n```\n\n![images](img/square.jpg) **注意** 您无法使用自动段空间管理来创建 `SYSTEM` 表空间。此外，ASSM\
    \ 功能仅对永久的、本地管理的表空间有效。\n\n您还可以指定数据文件在变满时自动增长。这是通过 `AUTOEXTEND ON` 子句设置的。如果您使用此功能，我们建议您为数据文件设置一个总体的最大大小。这将防止失控或错误的\
    \ SQL 意外消耗所有可用的磁盘空间。以下是一个示例子句：\n\n```sql\nSIZE 1G AUTOEXTEND ON MAXSIZE 10G\n\
    ```\n\n在创建表空间时，您还可以指定表空间类型为 `smallfile` 或 `bigfile`。在 Oracle Database 10g 之前，`smallfile`\
    \ 是唯一的选择。`smallfile` 表空间允许您为一个表空间关联一个或多个数据文件。这使您可以将（与一个表空间关联的）数据文件分散在许多不同的挂载点上。对于许多环境来说，这种灵活性是必需的。\n\
    \n`bigfile` 表空间只能关联一个数据文件。`bigfile` 功能的主要优点是您可以创建非常大的数据文件，这反过来又允许您创建非常大的数据库。例如，使用\
    \ 8 KB 块大小，您可以创建最大 32 TB 的数据文件。使用 32 KB 块大小，您可以创建最大 128 TB 的数据文件。此外，使用 `bigfile`\
    \ 时，通常需要管理和维护的数据文件更少。在您使用 Oracle 自动存储管理功能的环境中，这种行为可能是理想的。在 ASM 环境中，通常只呈现一个逻辑磁盘位置供您分配空间。\n\
    \n以下是创建 `bigfile` 表空间的示例：\n\n```sql\ncreate bigfile tablespace tools_bf\n  datafile\
    \ '/ora01/dbfile/O11R2/tools_bf01.dbf'\n  size 100m\n  extent management local\n\
    \  uniform size  128k\n  segment space management auto\n/\n```\n\n您可以通过此查询验证表空间类型：\n\
    \n```sql\nSQL> select tablespace_name, bigfile from dba_tablespaces;\n```\n\n\
    除非特别指定，默认的表空间类型是 `smallfile`。当您创建数据库时，可以通过 `SET DEFAULT BIGFILE TABLESPACE` 子句将\
    \ `bigfile` 设为该数据库的默认表空间类型。您可以使用 `ALTER DATABASE SET DEFAULT BIGFILE TABLESPACE`\
    \ 语句将数据库的默认表空间类型更改为 `bigfile`。\n\n### 1-3. 将表类型与业务需求相匹配\n\n#### 问题\n\n您刚接触 Oracle，并已了解可用的各种表类型。例如，您可以在堆组织表、索引组织表等之间选择。您想要构建一个数据库应用程序，并需要决定使用哪种表类型。\n\
    \n#### 解决方案\n\nOracle 提供了多种表类型。默认的表类型是堆组织的。对于大多数应用程序，堆组织表是存储和检索数据的有效结构。然而，还有其他您应该了解的表类型，并且您应该知道在什么情况下应实现每种表类型。表\
    \ 1-1 描述了每种表类型及其适用场景。\n\n![images](img/t0101.jpg)\n\n![images](img/t0101a.jpg)\n\
    \n#### 工作原理\n\n在大多数场景下，堆组织表足以满足您的需求。这种 Oracle 表类型是一种经过验证的结构，广泛应用于各种数据库环境。如果您正确设计了数据库（规范化结构）并结合适当的索引和约束，结果应该是一个性能良好且易于维护的系统。\n\
    \n通常，您的大部分表都将是堆组织的。但是，如果您需要利用非堆功能（并确信其益处），那么当然可以这样做。例如，Oracle 分区是构建超大表和索引的一种可扩展方式。物化视图是聚合和复制数据的可靠功能。索引组织表是高效的结构，当大多数列是主键的一部分时（如多对多关系中的连接表），非常适用。等等。\n\
    \n![images](img/square.jpg) **注意**  您不应仅仅因为认为某个功能很酷或最近刚听说就选择一种表类型。有时，人们了解到某个功能后，就在不知道其性能收益或维护成本的情况下决定实施它。您应该首先能够测试并证明该功能确实具有切实的性能优势。\n\
    \n### 1-4. 为性能选择表功能\n\n#### 问题\n\n在创建表时，您希望实现能最大化性能、可扩展性和可维护性的适当数据类型和约束。\n\n####\
    \ 解决方案\n\n在创建表时，有几个性能和可持续性问题需要考虑。表 1-2 描述了与表性能相关的特定功能。\n\n![images](img/t0102.jpg)\n\
    \n![images](img/t0102a.jpg)\n\n#### 工作原理\n\n“解决方案”部分描述了与性能相关的表特性。在创建表时，您还应该考虑增强可扩展性和可用性的功能。通常，数据库管理员和开发人员并不认为这些功能是提高性能的方法。然而，构建一个稳定且可支持的数据库与良好的性能是相辅相成的。表\
    \ 1-3 描述了促进表管理便利性的最佳实践功能。\n\n![images](img/t0103.jpg)\n\n![images](img/t0103a.jpg)\n\
    \n### 1-5. 避免创建表时的区分配延迟"
- fmt: "## Deferred Segment Allocation\n\n#### Problem\n\nYou're installing an application\
    \ that has thousands of tables and indexes. Each table and index are configured\
    \ to initially allocate an initial extent of 10 MB. When deploying the installation\
    \ DDL to your production environment, you want install the database objects as\
    \ fast as possible. You realize it will take some time to deploy the DDL if each\
    \ object allocates 10 MB of disk space as it is created. You wonder if you can\
    \ somehow instruct Oracle to defer the initial extent allocation for each object\
    \ until data is actually inserted into a table.\n\n#### Solution\n\nThe only way\
    \ to defer the initial segment generation is to use Oracle Database 11g R2. With\
    \ this version of the database (or higher), by default the physical allocation\
    \ of the extent for a table (and associated indexes) is deferred until a record\
    \ is first inserted into the table. A small example will help illustrate this\
    \ concept. First a table is created:\n\n```\nSQL> create table f_regs(reg_id number,\
    \ reg_name varchar2(200));\n```\n\nNow query `USER_SEGMENTS` and `USER_EXTENTS`\
    \ to verify that no physical space has been allocated:\n\n```\nSQL> select count(*)\
    \ from user_segments where segment_name='F_REGS';\n  COUNT(*)\n----------\n  \
    \       0\n\nSQL> select count(*) from user_extents where segment_name='F_REGS';\n\
    \  COUNT(*)\n----------\n         0\n```\n\nNext a record is inserted, and the\
    \ prior queries are run again:\n\n```\nSQL> insert into f_regs values(1,'BRDSTN');\n\
    \n1 row created.\n\nSQL>> select count(*) from user_segments where segment_name='F_REGS';\n\
    \ COUNT(*)\n----------\n         1\n\nSQL> select count(*) from user_extents where\
    \ segment_name='F_REGS';\n  COUNT(*)\n----------\n         1\n```\n\nThe prior\
    \ behavior is quite different from previous versions of Oracle. In prior versions,\
    \ as soon as you create an object, the segment and associated extent are allocated.\n\
    \n![images](images/square.jpg) Note: Deferred segment generation also applies\
    \ to partitioned tables and indexes. An extent will not be allocated until the\
    \ initial record is inserted into a given extent.\n\n#### How It Works\n\nStarting\
    \ with Oracle Database 11g R2, with non-partitioned heap-organized tables created\
    \ in locally managed tablespaces, the initial segment creation is deferred until\
    \ a record is inserted into the table. You need to be aware of Oracle's deferred\
    \ segment creation feature for several reasons:\n\n*   Allows for a faster installation\
    \ of applications that have a large number of tables and indexes; this improves\
    \ installation speed, especially when you have thousands of objects.\n*   As a\
    \ DBA, your space usage reports may initially confuse you when you notice that\
    \ there is no space allocated for objects.\n*   The creation of the first row\
    \ will take a slightly longer time than in previous versions (because now Oracle\
    \ allocates the first extent based on the creation of the first row). For most\
    \ applications, this performance degradation is not noticeable.\n\nWe realize\
    \ that to take advantage of this feature the only “solution” is to upgrade to\
    \ Oracle Database 11g R2, which is oftentimes not an option. However, we felt\
    \ it was important to discuss this feature because you'll eventually encounter\
    \ the aforementioned characteristics (when you start using the latest release\
    \ of Oracle).\n\nYou can disable the deferred segment creation feature by setting\
    \ the database initialization parameter `DEFERRED_SEGMENT_CREATION` to `FALSE`.\
    \ The default for this parameter is `TRUE`.\n\nYou can also control the deferred\
    \ segment creation behavior when you create the table. The `CREATE TABLE` statement\
    \ has two new clauses: `SEGMENT CREATION IMMEDIATE` and `SEGMENT CREATION DEFERRED`—for\
    \ example:\n\n```\ncreate table f_regs(\n reg_id number\n,reg_name varchar2(2000))\n\
    segment creation immediate;\n```\n\n![images](images/square.jpg) Note: The `COMPATIBLE`\
    \ initialization parameter needs to be 11.2.0.0.0 or greater before using the\
    \ `SEGMENT CREATION DEFERRED` clause.\n\n### 1-6. Maximizing Data Loading Speeds\n\
    \n#### Problem\n\nYou're loading a large amount of data into a table and want\
    \ to insert new records as quickly as possible.\n\n#### Solution\n\nUse a combination\
    \ of the following two features to maximize the speed of insert statements:\n\n\
    *   Set the table's logging attribute to `NOLOGGING`; this minimizes the generation\
    \ redo for direct path operations (this feature has no effect on regular DML operations).\n\
    *   Use a direct path loading feature, such as the following:\n    *   `INSERT\
    \ /*+ APPEND */` on queries that use a subquery for determining which records\
    \ are inserted\n    *   `INSERT /*+ APPEND_VALUES */` on queries that use a `VALUES`\
    \ clause\n    *   `CREATE TABLE…AS SELECT`\n\nHere's an example to illustrate\
    \ `NOLOGGING` and direct path loading. First, run the following query to verify\
    \ the logging status of a table. In this example, the table name is `F_REGS`:\n\
    \n```\nselect\n table_name\n,logging\nfrom user_tables\nwhere table_name = 'F_REGS';\n\
    ```\n\nHere is some sample output:\n\n```\nTABLE_NAME             LOG\n------------------------------\
    \ ---\nF_REGS                     YES\n```\n\nThe prior output verifies that the\
    \ table was created with `LOGGING` enabled (the default). To enable `NOLOGGING`,\
    \ use the `ALTER TABLE` statement as follows:\n\n```\nSQL> alter table f_regs\
    \ nologging;\n```\n\nNow that `NOLOGGING` has been enabled, there should be a\
    \ minimal amount of redo generated for direct path operations. The following example\
    \ uses a direct path `INSERT` statement to load data into the table:\n\n```\n\
    insert /*+APPEND */ into f_regs\nselect * from reg_master;\n```\n\nThe prior statement\
    \ is an efficient method for loading data because direct path operations such\
    \ as `INSERT /*+APPEND */` combined with `NOLOGGING` generate a minimal amount\
    \ of redo."
