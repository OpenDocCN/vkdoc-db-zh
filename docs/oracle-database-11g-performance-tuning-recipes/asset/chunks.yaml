    \ 过程允许您修改自动 SQL 调优作业的默认行为。您可以通过此查询查看自动 SQL 调优的所有当前设置：\n\n```sql\nSELECT parameter_name\
    \ ,parameter_value\nFROM dba_advisor_parameters\nWHERE task_name = 'SYS_AUTO_SQL_TUNING_TASK'\n\
