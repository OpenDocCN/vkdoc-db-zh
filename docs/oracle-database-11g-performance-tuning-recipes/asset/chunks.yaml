    \ 576 行，每行对应一个十分钟间隔。因此，您可以回顾过去最多四天的撤销使用情况。\n\n对于您感兴趣的时间段（理想情况下，该时间段应包括最长查询正在执行的时间），以下是您应在`V$UNDOSTAT`视图中监控的关键列。您可以使用这些统计信息来调整`UNDO_TABLESPACE`和`UNDO_RETENTION`初始化参数的大小。\n\
    \n> `begin_time`：时间间隔的开始时间。\n>\n> `end_time`：时间间隔的结束时间。\n>\n> `undoblks`：数据库在十分钟间隔内消耗的撤销块数量；这是我们公式中用于估算撤销表空间大小所使用的数据。\n\
    >\n> `txncount`：在十分钟间隔内执行的事务数量。\n>\n> `maxquerylen`：显示在此实例中，在十分钟间隔内执行的最长查询的长度（以秒为单位）。您可以基于`MAXQUERYLEN`列的最大值来估算`UNDO_RETENTION`参数的大小。\n\
    >\n> `maxqueryid`：此间隔内运行时间最长的 SQL 语句的标识符。\n>\n> `nospaceerrcnt`：数据库在撤销表空间中没有足够可用空间来存储新撤销数据的次数，这是因为整个撤销表空间都被活动事务占用；当然，这意味着您需要增加撤销表空间的空间。\n\
    >\n> `tuned_undoretention`：数据库在提交所属撤销的事务后，将保留撤销数据的时间（以秒为单位）。\n\n以下基于`V$UNDOSTAT`视图的查询展示了\
    \ Oracle 如何根据当前实例工作负载中最长查询的长度（`MAXQUERYLEN`列）自动调整撤销保留（查看`TUNED_UNDORETENTION`列）。\n\
    \n```sql\nSQL> select to_char(begin_time,'hh24:mi:ss') BEGIN_TIME,\n  2  to_char(end_time,'hh24:mi:ss')\
    \ END_TIME,\n  3  maxquerylen,nospaceerrcnt,tuned_undoretention\n  4  from v$undostat;\n\
    \nBEGIN_TI END_TIME MAXQUERYLEN NOSPACEERRCNT TUNED_UNDORETENTION\n-------- --------\
    \ ----------- ------------- -------------------\n12:25:35 12:29:30         892\
    \             0                1673\n12:15:35 12:25:35         592           \
    \  0                1492\n12:05:35 12:15:35        1194             0        \
    \        2094\n11:55:35 12:05:35         592             0                1493\n\
    11:45:35 11:55:35        1195             0                2095\n11:35:35 11:45:35\
    \         593             0                1494\n11:25:35 11:35:35        1196\
    \             0                2097\n11:15:35 11:25:35         594           \
    \  0                1495\n11:05:35 11:15:35        1195             0        \
    \        2096\n10:55:35 11:05:35         593             0                1495\n\
    10:45:35 10:55:35        1198             0                2098\n…\nSQL>\n```\n\
    \n请注意，`TUNED_UNDORETENTION`列的值会根据任何间隔内的最大查询长度（`MAXQUERYLEN`）持续波动。您可以看到这两个列直接相关，Oracle\
    \ 会根据给定间隔（十分钟）内的最大查询长度来提高或降低调整后的撤销保留时间。以下查询显示了每个十分钟间隔内撤销块的使用情况和事务计数。\n\n```sql\n\
    SQL> select to_char(begin_time,'hh24:mi:ss'),to_char(end_time,'hh24:mi:ss'),\n\
    \  2  maxquerylen,ssolderrcnt,nospaceerrcnt,undoblks,txncount from v$undostat\n\
    \  3  order by undoblks\n  4  /\n\nTO_CHAR( TO_CHAR( MAXQUERYLEN SSOLDERRCNT NOSPACEERRCNT\
    \   UNDOBLKS   TXNCOUNT\n-------- -------- ----------- ------------- ----------\
    \ ----------\n17:33:51 17:36:49         550           0             0        \
    \  1         18\n17:23:51 17:33:51         249           0             0     \
    \    33        166\n17:13:51 17:23:51         856           0             0  \
    \       39        520\n17:03:51 17:13:51         250           0             0\
    \         63        171\n16:53:51 17:03:51         850           0           \
    \  0        191        702\n16:43:51 16:53:51         245           0        \
    \     0        429        561\n\n6 rows selected.\n\nSQL>\n```\n\nOracle 通过 OEM\
    \ 撤销顾问界面提供了一种简单的方法来帮助设置撤销表空间的大小以及撤销保留期。您可以指定顾问进行分析的时间段，最长可回溯一周——顾问使用`AWR`的每小时快照执行其分析。您可以指定撤销保留期以支持闪回事务查询。或者，您可以让数据库根据分析期间最长的查询来确定所需的撤销保留时间。"
- fmt: '### 7-2. Finding What''s Consuming the Most Undo


    #### Problem


    Often, one or two user sessions seem to be hogging the undo tablespaces. You''d
    like to identify the user and the SQL statement that are using up all that undo
    space.


    #### Solution


    High undo usage often involves a long-running query. Use the following query to
    find out which SQL statement has run for the longest time in your database.


    ```sql

    select s.sql_text from v$sql s, v$undostat u

    where u.maxqueryid=s.sql_id;

    ```


    You can join the `V$TRANSACTION` and the `V$SESSION` views to find out the most
    undo used by a session for a currently executing transaction, as shown here:


    ```sql

    select s.sid, s.username, t.used_urec, t.used_ublk

    from v$session s, v$transaction t

    where s.saddr = t.ses_addr

    order by t.used_ublk desc;

    ```


    You can also issue the following query to find out which session is currently
    using the most undo in an instance:


    ```sql

    select s.sid, t.name, s.value

    from v$sesstat s, v$statname t

    where s.statistic# = t.statistic#

    and t.name = ''undo change vector size''

    order by s.value desc;

    ```


    The query''s output relies on the statistic `undo change vector size` in the `V$STATNAME`
    view, to show the SID for the sessions consuming the most undo right now. The
    `V$TRANSACTION` view shows details about active transactions. Here''s another
    query that joins the `V$TRANSACTION`, `V$SQL` and `V$SESSION` views:


    ```sql

    select sql.sql_text sql_text, t.USED_UREC Records, t.USED_UBLK Blocks,

    (t.USED_UBLK*8192/1024) KBytes from v$transaction t,

    v$session s,

    v$sql sql

    where t.addr = s.taddr

    and s.sql_id = sql.sql_id

    and s.username =''&USERNAME'';

    ```


    The column `USED_UREC` shows the number of undo records used, and the `USED_UBLK`
    column shows the undo blocks consumed by a transaction.


    #### How It Works


    You can issue the queries described in the “Solution” section to identify the
    sessions that are responsible for the most undo usage in your database, as well
    as the users that are responsible for those sessions. You can query the `V$UNDOSTAT`
    with the appropriate `begin_time` and `end_time` values to get the SQL identifier
    of the longest-running SQL statement during a time interval. The `MAXQUERYID`
    column captures the SQL identifier. You can use this ID to query the `V$SQL` view
    in order to find out the actual SQL statement. Similarly, the `V$TRANSACTION`
    and the `V$SESSION` views together help identify the users that are consuming
    the most undo space. If excessive undo usage is affecting performance, you might
    want to look at the application to see why the queries are using so much undo.


    ### 7-3. Resolving an ORA-01555 Error


    #### Problem


    You''re receiving the `ORA-01555` (snapshot too old) errors during nightly runs
    of key production batch jobs. You want to eliminate these errors.


    #### Solution


    While setting a high value for the `UNDO_RETENTION` parameter can potentially
    minimize the possibility of receiving “snapshot too old” errors, it doesn''t guarantee
    that the database won''t overwrite older undo data that may be needed by a running
    transaction. You can move long-running batch jobs to a separate time interval
    when other programs aren''t running in the database, to avoid these errors.


    Regardless, while you can minimize the occurrence of “snapshot too old” errors
    with these approaches, you can''t completely eliminate such errors without specifying
    the *guaranteed undo retention* feature. When you configure guaranteed undo retention
    in a database, no transaction can fail because of the “snapshot too old” error.
    Oracle will keep new DML statements from executing when you set up guaranteed
    undo retention. Implementing the guaranteed undo feature is simple. Suppose you
    want to ensure that the database retains undo for at least an hour (3,600 seconds).
    First set the undo retention threshold with the `alter system` command shown here,
    and then set up guaranteed undo retention by specifying the `retention guarantee`
    clause to alter the undo tablespace.


    ```sql

    alter system set undo_retention=3600;

    ```

    System altered.

    ```sql

    alter tablespace undotbs1 retention guarantee;

    ```

    Tablespace altered.


    You can switch off guaranteed undo retention by executing the `alter tablespace`
    command with the `retention noguarantee` clause.


    ![images](images/square.jpg) **Tip** You can enable guaranteed undo retention
    by using the `alter system` command as shown in this recipe, as well as with the
    `create database` and `create undo tablespace` statements.


    #### How It Works


    Oracle uses the undo records stored in the undo tablespace to help roll back transactions,
    provide read consistency, and to help recover the database. In addition, the database
    also uses undo records to read data from a past point in time using Oracle Flashback
    Query. Undo data serves as the underpinning for several Oracle Flashback features
    that help you recover from logical errors.


    ##### Occurrence of the Error


    The `ORA-01555` error (snapshot too old) may occur in various situations. The
    following is a case where the error occurs during an export.


    ```

    EXP-00008: ORACLE error 1555 encountered

    ORA-01555: snapshot too old: rollback segment number 10 with name "_SYSSMU10$"
    too small

    EXP-00000: Export terminated unsuccessfully

    ```


    And you can receive the same error when performing a flashback transaction:


    ```

    ERROR at line 1:

    ORA-01555: snapshot too old: rollback segment number with name "" too small

    ORA-06512: at "SYS.DBMS_FLASHBACK", line 37

    ORA-06512: at "SYS.DBMS_FLASHBACK", line 70

    ORA-06512: at li

    ```


    The “snapshot too old” error occurs when Oracle overwrites undo data that''s needed
    by another transaction. The error is a direct result of how Oracle''s read consistency
    mechanism works. The error occurs during the execution of a long-running query
    when Oracle tries to read the “before image” of any changed rows from the undo
    segments. For example, if a long-running query starts at 1 a.m. and runs until
    6 a.m., it''s possible for the database to change the data that''s part of this
    query during the period in which the query executes. When Oracle tries to read
    the data as it appeared at 1 a.m., the query may fail if that data is no longer
    present in the undo segments.


    If your database is experiencing a lot of updates, Oracle may not be able to fetch
    the changed rows, because the before changes recorded in the undo segments may
    have been overwritten. The transactions that changed the rows will have already
    committed, and the undo segments don''t have a record of the before change row
    values because the database overwrote the relevant undo data. Since Oracle fails
    to return consistent data for the current query, it issues the `ORA-01555` error.
    The query that''s currently running requires the before image to construct read-consistent
    data, but the before image isn''t available.


    The `ORA-01555` error may be the result of one or both of the following: too many
    updates to the database or too small an undo tablespace. You can increase the
    size of the undo tablespace, but that doesn''t ensure that the error won''t occur
    again.'
