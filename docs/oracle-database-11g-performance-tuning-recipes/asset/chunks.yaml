- fmt: "#### How It Works\n\nIf you need the option of choosing to roll back (instead\
    \ of committing) when removing data, then you should use the `DELETE` statement.\
    \ However, the `DELETE` statement has the disadvantage that it generates a great\
    \ deal of undo and redo information. Thus for large tables, a `TRUNCATE` statement\
    \ is usually the most efficient way to remove data.\n\nAnother characteristic\
    \ of the `TRUNCATE` statement is that it sets the high-water mark of a table back\
    \ to zero. When you use a `DELETE` statement to remove data from a table, the\
    \ high-water mark doesn't change. One advantage of using a `TRUNCATE` statement\
    \ and resetting the high-water mark is that full table scan queries search only\
    \ for rows in blocks below the high-water mark. This can have significant performance\
    \ implications for queries that perform full table scans.\n\nAnother side effect\
    \ of the `TRUNCATE` statement is that you can't truncate a parent table that has\
    \ a primary key defined that is referenced by an enabled foreign-key constraint\
    \ in a child table—even if the child table contains zero rows. In this scenario,\
    \ Oracle will throw this error when attempting to truncate the parent table:\n\
    `ORA-02266: unique/primary keys in table referenced by enabled foreign keys`\n\
    \nOracle prevents you from truncating the parent table because in a multiuser\
    \ system, there is a possibility that another session can populate the child table\
    \ with rows in between the time you truncate the child table and the time you\
    \ subsequently truncate the parent table. In this situation, you must temporarily\
    \ disable the child table–referenced foreign-key constraints, issue the `TRUNCATE`\
    \ statement, and then re-enable the constraints.\n\nCompare the `TRUNCATE` behavior\
    \ to that of the `DELETE` statement. Oracle does allow you to use the `DELETE`\
    \ statement to remove rows from a parent table while the constraints are enabled\
    \ that reference a child table (assuming there are zero rows in the child table).\
    \ This is because `DELETE` generates undo, is read-consistent, and can be rolled\
    \ back. [Table 1-4](#Chapter01.html#tab_1_4) summarizes the differences between\
    \ `DELETE` and `TRUNCATE`.\n\nIf you need to use a `DELETE` statement, you must\
    \ issue either a `COMMIT` or a `ROLLBACK` to complete the transaction. Committing\
    \ a `DELETE` statement makes the data changes permanent:\n\n```sql\nSQL> delete\
    \ from computer_systems;\nSQL> commit;\n```\n\n![images](images/square.jpg) **Note**\
    \ Other (sometimes not so obvious) ways of committing a transaction include issuing\
    \ a subsequent DDL statement (which implicitly commits an active transaction for\
    \ a session) or normally exiting out of the client tool (such as SQL*Plus).\n\n\
    If you issue a `ROLLBACK` statement instead of `COMMIT`, the table contains data\
    \ as it was before the `DELETE` was issued.\n\nWhen working with DML statements,\
    \ you can confirm the details of a transaction by querying from the `V$TRANSACTION`\
    \ view. For example, say that you have just inserted data into a table; before\
    \ you issue a `COMMIT` or `ROLLBACK`, you can view active transaction information\
    \ for the currently connected session as follows:\n\n```sql\nSQL> insert into\
    \ computer_systems(cs_id) values(1);\nSQL> select xidusn, xidsqn from v$transaction;\n\
    \    XIDUSN      XIDSQN\n---------- ----------\n         3      12878\nSQL> commit;\n\
    SQL> select xidusn, xidsqn from v$transaction;\nno rows selected\n```\n\n![images](images/t0104.jpg)\n\
    \n![images](images/square.jpg) **Note** Another way to remove data from a table\
    \ is to drop and re-create the table. However, this means you also have to re-create\
    \ any indexes, constraints, grants, and triggers that belong to the table. Additionally,\
    \ when you drop a table, it's temporarily unavailable until you re-create it and\
    \ re-issue any required grants. Usually, dropping and re-creating a table is acceptable\
    \ only in a development or test environment.\n\n### 1-8. Displaying Automated\
    \ Segment Advisor Advice\n\n#### Problem\n\nYou have a poorly performing query\
    \ accessing a table. Upon further investigation, you discover the table has only\
    \ a few rows in it. You wonder why the query is taking so long when there are\
    \ so few rows. You want to examine the output of the Segment Advisor to see if\
    \ there are any space-related recommendations that might help with performance\
    \ in this situation.\n\n#### Solution\n\nUse the Segment Advisor to display information\
    \ regarding tables that may have space allocated to them (that was once used)\
    \ but now the space is empty (due to a large number of deleted rows). Tables with\
    \ large amounts of unused space can cause full table scan queries to perform poorly.\
    \ This is because Oracle is scanning every block beneath the high-water mark,\
    \ regardless of whether the blocks contain data.\n\nThis solution focuses on accessing\
    \ the Segment Advisor's advice via the `DBMS_SPACE` PL/SQL package. This package\
    \ retrieves information generated by the Segment Advisor regarding segments that\
    \ may be candidates for shrinking, moving, or compressing. One simple and effective\
    \ way to use the `DBMS_SPACE` package (to obtain Segment Advisor advice) is via\
    \ a SQL query—for example:\n\n```sql\nSELECT\n 'Segment Advice --------------------------'||\
    \ chr(10) ||\n 'TABLESPACE_NAME  : ' || tablespace_name   || chr(10) ||\n 'SEGMENT_OWNER\
    \    : ' || segment_owner     || chr(10) ||\n 'SEGMENT_NAME     : ' || segment_name\
    \      || chr(10) ||\n 'ALLOCATED_SPACE  : ' || allocated_space   || chr(10) ||\n\
    \ 'RECLAIMABLE_SPACE: ' || reclaimable_space || chr(10) ||\n 'RECOMMENDATIONS\
    \  : ' || recommendations   || chr(10) ||\n 'SOLUTION 1       : ' || c1      \
    \          || chr(10) ||\n 'SOLUTION 2       : ' || c2                || chr(10)\
    \ ||\n 'SOLUTION 3       : ' || c3 Advice\nFROM\nTABLE(dbms_space.asa_recommendations('FALSE',\
    \ 'FALSE', 'FALSE'));\n```\n\nHere is some sample output:\n\n```\nSegment Advice\
    \ --------------------------\nTABLESPACE_NAME  : USERS\nSEGMENT_OWNER    : MV_MAINT\n\
    SEGMENT_NAME     : F_REGS\nALLOCATED_SPACE  : 20971520\nRECLAIMABLE_SPACE: 18209960\n\
    RECOMMENDATIONS  : Perform re-org on the object F_REGS, estimated savings is 18209960\
    \ bytes.\nSOLUTION 1       : Perform Reorg\nSOLUTION 2       :\nSOLUTION 3   \
    \    :\n```\n\nIn the prior output, the `F_REGS` table is a candidate for the\
    \ shrink operation. It is consuming 20 MB, and 18 MB can be reclaimed."
