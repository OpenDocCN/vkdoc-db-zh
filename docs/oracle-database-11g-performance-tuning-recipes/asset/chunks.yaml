    \         from stores\n         group by prod_id\n         having prod_id=999;\n\
    \    ```\n\n在后续执行中，数据库将从服务器结果缓存中检索前述查询的结果。之所以如此，是因为当你指定 `RESULT_CACHE (MODE FORCE)`\
    \ 注解时，它会覆盖 `RESULT_CACHE_MODE` 参数的 `MANUAL` 设置。请记住，当你将此参数设置为 `MANUAL` 模式时，Oracle\
    \ 仅在你指定查询提示或注解时才会缓存查询结果。这里显示的查询没有使用提示，但其结果被缓存，因为 `RESULT_CACHE (MODE FORCE)` 注解使数据库的行为与\
    \ `RESULT_CACHE_MODE` 参数设置为 `FORCE` 时相同——它会缓存所有符合条件的查询的查询结果。\n\n然而，查询提示最终优先于 `RESULT_CACHE\
    \ (MODE FORCE)` 注解，如以下示例所示。\n\n首先，修改表 `STORES` 以指定带有 `MODE FORCE` 选项的 `RESULT_CACHE`\
    \ 属性：\n\n```sql\nSQL> alter table stores result_cache (mode force);\n```\n\n确保你已将\
