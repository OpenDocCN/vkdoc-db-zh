    \ procedure:\n\n`PARSING IN CURSOR #3 len=490 dep=1 uid=85 oct=3 lid=85 tim=269523043683\
    \ hv=672110367 ad='7ff18986250' sqlid='bqasjasn0z5sz'`\n\n`PARSE #3:c=0,e=647,p=0,cr=0,cu=0,mis=1,r=0,dep=1,og=1,plh=0,tim=269523043680`\n\
    `EXEC #3:c=0,e=1749,p=0,cr=0,cu=0,mis=1,r=0,dep=1,og=1,plh=3969568374,tim=269523045613`\n\
    `WAIT #3: nam='Disk file operations I/O' ela= 15833 FileOperation=2 fileno=4 filetype=2\
    \ obj#=-1 tim=269523061555`\n`FETCH #3:c=0,e=19196,p=0,cr=46,cu=0,mis=0,r=1,dep=1,og=1,plh=3969568374,tim=269523064866`\n\
    `STAT #3 id=3 cnt=12 pid=2 pos=1 obj=0 op='HASH GROUP BY (cr=46 pr=0 pw=0 time=11\
    \ us cost=4 size=5317 card=409)'`\n`STAT #3 id=4 cnt=3424 pid=3 pos=1 obj=89079\
    \ op='TABLE ACCESS  FULL DEPT (cr=16 pr=0 pw=0 time=246 us cost=3 size=4251 card=327)'`\n\
    \nAs you can see from this excerpt of the raw trace file, you can glean useful\
    \ information, such as parse misses, waits, and the execution plan of the SQL\
    \ statement.\n\n#### How It Works\n\nThe usual practice after getting a session\
    \ trace file is to analyze it using a tool such as `TKPROF`. However, you can\
    \ examine a trace file by visually reading the trace output. The raw trace files\
    \ capture information for each of the following three steps of SQL statement processing:\n\
    \n> *Parse*: During this stage, the database converts the SQL statement into an\
    \ execution plan, and checks for authorization and the existence of tables and\
    \ other objects.\n> \n> *Execute*: The database executes the SQL statement during\
    \ this phase. For a `SELECT` statement, the execute phase identifies the rows\
    \ the database must retrieve. The database modifies the data for DML statements\
    \ such as insert, update, and delete.\n> \n> *Fetch:* This step applies only for\
    \ a `SELECT` statement. During this phase, the database retrieves the selected\
    \ rows.\n\nA SQL trace file will contain detailed statistics for each of the three\
    \ phases of execution, in addition to wait event information. You usually format\
    \ the raw trace files with a utility such as `TKPROF`. However, there are times\
    \ when a raw trace file can show you useful information very quickly, by a simple\
    \ scroll through the file. A locking situation is a good example where you can\
    \ visually inspect a raw trace file. `TKPROF` doesn't provide you details about\
    \ latches and locks (enqueues). If you suspect that a query was waiting on a lock,\
    \ digging deep into a raw trace file shows you exactly where and why a query was\
    \ waiting. In the `WAIT` line, the elapsed time (`ela`) shows the amount of time\
    \ waited (in microseconds). In our example, elapsed wait time for “Disk file operations\
    \ I/O” is 15,833 microseconds. Since 1 second=1,000,000 microseconds, this is\
    \ not a significant wait time. The raw trace file clearly shows if an I/O wait\
    \ event, as is true in this case, or another type of wait event held up the query.\
    \ If the query was waiting on a lock, you'll see something similar to the following:\
    \ `WAIT #2: nam='enqueue ela-300….`\n\nWe've purposefully kept the discussion\
    \ short in this recipe, because tools such as `TKPROF` and the Oracle Trace Analyzer\
    \ provide you sophisticated diagnostic information by profiling the raw trace\
    \ files.\n\n### 10-6\\. Analyzing Oracle Trace Files\n\n#### Problem\n\nYou want\
    \ to know how to analyze an Oracle trace file.\n\n#### Solution\n\nThere are multiple\
    \ ways to interpret a SQL trace file. Here are the different approaches:\n\n*\
    \   Read the raw SQL trace file in a text editor.\n*   Use the Oracle-provided\
    \ `TKPROF` (Trace Kernel Profiler) utility.\n*   Use Oracle Trace Analyzer, a\
    \ free product you can download from Oracle Support.\n*   Use third-party tools."
  trans: "#### 解决方案\n\n在开始生成跟踪之前，请执行以下语句为跟踪文件设置标识符：\n\n`SQL> alter session set tracefile_identifier='MyTune1';`\n\
    \n要查看数据库创建的最新跟踪文件（适用于 Oracle Database 11.1 及更新版本），可以通过执行以下命令查询自动诊断存储库（有关`adrci`工具的详细信息，请参见第\
    \ 5 章）：\n\n```\nadrci> show tracefile -t\n08-MAY-11 19:01:48  diag\\rdbms\\orcl1\\\
    orcl1\\trace\\orcl1_p000_8652_MyTune1.trc\n08-MAY-11 19:01:48  diag\\rdbms\\orcl1\\\
    orcl1\\trace\\orcl1_p001_6424_MyTune1.trc\n08-MAY-11 19:01:48  diag\\rdbms\\orcl1\\\
    orcl1\\trace\\orcl1_p002_5980_MyTune1.trc\nadrci>\n```\n\n要查找当前会话的跟踪文件路径，请执行以下命令：\n\
    \n```\nSQL>  select value from v$diag_info\n      where name = 'Default Trace\
    \ File';\n\nVALUE\n-----------------------------------------------------------------------\n\
    \nc:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\trace\\orcl1_ora_11248_My_Tune1.trc\n\
    \nSQL>\n```\n\n要查找当前实例的所有跟踪文件，请执行以下查询：\n\n`SQL> select value from v$diag_info\
    \ where name = 'Diag Trace'`\n\n#### 工作原理\n\n通常，很难找到你正在寻找的确切跟踪文件，因为跟踪目录中可能有一堆其他跟踪文件，且文件名看起来都很相似。在进行\
    \ SQL 跟踪时，一个最佳实践是将你的跟踪文件与一个唯一标识符关联起来。为即将生成的跟踪文件设置一个标识符，可以轻松地从数据库在跟踪目录中生成的众多跟踪文件中识别出\
    \ SQL 跟踪文件。\n\n你可以使用以下命令确认跟踪标识符的值：\n\n```\nSQL> sho parameter tracefile_identifier\n\
    NAME                                 TYPE        VALUE\n------------------------------------\
    \ ----------- ---------------\ntracefile_identifier                 string   \
    \   MyTune1\nSQL>\n```\n\n`V$PROCESS`视图中的`TRACEID`列也显示了`tracefile_identifier`参数的当前值。你设置的跟踪文件标识符会成为跟踪文件名的一部分，使得从跟踪目录中大量跟踪文件里轻松挑选出正确的文件名成为可能。你可以为一个会话多次修改`tracefile_identifier`参数的值。一个进程的跟踪文件名将包含表明它们都属于同一进程的信息。\n\
    \n一旦你设置了`tracefile_identifier`参数，跟踪文件将具有以下格式，其中`sid`是 Oracle SID，`pid`是进程 ID，`traceid`是你为`tracefile_identifier`初始化参数设置的值。\n\
    \n`sid_ora_pid_traceid.trc`\n\n### 10-5. 检查原始 SQL 跟踪文件\n\n#### 问题\n\n你想检查一个原始\
    \ SQL 跟踪文件。\n\n#### 解决方案\n\n在文本编辑器中打开跟踪文件以检查跟踪信息。以下是通过执行`dbms_monitor.session_trace_enable`过程生成的原始\
    \ SQL 跟踪的部分内容：\n\n```\nPARSING IN CURSOR #3 len=490 dep=1 uid=85 oct=3 lid=85\
    \ tim=269523043683 hv=672110367 ad='7ff18986250' sqlid='bqasjasn0z5sz'\nPARSE\
    \ #3:c=0,e=647,p=0,cr=0,cu=0,mis=1,r=0,dep=1,og=1,plh=0,tim=269523043680\nEXEC\
    \ #3:c=0,e=1749,p=0,cr=0,cu=0,mis=1,r=0,dep=1,og=1,plh=3969568374,tim=269523045613\n\
    WAIT #3: nam='Disk file operations I/O' ela= 15833 FileOperation=2 fileno=4 filetype=2\
    \ obj#=-1 tim=269523061555\nFETCH #3:c=0,e=19196,p=0,cr=46,cu=0,mis=0,r=1,dep=1,og=1,plh=3969568374,tim=269523064866\n\
    STAT #3 id=3 cnt=12 pid=2 pos=1 obj=0 op='HASH GROUP BY (cr=46 pr=0 pw=0 time=11\
    \ us cost=4 size=5317 card=409)'\nSTAT #3 id=4 cnt=3424 pid=3 pos=1 obj=89079\
    \ op='TABLE ACCESS  FULL DEPT (cr=16 pr=0 pw=0 time=246 us cost=3 size=4251 card=327)'\n\
    ```\n\n从这个原始跟踪文件的摘录中可以看出，你可以收集到有用的信息，例如解析未命中（parse misses）、等待事件以及 SQL 语句的执行计划。\n\
    \n#### 工作原理\n\n获取会话跟踪文件后的常规做法是使用`TKPROF`等工具进行分析。但是，你也可以通过目视阅读跟踪输出内容来检查跟踪文件。原始跟踪文件捕获了\
    \ SQL 语句处理以下三个步骤的信息：\n\n`解析`：在此阶段，数据库将 SQL 语句转换为执行计划，并检查授权以及表和其他对象是否存在。\n\n`执行`：数据库在此阶段执行\
    \ SQL 语句。对于`SELECT`语句，执行阶段确定数据库必须检索的行。对于诸如插入、更新和删除之类的 DML 语句，数据库会修改数据。\n\n`获取`：此步骤仅适用于`SELECT`语句。在此阶段，数据库检索选定的行。\n\
    \n除了等待事件信息外，SQL 跟踪文件还将包含这三个执行阶段的详细统计信息。你通常使用`TKPROF`等实用程序来格式化原始跟踪文件。然而，有时通过简单地滚动浏览文件，原始跟踪文件可以非常快速地向你显示有用的信息。锁定情况就是一个很好的例子，在这种情况下你可以目视检查原始跟踪文件。`TKPROF`不会为你提供有关\
    \ latches 和 locks（enqueues）的详细信息。如果你怀疑查询正在等待锁，深入研究原始跟踪文件会准确地向你显示查询在何处以及为何等待。在`WAIT`行中，经过时间（`ela`）显示了等待的时间量（以微秒为单位）。在我们的示例中，“Disk\
    \ file operations I/O”的等待经过时间是 15,833 微秒。因为 1 秒=1,000,000 微秒，所以这不是一个显著的等待时间。原始跟踪文件清楚地显示了是\
    \ I/O 等待事件（如此例所示）还是其他类型的等待事件阻碍了查询。如果查询正在等待锁，你将看到类似以下内容：`WAIT #2: nam='enqueue\
    \ ela-300…. `\n\n我们在此方法中特意将讨论保持简短，因为诸如`TKPROF`和 Oracle Trace Analyzer 之类的工具通过分析原始跟踪文件为你提供复杂的诊断信息。\n\
    \n### 10-6. 分析 Oracle 跟踪文件\n\n#### 问题\n\n你想知道如何分析 Oracle 跟踪文件。\n\n#### 解决方案\n\n\
    有多种方法可以解释 SQL 跟踪文件。以下是不同的方法：\n\n*   在文本编辑器中阅读原始 SQL 跟踪文件。\n*   使用 Oracle 提供的`TKPROF`（跟踪内核分析器）实用程序。\n\
    *   使用 Oracle Trace Analyzer，这是一个可从 Oracle 支持免费下载的产品。\n*   使用第三方工具。"
- fmt: "## How It Works\n\n获取 SQL 跟踪通常比较容易，而分析它当然比收集跟踪更具挑战性。有时，如果你特别擅长，可以直接查看源跟踪文件本身，但在大多数情况下，你需要一个工具来解释和分析跟踪文件可能包含的大量数据。请注意，`TKPROF`\
    \ 或其他分析工具显示的是查询执行各个阶段的耗时，但不包含锁和闩锁的信息。如果你试图找出是否有任何锁在减慢查询速度，请查看原始跟踪文件，检查原始文件的 `WAIT`\
    \ 行中是否有任何入队等待事件。\n\n你可以轻松阅读某些跟踪文件，例如事件 10053 的跟踪文件，因为该文件不包含任何 SQL 执行统计信息（如解析、执行和获取统计信息），也没有等待事件分析——它主要包含基于成本的优化器（CBO）使用的执行路径跟踪。然而，对于任何\
    \ SQL 执行跟踪文件，例如使用事件 10046 生成的文件，虽然从技术上讲可以目视检查，但这不仅耗时，而且原始数据不是摘要形式，关键事件通常以晦涩的方式描述。因此，使用像\
    \ `TKPROF` 实用程序这样的分析器确实是你的最佳选择。\n\n`TKPROF` 实用程序是 Oracle 提供的分析工具，大多数 Oracle DBA\
    \ 会例行使用。配方 10-7 和 10-8 展示了如何使用 `TKPROF`。\n\nOracle 的 Trace Analyzer 是免费的（你需要从\
    \ Oracle Support 下载），易于安装和使用，并能生成包含大量有用诊断信息的清晰报告。你确实需要先安装该工具，但安装只需几分钟即可完成。之后，你只需将跟踪文件的名称传递给一个脚本以生成格式化输出。配方\
    \ 10-9 展示了如何安装和使用 Oracle Trace Analyzer。\n\n还有一些第三方分析工具提供 `TKPROF` 实用程序所不具备的功能。其中一些工具能生成漂亮的\
    \ HTML 跟踪报告，有些还包括图表，以帮助你目视检查你跟踪的 SQL 语句执行的详细信息。请注意，为了使用其中一些产品，你需要上传你的跟踪文件进行分析。如果你的跟踪文件包含敏感数据或安全信息，这可能不适用。\n\
    \n### 10-7. 使用 TKPROF 格式化跟踪文件\n\n#### Problem\n\n你已经跟踪了一个会话，并希望使用 `TKPROF` 来格式化跟踪文件。\n\
    \n#### Solution\n\n你从命令行运行 `TKPROF` 实用程序。以下是一个典型的用于格式化跟踪文件的 `tkprof` 命令示例。\n\n\
    ```\n$ tkprof user_sql_001.trc user1.prf explain=hr/hr table=hr.temp_plan_table_a\
    \ sys=no\n  sort=exeela,prsela,fchela\n```\n\n在此示例中，`tkprof` 命令接受 `user_sql_001.trc`\
    \ 跟踪文件作为输入，并生成一个名为 `user1.prf` 的输出文件。本配方的“工作原理”部分解释了 `TKPROF` 实用程序的关键可选参数。\n\n\
    #### How It Works\n\n`TKPROF` 是一个实用程序，可让你格式化使用事件 10046 或通过 `DBMS_MONITOR` 包生成的任何扩展跟踪文件。你可以使用此工具生成报告，用于分析本章解释的各种\
    \ SQL 跟踪结果。你可以在单个跟踪文件或使用 `trcsess` 实用程序连接的一组跟踪文件上运行 `TKPROF`。`TKPROF` 显示 SQL 语句执行各个方面的详细信息，例如以下内容：\n\
    \n*   SQL 语句文本\n*   SQL 跟踪统计信息\n*   解析和执行阶段期间库缓存未命中的次数\n*   所有 SQL 语句的执行计划\n*\
    \   递归 SQL 调用\n\n你可以通过不带任何参数地发出 `tkprof` 命令来查看可以指定的所有参数列表，如下所示：\n\n```\n$ tkprof\n\
    Usage: tkprof tracefile outputfile [explain= ] [table= ]\n              [print=\
    \ ] [insert= ] [sys= ] [sort= ]\n...\n```\n\n> 以下是你可以使用 `tkprof` 命令指定的重要参数的简要说明：\n\
    >\n> `filename1`：指定跟踪文件的名称\n>\n> `filename2`：指定格式化的输出文件\n>\n> `waits`：指定输出文件是否应记录等待事件的摘要；默认是`yes`。\n\
    >\n> `sort`：默认情况下，`TKPROF` 按执行顺序列出跟踪文件中的 SQL 语句。你可以使用 `sort` 参数指定各种选项来控制 `TKPROF`\
    \ 列出各个 SQL 语句的顺序。\n>\n> *   `prscpu`：解析花费的 CPU 时间\n> *   `prsela`：解析花费的耗时\n> *\
    \   `execpu`：执行花费的 CPU 时间\n> *   `exeela`：执行花费的耗时\n> *   `fchela`：获取花费的耗时\n>\n\
    > `print`：默认情况下 `TKPROF` 会列出所有跟踪到的 SQL 语句。通过为 `print` 选项指定一个值，你可以限制输出文件中列出的 SQL\
    \ 语句数量。\n>\n> `sys`：默认情况下 `TKPROF` 列出用户 SYS 发出的所有 SQL 语句以及递归语句。为 `sys` 参数指定值 `no`\
    \ 可使 `TKPROF` 省略这些语句。\n>\n> `explain`：将执行计划写入输出文件；`TKPROF` 连接到数据库并使用你在此参数提供的用户名和密码发出\
    \ explain plan 语句。\n>\n> `table`：默认情况下，`TKPROF` 使用由 explain 参数指定的用户模式中名为 `PLAN_TABLE`\
    \ 的表来存储执行计划。你可以使用 table 参数指定一个替代表。\n>\n> `width`：这是一个整数，决定了某些类型输出（如 explain plan\
    \ 信息）的输出行宽。\n\n### 10-8. 分析 TKPROF 输出\n\n#### Problem\n\n你已经使用 `TKPROF` 格式化了一个跟踪文件，现在希望分析\
    \ `TKPROF` 输出文件。\n\n#### Solution\n\n使用 `tkprof` 命令调用 `TKPROF` 实用程序，如下所示：\n\n\
    ```\nc:\\>tkprof orcl1_ora_6448_mytrace1.trc ora6448.prf explain=hr/hr sys=no\
    \ sort=prsela,exeela,fchela\n\nTKPROF: Release 11.2.0.1.0 - Development on Sat\
    \ May 14 11:36:35 2011\n\nCopyright (c) 1982, 2009, Oracle and/or its affiliates.\
    \  All rights reserved.\n\nc:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\trace>\n```\n\
    \n在此示例中，`orcl1_ora_6448_mytrace1.trc` 是你想要格式化的跟踪文件。`ora6448.prf` 文件是 `TKPROF`\
    \ 输出文件。随后的“工作原理”部分展示了如何解释 `TKPROF` 输出文件。\n\n#### How It Works\n\n在我们的示例中，只有一个\
    \ SQL 语句。因此，排序参数（`prsecla`, `exeela`, `fchela`）并不重要，因为它们仅在 `TKPROF` 需要列出多个 SQL\
    \ 语句时才会起作用。以下是 `TKPROF` 输出文件中关键部分的简要说明。\n\n##### Header\n\n标题部分显示了跟踪文件名、排序选项以及输出文件中所用术语的描述。\n\
    \n```\nTrace file: orcl1_ora_6448_mytrace1.trc\nSort options: prsela  exeela \
    \ fchela  \n********************************************************************************\n\
    count    = number of times OCI procedure was executed\ncpu      = cpu time in\
    \ seconds executing\nelapsed  = elapsed time in seconds executing\ndisk     =\
    \ number of physical reads of buffers from disk\nquery    = number of buffers\
    \ gotten for consistent read\ncurrent  = number of buffers gotten in current mode\
    \ (usually for update)\nrows     = number of rows processed by the fetch or execute\
    \ call\n*************************************************************************\n\
    ```"
  raw: "#### How It Works\n\nGetting a SQL trace is often the easy part—analyzing\
    \ it is, of course, more of a task than collecting the trace. Sometimes, if you're\
    \ particularly adept at it, you can certainly directly view the source trace file\
    \ itself, but in most cases, you need a tool to interpret and profile the huge\
    \ amount of data that a trace file can contain. Note that the `TKPROF` or other\
    \ profiling tools show the elapsed times for various phases of query execution,\
    \ but not the information for locks and latches. If you're trying to find out\
    \ if any locks are slowing down a query, look at the raw trace files to see if\
    \ there are any enqueue waits in the `WAIT` lines of the raw file.\n\nYou can\
    \ easily read certain trace files such as the trace file for event 10053, since\
    \ the file doesn't contain any SQL execution statistics (such as parsing, executing,\
    \ and fetching statistics), and no wait event analysis—it mostly consists of a\
    \ trace of the execution path used by the cost-based optimizer (CBO). However,\
    \ for any SQL execution trace files, such as those you generate with the event\
    \ 10046, a visual inspection of the trace file, while technically possible, is\
    \ not only time-consuming, but the raw data is not in a summary form and key events\
    \ are often described in obscure ways. Therefore, using a profiler such as the\
    \ `TKPROF` utility is really your best option.\n\nThe `TKPROF` utility is an Oracle-supplied\
    \ profiling tool that most Oracle DBAs use on a routine basis. Recipes 10-7 and\
    \ 10-8 show how to use `TKPROF`.\n\nOracle's Trace Analyzer is free (you have\
    \ to download it from Oracle Support), easy to install and use, and produces clear\
    \ reports with plenty of useful diagnostic information. You do have to install\
    \ the tool first, but it takes only a few minutes to complete the installation.\
    \ Thereafter, you just pass the name of the trace file to a script to generate\
    \ the formatted output. Recipe 10-9 shows how to install and use the Oracle Trace\
    \ Analyzer.\n\nThere are also third-party profiling tools that offer features\
    \ not found in the `TKPROF` utility. Some of these tools generate pretty HTML\
    \ trace reports and some include charts as well to help you visually inspect the\
    \ details of the execution of the SQL statement that you've traced. Note that\
    \ in order to use some of these products, you'll have to upload your trace files\
    \ for analysis. If your trace files contain sensitive data or security information,\
    \ this may not work for you.\n\n### 10-7. Formatting Trace Files with TKPROF\n\
    \n#### Problem\n\nYou've traced a session, and you want to use `TKPROF` to format\
    \ the trace file.\n\n#### Solution\n\nYou run the `TKPROF` utility from the command\
    \ line. Here's an example of a typical `tkprof` command for formatting a trace\
    \ file.\n\n`$ tkprof user_sql_001.trc user1.prf explain=hr/hr table=hr.temp_plan_table_a\
    \ sys=no`\n`  sort=exeela,prsela,fchela`\n\nIn the example shown here, the `tkprof`\
    \ command takes the `user_sql_001.trc` trace file as input and generates an output\
    \ file named `user1.prf.` The “How it Works” section of this recipe explains key\
    \ optional arguments of the `TKPROF` utility.\n\n#### How It Works\n\n`TKPROF`\
    \ is a utility that lets you format any extended trace files that you generate\
    \ with the event 10046 or through the `DBMS_MONITOR` package. You can use this\
    \ tool to generate reports for analyzing results of the various types of SQL tracing\
    \ explained in this chapter. You can run `TKPROF` on a single trace file or a\
    \ set of trace files that you've concatenated with the `trcsess` utility. `TKPROF`\
    \ shows details of various aspects of SQL statement execution, such as the following:\n\
    \n*   SQL statement text\n*   SQL trace statistics\n*   Number of library cache\
    \ misses during the parse and execute phases\n*   Execution plans for all SQL\
    \ statements\n*   Recursive SQL calls\n\nYou can view a list of all the arguments\
    \ you can specify issuing the `tkprof` command without any arguments, as shown\
    \ here:\n\n`$ tkprof`\n`Usage: tkprof tracefile outputfile [explain= ] [table=\
    \ ]`\n`              [print= ] [insert= ] [sys= ] [sort= ]`\n`...`\n\n> Here's\
    \ a brief explanation of the important arguments you can specify with the `tkprof`\
    \ command:\n> \n> `filename1`: Specifies the name of the trace file\n> \n> `filename2`:\
    \ Specifies the formatted output file\n> \n> `waits`: Specifies whether the output\
    \ file should record a summary of the wait events; default is *yes*.\n> \n> `sort`:\
    \ By default, `TKPROF` lists the SQL statements in the trace file in the order\
    \ they were executed. You can specify various options with the `sort` argument\
    \ to control the order in which `TKPROF` lists the various SQL statements.\n>\
    \ \n> *   `prscpu`: CPU time spent parsing\n> *   `prsela`: Elapsed time spent\
    \ parsing\n> *   `execpu`: CPU time spent executing\n> *   `exeela`: Elapsed time\
    \ spent executing\n> *   `fchela`: Elapsed time spent fetching\n> \n> `print`:\
    \ By default `TKPROF` will list all traced SQL statements. By specifying a value\
    \ for the `print` option, you can limit the number of SQL statements listed in\
    \ the output file.\n> \n> `sys`: By default `TKPROF` lists all SQL statements\
    \ issued by the user SYS, as well as recursive statements. Specify the value `no`\
    \ for the `sys` argument to make `TKPROF` omit these statements.\n> \n> `explain`:\
    \ Writes execution plans to the output file; `TKPROF` connects to the database\
    \ and issues explain plan statements using the username and password you provide\
    \ with this parameter.\n> \n> `table`: By default, `TKPROF` uses a table named\
    \ `PLAN_TABLE` in the schema of the user specified by the explain parameter, to\
    \ store the execution plans. You can specify an alternate table with the table\
    \ parameter.\n> \n> `width`: This is an integer that determines the output line\
    \ widths of some types of output, such as the explain plan information.\n\n###\
    \ 10-8\\. Analyzing TKPROF Output\n\n#### Problem\n\nYou've formatted a trace\
    \ file with `TKPROF`, and you now want to analyze the `TKPROF` output file.\n\n\
    #### Solution\n\nInvoke the `TKPROF` utility with the `tkprof` command as shown\
    \ here:\n\n`c:\\>tkprof orcl1_ora_6448_mytrace1.trc ora6448.prf explain=hr/hr\
    \ sys=no sort=prsela,exeela,fchela`\n\n`TKPROF: Release 11.2.0.1.0 - Development\
    \ on Sat May 14 11:36:35 2011`\n\n`Copyright (c) 1982, 2009, Oracle and/or its\
    \ affiliates.  All rights reserved.`\n\n`c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\\
    trace>`\n\nIn this example, `orcl1_ora_6448_mytrace1.trc` is the trace file you\
    \ want to format. The `ora6448.prf` file is the `TKPROF` output file. The “How\
    \ it Works” section that follows shows how to interpret a `TKPROF` output file.\n\
    \n#### How It Works\n\nIn our example, there's only a single SQL statement. Thus,\
    \ the sort parameters (`prsecla`, `exeela`, `fchela`) don't really matter, because\
    \ they come into play only when `TKPROF` needs to list multiple SQL statements.\
    \ Here's a brief description of the key sections in a `TKPROF` output file.\n\n\
    ##### Header\n\nThe header section shows the trace file name, the sort options,\
    \ and a description of the terms used in the output file.\n\n`Trace file: orcl1_ora_6448_mytrace1.trc`\n\
    `Sort options: prsela  exeela  fchela  `\n`********************************************************************************`\n\
    `count    = number of times OCI procedure was executed`\n`cpu      = cpu time\
    \ in seconds executing`\n`elapsed  = elapsed time in seconds executing`\n`disk     =\
    \ number of physical reads of buffers from disk`\n`query    = number of buffers\
    \ gotten for consistent read`\n`current  = number of buffers gotten in current\
    \ mode (usually for update)`\n`rows     = number of rows processed by the fetch\
    \ or execute call`\n`*************************************************************************`"
  trans: "\n## 工作原理\n\n获取 SQL 跟踪通常比较容易，而分析它当然比收集跟踪更具挑战性。有时，如果你特别擅长，可以直接查看源跟踪文件本身，但在大多数情况下，你需要一个工具来解释和分析跟踪文件可能包含的大量数据。请注意，`TKPROF`\
    \ 或其他分析工具显示的是查询执行各个阶段的耗时，但不包含锁和闩锁的信息。如果你试图找出是否有任何锁在减慢查询速度，请查看原始跟踪文件，检查原始文件的 `WAIT`\
    \ 行中是否有任何入队等待事件。\n\n你可以轻松阅读某些跟踪文件，例如事件 10053 的跟踪文件，因为该文件不包含任何 SQL 执行统计信息（如解析、执行和获取统计信息），也没有等待事件分析——它主要包含基于成本的优化器（CBO）使用的执行路径跟踪。然而，对于任何\
    \ SQL 执行跟踪文件，例如使用事件 10046 生成的文件，虽然从技术上讲可以目视检查，但这不仅耗时，而且原始数据不是摘要形式，关键事件通常以晦涩的方式描述。因此，使用像\
    \ `TKPROF` 实用程序这样的分析器确实是你的最佳选择。\n\n`TKPROF` 实用程序是 Oracle 提供的分析工具，大多数 Oracle DBA\
    \ 会例行使用。配方 10-7 和 10-8 展示了如何使用 `TKPROF`。\n\nOracle 的 Trace Analyzer 是免费的（你需要从\
    \ Oracle Support 下载），易于安装和使用，并能生成包含大量有用诊断信息的清晰报告。你确实需要先安装该工具，但安装只需几分钟即可完成。之后，你只需将跟踪文件的名称传递给一个脚本以生成格式化输出。配方\
    \ 10-9 展示了如何安装和使用 Oracle Trace Analyzer。\n\n还有一些第三方分析工具提供 `TKPROF` 实用程序所不具备的功能。其中一些工具能生成漂亮的\
