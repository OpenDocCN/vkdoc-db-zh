  trans: "### 工作原理\n\n警报日志保存了 Oracle 实例的运行时信息，并提供诸如实例正在使用的初始化参数等信息，以及重做日志文件切换等关键变更的记录，最重要的是，还包含显示\
    \ Oracle 错误及其详细信息的消息。警报日志对于故障排查至关重要，通常是问题发生时你首先查看的地方。Oracle 以文本文件和 XML 格式文件两种形式提供警报日志。\n\
    \n`show alert` 命令会显示 XML 格式的警报日志，但不显示 XML 标签。你可以使用 `SET EDITOR` 命令设置默认编辑器，如下所示：\n\
    \n`adrci> set editor notepad.exe`\n\n上一条命令将默认编辑器更改为记事本。`show alert -term` 命令在终端窗口中显示警报日志内容。如果你想只检查警报日志中最新的事件，请执行以下命令：\n\
    \n`adrci>show alert -tail 50`\n\n`tail` 选项在命令窗口中显示警报日志中最 recent 的一组行。在此示例中，它显示警报日志的最后\
    \ 50 行。如果你没有为 `tail` 参数指定值，默认情况下，它会显示警报日志的最后十行。\n\n以下命令显示一个“实时”警报日志，即它会随着条目被添加到日志中而显示警报日志的变更。\n\
    \n`adrci> show alert -tail -f`\n\n上一条命令显示警报日志的最后十行，并将所有新消息打印到屏幕上，从而提供警报日志持续添加的“实时”显示。按\
    \ CTRL+C 组合键将带你返回到 ADRCI 提示符。\n\n在故障排查时，查看数据库是否发出任何 `ORA-600` 错误非常有用。你可以执行以下命令来捕获\
    \ `ORA-600` 错误。\n\n`adrci> show alert -p \"MESSAGE_TEXT LIKE '%ORA-600%'\"`\n\n\
    尽管你可以通过直接访问存储警报日志的文件系统位置来查看它，但通过 ADRCI 工具这样做要容易得多。ADRCI 对于处理实例的跟踪文件尤其有用。`SHOW\
    \ TRACEFILE` 命令显示实例跟踪目录中的所有跟踪文件。你可以使用各种过滤器来执行 `SHOW TRACEFILE` 命令——以下示例查找引用后台进程\
    \ `mmon` 的跟踪文件：\n\n```\n$ adrci> show tracefile %mmon%\n     diag\\rdbms\\orcl1\\\
    orcl1\\trace\\orcl1_mmon_1792.trc\n     diag\\rdbms\\orcl1\\orcl1\\trace\\orcl1_mmon_2340.trc\n\
    adrci>\n```\n\n此命令列出文件名中包含字符串 `mmon` 的所有跟踪文件。你可以应用过滤器将输出限制为仅与特定事件号关联的跟踪文件，如下所示：\n\
    \n```\nadrci> show tracefile -I 43417\n          diag\\rdbms\\orcl1\\orcl1\\incident\\\
    incdir_43417\\orcl1_ora_4276_i43417.trc\nadrci>\n```\n\n上一条命令列出了与事件号 43417 相关的跟踪文件。\n\
    \n## 7-11. 使用 ADRCI 查看事件\n\n### 问题\n\n你想使用 ADRCI 查看事件。\n\n### 解决方案\n\n你可以使用 `show\
    \ incident` 命令查看 ADR 中的所有事件（请务必先设置 homepath）：\n\n```\n$ adrci\n$ set homepath\
    \ diag\\rdbms\\orcl1\\orcl1\n\nadrci> show incident\n\nADR Home = c:\\app\\ora\\\
    diag\\rdbms\\orcl1\\orcl1:\n*******************************************************************************/\n\
    INCIDENT_ID          PROBLEM_KEY\n CREATE_TIME\n-------------------- -----------------------------------------------------------\n\
    \ 43417                ORA 600 [kkqctinvvm(2): Inconsistent state space!]\n 2010-12-17\
    \ 09:26:15.091000 -05:00\n43369                ORA 600 [kkqctinvvm(2): Inconsistent\
    \ state space!]\n 2010-12-17 11:08:40.589000 -05:00\n79451                ORA\
    \ 445\n 2011-03-04 03:00:39.246000 -05:00\n84243                ORA 445\n 2011-03-14\
    \ 19:12:27.434000 -04:00\n84244                ORA 445\n 2011-03-20 16:55:54.501000\
    \ -04:00\n 5 rows fetched\n```\n\n你可以指定 `detail` 模式来查看特定事件的详细信息，如下所示：\n\n```\n\
    adrci> show incident -mode detail -p \"incident_id=43369\"\n\nADR Home = c:\\\
    app\\ora\\diag\\rdbms\\orcl1\\orcl1:\n*******************************************************************************\n\
    \nINCIDENT INFO RECORD 1\n*******************************************************************************/\n\
    \   INCIDENT_ID                   43369\n   STATUS                        ready\n\
    \   CREATE_TIME                   2010-12-17 11:08:40.589000 -05:00\n   PROBLEM_ID\
    \                    1\n   CLOSE_TIME                    <NULL>\n   FLOOD_CONTROLLED\
    \              none\n   ERROR_FACILITY                ORA\n   ERROR_NUMBER   \
    \               600\n   ERROR_ARG1                    kkqctinvvm(2): Inconsistent\
    \ state space!\n   SIGNALLING_COMPONENT          SQL_Transform\n   PROBLEM_KEY\
    \                   ORA 600 [kkqctin: Inconsistent state space!]\n   FIRST_INCIDENT\
    \                43417\n   FIRSTINC_TIME                 2010-12-17 09:26:15.091000\
    \ -05:00\n   LAST_INCIDENT                 43369\n   LASTINC_TIME            \
    \      2010-12-17 11:08:40.589000 -05:00\n   KEY_VALUE                     ORACLE.EXE.3760_3548\n\
    \   KEY_NAME                      PQ\n   KEY_NAME                      SID\n \
    \  KEY_VALUE                     71.304\n   OWNER_ID                      1\n\
    \   INCIDENT_FILE                 c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\trace\\\
    orcl1_ora_3548.trc\n\nadrci>\n```\n\n### 工作原理\n\n`show incident` 命令报告数据库中所有未解决的事件。对于每个事件，此命令的输出显示问题键、事件\
    \ ID 以及事件发生的时间。在此示例中，我们首先设置了 ADRCI homepath，因此该命令只显示来自此 ADR 主目录的事件。如果你未设置 homepath，你将看到所有当前\
    \ ADR 主目录的事件。\n\n如前所述，事件是问题的单次发生。问题是指关键错误，例如 `ORA-600`（内部错误）或与操作系统异常相关的 `ORA-07445`\
    \ 错误。问题键是一个显示问题详细信息的文本字符串。例如，问题键 `ORA 600 [kkqctinvvm(2): Inconsistent state space!]`\
    \ 表明问题是由于内部错误引起的。\n\n当一个问题发生多次时，数据库会为问题的每次发生创建一个事件，每个事件都有一个唯一的事件 ID。数据库将事件记录在警报日志中，并向\
    \ Oracle Enterprise Manager 发送警报，警报会显示在主页上。数据库自动收集事件的诊断数据，称为事件转储，并将它们存储在 ADR 跟踪目录中。\n\
    \n由于一个关键错误可能产生大量相同的事件，因此故障诊断基础结构应用“洪泛控制”机制来限制事件的生成。对于给定的问题键，数据库在一小时内只允许 5 个事件，一天内最多允许\
    \ 25 个事件。一旦问题触发的事件超过这些阈值，数据库仅在警报日志和 Oracle Enterprise Manager 中记录这些事件，但会停止为其生成新的事件转储。你无法更改事件洪泛控制机制的默认阈值设置。\n\
    \n## 7-12. 为 Oracle 支持打包事件\n\n### 问题\n\n你想将与特定问题相关的诊断文件发送给 Oracle 支持部门。"
- fmt: "#### Solution\n\n您可以通过 Database Control 或从 ADRCI 界面执行的命令来打包更多事件的诊断信息。在本解决方案中，我们将展示如何通过\
    \ ADRCI 打包事件。您可以使用各种 IPS 命令以压缩格式打包与特定问题相关的所有诊断文件，并将文件发送给 Oracle 支持。以下是创建事件包的步骤。\n\
    \n1.  创建一个空的逻辑包，如下所示：\n\n    ```\n    adrci> ips create package\n    Created package\
    \ 1 without any contents, correlation level typical\n    adrci>\n    ```\n\n \
    \   在此示例中，我们创建了一个空包，但您也可以基于事件编号、问题编号、问题键或时间间隔来创建包。在所有这些情况下，包都不会是空的——它将包含您指定的事件或问题的诊断信息。由于我们创建了一个空包，因此需要在下一步中向该包添加诊断信息。\n\
    \n2.  使用 `ips add incident` 命令向逻辑包添加诊断信息：\n\n    ```\n    adrci> ips add incident\
    \ 43369 package 1\n    Added incident 43369 to package 1\n    adrci>\n    ```\n\
    \n    此时，事件 43369 与包 1 相关联，但其中还没有诊断数据。\n\n3.  生成物理包。\n\n    ```\n    adrci> ips\
    \ generate package 1 in \\app\\ora\\diagnostics\n    Generated package 1 in file\
    \ \\app\\ora\\diagnostics\\IPSPKG_20110419131046_COM_1.zip, mode complete\n  \
    \  adrci>\n    ```\n\n    当您发出 `generate package` 命令时，ADRCI 会收集所有相关的诊断文件，并将它们添加到您指定目录中的一个\
    \ zip 文件中。\n\n4.  将生成的 zip 文件发送给 Oracle 支持。\n\n    如果您决定向现有的物理包（zip 文件）添加补充诊断数据，可以通过在\
    \ `generate package` 命令中指定 `incremental` 选项来完成：\n\n    ```\n    adrci> ips generate\
    \ package 1 in \\app\\ora\\diagnostics incremental\n    ```\n\n    此命令创建的增量 zip\
    \ 文件将在文件名中包含 `INC` 一词，表示它是一个增量 zip 文件。\n\n#### 工作原理\n\n物理包是您可以发送给 Oracle 支持以诊断数据库问题的\
    \ zip 文件。由于事件是问题的单次发生，因此将事件编号添加到逻辑包并生成物理包，会将该问题（事件）的所有诊断数据汇总到一个 zip 文件中。在此示例中，我们展示了如何首先创建一个空的逻辑包，然后将其与事件编号关联。然而，`ips\
    \ create package` 命令有几个选项：您可以在创建逻辑包时直接指定事件编号或问题编号，从而跳过 `add incident` 命令。您还可以创建一个包含两个时间点之间所有事件的包，如下所示：\n\
    \n```\nadrci> ips create package time '2011-04-12 10:00:00.00 -06:00' to '2011-04-12\
    \ 23:00:00.00 -06:00'\nCreated package 2 based on time range 2011-04-12 12:00:00.000000\
    \ -06:00 to 2011-04-12 23:00:00.000000 -06:00, correlation level typical\nadrci>\n\
    ```\n\n由先前命令生成的包包含 2011 年 4 月 12 日上午 10 点至晚上 11 点之间发生的所有事件。\n\n请注意，您还可以手动将特定的诊断文件添加到现有包中。要添加文件，您需要在\
    \ `ips add file` 命令中指定文件名——您仅限于添加位于 ADR 基目录内的那些诊断文件。以下是一个示例：\n\n```\nadrci> ips\
    \ add file <ADR_BASE>/diag/rdbms/orcl1/orcl1/trace/orcl_ora12345.trc package 1\n\
    ```\n\n默认情况下，`ips generate package` 命令生成一个包含包中所有文件的 zip 文件。`incremental` 选项将限制文件为数据库自您最初为该包生成\
    \ zip 文件以来所生成的文件。`ips show files` 命令显示包中的所有文件，`ips show incidents` 命令显示包中的所有事件。您可以发出\
    \ `ips remove file` 命令从包中移除诊断文件。\n\n### 7-13. 运行数据库健康检查\n\n#### 问题\n\n您希望对数据库运行全面的诊断健康检查。您想了解是否存在任何数据字典或文件损坏，以及数据库中的任何其他潜在问题。\n\
    \n#### 解决方案\n\n您可以使用数据库健康监控基础结构来运行数据库的健康检查。您可以运行各种完整性检查，例如事务完整性检查和字典完整性检查。您可以通过查询\
    \ `V$HM_CHECK` 视图来获取可以运行的所有健康检查的列表：\n\n```\nSQL> select name from v$hm_check where\
    \ internal_check='N';\n```\n\n一旦决定了检查类型，请在 `DBMS_HM` 包的 `RUN_CHECK` 过程中指定检查的名称，如下所示：\n\
    \n```\nSQL> begin\n  2   dbms_hm.run_check('Dictionary Integrity Check','testrun1');\n\
    \  3  end;\n  4  /\n\nPL/SQL procedure successfully completed.\n\nSQL>\n```\n\n\
    您也可以从 Enterprise Manager 运行健康检查。转到 Advisor Central -> Checkers，然后从 Checkers 子页面中选择特定的检查器来运行健康检查。\n\
    \n#### 工作原理\n\nOracle 在遇到关键错误时会自动运行健康检查。您可以使用“解决方案”部分中所示的过程手动运行检查。数据库将所有健康检查结果存储在\
    \ ADR 中。\n\n您可以在数据库打开时运行大多数健康检查。只能在数据库关闭时运行重做完整性检查和数据库结构完整性检查——您必须将数据库置于 `NOMOUNT`\
    \ 状态才能运行这两项检查。\n\n您可以使用 `DBMS_HM` 包或通过 Enterprise Manager 查看健康检查的结果。以下是使用 `DBMS_HM`\
    \ 包获取健康检查报告的方法：\n\n```\nSQL> set long 100000\nSQL> set longchunksize 1000\nSQL>\
    \ set pagesize 1000\nSQL> set linesize 512\nSQL> select dbms_hm.get_run_report('testrun1')\
    \ from dual;\n\nDBMS_HM.GET_RUN_REPORT('TESTRUN1')\n-----------------------------------------------------------------\n\
    Basic Run Information\n Run Name                     : testrun1\n Run Id     \
    \                  : 61\n Check Name                   : Dictionary Integrity\
    \ Check\n Mode                         : MANUAL\n Status                     \
    \  : COMPLETED\n Start Time                   : 2011-04-19 15:46:50.313000 -04:00\n\
    \ End Time                     : 2011-04-19 15:46:54.117000 -04:00\n Error Encountered\
    \            : 0\n Source Incident Id           : 0\n Number of Incidents Created\
    \  : 0\n\nInput Paramters for the Run\n TABLE_NAME=ALL_CORE_TABLES\n CHECK_MASK=ALL\n\
    Run Findings And Recommendations\n\nSQL>\n```\n\n在此示例中，幸运的是，没有发现任何问题，因此没有建议，因为字典健康检查没有发现任何问题。您也可以转到\
    \ Advisor Central -> Checkers，并为您运行过的任何健康检查从“运行详细信息”页面运行报告。使用 `show hm_run`、`create\
    \ report` 和 `show report` 命令通过 ADRCI 实用程序查看健康检查报告。您可以使用视图 `V$HM_FINDING` 和 `V$HM_RECOMMENDATION`\
    \ 来调查健康检查的发现和相应建议。\n\n### 7-14. 创建 SQL 测试用例\n\n#### 问题\n\n您需要创建一个 SQL 测试用例，以便在不同的机器上重现\
    \ SQL 故障，无论是为了支持您自己的诊断工作，还是为了让 Oracle 支持能够重现该故障。"
  raw: "#### Solution\n\nYou can package the diagnostic information for one more incidents  through\
    \ either Database Control or through commands that you can execute from the ADRCI\
    \ interface. In this solution, we show you how to package incidents through ADRCI.\
    \ You can use various IPS commands to package all diagnostic files related to\
    \ a specific problem in a zipped format and send the file to Oracle Support. Here\
    \ are the steps to create an incident package.\n\n1.  Create an empty logical\
    \ package as shown here:\n\n    `adrci> ips create package`\n    `Created package\
    \ 1 without any contents, correlation level typical`\n    `adrci>`\n\n    In this\
    \ example, we created an empty package, but you can also create a package based\
    \ on an incident number, a problem number, a problem key or a time interval. In\
    \ all these cases, the package won't be empty - it'll include the diagnostic information\
    \ for the incident or problem that you specify. Since we created an empty package,\
    \ we need to add diagnostic information to that package in the next step.\n\n\
    2.  Add diagnostic information to the logical package with the `ips add incident`\
    \ command:\n\n    `adrci> ips add incident 43369 package 1`\n    `Added incident\
    \ 43369 to package 1`\n    `adrci>`\n\n    At this point, the incident 43369 is\
    \ associated with package 1, but there'sno diagnostic data in it yet.\n\n3.  Generate\
    \ the physical package.\n\n    `adrci> ips generate package 1 in \\app\\ora\\\
    diagnostics`\n    `Generated package 1 in file \\app\\ora\\diagnostics\\IPSPKG_20110419131046_COM_1.zip,\
    \ mode complete`\n    `adrci>`\n\n    When you issue the `generate package` command,\
    \ ADRCI gathers all relevant diagnostic files and adds them to a zip file in the\
    \ directory you designate.\n\n4.  Send the resulting zip file to Oracle Support.\n\
    \n    If you decide to add supplemental diagnostic data to an existing physical\
    \ package (zipped file), you can do so by specifying the `incremental` option\
    \ with the `generate package` command:\n\n    `adrci> ips generate package 1 in\
    \ \\app\\ora\\diagnostics incremental`\n\n    The incremental zip file created\
    \ by this command will have the term `INC` in the file name, indicating that it\
    \ is an incremental zip file.\n\n#### How It Works\n\nA physical package is the\
    \ zip file that you can send to Oracle Support for diagnosing a problem in your\
    \ database. Since an incident is a single occurrence of a problem, adding the\
    \ incident number to the logical package and generating the physical package rolls\
    \ up all the diagnostic data for that problem (incident) into a single zipped\
    \ file. In this example, we showed you how to first create an empty logical package\
    \ and then associate it with an incident number. However, the `ipc create package`\
    \ command has several options: you can specify the incident number or a problem\
    \ number directly when you create the logical package, and skip the `add incident`\
    \ command. You can also create a package that contains all incidents between two\
    \ points in time, as shown here:\n\n`adrci> ips create package time '2011-04-12\
    \ 10:00:00.00 -06:00' to '2011-04-12 23`\n`:00:00.00 -06:00'`\n`Created package\
    \ 2 based on time range 2011-04-12 12:00:00.000000 -06:00 to 2011-`\n`04-12 23:00:00.000000\
    \ -06:00, correlation level typical`\n`adrci>`\n\nThe package generated by the\
    \ previous command contains all incidents that occurred between 10 a.m. and 11\
    \ p.m. on April 12, 2011.\n\nNote that  you can also manually add a specific diagnostic\
    \ file to an existing  package. To add a file, you specify the file name in the\
    \ `ips add file` command—you are limited to adding only those diagnostic files\
    \ that are within the ADR base directory. Here is an example:\n\n`adrci> ips add\
    \ file <ADR_BASE>/diag/rdbms/orcl1/orcl1/trace/orcl_ora12345.trc package 1`\n\n\
    By default, the `ips generate package` command generates a zip file that includes\
    \ all files for a package. The incremental option will limit the files to those\
    \ that the database has generated since you originally generated the zipped file\
    \ for that package. The `ips show files` command shows all the files in a package\
    \ and the `ips show incidents` command shows all the incidents in a package. You\
    \ can issue the `ips remove file` command to remove a diagnostic file from a package.\n\
    \n### 7-13\\. Running a Database Health Check\n\n#### Problem\n\nYou'd like to\
    \ run a comprehensive diagnostic health check on your database. You'd like to\
    \ find out if there's any data dictionary or file corruption, as well as any other\
    \ potential problems in the database.\n\n#### Solution\n\nYou can use the database\
    \ health monitoring infrastructure to run a health check of your database. You\
    \ can run various integrity checks, such as transaction integrity checks and dictionary\
    \ integrity checks. You can get a list of all the health checks you can run by\
    \ querying the `V$HM_CHECK` view:\n\n`SQL> select name from v$hm_check where internal_check='N';`\n\
    \nOnce you decide on the type of check, specify the name of the check in the `DBMS_HM`\
    \ package's `RUN_CHECK` procedure, as shown here:\n\n` SQL> begin`\n`  2   dbms_hm.run_check('Dictionary\
    \ Integrity Check','testrun1');`\n`  3   end;`\n`  4  /`\n\n`PL/SQL procedure\
    \ successfully completed.`\n\n`SQL>`\n\nYou can also run a health check from the\
    \ Enterprise Manager. Go to Advisor Central ![images](images/U001.jpg) Checkers,\
    \ and select the specific checker from the Checkers subpage to run a health check.\n\
    \n#### How It Works\n\nOracle automatically runs a health check when it encounters\
    \ a critical error. You can run a manual check using the procedure shown in the\
    \ “Solution” section. The database stores all health check findings in the ADR.\n\
    \nYou can run most of the health checks while the database is open. You can run\
    \ the Redo Integrity Check and the DB Structure Integrity Check only when the\
    \ database is closed—you must place the database in the `NOMOUNT` state to run\
    \ these two checks.\n\nYou can view a health check's findings using either the\
    \ `DBMS_HM` package or through the Enterprise Manager. Here is how to get a health\
    \ check using the `DBMS_HM` package:\n\n`SQL> set long 100000`\n`SQL> set longchunksize\
    \ 1000`\n`SQL> set pagesize 1000`\n`SQL> set linesize 512`\n`SQL> select dbms_hm.get_run_report('testrun1')\
    \ from dual;`\n\n`DBMS_HM.GET_RUN_REPORT('TESTRUN1')`\n`-----------------------------------------------------------------`\n\
    `Basic Run Information`\n` Run Name                     : testrun1`\n` Run Id                       :\
    \ 61`\n` Check Name                   : Dictionary Integrity Check`\n` Mode                         :\
    \ MANUAL`\n` Status                       : COMPLETED`\n` Start Time                   :\
    \ 2011-04-19 15:46:50.313000 -04:00`\n` End Time                     : 2011-04-19\
    \ 15:46:54.117000 -04:00`\n` Error Encountered            : 0`\n` Source Incident\
    \ Id           : 0`\n` Number of Incidents Created  : 0`\n\n`Input Paramters for\
    \ the Run`\n` TABLE_NAME=ALL_CORE_TABLES`\n` CHECK_MASK=ALL`\n`Run Findings And\
    \ Recommendations`\n\n`SQL>`\n\nIn this example, fortunately, there are no findings\
    \ and thus no recommendations, since the dictionary health check didn't find any\
    \ problems. You can also go to Advisor Central ![images](images/U001.jpg) Checkers\
    \ and run a report from the Run Detail page for any health check you have run.\
    \ Use the `show hm_run`, `create report`, and `show report` commands to view health\
    \ check reports with the ADRCI utility. You can use the views `V$HM_FINDING` and\
    \ `V$HM_RECOMMENDATION` to investigate the findings as well as the recommendations\
    \ pursuant to a health check.\n\n### 7-14\\. Creating a SQL Test Case\n\n####\
    \ Problem\n\nYou need to create a SQL test case in order to reproduce a SQL failure\
    \ on a different machine, either to support your own diagnostic efforts, or to\
    \ enable Oracle Support to reproduce the failure."
  trans: "\n#### 解决方案\n\n您可以通过 Database Control 或 ADRCI 界面执行的命令，来打包更多事件的诊断信息。在本解决方案中，我们将展示如何通过\
    \ ADRCI 打包事件。您可以使用各种 IPS 命令，以压缩格式打包与特定问题相关的所有诊断文件，并将文件发送给 Oracle 支持。以下是创建事件包的步骤。\n\
    \n1.  创建一个空的逻辑包，如下所示：\n\n    ```\n    adrci> ips create package\n    Created package\
    \ 1 without any contents, correlation level typical\n    adrci>\n    ```\n\n \
    \   在此示例中，我们创建了一个空包，但您也可以基于事件编号、问题编号、问题键或时间间隔来创建包。在所有这些情况下，包都不会是空的——它将包含您指定的事件或问题的诊断信息。由于我们创建了一个空包，因此需要在下一步中向该包添加诊断信息。\n\
    \n2.  使用 `ips add incident` 命令向逻辑包添加诊断信息：\n\n    ```\n    adrci> ips add incident\
    \ 43369 package 1\n    Added incident 43369 to package 1\n    adrci>\n    ```\n\
    \n    此时，事件 43369 与包 1 相关联，但其中还没有诊断数据。\n\n3.  生成物理包。\n\n    ```\n    adrci> ips\
    \ generate package 1 in \\app\\ora\\diagnostics\n    Generated package 1 in file\
    \ \\app\\ora\\diagnostics\\IPSPKG_20110419131046_COM_1.zip, mode complete\n  \
    \  adrci>\n    ```\n\n    当您发出 `generate package` 命令时，ADRCI 会收集所有相关的诊断文件，并将它们添加到您指定目录中的一个\
    \ zip 文件中。\n\n4.  将生成的 zip 文件发送给 Oracle 支持。\n\n    如果您决定向现有的物理包（zip 文件）添加补充诊断数据，可以通过在\
    \ `generate package` 命令中指定 `incremental` 选项来完成：\n\n    ```\n    adrci> ips generate\
