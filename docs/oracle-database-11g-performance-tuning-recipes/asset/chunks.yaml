    \ 'TRUE');\n ---------\n -- 步骤 4\n ---------\n  dbms_advisor.execute_task(my_task_name);\n\
    END;\n/\n```\n\n现在，你可以通过执行 `DBMS_SPACE` 包并指示其从手动执行的段顾问中提取信息（通过输入参数——详见表 1-6）来查看关于此表的段顾问建议，例如：\n\
    \n```sql\nSELECT\n 'Segment Advice --------------------------'|| chr(10) ||\n\
    \ 'TABLESPACE_NAME  : ' || tablespace_name   || chr(10) ||\n 'SEGMENT_OWNER  \
