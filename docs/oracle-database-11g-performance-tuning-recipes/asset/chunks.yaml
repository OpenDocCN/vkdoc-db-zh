- fmt: "### Step 1: Use DBMS_SQLTUNE to Create a Tuning Task\n\nThe first step is\
    \ to create a tuning task that is associated with the problem SQL statement. In\
    \ the following code, the SQL text is hard-coded as input to the `tune_sql` variable:\n\
    \n```sql\nDECLARE\n  tune_sql  CLOB;\n  tune_task VARCHAR2(30);\nBEGIN\n  tune_sql\
    \ := 'select count(*) from mgmt_db_feature_usage_ecm2';\n  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n\
    \    sql_text   => tune_sql\n   ,user_name  => 'STAGING'\n   ,scope      => 'COMPREHENSIVE'\n\
    \   ,time_limit => 60\n   ,task_name  => 'TUNE1'\n   ,description => 'Calling\
    \ SQL Tuning Advisor for one statement'\n);\nEND;\n/\n```\n\nThe prior code is\
    \ placed in a file named `sqltune.sql`, and executed as follows:\n\n```sql\nSQL>\
    \ @sqltune.sql\n```\n\nIf you need to later drop the tuning task, you can use\
    \ the `DBMS_SQLTUNE.DROP_TUNING_TASK` procedure. Obviously don't drop the tuning\
    \ task at this point because you'll need it for the next several steps.\n\n![images](images/square.jpg)\
    \ `Note` When working with tuning advice and SQL profiles, ensure that the database\
    \ account you're using has the `ADMINISTER SQL MANAGEMENT OBJECT` system privilege\
    \ granted to it. This privilege contains all of the privileges required to manage\
    \ tuning tasks and SQL profiles.\n\n### Step 2: Execute the Tuning Task\n\nThis\
    \ step runs the SQL Tuning Advisor to generate advice regarding any queries associated\
    \ with the tuning task (created in step 1):\n\n```sql\nSQL> exec dbms_sqltune.execute_tuning_task(task_name=>'TUNE1');\n\
    ```\n\n### Step 3: Run Tuning Advice Report\n\nNow use `DBMS_SQLTUNE` to extract\
    \ any tuning advice generated in step 2:\n\n```sql\nset long 10000\nset longchunksize\
    \ 10000\nset lines 132\nset pages 200\nselect dbms_sqltune.report_tuning_task('TUNE1')\
    \ from dual;\n```\n\nFor this example, the SQL Tuning Advisor recommends creating\
    \ a SQL profile. Here is a snippet from the output that contains the recommendation\
    \ and the code required to create the SQL profile:\n\n```\nRecommendation (estimated\
    \ benefit: 86.11%)\n ------------------------------------------\n  - Consider\
    \ accepting the recommended SQL profile to use parallel execution\n    for this\
    \ statement.\n    execute dbms_sqltune.accept_sql_profile(task_name => 'TUNE1',\
    \ task_owner\n            => 'SYS', replace => TRUE, profile_type =>\n       \
    \     DBMS_SQLTUNE.PX_PROFILE);\n-------------------------------------------\n\
    \  Executing this query parallel with DOP 8 will improve its response time\n \
    \ 86.11% over the original plan. However, there is some cost in enabling\n  parallel\
    \ execution...\n```\n\n### Step 4: Create and Accept SQL Profile\n\nTo actually\
    \ create the SQL profile, you need to run the code recommended by the SQL Tuning\
    \ Advisor (from step 3)—for example:\n\n```sql\nbegin\n-- This is the code from\
    \ the SQL Tuning Advisor\ndbms_sqltune.accept_sql_profile(\n    task_name => 'TUNE1',\n\
    \    task_owner => 'SYS',\n    replace => TRUE,\n    profile_type => DBMS_SQLTUNE.PX_PROFILE);\n\
    --\nend;\n/\n```\n\nWhen the prior code is run, it creates and enables the SQL\
    \ profile. Now whenever the associated SQL query is executed, the SQL profile\
    \ will be considered by the optimizer when formulating an execution plan.\n\n\
    ![images](images/square.jpg) `Tip` How do you know if a SQL profile is being used\
    \ by the optimizer? Set `AUTOTRACE` on and view the execution plan with the profile\
    \ enabled and then disabled. You should see a lower-cost execution plan being\
    \ used when the profile is enabled. Additionally, consider inspecting the `SQL_PROFILE`\
    \ column of `V$SQL`.\n\n#### How It Works\n\nThe only Oracle-supported method\
    \ for creating a SQL profile is to run the SQL Tuning Advisor and if recommended,\
    \ create a SQL profile using the Tuning Advisor's output. In other words, the\
    \ SQL Tuning Advisor determines if a SQL profile will help, and if so generates\
    \ the code required to create a SQL profile for a given query.\n\nThe “Solution”\
    \ section detailed how to manually run the SQL Tuning Advisor. Keep in mind that\
    \ as of Oracle Database 11g, this tuning task job automatically runs on a regularly\
    \ scheduled basis. See [Chapter 11](#Chapter11.html#ch11) for details on automatic\
    \ SQL tuning features. You can easily review the output of the automatic tuning\
    \ job via this query:\n\n```sql\nSQL> SELECT DBMS_AUTO_SQLTUNE.REPORT_AUTO_TUNING_TASK\
    \ FROM DUAL;\n```\n\nWe recommend that you review the output of the automatic\
    \ tuning job on a regular basis. The SQL Tuning Advisor will provide the code\
    \ to create and accept SQL profiles as part of the output.\n\n![images](images/square.jpg)\
    \ `Tip` See Recipe 12-2 for details on how to configure the automatic acceptance\
    \ of SQL profiles.\n\nAs noted in the “Solution” section, a SQL profile is created\
    \ and accepted via the `DBMS_SQLTUNE.ACCEPT_SQL_PROFILE` procedure. There are\
    \ many options available when using this procedure (see [Table 12-2](#Chapter12.html#tab_12_2)\
    \ for details).\n\n![images](images/t1202.jpg)\n\nThe `FORCE_MATCH` parameter\
    \ of `ACCEPT_SQL_PROFILE` requires further explanation. Recall that a SQL profile\
    \ is associated with a SQL statement. The SQL statement is identified via a hash\
    \ function (SQL signature). The hash function is generated after converting the\
    \ SQL text and removing extra white space. When setting `FORCE_MATCH` to `TRUE`,\
    \ this additionally normalizes literal values into bind values. This is similar\
    \ to the algorithm generated via the `FORCE` option of the `CURSOR_SHARING` database\
    \ initialization parameter.\n\nFor example, with `FORCE_MATCH` set to `TRUE`,\
    \ the following two SQL statements will generate the same SQL signature:\n\n```sql\n\
    SQL> select value from my_table where value = 'AA';\nSQL> select value from my_table\
    \ where value = 'bb';\n```\n\nThis allows SQL statements that use literal values\
    \ to share the same SQL profile. If there is a combination of literal values and\
    \ bind variables in a SQL statement, then literal values are not normalized.\n\
    \n#### SQL PROFILE VS. DATABASE PROFILE\n\nIt's puzzling that Oracle would choose\
    \ the name of \"profile\" and apply it to two diverse database features, namely\
    \ SQL profiles and database profiles. Perhaps in a future release, Oracle might\
    \ consider renaming SQL profiles to something like SQL Optional More Intelligent\
    \ Statistics That Make Your Queries Run Faster. Regardless, ensure you don't confuse\
    \ a SQL profile with a database profile.\n\nBriefly, a SQL profile is associated\
    \ with a SQL statement and contains corrections to statistics that help the optimizer\
    \ generate a more efficient execution plan. The SQL Tuning Advisor recommends\
    \ and generates the code required to create and accept a SQL profile, whereas\
    \ a database profile is an object assigned to a user that constrains database\
    \ resource usage and also enforces password security. A database profile is created\
    \ with the `CREATE PROFILE` statement.\n\n### 12-2. Automatically Accepting SQL\
    \ Profiles\n\n#### Problem\n\nYou realize that the Automatic SQL Tuning job runs\
    \ on a daily basis (in Oracle Database 11g or higher). You determine that the\
    \ automatic tuning job generates reasonable SQL profiles for problematic queries\
    \ and now want to enable the automatic acceptance of SQL profiles generated by\
    \ the automatic tuning job.\n\n![images](images/square.jpg) `Tip` See [Chapter\
    \ 11](#Chapter11.html#ch11) for full details on modifying the Automatic SQL Tuning\
    \ job."
