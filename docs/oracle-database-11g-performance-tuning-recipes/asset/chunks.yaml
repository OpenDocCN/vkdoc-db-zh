  trans: "#### 工作原理\n\n由于你在内部查询中引用了外部查询，执行关联子查询的过程本质上与简单子查询相反。在关联子查询中，外部查询会首先执行，因为内部查询需要外部查询的数据才能处理查询并检索结果。\n\
    \n执行关联子查询的步骤如下。这些步骤会针对外部查询的每一行重复执行：\n\n1.  从外部查询中检索一行。\n2.  执行内部查询。\n3.  外部查询比较从内部查询返回的值。\n\
    4.  如果在步骤 3 中存在值匹配，则该行将返回给用户。\n\n另一种关联子查询是在子查询中使用 `EXISTS` 子句。当你使用 `EXISTS` 时，会进行测试以查看内部查询是否至少返回一行。这是使用\
    \ `EXISTS` 运算符时发生的重要测试。从以下示例可以看出，内部查询中 `SELECT` 子句的列列表是无关紧要的。在那里包含一些内容只是为了满足正确的\
    \ SQL 语法。如果我们想查看哪些员工也是经理，我们可以使用 `EXISTS` 运算符与回`employees`表的自连接来确定此信息：\n\n```sql\n\
    SELECT employee_id, last_name, first_name\nFROM employees e\nWHERE EXISTS\n(SELECT\
    \ 'ANY LITERAL WILL DO HERE'\nFROM employees m\nWHERE e.employee_id = manager_id);\n\
    ```\n\n```\nEMPLOYEE_ID LAST_NAME                   FIRST_NAME\n----------- -------------------------\
    \ --------------------\n        100 King                        Steven\n     \
    \   101 Kochhar                     Neena\n        102 De Haan               \
    \      Lex\n        103 Hunold                      Alexander\n        108 Greenberg\
    \                   Nancy\n        114 Raphaely                    Den\n     \
    \   120 Weiss                       Matthew\n        121 Fripp               \
    \        Adam\n        122 Kaufling                    Payam\n        123 Vollman\
    \                     Shanta\n        124 Mourgos                     Kevin\n\
    \        145 Russell                     John\n        146 Partners          \
    \          Karen\n        147 Errazuriz                   Alberto\n        148\
    \ Cambrault                   Gerald\n        149 Zlotkey                    \
    \ Eleni\n        201 Hartstein                   Michael\n        205 Higgins\
    \                     Shelley\n\n18 rows selected.\n```\n\n如果你想在查询中测试相反的条件，也可以使用\
    \ `NOT EXISTS`。例如，你的 CEO 想要确定公司内经理与员工的比例。使用前一个示例的查询，我们可以首先使用 `EXISTS` 运算符来确定公司内经理的数量：\n\
    \n```sql\nSELECT count(*)\nFROM employees e\nWHERE EXISTS\n(SELECT 'TESTING 1,2,3'\n\
    FROM employees m\nWHERE e.employee_id = manager_id);\n```\n\n```\n  COUNT(*)\n\
    ----------\n        18\n```\n\n如果我们将 `EXISTS` 转换为 `NOT EXISTS`，我们可以确定公司内非经理的数量：\n\
    \n```sql\nSELECT count(*)\nFROM employees e\nWHERE NOT EXISTS\n(SELECT 'X'\nFROM\
    \ employees m\nWHERE e.employee_id = manager_id);\n```\n\n```\n COUNT(*)\n---------\n\
    \       89\n```\n\n### 8-7. 比较两张表以找出缺失的行\n\n#### 问题\n\n你需要比较两个表中某子集列的数据。你需要找出在一个表中存在但在另一个表中缺失的行。\n\
    \n#### 解决方案\n\n你可以使用 Oracle 的 `MINUS` 集合运算符来比较两组数据，并显示其中一个表中缺失的数据。使用任何 Oracle\
    \ 集合运算符时，`SELECT` 子句在列的数量以及每列的数据类型方面必须完全相同。\n\n举个例子，假设你为一家有线电视公司工作，你想找出哪些频道是免费提供的。为了测试，你可以先简单地获取你的公司提供的频道列表：\n\
    \n```sql\nSELECT channel_id FROM channels;\n```\n\n```\nCHANNEL_ID\n----------\n\
    \         2\n         3\n         4\n         5\n         9\n```\n\n然后，你可以通过查询\
    \ `COSTS` 表来运行一个查询，找出哪些频道有关联成本：\n\n```sql\nSELECT DISTINCT channel_id FROM costs\n\
    ORDER BY channel_id;\n```\n\n```\nCHANNEL_ID\n----------\n         2\n       \
    \  3\n         4\n```\n\n通过快速目视检查结果，免费频道是 5 和 9。通过使用集合运算符，在这个例子中是 `MINUS`，你可以从单个查询中得到这个结果：\n\
    \n```sql\nSELECT channel_id\nFROM channels\nMINUS\nSELECT channel_id\nFROM costs;\n\
    ```\n\n```\nCHANNEL_ID\n----------\n         5\n         9\n```\n\n#### 工作原理\n\
    \n在查询中使用集合运算符以获取有关缺失数据的更多信息也很常见。例如，你已经获得了免费频道列表，但你确实需要获取有关这些免费频道的更多信息，并希望在一个查询中完成所有操作：\n\
    \n```sql\nSELECT channel_id, channel_desc FROM channels\nWHERE channel_id IN\n\
    (SELECT channel_id\nFROM channels\nMINUS\nSELECT channel_id\nFROM costs);\n```\n\
    \n```\nCHANNEL_ID CHANNEL_DESC\n---------- --------------------\n         5 Catalog\n\
    \         9 Tele Sales\n```\n\n### 8-8. 比较两张表以找出匹配的行\n\n#### 问题\n\n你需要比较两个表中某子集列的数据。你需要查看这些表中所有匹配的行。\n\
    \n#### 解决方案\n\n你可以使用 Oracle 的 `INTERSECT` 集合运算符来比较两组数据，并显示两个表之间的匹配数据。再次强调，使用任何\
    \ Oracle 集合运算符时，`SELECT` 子句在列的数量以及每列的数据类型方面必须完全相同。\n\n使用免费频道的例子，我们现在想看看哪些频道不是免费的，并且有关联的成本。通过使用\
    \ `INTERSECT` 集合运算符，我们将只看到两个表之间匹配的行：\n\n```sql\nSELECT channel_id\nFROM channels\n\
    INTERSECT\nSELECT channel_id\nFROM costs;\n```\n\n```\nCHANNEL_ID\n----------\n\
    \         2\n         3\n         4\n```\n\n#### 工作原理\n\n使用 `INTERSECT` 时，可以将其视为基于\
    \ `SELECT` 语句中的列列表，两个表之间重叠的数据。\n\n### 8-9. 合并类似 SELECT 语句的结果\n\n#### 问题\n\n你需要合并两个类似\
    \ `SELECT` 语句之间的结果，并希望在一个查询中完成。\n\n#### 解决方案\n\n你可以使用 Oracle 集合运算符 `UNION` 或 `UNION\
    \ ALL` 来合并两个类似查询的结果。使用 `UNION` 和 `UNION ALL` 的区别在于，`UNION` 会自动消除任何重复行，结果集的每一行都是唯一的。而使用\
    \ `UNION ALL` 时，它会显示所有匹配的行，包括重复行。使用 `UNION ALL` 可能比 `UNION` 性能更好，因为避免了用于消除重复项的排序操作。如果你的应用程序可以在处理过程中消除重复项，那么使用\
    \ `UNION ALL` 所获得的性能提升可能是值得的。\n\n在 Oracle 的示例模式中，我们有 `SCOTT.EMP` 表和 `HR.EMPLOYEES`\
    \ 表。如果我们想查看两个表中的所有员工，可以使用 `UNION` 集合运算符来获取结果：\n\n```sql\nSELECT empno, hiredate\
    \ FROM scott.emp\nUNION\nSELECT employee_id, hire_date FROM hr.employees;\n```\n\
    \n```\n     EMPNO HIREDATE\n---------- ---------\n       100 17-JUN-87\n     \
    \  101 21-SEP-89\n       102 13-JAN-93\n       ...\n      7902 03-DEC-81\n   \
    \   7934 23-JAN-82\n      7997 15-AUG-11\n\n122 rows selected.\n```"
- fmt: "## How It Works\n\nYou are running two queries where you have a nearly identical\
    \ column list, but let's say you have one additional column on one table. In this\
    \ case, we have the `COMM` column on the `SCOTT.EMP` table, which is the commission\
    \ amount an employee has earned. You don't have an equivalent column on the `HR.EMPLOYEES`\
    \ table. By using `NULL` in the missing column, you can still use a set operator\
    \ such as `UNION` as long as you account for any missing columns on either side\
    \ of the operation:\n\n```sql\nSELECT empno, mgr, hiredate, sal, deptno, comm\n\
    FROM scott.emp\nUNION\nSELECT employee_id, manager_id, hire_date, salary, department_id,\
    \ NULL\nFROM hr.employees;\n```\n\n```\n     EMPNO        MGR HIREDATE       \
    \   SAL      DEPTNO        COMM\n---------- --------- ---------- ---------- ----------\
    \ ----------\n       100            17-JUN-87       24000         90\n       101\
    \        100 21-SEP-89       17000         90\n       102        100 13-JAN-93\
    \       17000         90\n       ...\n      7369       7902 17-DEC-80        \
    \ 800         20\n      7499       7698 20-FEB-81        1600         30     \
    \   300\n      7521       7698 22-FEB-81        1250         30        500\n \
    \     7566       7839 02-APR-81        2975         20\n      7654       7698\
    \ 28-SEP-81        1250         30       1400\n```\n\nAfter examining the `HR.EMPLOYEES`\
    \ table, there is a column named `COMMISSION_PCT`. We can derive the actual commission\
    \ based on this column, and add it to the previous query. Also, our manager has\
    \ told us that he or she wants to see a value in the commission column for all\
    \ employees, even if they earn no commission:\n\n```sql\nSELECT empno, mgr, hiredate,\
    \ sal, deptno, nvl(comm,0)\nFROM scott.emp\nUNION\nSELECT employee_id, manager_id,\
    \ hire_date, salary, department_id,\nnvl(salary*commission_pct/100,0)\nFROM hr.employees;\n\
    ```\n\n```\n     EMPNO        MGR HIREDATE          SAL      DEPTNO NVL(COMM,0)\n\
    ---------- --------- ---------- ---------- ---------- -----------\n       100\
    \            17-JUN-87       24000         90            0\n       101       \
    \ 100 21-SEP-89       17000         90            0\n       102        100 13-JAN-93\
    \       17000         90            0\n       ...\n       147        100 10-MAR-97\
    \       12000         80           36\n       148        100 15-OCT-99       11000\
    \         80           33\n       149        100 29-JAN-00       10500       \
    \  80           21\n       ...\n      7499       7698 20-FEB-81        1600  \
    \       30          300\n      7521       7698 22-FEB-81        1250         30\
    \          500\n      7566       7839 02-APR-81        2975         20       \
    \     0\n```\n\nOne point to stress again is that the datatypes for each column\
    \ also must be the same. For example, we are doing a union between the `SCOTT.EMP`\
    \ table and the `HR.DEPARTMENTS` table, and want to see a combined list of the\
    \ department numbers, along with their locations. However, based on the datatype\
    \ list, we cannot use an Oracle set operator such as `UNION` for this, as the\
    \ location column for each table is different:\n\n```sql\nSQL> desc scott.dept\n\
    \ Name                                      Null?    Type\n -----------------------------------------\
    \ -------- ------------------------\n DEPTNO                                 \
    \   NOT NULL NUMBER(2)\n DNAME                                              VARCHAR2(14)\n\
    \ LOC                                                VARCHAR2(13)\n\nSQL> desc\
    \ hr.departments\n Name                                      Null?    Type\n -----------------------------------------\
    \ -------- ------------------------\n DEPARTMENT_ID                          \
    \   NOT NULL NUMBER(4)\n DEPARTMENT_NAME                           NOT NULL VARCHAR2(30)\n\
    \ MANAGER_ID                                         NUMBER(6)\n LOCATION_ID \
    \                                       NUMBER(4)\n```\n\n```sql\nSQL> l\n  1\
    \  SELECT deptno, loc FROM scott.dept\n  2  UNION\n  3* select department_id,\
    \ location_id from hr.departments\nSQL> /\nSELECT deptno, loc FROM scott.dept\n\
    \               *\nERROR at line 1:\nORA-01790: expression must have same datatype\
    \ as corresponding expression\n```\n\n## 8-10. Searching for a Range of Values\n\
    \n### Problem\n\nYou need to retrieve data from your database based on a range\
    \ of values for a given column.\n\n### Solution\n\nThe `BETWEEN` clause is commonly\
    \ used to retrieve a range of values from a database. It is most commonly used\
    \ with dates, timestamps, and numbers, but can also be used with alphanumeric\
    \ data. It is an efficient way of retrieving data from the database when an exact\
    \ set of values is not known for a column within the `WHERE` clause. For instance,\
    \ if we wanted to see all employees that were hired between the year 2000 and\
    \ through the year 2010, the query could be written as follows:\n\n```sql\nSELECT\
    \ last_name, first_name, hire_date\nFROM employees\nWHERE hire_date BETWEEN '2000-01-01'\
    \ and '2010-12-31'\nORDER BY hire_date;\n```\n\nWhen using the `BETWEEN` clause,\
    \ it is an efficient way to find a range of values for a column, and works for\
    \ a multitude of datatypes. If you want to get a range of values for a `NUMBER`\
    \ datatype as in the `SALARY` column, a range can be given:\n\n```sql\nSELECT\
    \ last_name, first_name, salary\nFROM employees\nWHERE salary BETWEEN 20000 and\
    \ 30000\nORDER BY salary;\n```\n\nIf you want to add to the foregoing query and\
    \ get only those employees whose last names are in the first half of the alphabet,\
    \ you can supply a range to satisfy this request. In order to guarantee all values,\
    \ we filled out the possible values to the 25-character length of the `last_name`\
    \ column:\n\n```sql\nSELECT last_name, first_name, salary\nFROM employees\nWHERE\
    \ salary BETWEEN 20000 and 30000\nAND last_name BETWEEN 'Aaaaaaaaaaaaaaaaaaaaaaaaa'\n\
    AND 'Mzzzzzzzzzzzzzzzzzzzzzzzz'\nORDER BY salary;\n```"
  raw: '#### How It Works


    You are running two queries where you have a nearly identical column list, but
    let''s say you have one additional column on one table. In this case, we have
    the `COMM` column on the `SCOTT.EMP` table, which is the commission amount an
    employee has earned. You don''t have an equivalent column on the `HR.EMPLOYEES`
    table. By using `NULL` in the missing column, you can still use a set operator
    such as `UNION` as long as you account for any missing columns on either side
    of the operation:


    `SELECT empno, mgr, hiredate, sal, deptno, comm`

    `FROM scott.emp`

    `UNION`

    **`SELECT employee_id, manager_id, hire_date, salary, department_id, NULL`**

    `FROM hr.employees;`

    `     EMPNO        MGR HIREDATE         SAL     DEPTNO       COMM`

    `---------- ---------- --------- ---------- ---------- ----------`

    `       100            17-JUN-87      24000         90`

    `       101        100 21-SEP-89      17000         90`

    `       102        100 13-JAN-93      17000         90`

    `       ...`

    `      7369       7902 17-DEC-80        800         20`

    `      7499       7698 20-FEB-81       1600         30        300`

    `      7521       7698 22-FEB-81       1250         30        500`

    `      7566       7839 02-APR-81       2975         20`

    `      7654       7698 28-SEP-81       1250         30       1400`


    After examining the `HR.EMPLOYEES` table, there is a column named `COMMISSION_PCT`.
    We can derive the actual commission based on this column, and add it to the previous
    query. Also, our manager has told us that he or she wants to see a value in the
    commission column for all employees, even if they earn no commission:


    `SELECT empno, mgr, hiredate, sal, deptno, nvl(comm,0)`

    `FROM scott.emp`

    `UNION`

    `SELECT employee_id, manager_id, hire_date, salary, department_id,`

    **`nvl(salary*commission_pct/100,0)`**

    `FROM hr.employees;`


    `     EMPNO        MGR HIREDATE         SAL     DEPTNO NVL(COMM,0)`

    `---------- ---------- --------- ---------- ---------- -----------`

    `       100            17-JUN-87      24000         90           0`

    `       101        100 21-SEP-89      17000         90           0`

    `       102        100 13-JAN-93      17000         90           0`

    `       ...`

    `       147        100 10-MAR-97      12000         80          36`

    `       148        100 15-OCT-99      11000         80          33`

    `       149        100 29-JAN-00      10500         80          21`

    `       ...`

    `      7499       7698 20-FEB-81       1600         30         300`

    `      7521       7698 22-FEB-81       1250         30         500`

    `      7566       7839 02-APR-81       2975         20           0`


    One point to stress again is that the datatypes for each column also must be the
    same. For example, we are doing a union between the `SCOTT.EMP` table and the
    `HR.DEPARTMENTS` table, and want to see a combined list of the department numbers,
    along with their locations. However, based on the datatype list, we cannot use
    an Oracle set operator such as `UNION` for this, as the location column for each
    table is different:


    `SQL> desc scott.dept`

    ` Name                                      Null?    Type`

    ` ----------------------------------------- -------- ------------------------`


    ` DEPTNO                                    NOT NULL NUMBER(2)`

    ` DNAME                                              VARCHAR2(14)`

    ` LOC                                                VARCHAR2(13)`


    `SQL> desc hr.departments`

    ` Name                                      Null?    Type`

    ` ----------------------------------------- -------- ------------------------`


    ` DEPARTMENT_ID                             NOT NULL NUMBER(4)`

    ` DEPARTMENT_NAME                           NOT NULL VARCHAR2(30)`

    ` MANAGER_ID                                         NUMBER(6)`

    **`LOCATION_ID`****`NUMBER(4)`**


    `SQL> l`

    `  1  SELECT deptno, loc FROM scott.dept`

    `  2  UNION`

    `  3* select department_id, location_id from hr.departments`

    `SQL> /`

    `SELECT deptno, loc FROM scott.dept`

    `               *`

    `ERROR at line 1:`

    `ORA-01790: expression must have same datatype as corresponding expression`


    ### 8-10. Searching for a Range of Values


    #### Problem


    You need to retrieve data from your database based on a range of values for a
    given column.


    #### Solution


    The `BETWEEN` clause is commonly used to retrieve a range of values from a database.
    It is most commonly used with dates, timestamps, and numbers, but can also be
    used with alphanumeric data. It is an efficient way of retrieving data from the
    database when an exact set of values is not known for a column within the `WHERE`
    clause. For instance, if we wanted to see all employees that were hired between
    the year 2000 and through the year 2010, the query could be written as follows:


    `SELECT last_name, first_name, hire_date`

    `FROM employees`

    **`WHERE hire_date BETWEEN ''2000-01-01'' and ''2010-12-31''`**

    `ORDER BY hire_date;`


    When using the `BETWEEN` clause, it is an efficient way to find a range of values
    for a column, and works for a multitude of datatypes. If you want to get a range
    of values for a `NUMBER` datatype as in the `SALARY` column, a range can be given:


    `SELECT last_name, first_name, salary`

    `FROM employees`

    **`WHERE salary BETWEEN 20000 and 30000`**

    `ORDER BY salary;`


    If you want to add to the foregoing query and get only those employees whose last
    names are in the first half of the alphabet, you can supply a range to satisfy
    this request. In order to guarantee all values, we filled out the possible values
    to the 25-character length of the `last_name` column:


    `SELECT last_name, first_name, salary`

    `FROM employees`

    `WHERE salary BETWEEN 20000 and 30000`

    **`AND last_name BETWEEN ''Aaaaaaaaaaaaaaaaaaaaaaaaa''`**

    **`AND ''Mzzzzzzzzzzzzzzzzzzzzzzzz''`**

    `ORDER BY salary;`'
  trans: "## 工作原理\n\n你正在运行两个查询，它们的列列表几乎相同，但假设其中一个表多出了一列。在此例中，我们在 `SCOTT.EMP` 表中有一个额外的\
    \ `COMM` 列，它表示员工已获得的佣金金额。而 `HR.EMPLOYEES` 表中没有对应的列。通过在缺失的列中使用 `NULL`，只要考虑到操作两侧的任何缺失列，你仍然可以使用\
    \ `UNION` 这样的集合操作符：\n\n```sql\nSELECT empno, mgr, hiredate, sal, deptno, comm\n\
    FROM scott.emp\nUNION\nSELECT employee_id, manager_id, hire_date, salary, department_id,\
    \ NULL\nFROM hr.employees;\n```\n\n```\n     EMPNO        MGR HIREDATE       \
    \   SAL      DEPTNO        COMM\n---------- --------- ---------- ---------- ----------\
    \ ----------\n       100            17-JUN-87       24000         90\n       101\
    \        100 21-SEP-89       17000         90\n       102        100 13-JAN-93\
    \       17000         90\n       ...\n      7369       7902 17-DEC-80        \
    \ 800         20\n      7499       7698 20-FEB-81        1600         30     \
    \   300\n      7521       7698 22-FEB-81        1250         30        500\n \
    \     7566       7839 02-APR-81        2975         20\n      7654       7698\
    \ 28-SEP-81        1250         30       1400\n```\n\n检查 `HR.EMPLOYEES` 表后，发现有一个名为\
    \ `COMMISSION_PCT` 的列。我们可以根据此列计算出实际的佣金，并将其添加到之前的查询中。此外，我们的经理告诉我们，他希望看到佣金列对所有员工都有一个值，即使他们没有获得佣金：\n\
    \n```sql\nSELECT empno, mgr, hiredate, sal, deptno, nvl(comm,0)\nFROM scott.emp\n\
    UNION\nSELECT employee_id, manager_id, hire_date, salary, department_id,\nnvl(salary*commission_pct/100,0)\n\
    FROM hr.employees;\n```\n\n```\n     EMPNO        MGR HIREDATE          SAL  \
    \    DEPTNO NVL(COMM,0)\n---------- --------- ---------- ---------- ----------\
    \ -----------\n       100            17-JUN-87       24000         90        \
    \    0\n       101        100 21-SEP-89       17000         90            0\n\
    \       102        100 13-JAN-93       17000         90            0\n       ...\n\
    \       147        100 10-MAR-97       12000         80           36\n       148\
    \        100 15-OCT-99       11000         80           33\n       149       \
    \ 100 29-JAN-00       10500         80           21\n       ...\n      7499  \
    \     7698 20-FEB-81        1600         30          300\n      7521       7698\
    \ 22-FEB-81        1250         30          500\n      7566       7839 02-APR-81\
    \        2975         20            0\n```\n\n这里需要再次强调的一点是，每列的数据类型也必须相同。例如，我们要在\
    \ `SCOTT.DEPT` 表和 `HR.DEPARTMENTS` 表之间进行联合，并希望看到部门编号及其位置的组合列表。然而，根据数据类型列表，我们不能为此使用\
    \ Oracle 的集合操作符（如 `UNION`），因为每个表的位置列是不同的：\n\n```sql\nSQL> desc scott.dept\n Name\
    \                                      Null?    Type\n -----------------------------------------\
    \ -------- ------------------------\n DEPTNO                                 \
    \   NOT NULL NUMBER(2)\n DNAME                                              VARCHAR2(14)\n\
    \ LOC                                                VARCHAR2(13)\n\nSQL> desc\
    \ hr.departments\n Name                                      Null?    Type\n -----------------------------------------\
    \ -------- ------------------------\n DEPARTMENT_ID                          \
    \   NOT NULL NUMBER(4)\n DEPARTMENT_NAME                           NOT NULL VARCHAR2(30)\n\
    \ MANAGER_ID                                         NUMBER(6)\n LOCATION_ID \
    \                                       NUMBER(4)\n```\n\n```sql\nSQL> l\n  1\
    \  SELECT deptno, loc FROM scott.dept\n  2  UNION\n  3* select department_id,\
    \ location_id from hr.departments\nSQL> /\nSELECT deptno, loc FROM scott.dept\n\
    \               *\nERROR at line 1:\nORA-01790: expression must have same datatype\
    \ as corresponding expression\n```\n\n## 8-10. 搜索值范围\n\n### 问题\n\n你需要根据给定列的值范围从数据库中检索数据。\n\
    \n### 解决方案\n\n`BETWEEN` 子句通常用于从数据库中检索值的范围。它最常用于日期、时间戳和数字，但也可用于字母数字数据。当在 `WHERE`\
    \ 子句中不知道某个列的确切值集合时，这是从数据库中检索数据的有效方法。例如，如果我们想查看在 2000 年至 2010 年期间雇用的所有员工，查询可以这样编写：\n\
    \n```sql\nSELECT last_name, first_name, hire_date\nFROM employees\nWHERE hire_date\
    \ BETWEEN '2000-01-01' and '2010-12-31'\nORDER BY hire_date;\n```\n\n使用 `BETWEEN`\
    \ 子句是查找列值范围的有效方法，并且适用于多种数据类型。如果你想获取 `SALARY` 列（`NUMBER` 数据类型）的值范围，可以给出一个范围：\n\n\
    ```sql\nSELECT last_name, first_name, salary\nFROM employees\nWHERE salary BETWEEN\
    \ 20000 and 30000\nORDER BY salary;\n```\n\n如果你想在上述查询的基础上，只获取姓氏在字母表前半部分的员工，你可以提供一个范围来满足这个要求。为了确保包含所有可能的值，我们将范围填充到了\
    \ `last_name` 列的最大长度 25 个字符：\n\n```sql\nSELECT last_name, first_name, salary\n\
    FROM employees\nWHERE salary BETWEEN 20000 and 30000\nAND last_name BETWEEN 'Aaaaaaaaaaaaaaaaaaaaaaaaa'\n\
    AND 'Mzzzzzzzzzzzzzzzzzzzzzzzz'\nORDER BY salary;\n```"
- fmt: '### How It Works


    使用`BETWEEN`子句时一个常见的陷阱是处理日期类型的列，无论是`DATE`数据类型、`TIMESTAMP`数据类型还是其他任何基于日期的数据类型。如果构造不当，结果集中可能会遗漏所需的行。


    这种情况经常发生的原因是，日期查询通常使用年、月、日的组合来完成。重要的是要记住，尽管Oracle数据库中基于日期的字段格式通常默认为年、月、日的格式，但时间元素必须始终被考虑在内，否则查询可能会遗漏行。在第一个示例中，我们有一位员工Sarah
    Bell，她于1996年2月4日入职：


    ```

    SELECT hire_date FROM employees

    WHERE email = ''SBELL'';

    ```


    ```

    HIRE_DATE

    ----------

    1996-02-04

    ```


    如果我们查询数据库，并且没有考虑任何日期列的时间元素，就可能会遗漏结果集中的关键行。因此，了解列的时间部分是否包含在数据构成中非常重要。在本例中，`hire_date`列确实存在时间元素：


    ```

    SELECT last_name, first_name, hire_date

    FROM employees

    WHERE hire_date = ''1996-02-04'';

    ```


    ```

    no rows selected

    ```


    有时，当行被插入数据库时，日期或时间戳的时间部分可能会被截断。然而，在编写高效的SQL时，必须始终假设所有基于日期的列都存在时间元素。基于这个假设，我们可以修改前面的查询以考虑`hire_date`列中的时间元素：


    ```

    SELECT last_name, first_name, to_char(hire_date,''yyyy-mm-dd:hh24:mi:ss'') hire_date

    FROM employees

    WHERE hire_date

    BETWEEN TO_DATE(''1996-02-04:00:00:00'',''yyyy-mm-dd:hh24:mi:ss'')

    AND TO_DATE(''1996-02-04:23:59:59'',''yyyy-mm-dd:hh24:mi:ss'');

    ```


    ```

    LAST_NAME                  FIRST_NAME           HIRE_DATE

    ------------------------- -------------------- -------------------

    Bell                      Sarah                1996-02-04:12:30:46

    ```


    这是一个类似的案例，我们在查询中执行`SELECT`以检索给定月份的所有数据。在本例中，我们检索1997年9月入职的所有员工。如果我们从`BETWEEN`子句中省略时间元素，实际上可能会遗漏符合查询条件的数据：


    ```

    SELECT last_name, first_name, hire_date

    FROM employees

    WHERE hire_date

    BETWEEN ''1997-09-01'' and ''1997-09-30'';

    ```


    ```

    LAST_NAME                  FIRST_NAME           HIRE_DATE

    ------------------------- -------------------- ----------

    Chen                      John                 1997-09-28

    ```


    ```

    SELECT last_name, first_name, hire_date

    FROM employees

    WHERE hire_date

    BETWEEN TO_DATE(''1997-09-01:00:00:00'',''yyyy-mm-dd:hh24:mi:ss'')

    AND TO_DATE(''1997-09-30:23:59:59'',''yyyy-mm-dd:hh24:mi:ss'');

    ```


    ```

    LAST_NAME                  FIRST_NAME           HIRE_DATE

    ------------------------- -------------------- ----------

    Chen                      John                 1997-09-28

    Sciarra                   Ismael               1997-09-30

    ```


    如果你在查询中使用`BETWEEN`子句，并且`WHERE`子句中指定的列上存在索引，那么Oracle优化器可以使用该索引来检索数据。你需要执行执行计划来验证是否属于这种情况，但使用`BETWEEN`意味着如果存在索引，通常可以使用它，并且可以成为使用值范围从数据库中选择数据的有效方式：


    ```

    SELECT last_name, first_name, salary

    FROM employees

    WHERE last_name between ''Ba'' and ''Bz''

    ORDER BY salary;

    ```


    ```

    ----------------------------------------------------

    | Id  | Operation                    | Name        |

    ----------------------------------------------------

    |   0 | SELECT STATEMENT             |             |

    |   1 |  SORT ORDER BY               |             |

    |   2 |   TABLE ACCESS BY INDEX ROWID| EMPLOYEES   |

    |   3 |    INDEX RANGE SCAN          | EMP_NAME_IX |

    ----------------------------------------------------

    ```


    ### 8-11. Handling Null Values


    #### Problem


    你的一些数据库数据中存在空值，需要了解在数据中处理空值的后果。你还需要编写查询来正确处理此类空值。


    #### Solution


    空值必须以特定方式处理，具体取决于你是在`SELECT`子句中搜索数据中的空值，还是在`WHERE`子句中尝试确定在发现空值时该怎么做。'
  raw: '#### How It Works


    One common pitfall when using the `BETWEEN` clause is with the use of date-based
    columns, whether it be the `DATE` datatype, the `TIMESTAMP` datatype, or any other
    date-based datatype. If not constructed carefully, desired rows can be missed
    from the result set.


    One way this occurs is that often queries on dates are done using a combination
    of year, month, and day. It is important to remember that even though the format
    of the date-based fields on an Oracle database usually defaults to a year, month,
    and day type of format, the element of time must always be accounted for, else
    rows can be missed from a query. In this first example, we have an employee, Sarah
    Bell, who was hired February 4, 1996:


    `SELECT hire_date FROM employees`

    `WHERE email = ''SBELL'';`


    `HIRE_DATE`

    `----------`

    `1996-02-04`


    If we query the database, and don''t consider the time element for any date column,
    we can omit critical rows from our result set. Therefore it is important to know
    whether the time portion of the column is included in the makeup of the data.
    In this case, there is indeed a time element present in the `hire_date` column:


    `SELECT last_name, first_name, hire_date`

    `FROM employees`

    `WHERE hire_date = ''1996-02-04'';`


    `no rows selected`


    Sometimes, when rows are inserted into the database, the time portion of a date
    or timestamp can be truncated. However, when coding efficient SQL, it is important
    to always assume there is a time element present for any and all date-based columns.
    Based on that assumption, we can modify the foregoing query to consider the time
    element in the `hire_date` column:


    `SELECT last_name, first_name, to_char(hire_date,''yyyy-mm-dd:hh24:mi:ss'') hire_date`

    `FROM employees`

    `WHERE hire_date`

    **`BETWEEN TO_DATE(''1996-02-04:00:00:00'',''yyyy-mm-dd:hh24:mi:ss'')`**

    **`AND TO_DATE(''1996-02-04:23:59:59'',''yyyy-mm-dd:hh24:mi:ss'');`**


    `LAST_NAME                 FIRST_NAME           HIRE_DATE`

    `------------------------- -------------------- -------------------`

    `Bell                      Sarah                1996-02-04:12:30:46`


    Here is a similar case, where we are performing a `SELECT` to retrieve all data
    for a given month specified in the query. In this case, we are retrieving all
    employees who were hired in the month of September, 1997\. If we omit the time
    element from the `BETWEEN` clause, we can actually omit data that meets the criteria
    for our query:


    `SELECT last_name, first_name, hire_date`

    `FROM employees`

    `WHERE hire_date`

    **`BETWEEN ''1997-09-01'' and ''1997-09-30'';`**


    `LAST_NAME                 FIRST_NAME           HIRE_DATE`

    `------------------------- -------------------- ----------`

    `Chen                      John                 1997-09-28`


    `SELECT last_name, first_name, hire_date`

    `FROM employees`

    `WHERE hire_date`

    **`BETWEEN TO_DATE(''1997-09-01:00:00:00'',''yyyy-mm-dd:hh24:mi:ss'')`**

    **`AND TO_DATE(''1997-09-30:23:59:59'',''yyyy-mm-dd:hh24:mi:ss'');`**


    `LAST_NAME                 FIRST_NAME           HIRE_DATE`

    `------------------------- -------------------- ----------`

    `Chen                      John                 1997-09-28`

    `Sciarra                   Ismael               1997-09-30`


    If you are using a `BETWEEN` clause in your query, and there is an index on the
    column specified in the `WHERE` clause, the Oracle optimizer can use the index
    to retrieve the data. You would need to perform an explain plan to validate if
    this is the case, but using `BETWEEN` means an index can often be used  if one
    is present, and can be an efficient manner of selecting data from the database
    using a range of values:


    `SELECT last_name, first_name, salary`

    `FROM employees`

    **`WHERE last_name between ''Ba'' and ''Bz''`**

    `ORDER BY salary;`


    `----------------------------------------------------`

    `| Id  | Operation                    | Name        |`

    `----------------------------------------------------`

    `|   0 | SELECT STATEMENT             |             |`

    `|   1 |  SORT ORDER BY               |             |`

    `|   2 |   TABLE ACCESS BY INDEX ROWID| EMPLOYEES   |`

    `|   3 |    INDEX RANGE SCAN          | EMP_NAME_IX |`

    `----------------------------------------------------`


    ### 8-11\. Handling Null Values


    #### Problem


    You have null values in some of your database data, and need to understand the
    ramifications of dealing with null values in data. You also need to write queries
    to correctly deal with such nulls.


    #### Solution


    Null values have to be dealt with in a certain manner, depending on whether you
    are searching for null values in your data in the `SELECT` clause, or you are
    attempting to make a determination of what to do when a null value is found in
    the `WHERE` clause.'
