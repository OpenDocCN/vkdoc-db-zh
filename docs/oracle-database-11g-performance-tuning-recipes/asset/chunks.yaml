  trans: "\n#### 解决方案\n\n在应用程序中实现**绑定变量**可以极大地提高查询的效率和性能。本质上，绑定变量也称为替换变量，用于替换查询中的字面值。通过将绑定变量放入\
    \ SQL 语句中，这些语句可以在内存中被重复使用，从而无需经历整个昂贵的 SQL 解析过程。\n\n这是一个普通 SQL 语句的示例，`WHERE` 子句中显示了字面值：\n\
    \n```sql\nSELECT employee_id, last_name || ', ' || first_name employee_name\n\
    FROM employees\nWHERE employee_id = 115;\n```\n\n```\nEMPLOYEE_ID EMPLOYEE_NAME\n\
    ----------- -------------------------\n        115 Khoo, Alexander\n```\n\n在 Oracle\
    \ 中有几种定义绑定变量的方法。首先，你可以直接使用 SQL Plus。要在 SQL Plus 中完成此操作，首先需要定义一个变量及其数据类型。然后，你可以使用\
    \ `exec` 命令，该命令实际上会运行一个 PL/SQL 命令，用所需的值填充该变量。请注意，在 SQL Plus 中引用绑定变量时，需要在变量名前加一个冒号：\n\
    \n```sql\nSQL> variable g_emp_id number\nSQL> exec :g_emp_id := 115;\n```\n\n\
    ```\nPL/SQL procedure successfully completed.\n```\n\n定义变量并为其赋值后，你只需在 SQL 语句中替换该变量名即可。同样，由于它是一个绑定变量，你需要在它前面加一个冒号：\n\
    \n```sql\nSELECT employee_id, last_name || ', ' || first_name employee_name\n\
    FROM employees\nWHERE employee_id = :g_emp_id;\n```\n\n```\nEMPLOYEE_ID EMPLOYEE_NAME\n\
    ----------- -------------------------\n        115 Khoo, Alexander\n```\n\n你也可以在\
    \ PL/SQL 中为变量赋值。PL/SQL 的一个显著优点是，只要在 PL/SQL 中使用变量，它们就会自动成为绑定变量，因此不需要特殊的编码。而且，与\
    \ SQL Plus 不同，引用在 PL/SQL 块内定义的变量时不需要冒号：\n\n```sql\nSQL> set serveroutput on\n\
    \  1  DECLARE\n  2    v_emp_id employees.employee_id%TYPE := 200;\n  3    v_last_name\
    \ employees.last_name%TYPE;\n  4    v_first_name employees.first_name%TYPE;\n\
    \  5  BEGIN\n  6    SELECT last_name, first_name\n  7    INTO v_last_name, v_first_name\n\
    \  8    FROM employees\n  9    WHERE employee_id = v_emp_id;\n 10    dbms_output.put_line('Employee\
    \ Name = ' || v_last_name || ', ' || v_first_name);\n 11* END;\nSQL> /\n```\n\n\
    ```\nEmployee Name = Whalen, Jennifer\n```\n\n#### 工作原理\n\n使用绑定变量可以增加 SQL 语句在共享池中被重用的可能性。Oracle\
    \ 使用哈希算法为每个唯一的 SQL 语句分配一个值。如果 SQL 语句中使用了字面值，那么两个原本相同的语句的哈希值将会不同。通过使用绑定变量，这些语句在共享池中将具有相同的哈希值，从而可以避免部分昂贵的解析过程。\n\
    \n##### 重用是高效的\n\n重用之所以高效，是因为 Oracle 不需要为这些 SQL 语句经历整个解析过程。如果你的 SQL 语句中不使用绑定变量，而是使用字面值，那么这些语句就需要被完全解析。\n\
    \n请参阅 表 8-3 以回顾处理 SQL 语句所采取的步骤。一个被“硬解析”的语句必须执行所有步骤。如果一个语句是“软解析”，优化器通常不会执行优化和行源生成步骤。\n\
    \n![images](img/t0803.jpg)\n\n![images](img/t0803a.jpg)\n\n##### 可以避免硬解析\n\n通过使用绑定变量，可以避免硬解析，这有助于提升\
    \ SQL 查询的性能，并减少共享池中可能发生的内存量抖动。`TKPROF` 实用程序是验证 SQL 语句是否在共享池中被重用的一种方法。稍后，将提供使用绑定变量的\
    \ PL/SQL 代码示例，以及未使用绑定变量的 PL/SQL 代码示例。\n\n使用 `TKPROF` 实用程序，我们可以查看这些语句是如何被处理的。为了使用\
    \ `TKPROF` 实用程序查看此信息，我们必须首先在会话中启用跟踪：\n\n```sql\nalter session set sql_trace=true;\n\
    ```\n\n跟踪文件会生成在由 `diagnostic_dest` 或 `user_dump_dest` 参数设置指定的位置。以下 PL/SQL 块更新\
    \ employees 表，为所有员工加薪 3%。由于所有 PL/SQL 变量都被视为绑定变量，我们可以通过 `TKPROF` 输出看到，update 语句只被解析了一次，但执行了\
    \ 107 次：\n\n```sql\nBEGIN\nFOR i IN 100..206\nLOOP\nUPDATE employees\nSET salary=salary*1.03\n\
    WHERE employee_id = i;\nEND LOOP;\nCOMMIT;\nEND;\n```\n\n以下是 `TKPROF` 生成报告的摘录，该报告总结了启用跟踪的会话信息：\n\
    \n```\nSQL ID : f7mtnudzhm2py\nUPDATE EMPLOYEES SET SALARY=SALARY*1.03\nWHERE\n\
    \ EMPLOYEE_ID = :B1\n\ncall     count       cpu    elapsed       disk      query\
    \    current        rows\n------- ------  -------- ---------- ---------- ----------\
    \ ----------  ----------\nParse        1      0.00       0.00          0     \
    \     0          0           0\nExecute    107      0.01       0.00          0\
    \        107        112         107\nFetch        0      0.00       0.00     \
    \     0          0          0           0\n------- ------  -------- ----------\
    \ ---------- ---------- ----------  ----------\ntotal      108      0.01     \
    \  0.00          0        107        112         107\n```\n\n在以下示例中，我们使用 `execute\
    \ immediate` 命令通过动态 SQL 完成同样的操作：\n\n```sql\nBEGIN\nFOR i IN 100..206\nLOOP\nexecute\
    \ immediate 'UPDATE employees SET salary=salary*1.03 WHERE employee_id = ' ||\
    \ i;\nEND LOOP;\nCOMMIT;\nEND;\n```\n\n由于整个语句在执行前被组合在一起，变量在执行前被转换成了字面值。我们可以通过\
    \ `TKPROF` 输出看到，该语句在每次执行时都被解析：\n\n```\nSQL ID : 67776qbqqz5wc\nUPDATE employees\
    \ SET salary=salary*:\"SYS_B_0\"\nWHERE\n employee_id = :\"SYS_B_1\"\n\ncall \
    \    count       cpu    elapsed       disk      query    current        rows\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    Parse      107      0.00       0.00          0          0          0         \
    \  0\nExecute    107      0.00       0.04          0        107        112   \
    \      107\nFetch        0      0.00       0.00          0          0        \
    \  0           0\n------- ------  -------- ---------- ---------- ---------- ----------\
    \  ----------\ntotal      214      0.00       0.05          0        107     \
    \   112         107\n```\n"
- fmt: "## Bind Variables Are Usable with EXECUTE IMMEDIATE\n\nIf we want to use the\
    \ `execute immediate` command more efficiently, we can convert that `execute immediate`\
    \ command to use a bind variable with the `USING` clause, and specify a bind variable\
    \ within the `execute immediate` statement. The result shows that the statement\
    \ was parsed only one time:\n\n```\nBEGIN\n  FOR i IN 100..206\n  LOOP\n    execute\
    \ immediate 'UPDATE employees SET salary=salary*1.03 WHERE employee_id = :empno'\
    \ USING i;\n  END LOOP;\n  COMMIT;\nEND;\n```\n\n```\nSQL ID : 4y09bqzjngvq4\n\
    update employees set salary=salary*1.03\nwhere\n  employee_id = :empno\n```\n\n\
    ```\ncall     count       cpu    elapsed       disk      query    current    \
    \    rows\n------- ------  -------- ---------- ---------- ---------- ----------\
    \  ----------\nParse        1      0.00       0.00          0          0     \
    \     0           0\nExecute    107      0.01       0.01          0        107\
    \        112         107\nFetch        0      0.00       0.00          0     \
    \     0          0           0\n------- ------  -------- ---------- ----------\
    \ ---------- ----------  ----------\ntotal      108      0.01       0.01     \
    \     0        107        112         107\n```\n\n![images](images/square.jpg)\
    \ **Tip** Hard-parsing always occurs for DDL statements.\n\n### 8-14. Avoiding\
    \ Accidental Full Table Scans\n\n#### Problem\n\nYou have queries that should\
    \ be using indexes, but instead are doing full table scans. You want to avoid\
    \ doing full table scans when the optimizer could be using an index to retrieve\
    \ the data.\n\n#### Solution\n\nWhen constructing a SQL statement, a fundamental\
    \ rule to try to always observe, if possible, is to avoid using functions on the\
    \ left side of the comparison operator. A function essentially turns a column\
    \ into a literal value, and therefore the Oracle optimizer does not recognize\
    \ that converted value as a column any longer, but as a value instead.\n\nHere,\
    \ we're trying to get a list of all the employees that started since the year\
    \ 1999. Because we placed a function on the left side of the comparison operator,\
    \ the optimizer is forced to do a full table scan, even though the `HIRE_DATE`\
    \ column is indexed:\n\n```\nSELECT employee_id, salary, hire_date\nFROM employees\n\
    WHERE TO_CHAR(hire_date,'yyyy-mm-dd') >= '2000-01-01';\n```\n\n```\n---------------------------------------\n\
    | Id  | Operation         | Name      |\n---------------------------------------\n\
    |   0 | SELECT STATEMENT  |           |\n|   1 |  TABLE ACCESS FULL| EMPLOYEES\
    \ |\n---------------------------------------\n```\n\nBy moving the function to\
    \ the right side of the comparison operator and leaving `HIRE_DATE` as a pristine\
    \ column in the `WHERE` clause, the optimizer can now use the index on `HIRE_DATE`:\n\
    \n```\nSELECT employee_id, salary, hire_date\nFROM employees\nWHERE hire_date\
    \ >= TO_DATE('2000-01-01','yyyy-mm-dd');\n```\n\n```\n-------------------------------------------------\n\
    | Id  | Operation                   | Name      |\n-------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |           |\n|   1 |  TABLE ACCESS BY INDEX\
    \ ROWID| EMPLOYEES |\n|   2 |   INDEX RANGE SCAN          | EMP_I5    |\n-------------------------------------------------\n\
    ```\n\n#### How It Works\n\nFunctions are wonderful tools to convert a value or\
    \ return the desired value based on what you need from the database, but they\
    \ can be a performance killer if used incorrectly within a SQL statement. Make\
    \ sure all functions are on the right side of the comparison operator, and the\
    \ optimizer will be able to use any indexes on columns specified in the `WHERE`\
    \ clause. This rule holds true for any function. In certain cases, it is possible\
    \ Oracle will still use an index even if a function is on the left side of the\
    \ comparison operator, but this is usually the exception. See Recipe 8-12 for\
    \ an example of this.\n\nKeep in mind that the datatype for a given column in\
    \ the `WHERE` clause may change how the SQL statement needs to be modified to\
    \ move the function to the right side of the comparison operator. With the following\
    \ example, we had to change the comparison operator in order to effectively move\
    \ the function:\n\n```\nSELECT last_name, first_name\nFROM employees\nWHERE SUBSTR(phone_number,1,3)\
    \ = '515';\n```\n\n```\n---------------------------------------\n| Id  | Operation\
    \         | Name      |\n---------------------------------------\n|   0 | SELECT\
    \ STATEMENT  |           |\n|   1 |  TABLE ACCESS FULL| EMPLOYEES |\n---------------------------------------\n\
    ```\n\nIn order to effectively get all numbers in the 515 area code, we can use\
    \ a `BETWEEN` clause and capture all possible values. We can also use a `LIKE`\
    \ clause, as long as the wildcard character is on the trailing end of the condition.\
    \ By using either of these methods, the optimizer changed the execution plan to\
    \ use an index:\n\n```\nSELECT last_name, first_name\nFROM employees\nWHERE phone_number\
    \ BETWEEN '515.000.0000' and '515.999.9999';\n```\n\n```\nSELECT last_name, first_name\n\
    FROM employees\nWHERE phone_number LIKE '515%';\n```\n\n```\n-------------------------------------------------\n\
    | Id  | Operation                   | Name      |\n-------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |           |\n|   1 |  TABLE ACCESS BY INDEX\
    \ ROWID| EMPLOYEES |\n|   2 |   INDEX RANGE SCAN          | EMP_I6    |\n-------------------------------------------------\n\
    ```\n\n### 8-15. Creating Efficient Temporary Views\n\n#### Problem\n\nYou need\
    \ a table or a view of data that does not exist to construct a needed query, and\
    \ do not have the authority to create such a table or view on your database."
