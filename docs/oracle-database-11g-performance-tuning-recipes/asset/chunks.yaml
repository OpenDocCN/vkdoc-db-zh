  trans: "\n#### 问题\n\n您有一个表，其中的单行数据被存储在多个数据块中。这种情况会导致较高的 I/O 率，并使针对该表的查询运行缓慢。您需要重建这些跨块行，使得每行都能放入单个数据块中。\n\
    \n例如，您正在运行以下查询，该查询显示了段顾问的建议：\n\n```\nSELECT\n 'Task Name        : ' || f.task_name\
    \  || chr(10) ||\n 'Segment Name     : ' || o.attr2      || chr(10) ||\n 'Segment\
    \ Type     : ' || o.type       || chr(10) ||\n 'Partition Name   : ' || o.attr3\
    \      || chr(10) ||\n 'Message          : ' || f.message    || chr(10) ||\n 'More\
    \ Info        : ' || f.more_info TASK_ADVICE\nFROM dba_advisor_findings f\n  \
    \  ,dba_advisor_objects  o\nWHERE o.task_id   = f.task_id\nAND   o.object_id =\
    \ f.object_id\nORDER BY f.task_name;\n```\n\n以下是此示例的输出：\n\n```\nTASK_ADVICE\n\
    --------------------------------------------------------------------------------\n\
    Task Name        : EMP Advice\nSegment Name     : EMP\nSegment Type     : TABLE\n\
    Partition Name   :\nMessage          : The object has chained rows that can be\
    \ removed by re-org.\nMore Info        : 47 percent chained rows can be removed\
    \ by re-org.\n```\n\n从之前的输出来看，`EMP` 表中有很大比例的行受到行链接的影响，并在从该表检索数据时导致性能问题。您希望消除表中的链接行。\n\
    \n#### 解决方案\n\n解决表中行链接的一种方法是使用 `MOVE` 语句。当您移动一个表时，Oracle 需要在该表上获得一个排他锁；因此，您应该在表没有关联的活动事务时执行此操作。\n\
    \n此外，作为 `MOVE` 操作的一部分，所有行都会被分配一个新的 `ROWID`。这将使与该表关联的所有索引失效。因此，作为移动操作的一部分，您应该重建与被移动表关联的所有索引。此示例移动\
    \ `EMP` 表：\n\n```\nSQL> alter table emp move;\n```\n\n移动操作完成后，重建与被移动表关联的所有索引。您可以通过查询\
    \ `DBA/ALL/USER_INDEXES` 视图来验证索引的状态：\n\n```\nselect\n owner\n,index_name\n,status\n\
    from dba_indexes\nwhere table_name='EMP';\n```\n\n以下是一些示例输出：\n\n```\nOWNER   \
    \                       INDEX_NAME                     STATUS\n------------------------------\
    \ ------------------------------ --------\nMV_MAINT                       EMP_PK\
    \                         UNUSABLE\n```\n\n重建索引将使其重新可用：\n\n```\nSQL> alter index\
    \ emp_pk rebuild;\n```\n\n您现在可以手动为该段生成段顾问建议（参见配方 1-9），并运行本配方“问题”部分列出的查询，以查看行链接是否已解决。\n"
- fmt: "#### How It Works\n\n在数据块中会保留一定空间以容纳行内数据的增长。行大小通常会因为 `UPDATE` 语句增加了列值的大小而增长。如果块内没有足够的空闲空间来容纳增长后的大小，Oracle\
    \ 就会创建一个指针指向另一个有足够空间的块，并将该行的一部分存储到这个额外的块中。当单行数据存储在两个或更多块中时，这被称为**行链接**。这可能会导致性能问题，因为\
    \ Oracle 在检索被链接的行时，必须从多个块（而不是一个）中获取数据。\n\n少量的链接行不会对性能产生太大影响。一个粗略的指导原则是，如果一个表中超过\
    \ 15% 的行被链接，那么你应该采取纠正措施（例如移动表以重新组织它）。\n\n块中保留的空闲空间量由表的存储参数 `PCTFREE` 决定。`PCTFREE`\
    \ 的默认值是 10，意味着块的 10% 被保留为备用空间，用于那些更新后需要更多空间的行。如果你的表中有列在初始插入时为 `NULL`，之后被更新为包含较大的值，那么可以考虑将\
    \ `PCTFREE` 设置为更高的值，例如 40%。这将有助于防止行链接。\n\n相反，如果你的表在插入行后从未被更新过，那么可以考虑将 `PCTFREE`\
    \ 设置为 0。这将导致每个块存储更多的行，在检索数据时可以减少磁盘读取（从而获得更好的性能）。\n\n你可以通过查询 `DBA/ALL/USER_TABLES`\
    \ 视图来查看 `PCTFREE` 的设置，例如：\n\n```sql\nselect table_name, pct_free\nfrom user_tables;\n\
    ```\n\n移动操作会将每条记录从块中移除，并将记录重新插入到一个新块中。对于链接行，旧的链接行会被删除，并在块内重建为一个物理行。如果被移动的表的 `PCTFREE`\
    \ 设置较低，可以考虑在移动操作中将此参数重置为更高的值，例如：\n\n```sql\nSQL> alter table emp move pctfree\
    \ 40;\n```\n\n另一种验证行链接的方法（除了段顾问）是使用 `ANALYZE TABLE` 语句。首先，你必须创建一个表来保存 `ANALYZE\
    \ TABLE` 语句的输出：\n\n```sql\nSQL> @?/rdbms/admin/utlchain.sql\n```\n\n前面的脚本会创建一个名为\
    \ `CHAINED_ROWS` 的表。现在你可以运行 `ANALYZE` 语句来填充 `CHAINED_ROWS` 表：\n\n```sql\nSQL>\
    \ analyze table emp list chained rows;\n```\n\n然后查询 `CHAINED_ROWS` 表中的行数：\n\n\
    ```sql\nSQL> select count(*) from chained_rows where table_name='EMP';\n```\n\n\
    如果链接行的问题已解决，前面的查询将返回零行。通过这种方式识别链接行的好处是，你可以通过以下步骤修复被链接的行，而不会影响表中的其余记录：\n\n1.  创建一个临时表来存储链接行。\n\
    2.  从原始表中删除链接行。\n3.  将临时表中的行插入回原始表。\n\n下面是一个简短的例子来演示上述步骤。首先，创建一个临时表，其中包含 `EMP`\
    \ 表中那些在 `CHAINED_ROWS` 表中有对应记录的行：\n\n```sql\ncreate table temp_emp\nas select\
    \ *\nfrom emp\nwhere rowid in\n(select head_rowid from chained_rows where table_name\
    \ = 'EMP');\n```\n\n现在，从 `EMP` 表中删除那些在 `CHAINED_ROWS` 表中有对应记录的行：\n\n```sql\ndelete\
    \ from emp\nwhere rowid in\n(select head_rowid from chained_rows where table_name\
    \ = 'EMP');\n```\n\n现在将临时表中的记录插入到 `EMP` 表中：\n\n```sql\ninsert into emp select\
    \ * from temp_emp;\n```\n\n如果你重新分析该表，现在应该没有链接行了。完成后可以删除临时表。\n\n### UNDERSTANDING\
    \ THE ORACLE ROWID\n\n每个表中的每一行都有一个物理地址。行的地址由以下组合确定：\n\n*   数据文件号\n*   块号\n*  \
    \ 行在块内的位置\n*   对象号\n\n你可以通过查询 `ROWID` 伪列来显示表中行的地址，例如：\n\n```sql\nSQL> select rowid,\
    \ emp_id from emp;\n```\n\n这是一些示例输出：\n\n```\nROWID                  EMP_ID\n------------------\
    \ ----------\nAAAFWXAAFAAAAlWAAA          1\n```\n\n`ROWID` 伪列的值并未物理存储在数据库中。Oracle\
    \ 在你查询时计算它的值。`ROWID` 的内容显示为 base-64 值，可以包含字符 A–Z, a–z, 0–9, +, 和 /。你可以通过 `DBMS_ROWID`\
    \ 包将 `ROWID` 值转换为有意义的信息。例如，要显示行存储的文件号、块号和行号，可以发出以下语句：\n\n```sql\nselect\n emp_id\n\
    ,dbms_rowid.rowid_relative_fno(rowid) file_num\n,dbms_rowid.rowid_block_number(rowid)\
    \ block_num\n,dbms_rowid.rowid_row_number(rowid)   row_num\nfrom emp;\n```\n\n\
    这是一些示例输出：\n\n```\n    EMP_ID   FILE_NUM  BLOCK_NUM    ROW_NUM\n---------- ----------\
    \ ---------- ----------\n      2960          4        144        126\n      2961\
    \          4        144        127\n```\n\n你可以在 SQL 语句的 `SELECT` 和 `WHERE` 子句中使用\
    \ `ROWID` 值。在大多数情况下，`ROWID` 唯一标识一行。但是，不同表中存储在同一集群中的行可能具有相同的 `ROWID`。\n\n### 1-12.\
    \ Freeing Unused Table Space\n\n#### Problem\n\n你已经分析了段顾问的输出，并确定一个表有大量空闲空间。你想释放未使用的空间以提高执行全表扫描的查询的性能。\n\
    \n#### Solution\n\n执行以下步骤来收缩空间并重新调整表的高水位线：\n\n1.  为表启用行移动。\n2.  使用 `ALTER TABLE...SHRINK\
    \ SPACE` 语句释放未使用的空间。\n\n![images](images/square.jpg) **注意** 收缩表功能要求表所在表空间使用自动段空间管理。有关如何创建启用\
    \ ASSM 的表空间的详细信息，请参阅配方 1-2。\n\n收缩表时，需要移动行（如果有）。这意味着你必须启用行移动。此示例为 `INV` 表启用行移动：\n\
    \n```sql\nSQL> alter table inv enable row movement;\n```\n\n接下来通过 `ALTER TABLE`\
    \ 语句执行表收缩操作：\n\n```sql\nSQL> alter table inv shrink space;\n```\n\n你也可以通过 `CASCADE`\
    \ 子句来收缩任何索引段的空间：\n\n```sql\nSQL> alter table inv shrink space cascade;\n```\n\n\
    #### How It Works\n\n收缩表时，Oracle 会以最节省空间的方式重新组织块。Oracle 还会重新调整表的高水位线。这对导致全表扫描的查询有性能影响。在这些场景中，Oracle\
    \ 将检查高水位线以下的每个块。如果你注意到当表中没有很多行时，查询返回结果需要很长时间，这可能表明高水位线下有许多未使用的块（因为数据被删除了）。\n\n\
    你可以指示 Oracle 在收缩表时不重新调整高水位线。这是通过 `COMPACT` 子句完成的，例如：\n\n```sql\nSQL> alter table\
    \ inv shrink space compact;\n```\n\n当你使用 `COMPACT` 时，Oracle 会对表进行碎片整理，但不改变高水位线。你需要使用\
    \ `ALTER TABLE…SHRINK SPACE` 语句来重置高水位线。你可能想这样做是因为担心碎片整理和调整高水位线所需的时间。这允许你将表收缩分成两个较短的步骤，而不是一个较长的操作。\n\
    \n### 1-13. Compressing Data for Direct Path Loading"
  raw: '#### How It Works


    A certain amount of space is reserved in the block to accommodate growth within
    the row. Usually a row will increase in size due to an `UPDATE` statement that
    increases the size of a column value. If there isn''t enough free room in the
    block to accommodate the increased size, then Oracle will create a pointer to
    a different block that does have enough space and store part of the row in this
    additional block. When a single row is stored in two or more blocks, this is called
    *row chaining*. This can cause potential performance issues because Oracle will
    have to retrieve data from multiple blocks (instead of one) when retrieving a
    chained row.


    A small number of chained rows won''t have much impact on performance. One rough
    guideline is that if more than 15% of a table''s rows are chained, then you should
    take corrective action (such as moving the table to re-organize it).


    The amount of free space reserved in a block is determined by the table''s storage
    parameter of `PCTFREE`. The default value of `PCTFREE` is 10, meaning 10% of the
    block is reserved space to be used for updates that result in more space usage.
    If you have a table that has columns that are initially inserted as null and later
    updated to contain large values, then consider setting `PCTFREE` to a higher value,
    such as 40%. This will help prevent the row chaining.


    Conversely, if you have a table that is never updated after rows are inserted,
    then consider setting `PCTFREE` to 0\. This will result in more rows per block,
    which can lead to fewer disk reads (and thus better performance) when retrieving
    data.


    You can view the setting for `PCTFREE` by querying the `DBA/ALL/USER_TABLES` view—for
    example:


    `select table_name, pct_free`

    `from user_tables;`


    The move operation removes each record from the block and re-inserts the record
    into a new block. For chained rows, the old chained rows are deleted and rebuilt
    as one physical row within the block. If the table being moved has a low setting
    for `PCTFREE`, consider resetting this parameter to a higher value (as part of
    the move operation)—for example:


    `SQL> alter table emp move pctfree 40;`


    Another method for verifying row chaining (besides the Segment Advisor) is to
    use the `ANALYZE TABLE` statement. First you must create a table to hold output
    of the `ANALYZE TABLE` statement:


    `SQL> @?/rdbms/admin/utlchain.sql`


    The prior script creates a table named `CHAINED_ROWS`. Now you can run the `ANALYZE`
    statement to populate the `CHAINED_ROWS` table:


    `SQL> analyze table emp list chained rows;`


    Now query the number of rows from the `CHAINED_ROWS` table:


    `SQL> select count(*) from chained_rows where table_name=''EMP'';`


    If the issue with the chained rows has been resolved, the prior query will return
    zero rows. The advantage of identifying chained rows in this manner is that you
    can fix the rows that are chained without impacting the rest of the records in
    the table by doing the following:


    1.  Create a temporary holding table to store the chained rows.

    2.  Delete the chained rows from the original table.

    3.  Insert the rows from the temporary table into the original table.


    Here''s a short example to demonstrate the prior steps. First create a temporary
    table that contains the rows in the `EMP` table that have corresponding records
    in the `CHAINED_ROWS` table:


    `create table temp_emp`

    `as select *`

    `from emp`

    `where rowid in`

    `(select head_rowid from chained_rows where table_name = ''EMP'');`


    Now delete the records from `EMP` that have corresponding records in `CHAINED_ROWS`:


    `delete from emp`

    `where rowid in`

    `(select head_rowid from chained_rows where table_name = ''EMP'');`


    Now insert records in the temporary table into the `EMP` table:


    `insert into emp select * from temp_emp;`


    If you re-analyze the table, there should be no chained rows now. You can drop
    the temporary table when you''re finished.


    UNDERSTANDING THE ORACLE ROWID


    Every row in every table has a physical address. The address of a row is determined
    from a combination of the following:


    *   Datafile number

    *   Block number

    *   Location of the row within the block

    *   Object number


    You can display the address of a row in a table by querying the `ROWID` pseudo-column—for
    example:


    `SQL> select rowid, emp_id from emp;`


    Here''s some sample output:


    `ROWID                  EMP_ID`

    `------------------ ----------`

    `AAAFWXAAFAAAAlWAAA          1`


    The `ROWID` pseudo-column value isn''t physically stored in the database. Oracle
    calculates its value when you query it. The `ROWID` contents are displayed as
    base-64 values that can contain the characters A–Z, a–z, 0–9, +, and /. You can
    translate the `ROWID` value into meaningful information via the `DBMS_ROWID` package.
    For example, to display the file number, block number, and row number in which
    a row is stored, issue this statement:


    `select`

    ` emp_id`

    `,dbms_rowid.rowid_relative_fno(rowid) file_num`

    `,dbms_rowid.rowid_block_number(rowid) block_num`

    `,dbms_rowid.rowid_row_number(rowid)   row_num`

    `from emp;`


    Here''s some sample output:


    `    EMP_ID   FILE_NUM  BLOCK_NUM    ROW_NUM`

    `---------- ---------- ---------- ----------`

    `      2960          4        144        126`

    `      2961          4        144        127`


    You can use the `ROWID` value in the `SELECT` and `WHERE` clauses of a SQL statement.
    In most cases, the `ROWID` uniquely identifies a row. However, it''s possible
    to have rows in different tables that are stored in the same cluster and so contain
    rows with the same `ROWID`.


    ### 1-12\. Freeing Unused Table Space


    #### Problem


    You''ve analyzed the output of the Segment Advisor and have identified a table
    that has a large amount of free space. You want to free up the unused space to
    improve the performance queries that perform full table scans of the table.


    #### Solution


    Do the following to shrink space and re-adjust the high-water mark for a table:


    1.  Enable row movement for the table.

    2.  Use the `ALTER TABLE...SHRINK SPACE` statement to free up unused space.


    ![images](images/square.jpg) **Note** The shrink table feature requires that the
    table''s tablespace use automatic space segment management. See Recipe 1-2 for
    details on how to create an ASSM-enabled tablespace.


    When you shrink a table, this requires that rows (if any) be moved. This means
    you must enable row movement. This example enables row movement for the `INV`
    table:


    `SQL> alter table inv enable row movement;`


    Next the table shrink operation is executed via an `ALTER TABLE` statement:


    `SQL> alter table inv shrink space;`


    You can also shrink the space associated with any index segments via the `CASCADE`
    clause:


    `SQL> alter table inv shrink space cascade;`


    #### How It Works


    When you shrink a table, Oracle re-organizes the blocks in a manner that consumes
    the least amount of space. Oracle also re-adjusts the table''s high-water mark.
    This has performance implications for queries that result in full table scans.
    In these scenarios, Oracle will inspect every block below the high-water mark.
    If you notice that it takes a long time for a query to return results when there
    aren''t many rows in the table, this may be an indication that there are many
    unused blocks (because data was deleted) below the high-water mark.


    You can instruct Oracle to *not* re-adjust the high-water mark when shrinking
    a table. This is done via the `COMPACT` clause—for example:


    `SQL> alter table inv shrink space compact;`


    When you use `COMPACT`, Oracle defragments the table but doesn''t alter the high-water
    mark. You will need to use the `ALTER TABLE…SHRINK SPACE` statement to reset the
    high-water mark. You might want to do this because you''re concerned about the
    time it takes to defragment and adjust the high-water mark. This allows you to
    shrink a table in two shorter steps instead of one longer operation.


    ### 1-13. Compressing Data for Direct Path Loading'
  trans: "#### 工作原理\n\n数据块中会保留一定空间，以容纳行内数据的增长。行大小通常因 `UPDATE` 语句增大了列值而增加。如果块内没有足够的空闲空间来容纳增长后的行，Oracle\
    \ 会创建一个指向另一个有足够空间的块的指针，并将该行的一部分存储到这个额外的块中。当单行数据存储在两个或更多块中时，这被称为 **行链接**。这可能导致性能问题，因为\
    \ Oracle 在检索被链接的行时，必须从多个块（而非一个）中获取数据。\n\n少量的链接行不会对性能产生太大影响。一个粗略的指导原则是，如果一个表中超过\
    \ 15% 的行被链接，那么你应该采取纠正措施（例如移动表以重新组织它）。\n\n块中保留的空闲空间量由表的存储参数 `PCTFREE` 决定。`PCTFREE`\
    \ 的默认值是 10，意味着块的 10% 被保留为备用空间，用于那些更新后需要更多空间的行。如果你的表中有列在初始插入时为 `NULL`，之后被更新为包含较大的值，那么可以考虑将\
    \ `PCTFREE` 设置为更高的值，例如 40%。这将有助于防止行链接。\n\n相反，如果你的表在插入行后从未被更新过，那么可以考虑将 `PCTFREE`\
    \ 设置为 0。这将导致每个块存储更多的行，在检索数据时可以减少磁盘读取（从而获得更好的性能）。\n\n你可以通过查询 `DBA/ALL/USER_TABLES`\
    \ 视图来查看 `PCTFREE` 的设置，例如：\n\n```sql\nselect table_name, pct_free\nfrom user_tables;\n\
    ```\n\n移动操作会将每条记录从块中移除，并将记录重新插入到一个新块中。对于链接行，旧的链接行会被删除，并在块内重建为一个物理行。如果被移动的表的 `PCTFREE`\
    \ 设置较低，可以考虑在移动操作中将此参数重置为更高的值，例如：\n\n```sql\nSQL> alter table emp move pctfree\
    \ 40;\n```\n\n另一种验证行链接的方法（除了段顾问）是使用 `ANALYZE TABLE` 语句。首先，你必须创建一个表来保存 `ANALYZE\
    \ TABLE` 语句的输出：\n\n```sql\nSQL> @?/rdbms/admin/utlchain.sql\n```\n\n前面的脚本会创建一个名为\
    \ `CHAINED_ROWS` 的表。现在你可以运行 `ANALYZE` 语句来填充 `CHAINED_ROWS` 表：\n\n```sql\nSQL>\
    \ analyze table emp list chained rows;\n```\n\n然后查询 `CHAINED_ROWS` 表中的行数：\n\n\
    ```sql\nSQL> select count(*) from chained_rows where table_name='EMP';\n```\n\n\
    如果链接行的问题已解决，前面的查询将返回零行。通过这种方式识别链接行的好处是，你可以通过以下步骤修复被链接的行，而不会影响表中的其余记录：\n\n1.  创建一个临时表来存储链接行。\n\
    2.  从原始表中删除链接行。\n3.  将临时表中的行插入回原始表。\n\n下面是一个简短的例子来演示上述步骤。首先，创建一个临时表，其中包含 `EMP`\
    \ 表中那些在 `CHAINED_ROWS` 表中有对应记录的行：\n\n```sql\ncreate table temp_emp\nas select\
    \ *\nfrom emp\nwhere rowid in\n(select head_rowid from chained_rows where table_name\
    \ = 'EMP');\n```\n\n现在，从 `EMP` 表中删除那些在 `CHAINED_ROWS` 表中有对应记录的行：\n\n```sql\ndelete\
    \ from emp\nwhere rowid in\n(select head_rowid from chained_rows where table_name\
    \ = 'EMP');\n```\n\n现在将临时表中的记录插入到 `EMP` 表中：\n\n```sql\ninsert into emp select\
    \ * from temp_emp;\n```\n\n如果你重新分析该表，现在应该没有链接行了。完成后可以删除临时表。\n\n### 理解 Oracle ROWID\n\
    \n每个表中的每一行都有一个物理地址。行的地址由以下组合确定：\n\n*   数据文件号\n*   块号\n*   行在块内的位置\n*   对象号\n\n\
    你可以通过查询 `ROWID` 伪列来显示表中行的地址，例如：\n\n```sql\nSQL> select rowid, emp_id from emp;\n\
    ```\n\n这是一些示例输出：\n\n```\nROWID                  EMP_ID\n------------------ ----------\n\
    AAAFWXAAFAAAAlWAAA          1\n```\n\n`ROWID` 伪列的值并未物理存储在数据库中。Oracle 在你查询时计算它的值。`ROWID`\
    \ 的内容显示为 base-64 值，可以包含字符 A–Z, a–z, 0–9, +, 和 /。你可以通过 `DBMS_ROWID` 包将 `ROWID`\
    \ 值转换为有意义的信息。例如，要显示行存储的文件号、块号和行号，可以发出以下语句：\n\n```sql\nselect\n emp_id\n,dbms_rowid.rowid_relative_fno(rowid)\
    \ file_num\n,dbms_rowid.rowid_block_number(rowid) block_num\n,dbms_rowid.rowid_row_number(rowid)\
    \   row_num\nfrom emp;\n```\n\n这是一些示例输出：\n\n```\n    EMP_ID   FILE_NUM  BLOCK_NUM\
    \    ROW_NUM\n---------- ---------- ---------- ----------\n      2960        \
    \  4        144        126\n      2961          4        144        127\n```\n\
    \n你可以在 SQL 语句的 `SELECT` 和 `WHERE` 子句中使用 `ROWID` 值。在大多数情况下，`ROWID` 唯一标识一行。但是，不同表中存储在同一集群中的行可能具有相同的\
    \ `ROWID`。\n\n### 1-12. 释放未使用的表空间\n\n#### 问题\n\n你已经分析了段顾问的输出，并确定一个表有大量空闲空间。你想释放未使用的空间以提高执行全表扫描的查询的性能。\n\
    \n#### 解决方案\n\n执行以下步骤来收缩空间并重新调整表的高水位线：\n\n1.  为表启用行移动。\n2.  使用 `ALTER TABLE...SHRINK\
    \ SPACE` 语句释放未使用的空间。\n\n![images](img/square.jpg) **注意** 收缩表功能要求表所在表空间使用自动段空间管理。有关如何创建启用\
    \ ASSM 的表空间的详细信息，请参阅配方 1-2。\n\n收缩表时，需要移动行（如果有）。这意味着你必须启用行移动。此示例为 `INV` 表启用行移动：\n\
    \n```sql\nSQL> alter table inv enable row movement;\n```\n\n接下来通过 `ALTER TABLE`\
    \ 语句执行表收缩操作：\n\n```sql\nSQL> alter table inv shrink space;\n```\n\n你也可以通过 `CASCADE`\
    \ 子句来收缩任何索引段的空间：\n\n```sql\nSQL> alter table inv shrink space cascade;\n```\n\n\
    #### 工作原理\n\n收缩表时，Oracle 会以最节省空间的方式重新组织块。Oracle 还会重新调整表的高水位线。这对导致全表扫描的查询有性能影响。在这些场景中，Oracle\
    \ 将检查高水位线以下的每个块。如果你注意到当表中没有很多行时，查询返回结果需要很长时间，这可能表明高水位线下有许多未使用的块（因为数据被删除了）。\n\n\
    你可以指示 Oracle 在收缩表时不重新调整高水位线。这是通过 `COMPACT` 子句完成的，例如：\n\n```sql\nSQL> alter table\
    \ inv shrink space compact;\n```\n\n当你使用 `COMPACT` 时，Oracle 会对表进行碎片整理，但不改变高水位线。你需要使用\
    \ `ALTER TABLE…SHRINK SPACE` 语句来重置高水位线。你可能想这样做是因为担心碎片整理和调整高水位线所需的时间。这允许你将表收缩分成两个较短的步骤，而不是一个较长的操作。\n\
    \n### 1-13. 为直接路径加载压缩数据"
- fmt: "### Problem\n\nYou're working with a decision support system (DSS)-type database\
    \ and you want to improve the performance of an associated reporting application.\
    \ This environment contains large tables that are loaded once and then frequently\
    \ subjected to full table scans. You want to compress data as it is loaded because\
    \ this will compact the data into fewer database blocks and thus will require\
    \ less I/O for subsequent reads from the table. Because fewer blocks need to be\
    \ read for compressed data, this will improve data retrieval performance.\n\n\
    ### Solution\n\nUse Oracle's basic compression feature to compress direct path–loaded\
    \ data into a heap-organized table. Basic compression is enabled as follows:\n\
    \n1.  Use the `COMPRESS` clause to enable compression either when creating, altering,\
    \ or moving an existing table.\n2.  Load data via a direct path mechanism such\
    \ as `CREATE TABLE…AS SELECT` or `INSERT /*+ APPEND */`.\n\n![images](images/square.jpg)\
    \ **Note** Prior to Oracle Database 11g R2, basic compression was referred to\
    \ as DSS compression and enabled via the `COMPRESS FOR DIRECT_LOAD OPERATION`\
    \ clause. This syntax is deprecated in Oracle Database 11g R2 and higher.\n\n\
    Here's an example that uses the `CREATE TABLE…AS SELECT` statement to create a\
    \ basic compression-enabled table and direct path–load the data:\n\n```\ncreate\
    \ table regs_dss\ncompress\nas select reg_id, reg_name\nfrom regs;\n```\n\nThe\
    \ prior statement creates a table with compressed data in it. Any subsequent direct\
    \ path–load operations will also load the data in a compressed format.\n\n![images](images/square.jpg)\
    \ **Tip** You can use either the `COMPRESS` clause or the `COMPRESS BASIC` clause\
    \ to enable the basic table compression feature. The `COMPRESS` clause and `COMPRESS\
    \ BASIC` clause are synonymous.\n\nYou can verify that compression has been enabled\
    \ for a table by querying the appropriate `DBA/ALL/USER_TABLES` view. This example\
    \ assumes that you're connected to the database as the owner of the table:\n\n\
    ```\nselect table_name, compression, compress_for\nfrom user_tables\nwhere table_name='REGS_DSS';\n\
    ```\n\nHere is some sample output:\n\n```\nTABLE_NAME                      COMPRESS\
    \ COMPRESS_FOR\n------------------------------ -------- ------------\nREGS_DSS\
    \                        ENABLED  BASIC\n```\n\nThe prior output shows that compression\
    \ has been enabled in the basic mode for this table. If you're working with a\
    \ table has that already been created, then you can alter its basic compression\
    \ characteristics with the `ALTER TABLE` statement—for example:\n\n```\nSQL> alter\
    \ table regs_dss compress;\n```\n\nWhen you alter a table to enable basic compression,\
    \ this does not affect any data currently existing in the table; rather it only\
    \ compresses subsequent direct path data load operations.\n\nIf you want to enable\
    \ basic compression for data in an existing table, use the `MOVE COMPRESS` clause:\n\
    \n```\nSQL> alter table regs_dss move compress;\n```\n\nKeep in mind that when\
    \ you move a table, all of the associated indexes are invalidated. You'll have\
    \ to rebuild any indexes associated with the moved table.\n\nIf you have enabled\
    \ basic compression for a table, you can disable it via the `NOCOMPRESS` clause—for\
    \ example:\n\n```\nSQL> alter table regs_dss nocompress;\n```\n\nWhen you alter\
    \ a table to disable basic compression, this does not uncompress existing data\
    \ within the table. Rather this operation instructs Oracle to not compress data\
    \ for subsequent direct path operations. If you need to uncompress existing compressed\
    \ data, then use the `MOVE NOCOMPRESS` clause:\n\n```\nSQL> alter table regs_dss\
    \ move nocompress;\n```\n\n### How It Works\n\nThe basic compression feature is\
    \ available at no extra cost with the Oracle Enterprise Edition. Any heap-organized\
    \ table that has been created or altered to use basic compression will be a candidate\
    \ for data loaded in a compressed format for subsequent direct path–load operations.\
    \ There is some additional CPU overhead associated with compressing the data,\
    \ but you may find in many circumstances that this overhead is offset by performance\
    \ gains due to less I/O.\n\nFrom a performance perspective, the main advantage\
    \ to using basic compression is that once the data is loaded as compressed, any\
    \ subsequent I/O operations will use fewer resources because there are fewer blocks\
    \ required to read and write data. You will need to test the performance benefits\
    \ for your environment. In general, tables that hold large amounts of character\
    \ data are candidates for basic compression—especially in scenarios where data\
    \ is direct path–loaded once, and thereafter selected from many times.\n\nKeep\
    \ in mind that Oracle's basic compression feature has no effect on regular DML\
    \ statements such as `INSERT`, `UPDATE`, `MERGE`, and `DELETE`. If you require\
    \ compression to occur on all DML statements, then consider using OLTP compression\
    \ (see Recipe 1-14 for details).\n\nYou can also specify basic compression at\
    \ the partition and tablespace level. Any table created within a tablespace created\
    \ with the `COMPRESS` clause will have basic compression enabled by default. Here's\
    \ an example of creating a tablespace with the `COMPRESS` clause:\n\n```\nCREATE\
    \ TABLESPACE comp_data\n  DATAFILE '/ora01/dbfile/O11R2/comp_data01.dbf'\n  SIZE\
    \ 500M\n  EXTENT MANAGEMENT LOCAL\n  UNIFORM SIZE 512K\n  SEGMENT SPACE MANAGEMENT\
    \ AUTO\n  DEFAULT COMPRESS;\n```\n\nYou can also alter an existing tablespace\
    \ to set the default degree of compression:\n\n```\nSQL> alter tablespace comp_data\
    \ default compress;\n```\n\nRun this query to verify that basic compression for\
    \ a tablespace is enabled:\n\n```\nselect tablespace_name, def_tab_compression,\
    \ compress_for\nfrom dba_tablespaces\nwhere tablespace_name = 'COMP_DATA';\n```\n\
    \nHere is some sample output:\n\n```\nTABLESPACE_NAME                DEF_TAB_\
    \ COMPRESS_FOR\n------------------------------ -------- ------------\nCOMP_DATA\
    \                      ENABLED  BASIC\n```\n\n![images](images/square.jpg) **Tip**\
    \ You cannot drop a column from a table created with basic compression enabled.\
    \ However, you can mark a column as unused.\n\n## 1-14. Compressing Data for All\
    \ DML\n\n### Problem\n\nYou're in an OLTP environment and have noticed that there\
    \ is a great deal of disk I/O occurring when reading data from a table. You wonder\
    \ if you can increase I/O performance by compressing the data within the table.\
    \ The idea is that compressed table data will consume less physical storage and\
    \ thus require less I/O to read from disk."
