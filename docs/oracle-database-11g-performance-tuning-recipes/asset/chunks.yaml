    \ queries, for example, run for dozens of minutes, even hours, so there is time\
    \ to initiate a trace mid-query and diagnose a performance problem.\n\n#### Solution\n\
    \nYou can set a trace in a running session using the operating system process\
    \ ID (PID), with the help of the `oradebug` utility. Once you identify the PID\
    \ of the session you want to trace, issue the following commands to trace the\
    \ session.\n\n`SQL> connect / as sysdba`\n`SQL> oradebug setospid <SPID>`\n`SQL>\
    \ oradebug unlimit`\n`SQL> oradebug event 10046 trace name context forever,level\
    \ 12`\n`SQL> oradebug event 10046 trace name context off`\n\nIn the example shown\
    \ here, we specified Level 12, but as with the 10046 trace you set with the `alter\
    \ session` command, you can specify the lower tracing levels 4 or 8."
