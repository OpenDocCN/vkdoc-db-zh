  trans: "\n#### 工作原理\n\nOracle 使用称为锁存器（latches）的内部锁来保护各种内存结构。当服务器进程尝试获取锁存器但失败时，该尝试会被计为一次\
    \ `latch free wait event`。Oracle 并非将所有锁存器等待归为一个 `latch free wait event`。Oracle\
    \ 确实使用了一个通用的 `latch free wait event`，但这仅用于次要的、与锁存器相关的等待事件。对于最常见的锁存器，Oracle 使用了各种锁存器等待事件的子组，其名称即为等待事件类型。你可以通过查看锁存器事件名称来识别确切的锁存器类型。例如，锁存器事件\
    \ `latch: library cache` 表示库缓存锁存器的争用。同样，`latch: cache buffer chains` 事件表示缓冲区缓存的争用。\n\
    \nOracle 使用各种类型的锁存器来防止多个会话同时更新 `SGA` 的相同区域。各种数据库操作要求会话读取或更新 `SGA`。例如，当会话将数据块从磁盘读入\
    \ `SGA` 时，它必须修改缓冲区缓存中最近最少使用的链。同样，当数据库解析 `SQL` 语句时，该语句必须被添加到 `SGA` 的 `library cache`\
    \ 组件中。Oracle 使用锁存器来防止数据库操作相互干扰并破坏 `SGA`。\n\n数据库操作需要获取并持有一个锁存器的时间非常短暂，通常只持续几纳秒。如果会话最初因锁存器已被占用而获取失败，它会尝试几次，然后进入“睡眠”。如果会话仍然无法获得所需的锁存器，它会再次醒来并尝试几次，然后再次进入睡眠模式。每次会话进入睡眠模式，其停留时间会变长，从而增加了后续尝试获取锁存器的时间间隔。因此，如果你的数据库中锁存器争用严重，将导致响应时间和吞吐量的严重下降。\n\
    \n即使在一个设计良好、运行在极快硬件上的数据库中看到锁存器争用，也不必感到惊讶。某种程度的锁存器争用，尤其是 `cache buffers chain`\
    \ 锁存器事件，几乎是不可避免的。你只需在锁存器等待时间极高并拖慢数据库性能时才需要关注。\n\n由 `library cache` 锁存器以及 `shared\
    \ pool` 锁存器引起的争用，通常是因为应用程序未使用绑定变量。如果你的应用程序无法重新编码以加入绑定变量，也并非全无办法。你可以设置 `CURSOR_SHARING`\
    \ 参数，以强制 Oracle 使用绑定变量，即使你的应用程序在代码中没有指定它们。你可以选择将此参数设置为 `FORCE` 或 `SIMILAR`，以强制用绑定变量替换硬编码的变量值。此参数的默认设置为\
    \ `EXACT`，这意味着数据库不会用绑定变量替换字面值。当你将 `CURSOR_SHARING` 参数设置为 `FORCE` 时，Oracle 会将所有字面量转换为绑定变量。`SIMILAR`\
    \ 设置会导致语句仅在不会改变其执行计划的情况下使用绑定变量。因此，`SIMILAR` 设置似乎是强制数据库使用绑定变量而非字面量更安全的方式。尽管有一些关于将\
    \ `CURSOR_SHARING` 参数设置为 `FORCE` 的安全性的担忧，但我们尚未发现使用此设置的实际问题。一旦你将 `CURSOR_SHARING`\
    \ 参数设置为 `FORCE` 或 `SIMILAR`，`library cache` 争用通常就会消失。`CURSOR_SHARING` 参数是 Oracle\
    \ 的少数“银弹”之一，能通过消除锁存器争用立即提升数据库性能。在处理 `library cache` 锁存器争用时，请放心使用它。\n\n`cache buffer\
    \ chains` 锁存器争用通常是由于会话反复读取相同的数据块造成的。首先识别出导致最高 `cache buffers chain` 锁存器等待的 `SQL`\
    \ 语句，看看是否能对其进行优化。如果这不能减少锁存器争用，你必须识别出被反复读取的实际热点数据块。\n\n如果热点数据块属于索引段，你可以考虑对表进行分区并使用本地索引。例如，哈希分区方案可以让你将负载分散到多个分区索引上。你也可以考虑将表转换为基于索引列的哈希集群。这样，你就可以完全避免使用索引。如果热点数据块属于表段，你仍然可以考虑对表进行分区以将负载分散到各个分区中。你可能还需要重新审视应用程序设计，以了解为什么相同的块被反复访问，从而导致它们变得“热”。\n\
    \n### 5-21. 通过 Oracle Enterprise Manager 管理锁\n\n#### 问题\n\n你希望了解如何通过 Oracle Enterprise\
    \ Manager Database Control GUI 界面处理锁问题。\n\n#### 解决方案\n\n你可以使用 Oracle Enterprise\
    \ Manager (`OEM`) `DB Control` 来识别和解决锁情况，而不是执行多个 `SQL` 查询来快速消失的锁定事件。你可以找到实例中当前所有的锁，包括阻塞的和被阻塞的会话——你也可以从\
    \ `OEM` 中终止阻塞会话。\n\n以下是你可以通过 `OEM` 管理锁问题的方式：\n\n*   在 `DB Control` 的主页中，你会在“警报”表中看到锁信息。查找“用户阻塞”类别以识别阻塞会话。你需要查找的警报名称是\
    \ `Blocking Session Count`。点击此警报显示的消息链接（例如“Session 68 is blocking 12 other sessions”）将带你转到\
    \ `Blocking Session Count` 页面。在此页面的“警报历史”表中，你可以查看有关阻塞和被阻塞会话的详细信息。\n\n    同样在主页中，在“相关警报”下，你会找到“ADDM\
    \ 性能”表。锁问题通过存在 `Row Lock Waits` 链接来揭示。点击 `Row Lock Waits` 链接转到 `Row Lock Waits`\
    \ 页面。此页面（如 图 5-1 所示）让你可以查看所有被发现正在等待行锁的 `SQL` 语句。\n\n    ![images](img/0501.jpg)\n\
    \n    **图 5-1.** `OEM` 中的行锁等待页面\n\n*   你也可以通过点击主页中的“性能”选项卡来查看阻塞会话详情。点击“其他监控链接”部分下的\
    \ `Blocking Sessions` 转到 `Blocking Sessions` 页面。`Blocking Sessions` 页面包含阻塞会话以及被阻塞会话的详细信息。你可以看到确切的等待事件，当一个会话阻塞另一个时，该事件将是\
    \ `enq: TX row lock contention`。通过点击此页面上的 `SQL ID` 链接，你可以找出涉及阻塞会话的确切 `SQL` 语句。你可以通过点击页面左上角的\
    \ `Kill Session` 按钮从此页面终止阻塞会话。\n*   在“其他监控链接”部分中还有另一个名为 `Instance Locks` 的链接，它会带你转到\
    \ `Instance Locks` 页面。`Instance Locks` 页面显示阻塞和被阻塞会话的会话详细信息。你可以点击 `SQL ID` 链接来查看阻塞者和被阻塞会话当前正在执行的\
    \ `SQL`。你还可以找出被锁定对象的名称。你可以通过点击 `Kill Session` 按钮来终止阻塞会话。\n"
- fmt: "#### How It Works\n\n你不一定需要执行多个 SQL 脚本来分析数据库中的锁行为。我们之前在各种案例中展示的 SQL 代码是为了解释\
    \ Oracle 锁机制如何工作。在日常工作中，直接使用 OEM（Oracle Enterprise Manager）来快速找出谁在阻塞会话以及原因，通常更为实用和高效。\n\
    \n### 5-22. 使用 Oracle Enterprise Manager 分析等待事件\n\n#### 问题\n\n你希望使用 Oracle Enterprise\
    \ Manager 来管理数据库实例中的等待事件。\n\n#### 解决方案\n\nOEM 界面让你能够快速分析数据库中的当前等待事件，而无需运行 SQL\
    \ 脚本。在主页中，“活动会话”图显示了等待、I/O 和 CPU 的相对比例。点击此图中的“等待”链接，可以查看“活动会话”图。在图形右侧，你会看到诸如“并发”、“应用程序”、“集群”、“管理”、“用户\
    \ I/O”等链接。点击这些链接中的每一个，都将带你进入一个页面，显示所有正在等待该等待类别下事件的活动会话。我们在此总结了这些最重要的等待类别下的等待事件。\n\
    \n> `用户 I/O`：这显示诸如 `db file scattered read`、`db file sequential read`、`direct\
    \ path read`、`direct path write` 和 `read by other session` 等等待事件。你可以点击各种等待的链接以获取等待事件的图表。例如，点击“db\
    \ file scattered read”链接将带你进入“等待事件：db file scattered read”页面的直方图。\n> \n> `系统 I/O`：这显示由于\
    \ `db file parallel write`、`log file parallel write`、`control file parallel write`\
    \ 和 `control file sequential read` 等事件导致的等待。\n> \n> `应用程序`：这显示正在等待诸如队列锁等事件的活动会话。\n\
    \n#### 工作原理\n\n一旦你理解了 Oracle 等待接口背后的理论，就可以使用 OEM 快速分析数据库中的当前等待事件。你不仅能找出哪些等待事件正在对性能产生不利影响，还能找出涉及哪些\
    \ SQL 语句和用户。你可以从“活动会话”页面深入钻取的所有详情页，都显示了自实例启动以来特定等待事件类别的图表。这些页面还包含名为“Top SQL”和“Top\
    \ Users”的表，它们精确地显示了哪些 SQL 和用户受到了等待事件的影响。\n\n## 第 6 章 分析操作系统性能\n\n解决数据库性能问题有时需要使用操作系统（OS）实用程序。这些工具通常能提供有助于隔离数据库性能问题的信息。考虑以下情况：\n\
    \n*   你在一台服务器上运行多个数据库和多个应用程序，并希望使用操作系统实用程序来确定哪个数据库（及相应的进程）消耗了最多的操作系统资源。当一个数据库应用程序消耗资源到导致该服务器上其他数据库性能变差时，这种方法非常有价值。\n\
    *   你需要验证数据库服务器在 CPU、内存、磁盘 I/O 和网络带宽方面是否足以应对当前的应用程序工作负载。\n*   需要进行分析以确定服务器在何时将无法处理更大（未来）的工作负载。\n\
    *   你已经使用数据库工具识别了系统瓶颈，并希望通过操作系统工具再次检查分析结果。\n\n在这些场景中，为了有效地进行分析、调优和故障排除，你将需要采用操作系统工具来识别资源密集型进程。此外，如果你的服务器上运行着多个数据库和应用程序，在排查性能问题时，通常更有效的方法是首先确定哪个数据库和进程消耗了最多的资源。操作系统实用程序有助于精确定位瓶颈是\
    \ CPU、内存、磁盘 I/O 还是网络问题。在 Linux/Unix 环境中，一旦获得了操作系统标识符，你就可以查询数据库以显示任何相应的数据库进程和 SQL\
    \ 语句。\n\n看一下[图 6-1](#Chapter06.html#fig_6_1)。该流程图详细描述了 DBA 在诊断服务器性能缓慢时所遵循的决策过程以及相关的\
    \ Linux/Unix 操作系统工具。例如，当你遇到性能问题时，一个常见的初步任务是登录到服务器，并使用 `df` 和 `du` 等操作系统实用程序快速检查磁盘空间问题。挂载点已满是导致数据库不可用的常见原因。\n\
    \n![images](images/0601.jpg)\n\n`图 6-1. 排查性能低下问题`\n\n检查完磁盘空间问题后，下一个任务是使用 `vmstat`、`top`\
    \ 或 `ps` 等操作系统实用程序来确定你遇到了哪种类型的瓶颈。例如，性能缓慢是否与磁盘 I/O、CPU、内存或网络问题有关？确定瓶颈类型后，下一步是确定是否是数据库进程导致了瓶颈。\n\
    \n`ps` 命令对于显示消耗资源会话的进程名称和 ID 非常有用。当你在一台服务器上运行多个数据库时，你可以从进程名称确定该进程与哪个数据库相关联。一旦你有了进程\
    \ ID 和关联的数据库，就可以登录到数据库并运行 SQL 查询，以确定该进程是否与某个 SQL 查询相关。如果问题是与 SQL 相关的，那么你可以进一步确定有关该\
    \ SQL 查询的详细信息以及可能在哪里进行调优。\n\n[图 6-1](#Chapter06.html#fig_6_1) 总结了排查性能问题的复杂性。准确找出性能问题的原因并推荐有效的解决方案，往往说起来容易做起来难。在尝试解决问题时，有些路径会导致相对高效且成本低廉的解决方案，例如终止失控的操作系统进程或重新生成最新的统计信息。而其他决策可能会让你得出结论，需要增加昂贵的硬件或重新设计系统。你的性能调优结论可能对公司产生长期的财务影响，从而影响你保住工作的能力。显然，你希望专注于性能问题的根本原因，而不仅仅是处理症状。如果你能持续识别性能问题的根本原因并推荐有效且廉价的解决方案，这将极大地改善你的就业机会。\n\
    \n本章的重点是提供详细的示例，展示如何使用 Linux/Unix 操作系统实用程序来识别服务器性能问题。这些实用程序对于提供数据库内部工具之外的诊断信息非常宝贵。操作系统实用程序就像是额外的一双眼睛，帮助精准定位数据库性能低下的原因。\n\
    \n### 6-1. 检测磁盘空间问题\n\n#### 问题\n\n用户报告说无法连接到数据库。你登录到数据库服务器，尝试连接 SQL*Plus，收到此错误：\n\
    \n```\nORA-09817: Write to audit file failed.\nLinux Error: 28: No space left\
    \ on device\nAdditional information: 12\n```\n\n你希望快速确定是否是某个挂载点已满，以及该挂载点内最大的文件位于何处。"
  raw: "#### How It Works\n\nYou don't necessarily have to execute multiple SQL scripts\
    \ to analyze locking behavior in your database. The SQL code we showed you earlier\
    \ in various recipes was meant to explain how Oracle locking works. On a day-to-day\
    \ basis, it's much more practical and efficient to just use OEM to quickly find\
    \ out who's blocking a session and why.\n\n### 5-22. Analyzing Waits from Oracle\
    \ Enterprise Manager\n\n#### Problem\n\nYou'd like to use Oracle Enterprise Manager\
    \ to manage waits in your database instances.\n\n#### Solution\n\nThe OEM interface\
    \ lets you quickly analyze current waits in your database, instead of running\
    \ SQL scripts to do so. In the Home page, the Active Sessions graph shows the\
    \ relative amounts of waits, I/O, and CPU. Click the Waits link in this graph\
    \ to view the Active Sessions graph. To the right of the graph, you'll see various\
    \ links such as Concurrency, Application, Cluster, Administrative, User I/O, etc.\
    \ Clicking each of these links will take you to a page that shows you all active\
    \ sessions that are waiting for waits under that wait class. We summarize the\
    \ wait events under the most important of these wait classes here.\n\n> `User\
    \ I/O`: This shows wait events such as `db file scattered read`, `db file sequential\
    \ read`, `direct path read`, `direct path write`, and `read by other session`.\
    \ You can click any of the links for the various waits to get a graph of the wait\
    \ events. For example, clicking the “db file scattered read” link will take you\
    \ to the histogram for the “Wait Event: db file scattered read” page.\n> \n> `System\
    \ I/O`: This shows waits due to the `db file parallel write`, `log file parallel\
    \ write`, `control file parallel write`, and the `control file sequential read\
    \ wait` events.\n> \n> `Application`: This shows active sessions waiting for events\
    \ such as enqueue locks.\n\n#### How It Works\n\nOnce you understand the theory\
    \ behind the Oracle Wait Interface, you can use OEM to quickly analyze current\
    \ wait events in your database. You can find out not only which wait events are\
    \ adversely affecting performance, but also which SQL statement and which users\
    \ are involved. All the details pages you can drill down to from the Active Session\
    \ page show a graph of the particular wait event class from the time the instance\
    \ started. The pages also contain tables named Top SQL and Top Users, which show\
    \ exactly which SQL and users are affected by the wait event.\n\n## C H A P T\
    \ E R  6\n\n## Analyzing Operating System Performance\n\nSolving database performance\
    \ issues sometimes requires the use of operating system (OS) utilities. These\
    \ tools often provide information that can help isolate database performance problems.\
    \ Consider the following situations:\n\n*   You're running multiple databases\
    \ and multiple applications on one server and want to use OS utilities to identify\
    \ which database (and corresponding process) is consuming the most operating system\
    \ resources. This approach is invaluable when one database application is consuming\
    \ resources to the point of causing other databases on the box to perform poorly.\n\
    *   You need to verify if the database server is adequately sized for current\
    \ application workload in terms of CPU, memory, disk I/O, and network bandwidth.\n\
    *   An analysis is needed to determine at what point the server will not be able\
    \ to handle larger (future) workloads.\n*   You've used database tools to identify\
    \ system bottlenecks and want to double-check the analysis via operating system\
    \ tools.\n\nIn these scenarios, to effectively analyze, tune, and troubleshoot,\
    \ you'll need to employ OS tools to identify resource-intensive processes. Furthermore,\
    \ if you have multiple databases and applications running on one server, when\
    \ troubleshooting performance issues, it's often more efficient to first determine\
    \ which database and process is consuming the most resources. Operating system\
    \ utilities help pinpoint whether the bottleneck is CPU, memory, disk I/O, or\
    \ a network issue. In Linux/Unix environments, once you have the operating system\
    \ identifier, you can then query the database to show any corresponding database\
    \ processes and SQL statements.\n\nTake a look at [Figure 6-1](#Chapter06.html#fig_6_1).\
    \ This flowchart details the decision-making process and the relevant Linux/Unix\
    \ operating system tools that a DBA steps through when diagnosing sluggish server\
    \ performance. For example, when you're dealing with performance problems, one\
    \ common first task is to log on to the box and quickly check for disk space issues\
    \ using OS utilities like `df` and `du`. A full mount point is a common cause\
    \ of database unavailability.\n\n![images](images/0601.jpg)\n\n***Figure 6-1.**\
    \ Troubleshooting poor performance*\n\nAfter inspecting disk space issues, the\
    \ next task is to use an OS utility such as `vmstat`, `top`, or `ps` to determine\
    \ what type of bottleneck you have. For example, is sluggish performance related\
    \ to a disk I/O issue, CPU, memory, or the network? After determining the type\
    \ of bottleneck, the next step is to determine if a database process is causing\
    \ the bottleneck.\n\nThe `ps` command is useful for displaying the process name\
    \ and ID of the resource-consuming session. When you have multiple databases running\
    \ on one box, you can determine which database is associated with the process\
    \ from the process name. Once you have the process ID and associated database,\
    \ you can then log on to the database and run SQL queries to determine if the\
    \ process is associated with a SQL query. If the problem is SQL-related, then\
    \ you can identify further details regarding the SQL query and where it might\
    \ be tuned.\n\n[Figure 6-1](#Chapter06.html#fig_6_1) encapsulates the difficulty\
    \ of troubleshooting performance problems. Correctly pinpointing the cause of\
    \ performance issues and recommending an efficient solution is often easier said\
    \ than done. When trying to resolve issues, some paths result in relatively efficient\
    \ and inexpensive solutions, such as terminating a runaway operating system process\
    \ or regenerating fresh statistics. Other decisions may lead you to conclude that\
    \ you need to add expensive hardware or redesign the system. Your performance\
    \ tuning conclusions can have long-lasting financial impact on your company and\
    \ thus influence your ability to retain a job. Obviously you want to focus on\
    \ the cause of a performance problem and not just address the symptom. If you\
    \ can consistently identify the root cause of the performance issue and recommend\
    \ an effective and inexpensive solution, this will greatly improve your employment\
    \ opportunities.\n\nThe focus of this chapter is to provide detailed examples\
    \ that show how to use Linux/Unix operating system utilities to identify server\
    \ performance issues. These utilities are invaluable for providing extra information\
    \ used to diagnose performance issues outside of tools available within the database.\
    \ Operating system utilities act as an extra set of eyes to help zero in on the\
    \ cause of poor database performance.\n\n### 6-1\\. Detecting Disk Space Issues\n\
    \n#### Problem\n\nUsers are reporting that they can't connect to a database. You\
    \ log on to the database server, attempt to connect to SQL*Plus, and receive this\
    \ error:\n\n`ORA-09817: Write to audit file failed.`\n`Linux Error: 28: No space\
    \ left on device`\n`Additional information: 12`\n\nYou want to quickly determine\
    \ if a mount point is full and where the largest files are within this mount point."
