    5z1b3z8rhutn  /* SQL Analyze(98, 0) */ select * from emppart where empno > 12345\n\
    ```\n\n#### How It Works\n\nUtilizing this feature is a handy way to get historical\
    \ statistics for a given SQL statement. For current statements, you can continue\
    \ to use other mechanisms such as `AUTOTRACE`, but after a SQL statement has been\
    \ run, using the `awrsqrpt.sql` script provides an easy mechanism to help analyze\
    \ past run statements and help retroactively tune poorly performing SQL statements.\n\
    \n### 4-6. Creating a Statistical Baseline for Your Database\n\n#### Problem\n\
    \nYou want to establish baseline statistics that represent a normal view of database\
    \ operations.\n\n#### Solution\n\nYou can create AWR baselines in order to establish\
    \ a saved workload view for your database, which can be used later for comparison\
    \ to other AWR snapshots. The purpose of a baseline is to establish a normal workload\
    \ view of your database for a predefined time period. Performance statistics for\
    \ an AWR baseline are saved in your database, and are not purged automatically.\
    \ There are two types of baselines—fixed and moving.\n\n##### Fixed Baselines\n\
    \nThe most common type of baseline is called a fixed baseline. This is a single,\
    \ static view that is meant to represent a normal system workload. To manually\
    \ create an AWR baseline, you can use the `CREATE_BASELINE` procedure of the `DBMS_WORKLOAD_REPOSITORY`\
    \ PL/SQL package. The following example illustrates how to create a baseline based\
    \ on a known begin and end date and time for which the baseline will be created:\n\
    \n```\nSQL> exec dbms_workload_repository.create_baseline -\n    (to_date('2011-06-01:00:00:00','yyyy-mm-dd:hh24:mi:ss'),\
    \ -\n    to_date('2011-06-01:06:00:00','yyyy-mm-dd:hh24:mi:ss'),'Batch Baseline\
    \ #1');\n\nPL/SQL procedure successfully completed.\n```\n\nFor the foregoing\
    \ baseline, we want to establish a normal workload for a data warehouse batch\
    \ window, which is between midnight and 6 a.m. This baseline will be held indefinitely\
    \ unless explicitly dropped (see Recipe 4-7 for managing AWR baselines). Any fixed\
    \ baseline you create stays in effect until a new baseline is created. If you\
    \ want to have a set expiration for a baseline, you can simply specify the retention\
    \ period for a baseline when creating it by using the `EXPIRATION` parameter,\
    \ which is specified in days:\n\n```\nexec dbms_workload_repository.create_baseline(\
    \ -\nstart_time=>to_date('2011-06-01:00:00:00','yyyy-mm-dd:hh24:mi:ss'), -\nend_time=>to_date('2011-06-01:06:00:00','yyyy-mm-dd:hh24:mi:ss'),\
    \ -\nbaseline_name=>'Batch Baseline #1', -\nexpiration=>30);\n```\n\nYou can also\
    \ create a baseline based on already created AWR snapshot IDs. In order to do\
    \ this, you could run the `CREATE_BASELINE` procedure as follows:\n\n```\nexec\
    \ dbms_workload_repository.create_baseline( -\nstart_snap_id=>258,end_snap_id=>268,baseline_name=>'Batch\
    \ Baseline #1', -\nexpiration=>30);\n```\n\n##### Moving Baselines\n\nLike the\
    \ fixed baseline, the moving baseline is used to capture metrics over a period\
    \ of time. The big difference is the metrics for moving baselines are captured\
    \ based on the entire AWR retention period. For instance, the default AWR retention\
    \ is eight days (see Recipe 4-2 on changing the AWR retention period). These metrics,\
    \ also called adaptive thresholds, are captured based on the entire eight-day\
    \ window. Furthermore, the baseline changes with each passing day, as the AWR\
    \ window for a given database moves day by day. Because of this, the metrics over\
    \ a given period of time can change as a database evolves and performance loads\
    \ change over time. A default moving baseline is automatically created—the `SYSTEM_MOVING_BASELINE`.\
    \ It is recommended to increase the default AWR retention period, as this may\
    \ give a more complete set of metrics on which to accurately analyze performance.\
    \ The maximum size of the moving window is the AWR retention period. To modify\
    \ the moving window baseline, use the `MODIFY_BASELINE_WINDOW_SIZE` procedure\
    \ of the `DBMS_WORKLOAD_REPOSITORY` package, as in the following example:\n\n\
    ```\nSQL>  exec dbms_workload_repository.modify_baseline_window_size(30);\n\n\
    PL/SQL procedure successfully completed.\n```"
