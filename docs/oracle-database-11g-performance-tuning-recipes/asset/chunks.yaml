  trans: '

    ### 工作原理


    编写 SQL 代码的最佳实践是使用绑定变量，这样 SQL 语句才是可共享的。在解析阶段，优化器会将当前 SQL 语句的文本与存储在共享池中已有语句的文本进行比较。数据库仅当一条
    SQL 语句在所有方面——包括每个字符、空格甚至大小写——都与另一条语句完全匹配时，才认为它们是 `完全相同` 的。当你将 `cursor_sharing`
    参数保留为其默认值 `EXACT` 时，Oracle 在重新执行使用绑定变量的 SQL 语句时会重用共享 SQL 区域。无需对新语句进行硬解析，因为共享池中已经存在一个已解析的版本。这条新语句可以使用一个现有的游标（因此称为共享游标），而无需创建自己的父游标。


    如果代码没有使用绑定变量，但数据库正在解析的新 SQL 语句与共享池中一条先前解析过的语句在所有方面都相同，则该语句被视为与之前的语句 `相似`。


    默认情况下，数据库只在 SQL 语句完全相同时共享游标，而在相似时不共享。如果应用程序使用字面值而非绑定变量，数据库将执行大量的硬解析，在繁忙的系统中，这可能会给共享池和游标缓存带来巨大压力。你可以通过将
    `cursor_sharing` 参数设置为 `FORCE` 或 `SIMILAR`，使得当新语句与已有解析语句相似（但不完全相同时），数据库也能共享游标。将
    `cursor_sharing` 参数设置为 `FORCE` 或 `SIMILAR` 允许数据库用系统生成的绑定变量替换字面值。这样做的目标是减少共享池中的父游标数量。即使应用程序不使用绑定变量也能共享游标，可以通过减少游标缓存（位于共享池中）中的父游标数量来缓解共享池的压力。若将
    `cursor_sharing` 参数保留为其默认值，当数据库解析的语句与共享池中已有语句不完全相同时，它将执行硬解析。然而，如果你将该参数设置为 `FORCE`
    或 `SIMILAR`，那么当在共享池中找到一个相似语句时，数据库将执行代价低得多的软解析。


    #### 何时将 CURSOR_SHARING 设置为非默认值


    理想情况下，你应该将 `cursor_sharing` 参数保留为其默认值 `EXACT`。但是，如果你的响应时间因大量的库缓存未命中而受影响，并且 SQL
    语句没有使用绑定变量，那么可以考虑将 `cursor_sharing` 参数设置为 `FORCE` 或 `SIMILAR`。如果应用程序不使用绑定变量，你会束手无策——修复需要很长时间，与此同时，你将面对一个运行缓慢的数据库。在这种情况下，请立即更改
    `cursor_sharing` 参数的默认设置。将 `cursor_sharing` 参数设置为非默认值实际上没有问题，只有一些微小的缺点，例如不支持星型转换等。


    ![images](img/square.jpg) 提示 Oracle 建议在 OLTP 环境中，将 `CURSOR_SHARING` 参数设置为 `FORCE`。


    Oracle 建议，如果可能，应将 `cursor_sharing` 参数保留为其默认值 `EXACT`，并通过在代码中使用绑定变量而非字面值来实现 SQL
    的可共享性。如果你确实因为共享池压力和门争用而决定将默认设置更改为 `SIMILAR` 或 `FORCE`，请注意这样做会带来一些性能影响。如果你将 `cursor_sharing`
    参数设置为 `FORCE`，数据库将使用系统生成的绑定值，对语句的每次执行使用相同的执行计划，并为每个不同的 SQL 语句使用一个父游标和一个子游标。如果你将该参数设置为
    `SIMILAR`，并且数据库为其生成绑定值的列上没有直方图，那么其行为与 `FORCE` 设置相同。另一方面，如果有直方图，`SIMILAR` 设置将导致基于绑定变量值的不同执行计划，因此每次执行都会有不同的子游标。在没有直方图的情况下，在
    `SIMILAR` 设置下，数据库的行为就像没有使用绑定变量一样。


    尽管 Oracle 历来建议将 `cursor_sharing` 参数设置为 `SIMILAR`，但在 Oracle Database 11g 中，除非你处于
    DSS 环境，否则 Oracle 建议你将 `cursor_sharing` 参数设置为 `FORCE`，因为与将其设置为 `SIMILAR` 值相比，这能限制子游标的增长。

