- fmt: "### 2-14. Creating an Index-Organized Table\n\n#### Problem\n\nYou want to\
    \ create a table that is the intersection of a many-to-many relationship between\
    \ two tables. The intersection table will consist of two columns. Each column\
    \ is a foreign key that maps back to a corresponding primary key in a parent table.\n\
    \n#### Solution\n\nIndex-organized tables (IOTs) are efficient objects when the\
    \ table data is typically accessed through querying on the primary key. Use the\
    \ `ORGANIZATION INDEX` clause to create an IOT:\n\n```\ncreate table cust_assoc\n\
    (cust_id number\n,user_group_id number\n,create_dtt timestamp(5)\n,update_dtt\
    \ timestamp(5)\n,constraint cust_assoc_pk primary key(cust_id, user_group_id)\n\
    )\norganization index\nincluding create_dtt\npctthreshold 30\ntablespace nsestar_index\n\
    overflow\ntablespace dim_index;\n```\n\nNotice that `DBA/ALL/USER_TABLES` includes\
    \ an entry for the table name used when creating an IOT. The following two queries\
    \ show how Oracle records the information regarding the IOT in the data dictionary:\n\
    \n```\nselect table_name, iot_name\nfrom user_tables\nwhere iot_name = 'CUST_ASSOC';\n\
    ```\n\nHere is some sample output:\n\n```\nTABLE_NAME                      IOT_NAME\n\
    ------------------------------ ------------------------------\nSYS_IOT_OVER_184185\
    \             CUST_ASSOC\n```\n\nListed next is another slightly different query\
    \ with its output:\n\n```\nselect table_name, iot_name\nfrom user_tables\nwhere\
    \ table_name = 'CUST_ASSOC';\n```\n\nHere is some sample output:\n\n```\nTABLE_NAME\
    \                      IOT_NAME\n------------------------------ ------------------------------\n\
    CUST_ASSOC\n```\n\nAdditionally, `DBA/ALL/USER_INDEXES` contains a record with\
    \ the name of the primary key constraint specified. The `INDEX_TYPE` column contains\
    \ a value of `IOT - TOP` for IOTs:\n\n```\nselect index_name, index_type\nfrom\
    \ user_indexes\nwhere table_name = 'CUST_ASSOC';\n```\n\nHere is some sample output:\n\
    \n```\nINDEX_NAME                      INDEX_TYPE\n------------------------------\
    \ ---------------------------\nCUST_ASSOC_PK                   IOT - TOP\n```\n\
    \n#### How It Works\n\nAn IOT stores the entire contents of the table's row in\
    \ a B-tree index structure. IOTs provide fast access for queries that have exact\
    \ matches and/or range searches on the primary key.\n\nAll columns specified up\
    \ to and including the column specified in the `INCLUDING` clause are stored in\
    \ the same block as the `CUST_ASSOC_PK` primary key column. In other words, the\
    \ `INCLUDING` clause specifies the last column to keep in the table segment. Columns\
    \ listed after the column specified in the `INCLUDING` clause are stored in the\
    \ overflow data segment. In the previous example, the `UPDATE_DTT` column is stored\
    \ in the overflow segment.\n\n`PCTTHRESHOLD` specifies the percentage of space\
    \ reserved in the index block for the IOT row. This value can be from 1 to 50,\
    \ and defaults to 50 if no value is specified. There must be enough space in the\
    \ index block to store the primary key. The `OVERFLOW` clause details which tablespace\
    \ should be used to store overflow data segments.\n\n### 2-15. Monitoring Index\
    \ Usage\n\n#### Problem\n\nYou maintain a large database that contains thousands\
    \ of indexes. As part of your proactive maintenance, you want to determine if\
    \ any indexes are not being used. You realize that unused indexes have a detrimental\
    \ impact on performance, because every time a row is inserted, updated, and deleted,\
    \ the corresponding index has to be maintained. This consumes CPU resources and\
    \ disk space. If an index isn't being used, it should be dropped.\n\n#### Solution\n\
    \nUse the `ALTER INDEX...MONITORING USAGE` statement to enable basic index monitoring.\
    \ The following example enables index monitoring on an index named `F_REGS_IDX1`:\n\
    \n```sql\nSQL> alter index f_regs_idx1 monitoring usage;\n```\n\nThe first time\
    \ the index is accessed, Oracle records this; you can view whether an index has\
    \ been accessed via the `V$OBJECT_USAGE` view. To report which indexes are being\
    \ monitored and have ever been used, run this query:\n\n```sql\nSQL> select index_name,\
    \ table_name, monitoring, used from v$object_usage;\n```\n\nIf the index has ever\
    \ been used in a `SELECT` statement, then the `USED` column will contain the `YES`\
    \ value. Here is some sample output from the prior query:\n\n```\nINDEX_NAME \
    \                     TABLE_NAME                     MON USED\n------------------------------\
    \ ------------------------------ --- ----\nF_REGS_IDX1                     F_REGS\
    \                         YES YES\n```\n\nMost likely, you won't monitor only\
    \ one index. Rather, you'll want to monitor all indexes for a user. In this situation,\
    \ use SQL to generate SQL to create a script you can run to turn on monitoring\
    \ for all indexes. Here's such a script:\n\n```sql\nset pagesize 0 head off linesize\
    \ 132\nspool enable_mon.sql\nselect\n  'alter index ' || index_name || ' monitoring\
    \ usage;'\nfrom user_indexes;\nspool off;\n```\n\nTo disable monitoring on an\
    \ index, use the `NOMONITORING USAGE` clause—for example:\n\n```sql\nSQL> alter\
    \ index f_regs_idx1 nomonitoring usage;\n```"
  raw: '#### Solution


    Here''s the basic syntax for creating a bitmap join index:


    `create bitmap index <index_name>`

    `on <fact_table> (<dimension_table.dimension_column>)`

    `from <fact_table>, <dimension_table>`

    `where <fact_table>.<foreign_key_column> = <dimension_table>.<primary_key_column>;`


    Bitmap join indexes are appropriate in situations where you''re joining two tables
    using the foreign key column(s) in one table that relate to primary key column(s)
    in another table. For example, suppose you typically retrieve the `CUST_NAME`
    from the `D_CUSTOMERS` table while joining to a large `F_SHIPMENTS` fact table.
    This example creates a bitmap join index between the `F_SHIPMENTS` and `D_CUSTOMERS`
    tables:


    `create bitmap index f_shipments_bm_idx1`

    `on f_shipments(d_customers.cust_name)`

    `from f_shipments, d_customers`

    `where f_shipments.d_cust_id = d_customers.d_cust_id;`


    Now, consider a query such as this:


    `select`

    `  d.cust_name`

    `from f_shipments f, d_customers d`

    `where f.d_cust_id = d.d_cust_id`

    `and d.cust_name = ''Sun'';`


    The optimizer can choose to use the bitmap join index and thus avoid the expense
    of having to join the tables.


    #### How It Works


    Bitmap join indexes store the results of a join between two tables in an index.
    Bitmap indexes are beneficial because they avoid joining tables to retrieve results.
    The syntax for a bitmap join index differs from a regular bitmap index in that
    it contains `FROM` and `WHERE` clauses.


    Bitmap join indexes are usually suitable only for data warehouse environments
    where you have tables that get loaded and then are not updated. When updating
    tables that have bitmap join indexes declared, this potentially results in several
    rows being locked. Therefore this type of an index is not suitable for an OLTP
    database.


    ### 2-14. Creating an Index-Organized Table


    #### Problem


    You want to create a table that is the intersection of a many-to-many relationship
    between two tables. The intersection table will consist of two columns. Each column
    is a foreign key that maps back to a corresponding primary key in a parent table.


    #### Solution


    Index-organized tables (IOTs) are efficient objects when the table data is typically
    accessed through querying on the primary key. Use the `ORGANIZATION INDEX` clause
    to create an IOT:


    `create table cust_assoc`

    `(cust_id number`

    `,user_group_id number`

    `,create_dtt timestamp(5)`

    `,update_dtt timestamp(5)`

    `,constraint cust_assoc_pk primary key(cust_id, user_group_id)`

    `)`

    `organization index`

    `including create_dtt`

    `pctthreshold 30`

    `tablespace nsestar_index`

    `overflow`

    `tablespace dim_index;`


    Notice that `DBA/ALL/USER_TABLES` includes an entry for the table name used when
    creating an IOT. The following two queries show how Oracle records the information
    regarding the IOT in the data dictionary:


    `select table_name, iot_name`

    `from user_tables`

    `where iot_name = ''CUST_ASSOC'';`


    Here is some sample output:


    `TABLE_NAME                     IOT_NAME`

    `------------------------------ ------------------------------`

    `SYS_IOT_OVER_184185            CUST_ASSOC`


    Listed next is another slightly different query with its output:


    `select table_name, iot_name`

    `from user_tables`

    `where table_name = ''CUST_ASSOC'';`


    Here is some sample output:


    `TABLE_NAME                     IOT_NAME`

    `------------------------------ ------------------------------`

    `CUST_ASSOC`


    Additionally, `DBA/ALL/USER_INDEXES` contains a record with the name of the primary
    key constraint specified. The `INDEX_TYPE` column contains a value of `IOT - TOP`
    for IOTs:


    `select index_name, index_type`

    `from user_indexes`

    `where table_name = ''CUST_ASSOC'';`


    Here is some sample output:


    `INDEX_NAME                     INDEX_TYPE`

    `------------------------------ ---------------------------`

    `CUST_ASSOC_PK                  IOT - TOP`


    #### How It Works


    An IOT stores the entire contents of the table''s row in a B-tree index structure.
    IOTs provide fast access for queries that have exact matches and/or range searches
    on the primary key.


    All columns specified up to and including the column specified in the `INCLUDING`
    clause are stored in the same block as the `CUST_ASSOC_PK` primary key column.
    In other words, the `INCLUDING` clause specifies the last column to keep in the
    table segment. Columns listed after the column specified in the `INCLUDING` clause
    are stored in the overflow data segment. In the previous example, the `UPDATE_DTT`
    column is stored in the overflow segment.


    `PCTTHRESHOLD` specifies the percentage of space reserved in the index block for
    the IOT row. This value can be from 1 to 50, and defaults to 50 if no value is
    specified. There must be enough space in the index block to store the primary
    key. The `OVERFLOW` clause details which tablespace should be used to store overflow
    data segments.


    ### 2-15\. Monitoring Index Usage


    #### Problem


    You maintain a large database that contains thousands of indexes. As part of your
    proactive maintenance, you want to determine if any indexes are not being used.
    You realize that unused indexes have a detrimental impact on performance, because
    every time a row is inserted, updated, and deleted, the corresponding index has
    to be maintained. This consumes CPU resources and disk space. If an index isn''t
    being used, it should be dropped.


    #### Solution


    Use the `ALTER INDEX...MONITORING USAGE` statement to enable basic index monitoring.
    The following example enables index monitoring on an index named `F_REGS_IDX1`:


    `SQL> alter index f_regs_idx1 monitoring usage;`


    The first time the index is accessed, Oracle records this; you can view whether
    an index has been accessed via the `V$OBJECT_USAGE` view. To report which indexes
    are being monitored and have ever been used, run this query:


    `SQL> select index_name, table_name, monitoring, used from v$object_usage;`


    If the index has ever been used in a `SELECT` statement, then the `USED` column
    will contain the `YES` value. Here is some sample output from the prior query:


    `INDEX_NAME                     TABLE_NAME                     MON USED`

    `------------------------------ ------------------------------ --- ----`

    `F_REGS_IDX1                    F_REGS                         YES YES`


    Most likely, you won''t monitor only one index. Rather, you''ll want to monitor
    all indexes for a user. In this situation, use SQL to generate SQL to create a
    script you can run to turn on monitoring for all indexes. Here''s such a script:


    `set pagesize 0 head off linesize 132`

    `spool enable_mon.sql`

    `select`

    `  ''alter index '' || index_name || '' monitoring usage;''`

    `from user_indexes;`

    `spool off;`


    To disable monitoring on an index, use the `NOMONITORING USAGE` clause—for example:


    `SQL> alter index f_regs_idx1 nomonitoring usage;`'
  trans: "\n### 2-14. 创建索引组织表\n\n#### 问题\n\n你想要创建一个表，作为另外两个表之间多对多关系的交集。这个交集表将包含两列。每一列都是一个外键，映射回父表中的相应主键。\n\
    \n#### 解决方案\n\n当表数据通常通过查询主键来访问时，索引组织表（IOT）是高效的对象。使用 `ORGANIZATION INDEX` 子句来创建一个\
    \ IOT：\n\n```\ncreate table cust_assoc\n(cust_id number\n,user_group_id number\n\
    ,create_dtt timestamp(5)\n,update_dtt timestamp(5)\n,constraint cust_assoc_pk\
    \ primary key(cust_id, user_group_id)\n)\norganization index\nincluding create_dtt\n\
    pctthreshold 30\ntablespace nsestar_index\noverflow\ntablespace dim_index;\n```\n\
    \n请注意，`DBA/ALL/USER_TABLES` 包含了创建 IOT 时所用表名的条目。以下两个查询展示了 Oracle 如何在数据字典中记录 IOT\
    \ 的信息：\n\n```\nselect table_name, iot_name\nfrom user_tables\nwhere iot_name =\
    \ 'CUST_ASSOC';\n```\n\n以下是一些示例输出：\n\n```\nTABLE_NAME                      IOT_NAME\n\
    ------------------------------ ------------------------------\nSYS_IOT_OVER_184185\
    \             CUST_ASSOC\n```\n\n接下来是另一个略有不同的查询及其输出：\n\n```\nselect table_name,\
    \ iot_name\nfrom user_tables\nwhere table_name = 'CUST_ASSOC';\n```\n\n以下是一些示例输出：\n\
    \n```\nTABLE_NAME                      IOT_NAME\n------------------------------\
    \ ------------------------------\nCUST_ASSOC\n```\n\n此外，`DBA/ALL/USER_INDEXES`\
    \ 包含一条记录，其名称为指定的主键约束名。对于 IOT，`INDEX_TYPE` 列的值为 `IOT - TOP`：\n\n```\nselect index_name,\
    \ index_type\nfrom user_indexes\nwhere table_name = 'CUST_ASSOC';\n```\n\n以下是一些示例输出：\n\
    \n```\nINDEX_NAME                      INDEX_TYPE\n------------------------------\
    \ ---------------------------\nCUST_ASSOC_PK                   IOT - TOP\n```\n\
    \n#### 工作原理\n\nIOT 在 B 树索引结构中存储表行的全部内容。对于那些在主键上进行精确匹配和/或范围搜索的查询，IOT 提供了快速的访问。\n\
    \n在 `INCLUDING` 子句中指定并包含的列之前的所有列，都与 `CUST_ASSOC_PK` 主键列存储在同一个块中。换句话说，`INCLUDING`\
    \ 子句指定了保留在表段中的最后一列。列在 `INCLUDING` 子句中指定列之后的列将存储在溢出数据段中。在前面的例子中，`UPDATE_DTT` 列存储在溢出段中。\n\
    \n`PCTTHRESHOLD` 指定了为 IOT 行在索引块中保留的空间百分比。该值可以是 1 到 50，如果未指定值，则默认为 50。索引块中必须有足够的空间来存储主键。`OVERFLOW`\
    \ 子句详细说明了应使用哪个表空间来存储溢出数据段。\n\n### 2-15. 监控索引使用情况\n\n#### 问题\n\n你维护一个包含数千个索引的大型数据库。作为主动维护的一部分，你希望确定是否有任何索引未被使用。你意识到未使用的索引会对性能产生负面影响，因为每次插入、更新和删除行时，都必须维护相应的索引。这会消耗\
    \ CPU 资源和磁盘空间。如果一个索引没有被使用，就应该将其删除。\n\n#### 解决方案\n\n使用 `ALTER INDEX...MONITORING\
    \ USAGE` 语句来启用基本的索引监控。以下示例在名为 `F_REGS_IDX1` 的索引上启用索引监控：\n\n```sql\nSQL> alter\
    \ index f_regs_idx1 monitoring usage;\n```\n\n第一次访问该索引时，Oracle 会记录下来；你可以通过 `V$OBJECT_USAGE`\
    \ 视图查看索引是否已被访问过。要报告哪些索引正在被监控并且曾经被使用过，请运行以下查询：\n\n```sql\nSQL> select index_name,\
    \ table_name, monitoring, used from v$object_usage;\n```\n\n如果该索引曾在 `SELECT` 语句中使用过，那么\
    \ `USED` 列将包含 `YES` 值。以下是先前查询的一些示例输出：\n\n```\nINDEX_NAME                     \
    \ TABLE_NAME                     MON USED\n------------------------------ ------------------------------\
    \ --- ----\nF_REGS_IDX1                     F_REGS                         YES\
    \ YES\n```\n\n很可能，你不会只监控一个索引。相反，你会希望监控某个用户的所有索引。在这种情况下，使用 SQL 生成 SQL 来创建一个可以运行的脚本，以打开对所有索引的监控。下面就是这样一个脚本：\n\
    \n```sql\nset pagesize 0 head off linesize 132\nspool enable_mon.sql\nselect\n\
    \  'alter index ' || index_name || ' monitoring usage;'\nfrom user_indexes;\n\
    spool off;\n```\n\n要禁用对索引的监控，请使用 `NOMONITORING USAGE` 子句——例如：\n\n```sql\nSQL>\
    \ alter index f_regs_idx1 nomonitoring usage;\n```\n"
- fmt: "#### How It Works\n\n监控索引使用情况的主要优势在于识别未被使用的索引。这允许你找出可以删除的索引，从而释放磁盘空间并提升 DML\
    \ 语句的性能。\n\n`V$OBJECT_USAGE` 视图仅显示当前连接用户的信息。你可以通过检查 `DBA_VIEWS` 中 `V$OBJECT_USAGE`\
    \ 定义的 `TEXT` 列来验证此行为：\n\n```sql\nSQL> select text from dba_views where view_name\
    \ = 'V$OBJECT_USAGE';\n```\n\n请注意输出中的以下行：\n\n```sql\nwhere io.owner# = userenv('SCHEMAID')\n\
    ```\n\n该行指示视图仅显示当前连接用户的信息。如果你以具有 DBA 权限的用户登录，并希望查看所有启用了监控的索引状态（无论用户是谁），请执行此查询：\n\
    \n```sql\nselect io.name, t.name,\n       decode(bitand(i.flags, 65536), 0, 'NO',\
    \ 'YES'),\n       decode(bitand(ou.flags, 1), 0, 'NO', 'YES'),\n       ou.start_monitoring,\n\
    \       ou.end_monitoring\nfrom sys.obj$ io\n     ,sys.obj$ t\n     ,sys.ind$\
    \ i\n     ,sys.object_usage ou\nwhere i.obj# = ou.obj#\nand io.obj# = ou.obj#\n\
    and t.obj# = i.bo#;\n```\n\n之前的查询移除了将输出限制为仅显示当前登录用户信息的那一行。这为你提供了一种便捷的方式来查看所有受监控的索引。\n\
    \n### 2-16. 最大化索引创建速度\n\n#### 问题\n\n你正在基于一个包含数百万行的表创建索引。你希望尽可能快地创建该索引。\n\n####\
    \ 解决方案\n\n本解决方案描述了两种提高索引创建速度的技术：\n\n*   关闭重做日志生成\n*   提高并行度\n\n你可以独立使用这两种功能，也可以结合使用它们。\n\
    \n##### 关闭重做日志生成\n\n你可以选择使用 `NOLOGGING` 子句创建索引。这样做有以下影响：\n\n*   不会生成在发生介质故障时恢复索引所需的重做日志。\n\
    *   随后的直接路径操作也不会生成在发生介质故障时恢复索引信息所需的重做日志。\n\n以下是一个使用 `NOLOGGING` 子句创建索引的示例：\n\n\
    ```sql\ncreate index inv_idx1 on inv(inv_id, inv_id2)\nnologging\ntablespace inv_mgmt_index;\n\
    ```\n\n你可以运行此查询来确定索引是否是用 `NOLOGGING` 创建的：\n\n```sql\nSQL> select index_name, logging\
    \ from user_indexes;\n```\n\n##### 提高并行度\n\n在大型数据库环境中，当你试图为一个填充了大量行的表创建索引时，通过使用\
    \ `PARALLEL` 子句，你可能能够减少创建索引所需的时间。例如，以下语句在创建索引时将并行度设置为 2：\n\n```sql\ncreate index\
    \ inv_idx1 on inv(inv_id)\nparallel 2\ntablespace inv_mgmt_data;\n```\n\n你可以通过此查询验证索引的并行度：\n\
    \n```sql\nSQL> select index_name, degree from user_indexes;\n```\n\n![images](images/square.jpg)\
    \ **注意** 如果你不指定并行度，Oracle 会基于 CPU 核心数乘以 `PARALLEL_THREADS_PER_CPU` 的值来选择一个并行度。\n\
    \n#### 工作原理\n\n`NOLOGGING` 的主要优势在于，当你创建索引时，生成的重做信息量极少，这对于创建大型索引可能具有显著的性能优势。缺点是，如果你在索引创建后不久经历了介质故障（或者通过直接路径操作插入了记录），并且随后发生了导致你必须从备份（在索引创建之前拍摄的）恢复的故障，那么在访问索引时可能会看到此错误：\n\
    \n```sql\nORA-01578: ORACLE data block corrupted (file # 4, block # 11407)\nORA-01110:\
    \ data file 4: '/ora01/dbfile/O11R2/inv_mgmt_index01.dbf'\nORA-26040: Data block\
    \ was loaded using the NOLOGGING option\n```\n\n此错误表明索引存在逻辑损坏。在这种情况下，你必须在索引可用之前重新创建或重建它。在大多数场景下，创建索引时使用\
    \ `NOLOGGING` 子句是可以接受的，因为索引可以被重新创建或重建，而不会影响其基础表。\n\n除了 `NOLOGGING`，你还可以使用 `PARALLEL`\
    \ 子句来提高索引创建速度。对于大型索引，这可以显著减少创建索引所需的时间。\n\n请记住，你可以将 `NOLOGGING` 与 `PARALLEL` 结合使用。下一个示例以并行方式重建索引，同时生成最小数量的重做日志：\n\
    \n```sql\nSQL> alter index inv_idx1 rebuild parallel nologging;\n```\n\n### 2-17.\
    \ 回收未使用的索引空间\n\n#### 问题\n\n你有一个索引在段中占用了空间，但实际上并未使用该空间。例如，你正在运行以下查询来显示段顾问的建议：\n\
    \n```sql\nSELECT\n 'Task Name        : ' || f.task_name  || CHR(10) ||\n 'Start\
    \ Run Time   : ' || TO_CHAR(execution_start, 'dd-mon-yy hh24:mi') || chr (10)\
    \ ||\n 'Segment Name     : ' || o.attr2      || CHR(10) ||\n 'Segment Type   \
    \  : ' || o.type       || CHR(10) ||\n 'Partition Name   : ' || o.attr3      ||\
    \ CHR(10) ||\n 'Message          : ' || f.message    || CHR(10) ||\n 'More Info\
    \        : ' || f.more_info  || CHR(10) ||\n '------------------------------------------------------'\
    \ Advice\nFROM dba_advisor_findings   f\n    ,dba_advisor_objects    o\n    ,dba_advisor_executions\
    \ e\nWHERE o.task_id   = f.task_id\nAND   o.object_id = f.object_id\nAND   f.task_id\
    \   = e.task_id\nAND   e. execution_start > sysdate - 1\nAND   e.advisor_name\
    \ = 'Segment Advisor'\nORDER BY f.task_name;\n```\n\n将显示以下输出：\n\n```sql\nADVICE\n\
    --------------------------------------------------------------------------------\n\
    Task Name        : F_REGS Advice\nStart Run Time   : 19-feb-11 09:32\nSegment\
    \ Name     : F_REGS_IDX1\nSegment Type     : INDEX\nPartition Name   :\nMessage\
    \          : Perform shrink, estimated savings is 84392870 bytes.\nMore Info \
    \       : Allocated Space:166723584: Used Space:82330714: Reclaimable S\npace\
    \ :84392870:\n------------------------------------------------------\n```\n\n\
    你想要收缩索引以释放未使用的空间。\n\n#### 解决方案\n\n有几种有效的方法可以释放与索引关联的未使用空间：\n\n*   重建索引\n*   收缩索引\n\
    \n在执行这两种操作中的任何一种之前，首先检查 `USER_SEGMENTS` 以验证使用的空间量是否与段顾问的建议相符。在此示例中，段名称是 `F_REGS_IDX1`：\n\
    \n```sql\nSQL> select bytes from user_segments where segment_name = 'F_REGS_IDX1';\n\
    ```\n\n```sql\nBYTES\n----------\n 166723584\n```\n\n此示例使用 `ALTER INDEX...REBUILD`\
    \ 语句来重组和压缩索引使用的空间：\n\n```sql\nSQL> alter index f_regs_idx1 rebuild;\n```\n\n或者，使用\
    \ `ALTER INDEX...SHRINK SPACE` 语句来释放索引中的未使用空间，例如：\n\n```sql\nSQL> alter index\
    \ f_regs_idx1 shrink space;\n```\n\n```sql\nIndex altered.\n```\n\n现在再次查询 `USER_SEGMENTS`\
    \ 以验证空间是否已被释放。以下是此示例的输出：\n\n```sql\n  BYTES\n----------\n    524288\n```\n\n索引消耗的空间已显著减少。"
  raw: '#### How It Works


    The main advantage to monitoring index usage is to identify indexes not being
    used. This allows you to identify indexes that can be dropped. This will free
    up disk space and improve the performance of DML statements.


    The `V$OBJECT_USAGE` view shows information only for the currently connected user.
    You can verify this behavior by inspecting the `TEXT` column of `DBA_VIEWS` for
    the `V$OBJECT_USAGE` definition:


    `SQL> select text from dba_views where view_name = ''V$OBJECT_USAGE'';`


    Notice the following line in the output:


    `where io.owner# = userenv(''SCHEMAID'')`


    That line instructs the view to display information only for the currently connected
    user. If you''re logged in as a DBA privileged user and want to view the status
    of all indexes that have monitoring enabled (regardless of the user), execute
    this query:


    `select io.name, t.name,`

    `       decode(bitand(i.flags, 65536), 0, ''NO'', ''YES''),`

    `       decode(bitand(ou.flags, 1), 0, ''NO'', ''YES''),`

    `       ou.start_monitoring,`

    `       ou.end_monitoring`

    `from sys.obj$ io`

    `     ,sys.obj$ t`

    `     ,sys.ind$ i`

    `     ,sys.object_usage ou`

    `where i.obj# = ou.obj#`

    `and io.obj# = ou.obj#`

    `and t.obj# = i.bo#;`


    The prior query removes the line from the query that restricts output to display
    information only for the currently logged-in user. This provides you with a convenient
    way to view all monitored indexes.


    ### 2-16. Maximizing Index Creation Speed


    #### Problem


    You''re creating an index based on a table that contains millions of rows. You
    want to create the index as fast as possible.


    #### Solution


    This solution describes two techniques for increasing the speed of index creation:


    *   Turning off redo generation

    *   Increasing the degree of parallelism


    You can use the prior two features independently of each other, or they can be
    used in conjunction.


    ##### Turning Off Redo Generation


    You can optionally create an index with the `NOLOGGING` clause. Doing so has these
    implications:


    *   The redo isn''t generated that would be required to recover the index in the
    event of a media failure.

    *   Subsequent direct-path operations also won''t generate the redo required to
    recover the index information in the event of a media failure.


    Here''s an example of creating an index with the `NOLOGGING` clause:


    `create index inv_idx1 on inv(inv_id, inv_id2)`

    `nologging`

    `tablespace inv_mgmt_index;`


    You can run this query to determine whether an index has been created with `NOLOGGING`:


    `SQL> select index_name, logging from user_indexes;`


    ##### Increasing the Degree of Parallelism


    In large database environments where you''re attempting to create an index on
    a table that is populated with many rows, you may be able to reduce the time it
    takes to create the index by using the `PARALLEL` clause. For example, this sets
    the degree of parallelism to 2 when creating the index:


    `create index inv_idx1 on inv(inv_id)`

    `parallel 2`

    `tablespace inv_mgmt_data;`


    You can verify the degree of parallelism on an index via this query:


    `SQL> select index_name, degreel from user_indexes;`


    ![images](images/square.jpg) **Note** If you don''t specify a degree of parallelism,
    Oracle selects a degree based on the number of CPUs on the box times the value
    of `PARALLEL_THREADS_PER_CPU`.


    #### How It Works


    The main advantage of `NOLOGGING` is that when you create the index, a minimal
    amount of redo information is generated, which can have significant performance
    implications when creating a large index. The disadvantage is that if you experience
    a media failure soon after the index is created (or have records inserted via
    a direct-path operation), and subsequently have a failure that causes you to restore
    from a backup (taken prior to the index creation), then you may see this error
    when the index is accessed:


    `ORA-01578: ORACLE data block corrupted (file # 4, block # 11407)`

    `ORA-01110: data file 4: ''/ora01/dbfile/O11R2/inv_mgmt_index01.dbf''`

    `ORA-26040: Data block was loaded using the NOLOGGING option`


    This error indicates that the index is logically corrupt. In this scenario, you
    must re-create or rebuild the index before it''s usable. In most scenarios, it''s
    acceptable to use the `NOLOGGING` clause when creating an index, because the index
    can be re-created or rebuilt without affecting the table on which the index is
    based.


    In addition to `NOLOGGING`, you can use the `PARALLEL` clause to increase the
    speed of an index creation. For large indexes, this can significantly decrease
    the time required to create an index.


    Keep in mind that you can use `NOLOGGING` in combination with `PARALLEL`. This
    next example rebuilds an index in parallel while generating a minimal amount of
    redo:


    `SQL> alter index inv_idx1 rebuild parallel nologging;`


    ### 2-17. Reclaiming Unused Index Space


    #### Problem


    You have an index consuming space in a segment, but without actually using that
    space. For example, you''re running the following query to display the Segment
    Advisor''s advice:


    `SELECT`

    ` ''Task Name        : '' || f.task_name  || CHR(10) ||`

    ` ''Start Run Time   : '' || TO_CHAR(execution_start, ''dd-mon-yy hh24:mi'') ||
    chr (10) ||`

    ` ''Segment Name     : '' || o.attr2      || CHR(10) ||`

    ` ''Segment Type     : '' || o.type       || CHR(10) ||`

    ` ''Partition Name   : '' || o.attr3      || CHR(10) ||`

    ` ''Message          : '' || f.message    || CHR(10) ||`

    ` ''More Info        : '' || f.more_info  || CHR(10) ||`

    ` ''------------------------------------------------------'' Advice`

    `FROM dba_advisor_findings   f`

    `    ,dba_advisor_objects    o`

    `    ,dba_advisor_executions e`

    `WHERE o.task_id   = f.task_id`

    `AND   o.object_id = f.object_id`

    `AND   f.task_id   = e.task_id`

    `AND   e. execution_start > sysdate - 1`

    `AND   e.advisor_name = ''Segment Advisor''`

    `ORDER BY f.task_name;`


    The following output is displayed:


    `ADVICE`

    `--------------------------------------------------------------------------------`

    `Task Name        : F_REGS Advice`

    `Start Run Time   : 19-feb-11 09:32`

    `Segment Name     : F_REGS_IDX1`

    `Segment Type     : INDEX`

    `Partition Name   :`

    `Message          : Perform shrink, estimated savings is 84392870 bytes.`

    `More Info        : Allocated Space:166723584: Used Space:82330714: Reclaimable
    S`

    `pace :84392870:`

    `------------------------------------------------------`


    You want to shrink the index to free up the unused space.


    #### Solution


    There are a couple of effective methods for freeing up unused space associated
    with an index:


    *   Rebuilding the index

    *   Shrinking the index


    Before you perform either of these operations, first check `USER_SEGMENTS` to
    verify that the amount of space used corresponds with the Segment Advisor''s advice.
    In this example, the segment name is `F_REGS_IDX1`:


    `SQL> select bytes from user_segments where segment_name = ''F_REGS_IDX1'';`


    `BYTES`

    `----------`

    ` 166723584`


    This example uses the `ALTER INDEX...REBUILD` statement to re-organize and compact
    the space used by an index:


    `SQL> alter index f_regs_idx1 rebuild;`


    Alternatively, use the `ALTER INDEX...SHRINK SPACE` statement to free up unused
    space in an index—for example:


    `SQL> alter index f_regs_idx1 shrink space;`


    `Index altered.`


    Now query `USER_SEGMENTS` again to verify that the space has been de-allocated.
    Here is the output for this example:


    `  BYTES`

    `----------`

    `    524288`


    The space consumed by the index has considerably decreased.'
  trans: "\n#### 工作原理\n\n监控索引使用情况的主要优势在于识别未被使用的索引。这允许你找出可以删除的索引，从而释放磁盘空间并提升 DML 语句的性能。\n\
    \n`V$OBJECT_USAGE` 视图仅显示当前连接用户的信息。你可以通过检查 `DBA_VIEWS` 中 `V$OBJECT_USAGE` 定义的 `TEXT`\
    \ 列来验证此行为：\n\n```sql\nSQL> select text from dba_views where view_name = 'V$OBJECT_USAGE';\n\
    ```\n\n请注意输出中的以下行：\n\n```sql\nwhere io.owner# = userenv('SCHEMAID')\n```\n\n该行指示视图仅显示当前连接用户的信息。如果你以具有\
    \ DBA 权限的用户登录，并希望查看所有启用了监控的索引状态（无论用户是谁），请执行此查询：\n\n```sql\nselect io.name, t.name,\n\
    \       decode(bitand(i.flags, 65536), 0, 'NO', 'YES'),\n       decode(bitand(ou.flags,\
    \ 1), 0, 'NO', 'YES'),\n       ou.start_monitoring,\n       ou.end_monitoring\n\
    from sys.obj$ io\n     ,sys.obj$ t\n     ,sys.ind$ i\n     ,sys.object_usage ou\n\
    where i.obj# = ou.obj#\nand io.obj# = ou.obj#\nand t.obj# = i.bo#;\n```\n\n之前的查询移除了将输出限制为仅显示当前登录用户信息的那一行。这为你提供了一种便捷的方式来查看所有受监控的索引。\n\
    \n### 2-16. 最大化索引创建速度\n\n#### 问题\n\n你正在基于一个包含数百万行的表创建索引。你希望尽可能快地创建该索引。\n\n####\
    \ 解决方案\n\n本解决方案描述了两种提高索引创建速度的技术：\n\n*   关闭重做日志生成\n*   提高并行度\n\n你可以独立使用这两种功能，也可以结合使用它们。\n\
    \n##### 关闭重做日志生成\n\n你可以选择使用 `NOLOGGING` 子句创建索引。这样做有以下影响：\n\n*   不会生成在发生介质故障时恢复索引所需的重做日志。\n\
    *   随后的直接路径操作也不会生成在发生介质故障时恢复索引信息所需的重做日志。\n\n以下是一个使用 `NOLOGGING` 子句创建索引的示例：\n\n\
    ```sql\ncreate index inv_idx1 on inv(inv_id, inv_id2)\nnologging\ntablespace inv_mgmt_index;\n\
    ```\n\n你可以运行此查询来确定索引是否是用 `NOLOGGING` 创建的：\n\n```sql\nSQL> select index_name, logging\
    \ from user_indexes;\n```\n\n##### 提高并行度\n\n在大型数据库环境中，当你试图为一个填充了大量行的表创建索引时，通过使用\
    \ `PARALLEL` 子句，你可能能够减少创建索引所需的时间。例如，以下语句在创建索引时将并行度设置为 2：\n\n```sql\ncreate index\
    \ inv_idx1 on inv(inv_id)\nparallel 2\ntablespace inv_mgmt_data;\n```\n\n你可以通过此查询验证索引的并行度：\n\
    \n```sql\nSQL> select index_name, degree from user_indexes;\n```\n\n![images](img/square.jpg)\
    \ **注意** 如果你不指定并行度，Oracle 会基于 CPU 核心数乘以 `PARALLEL_THREADS_PER_CPU` 的值来选择一个并行度。\n\
    \n#### 工作原理\n\n`NOLOGGING` 的主要优势在于，当你创建索引时，生成的重做信息量极少，这对于创建大型索引可能具有显著的性能优势。缺点是，如果你在索引创建后不久经历了介质故障（或者通过直接路径操作插入了记录），并且随后发生了导致你必须从备份（在索引创建之前拍摄的）恢复的故障，那么在访问索引时可能会看到此错误：\n\
    \n```sql\nORA-01578: ORACLE data block corrupted (file # 4, block # 11407)\nORA-01110:\
    \ data file 4: '/ora01/dbfile/O11R2/inv_mgmt_index01.dbf'\nORA-26040: Data block\
    \ was loaded using the NOLOGGING option\n```\n\n此错误表明索引存在逻辑损坏。在这种情况下，你必须在索引可用之前重新创建或重建它。在大多数场景下，创建索引时使用\
    \ `NOLOGGING` 子句是可以接受的，因为索引可以被重新创建或重建，而不会影响其基础表。\n\n除了 `NOLOGGING`，你还可以使用 `PARALLEL`\
    \ 子句来提高索引创建速度。对于大型索引，这可以显著减少创建索引所需的时间。\n\n请记住，你可以将 `NOLOGGING` 与 `PARALLEL` 结合使用。下一个示例以并行方式重建索引，同时生成最小数量的重做日志：\n\
    \n```sql\nSQL> alter index inv_idx1 rebuild parallel nologging;\n```\n\n### 2-17.\
    \ 回收未使用的索引空间\n\n#### 问题\n\n你有一个索引在段中占用了空间，但实际上并未使用该空间。例如，你正在运行以下查询来显示段顾问的建议：\n\
    \n```sql\nSELECT\n 'Task Name        : ' || f.task_name  || CHR(10) ||\n 'Start\
    \ Run Time   : ' || TO_CHAR(execution_start, 'dd-mon-yy hh24:mi') || chr (10)\
    \ ||\n 'Segment Name     : ' || o.attr2      || CHR(10) ||\n 'Segment Type   \
    \  : ' || o.type       || CHR(10) ||\n 'Partition Name   : ' || o.attr3      ||\
    \ CHR(10) ||\n 'Message          : ' || f.message    || CHR(10) ||\n 'More Info\
    \        : ' || f.more_info  || CHR(10) ||\n '------------------------------------------------------'\
    \ Advice\nFROM dba_advisor_findings   f\n    ,dba_advisor_objects    o\n    ,dba_advisor_executions\
    \ e\nWHERE o.task_id   = f.task_id\nAND   o.object_id = f.object_id\nAND   f.task_id\
    \   = e.task_id\nAND   e. execution_start > sysdate - 1\nAND   e.advisor_name\
    \ = 'Segment Advisor'\nORDER BY f.task_name;\n```\n\n将显示以下输出：\n\n```sql\nADVICE\n\
    --------------------------------------------------------------------------------\n\
    Task Name        : F_REGS Advice\nStart Run Time   : 19-feb-11 09:32\nSegment\
    \ Name     : F_REGS_IDX1\nSegment Type     : INDEX\nPartition Name   :\nMessage\
    \          : Perform shrink, estimated savings is 84392870 bytes.\nMore Info \
    \       : Allocated Space:166723584: Used Space:82330714: Reclaimable S\npace\
    \ :84392870:\n------------------------------------------------------\n```\n\n\
    你想要收缩索引以释放未使用的空间。\n\n#### 解决方案\n\n有几种有效的方法可以释放与索引关联的未使用空间：\n\n*   重建索引\n*   收缩索引\n\
    \n在执行这两种操作中的任何一种之前，首先检查 `USER_SEGMENTS` 以验证使用的空间量是否与段顾问的建议相符。在此示例中，段名称是 `F_REGS_IDX1`：\n\
    \n```sql\nSQL> select bytes from user_segments where segment_name = 'F_REGS_IDX1';\n\
    ```\n\n```sql\nBYTES\n----------\n 166723584\n```\n\n此示例使用 `ALTER INDEX...REBUILD`\
    \ 语句来重组和压缩索引使用的空间：\n\n```sql\nSQL> alter index f_regs_idx1 rebuild;\n```\n\n或者，使用\
    \ `ALTER INDEX...SHRINK SPACE` 语句来释放索引中的未使用空间，例如：\n\n```sql\nSQL> alter index\
    \ f_regs_idx1 shrink space;\n```\n\n```sql\nIndex altered.\n```\n\n现在再次查询 `USER_SEGMENTS`\
    \ 以验证空间是否已被释放。以下是此示例的输出：\n\n```sql\n  BYTES\n----------\n    524288\n```\n\n索引消耗的空间已显著减少。\n"
- fmt: "#### How It Works\n\n通常，重建索引是回收索引占用的未用空间最快、最有效的方法。因此，我们推荐使用这种方法来回收未使用的索引空间。释放空间是可取的，因为它确保你只使用对象所需的空间量。它还具有性能优势，因为\
    \ Oracle 在执行读取操作时需要管理和排序的块更少。\n\n除了释放空间，你可能还因为以下额外原因考虑重建索引：\n\n*   索引已损坏。\n* \
    \  你希望修改存储特性（例如更改表空间）。\n*   之前标记为不可用的索引现在需要重建以使其重新可用。\n\n请记住，Oracle 会尝试获取表上的锁并在线重建索引。如果有任何未提交的活动事务，那么\
    \ Oracle 将无法获得锁，并会抛出以下错误：\n\n`ORA-00054: resource busy and acquire with NOWAIT\
    \ specified or timeout expired`\n\n在这种情况下，你可以等到数据库活动很少时再操作，或者尝试设置 `DDL_LOCK_TIMEOUT`\
    \ 参数：\n\n`SQL> alter session set ddl_lock_timeout=15;`\n\n`DDL_LOCK_TIMEOUT` 初始化参数在\
    \ Oracle Database 11g 或更高版本中可用。它指示 Oracle 在指定的时间内反复尝试获取锁。\n\n如果未指定表空间，Oracle 会在索引当前所在的表空间中重建它。如果你希望索引在不同的表空间中重建，请指定一个表空间：\n\
    \n`SQL> alter index inv_idx1 rebuild tablespace inv_index;`\n\n![images](images/square.jpg)\
    \ **提示** 如果你正在处理大型索引，可以考虑使用 `NOLOGGING` 和/或 `PARALLEL` 等功能（详见配方 2-16）。\n\n如果你使用\
    \ `ALTER INDEX...SHRINK SPACE` 操作来释放未使用的索引空间，请记住此功能要求目标对象必须在启用了自动段空间管理的表空间中创建。如果你尝试收缩在使用手动段空间管理的表空间中创建的表或索引，你将收到此错误：\n\
    \n`ORA-10635: Invalid segment or tablespace type`\n\n正如我们在本章其他地方指出的，我们建议你尽可能使用\
    \ ASSM 功能。这使你可以利用所有的 Oracle 段管理功能。\n\n`ALTER INDEX...SHRINK SPACE` 语句有一些需要注意的细微差别。例如，你可以通过\
    \ `COMPACT` 子句指示 Oracle 仅尝试合并索引块的内容（而不释放空间）：\n\n`SQL> alter index f_regs_idx1\
    \ shrink space compact;`\n\n前面的操作等同于 `ALTER INDEX...COALESCE` 语句。以下是使用 `COALESCE`\
    \ 的示例：\n\n`SQL> alter index f_regs_idx1 coalesce;`\n\n如果你想最大化压缩的空间，要么重建索引，要么使用\
    \ `SHRINK SPACE` 子句，如本配方的“解决方案”部分所示。`COMPACT` 空间实际上并不启动更大程度的已释放空间，这有点违反直觉。`COMPACT`\
    \ 子句指示 Oracle 仅在可能的情况下合并索引块，而不去最大化释放的空间量。\n\n### 优化实例内存\n\n优化分配给 Oracle 数据库的内存是你作为\
    \ DBA 需要执行的最关键任务之一。多年来，Oracle DBA 习惯于花费大量时间分析数据库的内存使用情况，并尝试提出最佳的内存分配方案。在 Oracle\
    \ Database 11g 中，分配 Oracle 内存的负担几乎完全转移给了数据库本身。本章向你展示如何利用 Oracle 的自动内存管理功能，这样你就可以让数据库优化内存使用，而你则专注于更重要的事务。\n\
    \n本章首先解释如何为数据库设置自动内存管理。本章还向你展示即使在自动内存管理下，如何为某些内存组件设置最小值。它还包括一些配方，解释如何创建多个缓冲池、如何监控\
    \ Oracle 的内存使用，以及如何使用 Oracle Enterprise Manager 的 Database Control（或 Grid Control）工具从\
    \ Oracle 获取有关最佳内存分配大小的建议。你还将学习如何优化程序全局区（PGA）的使用，这是 Oracle 的一个关键内存组件，尤其在数据仓库环境中。\n\
    \n在 Oracle Database 11g 中，Oracle 引入了一项令人兴奋的新结果缓存功能。Oracle 现在可以在 Oracle 内存的共享池组件中缓存\
    \ SQL 查询和 PL/SQL 函数的结果。我们将在本章讨论该服务器结果缓存。此外，你还会找到一个解释如何利用 Oracle 客户端结果缓存功能的配方。最后，我们展示如何使用名为\
    \ Oracle Database Smart Flash Cache 的令人兴奋的新功能。\n\n#### 3-1. 自动化内存管理\n\n##### 问题\n\
    \n你希望在 Oracle 数据库中自动化内存管理。你的数据库中同时运行着 OLTP 和批处理作业。你希望利用 Oracle Database 11g 内置的自动内存管理功能。\n\
    \n##### 解决方案\n\n如果你已经设置了 `SGA_TARGET` 或 `PGA_AGGREGATE_TARGET` 参数（或两者），以下是实现在数据库中自动内存管理的步骤。我们假设将为\
    \ `MEMORY_MAX_TARGET` 参数分配 2000 MB，为 `MEMORY_TARGET` 参数分配 1000 MB。\n\n1.  使用 SYSDBA\
    \ 权限连接到数据库。\n2.  假设你使用的是 `SPFILE`，首先为 `MEMORY_MAX_TARGET` 参数设置一个值：\n\n    `SQL>\
    \ alter system set memory_max_target=2G scope=spfile;`\n    `System altered.`\n\
    \n    你必须在 `alter system` 命令中指定 `SCOPE` 参数，因为 `MEMORY_MAX_TARGET` 不是动态参数，这意味着你不能在实例运行时动态更改它。\n\
    \n3.  请注意，如果你是使用传统的 `init.ora` 参数文件而不是 `SPFILE` 启动的实例，你必须将以下内容添加到你的 `init.ora`\
    \ 文件中：`memory_max_target = 2000M`\n    `memory_target = 1000M`\n4.  重启数据库。\n5.\
    \  通过发出以下 `ALTER SYSTEM` 命令关闭 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 参数：`SQL> alter\
    \ system set sga_target = 0;`\n    `SQL> alter system set pga_aggregate_target\
    \ = 0;`\n6.  通过设置 `MEMORY_TARGET` 参数来开启自动内存管理：`SQL> alter system set memory_target\
    \ = 1000M;`\n\n从这一点开始，数据库将在自动内存管理模式下运行，根据持续工作负载的需求，收缩和增长对 Oracle 内存各个组件的分配。只要不超过为\
    \ `MEMORY_MAX_TARGET` 参数设置的值，你可以随时动态更改 `MEMORY_TARGET` 参数的值。\n\n![images](images/square.jpg)\
    \ **提示** 在诸如 `memory_target` 和 `pga_memory_target` 等参数中，“target”一词的含义正是如此——Oracle\
    \ 将尝试保持在目标水平以下，但无法保证它永远不会超过该水平。如果必要，它偶尔可能会超过目标分配。\n\n你不必将 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET`\
    \ 参数设置为 0 才能使用自动内存管理。在配方 3-3 中，我们展示了即使在选择实现自动内存管理时，如何为这些参数设置最小值。该配方假设你正在实现自动内存管理，但出于某种原因，你需要为\
    \ SGA 和 PGA 等组件指定自己的最小值。"
  raw: "#### How It Works\n\nUsually rebuilding an index is the fastest and most effective\
    \ way to reclaim unused space consumed by an index. Therefore this is the approach\
    \ we recommend for reclaiming unused index space. Freeing up space is desirable\
    \ because it ensures that you use only the amount of space required by an object.\
    \ It also has the performance benefit that Oracle has fewer blocks to manage and\
    \ sort through when performing read operations.\n\nBesides freeing up space, you\
    \ may want to consider rebuilding an index for these additional reasons:\n\n*\
    \   The index has become corrupt.\n*   You want to modify storage characteristics\
    \ (such as changing the tablespace).\n*   An index that was previously marked\
    \ as unusable now needs to be rebuilt to make it usable again.\n\nKeep in mind\
    \ that Oracle attempts to acquire a lock on the table and rebuild the index online.\
    \ If there are any active transactions that haven't committed, then Oracle won't\
    \ be able to obtain a lock, and the following error will be thrown:\n\n`ORA-00054:\
    \ resource busy and acquire with NOWAIT specified or timeout expired`\n\nIn this\
    \ scenario, you can either wait until the there is little activity in the database\
    \ or try setting the `DDL_LOCK_TIMEOUT` parameter:\n\n`SQL> alter session set\
    \ ddl_lock_timeout=15;`\n\nThe `DDL_LOCK_TIMEOUT` initialization parameter is\
    \ available in Oracle Database 11g or higher. It instructs Oracle to repeatedly\
    \ attempt to obtain a lock for the specified amount of time.\n\nIf no tablespace\
    \ is specified, Oracle rebuilds the index in the tablespace in which the index\
    \ currently exists. Specify a tablespace if you want the index rebuilt in a different\
    \ tablespace:\n\n`SQL> alter index inv_idx1 rebuild tablespace inv_index;`\n\n\
    ![images](images/square.jpg) **Tip** If you're working with a large index, you\
    \ may want to consider using features such as `NOLOGGING` and/or `PARALLEL` (see\
    \ Recipe 2-16 for details).\n\nIf you use the `ALTER INDEX...SHRINK SPACE` operation\
    \ to free up unused index space, keep in mind that this feature requires that\
    \ the target object must be created within a tablespace with automatic segment\
    \ space management enabled. If you attempt to shrink a table or index that has\
    \ been created in a tablespace using manual segment space management, you'll receive\
    \ this error:\n\n`ORA-10635: Invalid segment or tablespace type`\n\nAs we've noted\
    \ elsewhere in this chapter, we recommend that you use the ASSM feature whenever\
    \ possible. This allows you to take advantage of all the Oracle segment management\
    \ features.\n\nThe `ALTER INDEX...SHRINK SPACE` statement has a few nuances to\
    \ be aware of. For example, you can instruct Oracle to attempt only to merge the\
    \ contents of index blocks (and not free up space) via the `COMPACT` clause:\n\
    \n`SQL> alter index f_regs_idx1 shrink space compact;`\n\nThe prior operation\
    \ is equivalent to the `ALTER INDEX...COALESCE` statement. Here's an example of\
    \ using `COALESCE`:\n\n`SQL> alter index f_regs_idx1 coalesce;`\n\nIf you want\
    \ to maximize the space compacted, either rebuild the index or use the `SHRINK\
    \ SPACE` clause as shown in the “Solution” section of this recipe. It's somewhat\
    \ counterintuitive that the `COMPACT` space doesn't actually initiate a greater\
    \ degree of realized free space. The `COMPACT` clause instructs Oracle to only\
    \ merge index blocks where possible and not to maximize the amount of space being\
    \ freed up.\n\n## C H A P T E R  3\n\n## Optimizing Instance Memory\n\nOptimizing\
    \ the memory you allocate to an Oracle database is one of the most critical tasks\
    \ you need to perform as a DBA. Over the years, Oracle DBAs were used to spending\
    \ vast amounts of their time analyzing memory usage by the database and trying\
    \ to come up with the best possible allocation of memory. In Oracle Database 11g,\
    \ the burden of allocating Oracle's memory is shifted almost completely to the\
    \ database itself. This chapter shows you how to take advantage of Oracle's automatic\
    \ memory management feature, so you can leave the database to optimize memory\
    \ usage, while you focus on more important matters.\n\nThis chapter starts off\
    \ by explaining how to set up automatic memory management for a database. The\
    \ chapter also shows you how to set minimum values for certain components of memory\
    \ even under automatic memory management. It also includes recipes that explain\
    \ how to create multiple buffer pools, how to monitor Oracle's usage of memory,\
    \ and how to use the Oracle Enterprise Manager's Database Control (or Grid Control)\
    \ tool to get advice from Oracle regarding the optimal sizing of memory allocation.\
    \ You'll also learn how to optimize the use of the Program Global Area (PGA),\
    \ a key Oracle memory component, especially in data warehouse environments.\n\n\
    In Oracle Database 11g, Oracle has introduced an exciting new result caching feature.\
    \ Oracle can now cache the results of both SQL queries and PL/SQL functions in\
    \ the shared pool component of Oracle's memory. We discuss that server result\
    \ cache in this chapter. In addition, you'll also find a recipe that explains\
    \ how to take advantage of Oracle's client-side result caching feature. Finally,\
    \ we show how to use the exciting new Oracle feature called the Oracle Database\
    \ Smart Flash Cache.\n\n### 3-1\\. Automating Memory Management\n\n#### Problem\n\
    \nYou want to automate memory management in your Oracle database. You have both\
    \ OLTP and batch jobs running in this database. You want to take advantage of\
    \ the automatic memory management feature built into Oracle Database 11g.\n\n\
    #### Solution\n\nHere are the steps to implement automatic memory management in\
    \ your database, if you've already set either the `SGA_TARGET` or the `PGA_AGGREGATE_TARGET`\
    \ parameters (or both). We assume that we are going to allocate 2,000 MB to the\
    \ `MEMORY_MAX_TARGET` parameter and 1,000 MB to the `MEMORY_TARGET` parameter.\n\
    \n1.  Connect to the database with the SYSDBA privilege.\n2.  Assuming you're\
    \ using the `SPFILE`, first set a value for the `MEMORY_MAX_TARGET` parameter:\n\
    \n    `SQL> alter system set memory_max_target=2G scope=spfile;`\n    `System\
    \ altered.`\n\n    You must specify the `SCOPE` parameter in the `alter system`\
    \ command, because `MEMORY_MAX_TARGET` isn't a dynamic parameter, which means\
    \ you can't change it on the fly while the instance is running.\n\n3.  Note that\
    \ if you've started the instance with a traditional `init.ora` parameter file\
    \ instead of the `SPFILE`, you must add the following to your `init.ora` file:\
    \ `memory_max_target = 2000M`\n    `memory_target = 1000M`\n4.  Bounce the database.\n\
    5.  Turn off the `SGA_TARGET` and the `PGA_AGGREGATE_TARGET` parameters by issuing\
    \ the following `ALTER SYSTEM` commands: `SQL> alter system set sga_target = 0;`\n\
    \    `SQL> alter system set pga_aggregate_target = 0;`\n6.  Turn on automatic\
    \ memory management by setting the `MEMORY_TARGET` parameter: `SQL> alter system\
    \ set memory_target = 1000M;`\n\nFrom this point on, the database runs under the\
    \ automatic memory management mode, with it shrinking and growing the individual\
    \ allocations to the various components of Oracle memory according to the requirements\
    \ of the ongoing workload. You can change the value of the `MEMORY_TARGET` parameter\
    \ dynamically anytime, as long as you don't exceed the value you set for the `MEMORY_MAX_TARGET`\
    \ parameter.\n\n![images](images/square.jpg) **Tip** The term “target” in parameters\
    \ such as `memory_target` and `pga_memory_target` means just that—Oracle will\
    \ try to stay under the target level, but there's no guarantee that it'll never\
    \ go beyond that. It may exceed the target allocation on occasion, if necessary.\n\
    \nYou don't have to set the `SGA_TARGET` and `PGA_AGGREGATE_TARGET` parameters\
    \ to 0 in order to use automatic memory management. In Recipe 3-3, we show how\
    \ to set minimum values for these parameters even when you choose to implement\
    \ automatic memory management. That recipe assumes you're implementing automatic\
    \ memory management, but that for some reason, you need to specify your own minimum\
    \ values for components such as the SGA and the PGA."
  trans: "\n#### 工作原理\n\n通常，重建索引是回收索引占用的未用空间最快、最有效的方法。因此，我们推荐使用这种方法来回收未使用的索引空间。释放空间是可取的，因为它确保你只使用对象所需的空间量。它还具有性能优势，因为\
    \ Oracle 在执行读取操作时需要管理和排序的块更少。\n\n除了释放空间，你可能还因为以下额外原因考虑重建索引：\n\n*   索引已损坏。\n* \
    \  你希望修改存储特性（例如更改表空间）。\n*   之前标记为不可用的索引现在需要重建以使其重新可用。\n\n请记住，Oracle 会尝试获取表上的锁并在线重建索引。如果有任何未提交的活动事务，那么\
    \ Oracle 将无法获得锁，并会抛出以下错误：\n\n`ORA-00054: resource busy and acquire with NOWAIT\
    \ specified or timeout expired`\n\n在这种情况下，你可以等到数据库活动很少时再操作，或者尝试设置 `DDL_LOCK_TIMEOUT`\
    \ 参数：\n\n`SQL> alter session set ddl_lock_timeout=15;`\n\n`DDL_LOCK_TIMEOUT` 初始化参数在\
    \ Oracle Database 11g 或更高版本中可用。它指示 Oracle 在指定的时间内反复尝试获取锁。\n\n如果未指定表空间，Oracle 会在索引当前所在的表空间中重建它。如果你希望索引在不同的表空间中重建，请指定一个表空间：\n\
    \n`SQL> alter index inv_idx1 rebuild tablespace inv_index;`\n\n![images](img/square.jpg)\
    \ **提示** 如果你正在处理大型索引，可以考虑使用 `NOLOGGING` 和/或 `PARALLEL` 等功能（详见配方 2-16）。\n\n如果你使用\
    \ `ALTER INDEX...SHRINK SPACE` 操作来释放未使用的索引空间，请记住此功能要求目标对象必须在启用了自动段空间管理的表空间中创建。如果你尝试收缩在使用手动段空间管理的表空间中创建的表或索引，你将收到此错误：\n\
    \n`ORA-10635: Invalid segment or tablespace type`\n\n正如我们在本章其他地方指出的，我们建议你尽可能使用\
    \ ASSM 功能。这使你可以利用所有的 Oracle 段管理功能。\n\n`ALTER INDEX...SHRINK SPACE` 语句有一些需要注意的细微差别。例如，你可以通过\
    \ `COMPACT` 子句指示 Oracle 仅尝试合并索引块的内容（而不释放空间）：\n\n`SQL> alter index f_regs_idx1\
    \ shrink space compact;`\n\n前面的操作等同于 `ALTER INDEX...COALESCE` 语句。以下是使用 `COALESCE`\
    \ 的示例：\n\n`SQL> alter index f_regs_idx1 coalesce;`\n\n如果你想最大化压缩的空间，要么重建索引，要么使用\
    \ `SHRINK SPACE` 子句，如本配方的“解决方案”部分所示。`COMPACT` 空间实际上并不启动更大程度的已释放空间，这有点违反直觉。`COMPACT`\
    \ 子句指示 Oracle 仅在可能的情况下合并索引块，而不去最大化释放的空间量。\n\n### 优化实例内存\n\n优化分配给 Oracle 数据库的内存是你作为\
    \ DBA 需要执行的最关键任务之一。多年来，Oracle DBA 习惯于花费大量时间分析数据库的内存使用情况，并尝试提出最佳的内存分配方案。在 Oracle\
    \ Database 11g 中，分配 Oracle 内存的负担几乎完全转移给了数据库本身。本章向你展示如何利用 Oracle 的自动内存管理功能，这样你就可以让数据库优化内存使用，而你则专注于更重要的事务。\n\
    \n本章首先解释如何为数据库设置自动内存管理。本章还向你展示即使在自动内存管理下，如何为某些内存组件设置最小值。它还包括一些配方，解释如何创建多个缓冲池、如何监控\
    \ Oracle 的内存使用，以及如何使用 Oracle Enterprise Manager 的 Database Control（或 Grid Control）工具从\
    \ Oracle 获取有关最佳内存分配大小的建议。你还将学习如何优化程序全局区（PGA）的使用，这是 Oracle 的一个关键内存组件，尤其在数据仓库环境中。\n\
    \n在 Oracle Database 11g 中，Oracle 引入了一项令人兴奋的新结果缓存功能。Oracle 现在可以在 Oracle 内存的共享池组件中缓存\
    \ SQL 查询和 PL/SQL 函数的结果。我们将在本章讨论该服务器结果缓存。此外，你还会找到一个解释如何利用 Oracle 客户端结果缓存功能的配方。最后，我们展示如何使用名为\
    \ Oracle Database Smart Flash Cache 的令人兴奋的新功能。\n\n#### 3-1. 自动化内存管理\n\n##### 问题\n\
    \n你希望在 Oracle 数据库中自动化内存管理。你的数据库中同时运行着 OLTP 和批处理作业。你希望利用 Oracle Database 11g 内置的自动内存管理功能。\n\
    \n##### 解决方案\n\n如果你已经设置了 `SGA_TARGET` 或 `PGA_AGGREGATE_TARGET` 参数（或两者），以下是实现在数据库中自动内存管理的步骤。我们假设将为\
    \ `MEMORY_MAX_TARGET` 参数分配 2000 MB，为 `MEMORY_TARGET` 参数分配 1000 MB。\n\n1.  使用 SYSDBA\
    \ 权限连接到数据库。\n2.  假设你使用的是 `SPFILE`，首先为 `MEMORY_MAX_TARGET` 参数设置一个值：\n\n    `SQL>\
    \ alter system set memory_max_target=2G scope=spfile;`\n    `System altered.`\n\
    \n    你必须在 `alter system` 命令中指定 `SCOPE` 参数，因为 `MEMORY_MAX_TARGET` 不是动态参数，这意味着你不能在实例运行时动态更改它。\n\
    \n3.  请注意，如果你是使用传统的 `init.ora` 参数文件而不是 `SPFILE` 启动的实例，你必须将以下内容添加到你的 `init.ora`\
    \ 文件中：`memory_max_target = 2000M`\n    `memory_target = 1000M`\n4.  重启数据库。\n5.\
    \  通过发出以下 `ALTER SYSTEM` 命令关闭 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 参数：`SQL> alter\
    \ system set sga_target = 0;`\n    `SQL> alter system set pga_aggregate_target\
    \ = 0;`\n6.  通过设置 `MEMORY_TARGET` 参数来开启自动内存管理：`SQL> alter system set memory_target\
    \ = 1000M;`\n\n从这一点开始，数据库将在自动内存管理模式下运行，根据持续工作负载的需求，收缩和增长对 Oracle 内存各个组件的分配。只要不超过为\
    \ `MEMORY_MAX_TARGET` 参数设置的值，你可以随时动态更改 `MEMORY_TARGET` 参数的值。\n\n![images](img/square.jpg)\
    \ **提示** 在诸如 `memory_target` 和 `pga_memory_target` 等参数中，“target”一词的含义正是如此——Oracle\
    \ 将尝试保持在目标水平以下，但无法保证它永远不会超过该水平。如果必要，它偶尔可能会超过目标分配。\n\n你不必将 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET`\
    \ 参数设置为 0 才能使用自动内存管理。在配方 3-3 中，我们展示了即使在选择实现自动内存管理时，如何为这些参数设置最小值。该配方假设你正在实现自动内存管理，但出于某种原因，你需要为\
    \ SGA 和 PGA 等组件指定自己的最小值。\n"
- fmt: '#### How It Works


    在 Oracle 数据库的早期版本中，数据库管理员需要为各种 SGA 组件设置值，或者为 SGA 和 PGA 指定值。从 Oracle Database 11g
    版本开始，Oracle 通过仅设置一个初始化参数 `MEMORY_TARGET`，即可完全自动化整个实例的内存分配，这被称为自动内存管理。在本教程中，我们将向您展示如何在数据库中设置自动内存管理功能。


    如果您正在使用数据库配置助手创建新的 Oracle 数据库，您可以在自动内存管理、共享内存管理和手动内存管理之间进行选择。选择自动内存管理选项，并为两个与自动内存相关的参数指定值：`MEMORY_TARGET`
    和 `MEMORY_MAX_TARGET`。第一个参数设置数据库当前的内存分配值，第二个参数设置您可以在必要时提高第一个参数值的上限。


    Oracle 的内存结构由两个不同的内存区域组成。系统全局区包含数据和控制信息，由所有服务器和后台进程共享。SGA 保存着 Oracle 从磁盘检索的数据块。程序全局区包含服务器进程的数据和控制信息。每个服务器进程都被分配自己的
    PGA 区块。管理 Oracle 的内存分配需要仔细校准数据库的需求。某些数据库实例的特定内存组件需要更多内存。例如，数据仓库需要更多的 PGA 内存来执行此类环境中常见的大规模排序操作。此外，在一天的过程中，实例的内存需求可能会发生变化；例如，在工作时间内，实例可能处理更多的联机事务处理工作，而在工作时间后，它可能运行涉及数据仓库处理的大型批处理作业，这些作业通常需要每个进程更高的
    PGA 分配。


    在之前的 Oracle 数据库版本中，数据库管理员必须仔细决定分配给数据库各内存组件的最佳内存分配。从技术上讲，您仍然可以手动设置 SGA 各个组件的值，并为
    PGA 设置一个值，或者通过设置 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 等参数来部分自动化此过程。虽然 Oracle
    仍然允许您手动配置内存的各个组件，但自动内存管理是管理 Oracle 内存分配的推荐方法。一旦您通过设置 `MEMORY_TARGET` 和 `MEMORY_MAX_TARGET`
    参数指定了一定量的内存，Oracle 就会通过在 SGA 和 PGA 之间重新分配内存来自动调整实际的内存分配。


    ![images](images/square.jpg) **提示** 当您使用数据库配置助手创建数据库时，自动内存管理是默认选项。


    如果您选择通过设置 `MEMORY_TARGET` 和 `MEMORY_MAX_TARGET` 参数来实施自动内存管理，Oracle Database 11g
    可让您自动化实例的所有内存分配，包括共享内存和 PGA 内存。在自动内存管理机制下，Oracle 会自动调整总 SGA 大小、SGA 组件大小、实例 PGA
    大小以及各个 PGA 大小。Oracle 实例的这种动态内存调优优化了数据库性能，因为 Oracle 会自动更改内存分配以匹配不断变化的数据库工作负载。自动内存管理意味着一旦设置了
    `MEMORY_TARGET` 参数，您就可以完全忽略以下参数，而无需设置它们：


    *   `SGA_TARGET`

    *   `PGA_AGGREGATE_TARGET`

    *   `DB_CACHE_SIZE`

    *   `SHARED_POOL_SIZE`

    *   `LARGE_POOL_SIZE`

    *   `JAVA_POOL_SIZE`


    如果您正从使用 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 参数的系统迁移过来，可以按照本教程“解决方案”部分中展示的步骤，迁移到更新的自动内存管理模式来管理
    Oracle 的内存分配。请注意，虽然设置 `MEMORY_TARGET` 参数对于实施自动内存管理是强制性的，但 `MEMORY_MAX_TARGET`
    参数不是——如果您不设置此参数，Oracle 会在内部将其值设置为 `MEMORY_TARGET` 参数的值。此外，`MEMORY_MAX_TARGET`
    参数充当 `MEMORY_TARGET` 参数的上限。Oracle 对 `MEMORY_TARGET` 参数有不同的最小允许设置，具体取决于操作系统。如果您尝试将此参数设置为低于其最小允许值，数据库将发出错误。某些内存组件无法快速缩小，并且某些组件必须具有最小大小数据库才能正常运行。因此，Oracle
    不允许您为 `MEMORY_TARGET` 参数设置过低的值。以下示例展示了这一点：


    ```sql

    SQL> alter system set memory_target=360m scope=both;

    alter system set memory_target=360m scope=both

    *

    ERROR at line 1:

    ORA-02097: parameter cannot be modified because specified value is invalid

    ORA-00838: Specified value of MEMORY_TARGET is too small, needs to be at least

    544M


    SQL> alter system set memory_target=544m scope=both;


    alter system set memory_target=544m scope=both

    *

    ERROR at line 1:

    ORA-02097: parameter cannot be modified because specified value is invalid

    ORA-00838: Specified value of MEMORY_TARGET is too small, needs to be at least

    624M


    SQL>  alter system set memory_target=624m scope=both;


    System altered.


    SQL>

    ```


    您会注意到，当我们尝试为 `MEMORY_TARGET` 参数设置一个非常低的值时，Oracle 发出了错误。请注意，Oracle 通过多次尝试来告知您 `MEMORY_TARGET`
    参数的最小允许级别。


    如何设置 `MEMORY_MAX_TARGET` 参数的值呢？这很简单——您只需选择一个足够高的值，不仅要满足当前的工作负载，还要满足数据库未来的需求。由于
    `MEMORY_TARGET` 参数是动态的，您可以随时更改它，并在必要时在运行于服务器上的多个实例之间重新分配内存。只需确保将 `MEMORY_MAX_TARGET`
    参数的值设置为至少等于当前 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 参数设置值的总和（如果您是从 10g 版本迁移而来）。务必与您的系统管理员确认，以便不会为
    Oracle 实例分配过多的内存，否则可能导致操作系统级别的页面交换等问题，这不仅会影响您的 Oracle 数据库，还会影响该服务器上运行的所有其他内容。


    ### 3-2. Managing Multiple Buffer Pools


    #### Problem


    您正在使用自动内存管理，但决定为缓冲区池组件分配一个最小值。您希望配置缓冲区池，使其保留经常访问的段，这些段可能面临从缓冲区池中老化出局的风险。'
  raw: '#### How It Works


    In earlier releases of the Oracle database, DBAs used to set values for the various
    SGA components, or would specify values for the SGA and the PGA. Starting with
    the Oracle Database 11g release, Oracle enables you to completely automate the
    entire instance memory allocation, by just setting a single initialization parameter,
    `MEMORY_TARGET`, under what''s known as automatic memory management. In this Recipe,
    we show you how to set up the automatic memory management feature in your database.


    If you''re creating a new Oracle database with the help of the Database Configuration
    Assistant (DBCA), you''re given a choice among automatic memory management, shared
    memory management, and manual memory management. Select the automatic memory management
    option, and specify the values for two automatic memory-related parameters: `MEMORY_TARGET`
    and `MEMORY_MAX_TARGET`. The first parameter sets the current value of the memory
    allocation to the database, and the second parameter sets the limit to which you
    can raise the first parameter if necessary.


    Oracle''s memory structures consist of two distinct memory areas. The system global
    area (SGA) contains the data and control information and is shared by all server
    and background processes. The SGA holds the data blocks retrieved from disk by
    Oracle. The program global area (PGA) contains data and control information for
    a server process. Each server process is allocated its own chunk of the PGA. Managing
    Oracle''s memory allocation involves careful calibration of the needs of the database.
    Some database instances need more memory for certain components of the memory.
    For example, a data warehouse will need more PGA memory in order to perform huge
    sorts that are common in such an environment. Also, during the course of a day,
    the memory needs of the instance might vary; during business hours, for example,
    the instance might be processing more online transaction processing (OLTP) work,
    whereas after business hours, it might be running huge batch jobs that involve
    data warehouse processing, jobs that typically need higher PGA allocations per
    each process.


    In prior versions of the Oracle database, DBAs had to carefully decide the optimal
    allocation of memory to the individual components of the memory one allocated
    to the database. Technically, you can still manually set the values of the individual
    components of the SGA as well as set a value for the PGA, or partially automate
    the process by setting parameters such as `SGA_TARGET` and `PGA_AGGREGATE_TARGET`.
    Although Oracle still allows you to manually configure the various components
    of memory, automatic memory management is the recommended approach to managing
    Oracle''s memory allocation. Once you specify a certain amount of memory by setting
    the `MEMORY_TARGET` and `MEMORY_MAX_TARGET` parameters, Oracle automatically tunes
    the actual memory allocation, by redistributing memory between the SGA and the
    PGA.


    ![images](images/square.jpg) **Tip** When you create a database with the Database
    Configuration Assistant (DBCA), automatic memory management is the default.


    Oracle Database 11g lets you automate all the memory allocations for an instance,
    including shared memory and the PGA memory, if you choose to implement automatic
    memory management by setting the `MEMORY_TARGET` and `MEMORY_MAX_TARGET` parameters.
    Under an automatic memory management regime, Oracle automatically tunes the total
    SGA size, the SGA component sizes, the instance PGA size, and the individual PGA
    size. This dynamic memory tuning by the Oracle instance optimizes database performance,
    as memory allocations are changed automatically by Oracle to match changing database
    workloads. Automatic memory management means that once you set the `MEMORY_TARGET`
    parameter, you can simply ignore the following parameters by not setting them
    at all:


    *   `SGA_TARGET`

    *   `PGA_AGGREGATE_TARGET`

    *   `DB_CACHE_SIZE`

    *   `SHARED_POOL_SIZE`

    *   `LARGE_POOL_SIZE`

    *   `JAVA_POOL_SIZE`


    If you''re moving from a system where you were using the `SGA_TARGET` and `PGA_AGGREGATE_TARGET`
    parameters, you can follow the procedures shown in the “Solution” section of this
    recipe to move to the newer automatic memory management mode of managing Oracle''s
    memory allocation. Note that while setting the `MEMORY_TARGET` parameter is mandatory
    for implementing automatic memory management, the `MEMORY_MAX_TARGET` parameter
    isn''t—if you don''t set this parameter, Oracle sets its value internally to that
    of the `MEMORY_TARGET` parameter. Also, the `MEMORY_MAX_TARGET` parameter acts
    as the upper bound for the `MEMORY_TARGET` parameter. Oracle has different minimum
    permissible settings for the `MEMORY_TARGET` parameter, depending on the operating
    system. If you try to set this parameter below its minimum allowable value, the
    database will issue an error. Some of the memory components can''t shrink quickly
    and some components must have a minimum size for the database to function properly.
    Therefore, Oracle won''t let you set too low a value for the `MEMORY_TARGET` parameter.
    The following example shows this:


    `SQL> alter system set memory_target=360m scope=both;`

    `alter system set memory_target=360m scope=both`

    `*`

    `ERROR at line 1:`

    `ORA-02097: parameter cannot be modified because specified value is invalid`

    `ORA-00838: Specified value of MEMORY_TARGET is too small, needs to be at least`

    `544M`


    `SQL> alter system set memory_target=544m scope=both;`


    `alter system set memory_target=544m scope=both`

    `*`

    `ERROR at line 1:`

    `ORA-02097: parameter cannot be modified because specified value is invalid`

    `ORA-00838: Specified value of MEMORY_TARGET is too small, needs to be at least`

    `624M`


    `SQL>  alter system set memory_target=624m scope=both;`


    `System altered.`


    `SQL>`


    You''ll notice that Oracle issued an error when we tried to set a very low value
    for the `MEMORY_TARGET` parameter. Note that Oracle took iterations to decide
    to let you know the minimum allowable level for the `MEMORY_TARGET` parameter.


    How does one go about setting the value of the `MEMORY_MAX_TARGET` parameter?
    It''s simple—you just pick a value that''s high enough to accommodate not only
    the current workloads, but also the future needs of the database. Since the `MEMORY_TARGET`
    parameter is dynamic, you can alter it on the fly and if necessary, re-allocate
    memory among multiple instances running on a server. Just be sure that you set
    the value of the `MEMORY_MAX_TARGET` parameter to a size that''s at least equal
    to the combined value of the present settings of the `SGA_TARGET` and the `PGA_AGGREGATE_TARGET`
    parameters (if you''re  migrating from the 10g release). Always make sure to check
    with your system administrator, so you don''t allocate too high an amount of memory
    for your Oracle instance, which could result in problems such as paging and swapping
    at the operating system level, which will affect not only your Oracle database,
    but also everything else that''s running on that server.


    ### 3-2\. Managing Multiple Buffer Pools


    #### Problem


    You''re using automatic memory management, but have decided to allocate a minimum
    value for the buffer pool component. You''d like to configure the buffer pool
    so it retains frequently accessed segments, which may run the risk of being aged
    out of the buffer pool.'
  trans: '#### 工作原理


    在 Oracle 数据库的早期版本中，数据库管理员需要为各种 SGA 组件设置值，或者为 SGA 和 PGA 指定值。从 Oracle Database 11g
    版本开始，Oracle 通过仅设置一个初始化参数 `MEMORY_TARGET`，即可完全自动化整个实例的内存分配，这被称为自动内存管理。在本教程中，我们将向您展示如何在数据库中设置自动内存管理功能。


    如果您正在使用数据库配置助手创建新的 Oracle 数据库，您可以在自动内存管理、共享内存管理和手动内存管理之间进行选择。选择自动内存管理选项，并为两个与自动内存相关的参数指定值：`MEMORY_TARGET`
    和 `MEMORY_MAX_TARGET`。第一个参数设置数据库当前的内存分配值，第二个参数设置您可以在必要时提高第一个参数值的上限。


    Oracle 的内存结构由两个不同的内存区域组成。系统全局区包含数据和控制信息，由所有服务器和后台进程共享。SGA 保存着 Oracle 从磁盘检索的数据块。程序全局区包含服务器进程的数据和控制信息。每个服务器进程都被分配自己的
    PGA 区块。管理 Oracle 的内存分配需要仔细校准数据库的需求。某些数据库实例的特定内存组件需要更多内存。例如，数据仓库需要更多的 PGA 内存来执行此类环境中常见的大规模排序操作。此外，在一天的过程中，实例的内存需求可能会发生变化；例如，在工作时间内，实例可能处理更多的联机事务处理工作，而在工作时间后，它可能运行涉及数据仓库处理的大型批处理作业，这些作业通常需要每个进程更高的
    PGA 分配。


    在之前的 Oracle 数据库版本中，数据库管理员必须仔细决定分配给数据库各内存组件的最佳内存分配。从技术上讲，您仍然可以手动设置 SGA 各个组件的值，并为
    PGA 设置一个值，或者通过设置 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 等参数来部分自动化此过程。虽然 Oracle
    仍然允许您手动配置内存的各个组件，但自动内存管理是管理 Oracle 内存分配的推荐方法。一旦您通过设置 `MEMORY_TARGET` 和 `MEMORY_MAX_TARGET`
    参数指定了一定量的内存，Oracle 就会通过在 SGA 和 PGA 之间重新分配内存来自动调整实际的内存分配。


    ![images](img/square.jpg) **提示** 当您使用数据库配置助手创建数据库时，自动内存管理是默认选项。


    如果您选择通过设置 `MEMORY_TARGET` 和 `MEMORY_MAX_TARGET` 参数来实施自动内存管理，Oracle Database 11g
    可让您自动化实例的所有内存分配，包括共享内存和 PGA 内存。在自动内存管理机制下，Oracle 会自动调整总 SGA 大小、SGA 组件大小、实例 PGA
    大小以及各个 PGA 大小。Oracle 实例的这种动态内存调优优化了数据库性能，因为 Oracle 会自动更改内存分配以匹配不断变化的数据库工作负载。自动内存管理意味着一旦设置了
    `MEMORY_TARGET` 参数，您就可以完全忽略以下参数，而无需设置它们：


    *   `SGA_TARGET`

    *   `PGA_AGGREGATE_TARGET`

    *   `DB_CACHE_SIZE`

    *   `SHARED_POOL_SIZE`

    *   `LARGE_POOL_SIZE`

    *   `JAVA_POOL_SIZE`


    如果您正从使用 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 参数的系统迁移过来，可以按照本教程“解决方案”部分中展示的步骤，迁移到更新的自动内存管理模式来管理
    Oracle 的内存分配。请注意，虽然设置 `MEMORY_TARGET` 参数对于实施自动内存管理是强制性的，但 `MEMORY_MAX_TARGET`
    参数不是——如果您不设置此参数，Oracle 会在内部将其值设置为 `MEMORY_TARGET` 参数的值。此外，`MEMORY_MAX_TARGET`
    参数充当 `MEMORY_TARGET` 参数的上限。Oracle 对 `MEMORY_TARGET` 参数有不同的最小允许设置，具体取决于操作系统。如果您尝试将此参数设置为低于其最小允许值，数据库将发出错误。某些内存组件无法快速缩小，并且某些组件必须具有最小大小数据库才能正常运行。因此，Oracle
    不允许您为 `MEMORY_TARGET` 参数设置过低的值。以下示例展示了这一点：


    ```sql

    SQL> alter system set memory_target=360m scope=both;

    alter system set memory_target=360m scope=both

    *

    ERROR at line 1:

    ORA-02097: parameter cannot be modified because specified value is invalid

    ORA-00838: Specified value of MEMORY_TARGET is too small, needs to be at least

    544M


    SQL> alter system set memory_target=544m scope=both;


    alter system set memory_target=544m scope=both

    *

    ERROR at line 1:

    ORA-02097: parameter cannot be modified because specified value is invalid

    ORA-00838: Specified value of MEMORY_TARGET is too small, needs to be at least

    624M


    SQL>  alter system set memory_target=624m scope=both;


    System altered.


    SQL>

    ```


    您会注意到，当我们尝试为 `MEMORY_TARGET` 参数设置一个非常低的值时，Oracle 发出了错误。请注意，Oracle 通过多次尝试来告知您 `MEMORY_TARGET`
    参数的最小允许级别。


    如何设置 `MEMORY_MAX_TARGET` 参数的值呢？这很简单——您只需选择一个足够高的值，不仅要满足当前的工作负载，还要满足数据库未来的需求。由于
    `MEMORY_TARGET` 参数是动态的，您可以随时更改它，并在必要时在运行于服务器上的多个实例之间重新分配内存。只需确保将 `MEMORY_MAX_TARGET`
    参数的值设置为至少等于当前 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 参数设置值的总和（如果您是从 10g 版本迁移而来）。务必与您的系统管理员确认，以便不会为
    Oracle 实例分配过多的内存，否则可能导致操作系统级别的页面交换等问题，这不仅会影响您的 Oracle 数据库，还会影响该服务器上运行的所有其他内容。


    ### 3-2. 管理多个缓冲区池


    #### 问题


    您正在使用自动内存管理，但决定为缓冲区池组件分配一个最小值。您希望配置缓冲区池，使其保留经常访问的段，这些段可能面临从缓冲区池中老化出局的风险。'
- fmt: "## 3-2. Using Multiple Buffer Pools\n\n### Solution\n\nYou can use multiple\
    \ buffer pools instead of Oracle's single default buffer pool, to ensure that\
    \ frequently used segments stay cached in the buffer pool without being recycled\
    \ out of the buffer pool. In order to implement multiple buffer pools in your\
    \ database, you need to do two things: create two separate buffer pools—the `KEEP`\
    \ buffer pool and the `RECYCLE` buffer pool. Once you do this, you must specify\
    \ the `BUFFER_POOL` keyword in the `STORAGE` clause when you create a segment.\
    \ For example, if you want a segment to be cached (or pinned) in the buffer pool,\
    \ you must specify the `KEEP` buffer pool.\n\n![images](images/square.jpg) `Note`\
    \ Neither the `KEEP` nor the `RECYCLE` pool is part of the default `BUFFER CACHE`.\
    \ Both of these pools are outside the default buffer cache.\n\nHere's how you\
    \ create the two types of buffer pools.\n\nIn the `SPFILE` or the `init.ora` file,\
    \ specify the two parameters and the sizes you want to assign to each of the pools:\n\
    \n```\ndb_keep_cache_size=1000m\ndb_recycle_cache_size=100m\n```\n\nHere's how\
    \ you specify the default buffer pool for a segment:\n\n```\nSQL> alter table\
    \ employees\n     storage (buffer_pool=keep);\n\nTable altered.\nSQL>\n```\n\n\
    ### How It Works\n\nConfiguring a `KEEP` buffer pool is an ideal solution in situations\
    \ where your database contains tables that are referenced numerous times. You\
    \ can store such frequently accessed segments in the `KEEP` buffer cache. By doing\
    \ this, you not only isolate those segments to a specific part of the buffer pool,\
    \ but also ensure that your physical I/O is minimized as well. How large the `KEEP`\
    \ buffer pool ought to be depends on the total size of the objects you want to\
    \ assign to the pool. You can get a rough idea by summing up the size of all candidate\
    \ objects for this pool, or you can check the value of the `DBA_TABLES` view (`BLOCKS`\
    \ column) to figure this out.\n\nWhile we're on this topic, we'd like to point\
    \ out the counterpart to the `KEEP` buffer pool—the `RECYCLE` buffer pool. Normally,\
    \ the Oracle database uses a least recently used algorithm to decide which objects\
    \ it should jettison from the buffer cache, when it needs more free space. If\
    \ your database accesses very large objects once or so every day, you can keep\
    \ these objects from occupying a big chunk of your buffer cache, and instead make\
    \ those objects age right out of the buffer cache after they've been accessed.\
    \ You can configure such behavior by allowing candidate objects to use the `RECYCLED`\
    \ buffer pool either when you create those objects, or even later on, by setting\
    \ the appropriate storage parameters, as shown in the following examples (note\
    \ that you must first set the `DB_RECYCLE_CACHE_SIZE` initialization parameter,\
    \ as shown in the “Solution” section of this recipe.\n\nYou can execute the following\
    \ query to figure out how many blocks for each segment are currently in the buffer\
    \ cache:\n\n```\nSQL> select o.object_name, count(*) number_of_blocks\n     from\
    \ dba_objects o, v$bh v\n     where o.data_object_id = v.objd\n     and o.owner\
    \ !='SYS'\n     group by o.object_name\n     order by count(*);\n```\n\nWhen your\
    \ database accesses large segments and retrieves data to process a query, it may\
    \ sometimes age out other segments from the buffer pool prematurely. If you need\
    \ these prematurely aged-out segments later on, it requires additional I/O. What\
    \ exactly constitutes a large table or index segment is subject to your interpretation.\
    \ It's probably safe to think of the size of the object you're concerned with\
    \ by considering its size relative to the total memory you have allocated to the\
    \ buffer cache. Oracle figures that if a single segment takes up more than 10%\
    \ of (non-sequential) physical reads, it's a large segment, for the purpose of\
    \ deciding if it needs to use the `KEEP` or `RECYCLE` buffer pools. So, a handful\
    \ of such large segments can occupy a significant proportion of the buffer cache\
    \ and hurt the performance of the database.\n\nIf you have other segments that\
    \ the database accesses, let's say, every other second, they won't age out of\
    \ the buffer pool since they are constantly in use. However, there may be other\
    \ segments that will be adversely affected by the few large segments the database\
    \ has read into its buffer cache. It's in such situations that your database can\
    \ benefit most by devoting the `RECYCLE` pool for the large segments. Of course,\
    \ if you want to absolutely, positively ensure that key segments never age out\
    \ at all, then you can create the `KEEP` buffer cache and assign these objects\
    \ to this pool.\n\n## 3-3. Setting Minimum Values for Memory\n\n### Problem\n\n\
    You're using automatic memory management, but you think that the database sometimes\
    \ doesn't allocate enough memory for the `PGA_AGGREGATE_TARGET` component.\n\n\
    ### Solution\n\nAlthough automatic memory management is supposed to do what it\
    \ says—automate memory allocation—there are times when you realize that Oracle\
    \ isn't allocating certain memory components optimally. You can set a minimum\
    \ value for any of the main Oracle memory components—buffer cache, shared pool,\
    \ large pool, Java pool, and the PGA memory. For example, even after specifying\
    \ automatic memory management, you can specify a target for the instance PGA with\
    \ the following command, without having to restart the database:\n\n```\nSQL>\
    \ alter system set pga_aggregate_target=1000m;\n```\n\nOracle will, from this\
    \ point forward, never decrease the PGA memory allocation to less than the value\
    \ you've set—this value implicitly sets a minimum value for the memory parameter.\
    \ The database will continue to automatically allocate memory to the various components\
    \ of the SGA, but first it subtracts the memory you've allocated explicitly to\
    \ the PGA—in this case, 1,000 MB, from the `MEMORY_TARGET` parameter's value.\
    \ What remains is what the database will allocate to the instance's SGA.\n\n###\
    \ How It Works\n\nEver since Oracle introduced the `SGA_TARGET` (to automate shared\
    \ memory management) in Oracle Database 10g and the `MEMORY_TARGET` parameter\
    \ (to automate shared memory and PGA memory management) in Oracle Database 11g,\
    \ some DBAs have complained that these parameters sometimes weren't appropriately\
    \ sizing some of the components of Oracle memory, such as the buffer cache.\n\n\
    There's some evidence that under automatic memory management, the database could\
    \ lag behind an event that requires a sudden increase in the allocation to either\
    \ one of the individual components of the SGA or to the PGA. For example, you\
    \ may have a spurt of activity in the database that requires a quick adjustment\
    \ to the shared pool component of memory—the database may get to the optimal shared\
    \ pool size allocation level only after it notices the events that require the\
    \ higher memory. As a result, the database may undergo a temporary performance\
    \ hit. Several DBAs have, as a result, found that automatic memory management\
    \ will work fine, as long as you set a minimum value for, say, the buffer cache\
    \ or the PGA or both, by specifying explicit values for the `SGA_TARGET` and the\
    \ `PGA_AGGREGATE_TARGET` initialization parameters, instead of leaving them at\
    \ their default value of zero. The database will still use automatic memory management,\
    \ but will now use the specific values you set for any of the memory components\
    \ as minimum values. Having said this, in our experience, automatic memory management\
    \ works as advertised most of the time; however, your mileage may vary, depending\
    \ on any special time-based workload changes in a specific database. At times\
    \ like this, it's perfectly all right to set minimum values that represent your\
    \ own understanding of your processing requirements, instead of blindly depending\
    \ on Oracle's automatic memory algorithms.\n\n## 3-4. Monitoring Memory Resizing\
    \ Operations\n\n### Problem\n\nYou've implemented automatic memory management\
    \ in your database and would like to monitor how the database is currently allocating\
    \ the various dynamically tuned memory components."
  raw: '#### Solution


    You can use multiple buffer pools instead of Oracle''s single default buffer pool,
    to ensure that frequently used segments stay cached in the buffer pool without
    being recycled out of the buffer pool. In order to implement multiple buffer pools
    in your database, you need to do two things: create two separate buffer pools—the
    `KEEP` buffer pool and the `RECYCLE` buffer pool. Once you do this, you must specify
    the `BUFFER_POOL` keyword in the `STORAGE` clause when you create a segment. For
    example, if you want a segment to be cached (or pinned) in the buffer pool, you
    must specify the `KEEP` buffer pool.


    ![images](images/square.jpg) **Note** Neither the `KEEP` nor the `RECYCLE` pool
    is part of the default `BUFFER CACHE`. Both of these pools are outside the default
    buffer cache.


    Here''s how you create the two types of buffer pools.


    In the `SPFILE` or the `init.ora` file, specify the two parameters and the sizes
    you want to assign to each of the pools:


    `db_keep_cache_size=1000m`

    `db_recycle_cache_size=100m`


    Here''s how you specify the default buffer pool for a segment:


    `SQL> alter table employees`

    `     storage (buffer_pool=keep);`


    `Table altered.`

    `SQL>`


    #### How It Works


    Configuring a `KEEP` buffer pool is an ideal solution in situations where your
    database contains tables that are referenced numerous times. You can store such
    frequently accessed segments in the `KEEP` buffer cache. By doing this, you not
    only isolate those segments to a specific part of the buffer pool, but also ensure
    that your physical I/O is minimized as well. How large the `KEEP` buffer pool
    ought to be depends on the total size of the objects you want to assign to the
    pool. You can get a rough idea by summing up the size of all candidate objects
    for this pool, or you can check the value of the `DBA_TABLES` view (`BLOCKS` column)
    to figure this out.


    While we''re on this topic, we''d like to point out the counterpart to the `KEEP`
    buffer pool—the `RECYCLE` buffer pool. Normally, the Oracle database uses a least
    recently used algorithm to decide which objects it should jettison from the buffer
    cache, when it needs more free space. If your database accesses very large objects
    once or so every day, you can keep these objects from occupying a big chunk of
    your buffer cache, and instead make those objects age right out of the buffer
    cache after they''ve been accessed. You can configure such behavior by allowing
    candidate objects to use the `RECYCLED` buffer pool either when you create those
    objects, or even later on, by setting the appropriate storage parameters, as shown
    in the following examples (note that you must first set the `DB_RECYCLE_CACHE_SIZE`
    initialization parameter, as shown in the “Solution” section of this recipe.


    You can execute the following query to figure out how many blocks for each segment
    are currently in the buffer cache:


    `SQL> select o.object_name, count(*) number_of_blocks`

    `     from dba_objects o, v$bh v`

    `     where o.data_object_id = v.objd`

    `     and o.owner !=''SYS''`

    `     group by o.object_name`

    `     order by count(*);`


    When your database accesses large segments and retrieves data to process a query,
    it may sometimes age out other segments from the buffer pool prematurely. If you
    need these prematurely aged-out segments later on, it requires additional I/O.
    What exactly constitutes a large table or index segment is subject to your interpretation.
    It''s probably safe to think of the size of the object you''re concerned with
    by considering its size relative to the total memory you have allocated to the
    buffer cache. Oracle figures that if a single segment takes up more than 10% of
    (non-sequential) physical reads, it''s a large segment, for the purpose of deciding
    if it needs to use the `KEEP` or `RECYCLE` buffer pools. So, a handful of such
    large segments can occupy a significant proportion of the buffer cache and hurt
    the performance of the database.


    If you have other segments that the database accesses, let''s say, every other
    second, they won''t age out of the buffer pool since they are constantly in use.
    However, there may be other segments that will be adversely affected by the few
    large segments the database has read into its buffer cache. It''s in such situations
    that your database can benefit most by devoting the `RECYCLE` pool for the large
    segments. Of course, if you want to absolutely, positively ensure that key segments
    never age out at all, then you can create the `KEEP` buffer cache and assign these
    objects to this pool.


    ### 3-3. Setting Minimum Values for Memory


    #### Problem


    You''re using automatic memory management, but you think that the database sometimes
    doesn''t allocate enough memory for the `PGA_AGGREGATE_TARGET` component.


    #### Solution


    Although automatic memory management is supposed to do what it says—automate memory
    allocation—there are times when you realize that Oracle isn''t allocating certain
    memory components optimally. You can set a minimum value for any of the main Oracle
    memory components—buffer cache, shared pool, large pool, Java pool, and the PGA
    memory. For example, even after specifying automatic memory management, you can
    specify a target for the instance PGA with the following command, without having
    to restart the database:


    `SQL> alter system set pga_aggregate_target=1000m;`


    Oracle will, from this point forward, never decrease the PGA memory allocation
    to less than the value you''ve set—this value implicitly sets a minimum value
    for the memory parameter. The database will continue to automatically allocate
    memory to the various components of the SGA, but first it subtracts the memory
    you''ve allocated explicitly to the PGA—in this case, 1,000 MB, from the `MEMORY_TARGET`
    parameter''s value. What remains is what the database will allocate to the instance''s
    SGA.


    #### How It Works


    Ever since Oracle introduced the `SGA_TARGET` (to automate shared memory management)
    in Oracle Database 10g and the `MEMORY_TARGET` parameter (to automate shared memory
    and PGA memory management) in Oracle Database 11g, some DBAs have complained that
    these parameters sometimes weren''t appropriately sizing some of the components
    of Oracle memory, such as the buffer cache.


    There''s some evidence that under automatic memory management, the database could
    lag behind an event that requires a sudden increase in the allocation to either
    one of the individual components of the SGA or to the PGA. For example, you may
    have a spurt of activity in the database that requires a quick adjustment to the
    shared pool component of memory—the database may get to the optimal shared pool
    size allocation level only after it notices the events that require the higher
    memory. As a result, the database may undergo a temporary performance hit. Several
    DBAs have, as a result, found that automatic memory management will work fine,
    as long as you set a minimum value for, say, the buffer cache or the PGA or both,
    by specifying explicit values for the `SGA_TARGET` and the `PGA_AGGREGATE_TARGET`
    initialization parameters, instead of leaving them at their default value of zero.
    The database will still use automatic memory management, but will now use the
    specific values you set for any of the memory components as minimum values. Having
    said this, in our experience, automatic memory management works as advertised
    most of the time; however, your mileage may vary, depending on any special time-based
    workload changes in a specific database. At times like this, it''s perfectly all
    right to set minimum values that represent your own understanding of your processing
    requirements, instead of blindly depending on Oracle''s automatic memory algorithms.


    ### 3-4. Monitoring Memory Resizing Operations


    #### Problem


    You''ve implemented automatic memory management in your database and would like
    to monitor how the database is currently allocating the various dynamically tuned
    memory components.'
  trans: "\n## 3-2. 使用多个缓冲池\n\n### 解决方案\n\n你可以使用多个缓冲池，而不是 Oracle 单一的默认缓冲池，以确保频繁使用的**段**能保留在缓冲池中，而不会被回收。为了在数据库中实现多个缓冲池，你需要做两件事：创建两个独立的缓冲池——`KEEP`\
    \ 缓冲池和 `RECYCLE` 缓冲池。完成此操作后，你必须在创建段时在 `STORAGE` 子句中指定 `BUFFER_POOL` 关键字。例如，如果你想让一个段被缓存（或固定）在缓冲池中，你必须指定\
    \ `KEEP` 缓冲池。\n\n![images](img/square.jpg) `Note` 无论是 `KEEP` 池还是 `RECYCLE` 池，都不是默认\
    \ `BUFFER CACHE` 的一部分。这两个池都位于默认缓冲缓存之外。\n\n以下是创建这两种类型缓冲池的方法。\n\n在 `SPFILE` 或 `init.ora`\
    \ 文件中，指定两个参数以及你希望分配给每个池的大小：\n\n```\ndb_keep_cache_size=1000m\ndb_recycle_cache_size=100m\n\
    ```\n\n以下是如何为段指定默认缓冲池：\n\n```\nSQL> alter table employees\n     storage (buffer_pool=keep);\n\
    \n表已更改。\nSQL>\n```\n\n### 工作原理\n\n当你的数据库包含被频繁引用的表时，配置一个 `KEEP` 缓冲池是一个理想的解决方案。你可以将此类频繁访问的段存储在\
    \ `KEEP` 缓冲缓存中。通过这样做，你不仅将这些段隔离到缓冲池的特定部分，还能确保物理 I/O 被最小化。`KEEP` 缓冲池应该多大，取决于你想要分配给该池的对象的总大小。你可以通过汇总该池所有候选对象的大小来获得一个粗略的概念，或者你可以检查\
    \ `DBA_TABLES` 视图（`BLOCKS` 列）的值来弄清楚这一点。\n\n谈到这个话题，我们想指出 `KEEP` 缓冲池的对应物——`RECYCLE`\
    \ 缓冲池。通常，Oracle 数据库使用最近最少使用算法来决定当需要更多空闲空间时，应从缓冲缓存中清除哪些对象。如果你的数据库每天大约只访问一次非常大的对象，你可以防止这些对象占用缓冲缓存的大部分空间，而是在它们被访问后让它们直接从缓冲缓存中老化移除。你可以通过在创建对象时或之后通过设置适当的存储参数，允许候选对象使用\
    \ `RECYCLED` 缓冲池来配置这种行为，如下例所示（注意，你必须先设置 `DB_RECYCLE_CACHE_SIZE` 初始化参数，如本方案“解决方案”部分所示）。\n\
    \n你可以执行以下查询来确定每个段当前有多少块在缓冲缓存中：\n\n```\nSQL> select o.object_name, count(*) number_of_blocks\n\
    \     from dba_objects o, v$bh v\n     where o.data_object_id = v.objd\n     and\
    \ o.owner !='SYS'\n     group by o.object_name\n     order by count(*);\n```\n\
    \n当你的数据库访问大段并为处理查询检索数据时，有时可能会过早地使其他段从缓冲池中老化移出。如果你之后需要这些过早老化移出的段，就需要额外的 I/O。什么构成大表或索引段取决于你的理解。考虑到对象大小相对于你分配给缓冲缓存的总内存的比例，可能是比较安全的思考方式。Oracle\
    \ 认为，如果一个段在（非顺序）物理读取中占据了超过 10%，那么就决定是否需要使用 `KEEP` 或 `RECYCLE` 缓冲池的目的而言，它就是一个大段。因此，少数几个这样的大段可以占据缓冲缓存的很大一部分，并损害数据库的性能。\n\
    \n如果你有其他数据库访问的段，比如每秒钟访问一次，它们不会从缓冲池中老化移出，因为它们一直在使用中。然而，可能会有其他段受到数据库读入其缓冲缓存的少数大段的负面影响。正是在这种情况下，你的数据库通过将\
    \ `RECYCLE` 池专用于大段受益最大。当然，如果你想绝对、完全确保关键段根本不会老化移出，那么你可以创建 `KEEP` 缓冲缓存并将这些对象分配给这个池。\n\
    \n## 3-3. 设置内存的最小值\n\n### 问题\n\n你正在使用自动内存管理，但你认为数据库有时没有为 `PGA_AGGREGATE_TARGET`\
    \ 组件分配足够的内存。\n\n### 解决方案\n\n尽管自动内存管理应该如其所言——自动化内存分配——但有时你会意识到 Oracle 没有最优地分配某些内存组件。你可以为主要\
    \ Oracle 内存组件——缓冲缓存、共享池、大池、Java 池和 PGA 内存——中的任何一个设置最小值。例如，即使在指定自动内存管理后，你仍然可以使用以下命令为实例\
    \ PGA 指定一个目标，而无需重启数据库：\n\n```\nSQL> alter system set pga_aggregate_target=1000m;\n\
    ```\n\n从现在起，Oracle 将永远不会将 PGA 内存分配减少到低于你设置的值——这个值隐式地为内存参数设置了一个最小值。数据库将继续自动为 SGA\
    \ 的各个组件分配内存，但它首先会从 `MEMORY_TARGET` 参数值中减去你显式分配给 PGA 的内存——本例中为 1,000 MB。剩下的内存就是数据库将分配给实例\
    \ SGA 的部分。\n\n### 工作原理\n\n自 Oracle 在 Oracle Database 10g 中引入 `SGA_TARGET`（以自动化共享内存管理）和在\
    \ Oracle Database 11g 中引入 `MEMORY_TARGET` 参数（以自动化共享内存和 PGA 内存管理）以来，一些 DBA 抱怨这些参数有时没有正确调整\
    \ Oracle 内存的某些组件，例如缓冲缓存。\n\n有证据表明，在自动内存管理下，数据库可能会滞后于需要突然增加 SGA 单个组件或 PGA 分配的事件。例如，你可能有一个数据库活动激增，需要快速调整内存的共享池组件——数据库可能只有在注意到需要更多内存的事件后才会达到最佳共享池大小分配水平。因此，数据库可能会经历暂时的性能下降。因此，一些\
    \ DBA 发现，只要你为缓冲缓存或 PGA 或两者都设置了最小值——通过为 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 初始化参数指定显式值，而不是让它们保持默认值零——自动内存管理就可以正常工作。数据库仍将使用自动内存管理，但现在会将你为任何内存组件设置的特定值用作最小值。话虽如此，根据我们的经验，自动内存管理在大多数情况下都能如宣传的那样工作；然而，根据特定数据库中任何特殊的基于时间的工作负载变化，你的情况可能会有所不同。在这种时候，设置代表你自己对处理需求理解的最小值，而不是盲目依赖\
    \ Oracle 的自动内存算法，是完全没问题的。\n\n## 3-4. 监控内存调整操作\n\n### 问题\n\n你已经在数据库中实施了自动内存管理，并希望监控数据库当前如何分配各种动态调整的内存组件。\n"
- fmt: "#### Solution\n\n在自动内存管理模式下，可以通过查询`V$MEMORY_DYNAMIC_COMPONENTS`视图来查看任何实例中当前的内存分配情况。查询此视图可提供重要信息，帮助调整`MEMORY_TARGET`参数。以下是如何对该视图执行查询：\n\
    \n```\nSQL> select * from v$memory_target_advice order by memory_size;\n\nMEMORY_SIZE\
    \ MEMORY_SIZE_FACTOR ESTD_DB_TIME ESTD_DB_TIME_FACTOR    VERSION\n-----------\
    \ ------------------ ------------ ------------------- ----------\n        468\
    \                .75        43598              1.0061          0\n        624\
    \                  1        43334                   1          0\n        780\
    \               1.25        43334                   1          0\n        936\
    \                1.5        43330               .9999          0\n       1092\
    \               1.75        43330               .9999          0\n       1248\
    \                  2        43330               .9999          0\n\n6 rows selected.\n\
    \nSQL>\n```\n\n当前内存分配由`MEMORY_SIZE_FACTOR`值为1的行显示（本例中为624 MB）。`MEMORY_SIZE_FACTOR`列显示了`MEMORY_TARGET`参数的替代大小，其值为当前`MEMORY_TARGET`参数值的倍数。`ESTD_DB_TIME`列显示了Oracle估计使用特定`MEMORY_TARGET`值完成当前工作负载所需的时间。因此，查询结果展示了通过调整`MEMORY_TARGET`参数值，数据库处理工作可以加快多少。\n\
    \n#### How It Works\n\n使用`V$MEMORY_TARGET_ADVICE`视图可以快速了解`MEMORY_TARGET`分配是否最优。需要在数据库处理了代表性工作负载后，基于此视图运行查询以获得有用的结果。如果视图报告增加`MEMORY_TARGET`设置没有带来收益，您就不必通过向数据库实例分配更多内存来浪费宝贵的系统内存。通常，查询可能报告潜在性能（由`V$MEMORY_TARGET_ADVICE`视图的`ESTD_DB_TIME`列指示）在`MEMORY_SIZE_FACTOR`值小于1时并未下降。在这种情况下，您可以安全地减少`MEMORY_TARGET`参数的设置。\n\
    \n您还可以使用`V$MEMORY_RESIZE_OPS`视图来查看在过去800次完成的内存调整操作间隔内，实例如何调整了各种内存组件的大小。您会看到数据库会根据遇到的工作负载自动增加或缩小`SGA_TARGET`和`PGA_AGGREGATE_TARGET`参数的值。以下查询展示了如何使用`V$MEMORY_RESIZE_OPS`视图来了解Oracle的实例内存动态分配：\n\
    \n```\nSQL> select component,oper_type,oper_mode,parameter, final_size,target_size\n\
    \     from v$memory_resize_ops\n\nCOMPONENT               OPER_TYPE   OPER_MODE\
    \      PARAMETER      FINAL_SIZE   TARGET_SIZE\n---------------------  -----------\
    \  ---------  ---------------  ------------  ------------\n\nDEFAULT buffer cache\
    \    GROW        DEFERRED   db_cache_size        180355072     180355072\nshared\
    \ pool             GROW        DEFERRED   shared_pool_size     264241152     264241152\n\
    …\n20 rows selected.\nSQL>\n```\n\n`OPER_TYPE`列可以取两个值——`GROW`或`SHRINK`，这取决于随着数据库工作负载随时间波动，数据库是增长还是缩小单个内存组件。正是这种通过自动为各种内存组件配置必要内存来响应这些变化的能力，构成了这种“自动”内存管理。DBA最好随时间监控此视图，以确保自动内存管理为其数据库运行良好。\n\
    \n### 3-5. Optimizing Memory Usage\n\n#### Problem\n\n您已在数据库中设置了自动内存管理，并希望借助Oracle的内存顾问来优化内存使用。\n\
    \n#### Solution\n\n无论您设置的是自动内存管理、自动共享内存管理，甚至是手动内存管理方案，您都可以使用Oracle的内存顾问来指导内存调整工作。在本示例中，我们展示了如何使用Oracle\
    \ Enterprise Manager Database Control轻松调整内存使用。步骤如下：\n\n1.  转到Database Control中的Database\
    \ Home页面。点击页面底部的Advisor Central。\n2.  在出现的Memory Advisors页面中，点击Automatic Memory\
    \ Management下Total Memory Size框旁的Advice。\n\nMemory Size Advice图会出现在一个单独的窗口中，如[Figure\
    \ 3-1](#Chapter03.html#fig_3_1)所示。在此图中，DB时间的改进与当前为`MEMORY_TARGET`参数设置的总内存相对应绘制。DB时间改进的值越高，性能就越好。该图显示了随着您更改`MEMORY_TARGET`参数值，性能（DB时间改进）将如何变化。您分配的总内存不能超过此实例允许的最大内存，这在图中由虚线直线表示。\n\
    \n![images](images/0301.jpg)\n\n**Figure 3-1.** Database Control中的Memory Size\
    \ Advice图\n\n#### How It Works\n\n当您实施自动内存管理时，Oracle会根据实例的工作负载特征，在实例运行过程中自动调整总内存的各个组件——SGA和PGA之间的内存。您无需运行各种视图的查询来确定当前内存分配是否最优，而是可以遵循几个简单的步骤来快速了解情况。您可以查看自动数据库诊断监视器报告，看看它们是否包含关于内存不足的任何评论或建议。如果ADDM认为当前内存分配不足以实现最佳性能，它会建议您为`MEMORY_TARGET`参数增加更多内存。\n\
    \n如果ADDM报告建议您增加`MEMORY_TARGET`参数的大小，下一个问题是应该增加多少内存分配。Oracle内置的内存顾问正是用于此目的。即使没有ADDM的建议，您也可以使用内存顾问来了解增加或减少`MEMORY_TARGET`参数将如何影响性能。\n\
    \n您还可以通过点击Memory Advisors页面顶部的PGA，从同一页面优化PGA内存分配。对于PGA，在PGA Target Advice页面中，图表将PGA缓存命中率与PGA目标大小相对应绘制。理想情况下，您会希望PGA缓存比率大约在70%以上。PGA\
    \ Target Advice页面将帮助您确定应为`PGA_AGGREGATE_TARGET`参数分配什么值以实现您的性能目标。\n\n### 3-6. Tuning\
    \ PGA Memory Allocation\n\n#### Problem\n\n您决定为`PGA_AGGREGATE_TARGET`参数设置一个特定的最小内存大小，尽管您正在使用Oracle的自动内存管理来分配内存。您想知道确定最佳PGA内存分配的最佳方法。\n\
    \n#### Solution\n\n没有硬性规定来分配`PGA_AGGREGATE_TARGET`参数的大小。话虽如此，如果您运营的是数据仓库，您更可能需要为Oracle内存分配的PGA组件预留更大的内存量。您可以遵循以下基本步骤来分配PGA内存水平：\n\
    \n1.  大致猜测PGA可能需要多少内存，以此作为起始分配。\n2.  让数据库运行一两个完整周期的代表性工作负载。然后您可以访问各种Oracle视图来确定您最初对PGA的估计是否准确。"
  raw: '#### Solution


    Under an automatic memory management mode, you can view the current allocations
    of memory in any instance by querying the `V$MEMORY_DYNAMIC_COMPONENTS` view.
    Querying this view provides vital information to help you tune the `MEMORY_TARGET`
    parameter. Here''s how you execute a query against this view:


    `SQL> select * from v$memory_target_advice order by memory_size;`


    `MEMORY_SIZE MEMORY_SIZE_FACTOR ESTD_DB_TIME ESTD_DB_TIME_FACTOR    VERSION`

    `----------- ------------------ ------------ ------------------- ----------`

    `        468                .75        43598              1.0061          0`

    `        624                  1        43334                   1          0`

    `        780               1.25        43334                   1          0`

    `        936                1.5        43330               .9999          0`

    `       1092               1.75        43330               .9999          0`

    `       1248                  2        43330               .9999          0`


    `6 rows selected.`


    `SQL>`


    Your current memory allocation is shown by the row with the `MEMORY_SIZE_FACTOR`
    value of 1 (624 MB in our case). The `MEMORY_SIZE_FACTOR` column shows alternate
    sizes of the `MEMORY_TARGET` parameter as a multiple of the current `MEMORY_TARGET`
    parameter value. The `ESTD_DB_TIME` column shows the time Oracle estimates it
    will need to complete the current workload with a specific `MEMORY_TARGET` value.
    Thus, the query results show you how much faster the database can process its
    work by varying the value of the `MEMORY_TARGET` parameter.


    #### How It Works


    Use the `V$MEMORY_TARGET_ADVICE` view to get a quick idea about how optimal your
    `MEMORY_TARGET` allocation is. You need to run a query based on this view after
    a representative workload has been processed by the database, to get useful results.
    If the view reports that there are no gains to be had by increasing the `MEMORY_TARGET`
    setting, you don''t have to throw away precious system memory by allocating more
    memory to the database instance. Oftentimes, the query may report that potential
    performance, as indicated by the `ESTD_DB_TIME` column of the `V$MEMORY_TARGET_ADVICE`
    view, doesn''t decrease at a `MEMORY_SIZE_FACTOR` value that''s less than 1\.
    You can safely reduce the setting of the `MEMORY_TARGET` parameter in such cases.


    You can also use the `V$MEMORY_RESIZE_OPS` view to view how the instance resized
    various memory components over a past interval of 800 completed memory resizing
    operations. You''ll see that the database automatically increases or shrinks the
    values of the `SGA_TARGET` and `PGA_AGGREGATE_TARGET` parameters based on the
    workload it encounters. The following query shows how to use the `V$MEMORY_RESIZE_OPS`
    view to understand Oracle''s dynamic allocation of instance memory:


    `SQL> select component,oper_type,oper_mode,parameter, final_size,target_size`

    `     from v$memory_resize_ops`


    `COMPONENT               OPER_TYPE   OPER_MODE      PARAMETER      FINAL_SIZE   TARGET_SIZE`

    `---------------------  -----------  ---------   ---------------  ------------  ------------`


    `DEFAULT buffer cache    GROW        DEFERRED   db_cache_size        180355072     180355072`

    `shared pool             GROW        DEFERRED   shared_pool_size     264241152     264241152`

    `…`

    `20 rows selected.`

    `SQL>`


    `The OPER_TYPE` column can take two values - `GROW` or `SHRINK`, depending on
    whether the database grows or shrinks  individual memory components  as the database
    workload fluctuates over time. It''s this ability to respond to these changes
    by automatically provisioning the necessary memory to the various memory components
    that makes this “automatic” memory management. The DBA will do well by monitoring
    this view over time, to ensure that automatic memory management works well for
    his or her databases.


    ### 3-5\. Optimizing Memory Usage


    #### Problem


    You''ve set up automatic memory management in your databases and would like to
    optimize memory usage with the help of Oracle''s memory advisors.


    #### Solution


    Regardless of whether you set up automatic memory management (AMM) or automatic
    shared memory management (ASMM), or even a manual memory management scheme, you
    can use Oracle''s Memory Advisors to guide your memory tuning efforts. In this
    example, we show how to use Oracle Enterprise Manager Database Control to easily
    tune memory usage. Here are the steps:


    1.  Go to the Database Home page in Database Control. Click Advisor Central at
    the bottom of the page.

    2.  In the Memory Advisors page that appears, click Advice next to the Total Memory
    Size box under Automatic Memory Management.


    The Memory Size Advice graph appears in a separate window, as shown in [Figure
    3-1](#Chapter03.html#fig_3_1). In this graph, the improvement in DB time is plotted
    against the total memory that you''ve currently set for the `MEMORY_TARGET` parameter.
    The higher the value of improvement in DB time, the better off will be the performance.
    The graph shows how performance (improvement in DB time) will vary as you change
    the `MEMORY_TARGET` parameter value. The total memory you allocate can''t be more
    than the maximum allowed memory for this instance, which is indicated by the dotted
    straight line in the graph.


    ![images](images/0301.jpg)


    ***Figure 3-1.** The Memory Size Advice graph in Database Control*


    #### How It Works


    When you implement automatic memory management, Oracle automatically adjusts memory
    between the various components of total memory—the SGA and the PGA—during the
    course of the instance, depending on the workload characteristics of the instance.
    Instead of running queries using various views to figure out if your current memory
    allocation is optimal, you can follow a couple of easy steps to figure things
    out quickly. You can review the Automatic Database Diagnostic Monitor(ADDM) reports
    to see if they contain any comments or recommendations about inadequate memory.
    ADDM recommends that you add more memory to the `MEMORY_TARGET` parameter, if
    it considers that the current memory allocation is insufficient for optimal performance.


    If the ADDM reports recommend that you increase the size of the `MEMORY_TARGET`
    parameter, the next question is by how much you should increase the memory allocation.
    Oracle''s built-in Memory Advisors come in handy for just this purpose. Even in
    the absence of a recommendation by the ADDM, you can play with the Memory Advisors
    to get an idea of how an increase or decrease in the `MEMORY_TARGET` parameter
    will impact performance.


    You can also choose to optimize your PGA memory allocation from the same Memory
    Advisors page by clicking PGA at the top of the page. In the case of the PGA,
    in the PGA Target Advice page, the graphs plots the PGA cache hit percentage against
    the PGA target size. Ideally, you''d want the PGA cache ratio somewhere upward
    of around 70%. The PGA Target Advice page will help you determine approximately
    what value you should assign to the `PGA_AGGREGATE_TARGET` parameter to achieve
    your performance goals.


    ### 3-6\. Tuning PGA Memory Allocation


    #### Problem


    You''ve decided to set a specific minimum memory size for the `PGA_AGGREGATE_TARGET`
    parameter, although you''re using Oracle''s automatic memory management to allocate
    memory. You''d like to know the best way to figure out the optimal PGA memory
    allocation.


    #### Solution


    There are no hard and fast rules for allocating the size of the `PGA_AGGREGATE_TARGET`
    parameter. Having said that, if you''re operating a data warehouse, you''re more
    likely to need much larger amounts of memory set apart for the PGA component of
    Oracle''s memory allocation. You can follow these basic steps to allocate PGA
    memory levels:


    1.  Use a starting allocation more or less by guessing how much memory you might
    need for the PGA.

    2.  Let the database run for an entire cycle or two of representative workload.
    You can then access various Oracle views to figure out if your first stab at the
    PGA estimation was on target.'
  trans: "#### 解决方案\n\n在自动内存管理模式下，可以通过查询`V$MEMORY_DYNAMIC_COMPONENTS`视图来查看任何实例中当前的内存分配情况。查询此视图可提供重要信息，帮助调整`MEMORY_TARGET`参数。以下是如何对该视图执行查询：\n\
    \n```\nSQL> select * from v$memory_target_advice order by memory_size;\n\nMEMORY_SIZE\
    \ MEMORY_SIZE_FACTOR ESTD_DB_TIME ESTD_DB_TIME_FACTOR    VERSION\n-----------\
    \ ------------------ ------------ ------------------- ----------\n        468\
    \                .75        43598              1.0061          0\n        624\
    \                  1        43334                   1          0\n        780\
    \               1.25        43334                   1          0\n        936\
    \                1.5        43330               .9999          0\n       1092\
    \               1.75        43330               .9999          0\n       1248\
    \                  2        43330               .9999          0\n\n6 rows selected.\n\
    \nSQL>\n```\n\n当前内存分配由`MEMORY_SIZE_FACTOR`值为 1 的行显示（本例中为 624 MB）。`MEMORY_SIZE_FACTOR`列显示了`MEMORY_TARGET`参数的替代大小，其值为当前`MEMORY_TARGET`参数值的倍数。`ESTD_DB_TIME`列显示了\
    \ Oracle 估计使用特定`MEMORY_TARGET`值完成当前工作负载所需的时间。因此，查询结果展示了通过调整`MEMORY_TARGET`参数值，数据库处理工作可以加快多少。\n\
    \n#### 工作原理\n\n使用`V$MEMORY_TARGET_ADVICE`视图可以快速了解`MEMORY_TARGET`分配是否最优。需要在数据库处理了代表性工作负载后，基于此视图运行查询以获得有用的结果。如果视图报告增加`MEMORY_TARGET`设置没有带来收益，您就不必通过向数据库实例分配更多内存来浪费宝贵的系统内存。通常，查询可能报告潜在性能（由`V$MEMORY_TARGET_ADVICE`视图的`ESTD_DB_TIME`列指示）在`MEMORY_SIZE_FACTOR`值小于\
    \ 1 时并未下降。在这种情况下，您可以安全地减少`MEMORY_TARGET`参数的设置。\n\n您还可以使用`V$MEMORY_RESIZE_OPS`视图来查看在过去\
    \ 800 次完成的内存调整操作间隔内，实例如何调整了各种内存组件的大小。您会看到数据库会根据遇到的工作负载自动增加或缩小`SGA_TARGET`和`PGA_AGGREGATE_TARGET`参数的值。以下查询展示了如何使用`V$MEMORY_RESIZE_OPS`视图来了解\
    \ Oracle 的实例内存动态分配：\n\n```\nSQL> select component,oper_type,oper_mode,parameter,\
    \ final_size,target_size\n     from v$memory_resize_ops\n\nCOMPONENT         \
    \      OPER_TYPE   OPER_MODE      PARAMETER      FINAL_SIZE   TARGET_SIZE\n---------------------\
    \  -----------  ---------  ---------------  ------------  ------------\n\nDEFAULT\
    \ buffer cache    GROW        DEFERRED   db_cache_size        180355072     180355072\n\
    shared pool             GROW        DEFERRED   shared_pool_size     264241152\
    \     264241152\n…\n20 rows selected.\nSQL>\n```\n\n`OPER_TYPE`列可以取两个值——`GROW`或`SHRINK`，这取决于随着数据库工作负载随时间波动，数据库是增长还是缩小单个内存组件。正是这种通过自动为各种内存组件配置必要内存来响应这些变化的能力，构成了这种“自动”内存管理。DBA\
    \ 最好随时间监控此视图，以确保自动内存管理为其数据库运行良好。\n\n### 3-5. 优化内存使用\n\n#### 问题\n\n您已在数据库中设置了自动内存管理，并希望借助\
    \ Oracle 的内存顾问来优化内存使用。\n\n#### 解决方案\n\n无论您设置的是自动内存管理、自动共享内存管理，甚至是手动内存管理方案，您都可以使用\
    \ Oracle 的内存顾问来指导内存调整工作。在本示例中，我们展示了如何使用 Oracle Enterprise Manager Database Control\
    \ 轻松调整内存使用。步骤如下：\n\n1.  转到 Database Control 中的 Database Home 页面。点击页面底部的 Advisor\
    \ Central。\n2.  在出现的 Memory Advisors 页面中，点击 Automatic Memory Management 下 Total\
    \ Memory Size 框旁的 Advice。\n\nMemory Size Advice 图会出现在一个单独的窗口中，如图 3-1 所示。在此图中，DB\
    \ 时间的改进与当前为`MEMORY_TARGET`参数设置的总内存相对应绘制。DB 时间改进的值越高，性能就越好。该图显示了随着您更改`MEMORY_TARGET`参数值，性能（DB\
    \ 时间改进）将如何变化。您分配的总内存不能超过此实例允许的最大内存，这在图中由虚线直线表示。\n\n![images](img/0301.jpg)\n\n\
    **图 3-1.** Database Control 中的 Memory Size Advice 图\n\n#### 工作原理\n\n当您实施自动内存管理时，Oracle\
    \ 会根据实例的工作负载特征，在实例运行过程中自动调整总内存的各个组件——SGA 和 PGA 之间的内存。您无需运行各种视图的查询来确定当前内存分配是否最优，而是可以遵循几个简单的步骤来快速了解情况。您可以查看自动数据库诊断监视器报告，看看它们是否包含关于内存不足的任何评论或建议。如果\
    \ ADDM 认为当前内存分配不足以实现最佳性能，它会建议您为`MEMORY_TARGET`参数增加更多内存。\n\n如果 ADDM 报告建议您增加`MEMORY_TARGET`参数的大小，下一个问题是应该增加多少内存分配。Oracle\
    \ 内置的内存顾问正是用于此目的。即使没有 ADDM 的建议，您也可以使用内存顾问来了解增加或减少`MEMORY_TARGET`参数将如何影响性能。\n\n\
    您还可以通过点击 Memory Advisors 页面顶部的 PGA，从同一页面优化 PGA 内存分配。对于 PGA，在 PGA Target Advice\
    \ 页面中，图表将 PGA 缓存命中率与 PGA 目标大小相对应绘制。理想情况下，您会希望 PGA 缓存比率大约在 70%以上。PGA Target Advice\
    \ 页面将帮助您确定应为`PGA_AGGREGATE_TARGET`参数分配什么值以实现您的性能目标。\n\n### 3-6. 调优 PGA 内存分配\n\n\
    #### 问题\n\n您决定为`PGA_AGGREGATE_TARGET`参数设置一个特定的最小内存大小，尽管您正在使用 Oracle 的自动内存管理来分配内存。您想知道确定最佳\
    \ PGA 内存分配的最佳方法。\n\n#### 解决方案\n\n没有硬性规定来分配`PGA_AGGREGATE_TARGET`参数的大小。话虽如此，如果您运营的是数据仓库，您更可能需要为\
    \ Oracle 内存分配的 PGA 组件预留更大的内存量。您可以遵循以下基本步骤来分配 PGA 内存水平：\n\n1.  大致猜测 PGA 可能需要多少内存，以此作为起始分配。\n\
    2.  让数据库运行一两个完整周期的代表性工作负载。然后您可以访问各种 Oracle 视图来确定您最初对 PGA 的估计是否准确。"
- fmt: "#### How It Works\n\nAlthough automatic memory management is designed to optimally\
    \ allocate memory between the two major components of Oracle memory—the `SGA`\
    \ and the `PGA`—it's certainly not uncommon for many `DBA`s to decide to set their\
    \ own values for both the `SGA` and the `PGA`, either as part of the alternative\
    \ mode of memory management, automatic shared memory management, wherein you set\
    \ the `SGA_TARGET` and the `PGA_AGGREGATE_TARGET` parameters explicitly to manage\
    \ memory, or even under the newer automatic memory management system. Unlike the\
    \ `SGA_TARGET` parameter, where cache hit ratios could mislead you as to the efficacy\
    \ of the instance, you'll find that an analysis of the hit ratios for the `PGA_AGGREGATE_TARGET`\
    \ parameter are not only valid, but also highly useful in configuring the appropriate\
    \ sizes for this parameter.\n\nThe Oracle database uses `PGA` memory to perform\
    \ operations such as sorting and hashing. The memory you allocate to the `PGA`\
    \ component is used by various SQL work areas running in the database (along with\
    \ other users of the `PGA` memory such as `PL/SQL` and `Java` programs). Ideally,\
    \ you'd want all work areas to have an optimal `PGA` memory allocation. When memory\
    \ allocation is ideal, a work area performs the entire operation in memory. For\
    \ example, if a `SQL` operation involves sorting operations, under optimal `PGA`\
    \ allocation, all of the sorting is done within the `PGA` memory allocated to\
    \ that process. If the `PGA` memory allocation isn't optimal, the work areas make\
    \ one or more passes over the data—this means they have to perform the operations\
    \ on disk, involving time consuming `I/O`. The more passes the database is forced\
    \ to make, the more `I/O` and the longer it takes to process the work.\n\nOracle\
    \ computes the `PGA` cache hit percentage with the following formula:\n\n```\n\
    Bytes Processed * 100 /(Bytes processed + Extra Bytes Processed)\n```\n\n`Bytes\
    \ Processed` is the total number of bytes processed by all the `PGA` memory using\
    \ `SQL` operations since the instance started. You should seek to get this ratio\
    \ as close to 100 as possible—if your `PGA` cache hit percentage is something\
    \ like 33.37%, it's definitely time to increase `PGA` memory allocation by raising\
    \ the value you've set for the `PGA_AGGREGATE_TARGET` parameter. Fortunately,\
    \ the `PGA_AGGREGATE_TARGET` parameter is dynamic, so you can adjust this on the\
    \ fly without a database restart, to address a sudden slowdown in database performance\
    \ due to heavy sorting and hashing activity.\n\nYou can issue the following simple\
    \ query to find out the `PGA` cache hit percentage as well as a number of `PGA`\
    \ performance-related values.\n\n```\nSQL>select  * from v$pgastat;\nNAME                                     VALUE             UNIT\n\
    --------------------------------       -------------     ----------\naggregate\
    \ PGA target parameter             570425344     bytes\naggregate PGA auto target                  481397760     bytes\n\
    total PGA inuse                             35661824     bytes\ntotal PGA allocated                         70365184     bytes\n\
    maximum PGA allocated                      195681280     bytes\nover allocation\
    \ count                              0     bytes processed\nextra bytes read/written                           0     bytes\n\
    cache hit percentage                             100     percent\nSQL>\n```\n\n\
    Since we're using our test database here, the cache hit percentage is a full 100%,\
    \ but don't expect that in a real-life database, especially if it is processing\
    \ a lot of data warehouse–type operations!\n\nYou can also use the `V$SQL_WORKAREA_HISTOGRAM`\
    \ view to find out how much of its work the database is performing in an optimal\
    \ fashion. If a work area performs its work optimally, that is, entirely within\
    \ `PGA` memory, it's counted as part of the `OPTIMAL_COUNT` column. If it makes\
    \ one or more passes, it will go under the `ONEPASS_COUNT` or the `MULTIPASS_COUNT`\
    \ columns. Here's a query that shows how to do this:\n\n```\nSQL> select optimal_count,\
    \ round(optimal_count*100/total, 2) optimal_perc,\n  2  onepass_count, round(onepass_count*100/total,\
    \ 2) onepass_perc,\n  3  multipass_count, round(multipass_count*100/total, 2)\
    \ multipass_perc\n  4  from\n  5   (select decode(sum(total_executions), 0, 1,\
    \ sum(total_executions)) total,\n  6   sum(OPTIMAL_EXECUTIONS) optimal_count,\n\
    \  7   sum(ONEPASS_EXECUTIONS) onepass_count,\n  8   sum(MULTIPASSES_EXECUTIONS)\
    \ multipass_count\n  9   from  v$sql_workarea_histogram\n 10* where low_optimal_size\
    \ > (64*1024))\nSQL> /\nOPTI_COUNT     OPTI_PERC    ONEPASS_CT     ONEPASS_PERC   MULTIPASS_CT     MULTIPASS_PERC\n\
    -----------   -----------  -----------    -------------   -------------   ---------------\n\
    8069              100             0            0               0                 0\n\
    ```\n\nOne pass is slower than none at all, but a multi-pass operation is a sure\
    \ sign of trouble in your database, especially if it involves large work areas.\
    \ You'll most likely find that your database has slowed to a crawl and is unable\
    \ to scale efficiently when the database is forced to make even a moderate amount\
    \ of multi-pass executions that involve large work areas, such as those that are\
    \ sized 256 MB to 2 GB. To make sure that you don't have any huge work areas running\
    \ in the multi-pass mode, issue the following query:\n\n```\nSQl> select low_optimal_size/1024\
    \ low,\n     (high_optimal_size+1)/1024 high,\n     optimal_executions, onepass_executions,\
    \ multipasses_executions\n     from v$sql_workarea_histogram\n     where total_executions\
    \ !=0;\n```\n\nYou can also execute simple queries involving views such as `V$SYSSTAT`\
    \ and `V$SESSTAT` as shown here, to find out exactly how many work areas the database\
    \ has executed with an optimal memory size (in the `PGA`), one-pass memory size,\
    \ and multi-pass memory sizes.\n\n```\nSQL>select name profile, cnt, decode(total,\
    \ 0, 0, round(cnt*100/total)) percentage\n    from (SELECT name, value cnt, (sum(value)\
    \ over ()) total\n    from V$SYSSTAT\n    where name like 'workarea exec%');\n\
    ```\n\nRemember that this query shows the total number of work areas executed\
    \ under each of the three different execution modes (optimal, one-pass, and multi-pass),\
    \ since the database was started. To get the same information for a specific period\
    \ of time, you can use queries involving Automatic Session History (`ASH`).\n\n\
    You can also view the contents of the Automatic Workload Repository (`AWR`) for\
    \ information regarding how the database used its `PGA` memory for any interval\
    \ you choose. If you regularly create these reports and save them, you can have\
    \ a historical record of how well the `PGA` allocation has been over a period\
    \ of time. You can also view the `ADDM` report for a specific time period to evaluate\
    \ what proportion of work the database is executing in each of the three modes\
    \ of execution we discussed earlier. In a data warehouse environment, where the\
    \ database processes huge sorts and hashes, the optimal allocation of the `PGA`\
    \ memory is one of the most critical tasks a `DBA` can perform.\n\n### 3-7. Configuring\
    \ the Server Query Cache\n\n#### Problem\n\nYou'd like to set up the server query\
    \ cache that's part of Oracle's memory allocation."
  raw: '#### How It Works


    Although automatic memory management is designed to optimally allocate memory
    between the two major components of Oracle memory—the SGA and the PGA—it''s certainly
    not uncommon for many DBAs to decide to set their own values for both the SGA
    and the PGA, either as part of the alternative mode of memory management, automatic
    shared memory management, wherein you set the `SGA_TARGET` and the `PGA_AGGREGATE_TARGET`
    parameters explicitly to manage memory, or even under the newer automatic memory
    management system. Unlike the `SGA_TARGET` parameter, where cache hit ratios could
    mislead you as to the efficacy of the instance, you''ll find that an analysis
    of the hit ratios for the `PGA_AGGREGATE_TARGET` parameter are not only valid,
    but also highly useful in configuring the appropriate sizes for this parameter.


    The Oracle database uses PGA memory to perform operations such as sorting and
    hashing. The memory you allocate to the PGA component is used by various SQL work
    areas running in the database (along with other users of the PGA memory such as
    PL/SQL and Java programs). Ideally, you''d want all work areas to have an optimal
    PGA memory allocation. When memory allocation is ideal, a work area performs the
    entire operation in memory. For example, if a SQL operation involves sorting operations,
    under optimal PGA allocation, all of the sorting is done within the PGA memory
    allocated to that process. If the PGA memory allocation isn''t optimal, the work
    areas make one or more passes over the data—this means they have to perform the
    operations on disk, involving time consuming I/O. The more passes the database
    is forced to make, the more I/O and the longer it takes to process the work.


    Oracle computes the PGA cache hit percentage with the following formula:


    `Bytes Processed * 100 /(Bytes processed + Extra Bytes Processed)`


    Bytes Processed is the total number of bytes processed by all the PGA memory using
    SQL operations since the instance started. You should seek to get this ratio as
    close to 100 as possible—if your PGA cache hit percentage is something like 33.37%,
    it''s definitely time to increase PGA memory allocation by raising the value you''ve
    set for the `PGA_AGGREGATE_TARGET` parameter. Fortunately, the `PGA_AGGREGATE_TARGET`
    parameter is dynamic, so you can adjust this on the fly without a database restart,
    to address a sudden slowdown in database performance due to heavy sorting and
    hashing activity.


    You can issue the following simple query to find out the PGA cache hit percentage
    as well as a number of PGA performance-related values.


    `SQL>select  * from v$pgastat;`

    `NAME                                     VALUE             UNIT`

    `--------------------------------       -------------     ----------`

    `aggregate PGA target parameter             570425344     bytes`

    `aggregate PGA auto target                  481397760     bytes`

    `total PGA inuse                             35661824     bytes`

    `total PGA allocated                         70365184     bytes`

    `maximum PGA allocated                      195681280     bytes`

    `over allocation count                              0     bytes processed`

    `extra bytes read/written                           0     bytes`

    `cache hit percentage                             100     percent`

    `SQL>`


    Since we''re using our test database here, the cache hit percentage is a full
    100%, but don''t expect that in a real-life database, especially if it is processing
    a lot of data warehouse–type operations!


    You can also use the `V$SQL_WORKAREA_HISTOGRAM` view to find out how much of its
    work the database is performing in an optimal fashion. If a work area performs
    its work optimally, that is, entirely within PGA memory, it''s counted as part
    of the `OPTIMAL_COUNT` column. If it makes one or more passes, it will go under
    the `ONEPASS_COUNT` or the `MULTIPASS_COUNT` columns. Here''s a query that shows
    how to do this:


    `SQL> select optimal_count, round(optimal_count*100/total, 2) optimal_perc,`

    `  2  onepass_count, round(onepass_count*100/total, 2) onepass_perc,`

    `  3  multipass_count, round(multipass_count*100/total, 2) multipass_perc`

    `  4  from`

    `  5   (select decode(sum(total_executions), 0, 1, sum(total_executions)) total,`

    `  6   sum(OPTIMAL_EXECUTIONS) optimal_count,`

    `  7   sum(ONEPASS_EXECUTIONS) onepass_count,`

    `  8   sum(MULTIPASSES_EXECUTIONS) multipass_count`

    `  9   from  v$sql_workarea_histogram`

    ` 10* where low_optimal_size > (64*1024))`

    `SQL> /`

    `OPTI_COUNT     OPTI_PERC    ONEPASS_CT     ONEPASS_PERC   MULTIPASS_CT     MULTIPASS_PERC`

    `-----------   -----------  -----------    -------------   -------------   ---------------`

    `8069              100             0            0               0                 0`


    One pass is slower than none at all, but a multi-pass operation is a sure sign
    of trouble in your database, especially if it involves large work areas. You''ll
    most likely find that your database has slowed to a crawl and is unable to scale
    efficiently when the database is forced to make even a moderate amount of multi-pass
    executions that involve large work areas, such as those that are sized 256 MB
    to 2 GB. To make sure that you don''t have any huge work areas running in the
    multi-pass mode, issue the following query:


    `SQl> select low_optimal_size/1024 low,`

    `     (high_optimal_size+1)/1024 high,`

    `     optimal_executions, onepass_executions, multipasses_executions`

    `     from v$sql_workarea_histogram`

    `     where total_executions !=0;`


    You can also execute simple queries involving views such as `V$SYSSTAT` and `V$SESSTAT`
    as shown here, to find out exactly how many work areas the database has executed
    with an optimal memory size (in the PGA), one-pass memory size, and multi-pass
    memory sizes.


    `SQL>select name profile, cnt, decode(total, 0, 0, round(cnt*100/total)) percentage`

    `    from (SELECT name, value cnt, (sum(value) over ()) total`

    `    from V$SYSSTAT`

    `    where name like ''workarea exec%'');`


    Remember that this query shows the total number of work areas executed under each
    of the three different execution modes (optimal, one-pass, and multi-pass), since
    the database was started. To get the same information for a specific period of
    time, you can use queries involving Automatic Session History (ASH).


    You can also view the contents of the Automatic Workload Repository (AWR) for
    information regarding how the database used its PGA memory for any interval you
    choose. If you regularly create these reports and save them, you can have a historical
    record of how well the PGA allocation has been over a period of time. You can
    also view the ADDM report for a specific time period to evaluate what proportion
    of work the database is executing in each of the three modes of execution we discussed
    earlier. In a data warehouse environment, where the database processes huge sorts
    and hashes, the optimal allocation of the PGA memory is one of the most critical
    tasks a DBA can perform.


    ### 3-7. Configuring the Server Query Cache


    #### Problem


    You''d like to set up the server query cache that''s part of Oracle''s memory
    allocation.'
  trans: "\n\n#### 工作原理\n\n尽管自动内存管理旨在优化 Oracle 内存的两个主要组件——`SGA` 和 `PGA`——之间的内存分配，但许多\
    \ `DBA` 决定自行设置 `SGA` 和 `PGA` 的值，这当然也很常见。这要么是作为替代内存管理模式（即自动共享内存管理，在此模式下你显式设置 `SGA_TARGET`\
    \ 和 `PGA_AGGREGATE_TARGET` 参数来管理内存）的一部分，要么甚至是在更新的自动内存管理系统下进行的。与 `SGA_TARGET` 参数不同（其缓存命中率可能会误导你对实例效能的判断），你会发现对\
    \ `PGA_AGGREGATE_TARGET` 参数命中率的分析不仅有效，而且对于配置该参数的适当大小非常有用。\n\nOracle 数据库使用 `PGA`\
    \ 内存来执行排序和哈希等操作。分配给 `PGA` 组件的内存由数据库中运行的各种 SQL 工作区使用（连同其他 `PGA` 内存使用者，如 `PL/SQL`\
    \ 和 `Java` 程序）。理想情况下，你希望所有工作区都具有最佳的 `PGA` 内存分配。当内存分配理想时，工作区会在内存中执行整个操作。例如，如果一个\
    \ `SQL` 操作涉及排序操作，在最佳的 `PGA` 分配下，所有的排序都会在分配给该进程的 `PGA` 内存中完成。如果 `PGA` 内存分配不是最优的，工作区将对数据进行一次或多次遍历——这意味着它们必须在磁盘上执行操作，涉及耗时的\
    \ `I/O`。数据库被迫进行的遍历次数越多，`I/O` 就越多，处理工作所需的时间也越长。\n\nOracle 使用以下公式计算 `PGA` 缓存命中百分比：\n\
    \n```\nBytes Processed * 100 /(Bytes processed + Extra Bytes Processed)\n```\n\
    \n`Bytes Processed` 是自实例启动以来，所有使用 `SQL` 操作的 `PGA` 内存处理的总字节数。你应该力求使这个比率尽可能接近 100——如果你的\
    \ `PGA` 缓存命中百分比大约是 33.37%，那绝对是时候通过提高你为 `PGA_AGGREGATE_TARGET` 参数设置的值来增加 `PGA`\
    \ 内存分配了。幸运的是，`PGA_AGGREGATE_TARGET` 参数是动态的，因此你可以即时调整它，而无需重启数据库，以应对由于大量排序和哈希活动导致的数据库性能突然下降。\n\
    \n你可以执行以下简单查询来找出 `PGA` 缓存命中百分比以及一些与 `PGA` 性能相关的值。\n\n```\nSQL>select  * from v$pgastat;\n\
    NAME                                     VALUE             UNIT\n--------------------------------\
    \       -------------     ----------\naggregate PGA target parameter         \
    \    570425344     bytes\naggregate PGA auto target                  481397760\
    \     bytes\ntotal PGA inuse                            35661824     bytes\ntotal\
    \ PGA allocated                        70365184     bytes\nmaximum PGA allocated\
    \                     195681280     bytes\nover allocation count             \
    \              0     bytes processed\nextra bytes read/written               \
    \         0     bytes\ncache hit percentage                          100     percent\n\
    SQL>\n```\n\n由于我们这里使用的是测试数据库，缓存命中百分比是满值 100%，但在真实的数据库中不要期望如此，尤其是当它正在处理大量数据仓库类型的操作时！\n\
    \n你也可以使用 `V$SQL_WORKAREA_HISTOGRAM` 视图来了解数据库以最优方式执行了多少工作。如果一个工作区以最优方式执行其工作，即完全在\
    \ `PGA` 内存中完成，它会被计入 `OPTIMAL_COUNT` 列。如果它进行了一次或多次遍历，它将被归入 `ONEPASS_COUNT` 或 `MULTIPASS_COUNT`\
    \ 列。下面是一个展示如何执行此操作的查询：\n\n```\nSQL> select optimal_count, round(optimal_count*100/total,\
    \ 2) optimal_perc,\n  2  onepass_count, round(onepass_count*100/total, 2) onepass_perc,\n\
    \  3  multipass_count, round(multipass_count*100/total, 2) multipass_perc\n  4\
    \  from\n  5   (select decode(sum(total_executions), 0, 1, sum(total_executions))\
    \ total,\n  6   sum(OPTIMAL_EXECUTIONS) optimal_count,\n  7   sum(ONEPASS_EXECUTIONS)\
    \ onepass_count,\n  8   sum(MULTIPASSES_EXECUTIONS) multipass_count\n  9   from\
    \  v$sql_workarea_histogram\n 10* where low_optimal_size > (64*1024))\nSQL> /\n\
    OPTI_COUNT     OPTI_PERC    ONEPASS_CT     ONEPASS_PERC   MULTIPASS_CT     MULTIPASS_PERC\n\
    -----------   -----------  -----------    -------------   --------------   ---------------\n\
    8069              100             0            0               0             \
    \    0\n```\n\n一次遍历比没有遍历要慢，但多次遍历操作绝对是数据库出现问题的迹象，尤其是在涉及大型工作区时。你很可能会发现，当数据库被迫执行即使是中等数量的涉及大型工作区（例如那些大小在\
    \ 256 MB 到 2 GB 之间的）的多次遍历执行时，数据库已慢如蜗牛，无法有效扩展。为确保你没有任何大型工作区以多次遍历模式运行，请执行以下查询：\n\
    \n```\nSQl> select low_optimal_size/1024 low,\n     (high_optimal_size+1)/1024\
    \ high,\n     optimal_executions, onepass_executions, multipasses_executions\n\
    \     from v$sql_workarea_histogram\n     where total_executions !=0;\n```\n\n\
    你还可以执行涉及 `V$SYSSTAT` 和 `V$SESSTAT` 等视图的简单查询，如下所示，以准确找出数据库在最优内存大小（在 `PGA` 中）、一次遍历内存大小和多次遍历内存大小下执行了多少个工作区。\n\
    \n```\nSQL>select name profile, cnt, decode(total, 0, 0, round(cnt*100/total))\
    \ percentage\n    from (SELECT name, value cnt, (sum(value) over ()) total\n \
    \   from V$SYSSTAT\n    where name like 'workarea exec%');\n```\n\n请记住，此查询显示的是自数据库启动以来，在三种不同执行模式（最优、一次遍历和多次遍历）下执行的工作区总数。要获取特定时间段内的相同信息，你可以使用涉及自动会话历史（`ASH`）的查询。\n\
    \n你也可以查看自动工作量存储库（`AWR`）的内容，以获取关于数据库在任意你选择的区间内如何使用其 `PGA` 内存的信息。如果你定期创建这些报告并保存它们，就可以拥有\
    \ `PGA` 分配在一段时间内的历史记录。你还可以查看特定时间段的 `ADDM` 报告，以评估数据库在前面讨论的三种执行模式下分别执行了多大比例的工作。在数据仓库环境中，数据库需要处理巨大的排序和哈希操作，`PGA`\
    \ 内存的最优分配是 `DBA` 可执行的最关键任务之一。\n\n### 3-7. 配置服务器查询缓存\n\n#### 问题\n\n你想要设置作为 Oracle\
    \ 内存分配一部分的服务器查询缓存。\n\n"
- fmt: "#### 服务器查询缓存\n\n##### 配置方案\n\n你可以通过设置三个初始化参数来控制服务器查询缓存的行为：`RESULT_CACHE_MAX_SIZE`、`RESULT_CACHE_MAX_RESULT`\
    \ 和 `RESULT_CACHE_REMOTE_EXPIRATION`。例如，你可以为这三个与服务器结果缓存相关的初始化参数使用以下值集：\n\n```\n\
    RESULT_CACHE_MAX_SIZE=500M      /* Megabytes */\nRESULT_CACHE_MAX_RESULT=20  \
    \    /* Percentage */\nRESULT_CACHE_REMOTE_EXPIRATION=3600       /* Minutes */\n\
    ```\n\n你可以通过将 `RESULT_CACHE_MAX_SIZE` 参数设置为 0 来禁用服务器结果缓存（该参数的任何非零值都会启用缓存）。\n\n\
    如果你将 `RESULT_CACHE_MODE` 初始化参数设置为 `FORCE`，则数据库会缓存所有查询结果，除非你指定 `/*+ NO_RESULT_CACHE\
    \ */` 提示来排除某个查询的结果。该参数的默认值（也是推荐值）是 `MANUAL`，这意味着数据库仅在你使用相应的查询提示或表注解（稍后解释）时才会缓存查询结果。你可以在系统级别或会话级别设置此参数，如下所示：\n\
    \n```\nSQL> alter session set result_cache_mode=force;\n```\n\n你可以通过使用 `DBMS_RESULT_CACHE`\
    \ 包中的 `FLUSH` 过程来从服务器结果缓存中移除缓存的结果，如下所示：\n\n```\nSQL> execute dbms_result_cache.flush\n\
    ```\n\n##### 工作原理\n\n服务器结果缓存提供了一种极佳的方式来存储频繁执行的 SQL 查询和 PL/SQL 函数的结果。借助我们在“配置方案”部分描述的三个初始化参数，此功能易于配置。但是，请记住，Oracle\
    \ 并不保证无论怎样，特定的查询或 PL/SQL 函数结果都会被缓存。\n\n在某些方面，你可以将 Oracle 结果缓存功能与其他 Oracle 结果存储机制进行比较，例如共享的\
    \ PL/SQL 集合以及物化视图。但请注意，Oracle 将 PL/SQL 集合存储在私有的 PGA 区域中，而将结果缓存作为共享池组件之一存储在共享池中。如你所知，共享池是\
    \ SGA 的一部分。物化视图存储在磁盘上，而结果缓存则存储在速度更快的随机存取存储器中。因此，当你利用结果缓存来存储结果集时，相比于在物化视图中存储预计算结果，你可以预期获得远胜一筹的性能。最重要的是，结果缓存为\
    \ Oracle DBA 提供了一种完全无需干预的存储频繁访问结果集的模式——你无需像创建物化视图那样创建任何对象、为其建立索引或刷新它们。Oracle 会为你处理好一切。\n\
    \n服务器查询缓存是 SGA 共享池组件的一部分。你可以使用此缓存来存储 SQL 查询结果以及 PL/SQL 函数结果。Oracle 可以在 SQL 结果缓存中缓存\
    \ SQL 结果，并在 PL/SQL 函数结果缓存中缓存 PL/SQL 函数结果。你通常使用服务器查询缓存来使数据库缓存那些频繁执行但每次执行需要访问大量行的查询。你可以通过在数据库中设置以下初始化参数来配置服务器查询缓存。\n\
    \n*   `RESULT_CACHE_MAX_SIZE`：这设置了分配给服务器结果缓存的内存。\n*   `RESULT_CACHE_MAX_RESULT`：这是缓存中单个结果可使用的最大内存量，以百分比表示。默认是服务器结果缓存的\
    \ 5%。\n*   `RESULT_CACHE_REMOTE_EXPIRATION`：默认情况下，任何涉及远程对象的结果都不会被缓存。因此，`RESULT_CACHE_REMOTE_EXPIRATION`\
    \ 参数的默认设置是 0。但是，你可以通过为 `RESULT_CACHE_REMOTE_EXPIRATION` 参数设置一个显式值来启用涉及远程对象的结果的缓存。\n\
    \n仅为服务器结果缓存设置这三个初始化参数仅仅是启用了缓存。要实际将缓存用于你的 SQL 查询结果或 PL/SQL 函数结果，你必须在数据库范围内启用缓存，或针对特定查询启用缓存，如下面的配方所述。\n\
    \n一旦数据库将结果存储在服务器结果缓存中，它会一直保留该结果，直到你使用 `DBMS_RESULT_CACHE.FLUSH` 过程手动移除它，或者直到缓存达到由\
    \ `RESULT_CACHE_MAX_SIZE` 参数设置的最大大小。当服务器结果缓存容量耗尽，需要为更新结果腾出空间时，数据库将从缓存中移除最旧的结果。\n\
    \n#### 管理服务器查询缓存\n\n##### 问题\n\n你已经启用了服务器结果缓存，但不确定查询是否正在利用它。你还想了解服务器结果缓存的运行状况。\n\
    \n##### 解决方案\n\n你可以通过使用 `DBMS_RESULT_CACHE` 包来检查服务器结果缓存的状态。例如，使用以下查询检查缓存是否已启用：\n\
    \n```\nSQL> select dbms_result_cache.status() from dual;\n\nDBMS_RESULT_CACHE.STATUS()\n\
    -----------------------------------------------------\nENABLED\n\nSQL>\n```\n\n\
    在为查询启用缓存后，你可以查看查询的执行计划，以检查该查询是否确实使用了 SQL 查询缓存，如下例所示。查询的执行计划显示该查询确实在使用结果缓存的 SQL\
    \ 查询缓存组件。\n\n```\nSQL> select  /*+ RESULT_CACHE */ department_id, AVG(salary)\n\
    \     from hr.employees\n     group by department_id;\n.\n.\n.\n--------------------------------------------------------------\n\
    | Id | Operation          | Name                       |Rows\n--------------------------------------------------------------\n\
    |  0 | SELECT STATEMENT   |                            |  11\n|  1 |  RESULT CACHE\
    \      | 8fpza04gtwsfr6n595au15yj4y |\n|  2 |   HASH GROUP BY    |           \
    \                 |  11\n|  3 |    TABLE ACCESS FULL| EMPLOYEES              \
    \    | 107\n--------------------------------------------------------------\n```\n\
    \n你可以使用 `DBMS_RESULT_CACHE` 包的 `MEMORY_REPORT` 过程来查看 Oracle 如何为结果缓存分配内存，如下所示：\n\
    \n```\nSQL> SET SERVEROUTPUT ON\nSQL> execute dbms_result_cache.memory_report\n\
    \nR e s u l t   C a c h e   M e m o r y   R e p o r t\n[Parameters]\nBlock Size\
    \     = 1024 bytes\nMaximum Cache Size = 950272 bytes (928 blocks)\nMaximum Result\
    \ Size = 47104 bytes (46 blocks)\n[Memory]\nTotal Memory = 46340 bytes [0.048%\
    \ of the Shared Pool]\n... Fixed Memory = 10696 bytes [0.011% of the Shared Pool]\n\
    ... State Object Pool =  2852 bytes [0.003% of the Shared Pool]\n... Cache Memory\
    \ = 32792 bytes (32 blocks) [0.034% of the Shared Pool]\n....... Unused Memory\
    \ = 30 blocks\n....... Used Memory = 2 blocks\n........... Dependencies = 1 blocks\n\
    ........... Results = 1 blocks\n............... SQL = 1 blocks\n\nPL/SQL procedure\
    \ successfully completed.\nSQL>\n```\n\n你可以通过执行以下查询来监控服务器结果缓存统计信息：\n\n```\nSQL>\
    \ select name, value from V$RESULT_CACHE_STATISTICS;\n\nNAME                 \
    \         VALUE\n--------------------          ----------\nBlock Size (Bytes)\
    \            1024\nBlock Count Maximum           3136\nBlock Count Current   \
    \          32\nResult Size Maximum (Blocks)   156\nCreate Count Success      \
    \        2\nCreate Count Failure              0\nFind Count                  \
    \      0\nInvalidation Count                0\nDelete Count Invalid          \
    \    0\nDelete Count Valid                0\nSQL>\n```\n\n`Create Count Success`\
    \ 列显示数据库已在服务器结果缓存中缓存的查询数，`Invalidation Count` 列显示数据库使缓存结果无效的次数。"
  raw: '#### Solution


    You can control the behavior of the server query cache by setting three initialization
    parameters: `RESULT_CACHE_MAX_SIZE`, `RESULT_CACHE_MAX_RESULT`, and `RESULT_CACHE_REMOTE_EXPIRATION`.
    For example, you can use the following set of values for the three server result
    cache-related initialization parameters:


    `RESULT_CACHE_MAX_SIZE=500M      /* Megabytes`

    `RESULT_CACHE_MAX_RESULT=20     /* Percentage`

    `RESULT_CACHE_REMOTE_EXPIRATION=3600       /* Minutes`


    You can disable the server result cache by setting the `RESULT_CACHE_MAX_SIZE`
    parameter to 0 (any non-zero value for this parameter enables the cache).


    If you set the `RESULT_CACHE_MODE` initialization parameter to `FORCE`, the database
    caches all query results unless you specify the `/*+ NO_RESULT_CACHE */` hint
    to exclude a query''s results from the cache. The default (and the recommended)
    value of this parameter is `MANUAL`, meaning that the database caches query results
    only if you use the appropriate query hint or table annotation (explained later).
    You can set this parameter at the system level or at the  session level, as shown
    here:


    `SQL> alter session set result_cache_mode=force;`


    You can remove cached results from the server result cache by using the `FLUSH`
    procedure from the `DBMS_RESULT_CACHE` package, as shown here:


    `SQL> execute dbms_result_cache.flush`


    #### How It Works


    The server result cache offers a great way to store results of frequently executed
    SQL queries and PL/SQL functions. This feature is easy to configure  with the
    help of the three initialization parameters we described in the “Solution” section.
    However, remember that Oracle doesn''t guarantee that a specific query or PL/SQL
    function result will be cached no matter what.


    In some ways, you can compare the Oracle result cache feature to other Oracle
    result storing mechanisms such as a shared PL/SQL collection, as well as a materialized
    view. Note, however, that whereas Oracle stores a PL/SQL collection in private
    PGA areas, it stores the result cache in the shared pool as one of the shared
    pool components. As you know, the shared pool is part of the SGA. Materialized
    views are stored on disk, whereas a result cache is in the much faster random
    access memory. Thus, you can expect far superior performance when you utilize
    the result cache for storing result sets, as opposed to storing pre-computed results
    in a materialized view. Best of all, the result cache offers the Oracle DBA a
    completely hands-off mode of storing frequently accessed result sets—you don''t
    need to create any objects, as in the case of materialized views, index them,
    or refresh them. Oracle takes care of everything for you.


    The server query cache is part of the shared pool component of the SGA. You can
    use this cache to store both SQL query results as well as PL/SQL function results.
    Oracle can cache SQL results in the SQL result cache and PL/SQL function results
    in the PL/SQL function result cache. You usually use the server query cache to
    make the database cache queries that are frequently executed but need to access
    a large number of rows per execution. You configure the server query cache by
    setting the following initialization parameters in your database.


    *   `RESULT_CACHE_MAX_SIZE`: This sets the memory allocated to the server result
    cache.

    *   `RESULT_CACHE_MAX_RESULT`: This is the maximum amount of memory a single result
    in the cache can use, in percentage terms. The default is 5% of the server result
    cache.

    *   `RESULT_CACHE_REMOTE_EXPIRATION`: By default, any result that involves remote
    objects is not cached. Thus, the default setting of the `RESULT_CACHE_REMOTE_EXPIRATION`
    parameter is 0\. You can, however, enable the caching of results involving remote
    objects by setting an explicit value for the `RESULT_CACHE_REMOTE_EXPIRATION`
    parameter.


    Setting the three initialization parameters for the server result cache merely
    enables the cache. To actually use the cache for your SQL query results, or for
    PL/SQL function results, you have to either enable the cache database-wide, or
    for specific queries, as the following recipes explain.


    Once the database stores a result in the server result cache, it retains it there
    until you either remove it manually with the `DBMS_RESULT_CACHE.FLUSH` procedure,
    or until the cache reaches its maximum size set by the `RESULT_CACHE_MAX_SIZE`
    parameter. The database will remove the oldest results from the cache when it
    needs to make room for newer results when it exhausts  the capacity of the server
    result cache.


    ### 3-8. Managing the Server Result Cache


    #### Problem


    You''ve enabled the server result cache, but you aren''t sure if queries are taking
    advantage of it. You also would like to find out how well the server result cache
    is functioning.


    #### Solution


    You can check the status of the server result cache by using the `DBMS_RESULT_CACHE`
    package. For example, use the following query to check whether the cache is enabled:


    `SQL> select dbms_result_cache.status() from dual;`


    `DBMS_RESULT_CACHE.STATUS()`

    `-----------------------------------------------------`

    `ENABLED`

    `SQL>`


    You can view a query''s explain plan to check whether a query is indeed using
    the SQL query cache, after you enable that query for caching, as shown in the
    following example. The explain plan for the query shows that the query is indeed
    making use of the SQL query cache component of the result cache.


    `SQL> select  /*+ RESULT_CACHE */ department_id, AVG(salary)`

    `     from hr.employees`

    `     group by department_id;`

    `.`

    `.`

    `.`

    `--------------------------------------------------------------`

    `| Id | Operation          | Name                       |Rows`

    `--------------------------------------------------------------`

    `| 0 | SELECT STATEMENT    |                            | 11`

    `| 1 |  RESULT CACHE       | 8fpza04gtwsfr6n595au15yj4y |`

    `| 2 |   HASH GROUP BY     |                            | 11`

    `| 3 |    TABLE ACCESS FULL| EMPLOYEES                  | 107`

    `--------------------------------------------------------------`


    You can use the `MEMORY_REPORT` procedure of the `DBMS_RESULT_CACHE` package to
    view how Oracle is allocating memory to the result cache, as shown here:


    `SQL> SET SERVEROUTPUT ON`

    `SQL> execute dbms_result_cache.memory_report`


    `R e s u l t  C a c h e  M e m o r y  R e p o r t`

    `[Parameters]`

    `Block Size = 1024 bytes`

    `Maximum Cache Size = 950272 bytes (928 blocks)`

    `Maximum Result Size = 47104 bytes (46 blocks)`

    `[Memory]`

    `Total Memory = 46340 bytes [0.048% of the Shared Pool]`

    `... Fixed Memory = 10696 bytes [0.011% of the Shared Pool]`

    `... State Object Pool = 2852 bytes [0.003% of the Shared Pool]`

    `... Cache Memory = 32792 bytes (32 blocks) [0.034% of the Shared Pool]`

    `....... Unused Memory = 30 blocks`

    `....... Used Memory = 2 blocks`

    `........... Dependencies = 1 blocks`

    `........... Results = 1 blocks`

    `............... SQL = 1 blocks`


    `PL/SQL procedure successfully completed.`

    `SQL>`


    You can monitor the server result cache statistics by executing the following
    query:


    `SQL> select name, value from V$RESULT_CACHE_STATISTICS;`


    `NAME                          VALUE`

    `--------------------          ----------`

    `Block Size (Bytes)            1024`

    `Block Count Maximum           3136`

    `Block Count Current             32`

    `Result Size Maximum (Blocks)   156`

    `Create Count Success             2`

    `Create Count Failure             0`

    `Find Count                       0`

    `Invalidation Count               0`

    `Delete Count Invalid             0`

    `Delete Count Valid               0`

    `SQL>`


    The `Create Count Success` column shows the number of queries that the database
    has cached in the server result cache, and the `Invalidation Count` column shows
    the number of times the database has invalidated a cached result.'
