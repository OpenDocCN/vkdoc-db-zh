- fmt: "# 2-8. 创建函数索引\n\n## 问题\n\n你需要创建一个函数索引。\n\n## 解决方案\n\n使用 `CREATE INDEX` 语句并在其定义中包含一个函数或表达式来创建函数索引：\n\
    \n```sql\nSQL> create index cust_upper_idx1\n  2  on cust(upper(first_name));\n\
    ```\n\n这将在 `cust` 表上创建一个函数索引，该索引基于 `UPPER(first_name)` 表达式。\n\n## 工作原理\n\n**函数索引**\
    \ 在其定义中使用函数或表达式创建。函数索引允许在查询的 `WHERE` 子句中引用 SQL 函数的列上进行索引查找。该索引可以像本解决方案示例中那样简单，也可以基于存储在\
    \ PL/SQL 函数中的复杂逻辑。\n\n![images](images/square.jpg) `Note` 任何用户创建的 SQL 函数在用于函数索引之前，都必须声明为确定性的。`DETERMINISTIC`\
    \ 意味着对于一组给定的输入，函数总是返回相同的结果。在创建要在函数索引中使用的用户定义函数时，必须使用关键字 `DETERMINISTIC`。\n\n如果你想查看函数索引的定义，可以从\
    \ `DBA/ALL/USER_IND_EXPRESSIONS` 视图中选择，以显示与索引关联的 SQL。如果你使用的是 SQL*Plus，请务必先发出 `SET\
    \ LONG` 命令，例如：\n\n```sql\nSQL> SET LONG 500\nSQL> select index_name, column_expression\
    \ from user_ind_expressions;\n```\n\n此示例中的 `SET LONG` 命令告诉 SQL*Plus 显示 `COLUMN_EXPRESSION`\
    \ 列中最多 500 个字符，该列的类型为 `LONG`。\n\n# 2-9. 索引虚拟列\n\n## 问题\n\n你目前使用的是函数索引，但需要更好的性能。你希望用虚拟列替换函数索引，并在虚拟列上放置索引。\n\
    \n![images](images/square.jpg) `Note` 虚拟列功能需要 Oracle Database 11g 或更高版本。\n\n##\
    \ 解决方案\n\n将虚拟列与索引结合使用，为你提供了一种替代方法，用于在 `WHERE` 子句中的列上使用 SQL 函数时实现性能提升。例如，假设你有以下查询：\n\
    \n```sql\nSELECT first_name\nFROM cust\nWHERE UPPER(first_name) = 'DAVE';\n```\n\
    \n通常，由于对列应用了 SQL 函数，优化器会忽略 `FIRST_NAME` 列上的任何索引。有两种方法可以提高此情况下的性能：\n\n- 创建函数索引（详情请参阅配方\
    \ 2-8）。\n- 使用虚拟列结合索引。\n\n本解决方案重点介绍后一种方法。首先，向表中添加一个封装了 SQL 函数的虚拟列：\n\n```sql\n\
    SQL> alter table cust add(up_name generated always as (UPPER(first_name)) virtual);\n\
    ```\n\n接下来，在虚拟列上创建索引：\n\n```sql\nSQL> create index cust_vidx1 on cust(up_name);\n\
    ```\n\n这创建了一种非常高效的机制，用于在引用带有 SQL 函数的列时检索数据。\n\n## 工作原理\n\n你可能会问这个问题：“函数索引和带索引的虚拟列，哪个性能更好？”\
    \ 在我们的测试中，我们能够创建多种场景，其中虚拟列的性能优于函数索引。结果可能因数据而异。\n\n本配方的目的不是说服你立即开始用虚拟列替换系统中的所有函数索引；而是希望你能意识到解决常见性能问题的另一种方法。\n\
    \n虚拟列并非没有成本。如果存在现有表，你必须创建和维护创建虚拟列所需的 DDL，而函数索引可以独立于表进行添加、修改和删除。\n\n虚拟列有几个注意事项：\n\
    \n- 只能在常规的堆组织表上定义虚拟列。不能在索引组织表、外部表、临时表、对象表或集群表上定义虚拟列。\n- 虚拟列不能引用其他虚拟列。\n- 虚拟列只能引用其定义所在表中的列。\n\
    - 虚拟列的输出必须是标量值（单个值，而不是一组值）。\n\n要查看虚拟列的定义，请使用 `DBMS_METADATA` 包来查看与表关联的 DDL。如果从\
    \ SQL*Plus 中选择，需要将 `LONG` 变量设置为足够大的值以显示所有返回的数据：\n\n```sql\nSQL> set long 10000;\n\
    SQL> select dbms_metadata.get_ddl('TABLE','CUST') from dual;\n```\n\n以下是显示虚拟列详细信息的部分输出片段：\n\
    \n```\n\"UP_NAME\" VARCHAR2(30) GENERATED ALWAYS AS (UPPER(\"FIRST_NAME\"))\n\
    VIRTUAL VISIBLE) SEGMENT CREATION IMMEDIATE\n```\n\n你还可以通过查询 `DBA/ALL/USER_IND_EXPRESSIONS`\
    \ 视图来查看虚拟列的定义。如果你使用的是 SQL*Plus，请务必先发出 SET LONG 命令，例如：\n\n```sql\nSQL> SET LONG\
    \ 500\nSQL> select index_name, column_expression from user_ind_expressions;\n\
    ```\n\n此示例中的 `SET LONG` 命令告诉 SQL*Plus 显示 `COLUMN_EXPRESSION` 列中最多 500 个字符，该列的类型为\
    \ `LONG`。\n\n# 2-10. 避免索引的集中 I/O\n\n## 问题\n\n你使用序列来填充表的主键，并意识到这可能会导致索引前导边缘上的争用，因为索引值非常相似。这导致多个插入操作进入同一个数据块，从而引起争用。你希望将索引的插入操作分散开，使插入更均匀地分布在索引结构中。你希望使用反向键索引来实现这一点。\n\
    \n## 解决方案\n\n使用 `REVERSE` 子句创建反向键索引：\n\n```sql\nSQL> create index inv_idx1 on\
    \ inv(inv_id) reverse;\n```\n\n你可以通过运行以下查询来验证索引是否是反向键索引：\n\n```sql\nSQL> select\
    \ index_name, index_type from user_indexes;\n```\n\n以下是一些示例输出，显示 `INV_IDX1` 索引是反向键索引：\n\
    \n```\nINDEX_NAME                      INDEX_TYPE\n------------------------------\
    \ ---------------------------\nINV_IDX1                        NORMAL/REV\nUSERS_IDX1\
    \                      NORMAL\n```\n\n![images](images/square.jpg) `Note` 你不能为位图索引或索引组织表指定\
    \ `REVERSE`。\n\n## 工作原理\n\n反向键索引类似于 B-tree 索引，只是在创建索引条目时，索引键的字节会被反转。例如，如果索引值是\
    \ 100, 101 和 102，则反向键索引值是 001, 101 和 201：\n\n```\nIndex value              Reverse\
    \ key value\n-------------            --------------------\n100              \
    \        001\n101                      101\n102                      201\n```\n\
    \n反向键索引在需要一种方法来均匀分布本应相似值聚集在一起的索引数据的场景中可以表现更好。因此，使用反向键索引时，你可以避免在插入大量顺序值期间，索引中的\
    \ I/O 集中在单个物理磁盘位置。这种类型的索引的缺点是它不能用于索引范围扫描，从而限制了其用途。\n\n你可以使用 `REBUILD REVERSE`\
    \ 子句将现有索引重建为反向键索引，例如：\n\n```sql\nSQL> alter index f_regs_idx1 rebuild reverse;\n\
    ```\n\n类似地，如果你想将反向键索引更改为正常的有序索引，请使用 `REBUILD NOREVERSE` 子句：\n\n```sql\nSQL> alter\
    \ index f_regs_idx1 rebuild noreverse;\n```\n\n# 2-11. 添加索引而不影响现有应用程序\n\n## 问题\n\
    \n根据经验，你知道有时向第三方应用程序添加索引可能会导致性能问题，并且也可能违反与供应商的支持协议。你希望以一种应用程序永远不会使用该索引的方式来实现索引。"
  raw: '#### How It Works


    *Function-based indexes* are created with functions or expressions in their definitions.
    Function-based indexes allow index lookups on columns referenced by SQL functions
    in the `WHERE` clause of a query. The index can be as simple as the example in
    the “Solution” section of this recipe, or it can be based on complex logic stored
    in a PL/SQL function.


    ![images](images/square.jpg) **Note** Any user-created SQL functions must be declared
    deterministic before they can be used in a function-based index. *Deterministic*
    means that for a given set of inputs, the function always returns the same results.
    You must use the keyword `DETERMINISTIC` when creating a user-defined function
    that you want to use in a function-based index.


    If you want to see the definition of a function-based index, select from the `DBA/ALL/USER_IND_EXPRESSIONS`
    view to display the SQL associated with the index. If you''re using SQL*Plus,
    be sure to issue a `SET LONG` command first—for example:


    `SQL> SET LONG 500`

    `SQL> select index_name, column_expression from user_ind_expressions;`


    The `SET LONG` command in this example tells SQL*Plus to display up to 500 characters
    from the `COLUMN_EXPRESSION` column, which is of type `LONG`.


    ### 2-9\. Indexing a Virtual Column


    #### Problem


    You''re currently using a function-based index but need better performance. You
    want to replace the function-based index with a virtual column and place an index
    on the virtual column.


    ![images](images/square.jpg) **Note** The virtual column feature requires Oracle
    Database 11g or higher.


    #### Solution


    Using a virtual column in combination with an index provides you with an alternative
    method for achieving performance gains when using SQL functions on columns in
    the `WHERE` clause. For example, suppose you have this query:


    `SELECT first_name`

    `FROM cust`

    `WHERE UPPER(first_name) = ''DAVE'';`


    Normally, the optimizer will ignore any indexes on the column `FIRST_NAME` because
    of the SQL function applied to the column. There are two ways to improve performance
    in this situation:


    *   Create a function-based index (see Recipe 2-8 for details).

    *   Use a virtual column in combination with an index.


    This solution focuses on the latter bullet. First a virtual column is added to
    the table that encapsulates the SQL function:


    `SQL> alter table cust add(up_name generated always as (UPPER(first_name)) virtual);`


    Next an index is created on the virtual column:


    `SQL> create index cust_vidx1 on cust(up_name);`


    This creates a very efficient mechanism to retrieve data when referencing a column
    with a SQL function.


    #### How It Works


    You might be asking this question: “Which performs better, a function-based index
    or an indexed virtual column?” In our testing, we were able to create several
    scenarios where the virtual column performed better than the function-based index.
    Results may vary depending on your data.


    The purpose of this recipe is not to convince you to immediately start replacing
    all function-based indexes in your system with virtual columns; rather we want
    you to be aware of an alternative method for solving a common performance issue.


    A virtual column is not free. If you have an existing table, you have to create
    and maintain the DDL required to create the virtual column, whereas a function-based
    index can be added, modified, and dropped independently from the table.


    Several caveats are associated with virtual columns:


    *   You can define a virtual column only on a regular heap-organized table. You
    can''t define a virtual column on an index-organized table, an external table,
    a temporary table, object tables, or cluster tables.

    *   Virtual columns can''t reference other virtual columns.

    *   Virtual columns can reference columns only from the table in which the virtual
    column is defined.

    *   The output of a virtual column must be a scalar value (a single value, not
    a set of values).


    To view the definition of a virtual column, use the `DBMS_METADATA` package to
    view the DDL associated with the table. If you''re selecting from SQL*Plus, you
    need to set the `LONG` variable to a value large enough to show all data returned:


    `SQL> set long 10000;`

    `SQL> select dbms_metadata.get_ddl(''TABLE'',''CUST'') from dual;`


    Here''s a partial snippet of the output showing the virtual column details:


    `"UP_NAME" VARCHAR2(30) GENERATED ALWAYS AS (UPPER("FIRST_NAME"))`

    `VIRTUAL VISIBLE) SEGMENT CREATION IMMEDIATE`


    You can also view the definition of the virtual column by querying the `DBA/ALL/USER_IND_EXPRESSIONS`
    view. If you''re using SQL*Plus, be sure to issue a SET LONG command first—for
    example:


    `SQL> SET LONG 500`

    `SQL> select index_name, column_expression from user_ind_expressions;`


    The `SET LONG` command in this example tells SQL*Plus to display up to 500 characters
    from the `COLUMN_EXPRESSION` column, which is of type `LONG`.


    ### 2-10. Avoiding Concentrated I/O for Index


    #### Problem


    You use a sequence to populate the primary key of a table and realize that this
    can cause contention on the leading edge of the index because the index values
    are nearly similar. This leads to multiple inserts into the same block, which
    causes contention. You want to spread out the inserts into the index so that the
    inserts more evenly distribute values across the index structure. You want to
    use a reverse-key index to accomplish this.


    #### Solution


    Use the `REVERSE` clause to create a reverse-key index:


    `SQL> create index inv_idx1 on inv(inv_id) reverse;`


    You can verify that an index is reverse-key by running the following query:


    `SQL> select index_name, index_type from user_indexes;`


    Here''s some sample output showing that the `INV_IDX1` index is reverse-key:


    `INDEX_NAME                     INDEX_TYPE`

    `------------------------------ ---------------------------`

    `INV_IDX1                       NORMAL/REV`

    `USERS_IDX1                     NORMAL`


    ![images](images/square.jpg) **Note** You can''t specify `REVERSE` for a bitmap
    index or an index-organized table.


    #### How It Works


    Reverse-key indexes are similar to B-tree indexes except that the bytes of the
    index key are reversed when an index entry is created. For example, if the index
    values are 100, 101, and 102, the reverse-key index values are 001, 101, and 201:


    `Index value              Reverse key value`

    `-------------            --------------------`

    `100                      001`

    `101                      101`

    `102                      201`


    Reverse-key indexes can perform better in scenarios where you need a way to evenly
    distribute index data that would otherwise have similar values clustered together.
    Thus, when using a reverse-key index, you avoid having I/O concentrated in one
    physical disk location within the index during large inserts of sequential values.
    The downside to this type of index is that it can''t be used for index range scans,
    which therefore limits its usefulness.


    You can rebuild an existing index to be reverse-key by using the `REBUILD REVERSE`
    clause—for example:


    `SQL> alter index f_regs_idx1 rebuild reverse;`


    Similarly, if you want to make an index that is reverse-key into a normally ordered
    index, then use the `REBUILD NOREVERSE` clause:


    `SQL> alter index f_regs_idx1 rebuild noreverse;`


    ### 2-11. Adding an Index Without Impacting Existing Applications


    #### Problem


    You know from experience that sometimes when an index is added to a third-party
    application, this can cause performance issues and also can be a violation of
    the support agreement with the vendor. You want to implement an index in such
    a way that the application won''t ever use the index.'
