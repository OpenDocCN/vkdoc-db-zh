    \ For example, a database may execute a SQL statement 10,000 times, each time\
    \ with a different value for a variable. The solution in all such cases is to\
    \ use bind variables. An application that explicitly closes all cursors after\
    \ each execution may also contribute to this type of wait. The solution for this\
    \ is to specify the `CURSOR_SPACE_FOR_TIME` initialization parameter. Too small\
