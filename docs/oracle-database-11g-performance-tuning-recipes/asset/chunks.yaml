    | Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |\n\
    ------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT |           |    38 |   418 |     1   (0)| 00:00:01 |\n\
    |*  1 |  INDEX SKIP SCAN | CUST_IDX1 |    38 |   418 |     1   (0)| 00:00:01 |\n\
    ------------------------------------------------------------------------------\n\
    ```\n\n用于跳过扫描的复合索引比全表扫描更高效。但是，如果你始终只使用复合索引的滞后边缘列，那么请考虑在该滞后列上创建一个单列索引。\n\n### 2-7.\
    \ 通过压缩减小索引大小\n"
- fmt: "#### 问题\n\n您想创建一个索引，以高效处理在索引的一个或多个列中具有相同值的许多行的情况。例如，假设您有一个定义如下的表：\n\n```sql\n\
    create table cust(\n cust_id number\n,last_name varchar2(30)\n,first_name varchar2(30)\n\
    ,middle_name varchar2(30));\n```\n\n此外，您使用此查询检查插入到上述表中的数据：\n\n```sql\nSQL> select\
    \ last_name, first_name, middle_name from cust;\n```\n\n您会注意到在 `LAST_NAME` 和 `FIRST_NAME`\
    \ 列中存在大量重复：\n\n```\n    LEE                  JOHN                 Q\n    LEE \
    \                 JOHN                 B\n    LEE                  JOHN      \
    \           A\n    LEE                  JOE                  D\n    SMITH    \
    \            BOB                  A\n    SMITH                BOB            \
    \      C\n    SMITH                BOB                  D\n    SMITH         \
    \       JOHN                 J\n    SMITH                JOHN                \
    \ A\n    SMITH                MIKE                 K\n    SMITH              \
    \  MIKE                 R\n    SMITH                MIKE                 S\n```\n\
    \n您希望创建一个压缩值以将条目紧凑到块中的索引。当访问索引时，压缩将导致更少的块读取，从而提高性能。具体来说，您希望在此表的 `LAST_NAME` 和\
    \ `FIRST_NAME` 列上创建一个键压缩索引。\n\n#### 解决方案\n\n使用 `COMPRESS N` 子句创建压缩索引：\n\n```sql\n\
    SQL> create index cust_cidx1 on cust(last_name, first_name) compress 2;\n```\n\
    \n前面的代码行指示 Oracle 在两列（`LAST_NAME` 和 `FIRST_NAME`）上创建压缩索引。在此示例中，如果我们确定仅第一列存在高度重复，我们可以通过指定整数\
    \ 1 来指示 `COMPRESS N` 子句仅压缩第一列（`LAST_NAME`）：\n\n```sql\nSQL> create index cust_cidx1\
    \ on cust(last_name, first_name) compress 1;\n```\n\n#### 工作原理\n\n索引压缩对于包含多列且前导索引列值经常重复的索引非常有用。压缩索引具有以下优势：\n\
    \n*   减少存储\n*   叶块中存储更多行，这可能导致访问压缩索引时 I/O 更少\n\n压缩程度将根据为压缩指定的索引列中重复的数量而变化。您可以通过在创建启用压缩的索引前后运行以下两个查询来验证压缩程度和使用的叶块数量：\n\
    \n```sql\nSQL> select sum(bytes) from user_extents where segment_name='&&ind_name';\n\
    SQL> select index_name, leaf_blocks from user_indexes where index_name='&&ind_name';\n\
    ```\n\n您可以按如下方式验证索引压缩是否在使用中以及相应的前缀长度：\n\n```sql\nselect  index_name, compression,\
    \ prefix_length\nfrom user_indexes\nwhere index_name = 'CUST_CIDX1';\n```\n\n\
    以下是一些示例输出，表明索引已启用压缩，前缀长度为 2：\n\n```\nINDEX_NAME                     COMPRESS PREFIX_LENGTH\n\
    ------------------------------ -------- -------------\nCUST_CIDX1            \
    \         ENABLED              2\n```\n\n您可以通过重建索引来修改前缀长度。以下代码将前缀长度更改为 1：\n\n\
    ```sql\nSQL> alter index cust_cidx1 rebuild compress 1;\n```\n\n您可以通过重建索引来为现有索引启用或禁用压缩。此示例使用无压缩重建索引：\n\
    \n```sql\nSQL> alter index cust_cidx1 rebuild nocompress;\n```\n\n![images](images/square.jpg)\
    \ Note 您无法在位图索引上创建键压缩索引。\n\n### 2-8. 实现基于函数的索引\n\n#### 问题\n\n一个查询运行缓慢。您检查 `WHERE`\
    \ 子句，注意到 SQL `UPPER` 函数已应用于某一列。`UPPER` 阻止了该列上现有索引的使用。您希望创建一个基于函数的索引以支持该查询。以下是此类查询的示例：\n\
    \n```sql\nSELECT first_name\nFROM cust\nWHERE UPPER(first_name) = 'DAVE';\n```\n\
    \n您检查 `USER_INDEXES`，发现 `FIRST_NAME` 列上存在一个索引：\n\n```sql\nselect  index_name,\
    \ column_name\nfrom user_ind_columns\nwhere table_name = 'CUST';\n```\n\n```\n\
    INDEX_NAME           COLUMN_NAME\n-------------------- --------------------\n\
    CUST_IDX1            FIRST_NAME\n```\n\n您通过 `SET AUTOTRACE TRACE EXPLAIN` 生成解释计划，并注意到当\
    \ `UPPER` 函数应用于该列时，未使用索引：\n\n```\n--------------------------------------------------------------------------\n\
    | Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n--------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |      |     1 |    17 |     2   (0)| 00:00:01 |\n|*\
    \  1 |  TABLE ACCESS FULL| CUST |     1 |    17 |     2   (0)| 00:00:01 |\n--------------------------------------------------------------------------\n\
    ```\n\n您需要创建一个 Oracle 将在此情况下使用的索引。\n\n#### 解决方案\n\n有两种方法可以解决此问题：\n\n*   创建基于函数的索引。\n\
    *   如果使用 Oracle Database 11g 或更高版本，请创建索引虚拟列（有关详细信息，请参见配方 2-9）。\n\n此解决方案重点介绍使用基于函数的索引。您通过在索引创建语句中引用\
    \ SQL 函数和列来创建基于函数的索引。对于此示例，在 `UPPER(name)` 上创建了一个基于函数的索引：\n\n```sql\nSQL> create\
    \ index cust_fidx1 on cust(UPPER(first_name));\n```\n\n要验证是否使用了该索引，请打开 Autotrace\
    \ 工具：\n\n```sql\nSQL> set autotrace trace explain;\n```\n\n现在执行查询：\n\n```sql\n\
    SELECT first_name\nFROM cust\nWHERE UPPER(first_name) = 'DAVE';\n```\n\n以下是显示使用基于函数的索引的执行计划结果：\n\
    \n```\n------------------------------------------------------------------------------------------\n\
    | Id  | Operation                   | Name       | Rows  | Bytes | Cost (%CPU)|\
    \ Time     |\n------------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |            |     1 |    34 |     1   (0)|\
    \ 00:00:01 |\n|   1 |  TABLE ACCESS BY INDEX ROWID| CUST       |     1 |    34\
    \ |     1   (0)| 00:00:01 |\n|*  2 |   INDEX RANGE SCAN          | CUST_FIDX1\
    \ |     1 |       |     1   (0)| 00:00:01 |\n------------------------------------------------------------------------------------------\n\
    ```\n\n![images](images/square.jpg) Note 您无法修改已应用基于函数索引的列。您必须先删除索引，修改列，然后重新创建索引。"
  raw: '#### Problem


    You want to create an index that efficiently handles cases in which many rows
    have the same values in one or more indexed columns. For example, suppose you
    have a table defined as follows:


    `create table cust(`

    ` cust_id number`

    `,last_name varchar2(30)`

    `,first_name varchar2(30)`

    `,middle_name varchar2(30));`


    Furthermore, you inspect the data inserted into the prior table with this query:


    `SQL> select last_name, first_name, middle_name from cust;`


    You notice that there is a great deal of duplication in the LAST_NAME and FIRST_NAME
    columns:


    `    LEE                  JOHN                  Q`

    `    LEE                  JOHN                  B`

    `    LEE                  JOHN                  A`

    `    LEE                  JOE                   D`

    `    SMITH                BOB                   A`

    `    SMITH                BOB                   C`

    `    SMITH                BOB                   D`

    `    SMITH                JOHN                  J`

    `    SMITH                JOHN                  A`

    `    SMITH                MIKE                  K`

    `    SMITH                MIKE                  R`

    `    SMITH                MIKE                  S`


    You want to create an index that compresses the values so as to compact entries
    into the blocks. When the index is accessed, the compression will result in fewer
    block reads and thus improve performance. Specifically you want to create a key-compressed
    index on the `LAST_NAME` and `FIRST_NAME` columns of this table.


    #### Solution


    Use the `COMPRESS N` clause to create a compressed index:


    `SQL> create index cust_cidx1 on cust(last_name, first_name) compress 2;`


    The prior line of code instructs Oracle to create a compressed index on two columns
    (`LAST_NAME` and `FIRST_NAME`). For this example, if we determined that there
    was a high degree of duplication only in the first column, we could instruct the
    `COMPRESS N` clause to compress only the first column (`LAST_NAME`) by specifying
    an integer of 1:


    `SQL> create index cust_cidx1 on cust(last_name, first_name) compress 1;`


    #### How It Works


    Index compression is useful for indexes that contain multiple columns where the
    leading index column value is often repeated. Compressed indexes have the following
    advantages:


    *   Reduced storage

    *   More rows stored in leaf blocks, which can result in less I/O when accessing
    a compressed index


    The degree of compression will vary by the amount of duplication in the index
    columns specified for compression. You can verify the degree of compression and
    the number of leaf blocks used by running the following two queries before and
    after creating an index with compression enabled:


    `SQL> select sum(bytes) from user_extents where segment_name=''&&ind_name'';`

    `SQL> select index_name, leaf_blocks from user_indexes where index_name=''&&ind_name'';`


    You can verify the index compression is in use and the corresponding prefix length
    as follows:


    `select  index_name, compression, prefix_length`

    `from user_indexes`

    `where index_name = ''CUST_CIDX1'';`


    Here''s some sample output indicating that compression is enabled for the index
    with a prefix length of 2:


    `INDEX_NAME                     COMPRESS PREFIX_LENGTH`

    `------------------------------ -------- -------------`

    `CUST_CIDX1                     ENABLED              2`


    You can modify the prefix length by rebuilding the index. The following code changes
    the prefix length to 1:


    `SQL> alter index cust_cidx1 rebuild compress 1;`


    You can enable or disable compression for an existing index by rebuilding it.
    This example rebuilds the index with no compression:


    `SQL> alter index cust_cidx1 rebuild nocompress;`


    ![images](images/square.jpg) **Note** You cannot create a key-compressed index
    on a bitmap index.


    ### 2-8. Implementing a Function-Based Index


    #### Problem


    A query is running slow. You examine the `WHERE` clause and notice that a SQL
    `UPPER` function has been applied to a column. The `UPPER` function blocks the
    use of the existing index on that column. You want to create a function-based
    index to support the query. Here''s an example of such a query:


    `SELECT first_name`

    `FROM cust`

    `WHERE UPPER(first_name) = ''DAVE'';`


    You inspect `USER_INDEXES` and discover that an index exists on the `FIRST_NAME`
    column:


    `select  index_name, column_name`

    `from user_ind_columns`

    `where table_name = ''CUST'';`


    `INDEX_NAME           COLUMN_NAME`

    `-------------------- --------------------`

    `CUST_IDX1            FIRST_NAME`


    You generate an explain plan via `SET AUTOTRACE TRACE EXPLAIN` and notice that
    with the `UPPER` function applied to the column, the index is not used:


    `--------------------------------------------------------------------------`

    `| Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |`

    `--------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT  |      |     1 |    17 |     2   (0)| 00:00:01 |`

    `|*  1 |  TABLE ACCESS FULL| CUST |     1 |    17 |     2   (0)| 00:00:01 |`

    `--------------------------------------------------------------------------`


    You need to create an index that Oracle will use in this situation.


    #### Solution


    There are two ways to resolve this issue:


    *   Create a function-based index.

    *   If using Oracle Database 11g or higher, create an indexed virtual column (see
    Recipe 2-9 for details).


    This solution focuses on using a function-based index. You create a function-based
    index by referencing the SQL function and column in the index creation statement.
    For this example, a function-based index is created on `UPPER(name)`:


    `SQL> create index cust_fidx1 on cust(UPPER(first_name));`


    To verify if the index is used, the Autotrace facility is turned on:


    `SQL> set autotrace trace explain;`


    Now the query is executed:


    `SELECT first_name`

    `FROM cust`

    `WHERE UPPER(first_name) = ''DAVE'';`


    Here is the resulting execution plan showing that the function-based index is
    used:


    `------------------------------------------------------------------------------------------`

    `| Id  | Operation                   | Name       | Rows  | Bytes | Cost (%CPU)|
    Time     |`

    `------------------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT            |            |     1 |    34 |     1   (0)|
    00:00:01 |`

    `|   1 |  TABLE ACCESS BY INDEX ROWID| CUST       |     1 |    34 |     1   (0)|
    00:00:01 |`

    `|*  2 |   INDEX RANGE SCAN          | CUST_FIDX1 |     1 |       |     1   (0)|
    00:00:01 |`

    `------------------------------------------------------------------------------------------`


    ![images](images/square.jpg) **Note** You can''t modify a column that has a function-based
    index applied to it. You''ll have to drop the index, modify the column, and then
    re-create the index.'
