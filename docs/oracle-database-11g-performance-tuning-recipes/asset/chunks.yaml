- fmt: "# How It Works\n\nOracle 尝试在内存（PGA）中执行排序和哈希操作，但如果排序操作太大无法放入内存，它会使用临时表空间来完成工作。重要的是要理解，即使是一个大型排序操作也有可能用尽整个临时表空间。由于所有数据库会话共享临时表空间，运行大型排序操作的会话可能导致其他会话因空间不足而收到错误。一旦临时表空间填满，所有试图使用临时表空间的\
    \ SQL 语句都将失败，并出现 `ORA-1652: unable to extend temp segment` 错误。新会话可能无法连接，查询有时会挂起，用户可能无法发出新查询。你试图查找任何阻塞锁，但并不存在。如果临时表空间被填满，事务将无法完成。如果你查看告警日志，会发现临时表空间空间已耗尽。\n\
    \n使用 `ORDER BY` 或 `GROUP BY` 子句的操作经常使用临时表空间来完成工作。你还必须记住，创建索引或重建索引也会使用临时表空间对索引进行排序。\n\
    \nOracle 使用 PGA 内存来执行排序和哈希操作。因此，你首先要做的是检查为 `PGA_AGGREGATE_TARGET` 初始化参数设置的当前值，并看看提高它是否有所帮助。然而，即使调大\
    \ `PGA_AGGREGATE_TARGET` 参数的设置，也不能保证 Oracle 会完全在内存中执行巨大的排序操作。Oracle 为每个会话分配一定量的\
    \ PGA 内存，其分配量由内部根据 `PGA_AGGREGATE_TARGET` 参数的值决定。一旦一个大型操作使用了其分配的 PGA 内存份额，Oracle\
    \ 就会将中间结果写入到磁盘上的临时表空间中。这类操作被称为 `one-pass` 或 `multi-pass` 操作，由于它们是在磁盘上执行的，因此比完全在\
    \ PGA 中执行的操作要慢得多。\n\n如果你的数据库临时表空间空间不足，你必须通过添加临时文件来增加其大小。为临时表空间启用 `autoextend`\
    \ 也有助于防止“空间不足”错误。由于 Oracle 会为执行排序操作的用户分配其指定的临时表空间中的空间，因此你可以为需要执行大量排序的用户分配一个不同于其他用户的临时表空间，从而防止大量排序活动损害数据库性能。\n\
    \n请注意，与每个对象有多个表或索引段不同，临时表空间只有一个称为排序段的段。所有会话共享此排序段。单个 SQL 语句可以使用多个排序和哈希操作。此外，同一个会话可以同时执行多个\
    \ SQL 语句，每个语句使用多个排序和哈希操作。一旦一个排序操作完成，数据库会立即将该操作使用的块标记为可用，并将它们分配给另一个排序操作。随着排序操作变大，数据库会向排序段添加区，但如果临时表空间中没有更多空闲空间来分配额外的区，它将发出\
    \ `ORA-1652:unable to extend temp segment` 错误。使用该排序操作的 SQL 语句将因此失败。\n\n![images](images/square.jpg)\
    \ **注意** 尽管当执行大型排序的 SQL 语句因临时表空间空间不足而失败时，你会收到 `ORA-1652` 错误，但这并非收到此错误的唯一原因。在执行表移动操作（`alter\
    \ table …move`）时，如果移动到的表空间没有空间容纳该表，你也会收到此错误。有时在创建大型索引时也是如此。有关此错误的解释，请参阅配方 7-6。\n\
    \n## 7-6. 解决“无法扩展临时段”错误\n\n### 问题\n\n在创建大型索引时，你收到一个 Oracle 错误，指出数据库无法扩展 `TEMP`\
    \ 段。然而，你的临时表空间中有大量可用空间。\n\n### 解决方案\n\n当你遇到如下错误时，你的第一反应可能是认为临时表空间中没有可用空间。\n\n\
    ```\nORA-01652: unable to extend temp segment by 1024 in tablespace INDX_01\n\
    ```\n\n你无法通过向临时表空间添加空间来解决此问题。错误信息明确指出了空间不足的表空间。在本例中，出问题的表空间是 `INDX_01`，而不是 `TEMP`\
    \ 表空间。显然，索引创建过程失败是因为 `INDX_01` 表空间空间不足。你可以通过向 `INDX_01` 表空间添加一个数据文件来修复问题，如下所示：\n\
    \n```\nSQL>alter tablespace INDX_01 add datafile '/u01/app/oracle/data/indx_01_02.dbf'\n\
    \  2 size 1000m;\n```"
  raw: '#### How It Works


    Oracle tries to perform sort and hash operations in memory (PGA), but if a sort
    operation is too large to fit into memory, it uses the temporary tablespace to
    do the work. It''s important to understand that even a single large sort operation
    has the potential to use up an entire temporary tablespace. Since all database
    sessions share the temporary tablespace, the session that runs the large sort
    operation could potentially result in other sessions receiving errors due to lack
    of room in that tablespace. Once the temporary tablespace fills up, all SQL statements
    that seek to use the temporary tablespace will fail with the `ORA-1652: unable
    to extend temp segment` error. New sessions may not be able to connect, and queries
    can sometimes hang and users may not be able to issue new queries. You try to
    find any blocking locks, but none exists. If the temporary tablespace fills up,
    transactions won''t complete. If you look in the alert log, you''ll find that
    the temporary tablespace ran out of space.


    Operations that use an `ORDER BY` or `GROUP BY` clause frequently use the temporary
    tablespace to do their work. You must also remember that creating an index or
    rebuilding one also makes use of the temporary tablespace for sorting the index.


    Oracle uses the PGA memory for performing the sort and hash operations. Thus,
    one of the first things you must do is to review the current value set for the
    `PGA_AGGREGATE_TARGET` initialization parameter and see if bumping it up will
    help. Nevertheless, even a larger setting for the `PGA_AGGREGATE_TARGET` parameter
    doesn''t guarantee that Oracle will perform a huge sort entirely in memory. Oracle
    allocates each session a certain amount of PGA memory, with the amount it allocates
    internally determined, based on the value of the `PGA_AGGREGATE_TARGET` parameter.
    Once a large operation uses its share of the PGA memory, Oracle will write intermediary
    results to disk in the temporary tablespace. These types of operations are called
    *one-pass* or *multi-pass* operations, and since they are performed on disk, they
    are much slower than an operation performed entirely in the PGA.


    If your database is running out of space in the temporary tablespace, you must
    increase its size by adding a tempfile. Enabling *autoextend* for a temporary
    tablespace will also help prevent “out of space” errors. Since Oracle allocates
    space in a temporary tablespace that you have assigned for the user performing
    the sort operation, you can assign users that need to perform heavy sorting a
    temporary tablespace that''s different from that used by the rest of the users,
    thus preventing the heavy sorting activity from hurting database performance.


    Note that unlike table or index segments, of which there are several for each
    object, a temporary tablespace has just one segment called the sort segment. All
    sessions share this sort segment. A single SQL statement can use multiple sort
    and hash operations. In addition, the same session can have multiple SQL statements
    executing simultaneously, with each statement using multiple sort and hash operations.
    Once a sort operation completes, the database immediately marks the blocks used
    by the operations as free and allocates them to another sort operation. The database
    adds extents to the sort segment as the sort operation gets larger, but if there''s
    no more free space in the temporary tablespace to allocate additional extents,
    it issues the `ORA-1652:unable to extend temp segment` error. The SQL statement
    that''s using the sort operation will fail as a result.


    ![images](images/square.jpg) **Note** Although you''ll receive an `ORA-1652` error
    when a SQL statement performing a huge sort fails due to lack of space in the
    temporary tablespace, that''s not the only reason you''ll get this error. You''ll
    also receive this error when performing a table move operation (`alter table …move`),
    if the tablespace to which you''re moving the table doesn''t have room to hold
    the table. Same is the case sometimes when you''re creating a large index. Please
    see Recipe 7-6 for an explanation of this error.


    ### 7-6. Resolving the “Unable to Extend Temp Segment” Error


    #### Problem


    While creating a large index, you receive an Oracle error indicating that the
    database is unable to extend a `TEMP` segment. However, you have plenty of free
    space in the temporary tablespace.


    #### Solution


    When you get an error such as the following, your first inclination may be to
    think that there''s no free space in the temporary tablespace.


    `ORA-01652: unable to extend temp segment by 1024 in tablespace INDX_01`


    You cannot fix this problem by adding space to the temporary tablespace. The error
    message clearly indicates the tablespace that ran out of space. In this case,
    the offending tablespace is `INDX_01`, and not the `TEMP` tablespace. Obviously,
    an index creation process failed because there was insufficient space in the `INDX_01`
    tablespace. You can fix the problem by adding a datafile to the `INDX_01` tablespace,
    as shown here:


    `SQL>alter tablespace INDX_01 add datafile ''/u01/app/oracle/data/indx_01_02.dbf''`

    `  2 size 1000m;`'
