    \ DML 操作将导致数据以压缩方式存储。\n\n如果您想对现有表中的数据启用 OLTP 压缩，请使用 `MOVE COMPRESS FOR OLTP` 子句：\n\
    \n```\nSQL> alter table regs move compress for oltp;\n```\n\n请记住，当您移动表时，所有关联的索引都会失效。您必须重新构建与移动表相关的任何索引。\n\
    \n如果您已为表启用了 OLTP 压缩，可以通过 `NOCOMPRESS` 子句禁用它，例如：\n\n```\nSQL> alter table regs\
    \ nocompress;\n```\n\n当您更改表以禁用 OLTP 压缩时，这不会解压缩表中的现有数据。相反，此操作指示 Oracle 不要压缩后续 DML\
    \ 操作的数据。\n\n#### 工作原理\n\nOLTP 压缩需要 Oracle 企业版和高级压缩选项（需额外付费许可）。`COMPRESS FOR OLTP`\
    \ 子句为所有 DML 操作启用压缩。OLTP 压缩不会在数据插入或更新到表中时立即压缩数据。相反，当块内的更改程度达到某个阈值时，压缩会以批处理模式发生。当达到阈值时，所有未压缩的行会同时被压缩。发生压缩的阈值由内部算法决定（您无法控制）。\n\
    \n您还可以在表空间级别指定 OLTP 压缩。在启用 OLTP 压缩的表空间中创建的任何表默认都将继承此压缩设置。以下是一个指定 OLTP 压缩的表空间创建脚本示例：\n\
    \n```\nCREATE TABLESPACE comp_data\n  DATAFILE '/ora01/dbfile/O11R2/comp_data01.dbf'\n\
    \  SIZE 10M\n  EXTENT MANAGEMENT LOCAL\n  UNIFORM SIZE 1M\n  SEGMENT SPACE MANAGEMENT\
    \ AUTO\n  DEFAULT COMPRESS FOR OLTP;\n```\n\n您也可以更改现有表空间以设置默认压缩级别：\n\n```\nSQL>\
    \ alter tablespace comp_data default compress for oltp;\n```\n\n您可以通过此查询验证默认压缩特性：\n\
    \n```\nselect tablespace_name, def_tab_compression, compress_for\nfrom dba_tablespaces\n\
    where tablespace_name = 'COMP_DATA';\n```\n\n以下是一些示例输出：\n\n```\nTABLESPACE_NAME\
    \                DEF_TAB_ COMPRESS_FOR\n------------------------------ --------\
    \ ------------\nCOMP_DATA                      ENABLED  OLTP\n```\n\n### 1-15.\
    \ 在列级别压缩数据\n\n#### 问题\n\n您正在使用 Oracle Exadata 产品，并希望高效地压缩数据。您已确定压缩数据将带来更高效的 I/O\
    \ 操作，尤其是在从磁盘读取数据时。思路是压缩数据将导致 `SELECT` 语句读取的块少得多。\n\n#### 解决方案\n\n要在创建表时启用混合列压缩，请使用\
    \ `COMPRESS FOR QUERY` 或 `COMPRESS FOR ARCHIVE` 子句，例如：\n\n```\ncreate table f_regs(\n\
    \ reg_id number\n,reg_desc varchar2(4000))\ncompress for query;\n```\n\n您还可以指定压缩级别为\
    \ `LOW` 或 `HIGH`：\n\n```\ncreate table f_regs(\n reg_id number\n,reg_desc varchar2(4000))\n\
    compress for query high;\n```\n\n`QUERY` 的默认压缩级别为 `HIGH`，`ARCHIVE` 的默认压缩级别为 `LOW`。您可以通过此查询验证启用的压缩级别：\n\
    \n```\nselect table_name, compression, compress_for\nfrom user_tables\nwhere table_name='F_REGS';\n\
    ```\n\n以下是一些示例输出：\n\n```\nTABLE_NAME                     COMPRESS COMPRESS_FOR\n\
    ------------------------------ -------- ------------\nF_REGS                 \
    \        ENABLED  QUERY HIGH\n```\n\n如果您尝试在 Exadata 以外的任何环境中使用混合列压缩，您将收到以下错误：\n\
    \n```\nERROR at line 1:\nORA-64307: hybrid columnar compression is only supported\
    \ in tablespaces\nresiding on Exadata storage\n```\n\n#### 工作原理\n\nExadata 是 Oracle\
    \ 的高性能数据库一体机。它旨在为数据仓库和 OLTP 数据库提供高性能。Exadata 存储支持混合列压缩，并从 Oracle Database 11g\
    \ R2 开始可用。\n\n混合列压缩逐列压缩数据。列级压缩比 Oracle 基本压缩（参见配方 1-13）或 OLTP 压缩（参见配方 1-14）具有更高的压缩比。混合列压缩有四个级别。这些级别从最低压缩级别到最高级别列出如下：\n\
    \n- `COMPRESS FOR QUERY LOW`\n- `COMPRESS FOR QUERY HIGH`\n- `COMPRESS FOR ARCHIVE\
    \ LOW`\n- `COMPRESS FOR ARCHIVE HIGH`\n\n`COMPRESS FOR QUERY` 适用于对不经常更新的堆组织表进行批量加载操作。此类压缩针对查询性能进行了优化，因此更适用于\
    \ DSS 和数据仓库数据库，而 `COMPRESS FOR ARCHIVE` 最大化压缩程度，更适用于长期存储且不会被更新的数据。\n\n![images](img/square.jpg)\
    \ **注意** 有关混合列压缩的更多信息，请参阅 Oracle Exadata 存储服务器软件文档。\n\n### 1-16. 监控表使用情况\n\n####\
    \ 问题\n\n您最近接手了一个包含数百个表的数据库。应用程序正在经历性能问题。作为整体调整策略的一部分，您希望通过确定哪些表正在被哪些类型的 SQL 语句使用，来更好地了解应用程序。未使用的表可以被重命名并随后删除。通过移除未使用的表，您可以释放空间，减少杂乱，并将性能分析集中在活动使用的表上。\n"
- fmt: "# Solution\n\nUse Oracle's standard auditing feature to determine which tables\
    \ are being used. Auditing is enabled as follows:\n\n1.  Set the `AUDIT_TRAIL`\
    \ parameter.\n2.  Stop and start your database to enable the setting of `AUDIT_TRAIL`.\n\
    3.  Use the `AUDIT` statement to enable auditing of specific database operations.\n\
    \nOracle's standard auditing feature is enabled through setting the `AUDIT_TRAIL`\
    \ initialization parameter. When you set the `AUDIT_TRAIL` parameter to `DB`,\
    \ this specifies that Oracle will write audit records to an internal database\
    \ table named `AUD$`. For example, when using an `spfile`, here's how to set the\
    \ `AUDIT_TRAIL` parameter:\n\n```\nSQL> alter system set audit_trail=db scope=spfile;\n\
    ```\n\nIf you are using an `init.ora` file, open it with a text editor and set\
    \ the `AUDIT_TRAIL` value to `DB`. After you've set the `AUDIT_TRAIL` parameter,\
    \ you'll need to stop and restart your database for it to take effect.\n\n![images](images/square.jpg)\
    \ Tip: When first setting up a database, we recommend that you set the `AUDIT_TRAIL`\
    \ parameter to `DB`. This way, when you want to enable auditing for a specific\
    \ action, you can do so without having to stop and restart (bounce) the database.\n\
    \nNow you can enable auditing for a specific database operation. For example,\
    \ the following statement enables auditing on all DML statements on the `EMP`\
    \ table owned by `INV_MGMT`:\n\n```\nSQL> audit select, insert, update, delete\
    \ on inv_mgmt.emp;\n```\n\nFrom this point on, any DML access to the `EMP` table\
    \ will be recorded in the `SYS.AUD$` table. Oracle provides several auditing views\
    \ based on the `AUD$` table, such as `DBA_AUDIT_TRAIL` or `DBA_AUDIT_OBJECT`.\
    \ You can query these views to report on auditing actions—for example:\n\n```\n\
    select\n  username\n ,obj_name\n ,to_char(timestamp,'dd-mon-yy hh24:mi') event_time\n\
    \ ,substr(ses_actions,4,1)  del\n ,substr(ses_actions,7,1)  ins\n ,substr(ses_actions,10,1)\
    \ sel\n ,substr(ses_actions,11,1) upd\nfrom dba_audit_object;\n```\n\nHere is\
    \ some sample output:\n\n```\nUSERNAME                       OBJ_NAME   EVENT_TIME\
    \            DEL INS SEL UPD\n------------------------------ ---------- ---------------------\
    \ --- --- --- ---\nINV_MGMT                       EMP        05-feb-11 15:08 \
    \      -   S   -   S\nINV_MGMT                       EMP        05-feb-11 15:10\
    \       -   -   S   -\nINV_MGMT                       EMP        05-feb-11 15:10\
    \       S   -   -   -\n```\n\nIn the prior SQL statement, notice the use of the\
    \ `SUBSTR()` function to reference the `SES_ACTIONS` column of the `DBA_AUDIT_OBJECT`\
    \ view. That column contains a 16-character string in which each character means\
    \ that a certain operation has occurred. The 16 characters represent the following\
    \ operations in this order: `ALTER`, `AUDIT`, `COMMENT`, `DELETE`, `GRANT`, `INDEX`,\
    \ `INSERT`, `LOCK`, `RENAME`, `SELECT`, `UPDATE`, `REFERENCES`, and `EXECUTE`.\
    \ Positions 14, 15, and 16 are reserved by Oracle for future use. The character\
    \ of `S` represents success, `F` represents failure, and `B` represents both success\
    \ and failure.\n\nTo turn off auditing on an object, use the `NOAUDIT` statement:\n\
    \n```\nSQL> noaudit select, insert, update, delete on inv_mgmt.emp;\n```\n\n![images](images/square.jpg)\
    \ Tip: If you need to view the `SQL_TEXT` or `SQL_BIND` columns of the `AUD$`\
    \ table, then set the `AUDIT_TRAIL` initialization parameter to `DB_EXTENDED`.\n\
    \n## How It Works\n\nSometimes it's handy when troubleshooting disk space or performance\
    \ issues to know which tables in the database are actually being used by the application.\
    \ If you've inherited a database that contains a large number of tables, it may\
    \ not be obvious which objects are being accessed. Enabling auditing allows you\
    \ to identify which types of SQL statements are accessing a table of interest.\n\
    \nOnce you have identified tables that are not being used, you can simply rename\
    \ the tables and see if this breaks the application or if any users complain.\
    \ If there are no complaints, then after some time you can consider dropping the\
    \ tables. Make sure you take a good backup of your database with both RMAN and\
    \ Data Pump before you drop any tables you might have to later recover.\n\nIf\
    \ you simply need to know whether a table is being inserted, updated, or deleted\
    \ from, you can use the `DBA/ALL/USER_TAB_MODIFICATIONS` view to report on that\
    \ type of activity. This view has columns, such as `INSERTS`, `UPDATES`, `DELETES`,\
    \ and `TRUNCATED`, that will provide information as to how data in the table is\
    \ being modified—for example:\n\n```\nselect table_name, inserts, updates, deletes,\
    \ truncated\nfrom user_tab_modifications;\n```\n\nIn normal conditions, this view\
    \ is not instantly updated by Oracle. If you need to immediately view table modifications,\
    \ then use the `DBMS_STATS.FLUSH_DATABASE_MONITORING_INFO()` procedure to update\
    \ the view:\n\n```\nSQL> exec DBMS_STATS.FLUSH_DATABASE_MONITORING_INFO();\n```\n\
    \n## C H A P T E R  2"
  raw: '#### Solution


    Use Oracle''s standard auditing feature to determine which tables are being used.
    Auditing is enabled as follows:


    1.  Set the `AUDIT_TRAIL` parameter.

    2.  Stop and start your database to enable the setting of `AUDIT_TRAIL`.

    3.  Use the `AUDIT` statement to enable auditing of specific database operations.


    Oracle''s standard auditing feature is enabled through setting the `AUDIT_TRAIL`
    initialization parameter. When you set the `AUDIT_TRAIL` parameter to `DB`, this
    specifies that Oracle will write audit records to an internal database table named
    `AUD$`. For example, when using an `spfile`, here''s how to set the `AUDIT_TRAIL`
    parameter:


    `SQL> alter system set audit_trail=db scope=spfile;`


    If you are using an `init.ora` file, open it with a text editor and set the `AUDIT_TRAIL`
    value to `DB`. After you''ve set the `AUDIT_TRAIL` parameter, you''ll need to
    stop and restart your database for it to take effect.


    ![images](images/square.jpg) **Tip** When first setting up a database, we recommend
    that you set the `AUDIT_TRAIL` parameter to `DB`. This way, when you want to enable
    auditing for a specific action, you can do so without having to stop and restart
    (bounce) the database.


    Now you can enable auditing for a specific database operation. For example, the
    following statement enables auditing on all DML statements on the `EMP` table
    owned by `INV_MGMT`:


    `SQL> audit select, insert, update, delete on inv_mgmt.emp;`


    From this point on, any DML access to the `EMP` table will be recorded in the
    `SYS.AUD$` table. Oracle provides several auditing views based on the `AUD$` table,
    such as `DBA_AUDIT_TRAIL` or `DBA_AUDIT_OBJECT`. You can query these views to
    report on auditing actions—for example:


    `select`

    `  username`

    ` ,obj_name`

    ` ,to_char(timestamp,''dd-mon-yy hh24:mi'') event_time`

    ` ,substr(ses_actions,4,1)  del`

    ` ,substr(ses_actions,7,1)  ins`

    ` ,substr(ses_actions,10,1) sel`

    ` ,substr(ses_actions,11,1) upd`

    `from dba_audit_object;`


    Here is some sample output:


    `USERNAME                       OBJ_NAME   EVENT_TIME            DEL INS SEL UPD`

    `------------------------------ ---------- --------------------- --- --- --- ---`

    `INV_MGMT                       EMP        05-feb-11 15:08       -   S   -   S`

    `INV_MGMT                       EMP        05-feb-11 15:10       -   -   S   -`

    `INV_MGMT                       EMP        05-feb-11 15:10       S   -   -   -`


    In the prior SQL statement, notice the use of the `SUBSTR` function to reference
    the `SES_ACTIONS` column of the `DBA_AUDIT_OBJECT` view. That column contains
    a 16-character string in which each character means that a certain operation has
    occurred. The 16 characters represent the following operations in this order:
    `ALTER`, `AUDIT`, `COMMENT`, `DELETE`, `GRANT`, `INDEX`, `INSERT`, `LOCK`, `RENAME`,
    `SELECT`, `UPDATE`, `REFERENCES`, and `EXECUTE`. Positions 14, 15, and 16 are
    reserved by Oracle for future use. The character of `S` represents success, `F`
    represents failure, and `B` represents both success and failure.


    To turn off auditing on an object, use the `NOAUDIT` statement:


    `SQL> noaudit select, insert, update, delete on inv_mgmt.emp;`


    ![images](images/square.jpg) **Tip** If you need to view the `SQL_TEXT` or `SQL_BIND`
    columns of the `AUD$` table, then set the `AUDIT_TRAIL` initialization parameter
    to `DB_EXTENDED`.


    #### How It Works


    Sometimes it''s handy when troubleshooting disk space or performance issues to
    know which tables in the database are actually being used by the application.
    If you''ve inherited a database that contains a large number of tables, it may
    not be obvious which objects are being accessed. Enabling auditing allows you
    to identify which types of SQL statements are accessing a table of interest.


    Once you have identified tables that are not being used, you can simply rename
    the tables and see if this breaks the application or if any users complain. If
    there are no complaints, then after some time you can consider dropping the tables.
    Make sure you take a good backup of your database with both RMAN and Data Pump
    before you drop any tables you might have to later recover.


    If you simply need to know whether a table is being inserted, updated, or deleted
    from, you can use the `DBA/ALL/USER_TAB_MODIFICATIONS` view to report on that
    type of activity. This view has columns, such as `INSERTS`, `UPDATES`, `DELETES`,
    and `TRUNCATED`, that will provide information as to how data in the table is
    being modified—for example:


    `select table_name, inserts, updates, deletes, truncated`

    `from user_tab_modifications;`


    In normal conditions, this view is not instantly updated by Oracle. If you need
    to immediately view table modifications, then use the `DBMS_STATS.FLUSH_DATABASE_MONITORING_INFO`
    procedure to update the view:


    `SQL> exec DBMS_STATS.FLUSH_DATABASE_MONITORING_INFO();`


    ## C H A P T E R  2'
  trans: "\n# 解决方案\n\n使用 Oracle 的标准审计功能来确定哪些表正在被使用。审计的启用步骤如下：\n\n1.  设置 `AUDIT_TRAIL`\
    \ 参数。\n2.  停止并启动数据库以使 `AUDIT_TRAIL` 设置生效。\n3.  使用 `AUDIT` 语句启用对特定数据库操作的审计。\n\n\
    Oracle 的标准审计功能通过设置 `AUDIT_TRAIL` 初始化参数来启用。当你将 `AUDIT_TRAIL` 参数设置为 `DB` 时，这指定了\
    \ Oracle 将审计记录写入名为 `AUD$` 的内部数据库表。例如，当使用 `spfile` 时，设置 `AUDIT_TRAIL` 参数的方法如下：\n\
    \n```\nSQL> alter system set audit_trail=db scope=spfile;\n```\n\n如果你使用的是 `init.ora`\
    \ 文件，请用文本编辑器打开它，并将 `AUDIT_TRAIL` 值设置为 `DB`。设置 `AUDIT_TRAIL` 参数后，你需要停止并重启数据库才能使其生效。\n\
    \n![images](img/square.jpg) 提示：首次设置数据库时，我们建议你将 `AUDIT_TRAIL` 参数设置为 `DB`。这样，当你想要为特定操作启用审计时，无需停止并重启（弹出）数据库。\n\
    \n现在，你可以为特定的数据库操作启用审计。例如，以下语句对 `INV_MGMT` 用户拥有的 `EMP` 表上的所有 DML 语句启用审计：\n\n```\n\
    SQL> audit select, insert, update, delete on inv_mgmt.emp;\n```\n\n从此时起，对 `EMP`\
    \ 表的任何 DML 访问都将记录在 `SYS.AUD$` 表中。Oracle 基于 `AUD$` 表提供了若干审计视图，例如 `DBA_AUDIT_TRAIL`\
    \ 或 `DBA_AUDIT_OBJECT`。你可以查询这些视图来报告审计活动——例如：\n\n```\nselect\n  username\n ,obj_name\n\
    \ ,to_char(timestamp,'dd-mon-yy hh24:mi') event_time\n ,substr(ses_actions,4,1)\
    \  del\n ,substr(ses_actions,7,1)  ins\n ,substr(ses_actions,10,1) sel\n ,substr(ses_actions,11,1)\
    \ upd\nfrom dba_audit_object;\n```\n\n以下是一些示例输出：\n\n```\nUSERNAME            \
    \           OBJ_NAME   EVENT_TIME            DEL INS SEL UPD\n------------------------------\
    \ ---------- --------------------- --- --- --- ---\nINV_MGMT                 \
    \      EMP        05-feb-11 15:08       -   S   -   S\nINV_MGMT              \
    \         EMP        05-feb-11 15:10       -   -   S   -\nINV_MGMT           \
    \            EMP        05-feb-11 15:10       S   -   -   -\n```\n\n在前面的 SQL 语句中，请注意使用了\
    \ `SUBSTR()` 函数来引用 `DBA_AUDIT_OBJECT` 视图的 `SES_ACTIONS` 列。该列包含一个 16 字符的字符串，其中每个字符表示已发生某种操作。这\
    \ 16 个字符按以下顺序代表以下操作：`ALTER`, `AUDIT`, `COMMENT`, `DELETE`, `GRANT`, `INDEX`, `INSERT`,\
    \ `LOCK`, `RENAME`, `SELECT`, `UPDATE`, `REFERENCES`, 和 `EXECUTE`。位置 14、15 和 16\
    \ 由 Oracle 保留供将来使用。字符 `S` 代表成功，`F` 代表失败，`B` 代表成功和失败都有。\n\n要关闭对某个对象的审计，请使用 `NOAUDIT`\
    \ 语句：\n\n```\nSQL> noaudit select, insert, update, delete on inv_mgmt.emp;\n```\n\
    \n![images](img/square.jpg) 提示：如果你需要查看 `AUD$` 表的 `SQL_TEXT` 或 `SQL_BIND` 列，那么请将\
    \ `AUDIT_TRAIL` 初始化参数设置为 `DB_EXTENDED`。\n\n## 工作原理\n\n在排查磁盘空间或性能问题时，了解数据库中哪些表正被应用程序实际使用，有时会很有帮助。如果你继承了一个包含大量表的数据库，可能并不明显哪些对象正在被访问。启用审计可以让你识别哪些类型的\
    \ SQL 语句正在访问你感兴趣的表。\n\n一旦你识别出未被使用的表，你可以简单地重命名这些表，观察这是否会破坏应用程序或是否有用户投诉。如果没有投诉，那么过一段时间后，你可以考虑删除这些表。在删除任何你以后可能需要恢复的表之前，请确保使用\
    \ RMAN 和 Data Pump 对数据库进行了良好备份。\n\n如果你只是需要知道一个表是否正在被插入、更新或删除，你可以使用 `DBA/ALL/USER_TAB_MODIFICATIONS`\
    \ 视图来报告此类活动。该视图具有诸如 `INSERTS`、`UPDATES`、`DELETES` 和 `TRUNCATED` 等列，这些列将提供有关表中数据如何被修改的信息——例如：\n\
    \n```\nselect table_name, inserts, updates, deletes, truncated\nfrom user_tab_modifications;\n\
    ```\n\n在正常情况下，Oracle 不会即时更新此视图。如果你需要立即查看表的修改情况，那么可以使用 `DBMS_STATS.FLUSH_DATABASE_MONITORING_INFO()`\
    \ 过程来更新该视图：\n\n```\nSQL> exec DBMS_STATS.FLUSH_DATABASE_MONITORING_INFO();\n```\n\
    \n## 第 2 章\n"
- fmt: "## Choosing and Optimizing Indexes\n\nAn index is a database object used primarily\
    \ to improve the performance of SQL queries. The function of a database index\
    \ is similar to an index in the back of a book. A book index associates a topic\
    \ with a page number. When you're locating information in a book, it's usually\
    \ much faster to inspect the index first, find the topic of interest, and identify\
    \ associated page numbers. With this information, you can navigate directly to\
    \ specific page numbers in the book. In this situation, the number of pages you\
    \ need to inspect is minimal.\n\nIf there were no index, you would have to inspect\
    \ every page of the book to find information. This results in a great deal of\
    \ page turning, especially with large books. This is similar to an Oracle query\
    \ that does not use an index and therefore has to scan every used block within\
    \ a table. For large tables, this results in a great deal of I/O.\n\nThe book\
    \ index's usefulness is directly correlated with the uniqueness of a topic within\
    \ the book. For example, take this book; it would do no good to create an index\
    \ on the topic of \"performance\" because every page in this book deals with performance.\
    \ However, creating an index on the topic of \"bitmap indexes\" would be effective\
    \ because there are only a few pages within the book that are applicable to this\
    \ feature.\n\nKeep in mind that the index isn't free. It consumes space in the\
    \ back of the book, and if the material in the book is ever updated (like a second\
    \ edition), every modification (insert, update, delete) potentially requires a\
    \ corresponding change to the index. It's important to keep in mind that indexes\
    \ consume space and require resources when updates occur.\n\nAlso, the person\
    \ who creates the index for the book must consider which topics will be frequently\
    \ looked up. Topics that are selective and frequently accessed should be included\
    \ in the book index. If an index in the back of the book is never looked up by\
    \ a reader, then it unnecessarily wastes space.\n\nMuch like the process of creating\
    \ an index in the back of the book, there are many factors that must be considered\
    \ when creating an Oracle index. Oracle provides a wide assortment of indexing\
    \ features and options. These objects are manually created by the DBA or a developer.\
    \ Therefore, you need to be aware of the various features and how to utilize them.\
    \ If you choose the wrong type of index or use a feature incorrectly, there may\
    \ be detrimental performance implications. Listed next are aspects to consider\
    \ before you create an index:\n\n*   Type of index\n*   Table column(s) to include\n\
    *   Whether to use a single column or a combination of columns\n*   Special features\
    \ such as parallelism, turning off logging, compression, invisible indexes, and\
    \ so on\n*   Uniqueness\n*   Naming conventions\n*   Tablespace placement\n* \
    \  Initial sizing requirements and growth\n*   Impact on performance of `SELECT`\
    \ statements (improvement)\n*   Impact on performance of `INSERT`, `UPDATE`, and\
    \ `DELETE` statements\n*   Global or local index, if the underlying table is partitioned\n\
    \nWhen you create an index, you should give some thought to every aspect mentioned\
    \ in the previous list. One of the first decisions you need to make is the type\
    \ of index and the columns to include. Oracle provides a robust variety of index\
    \ types. For most scenarios, you can use the default B-tree (balanced tree) index.\
    \ Other commonly used types are concatenated, bitmap, and function-based indexes.\
    \ [Table 2-1](#Chapter02.html#tab_2_1) describes the types of indexes available\
    \ with Oracle.\n\n![images](images/t0201.jpg)\n\n![images](images/t0201a.jpg)\n\
    \nThis chapter focuses on the most commonly used indexes and features. Hash cluster\
    \ indexes, partitioned indexes, and domain indexes are not covered in this book.\
    \ If you need more information regarding index types or features not covered in\
    \ this chapter or book, see Oracle's SQL Reference Guide at `http://otn.oracle.com`.\n\
    \nThe first recipe in this chapter deals with the mechanics of B-tree indexes.\
    \ It's critical that you understand how this database object works. Even if you've\
    \ been around Oracle for a while, we feel it's useful to work through the various\
    \ scenarios outlined in this first recipe to ensure that you know how the optimizer\
    \ uses this type of index. This will lay the foundation for solving many different\
    \ types of performance problems (especially SQL tuning).\n\n### 2-1. Understanding\
    \ B-tree Indexes\n\n#### Problem\n\nYou want to create an index. You understand\
    \ that the default type of index in Oracle is the B-tree, but you don't quite\
    \ understand how an index is physically implemented. You want to fully comprehend\
    \ the B-tree index internals so as to make intelligent performance decisions when\
    \ building database applications.\n\n#### Solution\n\nAn example with a good diagram\
    \ will help illustrate the mechanics of a B-tree index. Even if you've been working\
    \ with B-tree indexes for quite some time, a good example may illuminate technical\
    \ aspects of using an index. To get started, suppose you have a table created\
    \ as follows:\n\n```\ncreate table cust(\n cust_id number\n,last_name varchar2(30)\n\
    ,first_name varchar2(30));\n```\n\nYou determine that several SQL queries will\
    \ frequently use `LAST_NAME` in the `WHERE` clause. This prompts you to create\
    \ an index:\n\n```\nSQL> create index cust_idx1 on cust(last_name);\n```\n\nSeveral\
    \ hundred rows are now inserted into the table (not all of the rows are shown\
    \ here):\n\n```\ninsert into cust values(7, 'ACER','SCOTT');\ninsert into cust\
    \ values(5, 'STARK','JIM');\ninsert into cust values(3, 'GREY','BOB');\ninsert\
    \ into cust values(11,'KHAN','BRAD');\n.....\ninsert into cust values(274, 'ACER','SID');\n\
    ```\n\nAfter the rows are inserted, we ensure that the table statistics are up\
    \ to date so as to provide the query optimizer sufficient information to make\
    \ good choices on how to retrieve the data:\n\n```\nSQL> exec dbms_stats.gather_table_stats(ownname=>'MV_MAINT',\
    \ -\n           tabname=>'CUST',cascade=>true);\n```\n\nAs rows are inserted into\
    \ the table, Oracle will allocate extents that consist of physical database blocks.\
    \ Oracle will also allocate blocks for the index. For each record inserted into\
    \ the table, Oracle will also create an entry in the index that consists of the\
    \ `ROWID` and column value (the value in `LAST_NAME` in this example). The `ROWID`\
    \ for each index entry points to the datafile and block that the table column\
    \ value is stored in. [Figure 2-1](#Chapter02.html#fig_2_1) shows a graphical\
    \ representation of how data is stored in the table and the corresponding B-tree\
    \ index. For this example, datafiles 10 and 15 contain table data stored in associated\
    \ blocks and datafile 22 stores the index blocks.\n\n![images](images/0201.jpg)\n\
    \n**Figure 2-1.** Physical layout of a table and B-tree index\n\nThere are two\
    \ dotted lines in [Figure 2-1](#Chapter02.html#fig_2_1). These lines depict how\
    \ the `ROWID` (in the index structure) points to the physical location in the\
    \ table for the column values of `ACER`. These particular values will be used\
    \ in the scenarios in this solution.\n\nWhen selecting data from a table and its\
    \ corresponding index, there are three basic scenarios:\n\n*   All table data\
    \ required by the SQL query is contained in the index structure. Therefore only\
    \ the index blocks need to be accessed. The blocks from the table are never read.\n\
    *   All of the information required by the query is not contained in the index\
    \ blocks. Therefore the query optimizer chooses to access both the index blocks\
    \ and the table blocks to retrieve the data needed to satisfy the results of the\
    \ query.\n*   The query optimizer chooses not to access the index. Therefore only\
    \ the table blocks are accessed.\n\nThe prior situations are covered in the next\
    \ three subsections."
  raw: '## Choosing and Optimizing Indexes


    An index is a database object used primarily to improve the performance of SQL
    queries. The function of a database index is similar to an index in the back of
    a book. A book index associates a topic with a page number. When you''re locating
    information in a book, it''s usually much faster to inspect the index first, find
    the topic of interest, and identify associated page numbers. With this information,
    you can navigate directly to specific page numbers in the book. In this situation,
    the number of pages you need to inspect is minimal.


    If there were no index, you would have to inspect every page of the book to find
    information. This results in a great deal of page turning, especially with large
    books. This is similar to an Oracle query that does not use an index and therefore
    has to scan every used block within a table. For large tables, this results in
    a great deal of I/O.


    The book index''s usefulness is directly correlated with the uniqueness of a topic
    within the book. For example, take this book; it would do no good to create an
    index on the topic of “performance” because every page in this book deals with
    performance. However, creating an index on the topic of “bitmap indexes” would
    be effective because there are only a few pages within the book that are applicable
    to this feature.


    Keep in mind that the index isn''t free. It consumes space in the back of the
    book, and if the material in the book is ever updated (like a second edition),
    every modification (insert, update, delete) potentially requires a corresponding
    change to the index. It''s important to keep in mind that indexes consume space
    and require resources when updates occur.


    Also, the person who creates the index for the book must consider which topics
    will be frequently looked up. Topics that are selective and frequently accessed
    should be included in the book index. If an index in the back of the book is never
    looked up by a reader, then it unnecessarily wastes space.


    Much like the process of creating an index in the back of the book, there are
    many factors that must be considered when creating an Oracle index. Oracle provides
    a wide assortment of indexing features and options. These objects are manually
    created by the DBA or a developer. Therefore, you need to be aware of the various
    features and how to utilize them. If you choose the wrong type of index or use
    a feature incorrectly, there may be detrimental performance implications. Listed
    next are aspects to consider before you create an index:


    *   Type of index

    *   Table column(s) to include

    *   Whether to use a single column or a combination of columns

    *   Special features such as parallelism, turning off logging, compression, invisible
    indexes, and so on

    *   Uniqueness

    *   Naming conventions

    *   Tablespace placement

    *   Initial sizing requirements and growth

    *   Impact on performance of `SELECT` statements (improvement)

    *   Impact on performance of `INSERT`, `UPDATE`, and `DELETE` statements

    *   Global or local index, if the underlying table is partitioned


    When you create an index, you should give some thought to every aspect mentioned
    in the previous list. One of the first decisions you need to make is the type
    of index and the columns to include. Oracle provides a robust variety of index
    types. For most scenarios, you can use the default B-tree (balanced tree) index.
    Other commonly used types are concatenated, bitmap, and function-based indexes.
    [Table 2-1](#Chapter02.html#tab_2_1) describes the types of indexes available
    with Oracle.


    ![images](images/t0201.jpg)


    ![images](images/t0201a.jpg)


    This chapter focuses on the most commonly used indexes and features. Hash cluster
    indexes, partitioned indexes, and domain indexes are not covered in this book.
    If you need more information regarding index types or features not covered in
    this chapter or book, see Oracle''s SQL Reference Guide at [`http://otn.oracle.com`](http://otn.oracle.com).


    The first recipe in this chapter deals with the mechanics of B-tree indexes. It''s
    critical that you understand how this database object works. Even if you''ve been
    around Oracle for a while, we feel it''s useful to work through the various scenarios
    outlined in this first recipe to ensure that you know how the optimizer uses this
    type of index. This will lay the foundation for solving many different types of
    performance problems (especially SQL tuning).


    ### 2-1. Understanding B-tree Indexes


    #### Problem


    You want to create an index. You understand that the default type of index in
    Oracle is the B-tree, but you don''t quite understand how an index is physically
    implemented. You want to fully comprehend the B-tree index internals so as to
    make intelligent performance decisions when building database applications.


    #### Solution


    An example with a good diagram will help illustrate the mechanics of a B-tree
    index. Even if you''ve been working with B-tree indexes for quite some time, a
    good example may illuminate technical aspects of using an index. To get started,
    suppose you have a table created as follows:


    `create table cust(`

    ` cust_id number`

    `,last_name varchar2(30)`

    `,first_name varchar2(30));`


    You determine that several SQL queries will frequently use `LAST_NAME` in the
    `WHERE` clause. This prompts you to create an index:


    `SQL> create index cust_idx1 on cust(last_name);`


    Several hundred rows are now inserted into the table (not all of the rows are
    shown here):


    `insert into cust values(7, ''ACER'',''SCOTT'');`

    `insert into cust values(5, ''STARK'',''JIM'');`

    `insert into cust values(3, ''GREY'',''BOB'');`

    `insert into cust values(11,''KHAN'',''BRAD'');`

    `.....`

    `insert into cust values(274, ''ACER'',''SID'');`


    After the rows are inserted, we ensure that the table statistics are up to date
    so as to provide the query optimizer sufficient information to make good choices
    on how to retrieve the data:


    `SQL> exec dbms_stats.gather_table_stats(ownname=>''MV_MAINT'', -`

    `           tabname=>''CUST'',cascade=>true);`


    As rows are inserted into the table, Oracle will allocate extents that consist
    of physical database blocks. Oracle will also allocate blocks for the index. For
    each record inserted into the table, Oracle will also create an entry in the index
    that consists of the `ROWID` and column value (the value in `LAST_NAME` in this
    example). The `ROWID` for each index entry points to the datafile and block that
    the table column value is stored in. [Figure 2-1](#Chapter02.html#fig_2_1) shows
    a graphical representation of how data is stored in the table and the corresponding
    B-tree index. For this example, datafiles 10 and 15 contain table data stored
    in associated blocks and datafile 22 stores the index blocks.


    ![images](images/0201.jpg)


    ***Figure 2-1.** Physical layout of a table and B-tree index*


    There are two dotted lines in [Figure 2-1](#Chapter02.html#fig_2_1). These lines
    depict how the `ROWID` (in the index structure) points to the physical location
    in the table for the column values of `ACER`. These particular values will be
    used in the scenarios in this solution.


    When selecting data from a table and its corresponding index, there are three
    basic scenarios:


    *   All table data required by the SQL query is contained in the index structure.
    Therefore only the index blocks need to be accessed. The blocks from the table
    are never read.

    *   All of the information required by the query is not contained in the index
    blocks. Therefore the query optimizer chooses to access both the index blocks
    and the table blocks to retrieve the data needed to satisfy the results of the
    query.

    *   The query optimizer chooses not to access the index. Therefore only the table
    blocks are accessed.


    The prior situations are covered in the next three subsections.'
  trans: "\n## 选择与优化索引\n\n索引是一种数据库对象，主要用于提升 SQL 查询的性能。数据库索引的功能类似于书籍末尾的索引。书籍索引将主题与页码关联起来。当你在书中查找信息时，通常先查阅索引、找到感兴趣的主题并确定相关页码，这样会快得多。有了这些信息，你可以直接翻到书中特定的页码。在这种情况下，你需要翻阅的页数是最少的。\n\
    \n如果没有索引，你就必须翻阅书中的每一页来查找信息。这会导致大量的翻页工作，尤其是对于大部头的书。这类似于一个未使用索引的 Oracle 查询，因此必须扫描表中每个已使用的数据块。对于大表而言，这会导致大量的\
    \ I/O 操作。\n\n书籍索引的用处直接与主题在书中的唯一性相关。例如，以本书为例，为“性能”这个主题创建索引毫无用处，因为本书的每一页都在讨论性能。然而，为“位图索引”这个主题创建索引则是有效的，因为书中只有少数几页涉及此特性。\n\
    \n请记住，索引并非免费。它会占用书籍末尾的空间，而且如果书中的内容更新（如第二版），每一次修改（插入、更新、删除）都可能需要对索引进行相应的更改。重要的是要记住，索引会消耗空间，并且在发生更新时需要资源。\n\
    \n此外，为书籍创建索引的人必须考虑哪些主题会被频繁查阅。具有高选择性且被频繁访问的主题应被纳入书籍索引中。如果一本书末尾的索引从未被读者查阅过，那么它就浪费了空间。\n\
    \n就像在书末创建索引的过程一样，在创建 Oracle 索引时也必须考虑许多因素。Oracle 提供了丰富的索引特性和选项。这些对象由 DBA 或开发人员手动创建。因此，你需要了解各种特性以及如何利用它们。如果你选择了错误的索引类型或错误地使用了某个特性，可能会对性能产生不利影响。在创建索引之前，需要考虑的方面如下所列：\n\
    \n*   索引类型\n*   要包含的表列\n*   是使用单列还是列的组合\n*   特殊特性，如并行、关闭日志记录、压缩、不可见索引等\n*   唯一性\n\
    *   命名约定\n*   表空间放置\n*   初始大小要求和增长\n*   对`SELECT`语句性能的影响（提升）\n*   对`INSERT`、`UPDATE`和`DELETE`语句性能的影响\n\
    *   如果底层表是分区的，则需考虑全局索引或本地索引\n\n当你创建索引时，应该考虑前面列表中提到的每一个方面。你首先需要做的决定之一是索引类型和要包含的列。Oracle\
    \ 提供了多种强大的索引类型。对于大多数场景，你可以使用默认的 B 树（平衡树）索引。其他常用的类型包括连接索引、位图索引和基于函数的索引。表 2-1 描述了\
    \ Oracle 可用的索引类型。\n\n![images](img/t0201.jpg)\n\n![images](img/t0201a.jpg)\n\n\
    本章重点介绍最常用的索引和特性。本书不涵盖哈希集群索引、分区索引和域索引。如果你需要了解本章或本书未涵盖的索引类型或特性的更多信息，请参阅 Oracle 的\
    \ SQL 参考指南，网址为`http://otn.oracle.com`。\n\n本章的第一个“方法”涉及 B 树索引的机制。理解这个数据库对象的工作原理至关重要。即使你已经使用\
    \ Oracle 一段时间了，我们认为通读本方法中概述的各种场景也很有用，以确保你了解优化器如何使用这种类型的索引。这将为解决许多不同类型的性能问题（尤其是\
    \ SQL 调优）奠定基础。\n\n### 2-1. 理解 B 树索引\n\n#### 问题\n\n你想创建一个索引。你知道 Oracle 中默认的索引类型是\
    \ B 树，但不太清楚索引在物理上是如何实现的。你希望充分理解 B 树索引的内部原理，以便在构建数据库应用程序时做出明智的性能决策。\n\n#### 解决方案\n\
    \n一个带有良好图示的示例将有助于说明 B 树索引的机制。即使你使用 B 树索引已有一段时间，一个好的示例也可能阐明使用索引的技术细节。首先，假设你创建了一个如下所示的表：\n\
    \n```\ncreate table cust(\n cust_id number\n,last_name varchar2(30)\n,first_name\
    \ varchar2(30));\n```\n\n你确定一些 SQL 查询会经常在`WHERE`子句中使用`LAST_NAME`。这促使你创建一个索引：\n\
    \n```\nSQL> create index cust_idx1 on cust(last_name);\n```\n\n现在向表中插入了几百行数据（此处未显示所有行）：\n\
    \n```\ninsert into cust values(7, 'ACER','SCOTT');\ninsert into cust values(5,\
    \ 'STARK','JIM');\ninsert into cust values(3, 'GREY','BOB');\ninsert into cust\
    \ values(11,'KHAN','BRAD');\n.....\ninsert into cust values(274, 'ACER','SID');\n\
    ```\n\n插入行后，我们确保表统计信息是最新的，以便为查询优化器提供足够的信息来做出关于如何检索数据的良好选择：\n\n```\nSQL> exec dbms_stats.gather_table_stats(ownname=>'MV_MAINT',\
    \ -\n           tabname=>'CUST',cascade=>true);\n```\n\n随着行被插入表中，Oracle 将分配由物理数据库块组成的区。Oracle\
    \ 也会为索引分配块。对于插入表中的每条记录，Oracle 还会在索引中创建一个条目，该条目由`ROWID`和列值（本例中是`LAST_NAME`中的值）组成。每个索引条目的`ROWID`指向存储表列值的数据文件和块。图\
    \ 2-1 以图形方式展示了数据如何存储在表中以及对应的 B 树索引。在此示例中，数据文件 10 和 15 包含存储在关联块中的表数据，数据文件 22 存储索引块。\n\
    \n![images](img/0201.jpg)\n\n**图 2-1.** 表和 B 树索引的物理布局\n\n在图 2-1 中有两条虚线。这些线描绘了索引结构中的`ROWID`如何指向表中`ACER`列值的物理位置。这些特定的值将在本解决方案的后续场景中使用。\n\
    \n当从表及其对应索引中选择数据时，存在三种基本场景：\n\n*   SQL 查询所需的所有表数据都包含在索引结构中。因此只需访问索引块。永远不会读取表的块。\n\
    *   查询所需的信息并未全部包含在索引块中。因此查询优化器选择同时访问索引块和表块，以检索满足查询结果所需的数据。\n*   查询优化器选择不访问索引。因此只访问表块。\n\
    \n上述情况将在接下来的三个小节中进行介绍。\n"
- fmt: "##### Scenario 1: All Data Lies in the Index Blocks\n\nThere are two scenarios\
    \ that will be shown in this section:\n\n*   `Index range scan`: This occurs when\
    \ the optimizer determines it is efficient to use the index structure to retrieve\
    \ multiple rows required by the query. Index range scans are used extensively\
    \ in a wide variety of situations.\n*   `Index fast full scan`: This occurs when\
    \ the optimizer determines that most of the rows in the table will need to be\
    \ retrieved. However, all of the information required is stored in the index.\
    \ Since the index structure is usually smaller than the table structure, the optimizer\
    \ determines that a full scan of the index is more efficient. This scenario is\
    \ common for queries that count values.\n\nFirst the index range scan is demonstrated.\
    \ For this example, suppose this query is issued that selects from the table:\n\
    \n```sql\nSQL> select last_name from cust where last_name='ACER';\n```\n\nBefore\
    \ reading on, look at [Figure 2-1](#Chapter02.html#fig_2_1) and try to answer\
    \ this question: “What are the minimal number of blocks Oracle will need to read\
    \ to return the data for this query?” In other words, what is the most efficient\
    \ way to access the physical blocks in order to satisfy the results of this query?\
    \ The optimizer could choose to read through every block in the table structure.\
    \ However, that would result in a great deal of I/O, and thus it is not the most\
    \ optimal way to retrieve the data.\n\nFor this example, the most efficient way\
    \ to retrieve the data is to use the index structure. To return the rows that\
    \ contain the value of `ACER` in the `LAST_NAME` column, Oracle will need to read\
    \ three blocks: block 20, block 30, and block 39. We can verify that this is occurring\
    \ by using Oracle's `Autotrace` utility:\n\n```sql\nSQL> set autotrace on;\nSQL>\
    \ select last_name from cust where last_name='ACER';\n```\n\nHere is a partial\
    \ snippet of the output:\n\n```\n------------------------------------------------------------------------------\n\
    | Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |\n\
    ------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT |           |   101 |   808 |     1   (0)| 00:00:01 |\n\
    |*  1 |  INDEX RANGE SCAN| CUST_IDX1 |   101 |   808 |     1   (0)| 00:00:01 |\n\
    ------------------------------------------------------------------------------\n\
    ```\n\nThe prior output shows that Oracle needed to use only the `CUST_IDX1` index\
    \ to retrieve the data to satisfy the result set of the query. The table data\
    \ blocks were not accessed; only the index blocks were required. This is a particularly\
    \ efficient indexing strategy for the given query. Listed next are the statistics\
    \ displayed by `Autotrace` for this example:\n\n```\nStatistics\n----------------------------------------------------------\n\
    \          1  recursive calls\n          0  db block gets\n          3  consistent\
    \ gets\n          0  physical reads\n```\n\nThe `consistent gets` value indicates\
    \ that three blocks were read from memory (`db block gets` plus `consistent gets`\
    \ equals the total blocks read from memory). Since the index blocks were already\
    \ in memory, no physical reads were required to return the result set of this\
    \ query.\n\nNext an example that results in an index fast full scan is demonstrated.\
    \ Consider this query:\n\n```sql\nSQL> select count(last_name) from cust;\n```\n\
    \nUsing `SET AUTOTRACE ON`, an execution plan is generated. Here is the corresponding\
    \ output:\n\n```\n-----------------------------------------------------------------------------------\n\
    | Id  | Operation             | Name      | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n-----------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT      |           |     1 |     8 |     3   (0)| 00:00:01\
    \ |\n|   1 |  SORT AGGREGATE       |           |     1 |     8 |            |\
    \          |\n|   2 |   INDEX FAST FULL SCAN| CUST_IDX1 |  1509 | 12072 |    \
    \ 3   (0)| 00:00:01 |\n-----------------------------------------------------------------------------------\n\
    ```\n\nThe prior output shows that only the index structure was used to determine\
    \ the count within the table. In this situation, the optimizer determined that\
    \ a full scan of the index was more efficient than a full scan of the table.\n\
    \n##### Scenario 2: All Information Is Not Contained in the Index\n\nNow consider\
    \ this situation: suppose we need additional information from the `CUST` table.\
    \ This query additionally selects the `FIRST_NAME` column:\n\n```sql\nSQL> select\
    \ last_name, first_name from cust where last_name = 'ACER';\n```\n\nUsing `SET\
    \ AUTOTRACE ON` and executing the prior query results in the following execution\
    \ plan:\n\n```\n-----------------------------------------------------------------------------------------\n\
    | Id  | Operation                   | Name      | Rows  | Bytes | Cost (%CPU)|\
    \ Time     |\n-----------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |           |   101 |  1414 |     3   (0)|\
    \ 00:00:01 |\n|   1 |  TABLE ACCESS BY INDEX ROWID| CUST      |   101 |  1414\
    \ |     3   (0)| 00:00:01 |\n|*  2 |   INDEX RANGE SCAN          | CUST_IDX1 |\
    \   101 |       |     1   (0)| 00:00:01 |\n-----------------------------------------------------------------------------------------\n\
    ```\n\nThe prior output indicates that the `CUST_IDX1` index was accessed via\
    \ an `INDEX RANGE SCAN`. The `INDEX RANGE SCAN` identifies the index blocks required\
    \ to satisfy the results of this query. Additionally the table is read by `TABLE\
    \ ACCESS BY INDEX ROWID`. The access to the table by the index's `ROWID` means\
    \ that Oracle uses the `ROWID` (stored in the index) to locate the data contained\
    \ within the table blocks. In [Figure 2-1](#Chapter02.html#fig_2_1), this is indicated\
    \ by the dotted lines that map the `ROWID` to the appropriate table blocks that\
    \ contain the value of `ACER` in the `LAST_NAME` column.\n\nAgain, looking at\
    \ [Figure 2-1](#Chapter02.html#fig_2_1), how many table and index blocks need\
    \ to be read in this scenario? The index requires that blocks 20, 30, and 39 must\
    \ be read. Since `FIRST_NAME` is not included in the index, Oracle must read the\
    \ table blocks to retrieve these values. Oracle knows the `ROWID` of the table\
    \ blocks and directly reads blocks 11 and 2500 to retrieve that data. That makes\
    \ a total of five blocks. Here is a partial snippet of the statistics generated\
    \ by `Autotrace` that confirms the number of blocks read is five:\n\n```\nStatistics\n\
    ----------------------------------------------------------\n          1  recursive\
    \ calls\n          0  db block gets\n          5  consistent gets\n          0\
    \  physical reads\n```"
  raw: '##### Scenario 1: All Data Lies in the Index Blocks


    There are two scenarios that will be shown in this section:


    *   *Index range scan*: This occurs when the optimizer determines it is efficient
    to use the index structure to retrieve multiple rows required by the query. Index
    range scans are used extensively in a wide variety of situations.

    *   *Index fast full scan*: This occurs when the optimizer determines that most
    of the rows in the table will need to be retrieved. However, all of the information
    required is stored in the index. Since the index structure is usually smaller
    than the table structure, the optimizer determines that a full scan of the index
    is more efficient. This scenario is common for queries that count values.


    First the index range scan is demonstrated. For this example, suppose this query
    is issued that selects from the table:


    `SQL> select last_name from cust where last_name=''ACER'';`


    Before reading on, look at [Figure 2-1](#Chapter02.html#fig_2_1) and try to answer
    this question: “What are the minimal number of blocks Oracle will need to read
    to return the data for this query?” In other words, what is the most efficient
    way to access the physical blocks in order to satisfy the results of this query?
    The optimizer could choose to read through every block in the table structure.
    However, that would result in a great deal of I/O, and thus it is not the most
    optimal way to retrieve the data.


    For this example, the most efficient way to retrieve the data is to use the index
    structure. To return the rows that contain the value of `ACER` in the `LAST_NAME`
    column, Oracle will need to read three blocks: block 20, block 30, and block 39\.
    We can verify that this is occurring by using Oracle''s Autotrace utility:


    `SQL> set autotrace on;`

    `SQL> select last_name from cust where last_name=''ACER'';`


    Here is a partial snippet of the output:


    `------------------------------------------------------------------------------`

    `| Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |`

    `------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT |           |   101 |   808 |     1   (0)| 00:00:01
    |`

    `|*  1 |  INDEX RANGE SCAN| CUST_IDX1 |   101 |   808 |     1   (0)| 00:00:01
    |`

    `------------------------------------------------------------------------------`


    The prior output shows that Oracle needed to use only the `CUST_IDX1` index to
    retrieve the data to satisfy the result set of the query. *The table data blocks
    were not accessed*; only the index blocks were required. This is a particularly
    efficient indexing strategy for the given query. Listed next are the statistics
    displayed by Autotrace for this example:


    `Statistics`

    `----------------------------------------------------------`

    `          1  recursive calls`

    `          0  db block gets`

    `          3  consistent gets`

    `          0  physical reads`


    The `consistent gets` value indicates that three blocks were read from memory
    (`db block gets` plus `consistent gets` equals the total blocks read from memory).
    Since the index blocks were already in memory, no physical reads were required
    to return the result set of this query.


    Next an example that results in an index fast full scan is demonstrated. Consider
    this query:


    `SQL> select count(last_name) from cust;`


    Using `SET AUTOTRACE ON`, an execution plan is generated. Here is the corresponding
    output:


    `-----------------------------------------------------------------------------------`

    `| Id  | Operation             | Name      | Rows  | Bytes | Cost (%CPU)| Time     |`

    `-----------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT      |           |     1 |     8 |     3   (0)| 00:00:01
    |`

    `|   1 |  SORT AGGREGATE       |           |     1 |     8 |            |          |`

    `|   2 |   INDEX FAST FULL SCAN| CUST_IDX1 |  1509 | 12072 |     3   (0)| 00:00:01
    |`

    `-----------------------------------------------------------------------------------`


    The prior output shows that only the index structure was used to determine the
    count within the table. In this situation, the optimizer determined that a full
    scan of the index was more efficient than a full scan of the table.


    ##### Scenario 2: All Information Is Not Contained in the Index


    Now consider this situation: suppose we need additional information from the `CUST`
    table. This query additionally selects the `FIRST_NAME` column:


    `SQL> select last_name, first_name from cust where last_name = ''ACER'';`


    Using `SET AUTOTRACE ON` and executing the prior query results in the following
    execution plan:


    `-----------------------------------------------------------------------------------------`

    `| Id  | Operation                   | Name      | Rows  | Bytes | Cost (%CPU)|
    Time     |`

    `-----------------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT            |           |   101 |  1414 |     3   (0)|
    00:00:01 |`

    `|   1 |  TABLE ACCESS BY INDEX ROWID| CUST      |   101 |  1414 |     3   (0)|
    00:00:01 |`

    `|*  2 |   INDEX RANGE SCAN          | CUST_IDX1 |   101 |       |     1   (0)|
    00:00:01 |`

    `-----------------------------------------------------------------------------------------`


    The prior output indicates that the `CUST_IDX1` index was accessed via an `INDEX
    RANGE SCAN`. The `INDEX RANGE SCAN` identifies the index blocks required to satisfy
    the results of this query. Additionally the table is read by `TABLE ACCESS BY
    INDEX ROWID`. The access to the table by the index''s `ROWID` means that Oracle
    uses the `ROWID` (stored in the index) to locate the data contained within the
    table blocks. In [Figure 2-1](#Chapter02.html#fig_2_1), this is indicated by the
    dotted lines that map the `ROWID` to the appropriate table blocks that contain
    the value of `ACER` in the `LAST_NAME` column.


    Again, looking at [Figure 2-1](#Chapter02.html#fig_2_1), how many table and index
    blocks need to be read in this scenario? The index requires that blocks 20, 30,
    and 39 must be read. Since `FIRST_NAME` is not included in the index, Oracle must
    read the table blocks to retrieve these values. Oracle knows the `ROWID` of the
    table blocks and directly reads blocks 11 and 2500 to retrieve that data. That
    makes a total of five blocks. Here is a partial snippet of the statistics generated
    by Autotrace that confirms the number of blocks read is five:


    `Statistics`

    `----------------------------------------------------------`

    `          1  recursive calls`

    `          0  db block gets`

    `          5  consistent gets`

    `          0  physical reads`'
  trans: "\n##### 场景一：所有数据都位于索引块中\n\n本节将展示两种场景：\n\n*   `索引范围扫描`：当优化器确定使用索引结构来检索查询所需的多行数据是高效时，就会发生这种情况。索引范围扫描在各种情况下被广泛使用。\n\
    *   `索引快速全扫描`：当优化器确定需要检索表中的大部分行时，就会发生这种情况。然而，所需的所有信息都存储在索引中。由于索引结构通常比表结构小，优化器判定对索引进行全扫描效率更高。这种场景常见于需要统计值的查询。\n\
    \n首先演示索引范围扫描。对于本例，假设执行了这样一个查询：\n\n```sql\nSQL> select last_name from cust where\
    \ last_name='ACER';\n```\n\n在继续阅读之前，请看图 2-1，并尝试回答这个问题：“Oracle 为返回此查询的数据需要读取的最少块数是多少？”换句话说，为了满足此查询的结果，访问物理块的最有效方式是什么？优化器可以选择读取表结构中的每个块。但是，这将导致大量的\
    \ I/O，因此不是检索数据的最佳方式。\n\n对于本例，检索数据最有效的方式是使用索引结构。要返回 `LAST_NAME` 列中包含值 `ACER` 的行，Oracle\
    \ 需要读取三个块：块 20、块 30 和块 39。我们可以使用 Oracle 的 `Autotrace` 工具来验证这一点：\n\n```sql\nSQL>\
    \ set autotrace on;\nSQL> select last_name from cust where last_name='ACER';\n\
    ```\n\n以下是部分输出片段：\n\n```\n------------------------------------------------------------------------------\n\
    | Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |\n\
    ------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT |           |   101 |   808 |     1   (0)| 00:00:01 |\n\
    |*  1 |  INDEX RANGE SCAN| CUST_IDX1 |   101 |   808 |     1   (0)| 00:00:01 |\n\
    ------------------------------------------------------------------------------\n\
    ```\n\n之前的输出显示，Oracle 只需要使用 `CUST_IDX1` 索引来检索数据以满足查询的结果集。表数据块未被访问；只需要索引块。对于给定的查询，这是一种特别高效的索引策略。下面是此示例由\
    \ `Autotrace` 显示的统计信息：\n\n```\nStatistics\n----------------------------------------------------------\n\
    \          1  recursive calls\n          0  db block gets\n          3  consistent\
    \ gets\n          0  physical reads\n```\n\n`consistent gets` 值表明从内存中读取了三个块（`db\
    \ block gets` 加上 `consistent gets` 等于从内存读取的总块数）。由于索引块已经在内存中，因此返回此查询的结果集不需要物理读取。\n\
    \n接下来演示一个导致索引快速全扫描的示例。考虑这个查询：\n\n```sql\nSQL> select count(last_name) from cust;\n\
    ```\n\n使用 `SET AUTOTRACE ON`，会生成一个执行计划。对应的输出如下：\n\n```\n-----------------------------------------------------------------------------------\n\
    | Id  | Operation             | Name      | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n-----------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT      |           |     1 |     8 |     3   (0)| 00:00:01\
    \ |\n|   1 |  SORT AGGREGATE       |           |     1 |     8 |            |\
    \          |\n|   2 |   INDEX FAST FULL SCAN| CUST_IDX1 |  1509 | 12072 |    \
    \ 3   (0)| 00:00:01 |\n-----------------------------------------------------------------------------------\n\
    ```\n\n之前的输出显示，仅使用索引结构来确定表中的计数。在这种情况下，优化器判定对索引进行全扫描比对表进行全扫描更高效。\n\n##### 场景二：索引未包含所有信息\n\
    \n现在考虑这种情况：假设我们需要从 `CUST` 表中获取更多信息。这个查询额外选择了 `FIRST_NAME` 列：\n\n```sql\nSQL> select\
    \ last_name, first_name from cust where last_name = 'ACER';\n```\n\n使用 `SET AUTOTRACE\
    \ ON` 并执行上述查询，会产生以下执行计划：\n\n```\n-----------------------------------------------------------------------------------------\n\
    | Id  | Operation                   | Name      | Rows  | Bytes | Cost (%CPU)|\
    \ Time     |\n-----------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |           |   101 |  1414 |     3   (0)|\
    \ 00:00:01 |\n|   1 |  TABLE ACCESS BY INDEX ROWID| CUST      |   101 |  1414\
    \ |     3   (0)| 00:00:01 |\n|*  2 |   INDEX RANGE SCAN          | CUST_IDX1 |\
    \   101 |       |     1   (0)| 00:00:01 |\n-----------------------------------------------------------------------------------------\n\
    ```\n\n之前的输出表明，通过 `INDEX RANGE SCAN` 访问了 `CUST_IDX1` 索引。`INDEX RANGE SCAN` 识别了满足此查询结果所需的索引块。此外，通过\
    \ `TABLE ACCESS BY INDEX ROWID` 读取了表。通过索引的 `ROWID` 访问表意味着 Oracle 使用存储在索引中的 `ROWID`\
    \ 来定位表块中包含的数据。在图 2-1 中，这由映射到包含 `LAST_NAME` 列值 `ACER` 的相应表块的虚线表示。\n\n再次查看图 2-1，在此场景中需要读取多少个表块和索引块？索引要求必须读取块\
    \ 20、30 和 39。由于 `FIRST_NAME` 不包含在索引中，Oracle 必须读取表块以检索这些值。Oracle 知道表块的 `ROWID`\
    \ 并直接读取块 11 和 2500 来检索该数据。总共是五个块。以下是 `Autotrace` 生成的部分统计信息片段，确认读取的块数为五：\n\n```\n\
    Statistics\n----------------------------------------------------------\n     \
    \     1  recursive calls\n          0  db block gets\n          5  consistent\
    \ gets\n          0  physical reads\n```\n"
- fmt: "##### Scenario 3: Only the Table Blocks Are Accessed\n\nIn some situations,\
    \ even if there is an index, Oracle will determine that it's more efficient to\
    \ use only the table blocks. When Oracle inspects every row within a table, this\
    \ is known as a *full table scan*. For example, take this query:\n\n`SQL> select\
    \ * from cust;`\n\nHere are the corresponding execution plan and statistics:\n\
    \n```\n--------------------------------------------------------------------------\n\
    | Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n--------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |      |  1509 | 24144 |    12   (0)| 00:00:01 |\n|\
    \   1 |  TABLE ACCESS FULL| CUST |  1509 | 24144 |    12   (0)| 00:00:01 |\n--------------------------------------------------------------------------\n\
    ```\n\n```\nStatistics\n----------------------------------------------------------\n\
    \          0  recursive calls\n          0  db block gets\n        119  consistent\
    \ gets\n          0  physical reads\n```\n\nThe prior output shows that a total\
    \ of 119 blocks were inspected. Oracle searched every row in the table to bring\
    \ back the results required to satisfy the query. In this situation, all blocks\
    \ of the table must be read, and there is no way for Oracle to use the index to\
    \ speed up the retrieval of the data.\n\n![images](images/square.jpg) `Note` For\
    \ the examples in this recipe, your results may vary slightly, depending on how\
    \ many rows you initially insert into the table. We used approximately 1,500 rows\
    \ for this example.\n\n#### How It Works\n\nThe B-tree index is the default index\
    \ type in Oracle. For most OLTP-type applications, this index type is sufficient.\
    \ This index type is known as B-tree because the `ROWID` and associated column\
    \ values are stored within blocks in a *balanced* tree-like structure (see [Figure\
    \ 2-1](#Chapter02.html#fig_2_1)). The B stands for balanced.\n\nB-tree indexes\
    \ are efficient because, when properly used, they result in a query retrieving\
    \ data far faster than it would without the index. If the index structure itself\
    \ contains the required column values to satisfy the result of the query, then\
    \ the table data blocks need not be accessed. Understanding these mechanics will\
    \ guide your indexing decision-making process. For example, this will help you\
    \ decide which columns to index and whether a concatenated index might be more\
    \ efficient for certain queries and less optimal for others. These topics are\
    \ covered in detail in subsequent recipes in this chapter.\n\n**ESTIMATING THE\
    \ SPACE AN INDEX WILL REQUIRE**\n\nBefore you create an index, you can estimate\
    \ how much space it will take via the `DBMS_SPACE.CREATE_INDEX_COST` procedure—for\
    \ example:\n\n```\nSQL> set serverout on\nSQL> exec dbms_stats.gather_table_stats(user,'CUST');\n\
    SQL> variable used_bytes number\nSQL> variable alloc_bytes number\nSQL> exec dbms_space.create_index_cost(\
    \ 'create index cust_idx2 on cust(first_name)', -\n               :used_bytes,\
    \ :alloc_bytes );\nSQL> print :used_bytes\n```\n\nHere is some sample output for\
    \ this example:\n\n```\nUSED_BYTES\n----------\n    363690\n```\n\n```\nSQL> print\
    \ :alloc_bytes\n```\n\nHere is some sample output for this example:\n\n```\nALLOC_BYTES\n\
    -----------\n    2097152\n```\n\nThe `used_bytes` variable gives you an estimate\
    \ of how much room is required for the index data. The `alloc_bytes` variable\
    \ provides an estimate of how much space will be allocated within the tablespace.\n\
    \n### 2-2. Deciding Which Columns to Index\n\n#### Problem\n\nA database you manage\
    \ contains hundreds of tables. Each table typically contains a dozen or more columns.\
    \ You wonder which columns should be indexed.\n\n#### Solution\n\nListed next\
    \ are general guidelines for deciding which columns to index.\n\n*   Define a\
    \ primary key constraint for each table that results in an index automatically\
    \ being created on the columns specified in the primary key (see Recipe 2-3).\n\
    *   Create unique key constraints on non-null column values that are required\
    \ to be unique (different from the primary key columns). This results in an index\
    \ automatically being created on the columns specified in unique key constraints\
    \ (see Recipe 2-4).\n*   Explicitly create indexes on foreign key columns (see\
    \ Recipe 2-5).\n*   Create indexes on columns used often as predicates in the\
    \ `WHERE` clause of frequently executed SQL queries.\n\nAfter you have decided\
    \ to create indexes, we recommend that you adhere to index creation standards\
    \ that facilitate the ease of maintenance. Specifically, follow these guidelines\
    \ when creating an index:\n\n*   Use the default B-tree index unless you have\
    \ a solid reason to use a different index type.\n*   Create a separate tablespace\
    \ for the indexes. This allows you to more easily manage indexes separately from\
    \ tables for tasks such as backup and recovery.\n*   Let the index inherit its\
    \ storage properties from the tablespace. This allows you to specify the storage\
    \ properties when you create the tablespace and not have to manage storage properties\
    \ for individual indexes.\n*   If you have a variety of storage requirements for\
    \ indexes, then consider creating separate tablespaces for each type of index—for\
    \ example, `INDEX_LARGE`, `INDEX_MEDIUM`, and `INDEX_SMALL` tablespaces, each\
    \ defined with storage characteristics appropriate for the size of the index.\n\
    \nListed next is a sample script that encapsulates the foregoing recommendations\
    \ from the prior two bulleted lists:\n\n```\nCREATE TABLE cust(\n cust_id    NUMBER\n\
    ,last_name  VARCHAR2(30)\n,first_name VARCHAR2(30));\n--\nALTER TABLE cust ADD\
    \ CONSTRAINT cust_pk PRIMARY KEY (cust_id)\nUSING INDEX TABLESPACE reporting_index;\n\
    --\nALTER TABLE cust ADD CONSTRAINT cust_uk1 UNIQUE (last_name, first_name)\n\
    USING INDEX TABLESPACE reporting_index;\n--\nCREATE TABLE address(\n address_id\
    \ NUMBER,\n cust_id    NUMBER\n,street     VARCHAR2(30)\n,city       VARCHAR2(30)\n\
    ,state      VARCHAR2(30))\nTABLESPACE reporting_data;\n--\nALTER TABLE address\
    \ ADD CONSTRAINT addr_fk1\nFOREIGN KEY (cust_id) REFERENCES cust(cust_id);\n--\n\
    CREATE INDEX addr_fk1 ON address(cust_id)\nTABLESPACE reporting_index;\n```\n\n\
    In the prior script, two tables are created. The parent table is `CUST` and its\
    \ primary key is `CUST_ID`. The child table is `ADDRESS` and its primary key is\
    \ `ADDRESS_ID`. The `CUST_ID` column exists in `ADDRESS` as a foreign key mapping\
    \ back to the `CUST_ID` column in the `CUST` table."
  raw: '##### Scenario 3: Only the Table Blocks Are Accessed


    In some situations, even if there is an index, Oracle will determine that it''s
    more efficient to use only the table blocks. When Oracle inspects every row within
    a table, this is known a *full table scan*. For example, take this query:


    `SQL> select * from cust;`


    Here are the corresponding execution plan and statistics:


    `--------------------------------------------------------------------------`

    `| Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |`

    `--------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT  |      |  1509 | 24144 |    12   (0)| 00:00:01 |`

    `|   1 |  TABLE ACCESS FULL| CUST |  1509 | 24144 |    12   (0)| 00:00:01 |`

    `--------------------------------------------------------------------------`

    `Statistics`

    `----------------------------------------------------------`

    `          0  recursive calls`

    `          0  db block gets`

    `        119  consistent gets`

    `          0  physical reads`


    The prior output shows that a total of 119 blocks were inspected. Oracle searched
    every row in the table to bring back the results required to satisfy the query.
    In this situation, all blocks of the table must be read, and there is no way for
    Oracle to use the index to speed up the retrieval of the data.


    ![images](images/square.jpg) **Note** For the examples in this recipe, your results
    may vary slightly, depending on how many rows you initially insert into the table.
    We used approximately 1,500 rows for this example.


    #### How It Works


    The B-tree index is the default index type in Oracle. For most OLTP-type applications,
    this index type is sufficient. This index type is known as B-tree because the
    `ROWID` and associated column values are stored within blocks in a *balanced*
    tree-like structure (see [Figure 2-1](#Chapter02.html#fig_2_1)). The B stands
    for balanced.


    B-tree indexes are efficient because, when properly used, they result in a query
    retrieving data far faster than it would without the index. If the index structure
    itself contains the required column values to satisfy the result of the query,
    then the table data blocks need not be accessed. Understanding these mechanics
    will guide your indexing decision-making process. For example, this will help
    you decide which columns to index and whether a concatenated index might be more
    efficient for certain queries and less optimal for others. These topics are covered
    in detail in subsequent recipes in this chapter.


    **ESTIMATING THE SPACE AN INDEX WILL REQUIRE**


    Before you create an index, you can estimate how much space it will take via the
    `DBMS_SPACE.CREATE_INDEX_COST` procedure—for example:


    `SQL> set serverout on`

    `SQL> exec dbms_stats.gather_table_stats(user,''CUST'');`

    `SQL> variable used_bytes number`

    `SQL> variable alloc_bytes number`

    `SQL> exec dbms_space.create_index_cost( ''create index cust_idx2 on cust(first_name)'',
    -`

    `               :used_bytes, :alloc_bytes );`

    `SQL> print :used_bytes`


    Here is some sample output for this example:


    `USED_BYTES`

    `----------`

    `    363690`


    `SQL> print :alloc_bytes`


    Here is some sample output for this example:


    `ALLOC_BYTES`

    `-----------`

    `    2097152`


    The `used_bytes` variable gives you an estimate of how much room is required for
    the index data. The `alloc_bytes` variable provides an estimate of how much space
    will be allocated within the tablespace.


    ### 2-2\. Deciding Which Columns to Index


    #### Problem


    A database you manage contains hundreds of tables. Each table typically contains
    a dozen or more columns. You wonder which columns should be indexed.


    #### Solution


    Listed next are general guidelines for deciding which columns to index.


    *   Define a primary key constraint for each table that results in an index automatically
    being created on the columns specified in the primary key (see Recipe 2-3).

    *   Create unique key constraints on non-null column values that are required
    to be unique (different from the primary key columns). This results in an index
    automatically being created on the columns specified in unique key constraints
    (see Recipe 2-4).

    *   Explicitly create indexes on foreign key columns (see Recipe 2-5).

    *   Create indexes on columns used often as predicates in the `WHERE` clause of
    frequently executed SQL queries.


    After you have decided to create indexes, we recommend that you adhere to index
    creation standards that facilitate the ease of maintenance. Specifically, follow
    these guidelines when creating an index:


    *   Use the default B-tree index unless you have a solid reason to use a different
    index type.

    *   Create a separate tablespace for the indexes. This allows you to more easily
    manage indexes separately from tables for tasks such as backup and recovery.

    *   Let the index inherit its storage properties from the tablespace. This allows
    you to specify the storage properties when you create the tablespace and not have
    to manage storage properties for individual indexes.

    *   If you have a variety of storage requirements for indexes, then consider creating
    separate tablespaces for each type of index—for example, `INDEX_LARGE`, `INDEX_MEDIUM`,
    and `INDEX_SMALL` tablespaces, each defined with storage characteristics appropriate
    for the size of the index.


    Listed next is a sample script that encapsulates the foregoing recommendations
    from the prior two bulleted lists:


    `CREATE TABLE cust(`

    ` cust_id    NUMBER`

    `,last_name  VARCHAR2(30)`

    `,first_name VARCHAR2(30));`

    `--`

    `ALTER TABLE cust ADD CONSTRAINT cust_pk PRIMARY KEY (cust_id)`

    `USING INDEX TABLESPACE reporting_index;`

    `--`

    `ALTER TABLE cust ADD CONSTRAINT cust_uk1 UNIQUE (last_name, first_name)`

    `USING INDEX TABLESPACE reporting_index;`

    `--`

    `CREATE TABLE address(`

    ` address_id NUMBER,`

    ` cust_id    NUMBER`

    `,street     VARCHAR2(30)`

    `,city       VARCHAR2(30)`

    `,state      VARCHAR2(30))`

    `TABLESPACE reporting_data;`

    `--`

    `ALTER TABLE address ADD CONSTRAINT addr_fk1`

    `FOREIGN KEY (cust_id) REFERENCES cust(cust_id);`

    `--`

    `CREATE INDEX addr_fk1 ON address(cust_id)`

    `TABLESPACE reporting_index;`


    In the prior script, two tables are created. The parent table is `CUST` and its
    primary key is `CUST_ID`. The child table is `ADDRESS` and its primary key is
    `ADDRESS_ID`. The `CUST_ID` column exists in `ADDRESS` as a foreign key mapping
    back to the `CUST_ID` column in the `CUST` table.'
  trans: "\n##### 场景三：仅访问表块\n\n在某些情况下，即使存在索引，Oracle 也会判断仅使用表块更为高效。当 Oracle 检查表中的每一行时，这被称为*全表扫描*。例如，看下面这个查询：\n\
    \n`SQL> select * from cust;`\n\n以下是对应的执行计划和统计信息：\n\n```\n--------------------------------------------------------------------------\n\
    | Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n--------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |      |  1509 | 24144 |    12   (0)| 00:00:01 |\n|\
    \   1 |  TABLE ACCESS FULL| CUST |  1509 | 24144 |    12   (0)| 00:00:01 |\n--------------------------------------------------------------------------\n\
    ```\n\n```\nStatistics\n----------------------------------------------------------\n\
    \          0  recursive calls\n          0  db block gets\n        119  consistent\
    \ gets\n          0  physical reads\n```\n\n先前的输出显示总共检查了 119 个块。Oracle 搜索了表中的每一行，以取回满足查询所需的结果。在这种情况下，必须读取表的所有块，Oracle\
    \ 无法使用索引来加速数据的检索。\n\n![images](img/square.jpg) `注意` 对于本技巧中的示例，根据你最初插入表中的行数，结果可能略有不同。本例中我们使用了大约\
    \ 1,500 行。\n\n#### 工作原理\n\nB 树索引是 Oracle 中的默认索引类型。对于大多数 OLTP 类型的应用程序，此索引类型已足够。这种索引类型被称为\
    \ B 树，因为 `ROWID` 和相关的列值存储在一个*平衡*的树状结构中（参见图 2-1）。B 代表平衡。\n\nB 树索引之所以高效，是因为如果使用得当，它们能使查询检索数据的速度远快于没有索引的情况。如果索引结构本身包含了满足查询结果所需的列值，那么就无需访问表数据块。理解这些机制将指导你的索引决策过程。例如，这将帮助你决定对哪些列建立索引，以及对于某些查询，复合索引是否可能更高效，而对于其他查询则不是最优。本章后续技巧将详细讨论这些主题。\n\
    \n**估算索引所需的空间**\n\n在创建索引之前，你可以通过 `DBMS_SPACE.CREATE_INDEX_COST` 过程来估算其将占用多少空间——例如：\n\
    \n```\nSQL> set serverout on\nSQL> exec dbms_stats.gather_table_stats(user,'CUST');\n\
    SQL> variable used_bytes number\nSQL> variable alloc_bytes number\nSQL> exec dbms_space.create_index_cost(\
    \ 'create index cust_idx2 on cust(first_name)', -\n               :used_bytes,\
    \ :alloc_bytes );\nSQL> print :used_bytes\n```\n\n以下是此示例的样本输出：\n\n```\nUSED_BYTES\n\
    ----------\n    363690\n```\n\n```\nSQL> print :alloc_bytes\n```\n\n以下是此示例的样本输出：\n\
    \n```\nALLOC_BYTES\n-----------\n    2097152\n```\n\n`used_bytes` 变量为你提供索引数据所需空间大小的估算值。`alloc_bytes`\
    \ 变量则提供将在表空间内分配的空间大小的估算值。\n\n### 2-2. 决定对哪些列建立索引\n\n#### 问题\n\n你管理的一个数据库包含数百张表。每张表通常包含一打或更多的列。你想知道应该对哪些列建立索引。\n\
    \n#### 解决方案\n\n以下是一些决定对哪些列建立索引的通用准则。\n\n*   为每张表定义一个主键约束，这会导致在主键指定的列上自动创建索引（参见技巧\
    \ 2-3）。\n*   在非空且要求唯一（不同于主键列）的列值上创建唯一键约束。这会导致在唯一键约束指定的列上自动创建索引（参见技巧 2-4）。\n* \
    \  在外键列上显式创建索引（参见技巧 2-5）。\n*   在经常作为频繁执行的 SQL 查询的 `WHERE` 子句谓词使用的列上创建索引。\n\n在决定创建索引后，我们建议你遵守有助于轻松维护的索引创建标准。具体来说，创建索引时遵循以下准则：\n\
    \n*   除非有充分理由使用其他索引类型，否则使用默认的 B 树索引。\n*   为索引创建单独的表空间。这使你能够更容易地将索引与表分开管理，例如进行备份和恢复任务。\n\
    *   让索引从其表空间继承存储属性。这允许你在创建表空间时指定存储属性，而无需管理各个索引的存储属性。\n*   如果你的索引有各种存储需求，考虑为每种索引类型创建单独的表空间——例如，分别为\
    \ `INDEX_LARGE`、`INDEX_MEDIUM` 和 `INDEX_SMALL` 表空间，每个都定义适合索引大小的存储特性。\n\n下面是一个示例脚本，它封装了上述两个要点列表中的建议：\n\
    \n```\nCREATE TABLE cust(\n cust_id    NUMBER\n,last_name  VARCHAR2(30)\n,first_name\
    \ VARCHAR2(30));\n--\nALTER TABLE cust ADD CONSTRAINT cust_pk PRIMARY KEY (cust_id)\n\
    USING INDEX TABLESPACE reporting_index;\n--\nALTER TABLE cust ADD CONSTRAINT cust_uk1\
    \ UNIQUE (last_name, first_name)\nUSING INDEX TABLESPACE reporting_index;\n--\n\
    CREATE TABLE address(\n address_id NUMBER,\n cust_id    NUMBER\n,street     VARCHAR2(30)\n\
    ,city       VARCHAR2(30)\n,state      VARCHAR2(30))\nTABLESPACE reporting_data;\n\
    --\nALTER TABLE address ADD CONSTRAINT addr_fk1\nFOREIGN KEY (cust_id) REFERENCES\
    \ cust(cust_id);\n--\nCREATE INDEX addr_fk1 ON address(cust_id)\nTABLESPACE reporting_index;\n\
    ```\n\n在前面的脚本中，创建了两张表。父表是 `CUST`，其主键是 `CUST_ID`。子表是 `ADDRESS`，其主键是 `ADDRESS_ID`。`ADDRESS`\
    \ 表中存在 `CUST_ID` 列作为外键，映射回 `CUST` 表中的 `CUST_ID` 列。\n"
- fmt: "## How It Works\n\nYou should add an index only when you're certain it will\
    \ improve performance. Misusing indexes can have serious negative performance\
    \ effects. Indexes created of the wrong type or on the wrong columns do nothing\
    \ but consume space and processing resources. As a DBA, you must have a strategy\
    \ to ensure that indexes enhance performance and don't negatively impact applications.\n\
    \nTable 2-2 encapsulates many of the index management concepts covered in this\
    \ chapter. These recommendations aren't written in stone: adapt and modify them\
    \ as needed for your environment.\n\n![images](images/t0202.jpg)\n\nRefer to these\
    \ guidelines as you create and manage indexes in your databases. These recommendations\
    \ are intended to help you correctly use index technology.\n\n### INDEXES WITH\
    \ NO SEGMENTS\n\nYou can instruct Oracle to create an index that will never be\
    \ used and won't have any extents allocated to it via the `NOSEGMENT` clause:\n\
    \n```sql\nSQL> create index cust_idx1 on cust(first_name) nosegment;\n```\n\n\
    Even though this index will never be used, you can instruct Oracle to determine\
    \ if the index might be used by the optimizer via the `_USE_NOSEGMENT_INDEXES`\
    \ initialization parameter—for example:\n\n```sql\nSQL> alter session set \"_use_nosegment_indexes\"\
    =true;\nSQL> set autotrace trace explain;\nSQL> select first_name from cust where\
    \ first_name = 'JIM';\n```\n\nHere's a sample execution plan showing the optimizer\
    \ would use the index (assuming that you dropped and re-created it normally without\
    \ the `NOSEGMENT` clause):\n\n```\n-----------------------------------------------------------------------------\n\
    | Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |\n\
    -----------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT |           |     1 |    17 |     1   (0)| 00:00:01 |\n\
    |*  1 |  INDEX RANGE SCAN| CUST_IDX1 |     1 |    17 |     1   (0)| 00:00:01 |\n\
    -----------------------------------------------------------------------------\n\
    ```\n\nThat begs the question, why would you ever create an index with `NOSEGMENT`?\
    \ If you have a very large index that you want to create without allocating space,\
    \ to determine if the index would be used by the optimizer, creating an index\
    \ with `NOSEGMENT` allows you to test that scenario. If you determine that the\
    \ index would be useful, you can drop the index and re-create it without the `NOSEGMENT`\
    \ clause.\n\n## 2-3. Creating a Primary Key Index\n\n### Problem\n\nYou want to\
    \ enforce that the primary key columns are unique within a table. Furthermore\
    \ many of the columns in the primary key are frequently used within the `WHERE`\
    \ clause of several queries. You want to ensure that indexes are created on primary\
    \ key columns.\n\n### Solution\n\nWhen you define a primary key constraint for\
    \ a table, Oracle will automatically create an associated index for you. There\
    \ are several methods available for creating a primary key constraint. Our preferred\
    \ approach is to use the `ALTER TABLE...ADD CONSTRAINT` statement. This will create\
    \ the index and the constraint at the same time. This example creates a primary\
    \ key constraint named `CUST_PK` and also instructs Oracle to create the corresponding\
    \ index (also named `CUST_PK`) in the `USERS` tablespace:\n\n```sql\nalter table\
    \ cust add constraint cust_pk primary key (cust_id)\nusing index tablespace users;\n\
    ```\n\nThe following queries and output provide details about the constraint and\
    \ index that Oracle created. The first query displays the constraint information:\n\
    \n```sql\nselect\n  constraint_name\n,constraint_type\nfrom user_constraints\n\
    where table_name = 'CUST';\n```\n```\nCONSTRAINT_NAME                C\n------------------------------\
    \ -\nCUST_PK                        P\n```\n\nThis query displays the index information:\n\
    \n```sql\nselect\n  index_name\n,tablespace_name\n,index_type\n,uniqueness\nfrom\
    \ user_indexes\nwhere table_name = 'CUST';\n```\n```\nINDEX_NAME      TABLESPACE_NAME\
    \ INDEX_TYPE      UNIQUENESS\n--------------- --------------- ---------------\
    \ ---------------\nCUST_PK         USERS           NORMAL          UNIQUE\n```\n\
    \n### How It Works\n\nThe solution for this recipe shows the method that we prefer\
    \ to create primary key constraints and the corresponding index. In most situations,\
    \ this approach is acceptable. However, you should be aware that there are several\
    \ other methods for creating the primary key constraint and index. These methods\
    \ are listed here:\n\n- Create an index first, and then use `ALTER TABLE...ADD\
    \ CONSTRAINT`.\n- Specify the constraint inline (with the column) in the `CREATE\
    \ TABLE` statement.\n- Specify the constraint out of line (from the column) within\
    \ the `CREATE TABLE` statement.\n\nThese techniques are described in the next\
    \ several subsections.\n\n#### Create Index and Constraint Separately\n\nYou have\
    \ the option of first creating an index and then altering the table to apply the\
    \ primary key constraint. Here's an example:\n\n```sql\nSQL> create index cust_pk\
    \ on cust(cust_id);\nSQL> alter table cust add constraint cust_pk primary key(cust_id);\n\
    ```\n\nThe advantage to this approach is that you can drop or disable the primary\
    \ key constraint independently of the index. If you work with large data volumes,\
    \ you may require this sort of flexibility. This approach allows you to disable/re-enable\
    \ a constraint without having to later rebuild the index.\n\n#### Create Constraint\
    \ Inline\n\nYou can directly create an index inline (with the column) in the `CREATE\
    \ TABLE` statement. This approach is simple but doesn't allow for multiple column\
    \ primary keys and doesn't name the constraint:\n\n```sql\nSQL> create table cust(cust_id\
    \ number primary key);\n```\n\nIf you don't explicitly name the constraint (as\
    \ in the prior statement), Oracle automatically generates a name like `SYS_C123456`.\
    \ If you want to explicitly provide a name, you can do so as follows:\n\n```sql\n\
    create table cust(cust_id number constraint cust_pk primary key\nusing index tablespace\
    \ users);\n```\n\nThe advantage of this approach is that it's very simple. If\
    \ you're experimenting in a development or test environment, this approach is\
    \ quick and effective.\n\n#### Create Constraint Out of Line\n\nYou can also define\
    \ the primary key constraint out of line (from the column) within the `CREATE\
    \ TABLE` statement:\n\n```sql\ncreate table cust(cust_id number\n,constraint cust_pk\
    \ primary key (cust_id)\nusing index tablespace users);\n```\n\nThe out-of-line\
    \ approach has one advantage over the inline approach in that you can specify\
    \ multiple columns for the primary key.\n\nAll of the prior techniques for creating\
    \ a primary key constraint and corresponding index are valid. It's often a matter\
    \ of DBA or developer preference as to which technique is used.\n\n## 2-4. Creating\
    \ a Unique Index\n\n### Problem\n\nYou have a column (or combination of columns)\
    \ that contains values that should always be unique. You want to create an index\
    \ on this column (or combination of columns) that enforces the uniqueness and\
    \ also provides efficient access to the table when using the unique column in\
    \ the `WHERE` clause of a query.\n\n![images](images/square.jpg) **Note** If you\
    \ want to create a unique constraint on the primary key column(s), then you should\
    \ explicitly create a primary key constraint (see Recipe 2-3 for details). One\
    \ difference between a primary key and a unique key is that you can have only\
    \ one primary key definition per table, whereas you can have multiple unique keys.\
    \ Also, unique key constraints allow for null values, whereas primary key constraints\
    \ do not."
  raw: '#### How It Works


    You should add an index only when you''re certain it will improve performance.
    Misusing indexes can have serious negative performance effects. Indexes created
    of the wrong type or on the wrong columns do nothing but consume space and processing
    resources. As a DBA, you must have a strategy to ensure that indexes enhance performance
    and don''t negatively impact applications.


    Table 2-2 encapsulates many of the index management concepts covered in this chapter.
    These recommendations aren''t written in stone: adapt and modify them as needed
    for your environment.


    ![images](images/t0202.jpg)


    Refer to these guidelines as you create and manage indexes in your databases.
    These recommendations are intended to help you correctly use index technology.


    **INDEXES WITH NO SEGMENTS**


    You can instruct Oracle to create an index that will never be used and won''t
    have any extents allocated to it via the `NOSEGMENT` clause:


    `SQL> create index cust_idx1 on cust(first_name) nosegment;`


    Even though this index will never be used, you can instruct Oracle to determine
    if the index might be used by the optimizer via the `_USE_NOSEGMENT_INDEXES` initialization
    parameter—for example:


    `SQL> alter session set "_use_nosegment_indexes"=true;`

    `SQL> set autotrace trace explain;`

    `SQL> select first_name from cust where first_name = ''JIM'';`


    Here''s a sample execution plan showing the optimizer would use the index (assuming
    that you dropped and re-created it normally without the `NOSEGMENT` clause):


    `-----------------------------------------------------------------------------`

    ` Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |`

    `-----------------------------------------------------------------------------`

    `   0 | SELECT STATEMENT |           |     1 |    17 |     1   (0)| 00:00:01 |`

    `*  1 |  INDEX RANGE SCAN| CUST_IDX1 |     1 |    17 |     1   (0)| 00:00:01 |`

    `-----------------------------------------------------------------------------`


    That begs the question, why would you ever create an index with `NOSEGMENT`? If
    you have a very large index that you want to create without allocating space,
    to determine if the index would be used by the optimizer, creating an index with
    `NOSEGMENT` allows you to test that scenario. If you determine that the index
    would be useful, you can drop the index and re-create it without the `NOSEGMENT`
    clause.


    ### 2-3\. Creating a Primary Key Index


    #### Problem


    You want to enforce that the primary key columns are unique within a table. Furthermore
    many of the columns in the primary key are frequently used within the `WHERE`
    clause of several queries. You want to ensure that indexes are created on primary
    key columns.


    #### Solution


    When you define a primary key constraint for a table, Oracle will automatically
    create an associated index for you. There are several methods available for creating
    a primary key constraint. Our preferred approach is to use the `ALTER TABLE...ADD
    CONSTRAINT` statement. This will create the index and the constraint at the same
    time. This example creates a primary key constraint named `CUST_PK` and also instructs
    Oracle to create the corresponding index (also named `CUST_PK`) in the `USERS`
    tablespace:


    `alter table cust add constraint cust_pk primary key (cust_id)`

    `using index tablespace users;`


    The following queries and output provide details about the constraint and index
    that Oracle created. The first query displays the constraint information:


    `select`

    ` constraint_name`

    `,constraint_type`

    `from user_constraints`

    `where table_name = ''CUST'';`

    `CONSTRAINT_NAME                C`

    `------------------------------ -`

    `CUST_PK                        P`


    This query displays the index information:


    `select`

    ` index_name`

    `,tablespace_name`

    `,index_type`

    `,uniqueness`

    `from user_indexes`

    `where table_name = ''CUST'';`


    `INDEX_NAME      TABLESPACE_NAME INDEX_TYPE      UNIQUENESS`

    `--------------- --------------- --------------- ---------------`

    `CUST_PK         USERS           NORMAL          UNIQUE`


    #### How It Works


    The solution for this recipe shows the method that we prefer to create primary
    key constraints and the corresponding index. In most situations, this approach
    is acceptable. However, you should be aware that there are several other methods
    for creating the primary key constraint and index. These methods are listed here:


    *   Create an index first, and then use `ALTER TABLE...ADD CONSTRAINT`.

    *   Specify the constraint inline (with the column) in the `CREATE TABLE` statement.

    *   Specify the constraint out of line (from the column) within the `CREATE TABLE`
    statement.


    These techniques are described in the next several subsections.


    ##### Create Index and Constraint Separately


    You have the option of first creating an index and then altering the table to
    apply the primary key constraint. Here''s an example:


    `SQL> create index cust_pk on cust(cust_id);`

    `SQL> alter table cust add constraint cust_pk primary key(cust_id);`


    The advantage to this approach is that you can drop or disable the primary key
    constraint independently of the index. If you work with large data volumes, you
    may require this sort of flexibility. This approach allows you to disable/re-enable
    a constraint without having to later rebuild the index.


    ##### Create Constraint Inline


    You can directly create an index inline (with the column) in the `CREATE TABLE`
    statement. This approach is simple but doesn''t allow for multiple column primary
    keys and doesn''t name the constraint:


    `SQL> create table cust(cust_id number primary key);`


    If you don''t explicitly name the constraint (as in the prior statement), Oracle
    automatically generates a name like `SYS_C123456`. If you want to explicitly provide
    a name, you can do so as follows:


    `create table cust(cust_id number constraint cust_pk primary key`

    `using index tablespace users);`


    The advantage of this approach is that it''s very simple. If you''re experimenting
    in a development or test environment, this approach is quick and effective.


    ##### Create Constraint Out of Line


    You can also define the primary key constraint out of line (from the column) within
    the `CREATE TABLE` statement:


    `create table cust(cust_id number`

    `,constraint cust_pk primary key (cust_id)`

    `using index tablespace users);`


    The out-of-line approach has one advantage over the inline approach in that you
    can specify multiple columns for the primary key.


    All of the prior techniques for creating a primary key constraint and corresponding
    index are valid. It''s often a matter of DBA or developer preference as to which
    technique is used.


    ### 2-4\. Creating a Unique Index


    #### Problem


    You have a column (or combination of columns) that contains values that should
    always be unique. You want to create an index on this column (or combination of
    columns) that enforces the uniqueness and also provides efficient access to the
    table when using the unique column in the `WHERE` clause of a query.


    ![images](images/square.jpg) **Note** If you want to create a unique constraint
    on the primary key column(s), then you should explicitly create a primary key
    constraint (see Recipe 2-3 for details). One difference between a primary key
    and a unique key is that you can have only one primary key definition per table,
    whereas you can have multiple unique keys. Also, unique key constraints allow
    for null values, whereas primary key constraints do not.'
  trans: "## 工作原理\n\n仅当你确信索引能提升性能时才添加它。滥用索引可能产生严重的负面影响。错误类型或错误列上的索引只会消耗空间和处理资源。作为数据库管理员，你必须制定策略以确保索引能增强性能，而不会对应用程序产生负面影响。\n\
    \n表 2-2 总结了本章涵盖的许多索引管理概念。这些建议并非一成不变：请根据你的环境需要进行调整和修改。\n\n![images](img/t0202.jpg)\n\
    \n在数据库中创建和管理索引时，请参考这些准则。这些建议旨在帮助你正确使用索引技术。\n\n### 无段索引\n\n你可以通过 `NOSEGMENT` 子句指示\
    \ Oracle 创建一个永不会被使用且不会为其分配任何区间的索引：\n\n```sql\nSQL> create index cust_idx1 on cust(first_name)\
    \ nosegment;\n```\n\n尽管此索引永远不会被使用，但你可以通过 `_USE_NOSEGMENT_INDEXES` 初始化参数指示 Oracle\
    \ 判断优化器是否会使用该索引——例如：\n\n```sql\nSQL> alter session set \"_use_nosegment_indexes\"\
    =true;\nSQL> set autotrace trace explain;\nSQL> select first_name from cust where\
    \ first_name = 'JIM';\n```\n\n以下是一个示例执行计划，显示了优化器将使用该索引（假设你已正常删除并重新创建了它，不带 `NOSEGMENT`\
    \ 子句）：\n\n```\n-----------------------------------------------------------------------------\n\
    | Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |\n\
    -----------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT |           |     1 |    17 |     1   (0)| 00:00:01 |\n\
    |*  1 |  INDEX RANGE SCAN| CUST_IDX1 |     1 |    17 |     1   (0)| 00:00:01 |\n\
    -----------------------------------------------------------------------------\n\
    ```\n\n这就引出了一个问题：你为何要创建带 `NOSEGMENT` 的索引？如果你有一个非常大的索引，希望在不分配空间的情况下创建它，以确定优化器是否会使用该索引，那么创建带\
    \ `NOSEGMENT` 的索引可以让你测试这种情况。如果你确定该索引有用，可以删除它并重新创建，而不带 `NOSEGMENT` 子句。\n\n## 2-3.\
    \ 创建主键索引\n\n### 问题\n\n你想要强制主键列在表中唯一。此外，主键中的许多列经常在多个查询的 `WHERE` 子句中使用。你希望确保在主键列上创建索引。\n\
    \n### 解决方案\n\n当你为表定义主键约束时，Oracle 会自动为你创建一个关联的索引。有多种方法可用于创建主键约束。我们推荐的方法是使用 `ALTER\
    \ TABLE...ADD CONSTRAINT` 语句。这将同时创建索引和约束。此示例创建了一个名为 `CUST_PK` 的主键约束，并指示 Oracle\
    \ 在 `USERS` 表空间中创建相应的索引（也命名为 `CUST_PK`）：\n\n```sql\nalter table cust add constraint\
    \ cust_pk primary key (cust_id)\nusing index tablespace users;\n```\n\n以下查询和输出提供了关于\
    \ Oracle 创建的约束和索引的详细信息。第一个查询显示约束信息：\n\n```sql\nselect\n  constraint_name\n,constraint_type\n\
    from user_constraints\nwhere table_name = 'CUST';\n```\n```\nCONSTRAINT_NAME \
    \               C\n------------------------------ -\nCUST_PK                 \
    \       P\n```\n\n此查询显示索引信息：\n\n```sql\nselect\n  index_name\n,tablespace_name\n\
    ,index_type\n,uniqueness\nfrom user_indexes\nwhere table_name = 'CUST';\n```\n\
    ```\nINDEX_NAME      TABLESPACE_NAME INDEX_TYPE      UNIQUENESS\n---------------\
    \ --------------- --------------- ---------------\nCUST_PK         USERS     \
    \      NORMAL          UNIQUE\n```\n\n### 工作原理\n\n本配方的解决方案展示了我们推荐创建主键约束及相应索引的方法。在大多数情况下，这种方法是可接受的。然而，你应该知道还有其他几种创建主键约束和索引的方法。这些方法如下所列：\n\
    \n- 先创建索引，然后使用 `ALTER TABLE...ADD CONSTRAINT`。\n- 在 `CREATE TABLE` 语句中内联（与列一起）指定约束。\n\
    - 在 `CREATE TABLE` 语句中行外（与列分开）指定约束。\n\n这些技术将在接下来的小节中描述。\n\n#### 分别创建索引和约束\n\n\
    你可以选择先创建索引，然后通过修改表来应用主键约束。示例如下：\n\n```sql\nSQL> create index cust_pk on cust(cust_id);\n\
    SQL> alter table cust add constraint cust_pk primary key(cust_id);\n```\n\n这种方法的优点是，你可以独立于索引删除或禁用主键约束。如果你处理大量数据，可能需要这种灵活性。这种方法允许你在不重建索引的情况下禁用/重新启用约束。\n\
    \n#### 内联创建约束\n\n你可以直接在 `CREATE TABLE` 语句中内联（与列一起）创建索引。这种方法简单，但不允许多列主键，也不能为约束命名：\n\
    \n```sql\nSQL> create table cust(cust_id number primary key);\n```\n\n如果你没有显式命名约束（如前面的语句），Oracle\
    \ 会自动生成一个类似 `SYS_C123456` 的名称。如果你想显式提供一个名称，可以按如下方式操作：\n\n```sql\ncreate table\
    \ cust(cust_id number constraint cust_pk primary key\nusing index tablespace users);\n\
    ```\n\n这种方法的优点是非常简单。如果你在开发或测试环境中进行实验，这种方法快速且有效。\n\n#### 行外创建约束\n\n你也可以在 `CREATE\
    \ TABLE` 语句中行外（与列分开）定义主键约束：\n\n```sql\ncreate table cust(cust_id number\n,constraint\
    \ cust_pk primary key (cust_id)\nusing index tablespace users);\n```\n\n行外方法相对于内联方法有一个优点：你可以为主键指定多个列。\n\
    \n所有上述创建主键约束和相应索引的技术都是有效的。具体使用哪种技术通常取决于数据库管理员或开发人员的偏好。\n\n## 2-4. 创建唯一索引\n\n###\
    \ 问题\n\n你有一个列（或列的组合），其值应该始终唯一。你希望在该列（或列的组合）上创建一个索引，以强制唯一性，并在查询的 `WHERE` 子句中使用该唯一列时，提供对表的高效访问。\n\
    \n![images](img/square.jpg) **注意** 如果你想在主键列上创建唯一约束，那么你应该显式创建一个主键约束（详情参见配方 2-3）。主键和唯一键的一个区别是，每个表只能有一个主键定义，而可以有多个唯一键。此外，唯一键约束允许空值，而主键约束不允许。"
- fmt: "#### Solution\n\nThis solution focuses on using the `ALTER TABLE...ADD CONSTRAINT`\
    \ statement. When you create a unique key constraint, Oracle will automatically\
    \ create an index for you. This is our recommended approach for creating unique\
    \ key constraints and indexes. This example creates a unique constraint named\
    \ `CUST_UX1` on the combination of the `LAST_NAME` and `FIRST_NAME` columns of\
    \ the `CUST` table:\n\n```sql\nalter table cust add constraint cust_ux1 unique\
    \ (last_name, first_name)\nusing index tablespace users;\n```\n\nThe prior statement\
    \ creates the unique constraint, and additionally Oracle automatically creates\
    \ an associated index. The following query displays the constraint that was created\
    \ successfully:\n\n```sql\nselect\n constraint_name\n,constraint_type\nfrom user_constraints\n\
    where table_name = 'CUST';\n```\n\nHere is a snippet of the output:\n\n```\nCONSTRAINT_NAME\
    \                C\n------------------------------ -\nCUST_UX1               \
    \        U\n```\n\nThis query shows the index that was automatically created along\
    \ with the constraint:\n\n```sql\nselect\n index_name\n,tablespace_name\n,index_type\n\
    ,uniqueness\nfrom user_indexes\nwhere table_name = 'CUST';\n```\n\nHere is some\
    \ sample output:\n\n```\nINDEX_NAME           TABLESPACE INDEX_TYPE UNIQUENESS\n\
    -------------------- ---------- ---------- ---------\nCUST_UX1             USERS\
    \      NORMAL     UNIQUE\n```\n\n#### How It Works\n\nDefining a unique constraint\
    \ ensures that when you insert or update column values, then any combination of\
    \ non-null values are unique. Besides the approach we displayed in the \"Solution\"\
    \ section, there are several additional techniques for creating unique constraints:\n\
    \n*   Use the `CREATE TABLE` statement.\n*   Create a regular index, and then\
    \ use `ALTER TABLE` to add a constraint.\n*   Create a unique index and don't\
    \ add the constraint.\n\nThese techniques are described in the next few subsections.\n\
    \n##### Use CREATE TABLE\n\nListed next is an example of using the `CREATE TABLE`\
    \ statement to include a unique constraint.\n\n```sql\ncreate table cust(\n cust_id\
    \ number\n,last_name varchar2(30)\n,first_name varchar2(30)\n,constraint cust_ux1\
    \ unique(last_name, first_name)\n using index tablespace users);\n```\n\nThe advantage\
    \ of this approach is that it's simple and encapsulates the constraint and index\
    \ creation within one statement.\n\n##### Create Index First, Then Add Constraint\n\
    \nYou have the option of first creating an index and then adding the constraint\
    \ as a separate statement—for example:\n\n```sql\nSQL> create unique index cust_uidx1\
    \ on cust(last_name, first_name) tablespace users;\nSQL> alter table cust add\
    \ constraint cust_uidx1 unique (last_name, first_name);\n```\n\nThe advantage\
    \ of creating the index separate from the constraint is that you can drop or disable\
    \ the constraint without dropping the underlying index. When working with large\
    \ indexes, you may want to consider this approach. If you need to disable the\
    \ constraint for any reason and then re-enable it later, you can do so without\
    \ dropping the index (which may take a long time for large indexes).\n\n#####\
    \ Creating Only a Unique Index\n\nYou can also create just a unique index without\
    \ adding the unique constraint—for example:\n\n```sql\nSQL> create unique index\
    \ cust_uidx1 on cust(last_name, first_name) tablespace users;\n```\n\nWhen you\
    \ create only a unique index explicitly (as in the prior statement), Oracle creates\
    \ a unique index but doesn't add an entry for a constraint in `DBA/ALL/USER_CONSTRAINTS`.\
    \ Why does this matter? Consider this scenario:\n\n```sql\nSQL> insert into cust\
    \ values (1, 'STARK', 'JIM');\nSQL> insert into cust values (1, 'STARK', 'JIM');\n\
    ```\n\nHere's the corresponding error message that is thrown:\n\n```\nERROR at\
    \ line 1:\nORA-00001: unique constraint (MV_MAINT.CUST_UIDX1) violated\n```\n\n\
    If you're asked to troubleshoot this issue, the first place you look is in `DBA_CONSTRAINTS`\
    \ for a constraint named `CUST_UIDX1`. However, there is no information:\n\n```sql\n\
    select\n  constraint_name\nfrom dba_constraints\nwhere constraint_name='CUST_UIDX1';\n\
    ```\n\n```\nno rows selected\n```\n\nThe \"no rows selected\" message can be confusing:\
    \ the error message thrown when you insert into the table indicates that a unique\
    \ constraint has been violated, yet there is no information in the constraint-related\
    \ data-dictionary views. In this situation, you have to look at `DBA_INDEXES`\
    \ to view the details of the unique index that has been created—for example:\n\
    \n```sql\nselect index_name, uniqueness\nfrom dba_indexes where index_name='CUST_UIDX1';\n\
    ```\n\n```\nINDEX_NAME                     UNIQUENESS\n------------------------------\
    \ ----------\nCUST_UIDX1                     UNIQUE\n```\n\n### 2-5\\. Indexing\
    \ Foreign Key Columns\n\n#### Problem\n\nA large number of the queries in your\
    \ application use foreign key columns as predicates in the `WHERE` clause. Therefore,\
    \ for performance reasons, you want to ensure that you have all foreign key columns\
    \ indexed.\n\n#### Solution\n\nUnlike primary key constraints, Oracle does not\
    \ automatically create indexes on foreign key columns. For example, say you have\
    \ a requirement that every record in the `ADDRESS` table be assigned a corresponding\
    \ `CUST_ID` column that exists in the `CUST` table. To enforce this relationship,\
    \ you create a foreign key constraint on the `ADDRESS` table as follows:\n\n```sql\n\
    alter table address add constraint addr_fk1\nforeign key (cust_id) references\
    \ cust(cust_id);\n```\n\n![images](images/square.jpg) **Note** A foreign key column\
    \ must reference a column in the parent table that has a primary key or unique\
    \ key constraint defined on it. Otherwise you'll receive the error “ORA-02270:\
    \ no matching unique or primary key for this column-list.”\n\nYou realize the\
    \ foreign key column is used extensively when joining the `CUST` and `ADDRESS`\
    \ tables and that an index on the foreign key column will dramatically increase\
    \ performance. You have to manually create an index in this situation. For example,\
    \ a regular B-tree index is created on the foreign key column of `CUST_ID` in\
    \ the `ADDRESS` table:\n\n```sql\nSQL> create index addr_fk1 on address(cust_id);\n\
    ```\n\nYou don't have to name the index the same as the foreign key name (as we\
    \ did in the prior lines of code). It's a personal preference as to whether you\
    \ do that. We feel it's easier to maintain environments when the constraint and\
    \ corresponding index have the same name."
