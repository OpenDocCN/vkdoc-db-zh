    \                     998          49     49       2.4      User I/O`\n`control\
    \ file sequential read                     9,785          31      3       1.5\
    \      System I/O`\n```\n\n“前 5 个定时前台事件”部分通常是你发现性能问题的地方，它向你展示了会话“等待”的原因。“前 5 个事件”的信息显示了所有会话的总等待时间，但通常一两个会话是造成大部分等待的原因。务必分别分析总等待次数和平均等待时间（毫秒），以确定等待是否显著。仅仅查看等待事件的总等待次数或总等待时间可能会误导你对重要性的判断。你也必须密切关注事件的平均等待时间。在一个运行良好的数据库中，你应该看到\
    \ `CPU` 和 `I/O` 是主要的等待事件，如本例所示。如果来自并发等待类别的事件（如 `latches`）出现在顶部，请进一步调查这些等待。例如，如果你看到诸如\
    \ `enq: TX - row lock contention`、`gc_buffer_busy`（RAC）或 `latch free` 等事件，通常表明数据库存在争用。如果你看到\
    \ `log file sync` 事件的平均等待时间超过 2 毫秒，请进一步调查该等待事件（第 5 章说明了如何分析各种等待事件）。如果你看到由于 `db\
    \ file sequential read` 或 `db file scattered read` 等待事件导致的大量等待，这表明存在大量的索引读取（这是正常的）或全表扫描正在进行。你可以在\
    \ AWR 报告中找到这些读取事件涉及的 SQL 语句和表。\n\n## 时间模型统计\n\n时间模型统计让你了解数据库如何分配其时间，包括执行 SQL 语句与解析语句所花费的时间。如果解析时间非常高，或者硬解析很显著，你必须进一步调查。\n\
    \n```\n`Time Model Statistics                 DB/Inst: ORCL1/orcl1  Snaps: 1878-1879`\n\
    \n`Statistic Name                                           Time (s)  % of DB\
    \ Time`\n`---------------------------------------------- ------------------ ------------`\n\
    `sql execute elapsed time                              1,791.5          88.2`\n\
    `parse time elapsed                                      700.1          34.5`\n\
    `hard parse elapsed time                                 653.7          32.2`\n\
    ```\n\n## 前 5 个 SQL 语句\n\nAWR 报告的这部分让你能够快速识别出开销最大的 SQL 语句。\n\n```\n`SQL ordered\
    \ by Elapsed Time            DB/Inst: ORCL1/orcl1  Snaps: 1878-1879`\n`-> Captured\
    \ SQL account for   13.7% of Total DB Time (s):           2,032`\n`-> Captured\
    \ PL/SQL account for   19.8% of Total DB Time (s):           2,032`\n\n`     \
    \   Elapsed                  Elapsed Time`\n`        Time (s)    Executions  per\
    \ Exec (s)  %Total    %CPU     %IO    SQL Id`\n`---------------- --------------\
    \ ------------- ------ ------ ------ -------------`\n`           292.4       \
    \       1        292.41   14.4    8.1   61.2 b6usrg82hwsas`\n`…`\n```\n\n你可以使用报告中这部分的\
    \ SQL ID 为开销大的 SQL 语句生成执行计划。\n\n## PGA 直方图\n\n`PGA 聚合目标直方图`显示了数据库执行排序和哈希操作的性能——例如：\n\
    \n```\n `PGA Aggr Target Histogram               DB/Inst: ORCL1/orcl1  Snaps:\
    \ 1878-1879`\n`-> Optimal Executions are purely in-memory operations`\n\n `  Low\
    \       High`\n`Optimal  Optimal    Total Exe cs  Optimal Exe cs 1-Pass Exe cs\
    \ M-Pass Exe cs`\n`------- ------- -------------- -------------- ------------\
    \ ------------`\n `     2K      4K         13,957         13,957            0\
    \            0`\n `    64K    128K             86             86            0\
    \            0`\n `   128K    256K             30             30            0\
    \            0`\n```\n\n在此示例中，数据库正在 PGA 内以最优方式执行所有排序和哈希操作。如果你看到大量的单次通过执行，甚至有一些大型的多次通过执行，这表明\
    \ PGA 太小，你应该考虑增加其大小。\n\n### 工作原理\n\n分析 AWR 报告应该是你排除数据库性能问题（例如查询运行缓慢）的第一步。AWR 报告让你能够快速发现诸如连接数、每秒事务数、缓存命中率、等待事件信息以及使用最多\
    \ CPU 和 I/O 的 SQL 语句等信息。它向你展示了哪些 SQL 语句使用了最多的资源，以及哪些等待事件拖慢了数据库。或许最重要的是，报告告诉你数据库性能在某个特定时间段（白天或夜晚）是否与其通常性能有显著差异。“解决方案”部分总结的\
    \ AWR 报告章节只是 AWR 报告的一小部分。以下是排查性能问题时你必须查看的报告中的其他一些关键部分：\n\n*   前台等待事件\n*   按缓冲区\
    \ Gets 排序的 SQL\n*   按读取次数排序的 SQL\n*   按物理读取排序的 SQL\n*   实例活动统计\n*   日志切换\n*  \
    \ 队列活动\n*   按表空间、数据文件和 SQL 语句的读取\n*   按表扫描的段\n*   按行锁等待的段\n*   Undo 段摘要\n\n根据你正在调查的性能问题的性质，报告中的这些部分中的几个可能会被证明是有用的。除了性能和等待统计信息外，AWR\
    \ 报告还提供了针对 PGA 和 SGA 的建议。当你排除几乎任何数据库性能问题时，AWR 报告确实是你最好的朋友。通常只需几分钟，你就能找到问题的根本原因并想出潜在的解决方法。AWR\
    \ 为你完成了大部分工作——你只需要知道该查找什么！"
- fmt: "## Creating Efficient SQL\n\nStructured Query Language is like any other programming\
    \ language in that it can be coded well, coded poorly, and everywhere in between.\
    \ Learning to create efficient SQL statements has been discussed in countless\
    \ books. This chapter zeroes in on basic SQL coding fundamentals, and addresses\
    \ some techniques to improve performance of your SQL statements. In addition,\
    \ some emphasis is given to ramifications of poorly written SQL, along with a\
    \ few common pitfalls to avoid in your SQL statements within your application.\n\
    \nWriting good SQL statements the first time is the best way to get good performance\
    \ from your SQL queries. Knowing the fundamentals is the key to accomplishing\
    \ the goal of good performance. This chapter focuses on the basics of the SQL\
    \ language:\n*   `SELECT` statement\n*   `WHERE` clause\n*   Joining tables\n\
    *   Subqueries\n*   Set operators\n\nThen, we'll focus on basic techniques to\
    \ improve performance of your queries, as well as help ensure your queries are\
    \ not hindering the performance of other queries within your database. It's important\
    \ to take the time to write efficient SQL statements the first time, which is\
    \ easy to say, but tough to accomplish when balancing client requirements, budgets,\
    \ and project timelines. However, if you adhere to basic coding practices and\
    \ fundamentals, you can greatly improve the performance of your SQL queries.\n\
    \n![images](images/square.jpg) `Note` Several times in this chapter, we make a\
    \ distinction between ISO syntax and traditional Oracle syntax. Specifically,\
    \ we do that with respect to join syntax. However, that distinction is a bit mis-stated.\
    \ With the exception of Oracle's use of the `(+)` to indicate an outer join, all\
    \ of Oracle's join syntax complies with the ISO SQL standard, so it is `all` ISO\
    \ syntax. However, it is common in the field to refer to the more newly implemented\
    \ syntax as “ISO syntax,” and we follow that pattern in this chapter.\n\n## 8-1.\
    \ Retrieving All Rows from a Table\n\n### Problem\n\nYou need to write a query\
    \ to retrieve all rows from a given table within your database.\n\n### Solution\n\
    \nWithin the SQL language, you use the `SELECT` statement to retrieve data from\
    \ the database. Everything following the `SELECT` statement tells Oracle what\
    \ data you need from the database. The first thing you need to determine is from\
    \ which table(s) you need to retrieve data. Once this has been determined, you\
    \ have what you need to be able to run a query to get data from the database.\
    \ If we have an `EMPLOYEES` table within our Oracle database, we can perform a\
    \ `describe` on that table in order to see the structure of the table. By doing\
    \ this, we can see the column names for the table, and can determine which columns\
    \ we want to select from the database.\n\n```\nSQL> describe employees\n Name\
    \                                      Null?    Type\n -----------------------------------------\
    \ -------- ----------------------------\n EMPLOYEE_ID                        \
    \       NOT NULL NUMBER(6)\n FIRST_NAME                                      \
    \   VARCHAR2(20)\n LAST_NAME                                 NOT NULL VARCHAR2(25)\n\
    \ EMAIL                                     NOT NULL VARCHAR2(25)\n PHONE_NUMBER\
    \                                       VARCHAR2(20)\n HIRE_DATE             \
    \                   NOT NULL DATE\n JOB_ID                                   NOT\
    \ NULL VARCHAR2(10)\n SALARY                                            NUMBER(8,2)\n\
    \ COMMISSION_PCT                                    NUMBER(2,2)\n MANAGER_ID \
    \                                        NUMBER(6)\n DEPARTMENT_ID           \
    \                           NUMBER(4)\n```\n\nIf we want to retrieve a list of\
    \ all the employees' names from our `EMPLOYEES` table, we now have all the information\
    \ we need to assemble a simple query against the `EMPLOYEES` table in the database.\
    \ We know we are selecting from the `EMPLOYEES` table, which is needed for the\
    \ `FROM` clause. We also know we want to select the names of the employees, which\
    \ is needed to satisfy the `SELECT` clause. At this point, we can issue the following\
    \ query against the database:\n\n```\nSELECT last_name, first_name\nFROM employees;\n\
    ```\n\n```\nLAST_NAME                 FIRST_NAME\n------------------------- --------------------\n\
    Abel                      Ellen\nBaer                      Hermann\nCabrio   \
    \                 Anthony\nDilly                     Jennifer\nErnst         \
    \            Bruce\n```\n\nIf we want to select all columns from the `EMPLOYEES`\
    \ table, we can list every column from the table in the `SELECT` clause, or we\
    \ can substitute listing every column with the asterisk, which indicates that\
    \ we want to retrieve all the columns:\n\n```\nSELECT *\nFROM employees;\n```\n\
    \nIf our manager wants the format of the output to be a comma-delimited list of\
    \ all the employees' names, we can modify our query to accomplish this task:\n\
    \n```\nSELECT last_name || ', ' || first_name AS \"Employee Name\"\nFROM employees;\n\
    ```\n\n```\nEmployee Name\n-----------------------------------------------\nAbel,\
    \ Ellen\nBaer, Hermann\nCabrio, Anthony\nDilly, Jennifer\nErnst, Bruce\n```\n\n\
    In the foregoing case, we placed the concatenation characters, which are comprised\
    \ of two vertical bars, in the query to indicate that we are combining the contents\
    \ of multiple columns into a single output column. At the same time, we are creating\
    \ a column alias by using the `AS` clause, and calling the combined last and first\
    \ names “Employee Name”.\n\n### How It Works\n\n`SELECT` is the most fundamental\
    \ statement needed to retrieve data from an Oracle database. While there are many\
    \ clauses and features of a `SELECT` statement, at its most basic, there are really\
    \ only two clauses needed to first retrieve data out of an Oracle database—and\
    \ those clauses are the `SELECT` clause and the `FROM` clause. Normally, more\
    \ is required to accurately retrieve the desired result set. You may want only\
    \ a subset of the columns within a database table, and you may want only a subset\
    \ of rows from a given table. Furthermore, you may want to perform manipulation\
    \ on data pulled from the database. All this requires more sophisticated components\
    \ of the SQL language than the simple `SELECT` statement. However, the `SELECT`\
    \ and `FROM` clauses are the basic building blocks to assemble a query, from the\
    \ most simple of queries to the most complex of queries.\n\n![images](images/square.jpg)\
    \ `Note` In order to select data from any database table, you need to either own\
    \ the table or have been given the privilege to select data from the given set\
    \ of tables.\n\n## 8-2. Retrieve a Subset of Rows from a Table\n\n### Problem\n\
    \nYou want to filter the data from a database `SELECT` query to return only a\
    \ subset of rows from a database table.\n\n### Solution\n\nThe `WHERE` clause\
    \ gives the user the ability to filter rows and return only the desired result\
    \ set back from the database. There are various ways to construct a `WHERE` clause,\
    \ a few of which will be reviewed within this recipe. The first thing that occurs\
    \ within a `WHERE` clause is that one or more columns' values are compared to\
    \ some other value. See [Table 8-1](#Chapter08.html#tab_8_1) for a list of comparison\
    \ operators that can be used within the `WHERE` clause. One of the more common\
    \ comparison operators is the equal sign, which denotes an equality condition:\n\
    \n```\nSELECT *\nFROM EMP\nWHERE deptno = 20;\n```\n\nIn the foregoing query,\
    \ we are selecting all columns from the `EMP` table, which is denoted by using\
    \ the asterisk, and we want only those rows for department 20, which is determined\
    \ by the `WHERE` clause.\n\n![images](images/t0801.jpg)"
  raw: '## Creating Efficient SQL


    Structured Query Language is like any other programming language in that it can
    be coded well, coded poorly, and everywhere in between. Learning to create efficient
    SQL statements has been discussed in countless books. This chapter zeroes in on
    basic SQL coding fundamentals, and addresses some techniques to improve performance
    of your SQL statements. In addition, some emphasis is given to ramifications of
    poorly written SQL, along with a few common pitfalls to avoid in your SQL statements
    within your application.


    Writing good SQL statements the first time is the best way to get good performance
    from your SQL queries. Knowing the fundamentals is the key to accomplishing the
    goal of good performance. This chapter focuses on the basics of the SQL language:


    *   `SELECT` statement

    *   `WHERE` clause

    *   Joining tables

    *   Subqueries

    *   Set operators


    Then, we''ll focus on basic techniques to improve performance of your queries,
    as well as help ensure your queries are not hindering the performance of other
    queries within your database. It''s important to take the time to write efficient
    SQL statements the first time, which is easy to say, but tough to accomplish when
    balancing client requirements, budgets, and project timelines. However, if you
    adhere to basic coding practices and fundamentals, you can greatly improve the
    performance of your SQL queries.


    ![images](images/square.jpg) **Note** Several times in this chapter, we make a
    distinction between ISO syntax and traditional Oracle syntax. Specifically, we
    do that with respect to join syntax. However, that distinction is a bit mis-stated.
    With the exception of Oracle''s use of the `(+)` to indicate an outer join, all
    of Oracle''s join syntax complies with the ISO SQL standard, so it is *all*ISO
    syntax. However, it is common in the field to refer to the more newly implemented
    syntax as “ISO syntax,” and we follow that pattern in this chapter.


    ### 8-1. Retrieving All Rows from a Table


    #### Problem


    You need to write a query to retrieve all rows from a given table within your
    database.


    #### Solution


    Within the SQL language, you use the `SELECT` statement to retrieve data from
    the database. Everything following the `SELECT` statement tells Oracle what data
    you need from the database. The first thing you need to determine is from which
    table(s) you need to retrieve data. Once this has been determined, you have what
    you need to be able to run a query to get data from the database. If we have an
    `EMPLOYEES` table within our Oracle database, we can perform a describe on that
    table in order to see the structure of the table. By doing this, we can see the
    column names for the table, and can determine which columns we want to select
    from the database.


    `SQL> describe employees`

    ` Name                                      Null?    Type`

    ` ----------------------------------------- -------- ----------------------------`

    ` EMPLOYEE_ID                               NOT NULL NUMBER(6)`

    ` FIRST_NAME                                         VARCHAR2(20)`

    ` LAST_NAME                                 NOT NULL VARCHAR2(25)`

    ` EMAIL                                     NOT NULL VARCHAR2(25)`

    ` PHONE_NUMBER                                       VARCHAR2(20)`

    ` HIRE_DATE                                 NOT NULL DATE`

    ` JOB_ID                                    NOT NULL VARCHAR2(10)`

    ` SALARY                                             NUMBER(8,2)`

    ` COMMISSION_PCT                                     NUMBER(2,2)`

    ` MANAGER_ID                                         NUMBER(6)`

    ` DEPARTMENT_ID                                      NUMBER(4)`


    If we want to retrieve a list of all the employees'' names from our `EMPLOYEES`
    table, we now have all the information we need to assemble a simple query against
    the `EMPLOYEES` table in the database. We know we are selecting from the `EMPLOYEES`
    table, which is needed for the `FROM` clause. We also know we want to select the
    names of the employees, which is needed to satisfy the `SELECT` clause. At this
    point, we can issue the following query against the database:


    `SELECT last_name, first_name`

    `FROM employees;`


    `LAST_NAME                 FIRST_NAME`

    `------------------------- --------------------`

    `Abel                      Ellen`

    `Baer                      Hermann`

    `Cabrio                    Anthony`

    `Dilly                     Jennifer`

    `Ernst                     Bruce`


    If we want to select all columns from the `EMPLOYEES` table, we can list every
    column from the table in the `SELECT` clause, or we can substitute listing every
    column with the asterisk, which indicates that we want to retrieve all the columns:


    `SELECT *`

    `FROM employees;`


    If our manager wants the format of the output to be a comma-delimited list of
    all the employees'' names, we can modify our query to accomplish this task:


    `SELECT last_name || '', '' || first_name AS "Employee Name"`

    `FROM employees;`


    `Employee Name`

    `-----------------------------------------------`

    `Abel, Ellen`

    `Baer, Hermann`

    `Cabrio, Anthony`

    `Dilly, Jennifer`

    `Ernst, Bruce`


    In the foregoing case, we placed the concatenation characters, which are comprised
    of two vertical bars, in the query to indicate that we are combining the contents
    of multiple columns into a single output column. At the same time, we are creating
    a column alias by using the `AS` clause, and calling the combined last and first
    names “Employee Name”.


    #### How It Works


    `SELECT` is the most fundamental statement needed to retrieve data from an Oracle
    database. While there are many clauses and features of a `SELECT` statement, at
    its most basic, there are really only two clauses needed to first retrieve data
    out of an Oracle database—and those clauses are the `SELECT` clause and the `FROM`
    clause. Normally, more is required to accurately retrieve the desired result set.
    You may want only a subset of the columns within a database table, and you may
    want only a subset of rows from a given table. Furthermore, you may want to perform
    manipulation on data pulled from the database. All this requires more sophisticated
    components of the SQL language than the simple `SELECT` statement. However, the
    `SELECT` and `FROM` clauses are the basic building blocks to assemble a query,
    from the most simple of queries to the most complex of queries.


    ![images](images/square.jpg) **Note** In order to select data from any database
    table, you need to either own the table or have been given the privilege to select
    data from the given set of tables.


    ### 8-2. Retrieve a Subset of Rows from a Table


    #### Problem


    You want to filter the data from a database `SELECT` query to return only a subset
    of rows from a database table.


    #### Solution


    The `WHERE` clause gives the user the ability to filter rows and return only the
    desired result set back from the database. There are various ways to construct
    a `WHERE` clause, a few of which will be reviewed within this recipe. The first
    thing that occurs within a `WHERE` clause is that one or more columns'' values
    are compared to some other value. See [Table 8-1](#Chapter08.html#tab_8_1) for
    a list of comparison operators that can be used within the `WHERE` clause. One
    of the more common comparison operators is the equal sign, which denotes an equality
    condition:


    `SELECT *`

    `FROM EMP`

    `WHERE deptno = 20;`


    In the foregoing query, we are selecting all columns from the `EMP` table, which
    is denoted by using the asterisk, and we want only those rows for department 20,
    which is determined by the `WHERE` clause.


    ![images](images/t0801.jpg)'
  trans: "\n## 创建高效的 SQL\n\n结构化查询语言（SQL）与任何其他编程语言一样，可以编写得好，也可以编写得差，或者介于两者之间。关于如何编写高效的\
    \ SQL 语句，已有无数书籍进行了讨论。本章将聚焦于基本的 SQL 编码基础，并介绍一些提升 SQL 语句性能的技术。此外，本章还将重点阐述编写不良的 SQL\
    \ 所带来的影响，以及在应用程序的 SQL 语句中应避免的一些常见陷阱。\n\n第一次就写出优秀的 SQL 语句，是获得 SQL 查询良好性能的最佳方式。掌握基础知识是实现良好性能目标的关键。本章将重点介绍\
    \ SQL 语言的基础：\n*   `SELECT` 语句\n*   `WHERE` 子句\n*   表连接\n*   子查询\n*   集合运算符\n\n\
    然后，我们将聚焦于提升查询性能的基本技术，同时也有助于确保您的查询不会妨碍数据库中其他查询的性能。重要的是要花时间在第一次就编写出高效的 SQL 语句——这说起来容易，但在平衡客户需求、预算和项目时间表时却难以做到。然而，如果您遵循基本的编码实践和基础知识，就能极大地提升\
    \ SQL 查询的性能。\n\n![images](img/square.jpg) `注意` 在本章中，我们会多次区分 ISO 语法和传统的 Oracle\
    \ 语法。具体来说，是在连接语法方面。然而，这种区分的表述稍欠准确。除了 Oracle 使用`(+)`表示外连接之外，Oracle 的所有连接语法都符合 ISO\
    \ SQL 标准，因此它`全部`是 ISO 语法。不过，业界通常将较新实现的语法称为“ISO 语法”，本章也遵循这一惯例。\n\n## 8-1. 从表中检索所有行\n\
    \n### 问题\n\n您需要编写一个查询，从数据库中的给定表中检索所有行。\n\n### 解决方案\n\n在 SQL 语言中，您使用`SELECT`语句从数据库中检索数据。`SELECT`语句之后的所有内容都告诉\
    \ Oracle 您需要从数据库中获取什么数据。您需要确定的第一件事是从哪个（些）表中检索数据。一旦确定了这一点，您就拥有了运行查询以从数据库获取数据所需的一切。如果我们的\
    \ Oracle 数据库中有一个`EMPLOYEES`表，我们可以对该表执行`describe`操作以查看其结构。通过这样做，我们可以看到表的列名，并确定要从数据库中选择哪些列。\n\
    \n```\nSQL> describe employees\n Name                                      Null?\
    \    Type\n ----------------------------------------- -------- ----------------------------\n\
    \ EMPLOYEE_ID                               NOT NULL NUMBER(6)\n FIRST_NAME  \
    \                                       VARCHAR2(20)\n LAST_NAME             \
    \                    NOT NULL VARCHAR2(25)\n EMAIL                           \
    \          NOT NULL VARCHAR2(25)\n PHONE_NUMBER                              \
    \         VARCHAR2(20)\n HIRE_DATE                                NOT NULL DATE\n\
    \ JOB_ID                                   NOT NULL VARCHAR2(10)\n SALARY    \
    \                                        NUMBER(8,2)\n COMMISSION_PCT        \
    \                            NUMBER(2,2)\n MANAGER_ID                        \
    \                 NUMBER(6)\n DEPARTMENT_ID                                  \
    \    NUMBER(4)\n```\n\n如果我们想从`EMPLOYEES`表中检索所有员工的姓名列表，我们现在就拥有了构建一个针对数据库中`EMPLOYEES`表的简单查询所需的全部信息。我们知道我们是从`EMPLOYEES`表中选择数据，这是`FROM`子句所需的。我们也知道我们想选择员工的姓名，这是满足`SELECT`子句所需的。此时，我们可以向数据库发出以下查询：\n\
    \n```\nSELECT last_name, first_name\nFROM employees;\n```\n\n```\nLAST_NAME  \
    \               FIRST_NAME\n------------------------- --------------------\nAbel\
    \                      Ellen\nBaer                      Hermann\nCabrio      \
    \              Anthony\nDilly                     Jennifer\nErnst            \
    \         Bruce\n```\n\n如果我们想从`EMPLOYEES`表中选择所有列，我们可以在`SELECT`子句中列出表中的每一列，或者我们也可以用星号代替列出每一列，这表示我们想要检索所有列：\n\
    \n```\nSELECT *\nFROM employees;\n```\n\n如果我们希望经理的输出格式是所有员工姓名的逗号分隔列表，我们可以修改查询来完成这个任务：\n\
    \n```\nSELECT last_name || ', ' || first_name AS \"Employee Name\"\nFROM employees;\n\
    ```\n\n```\nEmployee Name\n-----------------------------------------------\nAbel,\
    \ Ellen\nBaer, Hermann\nCabrio, Anthony\nDilly, Jennifer\nErnst, Bruce\n```\n\n\
    在上述案例中，我们在查询中放置了连接字符（由两个竖线组成），表示我们将多个列的内容组合成一个输出列。同时，我们使用`AS`子句创建了一个列别名，并将组合后的姓和名称为“Employee\
    \ Name”。\n\n### 工作原理\n\n`SELECT`是从 Oracle 数据库中检索数据所需的最基本语句。尽管`SELECT`语句有许多子句和特性，但从其最基本的形式来看，实际上只需要两个子句就能从\
    \ Oracle 数据库中首次检索数据——这些子句就是`SELECT`子句和`FROM`子句。通常，要准确检索所需的结果集需要更多条件。您可能只需要数据库表中的列的子集，并且可能只需要给定表中的行的子集。此外，您可能希望对从数据库中提取的数据执行操作。所有这些都需要比简单的`SELECT`语句更复杂的\
    \ SQL 语言组件。然而，`SELECT`和`FROM`子句是构建查询的基本构建块，从最简单的查询到最复杂的查询都是如此。\n\n![images](img/square.jpg)\
    \ `注意` 为了从任何数据库表中选择数据，您需要拥有该表，或者已被授予从指定表集选择数据的权限。\n\n## 8-2. 从表中检索行的子集\n\n###\
    \ 问题\n\n您希望过滤数据库`SELECT`查询的数据，以仅返回数据库表中行的子集。\n\n### 解决方案\n\n`WHERE`子句赋予用户过滤行并仅从数据库返回所需结果集的能力。构建`WHERE`子句有多种方式，本小节将回顾其中几种。在`WHERE`子句中首先发生的是将一个或多个列的值与另一个值进行比较。可在`WHERE`子句中使用的比较运算符列表请参见表\
    \ 8-1。其中一种更常见的比较运算符是等号，它表示一个等值条件：\n\n```\nSELECT *\nFROM EMP\nWHERE deptno = 20;\n\
    ```\n\n在上述查询中，我们从`EMP`表中选择所有列（由星号表示），并且我们只想要部门为 20 的行，这是由`WHERE`子句决定的。\n\n![images](img/t0801.jpg)\n"
- fmt: "# WHERE子句中的多个条件\n\n在许多SQL语句中，`WHERE`子句中可能存在多个条件。编写多个条件需要使用逻辑运算符`OR`、`AND`和`IN`。如果SQL语句中有多个逻辑运算符，Oracle将始终首先计算所有`AND`子句，然后再计算任何`OR`子句。如果同一语句中有匹配的逻辑运算符，则按从左到右的顺序计算。在构建复杂的`WHERE`条件时，这可能会令人困惑。因此，在`WHERE`子句中编写多个条件时，应用括号分隔每个子句，否则可能无法得到预期的结果。这是良好的SQL编码实践，并使SQL代码更易于阅读和维护。例如：\n\
    \n```sql\nSELECT last_name, first_name, salary, email\nFROM employees\nWHERE (department_id\
    \ = 20\nOR department_id = 30)\nAND commission_pct > 0;\n```\n\n如果我们在语句中需要多个`OR`逻辑运算符，可以用`IN`逻辑运算符替换它们，这可以简化我们的SQL语句。通过重写前面的查询以使用`IN`逻辑运算符，我们的查询将如下所示：\n\
    \n```sql\nSELECT last_name, first_name, salary, email\nFROM employees\nWHERE department_id\
    \ IN (20,30)\nAND commission_pct > 0;\n```\n\n如果想查找除部门20或30以外的所有部门的相同信息，SQL代码如下所示：\n\
    \n```sql\nSELECT last_name, first_name, salary, email\nFROM employees\nWHERE (department_id\
    \ != 20\nAND department_id <> 30)\nAND commission_pct > 0;\n```\n\n请注意，在上面的示例中，为了演示，我们使用了两种“不等于”比较运算符。通常，良好的编码实践是保持一致性，并在所有SQL代码中使用相同的运算符。这可以避免其他需要查看或修改你的SQL代码的人产生混淆。即使是这样细微的差异，也可能让别人思考为什么一段SQL代码用一种方式完成，而另一段SQL代码却用不同的方式完成。编写SQL代码时，追求效率很重要，但同样重要的是以可维护性为出发点来编写代码。如果SQL代码保持一致，它将更易于阅读和维护。\n\
    \n采用前面的SQL语句，我们将再次使用逻辑`OR`运算符，添加`NOT`操作数，并完成相同的任务：\n\n```sql\nSELECT last_name,\
    \ first_name, salary, email\nFROM employees\nWHERE department_id NOT IN(20,30)\n\
    AND commission_pct > 0;\n```\n\n最后两个查询都提供了正确的结果，但在这种情况下，使用`IN`子句简化了我们的SQL语句。\n\
    \n### 8-3. 连接具有对应行的表\n\n#### 问题\n\n在单个查询中，你希望从多个表中检索匹配的行。这些表至少有一个公共列，用于匹配表之间的数据。\n\
    \n#### 解决方案\n\nSQL语言中的连接条件用于在单个查询中组合来自多个表的数据。当连接过程中涉及的所有表中都存在对应的行时，这称为“内连接”。这意味着基于表之间的公共连接列，只返回两个表之间匹配的数据。\n\
    \n假设你想获取公司所有部门所在的城市。在编写SQL语句之前，有两种不同的方法来处理这个问题。你可以使用传统的Oracle语法，也可以使用较新的ISO语法。使用传统的Oracle\
    \ SQL，语法如下：\n\n```sql\nSELECT d.location_id, department_name, city\nFROM departments\
    \ d, locations l\nWHERE d.location_id = l.location_id;\n```\n\n使用ISO语法编写相同的语句，有几种可用的方法：\n\
    \n*   `NATURAL JOIN`\n*   `JOIN … USING`子句\n*   `JOIN … ON`子句\n\n如果使用`NATURAL\
    \ JOIN`子句，你是在让Oracle确定自然连接条件以及将基于哪些列进行连接，因此语句中没有连接子句或条件：\n\n```sql\nSELECT location_id,\
    \ department_name, city\nFROM departments NATURAL JOIN locations;\n```\n\n如果要连接的表具有同名的连接列，你可以指定`JOIN\
    \ ... USING`子句，并在括号中指定这个公共列：\n\n```sql\nSELECT location_id, department_name, city\n\
    FROM departments JOIN locations\nUSING (location_id);\n```\n\n表之间的连接条件通常需要列名不同才能完成连接条件。在这些情况下，`JOIN\
    \ ... ON`子句是合适的：\n\n```sql\nSELECT d.loc_id, department_name, city\nFROM departments\
    \ d JOIN locations l\nON l.location_id = d.loc_id;\n```\n\n#### 工作原理\n\n使用传统的Oracle\
    \ SQL时，需要在`WHERE`子句中指定所有连接条件。因此，`WHERE`子句将包含所有连接条件以及任何过滤条件。\n\n使用ISO SQL时，一个关键优势是连接条件在`FROM`子句中完成，而`WHERE`子句仅用于过滤条件。这使得SQL语句更易于阅读和解读。你不再需要在`WHERE`子句中区分哪些是连接条件，哪些是过滤条件。当你连接三个或更多表时，这一优势更加明显。过滤条件仅在`WHERE`子句中，一目了然：\n\
    \n```sql\nSELECT last_name, first_name, department_name, city,\nstate_province\
    \ state, postal_code zip, country_name\nFROM employees\nJOIN departments USING\
    \ (department_id)\nJOIN locations USING (location_id)\nJOIN countries USING (country_id)\n\
    JOIN regions USING (region_id)\nWHERE department_id = 20;\n```\n\n如果你倾向于使用传统的Oracle\
    \ SQL编写SQL语句，为了代码的可读性和可维护性，一个好的做法是将所有连接条件放在`WHERE`子句的前面，将所有过滤条件放在`WHERE`子句的末尾。如果能使代码简单对齐，也会使代码更易于阅读和维护。这是一种可选的做法，但有助于任何可能需要查看你SQL代码的人：\n\
    \n```sql\nSELECT last_name, first_name, department_name, city,\nstate_province\
    \ state, postal_code zip, country_name\nFROM employees e, departments d, locations\
    \ l, countries c, regions r\nWHERE e.department_id = d.department_id\n  AND d.location_id\
    \   = l.location_id\n  AND l.country_id    = c.country_id\n  AND c.region_id \
    \    = r.region_id\n  AND d.department_id = 20;\n```\n\n此外，当使用`JOIN ... ON`或`JOIN\
    \ ... USING`子句时，指定可选的`INNER`关键字可能更清晰，因为可以立即知道正在执行的是内连接：\n\n```sql\nSELECT location_id,\
    \ department_name, city\nFROM departments INNER JOIN locations\nUSING (location_id);\n\
    ```\n\n### 8-4. 当可能缺少对应行时连接表\n\n#### 问题\n\n你需要来自两个或多个表的数据，但其中一个或多个表中缺少部分数据。例如，你想获取公司所有部门的列表及其基地位置。无论出于何种原因，你被告知公司中列出的位置并不都对应单个部门，这种情况下，没有列出部门位置。"
  raw: '#### How It Works


    In many SQL statements, there can be multiple conditions in a `WHERE` clause.
    Coding multiple conditions is done by using the logical operators `OR`, `AND`,
    and `IN`. If you have multiple logical operators within your SQL statement, Oracle
    will first always evaluate all `AND` clauses prior to any of the `OR` clauses.
    If there are matching logical operators in the same statement, they are evaluated
    from left to right. This can be confusing when constructing a complex `WHERE`
    condition. Therefore, when coding multiple conditions within a `WHERE` clause,
    delimit each clause with parentheses, else you may not get the results you are
    expecting. This is good SQL coding practice, and makes SQL code simpler to read
    and maintain—for example:


    `SELECT last_name, first_name, salary, email`

    `FROM employees`

    **`WHERE (department_id = 20`**

    **`OR department_id = 30)`**

    **`AND commission_pct > 0;`**


    If we have the need for multiple `OR` logical operators within our statement,
    we can replace them with the `IN` logical operator, which can simplify our SQL
    statement. By rewriting the foregoing query to use the `IN` logical operator,
    our query would look like the following:


    `SELECT last_name, first_name, salary, email`

    `FROM employees`

    **`WHERE department_id IN (20,30)`**

    **`AND commission_pct > 0;`**


    If you want to find all the same information for all departments except department
    20 or 30, the SQL code would look like the following:


    `SELECT last_name, first_name, salary, email`

    `FROM employees`

    **`WHERE (department_id != 20`**

    **`AND department_id <> 30)`**

    **`AND commission_pct > 0;`**


    Note that in the foregoing, for demonstration, we used two of the “not equal”
    comparison operators. It is generally good coding practice to be consistent, and
    use the same operators across all of your SQL code. This avoids confusion with
    others who need to look at or modify your SQL code. Even subtle differences like
    this can make someone else ponder why one piece of SQL code was done one way,
    and another piece of SQL code was done a different way. When writing SQL code,
    writing for efficiency is important, but it is equally important to write the
    code with an eye on maintainability.  If SQL code is consistent, it simply will
    be easier to read and maintain.


    Taking the previous SQL statement, we again will use the logical `OR` operator,
    add the `NOT` operand, and accomplish the same task:


    `SELECT last_name, first_name, salary, email`

    `FROM employees`

    **`WHERE department_id NOT IN(20,30)`**

    `AND commission_pct > 0;`


    The last two queries both provided the proper results, but in this case, using
    the `IN` clause simplified our SQL statement.


    ### 8-3. Joining Tables with Corresponding Rows


    #### Problem


    Within a single query, you wish to retrieve matching rows from multiple tables.
    These tables have at least one common column on which to match the data between
    the tables.


    #### Solution


    A join condition within the SQL language is used to combine data from multiple
    tables within a single query. When there are corresponding rows in all tables
    involved in the join process, it is called an “inner join.” What this means is
    that based on the common join columns between the tables, only data that matches
    between the two tables will be returned.


    Let''s say you want to get the city where all departments in your company are
    based. There are two different ways to approach this before writing your SQL statement.
    You can use either traditional Oracle syntax, or the newer ISO syntax. Using traditional
    Oracle SQL, the syntax would be as follows:


    `SELECT d.location_id, department_name, city`

    `FROM departments d, locations l`

    `WHERE d.location_id = l.location_id;`


    To write the same statement using ISO syntax, there are several methods that can
    be used:


    *   Natural Join

    *   JOIN … USING clause

    *   JOIN … ON clause


    If using the `NATURAL JOIN` clause, you are letting Oracle determine the natural
    join condition and which columns will be joined on, and therefore there are no
    join clauses or conditions in the statement:


    `SELECT location_id, department_name, city`

    `FROM departments NATURAL JOIN locations;`


    If tables you are joining have common named join columns, you can specify the
    `JOIN ... USING` clause, and you specify this common column within parentheses:


    `SELECT location_id, department_name, city`

    `FROM departments JOIN locations`

    `USING (location_id);`


    It is very common for the join condition between tables to have differently named
    columns that are needed to complete the join criteria. In these cases, the `JOIN
    ... ON` clause is appropriate:


    `SELECT d.loc_id, department_name, city`

    `FROM departments d JOIN locations l`

    `ON l.location_id = d.loc_id;`


    #### How It Works


    When using traditional Oracle SQL, you need to specify all join conditions in
    the `WHERE` clause. Therefore, the `WHERE` clause will contain all join conditions,
    along with any filtering criteria.


    With ISO SQL, a key advantage is that the join conditions are done in the `FROM`
    clause, and the `WHERE` clause is used solely for filtering criteria. This makes
    SQL statements easier to read and decipher. No longer do you need to determine
    within a `WHERE` clause which statements are join conditions and which are filtering
    criteria. The advantage of this is more evident when you are joining three or
    more tables. The filtering criteria are solely in the `WHERE` clause and are easily
    visible:


    `SELECT last_name, first_name, department_name, city,`

    `state_province state, postal_code zip, country_name`

    `FROM employees`

    `JOIN departments USING (department_id)`

    `JOIN locations USING (location_id)`

    `JOIN countries USING (country_id)`

    `JOIN regions USING (region_id)`

    **`WHERE department_id = 20;`**


    If you prefer to write SQL statements with traditional Oracle SQL, good practice
    just for readability and more maintainable SQL code is to place all join conditions
    first in the `WHERE` clause, and place all filtering criteria at the end of the
    `WHERE` clause. It also makes the code easier to read and maintain if you can
    simply line up the code. This is an optional practice, but helps anyone else who
    may need to look at your SQL code:


    `SELECT last_name, first_name, department_name, city,`

    `state_province state, postal_code zip, country_name`

    `FROM employees e, departments d, locations l, countries c, regions r`

    `WHERE e.department_id = d.department_id`

    `  AND d.location_id   = l.location_id`

    `  AND l.country_id    = c.country_id`

    `  AND c.region_id     = r.region_id`

    **`and d.department_id = 20;`**


    Also, when using the `JOIN ... ON` or `JOIN ... USING` clause, it may be more
    clear to specify the optional `INNER` keyword, as it would immediately be known
    it is an inner join that is being done:


    `SELECT location_id, department_name, city`

    `FROM departments INNER JOIN locations`

    `USING (location_id);`


    ### 8-4. Joining Tables When Corresponding Rows May Be Missing


    #### Problem


    You need data from two or more tables, but some of the data is missing in one
    or more of the tables. For instance, you want to get a list of all of the departments
    for your company, along with their base locations. For whatever reason, you''ve
    been told that there are locations listed within your company that do not map
    to a single department, in which case there are no department locations listed.'
  trans: "# WHERE 子句中的多个条件\n\n在许多 SQL 语句中，`WHERE`子句可能存在多个条件。编写多个条件需要使用逻辑运算符`OR`、`AND`和`IN`。如果\
    \ SQL 语句中有多个逻辑运算符，Oracle 将始终首先计算所有`AND`子句，然后再计算任何`OR`子句。如果同一语句中有多个相同的逻辑运算符，则按从左到右的顺序计算。在构建复杂的`WHERE`条件时，这可能会令人困惑。因此，在`WHERE`子句中编写多个条件时，应使用括号分隔每个子句，否则可能无法得到预期的结果。这是良好的\
    \ SQL 编码实践，并使 SQL 代码更易于阅读和维护。例如：\n\n```sql\nSELECT last_name, first_name, salary,\
    \ email\nFROM employees\nWHERE (department_id = 20\nOR department_id = 30)\nAND\
    \ commission_pct > 0;\n```\n\n如果我们在语句中需要多个`OR`逻辑运算符，可以用`IN`逻辑运算符替换它们，这可以简化我们的\
    \ SQL 语句。通过重写前面的查询以使用`IN`逻辑运算符，我们的查询将如下所示：\n\n```sql\nSELECT last_name, first_name,\
    \ salary, email\nFROM employees\nWHERE department_id IN (20,30)\nAND commission_pct\
    \ > 0;\n```\n\n如果想查找除部门 20 或 30 以外的所有部门的相同信息，SQL 代码如下所示：\n\n```sql\nSELECT last_name,\
    \ first_name, salary, email\nFROM employees\nWHERE (department_id != 20\nAND department_id\
    \ <> 30)\nAND commission_pct > 0;\n```\n\n请注意，在上面的示例中，为了演示，我们使用了两种“不等于”比较运算符。通常，良好的编码实践是保持一致性，并在所有\
    \ SQL 代码中使用相同的运算符。这可以避免其他需要查看或修改你的 SQL 代码的人产生混淆。即使是这样细微的差异，也可能让别人思考为什么一段 SQL 代码用一种方式完成，而另一段\
    \ SQL 代码却用不同的方式完成。编写 SQL 代码时，追求效率很重要，但同样重要的是以可维护性为出发点来编写代码。如果 SQL 代码保持一致，它将更易于阅读和维护。\n\
    \n采用前面的 SQL 语句，我们将再次使用逻辑`OR`运算符，添加`NOT`操作数，并完成相同的任务：\n\n```sql\nSELECT last_name,\
    \ first_name, salary, email\nFROM employees\nWHERE department_id NOT IN(20,30)\n\
    AND commission_pct > 0;\n```\n\n最后两个查询都提供了正确的结果，但在这种情况下，使用`IN`子句简化了我们的 SQL 语句。\n\
    \n### 8-3. 连接具有对应行的表\n\n#### 问题\n\n在单个查询中，你希望从多个表中检索匹配的行。这些表至少有一个公共列，用于匹配表之间的数据。\n\
    \n#### 解决方案\n\nSQL 语言中的连接条件用于在单个查询中组合来自多个表的数据。当连接过程中涉及的所有表中都存在对应的行时，这称为“内连接”。这意味着基于表之间的公共连接列，只返回两个表之间匹配的数据。\n\
    \n假设你想获取公司所有部门所在的城市。在编写 SQL 语句之前，有两种不同的方法来处理这个问题。你可以使用传统的 Oracle 语法，也可以使用较新的 ISO\
    \ 语法。使用传统的 Oracle SQL，语法如下：\n\n```sql\nSELECT d.location_id, department_name,\
    \ city\nFROM departments d, locations l\nWHERE d.location_id = l.location_id;\n\
    ```\n\n使用 ISO 语法编写相同的语句，有几种可用的方法：\n\n*   `自然连接（NATURAL JOIN）`\n*   `JOIN … USING`子句\n\
    *   `JOIN … ON`子句\n\n如果使用`NATURAL JOIN`子句，你是在让 Oracle 确定自然连接条件以及将基于哪些列进行连接，因此语句中没有连接子句或条件：\n\
    \n```sql\nSELECT location_id, department_name, city\nFROM departments NATURAL\
    \ JOIN locations;\n```\n\n如果要连接的表具有同名的连接列，你可以指定`JOIN ... USING`子句，并在括号中指定这个公共列：\n\
    \n```sql\nSELECT location_id, department_name, city\nFROM departments JOIN locations\n\
    USING (location_id);\n```\n\n表之间的连接条件通常需要列名不同才能完成连接条件。在这些情况下，`JOIN ... ON`子句是合适的：\n\
    \n```sql\nSELECT d.loc_id, department_name, city\nFROM departments d JOIN locations\
    \ l\nON l.location_id = d.loc_id;\n```\n\n#### 工作原理\n\n使用传统的 Oracle SQL 时，需要在`WHERE`子句中指定所有连接条件。因此，`WHERE`子句将包含所有连接条件以及任何过滤条件。\n\
    \n使用 ISO SQL 时，一个关键优势是连接条件在`FROM`子句中完成，而`WHERE`子句仅用于过滤条件。这使得 SQL 语句更易于阅读和解读。你不再需要在`WHERE`子句中区分哪些是连接条件，哪些是过滤条件。当你连接三个或更多表时，这一优势更加明显。过滤条件仅在`WHERE`子句中，一目了然：\n\
    \n```sql\nSELECT last_name, first_name, department_name, city,\nstate_province\
    \ state, postal_code zip, country_name\nFROM employees\nJOIN departments USING\
    \ (department_id)\nJOIN locations USING (location_id)\nJOIN countries USING (country_id)\n\
    JOIN regions USING (region_id)\nWHERE department_id = 20;\n```\n\n如果你倾向于使用传统的\
    \ Oracle SQL 编写 SQL 语句，为了代码的可读性和可维护性，一个好的做法是将所有连接条件放在`WHERE`子句的前面，将所有过滤条件放在`WHERE`子句的末尾。如果能使代码简单对齐，也会使代码更易于阅读和维护。这是一种可选的做法，但有助于任何可能需要查看你\
    \ SQL 代码的人：\n\n```sql\nSELECT last_name, first_name, department_name, city,\n\
    state_province state, postal_code zip, country_name\nFROM employees e, departments\
    \ d, locations l, countries c, regions r\nWHERE e.department_id = d.department_id\n\
    \  AND d.location_id   = l.location_id\n  AND l.country_id    = c.country_id\n\
    \  AND c.region_id     = r.region_id\n  AND d.department_id = 20;\n```\n\n此外，当使用`JOIN\
    \ ... ON`或`JOIN ... USING`子句时，指定可选的`INNER`关键字可能更清晰，因为可以立即知道正在执行的是内连接：\n\n```sql\n\
    SELECT location_id, department_name, city\nFROM departments INNER JOIN locations\n\
    USING (location_id);\n```\n\n### 8-4. 当可能缺少对应行时连接表\n\n#### 问题\n\n你需要来自两个或多个表的数据，但其中一个或多个表中缺少部分数据。例如，你想获取公司所有部门的列表及其基地位置。无论出于何种原因，你被告知公司中列出的位置并不都对应单个部门，这种情况下，没有列出部门位置。"
- fmt: "#### Solution\n\nYou need to show all locations, so an inner join will not\
    \ work in this case. Instead, you can write what is termed an outer join. Notice\
    \ the `(+)` syntax in the following example:\n\n```sql\nSELECT l.location_id,\
    \ city, department_id, department_name\nFROM locations l, departments d\nWHERE\
    \ l.location_id = d.location_id(+)\nORDER BY 1;\n```\n\n```\nLOCATION_ID CITY\
    \                 DEPARTMENT_ID DEPARTMENT_NAME\n----------- --------------------\
    \ ------------- -------------------------\n       1100 Venice\n       1400 Southlake\
    \                       60 IT\n       1500 South San Francisco             50\
    \ Shipping\n       1700 Seattle                        170 Manufacturing\n   \
    \    1700 Seattle                        240 Sales\n       1700 Seattle      \
    \                  270 Payroll\n       1700 Seattle                        120\
    \ Treasury\n       1700 Seattle                        110 Accounting\n      \
    \ 1700 Seattle                        100 Finance\n       1700 Seattle       \
    \                  30 Purchasing\n       1800 Toronto                        \
    \ 20 Marketing\n       2000 Beijing\n       2400 London                      \
    \    40 Human Resources\n       2700 Munich                          70 Public\
    \ Relations\n       3200 Mexico City\n```\n\nTo specify an outer join using traditional\
    \ Oracle SQL, simply place a plus sign within parentheses in the `WHERE` clause\
    \ join condition next to a column from the table that you know has missing data.\
    \ We know in the foregoing case that there are locations that are not assigned\
    \ to a single department. From the results, we can see the locations that have\
    \ no departments assigned to them.\n\nTo execute the same query using ISO SQL\
    \ syntax, you use the `LEFT OUTER JOIN` or `RIGHT OUTER JOIN` clauses, which can\
    \ be shortened to `LEFT JOIN` or `RIGHT JOIN`—for example:\n\n```sql\nSELECT location_id,\
    \ city, department_id, department_name\nFROM locations LEFT JOIN departments d\n\
    USING (location_id)\nORDER BY 1;\n```\n\nNow let's say you must execute a query\
    \ in which either table, on either side of the join, could be missing one or more\
    \ corresponding rows. One approach is to create a union of two outer join queries:\n\
    \n```sql\nSELECT last_name, first_name, department_name\nFROM employees e, departments\
    \ d\nWHERE e.manager_id = d.manager_id(+)\nUNION\nSELECT last_name, first_name,\
    \ department_name\nFROM employees e, departments d\nWHERE e.manager_id(+) = d.manager_id\n\
    ORDER BY department_name, last_name, first_name;\n```\n\n```\nLAST_NAME      \
    \           FIRST_NAME           DEPARTMENT_NAME\n------------------------- --------------------\
    \ -------------------------\nGietz                     William              Accounting\n\
    \                                                 Administration\n           \
    \                                      Benefits\nCambrault                 Gerald\
    \               Executive\nChen                      John                 Finance\n\
    \                                                 Government Sales\n         \
    \                                        Human Resources\nPataballa          \
    \       Valli                IT\n                                            \
    \     Manufacturing\nFay                       Pat                  Marketing\n\
    \                                                 Payroll\n                  \
    \                               Public Relations\nTobias                    Sigal\
    \                Purchasing\nTucker                    Peter                Sales\n\
    \                                                 Shareholder Services\nSarchand\
    \                  Nandita              Shipping\n                           \
    \                      Treasury\nLee                       Linda\nMorse      \
    \               Steve\n```\n\nFrom the foregoing results, we can see all employees\
    \ that manage departments, all employees that do not manage departments, as well\
    \ as those departments with no assigned manager.\n\nIn order to do the same query\
    \ using ISO SQL syntax, use the `FULL OUTER JOIN` clause, which can be shortened\
    \ to `FULL JOIN`:\n\n```sql\nSELECT last_name, first_name, department_name\nFROM\
    \ employees FULL JOIN departments\nUSING (manager_id);\n```\n\n#### How It Works\n\
    \nThere are really three outer joins that can be done based on your circumstances.\
    \ [Table 8-2](#Chapter08.html#tab_8_2) describes all the possible join conditions.\
    \ SQL statements using traditional syntax or ISO SQL syntax are both perfectly\
    \ acceptable. However, it is generally easier to write, read, and maintain ISO\
    \ SQL than traditional Oracle SQL.\n\nOne of the main advantages of the ISO syntax\
    \ is that for multiple table joins, all the join conditions are specified in the\
    \ `FROM` clause, and are therefore isolated and easy to see. In Oracle SQL, the\
    \ join conditions are specified in the `WHERE` clause, along with any other filtering\
    \ criteria needed for the query. If you inherited poorly structured SQL code,\
    \ it is simply harder to read longer and more complex SQL statements that have\
    \ join conditions and filtering criteria interspersed within a single `WHERE`\
    \ clause.\n\nOne other type of join not already mentioned is the cross join, which\
    \ is a Cartesian join. While this type of join is rarely useful, it can be occasionally\
    \ beneficial. As a DBA, let's say you are gathering database size information\
    \ for your enterprise of databases, and are placing the results in a single spreadsheet.\
    \ You need to get database and host information for each query. You can execute\
    \ the following query:\n\n```sql\nSELECT d.name, i.host_name, round(sum(f.bytes)/1048576)\
    \ megabytes\nFROM v$database d\nCROSS JOIN v$instance i\nCROSS JOIN v$datafile\
    \ f\nGROUP BY d.name, i.host_name;\n```\n\n```\nNAME      HOST_NAME          \
    \             MEGABYTES\n--------- ------------------------------ ----------\n\
    ORCL      DREGS-PC                             2333\n```\n\nIn this case, the\
    \ `v$instance` and `v$database` views contain only a single row, so there is no\
    \ harm in doing a Cartesian join. The foregoing join could also be written with\
    \ traditional Oracle SQL:\n\n```sql\nSELECT d.name, i.host_name, round(sum(f.bytes)/1048576)\
    \ megabytes\nFROM v$database d, v$instance i, v$datafile f\nGROUP BY d.name, i.host_name;\n\
    ```\n\n![images](images/t0802.jpg)\n\n### 8-5. Constructing Simple Subqueries\n\
    \n#### Problem\n\nYou need to retrieve data from the database, but cannot get\
    \ the data you need using a single query.\n\n#### Solution\n\nIt is common that\
    \ data needs from a relational database are complex enough that the data cannot\
    \ be retrieved within a single SQL `SELECT` statement. Rather than having to run\
    \ two or more queries serially, it is possible to construct several SQL `SELECT`\
    \ statements and place them within a single query. These additional `SELECT` statements\
    \ are called subqueries, sub-selects, or nested selects.\n\nLet's say you want\
    \ to get the name of the employee with the highest salary in your company so you\
    \ can ask your boss for a raise. Since you don't know what the highest salary\
    \ is, you first have to run a query to determine the following:\n\n```sql\nSELECT\
    \ MAX(salary) FROM employees;\n```\n\n```\nMAX(SALARY)\n-----------\n      24000\n\
    ```\n\nThen, knowing what the highest salary is, you could run a second query\
    \ to get the employee(s) with that salary:\n\n```sql\nSELECT last_name, first_name\n\
    FROM employees\nWHERE salary = 24000;\n```\n\n```\nLAST_NAME                 FIRST_NAME\n\
    ------------------------- --------------------\nKing                      Steven\n\
    ```\n\nIt's very simple to combine the foregoing two queries, and construct a\
    \ single SQL statement with a subquery to accomplish the same task:\n\n```sql\n\
    SELECT last_name, first_name\nFROM employees\nWHERE salary =\n(SELECT MAX(salary)\
    \ FROM employees);\n```\n\n```\nLAST_NAME                 FIRST_NAME\n-------------------------\
    \ --------------------\nKing                      Steven\n```"
