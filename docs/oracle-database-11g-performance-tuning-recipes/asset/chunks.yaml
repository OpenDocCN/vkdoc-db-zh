    \ |`\n\n此输出将帮助你确定 SQL 语句的效率，并提供有关如何调整它的见解。有关如何手动调整查询的详细信息，请参阅第 9 章；有关自动 SQL 调优的详细信息，请参阅第\
    \ 11 章。\n\n#### 工作原理\n\n本配方“解决方案”部分描述的过程允许你快速识别资源密集型进程，然后将 OS 进程映射到数据库进程，并随后将数据库进程映射到\
    \ SQL 语句。一旦你知道了哪个 SQL 语句正在消耗资源，就可以生成执行计划，以进一步尝试确定任何可能的低效之处。\n\n有时，资源消耗进程可能与数据库无关。在这些情况下，你必须与你的系统管理员（SA）合作，以确定该进程是什么以及是否可以调整或终止。\n\
    \n此外，你可能会遇到资源密集型进程，它们特定于数据库但与 SQL 语句无关。例如，你可能有一个长时间运行的 RMAN 备份进程、Data Pump 或 PL/SQL\
    \ 作业正在运行。在这些情况下，请与你的 DBA 合作，以确定这些类型的进程是否可以调整或终止。\n\n**ORADEBUG**\n\n如果你知道操作系统\
    \ ID，可以使用 Oracle 的 `oradebug` 实用程序来显示消耗 SQL 语句最多的语句。例如，假设你已经使用 `top` 或 `ps` 等实用程序识别出一个高\
    \ CPU 消耗的操作系统进程，并且从进程名称你确定它是一个数据库进程。现在登录到 SQL*Plus 并使用 `oradebug` 来显示与该进程相关的任何\
    \ SQL。在此示例中，OS 进程 ID 是 7853：\n\n```sql\nSQL> oradebug setospid 7853;\nOracle pid:\
    \ 18, Unix process pid: 7853, image: oracle@xengdb (TNS V1-V3)\n```\n\n现在显示与此进程关联的\
    \ SQL（如果有的话）：\n\n```sql\nSQL> oradebug current_sql;\n```\n\n如果有与该进程关联的 SQL 语句，它将被显示——例如：\n\
    \n```\nselect\n a.table_name\nfrom dba_tables a, dba_indexes b, .....\n```\n\n\
    `oradebug` 实用程序可以通过多种方法用于帮助排查性能问题。你可以通过发出以下命令来显示与会话关联的跟踪文件的名称：\n\n```sql\nSQL>\
    \ oradebug tracefile_name;\n```\n\n使用 `oradebug help` 来显示所有可用选项。\n"
- fmt: "## Troubleshooting the Database\n\nOracle Database 11g offers new ways of\
    \ diagnosing the health of your database. This chapter contains several recipes\
    \ that show how to use the database's built-in diagnostic infrastructure to resolve\
    \ database performance issues. You'll learn how to use `ADRCI`, the Automatic\
    \ Diagnostic Repository Command Interpreter, to perform various tasks such as\
    \ checking the database alert log, creating a diagnostic package for sending to\
    \ Oracle Support engineers, and running a proactive health check of the database.\n\
    \nMany common Oracle database performance-related issues occur when you have space\
    \ issues with the temporary tablespace or when you're creating a large index or\
    \ a large table with the `create table as select` (`CTAS`) technique. Undo tablespace\
    \ space issues are another common source of trouble for many DBAs. This chapter\
    \ has several recipes that help you proactively monitor, diagnose, and resolve\
    \ temporary tablespace and undo tablespace–related issues. When a production database\
    \ seems to hang, there are ways to collect critical diagnostic data for analyzing\
    \ the causes, and this chapter shows you how to log in to an unresponsive database\
    \ to collect diagnostic data.\n\n### 7-1. Determining the Optimal Undo Retention\
    \ Period\n\n#### Problem\n\nYou need to determine the optimal length of time for\
    \ undo retention in your database.\n\n#### Solution\n\nYou can specify the length\
    \ of time Oracle will retain undo data after a transaction commits, by specifying\
    \ the `UNDO_RETENTION` parameter. Here is how to set the undo retention to 30\
    \ minutes for an instance, by updating the value of the `UNDO_RETENTION` parameter\
    \ in the `SPFILE`.\n\n```\nSQl> alter system set undo_retention=1800 scope=both;\n\
    System altered.\nSQL>\n```\n\nTo determine the optimal value for the `UNDO_RETENTION`\
    \ parameter, you must first calculate the actual amount of undo that the database\
    \ is generating. Once you know approximately how much undo the database is generating,\
    \ you can calculate a more precise value for the `UNDO_RETENTION` parameter. Use\
    \ the following formula to calculate the value of the `UNDO_RETENTION` parameter:\n\
    \n`UNDO_RETENTION = UNDO SIZE/(DB_BLOCK_SIZE*UNDO_BLOCK_PER_SEC)`\n\nYou can calculate\
    \ the actual undo that's generated in your database by issuing the following query:\n\
    \n```\nSQL> select sum(d.bytes) \"undo\"\n  2  from v$datafile d,\n  3  v$tablespace\
    \ t,\n  4  dba_tablespaces s\n  5  where s.contents = 'UNDO'\n  6  and s.status\
    \ = 'ONLINE'\n  7  and t.name = s.tablespace_name\n  8  and d.ts# = t.ts#;\n\n\
    \      UNDO\n----------\n  104857600\nSQL>\n```\n\nYou can calculate the value\
    \ of `UNDO_BLOCKS_PER_SEC` with the following query:\n\n```\nSQL> select max(undoblks/((end_time-begin_time)*3600*24))\n\
    \  2  \"UNDO_BLOCK_PER_SEC\"\n  3  FROM v$undostat;\n\nUNDO_BLOCK_PER_SEC\n------------------\n\
    \            7.625\nSQL>\n```\n\nYou most likely remember the block size for your\
    \ database—if not, you can look it up in the `SPFILE` or find it by issuing the\
    \ command `show parameter db_block_size`. Let's say the `db_block_size` is 8 KB\
    \ (8,192 bytes) for your database. You can then calculate the optimal value for\
    \ the `UNDO_RETENTION` parameter using the formula shown earlier in this recipe—for\
    \ example, giving a result in seconds: 1,678.69 = 104,857,600/(7.625 * 8,192).\
    \ In this case, assigning a value of 1,800 seconds for the `undo_retention` parameter\
    \ is appropriate, because it's a bit more than what is indicated by our formula\
    \ for computing the value of this parameter."
  raw: '## Troubleshooting the Database


    Oracle Database 11g offers new ways of diagnosing the health of your database.
    This chapter contains several recipes that show how to use the database''s built-in
    diagnostic infrastructure to resolve database performance issues. You''ll learn
    how to use ADRCI, the Automatic Diagnostic Repository Command Interpreter, to
    perform various tasks such as checking the database alert log, creating a diagnostic
    package for sending to Oracle Support engineers, and running a proactive health
    check of the database.


    Many common Oracle database performance-related issues occur when you have space
    issues with the temporary tablespace or when you''re creating a large index or
    a large table with the `create table as select` (`CTAS`) technique. Undo tablespace
    space issues are another common source of trouble for many DBAs. This chapter
    has several recipes that help you proactively monitor, diagnose, and resolve temporary
    tablespace and undo tablespace–related issues. When a production database seems
    to hang, there are ways to collect critical diagnostic data for analyzing the
    causes, and this chapter shows you how to log in to an unresponsive database to
    collect diagnostic data.


    ### 7-1. Determining the Optimal Undo Retention Period


    #### Problem


    You need to determine the optimal length of time for undo retention in your database.


    #### Solution


    You can specify the length of time Oracle will retain undo data after a transaction
    commits, by specifying the `UNDO_RETENTION` parameter. Here is how to set the
    undo retention to 30 minutes for an instance, by updating the value of the `UNDO_RETENTION`
    parameter in the `SPFILE`.


    `SQl> alter system set undo_retention=1800 scope=both;`


    `System altered.`


    `SQL>`


    To determine the optimal value for the `UNDO_RETENTION` parameter, you must first
    calculate the actual amount of undo that the database is generating. Once you
    know approximately how much undo the database is generating, you can calculate
    a more precise value for the `UNDO_RETENTION` parameter. Use the following formula
    to calculate the value of the `UNDO_RETENTION` parameter:


    `UNDO_RETENTION = UNDO SIZE/(DB_BLOCK_SIZE*UNDO_BLOCK_PER_SEC)`


    You can calculate the actual undo that''s generated in your database by issuing
    the following query:


    `SQL> select sum(d.bytes) "undo"`

    `  2  from v$datafile d,`

    `  3  v$tablespace t,`

    `  4  dba_tablespaces s`

    `  5  where s.contents = ''UNDO''`

    `  6  and s.status = ''ONLINE''`

    `  7  and t.name = s.tablespace_name`

    `  8  and d.ts# = t.ts#;`


    ` UNDO`

    `----------`

    ` 104857600`

    `SQL>`


    You can calculate the value of `UNDO_BLOCKS_PER_SEC` with the following query:


    `SQL> select max(undoblks/((end_time-begin_time)*3600*24))`

    `  2  "UNDO_BLOCK_PER_SEC"`

    `  3  FROM v$undostat;`


    `UNDO_BLOCK_PER_SEC`

    `------------------`

    `             7.625`

    `SQL>`


    You most likely remember the block size for your database—if not, you can look
    it up in the `SPFILE` or find it by issuing the command `show parameter db_block_size`.
    Let''s say the `db_block_size` is 8 KB (8,192 bytes) for your database. You can
    then calculate the optimal value for the `UNDO_RETENTION` parameter using the
    formula shown earlier in this recipe—for example, giving a result in seconds:
    1,678.69 = 104,857,600/(7.625 * 8,192). In this case, assigning a value of 1,800
    seconds for the `undo_retention` parameter is appropriate, because it''s a bit
    more than what is indicated by our formula for computing the value of this parameter.'
  trans: "## 排查数据库故障\n\nOracle Database 11g 提供了诊断数据库健康状况的新方法。本章包含多个操作指南，展示了如何使用数据库内置的诊断基础架构来解决数据库性能问题。您将学习如何使用\
    \ `ADRCI`（自动诊断库命令解释器）来执行各种任务，例如检查数据库警报日志、创建用于发送给 Oracle 支持工程师的诊断包，以及对数据库运行主动健康检查。\n\
    \n许多常见的 Oracle 数据库性能问题发生在临时表空间出现空间问题时，或者在您使用 `create table as select` (`CTAS`)\
    \ 技术创建大型索引或大型表时。撤销表空间的空间问题是许多 DBA 面临的另一个常见麻烦来源。本章提供了多个操作指南，帮助您主动监控、诊断和解决与临时表空间及撤销表空间相关的问题。当生产数据库似乎挂起时，有办法收集用于分析原因的关键诊断数据，本章将向您展示如何登录到无响应的数据库以收集诊断数据。\n\
    \n### 7-1. 确定最佳的撤销保留期\n\n#### 问题\n\n您需要确定数据库中撤销保留的最佳时长。\n\n#### 解决方案\n\n您可以通过指定\
    \ `UNDO_RETENTION` 参数，来设定 Oracle 在事务提交后保留撤销数据的时间长度。以下是如何通过更新 `SPFILE` 中的 `UNDO_RETENTION`\
    \ 参数值，为实例将撤销保留期设置为 30 分钟。\n\n```\nSQL> alter system set undo_retention=1800 scope=both;\n\
    系统已更改。\nSQL>\n```\n\n要确定 `UNDO_RETENTION` 参数的最佳值，您必须首先计算数据库实际生成的撤销量。一旦您大致了解数据库生成的撤销量，就可以为\
    \ `UNDO_RETENTION` 参数计算一个更精确的值。使用以下公式计算 `UNDO_RETENTION` 参数的值：\n\n`UNDO_RETENTION\
    \ = UNDO SIZE/(DB_BLOCK_SIZE*UNDO_BLOCK_PER_SEC)`\n\n您可以通过执行以下查询来计算数据库中生成的实际撤销量：\n\
    \n```\nSQL> select sum(d.bytes) \"undo\"\n  2  from v$datafile d,\n  3  v$tablespace\
    \ t,\n  4  dba_tablespaces s\n  5  where s.contents = 'UNDO'\n  6  and s.status\
    \ = 'ONLINE'\n  7  and t.name = s.tablespace_name\n  8  and d.ts# = t.ts#;\n\n\
    \      UNDO\n----------\n  104857600\nSQL>\n```\n\n您可以通过以下查询计算 `UNDO_BLOCKS_PER_SEC`\
    \ 的值：\n\n```\nSQL> select max(undoblks/((end_time-begin_time)*3600*24))\n  2 \
    \ \"UNDO_BLOCK_PER_SEC\"\n  3  FROM v$undostat;\n\nUNDO_BLOCK_PER_SEC\n------------------\n\
    \            7.625\nSQL>\n```\n\n您很可能记得数据库的块大小——如果不记得，可以在 `SPFILE` 中查找，或通过命令 `show\
    \ parameter db_block_size` 来查找。假设您数据库的 `db_block_size` 是 8 KB（8,192 字节）。然后，您可以使用本配方前面展示的公式来计算\
    \ `UNDO_RETENTION` 参数的最佳值——例如，得出结果（以秒为单位）：1,678.69 = 104,857,600/(7.625 * 8,192)。在这种情况下，为\
    \ `undo_retention` 参数分配 1,800 秒的值是合适的，因为它比我们计算该参数值的公式所指示的值略大一些。"
- fmt: "## How It Works\n\n自动撤销管理是自11g版本以来的默认撤销管理模式。如果您使用数据库配置助手（`DBCA`）创建数据库，Oracle会自动创建一个名为`UNDOTBS1`的自动扩展撤销表空间。如果您是手动创建数据库，则需要在数据库创建语句中指定撤销表空间，或者也可以在之后添加撤销表空间。如果数据库没有显式的撤销表空间，Oracle会将撤销记录存储在`SYSTEM`表空间中。\n\
    \n一旦设置了`UNDO_TABLESPACE`初始化参数，Oracle会自动为您管理撤销保留。您可以选择设置`UNDO_RETENTION`参数，以指定Oracle在用新的撤销数据覆盖旧的撤销数据之前保留它的时间。\n\
    \n“解决方案”部分中的公式展示了如何基于当前数据库活动来确定撤销保留期。请注意，我们依赖动态视图`V$UNDOSTAT`来计算撤销保留期的值。因此，您必须在数据库运行一段时间后再执行查询，以确保它有机会处理典型的工作负载。\n\
    \n如果您配置了`UNDO_RETENTION`参数，那么撤销表空间必须足够大，以容纳在`UNDO_RETENTION`参数指定的时间内数据库生成的撤销数据。当事务提交时，数据库可能会用新的撤销数据覆盖其撤销数据。撤销保留期是数据库尝试保留旧的撤销数据的最短时间。Oracle会为您在`UNDO_RETENTION`参数中指定的持续时间内保留撤销数据，既用于读一致性目的，也用于支持Oracle闪回操作。在为`UNDO_RETENTION`参数指定的时间段保存撤销数据后，数据库会将这些撤销数据标记为*过期*，并将其占用的空间提供给新事务写入撤销数据。\n\
    \n默认情况下，数据库使用以下标准来确定需要保留撤销数据的时间：\n*   最长查询的运行时长\n*   最长事务的运行时长\n*   最长的闪回操作时长\n\
    \n理解Oracle数据库如何处理撤销数据的保留有些复杂。以下是其工作原理的简要总结：\n*   如果您没有使用`AUTOEXTEND`选项配置撤销表空间，数据库将简单地忽略您为`UNDO_RETENTION`参数设置的值。数据库将根据数据库工作负载和撤销表空间的大小自动调整撤销保留期。因此，如果您收到指示数据库未保留足够长时间的撤销数据的错误，请确保将撤销表空间设置为较大的值。通常，在这种情况下，撤销保留时间会显著长于数据库中最长的活动查询的运行时长。\n\
    *   如果您希望数据库尽量遵守您为`UNDO_RETENTION`参数指定的设置，请确保为撤销表空间启用`AUTOEXTEND`选项。这样，Oracle将自动扩展撤销表空间的大小，为新事务腾出写入撤销的空间，而不是覆盖旧的撤销数据。但是，如果您收到`ORA-0155`（快照过旧）错误，例如由于Oracle闪回操作，这意味着数据库无法有效地动态调整撤销保留期。在这种情况下，尝试增加`UNDO_RETENTION`参数的值以匹配最长的Oracle闪回操作的时长。或者，您可以尝试使用更大的固定大小（不带`AUTOEXTEND`选项）的撤销表空间。\n\
    \n确定撤销表空间正确大小或`UNDO_RETENTION`参数正确设置的关键在于理解当前数据库工作负载的性质。为了了解工作负载特征，检查`V$UNDOSTAT`视图至关重要，因为它包含显示数据库如何利用撤销空间的统计数据，以及诸如最长查询的运行时长等信息。您可以使用这些信息来计算当前数据库处理工作负载所需的撤销空间大小。请注意，`V$UNDOSTAT`视图中的每一行都显示一个十分钟时间间隔内的撤销统计信息。该表最多包含576行，每行对应一个十分钟间隔。因此，您可以回顾过去最多四天的撤销使用情况。\n\
    \n对于您感兴趣的时间段（理想情况下，该时间段应包括最长查询正在执行的时间），以下是您应在`V$UNDOSTAT`视图中监控的关键列。您可以使用这些统计信息来调整`UNDO_TABLESPACE`和`UNDO_RETENTION`初始化参数的大小。\n\
    \n> `begin_time`：时间间隔的开始时间。\n>\n> `end_time`：时间间隔的结束时间。\n>\n> `undoblks`：数据库在十分钟间隔内消耗的撤销块数量；这是我们公式中用于估算撤销表空间大小所使用的数据。\n\
    >\n> `txncount`：在十分钟间隔内执行的事务数量。\n>\n> `maxquerylen`：显示在此实例中，在十分钟间隔内执行的最长查询的长度（以秒为单位）。您可以基于`MAXQUERYLEN`列的最大值来估算`UNDO_RETENTION`参数的大小。\n\
    >\n> `maxqueryid`：此间隔内运行时间最长的SQL语句的标识符。\n>\n> `nospaceerrcnt`：数据库在撤销表空间中没有足够可用空间来存储新撤销数据的次数，这是因为整个撤销表空间都被活动事务占用；当然，这意味着您需要增加撤销表空间的空间。\n\
    >\n> `tuned_undoretention`：数据库在提交所属撤销的事务后，将保留撤销数据的时间（以秒为单位）。\n\n以下基于`V$UNDOSTAT`视图的查询展示了Oracle如何根据当前实例工作负载中最长查询的长度（`MAXQUERYLEN`列）自动调整撤销保留（查看`TUNED_UNDORETENTION`列）。\n\
    \n```sql\nSQL> select to_char(begin_time,'hh24:mi:ss') BEGIN_TIME,\n  2  to_char(end_time,'hh24:mi:ss')\
    \ END_TIME,\n  3  maxquerylen,nospaceerrcnt,tuned_undoretention\n  4  from v$undostat;\n\
    \nBEGIN_TI END_TIME MAXQUERYLEN NOSPACEERRCNT TUNED_UNDORETENTION\n-------- --------\
    \ ----------- ------------- -------------------\n12:25:35 12:29:30         892\
    \             0                1673\n12:15:35 12:25:35         592           \
    \  0                1492\n12:05:35 12:15:35        1194             0        \
    \        2094\n11:55:35 12:05:35         592             0                1493\n\
    11:45:35 11:55:35        1195             0                2095\n11:35:35 11:45:35\
    \         593             0                1494\n11:25:35 11:35:35        1196\
    \             0                2097\n11:15:35 11:25:35         594           \
    \  0                1495\n11:05:35 11:15:35        1195             0        \
    \        2096\n10:55:35 11:05:35         593             0                1495\n\
    10:45:35 10:55:35        1198             0                2098\n…\nSQL>\n```\n\
    \n请注意，`TUNED_UNDORETENTION`列的值会根据任何间隔内的最大查询长度（`MAXQUERYLEN`）持续波动。您可以看到这两个列直接相关，Oracle会根据给定间隔（十分钟）内的最大查询长度来提高或降低调整后的撤销保留时间。以下查询显示了每个十分钟间隔内撤销块的使用情况和事务计数。\n\
    \n```sql\nSQL> select to_char(begin_time,'hh24:mi:ss'),to_char(end_time,'hh24:mi:ss'),\n\
    \  2  maxquerylen,ssolderrcnt,nospaceerrcnt,undoblks,txncount from v$undostat\n\
    \  3  order by undoblks\n  4  /\n\nTO_CHAR( TO_CHAR( MAXQUERYLEN SSOLDERRCNT NOSPACEERRCNT\
    \   UNDOBLKS   TXNCOUNT\n-------- -------- ----------- ------------- ----------\
    \ ----------\n17:33:51 17:36:49         550           0             0        \
    \  1         18\n17:23:51 17:33:51         249           0             0     \
    \    33        166\n17:13:51 17:23:51         856           0             0  \
    \       39        520\n17:03:51 17:13:51         250           0             0\
    \         63        171\n16:53:51 17:03:51         850           0           \
    \  0        191        702\n16:43:51 16:53:51         245           0        \
    \     0        429        561\n\n6 rows selected.\n\nSQL>\n```\n\nOracle通过OEM撤销顾问界面提供了一种简单的方法来帮助设置撤销表空间的大小以及撤销保留期。您可以指定顾问进行分析的时间段，最长可回溯一周——顾问使用`AWR`的每小时快照执行其分析。您可以指定撤销保留期以支持闪回事务查询。或者，您可以让数据库根据分析期间最长的查询来确定所需的撤销保留时间。"
  raw: "#### How It Works\n\nAutomatic undo management is the default mode for undo\
    \ management starting with release 11g. If you create a database with the Database\
    \ Configuration Assistant (DBCA), Oracle automatically creates an auto-extending\
    \ undo tablespace named `UNDOTBS1`. If you're manually creating a database, you\
    \ specify the undo tablespace in the database creation statement, or you can add\
    \ the undo tablespace at any point. If a database doesn't have an explicit undo\
    \ tablespace, Oracle will store the undo records in the `SYSTEM` tablespace.\n\
    \nOnce you set the `UNDO_TABLESPACE` initialization parameter, Oracle automatically\
    \ manages undo retention for you. Optionally, you can set the `UNDO_RETENTION`\
    \ parameter to specify how long Oracle retains older undo data before overwriting\
    \ it with newer undo data.\n\nThe formula in the “Solution” section shows how\
    \ to base the undo retention period on current database activity. Note that we\
    \ rely on the dynamic view `V$UNDOSTAT` to calculate the value for the undo retention\
    \ period. Therefore, it's essential that you execute your queries after the database\
    \ has been running for some time, thus ensuring that it has had the chance to\
    \ process a typical workload.\n\nIf you configure the `UNDO_RETENTION` parameter,\
    \ the undo tablespace must be large enough to hold the undo generated by the database\
    \ within the time you specify with the `UNDO_RETENTION` parameter. When a transaction\
    \ commits, the database may overwrite its undo data with newer undo data. The\
    \ undo retention period is the minimum time for which the database will attempt\
    \ to retain older undo data. Oracle retains the undo data for both read consistency\
    \ purposes as well as to support Oracle Flashback operations, for the duration\
    \ you specify with the `UNDO_RETENTION` parameter. After it saves the undo data\
    \ for the period you specified for the `UNDO_RETENTION` parameter, the database\
    \ marks that undo data as *expired* and makes the space occupied by that data\
    \ available to write undo data for new transactions.\n\nBy default, the database\
    \ uses the following criteria to determine how long it needs to retain undo data:\n\
    \n*   Length of the longest-running query\n*   Length of the longest-running transaction\n\
    *   Longest flashback duration\n\nIt's somewhat difficult to understand how the\
    \ Oracle database handles the retention of undo data. Here's a brief summary of\
    \ how things work:\n\n*   If you don't configure the undo tablespace with the\
    \ `AUTOEXTEND` option, the database simply ignores the value you set for the `UNDO_RETENTION`\
    \ parameter. The database will automatically tune the undo retention period based\
    \ on database workload and the size of the undo tablespace. So, make sure you\
    \ set the undo tablespace to a large value if you're receiving errors indicating\
    \ that the database is not retaining undo for a long enough time. Typically, the\
    \ undo retention in this case is for a duration significantly longer than the\
    \ longest-running active query in the database.\n*   If you want the database\
    \ to try to honor the settings you specify for the `UNDO_RETENTION` parameter,\
    \ make sure that you enable the `AUTOEXTEND` option for the undo tablespace. This\
    \ way, Oracle will automatically extend the size of the undo tablespace to make\
    \ room for undo from new transactions, instead of overwriting the older undo data.\
    \ However, if you're receiving `ORA-0155` (snapshot too old) errors, say due to\
    \ Oracle Flashback operations, it means that the database isn't able to dynamically\
    \ tune the undo retention period effectively. In a case such as this, try increasing\
    \ the value of the `UNDO_RETENTION` parameter to match the length of the longest\
    \ Oracle Flashback operation. Alternatively, you can try going to a larger fixed-size\
    \ undo tablespace (without the `AUTOEXTEND` option).\n\nThe key to figuring out\
    \ the right size for the undo tablespace or the correct setting for the `UNDO_RETENTION`\
    \ parameter is to understand the nature of the current database workload. In order\
    \ to understand the workload characteristics, it's important to examine the `V$UNDOSTAT`\
    \ view, because it contains statistics showing how the database is utilizing the\
    \ undo space, as well as information such as the length of the longest-running\
    \ queries. You can use this information to calculate the size of the undo space\
    \ for the current workload your database is processing. Note that each row in\
    \ the `V$UNDOSTAT` view shows undo statistics for a ten-minute time interval.\
    \ The table contains a maximum of 576 rows, each for a ten-minute interval. Thus,\
    \ you can review undo usage for up to four days in the past.\n\nHere are the key\
    \ columns you should monitor in the `V$UNDOSTAT` view for the time period you're\
    \ interested in—ideally, the time period should include the time when your longest-running\
    \ queries are executing. You can use these statistics to size both the `UNDO_TABLESPACE`\
    \ as well as the `UNDO_RETENTION` initialization parameters.\n\n> `begin_time`:\
    \ Beginning of the time interval.\n> \n> `end_time`: End of the time interval.\n\
    > \n> `undoblks`: Number of undo blocks the database consumed in a ten-minute\
    \ interval; this is what we used in our formula for the estimation of the size\
    \ of the undo tablespace.\n> \n> `txncount`: Number of transactions executed in\
    \ a ten-minute interval.\n> \n> `maxquerylen`: This shows the length of the longest\
    \ query (in seconds) executed in this instance during a ten-minute interval. You\
    \ can estimate the size of the `UNDO_RETENTION` parameter based on the maximum\
    \ value of the `MAXQUERYLEN` column.\n> \n> `maxqueryid`: Identifier for the longest-running\
    \ SQL statement in this interval.\n> \n> `nospaceerrcnt`: The number of times\
    \ the database didn't have enough free space available in the undo tablespace\
    \ for new undo data, because the entire undo tablespace was being used by active\
    \ transactions; of course, this means that you need to add space to the undo tablespace.\n\
    > \n> `tuned_undoretention`: The time, in seconds, for which the database will\
    \ retain the undo data after the database commits the transaction to which the\
    \ undo belongs.\n\nThe following query based on the `V$UNDOSTAT` view shows how\
    \ Oracle automatically tunes undo retention (check the `TUNED_UNDORETENTION` column)\
    \ based on the length of the longest-running query (`MAXQUERYLEN` column) in the\
    \ current instance workload.\n\n`SQL> select to_char(begin_time,'hh24:mi:ss')\
    \ BEGIN_TIME,`\n`  2  to_char(end_time,'hh24:mi:ss') END_TIME,`\n`  3  maxquerylen,nospaceerrcnt,tuned_undoretention`\n\
    `  4  from v$undostat;`\n\n`BEGIN_TI END_TIME MAXQUERYLEN NOSPACEERRCNT TUNED_UNDORETENTION`\n\
    `-------- -------- ----------- ------------- -------------------`\n`12:25:35 12:29:30        \
    \ 892             0                1673`\n`12:15:35 12:25:35         592            \
    \ 0                1492`\n`12:05:35 12:15:35        1194             0                2094`\n\
    `11:55:35 12:05:35         592             0                1493`\n`11:45:35 11:55:35        1195            \
    \ 0                2095`\n`11:35:35 11:45:35         593             0                1494`\n\
    `11:25:35 11:35:35        1196             0                2097`\n`11:15:35 11:25:35        \
    \ 594             0                1495`\n`11:05:35 11:15:35        1195            \
    \ 0                2096`\n`10:55:35 11:05:35         593             0                1495`\n\
    `10:45:35 10:55:35        1198             0                2098`\n`…`\n`SQL>`\n\
    \nNote that the value of the `TUNED_UNDORETENTION` column fluctuates continuously,\
    \ based on the value of the maximum query length (`MAXQUERYLEN`) during any interval.\
    \ You can see that the two columns are directly related to each other, with Oracle\
    \ raising or lowering the tuned undo retention based on the maximum query length\
    \ during a given interval (of ten minutes). The following query shows the usage\
    \ of undo blocks and the transaction count during each ten-minute interval.\n\n\
    `SQL> select to_char(begin_time,'hh24:mi:ss'),to_char(end_time,'hh24:mi:ss'),`\n\
    `  2  maxquerylen,ssolderrcnt,nospaceerrcnt,undoblks,txncount from v$undostat`\n\
    `  3  order by undoblks`\n`  4  /`\n\n`TO_CHAR( TO_CHAR( MAXQUERYLEN SSOLDERRCNT\
    \ NOSPACEERRCNT   UNDOBLKS   TXNCOUNT`\n`-------- -------- ----------- -----------\
    \ ------------- ---------- ----------`\n`17:33:51 17:36:49         550          \
    \ 0             0          1         18`\n`17:23:51 17:33:51         249          \
    \ 0             0         33        166`\n`17:13:51 17:23:51         856          \
    \ 0             0         39        520`\n`17:03:51 17:13:51         250          \
    \ 0             0         63        171`\n`16:53:51 17:03:51         850          \
    \ 0             0        191        702`\n`16:43:51 16:53:51         245          \
    \ 0             0        429        561`\n\n`6 rows selected.`\n\n`SQL>`\n\nOracle\
    \ provides an easy way to help set the size of the undo tablespace as well as\
    \ the undo retention period, through the OEM Undo Advisor interface. You can specify\
    \ the length of time for the advisor's analysis, for a period going back to a\
    \ week—the advisor uses the AWR hourly snapshots to perform its analysis. You\
    \ can specify the undo retention period to support a flashback transaction query.\
    \ Alternatively, you can let the database determine the desired undo retention\
    \ based on the longest query in the analysis period."
