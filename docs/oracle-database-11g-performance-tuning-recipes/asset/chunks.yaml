    ## C H A P T E R  1


    ## Optimizing Table Performance


    This chapter details database features that impact the performance of storing
    and retrieving data within a table. Table performance is partially determined
    by database characteristics implemented prior to creating tables. For example,
    the physical storage features implemented when first creating a database and associated
    tablespaces subsequently influence the performance of tables. Similarly, performance
    is also impacted by your choice of initial physical features such as table types
    and data types. Therefore implementing practical database, tablespace, and table
    creation standards (with performance in mind) forms the foundation for optimizing
    data availability and scalability.


    An *Oracle database* is comprised of the physical structures used to store, manage,
    secure, and retrieve data. When first building a database, there are several performance-related
    features that you can implement at the time of database creation. For example,
    the initial layout of the datafiles and the type of tablespace management are
    specified upon creation. Architectural decisions instantiated at this point often
    have long-lasting implications.


    A *tablespace* is the logical structure that allows you to manage a group of datafiles.
    Datafiles are the physical datafiles on disk. When configuring tablespaces, there
    are several features to be aware of that can have far-reaching performance implications,
    namely locally managed tablespaces and automatic segment storage–managed tablespaces.
    When you reasonably implement these features, you maximize your ability to obtain
    acceptable future table performance.


    The *table* is the object that stores data in a database. Database performance
    is a measure of the speed at which an application is able to insert, update, delete,
    and select data. Therefore it''s appropriate that we begin this book with recipes
    that provide solutions regarding problems related to table performance.


    We start by describing aspects of database and tablespace creation that impact
    table performance. We next move on to topics such as choosing table types and
    data types that meet performance-related business requirements. Later topics include
    managing the physical implementation of tablespace usage. We detail issues such
    as detecting table fragmentation, dealing with free space under the high-water
    mark, row chaining, and compressing data. Also described is the Oracle Segment
    Advisor. This handy tool helps you with automating the detection and resolution
    of table fragmentation and unused space.


    ### 1-1. Building a Database That Maximizes Performance


    #### Problem


    You realize when initially creating a database that some features (when enabled)
    have long-lasting ramifications for table performance and availability. Specifically,
    when creating the database, you want to do the following:


    *   Enforce that every tablespace ever created in the database must be locally
    managed. Locally managed tablespaces deliver better performance than the deprecated
    dictionary-managed technology.

    *   Ensure users are automatically assigned a default permanent tablespace. This
    guarantees that when users are created they are assigned a default tablespace
    other than `SYSTEM`. You don''t want users ever creating objects in the `SYSTEM`
    tablespace, as this can adversely affect performance and availability.

    *   Ensure users are automatically assigned a default temporary tablespace. This
    guarantees that when users are created they are assigned a temporary tablespace
    other than `SYSTEM`. You don''t ever want users using the `SYSTEM` tablespace
    for a temporary sorting space, as this can adversely affect performance and availability.


    #### Solution


    Use a script such as the following to create a database that adheres to reasonable
    standards that set the foundation for a well-performing database:


    `CREATE DATABASE O11R2`

    `   MAXLOGFILES 16`

    `   MAXLOGMEMBERS 4`

    `   MAXDATAFILES 1024`

    `   MAXINSTANCES 1`

    `   MAXLOGHISTORY 680`

    `   CHARACTER SET AL32UTF8`

    `DATAFILE`

    `''/ora01/dbfile/O11R2/system01.dbf''`

    `   SIZE 500M REUSE`

    `   EXTENT MANAGEMENT LOCAL`

    `UNDO TABLESPACE undotbs1 DATAFILE`

    `''/ora02/dbfile/O11R2/undotbs01.dbf''`

    `   SIZE 800M`

    `SYSAUX DATAFILE`

    `''/ora03/dbfile/O11R2/sysaux01.dbf''`

    `   SIZE 500M`

    `DEFAULT TEMPORARY TABLESPACE TEMP TEMPFILE`

    `''/ora02/dbfile/O11R2/temp01.dbf''`

    `   SIZE 500M`


    `DEFAULT TABLESPACE USERS DATAFILE`

    `''/ora01/dbfile/O11R2/users01.dbf''`

    `   SIZE 50M`

    `LOGFILE GROUP 1`

    `        (''/ora01/oraredo/O11R2/redo01a.rdo'',`

    `         ''/ora02/oraredo/O11R2/redo01b.rdo'') SIZE 200M,`

    `        GROUP 2`

    `        (''/ora01/oraredo/O11R2/redo02a.rdo'',`

    `         ''/ora02/oraredo/O11R2/redo02b.rdo'') SIZE 200M,`

    `        GROUP 3`

    `        (''/ora01/oraredo/O11R2/redo03a.rdo'',`

    `         ''/ora02/oraredo/O11R2/redo03b.rdo'') SIZE 200M`

    `USER sys    IDENTIFIED BY topfoo`

    `USER system IDENTIFIED BY topsecrectfoo;`


    The prior `CREATE DATABASE` script helps establish a good foundation for performance
    by enabling features such as the following:


    *   Defines the `SYSTEM` tablespace as locally managed via the `EXTENT MANAGEMENT
    LOCAL` clause; this ensures that all tablespaces ever created in database are
    locally managed. If you are using Oracle Database 11g R2 or higher, the `EXTENT
    MANAGEMENT DICTIONARY` clause has been deprecated.

    *   Defines a default tablespace named `USERS` for any user created without an
    explicitly defined default tablespace; this helps prevent users from being assigned
    the `SYSTEM` tablespace as the default. Users created with a default tablespace
    of `SYSTEM` can have an adverse impact on performance.

    *   Defines a default temporary tablespace named `TEMP` for all users; this helps
    prevent users from being assigned the `SYSTEM` tablespace as the default temporary
    tablespace. Users created with a default temporary tablespace of `SYSTEM` can
    have an adverse impact on performance, as this will cause contention for resources
    in the `SYSTEM` tablespace.


    Solid performance starts with a correctly configured database. The prior recommendations
    help you create a reliable infrastructure for your table data.'
  trans: "\n# 第 1 章\n\n## 优化表性能\n\n本章详细介绍了影响表中数据存储与检索性能的数据库特性。表的性能部分取决于在创建表之前实现的数据库特性。例如，首次创建数据库和关联表空间时实现的物理存储特性，会后续影响表的性能。同样，性能也受到您对初始物理特性（如表类型和数据类型）选择的影响。因此，实施实用的数据库、表空间和表创建标准（考虑到性能因素），为优化数据可用性和可扩展性奠定了基础。\n\
    \n一个 `Oracle 数据库` 由用于存储、管理、安全保护和检索数据的物理结构组成。在首次构建数据库时，您可以在数据库创建时实现多个与性能相关的特性。例如，数据文件的初始布局和表空间管理的类型在创建时即被指定。此时做出的架构决策通常具有持久的影响。\n\
    \n`表空间` 是一个逻辑结构，允许您管理一组数据文件。数据文件是磁盘上的物理数据文件。在配置表空间时，有几个需要注意的特性可能对性能产生深远影响，即本地管理的表空间和自动段空间管理（ASSM）的表空间。当您合理地实现这些特性时，就能最大程度地确保未来表的性能可接受。\n\
    \n`表` 是在数据库中存储数据的对象。数据库性能是衡量应用程序执行插入、更新、删除和选择数据操作速度的指标。因此，我们从本书开始就提供关于表性能相关问题的解决方案食谱是恰当的。\n\
    \n我们首先描述影响表性能的数据库和表空间创建的各个方面。接下来，我们将讨论诸如选择满足性能相关业务需求的表类型和数据类型等主题。后续主题包括管理表空间使用的物理实现。我们详细介绍了诸如检测表碎片、处理高水位标记下的空闲空间、行链接和压缩数据等问题。同时介绍了\
    \ Oracle 段顾问。这个方便的工具有助于自动检测和解决表碎片及未使用空间的问题。\n\n### 1-1. 构建最大化性能的数据库\n\n#### 问题\n\
    \n您在最初创建数据库时意识到，某些特性（启用时）会对表的性能和可用性产生持久的影响。具体来说，在创建数据库时，您希望执行以下操作：\n\n*   **强制**数据库中创建的所有表空间都必须是本地管理的。本地管理的表空间比已弃用的字典管理技术提供更好的性能。\n\
    *   确保用户**自动分配**一个默认的永久表空间。这保证了在创建用户时，他们被分配一个 `SYSTEM` 以外的默认表空间。您绝不希望用户在 `SYSTEM`\
    \ 表空间中创建对象，因为这可能对性能和可用性产生不利影响。\n*   确保用户**自动分配**一个默认的临时表空间。这保证了在创建用户时，他们被分配一个\
    \ `SYSTEM` 以外的临时表空间。您绝不希望用户将 `SYSTEM` 表空间用作临时排序空间，因为这可能对性能和可用性产生不利影响。\n\n####\
    \ 解决方案\n\n使用如下脚本创建一个符合合理标准的数据库，这些标准为性能良好的数据库奠定了基础：\n\n```sql\nCREATE DATABASE\
    \ O11R2\n   MAXLOGFILES 16\n   MAXLOGMEMBERS 4\n   MAXDATAFILES 1024\n   MAXINSTANCES\
    \ 1\n   MAXLOGHISTORY 680\n   CHARACTER SET AL32UTF8\nDATAFILE\n'/ora01/dbfile/O11R2/system01.dbf'\n\
    \   SIZE 500M REUSE\n   EXTENT MANAGEMENT LOCAL\nUNDO TABLESPACE undotbs1 DATAFILE\n\
    '/ora02/dbfile/O11R2/undotbs01.dbf'\n   SIZE 800M\nSYSAUX DATAFILE\n'/ora03/dbfile/O11R2/sysaux01.dbf'\n\
    \   SIZE 500M\nDEFAULT TEMPORARY TABLESPACE TEMP TEMPFILE\n'/ora02/dbfile/O11R2/temp01.dbf'\n\
    \   SIZE 500M\nDEFAULT TABLESPACE USERS DATAFILE\n'/ora01/dbfile/O11R2/users01.dbf'\n\
    \   SIZE 50M\nLOGFILE GROUP 1\n        ('/ora01/oraredo/O11R2/redo01a.rdo',\n\
    \         '/ora02/oraredo/O11R2/redo01b.rdo') SIZE 200M,\n        GROUP 2\n  \
    \      ('/ora01/oraredo/O11R2/redo02a.rdo',\n         '/ora02/oraredo/O11R2/redo02b.rdo')\
    \ SIZE 200M,\n        GROUP 3\n        ('/ora01/oraredo/O11R2/redo03a.rdo',\n\
    \         '/ora02/oraredo/O11R2/redo03b.rdo') SIZE 200M\nUSER sys    IDENTIFIED\
    \ BY topfoo\nUSER system IDENTIFIED BY topsecrectfoo;\n```\n\n上述 `CREATE DATABASE`\
    \ 脚本通过启用以下特性，帮助建立了良好的性能基础：\n\n*   通过 `EXTENT MANAGEMENT LOCAL` 子句将 `SYSTEM` 表空间定义为本地管理；这确保数据库中曾经创建的所有表空间都是本地管理的。如果您使用的是\
    \ Oracle Database 11g R2 或更高版本，`EXTENT MANAGEMENT DICTIONARY` 子句已被弃用。\n*   定义了一个名为\
    \ `USERS` 的默认表空间，用于任何未明确指定默认表空间的用户；这有助于防止用户被分配 `SYSTEM` 表空间作为默认值。使用 `SYSTEM` 作为默认表空间创建的用户可能对性能产生不利影响。\n\
    *   为所有用户定义了一个名为 `TEMP` 的默认临时表空间；这有助于防止用户被分配 `SYSTEM` 表空间作为默认临时表空间。使用 `SYSTEM`\
    \ 作为默认临时表空间创建的用户可能对性能产生不利影响，因为这将导致 `SYSTEM` 表空间中的资源争用。\n\n稳固的性能始于正确配置的数据库。上述建议帮助您为表数据创建一个可靠的基础架构。\n\
    \n## 关于技术审阅者\n\n![image](img/surachart_opun.jpg) ![image](img/square.jpg)`Surachart\
    \ Opun` 出生于泰国碧差汶府。他获得了计算机工程学士学位。他在互联网服务提供商行业工作了八年多。他在 Oracle 数据库和 Linux 方面拥有丰富经验。他在\
    \ Oracle 数据库和 Oracle Real Application Clusters (RAC) 方面工作了六年多。他是 Oracle 认证专家（10g\
    \ 和 11g）。他也是 Oracle 认证 RAC 专家。他对 Oracle 数据库技术感兴趣并投入了大量时间。他的博客是 [`http://surachartopun.com`](http://surachartopun.com)。他花费了大量时间分享他的\
    \ Oracle 知识并帮助人们解决 Oracle 技术问题。2010 年，他成为 Oracle ACE，并在泰国发展 Oracle 用户组，他是该组织的贡献者。\n"
- fmt: "## How It Works\n\n一个正确配置和创建的数据库将有助于确保您的数据库性能良好。诚然，您可以在数据库创建后修改特性。然而，通常情况下，一个设计不佳的\
    \ `CREATE DATABASE` 脚本会导致性能上的永久性限制。在生产数据库环境中，有时很难获得重新配置一个配置不当的数据库所需的停机时间。如果可能，请在创建环境的每一步都考虑性能问题，从如何创建数据库开始。\n\
    \n在创建数据库时，您还应该考虑影响可维护性的特性。一个可持续的数据库带来更长的正常运行时间，这是整体性能等式的一部分。“解决方案”部分中的 `CREATE\
    \ DATABASE` 语句也考虑了以下可持续性特性：\n\n*   创建一个自动的 `UNDO` 表空间（通过设置 `UNDO_MANAGEMENT` 和\
    \ `UNDO_TABLESPACE` 初始化参数来启用自动撤销管理）；这允许 Oracle 自动管理回滚段。这使您免于需要定期监控和调整。\n*   将数据文件存放在遵循环境标准的目录中；这有助于维护和可管理性，从而带来更好的长期可用性，进而带来更好的性能。\n\
    *   为 DBA 相关用户设置非默认密码；这确保了数据库更安全，长远来看也能影响性能（例如，如果恶意分子侵入数据库并删除数据，那么性能将会受到影响）。\n\
    *   建立三组在线重做日志，每组两个成员，大小根据事务负载适当设置；重做日志的大小直接影响其切换频率。当重做日志切换过于频繁时，这会降低性能。\n\n您应该花时间确保您构建的每个数据库都遵循普遍接受的标准，这些标准有助于确保您从一个坚实的性能基础开始。\n\
    \n如果您继承了一个数据库并想验证默认永久表空间设置，请使用如下查询：\n\n```\nSELECT *\nFROM database_properties\n\
    WHERE property_name = 'DEFAULT_PERMANENT_TABLESPACE';\n```\n\n如果您需要修改默认永久表空间，请按如下方式操作：\n\
    \n```\nSQL> alter database default tablespace users;\n```\n\n要验证默认临时表空间的设置，请使用此查询：\n\
    \n```\nSELECT *\nFROM database_properties\nWHERE property_name = 'DEFAULT_TEMP_TABLESPACE';\n\
    ```\n\n要更改临时表空间的设置，您可以按如下方式操作：\n\n```\nSQL> alter database default temporary tablespace\
    \ temp;\n```\n\n您可以通过此查询来验证 `UNDO` 表空间设置：\n\n```\nselect name, value\nfrom v$parameter\n\
    where name in ('undo_management','undo_tablespace');\n```\n\n如果您需要更改撤销表空间，首先创建一个新的撤销表空间，然后使用\
    \ `ALTER SYSTEM SET UNDO_TABLESPACE` 语句。\n\n### 1-2. 创建表空间以最大化性能\n\n#### 问题\n\n\
    您意识到表空间是数据库对象（如表和索引）的逻辑容器。此外，您知道如果在创建对象时未指定存储属性，那么表和索引将自动继承它们所在表空间的存储特性。因此，您希望以最大化表性能和可维护性的方式创建表空间。\n\
    \n#### 解决方案\n\n当您有选择时，表空间应始终启用以下两个特性创建：\n\n*   本地管理\n*   自动段空间管理\n\n这是一个启用前述两个特性的创建表空间的示例：\n\
    \n```\ncreate tablespace tools\n  datafile '/ora01/dbfile/INVREP/tools01.dbf'\n\
    \  size 100m                                -- 固定数据文件大小\n  extent management local\
    \                  -- 本地管理\n  uniform size 128k                        -- 统一区大小\n\
    \  segment space management auto            -- ASSM\n/\n```\n\n![images](images/square.jpg)\
    \ 注意：自 Oracle 数据库 11g R2 起，`EXTENT MANAGEMENT DICTIONARY` 子句已被弃用。\n\n本地管理的表空间比字典管理的表空间更高效。此特性通过\
    \ `EXTENT MANAGEMENT LOCAL` 子句启用。此外，如果您在创建数据库时将 `SYSTEM` 表空间设为本地管理，您将不被允许稍后创建字典管理的表空间。这是期望的行为。\n\
    \nASSM 特性允许 Oracle 管理许多以前需要由 DBA 在表级别手动调整的存储特性。ASSM 通过 `SEGMENT SPACE MANAGEMENT\
    \ AUTO` 子句启用。使用 ASSM 使您免于这些手动调整活动。此外，Oracle 的一些空间管理特性（例如收缩表和 SecureFile LOB）仅在使用\
    \ ASSM 表空间时才被允许。如果您想利用这些特性，那么您必须使用 ASSM 创建您的表空间。\n\n您可以通过 `UNIFORM SIZE` 子句选择让表空间中每个区的区大小保持一致。或者，您可以指定\
    \ `AUTOALLOCATE`。这允许 Oracle 分配 64 KB、1 MB、8 MB 和 64 MB 的区大小。如果表空间中的对象大小通常各不相同，您可能更喜欢自动分配行为。"
  raw: '#### How It Works


    A properly configured and created database will help ensure that your database
    performs well. It is true that you can modify features after the database is created.
    However, oftentimes a poorly crafted `CREATE DATABASE` script leads to a permanent
    handicap on performance. In production database environments, it''s sometimes
    difficult to get the downtime that might be required to reconfigure an improperly
    configured database. If possible, think about performance at every step in creating
    an environment, starting with how you create the database.


    When creating a database, you should also consider features that affect maintainability.
    A sustainable database results in more uptime, which is part of the overall performance
    equation. The `CREATE DATABASE` statement in the “Solution” section also factors
    in the following sustainability features:


    *   Creates an automatic `UNDO` tablespace (automatic undo management is enabled
    by setting the `UNDO_MANAGEMENT` and `UNDO_TABLESPACE` initialization parameters);
    this allows Oracle to automatically manage the rollback segments. This relieves
    you of having to regularly monitor and tweak.

    *   Places datafiles in directories that follow standards for the environment;
    this helps with maintenance and manageability, which results in better long-term
    availability and thus better performance.

    *   Sets passwords to non-default values for DBA-related users; this ensures the
    database is more secure, which in the long run can also affect performance (for
    example, if a malcontent hacks into the database and deletes data, then performance
    will suffer).

    *   Establishes three groups of online redo logs, with two members each, sized
    appropriately for the transaction load; the size of the redo log directly affects
    the rate at which they switch. When redo logs switch too often, this can degrade
    performance.


    You should take the time to ensure that each database you build adheres to commonly
    accepted standards that help ensure you start on a firm performance foundation.


    If you''ve inherited a database and want to verify the default permanent tablespace
    setting, use a query such as this:


    `SELECT *`

    `FROM database_properties`

    `WHERE property_name = ''DEFAULT_PERMANENT_TABLESPACE'';`


    If you need to modify the default permanent tablespace, do so as follows:


    `SQL> alter database default tablespace users;`


    To verify the setting of the default temporary tablespace, use this query:


    `SELECT *`

    `FROM database_properties`

    `WHERE property_name = ''DEFAULT_TEMP_TABLESPACE'';`


    To change the setting of the temporary tablespace, you can do so as follows:


    `SQL> alter database default temporary tablespace temp;`


    You can verify the `UNDO` tablespace settings via this query:


    `select name, value`

    `from v$parameter`

    `where name in (''undo_management'',''undo_tablespace'');`


    If you need to change the undo tablespace, first create a new undo tablespace
    and then use the `ALTER SYSTEM SET UNDO_TABLESPACE` statement.


    ### 1-2. Creating Tablespaces to Maximize Performance


    #### Problem


    You realize that tablespaces are the logical containers for database objects such
    as tables and indexes. Furthermore, you''re aware that if you don''t specify storage
    attributes when creating objects, then the tables and indexes automatically inherit
    the storage characteristics of the tablespaces (that the tables and indexes are
    created within). Therefore you want to create tablespaces in a manner that maximizes
    table performance and maintainability.


    #### Solution


    When you have the choice, tablespaces should always be created with the following
    two features enabled:


    *   Locally managed

    *   Automatic segment space management (ASSM)


    Here''s an example of creating a tablespace that enables the prior two features:


    `create tablespace tools`

    `  datafile ''/ora01/dbfile/INVREP/tools01.dbf''`

    `  size 100m                                      -- Fixed datafile size`

    `  extent management local               -- Locally managed`

    `  uniform size 128k                           -- Uniform extent size`

    `  segment space management auto -- ASSM`

    `/`


    ![images](images/square.jpg) **Note** As of Oracle Database 11g R2, the `EXTENT
    MANAGEMENT DICTIONARY` clause has been deprecated.


    Locally managed tablespaces are more efficient than dictionary-managed tablespaces.
    This feature is enabled via the `EXTENT MANAGEMENT LOCAL` clause. Furthermore,
    if you created your database with the `SYSTEM` tablespace as locally managed,
    you will not be permitted to later create a dictionary-managed tablespace. This
    is the desired behavior.


    The ASSM feature allows for Oracle to manage many of the storage characteristics
    that formerly had to be manually adjusted by the DBA on a table-by-table basis.
    ASSM is enabled via the `SEGMENT SPACE MANAGEMENT AUTO` clause. Using ASSM relieves
    you of these manual tweaking activities. Furthermore, some of Oracle''s space
    management features (such as shrinking a table and SecureFile LOBs) are allowed
    only when using ASSM tablespaces. If you want to take advantage of these features,
    then you must create your tablespaces using ASSM.


    You can choose to have the extent size be consistently the same for every extent
    within the tablespace via the `UNIFORM SIZE` clause. Alternatively you can specify
    `AUTOALLOCATE`. This allows Oracle to allocate extent sizes of 64 KB, 1 MB, 8
    MB, and 64 MB. You may prefer the auto-allocation behavior if the objects in the
    tablespace typically are of varying size.'
  trans: "## 工作原理\n\n一个正确配置和创建的数据库将有助于确保您的数据库性能良好。诚然，您可以在数据库创建后修改特性。然而，通常情况下，一个设计不佳的\
    \ `CREATE DATABASE` 脚本会导致性能上的永久性限制。在生产数据库环境中，有时很难获得重新配置一个配置不当的数据库所需的停机时间。如果可能，请在创建环境的每一步都考虑性能问题，从如何创建数据库开始。\n\
    \n在创建数据库时，您还应该考虑影响可维护性的特性。一个可持续的数据库带来更长的正常运行时间，这是整体性能等式的一部分。“解决方案”部分中的 `CREATE\
    \ DATABASE` 语句也考虑了以下可持续性特性：\n\n*   创建一个自动的 `UNDO` 表空间（通过设置 `UNDO_MANAGEMENT` 和\
    \ `UNDO_TABLESPACE` 初始化参数来启用自动撤销管理）；这允许 Oracle 自动管理回滚段。这使您免于需要定期监控和调整。\n*   将数据文件存放在遵循环境标准的目录中；这有助于维护和可管理性，从而带来更好的长期可用性，进而带来更好的性能。\n\
    *   为 DBA 相关用户设置非默认密码；这确保了数据库更安全，长远来看也能影响性能（例如，如果恶意分子侵入数据库并删除数据，那么性能将会受到影响）。\n\
    *   建立三组在线重做日志，每组两个成员，大小根据事务负载适当设置；重做日志的大小直接影响其切换频率。当重做日志切换过于频繁时，这会降低性能。\n\n您应该花时间确保您构建的每个数据库都遵循普遍接受的标准，这些标准有助于确保您从一个坚实的性能基础开始。\n\
    \n如果您继承了一个数据库并想验证默认永久表空间设置，请使用如下查询：\n\n```\nSELECT *\nFROM database_properties\n\
    WHERE property_name = 'DEFAULT_PERMANENT_TABLESPACE';\n```\n\n如果您需要修改默认永久表空间，请按如下方式操作：\n\
    \n```\nSQL> alter database default tablespace users;\n```\n\n要验证默认临时表空间的设置，请使用此查询：\n\
    \n```\nSELECT *\nFROM database_properties\nWHERE property_name = 'DEFAULT_TEMP_TABLESPACE';\n\
    ```\n\n要更改临时表空间的设置，您可以按如下方式操作：\n\n```\nSQL> alter database default temporary tablespace\
    \ temp;\n```\n\n您可以通过此查询来验证 `UNDO` 表空间设置：\n\n```\nselect name, value\nfrom v$parameter\n\
    where name in ('undo_management','undo_tablespace');\n```\n\n如果您需要更改撤销表空间，首先创建一个新的撤销表空间，然后使用\
    \ `ALTER SYSTEM SET UNDO_TABLESPACE` 语句。\n\n### 1-2. 创建表空间以最大化性能\n\n#### 问题\n\n\
    您意识到表空间是数据库对象（如表和索引）的逻辑容器。此外，您知道如果在创建对象时未指定存储属性，那么表和索引将自动继承它们所在表空间的存储特性。因此，您希望以最大化表性能和可维护性的方式创建表空间。\n\
    \n#### 解决方案\n\n当您有选择时，表空间应始终启用以下两个特性创建：\n\n*   本地管理\n*   自动段空间管理\n\n这是一个启用前述两个特性的创建表空间的示例：\n\
    \n```\ncreate tablespace tools\n  datafile '/ora01/dbfile/INVREP/tools01.dbf'\n\
    \  size 100m                                -- 固定数据文件大小\n  extent management local\
    \                  -- 本地管理\n  uniform size 128k                        -- 统一区大小\n\
    \  segment space management auto            -- ASSM\n/\n```\n\n![images](img/square.jpg)\
    \ 注意：自 Oracle 数据库 11g R2 起，`EXTENT MANAGEMENT DICTIONARY` 子句已被弃用。\n\n本地管理的表空间比字典管理的表空间更高效。此特性通过\
    \ `EXTENT MANAGEMENT LOCAL` 子句启用。此外，如果您在创建数据库时将 `SYSTEM` 表空间设为本地管理，您将不被允许稍后创建字典管理的表空间。这是期望的行为。\n\
    \nASSM 特性允许 Oracle 管理许多以前需要由 DBA 在表级别手动调整的存储特性。ASSM 通过 `SEGMENT SPACE MANAGEMENT\
    \ AUTO` 子句启用。使用 ASSM 使您免于这些手动调整活动。此外，Oracle 的一些空间管理特性（例如收缩表和 SecureFile LOB）仅在使用\
    \ ASSM 表空间时才被允许。如果您想利用这些特性，那么您必须使用 ASSM 创建您的表空间。\n\n您可以通过 `UNIFORM SIZE` 子句选择让表空间中每个区的区大小保持一致。或者，您可以指定\
    \ `AUTOALLOCATE`。这允许 Oracle 分配 64 KB、1 MB、8 MB 和 64 MB 的区大小。如果表空间中的对象大小通常各不相同，您可能更喜欢自动分配行为。"
- fmt: "#### How It Works\n\nPrior to Oracle Database 11g R2, you had the option of\
    \ creating a tablespace as dictionary-managed. This architecture uses structures\
    \ in Oracle's data dictionary to manage an object's extent allocation and free\
    \ space. Dictionary-managed tablespaces tend to experience poor performance as\
    \ the number of extents for a table or index reaches the thousands.\n\nYou should\
    \ never use dictionary-managed tablespaces; instead use locally managed tablespaces.\
    \ Locally managed tablespaces use a bitmap in each datafile to manage the object\
    \ extents and free space and are much more efficient than the deprecated dictionary-managed\
    \ architecture.\n\nIn prior versions of Oracle, DBAs would spend endless hours\
    \ monitoring and modifying the physical space management aspects of a table. The\
    \ combination of locally managed and ASSM render many of these space settings\
    \ obsolete. For example, the storage parameters are not valid parameters in locally\
    \ managed tablespaces:\n\n*   `NEXT`\n*   `PCTINCREASE`\n*   `MINEXTENTS`\n* \
    \  `MAXEXTENTS`\n*   `DEFAULT`\n\nThe `SEGMENT SPACE MANAGEMENT AUTO` clause instructs\
    \ Oracle to manage physical space within the block. When you use this clause,\
    \ there is no need to specify parameters such as the following:\n\n*   `PCTUSED`\n\
    *   `FREELISTS`\n*   `FREELIST GROUPS`\n\nThe alternative to `AUTO` space management\
    \ is `MANUAL` space management. When you use `MANUAL`, you can adjust the previously\
    \ mentioned parameters depending on the needs of your application. We recommend\
    \ that you use `AUTO` (and do not use `MANUAL`). Using `AUTO` reduces the number\
    \ of parameters you'd otherwise need to configure and manage. You can verify the\
    \ use of locally managed and ASSM with the following query:\n\n```sql\nselect\n\
    \ tablespace_name\n,extent_management\n,segment_space_management\nfrom dba_tablespaces;\n\
    ```\n\nHere is some sample output:\n\n```sql\nTABLESPACE_NAME                EXTENT_MAN\
    \ SEGMENT\n------------------------------ ---------- -------\nSYSTEM         \
    \                LOCAL      MANUAL\nSYSAUX                         LOCAL     \
    \ AUTO\nUNDOTBS1                       LOCAL      MANUAL\nTEMP               \
    \            LOCAL      MANUAL\nUSERS                          LOCAL      AUTO\n\
    TOOLS                          LOCAL      AUTO\n```\n\n![images](images/square.jpg)\
    \ **Note** You cannot create the `SYSTEM` tablespace with automatic segment space\
    \ management. Also, the ASSM feature is valid only for permanent, locally managed\
    \ tablespaces.\n\nYou can also specify that a datafile automatically grow when\
    \ it becomes full. This is set through the `AUTOEXTEND ON` clause. If you use\
    \ this feature, we recommend that you set an overall maximum size for the datafile.\
    \ This will prevent runaway or erroneous SQL from accidentally consuming all available\
    \ disk space. Here's an example clause:\n\n```sql\nSIZE 1G AUTOEXTEND ON MAXSIZE\
    \ 10G\n```\n\nWhen you create a tablespace, you can also specify the tablespace\
    \ type to be `smallfile` or `bigfile`. Prior to Oracle Database 10g, `smallfile`\
    \ was your only choice. A `smallfile` tablespace allows you to create one or more\
    \ datafiles to be associated with a single tablespace. This allows you to spread\
    \ out the datafiles (associated with one tablespace) across many different mount\
    \ points. For many environments, you'll require this type of flexibility.\n\n\
    The `bigfile` tablespace can have only one datafile associated with it. The main\
    \ advantage of the `bigfile` feature is that you can create very large datafiles,\
    \ which in turn allows you to create very large databases. For example, with the\
    \ 8 KB block size, you can create a datafile as large as 32 TB. With a 32 KB block\
    \ size, you can create a datafile up to 128 TB. Also, when using `bigfile`, you\
    \ will typically have fewer datafiles to manage and maintain. This behavior may\
    \ be desirable in environments where you use Oracle's Automatic Storage Management\
    \ (ASM) feature. In ASM environments, you typically are presented with just one\
    \ logical disk location from which you allocate space.\n\nHere's an example of\
    \ creating a `bigfile` tablespace:\n\n```sql\ncreate bigfile tablespace tools_bf\n\
    \  datafile '/ora01/dbfile/O11R2/tools_bf01.dbf'\n  size 100m\n  extent management\
    \ local\n  uniform size  128k\n  segment space management auto\n/\n```\n\nYou\
    \ can verify the tablespace type via this query:\n\n```sql\nSQL> select tablespace_name,\
    \ bigfile from dba_tablespaces;\n```\n\nUnless specified, the default tablespace\
    \ type is `smallfile`. You can make `bigfile` the default tablespace type for\
    \ a database when you create it via the `SET DEFAULT BIGFILE TABLESPACE` clause.\
    \ You can alter the default tablespace type for a database to be `bigfile` using\
    \ the `ALTER DATABASE SET DEFAULT BIGFILE TABLESPACE` statement.\n\n### 1-3. Matching\
    \ Table Types to Business Requirements\n\n#### Problem\n\nYou're new to Oracle\
    \ and have read about the various table types available. For example, you can\
    \ choose between heap-organized tables, index-organized tables, and so forth.\
    \ You want to build a database application and need to decide which table type\
    \ to use.\n\n#### Solution\n\nOracle provides a wide variety of table types. The\
    \ default table type is heap-organized. For most applications, a heap-organized\
    \ table is an effective structure for storing and retrieving data. However, there\
    \ are other table types that you should be aware of, and you should know the situations\
    \ under which each table type should be implemented. [Table 1-1](#Chapter01.html#tab_1_1)\
    \ describes each table type and its appropriate use.\n\n![images](images/t0101.jpg)\n\
    \n![images](images/t0101a.jpg)\n\n#### How It Works\n\nIn most scenarios, a heap-organized\
    \ table is sufficient to meet your requirements. This Oracle table type is a proven\
    \ structure used in a wide variety of database environments. If you properly design\
    \ your database (normalized structure) and combine that with the appropriate indexes\
    \ and constraints, the result should be a well-performing and maintainable system.\n\
    \nNormally most of your tables will be heap-organized. However, if you need to\
    \ take advantage of a non-heap feature (and are certain of its benefits), then\
    \ certainly do so. For example, Oracle partitioning is a scalable way to build\
    \ very large tables and indexes. Materialized views are a solid feature for aggregating\
    \ and replicating data. Index-organized tables are efficient structures when most\
    \ of the columns are part of the primary key (like an intersection table in a\
    \ many-to-many relationship). And so forth.\n\n![images](images/square.jpg) **Caution**\
    \   You shouldn't choose a table type simply because you think it's a cool feature\
    \ that you recently heard about. Sometimes folks read about a feature and decide\
    \ to implement it without first knowing what the performance benefits or maintenance\
    \ costs will be. You should first be able to test and prove that a feature has\
    \ solid performance benefits.\n\n### 1-4. Choosing Table Features for Performance\n\
    \n#### Problem\n\nWhen creating tables, you want to implement the appropriate\
    \ data types and constraints that maximize performance, scalability, and maintainability.\n\
    \n#### Solution\n\nThere are several performance and sustainability issues that\
    \ you should consider when creating tables. [Table 1-2](#Chapter01.html#tab_1_2)\
    \ describes features specific to table performance.\n\n![images](images/t0102.jpg)\n\
    \n![images](images/t0102a.jpg)\n\n#### How It Works\n\nThe \"Solution\" section\
    \ describes aspects of tables that relate to performance. When creating a table,\
    \ you should also consider features that enhance scalability and availability.\
    \ Oftentimes DBAs and developers don't think of these features as methods for\
    \ improving performance. However, building a stable and supportable database goes\
    \ hand in hand with good performance. [Table 1-3](#Chapter01.html#tab_1_3) describes\
    \ best practices features that promote ease of table management.\n\n![images](images/t0103.jpg)\n\
    \n![images](images/t0103a.jpg)\n\n### 1-5. Avoiding Extent Allocation Delays When\
    \ Creating Tables"
  raw: '#### How It Works


    Prior to Oracle Database 11g R2, you had the option of creating a tablespace as
    dictionary-managed. This architecture uses structures in Oracle''s data dictionary
    to manage an object''s extent allocation and free space. Dictionary-managed tablespaces
    tend to experience poor performance as the number of extents for a table or index
    reaches the thousands.


    You should never use dictionary-managed tablespaces; instead use locally managed
    tablespaces. Locally managed tablespaces use a bitmap in each datafile to manage
    the object extents and free space and are much more efficient than the deprecated
    dictionary-managed architecture.


    In prior versions of Oracle, DBAs would spend endless hours monitoring and modifying
    the physical space management aspects of a table. The combination of locally managed
    and ASSM render many of these space settings obsolete. For example, the storage
    parameters are not valid parameters in locally managed tablespaces:


    *   `NEXT`

    *   `PCTINCREASE`

    *   `MINEXTENTS`

    *   `MAXEXTENTS`

    *   `DEFAULT`


    The `SEGMENT SPACE MANAGEMENT AUTO` clause instructs Oracle to manage physical
    space within the block. When you use this clause, there is no need to specify
    parameters such as the following:


    *   `PCTUSED`

    *   `FREELISTS`

    *   `FREELIST GROUPS`


    The alternative to `AUTO` space management is `MANUAL` space management. When
    you use `MANUAL`, you can adjust the previously mentioned parameters depending
    on the needs of your application. We recommend that you use `AUTO` (and do not
    use `MANUAL)`. Using `AUTO` reduces the number of parameters you''d otherwise
    need to configure and manage. You can verify the use of locally managed and ASSM
    with the following query:


    `select`

    ` tablespace_name`

    `,extent_management`

    `,segment_space_management`

    `from dba_tablespaces;`


    Here is some sample output:


    `TABLESPACE_NAME                EXTENT_MAN SEGMENT`

    `------------------------------ ---------- -------`

    `SYSTEM                         LOCAL      MANUAL`

    `SYSAUX                         LOCAL      AUTO`

    `UNDOTBS1                       LOCAL      MANUAL`

    `TEMP                           LOCAL      MANUAL`

    `USERS                          LOCAL      AUTO`

    `TOOLS                          LOCAL      AUTO`


    ![images](images/square.jpg) **Note** You cannot create the `SYSTEM` tablespace
    with automatic segment space management. Also, the ASSM feature is valid only
    for permanent, locally managed tablespaces.


    You can also specify that a datafile automatically grow when it becomes full.
    This is set through the `AUTOEXTEND ON` clause. If you use this feature, we recommend
    that you set an overall maximum size for the datafile. This will prevent runaway
    or erroneous SQL from accidentally consuming all available disk space. Here''s
    an example clause:


    `SIZE 1G AUTOEXTEND ON MAXSIZE 10G`


    When you create a tablespace, you can also specify the tablespace type to be `smallfile`
    or `bigfile`. Prior to Oracle Database 10g, `smallfile` was your only choice.
    A `smallfile` tablespace allows you to create one or more datafiles to be associated
    with a single tablespace. This allows you to spread out the datafiles (associated
    with one tablespace) across many different mount points. For many environments,
    you''ll require this type of flexibility.


    The `bigfile` tablespace can have only one datafile associated with it. The main
    advantage of the `bigfile` feature is that you can create very large datafiles,
    which in turn allows you to create very large databases. For example, with the
    8 KB block size, you can create a datafile as large as 32 TB. With a 32 KB block
    size, you can create a datafile up to 128 TB. Also, when using `bigfile`, you
    will typically have fewer datafiles to manage and maintain. This behavior may
    be desirable in environments where you use Oracle''s Automatic Storage Management
    (ASM) feature. In ASM environments, you typically are presented with just one
    logical disk location from which you allocate space.


    Here''s an example of creating a `bigfile` tablespace:


    `create bigfile tablespace tools_bf`

    `  datafile ''/ora01/dbfile/O11R2/tools_bf01.dbf''`

    `  size 100m`

    `  extent management local`

    `  uniform size  128k`

    `  segment space management auto`

    `/`


    You can verify the tablespace type via this query:


    `SQL> select tablespace_name, bigfile from dba_tablespaces;`


    Unless specified, the default tablespace type is `smallfile`. You can make `bigfile`
    the default tablespace type for a database when you create it via the `SET DEFAULT
    BIGFILE TABLESPACE` clause. You can alter the default tablespace type for a database
    to be `bigfile` using the `ALTER DATABASE SET DEFAULT BIGFILE TABLESPACE` statement.


    ### 1-3. Matching Table Types to Business Requirements


    #### Problem


    You''re new to Oracle and have read about the various table types available. For
    example, you can choose between heap-organized tables, index-organized tables,
    and so forth. You want to build a database application and need to decide which
    table type to use.


    #### Solution


    Oracle provides a wide variety of table types. The default table type is heap-organized.
    For most applications, a heap-organized table is an effective structure for storing
    and retrieving data. However, there are other table types that you should be aware
    of, and you should know the situations under which each table type should be implemented.
    [Table 1-1](#Chapter01.html#tab_1_1) describes each table type and its appropriate
    use.


    ![images](images/t0101.jpg)


    ![images](images/t0101a.jpg)


    #### How It Works


    In most scenarios, a heap-organized table is sufficient to meet your requirements.
    This Oracle table type is a proven structure used in a wide variety of database
    environments. If you properly design your database (normalized structure) and
    combine that with the appropriate indexes and constraints, the result should be
    a well-performing and maintainable system.


    Normally most of your tables will be heap-organized. However, if you need to take
    advantage of a non-heap feature (and are certain of its benefits), then certainly
    do so. For example, Oracle partitioning is a scalable way to build very large
    tables and indexes. Materialized views are a solid feature for aggregating and
    replicating data. Index-organized tables are efficient structures when most of
    the columns are part of the primary key (like an intersection table in a many-to-many
    relationship). And so forth.


    ![images](images/square.jpg) **Caution**   You shouldn''t choose a table type
    simply because you think it''s a cool feature that you recently heard about. Sometimes
    folks read about a feature and decide to implement it without first knowing what
    the performance benefits or maintenance costs will be. You should first be able
    to test and prove that a feature has solid performance benefits.


    ### 1-4. Choosing Table Features for Performance


    #### Problem


    When creating tables, you want to implement the appropriate data types and constraints
    that maximize performance, scalability, and maintainability.


    #### Solution


    There are several performance and sustainability issues that you should consider
    when creating tables. [Table 1-2](#Chapter01.html#tab_1_2) describes features
    specific to table performance.


    ![images](images/t0102.jpg)


    ![images](images/t0102a.jpg)


    #### How It Works


    The “Solution” section describes aspects of tables that relate to performance.
    When creating a table, you should also consider features that enhance scalability
    and availability. Oftentimes DBAs and developers don''t think of these features
    as methods for improving performance. However, building a stable and supportable
    database goes hand in hand with good performance. [Table 1-3](#Chapter01.html#tab_1_3)
    describes best practices features that promote ease of table management.


    ![images](images/t0103.jpg)


    ![images](images/t0103a.jpg)


    ### 1-5. Avoiding Extent Allocation Delays When Creating Tables'
