- fmt: "#### How It Works\n\nThe `oradebug` utility comes in handy when you can't\
    \ access the session you want to trace, or when the session has already started\
    \ before you can set tracing. `oradebug` lets you attach to the session and start\
    \ the SQL tracing. If you aren't sure about the operating system PID (or SPID)\
    \ associated with an Oracle session, you can find it with the following query.\n\
    \n```sql\nSQL> select p.PID,p.SPID,s.SID\n  2  from v$process p,v$session s\n\
    \  3  where s.paddr = p.addr\n  4* and s.sid = &SESSION_ID\n```\n\n`oradebug`\
    \ is only a facility that allows you to set tracing—it's not a tracing procedure\
    \ by itself. The results of the `10046` trace you obtain with the `oradebug` command\
    \ are identical to those you obtain with a normal event `10046` trace command.\n\
    \nIn the example shown in the “Solution” section, we use the OS PID of the Oracle\
    \ users. You can also specify the Oracle Process Identifier (PID) to trace a session,\
    \ instead of the OS PID.\n\n```sql\nSQL> connect / as sysdba\nSQL> oradebug setorapid\
    \ 9834\nSQL> oradebug unlimit\nSQL> oradebug event 10046 trace name context forever,level\
    \ 12\n```\n\nIn an Oracle RAC environment, as is the case with all other types\
    \ of Oracle tracing, make sure you connect to the correct instance before starting\
    \ the trace. As an alternative to using `oradebug`, you can use the `dbms_system.set_sql_trace_in_session`\
    \ procedure to set a trace in a running session. Note that `DBMS_SYSTEM` is an\
    \ older package, and the recommended way to trace sessions starting with the Oracle\
    \ Database `10g` release is to use the `DBMS_MONITOR` package.\n\n### 10-22. Enabling\
    \ Tracing in a Session After a Login\n\n#### Problem\n\nYou want to trace a user's\
    \ session, but that session starts executing queries immediately after it logs\
    \ in.\n\n#### Solution\n\nIf a session immediately begins executing a query after\
    \ it logs in, it doesn't give you enough time to get the session information and\
    \ start tracing the session. In cases like this, you can create a `logon trigger`\
    \ that automatically starts tracing the session once the session starts. Here\
    \ is one way to create a logon trigger to set up a trace for sessions created\
    \ by a specific user:\n\n```sql\nSQL> create or replace trigger trace_my_user\n\
    \  2    after logon on database\n  3    begin\n  4     if user='SH' then\n  5\
    \     dbms_monitor.session_trace_enable(null,null,true,true);\n  6     end if;\n\
    \  8*   end;\nSQL> /\n```\n\n```\nTrigger created.\n```\n\n```\nSQL>\n```\n\n\
    Before creating the logon trigger, make sure that you grant the user the `alter\
    \ session` privileges, as shown here:\n\n```sql\nSQL> grant alter session to sh,hr;\n\
    ```\n\n```\nGrant succeeded.\n```\n\n```\nSQL>\n```\n\n#### How It Works\n\nOften,\
    \ you find it hard to trace session activity because the session already starts\
    \ executing statements before you can set up the trace. This is especially so\
    \ in a RAC environment, where it is harder for the DBA to identify the instance\
    \ and quickly set up tracing for a running session. A logon trigger is the perfect\
    \ solution for such cases. Note that in a RAC environment, the database generates\
    \ the trace files in the trace directory of the instance to which a user connected.\n\
    \nA logon trigger for tracing sessions is useful for tracing SQL statements issued\
    \ by a specific user, by setting the trace as soon as the user logs in. From that\
    \ point on, the database traces all SQL statements issued by that user. Make sure\
    \ you disable the tracing and drop the logon trigger once you complete tracing\
    \ the SQL statements you are interested in. Remember to revoke the `alter session`\
    \ privilege from the user as well.\n\n### 10-23. Tracing the Optimizer's Execution\
    \ Path\n\n#### Problem\n\nYou want to trace the cost-based optimizer (CBO) to\
    \ examine the execution path for a SQL statement.\n\n#### Solution\n\nYou can\
    \ trace the optimizer's execution path by setting the Oracle event `10053`. Here\
    \ are the steps.\n\n1. Set the trace identifier for the trace file.\n   ```sql\n\
    \   SQL> alter session set tracefile_identifier='10053_trace1'\n   ```\n   ```\n\
    \   Session altered.\n   ```\n   ```\n   SQL>\n   ```\n\n2. Issue the `alter session\
    \ set events` statement to start the trace.\n   ```sql\n   SQL> alter session\
    \ set events '10053 trace name context forever,level 1';\n   ```\n   ```\n   Session\
    \ altered.\n   ```\n   ```\n   SQL>\n   ```\n\n3. Execute the SQL statement whose\
    \ execution path you want to trace.\n   ```sql\n   SQL> select * from users\n\
    \     2  where user_id=88 and\n     3  account_status='OPEN'\n     4  and username='SH';\n\
    \   ```\n   ```\n   ...\n   ```\n   ```\n   SQL>\n   ```\n\n4. Turn the tracing\
    \ off.\n   ```sql\n   SQL> alter session set events '10053 trace name context\
    \ off';\n   ```\n   ```\n   Session altered.\n   ```\n   ```\n   SQL>\n   ```\n\
    \nYou can examine the raw trace file directly to learn how the optimizer went\
    \ about its business in selecting the execution plan for the SQL statement."
  raw: '#### How It Works


    The `oradebug` utility comes in handy when you can''t access the session you want
    to trace, or when the session has already started before you can set tracing.
    `oradebug` lets you attach to the session and start the SQL tracing. If you aren''t
    sure about the operating system PID (or SPID) associated with an Oracle session,
    you can find it with the following query.


    `SQL> select p.PID,p.SPID,s.SID`

    `  2  from v$process p,v$session s`

    `  3  where s.paddr = p.addr`

    `  4* and s.sid = &SESSION_ID`


    `oradebug` is only a facility that allows you to set tracing—it''s not a tracing
    procedure by itself. The results of the 10046 trace you obtain with the `oradebug`
    command are identical to those you obtain with a normal event 10046 trace command.


    In the example shown in the “Solution” section, we use the OS PID of the Oracle
    users. You can also specify the Oracle Process Identifier (PID) to trace a session,
    instead of the OS PID.


    `SQL> connect / as sysdba`

    `SQL> oradebug setorapid 9834`

    `SQL> oradebug unlimit`

    `SQL> oradebug event 10046 trace name context forever,level 12`


    In an Oracle RAC environment, as is the case with all other types of Oracle tracing,
    make sure you connect to the correct instance before starting the trace. As an
    alternative to using `oradebug`, you can use the `dbms_system.set_sql_trace_in_session`
    procedure to set a trace in a running session. Note that `DBMS_SYSTEM` is an older
    package, and the recommended way to trace sessions starting with the Oracle Database
    10g release is to use the `DBMS_MONITOR` package.


    ### 10-22. Enabling Tracing in a Session After a Login


    #### Problem


    You want to trace a user''s session, but that session starts executing queries
    immediately after it logs in.


    #### Solution


    If a session immediately begins executing a query after it logs in, it doesn''t
    give you enough time to get the session information and start tracing the session.
    In cases like this, you can create a *logon trigger* that automatically starts
    tracing the session once the session starts. Here is one way to create a logon
    trigger to set up a trace for sessions created by a specific user:


    `SQL> create or replace trigger trace_my_user`

    `  2    after logon on database`

    `  3    begin`

    `  4     if user=''SH'' then`

    `  5     dbms_monitor.session_trace_enable(null,null,true,true);`

    `  6     end if;`

    `  8*   end;`

    `SQL> /`


    `Trigger created.`


    `SQL>`


    Before creating the logon trigger, make sure that you grant the user the `alter
    session` privileges, as shown here:


    `SQL> grant alter session to sh,hr;`


    `Grant succeeded.`

    `SQL>`


    #### How It Works


    Often, you find it hard to trace session activity because the session already
    starts executing statements before you can set up the trace. This is especially
    so in a RAC environment, where it is harder for the DBA to identify the instance
    and quickly set up tracing for a running session. A logon trigger is the perfect
    solution for such cases. Note that in a RAC environment, the database generates
    the trace files in the trace directory of the instance to which a user connected.


    A logon trigger for tracing sessions is useful for tracing SQL statements issued
    by a specific user, by setting the trace as soon as the user logs in. From that
    point on, the database traces all SQL statements issued by that user. Make sure
    you disable the tracing and drop the logon trigger once you complete tracing the
    SQL statements you are interested in. Remember to revoke the `alter session` privilege
    from the user as well.


    ### 10-23. Tracing the Optimizer''s Execution Path


    #### Problem


    You want to trace the cost-based optimizer (CBO) to examine the execution path
    for a SQL statement.


    #### Solution


    You can trace the optimizer''s execution path by setting the Oracle event 10053\.
    Here are the steps.


    > 1.  Set the trace identifier for the trace file. `SQL> alter session set tracefile_identifier=''10053_trace1''`

    >     `Session altered.`

    >     `SQL>`

    > 2.  Issue the `alter session set events` statement to start the trace. `SQL>
    alter session set events ''10053 trace name context forever,level 1'';`

    >     `Session altered.`

    >     `SQL>`

    > 3.  Execute the SQL statement whose execution path you want to trace. `SQL>
    select * from users`

    >     `  2  where user_id=88 and`

    >     `  3  account_status=''OPEN''`

    >     `  4  and username=''SH'';`

    >     `...`

    >     `SQL>`

    > 4.  Turn the tracing off. `SQL> alter session set events ''10053 trace name
    context off'';`

    >     `Session altered.`

    >     `SQL>`


    You can examine the raw trace file directly to learn how the optimizer went about
    its business in selecting the execution plan for the SQL statement.'
