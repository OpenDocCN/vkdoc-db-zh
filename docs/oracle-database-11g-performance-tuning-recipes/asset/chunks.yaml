- fmt: '### Influence of Extents


    数据库将撤销数据存储在撤销范围中，存在三种不同的撤销范围类型：


    > `Active`：事务当前正在使用这些范围。

    >

    > `Unexpired`：这些范围包含满足由`UNDO_RETENTION`初始化参数指定的撤销保留时间所需的撤销。

    >

    > `Expired`：这些范围包含的撤销保留时间已超过`UNDO_RETENTION`参数指定的持续时间。


    如果数据库在撤销表空间中找不到足够的过期范围，或者无法获取新的撤销范围，它将重用未过期（但永远不会是活动撤销范围）的范围，这就为`ORA-01555`，“snapshot
    too old”错误敞开了大门。默认情况下，如果遇到空间压力以容纳新事务的撤销，数据库实际上会缩小你指定的撤销保留期。由于未过期的撤销范围包含满足撤销保留期所需的撤销记录，覆盖这些范围实际上意味着数据库正在降低你设置的撤销保留期。启用撤销保留保证有助于确保长时间运行的查询以及Oracle
    Flashback操作的成功。撤销保留保证中的“保证”是`真实`的——Oracle肯定会至少在你指定的时间内保留撤销，并且永远不会覆盖任何包含满足撤销保留期所需撤销的未过期撤销范围。然而，这项保证伴随着一个沉重的代价——即使这意味着DML事务因数据库找不到空间来记录这些事务的撤销而失败，Oracle也会保证保留。因此，在启用保证的撤销保留功能时必须格外谨慎。


    ### 7-4. Monitoring Temporary Tablespace Usage


    #### Problem


    你想要监控临时表空间的使用情况。


    #### Solution


    执行以下查询以找出临时表空间中的已使用和空闲空间。


    ```sql

    SQL> select * from (select a.tablespace_name,

          sum(a.bytes/1024/1024) allocated_mb

          from dba_temp_files a

          where a.tablespace_name = upper(''&&temp_tsname'') group by a.tablespace_name)
    x,

          (select sum(b.bytes_used/1024/1024) used_mb,

          sum(b.bytes_free/1024/1024) free_mb

          from v$temp_space_header b

          where b.tablespace_name=upper(''&&temp_tsname'') group by b.tablespace_name);


    Enter value for temp_tsname: TEMP

    …

    TABLESPACE_NAME                ALLOCATED_MB    USED_MB    FREE_MB

    ------------------------------ ------------ ---------- ----------

    TEMP                             52.9921875 52.9921875          0

    SQL>

    ```


    显然，此示例中的临时表空间急需DBA的帮助。


    #### How It Works


    Oracle使用临时表空间存储排序操作的中间结果以及任何临时表、临时LOB和临时B树。你可以创建多个临时表空间，但其中只有一个可以是默认临时表空间。如果你没有显式分配临时表空间，该用户将被分配默认临时表空间。


    你不会在`DBA_FREE_SPACE`视图中找到关于临时表空间的信息。如本例所示，使用`V$TEMP_SPACE_HEADER`来查找任何临时表空间中有多少空闲和已用空间。


    ### 7-5. Identifying Who Is Using the Temporary Tablespace


    #### Problem


    你注意到临时表空间填充速度很快，你想要识别导致临时表空间高使用率的用户和SQL语句。


    #### Solution


    发出以下查询，以找出哪个SQL语句正在排序段中使用空间。


    ```sql

    SQL> select s.sid || '','' || s.serial# sid_serial, s.username,

         o.blocks * t.block_size / 1024 / 1024 mb_used, o.tablespace,

         o.sqladdr address, h.hash_value, h.sql_text

         from v$sort_usage o, v$session s, v$sqlarea h, dba_tablespaces t

         where o.session_addr = s.saddr

         and o.sqladdr = h.address (+)

         and o.tablespace = t.tablespace_name

         order by s.sid;

    ```


    前面的查询显示了发出SQL语句的会话信息，以及临时表空间的名称和该SQL语句在该表空间中使用了多少空间。


    你可以使用以下查询，找出哪些会话正在临时表空间中使用空间。请注意，信息是汇总形式的，这意味着它不会分离一个会话运行的各种排序操作——它只是给出每个会话的临时表空间总使用量。


    ```sql

    SQL> select s.sid || '','' || s.serial# sid_serial, s.username, s.osuser, p.spid,

         s.module,s.program,

         sum (o.blocks) * t.block_size / 1024 / 1024 mb_used, o.tablespace,

         count(*) sorts

         from v$sort_usage o, v$session s, dba_tablespaces t, v$process p

         where o.session_addr = s.saddr

         and s.paddr = p.addr

         and o.tablespace = t.tablespace_name

         group by s.sid, s.serial#, s.username, s.osuser, p.spid, s.module,

         s.program, t.block_size, o.tablespace

         order by sid_serial;

    ```


    此查询的输出将显示每个会话在临时表空间中使用的空间，以及该会话当前正在执行的排序操作数量。'
  raw: "##### Influence of Extents\n\nThe database stores undo data in undo extents,\
    \ and there are three distinct types of undo extents:\n\n> *Active*: Transactions\
    \ are currently using these extents.\n> \n> *Unexpired*: These are extents that\
    \ contain undo that's required to satisfy the undo retention time specified by\
    \ the `UNDO_RETENTION` initialization parameter.\n> \n> *Expired*: These are extents\
    \ with undo that's been retained longer than the duration specified by the `UNDO_RETENTION`\
    \ parameter.\n\nIf the database doesn't find enough expired extents in the undo\
    \ tablespace or it can't get new undo extents, it'll re-use the unexpired (but\
    \ never an active undo extent) extents, and this leaves the door open for an `ORA-01555`,\
    \ “snapshot too old” error. By default, the database will essentially shrink the\
    \ undo retention period you specify, if it encounters space pressure to accommodate\
    \ the undo from new transactions. Since the unexpired undo extents contain undo\
    \ records needed to satisfy the undo retention period, overwriting those extents\
    \ in reality means that the database is lowering the undo retention period you've\
    \ set. Enabling the undo retention guarantee helps assure the success of long-running\
    \ queries as well as Oracle Flashback operations. The “guarantee” part of the\
    \ undo retention guarantee is *real*—Oracle will certainly retain undo at least\
    \ for the time you specify and will never overwrite any of the unexpired undo\
    \ extents that contain the undo required to satisfy the undo retention period.\
    \ However, there's a stiff price attached to this guarantee—Oracle will guarantee\
    \ retention even if it means that DML transactions fail because the database can't\
    \ find space to record the undo for those transactions. Therefore, you must exercise\
    \ great caution when enabling the guaranteed undo retention capability.\n\n###\
    \ 7-4. Monitoring Temporary Tablespace Usage\n\n#### Problem\n\nYou want to monitor\
    \ the usage of the temporary tablespace.\n\n#### Solution\n\nExecute the following\
    \ query to find out the used and free space in a temporary tablespace.\n\n`SQL>\
    \ select * from (select a.tablespace_name,`\n`      sum(a.bytes/1024/1024) allocated_mb`\n\
    `      from dba_temp_files a`\n`      where a.tablespace_name = upper('&&temp_tsname')\
    \ group by a.tablespace_name) x,`\n`      (select sum(b.bytes_used/1024/1024)\
    \ used_mb,`\n`      sum(b.bytes_free/1024/1024) free_mb`\n`      from v$temp_space_header\
    \ b`\n`      where b.tablespace_name=upper('&&temp_tsname') group by b.tablespace_name);`\n\
    \n`Enter value for temp_tsname: TEMP`\n`…`\n`TABLESPACE_NAME                ALLOCATED_MB    USED_MB    FREE_MB`\n\
    `------------------------------ ------------ ---------- ----------`\n`TEMP                             52.9921875\
    \ 52.9921875          0`\n`SQL>`\n\nObviously, the temporary tablespace shown\
    \ in this example is in serious need of some help from the DBA.\n\n#### How It\
    \ Works\n\nOracle uses temporary tablespaces for storing intermediate results\
    \ from sort operations as well as any temporary tables, temporary LOBs, and temporary\
    \ B-trees. You can create multiple temporary tablespaces, but only one of them\
    \ can be the default temporary tablespace. If you don't explicitly assign a temporary\
    \ tablespace, that user is assigned the default temporary tablespace.\n\nYou won't\
    \ find information about temporary tablespaces in the `DBA_FREE_SPACE` view. Use\
    \ the `V$TEMP_SPACE_HEADER` as shown in this example to find how much free and\
    \ used space there is in any temporary tablespace.\n\n### 7-5. Identifying Who\
    \ Is Using the Temporary Tablespace\n\n#### Problem\n\nYou notice that the temporary\
    \ tablespace is filling up fast, and you want to identify the user and the SQL\
    \ statements responsible for the high temporary tablespace usage.\n\n#### Solution\n\
    \nIssue the following query to find out which SQL statement is using up space\
    \ in a sort segment.\n\n`SQL> select s.sid || ',' || s.serial# sid_serial, s.username,`\n\
    `     o.blocks * t.block_size / 1024 / 1024 mb_used, o.tablespace,`\n`     o.sqladdr\
    \ address, h.hash_value, h.sql_text`\n`     from v$sort_usage o, v$session s,\
    \ v$sqlarea h, dba_tablespaces t`\n`     where o.session_addr = s.saddr`\n`     and\
    \ o.sqladdr = h.address (+)`\n`     and o.tablespace = t.tablespace_name`\n`     order\
    \ by s.sid;`\n\nThe preceding query shows information about the session that issued\
    \ the SQL statements well as the name of the temporary tablespace and the amount\
    \ of space the SQL statement is using in that tablespace.\n\nYou can use the following\
    \ query to find out which sessions are using space in the temporary tablespace.\
    \ Note that the information is in the summary form, meaning it doesn't separate\
    \ the various sort operations being run by a session—it simply gives the total\
    \ temporary tablespace usage by each session.\n\n`SQL> select s.sid || ',' ||\
    \ s.serial# sid_serial, s.username, s.osuser, p.spid,`\n`     s.module,s.program,`\n\
    `     sum (o.blocks) * t.block_size / 1024 / 1024 mb_used, o.tablespace,`\n`     count(*)\
    \ sorts`\n`     from v$sort_usage o, v$session s, dba_tablespaces t, v$process\
    \ p`\n`     where o.session_addr = s.saddr`\n`     and s.paddr = p.addr`\n`     and\
    \ o.tablespace = t.tablespace_name`\n`     group by s.sid, s.serial#, s.username,\
    \ s.osuser, p.spid, s.module,`\n`     s.program, t.block_size, o.tablespace`\n\
    `     order by sid_serial;`\n\nThe output of this query will show you the space\
    \ that each session is using in the temporary tablespace, as well as the number\
    \ of sort operations that session is performing right now."
