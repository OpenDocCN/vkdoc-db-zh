    \   MANUAL  ENABLED  SELECT *  FROM inv_maint...\nSYS_SQLPROF_012edf0316930003\
    \   MANUAL  ENABLED  SELECT /* + parallel(mgmt_db_f...\n```\n\n对于此数据库，有几个手动启用的\
    \ SQL 配置文件（如前述输出所示）。\n\n![images](img/square.jpg) **注意** 由于 SQL 配置文件与特定的 SQL 语句关联（而非用户），因此没有与\
    \ SQL 配置文件关联的 `ALL` 或 `USER` 级别视图。\n\n#### 工作原理\n\n回想一下，SQL 配置文件包含对现有统计信息的改进。`DBA_SQL_PROFILES`\
    \ 视图是查看 SQL 配置文件名称、属性和关联 SQL 文本的最佳来源。\n\n要查看内部的 SQL 配置文件提示相关信息，你还可以额外查询 `DBMSHSXP_SQL_PROFILE_ATTR`\
    \ 视图——例如：\n\n```\nSELECT\n  a.name\n ,b.comp_data\nFROM dba_sql_profiles     \
    \     a\n    ,dbmshsxp_sql_profile_attr b\nWHERE a.name = b.profile_name;\n```\n\
    \n以下是一些示例输出：\n\n```\nSYS_SQLPROF_0130520c90dc0002\n<outline_data><hint><![CDATA[OPT_ESTIMATE(@\"\
    SEL$2\",\nNLJ_INDEX_SCAN, \"FS\"@\"SEL$2\", (\"MAP\"@\"SEL$2\"), \"DB_FEAT_OPT_112_SUM_MV_IDX3\"\
    ,\nSCALE_ROWS=0.3369001041)]]></h\n```\n\n前面的输出让你了解 SQL 配置文件中提示的类型。此信息供优化器使用，以更好地估计每个执行步骤的基数。这些数据使优化器在生成执行计划时能够做出更好的决策。\n\
    \n你还可以通过查询 `SQLOBJ$` 和 `SQLOBJ$DATA` 视图来查看此内部 SQL 配置文件信息。这些视图中的数据是 XML 格式的，因此在查询时必须使用\
    \ Oracle XML 函数格式化输出——例如：\n\n```\nSELECT\n    extractvalue(value(a), '.') sqlprofile_hints\n\
    FROM sqlobj$      o\n    ,sqlobj$data d\n    ,table(xmlsequence(extract(xmltype(d.comp_data),'/outline_data/hint')))\
    \ a\nWHERE o.name      = '&&profile_name'\nAND   o. plan_id = d.plan_id\nAND \
    \  o.signature = d.signature\nAND   o.category = d.category\nAND   o.obj_type\
    \ = d.obj_type;\n```\n\n以下是输出的一个小示例：\n\n```\nOPT_ESTIMATE(@\"SEL$EF0E05FC\", INDEX_SCAN,\
    \ \"MGMT_TARGETS\"@\"SEL$4\",\n\"MIDX3\", SCALE_ROWS=50.68489486)\nOPT_ESTIMATE(@\"\
    SEL$EF0E05FC\", NLJ_INDEX_FILTER,\n\"MGMT_ECM_GEN_SNAPSHOT\"@\"SEL$3\", (\"MGMT_TARGETS\"\
    @\"SEL$4\"),\n\"IDX$$_1197C0001\", SCALE_ROWS=0.4308705)\n```\n\n同样，这些配置文件统计信息并不强制优化器使用特定的执行计划。相反，这些统计信息为优化器提供了选择更高效执行计划的灵活性。\n\
    \n![images](img/square.jpg) **注意** 如果你使用的是 Oracle 数据库 10g，则使用 `SQLPROF$` 和 `SQLPROF$ATTR`\
    \ 视图。\n\n### 12-4. 禁用 SQL 配置文件\n\n#### 问题\n\n你认为某个查询不再需要 SQL 配置文件。你希望手动禁用（而非删除）该\
    \ SQL 配置文件。\n\n#### 解决方案\n\n首先验证要禁用的 SQL 配置文件的名称：\n\n```\nSQL> select name, status\
    \ from dba_sql_profiles;\n```\n\n以下是部分输出片段：\n\n```\nNAME                     \
    \      STATUS\n------------------------------ --------\nSYS_SQLPROF_012eda58a1be0001\
    \   ENABLED\n```\n\n现在使用 `DBMS_SQLTUNE.ALTER_SQL_PROFILE` 过程将配置文件的状态修改为禁用：\n\n\
    ```\nBEGIN\n  DBMS_SQLTUNE.ALTER_SQL_PROFILE(\n    name => 'SYS_SQLPROF_012eda58a1be0001',\n\
    \    attribute_name => 'STATUS',\n    value => 'DISABLED');\nEND;\n/\n```"
- fmt: "#### How It Works\n\nThe status of a SQL profile is one of several modifiable\
    \ attributes. You can also modify characteristics such as the name, description,\
    \ and category. See [Table 12-3](#Chapter12.html#tab_12_3) for a description of\
    \ the modifiable attributes.\n\n![images](images/square.jpg) **Note** You need\
    \ the `ALTER ANY SQL PROFILE` privilege to alter a SQL profile.\n\n![images](images/t1203.jpg)\n\
    \nThe category of a SQL profile has some interesting implications. A category\
    \ allows you to control the use of a SQL profile through the setting of the `SQLTUNE_CATEGORY`\
    \ initialization parameter (this parameter can be set at the session or system\
    \ level). When a query is executed, if a SQL profile is available, the optimizer\
    \ will check to ensure that the category assigned to the SQL profile is the same\
    \ as the system- or session-level setting of `SQLTUNE_CATEGORY`. If the category\
    \ of the SQL profile matches the setting of `SQLTUNE_CATEGORY`, then the optimizer\
    \ will consider using the SQL profile.\n\nThe default category for a SQL profile\
    \ is `DEFAULT`. Also the default value for `SQLTUNE_CATEGORY` is `DEFAULT`. Therefore,\
    \ unless you alter the SQL profile category or modify the `SQLTUNE_CATEGORY` parameter,\
    \ the SQL profile will be used as input by the optimizer.\n\nYou can alter the\
    \ category to something other than `DEFAULT`. This means that only sessions that\
    \ modify the initialization parameter of `SQLTUNE_CATEGORY` to the value of the\
    \ category for the SQL profile will be able to use the profile. For example, say\
    \ you modify the SQL profile to have a category of `TEST1`:\n\n```sql\nBEGIN\n\
    \  DBMS_SQLTUNE.ALTER_SQL_PROFILE(\n    name => 'SYS_SQLPROF_012eda58a1be0001',\n\
    \    attribute_name => 'CATEGORY',\n    value => 'TEST1');\nEND;\n/\n```\n\nNow\
    \ the only sessions that can see and use the profile are those that have `SQLTUNE_CATEGORY`\
    \ set to `TEST1`:\n\n```sql\nSQL> alter session set sqltune_category=TEST1;\n\
    ```\n\nThis allows you to isolate a profile's use to only those sessions that\
    \ have the `SQLTUNE_CATEGORY` set to match the category of the SQL profile. This\
    \ allows you to test the impact of implementing a SQL profile and back it out\
    \ quickly, simply by altering either the session-level or system-level setting\
    \ of `SQLTUNE_CATEGORY`.\n\nYou can also manage many aspects of a SQL profile\
    \ from Enterprise Manager. From the main database page, navigate to the Server\
    \ tab. In the Query Optimizer section, click the SQL Plan Control tab. You should\
    \ be presented with a screen similar to [Figure 12-3](#Chapter12.html#fig_12_3).\n\
    \n![images](images/1203.jpg)\n\n**Figure 12-3.** Managing SQL profiles\n\nFrom\
    \ this screen, you can manage features such as enabling, disabling, changing the\
    \ category, and dropping a SQL profile.\n\n### 12-5. Dropping a SQL Profile\n\n\
    #### Problem\n\nYou've tested a query with and without a SQL profile attached\
    \ to the query. You determine the query performance is not significantly better\
    \ with the SQL profile. You want to drop the SQL profile so you're not cluttering\
    \ up the data dictionary with unnecessary and obsolete information.\n\n#### Solution\n\
    \nUse the `DBMS_SQLTUNE.DROP_SQL_PROFILE` procedure to drop a SQL profile. Pass\
    \ in the name of the SQL profile you want to drop—for example:\n\n```sql\nSQL>\
    \ exec dbms_sqltune.drop_sql_profile('SYS_SQLPROF_012edef0d0a70002');\n```\n\n\
    If successful, you should see the following:\n\n```\nPL/SQL procedure successfully\
    \ completed.\n```\n\n#### How It Works\n\nIt's fairly easy to drop a SQL profile.\
    \ You might want to do this if you're cleaning up a database or if you want to\
    \ remove profiles from a testing environment. If you're unsure of the SQL profile\
    \ name, you can query `DBA_SQL_PROFILES` for more information (see Recipe 12-3\
    \ for details).\n\n![images](images/square.jpg) **Note** You need the `DROP ANY\
    \ SQL PROFILE` privilege to drop a SQL profile.\n\nIf you want to drop all profiles\
    \ in a database, you can use PL/SQL to loop through all profiles and drop them:\n\
    \n```sql\ndeclare\n  cursor c1 is select name from dba_sql_profiles;\nbegin\n\
    \  for r1 in c1 loop\n    dbms_sqltune.drop_sql_profile(r1.name);\n  end loop;\n\
    end;\n/\n```\n\n### 12-6. Moving a SQL Profile\n\n#### Problem\n\nYou have a test\
    \ database and want to extract all of the SQL profiles from the test database\
    \ and move them to a production database.\n\n#### Solution\n\nListed next are\
    \ the steps involved with transporting a SQL profile from one database to another:\n\
    \n1.  Create a staging table.\n2.  Populate the staging table.\n3.  Move the table\
    \ from the source database to the destination database (Data Pump or database\
    \ link).\n4.  On the destination database, extract information from the staging\
    \ table to populate the data dictionary with SQL profile information.\n\nThese\
    \ steps are detailed in the following subsections.\n\n##### Step 1: Create a Staging\
    \ Table\n\nUse the `DBMS_SQLTUNE.CREATE_STGTAB_SQLPROF` procedure to create the\
    \ staging table. This example creates a table named `PROF_STAGE` owned by the\
    \ `MV_MAINT` user:\n\n```sql\nBEGIN\n  dbms_sqltune.create_stgtab_sqlprof(\n \
    \   table_name => 'PROF_STAGE',\n    schema_name => 'MV_MAINT' );\nEND;\n/\n```\n\
    \n##### Step 2: Populate the Staging Table\n\nUse the `DBMS_SQLTUNE.PACK_STGTAB_SQLPROF`\
    \ procedure to populate the table created in step 1 with SQL profile information.\
    \ This example populates the table with information regarding a specific SQL profile:\n\
    \n```sql\nBEGIN\n  dbms_sqltune.pack_stgtab_sqlprof(\n    profile_name => 'SYS_SQLPROF_012edf84806e0004',\n\
    \    staging_table_name => 'PROF_STAGE',\n    staging_schema_owner => 'MV_MAINT'\
    \ );\nEND;\n/\n```\n\n![images](images/square.jpg) **Tip** The `PROFILE_NAME`\
    \ parameter can include wildcard characters. For example, if you want to transport\
    \ all SQL profiles in a database, you can use '%' for the `PROFILE_NAME`.\n\n\
    ##### Step 3: Copy the Staging Table to the Destination Database\n\nYou can copy\
    \ the table from one database to the other via Data Pump, the old `exp`/`imp`\
    \ utilities, or by using a database link. This example creates a database link\
    \ in the destination database and then copies the table from the source database:\n\
    \n```sql\ncreate database link source_db\nconnect to mv_maint\nidentified by foo\n\
    using 'source_db';\n```\n\nOnce the database link has been created, the table\
    \ can be copied directly from the source with the `CREATE TABLE...AS SELECT` statement:\n\
    \n```sql\nSQL> create table PROF_STAGE as select * from PROF_STAGE@source_db;\n\
    ```\n\n##### Step 4: Load the Contents of the Staging Table into the Destination\
    \ Database\n\nNow in the destination database, unpack the table to load profile\
    \ information into the database:\n\n```sql\nBEGIN\n  DBMS_SQLTUNE.UNPACK_STGTAB_SQLPROF(\n\
    \    replace => TRUE,\n    staging_table_name => 'PROF_STAGE');\nEND;\n/\n```\n\
    \nIf no profile name is specified, the default is the `%` wildcard character (meaning\
    \ all profiles in the table will be loaded into the destination database).\n\n\
    #### How It Works\n\nIt's fairly easy to copy SQL profiles from one database to\
    \ another. You simply have to create a special table to hold the profile information,\
    \ then populate the table, copy the table to the destination database, and lastly\
    \ unpack the table's contents. [Table 12-4](#Chapter12.html#tab_12_4) describes\
    \ all of the parameters for the profile packing procedure.\n\n![images](images/t1204.jpg)\n\
    \nThe `DBMS_SQLTUNE.UNPACK_STGTAB_SQLPROF` procedure takes the same parameters\
    \ as the packing procedure with an additional `REPLACE` parameter. The `REPLACE`\
    \ parameter specifies whether to replace profiles if they already exist (can be\
    \ `TRUE` or `FALSE`).\n\n### 12-7. Automatically Adding Plan Baselines\n\n####\
    \ Problem\n\nYou want to automatically create plan baselines for every SQL query\
    \ that repeatedly executes in your database."
