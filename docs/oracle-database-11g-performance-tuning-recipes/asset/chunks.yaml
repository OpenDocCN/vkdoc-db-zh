    \ **注意** 如果您没有运行 Solaris，请参阅解决方案 6-2。\n\n#### 解决方案\n\n在大多数 Solaris 系统上，使用`prstat`实用程序来识别哪些进程消耗了最多的\
    \ CPU 资源。例如，您可以指示`prstat`每五秒报告一次系统统计信息：\n\n```\n$ prstat 5\n```\n\n以下是一些示例输出：\n\
    \n```\n   PID USERNAME  SIZE   RSS STATE  PRI NICE      TIME  CPU PROCESS/NLWP\n\
    \ 16609 oracle   2364M 1443M cpu2    60    0   3:14:45  20% oracle/11\n 27565\
    \ oracle   2367M 1590M cpu3    21    0   0:11:28  16% oracle/14\n 23632 oracle\
    \   2284M 1506M run     46    2   0:16:18 6.1% oracle/11\n  4066 oracle   2270M\
    \ 1492M sleep   59    0   0:02:52 1.7% oracle/35\n 15630 oracle   2274M 1482M\
    \ sleep   48    0  19:40:41 1.2% oracle/11\n```\n\n输入`q`或按 Ctrl+C 退出`prstat`。在上面的输出中，进程\
    \ 16609 始终显示为顶级 CPU 消耗进程。\n\n识别出顶级资源消耗进程后，您可以使用`ps`命令确定该进程关联的数据库。此示例报告与 PID 16609\
    \ 关联的进程信息：\n\n```\n$ ps -ef | grep 16609\n  oracle 16609  3021  18   Mar 09 ?\
    \         196:29 ora_dw00_ENGDEV\n```\n\n在此示例中，进程名称是`ora_dw00_ENGDEV`，关联的数据库是`ENGDEV`。\n\
    \n#### 工作原理\n\n如果您在 Solaris 服务器上工作，通常没有安装`top`实用程序。在这些环境中，可以使用`prstat`命令来确定系统上资源消耗最高的进程。表\
    \ 6-2 描述了`prstat`默认输出中显示的几列。\n\n![images](img/t0602.jpg)\n\n### 6-4. 识别顶级服务器资源消耗者\
    \ (top)\n\n#### 问题\n\n您有一台托管多个数据库的 Linux 服务器。用户报告使用其中一个数据库的应用程序响应迟缓。您希望识别哪些进程在服务器上消耗了最多的资源，然后确定顶级消耗进程是否与数据库关联。\n\
    \n#### 解决方案\n\n`top`命令实时显示服务器上资源消耗最高的进程。运行`top`的最简单方法如下：\n\n```\n$ top\n```\n\n\
    以下是输出片段：\n\n```\ntop - 04:40:05 up 353 days, 15:16,  3 users,  load average: 2.84,\
    \ 2.34, 2.45\nTasks: 454 total,   4 running, 450 sleeping,   0 stopped,   0 zombie\n\
    Cpu(s): 64.3%us,  3.4%sy,  0.0%ni, 20.6%id, 11.8%wa,  0.0%hi,  0.0%si,  0.0%st\n\
    Mem:   7645184k total,  6382956k used,  1262228k free,   176480k buffers\nSwap:\
    \  4128760k total,      184k used,  4128576k free,  3953512k cached\n\n  PID USER\
    \      PR  NI  VIRT  RES  SHR S %CPU %MEM    TIME+  COMMAND\n19888 oracle    25\
    \   0  148m  13m  11m R 100.1  0.2 313371:45 oracle\n19853 oracle    25   0  148m\
    \  13m  11m R 99.8  0.2 313375:41 oracle\n 9722 oracle    18   0 1095m 287m 150m\
    \ R 58.6  3.8   0:41.89 oracle\n  445 root      11  -5     0    0    0 S  0.3\
    \  0.0   8:32.67 kjournald\n 9667 oracle    15   0  954m  55m  50m S  0.3  0.7\
    \   0:01.03 oracle\n    2 root      RT  -5     0    0    0 S  0.0  0.0   2:17.99\
    \ migration/0\n```\n\n输入`q`或按 Ctrl+C 退出`top`。在上面的输出中，第一部分显示了通用系统信息，例如服务器运行了多长时间、用户数、CPU\
    \ 信息等。第二部分显示了哪些进程消耗了最多的 CPU 资源（从上到下排列）。在上面的输出中，进程 ID 19888 消耗了大量 CPU。要确定此进程关联的数据库，请使用`ps`命令：\n\
    \n```\n$ ps 19888\n```\n\n相关输出如下：\n\n```\nPID TTY      STAT   TIME COMMAND\n19888\
    \ ?        Rs   313393:32 oracleO11R2 (DESCRIPTION=(LOCAL=YES)\n```\n\n在上面的输出中，第四列显示了`oracleO11R2`的值。这表明这是一个与`O11R2`数据库关联的\
    \ Oracle 进程。如果该进程持续消耗资源，您可以进一步确定是否有关联的 SQL 语句（参见解决方案 6-9）或终止该进程（参见解决方案 6-10）。\n\
    \n![images](img/square.jpg) **提示** 如果您在 Solaris 操作系统环境中工作，请使用`prstat`命令查看顶级 CPU\
    \ 消耗进程（详情参见解决方案 6-3）。\n\n#### 工作原理\n\n如果已安装，`top`实用程序通常是 DBA 和系统管理员用来识别服务器上资源密集型进程的第一个调查工具。如果某个进程持续消耗过多的系统资源，那么您应该进一步确定该进程是否与数据库以及特定的\
    \ SQL 语句相关联。\n\n默认情况下，`top`会重复刷新（每隔几秒）有关 CPU 最密集型进程的信息。在`top`运行时，您可以交互式地更改其输出。例如，如果您输入\
    \ `>`，这将使`top`排序的列向右移动一个位置。表 6-3 列出了最有用的热键功能，用于将`top`显示更改为您需要的格式。\n\n![images](img/t0603.jpg)\n\
    \n表 6-4 描述了`top`显示的几列。使用这些描述来帮助解释输出。\n\n![images](img/t0604.jpg)\n\n![images](img/t0604a.jpg)\n\
    \n### 6-5. 识别 CPU 和内存瓶颈 (ps)\n\n#### 问题\n\n您希望快速隔离服务器上哪些进程消耗了最多的 CPU 和内存资源。\n\n\
    #### 解决方案\n\n`ps`（进程状态）命令对于快速识别顶级资源消耗进程非常方便。例如，此命令显示本机上消耗最多的十个 CPU 资源：\n\n```\n\
    $ ps -e -o pcpu,pid,user,tty,args | sort -n -k 1 -r | head\n```\n\n以下是部分输出：\n\n\
    ```\n97.8 26902 oracle   ?        oracleO11R2 (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))\n\
    \ 0.5 27166 oracle   ?        ora_diag_O11R2\n0.0     9 root      ?        [ksoftirqd/2]\n\
    ```\n\n在上面的输出中，名为`oracleO11R2`的进程在服务器上消耗了异常多的 CPU 资源。进程名称表明这是一个与`O11R2`数据库关联的\
    \ Oracle 进程。\n\n类似地，您也可以显示顶级内存消耗进程：\n\n```\n$ ps -e -o pmem,pid,user,tty,args\
    \ | sort -n -k 1 -r | head\n```"
- fmt: "# How It Works\n\nThe Linux/Unix `ps` command displays information about currently\
    \ active processes on the server. The `pcpu` switch instructs the process status\
    \ to report the CPU usage of each process. Similarly the `pmem` switch instructs\
    \ `ps` to report on process memory usage. This gives you a quick and easy way\
    \ to determine which processes are consuming the most resources.\n\nWhen using\
    \ multiple commands on one line (such as `ps`, `sort`, and `head`), it's often\
    \ desirable to associate the combination of commands with a shortcut (alias).\
    \ Here's an example of creating aliases:\n\n```bash\n$ alias topc='ps -e -o pcpu,pid,user,tty,args\
    \ | sort -n -k 1 -r | head'\n$ alias topm='ps -e -o pmem,pid,user,tty,args | sort\
    \ -n -k 1 -r | head'\n```\n\nNow instead of typing in the long line of commands,\
    \ you can use the alias—for example:\n\n```bash\n$ topc\n```\n\nAlso consider\
    \ establishing the aliases in a startup file (like `.bashrc` or `.profile`) so\
    \ that the commands are automatically defined when you log on to the database\
    \ server.\n\n## 6-6. Identifying I/O Bottlenecks\n\n### Problem\n\nYou are experiencing\
    \ performance problems and want to determine if the issues are related to slow\
    \ disk I/O.\n\n### Solution\n\nUse the `iostat` command with the `-x` (extended)\
    \ option combined with the `-d` (device) option to generate I/O statistics. This\
    \ next example displays extended device statistics every ten seconds:\n\n```bash\n\
    $ iostat –xd 10\n```\n\nYou need a fairly wide screen to view this output; here's\
    \ a partial listing:\n\n```\nDevice:    rrqm/s wrqm/s   r/s   w/s  rsec/s  wsec/s    rkB/s    wkB/s\
    \ avgrq-sz\navgqu-sz   await  svctm  %util\nsda          0.01   3.31  0.11  0.31    5.32   28.97     2.66    14.49    83.13\n\
    0.06  138.44   1.89   0.08\n```\n\nThis periodic extended output allows you to\
    \ view in real time which devices are experiencing spikes in read and write activity.\
    \ To exit from the previous `iostat` command, press `Ctrl+C`. The options and\
    \ output may vary depending on your operating system. For example, on some Linux/Unix\
    \ distributions, the `iostat` output may report the disk utilization as `%b` (percent\
    \ busy).\n\nWhen trying to determine whether device I/O is the bottleneck, here\
    \ are some general guidelines when examining the `iostat` output:\n\n*   Look\
    \ for devices with abnormally high blocks read or written per second.\n*   If\
    \ any device is near 100% utilization, that's a strong indicator I/O is a bottleneck.\n\
    \n### How It Works\n\nThe `iostat` command can help you determine whether disk\
    \ I/O is potentially a source of performance problems. Table 6-5 describes the\
    \ columns displayed in the `iostat` output.\n\n![images](images/t0605.jpg)\n\n\
    You can also instruct `iostat` to display reports at a specified interval. The\
    \ first report displayed will report averages since the last server reboot; each\
    \ subsequent report shows statistics since the previously generated snapshot.\
    \ The following example displays a device statistic report every three seconds:\n\
    \n```bash\n$ iostat -d 3\n```\n\nYou can also specify a finite number of reports\
    \ that you want generated. This is useful for gathering metrics to be analyzed\
    \ over a period of time. This example instructs `iostat` to report every 2 seconds\
    \ for a total of 15 reports:\n\n```bash\n$ iostat 2 15\n```\n\nWhen working with\
    \ locally attached disks, the output of the `iostat` command will clearly show\
    \ where the I/O is occurring. However, it is not that clear-cut in environments\
    \ that use external arrays for storage. What you are presented with at the file\
    \ system layer is some sort of a virtual disk that might also have been configured\
    \ by a volume manager. In virtualized storage environments, you'll have to work\
    \ with your system administrator or storage administrator to determine exactly\
    \ which disks are experiencing high I/O activity.\n\nOnce you have determined\
    \ that you have a disk I/O contention issue, then you can use utilities such as\
    \ AWR (if licensed), Statspack (no license required), or the `V$` views to determine\
    \ if your database is I/O stressed. For example, the AWR report contains an I/O\
    \ statistics section with the following subsections:\n\n*   IOStat by Function\
    \ summary\n*   IOStat by Filetype summary\n*   IOStat by Function/Filetype summary\n\
    *   Tablespace IO Stats\n*   File IO Stats\n\nYou can also directly query data\
    \ dictionary views such as `V$SQL` to determine which SQL statements are using\
    \ excessive I/O—for example:\n\n```sql\nSELECT *\nFROM\n(SELECT\n  parsing_schema_name\n\
    \ ,direct_writes\n ,SUBSTR(sql_text,1,75)\n ,disk_reads\nFROM v$sql\nORDER BY\
    \ disk_reads DESC)\nWHERE rownum < 20;\n```\n\nTo determine which sessions are\
    \ currently waiting for I/O resources, query `V$SESSION`:\n\n```sql\nSELECT\n\
    \  username\n,program\n,machine\n,sql_id\nFROM v$session\nWHERE event LIKE 'db\
    \ file%read';\n```\n\nTo view objects that are waiting for I/O resources, run\
    \ a query such as this:\n\n```sql\nSELECT\n  object_name\n,object_type\n,owner\n\
    FROM v$session   a\n    ,dba_objects b\nWHERE a.event LIKE 'db file%read'\nAND\
    \   b.data_object_id = a.row_wait_obj#;\n```\n\nOnce you have identified queries\
    \ (using the prior queries in this section), then consider the following factors,\
    \ which can cause a SQL statement to consume inordinate amounts of I/O:\n\n* \
    \  Poorly written SQL\n*   Improper indexing\n*   Improper use of parallelism\
    \ (which can cause excessive full table scans)\n\nYou'll have to examine each\
    \ query and try to determine if one of the prior items is the cause of poor performance\
    \ as it relates to I/O.\n\n## 6-7. Identifying Network-Intensive Processes\n\n\
    ### Problem\n\nYou're investigating performance issues on a database server. As\
    \ part of your investigation, you want to determine if there are network bottlenecks\
    \ on the system.\n\n### Solution\n\nUse the `netstat` (network statistics) command\
    \ to display network traffic. Perhaps the most useful way to view `netstat` output\
    \ is with the `-ptc` options. These options display the process ID and TCP connections,\
    \ and they continuously update the output:\n\n```bash\n$ netstat -ptc\n```\n\n\
    Press Ctrl+C to exit the previous command. Here's a partial listing of the output:\n\
    \n```\n(Not all processes could be identified, non-owned process info\n will not\
    \ be shown, you would have to be root to see it all.)\nActive Internet connections\
    \ (w/o servers)\nProto Recv-Q Send-Q Local Address  Foreign Address  State   \
    \    PID/Program name\ntcp        0      0 rmug.com:62386 rmug.com:1521    ESTABLISHED\
    \ 22864/ora_pmon_RMDB\ntcp        0      0 rmug.com:53930 rmug.com:1521    ESTABLISHED\
    \ 6091/sqlplus\ntcp        0      0 rmug.com:1521  rmug.com:53930   ESTABLISHED\
    \ 6093/oracleRMDB1\ntcp        0      0 rmug.com:1521  rmug.com:62386   ESTABLISHED\
    \ 10718/tnslsnr\n```\n\nIf the `Send-Q` (bytes not acknowledged by remote host)\
    \ column has an unusually high value for a process, this may indicate an overloaded\
    \ network. The useful aspect about the previous output is that you can determine\
    \ the operating system process ID (PID) associated with a network connection.\
    \ If you suspect the connection in question is an `oracle` session, you can use\
    \ the techniques described in the “Solution” section of Recipe 6-9 to map an operating\
    \ system PID to an Oracle process or SQL statement.\n\n### How It Works\n\nWhen\
    \ experiencing performance issues, usually the network is not the cause. Most\
    \ likely you'll determine that bad performance is related to a poorly constructed\
    \ SQL statement, inadequate disk I/O, or not enough CPU or memory resources. However,\
    \ as a DBA, you need to be aware of all sources of performance bottlenecks and\
    \ how to diagnose them. In today's highly interconnected world, you must possess\
    \ network troubleshooting and monitoring skills. The `netstat` utility is a good\
    \ starting place for monitoring server network connections.\n\n## 6-8. Troubleshooting\
    \ Database Network Connectivity\n\n### Problem\n\nA user has reported that he\
    \ or she can't connect to a database. You know there are many components involved\
    \ with network connectivity and want to figure out the root cause of the problem."
