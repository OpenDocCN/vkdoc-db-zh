    \ |\n|   7 |        INDEX RANGE SCAN          | EMP_CTAS_PK  |        |      |\
    \            |\n--------------------------------------------------------------------------------\n\
    ```\n\n创建表耗时 1.7 秒，比使用 `DELETE` 语句执行相同操作快了 5 倍以上。但是，如果表上有索引，你需要在选择此方法之前考虑这个因素，因为如果你重新创建一个表，还必须为该表重新创建相关的索引。尽管如此，它仍然可能更快，因为你可以并行地重新创建任何索引。\n\
    \n请记住，尽管前面的示例在这些语句上使用了并行 DDL，但即使你以串行模式运行，这个概念同样成立。当你需要从表中删除大量行时，`CREATE TABLE\
    \ ... AS SELECT` 与并行执行的 DDL 或非并行串行执行的 DDL 下的 `DELETE` 相比，都是一个有利的选择。\n\n并行创建表的一个潜在缺点是，这些操作的空间分配可能会导致表比串行创建时更碎片化。这是在并行创建表时应该考虑的一个权衡。操作中指定的\
    \ DOP 会生成相应数量的并行线程，并为每个线程分配一个区（extent）。因此，如果你为并行操作指定了 DOP 为 4，那么该操作至少会分配 4 个区。根据表空间的\
    \ `MINIMUM EXTENT` 大小，Oracle 会尝试在操作结束时修剪未使用的空间。不过，你应该预料到，并行创建表操作的空间效率确实不如串行运行的操作。\n\
    \n### 15-6. 并行创建索引\n\n#### 问题\n\n你需要尽快为一个大表创建索引，并希望使用多个进程来帮助加速索引创建。\n\n#### 解决方案\n\
    \n任何时候拥有一个大表时，始终使用并行 DDL 创建该表的任何关联索引都是一个好主意，即使你希望索引的 DOP 在查询时是非并行化的。并行创建索引的主要好处是它确实能大大减少创建索引的时间。为一个大表并行创建索引总是有意义的，然后可以在创建操作完成后选择重置用于查询的\
    \ DOP。在以下示例中，我们使用 DOP 为 4 来创建索引，该 DOP 将在创建索引的过程中使用：\n\n```\nCREATE INDEX EMP_COPY_I1\n\
    ON EMP_COPY (HIREDATE)\nPARALLEL(DEGREE 4);\n```\n\n然后，在索引创建完成后，我们可以选择使用以下任一示例将\
    \ DOP 重置为不同的值供查询使用：\n\n`ALTER INDEX EMP_COPY_I1 NOPARALLEL;`\n`ALTER INDEX EMP_COPY_I1\
    \ PARALLEL(DEGREE 1);`\n"
- fmt: '## 15-7. Rebuilding Indexes in Parallel


    ### Problem


    You have an existing index that needs to be rebuilt quickly, and you want to use
    multiple processes to speed up the index rebuild process.


    ### Solution


    Situations may arise where you may need to rebuild an index, for many of the same
    reasons to re-create an index. To rebuild an index in parallel, use the `ALTER
    INDEX` command:


    ```sql

    ALTER INDEX EMP_COPY_I1

    REBUILD

    PARALLEL(DEGREE 4);

    ```


    ```sql

    --------------------------------------------------------------------------------

    | Id  | Operation                   | Name        |    TQ  |IN-OUT| PQ Distrib
    |

    --------------------------------------------------------------------------------

    |   0 | ALTER INDEX STATEMENT       |             |        |      |            |

    |   1 |  PX COORDINATOR             |             |        |      |            |

    |   2 |   PX SEND QC (ORDER)        | :TQ10001    |  Q1,01 | P->S | QC (ORDER)
    |

    |   3 |    INDEX BUILD NON UNIQUE   | EMP_COPY_I1 |  Q1,01 | PCWP |            |

    |   4 |     SORT CREATE INDEX       |             |  Q1,01 | PCWP |            |

    |   5 |      PX RECEIVE             |             |  Q1,01 | PCWP |            |

    |   6 |       PX SEND RANGE         | :TQ10000    |  Q1,00 | P->P | RANGE      |

    |   7 |        PX BLOCK ITERATOR    |             |  Q1,00 | PCWC |            |

    |   8 |         INDEX FAST FULL SCAN| EMP_COPY_I1 |  Q1,00 | PCWP |            |

    --------------------------------------------------------------------------------

    ```


    If you need to rebuild a partition of a large local index, you can also use parallelism
    to perform this operation. See the following example:


    ```sql

    ALTER INDEX emppart_i1

    REBUILD PARTITION emppart2001_p

    PARALLEL(DEGREE 4);

    ```


    ```sql

    --------------------------------------------------------------------------------------

    | Id  | Operation                   | Name       | Pstart| Pstop |IN-OUT| PQ Distrib
    |

    --------------------------------------------------------------------------------------

    |   0 | ALTER INDEX STATEMENT       |            |       |       |      |            |

    |   1 |  PX COORDINATOR             |            |       |       |      |            |

    |   2 |   PX SEND QC (ORDER)        | :TQ10001   |       |       | P->S | QC ORDER)  |

    |   3 |    INDEX BUILD NON UNIQUE   | EMPPART_I1 |       |       | PCWP |            |

    |   4 |     SORT CREATE INDEX       |            |       |       | PCWP |            |

    |   5 |      PX RECEIVE             |            |       |       | PCWP |            |

    |   6 |       PX SEND RANGE         | :TQ10000   |       |       | P->P | RANGE      |

    |   7 |        PX BLOCK ITERATOR    |            |     2 |     2 | PCWC |            |

    |   8 |         INDEX FAST FULL SCAN| EMPPART_I1 |     2 |     2 | PCWP |            |

    --------------------------------------------------------------------------------------

    ```


    ### How It Works


    Rebuilding an index has a key advantage over re-creating an index from scratch,
    as well as a key disadvantage. The advantage of rebuilding an index is that the
    existing index is in place until the rebuild operation is complete, so it can
    therefore be used by queries that are run concurrently with the rebuild process.
    The main disadvantage of the index rebuild process is that you will need space
    for both indexes, which is required during the rebuild process. Some of the key
    reasons to rebuild an index include the following:


    *   Rebuilding an index that has become fragmented over time

    *   Rebuilding an index after a large, direct-path load of data

    *   You want to move an index to a different tablespace

    *   The index is in an unusable state due to a partition-level operation on the
    associated table.


    ## 15-8. Moving Partitions in Parallel


    ### Problem


    You need to move a table partition to a different tablespace, and wish to employ
    the use of multiple processes to accomplish this task.


    ### Solution


    Let''s say you want to move a table partition to another tablespace. For instance,
    you''ve created a tablespace on slower, cheaper storage, and you want to move
    older data there in order to reduce the overall cost of storage on your database.
    To alter a table to rebuild a partition in parallel, you would issue a command
    such as the one here:


    ```sql

    ALTER TABLE EMP

    MOVE PARTITION P2

    TABLESPACE EMP_S

    PARALLEL(DEGREE 4);

    ```


    ### How It Works


    The `ALTER TABLE` statement to move a partition is an easy, efficient way to move
    data around for a partitioned table. As with some of the other parallel DDL operations
    shown within this chapter, there are several reasons to need to move a table partition
    to a different tablespace:


    *   You are moving older data to cheaper, slower storage.

    *   You are consolidating a series of partitions to a single tablespace.

    *   You are moving certain partitions to separate tablespaces to logically group
    types of data.


    Table partitioning is often done to store historical data. Over time, partition
    maintenance often needs to occur for partitioned tables. By enabling the use of
    parallelism when moving partitions for a table within your database, it can simply
    be done faster. With maintenance windows shrinking and data access needs growing,
    this helps perform necessary partition movements faster, while reducing downtime
    for your database tables.


    ## 15-9. Splitting Partitions in Parallel


    ### Problem


    You have a partition with a large amount of data, and want to split that larger
    partition into two or more smaller partitions.


    ### Solution


    As a DBA, at times the need arises to split partitions, and this operation can
    also be done in parallel. For instance, let''s say you have a partitioned table
    that has a default high-end partition with a large amount of data, and you want
    to split that data into multiple partitions. In cases such as these, you can split
    that default partition in parallel to speed up the partition split process. Here
    is an example of splitting a partition using parallelism:


    ```sql

    ALTER TABLE EMP

    SPLIT PARTITION PMAX at (''2011-04-01'') INTO

    (PARTITION P4 TABLESPACE EMP_S,

    PARTITION PMAX TABLESPACE EMP_S)

    PARALLEL(DEGREE 4);

    ```'
  raw: '#### How It Works


    The primary reason you want to run parallel DDL on an index is to either create
    or rebuild a large, existing index. Some of the reasons you may have to do this
    include the following:


    *   Adding an index to an already existing large table

    *   Rebuilding an index that has become fragmented over time

    *   Rebuilding an index after a large, direct-path load of data

    *   You want to move an index to a different tablespace

    *   The index is in an unusable state due to a partition-level operation on the
    associated table


    As with tables, if you wish to bypass the parallelism specified on the index,
    you can “force” the issue by running the following command:


    `ALTER SESSION FORCE PARALLEL DDL;`


    ### 15-7. Rebuilding Indexes in Parallel


    #### Problem


