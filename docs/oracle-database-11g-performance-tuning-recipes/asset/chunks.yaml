    \ from dual;\n```\n\n或者，您可以只为指定的列创建列组，通过发出以下命令：\n\n```\nSQL> select dbms_stats.create_extended_stats(null,'CUSTOMERS',\
    \ '(cust_city,cust_state_province,country_id)') from dual\nSQL> /\nSYS_STUMZ$C3AIHLPBROI#SKA58H_N\n\
    SQL>\n```\n\n此时，您已经创建了列组，但列组上没有统计信息。重新收集 `CUSTOMERS` 表的统计信息以为新列组生成统计信息——例如：\n\n\
    ```\nSQL> exec dbms_stats.gather_table_stats(user,'customers')\nPL/SQL procedure\
    \ successfully completed.\nSQL>\n```\n\n#### 工作原理\n\n让 Oracle 根据工作负载期间的实际列使用情况指出潜在的列组，比您尝试为每个表确定适当的列组要高效得多。一旦运行了工作负载，您可以查看列使用情况报告，并通过执行\
    \ `dbms_stats.create_extended_stats` 函数并将 `table_name` 参数的值传递为 `NULL`，来要求数据库同时为整个模式创建所有提议的列组。\n\
    \n### 13-19. 维护分区表上的统计信息\n\n#### 问题\n\n您频繁地向一个或多个分区加载数据，维护全局统计信息成了问题。您希望在不经历耗时耗资源的过程的情况下收集新的全局统计信息。\n\
    \n#### 解决方案\n\n您可以使用 Oracle 11g 版本中的 *增量统计信息维护* 功能，在每次加载新分区后维护全局统计信息。例如，如果您想维护\
    \ `SH.SALES` 表的全局统计信息，请遵循以下步骤：\n\n1.  为 `SH.SALES` 表启用增量统计信息收集：\n    ```\n   \
    \ SQL> exec dbms_stats.set_table_prefs('SH','SALES','INCREMENTAL','TRUE');\n \
    \   PL/SQL procedure successfully completed.\n    SQL>\n    ```\n2.  在向分区加载数据后，收集全局表级统计信息，如下所示：\n\
    \    ```\n    SQL> exec dbms_stats.gather_table_stats('SH','SALES');\n    PL/SQL\
    \ procedure successfully completed.\n    SQL>\n    ```\n\n要为分区表设置增量统计信息收集功能，必须为\
    \ `ESTIMATE_PERCENT` 参数指定 `AUTO_SAMPLE_SIZE` 值，并为 `GRANULARITY` 参数指定 `AUTO` 值。\n"
- fmt: "# Oracle 数据库统计收集优化技术\n\n## 增量统计收集工作原理\n\n增量统计收集功能默认是禁用的。您可以通过设置 `INCREMENTAL`\
    \ 首选项来启用该功能。在我们的示例中，展示了如何在表级别设置 `INCREMENTAL` 首选项，但您也可以在模式（schema）或数据库级别进行设置。\n\
    \n在处理分区表时，优化器会同时使用全局统计信息（整个表的统计信息）和单个分区的统计信息来选择最优的执行计划。默认情况下，当分区的数据发生变化后，数据库会使用一种两阶段扫描技术来维护准确的表统计信息。在这种两阶段技术下，数据库将执行以下操作：\n\
    \n*   在第一阶段，扫描整个表以收集全局统计信息。\n*   在第二阶段，扫描发生变更的分区，以收集分区统计信息。\n\n例如，当您作为夜间批处理作业的一部分向分区加载（或从中删除）数据时，数据库将扫描该分区以收集分区级别的统计信息。此外，它还会扫描整个表以收集表级别的全局统计信息。数据库不仅扫描发生变更的分区，还会扫描表中的所有其他分区。可以看出，每次分区数据变更都进行全表扫描是一个开销很大的过程，尤其是在处理超大型表时。\n\
    \n一旦您开启了增量统计收集功能，Oracle 将采用一种高效得多的技术来维护分区表的统计信息。当分区的数据发生变化时，数据库仅收集该分区的统计信息，并在不扫描任何其他分区的情况下推导出全局表统计信息。数据库是如何在不扫描全表的情况下维护全局统计信息的呢？Oracle\
    \ 可以从分区级统计信息推导出一些全局统计信息——例如，通过将每个分区中的行数相加来推导出行总数。对于推导不同值的数量（NDV），Oracle 使用一种称为“概要”（synopsis）的结构，它类似于列中\
    \ NDV 的样本。Oracle 通过合并所有分区概要来推导全局 NDV。总之，当您实施增量统计收集时，Oracle 会跳过默认的全表扫描来收集表统计信息，而是执行以下操作：\n\
    \n1.  收集您加载数据的分区的统计信息，并为该分区创建概要。\n2.  通过合并所有分区级别的概要来创建一个全局概要。\n3.  基于分区级别的统计信息和全局概要计算全局统计信息。\n\
    \n增量统计收集效率极高，尤其是在处理大型分区表时，特别是当您频繁向一个或多个空分区加载数据时（这在许多数据仓库中是常见情况），您必须考虑使用此功能。\n\n\
    ## 大表的并发统计收集\n\n### 问题\n\n您希望利用多处理器环境来最小化收集统计信息所需的时间。\n\n### 解决方案\n\n在 Oracle\
    \ Database 11g Release 2 (11.2.0.2) 中，您可以指定 *并发统计信息收集模式*，以便同时收集多个表以及一个表内的多个分区（和子分区）的统计信息。通过这样做，您可以充分利用多处理器环境，更快地完成统计信息收集过程。\n\
    \n默认情况下，并发统计收集是禁用的。您可以通过执行 `SET_GLOBAL_PREFS` 过程来启用它。请按照以下步骤启用并发统计收集。\n\n1.  将\
    \ `job_queue_processes` 参数至少设置为 4。\n    ```\n    SQL> alter system set job_queue_processes=4;\n\
    \    ```\n    如果您不打算使用并行执行来收集统计信息（请参见下一节），但希望充分利用系统资源，则必须将 `job_queue_processes`\
    \ 参数设置为服务器 CPU 核心数的两倍。\n\n2.  启用并发统计收集。\n    ```\n    SQL> begin\n         dbms_stats.set_global_prefs('CONCURRENT','TRUE');\n\
    \       end;\n       /\n    ```\n请确保执行此命令的用户具有 `CREATE JOB`、`MANAGE SCHEDULER`\
    \ 和 `MANAGE ANY QUEUE` 权限。"
  raw: "#### How It Works\n\nThe incremental statistics collection feature is disabled\
    \ by default. You enable the feature by setting the `INCREMENTAL` preference.\
    \ In our example, we showed how to set the `INCREMENTAL` preference at the table\
    \ level, but you can also set it at the schema or database level.\n\nWhen dealing\
    \ with a partitioned table, the optimizer uses both global statistics (statistics\
    \ for the entire table) and  statistics for the individual partitions to select\
    \ the optimal execution plan. By default, following a change in a partition's\
    \ data, the database uses a two-pass scanning technique to maintain accurate table\
    \ statistics. Under this two-pass technique, the database will do the following:\n\
    \n*   Scan the entire table to gather the global statistics during the first pass.\n\
    *   Scan the changed partitions in the second pass, to gather the partition statistics.\n\
    \nWhen you load data into (or delete data from) a partition(s) as part of a nightly\
    \ batch job, for example, the database will scan the partition(s) to gather the\
    \ partition-level statistics. In addition, it scans the entire table to gather\
    \ the table-level global statistics. The database scans not only the changed partitions,\
    \ but also all the other partitions in the table as well. As you can tell, this\
    \ full scan of the table each time a partition's data changes is an expensive\
    \ process, especially when dealing with very large tables.\n\nOnce you turn the\
    \ incremental statistics collection feature on, Oracle uses a far more efficient\
    \ technique to maintain a partitioned table's statistics. When a partition's data\
    \ changes, the database gathers just the statistics for that partition and derives\
    \ the global table statistics without scanning any of the other partitions. How\
    \ does the database maintain the global statistics without scanning the entire\
    \ table? Oracle can derive some global statistics from partition-level statistics—for\
    \ example, it derives the total number of rows by just adding up the rows in each\
    \ partition. For deriving the number of distinct values (NDVs), Oracle makes use\
    \ of a structure called a synopsis, which is something like a sample of the NDVs\
    \ in a column. Oracle derives the global NDV by merging all partition synopses.\
    \ In summary, when you implement incremental statistics collection, Oracle skips\
    \ the default full table scan to gather the table's statistics and instead does\
    \ the following:\n\n1.  Gathers statistics for the partition you loaded and creates\
    \ synopses for that partition\n2.  Creates a global synopsis by merging all the\
    \ partition-level synopses\n3.  Computes the global statistics from the partition-level\
    \ statistics and the global synopses\n\nIncremental statistics collection is extremely\
    \ efficient and something you must consider using when dealing with large partitioned\
    \ tables, especially when you're loading data into one or more empty partitions\
    \ frequently, as is the case in many data warehouses.\n\n### 13-20. Concurrent\
    \ Statistics Collection for Large Tables\n\n#### Problem\n\nYou want to minimize\
    \ the amount of time it takes to gather statistics by taking advantage of your\
    \ multi-processor environment.\n\n#### Solution\n\nIn Oracle Database 11g Release\
    \ 2 (11.2.0.2), you can specify the *concurrent statistics gathering mode* to\
    \ gather statistics on multiple tables and multiple partitions (and subpartitions)\
    \ within a table concurrently. By doing this, you can take advantage of your multi-processor\
    \ environment and complete the statistics collection process much faster.\n\n\
    By default, concurrent statistics gathering is disabled. You enable it by executing\
    \ the `SET_GLOBAL_PREFS` procedure. Follow these steps to enable concurrent statistics\
    \ gathering.\n\n1.  Set the `job_queue_processes` parameter to at least 4.\n\n\
    \    `SQL>alter system set job_queue_processes=4;`\n\n    If you don't plan on\
    \ using parallel execution for gathering statistics (see the following section),\
    \ but want to fully utilize your system resources, you must set the `job_queue_processes`\
    \ parameter to two times the number of CPU cores on the server.\n\n2.  Enable\
    \ concurrent statistics gathering. `SQL> begin`\n    `     dbms_stats.set_global_prefs('CONCURRENT','TRUE');`\n\
    \    `     end;`\n    `     /`\n\nMake sure the user executing this command has\
    \ the `CREATE JOB`, `MANAGE SCHEDULER`, and the `MANAGE ANY QUEUE` privileges."
