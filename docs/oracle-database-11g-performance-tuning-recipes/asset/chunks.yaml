    \ is performing all sorts and hashes optimally, in the PGA. If you see a high\
    \ number of one-pass executions and even a few large multi-pass executions, that's\
    \ an indication that the PGA is too small and you should consider increasing it.\n\
    \n### How It Works\n\nAnalyzing an AWR report should be your first step when troubleshooting\
    \ database performance issues such as a slow-running query. An AWR report lets\
    \ you quickly find out things such as the number of connections, transactions\
    \ per second, cache-hit rates, wait event information, and the SQL statements\
    \ that are using the most CPU and I/O. It shows you which of your SQL statements\
    \ are using the most resources, and which wait events are slowing down the database.\
    \ Most importantly, probably, the report tells you if the database performance\
    \ is unusually different from its typical performance during a given time of the\
    \ day (or night). The AWR report sections summarized in the “Solution” section\
    \ are only a small part of the AWR report. Here are some other key sections of\
    \ the report that you must review when troubleshooting performance issues:\n\n\
    *   Foreground Wait Events\n*   SQL Ordered by Gets\n*   SQL Ordered by Reads\n\
    *   SQL Ordered by Physical Reads\n*   Instance Activity Stats\n*   Log Switches\n\
    *   Enqueue Activity\n*   Reads by Tablespace, Datafile, and SQL Statement\n*\
    \   Segments by Table Scans\n*   Segments by Row Lock Waits\n*   Undo Segment\
    \ Summary\n\nDepending on the nature of the performance issue you're investigating,\
    \ several of these sections in the report may turn out to be useful. In addition\
    \ to the performance and wait statistics, the AWR report also offers advisories\
    \ for both the PGA and the SGA. The AWR report is truly your best friend when\
    \ you are troubleshooting just about any database performance issue. In a matter\
    \ of minutes, you can usually find the underlying cause of the issue and figure\
    \ out a potential fix. AWR does most of the work for you—you just need to know\
    \ what to look for!"
  raw: '##### Top 5 Foreground Events


    The Top 5 Timed Foreground Events section shows the events that were responsible
    for the most waits during the time spanned by the AWR report.


    `Top 5 Timed Foreground Events`

    `~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`

    `                                                        Avg Wait % DB`

    `Event                                 Waits     Time(s)   (ms)   time Wait Class`

    `------------------------------ ------------ ----------- ------ ------ ----------`

    `db file sequential read              13,735         475     35   23.4 User I/O`

    `DB CPU                                              429          21.1`

    `latch: shared pool                      801          96    120    4.7 Concurrenc`

    `db file scattered read                  998          49     49    2.4 User I/O`

    `control file sequential read          9,785          31      3    1.5 System
    I/O`


    The Top 5 Timed Foreground Events section is where you can usually spot the problem,
    by showing you why the sessions are “waiting.” The Top 5 Events information shows
    the total waits for all sessions, but usually one or two sessions are responsible
    for most of the waits. Make sure to analyze the total waits and average waits
    (ms) separately, in order to determine if the waits are significant. Merely looking
    at the total number of waits or the total wait time for a wait event could give
    you a misleading idea about its importance. You must pay close attention to the
    average wait times for an event as well. In a nicely performing database, you
    should see CPU and I/O as the top wait events, as is the case here. If any wait
    events from the concurrent wait class such as latches show up at the top, investigate
    those waits further. For example, if you see events such as `enq: TX - row lock
    contention`, `gc_buffer_busy` (RAC), or   `latch free`, it usually indicates contention
    in the database. If you see an average wait of more than 2 ms for the `log file
    sync` event, investigate the wait event further ([Chapter 5](#Chapter05.html#ch5)
    shows how to analyze various wait events). If you see a high amount of waits due
    to the db file sequential read or the db file scattered read wait events, there
    are heavy indexed reads (this is normal) or full table scans going on. You can
    find out the SQL statement and the tables involved in these read events in the
    AWR report.


    ##### Time Model Statistics


    Time model statistics give you an idea about how the database has spent its time,
    including the time it spent on executing SQL statements as against parsing statements.
    If parsing time is very high, or if hard parsing is significant, you must investigate
    further.


    `Time Model Statistics                  DB/Inst: ORCL1/orcl1  Snaps: 1878-1879`


    `Statistic Name                                       Time (s) % of DB Time`

    `------------------------------------------ ------------------ ------------`

    `sql execute elapsed time                              1,791.5         88.2`

    `parse time elapsed                                      700.1         34.5`

    `hard parse elapsed time                                 653.7         32.2`


    ##### Top SQL Statements


    This section of the AWR report lets you quickly identify the most expensive SQL
    statements.


    `SQL ordered by Elapsed Time            DB/Inst: ORCL1/orcl1  Snaps: 1878-1879`

    `-> Captured SQL account for   13.7% of Total DB Time (s):           2,032`

    `-> Captured PL/SQL account for   19.8% of Total DB Time (s):           2,032`


    `        Elapsed                  Elapsed Time`

    `        Time (s)    Executions  per Exec (s)  %Total   %CPU    %IO    SQL Id`

    `---------------- -------------- ------------- ------ ------ ------ -------------`

    `           292.4              1        292.41   14.4    8.1   61.2 b6usrg82hwsas`

    `…`


    You can generate an explain plan for the expensive SQL statements using the SQL
    ID from this part of the report.


    ##### PGA Histogram


    The `PGA Aggregate Target Histogram` shows how well the database is executing
    the sort and hash operations—for example:


    ` PGA Aggr Target Histogram               DB/Inst: ORCL1/orcl1  Snaps: 1878-1879`

    `-> Optimal Executions are purely in-memory operations`


    `  Low     High`

    `Optimal Optimal    Total Execs  Optimal Execs 1-Pass Execs M-Pass Execs`

    `------- ------- -------------- -------------- ------------ ------------`

    `     2K      4K         13,957         13,957            0            0`

    `    64K    128K             86             86            0            0`

    `   128K    256K             30             30            0            0`


    In this example, the database is performing all sorts and hashes optimally, in
    the PGA. If you see a high number of one-pass executions and even a few large
    multi-pass executions, that''s an indication that the PGA is too small and you
    should consider increasing it.


    #### How It Works


    Analyzing an AWR report should be your first step when troubleshooting database
    performance issues such as a slow-running query. An AWR report lets you quickly
    find out things such as the number of connections, transactions per second, cache-hit
    rates, wait event information, and the SQL statements that are using the most
    CPU and I/O. It shows you which of your SQL statements are using the most resources,
    and which wait events are slowing down the database. Most importantly, probably,
    the report tells you if the database performance is unusually different from its
    typical performance during a given time of the day (or night). The AWR report
    sections summarized in the “Solution” section are only a small part of the AWR
    report. Here are some other key sections of the report that you must review when
    troubleshooting performance issues:


    *   Foreground Wait Events

    *   SQL Ordered by Gets

    *   SQL Ordered by Reads

    *   SQL Ordered by Physical Reads

    *   Instance Activity Stats

    *   Log Switches

    *   Enqueue Activity

    *   Reads by Tablespace, Datafile, and SQL Statement

    *   Segments by Table Scans

    *   Segments by Row Lock Waits

    *   Undo Segment Summary


    Depending on the nature of the performance issue you''re investigating, several
    of these sections in the report may turn out to be useful. In addition to the
    performance and wait statistics, the AWR report also offers advisories for both
    the PGA and the SGA. The AWR report is truly your best friend when you are troubleshooting
    just about any database performance issue. In a matter of minutes, you can usually
    find the underlying cause of the issue and figure out a potential fix. AWR does
    most of the work for you—you just need to know what to look for!


    ## C H A P T E R  8'
