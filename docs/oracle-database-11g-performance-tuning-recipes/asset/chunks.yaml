    \  36bdwxutr5n75\n SQL Execution ID    :  16777225\n Execution Started   :  05/15/2011\
    \ 14:56:16\n First Refresh Time  :  05/15/2011 14:56:16\n Last Refresh Time  \
    \ :  05/15/2011 15:09:47\n Duration            :  812s\n Module/Action       :\
    \  SQL*Plus/-\n Service             :  SYS$USERS\n Program             :  sqlplus@ora\n\
    \ Fetch Calls         :  6131367\n\nGlobal Stats\n==========================================================================================\n\
    | Elapsed |   Cpu   |    IO    | Concurrency |  Other   | Fetch | Buffer | Read\
    \ | Read  |\n| Time(s) | Time(s) | Waits(s) |  Waits(s)   | Waits(s) | Calls |\
    \  Gets  | Reqs | Bytes |\n=========================================================================================\n\
    |     398 |     235 |     6.45 |        0.04 |      156 |    6M |   556K | 17629|\
    \   4GB |\n=========================================================================================\n\
    ```\n\n有关执行`REPORT_SQL_MONITOR`函数可用的所有参数的完整列表，请参阅《Oracle PL/SQL Packages and Types\
    \ Reference》。这是一个非常强大的函数，根据您的具体需求，有无数种组合可以进行报告。\n\n### 9-9. 识别过去执行过的消耗资源的 SQL\
    \ 语句\n\n#### Problem\n\n您希望查看以前运行的SQL语句的信息，以帮助识别资源密集型操作。\n\n![images](images/square.jpg)\
    \ **Note** 配方 9-6 展示了如何识别*当前正在执行的*资源密集型语句。"
  raw: '#### Solution


    There are a couple of ways to get information to see where a query is executing
    in terms of the execution plan. First, by querying the `V$SQL_PLAN_MONITOR` view,
    you can get information for all queries that are in progress, as well as recent
    queries that are complete. If we are joining two tables to get employee and department
    information, our query would look like this:


    `SELECT ename, dname`

    `FROM emppart JOIN dept USING (deptno);`


    `--------------------------------------------`

    `| Id  | Operation               | Name     |`

    `--------------------------------------------`

    `|   0 | SELECT STATEMENT        |          |`

    `|   1 |  PX COORDINATOR         |          |`

    `|   2 |   PX SEND QC (RANDOM)   | :TQ10001 |`

    `|   3 |    HASH JOIN            |          |`

    `|   4 |     BUFFER SORT         |          |`

    `|   5 |      PX RECEIVE         |          |`

    `|   6 |       PX SEND BROADCAST | :TQ10000 |`

    `|   7 |        TABLE ACCESS FULL| DEPT     |`

    `|   8 |     PX BLOCK ITERATOR   |          |`

    `|   9 |      TABLE ACCESS FULL  | EMPPART  |`

    `--------------------------------------------`


    To see information for the foregoing query while it is currently running, you
    can issue a query like the one shown here (some rows have been removed for conciseness):


    `column operation format a25`

    `column plan_line_id format 9999 heading ''LINE''`

    `column plan_options format a10 heading ''OPTIONS''`

    `column status format a10`

    `column output_rows heading ''ROWS''`

    `break on sid on sql_id on status`


    `SELECT sid, sql_id, status, plan_line_id,`

    `plan_operation || '' '' || plan_options operation, output_rows`

    `FROM v$sql_plan_monitor`

    `WHERE status not like ''%DONE%''`

    `ORDER BY 1,4;`

    `       SID SQL_ID        STATUS      LINE OPERATION                       ROWS`

    `---------- ------------- ---------- ----- ------------------------- ----------`

    `        18 36bdwxutr5n75 EXECUTING      0 SELECT STATEMENT             3929326`

    `                                        1 PX COORDINATOR               3929326`

    `        27 36bdwxutr5n75 EXECUTING      0 SELECT STATEMENT                   0`

    `                                        2 PX SEND QC (RANDOM)          1752552`

    `                                        3 HASH JOIN                    1752552`

    `                                        8 PX BLOCK ITERATOR            1752552`

    `                                        9 TABLE ACCESS FULL            1752552`

    `       101 36bdwxutr5n75 EXECUTING      0 SELECT STATEMENT                   0`

    `                                        2 PX SEND QC (RANDOM)          2148232`

    `                                        3 HASH JOIN                    2148232`

    `                                        8 PX BLOCK ITERATOR            2148232`

    `                                        9 TABLE ACCESS FULL            2148232`


    In this particular example, the `EMPPART` table has a parallel degree of 2, and
    we can see that for SIDs 27 and 101, these are the parallel slaves that are getting
    the data. As these processes pass data back to the query coordinator and then
    back to the user, we can see that when we look at SID 18\. If we simply run subsequent
    queries against the `V$SQL_PLAN_MONITOR` view, we can see the progress of the
    query as it is executing. In the foregoing example, we simply see the output row
    values increasing as the query progresses.


    Another method of seeing the progress of a query via the execution plan is by
    using the `DBMS_SQLTUNE.REPORT_SQL_MONITOR` function. If we use the same query
    against the `EMPPART` and `DEPT` tables used in the previous example, we can run
    the `REPORT_SQL_MONITOR` function to get a graphical look at the progress. See
    the following example of how to generate the file that would produce the HTML
    file that could be, in turn, used to view our progress. [Figure 9-2](#Chapter09.html#fig_9_2)
    shows portions of the resulting report.


    `set pages 9999`

    `set long 1000000`

    `SELECT DBMS_SQLTUNE.REPORT_SQL_MONITOR(sql_id=> ''36bdwxutr5n75'',type=>''HTML'')
    FROM dual;` ![images](images/0902.jpg)


    ***Figure 9-2.** Sample HTML report from* `DBMS_SQLTUNE.REPORT_SQL_MONITOR`


    #### How It Works


    The `V$SQL_PLAN_MONITOR` is populated from the `V$SQL_MONITOR` view (see Recipe
    9-7). Both of these views are new as of Oracle 11g, and are updated every second
    that a statement executes. The `V$SQL_MONITOR` view is populated each time a SQL
    statement is monitored.


    The `DBMS_SQLTUNE.REPORT_SQL_MONITOR` function can be invoked in several ways.
    The level of detail, as well as the type of detail you wish to see in the report,
    can be changed based on the parameters passed into the function. The output can
    be viewed in several formats, including plain text, HTML, and XML. The default
    output format is plain text. As an example, let''s say we wanted to see the output
    for our join against the `EMPPART` and `DEPT` tables. In this instance, we want
    the output in text format. We want the detail aggregated, and we want to see just
