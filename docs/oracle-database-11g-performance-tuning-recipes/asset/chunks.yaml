    \ on system-level statistics in your database, including parallelism-related statistics,\
    \ you can see, at a quick glance, if the DOP requested was actually used, and\
    \ if any of those operations were downgraded:\n\n```sql\nSELECT name , value\n\
    FROM v$sysstat\nWHERE name LIKE '%Parallel%';\n```\n\n```\n----------------------------------------------------------------\
    \ ----------\nParallel operations not downgraded                             \
    \       10331\nParallel operations downgraded to serial                      \
    \           0\nParallel operations downgraded 75 to 99 pct                   \
