    \ 会将该会话报告为“标记为要终止”，并将控制权返回给 SQL 提示符。如果你指定 `IMMEDIATE`（可选），Oracle 将回滚任何活动事务并立即将控制权返回给你。\n\
    \n#### 使用操作系统 kill 命令\n\n如果你能访问数据库服务器，并且拥有可以终止 Oracle 进程的操作系统帐户权限（例如 `oracle`\
    \ 操作系统帐户），你也可以直接使用 `kill` 命令终止进程。\n\n例如，假设你运行了 `ps` 命令，并已经完成相关工作，确定有一个已运行数小时并需要被终止的\
    \ SQL 语句。`kill` 命令直接终止操作系统进程。在此示例中，进程 ID 6254 被终止：\n\n```bash\n$ kill -9 6254\n\
    ```\n\n![images](img/square.jpg) **注意** 确保你没有杀死错误的 Oracle 进程。如果不小心杀死了必需的 Oracle\
    \ 后台进程，这将导致你的实例中止。\n\n### 工作原理\n\n有时你会发现自己处于需要终止挂起的 SQL 进程、数据库作业或消耗大量资源的 SQL 语句的情况。例如，你可能有一个测试服务器，其中一个作业已经运行了几个小时，消耗了大量服务器资源，需要被停止，以便其他作业能够及时继续处理。\n\
