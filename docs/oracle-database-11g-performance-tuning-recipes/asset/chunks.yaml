- fmt: "#### Solution\n\nYou can run the `awrsqrpt.sql` script, which is very similar\
    \ to `awrrpt.sql`. You will be prompted for all of the same information, except\
    \ you will have an additional prompt for a specific SQL ID value—for example:\n\
    \n```\nSpecify the SQL Id\n~~~~~~~~~~~~~~~~~~\nEnter value for sql_id: 5z1b3z8rhutn6\n\
    SQL ID specified:  5z1b3z8rhutn6\n```\n\nThe resulting report zeroes in on information\
    \ specifically for your SQL statement, including `CPU Time`, `Disk Reads`, and\
    \ `Buffer Gets`. It also gives a detailed execution plan for review. See the following\
    \ snippet from the report:\n\n```\nStat Name                                 \
    \        Statement   Per Execution % Snap\n------------------------------------------------\
    \ ---------- -------------- -------\nElapsed Time (ms)                       \
    \            210,421      105,210.3     9.4\nCPU Time (ms)                   \
    \                     22,285       11,142.3     1.6\nExecutions              \
    \                                  2            N/A     N/A\nBuffer Gets     \
    \                                      1,942,525      971,262.5    12.5\nDisk\
    \ Reads                                            1,940,578      970,289.0  \
    \  14.0\nParse Calls                                                9        \
    \    4.5     0.0\nRows                                                       0\
    \            0.0     N/A\nUser I/O Wait Time (ms)                            \
    \  195,394            N/A     N/A\nCluster Wait Time (ms)                    \
    \                0            N/A     N/A\nApplication Wait Time (ms)        \
    \                        0            N/A     N/A\nConcurrency Wait Time (ms)\
    \                                0            N/A     N/A\nInvalidations     \
    \                                        0            N/A     N/A\nVersion Count\
    \                                             2            N/A     N/A\nSharable\
    \ Mem(KB)                                         22            N/A     N/A\n\
    ```\n\n```\nExecution Plan\n-----------------------------------------------------------------------------------------------\n\
    | Id  | Operation            | Name      | Rows  | Bytes | Cost (%CPU)| Time \
    \    |PQ Dis\n-----------------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT     |           |       |       | 73425 (100)|      \
    \    |\n|   1 |  PX COORDINATOR      |           |       |       |           \
    \ |          |\n|   2 |   PX SEND QC (RANDOM)| :TQ10000  |     1 |    39 | 73425\
    \   (1)| 00:14:42 | P->S\n|   3 |    PX BLOCK ITERATOR |           |     1 | \
