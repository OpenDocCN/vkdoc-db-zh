    click the SQL Plan Control tab. You should be presented with a screen similar
    to [Figure 12-3](#Chapter12.html#fig_12_3).


    ![images](images/1203.jpg)


    ***Figure 12-3.** Managing SQL profiles*


    From this screen, you can manage features such as enabling, disabling, changing
    the category, and dropping a SQL profile.


    ### 12-5\. Dropping a SQL Profile


    #### Problem


    You''ve tested a query with and without a SQL profile attached to the query. You
    determine the query performance is not significantly better with the SQL profile.
    You want to drop the SQL profile so you''re not cluttering up the data dictionary
    with unnecessary and obsolete information.


    #### Solution


    Use the `DBMS_SQLTUNE.DROP_SQL_PROFILE` procedure to drop a SQL profile. Pass
    in the name of the SQL profile you want to drop—for example:


    `SQL> exec dbms_sqltune.drop_sql_profile(''SYS_SQLPROF_012edef0d0a70002'');`


    If successful, you should see the following:


    `PL/SQL procedure successfully completed.`


    #### How It Works


    It''s fairly easy to drop a SQL profile. You might want to do this if you''re
    cleaning up a database or if you want to remove profiles from a testing environment.
    If you''re unsure of the SQL profile name, you can query `DBA_SQL_PROFILES` for
    more information (see Recipe 12-3 for details).


    ![images](images/square.jpg) **Note** You need the `DROP ANY SQL PROFILE` privilege
    to drop a SQL profile.


    If you want to drop all profiles in a database, you can use PL/SQL to loop through
    all profiles and drop them:


    `declare`

    `  cursor c1 is select name from dba_sql_profiles;`

    `begin`

    `  for r1 in c1 loop`

    `    dbms_sqltune.drop_sql_profile(r1.name);`

    `  end loop;`

    `end;`

    `/`


    ### 12-6\. Moving a SQL Profile


    #### Problem


    You have a test database and want to extract all of the SQL profiles from the
    test database and move them to a production database.


    #### Solution


    Listed next are the steps involved with transporting a SQL profile from one database
    to another:


    1.  Create a staging table.

    2.  Populate the staging table.

    3.  Move the table from the source database to the destination database (Data
    Pump or database link).

    4.  On the destination database, extract information from the staging table to
    populate the data dictionary with SQL profile information.


    These steps are detailed in the following subsections.


    ##### Step 1: Create a Staging Table


    Use the `DBMS_SQLTUNE.CREATE_STGTAB_SQLPROF` procedure to create the staging table.
    This example creates a table named `PROF_STAGE` owned by the `MV_MAINT` user:


    `BEGIN`

    `  dbms_sqltune.create_stgtab_sqlprof(`

    `    table_name => ''PROF_STAGE'',`

    `    schema_name => ''MV_MAINT'' );`

    `END;`

    `/`


    ##### Step 2: Populate the Staging Table


    Use the `DBMS_SQLTUNE.PACK_STGTAB_SQLPROF` procedure to populate the table created
    in step 1 with SQL profile information. This example populates the table with
    information regarding a specific SQL profile:


    `BEGIN`

    `  dbms_sqltune.pack_stgtab_sqlprof(`

    `    profile_name => ''SYS_SQLPROF_012edf84806e0004'',`

    `    staging_table_name => ''PROF_STAGE'',`

    `    staging_schema_owner => ''MV_MAINT'' );`

    `END;`

    `/`


    ![images](images/square.jpg) **Tip** The `PROFILE_NAME` parameter can include
    wildcard characters. For example, if you want to transport all SQL profiles in
    a database, you can use ‘%’ for the `PROFILE_NAME`.


    ##### Step 3: Copy the Staging Table to the Destination Database


    You can copy the table from one database to the other via Data Pump, the old `exp`/`imp`
    utilities, or by using a database link. This example creates a database link in
    the destination database and then copies the table from the source database:


    `create database link source_db`

    `connect to mv_maint`

    `identified by foo`

    `using ''source_db'';`


    Once the database link has been created, the table can be copied directly from
    the source with the `CREATE TABLE...AS SELECT` statement:


    `SQL> create table PROF_STAGE as select * from PROF_STAGE@source_db;`


    ##### Step 4: Load the Contents of the Staging Table into the Destination Database


    Now in the destination database, unpack the table to load profile information
    into the database:


    `BEGIN`

    `  DBMS_SQLTUNE.UNPACK_STGTAB_SQLPROF(`

    `    replace => TRUE,`

    `    staging_table_name => ''PROF_STAGE'');`

    `END;`

    `/`


    If no profile name is specified, the default is the `%` wildcard character (meaning
    all profiles in the table will be loaded into the destination database).


    #### How It Works


    It''s fairly easy to copy SQL profiles from one database to another. You simply
    have to create a special table to hold the profile information, then populate
    the table, copy the table to the destination database, and lastly unpack the table''s
    contents. [Table 12-4](#Chapter12.html#tab_12_4) describes all of the parameters
    for the profile packing procedure.


    ![images](images/t1204.jpg)


    The `DBMS_SQLTUNE.UNPACK_STGTAB_SQLPROF` procedure takes the same parameters as
    the packing procedure with an additional `REPLACE` parameter. The `REPLACE` parameter
    specifies whether to replace profiles if they already exist (can be `TRUE` or
    `FALSE`).


    ### 12-7. Automatically Adding Plan Baselines


    #### Problem


    You want to automatically create plan baselines for every SQL query that repeatedly
    executes in your database.'
  trans: "#### 工作原理\n\nSQL 配置文件的状态是几个可修改的属性之一。您还可以修改诸如名称、描述和类别等特征。有关可修改属性的描述，请参阅表\
    \ 12-3。\n\n![images](img/square.jpg) **注意** 您需要拥有 `ALTER ANY SQL PROFILE` 权限才能更改\
    \ SQL 配置文件。\n\n![images](img/t1203.jpg)\n\nSQL 配置文件的类别有一些有趣的影响。类别允许您通过设置 `SQLTUNE_CATEGORY`\
    \ 初始化参数（此参数可在会话或系统级别设置）来控制 SQL 配置文件的使用。当执行查询时，如果有可用的 SQL 配置文件，优化器会检查分配给该 SQL 配置文件的类别是否与\
    \ `SQLTUNE_CATEGORY` 的系统或会话级设置相同。如果 SQL 配置文件的类别与 `SQLTUNE_CATEGORY` 的设置匹配，那么优化器将考虑使用该\
    \ SQL 配置文件。\n\nSQL 配置文件的默认类别是 `DEFAULT`。同时 `SQLTUNE_CATEGORY` 的默认值也是 `DEFAULT`。因此，除非您更改了\
    \ SQL 配置文件的类别或修改了 `SQLTUNE_CATEGORY` 参数，否则优化器将会使用该 SQL 配置文件作为输入。\n\n您可以将类别更改为\
    \ `DEFAULT` 以外的值。这意味着只有那些会话，如果它们将 `SQLTUNE_CATEGORY` 初始化参数修改为与 SQL 配置文件类别相匹配的值，才能使用该配置文件。例如，假设您将\
    \ SQL 配置文件修改为类别 `TEST1`：\n\n```sql\nBEGIN\n  DBMS_SQLTUNE.ALTER_SQL_PROFILE(\n\
    \    name => 'SYS_SQLPROF_012eda58a1be0001',\n    attribute_name => 'CATEGORY',\n\
    \    value => 'TEST1');\nEND;\n/\n```\n\n现在，唯一能看到并使用此配置文件的会话是那些将 `SQLTUNE_CATEGORY`\
    \ 设置为 `TEST1` 的会话：\n\n```sql\nSQL> alter session set sqltune_category=TEST1;\n\
    ```\n\n这允许您将配置文件的使用隔离到仅那些 `SQLTUNE_CATEGORY` 设置与该 SQL 配置文件类别相匹配的会话。这使您能够测试实施 SQL\
    \ 配置文件的影响，并可以通过简单地更改会话级或系统级的 `SQLTUNE_CATEGORY` 设置来快速回退。\n\n您还可以从 Enterprise Manager\
    \ 管理 SQL 配置文件的许多方面。从主数据库页面导航到“服务器”选项卡。在“查询优化器”部分，单击“SQL 计划控制”选项卡。您应该会看到一个类似于图\
    \ 12-3 的屏幕。\n\n![images](img/1203.jpg)\n\n**图 12-3.** 管理 SQL 配置文件\n\n从这个屏幕，您可以管理诸如启用、禁用、更改类别以及删除\
    \ SQL 配置文件等功能。\n\n### 12-5. 删除 SQL 配置文件\n\n#### 问题\n\n您已对一个查询在附加和不附加 SQL 配置文件的情况下进行了测试。您确定查询性能在使用\
    \ SQL 配置文件后并未显著提升。您想要删除该 SQL 配置文件，以免数据字典中充斥着不必要和过时的信息。\n\n#### 解决方案\n\n使用 `DBMS_SQLTUNE.DROP_SQL_PROFILE`\
    \ 过程来删除 SQL 配置文件。传入您要删除的 SQL 配置文件的名称，例如：\n\n```sql\nSQL> exec dbms_sqltune.drop_sql_profile('SYS_SQLPROF_012edef0d0a70002');\n\
    ```\n\n如果成功，您将看到以下输出：\n\n```\nPL/SQL procedure successfully completed.\n```\n\n\
    #### 工作原理\n\n删除 SQL 配置文件相当容易。如果您正在清理数据库或想要从测试环境中移除配置文件，可能需要执行此操作。如果您不确定 SQL 配置文件的名称，可以查询\
    \ `DBA_SQL_PROFILES` 以获取更多信息（详情请参阅配方 12-3）。\n\n![images](img/square.jpg) **注意**\
    \ 您需要拥有 `DROP ANY SQL PROFILE` 权限才能删除 SQL 配置文件。\n\n如果您想删除数据库中的所有配置文件，可以使用 PL/SQL\
    \ 循环遍历所有配置文件并删除它们：\n\n```sql\ndeclare\n  cursor c1 is select name from dba_sql_profiles;\n\
    begin\n  for r1 in c1 loop\n    dbms_sqltune.drop_sql_profile(r1.name);\n  end\
    \ loop;\nend;\n/\n```\n\n### 12-6. 迁移 SQL 配置文件\n\n#### 问题\n\n您有一个测试数据库，并希望从中提取所有\
    \ SQL 配置文件，然后将它们迁移到生产数据库。\n\n#### 解决方案\n\n将 SQL 配置文件从一个数据库传输到另一个数据库涉及以下步骤：\n\n\
    1.  创建一个暂存表。\n2.  填充该暂存表。\n3.  将表从源数据库移动到目标数据库（使用 Data Pump 或数据库链接）。\n4.  在目标数据库上，从暂存表中提取信息，以将\
    \ SQL 配置文件信息填充到数据字典中。\n\n以下小节详细描述了这些步骤。\n\n##### 步骤 1：创建暂存表\n\n使用 `DBMS_SQLTUNE.CREATE_STGTAB_SQLPROF`\
    \ 过程创建暂存表。此示例创建一个由 `MV_MAINT` 用户拥有的名为 `PROF_STAGE` 的表：\n\n```sql\nBEGIN\n  dbms_sqltune.create_stgtab_sqlprof(\n\
    \    table_name => 'PROF_STAGE',\n    schema_name => 'MV_MAINT' );\nEND;\n/\n\
    ```\n\n##### 步骤 2：填充暂存表\n\n使用 `DBMS_SQLTUNE.PACK_STGTAB_SQLPROF` 过程，用 SQL 配置文件信息填充步骤\
    \ 1 中创建的表。此示例用有关特定 SQL 配置文件的信息填充表：\n\n```sql\nBEGIN\n  dbms_sqltune.pack_stgtab_sqlprof(\n\
    \    profile_name => 'SYS_SQLPROF_012edf84806e0004',\n    staging_table_name =>\
    \ 'PROF_STAGE',\n    staging_schema_owner => 'MV_MAINT' );\nEND;\n/\n```\n\n![images](img/square.jpg)\
    \ **提示** `PROFILE_NAME` 参数可以包含通配符。例如，如果您想传输数据库中的所有 SQL 配置文件，可以将 `PROFILE_NAME`\
    \ 设置为 `'%'`。\n\n##### 步骤 3：将暂存表复制到目标数据库\n\n您可以通过 Data Pump、旧的 `exp`/`imp` 实用程序或使用数据库链接将表从一个数据库复制到另一个数据库。此示例在目标数据库中创建一个数据库链接，然后从源数据库复制表：\n\
    \n```sql\ncreate database link source_db\nconnect to mv_maint\nidentified by foo\n\
    using 'source_db';\n```\n\n创建数据库链接后，可以使用 `CREATE TABLE...AS SELECT` 语句直接从源端复制表：\n\
    \n```sql\nSQL> create table PROF_STAGE as select * from PROF_STAGE@source_db;\n\
    ```\n\n##### 步骤 4：将暂存表的内容加载到目标数据库\n\n现在在目标数据库中，解包该表以将配置文件信息加载到数据库中：\n\n```sql\n\
    BEGIN\n  DBMS_SQLTUNE.UNPACK_STGTAB_SQLPROF(\n    replace => TRUE,\n    staging_table_name\
    \ => 'PROF_STAGE');\nEND;\n/\n```\n\n如果未指定配置文件名称，默认为 `%` 通配符（意味着表中的所有配置文件都将被加载到目标数据库中）。\n\
    \n#### 工作原理\n\n将 SQL 配置文件从一个数据库复制到另一个数据库相当容易。您只需创建一个特殊的表来保存配置文件信息，然后填充该表，将表复制到目标数据库，最后解包表的内容。表\
    \ 12-4 描述了配置文件打包过程的所有参数。\n\n![images](img/t1204.jpg)\n\n`DBMS_SQLTUNE.UNPACK_STGTAB_SQLPROF`\
    \ 过程采用与打包过程相同的参数，并额外增加了一个 `REPLACE` 参数。`REPLACE` 参数指定如果配置文件已存在是否进行替换（可以是 `TRUE`\
    \ 或 `FALSE`）。\n\n### 12-7. 自动添加计划基线\n\n#### 问题\n\n您希望为数据库中每个重复执行的 SQL 查询自动创建计划基线。"
- fmt: "### 12-8. Creating a Plan Baseline for One SQL Statement\n\n#### Problem\n\
    \nYou want to create a plan baseline for a specific SQL statement that you're\
    \ currently executing.\n\n#### Solution\n\nThe procedure for manually associating\
    \ a plan baseline with a SQL statement is as follows:\n\n1.  Identify the SQL\
    \ statement(s) for which you want plan baselines.\n2.  Provide an identifier such\
    \ as the `SQL_ID` as input to the `DBMS_SPM` package to create a plan baseline\
    \ for the SQL statement.\n\nFor example, suppose you have a SQL statement you've\
    \ been working with such as the following:\n\n`SQL> select emp_id from emp where\
    \ emp_id = 100;`\n\nNow query the `V$SQL` view to determine the `SQL_ID` for the\
    \ query:\n\n```sql\nselect\n  sql_id\n ,sql_text\nfrom v$sql\nwhere sql_text\n\
    \    like 'select emp_id from emp where emp_id = 100';\n```\n\nHere is a snippet\
    \ of the output:\n\n```text\nSQL_ID        SQL_TEXT\n------------- ------------------------------------------------------------\n\
    0qgmjf9krq285 select emp_id from emp where emp_id = 100\n```\n\nNow that the `SQL_ID`\
    \ has been identified, use it as input to the `DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE`\
    \ function to create a plan baseline for the given query—for example:\n\n```sql\n\
    DECLARE\n  plan1 PLS_INTEGER;\nBEGIN\n  plan1 := DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE(sql_id\
    \ => '0qgmjf9krq285');\nEND;\n/\n```\n\nThe query now should have an entry in\
    \ the `DBA_SQL_PLAN_BASELINES` view showing that it has an enabled plan baseline\
    \ associated with it—for example:\n\n`SQL> select sql_handle, plan_name, sql_text\
    \ from dba_sql_plan_baselines;`\n\nHere's a small snippet of the output:\n\n```text\n\
    SQL_HANDLE                PLAN_NAME                                 SQL_TEXT\n\
    ------------------------- ---------------------------------------- ----------------------\n\
    SQL_f34ef255797c4713      SQL_PLAN_g6mrkapwrsjsmd8a279cc           select emp_id.....\n\
    ```\n\n#### How It Works\n\nThe “Solution” section described how to identify a\
    \ single SQL statement for which you want to create a plan baseline (based on\
    \ the `SQL_ID`) using a query in the cursor cache. There are many methods for\
    \ creating a plan baseline for a query, such as using the SQL text, schema, module,\
    \ and so on. For example, next a plan baseline is loaded based on a partial SQL\
    \ string:\n\n```sql\nDECLARE\n  plan1 PLS_INTEGER;\nBEGIN\n  plan1 := DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE(\n\
    \               attribute_name => 'sql_text'\n              ,attribute_value =>\
    \ 'select emp_id from emp%');\nEND;\n/\n```\n\nSee `Table 12-5` for details on\
    \ input parameters available with the `DBMS_SPM.LOAD_PLANS_FROM_CURSOR_CACHE`\
    \ function.\n\n**Note:** See Recipe 12-9 for an example of how to create plan\
    \ baselines for SQL statements contained in a SQL tuning set.\n\n![images](images/t1205.jpg)\n\
    \n### 12-9. Creating Plan Baselines for SQL Contained in SQL Tuning Set\n\n####\
    \ Problem\n\nYou have the following scenario:\n\n*   You're upgrading a database\
    \ to a new version.\n*   You know from past experience that upgrading to newer\
    \ versions of Oracle can sometimes cause SQL statements to perform poorly because\
    \ the optimizer in the upgraded version of the database is choosing a less efficient\
    \ (worse) execution plan than the optimizer from the prior version of the database.\n\
    *   You want to ensure that SQL statements execute with acceptable performance\
    \ after the upgrade.\n\nIn essence, you are upgrading and would prefer that the\
    \ optimizer choose the same execution plans both before and after the upgrade.\
    \ You don't want the upgrade to result in new plans that risk degrading performance.\n\
    \n#### Solution\n\nListed next are the steps for automatically creating plan baselines\
    \ for SQL statements that execute more than once:\n\n1.  Set the `OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES`\
    \ parameter to `TRUE` (either at the session or system level).\n2.  Execute two\
    \ times or more the queries for which you want plan baselines captured.\n3.  Set\
    \ the `OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES` to `FALSE`.\n\nThis next example\
    \ illustrates the process for adding a plan baseline (for a query) using the prior\
    \ steps. First set the specified initialization parameter at the session level:\n\
    \n`SQL> alter session set optimizer_capture_sql_plan_baselines=true;`\n\nNow a\
    \ query is executed twice. Oracle will automatically create a plan baseline for\
    \ a query that is run two or more times while the `OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES`\
    \ parameter is set to `TRUE`:\n\n`SQL> select emp_id from emp where emp_id=3000;`\n\
    `SQL> select emp_id from emp where emp_id=3000;`\n\nNow set the initialization\
    \ parameter back to `FALSE`.\n\n`SQL> alter session set optimizer_capture_sql_plan_baselines=false;`\n\
    \nThe query now should have an entry in the `DBA_SQL_PLAN_BASELINES` view showing\
    \ that it has an enabled plan baseline associated with it—for example:\n\n```sql\n\
    SELECT\n  sql_handle, plan_name, enabled, accepted,\n  created, optimizer_cost,\
    \ sql_text\nFROM dba_sql_plan_baselines;\n```\n\nHere is a partial listing of\
    \ the output:\n\n```text\nSQL_HANDLE           PLAN_NAME                     \
    \ ENA ACC...\n-------------------- ------------------------------ --- ---...\n\
    SQL_790bd425fe4a0125 SQL_PLAN_7k2yn4rz4n095d8a279cc YES YES...\n```\n\n#### How\
    \ It Works\n\nEnabling `OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES` allows you to automatically\
    \ capture plan baselines for queries running repeatedly (more than once) in your\
    \ database. The “Solution” section described how to use this feature at the session\
    \ level. You can also set the parameter so that all repeating queries in the database\
    \ have plan baselines generated—for example:\n\n`SQL> alter system set optimizer_capture_sql_plan_baselines=true;`\n\
    \nFrom this point, any query in the database that runs more than once will automatically\
    \ have a plan baseline created for it. We wouldn't recommend that you do this\
    \ in a production environment unless you have first carefully tested this feature\
    \ and ensured that there will be no adverse side effects (from storing a plan\
    \ baseline for every query). However, you may have a test environment where you\
    \ want to purposely create a plan baseline for every SQL statement that is repeatedly\
    \ run.\n\n**Note:** By default, the `OPTIMIZER_CAPTURE_SQL_PLAN_BASELINES` parameter\
    \ is `FALSE`.\n\nYou can also manage the use of plan baselines from Enterprise\
    \ Manager. From the main database page, navigate to the Server tab. In the Query\
    \ Optimizer section, click the SQL Plan Control tab. Next, click the SQL Plan\
    \ Baseline tab. You should see a screen similar to `Figure 12-4`.\n\n![images](images/1204.jpg)\n\
    \n`Figure 12-4. Managing plan baselines`\n\nFrom this screen, you can manage tasks\
    \ such as enabling, disabling, dropping, and evolving plan baselines."
