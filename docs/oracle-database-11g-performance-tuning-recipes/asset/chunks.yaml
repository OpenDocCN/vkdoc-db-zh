  raw: '#### Solution


    You can use the Oracle Active Session History (ASH) information in order to get
    real-time or near real-time session information. While the AWR information is
    very useful, it is bound by the reporting periods, which are by default run every
    hour on your database. The ASH information has active session information, and
    is sampled every second from `V$SESSION`, and can show more real-time or near
    real-time session information to assist in doing performance analysis on your
    database. There are a few ways to get active session information from the database:


    *   Running the canned ASH report

    *   Running an ASH report from within Enterprise Manager (see Recipe 4-12)

    *   Getting ASH information from the data dictionary (see Recipe 4-13)


    The easiest method to get information on active sessions is to run the `ashrpt.sql`
    script, which is similar in nature to the `awrrpt.sql` script that is run when
    generating an AWR report. When you run the `ashrpt.sql` script, it asks you for
    the following:


    *   Report type (text or HTML)

    *   Begin time for report (defaults to current time minus 15 minutes)

    *   End time for report (defaults to current time)

    *   Report name


    There are many sections to the ASH report. See [Table 4-1](#Chapter04.html#tab_4_1)
    for a brief description of each section. See the following snippet from many of
    the sections of the ASH report. Some sections have been shortened for brevity.


