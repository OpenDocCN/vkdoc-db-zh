- fmt: '#### Solution


    默认情况下，当你连接存在于不同数据库的表时，查询起源的数据库是大部分工作发生的地方。你可以改变此行为，并告诉优化器哪个数据库将执行工作：


    ```

    SELECT /*+ driving_site(employees) */ first_name, last_name, department_name

    FROM employees@to_emp_link JOIN departments USING(department_id);

    ```


    如果远程站点的数据量很大，或者你在远程站点上查询许多表，那么指定远程站点作为驱动是最合适的。为了处理分布式查询，优化器首先必须将远程表中的行传送到本地站点，然后再处理整个查询。这对本地数据库上的临时表空间可能非常耗费资源。因此，通过指示优化器在数据占比最大的站点执行工作，你可以显著提升查询性能。


    指定这个提示时，你只需要在提示中指定远程表或表别名，就能引导优化器到将要执行工作的站点。如果你希望优化器在本地数据库执行工作，则无需指定任何提示；只有当你想将工作导向到远程数据库时，才需要指定此提示。'
  raw: '#### Solution


    By default, when you are joining tables that exist on different databases, the
    database where the query originated is where the majority of the work takes place.
    You can change this behavior and tell the optimizer which database will do the
    work:


    `SELECT /*+ driving_site(employees) */ first_name, last_name, department_name`

    `FROM employees@to_emp_link JOIN departments USING(department_id);`


    Specifying the remote site as the driver is most appropriate if the volume on
    the remote site is large, or if you are querying many tables on the remote site.
    In order to process a distributed query, the optimizer first has to bring rows
    from remote tables over to the local site, before processing the overall query.
    This can be very resource-intensive on the temporary tablespace(s) on the local
    database. Therefore, by instructing the optimizer to perform the work at the site
    where the biggest percentage of the data resides, you can drastically improve
    your query performance.


    When specifying the hint, you simply need to specify the remote table or table
    alias within your hint to direct the optimizer to the site that will do the work.
    There is no need to specify any hint if you wish the optimizer to do the work
    on the local database; the hint needs to be specified when you want to direct
    the work to a remote database.'
