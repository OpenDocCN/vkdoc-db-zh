    ### 6-7. Identifying Network-Intensive Processes


    #### Problem


    You''re investigating performance issues on a database server. As part of your
    investigation, you want to determine if there are network bottlenecks on the system.


    #### Solution


    Use the `netstat` (network statistics) command to display network traffic. Perhaps
