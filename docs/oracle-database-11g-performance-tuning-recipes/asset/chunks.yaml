    \ \"%\" -f1 -)\n```\n\n前面的代码（为了适应页面而分成两行）运行几个 Linux/Unix 命令并将输出放入 `usedSpc` 变量。该命令首先运行\
    \ `df -h`，然后通过管道传递给 `awk` 命令。`awk` 命令获取输出并打印第五列。然后通过管道传递给 `grep` 命令，该命令使用 `-v`\
    \ 从输出中排除单词 `Use%`。最后通过管道传递给 `cut` 命令，该命令从输出中切出“%”字符。\n\n在 Linux/Unix 系统上，像前面这样的\
    \ shell 脚本可以很容易地从 `cron` 等调度工具运行。例如，如果 shell 脚本名为 `filesp.bsh`，则是一个示例 `cron` 条目：\n\
    ```\n#-----------------------------------------------------------------\n# Filesystem\
    \ check\n7 * * * * /orahome/oracle/bin/filesp.bsh 1>/orahome/oracle/bin/log/filesp.log\
    \ 2>&1\n#-----------------------------------------------------------------\n```\n\
    \n前面的条目指示系统在每天每小时的第七分钟运行 `filesp.bsh` shell 脚本。\n\n### 6-2. 识别系统瓶颈 (vmstat)\n\n\
    #### 问题\n\n您想确定服务器性能问题是否特别与磁盘 I/O、CPU、内存或网络相关。\n\n![images](img/square.jpg) **注意**\
    \ 如果您在 Solaris 下运行，请参阅 Recipe 6-3 以获取适用于该操作系统的特定解决方案。\n\n#### 解决方案\n\n使用 `vmstat`\
    \ 来确定系统资源在何处受到限制。例如，以下命令在 Linux 系统上每五秒报告一次系统资源使用情况：\n```\n$ vmstat 5\n```\n\n\
    以下是一些示例输出：\n```\nprocs -----------memory---------- ---swap-- -----io---- --system--\
    \ -----cpu------\n r  b   swpd   free   buff  cache   si   so    bi    bo   in\
    \   cs us sy id wa st\n2  0 228816 2036164  78604 3163452   0    0     1   16\
    \    0    0 29  0 70  0  0\n 2  0 228816 2035792  78612 3163456   0    0     0\
    \   59  398  528 50  1 49  0  0\n 2  0 228816 2035172  78620 3163448   0    0\
    \     0   39  437  561 50  1 49  0  0\n```\n\n要在此模式下退出 `vmstat`，请按 Ctrl+C。您也可以让\
    \ `vmstat` 报告特定的运行次数。例如，这指示 `vmstat` 每六秒运行一次，总共报告十次：\n```\n$ vmstat 6 10\n```\n\
    \n以下是解释 `vmstat` 输出时可以使用的一些通用启发式方法：\n\n*   如果 `wa`（等待 I/O 的时间）列很高，这通常表明存储子系统过载。有关识别\
    \ I/O 争用源，请参阅 Recipe 6-6。\n*   如果 `b`（正在睡眠的进程）持续大于 0，则您可能没有足够的 CPU 处理能力。有关识别消耗最多\
    \ CPU 的 Oracle 进程和 SQL 语句，请参阅 Recipe 6-5 和 6-9。\n*   如果 `so`（换出到磁盘的内存）和 `si`（从磁盘换入的内存）持续大于\
    \ 0，您可能存在内存瓶颈。有关识别消耗最多内存的 Oracle 进程和 SQL 语句的详细信息，请参阅 Recipe 6-5。\n"
- fmt: "#### How It Works\n\n`vmstat`（虚拟内存统计）工具有助于快速识别服务器上的瓶颈。使用`vmstat`的输出可以帮助确定性能瓶颈是否与\
    \ CPU、内存或磁盘 I/O 相关。[Table 6-1](#Chapter06.html#tab_6_1) 描述了`vmstat`输出中可用的列。这些列可能因您的操作系统和版本而有所不同。\n\
    \n![images](images/t0601.jpg)\n\n![images](images/t0601a.jpg)\n\n`OS WATCHER`\n\
    \nOracle 提供了一套收集操作系统指标的脚本，用于收集 CPU、内存、磁盘 I/O 和网络使用情况的指标。OS Watcher 工具套件自动化了使用`top`、`vmstat`、`iostat`、`mpstat`、`netstat`等工具收集统计信息的过程。\n\
    \n您可以从 My Oracle Support 网站 (support.oracle.com) 获取 OS Watcher。导航到支持网站并搜索 OS Watcher。OS\
    \ Watcher 用户指南可在文档 ID`301137.1`下找到。此工具在大多数 Linux/Unix 系统上受支持，也有适用于 Windows 平台的版本。\n\
    \n### 6-3. Identifying System Bottlenecks (Solaris)\n\n#### Problem\n\n您正在一个 Solaris\
    \ 系统上工作，愤怒的用户报告数据库应用程序运行缓慢。此机器上运行着多个数据库，您希望识别哪些进程消耗了最多的 CPU 资源。一旦在操作系统层面识别出消耗资源的进程，您希望将它们（如果可能的话）映射到数据库进程。\n\
    \n![images](images/square.jpg) **Note** 如果您没有运行 Solaris，请参阅解决方案 6-2。\n\n#### Solution\n\
    \n在大多数 Solaris 系统上，使用`prstat`实用程序来识别哪些进程消耗了最多的 CPU 资源。例如，您可以指示`prstat`每五秒报告一次系统统计信息：\n\
    \n```\n$ prstat 5\n```\n\n以下是一些示例输出：\n\n```\n   PID USERNAME  SIZE   RSS STATE\
    \  PRI NICE      TIME  CPU PROCESS/NLWP\n 16609 oracle   2364M 1443M cpu2    60\
    \    0   3:14:45  20% oracle/11\n 27565 oracle   2367M 1590M cpu3    21    0 \
    \  0:11:28  16% oracle/14\n 23632 oracle   2284M 1506M run     46    2   0:16:18\
    \ 6.1% oracle/11\n  4066 oracle   2270M 1492M sleep   59    0   0:02:52 1.7% oracle/35\n\
    \ 15630 oracle   2274M 1482M sleep   48    0  19:40:41 1.2% oracle/11\n```\n\n\
    输入`q`或按 Ctrl+C 退出`prstat`。在上面的输出中，进程 16609 始终显示为顶级 CPU 消耗进程。\n\n识别出顶级资源消耗进程后，您可以使用`ps`命令确定该进程关联的数据库。此示例报告与\
    \ PID 16609 关联的进程信息：\n\n```\n$ ps -ef | grep 16609\n  oracle 16609  3021  18 \
    \  Mar 09 ?         196:29 ora_dw00_ENGDEV\n```\n\n在此示例中，进程名称是`ora_dw00_ENGDEV`，关联的数据库是`ENGDEV`。\n\
    \n#### How It Works\n\n如果您在 Solaris 服务器上工作，通常没有安装`top`实用程序。在这些环境中，可以使用`prstat`命令来确定系统上资源消耗最高的进程。[Table\
    \ 6-2](#Chapter06.html#tab_6_2) 描述了`prstat`默认输出中显示的几列。\n\n![images](images/t0602.jpg)\n\
    \n### 6-4. Identifying Top Server-Consuming Resources (top)\n\n#### Problem\n\n\
    您有一台托管多个数据库的 Linux 服务器。用户报告使用其中一个数据库的应用程序响应迟缓。您希望识别哪些进程在服务器上消耗了最多的资源，然后确定顶级消耗进程是否与数据库关联。\n\
    \n#### Solution\n\n`top`命令实时显示服务器上资源消耗最高的进程。运行`top`的最简单方法如下：\n\n```\n$ top\n```\n\
    \n以下是输出片段：\n\n```\ntop - 04:40:05 up 353 days, 15:16,  3 users,  load average:\
    \ 2.84, 2.34, 2.45\nTasks: 454 total,   4 running, 450 sleeping,   0 stopped,\
    \   0 zombie\nCpu(s): 64.3%us,  3.4%sy,  0.0%ni, 20.6%id, 11.8%wa,  0.0%hi,  0.0%si,\
    \  0.0%st\nMem:   7645184k total,  6382956k used,  1262228k free,   176480k buffers\n\
    Swap:  4128760k total,      184k used,  4128576k free,  3953512k cached\n\n  PID\
    \ USER      PR  NI  VIRT  RES  SHR S %CPU %MEM    TIME+  COMMAND\n19888 oracle\
    \    25   0  148m  13m  11m R 100.1  0.2 313371:45 oracle\n19853 oracle    25\
    \   0  148m  13m  11m R 99.8  0.2 313375:41 oracle\n 9722 oracle    18   0 1095m\
    \ 287m 150m R 58.6  3.8   0:41.89 oracle\n  445 root      11  -5     0    0  \
    \  0 S  0.3  0.0   8:32.67 kjournald\n 9667 oracle    15   0  954m  55m  50m S\
    \  0.3  0.7   0:01.03 oracle\n    2 root      RT  -5     0    0    0 S  0.0  0.0\
    \   2:17.99 migration/0\n```\n\n输入`q`或按 Ctrl+C 退出`top`。在上面的输出中，第一部分显示了通用系统信息，例如服务器运行了多长时间、用户数、CPU\
    \ 信息等。第二部分显示了哪些进程消耗了最多的 CPU 资源（从上到下排列）。在上面的输出中，进程 ID 19888 消耗了大量 CPU。要确定此进程关联的数据库，请使用`ps`命令：\n\
    \n```\n$ ps 19888\n```\n\n相关输出如下：\n\n```\nPID TTY      STAT   TIME COMMAND\n19888\
    \ ?        Rs   313393:32 oracleO11R2 (DESCRIPTION=(LOCAL=YES)\n```\n\n在上面的输出中，第四列显示了`oracleO11R2`的值。这表明这是一个与`O11R2`数据库关联的\
    \ Oracle 进程。如果该进程持续消耗资源，您可以进一步确定是否有关联的 SQL 语句（参见解决方案 6-9）或终止该进程（参见解决方案 6-10）。\n\
    \n![images](images/square.jpg) **Tip** 如果您在 Solaris 操作系统环境中工作，请使用`prstat`命令查看顶级\
    \ CPU 消耗进程（详情参见解决方案 6-3）。\n\n#### How It Works\n\n如果已安装，`top`实用程序通常是 DBA 和系统管理员用来识别服务器上资源密集型进程的第一个调查工具。如果某个进程持续消耗过多的系统资源，那么您应该进一步确定该进程是否与数据库以及特定的\
    \ SQL 语句相关联。\n\n默认情况下，`top`会重复刷新（每隔几秒）有关 CPU 最密集型进程的信息。在`top`运行时，您可以交互式地更改其输出。例如，如果您输入\
    \ `>`，这将使`top`排序的列向右移动一个位置。[Table 6-3](#Chapter06.html#tab_6_3) 列出了最有用的热键功能，用于将`top`显示更改为您需要的格式。\n\
    \n![images](images/t0603.jpg)\n\n[Table 6-4](#Chapter06.html#tab_6_4) 描述了`top`显示的几列。使用这些描述来帮助解释输出。\n\
    \n![images](images/t0604.jpg)\n\n![images](images/t0604a.jpg)\n\n### 6-5. Identifying\
    \ CPU and Memory Bottlenecks (ps)\n\n#### Problem\n\n您希望快速隔离服务器上哪些进程消耗了最多的 CPU\
    \ 和内存资源。\n\n#### Solution\n\n`ps`（进程状态）命令对于快速识别顶级资源消耗进程非常方便。例如，此命令显示本机上消耗最多的十个\
    \ CPU 资源：\n\n```\n$ ps -e -o pcpu,pid,user,tty,args | sort -n -k 1 -r | head\n\
    ```\n\n以下是部分输出：\n\n```\n97.8 26902 oracle   ?        oracleO11R2 (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))\n\
    \ 0.5 27166 oracle   ?        ora_diag_O11R2\n0.0     9 root      ?        [ksoftirqd/2]\n\
    ```\n\n在上面的输出中，名为`oracleO11R2`的进程在服务器上消耗了异常多的 CPU 资源。进程名称表明这是一个与`O11R2`数据库关联的\
    \ Oracle 进程。\n\n类似地，您也可以显示顶级内存消耗进程：\n\n```\n$ ps -e -o pmem,pid,user,tty,args\
    \ | sort -n -k 1 -r | head\n```"
  raw: '#### How It Works


    The `vmstat` (virtual memory statistics) tool helps quickly identify bottlenecks
    on your server. Use the output of `vmstat` to help determine if the performance
    bottleneck is related to CPU, memory, or disk I/O. [Table 6-1](#Chapter06.html#tab_6_1)
    describes the columns available in the output of `vmstat`. These columns may vary
    somewhat depending on your operating system and version.


    ![images](images/t0601.jpg)


    ![images](images/t0601a.jpg)


    **OS WATCHER**


    Oracle provides a collection of operating system scripts that gather and store
    metrics for CPU, memory, disk I/O, and network usage. The OS Watcher tool suite
    automates the gathering of statistics using tools such as `top`, `vmstat`, `iostat`,
    `mpstat`, `netstat`, and so on.


    You can obtain OS Watcher from the My Oracle Support web site (support.oracle.com).
    Navigate to the support web site and search for OS Watcher. The OS Watcher User
    Guide can be found under document ID **301137.1.** This tool is supported on most
    Linux/Unix systems, and there is also a version for the Windows platform.


    ### 6-3. Identifying System Bottlenecks (Solaris)


    #### Problem


    You''re working on a Solaris system, and irate users are reporting the database
    application is slow. You have multiple databases running on this box and want
    to identify which processes are consuming the most CPU resources. Once the resource-consuming
    processes are identified at the OS, then you want to map them (if possible) to
    a database process.


    ![images](images/square.jpg) **Note** If you are not running Solaris, then see
    the solution in Recipe 6-2.


    #### Solution


    On most Solaris systems, the `prstat` utility is used to identify which processes
    are consuming the most CPU resources. For example, you can instruct the `prstat`
    to report system statistics every five seconds:


    `$ prstat 5`


    Here is some sample output:


    `   PID USERNAME  SIZE   RSS STATE  PRI NICE      TIME  CPU PROCESS/NLWP`

    ` 16609 oracle   2364M 1443M cpu2    60    0   3:14:45  20% oracle/11`

    ` 27565 oracle   2367M 1590M cpu3    21    0   0:11:28  16% oracle/14`

    ` 23632 oracle   2284M 1506M run     46    2   0:16:18 6.1% oracle/11`

    `  4066 oracle   2270M 1492M sleep   59    0   0:02:52 1.7% oracle/35`

    ` 15630 oracle   2274M 1482M sleep   48    0  19:40:41 1.2% oracle/11`


    Type **q** or press Ctrl+C to exit `prstat`. In the prior output, process 16609
    is consistently showing up as a top CPU-consuming process.


    After identifying a top resource-consuming process, you can determine which database
    the process is associated with by using the `ps` command. This example reports
    on process information associated with the PID of 16609:


    `$ ps -ef | grep 16609`

    `  oracle 16609  3021  18   Mar 09 ?         196:29 ora_dw00_ENGDEV`


    In this example, the name of the process is `ora_dw00_ENGDEV` and the associated
    database is `ENGDEV`.


    #### How It Works


    If you''re working on a Solaris server, the `top` utility is oftentimes not installed.
    In these environments, the `prstat` command can be used to determine top resource-consuming
    processes on the system. [Table 6-2](#Chapter06.html#tab_6_2) describes several
    of the columns displayed in the default output of `prstat`.


    ![images](images/t0602.jpg)


    ### 6-4. Identifying Top Server-Consuming Resources (top)


    #### Problem


    You have a Linux server that hosts multiple databases. Users are reporting sluggishness
    with an application that uses one of the databases. You want to identify which
    processes are consuming the most resources on the server and then determine if
    the top consuming process is associated with a database.


    #### Solution


    The `top` command shows a real-time display of the highest resource-consuming
    processes on a server. Here''s the simplest way to run `top`:


    `$ top`


    Listed next is a fragment of the output:


    `top - 04:40:05 up 353 days, 15:16,  3 users,  load average: 2.84, 2.34, 2.45`

    `Tasks: 454 total,   4 running, 450 sleeping,   0 stopped,   0 zombie`

    `Cpu(s): 64.3%us,  3.4%sy,  0.0%ni, 20.6%id, 11.8%wa,  0.0%hi,  0.0%si,  0.0%st`

    `Mem:   7645184k total,  6382956k used,  1262228k free,   176480k buffers`

    `Swap:  4128760k total,      184k used,  4128576k free,  3953512k cached`


    `  PID USER      PR  NI  VIRT  RES  SHR S %CPU %MEM    TIME+  COMMAND`

    `19888 oracle    25   0  148m  13m  11m R 100.1  0.2 313371:45 oracle`

    `19853 oracle    25   0  148m  13m  11m R 99.8  0.2 313375:41 oracle`

    ` 9722 oracle    18   0 1095m 287m 150m R 58.6  3.8   0:41.89 oracle`

    `  445 root      11  -5     0    0    0 S  0.3  0.0   8:32.67 kjournald`

    ` 9667 oracle    15   0  954m  55m  50m S  0.3  0.7   0:01.03 oracle`

    `    2 root      RT  -5     0    0    0 S  0.0  0.0   2:17.99 migration/0`


    Type **q** or press Ctrl+C to exit `top`. In the prior output, the first section
    of the output displays general system information such as how long the server
    has been running, number of users, CPU information, and so on. The second section
    shows which processes are consuming the most CPU resources (listed top to bottom).
    In the prior output, the process ID of 19888 is consuming a large amount of CPU.
    To determine which database this process is associated with, use the `ps` command:


    `$ ps 19888`


    Here is the associated output:


    `PID TTY      STAT   TIME COMMAND`

    `19888 ?        Rs   313393:32 oracleO11R2 (DESCRIPTION=(LOCAL=YES)`


    In the prior output, the fourth column displays the value of `oracleO11R2`. This
    indicates that this is an Oracle process associated with the `O11R2` database.
    If the process continues to consume resources, you can next determine if there
    is a SQL statement associated with the process (see Recipe 6-9) or terminate the
    process (see Recipe 6-10).


    ![images](images/square.jpg) **Tip** If you work in a Solaris operating system
    environment, use the `prstat` command to view the top CPU-consuming processes
    (see Recipe 6-3 for details).


    #### How It Works


    If installed, the `top` utility is often the first investigative tool employed
    by DBAs and system administrators to identify resource-intensive processes on
    a server. If a process is continuously consuming excessive system resources, then
    you should further determine if the process is associated with a database and
    a specific SQL statement.


    By default, `top` will repetitively refresh (every few seconds) information regarding
    the most CPU-intensive processes. While `top` is running, you can interactively
    change its output. For example, if you type >, this will move the column that
    `top` is sorting one position to the right. [Table 6-3](#Chapter06.html#tab_6_3)
    lists the most useful hot key features to alter the `top` display to the desired
    format.


    ![images](images/t0603.jpg)


    [Table 6-4](#Chapter06.html#tab_6_4) describes several of the columns displayed
    by `top`. Use these descriptions to help interpret the output.


    ![images](images/t0604.jpg)


    ![images](images/t0604a.jpg)


    ### 6-5. Identifying CPU and Memory Bottlenecks (ps)


    #### Problem


    You want to quickly isolate which processes on the server are consuming the most
    CPU and memory resources.


    #### Solution


    The `ps` (process status) command is handy for quickly identifying top resource-consuming
    processes. For example, this command displays the top ten CPU-consuming resources
    on the box:


    `$ ps -e -o pcpu,pid,user,tty,args | sort -n -k 1 -r | head`


    Here is a partial listing of the output:


    `97.8 26902 oracle   ?        oracleO11R2 (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))`

    ` 0.5 27166 oracle   ?        ora_diag_O11R2`

    `0.0     9 root     ?        [ksoftirqd/2]`


    In the prior output, the process named `oracleO11R2` is consuming an inordinate
    amount of CPU resources on the server. The process name identifies this as an
    Oracle process associated with the `O11R2` database.


    Similarly, you can also display the top memory-consuming processes:


    `$ ps -e -o pmem,pid,user,tty,args | sort -n -k 1 -r | head`'
